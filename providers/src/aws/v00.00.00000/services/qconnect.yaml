      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0
    ParsingPrompt:
      description: Instructions for interpreting the contents of a document.
      type: object
      properties:
        parsingPromptText:
          $ref: "#/components/schemas/ParsingPromptText"
          description: Instructions for interpreting the contents of a document.
      required:
        - parsingPromptText
    ParsingPromptText:
      type: string
      minLength: 1
      maxLength: 10000
