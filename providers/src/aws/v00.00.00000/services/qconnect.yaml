      description: "The message template fields to query message templates by. The following is the list of supported field names: name description"
      type: object
      properties:
        name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the attribute to query the message templates by.
        values:
          $ref: "#/components/schemas/MessageTemplateQueryValueList"
          description: The values of the attribute to query the message templates by.
        operator:
          $ref: "#/components/schemas/MessageTemplateQueryOperator"
          description: The operator to use for matching attribute field values in the query.
        allowFuzziness:
          $ref: "#/components/schemas/Boolean"
          description: Whether the query expects only exact matches on the attribute field values. The results of the query will only include exact matches if this parameter is set to false.
        priority:
          $ref: "#/components/schemas/Priority"
          description: The importance of the attribute field when calculating query result relevancy scores. The value set for this parameter affects the ordering of search results.
      required:
        - name
        - values
        - operator
    MessageTemplateQueryValueList:
      type: array
      items:
        $ref: "#/components/schemas/MessageTemplateQueryValue"
    MessageTemplateQueryValue:
      type: string
      minLength: 1
      maxLength: 1024
    MessageTemplateQueryOperator:
      type: string
      enum:
        - CONTAINS
        - CONTAINS_AND_PREFIX
    Priority:
      type: string
      enum:
        - HIGH
        - MEDIUM
        - LOW
    MessageTemplateFilterFieldList:
      type: array
      items:
        $ref: "#/components/schemas/MessageTemplateFilterField"
    MessageTemplateFilterField:
      description: "The message template fields to filter the message template query results by. The following is the list of supported field names: name description channel channelSubtype language qualifier createdTime lastModifiedTime lastModifiedBy groupingConfiguration.criteria groupingConfiguration.values"
      type: object
      properties:
        name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the attribute field to filter the message templates by.
        values:
          $ref: "#/components/schemas/MessageTemplateFilterValueList"
          description: The values of attribute field to filter the message template by.
        operator:
          $ref: "#/components/schemas/MessageTemplateFilterOperator"
