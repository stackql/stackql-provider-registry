        caseArn:
          $ref: "#/components/schemas/CaseArn"
          description: The Amazon Resource Name (ARN) of the case for summarization.
      required:
        - caseArn
    CaseArn:
      type: string
      pattern: arn:[a-z-]*?:cases:[a-z0-9-]*?:[0-9]{12}:domain/.{1,500}/case/[A-Za-z0-9\-._/:#=+-]{1,500}
    QueryAssistantResponse:
      type: object
