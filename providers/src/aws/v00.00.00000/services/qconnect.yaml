      type: object
      properties:
        operationName:
          $ref: "#/components/schemas/NonEmptyString"
          description: Action being performed
        providerName:
          $ref: "#/components/schemas/NonEmptyString"
          description: Model provider identifier (e.g., aws.bedrock)
        errorType:
          $ref: "#/components/schemas/NonEmptyString"
          description: Error classification if span failed (e.g., throttle, timeout)
        agentId:
          $ref: "#/components/schemas/Uuid"
          description: Amazon Connect agent ID
        instanceArn:
          $ref: "#/components/schemas/GenericArn"
          description: Amazon Connect instance ARN
        contactId:
          $ref: "#/components/schemas/Uuid"
          description: Amazon Connect contact identifier
        initialContactId:
          $ref: "#/components/schemas/Uuid"
          description: Amazon Connect contact identifier
        sessionName:
          $ref: "#/components/schemas/NonEmptyString"
          description: Session name
        aiAgentArn:
          $ref: "#/components/schemas/ArnWithQualifier"
          description: AI agent ARN
        aiAgentType:
          $ref: "#/components/schemas/AIAgentType"
          description: AI agent type
        aiAgentName:
          $ref: "#/components/schemas/Name"
          description: AI agent name
        aiAgentId:
          $ref: "#/components/schemas/Uuid"
          description: AI agent identifier
        aiAgentVersion:
          $ref: "#/components/schemas/Integer"
          description: AI agent version number
        aiAgentInvoker:
          $ref: "#/components/schemas/NonEmptyString"
          description: Entity that invoked the AI agent
        aiAgentOrchestratorUseCase:
          $ref: "#/components/schemas/NonEmptyString"
          description: AI agent orchestrator use case
        requestModel:
          $ref: "#/components/schemas/NonEmptyString"
          description: LLM model ID for request (e.g., anthropic.claude-3-sonnet)
        requestMaxTokens:
          $ref: "#/components/schemas/Integer"
          description: Maximum tokens configured for generation
        temperature:
          $ref: "#/components/schemas/SpanAttributesTemperatureFloat"
          description: Sampling temperature for generation
        topP:
          $ref: "#/components/schemas/SpanAttributesTopPFloat"
          description: Top-p sampling parameter for generation
        responseModel:
          $ref: "#/components/schemas/NonEmptyString"
          description: Actual model used for response (usually matches requestModel)
        responseFinishReasons:
          $ref: "#/components/schemas/SpanFinishReasonList"
          description: Generation termination reasons (e.g., stop, max_tokens)
        usageInputTokens:
          $ref: "#/components/schemas/Integer"
          description: Number of input tokens in prompt
        usageOutputTokens:
          $ref: "#/components/schemas/Integer"
          description: Number of output tokens in response
        usageTotalTokens:
          $ref: "#/components/schemas/Integer"
          description: Total tokens consumed (input + output)
        cacheReadInputTokens:
          $ref: "#/components/schemas/Integer"
          description: Number of input tokens that were retrieved from cache
        cacheWriteInputTokens:
          $ref: "#/components/schemas/Integer"
          description: Number of input tokens that were written to cache in this request
        inputMessages:
          $ref: "#/components/schemas/SpanMessageList"
          description: Input message collection sent to LLM
        outputMessages:
          $ref: "#/components/schemas/SpanMessageList"
          description: Output message collection received from LLM
        systemInstructions:
          $ref: "#/components/schemas/SpanMessageValueList"
          description: System prompt instructions
        promptArn:
          $ref: "#/components/schemas/ArnWithQualifier"
          description: AI prompt ARN
        promptId:
          $ref: "#/components/schemas/Uuid"
          description: AI prompt identifier
        promptType:
          $ref: "#/components/schemas/AIPromptType"
          description: AI prompt type
        promptName:
          $ref: "#/components/schemas/Name"
          description: AI prompt name
        promptVersion:
          $ref: "#/components/schemas/Integer"
          description: AI prompt version number
        timeToFirstTokenMs:
          $ref: "#/components/schemas/Integer"
          description: Time to first token in milliseconds, measured from when Amazon Bedrock was invoked to when the first token was returned
    Integer:
      type: integer
    SpanAttributesTemperatureFloat:
      type: number
      format: float
      minimum: 0
      maximum: 1
    SpanAttributesTopPFloat:
      type: number
      format: float
      minimum: 0
      maximum: 1
    SpanFinishReasonList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    SpanMessageList:
      type: array
      items:
        $ref: "#/components/schemas/SpanMessage"
    SpanMessage:
      description: A message in the conversation history with participant role and content values
      type: object
      properties:
        messageId:
          $ref: "#/components/schemas/Uuid"
          description: Unique message identifier
        participant:
          $ref: "#/components/schemas/Participant"
          description: Message source role
        timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: Message timestamp
        values:
          $ref: "#/components/schemas/SpanMessageValueList"
          description: Message content values (text, tool use, tool result, reasoning)
      required:
        - messageId
        - participant
        - timestamp
        - values
    SpanMessageValueList:
      type: array
      items:
        $ref: "#/components/schemas/SpanMessageValue"
    SpanMessageValue:
      description: Message content value - can be text, tool invocation, tool result, or reasoning
      type: object
      properties:
        text:
          $ref: "#/components/schemas/SpanTextValue"
          description: Text message content
        toolUse:
          $ref: "#/components/schemas/SpanToolUseValue"
          description: Tool invocation message content
        toolResult:
          $ref: "#/components/schemas/SpanToolResultValue"
          description: Tool result message content
        reasoning:
          $ref: "#/components/schemas/SpanReasoningValue"
    SpanTextValue:
      description: Text message content
      type: object
      properties:
        value:
          $ref: "#/components/schemas/NonEmptySensitiveString"
          description: String content of the message text
        citations:
          $ref: "#/components/schemas/SpanCitationList"
          description: The citations associated with the span text.
        aiGuardrailAssessment:
          $ref: "#/components/schemas/AIGuardrailAssessment"
          description: The AI Guardrail assessment for the span text.
      required:
        - value
    SpanCitationList:
      type: array
      items:
        $ref: "#/components/schemas/SpanCitation"
    SpanCitation:
      description: A citation that spans a specific range of text.
      type: object
      properties:
        contentId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier of the content being cited in the span.
        title_:
          $ref: "#/components/schemas/SensitiveString"
          description: The title of the content being cited in the span.
        knowledgeBaseId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier of the knowledge base containing the cited content.
        knowledgeBaseArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the knowledge base containing the cited content.
    SpanToolUseValue:
      description: Tool invocation message content
      type: object
      properties:
        toolUseId:
          $ref: "#/components/schemas/Uuid"
          description: Unique ID for this tool invocation
        name:
          $ref: "#/components/schemas/Name"
          description: The tool name
        arguments:
          $ref: "#/components/schemas/JSONDocument"
          description: The tool input arguments
      required:
        - toolUseId
        - name
        - arguments
    SpanToolResultValue:
      description: Tool result message content
      type: object
      properties:
        toolUseId:
          $ref: "#/components/schemas/Uuid"
          description: Relates this result back to the tool invocation
        values:
          $ref: "#/components/schemas/SpanMessageValueList"
          description: The tool results
        error:
          $ref: "#/components/schemas/NonEmptyString"
          description: The tool invocation error if failed
      required:
        - toolUseId
        - values
    SpanReasoningValue:
      description: Model reasoning and it's internal decision making process
      type: object
      properties:
        value:
          $ref: "#/components/schemas/NonEmptySensitiveString"
          description: The reasoning text content
      required:
        - value
    ListTagsForResourceResponse:
      type: object
      properties:
        tags:
          type: object
          properties: {}
          description: The tags used to organize, track, or control access for this resource.
    NotifyRecommendationsReceivedResponse:
      type: object
      properties:
        recommendationIds:
          $ref: "#/components/schemas/RecommendationIdList"
          description: The identifiers of the recommendations.
        errors:
          $ref: "#/components/schemas/NotifyRecommendationsReceivedErrorList"
          description: The identifiers of recommendations that are causing errors.
    NotifyRecommendationsReceivedErrorList:
      type: array
      items:
        $ref: "#/components/schemas/NotifyRecommendationsReceivedError"
    NotifyRecommendationsReceivedError:
      description: An error occurred when creating a recommendation.
      type: object
      properties:
        recommendationId:
          $ref: "#/components/schemas/RecommendationId"
          description: The identifier of the recommendation that is in error.
        message:
          $ref: "#/components/schemas/NotifyRecommendationsReceivedErrorMessage"
          description: A recommendation is causing an error.
    NotifyRecommendationsReceivedErrorMessage:
      type: string
    TargetType:
      type: string
      enum:
        - RECOMMENDATION
        - RESULT
        - MESSAGE
    ContentFeedbackData:
      description: Information about the feedback.
      type: object
      properties:
        generativeContentFeedbackData:
          $ref: "#/components/schemas/GenerativeContentFeedbackData"
          description: Information about the feedback for a generative target type.
    GenerativeContentFeedbackData:
      description: The feedback information for a generative target type.
      type: object
      properties:
        relevance:
          $ref: "#/components/schemas/Relevance"
          description: The relevance of the feedback.
      required:
        - relevance
    Relevance:
      type: string
      enum:
        - HELPFUL
        - NOT_HELPFUL
    PutFeedbackResponse:
      type: object
      properties:
        assistantId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier of the Amazon Q in Connect assistant.
        assistantArn:
          $ref: "#/components/schemas/UuidOrArn"
          description: The Amazon Resource Name (ARN) of the Amazon Q in Connect assistant.
        targetId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier of the feedback target.
        targetType:
          $ref: "#/components/schemas/TargetType"
          description: The type of the feedback target.
        contentFeedback:
          $ref: "#/components/schemas/ContentFeedbackData"
          description: Information about the feedback provided.
      required:
