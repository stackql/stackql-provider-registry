      type: array
      items:
        $ref: "#/components/schemas/MessageTemplateAttributeKey"
    MessageTemplateAttributeKey:
      type: string
      minLength: 1
      maxLength: 32767
    RetrievalConfiguration:
      description: Configuration for content retrieval operations.
      type: object
      properties:
        knowledgeSource:
          $ref: "#/components/schemas/KnowledgeSource"
          description: The knowledge source configuration for content retrieval.
        filter:
          $ref: "#/components/schemas/RetrievalFilterConfiguration"
          description: The filter configuration for content retrieval.
        numberOfResults:
          $ref: "#/components/schemas/Integer"
          description: The number of results to retrieve.
        overrideKnowledgeBaseSearchType:
          $ref: "#/components/schemas/KnowledgeBaseSearchType"
          description: Override setting for the knowledge base search type during retrieval.
      required:
        - knowledgeSource
    KnowledgeSource:
      description: A knowledge source that provides content for recommendations.
      type: object
      properties:
        assistantAssociationIds:
          $ref: "#/components/schemas/AssistantAssociationIdList"
          description: The list of assistant association identifiers for the knowledge source.
    AssistantAssociationIdList:
      type: array
      items:
        $ref: "#/components/schemas/UuidOrArn"
    RetrievalFilterConfiguration:
      description: Configuration for filtering content during retrieval operations.
      type: object
      properties:
        andAll:
          $ref: "#/components/schemas/RetrievalFilterList"
          description: Filter configuration that requires all conditions to be met.
        equals:
          $ref: "#/components/schemas/FilterAttribute"
          description: Filter configuration for exact equality matching.
        greaterThan:
          $ref: "#/components/schemas/FilterAttribute"
          description: Filter configuration for greater than comparison.
        greaterThanOrEquals:
          $ref: "#/components/schemas/FilterAttribute"
          description: Filter configuration for greater than or equal comparison.
        in:
          $ref: "#/components/schemas/FilterAttribute"
          description: Filter configuration for membership in a set of values.
        lessThan:
          $ref: "#/components/schemas/FilterAttribute"
          description: Filter configuration for less than comparison.
        lessThanOrEquals:
          $ref: "#/components/schemas/FilterAttribute"
          description: Filter configuration for less than or equal comparison.
        listContains:
          $ref: "#/components/schemas/FilterAttribute"
          description: Filter configuration for checking if a list contains a value.
        notEquals:
          $ref: "#/components/schemas/FilterAttribute"
          description: Filter configuration for inequality matching.
        notIn:
          $ref: "#/components/schemas/FilterAttribute"
          description: Filter configuration for exclusion from a set of values.
        orAll:
          $ref: "#/components/schemas/RetrievalFilterList"
          description: Filter configuration where any condition can be met.
        startsWith:
          $ref: "#/components/schemas/FilterAttribute"
          description: Filter configuration for prefix matching.
        stringContains:
          $ref: "#/components/schemas/FilterAttribute"
          description: Filter configuration for substring matching.
    RetrievalFilterList:
      type: array
      items:
        $ref: "#/components/schemas/RetrievalFilterConfiguration"
    FilterAttribute:
      description: An attribute used for filtering.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/FilterAttributeKey"
          description: The key of the filter attribute.
        value:
          $ref: "#/components/schemas/JSONDocument"
          description: The value of the filter attribute.
      required:
        - key
        - value
    FilterAttributeKey:
      type: string
      minLength: 1
      maxLength: 100
    RetrieveResponse:
      type: object
      properties:
        results:
          $ref: "#/components/schemas/RetrieveResultList"
          description: The results of the content retrieval operation.
      required:
        - results
    RetrieveResultList:
      type: array
      items:
        $ref: "#/components/schemas/RetrieveResult"
    RetrieveResult:
      description: A single result from a content retrieval operation.
      type: object
      properties:
        associationId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier of the assistant association for the retrieved result.
        sourceId:
          $ref: "#/components/schemas/SensitiveString"
          description: The URL, URI, or ID of the retrieved content when available, or a UUID when unavailable.
        referenceType:
          $ref: "#/components/schemas/ReferenceType"
          description: A type to define the KB origin of a retrieved content.
        contentText:
          $ref: "#/components/schemas/SensitiveString"
          description: The text content of the retrieved result.
      required:
        - associationId
        - sourceId
        - referenceType
        - contentText
    SearchExpression:
      description: The search expression.
      type: object
      properties:
        filters:
          $ref: "#/components/schemas/FilterList"
          description: The search expression filters.
      required:
        - filters
    FilterList:
      type: array
      items:
        $ref: "#/components/schemas/Filter"
    Filter:
      description: A search filter.
      type: object
      properties:
        field:
          $ref: "#/components/schemas/FilterField"
          description: The field on which to filter.
        operator:
          $ref: "#/components/schemas/FilterOperator"
          description: The operator to use for comparing the field’s value with the provided value.
        value:
          $ref: "#/components/schemas/NonEmptyString"
          description: The desired field value on which to filter.
      required:
        - field
        - operator
        - value
    FilterField:
      type: string
      enum:
        - NAME
    FilterOperator:
      type: string
      enum:
        - EQUALS
    SearchContentResponse:
      type: object
      properties:
        contentSummaries:
          $ref: "#/components/schemas/ContentSummaryList"
          description: Summary information about the content.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: If there are additional results, this is the token for the next set of results.
      required:
        - contentSummaries
    MessageTemplateSearchExpression:
      description: The search expression of the message template.
      type: object
      properties:
        queries:
          $ref: "#/components/schemas/MessageTemplateQueryFieldList"
          description: The message template query expressions.
        filters:
          $ref: "#/components/schemas/MessageTemplateFilterFieldList"
          description: The configuration of filtering rules applied to message template query results.
        orderOnField:
          $ref: "#/components/schemas/MessageTemplateOrderField"
          description: The message template attribute fields on which the query results are ordered.
    MessageTemplateQueryFieldList:
      type: array
      items:
        $ref: "#/components/schemas/MessageTemplateQueryField"
