        - spanType
        - startTimestamp
        - endTimestamp
        - status
        - requestId
        - attributes
    SpanType:
      type: string
      enum:
        - CLIENT
        - SERVER
        - INTERNAL
    SpanStatus:
      type: string
      enum:
        - OK
        - ERROR
        - TIMEOUT
    SpanStatusDescriptionString:
      type: string
      minLength: 1
      maxLength: 1024
    SpanOriginRequestIdString:
      type: string
      minLength: 1
      maxLength: 256
    SpanAttributes:
