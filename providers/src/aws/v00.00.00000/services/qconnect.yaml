    SourceConfiguration:
      description: Configuration information about the external data source.
      type: object
      properties:
        appIntegrations:
          $ref: "#/components/schemas/AppIntegrationsConfiguration"
          description: Configuration information for Amazon AppIntegrations to automatically ingest content.
        managedSourceConfiguration:
          $ref: "#/components/schemas/ManagedSourceConfiguration"
          description: Source configuration for managed resources.
    AppIntegrationsConfiguration:
      description: Configuration information for Amazon AppIntegrations to automatically ingest content.
      type: object
      properties:
        appIntegrationArn:
          $ref: "#/components/schemas/GenericArn"
          description: "The Amazon Resource Name (ARN) of the AppIntegrations DataIntegration to use for ingesting content. For Salesforce, your AppIntegrations DataIntegration must have an ObjectConfiguration if objectFields is not provided, including at least Id, ArticleNumber, VersionNumber, Title, PublishStatus, and IsDeleted as source fields. For ServiceNow, your AppIntegrations DataIntegration must have an ObjectConfiguration if objectFields is not provided, including at least number, short_description, sys_mod_count, workflow_state, and active as source fields. For Zendesk, your AppIntegrations DataIntegration must have an ObjectConfiguration if objectFields is not provided, including at least id, title, updated_at, and draft as source fields. For SharePoint, your AppIntegrations DataIntegration must have a FileConfiguration, including only file extensions that are among docx, pdf, html, htm, and txt. For Amazon S3, the ObjectConfiguration and FileConfiguration of your AppIntegrations DataIntegration must be null. The SourceURI of your DataIntegration must use the following format: s3://your_s3_bucket_name. The bucket policy of the corresponding S3 bucket must allow the Amazon Web Services principal app-integrations.amazonaws.com to perform s3:ListBucket, s3:GetObject, and s3:GetBucketLocation against the bucket."
        objectFields:
          $ref: "#/components/schemas/ObjectFieldsList"
          description: The fields from the source that are made available to your agents in Amazon Q in Connect. Optional if ObjectConfiguration is included in the provided DataIntegration. For Salesforce, you must include at least Id, ArticleNumber, VersionNumber, Title, PublishStatus, and IsDeleted. For ServiceNow, you must include at least number, short_description, sys_mod_count, workflow_state, and active. For Zendesk, you must include at least id, title, updated_at, and draft. Make sure to include additional fields. These fields are indexed and used to source recommendations.
      required:
        - appIntegrationArn
    ObjectFieldsList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    ManagedSourceConfiguration:
      description: Source configuration for managed resources.
      type: object
      properties:
        webCrawlerConfiguration:
          $ref: "#/components/schemas/WebCrawlerConfiguration"
          description: Configuration data for web crawler data source.
    WebCrawlerConfiguration:
      description: The configuration details for the web data source.
      type: object
      properties:
        urlConfiguration:
          $ref: "#/components/schemas/UrlConfiguration"
          description: The configuration of the URL/URLs for the web content that you want to crawl. You should be authorized to crawl the URLs.
        crawlerLimits:
          $ref: "#/components/schemas/WebCrawlerLimits"
          description: The configuration of crawl limits for the web URLs.
        inclusionFilters:
          $ref: "#/components/schemas/UrlFilterList"
          description: A list of one or more inclusion regular expression patterns to include certain URLs. If you specify an inclusion and exclusion filter/pattern and both match a URL, the exclusion filter takes precedence and the web content of the URL isn’t crawled.
        exclusionFilters:
          $ref: "#/components/schemas/UrlFilterList"
          description: A list of one or more exclusion regular expression patterns to exclude certain URLs. If you specify an inclusion and exclusion filter/pattern and both match a URL, the exclusion filter takes precedence and the web content of the URL isn’t crawled.
        scope:
          $ref: "#/components/schemas/WebScopeType"
          description: The scope of what is crawled for your URLs. You can choose to crawl only web pages that belong to the same host or primary domain. For example, only web pages that contain the seed URL https://docs.aws.amazon.com/bedrock/latest/userguide/ and no other domains. You can choose to include sub domains in addition to the host or primary domain. For example, web pages that contain aws.amazon.com can also include sub domain docs.aws.amazon.com.
      required:
        - urlConfiguration
    UrlConfiguration:
      description: The configuration of the URL/URLs for the web content that you want to crawl. You should be authorized to crawl the URLs.
      type: object
      properties:
        seedUrls:
          $ref: "#/components/schemas/SeedUrls"
          description: List of URLs for crawling.
    SeedUrls:
      type: array
      items:
        $ref: "#/components/schemas/SeedUrl"
    SeedUrl:
      description: A URL for crawling.
      type: object
      properties:
        url:
          $ref: "#/components/schemas/WebUrl"
          description: URL for crawling
    WebUrl:
      type: string
      pattern: https?://[A-Za-z0-9][^\s]*
    WebCrawlerLimits:
      description: The configuration of crawl limits for the web URLs.
      type: object
      properties:
        rateLimit:
          $ref: "#/components/schemas/WebCrawlerLimitsRateLimitInteger"
          description: Rate of web URLs retrieved per minute.
    WebCrawlerLimitsRateLimitInteger:
      type: integer
      minimum: 1
      maximum: 300
    UrlFilterList:
      type: array
      items:
        $ref: "#/components/schemas/UrlFilterPattern"
    UrlFilterPattern:
      type: string
      minLength: 1
      maxLength: 1000
    WebScopeType:
      type: string
      enum:
        - HOST_ONLY
        - SUBDOMAINS
    RenderingConfiguration:
      description: Information about how to render the content.
      type: object
      properties:
        templateUri:
          $ref: "#/components/schemas/Uri"
          description: "A URI template containing exactly one variable in ${variableName} format. This can only be set for EXTERNAL knowledge bases. For Salesforce, ServiceNow, and Zendesk, the variable must be one of the following: Salesforce: Id, ArticleNumber, VersionNumber, Title, PublishStatus, or IsDeleted ServiceNow: number, short_description, sys_mod_count, workflow_state, or active Zendesk: id, title, updated_at, or draft The variable is replaced with the actual value for a piece of content when calling GetContent."
    VectorIngestionConfiguration:
      description: Contains details about how to ingest the documents in a data source.
      type: object
      properties:
        chunkingConfiguration:
          $ref: "#/components/schemas/ChunkingConfiguration"
          description: Details about how to chunk the documents in the data source. A chunk refers to an excerpt from a data source that is returned when the knowledge base that it belongs to is queried.
        parsingConfiguration:
          $ref: "#/components/schemas/ParsingConfiguration"
          description: A custom parser for data source documents.
    ChunkingConfiguration:
      description: Details about how to chunk the documents in the data source. A chunk refers to an excerpt from a data source that is returned when the knowledge base that it belongs to is queried.
      type: object
      properties:
        chunkingStrategy:
          $ref: "#/components/schemas/ChunkingStrategy"
          description: Knowledge base can split your source data into chunks. A chunk refers to an excerpt from a data source that is returned when the knowledge base that it belongs to is queried. You have the following options for chunking your data. If you opt for NONE, then you may want to pre-process your files by splitting them up such that each file corresponds to a chunk.
        fixedSizeChunkingConfiguration:
          $ref: "#/components/schemas/FixedSizeChunkingConfiguration"
          description: Configurations for when you choose fixed-size chunking. If you set the chunkingStrategy as NONE, exclude this field.
        hierarchicalChunkingConfiguration:
          $ref: "#/components/schemas/HierarchicalChunkingConfiguration"
          description: Settings for hierarchical document chunking for a data source. Hierarchical chunking splits documents into layers of chunks where the first layer contains large chunks, and the second layer contains smaller chunks derived from the first layer.
        semanticChunkingConfiguration:
          $ref: "#/components/schemas/SemanticChunkingConfiguration"
          description: Settings for semantic document chunking for a data source. Semantic chunking splits a document into smaller documents based on groups of similar content derived from the text with natural language processing.
      required:
        - chunkingStrategy
    ChunkingStrategy:
      type: string
      enum:
        - FIXED_SIZE
        - NONE
        - HIERARCHICAL
        - SEMANTIC
    FixedSizeChunkingConfiguration:
      description: Configurations for when you choose fixed-size chunking. If you set the chunkingStrategy as NONE, exclude this field.
      type: object
      properties:
        maxTokens:
          $ref: "#/components/schemas/FixedSizeChunkingConfigurationMaxTokensInteger"
          description: The maximum number of tokens to include in a chunk.
        overlapPercentage:
          $ref: "#/components/schemas/FixedSizeChunkingConfigurationOverlapPercentageInteger"
          description: The percentage of overlap between adjacent chunks of a data source.
      required:
        - maxTokens
        - overlapPercentage
    FixedSizeChunkingConfigurationMaxTokensInteger:
      type: integer
      minimum: 1
    FixedSizeChunkingConfigurationOverlapPercentageInteger:
      type: integer
      minimum: 1
      maximum: 99
    HierarchicalChunkingConfiguration:
      description: Settings for hierarchical document chunking for a data source. Hierarchical chunking splits documents into layers of chunks where the first layer contains large chunks, and the second layer contains smaller chunks derived from the first layer.
      type: object
      properties:
        levelConfigurations:
          $ref: "#/components/schemas/HierarchicalChunkingLevelConfigurations"
          description: Token settings for each layer.
        overlapTokens:
          $ref: "#/components/schemas/HierarchicalChunkingConfigurationOverlapTokensInteger"
          description: The number of tokens to repeat across chunks in the same layer.
      required:
        - levelConfigurations
        - overlapTokens
    HierarchicalChunkingLevelConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/HierarchicalChunkingLevelConfiguration"
    HierarchicalChunkingLevelConfiguration:
      description: Token settings for each layer.
      type: object
      properties:
        maxTokens:
          $ref: "#/components/schemas/HierarchicalChunkingLevelConfigurationMaxTokensInteger"
          description: The maximum number of tokens that a chunk can contain in this layer.
      required:
        - maxTokens
    HierarchicalChunkingLevelConfigurationMaxTokensInteger:
      type: integer
      minimum: 1
      maximum: 8192
    HierarchicalChunkingConfigurationOverlapTokensInteger:
      type: integer
      minimum: 1
    SemanticChunkingConfiguration:
      description: Settings for semantic document chunking for a data source. Semantic chunking splits a document into smaller documents based on groups of similar content derived from the text with natural language processing.
      type: object
      properties:
        maxTokens:
          $ref: "#/components/schemas/SemanticChunkingConfigurationMaxTokensInteger"
          description: The maximum number of tokens that a chunk can contain.
        bufferSize:
          $ref: "#/components/schemas/SemanticChunkingConfigurationBufferSizeInteger"
          description: The buffer size.
        breakpointPercentileThreshold:
          $ref: "#/components/schemas/SemanticChunkingConfigurationBreakpointPercentileThresholdInteger"
          description: The dissimilarity threshold for splitting chunks.
      required:
        - maxTokens
        - bufferSize
        - breakpointPercentileThreshold
    SemanticChunkingConfigurationMaxTokensInteger:
      type: integer
      minimum: 1
    SemanticChunkingConfigurationBufferSizeInteger:
      type: integer
      minimum: 0
      maximum: 1
    SemanticChunkingConfigurationBreakpointPercentileThresholdInteger:
      type: integer
      minimum: 50
      maximum: 99
    ParsingConfiguration:
      description: Settings for parsing document contents. By default, the service converts the contents of each document into text before splitting it into chunks. To improve processing of PDF files with tables and images, you can configure the data source to convert the pages of text into images and use a model to describe the contents of each page.
      type: object
      properties:
        parsingStrategy:
          $ref: "#/components/schemas/ParsingStrategy"
          description: The parsing strategy for the data source.
        bedrockFoundationModelConfiguration:
          $ref: "#/components/schemas/BedrockFoundationModelConfigurationForParsing"
          description: Settings for a foundation model used to parse documents for a data source.
      required:
        - parsingStrategy
    ParsingStrategy:
      type: string
      enum:
        - BEDROCK_FOUNDATION_MODEL
    BedrockFoundationModelConfigurationForParsing:
      description: Settings for a foundation model used to parse documents for a data source.
