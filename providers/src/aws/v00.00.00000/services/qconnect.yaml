      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    UuidOrArn:
      type: string
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$|^arn:[a-z-]*?:wisdom:[a-z0-9-]*?:[0-9]{12}:[a-z-]*?/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}(?:/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}){0,2}"
    UuidOrArnOrEitherWithQualifier:
      type: string
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}(:[A-Z0-9_$]+){0,1}$|^arn:[a-z-]*?:wisdom:[a-z0-9-]*?:[0-9]{12}:[a-z-]*?/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}(?:/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}){0,2}(:[A-Z0-9_$]+){0,1}"
    Version:
      type: integer
      format: int64
      minimum: 1
    ActivateMessageTemplateResponse:
      type: object
      properties:
        messageTemplateArn:
          $ref: "#/components/schemas/ArnWithQualifier"
          description: The Amazon Resource Name (ARN) of the message template.
        messageTemplateId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier of the message template.
        versionNumber:
          $ref: "#/components/schemas/Version"
          description: The version number of the message template version that is activated.
      required:
        - messageTemplateArn
        - messageTemplateId
        - versionNumber
    ArnWithQualifier:
      type: string
      pattern: arn:[a-z-]*?:wisdom:[a-z0-9-]*?:[0-9]{12}:[a-z-]*?/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}(?:/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}){0,2}(:[A-Z0-9_$]+){0,1}
    Uuid:
      type: string
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    ClientToken:
      type: string
      minLength: 1
      maxLength: 4096
    Name:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9\\s_.,-]+.*"
    AIAgentType:
      type: string
      enum:
        - MANUAL_SEARCH
        - ANSWER_RECOMMENDATION
        - SELF_SERVICE
        - EMAIL_RESPONSE
        - EMAIL_OVERVIEW
        - EMAIL_GENERATIVE_ANSWER
        - ORCHESTRATION
        - NOTE_TAKING
        - CASE_SUMMARIZATION
    AIAgentConfiguration:
      description: A typed union that specifies the configuration based on the type of AI Agent.
      type: object
      properties:
        manualSearchAIAgentConfiguration:
          $ref: "#/components/schemas/ManualSearchAIAgentConfiguration"
          description: The configuration for AI Agents of type MANUAL_SEARCH.
        answerRecommendationAIAgentConfiguration:
          $ref: "#/components/schemas/AnswerRecommendationAIAgentConfiguration"
          description: The configuration for AI Agents of type ANSWER_RECOMMENDATION.
        selfServiceAIAgentConfiguration:
          $ref: "#/components/schemas/SelfServiceAIAgentConfiguration"
          description: The configuration for AI Agents of type SELF_SERVICE.
        emailResponseAIAgentConfiguration:
          $ref: "#/components/schemas/EmailResponseAIAgentConfiguration"
          description: Configuration for the EMAIL_RESPONSE AI agent that generates professional email responses using knowledge base content.
        emailOverviewAIAgentConfiguration:
          $ref: "#/components/schemas/EmailOverviewAIAgentConfiguration"
          description: Configuration for the EMAIL_OVERVIEW AI agent that generates structured overview of email conversations.
        emailGenerativeAnswerAIAgentConfiguration:
          $ref: "#/components/schemas/EmailGenerativeAnswerAIAgentConfiguration"
          description: Configuration for the EMAIL_GENERATIVE_ANSWER AI agent that provides comprehensive knowledge-based answers for customer queries.
        orchestrationAIAgentConfiguration:
          $ref: "#/components/schemas/OrchestrationAIAgentConfiguration"
          description: The configuration for AI Agents of type ORCHESTRATION.
        noteTakingAIAgentConfiguration:
          $ref: "#/components/schemas/NoteTakingAIAgentConfiguration"
          description: The configuration for AI Agents of type NOTE_TAKING.
        caseSummarizationAIAgentConfiguration:
          $ref: "#/components/schemas/CaseSummarizationAIAgentConfiguration"
          description: The configuration for AI Agents of type CASE_SUMMARIZATION.
    ManualSearchAIAgentConfiguration:
      description: The configuration for the MANUAL_SEARCH AI Agent type.
      type: object
      properties:
        answerGenerationAIPromptId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The AI Prompt identifier for the Answer Generation prompt used by the MANUAL_SEARCH AI Agent.
        answerGenerationAIGuardrailId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The AI Guardrail identifier for the Answer Generation guardrail used by the MANUAL_SEARCH AI Agent.
        associationConfigurations:
          $ref: "#/components/schemas/AssociationConfigurationList"
          description: The association configurations for overriding behavior on this AI Agent.
        locale:
          $ref: "#/components/schemas/NonEmptyString"
          description: The locale to which specifies the language and region settings that determine the response language for QueryAssistant. For more information on supported locales, see Language support for Amazon Q in Connect.
    UuidWithQualifier:
      type: string
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}(:[A-Z0-9_$]+){0,1}"
    AssociationConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/AssociationConfiguration"
    AssociationConfiguration:
      description: The configuration for an Amazon Q in Connect Assistant Association.
      type: object
      properties:
        associationId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier of the association for this Association Configuration.
        associationType:
          $ref: "#/components/schemas/AIAgentAssociationConfigurationType"
          description: The type of the association for this Association Configuration.
        associationConfigurationData:
          $ref: "#/components/schemas/AssociationConfigurationData"
          description: The data of the configuration for an Amazon Q in Connect Assistant Association.
    AIAgentAssociationConfigurationType:
      type: string
      enum:
        - KNOWLEDGE_BASE
    AssociationConfigurationData:
      description: A typed union of the data of the configuration for an Amazon Q in Connect Assistant Association.
      type: object
      properties:
        knowledgeBaseAssociationConfigurationData:
          $ref: "#/components/schemas/KnowledgeBaseAssociationConfigurationData"
          description: The data of the configuration for a KNOWLEDGE_BASE type Amazon Q in Connect Assistant Association.
    KnowledgeBaseAssociationConfigurationData:
      description: The data of the configuration for a KNOWLEDGE_BASE type Amazon Q in Connect Assistant Association.
      type: object
      properties:
        contentTagFilter:
          $ref: "#/components/schemas/TagFilter"
        maxResults:
          $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
        overrideKnowledgeBaseSearchType:
          $ref: "#/components/schemas/KnowledgeBaseSearchType"
          description: The search type to be used against the Knowledge Base for this request. The values can be SEMANTIC which uses vector embeddings or HYBRID which use vector embeddings and raw text
    TagFilter:
      description: An object that can be used to specify Tag conditions.
      type: object
      properties:
        tagCondition:
          $ref: "#/components/schemas/TagCondition"
          description: A leaf node condition which can be used to specify a tag condition.
        andConditions:
          $ref: "#/components/schemas/AndConditions"
          description: A list of conditions which would be applied together with an AND condition.
        orConditions:
          $ref: "#/components/schemas/OrConditions"
          description: A list of conditions which would be applied together with an OR condition.
    TagCondition:
      description: A leaf node condition which can be used to specify a tag condition.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: The tag key in the tag condition.
        value:
          $ref: "#/components/schemas/TagValue"
          description: The tag value in the tag condition.
      required:
        - key
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: (?!aws:)[a-zA-Z+-=._:/]+
    TagValue:
      type: string
      minLength: 1
      maxLength: 256
    AndConditions:
      type: array
      items:
        $ref: "#/components/schemas/TagCondition"
    OrConditions:
      type: array
      items:
        $ref: "#/components/schemas/OrCondition"
    OrCondition:
      description: A list of conditions which would be applied together with an OR condition.
      type: object
      properties:
        andConditions:
          $ref: "#/components/schemas/AndConditions"
          description: A list of conditions which would be applied together with an AND condition.
        tagCondition:
          $ref: "#/components/schemas/TagCondition"
          description: A leaf node condition which can be used to specify a tag condition.
    MaxResults:
      type: integer
      minimum: 1
      maximum: 100
    KnowledgeBaseSearchType:
      type: string
      enum:
        - HYBRID
        - SEMANTIC
    NonEmptyString:
      type: string
      minLength: 1
      maxLength: 4096
    AnswerRecommendationAIAgentConfiguration:
      description: The configuration for the ANSWER_RECOMMENDATION AI Agent type.
      type: object
      properties:
        intentLabelingGenerationAIPromptId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The AI Prompt identifier for the Intent Labeling prompt used by the ANSWER_RECOMMENDATION AI Agent.
        queryReformulationAIPromptId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The AI Prompt identifier for the Query Reformulation prompt used by the ANSWER_RECOMMENDATION AI Agent.
        answerGenerationAIPromptId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The AI Prompt identifier for the Answer Generation prompt used by the ANSWER_RECOMMENDATION AI Agent.
        answerGenerationAIGuardrailId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The AI Guardrail identifier for the Answer Generation Guardrail used by the ANSWER_RECOMMENDATION AI Agent.
        associationConfigurations:
          $ref: "#/components/schemas/AssociationConfigurationList"
          description: The association configurations for overriding behavior on this AI Agent.
        locale:
          $ref: "#/components/schemas/NonEmptyString"
          description: The locale to which specifies the language and region settings that determine the response language for QueryAssistant. For more information on supported locales, see Language support for Amazon Q in Connect.
        suggestedMessages:
          $ref: "#/components/schemas/SuggestedMessagesList"
          description: The suggested messages configuration for the Answer Recommendation AI Agent.
    SuggestedMessagesList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptySensitiveString"
    NonEmptySensitiveString:
      type: string
      minLength: 1
      maxLength: 4096
    SelfServiceAIAgentConfiguration:
      description: The configuration for AI Agents of type SELF_SERVICE.
      type: object
      properties:
        selfServicePreProcessingAIPromptId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The AI Prompt identifier for the Self Service Pre-Processing prompt used by the SELF_SERVICE AI Agent
        selfServiceAnswerGenerationAIPromptId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The AI Prompt identifier for the Self Service Answer Generation prompt used by the SELF_SERVICE AI Agent
        selfServiceAIGuardrailId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The AI Guardrail identifier used by the SELF_SERVICE AI Agent.
        associationConfigurations:
          $ref: "#/components/schemas/AssociationConfigurationList"
          description: The association configurations for overriding behavior on this AI Agent.
    EmailResponseAIAgentConfiguration:
      description: Configuration settings for the EMAIL_RESPONSE AI agent including prompts, locale, and knowledge base associations.
      type: object
      properties:
        emailResponseAIPromptId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The ID of the System AI prompt used for generating professional email responses based on knowledge base content.
        emailQueryReformulationAIPromptId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The ID of the System AI prompt used for reformulating email queries to optimize knowledge base search for response generation.
        locale:
          $ref: "#/components/schemas/NonEmptyString"
          description: The locale setting for language-specific email response generation (for example, en_US, es_ES).
        associationConfigurations:
          $ref: "#/components/schemas/AssociationConfigurationList"
          description: Configuration settings for knowledge base associations used by the email response agent.
    EmailOverviewAIAgentConfiguration:
      description: Configuration settings for the EMAIL_OVERVIEW AI agent including prompt ID and locale settings.
      type: object
      properties:
        emailOverviewAIPromptId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The ID of the System AI prompt used for generating structured email conversation summaries.
        locale:
          $ref: "#/components/schemas/NonEmptyString"
          description: The locale setting for language-specific email overview processing (for example, en_US, es_ES).
    EmailGenerativeAnswerAIAgentConfiguration:
      description: Configuration settings for the EMAIL_GENERATIVE_ANSWER AI agent including prompts, locale, and knowledge base associations.
      type: object
      properties:
        emailGenerativeAnswerAIPromptId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The ID of the System AI prompt used for generating comprehensive knowledge-based answers from email queries.
        emailQueryReformulationAIPromptId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The ID of the System AI prompt used for reformulating email queries to optimize knowledge base search results.
        locale:
          $ref: "#/components/schemas/NonEmptyString"
          description: The locale setting for language-specific email processing and response generation (for example, en_US, es_ES).
        associationConfigurations:
          $ref: "#/components/schemas/AssociationConfigurationList"
          description: Configuration settings for knowledge base associations used by the email generative answer agent.
    OrchestrationAIAgentConfiguration:
      description: The configuration for AI Agents of type ORCHESTRATION.
      type: object
      properties:
        orchestrationAIPromptId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The AI Prompt identifier used by the Orchestration AI Agent.
        orchestrationAIGuardrailId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The AI Guardrail identifier used by the Orchestration AI Agent.
        toolConfigurations:
          $ref: "#/components/schemas/ToolConfigurationList"
          description: The tool configurations used by the Orchestration AI Agent.
        connectInstanceArn:
          $ref: "#/components/schemas/GenericArn"
          description: The Amazon Resource Name (ARN) of the Amazon Connect instance used by the Orchestration AI Agent.
        locale:
          $ref: "#/components/schemas/NonEmptyString"
          description: The locale setting for the Orchestration AI Agent.
      required:
        - orchestrationAIPromptId
    ToolConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/ToolConfiguration"
    ToolConfiguration:
      description: Configuration settings for a tool used by AI Agents.
      type: object
      properties:
        toolName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the tool.
        toolType:
          $ref: "#/components/schemas/ToolType"
          description: The type of the tool.
        title_:
          $ref: "#/components/schemas/NonEmptySensitiveString"
          description: The title of the tool configuration.
        toolId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the tool, for example toolName from Model Context Provider server.
        description:
          $ref: "#/components/schemas/NonEmptySensitiveString"
          description: The description of the tool configuration.
        instruction:
          $ref: "#/components/schemas/ToolInstruction"
          description: Instructions for using the tool.
        overrideInputValues:
          $ref: "#/components/schemas/ToolOverrideInputValueList"
          description: Override input values for the tool configuration.
        outputFilters:
          $ref: "#/components/schemas/ToolOutputFilterList"
          description: Output filters applies to the tool result.
        inputSchema:
          $ref: "#/components/schemas/JSONDocument"
          description: The input schema for the tool configuration.
        outputSchema:
          $ref: "#/components/schemas/JSONDocument"
          description: The output schema for the tool configuration.
        annotations:
          $ref: "#/components/schemas/Annotation"
          description: Annotations for the tool configuration.
        userInteractionConfiguration:
          $ref: "#/components/schemas/UserInteractionConfiguration"
          description: Configuration for user interaction with the tool.
      required:
        - toolName
        - toolType
    ToolType:
      type: string
      enum:
        - MODEL_CONTEXT_PROTOCOL
        - RETURN_TO_CONTROL
        - CONSTANT
    ToolInstruction:
      description: Instructions for using a tool.
      type: object
      properties:
        instruction:
          $ref: "#/components/schemas/String"
          description: The instruction text for the tool.
        examples:
          $ref: "#/components/schemas/ToolExampleList"
          description: Examples for using the tool.
    String:
      type: string
    ToolExampleList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    ToolOverrideInputValueList:
      type: array
      items:
        $ref: "#/components/schemas/ToolOverrideInputValue"
    ToolOverrideInputValue:
      description: An input value override for tools.
      type: object
      properties:
        jsonPath:
          $ref: "#/components/schemas/NonEmptyString"
          description: The JSON path for the input value override.
        value:
          $ref: "#/components/schemas/ToolOverrideInputValueConfiguration"
          description: The override input value.
      required:
        - jsonPath
        - value
    ToolOverrideInputValueConfiguration:
      description: Configuration for overriding tool input values.
      type: object
      properties:
        constant:
          $ref: "#/components/schemas/ToolOverrideConstantInputValue"
          description: Constant input value configuration for tool override.
    ToolOverrideConstantInputValue:
      description: A constant input value for tool override.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/ToolOverrideInputValueType"
          description: Override tool input value with constant values
        value:
          $ref: "#/components/schemas/NonEmptySensitiveString"
          description: The constant input override value.
      required:
        - type_
        - value
    ToolOverrideInputValueType:
      type: string
      enum:
        - STRING
        - NUMBER
        - JSON_STRING
    ToolOutputFilterList:
      type: array
      items:
        $ref: "#/components/schemas/ToolOutputFilter"
    ToolOutputFilter:
      description: Filter configuration for tool output.
      type: object
      properties:
        jsonPath:
          $ref: "#/components/schemas/NonEmptyString"
          description: The JSON path for filtering tool output.
        outputConfiguration:
          $ref: "#/components/schemas/ToolOutputConfiguration"
          description: The output configuration for the filter.
      required:
        - jsonPath
    ToolOutputConfiguration:
      description: Configuration for tool output handling.
      type: object
      properties:
        outputVariableNameOverride:
          $ref: "#/components/schemas/NonEmptyString"
          description: Override the tool output results to different variable name.
        sessionDataNamespace:
          $ref: "#/components/schemas/NonEmptyString"
          description: The session data namespace for tool output.
    JSONDocument:
      type: object
    Annotation:
      description: An annotation that provides additional context or metadata.
      type: object
      properties:
        title_:
          $ref: "#/components/schemas/String"
          description: The title of the annotation.
        destructiveHint:
          $ref: "#/components/schemas/Boolean"
          description: A hint indicating that the annotation contains potentially destructive content.
    Boolean:
      type: boolean
    UserInteractionConfiguration:
      description: Configuration for user interaction settings.
      type: object
      properties:
        isUserConfirmationRequired:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether user confirmation is required for the interaction.
    GenericArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:[a-z-]+?:[a-z-]+?:[a-z0-9-]*?:([0-9]{12})?:[a-zA-Z0-9-:/]+
    NoteTakingAIAgentConfiguration:
      description: The configuration for AI Agents of type NOTE_TAKING.
      type: object
      properties:
        noteTakingAIPromptId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The AI Prompt identifier used by the Note Taking AI Agent.
        noteTakingAIGuardrailId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The AI Guardrail identifier used by the Note Taking AI Agent.
        locale:
          $ref: "#/components/schemas/NonEmptyString"
          description: The locale setting for language-specific case summarization generation (for example, en_US, es_ES).
    CaseSummarizationAIAgentConfiguration:
      description: The configuration for AI Agents of type CASE_SUMMARIZATION.
      type: object
      properties:
        caseSummarizationAIPromptId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The AI Prompt identifier used by the Case Summarization AI Agent.
        caseSummarizationAIGuardrailId:
          $ref: "#/components/schemas/UuidWithQualifier"
          description: The AI Guardrail identifier used by the Case Summarization AI Agent.
        locale:
          $ref: "#/components/schemas/NonEmptyString"
          description: The locale setting for the Case Summarization AI Agent.
    VisibilityStatus:
      type: string
      enum:
        - SAVED
        - PUBLISHED
    Tags:
      type: object
      properties: {}
    Description:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9\\s_.,-]+.*"
    CreateAIAgentResponse:
      type: object
      properties:
        aiAgent:
          $ref: "#/components/schemas/AIAgentData"
          description: The data of the created AI Agent.
    AIAgentData:
      description: The data for the AI Agent.
      type: object
      properties:
        assistantId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier of the Amazon Q in Connect assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
        assistantArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the Amazon Q in Connect assistant.
        aiAgentId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier of the AI Agent.
        aiAgentArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the AI agent.
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the AI Agent.
        type_:
          $ref: "#/components/schemas/AIAgentType"
          description: The type of the AI Agent.
        configuration:
          $ref: "#/components/schemas/AIAgentConfiguration"
          description: Configuration for the AI Agent.
        modifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the AI Agent was last modified.
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the AI Agent.
        visibilityStatus:
          $ref: "#/components/schemas/VisibilityStatus"
          description: The visibility status of the AI Agent.
        tags:
          type: object
          properties: {}
          description: The tags used to organize, track, or control access for this resource.
        origin:
          $ref: "#/components/schemas/Origin"
          description: Specifies the origin of the AI Agent. SYSTEM for a default AI Agent created by Q in Connect or CUSTOMER for an AI Agent created by calling AI Agent creation APIs.
        status:
          $ref: "#/components/schemas/Status"
          description: The status of the AI Agent.
      required:
        - assistantId
        - assistantArn
        - aiAgentId
        - aiAgentArn
        - name
        - type_
        - configuration
        - visibilityStatus
    Arn:
      type: string
      pattern: arn:[a-z-]*?:wisdom:[a-z0-9-]*?:[0-9]{12}:[a-z-]*?/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}(?:/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}){0,2}
    Timestamp:
      type: string
      format: date-time
    Origin:
      type: string
      enum:
        - SYSTEM
        - CUSTOMER
    Status:
      type: string
      enum:
        - CREATE_IN_PROGRESS
        - CREATE_FAILED
        - ACTIVE
        - DELETE_IN_PROGRESS
        - DELETE_FAILED
        - DELETED
    CreateAIAgentVersionResponse:
      type: object
      properties:
        aiAgent:
          $ref: "#/components/schemas/AIAgentData"
          description: The data of the AI Agent version.
        versionNumber:
          $ref: "#/components/schemas/Version"
          description: The version number of the AI Agent version.
    AIGuardrailBlockedMessaging:
      description: Messaging for when violations are detected in text
      type: string
      minLength: 1
      maxLength: 500
    AIGuardrailDescription:
      description: Description of the guardrail or its version
      type: string
      minLength: 1
      maxLength: 200
    AIGuardrailTopicPolicyConfig:
      description: Contains details about topics that the AI Guardrail should identify and deny.
      type: object
      properties:
        topicsConfig:
          $ref: "#/components/schemas/GuardrailTopicsConfig"
          description: A list of policies related to topics that the AI Guardrail should deny.
      required:
        - topicsConfig
    GuardrailTopicsConfig:
      description: List of topic configs in topic policy.
      type: array
      items:
