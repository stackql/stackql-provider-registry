openapi: 3.0.0
info:
  version: "2020-10-19"
  title: Amazon Q Connect
  description: Amazon Q Connect
  x-serviceName: wisdom
  x-serviceAlias: qconnect
  x-protocol: rest-json
  x-apiVersion: "2020-10-19"
  x-endpointPrefix: wisdom
servers:
  - url: https://wisdom.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for qconnect
paths:
  /knowledgeBases/{knowledge_base_id}/messageTemplates/{message_template_id}/activate:
    post:
      operationId: ActivateMessageTemplate
      description: Activates a specific version of the Amazon Q in Connect message template. After the version is activated, the previous active version will be deactivated automatically. You can use the $ACTIVE_VERSION qualifier later to reference the version that is in active status.
      parameters:
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: message_template_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArnOrEitherWithQualifier"
          description: The identifier of the message template. Can be either the ID or the ARN. It cannot contain any qualifier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                versionNumber:
                  $ref: "#/components/schemas/Version"
              required:
                - versionNumber
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateMessageTemplateResponse"
  /assistants/{assistant_id}/aiagents:
    post:
      operationId: CreateAIAgent
      description: Creates an Amazon Q in Connect AI Agent.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Amazon Q in Connect assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                name:
                  $ref: "#/components/schemas/Name"
                type:
                  $ref: "#/components/schemas/AIAgentType"
                configuration:
                  $ref: "#/components/schemas/AIAgentConfiguration"
                visibilityStatus:
                  $ref: "#/components/schemas/VisibilityStatus"
                tags:
                  $ref: "#/components/schemas/Tags"
                description:
                  $ref: "#/components/schemas/Description"
              required:
                - name
                - type
                - configuration
                - visibilityStatus
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAIAgentResponse"
    get:
      operationId: ListAIAgents
      description: Lists AI Agents.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Amazon Q in Connect assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
        - name: origin
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Origin"
          description: The origin of the AI Agents to be listed. SYSTEM for a default AI Agent created by Q in Connect or CUSTOMER for an AI Agent created by calling AI Agent creation APIs.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAIAgentsResponse"
  /assistants/{assistant_id}/aiagents/{ai_agent_id}/versions:
    post:
      operationId: CreateAIAgentVersion
      description: Creates and Amazon Q in Connect AI Agent version.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Amazon Q in Connect assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: ai_agent_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArnOrEitherWithQualifier"
          description: The identifier of the Amazon Q in Connect AI Agent.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                modifiedTime:
                  $ref: "#/components/schemas/Timestamp"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAIAgentVersionResponse"
    get:
      operationId: ListAIAgentVersions
      description: List AI Agent versions.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Amazon Q in Connect assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: ai_agent_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArnOrEitherWithQualifier"
          description: The identifier of the Amazon Q in Connect AI Agent for which versions are to be listed.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
        - name: origin
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Origin"
          description: The origin of the AI Agent versions to be listed. SYSTEM for a default AI Agent created by Q in Connect or CUSTOMER for an AI Agent created by calling AI Agent creation APIs.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAIAgentVersionsResponse"
  /assistants/{assistant_id}/aiguardrails:
    post:
      operationId: CreateAIGuardrail
      description: Creates an Amazon Q in Connect AI Guardrail.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Amazon Q in Connect assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                name:
                  $ref: "#/components/schemas/Name"
                blockedInputMessaging:
                  $ref: "#/components/schemas/AIGuardrailBlockedMessaging"
                blockedOutputsMessaging:
                  $ref: "#/components/schemas/AIGuardrailBlockedMessaging"
                visibilityStatus:
                  $ref: "#/components/schemas/VisibilityStatus"
                description:
                  $ref: "#/components/schemas/AIGuardrailDescription"
                topicPolicyConfig:
                  $ref: "#/components/schemas/AIGuardrailTopicPolicyConfig"
                contentPolicyConfig:
                  $ref: "#/components/schemas/AIGuardrailContentPolicyConfig"
                wordPolicyConfig:
                  $ref: "#/components/schemas/AIGuardrailWordPolicyConfig"
                sensitiveInformationPolicyConfig:
                  $ref: "#/components/schemas/AIGuardrailSensitiveInformationPolicyConfig"
                contextualGroundingPolicyConfig:
                  $ref: "#/components/schemas/AIGuardrailContextualGroundingPolicyConfig"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - name
                - blockedInputMessaging
                - blockedOutputsMessaging
                - visibilityStatus
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAIGuardrailResponse"
    get:
      operationId: ListAIGuardrails
      description: Lists the AI Guardrails available on the Amazon Q in Connect assistant.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Amazon Q in Connect assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAIGuardrailsResponse"
  /assistants/{assistant_id}/aiguardrails/{ai_guardrail_id}/versions:
    post:
      operationId: CreateAIGuardrailVersion
      description: Creates an Amazon Q in Connect AI Guardrail version.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Amazon Q in Connect assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: ai_guardrail_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArnOrEitherWithQualifier"
          description: The identifier of the Amazon Q in Connect AI Guardrail.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                modifiedTime:
                  $ref: "#/components/schemas/Timestamp"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAIGuardrailVersionResponse"
    get:
      operationId: ListAIGuardrailVersions
      description: Lists AI Guardrail versions.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Amazon Q in Connect assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: ai_guardrail_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArnOrEitherWithQualifier"
          description: The identifier of the Amazon Q in Connect AI Guardrail for which versions are to be listed.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAIGuardrailVersionsResponse"
  /assistants/{assistant_id}/aiprompts:
    post:
      operationId: CreateAIPrompt
      description: Creates an Amazon Q in Connect AI Prompt.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Amazon Q in Connect assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                name:
                  $ref: "#/components/schemas/Name"
                type:
                  $ref: "#/components/schemas/AIPromptType"
                templateConfiguration:
                  $ref: "#/components/schemas/AIPromptTemplateConfiguration"
                visibilityStatus:
                  $ref: "#/components/schemas/VisibilityStatus"
                templateType:
                  $ref: "#/components/schemas/AIPromptTemplateType"
                modelId:
                  $ref: "#/components/schemas/AIPromptModelIdentifier"
                apiFormat:
                  $ref: "#/components/schemas/AIPromptAPIFormat"
                tags:
                  $ref: "#/components/schemas/Tags"
                description:
                  $ref: "#/components/schemas/Description"
                inferenceConfiguration:
                  $ref: "#/components/schemas/AIPromptInferenceConfiguration"
              required:
                - name
                - type
                - templateConfiguration
                - visibilityStatus
                - templateType
                - modelId
                - apiFormat
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAIPromptResponse"
    get:
      operationId: ListAIPrompts
      description: Lists the AI Prompts available on the Amazon Q in Connect assistant.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Amazon Q in Connect assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
        - name: origin
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Origin"
          description: The origin of the AI Prompts to be listed. SYSTEM for a default AI Agent created by Q in Connect or CUSTOMER for an AI Agent created by calling AI Agent creation APIs.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAIPromptsResponse"
  /assistants/{assistant_id}/aiprompts/{ai_prompt_id}/versions:
    post:
      operationId: CreateAIPromptVersion
      description: Creates an Amazon Q in Connect AI Prompt version.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Amazon Q in Connect assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: ai_prompt_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArnOrEitherWithQualifier"
          description: The identifier of the Amazon Q in Connect AI prompt.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                modifiedTime:
                  $ref: "#/components/schemas/Timestamp"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAIPromptVersionResponse"
    get:
      operationId: ListAIPromptVersions
      description: Lists AI Prompt versions.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Amazon Q in Connect assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
        - name: ai_prompt_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArnOrEitherWithQualifier"
          description: The identifier of the Amazon Q in Connect AI prompt for which versions are to be listed.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
        - name: origin
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Origin"
          description: The origin of the AI Prompt versions to be listed. SYSTEM for a default AI Agent created by Q in Connect or CUSTOMER for an AI Agent created by calling AI Agent creation APIs.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAIPromptVersionsResponse"
  /assistants:
    post:
      operationId: CreateAssistant
      description: Creates an Amazon Q in Connect assistant.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                name:
                  $ref: "#/components/schemas/Name"
                type:
                  $ref: "#/components/schemas/AssistantType"
                description:
                  $ref: "#/components/schemas/Description"
                tags:
                  $ref: "#/components/schemas/Tags"
                serverSideEncryptionConfiguration:
                  $ref: "#/components/schemas/ServerSideEncryptionConfiguration"
              required:
                - name
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssistantResponse"
    get:
      operationId: ListAssistants
      description: Lists information about assistants.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssistantsResponse"
  /assistants/{assistant_id}/associations:
    post:
      operationId: CreateAssistantAssociation
      description: Creates an association between an Amazon Q in Connect assistant and another resource. Currently, the only supported association is with a knowledge base. An assistant can have only a single association.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Amazon Q in Connect assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                associationType:
                  $ref: "#/components/schemas/AssociationType"
                association:
                  $ref: "#/components/schemas/AssistantAssociationInputData"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - associationType
                - association
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssistantAssociationResponse"
    get:
      operationId: ListAssistantAssociations
      description: Lists information about assistant associations.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
        - name: assistant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the Amazon Q in Connect assistant. Can be either the ID or the ARN. URLs cannot contain the ARN.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssistantAssociationsResponse"
  /knowledgeBases/{knowledge_base_id}/contents:
    post:
      operationId: CreateContent
      description: Creates Amazon Q in Connect content. Before to calling this API, use StartContentUpload to upload an asset.
      parameters:
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base. This should not be a QUICK_RESPONSES type knowledge base. Can be either the ID or the ARN. URLs cannot contain the ARN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Name"
                title:
                  $ref: "#/components/schemas/ContentTitle"
                overrideLinkOutUri:
                  $ref: "#/components/schemas/Uri"
                metadata:
                  $ref: "#/components/schemas/ContentMetadata"
                uploadId:
                  $ref: "#/components/schemas/UploadId"
                clientToken:
                  $ref: "#/components/schemas/NonEmptyString"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - name
                - uploadId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateContentResponse"
    get:
      operationId: ListContents
      description: Lists the content.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base. This should not be a QUICK_RESPONSES type knowledge base. Can be either the ID or the ARN. URLs cannot contain the ARN.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListContentsResponse"
  /knowledgeBases/{knowledge_base_id}/contents/{content_id}/associations:
    post:
      operationId: CreateContentAssociation
      description: "Creates an association between a content resource in a knowledge base and step-by-step guides. Step-by-step guides offer instructions to agents for resolving common customer issues. You create a content association to integrate Amazon Q in Connect and step-by-step guides. After you integrate Amazon Q and step-by-step guides, when Amazon Q provides a recommendation to an agent based on the intent that it's detected, it also provides them with the option to start the step-by-step guide that you have associated with the content. Note the following limitations: You can create only one content association for each content resource in a knowledge base. You can associate a step-by-step guide with multiple content resources. For more information, see Integrate Amazon Q in Connect with step-by-step guides in the Amazon Connect Administrator Guide."
      parameters:
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base.
        - name: content_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the content.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                associationType:
                  $ref: "#/components/schemas/ContentAssociationType"
                association:
                  $ref: "#/components/schemas/ContentAssociationContents"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - associationType
                - association
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateContentAssociationResponse"
    get:
      operationId: ListContentAssociations
      description: Lists the content associations. For more information about content associations--what they are and when they are used--see Integrate Amazon Q in Connect with step-by-step guides in the Amazon Connect Administrator Guide.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the knowledge base.
        - name: content_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidOrArn"
          description: The identifier of the content.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListContentAssociationsResponse"
  /knowledgeBases:
    post:
      operationId: CreateKnowledgeBase
