      type: object
      properties:
        title_:
          $ref: "#/components/schemas/NonEmptyUnlimitedString"
          description: The title to use in a push notification that's based on the message template. This title appears above the notification message on a recipient's device.
        body:
          $ref: "#/components/schemas/MessageTemplateBodyContentProvider"
          description: The message body to use in a push notification that is based on the message template.
        action:
          $ref: "#/components/schemas/PushMessageAction"
          description: "The action to occur if a recipient taps a push notification that is based on the message template. Valid values are: OPEN_APP - Your app opens or it becomes the foreground app if it was sent to the background. This is the default action. DEEP_LINK - Your app opens and displays a designated user interface in the app. This action uses the deep-linking features of the Android platform. URL - The default mobile browser on the recipient's device opens and loads the web page at a URL that you specify."
        sound:
          $ref: "#/components/schemas/NonEmptyUnlimitedString"
          description: The sound to play when a recipient receives a push notification that's based on the message template. You can use the default stream or specify the file name of a sound resource that's bundled in your app. On an Android platform, the sound file must reside in /res/raw/.
        url:
          $ref: "#/components/schemas/NonEmptyUnlimitedString"
          description: The URL to open in a recipient's default mobile browser, if a recipient taps a push notification that's based on the message template and the value of the action property is URL.
        imageUrl:
          $ref: "#/components/schemas/NonEmptyUnlimitedString"
          description: The URL of an image to display in a push notification that's based on the message template.
        imageIconUrl:
          $ref: "#/components/schemas/NonEmptyUnlimitedString"
