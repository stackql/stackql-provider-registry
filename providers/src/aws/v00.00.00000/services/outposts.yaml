                UplinkGbps:
                  $ref: "#/components/schemas/UplinkGbps"
                UplinkCount:
                  $ref: "#/components/schemas/UplinkCount"
                FiberOpticCableType:
                  $ref: "#/components/schemas/FiberOpticCableType"
                OpticalStandard:
                  $ref: "#/components/schemas/OpticalStandard"
