openapi: 3.0.0
info:
  version: "2019-12-03"
  title: AWS Outposts
  description: AWS Outposts
  x-serviceName: outposts
  x-serviceAlias: outposts
  x-protocol: rest-json
  x-apiVersion: "2019-12-03"
  x-endpointPrefix: outposts
  x-jsonVersion: "1.1"
servers:
  - url: https://outposts.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for outposts
paths:
  /outposts/{outpost_id}/capacity/{capacity_task_id}:
    post:
      operationId: CancelCapacityTask
      description: Cancels the capacity task.
      parameters:
        - name: capacity_task_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CapacityTaskId"
          description: ID of the capacity task that you want to cancel.
        - name: outpost_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OutpostIdentifier"
          description: ID or ARN of the Outpost associated with the capacity task that you want to cancel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelCapacityTaskOutput"
    get:
      operationId: GetCapacityTask
      description: Gets details of the specified capacity task.
      parameters:
        - name: capacity_task_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CapacityTaskId"
          description: ID of the capacity task.
        - name: outpost_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OutpostIdentifier"
          description: ID or ARN of the Outpost associated with the specified capacity task.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCapacityTaskOutput"
  /orders/{order_id}/cancel:
    post:
      operationId: CancelOrder
      description: Cancels the specified order for an Outpost.
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OrderId"
          description: The ID of the order.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelOrderOutput"
  /orders:
    post:
      operationId: CreateOrder
      description: Creates an order for an Outpost.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                OutpostIdentifier:
                  $ref: "#/components/schemas/OutpostIdentifier"
                LineItems:
                  $ref: "#/components/schemas/LineItemRequestListDefinition"
                PaymentOption:
                  $ref: "#/components/schemas/PaymentOption"
                PaymentTerm:
                  $ref: "#/components/schemas/PaymentTerm"
              required:
                - OutpostIdentifier
                - PaymentOption
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrderOutput"
  /outposts:
    post:
      operationId: CreateOutpost
      description: Creates an Outpost. You can specify either an Availability one or an AZ ID.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/OutpostName"
                Description:
                  $ref: "#/components/schemas/OutpostDescription"
                SiteId:
                  $ref: "#/components/schemas/SiteId"
                AvailabilityZone:
                  $ref: "#/components/schemas/AvailabilityZone"
                AvailabilityZoneId:
                  $ref: "#/components/schemas/AvailabilityZoneId"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                SupportedHardwareType:
                  $ref: "#/components/schemas/SupportedHardwareType"
              required:
                - SiteId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOutpostOutput"
    get:
      operationId: ListOutposts
      description: Lists the Outposts for your Amazon Web Services account. Use filters to return specific results. If you specify multiple filters, the results include only the resources that match all of the specified filters. For a filter where you can specify multiple values, the results include items that match any of the values that you specify for the filter.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults1000"
        - name: LifeCycleStatusFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LifeCycleStatusList"
          description: Filters the results by the lifecycle status.
        - name: AvailabilityZoneFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AvailabilityZoneList"
          description: Filters the results by Availability Zone (for example, us-east-1a).
        - name: AvailabilityZoneIdFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AvailabilityZoneIdList"
          description: Filters the results by AZ ID (for example, use1-az1).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOutpostsOutput"
  /renewals:
    post:
      operationId: CreateRenewal
      description: Creates a renewal contract for the specified Outpost.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PaymentOption:
                  $ref: "#/components/schemas/PaymentOption"
                PaymentTerm:
                  $ref: "#/components/schemas/PaymentTerm"
                OutpostIdentifier:
                  $ref: "#/components/schemas/OutpostIdentifier"
                ClientToken:
                  $ref: "#/components/schemas/AutoFillIdempotencyToken"
              required:
                - PaymentOption
                - PaymentTerm
                - OutpostIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRenewalOutput"
  /sites:
    post:
      operationId: CreateSite
      description: Creates a site for an Outpost.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/SiteName"
                Description:
                  $ref: "#/components/schemas/SiteDescription"
                Notes:
                  $ref: "#/components/schemas/SiteNotes"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                OperatingAddress:
                  $ref: "#/components/schemas/Address"
                ShippingAddress:
                  $ref: "#/components/schemas/Address"
                RackPhysicalProperties:
                  $ref: "#/components/schemas/RackPhysicalProperties"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSiteOutput"
    get:
      operationId: ListSites
      description: Lists the Outpost sites for your Amazon Web Services account. Use filters to return specific results. Use filters to return specific results. If you specify multiple filters, the results include only the resources that match all of the specified filters. For a filter where you can specify multiple values, the results include items that match any of the values that you specify for the filter.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults1000"
        - name: OperatingAddressCountryCodeFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CountryCodeList"
          description: Filters the results by country code.
        - name: OperatingAddressStateOrRegionFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/StateOrRegionList"
          description: Filters the results by state or region.
        - name: OperatingAddressCityFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CityList"
          description: Filters the results by city.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSitesOutput"
  /outposts/{outpost_id}:
    delete:
      operationId: DeleteOutpost
      description: Deletes the specified Outpost.
      parameters:
        - name: outpost_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OutpostId"
          description: The ID or ARN of the Outpost.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteOutpostOutput"
    get:
      operationId: GetOutpost
      description: Gets information about the specified Outpost.
      parameters:
        - name: outpost_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OutpostId"
          description: The ID or ARN of the Outpost.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOutpostOutput"
    patch:
      operationId: UpdateOutpost
      description: Updates an Outpost.
      parameters:
        - name: outpost_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OutpostId"
          description: The ID or ARN of the Outpost.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/OutpostName"
                Description:
                  $ref: "#/components/schemas/OutpostDescription"
                SupportedHardwareType:
                  $ref: "#/components/schemas/SupportedHardwareType"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateOutpostOutput"
  /sites/{site_id}:
    delete:
      operationId: DeleteSite
      description: Deletes the specified site.
      parameters:
        - name: site_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SiteId"
          description: The ID or the Amazon Resource Name (ARN) of the site.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSiteOutput"
    get:
      operationId: GetSite
      description: Gets information about the specified Outpost site.
      parameters:
        - name: site_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SiteId"
          description: The ID or the Amazon Resource Name (ARN) of the site.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSiteOutput"
    patch:
      operationId: UpdateSite
      description: Updates the specified site.
      parameters:
        - name: site_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SiteId"
          description: The ID or the Amazon Resource Name (ARN) of the site.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/SiteName"
                Description:
                  $ref: "#/components/schemas/SiteDescription"
                Notes:
                  $ref: "#/components/schemas/SiteNotes"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSiteOutput"
  /catalog/item/{catalog_item_id}:
    get:
      operationId: GetCatalogItem
      description: Gets information about the specified catalog item.
      parameters:
        - name: catalog_item_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SkuCode"
          description: The ID of the catalog item.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCatalogItemOutput"
  /connections/{connection_id}:
    get:
      operationId: GetConnection
      description: Amazon Web Services uses this action to install Outpost servers. Gets information about the specified connection. Use CloudTrail to monitor this action or Amazon Web Services managed policy for Amazon Web Services Outposts to secure it. For more information, see Amazon Web Services managed policies for Amazon Web Services Outposts and Logging Amazon Web Services Outposts API calls with Amazon Web Services CloudTrail in the Amazon Web Services Outposts User Guide.
      parameters:
        - name: connection_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConnectionId"
          description: The ID of the connection.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectionResponse"
  /orders/{order_id}:
    get:
      operationId: GetOrder
      description: Gets information about the specified order.
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OrderId"
          description: The ID of the order.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOrderOutput"
  /outpost/{outpost_identifier}/billing-information:
    get:
      operationId: GetOutpostBillingInformation
      description: Gets current and historical billing information about the specified Outpost.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults1000"
        - name: outpost_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OutpostIdentifier"
          description: The ID or ARN of the Outpost.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOutpostBillingInformationOutput"
  /outposts/{outpost_id}/instanceTypes:
    get:
      operationId: GetOutpostInstanceTypes
      description: Gets the instance types for the specified Outpost.
      parameters:
        - name: outpost_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OutpostId"
          description: The ID or ARN of the Outpost.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults1000"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOutpostInstanceTypesOutput"
  /outposts/{outpost_id}/supportedInstanceTypes:
    get:
      operationId: GetOutpostSupportedInstanceTypes
      description: Gets the instance types that an Outpost can support in InstanceTypeCapacity. This will generally include instance types that are not currently configured and therefore cannot be launched with the current Outpost capacity configuration.
      parameters:
        - name: outpost_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OutpostIdentifier"
          description: The ID or ARN of the Outpost.
        - name: OrderId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OrderId"
          description: The ID for the Amazon Web Services Outposts order.
        - name: AssetId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AssetIdInput"
          description: The ID of the Outpost asset. An Outpost asset can be a single server within an Outposts rack or an Outposts server configuration.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults1000"
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOutpostSupportedInstanceTypesOutput"
  /outpost/{outpost_identifier}/renewal-pricing:
    get:
      operationId: GetRenewalPricing
      description: Gets all available renewal pricing options for the specified Outpost.
      parameters:
        - name: outpost_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OutpostIdentifier"
          description: The ID or ARN of the Outpost.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRenewalPricingOutput"
  /sites/{site_id}/address:
    get:
      operationId: GetSiteAddress
      description: Gets the site address of the specified site.
      parameters:
        - name: site_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SiteId"
          description: The ID or the Amazon Resource Name (ARN) of the site.
        - name: AddressType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AddressType"
          description: The type of the address you request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSiteAddressOutput"
    put:
      operationId: UpdateSiteAddress
      description: Updates the address of the specified site. You can't update a site address if there is an order in progress. You must wait for the order to complete or cancel the order. You can update the operating address before you place an order at the site, or after all Outposts that belong to the site have been deactivated.
      parameters:
        - name: site_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SiteId"
          description: The ID or the Amazon Resource Name (ARN) of the site.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AddressType:
                  $ref: "#/components/schemas/AddressType"
                Address:
                  $ref: "#/components/schemas/Address"
              required:
                - AddressType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSiteAddressOutput"
  /outposts/{outpost_id}/assetInstances:
    get:
      operationId: ListAssetInstances
      description: A list of Amazon EC2 instances, belonging to all accounts, running on the specified Outpost. Does not include Amazon EBS or Amazon S3 instances.
      parameters:
        - name: outpost_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OutpostIdentifier"
          description: The ID of the Outpost.
        - name: AssetIdFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AssetIdList"
          description: Filters the results by asset ID.
        - name: InstanceTypeFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OutpostInstanceTypeList"
          description: Filters the results by instance ID.
        - name: AccountIdFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountIdList"
          description: Filters the results by account ID.
        - name: AwsServiceFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AWSServiceNameList"
          description: Filters the results by Amazon Web Services service.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults1000"
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssetInstancesOutput"
  /outposts/{outpost_id}/assets:
    get:
      operationId: ListAssets
      description: Lists the hardware assets for the specified Outpost. Use filters to return specific results. If you specify multiple filters, the results include only the resources that match all of the specified filters. For a filter where you can specify multiple values, the results include items that match any of the values that you specify for the filter.
      parameters:
        - name: outpost_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OutpostIdentifier"
          description: The ID or the Amazon Resource Name (ARN) of the Outpost.
        - name: HostIdFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/HostIdList"
          description: Filters the results by the host ID of a Dedicated Host.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults1000"
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
        - name: StatusFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/StatusList"
          description: Filters the results by state.
        - name: AssetTypeFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AssetTypeList"
          description: Filters the results by asset type. COMPUTE - Server asset used for customer compute STORAGE - Server asset used by storage services POWERSHELF - Powershelf assets SWITCH - Switch assets NETWORKING - Asset managed by Amazon Web Services for networking purposes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssetsOutput"
  /outposts/{outpost_id}/capacity/{capacity_task_id}/blockingInstances:
    get:
      operationId: ListBlockingInstancesForCapacityTask
      description: A list of Amazon EC2 instances running on the Outpost and belonging to the account that initiated the capacity task. Use this list to specify the instances you cannot stop to free up capacity to run the capacity task.
      parameters:
        - name: outpost_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OutpostIdentifier"
          description: The ID or ARN of the Outpost associated with the specified capacity task.
        - name: capacity_task_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CapacityTaskId"
          description: The ID of the capacity task.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults1000"
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBlockingInstancesForCapacityTaskOutput"
  /capacity/tasks:
    get:
      operationId: ListCapacityTasks
      description: Lists the capacity tasks for your Amazon Web Services account. Use filters to return specific results. If you specify multiple filters, the results include only the resources that match all of the specified filters. For a filter where you can specify multiple values, the results include items that match any of the values that you specify for the filter.
      parameters:
        - name: OutpostIdentifierFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OutpostIdentifier"
          description: Filters the results by an Outpost ID or an Outpost ARN.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults1000"
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
        - name: CapacityTaskStatusFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CapacityTaskStatusList"
          description: A list of statuses. For example, REQUESTED or WAITING_FOR_EVACUATION.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCapacityTasksOutput"
  /catalog/items:
    get:
      operationId: ListCatalogItems
      description: Lists the items in the catalog. Use filters to return specific results. If you specify multiple filters, the results include only the resources that match all of the specified filters. For a filter where you can specify multiple values, the results include items that match any of the values that you specify for the filter.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults1000"
        - name: ItemClassFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CatalogItemClassList"
          description: Filters the results by item class.
        - name: SupportedStorageFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SupportedStorageList"
          description: Filters the results by storage option.
        - name: EC2FamilyFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EC2FamilyList"
          description: Filters the results by EC2 family (for example, M5).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCatalogItemsOutput"
  /list-orders:
    get:
      operationId: ListOrders
      description: Lists the Outpost orders for your Amazon Web Services account.
      parameters:
        - name: OutpostIdentifierFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OutpostIdentifier"
          description: The ID or the Amazon Resource Name (ARN) of the Outpost.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults1000"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrdersOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags for the specified resource.
      parameters:
        - name: resource_arn
