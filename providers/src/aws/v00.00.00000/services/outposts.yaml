components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    CapacityTaskId:
      type: string
      minLength: 21
      maxLength: 21
      pattern: ^cap-[a-f0-9]{17}$
    OutpostIdentifier:
      type: string
      minLength: 1
      maxLength: 180
      pattern: ^(arn:aws([a-z-]+)?:outposts:[a-z\d-]+:\d{12}:outpost/)?op-[a-f0-9]{17}$
    CancelCapacityTaskOutput:
      type: object
    OrderId:
      type: string
      minLength: 1
      maxLength: 20
      pattern: oo-[a-f0-9]{17}$
    CancelOrderOutput:
      type: object
    LineItemRequestListDefinition:
      type: array
      items:
        $ref: "#/components/schemas/LineItemRequest"
    LineItemRequest:
      description: Information about a line item request.
      type: object
      properties:
        CatalogItemId:
          $ref: "#/components/schemas/SkuCode"
          description: The ID of the catalog item.
        Quantity:
          $ref: "#/components/schemas/LineItemQuantity"
          description: The quantity of a line item request.
    SkuCode:
      type: string
      minLength: 1
      maxLength: 10
      pattern: OR-[A-Z0-9]{7}
    LineItemQuantity:
      type: integer
      minimum: 1
    PaymentOption:
      type: string
      enum:
        - ALL_UPFRONT
        - NO_UPFRONT
        - PARTIAL_UPFRONT
    PaymentTerm:
      type: string
      enum:
        - THREE_YEARS
        - ONE_YEAR
        - FIVE_YEARS
    CreateOrderOutput:
      type: object
      properties:
        Order:
          $ref: "#/components/schemas/Order"
          description: Information about this order.
    Order:
      description: Information about an order.
      type: object
      properties:
        OutpostId:
          $ref: "#/components/schemas/OutpostIdOnly"
          description: The ID of the Outpost in the order.
        OrderId:
          $ref: "#/components/schemas/OrderId"
          description: The ID of the order.
        Status:
          $ref: "#/components/schemas/OrderStatus"
          description: "The status of the order. PREPARING - Order is received and being prepared. IN_PROGRESS - Order is either being built or shipped. To get more details, see the line item status. DELIVERED - Order was delivered to the Outpost site. COMPLETED - Order is complete. CANCELLED - Order is cancelled. ERROR - Customer should contact support. The following status are deprecated: RECEIVED, PENDING, PROCESSING, INSTALLING, and FULFILLED."
        LineItems:
          $ref: "#/components/schemas/LineItemListDefinition"
          description: The line items for the order
        PaymentOption:
          $ref: "#/components/schemas/PaymentOption"
          description: The payment option for the order.
        OrderSubmissionDate:
          $ref: "#/components/schemas/ISO8601Timestamp"
          description: The submission date for the order.
        OrderFulfilledDate:
          $ref: "#/components/schemas/ISO8601Timestamp"
          description: The fulfillment date of the order.
        PaymentTerm:
          $ref: "#/components/schemas/PaymentTerm"
          description: The payment term.
        OrderType:
          $ref: "#/components/schemas/OrderType"
          description: The type of order.
