          description: The date the capacity task ran successfully.
        LastModifiedDate:
          $ref: "#/components/schemas/ISO8601Timestamp"
          description: The date the capacity task was last modified.
        TaskActionOnBlockingInstances:
          $ref: "#/components/schemas/TaskActionOnBlockingInstances"
          description: "User-specified option in case an instance is blocking the capacity task from running. Shows one of the following options: WAIT_FOR_EVACUATION - Checks every 10 minutes over 48 hours to determine if instances have stopped and capacity is available to complete the task. FAIL_TASK - The capacity task fails."
