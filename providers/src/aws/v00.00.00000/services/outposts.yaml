    StartCapacityTaskOutput:
      type: object
      properties:
        CapacityTaskId:
          $ref: "#/components/schemas/CapacityTaskId"
          description: ID of the capacity task that you want to start.
        OutpostId:
          $ref: "#/components/schemas/OutpostId"
          description: ID of the Outpost associated with the capacity task.
        OrderId:
          $ref: "#/components/schemas/OrderId"
          description: ID of the Amazon Web Services Outposts order of the host associated with the capacity task.
        AssetId:
          $ref: "#/components/schemas/AssetId"
          description: The ID of the asset. An Outpost asset can be a single server within an Outposts rack or an Outposts server configuration.
        RequestedInstancePools:
          $ref: "#/components/schemas/RequestedInstancePools"
          description: List of the instance pools requested in the specified capacity task.
        InstancesToExclude:
          $ref: "#/components/schemas/InstancesToExclude"
          description: User-specified instances that must not be stopped in order to free up the capacity needed to run the capacity task.
        DryRun:
          $ref: "#/components/schemas/DryRun"
          description: Results of the dry run showing if the specified capacity task is above or below the available instance capacity.
        CapacityTaskStatus:
          $ref: "#/components/schemas/CapacityTaskStatus"
          description: Status of the specified capacity task.
        Failed:
          $ref: "#/components/schemas/CapacityTaskFailure"
          description: Reason that the specified capacity task failed.
        CreationDate:
          $ref: "#/components/schemas/ISO8601Timestamp"
          description: Date that the specified capacity task was created.
        CompletionDate:
          $ref: "#/components/schemas/ISO8601Timestamp"
          description: Date that the specified capacity task ran successfully.
        LastModifiedDate:
          $ref: "#/components/schemas/ISO8601Timestamp"
          description: Date that the specified capacity task was last modified.
        TaskActionOnBlockingInstances:
          $ref: "#/components/schemas/TaskActionOnBlockingInstances"
          description: User-specified option in case an instance is blocking the capacity task from running. WAIT_FOR_EVACUATION - Checks every 10 minutes over 48 hours to determine if instances have stopped and capacity is available to complete the task. FAIL_TASK - The capacity task fails.
