      type: string
      minLength: 1
      maxLength: 20
      pattern: ^op-[a-f0-9]{17}$
    OrderStatus:
      type: string
      enum:
        - RECEIVED
        - PENDING
        - PROCESSING
        - INSTALLING
        - FULFILLED
        - CANCELLED
        - PREPARING
        - IN_PROGRESS
        - DELIVERED
        - COMPLETED
        - ERROR
    LineItemListDefinition:
      type: array
      items:
        $ref: "#/components/schemas/LineItem"
    LineItem:
      description: Information about a line item.
