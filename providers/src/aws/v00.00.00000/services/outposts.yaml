        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /outposts/{outpost_id}/capacity:
    post:
      operationId: StartCapacityTask
      description: Starts the specified capacity task. You can have one active capacity task for each order and each Outpost.
      parameters:
        - name: outpost_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OutpostIdentifier"
          description: The ID or ARN of the Outposts associated with the specified capacity task.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                OrderId:
                  $ref: "#/components/schemas/OrderId"
                AssetId:
                  $ref: "#/components/schemas/AssetIdInput"
                InstancePools:
                  $ref: "#/components/schemas/RequestedInstancePools"
                InstancesToExclude:
                  $ref: "#/components/schemas/InstancesToExclude"
                DryRun:
                  $ref: "#/components/schemas/DryRun"
                TaskActionOnBlockingInstances:
                  $ref: "#/components/schemas/TaskActionOnBlockingInstances"
              required:
                - InstancePools
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartCapacityTaskOutput"
  /connections:
    post:
      operationId: StartConnection
      description: Amazon Web Services uses this action to install Outpost servers. Starts the connection required for Outpost server installation. Use CloudTrail to monitor this action or Amazon Web Services managed policy for Amazon Web Services Outposts to secure it. For more information, see Amazon Web Services managed policies for Amazon Web Services Outposts and Logging Amazon Web Services Outposts API calls with Amazon Web Services CloudTrail in the Amazon Web Services Outposts User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DeviceSerialNumber:
                  $ref: "#/components/schemas/DeviceSerialNumber"
                AssetId:
                  $ref: "#/components/schemas/AssetId"
                ClientPublicKey:
                  $ref: "#/components/schemas/WireGuardPublicKey"
                NetworkInterfaceDeviceIndex:
                  $ref: "#/components/schemas/NetworkInterfaceDeviceIndex"
              required:
                - AssetId
                - ClientPublicKey
                - NetworkInterfaceDeviceIndex
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartConnectionResponse"
  /outposts/{outpost_id}/decommission:
    post:
      operationId: StartOutpostDecommission
      description: Starts the decommission process to return the Outposts racks or servers.
      parameters:
        - name: outpost_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OutpostIdentifier"
