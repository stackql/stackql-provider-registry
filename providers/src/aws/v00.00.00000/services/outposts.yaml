      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartOutpostDecommissionOutput"
  /sites/{site_id}/rackPhysicalProperties:
    patch:
      operationId: UpdateSiteRackPhysicalProperties
