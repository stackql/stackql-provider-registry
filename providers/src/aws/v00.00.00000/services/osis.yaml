openapi: 3.0.0
info:
  version: "2022-01-01"
  title: Amazon OpenSearch Ingestion
  description: Amazon OpenSearch Ingestion
  x-serviceName: osis
  x-serviceAlias: osis
  x-protocol: rest-json
  x-apiVersion: "2022-01-01"
  x-endpointPrefix: osis
servers:
  - url: https://osis.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for osis
paths:
  /2022-01-01/osis/createPipeline:
    post:
      operationId: CreatePipeline
      description: Creates an OpenSearch Ingestion pipeline. For more information, see Creating Amazon OpenSearch Ingestion pipelines.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PipelineName:
                  $ref: "#/components/schemas/PipelineName"
                MinUnits:
                  $ref: "#/components/schemas/PipelineUnits"
                MaxUnits:
                  $ref: "#/components/schemas/PipelineUnits"
                PipelineConfigurationBody:
                  $ref: "#/components/schemas/PipelineConfigurationBody"
                LogPublishingOptions:
                  $ref: "#/components/schemas/LogPublishingOptions"
                VpcOptions:
                  $ref: "#/components/schemas/VpcOptions"
                BufferOptions:
                  $ref: "#/components/schemas/BufferOptions"
                EncryptionAtRestOptions:
                  $ref: "#/components/schemas/EncryptionAtRestOptions"
                Tags:
                  $ref: "#/components/schemas/TagList"
                PipelineRoleArn:
                  $ref: "#/components/schemas/PipelineRoleArn"
              required:
                - PipelineName
                - MinUnits
                - MaxUnits
                - PipelineConfigurationBody
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePipelineResponse"
  /2022-01-01/osis/createPipelineEndpoint:
    post:
      operationId: CreatePipelineEndpoint
      description: Creates a VPC endpoint for an OpenSearch Ingestion pipeline. Pipeline endpoints allow you to ingest data from your VPC into pipelines that you have access to.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PipelineArn:
                  $ref: "#/components/schemas/PipelineArn"
                VpcOptions:
                  $ref: "#/components/schemas/PipelineEndpointVpcOptions"
              required:
                - PipelineArn
                - VpcOptions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePipelineEndpointResponse"
  /2022-01-01/osis/deletePipeline/{pipeline_name}:
    delete:
      operationId: DeletePipeline
      description: Deletes an OpenSearch Ingestion pipeline. For more information, see Deleting Amazon OpenSearch Ingestion pipelines.
      parameters:
        - name: pipeline_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipelineName"
          description: The name of the pipeline to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePipelineResponse"
  /2022-01-01/osis/deletePipelineEndpoint/{endpoint_id}:
    delete:
      operationId: DeletePipelineEndpoint
      description: Deletes a VPC endpoint for an OpenSearch Ingestion pipeline.
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipelineEndpointId"
          description: The unique identifier of the pipeline endpoint to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePipelineEndpointResponse"
  /2022-01-01/osis/resourcePolicy/{resource_arn}:
    delete:
      operationId: DeleteResourcePolicy
      description: Deletes a resource-based policy from an OpenSearch Ingestion resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipelineArn"
          description: The Amazon Resource Name (ARN) of the resource from which to delete the policy.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResourcePolicyResponse"
    get:
      operationId: GetResourcePolicy
      description: Retrieves the resource-based policy attached to an OpenSearch Ingestion resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipelineArn"
          description: The Amazon Resource Name (ARN) of the resource for which to retrieve the policy.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourcePolicyResponse"
    put:
      operationId: PutResourcePolicy
      description: Attaches a resource-based policy to an OpenSearch Ingestion resource. Resource-based policies grant permissions to principals to perform actions on the resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipelineArn"
          description: The Amazon Resource Name (ARN) of the resource to attach the policy to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Policy:
                  $ref: "#/components/schemas/ResourcePolicy"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutResourcePolicyResponse"
  /2022-01-01/osis/getPipeline/{pipeline_name}:
    get:
      operationId: GetPipeline
      description: Retrieves information about an OpenSearch Ingestion pipeline.
      parameters:
        - name: pipeline_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipelineName"
          description: The name of the pipeline.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPipelineResponse"
  /2022-01-01/osis/getPipelineBlueprint/{blueprint_name}:
    get:
      operationId: GetPipelineBlueprint
      description: Retrieves information about a specific blueprint for OpenSearch Ingestion. Blueprints are templates for the configuration needed for a CreatePipeline request. For more information, see Using blueprints to create a pipeline.
      parameters:
        - name: blueprint_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the blueprint to retrieve.
        - name: format
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BlueprintFormat"
          description: The format format of the blueprint to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPipelineBlueprintResponse"
  /2022-01-01/osis/getPipelineChangeProgress/{pipeline_name}:
    get:
      operationId: GetPipelineChangeProgress
      description: Returns progress information for the current change happening on an OpenSearch Ingestion pipeline. Currently, this operation only returns information when a pipeline is being created. For more information, see Tracking the status of pipeline creation.
      parameters:
        - name: pipeline_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipelineName"
          description: The name of the pipeline.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPipelineChangeProgressResponse"
  /2022-01-01/osis/listPipelineBlueprints:
    post:
      operationId: ListPipelineBlueprints
      description: Retrieves a list of all available blueprints for Data Prepper. For more information, see Using blueprints to create a pipeline.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPipelineBlueprintsResponse"
  /2022-01-01/osis/listPipelineEndpointConnections:
    get:
      operationId: ListPipelineEndpointConnections
      description: Lists the pipeline endpoints connected to pipelines in your account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of pipeline endpoint connections to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If your initial ListPipelineEndpointConnections operation returns a nextToken, you can include the returned nextToken in subsequent ListPipelineEndpointConnections operations, which returns results in the next page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPipelineEndpointConnectionsResponse"
  /2022-01-01/osis/listPipelineEndpoints:
    get:
      operationId: ListPipelineEndpoints
      description: Lists all pipeline endpoints in your account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of pipeline endpoints to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If your initial ListPipelineEndpoints operation returns a NextToken, you can include the returned NextToken in subsequent ListPipelineEndpoints operations, which returns results in the next page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPipelineEndpointsResponse"
  /2022-01-01/osis/listPipelines:
    get:
      operationId: ListPipelines
      description: Lists all OpenSearch Ingestion pipelines in the current Amazon Web Services account and Region. For more information, see Viewing Amazon OpenSearch Ingestion pipelines.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: An optional parameter that specifies the maximum number of results to return. You can use nextToken to get the next page of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If your initial ListPipelines operation returns a nextToken, you can include the returned nextToken in subsequent ListPipelines operations, which returns results in the next page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPipelinesResponse"
  /2022-01-01/osis/listTagsForResource/:
    get:
      operationId: ListTagsForResource
      description: Lists all resource tags associated with an OpenSearch Ingestion pipeline. For more information, see Tagging Amazon OpenSearch Ingestion pipelines.
      parameters:
        - name: arn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PipelineArn"
          description: The Amazon Resource Name (ARN) of the pipeline to retrieve tags for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /2022-01-01/osis/revokePipelineEndpointConnections:
    post:
      operationId: RevokePipelineEndpointConnections
      description: Revokes pipeline endpoints from specified endpoint IDs.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PipelineArn:
                  $ref: "#/components/schemas/PipelineArn"
                EndpointIds:
                  $ref: "#/components/schemas/PipelineEndpointIdsList"
              required:
                - PipelineArn
                - EndpointIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokePipelineEndpointConnectionsResponse"
  /2022-01-01/osis/startPipeline/{pipeline_name}:
    put:
      operationId: StartPipeline
      description: Starts an OpenSearch Ingestion pipeline. For more information, see Starting an OpenSearch Ingestion pipeline.
      parameters:
        - name: pipeline_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipelineName"
          description: The name of the pipeline to start.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartPipelineResponse"
  /2022-01-01/osis/stopPipeline/{pipeline_name}:
    put:
      operationId: StopPipeline
      description: Stops an OpenSearch Ingestion pipeline. For more information, see Stopping an OpenSearch Ingestion pipeline.
      parameters:
        - name: pipeline_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipelineName"
          description: The name of the pipeline to stop.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopPipelineResponse"
  /2022-01-01/osis/tagResource/:
    post:
      operationId: TagResource
      description: Tags an OpenSearch Ingestion pipeline. For more information, see Tagging Amazon OpenSearch Ingestion pipelines.
      parameters:
        - name: arn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PipelineArn"
          description: The Amazon Resource Name (ARN) of the pipeline to tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /2022-01-01/osis/untagResource/:
    post:
      operationId: UntagResource
      description: Removes one or more tags from an OpenSearch Ingestion pipeline. For more information, see Tagging Amazon OpenSearch Ingestion pipelines.
      parameters:
        - name: arn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PipelineArn"
          description: The Amazon Resource Name (ARN) of the pipeline to remove tags from.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TagKeys:
                  $ref: "#/components/schemas/StringList"
              required:
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /2022-01-01/osis/updatePipeline/{pipeline_name}:
    put:
      operationId: UpdatePipeline
      description: Updates an OpenSearch Ingestion pipeline. For more information, see Updating Amazon OpenSearch Ingestion pipelines.
      parameters:
        - name: pipeline_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PipelineName"
          description: The name of the pipeline to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MinUnits:
                  $ref: "#/components/schemas/PipelineUnits"
                MaxUnits:
                  $ref: "#/components/schemas/PipelineUnits"
                PipelineConfigurationBody:
                  $ref: "#/components/schemas/PipelineConfigurationBody"
                LogPublishingOptions:
                  $ref: "#/components/schemas/LogPublishingOptions"
                BufferOptions:
                  $ref: "#/components/schemas/BufferOptions"
                EncryptionAtRestOptions:
                  $ref: "#/components/schemas/EncryptionAtRestOptions"
                PipelineRoleArn:
                  $ref: "#/components/schemas/PipelineRoleArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePipelineResponse"
  /2022-01-01/osis/validatePipeline:
    post:
      operationId: ValidatePipeline
      description: Checks whether an OpenSearch Ingestion pipeline configuration is valid prior to creation. For more information, see Creating Amazon OpenSearch Ingestion pipelines.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PipelineConfigurationBody:
                  $ref: "#/components/schemas/PipelineConfigurationBody"
              required:
                - PipelineConfigurationBody
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidatePipelineResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    PipelineName:
      type: string
      minLength: 3
      maxLength: 28
      pattern: "[a-z][a-z0-9\\-]+"
    PipelineUnits:
      type: integer
      minimum: 1
    PipelineConfigurationBody:
      type: string
      minLength: 1
      maxLength: 100000
    LogPublishingOptions:
      description: Container for the values required to configure logging for the pipeline. If you don't specify these values, OpenSearch Ingestion will not publish logs from your application to CloudWatch Logs.
      type: object
      properties:
        IsLoggingEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether logs should be published.
        CloudWatchLogDestination:
          $ref: "#/components/schemas/CloudWatchLogDestination"
          description: The destination for OpenSearch Ingestion logs sent to Amazon CloudWatch Logs. This parameter is required if IsLoggingEnabled is set to true.
    Boolean:
      type: boolean
    CloudWatchLogDestination:
      description: The destination for OpenSearch Ingestion logs sent to Amazon CloudWatch.
      type: object
      properties:
        LogGroup:
          $ref: "#/components/schemas/LogGroup"
          description: The name of the CloudWatch Logs group to send pipeline logs to. You can specify an existing log group or create a new one. For example, /aws/vendedlogs/OpenSearchService/pipelines.
      required:
        - LogGroup
    LogGroup:
      type: string
      minLength: 1
      maxLength: 512
      pattern: \/aws\/vendedlogs\/[\.\-_/#A-Za-z0-9]+
    VpcOptions:
      description: Options that specify the subnets and security groups for an OpenSearch Ingestion VPC endpoint.
      type: object
      properties:
        SubnetIds:
          $ref: "#/components/schemas/SubnetIds"
          description: A list of subnet IDs associated with the VPC endpoint.
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: A list of security groups associated with the VPC endpoint.
        VpcAttachmentOptions:
          $ref: "#/components/schemas/VpcAttachmentOptions"
          description: Options for attaching a VPC to a pipeline.
        VpcEndpointManagement:
          $ref: "#/components/schemas/VpcEndpointManagement"
          description: Defines whether you or Amazon OpenSearch Ingestion service create and manage the VPC endpoint configured for the pipeline.
      required:
        - SubnetIds
    SubnetIds:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      type: string
      minLength: 15
      maxLength: 24
      pattern: subnet-\w{8}(\w{9})?
    SecurityGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      type: string
      minLength: 11
      maxLength: 20
      pattern: sg-\w{8}(\w{9})?
    VpcAttachmentOptions:
      description: Options for attaching a VPC to pipeline.
      type: object
      properties:
        AttachToVpc:
          $ref: "#/components/schemas/Boolean"
          description: Whether a VPC is attached to the pipeline.
        CidrBlock:
          $ref: "#/components/schemas/CidrBlock"
          description: The CIDR block to be reserved for OpenSearch Ingestion to create elastic network interfaces (ENIs).
      required:
        - AttachToVpc
    CidrBlock:
      type: string
      pattern: ^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)/24$
    VpcEndpointManagement:
      type: string
      enum:
        - CUSTOMER
        - SERVICE
    BufferOptions:
      description: Options that specify the configuration of a persistent buffer. To configure how OpenSearch Ingestion encrypts this data, set the EncryptionAtRestOptions. For more information, see Persistent buffering.
      type: object
      properties:
        PersistentBufferEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether persistent buffering should be enabled.
      required:
        - PersistentBufferEnabled
    EncryptionAtRestOptions:
      description: Options to control how OpenSearch encrypts buffer data.
      type: object
      properties:
        KmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The ARN of the KMS key used to encrypt buffer data. By default, data is encrypted using an Amazon Web Services owned key.
      required:
        - KmsKeyArn
    KmsKeyArn:
      type: string
      minLength: 7
      maxLength: 2048
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A tag (key-value pair) for an OpenSearch Ingestion pipeline.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The tag key. Tag keys must be unique for the pipeline to which they are attached.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: "The value assigned to the corresponding tag key. Tag values can be null and don't have to be unique in a tag set. For example, you can have a key value pair in a tag set of project : Trinity and cost-center : Trinity"
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: .*
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: .*
    PipelineRoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:(aws|aws\-cn|aws\-us\-gov|aws\-iso|aws\-iso\-b|aws\-iso\-e|aws\-iso\-f):iam::[0-9]+:role\/.*$
    CreatePipelineResponse:
      type: object
      properties:
        Pipeline:
          $ref: "#/components/schemas/Pipeline"
          description: Container for information about the created pipeline.
    Pipeline:
      description: Information about an existing OpenSearch Ingestion pipeline.
      type: object
      properties:
        PipelineName:
          $ref: "#/components/schemas/String"
          description: The name of the pipeline.
        PipelineArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the pipeline.
        MinUnits:
          $ref: "#/components/schemas/Integer"
          description: The minimum pipeline capacity, in Ingestion Compute Units (ICUs).
        MaxUnits:
          $ref: "#/components/schemas/Integer"
          description: The maximum pipeline capacity, in Ingestion Compute Units (ICUs).
        Status:
          $ref: "#/components/schemas/PipelineStatus"
          description: The current status of the pipeline.
        StatusReason:
          $ref: "#/components/schemas/PipelineStatusReason"
          description: The reason for the current status of the pipeline.
        PipelineConfigurationBody:
          $ref: "#/components/schemas/String"
          description: The Data Prepper pipeline configuration in YAML format.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the pipeline was created.
        LastUpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the pipeline was last updated.
        IngestEndpointUrls:
          $ref: "#/components/schemas/IngestEndpointUrlsList"
          description: The ingestion endpoints for the pipeline, which you can send data to.
        LogPublishingOptions:
          $ref: "#/components/schemas/LogPublishingOptions"
          description: Key-value pairs that represent log publishing settings.
        VpcEndpoints:
          $ref: "#/components/schemas/VpcEndpointsList"
          description: The VPC interface endpoints that have access to the pipeline.
        BufferOptions:
          $ref: "#/components/schemas/BufferOptions"
        EncryptionAtRestOptions:
          $ref: "#/components/schemas/EncryptionAtRestOptions"
        VpcEndpointService:
          $ref: "#/components/schemas/String"
          description: The VPC endpoint service name for the pipeline.
        ServiceVpcEndpoints:
          $ref: "#/components/schemas/ServiceVpcEndpointsList"
          description: A list of VPC endpoints that OpenSearch Ingestion has created to other Amazon Web Services services.
        Destinations:
          $ref: "#/components/schemas/PipelineDestinationList"
          description: Destinations to which the pipeline writes data.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tags associated with the given pipeline.
        PipelineRoleArn:
          $ref: "#/components/schemas/PipelineRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role that the pipeline uses to access AWS resources.
    String:
      type: string
    Integer:
      type: integer
    PipelineStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - UPDATING
        - DELETING
        - CREATE_FAILED
        - UPDATE_FAILED
        - STARTING
        - START_FAILED
        - STOPPING
        - STOPPED
    PipelineStatusReason:
      description: Information about a pipeline's current status.
      type: object
      properties:
        Description:
          $ref: "#/components/schemas/String"
          description: A description of why a pipeline has a certain status.
    Timestamp:
      type: string
      format: date-time
    IngestEndpointUrlsList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    VpcEndpointsList:
      type: array
      items:
        $ref: "#/components/schemas/VpcEndpoint"
    VpcEndpoint:
      description: An OpenSearch Ingestion-managed VPC endpoint that will access one or more pipelines.
      type: object
      properties:
