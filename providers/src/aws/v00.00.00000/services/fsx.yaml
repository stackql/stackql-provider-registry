openapi: 3.0.0
info:
  version: "2018-03-01"
  title: Amazon FSx
  description: Amazon FSx
  x-serviceName: fsx
  x-serviceAlias: fsx
  x-protocol: json
  x-apiVersion: "2018-03-01"
  x-endpointPrefix: fsx
  x-targetPrefix: AWSSimbaAPIService_v20180301
  x-jsonVersion: "1.1"
servers:
  - url: https://fsx.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for fsx
paths:
  /AssociateFileSystemAliases:
    post:
      operationId: AssociateFileSystemAliases
      description: "Use this action to associate one or more Domain Name Server (DNS) aliases with an existing Amazon FSx for Windows File Server file system. A file system can have a maximum of 50 DNS aliases associated with it at any one time. If you try to associate a DNS alias that is already associated with the file system, FSx takes no action on that alias in the request. For more information, see Working with DNS Aliases and Walkthrough 5: Using DNS aliases to access your file system, including additional steps you must take to be able to access your file system using a DNS alias. The system response shows the DNS aliases that Amazon FSx is attempting to associate with the file system. Use the API operation to monitor the status of the aliases Amazon FSx is associating with the file system."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.AssociateFileSystemAliases
            default: AWSSimbaAPIService_v20180301.AssociateFileSystemAliases
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                FileSystemId:
                  $ref: "#/components/schemas/FileSystemId"
                  description: Specifies the file system with which you want to associate one or more DNS aliases.
                Aliases:
                  $ref: "#/components/schemas/AlternateDNSNames"
                  description: "An array of one or more DNS alias names to associate with the file system. The alias name has to comply with the following formatting requirements: Formatted as a fully-qualified domain name (FQDN), hostname.domain , for example, accounting.corp.example.com. Can contain alphanumeric characters and the hyphen (-). Cannot start or end with a hyphen. Can start with a numeric. For DNS alias names, Amazon FSx stores alphabetic characters as lowercase letters (a-z), regardless of how you specify them: as uppercase letters, lowercase letters, or the corresponding letters in escape codes."
              required:
                - FileSystemId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateFileSystemAliasesResponse"
  /CancelDataRepositoryTask:
    post:
      operationId: CancelDataRepositoryTask
      description: Cancels an existing Amazon FSx for Lustre data repository task if that task is in either the PENDING or EXECUTING state. When you cancel an export task, Amazon FSx does the following. Any files that FSx has already exported are not reverted. FSx continues to export any files that are in-flight when the cancel operation is received. FSx does not export any files that have not yet been exported. For a release task, Amazon FSx will stop releasing files upon cancellation. Any files that have already been released will remain in the released state.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.CancelDataRepositoryTask
            default: AWSSimbaAPIService_v20180301.CancelDataRepositoryTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TaskId:
                  $ref: "#/components/schemas/TaskId"
                  description: Specifies the data repository task to cancel.
              required:
                - TaskId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelDataRepositoryTaskResponse"
  /CopyBackup:
    post:
      operationId: CopyBackup
      description: "Copies an existing backup within the same Amazon Web Services account to another Amazon Web Services Region (cross-Region copy) or within the same Amazon Web Services Region (in-Region copy). You can have up to five backup copy requests in progress to a single destination Region per account. You can use cross-Region backup copies for cross-Region disaster recovery. You can periodically take backups and copy them to another Region so that in the event of a disaster in the primary Region, you can restore from backup and recover availability quickly in the other Region. You can make cross-Region copies only within your Amazon Web Services partition. A partition is a grouping of Regions. Amazon Web Services currently has three partitions: aws (Standard Regions), aws-cn (China Regions), and aws-us-gov (Amazon Web Services GovCloud [US] Regions). You can also use backup copies to clone your file dataset to another Region or within the same Region. You can use the SourceRegion parameter to specify the Amazon Web Services Region from which the backup will be copied. For example, if you make the call from the us-west-1 Region and want to copy a backup from the us-east-2 Region, you specify us-east-2 in the SourceRegion parameter to make a cross-Region copy. If you don't specify a Region, the backup copy is created in the same Region where the request is sent from (in-Region copy). For more information about creating backup copies, see Copying backups in the Amazon FSx for Windows User Guide, Copying backups in the Amazon FSx for Lustre User Guide, and Copying backups in the Amazon FSx for OpenZFS User Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.CopyBackup
            default: AWSSimbaAPIService_v20180301.CopyBackup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                SourceBackupId:
                  $ref: "#/components/schemas/SourceBackupId"
                  description: The ID of the source backup. Specifies the ID of the backup that's being copied.
                SourceRegion:
                  $ref: "#/components/schemas/Region"
                  description: The source Amazon Web Services Region of the backup. Specifies the Amazon Web Services Region from which the backup is being copied. The source and destination Regions must be in the same Amazon Web Services partition. If you don't specify a Region, SourceRegion defaults to the Region where the request is sent from (in-Region copy).
                KmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                CopyTags:
                  $ref: "#/components/schemas/Flag"
                  description: A Boolean flag indicating whether tags from the source backup should be copied to the backup copy. This value defaults to false. If you set CopyTags to true and the source backup has existing tags, you can use the Tags parameter to create new tags, provided that the sum of the source backup tags and the new tags doesn't exceed 50. Both sets of tags are merged. If there are tag conflicts (for example, two tags with the same key but different values), the tags created with the Tags parameter take precedence.
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - SourceBackupId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopyBackupResponse"
  /CopySnapshotAndUpdateVolume:
    post:
      operationId: CopySnapshotAndUpdateVolume
      description: Updates an existing volume by using a snapshot from another Amazon FSx for OpenZFS file system. For more information, see on-demand data replication in the Amazon FSx for OpenZFS User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.CopySnapshotAndUpdateVolume
            default: AWSSimbaAPIService_v20180301.CopySnapshotAndUpdateVolume
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                VolumeId:
                  $ref: "#/components/schemas/VolumeId"
                  description: Specifies the ID of the volume that you are copying the snapshot to.
                SourceSnapshotARN:
                  $ref: "#/components/schemas/ResourceARN"
                CopyStrategy:
                  $ref: "#/components/schemas/OpenZFSCopyStrategy"
                  description: Specifies the strategy to use when copying data from a snapshot to the volume. FULL_COPY - Copies all data from the snapshot to the volume. INCREMENTAL_COPY - Copies only the snapshot data that's changed since the previous replication. CLONE isn't a valid copy strategy option for the CopySnapshotAndUpdateVolume operation.
                Options:
                  $ref: "#/components/schemas/UpdateOpenZFSVolumeOptions"
                  description: Confirms that you want to delete data on the destination volume that wasn’t there during the previous snapshot replication. Your replication will fail if you don’t include an option for a specific type of data and that data is on your destination. For example, if you don’t include DELETE_INTERMEDIATE_SNAPSHOTS and there are intermediate snapshots on the destination, you can’t copy the snapshot. DELETE_INTERMEDIATE_SNAPSHOTS - Deletes snapshots on the destination volume that aren’t on the source volume. DELETE_CLONED_VOLUMES - Deletes snapshot clones on the destination volume that aren't on the source volume. DELETE_INTERMEDIATE_DATA - Overwrites snapshots on the destination volume that don’t match the source snapshot that you’re copying.
              required:
                - VolumeId
                - SourceSnapshotARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopySnapshotAndUpdateVolumeResponse"
  /CreateAndAttachS3AccessPoint:
    post:
      operationId: CreateAndAttachS3AccessPoint
      description: "Creates an S3 access point and attaches it to an Amazon FSx volume. For FSx for OpenZFS file systems, the volume must be hosted on a high-availability file system, either Single-AZ or Multi-AZ. For more information, see Accessing your data using Amazon S3 access points. in the Amazon FSx for OpenZFS User Guide. The requester requires the following permissions to perform these actions: fsx:CreateAndAttachS3AccessPoint s3:CreateAccessPoint s3:GetAccessPoint s3:PutAccessPointPolicy s3:DeleteAccessPoint The following actions are related to CreateAndAttachS3AccessPoint: DescribeS3AccessPointAttachments DetachAndDeleteS3AccessPoint"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.CreateAndAttachS3AccessPoint
            default: AWSSimbaAPIService_v20180301.CreateAndAttachS3AccessPoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Name:
                  $ref: "#/components/schemas/S3AccessPointAttachmentName"
                  description: The name you want to assign to this S3 access point.
                Type:
                  $ref: "#/components/schemas/S3AccessPointAttachmentType"
                  description: The type of S3 access point you want to create. Only OpenZFS is supported.
                OpenZFSConfiguration:
                  $ref: "#/components/schemas/CreateAndAttachS3AccessPointOpenZFSConfiguration"
                  description: Specifies the configuration to use when creating and attaching an S3 access point to an FSx for OpenZFS volume.
                OntapConfiguration:
                  $ref: "#/components/schemas/CreateAndAttachS3AccessPointOntapConfiguration"
                S3AccessPoint:
                  $ref: "#/components/schemas/CreateAndAttachS3AccessPointS3Configuration"
                  description: Specifies the virtual private cloud (VPC) configuration if you're creating an access point that is restricted to a VPC. For more information, see Creating access points restricted to a virtual private cloud.
              required:
                - Name
                - Type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAndAttachS3AccessPointResponse"
  /CreateBackup:
    post:
      operationId: CreateBackup
      description: "Creates a backup of an existing Amazon FSx for Windows File Server file system, Amazon FSx for Lustre file system, Amazon FSx for NetApp ONTAP volume, or Amazon FSx for OpenZFS file system. We recommend creating regular backups so that you can restore a file system or volume from a backup if an issue arises with the original file system or volume. For Amazon FSx for Lustre file systems, you can create a backup only for file systems that have the following configuration: A Persistent deployment type Are not linked to a data repository For more information about backups, see the following: For Amazon FSx for Lustre, see Working with FSx for Lustre backups. For Amazon FSx for Windows, see Working with FSx for Windows backups. For Amazon FSx for NetApp ONTAP, see Working with FSx for NetApp ONTAP backups. For Amazon FSx for OpenZFS, see Working with FSx for OpenZFS backups. If a backup with the specified client request token exists and the parameters match, this operation returns the description of the existing backup. If a backup with the specified client request token exists and the parameters don't match, this operation returns IncompatibleParameterError. If a backup with the specified client request token doesn't exist, CreateBackup does the following: Creates a new Amazon FSx backup with an assigned ID, and an initial lifecycle state of CREATING. Returns the description of the backup. By using the idempotent operation, you can retry a CreateBackup operation without the risk of creating an extra backup. This approach can be useful when an initial call fails in a way that makes it unclear whether a backup was created. If you use the same client request token and the initial call created a backup, the operation returns a successful result because all the parameters are the same. The CreateBackup operation returns while the backup's lifecycle state is still CREATING. You can check the backup creation status by calling the DescribeBackups operation, which returns the backup state along with other information."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.CreateBackup
            default: AWSSimbaAPIService_v20180301.CreateBackup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FileSystemId:
                  $ref: "#/components/schemas/FileSystemId"
                  description: The ID of the file system to back up.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: (Optional) A string of up to 63 ASCII characters that Amazon FSx uses to ensure idempotent creation. This string is automatically filled on your behalf when you use the Command Line Interface (CLI) or an Amazon Web Services SDK.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: (Optional) The tags to apply to the backup at backup creation. The key value of the Name tag appears in the console as the backup name. If you have set CopyTagsToBackups to true, and you specify one or more tags using the CreateBackup operation, no existing file system tags are copied from the file system to the backup.
                VolumeId:
                  $ref: "#/components/schemas/VolumeId"
                  description: (Optional) The ID of the FSx for ONTAP volume to back up.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBackupResponse"
  /CreateDataRepositoryAssociation:
    post:
      operationId: CreateDataRepositoryAssociation
      description: Creates an Amazon FSx for Lustre data repository association (DRA). A data repository association is a link between a directory on the file system and an Amazon S3 bucket or prefix. You can have a maximum of 8 data repository associations on a file system. Data repository associations are supported on all FSx for Lustre 2.12 and 2.15 file systems, excluding scratch_1 deployment type. Each data repository association must have a unique Amazon FSx file system directory and a unique S3 bucket or prefix associated with it. You can configure a data repository association for automatic import only, for automatic export only, or for both. To learn more about linking a data repository to your file system, see Linking your file system to an S3 bucket. CreateDataRepositoryAssociation isn't supported on Amazon File Cache resources. To create a DRA on Amazon File Cache, use the CreateFileCache operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.CreateDataRepositoryAssociation
            default: AWSSimbaAPIService_v20180301.CreateDataRepositoryAssociation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FileSystemId:
                  $ref: "#/components/schemas/FileSystemId"
                FileSystemPath:
                  $ref: "#/components/schemas/Namespace"
                  description: A path on the file system that points to a high-level directory (such as /ns1/) or subdirectory (such as /ns1/subdir/) that will be mapped 1-1 with DataRepositoryPath. The leading forward slash in the name is required. Two data repository associations cannot have overlapping file system paths. For example, if a data repository is associated with file system path /ns1/, then you cannot link another data repository with file system path /ns1/ns2. This path specifies where in your file system files will be exported from or imported to. This file system directory can be linked to only one Amazon S3 bucket, and no other S3 bucket can be linked to the directory. If you specify only a forward slash (/) as the file system path, you can link only one data repository to the file system. You can only specify "/" as the file system path for the first data repository associated with a file system.
                DataRepositoryPath:
                  $ref: "#/components/schemas/ArchivePath"
                  description: The path to the Amazon S3 data repository that will be linked to the file system. The path can be an S3 bucket or prefix in the format s3://bucket-name/prefix/ (where prefix is optional). This path specifies where in the S3 data repository files will be imported from or exported to.
                BatchImportMetaDataOnCreate:
                  $ref: "#/components/schemas/BatchImportMetaDataOnCreate"
                  description: Set to true to run an import data repository task to import metadata from the data repository to the file system after the data repository association is created. Default is false.
                ImportedFileChunkSize:
                  $ref: "#/components/schemas/Megabytes"
                  description: For files imported from a data repository, this value determines the stripe count and maximum amount of data per file (in MiB) stored on a single physical disk. The maximum number of disks that a single file can be striped across is limited by the total number of disks that make up the file system. The default chunk size is 1,024 MiB (1 GiB) and can go as high as 512,000 MiB (500 GiB). Amazon S3 objects have a maximum size of 5 TB.
                S3:
                  $ref: "#/components/schemas/S3DataRepositoryConfiguration"
                  description: The configuration for an Amazon S3 data repository linked to an Amazon FSx Lustre file system with a data repository association. The configuration defines which file events (new, changed, or deleted files or directories) are automatically imported from the linked data repository to the file system or automatically exported from the file system to the data repository.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - FileSystemId
                - DataRepositoryPath
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataRepositoryAssociationResponse"
  /CreateDataRepositoryTask:
    post:
      operationId: CreateDataRepositoryTask
      description: Creates an Amazon FSx for Lustre data repository task. A CreateDataRepositoryTask operation will fail if a data repository is not linked to the FSx file system. You use import and export data repository tasks to perform bulk operations between your FSx for Lustre file system and its linked data repositories. An example of a data repository task is exporting any data and metadata changes, including POSIX metadata, to files, directories, and symbolic links (symlinks) from your FSx file system to a linked data repository. You use release data repository tasks to release data from your file system for files that are exported to S3. The metadata of released files remains on the file system so users or applications can still access released files by reading the files again, which will restore data from Amazon S3 to the FSx for Lustre file system. To learn more about data repository tasks, see Data Repository Tasks. To learn more about linking a data repository to your file system, see Linking your file system to an S3 bucket.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.CreateDataRepositoryTask
            default: AWSSimbaAPIService_v20180301.CreateDataRepositoryTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Type:
                  $ref: "#/components/schemas/DataRepositoryTaskType"
                  description: Specifies the type of data repository task to create. EXPORT_TO_REPOSITORY tasks export from your Amazon FSx for Lustre file system to a linked data repository. IMPORT_METADATA_FROM_REPOSITORY tasks import metadata changes from a linked S3 bucket to your Amazon FSx for Lustre file system. RELEASE_DATA_FROM_FILESYSTEM tasks release files in your Amazon FSx for Lustre file system that have been exported to a linked S3 bucket and that meet your specified release criteria. AUTO_RELEASE_DATA tasks automatically release files from an Amazon File Cache resource.
                Paths:
                  $ref: "#/components/schemas/DataRepositoryTaskPaths"
                  description: A list of paths for the data repository task to use when the task is processed. If a path that you provide isn't valid, the task fails. If you don't provide paths, the default behavior is to export all files to S3 (for export tasks), import all files from S3 (for import tasks), or release all exported files that meet the last accessed time criteria (for release tasks). For export tasks, the list contains paths on the FSx for Lustre file system from which the files are exported to the Amazon S3 bucket. The default path is the file system root directory. The paths you provide need to be relative to the mount point of the file system. If the mount point is /mnt/fsx and /mnt/fsx/path1 is a directory or file on the file system you want to export, then the path to provide is path1. For import tasks, the list contains paths in the Amazon S3 bucket from which POSIX metadata changes are imported to the FSx for Lustre file system. The path can be an S3 bucket or prefix in the format s3://bucket-name/prefix (where prefix is optional). For release tasks, the list contains directory or file paths on the FSx for Lustre file system from which to release exported files. If a directory is specified, files within the directory are released. If a file path is specified, only that file is released. To release all exported files in the file system, specify a forward slash (/) as the path. A file must also meet the last accessed time criteria specified in for the file to be released.
                FileSystemId:
                  $ref: "#/components/schemas/FileSystemId"
                Report:
                  $ref: "#/components/schemas/CompletionReport"
                  description: Defines whether or not Amazon FSx provides a CompletionReport once the task has completed. A CompletionReport provides a detailed report on the files that Amazon FSx processed that meet the criteria specified by the Scope parameter. For more information, see Working with Task Completion Reports.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Tags:
                  $ref: "#/components/schemas/Tags"
                CapacityToRelease:
                  $ref: "#/components/schemas/CapacityToRelease"
                  description: Specifies the amount of data to release, in GiB, by an Amazon File Cache AUTO_RELEASE_DATA task that automatically releases files from the cache.
                ReleaseConfiguration:
                  $ref: "#/components/schemas/ReleaseConfiguration"
                  description: The configuration that specifies the last accessed time criteria for files that will be released from an Amazon FSx for Lustre file system.
              required:
                - Type
                - FileSystemId
                - Report
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataRepositoryTaskResponse"
  /CreateFileCache:
    post:
      operationId: CreateFileCache
      description: "Creates a new Amazon File Cache resource. You can use this operation with a client request token in the request that Amazon File Cache uses to ensure idempotent creation. If a cache with the specified client request token exists and the parameters match, CreateFileCache returns the description of the existing cache. If a cache with the specified client request token exists and the parameters don't match, this call returns IncompatibleParameterError. If a file cache with the specified client request token doesn't exist, CreateFileCache does the following: Creates a new, empty Amazon File Cache resource with an assigned ID, and an initial lifecycle state of CREATING. Returns the description of the cache in JSON format. The CreateFileCache call returns while the cache's lifecycle state is still CREATING. You can check the cache creation status by calling the DescribeFileCaches operation, which returns the cache state along with other information."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.CreateFileCache
            default: AWSSimbaAPIService_v20180301.CreateFileCache
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: An idempotency token for resource creation, in a string of up to 63 ASCII characters. This token is automatically filled on your behalf when you use the Command Line Interface (CLI) or an Amazon Web Services SDK. By using the idempotent operation, you can retry a CreateFileCache operation without the risk of creating an extra cache. This approach can be useful when an initial call fails in a way that makes it unclear whether a cache was created. Examples are if a transport level timeout occurred, or your connection was reset. If you use the same client request token and the initial call created a cache, the client receives success as long as the parameters are the same.
                FileCacheType:
                  $ref: "#/components/schemas/FileCacheType"
                  description: The type of cache that you're creating, which must be LUSTRE.
                FileCacheTypeVersion:
                  $ref: "#/components/schemas/FileSystemTypeVersion"
                  description: Sets the Lustre version for the cache that you're creating, which must be 2.12.
                StorageCapacity:
                  $ref: "#/components/schemas/StorageCapacity"
                  description: The storage capacity of the cache in gibibytes (GiB). Valid values are 1200 GiB, 2400 GiB, and increments of 2400 GiB.
                SubnetIds:
                  $ref: "#/components/schemas/SubnetIds"
                SecurityGroupIds:
                  $ref: "#/components/schemas/SecurityGroupIds"
                  description: A list of IDs specifying the security groups to apply to all network interfaces created for Amazon File Cache access. This list isn't returned in later requests to describe the cache.
                Tags:
                  $ref: "#/components/schemas/Tags"
                CopyTagsToDataRepositoryAssociations:
                  $ref: "#/components/schemas/CopyTagsToDataRepositoryAssociations"
                  description: A boolean flag indicating whether tags for the cache should be copied to data repository associations. This value defaults to false.
                KmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                  description: Specifies the ID of the Key Management Service (KMS) key to use for encrypting data on an Amazon File Cache. If a KmsKeyId isn't specified, the Amazon FSx-managed KMS key for your account is used. For more information, see Encrypt in the Key Management Service API Reference.
                LustreConfiguration:
                  $ref: "#/components/schemas/CreateFileCacheLustreConfiguration"
                  description: The configuration for the Amazon File Cache resource being created.
                DataRepositoryAssociations:
                  $ref: "#/components/schemas/CreateFileCacheDataRepositoryAssociations"
                  description: "A list of up to 8 configurations for data repository associations (DRAs) to be created during the cache creation. The DRAs link the cache to either an Amazon S3 data repository or a Network File System (NFS) data repository that supports the NFSv3 protocol. The DRA configurations must meet the following requirements: All configurations on the list must be of the same data repository type, either all S3 or all NFS. A cache can't link to different data repository types at the same time. An NFS DRA must link to an NFS file system that supports the NFSv3 protocol. DRA automatic import and automatic export is not supported."
              required:
                - FileCacheType
                - FileCacheTypeVersion
                - StorageCapacity
                - SubnetIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFileCacheResponse"
  /CreateFileSystem:
    post:
      operationId: CreateFileSystem
      description: "Creates a new, empty Amazon FSx file system. You can create the following supported Amazon FSx file systems using the CreateFileSystem API operation: Amazon FSx for Lustre Amazon FSx for NetApp ONTAP Amazon FSx for OpenZFS Amazon FSx for Windows File Server This operation requires a client request token in the request that Amazon FSx uses to ensure idempotent creation. This means that calling the operation multiple times with the same client request token has no effect. By using the idempotent operation, you can retry a CreateFileSystem operation without the risk of creating an extra file system. This approach can be useful when an initial call fails in a way that makes it unclear whether a file system was created. Examples are if a transport level timeout occurred, or your connection was reset. If you use the same client request token and the initial call created a file system, the client receives success as long as the parameters are the same. If a file system with the specified client request token exists and the parameters match, CreateFileSystem returns the description of the existing file system. If a file system with the specified client request token exists and the parameters don't match, this call returns IncompatibleParameterError. If a file system with the specified client request token doesn't exist, CreateFileSystem does the following: Creates a new, empty Amazon FSx file system with an assigned ID, and an initial lifecycle state of CREATING. Returns the description of the file system in JSON format. The CreateFileSystem call returns while the file system's lifecycle state is still CREATING. You can check the file-system creation status by calling the DescribeFileSystems operation, which returns the file system state along with other information."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.CreateFileSystem
            default: AWSSimbaAPIService_v20180301.CreateFileSystem
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: A string of up to 63 ASCII characters that Amazon FSx uses to ensure idempotent creation. This string is automatically filled on your behalf when you use the Command Line Interface (CLI) or an Amazon Web Services SDK.
                FileSystemType:
                  $ref: "#/components/schemas/FileSystemType"
                  description: The type of Amazon FSx file system to create. Valid values are WINDOWS, LUSTRE, ONTAP, and OPENZFS.
                StorageCapacity:
                  $ref: "#/components/schemas/StorageCapacity"
                  description: "Sets the storage capacity of the file system that you're creating, in gibibytes (GiB). FSx for Lustre file systems - The amount of storage capacity that you can configure depends on the value that you set for StorageType and the Lustre DeploymentType, as follows: For SCRATCH_2, PERSISTENT_2, and PERSISTENT_1 deployment types using SSD storage type, the valid values are 1200 GiB, 2400 GiB, and increments of 2400 GiB. For PERSISTENT_1 HDD file systems, valid values are increments of 6000 GiB for 12 MB/s/TiB file systems and increments of 1800 GiB for 40 MB/s/TiB file systems. For SCRATCH_1 deployment type, valid values are 1200 GiB, 2400 GiB, and increments of 3600 GiB. FSx for ONTAP file systems - The amount of storage capacity that you can configure depends on the value of the HAPairs property. The minimum value is calculated as 1,024 * HAPairs and the maximum is calculated as 524,288 * HAPairs. FSx for OpenZFS file systems - The amount of storage capacity that you can configure is from 64 GiB up to 524,288 GiB (512 TiB). FSx for Windows File Server file systems - The amount of storage capacity that you can configure depends on the value that you set for StorageType as follows: For SSD storage, valid values are 32 GiB-65,536 GiB (64 TiB). For HDD storage, valid values are 2000 GiB-65,536 GiB (64 TiB)."
                StorageType:
                  $ref: "#/components/schemas/StorageType"
                  description: Sets the storage class for the file system that you're creating. Valid values are SSD, HDD, and INTELLIGENT_TIERING. Set to SSD to use solid state drive storage. SSD is supported on all Windows, Lustre, ONTAP, and OpenZFS deployment types. Set to HDD to use hard disk drive storage, which is supported on SINGLE_AZ_2 and MULTI_AZ_1 Windows file system deployment types, and on PERSISTENT_1 Lustre file system deployment types. Set to INTELLIGENT_TIERING to use fully elastic, intelligently-tiered storage. Intelligent-Tiering is only available for OpenZFS file systems with the Multi-AZ deployment type and for Lustre file systems with the Persistent_2 deployment type. Default value is SSD. For more information, see Storage type options in the FSx for Windows File Server User Guide, FSx for Lustre storage classes in the FSx for Lustre User Guide, and Working with Intelligent-Tiering in the Amazon FSx for OpenZFS User Guide.
                SubnetIds:
                  $ref: "#/components/schemas/SubnetIds"
                  description: "Specifies the IDs of the subnets that the file system will be accessible from. For Windows and ONTAP MULTI_AZ_1 deployment types,provide exactly two subnet IDs, one for the preferred file server and one for the standby file server. You specify one of these subnets as the preferred subnet using the WindowsConfiguration > PreferredSubnetID or OntapConfiguration > PreferredSubnetID properties. For more information about Multi-AZ file system configuration, see Availability and durability: Single-AZ and Multi-AZ file systems in the Amazon FSx for Windows User Guide and Availability and durability in the Amazon FSx for ONTAP User Guide. For Windows SINGLE_AZ_1 and SINGLE_AZ_2 and all Lustre deployment types, provide exactly one subnet ID. The file server is launched in that subnet's Availability Zone."
                SecurityGroupIds:
                  $ref: "#/components/schemas/SecurityGroupIds"
                  description: A list of IDs specifying the security groups to apply to all network interfaces created for file system access. This list isn't returned in later requests to describe the file system. You must specify a security group if you are creating a Multi-AZ FSx for ONTAP file system in a VPC subnet that has been shared with you.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: The tags to apply to the file system that's being created. The key value of the Name tag appears in the console as the file system name.
                KmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                WindowsConfiguration:
                  $ref: "#/components/schemas/CreateFileSystemWindowsConfiguration"
                  description: The Microsoft Windows configuration for the file system that's being created.
                LustreConfiguration:
                  $ref: "#/components/schemas/CreateFileSystemLustreConfiguration"
                OntapConfiguration:
                  $ref: "#/components/schemas/CreateFileSystemOntapConfiguration"
                FileSystemTypeVersion:
                  $ref: "#/components/schemas/FileSystemTypeVersion"
                  description: "For FSx for Lustre file systems, sets the Lustre version for the file system that you're creating. Valid values are 2.10, 2.12, and 2.15: 2.10 is supported by the Scratch and Persistent_1 Lustre deployment types. 2.12 is supported by all Lustre deployment types, except for PERSISTENT_2 with a metadata configuration mode. 2.15 is supported by all Lustre deployment types and is recommended for all new file systems. Default value is 2.10, except for the following deployments: Default value is 2.12 when DeploymentType is set to PERSISTENT_2 without a metadata configuration mode. Default value is 2.15 when DeploymentType is set to PERSISTENT_2 with a metadata configuration mode."
                OpenZFSConfiguration:
                  $ref: "#/components/schemas/CreateFileSystemOpenZFSConfiguration"
                  description: The OpenZFS configuration for the file system that's being created.
                NetworkType:
                  $ref: "#/components/schemas/NetworkType"
                  description: The network type of the Amazon FSx file system that you are creating. Valid values are IPV4 (which supports IPv4 only) and DUAL (for dual-stack mode, which supports both IPv4 and IPv6). The default is IPV4. Supported for FSx for OpenZFS, FSx for ONTAP, and FSx for Windows File Server file systems.
              required:
                - FileSystemType
                - SubnetIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFileSystemResponse"
  /CreateFileSystemFromBackup:
    post:
      operationId: CreateFileSystemFromBackup
      description: "Creates a new Amazon FSx for Lustre, Amazon FSx for Windows File Server, or Amazon FSx for OpenZFS file system from an existing Amazon FSx backup. If a file system with the specified client request token exists and the parameters match, this operation returns the description of the file system. If a file system with the specified client request token exists but the parameters don't match, this call returns IncompatibleParameterError. If a file system with the specified client request token doesn't exist, this operation does the following: Creates a new Amazon FSx file system from backup with an assigned ID, and an initial lifecycle state of CREATING. Returns the description of the file system. Parameters like the Active Directory, default share name, automatic backup, and backup settings default to the parameters of the file system that was backed up, unless overridden. You can explicitly supply other settings. By using the idempotent operation, you can retry a CreateFileSystemFromBackup call without the risk of creating an extra file system. This approach can be useful when an initial call fails in a way that makes it unclear whether a file system was created. Examples are if a transport level timeout occurred, or your connection was reset. If you use the same client request token and the initial call created a file system, the client receives a success message as long as the parameters are the same. The CreateFileSystemFromBackup call returns while the file system's lifecycle state is still CREATING. You can check the file-system creation status by calling the DescribeFileSystems operation, which returns the file system state along with other information."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.CreateFileSystemFromBackup
            default: AWSSimbaAPIService_v20180301.CreateFileSystemFromBackup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                BackupId:
                  $ref: "#/components/schemas/BackupId"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: A string of up to 63 ASCII characters that Amazon FSx uses to ensure idempotent creation. This string is automatically filled on your behalf when you use the Command Line Interface (CLI) or an Amazon Web Services SDK.
                SubnetIds:
                  $ref: "#/components/schemas/SubnetIds"
                  description: Specifies the IDs of the subnets that the file system will be accessible from. For Windows MULTI_AZ_1 file system deployment types, provide exactly two subnet IDs, one for the preferred file server and one for the standby file server. You specify one of these subnets as the preferred subnet using the WindowsConfiguration > PreferredSubnetID property. Windows SINGLE_AZ_1 and SINGLE_AZ_2 file system deployment types, Lustre file systems, and OpenZFS file systems provide exactly one subnet ID. The file server is launched in that subnet's Availability Zone.
                SecurityGroupIds:
                  $ref: "#/components/schemas/SecurityGroupIds"
                  description: A list of IDs for the security groups that apply to the specified network interfaces created for file system access. These security groups apply to all network interfaces. This value isn't returned in later DescribeFileSystem requests.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: The tags to be applied to the file system at file system creation. The key value of the Name tag appears in the console as the file system name.
                WindowsConfiguration:
                  $ref: "#/components/schemas/CreateFileSystemWindowsConfiguration"
                  description: The configuration for this Microsoft Windows file system.
                LustreConfiguration:
                  $ref: "#/components/schemas/CreateFileSystemLustreConfiguration"
                StorageType:
                  $ref: "#/components/schemas/StorageType"
                  description: Sets the storage type for the Windows, OpenZFS, or Lustre file system that you're creating from a backup. Valid values are SSD, HDD, and INTELLIGENT_TIERING. Set to SSD to use solid state drive storage. SSD is supported on all Windows and OpenZFS deployment types. Set to HDD to use hard disk drive storage. HDD is supported on SINGLE_AZ_2 and MULTI_AZ_1 FSx for Windows File Server file system deployment types. Set to INTELLIGENT_TIERING to use fully elastic, intelligently-tiered storage. Intelligent-Tiering is only available for OpenZFS file systems with the Multi-AZ deployment type and for Lustre file systems with the Persistent_2 deployment type. The default value is SSD. HDD and SSD storage types have different minimum storage capacity requirements. A restored file system's storage capacity is tied to the file system that was backed up. You can create a file system that uses HDD storage from a backup of a file system that used SSD storage if the original SSD file system had a storage capacity of at least 2000 GiB.
                KmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                FileSystemTypeVersion:
                  $ref: "#/components/schemas/FileSystemTypeVersion"
                  description: Sets the version for the Amazon FSx for Lustre file system that you're creating from a backup. Valid values are 2.10, 2.12, and 2.15. You can enter a Lustre version that is newer than the backup's FileSystemTypeVersion setting. If you don't enter a newer Lustre version, it defaults to the backup's setting.
                OpenZFSConfiguration:
                  $ref: "#/components/schemas/CreateFileSystemOpenZFSConfiguration"
                  description: The OpenZFS configuration for the file system that's being created.
                StorageCapacity:
                  $ref: "#/components/schemas/StorageCapacity"
                  description: Sets the storage capacity of the OpenZFS file system that you're creating from a backup, in gibibytes (GiB). Valid values are from 64 GiB up to 524,288 GiB (512 TiB). However, the value that you specify must be equal to or greater than the backup's storage capacity value. If you don't use the StorageCapacity parameter, the default is the backup's StorageCapacity value. If used to create a file system other than OpenZFS, you must provide a value that matches the backup's StorageCapacity value. If you provide any other value, Amazon FSx responds with an HTTP status code 400 Bad Request.
                NetworkType:
                  $ref: "#/components/schemas/NetworkType"
                  description: Sets the network type for the Amazon FSx for OpenZFS file system that you're creating from a backup.
              required:
                - BackupId
                - SubnetIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFileSystemFromBackupResponse"
  /CreateSnapshot:
    post:
      operationId: CreateSnapshot
      description: "Creates a snapshot of an existing Amazon FSx for OpenZFS volume. With snapshots, you can easily undo file changes and compare file versions by restoring the volume to a previous version. If a snapshot with the specified client request token exists, and the parameters match, this operation returns the description of the existing snapshot. If a snapshot with the specified client request token exists, and the parameters don't match, this operation returns IncompatibleParameterError. If a snapshot with the specified client request token doesn't exist, CreateSnapshot does the following: Creates a new OpenZFS snapshot with an assigned ID, and an initial lifecycle state of CREATING. Returns the description of the snapshot. By using the idempotent operation, you can retry a CreateSnapshot operation without the risk of creating an extra snapshot. This approach can be useful when an initial call fails in a way that makes it unclear whether a snapshot was created. If you use the same client request token and the initial call created a snapshot, the operation returns a successful result because all the parameters are the same. The CreateSnapshot operation returns while the snapshot's lifecycle state is still CREATING. You can check the snapshot creation status by calling the DescribeSnapshots operation, which returns the snapshot state along with other information."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.CreateSnapshot
            default: AWSSimbaAPIService_v20180301.CreateSnapshot
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Name:
                  $ref: "#/components/schemas/SnapshotName"
                  description: The name of the snapshot.
                VolumeId:
                  $ref: "#/components/schemas/VolumeId"
                  description: The ID of the volume that you are taking a snapshot of.
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - VolumeId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSnapshotResponse"
  /CreateStorageVirtualMachine:
    post:
      operationId: CreateStorageVirtualMachine
      description: Creates a storage virtual machine (SVM) for an Amazon FSx for ONTAP file system.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.CreateStorageVirtualMachine
            default: AWSSimbaAPIService_v20180301.CreateStorageVirtualMachine
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ActiveDirectoryConfiguration:
                  $ref: "#/components/schemas/CreateSvmActiveDirectoryConfiguration"
                  description: Describes the self-managed Microsoft Active Directory to which you want to join the SVM. Joining an Active Directory provides user authentication and access control for SMB clients, including Microsoft Windows and macOS clients accessing the file system.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                FileSystemId:
                  $ref: "#/components/schemas/FileSystemId"
                Name:
                  $ref: "#/components/schemas/StorageVirtualMachineName"
                  description: The name of the SVM.
                SvmAdminPassword:
                  $ref: "#/components/schemas/AdminPassword"
                  description: The password to use when managing the SVM using the NetApp ONTAP CLI or REST API. If you do not specify a password, you can still use the file system's fsxadmin user to manage the SVM.
                Tags:
                  $ref: "#/components/schemas/Tags"
                RootVolumeSecurityStyle:
                  $ref: "#/components/schemas/StorageVirtualMachineRootVolumeSecurityStyle"
                  description: "The security style of the root volume of the SVM. Specify one of the following values: UNIX if the file system is managed by a UNIX administrator, the majority of users are NFS clients, and an application accessing the data uses a UNIX user as the service account. NTFS if the file system is managed by a Microsoft Windows administrator, the majority of users are SMB clients, and an application accessing the data uses a Microsoft Windows user as the service account. MIXED This is an advanced setting. For more information, see Volume security style in the Amazon FSx for NetApp ONTAP User Guide."
              required:
                - FileSystemId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateStorageVirtualMachineResponse"
  /CreateVolume:
    post:
      operationId: CreateVolume
      description: Creates an FSx for ONTAP or Amazon FSx for OpenZFS storage volume.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.CreateVolume
            default: AWSSimbaAPIService_v20180301.CreateVolume
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                VolumeType:
                  $ref: "#/components/schemas/VolumeType"
                  description: Specifies the type of volume to create; ONTAP and OPENZFS are the only valid volume types.
                Name:
                  $ref: "#/components/schemas/VolumeName"
                  description: Specifies the name of the volume that you're creating.
                OntapConfiguration:
                  $ref: "#/components/schemas/CreateOntapVolumeConfiguration"
                  description: Specifies the configuration to use when creating the ONTAP volume.
                Tags:
                  $ref: "#/components/schemas/Tags"
                OpenZFSConfiguration:
                  $ref: "#/components/schemas/CreateOpenZFSVolumeConfiguration"
                  description: Specifies the configuration to use when creating the OpenZFS volume.
