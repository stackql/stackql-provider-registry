      type: boolean
    S3DataRepositoryConfiguration:
      description: The configuration for an Amazon S3 data repository linked to an Amazon FSx for Lustre file system with a data repository association. The configuration consists of an AutoImportPolicy that defines which file events on the data repository are automatically imported to the file system and an AutoExportPolicy that defines which file events on the file system are automatically exported to the data repository. File events are when files or directories are added, changed, or deleted on the file system or the data repository. Data repository associations on Amazon File Cache don't use S3DataRepositoryConfiguration because they don't support automatic import or automatic export.
      type: object
      properties:
        AutoImportPolicy:
          $ref: "#/components/schemas/AutoImportPolicy"
          description: Specifies the type of updated objects (new, changed, deleted) that will be automatically imported from the linked S3 bucket to your file system.
        AutoExportPolicy:
          $ref: "#/components/schemas/AutoExportPolicy"
          description: Specifies the type of updated objects (new, changed, deleted) that will be automatically exported from your file system to the linked S3 bucket.
    AutoImportPolicy:
      description: Describes the data repository association's automatic import policy. The AutoImportPolicy defines how Amazon FSx keeps your file metadata and directory listings up to date by importing changes to your Amazon FSx for Lustre file system as you modify objects in a linked S3 bucket. The AutoImportPolicy is only supported on Amazon FSx for Lustre file systems with a data repository association.
      type: object
      properties:
        Events:
          $ref: "#/components/schemas/EventTypes"
          description: "The AutoImportPolicy can have the following event values: NEW - Amazon FSx automatically imports metadata of files added to the linked S3 bucket that do not currently exist in the FSx file system. CHANGED - Amazon FSx automatically updates file metadata and invalidates existing file content on the file system as files change in the data repository. DELETED - Amazon FSx automatically deletes files on the file system as corresponding files are deleted in the data repository. You can define any combination of event types for your AutoImportPolicy."
    EventTypes:
      type: array
      items:
        $ref: "#/components/schemas/EventType"
    EventType:
      type: string
      enum:
        - NEW
        - CHANGED
        - DELETED
    AutoExportPolicy:
      description: Describes a data repository association's automatic export policy. The AutoExportPolicy defines the types of updated objects on the file system that will be automatically exported to the data repository. As you create, modify, or delete files, Amazon FSx for Lustre automatically exports the defined changes asynchronously once your application finishes modifying the file. The AutoExportPolicy is only supported on Amazon FSx for Lustre file systems with a data repository association.
      type: object
      properties:
        Events:
          $ref: "#/components/schemas/EventTypes"
          description: "The AutoExportPolicy can have the following event values: NEW - New files and directories are automatically exported to the data repository as they are added to the file system. CHANGED - Changes to files and directories on the file system are automatically exported to the data repository. DELETED - Files and directories are automatically deleted on the data repository when they are deleted on the file system. You can define any combination of event types for your AutoExportPolicy."
    CreateDataRepositoryAssociationResponse:
      type: object
      properties:
        Association:
          $ref: "#/components/schemas/DataRepositoryAssociation"
          description: The response object returned after the data repository association is created.
    DataRepositoryAssociation:
      description: "The configuration of a data repository association that links an Amazon FSx for Lustre file system to an Amazon S3 bucket or an Amazon File Cache resource to an Amazon S3 bucket or an NFS file system. The data repository association configuration object is returned in the response of the following operations: CreateDataRepositoryAssociation UpdateDataRepositoryAssociation DescribeDataRepositoryAssociations Data repository associations are supported on Amazon File Cache resources and all FSx for Lustre 2.12 and 2.15 file systems, excluding Intelligent-Tiering and scratch_1 file systems."
      type: object
      properties:
        AssociationId:
          $ref: "#/components/schemas/DataRepositoryAssociationId"
          description: The system-generated, unique ID of the data repository association.
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
        FileSystemId:
          $ref: "#/components/schemas/FileSystemId"
        Lifecycle:
          $ref: "#/components/schemas/DataRepositoryLifecycle"
          description: "Describes the state of a data repository association. The lifecycle can have the following values: CREATING - The data repository association between the file system or cache and the data repository is being created. The data repository is unavailable. AVAILABLE - The data repository association is available for use. MISCONFIGURED - The data repository association is misconfigured. Until the configuration is corrected, automatic import and automatic export will not work (only for Amazon FSx for Lustre). UPDATING - The data repository association is undergoing a customer initiated update that might affect its availability. DELETING - The data repository association is undergoing a customer initiated deletion. FAILED - The data repository association is in a terminal state that cannot be recovered."
        FailureDetails:
          $ref: "#/components/schemas/DataRepositoryFailureDetails"
        FileSystemPath:
          $ref: "#/components/schemas/Namespace"
          description: A path on the Amazon FSx for Lustre file system that points to a high-level directory (such as /ns1/) or subdirectory (such as /ns1/subdir/) that will be mapped 1-1 with DataRepositoryPath. The leading forward slash in the name is required. Two data repository associations cannot have overlapping file system paths. For example, if a data repository is associated with file system path /ns1/, then you cannot link another data repository with file system path /ns1/ns2. This path specifies where in your file system files will be exported from or imported to. This file system directory can be linked to only one Amazon S3 bucket, and no other S3 bucket can be linked to the directory. If you specify only a forward slash (/) as the file system path, you can link only one data repository to the file system. You can only specify "/" as the file system path for the first data repository associated with a file system.
        DataRepositoryPath:
          $ref: "#/components/schemas/ArchivePath"
          description: "The path to the data repository that will be linked to the cache or file system. For Amazon File Cache, the path can be an NFS data repository that will be linked to the cache. The path can be in one of two formats: If you are not using the DataRepositorySubdirectories parameter, the path is to an NFS Export directory (or one of its subdirectories) in the format nsf://nfs-domain-name/exportpath. You can therefore link a single NFS Export to a single data repository association. If you are using the DataRepositorySubdirectories parameter, the path is the domain name of the NFS file system in the format nfs://filer-domain-name, which indicates the root of the subdirectories specified with the DataRepositorySubdirectories parameter. For Amazon File Cache, the path can be an S3 bucket or prefix in the format s3://bucket-name/prefix/ (where prefix is optional). For Amazon FSx for Lustre, the path can be an S3 bucket or prefix in the format s3://bucket-name/prefix/ (where prefix is optional)."
        BatchImportMetaDataOnCreate:
          $ref: "#/components/schemas/BatchImportMetaDataOnCreate"
          description: A boolean flag indicating whether an import data repository task to import metadata should run after the data repository association is created. The task runs if this flag is set to true. BatchImportMetaDataOnCreate is not supported for data repositories linked to an Amazon File Cache resource.
        ImportedFileChunkSize:
          $ref: "#/components/schemas/Megabytes"
          description: For files imported from a data repository, this value determines the stripe count and maximum amount of data per file (in MiB) stored on a single physical disk. The maximum number of disks that a single file can be striped across is limited by the total number of disks that make up the file system or cache. The default chunk size is 1,024 MiB (1 GiB) and can go as high as 512,000 MiB (500 GiB). Amazon S3 objects have a maximum size of 5 TB.
        S3:
          $ref: "#/components/schemas/S3DataRepositoryConfiguration"
          description: The configuration for an Amazon S3 data repository linked to an Amazon FSx for Lustre file system with a data repository association.
        Tags:
          $ref: "#/components/schemas/Tags"
        CreationTime:
          $ref: "#/components/schemas/CreationTime"
        FileCacheId:
          $ref: "#/components/schemas/FileCacheId"
          description: The globally unique ID of the Amazon File Cache resource.
        FileCachePath:
          $ref: "#/components/schemas/Namespace"
          description: A path on the Amazon File Cache that points to a high-level directory (such as /ns1/) or subdirectory (such as /ns1/subdir/) that will be mapped 1-1 with DataRepositoryPath. The leading forward slash in the path is required. Two data repository associations cannot have overlapping cache paths. For example, if a data repository is associated with cache path /ns1/, then you cannot link another data repository with cache path /ns1/ns2. This path specifies the directory in your cache where files will be exported from. This cache directory can be linked to only one data repository (S3 or NFS) and no other data repository can be linked to the directory. The cache path can only be set to root (/) on an NFS DRA when DataRepositorySubdirectories is specified. If you specify root (/) as the cache path, you can create only one DRA on the cache. The cache path cannot be set to root (/) for an S3 DRA.
        DataRepositorySubdirectories:
          $ref: "#/components/schemas/SubDirectoriesPaths"
          description: For Amazon File Cache, a list of NFS Exports that will be linked with an NFS data repository association. All the subdirectories must be on a single NFS file system. The Export paths are in the format /exportpath1. To use this parameter, you must configure DataRepositoryPath as the domain name of the NFS file system. The NFS file system domain name in effect is the root of the subdirectories. Note that DataRepositorySubdirectories is not supported for S3 data repositories.
        NFS:
          $ref: "#/components/schemas/NFSDataRepositoryConfiguration"
          description: The configuration for an NFS data repository linked to an Amazon File Cache resource with a data repository association.
    DataRepositoryAssociationId:
      type: string
      minLength: 13
      maxLength: 23
      pattern: ^(dra-[0-9a-f]{8,})$
    FileCacheId:
      type: string
      minLength: 11
      maxLength: 21
      pattern: ^(fc-[0-9a-f]{8,})$
    SubDirectoriesPaths:
      type: array
      items:
        $ref: "#/components/schemas/Namespace"
    NFSDataRepositoryConfiguration:
      description: The configuration for a data repository association that links an Amazon File Cache resource to an NFS data repository.
      type: object
      properties:
        Version:
          $ref: "#/components/schemas/NfsVersion"
          description: The version of the NFS (Network File System) protocol of the NFS data repository. Currently, the only supported value is NFS3, which indicates that the data repository must support the NFSv3 protocol.
        DnsIps:
          $ref: "#/components/schemas/RepositoryDnsIps"
          description: A list of up to 2 IP addresses of DNS servers used to resolve the NFS file system domain name. The provided IP addresses can either be the IP addresses of a DNS forwarder or resolver that the customer manages and runs inside the customer VPC, or the IP addresses of the on-premises DNS servers.
        AutoExportPolicy:
          $ref: "#/components/schemas/AutoExportPolicy"
          description: This parameter is not supported for Amazon File Cache.
      required:
        - Version
    NfsVersion:
      type: string
      enum:
        - NFS3
    RepositoryDnsIps:
      type: array
      items:
        $ref: "#/components/schemas/IpAddress"
    DataRepositoryTaskType:
      type: string
      enum:
        - EXPORT_TO_REPOSITORY
        - IMPORT_METADATA_FROM_REPOSITORY
        - RELEASE_DATA_FROM_FILESYSTEM
        - AUTO_RELEASE_DATA
    DataRepositoryTaskPaths:
      type: array
      items:
        $ref: "#/components/schemas/DataRepositoryTaskPath"
    DataRepositoryTaskPath:
      type: string
      minLength: 0
      maxLength: 4096
      pattern: ^[^\u0000\u0085\u2028\u2029\r\n]{0,4096}$
    CompletionReport:
      description: Provides a report detailing the data repository task results of the files processed that match the criteria specified in the report Scope parameter. FSx delivers the report to the file system's linked data repository in Amazon S3, using the path specified in the report Path parameter. You can specify whether or not a report gets generated for a task using the Enabled parameter.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Flag"
          description: Set Enabled to True to generate a CompletionReport when the task completes. If set to true, then you need to provide a report Scope, Path, and Format. Set Enabled to False if you do not want a CompletionReport generated when the task completes.
        Path:
          $ref: "#/components/schemas/ArchivePath"
          description: "Required if Enabled is set to true. Specifies the location of the report on the file system's linked S3 data repository. An absolute path that defines where the completion report will be stored in the destination location. The Path you provide must be located within the file system’s ExportPath. An example Path value is \"s3://amzn-s3-demo-bucket/myExportPath/optionalPrefix\". The report provides the following information for each file in the report: FilePath, FileStatus, and ErrorCode."
        Format:
          $ref: "#/components/schemas/ReportFormat"
          description: Required if Enabled is set to true. Specifies the format of the CompletionReport. REPORT_CSV_20191124 is the only format currently supported. When Format is set to REPORT_CSV_20191124, the CompletionReport is provided in CSV format, and is delivered to {path}/task-{id}/failures.csv.
        Scope:
          $ref: "#/components/schemas/ReportScope"
          description: Required if Enabled is set to true. Specifies the scope of the CompletionReport; FAILED_FILES_ONLY is the only scope currently supported. When Scope is set to FAILED_FILES_ONLY, the CompletionReport only contains information about files that the data repository task failed to process.
      required:
        - Enabled
    ReportFormat:
      type: string
      enum:
        - REPORT_CSV_20191124
    ReportScope:
      type: string
      enum:
        - FAILED_FILES_ONLY
    CapacityToRelease:
      type: integer
      format: int64
      minimum: 1
      maximum: 2147483647
    ReleaseConfiguration:
      description: The configuration that specifies a minimum amount of time since last access for an exported file to be eligible for release from an Amazon FSx for Lustre file system. Only files that were last accessed before this point-in-time can be released. For example, if you specify a last accessed time criteria of 9 days, only files that were last accessed 9.00001 or more days ago can be released. Only file data that has been exported to S3 can be released. Files that have not yet been exported to S3, such as new or changed files that have not been exported, are not eligible for release. When files are released, their metadata stays on the file system, so they can still be accessed later. Users and applications can access a released file by reading the file again, which restores data from Amazon S3 to the FSx for Lustre file system. If a file meets the last accessed time criteria, its file or directory path must also be specified with the Paths parameter of the operation in order for the file to be released.
      type: object
      properties:
        DurationSinceLastAccess:
          $ref: "#/components/schemas/DurationSinceLastAccess"
          description: Defines the point-in-time since an exported file was last accessed, in order for that file to be eligible for release. Only files that were last accessed before this point-in-time are eligible to be released from the file system.
    DurationSinceLastAccess:
      description: Defines the minimum amount of time since last access for a file to be eligible for release. Only files that have been exported to S3 and that were last accessed or modified before this point-in-time are eligible to be released from the Amazon FSx for Lustre file system.
      type: object
      properties:
        Unit:
          $ref: "#/components/schemas/Unit"
          description: The unit of time used by the Value parameter to determine if a file can be released, based on when it was last accessed. DAYS is the only supported value. This is a required parameter.
        Value:
          $ref: "#/components/schemas/Value"
          description: An integer that represents the minimum amount of time (in days) since a file was last accessed in the file system. Only exported files with a MAX(atime, ctime, mtime) timestamp that is more than this amount of time in the past (relative to the task create time) will be released. The default of Value is 0. This is a required parameter. If an exported file meets the last accessed time criteria, its file or directory path must also be specified in the Paths parameter of the operation in order for the file to be released.
    Unit:
      type: string
      enum:
        - DAYS
    Value:
      type: integer
      format: int64
      minimum: 0
    CreateDataRepositoryTaskResponse:
      type: object
      properties:
        DataRepositoryTask:
          $ref: "#/components/schemas/DataRepositoryTask"
          description: The description of the data repository task that you just created.
    DataRepositoryTask:
      description: A description of the data repository task. You use import and export data repository tasks to perform bulk transfer operations between an Amazon FSx for Lustre file system and a linked data repository. You use release data repository tasks to release files that have been exported to a linked S3 bucket from your Amazon FSx for Lustre file system. An Amazon File Cache resource uses a task to automatically release files from the cache. To learn more about data repository tasks, see Data Repository Tasks.
      type: object
      properties:
        TaskId:
          $ref: "#/components/schemas/TaskId"
          description: The system-generated, unique 17-digit ID of the data repository task.
        Lifecycle:
          $ref: "#/components/schemas/DataRepositoryTaskLifecycle"
          description: "The lifecycle status of the data repository task, as follows: PENDING - The task has not started. EXECUTING - The task is in process. FAILED - The task was not able to be completed. For example, there may be files the task failed to process. The DataRepositoryTaskFailureDetails property provides more information about task failures. SUCCEEDED - The task has completed successfully. CANCELED - The task was canceled and it did not complete. CANCELING - The task is in process of being canceled. You cannot delete an FSx for Lustre file system if there are data repository tasks for the file system in the PENDING or EXECUTING states. Please retry when the data repository task is finished (with a status of CANCELED, SUCCEEDED, or FAILED). You can use the DescribeDataRepositoryTask action to monitor the task status. Contact the FSx team if you need to delete your file system immediately."
        Type:
          $ref: "#/components/schemas/DataRepositoryTaskType"
          description: The type of data repository task. EXPORT_TO_REPOSITORY tasks export from your Amazon FSx for Lustre file system to a linked data repository. IMPORT_METADATA_FROM_REPOSITORY tasks import metadata changes from a linked S3 bucket to your Amazon FSx for Lustre file system. RELEASE_DATA_FROM_FILESYSTEM tasks release files in your Amazon FSx for Lustre file system that have been exported to a linked S3 bucket and that meet your specified release criteria. AUTO_RELEASE_DATA tasks automatically release files from an Amazon File Cache resource.
        CreationTime:
          $ref: "#/components/schemas/CreationTime"
        StartTime:
          $ref: "#/components/schemas/StartTime"
          description: The time the system began processing the task.
        EndTime:
          $ref: "#/components/schemas/EndTime"
          description: The time the system completed processing the task, populated after the task is complete.
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
        Tags:
          $ref: "#/components/schemas/Tags"
        FileSystemId:
          $ref: "#/components/schemas/FileSystemId"
          description: The globally unique ID of the file system.
        Paths:
          $ref: "#/components/schemas/DataRepositoryTaskPaths"
          description: An array of paths that specify the data for the data repository task to process. For example, in an EXPORT_TO_REPOSITORY task, the paths specify which data to export to the linked data repository. (Default) If Paths is not specified, Amazon FSx uses the file system root directory.
        FailureDetails:
          $ref: "#/components/schemas/DataRepositoryTaskFailureDetails"
          description: Failure message describing why the task failed, it is populated only when Lifecycle is set to FAILED.
        Status:
          $ref: "#/components/schemas/DataRepositoryTaskStatus"
          description: Provides the status of the number of files that the task has processed successfully and failed to process.
        Report:
          $ref: "#/components/schemas/CompletionReport"
        CapacityToRelease:
          $ref: "#/components/schemas/CapacityToRelease"
          description: Specifies the amount of data to release, in GiB, by an Amazon File Cache AUTO_RELEASE_DATA task that automatically releases files from the cache.
        FileCacheId:
          $ref: "#/components/schemas/FileCacheId"
          description: The system-generated, unique ID of the cache.
        ReleaseConfiguration:
          $ref: "#/components/schemas/ReleaseConfiguration"
          description: The configuration that specifies the last accessed time criteria for files that will be released from an Amazon FSx for Lustre file system.
      required:
        - TaskId
        - Lifecycle
        - Type
        - CreationTime
    StartTime:
      type: string
      format: date-time
    EndTime:
      type: string
      format: date-time
    DataRepositoryTaskFailureDetails:
      description: Provides information about why a data repository task failed. Only populated when the task Lifecycle is set to FAILED.
      type: object
      properties:
        Message:
          $ref: "#/components/schemas/ErrorMessage"
    DataRepositoryTaskStatus:
      description: Provides the task status showing a running total of the total number of files to be processed, the number successfully processed, and the number of files the task failed to process.
      type: object
      properties:
        TotalCount:
          $ref: "#/components/schemas/TotalCount"
          description: The total number of files that the task will process. While a task is executing, the sum of SucceededCount plus FailedCount may not equal TotalCount. When the task is complete, TotalCount equals the sum of SucceededCount plus FailedCount.
        SucceededCount:
          $ref: "#/components/schemas/SucceededCount"
          description: A running total of the number of files that the task has successfully processed.
        FailedCount:
          $ref: "#/components/schemas/FailedCount"
          description: A running total of the number of files that the task failed to process.
        LastUpdatedTime:
          $ref: "#/components/schemas/LastUpdatedTime"
          description: The time at which the task status was last updated.
        ReleasedCapacity:
          $ref: "#/components/schemas/ReleasedCapacity"
          description: The total amount of data, in GiB, released by an Amazon File Cache AUTO_RELEASE_DATA task that automatically releases files from the cache.
    TotalCount:
      type: integer
      format: int64
    SucceededCount:
      type: integer
      format: int64
    FailedCount:
      type: integer
      format: int64
    LastUpdatedTime:
      type: string
      format: date-time
    ReleasedCapacity:
      type: integer
      format: int64
    FileCacheType:
      type: string
      enum:
        - LUSTRE
    SecurityGroupIds:
      description: A list of IDs specifying the security groups to apply to all network interfaces created for file system access. This list isn't returned in later requests to describe the file system.
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      description: The ID of your Amazon EC2 security group. This ID is used to control network access to the endpoint that Amazon FSx creates on your behalf in each subnet. For more information, see Amazon EC2 Security groups for Linux instances in the Amazon EC2 User Guide.
      type: string
      minLength: 11
      maxLength: 20
      pattern: ^(sg-[0-9a-f]{8,})$
    CopyTagsToDataRepositoryAssociations:
      type: boolean
    CreateFileCacheLustreConfiguration:
      description: The Amazon File Cache configuration for the cache that you are creating.
      type: object
      properties:
        PerUnitStorageThroughput:
          $ref: "#/components/schemas/PerUnitStorageThroughput"
          description: Provisions the amount of read and write throughput for each 1 tebibyte (TiB) of cache storage capacity, in MB/s/TiB. The only supported value is 1000.
        DeploymentType:
          $ref: "#/components/schemas/FileCacheLustreDeploymentType"
          description: Specifies the cache deployment type, which must be CACHE_1.
        WeeklyMaintenanceStartTime:
          $ref: "#/components/schemas/WeeklyTime"
        MetadataConfiguration:
          $ref: "#/components/schemas/FileCacheLustreMetadataConfiguration"
          description: The configuration for a Lustre MDT (Metadata Target) storage volume.
      required:
        - PerUnitStorageThroughput
        - DeploymentType
        - MetadataConfiguration
    FileCacheLustreDeploymentType:
      type: string
      enum:
        - CACHE_1
    FileCacheLustreMetadataConfiguration:
      description: The configuration for a Lustre MDT (Metadata Target) storage volume. The metadata on Amazon File Cache is managed by a Lustre Metadata Server (MDS) while the actual metadata is persisted on an MDT.
      type: object
      properties:
        StorageCapacity:
          $ref: "#/components/schemas/MetadataStorageCapacity"
          description: The storage capacity of the Lustre MDT (Metadata Target) storage volume in gibibytes (GiB). The only supported value is 2400 GiB.
      required:
        - StorageCapacity
    MetadataStorageCapacity:
      type: integer
      minimum: 0
      maximum: 2147483647
    CreateFileCacheDataRepositoryAssociations:
      type: array
      items:
        $ref: "#/components/schemas/FileCacheDataRepositoryAssociation"
    FileCacheDataRepositoryAssociation:
      description: The configuration for a data repository association (DRA) to be created during the Amazon File Cache resource creation. The DRA links the cache to either an Amazon S3 bucket or prefix, or a Network File System (NFS) data repository that supports the NFSv3 protocol. The DRA does not support automatic import or automatic export.
      type: object
      properties:
        FileCachePath:
          $ref: "#/components/schemas/Namespace"
          description: A path on the cache that points to a high-level directory (such as /ns1/) or subdirectory (such as /ns1/subdir/) that will be mapped 1-1 with DataRepositoryPath. The leading forward slash in the name is required. Two data repository associations cannot have overlapping cache paths. For example, if a data repository is associated with cache path /ns1/, then you cannot link another data repository with cache path /ns1/ns2. This path specifies where in your cache files will be exported from. This cache directory can be linked to only one data repository, and no data repository other can be linked to the directory. The cache path can only be set to root (/) on an NFS DRA when DataRepositorySubdirectories is specified. If you specify root (/) as the cache path, you can create only one DRA on the cache. The cache path cannot be set to root (/) for an S3 DRA.
        DataRepositoryPath:
          $ref: "#/components/schemas/ArchivePath"
          description: "The path to the S3 or NFS data repository that links to the cache. You must provide one of the following paths: The path can be an NFS data repository that links to the cache. The path can be in one of two formats: If you are not using the DataRepositorySubdirectories parameter, the path is to an NFS Export directory (or one of its subdirectories) in the format nfs://nfs-domain-name/exportpath. You can therefore link a single NFS Export to a single data repository association. If you are using the DataRepositorySubdirectories parameter, the path is the domain name of the NFS file system in the format nfs://filer-domain-name, which indicates the root of the subdirectories specified with the DataRepositorySubdirectories parameter. The path can be an S3 bucket or prefix in the format s3://bucket-name/prefix/ (where prefix is optional)."
        DataRepositorySubdirectories:
          $ref: "#/components/schemas/SubDirectoriesPaths"
          description: A list of NFS Exports that will be linked with this data repository association. The Export paths are in the format /exportpath1. To use this parameter, you must configure DataRepositoryPath as the domain name of the NFS file system. The NFS file system domain name in effect is the root of the subdirectories. Note that DataRepositorySubdirectories is not supported for S3 data repositories.
        NFS:
          $ref: "#/components/schemas/FileCacheNFSConfiguration"
          description: The configuration for a data repository association that links an Amazon File Cache resource to an NFS data repository.
      required:
        - FileCachePath
        - DataRepositoryPath
    FileCacheNFSConfiguration:
      description: The configuration for an NFS data repository association (DRA) created during the creation of the Amazon File Cache resource.
      type: object
      properties:
        Version:
          $ref: "#/components/schemas/NfsVersion"
          description: The version of the NFS (Network File System) protocol of the NFS data repository. The only supported value is NFS3, which indicates that the data repository must support the NFSv3 protocol.
        DnsIps:
          $ref: "#/components/schemas/RepositoryDnsIps"
          description: A list of up to 2 IP addresses of DNS servers used to resolve the NFS file system domain name. The provided IP addresses can either be the IP addresses of a DNS forwarder or resolver that the customer manages and runs inside the customer VPC, or the IP addresses of the on-premises DNS servers.
      required:
        - Version
    CreateFileCacheResponse:
      type: object
      properties:
        FileCache:
          $ref: "#/components/schemas/FileCacheCreating"
          description: A description of the cache that was created.
    FileCacheCreating:
      description: The response object for the Amazon File Cache resource being created in the CreateFileCache operation.
      type: object
      properties:
        OwnerId:
          $ref: "#/components/schemas/AWSAccountId"
        CreationTime:
          $ref: "#/components/schemas/CreationTime"
        FileCacheId:
          $ref: "#/components/schemas/FileCacheId"
          description: The system-generated, unique ID of the cache.
        FileCacheType:
          $ref: "#/components/schemas/FileCacheType"
          description: The type of cache, which must be LUSTRE.
        FileCacheTypeVersion:
          $ref: "#/components/schemas/FileSystemTypeVersion"
          description: The Lustre version of the cache, which must be 2.12.
        Lifecycle:
          $ref: "#/components/schemas/FileCacheLifecycle"
          description: "The lifecycle status of the cache. The following are the possible values and what they mean: AVAILABLE - The cache is in a healthy state, and is reachable and available for use. CREATING - The new cache is being created. DELETING - An existing cache is being deleted. UPDATING - The cache is undergoing a customer-initiated update. FAILED - An existing cache has experienced an unrecoverable failure. When creating a new cache, the cache was unable to be created."
        FailureDetails:
          $ref: "#/components/schemas/FileCacheFailureDetails"
          description: A structure providing details of any failures that occurred in creating a cache.
        StorageCapacity:
          $ref: "#/components/schemas/StorageCapacity"
          description: The storage capacity of the cache in gibibytes (GiB).
        VpcId:
          $ref: "#/components/schemas/VpcId"
        SubnetIds:
          $ref: "#/components/schemas/SubnetIds"
        NetworkInterfaceIds:
          $ref: "#/components/schemas/NetworkInterfaceIds"
        DNSName:
          $ref: "#/components/schemas/DNSName"
          description: The Domain Name System (DNS) name for the cache.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: Specifies the ID of the Key Management Service (KMS) key to use for encrypting data on an Amazon File Cache. If a KmsKeyId isn't specified, the Amazon FSx-managed KMS key for your account is used. For more information, see Encrypt in the Key Management Service API Reference.
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
        Tags:
          $ref: "#/components/schemas/Tags"
        CopyTagsToDataRepositoryAssociations:
          $ref: "#/components/schemas/CopyTagsToDataRepositoryAssociations"
          description: A boolean flag indicating whether tags for the cache should be copied to data repository associations.
        LustreConfiguration:
          $ref: "#/components/schemas/FileCacheLustreConfiguration"
          description: The configuration for the Amazon File Cache resource.
        DataRepositoryAssociationIds:
          $ref: "#/components/schemas/DataRepositoryAssociationIds"
          description: A list of IDs of data repository associations that are associated with this cache.
    FileCacheLifecycle:
      type: string
      enum:
        - AVAILABLE
        - CREATING
        - DELETING
        - UPDATING
        - FAILED
    FileCacheFailureDetails:
      description: A structure providing details of any failures that occurred.
      type: object
      properties:
        Message:
          $ref: "#/components/schemas/ErrorMessage"
          description: A message describing any failures that occurred.
    FileCacheLustreConfiguration:
      description: The configuration for the Amazon File Cache resource.
      type: object
      properties:
        PerUnitStorageThroughput:
          $ref: "#/components/schemas/PerUnitStorageThroughput"
          description: Per unit storage throughput represents the megabytes per second of read or write throughput per 1 tebibyte of storage provisioned. Cache throughput capacity is equal to Storage capacity (TiB) * PerUnitStorageThroughput (MB/s/TiB). The only supported value is 1000.
        DeploymentType:
          $ref: "#/components/schemas/FileCacheLustreDeploymentType"
          description: The deployment type of the Amazon File Cache resource, which must be CACHE_1.
        MountName:
          $ref: "#/components/schemas/LustreFileSystemMountName"
          description: You use the MountName value when mounting the cache. If you pass a cache ID to the DescribeFileCaches operation, it returns the the MountName value as part of the cache's description.
        WeeklyMaintenanceStartTime:
          $ref: "#/components/schemas/WeeklyTime"
        MetadataConfiguration:
          $ref: "#/components/schemas/FileCacheLustreMetadataConfiguration"
          description: The configuration for a Lustre MDT (Metadata Target) storage volume.
        LogConfiguration:
          $ref: "#/components/schemas/LustreLogConfiguration"
          description: The configuration for Lustre logging used to write the enabled logging events for your Amazon File Cache resource to Amazon CloudWatch Logs.
    DataRepositoryAssociationIds:
      type: array
      items:
        $ref: "#/components/schemas/DataRepositoryAssociationId"
    CreateFileSystemWindowsConfiguration:
      description: The configuration object for the Microsoft Windows file system used in CreateFileSystem and CreateFileSystemFromBackup operations.
      type: object
      properties:
        ActiveDirectoryId:
          $ref: "#/components/schemas/DirectoryId"
          description: The ID for an existing Amazon Web Services Managed Microsoft Active Directory (AD) instance that the file system should join when it's created.
        SelfManagedActiveDirectoryConfiguration:
          $ref: "#/components/schemas/SelfManagedActiveDirectoryConfiguration"
        DeploymentType:
          $ref: "#/components/schemas/WindowsDeploymentType"
          description: "Specifies the file system deployment type, valid values are the following: MULTI_AZ_1 - Deploys a high availability file system that is configured for Multi-AZ redundancy to tolerate temporary Availability Zone (AZ) unavailability. You can only deploy a Multi-AZ file system in Amazon Web Services Regions that have a minimum of three Availability Zones. Also supports HDD storage type SINGLE_AZ_1 - (Default) Choose to deploy a file system that is configured for single AZ redundancy. SINGLE_AZ_2 - The latest generation Single AZ file system. Specifies a file system that is configured for single AZ redundancy and supports HDD storage type. For more information, see Availability and Durability: Single-AZ and Multi-AZ File Systems."
        PreferredSubnetId:
          $ref: "#/components/schemas/SubnetId"
          description: Required when DeploymentType is set to MULTI_AZ_1. This specifies the subnet in which you want the preferred file server to be located. For in-Amazon Web Services applications, we recommend that you launch your clients in the same Availability Zone (AZ) as your preferred file server to reduce cross-AZ data transfer costs and minimize latency.
        ThroughputCapacity:
          $ref: "#/components/schemas/MegabytesPerSecond"
          description: Sets the throughput capacity of an Amazon FSx file system, measured in megabytes per second (MB/s), in 2 to the nth increments, between 2^3 (8) and 2^11 (2048).
        WeeklyMaintenanceStartTime:
          $ref: "#/components/schemas/WeeklyTime"
          description: The preferred start time to perform weekly maintenance, formatted d:HH:MM in the UTC time zone, where d is the weekday number, from 1 through 7, beginning with Monday and ending with Sunday.
        DailyAutomaticBackupStartTime:
          $ref: "#/components/schemas/DailyTime"
          description: The preferred time to take daily automatic backups, formatted HH:MM in the UTC time zone.
        AutomaticBackupRetentionDays:
          $ref: "#/components/schemas/AutomaticBackupRetentionDays"
          description: The number of days to retain automatic backups. Setting this property to 0 disables automatic backups. You can retain automatic backups for a maximum of 90 days. The default is 30.
        CopyTagsToBackups:
          $ref: "#/components/schemas/Flag"
          description: A boolean flag indicating whether tags for the file system should be copied to backups. This value defaults to false. If it's set to true, all tags for the file system are copied to all automatic and user-initiated backups where the user doesn't specify tags. If this value is true, and you specify one or more tags, only the specified tags are copied to backups. If you specify one or more tags when creating a user-initiated backup, no tags are copied from the file system, regardless of this value.
        Aliases:
          $ref: "#/components/schemas/AlternateDNSNames"
          description: "An array of one or more DNS alias names that you want to associate with the Amazon FSx file system. Aliases allow you to use existing DNS names to access the data in your Amazon FSx file system. You can associate up to 50 aliases with a file system at any time. You can associate additional DNS aliases after you create the file system using the AssociateFileSystemAliases operation. You can remove DNS aliases from the file system after it is created using the DisassociateFileSystemAliases operation. You only need to specify the alias name in the request payload. For more information, see Managing DNS aliases and Accessing data using DNS aliases. An alias name has to meet the following requirements: Formatted as a fully-qualified domain name (FQDN), hostname.domain, for example, accounting.example.com. Can contain alphanumeric characters, the underscore (_), and the hyphen (-). Cannot start or end with a hyphen. Can start with a numeric. For DNS alias names, Amazon FSx stores alphabetic characters as lowercase letters (a-z), regardless of how you specify them: as uppercase letters, lowercase letters, or the corresponding letters in escape codes."
        AuditLogConfiguration:
          $ref: "#/components/schemas/WindowsAuditLogCreateConfiguration"
          description: The configuration that Amazon FSx for Windows File Server uses to audit and log user accesses of files, folders, and file shares on the Amazon FSx for Windows File Server file system.
        DiskIopsConfiguration:
          $ref: "#/components/schemas/DiskIopsConfiguration"
          description: The SSD IOPS (input/output operations per second) configuration for an Amazon FSx for Windows file system. By default, Amazon FSx automatically provisions 3 IOPS per GiB of storage capacity. You can provision additional IOPS per GiB of storage, up to the maximum limit associated with your chosen throughput capacity.
        FsrmConfiguration:
          $ref: "#/components/schemas/WindowsFsrmConfiguration"
          description: The File Server Resource Manager (FSRM) configuration that Amazon FSx for Windows File Server uses for the file system. FSRM is disabled by default.
      required:
        - ThroughputCapacity
    SelfManagedActiveDirectoryConfiguration:
      description: The configuration that Amazon FSx uses to join a FSx for Windows File Server file system or an FSx for ONTAP storage virtual machine (SVM) to a self-managed (including on-premises) Microsoft Active Directory (AD) directory. For more information, see Using Amazon FSx for Windows with your self-managed Microsoft Active Directory or Managing FSx for ONTAP SVMs.
      type: object
      properties:
        DomainName:
          $ref: "#/components/schemas/ActiveDirectoryFullyQualifiedName"
          description: The fully qualified domain name of the self-managed AD directory, such as corp.example.com.
        OrganizationalUnitDistinguishedName:
          $ref: "#/components/schemas/OrganizationalUnitDistinguishedName"
          description: (Optional) The fully qualified distinguished name of the organizational unit within your self-managed AD directory. Amazon FSx only accepts OU as the direct parent of the file system. An example is OU=FSx,DC=yourdomain,DC=corp,DC=com. To learn more, see RFC 2253. If none is provided, the FSx file system is created in the default location of your self-managed AD directory. Only Organizational Unit (OU) objects can be the direct parent of the file system that you're creating.
        FileSystemAdministratorsGroup:
          $ref: "#/components/schemas/FileSystemAdministratorsGroupName"
          description: (Optional) The name of the domain group whose members are granted administrative privileges for the file system. Administrative privileges include taking ownership of files and folders, setting audit controls (audit ACLs) on files and folders, and administering the file system remotely by using the FSx Remote PowerShell. The group that you specify must already exist in your domain. If you don't provide one, your AD domain's Domain Admins group is used.
        UserName:
          $ref: "#/components/schemas/DirectoryUserName"
          description: The user name for the service account on your self-managed AD domain that Amazon FSx will use to join to your AD domain. This account must have the permission to join computers to the domain in the organizational unit provided in OrganizationalUnitDistinguishedName, or in the default location of your AD domain.
        Password:
          $ref: "#/components/schemas/DirectoryPassword"
          description: The password for the service account on your self-managed AD domain that Amazon FSx will use to join to your AD domain.
        DnsIps:
          $ref: "#/components/schemas/DnsIps"
          description: A list of up to three IP addresses of DNS servers or domain controllers in the self-managed AD directory.
        DomainJoinServiceAccountSecret:
          $ref: "#/components/schemas/CustomerSecretsManagerARN"
          description: "The Amazon Resource Name (ARN) of the Amazon Web Services Secrets Manager secret containing the self-managed Active Directory domain join service account credentials. When provided, Amazon FSx uses the credentials stored in this secret to join the file system to your self-managed Active Directory domain. The secret must contain two key-value pairs: CUSTOMER_MANAGED_ACTIVE_DIRECTORY_USERNAME - The username for the service account CUSTOMER_MANAGED_ACTIVE_DIRECTORY_PASSWORD - The password for the service account For more information, see Using Amazon FSx for Windows with your self-managed Microsoft Active Directory or Using Amazon FSx for ONTAP with your self-managed Microsoft Active Directory."
      required:
        - DomainName
        - DnsIps
    DirectoryPassword:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^.{1,256}$
    WindowsAuditLogCreateConfiguration:
      description: The Windows file access auditing configuration used when creating or updating an Amazon FSx for Windows File Server file system.
      type: object
      properties:
        FileAccessAuditLogLevel:
          $ref: "#/components/schemas/WindowsAccessAuditLogLevel"
          description: Sets which attempt type is logged by Amazon FSx for file and folder accesses. SUCCESS_ONLY - only successful attempts to access files or folders are logged. FAILURE_ONLY - only failed attempts to access files or folders are logged. SUCCESS_AND_FAILURE - both successful attempts and failed attempts to access files or folders are logged. DISABLED - access auditing of files and folders is turned off.
        FileShareAccessAuditLogLevel:
          $ref: "#/components/schemas/WindowsAccessAuditLogLevel"
          description: Sets which attempt type is logged by Amazon FSx for file share accesses. SUCCESS_ONLY - only successful attempts to access file shares are logged. FAILURE_ONLY - only failed attempts to access file shares are logged. SUCCESS_AND_FAILURE - both successful attempts and failed attempts to access file shares are logged. DISABLED - access auditing of file shares is turned off.
        AuditLogDestination:
          $ref: "#/components/schemas/GeneralARN"
          description: "The Amazon Resource Name (ARN) that specifies the destination of the audit logs. The destination can be any Amazon CloudWatch Logs log group ARN or Amazon Kinesis Data Firehose delivery stream ARN, with the following requirements: The destination ARN that you provide (either CloudWatch Logs log group or Kinesis Data Firehose delivery stream) must be in the same Amazon Web Services partition, Amazon Web Services Region, and Amazon Web Services account as your Amazon FSx file system. The name of the Amazon CloudWatch Logs log group must begin with the /aws/fsx prefix. The name of the Amazon Kinesis Data Firehose delivery stream must begin with the aws-fsx prefix. If you do not provide a destination in AuditLogDestination, Amazon FSx will create and use a log stream in the CloudWatch Logs /aws/fsx/windows log group. If AuditLogDestination is provided and the resource does not exist, the request will fail with a BadRequest error. If FileAccessAuditLogLevel and FileShareAccessAuditLogLevel are both set to DISABLED, you cannot specify a destination in AuditLogDestination."
      required:
        - FileAccessAuditLogLevel
        - FileShareAccessAuditLogLevel
    CreateFileSystemLustreConfiguration:
      description: The Lustre configuration for the file system being created. The following parameters are not supported for file systems with a data repository association created with . AutoImportPolicy ExportPath ImportedFileChunkSize ImportPath
      type: object
      properties:
        WeeklyMaintenanceStartTime:
          $ref: "#/components/schemas/WeeklyTime"
          description: (Optional) The preferred start time to perform weekly maintenance, formatted d:HH:MM in the UTC time zone, where d is the weekday number, from 1 through 7, beginning with Monday and ending with Sunday.
        ImportPath:
          $ref: "#/components/schemas/ArchivePath"
          description: (Optional) The path to the Amazon S3 bucket (including the optional prefix) that you're using as the data repository for your Amazon FSx for Lustre file system. The root of your FSx for Lustre file system will be mapped to the root of the Amazon S3 bucket you select. An example is s3://import-bucket/optional-prefix. If you specify a prefix after the Amazon S3 bucket name, only object keys with that prefix are loaded into the file system. This parameter is not supported for file systems with a data repository association.
        ExportPath:
          $ref: "#/components/schemas/ArchivePath"
          description: (Optional) Specifies the path in the Amazon S3 bucket where the root of your Amazon FSx file system is exported. The path must use the same Amazon S3 bucket as specified in ImportPath. You can provide an optional prefix to which new and changed data is to be exported from your Amazon FSx for Lustre file system. If an ExportPath value is not provided, Amazon FSx sets a default export path, s3://import-bucket/FSxLustre[creation-timestamp]. The timestamp is in UTC format, for example s3://import-bucket/FSxLustre20181105T222312Z. The Amazon S3 export bucket must be the same as the import bucket specified by ImportPath. If you specify only a bucket name, such as s3://import-bucket, you get a 1:1 mapping of file system objects to S3 bucket objects. This mapping means that the input data in S3 is overwritten on export. If you provide a custom prefix in the export path, such as s3://import-bucket/[custom-optional-prefix], Amazon FSx exports the contents of your file system to that export prefix in the Amazon S3 bucket. This parameter is not supported for file systems with a data repository association.
        ImportedFileChunkSize:
          $ref: "#/components/schemas/Megabytes"
          description: (Optional) For files imported from a data repository, this value determines the stripe count and maximum amount of data per file (in MiB) stored on a single physical disk. The maximum number of disks that a single file can be striped across is limited by the total number of disks that make up the file system. The default chunk size is 1,024 MiB (1 GiB) and can go as high as 512,000 MiB (500 GiB). Amazon S3 objects have a maximum size of 5 TB. This parameter is not supported for file systems with a data repository association.
        DeploymentType:
          $ref: "#/components/schemas/LustreDeploymentType"
          description: (Optional) Choose SCRATCH_1 and SCRATCH_2 deployment types when you need temporary storage and shorter-term processing of data. The SCRATCH_2 deployment type provides in-transit encryption of data and higher burst throughput capacity than SCRATCH_1. Choose PERSISTENT_1 for longer-term storage and for throughput-focused workloads that aren’t latency-sensitive. PERSISTENT_1 supports encryption of data in transit, and is available in all Amazon Web Services Regions in which FSx for Lustre is available. Choose PERSISTENT_2 for longer-term storage and for latency-sensitive workloads that require the highest levels of IOPS/throughput. PERSISTENT_2 supports the SSD and Intelligent-Tiering storage classes. You can optionally specify a metadata configuration mode for PERSISTENT_2 which supports increasing metadata performance. PERSISTENT_2 is available in a limited number of Amazon Web Services Regions. For more information, and an up-to-date list of Amazon Web Services Regions in which PERSISTENT_2 is available, see Deployment and storage class options for FSx for Lustre file systems in the Amazon FSx for Lustre User Guide. If you choose PERSISTENT_2, and you set FileSystemTypeVersion to 2.10, the CreateFileSystem operation fails. Encryption of data in transit is automatically turned on when you access SCRATCH_2, PERSISTENT_1, and PERSISTENT_2 file systems from Amazon EC2 instances that support automatic encryption in the Amazon Web Services Regions where they are available. For more information about encryption in transit for FSx for Lustre file systems, see Encrypting data in transit in the Amazon FSx for Lustre User Guide. (Default = SCRATCH_1)
        AutoImportPolicy:
          $ref: "#/components/schemas/AutoImportPolicyType"
          description: "(Optional) When you create your file system, your existing S3 objects appear as file and directory listings. Use this parameter to choose how Amazon FSx keeps your file and directory listings up to date as you add or modify objects in your linked S3 bucket. AutoImportPolicy can have the following values: NONE - (Default) AutoImport is off. Amazon FSx only updates file and directory listings from the linked S3 bucket when the file system is created. FSx does not update file and directory listings for any new or changed objects after choosing this option. NEW - AutoImport is on. Amazon FSx automatically imports directory listings of any new objects added to the linked S3 bucket that do not currently exist in the FSx file system. NEW_CHANGED - AutoImport is on. Amazon FSx automatically imports file and directory listings of any new objects added to the S3 bucket and any existing objects that are changed in the S3 bucket after you choose this option. NEW_CHANGED_DELETED - AutoImport is on. Amazon FSx automatically imports file and directory listings of any new objects added to the S3 bucket, any existing objects that are changed in the S3 bucket, and any objects that were deleted in the S3 bucket. For more information, see Automatically import updates from your S3 bucket. This parameter is not supported for file systems with a data repository association."
        PerUnitStorageThroughput:
          $ref: "#/components/schemas/PerUnitStorageThroughput"
          description: "Required with PERSISTENT_1 and PERSISTENT_2 deployment types using an SSD or HDD storage class, provisions the amount of read and write throughput for each 1 tebibyte (TiB) of file system storage capacity, in MB/s/TiB. File system throughput capacity is calculated by multiplying ﬁle system storage capacity (TiB) by the PerUnitStorageThroughput (MB/s/TiB). For a 2.4-TiB ﬁle system, provisioning 50 MB/s/TiB of PerUnitStorageThroughput yields 120 MB/s of ﬁle system throughput. You pay for the amount of throughput that you provision. Valid values: For PERSISTENT_1 SSD storage: 50, 100, 200 MB/s/TiB. For PERSISTENT_1 HDD storage: 12, 40 MB/s/TiB. For PERSISTENT_2 SSD storage: 125, 250, 500, 1000 MB/s/TiB."
        DailyAutomaticBackupStartTime:
          $ref: "#/components/schemas/DailyTime"
        AutomaticBackupRetentionDays:
          $ref: "#/components/schemas/AutomaticBackupRetentionDays"
          description: The number of days to retain automatic backups. Setting this property to 0 disables automatic backups. You can retain automatic backups for a maximum of 90 days. The default is 0.
        CopyTagsToBackups:
          $ref: "#/components/schemas/Flag"
          description: (Optional) Not available for use with file systems that are linked to a data repository. A boolean flag indicating whether tags for the file system should be copied to backups. The default value is false. If CopyTagsToBackups is set to true, all file system tags are copied to all automatic and user-initiated backups when the user doesn't specify any backup-specific tags. If CopyTagsToBackups is set to true and you specify one or more backup tags, only the specified tags are copied to backups. If you specify one or more tags when creating a user-initiated backup, no tags are copied from the file system, regardless of this value. (Default = false) For more information, see Working with backups in the Amazon FSx for Lustre User Guide.
        DriveCacheType:
          $ref: "#/components/schemas/DriveCacheType"
          description: The type of drive cache used by PERSISTENT_1 file systems that are provisioned with HDD storage devices. This parameter is required when storage type is HDD. Set this property to READ to improve the performance for frequently accessed files by caching up to 20% of the total storage capacity of the file system. This parameter is required when StorageType is set to HDD.
        DataCompressionType:
          $ref: "#/components/schemas/DataCompressionType"
          description: "Sets the data compression configuration for the file system. DataCompressionType can have the following values: NONE - (Default) Data compression is turned off when the file system is created. LZ4 - Data compression is turned on with the LZ4 algorithm. For more information, see Lustre data compression in the Amazon FSx for Lustre User Guide."
        EfaEnabled:
          $ref: "#/components/schemas/Flag"
          description: (Optional) Specifies whether Elastic Fabric Adapter (EFA) and GPUDirect Storage (GDS) support is enabled for the Amazon FSx for Lustre file system. (Default = false)
        LogConfiguration:
          $ref: "#/components/schemas/LustreLogCreateConfiguration"
          description: The Lustre logging configuration used when creating an Amazon FSx for Lustre file system. When logging is enabled, Lustre logs error and warning events for data repositories associated with your file system to Amazon CloudWatch Logs.
        RootSquashConfiguration:
          $ref: "#/components/schemas/LustreRootSquashConfiguration"
          description: The Lustre root squash configuration used when creating an Amazon FSx for Lustre file system. When enabled, root squash restricts root-level access from clients that try to access your file system as a root user.
        MetadataConfiguration:
          $ref: "#/components/schemas/CreateFileSystemLustreMetadataConfiguration"
          description: The Lustre metadata performance configuration for the creation of an FSx for Lustre file system using a PERSISTENT_2 deployment type.
        ThroughputCapacity:
          $ref: "#/components/schemas/ThroughputCapacityMbps"
          description: Specifies the throughput of an FSx for Lustre file system using the Intelligent-Tiering storage class, measured in megabytes per second (MBps). Valid values are 4000 MBps or multiples of 4000 MBps. You pay for the amount of throughput that you provision.
        DataReadCacheConfiguration:
          $ref: "#/components/schemas/LustreReadCacheConfiguration"
          description: Specifies the optional provisioned SSD read cache on FSx for Lustre file systems that use the Intelligent-Tiering storage class. Required when StorageType is set to INTELLIGENT_TIERING.
    LustreLogCreateConfiguration:
      description: The Lustre logging configuration used when creating or updating an Amazon FSx for Lustre file system. An Amazon File Cache is created with Lustre logging enabled by default, with a setting of WARN_ERROR for the logging events. which can't be changed. Lustre logging writes the enabled logging events for your file system or cache to Amazon CloudWatch Logs.
      type: object
      properties:
        Level:
          $ref: "#/components/schemas/LustreAccessAuditLogLevel"
          description: Sets which data repository events are logged by Amazon FSx. WARN_ONLY - only warning events are logged. ERROR_ONLY - only error events are logged. WARN_ERROR - both warning events and error events are logged. DISABLED - logging of data repository events is turned off.
        Destination:
          $ref: "#/components/schemas/GeneralARN"
          description: "The Amazon Resource Name (ARN) that specifies the destination of the logs. The destination can be any Amazon CloudWatch Logs log group ARN, with the following requirements: The destination ARN that you provide must be in the same Amazon Web Services partition, Amazon Web Services Region, and Amazon Web Services account as your Amazon FSx file system. The name of the Amazon CloudWatch Logs log group must begin with the /aws/fsx prefix. If you do not provide a destination, Amazon FSx will create and use a log stream in the CloudWatch Logs /aws/fsx/lustre log group (for Amazon FSx for Lustre) or /aws/fsx/filecache (for Amazon File Cache). If Destination is provided and the resource does not exist, the request will fail with a BadRequest error. If Level is set to DISABLED, you cannot specify a destination in Destination."
      required:
        - Level
    CreateFileSystemLustreMetadataConfiguration:
      description: The Lustre metadata performance configuration for the creation of an Amazon FSx for Lustre file system using a PERSISTENT_2 deployment type. The configuration uses a Metadata IOPS value to set the maximum rate of metadata disk IOPS supported by the file system. After creation, the file system supports increasing metadata performance. For more information on Metadata IOPS, see Lustre metadata performance configuration in the Amazon FSx for Lustre User Guide.
      type: object
      properties:
        Iops:
          $ref: "#/components/schemas/MetadataIops"
          description: (USER_PROVISIONED mode only) Specifies the number of Metadata IOPS to provision for the file system. This parameter sets the maximum rate of metadata disk IOPS supported by the file system. For SSD file systems, valid values are 1500, 3000, 6000, 12000, and multiples of 12000 up to a maximum of 192000. For Intelligent-Tiering file systems, valid values are 6000 and 12000. Iops doesn’t have a default value. If you're using USER_PROVISIONED mode, you can choose to specify a valid value. If you're using AUTOMATIC mode, you cannot specify a value because FSx for Lustre automatically sets the value based on your file system storage capacity.
        Mode:
          $ref: "#/components/schemas/MetadataConfigurationMode"
          description: The metadata configuration mode for provisioning Metadata IOPS for an FSx for Lustre file system using a PERSISTENT_2 deployment type. In AUTOMATIC mode (supported only on SSD file systems), FSx for Lustre automatically provisions and scales the number of Metadata IOPS for your file system based on your file system storage capacity. In USER_PROVISIONED mode, you specify the number of Metadata IOPS to provision for your file system.
      required:
        - Mode
    CreateFileSystemOntapConfiguration:
      description: The ONTAP configuration properties of the FSx for ONTAP file system that you are creating.
      type: object
      properties:
        AutomaticBackupRetentionDays:
          $ref: "#/components/schemas/AutomaticBackupRetentionDays"
        DailyAutomaticBackupStartTime:
          $ref: "#/components/schemas/DailyTime"
        DeploymentType:
          $ref: "#/components/schemas/OntapDeploymentType"
          description: Specifies the FSx for ONTAP file system deployment type to use in creating the file system. MULTI_AZ_1 - A high availability file system configured for Multi-AZ redundancy to tolerate temporary Availability Zone (AZ) unavailability. This is a first-generation FSx for ONTAP file system. MULTI_AZ_2 - A high availability file system configured for Multi-AZ redundancy to tolerate temporary AZ unavailability. This is a second-generation FSx for ONTAP file system. SINGLE_AZ_1 - A file system configured for Single-AZ redundancy. This is a first-generation FSx for ONTAP file system. SINGLE_AZ_2 - A file system configured with multiple high-availability (HA) pairs for Single-AZ redundancy. This is a second-generation FSx for ONTAP file system. For information about the use cases for Multi-AZ and Single-AZ deployments, refer to Choosing a file system deployment type.
        EndpointIpAddressRange:
          $ref: "#/components/schemas/IpAddressRange"
          description: (Multi-AZ only) Specifies the IPv4 address range in which the endpoints to access your file system will be created. By default in the Amazon FSx API, Amazon FSx selects an unused IP address range for you from the 198.19.* range. By default in the Amazon FSx console, Amazon FSx chooses the last 64 IP addresses from the VPC’s primary CIDR range to use as the endpoint IP address range for the file system. You can have overlapping endpoint IP addresses for file systems deployed in the same VPC/route tables, as long as they don't overlap with any subnet.
        FsxAdminPassword:
          $ref: "#/components/schemas/AdminPassword"
          description: The ONTAP administrative password for the fsxadmin user with which you administer your file system using the NetApp ONTAP CLI and REST API.
        DiskIopsConfiguration:
          $ref: "#/components/schemas/DiskIopsConfiguration"
          description: The SSD IOPS configuration for the FSx for ONTAP file system.
        PreferredSubnetId:
          $ref: "#/components/schemas/SubnetId"
          description: Required when DeploymentType is set to MULTI_AZ_1 or MULTI_AZ_2. This specifies the subnet in which you want the preferred file server to be located.
        RouteTableIds:
          $ref: "#/components/schemas/RouteTableIds"
          description: "(Multi-AZ only) Specifies the route tables in which Amazon FSx creates the rules for routing traffic to the correct file server. You should specify all virtual private cloud (VPC) route tables associated with the subnets in which your clients are located. By default, Amazon FSx selects your VPC's default route table. Amazon FSx manages these route tables for Multi-AZ file systems using tag-based authentication. These route tables are tagged with Key: AmazonFSx; Value: ManagedByAmazonFSx. When creating FSx for ONTAP Multi-AZ file systems using CloudFormation we recommend that you add the Key: AmazonFSx; Value: ManagedByAmazonFSx tag manually."
        ThroughputCapacity:
          $ref: "#/components/schemas/MegabytesPerSecond"
          description: "Sets the throughput capacity for the file system that you're creating in megabytes per second (MBps). For more information, see Managing throughput capacity in the FSx for ONTAP User Guide. Amazon FSx responds with an HTTP status code 400 (Bad Request) for the following conditions: The value of ThroughputCapacity and ThroughputCapacityPerHAPair are not the same value. The value of ThroughputCapacity when divided by the value of HAPairs is outside of the valid range for ThroughputCapacity."
        WeeklyMaintenanceStartTime:
          $ref: "#/components/schemas/WeeklyTime"
        HAPairs:
          $ref: "#/components/schemas/HAPairs"
          description: "Specifies how many high-availability (HA) pairs of file servers will power your file system. First-generation file systems are powered by 1 HA pair. Second-generation multi-AZ file systems are powered by 1 HA pair. Second generation single-AZ file systems are powered by up to 12 HA pairs. The default value is 1. The value of this property affects the values of StorageCapacity, Iops, and ThroughputCapacity. For more information, see High-availability (HA) pairs in the FSx for ONTAP user guide. Block storage protocol support (iSCSI and NVMe over TCP) is disabled on file systems with more than 6 HA pairs. For more information, see Using block storage protocols. Amazon FSx responds with an HTTP status code 400 (Bad Request) for the following conditions: The value of HAPairs is less than 1 or greater than 12. The value of HAPairs is greater than 1 and the value of DeploymentType is SINGLE_AZ_1, MULTI_AZ_1, or MULTI_AZ_2."
        ThroughputCapacityPerHAPair:
          $ref: "#/components/schemas/ThroughputCapacityPerHAPair"
          description: "Use to choose the throughput capacity per HA pair, rather than the total throughput for the file system. You can define either the ThroughputCapacityPerHAPair or the ThroughputCapacity when creating a file system, but not both. This field and ThroughputCapacity are the same for file systems powered by one HA pair. For SINGLE_AZ_1 and MULTI_AZ_1 file systems, valid values are 128, 256, 512, 1024, 2048, or 4096 MBps. For SINGLE_AZ_2, valid values are 1536, 3072, or 6144 MBps. For MULTI_AZ_2, valid values are 384, 768, 1536, 3072, or 6144 MBps. Amazon FSx responds with an HTTP status code 400 (Bad Request) for the following conditions: The value of ThroughputCapacity and ThroughputCapacityPerHAPair are not the same value for file systems with one HA pair. The value of deployment type is SINGLE_AZ_2 and ThroughputCapacity / ThroughputCapacityPerHAPair is not a valid HA pair (a value between 1 and 12). The value of ThroughputCapacityPerHAPair is not a valid value."
        EndpointIpv6AddressRange:
          $ref: "#/components/schemas/Ipv6AddressRange"
          description: (Multi-AZ only) Specifies the IPv6 address range in which the endpoints to access your file system will be created. By default in the Amazon FSx API and Amazon FSx console, Amazon FSx selects an available /118 IP address range for you from one of the VPC's CIDR ranges. You can have overlapping endpoint IP addresses for file systems deployed in the same VPC/route tables, as long as they don't overlap with any subnet.
      required:
        - DeploymentType
    CreateFileSystemOpenZFSConfiguration:
      description: The Amazon FSx for OpenZFS configuration properties for the file system that you are creating.
      type: object
      properties:
        AutomaticBackupRetentionDays:
          $ref: "#/components/schemas/AutomaticBackupRetentionDays"
        CopyTagsToBackups:
          $ref: "#/components/schemas/Flag"
          description: A Boolean value indicating whether tags for the file system should be copied to backups. This value defaults to false. If it's set to true, all tags for the file system are copied to all automatic and user-initiated backups where the user doesn't specify tags. If this value is true, and you specify one or more tags, only the specified tags are copied to backups. If you specify one or more tags when creating a user-initiated backup, no tags are copied from the file system, regardless of this value.
        CopyTagsToVolumes:
          $ref: "#/components/schemas/Flag"
          description: A Boolean value indicating whether tags for the file system should be copied to volumes. This value defaults to false. If it's set to true, all tags for the file system are copied to volumes where the user doesn't specify tags. If this value is true, and you specify one or more tags, only the specified tags are copied to volumes. If you specify one or more tags when creating the volume, no tags are copied from the file system, regardless of this value.
        DailyAutomaticBackupStartTime:
          $ref: "#/components/schemas/DailyTime"
        DeploymentType:
          $ref: "#/components/schemas/OpenZFSDeploymentType"
          description: "Specifies the file system deployment type. Valid values are the following: MULTI_AZ_1- Creates file systems with high availability and durability by replicating your data and supporting failover across multiple Availability Zones in the same Amazon Web Services Region. SINGLE_AZ_HA_2- Creates file systems with high availability and throughput capacities of 160 - 10,240 MB/s using an NVMe L2ARC cache by deploying a primary and standby file system within the same Availability Zone. SINGLE_AZ_HA_1- Creates file systems with high availability and throughput capacities of 64 - 4,096 MB/s by deploying a primary and standby file system within the same Availability Zone. SINGLE_AZ_2- Creates file systems with throughput capacities of 160 - 10,240 MB/s using an NVMe L2ARC cache that automatically recover within a single Availability Zone. SINGLE_AZ_1- Creates file systems with throughput capacities of 64 - 4,096 MBs that automatically recover within a single Availability Zone. For a list of which Amazon Web Services Regions each deployment type is available in, see Deployment type availability. For more information on the differences in performance between deployment types, see File system performance in the Amazon FSx for OpenZFS User Guide."
        ThroughputCapacity:
          $ref: "#/components/schemas/MegabytesPerSecond"
          description: "Specifies the throughput of an Amazon FSx for OpenZFS file system, measured in megabytes per second (MBps). Valid values depend on the DeploymentType that you choose, as follows: For MULTI_AZ_1 and SINGLE_AZ_2, valid values are 160, 320, 640, 1280, 2560, 3840, 5120, 7680, or 10240 MBps. For SINGLE_AZ_1, valid values are 64, 128, 256, 512, 1024, 2048, 3072, or 4096 MBps. You pay for additional throughput capacity that you provision."
        WeeklyMaintenanceStartTime:
          $ref: "#/components/schemas/WeeklyTime"
        DiskIopsConfiguration:
          $ref: "#/components/schemas/DiskIopsConfiguration"
        RootVolumeConfiguration:
          $ref: "#/components/schemas/OpenZFSCreateRootVolumeConfiguration"
          description: The configuration Amazon FSx uses when creating the root value of the Amazon FSx for OpenZFS file system. All volumes are children of the root volume.
        PreferredSubnetId:
          $ref: "#/components/schemas/SubnetId"
          description: Required when DeploymentType is set to MULTI_AZ_1. This specifies the subnet in which you want the preferred file server to be located.
        EndpointIpAddressRange:
          $ref: "#/components/schemas/IpAddressRange"
          description: (Multi-AZ only) Specifies the IPv4 address range in which the endpoints to access your file system will be created. By default in the Amazon FSx API and Amazon FSx console, Amazon FSx selects an available /28 IP address range for you from one of the VPC's CIDR ranges. You can have overlapping endpoint IP addresses for file systems deployed in the same VPC/route tables, as long as they don't overlap with any subnet.
        EndpointIpv6AddressRange:
          $ref: "#/components/schemas/Ipv6AddressRange"
          description: (Multi-AZ only) Specifies the IPv6 address range in which the endpoints to access your file system will be created. By default in the Amazon FSx API and Amazon FSx console, Amazon FSx selects an available /118 IP address range for you from one of the VPC's CIDR ranges. You can have overlapping endpoint IP addresses for file systems deployed in the same VPC/route tables, as long as they don't overlap with any subnet.
        RouteTableIds:
          $ref: "#/components/schemas/RouteTableIds"
          description: (Multi-AZ only) Specifies the route tables in which Amazon FSx creates the rules for routing traffic to the correct file server. You should specify all virtual private cloud (VPC) route tables associated with the subnets in which your clients are located. By default, Amazon FSx selects your VPC's default route table.
        ReadCacheConfiguration:
          $ref: "#/components/schemas/OpenZFSReadCacheConfiguration"
          description: Specifies the optional provisioned SSD read cache on file systems that use the Intelligent-Tiering storage class.
      required:
        - DeploymentType
        - ThroughputCapacity
    OpenZFSCreateRootVolumeConfiguration:
      description: The configuration of an Amazon FSx for OpenZFS root volume.
      type: object
      properties:
        RecordSizeKiB:
          $ref: "#/components/schemas/IntegerRecordSizeKiB"
          description: Specifies the record size of an OpenZFS root volume, in kibibytes (KiB). Valid values are 4, 8, 16, 32, 64, 128, 256, 512, or 1024 KiB. The default is 128 KiB. Most workloads should use the default record size. Database workflows can benefit from a smaller record size, while streaming workflows can benefit from a larger record size. For additional guidance on setting a custom record size, see Tips for maximizing performance in the Amazon FSx for OpenZFS User Guide.
        DataCompressionType:
          $ref: "#/components/schemas/OpenZFSDataCompressionType"
          description: Specifies the method used to compress the data on the volume. The compression type is NONE by default. NONE - Doesn't compress the data on the volume. NONE is the default. ZSTD - Compresses the data in the volume using the Zstandard (ZSTD) compression algorithm. Compared to LZ4, Z-Standard provides a better compression ratio to minimize on-disk storage utilization. LZ4 - Compresses the data in the volume using the LZ4 compression algorithm. Compared to Z-Standard, LZ4 is less compute-intensive and delivers higher write throughput speeds.
        NfsExports:
          $ref: "#/components/schemas/OpenZFSNfsExports"
          description: The configuration object for mounting a file system.
        UserAndGroupQuotas:
          $ref: "#/components/schemas/OpenZFSUserAndGroupQuotas"
          description: An object specifying how much storage users or groups can use on the volume.
        CopyTagsToSnapshots:
          $ref: "#/components/schemas/Flag"
          description: A Boolean value indicating whether tags for the volume should be copied to snapshots of the volume. This value defaults to false. If it's set to true, all tags for the volume are copied to snapshots where the user doesn't specify tags. If this value is true and you specify one or more tags, only the specified tags are copied to snapshots. If you specify one or more tags when creating the snapshot, no tags are copied from the volume, regardless of this value.
        ReadOnly:
          $ref: "#/components/schemas/ReadOnly"
          description: A Boolean value indicating whether the volume is read-only. Setting this value to true can be useful after you have completed changes to a volume and no longer want changes to occur.
    CreateFileSystemResponse:
      description: The response object returned after the file system is created.
      type: object
      properties:
        FileSystem:
          $ref: "#/components/schemas/FileSystem"
          description: The configuration of the file system that was created.
    CreateFileSystemFromBackupResponse:
      description: The response object for the CreateFileSystemFromBackup operation.
      type: object
      properties:
        FileSystem:
          $ref: "#/components/schemas/FileSystem"
          description: A description of the file system.
    CreateSnapshotResponse:
      type: object
      properties:
        Snapshot:
          $ref: "#/components/schemas/Snapshot"
          description: A description of the snapshot.
    CreateSvmActiveDirectoryConfiguration:
      description: The configuration that Amazon FSx uses to join the ONTAP storage virtual machine (SVM) to your self-managed (including on-premises) Microsoft Active Directory directory.
      type: object
      properties:
        NetBiosName:
          $ref: "#/components/schemas/NetBiosAlias"
          description: The NetBIOS name of the Active Directory computer object that will be created for your SVM.
        SelfManagedActiveDirectoryConfiguration:
          $ref: "#/components/schemas/SelfManagedActiveDirectoryConfiguration"
      required:
        - NetBiosName
    NetBiosAlias:
      type: string
      minLength: 1
      maxLength: 15
      pattern: ^[^\u0000\u0085\u2028\u2029\r\n]{1,255}$
    StorageVirtualMachineName:
      type: string
      minLength: 1
      maxLength: 47
      pattern: ^[^\u0000\u0085\u2028\u2029\r\n]{1,47}$
    StorageVirtualMachineRootVolumeSecurityStyle:
      type: string
      enum:
        - UNIX
        - NTFS
        - MIXED
    CreateStorageVirtualMachineResponse:
      type: object
      properties:
        StorageVirtualMachine:
          $ref: "#/components/schemas/StorageVirtualMachine"
          description: Returned after a successful CreateStorageVirtualMachine operation; describes the SVM just created.
    StorageVirtualMachine:
      description: Describes the Amazon FSx for NetApp ONTAP storage virtual machine (SVM) configuration.
      type: object
      properties:
        ActiveDirectoryConfiguration:
          $ref: "#/components/schemas/SvmActiveDirectoryConfiguration"
          description: Describes the Microsoft Active Directory configuration to which the SVM is joined, if applicable.
        CreationTime:
          $ref: "#/components/schemas/CreationTime"
        Endpoints:
          $ref: "#/components/schemas/SvmEndpoints"
          description: The endpoints that are used to access data or to manage the SVM using the NetApp ONTAP CLI, REST API, or NetApp CloudManager. They are the Iscsi, Management, Nfs, and Smb endpoints.
        FileSystemId:
          $ref: "#/components/schemas/FileSystemId"
        Lifecycle:
          $ref: "#/components/schemas/StorageVirtualMachineLifecycle"
          description: Describes the SVM's lifecycle status. CREATED - The SVM is fully available for use. CREATING - Amazon FSx is creating the new SVM. DELETING - Amazon FSx is deleting an existing SVM. FAILED - Amazon FSx was unable to create the SVM. MISCONFIGURED - The SVM is in a failed but recoverable state. PENDING - Amazon FSx has not started creating the SVM.
        Name:
          $ref: "#/components/schemas/StorageVirtualMachineName"
          description: The name of the SVM, if provisioned.
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
        StorageVirtualMachineId:
          $ref: "#/components/schemas/StorageVirtualMachineId"
          description: The SVM's system generated unique ID.
        Subtype:
          $ref: "#/components/schemas/StorageVirtualMachineSubtype"
          description: Describes the SVM's subtype.
        UUID:
          $ref: "#/components/schemas/UUID"
          description: The SVM's UUID (universally unique identifier).
        Tags:
          $ref: "#/components/schemas/Tags"
        LifecycleTransitionReason:
          $ref: "#/components/schemas/LifecycleTransitionReason"
          description: Describes why the SVM lifecycle state changed.
        RootVolumeSecurityStyle:
          $ref: "#/components/schemas/StorageVirtualMachineRootVolumeSecurityStyle"
          description: The security style of the root volume of the SVM.
    SvmActiveDirectoryConfiguration:
      description: Describes the Microsoft Active Directory (AD) directory configuration to which the FSx for ONTAP storage virtual machine (SVM) is joined. Note that account credentials are not returned in the response payload.
      type: object
      properties:
        NetBiosName:
          $ref: "#/components/schemas/NetBiosAlias"
          description: The NetBIOS name of the AD computer object to which the SVM is joined.
        SelfManagedActiveDirectoryConfiguration:
          $ref: "#/components/schemas/SelfManagedActiveDirectoryAttributes"
    SvmEndpoints:
      description: An Amazon FSx for NetApp ONTAP storage virtual machine (SVM) has the following endpoints that are used to access data or to manage the SVM using the NetApp ONTAP CLI, REST API, or NetApp CloudManager.
      type: object
      properties:
        Iscsi:
          $ref: "#/components/schemas/SvmEndpoint"
          description: An endpoint for connecting using the Internet Small Computer Systems Interface (iSCSI) protocol.
        Management:
          $ref: "#/components/schemas/SvmEndpoint"
          description: An endpoint for managing SVMs using the NetApp ONTAP CLI, NetApp ONTAP API, or NetApp CloudManager.
        Nfs:
          $ref: "#/components/schemas/SvmEndpoint"
          description: An endpoint for connecting using the Network File System (NFS) protocol.
        Smb:
          $ref: "#/components/schemas/SvmEndpoint"
          description: An endpoint for connecting using the Server Message Block (SMB) protocol.
    SvmEndpoint:
      description: An Amazon FSx for NetApp ONTAP storage virtual machine (SVM) has four endpoints that are used to access data or to manage the SVM using the NetApp ONTAP CLI, REST API, or NetApp CloudManager. They are the Iscsi, Management, Nfs, and Smb endpoints.
      type: object
      properties:
        DNSName:
          $ref: "#/components/schemas/DNSName"
        IpAddresses:
          $ref: "#/components/schemas/OntapEndpointIpAddresses"
          description: The SVM endpoint's IPv4 addresses.
        Ipv6Addresses:
          $ref: "#/components/schemas/OntapEndpointIpAddresses"
          description: The SVM endpoint's IPv6 addresses.
    StorageVirtualMachineLifecycle:
      type: string
      enum:
        - CREATED
        - CREATING
        - DELETING
        - FAILED
        - MISCONFIGURED
        - PENDING
    StorageVirtualMachineSubtype:
      type: string
      enum:
        - DEFAULT
        - DP_DESTINATION
        - SYNC_DESTINATION
        - SYNC_SOURCE
    CreateOntapVolumeConfiguration:
      description: Specifies the configuration of the ONTAP volume that you are creating.
      type: object
      properties:
        JunctionPath:
          $ref: "#/components/schemas/JunctionPath"
          description: Specifies the location in the SVM's namespace where the volume is mounted. This parameter is required. The JunctionPath must have a leading forward slash, such as /vol3.
        SecurityStyle:
          $ref: "#/components/schemas/SecurityStyle"
          description: "Specifies the security style for the volume. If a volume's security style is not specified, it is automatically set to the root volume's security style. The security style determines the type of permissions that FSx for ONTAP uses to control data access. Specify one of the following values: UNIX if the file system is managed by a UNIX administrator, the majority of users are NFS clients, and an application accessing the data uses a UNIX user as the service account. NTFS if the file system is managed by a Windows administrator, the majority of users are SMB clients, and an application accessing the data uses a Windows user as the service account. MIXED This is an advanced setting. For more information, see the topic What the security styles and their effects are in the NetApp Documentation Center. For more information, see Volume security style in the FSx for ONTAP User Guide."
        SizeInMegabytes:
          $ref: "#/components/schemas/VolumeCapacity"
          description: Use SizeInBytes instead. Specifies the size of the volume, in megabytes (MB), that you are creating.
        StorageEfficiencyEnabled:
          $ref: "#/components/schemas/Flag"
          description: Set to true to enable deduplication, compression, and compaction storage efficiency features on the volume, or set to false to disable them. StorageEfficiencyEnabled is required when creating a RW volume (OntapVolumeType set to RW).
        StorageVirtualMachineId:
          $ref: "#/components/schemas/StorageVirtualMachineId"
          description: Specifies the ONTAP SVM in which to create the volume.
        TieringPolicy:
          $ref: "#/components/schemas/TieringPolicy"
        OntapVolumeType:
          $ref: "#/components/schemas/InputOntapVolumeType"
          description: "Specifies the type of volume you are creating. Valid values are the following: RW specifies a read/write volume. RW is the default. DP specifies a data-protection volume. A DP volume is read-only and can be used as the destination of a NetApp SnapMirror relationship. For more information, see Volume types in the Amazon FSx for NetApp ONTAP User Guide."
        SnapshotPolicy:
          $ref: "#/components/schemas/SnapshotPolicy"
          description: "Specifies the snapshot policy for the volume. There are three built-in snapshot policies: default: This is the default policy. A maximum of six hourly snapshots taken five minutes past the hour. A maximum of two daily snapshots taken Monday through Saturday at 10 minutes after midnight. A maximum of two weekly snapshots taken every Sunday at 15 minutes after midnight. default-1weekly: This policy is the same as the default policy except that it only retains one snapshot from the weekly schedule. none: This policy does not take any snapshots. This policy can be assigned to volumes to prevent automatic snapshots from being taken. You can also provide the name of a custom policy that you created with the ONTAP CLI or REST API. For more information, see Snapshot policies in the Amazon FSx for NetApp ONTAP User Guide."
        CopyTagsToBackups:
          $ref: "#/components/schemas/Flag"
          description: A boolean flag indicating whether tags for the volume should be copied to backups. This value defaults to false. If it's set to true, all tags for the volume are copied to all automatic and user-initiated backups where the user doesn't specify tags. If this value is true, and you specify one or more tags, only the specified tags are copied to backups. If you specify one or more tags when creating a user-initiated backup, no tags are copied from the volume, regardless of this value.
        SnaplockConfiguration:
          $ref: "#/components/schemas/CreateSnaplockConfiguration"
          description: Specifies the SnapLock configuration for an FSx for ONTAP volume.
        VolumeStyle:
          $ref: "#/components/schemas/VolumeStyle"
          description: Use to specify the style of an ONTAP volume. FSx for ONTAP offers two styles of volumes that you can use for different purposes, FlexVol and FlexGroup volumes. For more information, see Volume styles in the Amazon FSx for NetApp ONTAP User Guide.
        AggregateConfiguration:
          $ref: "#/components/schemas/CreateAggregateConfiguration"
          description: Use to specify configuration options for a volume’s storage aggregate or aggregates.
        SizeInBytes:
          $ref: "#/components/schemas/VolumeCapacityBytes"
          description: Specifies the configured size of the volume, in bytes.
      required:
        - StorageVirtualMachineId
    InputOntapVolumeType:
      type: string
      enum:
        - RW
        - DP
    CreateSnaplockConfiguration:
      description: Defines the SnapLock configuration when creating an FSx for ONTAP SnapLock volume.
      type: object
      properties:
        AuditLogVolume:
          $ref: "#/components/schemas/Flag"
          description: Enables or disables the audit log volume for an FSx for ONTAP SnapLock volume. The default value is false. If you set AuditLogVolume to true, the SnapLock volume is created as an audit log volume. The minimum retention period for an audit log volume is six months. For more information, see SnapLock audit log volumes.
        AutocommitPeriod:
          $ref: "#/components/schemas/AutocommitPeriod"
          description: The configuration object for setting the autocommit period of files in an FSx for ONTAP SnapLock volume.
        PrivilegedDelete:
          $ref: "#/components/schemas/PrivilegedDelete"
          description: Enables, disables, or permanently disables privileged delete on an FSx for ONTAP SnapLock Enterprise volume. Enabling privileged delete allows SnapLock administrators to delete WORM files even if they have active retention periods. PERMANENTLY_DISABLED is a terminal state. If privileged delete is permanently disabled on a SnapLock volume, you can't re-enable it. The default value is DISABLED. For more information, see Privileged delete.
        RetentionPeriod:
          $ref: "#/components/schemas/SnaplockRetentionPeriod"
          description: Specifies the retention period of an FSx for ONTAP SnapLock volume.
        SnaplockType:
          $ref: "#/components/schemas/SnaplockType"
          description: "Specifies the retention mode of an FSx for ONTAP SnapLock volume. After it is set, it can't be changed. You can choose one of the following retention modes: COMPLIANCE: Files transitioned to write once, read many (WORM) on a Compliance volume can't be deleted until their retention periods expire. This retention mode is used to address government or industry-specific mandates or to protect against ransomware attacks. For more information, see SnapLock Compliance. ENTERPRISE: Files transitioned to WORM on an Enterprise volume can be deleted by authorized users before their retention periods expire using privileged delete. This retention mode is used to advance an organization's data integrity and internal compliance or to test retention settings before using SnapLock Compliance. For more information, see SnapLock Enterprise."
        VolumeAppendModeEnabled:
          $ref: "#/components/schemas/Flag"
          description: Enables or disables volume-append mode on an FSx for ONTAP SnapLock volume. Volume-append mode allows you to create WORM-appendable files and write data to them incrementally. The default value is false. For more information, see Volume-append mode.
      required:
        - SnaplockType
    CreateAggregateConfiguration:
      description: Used to specify the configuration options for an FSx for ONTAP volume's storage aggregate or aggregates.
      type: object
      properties:
        Aggregates:
          $ref: "#/components/schemas/Aggregates"
          description: Used to specify the names of aggregates on which the volume will be created.
        ConstituentsPerAggregate:
          $ref: "#/components/schemas/AggregateListMultiplier"
          description: Used to explicitly set the number of constituents within the FlexGroup per storage aggregate. This field is optional when creating a FlexGroup volume. If unspecified, the default value will be 8. This field cannot be provided when creating a FlexVol volume.
    AggregateListMultiplier:
      type: integer
      minimum: 1
      maximum: 200
    CreateOpenZFSVolumeConfiguration:
      description: Specifies the configuration of the Amazon FSx for OpenZFS volume that you are creating.
      type: object
      properties:
        ParentVolumeId:
          $ref: "#/components/schemas/VolumeId"
          description: The ID of the volume to use as the parent volume of the volume that you are creating.
        StorageCapacityReservationGiB:
          $ref: "#/components/schemas/IntegerNoMaxFromNegativeOne"
          description: Specifies the amount of storage in gibibytes (GiB) to reserve from the parent volume. Setting StorageCapacityReservationGiB guarantees that the specified amount of storage space on the parent volume will always be available for the volume. You can't reserve more storage than the parent volume has. To not specify a storage capacity reservation, set this to 0 or -1. For more information, see Volume properties in the Amazon FSx for OpenZFS User Guide.
        StorageCapacityQuotaGiB:
          $ref: "#/components/schemas/IntegerNoMaxFromNegativeOne"
          description: Sets the maximum storage size in gibibytes (GiB) for the volume. You can specify a quota that is larger than the storage on the parent volume. A volume quota limits the amount of storage that the volume can consume to the configured amount, but does not guarantee the space will be available on the parent volume. To guarantee quota space, you must also set StorageCapacityReservationGiB. To not specify a storage capacity quota, set this to -1. For more information, see Volume properties in the Amazon FSx for OpenZFS User Guide.
        RecordSizeKiB:
          $ref: "#/components/schemas/IntegerRecordSizeKiB"
          description: Specifies the suggested block size for a volume in a ZFS dataset, in kibibytes (KiB). For file systems using the Intelligent-Tiering storage class, valid values are 128, 256, 512, 1024, 2048, or 4096 KiB, with a default of 1024 KiB. For all other file systems, valid values are 4, 8, 16, 32, 64, 128, 256, 512, or 1024 KiB, with a default of 128 KiB. We recommend using the default setting for the majority of use cases. Generally, workloads that write in fixed small or large record sizes may benefit from setting a custom record size, like database workloads (small record size) or media streaming workloads (large record size). For additional guidance on when to set a custom record size, see ZFS Record size in the Amazon FSx for OpenZFS User Guide.
        DataCompressionType:
          $ref: "#/components/schemas/OpenZFSDataCompressionType"
          description: Specifies the method used to compress the data on the volume. The compression type is NONE by default. NONE - Doesn't compress the data on the volume. NONE is the default. ZSTD - Compresses the data in the volume using the Zstandard (ZSTD) compression algorithm. ZSTD compression provides a higher level of data compression and higher read throughput performance than LZ4 compression. LZ4 - Compresses the data in the volume using the LZ4 compression algorithm. LZ4 compression provides a lower level of compression and higher write throughput performance than ZSTD compression. For more information about volume compression types and the performance of your Amazon FSx for OpenZFS file system, see Tips for maximizing performance File system and volume settings in the Amazon FSx for OpenZFS User Guide.
        CopyTagsToSnapshots:
          $ref: "#/components/schemas/Flag"
          description: A Boolean value indicating whether tags for the volume should be copied to snapshots. This value defaults to false. If this value is set to true, and you do not specify any tags, all tags for the original volume are copied over to snapshots. If this value is set to true, and you do specify one or more tags, only the specified tags for the original volume are copied over to snapshots. If you specify one or more tags when creating a new snapshot, no tags are copied over from the original volume, regardless of this value.
        OriginSnapshot:
          $ref: "#/components/schemas/CreateOpenZFSOriginSnapshotConfiguration"
          description: The configuration object that specifies the snapshot to use as the origin of the data for the volume.
        ReadOnly:
          $ref: "#/components/schemas/ReadOnly"
          description: A Boolean value indicating whether the volume is read-only.
        NfsExports:
          $ref: "#/components/schemas/OpenZFSNfsExports"
          description: The configuration object for mounting a Network File System (NFS) file system.
        UserAndGroupQuotas:
          $ref: "#/components/schemas/OpenZFSUserAndGroupQuotas"
          description: Configures how much storage users and groups can use on the volume.
      required:
        - ParentVolumeId
    IntegerNoMaxFromNegativeOne:
      type: integer
      minimum: -1
      maximum: 2147483647
    CreateOpenZFSOriginSnapshotConfiguration:
      description: The snapshot configuration to use when creating an Amazon FSx for OpenZFS volume from a snapshot.
      type: object
      properties:
        SnapshotARN:
          $ref: "#/components/schemas/ResourceARN"
        CopyStrategy:
          $ref: "#/components/schemas/OpenZFSCopyStrategy"
          description: Specifies the strategy used when copying data from the snapshot to the new volume. CLONE - The new volume references the data in the origin snapshot. Cloning a snapshot is faster than copying data from the snapshot to a new volume and doesn't consume disk throughput. However, the origin snapshot can't be deleted if there is a volume using its copied data. FULL_COPY - Copies all data from the snapshot to the new volume. Specify this option to create the volume from a snapshot on another FSx for OpenZFS file system. The INCREMENTAL_COPY option is only for updating an existing volume by using a snapshot from another FSx for OpenZFS file system. For more information, see CopySnapshotAndUpdateVolume.
      required:
        - SnapshotARN
        - CopyStrategy
    CreateVolumeResponse:
      type: object
      properties:
        Volume:
          $ref: "#/components/schemas/Volume"
          description: Returned after a successful CreateVolume API operation, describing the volume just created.
    CreateVolumeFromBackupResponse:
      type: object
      properties:
        Volume:
          $ref: "#/components/schemas/Volume"
          description: Returned after a successful CreateVolumeFromBackup API operation, describing the volume just created.
    DeleteBackupResponse:
      description: The response object for the DeleteBackup operation.
      type: object
      properties:
        BackupId:
          $ref: "#/components/schemas/BackupId"
          description: The ID of the backup that was deleted.
        Lifecycle:
          $ref: "#/components/schemas/BackupLifecycle"
          description: The lifecycle status of the backup. If the DeleteBackup operation is successful, the status is DELETED.
    DeleteDataInFileSystem:
      type: boolean
    DeleteDataRepositoryAssociationResponse:
