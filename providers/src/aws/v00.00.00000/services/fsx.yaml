                $ref: "#/components/schemas/CreateVolumeResponse"
  /CreateVolumeFromBackup:
    post:
      operationId: CreateVolumeFromBackup
      description: Creates a new Amazon FSx for NetApp ONTAP volume from an existing Amazon FSx volume backup.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.CreateVolumeFromBackup
            default: AWSSimbaAPIService_v20180301.CreateVolumeFromBackup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
