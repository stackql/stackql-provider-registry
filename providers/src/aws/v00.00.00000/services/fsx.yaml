                  $ref: "#/components/schemas/BackupIds"
                  description: The IDs of the backups that you want to retrieve. This parameter value overrides any filters. If any IDs aren't found, a BackupNotFound error occurs.
                Filters:
                  $ref: "#/components/schemas/Filters"
                  description: The filters structure. The supported names are file-system-id, backup-type, file-system-type, and volume-id.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: Maximum number of backups to return in the response. This parameter value must be greater than 0. The number of items that Amazon FSx returns is the minimum of the MaxResults parameter specified in the request and the service's internal maximum number of items per page.
