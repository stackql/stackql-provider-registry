        FileCache:
          $ref: "#/components/schemas/FileCache"
          description: A description of the cache that was updated.
    UpdateFileSystemWindowsConfiguration:
      description: Updates the configuration for an existing Amazon FSx for Windows File Server file system. Amazon FSx only overwrites existing properties with non-null values provided in the request.
      type: object
      properties:
        WeeklyMaintenanceStartTime:
          $ref: "#/components/schemas/WeeklyTime"
          description: The preferred start time to perform weekly maintenance, formatted d:HH:MM in the UTC time zone. Where d is the weekday number, from 1 through 7, with 1 = Monday and 7 = Sunday.
        DailyAutomaticBackupStartTime:
          $ref: "#/components/schemas/DailyTime"
          description: The preferred time to start the daily automatic backup, in the UTC time zone, for example, 02:00
        AutomaticBackupRetentionDays:
          $ref: "#/components/schemas/AutomaticBackupRetentionDays"
          description: The number of days to retain automatic backups. Setting this property to 0 disables automatic backups. You can retain automatic backups for a maximum of 90 days. The default is 30. For more information, see Working with Automatic Daily Backups.
        ThroughputCapacity:
          $ref: "#/components/schemas/MegabytesPerSecond"
          description: Sets the target value for a file system's throughput capacity, in MB/s, that you are updating the file system to. Valid values are 8, 16, 32, 64, 128, 256, 512, 1024, 2048. You cannot make a throughput capacity update request if there is an existing throughput capacity update request in progress. For more information, see Managing Throughput Capacity.
        SelfManagedActiveDirectoryConfiguration:
          $ref: "#/components/schemas/SelfManagedActiveDirectoryConfigurationUpdates"
          description: The configuration Amazon FSx uses to join the Windows File Server instance to the self-managed Microsoft AD directory. You cannot make a self-managed Microsoft AD update request if there is an existing self-managed Microsoft AD update request in progress.
        AuditLogConfiguration:
          $ref: "#/components/schemas/WindowsAuditLogCreateConfiguration"
          description: The configuration that Amazon FSx for Windows File Server uses to audit and log user accesses of files, folders, and file shares on the Amazon FSx for Windows File Server file system..
        DiskIopsConfiguration:
          $ref: "#/components/schemas/DiskIopsConfiguration"
          description: The SSD IOPS (input/output operations per second) configuration for an Amazon FSx for Windows file system. By default, Amazon FSx automatically provisions 3 IOPS per GiB of storage capacity. You can provision additional IOPS per GiB of storage, up to the maximum limit associated with your chosen throughput capacity.
        FsrmConfiguration:
          $ref: "#/components/schemas/WindowsFsrmConfiguration"
          description: The File Server Resource Manager (FSRM) configuration that Amazon FSx for Windows File Server uses for the file system. FSRM is disabled by default.
    SelfManagedActiveDirectoryConfigurationUpdates:
      description: Specifies changes you are making to the self-managed Microsoft Active Directory configuration to which an FSx for Windows File Server file system or an FSx for ONTAP SVM is joined.
      type: object
      properties:
        UserName:
          $ref: "#/components/schemas/DirectoryUserName"
          description: Specifies the updated user name for the service account on your self-managed Active Directory domain. Amazon FSx uses this account to join to your self-managed Active Directory domain. This account must have the permissions required to join computers to the domain in the organizational unit provided in OrganizationalUnitDistinguishedName.
        Password:
          $ref: "#/components/schemas/DirectoryPassword"
          description: Specifies the updated password for the service account on your self-managed Active Directory domain. Amazon FSx uses this account to join to your self-managed Active Directory domain.
        DnsIps:
          $ref: "#/components/schemas/DnsIps"
          description: A list of up to three DNS server or domain controller IP addresses in your self-managed Active Directory domain.
        DomainName:
          $ref: "#/components/schemas/ActiveDirectoryFullyQualifiedName"
          description: Specifies an updated fully qualified domain name of your self-managed Active Directory configuration.
        OrganizationalUnitDistinguishedName:
          $ref: "#/components/schemas/OrganizationalUnitDistinguishedName"
          description: Specifies an updated fully qualified distinguished name of the organization unit within your self-managed Active Directory.
        FileSystemAdministratorsGroup:
          $ref: "#/components/schemas/FileSystemAdministratorsGroupName"
          description: For FSx for ONTAP file systems only - Specifies the updated name of the self-managed Active Directory domain group whose members are granted administrative privileges for the Amazon FSx resource.
        DomainJoinServiceAccountSecret:
          $ref: "#/components/schemas/CustomerSecretsManagerARN"
          description: Specifies the updated Amazon Resource Name (ARN) of the Amazon Web Services Secrets Manager secret containing the self-managed Active Directory domain join service account credentials. Amazon FSx uses this account to join to your self-managed Active Directory domain.
    UpdateFileSystemLustreConfiguration:
      description: The configuration object for Amazon FSx for Lustre file systems used in the UpdateFileSystem operation.
      type: object
      properties:
        WeeklyMaintenanceStartTime:
          $ref: "#/components/schemas/WeeklyTime"
          description: (Optional) The preferred start time to perform weekly maintenance, formatted d:HH:MM in the UTC time zone. d is the weekday number, from 1 through 7, beginning with Monday and ending with Sunday.
        DailyAutomaticBackupStartTime:
          $ref: "#/components/schemas/DailyTime"
        AutomaticBackupRetentionDays:
          $ref: "#/components/schemas/AutomaticBackupRetentionDays"
          description: The number of days to retain automatic backups. Setting this property to 0 disables automatic backups. You can retain automatic backups for a maximum of 90 days. The default is 0.
        AutoImportPolicy:
          $ref: "#/components/schemas/AutoImportPolicyType"
          description: "(Optional) When you create your file system, your existing S3 objects appear as file and directory listings. Use this property to choose how Amazon FSx keeps your file and directory listing up to date as you add or modify objects in your linked S3 bucket. AutoImportPolicy can have the following values: NONE - (Default) AutoImport is off. Amazon FSx only updates file and directory listings from the linked S3 bucket when the file system is created. FSx does not update the file and directory listing for any new or changed objects after choosing this option. NEW - AutoImport is on. Amazon FSx automatically imports directory listings of any new objects added to the linked S3 bucket that do not currently exist in the FSx file system. NEW_CHANGED - AutoImport is on. Amazon FSx automatically imports file and directory listings of any new objects added to the S3 bucket and any existing objects that are changed in the S3 bucket after you choose this option. NEW_CHANGED_DELETED - AutoImport is on. Amazon FSx automatically imports file and directory listings of any new objects added to the S3 bucket, any existing objects that are changed in the S3 bucket, and any objects that were deleted in the S3 bucket. This parameter is not supported for file systems with a data repository association."
        DataCompressionType:
          $ref: "#/components/schemas/DataCompressionType"
          description: "Sets the data compression configuration for the file system. DataCompressionType can have the following values: NONE - Data compression is turned off for the file system. LZ4 - Data compression is turned on with the LZ4 algorithm. If you don't use DataCompressionType, the file system retains its current data compression configuration. For more information, see Lustre data compression."
        LogConfiguration:
          $ref: "#/components/schemas/LustreLogCreateConfiguration"
          description: The Lustre logging configuration used when updating an Amazon FSx for Lustre file system. When logging is enabled, Lustre logs error and warning events for data repositories associated with your file system to Amazon CloudWatch Logs.
        RootSquashConfiguration:
          $ref: "#/components/schemas/LustreRootSquashConfiguration"
          description: The Lustre root squash configuration used when updating an Amazon FSx for Lustre file system. When enabled, root squash restricts root-level access from clients that try to access your file system as a root user.
        PerUnitStorageThroughput:
          $ref: "#/components/schemas/PerUnitStorageThroughput"
          description: "The throughput of an Amazon FSx for Lustre Persistent SSD-based file system, measured in megabytes per second per tebibyte (MB/s/TiB). You can increase or decrease your file system's throughput. Valid values depend on the deployment type of the file system, as follows: For PERSISTENT_1 SSD-based deployment types, valid values are 50, 100, and 200 MB/s/TiB. For PERSISTENT_2 SSD-based deployment types, valid values are 125, 250, 500, and 1000 MB/s/TiB. For more information, see Managing throughput capacity."
        MetadataConfiguration:
          $ref: "#/components/schemas/UpdateFileSystemLustreMetadataConfiguration"
          description: The Lustre metadata performance configuration for an Amazon FSx for Lustre file system using a PERSISTENT_2 deployment type. When this configuration is enabled, the file system supports increasing metadata performance.
        ThroughputCapacity:
          $ref: "#/components/schemas/ThroughputCapacityMbps"
          description: The throughput of an Amazon FSx for Lustre file system using an Intelligent-Tiering storage class, measured in megabytes per second (MBps). You can only increase your file system's throughput. Valid values are 4000 MBps or multiples of 4000 MBps.
        DataReadCacheConfiguration:
          $ref: "#/components/schemas/LustreReadCacheConfiguration"
          description: Specifies the optional provisioned SSD read cache on Amazon FSx for Lustre file systems that use the Intelligent-Tiering storage class.
    UpdateFileSystemLustreMetadataConfiguration:
      description: The Lustre metadata performance configuration update for an Amazon FSx for Lustre file system using a PERSISTENT_2 deployment type. You can request an increase in your file system's Metadata IOPS and/or switch your file system's metadata configuration mode. For more information, see Managing metadata performance in the Amazon FSx for Lustre User Guide.
      type: object
      properties:
        Iops:
          $ref: "#/components/schemas/MetadataIops"
          description: (USER_PROVISIONED mode only) Specifies the number of Metadata IOPS to provision for your file system. For SSD file systems, valid values are 1500, 3000, 6000, 12000, and multiples of 12000 up to a maximum of 192000. For Intelligent-Tiering file systems, valid values are 6000 and 12000. The value you provide must be greater than or equal to the current number of Metadata IOPS provisioned for the file system.
        Mode:
          $ref: "#/components/schemas/MetadataConfigurationMode"
          description: The metadata configuration mode for provisioning Metadata IOPS for an FSx for Lustre file system using a PERSISTENT_2 deployment type. To increase the Metadata IOPS or to switch an SSD file system from AUTOMATIC, specify USER_PROVISIONED as the value for this parameter. Then use the Iops parameter to provide a Metadata IOPS value that is greater than or equal to the current number of Metadata IOPS provisioned for the file system. To switch from USER_PROVISIONED mode on an SSD file system, specify AUTOMATIC as the value for this parameter, but do not input a value for Iops. If you request to switch from USER_PROVISIONED to AUTOMATIC mode and the current Metadata IOPS value is greater than the automated default, FSx for Lustre rejects the request because downscaling Metadata IOPS is not supported. AUTOMATIC mode is not supported on Intelligent-Tiering file systems. For Intelligent-Tiering file systems, use USER_PROVISIONED mode.
    UpdateFileSystemOntapConfiguration:
      description: The configuration updates for an Amazon FSx for NetApp ONTAP file system.
      type: object
      properties:
        AutomaticBackupRetentionDays:
          $ref: "#/components/schemas/AutomaticBackupRetentionDays"
        DailyAutomaticBackupStartTime:
          $ref: "#/components/schemas/DailyTime"
        FsxAdminPassword:
          $ref: "#/components/schemas/AdminPassword"
          description: Update the password for the fsxadmin user by entering a new password. You use the fsxadmin user to access the NetApp ONTAP CLI and REST API to manage your file system resources. For more information, see Managing resources using NetApp Application.
        WeeklyMaintenanceStartTime:
          $ref: "#/components/schemas/WeeklyTime"
        DiskIopsConfiguration:
          $ref: "#/components/schemas/DiskIopsConfiguration"
          description: The SSD IOPS (input output operations per second) configuration for an Amazon FSx for NetApp ONTAP file system. The default is 3 IOPS per GB of storage capacity, but you can provision additional IOPS per GB of storage. The configuration consists of an IOPS mode (AUTOMATIC or USER_PROVISIONED), and in the case of USER_PROVISIONED IOPS, the total number of SSD IOPS provisioned. For more information, see File system storage capacity and IOPS.
        ThroughputCapacity:
          $ref: "#/components/schemas/MegabytesPerSecond"
          description: "Enter a new value to change the amount of throughput capacity for the file system in megabytes per second (MBps). For more information, see Managing throughput capacity in the FSx for ONTAP User Guide. Amazon FSx responds with an HTTP status code 400 (Bad Request) for the following conditions: The value of ThroughputCapacity and ThroughputCapacityPerHAPair are not the same value. The value of ThroughputCapacity when divided by the value of HAPairs is outside of the valid range for ThroughputCapacity."
        AddRouteTableIds:
          $ref: "#/components/schemas/RouteTableIds"
          description: (Multi-AZ only) A list of IDs of new virtual private cloud (VPC) route tables to associate (add) with your Amazon FSx for NetApp ONTAP file system.
        RemoveRouteTableIds:
          $ref: "#/components/schemas/RouteTableIds"
          description: (Multi-AZ only) A list of IDs of existing virtual private cloud (VPC) route tables to disassociate (remove) from your Amazon FSx for NetApp ONTAP file system. You can use the API operation to retrieve the list of VPC route table IDs for a file system.
        ThroughputCapacityPerHAPair:
          $ref: "#/components/schemas/ThroughputCapacityPerHAPair"
          description: "Use to choose the throughput capacity per HA pair, rather than the total throughput for the file system. This field and ThroughputCapacity cannot be defined in the same API call, but one is required. This field and ThroughputCapacity are the same for file systems with one HA pair. For SINGLE_AZ_1 and MULTI_AZ_1 file systems, valid values are 128, 256, 512, 1024, 2048, or 4096 MBps. For SINGLE_AZ_2, valid values are 1536, 3072, or 6144 MBps. For MULTI_AZ_2, valid values are 384, 768, 1536, 3072, or 6144 MBps. Amazon FSx responds with an HTTP status code 400 (Bad Request) for the following conditions: The value of ThroughputCapacity and ThroughputCapacityPerHAPair are not the same value for file systems with one HA pair. The value of deployment type is SINGLE_AZ_2 and ThroughputCapacity / ThroughputCapacityPerHAPair is not a valid HA pair (a value between 1 and 12). The value of ThroughputCapacityPerHAPair is not a valid value."
        HAPairs:
          $ref: "#/components/schemas/HAPairs"
          description: Use to update the number of high-availability (HA) pairs for a second-generation single-AZ file system. If you increase the number of HA pairs for your file system, you must specify proportional increases for StorageCapacity, Iops, and ThroughputCapacity. For more information, see High-availability (HA) pairs in the FSx for ONTAP user guide. Block storage protocol support (iSCSI and NVMe over TCP) is disabled on file systems with more than 6 HA pairs. For more information, see Using block storage protocols.
        EndpointIpv6AddressRange:
          $ref: "#/components/schemas/Ipv6AddressRange"
          description: (Multi-AZ only) Specifies the IPv6 address range in which the endpoints to access your file system will be created. By default in the Amazon FSx API and Amazon FSx console, Amazon FSx selects an available /118 IP address range for you from one of the VPC's CIDR ranges. You can have overlapping endpoint IP addresses for file systems deployed in the same VPC/route tables, as long as they don't overlap with any subnet.
    UpdateFileSystemOpenZFSConfiguration:
      description: The configuration updates for an Amazon FSx for OpenZFS file system.
      type: object
      properties:
        AutomaticBackupRetentionDays:
          $ref: "#/components/schemas/AutomaticBackupRetentionDays"
        CopyTagsToBackups:
          $ref: "#/components/schemas/Flag"
          description: A Boolean value indicating whether tags for the file system should be copied to backups. This value defaults to false. If it's set to true, all tags for the file system are copied to all automatic and user-initiated backups where the user doesn't specify tags. If this value is true and you specify one or more tags, only the specified tags are copied to backups. If you specify one or more tags when creating a user-initiated backup, no tags are copied from the file system, regardless of this value.
        CopyTagsToVolumes:
          $ref: "#/components/schemas/Flag"
          description: A Boolean value indicating whether tags for the volume should be copied to snapshots. This value defaults to false. If it's set to true, all tags for the volume are copied to snapshots where the user doesn't specify tags. If this value is true and you specify one or more tags, only the specified tags are copied to snapshots. If you specify one or more tags when creating the snapshot, no tags are copied from the volume, regardless of this value.
        DailyAutomaticBackupStartTime:
          $ref: "#/components/schemas/DailyTime"
        ThroughputCapacity:
          $ref: "#/components/schemas/MegabytesPerSecond"
          description: "The throughput of an Amazon FSx for OpenZFS file system, measured in megabytes per second (MB/s). Valid values depend on the DeploymentType you choose, as follows: For MULTI_AZ_1 and SINGLE_AZ_2, valid values are 160, 320, 640, 1280, 2560, 3840, 5120, 7680, or 10240 MB/s. For SINGLE_AZ_1, valid values are 64, 128, 256, 512, 1024, 2048, 3072, or 4096 MB/s."
        WeeklyMaintenanceStartTime:
          $ref: "#/components/schemas/WeeklyTime"
        DiskIopsConfiguration:
          $ref: "#/components/schemas/DiskIopsConfiguration"
        AddRouteTableIds:
          $ref: "#/components/schemas/RouteTableIds"
          description: (Multi-AZ only) A list of IDs of new virtual private cloud (VPC) route tables to associate (add) with your Amazon FSx for OpenZFS file system.
        RemoveRouteTableIds:
          $ref: "#/components/schemas/RouteTableIds"
          description: (Multi-AZ only) A list of IDs of existing virtual private cloud (VPC) route tables to disassociate (remove) from your Amazon FSx for OpenZFS file system. You can use the API operation to retrieve the list of VPC route table IDs for a file system.
        ReadCacheConfiguration:
          $ref: "#/components/schemas/OpenZFSReadCacheConfiguration"
          description: The configuration for the optional provisioned SSD read cache on file systems that use the Intelligent-Tiering storage class.
        EndpointIpv6AddressRange:
          $ref: "#/components/schemas/Ipv6AddressRange"
          description: (Multi-AZ only) Specifies the IPv6 address range in which the endpoints to access your file system will be created. By default in the Amazon FSx API and Amazon FSx console, Amazon FSx selects an available /118 IP address range for you from one of the VPC's CIDR ranges. You can have overlapping endpoint IP addresses for file systems deployed in the same VPC/route tables, as long as they don't overlap with any subnet.
    UpdateFileSystemResponse:
      description: The response object for the UpdateFileSystem operation.
      type: object
      properties:
        FileSystem:
          $ref: "#/components/schemas/FileSystem"
          description: A description of the file system that was updated.
    UpdateSharedVpcConfigurationResponse:
      type: object
      properties:
        EnableFsxRouteTableUpdatesFromParticipantAccounts:
          $ref: "#/components/schemas/VerboseFlag"
          description: Indicates whether participant accounts can create FSx for ONTAP Multi-AZ file systems in shared subnets.
    UpdateSnapshotResponse:
      type: object
      properties:
        Snapshot:
          $ref: "#/components/schemas/Snapshot"
          description: Returned after a successful UpdateSnapshot operation, describing the snapshot that you updated.
    UpdateSvmActiveDirectoryConfiguration:
      description: Specifies updates to an FSx for ONTAP storage virtual machine's (SVM) Microsoft Active Directory (AD) configuration. Note that account credentials are not returned in the response payload.
      type: object
      properties:
        SelfManagedActiveDirectoryConfiguration:
          $ref: "#/components/schemas/SelfManagedActiveDirectoryConfigurationUpdates"
        NetBiosName:
          $ref: "#/components/schemas/NetBiosAlias"
          description: Specifies an updated NetBIOS name of the AD computer object NetBiosName to which an SVM is joined.
    UpdateStorageVirtualMachineResponse:
      type: object
      properties:
        StorageVirtualMachine:
          $ref: "#/components/schemas/StorageVirtualMachine"
    UpdateOntapVolumeConfiguration:
      description: Used to specify changes to the ONTAP configuration for the volume you are updating.
      type: object
      properties:
        JunctionPath:
          $ref: "#/components/schemas/JunctionPath"
          description: Specifies the location in the SVM's namespace where the volume is mounted. The JunctionPath must have a leading forward slash, such as /vol3.
        SecurityStyle:
          $ref: "#/components/schemas/SecurityStyle"
          description: The security style for the volume, which can be UNIX, NTFS, or MIXED.
        SizeInMegabytes:
          $ref: "#/components/schemas/VolumeCapacity"
          description: Specifies the size of the volume in megabytes.
        StorageEfficiencyEnabled:
          $ref: "#/components/schemas/Flag"
          description: Default is false. Set to true to enable the deduplication, compression, and compaction storage efficiency features on the volume.
        TieringPolicy:
          $ref: "#/components/schemas/TieringPolicy"
          description: Update the volume's data tiering policy.
        SnapshotPolicy:
          $ref: "#/components/schemas/SnapshotPolicy"
          description: "Specifies the snapshot policy for the volume. There are three built-in snapshot policies: default: This is the default policy. A maximum of six hourly snapshots taken five minutes past the hour. A maximum of two daily snapshots taken Monday through Saturday at 10 minutes after midnight. A maximum of two weekly snapshots taken every Sunday at 15 minutes after midnight. default-1weekly: This policy is the same as the default policy except that it only retains one snapshot from the weekly schedule. none: This policy does not take any snapshots. This policy can be assigned to volumes to prevent automatic snapshots from being taken. You can also provide the name of a custom policy that you created with the ONTAP CLI or REST API. For more information, see Snapshot policies in the Amazon FSx for NetApp ONTAP User Guide."
        CopyTagsToBackups:
          $ref: "#/components/schemas/Flag"
          description: A boolean flag indicating whether tags for the volume should be copied to backups. This value defaults to false. If it's set to true, all tags for the volume are copied to all automatic and user-initiated backups where the user doesn't specify tags. If this value is true, and you specify one or more tags, only the specified tags are copied to backups. If you specify one or more tags when creating a user-initiated backup, no tags are copied from the volume, regardless of this value.
        SnaplockConfiguration:
          $ref: "#/components/schemas/UpdateSnaplockConfiguration"
          description: The configuration object for updating the SnapLock configuration of an FSx for ONTAP SnapLock volume.
        SizeInBytes:
          $ref: "#/components/schemas/VolumeCapacityBytes"
          description: The configured size of the volume, in bytes.
    UpdateSnaplockConfiguration:
      description: Updates the SnapLock configuration for an existing FSx for ONTAP volume.
      type: object
      properties:
        AuditLogVolume:
          $ref: "#/components/schemas/Flag"
          description: Enables or disables the audit log volume for an FSx for ONTAP SnapLock volume. The default value is false. If you set AuditLogVolume to true, the SnapLock volume is created as an audit log volume. The minimum retention period for an audit log volume is six months. For more information, see SnapLock audit log volumes.
        AutocommitPeriod:
          $ref: "#/components/schemas/AutocommitPeriod"
          description: The configuration object for setting the autocommit period of files in an FSx for ONTAP SnapLock volume.
        PrivilegedDelete:
          $ref: "#/components/schemas/PrivilegedDelete"
          description: Enables, disables, or permanently disables privileged delete on an FSx for ONTAP SnapLock Enterprise volume. Enabling privileged delete allows SnapLock administrators to delete write once, read many (WORM) files even if they have active retention periods. PERMANENTLY_DISABLED is a terminal state. If privileged delete is permanently disabled on a SnapLock volume, you can't re-enable it. The default value is DISABLED. For more information, see Privileged delete.
        RetentionPeriod:
          $ref: "#/components/schemas/SnaplockRetentionPeriod"
          description: Specifies the retention period of an FSx for ONTAP SnapLock volume.
        VolumeAppendModeEnabled:
          $ref: "#/components/schemas/Flag"
          description: Enables or disables volume-append mode on an FSx for ONTAP SnapLock volume. Volume-append mode allows you to create WORM-appendable files and write data to them incrementally. The default value is false. For more information, see Volume-append mode.
    UpdateOpenZFSVolumeConfiguration:
      description: Used to specify changes to the OpenZFS configuration for the volume that you are updating.
      type: object
      properties:
        StorageCapacityReservationGiB:
          $ref: "#/components/schemas/IntegerNoMaxFromNegativeOne"
          description: The amount of storage in gibibytes (GiB) to reserve from the parent volume. You can't reserve more storage than the parent volume has reserved. You can specify a value of -1 to unset a volume's storage capacity reservation.
        StorageCapacityQuotaGiB:
          $ref: "#/components/schemas/IntegerNoMaxFromNegativeOne"
          description: The maximum amount of storage in gibibytes (GiB) that the volume can use from its parent. You can specify a quota larger than the storage on the parent volume. You can specify a value of -1 to unset a volume's storage capacity quota.
        RecordSizeKiB:
          $ref: "#/components/schemas/IntegerRecordSizeKiB"
          description: Specifies the record size of an OpenZFS volume, in kibibytes (KiB). Valid values are 4, 8, 16, 32, 64, 128, 256, 512, or 1024 KiB. The default is 128 KiB. Most workloads should use the default record size. Database workflows can benefit from a smaller record size, while streaming workflows can benefit from a larger record size. For additional guidance on when to set a custom record size, see Tips for maximizing performance in the Amazon FSx for OpenZFS User Guide.
        DataCompressionType:
          $ref: "#/components/schemas/OpenZFSDataCompressionType"
          description: Specifies the method used to compress the data on the volume. The compression type is NONE by default. NONE - Doesn't compress the data on the volume. NONE is the default. ZSTD - Compresses the data in the volume using the Zstandard (ZSTD) compression algorithm. Compared to LZ4, Z-Standard provides a better compression ratio to minimize on-disk storage utilization. LZ4 - Compresses the data in the volume using the LZ4 compression algorithm. Compared to Z-Standard, LZ4 is less compute-intensive and delivers higher write throughput speeds.
        NfsExports:
          $ref: "#/components/schemas/OpenZFSNfsExports"
          description: The configuration object for mounting a Network File System (NFS) file system.
        UserAndGroupQuotas:
          $ref: "#/components/schemas/OpenZFSUserAndGroupQuotas"
          description: An object specifying how much storage users or groups can use on the volume.
        ReadOnly:
          $ref: "#/components/schemas/ReadOnly"
          description: A Boolean value indicating whether the volume is read-only.
    UpdateVolumeResponse:
      type: object
      properties:
        Volume:
          $ref: "#/components/schemas/Volume"
          description: A description of the volume just updated. Returned after a successful UpdateVolume API operation.
