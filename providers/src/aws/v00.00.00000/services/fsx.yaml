                $ref: "#/components/schemas/CreateVolumeFromBackupResponse"
  /DeleteBackup:
    post:
      operationId: DeleteBackup
      description: Deletes an Amazon FSx backup. After deletion, the backup no longer exists, and its data is gone. The DeleteBackup call returns instantly. The backup won't show up in later DescribeBackups calls. The data in a deleted backup is also deleted and can't be recovered by any means.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.DeleteBackup
            default: AWSSimbaAPIService_v20180301.DeleteBackup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                BackupId:
                  $ref: "#/components/schemas/BackupId"
                  description: The ID of the backup that you want to delete.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: A string of up to 63 ASCII characters that Amazon FSx uses to ensure idempotent deletion. This parameter is automatically filled on your behalf when using the CLI or SDK.
              required:
                - BackupId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBackupResponse"
  /DeleteDataRepositoryAssociation:
    post:
      operationId: DeleteDataRepositoryAssociation
      description: Deletes a data repository association on an Amazon FSx for Lustre file system. Deleting the data repository association unlinks the file system from the Amazon S3 bucket. When deleting a data repository association, you have the option of deleting the data in the file system that corresponds to the data repository association. Data repository associations are supported on all FSx for Lustre 2.12 and 2.15 file systems, excluding scratch_1 deployment type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.DeleteDataRepositoryAssociation
            default: AWSSimbaAPIService_v20180301.DeleteDataRepositoryAssociation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AssociationId:
                  $ref: "#/components/schemas/DataRepositoryAssociationId"
                  description: The ID of the data repository association that you want to delete.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                DeleteDataInFileSystem:
                  $ref: "#/components/schemas/DeleteDataInFileSystem"
                  description: Set to true to delete the data in the file system that corresponds to the data repository association.
              required:
                - AssociationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDataRepositoryAssociationResponse"
  /DeleteFileCache:
    post:
      operationId: DeleteFileCache
      description: Deletes an Amazon File Cache resource. After deletion, the cache no longer exists, and its data is gone. The DeleteFileCache operation returns while the cache has the DELETING status. You can check the cache deletion status by calling the DescribeFileCaches operation, which returns a list of caches in your account. If you pass the cache ID for a deleted cache, the DescribeFileCaches operation returns a FileCacheNotFound error. The data in a deleted cache is also deleted and can't be recovered by any means.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.DeleteFileCache
            default: AWSSimbaAPIService_v20180301.DeleteFileCache
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FileCacheId:
                  $ref: "#/components/schemas/FileCacheId"
                  description: The ID of the cache that's being deleted.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - FileCacheId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteFileCacheResponse"
  /DeleteFileSystem:
    post:
      operationId: DeleteFileSystem
      description: Deletes a file system. After deletion, the file system no longer exists, and its data is gone. Any existing automatic backups and snapshots are also deleted. To delete an Amazon FSx for NetApp ONTAP file system, first delete all the volumes and storage virtual machines (SVMs) on the file system. Then provide a FileSystemId value to the DeleteFileSystem operation. Before deleting an Amazon FSx for OpenZFS file system, make sure that there aren't any Amazon S3 access points attached to any volume. For more information on how to list S3 access points that are attached to volumes, see Listing S3 access point attachments. For more information on how to delete S3 access points, see Deleting an S3 access point attachment. By default, when you delete an Amazon FSx for Windows File Server file system, a final backup is created upon deletion. This final backup isn't subject to the file system's retention policy, and must be manually deleted. To delete an Amazon FSx for Lustre file system, first unmount it from every connected Amazon EC2 instance, then provide a FileSystemId value to the DeleteFileSystem operation. By default, Amazon FSx will not take a final backup when the DeleteFileSystem operation is invoked. On file systems not linked to an Amazon S3 bucket, set SkipFinalBackup to false to take a final backup of the file system you are deleting. Backups cannot be enabled on S3-linked file systems. To ensure all of your data is written back to S3 before deleting your file system, you can either monitor for the AgeOfOldestQueuedMessage metric to be zero (if using automatic export) or you can run an export data repository task. If you have automatic export enabled and want to use an export data repository task, you have to disable automatic export before executing the export data repository task. The DeleteFileSystem operation returns while the file system has the DELETING status. You can check the file system deletion status by calling the DescribeFileSystems operation, which returns a list of file systems in your account. If you pass the file system ID for a deleted file system, the DescribeFileSystems operation returns a FileSystemNotFound error. If a data repository task is in a PENDING or EXECUTING state, deleting an Amazon FSx for Lustre file system will fail with an HTTP status code 400 (Bad Request). The data in a deleted file system is also deleted and can't be recovered by any means.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.DeleteFileSystem
            default: AWSSimbaAPIService_v20180301.DeleteFileSystem
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FileSystemId:
                  $ref: "#/components/schemas/FileSystemId"
                  description: The ID of the file system that you want to delete.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: A string of up to 63 ASCII characters that Amazon FSx uses to ensure idempotent deletion. This token is automatically filled on your behalf when using the Command Line Interface (CLI) or an Amazon Web Services SDK.
                WindowsConfiguration:
                  $ref: "#/components/schemas/DeleteFileSystemWindowsConfiguration"
                LustreConfiguration:
                  $ref: "#/components/schemas/DeleteFileSystemLustreConfiguration"
                OpenZFSConfiguration:
