  /RestoreVolumeFromSnapshot:
    post:
      operationId: RestoreVolumeFromSnapshot
      description: Returns an Amazon FSx for OpenZFS volume to the state saved by the specified snapshot.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.RestoreVolumeFromSnapshot
            default: AWSSimbaAPIService_v20180301.RestoreVolumeFromSnapshot
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                VolumeId:
                  $ref: "#/components/schemas/VolumeId"
                  description: The ID of the volume that you are restoring.
                SnapshotId:
                  $ref: "#/components/schemas/SnapshotId"
                  description: The ID of the source snapshot. Specifies the snapshot that you are restoring from.
                Options:
                  $ref: "#/components/schemas/RestoreOpenZFSVolumeOptions"
                  description: The settings used when restoring the specified volume from snapshot. DELETE_INTERMEDIATE_SNAPSHOTS - Deletes snapshots between the current state and the specified snapshot. If there are intermediate snapshots and this option isn't used, RestoreVolumeFromSnapshot fails. DELETE_CLONED_VOLUMES - Deletes any dependent clone volumes created from intermediate snapshots. If there are any dependent clone volumes and this option isn't used, RestoreVolumeFromSnapshot fails.
              required:
                - VolumeId
                - SnapshotId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreVolumeFromSnapshotResponse"
