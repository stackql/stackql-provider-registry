  /UpdateDataRepositoryAssociation:
    post:
      operationId: UpdateDataRepositoryAssociation
      description: Updates the configuration of an existing data repository association on an Amazon FSx for Lustre file system. Data repository associations are supported on all FSx for Lustre 2.12 and 2.15 file systems, excluding scratch_1 deployment type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.UpdateDataRepositoryAssociation
            default: AWSSimbaAPIService_v20180301.UpdateDataRepositoryAssociation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AssociationId:
                  $ref: "#/components/schemas/DataRepositoryAssociationId"
                  description: The ID of the data repository association that you are updating.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                ImportedFileChunkSize:
                  $ref: "#/components/schemas/Megabytes"
                  description: For files imported from a data repository, this value determines the stripe count and maximum amount of data per file (in MiB) stored on a single physical disk. The maximum number of disks that a single file can be striped across is limited by the total number of disks that make up the file system. The default chunk size is 1,024 MiB (1 GiB) and can go as high as 512,000 MiB (500 GiB). Amazon S3 objects have a maximum size of 5 TB.
                S3:
                  $ref: "#/components/schemas/S3DataRepositoryConfiguration"
                  description: The configuration for an Amazon S3 data repository linked to an Amazon FSx Lustre file system with a data repository association. The configuration defines which file events (new, changed, or deleted files or directories) are automatically imported from the linked data repository to the file system or automatically exported from the file system to the data repository.
              required:
                - AssociationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDataRepositoryAssociationResponse"
  /UpdateFileCache:
    post:
      operationId: UpdateFileCache
      description: Updates the configuration of an existing Amazon File Cache resource. You can update multiple properties in a single request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
