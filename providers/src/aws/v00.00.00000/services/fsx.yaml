                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                LustreConfiguration:
                  $ref: "#/components/schemas/UpdateFileCacheLustreConfiguration"
                  description: The configuration updates for an Amazon File Cache resource.
              required:
                - FileCacheId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFileCacheResponse"
  /UpdateFileSystem:
    post:
      operationId: UpdateFileSystem
      description: "Use this operation to update the configuration of an existing Amazon FSx file system. You can update multiple properties in a single request. For FSx for Windows File Server file systems, you can update the following properties: AuditLogConfiguration AutomaticBackupRetentionDays DailyAutomaticBackupStartTime DiskIopsConfiguration SelfManagedActiveDirectoryConfiguration StorageCapacity StorageType ThroughputCapacity WeeklyMaintenanceStartTime For FSx for Lustre file systems, you can update the following properties: AutoImportPolicy AutomaticBackupRetentionDays DailyAutomaticBackupStartTime DataCompressionType FileSystemTypeVersion LogConfiguration LustreReadCacheConfiguration LustreRootSquashConfiguration MetadataConfiguration PerUnitStorageThroughput StorageCapacity ThroughputCapacity WeeklyMaintenanceStartTime For FSx for ONTAP file systems, you can update the following properties: AddRouteTableIds AutomaticBackupRetentionDays DailyAutomaticBackupStartTime DiskIopsConfiguration EndpointIpv6AddressRange FsxAdminPassword HAPairs RemoveRouteTableIds StorageCapacity ThroughputCapacity ThroughputCapacityPerHAPair WeeklyMaintenanceStartTime For FSx for OpenZFS file systems, you can update the following properties: AddRouteTableIds AutomaticBackupRetentionDays CopyTagsToBackups CopyTagsToVolumes DailyAutomaticBackupStartTime DiskIopsConfiguration EndpointIpv6AddressRange ReadCacheConfiguration RemoveRouteTableIds StorageCapacity ThroughputCapacity WeeklyMaintenanceStartTime"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSimbaAPIService_v20180301.UpdateFileSystem
            default: AWSSimbaAPIService_v20180301.UpdateFileSystem
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FileSystemId:
                  $ref: "#/components/schemas/FileSystemId"
                  description: The ID of the file system that you are updating.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: A string of up to 63 ASCII characters that Amazon FSx uses to ensure idempotent updates. This string is automatically filled on your behalf when you use the Command Line Interface (CLI) or an Amazon Web Services SDK.
                StorageCapacity:
                  $ref: "#/components/schemas/StorageCapacity"
                  description: "Use this parameter to increase the storage capacity of an FSx for Windows File Server, FSx for Lustre, FSx for OpenZFS, or FSx for ONTAP file system. For second-generation FSx for ONTAP file systems, you can also decrease the storage capacity. Specifies the storage capacity target value, in GiB, for the file system that you're updating. You can't make a storage capacity increase request if there is an existing storage capacity increase request in progress. For Lustre file systems, the storage capacity target value can be the following: For SCRATCH_2, PERSISTENT_1, and PERSISTENT_2 SSD deployment types, valid values are in multiples of 2400 GiB. The value must be greater than the current storage capacity. For PERSISTENT HDD file systems, valid values are multiples of 6000 GiB for 12-MBps throughput per TiB file systems and multiples of 1800 GiB for 40-MBps throughput per TiB file systems. The values must be greater than the current storage capacity. For SCRATCH_1 file systems, you can't increase the storage capacity. For more information, see Managing storage and throughput capacity in the FSx for Lustre User Guide. For FSx for OpenZFS file systems, the storage capacity target value must be at least 10 percent greater than the current storage capacity value. For more information, see Managing storage capacity in the FSx for OpenZFS User Guide. For Windows file systems, the storage capacity target value must be at least 10 percent greater than the current storage capacity value. To increase storage capacity, the file system must have at least 16 MBps of throughput capacity. For more information, see Managing storage capacity in the Amazon FSxfor Windows File Server User Guide. For ONTAP file systems, when increasing storage capacity, the storage capacity target value must be at least 10 percent greater than the current storage capacity value. When decreasing storage capacity on second-generation file systems, the target value must be at least 9 percent smaller than the current SSD storage capacity. For more information, see File system storage capacity and IOPS in the Amazon FSx for NetApp ONTAP User Guide."
                WindowsConfiguration:
                  $ref: "#/components/schemas/UpdateFileSystemWindowsConfiguration"
                  description: The configuration updates for an Amazon FSx for Windows File Server file system.
                LustreConfiguration:
                  $ref: "#/components/schemas/UpdateFileSystemLustreConfiguration"
                OntapConfiguration:
                  $ref: "#/components/schemas/UpdateFileSystemOntapConfiguration"
                OpenZFSConfiguration:
                  $ref: "#/components/schemas/UpdateFileSystemOpenZFSConfiguration"
                  description: The configuration updates for an FSx for OpenZFS file system.
                StorageType:
                  $ref: "#/components/schemas/StorageType"
                FileSystemTypeVersion:
                  $ref: "#/components/schemas/FileSystemTypeVersion"
                  description: The Lustre version you are updating an FSx for Lustre file system to. Valid values are 2.12 and 2.15. The value you choose must be newer than the file system's current Lustre version.
                NetworkType:
                  $ref: "#/components/schemas/NetworkType"
                  description: Changes the network type of an FSx for OpenZFS file system.
              required:
                - FileSystemId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFileSystemResponse"
  /UpdateSharedVpcConfiguration:
