components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ClientRequestToken:
      description: (Optional) An idempotency token for resource creation, in a string of up to 63 ASCII characters. This token is automatically filled on your behalf when you use the Command Line Interface (CLI) or an Amazon Web Services SDK.
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[A-za-z0-9_.-]{0,63}$"
    FileSystemId:
      description: The globally unique ID of the file system, assigned by Amazon FSx.
      type: string
      minLength: 11
      maxLength: 21
      pattern: ^(fs-[0-9a-f]{8,})$
    AlternateDNSNames:
      type: array
      items:
        $ref: "#/components/schemas/AlternateDNSName"
    AlternateDNSName:
      type: string
      minLength: 4
      maxLength: 253
      pattern: ^[^\u0000\u0085\u2028\u2029\r\n]{4,253}$
    AssociateFileSystemAliasesResponse:
      description: The system generated response showing the DNS aliases that Amazon FSx is attempting to associate with the file system. Use the API operation to monitor the status of the aliases Amazon FSx is associating with the file system. It can take up to 2.5 minutes for the alias status to change from CREATING to AVAILABLE.
      type: object
      properties:
        Aliases:
          $ref: "#/components/schemas/Aliases"
          description: An array of the DNS aliases that Amazon FSx is associating with the file system.
    Aliases:
      description: An array of one or more DNS aliases that are currently associated with the Amazon FSx file system. Aliases allow you to use existing DNS names to access the data in your Amazon FSx file system. You can associate up to 50 aliases with a file system at any time. You can associate additional DNS aliases after you create the file system using the AssociateFileSystemAliases operation. You can remove DNS aliases from the file system after it is created using the DisassociateFileSystemAliases operation. You only need to specify the alias name in the request payload. For more information, see Managing DNS aliases.
      type: array
      items:
        $ref: "#/components/schemas/Alias"
    Alias:
      description: A DNS alias that is associated with the file system. You can use a DNS alias to access a file system using user-defined DNS names, in addition to the default DNS name that Amazon FSx assigns to the file system. For more information, see DNS aliases in the FSx for Windows File Server User Guide.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/AlternateDNSName"
          description: "The name of the DNS alias. The alias name has to meet the following requirements: Formatted as a fully-qualified domain name (FQDN), hostname.domain, for example, accounting.example.com. Can contain alphanumeric characters, the underscore (_), and the hyphen (-). Cannot start or end with a hyphen. Can start with a numeric. For DNS names, Amazon FSx stores alphabetic characters as lowercase letters (a-z), regardless of how you specify them: as uppercase letters, lowercase letters, or the corresponding letters in escape codes."
        Lifecycle:
          $ref: "#/components/schemas/AliasLifecycle"
          description: Describes the state of the DNS alias. AVAILABLE - The DNS alias is associated with an Amazon FSx file system. CREATING - Amazon FSx is creating the DNS alias and associating it with the file system. CREATE_FAILED - Amazon FSx was unable to associate the DNS alias with the file system. DELETING - Amazon FSx is disassociating the DNS alias from the file system and deleting it. DELETE_FAILED - Amazon FSx was unable to disassociate the DNS alias from the file system.
    AliasLifecycle:
      type: string
      enum:
        - AVAILABLE
        - CREATING
        - DELETING
        - CREATE_FAILED
        - DELETE_FAILED
    TaskId:
      type: string
      minLength: 12
      maxLength: 128
      pattern: ^(task-[0-9a-f]{17,})$
    CancelDataRepositoryTaskResponse:
      type: object
      properties:
        Lifecycle:
          $ref: "#/components/schemas/DataRepositoryTaskLifecycle"
          description: "The lifecycle status of the data repository task, as follows: PENDING - Amazon FSx has not started the task. EXECUTING - Amazon FSx is processing the task. FAILED - Amazon FSx was not able to complete the task. For example, there may be files the task failed to process. The DataRepositoryTaskFailureDetails property provides more information about task failures. SUCCEEDED - FSx completed the task successfully. CANCELED - Amazon FSx canceled the task and it did not complete. CANCELING - FSx is in process of canceling the task."
        TaskId:
          $ref: "#/components/schemas/TaskId"
          description: The ID of the task being canceled.
    DataRepositoryTaskLifecycle:
      type: string
      enum:
        - PENDING
        - EXECUTING
        - FAILED
        - SUCCEEDED
        - CANCELED
        - CANCELING
    SourceBackupId:
      type: string
      minLength: 12
      maxLength: 128
      pattern: ^(backup-[0-9a-f]{8,})$
    Region:
      type: string
      minLength: 1
      maxLength: 20
      pattern: ^[a-z0-9-]{1,20}$
    KmsKeyId:
      description: "Specifies the ID of the Key Management Service (KMS) key to use for encrypting data on Amazon FSx file systems, as follows: Amazon FSx for Lustre PERSISTENT_1 and PERSISTENT_2 deployment types only. SCRATCH_1 and SCRATCH_2 types are encrypted using the Amazon FSx service KMS key for your account. Amazon FSx for NetApp ONTAP Amazon FSx for OpenZFS Amazon FSx for Windows File Server If a KmsKeyId isn't specified, the Amazon FSx-managed KMS key for your account is used. For more information, see Encrypt in the Key Management Service API Reference."
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^.{1,2048}$
    Flag:
      type: boolean
    Tags:
      description: A list of Tag values, with a maximum of 50 elements.
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Specifies a key-value pair for a resource tag.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: A value that specifies the TagKey, the name of the tag. Tag keys must be unique for the resource to which they are attached.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: "A value that specifies the TagValue, the value assigned to the corresponding tag key. Tag values can be null and don't have to be unique in a tag set. For example, you can have a key-value pair in a tag set of finances : April and also of payroll : April."
      required:
        - Key
        - Value
    TagKey:
      description: A string of 1 to 128 characters that specifies the key for a tag. Tag keys must be unique for the resource to which they are attached.
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValue:
      description: A string of 0 to 256 characters that specifies the value for a tag. Tag values can be null and don't have to be unique in a tag set.
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    CopyBackupResponse:
      type: object
      properties:
        Backup:
          $ref: "#/components/schemas/Backup"
    Backup:
      description: A backup of an Amazon FSx for Windows File Server, Amazon FSx for Lustre file system, Amazon FSx for NetApp ONTAP volume, or Amazon FSx for OpenZFS file system.
      type: object
      properties:
        BackupId:
          $ref: "#/components/schemas/BackupId"
          description: The ID of the backup.
        Lifecycle:
          $ref: "#/components/schemas/BackupLifecycle"
          description: The lifecycle status of the backup. AVAILABLE - The backup is fully available. PENDING - For user-initiated backups on Lustre file systems only; Amazon FSx hasn't started creating the backup. CREATING - Amazon FSx is creating the backup. TRANSFERRING - For user-initiated backups on Lustre file systems only; Amazon FSx is transferring the backup to Amazon S3. COPYING - Amazon FSx is copying the backup. DELETED - Amazon FSx deleted the backup and it's no longer available. FAILED - Amazon FSx couldn't finish the backup.
        FailureDetails:
          $ref: "#/components/schemas/BackupFailureDetails"
          description: Details explaining any failures that occurred when creating a backup.
        Type:
          $ref: "#/components/schemas/BackupType"
          description: The type of the file-system backup.
        ProgressPercent:
          $ref: "#/components/schemas/ProgressPercent"
        CreationTime:
          $ref: "#/components/schemas/CreationTime"
          description: The time when a particular backup was created.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The ID of the Key Management Service (KMS) key used to encrypt the backup of the Amazon FSx file system's data at rest.
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) for the backup resource.
        Tags:
          $ref: "#/components/schemas/Tags"
          description: The tags associated with a particular file system.
        FileSystem:
          $ref: "#/components/schemas/FileSystem"
          description: The metadata of the file system associated with the backup. This metadata is persisted even if the file system is deleted.
        DirectoryInformation:
          $ref: "#/components/schemas/ActiveDirectoryBackupAttributes"
          description: The configuration of the self-managed Microsoft Active Directory directory to which the Windows File Server instance is joined.
        OwnerId:
          $ref: "#/components/schemas/AWSAccountId"
        SourceBackupId:
          $ref: "#/components/schemas/BackupId"
        SourceBackupRegion:
          $ref: "#/components/schemas/Region"
          description: The source Region of the backup. Specifies the Region from where this backup is copied.
        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: Specifies the resource type that's backed up.
        Volume:
          $ref: "#/components/schemas/Volume"
        SizeInBytes:
          $ref: "#/components/schemas/SizeInBytes"
          description: The size of the backup in bytes. This represents the amount of data that the file system would contain if you restore this backup.
      required:
        - BackupId
        - Lifecycle
        - Type
        - CreationTime
        - FileSystem
    BackupId:
      description: The ID of the source backup. Specifies the backup that you are copying.
      type: string
      minLength: 12
      maxLength: 128
      pattern: ^(backup-[0-9a-f]{8,})$
    BackupLifecycle:
      description: The lifecycle status of the backup. AVAILABLE - The backup is fully available. PENDING - For user-initiated backups on Lustre file systems only; Amazon FSx hasn't started creating the backup. CREATING - Amazon FSx is creating the new user-initiated backup. TRANSFERRING - For user-initiated backups on Lustre file systems only; Amazon FSx is backing up the file system. COPYING - Amazon FSx is copying the backup. DELETED - Amazon FSx deleted the backup and it's no longer available. FAILED - Amazon FSx couldn't finish the backup.
      type: string
      enum:
        - AVAILABLE
        - CREATING
        - TRANSFERRING
        - DELETED
        - FAILED
        - PENDING
        - COPYING
    BackupFailureDetails:
      description: If backup creation fails, this structure contains the details of that failure.
      type: object
      properties:
        Message:
          $ref: "#/components/schemas/ErrorMessage"
          description: A message describing the backup-creation failure.
    ErrorMessage:
      description: A detailed error message.
      type: string
      minLength: 1
      maxLength: 256
    BackupType:
      description: The type of the backup.
      type: string
      enum:
        - AUTOMATIC
        - USER_INITIATED
        - AWS_BACKUP
    ProgressPercent:
      description: Displays the current percent of progress of an asynchronous task.
      type: integer
      minimum: 0
      maximum: 100
    CreationTime:
      description: The time that the resource was created, in seconds (since 1970-01-01T00:00:00Z), also known as Unix time.
      type: string
      format: date-time
    ResourceARN:
      description: The Amazon Resource Name (ARN) for a given resource. ARNs uniquely identify Amazon Web Services resources. We require an ARN when you need to specify a resource unambiguously across all of Amazon Web Services. For more information, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference.
      type: string
      minLength: 8
      maxLength: 512
      pattern: ^arn:(?=[^:]+:fsx:[^:]+:\d{12}:)((|(?=[a-z0-9-.]{1,63})(?!\d{1,3}(\.\d{1,3}){3})(?![^:]*-{2})(?![^:]*-\.)(?![^:]*\.-)[a-z0-9].*(?<!-)):){4}(?!/).{0,1024}$
    FileSystem:
      description: A description of a specific Amazon FSx file system.
      type: object
      properties:
        OwnerId:
          $ref: "#/components/schemas/AWSAccountId"
          description: The Amazon Web Services account that created the file system. If the file system was created by a user in IAM Identity Center, the Amazon Web Services account to which the IAM user belongs is the owner.
        CreationTime:
          $ref: "#/components/schemas/CreationTime"
          description: The time that the file system was created, in seconds (since 1970-01-01T00:00:00Z), also known as Unix time.
        FileSystemId:
          $ref: "#/components/schemas/FileSystemId"
          description: The system-generated, unique 17-digit ID of the file system.
        FileSystemType:
          $ref: "#/components/schemas/FileSystemType"
          description: The type of Amazon FSx file system, which can be LUSTRE, WINDOWS, ONTAP, or OPENZFS.
        Lifecycle:
          $ref: "#/components/schemas/FileSystemLifecycle"
          description: "The lifecycle status of the file system. The following are the possible values and what they mean: AVAILABLE - The file system is in a healthy state, and is reachable and available for use. CREATING - Amazon FSx is creating the new file system. DELETING - Amazon FSx is deleting an existing file system. FAILED - An existing file system has experienced an unrecoverable failure. When creating a new file system, Amazon FSx was unable to create the file system. MISCONFIGURED - The file system is in a failed but recoverable state. MISCONFIGURED_UNAVAILABLE - (Amazon FSx for Windows File Server only) The file system is currently unavailable due to a change in your Active Directory configuration. UPDATING - The file system is undergoing a customer-initiated update."
        FailureDetails:
          $ref: "#/components/schemas/FileSystemFailureDetails"
        StorageCapacity:
          $ref: "#/components/schemas/StorageCapacity"
          description: The storage capacity of the file system in gibibytes (GiB). Amazon FSx responds with an HTTP status code 400 (Bad Request) if the value of StorageCapacity is outside of the minimum or maximum values.
        StorageType:
          $ref: "#/components/schemas/StorageType"
          description: The type of storage the file system is using. If set to SSD, the file system uses solid state drive storage. If set to HDD, the file system uses hard disk drive storage. If set to INTELLIGENT_TIERING, the file system uses fully elastic, intelligently-tiered storage.
        VpcId:
          $ref: "#/components/schemas/VpcId"
          description: The ID of the primary virtual private cloud (VPC) for the file system.
        SubnetIds:
          $ref: "#/components/schemas/SubnetIds"
          description: Specifies the IDs of the subnets that the file system is accessible from. For the Amazon FSx Windows and ONTAP MULTI_AZ_1 file system deployment type, there are two subnet IDs, one for the preferred file server and one for the standby file server. The preferred file server subnet identified in the PreferredSubnetID property. All other file systems have only one subnet ID. For FSx for Lustre file systems, and Single-AZ Windows file systems, this is the ID of the subnet that contains the file system's endpoint. For MULTI_AZ_1 Windows and ONTAP file systems, the file system endpoint is available in the PreferredSubnetID.
        NetworkInterfaceIds:
          $ref: "#/components/schemas/NetworkInterfaceIds"
          description: The IDs of the elastic network interfaces from which a specific file system is accessible. The elastic network interface is automatically created in the same virtual private cloud (VPC) that the Amazon FSx file system was created in. For more information, see Elastic Network Interfaces in the Amazon EC2 User Guide. For an Amazon FSx for Windows File Server file system, you can have one network interface ID. For an Amazon FSx for Lustre file system, you can have more than one.
        DNSName:
          $ref: "#/components/schemas/DNSName"
          description: The Domain Name System (DNS) name for the file system.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: "The ID of the Key Management Service (KMS) key used to encrypt Amazon FSx file system data. Used as follows with Amazon FSx file system types: Amazon FSx for Lustre PERSISTENT_1 and PERSISTENT_2 deployment types only. SCRATCH_1 and SCRATCH_2 types are encrypted using the Amazon FSx service KMS key for your account. Amazon FSx for NetApp ONTAP Amazon FSx for OpenZFS Amazon FSx for Windows File Server"
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the file system resource.
        Tags:
          $ref: "#/components/schemas/Tags"
          description: The tags to associate with the file system. For more information, see Tagging your Amazon FSx resources in the Amazon FSx for Lustre User Guide.
        WindowsConfiguration:
          $ref: "#/components/schemas/WindowsFileSystemConfiguration"
          description: The configuration for this Amazon FSx for Windows File Server file system.
        LustreConfiguration:
          $ref: "#/components/schemas/LustreFileSystemConfiguration"
        AdministrativeActions:
          $ref: "#/components/schemas/AdministrativeActions"
          description: A list of administrative actions for the file system that are in process or waiting to be processed. Administrative actions describe changes to the Amazon FSx system that you have initiated using the UpdateFileSystem operation.
        OntapConfiguration:
          $ref: "#/components/schemas/OntapFileSystemConfiguration"
          description: The configuration for this Amazon FSx for NetApp ONTAP file system.
        FileSystemTypeVersion:
          $ref: "#/components/schemas/FileSystemTypeVersion"
          description: The Lustre version of the Amazon FSx for Lustre file system, which can be 2.10, 2.12, or 2.15.
        OpenZFSConfiguration:
          $ref: "#/components/schemas/OpenZFSFileSystemConfiguration"
          description: The configuration for this Amazon FSx for OpenZFS file system.
        NetworkType:
          $ref: "#/components/schemas/NetworkType"
          description: The network type of the file system.
    AWSAccountId:
      description: An Amazon Web Services account ID. This ID is a 12-digit number that you use to construct Amazon Resource Names (ARNs) for resources.
      type: string
      minLength: 12
      maxLength: 12
      pattern: ^\d{12}$
    FileSystemType:
      description: The type of Amazon FSx file system.
      type: string
      enum:
        - WINDOWS
        - LUSTRE
        - ONTAP
        - OPENZFS
    FileSystemLifecycle:
      description: The lifecycle status of the file system.
      type: string
      enum:
        - AVAILABLE
        - CREATING
        - FAILED
        - DELETING
        - MISCONFIGURED
        - UPDATING
        - MISCONFIGURED_UNAVAILABLE
    FileSystemFailureDetails:
      description: A structure providing details of any failures that occurred.
      type: object
      properties:
        Message:
          $ref: "#/components/schemas/ErrorMessage"
          description: A message describing any failures that occurred.
    StorageCapacity:
      description: Specifies the file system's storage capacity, in gibibytes (GiB).
      type: integer
      minimum: 0
      maximum: 2147483647
    StorageType:
      description: Specifies the file system's storage type.
      type: string
      enum:
        - SSD
        - HDD
        - INTELLIGENT_TIERING
    VpcId:
      description: The ID of your virtual private cloud (VPC). For more information, see VPC and subnets in the Amazon VPC User Guide.
      type: string
      minLength: 12
      maxLength: 21
      pattern: ^(vpc-[0-9a-f]{8,})$
    SubnetIds:
      description: A list of subnet IDs that the cache will be accessible from. You can specify only one subnet ID in a call to the CreateFileCache operation.
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      description: The ID for a subnet. A subnet is a range of IP addresses in your virtual private cloud (VPC). For more information, see VPC and subnets in the Amazon VPC User Guide.
      type: string
      minLength: 15
      maxLength: 24
      pattern: ^(subnet-[0-9a-f]{8,})$
    NetworkInterfaceIds:
      description: A list of network interface IDs.
      type: array
      items:
        $ref: "#/components/schemas/NetworkInterfaceId"
    NetworkInterfaceId:
      description: An elastic network interface ID. An elastic network interface is a logical networking component in a virtual private cloud (VPC) that represents a virtual network card. For more information, see Elastic Network Interfaces in the Amazon EC2 User Guide for Linux Instances.
      type: string
      minLength: 12
      maxLength: 21
      pattern: ^(eni-[0-9a-f]{8,})$
    DNSName:
      description: The file system's DNS name. You can mount your file system using its DNS name.
      type: string
      minLength: 16
      maxLength: 275
      pattern: ^((fs|fc)i?-[0-9a-f]{8,}\..{4,253})$
    WindowsFileSystemConfiguration:
      description: The configuration for this Microsoft Windows file system.
      type: object
      properties:
        ActiveDirectoryId:
          $ref: "#/components/schemas/DirectoryId"
          description: The ID for an existing Amazon Web Services Managed Microsoft Active Directory instance that the file system is joined to.
        SelfManagedActiveDirectoryConfiguration:
          $ref: "#/components/schemas/SelfManagedActiveDirectoryAttributes"
        DeploymentType:
          $ref: "#/components/schemas/WindowsDeploymentType"
          description: "Specifies the file system deployment type, valid values are the following: MULTI_AZ_1 - Specifies a high availability file system that is configured for Multi-AZ redundancy to tolerate temporary Availability Zone (AZ) unavailability, and supports SSD and HDD storage. SINGLE_AZ_1 - (Default) Specifies a file system that is configured for single AZ redundancy, only supports SSD storage. SINGLE_AZ_2 - Latest generation Single AZ file system. Specifies a file system that is configured for single AZ redundancy and supports SSD and HDD storage. For more information, see Single-AZ and Multi-AZ File Systems."
        RemoteAdministrationEndpoint:
          $ref: "#/components/schemas/DNSName"
          description: For MULTI_AZ_1 deployment types, use this endpoint when performing administrative tasks on the file system using Amazon FSx Remote PowerShell. For SINGLE_AZ_1 and SINGLE_AZ_2 deployment types, this is the DNS name of the file system. This endpoint is temporarily unavailable when the file system is undergoing maintenance.
        PreferredSubnetId:
          $ref: "#/components/schemas/SubnetId"
          description: "For MULTI_AZ_1 deployment types, it specifies the ID of the subnet where the preferred file server is located. Must be one of the two subnet IDs specified in SubnetIds property. Amazon FSx serves traffic from this subnet except in the event of a failover to the secondary file server. For SINGLE_AZ_1 and SINGLE_AZ_2 deployment types, this value is the same as that for SubnetIDs. For more information, see Availability and durability: Single-AZ and Multi-AZ file systems."
        PreferredFileServerIp:
          $ref: "#/components/schemas/IpAddress"
          description: For MULTI_AZ_1 deployment types, the IPv4 address of the primary, or preferred, file server. Use this IP address when mounting the file system on Linux SMB clients or Windows SMB clients that are not joined to a Microsoft Active Directory. Applicable for all Windows file system deployment types. This IPv4 address is temporarily unavailable when the file system is undergoing maintenance. For Linux and Windows SMB clients that are joined to an Active Directory, use the file system's DNSName instead. For more information on mapping and mounting file shares, see Accessing data using file shares.
        ThroughputCapacity:
          $ref: "#/components/schemas/MegabytesPerSecond"
          description: The throughput of the Amazon FSx file system, measured in megabytes per second.
        MaintenanceOperationsInProgress:
          $ref: "#/components/schemas/FileSystemMaintenanceOperations"
          description: The list of maintenance operations in progress for this file system.
        WeeklyMaintenanceStartTime:
          $ref: "#/components/schemas/WeeklyTime"
          description: The preferred start time to perform weekly maintenance, formatted d:HH:MM in the UTC time zone. d is the weekday number, from 1 through 7, beginning with Monday and ending with Sunday.
        DailyAutomaticBackupStartTime:
          $ref: "#/components/schemas/DailyTime"
          description: The preferred time to take daily automatic backups, in the UTC time zone.
        AutomaticBackupRetentionDays:
          $ref: "#/components/schemas/AutomaticBackupRetentionDays"
          description: The number of days to retain automatic backups. Setting this to 0 disables automatic backups. You can retain automatic backups for a maximum of 90 days.
        CopyTagsToBackups:
          $ref: "#/components/schemas/Flag"
          description: A boolean flag indicating whether tags on the file system should be copied to backups. This value defaults to false. If it's set to true, all tags on the file system are copied to all automatic backups and any user-initiated backups where the user doesn't specify any tags. If this value is true, and you specify one or more tags, only the specified tags are copied to backups. If you specify one or more tags when creating a user-initiated backup, no tags are copied from the file system, regardless of this value.
        Aliases:
          $ref: "#/components/schemas/Aliases"
        AuditLogConfiguration:
          $ref: "#/components/schemas/WindowsAuditLogConfiguration"
          description: The configuration that Amazon FSx for Windows File Server uses to audit and log user accesses of files, folders, and file shares on the Amazon FSx for Windows File Server file system.
        DiskIopsConfiguration:
          $ref: "#/components/schemas/DiskIopsConfiguration"
          description: The SSD IOPS (input/output operations per second) configuration for an Amazon FSx for Windows file system. By default, Amazon FSx automatically provisions 3 IOPS per GiB of storage capacity. You can provision additional IOPS per GiB of storage, up to the maximum limit associated with your chosen throughput capacity.
        PreferredFileServerIpv6:
          $ref: "#/components/schemas/IpAddress"
          description: For MULTI_AZ_1 deployment types, the IPv6 address of the primary, or preferred, file server. Use this IP address when mounting the file system on Linux SMB clients or Windows SMB clients that are not joined to a Microsoft Active Directory. Applicable for all Windows file system deployment types. This IPv6 address is temporarily unavailable when the file system is undergoing maintenance. For Linux and Windows SMB clients that are joined to an Active Directory, use the file system's DNSName instead.
        FsrmConfiguration:
          $ref: "#/components/schemas/WindowsFsrmConfiguration"
          description: The File Server Resource Manager (FSRM) configuration that Amazon FSx for Windows File Server uses for the file system. FSRM is disabled by default.
    DirectoryId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: ^d-[0-9a-f]{10}$
    SelfManagedActiveDirectoryAttributes:
      description: The configuration of the self-managed Microsoft Active Directory (AD) directory to which the Windows File Server or ONTAP storage virtual machine (SVM) instance is joined.
      type: object
      properties:
        DomainName:
          $ref: "#/components/schemas/ActiveDirectoryFullyQualifiedName"
          description: The fully qualified domain name of the self-managed AD directory.
        OrganizationalUnitDistinguishedName:
          $ref: "#/components/schemas/OrganizationalUnitDistinguishedName"
          description: The fully qualified distinguished name of the organizational unit within the self-managed AD directory to which the Windows File Server or ONTAP storage virtual machine (SVM) instance is joined.
        FileSystemAdministratorsGroup:
          $ref: "#/components/schemas/FileSystemAdministratorsGroupName"
          description: The name of the domain group whose members have administrative privileges for the FSx file system.
        UserName:
          $ref: "#/components/schemas/DirectoryUserName"
          description: The user name for the service account on your self-managed AD domain that FSx uses to join to your AD domain.
        DnsIps:
          $ref: "#/components/schemas/DnsIps"
          description: A list of up to three IP addresses of DNS servers or domain controllers in the self-managed AD directory.
        DomainJoinServiceAccountSecret:
          $ref: "#/components/schemas/CustomerSecretsManagerARN"
          description: The Amazon Resource Name (ARN) of the Amazon Web Services Secrets Manager secret containing the service account credentials used to join the file system to your self-managed Active Directory domain.
    ActiveDirectoryFullyQualifiedName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[^\u0000\u0085\u2028\u2029\r\n]{1,255}$
    OrganizationalUnitDistinguishedName:
      type: string
      minLength: 1
      maxLength: 2000
      pattern: ^[^\u0000\u0085\u2028\u2029\r\n]{1,2000}$
    FileSystemAdministratorsGroupName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^[^\u0000\u0085\u2028\u2029\r\n]{1,256}$
    DirectoryUserName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^[^\u0000\u0085\u2028\u2029\r\n]{1,256}$
    DnsIps:
      type: array
      items:
        $ref: "#/components/schemas/IpAddress"
    IpAddress:
      type: string
      minLength: 1
      maxLength: 45
      pattern: (^((([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5]))$|^(([0-9a-fA-F]{1,4}:){7,7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})|:((:[0-9a-fA-F]{1,4}){1,7}|:)|fe80:(:[0-9a-fA-F]{0,4}){0,4}%[0-9a-zA-Z]{1,}|::(ffff(:0{1,4}){0,1}:){0,1}((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])\.){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])|([0-9a-fA-F]{1,4}:){1,4}:((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])\.){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9]))$)
    CustomerSecretsManagerARN:
      type: string
      minLength: 64
      maxLength: 1024
      pattern: ^arn:[^:]{1,63}:secretsmanager:[a-z0-9-]+:[0-9]{12}:secret:[a-zA-Z0-9/_+=.@-]+-[a-zA-Z0-9]{6}$
    WindowsDeploymentType:
      type: string
      enum:
        - MULTI_AZ_1
        - SINGLE_AZ_1
        - SINGLE_AZ_2
    MegabytesPerSecond:
      description: The sustained throughput of an Amazon FSx file system in Megabytes per second (MBps).
      type: integer
      minimum: 8
      maximum: 100000
    FileSystemMaintenanceOperations:
      description: A list of maintenance operations.
      type: array
      items:
        $ref: "#/components/schemas/FileSystemMaintenanceOperation"
    FileSystemMaintenanceOperation:
      description: An enumeration specifying the currently ongoing maintenance operation.
      type: string
      enum:
        - PATCHING
        - BACKING_UP
    WeeklyTime:
      description: The preferred start time to perform weekly maintenance, formatted d:HH:MM in the UTC time zone, where d is the weekday number, from 1 through 7, beginning with Monday and ending with Sunday. For example, 1:05:00 specifies maintenance at 5 AM Monday.
      type: string
      minLength: 7
      maxLength: 7
      pattern: ^[1-7]:([01]\d|2[0-3]):?([0-5]\d)$
    DailyTime:
      description: A recurring daily time, in the format HH:MM. HH is the zero-padded hour of the day (0-23), and MM is the zero-padded minute of the hour. For example, 05:00 specifies 5 AM daily.
      type: string
      minLength: 5
      maxLength: 5
      pattern: ^([01]\d|2[0-3]):?([0-5]\d)$
    AutomaticBackupRetentionDays:
      description: The number of days to retain automatic backups. Setting this property to 0 disables automatic backups. You can retain automatic backups for a maximum of 90 days. The default is 30.
      type: integer
      minimum: 0
      maximum: 90
    WindowsAuditLogConfiguration:
      description: The configuration that Amazon FSx for Windows File Server uses to audit and log user accesses of files, folders, and file shares on the Amazon FSx for Windows File Server file system. For more information, see File access auditing.
      type: object
      properties:
        FileAccessAuditLogLevel:
          $ref: "#/components/schemas/WindowsAccessAuditLogLevel"
          description: Sets which attempt type is logged by Amazon FSx for file and folder accesses. SUCCESS_ONLY - only successful attempts to access files or folders are logged. FAILURE_ONLY - only failed attempts to access files or folders are logged. SUCCESS_AND_FAILURE - both successful attempts and failed attempts to access files or folders are logged. DISABLED - access auditing of files and folders is turned off.
        FileShareAccessAuditLogLevel:
          $ref: "#/components/schemas/WindowsAccessAuditLogLevel"
          description: Sets which attempt type is logged by Amazon FSx for file share accesses. SUCCESS_ONLY - only successful attempts to access file shares are logged. FAILURE_ONLY - only failed attempts to access file shares are logged. SUCCESS_AND_FAILURE - both successful attempts and failed attempts to access file shares are logged. DISABLED - access auditing of file shares is turned off.
        AuditLogDestination:
          $ref: "#/components/schemas/GeneralARN"
          description: The Amazon Resource Name (ARN) for the destination of the audit logs. The destination can be any Amazon CloudWatch Logs log group ARN or Amazon Kinesis Data Firehose delivery stream ARN. The name of the Amazon CloudWatch Logs log group must begin with the /aws/fsx prefix. The name of the Amazon Kinesis Data Firehose delivery stream must begin with the aws-fsx prefix. The destination ARN (either CloudWatch Logs log group or Kinesis Data Firehose delivery stream) must be in the same Amazon Web Services partition, Amazon Web Services Region, and Amazon Web Services account as your Amazon FSx file system.
      required:
        - FileAccessAuditLogLevel
        - FileShareAccessAuditLogLevel
    WindowsAccessAuditLogLevel:
      type: string
      enum:
        - DISABLED
        - SUCCESS_ONLY
        - FAILURE_ONLY
        - SUCCESS_AND_FAILURE
    GeneralARN:
      type: string
      minLength: 8
      maxLength: 1024
      pattern: ^arn:[^:]{1,63}:[^:]{0,63}:[^:]{0,63}:(?:|\d{12}):[^/].{0,1023}$
    DiskIopsConfiguration:
      description: The SSD IOPS (input/output operations per second) configuration for an Amazon FSx for NetApp ONTAP, Amazon FSx for Windows File Server, or FSx for OpenZFS file system. By default, Amazon FSx automatically provisions 3 IOPS per GB of storage capacity. You can provision additional IOPS per GB of storage. The configuration consists of the total number of provisioned SSD IOPS and how it is was provisioned, or the mode (by the customer or by Amazon FSx).
      type: object
      properties:
        Mode:
          $ref: "#/components/schemas/DiskIopsConfigurationMode"
          description: Specifies whether the file system is using the AUTOMATIC setting of SSD IOPS of 3 IOPS per GB of storage capacity, or if it using a USER_PROVISIONED value.
        Iops:
          $ref: "#/components/schemas/Iops"
          description: The total number of SSD IOPS provisioned for the file system. The minimum and maximum values for this property depend on the value of HAPairs and StorageCapacity. The minimum value is calculated as StorageCapacity * 3 * HAPairs (3 IOPS per GB of StorageCapacity). The maximum value is calculated as 200,000 * HAPairs. Amazon FSx responds with an HTTP status code 400 (Bad Request) if the value of Iops is outside of the minimum or maximum values.
    DiskIopsConfigurationMode:
      type: string
      enum:
        - AUTOMATIC
        - USER_PROVISIONED
    Iops:
      type: integer
      format: int64
      minimum: 0
      maximum: 2400000
    WindowsFsrmConfiguration:
      description: The File Server Resource Manager (FSRM) configuration that Amazon FSx for Windows File Server uses for the file system. When FSRM is enabled, you can manage and monitor storage quotas, file screening, storage reports, and file classification.
      type: object
      properties:
        FsrmServiceEnabled:
          $ref: "#/components/schemas/Flag"
          description: Specifies whether FSRM is enabled or disabled on the file system. When TRUE, the FSRM service is enabled and monitor file operations according to configured policies. When FALSE or omitted, FSRM is disabled. The default value is FALSE.
        EventLogDestination:
          $ref: "#/components/schemas/GeneralARN"
          description: The Amazon Resource Name (ARN) for the destination of the FSRM event logs. The destination can be any Amazon CloudWatch Logs log group ARN or Amazon Kinesis Data Firehose delivery stream ARN. The name of the Amazon CloudWatch Logs log group must begin with the /aws/fsx prefix. The name of the Amazon Kinesis Data Firehose delivery stream must begin with the aws-fsx prefix. The destination ARN (either CloudWatch Logs log group or Kinesis Data Firehose delivery stream) must be in the same Amazon Web Services partition, Amazon Web Services Region, and Amazon Web Services account as your Amazon FSx file system.
      required:
        - FsrmServiceEnabled
    LustreFileSystemConfiguration:
      description: The configuration for the Amazon FSx for Lustre file system.
      type: object
      properties:
        WeeklyMaintenanceStartTime:
          $ref: "#/components/schemas/WeeklyTime"
          description: The preferred start time to perform weekly maintenance, formatted d:HH:MM in the UTC time zone. Here, d is the weekday number, from 1 through 7, beginning with Monday and ending with Sunday.
        DataRepositoryConfiguration:
          $ref: "#/components/schemas/DataRepositoryConfiguration"
        DeploymentType:
          $ref: "#/components/schemas/LustreDeploymentType"
          description: The deployment type of the FSx for Lustre file system. Scratch deployment type is designed for temporary storage and shorter-term processing of data. SCRATCH_1 and SCRATCH_2 deployment types are best suited for when you need temporary storage and shorter-term processing of data. The SCRATCH_2 deployment type provides in-transit encryption of data and higher burst throughput capacity than SCRATCH_1. The PERSISTENT_1 and PERSISTENT_2 deployment type is used for longer-term storage and workloads and encryption of data in transit. PERSISTENT_2 offers higher PerUnitStorageThroughput (up to 1000 MB/s/TiB) along with a lower minimum storage capacity requirement (600 GiB). To learn more about FSx for Lustre deployment types, see Deployment and storage class options for FSx for Lustre file systems. The default is SCRATCH_1.
        PerUnitStorageThroughput:
          $ref: "#/components/schemas/PerUnitStorageThroughput"
          description: "Per unit storage throughput represents the megabytes per second of read or write throughput per 1 tebibyte of storage provisioned. File system throughput capacity is equal to Storage capacity (TiB) * PerUnitStorageThroughput (MB/s/TiB). This option is only valid for PERSISTENT_1 and PERSISTENT_2 deployment types. Valid values: For PERSISTENT_1 SSD storage: 50, 100, 200. For PERSISTENT_1 HDD storage: 12, 40. For PERSISTENT_2 SSD storage: 125, 250, 500, 1000."
        MountName:
          $ref: "#/components/schemas/LustreFileSystemMountName"
          description: You use the MountName value when mounting the file system. For the SCRATCH_1 deployment type, this value is always "fsx". For SCRATCH_2, PERSISTENT_1, and PERSISTENT_2 deployment types, this value is a string that is unique within an Amazon Web Services Region.
        DailyAutomaticBackupStartTime:
          $ref: "#/components/schemas/DailyTime"
        AutomaticBackupRetentionDays:
          $ref: "#/components/schemas/AutomaticBackupRetentionDays"
        CopyTagsToBackups:
          $ref: "#/components/schemas/Flag"
          description: A boolean flag indicating whether tags on the file system are copied to backups. If it's set to true, all tags on the file system are copied to all automatic backups and any user-initiated backups where the user doesn't specify any tags. If this value is true, and you specify one or more tags, only the specified tags are copied to backups. If you specify one or more tags when creating a user-initiated backup, no tags are copied from the file system, regardless of this value. (Default = false)
        DriveCacheType:
          $ref: "#/components/schemas/DriveCacheType"
          description: The type of drive cache used by PERSISTENT_1 file systems that are provisioned with HDD storage devices. This parameter is required when StorageType is HDD. When set to READ the file system has an SSD storage cache that is sized to 20% of the file system's storage capacity. This improves the performance for frequently accessed files by caching up to 20% of the total storage capacity. This parameter is required when StorageType is set to HDD.
        DataCompressionType:
          $ref: "#/components/schemas/DataCompressionType"
          description: "The data compression configuration for the file system. DataCompressionType can have the following values: NONE - Data compression is turned off for the file system. LZ4 - Data compression is turned on with the LZ4 algorithm. For more information, see Lustre data compression."
        LogConfiguration:
          $ref: "#/components/schemas/LustreLogConfiguration"
          description: The Lustre logging configuration. Lustre logging writes the enabled log events for your file system to Amazon CloudWatch Logs.
        RootSquashConfiguration:
          $ref: "#/components/schemas/LustreRootSquashConfiguration"
          description: The Lustre root squash configuration for an Amazon FSx for Lustre file system. When enabled, root squash restricts root-level access from clients that try to access your file system as a root user.
        MetadataConfiguration:
          $ref: "#/components/schemas/FileSystemLustreMetadataConfiguration"
          description: The Lustre metadata performance configuration for an Amazon FSx for Lustre file system using a PERSISTENT_2 deployment type.
        EfaEnabled:
          $ref: "#/components/schemas/Flag"
          description: Specifies whether Elastic Fabric Adapter (EFA) and GPUDirect Storage (GDS) support is enabled for the Amazon FSx for Lustre file system.
        ThroughputCapacity:
          $ref: "#/components/schemas/ThroughputCapacityMbps"
          description: The throughput of an Amazon FSx for Lustre file system using the Intelligent-Tiering storage class, measured in megabytes per second (MBps).
        DataReadCacheConfiguration:
          $ref: "#/components/schemas/LustreReadCacheConfiguration"
          description: Required when StorageType is set to INTELLIGENT_TIERING. Specifies the optional provisioned SSD read cache.
    DataRepositoryConfiguration:
      description: The data repository configuration object for Lustre file systems returned in the response of the CreateFileSystem operation. This data type is not supported on file systems with a data repository association. For file systems with a data repository association, see .
      type: object
      properties:
        Lifecycle:
          $ref: "#/components/schemas/DataRepositoryLifecycle"
          description: "Describes the state of the file system's S3 durable data repository, if it is configured with an S3 repository. The lifecycle can have the following values: CREATING - The data repository configuration between the FSx file system and the linked S3 data repository is being created. The data repository is unavailable. AVAILABLE - The data repository is available for use. MISCONFIGURED - Amazon FSx cannot automatically import updates from the S3 bucket until the data repository configuration is corrected. For more information, see Troubleshooting a Misconfigured linked S3 bucket. UPDATING - The data repository is undergoing a customer initiated update and availability may be impacted. FAILED - The data repository is in a terminal state that cannot be recovered."
        ImportPath:
          $ref: "#/components/schemas/ArchivePath"
          description: The import path to the Amazon S3 bucket (and optional prefix) that you're using as the data repository for your FSx for Lustre file system, for example s3://import-bucket/optional-prefix. If a prefix is specified after the Amazon S3 bucket name, only object keys with that prefix are loaded into the file system.
        ExportPath:
          $ref: "#/components/schemas/ArchivePath"
          description: The export path to the Amazon S3 bucket (and prefix) that you are using to store new and changed Lustre file system files in S3.
        ImportedFileChunkSize:
          $ref: "#/components/schemas/Megabytes"
          description: For files imported from a data repository, this value determines the stripe count and maximum amount of data per file (in MiB) stored on a single physical disk. The maximum number of disks that a single file can be striped across is limited by the total number of disks that make up the file system. The default chunk size is 1,024 MiB (1 GiB) and can go as high as 512,000 MiB (500 GiB). Amazon S3 objects have a maximum size of 5 TB.
        AutoImportPolicy:
          $ref: "#/components/schemas/AutoImportPolicyType"
          description: "Describes the file system's linked S3 data repository's AutoImportPolicy. The AutoImportPolicy configures how Amazon FSx keeps your file and directory listings up to date as you add or modify objects in your linked S3 bucket. AutoImportPolicy can have the following values: NONE - (Default) AutoImport is off. Amazon FSx only updates file and directory listings from the linked S3 bucket when the file system is created. FSx does not update file and directory listings for any new or changed objects after choosing this option. NEW - AutoImport is on. Amazon FSx automatically imports directory listings of any new objects added to the linked S3 bucket that do not currently exist in the FSx file system. NEW_CHANGED - AutoImport is on. Amazon FSx automatically imports file and directory listings of any new objects added to the S3 bucket and any existing objects that are changed in the S3 bucket after you choose this option. NEW_CHANGED_DELETED - AutoImport is on. Amazon FSx automatically imports file and directory listings of any new objects added to the S3 bucket, any existing objects that are changed in the S3 bucket, and any objects that were deleted in the S3 bucket."
        FailureDetails:
          $ref: "#/components/schemas/DataRepositoryFailureDetails"
    DataRepositoryLifecycle:
      type: string
      enum:
        - CREATING
        - AVAILABLE
        - MISCONFIGURED
        - UPDATING
        - DELETING
        - FAILED
    ArchivePath:
      type: string
      minLength: 3
      maxLength: 4357
      pattern: ^[^\u0000\u0085\u2028\u2029\r\n]{3,4357}$
    Megabytes:
      type: integer
      minimum: 1
      maximum: 512000
    AutoImportPolicyType:
      type: string
      enum:
        - NONE
        - NEW
        - NEW_CHANGED
        - NEW_CHANGED_DELETED
    DataRepositoryFailureDetails:
      description: Provides detailed information about the data repository if its Lifecycle is set to MISCONFIGURED or FAILED.
      type: object
      properties:
        Message:
          $ref: "#/components/schemas/ErrorMessage"
    LustreDeploymentType:
      type: string
      enum:
        - SCRATCH_1
        - SCRATCH_2
        - PERSISTENT_1
        - PERSISTENT_2
    PerUnitStorageThroughput:
      type: integer
      minimum: 12
      maximum: 1000
    LustreFileSystemMountName:
      type: string
      minLength: 1
      maxLength: 8
      pattern: ^([A-Za-z0-9_-]{1,8})$
    DriveCacheType:
      type: string
      enum:
        - NONE
        - READ
    DataCompressionType:
      type: string
      enum:
        - NONE
        - LZ4
    LustreLogConfiguration:
      description: The configuration for Lustre logging used to write the enabled logging events for your Amazon FSx for Lustre file system or Amazon File Cache resource to Amazon CloudWatch Logs.
      type: object
      properties:
        Level:
          $ref: "#/components/schemas/LustreAccessAuditLogLevel"
          description: The data repository events that are logged by Amazon FSx. WARN_ONLY - only warning events are logged. ERROR_ONLY - only error events are logged. WARN_ERROR - both warning events and error events are logged. DISABLED - logging of data repository events is turned off. Note that Amazon File Cache uses a default setting of WARN_ERROR, which can't be changed.
        Destination:
          $ref: "#/components/schemas/GeneralARN"
          description: The Amazon Resource Name (ARN) that specifies the destination of the logs. The destination can be any Amazon CloudWatch Logs log group ARN. The destination ARN must be in the same Amazon Web Services partition, Amazon Web Services Region, and Amazon Web Services account as your Amazon FSx file system.
      required:
        - Level
    LustreAccessAuditLogLevel:
      type: string
      enum:
        - DISABLED
        - WARN_ONLY
        - ERROR_ONLY
        - WARN_ERROR
    LustreRootSquashConfiguration:
      description: The configuration for Lustre root squash used to restrict root-level access from clients that try to access your FSx for Lustre file system as root. Use the RootSquash parameter to enable root squash. To learn more about Lustre root squash, see Lustre root squash. You can also use the NoSquashNids parameter to provide an array of clients who are not affected by the root squash setting. These clients will access the file system as root, with unrestricted privileges.
      type: object
      properties:
        RootSquash:
          $ref: "#/components/schemas/LustreRootSquash"
          description: "You enable root squash by setting a user ID (UID) and group ID (GID) for the file system in the format UID:GID (for example, 365534:65534). The UID and GID values can range from 0 to 4294967294: A non-zero value for UID and GID enables root squash. The UID and GID values can be different, but each must be a non-zero value. A value of 0 (zero) for UID and GID indicates root, and therefore disables root squash. When root squash is enabled, the user ID and group ID of a root user accessing the file system are re-mapped to the UID and GID you provide."
        NoSquashNids:
          $ref: "#/components/schemas/LustreNoSquashNids"
          description: "When root squash is enabled, you can optionally specify an array of NIDs of clients for which root squash does not apply. A client NID is a Lustre Network Identifier used to uniquely identify a client. You can specify the NID as either a single address or a range of addresses: A single address is described in standard Lustre NID format by specifying the client’s IP address followed by the Lustre network ID (for example, 10.0.1.6@tcp). An address range is described using a dash to separate the range (for example, 10.0.[2-10].[1-255]@tcp)."
    LustreRootSquash:
      type: string
      minLength: 3
      maxLength: 21
      pattern: ^([0-9]{1,10}):([0-9]{1,10})$
    LustreNoSquashNids:
      type: array
      items:
        $ref: "#/components/schemas/LustreNoSquashNid"
    LustreNoSquashNid:
      type: string
      minLength: 11
      maxLength: 43
      pattern: ^([0-9\[\]\-]*\.){3}([0-9\[\]\-]*)@tcp$
    FileSystemLustreMetadataConfiguration:
      description: The Lustre metadata performance configuration of an Amazon FSx for Lustre file system using a PERSISTENT_2 deployment type. The configuration enables the file system to support increasing metadata performance.
      type: object
      properties:
        Iops:
          $ref: "#/components/schemas/MetadataIops"
          description: The number of Metadata IOPS provisioned for the file system. For SSD file systems, valid values are 1500, 3000, 6000, 12000, and multiples of 12000 up to a maximum of 192000. For Intelligent-Tiering file systems, valid values are 6000 and 12000.
        Mode:
          $ref: "#/components/schemas/MetadataConfigurationMode"
          description: The metadata configuration mode for provisioning Metadata IOPS for the file system. In AUTOMATIC mode (supported only on SSD file systems), FSx for Lustre automatically provisions and scales the number of Metadata IOPS on your file system based on your file system storage capacity. In USER_PROVISIONED mode, you can choose to specify the number of Metadata IOPS to provision for your file system.
      required:
        - Mode
    MetadataIops:
      type: integer
      minimum: 1500
      maximum: 192000
    MetadataConfigurationMode:
      type: string
      enum:
        - AUTOMATIC
        - USER_PROVISIONED
    ThroughputCapacityMbps:
      type: integer
      minimum: 4000
      maximum: 2000000
    LustreReadCacheConfiguration:
      description: The configuration for the optional provisioned SSD read cache on Amazon FSx for Lustre file systems that use the Intelligent-Tiering storage class.
      type: object
      properties:
        SizingMode:
          $ref: "#/components/schemas/LustreReadCacheSizingMode"
          description: "Specifies how the provisioned SSD read cache is sized, as follows: Set to NO_CACHE if you do not want to use an SSD read cache with your Intelligent-Tiering file system. Set to USER_PROVISIONED to specify the exact size of your SSD read cache. Set to PROPORTIONAL_TO_THROUGHPUT_CAPACITY to have your SSD read cache automatically sized based on your throughput capacity."
        SizeGiB:
          $ref: "#/components/schemas/StorageCapacity"
          description: Required if SizingMode is set to USER_PROVISIONED. Specifies the size of the file system's SSD read cache, in gibibytes (GiB). The SSD read cache size is distributed across provisioned file servers in your file system. Intelligent-Tiering file systems support a minimum of 32 GiB and maximum of 131072 GiB for SSD read cache size for every 4,000 MB/s of throughput capacity provisioned.
    LustreReadCacheSizingMode:
      type: string
      enum:
        - NO_CACHE
        - USER_PROVISIONED
        - PROPORTIONAL_TO_THROUGHPUT_CAPACITY
    AdministrativeActions:
      type: array
      items:
        $ref: "#/components/schemas/AdministrativeAction"
    AdministrativeAction:
      description: Describes a specific Amazon FSx administrative action for the current Windows, Lustre, OpenZFS, or ONTAP file system or volume.
      type: object
      properties:
        AdministrativeActionType:
          $ref: "#/components/schemas/AdministrativeActionType"
        ProgressPercent:
          $ref: "#/components/schemas/ProgressPercent"
          description: The percentage-complete status of a STORAGE_OPTIMIZATION or DOWNLOAD_DATA_FROM_BACKUP administrative action. Does not apply to any other administrative action type.
        RequestTime:
          $ref: "#/components/schemas/RequestTime"
          description: The time that the administrative action request was received.
        Status:
          $ref: "#/components/schemas/Status"
          description: "The status of the administrative action, as follows: FAILED - Amazon FSx failed to process the administrative action successfully. IN_PROGRESS - Amazon FSx is processing the administrative action. PENDING - Amazon FSx is waiting to process the administrative action. COMPLETED - Amazon FSx has finished processing the administrative task. For a backup restore to a second-generation FSx for ONTAP file system, indicates that all data has been downloaded to the volume, and clients now have read-write access to volume. UPDATED_OPTIMIZING - For a storage-capacity increase update, Amazon FSx has updated the file system with the new storage capacity, and is now performing the storage-optimization process. PENDING - For a backup restore to a second-generation FSx for ONTAP file system, indicates that the file metadata is being downloaded onto the volume. The volume's Lifecycle state is CREATING. IN_PROGRESS - For a backup restore to a second-generation FSx for ONTAP file system, indicates that all metadata has been downloaded to the new volume and client can access data with read-only access while Amazon FSx downloads the file data to the volume. Track the progress of this process with the ProgressPercent element."
        TargetFileSystemValues:
          $ref: "#/components/schemas/FileSystem"
          description: The target value for the administration action, provided in the UpdateFileSystem operation. Returned for FILE_SYSTEM_UPDATE administrative actions.
        FailureDetails:
          $ref: "#/components/schemas/AdministrativeActionFailureDetails"
        TargetVolumeValues:
          $ref: "#/components/schemas/Volume"
        TargetSnapshotValues:
          $ref: "#/components/schemas/Snapshot"
        TotalTransferBytes:
          $ref: "#/components/schemas/TotalTransferBytes"
          description: The number of bytes that have transferred for the FSx for OpenZFS snapshot that you're copying.
        RemainingTransferBytes:
          $ref: "#/components/schemas/RemainingTransferBytes"
          description: The remaining bytes to transfer for the FSx for OpenZFS snapshot that you're copying.
        Message:
          $ref: "#/components/schemas/ErrorMessage"
    AdministrativeActionType:
      description: "Describes the type of administrative action, as follows: FILE_SYSTEM_UPDATE - A file system update administrative action initiated from the Amazon FSx console, API (UpdateFileSystem), or CLI (update-file-system). THROUGHPUT_OPTIMIZATION - After the FILE_SYSTEM_UPDATE task to increase a file system's throughput capacity has been completed successfully, a THROUGHPUT_OPTIMIZATION task starts. You can track the storage-optimization progress using the ProgressPercent property. When THROUGHPUT_OPTIMIZATION has been completed successfully, the parent FILE_SYSTEM_UPDATE action status changes to COMPLETED. For more information, see Managing throughput capacity in the Amazon FSx for Windows File Server User Guide. STORAGE_OPTIMIZATION - After the FILE_SYSTEM_UPDATE task to increase a file system's storage capacity has completed successfully, a STORAGE_OPTIMIZATION task starts. For Windows and ONTAP, storage optimization is the process of migrating the file system data to newer larger disks. For Lustre, storage optimization consists of rebalancing the data across the existing and newly added file servers. You can track the storage-optimization progress using the ProgressPercent property. When STORAGE_OPTIMIZATION has been completed successfully, the parent FILE_SYSTEM_UPDATE action status changes to COMPLETED. For more information, see Managing storage capacity in the Amazon FSx for Windows File Server User Guide, Managing storage capacity in the Amazon FSx for Lustre User Guide, and Managing storage capacity and provisioned IOPS in the Amazon FSx for NetApp ONTAP User Guide. FILE_SYSTEM_ALIAS_ASSOCIATION - A file system update to associate a new Domain Name System (DNS) alias with the file system. For more information, see AssociateFileSystemAliases. FILE_SYSTEM_ALIAS_DISASSOCIATION - A file system update to disassociate a DNS alias from the file system. For more information, see DisassociateFileSystemAliases. IOPS_OPTIMIZATION - After the FILE_SYSTEM_UPDATE task to increase a file system's throughput capacity has been completed successfully, a IOPS_OPTIMIZATION task starts. You can track the storage-optimization progress using the ProgressPercent property. When IOPS_OPTIMIZATION has been completed successfully, the parent FILE_SYSTEM_UPDATE action status changes to COMPLETED. For more information, see Managing provisioned SSD IOPS in the Amazon FSx for Windows File Server User Guide. STORAGE_TYPE_OPTIMIZATION - After the FILE_SYSTEM_UPDATE task to increase a file system's throughput capacity has been completed successfully, a STORAGE_TYPE_OPTIMIZATION task starts. You can track the storage-optimization progress using the ProgressPercent property. When STORAGE_TYPE_OPTIMIZATION has been completed successfully, the parent FILE_SYSTEM_UPDATE action status changes to COMPLETED. VOLUME_UPDATE - A volume update to an Amazon FSx for OpenZFS volume initiated from the Amazon FSx console, API (UpdateVolume), or CLI (update-volume). VOLUME_RESTORE - An Amazon FSx for OpenZFS volume is returned to the state saved by the specified snapshot, initiated from an API (RestoreVolumeFromSnapshot) or CLI (restore-volume-from-snapshot). SNAPSHOT_UPDATE - A snapshot update to an Amazon FSx for OpenZFS volume initiated from the Amazon FSx console, API (UpdateSnapshot), or CLI (update-snapshot). RELEASE_NFS_V3_LOCKS - Tracks the release of Network File System (NFS) V3 locks on an Amazon FSx for OpenZFS file system. DOWNLOAD_DATA_FROM_BACKUP - An FSx for ONTAP backup is being restored to a new volume on a second-generation file system. Once the all the file metadata is loaded onto the volume, you can mount the volume with read-only access. during this process. VOLUME_INITIALIZE_WITH_SNAPSHOT - A volume is being created from a snapshot on a different FSx for OpenZFS file system. You can initiate this from the Amazon FSx console, API (CreateVolume), or CLI (create-volume) when using the using the FULL_COPY strategy. VOLUME_UPDATE_WITH_SNAPSHOT - A volume is being updated from a snapshot on a different FSx for OpenZFS file system. You can initiate this from the Amazon FSx console, API (CopySnapshotAndUpdateVolume), or CLI (copy-snapshot-and-update-volume)."
      type: string
      enum:
        - FILE_SYSTEM_UPDATE
        - STORAGE_OPTIMIZATION
        - FILE_SYSTEM_ALIAS_ASSOCIATION
        - FILE_SYSTEM_ALIAS_DISASSOCIATION
        - VOLUME_UPDATE
        - SNAPSHOT_UPDATE
        - RELEASE_NFS_V3_LOCKS
        - VOLUME_RESTORE
        - THROUGHPUT_OPTIMIZATION
        - IOPS_OPTIMIZATION
        - STORAGE_TYPE_OPTIMIZATION
        - MISCONFIGURED_STATE_RECOVERY
        - VOLUME_UPDATE_WITH_SNAPSHOT
        - VOLUME_INITIALIZE_WITH_SNAPSHOT
        - DOWNLOAD_DATA_FROM_BACKUP
    RequestTime:
      type: string
      format: date-time
    Status:
      type: string
      enum:
        - FAILED
        - IN_PROGRESS
        - PENDING
        - COMPLETED
        - UPDATED_OPTIMIZING
        - OPTIMIZING
        - PAUSED
        - CANCELLED
    AdministrativeActionFailureDetails:
      description: Provides information about a failed administrative action.
      type: object
      properties:
        Message:
          $ref: "#/components/schemas/ErrorMessage"
          description: Error message providing details about the failed administrative action.
    Volume:
      description: Describes an Amazon FSx volume.
      type: object
      properties:
        CreationTime:
          $ref: "#/components/schemas/CreationTime"
        FileSystemId:
          $ref: "#/components/schemas/FileSystemId"
        Lifecycle:
          $ref: "#/components/schemas/VolumeLifecycle"
          description: The lifecycle status of the volume. AVAILABLE - The volume is fully available for use. CREATED - The volume has been created. CREATING - Amazon FSx is creating the new volume. DELETING - Amazon FSx is deleting an existing volume. FAILED - Amazon FSx was unable to create the volume. MISCONFIGURED - The volume is in a failed but recoverable state. PENDING - Amazon FSx hasn't started creating the volume.
        Name:
          $ref: "#/components/schemas/VolumeName"
          description: The name of the volume.
        OntapConfiguration:
          $ref: "#/components/schemas/OntapVolumeConfiguration"
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
        Tags:
          $ref: "#/components/schemas/Tags"
        VolumeId:
          $ref: "#/components/schemas/VolumeId"
          description: The system-generated, unique ID of the volume.
        VolumeType:
          $ref: "#/components/schemas/VolumeType"
          description: The type of the volume.
        LifecycleTransitionReason:
          $ref: "#/components/schemas/LifecycleTransitionReason"
          description: The reason why the volume lifecycle status changed.
        AdministrativeActions:
          $ref: "#/components/schemas/AdministrativeActions"
          description: A list of administrative actions for the volume that are in process or waiting to be processed. Administrative actions describe changes to the volume that you have initiated using the UpdateVolume action.
        OpenZFSConfiguration:
          $ref: "#/components/schemas/OpenZFSVolumeConfiguration"
          description: The configuration of an Amazon FSx for OpenZFS volume.
    VolumeLifecycle:
      type: string
      enum:
        - CREATING
        - CREATED
        - DELETING
        - FAILED
        - MISCONFIGURED
        - PENDING
        - AVAILABLE
    VolumeName:
      type: string
      minLength: 1
      maxLength: 203
      pattern: ^[^\u0000\u0085\u2028\u2029\r\n]{1,203}$
    OntapVolumeConfiguration:
      description: The configuration of an Amazon FSx for NetApp ONTAP volume.
      type: object
      properties:
        FlexCacheEndpointType:
          $ref: "#/components/schemas/FlexCacheEndpointType"
          description: "Specifies the FlexCache endpoint type of the volume. Valid values are the following: NONE specifies that the volume doesn't have a FlexCache configuration. NONE is the default. ORIGIN specifies that the volume is the origin volume for a FlexCache volume. CACHE specifies that the volume is a FlexCache volume."
        JunctionPath:
          $ref: "#/components/schemas/JunctionPath"
          description: Specifies the directory that network-attached storage (NAS) clients use to mount the volume, along with the storage virtual machine (SVM) Domain Name System (DNS) name or IP address. You can create a JunctionPath directly below a parent volume junction or on a directory within a volume. A JunctionPath for a volume named vol3 might be /vol1/vol2/vol3, or /vol1/dir2/vol3, or even /dir1/dir2/vol3.
        SecurityStyle:
          $ref: "#/components/schemas/SecurityStyle"
          description: The security style for the volume, which can be UNIX, NTFS, or MIXED.
        SizeInMegabytes:
          $ref: "#/components/schemas/VolumeCapacity"
          description: The configured size of the volume, in megabytes (MBs).
        StorageEfficiencyEnabled:
          $ref: "#/components/schemas/Flag"
          description: The volume's storage efficiency setting.
        StorageVirtualMachineId:
          $ref: "#/components/schemas/StorageVirtualMachineId"
          description: The ID of the volume's storage virtual machine.
        StorageVirtualMachineRoot:
          $ref: "#/components/schemas/Flag"
          description: A Boolean flag indicating whether this volume is the root volume for its storage virtual machine (SVM). Only one volume on an SVM can be the root volume. This value defaults to false. If this value is true, then this is the SVM root volume. This flag is useful when you're deleting an SVM, because you must first delete all non-root volumes. This flag, when set to false, helps you identify which volumes to delete before you can delete the SVM.
        TieringPolicy:
          $ref: "#/components/schemas/TieringPolicy"
          description: The volume's TieringPolicy setting.
        UUID:
          $ref: "#/components/schemas/UUID"
          description: The volume's universally unique identifier (UUID).
        OntapVolumeType:
          $ref: "#/components/schemas/OntapVolumeType"
          description: "Specifies the type of volume. Valid values are the following: RW specifies a read/write volume. RW is the default. DP specifies a data-protection volume. You can protect data by replicating it to data-protection mirror copies. If a disaster occurs, you can use these data-protection mirror copies to recover data. LS specifies a load-sharing mirror volume. A load-sharing mirror reduces the network traffic to a FlexVol volume by providing additional read-only access to clients."
        SnapshotPolicy:
          $ref: "#/components/schemas/SnapshotPolicy"
          description: "Specifies the snapshot policy for the volume. There are three built-in snapshot policies: default: This is the default policy. A maximum of six hourly snapshots taken five minutes past the hour. A maximum of two daily snapshots taken Monday through Saturday at 10 minutes after midnight. A maximum of two weekly snapshots taken every Sunday at 15 minutes after midnight. default-1weekly: This policy is the same as the default policy except that it only retains one snapshot from the weekly schedule. none: This policy does not take any snapshots. This policy can be assigned to volumes to prevent automatic snapshots from being taken. You can also provide the name of a custom policy that you created with the ONTAP CLI or REST API. For more information, see Snapshot policies in the Amazon FSx for NetApp ONTAP User Guide."
        CopyTagsToBackups:
          $ref: "#/components/schemas/Flag"
          description: A boolean flag indicating whether tags for the volume should be copied to backups. This value defaults to false. If it's set to true, all tags for the volume are copied to all automatic and user-initiated backups where the user doesn't specify tags. If this value is true, and you specify one or more tags, only the specified tags are copied to backups. If you specify one or more tags when creating a user-initiated backup, no tags are copied from the volume, regardless of this value.
        SnaplockConfiguration:
          $ref: "#/components/schemas/SnaplockConfiguration"
          description: The SnapLock configuration object for an FSx for ONTAP SnapLock volume.
        VolumeStyle:
          $ref: "#/components/schemas/VolumeStyle"
          description: Use to specify the style of an ONTAP volume. For more information about FlexVols and FlexGroups, see Volume types in Amazon FSx for NetApp ONTAP User Guide.
        AggregateConfiguration:
          $ref: "#/components/schemas/AggregateConfiguration"
          description: This structure specifies configuration options for a volume’s storage aggregate or aggregates.
        SizeInBytes:
          $ref: "#/components/schemas/VolumeCapacityBytes"
          description: The configured size of the volume, in bytes.
    FlexCacheEndpointType:
      type: string
      enum:
        - NONE
        - ORIGIN
        - CACHE
    JunctionPath:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[^\u0000\u0085\u2028\u2029\r\n]{1,255}$
    SecurityStyle:
      type: string
      enum:
        - UNIX
        - NTFS
        - MIXED
    VolumeCapacity:
      type: integer
      minimum: 0
      maximum: 2147483647
    StorageVirtualMachineId:
      type: string
      minLength: 21
      maxLength: 21
      pattern: ^(svm-[0-9a-f]{17,})$
    TieringPolicy:
      description: "Describes the data tiering policy for an ONTAP volume. When enabled, Amazon FSx for ONTAP's intelligent tiering automatically transitions a volume's data between the file system's primary storage and capacity pool storage based on your access patterns. Valid tiering policies are the following: SNAPSHOT_ONLY - (Default value) moves cold snapshots to the capacity pool storage tier. AUTO - moves cold user data and snapshots to the capacity pool storage tier based on your access patterns. ALL - moves all user data blocks in both the active file system and Snapshot copies to the storage pool tier. NONE - keeps a volume's data in the primary storage tier, preventing it from being moved to the capacity pool tier."
      type: object
      properties:
        CoolingPeriod:
          $ref: "#/components/schemas/CoolingPeriod"
          description: Specifies the number of days that user data in a volume must remain inactive before it is considered "cold" and moved to the capacity pool. Used with the AUTO and SNAPSHOT_ONLY tiering policies. Enter a whole number between 2 and 183. Default values are 31 days for AUTO and 2 days for SNAPSHOT_ONLY.
        Name:
          $ref: "#/components/schemas/TieringPolicyName"
          description: Specifies the tiering policy used to transition data. Default value is SNAPSHOT_ONLY. SNAPSHOT_ONLY - moves cold snapshots to the capacity pool storage tier. AUTO - moves cold user data and snapshots to the capacity pool storage tier based on your access patterns. ALL - moves all user data blocks in both the active file system and Snapshot copies to the storage pool tier. NONE - keeps a volume's data in the primary storage tier, preventing it from being moved to the capacity pool tier.
    CoolingPeriod:
      type: integer
      minimum: 2
      maximum: 183
    TieringPolicyName:
      type: string
      enum:
        - SNAPSHOT_ONLY
        - AUTO
        - ALL
        - NONE
    UUID:
      type: string
      maxLength: 36
      pattern: ^[^\u0000\u0085\u2028\u2029\r\n]{1,36}$
    OntapVolumeType:
      type: string
      enum:
        - RW
        - DP
        - LS
    SnapshotPolicy:
      type: string
      minLength: 1
      maxLength: 255
    SnaplockConfiguration:
      description: Specifies the SnapLock configuration for an FSx for ONTAP SnapLock volume.
      type: object
      properties:
        AuditLogVolume:
          $ref: "#/components/schemas/Flag"
          description: Enables or disables the audit log volume for an FSx for ONTAP SnapLock volume. The default value is false. If you set AuditLogVolume to true, the SnapLock volume is created as an audit log volume. The minimum retention period for an audit log volume is six months. For more information, see SnapLock audit log volumes.
        AutocommitPeriod:
          $ref: "#/components/schemas/AutocommitPeriod"
          description: The configuration object for setting the autocommit period of files in an FSx for ONTAP SnapLock volume.
        PrivilegedDelete:
          $ref: "#/components/schemas/PrivilegedDelete"
          description: Enables, disables, or permanently disables privileged delete on an FSx for ONTAP SnapLock Enterprise volume. Enabling privileged delete allows SnapLock administrators to delete write once, read many (WORM) files even if they have active retention periods. PERMANENTLY_DISABLED is a terminal state. If privileged delete is permanently disabled on a SnapLock volume, you can't re-enable it. The default value is DISABLED. For more information, see Privileged delete.
        RetentionPeriod:
          $ref: "#/components/schemas/SnaplockRetentionPeriod"
          description: Specifies the retention period of an FSx for ONTAP SnapLock volume.
        SnaplockType:
          $ref: "#/components/schemas/SnaplockType"
          description: "Specifies the retention mode of an FSx for ONTAP SnapLock volume. After it is set, it can't be changed. You can choose one of the following retention modes: COMPLIANCE: Files transitioned to write once, read many (WORM) on a Compliance volume can't be deleted until their retention periods expire. This retention mode is used to address government or industry-specific mandates or to protect against ransomware attacks. For more information, see SnapLock Compliance. ENTERPRISE: Files transitioned to WORM on an Enterprise volume can be deleted by authorized users before their retention periods expire using privileged delete. This retention mode is used to advance an organization's data integrity and internal compliance or to test retention settings before using SnapLock Compliance. For more information, see SnapLock Enterprise."
        VolumeAppendModeEnabled:
          $ref: "#/components/schemas/Flag"
          description: Enables or disables volume-append mode on an FSx for ONTAP SnapLock volume. Volume-append mode allows you to create WORM-appendable files and write data to them incrementally. The default value is false. For more information, see Volume-append mode.
    AutocommitPeriod:
      description: Sets the autocommit period of files in an FSx for ONTAP SnapLock volume, which determines how long the files must remain unmodified before they're automatically transitioned to the write once, read many (WORM) state. For more information, see Autocommit.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/AutocommitPeriodType"
          description: Defines the type of time for the autocommit period of a file in an FSx for ONTAP SnapLock volume. Setting this value to NONE disables autocommit. The default value is NONE.
        Value:
          $ref: "#/components/schemas/AutocommitPeriodValue"
          description: "Defines the amount of time for the autocommit period of a file in an FSx for ONTAP SnapLock volume. The following ranges are valid: Minutes: 5 - 65,535 Hours: 1 - 65,535 Days: 1 - 3,650 Months: 1 - 120 Years: 1 - 10"
      required:
        - Type
    AutocommitPeriodType:
      type: string
      enum:
        - MINUTES
        - HOURS
        - DAYS
        - MONTHS
        - YEARS
        - NONE
    AutocommitPeriodValue:
      type: integer
      minimum: 1
      maximum: 65535
    PrivilegedDelete:
      type: string
      enum:
        - DISABLED
        - ENABLED
        - PERMANENTLY_DISABLED
    SnaplockRetentionPeriod:
      description: The configuration to set the retention period of an FSx for ONTAP SnapLock volume. The retention period includes default, maximum, and minimum settings. For more information, see Working with the retention period in SnapLock.
      type: object
      properties:
        DefaultRetention:
          $ref: "#/components/schemas/RetentionPeriod"
          description: The retention period assigned to a write once, read many (WORM) file by default if an explicit retention period is not set for an FSx for ONTAP SnapLock volume. The default retention period must be greater than or equal to the minimum retention period and less than or equal to the maximum retention period.
        MinimumRetention:
          $ref: "#/components/schemas/RetentionPeriod"
          description: The shortest retention period that can be assigned to a WORM file on an FSx for ONTAP SnapLock volume.
        MaximumRetention:
          $ref: "#/components/schemas/RetentionPeriod"
          description: The longest retention period that can be assigned to a WORM file on an FSx for ONTAP SnapLock volume.
      required:
        - DefaultRetention
        - MinimumRetention
        - MaximumRetention
    RetentionPeriod:
      description: Specifies the retention period of an FSx for ONTAP SnapLock volume. After it is set, it can't be changed. Files can't be deleted or modified during the retention period. For more information, see Working with the retention period in SnapLock.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/RetentionPeriodType"
          description: Defines the type of time for the retention period of an FSx for ONTAP SnapLock volume. Set it to one of the valid types. If you set it to INFINITE, the files are retained forever. If you set it to UNSPECIFIED, the files are retained until you set an explicit retention period.
        Value:
          $ref: "#/components/schemas/RetentionPeriodValue"
          description: "Defines the amount of time for the retention period of an FSx for ONTAP SnapLock volume. You can't set a value for INFINITE or UNSPECIFIED. For all other options, the following ranges are valid: Seconds: 0 - 65,535 Minutes: 0 - 65,535 Hours: 0 - 24 Days: 0 - 365 Months: 0 - 12 Years: 0 - 100"
      required:
        - Type
    RetentionPeriodType:
      type: string
      enum:
        - SECONDS
        - MINUTES
        - HOURS
        - DAYS
        - MONTHS
        - YEARS
        - INFINITE
        - UNSPECIFIED
    RetentionPeriodValue:
      type: integer
      minimum: 0
      maximum: 65535
    SnaplockType:
      type: string
      enum:
        - COMPLIANCE
        - ENTERPRISE
    VolumeStyle:
      type: string
      enum:
        - FLEXVOL
        - FLEXGROUP
    AggregateConfiguration:
      description: Used to specify configuration options for a volume’s storage aggregate or aggregates.
      type: object
      properties:
        Aggregates:
          $ref: "#/components/schemas/Aggregates"
          description: "The list of aggregates that this volume resides on. Aggregates are storage pools which make up your primary storage tier. Each high-availability (HA) pair has one aggregate. The names of the aggregates map to the names of the aggregates in the ONTAP CLI and REST API. For FlexVols, there will always be a single entry. Amazon FSx responds with an HTTP status code 400 (Bad Request) for the following conditions: The strings in the value of Aggregates are not are not formatted as aggrX, where X is a number between 1 and 12. The value of Aggregates contains aggregates that are not present. One or more of the aggregates supplied are too close to the volume limit to support adding more volumes."
        TotalConstituents:
          $ref: "#/components/schemas/TotalConstituents"
          description: The total number of constituents this FlexGroup volume has. Not applicable for FlexVols.
    Aggregates:
      type: array
      items:
        $ref: "#/components/schemas/Aggregate"
    Aggregate:
      type: string
      minLength: 5
      maxLength: 6
      pattern: ^(aggr[0-9]{1,2})$
    TotalConstituents:
      type: integer
      minimum: 1
      maximum: 200
    VolumeCapacityBytes:
      type: integer
      format: int64
      minimum: 0
      maximum: 22517998000000000
    VolumeId:
      type: string
      minLength: 23
      maxLength: 23
      pattern: ^(fsvol-[0-9a-f]{17,})$
    VolumeType:
      type: string
      enum:
        - ONTAP
        - OPENZFS
    LifecycleTransitionReason:
      description: Describes why a resource lifecycle state changed.
      type: object
      properties:
        Message:
          $ref: "#/components/schemas/ErrorMessage"
    OpenZFSVolumeConfiguration:
      description: The configuration of an Amazon FSx for OpenZFS volume.
      type: object
      properties:
        ParentVolumeId:
          $ref: "#/components/schemas/VolumeId"
          description: The ID of the parent volume.
        VolumePath:
          $ref: "#/components/schemas/VolumePath"
          description: The path to the volume from the root volume. For example, fsx/parentVolume/volume1.
        StorageCapacityReservationGiB:
          $ref: "#/components/schemas/IntegerNoMax"
          description: The amount of storage in gibibytes (GiB) to reserve from the parent volume. You can't reserve more storage than the parent volume has reserved.
        StorageCapacityQuotaGiB:
          $ref: "#/components/schemas/IntegerNoMax"
          description: The maximum amount of storage in gibibytes (GiB) that the volume can use from its parent. You can specify a quota larger than the storage on the parent volume.
        RecordSizeKiB:
          $ref: "#/components/schemas/IntegerRecordSizeKiB"
          description: The record size of an OpenZFS volume, in kibibytes (KiB). Valid values are 4, 8, 16, 32, 64, 128, 256, 512, or 1024 KiB. The default is 128 KiB. Most workloads should use the default record size. For guidance on when to set a custom record size, see the Amazon FSx for OpenZFS User Guide.
        DataCompressionType:
          $ref: "#/components/schemas/OpenZFSDataCompressionType"
          description: Specifies the method used to compress the data on the volume. The compression type is NONE by default. NONE - Doesn't compress the data on the volume. NONE is the default. ZSTD - Compresses the data in the volume using the Zstandard (ZSTD) compression algorithm. Compared to LZ4, Z-Standard provides a better compression ratio to minimize on-disk storage utilization. LZ4 - Compresses the data in the volume using the LZ4 compression algorithm. Compared to Z-Standard, LZ4 is less compute-intensive and delivers higher write throughput speeds.
        CopyTagsToSnapshots:
          $ref: "#/components/schemas/Flag"
          description: A Boolean value indicating whether tags for the volume should be copied to snapshots. This value defaults to false. If it's set to true, all tags for the volume are copied to snapshots where the user doesn't specify tags. If this value is true and you specify one or more tags, only the specified tags are copied to snapshots. If you specify one or more tags when creating the snapshot, no tags are copied from the volume, regardless of this value.
        OriginSnapshot:
          $ref: "#/components/schemas/OpenZFSOriginSnapshotConfiguration"
          description: The configuration object that specifies the snapshot to use as the origin of the data for the volume.
        ReadOnly:
          $ref: "#/components/schemas/ReadOnly"
          description: A Boolean value indicating whether the volume is read-only.
        NfsExports:
          $ref: "#/components/schemas/OpenZFSNfsExports"
          description: The configuration object for mounting a Network File System (NFS) file system.
        UserAndGroupQuotas:
          $ref: "#/components/schemas/OpenZFSUserAndGroupQuotas"
          description: An object specifying how much storage users or groups can use on the volume.
        RestoreToSnapshot:
          $ref: "#/components/schemas/SnapshotId"
          description: Specifies the ID of the snapshot to which the volume was restored.
        DeleteIntermediateSnaphots:
          $ref: "#/components/schemas/Flag"
          description: A Boolean value indicating whether snapshots between the current state and the specified snapshot should be deleted when a volume is restored from snapshot.
        DeleteClonedVolumes:
          $ref: "#/components/schemas/Flag"
          description: A Boolean value indicating whether dependent clone volumes created from intermediate snapshots should be deleted when a volume is restored from snapshot.
        DeleteIntermediateData:
          $ref: "#/components/schemas/Flag"
          description: A Boolean value indicating whether snapshot data that differs between the current state and the specified snapshot should be overwritten when a volume is restored from a snapshot.
        SourceSnapshotARN:
          $ref: "#/components/schemas/ResourceARN"
        DestinationSnapshot:
          $ref: "#/components/schemas/SnapshotId"
          description: The ID of the snapshot that's being copied or was most recently copied to the destination volume.
        CopyStrategy:
          $ref: "#/components/schemas/OpenZFSCopyStrategy"
          description: Specifies the strategy used when copying data from the snapshot to the new volume. CLONE - The new volume references the data in the origin snapshot. Cloning a snapshot is faster than copying data from the snapshot to a new volume and doesn't consume disk throughput. However, the origin snapshot can't be deleted if there is a volume using its copied data. FULL_COPY - Copies all data from the snapshot to the new volume. Specify this option to create the volume from a snapshot on another FSx for OpenZFS file system. The INCREMENTAL_COPY option is only for updating an existing volume by using a snapshot from another FSx for OpenZFS file system. For more information, see CopySnapshotAndUpdateVolume.
    VolumePath:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^[A-za-z0-9\_\.\:\-\/]*$
    IntegerNoMax:
      type: integer
      minimum: 0
      maximum: 2147483647
    IntegerRecordSizeKiB:
      type: integer
      minimum: 4
      maximum: 4096
    OpenZFSDataCompressionType:
      type: string
      enum:
        - NONE
        - ZSTD
        - LZ4
    OpenZFSOriginSnapshotConfiguration:
      description: The snapshot configuration used when creating an Amazon FSx for OpenZFS volume from a snapshot.
      type: object
      properties:
        SnapshotARN:
          $ref: "#/components/schemas/ResourceARN"
        CopyStrategy:
          $ref: "#/components/schemas/OpenZFSCopyStrategy"
          description: The strategy used when copying data from the snapshot to the new volume. CLONE - The new volume references the data in the origin snapshot. Cloning a snapshot is faster than copying the data from a snapshot to a new volume and doesn't consume disk throughput. However, the origin snapshot can't be deleted if there is a volume using its copied data. FULL_COPY - Copies all data from the snapshot to the new volume. The INCREMENTAL_COPY option is only for updating an existing volume by using a snapshot from another FSx for OpenZFS file system. For more information, see CopySnapshotAndUpdateVolume.
    OpenZFSCopyStrategy:
      type: string
      enum:
        - CLONE
        - FULL_COPY
        - INCREMENTAL_COPY
    ReadOnly:
      type: boolean
    OpenZFSNfsExports:
      type: array
      items:
        $ref: "#/components/schemas/OpenZFSNfsExport"
    OpenZFSNfsExport:
      description: The Network File System (NFS) configurations for mounting an Amazon FSx for OpenZFS file system.
      type: object
      properties:
        ClientConfigurations:
          $ref: "#/components/schemas/OpenZFSClientConfigurations"
          description: A list of configuration objects that contain the client and options for mounting the OpenZFS file system.
      required:
        - ClientConfigurations
    OpenZFSClientConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/OpenZFSClientConfiguration"
    OpenZFSClientConfiguration:
      description: Specifies who can mount an OpenZFS file system and the options available while mounting the file system.
      type: object
      properties:
        Clients:
          $ref: "#/components/schemas/OpenZFSClients"
          description: A value that specifies who can mount the file system. You can provide a wildcard character (*), an IP address (0.0.0.0), or a CIDR address (192.0.2.0/24). By default, Amazon FSx uses the wildcard character when specifying the client.
        Options:
          $ref: "#/components/schemas/OpenZFSNfsExportOptions"
          description: "The options to use when mounting the file system. For a list of options that you can use with Network File System (NFS), see the exports(5) - Linux man page. When choosing your options, consider the following: crossmnt is used by default. If you don't specify crossmnt when changing the client configuration, you won't be able to see or access snapshots in your file system's snapshot directory. sync is used by default. If you instead specify async, the system acknowledges writes before writing to disk. If the system crashes before the writes are finished, you lose the unwritten data."
      required:
        - Clients
        - Options
    OpenZFSClients:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[ -~]{1,128}$
    OpenZFSNfsExportOptions:
      type: array
      items:
        $ref: "#/components/schemas/OpenZFSNfsExportOption"
    OpenZFSNfsExportOption:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[ -~]{1,128}$
    OpenZFSUserAndGroupQuotas:
      type: array
      items:
        $ref: "#/components/schemas/OpenZFSUserOrGroupQuota"
    OpenZFSUserOrGroupQuota:
      description: Used to configure quotas that define how much storage a user or group can use on an FSx for OpenZFS volume. For more information, see Volume properties in the FSx for OpenZFS User Guide.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/OpenZFSQuotaType"
          description: Specifies whether the quota applies to a user or group.
        Id:
          $ref: "#/components/schemas/IntegerNoMax"
          description: The ID of the user or group that the quota applies to.
        StorageCapacityQuotaGiB:
          $ref: "#/components/schemas/IntegerNoMax"
          description: The user or group's storage quota, in gibibytes (GiB).
      required:
        - Type
        - Id
        - StorageCapacityQuotaGiB
    OpenZFSQuotaType:
      type: string
      enum:
        - USER
        - GROUP
    SnapshotId:
      type: string
      minLength: 11
      maxLength: 28
      pattern: ^((fs)?volsnap-[0-9a-f]{8,})$
    Snapshot:
      description: A snapshot of an Amazon FSx for OpenZFS volume.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
        SnapshotId:
          $ref: "#/components/schemas/SnapshotId"
          description: The ID of the snapshot.
        Name:
          $ref: "#/components/schemas/SnapshotName"
          description: The name of the snapshot.
        VolumeId:
          $ref: "#/components/schemas/VolumeId"
          description: The ID of the volume that the snapshot is of.
        CreationTime:
          $ref: "#/components/schemas/CreationTime"
        Lifecycle:
          $ref: "#/components/schemas/SnapshotLifecycle"
          description: The lifecycle status of the snapshot. PENDING - Amazon FSx hasn't started creating the snapshot. CREATING - Amazon FSx is creating the snapshot. DELETING - Amazon FSx is deleting the snapshot. AVAILABLE - The snapshot is fully available.
        LifecycleTransitionReason:
          $ref: "#/components/schemas/LifecycleTransitionReason"
        Tags:
          $ref: "#/components/schemas/Tags"
        AdministrativeActions:
          $ref: "#/components/schemas/AdministrativeActions"
          description: A list of administrative actions for the file system that are in process or waiting to be processed. Administrative actions describe changes to the Amazon FSx system.
    SnapshotName:
      type: string
      minLength: 1
      maxLength: 203
      pattern: ^[a-zA-Z0-9_:.-]{1,203}$
    SnapshotLifecycle:
      type: string
      enum:
        - PENDING
        - CREATING
        - DELETING
        - AVAILABLE
    TotalTransferBytes:
      type: integer
      format: int64
      minimum: 0
    RemainingTransferBytes:
      type: integer
      format: int64
      minimum: 0
    OntapFileSystemConfiguration:
      description: Configuration for the FSx for NetApp ONTAP file system.
      type: object
      properties:
        AutomaticBackupRetentionDays:
          $ref: "#/components/schemas/AutomaticBackupRetentionDays"
        DailyAutomaticBackupStartTime:
          $ref: "#/components/schemas/DailyTime"
        DeploymentType:
          $ref: "#/components/schemas/OntapDeploymentType"
          description: Specifies the FSx for ONTAP file system deployment type in use in the file system. MULTI_AZ_1 - A high availability file system configured for Multi-AZ redundancy to tolerate temporary Availability Zone (AZ) unavailability. This is a first-generation FSx for ONTAP file system. MULTI_AZ_2 - A high availability file system configured for Multi-AZ redundancy to tolerate temporary AZ unavailability. This is a second-generation FSx for ONTAP file system. SINGLE_AZ_1 - A file system configured for Single-AZ redundancy. This is a first-generation FSx for ONTAP file system. SINGLE_AZ_2 - A file system configured with multiple high-availability (HA) pairs for Single-AZ redundancy. This is a second-generation FSx for ONTAP file system. For information about the use cases for Multi-AZ and Single-AZ deployments, refer to Choosing Multi-AZ or Single-AZ file system deployment.
        EndpointIpAddressRange:
          $ref: "#/components/schemas/IpAddressRange"
          description: (Multi-AZ only) Specifies the IPv4 address range in which the endpoints to access your file system will be created. By default in the Amazon FSx API, Amazon FSx selects an unused IP address range for you from the 198.19.* range. By default in the Amazon FSx console, Amazon FSx chooses the last 64 IP addresses from the VPC’s primary CIDR range to use as the endpoint IP address range for the file system. You can have overlapping endpoint IP addresses for file systems deployed in the same VPC/route tables.
        Endpoints:
          $ref: "#/components/schemas/FileSystemEndpoints"
          description: The Management and Intercluster endpoints that are used to access data or to manage the file system using the NetApp ONTAP CLI, REST API, or NetApp SnapMirror.
        DiskIopsConfiguration:
          $ref: "#/components/schemas/DiskIopsConfiguration"
          description: The SSD IOPS configuration for the ONTAP file system, specifying the number of provisioned IOPS and the provision mode.
        PreferredSubnetId:
          $ref: "#/components/schemas/SubnetId"
        RouteTableIds:
          $ref: "#/components/schemas/RouteTableIds"
          description: (Multi-AZ only) The VPC route tables in which your file system's endpoints are created.
        ThroughputCapacity:
          $ref: "#/components/schemas/MegabytesPerSecond"
        WeeklyMaintenanceStartTime:
          $ref: "#/components/schemas/WeeklyTime"
        FsxAdminPassword:
          $ref: "#/components/schemas/AdminPassword"
          description: You can use the fsxadmin user account to access the NetApp ONTAP CLI and REST API. The password value is always redacted in the response.
        HAPairs:
          $ref: "#/components/schemas/HAPairs"
          description: "Specifies how many high-availability (HA) file server pairs the file system will have. The default value is 1. The value of this property affects the values of StorageCapacity, Iops, and ThroughputCapacity. For more information, see High-availability (HA) pairs in the FSx for ONTAP user guide. Amazon FSx responds with an HTTP status code 400 (Bad Request) for the following conditions: The value of HAPairs is less than 1 or greater than 12. The value of HAPairs is greater than 1 and the value of DeploymentType is SINGLE_AZ_1, MULTI_AZ_1, or MULTI_AZ_2."
        ThroughputCapacityPerHAPair:
          $ref: "#/components/schemas/ThroughputCapacityPerHAPair"
          description: "Use to choose the throughput capacity per HA pair. When the value of HAPairs is equal to 1, the value of ThroughputCapacityPerHAPair is the total throughput for the file system. This field and ThroughputCapacity cannot be defined in the same API call, but one is required. This field and ThroughputCapacity are the same for file systems with one HA pair. For SINGLE_AZ_1 and MULTI_AZ_1 file systems, valid values are 128, 256, 512, 1024, 2048, or 4096 MBps. For SINGLE_AZ_2, valid values are 1536, 3072, or 6144 MBps. For MULTI_AZ_2, valid values are 384, 768, 1536, 3072, or 6144 MBps. Amazon FSx responds with an HTTP status code 400 (Bad Request) for the following conditions: The value of ThroughputCapacity and ThroughputCapacityPerHAPair are not the same value. The value of deployment type is SINGLE_AZ_2 and ThroughputCapacity / ThroughputCapacityPerHAPair is not a valid HA pair (a value between 1 and 12). The value of ThroughputCapacityPerHAPair is not a valid value."
        EndpointIpv6AddressRange:
          $ref: "#/components/schemas/Ipv6AddressRange"
          description: (Multi-AZ only) Specifies the IPv6 address range in which the endpoints to access your file system will be created. By default in the Amazon FSx API and Amazon FSx console, Amazon FSx selects an available /118 IP address range for you from one of the VPC's CIDR ranges. You can have overlapping endpoint IP addresses for file systems deployed in the same VPC/route tables, as long as they don't overlap with any subnet.
    OntapDeploymentType:
      type: string
      enum:
        - MULTI_AZ_1
        - SINGLE_AZ_1
        - SINGLE_AZ_2
        - MULTI_AZ_2
    IpAddressRange:
      type: string
      minLength: 9
      maxLength: 17
      pattern: ^[^\u0000\u0085\u2028\u2029\r\n]{9,17}$
    FileSystemEndpoints:
      description: An Amazon FSx for NetApp ONTAP file system has the following endpoints that are used to access data or to manage the file system using the NetApp ONTAP CLI, REST API, or NetApp SnapMirror.
      type: object
      properties:
        Intercluster:
          $ref: "#/components/schemas/FileSystemEndpoint"
          description: An endpoint for managing your file system by setting up NetApp SnapMirror with other ONTAP systems.
        Management:
          $ref: "#/components/schemas/FileSystemEndpoint"
          description: An endpoint for managing your file system using the NetApp ONTAP CLI and NetApp ONTAP API.
    FileSystemEndpoint:
      description: An Amazon FSx for NetApp ONTAP file system has two endpoints that are used to access data or to manage the file system using the NetApp ONTAP CLI, REST API, or NetApp SnapMirror. They are the Management and Intercluster endpoints.
      type: object
      properties:
        DNSName:
          $ref: "#/components/schemas/DNSName"
        IpAddresses:
          $ref: "#/components/schemas/OntapEndpointIpAddresses"
          description: The IPv4 addresses of the file system endpoint.
        Ipv6Addresses:
          $ref: "#/components/schemas/OntapEndpointIpAddresses"
          description: The IPv6 addresses of the file system endpoint.
    OntapEndpointIpAddresses:
      type: array
      items:
        $ref: "#/components/schemas/IpAddress"
    RouteTableIds:
      type: array
      items:
        $ref: "#/components/schemas/RouteTableId"
    RouteTableId:
      type: string
      minLength: 12
      maxLength: 21
      pattern: ^(rtb-[0-9a-f]{8,})$
    AdminPassword:
      type: string
      minLength: 8
      maxLength: 50
      pattern: ^[^\u0000\u0085\u2028\u2029\r\n]{8,50}$
    HAPairs:
      type: integer
      minimum: 1
      maximum: 12
    ThroughputCapacityPerHAPair:
      type: integer
      minimum: 128
      maximum: 6144
    Ipv6AddressRange:
      type: string
      minLength: 4
      maxLength: 43
      pattern: ^[^\u0000\u0085\u2028\u2029\r\n]{4,43}$
    FileSystemTypeVersion:
      type: string
      minLength: 1
      maxLength: 20
      pattern: ^[0-9](.[0-9]*)*$
    OpenZFSFileSystemConfiguration:
      description: The configuration for the Amazon FSx for OpenZFS file system.
      type: object
      properties:
        AutomaticBackupRetentionDays:
          $ref: "#/components/schemas/AutomaticBackupRetentionDays"
        CopyTagsToBackups:
          $ref: "#/components/schemas/Flag"
          description: A Boolean value indicating whether tags on the file system should be copied to backups. If it's set to true, all tags on the file system are copied to all automatic backups and any user-initiated backups where the user doesn't specify any tags. If this value is true and you specify one or more tags, only the specified tags are copied to backups. If you specify one or more tags when creating a user-initiated backup, no tags are copied from the file system, regardless of this value.
        CopyTagsToVolumes:
          $ref: "#/components/schemas/Flag"
          description: A Boolean value indicating whether tags for the volume should be copied to snapshots. This value defaults to false. If it's set to true, all tags for the volume are copied to snapshots where the user doesn't specify tags. If this value is true and you specify one or more tags, only the specified tags are copied to snapshots. If you specify one or more tags when creating the snapshot, no tags are copied from the volume, regardless of this value.
        DailyAutomaticBackupStartTime:
          $ref: "#/components/schemas/DailyTime"
        DeploymentType:
          $ref: "#/components/schemas/OpenZFSDeploymentType"
          description: Specifies the file-system deployment type. Amazon FSx for OpenZFS supports MULTI_AZ_1, SINGLE_AZ_HA_2, SINGLE_AZ_HA_1, SINGLE_AZ_2, and SINGLE_AZ_1.
        ThroughputCapacity:
          $ref: "#/components/schemas/MegabytesPerSecond"
          description: The throughput of an Amazon FSx file system, measured in megabytes per second (MBps).
        WeeklyMaintenanceStartTime:
          $ref: "#/components/schemas/WeeklyTime"
        DiskIopsConfiguration:
          $ref: "#/components/schemas/DiskIopsConfiguration"
        RootVolumeId:
          $ref: "#/components/schemas/VolumeId"
          description: The ID of the root volume of the OpenZFS file system.
        PreferredSubnetId:
          $ref: "#/components/schemas/SubnetId"
          description: Required when DeploymentType is set to MULTI_AZ_1. This specifies the subnet in which you want the preferred file server to be located.
        EndpointIpAddressRange:
          $ref: "#/components/schemas/IpAddressRange"
          description: (Multi-AZ only) Specifies the IPv4 address range in which the endpoints to access your file system will be created. By default in the Amazon FSx API and Amazon FSx console, Amazon FSx selects an available /28 IP address range for you from one of the VPC's CIDR ranges. You can have overlapping endpoint IP addresses for file systems deployed in the same VPC/route tables.
        EndpointIpv6AddressRange:
          $ref: "#/components/schemas/Ipv6AddressRange"
          description: (Multi-AZ only) Specifies the IPv6 address range in which the endpoints to access your file system will be created. By default in the Amazon FSx API and Amazon FSx console, Amazon FSx selects an available /118 IP address range for you from one of the VPC's CIDR ranges. You can have overlapping endpoint IP addresses for file systems deployed in the same VPC/route tables, as long as they don't overlap with any subnet.
        RouteTableIds:
          $ref: "#/components/schemas/RouteTableIds"
          description: (Multi-AZ only) The VPC route tables in which your file system's endpoints are created.
        EndpointIpAddress:
          $ref: "#/components/schemas/IpAddress"
          description: The IPv4 address of the endpoint that is used to access data or to manage the file system.
        EndpointIpv6Address:
          $ref: "#/components/schemas/IpAddress"
          description: The IPv6 address of the endpoint that is used to access data or to manage the file system.
        ReadCacheConfiguration:
          $ref: "#/components/schemas/OpenZFSReadCacheConfiguration"
          description: Required when StorageType is set to INTELLIGENT_TIERING. Specifies the optional provisioned SSD read cache.
    OpenZFSDeploymentType:
      type: string
      enum:
        - SINGLE_AZ_1
        - SINGLE_AZ_2
        - SINGLE_AZ_HA_1
        - SINGLE_AZ_HA_2
        - MULTI_AZ_1
    OpenZFSReadCacheConfiguration:
      description: The configuration for the optional provisioned SSD read cache on Amazon FSx for OpenZFS file systems that use the Intelligent-Tiering storage class.
      type: object
      properties:
        SizingMode:
          $ref: "#/components/schemas/OpenZFSReadCacheSizingMode"
          description: "Specifies how the provisioned SSD read cache is sized, as follows: Set to NO_CACHE if you do not want to use an SSD read cache with your Intelligent-Tiering file system. Set to USER_PROVISIONED to specify the exact size of your SSD read cache. Set to PROPORTIONAL_TO_THROUGHPUT_CAPACITY to have your SSD read cache automatically sized based on your throughput capacity."
        SizeGiB:
          $ref: "#/components/schemas/StorageCapacity"
          description: Required if SizingMode is set to USER_PROVISIONED. Specifies the size of the file system's SSD read cache, in gibibytes (GiB).
    OpenZFSReadCacheSizingMode:
      type: string
      enum:
        - NO_CACHE
        - USER_PROVISIONED
        - PROPORTIONAL_TO_THROUGHPUT_CAPACITY
