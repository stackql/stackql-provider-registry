          description: "The ID of the asset model property. If you are callling UpdateAssetModel to create a new property: You can specify its ID here, if desired. IoT SiteWise automatically generates a unique ID for you, so this parameter is never required. However, if you prefer to supply your own ID instead, you can specify it here in UUID format. If you specify your own ID, it must be globally unique. If you are calling UpdateAssetModel to modify an existing property: This can be either the actual ID in UUID format, or else externalId: followed by the external ID, if it has one. For more information, see Referencing objects with external IDs in the IoT SiteWise User Guide."
        externalId:
          $ref: "#/components/schemas/ExternalId"
          description: The external ID (if any) provided in the CreateAssetModel or UpdateAssetModel operation. You can assign an external ID by specifying this value as part of a call to UpdateAssetModel. However, you can't change the external ID if one is already assigned. For more information, see Using external IDs in the IoT SiteWise User Guide.
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the asset model property.
        dataType:
          $ref: "#/components/schemas/PropertyDataType"
          description: The data type of the asset model property. If you specify STRUCT, you must also specify dataTypeSpec to identify the type of the structure for this property.
        dataTypeSpec:
          $ref: "#/components/schemas/Name"
          description: The data type of the structure for this property. This parameter exists on properties that have the STRUCT data type.
        unit:
          $ref: "#/components/schemas/PropertyUnit"
          description: The unit of the asset model property, such as Newtons or RPM.
        type_:
          $ref: "#/components/schemas/PropertyType"
          description: The property type (see PropertyType).
        path:
          $ref: "#/components/schemas/AssetModelPropertyPath"
          description: The structured path to the property from the root of the asset model.
      required:
        - name
        - dataType
        - type_
