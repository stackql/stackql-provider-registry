openapi: 3.0.0
info:
  version: "2019-12-02"
  title: AWS IoT SiteWise
  description: AWS IoT SiteWise
  x-serviceName: iotsitewise
  x-serviceAlias: iotsitewise
  x-protocol: rest-json
  x-apiVersion: "2019-12-02"
  x-endpointPrefix: iotsitewise
  x-jsonVersion: "1.1"
servers:
  - url: https://iotsitewise.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for iotsitewise
paths:
  /assets/{asset_id}/associate:
    post:
      operationId: AssociateAssets
      description: Associates a child asset with the given parent asset through a hierarchy defined in the parent asset's model. For more information, see Associating assets in the IoT SiteWise User Guide.
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CustomID"
          description: "The ID of the parent asset. This can be either the actual ID in UUID format, or else externalId: followed by the external ID, if it has one. For more information, see Referencing objects with external IDs in the IoT SiteWise User Guide."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hierarchyId:
                  $ref: "#/components/schemas/CustomID"
                childAssetId:
                  $ref: "#/components/schemas/CustomID"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - hierarchyId
                - childAssetId
      responses:
        "200":
          description: Success
  /timeseries/associate/:
    post:
      operationId: AssociateTimeSeriesToAssetProperty
      description: Associates a time series (data stream) with an asset property.
      parameters:
        - name: alias
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PropertyAlias"
          description: The alias that identifies the time series.
        - name: assetId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/CustomID"
          description: "The ID of the asset in which the asset property was created. This can be either the actual ID in UUID format, or else externalId: followed by the external ID, if it has one. For more information, see Referencing objects with external IDs in the IoT SiteWise User Guide."
        - name: propertyId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/CustomID"
          description: "The ID of the asset property. This can be either the actual ID in UUID format, or else externalId: followed by the external ID, if it has one. For more information, see Referencing objects with external IDs in the IoT SiteWise User Guide."
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
  /projects/{project_id}/assets/associate:
    post:
      operationId: BatchAssociateProjectAssets
      description: Associates a group (batch) of assets with an IoT SiteWise Monitor project.
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ID"
          description: The ID of the project to which to associate the assets.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assetIds:
                  $ref: "#/components/schemas/IDs"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - assetIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAssociateProjectAssetsResponse"
  /projects/{project_id}/assets/disassociate:
    post:
      operationId: BatchDisassociateProjectAssets
      description: Disassociates a group (batch) of assets from an IoT SiteWise Monitor project.
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ID"
          description: The ID of the project from which to disassociate the assets.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assetIds:
                  $ref: "#/components/schemas/IDs"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - assetIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDisassociateProjectAssetsResponse"
  /properties/batch/aggregates:
    post:
      operationId: BatchGetAssetPropertyAggregates
      description: Gets aggregated values (for example, average, minimum, and maximum) for one or more asset properties. For more information, see Querying aggregates in the IoT SiteWise User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entries:
                  $ref: "#/components/schemas/BatchGetAssetPropertyAggregatesEntries"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                maxResults:
                  $ref: "#/components/schemas/BatchGetAssetPropertyAggregatesMaxResults"
              required:
                - entries
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetAssetPropertyAggregatesResponse"
  /properties/batch/latest:
    post:
      operationId: BatchGetAssetPropertyValue
      description: Gets the current value for one or more asset properties. For more information, see Querying current values in the IoT SiteWise User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entries:
                  $ref: "#/components/schemas/BatchGetAssetPropertyValueEntries"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - entries
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetAssetPropertyValueResponse"
  /properties/batch/history:
    post:
      operationId: BatchGetAssetPropertyValueHistory
      description: Gets the historical values for one or more asset properties. For more information, see Querying historical values in the IoT SiteWise User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entries:
                  $ref: "#/components/schemas/BatchGetAssetPropertyValueHistoryEntries"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                maxResults:
                  $ref: "#/components/schemas/BatchGetAssetPropertyValueHistoryMaxResults"
              required:
                - entries
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetAssetPropertyValueHistoryResponse"
  /properties:
    post:
      operationId: BatchPutAssetPropertyValue
      description: "Sends a list of asset property values to IoT SiteWise. Each value is a timestamp-quality-value (TQV) data point. For more information, see Ingesting data using the API in the IoT SiteWise User Guide. To identify an asset property, you must specify one of the following: The assetId and propertyId of an asset property. A propertyAlias, which is a data stream alias (for example, /company/windfarm/3/turbine/7/temperature). To define an asset property's alias, see UpdateAssetProperty. With respect to Unix epoch time, IoT SiteWise accepts only TQVs that have a timestamp of no more than 7 days in the past and no more than 10 minutes in the future. IoT SiteWise rejects timestamps outside of the inclusive range of [-7 days, +10 minutes] and returns a TimestampOutOfRangeException error. For each asset property, IoT SiteWise overwrites TQVs with duplicate timestamps unless the newer TQV has a different quality. For example, if you store a TQV {T1, GOOD, V1}, then storing {T1, GOOD, V2} replaces the existing TQV. IoT SiteWise authorizes access to each BatchPutAssetPropertyValue entry individually. For more information, see BatchPutAssetPropertyValue authorization in the IoT SiteWise User Guide."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enablePartialEntryProcessing:
                  $ref: "#/components/schemas/BooleanValue"
                entries:
                  $ref: "#/components/schemas/PutAssetPropertyValueEntries"
              required:
                - entries
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchPutAssetPropertyValueResponse"
  /access-policies:
    post:
      operationId: CreateAccessPolicy
      description: Creates an access policy that grants the specified identity (IAM Identity Center user, IAM Identity Center group, or IAM user) access to the specified IoT SiteWise Monitor portal or project resource. Support for access policies that use an SSO Group as the identity is not supported at this time.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accessPolicyIdentity:
                  $ref: "#/components/schemas/Identity"
                accessPolicyResource:
                  $ref: "#/components/schemas/Resource"
                accessPolicyPermission:
                  $ref: "#/components/schemas/Permission"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - accessPolicyIdentity
                - accessPolicyResource
                - accessPolicyPermission
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccessPolicyResponse"
    get:
      operationId: ListAccessPolicies
      description: Retrieves a paginated list of access policies for an identity (an IAM Identity Center user, an IAM Identity Center group, or an IAM user) or an IoT SiteWise Monitor resource (a portal or project).
      parameters:
        - name: identityType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IdentityType"
          description: The type of identity (IAM Identity Center user, IAM Identity Center group, or IAM user). This parameter is required if you specify identityId.
        - name: identityId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IdentityId"
          description: The ID of the identity. This parameter is required if you specify USER or GROUP for identityType.
        - name: resourceType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceType"
          description: The type of resource (portal or project). This parameter is required if you specify resourceId.
        - name: resourceId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ID"
          description: The ID of the resource. This parameter is required if you specify resourceType.
        - name: iamArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IamArn"
          description: The ARN of the IAM user. For more information, see IAM ARNs in the IAM User Guide. This parameter is required if you specify IAM for identityType.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token to be used for the next set of paginated results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: "The maximum number of results to return for each paginated request. Default: 50"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccessPoliciesResponse"
  /assets:
    post:
      operationId: CreateAsset
      description: Creates an asset from an existing asset model. For more information, see Creating assets in the IoT SiteWise User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assetName:
                  $ref: "#/components/schemas/Name"
                assetModelId:
                  $ref: "#/components/schemas/CustomID"
                assetId:
                  $ref: "#/components/schemas/ID"
                assetExternalId:
                  $ref: "#/components/schemas/ExternalId"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagMap"
                assetDescription:
                  $ref: "#/components/schemas/Description"
              required:
                - assetName
                - assetModelId
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssetResponse"
    get:
      operationId: ListAssets
      description: "Retrieves a paginated list of asset summaries. You can use this operation to do the following: List assets based on a specific asset model. List top-level assets. You can't use this operation to list all assets. To retrieve summaries for all of your assets, use ListAssetModels to get all of your asset model IDs. Then, use ListAssets to get all assets for each asset model."
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token to be used for the next set of paginated results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: "The maximum number of results to return for each paginated request. Default: 50"
        - name: assetModelId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CustomID"
          description: "The ID of the asset model by which to filter the list of assets. This parameter is required if you choose ALL for filter. This can be either the actual ID in UUID format, or else externalId: followed by the external ID, if it has one. For more information, see Referencing objects with external IDs in the IoT SiteWise User Guide."
        - name: filter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListAssetsFilter"
          description: "The filter for the requested list of assets. Choose one of the following options: ALL – The list includes all assets for a given asset model ID. The assetModelId parameter is required if you filter by ALL. TOP_LEVEL – The list includes only top-level assets in the asset hierarchy tree. Default: ALL"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssetsResponse"
  /asset-models:
    post:
      operationId: CreateAssetModel
      description: Creates an asset model from specified property and hierarchy definitions. You create assets from asset models. With asset models, you can easily create assets of the same type that have standardized definitions. Each asset created from a model inherits the asset model's property and hierarchy definitions. For more information, see Defining asset models in the IoT SiteWise User Guide. You can create three types of asset models, ASSET_MODEL, COMPONENT_MODEL, or an INTERFACE. ASSET_MODEL – (default) An asset model that you can use to create assets. Can't be included as a component in another asset model. COMPONENT_MODEL – A reusable component that you can include in the composite models of other asset models. You can't create assets directly from this type of asset model. INTERFACE – An interface is a type of model that defines a standard structure that can be applied to different asset models.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assetModelName:
                  $ref: "#/components/schemas/Name"
                assetModelType:
                  $ref: "#/components/schemas/AssetModelType"
                assetModelId:
                  $ref: "#/components/schemas/ID"
                assetModelExternalId:
                  $ref: "#/components/schemas/ExternalId"
                assetModelDescription:
                  $ref: "#/components/schemas/Description"
                assetModelProperties:
                  $ref: "#/components/schemas/AssetModelPropertyDefinitions"
                assetModelHierarchies:
                  $ref: "#/components/schemas/AssetModelHierarchyDefinitions"
                assetModelCompositeModels:
                  $ref: "#/components/schemas/AssetModelCompositeModelDefinitions"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - assetModelName
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssetModelResponse"
    get:
      operationId: ListAssetModels
      description: Retrieves a paginated list of summaries of all asset models.
      parameters:
        - name: assetModelTypes
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListAssetModelsTypeFilter"
          description: The type of asset model. If you don't provide an assetModelTypes, all types of asset models are returned. ASSET_MODEL – An asset model that you can use to create assets. Can't be included as a component in another asset model. COMPONENT_MODEL – A reusable component that you can include in the composite models of other asset models. You can't create assets directly from this type of asset model. INTERFACE – An interface is a type of model that defines a standard structure that can be applied to different asset models.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token to be used for the next set of paginated results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: "The maximum number of results to return for each paginated request. Default: 50"
        - name: assetModelVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AssetModelVersionFilter"
          description: The version alias that specifies the latest or active version of the asset model. The details are returned in the response. The default value is LATEST. See Asset model versions in the IoT SiteWise User Guide.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssetModelsResponse"
  /asset-models/{asset_model_id}/composite-models:
    post:
      operationId: CreateAssetModelCompositeModel
      description: Creates a custom composite model from specified property and hierarchy definitions. There are two types of custom composite models, inline and component-model-based. Use component-model-based custom composite models to define standard, reusable components. A component-model-based custom composite model consists of a name, a description, and the ID of the component model it references. A component-model-based custom composite model has no properties of its own; its referenced component model provides its associated properties to any created assets. For more information, see Custom composite models (Components) in the IoT SiteWise User Guide. Use inline custom composite models to organize the properties of an asset model. The properties of inline custom composite models are local to the asset model where they are included and can't be used to create multiple assets. To create a component-model-based model, specify the composedAssetModelId of an existing asset model with assetModelType of COMPONENT_MODEL. To create an inline model, specify the assetModelCompositeModelProperties and don't include an composedAssetModelId.
      parameters:
        - name: asset_model_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CustomID"
          description: The ID of the asset model this composite model is a part of.
        - name: If-Match
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ETag"
          description: The expected current entity tag (ETag) for the asset model’s latest or active version (specified using matchForVersionType). The create request is rejected if the tag does not match the latest or active version's current entity tag. See Optimistic locking for asset model writes in the IoT SiteWise User Guide.
        - name: If-None-Match
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/SelectAll"
          description: Accepts * to reject the create request if an active version (specified using matchForVersionType as ACTIVE) already exists for the asset model.
        - name: Match-For-Version-Type
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AssetModelVersionType"
          description: Specifies the asset model version type (LATEST or ACTIVE) used in conjunction with If-Match or If-None-Match headers to determine the target ETag for the create operation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assetModelCompositeModelExternalId:
                  $ref: "#/components/schemas/ExternalId"
                parentAssetModelCompositeModelId:
                  $ref: "#/components/schemas/CustomID"
                assetModelCompositeModelId:
                  $ref: "#/components/schemas/ID"
                assetModelCompositeModelDescription:
                  $ref: "#/components/schemas/Description"
                assetModelCompositeModelName:
                  $ref: "#/components/schemas/Name"
                assetModelCompositeModelType:
                  $ref: "#/components/schemas/Name"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                composedAssetModelId:
                  $ref: "#/components/schemas/CustomID"
                assetModelCompositeModelProperties:
                  $ref: "#/components/schemas/AssetModelPropertyDefinitions"
              required:
                - assetModelCompositeModelName
                - assetModelCompositeModelType
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssetModelCompositeModelResponse"
    get:
      operationId: ListAssetModelCompositeModels
      description: Retrieves a paginated list of composite models associated with the asset model
      parameters:
        - name: asset_model_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CustomID"
          description: "The ID of the asset model. This can be either the actual ID in UUID format, or else externalId: followed by the external ID, if it has one. For more information, see Referencing objects with external IDs in the IoT SiteWise User Guide."
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token to be used for the next set of paginated results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: "The maximum number of results to return for each paginated request. Default: 50"
        - name: assetModelVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AssetModelVersionFilter"
          description: The version alias that specifies the latest or active version of the asset model. The details are returned in the response. The default value is LATEST. See Asset model versions in the IoT SiteWise User Guide.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssetModelCompositeModelsResponse"
  /jobs:
    post:
      operationId: CreateBulkImportJob
      description: Defines a job to ingest data to IoT SiteWise from Amazon S3. For more information, see Create a bulk import job (CLI) in the Amazon Simple Storage Service User Guide. Before you create a bulk import job, you must enable IoT SiteWise warm tier or IoT SiteWise cold tier. For more information about how to configure storage settings, see PutStorageConfiguration. Bulk import is designed to store historical data to IoT SiteWise. Newly ingested data in the hot tier triggers notifications and computations. After data moves from the hot tier to the warm or cold tier based on retention settings, it does not trigger computations or notifications. Data older than 7 days does not trigger computations or notifications.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobName:
                  $ref: "#/components/schemas/Name"
                jobRoleArn:
                  $ref: "#/components/schemas/ARN"
                files:
                  $ref: "#/components/schemas/Files"
                errorReportLocation:
                  $ref: "#/components/schemas/ErrorReportLocation"
                jobConfiguration:
                  $ref: "#/components/schemas/JobConfiguration"
                adaptiveIngestion:
                  $ref: "#/components/schemas/AdaptiveIngestion"
                deleteFilesAfterImport:
                  $ref: "#/components/schemas/DeleteFilesAfterImport"
              required:
                - jobName
                - jobRoleArn
                - files
                - errorReportLocation
                - jobConfiguration
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBulkImportJobResponse"
    get:
      operationId: ListBulkImportJobs
      description: Retrieves a paginated list of bulk import job requests. For more information, see List bulk import jobs (CLI) in the IoT SiteWise User Guide.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token to be used for the next set of paginated results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return for each paginated request.
        - name: filter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListBulkImportJobsFilter"
          description: You can use a filter to select the bulk import jobs that you want to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBulkImportJobsResponse"
  /computation-models:
    post:
      operationId: CreateComputationModel
      description: Create a computation model with a configuration and data binding.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                computationModelName:
                  $ref: "#/components/schemas/RestrictedName"
                computationModelDescription:
                  $ref: "#/components/schemas/RestrictedDescription"
                computationModelConfiguration:
                  $ref: "#/components/schemas/ComputationModelConfiguration"
                computationModelDataBinding:
                  $ref: "#/components/schemas/ComputationModelDataBinding"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - computationModelName
                - computationModelConfiguration
                - computationModelDataBinding
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateComputationModelResponse"
    get:
      operationId: ListComputationModels
      description: Retrieves a paginated list of summaries of all computation models.
      parameters:
        - name: computationModelType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ComputationModelType"
          description: The type of computation model. If a computationModelType is not provided, all types of computation models are returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token to be used for the next set of paginated results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return for each paginated request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListComputationModelsResponse"
  /dashboards:
    post:
      operationId: CreateDashboard
      description: Creates a dashboard in an IoT SiteWise Monitor project.
      parameters: []
      requestBody:
        required: true
