  /20200301/gateways/{gateway_id}/capability/{capability_namespace}:
    get:
      operationId: DescribeGatewayCapabilityConfiguration
      description: "Each gateway capability defines data sources for a gateway. This is the namespace of the gateway capability. . The namespace follows the format service:capability:version, where: service - The service providing the capability, or iotsitewise. capability - The specific capability type. Options include: opcuacollector for the OPC UA data source collector, or publisher for data publisher capability. version - The version number of the capability. Option include 2 for Classic streams, V2 gateways, and 3 for MQTT-enabled, V3 gateways. After updating a capability configuration, the sync status becomes OUT_OF_SYNC until the gateway processes the configuration.Use DescribeGatewayCapabilityConfiguration to check the sync status and verify the configuration was applied. A gateway can have multiple capability configurations with different namespaces."
      parameters:
        - name: gateway_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ID"
          description: The ID of the gateway that defines the capability configuration.
        - name: capability_namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CapabilityNamespace"
          description: The namespace of the capability configuration. For example, if you configure OPC UA sources for an MQTT-enabled gateway, your OPC-UA capability configuration has the namespace iotsitewise:opcuacollector:3.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeGatewayCapabilityConfigurationResponse"
