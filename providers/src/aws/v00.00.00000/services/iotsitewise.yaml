    MeasurementProcessingConfig:
      description: The processing configuration for the given measurement property. You can configure measurements to be kept at the edge or forwarded to the Amazon Web Services Cloud. By default, measurements are forwarded to the cloud.
      type: object
      properties:
        forwardingConfig:
          $ref: "#/components/schemas/ForwardingConfig"
          description: The forwarding configuration for the given measurement property.
      required:
        - forwardingConfig
    ForwardingConfig:
      description: The forwarding configuration for a given property.
      type: object
      properties:
        state:
          $ref: "#/components/schemas/ForwardingConfigState"
          description: The forwarding state for the given property.
      required:
        - state
    ForwardingConfigState:
      type: string
      enum:
        - DISABLED
        - ENABLED
    Transform:
      description: Contains an asset transform property. A transform is a one-to-one mapping of a property's data points from one form to another. For example, you can use a transform to convert a Celsius data stream to Fahrenheit by applying the transformation expression to each data point of the Celsius stream. A transform can only have a data type of DOUBLE and consume properties with data types of INTEGER or DOUBLE. For more information, see Transforms in the IoT SiteWise User Guide.
      type: object
      properties:
        expression:
          $ref: "#/components/schemas/Expression"
          description: The mathematical expression that defines the transformation function. You can specify up to 10 variables per expression. You can specify up to 10 functions per expression. For more information, see Quotas in the IoT SiteWise User Guide.
        variables:
          $ref: "#/components/schemas/ExpressionVariables"
          description: The list of variables used in the expression.
        processingConfig:
          $ref: "#/components/schemas/TransformProcessingConfig"
          description: The processing configuration for the given transform property. You can configure transforms to be kept at the edge or forwarded to the Amazon Web Services Cloud. You can also configure transforms to be computed at the edge or in the cloud.
      required:
        - expression
        - variables
    Expression:
      type: string
      minLength: 0
      maxLength: 1024
    ExpressionVariables:
      type: array
      items:
        $ref: "#/components/schemas/ExpressionVariable"
    ExpressionVariable:
      description: Contains expression variable information.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/VariableName"
          description: The friendly name of the variable to be used in the expression.
        value:
          $ref: "#/components/schemas/VariableValue"
          description: The variable that identifies an asset property from which to use values.
      required:
        - name
        - value
    VariableName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-z][a-z0-9_]*$
    VariableValue:
      description: Identifies a property value used in an expression.
      type: object
      properties:
        propertyId:
          $ref: "#/components/schemas/Macro"
          description: "The ID of the property to use as the variable. You can use the property name if it's from the same asset model. If the property has an external ID, you can specify externalId: followed by the external ID. For more information, see Using external IDs in the IoT SiteWise User Guide."
        hierarchyId:
          $ref: "#/components/schemas/Macro"
          description: "The ID of the hierarchy to query for the property ID. You can use the hierarchy's name instead of the hierarchy's ID. If the hierarchy has an external ID, you can specify externalId: followed by the external ID. For more information, see Using external IDs in the IoT SiteWise User Guide. You use a hierarchy ID instead of a model ID because you can have several hierarchies using the same model and therefore the same propertyId. For example, you might have separately grouped assets that come from the same asset model. For more information, see Asset hierarchies in the IoT SiteWise User Guide."
        propertyPath:
          $ref: "#/components/schemas/AssetModelPropertyPath"
          description: The path of the property.
    Macro:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[^\\u0000-\\u001F\\u007F]+"
    AssetModelPropertyPath:
      type: array
      items:
        $ref: "#/components/schemas/AssetModelPropertyPathSegment"
    AssetModelPropertyPathSegment:
      description: Represents one level between a property and the root of the asset model.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ID"
          description: The ID of the path segment.
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the path segment.
    TransformProcessingConfig:
      description: The processing configuration for the given transform property. You can configure transforms to be kept at the edge or forwarded to the Amazon Web Services Cloud. You can also configure transforms to be computed at the edge or in the cloud.
      type: object
      properties:
        computeLocation:
          $ref: "#/components/schemas/ComputeLocation"
          description: The compute location for the given transform property.
        forwardingConfig:
          $ref: "#/components/schemas/ForwardingConfig"
      required:
        - computeLocation
    ComputeLocation:
      type: string
      enum:
        - EDGE
        - CLOUD
    Metric:
      description: Contains an asset metric property. With metrics, you can calculate aggregate functions, such as an average, maximum, or minimum, as specified through an expression. A metric maps several values to a single value (such as a sum). The maximum number of dependent/cascading variables used in any one metric calculation is 10. Therefore, a root metric can have up to 10 cascading metrics in its computational dependency tree. Additionally, a metric can only have a data type of DOUBLE and consume properties with data types of INTEGER or DOUBLE. For more information, see Metrics in the IoT SiteWise User Guide.
      type: object
      properties:
        expression:
          $ref: "#/components/schemas/Expression"
          description: The mathematical expression that defines the metric aggregation function. You can specify up to 10 variables per expression. You can specify up to 10 functions per expression. For more information, see Quotas in the IoT SiteWise User Guide.
        variables:
          $ref: "#/components/schemas/ExpressionVariables"
          description: The list of variables used in the expression.
        window:
          $ref: "#/components/schemas/MetricWindow"
          description: The window (time interval) over which IoT SiteWise computes the metric's aggregation expression. IoT SiteWise computes one data point per window.
        processingConfig:
          $ref: "#/components/schemas/MetricProcessingConfig"
          description: The processing configuration for the given metric property. You can configure metrics to be computed at the edge or in the Amazon Web Services Cloud. By default, metrics are forwarded to the cloud.
      required:
        - window
    MetricWindow:
      description: Contains a time interval window used for data aggregate computations (for example, average, sum, count, and so on).
      type: object
      properties:
        tumbling:
          $ref: "#/components/schemas/TumblingWindow"
          description: The tumbling time interval window.
    TumblingWindow:
      description: Contains a tumbling window, which is a repeating fixed-sized, non-overlapping, and contiguous time window. You can use this window in metrics to aggregate data from properties and other assets. You can use m, h, d, and w when you specify an interval or offset. Note that m represents minutes, h represents hours, d represents days, and w represents weeks. You can also use s to represent seconds in offset. The interval and offset parameters support the ISO 8601 format. For example, PT5S represents 5 seconds, PT5M represents 5 minutes, and PT5H represents 5 hours.
      type: object
      properties:
        interval:
          $ref: "#/components/schemas/Interval"
          description: The time interval for the tumbling window. The interval time must be between 1 minute and 1 week. IoT SiteWise computes the 1w interval the end of Sunday at midnight each week (UTC), the 1d interval at the end of each day at midnight (UTC), the 1h interval at the end of each hour, and so on. When IoT SiteWise aggregates data points for metric computations, the start of each interval is exclusive and the end of each interval is inclusive. IoT SiteWise places the computed data point at the end of the interval.
        offset:
          $ref: "#/components/schemas/Offset"
          description: "The offset for the tumbling window. The offset parameter accepts the following: The offset time. For example, if you specify 18h for offset and 1d for interval, IoT SiteWise aggregates data in one of the following ways: If you create the metric before or at 6 PM (UTC), you get the first aggregation result at 6 PM (UTC) on the day when you create the metric. If you create the metric after 6 PM (UTC), you get the first aggregation result at 6 PM (UTC) the next day. The ISO 8601 format. For example, if you specify PT18H for offset and 1d for interval, IoT SiteWise aggregates data in one of the following ways: If you create the metric before or at 6 PM (UTC), you get the first aggregation result at 6 PM (UTC) on the day when you create the metric. If you create the metric after 6 PM (UTC), you get the first aggregation result at 6 PM (UTC) the next day. The 24-hour clock. For example, if you specify 00:03:00 for offset, 5m for interval, and you create the metric at 2 PM (UTC), you get the first aggregation result at 2:03 PM (UTC). You get the second aggregation result at 2:08 PM (UTC). The offset time zone. For example, if you specify 2021-07-23T18:00-08 for offset and 1d for interval, IoT SiteWise aggregates data in one of the following ways: If you create the metric before or at 6 PM (PST), you get the first aggregation result at 6 PM (PST) on the day when you create the metric. If you create the metric after 6 PM (PST), you get the first aggregation result at 6 PM (PST) the next day."
      required:
        - interval
    Interval:
      type: string
      minLength: 2
      maxLength: 23
    Offset:
      type: string
      minLength: 2
      maxLength: 25
    MetricProcessingConfig:
      description: The processing configuration for the given metric property. You can configure metrics to be computed at the edge or in the Amazon Web Services Cloud. By default, metrics are forwarded to the cloud.
      type: object
      properties:
        computeLocation:
          $ref: "#/components/schemas/ComputeLocation"
          description: The compute location for the given metric property.
      required:
        - computeLocation
    AssetModelHierarchyDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/AssetModelHierarchyDefinition"
    AssetModelHierarchyDefinition:
      description: Contains an asset model hierarchy used in asset model creation. An asset model hierarchy determines the kind (or type) of asset that can belong to a hierarchy.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ID"
          description: The ID to assign to the asset model hierarchy, if desired. IoT SiteWise automatically generates a unique ID for you, so this parameter is never required. However, if you prefer to supply your own ID instead, you can specify it here in UUID format. If you specify your own ID, it must be globally unique.
        externalId:
          $ref: "#/components/schemas/ExternalId"
          description: An external ID to assign to the asset model hierarchy. The external ID must be unique among asset model hierarchies within this asset model. For more information, see Using external IDs in the IoT SiteWise User Guide.
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the asset model hierarchy definition (as specified in the CreateAssetModel or UpdateAssetModel API operation).
        childAssetModelId:
          $ref: "#/components/schemas/CustomID"
          description: "The ID of an asset model for this hierarchy. This can be either the actual ID in UUID format, or else externalId: followed by the external ID, if it has one. For more information, see Referencing objects with external IDs in the IoT SiteWise User Guide."
      required:
        - name
        - childAssetModelId
    AssetModelCompositeModelDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/AssetModelCompositeModelDefinition"
    AssetModelCompositeModelDefinition:
      description: Contains a composite model definition in an asset model. This composite model definition is applied to all assets created from the asset model.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ID"
          description: The ID to assign to the composite model, if desired. IoT SiteWise automatically generates a unique ID for you, so this parameter is never required. However, if you prefer to supply your own ID instead, you can specify it here in UUID format. If you specify your own ID, it must be globally unique.
        externalId:
          $ref: "#/components/schemas/ExternalId"
          description: An external ID to assign to the composite model. The external ID must be unique among composite models within this asset model. For more information, see Using external IDs in the IoT SiteWise User Guide.
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the composite model.
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the composite model.
        type_:
          $ref: "#/components/schemas/Name"
          description: The type of the composite model. For alarm composite models, this type is AWS/ALARM.
        properties_:
          $ref: "#/components/schemas/AssetModelPropertyDefinitions"
          description: The asset property definitions for this composite model.
      required:
        - name
        - type_
    CreateAssetModelResponse:
      type: object
      properties:
        assetModelId:
          $ref: "#/components/schemas/ID"
          description: The ID of the asset model, in UUID format. You can use this ID when you call other IoT SiteWise API operations.
        assetModelArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the asset model, which has the following format. arn:${Partition}:iotsitewise:${Region}:${Account}:asset-model/${AssetModelId}
        assetModelStatus:
          $ref: "#/components/schemas/AssetModelStatus"
          description: The status of the asset model, which contains a state (CREATING after successfully calling this operation) and any error message.
      required:
        - assetModelId
        - assetModelArn
        - assetModelStatus
    AssetModelStatus:
      description: Contains current status information for an asset model. For more information, see Asset and model states in the IoT SiteWise User Guide.
      type: object
      properties:
        state:
          $ref: "#/components/schemas/AssetModelState"
          description: The current state of the asset model.
        error:
          $ref: "#/components/schemas/ErrorDetails"
          description: Contains associated error information, if any.
      required:
        - state
    AssetModelState:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - UPDATING
        - PROPAGATING
        - DELETING
        - FAILED
    ETag:
      type: string
      pattern: ^[\w-]{43}$
    SelectAll:
      type: string
      pattern: \*
    AssetModelVersionType:
      type: string
      enum:
        - LATEST
        - ACTIVE
    CreateAssetModelCompositeModelResponse:
      type: object
      properties:
        assetModelCompositeModelId:
          $ref: "#/components/schemas/ID"
          description: The ID of the composed asset model. You can use this ID when you call other IoT SiteWise APIs.
        assetModelCompositeModelPath:
          $ref: "#/components/schemas/AssetModelCompositeModelPath"
          description: The path to the composite model listing the parent composite models.
        assetModelStatus:
          $ref: "#/components/schemas/AssetModelStatus"
      required:
        - assetModelCompositeModelId
        - assetModelCompositeModelPath
        - assetModelStatus
    AssetModelCompositeModelPath:
      type: array
      items:
        $ref: "#/components/schemas/AssetModelCompositeModelPathSegment"
    AssetModelCompositeModelPathSegment:
      description: Represents one level between a composite model and the root of the asset model.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ID"
          description: The ID of the path segment.
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the path segment.
    Files:
      type: array
      items:
        $ref: "#/components/schemas/File"
    File:
      description: The file in Amazon S3 where your data is saved.
      type: object
      properties:
        bucket:
          $ref: "#/components/schemas/Bucket"
          description: The name of the Amazon S3 bucket from which data is imported.
        key:
          $ref: "#/components/schemas/String"
          description: The key of the Amazon S3 object that contains your data. Each object has a key that is a unique identifier. Each object has exactly one key.
        versionId:
          $ref: "#/components/schemas/String"
          description: The version ID to identify a specific version of the Amazon S3 object that contains your data.
      required:
