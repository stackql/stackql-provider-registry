    DescribeStorageConfigurationResponse:
      type: object
      properties:
        storageType:
          $ref: "#/components/schemas/StorageType"
          description: "The storage tier that you specified for your data. The storageType parameter can be one of the following values: SITEWISE_DEFAULT_STORAGE – IoT SiteWise saves your data into the hot tier. The hot tier is a service-managed database. MULTI_LAYER_STORAGE – IoT SiteWise saves your data in both the cold tier and the hot tier. The cold tier is a customer-managed Amazon S3 bucket."
        multiLayerStorage:
          $ref: "#/components/schemas/MultiLayerStorage"
          description: Contains information about the storage destination.
        disassociatedDataStorage:
          $ref: "#/components/schemas/DisassociatedDataStorageState"
          description: "Contains the storage configuration for time series (data streams) that aren't associated with asset properties. The disassociatedDataStorage can be one of the following values: ENABLED – IoT SiteWise accepts time series that aren't associated with asset properties. After the disassociatedDataStorage is enabled, you can't disable it. DISABLED – IoT SiteWise doesn't accept time series (data streams) that aren't associated with asset properties. For more information, see Data streams in the IoT SiteWise User Guide."
        retentionPeriod:
          $ref: "#/components/schemas/RetentionPeriod"
          description: The number of days your data is kept in the hot tier. By default, your data is kept indefinitely in the hot tier.
        configurationStatus:
          $ref: "#/components/schemas/ConfigurationStatus"
        lastUpdateDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date the storage configuration was last updated, in Unix epoch time.
        warmTier:
          $ref: "#/components/schemas/WarmTierState"
          description: A service managed storage tier optimized for analytical queries. It stores periodically uploaded, buffered and historical data ingested with the CreaeBulkImportJob API.
        warmTierRetentionPeriod:
          $ref: "#/components/schemas/WarmTierRetentionPeriod"
          description: Set this period to specify how long your data is stored in the warm tier before it is deleted. You can set this only if cold tier is enabled.
        disallowIngestNullNaN:
          $ref: "#/components/schemas/DisallowIngestNullNaN"
          description: Describes the configuration for ingesting NULL and NaN data. By default the feature is allowed. The feature is disallowed if the value is true.
      required:
