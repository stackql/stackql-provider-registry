  /properties/aggregates:
    get:
      operationId: GetAssetPropertyAggregates
      description: "Gets aggregated values for an asset property. For more information, see Querying aggregates in the IoT SiteWise User Guide. To identify an asset property, you must specify one of the following: The assetId and propertyId of an asset property. A propertyAlias, which is a data stream alias (for example, /company/windfarm/3/turbine/7/temperature). To define an asset property's alias, see UpdateAssetProperty."
      parameters:
        - name: assetId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ID"
          description: The ID of the asset, in UUID format.
        - name: propertyId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ID"
          description: The ID of the asset property, in UUID format.
        - name: propertyAlias
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AssetPropertyAlias"
          description: The alias that identifies the property, such as an OPC-UA server data stream path (for example, /company/windfarm/3/turbine/7/temperature). For more information, see Mapping industrial data streams to asset properties in the IoT SiteWise User Guide.
        - name: aggregateTypes
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AggregateTypes"
          description: The data aggregating function.
        - name: resolution
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Resolution"
          description: The time interval over which to aggregate data.
        - name: qualities
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Qualities"
          description: The quality by which to filter asset data.
        - name: startDate
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The exclusive start of the range from which to query historical data, expressed in seconds in Unix epoch time.
        - name: endDate
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The inclusive end of the range from which to query historical data, expressed in seconds in Unix epoch time.
        - name: timeOrdering
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TimeOrdering"
          description: "The chronological sorting order of the requested information. Default: ASCENDING"
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token to be used for the next set of paginated results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GetAssetPropertyValueAggregatesMaxResults"
          description: The maximum number of results to return for each paginated request. A result set is returned in the two cases, whichever occurs first. The size of the result set is equal to 1 MB. The number of data points in the result set is equal to the value of maxResults. The maximum value of maxResults is 2500.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssetPropertyAggregatesResponse"
