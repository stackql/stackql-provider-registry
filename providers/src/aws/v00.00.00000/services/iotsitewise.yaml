        greengrassV2:
          $ref: "#/components/schemas/GreengrassV2"
          description: A gateway that runs on IoT Greengrass V2.
        siemensIE:
          $ref: "#/components/schemas/SiemensIE"
          description: A SiteWise Edge gateway that runs on a Siemens Industrial Edge Device.
    Greengrass:
      description: Contains details for a gateway that runs on IoT Greengrass. To create a gateway that runs on IoT Greengrass, you must add the IoT SiteWise connector to a Greengrass group and deploy it. Your Greengrass group must also have permissions to upload data to IoT SiteWise. For more information, see Ingesting data using a gateway in the IoT SiteWise User Guide.
      type: object
      properties:
        groupArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the Greengrass group. For more information about how to find a group's ARN, see ListGroups and GetGroup in the IoT Greengrass V1 API Reference.
      required:
        - groupArn
    GreengrassV2:
      description: Contains details for a gateway that runs on IoT Greengrass V2. To create a gateway that runs on IoT Greengrass V2, you must deploy the IoT SiteWise Edge component to your gateway device. Your Greengrass device role must use the AWSIoTSiteWiseEdgeAccess policy. For more information, see Using IoT SiteWise at the edge in the IoT SiteWise User Guide.
      type: object
      properties:
        coreDeviceThingName:
          $ref: "#/components/schemas/CoreDeviceThingName"
          description: The name of the IoT thing for your IoT Greengrass V2 core device.
        coreDeviceOperatingSystem:
          $ref: "#/components/schemas/CoreDeviceOperatingSystem"
          description: The operating system of the core device in IoT Greengrass V2. Specifying the operating system is required for MQTT-enabled, V3 gateways (gatewayVersion 3) and not applicable for Classic stream, V2 gateways (gatewayVersion 2).
      required:
        - coreDeviceThingName
