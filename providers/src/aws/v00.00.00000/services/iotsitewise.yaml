        jobName:
          $ref: "#/components/schemas/Name"
          description: The unique name that helps identify the job request.
        jobStatus:
          $ref: "#/components/schemas/JobStatus"
          description: "The status of the bulk import job can be one of following values: PENDING – IoT SiteWise is waiting for the current bulk import job to finish. CANCELLED – The bulk import job has been canceled. RUNNING – IoT SiteWise is processing your request to import your data from Amazon S3. COMPLETED – IoT SiteWise successfully completed your request to import data from Amazon S3. FAILED – IoT SiteWise couldn't process your request to import data from Amazon S3. You can use logs saved in the specified error report location in Amazon S3 to troubleshoot issues. COMPLETED_WITH_FAILURES – IoT SiteWise completed your request to import data from Amazon S3 with errors. You can use logs saved in the specified error report location in Amazon S3 to troubleshoot issues."
        jobRoleArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the IAM role that allows IoT SiteWise to read Amazon S3 data.
        files:
          $ref: "#/components/schemas/Files"
          description: The files in the specified Amazon S3 bucket that contain your data.
        errorReportLocation:
          $ref: "#/components/schemas/ErrorReportLocation"
          description: The Amazon S3 destination where errors associated with the job creation request are saved.
        jobConfiguration:
          $ref: "#/components/schemas/JobConfiguration"
          description: Contains the configuration information of a job, such as the file format used to save data in Amazon S3.
        jobCreationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date the job was created, in Unix epoch TIME.
        jobLastUpdateDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date the job was last updated, in Unix epoch time.
        adaptiveIngestion:
