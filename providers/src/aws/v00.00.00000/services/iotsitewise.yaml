  /20200301/gateways/{gateway_id}/capability:
    post:
      operationId: UpdateGatewayCapabilityConfiguration
      description: "Updates a gateway capability configuration or defines a new capability configuration. Each gateway capability defines data sources for a gateway. Important workflow notes: Each gateway capability defines data sources for a gateway. This is the namespace of the gateway capability. . The namespace follows the format service:capability:version, where: service - The service providing the capability, or iotsitewise. capability - The specific capability type. Options include: opcuacollector for the OPC UA data source collector, or publisher for data publisher capability. version - The version number of the capability. Option include 2 for Classic streams, V2 gateways, and 3 for MQTT-enabled, V3 gateways. After updating a capability configuration, the sync status becomes OUT_OF_SYNC until the gateway processes the configuration.Use DescribeGatewayCapabilityConfiguration to check the sync status and verify the configuration was applied. A gateway can have multiple capability configurations with different namespaces."
      parameters:
        - name: gateway_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ID"
          description: The ID of the gateway to be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                capabilityNamespace:
                  $ref: "#/components/schemas/CapabilityNamespace"
                capabilityConfiguration:
                  $ref: "#/components/schemas/CapabilityConfiguration"
              required:
                - capabilityNamespace
                - capabilityConfiguration
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGatewayCapabilityConfigurationResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    CustomID:
      type: string
      minLength: 13
      maxLength: 139
      pattern: ^(?!00000000-0000-0000-0000-000000000000)[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$|^externalId:[a-zA-Z0-9_][a-zA-Z_\-0-9.:]*[a-zA-Z0-9_]+
    ClientToken:
      type: string
      minLength: 36
      maxLength: 64
      pattern: \S{36,64}
    PropertyAlias:
      type: string
      minLength: 1
      pattern: "[^\\u0000-\\u001F\\u007F]+"
    ID:
      type: string
      minLength: 36
      maxLength: 36
      pattern: ^(?!00000000-0000-0000-0000-000000000000)[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
    IDs:
      type: array
      items:
        $ref: "#/components/schemas/ID"
    BatchAssociateProjectAssetsResponse:
      type: object
      properties:
        errors:
          $ref: "#/components/schemas/BatchAssociateProjectAssetsErrors"
          description: A list of associated error information, if any.
    BatchAssociateProjectAssetsErrors:
      type: array
      items:
        $ref: "#/components/schemas/AssetErrorDetails"
    AssetErrorDetails:
      description: Contains error details for the requested associate project asset action.
      type: object
      properties:
        assetId:
          $ref: "#/components/schemas/ID"
          description: The ID of the asset, in UUID format.
        code:
          $ref: "#/components/schemas/AssetErrorCode"
          description: The error code.
        message:
          $ref: "#/components/schemas/AssetErrorMessage"
          description: The error message.
      required:
        - assetId
        - code
        - message
    AssetErrorCode:
      type: string
      enum:
        - INTERNAL_FAILURE
    AssetErrorMessage:
      type: string
    BatchDisassociateProjectAssetsResponse:
      type: object
      properties:
        errors:
          $ref: "#/components/schemas/BatchDisassociateProjectAssetsErrors"
          description: A list of associated error information, if any.
    BatchDisassociateProjectAssetsErrors:
      type: array
      items:
        $ref: "#/components/schemas/AssetErrorDetails"
    BatchGetAssetPropertyAggregatesEntries:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetAssetPropertyAggregatesEntry"
    BatchGetAssetPropertyAggregatesEntry:
      description: "Contains information for an asset property aggregate entry that is associated with the BatchGetAssetPropertyAggregates API. To identify an asset property, you must specify one of the following: The assetId and propertyId of an asset property. A propertyAlias, which is a data stream alias (for example, /company/windfarm/3/turbine/7/temperature). To define an asset property's alias, see UpdateAssetProperty."
      type: object
      properties:
        entryId:
          $ref: "#/components/schemas/EntryId"
          description: The ID of the entry.
        assetId:
          $ref: "#/components/schemas/ID"
          description: The ID of the asset in which the asset property was created.
        propertyId:
          $ref: "#/components/schemas/ID"
          description: The ID of the asset property, in UUID format.
        propertyAlias:
          $ref: "#/components/schemas/AssetPropertyAlias"
          description: The alias that identifies the property, such as an OPC-UA server data stream path (for example, /company/windfarm/3/turbine/7/temperature). For more information, see Mapping industrial data streams to asset properties in the IoT SiteWise User Guide.
        aggregateTypes:
          $ref: "#/components/schemas/AggregateTypes"
          description: The data aggregating function.
        resolution:
          $ref: "#/components/schemas/Resolution"
          description: The time interval over which to aggregate data.
        startDate:
          $ref: "#/components/schemas/Timestamp"
          description: The exclusive start of the range from which to query historical data, expressed in seconds in Unix epoch time.
        endDate:
          $ref: "#/components/schemas/Timestamp"
          description: The inclusive end of the range from which to query historical data, expressed in seconds in Unix epoch time.
        qualities:
          $ref: "#/components/schemas/Qualities"
          description: The quality by which to filter asset data.
        timeOrdering:
          $ref: "#/components/schemas/TimeOrdering"
          description: "The chronological sorting order of the requested information. Default: ASCENDING"
      required:
        - entryId
        - aggregateTypes
        - resolution
        - startDate
        - endDate
    EntryId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z0-9_-]+$
    AssetPropertyAlias:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[^\\u0000-\\u001F\\u007F]+"
    AggregateTypes:
      type: array
      items:
        $ref: "#/components/schemas/AggregateType"
    AggregateType:
      type: string
      enum:
        - AVERAGE
        - COUNT
        - MAXIMUM
        - MINIMUM
        - SUM
        - STANDARD_DEVIATION
    Resolution:
      type: string
      minLength: 2
      maxLength: 3
      pattern: 1m|15m|1h|1d
    Timestamp:
      type: string
      format: date-time
    Qualities:
      type: array
      items:
        $ref: "#/components/schemas/Quality"
    Quality:
      type: string
      enum:
        - GOOD
        - BAD
        - UNCERTAIN
    TimeOrdering:
      type: string
      enum:
        - ASCENDING
        - DESCENDING
    NextToken:
      type: string
      minLength: 1
      maxLength: 4096
      pattern: "[A-Za-z0-9+/=]+"
    BatchGetAssetPropertyAggregatesMaxResults:
      type: integer
      minimum: 1
    BatchGetAssetPropertyAggregatesResponse:
      type: object
      properties:
        errorEntries:
          $ref: "#/components/schemas/BatchGetAssetPropertyAggregatesErrorEntries"
          description: A list of the errors (if any) associated with the batch request. Each error entry contains the entryId of the entry that failed.
        successEntries:
          $ref: "#/components/schemas/BatchGetAssetPropertyAggregatesSuccessEntries"
          description: A list of entries that were processed successfully by this batch request. Each success entry contains the entryId of the entry that succeeded and the latest query result.
        skippedEntries:
          $ref: "#/components/schemas/BatchGetAssetPropertyAggregatesSkippedEntries"
          description: A list of entries that were not processed by this batch request. because these entries had been completely processed by previous paginated requests. Each skipped entry contains the entryId of the entry that skipped.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results, or null if there are no additional results.
      required:
        - errorEntries
        - successEntries
        - skippedEntries
    BatchGetAssetPropertyAggregatesErrorEntries:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetAssetPropertyAggregatesErrorEntry"
    BatchGetAssetPropertyAggregatesErrorEntry:
      description: Contains error information for an asset property aggregate entry that is associated with the BatchGetAssetPropertyAggregates API.
      type: object
      properties:
        errorCode:
          $ref: "#/components/schemas/BatchGetAssetPropertyAggregatesErrorCode"
          description: The error code.
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The associated error message.
        entryId:
          $ref: "#/components/schemas/EntryId"
          description: The ID of the entry.
      required:
        - errorCode
        - errorMessage
        - entryId
    BatchGetAssetPropertyAggregatesErrorCode:
      type: string
      enum:
        - ResourceNotFoundException
        - InvalidRequestException
        - AccessDeniedException
    ErrorMessage:
      type: string
    BatchGetAssetPropertyAggregatesSuccessEntries:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetAssetPropertyAggregatesSuccessEntry"
    BatchGetAssetPropertyAggregatesSuccessEntry:
      description: Contains success information for an entry that is associated with the BatchGetAssetPropertyAggregates API.
      type: object
      properties:
        entryId:
          $ref: "#/components/schemas/EntryId"
          description: The ID of the entry.
        aggregatedValues:
          $ref: "#/components/schemas/AggregatedValues"
          description: The requested aggregated asset property values (for example, average, minimum, and maximum).
      required:
        - entryId
        - aggregatedValues
    AggregatedValues:
      type: array
      items:
        $ref: "#/components/schemas/AggregatedValue"
    AggregatedValue:
      description: Contains aggregated asset property values (for example, average, minimum, and maximum).
      type: object
      properties:
        timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The date the aggregating computations occurred, in Unix epoch time.
        quality:
          $ref: "#/components/schemas/Quality"
          description: The quality of the aggregated data.
        value:
          $ref: "#/components/schemas/Aggregates"
          description: The value of the aggregates.
      required:
        - timestamp
        - value
    Aggregates:
      description: Contains the (pre-calculated) aggregate values for an asset property.
      type: object
      properties:
        average:
          $ref: "#/components/schemas/AggregatedDoubleValue"
          description: The average (mean) value of the time series over a time interval window.
        count:
          $ref: "#/components/schemas/AggregatedDoubleValue"
          description: The count of data points in the time series over a time interval window.
        maximum_:
          $ref: "#/components/schemas/AggregatedDoubleValue"
          description: The maximum value of the time series over a time interval window.
        minimum_:
          $ref: "#/components/schemas/AggregatedDoubleValue"
          description: The minimum value of the time series over a time interval window.
        sum:
          $ref: "#/components/schemas/AggregatedDoubleValue"
          description: The sum of the time series over a time interval window.
        standardDeviation:
          $ref: "#/components/schemas/AggregatedDoubleValue"
          description: The standard deviation of the time series over a time interval window.
    AggregatedDoubleValue:
      type: number
      format: double
    BatchGetAssetPropertyAggregatesSkippedEntries:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetAssetPropertyAggregatesSkippedEntry"
    BatchGetAssetPropertyAggregatesSkippedEntry:
      description: Contains information for an entry that has been processed by the previous BatchGetAssetPropertyAggregates request.
      type: object
      properties:
        entryId:
          $ref: "#/components/schemas/EntryId"
          description: The ID of the entry.
        completionStatus:
          $ref: "#/components/schemas/BatchEntryCompletionStatus"
          description: The completion status of each entry that is associated with the BatchGetAssetPropertyAggregates API.
        errorInfo:
          $ref: "#/components/schemas/BatchGetAssetPropertyAggregatesErrorInfo"
          description: The error information, such as the error code and the timestamp.
      required:
        - entryId
        - completionStatus
    BatchEntryCompletionStatus:
      type: string
      enum:
        - SUCCESS
        - ERROR
    BatchGetAssetPropertyAggregatesErrorInfo:
      description: Contains the error code and the timestamp for an asset property aggregate entry that is associated with the BatchGetAssetPropertyAggregates API.
      type: object
      properties:
        errorCode:
          $ref: "#/components/schemas/BatchGetAssetPropertyAggregatesErrorCode"
          description: The error code.
        errorTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The date the error occurred, in Unix epoch time.
      required:
        - errorCode
        - errorTimestamp
    BatchGetAssetPropertyValueEntries:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetAssetPropertyValueEntry"
    BatchGetAssetPropertyValueEntry:
      description: "Contains information for an asset property value entry that is associated with the BatchGetAssetPropertyValue API. To identify an asset property, you must specify one of the following: The assetId and propertyId of an asset property. A propertyAlias, which is a data stream alias (for example, /company/windfarm/3/turbine/7/temperature). To define an asset property's alias, see UpdateAssetProperty."
      type: object
      properties:
        entryId:
