        deleteFilesAfterImport:
          $ref: "#/components/schemas/DeleteFilesAfterImport"
          description: If set to true, your data files is deleted from S3, after ingestion into IoT SiteWise storage.
      required:
        - jobId
        - jobName
        - jobStatus
        - jobRoleArn
        - files
        - errorReportLocation
        - jobConfiguration
        - jobCreationDate
        - jobLastUpdateDate
