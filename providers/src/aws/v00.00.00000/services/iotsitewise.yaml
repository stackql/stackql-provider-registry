          description: The name of the asset model hierarchy that you specify by using the CreateAssetModel or UpdateAssetModel API operation.
        childAssetModelId:
          $ref: "#/components/schemas/CustomID"
          description: "The ID of the asset model, in UUID format. All assets in this hierarchy must be instances of the childAssetModelId asset model. IoT SiteWise will always return the actual asset model ID for this value. However, when you are specifying this value as part of a call to UpdateAssetModel, you may provide either the asset model ID or else externalId: followed by the asset model's external ID. For more information, see Using external IDs in the IoT SiteWise User Guide."
