openapi: 3.0.0
info:
  version: "2020-07-01"
  title: Amazon SageMaker Feature Store Runtime
  description: Amazon SageMaker Feature Store Runtime
  x-serviceName: sagemaker
  x-serviceAlias: sagemaker_featurestore_runtime
  x-protocol: rest-json
  x-apiVersion: "2020-07-01"
  x-endpointPrefix: featurestore-runtime.sagemaker
  x-jsonVersion: "1.1"
servers:
  - url: https://featurestore-runtime.sagemaker.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for sagemaker-featurestore-runtime
paths:
  /BatchGetRecord:
    post:
      operationId: BatchGetRecord
      description: Retrieves a batch of Records from a FeatureGroup.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Identifiers:
                  $ref: "#/components/schemas/BatchGetRecordIdentifiers"
                ExpirationTimeResponse:
                  $ref: "#/components/schemas/ExpirationTimeResponse"
              required:
                - Identifiers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetRecordResponse"
  /FeatureGroup/{feature_group_name}:
    delete:
      operationId: DeleteRecord
      description: "Deletes a Record from a FeatureGroup in the OnlineStore. Feature Store supports both SoftDelete and HardDelete. For SoftDelete (default), feature columns are set to null and the record is no longer retrievable by GetRecord or BatchGetRecord. For HardDelete, the complete Record is removed from the OnlineStore. In both cases, Feature Store appends the deleted record marker to the OfflineStore. The deleted record marker is a record with the same RecordIdentifer as the original, but with is_deleted value set to True, EventTime set to the delete input EventTime, and other feature values set to null. Note that the EventTime specified in DeleteRecord should be set later than the EventTime of the existing record in the OnlineStore for that RecordIdentifer. If it is not, the deletion does not occur: For SoftDelete, the existing (not deleted) record remains in the OnlineStore, though the delete record marker is still written to the OfflineStore. HardDelete returns EventTime: 400 ValidationException to indicate that the delete operation failed. No delete record marker is written to the OfflineStore. When a record is deleted from the OnlineStore, the deleted record marker is appended to the OfflineStore. If you have the Iceberg table format enabled for your OfflineStore, you can remove all history of a record from the OfflineStore using Amazon Athena or Apache Spark. For information on how to hard delete a record from the OfflineStore with the Iceberg table format enabled, see Delete records from the offline store."
      parameters:
        - name: feature_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FeatureGroupNameOrArn"
          description: The name or Amazon Resource Name (ARN) of the feature group to delete the record from.
        - name: RecordIdentifierValueAsString
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ValueAsString"
          description: The value for the RecordIdentifier that uniquely identifies the record, in string format.
        - name: EventTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ValueAsString"
          description: Timestamp indicating when the deletion event occurred. EventTime can be used to query data at a certain point in time.
        - name: TargetStores
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TargetStores"
          description: A list of stores from which you're deleting the record. By default, Feature Store deletes the record from all of the stores that you're using for the FeatureGroup.
        - name: DeletionMode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DeletionMode"
          description: The name of the deletion mode for deleting the record. By default, the deletion mode is set to SoftDelete.
      responses:
        "200":
          description: Success
    get:
      operationId: GetRecord
      description: Use for OnlineStore serving from a FeatureStore. Only the latest records stored in the OnlineStore can be retrieved. If no Record with RecordIdentifierValue is found, then an empty result is returned.
      parameters:
        - name: feature_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FeatureGroupNameOrArn"
          description: The name or Amazon Resource Name (ARN) of the feature group from which you want to retrieve a record.
        - name: RecordIdentifierValueAsString
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ValueAsString"
          description: The value that corresponds to RecordIdentifier type and uniquely identifies the record in the FeatureGroup.
        - name: FeatureName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/FeatureNames"
          description: List of names of Features to be retrieved. If not specified, the latest value for all the Features are returned.
        - name: ExpirationTimeResponse
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ExpirationTimeResponse"
          description: Parameter to request ExpiresAt in response. If Enabled, GetRecord will return the value of ExpiresAt, if it is not null. If Disabled and null, GetRecord will return null.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRecordResponse"
    put:
      operationId: PutRecord
      description: The PutRecord API is used to ingest a list of Records into your feature group. If a new record’s EventTime is greater, the new record is written to both the OnlineStore and OfflineStore. Otherwise, the record is a historic record and it is written only to the OfflineStore. You can specify the ingestion to be applied to the OnlineStore, OfflineStore, or both by using the TargetStores request parameter. You can set the ingested record to expire at a given time to live (TTL) duration after the record’s event time, ExpiresAt = EventTime + TtlDuration, by specifying the TtlDuration parameter. A record level TtlDuration is set when specifying the TtlDuration parameter using the PutRecord API call. If the input TtlDuration is null or unspecified, TtlDuration is set to the default feature group level TtlDuration. A record level TtlDuration supersedes the group level TtlDuration.
      parameters:
        - name: feature_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FeatureGroupNameOrArn"
          description: The name or Amazon Resource Name (ARN) of the feature group that you want to insert the record into.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Record:
                  $ref: "#/components/schemas/Record"
                TargetStores:
                  $ref: "#/components/schemas/TargetStores"
                TtlDuration:
                  $ref: "#/components/schemas/TtlDuration"
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    BatchGetRecordIdentifiers:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetRecordIdentifier"
    BatchGetRecordIdentifier:
      description: The identifier that identifies the batch of Records you are retrieving in a batch.
      type: object
      properties:
        FeatureGroupName:
          $ref: "#/components/schemas/FeatureGroupNameOrArn"
          description: The name or Amazon Resource Name (ARN) of the FeatureGroup containing the records you are retrieving in a batch.
        RecordIdentifiersValueAsString:
          $ref: "#/components/schemas/RecordIdentifiers"
          description: The value for a list of record identifiers in string format.
        FeatureNames:
          $ref: "#/components/schemas/FeatureNames"
          description: List of names of Features to be retrieved. If not specified, the latest value for all the Features are returned.
      required:
        - FeatureGroupName
        - RecordIdentifiersValueAsString
    FeatureGroupNameOrArn:
      type: string
      minLength: 1
      maxLength: 150
      pattern: (arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:feature-group/)?([a-zA-Z0-9]([-_]*[a-zA-Z0-9]){0,63})
    RecordIdentifiers:
      type: array
      items:
        $ref: "#/components/schemas/ValueAsString"
    ValueAsString:
      type: string
      maxLength: 358400
      pattern: .*
    FeatureNames:
      type: array
      items:
        $ref: "#/components/schemas/FeatureName"
    FeatureName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z0-9]([-_]*[a-zA-Z0-9]){0,63}
    ExpirationTimeResponse:
      type: string
      enum:
        - Enabled
        - Disabled
    BatchGetRecordResponse:
      type: object
      properties:
        Records:
          $ref: "#/components/schemas/BatchGetRecordResultDetails"
          description: A list of Records you requested to be retrieved in batch.
        Errors:
          $ref: "#/components/schemas/BatchGetRecordErrors"
          description: A list of errors that have occurred when retrieving a batch of Records.
        UnprocessedIdentifiers:
          $ref: "#/components/schemas/UnprocessedIdentifiers"
          description: A unprocessed list of FeatureGroup names, with their corresponding RecordIdentifier value, and Feature name.
      required:
        - Records
        - Errors
        - UnprocessedIdentifiers
    BatchGetRecordResultDetails:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetRecordResultDetail"
    BatchGetRecordResultDetail:
      description: The output of records that have been retrieved in a batch.
      type: object
      properties:
        FeatureGroupName:
          $ref: "#/components/schemas/ValueAsString"
          description: The FeatureGroupName containing Records you retrieved in a batch.
        RecordIdentifierValueAsString:
          $ref: "#/components/schemas/ValueAsString"
          description: The value of the record identifier in string format.
        Record:
          $ref: "#/components/schemas/Record"
          description: The Record retrieved.
        ExpiresAt:
          $ref: "#/components/schemas/ExpiresAt"
          description: The ExpiresAt ISO string of the requested record.
      required:
        - FeatureGroupName
        - RecordIdentifierValueAsString
        - Record
    Record:
      type: array
      items:
        $ref: "#/components/schemas/FeatureValue"
    FeatureValue:
      description: The value associated with a feature.
      type: object
      properties:
        FeatureName:
          $ref: "#/components/schemas/FeatureName"
          description: The name of a feature that a feature value corresponds to.
        ValueAsString:
          $ref: "#/components/schemas/ValueAsString"
          description: The value in string format associated with a feature. Used when your CollectionType is None. Note that features types can be String, Integral, or Fractional. This value represents all three types as a string.
        ValueAsStringList:
          $ref: "#/components/schemas/ValueAsStringList"
          description: The list of values in string format associated with a feature. Used when your CollectionType is a List, Set, or Vector. Note that features types can be String, Integral, or Fractional. These values represents all three types as a string.
      required:
        - FeatureName
    ValueAsStringList:
      type: array
      items:
        $ref: "#/components/schemas/ValueAsString"
    ExpiresAt:
      type: string
    BatchGetRecordErrors:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetRecordError"
    BatchGetRecordError:
      description: The error that has occurred when attempting to retrieve a batch of Records.
      type: object
      properties:
        FeatureGroupName:
          $ref: "#/components/schemas/ValueAsString"
          description: The name of the feature group that the record belongs to.
        RecordIdentifierValueAsString:
          $ref: "#/components/schemas/ValueAsString"
          description: The value for the RecordIdentifier in string format of a Record from a FeatureGroup that is causing an error when attempting to be retrieved.
        ErrorCode:
          $ref: "#/components/schemas/ValueAsString"
          description: The error code of an error that has occurred when attempting to retrieve a batch of Records. For more information on errors, see Errors.
        ErrorMessage:
          $ref: "#/components/schemas/Message"
          description: The error message of an error that has occurred when attempting to retrieve a record in the batch.
      required:
        - FeatureGroupName
        - RecordIdentifierValueAsString
        - ErrorCode
        - ErrorMessage
    Message:
      type: string
      maxLength: 2048
    UnprocessedIdentifiers:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetRecordIdentifier"
    TargetStores:
      type: array
      items:
        $ref: "#/components/schemas/TargetStore"
    TargetStore:
      type: string
      enum:
        - OnlineStore
        - OfflineStore
    DeletionMode:
      type: string
      enum:
        - SoftDelete
        - HardDelete
    GetRecordResponse:
      type: object
      properties:
        Record:
          $ref: "#/components/schemas/Record"
          description: The record you requested. A list of FeatureValues.
        ExpiresAt:
          $ref: "#/components/schemas/ExpiresAt"
          description: The ExpiresAt ISO string of the requested record.
    TtlDuration:
      description: Time to live duration, where the record is hard deleted after the expiration time is reached; ExpiresAt = EventTime + TtlDuration. For information on HardDelete, see the DeleteRecord API in the Amazon SageMaker API Reference guide.
      type: object
      properties:
        Unit:
          $ref: "#/components/schemas/TtlDurationUnit"
          description: TtlDuration time unit.
        Value:
          $ref: "#/components/schemas/TtlDurationValue"
          description: TtlDuration time value.
      required:
        - Unit
        - Value
    TtlDurationUnit:
      type: string
      enum:
        - Seconds
        - Minutes
        - Hours
        - Days
        - Weeks
    TtlDurationValue:
      type: integer
      minimum: 1
  x-stackQL-resources:
    records:
      id: aws.sagemaker_featurestore_runtime.records
      name: records
      title: records
      methods:
        batch_get_record:
          operation:
            $ref: "#/paths/~1BatchGetRecord/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        delete_record:
          operation:
            $ref: "#/paths/~1FeatureGroup~1{feature_group_name}/delete"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: pascal
        get_record:
          operation:
            $ref: "#/paths/~1FeatureGroup~1{feature_group_name}/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
        put_record:
          operation:
            $ref: "#/paths/~1FeatureGroup~1{feature_group_name}/put"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/records/methods/get_record"
          - $ref: "#/components/x-stackQL-resources/records/methods/batch_get_record"
        insert: []
        update: []
        replace:
          - $ref: "#/components/x-stackQL-resources/records/methods/put_record"
        delete:
          - $ref: "#/components/x-stackQL-resources/records/methods/delete_record"
