        UnprocessedAccounts:
          $ref: "#/components/schemas/UnprocessedAccountList"
          description: The list of member accounts that Detective was not able to remove from the behavior graph. For each member account, provides the reason that the deletion could not be processed.
    DescribeOrganizationConfigurationResponse:
      type: object
      properties:
        AutoEnable:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether to automatically enable new organization accounts as member accounts in the organization behavior graph.
    InvestigationId:
      type: string
      minLength: 21
      maxLength: 21
      pattern: ^[0-9]+$
    GetInvestigationResponse:
      type: object
      properties:
        GraphArn:
          $ref: "#/components/schemas/GraphArn"
          description: The Amazon Resource Name (ARN) of the behavior graph.
        InvestigationId:
          $ref: "#/components/schemas/InvestigationId"
          description: The investigation ID of the investigation report.
        EntityArn:
          $ref: "#/components/schemas/EntityArn"
          description: The unique Amazon Resource Name (ARN). Detective supports IAM user ARNs and IAM role ARNs.
        EntityType:
          $ref: "#/components/schemas/EntityType"
          description: Type of entity. For example, Amazon Web Services accounts, such as an IAM user and/or IAM role.
        CreatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The creation time of the investigation report in UTC time stamp format.
        ScopeStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start date and time used to set the scope time within which you want to generate the investigation report. The value is an UTC ISO8601 formatted string. For example, 2021-08-18T16:35:56.284Z.
        ScopeEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The data and time when the investigation began. The value is an UTC ISO8601 formatted string. For example, 2021-08-18T16:35:56.284Z.
        Status:
          $ref: "#/components/schemas/Status"
          description: The status based on the completion status of the investigation.
        Severity:
          $ref: "#/components/schemas/Severity"
          description: The severity assigned is based on the likelihood and impact of the indicators of compromise discovered in the investigation.
        State:
          $ref: "#/components/schemas/State"
          description: The current state of the investigation. An archived investigation indicates that you have completed reviewing the investigation.
    EntityArn:
      type: string
      pattern: ^arn:.*
    EntityType:
      type: string
      enum:
        - IAM_ROLE
        - IAM_USER
    Status:
      type: string
