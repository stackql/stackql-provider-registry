        CreatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the behavior graph was created. The value is an ISO8601 formatted string. For example, 2021-08-18T16:35:56.284Z.
    IndicatorType:
      type: string
      enum:
        - TTP_OBSERVED
        - IMPOSSIBLE_TRAVEL
        - FLAGGED_IP_ADDRESS
        - NEW_GEOLOCATION
        - NEW_ASO
        - NEW_USER_AGENT
        - RELATED_FINDING
        - RELATED_FINDING_GROUP
    AiPaginationToken:
      type: string
      minLength: 1
      maxLength: 2048
    MaxResults:
      type: integer
      minimum: 1
      maximum: 100
    ListIndicatorsResponse:
      type: object
      properties:
        GraphArn:
          $ref: "#/components/schemas/GraphArn"
          description: The Amazon Resource Name (ARN) of the behavior graph.
        InvestigationId:
          $ref: "#/components/schemas/InvestigationId"
          description: The investigation ID of the investigation report.
        NextToken:
          $ref: "#/components/schemas/AiPaginationToken"
          description: Lists if there are more results available. The value of nextToken is a unique pagination token for each page. Repeat the call using the returned token to retrieve the next page. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token will return a Validation Exception error.
        Indicators:
          $ref: "#/components/schemas/Indicators"
          description: Lists the indicators of compromise.
    Indicators:
      type: array
      items:
        $ref: "#/components/schemas/Indicator"
    Indicator:
      description: Detective investigations triages indicators of compromises such as a finding and surfaces only the most critical and suspicious issues, so you can focus on high-level investigations. An Indicator lets you determine if an Amazon Web Services resource is involved in unusual activity that could indicate malicious behavior and its impact.
      type: object
      properties:
        IndicatorType:
          $ref: "#/components/schemas/IndicatorType"
          description: The type of indicator.
        IndicatorDetail:
          $ref: "#/components/schemas/IndicatorDetail"
          description: Details about the indicators of compromise that are used to determine if a resource is involved in a security incident. An indicator of compromise (IOC) is an artifact observed in or on a network, system, or environment that can (with a high level of confidence) identify malicious activity or a security incident.
    IndicatorDetail:
      description: Details about the indicators of compromise which are used to determine if a resource is involved in a security incident. An indicator of compromise (IOC) is an artifact observed in or on a network, system, or environment that can (with a high level of confidence) identify malicious activity or a security incident. For the list of indicators of compromise that are generated by Detective investigations, see Detective investigations.
      type: object
      properties:
        TTPsObservedDetail:
          $ref: "#/components/schemas/TTPsObservedDetail"
          description: Details about the indicator of compromise.
        ImpossibleTravelDetail:
          $ref: "#/components/schemas/ImpossibleTravelDetail"
          description: Identifies unusual and impossible user activity for an account.
        FlaggedIpAddressDetail:
          $ref: "#/components/schemas/FlaggedIpAddressDetail"
          description: Suspicious IP addresses that are flagged, which indicates critical or severe threats based on threat intelligence by Detective. This indicator is derived from Amazon Web Services threat intelligence.
        NewGeolocationDetail:
          $ref: "#/components/schemas/NewGeolocationDetail"
          description: Contains details about the new geographic location.
        NewAsoDetail:
          $ref: "#/components/schemas/NewAsoDetail"
          description: Contains details about the new Autonomous System Organization (ASO).
        NewUserAgentDetail:
          $ref: "#/components/schemas/NewUserAgentDetail"
          description: Contains details about the new user agent.
        RelatedFindingDetail:
          $ref: "#/components/schemas/RelatedFindingDetail"
          description: Contains details about related findings.
        RelatedFindingGroupDetail:
          $ref: "#/components/schemas/RelatedFindingGroupDetail"
          description: Contains details about related finding groups.
    TTPsObservedDetail:
      description: Details tactics, techniques, and procedures (TTPs) used in a potential security event. Tactics are based on MITRE ATT&CK Matrix for Enterprise.
      type: object
      properties:
        Tactic:
          $ref: "#/components/schemas/Tactic"
          description: The tactic used, identified by the investigation.
        Technique:
          $ref: "#/components/schemas/Technique"
          description: The technique used, identified by the investigation.
        Procedure:
          $ref: "#/components/schemas/Procedure"
          description: The procedure used, identified by the investigation.
        IpAddress:
          $ref: "#/components/schemas/IpAddress"
          description: The IP address where the tactics, techniques, and procedure (TTP) was observed.
        APIName:
          $ref: "#/components/schemas/APIName"
          description: The name of the API where the tactics, techniques, and procedure (TTP) was observed.
        APISuccessCount:
          $ref: "#/components/schemas/APISuccessCount"
          description: The total number of successful API requests.
        APIFailureCount:
          $ref: "#/components/schemas/APIFailureCount"
          description: The total number of failed API requests.
    Tactic:
      type: string
    Technique:
