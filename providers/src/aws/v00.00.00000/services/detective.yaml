openapi: 3.0.0
info:
  version: "2018-10-26"
  title: Amazon Detective
  description: Amazon Detective
  x-serviceName: detective
  x-serviceAlias: detective
  x-protocol: rest-json
  x-apiVersion: "2018-10-26"
  x-endpointPrefix: api.detective
  x-jsonVersion: "1.1"
servers:
  - url: https://api.detective.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for detective
paths:
  /invitation:
    put:
      operationId: AcceptInvitation
      description: Accepts an invitation for the member account to contribute data to a behavior graph. This operation can only be called by an invited member account. The request provides the ARN of behavior graph. The member account status in the graph must be INVITED.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
              required:
                - GraphArn
      responses:
        "200":
          description: Success
  /graph/datasources/get:
    post:
      operationId: BatchGetGraphMemberDatasources
      description: Gets data source package information for the behavior graph.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
                AccountIds:
                  $ref: "#/components/schemas/AccountIdExtendedList"
              required:
                - GraphArn
                - AccountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetGraphMemberDatasourcesResponse"
  /membership/datasources/get:
    post:
      operationId: BatchGetMembershipDatasources
      description: Gets information on the data source package history for an account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArns:
                  $ref: "#/components/schemas/GraphArnList"
              required:
                - GraphArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetMembershipDatasourcesResponse"
  /graph:
    post:
      operationId: CreateGraph
      description: Creates a new behavior graph for the calling account, and sets that account as the administrator account. This operation is called by the account that is enabling Detective. The operation also enables Detective for the calling account in the currently selected Region. It returns the ARN of the new behavior graph. CreateGraph triggers a process to create the corresponding data tables for the new behavior graph. An account can only be the administrator account for one behavior graph within a Region. If the same account calls CreateGraph with the same administrator account, it always returns the same behavior graph ARN. It does not create a new behavior graph.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGraphResponse"
  /graph/members:
    post:
      operationId: CreateMembers
      description: "CreateMembers is used to send invitations to accounts. For the organization behavior graph, the Detective administrator account uses CreateMembers to enable organization accounts as member accounts. For invited accounts, CreateMembers sends a request to invite the specified Amazon Web Services accounts to be member accounts in the behavior graph. This operation can only be called by the administrator account for a behavior graph. CreateMembers verifies the accounts and then invites the verified accounts. The administrator can optionally specify to not send invitation emails to the member accounts. This would be used when the administrator manages their member accounts centrally. For organization accounts in the organization behavior graph, CreateMembers attempts to enable the accounts. The organization accounts do not receive invitations. The request provides the behavior graph ARN and the list of accounts to invite or to enable. The response separates the requested accounts into two lists: The accounts that CreateMembers was able to process. For invited accounts, includes member accounts that are being verified, that have passed verification and are to be invited, and that have failed verification. For organization accounts in the organization behavior graph, includes accounts that can be enabled and that cannot be enabled. The accounts that CreateMembers was unable to process. This list includes accounts that were already invited to be member accounts in the behavior graph."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
                Message:
                  $ref: "#/components/schemas/EmailMessage"
                DisableEmailNotification:
                  $ref: "#/components/schemas/Boolean"
                Accounts:
                  $ref: "#/components/schemas/AccountList"
              required:
                - GraphArn
                - Accounts
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMembersResponse"
  /graph/removal:
    post:
      operationId: DeleteGraph
      description: Disables the specified behavior graph and queues it to be deleted. This operation removes the behavior graph from each member account's list of behavior graphs. DeleteGraph can only be called by the administrator account for a behavior graph.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
              required:
                - GraphArn
      responses:
        "200":
          description: Success
  /graph/members/removal:
    post:
      operationId: DeleteMembers
      description: Removes the specified member accounts from the behavior graph. The removed accounts no longer contribute data to the behavior graph. This operation can only be called by the administrator account for the behavior graph. For invited accounts, the removed accounts are deleted from the list of accounts in the behavior graph. To restore the account, the administrator account must send another invitation. For organization accounts in the organization behavior graph, the Detective administrator account can always enable the organization account again. Organization accounts that are not enabled as member accounts are not included in the ListMembers results for the organization behavior graph. An administrator account cannot use DeleteMembers to remove their own account from the behavior graph. To disable a behavior graph, the administrator account uses the DeleteGraph API method.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
                AccountIds:
                  $ref: "#/components/schemas/AccountIdList"
              required:
                - GraphArn
                - AccountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMembersResponse"
  /orgs/describeOrganizationConfiguration:
    post:
      operationId: DescribeOrganizationConfiguration
      description: Returns information about the configuration for the organization behavior graph. Currently indicates whether to automatically enable new organization accounts as member accounts. Can only be called by the Detective administrator account for the organization.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
              required:
                - GraphArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeOrganizationConfigurationResponse"
  /orgs/disableAdminAccount:
    post:
      operationId: DisableOrganizationAdminAccount
      description: Removes the Detective administrator account in the current Region. Deletes the organization behavior graph. Can only be called by the organization management account. Removing the Detective administrator account does not affect the delegated administrator account for Detective in Organizations. To remove the delegated administrator account in Organizations, use the Organizations API. Removing the delegated administrator account also removes the Detective administrator account in all Regions, except for Regions where the Detective administrator account is the organization management account.
      parameters: []
      responses:
        "200":
          description: Success
  /membership/removal:
    post:
      operationId: DisassociateMembership
      description: Removes the member account from the specified behavior graph. This operation can only be called by an invited member account that has the ENABLED status. DisassociateMembership cannot be called by an organization account in the organization behavior graph. For the organization behavior graph, the Detective administrator account determines which organization accounts to enable or disable as member accounts.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
              required:
                - GraphArn
      responses:
        "200":
          description: Success
  /orgs/enableAdminAccount:
    post:
      operationId: EnableOrganizationAdminAccount
      description: Designates the Detective administrator account for the organization in the current Region. If the account does not have Detective enabled, then enables Detective for that account and creates a new behavior graph. Can only be called by the organization management account. If the organization has a delegated administrator account in Organizations, then the Detective administrator account must be either the delegated administrator account or the organization management account. If the organization does not have a delegated administrator account in Organizations, then you can choose any account in the organization. If you choose an account other than the organization management account, Detective calls Organizations to make that account the delegated administrator account for Detective. The organization management account cannot be the delegated administrator account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
              required:
                - AccountId
      responses:
        "200":
          description: Success
  /investigations/getInvestigation:
    post:
      operationId: GetInvestigation
      description: Detective investigations lets you investigate IAM users and IAM roles using indicators of compromise. An indicator of compromise (IOC) is an artifact observed in or on a network, system, or environment that can (with a high level of confidence) identify malicious activity or a security incident. GetInvestigation returns the investigation results of an investigation for a behavior graph.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
                InvestigationId:
                  $ref: "#/components/schemas/InvestigationId"
              required:
                - GraphArn
                - InvestigationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInvestigationResponse"
  /graph/members/get:
    post:
      operationId: GetMembers
      description: Returns the membership details for specified member accounts for a behavior graph.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
                AccountIds:
                  $ref: "#/components/schemas/AccountIdList"
              required:
                - GraphArn
                - AccountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMembersResponse"
  /graph/datasources/list:
    post:
      operationId: ListDatasourcePackages
      description: Lists data source packages in the behavior graph.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                MaxResults:
                  $ref: "#/components/schemas/MemberResultsLimit"
              required:
                - GraphArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDatasourcePackagesResponse"
  /graphs/list:
    post:
      operationId: ListGraphs
      description: Returns the list of behavior graphs that the calling account is an administrator account of. This operation can only be called by an administrator account. Because an account can currently only be the administrator of one behavior graph within a Region, the results always contain a single behavior graph.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                MaxResults:
                  $ref: "#/components/schemas/MemberResultsLimit"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGraphsResponse"
  /investigations/listIndicators:
    post:
      operationId: ListIndicators
      description: Gets the indicators from an investigation. You can use the information from the indicators to determine if an IAM user and/or IAM role is involved in an unusual activity that could indicate malicious behavior and its impact.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
                InvestigationId:
                  $ref: "#/components/schemas/InvestigationId"
                IndicatorType:
                  $ref: "#/components/schemas/IndicatorType"
                NextToken:
                  $ref: "#/components/schemas/AiPaginationToken"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
              required:
                - GraphArn
                - InvestigationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIndicatorsResponse"
  /investigations/listInvestigations:
    post:
      operationId: ListInvestigations
      description: Detective investigations lets you investigate IAM users and IAM roles using indicators of compromise. An indicator of compromise (IOC) is an artifact observed in or on a network, system, or environment that can (with a high level of confidence) identify malicious activity or a security incident. ListInvestigations lists all active Detective investigations.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
                NextToken:
                  $ref: "#/components/schemas/AiPaginationToken"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                FilterCriteria:
                  $ref: "#/components/schemas/FilterCriteria"
                SortCriteria:
                  $ref: "#/components/schemas/SortCriteria"
              required:
                - GraphArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInvestigationsResponse"
  /invitations/list:
    post:
      operationId: ListInvitations
      description: Retrieves the list of open and accepted behavior graph invitations for the member account. This operation can only be called by an invited member account. Open invitations are invitations that the member account has not responded to. The results do not include behavior graphs for which the member account declined the invitation. The results also do not include behavior graphs that the member account resigned from or was removed from.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                MaxResults:
                  $ref: "#/components/schemas/MemberResultsLimit"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInvitationsResponse"
  /graph/members/list:
    post:
      operationId: ListMembers
      description: Retrieves the list of member accounts for a behavior graph. For invited accounts, the results do not include member accounts that were removed from the behavior graph. For the organization behavior graph, the results do not include organization accounts that the Detective administrator account has not enabled as member accounts.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                MaxResults:
                  $ref: "#/components/schemas/MemberResultsLimit"
              required:
                - GraphArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMembersResponse"
  /orgs/adminAccountslist:
    post:
      operationId: ListOrganizationAdminAccounts
      description: Returns information about the Detective administrator account for an organization. Can only be called by the organization management account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                MaxResults:
                  $ref: "#/components/schemas/MemberResultsLimit"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrganizationAdminAccountsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns the tag values that are assigned to a behavior graph.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GraphArn"
          description: The ARN of the behavior graph for which to retrieve the tag values.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Applies tag values to a behavior graph.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GraphArn"
          description: The ARN of the behavior graph to assign the tags to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes tags from a behavior graph.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GraphArn"
          description: The ARN of the behavior graph to remove the tags from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The tag keys of the tags to remove from the behavior graph. You can remove up to 50 tags at a time.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /invitation/removal:
    post:
      operationId: RejectInvitation
      description: Rejects an invitation to contribute the account data to a behavior graph. This operation must be called by an invited member account that has the INVITED status. RejectInvitation cannot be called by an organization account in the organization behavior graph. In the organization behavior graph, organization accounts do not receive an invitation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
              required:
                - GraphArn
      responses:
        "200":
          description: Success
  /investigations/startInvestigation:
    post:
      operationId: StartInvestigation
      description: Detective investigations lets you investigate IAM users and IAM roles using indicators of compromise. An indicator of compromise (IOC) is an artifact observed in or on a network, system, or environment that can (with a high level of confidence) identify malicious activity or a security incident. StartInvestigation initiates an investigation on an entity in a behavior graph.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
                EntityArn:
                  $ref: "#/components/schemas/EntityArn"
                ScopeStartTime:
                  $ref: "#/components/schemas/Timestamp"
                ScopeEndTime:
                  $ref: "#/components/schemas/Timestamp"
              required:
                - GraphArn
                - EntityArn
                - ScopeStartTime
                - ScopeEndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartInvestigationResponse"
  /graph/member/monitoringstate:
    post:
      operationId: StartMonitoringMember
      description: Sends a request to enable data ingest for a member account that has a status of ACCEPTED_BUT_DISABLED. For valid member accounts, the status is updated as follows. If Detective enabled the member account, then the new status is ENABLED. If Detective cannot enable the member account, the status remains ACCEPTED_BUT_DISABLED.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
                AccountId:
                  $ref: "#/components/schemas/AccountId"
              required:
                - GraphArn
                - AccountId
      responses:
        "200":
          description: Success
  /graph/datasources/update:
    post:
      operationId: UpdateDatasourcePackages
      description: Starts a data source package for the Detective behavior graph.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
                DatasourcePackages:
                  $ref: "#/components/schemas/DatasourcePackageList"
              required:
                - GraphArn
                - DatasourcePackages
      responses:
        "200":
          description: Success
  /investigations/updateInvestigationState:
    post:
      operationId: UpdateInvestigationState
      description: Updates the state of an investigation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
                InvestigationId:
                  $ref: "#/components/schemas/InvestigationId"
                State:
                  $ref: "#/components/schemas/State"
              required:
                - GraphArn
                - InvestigationId
      responses:
        "200":
          description: Success
  /orgs/updateOrganizationConfiguration:
    post:
      operationId: UpdateOrganizationConfiguration
      description: Updates the configuration for the Organizations integration in the current Region. Can only be called by the Detective administrator account for the organization.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GraphArn:
                  $ref: "#/components/schemas/GraphArn"
                AutoEnable:
                  $ref: "#/components/schemas/Boolean"
              required:
                - GraphArn
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    GraphArn:
      type: string
      pattern: ^arn:aws[-\w]{0,10}?:detective:[-\w]{2,20}?:\d{12}?:graph:[abcdef\d]{32}?$
    AccountIdExtendedList:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    AccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: ^[0-9]+$
    BatchGetGraphMemberDatasourcesResponse:
      type: object
      properties:
        MemberDatasources:
          $ref: "#/components/schemas/MembershipDatasourcesList"
          description: Details on the status of data source packages for members of the behavior graph.
        UnprocessedAccounts:
          $ref: "#/components/schemas/UnprocessedAccountList"
          description: Accounts that data source package information could not be retrieved for.
    MembershipDatasourcesList:
      type: array
      items:
        $ref: "#/components/schemas/MembershipDatasources"
    MembershipDatasources:
      description: Details on data source packages for members of the behavior graph.
      type: object
      properties:
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: The account identifier of the Amazon Web Services account.
        GraphArn:
          $ref: "#/components/schemas/GraphArn"
          description: The ARN of the organization behavior graph.
        DatasourcePackageIngestHistory:
          type: object
          properties: {}
          description: Details on when a data source package was added to a behavior graph.
    UnprocessedAccountList:
      type: array
      items:
        $ref: "#/components/schemas/UnprocessedAccount"
    UnprocessedAccount:
      description: A member account that was included in a request but for which the request could not be processed.
      type: object
      properties:
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account identifier of the member account that was not processed.
        Reason:
          $ref: "#/components/schemas/UnprocessedReason"
          description: The reason that the member account request could not be processed.
    UnprocessedReason:
      type: string
    GraphArnList:
      type: array
      items:
        $ref: "#/components/schemas/GraphArn"
    BatchGetMembershipDatasourcesResponse:
      type: object
      properties:
        MembershipDatasources:
          $ref: "#/components/schemas/MembershipDatasourcesList"
          description: Details on the data source package history for an member of the behavior graph.
        UnprocessedGraphs:
          $ref: "#/components/schemas/UnprocessedGraphList"
          description: Graphs that data source package information could not be retrieved for.
    UnprocessedGraphList:
      type: array
      items:
        $ref: "#/components/schemas/UnprocessedGraph"
    UnprocessedGraph:
      description: Behavior graphs that could not be processed in the request.
      type: object
      properties:
        GraphArn:
          $ref: "#/components/schemas/GraphArn"
          description: The ARN of the organization behavior graph.
        Reason:
          $ref: "#/components/schemas/UnprocessedReason"
          description: The reason data source package information could not be processed for a behavior graph.
    TagMap:
      type: object
      properties: {}
    CreateGraphResponse:
      type: object
      properties:
        GraphArn:
          $ref: "#/components/schemas/GraphArn"
          description: The ARN of the new behavior graph.
    EmailMessage:
      type: string
      minLength: 1
      maxLength: 1000
    Boolean:
      type: boolean
    AccountList:
      type: array
      items:
        $ref: "#/components/schemas/Account"
    Account:
      description: An Amazon Web Services account that is the administrator account of or a member of a behavior graph.
      type: object
      properties:
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: The account identifier of the Amazon Web Services account.
        EmailAddress:
          $ref: "#/components/schemas/EmailAddress"
          description: The Amazon Web Services account root user email address for the Amazon Web Services account.
      required:
        - AccountId
        - EmailAddress
    EmailAddress:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^.+@(?:(?:(?!-)[A-Za-z0-9-]{1,62})?[A-Za-z0-9]{1}\.)+[A-Za-z]{2,63}$
    CreateMembersResponse:
      type: object
      properties:
        Members:
          $ref: "#/components/schemas/MemberDetailList"
          description: The set of member account invitation or enablement requests that Detective was able to process. This includes accounts that are being verified, that failed verification, and that passed verification and are being sent an invitation or are being enabled.
        UnprocessedAccounts:
          $ref: "#/components/schemas/UnprocessedAccountList"
          description: The list of accounts for which Detective was unable to process the invitation or enablement request. For each account, the list provides the reason why the request could not be processed. The list includes accounts that are already member accounts in the behavior graph.
    MemberDetailList:
      type: array
      items:
        $ref: "#/components/schemas/MemberDetail"
    MemberDetail:
      description: Details about a member account in a behavior graph.
      type: object
      properties:
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account identifier for the member account.
        EmailAddress:
          $ref: "#/components/schemas/EmailAddress"
          description: The Amazon Web Services account root user email address for the member account.
        GraphArn:
          $ref: "#/components/schemas/GraphArn"
          description: The ARN of the behavior graph.
        MasterId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account identifier of the administrator account for the behavior graph.
        AdministratorId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account identifier of the administrator account for the behavior graph.
        Status:
          $ref: "#/components/schemas/MemberStatus"
          description: "The current membership status of the member account. The status can have one of the following values: INVITED - For invited accounts only. Indicates that the member was sent an invitation but has not yet responded. VERIFICATION_IN_PROGRESS - For invited accounts only, indicates that Detective is verifying that the account identifier and email address provided for the member account match. If they do match, then Detective sends the invitation. If the email address and account identifier don't match, then the member cannot be added to the behavior graph. For organization accounts in the organization behavior graph, indicates that Detective is verifying that the account belongs to the organization. VERIFICATION_FAILED - For invited accounts only. Indicates that the account and email address provided for the member account do not match, and Detective did not send an invitation to the account. ENABLED - Indicates that the member account currently contributes data to the behavior graph. For invited accounts, the member account accepted the invitation. For organization accounts in the organization behavior graph, the Detective administrator account enabled the organization account as a member account. ACCEPTED_BUT_DISABLED - The account accepted the invitation, or was enabled by the Detective administrator account, but is prevented from contributing data to the behavior graph. DisabledReason provides the reason why the member account is not enabled. Invited accounts that declined an invitation or that were removed from the behavior graph are not included. In the organization behavior graph, organization accounts that the Detective administrator account did not enable are not included."
        DisabledReason:
          $ref: "#/components/schemas/MemberDisabledReason"
          description: "For member accounts with a status of ACCEPTED_BUT_DISABLED, the reason that the member account is not enabled. The reason can have one of the following values: VOLUME_TOO_HIGH - Indicates that adding the member account would cause the data volume for the behavior graph to be too high. VOLUME_UNKNOWN - Indicates that Detective is unable to verify the data volume for the member account. This is usually because the member account is not enrolled in Amazon GuardDuty."
        InvitedTime:
          $ref: "#/components/schemas/Timestamp"
          description: For invited accounts, the date and time that Detective sent the invitation to the account. The value is an ISO8601 formatted string. For example, 2021-08-18T16:35:56.284Z.
        UpdatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the member account was last updated. The value is an ISO8601 formatted string. For example, 2021-08-18T16:35:56.284Z.
        VolumeUsageInBytes:
          $ref: "#/components/schemas/ByteValue"
          description: The data volume in bytes per day for the member account.
        VolumeUsageUpdatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The data and time when the member account data volume was last updated. The value is an ISO8601 formatted string. For example, 2021-08-18T16:35:56.284Z.
        PercentOfGraphUtilization:
          $ref: "#/components/schemas/Percentage"
          description: The member account data volume as a percentage of the maximum allowed data volume. 0 indicates 0 percent, and 100 indicates 100 percent. Note that this is not the percentage of the behavior graph data volume. For example, the data volume for the behavior graph is 80 GB per day. The maximum data volume is 160 GB per day. If the data volume for the member account is 40 GB per day, then PercentOfGraphUtilization is 25. It represents 25% of the maximum allowed data volume.
        PercentOfGraphUtilizationUpdatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the graph utilization percentage was last updated. The value is an ISO8601 formatted string. For example, 2021-08-18T16:35:56.284Z.
        InvitationType:
          $ref: "#/components/schemas/InvitationType"
          description: The type of behavior graph membership. For an organization account in the organization behavior graph, the type is ORGANIZATION. For an account that was invited to a behavior graph, the type is INVITATION.
        VolumeUsageByDatasourcePackage:
          type: object
          properties: {}
          description: Details on the volume of usage for each data source package in a behavior graph.
        DatasourcePackageIngestStates:
          type: object
          properties: {}
          description: The state of a data source package for the behavior graph.
    MemberStatus:
      type: string
      enum:
        - INVITED
        - VERIFICATION_IN_PROGRESS
        - VERIFICATION_FAILED
        - ENABLED
        - ACCEPTED_BUT_DISABLED
    MemberDisabledReason:
      type: string
      enum:
        - VOLUME_TOO_HIGH
        - VOLUME_UNKNOWN
    Timestamp:
      type: string
      format: date-time
    ByteValue:
      type: integer
      format: int64
    Percentage:
      type: number
      format: double
    InvitationType:
      type: string
      enum:
        - INVITATION
        - ORGANIZATION
    AccountIdList:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    DeleteMembersResponse:
      type: object
