openapi: 3.0.0
info:
  version: "2020-03-01"
  title: AWS Marketplace Agreement Service
  description: AWS Marketplace Agreement Service
  x-serviceName: aws-marketplace
  x-serviceAlias: marketplace_agreement
  x-protocol: json
  x-apiVersion: "2020-03-01"
  x-endpointPrefix: agreement-marketplace
  x-targetPrefix: AWSMPCommerceService_v20200301
  x-jsonVersion: "1.0"
servers:
  - url: https://agreement-marketplace.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for marketplace-agreement
paths:
  /AcceptAgreementCancellationRequest:
    post:
      operationId: AcceptAgreementCancellationRequest
      description: Allows buyers (acceptors) to accept a cancellation request that is in PENDING_APPROVAL status. Once accepted, the cancellation request transitions to APPROVED status and the agreement cancellation will be processed. Only cancellation requests in PENDING_APPROVAL status can be accepted. A ConflictException is thrown if the cancellation request is in any other status.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.AcceptAgreementCancellationRequest
            default: AWSMPCommerceService_v20200301.AcceptAgreementCancellationRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                agreementId:
                  $ref: "#/components/schemas/AgreementId"
                  description: The unique identifier of the agreement associated with the cancellation request.
                agreementCancellationRequestId:
                  $ref: "#/components/schemas/AgreementCancellationRequestId"
                  description: The unique identifier of the cancellation request to accept.
              required:
                - agreementId
                - agreementCancellationRequestId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptAgreementCancellationRequestOutput"
  /AcceptAgreementPaymentRequest:
    post:
      operationId: AcceptAgreementPaymentRequest
      description: Allows buyers (acceptors) to accept a payment request that is in PENDING_APPROVAL status. Once accepted, the payment request transitions to APPROVED status and the charge will be processed. Buyers can optionally provide a purchase order reference for their internal tracking. Only payment requests in PENDING_APPROVAL status can be accepted. A ConflictException is thrown if the payment request is in any other status.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.AcceptAgreementPaymentRequest
            default: AWSMPCommerceService_v20200301.AcceptAgreementPaymentRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                paymentRequestId:
                  $ref: "#/components/schemas/PaymentRequestId"
                  description: The unique identifier of the payment request to accept.
                agreementId:
                  $ref: "#/components/schemas/AgreementId"
                  description: The unique identifier of the agreement associated with the payment request.
                purchaseOrderReference:
                  $ref: "#/components/schemas/PurchaseOrderReference"
                  description: An optional purchase order reference that buyers can provide to associate the payment request with their internal purchase order system.
              required:
                - paymentRequestId
                - agreementId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptAgreementPaymentRequestOutput"
  /AcceptAgreementRequest:
    post:
      operationId: AcceptAgreementRequest
      description: Accepts an agreement request to finalize the agreement. The acceptor can optionally provide purchase orders to associate with the agreement charges.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.AcceptAgreementRequest
            default: AWSMPCommerceService_v20200301.AcceptAgreementRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                agreementRequestId:
                  $ref: "#/components/schemas/AgreementRequestId"
                  description: The unique identifier of the agreement request.
                purchaseOrders:
                  $ref: "#/components/schemas/PurchaseOrders"
                  description: A list of purchase orders associated with accepting a marketplace agreement request.
              required:
                - agreementRequestId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptAgreementRequestOutput"
  /BatchCreateBillingAdjustmentRequest:
    post:
      operationId: BatchCreateBillingAdjustmentRequest
      description: Allows sellers (proposers) to submit billing adjustment requests for one or more invoices within an agreement. Each entry in the batch specifies an invoice and the adjustment amount. The operation returns successfully created adjustment request IDs and any errors for entries that failed to process. Each entry requires a unique clientToken for idempotency.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.BatchCreateBillingAdjustmentRequest
            default: AWSMPCommerceService_v20200301.BatchCreateBillingAdjustmentRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                billingAdjustmentRequestEntries:
                  $ref: "#/components/schemas/BatchCreateBillingAdjustmentRequestEntryList"
                  description: A list of billing adjustment request entries. Each entry specifies the invoice and adjustment details.
              required:
                - billingAdjustmentRequestEntries
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateBillingAdjustmentRequestOutput"
  /CancelAgreement:
    post:
      operationId: CancelAgreement
      description: Allows an acceptor to cancel an active agreement. Not all agreements are eligible for cancellation. Use the error response to determine why a cancellation request was rejected.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.CancelAgreement
            default: AWSMPCommerceService_v20200301.CancelAgreement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                agreementId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The unique identifier of the agreement.
              required:
                - agreementId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelAgreementOutput"
  /CancelAgreementCancellationRequest:
    post:
      operationId: CancelAgreementCancellationRequest
      description: Allows sellers (proposers) to withdraw an existing agreement cancellation request that is in a pending state. Once cancelled, the cancellation request transitions to CANCELLED status and can no longer be approved or rejected by the buyer. Only cancellation requests in PENDING_APPROVAL status can be cancelled. A ConflictException is thrown if the cancellation request is in any other status.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.CancelAgreementCancellationRequest
            default: AWSMPCommerceService_v20200301.CancelAgreementCancellationRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                agreementId:
                  $ref: "#/components/schemas/AgreementId"
                  description: The unique identifier of the agreement associated with the cancellation request.
                agreementCancellationRequestId:
                  $ref: "#/components/schemas/AgreementCancellationRequestId"
                  description: The unique identifier of the cancellation request to cancel.
                cancellationReason:
                  $ref: "#/components/schemas/AgreementCancellationRequestCancellationReason"
                  description: A required message explaining why the cancellation request is being withdrawn (1-2000 characters).
              required:
                - agreementId
                - agreementCancellationRequestId
                - cancellationReason
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelAgreementCancellationRequestOutput"
  /CancelAgreementPaymentRequest:
    post:
      operationId: CancelAgreementPaymentRequest
      description: Allows sellers (proposers) to cancel a payment request that is in PENDING_APPROVAL status. Once cancelled, the payment request transitions to CANCELLED status and can no longer be accepted or rejected by the buyer. Only payment requests in PENDING_APPROVAL status can be cancelled. A ConflictException is thrown if the payment request is in any other status.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.CancelAgreementPaymentRequest
            default: AWSMPCommerceService_v20200301.CancelAgreementPaymentRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                paymentRequestId:
                  $ref: "#/components/schemas/PaymentRequestId"
                  description: The unique identifier of the payment request to cancel.
                agreementId:
                  $ref: "#/components/schemas/AgreementId"
                  description: The unique identifier of the agreement associated with the payment request.
              required:
                - paymentRequestId
                - agreementId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelAgreementPaymentRequestOutput"
  /CreateAgreementRequest:
    post:
      operationId: CreateAgreementRequest
      description: Creates an agreement request that acts as a quote for the terms you want to accept. The agreement request captures the requested terms, calculates charges, and returns a summary. Use AcceptAgreementRequest with the returned agreementRequestId to finalize the agreement.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.CreateAgreementRequest
            default: AWSMPCommerceService_v20200301.CreateAgreementRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                intent:
                  $ref: "#/components/schemas/Intent"
                  description: The purpose and desired outcome of the agreement request. This is a required parameter that determines how the agreement request is processed. NEW – Creates a new agreement for terms in the request. AMEND – Modifies an existing agreement with terms that are accepted in the request. REPLACE – Creates a new agreement with accepted terms and replaces the existing agreement.
                requestedTerms:
                  $ref: "#/components/schemas/RequestedTermList"
                  description: A list of terms that define what is being accepted as part of the agreement. Some terms require configuration.
                sourceAgreementIdentifier:
                  $ref: "#/components/schemas/ResourceId"
                  description: The agreement's identifier that the request acts upon. This parameter is required for all non-NEW intents (i.e., AMEND or REPLACE). Don't provide this parameter if the intent is NEW.
                agreementProposalIdentifier:
                  $ref: "#/components/schemas/AgreementProposalId"
                  description: The agreement proposal signed by the proposer. The proposal includes the requested resources and the terms that outline an agreement outcome. This parameter is required if the intent is not AMEND.
                taxConfiguration:
                  $ref: "#/components/schemas/TaxConfiguration"
                  description: Configuration for tax estimation in the agreement request response.
              required:
                - intent
                - requestedTerms
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAgreementRequestOutput"
  /DescribeAgreement:
    post:
      operationId: DescribeAgreement
      description: Provides details about an agreement, such as the proposer, acceptor, start date, and end date.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.DescribeAgreement
            default: AWSMPCommerceService_v20200301.DescribeAgreement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                agreementId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The unique identifier of the agreement.
              required:
                - agreementId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAgreementOutput"
  /GetAgreementCancellationRequest:
    post:
      operationId: GetAgreementCancellationRequest
      description: Retrieves detailed information about a specific agreement cancellation request. Both sellers (proposers) and buyers (acceptors) can use this operation to view cancellation requests associated with their agreements.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.GetAgreementCancellationRequest
            default: AWSMPCommerceService_v20200301.GetAgreementCancellationRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                agreementCancellationRequestId:
                  $ref: "#/components/schemas/AgreementCancellationRequestId"
                  description: The unique identifier of the cancellation request.
                agreementId:
                  $ref: "#/components/schemas/AgreementId"
                  description: The unique identifier of the agreement associated with the cancellation request.
              required:
                - agreementCancellationRequestId
                - agreementId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAgreementCancellationRequestOutput"
  /GetAgreementEntitlements:
    post:
      operationId: GetAgreementEntitlements
      description: Obtains details about the entitlements of an agreement.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.GetAgreementEntitlements
            default: AWSMPCommerceService_v20200301.GetAgreementEntitlements
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                agreementId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The unique identifier of the agreement.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of agreement entitlements to return in the response.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token to specify where to start pagination.
              required:
                - agreementId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAgreementEntitlementsOutput"
  /GetAgreementPaymentRequest:
    post:
      operationId: GetAgreementPaymentRequest
      description: Retrieves detailed information about a specific payment request. Both sellers (proposers) and buyers (acceptors) can use this operation to view payment requests associated with their agreements. The response includes the current status, charge details, timestamps, and the charge ID if the request has been approved. The calling identity must be either the acceptor or proposer of the payment request. A ResourceNotFoundException is returned if the payment request does not exist.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.GetAgreementPaymentRequest
            default: AWSMPCommerceService_v20200301.GetAgreementPaymentRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                paymentRequestId:
                  $ref: "#/components/schemas/PaymentRequestId"
                  description: The identifier of the payment request.
                agreementId:
                  $ref: "#/components/schemas/AgreementId"
                  description: The unique identifier of the agreement associated with the payment request.
              required:
                - paymentRequestId
                - agreementId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAgreementPaymentRequestOutput"
  /GetAgreementTerms:
    post:
      operationId: GetAgreementTerms
      description: "Obtains details about the terms in an agreement that you participated in as proposer or acceptor. The details include: TermType – The type of term, such as LegalTerm, RenewalTerm, or ConfigurableUpfrontPricingTerm. TermID – The ID of the particular term, which is common between offer and agreement. TermPayload – The key information contained in the term, such as the EULA for LegalTerm or pricing and dimensions for various pricing terms, such as ConfigurableUpfrontPricingTerm or UsageBasedPricingTerm. Configuration – The buyer/acceptor's selection at the time of agreement creation, such as the number of units purchased for a dimension or setting the EnableAutoRenew flag."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.GetAgreementTerms
            default: AWSMPCommerceService_v20200301.GetAgreementTerms
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                agreementId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The unique identifier of the agreement.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of agreements to return in the response.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token to specify where to start pagination.
              required:
                - agreementId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAgreementTermsOutput"
  /GetBillingAdjustmentRequest:
    post:
      operationId: GetBillingAdjustmentRequest
      description: Retrieves detailed information about a specific billing adjustment request. Sellers (proposers) can use this operation to view the status and details of a billing adjustment request they submitted.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.GetBillingAdjustmentRequest
            default: AWSMPCommerceService_v20200301.GetBillingAdjustmentRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                agreementId:
                  $ref: "#/components/schemas/AgreementId"
                  description: The unique identifier of the agreement associated with the billing adjustment request.
                billingAdjustmentRequestId:
                  $ref: "#/components/schemas/BillingAdjustmentRequestId"
                  description: The unique identifier of the billing adjustment request.
              required:
                - agreementId
                - billingAdjustmentRequestId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBillingAdjustmentRequestOutput"
  /ListAgreementCancellationRequests:
    post:
      operationId: ListAgreementCancellationRequests
      description: Lists agreement cancellation requests available to you as a seller or buyer. Both sellers (proposers) and buyers (acceptors) can use this operation to find cancellation requests by specifying their party type and applying optional filters. PartyType is a required parameter. A ValidationException is returned if PartyType is not provided.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.ListAgreementCancellationRequests
            default: AWSMPCommerceService_v20200301.ListAgreementCancellationRequests
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                partyType:
                  $ref: "#/components/schemas/PartyType"
                  description: The party type for the cancellation requests. Required parameter. Use Proposer to list cancellation requests where you are the seller, or Acceptor to list cancellation requests where you are the buyer.
                agreementId:
                  $ref: "#/components/schemas/AgreementId"
                  description: An optional parameter to filter cancellation requests for a specific agreement.
                status:
                  $ref: "#/components/schemas/AgreementCancellationRequestStatus"
                  description: An optional parameter to filter cancellation requests by status.
                agreementType:
                  $ref: "#/components/schemas/AgreementType"
                  description: An optional parameter to filter cancellation requests by agreement type (e.g., PurchaseAgreement).
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: An optional parameter to filter cancellation requests by catalog (e.g., AWSMarketplace).
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of cancellation requests to return in the response.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token to specify where to start pagination.
              required:
                - partyType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgreementCancellationRequestsOutput"
  /ListAgreementCharges:
    post:
      operationId: ListAgreementCharges
      description: Allows acceptors to view charges and purchase orders that are associated with an agreement. The response includes details about all charges regardless of whether a purchase order is linked to each charge.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.ListAgreementCharges
            default: AWSMPCommerceService_v20200301.ListAgreementCharges
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog in which the charges were created.
                agreementId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The unique identifier of the agreement.
                agreementType:
                  $ref: "#/components/schemas/AgreementType"
                  description: Filter to retrieve charges of a specific agreement type (for example, PurchaseAgreement).
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of charges to return in the response.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token to specify where to start pagination.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgreementChargesOutput"
  /ListAgreementInvoiceLineItems:
    post:
      operationId: ListAgreementInvoiceLineItems
      description: Allows sellers (proposers) to retrieve aggregated billing data from AWS Marketplace agreements using flexible grouping. Supports invoice-level aggregation with filtering by billing period, invoice type, and issued date. The groupBy parameter is required and supports only INVOICE_ID as a value. The agreementId parameter is required.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.ListAgreementInvoiceLineItems
            default: AWSMPCommerceService_v20200301.ListAgreementInvoiceLineItems
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                agreementId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The unique identifier of the agreement.
                groupBy:
                  $ref: "#/components/schemas/LineItemGroupBy"
                  description: Specifies a grouping strategy for line items. Currently supports INVOICE_ID.
                invoiceId:
                  $ref: "#/components/schemas/ResourceId"
                  description: An optional filter to retrieve invoice information for a specific invoice.
                invoiceType:
                  $ref: "#/components/schemas/InvoiceType"
                  description: An optional filter for the type of invoice. Valid values are INVOICE and CREDIT_MEMO.
                invoiceBillingPeriod:
                  $ref: "#/components/schemas/InvoiceBillingPeriod"
                  description: An optional filter for the billing period associated with the invoice.
                beforeIssuedTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: An optional filter for invoices issued before the specified timestamp.
                afterIssuedTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: An optional filter for invoices issued after the specified timestamp.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return in the response.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token to specify where to start pagination.
              required:
                - agreementId
                - groupBy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgreementInvoiceLineItemsOutput"
  /ListAgreementPaymentRequests:
    post:
      operationId: ListAgreementPaymentRequests
      description: Lists payment requests available to you as a seller or buyer. Both sellers (proposers) and buyers (acceptors) can use this operation to find payment requests by specifying their party type and applying optional parameters. PartyType is a required parameter. A ValidationException is returned if PartyType is not provided. Pagination is supported through maxResults (1-50, default 50) and nextToken parameters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.ListAgreementPaymentRequests
            default: AWSMPCommerceService_v20200301.ListAgreementPaymentRequests
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                partyType:
                  $ref: "#/components/schemas/PartyType"
                  description: The party type for the payment requests. Required parameter. Use Proposer to list payment requests where you are the seller, or Acceptor to list payment requests where you are the buyer.
                agreementType:
                  $ref: "#/components/schemas/AgreementType"
                  description: An optional parameter to list payment requests by agreement type (e.g., PurchaseAgreement).
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: An optional parameter to list payment requests by catalog (e.g., AWSMarketplace).
                agreementId:
                  $ref: "#/components/schemas/AgreementId"
                  description: An optional parameter to list payment requests for a specific agreement.
                status:
                  $ref: "#/components/schemas/PaymentRequestStatus"
                  description: An optional parameter to list payment requests by status. Valid values include VALIDATING, VALIDATION_FAILED, PENDING_APPROVAL, APPROVED, REJECTED, and CANCELLED.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of payment requests to return in a single response (1-50). Default is 50.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token to specify where to start pagination.
              required:
                - partyType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgreementPaymentRequestsOutput"
  /ListBillingAdjustmentRequests:
    post:
      operationId: ListBillingAdjustmentRequests
      description: Lists billing adjustment requests for a specific agreement. Sellers (proposers) can use this operation to view all billing adjustment requests associated with an agreement.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.ListBillingAdjustmentRequests
            default: AWSMPCommerceService_v20200301.ListBillingAdjustmentRequests
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                agreementId:
                  $ref: "#/components/schemas/AgreementId"
                  description: The unique identifier of the agreement to list billing adjustment requests for.
                status:
                  $ref: "#/components/schemas/BillingAdjustmentStatus"
                  description: An optional filter to return billing adjustment requests with the specified status.
                createdAfter:
                  $ref: "#/components/schemas/Timestamp"
                  description: An optional filter to return billing adjustment requests created after the specified timestamp.
                createdBefore:
                  $ref: "#/components/schemas/Timestamp"
                  description: An optional filter to return billing adjustment requests created before the specified timestamp.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of billing adjustment requests to return in the response.
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: An optional filter to return billing adjustment requests by catalog (e.g., AWSMarketplace).
                agreementType:
                  $ref: "#/components/schemas/AgreementType"
                  description: An optional filter to return billing adjustment requests by agreement type (e.g., PurchaseAgreement).
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token to specify where to start pagination.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBillingAdjustmentRequestsOutput"
  /RejectAgreementCancellationRequest:
    post:
      operationId: RejectAgreementCancellationRequest
      description: Allows buyers (acceptors) to reject a cancellation request that is in PENDING_APPROVAL status. Once rejected, the cancellation request transitions to REJECTED status and the agreement remains active. Buyers must provide a reason for the rejection. Only cancellation requests in PENDING_APPROVAL status can be rejected. A ConflictException is thrown if the cancellation request is in any other status.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.RejectAgreementCancellationRequest
            default: AWSMPCommerceService_v20200301.RejectAgreementCancellationRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                agreementId:
                  $ref: "#/components/schemas/AgreementId"
                  description: The unique identifier of the agreement associated with the cancellation request.
                agreementCancellationRequestId:
                  $ref: "#/components/schemas/AgreementCancellationRequestId"
                  description: The unique identifier of the cancellation request to reject.
                rejectionReason:
                  $ref: "#/components/schemas/AgreementCancellationRequestRejectionReason"
                  description: The reason for rejecting the cancellation request (1-2000 characters). This message is visible to the seller.
              required:
                - agreementId
                - agreementCancellationRequestId
                - rejectionReason
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RejectAgreementCancellationRequestOutput"
  /RejectAgreementPaymentRequest:
    post:
      operationId: RejectAgreementPaymentRequest
      description: Allows buyers (acceptors) to reject a payment request that is in PENDING_APPROVAL status. Once rejected, the payment request transitions to REJECTED status and cannot be accepted. Buyers can optionally provide a reason for the rejection. Only payment requests in PENDING_APPROVAL status can be rejected. A ConflictException is thrown if the payment request is in any other status.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.RejectAgreementPaymentRequest
            default: AWSMPCommerceService_v20200301.RejectAgreementPaymentRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                paymentRequestId:
                  $ref: "#/components/schemas/PaymentRequestId"
                  description: The unique identifier of the payment request to reject.
                agreementId:
                  $ref: "#/components/schemas/AgreementId"
                  description: The unique identifier of the agreement associated with the payment request.
                rejectionReason:
                  $ref: "#/components/schemas/PaymentRequestRejectionReason"
                  description: An optional reason for rejecting the payment request (1-250 characters). This message is visible to the seller.
              required:
                - paymentRequestId
                - agreementId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RejectAgreementPaymentRequestOutput"
  /SearchAgreements:
    post:
      operationId: SearchAgreements
      description: "Searches across all agreements that a proposer or an acceptor has in AWS Marketplace. The search returns a list of agreements with basic agreement information. The following filter combinations are supported when the PartyType is Proposer: AgreementType AgreementType + EndTime AgreementType + ResourceType AgreementType + ResourceType + EndTime AgreementType + ResourceType + Status AgreementType + ResourceType + Status + EndTime AgreementType + ResourceIdentifier AgreementType + ResourceIdentifier + EndTime AgreementType + ResourceIdentifier + Status AgreementType + ResourceIdentifier + Status + EndTime AgreementType + AcceptorAccountId AgreementType + AcceptorAccountId + EndTime AgreementType + AcceptorAccountId + Status AgreementType + AcceptorAccountId + Status + EndTime AgreementType + AcceptorAccountId + OfferId AgreementType + AcceptorAccountId + OfferId + Status AgreementType + AcceptorAccountId + OfferId + EndTime AgreementType + AcceptorAccountId + OfferId + Status + EndTime AgreementType + AcceptorAccountId + ResourceIdentifier AgreementType + AcceptorAccountId + ResourceIdentifier + Status AgreementType + AcceptorAccountId + ResourceIdentifier + EndTime AgreementType + AcceptorAccountId + ResourceIdentifier + Status + EndTime AgreementType + AcceptorAccountId + ResourceType AgreementType + AcceptorAccountId + ResourceType + EndTime AgreementType + AcceptorAccountId + ResourceType + Status AgreementType + AcceptorAccountId + ResourceType + Status + EndTime AgreementType + Status AgreementType + Status + EndTime AgreementType + OfferId AgreementType + OfferId + EndTime AgreementType + OfferId + Status AgreementType + OfferId + Status + EndTime AgreementType + OfferSetId AgreementType + OfferSetId + EndTime AgreementType + OfferSetId + Status AgreementType + OfferSetId + Status + EndTime To filter by EndTime, you can use BeforeEndTime and/or AfterEndTime. Only EndTime is supported for sorting. The following filter combinations are supported when the PartyType is Acceptor: AgreementType AgreementType + Status AgreementType + EndTime AgreementType + Status + EndTime AgreementType + ResourceIdentifier AgreementType + ResourceIdentifier + EndTime AgreementType + ResourceIdentifier + Status AgreementType + ResourceIdentifier + Status + EndTime AgreementType + ResourceType AgreementType + ResourceType + EndTime AgreementType + OfferId AgreementType + OfferId + EndTime AgreementType + OfferId + Status AgreementType + OfferId + Status + EndTime AgreementType + OfferSetId AgreementType + OfferSetId + EndTime AgreementType + OfferSetId + Status AgreementType + OfferSetId + Status + EndTime"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.SearchAgreements
            default: AWSMPCommerceService_v20200301.SearchAgreements
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog in which the agreement was created.
                filters:
                  $ref: "#/components/schemas/FilterList"
                  description: "The filter name and value pair used to return a specific list of results. The following filters are supported: ResourceIdentifier – The unique identifier of the resource. ResourceType – Type of the resource, which is the product (AmiProduct, ContainerProduct, SaaSProduct, ProfessionalServicesProduct, or MachineLearningProduct). PartyType – The party type of the caller. Use Proposer or Acceptor. AcceptorAccountId – The AWS account ID of the party accepting the agreement terms. OfferId – The unique identifier of the offer in which the terms are registered in the agreement token. Status – The current status of the agreement. Values include ACTIVE, ARCHIVED, CANCELLED, EXPIRED, RENEWED, REPLACED, and TERMINATED. BeforeEndTime – A date used to filter agreements with a date before the endTime of an agreement. AfterEndTime – A date used to filter agreements with a date after the endTime of an agreement. AgreementType – The type of agreement. Supported value includes PurchaseAgreement. OfferSetId – A unique identifier for the offer set containing this offer. All agreements created from offers in this set include this identifier as context."
                sort:
                  $ref: "#/components/schemas/Sort"
                  description: An object that contains the SortBy and SortOrder attributes. Only EndTime is supported for SearchAgreements. The default sort is EndTime descending.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of agreements to return in the response.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token to specify where to start pagination.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchAgreementsOutput"
  /SendAgreementCancellationRequest:
    post:
      operationId: SendAgreementCancellationRequest
      description: Allows sellers (proposers) to submit a cancellation request for an active agreement. The cancellation request is created in PENDING_APPROVAL status, at which point the buyer can review it.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.SendAgreementCancellationRequest
            default: AWSMPCommerceService_v20200301.SendAgreementCancellationRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                agreementId:
                  $ref: "#/components/schemas/AgreementId"
                  description: The unique identifier of the agreement for which the cancellation request is being submitted.
                reasonCode:
                  $ref: "#/components/schemas/AgreementCancellationRequestReasonCode"
                  description: The reason code for the cancellation request.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                description:
                  $ref: "#/components/schemas/AgreementCancellationRequestDescription"
                  description: An optional detailed description of the cancellation reason (1-2000 characters).
              required:
                - agreementId
                - reasonCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendAgreementCancellationRequestOutput"
  /SendAgreementPaymentRequest:
    post:
      operationId: SendAgreementPaymentRequest
      description: Allows sellers (proposers) to submit a payment request to buyers (acceptors) for a specific charge amount for an agreement that includes a VariablePaymentTerm. The payment request is created in PENDING_APPROVAL status, at which point the buyer can accept or reject it. The agreement must be active and have a VariablePaymentTerm to support payment requests. The chargeAmount must not exceed the remaining available balance under the VariablePaymentTerm maxTotalChargeAmount.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.SendAgreementPaymentRequest
            default: AWSMPCommerceService_v20200301.SendAgreementPaymentRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                agreementId:
                  $ref: "#/components/schemas/AgreementId"
                  description: The unique identifier of the agreement for which the payment request is being submitted. Use GetAgreementTerms to retrieve agreement term details.
                termId:
                  $ref: "#/components/schemas/TermId"
                  description: The unique identifier of the VariablePaymentTerm for the agreement that the payment request is being sent for.
                name:
                  $ref: "#/components/schemas/PaymentRequestName"
                  description: A descriptive name for the payment request (5-64 characters).
                chargeAmount:
                  $ref: "#/components/schemas/PositiveAmountUpto8Decimals"
                  description: The amount requested to be charged to the buyer, positive decimal value in the currency of the accepted term. A ValidationException is returned if the chargeAmount exceeds the available balance, if the agreement doesn't have an active VariablePaymentTerm, or if the termId is invalid.
                description:
                  $ref: "#/components/schemas/PaymentRequestDescription"
                  description: An optional detailed description of the payment request (1-2000 characters).
              required:
                - agreementId
                - termId
                - name
                - chargeAmount
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendAgreementPaymentRequestOutput"
  /UpdatePurchaseOrders:
    post:
      operationId: UpdatePurchaseOrders
      description: Allows acceptors to associate purchase orders with agreement charges after an agreement is created.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPCommerceService_v20200301.UpdatePurchaseOrders
            default: AWSMPCommerceService_v20200301.UpdatePurchaseOrders
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                purchaseOrders:
                  $ref: "#/components/schemas/PurchaseOrders"
                  description: Contains information about purchase order associations.
              required:
                - purchaseOrders
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePurchaseOrdersOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AgreementId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z0-9_/-]+"
    AgreementCancellationRequestId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: acr-[a-zA-Z0-9]+
    AcceptAgreementCancellationRequestOutput:
      type: object
      properties:
        agreementId:
          $ref: "#/components/schemas/AgreementId"
          description: The unique identifier of the agreement associated with this cancellation request.
        agreementCancellationRequestId:
          $ref: "#/components/schemas/AgreementCancellationRequestId"
          description: The unique identifier of the accepted cancellation request.
        status:
          $ref: "#/components/schemas/AgreementCancellationRequestStatus"
          description: The updated status of the cancellation request, which is APPROVED.
        reasonCode:
          $ref: "#/components/schemas/AgreementCancellationRequestReasonCode"
          description: The original reason code provided when the cancellation request was created.
        description:
          $ref: "#/components/schemas/AgreementCancellationRequestDescription"
          description: The detailed description of the cancellation reason, if provided.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the cancellation request was originally created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the cancellation request was accepted.
    AgreementCancellationRequestStatus:
      type: string
      enum:
        - PENDING_APPROVAL
        - APPROVED
        - REJECTED
        - CANCELLED
        - VALIDATION_FAILED
    AgreementCancellationRequestReasonCode:
      type: string
      enum:
        - INCORRECT_TERMS_ACCEPTED
        - REPLACING_AGREEMENT
        - TEST_AGREEMENT
        - ALTERNATIVE_PROCUREMENT_CHANNEL
        - PRODUCT_DISCONTINUED
        - UNINTENDED_RENEWAL
        - BUYER_DISSATISFACTION
        - OTHER
    AgreementCancellationRequestDescription:
      type: string
      minLength: 1
      maxLength: 2000
    Timestamp:
      type: string
      format: date-time
    PaymentRequestId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: pr-[a-zA-Z0-9]+
    PurchaseOrderReference:
      type: string
      minLength: 1
    AcceptAgreementPaymentRequestOutput:
      type: object
      properties:
        paymentRequestId:
          $ref: "#/components/schemas/PaymentRequestId"
          description: The unique identifier of the accepted payment request.
        agreementId:
          $ref: "#/components/schemas/AgreementId"
          description: The unique identifier of the agreement associated with this payment request.
        status:
          $ref: "#/components/schemas/PaymentRequestStatus"
          description: The updated status of the payment request, which is APPROVED.
        name:
          $ref: "#/components/schemas/PaymentRequestName"
          description: The descriptive name of the payment request.
        description:
          $ref: "#/components/schemas/PaymentRequestDescription"
          description: The detailed description of the payment request, if provided.
        chargeAmount:
          $ref: "#/components/schemas/PositiveAmountUpto8Decimals"
          description: The amount that was approved to be charged.
        currencyCode:
          $ref: "#/components/schemas/CurrencyCode"
          description: The currency code for the charge amount.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the payment request was originally created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the payment request was accepted.
    PaymentRequestStatus:
      type: string
      enum:
        - VALIDATING
        - VALIDATION_FAILED
        - PENDING_APPROVAL
        - APPROVED
        - REJECTED
        - CANCELLED
    PaymentRequestName:
      type: string
      minLength: 5
      maxLength: 64
      pattern: .+
    PaymentRequestDescription:
      type: string
      minLength: 1
      maxLength: 2000
    PositiveAmountUpto8Decimals:
      type: string
      pattern: "[0-9]*(\\.[0-9]{0,8})?"
    CurrencyCode:
      type: string
      minLength: 3
      maxLength: 3
      pattern: "[A-Z]+"
    AgreementRequestId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ar-[A-Za-z0-9]+
    PurchaseOrders:
      type: array
      items:
        $ref: "#/components/schemas/PurchaseOrder"
    PurchaseOrder:
      description: Contains information about a purchase order association to a charge within an agreement.
      type: object
      properties:
        chargeId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier of the charge to associate the purchase order with.
        chargeRevision:
          $ref: "#/components/schemas/ChargeRevision"
          description: The revision of the charge.
        agreementId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier of the agreement associated with this charge.
        purchaseOrderReference:
          $ref: "#/components/schemas/PurchaseOrderReference"
          description: The purchase order reference to associate with the charge.
      required:
        - chargeId
    ResourceId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z0-9_/-]+"
    ChargeRevision:
      type: integer
      format: int64
      minimum: 1
    AcceptAgreementRequestOutput:
      type: object
      properties:
        agreementId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier of the agreement created or modified by accepting the agreement request.
    BatchCreateBillingAdjustmentRequestEntryList:
      type: array
      items:
        $ref: "#/components/schemas/BatchCreateBillingAdjustmentRequestEntry"
    BatchCreateBillingAdjustmentRequestEntry:
      description: An individual entry in a batch billing adjustment request, specifying the invoice and adjustment details.
      type: object
      properties:
        agreementId:
          $ref: "#/components/schemas/AgreementId"
          description: The unique identifier of the agreement associated with the invoice.
        originalInvoiceId:
          $ref: "#/components/schemas/InvoiceId"
          description: The identifier of the original invoice to adjust.
        adjustmentAmount:
          $ref: "#/components/schemas/PositiveAmountUpto8Decimals"
          description: The adjustment amount as a string representation of a decimal number in the currency of the invoice.
        currencyCode:
          $ref: "#/components/schemas/CurrencyCode"
          description: The 3-letter ISO 4217 currency code for the adjustment amount. Must match the currency code of the offer associated with the agreement (e.g., USD).
        adjustmentReasonCode:
          $ref: "#/components/schemas/BillingAdjustmentReasonCode"
          description: The reason code for the billing adjustment.
        description:
          $ref: "#/components/schemas/BillingAdjustmentDescription"
          description: An optional detailed description of the adjustment reason.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
      required:
        - agreementId
        - originalInvoiceId
        - adjustmentAmount
        - currencyCode
        - adjustmentReasonCode
        - clientToken
    InvoiceId:
      type: string
      minLength: 1
      maxLength: 255
    BillingAdjustmentReasonCode:
      type: string
      enum:
        - INCORRECT_TERMS_ACCEPTED
        - INCORRECT_METERING
        - TEST_ENVIRONMENT_CHARGES
        - ALTERNATIVE_PROCUREMENT_CHANNEL
        - UNINTENDED_RENEWAL
        - BUYER_DISSATISFACTION
        - OTHER
    BillingAdjustmentDescription:
      type: string
      minLength: 1
      maxLength: 500
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9-]+"
    BatchCreateBillingAdjustmentRequestOutput:
      type: object
      properties:
        items_:
          $ref: "#/components/schemas/BatchCreateBillingAdjustmentItemList"
          description: A list of successfully created billing adjustment items, each containing the billingAdjustmentRequestId and clientToken.
        errors:
          $ref: "#/components/schemas/BatchCreateBillingAdjustmentErrorList"
          description: A list of errors for entries that failed validation, each containing the clientToken, error code, and message.
      required:
        - items_
        - errors
    BatchCreateBillingAdjustmentItemList:
      type: array
      items:
        $ref: "#/components/schemas/BatchCreateBillingAdjustmentItem"
    BatchCreateBillingAdjustmentItem:
      description: A successfully created billing adjustment request item.
      type: object
      properties:
        billingAdjustmentRequestId:
          $ref: "#/components/schemas/BillingAdjustmentRequestId"
          description: The unique identifier of the created billing adjustment request.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: The client token provided in the corresponding request entry.
      required:
        - billingAdjustmentRequestId
        - clientToken
    BillingAdjustmentRequestId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ba-[a-zA-Z0-9]+
    BatchCreateBillingAdjustmentErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchCreateBillingAdjustmentError"
    BatchCreateBillingAdjustmentError:
      description: An error for a billing adjustment request entry that failed validation.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/BillingAdjustmentErrorCode"
          description: The error code indicating the reason for failure.
        message:
          $ref: "#/components/schemas/String"
          description: A human-readable message describing the error.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: The client token of the request entry that failed.
      required:
        - code
        - message
        - clientToken
    BillingAdjustmentErrorCode:
      type: string
      enum:
        - CONFLICT_EXCEPTION
        - VALIDATION_EXCEPTION
        - RESOURCE_NOT_FOUND_EXCEPTION
        - INTERNAL_FAILURE
    String:
      type: string
    CancelAgreementOutput:
      type: object
    AgreementCancellationRequestCancellationReason:
      type: string
      minLength: 1
      maxLength: 2000
    CancelAgreementCancellationRequestOutput:
      type: object
      properties:
        agreementCancellationRequestId:
          $ref: "#/components/schemas/AgreementCancellationRequestId"
          description: The unique identifier of the cancelled cancellation request.
        agreementId:
          $ref: "#/components/schemas/AgreementId"
          description: The unique identifier of the agreement associated with this cancellation request.
        reasonCode:
          $ref: "#/components/schemas/AgreementCancellationRequestReasonCode"
          description: The original reason code provided when the cancellation request was created.
        description:
          $ref: "#/components/schemas/AgreementCancellationRequestDescription"
          description: The detailed description of the original cancellation reason, if provided.
        status:
          $ref: "#/components/schemas/AgreementCancellationRequestStatus"
          description: The updated status of the cancellation request, which is CANCELLED.
        statusMessage:
          $ref: "#/components/schemas/AgreementCancellationRequestStatusMessage"
          description: A message providing additional context about the cancellation request status.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the cancellation request was originally created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the cancellation request was cancelled.
    AgreementCancellationRequestStatusMessage:
      type: string
      minLength: 1
      maxLength: 2000
    CancelAgreementPaymentRequestOutput:
      type: object
      properties:
        paymentRequestId:
          $ref: "#/components/schemas/PaymentRequestId"
          description: The unique identifier of the cancelled payment request.
        agreementId:
          $ref: "#/components/schemas/AgreementId"
          description: The unique identifier of the agreement associated with this payment request.
        status:
          $ref: "#/components/schemas/PaymentRequestStatus"
          description: The updated status of the payment request, which is CANCELLED.
        name:
          $ref: "#/components/schemas/PaymentRequestName"
          description: The descriptive name of the payment request.
        description:
          $ref: "#/components/schemas/PaymentRequestDescription"
          description: The detailed description of the payment request, if provided.
        chargeAmount:
          $ref: "#/components/schemas/PositiveAmountUpto8Decimals"
          description: The amount that was requested to be charged.
        currencyCode:
          $ref: "#/components/schemas/CurrencyCode"
          description: The currency code for the charge amount.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the payment request was originally created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the payment request was cancelled.
    Intent:
      type: string
      enum:
        - NEW
        - AMEND
        - REPLACE
    RequestedTermList:
      type: array
      items:
        $ref: "#/components/schemas/RequestedTerm"
    RequestedTerm:
      description: Defines what is being accepted as part of the agreement creation or update request, and it includes their configurations.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/TermId"
          description: The unique identifier of the term in the agreement proposal.
        configuration:
          $ref: "#/components/schemas/RequestedTermConfiguration"
          description: Additional configuration for the requested terms. This configuration is applicable only to the terms that accept a customer-provided configuration, such as ConfigurableUpfrontPricingTerm.
      required:
        - id
    TermId:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[A-Za-z0-9+=;,.@\\-_]+"
    RequestedTermConfiguration:
      description: A tagged union that represents the term configuration provided by the acceptor. Only one configuration is accepted per term.
      type: object
      properties:
        configurableUpfrontPricingTermConfiguration:
          $ref: "#/components/schemas/ConfigurableUpfrontPricingTermConfiguration"
        renewalTermConfiguration:
          $ref: "#/components/schemas/RenewalTermConfiguration"
        variablePaymentTermConfiguration:
          $ref: "#/components/schemas/VariablePaymentTermConfiguration"
    ConfigurableUpfrontPricingTermConfiguration:
      description: Defines a prepaid payment model that allows buyers to configure the entitlements they want to purchase and the duration.
      type: object
      properties:
        selectorValue:
          $ref: "#/components/schemas/BoundedString"
          description: Defines the length of time for which the particular pricing/dimension is being purchased by the acceptor.
        dimensions:
          $ref: "#/components/schemas/DimensionList"
          description: Defines the dimensions that the acceptor has purchased from the overall set of dimensions presented in the rate card.
      required:
        - selectorValue
        - dimensions
    BoundedString:
      type: string
      minLength: 1
      maxLength: 4096
      pattern: (.)+
    DimensionList:
      type: array
      items:
        $ref: "#/components/schemas/Dimension"
    Dimension:
      description: Defines the dimensions that the acceptor has purchased from the overall set of dimensions presented in the rate card.
      type: object
      properties:
        dimensionKey:
          $ref: "#/components/schemas/BoundedString"
          description: The name of key value of the dimension.
        dimensionValue:
          $ref: "#/components/schemas/ZeroValueInteger"
          description: The number of units of the dimension the acceptor has purchased. For Agreements with ConfigurableUpfrontPricingTerm, the RateCard section will define the prices and dimensions defined by the seller (proposer), whereas the Configuration section will define the actual dimensions, prices, and units the buyer has chosen to accept.
      required:
        - dimensionKey
        - dimensionValue
    ZeroValueInteger:
      type: integer
      minimum: 0
    RenewalTermConfiguration:
      description: Additional parameters specified by the acceptor while accepting the term.
      type: object
      properties:
        enableAutoRenew:
          $ref: "#/components/schemas/Boolean"
          description: Defines whether the acceptor has chosen to auto-renew the agreement at the end of its lifecycle. Can be set to True or False.
      required:
        - enableAutoRenew
    Boolean:
      type: boolean
    VariablePaymentTermConfiguration:
      description: Additional parameters specified by the acceptor while accepting the variable payment term.
      type: object
      properties:
        paymentRequestApprovalStrategy:
          $ref: "#/components/schemas/PaymentRequestApprovalStrategy"
          description: Defines the strategy for approving payment requests. Values include AUTO_APPROVE_ON_EXPIRATION and WAIT_FOR_APPROVAL
        expirationDuration:
          $ref: "#/components/schemas/ISO8601Duration"
          description: Defines the duration after which a payment request is automatically approved if no further action is taken. This only applies when the payment request approval strategy is set to AUTO_APPROVE_ON_EXPIRATION. The duration is represented in the ISO_8601 format (e.g., P10D for 10 days).
      required:
        - paymentRequestApprovalStrategy
    PaymentRequestApprovalStrategy:
      type: string
      enum:
        - AUTO_APPROVE_ON_EXPIRATION
        - WAIT_FOR_APPROVAL
    ISO8601Duration:
      type: string
      pattern: ([-+]?)P(?:([-+]?[0-9]+)D)?(T(?:([-+]?[0-9]+)H)?(?:([-+]?[0-9]+)M)?(?:([-+]?[0-9]+)(?:[.,]([0-9]{0,9}))?S)?)?
    AgreementProposalId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: (at-|ap-)[A-Za-z0-9]+
    TaxConfiguration:
      description: Configuration controls for tax estimation in the agreement request.
      type: object
      properties:
        taxEstimation:
          $ref: "#/components/schemas/TaxEstimation"
          description: Toggle to estimate tax as part of the response. Values include ENABLED and DISABLED. Default is DISABLED.
    TaxEstimation:
      type: string
      enum:
        - DISABLED
        - ENABLED
    CreateAgreementRequestOutput:
      type: object
      properties:
        agreementRequestId:
          $ref: "#/components/schemas/AgreementRequestId"
          description: The unique identifier of the agreement request created. Use this identifier with AcceptAgreementRequest to accept the agreement.
        chargeSummary:
          $ref: "#/components/schemas/ChargeSummary"
          description: Provides details of the charges associated with the agreement request. This is only applicable when a request is created for PurchaseAgreement.
    ChargeSummary:
      description: "The ChargeSummary provides a detailed breakdown of charges that are associated with an agreement request. This is applicable only when a request is created for a PurchaseAgreement. Tax and invoicing fields (such as estimatedTaxes, amountAfterTax, newAgreementValueAfterTax, and invoicingEntity) are returned on a best-effort basis and do not cause the request to fail if unavailable. A null tax amount can have two meanings: Tax estimation was unavailable at the time of the request. The charge timing is BILLING_PERIOD, so the charge amount is not determined at request time. In this case, the tax breakdown may still include the tax rate and type."
      type: object
      properties:
        currencyCode:
          $ref: "#/components/schemas/CurrencyCode"
          description: The three-letter currency code for all charges (e.g., USD).
        newAgreementValue:
          $ref: "#/components/schemas/BoundedString"
          description: The total value of the agreement, which includes any amendments.
        newAgreementValueAfterTax:
          $ref: "#/components/schemas/BoundedString"
          description: Expected new agreement value after estimated taxes are applied.
        expectedCharges:
          $ref: "#/components/schemas/ExpectedChargeList"
          description: A list of expected charges for the agreement request.
        estimatedTaxes:
          $ref: "#/components/schemas/EstimatedTaxes"
          description: Provides an aggregated view of estimated tax information for the agreement.
        itemizedCharges:
          $ref: "#/components/schemas/ItemizedChargeList"
          description: An itemized list of charges for the agreement request.
        invoicingEntity:
          $ref: "#/components/schemas/InvoicingEntity"
          description: The entity responsible for issuing the invoice.
    ExpectedChargeList:
      type: array
      items:
        $ref: "#/components/schemas/ExpectedCharge"
    ExpectedCharge:
      description: Estimated charge for the request.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
          description: Unique identifier of the charge for a given agreement.
        time:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the charge is due to be invoiced. This is available only when the charge date is known.
        amount:
          $ref: "#/components/schemas/BoundedString"
          description: The tax-exclusive amount of the charge. Only available when the charge amount is known.
        amountAfterTax:
          $ref: "#/components/schemas/BoundedString"
          description: The tax-inclusive amount the acceptor has to pay. The amount is only present for fixed charges.
        timing:
          $ref: "#/components/schemas/Timing"
          description: Indicates when the charge amount will be incurred. Values include ON_ACCEPTANCE (charged immediately when the agreement request is accepted), BILLING_PERIOD (charged on each billing period), and SCHEDULED (charged at a predetermined future date).
        estimatedTaxes:
          $ref: "#/components/schemas/EstimatedTaxes"
          description: Provides an aggregated view of estimated tax information for this specific charge.
    Timing:
      type: string
      enum:
        - ON_ACCEPTANCE
        - SCHEDULED
        - BILLING_PERIOD
    EstimatedTaxes:
      description: Provides an aggregated view of estimated tax information.
      type: object
      properties:
        breakdown:
          $ref: "#/components/schemas/TaxBreakdown"
          description: A list of tax breakdown information.
        totalAmount:
          $ref: "#/components/schemas/BoundedString"
          description: The total amount of tax aggregated from the tax breakdown.
    TaxBreakdown:
      type: array
      items:
        $ref: "#/components/schemas/TaxBreakdownItem"
    TaxBreakdownItem:
      description: Represents a single tax breakdown entry with amount, rate, and type.
      type: object
      properties:
        amount:
          $ref: "#/components/schemas/BoundedString"
          description: The estimated tax amount.
        rate:
          $ref: "#/components/schemas/BoundedString"
          description: The tax rate, in decimals.
        type_:
          $ref: "#/components/schemas/BoundedString"
          description: The type of tax (for example, VAT, ST, or GST).
    ItemizedChargeList:
      type: array
      items:
        $ref: "#/components/schemas/ItemizedCharge"
    ItemizedCharge:
      description: A breakdown of individual charges or line items within a billing or pricing context.
      type: object
      properties:
        dimensionKey:
          $ref: "#/components/schemas/BoundedString"
          description: The dimension key as specified in the accepted term.
        newQuantity:
          $ref: "#/components/schemas/Integer"
          description: The requested quantity for this dimension.
        oldQuantity:
          $ref: "#/components/schemas/Integer"
          description: The existing quantity for this dimension from the source agreement. This value is 0 for NEW intent.
        chargeReference:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier of the expected charge that this itemized charge contributes to.
        incrementalChargeAmount:
          $ref: "#/components/schemas/BoundedString"
          description: The total incremental charge amount for this dimension.
    Integer:
      type: integer
    InvoicingEntity:
      description: The entity responsible for issuing the invoice.
      type: object
      properties:
        legalName:
          $ref: "#/components/schemas/BoundedString"
          description: Legal name of the entity issuing the invoice.
        branchName:
          $ref: "#/components/schemas/BoundedString"
          description: The branch where the issuing entity is operating from.
    DescribeAgreementOutput:
      type: object
      properties:
        agreementId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier of the agreement.
        acceptor:
          $ref: "#/components/schemas/Acceptor"
          description: The details of the party accepting the agreement terms. This is commonly the buyer for PurchaseAgreement.
        proposer:
          $ref: "#/components/schemas/Proposer"
          description: The details of the party proposing the agreement terms. This is commonly the seller for PurchaseAgreement.
        startTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the agreement starts.
        endTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the agreement ends. The field is null for pay-as-you-go agreements, which don’t have end dates.
        acceptanceTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time the offer was accepted or the agreement was created. AcceptanceTime and StartTime can differ for future dated agreements (FDAs).
        agreementType:
          $ref: "#/components/schemas/AgreementType"
          description: The type of agreement. Values are PurchaseAgreement or VendorInsightsAgreement.
        estimatedCharges:
          $ref: "#/components/schemas/EstimatedCharges"
          description: The estimated cost of the agreement.
        proposalSummary:
          $ref: "#/components/schemas/ProposalSummary"
          description: A summary of the proposal received from the proposer.
        status:
          $ref: "#/components/schemas/AgreementStatus"
          description: "The current status of the agreement. Statuses include: ACTIVE – The terms of the agreement are active. ARCHIVED – The agreement ended without a specified reason. CANCELLED – The acceptor ended the agreement before the defined end date. EXPIRED – The agreement ended on the defined end date. RENEWED – The agreement was renewed into a new agreement (for example, an auto-renewal). REPLACED – The agreement was replaced using an agreement replacement offer. TERMINATED – The agreement ended before the defined end date because of an AWS termination (for example, a payment failure)."
    Acceptor:
      description: The details of the party accepting the agreement terms. This is commonly the buyer for PurchaseAgreement.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/AWSAccountId"
          description: The AWS account ID of the acceptor.
    AWSAccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[0-9]+"
    Proposer:
      description: Details of the party proposing the agreement terms,. This is commonly the seller for PurchaseAgreement.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/AWSAccountId"
          description: The AWS account ID of the proposer.
    AgreementType:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z]+"
    EstimatedCharges:
      description: Estimated cost of the agreement.
      type: object
      properties:
        currencyCode:
          $ref: "#/components/schemas/CurrencyCode"
          description: Defines the currency code for the charge.
        agreementValue:
          $ref: "#/components/schemas/BoundedString"
          description: The total known amount customer has to pay across the lifecycle of the agreement. This is the total contract value if accepted terms contain ConfigurableUpfrontPricingTerm or FixedUpfrontPricingTerm. In the case of pure contract pricing, this will be the total value of the contract. In the case of contracts with consumption pricing, this will only include the committed value and not include any overages that occur. If the accepted terms contain PaymentScheduleTerm, it will be the total payment schedule amount. This occurs when flexible payment schedule is used, and is the sum of all invoice charges in the payment schedule. In case a customer has amended an agreement, by purchasing more units of any dimension, this will include both the original cost as well as the added cost incurred due to addition of new units. This is 0 if the accepted terms contain UsageBasedPricingTerm without ConfigurableUpfrontPricingTerm or RecurringPaymentTerm. This occurs for usage-based pricing (such as SaaS metered or AMI/container hourly or monthly), because the exact usage is not known upfront.
    ProposalSummary:
      description: A summary of the proposal received from the proposer.
      type: object
      properties:
        resources:
          $ref: "#/components/schemas/Resources"
          description: The list of resources involved in the agreement.
        offerId:
          $ref: "#/components/schemas/OfferId"
          description: The unique identifier of the offer in AWS Marketplace.
        offerSetId:
          $ref: "#/components/schemas/OfferSetId"
          description: A unique identifier for the offer set containing this offer. All agreements created from offers in this set include this identifier as context.
    Resources:
      type: array
      items:
        $ref: "#/components/schemas/Resource"
    Resource:
      description: The list of resources involved in the agreement.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier of the resource. We mention the term resource, which is most commonly a product, so a resourceId is also a productId.
        type_:
          $ref: "#/components/schemas/AgreementResourceType"
          description: Type of the resource, which is the product (for example, SaaSProduct, AmiProduct, ContainerProduct).
    AgreementResourceType:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z]+"
    OfferId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: \S{1,64}
    OfferSetId:
      type: string
      pattern: \S{1,50}
    AgreementStatus:
      type: string
      enum:
        - ACTIVE
        - ARCHIVED
        - CANCELLED
        - EXPIRED
        - RENEWED
        - REPLACED
        - ROLLED_BACK
        - SUPERSEDED
        - TERMINATED
    GetAgreementCancellationRequestOutput:
      type: object
      properties:
        agreementCancellationRequestId:
          $ref: "#/components/schemas/AgreementCancellationRequestId"
          description: The unique identifier of the cancellation request.
        agreementId:
          $ref: "#/components/schemas/AgreementId"
          description: The unique identifier of the agreement associated with this cancellation request. Use DescribeAgreement to retrieve full agreement details.
        reasonCode:
          $ref: "#/components/schemas/AgreementCancellationRequestReasonCode"
          description: The reason code provided for the cancellation.
        description:
          $ref: "#/components/schemas/AgreementCancellationRequestDescription"
          description: The detailed description of the cancellation reason, if provided.
        status:
          $ref: "#/components/schemas/AgreementCancellationRequestStatus"
          description: The current status of the cancellation request.
        statusMessage:
          $ref: "#/components/schemas/AgreementCancellationRequestStatusMessage"
          description: A message providing additional context about the cancellation request status.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the cancellation request was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the cancellation request was last updated.
    MaxResults:
      type: integer
      minimum: 1
      maximum: 50
    NextToken:
      type: string
      minLength: 0
      maxLength: 8192
      pattern: "[a-zA-Z0-9+/=_-]+"
    GetAgreementEntitlementsOutput:
      type: object
      properties:
        agreementEntitlements:
          $ref: "#/components/schemas/AgreementEntitlementList"
          description: A list of agreement entitlements which are part of the latest agreement.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token used for pagination. The field is null if there are no more results.
    AgreementEntitlementList:
      type: array
      items:
        $ref: "#/components/schemas/AgreementEntitlement"
    AgreementEntitlement:
      description: Represents an entitlement associated with an agreement, including the provisioning status, resource, and type.
      type: object
      properties:
        resource:
          $ref: "#/components/schemas/Resource"
          description: The resource that the entitlement is provisioned to, such as a product.
        type_:
          $ref: "#/components/schemas/EntitlementType"
          description: The type of entitlement.
        registrationToken:
          $ref: "#/components/schemas/RegistrationToken"
          description: A short-lived token required by acceptors to register their account with the product provider. The token is only valid for 30 minutes after creation and is only applicable for purchase agreements.
        status:
          $ref: "#/components/schemas/AgreementEntitlementStatus"
          description: The current state of an entitlement.
        statusReasonCode:
          $ref: "#/components/schemas/AgreementEntitlementStatusReasonCode"
          description: Provides more information about the status of an entitlement.
        licenseArn:
          $ref: "#/components/schemas/AwsArn"
          description: The Amazon Resource Name (ARN) of the AWS License Manager license associated with the entitlement.
    EntitlementType:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z:]+"
    RegistrationToken:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[A-Za-z0-9+/=.:_-]+"
    AgreementEntitlementStatus:
      type: string
      enum:
        - PROVISIONED
        - SCHEDULED
        - PENDING
        - FAILED
        - DEPROVISIONED
    AgreementEntitlementStatusReasonCode:
      type: string
      enum:
        - PROVISIONING_IN_PROGRESS
        - FUTURE_START_DATE
        - INVALID_PAYMENT_INSTRUMENT
        - INCOMPATIBLE_CURRENCY
        - ACCOUNT_SUSPENDED
        - UNSUPPORTED_OPERATION
        - AGREEMENT_INACTIVE
        - AGREEMENT_ACTIVE
        - PRODUCT_RESTRICTED
    AwsArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws[a-zA-Z-]*:[A-Za-z0-9][A-Za-z0-9_/.-]{0,62}:[A-Za-z0-9_/.-]{0,63}:[A-Za-z0-9_/.-]{0,63}:[A-Za-z0-9][A-Za-z0-9:_/+=,@.-]{0,1023}
    GetAgreementPaymentRequestOutput:
      type: object
      properties:
        paymentRequestId:
          $ref: "#/components/schemas/PaymentRequestId"
          description: The unique identifier of the payment request.
        agreementId:
          $ref: "#/components/schemas/AgreementId"
          description: The unique identifier of the agreement associated with this payment request. Use DescribeAgreement to retrieve full agreement details.
        status:
          $ref: "#/components/schemas/PaymentRequestStatus"
          description: "The current status of the payment request. Possible values include: VALIDATING – The payment request is being validated against agreement terms. VALIDATION_FAILED – The payment request failed validation. PENDING_APPROVAL – The payment request is awaiting buyer action. APPROVED – The buyer has approved the payment request. REJECTED – The buyer has rejected the payment request. CANCELLED – The seller has cancelled the payment request."
        statusMessage:
          $ref: "#/components/schemas/PaymentRequestStatusMessage"
          description: An optional message providing additional context about the payment request status, such as a rejection reason or validation failure details.
        name:
          $ref: "#/components/schemas/PaymentRequestName"
          description: The descriptive name of the payment request.
        description:
          $ref: "#/components/schemas/PaymentRequestDescription"
          description: The detailed description of the payment request, if provided.
        chargeId:
          $ref: "#/components/schemas/ChargeId"
          description: The unique identifier of the charge created after the payment request is approved. This field is only present for approved payment requests and follows the pattern ch-[a-zA-Z0-9]+.
        chargeAmount:
          $ref: "#/components/schemas/PositiveAmountUpto8Decimals"
          description: The amount charged or to be charged to the buyer.
        currencyCode:
          $ref: "#/components/schemas/CurrencyCode"
          description: The currency code for the charge amount.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the payment request was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the payment request was last updated.
    PaymentRequestStatusMessage:
      type: string
    ChargeId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ch-[a-zA-Z0-9]+
    GetAgreementTermsOutput:
      type: object
      properties:
        acceptedTerms:
          $ref: "#/components/schemas/AcceptedTermList"
          description: A subset of terms proposed by the proposer that have been accepted by the acceptor as part of the agreement creation.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token used for pagination. The field is null if there are no more results.
    AcceptedTermList:
      type: array
      items:
        $ref: "#/components/schemas/AcceptedTerm"
    AcceptedTerm:
      description: A subset of terms proposed by the proposer, which have been accepted by the acceptor as part of agreement creation.
      type: object
      properties:
        legalTerm:
          $ref: "#/components/schemas/LegalTerm"
          description: Defines the list of text agreements proposed to the acceptors. An example is the end user license agreement (EULA).
        supportTerm:
          $ref: "#/components/schemas/SupportTerm"
          description: Defines the customer support available for the acceptors when they purchase the software.
        renewalTerm:
          $ref: "#/components/schemas/RenewalTerm"
          description: Defines that on graceful expiration of the agreement (when the agreement ends on its pre-defined end date), a new agreement will be created using the accepted terms on the existing agreement. In other words, the agreement will be renewed. Presence of RenewalTerm in the offer document means that auto-renewal is allowed. Buyers will have the option to accept or decline auto-renewal at the offer acceptance/agreement creation. Buyers can also change this flag from True to False or False to True at anytime during the agreement's lifecycle.
        usageBasedPricingTerm:
          $ref: "#/components/schemas/UsageBasedPricingTerm"
          description: Defines a usage-based pricing model (typically, pay-as-you-go pricing), where the customers are charged based on product usage.
        configurableUpfrontPricingTerm:
          $ref: "#/components/schemas/ConfigurableUpfrontPricingTerm"
          description: Defines a prepaid payment model that allows buyers to configure the entitlements they want to purchase and the duration.
        byolPricingTerm:
          $ref: "#/components/schemas/ByolPricingTerm"
          description: Enables you and your customers to move your existing agreements to AWS Marketplace. The customer won't be charged for product usage in AWS Marketplace because they already paid for the product outside of AWS Marketplace.
        recurringPaymentTerm:
          $ref: "#/components/schemas/RecurringPaymentTerm"
          description: Defines a pricing model where customers are charged a fixed recurring price at the end of each billing period.
        validityTerm:
          $ref: "#/components/schemas/ValidityTerm"
          description: Defines the conditions that will keep an agreement created from this offer valid.
        paymentScheduleTerm:
          $ref: "#/components/schemas/PaymentScheduleTerm"
          description: Defines an installment-based pricing model where customers are charged a fixed price on different dates during the agreement validity period. This is used most commonly for flexible payment schedule pricing.
        freeTrialPricingTerm:
          $ref: "#/components/schemas/FreeTrialPricingTerm"
          description: Defines a short-term free pricing model where the buyers aren’t charged anything within a specified limit.
        fixedUpfrontPricingTerm:
          $ref: "#/components/schemas/FixedUpfrontPricingTerm"
          description: Defines a pre-paid pricing model where the customers are charged a fixed upfront amount.
        variablePaymentTerm:
          $ref: "#/components/schemas/VariablePaymentTerm"
          description: Defines a payment model where sellers can submit variable payment requests up to a maximum charge amount, with configurable approval strategies and expiration timelines.
    LegalTerm:
      description: Defines the list of text agreements proposed to the acceptors. An example is the end user license agreement (EULA).
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/UnversionedTermType"
          description: Category of the term being updated.
        id:
          $ref: "#/components/schemas/TermId"
          description: The unique identifer for the term.
        documents:
          $ref: "#/components/schemas/DocumentList"
          description: List of references to legal resources proposed to the buyers. An example is the EULA.
    UnversionedTermType:
      type: string
      minLength: 1
      maxLength: 4096
      pattern: "[A-Za-z]+"
    DocumentList:
      type: array
      items:
        $ref: "#/components/schemas/DocumentItem"
    DocumentItem:
      description: Includes the list of references to legal resources proposed by the proposer to the acceptor. Each DocumentItem refers to an individual reference.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/BoundedString"
          description: "Category of the document. Document types include: CustomEula – A custom EULA provided by you as seller. A URL for a EULA stored in an accessible Amazon S3 bucket is required for this document type. CustomDsa – A custom Data Subscription Agreement (DSA) provided by you as seller. A URL for a DSA stored in an accessible Amazon S3 bucket is required for this document type. StandardEula – The Standard Contract for AWS Marketplace (SCMP). For more information about SCMP, see the AWS Marketplace Seller Guide. You don’t provide a URL for this type because it’s managed by AWS Marketplace. StandardDsa – DSA for AWS Marketplace. For more information about the DSA, see the AWS Data Exchange User Guide. You don’t provide a URL for this type because it’s managed by AWS Marketplace."
        url:
          $ref: "#/components/schemas/BoundedString"
          description: A URL to the legal document for buyers to read. Required when Type is CustomEula.
        version:
          $ref: "#/components/schemas/BoundedString"
          description: Version of standard contracts provided by AWS Marketplace. Required when Type is StandardEula or StandardDsa.
    SupportTerm:
      description: Defines the customer support available for the acceptors when they purchase the software.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/UnversionedTermType"
          description: Category of the term being updated.
        id:
          $ref: "#/components/schemas/TermId"
          description: The unique identifier for the term.
        refundPolicy:
          $ref: "#/components/schemas/BoundedString"
          description: Free-text field about the refund policy description that will be shown to customers as is on the website and console.
    RenewalTerm:
      description: Defines that on graceful expiration of the agreement (when the agreement ends on its pre-defined end date), a new agreement will be created using the accepted terms on the existing agreement. In other words, the agreement will be renewed. The presence of RenewalTerm in the offer document means that auto-renewal is allowed. Buyers will have the option to accept or decline auto-renewal at the offer acceptance/agreement creation. Buyers can also change this flag from True to False or False to True at anytime during the agreement's lifecycle.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/UnversionedTermType"
          description: Category of the term being updated.
        id:
          $ref: "#/components/schemas/TermId"
          description: The unique identifier for the term.
        configuration:
          $ref: "#/components/schemas/RenewalTermConfiguration"
          description: Additional parameters specified by the acceptor while accepting the term.
    UsageBasedPricingTerm:
      description: Defines a usage-based pricing model (typically, pay-as-you-go pricing), where the customers are charged based on product usage.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/UnversionedTermType"
          description: Category of the term.
        id:
          $ref: "#/components/schemas/TermId"
          description: The unique identifier for the term.
        currencyCode:
          $ref: "#/components/schemas/CurrencyCode"
          description: Defines the currency for the prices mentioned in the term.
        rateCards:
          $ref: "#/components/schemas/UsageBasedRateCardList"
          description: List of rate cards.
    UsageBasedRateCardList:
      type: array
      items:
        $ref: "#/components/schemas/UsageBasedRateCardItem"
    UsageBasedRateCardItem:
      description: Within the pay-as-you-go model defined under UsageBasedPricingTerm, the UsageBasedRateCardItem defines an individual rate for a product dimension.
      type: object
      properties:
        rateCard:
          $ref: "#/components/schemas/RateCardList"
          description: Defines the per unit rates for product dimensions.
    RateCardList:
      type: array
      items:
        $ref: "#/components/schemas/RateCardItem"
    RateCardItem:
      description: Defines the per unit rates for each individual product dimension.
      type: object
      properties:
        dimensionKey:
          $ref: "#/components/schemas/BoundedString"
          description: Dimension for which the given entitlement applies. Dimensions represent categories of capacity in a product and are specified when the product is listed in AWS Marketplace.
        price:
          $ref: "#/components/schemas/BoundedString"
          description: Per unit price for the product dimension that’s used for calculating the amount to be charged.
    ConfigurableUpfrontPricingTerm:
      description: Defines a prepaid payment model that allows buyers to configure the entitlements they want to purchase and the duration.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/UnversionedTermType"
          description: Category of selector.
        id:
          $ref: "#/components/schemas/TermId"
          description: The unique identifier of the term.
        currencyCode:
          $ref: "#/components/schemas/CurrencyCode"
          description: Defines the currency for the prices mentioned in the term.
        rateCards:
          $ref: "#/components/schemas/ConfigurableUpfrontRateCardList"
          description: A rate card defines the per unit rates for product dimensions.
        configuration:
          $ref: "#/components/schemas/ConfigurableUpfrontPricingTermConfiguration"
          description: Additional parameters specified by the acceptor while accepting the term.
    ConfigurableUpfrontRateCardList:
      type: array
      items:
        $ref: "#/components/schemas/ConfigurableUpfrontRateCardItem"
    ConfigurableUpfrontRateCardItem:
      description: Within the prepaid payment model defined under ConfigurableUpfrontPricingTerm, the RateCardItem defines all the various rate cards (including pricing and dimensions) that have been proposed.
      type: object
      properties:
        selector:
          $ref: "#/components/schemas/Selector"
          description: Differentiates between the mutually exclusive rate cards in the same pricing term to be selected by the buyer.
        constraints:
          $ref: "#/components/schemas/Constraints"
          description: Defines limits on how the term can be configured by acceptors.
        rateCard:
          $ref: "#/components/schemas/RateCardList"
          description: Defines the per unit rates for product dimensions.
    Selector:
      description: Differentiates between the mutually exclusive rate cards in the same pricing term to be selected by the buyer.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/BoundedString"
          description: Category of selector.
        value:
          $ref: "#/components/schemas/BoundedString"
          description: Contract duration. This field supports the ISO 8601 format.
    Constraints:
      description: Defines limits on how the term can be configured by acceptors.
      type: object
      properties:
        multipleDimensionSelection:
          $ref: "#/components/schemas/BoundedString"
          description: Determines if buyers are allowed to select multiple dimensions in the rate card. The possible values are Allowed and Disallowed. The default value is Allowed.
        quantityConfiguration:
          $ref: "#/components/schemas/BoundedString"
          description: Determines if acceptors are allowed to configure quantity for each dimension in rate card. The possible values are Allowed and Disallowed. The default value is Allowed.
    ByolPricingTerm:
      description: Enables you and your customers to move your existing agreements to AWS Marketplace. The customer won't be charged for product usage in AWS Marketplace because they already paid for the product outside of AWS Marketplace.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/UnversionedTermType"
          description: Type of the term being updated.
        id:
          $ref: "#/components/schemas/TermId"
          description: The unique identifier for the term.
    RecurringPaymentTerm:
      description: Defines a pricing model where customers are charged a fixed recurring price at the end of each billing period.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/UnversionedTermType"
          description: Type of the term being updated.
        id:
          $ref: "#/components/schemas/TermId"
          description: The unique identifier for the term.
        currencyCode:
          $ref: "#/components/schemas/CurrencyCode"
          description: Defines the currency for the prices mentioned in this term.
        billingPeriod:
          $ref: "#/components/schemas/BoundedString"
          description: Defines the recurrence at which buyers are charged.
        price:
          $ref: "#/components/schemas/BoundedString"
          description: Amount charged to the buyer every billing period.
    ValidityTerm:
      description: Defines the conditions that will keep an agreement created from this offer valid.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/UnversionedTermType"
          description: Category of the term being updated.
        id:
          $ref: "#/components/schemas/TermId"
          description: The unique identifier for the term.
        agreementDuration:
          $ref: "#/components/schemas/BoundedString"
          description: Defines the duration that the agreement remains active. If AgreementStartDate isn’t provided, the agreement duration is relative to the agreement signature time. The duration is represented in the ISO_8601 format.
        agreementStartDate:
          $ref: "#/components/schemas/Timestamp"
          description: Defines the date when agreement starts. The agreement starts at 00:00:00.000 UTC on the date provided. If AgreementStartDate isn’t provided, the agreement start date is determined based on agreement signature time.
        agreementEndDate:
          $ref: "#/components/schemas/Timestamp"
          description: Defines the date when the agreement ends. The agreement ends at 23:59:59.999 UTC on the date provided. If AgreementEndDate isn’t provided, the agreement end date is determined by the validity of individual terms.
    PaymentScheduleTerm:
      description: Defines an installment-based pricing model where customers are charged a fixed price on different dates during the agreement validity period. This is used most commonly for flexible payment schedule pricing.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/UnversionedTermType"
          description: Type of the term.
        id:
          $ref: "#/components/schemas/TermId"
          description: The unique identifier for the term.
        currencyCode:
          $ref: "#/components/schemas/CurrencyCode"
          description: Defines the currency for the prices mentioned in the term.
        schedule:
          $ref: "#/components/schemas/ScheduleList"
          description: List of the payment schedule where each element defines one installment of payment. It contains the information necessary for calculating the price.
    ScheduleList:
      type: array
      items:
        $ref: "#/components/schemas/ScheduleItem"
    ScheduleItem:
      description: An individual installment of the payment that includes the date and amount of the charge.
      type: object
      properties:
        chargeDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date that the customer would pay the price defined in this payment schedule term. Invoices are generated on the date provided.
        chargeAmount:
          $ref: "#/components/schemas/BoundedString"
          description: The price that the customer would pay on the scheduled date (chargeDate).
    FreeTrialPricingTerm:
      description: Defines a short-term free pricing model where the buyers aren’t charged anything within a specified limit.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/UnversionedTermType"
          description: Category of the term.
        id:
          $ref: "#/components/schemas/TermId"
          description: The unique identifier for the terms.
        duration:
          $ref: "#/components/schemas/BoundedString"
          description: Duration of the free trial period (5–31 days).
        grants:
          $ref: "#/components/schemas/GrantList"
          description: Entitlements granted to the acceptor of a free trial as part of an agreement execution.
    GrantList:
      type: array
      items:
        $ref: "#/components/schemas/GrantItem"
    GrantItem:
      description: Entitlements granted to the acceptor of fixed upfront as part of agreement execution.
      type: object
      properties:
        dimensionKey:
          $ref: "#/components/schemas/BoundedString"
          description: Unique dimension key defined in the product document. Dimensions represent categories of capacity in a product and are specified when the product is listed in AWS Marketplace.
        maxQuantity:
          $ref: "#/components/schemas/PositiveIntegerWithDefaultValueOne"
          description: Maximum amount of capacity that the buyer can be entitled to the given dimension of the product. If MaxQuantity is not provided, the buyer will be able to use an unlimited amount of the given dimension.
    PositiveIntegerWithDefaultValueOne:
      type: integer
      minimum: 1
    FixedUpfrontPricingTerm:
      description: Defines a prepaid pricing model where the customers are charged a fixed upfront amount.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/UnversionedTermType"
          description: Category of the term being updated.
        id:
          $ref: "#/components/schemas/TermId"
          description: The unique identifier for the term.
        currencyCode:
          $ref: "#/components/schemas/CurrencyCode"
          description: Defines the currency for the prices mentioned in this term.
        duration:
          $ref: "#/components/schemas/BoundedString"
          description: Contract duration for the terms.
        price:
          $ref: "#/components/schemas/BoundedString"
          description: Fixed amount to be charged to the customer when this term is accepted.
        grants:
          $ref: "#/components/schemas/GrantList"
          description: Entitlements granted to the acceptor of fixed upfront as part of agreement execution.
    VariablePaymentTerm:
      description: Defines a payment model where sellers can submit variable payment requests up to a maximum charge amount, with configurable approval strategies and expiration timelines.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/UnversionedTermType"
          description: Type of the term.
        id:
          $ref: "#/components/schemas/TermId"
          description: The unique identifier for the term.
        currencyCode:
          $ref: "#/components/schemas/CurrencyCode"
          description: Defines the currency for the prices mentioned in the term.
        maxTotalChargeAmount:
          $ref: "#/components/schemas/BoundedString"
          description: The maximum total amount that can be charged to the customer through variable payment requests under this term.
        configuration:
          $ref: "#/components/schemas/VariablePaymentTermConfiguration"
          description: Additional parameters specified by the acceptor while accepting the term.
    GetBillingAdjustmentRequestOutput:
      type: object
      properties:
        billingAdjustmentRequestId:
          $ref: "#/components/schemas/BillingAdjustmentRequestId"
          description: The unique identifier of the billing adjustment request.
        agreementId:
          $ref: "#/components/schemas/AgreementId"
          description: The unique identifier of the agreement associated with this billing adjustment request.
        adjustmentReasonCode:
          $ref: "#/components/schemas/BillingAdjustmentReasonCode"
          description: The reason code for the billing adjustment.
        description:
          $ref: "#/components/schemas/String"
          description: The detailed description of the billing adjustment reason, if provided.
        originalInvoiceId:
          $ref: "#/components/schemas/InvoiceId"
