          $ref: "#/components/schemas/PositiveAmountUpto8Decimals"
          description: The adjustment amount as a string representation of a decimal number.
        currencyCode:
          $ref: "#/components/schemas/CurrencyCode"
          description: The currency code for the adjustment amount (e.g., USD).
        status:
          $ref: "#/components/schemas/BillingAdjustmentStatus"
          description: The current status of the billing adjustment request.
        statusMessage:
          $ref: "#/components/schemas/BillingAdjustmentStatusMessage"
          description: A message providing additional context about the billing adjustment request status. This field is populated only when the status is VALIDATION_FAILED.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the billing adjustment request was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the billing adjustment request was last updated.
      required:
