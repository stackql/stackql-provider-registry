          description: The revision number of the charge.
        agreementId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier of the agreement that resulted in this charge.
        agreementType:
          $ref: "#/components/schemas/AgreementType"
          description: The type of agreement that resulted in this charge (for example, PurchaseAgreement).
        purchaseOrderReference:
          $ref: "#/components/schemas/PurchaseOrderReference"
          description: The purchase order reference associated with the charge, if any.
        currencyCode:
          $ref: "#/components/schemas/CurrencyCode"
          description: The currency code for the charge amount.
        amount:
          $ref: "#/components/schemas/BoundedString"
          description: The amount of the charge.
        time:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the charge will be incurred. This is available only when the charge date is known.
