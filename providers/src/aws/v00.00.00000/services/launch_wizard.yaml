openapi: 3.0.0
info:
  version: "2018-05-10"
  title: AWS Launch Wizard
  description: AWS Launch Wizard
  x-serviceName: launchwizard
  x-serviceAlias: launch_wizard
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: launchwizard
servers:
  - url: https://launchwizard.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for launch-wizard
paths:
  /createDeployment:
    post:
      operationId: CreateDeployment
      description: Creates a deployment for the given workload. Deployments created by this operation are not available in the Launch Wizard console to use the Clone deployment action on.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workloadName:
                  $ref: "#/components/schemas/WorkloadName"
                deploymentPatternName:
                  $ref: "#/components/schemas/DeploymentPatternName"
                name:
                  $ref: "#/components/schemas/DeploymentName"
                specifications:
                  $ref: "#/components/schemas/DeploymentSpecifications"
                dryRun:
                  $ref: "#/components/schemas/Boolean"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - workloadName
                - deploymentPatternName
                - name
                - specifications
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDeploymentOutput"
  /deleteDeployment:
    post:
      operationId: DeleteDeployment
      description: Deletes a deployment.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deploymentId:
                  $ref: "#/components/schemas/DeploymentId"
              required:
                - deploymentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDeploymentOutput"
  /getDeployment:
    post:
      operationId: GetDeployment
      description: Returns information about the deployment.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deploymentId:
                  $ref: "#/components/schemas/DeploymentId"
              required:
                - deploymentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDeploymentOutput"
  /getDeploymentPatternVersion:
    post:
      operationId: GetDeploymentPatternVersion
      description: Returns information about a deployment pattern version.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workloadName:
                  $ref: "#/components/schemas/WorkloadName"
                deploymentPatternName:
                  $ref: "#/components/schemas/DeploymentPatternName"
                deploymentPatternVersionName:
                  $ref: "#/components/schemas/DeploymentPatternVersionName"
              required:
                - workloadName
                - deploymentPatternName
                - deploymentPatternVersionName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDeploymentPatternVersionOutput"
  /getWorkload:
    post:
      operationId: GetWorkload
      description: Returns information about a workload.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workloadName:
                  $ref: "#/components/schemas/WorkloadName"
              required:
                - workloadName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWorkloadOutput"
  /getWorkloadDeploymentPattern:
    post:
      operationId: GetWorkloadDeploymentPattern
      description: Returns details for a given workload and deployment pattern, including the available specifications. You can use the ListWorkloads operation to discover the available workload names and the ListWorkloadDeploymentPatterns operation to discover the available deployment pattern names of a given workload.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workloadName:
                  $ref: "#/components/schemas/WorkloadName"
                deploymentPatternName:
                  $ref: "#/components/schemas/DeploymentPatternName"
              required:
                - workloadName
                - deploymentPatternName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWorkloadDeploymentPatternOutput"
  /listDeploymentEvents:
    post:
      operationId: ListDeploymentEvents
      description: Lists the events of a deployment.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deploymentId:
                  $ref: "#/components/schemas/DeploymentId"
                maxResults:
                  $ref: "#/components/schemas/MaxDeploymentEventResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - deploymentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDeploymentEventsOutput"
  /listDeploymentPatternVersions:
    post:
      operationId: ListDeploymentPatternVersions
      description: Lists the deployment pattern versions.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workloadName:
                  $ref: "#/components/schemas/WorkloadName"
                deploymentPatternName:
                  $ref: "#/components/schemas/DeploymentPatternName"
                maxResults:
                  $ref: "#/components/schemas/MaxWorkloadResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                filters:
                  $ref: "#/components/schemas/FilterList"
              required:
                - workloadName
                - deploymentPatternName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDeploymentPatternVersionsOutput"
  /listDeployments:
    post:
      operationId: ListDeployments
      description: Lists the deployments that have been created.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  $ref: "#/components/schemas/DeploymentFilterList"
                maxResults:
                  $ref: "#/components/schemas/MaxDeploymentResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDeploymentsOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags associated with a specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
    post:
      operationId: TagResource
      description: Adds the specified tags to the given resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
    delete:
      operationId: UntagResource
      description: Removes the specified tags from the given resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: Keys identifying the tags to remove.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /listWorkloadDeploymentPatterns:
    post:
      operationId: ListWorkloadDeploymentPatterns
      description: Lists the workload deployment patterns for a given workload name. You can use the ListWorkloads operation to discover the available workload names.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workloadName:
                  $ref: "#/components/schemas/WorkloadName"
                maxResults:
                  $ref: "#/components/schemas/MaxWorkloadDeploymentPatternResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - workloadName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkloadDeploymentPatternsOutput"
  /listWorkloads:
    post:
      operationId: ListWorkloads
      description: Lists the available workload names. You can use the ListWorkloadDeploymentPatterns operation to discover the available deployment patterns for a given workload.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxWorkloadResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkloadsOutput"
  /updateDeployment:
    post:
      operationId: UpdateDeployment
      description: Updates a deployment.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deploymentId:
                  $ref: "#/components/schemas/DeploymentId"
                specifications:
                  $ref: "#/components/schemas/DeploymentSpecifications"
                workloadVersionName:
                  $ref: "#/components/schemas/WorkloadVersionName"
                deploymentPatternVersionName:
                  $ref: "#/components/schemas/DeploymentPatternVersionName"
                dryRun:
                  $ref: "#/components/schemas/Boolean"
                force:
                  $ref: "#/components/schemas/Boolean"
              required:
                - deploymentId
                - specifications
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDeploymentOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    WorkloadName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[A-Za-z][a-zA-Z0-9-_]*"
    DeploymentPatternName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[A-Za-z0-9][a-zA-Z0-9-]*"
    DeploymentName:
      type: string
      minLength: 1
      maxLength: 50
      pattern: "[A-Za-z0-9_\\.-]+"
    DeploymentSpecifications:
      type: object
      properties: {}
    Boolean:
      type: boolean
    Tags:
      type: object
      properties: {}
    CreateDeploymentOutput:
      type: object
      properties:
        deploymentId:
          $ref: "#/components/schemas/DeploymentId"
          description: The ID of the deployment.
    DeploymentId:
      type: string
      minLength: 2
      maxLength: 128
      pattern: "[a-zA-Z0-9-]+"
    DeleteDeploymentOutput:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/DeploymentStatus"
          description: The status of the deployment.
        statusReason:
          $ref: "#/components/schemas/String"
          description: The reason for the deployment status.
    DeploymentStatus:
      type: string
      enum:
        - COMPLETED
        - CREATING
        - DELETE_IN_PROGRESS
        - DELETE_INITIATING
        - DELETE_FAILED
        - DELETED
        - FAILED
        - IN_PROGRESS
        - VALIDATING
        - UPDATE_IN_PROGRESS
        - UPDATE_COMPLETED
        - UPDATE_FAILED
        - UPDATE_ROLLBACK_COMPLETED
        - UPDATE_ROLLBACK_FAILED
    String:
      type: string
    GetDeploymentOutput:
      type: object
      properties:
        deployment:
          $ref: "#/components/schemas/DeploymentData"
          description: An object that details the deployment.
    DeploymentData:
      description: The data associated with a deployment.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the deployment.
        id:
          $ref: "#/components/schemas/DeploymentId"
          description: The ID of the deployment.
        workloadName:
          $ref: "#/components/schemas/WorkloadName"
          description: The name of the workload.
        patternName:
          $ref: "#/components/schemas/DeploymentPatternName"
          description: The pattern name of the deployment.
        status:
          $ref: "#/components/schemas/DeploymentStatus"
          description: The status of the deployment.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time the deployment was created.
        modifiedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time the deployment was last modified.
        specifications:
          type: object
          properties: {}
          description: The settings specified for the deployment. These settings define how to deploy and configure your resources created by the deployment. For more information about the specifications required for creating a deployment for a SAP workload, see SAP deployment specifications. To retrieve the specifications required to create a deployment for other workloads, use the GetWorkloadDeploymentPattern operation.
        resourceGroup:
          $ref: "#/components/schemas/String"
          description: The resource group of the deployment.
        deletedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time the deployment was deleted.
        tags:
          type: object
          properties: {}
          description: Information about the tags attached to a deployment.
        deploymentArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the deployment.
    Timestamp:
      type: string
      format: date-time
    DeploymentPatternVersionName:
      type: string
      minLength: 5
      maxLength: 30
      pattern: (([A-Za-z0-9][a-zA-Z0-9-]*)|(\d+\.\d+\.\d+))
    GetDeploymentPatternVersionOutput:
      type: object
      properties:
        deploymentPatternVersion:
          $ref: "#/components/schemas/DeploymentPatternVersionDataSummary"
          description: The deployment pattern version.
    DeploymentPatternVersionDataSummary:
      description: Describes a deployment pattern version summary.
      type: object
      properties:
        deploymentPatternVersionName:
          $ref: "#/components/schemas/String"
          description: The name of the deployment pattern version.
        description:
          $ref: "#/components/schemas/String"
          description: The description of the deployment pattern version.
        documentationUrl:
          $ref: "#/components/schemas/String"
          description: The URL of the documentation for the deployment pattern version.
        workloadName:
          $ref: "#/components/schemas/String"
          description: The name of the workload.
        deploymentPatternName:
          $ref: "#/components/schemas/String"
          description: The name of the deployment pattern.
    GetWorkloadOutput:
      type: object
      properties:
        workload:
          $ref: "#/components/schemas/WorkloadData"
          description: Information about the workload.
    WorkloadData:
      description: Describes a workload.
      type: object
      properties:
        workloadName:
          $ref: "#/components/schemas/WorkloadName"
          description: The name of the workload.
        displayName:
          $ref: "#/components/schemas/String"
          description: The display name of a workload.
        status:
          $ref: "#/components/schemas/WorkloadStatus"
          description: The status of a workload. You can list deployments in the DISABLED status.
        description:
          $ref: "#/components/schemas/String"
          description: The description of a workload.
        documentationUrl:
          $ref: "#/components/schemas/String"
          description: The URL of a workload document.
        iconUrl:
          $ref: "#/components/schemas/String"
          description: The URL of a workload icon.
        statusMessage:
          $ref: "#/components/schemas/String"
          description: The message about a workload's status.
    WorkloadStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
        - DISABLED
        - DELETED
    GetWorkloadDeploymentPatternOutput:
      type: object
      properties:
        workloadDeploymentPattern:
          $ref: "#/components/schemas/WorkloadDeploymentPatternData"
          description: Details about the workload deployment pattern.
    WorkloadDeploymentPatternData:
      description: The data that details a workload deployment pattern.
      type: object
      properties:
        workloadName:
          $ref: "#/components/schemas/WorkloadName"
          description: The workload name of the deployment pattern.
        deploymentPatternName:
          $ref: "#/components/schemas/DeploymentPatternName"
          description: The name of the deployment pattern.
        workloadVersionName:
          $ref: "#/components/schemas/WorkloadVersionName"
          description: The workload version name of the deployment pattern.
        deploymentPatternVersionName:
          $ref: "#/components/schemas/DeploymentPatternVersionName"
          description: The version name of the deployment pattern.
        displayName:
          $ref: "#/components/schemas/String"
          description: The display name of the deployment pattern.
        description:
          $ref: "#/components/schemas/String"
          description: The description of the deployment pattern.
        status:
          $ref: "#/components/schemas/WorkloadDeploymentPatternStatus"
          description: The status of the deployment pattern.
        statusMessage:
          $ref: "#/components/schemas/String"
          description: The status message of the deployment pattern.
        specifications:
          $ref: "#/components/schemas/DeploymentSpecificationsData"
          description: The settings specified for the deployment. These settings define how to deploy and configure your resources created by the deployment. For more information about the specifications required for creating a deployment for a SAP workload, see SAP deployment specifications. To retrieve the specifications required to create a deployment for other workloads, use the GetWorkloadDeploymentPattern operation.
    WorkloadVersionName:
      type: string
      minLength: 5
      maxLength: 30
      pattern: (([A-Za-z0-9][a-zA-Z0-9-]*)|(\d+\.\d+\.\d+))
    WorkloadDeploymentPatternStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
        - DISABLED
        - DELETED
    DeploymentSpecificationsData:
      type: array
      items:
        $ref: "#/components/schemas/DeploymentSpecificationsField"
    DeploymentSpecificationsField:
      description: A field that details a specification of a deployment pattern.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the deployment specification.
        description:
          $ref: "#/components/schemas/String"
          description: The description of the deployment specification.
        allowedValues:
          $ref: "#/components/schemas/AllowedValues"
          description: The allowed values of the deployment specification.
        required_:
          $ref: "#/components/schemas/String"
          description: Indicates if the deployment specification is required.
        conditionals:
          $ref: "#/components/schemas/SpecificationsConditionalData"
          description: The conditionals used for the deployment specification.
    AllowedValues:
      type: array
      items:
        $ref: "#/components/schemas/ValueString"
    ValueString:
      type: string
      minLength: 1
      maxLength: 1500
    SpecificationsConditionalData:
      type: array
      items:
        $ref: "#/components/schemas/DeploymentConditionalField"
    DeploymentConditionalField:
      description: A field that details a condition of the specifications for a deployment.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the deployment condition.
        value:
          $ref: "#/components/schemas/String"
          description: The value of the condition.
        comparator:
          $ref: "#/components/schemas/String"
          description: "The comparator of the condition. Valid values: Equal | NotEqual"
    MaxDeploymentEventResults:
      type: integer
      minimum: 1
      maximum: 100
    NextToken:
      type: string
      minLength: 1
      maxLength: 2048
    ListDeploymentEventsOutput:
      type: object
      properties:
        deploymentEvents:
          $ref: "#/components/schemas/DeploymentEventDataSummaryList"
          description: Lists the deployment events.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token to include in another request to get the next page of items. This value is null when there are no more items to return.
    DeploymentEventDataSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/DeploymentEventDataSummary"
    DeploymentEventDataSummary:
      description: A summary of the deployment event data.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the deployment event.
        description:
          $ref: "#/components/schemas/String"
          description: The description of the deployment event.
        status:
          $ref: "#/components/schemas/EventStatus"
          description: The status of the deployment event.
        statusReason:
          $ref: "#/components/schemas/String"
          description: The reason of the deployment event status.
        timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of the deployment event.
    EventStatus:
      type: string
      enum:
        - CANCELED
        - CANCELING
        - COMPLETED
        - CREATED
        - FAILED
        - IN_PROGRESS
        - PENDING
        - TIMED_OUT
    MaxWorkloadResults:
      type: integer
      minimum: 1
      maximum: 100
    FilterList:
      type: array
      items:
        $ref: "#/components/schemas/DeploymentPatternVersionFilter"
    DeploymentPatternVersionFilter:
      description: A filter for deployment pattern versions. Use this filter to specify criteria for querying deployment pattern versions in Launch Wizard.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/DeploymentPatternVersionFilterKey"
          description: The name of the filter attribute. Specifies which attribute to filter on when querying deployment pattern versions.
        values:
          $ref: "#/components/schemas/DeploymentPatternVersionFilterValues"
          description: The values to filter by. Contains the specific values to match against when filtering deployment pattern versions.
      required:
        - name
        - values
    DeploymentPatternVersionFilterKey:
      type: string
      enum:
        - updateFromVersion
    DeploymentPatternVersionFilterValues:
      type: array
      items:
        $ref: "#/components/schemas/DeploymentPatternVersionFilterValuesMemberString"
    DeploymentPatternVersionFilterValuesMemberString:
      type: string
      minLength: 1
      maxLength: 100
      pattern: (0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)
    ListDeploymentPatternVersionsOutput:
      type: object
      properties:
        deploymentPatternVersions:
          $ref: "#/components/schemas/DeploymentPatternVersionDataSummaryList"
          description: The deployment pattern versions.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results.
    DeploymentPatternVersionDataSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/DeploymentPatternVersionDataSummary"
    DeploymentFilterList:
      type: array
      items:
        $ref: "#/components/schemas/DeploymentFilter"
    DeploymentFilter:
      description: A filter name and value pair that is used to return more specific results from a describe operation. Filters can be used to match a set of resources by specific criteria.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/DeploymentFilterKey"
          description: The name of the filter. Filter names are case-sensitive.
        values:
          $ref: "#/components/schemas/DeploymentFilterValues"
          description: The filter values. Filter values are case-sensitive. If you specify multiple values for a filter, the values are joined with an OR, and the request returns all results that match any of the specified values.
    DeploymentFilterKey:
      type: string
      enum:
        - WORKLOAD_NAME
        - DEPLOYMENT_STATUS
    DeploymentFilterValues:
      type: array
      items:
        $ref: "#/components/schemas/DeploymentFilterValuesMemberString"
    DeploymentFilterValuesMemberString:
      type: string
      minLength: 1
      maxLength: 100
      pattern: .*(^(([A-Za-z])+([0-9A-Za-z\-\_])+)$).*
    MaxDeploymentResults:
      type: integer
      minimum: 1
      maximum: 100
    ListDeploymentsOutput:
      type: object
      properties:
        deployments:
          $ref: "#/components/schemas/DeploymentDataSummaryList"
          description: Lists the deployments.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token to include in another request to get the next page of items. This value is null when there are no more items to return.
    DeploymentDataSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/DeploymentDataSummary"
    DeploymentDataSummary:
      description: A summary of the deployment data.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the deployment
