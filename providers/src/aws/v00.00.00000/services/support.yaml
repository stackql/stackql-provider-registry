openapi: 3.0.0
info:
  version: "2013-04-15"
  title: AWS Support
  description: AWS Support
  x-serviceName: support
  x-serviceAlias: support
  x-protocol: json
  x-apiVersion: "2013-04-15"
  x-endpointPrefix: support
  x-targetPrefix: AWSSupport_20130415
  x-jsonVersion: "1.1"
servers:
  - url: https://support.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for support
paths:
  /AddAttachmentsToSet:
    post:
      operationId: AddAttachmentsToSet
      description: Adds one or more attachments to an attachment set. An attachment set is a temporary container for attachments that you add to a case or case communication. The set is available for 1 hour after it's created. The expiryTime returned in the response is when the set expires. You must have a Business, Enterprise On-Ramp, or Enterprise Support plan to use the Amazon Web Services Support API. If you call the Amazon Web Services Support API from an account that doesn't have a Business, Enterprise On-Ramp, or Enterprise Support plan, the SubscriptionRequiredException error message appears. For information about changing your support plan, see Amazon Web Services Support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSupport_20130415.AddAttachmentsToSet
            default: AWSSupport_20130415.AddAttachmentsToSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                attachmentSetId:
                  $ref: "#/components/schemas/AttachmentSetId"
                  description: The ID of the attachment set. If an attachmentSetId is not specified, a new attachment set is created, and the ID of the set is returned in the response. If an attachmentSetId is specified, the attachments are added to the specified set, if it exists.
                attachments:
                  $ref: "#/components/schemas/Attachments"
                  description: One or more attachments to add to the set. You can add up to three attachments per set. The size limit is 5 MB per attachment. In the Attachment object, use the data parameter to specify the contents of the attachment file. In the previous request syntax, the value for data appear as blob, which is represented as a base64-encoded string. The value for fileName is the name of the attachment, such as troubleshoot-screenshot.png.
              required:
                - attachments
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddAttachmentsToSetResponse"
  /AddCommunicationToCase:
    post:
      operationId: AddCommunicationToCase
      description: Adds additional customer communication to an Amazon Web Services Support case. Use the caseId parameter to identify the case to which to add communication. You can list a set of email addresses to copy on the communication by using the ccEmailAddresses parameter. The communicationBody value contains the text of the communication. You must have a Business, Enterprise On-Ramp, or Enterprise Support plan to use the Amazon Web Services Support API. If you call the Amazon Web Services Support API from an account that doesn't have a Business, Enterprise On-Ramp, or Enterprise Support plan, the SubscriptionRequiredException error message appears. For information about changing your support plan, see Amazon Web Services Support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSupport_20130415.AddCommunicationToCase
            default: AWSSupport_20130415.AddCommunicationToCase
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                caseId:
                  $ref: "#/components/schemas/CaseId"
                  description: "The support case ID requested or returned in the call. The case ID is an alphanumeric string formatted as shown in this example: case-12345678910-2013-c4c1d2bf33c5cf47"
                communicationBody:
                  $ref: "#/components/schemas/CommunicationBody"
                  description: The body of an email communication to add to the support case.
                ccEmailAddresses:
                  $ref: "#/components/schemas/CcEmailAddressList"
                  description: The email addresses in the CC line of an email to be added to the support case.
                attachmentSetId:
                  $ref: "#/components/schemas/AttachmentSetId"
                  description: The ID of a set of one or more attachments for the communication to add to the case. Create the set by calling AddAttachmentsToSet
              required:
                - communicationBody
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddCommunicationToCaseResponse"
  /CreateCase:
    post:
      operationId: CreateCase
      description: "Creates a case in the Amazon Web Services Support Center. This operation is similar to how you create a case in the Amazon Web Services Support Center Create Case page. The Amazon Web Services Support API doesn't support requesting service limit increases. You can submit a service limit increase in the following ways: Submit a request from the Amazon Web Services Support Center Create Case page. Use the Service Quotas RequestServiceQuotaIncrease operation. A successful CreateCase request returns an Amazon Web Services Support case number. You can use the DescribeCases operation and specify the case number to get existing Amazon Web Services Support cases. After you create a case, use the AddCommunicationToCase operation to add additional communication or attachments to an existing case. The caseId is separate from the displayId that appears in the Amazon Web Services Support Center. Use the DescribeCases operation to get the displayId. You must have a Business, Enterprise On-Ramp, or Enterprise Support plan to use the Amazon Web Services Support API. If you call the Amazon Web Services Support API from an account that doesn't have a Business, Enterprise On-Ramp, or Enterprise Support plan, the SubscriptionRequiredException error message appears. For information about changing your support plan, see Amazon Web Services Support."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSupport_20130415.CreateCase
            default: AWSSupport_20130415.CreateCase
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                subject:
                  $ref: "#/components/schemas/Subject"
                  description: The title of the support case. The title appears in the Subject field on the Amazon Web Services Support Center Create Case page.
                serviceCode:
                  $ref: "#/components/schemas/ServiceCode"
                  description: The code for the Amazon Web Services service. You can use the DescribeServices operation to get the possible serviceCode values.
                severityCode:
                  $ref: "#/components/schemas/SeverityCode"
                  description: A value that indicates the urgency of the case. This value determines the response time according to your service level agreement with Amazon Web Services Support. You can use the DescribeSeverityLevels operation to get the possible values for severityCode. For more information, see SeverityLevel and Choosing a Severity in the Amazon Web Services Support User Guide. The availability of severity levels depends on the support plan for the Amazon Web Services account.
                categoryCode:
                  $ref: "#/components/schemas/CategoryCode"
                  description: The category of problem for the support case. You also use the DescribeServices operation to get the category code for a service. Each Amazon Web Services service defines its own set of category codes.
                communicationBody:
                  $ref: "#/components/schemas/CommunicationBody"
                  description: The communication body text that describes the issue. This text appears in the Description field on the Amazon Web Services Support Center Create Case page.
                ccEmailAddresses:
                  $ref: "#/components/schemas/CcEmailAddressList"
                  description: A list of email addresses that Amazon Web Services Support copies on case correspondence. Amazon Web Services Support identifies the account that creates the case when you specify your Amazon Web Services credentials in an HTTP POST method or use the Amazon Web Services SDKs.
                language:
                  $ref: "#/components/schemas/Language"
                  description: The language in which Amazon Web Services Support handles the case. Amazon Web Services Support currently supports Chinese (“zh”), English ("en"), Japanese ("ja") and Korean (“ko”). You must specify the ISO 639-1 code for the language parameter if you want support in that language.
                issueType:
                  $ref: "#/components/schemas/IssueType"
                  description: The type of issue for the case. You can specify customer-service or technical. If you don't specify a value, the default is technical.
                attachmentSetId:
                  $ref: "#/components/schemas/AttachmentSetId"
                  description: The ID of a set of one or more attachments for the case. Create the set by using the AddAttachmentsToSet operation.
              required:
                - subject
                - communicationBody
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCaseResponse"
  /DescribeAttachment:
    post:
      operationId: DescribeAttachment
      description: Returns the attachment that has the specified ID. Attachments can include screenshots, error logs, or other files that describe your issue. Attachment IDs are generated by the case management system when you add an attachment to a case or case communication. Attachment IDs are returned in the AttachmentDetails objects that are returned by the DescribeCommunications operation. You must have a Business, Enterprise On-Ramp, or Enterprise Support plan to use the Amazon Web Services Support API. If you call the Amazon Web Services Support API from an account that doesn't have a Business, Enterprise On-Ramp, or Enterprise Support plan, the SubscriptionRequiredException error message appears. For information about changing your support plan, see Amazon Web Services Support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSupport_20130415.DescribeAttachment
            default: AWSSupport_20130415.DescribeAttachment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                attachmentId:
                  $ref: "#/components/schemas/AttachmentId"
                  description: The ID of the attachment to return. Attachment IDs are returned by the DescribeCommunications operation.
              required:
                - attachmentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAttachmentResponse"
  /DescribeCases:
    post:
      operationId: DescribeCases
      description: "Returns a list of cases that you specify by passing one or more case IDs. You can use the afterTime and beforeTime parameters to filter the cases by date. You can set values for the includeResolvedCases and includeCommunications parameters to specify how much information to return. The response returns the following in JSON format: One or more CaseDetails data types. One or more nextToken values, which specify where to paginate the returned records represented by the CaseDetails objects. Case data is available for 12 months after creation. If a case was created more than 12 months ago, a request might return an error. You must have a Business, Enterprise On-Ramp, or Enterprise Support plan to use the Amazon Web Services Support API. If you call the Amazon Web Services Support API from an account that doesn't have a Business, Enterprise On-Ramp, or Enterprise Support plan, the SubscriptionRequiredException error message appears. For information about changing your support plan, see Amazon Web Services Support."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSupport_20130415.DescribeCases
            default: AWSSupport_20130415.DescribeCases
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                caseIdList:
                  $ref: "#/components/schemas/CaseIdList"
                  description: A list of ID numbers of the support cases you want returned. The maximum number of cases is 100.
                displayId:
                  $ref: "#/components/schemas/DisplayId"
                  description: The ID displayed for a case in the Amazon Web Services Support Center user interface.
                afterTime:
                  $ref: "#/components/schemas/AfterTime"
                  description: The start date for a filtered date search on support case communications. Case communications are available for 12 months after creation.
                beforeTime:
                  $ref: "#/components/schemas/BeforeTime"
                  description: The end date for a filtered date search on support case communications. Case communications are available for 12 months after creation.
                includeResolvedCases:
                  $ref: "#/components/schemas/IncludeResolvedCases"
                  description: Specifies whether to include resolved support cases in the DescribeCases response. By default, resolved cases aren't included.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A resumption point for pagination.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return before paginating.
                language:
                  $ref: "#/components/schemas/Language"
                  description: The language in which Amazon Web Services Support handles the case. Amazon Web Services Support currently supports Chinese (“zh”), English ("en"), Japanese ("ja") and Korean (“ko”). You must specify the ISO 639-1 code for the language parameter if you want support in that language.
                includeCommunications:
                  $ref: "#/components/schemas/IncludeCommunications"
                  description: Specifies whether to include communications in the DescribeCases response. By default, communications are included.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeCasesResponse"
  /DescribeCommunications:
    post:
      operationId: DescribeCommunications
      description: Returns communications and attachments for one or more support cases. Use the afterTime and beforeTime parameters to filter by date. You can use the caseId parameter to restrict the results to a specific case. Case data is available for 12 months after creation. If a case was created more than 12 months ago, a request for data might cause an error. You can use the maxResults and nextToken parameters to control the pagination of the results. Set maxResults to the number of cases that you want to display on each page, and use nextToken to specify the resumption of pagination. You must have a Business, Enterprise On-Ramp, or Enterprise Support plan to use the Amazon Web Services Support API. If you call the Amazon Web Services Support API from an account that doesn't have a Business, Enterprise On-Ramp, or Enterprise Support plan, the SubscriptionRequiredException error message appears. For information about changing your support plan, see Amazon Web Services Support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSupport_20130415.DescribeCommunications
            default: AWSSupport_20130415.DescribeCommunications
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                caseId:
                  $ref: "#/components/schemas/CaseId"
                  description: "The support case ID requested or returned in the call. The case ID is an alphanumeric string formatted as shown in this example: case-12345678910-2013-c4c1d2bf33c5cf47"
                beforeTime:
                  $ref: "#/components/schemas/BeforeTime"
                  description: The end date for a filtered date search on support case communications. Case communications are available for 12 months after creation.
                afterTime:
                  $ref: "#/components/schemas/AfterTime"
                  description: The start date for a filtered date search on support case communications. Case communications are available for 12 months after creation.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A resumption point for pagination.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return before paginating.
              required:
                - caseId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeCommunicationsResponse"
  /DescribeCreateCaseOptions:
    post:
      operationId: DescribeCreateCaseOptions
      description: Returns a list of CreateCaseOption types along with the corresponding supported hours and language availability. You can specify the language categoryCode, issueType and serviceCode used to retrieve the CreateCaseOptions. You must have a Business, Enterprise On-Ramp, or Enterprise Support plan to use the Amazon Web Services Support API. If you call the Amazon Web Services Support API from an account that doesn't have a Business, Enterprise On-Ramp, or Enterprise Support plan, the SubscriptionRequiredException error message appears. For information about changing your support plan, see Amazon Web Services Support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSupport_20130415.DescribeCreateCaseOptions
            default: AWSSupport_20130415.DescribeCreateCaseOptions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                issueType:
                  $ref: "#/components/schemas/IssueType"
                  description: The type of issue for the case. You can specify customer-service or technical. If you don't specify a value, the default is technical.
                serviceCode:
                  $ref: "#/components/schemas/ServiceCode"
                  description: The code for the Amazon Web Services service. You can use the DescribeServices operation to get the possible serviceCode values.
                language:
                  $ref: "#/components/schemas/Language"
                  description: The language in which Amazon Web Services Support handles the case. Amazon Web Services Support currently supports Chinese (“zh”), English ("en"), Japanese ("ja") and Korean (“ko”). You must specify the ISO 639-1 code for the language parameter if you want support in that language.
                categoryCode:
                  $ref: "#/components/schemas/CategoryCode"
                  description: The category of problem for the support case. You also use the DescribeServices operation to get the category code for a service. Each Amazon Web Services service defines its own set of category codes.
              required:
                - issueType
                - serviceCode
                - language
                - categoryCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeCreateCaseOptionsResponse"
  /DescribeServices:
    post:
      operationId: DescribeServices
      description: Returns the current list of Amazon Web Services services and a list of service categories for each service. You then use service names and categories in your CreateCase requests. Each Amazon Web Services service has its own set of categories. The service codes and category codes correspond to the values that appear in the Service and Category lists on the Amazon Web Services Support Center Create Case page. The values in those fields don't necessarily match the service codes and categories returned by the DescribeServices operation. Always use the service codes and categories that the DescribeServices operation returns, so that you have the most recent set of service and category codes. You must have a Business, Enterprise On-Ramp, or Enterprise Support plan to use the Amazon Web Services Support API. If you call the Amazon Web Services Support API from an account that doesn't have a Business, Enterprise On-Ramp, or Enterprise Support plan, the SubscriptionRequiredException error message appears. For information about changing your support plan, see Amazon Web Services Support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSupport_20130415.DescribeServices
            default: AWSSupport_20130415.DescribeServices
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                serviceCodeList:
                  $ref: "#/components/schemas/ServiceCodeList"
                  description: A JSON-formatted list of service codes available for Amazon Web Services services.
                language:
                  $ref: "#/components/schemas/Language"
                  description: The language in which Amazon Web Services Support handles the case. Amazon Web Services Support currently supports Chinese (“zh”), English ("en"), Japanese ("ja") and Korean (“ko”). You must specify the ISO 639-1 code for the language parameter if you want support in that language.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeServicesResponse"
  /DescribeSeverityLevels:
    post:
      operationId: DescribeSeverityLevels
      description: Returns the list of severity levels that you can assign to a support case. The severity level for a case is also a field in the CaseDetails data type that you include for a CreateCase request. You must have a Business, Enterprise On-Ramp, or Enterprise Support plan to use the Amazon Web Services Support API. If you call the Amazon Web Services Support API from an account that doesn't have a Business, Enterprise On-Ramp, or Enterprise Support plan, the SubscriptionRequiredException error message appears. For information about changing your support plan, see Amazon Web Services Support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSupport_20130415.DescribeSeverityLevels
            default: AWSSupport_20130415.DescribeSeverityLevels
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                language:
                  $ref: "#/components/schemas/Language"
                  description: The language in which Amazon Web Services Support handles the case. Amazon Web Services Support currently supports Chinese (“zh”), English ("en"), Japanese ("ja") and Korean (“ko”). You must specify the ISO 639-1 code for the language parameter if you want support in that language.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSeverityLevelsResponse"
  /DescribeSupportedLanguages:
    post:
      operationId: DescribeSupportedLanguages
      description: Returns a list of supported languages for a specified categoryCode, issueType and serviceCode. The returned supported languages will include a ISO 639-1 code for the language, and the language display name. You must have a Business, Enterprise On-Ramp, or Enterprise Support plan to use the Amazon Web Services Support API. If you call the Amazon Web Services Support API from an account that doesn't have a Business, Enterprise On-Ramp, or Enterprise Support plan, the SubscriptionRequiredException error message appears. For information about changing your support plan, see Amazon Web Services Support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSupport_20130415.DescribeSupportedLanguages
            default: AWSSupport_20130415.DescribeSupportedLanguages
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                issueType:
                  $ref: "#/components/schemas/ValidatedIssueTypeString"
                  description: The type of issue for the case. You can specify customer-service or technical.
                serviceCode:
                  $ref: "#/components/schemas/ValidatedServiceCode"
                  description: The code for the Amazon Web Services service. You can use the DescribeServices operation to get the possible serviceCode values.
                categoryCode:
                  $ref: "#/components/schemas/ValidatedCategoryCode"
                  description: The category of problem for the support case. You also use the DescribeServices operation to get the category code for a service. Each Amazon Web Services service defines its own set of category codes.
              required:
                - issueType
                - serviceCode
                - categoryCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSupportedLanguagesResponse"
  /DescribeTrustedAdvisorCheckRefreshStatuses:
    post:
      operationId: DescribeTrustedAdvisorCheckRefreshStatuses
      description: Returns the refresh status of the Trusted Advisor checks that have the specified check IDs. You can get the check IDs by calling the DescribeTrustedAdvisorChecks operation. Some checks are refreshed automatically, and you can't return their refresh statuses by using the DescribeTrustedAdvisorCheckRefreshStatuses operation. If you call this operation for these checks, you might see an InvalidParameterValue error. You must have a Business, Enterprise On-Ramp, or Enterprise Support plan to use the Amazon Web Services Support API. If you call the Amazon Web Services Support API from an account that doesn't have a Business, Enterprise On-Ramp, or Enterprise Support plan, the SubscriptionRequiredException error message appears. For information about changing your support plan, see Amazon Web Services Support. To call the Trusted Advisor operations in the Amazon Web Services Support API, you must use the US East (N. Virginia) endpoint. Currently, the US West (Oregon) and Europe (Ireland) endpoints don't support the Trusted Advisor operations. For more information, see About the Amazon Web Services Support API in the Amazon Web Services Support User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSupport_20130415.DescribeTrustedAdvisorCheckRefreshStatuses
            default: AWSSupport_20130415.DescribeTrustedAdvisorCheckRefreshStatuses
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                checkIds:
                  $ref: "#/components/schemas/StringList"
                  description: The IDs of the Trusted Advisor checks to get the status. If you specify the check ID of a check that is automatically refreshed, you might see an InvalidParameterValue error.
              required:
                - checkIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeTrustedAdvisorCheckRefreshStatusesResponse"
  /DescribeTrustedAdvisorCheckResult:
    post:
      operationId: DescribeTrustedAdvisorCheckResult
      description: "Returns the results of the Trusted Advisor check that has the specified check ID. You can get the check IDs by calling the DescribeTrustedAdvisorChecks operation. The response contains a TrustedAdvisorCheckResult object, which contains these three objects: TrustedAdvisorCategorySpecificSummary TrustedAdvisorResourceDetail TrustedAdvisorResourcesSummary In addition, the response contains these fields: status - The alert status of the check can be ok (green), warning (yellow), error (red), or not_available. timestamp - The time of the last refresh of the check. checkId - The unique identifier for the check. You must have a Business, Enterprise On-Ramp, or Enterprise Support plan to use the Amazon Web Services Support API. If you call the Amazon Web Services Support API from an account that doesn't have a Business, Enterprise On-Ramp, or Enterprise Support plan, the SubscriptionRequiredException error message appears. For information about changing your support plan, see Amazon Web Services Support. To call the Trusted Advisor operations in the Amazon Web Services Support API, you must use the US East (N. Virginia) endpoint. Currently, the US West (Oregon) and Europe (Ireland) endpoints don't support the Trusted Advisor operations. For more information, see About the Amazon Web Services Support API in the Amazon Web Services Support User Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSupport_20130415.DescribeTrustedAdvisorCheckResult
            default: AWSSupport_20130415.DescribeTrustedAdvisorCheckResult
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                checkId:
                  $ref: "#/components/schemas/String"
                  description: The unique identifier for the Trusted Advisor check.
                language:
                  $ref: "#/components/schemas/String"
                  description: "The ISO 639-1 code for the language that you want your check results to appear in. The Amazon Web Services Support API currently supports the following languages for Trusted Advisor: Chinese, Simplified - zh Chinese, Traditional - zh_TW English - en French - fr German - de Indonesian - id Italian - it Japanese - ja Korean - ko Portuguese, Brazilian - pt_BR Spanish - es"
              required:
                - checkId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeTrustedAdvisorCheckResultResponse"
  /DescribeTrustedAdvisorCheckSummaries:
    post:
      operationId: DescribeTrustedAdvisorCheckSummaries
      description: Returns the results for the Trusted Advisor check summaries for the check IDs that you specified. You can get the check IDs by calling the DescribeTrustedAdvisorChecks operation. The response contains an array of TrustedAdvisorCheckSummary objects. You must have a Business, Enterprise On-Ramp, or Enterprise Support plan to use the Amazon Web Services Support API. If you call the Amazon Web Services Support API from an account that doesn't have a Business, Enterprise On-Ramp, or Enterprise Support plan, the SubscriptionRequiredException error message appears. For information about changing your support plan, see Amazon Web Services Support. To call the Trusted Advisor operations in the Amazon Web Services Support API, you must use the US East (N. Virginia) endpoint. Currently, the US West (Oregon) and Europe (Ireland) endpoints don't support the Trusted Advisor operations. For more information, see About the Amazon Web Services Support API in the Amazon Web Services Support User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSupport_20130415.DescribeTrustedAdvisorCheckSummaries
            default: AWSSupport_20130415.DescribeTrustedAdvisorCheckSummaries
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                checkIds:
                  $ref: "#/components/schemas/StringList"
                  description: The IDs of the Trusted Advisor checks.
              required:
                - checkIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeTrustedAdvisorCheckSummariesResponse"
  /DescribeTrustedAdvisorChecks:
    post:
      operationId: DescribeTrustedAdvisorChecks
      description: Returns information about all available Trusted Advisor checks, including the name, ID, category, description, and metadata. You must specify a language code. The response contains a TrustedAdvisorCheckDescription object for each check. You must set the Amazon Web Services Region to us-east-1. You must have a Business, Enterprise On-Ramp, or Enterprise Support plan to use the Amazon Web Services Support API. If you call the Amazon Web Services Support API from an account that doesn't have a Business, Enterprise On-Ramp, or Enterprise Support plan, the SubscriptionRequiredException error message appears. For information about changing your support plan, see Amazon Web Services Support. The names and descriptions for Trusted Advisor checks are subject to change. We recommend that you specify the check ID in your code to uniquely identify a check. To call the Trusted Advisor operations in the Amazon Web Services Support API, you must use the US East (N. Virginia) endpoint. Currently, the US West (Oregon) and Europe (Ireland) endpoints don't support the Trusted Advisor operations. For more information, see About the Amazon Web Services Support API in the Amazon Web Services Support User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSupport_20130415.DescribeTrustedAdvisorChecks
            default: AWSSupport_20130415.DescribeTrustedAdvisorChecks
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                language:
                  $ref: "#/components/schemas/String"
                  description: "The ISO 639-1 code for the language that you want your checks to appear in. The Amazon Web Services Support API currently supports the following languages for Trusted Advisor: Chinese, Simplified - zh Chinese, Traditional - zh_TW English - en French - fr German - de Indonesian - id Italian - it Japanese - ja Korean - ko Portuguese, Brazilian - pt_BR Spanish - es"
              required:
                - language
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeTrustedAdvisorChecksResponse"
  /RefreshTrustedAdvisorCheck:
    post:
      operationId: RefreshTrustedAdvisorCheck
      description: Refreshes the Trusted Advisor check that you specify using the check ID. You can get the check IDs by calling the DescribeTrustedAdvisorChecks operation. Some checks are refreshed automatically. If you call the RefreshTrustedAdvisorCheck operation to refresh them, you might see the InvalidParameterValue error. The response contains a TrustedAdvisorCheckRefreshStatus object. You must have a Business, Enterprise On-Ramp, or Enterprise Support plan to use the Amazon Web Services Support API. If you call the Amazon Web Services Support API from an account that doesn't have a Business, Enterprise On-Ramp, or Enterprise Support plan, the SubscriptionRequiredException error message appears. For information about changing your support plan, see Amazon Web Services Support. To call the Trusted Advisor operations in the Amazon Web Services Support API, you must use the US East (N. Virginia) endpoint. Currently, the US West (Oregon) and Europe (Ireland) endpoints don't support the Trusted Advisor operations. For more information, see About the Amazon Web Services Support API in the Amazon Web Services Support User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSupport_20130415.RefreshTrustedAdvisorCheck
            default: AWSSupport_20130415.RefreshTrustedAdvisorCheck
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                checkId:
                  $ref: "#/components/schemas/String"
                  description: The unique identifier for the Trusted Advisor check to refresh. Specifying the check ID of a check that is automatically refreshed causes an InvalidParameterValue error.
              required:
                - checkId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTrustedAdvisorCheckResponse"
  /ResolveCase:
    post:
      operationId: ResolveCase
      description: Resolves a support case. This operation takes a caseId and returns the initial and final state of the case. You must have a Business, Enterprise On-Ramp, or Enterprise Support plan to use the Amazon Web Services Support API. If you call the Amazon Web Services Support API from an account that doesn't have a Business, Enterprise On-Ramp, or Enterprise Support plan, the SubscriptionRequiredException error message appears. For information about changing your support plan, see Amazon Web Services Support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSSupport_20130415.ResolveCase
            default: AWSSupport_20130415.ResolveCase
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                caseId:
                  $ref: "#/components/schemas/CaseId"
                  description: "The support case ID requested or returned in the call. The case ID is an alphanumeric string formatted as shown in this example: case-12345678910-2013-c4c1d2bf33c5cf47"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveCaseResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AttachmentSetId:
      type: string
    Attachments:
      type: array
      items:
        $ref: "#/components/schemas/Attachment"
    Attachment:
      description: "An attachment to a case communication. The attachment consists of the file name and the content of the file. Each attachment file size should not exceed 5 MB. File types that are supported include the following: pdf, jpeg,.doc, .log, .text"
      type: object
      properties:
        fileName:
          $ref: "#/components/schemas/FileName"
          description: The name of the attachment file.
        data:
          $ref: "#/components/schemas/Data"
          description: The content of the attachment file.
    FileName:
      type: string
    Data:
      type: string
      format: byte
    AddAttachmentsToSetResponse:
      description: The ID and expiry time of the attachment set returned by the AddAttachmentsToSet operation.
      type: object
      properties:
        attachmentSetId:
          $ref: "#/components/schemas/AttachmentSetId"
          description: The ID of the attachment set. If an attachmentSetId was not specified, a new attachment set is created, and the ID of the set is returned in the response. If an attachmentSetId was specified, the attachments are added to the specified set, if it exists.
        expiryTime:
          $ref: "#/components/schemas/ExpiryTime"
          description: The time and date when the attachment set expires.
    ExpiryTime:
      type: string
    CaseId:
      type: string
    CommunicationBody:
      type: string
      minLength: 1
      maxLength: 8000
    CcEmailAddressList:
      type: array
      items:
        $ref: "#/components/schemas/CcEmailAddress"
    CcEmailAddress:
      type: string
    AddCommunicationToCaseResponse:
      description: The result of the AddCommunicationToCase operation.
      type: object
      properties:
        result:
          $ref: "#/components/schemas/Result"
          description: True if AddCommunicationToCase succeeds. Otherwise, returns an error.
    Result:
      type: boolean
    Subject:
      type: string
    ServiceCode:
      type: string
    SeverityCode:
      type: string
    CategoryCode:
      type: string
    Language:
      type: string
    IssueType:
      type: string
    CreateCaseResponse:
      description: The support case ID returned by a successful completion of the CreateCase operation.
      type: object
      properties:
        caseId:
          $ref: "#/components/schemas/CaseId"
          description: "The support case ID requested or returned in the call. The case ID is an alphanumeric string in the following format: case-12345678910-2013-c4c1d2bf33c5cf47"
    AttachmentId:
      type: string
    DescribeAttachmentResponse:
      description: The content and file name of the attachment returned by the DescribeAttachment operation.
      type: object
      properties:
        attachment:
          $ref: "#/components/schemas/Attachment"
          description: This object includes the attachment content and file name. In the previous response syntax, the value for the data parameter appears as blob, which is represented as a base64-encoded string. The value for fileName is the name of the attachment, such as troubleshoot-screenshot.png.
    CaseIdList:
      type: array
      items:
        $ref: "#/components/schemas/CaseId"
    DisplayId:
      type: string
    AfterTime:
      type: string
    BeforeTime:
      type: string
    IncludeResolvedCases:
      type: boolean
    NextToken:
      type: string
    MaxResults:
      type: integer
      minimum: 10
      maximum: 100
    IncludeCommunications:
      type: boolean
    DescribeCasesResponse:
      description: Returns an array of CaseDetails objects and a nextToken that defines a point for pagination in the result set.
      type: object
      properties:
        cases:
          $ref: "#/components/schemas/CaseList"
          description: The details for the cases that match the request.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: A resumption point for pagination.
    CaseList:
      type: array
      items:
        $ref: "#/components/schemas/CaseDetails"
    CaseDetails:
      description: 'A JSON-formatted object that contains the metadata for a support case. It is contained in the response from a DescribeCases request. CaseDetails contains the following fields: caseId - The support case ID requested or returned in the call. The case ID is an alphanumeric string formatted as shown in this example: case-12345678910-2013-c4c1d2bf33c5cf47. categoryCode - The category of problem for the support case. Corresponds to the CategoryCode values returned by a call to DescribeServices. displayId - The identifier for the case on pages in the Amazon Web Services Support Center. language - The language in which Amazon Web Services Support handles the case. Amazon Web Services Support currently supports Chinese (“zh”), English ("en"), Japanese ("ja") and Korean (“ko”). You must specify the ISO 639-1 code for the language parameter if you want support in that language. nextToken - A resumption point for pagination. recentCommunications - One or more Communication objects. Fields of these objects are attachments, body, caseId, submittedBy, and timeCreated. serviceCode - The identifier for the Amazon Web Services service that corresponds to the service code defined in the call to DescribeServices. severityCode - The severity code assigned to the case. Contains one of the values returned by the call to DescribeSeverityLevels. The possible values are: low, normal, high, urgent, and critical. status - The status of the case in the Amazon Web Services Support Center. Valid values: all-open customer-action-completed opened pending-customer-action reopened resolved unassigned work-in-progress subject - The subject line of the case. submittedBy - The email address of the account that submitted the case. timeCreated - The time the case was created, in ISO-8601 format.'
      type: object
      properties:
        caseId:
          $ref: "#/components/schemas/CaseId"
          description: "The support case ID requested or returned in the call. The case ID is an alphanumeric string formatted as shown in this example: case-12345678910-2013-c4c1d2bf33c5cf47"
        displayId:
          $ref: "#/components/schemas/DisplayId"
          description: The ID displayed for the case in the Amazon Web Services Support Center. This is a numeric string.
        subject:
          $ref: "#/components/schemas/Subject"
          description: The subject line for the case in the Amazon Web Services Support Center.
        status:
          $ref: "#/components/schemas/Status"
          description: "The status of the case. Valid values: all-open customer-action-completed opened pending-customer-action reopened resolved unassigned work-in-progress"
        serviceCode:
          $ref: "#/components/schemas/ServiceCode"
          description: The code for the Amazon Web Services service. You can get a list of codes and the corresponding service names by calling DescribeServices.
        categoryCode:
          $ref: "#/components/schemas/CategoryCode"
          description: The category of problem for the support case.
        severityCode:
          $ref: "#/components/schemas/SeverityCode"
          description: The code for the severity level returned by the call to DescribeSeverityLevels.
        submittedBy:
          $ref: "#/components/schemas/SubmittedBy"
          description: The email address of the account that submitted the case.
        timeCreated:
          $ref: "#/components/schemas/TimeCreated"
          description: The time that the case was created in the Amazon Web Services Support Center.
        recentCommunications:
          $ref: "#/components/schemas/RecentCaseCommunications"
          description: The five most recent communications between you and Amazon Web Services Support Center, including the IDs of any attachments to the communications. Also includes a nextToken that you can use to retrieve earlier communications.
        ccEmailAddresses:
          $ref: "#/components/schemas/CcEmailAddressList"
          description: The email addresses that receive copies of communication about the case.
        language:
          $ref: "#/components/schemas/Language"
          description: The language in which Amazon Web Services Support handles the case. Amazon Web Services Support currently supports Chinese (“zh”), English ("en"), Japanese ("ja") and Korean (“ko”). You must specify the ISO 639-1 code for the language parameter if you want support in that language.
    Status:
      type: string
    SubmittedBy:
      type: string
    TimeCreated:
      type: string
    RecentCaseCommunications:
      description: The five most recent communications associated with the case.
      type: object
      properties:
        communications:
          $ref: "#/components/schemas/CommunicationList"
          description: The five most recent communications associated with the case.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: A resumption point for pagination.
    CommunicationList:
      type: array
      items:
        $ref: "#/components/schemas/Communication"
    Communication:
      description: A communication associated with a support case. The communication consists of the case ID, the message body, attachment information, the submitter of the communication, and the date and time of the communication.
      type: object
      properties:
        caseId:
          $ref: "#/components/schemas/CaseId"
          description: "The support case ID requested or returned in the call. The case ID is an alphanumeric string formatted as shown in this example: case-12345678910-2013-c4c1d2bf33c5cf47"
        body:
          $ref: "#/components/schemas/ValidatedCommunicationBody"
          description: The text of the communication between the customer and Amazon Web Services Support.
        submittedBy:
          $ref: "#/components/schemas/SubmittedBy"
          description: The identity of the account that submitted, or responded to, the support case. Customer entries include the IAM role as well as the email address (for example, "AdminRole (Role) <janedoe@example.com>). Entries from the Amazon Web Services Support team display "Amazon Web Services," and don't show an email address.
        timeCreated:
          $ref: "#/components/schemas/TimeCreated"
          description: The time the communication was created.
        attachmentSet:
          $ref: "#/components/schemas/AttachmentSet"
          description: Information about the attachments to the case communication.
    ValidatedCommunicationBody:
      type: string
      minLength: 1
      maxLength: 8000
    AttachmentSet:
      type: array
      items:
        $ref: "#/components/schemas/AttachmentDetails"
    AttachmentDetails:
      description: The file name and ID of an attachment to a case communication. You can use the ID to retrieve the attachment with the DescribeAttachment operation.
      type: object
      properties:
        attachmentId:
          $ref: "#/components/schemas/AttachmentId"
          description: The ID of the attachment.
        fileName:
          $ref: "#/components/schemas/FileName"
          description: The file name of the attachment.
    DescribeCommunicationsResponse:
      description: The communications returned by the DescribeCommunications operation.
      type: object
      properties:
        communications:
          $ref: "#/components/schemas/CommunicationList"
          description: The communications for the case.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: A resumption point for pagination.
    DescribeCreateCaseOptionsResponse:
      type: object
      properties:
        languageAvailability:
          $ref: "#/components/schemas/ValidatedLanguageAvailability"
          description: "Language availability can be any of the following: available best_effort unavailable"
        communicationTypes:
          $ref: "#/components/schemas/CommunicationTypeOptionsList"
          description: A JSON-formatted array that contains the available communication type options, along with the available support timeframes for the given inputs.
    ValidatedLanguageAvailability:
      type: string
      minLength: 0
      maxLength: 100
    CommunicationTypeOptionsList:
      type: array
      items:
        $ref: "#/components/schemas/CommunicationTypeOptions"
    CommunicationTypeOptions:
      description: "A JSON-formatted object that contains the CommunicationTypeOptions for creating a case for a certain communication channel. It is contained in the response from a DescribeCreateCaseOptions request. CommunicationTypeOptions contains the following fields: datesWithoutSupport - A JSON-formatted list containing date and time ranges for periods without support in UTC time. Date and time format is RFC 3339 : 'yyyy-MM-dd'T'HH:mm:ss.SSSZZ'. supportedHours - A JSON-formatted list containing time ranges when support are available. Time format is RFC 3339 : 'HH:mm:ss.SSS'. type - A string value indicating the communication type that the aforementioned rules apply to. At the moment the type value can assume one of 3 values at the moment chat, web and call."
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/Type"
          description: A string value indicating the communication type. At the moment the type value can assume one of 3 values at the moment chat, web and call.
        supportedHours:
          $ref: "#/components/schemas/SupportedHoursList"
          description: A JSON-formatted list containing time ranges when support is available.
        datesWithoutSupport:
          $ref: "#/components/schemas/DatesWithoutSupportList"
          description: A JSON-formatted list containing date and time ranges for periods without support
    Type:
      type: string
    SupportedHoursList:
      type: array
      items:
        $ref: "#/components/schemas/SupportedHour"
    SupportedHour:
      description: Time range object with startTime and endTime range in RFC 3339 format. 'HH:mm:ss.SSS'.
      type: object
      properties:
        startTime:
          $ref: "#/components/schemas/StartTime"
          description: Start Time. RFC 3339 format 'HH:mm:ss.SSS'.
        endTime:
          $ref: "#/components/schemas/EndTime"
          description: End Time. RFC 3339 format 'HH:mm:ss.SSS'.
    StartTime:
      type: string
    EndTime:
      type: string
    DatesWithoutSupportList:
      type: array
      items:
        $ref: "#/components/schemas/DateInterval"
    DateInterval:
      description: "Date and time (UTC) format in RFC 3339 : 'yyyy-MM-dd'T'HH:mm:ss.SSSZZ'."
      type: object
      properties:
        startDateTime:
          $ref: "#/components/schemas/ValidatedDateTime"
          description: "A JSON object containing start and date time (UTC). Date and time format is RFC 3339 : 'yyyy-MM-dd'T'HH:mm:ss.SSSZZ'."
        endDateTime:
          $ref: "#/components/schemas/ValidatedDateTime"
          description: "End Date Time (UTC). RFC 3339 format : 'yyyy-MM-dd'T'HH:mm:ss.SSSZZ'."
    ValidatedDateTime:
      type: string
      minLength: 8
      maxLength: 30
    ServiceCodeList:
      type: array
      items:
        $ref: "#/components/schemas/ServiceCode"
    DescribeServicesResponse:
      description: The list of Amazon Web Services services returned by the DescribeServices operation.
      type: object
      properties:
        services:
          $ref: "#/components/schemas/ServiceList"
          description: A JSON-formatted list of Amazon Web Services services.
    ServiceList:
      type: array
      items:
        $ref: "#/components/schemas/Service"
    Service:
      description: Information about an Amazon Web Services service returned by the DescribeServices operation.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/ServiceCode"
          description: The code for an Amazon Web Services service returned by the DescribeServices response. The name element contains the corresponding friendly name.
        name:
          $ref: "#/components/schemas/ServiceName"
          description: The friendly name for an Amazon Web Services service. The code element contains the corresponding code.
        categories:
          $ref: "#/components/schemas/CategoryList"
          description: A list of categories that describe the type of support issue a case describes. Categories consist of a category name and a category code. Category names and codes are passed to Amazon Web Services Support when you call CreateCase.
    ServiceName:
      type: string
    CategoryList:
      type: array
      items:
        $ref: "#/components/schemas/Category"
    Category:
      description: A JSON-formatted name/value pair that represents the category name and category code of the problem, selected from the DescribeServices response for each Amazon Web Services service.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/CategoryCode"
          description: The category code for the support case.
        name:
          $ref: "#/components/schemas/CategoryName"
          description: The category name for the support case.
    CategoryName:
      type: string
    DescribeSeverityLevelsResponse:
      description: The list of severity levels returned by the DescribeSeverityLevels operation.
      type: object
      properties:
        severityLevels:
          $ref: "#/components/schemas/SeverityLevelsList"
          description: The available severity levels for the support case. Available severity levels are defined by your service level agreement with Amazon Web Services.
    SeverityLevelsList:
      type: array
      items:
        $ref: "#/components/schemas/SeverityLevel"
    SeverityLevel:
      description: A code and name pair that represents the severity level of a support case. The available values depend on the support plan for the account. For more information, see Choosing a severity in the Amazon Web Services Support User Guide.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/SeverityLevelCode"
          description: "The code for case severity level. Valid values: low | normal | high | urgent | critical"
        name:
          $ref: "#/components/schemas/SeverityLevelName"
          description: "The name of the severity level that corresponds to the severity level code. The values returned by the API are different from the values that appear in the Amazon Web Services Support Center. For example, the API uses the code low, but the name appears as General guidance in Support Center. The following are the API code names and how they appear in the console: low - General guidance normal - System impaired high - Production system impaired urgent - Production system down critical - Business-critical system down For more information, see Choosing a severity in the Amazon Web Services Support User Guide."
    SeverityLevelCode:
      type: string
    SeverityLevelName:
      type: string
    ValidatedIssueTypeString:
      type: string
      minLength: 9
      maxLength: 22
    ValidatedServiceCode:
      type: string
      minLength: 0
      maxLength: 100
    ValidatedCategoryCode:
      type: string
      minLength: 0
      maxLength: 100
    DescribeSupportedLanguagesResponse:
      type: object
      properties:
        supportedLanguages:
          $ref: "#/components/schemas/SupportedLanguagesList"
          description: A JSON-formatted array that contains the available ISO 639-1 language codes.
    SupportedLanguagesList:
      type: array
      items:
        $ref: "#/components/schemas/SupportedLanguage"
    SupportedLanguage:
      description: A JSON-formatted object that contains the available ISO 639-1 language code, language name and langauge display value. The language code is what should be used in the CreateCase call.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/Code"
          description: 2 digit ISO 639-1 code. e.g. en
        language:
          $ref: "#/components/schemas/Language"
          description: Full language description e.g. ENGLISH
        display:
          $ref: "#/components/schemas/Display"
          description: Language display value e.g. ENGLISH
    Code:
      type: string
    Display:
      type: string
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    String:
      type: string
    DescribeTrustedAdvisorCheckRefreshStatusesResponse:
      description: The statuses of the Trusted Advisor checks returned by the DescribeTrustedAdvisorCheckRefreshStatuses operation.
      type: object
      properties:
        statuses:
          $ref: "#/components/schemas/TrustedAdvisorCheckRefreshStatusList"
          description: The refresh status of the specified Trusted Advisor checks.
      required:
        - statuses
    TrustedAdvisorCheckRefreshStatusList:
      type: array
      items:
        $ref: "#/components/schemas/TrustedAdvisorCheckRefreshStatus"
    TrustedAdvisorCheckRefreshStatus:
      description: The refresh status of a Trusted Advisor check.
      type: object
      properties:
        checkId:
          $ref: "#/components/schemas/String"
          description: The unique identifier for the Trusted Advisor check.
        status:
          $ref: "#/components/schemas/String"
          description: "The status of the Trusted Advisor check for which a refresh has been requested: none - The check is not refreshed or the non-success status exceeds the timeout enqueued - The check refresh requests has entered the refresh queue processing - The check refresh request is picked up by the rule processing engine success - The check is successfully refreshed abandoned - The check refresh has failed"
        millisUntilNextRefreshable:
          $ref: "#/components/schemas/Long"
          description: The amount of time, in milliseconds, until the Trusted Advisor check is eligible for refresh.
      required:
        - checkId
        - status
        - millisUntilNextRefreshable
    Long:
      type: integer
      format: int64
    DescribeTrustedAdvisorCheckResultResponse:
      description: The result of the Trusted Advisor check returned by the DescribeTrustedAdvisorCheckResult operation.
      type: object
      properties:
        result:
          $ref: "#/components/schemas/TrustedAdvisorCheckResult"
          description: The detailed results of the Trusted Advisor check.
    TrustedAdvisorCheckResult:
      description: The results of a Trusted Advisor check returned by DescribeTrustedAdvisorCheckResult.
      type: object
      properties:
        checkId:
          $ref: "#/components/schemas/String"
          description: The unique identifier for the Trusted Advisor check.
        timestamp:
          $ref: "#/components/schemas/String"
          description: The time of the last refresh of the check.
        status:
          $ref: "#/components/schemas/String"
          description: 'The alert status of the check: "ok" (green), "warning" (yellow), "error" (red), or "not_available".'
        resourcesSummary:
          $ref: "#/components/schemas/TrustedAdvisorResourcesSummary"
        categorySpecificSummary:
          $ref: "#/components/schemas/TrustedAdvisorCategorySpecificSummary"
          description: Summary information that relates to the category of the check. Cost Optimizing is the only category that is currently supported.
        flaggedResources:
          $ref: "#/components/schemas/TrustedAdvisorResourceDetailList"
          description: The details about each resource listed in the check result.
      required:
        - checkId
        - timestamp
        - status
        - resourcesSummary
        - categorySpecificSummary
        - flaggedResources
    TrustedAdvisorResourcesSummary:
      description: Details about Amazon Web Services resources that were analyzed in a call to Trusted Advisor DescribeTrustedAdvisorCheckSummaries.
      type: object
      properties:
        resourcesProcessed:
          $ref: "#/components/schemas/Long"
          description: The number of Amazon Web Services resources that were analyzed by the Trusted Advisor check.
        resourcesFlagged:
          $ref: "#/components/schemas/Long"
          description: The number of Amazon Web Services resources that were flagged (listed) by the Trusted Advisor check.
        resourcesIgnored:
          $ref: "#/components/schemas/Long"
          description: The number of Amazon Web Services resources ignored by Trusted Advisor because information was unavailable.
        resourcesSuppressed:
          $ref: "#/components/schemas/Long"
          description: The number of Amazon Web Services resources ignored by Trusted Advisor because they were marked as suppressed by the user.
      required:
        - resourcesProcessed
        - resourcesFlagged
        - resourcesIgnored
        - resourcesSuppressed
    TrustedAdvisorCategorySpecificSummary:
      description: The container for summary information that relates to the category of the Trusted Advisor check.
      type: object
      properties:
        costOptimizing:
          $ref: "#/components/schemas/TrustedAdvisorCostOptimizingSummary"
          description: The summary information about cost savings for a Trusted Advisor check that is in the Cost Optimizing category.
