      description: The estimated cost savings that might be realized if the recommended operations are taken.
      type: object
      properties:
        estimatedMonthlySavings:
          $ref: "#/components/schemas/Double"
          description: The estimated monthly savings that might be realized if the recommended operations are taken.
        estimatedPercentMonthlySavings:
          $ref: "#/components/schemas/Double"
          description: The estimated percentage of savings that might be realized if the recommended operations are taken.
      required:
        - estimatedMonthlySavings
        - estimatedPercentMonthlySavings
    Double:
      type: number
      format: double
    TrustedAdvisorResourceDetailList:
      type: array
      items:
        $ref: "#/components/schemas/TrustedAdvisorResourceDetail"
    TrustedAdvisorResourceDetail:
      description: Contains information about a resource identified by a Trusted Advisor check.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/String"
          description: The status code for the resource identified in the Trusted Advisor check.
        region:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services Region in which the identified resource is located.
        resourceId:
          $ref: "#/components/schemas/String"
          description: The unique identifier for the identified resource.
        isSuppressed:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the Amazon Web Services resource was ignored by Trusted Advisor because it was marked as suppressed by the user.
        metadata:
          $ref: "#/components/schemas/StringList"
          description: Additional information about the identified resource. The exact metadata and its order can be obtained by inspecting the TrustedAdvisorCheckDescription object returned by the call to DescribeTrustedAdvisorChecks. Metadata contains all the data that is shown in the Excel download, even in those cases where the UI shows just summary data.
      required:
        - status
        - resourceId
        - metadata
    Boolean:
      type: boolean
    DescribeTrustedAdvisorCheckSummariesResponse:
      description: The summaries of the Trusted Advisor checks returned by the DescribeTrustedAdvisorCheckSummaries operation.
      type: object
      properties:
        summaries:
          $ref: "#/components/schemas/TrustedAdvisorCheckSummaryList"
          description: The summary information for the requested Trusted Advisor checks.
      required:
        - summaries
    TrustedAdvisorCheckSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/TrustedAdvisorCheckSummary"
    TrustedAdvisorCheckSummary:
      description: A summary of a Trusted Advisor check result, including the alert status, last refresh, and number of resources examined.
      type: object
      properties:
        checkId:
          $ref: "#/components/schemas/String"
          description: The unique identifier for the Trusted Advisor check.
        timestamp:
          $ref: "#/components/schemas/String"
          description: The time of the last refresh of the check.
        status:
          $ref: "#/components/schemas/String"
          description: 'The alert status of the check: "ok" (green), "warning" (yellow), "error" (red), or "not_available".'
        hasFlaggedResources:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the Trusted Advisor check has flagged resources.
        resourcesSummary:
          $ref: "#/components/schemas/TrustedAdvisorResourcesSummary"
        categorySpecificSummary:
          $ref: "#/components/schemas/TrustedAdvisorCategorySpecificSummary"
          description: Summary information that relates to the category of the check. Cost Optimizing is the only category that is currently supported.
      required:
        - checkId
        - timestamp
        - status
        - resourcesSummary
        - categorySpecificSummary
    DescribeTrustedAdvisorChecksResponse:
      description: Information about the Trusted Advisor checks returned by the DescribeTrustedAdvisorChecks operation.
      type: object
      properties:
        checks:
          $ref: "#/components/schemas/TrustedAdvisorCheckList"
          description: Information about all available Trusted Advisor checks.
      required:
        - checks
    TrustedAdvisorCheckList:
      type: array
      items:
        $ref: "#/components/schemas/TrustedAdvisorCheckDescription"
    TrustedAdvisorCheckDescription:
      description: The description and metadata for a Trusted Advisor check.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The unique identifier for the Trusted Advisor check.
        name:
          $ref: "#/components/schemas/String"
          description: The display name for the Trusted Advisor check.
        description:
          $ref: "#/components/schemas/String"
          description: The description of the Trusted Advisor check, which includes the alert criteria and recommended operations (contains HTML markup).
        category:
          $ref: "#/components/schemas/String"
          description: The category of the Trusted Advisor check.
        metadata:
          $ref: "#/components/schemas/StringList"
          description: The column headings for the data returned by the Trusted Advisor check. The order of the headings corresponds to the order of the data in the Metadata element of the TrustedAdvisorResourceDetail for the check. Metadata contains all the data that is shown in the Excel download, even in those cases where the UI shows just summary data.
      required:
        - id
        - name
        - description
        - category
        - metadata
    RefreshTrustedAdvisorCheckResponse:
      description: The current refresh status of a Trusted Advisor check.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/TrustedAdvisorCheckRefreshStatus"
          description: The current refresh status for a check, including the amount of time until the check is eligible for refresh.
      required:
        - status
