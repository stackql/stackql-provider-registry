      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of HTTP header names in the list.
        Items:
          $ref: "#/components/schemas/AccessControlAllowHeadersList"
          description: The list of HTTP header names. You can specify * to allow all headers.
      required:
        - Quantity
        - Items
    AccessControlAllowHeadersList:
      type: array
      items:
        $ref: "#/components/schemas/string"
    ResponseHeadersPolicyAccessControlAllowMethods:
      description: A list of HTTP methods that CloudFront includes as values for the Access-Control-Allow-Methods HTTP response header. For more information about the Access-Control-Allow-Methods HTTP response header, see Access-Control-Allow-Methods in the MDN Web Docs.
