    ResponseHeadersPolicyConfig:
      description: A response headers policy configuration. A response headers policy configuration contains metadata about the response headers policy, and configurations for sets of HTTP response headers.
      type: object
      properties:
        Comment:
          $ref: "#/components/schemas/string"
          description: A comment to describe the response headers policy. The comment cannot be longer than 128 characters.
        Name:
          $ref: "#/components/schemas/string"
          description: A name to identify the response headers policy. The name must be unique for response headers policies in this Amazon Web Services account.
        CorsConfig:
          $ref: "#/components/schemas/ResponseHeadersPolicyCorsConfig"
          description: A configuration for a set of HTTP response headers that are used for cross-origin resource sharing (CORS).
        SecurityHeadersConfig:
          $ref: "#/components/schemas/ResponseHeadersPolicySecurityHeadersConfig"
          description: A configuration for a set of security-related HTTP response headers.
        ServerTimingHeadersConfig:
          $ref: "#/components/schemas/ResponseHeadersPolicyServerTimingHeadersConfig"
          description: A configuration for enabling the Server-Timing header in HTTP responses sent from CloudFront.
        CustomHeadersConfig:
          $ref: "#/components/schemas/ResponseHeadersPolicyCustomHeadersConfig"
