      description: Deletes a cache policy. You cannot delete a cache policy if it's attached to a cache behavior. First update your distributions to remove the cache policy from all cache behaviors, then delete the cache policy. To delete a cache policy, you must provide the policy's identifier and version. To get these values, you can use ListCachePolicies or GetCachePolicy.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The unique identifier for the cache policy that you are deleting. To get the identifier, you can use ListCachePolicies.
        - name: If-Match
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The version of the cache policy that you are deleting. The version is the cache policy's ETag value, which you can get using ListCachePolicies, GetCachePolicy, or GetCachePolicyConfig.
      responses:
        "204":
          description: Success
    get:
      operationId: GetCachePolicy
      description: "Gets a cache policy, including the following metadata: The policy's identifier. The date and time when the policy was last modified. To get a cache policy, you must provide the policy's identifier. If the cache policy is attached to a distribution's cache behavior, you can get the policy's identifier using ListDistributions or GetDistribution. If the cache policy is not attached to a cache behavior, you can get the identifier using ListCachePolicies."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The unique identifier for the cache policy. If the cache policy is attached to a distribution's cache behavior, you can get the policy's identifier using ListDistributions or GetDistribution. If the cache policy is not attached to a cache behavior, you can get the identifier using ListCachePolicies.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCachePolicyOutputDisplay"
    put:
      operationId: UpdateCachePolicy
      description: "Updates a cache policy configuration. When you update a cache policy configuration, all the fields are updated with the values provided in the request. You cannot update some fields independent of others. To update a cache policy configuration: Use GetCachePolicyConfig to get the current configuration. Locally modify the fields in the cache policy configuration that you want to update. Call UpdateCachePolicy by providing the entire cache policy configuration, including the fields that you modified and those that you didn't. If your minimum TTL is greater than 0, CloudFront will cache content for at least the duration specified in the cache policy's minimum TTL, even if the Cache-Control: no-cache, no-store, or private directives are present in the origin headers."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The unique identifier for the cache policy that you are updating. The identifier is returned in a cache behavior's CachePolicyId field in the response to GetDistributionConfig.
        - name: If-Match
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The version of the cache policy that you are updating. The version is returned in the cache policy's ETag field in the response to GetCachePolicyConfig.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                CachePolicyConfig:
                  $ref: "#/components/schemas/CachePolicyConfig"
              required:
                - CachePolicyConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCachePolicyOutputDisplay"
