      responses:
        "204":
          description: Success
  /2020-05-31/distribution/{id}/promote-staging-config:
    put:
      operationId: UpdateDistributionWithStagingConfig
      description: "Copies the staging distribution's configuration to its corresponding primary distribution. The primary distribution retains its Aliases (also known as alternate domain names or CNAMEs) and ContinuousDeploymentPolicyId value, but otherwise its configuration is overwritten to match the staging distribution. You can use this operation in a continuous deployment workflow after you have tested configuration changes on the staging distribution. After using a continuous deployment policy to move a portion of your domain name's traffic to the staging distribution and verifying that it works as intended, you can use this operation to copy the staging distribution's configuration to the primary distribution. This action will disable the continuous deployment policy and move your domain's traffic back to the primary distribution. This API operation requires the following IAM permissions: GetDistribution UpdateDistribution"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The identifier of the primary distribution to which you are copying a staging distribution's configuration.
        - name: StagingDistributionId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The identifier of the staging distribution whose configuration you are copying to the primary distribution.
        - name: If-Match
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: "The current versions (ETag values) of both primary and staging distributions. Provide these in the following format: <primary ETag>, <staging ETag>"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDistributionWithStagingConfigOutputDisplay"
  /2020-05-31/domain-association:
    post:
      operationId: UpdateDomainAssociation
      description: We recommend that you use the UpdateDomainAssociation API operation to move a domain association, as it supports both standard distributions and distribution tenants. AssociateAlias performs similar checks but only supports standard distributions. Moves a domain from its current standard distribution or distribution tenant to another one. You must first disable the source distribution (standard distribution or distribution tenant) and then separately call this operation to move the domain to another target distribution (standard distribution or distribution tenant). To use this operation, specify the domain and the ID of the target resource (standard distribution or distribution tenant). For more information, including how to set up the target resource, prerequisites that you must complete, and other restrictions, see Moving an alternate domain name to a different standard distribution or distribution tenant in the Amazon CloudFront Developer Guide.
      parameters:
        - name: If-Match
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The value of the ETag identifier for the standard distribution or distribution tenant that will be associated with the domain.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                Domain:
                  $ref: "#/components/schemas/string"
                TargetResource:
                  $ref: "#/components/schemas/DistributionResourceId"
              required:
                - TargetResource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDomainAssociationOutputDisplay"
  /2020-05-31/verify-dns-configuration:
    post:
      operationId: VerifyDnsConfiguration
      description: Verify the DNS configuration for your domain names. This API operation checks whether your domain name points to the correct routing endpoint of the connection group, such as d111111abcdef8.cloudfront.net. You can use this API operation to troubleshoot and resolve DNS configuration issues.
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                Domain:
                  $ref: "#/components/schemas/string"
                Identifier:
                  $ref: "#/components/schemas/string"
              required:
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyDnsConfigurationOutputDisplay"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    string:
      type: string
    AssociateDistributionTenantWebACLResultDisplay:
      type: object
      properties:
        Id:
          type: string
          description: The ID of the distribution tenant.
        WebACLArn:
          type: string
          description: The ARN of the WAF web ACL that you associated with the distribution tenant.
        ETag:
          type: string
          description: The current version of the distribution tenant.
    AssociateDistributionTenantWebACLOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/AssociateDistributionTenantWebACLResultDisplay"
    AssociateDistributionWebACLResultDisplay:
      type: object
      properties:
        Id:
          type: string
          description: The ID of the distribution.
        WebACLArn:
          type: string
          description: The ARN of the WAF web ACL that you associated with the distribution.
        ETag:
          type: string
          description: The current version of the distribution.
    AssociateDistributionWebACLOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/AssociateDistributionWebACLResultDisplay"
    boolean:
      type: boolean
    DistributionDisplay:
      type: object
      properties:
        Id:
          type: string
          description: "The distribution's identifier. For example: E1U5RQF7T870K0."
        ARN:
          type: string
          description: The distribution's Amazon Resource Name (ARN).
        Status:
          type: string
          description: The distribution's status. When the status is Deployed, the distribution's information is fully propagated to all CloudFront edge locations.
        LastModifiedTime:
          type: string
          description: The date and time when the distribution was last modified.
        InProgressInvalidationBatches:
          type: integer
          description: The number of invalidation batches currently in progress.
        DomainName:
          type: string
          description: "The distribution's CloudFront domain name. For example: d111111abcdef8.cloudfront.net."
        ActiveTrustedSigners:
          type: string
          description: We recommend using TrustedKeyGroups instead of TrustedSigners. This field contains a list of Amazon Web Services account IDs and the active CloudFront key pairs in each account that CloudFront can use to verify the signatures of signed URLs or signed cookies.
        ActiveTrustedKeyGroups:
          type: string
          description: This field contains a list of key groups and the public keys in each key group that CloudFront can use to verify the signatures of signed URLs or signed cookies.
        DistributionConfig:
          type: string
          description: The distribution's configuration.
        AliasICPRecordals:
          type: string
          description: Amazon Web Services services in China customers must file for an Internet Content Provider (ICP) recordal if they want to serve content publicly on an alternate domain name, also known as a CNAME, that they've added to CloudFront. AliasICPRecordal provides the ICP recordal status for CNAMEs associated with distributions. For more information about ICP recordals, see Signup, Accounts, and Credentials in Getting Started with Amazon Web Services services in China.
    CopyDistributionOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DistributionDisplay"
    AnycastIpListName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9-_]{1,64}"
    integer:
      type: integer
    Tags:
      description: A complex type that contains zero or more Tag elements.
      type: object
      properties:
        Items:
          $ref: "#/components/schemas/TagList"
          description: A complex type that contains Tag elements.
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A complex type that contains Tag key and Tag value.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: "A string that contains Tag key. The string length should be between 1 and 128 characters. Valid characters include a-z, A-Z, 0-9, space, and the special characters _ - . : / = + @."
        Value:
          $ref: "#/components/schemas/TagValue"
          description: "A string that contains an optional Tag value. The string length should be between 0 and 256 characters. Valid characters include a-z, A-Z, 0-9, space, and the special characters _ - . : / = + @."
      required:
        - Key
    TagKey:
      description: "A string that contains Tag key. The string length should be between 1 and 128 characters. Valid characters include a-z, A-Z, 0-9, space, and the special characters _ - . : / = + @."
      type: string
      minLength: 1
      maxLength: 128
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    IpAddressType:
      type: string
      enum:
        - ipv4
        - ipv6
        - dualstack
    IpamCidrConfigList:
      type: array
      items:
        $ref: "#/components/schemas/IpamCidrConfig"
    IpamCidrConfig:
      description: Configuration for an IPAM CIDR that defines a specific IP address range, IPAM pool, and associated Anycast IP address.
      type: object
      properties:
        Cidr:
          $ref: "#/components/schemas/string"
          description: The CIDR that specifies the IP address range for this IPAM configuration.
        IpamPoolArn:
          $ref: "#/components/schemas/string"
          description: The Amazon Resource Name (ARN) of the IPAM pool that the CIDR block is assigned to.
        AnycastIp:
          $ref: "#/components/schemas/string"
          description: The specified Anycast IP address allocated from the IPAM pool for this CIDR configuration.
        Status:
          $ref: "#/components/schemas/IpamCidrStatus"
          description: The current status of the IPAM CIDR configuration.
      required:
        - Cidr
        - IpamPoolArn
    IpamCidrStatus:
      type: string
      enum:
        - provisioned
        - failed-provision
        - provisioning
        - deprovisioned
        - failed-deprovision
        - deprovisioning
        - advertised
        - failed-advertise
        - advertising
        - withdrawn
        - failed-withdraw
        - withdrawing
    AnycastIpListDisplay:
      type: object
      properties:
        Id:
          type: string
          description: The ID of the Anycast static IP list.
        Name:
          type: string
          description: The name of the Anycast static IP list.
        Status:
          type: string
          description: "The status of the Anycast static IP list. Valid values: Deployed, Deploying, or Failed."
        Arn:
          type: string
          description: The Amazon Resource Name (ARN) of the Anycast static IP list.
        IpAddressType:
          type: string
          description: The IP address type for the Anycast static IP list.
        IpamConfig:
          type: string
          description: The IPAM configuration for the Anycast static IP list, that contains the quantity and list of IPAM CIDR configurations.
        AnycastIps:
          type: string
          description: The static IP addresses that are allocated to the Anycast static IP list.
        IpCount:
          type: integer
          description: The number of IP addresses in the Anycast static IP list.
        LastModifiedTime:
          type: string
          description: The last time the Anycast static IP list was modified.
    CreateAnycastIpListOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/AnycastIpListDisplay"
    CachePolicyConfig:
      description: "A cache policy configuration. This configuration determines the following: The values that CloudFront includes in the cache key. These values can include HTTP headers, cookies, and URL query strings. CloudFront uses the cache key to find an object in its cache that it can return to the viewer. The default, minimum, and maximum time to live (TTL) values that you want objects to stay in the CloudFront cache. If your minimum TTL is greater than 0, CloudFront will cache content for at least the duration specified in the cache policy's minimum TTL, even if the Cache-Control: no-cache, no-store, or private directives are present in the origin headers. The headers, cookies, and query strings that are included in the cache key are also included in requests that CloudFront sends to the origin. CloudFront sends a request when it can't find a valid object in its cache that matches the request's cache key. If you want to send values to the origin but not include them in the cache key, use OriginRequestPolicy."
      type: object
      properties:
        Comment:
          $ref: "#/components/schemas/string"
          description: A comment to describe the cache policy. The comment cannot be longer than 128 characters.
        Name:
          $ref: "#/components/schemas/string"
          description: A unique name to identify the cache policy.
        DefaultTTL:
          $ref: "#/components/schemas/long"
          description: The default amount of time, in seconds, that you want objects to stay in the CloudFront cache before CloudFront sends another request to the origin to see if the object has been updated. CloudFront uses this value as the object's time to live (TTL) only when the origin does not send Cache-Control or Expires headers with the object. For more information, see Managing How Long Content Stays in an Edge Cache (Expiration) in the Amazon CloudFront Developer Guide. The default value for this field is 86400 seconds (one day). If the value of MinTTL is more than 86400 seconds, then the default value for this field is the same as the value of MinTTL.
        MaxTTL:
          $ref: "#/components/schemas/long"
          description: The maximum amount of time, in seconds, that objects stay in the CloudFront cache before CloudFront sends another request to the origin to see if the object has been updated. CloudFront uses this value only when the origin sends Cache-Control or Expires headers with the object. For more information, see Managing How Long Content Stays in an Edge Cache (Expiration) in the Amazon CloudFront Developer Guide. The default value for this field is 31536000 seconds (one year). If the value of MinTTL or DefaultTTL is more than 31536000 seconds, then the default value for this field is the same as the value of DefaultTTL.
        MinTTL:
          $ref: "#/components/schemas/long"
          description: The minimum amount of time, in seconds, that you want objects to stay in the CloudFront cache before CloudFront sends another request to the origin to see if the object has been updated. For more information, see Managing How Long Content Stays in an Edge Cache (Expiration) in the Amazon CloudFront Developer Guide.
        ParametersInCacheKeyAndForwardedToOrigin:
          $ref: "#/components/schemas/ParametersInCacheKeyAndForwardedToOrigin"
          description: The HTTP headers, cookies, and URL query strings to include in the cache key. The values included in the cache key are also included in requests that CloudFront sends to the origin.
      required:
        - Name
        - MinTTL
    long:
      type: integer
      format: int64
    ParametersInCacheKeyAndForwardedToOrigin:
      description: This object determines the values that CloudFront includes in the cache key. These values can include HTTP headers, cookies, and URL query strings. CloudFront uses the cache key to find an object in its cache that it can return to the viewer. The headers, cookies, and query strings that are included in the cache key are also included in requests that CloudFront sends to the origin. CloudFront sends a request when it can't find an object in its cache that matches the request's cache key. If you want to send values to the origin but not include them in the cache key, use OriginRequestPolicy.
      type: object
      properties:
        EnableAcceptEncodingGzip:
          $ref: "#/components/schemas/boolean"
          description: "A flag that can affect whether the Accept-Encoding HTTP header is included in the cache key and included in requests that CloudFront sends to the origin. This field is related to the EnableAcceptEncodingBrotli field. If one or both of these fields is true and the viewer request includes the Accept-Encoding header, then CloudFront does the following: Normalizes the value of the viewer's Accept-Encoding header Includes the normalized header in the cache key Includes the normalized header in the request to the origin, if a request is necessary For more information, see Compression support in the Amazon CloudFront Developer Guide. If you set this value to true, and this cache behavior also has an origin request policy attached, do not include the Accept-Encoding header in the origin request policy. CloudFront always includes the Accept-Encoding header in origin requests when the value of this field is true, so including this header in an origin request policy has no effect. If both of these fields are false, then CloudFront treats the Accept-Encoding header the same as any other HTTP header in the viewer request. By default, it's not included in the cache key and it's not included in origin requests. In this case, you can manually add Accept-Encoding to the headers whitelist like any other HTTP header."
        EnableAcceptEncodingBrotli:
          $ref: "#/components/schemas/boolean"
          description: "A flag that can affect whether the Accept-Encoding HTTP header is included in the cache key and included in requests that CloudFront sends to the origin. This field is related to the EnableAcceptEncodingGzip field. If one or both of these fields is true and the viewer request includes the Accept-Encoding header, then CloudFront does the following: Normalizes the value of the viewer's Accept-Encoding header Includes the normalized header in the cache key Includes the normalized header in the request to the origin, if a request is necessary For more information, see Compression support in the Amazon CloudFront Developer Guide. If you set this value to true, and this cache behavior also has an origin request policy attached, do not include the Accept-Encoding header in the origin request policy. CloudFront always includes the Accept-Encoding header in origin requests when the value of this field is true, so including this header in an origin request policy has no effect. If both of these fields are false, then CloudFront treats the Accept-Encoding header the same as any other HTTP header in the viewer request. By default, it's not included in the cache key and it's not included in origin requests. In this case, you can manually add Accept-Encoding to the headers whitelist like any other HTTP header."
        HeadersConfig:
          $ref: "#/components/schemas/CachePolicyHeadersConfig"
          description: An object that determines whether any HTTP headers (and if so, which headers) are included in the cache key and in requests that CloudFront sends to the origin.
        CookiesConfig:
          $ref: "#/components/schemas/CachePolicyCookiesConfig"
          description: An object that determines whether any cookies in viewer requests (and if so, which cookies) are included in the cache key and in requests that CloudFront sends to the origin.
        QueryStringsConfig:
          $ref: "#/components/schemas/CachePolicyQueryStringsConfig"
          description: An object that determines whether any URL query strings in viewer requests (and if so, which query strings) are included in the cache key and in requests that CloudFront sends to the origin.
      required:
        - EnableAcceptEncodingGzip
        - HeadersConfig
        - CookiesConfig
        - QueryStringsConfig
    CachePolicyHeadersConfig:
      description: An object that determines whether any HTTP headers (and if so, which headers) are included in the cache key and in requests that CloudFront sends to the origin.
      type: object
      properties:
        HeaderBehavior:
          $ref: "#/components/schemas/CachePolicyHeaderBehavior"
          description: "Determines whether any HTTP headers are included in the cache key and in requests that CloudFront sends to the origin. Valid values are: none – No HTTP headers are included in the cache key or in requests that CloudFront sends to the origin. Even when this field is set to none, any headers that are listed in an OriginRequestPolicy are included in origin requests. whitelist – Only the HTTP headers that are listed in the Headers type are included in the cache key and in requests that CloudFront sends to the origin."
        Headers:
          $ref: "#/components/schemas/Headers"
      required:
        - HeaderBehavior
    CachePolicyHeaderBehavior:
      type: string
      enum:
        - none
        - whitelist
    Headers:
      description: Contains a list of HTTP header names.
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of header names in the Items list.
        Items:
          $ref: "#/components/schemas/HeaderList"
          description: A list of HTTP header names.
      required:
        - Quantity
    HeaderList:
      type: array
      items:
        $ref: "#/components/schemas/string"
    CachePolicyCookiesConfig:
      description: An object that determines whether any cookies in viewer requests (and if so, which cookies) are included in the cache key and in requests that CloudFront sends to the origin.
      type: object
      properties:
        CookieBehavior:
          $ref: "#/components/schemas/CachePolicyCookieBehavior"
          description: "Determines whether any cookies in viewer requests are included in the cache key and in requests that CloudFront sends to the origin. Valid values are: none – No cookies in viewer requests are included in the cache key or in requests that CloudFront sends to the origin. Even when this field is set to none, any cookies that are listed in an OriginRequestPolicy are included in origin requests. whitelist – Only the cookies in viewer requests that are listed in the CookieNames type are included in the cache key and in requests that CloudFront sends to the origin. allExcept – All cookies in viewer requests are included in the cache key and in requests that CloudFront sends to the origin, except for those that are listed in the CookieNames type, which are not included. all – All cookies in viewer requests are included in the cache key and in requests that CloudFront sends to the origin."
        Cookies:
          $ref: "#/components/schemas/CookieNames"
      required:
        - CookieBehavior
    CachePolicyCookieBehavior:
      type: string
      enum:
        - none
        - whitelist
        - allExcept
        - all
    CookieNames:
      description: Contains a list of cookie names.
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of cookie names in the Items list.
        Items:
          $ref: "#/components/schemas/CookieNameList"
          description: A list of cookie names.
      required:
        - Quantity
    CookieNameList:
      type: array
      items:
        $ref: "#/components/schemas/string"
    CachePolicyQueryStringsConfig:
      description: An object that determines whether any URL query strings in viewer requests (and if so, which query strings) are included in the cache key and in requests that CloudFront sends to the origin.
      type: object
      properties:
        QueryStringBehavior:
          $ref: "#/components/schemas/CachePolicyQueryStringBehavior"
          description: "Determines whether any URL query strings in viewer requests are included in the cache key and in requests that CloudFront sends to the origin. Valid values are: none – No query strings in viewer requests are included in the cache key or in requests that CloudFront sends to the origin. Even when this field is set to none, any query strings that are listed in an OriginRequestPolicy are included in origin requests. whitelist – Only the query strings in viewer requests that are listed in the QueryStringNames type are included in the cache key and in requests that CloudFront sends to the origin. allExcept – All query strings in viewer requests are included in the cache key and in requests that CloudFront sends to the origin, except those that are listed in the QueryStringNames type, which are not included. all – All query strings in viewer requests are included in the cache key and in requests that CloudFront sends to the origin."
        QueryStrings:
          $ref: "#/components/schemas/QueryStringNames"
          description: Contains the specific query strings in viewer requests that either are or are not included in the cache key and in requests that CloudFront sends to the origin. The behavior depends on whether the QueryStringBehavior field in the CachePolicyQueryStringsConfig type is set to whitelist (the listed query strings are included) or allExcept (the listed query strings are not included, but all other query strings are).
      required:
        - QueryStringBehavior
    CachePolicyQueryStringBehavior:
      type: string
      enum:
        - none
        - whitelist
        - allExcept
        - all
    QueryStringNames:
      description: Contains a list of query string names.
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of query string names in the Items list.
        Items:
          $ref: "#/components/schemas/QueryStringNamesList"
          description: A list of query string names.
      required:
        - Quantity
    QueryStringNamesList:
      type: array
      items:
        $ref: "#/components/schemas/string"
    CachePolicyDisplay:
      type: object
      properties:
        Id:
          type: string
          description: The unique identifier for the cache policy.
        LastModifiedTime:
          type: string
          description: The date and time when the cache policy was last modified.
        CachePolicyConfig:
          type: string
          description: The cache policy configuration.
    CreateCachePolicyOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CachePolicyDisplay"
    CloudFrontOriginAccessIdentityConfig:
      description: Origin access identity configuration. Send a GET request to the /CloudFront API version/CloudFront/identity ID/config resource.
      type: object
      properties:
        CallerReference:
          $ref: "#/components/schemas/string"
          description: A unique value (for example, a date-time stamp) that ensures that the request can't be replayed. If the value of CallerReference is new (regardless of the content of the CloudFrontOriginAccessIdentityConfig object), a new origin access identity is created. If the CallerReference is a value already sent in a previous identity request, and the content of the CloudFrontOriginAccessIdentityConfig is identical to the original request (ignoring white space), the response includes the same information returned to the original request. If the CallerReference is a value you already sent in a previous request to create an identity, but the content of the CloudFrontOriginAccessIdentityConfig is different from the original request, CloudFront returns a CloudFrontOriginAccessIdentityAlreadyExists error.
        Comment:
          $ref: "#/components/schemas/string"
          description: A comment to describe the origin access identity. The comment cannot be longer than 128 characters.
      required:
        - CallerReference
        - Comment
    CloudFrontOriginAccessIdentityDisplay:
      type: object
      properties:
        Id:
          type: string
          description: The ID for the origin access identity, for example, E74FTE3AJFJ256A.
        S3CanonicalUserId:
          type: string
          description: The Amazon S3 canonical user ID for the origin access identity, used when giving the origin access identity read permission to an object in Amazon S3.
        CloudFrontOriginAccessIdentityConfig:
          type: string
          description: The current configuration information for the identity.
    CreateCloudFrontOriginAccessIdentityOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CloudFrontOriginAccessIdentityDisplay"
    FunctionName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9-_]{1,64}"
    FunctionConfig:
      description: Contains configuration information about a CloudFront function.
      type: object
      properties:
        Comment:
          $ref: "#/components/schemas/string"
          description: A comment to describe the function.
        Runtime:
          $ref: "#/components/schemas/FunctionRuntime"
          description: The function's runtime environment version.
        KeyValueStoreAssociations:
          $ref: "#/components/schemas/KeyValueStoreAssociations"
          description: The configuration for the key value store associations.
      required:
        - Comment
        - Runtime
    FunctionRuntime:
      type: string
      enum:
        - cloudfront-js-1.0
        - cloudfront-js-2.0
    KeyValueStoreAssociations:
      description: The key value store associations.
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The quantity of key value store associations.
        Items:
          $ref: "#/components/schemas/KeyValueStoreAssociationList"
          description: The items of the key value store association.
      required:
        - Quantity
    KeyValueStoreAssociationList:
      type: array
      items:
        $ref: "#/components/schemas/KeyValueStoreAssociation"
    KeyValueStoreAssociation:
      description: The key value store association.
      type: object
      properties:
        KeyValueStoreARN:
          $ref: "#/components/schemas/KeyValueStoreARN"
          description: The Amazon Resource Name (ARN) of the key value store association.
      required:
        - KeyValueStoreARN
    KeyValueStoreARN:
      type: string
      minLength: 0
      maxLength: 85
      pattern: arn:aws:cloudfront::[0-9]{12}:key-value-store\/[0-9a-fA-F-]{36}
    FunctionBlob:
      type: string
      format: byte
      minLength: 1
      maxLength: 40960
    CreateConnectionFunctionResultDisplay:
      type: object
      properties:
        ConnectionFunctionSummary:
          type: string
          description: The summary for the connection function.
        Location:
          type: string
          description: The location of the connection function.
        ETag:
          type: string
          description: The version identifier for the current version of the connection function.
    CreateConnectionFunctionOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateConnectionFunctionResultDisplay"
    ConnectionGroupDisplay:
      type: object
      properties:
        Id:
          type: string
          description: The ID of the connection group.
        Name:
          type: string
          description: The name of the connection group.
        Arn:
          type: string
          description: The Amazon Resource Name (ARN) of the connection group.
        CreatedTime:
          type: string
          description: The date and time when the connection group was created.
        LastModifiedTime:
          type: string
          description: The date and time when the connection group was updated.
        Tags:
          type: string
          description: A complex type that contains zero or more Tag elements.
        Ipv6Enabled:
          type: boolean
          description: IPv6 is enabled for the connection group.
        RoutingEndpoint:
          type: string
          description: The routing endpoint (also known as the DNS name) that is assigned to the connection group, such as d111111abcdef8.cloudfront.net.
        AnycastIpListId:
          type: string
          description: The ID of the Anycast static IP list.
        Status:
          type: string
          description: The status of the connection group.
        Enabled:
          type: boolean
          description: Whether the connection group is enabled.
        IsDefault:
          type: boolean
          description: Whether the connection group is the default connection group for the distribution tenants.
    CreateConnectionGroupOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ConnectionGroupDisplay"
    ContinuousDeploymentPolicyConfig:
      description: Contains the configuration for a continuous deployment policy.
      type: object
      properties:
        StagingDistributionDnsNames:
          $ref: "#/components/schemas/StagingDistributionDnsNames"
          description: "The CloudFront domain name of the staging distribution. For example: d111111abcdef8.cloudfront.net."
        Enabled:
          $ref: "#/components/schemas/boolean"
          description: A Boolean that indicates whether this continuous deployment policy is enabled (in effect). When this value is true, this policy is enabled and in effect. When this value is false, this policy is not enabled and has no effect.
        TrafficConfig:
          $ref: "#/components/schemas/TrafficConfig"
          description: Contains the parameters for routing production traffic from your primary to staging distributions.
      required:
        - StagingDistributionDnsNames
        - Enabled
    StagingDistributionDnsNames:
      description: The CloudFront domain name of the staging distribution.
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of CloudFront domain names in your staging distribution.
        Items:
          $ref: "#/components/schemas/StagingDistributionDnsNameList"
          description: The CloudFront domain name of the staging distribution.
      required:
        - Quantity
    StagingDistributionDnsNameList:
      type: array
      items:
        $ref: "#/components/schemas/string"
    TrafficConfig:
      description: The traffic configuration of your continuous deployment.
      type: object
      properties:
        SingleWeightConfig:
          $ref: "#/components/schemas/ContinuousDeploymentSingleWeightConfig"
          description: Contains the percentage of traffic to send to the staging distribution.
        SingleHeaderConfig:
          $ref: "#/components/schemas/ContinuousDeploymentSingleHeaderConfig"
          description: Determines which HTTP requests are sent to the staging distribution.
        Type:
          $ref: "#/components/schemas/ContinuousDeploymentPolicyType"
          description: The type of traffic configuration.
      required:
        - Type
    ContinuousDeploymentSingleWeightConfig:
      description: Contains the percentage of traffic to send to a staging distribution.
      type: object
      properties:
        Weight:
          $ref: "#/components/schemas/float"
          description: The percentage of traffic to send to a staging distribution, expressed as a decimal number between 0 and 0.15. For example, a value of 0.10 means 10% of traffic is sent to the staging distribution.
        SessionStickinessConfig:
          $ref: "#/components/schemas/SessionStickinessConfig"
      required:
        - Weight
    float:
      type: number
      format: float
    SessionStickinessConfig:
      description: Session stickiness provides the ability to define multiple requests from a single viewer as a single session. This prevents the potentially inconsistent experience of sending some of a given user's requests to your staging distribution, while others are sent to your primary distribution. Define the session duration using TTL values.
      type: object
      properties:
        IdleTTL:
          $ref: "#/components/schemas/integer"
          description: The amount of time after which you want sessions to cease if no requests are received. Allowed values are 300–3600 seconds (5–60 minutes). The value must be less than or equal to MaximumTTL.
        MaximumTTL:
          $ref: "#/components/schemas/integer"
          description: The maximum amount of time to consider requests from the viewer as being part of the same session. Allowed values are 300–3600 seconds (5–60 minutes). The value must be greater than or equal to IdleTTL.
      required:
        - IdleTTL
        - MaximumTTL
    ContinuousDeploymentSingleHeaderConfig:
      description: This configuration determines which HTTP requests are sent to the staging distribution. If the HTTP request contains a header and value that matches what you specify here, the request is sent to the staging distribution. Otherwise the request is sent to the primary distribution.
      type: object
      properties:
        Header:
          $ref: "#/components/schemas/string"
          description: The request header name that you want CloudFront to send to your staging distribution. The header must contain the prefix aws-cf-cd-.
        Value:
          $ref: "#/components/schemas/string"
          description: The request header value.
      required:
        - Header
        - Value
    ContinuousDeploymentPolicyType:
      type: string
      enum:
        - SingleWeight
        - SingleHeader
    ContinuousDeploymentPolicyDisplay:
      type: object
      properties:
        Id:
          type: string
          description: The identifier of the continuous deployment policy.
        LastModifiedTime:
          type: string
          description: The date and time the continuous deployment policy was last modified.
        ContinuousDeploymentPolicyConfig:
          type: string
          description: Contains the configuration for a continuous deployment policy.
    CreateContinuousDeploymentPolicyOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ContinuousDeploymentPolicyDisplay"
    DistributionConfig:
      description: A distribution configuration.
      type: object
      properties:
        CallerReference:
          $ref: "#/components/schemas/string"
          description: A unique value (for example, a date-time stamp) that ensures that the request can't be replayed. If the value of CallerReference is new (regardless of the content of the DistributionConfig object), CloudFront creates a new distribution. If CallerReference is a value that you already sent in a previous request to create a distribution, CloudFront returns a DistributionAlreadyExists error.
        Aliases:
          $ref: "#/components/schemas/Aliases"
          description: This field only supports standard distributions. You can't specify this field for multi-tenant distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. A complex type that contains information about CNAMEs (alternate domain names), if any, for this distribution.
        DefaultRootObject:
          $ref: "#/components/schemas/string"
          description: When a viewer requests the root URL for your distribution, the default root object is the object that you want CloudFront to request from your origin. For example, if your root URL is https://www.example.com, you can specify CloudFront to return the index.html file as the default root object. You can specify a default root object so that viewers see a specific file or object, instead of another object in your distribution (for example, https://www.example.com/product-description.html). A default root object avoids exposing the contents of your distribution. You can specify the object name or a path to the object name (for example, index.html or exampleFolderName/index.html). Your string can't begin with a forward slash (/). Only specify the object name or the path to the object. If you don't want to specify a default root object when you create a distribution, include an empty DefaultRootObject element. To delete the default root object from an existing distribution, update the distribution configuration and include an empty DefaultRootObject element. To replace the default root object, update the distribution configuration and specify the new object. For more information about the default root object, see Specify a default root object in the Amazon CloudFront Developer Guide.
        Origins:
          $ref: "#/components/schemas/Origins"
          description: A complex type that contains information about origins for this distribution.
        OriginGroups:
          $ref: "#/components/schemas/OriginGroups"
          description: A complex type that contains information about origin groups for this distribution.
        DefaultCacheBehavior:
          $ref: "#/components/schemas/DefaultCacheBehavior"
          description: A complex type that describes the default cache behavior if you don't specify a CacheBehavior element or if files don't match any of the values of PathPattern in CacheBehavior elements. You must create exactly one default cache behavior.
        CacheBehaviors:
          $ref: "#/components/schemas/CacheBehaviors"
          description: A complex type that contains zero or more CacheBehavior elements.
        CustomErrorResponses:
          $ref: "#/components/schemas/CustomErrorResponses"
          description: "A complex type that controls the following: Whether CloudFront replaces HTTP status codes in the 4xx and 5xx range with custom error messages before returning the response to the viewer. How long CloudFront caches HTTP status codes in the 4xx and 5xx range. For more information about custom error pages, see Customizing Error Responses in the Amazon CloudFront Developer Guide."
        Comment:
          $ref: "#/components/schemas/CommentType"
          description: A comment to describe the distribution. The comment cannot be longer than 128 characters.
        Logging:
          $ref: "#/components/schemas/LoggingConfig"
          description: A complex type that controls whether access logs are written for the distribution. For more information about logging, see Access Logs in the Amazon CloudFront Developer Guide.
        PriceClass:
          $ref: "#/components/schemas/PriceClass"
          description: This field only supports standard distributions. You can't specify this field for multi-tenant distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. The price class that corresponds with the maximum price that you want to pay for CloudFront service. If you specify PriceClass_All, CloudFront responds to requests for your objects from all CloudFront edge locations. If you specify a price class other than PriceClass_All, CloudFront serves your objects from the CloudFront edge location that has the lowest latency among the edge locations in your price class. Viewers who are in or near regions that are excluded from your specified price class may encounter slower performance. For more information about price classes, see Choosing the Price Class for a CloudFront Distribution in the Amazon CloudFront Developer Guide. For information about CloudFront pricing, including how price classes (such as Price Class 100) map to CloudFront regions, see Amazon CloudFront Pricing.
        Enabled:
          $ref: "#/components/schemas/boolean"
          description: From this field, you can enable or disable the selected distribution.
        ViewerCertificate:
          $ref: "#/components/schemas/ViewerCertificate"
          description: A complex type that determines the distribution's SSL/TLS configuration for communicating with viewers.
        Restrictions:
          $ref: "#/components/schemas/Restrictions"
          description: A complex type that identifies ways in which you want to restrict distribution of your content.
        WebACLId:
          $ref: "#/components/schemas/string"
          description: Multi-tenant distributions only support WAF V2 web ACLs. A unique identifier that specifies the WAF web ACL, if any, to associate with this distribution. To specify a web ACL created using the latest version of WAF, use the ACL ARN, for example arn:aws:wafv2:us-east-1:123456789012:global/webacl/ExampleWebACL/a1b2c3d4-5678-90ab-cdef-EXAMPLE11111. To specify a web ACL created using WAF Classic, use the ACL ID, for example a1b2c3d4-5678-90ab-cdef-EXAMPLE11111. WAF is a web application firewall that lets you monitor the HTTP and HTTPS requests that are forwarded to CloudFront, and lets you control access to your content. Based on conditions that you specify, such as the IP addresses that requests originate from or the values of query strings, CloudFront responds to requests either with the requested content or with an HTTP 403 status code (Forbidden). You can also configure CloudFront to return a custom error page when a request is blocked. For more information about WAF, see the WAF Developer Guide.
        HttpVersion:
          $ref: "#/components/schemas/HttpVersion"
          description: (Optional) Specify the HTTP version(s) that you want viewers to use to communicate with CloudFront. The default value for new web distributions is http2. Viewers that don't support HTTP/2 automatically use an earlier HTTP version. For viewers and CloudFront to use HTTP/2, viewers must support TLSv1.2 or later, and must support Server Name Indication (SNI). For viewers and CloudFront to use HTTP/3, viewers must support TLSv1.3 and Server Name Indication (SNI). CloudFront supports HTTP/3 connection migration to allow the viewer to switch networks without losing connection. For more information about connection migration, see Connection Migration at RFC 9000. For more information about supported TLSv1.3 ciphers, see Supported protocols and ciphers between viewers and CloudFront.
        IsIPV6Enabled:
          $ref: "#/components/schemas/boolean"
          description: "To use this field for a multi-tenant distribution, use a connection group instead. For more information, see ConnectionGroup. If you want CloudFront to respond to IPv6 DNS requests with an IPv6 address for your distribution, specify true. If you specify false, CloudFront responds to IPv6 DNS requests with the DNS response code NOERROR and with no IP addresses. This allows viewers to submit a second request, for an IPv4 address for your distribution. In general, you should enable IPv6 if you have users on IPv6 networks who want to access your content. However, if you're using signed URLs or signed cookies to restrict access to your content, and if you're using a custom policy that includes the IpAddress parameter to restrict the IP addresses that can access your content, don't enable IPv6. If you want to restrict access to some content by IP address and not restrict access to other content (or restrict access but not by IP address), you can create two distributions. For more information, see Creating a Signed URL Using a Custom Policy in the Amazon CloudFront Developer Guide. If you're using an Route 53 Amazon Web Services Integration alias resource record set to route traffic to your CloudFront distribution, you need to create a second alias resource record set when both of the following are true: You enable IPv6 for the distribution You're using alternate domain names in the URLs for your objects For more information, see Routing Traffic to an Amazon CloudFront Web Distribution by Using Your Domain Name in the Route 53 Amazon Web Services Integration Developer Guide. If you created a CNAME resource record set, either with Route 53 Amazon Web Services Integration or with another DNS service, you don't need to make any changes. A CNAME record will route traffic to your distribution regardless of the IP address format of the viewer request."
        ContinuousDeploymentPolicyId:
          $ref: "#/components/schemas/string"
          description: This field only supports standard distributions. You can't specify this field for multi-tenant distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. The identifier of a continuous deployment policy. For more information, see CreateContinuousDeploymentPolicy.
        Staging:
          $ref: "#/components/schemas/boolean"
          description: This field only supports standard distributions. You can't specify this field for multi-tenant distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. A Boolean that indicates whether this is a staging distribution. When this value is true, this is a staging distribution. When this value is false, this is not a staging distribution.
        AnycastIpListId:
          $ref: "#/components/schemas/string"
          description: To use this field for a multi-tenant distribution, use a connection group instead. For more information, see ConnectionGroup. ID of the Anycast static IP list that is associated with the distribution.
        TenantConfig:
          $ref: "#/components/schemas/TenantConfig"
          description: This field only supports multi-tenant distributions. You can't specify this field for standard distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. A distribution tenant configuration.
        ConnectionMode:
          $ref: "#/components/schemas/ConnectionMode"
          description: This field specifies whether the connection mode is through a standard distribution (direct) or a multi-tenant distribution with distribution tenants (tenant-only).
        ViewerMtlsConfig:
          $ref: "#/components/schemas/ViewerMtlsConfig"
          description: The distribution's viewer mTLS configuration.
        ConnectionFunctionAssociation:
          $ref: "#/components/schemas/ConnectionFunctionAssociation"
          description: The distribution's connection function association.
        CacheTagConfig:
          $ref: "#/components/schemas/CacheTagConfig"
          description: Configuration for cache tag extraction from origin responses. When specified, CloudFront reads the header named in HeaderName from origin responses and stores the comma-separated values as cache tags on the object. Distributions without CacheTagConfig do not extract tags. When CacheTagConfig is removed from a distribution via UpdateDistribution, CloudFront stops extracting tags from origin responses. Changing the HeaderName on an existing distribution does not retroactively affect previously cached objects. Tag-based invalidations will not apply to objects already cached using a previous header. To ensure tag invalidations function after updating the header name, use path-based invalidations to recache all objects that use cache tags.
      required:
        - CallerReference
        - Origins
        - DefaultCacheBehavior
        - Comment
        - Enabled
    Aliases:
      description: A complex type that contains information about CNAMEs (alternate domain names), if any, for this distribution.
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of CNAME aliases, if any, that you want to associate with this distribution.
        Items:
          $ref: "#/components/schemas/AliasList"
          description: A complex type that contains the CNAME aliases, if any, that you want to associate with this distribution.
      required:
        - Quantity
    AliasList:
      type: array
      items:
        $ref: "#/components/schemas/string"
    Origins:
      description: Contains information about the origins for this distribution.
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of origins for this distribution.
        Items:
          $ref: "#/components/schemas/OriginList"
          description: A list of origins.
      required:
        - Quantity
        - Items
    OriginList:
      type: array
      items:
        $ref: "#/components/schemas/Origin"
    Origin:
      description: "An origin. An origin is the location where content is stored, and from which CloudFront gets content to serve to viewers. To specify an origin: Use S3OriginConfig to specify an Amazon S3 bucket that is not configured with static website hosting. Use VpcOriginConfig to specify a VPC origin. Use CustomOriginConfig to specify all other kinds of origins, including: An Amazon S3 bucket that is configured with static website hosting An Elastic Load Balancing load balancer An Elemental MediaPackage endpoint An Elemental MediaStore container Any other HTTP server, running on an Amazon EC2 instance or any other kind of host For the current maximum number of origins that you can specify per distribution, see General Quotas on Web Distributions in the Amazon CloudFront Developer Guide (quotas were formerly referred to as limits)."
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/string"
          description: A unique identifier for the origin. This value must be unique within the distribution. Use this value to specify the TargetOriginId in a CacheBehavior or DefaultCacheBehavior.
        DomainName:
          $ref: "#/components/schemas/string"
          description: The domain name for the origin. For more information, see Origin Domain Name in the Amazon CloudFront Developer Guide.
        OriginPath:
          $ref: "#/components/schemas/string"
          description: An optional path that CloudFront appends to the origin domain name when CloudFront requests content from the origin. For more information, see Origin Path in the Amazon CloudFront Developer Guide.
        CustomHeaders:
          $ref: "#/components/schemas/CustomHeaders"
          description: A list of HTTP header names and values that CloudFront adds to the requests that it sends to the origin. For more information, see Adding Custom Headers to Origin Requests in the Amazon CloudFront Developer Guide.
        S3OriginConfig:
          $ref: "#/components/schemas/S3OriginConfig"
          description: Use this type to specify an origin that is an Amazon S3 bucket that is not configured with static website hosting. To specify any other type of origin, including an Amazon S3 bucket that is configured with static website hosting, use the CustomOriginConfig type instead.
        CustomOriginConfig:
          $ref: "#/components/schemas/CustomOriginConfig"
          description: Use this type to specify an origin that is not an Amazon S3 bucket, with one exception. If the Amazon S3 bucket is configured with static website hosting, use this type. If the Amazon S3 bucket is not configured with static website hosting, use the S3OriginConfig type instead.
        VpcOriginConfig:
          $ref: "#/components/schemas/VpcOriginConfig"
          description: The VPC origin configuration.
        ConnectionAttempts:
          $ref: "#/components/schemas/integer"
          description: The number of times that CloudFront attempts to connect to the origin. The minimum number is 1, the maximum is 3, and the default (if you don't specify otherwise) is 3. For a custom origin (including an Amazon S3 bucket that's configured with static website hosting), this value also specifies the number of times that CloudFront attempts to get a response from the origin, in the case of an Origin Response Timeout. For more information, see Origin Connection Attempts in the Amazon CloudFront Developer Guide.
        ConnectionTimeout:
          $ref: "#/components/schemas/integer"
          description: The number of seconds that CloudFront waits when trying to establish a connection to the origin. The minimum timeout is 1 second, the maximum is 10 seconds, and the default (if you don't specify otherwise) is 10 seconds. For more information, see Origin Connection Timeout in the Amazon CloudFront Developer Guide.
        ResponseCompletionTimeout:
          $ref: "#/components/schemas/integer"
          description: The time (in seconds) that a request from CloudFront to the origin can stay open and wait for a response. If the complete response isn't received from the origin by this time, CloudFront ends the connection. The value for ResponseCompletionTimeout must be equal to or greater than the value for OriginReadTimeout. If you don't set a value for ResponseCompletionTimeout, CloudFront doesn't enforce a maximum value. For more information, see Response completion timeout in the Amazon CloudFront Developer Guide.
        OriginShield:
          $ref: "#/components/schemas/OriginShield"
          description: CloudFront Origin Shield. Using Origin Shield can help reduce the load on your origin. For more information, see Using Origin Shield in the Amazon CloudFront Developer Guide.
        OriginAccessControlId:
          $ref: "#/components/schemas/string"
          description: The unique identifier of an origin access control for this origin. For more information, see Restricting access to an Amazon S3 origin in the Amazon CloudFront Developer Guide.
      required:
        - Id
        - DomainName
    CustomHeaders:
      description: A complex type that contains the list of Custom Headers for each origin.
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of custom headers, if any, for this distribution.
        Items:
          $ref: "#/components/schemas/OriginCustomHeadersList"
          description: "Optional: A list that contains one OriginCustomHeader element for each custom header that you want CloudFront to forward to the origin. If Quantity is 0, omit Items."
      required:
        - Quantity
    OriginCustomHeadersList:
      type: array
      items:
        $ref: "#/components/schemas/OriginCustomHeader"
    OriginCustomHeader:
      description: A complex type that contains HeaderName and HeaderValue elements, if any, for this distribution.
      type: object
      properties:
        HeaderName:
          $ref: "#/components/schemas/string"
          description: The name of a header that you want CloudFront to send to your origin. For more information, see Adding Custom Headers to Origin Requests in the Amazon CloudFront Developer Guide.
        HeaderValue:
          $ref: "#/components/schemas/sensitiveStringType"
          description: The value for the header that you specified in the HeaderName field.
      required:
        - HeaderName
        - HeaderValue
    sensitiveStringType:
      type: string
    S3OriginConfig:
      description: A complex type that contains information about the Amazon S3 origin. If the origin is a custom origin or an S3 bucket that is configured as a website endpoint, use the CustomOriginConfig element instead.
      type: object
      properties:
        OriginAccessIdentity:
          $ref: "#/components/schemas/string"
          description: "If you're using origin access control (OAC) instead of origin access identity, specify an empty OriginAccessIdentity element. For more information, see Restricting access to an Amazon Web Services in the Amazon CloudFront Developer Guide. The CloudFront origin access identity to associate with the origin. Use an origin access identity to configure the origin so that viewers can only access objects in an Amazon S3 bucket through CloudFront. The format of the value is: origin-access-identity/cloudfront/ID-of-origin-access-identity The ID-of-origin-access-identity is the value that CloudFront returned in the ID element when you created the origin access identity. If you want viewers to be able to access objects using either the CloudFront URL or the Amazon S3 URL, specify an empty OriginAccessIdentity element. To delete the origin access identity from an existing distribution, update the distribution configuration and include an empty OriginAccessIdentity element. To replace the origin access identity, update the distribution configuration and specify the new origin access identity. For more information about the origin access identity, see Serving Private Content through CloudFront in the Amazon CloudFront Developer Guide."
        OriginReadTimeout:
          $ref: "#/components/schemas/integer"
          description: Specifies how long, in seconds, CloudFront waits for a response from the origin. This is also known as the origin response timeout. The minimum timeout is 1 second, the maximum is 120 seconds, and the default (if you don't specify otherwise) is 30 seconds. For more information, see Response timeout in the Amazon CloudFront Developer Guide.
      required:
        - OriginAccessIdentity
    CustomOriginConfig:
      description: A custom origin. A custom origin is any origin that is not an Amazon S3 bucket, with one exception. An Amazon S3 bucket that is configured with static website hosting is a custom origin.
      type: object
      properties:
        HTTPPort:
          $ref: "#/components/schemas/integer"
          description: The HTTP port that CloudFront uses to connect to the origin. Specify the HTTP port that the origin listens on.
        HTTPSPort:
          $ref: "#/components/schemas/integer"
          description: The HTTPS port that CloudFront uses to connect to the origin. Specify the HTTPS port that the origin listens on.
        OriginProtocolPolicy:
          $ref: "#/components/schemas/OriginProtocolPolicy"
          description: "Specifies the protocol (HTTP or HTTPS) that CloudFront uses to connect to the origin. Valid values are: http-only – CloudFront always uses HTTP to connect to the origin. match-viewer – CloudFront connects to the origin using the same protocol that the viewer used to connect to CloudFront. https-only – CloudFront always uses HTTPS to connect to the origin."
        OriginSslProtocols:
          $ref: "#/components/schemas/OriginSslProtocols"
          description: Specifies the minimum SSL/TLS protocol that CloudFront uses when connecting to your origin over HTTPS. Valid values include SSLv3, TLSv1, TLSv1.1, and TLSv1.2. For more information, see Minimum Origin SSL Protocol in the Amazon CloudFront Developer Guide.
        OriginReadTimeout:
          $ref: "#/components/schemas/integer"
          description: Specifies how long, in seconds, CloudFront waits for a response from the origin. This is also known as the origin response timeout. The minimum timeout is 1 second, the maximum is 120 seconds, and the default (if you don't specify otherwise) is 30 seconds. For more information, see Response timeout in the Amazon CloudFront Developer Guide.
        OriginKeepaliveTimeout:
          $ref: "#/components/schemas/integer"
          description: Specifies how long, in seconds, CloudFront persists its connection to the origin. The minimum timeout is 1 second, the maximum is 120 seconds, and the default (if you don't specify otherwise) is 5 seconds. For more information, see Keep-alive timeout (custom origins only) in the Amazon CloudFront Developer Guide.
        IpAddressType:
          $ref: "#/components/schemas/IpAddressType"
          description: Specifies which IP protocol CloudFront uses when connecting to your origin. If your origin uses both IPv4 and IPv6 protocols, you can choose dualstack to help optimize reliability.
        OriginMtlsConfig:
          $ref: "#/components/schemas/OriginMtlsConfig"
          description: Configures mutual TLS authentication between CloudFront and your origin server.
      required:
        - HTTPPort
        - HTTPSPort
        - OriginProtocolPolicy
    OriginProtocolPolicy:
      type: string
      enum:
        - http-only
        - match-viewer
        - https-only
    OriginSslProtocols:
      description: A complex type that contains information about the SSL/TLS protocols that CloudFront can use when establishing an HTTPS connection with your origin.
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of SSL/TLS protocols that you want to allow CloudFront to use when establishing an HTTPS connection with this origin.
        Items:
          $ref: "#/components/schemas/SslProtocolsList"
          description: A list that contains allowed SSL/TLS protocols for this distribution.
      required:
        - Quantity
        - Items
    SslProtocolsList:
      type: array
      items:
        $ref: "#/components/schemas/SslProtocol"
    SslProtocol:
      type: string
      enum:
        - SSLv3
        - TLSv1
        - TLSv1.1
        - TLSv1.2
    OriginMtlsConfig:
      description: Configures mutual TLS authentication between CloudFront and your origin server.
      type: object
      properties:
        ClientCertificateArn:
          $ref: "#/components/schemas/string"
          description: The Amazon Resource Name (ARN) of the client certificate stored in Amazon Web Services Certificate Manager (ACM) that CloudFront uses to authenticate with your origin using Mutual TLS.
      required:
        - ClientCertificateArn
    VpcOriginConfig:
      description: An Amazon CloudFront VPC origin configuration.
      type: object
      properties:
        VpcOriginId:
          $ref: "#/components/schemas/string"
          description: The VPC origin ID.
        OwnerAccountId:
          $ref: "#/components/schemas/string"
          description: The account ID of the Amazon Web Services account that owns the VPC origin.
        OriginReadTimeout:
          $ref: "#/components/schemas/integer"
          description: Specifies how long, in seconds, CloudFront waits for a response from the origin. This is also known as the origin response timeout. The minimum timeout is 1 second, the maximum is 120 seconds, and the default (if you don't specify otherwise) is 30 seconds. For more information, see Response timeout in the Amazon CloudFront Developer Guide.
        OriginKeepaliveTimeout:
          $ref: "#/components/schemas/integer"
          description: Specifies how long, in seconds, CloudFront persists its connection to the origin. The minimum timeout is 1 second, the maximum is 120 seconds, and the default (if you don't specify otherwise) is 5 seconds. For more information, see Keep-alive timeout (custom origins only) in the Amazon CloudFront Developer Guide.
      required:
        - VpcOriginId
    OriginShield:
      description: CloudFront Origin Shield. Using Origin Shield can help reduce the load on your origin. For more information, see Using Origin Shield in the Amazon CloudFront Developer Guide.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/boolean"
          description: A flag that specifies whether Origin Shield is enabled. When it's enabled, CloudFront routes all requests through Origin Shield, which can help protect your origin. When it's disabled, CloudFront might send requests directly to your origin from multiple edge locations or regional edge caches.
        OriginShieldRegion:
          $ref: "#/components/schemas/OriginShieldRegion"
          description: The Amazon Web Services Region for Origin Shield. Specify the Amazon Web Services Region that has the lowest latency to your origin. To specify a region, use the region code, not the region name. For example, specify the US East (Ohio) region as us-east-2. When you enable CloudFront Origin Shield, you must specify the Amazon Web Services Region for Origin Shield. For the list of Amazon Web Services Regions that you can specify, and for help choosing the best Region for your origin, see Choosing the Amazon Web Services Region for Origin Shield in the Amazon CloudFront Developer Guide.
      required:
        - Enabled
    OriginShieldRegion:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[a-z]{2}-[a-z]+-\\d"
    OriginGroups:
      description: A complex data type for the origin groups specified for a distribution.
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of origin groups.
        Items:
          $ref: "#/components/schemas/OriginGroupList"
          description: The items (origin groups) in a distribution.
      required:
        - Quantity
    OriginGroupList:
      description: List of origin groups for a distribution.
      type: array
      items:
        $ref: "#/components/schemas/OriginGroup"
    OriginGroup:
      description: An origin group includes two origins (a primary origin and a secondary origin to failover to) and a failover criteria that you specify. You create an origin group to support origin failover in CloudFront. When you create or update a distribution, you can specify the origin group instead of a single origin, and CloudFront will failover from the primary origin to the secondary origin under the failover conditions that you've chosen. Optionally, you can choose selection criteria for your origin group to specify how your origins are selected when your distribution routes viewer requests.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/string"
          description: The origin group's ID.
        FailoverCriteria:
          $ref: "#/components/schemas/OriginGroupFailoverCriteria"
          description: A complex type that contains information about the failover criteria for an origin group.
        Members:
          $ref: "#/components/schemas/OriginGroupMembers"
          description: A complex type that contains information about the origins in an origin group.
        SelectionCriteria:
          $ref: "#/components/schemas/OriginGroupSelectionCriteria"
          description: The selection criteria for the origin group. For more information, see Create an origin group in the Amazon CloudFront Developer Guide.
      required:
        - Id
        - FailoverCriteria
        - Members
    OriginGroupFailoverCriteria:
      description: A complex data type that includes information about the failover criteria for an origin group, including the status codes for which CloudFront will failover from the primary origin to the second origin.
      type: object
      properties:
        StatusCodes:
          $ref: "#/components/schemas/StatusCodes"
          description: The status codes that, when returned from the primary origin, will trigger CloudFront to failover to the second origin.
      required:
        - StatusCodes
    StatusCodes:
      description: A complex data type for the status codes that you specify that, when returned by a primary origin, trigger CloudFront to failover to a second origin.
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of status codes.
        Items:
          $ref: "#/components/schemas/StatusCodeList"
          description: The items (status codes) for an origin group.
      required:
        - Quantity
        - Items
    StatusCodeList:
      description: List of status codes for origin failover.
      type: array
      items:
        $ref: "#/components/schemas/integer"
    OriginGroupMembers:
      description: A complex data type for the origins included in an origin group.
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of origins in an origin group.
        Items:
          $ref: "#/components/schemas/OriginGroupMemberList"
          description: Items (origins) in an origin group.
      required:
        - Quantity
        - Items
    OriginGroupMemberList:
      description: List of origins in an origin group.
      type: array
      items:
        $ref: "#/components/schemas/OriginGroupMember"
    OriginGroupMember:
      description: An origin in an origin group.
      type: object
      properties:
        OriginId:
          $ref: "#/components/schemas/string"
          description: The ID for an origin in an origin group.
      required:
        - OriginId
    OriginGroupSelectionCriteria:
      type: string
      enum:
        - default
        - media-quality-based
    DefaultCacheBehavior:
      description: "A complex type that describes the default cache behavior if you don't specify a CacheBehavior element or if request URLs don't match any of the values of PathPattern in CacheBehavior elements. You must create exactly one default cache behavior. If your minimum TTL is greater than 0, CloudFront will cache content for at least the duration specified in the cache policy's minimum TTL, even if the Cache-Control: no-cache, no-store, or private directives are present in the origin headers."
      type: object
      properties:
        TargetOriginId:
          $ref: "#/components/schemas/string"
          description: The value of ID for the origin that you want CloudFront to route requests to when they use the default cache behavior.
        TrustedSigners:
          $ref: "#/components/schemas/TrustedSigners"
          description: We recommend using TrustedKeyGroups instead of TrustedSigners. This field only supports standard distributions. You can't specify this field for multi-tenant distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. A list of Amazon Web Services account IDs whose public keys CloudFront can use to validate signed URLs or signed cookies. When a cache behavior contains trusted signers, CloudFront requires signed URLs or signed cookies for all requests that match the cache behavior. The URLs or cookies must be signed with the private key of a CloudFront key pair in a trusted signer's Amazon Web Services account. The signed URL or cookie contains information about which public key CloudFront should use to verify the signature. For more information, see Serving private content in the Amazon CloudFront Developer Guide.
        TrustedKeyGroups:
          $ref: "#/components/schemas/TrustedKeyGroups"
          description: A list of key groups that CloudFront can use to validate signed URLs or signed cookies. When a cache behavior contains trusted key groups, CloudFront requires signed URLs or signed cookies for all requests that match the cache behavior. The URLs or cookies must be signed with a private key whose corresponding public key is in the key group. The signed URL or cookie contains information about which public key CloudFront should use to verify the signature. For more information, see Serving private content in the Amazon CloudFront Developer Guide.
        ViewerProtocolPolicy:
          $ref: "#/components/schemas/ViewerProtocolPolicy"
          description: "The protocol that viewers can use to access the files in the origin specified by TargetOriginId when a request matches the path pattern in PathPattern. You can specify the following options: allow-all: Viewers can use HTTP or HTTPS. redirect-to-https: If a viewer submits an HTTP request, CloudFront returns an HTTP status code of 301 (Moved Permanently) to the viewer along with the HTTPS URL. The viewer then resubmits the request using the new URL. https-only: If a viewer sends an HTTP request, CloudFront returns an HTTP status code of 403 (Forbidden). For more information about requiring the HTTPS protocol, see Requiring HTTPS Between Viewers and CloudFront in the Amazon CloudFront Developer Guide. The only way to guarantee that viewers retrieve an object that was fetched from the origin using HTTPS is never to use any other protocol to fetch the object. If you have recently changed from HTTP to HTTPS, we recommend that you clear your objects' cache because cached objects are protocol agnostic. That means that an edge location will return an object from the cache regardless of whether the current request protocol matches the protocol used previously. For more information, see Managing Cache Expiration in the Amazon CloudFront Developer Guide."
        AllowedMethods:
          $ref: "#/components/schemas/AllowedMethods"
        SmoothStreaming:
          $ref: "#/components/schemas/boolean"
          description: This field only supports standard distributions. You can't specify this field for multi-tenant distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. Indicates whether you want to distribute media files in the Microsoft Smooth Streaming format using the origin that is associated with this cache behavior. If so, specify true; if not, specify false. If you specify true for SmoothStreaming, you can still distribute other content using this cache behavior if the content matches the value of PathPattern.
        Compress:
          $ref: "#/components/schemas/boolean"
          description: Whether you want CloudFront to automatically compress certain files for this cache behavior. If so, specify true; if not, specify false. For more information, see Serving Compressed Files in the Amazon CloudFront Developer Guide.
        LambdaFunctionAssociations:
          $ref: "#/components/schemas/LambdaFunctionAssociations"
          description: A complex type that contains zero or more Lambda@Edge function associations for a cache behavior.
        FunctionAssociations:
          $ref: "#/components/schemas/FunctionAssociations"
          description: A list of CloudFront functions that are associated with this cache behavior. Your functions must be published to the LIVE stage to associate them with a cache behavior.
        FieldLevelEncryptionId:
          $ref: "#/components/schemas/string"
          description: The value of ID for the field-level encryption configuration that you want CloudFront to use for encrypting specific fields of data for the default cache behavior.
        RealtimeLogConfigArn:
          $ref: "#/components/schemas/string"
          description: The Amazon Resource Name (ARN) of the real-time log configuration that is attached to this cache behavior. For more information, see Real-time logs in the Amazon CloudFront Developer Guide.
        CachePolicyId:
          $ref: "#/components/schemas/string"
          description: The unique identifier of the cache policy that is attached to the default cache behavior. For more information, see Creating cache policies or Using the managed cache policies in the Amazon CloudFront Developer Guide. A DefaultCacheBehavior must include either a CachePolicyId or ForwardedValues. We recommend that you use a CachePolicyId.
        OriginRequestPolicyId:
          $ref: "#/components/schemas/string"
          description: The unique identifier of the origin request policy that is attached to the default cache behavior. For more information, see Creating origin request policies or Using the managed origin request policies in the Amazon CloudFront Developer Guide.
        ResponseHeadersPolicyId:
          $ref: "#/components/schemas/string"
          description: The identifier for a response headers policy.
        GrpcConfig:
          $ref: "#/components/schemas/GrpcConfig"
          description: The gRPC configuration for your cache behavior.
        ForwardedValues:
          $ref: "#/components/schemas/ForwardedValues"
          description: This field is deprecated. We recommend that you use a cache policy or an origin request policy instead of this field. For more information, see Working with policies in the Amazon CloudFront Developer Guide. If you want to include values in the cache key, use a cache policy. For more information, see Creating cache policies or Using the managed cache policies in the Amazon CloudFront Developer Guide. If you want to send values to the origin but not include them in the cache key, use an origin request policy. For more information, see Creating origin request policies or Using the managed origin request policies in the Amazon CloudFront Developer Guide. A DefaultCacheBehavior must include either a CachePolicyId or ForwardedValues. We recommend that you use a CachePolicyId. A complex type that specifies how CloudFront handles query strings, cookies, and HTTP headers.
        MinTTL:
          $ref: "#/components/schemas/long"
          description: This field only supports standard distributions. You can't specify this field for multi-tenant distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. This field is deprecated. We recommend that you use the MinTTL field in a cache policy instead of this field. For more information, see Creating cache policies or Using the managed cache policies in the Amazon CloudFront Developer Guide. The minimum amount of time that you want objects to stay in CloudFront caches before CloudFront forwards another request to your origin to determine whether the object has been updated. For more information, see Managing How Long Content Stays in an Edge Cache (Expiration) in the Amazon CloudFront Developer Guide. You must specify 0 for MinTTL if you configure CloudFront to forward all headers to your origin (under Headers, if you specify 1 for Quantity and * for Name).
        DefaultTTL:
          $ref: "#/components/schemas/long"
          description: This field only supports standard distributions. You can't specify this field for multi-tenant distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. This field is deprecated. We recommend that you use the DefaultTTL field in a cache policy instead of this field. For more information, see Creating cache policies or Using the managed cache policies in the Amazon CloudFront Developer Guide. The default amount of time that you want objects to stay in CloudFront caches before CloudFront forwards another request to your origin to determine whether the object has been updated. The value that you specify applies only when your origin does not add HTTP headers such as Cache-Control max-age, Cache-Control s-maxage, and Expires to objects. For more information, see Managing How Long Content Stays in an Edge Cache (Expiration) in the Amazon CloudFront Developer Guide.
        MaxTTL:
          $ref: "#/components/schemas/long"
          description: This field only supports standard distributions. You can't specify this field for multi-tenant distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. This field is deprecated. We recommend that you use the MaxTTL field in a cache policy instead of this field. For more information, see Creating cache policies or Using the managed cache policies in the Amazon CloudFront Developer Guide. The maximum amount of time that you want objects to stay in CloudFront caches before CloudFront forwards another request to your origin to determine whether the object has been updated. The value that you specify applies only when your origin adds HTTP headers such as Cache-Control max-age, Cache-Control s-maxage, and Expires to objects. For more information, see Managing How Long Content Stays in an Edge Cache (Expiration) in the Amazon CloudFront Developer Guide.
      required:
        - TargetOriginId
        - ViewerProtocolPolicy
    TrustedSigners:
      description: A list of Amazon Web Services accounts whose public keys CloudFront can use to verify the signatures of signed URLs and signed cookies.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/boolean"
          description: This field is true if any of the Amazon Web Services accounts in the list are configured as trusted signers. If not, this field is false.
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of Amazon Web Services accounts in the list.
        Items:
          $ref: "#/components/schemas/AwsAccountNumberList"
          description: A list of Amazon Web Services account identifiers.
      required:
        - Enabled
        - Quantity
    AwsAccountNumberList:
      type: array
      items:
        $ref: "#/components/schemas/string"
    TrustedKeyGroups:
      description: A list of key groups whose public keys CloudFront can use to verify the signatures of signed URLs and signed cookies.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/boolean"
          description: This field is true if any of the key groups in the list have public keys that CloudFront can use to verify the signatures of signed URLs and signed cookies. If not, this field is false.
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of key groups in the list.
        Items:
          $ref: "#/components/schemas/TrustedKeyGroupIdList"
          description: A list of key groups identifiers.
      required:
        - Enabled
        - Quantity
    TrustedKeyGroupIdList:
      type: array
      items:
        $ref: "#/components/schemas/string"
    ViewerProtocolPolicy:
      type: string
      enum:
        - allow-all
        - https-only
        - redirect-to-https
    AllowedMethods:
      description: "A complex type that controls which HTTP methods CloudFront processes and forwards to your Amazon S3 bucket or your custom origin. There are three choices: CloudFront forwards only GET and HEAD requests. CloudFront forwards only GET, HEAD, and OPTIONS requests. CloudFront forwards GET, HEAD, OPTIONS, PUT, PATCH, POST, and DELETE requests. If you pick the third choice, you may need to restrict access to your Amazon S3 bucket or to your custom origin so users can't perform operations that you don't want them to. For example, you might not want users to have permissions to delete objects from your origin."
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of HTTP methods that you want CloudFront to forward to your origin. Valid values are 2 (for GET and HEAD requests), 3 (for GET, HEAD, and OPTIONS requests) and 7 (for GET, HEAD, OPTIONS, PUT, PATCH, POST, and DELETE requests).
        Items:
          $ref: "#/components/schemas/MethodsList"
          description: A complex type that contains the HTTP methods that you want CloudFront to process and forward to your origin.
        CachedMethods:
          $ref: "#/components/schemas/CachedMethods"
      required:
        - Quantity
        - Items
    MethodsList:
      type: array
      items:
        $ref: "#/components/schemas/Method"
    Method:
      type: string
      enum:
        - GET
        - HEAD
        - POST
        - PUT
        - PATCH
        - OPTIONS
        - DELETE
    CachedMethods:
      description: "A complex type that controls whether CloudFront caches the response to requests using the specified HTTP methods. There are two choices: CloudFront caches responses to GET and HEAD requests. CloudFront caches responses to GET, HEAD, and OPTIONS requests. If you pick the second choice for your Amazon S3 Origin, you may need to forward Access-Control-Request-Method, Access-Control-Request-Headers, and Origin headers for the responses to be cached correctly."
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of HTTP methods for which you want CloudFront to cache responses. Valid values are 2 (for caching responses to GET and HEAD requests) and 3 (for caching responses to GET, HEAD, and OPTIONS requests).
        Items:
          $ref: "#/components/schemas/MethodsList"
          description: A complex type that contains the HTTP methods that you want CloudFront to cache responses to. Valid values for CachedMethods include GET, HEAD, and OPTIONS, depending on which caching option you choose. For more information, see the preceding section.
      required:
        - Quantity
        - Items
    LambdaFunctionAssociations:
      description: A complex type that specifies a list of Lambda@Edge functions associations for a cache behavior. If you want to invoke one or more Lambda@Edge functions triggered by requests that match the PathPattern of the cache behavior, specify the applicable values for Quantity and Items. Note that there can be up to 4 LambdaFunctionAssociation items in this list (one for each possible value of EventType) and each EventType can be associated with only one function. If you don't want to invoke any Lambda@Edge functions for the requests that match PathPattern, specify 0 for Quantity and omit Items.
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of Lambda@Edge function associations for this cache behavior.
        Items:
          $ref: "#/components/schemas/LambdaFunctionAssociationList"
          description: "Optional: A complex type that contains LambdaFunctionAssociation items for this cache behavior. If Quantity is 0, you can omit Items."
      required:
        - Quantity
    LambdaFunctionAssociationList:
      type: array
      items:
        $ref: "#/components/schemas/LambdaFunctionAssociation"
    LambdaFunctionAssociation:
      description: A complex type that contains a Lambda@Edge function association.
      type: object
      properties:
        LambdaFunctionARN:
          $ref: "#/components/schemas/LambdaFunctionARN"
          description: The ARN of the Lambda@Edge function. You must specify the ARN of a function version; you can't specify an alias or $LATEST.
        EventType:
          $ref: "#/components/schemas/EventType"
          description: "Specifies the event type that triggers a Lambda@Edge function invocation. You can specify the following values: viewer-request: The function executes when CloudFront receives a request from a viewer and before it checks to see whether the requested object is in the edge cache. origin-request: The function executes only when CloudFront sends a request to your origin. When the requested object is in the edge cache, the function doesn't execute. origin-response: The function executes after CloudFront receives a response from the origin and before it caches the object in the response. When the requested object is in the edge cache, the function doesn't execute. viewer-response: The function executes before CloudFront returns the requested object to the viewer. The function executes regardless of whether the object was already in the edge cache. If the origin returns an HTTP status code other than HTTP 200 (OK), the function doesn't execute."
        IncludeBody:
          $ref: "#/components/schemas/boolean"
          description: A flag that allows a Lambda@Edge function to have read access to the body content. For more information, see Accessing the Request Body by Choosing the Include Body Option in the Amazon CloudFront Developer Guide.
      required:
        - LambdaFunctionARN
        - EventType
    LambdaFunctionARN:
      type: string
    EventType:
      type: string
      enum:
        - viewer-request
        - viewer-response
        - origin-request
        - origin-response
    FunctionAssociations:
      description: A list of CloudFront functions that are associated with a cache behavior in a CloudFront distribution. Your functions must be published to the LIVE stage to associate them with a cache behavior.
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of CloudFront functions in the list.
        Items:
          $ref: "#/components/schemas/FunctionAssociationList"
          description: The CloudFront functions that are associated with a cache behavior in a CloudFront distribution. Your functions must be published to the LIVE stage to associate them with a cache behavior.
      required:
        - Quantity
    FunctionAssociationList:
      type: array
      items:
        $ref: "#/components/schemas/FunctionAssociation"
    FunctionAssociation:
      description: A CloudFront function that is associated with a cache behavior in a CloudFront distribution.
      type: object
      properties:
        FunctionARN:
          $ref: "#/components/schemas/FunctionARN"
          description: The Amazon Resource Name (ARN) of the function.
        EventType:
          $ref: "#/components/schemas/EventType"
          description: The event type of the function, either viewer-request or viewer-response. You cannot use origin-facing event types (origin-request and origin-response) with a CloudFront function.
      required:
        - FunctionARN
        - EventType
    FunctionARN:
      type: string
      minLength: 0
      maxLength: 108
      pattern: arn:aws:cloudfront::[0-9]{12}:function\/[a-zA-Z0-9-_]{1,64}
    GrpcConfig:
      description: Amazon CloudFront supports gRPC, an open-source remote procedure call (RPC) framework built on HTTP/2. gRPC offers bi-directional streaming and binary protocol that buffers payloads, making it suitable for applications that require low latency communications. To enable your distribution to handle gRPC requests, you must include HTTP/2 as one of the supported HTTP versions and allow HTTP methods, including POST. For more information, see Using gRPC with CloudFront distributions in the Amazon CloudFront Developer Guide.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/boolean"
          description: Enables your CloudFront distribution to receive gRPC requests and to proxy them directly to your origins.
      required:
        - Enabled
    ForwardedValues:
      description: This field only supports standard distributions. You can't specify this field for multi-tenant distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. This field is deprecated. We recommend that you use a cache policy or an origin request policy instead of this field. If you want to include values in the cache key, use a cache policy. For more information, see Creating cache policies in the Amazon CloudFront Developer Guide. If you want to send values to the origin but not include them in the cache key, use an origin request policy. For more information, see Creating origin request policies in the Amazon CloudFront Developer Guide. A complex type that specifies how CloudFront handles query strings, cookies, and HTTP headers.
      type: object
      properties:
        QueryString:
          $ref: "#/components/schemas/boolean"
          description: "This field is deprecated. We recommend that you use a cache policy or an origin request policy instead of this field. If you want to include query strings in the cache key, use a cache policy. For more information, see Creating cache policies in the Amazon CloudFront Developer Guide. If you want to send query strings to the origin but not include them in the cache key, use an origin request policy. For more information, see Creating origin request policies in the Amazon CloudFront Developer Guide. Indicates whether you want CloudFront to forward query strings to the origin that is associated with this cache behavior and cache based on the query string parameters. CloudFront behavior depends on the value of QueryString and on the values that you specify for QueryStringCacheKeys, if any: If you specify true for QueryString and you don't specify any values for QueryStringCacheKeys, CloudFront forwards all query string parameters to the origin and caches based on all query string parameters. Depending on how many query string parameters and values you have, this can adversely affect performance because CloudFront must forward more requests to the origin. If you specify true for QueryString and you specify one or more values for QueryStringCacheKeys, CloudFront forwards all query string parameters to the origin, but it only caches based on the query string parameters that you specify. If you specify false for QueryString, CloudFront doesn't forward any query string parameters to the origin, and doesn't cache based on query string parameters. For more information, see Configuring CloudFront to Cache Based on Query String Parameters in the Amazon CloudFront Developer Guide."
        Cookies:
          $ref: "#/components/schemas/CookiePreference"
          description: This field is deprecated. We recommend that you use a cache policy or an origin request policy instead of this field. If you want to include cookies in the cache key, use a cache policy. For more information, see Creating cache policies in the Amazon CloudFront Developer Guide. If you want to send cookies to the origin but not include them in the cache key, use an origin request policy. For more information, see Creating origin request policies in the Amazon CloudFront Developer Guide. A complex type that specifies whether you want CloudFront to forward cookies to the origin and, if so, which ones. For more information about forwarding cookies to the origin, see How CloudFront Forwards, Caches, and Logs Cookies in the Amazon CloudFront Developer Guide.
        Headers:
          $ref: "#/components/schemas/Headers"
          description: This field is deprecated. We recommend that you use a cache policy or an origin request policy instead of this field. If you want to include headers in the cache key, use a cache policy. For more information, see Creating cache policies in the Amazon CloudFront Developer Guide. If you want to send headers to the origin but not include them in the cache key, use an origin request policy. For more information, see Creating origin request policies in the Amazon CloudFront Developer Guide. A complex type that specifies the Headers, if any, that you want CloudFront to forward to the origin for this cache behavior (whitelisted headers). For the headers that you specify, CloudFront also caches separate versions of a specified object that is based on the header values in viewer requests. For more information, see Caching Content Based on Request Headers in the Amazon CloudFront Developer Guide.
        QueryStringCacheKeys:
          $ref: "#/components/schemas/QueryStringCacheKeys"
          description: This field is deprecated. We recommend that you use a cache policy or an origin request policy instead of this field. If you want to include query strings in the cache key, use a cache policy. For more information, see Creating cache policies in the Amazon CloudFront Developer Guide. If you want to send query strings to the origin but not include them in the cache key, use an origin request policy. For more information, see Creating origin request policies in the Amazon CloudFront Developer Guide. A complex type that contains information about the query string parameters that you want CloudFront to use for caching for this cache behavior.
      required:
        - QueryString
        - Cookies
    CookiePreference:
      description: This field is deprecated. We recommend that you use a cache policy or an origin request policy instead of this field. If you want to include cookies in the cache key, use CookiesConfig in a cache policy. See CachePolicy. If you want to send cookies to the origin but not include them in the cache key, use CookiesConfig in an origin request policy. See OriginRequestPolicy. A complex type that specifies whether you want CloudFront to forward cookies to the origin and, if so, which ones. For more information about forwarding cookies to the origin, see Caching Content Based on Cookies in the Amazon CloudFront Developer Guide.
      type: object
      properties:
        Forward:
          $ref: "#/components/schemas/ItemSelection"
          description: "This field is deprecated. We recommend that you use a cache policy or an origin request policy instead of this field. If you want to include cookies in the cache key, use a cache policy. For more information, see Creating cache policies in the Amazon CloudFront Developer Guide. If you want to send cookies to the origin but not include them in the cache key, use origin request policy. For more information, see Creating origin request policies in the Amazon CloudFront Developer Guide. Specifies which cookies to forward to the origin for this cache behavior: all, none, or the list of cookies specified in the WhitelistedNames complex type. Amazon S3 doesn't process cookies. When the cache behavior is forwarding requests to an Amazon S3 origin, specify none for the Forward element."
        WhitelistedNames:
          $ref: "#/components/schemas/CookieNames"
          description: This field is deprecated. We recommend that you use a cache policy or an origin request policy instead of this field. If you want to include cookies in the cache key, use a cache policy. For more information, see Creating cache policies in the Amazon CloudFront Developer Guide. If you want to send cookies to the origin but not include them in the cache key, use an origin request policy. For more information, see Creating origin request policies in the Amazon CloudFront Developer Guide. Required if you specify whitelist for the value of Forward. A complex type that specifies how many different cookies you want CloudFront to forward to the origin for this cache behavior and, if you want to forward selected cookies, the names of those cookies. If you specify all or none for the value of Forward, omit WhitelistedNames. If you change the value of Forward from whitelist to all or none and you don't delete the WhitelistedNames element and its child elements, CloudFront deletes them automatically. For the current limit on the number of cookie names that you can whitelist for each cache behavior, see CloudFront Limits in the Amazon Web Services General Reference.
      required:
        - Forward
    ItemSelection:
      type: string
      enum:
        - none
        - whitelist
        - all
    QueryStringCacheKeys:
      description: This field is deprecated. We recommend that you use a cache policy or an origin request policy instead of this field. If you want to include query strings in the cache key, use QueryStringsConfig in a cache policy. See CachePolicy. If you want to send query strings to the origin but not include them in the cache key, use QueryStringsConfig in an origin request policy. See OriginRequestPolicy. A complex type that contains information about the query string parameters that you want CloudFront to use for caching for a cache behavior.
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of whitelisted query string parameters for a cache behavior.
        Items:
          $ref: "#/components/schemas/QueryStringCacheKeysList"
          description: A list that contains the query string parameters that you want CloudFront to use as a basis for caching for a cache behavior. If Quantity is 0, you can omit Items.
      required:
        - Quantity
    QueryStringCacheKeysList:
      type: array
      items:
        $ref: "#/components/schemas/string"
    CacheBehaviors:
      description: A complex type that contains zero or more CacheBehavior elements.
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of cache behaviors for this distribution.
        Items:
          $ref: "#/components/schemas/CacheBehaviorList"
          description: "Optional: A complex type that contains cache behaviors for this distribution. If Quantity is 0, you can omit Items."
      required:
        - Quantity
    CacheBehaviorList:
      type: array
      items:
        $ref: "#/components/schemas/CacheBehavior"
    CacheBehavior:
      description: "A complex type that describes how CloudFront processes requests. You must create at least as many cache behaviors (including the default cache behavior) as you have origins if you want CloudFront to serve objects from all of the origins. Each cache behavior specifies the one origin from which you want CloudFront to get objects. If you have two origins and only the default cache behavior, the default cache behavior will cause CloudFront to get objects from one of the origins, but the other origin is never used. For the current quota (formerly known as limit) on the number of cache behaviors that you can add to a distribution, see Quotas in the Amazon CloudFront Developer Guide. If you don't want to specify any cache behaviors, include only an empty CacheBehaviors element. Don't specify an empty individual CacheBehavior element, because this is invalid. For more information, see CacheBehaviors. To delete all cache behaviors in an existing distribution, update the distribution configuration and include only an empty CacheBehaviors element. To add, change, or remove one or more cache behaviors, update the distribution configuration and specify all of the cache behaviors that you want to include in the updated distribution. If your minimum TTL is greater than 0, CloudFront will cache content for at least the duration specified in the cache policy's minimum TTL, even if the Cache-Control: no-cache, no-store, or private directives are present in the origin headers. For more information about cache behaviors, see Cache Behavior Settings in the Amazon CloudFront Developer Guide."
      type: object
      properties:
        PathPattern:
          $ref: "#/components/schemas/string"
          description: The pattern (for example, images/*.jpg) that specifies which requests to apply the behavior to. When CloudFront receives a viewer request, the requested path is compared with path patterns in the order in which cache behaviors are listed in the distribution. You can optionally include a slash (/) at the beginning of the path pattern. For example, /images/*.jpg. CloudFront behavior is the same with or without the leading /. The path pattern for the default cache behavior is * and cannot be changed. If the request for an object does not match the path pattern for any cache behaviors, CloudFront applies the behavior in the default cache behavior. For more information, see Path Pattern in the Amazon CloudFront Developer Guide.
        TargetOriginId:
          $ref: "#/components/schemas/string"
          description: The value of ID for the origin that you want CloudFront to route requests to when they match this cache behavior.
        TrustedSigners:
          $ref: "#/components/schemas/TrustedSigners"
          description: We recommend using TrustedKeyGroups instead of TrustedSigners. This field only supports standard distributions. You can't specify this field for multi-tenant distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. A list of Amazon Web Services account IDs whose public keys CloudFront can use to validate signed URLs or signed cookies. When a cache behavior contains trusted signers, CloudFront requires signed URLs or signed cookies for all requests that match the cache behavior. The URLs or cookies must be signed with the private key of a CloudFront key pair in the trusted signer's Amazon Web Services account. The signed URL or cookie contains information about which public key CloudFront should use to verify the signature. For more information, see Serving private content in the Amazon CloudFront Developer Guide.
        TrustedKeyGroups:
          $ref: "#/components/schemas/TrustedKeyGroups"
          description: A list of key groups that CloudFront can use to validate signed URLs or signed cookies. When a cache behavior contains trusted key groups, CloudFront requires signed URLs or signed cookies for all requests that match the cache behavior. The URLs or cookies must be signed with a private key whose corresponding public key is in the key group. The signed URL or cookie contains information about which public key CloudFront should use to verify the signature. For more information, see Serving private content in the Amazon CloudFront Developer Guide.
        ViewerProtocolPolicy:
          $ref: "#/components/schemas/ViewerProtocolPolicy"
          description: "The protocol that viewers can use to access the files in the origin specified by TargetOriginId when a request matches the path pattern in PathPattern. You can specify the following options: allow-all: Viewers can use HTTP or HTTPS. redirect-to-https: If a viewer submits an HTTP request, CloudFront returns an HTTP status code of 301 (Moved Permanently) to the viewer along with the HTTPS URL. The viewer then resubmits the request using the new URL. https-only: If a viewer sends an HTTP request, CloudFront returns an HTTP status code of 403 (Forbidden). For more information about requiring the HTTPS protocol, see Requiring HTTPS Between Viewers and CloudFront in the Amazon CloudFront Developer Guide. The only way to guarantee that viewers retrieve an object that was fetched from the origin using HTTPS is never to use any other protocol to fetch the object. If you have recently changed from HTTP to HTTPS, we recommend that you clear your objects' cache because cached objects are protocol agnostic. That means that an edge location will return an object from the cache regardless of whether the current request protocol matches the protocol used previously. For more information, see Managing Cache Expiration in the Amazon CloudFront Developer Guide."
        AllowedMethods:
          $ref: "#/components/schemas/AllowedMethods"
        SmoothStreaming:
          $ref: "#/components/schemas/boolean"
          description: This field only supports standard distributions. You can't specify this field for multi-tenant distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. Indicates whether you want to distribute media files in the Microsoft Smooth Streaming format using the origin that is associated with this cache behavior. If so, specify true; if not, specify false. If you specify true for SmoothStreaming, you can still distribute other content using this cache behavior if the content matches the value of PathPattern.
        Compress:
          $ref: "#/components/schemas/boolean"
          description: Whether you want CloudFront to automatically compress certain files for this cache behavior. If so, specify true; if not, specify false. For more information, see Serving Compressed Files in the Amazon CloudFront Developer Guide.
        LambdaFunctionAssociations:
          $ref: "#/components/schemas/LambdaFunctionAssociations"
          description: A complex type that contains zero or more Lambda@Edge function associations for a cache behavior.
        FunctionAssociations:
          $ref: "#/components/schemas/FunctionAssociations"
          description: A list of CloudFront functions that are associated with this cache behavior. CloudFront functions must be published to the LIVE stage to associate them with a cache behavior.
        FieldLevelEncryptionId:
          $ref: "#/components/schemas/string"
          description: The value of ID for the field-level encryption configuration that you want CloudFront to use for encrypting specific fields of data for this cache behavior.
        RealtimeLogConfigArn:
          $ref: "#/components/schemas/string"
          description: The Amazon Resource Name (ARN) of the real-time log configuration that is attached to this cache behavior. For more information, see Real-time logs in the Amazon CloudFront Developer Guide.
        CachePolicyId:
          $ref: "#/components/schemas/string"
          description: The unique identifier of the cache policy that is attached to this cache behavior. For more information, see Creating cache policies or Using the managed cache policies in the Amazon CloudFront Developer Guide. A CacheBehavior must include either a CachePolicyId or ForwardedValues. We recommend that you use a CachePolicyId.
        OriginRequestPolicyId:
          $ref: "#/components/schemas/string"
          description: The unique identifier of the origin request policy that is attached to this cache behavior. For more information, see Creating origin request policies or Using the managed origin request policies in the Amazon CloudFront Developer Guide.
        ResponseHeadersPolicyId:
          $ref: "#/components/schemas/string"
          description: The identifier for a response headers policy.
        GrpcConfig:
          $ref: "#/components/schemas/GrpcConfig"
          description: The gRPC configuration for your cache behavior.
        ForwardedValues:
          $ref: "#/components/schemas/ForwardedValues"
          description: This field is deprecated. We recommend that you use a cache policy or an origin request policy instead of this field. For more information, see Working with policies in the Amazon CloudFront Developer Guide. If you want to include values in the cache key, use a cache policy. For more information, see Creating cache policies or Using the managed cache policies in the Amazon CloudFront Developer Guide. If you want to send values to the origin but not include them in the cache key, use an origin request policy. For more information, see Creating origin request policies or Using the managed origin request policies in the Amazon CloudFront Developer Guide. A CacheBehavior must include either a CachePolicyId or ForwardedValues. We recommend that you use a CachePolicyId. A complex type that specifies how CloudFront handles query strings, cookies, and HTTP headers.
        MinTTL:
          $ref: "#/components/schemas/long"
          description: This field only supports standard distributions. You can't specify this field for multi-tenant distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. This field is deprecated. We recommend that you use the MinTTL field in a cache policy instead of this field. For more information, see Creating cache policies or Using the managed cache policies in the Amazon CloudFront Developer Guide. The minimum amount of time that you want objects to stay in CloudFront caches before CloudFront forwards another request to your origin to determine whether the object has been updated. For more information, see Managing How Long Content Stays in an Edge Cache (Expiration) in the Amazon CloudFront Developer Guide. You must specify 0 for MinTTL if you configure CloudFront to forward all headers to your origin (under Headers, if you specify 1 for Quantity and * for Name).
        DefaultTTL:
          $ref: "#/components/schemas/long"
          description: This field only supports standard distributions. You can't specify this field for multi-tenant distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. This field is deprecated. We recommend that you use the DefaultTTL field in a cache policy instead of this field. For more information, see Creating cache policies or Using the managed cache policies in the Amazon CloudFront Developer Guide. The default amount of time that you want objects to stay in CloudFront caches before CloudFront forwards another request to your origin to determine whether the object has been updated. The value that you specify applies only when your origin does not add HTTP headers such as Cache-Control max-age, Cache-Control s-maxage, and Expires to objects. For more information, see Managing How Long Content Stays in an Edge Cache (Expiration) in the Amazon CloudFront Developer Guide.
        MaxTTL:
          $ref: "#/components/schemas/long"
          description: This field only supports standard distributions. You can't specify this field for multi-tenant distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. This field is deprecated. We recommend that you use the MaxTTL field in a cache policy instead of this field. For more information, see Creating cache policies or Using the managed cache policies in the Amazon CloudFront Developer Guide. The maximum amount of time that you want objects to stay in CloudFront caches before CloudFront forwards another request to your origin to determine whether the object has been updated. The value that you specify applies only when your origin adds HTTP headers such as Cache-Control max-age, Cache-Control s-maxage, and Expires to objects. For more information, see Managing How Long Content Stays in an Edge Cache (Expiration) in the Amazon CloudFront Developer Guide.
      required:
        - PathPattern
        - TargetOriginId
        - ViewerProtocolPolicy
    CustomErrorResponses:
      description: "A complex type that controls: Whether CloudFront replaces HTTP status codes in the 4xx and 5xx range with custom error messages before returning the response to the viewer. How long CloudFront caches HTTP status codes in the 4xx and 5xx range. For more information about custom error pages, see Customizing Error Responses in the Amazon CloudFront Developer Guide."
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of HTTP status codes for which you want to specify a custom error page and/or a caching duration. If Quantity is 0, you can omit Items.
        Items:
          $ref: "#/components/schemas/CustomErrorResponseList"
          description: A complex type that contains a CustomErrorResponse element for each HTTP status code for which you want to specify a custom error page and/or a caching duration.
      required:
        - Quantity
    CustomErrorResponseList:
      type: array
      items:
        $ref: "#/components/schemas/CustomErrorResponse"
    CustomErrorResponse:
      description: "A complex type that controls: Whether CloudFront replaces HTTP status codes in the 4xx and 5xx range with custom error messages before returning the response to the viewer. How long CloudFront caches HTTP status codes in the 4xx and 5xx range. For more information about custom error pages, see Customizing Error Responses in the Amazon CloudFront Developer Guide."
      type: object
      properties:
        ErrorCode:
          $ref: "#/components/schemas/integer"
          description: The HTTP status code for which you want to specify a custom error page and/or a caching duration.
        ResponsePagePath:
          $ref: "#/components/schemas/string"
          description: "The path to the custom error page that you want CloudFront to return to a viewer when your origin returns the HTTP status code specified by ErrorCode, for example, /4xx-errors/403-forbidden.html. If you want to store your objects and your custom error pages in different locations, your distribution must include a cache behavior for which the following is true: The value of PathPattern matches the path to your custom error messages. For example, suppose you saved custom error pages for 4xx errors in an Amazon S3 bucket in a directory named /4xx-errors. Your distribution must include a cache behavior for which the path pattern routes requests for your custom error pages to that location, for example, /4xx-errors/*. The value of TargetOriginId specifies the value of the ID element for the origin that contains your custom error pages. If you specify a value for ResponsePagePath, you must also specify a value for ResponseCode. We recommend that you store custom error pages in an Amazon S3 bucket. If you store custom error pages on an HTTP server and the server starts to return 5xx errors, CloudFront can't get the files that you want to return to viewers because the origin server is unavailable."
        ResponseCode:
          $ref: "#/components/schemas/string"
          description: "The HTTP status code that you want CloudFront to return to the viewer along with the custom error page. There are a variety of reasons that you might want CloudFront to return a status code different from the status code that your origin returned to CloudFront, for example: Some Internet devices (some firewalls and corporate proxies, for example) intercept HTTP 4xx and 5xx and prevent the response from being returned to the viewer. If you substitute 200, the response typically won't be intercepted. If you don't care about distinguishing among different client errors or server errors, you can specify 400 or 500 as the ResponseCode for all 4xx or 5xx errors. You might want to return a 200 status code (OK) and static website so your customers don't know that your website is down. If you specify a value for ResponseCode, you must also specify a value for ResponsePagePath."
        ErrorCachingMinTTL:
          $ref: "#/components/schemas/long"
          description: The minimum amount of time, in seconds, that you want CloudFront to cache the HTTP status code specified in ErrorCode. When this time period has elapsed, CloudFront queries your origin to see whether the problem that caused the error has been resolved and the requested object is now available. For more information, see Customizing Error Responses in the Amazon CloudFront Developer Guide.
      required:
        - ErrorCode
    CommentType:
      type: string
    LoggingConfig:
      description: A complex type that specifies whether access logs are written for the distribution. If you already enabled standard logging (legacy) and you want to enable standard logging (v2) to send your access logs to Amazon S3, we recommend that you specify a different Amazon S3 bucket or use a separate path in the same bucket (for example, use a log prefix or partitioning). This helps you keep track of which log files are associated with which logging subscription and prevents log files from overwriting each other. For more information, see Standard logging (access logs) in the Amazon CloudFront Developer Guide.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/boolean"
          description: Specifies whether you want CloudFront to save access logs to an Amazon S3 bucket. If you don't want to enable logging when you create a distribution or if you want to disable logging for an existing distribution, specify false for Enabled, and specify empty Bucket and Prefix elements. If you specify false for Enabled but you specify values for Bucket and prefix, the values are automatically deleted.
        IncludeCookies:
          $ref: "#/components/schemas/boolean"
          description: Specifies whether you want CloudFront to include cookies in access logs, specify true for IncludeCookies. If you choose to include cookies in logs, CloudFront logs all cookies regardless of how you configure the cache behaviors for this distribution. If you don't want to include cookies when you create a distribution or if you want to disable include cookies for an existing distribution, specify false for IncludeCookies.
        Bucket:
          $ref: "#/components/schemas/string"
          description: The Amazon S3 bucket to store the access logs in, for example, amzn-s3-demo-bucket.s3.amazonaws.com.
        Prefix:
          $ref: "#/components/schemas/string"
          description: An optional string that you want CloudFront to prefix to the access log filenames for this distribution, for example, myprefix/. If you want to enable logging, but you don't want to specify a prefix, you still must include an empty Prefix element in the Logging element.
    PriceClass:
      type: string
      enum:
        - PriceClass_100
        - PriceClass_200
        - PriceClass_All
        - None
    ViewerCertificate:
      description: "A complex type that determines the distribution's SSL/TLS configuration for communicating with viewers. If the distribution doesn't use Aliases (also known as alternate domain names or CNAMEs)—that is, if the distribution uses the CloudFront domain name such as d111111abcdef8.cloudfront.net—set CloudFrontDefaultCertificate to true and leave all other fields empty. If the distribution uses Aliases (alternate domain names or CNAMEs), use the fields in this type to specify the following settings: Which viewers the distribution accepts HTTPS connections from: only viewers that support server name indication (SNI) (recommended), or all viewers including those that don't support SNI. To accept HTTPS connections from only viewers that support SNI, set SSLSupportMethod to sni-only. This is recommended. Most browsers and clients support SNI. To accept HTTPS connections from all viewers, including those that don't support SNI, set SSLSupportMethod to vip. This is not recommended, and results in additional monthly charges from CloudFront. The minimum SSL/TLS protocol version that the distribution can use to communicate with viewers. To specify a minimum version, choose a value for MinimumProtocolVersion. For more information, see Security Policy in the Amazon CloudFront Developer Guide. The location of the SSL/TLS certificate, Certificate Manager (ACM) (recommended) or Identity and Access Management (IAM). You specify the location by setting a value in one of the following fields (not both): ACMCertificateArn IAMCertificateId All distributions support HTTPS connections from viewers. To require viewers to use HTTPS only, or to redirect them from HTTP to HTTPS, use ViewerProtocolPolicy in the CacheBehavior or DefaultCacheBehavior. To specify how CloudFront should use SSL/TLS to communicate with your custom origin, use CustomOriginConfig. For more information, see Using HTTPS with CloudFront and Using Alternate Domain Names and HTTPS in the Amazon CloudFront Developer Guide."
      type: object
      properties:
        CloudFrontDefaultCertificate:
          $ref: "#/components/schemas/boolean"
          description: "If the distribution uses the CloudFront domain name such as d111111abcdef8.cloudfront.net, set this field to true. If the distribution uses Aliases (alternate domain names or CNAMEs), set this field to false and specify values for the following fields: ACMCertificateArn or IAMCertificateId (specify a value for one, not both) MinimumProtocolVersion SSLSupportMethod"
        IAMCertificateId:
          $ref: "#/components/schemas/ServerCertificateId"
          description: This field only supports standard distributions. You can't specify this field for multi-tenant distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. If the distribution uses Aliases (alternate domain names or CNAMEs) and the SSL/TLS certificate is stored in Identity and Access Management (IAM), provide the ID of the IAM certificate. If you specify an IAM certificate ID, you must also specify values for MinimumProtocolVersion and SSLSupportMethod.
        ACMCertificateArn:
          $ref: "#/components/schemas/string"
          description: If the distribution uses Aliases (alternate domain names or CNAMEs) and the SSL/TLS certificate is stored in Certificate Manager (ACM), provide the Amazon Resource Name (ARN) of the ACM certificate. CloudFront only supports ACM certificates in the US East (N. Virginia) Region (us-east-1). If you specify an ACM certificate ARN, you must also specify values for MinimumProtocolVersion and SSLSupportMethod.
        SSLSupportMethod:
          $ref: "#/components/schemas/SSLSupportMethod"
          description: If the distribution uses Aliases (alternate domain names or CNAMEs), specify which viewers the distribution accepts HTTPS connections from. sni-only – The distribution accepts HTTPS connections from only viewers that support server name indication (SNI). This is recommended. Most browsers and clients support SNI. vip – The distribution accepts HTTPS connections from all viewers including those that don't support SNI. This is not recommended, and results in additional monthly charges from CloudFront. static-ip - Do not specify this value unless your distribution has been enabled for this feature by the CloudFront team. If you have a use case that requires static IP addresses for a distribution, contact CloudFront through the Amazon Web Services Support Center. If the distribution uses the CloudFront domain name such as d111111abcdef8.cloudfront.net, don't set a value for this field.
        MinimumProtocolVersion:
          $ref: "#/components/schemas/MinimumProtocolVersion"
          description: "If the distribution uses Aliases (alternate domain names or CNAMEs), specify the security policy that you want CloudFront to use for HTTPS connections with viewers. The security policy determines two settings: The minimum SSL/TLS protocol that CloudFront can use to communicate with viewers. The ciphers that CloudFront can use to encrypt the content that it returns to viewers. For more information, see Security Policy and Supported Protocols and Ciphers Between Viewers and CloudFront in the Amazon CloudFront Developer Guide. On the CloudFront console, this setting is called Security Policy. When you're using SNI only (you set SSLSupportMethod to sni-only), you must specify TLSv1 or higher. If the distribution uses the CloudFront domain name such as d111111abcdef8.cloudfront.net (you set CloudFrontDefaultCertificate to true), CloudFront automatically sets the security policy to TLSv1 regardless of the value that you set here."
        Certificate:
          $ref: "#/components/schemas/string"
          description: "This field is deprecated. Use one of the following fields instead: ACMCertificateArn IAMCertificateId CloudFrontDefaultCertificate"
        CertificateSource:
          $ref: "#/components/schemas/CertificateSource"
          description: "This field is deprecated. Use one of the following fields instead: ACMCertificateArn IAMCertificateId CloudFrontDefaultCertificate"
    ServerCertificateId:
      type: string
      minLength: 0
      maxLength: 32
    SSLSupportMethod:
      type: string
      enum:
        - sni-only
        - vip
        - static-ip
    MinimumProtocolVersion:
      type: string
      enum:
        - SSLv3
        - TLSv1
        - TLSv1_2016
        - TLSv1.1_2016
        - TLSv1.2_2018
        - TLSv1.2_2019
        - TLSv1.2_2021
        - TLSv1.3_2025
        - TLSv1.2_2025
    CertificateSource:
      type: string
      enum:
        - cloudfront
        - iam
        - acm
    Restrictions:
      description: A complex type that identifies ways in which you want to restrict distribution of your content.
      type: object
      properties:
        GeoRestriction:
          $ref: "#/components/schemas/GeoRestriction"
          description: A complex type that controls the countries in which your content is distributed. CloudFront determines the location of your users using MaxMind GeoIP databases.
      required:
        - GeoRestriction
    GeoRestriction:
      description: A complex type that controls the countries in which your content is distributed. CloudFront determines the location of your users using MaxMind GeoIP databases.
      type: object
      properties:
        RestrictionType:
          $ref: "#/components/schemas/GeoRestrictionType"
          description: "The method that you want to use to restrict distribution of your content by country: none: No geo restriction is enabled, meaning access to content is not restricted by client geo location. blacklist: The Location elements specify the countries in which you don't want CloudFront to distribute your content. whitelist: The Location elements specify the countries in which you want CloudFront to distribute your content."
        Quantity:
          $ref: "#/components/schemas/integer"
          description: When geo restriction is enabled, this is the number of countries in your whitelist or blacklist. Otherwise, when it is not enabled, Quantity is 0, and you can omit Items.
        Items:
          $ref: "#/components/schemas/LocationList"
          description: A complex type that contains a Location element for each country in which you want CloudFront either to distribute your content (whitelist) or not distribute your content (blacklist). The Location element is a two-letter, uppercase country code for a country that you want to include in your blacklist or whitelist. Include one Location element for each country. CloudFront and MaxMind both use ISO 3166 country codes. For the current list of countries and the corresponding codes, see ISO 3166-1-alpha-2 code on the International Organization for Standardization website. You can also refer to the country list on the CloudFront console, which includes both country names and codes.
      required:
        - RestrictionType
        - Quantity
    GeoRestrictionType:
      type: string
      enum:
        - blacklist
        - whitelist
        - none
    LocationList:
      type: array
      items:
        $ref: "#/components/schemas/string"
    HttpVersion:
      type: string
      enum:
        - http1.1
        - http2
        - http3
        - http2and3
    TenantConfig:
      description: This field only supports multi-tenant distributions. You can't specify this field for standard distributions. For more information, see Unsupported features for SaaS Manager for Amazon CloudFront in the Amazon CloudFront Developer Guide. The configuration for a distribution tenant.
      type: object
      properties:
        ParameterDefinitions:
          $ref: "#/components/schemas/ParameterDefinitions"
          description: The parameters that you specify for a distribution tenant.
    ParameterDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/ParameterDefinition"
    ParameterDefinition:
      description: A list of parameter values to add to the resource. A parameter is specified as a key-value pair. A valid parameter value must exist for any parameter that is marked as required in the multi-tenant distribution.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ParameterName"
          description: The name of the parameter.
        Definition:
          $ref: "#/components/schemas/ParameterDefinitionSchema"
          description: The value that you assigned to the parameter.
      required:
        - Name
        - Definition
    ParameterName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9-_]+"
    ParameterDefinitionSchema:
      description: An object that contains information about the parameter definition.
      type: object
      properties:
        StringSchema:
          $ref: "#/components/schemas/StringSchemaConfig"
          description: An object that contains information about the string schema.
    StringSchemaConfig:
      description: The configuration for a string schema.
      type: object
      properties:
        Comment:
          $ref: "#/components/schemas/sensitiveStringType"
          description: A comment to describe the parameter.
        DefaultValue:
          $ref: "#/components/schemas/ParameterValue"
          description: The default value of the parameter.
        Required:
          $ref: "#/components/schemas/boolean"
          description: Whether the defined parameter is required.
      required:
        - Required
    ParameterValue:
      type: string
      minLength: 1
      maxLength: 256
    ConnectionMode:
      type: string
      enum:
        - direct
        - tenant-only
    ViewerMtlsConfig:
      description: A viewer mTLS configuration.
      type: object
      properties:
        Mode:
          $ref: "#/components/schemas/ViewerMtlsMode"
          description: The viewer mTLS mode.
        TrustStoreConfig:
          $ref: "#/components/schemas/TrustStoreConfig"
          description: The trust store configuration associated with the viewer mTLS configuration.
    ViewerMtlsMode:
      type: string
      enum:
        - required
        - optional
        - passthrough
    TrustStoreConfig:
      description: A trust store configuration.
      type: object
      properties:
        TrustStoreId:
          $ref: "#/components/schemas/string"
          description: The trust store ID.
        AdvertiseTrustStoreCaNames:
          $ref: "#/components/schemas/boolean"
          description: The configuration to use to advertise trust store CA names.
        IgnoreCertificateExpiry:
          $ref: "#/components/schemas/boolean"
          description: The configuration to use to ignore certificate expiration.
      required:
        - TrustStoreId
    ConnectionFunctionAssociation:
      description: A connection function association.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ResourceId"
          description: The association's ID.
      required:
        - Id
    ResourceId:
      type: string
      minLength: 1
      maxLength: 64
    CacheTagConfig:
      description: A complex type that specifies the HTTP header name from which CloudFront extracts cache tags from origin responses. When you add CacheTagConfig to a distribution, CloudFront reads the specified header from origin responses, parses the comma-separated tag values, and stores them with the cached object. You can then invalidate cached objects by tag using the CreateInvalidation API.
      type: object
      properties:
        HeaderName:
          $ref: "#/components/schemas/string"
          description: The name of the HTTP header that your origin includes in responses. CloudFront uses this header to extract cache tags. The header value must contain comma-separated tag values (for example, product:electronics, category:tv, brand:example).
      required:
        - HeaderName
    CreateDistributionOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DistributionDisplay"
    CreateDistributionTenantRequestNameString:
      type: string
      pattern: "[a-zA-Z0-9][a-zA-Z0-9-.]{1,126}[a-zA-Z0-9]"
    DomainList:
      type: array
      items:
        $ref: "#/components/schemas/DomainItem"
    DomainItem:
      description: The domain for the specified distribution tenant.
      type: object
      properties:
        Domain:
          $ref: "#/components/schemas/string"
          description: The domain name.
      required:
        - Domain
    Customizations:
      description: Customizations for the distribution tenant. For each distribution tenant, you can specify the geographic restrictions, and the Amazon Resource Names (ARNs) for the ACM certificate and WAF web ACL. These are specific values that you can override or disable from the multi-tenant distribution that was used to create the distribution tenant.
      type: object
      properties:
        WebAcl:
          $ref: "#/components/schemas/WebAclCustomization"
          description: The WAF web ACL.
        Certificate:
          $ref: "#/components/schemas/Certificate"
          description: The Certificate Manager (ACM) certificate.
        GeoRestrictions:
          $ref: "#/components/schemas/GeoRestrictionCustomization"
          description: The geographic restrictions.
    WebAclCustomization:
      description: The WAF web ACL customization specified for the distribution tenant.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/CustomizationActionType"
          description: The action for the WAF web ACL customization. You can specify override to specify a separate WAF web ACL for the distribution tenant. If you specify disable, the distribution tenant won't have WAF web ACL protections and won't inherit from the multi-tenant distribution.
        Arn:
          $ref: "#/components/schemas/string"
          description: The Amazon Resource Name (ARN) of the WAF web ACL.
      required:
        - Action
    CustomizationActionType:
      type: string
      enum:
        - override
        - disable
    Certificate:
      description: The Certificate Manager (ACM) certificate associated with your distribution.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/string"
          description: The Amazon Resource Name (ARN) of the ACM certificate.
      required:
        - Arn
    GeoRestrictionCustomization:
      description: The customizations that you specified for the distribution tenant for geographic restrictions.
      type: object
      properties:
        RestrictionType:
          $ref: "#/components/schemas/GeoRestrictionType"
          description: "The method that you want to use to restrict distribution of your content by country: none: No geographic restriction is enabled, meaning access to content is not restricted by client geo location. blacklist: The Location elements specify the countries in which you don't want CloudFront to distribute your content. whitelist: The Location elements specify the countries in which you want CloudFront to distribute your content."
        Locations:
          $ref: "#/components/schemas/LocationList"
          description: The locations for geographic restrictions.
      required:
        - RestrictionType
    Parameters:
      type: array
      items:
        $ref: "#/components/schemas/Parameter"
    Parameter:
      description: A list of parameter values to add to the resource. A parameter is specified as a key-value pair. A valid parameter value must exist for any parameter that is marked as required in the multi-tenant distribution.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ParameterName"
          description: The parameter name.
        Value:
          $ref: "#/components/schemas/ParameterValue"
          description: The parameter value.
      required:
        - Name
        - Value
    ManagedCertificateRequest:
      description: An object that represents the request for the Amazon CloudFront managed ACM certificate.
      type: object
      properties:
        ValidationTokenHost:
          $ref: "#/components/schemas/ValidationTokenHost"
          description: Specify how the HTTP validation token will be served when requesting the CloudFront managed ACM certificate. For cloudfront, CloudFront will automatically serve the validation token. Choose this mode if you can point the domain's DNS to CloudFront immediately. For self-hosted, you serve the validation token from your existing infrastructure. Choose this mode when you need to maintain current traffic flow while your certificate is being issued. You can place the validation token at the well-known path on your existing web server, wait for ACM to validate and issue the certificate, and then update your DNS to point to CloudFront.
        PrimaryDomainName:
          $ref: "#/components/schemas/string"
          description: The primary domain name associated with the CloudFront managed ACM certificate.
        CertificateTransparencyLoggingPreference:
          $ref: "#/components/schemas/CertificateTransparencyLoggingPreference"
          description: You can opt out of certificate transparency logging by specifying the disabled option. Opt in by specifying enabled. For more information, see Certificate Transparency Logging in the Certificate Manager User Guide.
      required:
        - ValidationTokenHost
    ValidationTokenHost:
      type: string
      enum:
        - cloudfront
        - self-hosted
    CertificateTransparencyLoggingPreference:
      type: string
      enum:
        - enabled
        - disabled
    DistributionTenantDisplay:
      type: object
      properties:
        Id:
          type: string
          description: The ID of the distribution tenant.
        DistributionId:
          type: string
          description: The ID of the multi-tenant distribution.
        Name:
          type: string
          description: The name of the distribution tenant.
        Arn:
          type: string
          description: The Amazon Resource Name (ARN) of the distribution tenant.
        Domains:
          type: string
          description: The domains associated with the distribution tenant.
        Tags:
          type: string
          description: A complex type that contains zero or more Tag elements.
        Customizations:
          type: string
          description: Customizations for the distribution tenant. For each distribution tenant, you can specify the geographic restrictions, and the Amazon Resource Names (ARNs) for the ACM certificate and WAF web ACL. These are specific values that you can override or disable from the multi-tenant distribution that was used to create the distribution tenant.
        Parameters:
          type: string
          description: A list of parameter values to add to the resource. A parameter is specified as a key-value pair. A valid parameter value must exist for any parameter that is marked as required in the multi-tenant distribution.
        ConnectionGroupId:
          type: string
          description: The ID of the connection group for the distribution tenant. If you don't specify a connection group, CloudFront uses the default connection group.
        CreatedTime:
          type: string
          description: The date and time when the distribution tenant was created.
        LastModifiedTime:
          type: string
          description: The date and time when the distribution tenant was updated.
        Enabled:
          type: boolean
          description: Indicates whether the distribution tenant is in an enabled state. If disabled, the distribution tenant won't serve traffic.
        Status:
          type: string
          description: The status of the distribution tenant.
    CreateDistributionTenantOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DistributionTenantDisplay"
    DistributionConfigWithTags:
      description: A distribution Configuration and a list of tags to be associated with the distribution.
      type: object
      properties:
        DistributionConfig:
          $ref: "#/components/schemas/DistributionConfig"
          description: A distribution configuration.
        Tags:
          $ref: "#/components/schemas/Tags"
          description: A complex type that contains zero or more Tag elements.
      required:
        - DistributionConfig
        - Tags
    CreateDistributionWithTagsResultDisplay:
      type: object
