    ResponseHeadersPolicySecurityHeadersConfig:
      description: A configuration for a set of security-related HTTP response headers. CloudFront adds these headers to HTTP responses that it sends for requests that match a cache behavior associated with this response headers policy.
      type: object
      properties:
        XSSProtection:
          $ref: "#/components/schemas/ResponseHeadersPolicyXSSProtection"
          description: Determines whether CloudFront includes the X-XSS-Protection HTTP response header and the header's value. For more information about the X-XSS-Protection HTTP response header, see X-XSS-Protection in the MDN Web Docs.
        FrameOptions:
          $ref: "#/components/schemas/ResponseHeadersPolicyFrameOptions"
          description: Determines whether CloudFront includes the X-Frame-Options HTTP response header and the header's value. For more information about the X-Frame-Options HTTP response header, see X-Frame-Options in the MDN Web Docs.
        ReferrerPolicy:
          $ref: "#/components/schemas/ResponseHeadersPolicyReferrerPolicy"
          description: Determines whether CloudFront includes the Referrer-Policy HTTP response header and the header's value. For more information about the Referrer-Policy HTTP response header, see Referrer-Policy in the MDN Web Docs.
        ContentSecurityPolicy:
          $ref: "#/components/schemas/ResponseHeadersPolicyContentSecurityPolicy"
          description: The policy directives and their values that CloudFront includes as values for the Content-Security-Policy HTTP response header. For more information about the Content-Security-Policy HTTP response header, see Content-Security-Policy in the MDN Web Docs.
        ContentTypeOptions:
          $ref: "#/components/schemas/ResponseHeadersPolicyContentTypeOptions"
          description: Determines whether CloudFront includes the X-Content-Type-Options HTTP response header with its value set to nosniff. For more information about the X-Content-Type-Options HTTP response header, see X-Content-Type-Options in the MDN Web Docs.
        StrictTransportSecurity:
          $ref: "#/components/schemas/ResponseHeadersPolicyStrictTransportSecurity"
          description: Determines whether CloudFront includes the Strict-Transport-Security HTTP response header and the header's value. For more information about the Strict-Transport-Security HTTP response header, see Security headers in the Amazon CloudFront Developer Guide and Strict-Transport-Security in the MDN Web Docs.
    ResponseHeadersPolicyXSSProtection:
      description: Determines whether CloudFront includes the X-XSS-Protection HTTP response header and the header's value. For more information about the X-XSS-Protection HTTP response header, see X-XSS-Protection in the MDN Web Docs.
      type: object
      properties:
        Override:
          $ref: "#/components/schemas/boolean"
          description: A Boolean that determines whether CloudFront overrides the X-XSS-Protection HTTP response header received from the origin with the one specified in this response headers policy.
        Protection:
          $ref: "#/components/schemas/boolean"
          description: A Boolean that determines the value of the X-XSS-Protection HTTP response header. When this setting is true, the value of the X-XSS-Protection header is 1. When this setting is false, the value of the X-XSS-Protection header is 0. For more information about these settings, see X-XSS-Protection in the MDN Web Docs.
        ModeBlock:
          $ref: "#/components/schemas/boolean"
          description: A Boolean that determines whether CloudFront includes the mode=block directive in the X-XSS-Protection header. For more information about this directive, see X-XSS-Protection in the MDN Web Docs.
        ReportUri:
          $ref: "#/components/schemas/string"
          description: A reporting URI, which CloudFront uses as the value of the report directive in the X-XSS-Protection header. You cannot specify a ReportUri when ModeBlock is true. For more information about using a reporting URL, see X-XSS-Protection in the MDN Web Docs.
      required:
        - Override
        - Protection
    ResponseHeadersPolicyFrameOptions:
      description: Determines whether CloudFront includes the X-Frame-Options HTTP response header and the header's value. For more information about the X-Frame-Options HTTP response header, see X-Frame-Options in the MDN Web Docs.
      type: object
      properties:
        Override:
          $ref: "#/components/schemas/boolean"
          description: A Boolean that determines whether CloudFront overrides the X-Frame-Options HTTP response header received from the origin with the one specified in this response headers policy.
        FrameOption:
          $ref: "#/components/schemas/FrameOptionsList"
          description: The value of the X-Frame-Options HTTP response header. Valid values are DENY and SAMEORIGIN. For more information about these values, see X-Frame-Options in the MDN Web Docs.
      required:
        - Override
        - FrameOption
    FrameOptionsList:
      type: string
      enum:
        - DENY
        - SAMEORIGIN
    ResponseHeadersPolicyReferrerPolicy:
      description: Determines whether CloudFront includes the Referrer-Policy HTTP response header and the header's value. For more information about the Referrer-Policy HTTP response header, see Referrer-Policy in the MDN Web Docs.
      type: object
      properties:
        Override:
          $ref: "#/components/schemas/boolean"
          description: A Boolean that determines whether CloudFront overrides the Referrer-Policy HTTP response header received from the origin with the one specified in this response headers policy.
        ReferrerPolicy:
          $ref: "#/components/schemas/ReferrerPolicyList"
          description: "The value of the Referrer-Policy HTTP response header. Valid values are: no-referrer no-referrer-when-downgrade origin origin-when-cross-origin same-origin strict-origin strict-origin-when-cross-origin unsafe-url For more information about these values, see Referrer-Policy in the MDN Web Docs."
      required:
        - Override
        - ReferrerPolicy
    ReferrerPolicyList:
      type: string
      enum:
        - no-referrer
        - no-referrer-when-downgrade
        - origin
        - origin-when-cross-origin
        - same-origin
        - strict-origin
        - strict-origin-when-cross-origin
        - unsafe-url
    ResponseHeadersPolicyContentSecurityPolicy:
      description: The policy directives and their values that CloudFront includes as values for the Content-Security-Policy HTTP response header. For more information about the Content-Security-Policy HTTP response header, see Content-Security-Policy in the MDN Web Docs.
      type: object
      properties:
        Override:
          $ref: "#/components/schemas/boolean"
          description: A Boolean that determines whether CloudFront overrides the Content-Security-Policy HTTP response header received from the origin with the one specified in this response headers policy.
        ContentSecurityPolicy:
          $ref: "#/components/schemas/string"
          description: The policy directives and their values that CloudFront includes as values for the Content-Security-Policy HTTP response header.
      required:
        - Override
        - ContentSecurityPolicy
    ResponseHeadersPolicyContentTypeOptions:
      description: Determines whether CloudFront includes the X-Content-Type-Options HTTP response header with its value set to nosniff. For more information about the X-Content-Type-Options HTTP response header, see X-Content-Type-Options in the MDN Web Docs.
      type: object
      properties:
        Override:
          $ref: "#/components/schemas/boolean"
          description: A Boolean that determines whether CloudFront overrides the X-Content-Type-Options HTTP response header received from the origin with the one specified in this response headers policy.
      required:
        - Override
    ResponseHeadersPolicyStrictTransportSecurity:
      description: Determines whether CloudFront includes the Strict-Transport-Security HTTP response header and the header's value. For more information about the Strict-Transport-Security HTTP response header, see Strict-Transport-Security in the MDN Web Docs.
      type: object
      properties:
        Override:
          $ref: "#/components/schemas/boolean"
          description: A Boolean that determines whether CloudFront overrides the Strict-Transport-Security HTTP response header received from the origin with the one specified in this response headers policy.
        IncludeSubdomains:
          $ref: "#/components/schemas/boolean"
          description: A Boolean that determines whether CloudFront includes the includeSubDomains directive in the Strict-Transport-Security HTTP response header.
        Preload:
          $ref: "#/components/schemas/boolean"
          description: A Boolean that determines whether CloudFront includes the preload directive in the Strict-Transport-Security HTTP response header.
        AccessControlMaxAgeSec:
          $ref: "#/components/schemas/integer"
          description: A number that CloudFront uses as the value for the max-age directive in the Strict-Transport-Security HTTP response header.
      required:
        - Override
        - AccessControlMaxAgeSec
    ResponseHeadersPolicyServerTimingHeadersConfig:
      description: A configuration for enabling the Server-Timing header in HTTP responses sent from CloudFront. CloudFront adds this header to HTTP responses that it sends in response to requests that match a cache behavior that's associated with this response headers policy. You can use the Server-Timing header to view metrics that can help you gain insights about the behavior and performance of CloudFront. For example, you can see which cache layer served a cache hit, or the first byte latency from the origin when there was a cache miss. You can use the metrics in the Server-Timing header to troubleshoot issues or test the efficiency of your CloudFront configuration. For more information, see Server-Timing header in the Amazon CloudFront Developer Guide.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/boolean"
          description: A Boolean that determines whether CloudFront adds the Server-Timing header to HTTP responses that it sends in response to requests that match a cache behavior that's associated with this response headers policy.
        SamplingRate:
          $ref: "#/components/schemas/SamplingRate"
          description: A number 0–100 (inclusive) that specifies the percentage of responses that you want CloudFront to add the Server-Timing header to. When you set the sampling rate to 100, CloudFront adds the Server-Timing header to the HTTP response for every request that matches the cache behavior that this response headers policy is attached to. When you set it to 50, CloudFront adds the header to 50% of the responses for requests that match the cache behavior. You can set the sampling rate to any number 0–100 with up to four decimal places.
      required:
        - Enabled
    SamplingRate:
      type: number
      format: double
      minimum: 0
      maximum: 100
    ResponseHeadersPolicyCustomHeadersConfig:
      description: A list of HTTP response header names and their values. CloudFront includes these headers in HTTP responses that it sends for requests that match a cache behavior that's associated with this response headers policy.
      type: object
      properties:
        Quantity:
          $ref: "#/components/schemas/integer"
          description: The number of HTTP response headers in the list.
