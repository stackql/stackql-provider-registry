        ProfileId:
          $ref: "#/components/schemas/string"
          description: The profile ID for a field-level encryption content type-profile mapping.
        ContentType:
          $ref: "#/components/schemas/string"
          description: The content type for a field-level encryption content type-profile mapping.
      required:
        - Format
        - ContentType
    Format:
      type: string
