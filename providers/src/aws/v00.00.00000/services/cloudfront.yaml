    StreamingDistributionConfig:
      description: The RTMP distribution's configuration information.
      type: object
      properties:
        CallerReference:
          $ref: "#/components/schemas/string"
          description: A unique value (for example, a date-time stamp) that ensures that the request can't be replayed. If the value of CallerReference is new (regardless of the content of the StreamingDistributionConfig object), CloudFront creates a new distribution. If CallerReference is a value that you already sent in a previous request to create a distribution, CloudFront returns a DistributionAlreadyExists error.
        S3Origin:
          $ref: "#/components/schemas/S3Origin"
          description: A complex type that contains information about the Amazon S3 bucket from which you want CloudFront to get your media files for distribution.
        Aliases:
          $ref: "#/components/schemas/Aliases"
          description: A complex type that contains information about CNAMEs (alternate domain names), if any, for this streaming distribution.
        Comment:
          $ref: "#/components/schemas/string"
          description: Any comments you want to include about the streaming distribution.
        Logging:
          $ref: "#/components/schemas/StreamingLoggingConfig"
          description: A complex type that controls whether access logs are written for the streaming distribution.
        TrustedSigners:
          $ref: "#/components/schemas/TrustedSigners"
          description: A complex type that specifies any Amazon Web Services accounts that you want to permit to create signed URLs for private content. If you want the distribution to use signed URLs, include this element; if you want the distribution to use public URLs, remove this element. For more information, see Serving Private Content through CloudFront in the Amazon CloudFront Developer Guide.
        PriceClass:
          $ref: "#/components/schemas/PriceClass"
          description: A complex type that contains information about price class for this streaming distribution.
        Enabled:
          $ref: "#/components/schemas/boolean"
          description: Whether the streaming distribution is enabled to accept user requests for content.
      required:
        - CallerReference
        - S3Origin
        - Comment
        - TrustedSigners
        - Enabled
    S3Origin:
      description: A complex type that contains information about the Amazon S3 bucket from which you want CloudFront to get your media files for distribution.
      type: object
      properties:
        DomainName:
          $ref: "#/components/schemas/string"
          description: The DNS name of the Amazon S3 origin.
        OriginAccessIdentity:
          $ref: "#/components/schemas/string"
          description: The CloudFront origin access identity to associate with the distribution. Use an origin access identity to configure the distribution so that end users can only access objects in an Amazon S3 bucket through CloudFront. If you want end users to be able to access objects using either the CloudFront URL or the Amazon S3 URL, specify an empty OriginAccessIdentity element. To delete the origin access identity from an existing distribution, update the distribution configuration and include an empty OriginAccessIdentity element. To replace the origin access identity, update the distribution configuration and specify the new origin access identity. For more information, see Using an Origin Access Identity to Restrict Access to Your Amazon S3 Content in the Amazon CloudFront Developer Guide.
      required:
        - DomainName
        - OriginAccessIdentity
    StreamingLoggingConfig:
      description: A complex type that controls whether access logs are written for this streaming distribution.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/boolean"
          description: Specifies whether you want CloudFront to save access logs to an Amazon S3 bucket. If you don't want to enable logging when you create a streaming distribution or if you want to disable logging for an existing streaming distribution, specify false for Enabled, and specify empty Bucket and Prefix elements. If you specify false for Enabled but you specify values for Bucket and Prefix, the values are automatically deleted.
        Bucket:
          $ref: "#/components/schemas/string"
          description: The Amazon S3 bucket to store the access logs in, for example, amzn-s3-demo-bucket.s3.amazonaws.com.
        Prefix:
          $ref: "#/components/schemas/string"
          description: An optional string that you want CloudFront to prefix to the access log filenames for this streaming distribution, for example, myprefix/. If you want to enable logging, but you don't want to specify a prefix, you still must include an empty Prefix element in the Logging element.
      required:
        - Enabled
        - Bucket
        - Prefix
    StreamingDistributionDisplay:
      type: object
      properties:
        Id:
          type: string
          description: "The identifier for the RTMP distribution. For example: EGTXBD79EXAMPLE."
        ARN:
          type: string
          description: "The ARN (Amazon Resource Name) for the distribution. For example: arn:aws:cloudfront::123456789012:distribution/EDFDVBD632BHDS5, where 123456789012 is your Amazon Web Services account ID."
        Status:
          type: string
          description: The current status of the RTMP distribution. When the status is Deployed, the distribution's information is propagated to all CloudFront edge locations.
        LastModifiedTime:
          type: string
          description: The date and time that the distribution was last modified.
        DomainName:
          type: string
          description: The domain name that corresponds to the streaming distribution, for example, s5c39gqb8ow64r.cloudfront.net.
        ActiveTrustedSigners:
          type: string
          description: A complex type that lists the Amazon Web Services accounts, if any, that you included in the TrustedSigners complex type for this distribution. These are the accounts that you want to allow to create signed URLs for private content. The Signer complex type lists the Amazon Web Services account number of the trusted signer or self if the signer is the Amazon Web Services account that created the distribution. The Signer element also includes the IDs of any active CloudFront key pairs that are associated with the trusted signer's Amazon Web Services account. If no KeyPairId element appears for a Signer, that signer can't create signed URLs. For more information, see Serving Private Content through CloudFront in the Amazon CloudFront Developer Guide.
        StreamingDistributionConfig:
          type: string
          description: The current configuration information for the RTMP distribution.
    CreateStreamingDistributionOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/StreamingDistributionDisplay"
