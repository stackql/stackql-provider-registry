    OriginAccessControlConfig:
      description: A CloudFront origin access control configuration.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/string"
          description: A name to identify the origin access control. You can specify up to 64 characters.
        Description:
          $ref: "#/components/schemas/string"
          description: A description of the origin access control.
        SigningProtocol:
          $ref: "#/components/schemas/OriginAccessControlSigningProtocols"
          description: The signing protocol of the origin access control, which determines how CloudFront signs (authenticates) requests. The only valid value is sigv4.
        SigningBehavior:
          $ref: "#/components/schemas/OriginAccessControlSigningBehaviors"
          description: "Specifies which requests CloudFront signs (adds authentication information to). Specify always for the most common use case. For more information, see origin access control advanced settings in the Amazon CloudFront Developer Guide. This field can have one of the following values: always – CloudFront signs all origin requests, overwriting the Authorization header from the viewer request if one exists. never – CloudFront doesn't sign any origin requests. This value turns off origin access control for all origins in all distributions that use this origin access control. no-override – If the viewer request doesn't contain the Authorization header, then CloudFront signs the origin request. If the viewer request contains the Authorization header, then CloudFront doesn't sign the origin request and instead passes along the Authorization header from the viewer request. WARNING: To pass along the Authorization header from the viewer request, you must add the Authorization header to a cache policy for all cache behaviors that use origins associated with this origin access control."
        OriginAccessControlOriginType:
          $ref: "#/components/schemas/OriginAccessControlOriginTypes"
          description: The type of origin that this origin access control is for.
      required:
        - Name
        - SigningProtocol
        - SigningBehavior
        - OriginAccessControlOriginType
    OriginAccessControlSigningProtocols:
      type: string
      enum:
        - sigv4
    OriginAccessControlSigningBehaviors:
      type: string
      enum:
        - never
        - always
        - no-override
    OriginAccessControlOriginTypes:
      type: string
      enum:
        - s3
        - mediastore
        - mediapackagev2
        - lambda
    OriginAccessControlDisplay:
      type: object
      properties:
        Id:
          type: string
          description: The unique identifier of the origin access control.
        OriginAccessControlConfig:
          type: string
          description: The origin access control.
    CreateOriginAccessControlOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/OriginAccessControlDisplay"
    OriginRequestPolicyConfig:
      description: "An origin request policy configuration. This configuration determines the values that CloudFront includes in requests that it sends to the origin. Each request that CloudFront sends to the origin includes the following: The request body and the URL path (without the domain name) from the viewer request. The headers that CloudFront automatically includes in every origin request, including Host, User-Agent, and X-Amz-Cf-Id. All HTTP headers, cookies, and URL query strings that are specified in the cache policy or the origin request policy. These can include items from the viewer request and, in the case of headers, additional ones that are added by CloudFront. CloudFront sends a request when it can't find an object in its cache that matches the request. If you want to send values to the origin and also include them in the cache key, use CachePolicy."
      type: object
      properties:
        Comment:
          $ref: "#/components/schemas/string"
          description: A comment to describe the origin request policy. The comment cannot be longer than 128 characters.
        Name:
          $ref: "#/components/schemas/string"
          description: A unique name to identify the origin request policy.
        HeadersConfig:
          $ref: "#/components/schemas/OriginRequestPolicyHeadersConfig"
          description: The HTTP headers to include in origin requests. These can include headers from viewer requests and additional headers added by CloudFront.
        CookiesConfig:
          $ref: "#/components/schemas/OriginRequestPolicyCookiesConfig"
          description: The cookies from viewer requests to include in origin requests.
        QueryStringsConfig:
          $ref: "#/components/schemas/OriginRequestPolicyQueryStringsConfig"
          description: The URL query strings from viewer requests to include in origin requests.
      required:
        - Name
        - HeadersConfig
        - CookiesConfig
        - QueryStringsConfig
    OriginRequestPolicyHeadersConfig:
      description: An object that determines whether any HTTP headers (and if so, which headers) are included in requests that CloudFront sends to the origin.
      type: object
      properties:
        HeaderBehavior:
          $ref: "#/components/schemas/OriginRequestPolicyHeaderBehavior"
          description: "Determines whether any HTTP headers are included in requests that CloudFront sends to the origin. Valid values are: none – No HTTP headers in viewer requests are included in requests that CloudFront sends to the origin. Even when this field is set to none, any headers that are listed in a CachePolicy are included in origin requests. whitelist – Only the HTTP headers that are listed in the Headers type are included in requests that CloudFront sends to the origin. allViewer – All HTTP headers in viewer requests are included in requests that CloudFront sends to the origin. allViewerAndWhitelistCloudFront – All HTTP headers in viewer requests and the additional CloudFront headers that are listed in the Headers type are included in requests that CloudFront sends to the origin. The additional headers are added by CloudFront. allExcept – All HTTP headers in viewer requests are included in requests that CloudFront sends to the origin, except for those listed in the Headers type, which are not included."
        Headers:
          $ref: "#/components/schemas/Headers"
      required:
        - HeaderBehavior
    OriginRequestPolicyHeaderBehavior:
      type: string
      enum:
        - none
        - whitelist
        - allViewer
        - allViewerAndWhitelistCloudFront
        - allExcept
    OriginRequestPolicyCookiesConfig:
      description: An object that determines whether any cookies in viewer requests (and if so, which cookies) are included in requests that CloudFront sends to the origin.
      type: object
      properties:
        CookieBehavior:
          $ref: "#/components/schemas/OriginRequestPolicyCookieBehavior"
          description: "Determines whether cookies in viewer requests are included in requests that CloudFront sends to the origin. Valid values are: none – No cookies in viewer requests are included in requests that CloudFront sends to the origin. Even when this field is set to none, any cookies that are listed in a CachePolicy are included in origin requests. whitelist – Only the cookies in viewer requests that are listed in the CookieNames type are included in requests that CloudFront sends to the origin. all – All cookies in viewer requests are included in requests that CloudFront sends to the origin. allExcept – All cookies in viewer requests are included in requests that CloudFront sends to the origin, except for those listed in the CookieNames type, which are not included."
        Cookies:
          $ref: "#/components/schemas/CookieNames"
      required:
        - CookieBehavior
    OriginRequestPolicyCookieBehavior:
      type: string
      enum:
        - none
        - whitelist
        - all
        - allExcept
    OriginRequestPolicyQueryStringsConfig:
      description: An object that determines whether any URL query strings in viewer requests (and if so, which query strings) are included in requests that CloudFront sends to the origin.
      type: object
      properties:
        QueryStringBehavior:
          $ref: "#/components/schemas/OriginRequestPolicyQueryStringBehavior"
          description: "Determines whether any URL query strings in viewer requests are included in requests that CloudFront sends to the origin. Valid values are: none – No query strings in viewer requests are included in requests that CloudFront sends to the origin. Even when this field is set to none, any query strings that are listed in a CachePolicy are included in origin requests. whitelist – Only the query strings in viewer requests that are listed in the QueryStringNames type are included in requests that CloudFront sends to the origin. all – All query strings in viewer requests are included in requests that CloudFront sends to the origin. allExcept – All query strings in viewer requests are included in requests that CloudFront sends to the origin, except for those listed in the QueryStringNames type, which are not included."
        QueryStrings:
          $ref: "#/components/schemas/QueryStringNames"
          description: Contains the specific query strings in viewer requests that either are or are not included in requests that CloudFront sends to the origin. The behavior depends on whether the QueryStringBehavior field in the OriginRequestPolicyQueryStringsConfig type is set to whitelist (the listed query strings are included) or allExcept (the listed query strings are not included, but all other query strings are).
      required:
        - QueryStringBehavior
    OriginRequestPolicyQueryStringBehavior:
      type: string
      enum:
        - none
        - whitelist
        - all
        - allExcept
    OriginRequestPolicyDisplay:
      type: object
      properties:
        Id:
          type: string
          description: The unique identifier for the origin request policy.
        LastModifiedTime:
          type: string
          description: The date and time when the origin request policy was last modified.
        OriginRequestPolicyConfig:
          type: string
          description: The origin request policy configuration.
    CreateOriginRequestPolicyOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/OriginRequestPolicyDisplay"
