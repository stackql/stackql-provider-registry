  /2020-05-31/distributionsByWebACLId/{web_acl_id}:
    get:
      operationId: ListDistributionsByWebACLId
      description: List the distributions that are associated with a specified WAF web ACL.
      parameters:
        - name: Marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: Use Marker and MaxItems to control pagination of results. If you have more than MaxItems distributions that satisfy the request, the response includes a NextMarker element. To get the next page of results, submit another request. For the value of Marker, specify the value of NextMarker from the last response. (For the first request, omit Marker.)
        - name: MaxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The maximum number of distributions that you want CloudFront to return in the response body. The maximum and default values are both 100.
        - name: web_acl_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The ID of the WAF web ACL that you want to list the associated distributions. If you specify "null" for the ID, the request returns a list of the distributions that aren't associated with a web ACL. For WAFV2, this is the ARN of the web ACL, such as arn:aws:wafv2:us-east-1:123456789012:global/webacl/ExampleWebACL/a1b2c3d4-5678-90ab-cdef-EXAMPLE11111. For WAF Classic, this is the ID of the web ACL, such as a1b2c3d4-5678-90ab-cdef-EXAMPLE11111.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDistributionsByWebACLIdOutputDisplay"
  /2020-05-31/domain-conflicts:
    post:
      operationId: ListDomainConflicts
      description: "We recommend that you use the ListDomainConflicts API operation to check for domain conflicts, as it supports both standard distributions and distribution tenants. ListConflictingAliases performs similar checks but only supports standard distributions. Lists existing domain associations that conflict with the domain that you specify. You can use this API operation to identify potential domain conflicts when moving domains between standard distributions and/or distribution tenants. Domain conflicts must be resolved first before they can be moved. For example, if you provide www.example.com as input, the returned list can include www.example.com and the overlapping wildcard alternate domain name (.example.com), if they exist. If you provide .example.com as input, the returned list can include *.example.com and any alternate domain names covered by that wildcard (for example, www.example.com, test.example.com, dev.example.com, and so on), if they exist. To list conflicting domains, specify the following: The domain to search for The ID of a standard distribution or distribution tenant in your account that has an attached TLS certificate, which covers the specified domain For more information, including how to set up the standard distribution or distribution tenant, and the certificate, see Moving an alternate domain name to a different standard distribution or distribution tenant in the Amazon CloudFront Developer Guide. You can optionally specify the maximum number of items to receive in the response. If the total number of items in the list exceeds the maximum that you specify, or the default maximum, the response is paginated. To get the next page of items, send a subsequent request that specifies the NextMarker value from the current response as the Marker value in the subsequent request."
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                Domain:
                  $ref: "#/components/schemas/string"
                DomainControlValidationResource:
                  $ref: "#/components/schemas/DistributionResourceId"
                MaxItems:
                  $ref: "#/components/schemas/integer"
                Marker:
                  $ref: "#/components/schemas/string"
              required:
                - DomainControlValidationResource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDomainConflictsOutputDisplay"
  /2020-05-31/tagging:
