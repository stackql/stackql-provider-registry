openapi: 3.0.0
info:
  version: "2020-05-31"
  title: Amazon CloudFront
  description: Amazon CloudFront
  x-serviceName: cloudfront
  x-serviceAlias: cloudfront
  x-protocol: rest-xml
  x-apiVersion: "2020-05-31"
  x-endpointPrefix: cloudfront
servers:
  - url: https://cloudfront.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Global endpoint for cloudfront
paths:
  /2020-05-31/distribution/{target_distribution_id}/associate-alias:
    put:
      operationId: AssociateAlias
      description: The AssociateAlias API operation only supports standard distributions. To move domains between distribution tenants and/or standard distributions, we recommend that you use the UpdateDomainAssociation API operation instead. Associates an alias with a CloudFront standard distribution. An alias is commonly known as a custom domain or vanity domain. It can also be called a CNAME or alternate domain name. With this operation, you can move an alias that's already used for a standard distribution to a different standard distribution. This prevents the downtime that could occur if you first remove the alias from one standard distribution and then separately add the alias to another standard distribution. To use this operation, specify the alias and the ID of the target standard distribution. For more information, including how to set up the target standard distribution, prerequisites that you must complete, and other restrictions, see Moving an alternate domain name to a different standard distribution or distribution tenant in the Amazon CloudFront Developer Guide.
      parameters:
        - name: target_distribution_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The ID of the standard distribution that you're associating the alias with.
        - name: Alias
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The alias (also known as a CNAME) to add to the target standard distribution.
      responses:
        "200":
          description: Success
  /2020-05-31/distribution-tenant/{id}/associate-web-acl:
    put:
      operationId: AssociateDistributionTenantWebACL
      description: Associates the WAF web ACL with a distribution tenant.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The ID of the distribution tenant.
        - name: If-Match
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The current ETag of the distribution tenant. This value is returned in the response of the GetDistributionTenant API operation.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                WebACLArn:
                  $ref: "#/components/schemas/string"
              required:
                - WebACLArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateDistributionTenantWebACLOutputDisplay"
  /2020-05-31/distribution/{id}/associate-web-acl:
    put:
      operationId: AssociateDistributionWebACL
      description: Associates the WAF web ACL with a distribution.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The ID of the distribution.
        - name: If-Match
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The value of the ETag header that you received when retrieving the distribution that you're associating with the WAF web ACL.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                WebACLArn:
                  $ref: "#/components/schemas/string"
              required:
                - WebACLArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateDistributionWebACLOutputDisplay"
  /2020-05-31/distribution/{primary_distribution_id}/copy:
    post:
      operationId: CopyDistribution
      description: "Creates a staging distribution using the configuration of the provided primary distribution. A staging distribution is a copy of an existing distribution (called the primary distribution) that you can use in a continuous deployment workflow. After you create a staging distribution, you can use UpdateDistribution to modify the staging distribution's configuration. Then you can use CreateContinuousDeploymentPolicy to incrementally move traffic to the staging distribution. This API operation requires the following IAM permissions: GetDistribution CreateDistribution CopyDistribution"
      parameters:
        - name: primary_distribution_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The identifier of the primary distribution whose configuration you are copying. To get a distribution ID, use ListDistributions.
        - name: Staging
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/boolean"
          description: The type of distribution that your primary distribution will be copied to. The only valid value is True, indicating that you are copying to a staging distribution.
        - name: If-Match
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The version identifier of the primary distribution whose configuration you are copying. This is the ETag value returned in the response to GetDistribution and GetDistributionConfig.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                CallerReference:
                  $ref: "#/components/schemas/string"
                Enabled:
                  $ref: "#/components/schemas/boolean"
              required:
                - CallerReference
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopyDistributionOutputDisplay"
  /2020-05-31/anycast-ip-list:
    post:
      operationId: CreateAnycastIpList
      description: Creates an Anycast static IP list.
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/AnycastIpListName"
                IpCount:
                  $ref: "#/components/schemas/integer"
                Tags:
                  $ref: "#/components/schemas/Tags"
                IpAddressType:
                  $ref: "#/components/schemas/IpAddressType"
                IpamCidrConfigs:
                  $ref: "#/components/schemas/IpamCidrConfigList"
              required:
                - IpCount
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAnycastIpListOutputDisplay"
    get:
      operationId: ListAnycastIpLists
      description: Lists your Anycast static IP lists.
      parameters:
        - name: Marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: Use this field when paginating results to indicate where to begin in your list. The response includes items in the list that occur after the marker. To get the next page of the list, set this field's value to the value of NextMarker from the current page's response.
        - name: MaxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/integer"
          description: The maximum number of Anycast static IP lists that you want returned in the response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAnycastIpListsOutputDisplay"
  /2020-05-31/cache-policy:
    post:
      operationId: CreateCachePolicy
      description: "Creates a cache policy. After you create a cache policy, you can attach it to one or more cache behaviors. When it's attached to a cache behavior, the cache policy determines the following: The values that CloudFront includes in the cache key. These values can include HTTP headers, cookies, and URL query strings. CloudFront uses the cache key to find an object in its cache that it can return to the viewer. The default, minimum, and maximum time to live (TTL) values that you want objects to stay in the CloudFront cache. If your minimum TTL is greater than 0, CloudFront will cache content for at least the duration specified in the cache policy's minimum TTL, even if the Cache-Control: no-cache, no-store, or private directives are present in the origin headers. The headers, cookies, and query strings that are included in the cache key are also included in requests that CloudFront sends to the origin. CloudFront sends a request when it can't find an object in its cache that matches the request's cache key. If you want to send values to the origin but not include them in the cache key, use OriginRequestPolicy. For more information about cache policies, see Controlling the cache key in the Amazon CloudFront Developer Guide."
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                CachePolicyConfig:
                  $ref: "#/components/schemas/CachePolicyConfig"
              required:
                - CachePolicyConfig
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCachePolicyOutputDisplay"
    get:
      operationId: ListCachePolicies
      description: Gets a list of cache policies. You can optionally apply a filter to return only the managed policies created by Amazon Web Services, or only the custom policies created in your Amazon Web Services account. You can optionally specify the maximum number of items to receive in the response. If the total number of items in the list exceeds the maximum that you specify, or the default maximum, the response is paginated. To get the next page of items, send a subsequent request that specifies the NextMarker value from the current response as the Marker value in the subsequent request.
      parameters:
        - name: Type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CachePolicyType"
          description: "A filter to return only the specified kinds of cache policies. Valid values are: managed – Returns only the managed policies created by Amazon Web Services. custom – Returns only the custom policies created in your Amazon Web Services account."
        - name: Marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: Use this field when paginating results to indicate where to begin in your list of cache policies. The response includes cache policies in the list that occur after the marker. To get the next page of the list, set this field's value to the value of NextMarker from the current page's response.
        - name: MaxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The maximum number of cache policies that you want in the response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCachePoliciesOutputDisplay"
  /2020-05-31/origin-access-identity/cloudfront:
    post:
      operationId: CreateCloudFrontOriginAccessIdentity
      description: Creates a new origin access identity. If you're using Amazon S3 for your origin, you can use an origin access identity to require users to access your content using a CloudFront URL instead of the Amazon S3 URL. For more information about how to use origin access identities, see Serving Private Content through CloudFront in the Amazon CloudFront Developer Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                CloudFrontOriginAccessIdentityConfig:
                  $ref: "#/components/schemas/CloudFrontOriginAccessIdentityConfig"
              required:
                - CloudFrontOriginAccessIdentityConfig
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCloudFrontOriginAccessIdentityOutputDisplay"
    get:
      operationId: ListCloudFrontOriginAccessIdentities
      description: Lists origin access identities.
      parameters:
        - name: Marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: Use this when paginating results to indicate where to begin in your list of origin access identities. The results include identities in the list that occur after the marker. To get the next page of results, set the Marker to the value of the NextMarker from the current page's response (which is also the ID of the last identity on that page).
        - name: MaxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The maximum number of origin access identities you want in the response body.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCloudFrontOriginAccessIdentitiesOutputDisplay"
  /2020-05-31/connection-function:
    post:
      operationId: CreateConnectionFunction
      description: Creates a connection function.
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/FunctionName"
                ConnectionFunctionConfig:
                  $ref: "#/components/schemas/FunctionConfig"
                ConnectionFunctionCode:
                  $ref: "#/components/schemas/FunctionBlob"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - ConnectionFunctionConfig
                - ConnectionFunctionCode
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectionFunctionOutputDisplay"
  /2020-05-31/connection-group:
    post:
      operationId: CreateConnectionGroup
      description: Creates a connection group.
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/string"
                Ipv6Enabled:
                  $ref: "#/components/schemas/boolean"
                Tags:
                  $ref: "#/components/schemas/Tags"
                AnycastIpListId:
                  $ref: "#/components/schemas/string"
                Enabled:
                  $ref: "#/components/schemas/boolean"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectionGroupOutputDisplay"
    get:
      operationId: GetConnectionGroupByRoutingEndpoint
      description: Gets information about a connection group by using the endpoint that you specify.
      parameters:
        - name: RoutingEndpoint
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The routing endpoint for the target connection group, such as d111111abcdef8.cloudfront.net.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectionGroupByRoutingEndpointOutputDisplay"
  /2020-05-31/continuous-deployment-policy:
    post:
      operationId: CreateContinuousDeploymentPolicy
      description: Creates a continuous deployment policy that distributes traffic for a custom domain name to two different CloudFront distributions. To use a continuous deployment policy, first use CopyDistribution to create a staging distribution, then use UpdateDistribution to modify the staging distribution's configuration. After you create and update a staging distribution, you can use a continuous deployment policy to incrementally move traffic to the staging distribution. This workflow enables you to test changes to a distribution's configuration before moving all of your domain's production traffic to the new configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                ContinuousDeploymentPolicyConfig:
                  $ref: "#/components/schemas/ContinuousDeploymentPolicyConfig"
              required:
                - ContinuousDeploymentPolicyConfig
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateContinuousDeploymentPolicyOutputDisplay"
    get:
      operationId: ListContinuousDeploymentPolicies
      description: Gets a list of the continuous deployment policies in your Amazon Web Services account. You can optionally specify the maximum number of items to receive in the response. If the total number of items in the list exceeds the maximum that you specify, or the default maximum, the response is paginated. To get the next page of items, send a subsequent request that specifies the NextMarker value from the current response as the Marker value in the subsequent request.
      parameters:
        - name: Marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: Use this field when paginating results to indicate where to begin in your list of continuous deployment policies. The response includes policies in the list that occur after the marker. To get the next page of the list, set this field's value to the value of NextMarker from the current page's response.
        - name: MaxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The maximum number of continuous deployment policies that you want returned in the response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListContinuousDeploymentPoliciesOutputDisplay"
  /2020-05-31/distribution:
    post:
      operationId: CreateDistribution
      description: Creates a CloudFront distribution.
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                DistributionConfig:
                  $ref: "#/components/schemas/DistributionConfig"
              required:
                - DistributionConfig
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDistributionOutputDisplay"
    get:
      operationId: ListDistributions
      description: List CloudFront distributions.
      parameters:
        - name: Marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: Use this when paginating results to indicate where to begin in your list of distributions. The results include distributions in the list that occur after the marker. To get the next page of results, set the Marker to the value of the NextMarker from the current page's response (which is also the ID of the last distribution on that page).
        - name: MaxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The maximum number of distributions you want in the response body.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDistributionsOutputDisplay"
  /2020-05-31/distribution-tenant:
    post:
      operationId: CreateDistributionTenant
      description: Creates a distribution tenant.
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                DistributionId:
                  $ref: "#/components/schemas/string"
                Name:
                  $ref: "#/components/schemas/CreateDistributionTenantRequestNameString"
                Domains:
                  $ref: "#/components/schemas/DomainList"
                Tags:
                  $ref: "#/components/schemas/Tags"
                Customizations:
                  $ref: "#/components/schemas/Customizations"
                Parameters:
                  $ref: "#/components/schemas/Parameters"
                ConnectionGroupId:
                  $ref: "#/components/schemas/string"
                ManagedCertificateRequest:
                  $ref: "#/components/schemas/ManagedCertificateRequest"
                Enabled:
                  $ref: "#/components/schemas/boolean"
              required:
                - DistributionId
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDistributionTenantOutputDisplay"
    get:
      operationId: GetDistributionTenantByDomain
      description: Gets information about a distribution tenant by the associated domain.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: A domain name associated with the target distribution tenant.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDistributionTenantByDomainOutputDisplay"
  /2020-05-31/distribution?WithTags:
    post:
      operationId: CreateDistributionWithTags
      description: "Create a new distribution with tags. This API operation requires the following IAM permissions: CreateDistribution TagResource"
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                DistributionConfigWithTags:
                  $ref: "#/components/schemas/DistributionConfigWithTags"
              required:
                - DistributionConfigWithTags
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDistributionWithTagsOutputDisplay"
  /2020-05-31/field-level-encryption:
    post:
      operationId: CreateFieldLevelEncryptionConfig
      description: Create a new field-level encryption configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                FieldLevelEncryptionConfig:
                  $ref: "#/components/schemas/FieldLevelEncryptionConfig"
              required:
                - FieldLevelEncryptionConfig
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFieldLevelEncryptionConfigOutputDisplay"
    get:
      operationId: ListFieldLevelEncryptionConfigs
      description: List all field-level encryption configurations that have been created in CloudFront for this account.
      parameters:
        - name: Marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: Use this when paginating results to indicate where to begin in your list of configurations. The results include configurations in the list that occur after the marker. To get the next page of results, set the Marker to the value of the NextMarker from the current page's response (which is also the ID of the last configuration on that page).
        - name: MaxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The maximum number of field-level encryption configurations you want in the response body.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFieldLevelEncryptionConfigsOutputDisplay"
  /2020-05-31/field-level-encryption-profile:
    post:
      operationId: CreateFieldLevelEncryptionProfile
      description: Create a field-level encryption profile.
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                FieldLevelEncryptionProfileConfig:
                  $ref: "#/components/schemas/FieldLevelEncryptionProfileConfig"
              required:
                - FieldLevelEncryptionProfileConfig
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFieldLevelEncryptionProfileOutputDisplay"
    get:
      operationId: ListFieldLevelEncryptionProfiles
      description: Request a list of field-level encryption profiles that have been created in CloudFront for this account.
      parameters:
        - name: Marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: Use this when paginating results to indicate where to begin in your list of profiles. The results include profiles in the list that occur after the marker. To get the next page of results, set the Marker to the value of the NextMarker from the current page's response (which is also the ID of the last profile on that page).
        - name: MaxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The maximum number of field-level encryption profiles you want in the response body.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFieldLevelEncryptionProfilesOutputDisplay"
  /2020-05-31/function:
    post:
      operationId: CreateFunction
      description: Creates a CloudFront function. To create a function, you provide the function code and some configuration information about the function. The response contains an Amazon Resource Name (ARN) that uniquely identifies the function. When you create a function, it's in the DEVELOPMENT stage. In this stage, you can test the function with TestFunction, and update it with UpdateFunction. When you're ready to use your function with a CloudFront distribution, use PublishFunction to copy the function from the DEVELOPMENT stage to LIVE. When it's live, you can attach the function to a distribution's cache behavior, using the function's ARN.
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/FunctionName"
                FunctionConfig:
                  $ref: "#/components/schemas/FunctionConfig"
                FunctionCode:
                  $ref: "#/components/schemas/FunctionBlob"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - FunctionConfig
                - FunctionCode
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFunctionOutputDisplay"
    get:
      operationId: ListFunctions
      description: Gets a list of all CloudFront functions in your Amazon Web Services account. You can optionally apply a filter to return only the functions that are in the specified stage, either DEVELOPMENT or LIVE. You can optionally specify the maximum number of items to receive in the response. If the total number of items in the list exceeds the maximum that you specify, or the default maximum, the response is paginated. To get the next page of items, send a subsequent request that specifies the NextMarker value from the current response as the Marker value in the subsequent request.
      parameters:
        - name: Marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: Use this field when paginating results to indicate where to begin in your list of functions. The response includes functions in the list that occur after the marker. To get the next page of the list, set this field's value to the value of NextMarker from the current page's response.
        - name: MaxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The maximum number of functions that you want in the response.
        - name: Stage
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/FunctionStage"
          description: An optional filter to return only the functions that are in the specified stage, either DEVELOPMENT or LIVE.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFunctionsOutputDisplay"
  /2020-05-31/distribution/{distribution_id}/invalidation:
    post:
      operationId: CreateInvalidation
      description: Create a new invalidation. For more information, see Invalidating files in the Amazon CloudFront Developer Guide.
      parameters:
        - name: distribution_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The distribution's id.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                InvalidationBatch:
                  $ref: "#/components/schemas/InvalidationBatch"
              required:
                - InvalidationBatch
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInvalidationOutputDisplay"
    get:
      operationId: ListInvalidations
      description: Lists invalidation batches.
      parameters:
        - name: distribution_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The distribution's ID.
        - name: Marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: Use this parameter when paginating results to indicate where to begin in your list of invalidation batches. Because the results are returned in decreasing order from most recent to oldest, the most recent results are on the first page, the second page will contain earlier results, and so on. To get the next page of results, set Marker to the value of the NextMarker from the current page's response. This value is the same as the ID of the last invalidation batch on that page.
        - name: MaxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
