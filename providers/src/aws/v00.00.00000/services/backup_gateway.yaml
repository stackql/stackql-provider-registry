openapi: 3.0.0
info:
  version: "2021-01-01"
  title: AWS Backup Gateway
  description: AWS Backup Gateway
  x-serviceName: backup-gateway
  x-serviceAlias: backup_gateway
  x-protocol: json
  x-apiVersion: "2021-01-01"
  x-endpointPrefix: backup-gateway
  x-targetPrefix: BackupOnPremises_v20210101
  x-jsonVersion: "1.0"
servers:
  - url: https://backup-gateway.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for backup-gateway
paths:
  /AssociateGatewayToServer:
    post:
      operationId: AssociateGatewayToServer
      description: Associates a backup gateway with your server. After you complete the association process, you can back up and restore your VMs through the gateway.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.AssociateGatewayToServer
            default: BackupOnPremises_v20210101.AssociateGatewayToServer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                GatewayArn:
                  $ref: "#/components/schemas/GatewayArn"
                  description: The Amazon Resource Name (ARN) of the gateway. Use the ListGateways operation to return a list of gateways for your account and Amazon Web Services Region.
                ServerArn:
                  $ref: "#/components/schemas/ServerArn"
                  description: The Amazon Resource Name (ARN) of the server that hosts your virtual machines.
              required:
                - GatewayArn
                - ServerArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateGatewayToServerOutput"
  /CreateGateway:
    post:
      operationId: CreateGateway
      description: Creates a backup gateway. After you create a gateway, you can associate it with a server using the AssociateGatewayToServer operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.CreateGateway
            default: BackupOnPremises_v20210101.CreateGateway
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ActivationKey:
                  $ref: "#/components/schemas/ActivationKey"
                  description: The activation key of the created gateway.
                GatewayDisplayName:
                  $ref: "#/components/schemas/Name"
                  description: The display name of the created gateway.
                GatewayType:
                  $ref: "#/components/schemas/GatewayType"
                  description: The type of created gateway.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of up to 50 tags to assign to the gateway. Each tag is a key-value pair.
              required:
                - ActivationKey
                - GatewayDisplayName
                - GatewayType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGatewayOutput"
  /DeleteGateway:
    post:
      operationId: DeleteGateway
      description: Deletes a backup gateway.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.DeleteGateway
            default: BackupOnPremises_v20210101.DeleteGateway
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                GatewayArn:
                  $ref: "#/components/schemas/GatewayArn"
                  description: The Amazon Resource Name (ARN) of the gateway to delete.
              required:
                - GatewayArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGatewayOutput"
  /DeleteHypervisor:
    post:
      operationId: DeleteHypervisor
      description: Deletes a hypervisor.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.DeleteHypervisor
            default: BackupOnPremises_v20210101.DeleteHypervisor
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                HypervisorArn:
                  $ref: "#/components/schemas/ServerArn"
                  description: The Amazon Resource Name (ARN) of the hypervisor to delete.
              required:
                - HypervisorArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteHypervisorOutput"
  /DisassociateGatewayFromServer:
    post:
      operationId: DisassociateGatewayFromServer
      description: Disassociates a backup gateway from the specified server. After the disassociation process finishes, the gateway can no longer access the virtual machines on the server.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.DisassociateGatewayFromServer
            default: BackupOnPremises_v20210101.DisassociateGatewayFromServer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                GatewayArn:
                  $ref: "#/components/schemas/GatewayArn"
                  description: The Amazon Resource Name (ARN) of the gateway to disassociate.
              required:
                - GatewayArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateGatewayFromServerOutput"
  /GetBandwidthRateLimitSchedule:
    post:
      operationId: GetBandwidthRateLimitSchedule
      description: Retrieves the bandwidth rate limit schedule for a specified gateway. By default, gateways do not have bandwidth rate limit schedules, which means no bandwidth rate limiting is in effect. Use this to get a gateway's bandwidth rate limit schedule.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.GetBandwidthRateLimitSchedule
            default: BackupOnPremises_v20210101.GetBandwidthRateLimitSchedule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                GatewayArn:
                  $ref: "#/components/schemas/GatewayArn"
                  description: The Amazon Resource Name (ARN) of the gateway. Use the ListGateways operation to return a list of gateways for your account and Amazon Web Services Region.
              required:
                - GatewayArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBandwidthRateLimitScheduleOutput"
  /GetGateway:
    post:
      operationId: GetGateway
      description: By providing the ARN (Amazon Resource Name), this API returns the gateway.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.GetGateway
            default: BackupOnPremises_v20210101.GetGateway
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                GatewayArn:
                  $ref: "#/components/schemas/GatewayArn"
                  description: The Amazon Resource Name (ARN) of the gateway.
              required:
                - GatewayArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGatewayOutput"
  /GetHypervisor:
    post:
      operationId: GetHypervisor
      description: This action requests information about the specified hypervisor to which the gateway will connect. A hypervisor is hardware, software, or firmware that creates and manages virtual machines, and allocates resources to them.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.GetHypervisor
            default: BackupOnPremises_v20210101.GetHypervisor
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                HypervisorArn:
                  $ref: "#/components/schemas/ServerArn"
                  description: The Amazon Resource Name (ARN) of the hypervisor.
              required:
                - HypervisorArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetHypervisorOutput"
  /GetHypervisorPropertyMappings:
    post:
      operationId: GetHypervisorPropertyMappings
      description: This action retrieves the property mappings for the specified hypervisor. A hypervisor property mapping displays the relationship of entity properties available from the hypervisor to the properties available in Amazon Web Services.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.GetHypervisorPropertyMappings
            default: BackupOnPremises_v20210101.GetHypervisorPropertyMappings
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                HypervisorArn:
                  $ref: "#/components/schemas/ServerArn"
                  description: The Amazon Resource Name (ARN) of the hypervisor.
              required:
                - HypervisorArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetHypervisorPropertyMappingsOutput"
  /GetVirtualMachine:
    post:
      operationId: GetVirtualMachine
      description: By providing the ARN (Amazon Resource Name), this API returns the virtual machine.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.GetVirtualMachine
            default: BackupOnPremises_v20210101.GetVirtualMachine
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the virtual machine.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetVirtualMachineOutput"
  /ImportHypervisorConfiguration:
    post:
      operationId: ImportHypervisorConfiguration
      description: Connect to a hypervisor by importing its configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.ImportHypervisorConfiguration
            default: BackupOnPremises_v20210101.ImportHypervisorConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                  description: The name of the hypervisor.
                Host:
                  $ref: "#/components/schemas/Host"
                  description: The server host of the hypervisor. This can be either an IP address or a fully-qualified domain name (FQDN).
                Username:
                  $ref: "#/components/schemas/Username"
                  description: The username for the hypervisor.
                Password:
                  $ref: "#/components/schemas/Password"
                  description: The password for the hypervisor.
                KmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                  description: The Key Management Service for the hypervisor.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: The tags of the hypervisor configuration to import.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportHypervisorConfigurationOutput"
  /ListGateways:
    post:
      operationId: ListGateways
      description: Lists backup gateways owned by an Amazon Web Services account in an Amazon Web Services Region. The returned list is ordered by gateway Amazon Resource Name (ARN).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.ListGateways
            default: BackupOnPremises_v20210101.ListGateways
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of gateways to list.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The next item following a partial list of returned resources. For example, if a request is made to return MaxResults number of resources, NextToken allows you to return more items in your list starting at the location pointed to by the next token.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGatewaysOutput"
  /ListHypervisors:
    post:
      operationId: ListHypervisors
      description: Lists your hypervisors.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.ListHypervisors
            default: BackupOnPremises_v20210101.ListHypervisors
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of hypervisors to list.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The next item following a partial list of returned resources. For example, if a request is made to return maxResults number of resources, NextToken allows you to return more items in your list starting at the location pointed to by the next token.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListHypervisorsOutput"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists the tags applied to the resource identified by its Amazon Resource Name (ARN).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.ListTagsForResource
            default: BackupOnPremises_v20210101.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource's tags to list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
  /ListVirtualMachines:
    post:
      operationId: ListVirtualMachines
      description: Lists your virtual machines.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.ListVirtualMachines
            default: BackupOnPremises_v20210101.ListVirtualMachines
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                HypervisorArn:
                  $ref: "#/components/schemas/ServerArn"
                  description: The Amazon Resource Name (ARN) of the hypervisor connected to your virtual machine.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of virtual machines to list.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The next item following a partial list of returned resources. For example, if a request is made to return maxResults number of resources, NextToken allows you to return more items in your list starting at the location pointed to by the next token.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVirtualMachinesOutput"
  /PutBandwidthRateLimitSchedule:
    post:
      operationId: PutBandwidthRateLimitSchedule
      description: This action sets the bandwidth rate limit schedule for a specified gateway. By default, gateways do not have a bandwidth rate limit schedule, which means no bandwidth rate limiting is in effect. Use this to initiate a gateway's bandwidth rate limit schedule.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.PutBandwidthRateLimitSchedule
            default: BackupOnPremises_v20210101.PutBandwidthRateLimitSchedule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                GatewayArn:
                  $ref: "#/components/schemas/GatewayArn"
                  description: The Amazon Resource Name (ARN) of the gateway. Use the ListGateways operation to return a list of gateways for your account and Amazon Web Services Region.
                BandwidthRateLimitIntervals:
                  $ref: "#/components/schemas/BandwidthRateLimitIntervals"
                  description: An array containing bandwidth rate limit schedule intervals for a gateway. When no bandwidth rate limit intervals have been scheduled, the array is empty.
              required:
                - GatewayArn
                - BandwidthRateLimitIntervals
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutBandwidthRateLimitScheduleOutput"
  /PutHypervisorPropertyMappings:
    post:
      operationId: PutHypervisorPropertyMappings
      description: This action sets the property mappings for the specified hypervisor. A hypervisor property mapping displays the relationship of entity properties available from the hypervisor to the properties available in Amazon Web Services.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.PutHypervisorPropertyMappings
            default: BackupOnPremises_v20210101.PutHypervisorPropertyMappings
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                HypervisorArn:
                  $ref: "#/components/schemas/ServerArn"
                  description: The Amazon Resource Name (ARN) of the hypervisor.
                VmwareToAwsTagMappings:
                  $ref: "#/components/schemas/VmwareToAwsTagMappings"
                  description: This action requests the mappings of VMware tags to the Amazon Web Services tags.
                IamRoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The Amazon Resource Name (ARN) of the IAM role.
              required:
                - HypervisorArn
                - VmwareToAwsTagMappings
                - IamRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutHypervisorPropertyMappingsOutput"
  /PutMaintenanceStartTime:
    post:
      operationId: PutMaintenanceStartTime
      description: Set the maintenance start time for a gateway.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.PutMaintenanceStartTime
            default: BackupOnPremises_v20210101.PutMaintenanceStartTime
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                GatewayArn:
                  $ref: "#/components/schemas/GatewayArn"
                  description: The Amazon Resource Name (ARN) for the gateway, used to specify its maintenance start time.
                HourOfDay:
                  $ref: "#/components/schemas/HourOfDay"
                  description: The hour of the day to start maintenance on a gateway.
                MinuteOfHour:
                  $ref: "#/components/schemas/MinuteOfHour"
                  description: The minute of the hour to start maintenance on a gateway.
                DayOfWeek:
                  $ref: "#/components/schemas/DayOfWeek"
                  description: The day of the week to start maintenance on a gateway.
                DayOfMonth:
                  $ref: "#/components/schemas/DayOfMonth"
                  description: The day of the month start maintenance on a gateway. Valid values range from Sunday to Saturday.
              required:
                - GatewayArn
                - HourOfDay
                - MinuteOfHour
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutMaintenanceStartTimeOutput"
  /StartVirtualMachinesMetadataSync:
    post:
      operationId: StartVirtualMachinesMetadataSync
      description: This action sends a request to sync metadata across the specified virtual machines.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.StartVirtualMachinesMetadataSync
            default: BackupOnPremises_v20210101.StartVirtualMachinesMetadataSync
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                HypervisorArn:
                  $ref: "#/components/schemas/ServerArn"
                  description: The Amazon Resource Name (ARN) of the hypervisor.
              required:
                - HypervisorArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartVirtualMachinesMetadataSyncOutput"
  /TagResource:
    post:
      operationId: TagResource
      description: Tag the resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.TagResource
            default: BackupOnPremises_v20210101.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource to tag.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of tags to assign to the resource.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
  /TestHypervisorConfiguration:
    post:
      operationId: TestHypervisorConfiguration
      description: Tests your hypervisor configuration to validate that backup gateway can connect with the hypervisor and its resources.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.TestHypervisorConfiguration
            default: BackupOnPremises_v20210101.TestHypervisorConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                GatewayArn:
                  $ref: "#/components/schemas/GatewayArn"
                  description: The Amazon Resource Name (ARN) of the gateway to the hypervisor to test.
                Host:
                  $ref: "#/components/schemas/Host"
                  description: The server host of the hypervisor. This can be either an IP address or a fully-qualified domain name (FQDN).
                Username:
                  $ref: "#/components/schemas/Username"
                  description: The username for the hypervisor.
                Password:
                  $ref: "#/components/schemas/Password"
                  description: The password for the hypervisor.
              required:
                - GatewayArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestHypervisorConfigurationOutput"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes tags from the resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.UntagResource
            default: BackupOnPremises_v20210101.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource from which to remove tags.
                TagKeys:
                  $ref: "#/components/schemas/TagKeys"
                  description: The list of tag keys specifying which tags to remove.
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /UpdateGatewayInformation:
    post:
      operationId: UpdateGatewayInformation
      description: Updates a gateway's name. Specify which gateway to update using the Amazon Resource Name (ARN) of the gateway in your request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.UpdateGatewayInformation
            default: BackupOnPremises_v20210101.UpdateGatewayInformation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                GatewayArn:
                  $ref: "#/components/schemas/GatewayArn"
                  description: The Amazon Resource Name (ARN) of the gateway to update.
                GatewayDisplayName:
                  $ref: "#/components/schemas/Name"
                  description: The updated display name of the gateway.
              required:
                - GatewayArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGatewayInformationOutput"
  /UpdateGatewaySoftwareNow:
    post:
      operationId: UpdateGatewaySoftwareNow
      description: Updates the gateway virtual machine (VM) software. The request immediately triggers the software update. When you make this request, you get a 200 OK success response immediately. However, it might take some time for the update to complete.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.UpdateGatewaySoftwareNow
            default: BackupOnPremises_v20210101.UpdateGatewaySoftwareNow
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                GatewayArn:
                  $ref: "#/components/schemas/GatewayArn"
                  description: The Amazon Resource Name (ARN) of the gateway to be updated.
              required:
                - GatewayArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGatewaySoftwareNowOutput"
  /UpdateHypervisor:
    post:
      operationId: UpdateHypervisor
      description: Updates a hypervisor metadata, including its host, username, and password. Specify which hypervisor to update using the Amazon Resource Name (ARN) of the hypervisor in your request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - BackupOnPremises_v20210101.UpdateHypervisor
            default: BackupOnPremises_v20210101.UpdateHypervisor
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                HypervisorArn:
                  $ref: "#/components/schemas/ServerArn"
                  description: The Amazon Resource Name (ARN) of the hypervisor to update.
                Host:
                  $ref: "#/components/schemas/Host"
                  description: The updated host of the hypervisor. This can be either an IP address or a fully-qualified domain name (FQDN).
                Username:
                  $ref: "#/components/schemas/Username"
                  description: The updated username for the hypervisor.
                Password:
                  $ref: "#/components/schemas/Password"
                  description: The updated password for the hypervisor.
                Name:
                  $ref: "#/components/schemas/Name"
                  description: The updated name for the hypervisor
                LogGroupArn:
                  $ref: "#/components/schemas/LogGroupArn"
                  description: The Amazon Resource Name (ARN) of the group of gateways within the requested log.
              required:
                - HypervisorArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateHypervisorOutput"
