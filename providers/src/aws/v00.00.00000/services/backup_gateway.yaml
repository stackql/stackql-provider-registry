      maxLength: 100
      pattern: "[a-zA-Z0-9-]*"
    GatewayType:
      type: string
      enum:
        - BACKUP_VM
    Tags:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "A key-value pair you can use to manage, filter, and search for your resources. Allowed characters include UTF-8 letters, numbers, and the following characters: + - = . _ : /. Spaces are not allowed in tag values."
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key part of a tag's key-value pair. The key can't start with aws:.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value part of a tag's key-value pair.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[^\\x00]*"
    CreateGatewayOutput:
      type: object
