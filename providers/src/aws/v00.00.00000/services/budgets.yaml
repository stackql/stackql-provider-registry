    NotificationWithSubscribersList:
      description: A list of notifications, each with a list of subscribers.
      type: array
      items:
        $ref: "#/components/schemas/NotificationWithSubscribers"
    NotificationWithSubscribers:
      description: A notification with subscribers. A notification can have one SNS subscriber and up to 10 email subscribers, for a total of 11 subscribers.
      type: object
      properties:
        Notification:
          $ref: "#/components/schemas/Notification"
          description: The notification that's associated with a budget.
        Subscribers:
          $ref: "#/components/schemas/Subscribers"
          description: A list of subscribers who are subscribed to this notification.
      required:
        - Notification
        - Subscribers
    Notification:
      description: "A notification that's associated with a budget. A budget can have up to ten notifications. Each notification must have at least one subscriber. A notification can have one SNS subscriber and up to 10 email subscribers, for a total of 11 subscribers. For example, if you have a budget for 200 dollars and you want to be notified when you go over 160 dollars, create a notification with the following parameters: A notificationType of ACTUAL A thresholdType of PERCENTAGE A comparisonOperator of GREATER_THAN A notification threshold of 80"
      type: object
      properties:
        NotificationType:
          $ref: "#/components/schemas/NotificationType"
          description: Specifies whether the notification is for how much you have spent (ACTUAL) or for how much that you're forecasted to spend (FORECASTED).
        ComparisonOperator:
          $ref: "#/components/schemas/ComparisonOperator"
          description: The comparison that's used for this notification.
        Threshold:
          $ref: "#/components/schemas/NotificationThreshold"
          description: The threshold that's associated with a notification. Thresholds are always a percentage, and many customers find value being alerted between 50% - 200% of the budgeted amount. The maximum limit for your threshold is 1,000,000% above the budgeted amount.
        ThresholdType:
          $ref: "#/components/schemas/ThresholdType"
          description: The type of threshold for a notification. For ABSOLUTE_VALUE thresholds, Amazon Web Services notifies you when you go over or are forecasted to go over your total cost threshold. For PERCENTAGE thresholds, Amazon Web Services notifies you when you go over or are forecasted to go over a certain percentage of your forecasted spend. For example, if you have a budget for 200 dollars and you have a PERCENTAGE threshold of 80%, Amazon Web Services notifies you when you go over 160 dollars.
        NotificationState:
          $ref: "#/components/schemas/NotificationState"
          description: Specifies whether this notification is in alarm. If a budget notification is in the ALARM state, you passed the set threshold for the budget.
      required:
        - NotificationType
        - ComparisonOperator
        - Threshold
    NotificationType:
      description: The type of a notification. It must be ACTUAL or FORECASTED.
      type: string
      enum:
        - ACTUAL
        - FORECASTED
    ComparisonOperator:
      description: "The comparison operator of a notification. Currently, the service supports the following operators: GREATER_THAN, LESS_THAN, EQUAL_TO"
      type: string
      enum:
        - GREATER_THAN
        - LESS_THAN
        - EQUAL_TO
    NotificationThreshold:
      description: The threshold of a notification.
      type: number
      format: double
      minimum: 0
      maximum: 15000000000000
    ThresholdType:
      description: The type of threshold for a notification.
      type: string
      enum:
        - PERCENTAGE
        - ABSOLUTE_VALUE
    NotificationState:
      type: string
      enum:
        - OK
        - ALARM
    Subscribers:
