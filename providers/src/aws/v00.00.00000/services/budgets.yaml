openapi: 3.0.0
info:
  version: "2016-10-20"
  title: AWS Budgets
  description: AWS Budgets
  x-serviceName: budgets
  x-serviceAlias: budgets
  x-protocol: json
  x-apiVersion: "2016-10-20"
  x-endpointPrefix: budgets
  x-targetPrefix: AWSBudgetServiceGateway
  x-jsonVersion: "1.1"
servers:
  - url: https://budgets.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for budgets
paths:
  /CreateBudget:
    post:
      operationId: CreateBudget
      description: Creates a budget and, if included, notifications and subscribers. Only one of BudgetLimit or PlannedBudgetLimits can be present in the syntax at one time. Use the syntax that matches your use case. The Request Syntax section shows the BudgetLimit syntax. For PlannedBudgetLimits, see the Examples section. Similarly, only one set of filter and metric selections can be present in the syntax at one time. Either FilterExpression and Metrics or CostFilters and CostTypes, not both or a different combination. We recommend using FilterExpression and Metrics as they provide more flexible and powerful filtering capabilities. The Request Syntax section shows the FilterExpression/Metrics syntax.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.CreateBudget
            default: AWSBudgetServiceGateway.CreateBudget
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The accountId that is associated with the budget.
                Budget:
                  $ref: "#/components/schemas/Budget"
                  description: The budget object that you want to create.
                NotificationsWithSubscribers:
                  $ref: "#/components/schemas/NotificationWithSubscribersList"
                  description: A notification that you want to associate with a budget. A budget can have up to five notifications, and each notification can have one SNS subscriber and up to 10 email subscribers. If you include notifications and subscribers in your CreateBudget call, Amazon Web Services creates the notifications and subscribers for you.
                ResourceTags:
                  $ref: "#/components/schemas/ResourceTagList"
                  description: An optional list of tags to associate with the specified budget. Each tag consists of a key and a value, and each key must be unique for the resource.
              required:
                - AccountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBudgetResponse"
  /CreateBudgetAction:
    post:
      operationId: CreateBudgetAction
      description: Creates a budget action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.CreateBudgetAction
            default: AWSBudgetServiceGateway.CreateBudgetAction
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                NotificationType:
                  $ref: "#/components/schemas/NotificationType"
                ActionType:
                  $ref: "#/components/schemas/ActionType"
                  description: The type of action. This defines the type of tasks that can be carried out by this action. This field also determines the format for definition.
                ActionThreshold:
                  $ref: "#/components/schemas/ActionThreshold"
                Definition:
                  $ref: "#/components/schemas/Definition"
                ExecutionRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The role passed for action execution and reversion. Roles and actions must be in the same account.
                ApprovalModel:
                  $ref: "#/components/schemas/ApprovalModel"
                  description: This specifies if the action needs manual or automatic approval.
                Subscribers:
                  $ref: "#/components/schemas/Subscribers"
                ResourceTags:
                  $ref: "#/components/schemas/ResourceTagList"
                  description: An optional list of tags to associate with the specified budget action. Each tag consists of a key and a value, and each key must be unique for the resource.
              required:
                - AccountId
                - BudgetName
                - NotificationType
                - ActionType
                - ActionThreshold
                - Definition
                - ExecutionRoleArn
                - ApprovalModel
                - Subscribers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBudgetActionResponse"
  /CreateNotification:
    post:
      operationId: CreateNotification
      description: Creates a notification. You must create the budget before you create the associated notification.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.CreateNotification
            default: AWSBudgetServiceGateway.CreateNotification
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The accountId that is associated with the budget that you want to create a notification for.
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                  description: The name of the budget that you want Amazon Web Services to notify you about. Budget names must be unique within an account.
                Notification:
                  $ref: "#/components/schemas/Notification"
                  description: The notification that you want to create.
                Subscribers:
                  $ref: "#/components/schemas/Subscribers"
                  description: A list of subscribers that you want to associate with the notification. Each notification can have one SNS subscriber and up to 10 email subscribers.
              required:
                - AccountId
                - BudgetName
                - Notification
                - Subscribers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNotificationResponse"
  /CreateSubscriber:
    post:
      operationId: CreateSubscriber
      description: Creates a subscriber. You must create the associated budget and notification before you create the subscriber.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.CreateSubscriber
            default: AWSBudgetServiceGateway.CreateSubscriber
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The accountId that is associated with the budget that you want to create a subscriber for.
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                  description: The name of the budget that you want to subscribe to. Budget names must be unique within an account.
                Notification:
                  $ref: "#/components/schemas/Notification"
                  description: The notification that you want to create a subscriber for.
                Subscriber:
                  $ref: "#/components/schemas/Subscriber"
                  description: The subscriber that you want to associate with a budget notification.
              required:
                - AccountId
                - BudgetName
                - Notification
                - Subscriber
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSubscriberResponse"
  /DeleteBudget:
    post:
      operationId: DeleteBudget
      description: Deletes a budget. You can delete your budget at any time. Deleting a budget also deletes the notifications and subscribers that are associated with that budget.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.DeleteBudget
            default: AWSBudgetServiceGateway.DeleteBudget
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The accountId that is associated with the budget that you want to delete.
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                  description: The name of the budget that you want to delete.
              required:
                - AccountId
                - BudgetName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBudgetResponse"
  /DeleteBudgetAction:
    post:
      operationId: DeleteBudgetAction
      description: Deletes a budget action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.DeleteBudgetAction
            default: AWSBudgetServiceGateway.DeleteBudgetAction
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                ActionId:
                  $ref: "#/components/schemas/ActionId"
                  description: A system-generated universally unique identifier (UUID) for the action.
              required:
                - AccountId
                - BudgetName
                - ActionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBudgetActionResponse"
  /DeleteNotification:
    post:
      operationId: DeleteNotification
      description: Deletes a notification. Deleting a notification also deletes the subscribers that are associated with the notification.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.DeleteNotification
            default: AWSBudgetServiceGateway.DeleteNotification
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The accountId that is associated with the budget whose notification you want to delete.
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                  description: The name of the budget whose notification you want to delete.
                Notification:
                  $ref: "#/components/schemas/Notification"
                  description: The notification that you want to delete.
              required:
                - AccountId
                - BudgetName
                - Notification
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteNotificationResponse"
  /DeleteSubscriber:
    post:
      operationId: DeleteSubscriber
      description: Deletes a subscriber. Deleting the last subscriber to a notification also deletes the notification.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.DeleteSubscriber
            default: AWSBudgetServiceGateway.DeleteSubscriber
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The accountId that is associated with the budget whose subscriber you want to delete.
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                  description: The name of the budget whose subscriber you want to delete.
                Notification:
                  $ref: "#/components/schemas/Notification"
                  description: The notification whose subscriber you want to delete.
                Subscriber:
                  $ref: "#/components/schemas/Subscriber"
                  description: The subscriber that you want to delete.
              required:
                - AccountId
                - BudgetName
                - Notification
                - Subscriber
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSubscriberResponse"
  /DescribeBudget:
    post:
      operationId: DescribeBudget
      description: Describes a budget. The Request Syntax section shows the BudgetLimit syntax. For PlannedBudgetLimits, see the Examples section.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.DescribeBudget
            default: AWSBudgetServiceGateway.DescribeBudget
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The accountId that is associated with the budget that you want a description of.
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                  description: The name of the budget that you want a description of.
                ShowFilterExpression:
                  $ref: "#/components/schemas/NullableBoolean"
                  description: Specifies whether the response includes the filter expression associated with the budget. By showing the filter expression, you can see detailed filtering logic applied to the budget, such as Amazon Web Services services or tags that are being tracked.
              required:
                - AccountId
                - BudgetName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeBudgetResponse"
  /DescribeBudgetAction:
    post:
      operationId: DescribeBudgetAction
      description: Describes a budget action detail.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.DescribeBudgetAction
            default: AWSBudgetServiceGateway.DescribeBudgetAction
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                ActionId:
                  $ref: "#/components/schemas/ActionId"
                  description: A system-generated universally unique identifier (UUID) for the action.
              required:
                - AccountId
                - BudgetName
                - ActionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeBudgetActionResponse"
  /DescribeBudgetActionHistories:
    post:
      operationId: DescribeBudgetActionHistories
      description: Describes a budget action history detail.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.DescribeBudgetActionHistories
            default: AWSBudgetServiceGateway.DescribeBudgetActionHistories
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                ActionId:
                  $ref: "#/components/schemas/ActionId"
                  description: A system-generated universally unique identifier (UUID) for the action.
                TimePeriod:
                  $ref: "#/components/schemas/TimePeriod"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/GenericString"
              required:
                - AccountId
                - BudgetName
                - ActionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeBudgetActionHistoriesResponse"
  /DescribeBudgetActionsForAccount:
    post:
      operationId: DescribeBudgetActionsForAccount
      description: Describes all of the budget actions for an account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.DescribeBudgetActionsForAccount
            default: AWSBudgetServiceGateway.DescribeBudgetActionsForAccount
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/GenericString"
              required:
                - AccountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeBudgetActionsForAccountResponse"
  /DescribeBudgetActionsForBudget:
    post:
      operationId: DescribeBudgetActionsForBudget
      description: Describes all of the budget actions for a budget.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.DescribeBudgetActionsForBudget
            default: AWSBudgetServiceGateway.DescribeBudgetActionsForBudget
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/GenericString"
              required:
                - AccountId
                - BudgetName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeBudgetActionsForBudgetResponse"
  /DescribeBudgetNotificationsForAccount:
    post:
      operationId: DescribeBudgetNotificationsForAccount
      description: Lists the budget names and notifications that are associated with an account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.DescribeBudgetNotificationsForAccount
            default: AWSBudgetServiceGateway.DescribeBudgetNotificationsForAccount
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                MaxResults:
                  $ref: "#/components/schemas/MaxResultsBudgetNotifications"
                  description: An integer that represents how many budgets a paginated response contains. The default is 50.
                NextToken:
                  $ref: "#/components/schemas/GenericString"
              required:
                - AccountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeBudgetNotificationsForAccountResponse"
  /DescribeBudgetPerformanceHistory:
    post:
      operationId: DescribeBudgetPerformanceHistory
      description: Describes the history for DAILY, MONTHLY, and QUARTERLY budgets. Budget history isn't available for ANNUAL budgets.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.DescribeBudgetPerformanceHistory
            default: AWSBudgetServiceGateway.DescribeBudgetPerformanceHistory
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                TimePeriod:
                  $ref: "#/components/schemas/TimePeriod"
                  description: Retrieves how often the budget went into an ALARM state for the specified time period.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/GenericString"
              required:
                - AccountId
                - BudgetName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeBudgetPerformanceHistoryResponse"
  /DescribeBudgets:
    post:
      operationId: DescribeBudgets
      description: Lists the budgets that are associated with an account. The Request Syntax section shows the BudgetLimit syntax. For PlannedBudgetLimits, see the Examples section.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.DescribeBudgets
            default: AWSBudgetServiceGateway.DescribeBudgets
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The accountId that is associated with the budgets that you want to describe.
                MaxResults:
                  $ref: "#/components/schemas/MaxResultsDescribeBudgets"
                  description: An integer that represents how many budgets a paginated response contains. The default is 100.
                NextToken:
                  $ref: "#/components/schemas/GenericString"
                  description: The pagination token that you include in your request to indicate the next set of results that you want to retrieve.
                ShowFilterExpression:
                  $ref: "#/components/schemas/NullableBoolean"
                  description: Specifies whether the response includes the filter expression associated with the budgets. By showing the filter expression, you can see detailed filtering logic applied to the budgets, such as Amazon Web Services services or tags that are being tracked.
              required:
                - AccountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeBudgetsResponse"
  /DescribeNotificationsForBudget:
    post:
      operationId: DescribeNotificationsForBudget
      description: Lists the notifications that are associated with a budget.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.DescribeNotificationsForBudget
            default: AWSBudgetServiceGateway.DescribeNotificationsForBudget
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The accountId that is associated with the budget whose notifications you want descriptions of.
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                  description: The name of the budget whose notifications you want descriptions of.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: An optional integer that represents how many entries a paginated response contains.
                NextToken:
                  $ref: "#/components/schemas/GenericString"
                  description: The pagination token that you include in your request to indicate the next set of results that you want to retrieve.
              required:
                - AccountId
                - BudgetName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeNotificationsForBudgetResponse"
  /DescribeSubscribersForNotification:
    post:
      operationId: DescribeSubscribersForNotification
      description: Lists the subscribers that are associated with a notification.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.DescribeSubscribersForNotification
            default: AWSBudgetServiceGateway.DescribeSubscribersForNotification
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The accountId that is associated with the budget whose subscribers you want descriptions of.
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                  description: The name of the budget whose subscribers you want descriptions of.
                Notification:
                  $ref: "#/components/schemas/Notification"
                  description: The notification whose subscribers you want to list.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: An optional integer that represents how many entries a paginated response contains.
                NextToken:
                  $ref: "#/components/schemas/GenericString"
                  description: The pagination token that you include in your request to indicate the next set of results that you want to retrieve.
              required:
                - AccountId
                - BudgetName
                - Notification
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSubscribersForNotificationResponse"
  /ExecuteBudgetAction:
    post:
      operationId: ExecuteBudgetAction
      description: Executes a budget action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.ExecuteBudgetAction
            default: AWSBudgetServiceGateway.ExecuteBudgetAction
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                ActionId:
                  $ref: "#/components/schemas/ActionId"
                  description: A system-generated universally unique identifier (UUID) for the action.
                ExecutionType:
                  $ref: "#/components/schemas/ExecutionType"
                  description: The type of execution.
              required:
                - AccountId
                - BudgetName
                - ActionId
                - ExecutionType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteBudgetActionResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists tags associated with a budget or budget action resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.ListTagsForResource
            default: AWSBudgetServiceGateway.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The unique identifier for the resource.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Creates tags for a budget or budget action resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.TagResource
            default: AWSBudgetServiceGateway.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The unique identifier for the resource.
                ResourceTags:
                  $ref: "#/components/schemas/ResourceTagList"
                  description: The tags associated with the resource.
              required:
                - ResourceARN
                - ResourceTags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Deletes tags associated with a budget or budget action resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.UntagResource
            default: AWSBudgetServiceGateway.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The unique identifier for the resource.
                ResourceTagKeys:
                  $ref: "#/components/schemas/ResourceTagKeyList"
                  description: The key that's associated with the tag.
              required:
                - ResourceARN
                - ResourceTagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateBudget:
    post:
      operationId: UpdateBudget
      description: Updates a budget. You can change every part of a budget except for the budgetName and the calculatedSpend. When you modify a budget, the calculatedSpend drops to zero until Amazon Web Services has new usage data to use for forecasting. Only one of BudgetLimit or PlannedBudgetLimits can be present in the syntax at one time. Use the syntax that matches your case. The Request Syntax section shows the BudgetLimit syntax. For PlannedBudgetLimits, see the Examples section. Similarly, only one set of filter and metric selections can be present in the syntax at one time. Either FilterExpression and Metrics or CostFilters and CostTypes, not both or a different combination. We recommend using FilterExpression and Metrics as they provide more flexible and powerful filtering capabilities. The Request Syntax section shows the FilterExpression/Metrics syntax.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.UpdateBudget
            default: AWSBudgetServiceGateway.UpdateBudget
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The accountId that is associated with the budget that you want to update.
                NewBudget:
                  $ref: "#/components/schemas/Budget"
                  description: The budget that you want to update your budget to.
              required:
                - AccountId
                - NewBudget
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBudgetResponse"
  /UpdateBudgetAction:
    post:
      operationId: UpdateBudgetAction
      description: Updates a budget action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.UpdateBudgetAction
            default: AWSBudgetServiceGateway.UpdateBudgetAction
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                ActionId:
                  $ref: "#/components/schemas/ActionId"
                  description: A system-generated universally unique identifier (UUID) for the action.
                NotificationType:
                  $ref: "#/components/schemas/NotificationType"
                ActionThreshold:
                  $ref: "#/components/schemas/ActionThreshold"
                Definition:
                  $ref: "#/components/schemas/Definition"
                ExecutionRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The role passed for action execution and reversion. Roles and actions must be in the same account.
                ApprovalModel:
                  $ref: "#/components/schemas/ApprovalModel"
                  description: This specifies if the action needs manual or automatic approval.
                Subscribers:
                  $ref: "#/components/schemas/Subscribers"
              required:
                - AccountId
                - BudgetName
                - ActionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBudgetActionResponse"
  /UpdateNotification:
    post:
      operationId: UpdateNotification
      description: Updates a notification.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.UpdateNotification
            default: AWSBudgetServiceGateway.UpdateNotification
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The accountId that is associated with the budget whose notification you want to update.
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                  description: The name of the budget whose notification you want to update.
                OldNotification:
                  $ref: "#/components/schemas/Notification"
                  description: The previous notification that is associated with a budget.
                NewNotification:
                  $ref: "#/components/schemas/Notification"
                  description: The updated notification to be associated with a budget.
              required:
                - AccountId
                - BudgetName
                - OldNotification
                - NewNotification
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateNotificationResponse"
  /UpdateSubscriber:
    post:
      operationId: UpdateSubscriber
      description: Updates a subscriber.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBudgetServiceGateway.UpdateSubscriber
            default: AWSBudgetServiceGateway.UpdateSubscriber
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The accountId that is associated with the budget whose subscriber you want to update.
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                  description: The name of the budget whose subscriber you want to update.
                Notification:
                  $ref: "#/components/schemas/Notification"
                  description: The notification whose subscriber you want to update.
                OldSubscriber:
                  $ref: "#/components/schemas/Subscriber"
                  description: The previous subscriber that is associated with a budget notification.
                NewSubscriber:
                  $ref: "#/components/schemas/Subscriber"
                  description: The updated subscriber that is associated with a budget notification.
              required:
                - AccountId
                - BudgetName
                - Notification
                - OldSubscriber
                - NewSubscriber
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSubscriberResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AccountId:
      description: The account ID of the user. It's a 12-digit number.
      type: string
      minLength: 12
      maxLength: 12
      pattern: \d{12}
    Budget:
      description: "Represents the output of the CreateBudget operation. The content consists of the detailed metadata and data file information, and the current status of the budget object. This is the Amazon Resource Name (ARN) pattern for a budget: arn:aws:budgets::AccountId:budget/budgetName"
      type: object
      properties:
        BudgetName:
          $ref: "#/components/schemas/BudgetName"
          description: "The name of a budget. The name must be unique within an account. The : and \\ characters, and the \"/action/\" substring, aren't allowed in BudgetName."
        BudgetLimit:
          $ref: "#/components/schemas/Spend"
          description: The total amount of cost, usage, RI utilization, RI coverage, Savings Plans utilization, or Savings Plans coverage that you want to track with your budget. BudgetLimit is required for cost or usage budgets, but optional for RI or Savings Plans utilization or coverage budgets. RI and Savings Plans utilization or coverage budgets default to 100. This is the only valid value for RI or Savings Plans utilization or coverage budgets. You can't use BudgetLimit with PlannedBudgetLimits for CreateBudget and UpdateBudget actions.
        PlannedBudgetLimits:
          type: object
          properties: {}
          description: A map containing multiple BudgetLimit, including current or future limits. PlannedBudgetLimits is available for cost or usage budget and supports both monthly and quarterly TimeUnit. For monthly budgets, provide 12 months of PlannedBudgetLimits values. This must start from the current month and include the next 11 months. The key is the start of the month, UTC in epoch seconds. For quarterly budgets, provide four quarters of PlannedBudgetLimits value entries in standard calendar quarter increments. This must start from the current quarter and include the next three quarters. The key is the start of the quarter, UTC in epoch seconds. If the planned budget expires before 12 months for monthly or four quarters for quarterly, provide the PlannedBudgetLimits values only for the remaining periods. If the budget begins at a date in the future, provide PlannedBudgetLimits values from the start date of the budget. After all of the BudgetLimit values in PlannedBudgetLimits are used, the budget continues to use the last limit as the BudgetLimit. At that point, the planned budget provides the same experience as a fixed budget. DescribeBudget and DescribeBudgets response along with PlannedBudgetLimits also contain BudgetLimit representing the current month or quarter limit present in PlannedBudgetLimits. This only applies to budgets that are created with PlannedBudgetLimits. Budgets that are created without PlannedBudgetLimits only contain BudgetLimit. They don't contain PlannedBudgetLimits.
        CostFilters:
          type: object
          properties: {}
          description: "The cost filters, such as Region, Service, LinkedAccount, Tag, or CostCategory, that are applied to a budget. Amazon Web Services Budgets supports the following services as a Service filter for RI budgets: Amazon EC2 Amazon Redshift Amazon Relational Database Service Amazon ElastiCache Amazon OpenSearch Service"
        CostTypes:
          $ref: "#/components/schemas/CostTypes"
          description: The types of costs that are included in this COST budget. USAGE, RI_UTILIZATION, RI_COVERAGE, SAVINGS_PLANS_UTILIZATION, and SAVINGS_PLANS_COVERAGE budgets do not have CostTypes.
        TimeUnit:
          $ref: "#/components/schemas/TimeUnit"
          description: The length of time until a budget resets the actual and forecasted spend.
        TimePeriod:
          $ref: "#/components/schemas/TimePeriod"
          description: The period of time that's covered by a budget. You set the start date and end date. The start date must come before the end date. The end date must come before 06/15/87 00:00 UTC. If you create your budget and don't specify a start date, Amazon Web Services defaults to the start of your chosen time period (DAILY, MONTHLY, QUARTERLY, ANNUALLY, or CUSTOM). For example, if you created your budget on January 24, 2018, chose DAILY, and didn't set a start date, Amazon Web Services set your start date to 01/24/18 00:00 UTC. If you chose MONTHLY, Amazon Web Services set your start date to 01/01/18 00:00 UTC. If you didn't specify an end date, Amazon Web Services set your end date to 06/15/87 00:00 UTC. The defaults are the same for the Billing and Cost Management console and the API. You can change either date with the UpdateBudget operation. After the end date, Amazon Web Services deletes the budget and all the associated notifications and subscribers.
        CalculatedSpend:
          $ref: "#/components/schemas/CalculatedSpend"
          description: The actual and forecasted cost or usage that the budget tracks.
        BudgetType:
          $ref: "#/components/schemas/BudgetType"
          description: Specifies whether this budget tracks costs, usage, RI utilization, RI coverage, Savings Plans utilization, or Savings Plans coverage.
        LastUpdatedTime:
          $ref: "#/components/schemas/GenericTimestamp"
          description: The last time that you updated this budget.
        AutoAdjustData:
          $ref: "#/components/schemas/AutoAdjustData"
          description: The parameters that determine the budget amount for an auto-adjusting budget.
        FilterExpression:
          $ref: "#/components/schemas/Expression"
          description: The filtering dimensions for the budget and their corresponding values.
        Metrics:
          $ref: "#/components/schemas/Metrics"
          description: The definition for how the budget data is aggregated.
        BillingViewArn:
          $ref: "#/components/schemas/BillingViewArn"
          description: The Amazon Resource Name (ARN) that uniquely identifies a specific billing view. The ARN is used to specify which particular billing view you want to interact with or retrieve information from when making API calls related to Amazon Web Services Billing and Cost Management features. The BillingViewArn can be retrieved by calling the ListBillingViews API.
        HealthStatus:
          $ref: "#/components/schemas/HealthStatus"
          description: The current operational state of a Billing View derived resource.
      required:
        - BudgetName
        - TimeUnit
        - BudgetType
    BudgetName:
      description: A string that represents the budget name. The ":" and "\" characters, and the "/action/" substring, aren't allowed.
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^(?![^:\\]*/action/|(?i).*<script>.*</script>.*)[^:\\]+$
    Spend:
      description: "The amount of cost or usage that's measured for a budget. Cost example: A Spend for 3 USD of costs has the following parameters: An Amount of 3 A Unit of USD Usage example: A Spend for 3 GB of S3 usage has the following parameters: An Amount of 3 A Unit of GB"
      type: object
      properties:
        Amount:
          $ref: "#/components/schemas/NumericValue"
          description: The cost or usage amount that's associated with a budget forecast, actual spend, or budget threshold.
        Unit:
          $ref: "#/components/schemas/UnitValue"
          description: The unit of measurement that's used for the budget forecast, actual spend, or budget threshold.
      required:
        - Amount
        - Unit
    NumericValue:
      description: A string that represents a numeric value.
      type: string
      minLength: 1
      maxLength: 2147483647
      pattern: ([0-9]*\.)?[0-9]+
    UnitValue:
      description: A string that represents the spend unit of a budget. It can't be null or empty.
      type: string
      minLength: 1
      maxLength: 2147483647
      pattern: .*
    CostTypes:
      description: The types of cost that are included in a COST budget, such as tax and subscriptions. USAGE, RI_UTILIZATION, RI_COVERAGE, SAVINGS_PLANS_UTILIZATION, and SAVINGS_PLANS_COVERAGE budgets don't have CostTypes.
      type: object
      properties:
        IncludeTax:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether a budget includes taxes. The default value is true.
        IncludeSubscription:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether a budget includes subscriptions. The default value is true.
        UseBlended:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether a budget uses a blended rate. The default value is false.
        IncludeRefund:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether a budget includes refunds. The default value is true.
        IncludeCredit:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether a budget includes credits. The default value is true.
        IncludeUpfront:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether a budget includes upfront RI costs. The default value is true.
        IncludeRecurring:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether a budget includes recurring fees such as monthly RI fees. The default value is true.
        IncludeOtherSubscription:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether a budget includes non-RI subscription costs. The default value is true.
        IncludeSupport:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether a budget includes support subscription fees. The default value is true.
        IncludeDiscount:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether a budget includes discounts. The default value is true.
        UseAmortized:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether a budget uses the amortized rate. The default value is false.
    NullableBoolean:
      type: boolean
    TimeUnit:
      description: The time unit of the budget, such as MONTHLY or QUARTERLY.
      type: string
      enum:
        - DAILY
        - MONTHLY
        - QUARTERLY
        - ANNUALLY
        - CUSTOM
    TimePeriod:
      description: The period of time that's covered by a budget. The period has a start date and an end date. The start date must come before the end date. There are no restrictions on the end date.
      type: object
      properties:
        Start:
          $ref: "#/components/schemas/GenericTimestamp"
          description: The start date for a budget. If you created your budget and didn't specify a start date, Amazon Web Services defaults to the start of your chosen time period (DAILY, MONTHLY, QUARTERLY, ANNUALLY, or CUSTOM). For example, if you created your budget on January 24, 2018, chose DAILY, and didn't set a start date, Amazon Web Services set your start date to 01/24/18 00:00 UTC. If you chose MONTHLY, Amazon Web Services set your start date to 01/01/18 00:00 UTC. The defaults are the same for the Billing and Cost Management console and the API. You can change your start date with the UpdateBudget operation.
        End:
          $ref: "#/components/schemas/GenericTimestamp"
          description: The end date for a budget. If you didn't specify an end date, Amazon Web Services set your end date to 06/15/87 00:00 UTC. The defaults are the same for the Billing and Cost Management console and the API. After the end date, Amazon Web Services deletes the budget and all the associated notifications and subscribers. You can change your end date with the UpdateBudget operation.
    GenericTimestamp:
      description: A generic time stamp. In Java, it's transformed to a Date object.
      type: string
      format: date-time
    CalculatedSpend:
      description: The spend objects that are associated with this budget. The actualSpend tracks how much you've used, cost, usage, RI units, or Savings Plans units and the forecastedSpend tracks how much that you're predicted to spend based on your historical usage profile. For example, if it's the 20th of the month and you have spent 50 dollars on Amazon EC2, your actualSpend is 50 USD, and your forecastedSpend is 75 USD.
      type: object
      properties:
        ActualSpend:
          $ref: "#/components/schemas/Spend"
          description: The amount of cost, usage, RI units, or Savings Plans units that you used.
        ForecastedSpend:
          $ref: "#/components/schemas/Spend"
          description: The amount of cost, usage, RI units, or Savings Plans units that you're forecasted to use.
      required:
        - ActualSpend
    BudgetType:
      description: "The type of a budget. It must be one of the following types: COST, USAGE, RI_UTILIZATION, RI_COVERAGE, SAVINGS_PLANS_UTILIZATION, or SAVINGS_PLANS_COVERAGE."
      type: string
      enum:
        - USAGE
        - COST
        - RI_UTILIZATION
        - RI_COVERAGE
        - SAVINGS_PLANS_UTILIZATION
        - SAVINGS_PLANS_COVERAGE
    AutoAdjustData:
      description: The parameters that determine the budget amount for an auto-adjusting budget.
      type: object
      properties:
        AutoAdjustType:
          $ref: "#/components/schemas/AutoAdjustType"
          description: The string that defines whether your budget auto-adjusts based on historical or forecasted data.
        HistoricalOptions:
          $ref: "#/components/schemas/HistoricalOptions"
          description: The parameters that define or describe the historical data that your auto-adjusting budget is based on.
        LastAutoAdjustTime:
          $ref: "#/components/schemas/GenericTimestamp"
          description: The last time that your budget was auto-adjusted.
      required:
        - AutoAdjustType
    AutoAdjustType:
      type: string
      enum:
        - HISTORICAL
        - FORECAST
    HistoricalOptions:
      description: The parameters that define or describe the historical data that your auto-adjusting budget is based on.
      type: object
      properties:
        BudgetAdjustmentPeriod:
          $ref: "#/components/schemas/AdjustmentPeriod"
          description: "The number of budget periods included in the moving-average calculation that determines your auto-adjusted budget amount. The maximum value depends on the TimeUnit granularity of the budget: For the DAILY granularity, the maximum value is 60. For the MONTHLY granularity, the maximum value is 12. For the QUARTERLY granularity, the maximum value is 4. For the ANNUALLY granularity, the maximum value is 1."
        LookBackAvailablePeriods:
          $ref: "#/components/schemas/AdjustmentPeriod"
          description: The integer that describes how many budget periods in your BudgetAdjustmentPeriod are included in the calculation of your current BudgetLimit. If the first budget period in your BudgetAdjustmentPeriod has no cost data, then that budget period isn’t included in the average that determines your budget limit. For example, if you set BudgetAdjustmentPeriod as 4 quarters, but your account had no cost data in the first quarter, then only the last three quarters are included in the calculation. In this scenario, LookBackAvailablePeriods returns 3. You can’t set your own LookBackAvailablePeriods. The value is automatically calculated from the BudgetAdjustmentPeriod and your historical cost data.
      required:
        - BudgetAdjustmentPeriod
    AdjustmentPeriod:
      type: integer
      minimum: 1
      maximum: 60
    Expression:
      description: Use Expression to filter in various Budgets APIs.
      type: object
      properties:
        Or:
          $ref: "#/components/schemas/Expressions"
          description: Return results that match either Dimension object.
        And:
          $ref: "#/components/schemas/Expressions"
          description: Return results that match both Dimension objects.
        Not:
          $ref: "#/components/schemas/Expression"
          description: Return results that don't match a Dimension object.
        Dimensions:
          $ref: "#/components/schemas/ExpressionDimensionValues"
          description: The specific Dimension to use for Expression.
        Tags:
          $ref: "#/components/schemas/TagValues"
          description: The specific Tag to use for Expression.
        CostCategories:
          $ref: "#/components/schemas/CostCategoryValues"
          description: The filter that's based on CostCategoryValues.
    Expressions:
      type: array
      items:
        $ref: "#/components/schemas/Expression"
    ExpressionDimensionValues:
      description: Contains the specifications for the filters to use for your request.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/Dimension"
          description: The name of the dimension that you want to filter on.
        Values:
          $ref: "#/components/schemas/Values"
          description: The metadata values you can specify to filter upon, so that the results all match at least one of the specified values.
        MatchOptions:
          $ref: "#/components/schemas/MatchOptions"
          description: The match options that you can use to filter your results. You can specify only one of these values in the array.
      required:
        - Key
        - Values
    Dimension:
      type: string
      enum:
        - AZ
        - INSTANCE_TYPE
        - LINKED_ACCOUNT
        - LINKED_ACCOUNT_NAME
        - OPERATION
        - PURCHASE_TYPE
        - REGION
        - SERVICE
        - SERVICE_CODE
        - USAGE_TYPE
        - USAGE_TYPE_GROUP
        - RECORD_TYPE
        - OPERATING_SYSTEM
        - TENANCY
        - SCOPE
        - PLATFORM
        - SUBSCRIPTION_ID
        - LEGAL_ENTITY_NAME
        - INVOICING_ENTITY
        - DEPLOYMENT_OPTION
        - DATABASE_ENGINE
        - CACHE_ENGINE
        - INSTANCE_TYPE_FAMILY
        - BILLING_ENTITY
        - RESERVATION_ID
        - RESOURCE_ID
        - RIGHTSIZING_TYPE
        - SAVINGS_PLANS_TYPE
        - SAVINGS_PLAN_ARN
        - PAYMENT_OPTION
        - RESERVATION_MODIFIED
        - TAG_KEY
        - COST_CATEGORY_NAME
    Values:
      type: array
      items:
        $ref: "#/components/schemas/Value"
    Value:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[\\S\\s]*"
    MatchOptions:
      type: array
      items:
        $ref: "#/components/schemas/MatchOption"
    MatchOption:
      type: string
      enum:
        - EQUALS
        - ABSENT
        - STARTS_WITH
        - ENDS_WITH
        - CONTAINS
        - GREATER_THAN_OR_EQUAL
        - CASE_SENSITIVE
        - CASE_INSENSITIVE
    TagValues:
      description: The values that are available for a tag.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key for the tag.
        Values:
          $ref: "#/components/schemas/Values"
          description: The specific value of the tag.
        MatchOptions:
          $ref: "#/components/schemas/MatchOptions"
          description: The match options that you can use to filter your results.
    TagKey:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[\\S\\s]*"
    CostCategoryValues:
      description: The cost category values used for filtering the costs.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/CostCategoryName"
          description: The unique name of the cost category.
        Values:
          $ref: "#/components/schemas/Values"
          description: The specific value of the cost category.
        MatchOptions:
          $ref: "#/components/schemas/MatchOptions"
          description: The match options that you can use to filter your results.
    CostCategoryName:
      type: string
    Metrics:
      type: array
      items:
        $ref: "#/components/schemas/Metric"
    Metric:
      type: string
      enum:
        - BlendedCost
        - UnblendedCost
        - AmortizedCost
        - NetUnblendedCost
        - NetAmortizedCost
        - UsageQuantity
        - NormalizedUsageAmount
        - Hours
    BillingViewArn:
      type: string
      minLength: 20
      maxLength: 2048
