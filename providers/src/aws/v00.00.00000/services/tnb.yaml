openapi: 3.0.0
info:
  version: "2008-10-21"
  title: AWS Telco Network Builder
  description: AWS Telco Network Builder
  x-serviceName: tnb
  x-serviceAlias: tnb
  x-protocol: rest-json
  x-apiVersion: "2008-10-21"
  x-endpointPrefix: tnb
  x-jsonVersion: "1.1"
servers:
  - url: https://tnb.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for tnb
paths:
  /sol/nslcm/v1/ns_lcm_op_occs/{ns_lcm_op_occ_id}/cancel:
    post:
      operationId: CancelSolNetworkOperation
      description: Cancels a network operation. A network operation is any operation that is done to your network, such as network instance instantiation or termination.
      parameters:
        - name: ns_lcm_op_occ_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NsLcmOpOccId"
          description: The identifier of the network operation.
      responses:
        "202":
          description: Success
  /sol/vnfpkgm/v1/vnf_packages:
    post:
      operationId: CreateSolFunctionPackage
      description: Creates a function package. A function package is a .zip file in CSAR (Cloud Service Archive) format that contains a network function (an ETSI standard telecommunication application) and function package descriptor that uses the TOSCA standard to describe how the network functions should run on your network. For more information, see Function packages in the Amazon Web Services Telco Network Builder User Guide. Creating a function package is the first step for creating a network in AWS TNB. This request creates an empty container with an ID. The next step is to upload the actual CSAR zip file into that empty container. To upload function package content, see PutSolFunctionPackageContent.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSolFunctionPackageOutput"
    get:
      operationId: ListSolFunctionPackages
      description: Lists information about function packages. A function package is a .zip file in CSAR (Cloud Service Archive) format that contains a network function (an ETSI standard telecommunication application) and function package descriptor that uses the TOSCA standard to describe how the network functions should run on your network.
      parameters:
        - name: max_results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListSolFunctionPackagesInputMaxResultsInteger"
          description: The maximum number of results to include in the response.
        - name: nextpage_opaque_marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSolFunctionPackagesOutput"
  /sol/nslcm/v1/ns_instances:
    post:
      operationId: CreateSolNetworkInstance
      description: Creates a network instance. A network instance is a single network created in Amazon Web Services TNB that can be deployed and on which life-cycle operations (like terminate, update, and delete) can be performed. Creating a network instance is the third step after creating a network package. For more information about network instances, Network instances in the Amazon Web Services Telco Network Builder User Guide. Once you create a network instance, you can instantiate it. To instantiate a network, see InstantiateSolNetworkInstance.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nsDescription:
                  $ref: "#/components/schemas/CreateSolNetworkInstanceInputNsDescriptionString"
                nsName:
                  $ref: "#/components/schemas/CreateSolNetworkInstanceInputNsNameString"
                nsdInfoId:
                  $ref: "#/components/schemas/NsdInfoId"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - nsName
                - nsdInfoId
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSolNetworkInstanceOutput"
    get:
      operationId: ListSolNetworkInstances
      description: Lists your network instances. A network instance is a single network created in Amazon Web Services TNB that can be deployed and on which life-cycle operations (like terminate, update, and delete) can be performed.
      parameters:
        - name: max_results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListSolNetworkInstancesInputMaxResultsInteger"
          description: The maximum number of results to include in the response.
        - name: nextpage_opaque_marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSolNetworkInstancesOutput"
  /sol/nsd/v1/ns_descriptors:
    post:
      operationId: CreateSolNetworkPackage
      description: Creates a network package. A network package is a .zip file in CSAR (Cloud Service Archive) format defines the function packages you want to deploy and the Amazon Web Services infrastructure you want to deploy them on. For more information, see Network instances in the Amazon Web Services Telco Network Builder User Guide. A network package consists of a network service descriptor (NSD) file (required) and any additional files (optional), such as scripts specific to your needs. For example, if you have multiple function packages in your network package, you can use the NSD to define which network functions should run in certain VPCs, subnets, or EKS clusters. This request creates an empty network package container with an ID. Once you create a network package, you can upload the network package content using PutSolNetworkPackageContent.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSolNetworkPackageOutput"
    get:
      operationId: ListSolNetworkPackages
      description: Lists network packages. A network package is a .zip file in CSAR (Cloud Service Archive) format defines the function packages you want to deploy and the Amazon Web Services infrastructure you want to deploy them on.
      parameters:
        - name: max_results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListSolNetworkPackagesInputMaxResultsInteger"
          description: The maximum number of results to include in the response.
        - name: nextpage_opaque_marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSolNetworkPackagesOutput"
  /sol/vnfpkgm/v1/vnf_packages/{vnf_pkg_id}:
    delete:
      operationId: DeleteSolFunctionPackage
      description: Deletes a function package. A function package is a .zip file in CSAR (Cloud Service Archive) format that contains a network function (an ETSI standard telecommunication application) and function package descriptor that uses the TOSCA standard to describe how the network functions should run on your network. To delete a function package, the package must be in a disabled state. To disable a function package, see UpdateSolFunctionPackage.
      parameters:
        - name: vnf_pkg_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VnfPkgId"
          description: ID of the function package.
      responses:
        "204":
          description: Success
    get:
      operationId: GetSolFunctionPackage
      description: Gets the details of an individual function package, such as the operational state and whether the package is in use. A function package is a .zip file in CSAR (Cloud Service Archive) format that contains a network function (an ETSI standard telecommunication application) and function package descriptor that uses the TOSCA standard to describe how the network functions should run on your network..
      parameters:
        - name: vnf_pkg_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VnfPkgId"
          description: ID of the function package.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSolFunctionPackageOutput"
    patch:
      operationId: UpdateSolFunctionPackage
      description: Updates the operational state of function package. A function package is a .zip file in CSAR (Cloud Service Archive) format that contains a network function (an ETSI standard telecommunication application) and function package descriptor that uses the TOSCA standard to describe how the network functions should run on your network.
      parameters:
        - name: vnf_pkg_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VnfPkgId"
          description: ID of the function package.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                operationalState:
                  $ref: "#/components/schemas/OperationalState"
              required:
                - operationalState
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSolFunctionPackageOutput"
  /sol/nslcm/v1/ns_instances/{ns_instance_id}:
    delete:
      operationId: DeleteSolNetworkInstance
      description: Deletes a network instance. A network instance is a single network created in Amazon Web Services TNB that can be deployed and on which life-cycle operations (like terminate, update, and delete) can be performed. To delete a network instance, the instance must be in a stopped or terminated state. To terminate a network instance, see TerminateSolNetworkInstance.
      parameters:
        - name: ns_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NsInstanceId"
          description: Network instance ID.
      responses:
        "204":
          description: Success
    get:
      operationId: GetSolNetworkInstance
      description: Gets the details of the network instance. A network instance is a single network created in Amazon Web Services TNB that can be deployed and on which life-cycle operations (like terminate, update, and delete) can be performed.
      parameters:
        - name: ns_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NsInstanceId"
          description: ID of the network instance.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSolNetworkInstanceOutput"
  /sol/nsd/v1/ns_descriptors/{nsd_info_id}:
    delete:
      operationId: DeleteSolNetworkPackage
      description: Deletes network package. A network package is a .zip file in CSAR (Cloud Service Archive) format defines the function packages you want to deploy and the Amazon Web Services infrastructure you want to deploy them on. To delete a network package, the package must be in a disable state. To disable a network package, see UpdateSolNetworkPackage.
      parameters:
        - name: nsd_info_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NsdInfoId"
          description: ID of the network service descriptor in the network package.
      responses:
        "204":
          description: Success
    get:
      operationId: GetSolNetworkPackage
      description: Gets the details of a network package. A network package is a .zip file in CSAR (Cloud Service Archive) format defines the function packages you want to deploy and the Amazon Web Services infrastructure you want to deploy them on.
      parameters:
        - name: nsd_info_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NsdInfoId"
          description: ID of the network service descriptor in the network package.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSolNetworkPackageOutput"
    patch:
      operationId: UpdateSolNetworkPackage
      description: Updates the operational state of a network package. A network package is a .zip file in CSAR (Cloud Service Archive) format defines the function packages you want to deploy and the Amazon Web Services infrastructure you want to deploy them on. A network service descriptor is a .yaml file in a network package that uses the TOSCA standard to describe the network functions you want to deploy and the Amazon Web Services infrastructure you want to deploy the network functions on.
      parameters:
        - name: nsd_info_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NsdInfoId"
          description: ID of the network service descriptor in the network package.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nsdOperationalState:
                  $ref: "#/components/schemas/NsdOperationalState"
              required:
                - nsdOperationalState
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSolNetworkPackageOutput"
  /sol/vnflcm/v1/vnf_instances/{vnf_instance_id}:
    get:
      operationId: GetSolFunctionInstance
      description: Gets the details of a network function instance, including the instantiation state and metadata from the function package descriptor in the network function package. A network function instance is a function in a function package .
      parameters:
        - name: vnf_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VnfInstanceId"
          description: ID of the network function.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSolFunctionInstanceOutput"
  /sol/vnfpkgm/v1/vnf_packages/{vnf_pkg_id}/package_content:
    get:
      operationId: GetSolFunctionPackageContent
      description: Gets the contents of a function package. A function package is a .zip file in CSAR (Cloud Service Archive) format that contains a network function (an ETSI standard telecommunication application) and function package descriptor that uses the TOSCA standard to describe how the network functions should run on your network.
      parameters:
        - name: Accept
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/PackageContentType"
          description: The format of the package that you want to download from the function packages.
        - name: vnf_pkg_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VnfPkgId"
          description: ID of the function package.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSolFunctionPackageContentOutput"
    put:
      operationId: PutSolFunctionPackageContent
      description: Uploads the contents of a function package. A function package is a .zip file in CSAR (Cloud Service Archive) format that contains a network function (an ETSI standard telecommunication application) and function package descriptor that uses the TOSCA standard to describe how the network functions should run on your network.
      parameters:
        - name: Content-Type
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/PackageContentType"
          description: Function package content type.
        - name: vnf_pkg_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VnfPkgId"
          description: Function package ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                file:
                  $ref: "#/components/schemas/SensitiveBlob"
              required:
                - file
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutSolFunctionPackageContentOutput"
  /sol/vnfpkgm/v1/vnf_packages/{vnf_pkg_id}/vnfd:
    get:
      operationId: GetSolFunctionPackageDescriptor
      description: Gets a function package descriptor in a function package. A function package descriptor is a .yaml file in a function package that uses the TOSCA standard to describe how the network function in the function package should run on your network. A function package is a .zip file in CSAR (Cloud Service Archive) format that contains a network function (an ETSI standard telecommunication application) and function package descriptor that uses the TOSCA standard to describe how the network functions should run on your network.
      parameters:
        - name: Accept
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/DescriptorContentType"
          description: Indicates which content types, expressed as MIME types, the client is able to understand.
        - name: vnf_pkg_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VnfPkgId"
          description: ID of the function package.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSolFunctionPackageDescriptorOutput"
  /sol/nslcm/v1/ns_lcm_op_occs/{ns_lcm_op_occ_id}:
    get:
      operationId: GetSolNetworkOperation
      description: Gets the details of a network operation, including the tasks involved in the network operation and the status of the tasks. A network operation is any operation that is done to your network, such as network instance instantiation or termination.
      parameters:
        - name: ns_lcm_op_occ_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NsLcmOpOccId"
          description: The identifier of the network operation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSolNetworkOperationOutput"
  /sol/nsd/v1/ns_descriptors/{nsd_info_id}/nsd_content:
    get:
      operationId: GetSolNetworkPackageContent
      description: Gets the contents of a network package. A network package is a .zip file in CSAR (Cloud Service Archive) format defines the function packages you want to deploy and the Amazon Web Services infrastructure you want to deploy them on.
      parameters:
        - name: Accept
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/PackageContentType"
          description: The format of the package you want to download from the network package.
        - name: nsd_info_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NsdInfoId"
          description: ID of the network service descriptor in the network package.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSolNetworkPackageContentOutput"
    put:
      operationId: PutSolNetworkPackageContent
      description: Uploads the contents of a network package. A network package is a .zip file in CSAR (Cloud Service Archive) format defines the function packages you want to deploy and the Amazon Web Services infrastructure you want to deploy them on.
      parameters:
        - name: Content-Type
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/PackageContentType"
          description: Network package content type.
        - name: nsd_info_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NsdInfoId"
          description: Network service descriptor info ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                file:
                  $ref: "#/components/schemas/SensitiveBlob"
              required:
                - file
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutSolNetworkPackageContentOutput"
  /sol/nsd/v1/ns_descriptors/{nsd_info_id}/nsd:
    get:
      operationId: GetSolNetworkPackageDescriptor
      description: Gets the content of the network service descriptor. A network service descriptor is a .yaml file in a network package that uses the TOSCA standard to describe the network functions you want to deploy and the Amazon Web Services infrastructure you want to deploy the network functions on.
      parameters:
        - name: nsd_info_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NsdInfoId"
          description: ID of the network service descriptor in the network package.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSolNetworkPackageDescriptorOutput"
  /sol/nslcm/v1/ns_instances/{ns_instance_id}/instantiate:
    post:
      operationId: InstantiateSolNetworkInstance
      description: Instantiates a network instance. A network instance is a single network created in Amazon Web Services TNB that can be deployed and on which life-cycle operations (like terminate, update, and delete) can be performed. Before you can instantiate a network instance, you have to create a network instance. For more information, see CreateSolNetworkInstance.
      parameters:
        - name: dry_run
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: A check for whether you have the required permissions for the action without actually making the request and provides an error response. If you have the required permissions, the error response is DryRunOperation. Otherwise, it is UnauthorizedOperation.
        - name: ns_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NsInstanceId"
          description: ID of the network instance.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                additionalParamsForNs:
                  $ref: "#/components/schemas/Document"
                tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstantiateSolNetworkInstanceOutput"
  /sol/vnflcm/v1/vnf_instances:
    get:
      operationId: ListSolFunctionInstances
      description: Lists network function instances. A network function instance is a function in a function package .
      parameters:
        - name: max_results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListSolFunctionInstancesInputMaxResultsInteger"
          description: The maximum number of results to include in the response.
        - name: nextpage_opaque_marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSolFunctionInstancesOutput"
  /sol/nslcm/v1/ns_lcm_op_occs:
    get:
      operationId: ListSolNetworkOperations
      description: Lists details for a network operation, including when the operation started and the status of the operation. A network operation is any operation that is done to your network, such as network instance instantiation or termination.
      parameters:
        - name: max_results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListSolNetworkOperationsInputMaxResultsInteger"
          description: The maximum number of results to include in the response.
        - name: nextpage_opaque_marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The token for the next page of results.
        - name: nsInstanceId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NsInstanceId"
          description: Network instance id filter, to retrieve network operations associated to a network instance.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSolNetworkOperationsOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists tags for AWS TNB resources.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TNBResourceArn"
          description: Resource ARN.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
    post:
      operationId: TagResource
      description: Tags an AWS TNB resource. A tag is a label that you assign to an Amazon Web Services resource. Each tag consists of a key and an optional value. You can use tags to search and filter your resources or track your Amazon Web Services costs.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TNBResourceArn"
          description: Resource ARN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
    delete:
      operationId: UntagResource
      description: Untags an AWS TNB resource. A tag is a label that you assign to an Amazon Web Services resource. Each tag consists of a key and an optional value. You can use tags to search and filter your resources or track your Amazon Web Services costs.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TNBResourceArn"
          description: Resource ARN.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: Tag keys.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /sol/nslcm/v1/ns_instances/{ns_instance_id}/terminate:
    post:
      operationId: TerminateSolNetworkInstance
      description: Terminates a network instance. A network instance is a single network created in Amazon Web Services TNB that can be deployed and on which life-cycle operations (like terminate, update, and delete) can be performed. You must terminate a network instance before you can delete it.
      parameters:
        - name: ns_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NsInstanceId"
          description: ID of the network instance.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerminateSolNetworkInstanceOutput"
  /sol/nslcm/v1/ns_instances/{ns_instance_id}/update:
    post:
      operationId: UpdateSolNetworkInstance
      description: Update a network instance. A network instance is a single network created in Amazon Web Services TNB that can be deployed and on which life-cycle operations (like terminate, update, and delete) can be performed. Choose the updateType parameter to target the necessary update of the network instance.
      parameters:
        - name: ns_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NsInstanceId"
          description: ID of the network instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                modifyVnfInfoData:
                  $ref: "#/components/schemas/UpdateSolNetworkModify"
                tags:
                  $ref: "#/components/schemas/TagMap"
                updateNs:
