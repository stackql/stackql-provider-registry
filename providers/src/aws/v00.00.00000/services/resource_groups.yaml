openapi: 3.0.0
info:
  version: "2017-11-27"
  title: AWS Resource Groups
  description: AWS Resource Groups
  x-serviceName: resource-groups
  x-serviceAlias: resource_groups
  x-protocol: rest-json
  x-apiVersion: "2017-11-27"
  x-endpointPrefix: resource-groups
servers:
  - url: https://resource-groups.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for resource-groups
paths:
  /cancel-tag-sync-task:
    post:
      operationId: CancelTagSyncTask
      description: "Cancels the specified tag-sync task. Minimum permissions To run this command, you must have the following permissions: resource-groups:CancelTagSyncTask on the application group resource-groups:DeleteGroup"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TaskArn:
                  $ref: "#/components/schemas/TagSyncTaskArn"
              required:
                - TaskArn
      responses:
        "200":
          description: Success
  /groups:
    post:
      operationId: CreateGroup
      description: "Creates a resource group with the specified name and description. You can optionally include either a resource query or a service configuration. For more information about constructing a resource query, see Build queries and groups in Resource Groups in the Resource Groups User Guide. For more information about service-linked groups and service configurations, see Service configurations for Resource Groups. Minimum permissions To run this command, you must have the following permissions: resource-groups:CreateGroup"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/CreateGroupName"
                Description:
                  $ref: "#/components/schemas/Description"
                ResourceQuery:
                  $ref: "#/components/schemas/ResourceQuery"
                Tags:
                  $ref: "#/components/schemas/Tags"
                Configuration:
                  $ref: "#/components/schemas/GroupConfigurationList"
                Criticality:
                  $ref: "#/components/schemas/Criticality"
                Owner:
                  $ref: "#/components/schemas/Owner"
                DisplayName:
                  $ref: "#/components/schemas/DisplayName"
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGroupOutput"
  /delete-group:
    post:
      operationId: DeleteGroup
      description: "Deletes the specified resource group. Deleting a resource group does not delete any resources that are members of the group; it only deletes the group structure. Minimum permissions To run this command, you must have the following permissions: resource-groups:DeleteGroup"
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                GroupName:
                  $ref: "#/components/schemas/GroupName"
                Group:
                  $ref: "#/components/schemas/GroupStringV2"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGroupOutput"
  /get-account-settings:
    post:
      operationId: GetAccountSettings
      description: Retrieves the current status of optional features in Resource Groups.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountSettingsOutput"
  /get-group:
    post:
      operationId: GetGroup
      description: "Returns information about a specified resource group. Minimum permissions To run this command, you must have the following permissions: resource-groups:GetGroup"
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                GroupName:
                  $ref: "#/components/schemas/GroupName"
                Group:
                  $ref: "#/components/schemas/GroupStringV2"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGroupOutput"
  /get-group-configuration:
    post:
      operationId: GetGroupConfiguration
      description: "Retrieves the service configuration associated with the specified resource group. For details about the service configuration syntax, see Service configurations for Resource Groups. Minimum permissions To run this command, you must have the following permissions: resource-groups:GetGroupConfiguration"
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Group:
                  $ref: "#/components/schemas/GroupString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGroupConfigurationOutput"
  /get-group-query:
    post:
      operationId: GetGroupQuery
      description: "Retrieves the resource query associated with the specified resource group. For more information about resource queries, see Create a tag-based group in Resource Groups. Minimum permissions To run this command, you must have the following permissions: resource-groups:GetGroupQuery"
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                GroupName:
                  $ref: "#/components/schemas/GroupName"
                Group:
                  $ref: "#/components/schemas/GroupString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGroupQueryOutput"
  /get-tag-sync-task:
    post:
      operationId: GetTagSyncTask
      description: "Returns information about a specified tag-sync task. Minimum permissions To run this command, you must have the following permissions: resource-groups:GetTagSyncTask on the application group"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TaskArn:
                  $ref: "#/components/schemas/TagSyncTaskArn"
              required:
                - TaskArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTagSyncTaskOutput"
  /resources/{arn}/tags:
    get:
      operationId: GetTags
      description: "Returns a list of tags that are associated with a resource group, specified by an Amazon resource name (ARN). Minimum permissions To run this command, you must have the following permissions: resource-groups:GetTags"
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GroupArnV2"
          description: The Amazon resource name (ARN) of the resource group whose tags you want to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTagsOutput"
    put:
      operationId: Tag
      description: "Adds tags to a resource group with the specified Amazon resource name (ARN). Existing tags on a resource group are not changed if they are not specified in the request parameters. Do not store personally identifiable information (PII) or other confidential or sensitive information in tags. We use tags to provide you with billing and administration services. Tags are not intended to be used for private or sensitive data. Minimum permissions To run this command, you must have the following permissions: resource-groups:Tag"
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GroupArnV2"
          description: The Amazon resource name (ARN) of the resource group to which to add tags.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagOutput"
    patch:
      operationId: Untag
      description: "Deletes tags from a specified resource group. Minimum permissions To run this command, you must have the following permissions: resource-groups:Untag"
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GroupArnV2"
          description: The Amazon resource name (ARN) of the resource group from which to remove tags. The command removed both the specified keys and any values associated with those keys.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Keys:
                  $ref: "#/components/schemas/TagKeyList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagOutput"
  /group-resources:
    post:
      operationId: GroupResources
      description: "Adds the specified resources to the specified group. You can only use this operation with the following groups: AWS::EC2::HostManagement AWS::EC2::CapacityReservationPool AWS::ResourceGroups::ApplicationGroup Other resource group types and resource types are not currently supported by this operation. Minimum permissions To run this command, you must have the following permissions: resource-groups:GroupResources"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Group:
                  $ref: "#/components/schemas/GroupStringV2"
                ResourceArns:
                  $ref: "#/components/schemas/ResourceArnList"
              required:
                - Group
                - ResourceArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResourcesOutput"
  /list-group-resources:
    post:
      operationId: ListGroupResources
      description: "Returns a list of Amazon resource names (ARNs) of the resources that are members of a specified resource group. Minimum permissions To run this command, you must have the following permissions: resource-groups:ListGroupResources cloudformation:DescribeStacks cloudformation:ListStackResources tag:GetResources"
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                GroupName:
                  $ref: "#/components/schemas/GroupName"
                Group:
                  $ref: "#/components/schemas/GroupStringV2"
                Filters:
                  $ref: "#/components/schemas/ResourceFilterList"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGroupResourcesOutput"
  /list-grouping-statuses:
    post:
      operationId: ListGroupingStatuses
      description: Returns the status of the last grouping or ungrouping action for each resource in the specified application group.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Group:
                  $ref: "#/components/schemas/GroupStringV2"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                Filters:
                  $ref: "#/components/schemas/ListGroupingStatusesFilterList"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - Group
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGroupingStatusesOutput"
  /groups-list:
    post:
      operationId: ListGroups
      description: "Returns a list of existing Resource Groups in your account. Minimum permissions To run this command, you must have the following permissions: resource-groups:ListGroups"
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The total number of results that you want included on each page of the response. If you do not include this parameter, it defaults to a value that is specific to the operation. If additional items exist beyond the maximum you specify, the NextToken response element is present and has a value (is not null). Include that value as the NextToken request parameter in the next call to the operation to get the next part of the results. Note that the service might return fewer results than the maximum even when there are more results available. You should check NextToken after every operation to ensure that you receive all of the results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The parameter for receiving additional results if you receive a NextToken response in a previous request. A NextToken response indicates that more output is available. Set this parameter to the value provided by a previous call's NextToken response to indicate where the output should continue from.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/GroupFilterList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGroupsOutput"
  /list-tag-sync-tasks:
    post:
      operationId: ListTagSyncTasks
      description: "Returns a list of tag-sync tasks. Minimum permissions To run this command, you must have the following permissions: resource-groups:ListTagSyncTasks with the group passed in the filters as the resource or * if using no filters"
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/ListTagSyncTasksFilterList"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagSyncTasksOutput"
  /put-group-configuration:
    post:
      operationId: PutGroupConfiguration
      description: "Attaches a service configuration to the specified group. This occurs asynchronously, and can take time to complete. You can use GetGroupConfiguration to check the status of the update. Minimum permissions To run this command, you must have the following permissions: resource-groups:PutGroupConfiguration"
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Group:
                  $ref: "#/components/schemas/GroupString"
                Configuration:
                  $ref: "#/components/schemas/GroupConfigurationList"
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutGroupConfigurationOutput"
  /resources/search:
    post:
      operationId: SearchResources
      description: "Returns a list of Amazon Web Services resource identifiers that matches the specified query. The query uses the same format as a resource query in a CreateGroup or UpdateGroupQuery operation. Minimum permissions To run this command, you must have the following permissions: resource-groups:SearchResources cloudformation:DescribeStacks cloudformation:ListStackResources tag:GetResources"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceQuery:
                  $ref: "#/components/schemas/ResourceQuery"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - ResourceQuery
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResourcesOutput"
  /start-tag-sync-task:
    post:
      operationId: StartTagSyncTask
      description: "Creates a new tag-sync task to onboard and sync resources tagged with a specific tag key-value pair to an application. To start a tag-sync task, you need a resource tagging role. The resource tagging role grants permissions to tag and untag applications resources and must include a trust policy that allows Resource Groups to assume the role and perform resource tagging tasks on your behalf. For instructions on creating a tag-sync task, see Create a tag-sync using the Resource Groups API in the Amazon Web Services Service Catalog AppRegistry Administrator Guide. Minimum permissions To run this command, you must have the following permissions: resource-groups:StartTagSyncTask on the application group resource-groups:CreateGroup iam:PassRole on the role provided in the request"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Group:
                  $ref: "#/components/schemas/GroupStringV2"
                TagKey:
                  $ref: "#/components/schemas/TagKey"
                TagValue:
                  $ref: "#/components/schemas/TagValue"
                ResourceQuery:
                  $ref: "#/components/schemas/ResourceQuery"
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
              required:
                - Group
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartTagSyncTaskOutput"
  /ungroup-resources:
    post:
      operationId: UngroupResources
      description: "Removes the specified resources from the specified group. This operation works only with static groups that you populated using the GroupResources operation. It doesn't work with any resource groups that are automatically populated by tag-based or CloudFormation stack-based queries. Minimum permissions To run this command, you must have the following permissions: resource-groups:UngroupResources"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Group:
                  $ref: "#/components/schemas/GroupStringV2"
                ResourceArns:
                  $ref: "#/components/schemas/ResourceArnList"
              required:
                - Group
                - ResourceArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UngroupResourcesOutput"
  /update-account-settings:
    post:
      operationId: UpdateAccountSettings
      description: Turns on or turns off optional features in Resource Groups. The preceding example shows that the request to turn on group lifecycle events is IN_PROGRESS. You can call the GetAccountSettings operation to check for completion by looking for GroupLifecycleEventsStatus to change to ACTIVE.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                GroupLifecycleEventsDesiredStatus:
                  $ref: "#/components/schemas/GroupLifecycleEventsDesiredStatus"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAccountSettingsOutput"
  /update-group:
    post:
      operationId: UpdateGroup
      description: "Updates the description for an existing group. You cannot update the name of a resource group. Minimum permissions To run this command, you must have the following permissions: resource-groups:UpdateGroup"
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                GroupName:
                  $ref: "#/components/schemas/GroupName"
                Group:
                  $ref: "#/components/schemas/GroupStringV2"
                Description:
                  $ref: "#/components/schemas/Description"
                Criticality:
                  $ref: "#/components/schemas/Criticality"
                Owner:
                  $ref: "#/components/schemas/Owner"
                DisplayName:
                  $ref: "#/components/schemas/DisplayName"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGroupOutput"
  /update-group-query:
    post:
      operationId: UpdateGroupQuery
      description: "Updates the resource query of a group. For more information about resource queries, see Create a tag-based group in Resource Groups. Minimum permissions To run this command, you must have the following permissions: resource-groups:UpdateGroupQuery"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GroupName:
                  $ref: "#/components/schemas/GroupName"
                Group:
                  $ref: "#/components/schemas/GroupString"
                ResourceQuery:
                  $ref: "#/components/schemas/ResourceQuery"
              required:
                - ResourceQuery
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGroupQueryOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    TagSyncTaskArn:
      type: string
      minLength: 12
      maxLength: 1600
      pattern: arn:aws(-[a-z]+)*:resource-groups:[a-z]{2}(-[a-z]+)+-\d{1}:[0-9]{12}:group/[a-zA-Z0-9_\.-]{1,150}/[a-z0-9]{26}/tag-sync-task/[a-z0-9]{26}
    CreateGroupName:
      type: string
      minLength: 1
      maxLength: 300
      pattern: "[a-zA-Z0-9_\\.-]+"
    Description:
      type: string
      maxLength: 1024
      pattern: "[\\sa-zA-Z0-9_\\.-]*"
    ResourceQuery:
      description: "The query you can use to define a resource group or a search for resources. A ResourceQuery specifies both a query Type and a Query string as JSON string objects. See the examples section for example JSON strings. For more information about creating a resource group with a resource query, see Build queries and groups in Resource Groups in the Resource Groups User Guide When you combine all of the elements together into a single string, any double quotes that are embedded inside another double quote pair must be escaped by preceding the embedded double quote with a backslash character (\\). For example, a complete ResourceQuery parameter must be formatted like the following CLI parameter example: --resource-query '{\"Type\":\"TAG_FILTERS_1_0\",\"Query\":\"{\\\"ResourceTypeFilters\\\":[\\\"AWS::AllSupported\\\"],\\\"TagFilters\\\":[{\\\"Key\\\":\\\"Stage\\\",\\\"Values\\\":[\\\"Test\\\"]}]}\"}' In the preceding example, all of the double quote characters in the value part of the Query element must be escaped because the value itself is surrounded by double quotes. For more information, see Quoting strings in the Command Line Interface User Guide. For the complete list of resource types that you can use in the array value for ResourceTypeFilters, see Resources you can use with Resource Groups and Tag Editor in the Resource Groups User Guide. For example: \"ResourceTypeFilters\":[\"AWS::S3::Bucket\", \"AWS::EC2::Instance\"]"
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/QueryType"
          description: "The type of the query to perform. This can have one of two values: CLOUDFORMATION_STACK_1_0: Specifies that you want the group to contain the members of an CloudFormation stack. The Query contains a StackIdentifier element with an Amazon resource name (ARN) for a CloudFormation stack. TAG_FILTERS_1_0: Specifies that you want the group to include resource that have tags that match the query."
        Query:
          $ref: "#/components/schemas/Query"
          description: 'The query that defines a group or a search. The contents depends on the value of the Type element. ResourceTypeFilters – Applies to all ResourceQuery objects of either Type. This element contains one of the following two items: The value AWS::AllSupported. This causes the ResourceQuery to match resources of any resource type that also match the query. A list (a JSON array) of resource type identifiers that limit the query to only resources of the specified types. For the complete list of resource types that you can use in the array value for ResourceTypeFilters, see Resources you can use with Resource Groups and Tag Editor in the Resource Groups User Guide. Example: "ResourceTypeFilters": ["AWS::AllSupported"] or "ResourceTypeFilters": ["AWS::EC2::Instance", "AWS::S3::Bucket"] TagFilters – applicable only if Type = TAG_FILTERS_1_0. The Query contains a JSON string that represents a collection of simple tag filters. The JSON string uses a syntax similar to the GetResources operation, but uses only the ResourceTypeFilters and TagFilters fields. If you specify more than one tag key, only resources that match all tag keys, and at least one value of each specified tag key, are returned in your query. If you specify more than one value for a tag key, a resource matches the filter if it has a tag key value that matches any of the specified values. For example, consider the following sample query for resources that have two tags, Stage and Version, with two values each: [{"Stage":["Test","Deploy"]},{"Version":["1","2"]}] The results of this resource query could include the following. An Amazon EC2 instance that has the following two tags: {"Stage":"Deploy"}, and {"Version":"2"} An S3 bucket that has the following two tags: {"Stage":"Test"}, and {"Version":"1"} The resource query results would not include the following items in the results, however. An Amazon EC2 instance that has only the following tag: {"Stage":"Deploy"}. The instance does not have all of the tag keys specified in the filter, so it is excluded from the results. An RDS database that has the following two tags: {"Stage":"Archived"} and {"Version":"4"} The database has all of the tag keys, but none of those keys has an associated value that matches at least one of the specified values in the filter. Example: "TagFilters": [ { "Key": "Stage", "Values": [ "Gamma", "Beta" ] } StackIdentifier – applicable only if Type = CLOUDFORMATION_STACK_1_0. The value of this parameter is the Amazon Resource Name (ARN) of the CloudFormation stack whose resources you want included in the group.'
      required:
        - Type
        - Query
    QueryType:
      type: string
      enum:
        - TAG_FILTERS_1_0
        - CLOUDFORMATION_STACK_1_0
      minLength: 1
      maxLength: 128
      pattern: ^\w+$
    Query:
      type: string
      maxLength: 4096
      pattern: "[\\s\\S]*"
    Tags:
      type: object
      properties: {}
    GroupConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/GroupConfigurationItem"
    GroupConfigurationItem:
      description: An item in a group configuration. A group service configuration can have one or more items. For details about group service configuration syntax, see Service configurations for resource groups.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/GroupConfigurationType"
          description: Specifies the type of group configuration item. Each item must have a unique value for type. For the list of types that you can specify for a configuration item, see Supported resource types and parameters.
        Parameters:
          $ref: "#/components/schemas/GroupParameterList"
          description: A collection of parameters for this group configuration item. For the list of parameters that you can use with each configuration item type, see Supported resource types and parameters.
      required:
        - Type
    GroupConfigurationType:
      type: string
      maxLength: 40
      pattern: AWS::[a-zA-Z0-9]+::[a-zA-Z0-9]+
    GroupParameterList:
      type: array
      items:
        $ref: "#/components/schemas/GroupConfigurationParameter"
    GroupConfigurationParameter:
      description: A parameter for a group configuration item. For details about group service configuration syntax, see Service configurations for resource groups.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/GroupConfigurationParameterName"
          description: The name of the group configuration parameter. For the list of parameters that you can use with each configuration item type, see Supported resource types and parameters.
        Values:
