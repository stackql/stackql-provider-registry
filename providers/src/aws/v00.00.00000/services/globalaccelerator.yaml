  /DenyCustomRoutingTraffic:
    post:
      operationId: DenyCustomRoutingTraffic
      description: "Specify the Amazon EC2 instance (destination) IP addresses and ports for a VPC subnet endpoint that cannot receive traffic for a custom routing accelerator. You can deny traffic to all destinations in the VPC endpoint, or deny traffic to a specified list of destination IP addresses and ports. Note that you cannot specify IP addresses or ports outside of the range that you configured for the endpoint group. After you make changes, you can verify that the updates are complete by checking the status of your accelerator: the status changes from IN_PROGRESS to DEPLOYED."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GlobalAccelerator_V20180706.DenyCustomRoutingTraffic
            default: GlobalAccelerator_V20180706.DenyCustomRoutingTraffic
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EndpointGroupArn:
                  $ref: "#/components/schemas/GenericString"
                  description: The Amazon Resource Name (ARN) of the endpoint group.
                EndpointId:
                  $ref: "#/components/schemas/GenericString"
                  description: An ID for the endpoint. For custom routing accelerators, this is the virtual private cloud (VPC) subnet ID.
                DestinationAddresses:
                  $ref: "#/components/schemas/DestinationAddresses"
                  description: A list of specific Amazon EC2 instance IP addresses (destination addresses) in a subnet that you want to prevent from receiving traffic. The IP addresses must be a subset of the IP addresses allowed for the VPC subnet associated with the endpoint group.
                DestinationPorts:
                  $ref: "#/components/schemas/DestinationPorts"
                  description: A list of specific Amazon EC2 instance ports (destination ports) in a subnet endpoint that you want to prevent from receiving traffic.
                DenyAllTrafficToEndpoint:
                  $ref: "#/components/schemas/GenericBoolean"
                  description: Indicates whether all destination IP addresses and ports for a specified VPC subnet endpoint cannot receive traffic from a custom routing accelerator. The value is TRUE or FALSE. When set to TRUE, no destinations in the custom routing VPC subnet can receive traffic. Note that you cannot specify destination IP addresses and ports when the value is set to TRUE. When set to FALSE (or not specified), you must specify a list of destination IP addresses that cannot receive traffic. A list of ports is optional. If you don't specify a list of ports, the ports that can accept traffic is the same as the ports configured for the endpoint group. The default value is FALSE.
              required:
                - EndpointGroupArn
                - EndpointId
      responses:
        "200":
          description: Success
  /DeprovisionByoipCidr:
    post:
      operationId: DeprovisionByoipCidr
      description: Releases the specified address range that you provisioned to use with your Amazon Web Services resources through bring your own IP addresses (BYOIP) and deletes the corresponding address pool. Before you can release an address range, you must stop advertising it by using WithdrawByoipCidr and you must not have any accelerators that are using static IP addresses allocated from its address range. For more information, see Bring your own IP addresses (BYOIP) in the Global Accelerator Developer Guide.
