      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    CustomRoutingEndpointConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/CustomRoutingEndpointConfiguration"
    CustomRoutingEndpointConfiguration:
      description: The list of endpoint objects. For custom routing, this is a list of virtual private cloud (VPC) subnet IDs.
      type: object
      properties:
        EndpointId:
          $ref: "#/components/schemas/GenericString"
          description: An ID for the endpoint. For custom routing accelerators, this is the virtual private cloud (VPC) subnet ID.
        AttachmentArn:
          $ref: "#/components/schemas/GenericString"
          description: The Amazon Resource Name (ARN) of the cross-account attachment that specifies the endpoints (resources) that can be added to accelerators and principals that have permission to add the endpoints.
    GenericString:
      type: string
      maxLength: 255
    AddCustomRoutingEndpointsResponse:
      type: object
      properties:
        EndpointDescriptions:
          $ref: "#/components/schemas/CustomRoutingEndpointDescriptions"
          description: The endpoint objects added to the custom routing accelerator.
        EndpointGroupArn:
          $ref: "#/components/schemas/GenericString"
          description: The Amazon Resource Name (ARN) of the endpoint group for the custom routing endpoint.
    CustomRoutingEndpointDescriptions:
      type: array
      items:
        $ref: "#/components/schemas/CustomRoutingEndpointDescription"
    CustomRoutingEndpointDescription:
      description: A complex type for an endpoint for a custom routing accelerator. Each endpoint group can include one or more endpoints, which are virtual private cloud (VPC) subnets.
      type: object
      properties:
        EndpointId:
          $ref: "#/components/schemas/GenericString"
          description: An ID for the endpoint. For custom routing accelerators, this is the virtual private cloud (VPC) subnet ID.
    EndpointConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/EndpointConfiguration"
    EndpointConfiguration:
      description: A complex type for endpoints. A resource must be valid and active when you add it as an endpoint.
      type: object
      properties:
        EndpointId:
          $ref: "#/components/schemas/GenericString"
          description: An ID for the endpoint. If the endpoint is a Network Load Balancer or Application Load Balancer, this is the Amazon Resource Name (ARN) of the resource. If the endpoint is an Elastic IP address, this is the Elastic IP address allocation ID. For Amazon EC2 instances, this is the EC2 instance ID. A resource must be valid and active when you add it as an endpoint. For cross-account endpoints, this must be the ARN of the resource.
        Weight:
          $ref: "#/components/schemas/EndpointWeight"
          description: The weight associated with the endpoint. When you add weights to endpoints, you configure Global Accelerator to route traffic based on proportions that you specify. For example, you might specify endpoint weights of 4, 5, 5, and 6 (sum=20). The result is that 4/20 of your traffic, on average, is routed to the first endpoint, 5/20 is routed both to the second and third endpoints, and 6/20 is routed to the last endpoint. For more information, see Endpoint weights in the Global Accelerator Developer Guide.
        ClientIPPreservationEnabled:
          $ref: "#/components/schemas/GenericBoolean"
          description: "Indicates whether client IP address preservation is enabled for an endpoint. The value is true or false. The default value is true for Application Load Balancer endpoints. If the value is set to true, the client's IP address is preserved in the X-Forwarded-For request header as traffic travels to applications on the endpoint fronted by the accelerator. Client IP address preservation is supported, in specific Amazon Web Services Regions, for endpoints that are Application Load Balancers, Amazon EC2 instances, and Network Load Balancers with security groups. IMPORTANT: You cannot use client IP address preservation with Network Load Balancers with TLS listeners. For more information, see Preserve client IP addresses in Global Accelerator in the Global Accelerator Developer Guide."
        AttachmentArn:
          $ref: "#/components/schemas/GenericString"
          description: The Amazon Resource Name (ARN) of the cross-account attachment that specifies the endpoints (resources) that can be added to accelerators and principals that have permission to add the endpoints.
    EndpointWeight:
      type: integer
      minimum: 0
      maximum: 255
    GenericBoolean:
      type: boolean
    AddEndpointsResponse:
      type: object
      properties:
        EndpointDescriptions:
          $ref: "#/components/schemas/EndpointDescriptions"
          description: The list of endpoint objects.
        EndpointGroupArn:
          $ref: "#/components/schemas/GenericString"
          description: The Amazon Resource Name (ARN) of the endpoint group.
    EndpointDescriptions:
      type: array
      items:
        $ref: "#/components/schemas/EndpointDescription"
    EndpointDescription:
      description: A complex type for an endpoint. Each endpoint group can include one or more endpoints, such as load balancers.
      type: object
      properties:
        EndpointId:
          $ref: "#/components/schemas/GenericString"
          description: An ID for the endpoint. If the endpoint is a Network Load Balancer or Application Load Balancer, this is the Amazon Resource Name (ARN) of the resource. If the endpoint is an Elastic IP address, this is the Elastic IP address allocation ID. For Amazon EC2 instances, this is the EC2 instance ID. An Application Load Balancer can be either internal or internet-facing.
        Weight:
          $ref: "#/components/schemas/EndpointWeight"
          description: The weight associated with the endpoint. When you add weights to endpoints, you configure Global Accelerator to route traffic based on proportions that you specify. For example, you might specify endpoint weights of 4, 5, 5, and 6 (sum=20). The result is that 4/20 of your traffic, on average, is routed to the first endpoint, 5/20 is routed both to the second and third endpoints, and 6/20 is routed to the last endpoint. For more information, see Endpoint weights in the Global Accelerator Developer Guide.
        HealthState:
          $ref: "#/components/schemas/HealthState"
          description: The health status of the endpoint.
        HealthReason:
          $ref: "#/components/schemas/GenericString"
          description: Returns a null result.
        ClientIPPreservationEnabled:
          $ref: "#/components/schemas/GenericBoolean"
          description: "Indicates whether client IP address preservation is enabled for an endpoint. The value is true or false. The default value is true for Application Load Balancers endpoints. If the value is set to true, the client's IP address is preserved in the X-Forwarded-For request header as traffic travels to applications on the endpoint fronted by the accelerator. Client IP address preservation is supported, in specific Amazon Web Services Regions, for endpoints that are Application Load Balancers, Amazon EC2 instances, and Network Load Balancers with security groups. IMPORTANT: You cannot use client IP address preservation with Network Load Balancers with TLS listeners. For more information, see Preserve client IP addresses in Global Accelerator in the Global Accelerator Developer Guide."
    HealthState:
      type: string
      enum:
        - INITIAL
        - HEALTHY
        - UNHEALTHY
    AdvertiseByoipCidrResponse:
      type: object
      properties:
        ByoipCidr:
          $ref: "#/components/schemas/ByoipCidr"
          description: Information about the address range.
    ByoipCidr:
      description: Information about an IP address range that is provisioned for use with your Amazon Web Services resources through bring your own IP address (BYOIP). The following describes each BYOIP State that your IP address range can be in. PENDING_PROVISIONING — You’ve submitted a request to provision an IP address range but it is not yet provisioned with Global Accelerator. READY — The address range is provisioned with Global Accelerator and can be advertised. PENDING_ADVERTISING — You’ve submitted a request for Global Accelerator to advertise an address range but it is not yet being advertised. ADVERTISING — The address range is being advertised by Global Accelerator. PENDING_WITHDRAWING — You’ve submitted a request to withdraw an address range from being advertised but it is still being advertised by Global Accelerator. PENDING_DEPROVISIONING — You’ve submitted a request to deprovision an address range from Global Accelerator but it is still provisioned. DEPROVISIONED — The address range is deprovisioned from Global Accelerator. FAILED_PROVISION — The request to provision the address range from Global Accelerator was not successful. Please make sure that you provide all of the correct information, and try again. If the request fails a second time, contact Amazon Web Services support. FAILED_ADVERTISING — The request for Global Accelerator to advertise the address range was not successful. Please make sure that you provide all of the correct information, and try again. If the request fails a second time, contact Amazon Web Services support. FAILED_WITHDRAW — The request to withdraw the address range from advertising by Global Accelerator was not successful. Please make sure that you provide all of the correct information, and try again. If the request fails a second time, contact Amazon Web Services support. FAILED_DEPROVISION — The request to deprovision the address range from Global Accelerator was not successful. Please make sure that you provide all of the correct information, and try again. If the request fails a second time, contact Amazon Web Services support.
      type: object
      properties:
        Cidr:
          $ref: "#/components/schemas/GenericString"
          description: The address range, in CIDR notation. For more information, see Bring your own IP addresses (BYOIP) in the Global Accelerator Developer Guide.
        State:
          $ref: "#/components/schemas/ByoipCidrState"
          description: The state of the address pool.
        Events:
          $ref: "#/components/schemas/ByoipCidrEvents"
          description: A history of status changes for an IP address range that you bring to Global Accelerator through bring your own IP address (BYOIP).
    ByoipCidrState:
      type: string
      enum:
        - PENDING_PROVISIONING
        - READY
        - PENDING_ADVERTISING
        - ADVERTISING
        - PENDING_WITHDRAWING
        - PENDING_DEPROVISIONING
        - DEPROVISIONED
        - FAILED_PROVISION
        - FAILED_ADVERTISING
        - FAILED_WITHDRAW
        - FAILED_DEPROVISION
    ByoipCidrEvents:
      type: array
      items:
        $ref: "#/components/schemas/ByoipCidrEvent"
    ByoipCidrEvent:
      description: A complex type that contains a Message and a Timestamp value for changes that you make in the status of an IP address range that you bring to Global Accelerator through bring your own IP address (BYOIP).
      type: object
      properties:
        Message:
          $ref: "#/components/schemas/GenericString"
          description: A string that contains an Event message describing changes that you make in the status of an IP address range that you bring to Global Accelerator through bring your own IP address (BYOIP).
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp for when you make a status change for an IP address range that you bring to Global Accelerator through bring your own IP address (BYOIP).
    Timestamp:
