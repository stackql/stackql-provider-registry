          description: The port range to support for connections from clients to your accelerator. Separately, you set port ranges for endpoints. For more information, see About endpoints for custom routing accelerators.
    TrafficDialPercentage:
      type: number
      format: float
      minimum: 0
      maximum: 100
    HealthCheckPort:
      type: integer
      minimum: 1
      maximum: 65535
    HealthCheckProtocol:
      type: string
      enum:
        - TCP
        - HTTP
        - HTTPS
    HealthCheckPath:
      type: string
      maxLength: 255
      pattern: ^/[-a-zA-Z0-9@:%_\\+.~#?&/=]*$
    HealthCheckIntervalSeconds:
      type: integer
      minimum: 10
      maximum: 30
    ThresholdCount:
      type: integer
      minimum: 1
      maximum: 10
    PortOverrides:
      type: array
      items:
        $ref: "#/components/schemas/PortOverride"
    PortOverride:
      description: Override specific listener ports used to route traffic to endpoints that are part of an endpoint group. For example, you can create a port override in which the listener receives user traffic on ports 80 and 443, but your accelerator routes that traffic to ports 1080 and 1443, respectively, on the endpoints. For more information, see Overriding listener ports in the Global Accelerator Developer Guide.
      type: object
      properties:
        ListenerPort:
          $ref: "#/components/schemas/PortNumber"
          description: The listener port that you want to map to a specific endpoint port. This is the port that user traffic arrives to the Global Accelerator on.
        EndpointPort:
          $ref: "#/components/schemas/PortNumber"
          description: The endpoint port that you want a listener port to be mapped to. This is the port on the endpoint, such as the Application Load Balancer or Amazon EC2 instance.
    CreateEndpointGroupResponse:
      type: object
      properties:
        EndpointGroup:
          $ref: "#/components/schemas/EndpointGroup"
          description: The information about the endpoint group that was created.
    EndpointGroup:
      description: A complex type for the endpoint group. An Amazon Web Services Region can have only one endpoint group for a specific listener.
      type: object
      properties:
        EndpointGroupArn:
          $ref: "#/components/schemas/GenericString"
          description: The Amazon Resource Name (ARN) of the endpoint group.
        EndpointGroupRegion:
          $ref: "#/components/schemas/GenericString"
          description: The Amazon Web Services Region where the endpoint group is located.
        EndpointDescriptions:
          $ref: "#/components/schemas/EndpointDescriptions"
          description: The list of endpoint objects.
        TrafficDialPercentage:
          $ref: "#/components/schemas/TrafficDialPercentage"
          description: The percentage of traffic to send to an Amazon Web Services Region. Additional traffic is distributed to other endpoint groups for this listener. Use this action to increase (dial up) or decrease (dial down) traffic to a specific Region. The percentage is applied to the traffic that would otherwise have been routed to the Region based on optimal routing. The default value is 100.
        HealthCheckPort:
          $ref: "#/components/schemas/HealthCheckPort"
          description: The port that Global Accelerator uses to perform health checks on endpoints that are part of this endpoint group. The default port is the port for the listener that this endpoint group is associated with. If the listener port is a list, Global Accelerator uses the first specified port in the list of ports.
        HealthCheckProtocol:
          $ref: "#/components/schemas/HealthCheckProtocol"
          description: The protocol that Global Accelerator uses to perform health checks on endpoints that are part of this endpoint group. The default value is TCP.
        HealthCheckPath:
          $ref: "#/components/schemas/HealthCheckPath"
          description: If the protocol is HTTP/S, then this value provides the ping path that Global Accelerator uses for the destination on the endpoints for health checks. The default is slash (/).
        HealthCheckIntervalSeconds:
          $ref: "#/components/schemas/HealthCheckIntervalSeconds"
          description: The time—10 seconds or 30 seconds—between health checks for each endpoint. The default value is 30.
        ThresholdCount:
          $ref: "#/components/schemas/ThresholdCount"
          description: The number of consecutive health checks required to set the state of a healthy endpoint to unhealthy, or to set an unhealthy endpoint to healthy. The default value is 3.
        PortOverrides:
          $ref: "#/components/schemas/PortOverrides"
          description: Allows you to override the destination ports used to route traffic to an endpoint. Using a port override lets you map a list of external destination ports (that your users send traffic to) to a list of internal destination ports that you want an application endpoint to receive traffic on.
    ClientAffinity:
      type: string
      enum:
        - NONE
        - SOURCE_IP
    CreateListenerResponse:
      type: object
      properties:
        Listener:
          $ref: "#/components/schemas/Listener"
          description: The listener that you've created.
    Listener:
      description: A complex type for a listener.
      type: object
      properties:
        ListenerArn:
          $ref: "#/components/schemas/GenericString"
          description: The Amazon Resource Name (ARN) of the listener.
        PortRanges:
          $ref: "#/components/schemas/PortRanges"
          description: The list of port ranges for the connections from clients to the accelerator.
        Protocol:
          $ref: "#/components/schemas/Protocol"
          description: The protocol for the connections from clients to the accelerator.
        ClientAffinity:
          $ref: "#/components/schemas/ClientAffinity"
          description: Client affinity lets you direct all requests from a user to the same endpoint, if you have stateful applications, regardless of the port and protocol of the client request. Client affinity gives you control over whether to always route each client to the same specific endpoint. Global Accelerator uses a consistent-flow hashing algorithm to choose the optimal endpoint for a connection. If client affinity is NONE, Global Accelerator uses the "five-tuple" (5-tuple) properties—source IP address, source port, destination IP address, destination port, and protocol—to select the hash value, and then chooses the best endpoint. However, with this setting, if someone uses different ports to connect to Global Accelerator, their connections might not be always routed to the same endpoint because the hash value changes. If you want a given client to always be routed to the same endpoint, set client affinity to SOURCE_IP instead. When you use the SOURCE_IP setting, Global Accelerator uses the "two-tuple" (2-tuple) properties— source (client) IP address and destination IP address—to select the hash value. The default value is NONE.
    DeprovisionByoipCidrResponse:
      type: object
      properties:
        ByoipCidr:
          $ref: "#/components/schemas/ByoipCidr"
          description: Information about the address range.
    DescribeAcceleratorResponse:
