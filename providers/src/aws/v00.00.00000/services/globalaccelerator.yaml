          $ref: "#/components/schemas/AcceleratorAttributes"
          description: The attributes of the accelerator.
    AcceleratorAttributes:
      description: Attributes of an accelerator.
      type: object
      properties:
        FlowLogsEnabled:
          $ref: "#/components/schemas/GenericBoolean"
          description: Indicates whether flow logs are enabled. The default value is false. If the value is true, FlowLogsS3Bucket and FlowLogsS3Prefix must be specified. For more information, see Flow logs in the Global Accelerator Developer Guide.
        FlowLogsS3Bucket:
          $ref: "#/components/schemas/GenericString"
          description: The name of the Amazon S3 bucket for the flow logs. Attribute is required if FlowLogsEnabled is true. The bucket must exist and have a bucket policy that grants Global Accelerator permission to write to the bucket.
        FlowLogsS3Prefix:
          $ref: "#/components/schemas/GenericString"
          description: "The prefix for the location in the Amazon S3 bucket for the flow logs. Attribute is required if FlowLogsEnabled is true. If you specify slash (/) for the S3 bucket prefix, the log file bucket folder structure will include a double slash (//), like the following: s3-bucket_name//AWSLogs/aws_account_id"
    DescribeCrossAccountAttachmentResponse:
      type: object
