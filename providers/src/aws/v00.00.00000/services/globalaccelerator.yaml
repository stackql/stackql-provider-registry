openapi: 3.0.0
info:
  version: "2018-08-08"
  title: AWS Global Accelerator
  description: AWS Global Accelerator
  x-serviceName: globalaccelerator
  x-serviceAlias: globalaccelerator
  x-protocol: json
  x-apiVersion: "2018-08-08"
  x-endpointPrefix: globalaccelerator
  x-targetPrefix: GlobalAccelerator_V20180706
  x-jsonVersion: "1.1"
servers:
  - url: https://globalaccelerator.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for globalaccelerator
paths:
  /AddCustomRoutingEndpoints:
    post:
      operationId: AddCustomRoutingEndpoints
      description: "Associate a virtual private cloud (VPC) subnet endpoint with your custom routing accelerator. The listener port range must be large enough to support the number of IP addresses that can be specified in your subnet. The number of ports required is: subnet size times the number of ports per destination EC2 instances. For example, a subnet defined as /24 requires a listener port range of at least 255 ports. Note: You must have enough remaining listener ports available to map to the subnet ports, or the call will fail with a LimitExceededException. By default, all destinations in a subnet in a custom routing accelerator cannot receive traffic. To enable all destinations to receive traffic, or to specify individual port mappings that can receive traffic, see the AllowCustomRoutingTraffic operation."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GlobalAccelerator_V20180706.AddCustomRoutingEndpoints
            default: GlobalAccelerator_V20180706.AddCustomRoutingEndpoints
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EndpointConfigurations:
                  $ref: "#/components/schemas/CustomRoutingEndpointConfigurations"
                  description: The list of endpoint objects to add to a custom routing accelerator.
                EndpointGroupArn:
                  $ref: "#/components/schemas/GenericString"
                  description: The Amazon Resource Name (ARN) of the endpoint group for the custom routing endpoint.
              required:
                - EndpointConfigurations
                - EndpointGroupArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddCustomRoutingEndpointsResponse"
  /AddEndpoints:
    post:
      operationId: AddEndpoints
      description: "Add endpoints to an endpoint group. The AddEndpoints API operation is the recommended option for adding endpoints. The alternative options are to add endpoints when you create an endpoint group (with the CreateEndpointGroup API) or when you update an endpoint group (with the UpdateEndpointGroup API). There are two advantages to using AddEndpoints to add endpoints in Global Accelerator: It's faster, because Global Accelerator only has to resolve the new endpoints that you're adding, rather than resolving new and existing endpoints. It's more convenient, because you don't need to specify the current endpoints that are already in the endpoint group, in addition to the new endpoints that you want to add. For information about endpoint types and requirements for endpoints that you can add to Global Accelerator, see Endpoints for standard accelerators in the Global Accelerator Developer Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GlobalAccelerator_V20180706.AddEndpoints
            default: GlobalAccelerator_V20180706.AddEndpoints
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EndpointConfigurations:
                  $ref: "#/components/schemas/EndpointConfigurations"
                  description: The list of endpoint objects.
                EndpointGroupArn:
                  $ref: "#/components/schemas/GenericString"
                  description: The Amazon Resource Name (ARN) of the endpoint group.
              required:
                - EndpointConfigurations
                - EndpointGroupArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddEndpointsResponse"
  /AdvertiseByoipCidr:
    post:
      operationId: AdvertiseByoipCidr
      description: Advertises an IPv4 address range that is provisioned for use with your Amazon Web Services resources through bring your own IP addresses (BYOIP). It can take a few minutes before traffic to the specified addresses starts routing to Amazon Web Services because of propagation delays. To stop advertising the BYOIP address range, use WithdrawByoipCidr. For more information, see Bring your own IP addresses (BYOIP) in the Global Accelerator Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GlobalAccelerator_V20180706.AdvertiseByoipCidr
            default: GlobalAccelerator_V20180706.AdvertiseByoipCidr
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Cidr:
                  $ref: "#/components/schemas/GenericString"
                  description: The address range, in CIDR notation. This must be the exact range that you provisioned. You can't advertise only a portion of the provisioned range. For more information, see Bring your own IP addresses (BYOIP) in the Global Accelerator Developer Guide.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvertiseByoipCidrResponse"
  /AllowCustomRoutingTraffic:
    post:
      operationId: AllowCustomRoutingTraffic
      description: "Specify the Amazon EC2 instance (destination) IP addresses and ports for a VPC subnet endpoint that can receive traffic for a custom routing accelerator. You can allow traffic to all destinations in the subnet endpoint, or allow traffic to a specified list of destination IP addresses and ports in the subnet. Note that you cannot specify IP addresses or ports outside of the range that you configured for the endpoint group. After you make changes, you can verify that the updates are complete by checking the status of your accelerator: the status changes from IN_PROGRESS to DEPLOYED."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GlobalAccelerator_V20180706.AllowCustomRoutingTraffic
            default: GlobalAccelerator_V20180706.AllowCustomRoutingTraffic
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EndpointGroupArn:
                  $ref: "#/components/schemas/GenericString"
                  description: The Amazon Resource Name (ARN) of the endpoint group.
                EndpointId:
                  $ref: "#/components/schemas/GenericString"
                  description: An ID for the endpoint. For custom routing accelerators, this is the virtual private cloud (VPC) subnet ID.
                DestinationAddresses:
                  $ref: "#/components/schemas/DestinationAddresses"
                  description: A list of specific Amazon EC2 instance IP addresses (destination addresses) in a subnet that you want to allow to receive traffic. The IP addresses must be a subset of the IP addresses that you specified for the endpoint group. DestinationAddresses is required if AllowAllTrafficToEndpoint is FALSE or is not specified.
                DestinationPorts:
                  $ref: "#/components/schemas/DestinationPorts"
                  description: A list of specific Amazon EC2 instance ports (destination ports) that you want to allow to receive traffic.
                AllowAllTrafficToEndpoint:
                  $ref: "#/components/schemas/GenericBoolean"
                  description: Indicates whether all destination IP addresses and ports for a specified VPC subnet endpoint can receive traffic from a custom routing accelerator. The value is TRUE or FALSE. When set to TRUE, all destinations in the custom routing VPC subnet can receive traffic. Note that you cannot specify destination IP addresses and ports when the value is set to TRUE. When set to FALSE (or not specified), you must specify a list of destination IP addresses that are allowed to receive traffic. A list of ports is optional. If you don't specify a list of ports, the ports that can accept traffic is the same as the ports configured for the endpoint group. The default value is FALSE.
              required:
                - EndpointGroupArn
                - EndpointId
      responses:
        "200":
          description: Success
  /CreateAccelerator:
    post:
      operationId: CreateAccelerator
      description: Create an accelerator. An accelerator includes one or more listeners that process inbound connections and direct traffic to one or more endpoint groups, each of which includes endpoints, such as Network Load Balancers. Global Accelerator is a global service that supports endpoints in multiple Amazon Web Services Regions but you must specify the US West (Oregon) Region to create, update, or otherwise work with accelerators. That is, for example, specify --region us-west-2 on Amazon Web Services CLI commands.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GlobalAccelerator_V20180706.CreateAccelerator
            default: GlobalAccelerator_V20180706.CreateAccelerator
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/GenericString"
                  description: The name of the accelerator. The name can have a maximum of 64 characters, must contain only alphanumeric characters, periods (.), or hyphens (-), and must not begin or end with a hyphen or period.
                IpAddressType:
                  $ref: "#/components/schemas/IpAddressType"
                  description: The IP address type that an accelerator supports. For a standard accelerator, the value can be IPV4 or DUAL_STACK.
                IpAddresses:
                  $ref: "#/components/schemas/IpAddresses"
                  description: Optionally, if you've added your own IP address pool to Global Accelerator (BYOIP), you can choose an IPv4 address from your own pool to use for the accelerator's static IPv4 address when you create an accelerator. After you bring an address range to Amazon Web Services, it appears in your account as an address pool. When you create an accelerator, you can assign one IPv4 address from your range to it. Global Accelerator assigns you a second static IPv4 address from an Amazon IP address range. If you bring two IPv4 address ranges to Amazon Web Services, you can assign one IPv4 address from each range to your accelerator. This restriction is because Global Accelerator assigns each address range to a different network zone, for high availability. You can specify one or two addresses, separated by a space. Do not include the /32 suffix. Note that you can't update IP addresses for an existing accelerator. To change them, you must create a new accelerator with the new addresses. For more information, see Bring your own IP addresses (BYOIP) in the Global Accelerator Developer Guide.
                Enabled:
                  $ref: "#/components/schemas/GenericBoolean"
                  description: Indicates whether an accelerator is enabled. The value is true or false. The default value is true. If the value is set to true, an accelerator cannot be deleted. If set to false, the accelerator can be deleted.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency—that is, the uniqueness—of an accelerator.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: Create tags for an accelerator. For more information, see Tagging in Global Accelerator in the Global Accelerator Developer Guide.
              required:
                - IdempotencyToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAcceleratorResponse"
  /CreateCrossAccountAttachment:
    post:
      operationId: CreateCrossAccountAttachment
      description: 'Create a cross-account attachment in Global Accelerator. You create a cross-account attachment to specify the principals who have permission to work with resources in accelerators in their own account. You specify, in the same attachment, the resources that are shared. A principal can be an Amazon Web Services account number or the Amazon Resource Name (ARN) for an accelerator. For account numbers that are listed as principals, to work with a resource listed in the attachment, you must sign in to an account specified as a principal. Then, you can work with resources that are listed, with any of your accelerators. If an accelerator ARN is listed in the cross-account attachment as a principal, anyone with permission to make updates to the accelerator can work with resources that are listed in the attachment. Specify each principal and resource separately. To specify two CIDR address pools, list them individually under Resources, and so on. For a command line operation, for example, you might use a statement like the following: "Resources": [{"Cidr": "169.254.60.0/24"},{"Cidr": "169.254.59.0/24"}] For more information, see Working with cross-account attachments and resources in Global Accelerator in the Global Accelerator Developer Guide.'
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GlobalAccelerator_V20180706.CreateCrossAccountAttachment
            default: GlobalAccelerator_V20180706.CreateCrossAccountAttachment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/AttachmentName"
                  description: The name of the cross-account attachment.
                Principals:
                  $ref: "#/components/schemas/Principals"
                  description: The principals to include in the cross-account attachment. A principal can be an Amazon Web Services account number or the Amazon Resource Name (ARN) for an accelerator.
                Resources:
                  $ref: "#/components/schemas/Resources"
                  description: The Amazon Resource Names (ARNs) for the resources to include in the cross-account attachment. A resource can be any supported Amazon Web Services resource type for Global Accelerator or a CIDR range for a bring your own IP address (BYOIP) address pool.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency—that is, the uniqueness—of the request.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: Add tags for a cross-account attachment. For more information, see Tagging in Global Accelerator in the Global Accelerator Developer Guide.
              required:
                - IdempotencyToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCrossAccountAttachmentResponse"
  /CreateCustomRoutingAccelerator:
    post:
      operationId: CreateCustomRoutingAccelerator
      description: Create a custom routing accelerator. A custom routing accelerator directs traffic to one of possibly thousands of Amazon EC2 instance destinations running in a single or multiple virtual private clouds (VPC) subnet endpoints. Be aware that, by default, all destination EC2 instances in a VPC subnet endpoint cannot receive traffic. To enable all destinations to receive traffic, or to specify individual port mappings that can receive traffic, see the AllowCustomRoutingTraffic operation. Global Accelerator is a global service that supports endpoints in multiple Amazon Web Services Regions but you must specify the US West (Oregon) Region to create, update, or otherwise work with accelerators. That is, for example, specify --region us-west-2 on Amazon Web Services CLI commands.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GlobalAccelerator_V20180706.CreateCustomRoutingAccelerator
            default: GlobalAccelerator_V20180706.CreateCustomRoutingAccelerator
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/GenericString"
                  description: The name of a custom routing accelerator. The name can have a maximum of 64 characters, must contain only alphanumeric characters or hyphens (-), and must not begin or end with a hyphen.
                IpAddressType:
                  $ref: "#/components/schemas/IpAddressType"
                  description: The IP address type that an accelerator supports. For a custom routing accelerator, the value must be IPV4.
                IpAddresses:
                  $ref: "#/components/schemas/IpAddresses"
                  description: Optionally, if you've added your own IP address pool to Global Accelerator (BYOIP), you can choose an IPv4 address from your own pool to use for the accelerator's static IPv4 address when you create an accelerator. After you bring an address range to Amazon Web Services, it appears in your account as an address pool. When you create an accelerator, you can assign one IPv4 address from your range to it. Global Accelerator assigns you a second static IPv4 address from an Amazon IP address range. If you bring two IPv4 address ranges to Amazon Web Services, you can assign one IPv4 address from each range to your accelerator. This restriction is because Global Accelerator assigns each address range to a different network zone, for high availability. You can specify one or two addresses, separated by a space. Do not include the /32 suffix. Note that you can't update IP addresses for an existing accelerator. To change them, you must create a new accelerator with the new addresses. For more information, see Bring your own IP addresses (BYOIP) in the Global Accelerator Developer Guide.
                Enabled:
                  $ref: "#/components/schemas/GenericBoolean"
                  description: Indicates whether an accelerator is enabled. The value is true or false. The default value is true. If the value is set to true, an accelerator cannot be deleted. If set to false, the accelerator can be deleted.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency—that is, the uniqueness—of the request.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: Create tags for an accelerator. For more information, see Tagging in Global Accelerator in the Global Accelerator Developer Guide.
              required:
                - IdempotencyToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCustomRoutingAcceleratorResponse"
  /CreateCustomRoutingEndpointGroup:
    post:
      operationId: CreateCustomRoutingEndpointGroup
      description: Create an endpoint group for the specified listener for a custom routing accelerator. An endpoint group is a collection of endpoints in one Amazon Web Services Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GlobalAccelerator_V20180706.CreateCustomRoutingEndpointGroup
            default: GlobalAccelerator_V20180706.CreateCustomRoutingEndpointGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ListenerArn:
                  $ref: "#/components/schemas/GenericString"
                  description: The Amazon Resource Name (ARN) of the listener for a custom routing endpoint.
                EndpointGroupRegion:
                  $ref: "#/components/schemas/GenericString"
                  description: The Amazon Web Services Region where the endpoint group is located. A listener can have only one endpoint group in a specific Region.
                DestinationConfigurations:
                  $ref: "#/components/schemas/CustomRoutingDestinationConfigurations"
                  description: Sets the port range and protocol for all endpoints (virtual private cloud subnets) in a custom routing endpoint group to accept client traffic on.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency—that is, the uniqueness—of the request.
              required:
                - ListenerArn
                - EndpointGroupRegion
                - DestinationConfigurations
                - IdempotencyToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCustomRoutingEndpointGroupResponse"
  /CreateCustomRoutingListener:
    post:
      operationId: CreateCustomRoutingListener
      description: Create a listener to process inbound connections from clients to a custom routing accelerator. Connections arrive to assigned static IP addresses on the port range that you specify.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GlobalAccelerator_V20180706.CreateCustomRoutingListener
            default: GlobalAccelerator_V20180706.CreateCustomRoutingListener
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AcceleratorArn:
                  $ref: "#/components/schemas/GenericString"
                  description: The Amazon Resource Name (ARN) of the accelerator for a custom routing listener.
                PortRanges:
                  $ref: "#/components/schemas/PortRanges"
                  description: The port range to support for connections from clients to your accelerator. Separately, you set port ranges for endpoints. For more information, see About endpoints for custom routing accelerators.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency—that is, the uniqueness—of the request.
              required:
                - AcceleratorArn
                - PortRanges
                - IdempotencyToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCustomRoutingListenerResponse"
  /CreateEndpointGroup:
    post:
      operationId: CreateEndpointGroup
      description: Create an endpoint group for the specified listener. An endpoint group is a collection of endpoints in one Amazon Web Services Region. A resource must be valid and active when you add it as an endpoint. For more information about endpoint types and requirements for endpoints that you can add to Global Accelerator, see Endpoints for standard accelerators in the Global Accelerator Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GlobalAccelerator_V20180706.CreateEndpointGroup
            default: GlobalAccelerator_V20180706.CreateEndpointGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ListenerArn:
                  $ref: "#/components/schemas/GenericString"
                  description: The Amazon Resource Name (ARN) of the listener.
                EndpointGroupRegion:
                  $ref: "#/components/schemas/GenericString"
                  description: The Amazon Web Services Region where the endpoint group is located. A listener can have only one endpoint group in a specific Region.
                EndpointConfigurations:
                  $ref: "#/components/schemas/EndpointConfigurations"
                  description: The list of endpoint objects.
                TrafficDialPercentage:
                  $ref: "#/components/schemas/TrafficDialPercentage"
                  description: The percentage of traffic to send to an Amazon Web Services Region. Additional traffic is distributed to other endpoint groups for this listener. Use this action to increase (dial up) or decrease (dial down) traffic to a specific Region. The percentage is applied to the traffic that would otherwise have been routed to the Region based on optimal routing. The default value is 100.
                HealthCheckPort:
                  $ref: "#/components/schemas/HealthCheckPort"
                  description: The port that Global Accelerator uses to check the health of endpoints that are part of this endpoint group. The default port is the listener port that this endpoint group is associated with. If listener port is a list of ports, Global Accelerator uses the first port in the list.
                HealthCheckProtocol:
                  $ref: "#/components/schemas/HealthCheckProtocol"
                  description: The protocol that Global Accelerator uses to check the health of endpoints that are part of this endpoint group. The default value is TCP.
                HealthCheckPath:
                  $ref: "#/components/schemas/HealthCheckPath"
                  description: If the protocol is HTTP/S, then this specifies the path that is the destination for health check targets. The default value is slash (/).
                HealthCheckIntervalSeconds:
                  $ref: "#/components/schemas/HealthCheckIntervalSeconds"
                  description: The time—10 seconds or 30 seconds—between each health check for an endpoint. The default value is 30.
                ThresholdCount:
                  $ref: "#/components/schemas/ThresholdCount"
                  description: The number of consecutive health checks required to set the state of a healthy endpoint to unhealthy, or to set an unhealthy endpoint to healthy. The default value is 3.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency—that is, the uniqueness—of the request.
                PortOverrides:
                  $ref: "#/components/schemas/PortOverrides"
                  description: Override specific listener ports used to route traffic to endpoints that are part of this endpoint group. For example, you can create a port override in which the listener receives user traffic on ports 80 and 443, but your accelerator routes that traffic to ports 1080 and 1443, respectively, on the endpoints. For more information, see Overriding listener ports in the Global Accelerator Developer Guide.
              required:
                - ListenerArn
                - EndpointGroupRegion
                - IdempotencyToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEndpointGroupResponse"
  /CreateListener:
    post:
      operationId: CreateListener
      description: Create a listener to process inbound connections from clients to an accelerator. Connections arrive to assigned static IP addresses on a port, port range, or list of port ranges that you specify.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GlobalAccelerator_V20180706.CreateListener
            default: GlobalAccelerator_V20180706.CreateListener
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AcceleratorArn:
                  $ref: "#/components/schemas/GenericString"
                  description: The Amazon Resource Name (ARN) of your accelerator.
                PortRanges:
                  $ref: "#/components/schemas/PortRanges"
                  description: The list of port ranges to support for connections from clients to your accelerator.
                Protocol:
                  $ref: "#/components/schemas/Protocol"
                  description: The protocol for connections from clients to your accelerator.
                ClientAffinity:
                  $ref: "#/components/schemas/ClientAffinity"
                  description: Client affinity lets you direct all requests from a user to the same endpoint, if you have stateful applications, regardless of the port and protocol of the client request. Client affinity gives you control over whether to always route each client to the same specific endpoint. Global Accelerator uses a consistent-flow hashing algorithm to choose the optimal endpoint for a connection. If client affinity is NONE, Global Accelerator uses the "five-tuple" (5-tuple) properties—source IP address, source port, destination IP address, destination port, and protocol—to select the hash value, and then chooses the best endpoint. However, with this setting, if someone uses different ports to connect to Global Accelerator, their connections might not be always routed to the same endpoint because the hash value changes. If you want a given client to always be routed to the same endpoint, set client affinity to SOURCE_IP instead. When you use the SOURCE_IP setting, Global Accelerator uses the "two-tuple" (2-tuple) properties— source (client) IP address and destination IP address—to select the hash value. The default value is NONE.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency—that is, the uniqueness—of the request.
              required:
                - AcceleratorArn
                - PortRanges
                - IdempotencyToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateListenerResponse"
  /DeleteAccelerator:
    post:
      operationId: DeleteAccelerator
      description: Delete an accelerator. Before you can delete an accelerator, you must disable it and remove all dependent resources (listeners and endpoint groups). To disable the accelerator, update the accelerator to set Enabled to false. When you create an accelerator, by default, Global Accelerator provides you with a set of two static IP addresses. Alternatively, you can bring your own IP address ranges to Global Accelerator and assign IP addresses from those ranges. The IP addresses are assigned to your accelerator for as long as it exists, even if you disable the accelerator and it no longer accepts or routes traffic. However, when you delete an accelerator, you lose the static IP addresses that are assigned to the accelerator, so you can no longer route traffic by using them. As a best practice, ensure that you have permissions in place to avoid inadvertently deleting accelerators. You can use IAM policies with Global Accelerator to limit the users who have permissions to delete an accelerator. For more information, see Identity and access management in the Global Accelerator Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GlobalAccelerator_V20180706.DeleteAccelerator
            default: GlobalAccelerator_V20180706.DeleteAccelerator
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AcceleratorArn:
                  $ref: "#/components/schemas/GenericString"
                  description: The Amazon Resource Name (ARN) of an accelerator.
              required:
                - AcceleratorArn
      responses:
        "200":
          description: Success
