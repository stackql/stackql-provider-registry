openapi: 3.0.0
info:
  version: "2017-10-12"
  title: AWS Elemental MediaPackage
  description: AWS Elemental MediaPackage
  x-serviceName: mediapackage
  x-serviceAlias: mediapackage
  x-protocol: rest-json
  x-apiVersion: "2017-10-12"
  x-endpointPrefix: mediapackage
  x-jsonVersion: "1.1"
servers:
  - url: https://mediapackage.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for mediapackage
paths:
  /channels/{id}/configure_logs:
    put:
      operationId: ConfigureLogs
      description: Changes the Channel's properities to configure log subscription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the channel to log subscription.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                EgressAccessLogs:
                  $ref: "#/components/schemas/EgressAccessLogs"
                IngressAccessLogs:
                  $ref: "#/components/schemas/IngressAccessLogs"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigureLogsResponse"
  /channels:
    post:
      operationId: CreateChannel
      description: Creates a new Channel.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/__string"
                Id:
                  $ref: "#/components/schemas/__string"
                Tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelResponse"
    get:
      operationId: ListChannels
      description: Returns a collection of Channels.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Upper bound on number of records to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A token used to resume pagination from the end of a previous request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChannelsResponse"
  /harvest_jobs:
    post:
      operationId: CreateHarvestJob
      description: Creates a new HarvestJob record.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                EndTime:
                  $ref: "#/components/schemas/__string"
                Id:
                  $ref: "#/components/schemas/__string"
                OriginEndpointId:
                  $ref: "#/components/schemas/__string"
                S3Destination:
                  $ref: "#/components/schemas/S3Destination"
                StartTime:
                  $ref: "#/components/schemas/__string"
              required:
                - EndTime
                - OriginEndpointId
                - S3Destination
                - StartTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateHarvestJobResponse"
    get:
      operationId: ListHarvestJobs
      description: Returns a collection of HarvestJob records.
      parameters:
        - name: includeChannelId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: When specified, the request will return only HarvestJobs associated with the given Channel ID.
        - name: includeStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: When specified, the request will return only HarvestJobs in the given status.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The upper bound on the number of records to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A token used to resume pagination from the end of a previous request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListHarvestJobsResponse"
  /origin_endpoints:
    post:
      operationId: CreateOriginEndpoint
      description: Creates a new OriginEndpoint record.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Authorization:
                  $ref: "#/components/schemas/Authorization"
                ChannelId:
                  $ref: "#/components/schemas/__string"
                CmafPackage:
                  $ref: "#/components/schemas/CmafPackageCreateOrUpdateParameters"
                DashPackage:
                  $ref: "#/components/schemas/DashPackage"
                Description:
                  $ref: "#/components/schemas/__string"
                HlsPackage:
                  $ref: "#/components/schemas/HlsPackage"
                Id:
                  $ref: "#/components/schemas/__string"
                ManifestName:
                  $ref: "#/components/schemas/__string"
                MssPackage:
                  $ref: "#/components/schemas/MssPackage"
                Origination:
                  $ref: "#/components/schemas/Origination"
                StartoverWindowSeconds:
                  $ref: "#/components/schemas/__integer"
                Tags:
                  $ref: "#/components/schemas/Tags"
                TimeDelaySeconds:
                  $ref: "#/components/schemas/__integer"
                Whitelist:
                  $ref: "#/components/schemas/__listOf__string"
              required:
                - ChannelId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOriginEndpointResponse"
    get:
      operationId: ListOriginEndpoints
      description: Returns a collection of OriginEndpoint records.
      parameters:
        - name: channelId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: When specified, the request will return only OriginEndpoints associated with the given Channel ID.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The upper bound on the number of records to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A token used to resume pagination from the end of a previous request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOriginEndpointsResponse"
  /channels/{id}:
    delete:
      operationId: DeleteChannel
      description: Deletes an existing Channel.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the Channel to delete.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteChannelResponse"
    get:
      operationId: DescribeChannel
      description: Gets details about a Channel.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of a Channel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeChannelResponse"
    put:
      operationId: UpdateChannel
      description: Updates an existing Channel.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the Channel to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateChannelResponse"
  /origin_endpoints/{id}:
    delete:
      operationId: DeleteOriginEndpoint
      description: Deletes an existing OriginEndpoint.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the OriginEndpoint to delete.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteOriginEndpointResponse"
    get:
      operationId: DescribeOriginEndpoint
      description: Gets details about an existing OriginEndpoint.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the OriginEndpoint.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeOriginEndpointResponse"
    put:
      operationId: UpdateOriginEndpoint
      description: Updates an existing OriginEndpoint.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the OriginEndpoint to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Authorization:
                  $ref: "#/components/schemas/Authorization"
                CmafPackage:
                  $ref: "#/components/schemas/CmafPackageCreateOrUpdateParameters"
                DashPackage:
                  $ref: "#/components/schemas/DashPackage"
                Description:
                  $ref: "#/components/schemas/__string"
                HlsPackage:
                  $ref: "#/components/schemas/HlsPackage"
                ManifestName:
                  $ref: "#/components/schemas/__string"
                MssPackage:
                  $ref: "#/components/schemas/MssPackage"
                Origination:
                  $ref: "#/components/schemas/Origination"
                StartoverWindowSeconds:
                  $ref: "#/components/schemas/__integer"
                TimeDelaySeconds:
                  $ref: "#/components/schemas/__integer"
                Whitelist:
                  $ref: "#/components/schemas/__listOf__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateOriginEndpointResponse"
  /harvest_jobs/{id}:
    get:
      operationId: DescribeHarvestJob
      description: Gets details about an existing HarvestJob.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the HarvestJob.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeHarvestJobResponse"
  /tags/{resource-arn}:
    get:
      operationId: ListTagsForResource
      parameters:
        - name: resource-arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      parameters:
        - name: resource-arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
      responses:
        "204":
          description: Success
    delete:
      operationId: UntagResource
      parameters:
        - name: resource-arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/__listOf__string"
          description: The key(s) of tag to be deleted
      responses:
        "204":
          description: Success
  /channels/{id}/credentials:
    put:
      operationId: RotateChannelCredentials
      description: Changes the Channel's first IngestEndpoint's username and password. WARNING - This API is deprecated. Please use RotateIngestEndpointCredentials instead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the channel to update.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateChannelCredentialsResponse"
  /channels/{id}/ingest_endpoints/{ingest_endpoint_id}/credentials:
    put:
      operationId: RotateIngestEndpointCredentials
      description: Rotate the IngestEndpoint's username and password, as specified by the IngestEndpoint's id.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the channel the IngestEndpoint is on.
        - name: ingest_endpoint_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The id of the IngestEndpoint whose credentials should be rotated
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateIngestEndpointCredentialsResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    __string:
      type: string
    EgressAccessLogs:
      description: Configure egress access logging.
      type: object
      properties:
        LogGroupName:
          $ref: "#/components/schemas/__string"
          description: Customize the log group name.
    IngressAccessLogs:
      description: Configure ingress access logging.
      type: object
      properties:
        LogGroupName:
          $ref: "#/components/schemas/__string"
          description: Customize the log group name.
    ConfigureLogsResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) assigned to the Channel.
        CreatedAt:
          $ref: "#/components/schemas/__string"
          description: The date and time the Channel was created.
        Description:
          $ref: "#/components/schemas/__string"
          description: A short text description of the Channel.
        EgressAccessLogs:
          $ref: "#/components/schemas/EgressAccessLogs"
        HlsIngest:
          $ref: "#/components/schemas/HlsIngest"
        Id:
          $ref: "#/components/schemas/__string"
          description: The ID of the Channel.
        IngressAccessLogs:
          $ref: "#/components/schemas/IngressAccessLogs"
        Tags:
          type: object
          properties: {}
    HlsIngest:
      description: An HTTP Live Streaming (HLS) ingest resource configuration.
      type: object
      properties:
        IngestEndpoints:
          $ref: "#/components/schemas/__listOfIngestEndpoint"
          description: A list of endpoints to which the source stream should be sent.
    __listOfIngestEndpoint:
      type: array
      items:
        $ref: "#/components/schemas/IngestEndpoint"
    IngestEndpoint:
      description: An endpoint for ingesting source content for a Channel.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/__string"
          description: The system generated unique identifier for the IngestEndpoint
        Password:
          $ref: "#/components/schemas/SensitiveString"
          description: The system generated password for ingest authentication.
        Url:
          $ref: "#/components/schemas/__string"
          description: The ingest URL to which the source stream should be sent.
        Username:
          $ref: "#/components/schemas/SensitiveString"
          description: The system generated username for ingest authentication.
    SensitiveString:
      type: string
    Tags:
      description: A collection of tags associated with a resource
      type: object
      properties: {}
    CreateChannelResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) assigned to the Channel.
        CreatedAt:
          $ref: "#/components/schemas/__string"
          description: The date and time the Channel was created.
        Description:
          $ref: "#/components/schemas/__string"
          description: A short text description of the Channel.
        EgressAccessLogs:
          $ref: "#/components/schemas/EgressAccessLogs"
        HlsIngest:
          $ref: "#/components/schemas/HlsIngest"
        Id:
          $ref: "#/components/schemas/__string"
          description: The ID of the Channel.
        IngressAccessLogs:
          $ref: "#/components/schemas/IngressAccessLogs"
        Tags:
          type: object
          properties: {}
    S3Destination:
      description: Configuration parameters for where in an S3 bucket to place the harvested content
      type: object
      properties:
        BucketName:
          $ref: "#/components/schemas/__string"
          description: The name of an S3 bucket within which harvested content will be exported
        ManifestKey:
          $ref: "#/components/schemas/__string"
          description: The key in the specified S3 bucket where the harvested top-level manifest will be placed.
        RoleArn:
          $ref: "#/components/schemas/__string"
          description: The IAM role used to write to the specified S3 bucket
      required:
        - ManifestKey
        - BucketName
        - RoleArn
    CreateHarvestJobResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) assigned to the HarvestJob.
        ChannelId:
          $ref: "#/components/schemas/__string"
          description: The ID of the Channel that the HarvestJob will harvest from.
        CreatedAt:
          $ref: "#/components/schemas/__string"
          description: The date and time the HarvestJob was submitted.
        EndTime:
          $ref: "#/components/schemas/__string"
          description: The end of the time-window which will be harvested.
        Id:
          $ref: "#/components/schemas/__string"
          description: The ID of the HarvestJob. The ID must be unique within the region and it cannot be changed after the HarvestJob is submitted.
        OriginEndpointId:
          $ref: "#/components/schemas/__string"
          description: The ID of the OriginEndpoint that the HarvestJob will harvest from. This cannot be changed after the HarvestJob is submitted.
        S3Destination:
          $ref: "#/components/schemas/S3Destination"
        StartTime:
          $ref: "#/components/schemas/__string"
          description: The start of the time-window which will be harvested.
        Status:
          $ref: "#/components/schemas/Status"
          description: The current status of the HarvestJob. Consider setting up a CloudWatch Event to listen for HarvestJobs as they succeed or fail. In the event of failure, the CloudWatch Event will include an explanation of why the HarvestJob failed.
    Status:
      type: string
      enum:
        - IN_PROGRESS
        - SUCCEEDED
        - FAILED
    Authorization:
      description: CDN Authorization credentials
      type: object
      properties:
        CdnIdentifierSecret:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) for the secret in Secrets Manager that your Content Distribution Network (CDN) uses for authorization to access your endpoint.
        SecretsRoleArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) for the IAM role that allows MediaPackage to communicate with AWS Secrets Manager.
      required:
        - SecretsRoleArn
        - CdnIdentifierSecret
    CmafPackageCreateOrUpdateParameters:
      description: A Common Media Application Format (CMAF) packaging configuration.
      type: object
      properties:
        Encryption:
          $ref: "#/components/schemas/CmafEncryption"
        HlsManifests:
          $ref: "#/components/schemas/__listOfHlsManifestCreateOrUpdateParameters"
          description: A list of HLS manifest configurations
        SegmentDurationSeconds:
          $ref: "#/components/schemas/__integer"
          description: Duration (in seconds) of each segment. Actual segments will be rounded to the nearest multiple of the source segment duration.
        SegmentPrefix:
          $ref: "#/components/schemas/__string"
          description: An optional custom string that is prepended to the name of each segment. If not specified, it defaults to the ChannelId.
        StreamSelection:
          $ref: "#/components/schemas/StreamSelection"
    CmafEncryption:
      description: A Common Media Application Format (CMAF) encryption configuration.
      type: object
      properties:
        ConstantInitializationVector:
          $ref: "#/components/schemas/__string"
          description: An optional 128-bit, 16-byte hex value represented by a 32-character string, used in conjunction with the key for encrypting blocks. If you don't specify a value, then MediaPackage creates the constant initialization vector (IV).
        EncryptionMethod:
          $ref: "#/components/schemas/CmafEncryptionMethod"
        KeyRotationIntervalSeconds:
          $ref: "#/components/schemas/__integer"
          description: Time (in seconds) between each encryption key rotation.
        SpekeKeyProvider:
          $ref: "#/components/schemas/SpekeKeyProvider"
      required:
        - SpekeKeyProvider
    CmafEncryptionMethod:
      description: The encryption method to use.
      type: string
      enum:
        - SAMPLE_AES
        - AES_CTR
    __integer:
      type: integer
    SpekeKeyProvider:
      description: A configuration for accessing an external Secure Packager and Encoder Key Exchange (SPEKE) service that will provide encryption keys.
      type: object
      properties:
        CertificateArn:
          $ref: "#/components/schemas/__string"
          description: An Amazon Resource Name (ARN) of a Certificate Manager certificate that MediaPackage will use for enforcing secure end-to-end data transfer with the key provider service.
        EncryptionContractConfiguration:
          $ref: "#/components/schemas/EncryptionContractConfiguration"
        ResourceId:
          $ref: "#/components/schemas/__string"
          description: The resource ID to include in key requests.
        RoleArn:
          $ref: "#/components/schemas/__string"
          description: An Amazon Resource Name (ARN) of an IAM role that AWS Elemental MediaPackage will assume when accessing the key provider service.
        SystemIds:
          $ref: "#/components/schemas/__listOf__string"
          description: The system IDs to include in key requests.
        Url:
          $ref: "#/components/schemas/__string"
          description: The URL of the external key provider service.
      required:
        - ResourceId
        - SystemIds
        - Url
        - RoleArn
    EncryptionContractConfiguration:
      description: "Use encryptionContractConfiguration to configure one or more content encryption keys for your endpoints that use SPEKE 2.0. The encryption contract defines which content keys are used to encrypt the audio and video tracks in your stream. To configure the encryption contract, specify which audio and video encryption presets to use. Note the following considerations when using encryptionContractConfiguration: encryptionContractConfiguration can be used for DASH or CMAF endpoints that use SPEKE 2.0. SPEKE 2.0 relies on the CPIX 2.3 specification. You must disable key rotation for this endpoint by setting keyRotationIntervalSeconds to 0."
      type: object
      properties:
        PresetSpeke20Audio:
          $ref: "#/components/schemas/PresetSpeke20Audio"
          description: A collection of audio encryption presets.
        PresetSpeke20Video:
          $ref: "#/components/schemas/PresetSpeke20Video"
          description: A collection of video encryption presets.
      required:
        - PresetSpeke20Audio
        - PresetSpeke20Video
    PresetSpeke20Audio:
      type: string
      enum:
        - PRESET-AUDIO-1
        - PRESET-AUDIO-2
        - PRESET-AUDIO-3
        - SHARED
        - UNENCRYPTED
    PresetSpeke20Video:
      type: string
      enum:
        - PRESET-VIDEO-1
        - PRESET-VIDEO-2
        - PRESET-VIDEO-3
        - PRESET-VIDEO-4
        - PRESET-VIDEO-5
        - PRESET-VIDEO-6
        - PRESET-VIDEO-7
        - PRESET-VIDEO-8
        - SHARED
        - UNENCRYPTED
    __listOf__string:
      type: array
      items:
        $ref: "#/components/schemas/__string"
    __listOfHlsManifestCreateOrUpdateParameters:
      type: array
      items:
        $ref: "#/components/schemas/HlsManifestCreateOrUpdateParameters"
    HlsManifestCreateOrUpdateParameters:
      description: A HTTP Live Streaming (HLS) manifest configuration.
      type: object
      properties:
        AdMarkers:
          $ref: "#/components/schemas/AdMarkers"
          description: This setting controls how ad markers are included in the packaged OriginEndpoint. "NONE" will omit all SCTE-35 ad markers from the output. "PASSTHROUGH" causes the manifest to contain a copy of the SCTE-35 ad markers (comments) taken directly from the input HTTP Live Streaming (HLS) manifest. "SCTE35_ENHANCED" generates ad markers and blackout tags based on SCTE-35 messages in the input source. "DATERANGE" inserts EXT-X-DATERANGE tags to signal ad and program transition events in HLS and CMAF manifests. For this option, you must set a programDateTimeIntervalSeconds value that is greater than 0.
        AdTriggers:
          $ref: "#/components/schemas/AdTriggers"
        AdsOnDeliveryRestrictions:
          $ref: "#/components/schemas/AdsOnDeliveryRestrictions"
        Id:
          $ref: "#/components/schemas/__string"
          description: The ID of the manifest. The ID must be unique within the OriginEndpoint and it cannot be changed after it is created.
        IncludeIframeOnlyStream:
          $ref: "#/components/schemas/__boolean"
          description: When enabled, an I-Frame only stream will be included in the output.
        ManifestName:
          $ref: "#/components/schemas/__string"
          description: An optional short string appended to the end of the OriginEndpoint URL. If not specified, defaults to the manifestName for the OriginEndpoint.
        PlaylistType:
          $ref: "#/components/schemas/PlaylistType"
          description: The HTTP Live Streaming (HLS) playlist type. When either "EVENT" or "VOD" is specified, a corresponding EXT-X-PLAYLIST-TYPE entry will be included in the media playlist.
        PlaylistWindowSeconds:
          $ref: "#/components/schemas/__integer"
          description: Time window (in seconds) contained in each parent manifest.
        ProgramDateTimeIntervalSeconds:
          $ref: "#/components/schemas/__integer"
          description: The interval (in seconds) between each EXT-X-PROGRAM-DATE-TIME tag inserted into manifests. Additionally, when an interval is specified ID3Timed Metadata messages will be generated every 5 seconds using the ingest time of the content. If the interval is not specified, or set to 0, then no EXT-X-PROGRAM-DATE-TIME tags will be inserted into manifests and no ID3Timed Metadata messages will be generated. Note that irrespective of this parameter, if any ID3 Timed Metadata is found in HTTP Live Streaming (HLS) input, it will be passed through to HLS output.
      required:
        - Id
    AdMarkers:
      type: string
      enum:
        - NONE
        - SCTE35_ENHANCED
        - PASSTHROUGH
        - DATERANGE
    AdTriggers:
      description: A list of SCTE-35 message types that are treated as ad markers in the output. If empty, no ad markers are output. Specify multiple items to create ad markers for all of the included message types.
      type: array
      items:
        $ref: "#/components/schemas/__AdTriggersElement"
    __AdTriggersElement:
      type: string
      enum:
        - SPLICE_INSERT
        - BREAK
        - PROVIDER_ADVERTISEMENT
        - DISTRIBUTOR_ADVERTISEMENT
        - PROVIDER_PLACEMENT_OPPORTUNITY
        - DISTRIBUTOR_PLACEMENT_OPPORTUNITY
        - PROVIDER_OVERLAY_PLACEMENT_OPPORTUNITY
        - DISTRIBUTOR_OVERLAY_PLACEMENT_OPPORTUNITY
    AdsOnDeliveryRestrictions:
      description: This setting allows the delivery restriction flags on SCTE-35 segmentation descriptors to determine whether a message signals an ad. Choosing "NONE" means no SCTE-35 messages become ads. Choosing "RESTRICTED" means SCTE-35 messages of the types specified in AdTriggers that contain delivery restrictions will be treated as ads. Choosing "UNRESTRICTED" means SCTE-35 messages of the types specified in AdTriggers that do not contain delivery restrictions will be treated as ads. Choosing "BOTH" means all SCTE-35 messages of the types specified in AdTriggers will be treated as ads. Note that Splice Insert messages do not have these flags and are always treated as ads if specified in AdTriggers.
      type: string
      enum:
        - NONE
        - RESTRICTED
        - UNRESTRICTED
        - BOTH
    __boolean:
      type: boolean
    PlaylistType:
      type: string
      enum:
        - NONE
        - EVENT
        - VOD
    StreamSelection:
      description: A StreamSelection configuration.
      type: object
      properties:
        MaxVideoBitsPerSecond:
          $ref: "#/components/schemas/__integer"
          description: The maximum video bitrate (bps) to include in output.
        MinVideoBitsPerSecond:
          $ref: "#/components/schemas/__integer"
          description: The minimum video bitrate (bps) to include in output.
        StreamOrder:
          $ref: "#/components/schemas/StreamOrder"
          description: A directive that determines the order of streams in the output.
    StreamOrder:
      type: string
      enum:
        - ORIGINAL
        - VIDEO_BITRATE_ASCENDING
        - VIDEO_BITRATE_DESCENDING
    DashPackage:
      description: A Dynamic Adaptive Streaming over HTTP (DASH) packaging configuration.
      type: object
      properties:
        AdTriggers:
          $ref: "#/components/schemas/AdTriggers"
        AdsOnDeliveryRestrictions:
          $ref: "#/components/schemas/AdsOnDeliveryRestrictions"
        Encryption:
          $ref: "#/components/schemas/DashEncryption"
        IncludeIframeOnlyStream:
          $ref: "#/components/schemas/__boolean"
          description: When enabled, an I-Frame only stream will be included in the output.
        ManifestLayout:
          $ref: "#/components/schemas/ManifestLayout"
          description: Determines the position of some tags in the Media Presentation Description (MPD). When set to FULL, elements like SegmentTemplate and ContentProtection are included in each Representation. When set to COMPACT, duplicate elements are combined and presented at the AdaptationSet level. When set to DRM_TOP_LEVEL_COMPACT, content protection elements are placed the MPD level and referenced at the AdaptationSet level.
        ManifestWindowSeconds:
          $ref: "#/components/schemas/__integer"
          description: Time window (in seconds) contained in each manifest.
        MinBufferTimeSeconds:
          $ref: "#/components/schemas/__integer"
          description: Minimum duration (in seconds) that a player will buffer media before starting the presentation.
        MinUpdatePeriodSeconds:
          $ref: "#/components/schemas/__integer"
          description: Minimum duration (in seconds) between potential changes to the Dynamic Adaptive Streaming over HTTP (DASH) Media Presentation Description (MPD).
        PeriodTriggers:
          $ref: "#/components/schemas/__listOf__PeriodTriggersElement"
          description: A list of triggers that controls when the outgoing Dynamic Adaptive Streaming over HTTP (DASH) Media Presentation Description (MPD) will be partitioned into multiple periods. If empty, the content will not be partitioned into more than one period. If the list contains "ADS", new periods will be created where the Channel source contains SCTE-35 ad markers.
        Profile:
          $ref: "#/components/schemas/Profile"
          description: The Dynamic Adaptive Streaming over HTTP (DASH) profile type. When set to "HBBTV_1_5", HbbTV 1.5 compliant output is enabled. When set to "DVB-DASH_2014", DVB-DASH 2014 compliant output is enabled.
        SegmentDurationSeconds:
          $ref: "#/components/schemas/__integer"
          description: Duration (in seconds) of each segment. Actual segments will be rounded to the nearest multiple of the source segment duration.
        SegmentTemplateFormat:
          $ref: "#/components/schemas/SegmentTemplateFormat"
          description: Determines the type of SegmentTemplate included in the Media Presentation Description (MPD). When set to NUMBER_WITH_TIMELINE, a full timeline is presented in each SegmentTemplate, with $Number$ media URLs. When set to TIME_WITH_TIMELINE, a full timeline is presented in each SegmentTemplate, with $Time$ media URLs. When set to NUMBER_WITH_DURATION, only a duration is included in each SegmentTemplate, with $Number$ media URLs.
        StreamSelection:
          $ref: "#/components/schemas/StreamSelection"
        SuggestedPresentationDelaySeconds:
          $ref: "#/components/schemas/__integer"
          description: Duration (in seconds) to delay live content before presentation.
        UtcTiming:
          $ref: "#/components/schemas/UtcTiming"
          description: Determines the type of UTCTiming included in the Media Presentation Description (MPD)
        UtcTimingUri:
          $ref: "#/components/schemas/__string"
          description: Specifies the value attribute of the UTCTiming field when utcTiming is set to HTTP-ISO, HTTP-HEAD or HTTP-XSDATE
    DashEncryption:
      description: A Dynamic Adaptive Streaming over HTTP (DASH) encryption configuration.
      type: object
      properties:
        KeyRotationIntervalSeconds:
          $ref: "#/components/schemas/__integer"
          description: Time (in seconds) between each encryption key rotation.
        SpekeKeyProvider:
          $ref: "#/components/schemas/SpekeKeyProvider"
      required:
