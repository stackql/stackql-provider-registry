  /ListTagsForStream:
    post:
      operationId: ListTagsForStream
      description: Lists the tags for the specified Kinesis data stream. This operation has a limit of five transactions per second per account. When invoking this API, you must use either the StreamARN or the StreamName parameter, or both. It is recommended that you use the StreamARN input parameter when you invoke this API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Kinesis_20131202.ListTagsForStream
            default: Kinesis_20131202.ListTagsForStream
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                  description: The name of the stream.
                ExclusiveStartTagKey:
                  $ref: "#/components/schemas/TagKey"
                  description: The key to use as the starting point for the list of tags. If this parameter is set, ListTagsForStream gets all tags that occur after ExclusiveStartTagKey.
                Limit:
                  $ref: "#/components/schemas/ListTagsForStreamInputLimit"
                  description: The number of tags to return. If this number is less than the total number of tags associated with the stream, HasMoreTags is set to true. To list additional tags, set ExclusiveStartTagKey to the last key in the response.
                StreamARN:
                  $ref: "#/components/schemas/StreamARN"
                  description: The ARN of the stream.
                StreamId:
                  $ref: "#/components/schemas/StreamId"
                  description: Not Implemented. Reserved for future use.
