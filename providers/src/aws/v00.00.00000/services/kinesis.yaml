      type: object
      properties:
        message:
          $ref: "#/components/schemas/ErrorMessage"
          description: A message that provides information about the error.
    KMSNotFoundException:
      description: The request was rejected because the specified entity or resource can't be found.
      type: object
      properties:
        message:
          $ref: "#/components/schemas/ErrorMessage"
          description: A message that provides information about the error.
    KMSOptInRequired:
      description: The Amazon Web Services access key ID needs a subscription for the service.
      type: object
      properties:
        message:
          $ref: "#/components/schemas/ErrorMessage"
          description: A message that provides information about the error.
    KMSThrottlingException:
      description: The request was denied due to request throttling. For more information about throttling, see Limits in the Amazon Web Services Key Management Service Developer Guide.
      type: object
      properties:
        message:
          $ref: "#/components/schemas/ErrorMessage"
          description: A message that provides information about the error.
    InternalFailureException:
      description: The processing of the request failed because of an unknown error, exception, or failure.
      type: object
      properties:
        message:
          $ref: "#/components/schemas/ErrorMessage"
    MinimumThroughputBillingCommitmentInput:
      description: Represents the request parameters for configuring minimum throughput billing commitment. Minimum throughput billing commitments provide cost savings on on-demand data streams in exchange for committing to a minimum level of throughput usage. Commitments have a minimum duration of 24 hours that must be honored before they can be disabled. If you attempt to disable a commitment before the minimum commitment period ends, the commitment will be scheduled for automatic disable at the earliest allowed end time. You can cancel a pending disable by enabling the commitment again before the earliest allowed end time.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/MinimumThroughputBillingCommitmentInputStatus"
          description: The desired status of the minimum throughput billing commitment.
      required:
        - Status
    MinimumThroughputBillingCommitmentInputStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    UpdateAccountSettingsOutput:
      type: object
      properties:
        MinimumThroughputBillingCommitment:
          $ref: "#/components/schemas/MinimumThroughputBillingCommitmentOutput"
          description: The updated configuration of the minimum throughput billing commitment for your account.
    ScalingType:
      type: string
      enum:
        - UNIFORM_SCALING
    UpdateShardCountOutput:
      type: object
      properties:
        StreamName:
          $ref: "#/components/schemas/StreamName"
          description: The name of the stream.
        CurrentShardCount:
          $ref: "#/components/schemas/PositiveIntegerObject"
          description: The current number of shards.
        TargetShardCount:
          $ref: "#/components/schemas/PositiveIntegerObject"
          description: The updated number of shards.
        StreamARN:
          $ref: "#/components/schemas/StreamARN"
          description: The ARN of the stream.
    UpdateStreamWarmThroughputOutput:
