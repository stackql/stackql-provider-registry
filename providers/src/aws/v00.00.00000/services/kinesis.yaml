          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
                  description: "An array of tags to be added to the Kinesis resource. A tag consists of a required key and an optional value. You can add up to 50 tags per resource. Tags may only contain Unicode letters, digits, white space, or these symbols: _ . : / = + - @."
                ResourceARN:
                  $ref: "#/components/schemas/ResourceARN"
                  description: The Amazon Resource Name (ARN) of the Kinesis resource to which to add tags.
                StreamId:
                  $ref: "#/components/schemas/StreamId"
                  description: Not Implemented. Reserved for future use.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes tags from the specified Kinesis resource. Removed tags are deleted and can't be recovered after this operation completes successfully.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
