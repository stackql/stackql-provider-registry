                StreamARN:
                  $ref: "#/components/schemas/StreamARN"
                  description: The Amazon Resource Name (ARN) of the stream for the MaxRecordSize update.
                StreamId:
                  $ref: "#/components/schemas/StreamId"
                  description: Not Implemented. Reserved for future use.
                MaxRecordSizeInKiB:
                  $ref: "#/components/schemas/MaxRecordSizeInKiB"
                  description: The maximum record size of a single record in KiB that you can write to, and read from a stream. Specify a value between 1024 and 10240 KiB (1 to 10 MiB). If you specify a value that is out of this range, UpdateMaxRecordSize sends back an ValidationException message.
              required:
                - MaxRecordSizeInKiB
      responses:
        "200":
          description: Success
  /UpdateShardCount:
    post:
      operationId: UpdateShardCount
      description: "Updates the shard count of the specified stream to the specified number of shards. This API is only supported for the data streams with the provisioned capacity mode. When invoking this API, you must use either the StreamARN or the StreamName parameter, or both. It is recommended that you use the StreamARN input parameter when you invoke this API. Updating the shard count is an asynchronous operation. Upon receiving the request, Kinesis Data Streams returns immediately and sets the status of the stream to UPDATING. After the update is complete, Kinesis Data Streams sets the status of the stream back to ACTIVE. Depending on the size of the stream, the scaling action could take a few minutes to complete. You can continue to read and write data to your stream while its status is UPDATING. To update the shard count, Kinesis Data Streams performs splits or merges on individual shards. This can cause short-lived shards to be created, in addition to the final shards. These short-lived shards count towards your total shard limit for your account in the Region. When using this operation, we recommend that you specify a target shard count that is a multiple of 25% (25%, 50%, 75%, 100%). You can specify any target value within your shard limit. However, if you specify a target that isn't a multiple of 25%, the scaling action might take longer to complete. This operation has the following default limits. By default, you cannot do the following: Scale more than ten times per rolling 24-hour period per stream Scale up to more than double your current shard count for a stream Scale down below half your current shard count for a stream Scale up to more than 10000 shards in a stream Scale a stream with more than 10000 shards down unless the result is less than 10000 shards Scale up to more than the shard limit for your account Make over 10 TPS. TPS over 10 will trigger the LimitExceededException For the default limits for an Amazon Web Services account, see Streams Limits in the Amazon Kinesis Data Streams Developer Guide. To request an increase in the call rate limit, the shard limit for this API, or your overall shard limit, use the limits form."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Kinesis_20131202.UpdateShardCount
            default: Kinesis_20131202.UpdateShardCount
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                  description: The name of the stream.
                TargetShardCount:
                  $ref: "#/components/schemas/PositiveIntegerObject"
                  description: "The new number of shards. This value has the following default limits. By default, you cannot do the following: Set this value to more than double your current shard count for a stream. Set this value below half your current shard count for a stream. Set this value to more than 10000 shards in a stream (the default limit for shard count per stream is 10000 per account per region), unless you request a limit increase. Scale a stream with more than 10000 shards down unless you set this value to less than 10000 shards."
                ScalingType:
                  $ref: "#/components/schemas/ScalingType"
                  description: The scaling type. Uniform scaling creates shards of equal size.
                StreamARN:
                  $ref: "#/components/schemas/StreamARN"
                  description: The ARN of the stream.
                StreamId:
                  $ref: "#/components/schemas/StreamId"
                  description: Not Implemented. Reserved for future use.
              required:
                - TargetShardCount
                - ScalingType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateShardCountOutput"
  /UpdateStreamMode:
    post:
      operationId: UpdateStreamMode
      description: Updates the capacity mode of the data stream. Currently, in Kinesis Data Streams, you can choose between an on-demand capacity mode and a provisioned capacity mode for your data stream. If you'd still like to proactively scale your on-demand data stream’s capacity, you can unlock the warm throughput feature for on-demand data streams by enabling MinimumThroughputBillingCommitment for your account. Once your account has MinimumThroughputBillingCommitment enabled, you can specify the warm throughput in MiB per second that your stream can support in writes.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Kinesis_20131202.UpdateStreamMode
            default: Kinesis_20131202.UpdateStreamMode
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                StreamARN:
                  $ref: "#/components/schemas/StreamARN"
                  description: Specifies the ARN of the data stream whose capacity mode you want to update.
                StreamId:
                  $ref: "#/components/schemas/StreamId"
                  description: Not Implemented. Reserved for future use.
                StreamModeDetails:
                  $ref: "#/components/schemas/StreamModeDetails"
                  description: Specifies the capacity mode to which you want to set your data stream. Currently, in Kinesis Data Streams, you can choose between an on-demand capacity mode and a provisioned capacity mode for your data streams.
                WarmThroughputMiBps:
                  $ref: "#/components/schemas/NaturalIntegerObject"
                  description: The target warm throughput in MB/s that the stream should be scaled to handle. This represents the throughput capacity that will be immediately available for write operations. This field is only valid when the stream mode is being updated to on-demand.
              required:
                - StreamARN
                - StreamModeDetails
      responses:
        "200":
          description: Success
  /UpdateStreamWarmThroughput:
    post:
      operationId: UpdateStreamWarmThroughput
      description: "Updates the warm throughput configuration for the specified Amazon Kinesis Data Streams on-demand data stream. This operation allows you to proactively scale your on-demand data stream to a specified throughput level, enabling better performance for sudden traffic spikes. When invoking this API, you must use either the StreamARN or the StreamName parameter, or both. It is recommended that you use the StreamARN input parameter when you invoke this API. Updating the warm throughput is an asynchronous operation. Upon receiving the request, Kinesis Data Streams returns immediately and sets the status of the stream to UPDATING. After the update is complete, Kinesis Data Streams sets the status of the stream back to ACTIVE. Depending on the size of the stream, the scaling action could take a few minutes to complete. You can continue to read and write data to your stream while its status is UPDATING. This operation is only supported for data streams with the on-demand capacity mode in accounts that have MinimumThroughputBillingCommitment enabled. Provisioned capacity mode streams do not support warm throughput configuration. This operation has the following default limits. By default, you cannot do the following: Scale to more than 10 GiBps for an on-demand stream. This API has a call limit of 5 transactions per second (TPS) for each Amazon Web Services account. TPS over 5 will initiate the LimitExceededException. For the default limits for an Amazon Web Services account, see Streams Limits in the Amazon Kinesis Data Streams Developer Guide. To request an increase in the call rate limit, the shard limit for this API, or your overall shard limit, use the limits form."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Kinesis_20131202.UpdateStreamWarmThroughput
            default: Kinesis_20131202.UpdateStreamWarmThroughput
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                StreamARN:
                  $ref: "#/components/schemas/StreamARN"
                  description: The ARN of the stream to be updated.
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                  description: The name of the stream to be updated.
                StreamId:
                  $ref: "#/components/schemas/StreamId"
                  description: Not Implemented. Reserved for future use.
                WarmThroughputMiBps:
                  $ref: "#/components/schemas/NaturalIntegerObject"
                  description: The target warm throughput in MB/s that the stream should be scaled to handle. This represents the throughput capacity that will be immediately available for write operations.
              required:
                - WarmThroughputMiBps
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateStreamWarmThroughputOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    StreamName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_.-]+"
    TagMap:
      type: object
      properties: {}
    StreamARN:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws.*:kinesis:.*:\d{12}:stream/\S+
    StreamId:
      type: string
      minLength: 1
      maxLength: 24
      pattern: "[a-z0-9]{20}-[a-z0-9]{3}"
    PositiveIntegerObject:
      type: integer
      minimum: 1
    StreamModeDetails:
      description: Specifies the capacity mode to which you want to set your data stream. Currently, in Kinesis Data Streams, you can choose between an on-demand capacity mode and a provisioned capacity mode for your data streams.
      type: object
      properties:
        StreamMode:
          $ref: "#/components/schemas/StreamMode"
          description: Specifies the capacity mode to which you want to set your data stream. Currently, in Kinesis Data Streams, you can choose between an on-demand capacity mode and a provisioned capacity mode for your data streams.
      required:
        - StreamMode
    StreamMode:
      type: string
      enum:
        - PROVISIONED
        - ON_DEMAND
    NaturalIntegerObject:
      type: integer
      minimum: 0
    MaxRecordSizeInKiB:
      type: integer
      minimum: 1024
      maximum: 10240
    RetentionPeriodHours:
      type: integer
    ResourceARN:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws.*:kinesis:.*:\d{12}:.*stream/\S+
    BooleanObject:
      type: boolean
    ConsumerName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_.-]+"
    ConsumerARN:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^(arn):aws.*:kinesis:.*:\d{12}:.*stream\/[a-zA-Z0-9_.-]+\/consumer\/[a-zA-Z0-9_.-]+:[0-9]+
    DescribeAccountSettingsOutput:
      type: object
      properties:
        MinimumThroughputBillingCommitment:
          $ref: "#/components/schemas/MinimumThroughputBillingCommitmentOutput"
          description: The current configuration of the minimum throughput billing commitment for your Amazon Web Services account.
    MinimumThroughputBillingCommitmentOutput:
      description: Represents the current status of minimum throughput billing commitment for an account.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/MinimumThroughputBillingCommitmentOutputStatus"
          description: The current status of the minimum throughput billing commitment.
        StartedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the commitment was started.
        EndedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the commitment was ended.
        EarliestAllowedEndAt:
          $ref: "#/components/schemas/Timestamp"
          description: The earliest timestamp when the commitment can be ended.
      required:
        - Status
    MinimumThroughputBillingCommitmentOutputStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
        - ENABLED_UNTIL_EARLIEST_ALLOWED_END
    Timestamp:
      type: string
      format: date-time
    DescribeLimitsOutput:
      type: object
      properties:
        ShardLimit:
          $ref: "#/components/schemas/ShardCountObject"
          description: The maximum number of shards.
        OpenShardCount:
          $ref: "#/components/schemas/ShardCountObject"
          description: The number of open shards.
        OnDemandStreamCount:
          $ref: "#/components/schemas/OnDemandStreamCountObject"
          description: Indicates the number of data streams with the on-demand capacity mode.
        OnDemandStreamCountLimit:
          $ref: "#/components/schemas/OnDemandStreamCountLimitObject"
          description: The maximum number of data streams with the on-demand capacity mode.
      required:
        - ShardLimit
        - OpenShardCount
        - OnDemandStreamCount
        - OnDemandStreamCountLimit
    ShardCountObject:
      type: integer
      minimum: 0
      maximum: 1000000
    OnDemandStreamCountObject:
      type: integer
      minimum: 0
      maximum: 1000000
    OnDemandStreamCountLimitObject:
      type: integer
      minimum: 0
      maximum: 1000000
    DescribeStreamInputLimit:
      type: integer
      minimum: 1
      maximum: 10000
    ShardId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_.-]+"
    DescribeStreamOutput:
      description: Represents the output for DescribeStream.
      type: object
      properties:
        StreamDescription:
          $ref: "#/components/schemas/StreamDescription"
          description: The current status of the stream, the stream Amazon Resource Name (ARN), an array of shard objects that comprise the stream, and whether there are more shards available.
      required:
        - StreamDescription
    StreamDescription:
      description: Represents the output for DescribeStream.
      type: object
      properties:
        StreamName:
          $ref: "#/components/schemas/StreamName"
          description: The name of the stream being described.
        StreamARN:
          $ref: "#/components/schemas/StreamARN"
          description: The Amazon Resource Name (ARN) for the stream being described.
        StreamStatus:
          $ref: "#/components/schemas/StreamStatus"
          description: "The current status of the stream being described. The stream status is one of the following states: CREATING - The stream is being created. Kinesis Data Streams immediately returns and sets StreamStatus to CREATING. DELETING - The stream is being deleted. The specified stream is in the DELETING state until Kinesis Data Streams completes the deletion. ACTIVE - The stream exists and is ready for read and write operations or deletion. You should perform read and write operations only on an ACTIVE stream. UPDATING - Shards in the stream are being merged or split. Read and write operations continue to work while the stream is in the UPDATING state."
        StreamModeDetails:
          $ref: "#/components/schemas/StreamModeDetails"
          description: Specifies the capacity mode to which you want to set your data stream. Currently, in Kinesis Data Streams, you can choose between an on-demand capacity mode and a provisioned capacity mode for your data streams.
        Shards:
          $ref: "#/components/schemas/ShardList"
          description: The shards that comprise the stream.
        HasMoreShards:
          $ref: "#/components/schemas/BooleanObject"
          description: If set to true, more shards in the stream are available to describe.
        RetentionPeriodHours:
          $ref: "#/components/schemas/RetentionPeriodHours"
          description: The current retention period, in hours. Minimum value of 24. Maximum value of 168.
        StreamCreationTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The approximate time that the stream was created.
        EnhancedMonitoring:
          $ref: "#/components/schemas/EnhancedMonitoringList"
          description: Represents the current enhanced monitoring settings of the stream.
        EncryptionType:
          $ref: "#/components/schemas/EncryptionType"
          description: "The server-side encryption type used on the stream. This parameter can be one of the following values: NONE: Do not encrypt the records in the stream. KMS: Use server-side encryption on the records in the stream using a customer-managed Amazon Web Services KMS key."
        KeyId:
          $ref: "#/components/schemas/KeyId"
          description: 'The GUID for the customer-managed Amazon Web Services KMS key to use for encryption. This value can be a globally unique identifier, a fully specified ARN to either an alias or a key, or an alias name prefixed by "alias/".You can also use a master key owned by Kinesis Data Streams by specifying the alias aws/kinesis. Key ARN example: arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012 Alias ARN example: arn:aws:kms:us-east-1:123456789012:alias/MyAliasName Globally unique key ID example: 12345678-1234-1234-1234-123456789012 Alias name example: alias/MyAliasName Master key owned by Kinesis Data Streams: alias/aws/kinesis'
      required:
        - StreamName
        - StreamARN
        - StreamStatus
        - Shards
        - HasMoreShards
        - RetentionPeriodHours
        - StreamCreationTimestamp
        - EnhancedMonitoring
    StreamStatus:
      type: string
      enum:
        - CREATING
        - DELETING
        - ACTIVE
        - UPDATING
    ShardList:
      type: array
      items:
        $ref: "#/components/schemas/Shard"
    Shard:
      description: A uniquely identified group of data records in a Kinesis data stream.
      type: object
      properties:
        ShardId:
          $ref: "#/components/schemas/ShardId"
          description: The unique identifier of the shard within the stream.
        ParentShardId:
          $ref: "#/components/schemas/ShardId"
          description: The shard ID of the shard's parent.
        AdjacentParentShardId:
          $ref: "#/components/schemas/ShardId"
          description: The shard ID of the shard adjacent to the shard's parent.
        HashKeyRange:
          $ref: "#/components/schemas/HashKeyRange"
          description: The range of possible hash key values for the shard, which is a set of ordered contiguous positive integers.
        SequenceNumberRange:
          $ref: "#/components/schemas/SequenceNumberRange"
          description: The range of possible sequence numbers for the shard.
      required:
        - ShardId
        - HashKeyRange
        - SequenceNumberRange
    HashKeyRange:
      description: The range of possible hash key values for the shard, which is a set of ordered contiguous positive integers.
      type: object
      properties:
        StartingHashKey:
          $ref: "#/components/schemas/HashKey"
          description: The starting hash key of the hash key range.
        EndingHashKey:
          $ref: "#/components/schemas/HashKey"
          description: The ending hash key of the hash key range.
      required:
        - StartingHashKey
        - EndingHashKey
    HashKey:
      type: string
      pattern: 0|([1-9]\d{0,38})
    SequenceNumberRange:
      description: The range of possible sequence numbers for the shard.
      type: object
      properties:
        StartingSequenceNumber:
          $ref: "#/components/schemas/SequenceNumber"
          description: The starting sequence number for the range.
        EndingSequenceNumber:
          $ref: "#/components/schemas/SequenceNumber"
          description: The ending sequence number for the range. Shards that are in the OPEN state have an ending sequence number of null.
      required:
        - StartingSequenceNumber
    SequenceNumber:
      type: string
      pattern: 0|([1-9]\d{0,128})
    EnhancedMonitoringList:
      type: array
      items:
        $ref: "#/components/schemas/EnhancedMetrics"
    EnhancedMetrics:
      description: Represents enhanced metrics types.
      type: object
      properties:
        ShardLevelMetrics:
          $ref: "#/components/schemas/MetricsNameList"
          description: List of shard-level metrics. The following are the valid shard-level metrics. The value "ALL" enhances every metric. IncomingBytes IncomingRecords OutgoingBytes OutgoingRecords WriteProvisionedThroughputExceeded ReadProvisionedThroughputExceeded IteratorAgeMilliseconds ALL For more information, see Monitoring the Amazon Kinesis Data Streams Service with Amazon CloudWatch in the Amazon Kinesis Data Streams Developer Guide.
    MetricsNameList:
      type: array
      items:
        $ref: "#/components/schemas/MetricsName"
    MetricsName:
      type: string
      enum:
        - IncomingBytes
        - IncomingRecords
        - OutgoingBytes
        - OutgoingRecords
        - WriteProvisionedThroughputExceeded
        - ReadProvisionedThroughputExceeded
        - IteratorAgeMilliseconds
        - ALL
    EncryptionType:
      type: string
      enum:
        - NONE
        - KMS
    KeyId:
      type: string
      minLength: 1
      maxLength: 2048
    DescribeStreamConsumerOutput:
      type: object
      properties:
        ConsumerDescription:
          $ref: "#/components/schemas/ConsumerDescription"
          description: An object that represents the details of the consumer.
      required:
        - ConsumerDescription
    ConsumerDescription:
      description: An object that represents the details of a registered consumer. This type of object is returned by DescribeStreamConsumer.
      type: object
      properties:
        ConsumerName:
          $ref: "#/components/schemas/ConsumerName"
          description: The name of the consumer is something you choose when you register the consumer.
        ConsumerARN:
          $ref: "#/components/schemas/ConsumerARN"
          description: When you register a consumer, Kinesis Data Streams generates an ARN for it. You need this ARN to be able to call SubscribeToShard. If you delete a consumer and then create a new one with the same name, it won't have the same ARN. That's because consumer ARNs contain the creation timestamp. This is important to keep in mind if you have IAM policies that reference consumer ARNs.
        ConsumerStatus:
          $ref: "#/components/schemas/ConsumerStatus"
          description: A consumer can't read data while in the CREATING or DELETING states.
        ConsumerCreationTimestamp:
          $ref: "#/components/schemas/Timestamp"
        StreamARN:
          $ref: "#/components/schemas/StreamARN"
          description: The ARN of the stream with which you registered the consumer.
      required:
        - ConsumerName
        - ConsumerARN
        - ConsumerStatus
        - ConsumerCreationTimestamp
        - StreamARN
    ConsumerStatus:
      type: string
      enum:
        - CREATING
        - DELETING
        - ACTIVE
    DescribeStreamSummaryOutput:
      type: object
      properties:
        StreamDescriptionSummary:
          $ref: "#/components/schemas/StreamDescriptionSummary"
          description: A StreamDescriptionSummary containing information about the stream.
      required:
        - StreamDescriptionSummary
    StreamDescriptionSummary:
      description: Represents the output for DescribeStreamSummary
      type: object
      properties:
        StreamName:
          $ref: "#/components/schemas/StreamName"
          description: The name of the stream being described.
        StreamARN:
          $ref: "#/components/schemas/StreamARN"
          description: The Amazon Resource Name (ARN) for the stream being described.
        StreamId:
          $ref: "#/components/schemas/StreamId"
          description: Not Implemented. Reserved for future use.
        StreamStatus:
          $ref: "#/components/schemas/StreamStatus"
          description: "The current status of the stream being described. The stream status is one of the following states: CREATING - The stream is being created. Kinesis Data Streams immediately returns and sets StreamStatus to CREATING. DELETING - The stream is being deleted. The specified stream is in the DELETING state until Kinesis Data Streams completes the deletion. ACTIVE - The stream exists and is ready for read and write operations or deletion. You should perform read and write operations only on an ACTIVE stream. UPDATING - Shards in the stream are being merged or split. Read and write operations continue to work while the stream is in the UPDATING state."
        StreamModeDetails:
          $ref: "#/components/schemas/StreamModeDetails"
          description: Specifies the capacity mode to which you want to set your data stream. Currently, in Kinesis Data Streams, you can choose between an on-demand ycapacity mode and a provisioned capacity mode for your data streams.
        RetentionPeriodHours:
          $ref: "#/components/schemas/RetentionPeriodHours"
          description: The current retention period, in hours.
        StreamCreationTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The approximate time that the stream was created.
        EnhancedMonitoring:
          $ref: "#/components/schemas/EnhancedMonitoringList"
          description: Represents the current enhanced monitoring settings of the stream.
        EncryptionType:
          $ref: "#/components/schemas/EncryptionType"
          description: "The encryption type used. This value is one of the following: KMS NONE"
        KeyId:
          $ref: "#/components/schemas/KeyId"
          description: 'The GUID for the customer-managed Amazon Web Services KMS key to use for encryption. This value can be a globally unique identifier, a fully specified ARN to either an alias or a key, or an alias name prefixed by "alias/".You can also use a master key owned by Kinesis Data Streams by specifying the alias aws/kinesis. Key ARN example: arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012 Alias ARN example: arn:aws:kms:us-east-1:123456789012:alias/MyAliasName Globally unique key ID example: 12345678-1234-1234-1234-123456789012 Alias name example: alias/MyAliasName Master key owned by Kinesis Data Streams: alias/aws/kinesis'
        OpenShardCount:
          $ref: "#/components/schemas/ShardCountObject"
          description: The number of open shards in the stream.
        ConsumerCount:
          $ref: "#/components/schemas/ConsumerCountObject"
          description: The number of enhanced fan-out consumers registered with the stream.
        WarmThroughput:
          $ref: "#/components/schemas/WarmThroughputObject"
          description: The warm throughput in MB/s for the stream. This represents the throughput capacity that will be immediately available for write operations.
        MaxRecordSizeInKiB:
          $ref: "#/components/schemas/MaxRecordSizeInKiB"
          description: The maximum record size of a single record in kibibyte (KiB) that you can write to, and read from a stream.
      required:
        - StreamName
        - StreamARN
        - StreamStatus
        - RetentionPeriodHours
        - StreamCreationTimestamp
        - EnhancedMonitoring
        - OpenShardCount
    ConsumerCountObject:
      type: integer
      minimum: 0
      maximum: 1000000
    WarmThroughputObject:
      description: Represents the warm throughput configuration on the stream. This is only present for On-Demand Kinesis Data Streams in accounts that have MinimumThroughputBillingCommitment enabled.
      type: object
      properties:
        TargetMiBps:
          $ref: "#/components/schemas/NaturalIntegerObject"
          description: The target warm throughput value on the stream. This indicates that the stream is currently scaling towards this target value.
        CurrentMiBps:
          $ref: "#/components/schemas/NaturalIntegerObject"
          description: The current warm throughput value on the stream. This is the write throughput in MiBps that the stream is currently scaled to handle.
    EnhancedMonitoringOutput:
      description: Represents the output for EnableEnhancedMonitoring and DisableEnhancedMonitoring.
      type: object
      properties:
        StreamName:
          $ref: "#/components/schemas/StreamName"
          description: The name of the Kinesis data stream.
        CurrentShardLevelMetrics:
          $ref: "#/components/schemas/MetricsNameList"
          description: Represents the current state of the metrics that are in the enhanced state before the operation.
        DesiredShardLevelMetrics:
          $ref: "#/components/schemas/MetricsNameList"
          description: Represents the list of all the metrics that would be in the enhanced state after the operation.
        StreamARN:
          $ref: "#/components/schemas/StreamARN"
          description: The ARN of the stream.
    ShardIterator:
      type: string
      minLength: 1
      maxLength: 512
    GetRecordsInputLimit:
      type: integer
      minimum: 1
      maximum: 10000
    GetRecordsOutput:
      description: Represents the output for GetRecords.
      type: object
      properties:
        Records:
          $ref: "#/components/schemas/RecordList"
          description: The data records retrieved from the shard.
        NextShardIterator:
          $ref: "#/components/schemas/ShardIterator"
          description: The next position in the shard from which to start sequentially reading data records. If set to null, the shard has been closed and the requested iterator does not return any more data.
        MillisBehindLatest:
          $ref: "#/components/schemas/MillisBehindLatest"
          description: The number of milliseconds the GetRecords response is from the tip of the stream, indicating how far behind current time the consumer is. A value of zero indicates that record processing is caught up, and there are no new records to process at this moment.
        ChildShards:
          $ref: "#/components/schemas/ChildShardList"
          description: The list of the current shard's child shards, returned in the GetRecords API's response only when the end of the current shard is reached.
      required:
        - Records
    RecordList:
      type: array
      items:
        $ref: "#/components/schemas/Record"
    Record:
      description: The unit of data of the Kinesis data stream, which is composed of a sequence number, a partition key, and a data blob.
      type: object
      properties:
        SequenceNumber:
          $ref: "#/components/schemas/SequenceNumber"
          description: The unique identifier of the record within its shard.
        ApproximateArrivalTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The approximate time that the record was inserted into the stream.
        Data:
          $ref: "#/components/schemas/Data"
          description: The data blob. The data in the blob is both opaque and immutable to Kinesis Data Streams, which does not inspect, interpret, or change the data in the blob in any way. When the data blob (the payload before base64-encoding) is added to the partition key size, the total size must not exceed the maximum record size (1 MiB).
        PartitionKey:
          $ref: "#/components/schemas/PartitionKey"
          description: Identifies which shard in the stream the data record is assigned to.
        EncryptionType:
          $ref: "#/components/schemas/EncryptionType"
          description: "The encryption type used on the record. This parameter can be one of the following values: NONE: Do not encrypt the records in the stream. KMS: Use server-side encryption on the records in the stream using a customer-managed Amazon Web Services KMS key."
      required:
        - SequenceNumber
        - Data
        - PartitionKey
    Data:
      type: string
      format: byte
      minLength: 0
      maxLength: 10485760
    PartitionKey:
      type: string
      minLength: 1
      maxLength: 256
    MillisBehindLatest:
      type: integer
      format: int64
      minimum: 0
    ChildShardList:
      type: array
      items:
        $ref: "#/components/schemas/ChildShard"
    ChildShard:
      description: Output parameter of the GetRecords API. The existing child shard of the current shard.
      type: object
      properties:
        ShardId:
          $ref: "#/components/schemas/ShardId"
          description: The shard ID of the existing child shard of the current shard.
        ParentShards:
          $ref: "#/components/schemas/ShardIdList"
          description: The current shard that is the parent of the existing child shard.
        HashKeyRange:
          $ref: "#/components/schemas/HashKeyRange"
      required:
        - ShardId
        - ParentShards
        - HashKeyRange
    ShardIdList:
      type: array
      items:
        $ref: "#/components/schemas/ShardId"
    GetResourcePolicyOutput:
      type: object
      properties:
        Policy:
          $ref: "#/components/schemas/Policy"
          description: Details of the resource policy. This is formatted as a JSON string.
      required:
        - Policy
    Policy:
      type: string
    ShardIteratorType:
      type: string
      enum:
        - AT_SEQUENCE_NUMBER
        - AFTER_SEQUENCE_NUMBER
        - TRIM_HORIZON
        - LATEST
        - AT_TIMESTAMP
    GetShardIteratorOutput:
      description: Represents the output for GetShardIterator.
      type: object
      properties:
        ShardIterator:
          $ref: "#/components/schemas/ShardIterator"
          description: The position in the shard from which to start reading data records sequentially. A shard iterator specifies this position using the sequence number of a data record in a shard.
    NextToken:
      type: string
      minLength: 1
      maxLength: 1048576
    ListShardsInputLimit:
      type: integer
      minimum: 1
      maximum: 10000
    ShardFilter:
      description: The request parameter used to filter out the response of the ListShards API.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/ShardFilterType"
          description: "The shard type specified in the ShardFilter parameter. This is a required property of the ShardFilter parameter. You can specify the following valid values: AFTER_SHARD_ID - the response includes all the shards, starting with the shard whose ID immediately follows the ShardId that you provided. AT_TRIM_HORIZON - the response includes all the shards that were open at TRIM_HORIZON. FROM_TRIM_HORIZON - (default), the response includes all the shards within the retention period of the data stream (trim to tip). AT_LATEST - the response includes only the currently open shards of the data stream. AT_TIMESTAMP - the response includes all shards whose start timestamp is less than or equal to the given timestamp and end timestamp is greater than or equal to the given timestamp or still open. FROM_TIMESTAMP - the response incldues all closed shards whose end timestamp is greater than or equal to the given timestamp and also all open shards. Corrected to TRIM_HORIZON of the data stream if FROM_TIMESTAMP is less than the TRIM_HORIZON value."
        ShardId:
          $ref: "#/components/schemas/ShardId"
          description: The exclusive start shardID speified in the ShardFilter parameter. This property can only be used if the AFTER_SHARD_ID shard type is specified.
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamps specified in the ShardFilter parameter. A timestamp is a Unix epoch date with precision in milliseconds. For example, 2016-04-04T19:58:46.480-00:00 or 1459799926.480. This property can only be used if FROM_TIMESTAMP or AT_TIMESTAMP shard types are specified.
      required:
        - Type
    ShardFilterType:
      type: string
      enum:
        - AFTER_SHARD_ID
        - AT_TRIM_HORIZON
        - FROM_TRIM_HORIZON
        - AT_LATEST
        - AT_TIMESTAMP
        - FROM_TIMESTAMP
    ListShardsOutput:
      type: object
      properties:
        Shards:
          $ref: "#/components/schemas/ShardList"
          description: An array of JSON objects. Each object represents one shard and specifies the IDs of the shard, the shard's parent, and the shard that's adjacent to the shard's parent. Each object also contains the starting and ending hash keys and the starting and ending sequence numbers for the shard.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: When the number of shards in the data stream is greater than the default value for the MaxResults parameter, or if you explicitly specify a value for MaxResults that is less than the number of shards in the data stream, the response includes a pagination token named NextToken. You can specify this NextToken value in a subsequent call to ListShards to list the next set of shards. For more information about the use of this pagination token when calling the ListShards operation, see ListShardsInput$NextToken. Tokens expire after 300 seconds. When you obtain a value for NextToken in the response to a call to ListShards, you have 300 seconds to use that value. If you specify an expired token in a call to ListShards, you get ExpiredNextTokenException.
    ListStreamConsumersInputLimit:
      type: integer
      minimum: 1
      maximum: 10000
    ListStreamConsumersOutput:
      type: object
      properties:
        Consumers:
          $ref: "#/components/schemas/ConsumerList"
          description: An array of JSON objects. Each object represents one registered consumer.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: When the number of consumers that are registered with the data stream is greater than the default value for the MaxResults parameter, or if you explicitly specify a value for MaxResults that is less than the number of registered consumers, the response includes a pagination token named NextToken. You can specify this NextToken value in a subsequent call to ListStreamConsumers to list the next set of registered consumers. For more information about the use of this pagination token when calling the ListStreamConsumers operation, see ListStreamConsumersInput$NextToken. Tokens expire after 300 seconds. When you obtain a value for NextToken in the response to a call to ListStreamConsumers, you have 300 seconds to use that value. If you specify an expired token in a call to ListStreamConsumers, you get ExpiredNextTokenException.
    ConsumerList:
      type: array
      items:
        $ref: "#/components/schemas/Consumer"
    Consumer:
      description: An object that represents the details of the consumer you registered. This type of object is returned by RegisterStreamConsumer.
      type: object
      properties:
        ConsumerName:
          $ref: "#/components/schemas/ConsumerName"
          description: The name of the consumer is something you choose when you register the consumer.
        ConsumerARN:
          $ref: "#/components/schemas/ConsumerARN"
          description: When you register a consumer, Kinesis Data Streams generates an ARN for it. You need this ARN to be able to call SubscribeToShard. If you delete a consumer and then create a new one with the same name, it won't have the same ARN. That's because consumer ARNs contain the creation timestamp. This is important to keep in mind if you have IAM policies that reference consumer ARNs.
        ConsumerStatus:
          $ref: "#/components/schemas/ConsumerStatus"
          description: A consumer can't read data while in the CREATING or DELETING states.
        ConsumerCreationTimestamp:
          $ref: "#/components/schemas/Timestamp"
      required:
        - ConsumerName
        - ConsumerARN
        - ConsumerStatus
        - ConsumerCreationTimestamp
    ListStreamsInputLimit:
      type: integer
      minimum: 1
      maximum: 10000
    ListStreamsRowDisplay:
      type: object
      properties:
        stream_name:
          type: string
          description: The names of the streams that are associated with the Amazon Web Services account making the ListStreams request.
    ListStreamsOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ListStreamsRowDisplay"
    ListTagsForResourceOutput:
      type: object
      properties:
        Tags:
          $ref: "#/components/schemas/TagList"
          description: An array of tags associated with the specified Kinesis resource.
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Metadata assigned to the stream or consumer, consisting of a key-value pair.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: "A unique identifier for the tag. Maximum length: 128 characters. Valid characters: Unicode letters, digits, white space, _ . / = + - % @"
        Value:
          $ref: "#/components/schemas/TagValue"
          description: "An optional string, typically used to describe or define the tag. Maximum length: 256 characters. Valid characters: Unicode letters, digits, white space, _ . / = + - % @"
      required:
        - Key
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    ListTagsForStreamInputLimit:
      type: integer
      minimum: 1
      maximum: 50
    ListTagsForStreamOutput:
      description: Represents the output for ListTagsForStream.
      type: object
      properties:
        Tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tags associated with StreamName, starting with the first tag after ExclusiveStartTagKey and up to the specified Limit.
        HasMoreTags:
          $ref: "#/components/schemas/BooleanObject"
          description: If set to true, more tags are available. To request additional tags, set ExclusiveStartTagKey to the key of the last tag returned.
      required:
        - Tags
        - HasMoreTags
    PutRecordOutput:
      description: Represents the output for PutRecord.
      type: object
      properties:
        ShardId:
          $ref: "#/components/schemas/ShardId"
          description: The shard ID of the shard where the data record was placed.
        SequenceNumber:
          $ref: "#/components/schemas/SequenceNumber"
          description: The sequence number identifier that was assigned to the put data record. The sequence number for the record is unique across all records in the stream. A sequence number is the identifier associated with every record put into the stream.
        EncryptionType:
          $ref: "#/components/schemas/EncryptionType"
          description: "The encryption type to use on the record. This parameter can be one of the following values: NONE: Do not encrypt the records in the stream. KMS: Use server-side encryption on the records in the stream using a customer-managed Amazon Web Services KMS key."
      required:
        - ShardId
        - SequenceNumber
    PutRecordsRequestEntryList:
      type: array
      items:
        $ref: "#/components/schemas/PutRecordsRequestEntry"
    PutRecordsRequestEntry:
      description: Represents the output for PutRecords.
      type: object
      properties:
        Data:
          $ref: "#/components/schemas/Data"
          description: The data blob to put into the record, which is base64-encoded when the blob is serialized. When the data blob (the payload before base64-encoding) is added to the partition key size, the total size must not exceed the maximum record size (10 MiB).
        ExplicitHashKey:
          $ref: "#/components/schemas/HashKey"
          description: The hash value used to determine explicitly the shard that the data record is assigned to by overriding the partition key hash.
        PartitionKey:
          $ref: "#/components/schemas/PartitionKey"
          description: Determines which shard in the stream the data record is assigned to. Partition keys are Unicode strings with a maximum length limit of 256 characters for each key. Amazon Kinesis Data Streams uses the partition key as input to a hash function that maps the partition key and associated data to a specific shard. Specifically, an MD5 hash function is used to map partition keys to 128-bit integer values and to map associated data records to shards. As a result of this hashing mechanism, all data records with the same partition key map to the same shard within the stream.
      required:
        - Data
        - PartitionKey
    PutRecordsOutput:
      description: PutRecords results.
      type: object
      properties:
        FailedRecordCount:
          $ref: "#/components/schemas/PositiveIntegerObject"
          description: The number of unsuccessfully processed records in a PutRecords request.
        Records:
          $ref: "#/components/schemas/PutRecordsResultEntryList"
          description: An array of successfully and unsuccessfully processed record results. A record that is successfully added to a stream includes SequenceNumber and ShardId in the result. A record that fails to be added to a stream includes ErrorCode and ErrorMessage in the result.
        EncryptionType:
          $ref: "#/components/schemas/EncryptionType"
          description: "The encryption type used on the records. This parameter can be one of the following values: NONE: Do not encrypt the records. KMS: Use server-side encryption on the records using a customer-managed Amazon Web Services KMS key."
      required:
        - Records
    PutRecordsResultEntryList:
      type: array
      items:
        $ref: "#/components/schemas/PutRecordsResultEntry"
    PutRecordsResultEntry:
      description: Represents the result of an individual record from a PutRecords request. A record that is successfully added to a stream includes SequenceNumber and ShardId in the result. A record that fails to be added to the stream includes ErrorCode and ErrorMessage in the result.
      type: object
      properties:
        SequenceNumber:
          $ref: "#/components/schemas/SequenceNumber"
          description: The sequence number for an individual record result.
        ShardId:
          $ref: "#/components/schemas/ShardId"
          description: The shard ID for an individual record result.
        ErrorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code for an individual record result. ErrorCodes can be either ProvisionedThroughputExceededException or InternalFailure.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message for an individual record result. An ErrorCode value of ProvisionedThroughputExceededException has an error message that includes the account ID, stream name, and shard ID. An ErrorCode value of InternalFailure has the error message "Internal Service Failure".
    ErrorCode:
      type: string
    ErrorMessage:
      type: string
    RegisterStreamConsumerOutput:
      type: object
      properties:
        Consumer:
          $ref: "#/components/schemas/Consumer"
          description: An object that represents the details of the consumer you registered. When you register a consumer, it gets an ARN that is generated by Kinesis Data Streams.
      required:
        - Consumer
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    StartingPosition:
      description: The starting position in the data stream from which to start streaming.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/ShardIteratorType"
          description: "You can set the starting position to one of the following values: AT_SEQUENCE_NUMBER: Start streaming from the position denoted by the sequence number specified in the SequenceNumber field. AFTER_SEQUENCE_NUMBER: Start streaming right after the position denoted by the sequence number specified in the SequenceNumber field. AT_TIMESTAMP: Start streaming from the position denoted by the time stamp specified in the Timestamp field. TRIM_HORIZON: Start streaming at the last untrimmed record in the shard, which is the oldest data record in the shard. LATEST: Start streaming just after the most recent record in the shard, so that you always read the most recent data in the shard."
        SequenceNumber:
          $ref: "#/components/schemas/SequenceNumber"
          description: The sequence number of the data record in the shard from which to start streaming. To specify a sequence number, set StartingPosition to AT_SEQUENCE_NUMBER or AFTER_SEQUENCE_NUMBER.
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time stamp of the data record from which to start reading. To specify a time stamp, set StartingPosition to Type AT_TIMESTAMP. A time stamp is the Unix epoch date with precision in milliseconds. For example, 2016-04-04T19:58:46.480-00:00 or 1459799926.480. If a record with this exact time stamp does not exist, records will be streamed from the next (later) record. If the time stamp is older than the current trim horizon, records will be streamed from the oldest untrimmed data record (TRIM_HORIZON).
      required:
        - Type
    SubscribeToShardOutput:
      type: object
      properties:
        EventStream:
          $ref: "#/components/schemas/SubscribeToShardEventStream"
          description: The event stream that your consumer can use to read records from the shard.
      required:
        - EventStream
    SubscribeToShardEventStream:
      description: This is a tagged union for all of the types of events an enhanced fan-out consumer can receive over HTTP/2 after a call to SubscribeToShard.
      type: object
      properties:
        SubscribeToShardEvent:
          $ref: "#/components/schemas/SubscribeToShardEvent"
          description: After you call SubscribeToShard, Kinesis Data Streams sends events of this type to your consumer. For an example of how to handle these events, see Enhanced Fan-Out Using the Kinesis Data Streams API.
        ResourceNotFoundException:
          $ref: "#/components/schemas/ResourceNotFoundException"
        ResourceInUseException:
          $ref: "#/components/schemas/ResourceInUseException"
        KMSDisabledException:
          $ref: "#/components/schemas/KMSDisabledException"
        KMSInvalidStateException:
          $ref: "#/components/schemas/KMSInvalidStateException"
        KMSAccessDeniedException:
          $ref: "#/components/schemas/KMSAccessDeniedException"
        KMSNotFoundException:
          $ref: "#/components/schemas/KMSNotFoundException"
        KMSOptInRequired:
          $ref: "#/components/schemas/KMSOptInRequired"
        KMSThrottlingException:
          $ref: "#/components/schemas/KMSThrottlingException"
        InternalFailureException:
          $ref: "#/components/schemas/InternalFailureException"
          description: The processing of the request failed because of an unknown error, exception, or failure.
      required:
        - SubscribeToShardEvent
    SubscribeToShardEvent:
      description: After you call SubscribeToShard, Kinesis Data Streams sends events of this type over an HTTP/2 connection to your consumer.
      type: object
      properties:
        Records:
          $ref: "#/components/schemas/RecordList"
        ContinuationSequenceNumber:
          $ref: "#/components/schemas/SequenceNumber"
          description: Use this as SequenceNumber in the next call to SubscribeToShard, with StartingPosition set to AT_SEQUENCE_NUMBER or AFTER_SEQUENCE_NUMBER. Use ContinuationSequenceNumber for checkpointing because it captures your shard progress even when no data is written to the shard.
        MillisBehindLatest:
          $ref: "#/components/schemas/MillisBehindLatest"
          description: The number of milliseconds the read records are from the tip of the stream, indicating how far behind current time the consumer is. A value of zero indicates that record processing is caught up, and there are no new records to process at this moment.
        ChildShards:
          $ref: "#/components/schemas/ChildShardList"
          description: The list of the child shards of the current shard, returned only at the end of the current shard.
      required:
        - Records
        - ContinuationSequenceNumber
        - MillisBehindLatest
    ResourceNotFoundException:
