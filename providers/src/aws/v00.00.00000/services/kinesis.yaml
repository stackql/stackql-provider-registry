        StreamName:
          $ref: "#/components/schemas/StreamName"
          description: The name of the stream that was updated.
        WarmThroughput:
          $ref: "#/components/schemas/WarmThroughputObject"
          description: Specifies the updated warm throughput configuration for your data stream.
