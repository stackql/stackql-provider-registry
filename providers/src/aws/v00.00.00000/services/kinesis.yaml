  /UpdateMaxRecordSize:
    post:
      operationId: UpdateMaxRecordSize
      description: This allows you to update the MaxRecordSize of a single record that you can write to, and read from a stream. You can ingest and digest single records up to 10240 KiB.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Kinesis_20131202.UpdateMaxRecordSize
            default: Kinesis_20131202.UpdateMaxRecordSize
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
