openapi: 3.0.0
info:
  version: "2018-05-10"
  title: AWS License Manager User Subscriptions
  description: AWS License Manager User Subscriptions
  x-serviceName: license-manager-user-subscriptions
  x-serviceAlias: license_manager_user_subscriptions
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: license-manager-user-subscriptions
servers:
  - url: https://license-manager-user-subscriptions.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for license-manager-user-subscriptions
paths:
  /user/AssociateUser:
    post:
      operationId: AssociateUser
      description: Associates the user to an EC2 instance to utilize user-based subscriptions. Your estimated bill for charges on the number of users and related costs will take 48 hours to appear for billing periods that haven't closed (marked as Pending billing status) in Amazon Web Services Billing. For more information, see Viewing your monthly charges in the Amazon Web Services Billing User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Username:
                  $ref: "#/components/schemas/String"
                InstanceId:
                  $ref: "#/components/schemas/String"
                IdentityProvider:
                  $ref: "#/components/schemas/IdentityProvider"
                Domain:
                  $ref: "#/components/schemas/String"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - Username
                - InstanceId
                - IdentityProvider
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateUserResponse"
  /license-server/CreateLicenseServerEndpoint:
    post:
      operationId: CreateLicenseServerEndpoint
      description: Creates a network endpoint for the Remote Desktop Services (RDS) license server.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                IdentityProviderArn:
                  $ref: "#/components/schemas/Arn"
                LicenseServerSettings:
                  $ref: "#/components/schemas/LicenseServerSettings"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - IdentityProviderArn
                - LicenseServerSettings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLicenseServerEndpointResponse"
  /license-server/DeleteLicenseServerEndpoint:
    post:
      operationId: DeleteLicenseServerEndpoint
      description: Deletes a LicenseServerEndpoint resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                LicenseServerEndpointArn:
                  $ref: "#/components/schemas/Arn"
                ServerType:
                  $ref: "#/components/schemas/ServerType"
              required:
                - LicenseServerEndpointArn
                - ServerType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLicenseServerEndpointResponse"
  /identity-provider/DeregisterIdentityProvider:
    post:
      operationId: DeregisterIdentityProvider
      description: Deregisters the Active Directory identity provider from License Manager user-based subscriptions.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                IdentityProvider:
                  $ref: "#/components/schemas/IdentityProvider"
                Product:
                  $ref: "#/components/schemas/String"
                IdentityProviderArn:
                  $ref: "#/components/schemas/Arn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeregisterIdentityProviderResponse"
  /user/DisassociateUser:
    post:
      operationId: DisassociateUser
      description: Disassociates the user from an EC2 instance providing user-based subscriptions.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Username:
                  $ref: "#/components/schemas/String"
                InstanceId:
                  $ref: "#/components/schemas/String"
                IdentityProvider:
                  $ref: "#/components/schemas/IdentityProvider"
                InstanceUserArn:
                  $ref: "#/components/schemas/Arn"
                Domain:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateUserResponse"
  /identity-provider/ListIdentityProviders:
    post:
      operationId: ListIdentityProviders
      description: Lists the Active Directory identity providers for user-based subscriptions.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/BoxInteger"
                Filters:
                  $ref: "#/components/schemas/FilterList"
                NextToken:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIdentityProvidersResponse"
  /instance/ListInstances:
    post:
      operationId: ListInstances
      description: Lists the EC2 instances providing user-based subscriptions.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/BoxInteger"
                NextToken:
                  $ref: "#/components/schemas/String"
                Filters:
                  $ref: "#/components/schemas/FilterList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInstancesResponse"
  /license-server/ListLicenseServerEndpoints:
    post:
      operationId: ListLicenseServerEndpoints
      description: List the Remote Desktop Services (RDS) License Server endpoints
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListLicenseServerEndpointsRequestMaxResultsInteger"
                Filters:
                  $ref: "#/components/schemas/FilterList"
                NextToken:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLicenseServerEndpointsResponse"
  /user/ListProductSubscriptions:
    post:
      operationId: ListProductSubscriptions
      description: Lists the user-based subscription products available from an identity provider.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Product:
                  $ref: "#/components/schemas/String"
                IdentityProvider:
                  $ref: "#/components/schemas/IdentityProvider"
                MaxResults:
                  $ref: "#/components/schemas/BoxInteger"
                Filters:
                  $ref: "#/components/schemas/FilterList"
                NextToken:
                  $ref: "#/components/schemas/String"
              required:
                - IdentityProvider
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProductSubscriptionsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns the list of tags for the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource whose tags you want to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    put:
      operationId: TagResource
      description: Adds tags to a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource that you want to tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes tags from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource that you want to remove tags from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The tag keys to remove from the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /user/ListUserAssociations:
    post:
      operationId: ListUserAssociations
      description: Lists user associations for an identity provider.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                InstanceId:
                  $ref: "#/components/schemas/String"
                IdentityProvider:
                  $ref: "#/components/schemas/IdentityProvider"
                MaxResults:
                  $ref: "#/components/schemas/BoxInteger"
                Filters:
                  $ref: "#/components/schemas/FilterList"
                NextToken:
                  $ref: "#/components/schemas/String"
              required:
                - InstanceId
                - IdentityProvider
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUserAssociationsResponse"
  /identity-provider/RegisterIdentityProvider:
    post:
      operationId: RegisterIdentityProvider
      description: Registers an identity provider for user-based subscriptions.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                IdentityProvider:
                  $ref: "#/components/schemas/IdentityProvider"
                Product:
                  $ref: "#/components/schemas/String"
                Settings:
                  $ref: "#/components/schemas/Settings"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - IdentityProvider
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterIdentityProviderResponse"
  /user/StartProductSubscription:
    post:
      operationId: StartProductSubscription
      description: Starts a product subscription for a user with the specified identity provider. Your estimated bill for charges on the number of users and related costs will take 48 hours to appear for billing periods that haven't closed (marked as Pending billing status) in Amazon Web Services Billing. For more information, see Viewing your monthly charges in the Amazon Web Services Billing User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Username:
                  $ref: "#/components/schemas/String"
                IdentityProvider:
                  $ref: "#/components/schemas/IdentityProvider"
                Product:
                  $ref: "#/components/schemas/String"
                Domain:
                  $ref: "#/components/schemas/String"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - Username
                - IdentityProvider
                - Product
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartProductSubscriptionResponse"
  /user/StopProductSubscription:
    post:
      operationId: StopProductSubscription
      description: Stops a product subscription for a user with the specified identity provider.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Username:
                  $ref: "#/components/schemas/String"
                IdentityProvider:
                  $ref: "#/components/schemas/IdentityProvider"
                Product:
                  $ref: "#/components/schemas/String"
                ProductUserArn:
                  $ref: "#/components/schemas/Arn"
                Domain:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopProductSubscriptionResponse"
  /identity-provider/UpdateIdentityProviderSettings:
    post:
      operationId: UpdateIdentityProviderSettings
      description: Updates additional product configuration settings for the registered identity provider.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                IdentityProvider:
                  $ref: "#/components/schemas/IdentityProvider"
                Product:
                  $ref: "#/components/schemas/String"
                IdentityProviderArn:
                  $ref: "#/components/schemas/Arn"
                UpdateSettings:
                  $ref: "#/components/schemas/UpdateSettings"
              required:
                - UpdateSettings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateIdentityProviderSettingsResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    String:
      type: string
    IdentityProvider:
      description: Refers to an identity provider.
      type: object
      properties:
        ActiveDirectoryIdentityProvider:
          $ref: "#/components/schemas/ActiveDirectoryIdentityProvider"
          description: The ActiveDirectoryIdentityProvider resource contains settings and other details about a specific Active Directory identity provider.
    ActiveDirectoryIdentityProvider:
      description: Details about an Active Directory identity provider.
      type: object
      properties:
        DirectoryId:
          $ref: "#/components/schemas/Directory"
          description: The directory ID for an Active Directory identity provider.
        ActiveDirectorySettings:
          $ref: "#/components/schemas/ActiveDirectorySettings"
          description: The ActiveDirectorySettings resource contains details about the Active Directory, including network access details such as domain name and IP addresses, and the credential provider for user administration.
        ActiveDirectoryType:
          $ref: "#/components/schemas/ActiveDirectoryType"
          description: The type of Active Directory – either a self-managed Active Directory or an Amazon Web Services Managed Active Directory.
        IsSharedActiveDirectory:
          $ref: "#/components/schemas/Boolean"
          description: Whether this directory is shared from an Amazon Web Services Managed Active Directory. The default value is false.
    Directory:
      type: string
      pattern: (d|sd)-[0-9a-f]{10}
    ActiveDirectorySettings:
      description: Contains network access and credential details that are needed for user administration in the Active Directory.
      type: object
      properties:
        DomainName:
          $ref: "#/components/schemas/String"
          description: The domain name for the Active Directory.
        DomainIpv4List:
          $ref: "#/components/schemas/ActiveDirectorySettingsDomainIpv4ListList"
          description: A list of domain IPv4 addresses that are used for the Active Directory.
        DomainIpv6List:
          $ref: "#/components/schemas/ActiveDirectorySettingsDomainIpv6ListList"
          description: A list of domain IPv6 addresses that are used for the Active Directory.
        DomainCredentialsProvider:
          $ref: "#/components/schemas/CredentialsProvider"
          description: Points to the CredentialsProvider resource that contains information about the credential provider for user administration.
        DomainNetworkSettings:
          $ref: "#/components/schemas/DomainNetworkSettings"
          description: The DomainNetworkSettings resource contains an array of subnets that apply for the Active Directory.
    ActiveDirectorySettingsDomainIpv4ListList:
      type: array
      items:
        $ref: "#/components/schemas/IpV4"
    IpV4:
      type: string
      pattern: (?:(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9][0-9]|[0-9])(\.(?!$)|$)){4}
    ActiveDirectorySettingsDomainIpv6ListList:
      type: array
      items:
        $ref: "#/components/schemas/IpV6"
    IpV6:
      type: string
      pattern: ([0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}|::|::[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}
    CredentialsProvider:
      description: Contains information about the credential provider for user administration.
      type: object
      properties:
        SecretsManagerCredentialsProvider:
          $ref: "#/components/schemas/SecretsManagerCredentialsProvider"
          description: Identifies the Secrets Manager secret that contains credentials needed for user administration in the Active Directory.
    SecretsManagerCredentialsProvider:
      description: Contains a credentials secret that's stored in Secrets Manager.
      type: object
      properties:
        SecretId:
          $ref: "#/components/schemas/SecretsManagerCredentialsProviderSecretIdString"
          description: The ID of the Secrets Manager secret that contains credentials.
    SecretsManagerCredentialsProviderSecretIdString:
      type: string
      minLength: 1
    DomainNetworkSettings:
      description: Contains network settings for the Active Directory domain.
      type: object
      properties:
        Subnets:
          $ref: "#/components/schemas/DomainNetworkSettingsSubnetsList"
          description: Contains a list of subnets that apply for the Active Directory domain.
      required:
        - Subnets
    DomainNetworkSettingsSubnetsList:
      type: array
      items:
        $ref: "#/components/schemas/Subnet"
    Subnet:
      type: string
      pattern: subnet-[a-z0-9]{8,17}.*
    ActiveDirectoryType:
      type: string
      enum:
        - SELF_MANAGED
        - AWS_MANAGED
    Boolean:
      type: boolean
    Tags:
      type: object
      properties: {}
    AssociateUserResponse:
      type: object
      properties:
        InstanceUserSummary:
          $ref: "#/components/schemas/InstanceUserSummary"
          description: Metadata that describes the associate user operation.
      required:
        - InstanceUserSummary
    InstanceUserSummary:
      description: Describes users of an EC2 instance providing user-based subscriptions.
      type: object
      properties:
        Username:
          $ref: "#/components/schemas/String"
          description: The user name from the identity provider for the user.
        InstanceId:
          $ref: "#/components/schemas/String"
          description: The ID of the EC2 instance that provides user-based subscriptions.
        IdentityProvider:
          $ref: "#/components/schemas/IdentityProvider"
          description: The IdentityProvider resource specifies details about the identity provider.
        Status:
          $ref: "#/components/schemas/String"
          description: The status of a user associated with an EC2 instance.
        InstanceUserArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that identifies the instance user.
        StatusMessage:
          $ref: "#/components/schemas/String"
          description: The status message for users of an EC2 instance.
        Domain:
          $ref: "#/components/schemas/String"
          description: The domain name of the Active Directory that contains the user information for the product subscription.
        AssociationDate:
          $ref: "#/components/schemas/String"
          description: The date a user was associated with an EC2 instance.
        DisassociationDate:
          $ref: "#/components/schemas/String"
          description: The date a user was disassociated from an EC2 instance.
      required:
        - Username
        - InstanceId
        - IdentityProvider
        - Status
    Arn:
      type: string
      pattern: arn:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{1,63}:[a-zA-Z0-9-\.]{1,510}/[a-zA-Z0-9-\.]{1,510}
    LicenseServerSettings:
      description: The settings to configure your license server.
      type: object
      properties:
        ServerType:
          $ref: "#/components/schemas/ServerType"
          description: The type of license server.
        ServerSettings:
          $ref: "#/components/schemas/ServerSettings"
          description: The ServerSettings resource contains the settings for your server.
      required:
        - ServerType
        - ServerSettings
    ServerType:
      type: string
      enum:
        - RDS_SAL
    ServerSettings:
      description: Contains settings for a specific server.
      type: object
      properties:
        RdsSalSettings:
          $ref: "#/components/schemas/RdsSalSettings"
          description: The RdsSalSettings resource contains settings to configure a specific Remote Desktop Services (RDS) license server.
    RdsSalSettings:
      description: Server settings that are specific to a Remote Desktop Services (RDS) license server.
      type: object
      properties:
        RdsSalCredentialsProvider:
          $ref: "#/components/schemas/CredentialsProvider"
          description: The CredentialsProvider resource contains a reference to the credentials provider that's used for RDS license server user administration.
      required:
        - RdsSalCredentialsProvider
    CreateLicenseServerEndpointResponse:
      type: object
      properties:
        IdentityProviderArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the identity provider specified in the request.
        LicenseServerEndpointArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the LicenseServerEndpoint resource.
    DeleteLicenseServerEndpointResponse:
      type: object
      properties:
        LicenseServerEndpoint:
          $ref: "#/components/schemas/LicenseServerEndpoint"
          description: Shows details from the LicenseServerEndpoint resource that was deleted.
    LicenseServerEndpoint:
      description: Contains details about a network endpoint for a Remote Desktop Services (RDS) license server.
      type: object
      properties:
        IdentityProviderArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the identity provider that's associated with the RDS license server endpoint.
        ServerType:
          $ref: "#/components/schemas/ServerType"
          description: The type of license server.
        ServerEndpoint:
          $ref: "#/components/schemas/ServerEndpoint"
          description: The ServerEndpoint resource contains the network address of the RDS license server endpoint.
        StatusMessage:
          $ref: "#/components/schemas/String"
          description: The message associated with the provisioning status, if there is one.
        LicenseServerEndpointId:
          $ref: "#/components/schemas/LicenseServerEndpointId"
          description: The ID of the license server endpoint.
        LicenseServerEndpointArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the ServerEndpoint resource for the RDS license server.
        LicenseServerEndpointProvisioningStatus:
          $ref: "#/components/schemas/LicenseServerEndpointProvisioningStatus"
          description: The current state of the provisioning process for the RDS license server endpoint
        LicenseServers:
          $ref: "#/components/schemas/LicenseServerList"
          description: An array of LicenseServer resources that represent the license servers that are accessed through this endpoint.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when License Manager created the license server endpoint.
    ServerEndpoint:
      description: A network endpoint through which you can access one or more servers.
      type: object
      properties:
        Endpoint:
          $ref: "#/components/schemas/String"
          description: The network address of the endpoint.
    LicenseServerEndpointId:
      type: string
    LicenseServerEndpointProvisioningStatus:
      type: string
      enum:
        - PROVISIONING
        - PROVISIONING_FAILED
        - PROVISIONED
        - DELETING
        - DELETION_FAILED
        - DELETED
    LicenseServerList:
      type: array
      items:
        $ref: "#/components/schemas/LicenseServer"
    LicenseServer:
      description: Information about a Remote Desktop Services (RDS) license server.
      type: object
      properties:
        ProvisioningStatus:
          $ref: "#/components/schemas/LicenseServerEndpointProvisioningStatus"
          description: The current state of the provisioning process for the RDS license server.
        HealthStatus:
          $ref: "#/components/schemas/LicenseServerHealthStatus"
          description: The health status of the RDS license server.
        Ipv4Address:
          $ref: "#/components/schemas/String"
          description: A list of domain IPv4 addresses that are used for the RDS license server.
        Ipv6Address:
          $ref: "#/components/schemas/String"
          description: A list of domain IPv6 addresses that are used for the RDS license server.
    LicenseServerHealthStatus:
      type: string
      enum:
        - HEALTHY
        - UNHEALTHY
        - NOT_APPLICABLE
    Timestamp:
      type: string
      format: date-time
    DeregisterIdentityProviderResponse:
      type: object
      properties:
        IdentityProviderSummary:
          $ref: "#/components/schemas/IdentityProviderSummary"
          description: Metadata that describes the results of an identity provider operation.
      required:
        - IdentityProviderSummary
    IdentityProviderSummary:
      description: Describes an identity provider.
      type: object
      properties:
        IdentityProvider:
          $ref: "#/components/schemas/IdentityProvider"
          description: The IdentityProvider resource contains information about an identity provider.
        Settings:
          $ref: "#/components/schemas/Settings"
          description: The Settings resource contains details about the registered identity provider’s product related configuration settings, such as the subnets to provision VPC endpoints.
        Product:
          $ref: "#/components/schemas/String"
          description: The name of the user-based subscription product.
        Status:
          $ref: "#/components/schemas/String"
          description: The status of the identity provider.
        IdentityProviderArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the identity provider.
        FailureMessage:
          $ref: "#/components/schemas/String"
          description: The failure message associated with an identity provider.
        OwnerAccountId:
          $ref: "#/components/schemas/String"
          description: The AWS Account ID of the owner of this resource.
      required:
        - IdentityProvider
        - Settings
        - Product
        - Status
    Settings:
