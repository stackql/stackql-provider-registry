            $ref: "#/components/schemas/ResourceId"
          description: ID of the DNS view.
        - name: filters
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Filters"
          description: Values to filter the results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFirewallRulesOutput"
  /global-resolver:
    post:
      operationId: CreateGlobalResolver
      description: Creates a new Route 53 Global Resolver instance. A Route 53 Global Resolver is a global, internet-accessible DNS resolver that provides secure DNS resolution for both public and private domains through global anycast IP addresses. Route 53 Global Resolver is a global service that supports resolvers in multiple Amazon Web Services Regions but you must specify the US East (Ohio) Region to create, update, or otherwise work with Route 53 Global Resolver resources. That is, for example, specify --region us-east-2 on Amazon Web Services CLI commands.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                description:
                  $ref: "#/components/schemas/ResourceDescription"
                ipAddressType:
                  $ref: "#/components/schemas/GlobalResolverIpAddressType"
                name:
                  $ref: "#/components/schemas/ResourceName"
                observabilityRegion:
                  $ref: "#/components/schemas/Region"
                regions:
                  $ref: "#/components/schemas/Regions"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - name
