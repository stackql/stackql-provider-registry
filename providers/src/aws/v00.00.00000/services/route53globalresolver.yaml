components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    HostedZoneId:
      type: string
      minLength: 1
      maxLength: 32
    ResourceArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:[-.a-z0-9]{1,63}:[-.a-z0-9]{1,63}:[-.a-z0-9]{0,63}:[-.a-z0-9]{0,63}:[^/].{0,1023}
    ResourceName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: (?!^[0-9]+$)([a-zA-Z0-9-_/' ']+)
    AssociateHostedZoneOutput:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
          description: ID of the association.
        resourceArn:
          $ref: "#/components/schemas/ResourceArn"
          description: An Amazon Resource Name (ARN) of the Route 53 Global Resolver the private hosted zone is associated to.
        hostedZoneId:
          $ref: "#/components/schemas/HostedZoneId"
          description: ID of the private hosted zone.
        hostedZoneName:
          $ref: "#/components/schemas/HostedZoneName"
          description: Name of the hosted zone (also the domain associated with the hosted zone).
        name:
          $ref: "#/components/schemas/ResourceName"
          description: Name for the private hosted zone association.
        createdAt:
          $ref: "#/components/schemas/ISO8601TimeString"
          description: The date and time the private hosted zone association was created.
        updatedAt:
          $ref: "#/components/schemas/ISO8601TimeString"
          description: The date and time the private hosted zone association was modified.
        status:
          $ref: "#/components/schemas/HostedZoneAssociationStatus"
          description: Aggregate status for all the Amazon Web Services Regions in which the Route 53 Global Resolver exists.
      required:
        - id
        - resourceArn
        - hostedZoneId
        - hostedZoneName
        - name
        - createdAt
        - updatedAt
        - status
    ResourceId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[-.a-zA-Z0-9]+"
    HostedZoneName:
      type: string
      minLength: 1
      maxLength: 1024
    ISO8601TimeString:
      type: string
      format: date-time
    HostedZoneAssociationStatus:
      type: string
      enum:
        - CREATING
        - OPERATIONAL
        - DELETING
    BatchCreateFirewallRuleInputItems:
      type: array
      items:
        $ref: "#/components/schemas/BatchCreateFirewallRuleInputItem"
    BatchCreateFirewallRuleInputItem:
      description: Information about a DNS Firewall rule to create in a batch operation.
      type: object
      properties:
        action:
          $ref: "#/components/schemas/FirewallRuleAction"
          description: The action to take when a DNS query matches the firewall rule.
        blockOverrideDnsType:
          $ref: "#/components/schemas/BlockOverrideDnsQueryType"
          description: The DNS record type for the custom response when the action is BLOCK.
        blockOverrideDomain:
          $ref: "#/components/schemas/Domain"
          description: The custom domain name for the BLOCK response.
        blockOverrideTtl:
          $ref: "#/components/schemas/BlockOverrideTtl"
          description: The TTL value for the custom response when the action is BLOCK.
        blockResponse:
          $ref: "#/components/schemas/FirewallBlockResponse"
          description: The type of block response to return when the action is BLOCK.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: A unique string that identifies the request and ensures idempotency.
        confidenceThreshold:
