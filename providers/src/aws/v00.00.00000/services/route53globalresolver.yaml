          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the Route 53 Global Resolver to associate with this DNS view.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                name:
                  $ref: "#/components/schemas/ResourceName"
                dnssecValidation:
                  $ref: "#/components/schemas/DnsSecValidationType"
                ednsClientSubnet:
                  $ref: "#/components/schemas/EdnsClientSubnetType"
                firewallRulesFailOpen:
                  $ref: "#/components/schemas/FirewallRulesFailOpenType"
                description:
                  $ref: "#/components/schemas/ResourceDescription"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - name
