  /access-sources:
    post:
      operationId: CreateAccessSource
      description: Creates an access source for a DNS view. Access sources define IP addresses or CIDR ranges that are allowed to send DNS queries to the Route 53 Global Resolver, along with the permitted DNS protocols. Route 53 Global Resolver is a global service that supports resolvers in multiple Amazon Web Services Regions but you must specify the US East (Ohio) Region to create, update, or otherwise work with Route 53 Global Resolver resources. That is, for example, specify --region us-east-2 on Amazon Web Services CLI commands.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cidr:
                  $ref: "#/components/schemas/Cidr"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                ipAddressType:
                  $ref: "#/components/schemas/IpAddressType"
                name:
                  $ref: "#/components/schemas/ResourceNameShort"
                dnsViewId:
                  $ref: "#/components/schemas/ResourceId"
                protocol:
                  $ref: "#/components/schemas/DnsProtocol"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - cidr
                - dnsViewId
                - protocol
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccessSourceOutput"
    get:
      operationId: ListAccessSources
      description: Lists all access sources with pagination support. Route 53 Global Resolver is a global service that supports resolvers in multiple Amazon Web Services Regions but you must specify the US East (Ohio) Region to create, update, or otherwise work with Route 53 Global Resolver resources. That is, for example, specify --region us-east-2 on Amazon Web Services CLI commands.
      parameters:
        - name: max_results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The maximum number of results to retrieve in a single call.
        - name: next_token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A pagination token used for large sets of results that can't be returned in a single response.
        - name: filters
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Filters"
          description: Values to filter the results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccessSourcesOutput"
  /tokens/{dns_view_id}:
    post:
      operationId: CreateAccessToken
      description: Creates an access token for a DNS view. Access tokens provide token-based authentication for DNS-over-HTTPS (DoH) and DNS-over-TLS (DoT) connections to the Route 53 Global Resolver. Route 53 Global Resolver is a global service that supports resolvers in multiple Amazon Web Services Regions but you must specify the US East (Ohio) Region to create, update, or otherwise work with Route 53 Global Resolver resources. That is, for example, specify --region us-east-2 on Amazon Web Services CLI commands.
      parameters:
