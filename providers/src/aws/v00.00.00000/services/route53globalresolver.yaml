openapi: 3.0.0
info:
  version: "2022-09-27"
  title: Amazon Route 53 Global Resolver
  description: Amazon Route 53 Global Resolver
  x-serviceName: route53globalresolver
  x-serviceAlias: route53globalresolver
  x-protocol: rest-json
  x-apiVersion: "2022-09-27"
  x-endpointPrefix: route53globalresolver
servers:
  - url: https://route53globalresolver.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for route53globalresolver
paths:
  /hosted-zone-associations/{hosted_zone_id}:
    post:
      operationId: AssociateHostedZone
      description: Associates a Route 53 private hosted zone with a Route 53 Global Resolver resource. This allows the resolver to resolve DNS queries for the private hosted zone from anywhere globally. Route 53 Global Resolver is a global service that supports resolvers in multiple Amazon Web Services Regions but you must specify the US East (Ohio) Region to create, update, or otherwise work with Route 53 Global Resolver resources. That is, for example, specify --region us-east-2 on Amazon Web Services CLI commands.
      parameters:
        - name: hosted_zone_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/HostedZoneId"
          description: The ID of the Route 53 private hosted zone to associate with the Route 53 Global Resolver resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                name:
                  $ref: "#/components/schemas/ResourceName"
              required:
                - resourceArn
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateHostedZoneOutput"
  /firewall-rules/batch-create:
    post:
      operationId: BatchCreateFirewallRule
      description: Creates multiple DNS firewall rules in a single operation. This is more efficient than creating rules individually when you need to set up multiple rules at once. Route 53 Global Resolver is a global service that supports resolvers in multiple Amazon Web Services Regions but you must specify the US East (Ohio) Region to create, update, or otherwise work with Route 53 Global Resolver resources. That is, for example, specify --region us-east-2 on Amazon Web Services CLI commands.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firewallRules:
                  $ref: "#/components/schemas/BatchCreateFirewallRuleInputItems"
              required:
                - firewallRules
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateFirewallRuleOutput"
  /firewall-rules/batch-delete:
    post:
      operationId: BatchDeleteFirewallRule
      description: Deletes multiple DNS firewall rules in a single operation. This is more efficient than deleting rules individually. Route 53 Global Resolver is a global service that supports resolvers in multiple Amazon Web Services Regions but you must specify the US East (Ohio) Region to create, update, or otherwise work with Route 53 Global Resolver resources. That is, for example, specify --region us-east-2 on Amazon Web Services CLI commands.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firewallRules:
