          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteFirewallRuleOutput"
  /firewall-rules/batch-update:
    post:
      operationId: BatchUpdateFirewallRule
      description: Updates multiple DNS firewall rules in a single operation. This is more efficient than updating rules individually. Route 53 Global Resolver is a global service that supports resolvers in multiple Amazon Web Services Regions but you must specify the US East (Ohio) Region to create, update, or otherwise work with Route 53 Global Resolver resources. That is, for example, specify --region us-east-2 on Amazon Web Services CLI commands.
