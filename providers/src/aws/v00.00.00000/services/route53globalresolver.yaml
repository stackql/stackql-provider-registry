          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the Route 53 Global Resolver that the domain list will be associated with.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                description:
                  $ref: "#/components/schemas/ResourceDescription"
                name:
                  $ref: "#/components/schemas/ResourceName"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
