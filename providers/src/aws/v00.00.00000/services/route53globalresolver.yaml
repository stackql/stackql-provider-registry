                name:
                  $ref: "#/components/schemas/ResourceName"
                priority:
                  $ref: "#/components/schemas/FirewallRulePriority"
                dnsViewId:
                  $ref: "#/components/schemas/ResourceId"
                qType:
                  $ref: "#/components/schemas/DnsQueryType"
              required:
                - action
                - name
                - dnsViewId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFirewallRuleOutput"
    get:
      operationId: ListFirewallRules
      description: Lists all DNS firewall rules for a DNS view with pagination support. Route 53 Global Resolver is a global service that supports resolvers in multiple Amazon Web Services Regions but you must specify the US East (Ohio) Region to create, update, or otherwise work with Route 53 Global Resolver resources. That is, for example, specify --region us-east-2 on Amazon Web Services CLI commands.
      parameters:
        - name: max_results
          in: query
