          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the DNS view to associate with this token.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                expiresAt:
                  $ref: "#/components/schemas/ISO8601TimeString"
                name:
                  $ref: "#/components/schemas/ResourceNameShort"
                tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccessTokenOutput"
  /dns-views/{global_resolver_id}:
    post:
      operationId: CreateDNSView
      description: Creates a DNS view within a Route 53 Global Resolver. A DNS view models end users, user groups, networks, and devices, and serves as a parent resource that holds configurations controlling access, authorization, DNS firewall rules, and forwarding rules. Route 53 Global Resolver is a global service that supports resolvers in multiple Amazon Web Services Regions but you must specify the US East (Ohio) Region to create, update, or otherwise work with Route 53 Global Resolver resources. That is, for example, specify --region us-east-2 on Amazon Web Services CLI commands.
      parameters:
