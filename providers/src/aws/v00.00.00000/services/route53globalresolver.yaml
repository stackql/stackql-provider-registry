          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The maximum number of Route 53 Global Resolver instances to return in the response. Valid range is 1-100.
        - name: next_token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token for the next page of results. This value is returned in the response if there are more results to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGlobalResolversOutput"
  /access-sources/{access_source_id}:
