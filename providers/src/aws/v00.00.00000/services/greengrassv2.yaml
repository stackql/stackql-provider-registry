openapi: 3.0.0
info:
  version: "2020-11-30"
  title: AWS IoT Greengrass V2
  description: AWS IoT Greengrass V2
  x-serviceName: greengrass
  x-serviceAlias: greengrassv2
  x-protocol: rest-json
  x-apiVersion: "2020-11-30"
  x-endpointPrefix: greengrass
servers:
  - url: https://greengrass.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for greengrassv2
paths:
  /greengrass/servicerole:
    put:
      operationId: AssociateServiceRoleToAccount
      description: Associates a Greengrass service role with IoT Greengrass for your Amazon Web Services account in this Amazon Web Services Region. IoT Greengrass uses this role to verify the identity of client devices and manage core device connectivity information. The role must include the AWSGreengrassResourceAccessRolePolicy managed policy or a custom policy that defines equivalent permissions for the IoT Greengrass features that you use. For more information, see Greengrass service role in the IoT Greengrass Version 2 Developer Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roleArn:
                  $ref: "#/components/schemas/String"
              required:
                - roleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateServiceRoleToAccountResponse"
    delete:
      operationId: DisassociateServiceRoleFromAccount
      description: Disassociates the Greengrass service role from IoT Greengrass for your Amazon Web Services account in this Amazon Web Services Region. Without a service role, IoT Greengrass can't verify the identity of client devices or manage core device connectivity information. For more information, see Greengrass service role in the IoT Greengrass Version 2 Developer Guide.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateServiceRoleFromAccountResponse"
    get:
      operationId: GetServiceRoleForAccount
      description: Gets the service role associated with IoT Greengrass for your Amazon Web Services account in this Amazon Web Services Region. IoT Greengrass uses this role to verify the identity of client devices and manage core device connectivity information. For more information, see Greengrass service role in the IoT Greengrass Version 2 Developer Guide.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetServiceRoleForAccountResponse"
  /greengrass/v2/coreDevices/{core_device_thing_name}/associateClientDevices:
    post:
      operationId: BatchAssociateClientDeviceWithCoreDevice
      description: Associates a list of client devices with a core device. Use this API operation to specify which client devices can discover a core device through cloud discovery. With cloud discovery, client devices connect to IoT Greengrass to retrieve associated core devices' connectivity information and certificates. For more information, see Configure cloud discovery in the IoT Greengrass V2 Developer Guide. Client devices are local IoT devices that connect to and communicate with an IoT Greengrass core device over MQTT. You can connect client devices to a core device to sync MQTT messages and data to Amazon Web Services IoT Core and interact with client devices in Greengrass components. For more information, see Interact with local IoT devices in the IoT Greengrass V2 Developer Guide.
      parameters:
        - name: core_device_thing_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IoTThingName"
          description: The name of the core device. This is also the name of the IoT thing.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                entries:
                  $ref: "#/components/schemas/AssociateClientDeviceWithCoreDeviceEntryList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAssociateClientDeviceWithCoreDeviceResponse"
  /greengrass/v2/coreDevices/{core_device_thing_name}/disassociateClientDevices:
    post:
      operationId: BatchDisassociateClientDeviceFromCoreDevice
      description: Disassociates a list of client devices from a core device. After you disassociate a client device from a core device, the client device won't be able to use cloud discovery to retrieve the core device's connectivity information and certificates.
      parameters:
        - name: core_device_thing_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IoTThingName"
          description: The name of the core device. This is also the name of the IoT thing.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                entries:
                  $ref: "#/components/schemas/DisassociateClientDeviceFromCoreDeviceEntryList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDisassociateClientDeviceFromCoreDeviceResponse"
  /greengrass/v2/deployments/{deployment_id}/cancel:
    post:
      operationId: CancelDeployment
      description: Cancels a deployment. This operation cancels the deployment for devices that haven't yet received it. If a device already received the deployment, this operation doesn't change anything for that device.
      parameters:
        - name: deployment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the deployment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelDeploymentResponse"
  /greengrass/v2/createComponentVersion:
    post:
      operationId: CreateComponentVersion
      description: "Creates a component. Components are software that run on Greengrass core devices. After you develop and test a component on your core device, you can use this operation to upload your component to IoT Greengrass. Then, you can deploy the component to other core devices. You can use this operation to do the following: Create components from recipes Create a component from a recipe, which is a file that defines the component's metadata, parameters, dependencies, lifecycle, artifacts, and platform capability. For more information, see IoT Greengrass component recipe reference in the IoT Greengrass V2 Developer Guide. To create a component from a recipe, specify inlineRecipe when you call this operation. Create components from Lambda functions Create a component from an Lambda function that runs on IoT Greengrass. This creates a recipe and artifacts from the Lambda function's deployment package. You can use this operation to migrate Lambda functions from IoT Greengrass V1 to IoT Greengrass V2. This function accepts Lambda functions in all supported versions of Python, Node.js, and Java runtimes. IoT Greengrass doesn't apply any additional restrictions on deprecated Lambda runtime versions. To create a component from a Lambda function, specify lambdaFunction when you call this operation. IoT Greengrass currently supports Lambda functions on only Linux core devices."
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                inlineRecipe:
                  $ref: "#/components/schemas/RecipeBlob"
                lambdaFunction:
                  $ref: "#/components/schemas/LambdaFunctionRecipeSource"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientTokenString"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateComponentVersionResponse"
  /greengrass/v2/deployments:
    post:
      operationId: CreateDeployment
      description: Creates a continuous deployment for a target, which is a Greengrass core device or group of core devices. When you add a new core device to a group of core devices that has a deployment, IoT Greengrass deploys that group's deployment to the new device. You can define one deployment for each target. When you create a new deployment for a target that has an existing deployment, you replace the previous deployment. IoT Greengrass applies the new deployment to the target devices. Every deployment has a revision number that indicates how many deployment revisions you define for a target. Use this operation to create a new revision of an existing deployment. For more information, see the Create deployments in the IoT Greengrass V2 Developer Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetArn:
                  $ref: "#/components/schemas/TargetARN"
                deploymentName:
                  $ref: "#/components/schemas/DeploymentNameString"
                components:
                  $ref: "#/components/schemas/ComponentDeploymentSpecifications"
                iotJobConfiguration:
                  $ref: "#/components/schemas/DeploymentIoTJobConfiguration"
                deploymentPolicies:
                  $ref: "#/components/schemas/DeploymentPolicies"
                parentTargetArn:
                  $ref: "#/components/schemas/ThingGroupARN"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientTokenString"
              required:
                - targetArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDeploymentResponse"
    get:
      operationId: ListDeployments
      description: Retrieves a paginated list of deployments.
      parameters:
        - name: targetArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TargetARN"
          description: The ARN of the target IoT thing or thing group.
        - name: historyFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DeploymentHistoryFilter"
          description: "The filter for the list of deployments. Choose one of the following options: ALL – The list includes all deployments. LATEST_ONLY – The list includes only the latest revision of each deployment. Default: LATEST_ONLY"
        - name: parentTargetArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ThingGroupARN"
          description: The parent deployment's target ARN within a subdeployment.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DefaultMaxResults"
          description: "The maximum number of results to be returned per paginated request. Default: 50"
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextTokenString"
          description: The token to be used for the next set of paginated results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDeploymentsResponse"
  /greengrass/v2/components/{arn}:
    delete:
      operationId: DeleteComponent
      description: Deletes a version of a component from IoT Greengrass. This operation deletes the component's recipe and artifacts. As a result, deployments that refer to this component version will fail. If you have deployments that use this component version, you can remove the component from the deployment or update the deployment to use a valid version.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ComponentVersionARN"
          description: The ARN of the component version.
      responses:
        "204":
          description: Success
    get:
      operationId: GetComponent
      description: Gets the recipe for a version of a component.
      parameters:
        - name: recipeOutputFormat
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecipeOutputFormat"
          description: The format of the recipe.
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ComponentVersionARN"
          description: The ARN of the component version.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetComponentResponse"
  /greengrass/v2/coreDevices/{core_device_thing_name}:
    delete:
      operationId: DeleteCoreDevice
      description: Deletes a Greengrass core device, which is an IoT thing. This operation removes the core device from the list of core devices. This operation doesn't delete the IoT thing. For more information about how to delete the IoT thing, see DeleteThing in the IoT API Reference.
      parameters:
        - name: core_device_thing_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CoreDeviceThingName"
          description: The name of the core device. This is also the name of the IoT thing.
      responses:
        "204":
          description: Success
    get:
      operationId: GetCoreDevice
      description: "Retrieves metadata for a Greengrass core device. IoT Greengrass relies on individual devices to send status updates to the Amazon Web Services Cloud. If the IoT Greengrass Core software isn't running on the device, or if device isn't connected to the Amazon Web Services Cloud, then the reported status of that device might not reflect its current status. The status timestamp indicates when the device status was last updated. Core devices send status updates at the following times: When the IoT Greengrass Core software starts When the core device receives a deployment from the Amazon Web Services Cloud When the status of any component on the core device becomes BROKEN At a regular interval that you can configure, which defaults to 24 hours For IoT Greengrass Core v2.7.0, the core device sends status updates upon local deployment and cloud deployment"
      parameters:
        - name: core_device_thing_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CoreDeviceThingName"
          description: The name of the core device. This is also the name of the IoT thing.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCoreDeviceResponse"
  /greengrass/v2/deployments/{deployment_id}:
    delete:
      operationId: DeleteDeployment
      description: Deletes a deployment. To delete an active deployment, you must first cancel it. For more information, see CancelDeployment. Deleting a deployment doesn't affect core devices that run that deployment, because core devices store the deployment's configuration on the device. Additionally, core devices can roll back to a previous deployment that has been deleted.
      parameters:
        - name: deployment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the deployment.
      responses:
        "204":
          description: Success
    get:
      operationId: GetDeployment
      description: Gets a deployment. Deployments define the components that run on Greengrass core devices.
      parameters:
        - name: deployment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the deployment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDeploymentResponse"
  /greengrass/v2/components/{arn}/metadata:
    get:
      operationId: DescribeComponent
      description: Retrieves metadata for a version of a component.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ComponentVersionARN"
          description: The ARN of the component version.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeComponentResponse"
  /greengrass/v2/components/{arn}/artifacts/{artifact_name}:
    get:
      operationId: GetComponentVersionArtifact
      description: Gets the pre-signed URL to download a public or a Lambda component artifact. Core devices call this operation to identify the URL that they can use to download an artifact to install.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ComponentVersionARN"
          description: The ARN of the component version. Specify the ARN of a public or a Lambda component version.
        - name: artifact_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The name of the artifact. You can use the GetComponent operation to download the component recipe, which includes the URI of the artifact. The artifact name is the section of the URI after the scheme. For example, in the artifact URI greengrass:SomeArtifact.zip, the artifact name is SomeArtifact.zip.
        - name: s3EndpointType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/S3EndpointType"
          description: Specifies the endpoint to use when getting Amazon S3 pre-signed URLs. All Amazon Web Services Regions except US East (N. Virginia) use REGIONAL in all cases. In the US East (N. Virginia) Region the default is GLOBAL, but you can change it to REGIONAL with this parameter.
        - name: x-amz-iot-endpoint-type
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/IotEndpointType"
          description: Determines if the Amazon S3 URL returned is a FIPS pre-signed URL endpoint. Specify fips if you want the returned Amazon S3 pre-signed URL to point to an Amazon S3 FIPS endpoint. If you don't specify a value, the default is standard.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetComponentVersionArtifactResponse"
  /greengrass/things/{thing_name}/connectivityInfo:
    get:
      operationId: GetConnectivityInfo
      description: Retrieves connectivity information for a Greengrass core device. Connectivity information includes endpoints and ports where client devices can connect to an MQTT broker on the core device. When a client device calls the IoT Greengrass discovery API, IoT Greengrass returns connectivity information for all of the core devices where the client device can connect. For more information, see Connect client devices to core devices in the IoT Greengrass Version 2 Developer Guide.
      parameters:
        - name: thing_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CoreDeviceThingName"
          description: The name of the core device. This is also the name of the IoT thing.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectivityInfoResponse"
    put:
      operationId: UpdateConnectivityInfo
      description: Updates connectivity information for a Greengrass core device. Connectivity information includes endpoints and ports where client devices can connect to an MQTT broker on the core device. When a client device calls the IoT Greengrass discovery API, IoT Greengrass returns connectivity information for all of the core devices where the client device can connect. For more information, see Connect client devices to core devices in the IoT Greengrass Version 2 Developer Guide.
      parameters:
        - name: thing_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CoreDeviceThingName"
          description: The name of the core device. This is also the name of the IoT thing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connectivityInfo:
                  $ref: "#/components/schemas/connectivityInfoList"
              required:
                - connectivityInfo
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateConnectivityInfoResponse"
  /greengrass/v2/coreDevices/{core_device_thing_name}/associatedClientDevices:
    get:
      operationId: ListClientDevicesAssociatedWithCoreDevice
      description: Retrieves a paginated list of client devices that are associated with a core device.
      parameters:
        - name: core_device_thing_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IoTThingName"
          description: The name of the core device. This is also the name of the IoT thing.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DefaultMaxResults"
          description: The maximum number of results to be returned per paginated request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextTokenString"
          description: The token to be used for the next set of paginated results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListClientDevicesAssociatedWithCoreDeviceResponse"
  /greengrass/v2/components/{arn}/versions:
    get:
      operationId: ListComponentVersions
      description: Retrieves a paginated list of all versions for a component. Greater versions are listed first.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ComponentARN"
          description: The ARN of the component.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DefaultMaxResults"
          description: The maximum number of results to be returned per paginated request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextTokenString"
          description: The token to be used for the next set of paginated results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListComponentVersionsResponse"
  /greengrass/v2/components:
    get:
      operationId: ListComponents
      description: Retrieves a paginated list of component summaries. This list includes components that you have permission to view.
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ComponentVisibilityScope"
          description: "The scope of the components to list. Default: PRIVATE"
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DefaultMaxResults"
          description: The maximum number of results to be returned per paginated request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextTokenString"
          description: The token to be used for the next set of paginated results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListComponentsResponse"
  /greengrass/v2/coreDevices:
    get:
      operationId: ListCoreDevices
      description: "Retrieves a paginated list of Greengrass core devices. IoT Greengrass relies on individual devices to send status updates to the Amazon Web Services Cloud. If the IoT Greengrass Core software isn't running on the device, or if device isn't connected to the Amazon Web Services Cloud, then the reported status of that device might not reflect its current status. The status timestamp indicates when the device status was last updated. Core devices send status updates at the following times: When the IoT Greengrass Core software starts When the core device receives a deployment from the Amazon Web Services Cloud For Greengrass nucleus 2.12.2 and earlier, the core device sends status updates when the status of any component on the core device becomes ERRORED or BROKEN. For Greengrass nucleus 2.12.3 and later, the core device sends status updates when the status of any component on the core device becomes ERRORED, BROKEN, RUNNING, or FINISHED. At a regular interval that you can configure, which defaults to 24 hours For IoT Greengrass Core v2.7.0, the core device sends status updates upon local deployment and cloud deployment"
      parameters:
        - name: thingGroupArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ThingGroupARN"
          description: The ARN of the IoT thing group by which to filter. If you specify this parameter, the list includes only core devices that have successfully deployed a deployment that targets the thing group. When you remove a core device from a thing group, the list continues to include that core device.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CoreDeviceStatus"
          description: "The core device status by which to filter. If you specify this parameter, the list includes only core devices that have this status. Choose one of the following options: HEALTHY – The IoT Greengrass Core software and all components run on the core device without issue. UNHEALTHY – The IoT Greengrass Core software or a component is in a failed state on the core device."
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DefaultMaxResults"
          description: The maximum number of results to be returned per paginated request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextTokenString"
          description: The token to be used for the next set of paginated results.
        - name: runtime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CoreDeviceRuntimeString"
          description: "The runtime to be used by the core device. The runtime can be: aws_nucleus_classic aws_nucleus_lite"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCoreDevicesResponse"
  /greengrass/v2/coreDevices/{core_device_thing_name}/effectiveDeployments:
    get:
      operationId: ListEffectiveDeployments
      description: Retrieves a paginated list of deployment jobs that IoT Greengrass sends to Greengrass core devices.
      parameters:
        - name: core_device_thing_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CoreDeviceThingName"
          description: The name of the core device. This is also the name of the IoT thing.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DefaultMaxResults"
          description: The maximum number of results to be returned per paginated request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextTokenString"
          description: The token to be used for the next set of paginated results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEffectiveDeploymentsResponse"
  /greengrass/v2/coreDevices/{core_device_thing_name}/installedComponents:
    get:
      operationId: ListInstalledComponents
      description: "Retrieves a paginated list of the components that a Greengrass core device runs. By default, this list doesn't include components that are deployed as dependencies of other components. To include dependencies in the response, set the topologyFilter parameter to ALL. IoT Greengrass relies on individual devices to send status updates to the Amazon Web Services Cloud. If the IoT Greengrass Core software isn't running on the device, or if device isn't connected to the Amazon Web Services Cloud, then the reported status of that device might not reflect its current status. The status timestamp indicates when the device status was last updated. Core devices send status updates at the following times: When the IoT Greengrass Core software starts When the core device receives a deployment from the Amazon Web Services Cloud When the status of any component on the core device becomes BROKEN At a regular interval that you can configure, which defaults to 24 hours For IoT Greengrass Core v2.7.0, the core device sends status updates upon local deployment and cloud deployment"
      parameters:
        - name: core_device_thing_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CoreDeviceThingName"
          description: The name of the core device. This is also the name of the IoT thing.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DefaultMaxResults"
          description: The maximum number of results to be returned per paginated request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextTokenString"
          description: The token to be used for the next set of paginated results.
        - name: topologyFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/InstalledComponentTopologyFilter"
          description: "The filter for the list of components. Choose from the following options: ALL – The list includes all components installed on the core device. ROOT – The list includes only root components, which are components that you specify in a deployment. When you choose this option, the list doesn't include components that the core device installs as dependencies of other components. Default: ROOT"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInstalledComponentsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Retrieves the list of tags for an IoT Greengrass resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GenericV2ARN"
          description: The ARN of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds tags to an IoT Greengrass resource. If a tag already exists for the resource, this operation updates the tag's value.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GenericV2ARN"
          description: The ARN of the resource to tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes a tag from an IoT Greengrass resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GenericV2ARN"
          description: The ARN of the resource to untag.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: A list of keys for tags to remove from the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /greengrass/v2/resolveComponentCandidates:
    post:
      operationId: ResolveComponentCandidates
      description: Retrieves a list of components that meet the component, version, and platform requirements of a deployment. Greengrass core devices call this operation when they receive a deployment to identify the components to install. This operation identifies components that meet all dependency requirements for a deployment. If the requirements conflict, then this operation returns an error and the deployment fails. For example, this occurs if component A requires version >2.0.0 and component B requires version <2.0.0 of a component dependency. When you specify the component candidates to resolve, IoT Greengrass compares each component's digest from the core device with the component's digest in the Amazon Web Services Cloud. If the digests don't match, then IoT Greengrass specifies to use the version from the Amazon Web Services Cloud. To use this operation, you must use the data plane API endpoint and authenticate with an IoT device certificate. For more information, see IoT Greengrass endpoints and quotas.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                platform:
                  $ref: "#/components/schemas/ComponentPlatform"
                componentCandidates:
                  $ref: "#/components/schemas/ComponentCandidateList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveComponentCandidatesResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    String:
      type: string
    AssociateServiceRoleToAccountResponse:
      type: object
      properties:
        associatedAt:
          $ref: "#/components/schemas/String"
          description: The time when the service role was associated with IoT Greengrass for your Amazon Web Services account in this Amazon Web Services Region.
    IoTThingName:
      type: string
      minLength: 1
      maxLength: 128
    AssociateClientDeviceWithCoreDeviceEntryList:
      type: array
      items:
        $ref: "#/components/schemas/AssociateClientDeviceWithCoreDeviceEntry"
    AssociateClientDeviceWithCoreDeviceEntry:
      description: Contains a request to associate a client device with a core device. The BatchAssociateClientDeviceWithCoreDevice operation consumes a list of these requests.
      type: object
      properties:
        thingName:
          $ref: "#/components/schemas/IoTThingName"
          description: The name of the IoT thing that represents the client device to associate.
      required:
        - thingName
    BatchAssociateClientDeviceWithCoreDeviceResponse:
      type: object
      properties:
        errorEntries:
          $ref: "#/components/schemas/AssociateClientDeviceWithCoreDeviceErrorList"
          description: The list of any errors for the entries in the request. Each error entry contains the name of the IoT thing that failed to associate.
    AssociateClientDeviceWithCoreDeviceErrorList:
      type: array
      items:
        $ref: "#/components/schemas/AssociateClientDeviceWithCoreDeviceErrorEntry"
    AssociateClientDeviceWithCoreDeviceErrorEntry:
      description: Contains an error that occurs from a request to associate a client device with a core device. The BatchAssociateClientDeviceWithCoreDevice operation returns a list of these errors.
      type: object
      properties:
        thingName:
          $ref: "#/components/schemas/IoTThingName"
          description: The name of the IoT thing whose associate request failed.
        code:
          $ref: "#/components/schemas/NonEmptyString"
          description: The error code for the request.
        message:
          $ref: "#/components/schemas/NonEmptyString"
          description: A message that provides additional information about the error.
    NonEmptyString:
      type: string
      minLength: 1
    DisassociateClientDeviceFromCoreDeviceEntryList:
      type: array
      items:
        $ref: "#/components/schemas/DisassociateClientDeviceFromCoreDeviceEntry"
    DisassociateClientDeviceFromCoreDeviceEntry:
      description: Contains a request to disassociate a client device from a core device. The BatchDisassociateClientDeviceWithCoreDevice operation consumes a list of these requests.
      type: object
      properties:
        thingName:
          $ref: "#/components/schemas/IoTThingName"
          description: The name of the IoT thing that represents the client device to disassociate.
      required:
        - thingName
    BatchDisassociateClientDeviceFromCoreDeviceResponse:
      type: object
      properties:
        errorEntries:
          $ref: "#/components/schemas/DisassociateClientDeviceFromCoreDeviceErrorList"
          description: The list of any errors for the entries in the request. Each error entry contains the name of the IoT thing that failed to disassociate.
    DisassociateClientDeviceFromCoreDeviceErrorList:
      type: array
      items:
        $ref: "#/components/schemas/DisassociateClientDeviceFromCoreDeviceErrorEntry"
    DisassociateClientDeviceFromCoreDeviceErrorEntry:
      description: Contains an error that occurs from a request to disassociate a client device from a core device. The BatchDisassociateClientDeviceWithCoreDevice operation returns a list of these errors.
      type: object
      properties:
        thingName:
          $ref: "#/components/schemas/IoTThingName"
          description: The name of the IoT thing whose disassociate request failed.
        code:
          $ref: "#/components/schemas/NonEmptyString"
          description: The error code for the request.
        message:
          $ref: "#/components/schemas/NonEmptyString"
          description: A message that provides additional information about the error.
    CancelDeploymentResponse:
      type: object
      properties:
        message:
          $ref: "#/components/schemas/NonEmptyString"
          description: A message that communicates if the cancel was successful.
    RecipeBlob:
      type: string
      format: byte
    LambdaFunctionRecipeSource:
      description: Contains information about an Lambda function to import to create a component.
      type: object
      properties:
        lambdaArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the Lambda function. The ARN must include the version of the function to import. You can't use version aliases like $LATEST.
        componentName:
          $ref: "#/components/schemas/ComponentNameString"
          description: The name of the component. Defaults to the name of the Lambda function.
        componentVersion:
          $ref: "#/components/schemas/ComponentVersionString"
          description: The version of the component. Defaults to the version of the Lambda function as a semantic version. For example, if your function version is 3, the component version becomes 3.0.0.
        componentPlatforms:
          $ref: "#/components/schemas/ComponentPlatformList"
          description: The platforms that the component version supports.
        componentDependencies:
          type: object
          properties: {}
          description: The component versions on which this Lambda function component depends.
        componentLambdaParameters:
          $ref: "#/components/schemas/LambdaExecutionParameters"
          description: The system and runtime parameters for the Lambda function as it runs on the Greengrass core device.
      required:
        - lambdaArn
    ComponentNameString:
      type: string
      minLength: 1
      maxLength: 128
    ComponentVersionString:
      type: string
      minLength: 1
      maxLength: 64
    ComponentPlatformList:
      type: array
      items:
        $ref: "#/components/schemas/ComponentPlatform"
    ComponentPlatform:
      description: Contains information about a platform that a component supports.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The friendly name of the platform. This name helps you identify the platform. If you omit this parameter, IoT Greengrass creates a friendly name from the os and architecture of the platform.
        attributes:
          type: object
          properties: {}
          description: A dictionary of attributes for the platform. The IoT Greengrass Core software defines the os and architecture by default. You can specify additional platform attributes for a core device when you deploy the Greengrass nucleus component. For more information, see the Greengrass nucleus component in the IoT Greengrass V2 Developer Guide.
    LambdaExecutionParameters:
      description: Contains parameters for a Lambda function that runs on IoT Greengrass.
      type: object
      properties:
        eventSources:
          $ref: "#/components/schemas/LambdaEventSourceList"
          description: The list of event sources to which to subscribe to receive work messages. The Lambda function runs when it receives a message from an event source. You can subscribe this function to local publish/subscribe messages and Amazon Web Services IoT Core MQTT messages.
        maxQueueSize:
          $ref: "#/components/schemas/OptionalInteger"
          description: The maximum size of the message queue for the Lambda function component. The IoT Greengrass core stores messages in a FIFO (first-in-first-out) queue until it can run the Lambda function to consume each message.
        maxInstancesCount:
          $ref: "#/components/schemas/OptionalInteger"
          description: The maximum number of instances that a non-pinned Lambda function can run at the same time.
        maxIdleTimeInSeconds:
          $ref: "#/components/schemas/OptionalInteger"
          description: The maximum amount of time in seconds that a non-pinned Lambda function can idle before the IoT Greengrass Core software stops its process.
        timeoutInSeconds:
          $ref: "#/components/schemas/OptionalInteger"
          description: The maximum amount of time in seconds that the Lambda function can process a work item.
        statusTimeoutInSeconds:
          $ref: "#/components/schemas/OptionalInteger"
          description: The interval in seconds at which a pinned (also known as long-lived) Lambda function component sends status updates to the Lambda manager component.
        pinned:
          $ref: "#/components/schemas/OptionalBoolean"
          description: "Whether or not the Lambda function is pinned, or long-lived. A pinned Lambda function starts when IoT Greengrass starts and keeps running in its own container. A non-pinned Lambda function starts only when it receives a work item and exists after it idles for maxIdleTimeInSeconds. If the function has multiple work items, the IoT Greengrass Core software creates multiple instances of the function. Default: true"
        inputPayloadEncodingType:
          $ref: "#/components/schemas/LambdaInputPayloadEncodingType"
          description: "The encoding type that the Lambda function supports. Default: json"
        execArgs:
          $ref: "#/components/schemas/LambdaExecArgsList"
          description: The list of arguments to pass to the Lambda function when it runs.
        environmentVariables:
          type: object
          properties: {}
          description: The map of environment variables that are available to the Lambda function when it runs.
        linuxProcessParams:
          $ref: "#/components/schemas/LambdaLinuxProcessParams"
          description: The parameters for the Linux process that contains the Lambda function.
    LambdaEventSourceList:
      type: array
      items:
        $ref: "#/components/schemas/LambdaEventSource"
    LambdaEventSource:
      description: Contains information about an event source for an Lambda function. The event source defines the topics on which this Lambda function subscribes to receive messages that run the function.
      type: object
      properties:
        topic:
          $ref: "#/components/schemas/TopicString"
          description: The topic to which to subscribe to receive event messages.
        type_:
          $ref: "#/components/schemas/LambdaEventSourceType"
          description: "The type of event source. Choose from the following options: PUB_SUB – Subscribe to local publish/subscribe messages. This event source type doesn't support MQTT wildcards (+ and #) in the event source topic. IOT_CORE – Subscribe to Amazon Web Services IoT Core MQTT messages. This event source type supports MQTT wildcards (+ and #) in the event source topic."
      required:
        - topic
        - type_
    TopicString:
      type: string
    LambdaEventSourceType:
      type: string
      enum:
        - PUB_SUB
        - IOT_CORE
    OptionalInteger:
      type: integer
    OptionalBoolean:
      type: boolean
    LambdaInputPayloadEncodingType:
      type: string
      enum:
        - json
        - binary
    LambdaExecArgsList:
      type: array
      items:
        $ref: "#/components/schemas/LambdaExecArg"
    LambdaExecArg:
      type: string
    LambdaLinuxProcessParams:
      description: Contains parameters for a Linux process that contains an Lambda function.
      type: object
      properties:
        isolationMode:
          $ref: "#/components/schemas/LambdaIsolationMode"
          description: "The isolation mode for the process that contains the Lambda function. The process can run in an isolated runtime environment inside the IoT Greengrass container, or as a regular process outside any container. Default: GreengrassContainer"
        containerParams:
          $ref: "#/components/schemas/LambdaContainerParams"
          description: The parameters for the container in which the Lambda function runs.
    LambdaIsolationMode:
      type: string
      enum:
        - GreengrassContainer
        - NoContainer
    LambdaContainerParams:
      description: Contains information about a container in which Lambda functions run on Greengrass core devices.
      type: object
      properties:
        memorySizeInKB:
          $ref: "#/components/schemas/OptionalInteger"
          description: "The memory size of the container, expressed in kilobytes. Default: 16384 (16 MB)"
        mountROSysfs:
          $ref: "#/components/schemas/OptionalBoolean"
          description: "Whether or not the container can read information from the device's /sys folder. Default: false"
        volumes:
          $ref: "#/components/schemas/LambdaVolumeList"
          description: The list of volumes that the container can access.
        devices:
          $ref: "#/components/schemas/LambdaDeviceList"
          description: The list of system devices that the container can access.
    LambdaVolumeList:
      type: array
      items:
        $ref: "#/components/schemas/LambdaVolumeMount"
    LambdaVolumeMount:
      description: Contains information about a volume that Linux processes in a container can access. When you define a volume, the IoT Greengrass Core software mounts the source files to the destination inside the container.
      type: object
      properties:
        sourcePath:
          $ref: "#/components/schemas/FileSystemPath"
          description: The path to the physical volume in the file system.
        destinationPath:
          $ref: "#/components/schemas/FileSystemPath"
          description: The path to the logical volume in the file system.
        permission:
          $ref: "#/components/schemas/LambdaFilesystemPermission"
          description: "The permission to access the volume: read/only (ro) or read/write (rw). Default: ro"
        addGroupOwner:
          $ref: "#/components/schemas/OptionalBoolean"
          description: "Whether or not to add the IoT Greengrass user group as an owner of the volume. Default: false"
      required:
        - sourcePath
        - destinationPath
    FileSystemPath:
      type: string
    LambdaFilesystemPermission:
      type: string
      enum:
        - ro
        - rw
    LambdaDeviceList:
      type: array
      items:
        $ref: "#/components/schemas/LambdaDeviceMount"
    LambdaDeviceMount:
      description: Contains information about a device that Linux processes in a container can access.
      type: object
      properties:
        path:
          $ref: "#/components/schemas/FileSystemPath"
          description: The mount path for the device in the file system.
        permission:
          $ref: "#/components/schemas/LambdaFilesystemPermission"
          description: "The permission to access the device: read/only (ro) or read/write (rw). Default: ro"
        addGroupOwner:
          $ref: "#/components/schemas/OptionalBoolean"
          description: "Whether or not to add the component's system user as an owner of the device. Default: false"
      required:
        - path
    TagMap:
      type: object
      properties: {}
    ClientTokenString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z0-9-]+$
    CreateComponentVersionResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/ComponentVersionARN"
          description: The ARN of the component version.
        componentName:
          $ref: "#/components/schemas/ComponentNameString"
          description: The name of the component.
        componentVersion:
          $ref: "#/components/schemas/ComponentVersionString"
          description: The version of the component.
        creationTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the component was created, expressed in ISO 8601 format.
        status:
          $ref: "#/components/schemas/CloudComponentStatus"
          description: The status of the component version in IoT Greengrass V2. This status is different from the status of the component on a core device.
      required:
        - componentName
        - componentVersion
        - creationTimestamp
        - status
    ComponentVersionARN:
      type: string
      pattern: arn:[^:]*:greengrass:[^:]*:(aws|[0-9]+):components:[^:]+:versions:[^:]+
    Timestamp:
      type: string
      format: date-time
    CloudComponentStatus:
      description: Contains the status of a component version in the IoT Greengrass service.
      type: object
      properties:
        componentState:
          $ref: "#/components/schemas/CloudComponentState"
          description: The state of the component version.
        message:
          $ref: "#/components/schemas/NonEmptyString"
          description: A message that communicates details, such as errors, about the status of the component version.
        errors:
          type: object
          properties: {}
          description: A dictionary of errors that communicate why the component version is in an error state. For example, if IoT Greengrass can't access an artifact for the component version, then errors contains the artifact's URI as a key, and the error message as the value for that key.
        vendorGuidance:
          $ref: "#/components/schemas/VendorGuidance"
          description: "The vendor guidance state for the component version. This state indicates whether the component version has any issues that you should consider before you deploy it. The vendor guidance state can be: ACTIVE – This component version is available and recommended for use. DISCONTINUED – This component version has been discontinued by its publisher. You can deploy this component version, but we recommend that you use a different version of this component. DELETED – This component version has been deleted by its publisher, so you can't deploy it. If you have any existing deployments that specify this component version, those deployments will fail."
        vendorGuidanceMessage:
          $ref: "#/components/schemas/NonEmptyString"
          description: A message that communicates details about the vendor guidance state of the component version. This message communicates why a component version is discontinued or deleted.
    CloudComponentState:
      type: string
      enum:
        - REQUESTED
        - INITIATED
        - DEPLOYABLE
        - FAILED
        - DEPRECATED
    VendorGuidance:
      type: string
      enum:
        - ACTIVE
        - DISCONTINUED
        - DELETED
    TargetARN:
      type: string
      pattern: arn:[^:]*:iot:[^:]*:[0-9]+:(thing|thinggroup)/.+
    DeploymentNameString:
      type: string
      minLength: 1
      maxLength: 256
    ComponentDeploymentSpecifications:
      type: object
      properties: {}
    DeploymentIoTJobConfiguration:
      description: Contains information about an IoT job configuration.
      type: object
      properties:
        jobExecutionsRolloutConfig:
          $ref: "#/components/schemas/IoTJobExecutionsRolloutConfig"
          description: The rollout configuration for the job. This configuration defines the rate at which the job rolls out to the fleet of target devices.
        abortConfig:
          $ref: "#/components/schemas/IoTJobAbortConfig"
          description: The stop configuration for the job. This configuration defines when and how to stop a job rollout.
        timeoutConfig:
          $ref: "#/components/schemas/IoTJobTimeoutConfig"
          description: The timeout configuration for the job. This configuration defines the amount of time each device has to complete the job.
    IoTJobExecutionsRolloutConfig:
      description: Contains information about the rollout configuration for a job. This configuration defines the rate at which the job deploys a configuration to a fleet of target devices.
      type: object
      properties:
        exponentialRate:
          $ref: "#/components/schemas/IoTJobExponentialRolloutRate"
          description: The exponential rate to increase the job rollout rate.
        maximumPerMinute:
          $ref: "#/components/schemas/IoTJobMaxExecutionsPerMin"
          description: The maximum number of devices that receive a pending job notification, per minute.
    IoTJobExponentialRolloutRate:
      description: Contains information about an exponential rollout rate for a configuration deployment job.
      type: object
      properties:
        baseRatePerMinute:
          $ref: "#/components/schemas/IoTJobRolloutBaseRatePerMinute"
          description: The minimum number of devices that receive a pending job notification, per minute, when the job starts. This parameter defines the initial rollout rate of the job.
        incrementFactor:
          $ref: "#/components/schemas/IoTJobRolloutIncrementFactor"
          description: The exponential factor to increase the rollout rate for the job. This parameter supports up to one digit after the decimal (for example, you can specify 1.5, but not 1.55).
        rateIncreaseCriteria:
          $ref: "#/components/schemas/IoTJobRateIncreaseCriteria"
          description: The criteria to increase the rollout rate for the job.
      required:
        - baseRatePerMinute
        - incrementFactor
        - rateIncreaseCriteria
    IoTJobRolloutBaseRatePerMinute:
      type: integer
      minimum: 1
      maximum: 1000
    IoTJobRolloutIncrementFactor:
      type: number
      format: double
      minimum: 1
      maximum: 5
    IoTJobRateIncreaseCriteria:
      description: Contains information about criteria to meet before a job increases its rollout rate. Specify either numberOfNotifiedThings or numberOfSucceededThings.
      type: object
      properties:
        numberOfNotifiedThings:
          $ref: "#/components/schemas/IoTJobNumberOfThings"
          description: The number of devices to receive the job notification before the rollout rate increases.
        numberOfSucceededThings:
          $ref: "#/components/schemas/IoTJobNumberOfThings"
          description: The number of devices to successfully run the configuration job before the rollout rate increases.
    IoTJobNumberOfThings:
      type: integer
      minimum: 1
    IoTJobMaxExecutionsPerMin:
      type: integer
      minimum: 1
      maximum: 1000
    IoTJobAbortConfig:
      description: Contains a list of criteria that define when and how to cancel a configuration deployment.
      type: object
      properties:
        criteriaList:
          $ref: "#/components/schemas/IoTJobAbortCriteriaList"
          description: The list of criteria that define when and how to cancel the configuration deployment.
      required:
        - criteriaList
    IoTJobAbortCriteriaList:
      type: array
      items:
        $ref: "#/components/schemas/IoTJobAbortCriteria"
    IoTJobAbortCriteria:
      description: "Contains criteria that define when and how to cancel a job. The deployment stops if the following conditions are true: The number of things that receive the deployment exceeds the minNumberOfExecutedThings. The percentage of failures with type failureType exceeds the thresholdPercentage."
      type: object
      properties:
        failureType:
          $ref: "#/components/schemas/IoTJobExecutionFailureType"
          description: The type of job deployment failure that can cancel a job.
        action:
          $ref: "#/components/schemas/IoTJobAbortAction"
          description: The action to perform when the criteria are met.
        thresholdPercentage:
          $ref: "#/components/schemas/IoTJobAbortThresholdPercentage"
          description: The minimum percentage of failureType failures that occur before the job can cancel. This parameter supports up to two digits after the decimal (for example, you can specify 10.9 or 10.99, but not 10.999).
        minNumberOfExecutedThings:
          $ref: "#/components/schemas/IoTJobMinimumNumberOfExecutedThings"
          description: The minimum number of things that receive the configuration before the job can cancel.
      required:
        - failureType
        - action
        - thresholdPercentage
        - minNumberOfExecutedThings
    IoTJobExecutionFailureType:
      type: string
      enum:
        - FAILED
        - REJECTED
        - TIMED_OUT
        - ALL
    IoTJobAbortAction:
      type: string
      enum:
        - CANCEL
    IoTJobAbortThresholdPercentage:
      type: number
      format: double
      maximum: 100
    IoTJobMinimumNumberOfExecutedThings:
      type: integer
      minimum: 1
    IoTJobTimeoutConfig:
      description: Contains information about the timeout configuration for a job.
      type: object
      properties:
        inProgressTimeoutInMinutes:
          $ref: "#/components/schemas/IoTJobInProgressTimeoutInMinutes"
          description: The amount of time, in minutes, that devices have to complete the job. The timer starts when the job status is set to IN_PROGRESS. If the job status doesn't change to a terminal state before the time expires, then the job status is set to TIMED_OUT. The timeout interval must be between 1 minute and 7 days (10080 minutes).
    IoTJobInProgressTimeoutInMinutes:
      type: integer
      format: int64
    DeploymentPolicies:
      description: Contains information about policies that define how a deployment updates components and handles failure.
      type: object
      properties:
        failureHandlingPolicy:
          $ref: "#/components/schemas/DeploymentFailureHandlingPolicy"
          description: "The failure handling policy for the configuration deployment. This policy defines what to do if the deployment fails. Default: ROLLBACK"
        componentUpdatePolicy:
          $ref: "#/components/schemas/DeploymentComponentUpdatePolicy"
          description: The component update policy for the configuration deployment. This policy defines when it's safe to deploy the configuration to devices.
        configurationValidationPolicy:
          $ref: "#/components/schemas/DeploymentConfigurationValidationPolicy"
          description: The configuration validation policy for the configuration deployment. This policy defines how long each component has to validate its configure updates.
    DeploymentFailureHandlingPolicy:
      type: string
      enum:
        - ROLLBACK
        - DO_NOTHING
    DeploymentComponentUpdatePolicy:
      description: Contains information about a deployment's policy that defines when components are safe to update. Each component on a device can report whether or not it's ready to update. After a component and its dependencies are ready, they can apply the update in the deployment. You can configure whether or not the deployment notifies components of an update and waits for a response. You specify the amount of time each component has to respond to the update notification.
      type: object
      properties:
        timeoutInSeconds:
          $ref: "#/components/schemas/OptionalInteger"
          description: "The amount of time in seconds that each component on a device has to report that it's safe to update. If the component waits for longer than this timeout, then the deployment proceeds on the device. Default: 60"
        action:
          $ref: "#/components/schemas/DeploymentComponentUpdatePolicyAction"
