        knowledgeBaseArn:
          $ref: "#/components/schemas/Arn"
      required:
        - knowledgeBaseArn
    LambdaIntegrationIdentifier:
      description: Lambda integration identifier
      type: object
      properties:
        functionArn:
          $ref: "#/components/schemas/LambdaArn"
      required:
        - functionArn
