      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Enabled"
        encryptionType:
          $ref: "#/components/schemas/EncryptionType"
        keyArn:
          $ref: "#/components/schemas/EncryptionKey"
      required:
        - enabled
