openapi: 3.0.0
info:
  version: "2024-04-23"
  title: AmazonConnectCampaignServiceV2
  description: AmazonConnectCampaignServiceV2
  x-serviceName: connect-campaigns
  x-serviceAlias: connectcampaignsv2
  x-protocol: rest-json
  x-apiVersion: "2024-04-23"
  x-endpointPrefix: connect-campaigns
  x-jsonVersion: "1.1"
servers:
  - url: https://connect-campaigns.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for connectcampaignsv2
paths:
  /v2/campaigns:
    put:
      operationId: CreateCampaign
      description: Creates a campaign for the specified Amazon Connect account. This API is idempotent.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/CampaignName"
                connectInstanceId:
                  $ref: "#/components/schemas/InstanceId"
                channelSubtypeConfig:
                  $ref: "#/components/schemas/ChannelSubtypeConfig"
                type:
                  $ref: "#/components/schemas/ExternalCampaignType"
                source:
                  $ref: "#/components/schemas/Source"
                connectCampaignFlowArn:
                  $ref: "#/components/schemas/Arn"
                schedule:
                  $ref: "#/components/schemas/Schedule"
                entryLimitsConfig:
                  $ref: "#/components/schemas/EntryLimitsConfig"
                communicationTimeConfig:
                  $ref: "#/components/schemas/CommunicationTimeConfig"
                communicationLimitsOverride:
                  $ref: "#/components/schemas/CommunicationLimitsConfig"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - connectInstanceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCampaignResponse"
  /v2/campaigns/{id}:
    delete:
      operationId: DeleteCampaign
      description: Deletes a campaign from the specified Amazon Connect account.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      responses:
        "200":
          description: Success
    get:
      operationId: DescribeCampaign
      description: Describes the specific campaign.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeCampaignResponse"
  /v2/campaigns/{id}/channel-subtype-config:
    delete:
      operationId: DeleteCampaignChannelSubtypeConfig
      description: Deletes the channel subtype config of a campaign. This API is idempotent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
        - name: channelSubtype
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ChannelSubtype"
      responses:
        "200":
          description: Success
    post:
      operationId: UpdateCampaignChannelSubtypeConfig
      description: Updates the channel subtype config of a campaign. This API is idempotent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channelSubtypeConfig:
                  $ref: "#/components/schemas/ChannelSubtypeConfig"
              required:
                - channelSubtypeConfig
      responses:
        "200":
          description: Success
  /v2/campaigns/{id}/communication-limits:
    delete:
      operationId: DeleteCampaignCommunicationLimits
      description: Deletes the communication limits config for a campaign. This API is idempotent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
        - name: config
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/CommunicationLimitsConfigType"
      responses:
        "200":
          description: Success
    post:
      operationId: UpdateCampaignCommunicationLimits
      description: Updates the communication limits config for a campaign. This API is idempotent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                communicationLimitsOverride:
                  $ref: "#/components/schemas/CommunicationLimitsConfig"
              required:
                - communicationLimitsOverride
      responses:
        "200":
          description: Success
  /v2/campaigns/{id}/communication-time:
    delete:
      operationId: DeleteCampaignCommunicationTime
      description: Deletes the communication time config for a campaign. This API is idempotent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
        - name: config
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/CommunicationTimeConfigType"
      responses:
        "200":
          description: Success
    post:
      operationId: UpdateCampaignCommunicationTime
      description: Updates the communication time config for a campaign. This API is idempotent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                communicationTimeConfig:
                  $ref: "#/components/schemas/CommunicationTimeConfig"
              required:
                - communicationTimeConfig
      responses:
        "200":
          description: Success
  /v2/campaigns/{id}/entry-limits:
    delete:
      operationId: DeleteCampaignEntryLimits
      description: Deletes the entry limits config for a campaign. This API is idempotent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      responses:
        "200":
          description: Success
    post:
      operationId: UpdateCampaignEntryLimits
      description: Updates the entry limits config for a campaign. This API is idempotent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entryLimitsConfig:
                  $ref: "#/components/schemas/EntryLimitsConfig"
              required:
                - entryLimitsConfig
      responses:
        "200":
          description: Success
  /v2/connect-instance/{connect_instance_id}/config:
    delete:
      operationId: DeleteConnectInstanceConfig
      description: Deletes a connect instance config from the specified AWS account.
      parameters:
        - name: connect_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
        - name: campaignDeletionPolicy
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CampaignDeletionPolicy"
      responses:
        "200":
          description: Success
    get:
      operationId: GetConnectInstanceConfig
      description: Get the specific Connect instance config.
      parameters:
        - name: connect_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectInstanceConfigResponse"
  /v2/connect-instance/{connect_instance_id}/integrations/delete:
    post:
      operationId: DeleteConnectInstanceIntegration
      description: Delete the integration for the specified Amazon Connect instance.
      parameters:
        - name: connect_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                integrationIdentifier:
                  $ref: "#/components/schemas/IntegrationIdentifier"
              required:
                - integrationIdentifier
      responses:
        "200":
          description: Success
  /v2/connect-instance/{connect_instance_id}/onboarding:
    delete:
      operationId: DeleteInstanceOnboardingJob
      description: Delete the Connect Campaigns onboarding job for the specified Amazon Connect instance.
      parameters:
        - name: connect_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
      responses:
        "200":
          description: Success
    get:
      operationId: GetInstanceOnboardingJobStatus
      description: Get the specific instance onboarding job status.
      parameters:
        - name: connect_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInstanceOnboardingJobStatusResponse"
    put:
      operationId: StartInstanceOnboardingJob
      description: Onboard the specific Amazon Connect instance to Connect Campaigns.
      parameters:
        - name: connect_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                encryptionConfig:
                  $ref: "#/components/schemas/EncryptionConfig"
              required:
                - encryptionConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartInstanceOnboardingJobResponse"
  /v2/campaigns/{id}/state:
    get:
      operationId: GetCampaignState
      description: Get state of a campaign for the specified Amazon Connect account.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCampaignStateResponse"
  /v2/campaigns-state:
    post:
      operationId: GetCampaignStateBatch
      description: Get state of campaigns for the specified Amazon Connect account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                campaignIds:
                  $ref: "#/components/schemas/GetCampaignStateBatchRequestCampaignIdsList"
              required:
                - campaignIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCampaignStateBatchResponse"
  /v2/connect-instance/{connect_instance_id}/communication-limits:
    get:
      operationId: GetInstanceCommunicationLimits
      description: Get the instance communication limits.
      parameters:
        - name: connect_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInstanceCommunicationLimitsResponse"
    put:
      operationId: PutInstanceCommunicationLimits
      description: Put the instance communication limits. This API is idempotent.
      parameters:
        - name: connect_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                communicationLimitsConfig:
                  $ref: "#/components/schemas/InstanceCommunicationLimitsConfig"
              required:
                - communicationLimitsConfig
      responses:
        "200":
          description: Success
  /v2/campaigns-summary:
    post:
      operationId: ListCampaigns
      description: Provides summary information about the campaigns under the specified Amazon Connect account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                filters:
                  $ref: "#/components/schemas/CampaignFilters"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCampaignsResponse"
  /v2/connect-instance/{connect_instance_id}/integrations:
    get:
      operationId: ListConnectInstanceIntegrations
      description: Provides summary information about the integration under the specified Connect instance.
      parameters:
        - name: connect_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConnectInstanceIntegrationsResponse"
    put:
      operationId: PutConnectInstanceIntegration
      description: Put or update the integration for the specified Amazon Connect instance.
      parameters:
        - name: connect_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                integrationConfig:
                  $ref: "#/components/schemas/IntegrationConfig"
              required:
                - integrationConfig
      responses:
        "200":
          description: Success
  /v2/tags/{arn}:
    get:
      operationId: ListTagsForResource
      description: List tags for a resource.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Tag a resource.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
    delete:
      operationId: UntagResource
      description: Untag a resource.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
      responses:
        "200":
          description: Success
  /v2/campaigns/{id}/pause:
    post:
      operationId: PauseCampaign
      description: Pauses a campaign for the specified Amazon Connect account.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      responses:
        "200":
          description: Success
  /v2/campaigns/{id}/outbound-requests:
    put:
      operationId: PutOutboundRequestBatch
      description: Creates outbound requests for the specified campaign Amazon Connect account. This API is idempotent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                outboundRequests:
                  $ref: "#/components/schemas/OutboundRequestList"
              required:
                - outboundRequests
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutOutboundRequestBatchResponse"
  /v2/campaigns/{id}/profile-outbound-requests:
    put:
      operationId: PutProfileOutboundRequestBatch
      description: Takes in a list of profile outbound requests to be placed as part of an outbound campaign. This API is idempotent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                profileOutboundRequests:
                  $ref: "#/components/schemas/ProfileOutboundRequestList"
              required:
                - profileOutboundRequests
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutProfileOutboundRequestBatchResponse"
  /v2/campaigns/{id}/resume:
    post:
      operationId: ResumeCampaign
      description: Stops a campaign for the specified Amazon Connect account.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      responses:
        "200":
          description: Success
  /v2/campaigns/{id}/start:
    post:
      operationId: StartCampaign
      description: Starts a campaign for the specified Amazon Connect account.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      responses:
        "200":
          description: Success
  /v2/campaigns/{id}/stop:
    post:
      operationId: StopCampaign
      description: Stops a campaign for the specified Amazon Connect account.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      responses:
        "200":
          description: Success
  /v2/campaigns/{id}/flow:
    post:
      operationId: UpdateCampaignFlowAssociation
      description: Updates the campaign flow associated with a campaign. This API is idempotent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connectCampaignFlowArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - connectCampaignFlowArn
      responses:
        "200":
          description: Success
  /v2/campaigns/{id}/name:
    post:
      operationId: UpdateCampaignName
      description: Updates the name of a campaign. This API is idempotent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/CampaignName"
              required:
                - name
      responses:
        "200":
          description: Success
  /v2/campaigns/{id}/schedule:
    post:
      operationId: UpdateCampaignSchedule
      description: Updates the schedule for a campaign. This API is idempotent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                schedule:
                  $ref: "#/components/schemas/Schedule"
              required:
                - schedule
      responses:
        "200":
          description: Success
  /v2/campaigns/{id}/source:
    post:
      operationId: UpdateCampaignSource
      description: Updates the campaign source with a campaign. This API is idempotent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  $ref: "#/components/schemas/Source"
              required:
                - source
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    CampaignName:
      description: The name of an Amazon Connect Campaign name.
      type: string
      minLength: 1
      maxLength: 127
    InstanceId:
      description: Amazon Connect Instance Id
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[-_.a-zA-Z0-9]+"
    ChannelSubtypeConfig:
      description: Campaign Channel Subtype config
      type: object
      properties:
        telephony:
          $ref: "#/components/schemas/TelephonyChannelSubtypeConfig"
        sms:
          $ref: "#/components/schemas/SmsChannelSubtypeConfig"
        email:
          $ref: "#/components/schemas/EmailChannelSubtypeConfig"
        whatsApp:
          $ref: "#/components/schemas/WhatsAppChannelSubtypeConfig"
    TelephonyChannelSubtypeConfig:
      description: Telephony Channel Subtype config
      type: object
      properties:
        capacity:
          $ref: "#/components/schemas/Capacity"
        connectQueueId:
          $ref: "#/components/schemas/QueueId"
        outboundMode:
          $ref: "#/components/schemas/TelephonyOutboundMode"
        defaultOutboundConfig:
          $ref: "#/components/schemas/TelephonyOutboundConfig"
      required:
        - outboundMode
        - defaultOutboundConfig
    Capacity:
      description: Allocates outbound capacity for the specific channel subtype of this campaign between multiple active campaigns
      type: number
      format: double
      minimum: 0.01
      maximum: 1
    QueueId:
      description: The queue for the call. If you specify a queue, the phone displayed for caller ID is the phone number specified in the queue. If you do not specify a queue, the queue defined in the contact flow is used. If you do not specify a queue, you must specify a source phone number.
      type: string
      minLength: 0
      maxLength: 500
    TelephonyOutboundMode:
      description: Telephony Outbound Mode
      type: object
      properties:
        progressive:
          $ref: "#/components/schemas/ProgressiveConfig"
        predictive:
          $ref: "#/components/schemas/PredictiveConfig"
        agentless:
          $ref: "#/components/schemas/AgentlessConfig"
        preview:
          $ref: "#/components/schemas/PreviewConfig"
    ProgressiveConfig:
      description: Progressive config
      type: object
      properties:
        bandwidthAllocation:
          $ref: "#/components/schemas/BandwidthAllocation"
      required:
        - bandwidthAllocation
    BandwidthAllocation:
      description: The bandwidth allocation of a queue resource.
      type: number
      format: double
      minimum: 0
      maximum: 1
    PredictiveConfig:
      description: Predictive config
      type: object
      properties:
        bandwidthAllocation:
          $ref: "#/components/schemas/BandwidthAllocation"
      required:
        - bandwidthAllocation
    AgentlessConfig:
      description: Agentless config
      type: object
    PreviewConfig:
      description: Preview config
      type: object
      properties:
        bandwidthAllocation:
          $ref: "#/components/schemas/BandwidthAllocation"
        timeoutConfig:
          $ref: "#/components/schemas/TimeoutConfig"
        agentActions:
          $ref: "#/components/schemas/AgentActions"
      required:
        - bandwidthAllocation
        - timeoutConfig
    TimeoutConfig:
      description: Timeout Config for preview contacts.
      type: object
      properties:
        durationInSeconds:
          $ref: "#/components/schemas/TimeoutDuration"
      required:
        - durationInSeconds
    TimeoutDuration:
      description: Timeout duration for a preview contact in seconds.
      type: integer
      minimum: 1
      maximum: 300
    AgentActions:
      description: Actions that can be performed by agent during preview phase.
      type: array
      items:
        $ref: "#/components/schemas/AgentAction"
    AgentAction:
      description: Actions that can performed on a contact by an agent
      type: string
      enum:
        - DISCARD
    TelephonyOutboundConfig:
      description: Default Telephony Outbound config
      type: object
      properties:
        connectContactFlowId:
          $ref: "#/components/schemas/ContactFlowId"
        connectSourcePhoneNumber:
          $ref: "#/components/schemas/SourcePhoneNumber"
        answerMachineDetectionConfig:
          $ref: "#/components/schemas/AnswerMachineDetectionConfig"
        ringTimeout:
          $ref: "#/components/schemas/RingTimeout"
      required:
        - connectContactFlowId
    ContactFlowId:
      description: The identifier of the contact flow for the outbound call.
      type: string
      minLength: 0
      maxLength: 500
    SourcePhoneNumber:
      description: The phone number associated with the Amazon Connect instance, in E.164 format. If you do not specify a source phone number, you must specify a queue.
      type: string
      minLength: 0
      maxLength: 100
    AnswerMachineDetectionConfig:
      description: Answering Machine Detection config
      type: object
      properties:
