          $ref: "#/components/schemas/Arn"
        wisdomTemplateArn:
          $ref: "#/components/schemas/Arn"
      required:
        - connectSourcePhoneNumberArn
        - wisdomTemplateArn
    Arn:
      description: Amazon Resource Names(ARN)
      type: string
      minLength: 20
      maxLength: 500
      pattern: arn:[a-zA-Z0-9-]+:[a-zA-Z0-9-]+:[a-z]{2}-[a-z]+-\d{1,2}:[a-zA-Z0-9-]+:[^:]+(?:/[^:]+)*(?:/[^:]+)?(?:\:[^:]+)?
    EmailChannelSubtypeConfig:
      description: Email Channel Subtype config
      type: object
      properties:
        capacity:
          $ref: "#/components/schemas/Capacity"
        outboundMode:
          $ref: "#/components/schemas/EmailOutboundMode"
        defaultOutboundConfig:
          $ref: "#/components/schemas/EmailOutboundConfig"
      required:
        - outboundMode
        - defaultOutboundConfig
    EmailOutboundMode:
      description: Email Outbound Mode
      type: object
      properties:
        agentless:
          $ref: "#/components/schemas/AgentlessConfig"
    EmailOutboundConfig:
      description: Default Email Outbound config
      type: object
      properties:
        connectSourceEmailAddress:
          $ref: "#/components/schemas/EmailAddress"
        sourceEmailAddressDisplayName:
          $ref: "#/components/schemas/EmailDisplayName"
        wisdomTemplateArn:
          $ref: "#/components/schemas/Arn"
      required:
        - connectSourceEmailAddress
        - wisdomTemplateArn
    EmailAddress:
      description: Source/Destination Email address used for Email messages
      type: string
      minLength: 1
      maxLength: 255
      pattern: .*[^\s@]+@[^\s@]+\.[^\s@]+.*
    EmailDisplayName:
      description: Display name for Email Address
      type: string
      minLength: 0
      maxLength: 256
    WhatsAppChannelSubtypeConfig:
      description: WhatsApp Channel Subtype config
      type: object
      properties:
        capacity:
          $ref: "#/components/schemas/Capacity"
        outboundMode:
          $ref: "#/components/schemas/WhatsAppOutboundMode"
        defaultOutboundConfig:
          $ref: "#/components/schemas/WhatsAppOutboundConfig"
      required:
        - outboundMode
        - defaultOutboundConfig
    WhatsAppOutboundMode:
      description: WhatsApp Outbound Mode
      type: object
      properties:
        agentless:
          $ref: "#/components/schemas/AgentlessConfig"
    WhatsAppOutboundConfig:
      description: Default WhatsApp Outbound config
      type: object
      properties:
        connectSourcePhoneNumberArn:
          $ref: "#/components/schemas/Arn"
        wisdomTemplateArn:
          $ref: "#/components/schemas/Arn"
      required:
        - connectSourcePhoneNumberArn
        - wisdomTemplateArn
    ExternalCampaignType:
      description: The type of campaign externally exposed in APIs.
      type: string
      enum:
        - MANAGED
        - JOURNEY
    Source:
      description: Source of the campaign
      type: object
      properties:
        customerProfilesSegmentArn:
          $ref: "#/components/schemas/Arn"
        eventTrigger:
          $ref: "#/components/schemas/EventTrigger"
    EventTrigger:
      description: Event trigger of the campaign
      type: object
      properties:
        customerProfilesDomainArn:
          $ref: "#/components/schemas/Arn"
    Schedule:
      description: Campaign schedule
      type: object
      properties:
        startTime:
          $ref: "#/components/schemas/TimeStamp"
        endTime:
          $ref: "#/components/schemas/TimeStamp"
        refreshFrequency:
          $ref: "#/components/schemas/Iso8601Duration"
      required:
        - startTime
        - endTime
    TimeStamp:
      description: Timestamp with no UTC offset or timezone
      type: string
      format: date-time
    Iso8601Duration:
      description: Time duration in ISO 8601 format
      type: string
      minLength: 0
      maxLength: 50
      pattern: P(?:([-+]?[0-9]+)D)?(T(?:([-+]?[0-9]+)H)?(?:([-+]?[0-9]+)M)?(?:([-+]?[0-9]+)(?:[.,]([0-9]{0,9}))?S)?)?
    EntryLimitsConfig:
      description: Campaign entry limits config
      type: object
      properties:
        maxEntryCount:
          $ref: "#/components/schemas/EntryLimitsConfigMaxEntryCountInteger"
          description: Maximum number of times a participant can enter the campaign. A value of 0 indicates unlimited entries. Values of 1 or greater specify the exact number of entries allowed.
        minEntryInterval:
          $ref: "#/components/schemas/Iso8601Duration"
          description: Minimum time interval that must pass before a participant can enter the campaign again.
      required:
        - maxEntryCount
        - minEntryInterval
    EntryLimitsConfigMaxEntryCountInteger:
      type: integer
      minimum: 0
    CommunicationTimeConfig:
      description: Campaign communication time config
      type: object
      properties:
        localTimeZoneConfig:
          $ref: "#/components/schemas/LocalTimeZoneConfig"
        telephony:
          $ref: "#/components/schemas/TimeWindow"
        sms:
          $ref: "#/components/schemas/TimeWindow"
        email:
          $ref: "#/components/schemas/TimeWindow"
        whatsApp:
          $ref: "#/components/schemas/TimeWindow"
      required:
        - localTimeZoneConfig
    LocalTimeZoneConfig:
      description: Local time zone config
      type: object
      properties:
        defaultTimeZone:
          $ref: "#/components/schemas/TimeZone"
        localTimeZoneDetection:
          $ref: "#/components/schemas/LocalTimeZoneDetection"
        localTimeZoneDetectionScope:
          $ref: "#/components/schemas/LocalTimeZoneDetectionScope"
    TimeZone:
      description: Time Zone Id in the IANA format
      type: string
      minLength: 0
      maxLength: 50
      pattern: "[a-zA-Z0-9_\\-/]*"
    LocalTimeZoneDetection:
      description: Local TimeZone Detection method list
      type: array
      items:
        $ref: "#/components/schemas/LocalTimeZoneDetectionType"
    LocalTimeZoneDetectionType:
      description: Local TimeZone Detection method.
      type: string
      enum:
        - ZIP_CODE
        - AREA_CODE
    LocalTimeZoneDetectionScope:
      description: Local TimeZone Detection scope.
      type: string
      enum:
        - PRIMARY_ONLY
        - ALL_AVAILABLE
    TimeWindow:
      description: Time window config
      type: object
      properties:
        openHours:
          $ref: "#/components/schemas/OpenHours"
        restrictedPeriods:
          $ref: "#/components/schemas/RestrictedPeriods"
      required:
        - openHours
    OpenHours:
      description: Open Hours config
      type: object
      properties:
        dailyHours:
          type: object
          properties: {}
    RestrictedPeriods:
      description: Restricted period config
      type: object
      properties:
        restrictedPeriodList:
          $ref: "#/components/schemas/RestrictedPeriodList"
    RestrictedPeriodList:
      description: List of restricted period
      type: array
      items:
        $ref: "#/components/schemas/RestrictedPeriod"
    RestrictedPeriod:
      description: Restricted period
      type: object
      properties:
        name:
          $ref: "#/components/schemas/RestrictedPeriodName"
        startDate:
          $ref: "#/components/schemas/Iso8601Date"
        endDate:
          $ref: "#/components/schemas/Iso8601Date"
      required:
        - startDate
        - endDate
    RestrictedPeriodName:
      description: The name of a restricted period.
      type: string
      minLength: 1
      maxLength: 127
    Iso8601Date:
      description: Date in ISO 8601 format, e.g. 2024-01-01
      type: string
      pattern: \d{4}-\d{2}-\d{2}
    CommunicationLimitsConfig:
      description: Communication limits config
      type: object
      properties:
        allChannelSubtypes:
          $ref: "#/components/schemas/CommunicationLimits"
        instanceLimitsHandling:
          $ref: "#/components/schemas/InstanceLimitsHandling"
    CommunicationLimits:
      description: Communication limits
      type: object
      properties:
        communicationLimitsList:
          $ref: "#/components/schemas/CommunicationLimitList"
    CommunicationLimitList:
      description: List of communication limit
      type: array
      items:
        $ref: "#/components/schemas/CommunicationLimit"
    CommunicationLimit:
      description: Communication Limit
      type: object
      properties:
        maxCountPerRecipient:
          $ref: "#/components/schemas/CommunicationLimitMaxCountPerRecipientInteger"
          description: Maximum number of contacts allowed for a given target within the given frequency.
        frequency:
          $ref: "#/components/schemas/CommunicationLimitFrequencyInteger"
          description: The number of days to consider with regards to this limit.
        unit:
          $ref: "#/components/schemas/CommunicationLimitTimeUnit"
      required:
        - maxCountPerRecipient
        - frequency
        - unit
    CommunicationLimitMaxCountPerRecipientInteger:
      type: integer
      minimum: 1
    CommunicationLimitFrequencyInteger:
      type: integer
      minimum: 1
      maximum: 30
    CommunicationLimitTimeUnit:
      description: The communication limit time unit.
      type: string
      enum:
        - DAY
    InstanceLimitsHandling:
      description: Instance limits handling
      type: string
      enum:
        - OPT_IN
        - OPT_OUT
    TagMap:
      description: Tag map with key and value.
      type: object
      properties: {}
    CreateCampaignResponse:
      description: The response for Create Campaign API
      type: object
      properties:
        id:
          $ref: "#/components/schemas/CampaignId"
        arn:
          $ref: "#/components/schemas/CampaignArn"
        tags:
          type: object
          properties: {}
