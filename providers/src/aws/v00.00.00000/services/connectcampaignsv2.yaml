        - EVENT_BRIDGE_MANAGED_RULE_LIMIT_EXCEEDED
        - IAM_ACCESS_DENIED
        - KMS_ACCESS_DENIED
        - KMS_KEY_NOT_FOUND
        - INTERNAL_FAILURE
