      description: Identifier representing a Campaign
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[-:/a-zA-Z0-9]+"
    CampaignArn:
      description: The resource name of an Amazon Connect campaign.
      type: string
      minLength: 20
      maxLength: 500
    ChannelSubtype:
      description: The type of campaign channel subtype.
      type: string
      enum:
        - TELEPHONY
        - SMS
        - EMAIL
        - WHATSAPP
    CommunicationLimitsConfigType:
      description: The type of campaign communication limits config.
      type: string
      enum:
        - ALL_CHANNEL_SUBTYPES
    CommunicationTimeConfigType:
      description: The type of campaign communication time config
      type: string
      enum:
        - TELEPHONY
        - SMS
        - EMAIL
        - WHATSAPP
    CampaignDeletionPolicy:
      description: Enumeration of the policies to enact on existing campaigns during instance config deletion
      type: string
      enum:
        - RETAIN_ALL
        - DELETE_ALL
    IntegrationIdentifier:
      description: Integration identifier for Connect instance
      type: object
      properties:
        customerProfiles:
          $ref: "#/components/schemas/CustomerProfilesIntegrationIdentifier"
        qConnect:
          $ref: "#/components/schemas/QConnectIntegrationIdentifier"
        lambda:
          $ref: "#/components/schemas/LambdaIntegrationIdentifier"
    CustomerProfilesIntegrationIdentifier:
      description: Customer Profiles integration identifier
