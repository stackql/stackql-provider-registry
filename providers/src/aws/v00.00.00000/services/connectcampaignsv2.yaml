      description: Lambda ARN for integration with Connect instances
      type: string
      minLength: 1
      maxLength: 140
      pattern: arn:aws[a-zA-Z-]*:lambda:[a-z]{2}(-gov)?-[a-z]+-\d:\d{12}:function:([a-zA-Z0-9-_]+)(:([a-zA-Z0-9-_]+))?
    DescribeCampaignResponse:
      description: The response for DescribeCampaign API.
