openapi: 3.0.0
info:
  version: "2020-08-01"
  title: Amazon Prometheus Service
  description: Amazon Prometheus Service
  x-serviceName: aps
  x-serviceAlias: amp
  x-protocol: rest-json
  x-apiVersion: "2020-08-01"
  x-endpointPrefix: aps
servers:
  - url: https://aps.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for amp
paths:
  /workspaces/{workspace_id}/alertmanager/definition:
    post:
      operationId: CreateAlertManagerDefinition
      description: The CreateAlertManagerDefinition operation creates the alert manager definition in a workspace. If a workspace already has an alert manager definition, don't use this operation to update it. Instead, use PutAlertManagerDefinition.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to add the alert manager definition to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: "#/components/schemas/AlertManagerDefinitionData"
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
              required:
                - data
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAlertManagerDefinitionResponse"
    delete:
      operationId: DeleteAlertManagerDefinition
      description: Deletes the alert manager definition from a workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to delete the alert manager definition from.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IdempotencyToken"
          description: A unique identifier that you can provide to ensure the idempotency of the request. Case-sensitive.
      responses:
        "202":
          description: Success
    get:
      operationId: DescribeAlertManagerDefinition
      description: Retrieves the full information about the alert manager definition for a workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to retrieve the alert manager definition from.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAlertManagerDefinitionResponse"
    put:
      operationId: PutAlertManagerDefinition
      description: Updates an existing alert manager definition in a workspace. If the workspace does not already have an alert manager definition, don't use this operation to create it. Instead, use CreateAlertManagerDefinition.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to update the alert manager definition in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: "#/components/schemas/AlertManagerDefinitionData"
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
              required:
                - data
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutAlertManagerDefinitionResponse"
  /workspaces/{workspace_id}/anomalydetectors:
    post:
      operationId: CreateAnomalyDetector
      description: Creates an anomaly detector within a workspace using the Random Cut Forest algorithm for time-series analysis. The anomaly detector analyzes Amazon Managed Service for Prometheus metrics to identify unusual patterns and behaviors.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The identifier of the workspace where the anomaly detector will be created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alias:
                  $ref: "#/components/schemas/AnomalyDetectorAlias"
                evaluationIntervalInSeconds:
                  $ref: "#/components/schemas/AnomalyDetectorEvaluationInterval"
                missingDataAction:
                  $ref: "#/components/schemas/AnomalyDetectorMissingDataAction"
                configuration:
                  $ref: "#/components/schemas/AnomalyDetectorConfiguration"
                labels:
                  $ref: "#/components/schemas/CreateAnomalyDetectorRequestLabelsMap"
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - alias
                - configuration
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAnomalyDetectorResponse"
    get:
      operationId: ListAnomalyDetectors
      description: Returns a paginated list of anomaly detectors for a workspace with optional filtering by alias.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The identifier of the workspace containing the anomaly detectors to list.
        - name: alias
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AnomalyDetectorAlias"
          description: Filters the results to anomaly detectors with the specified alias.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListAnomalyDetectorsRequestMaxResultsInteger"
          description: The maximum number of results to return in a single call. Valid range is 1 to 1000.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token to continue retrieving results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAnomalyDetectorsResponse"
  /workspaces/{workspace_id}/logging:
    post:
      operationId: CreateLoggingConfiguration
      description: The CreateLoggingConfiguration operation creates rules and alerting logging configuration for the workspace. Use this operation to set the CloudWatch log group to which the logs will be published to. These logging configurations are only for rules and alerting logs.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to create the logging configuration for.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                logGroupArn:
                  $ref: "#/components/schemas/LogGroupArn"
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
              required:
                - logGroupArn
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLoggingConfigurationResponse"
    delete:
      operationId: DeleteLoggingConfiguration
      description: Deletes the rules and alerting logging configuration for a workspace. These logging configurations are only for rules and alerting logs.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace containing the logging configuration to delete.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IdempotencyToken"
          description: A unique identifier that you can provide to ensure the idempotency of the request. Case-sensitive.
      responses:
        "202":
          description: Success
    get:
      operationId: DescribeLoggingConfiguration
      description: Returns complete information about the current rules and alerting logging configuration of the workspace. These logging configurations are only for rules and alerting logs.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to describe the logging configuration for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeLoggingConfigurationResponse"
    put:
      operationId: UpdateLoggingConfiguration
      description: Updates the log group ARN or the workspace ID of the current rules and alerting logging configuration. These logging configurations are only for rules and alerting logs.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to update the logging configuration for.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                logGroupArn:
                  $ref: "#/components/schemas/LogGroupArn"
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
              required:
                - logGroupArn
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLoggingConfigurationResponse"
  /workspaces/{workspace_id}/logging/query:
    post:
      operationId: CreateQueryLoggingConfiguration
      description: Creates a query logging configuration for the specified workspace. This operation enables logging of queries that exceed the specified QSP threshold.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace for which to create the query logging configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                destinations:
                  $ref: "#/components/schemas/LoggingDestinations"
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
              required:
                - destinations
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateQueryLoggingConfigurationResponse"
    delete:
      operationId: DeleteQueryLoggingConfiguration
      description: Deletes the query logging configuration for the specified workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace from which to delete the query logging configuration.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IdempotencyToken"
          description: (Optional) A unique, case-sensitive identifier that you can provide to ensure the idempotency of the request.
      responses:
        "202":
          description: Success
    get:
      operationId: DescribeQueryLoggingConfiguration
      description: Retrieves the details of the query logging configuration for the specified workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace for which to retrieve the query logging configuration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeQueryLoggingConfigurationResponse"
    put:
      operationId: UpdateQueryLoggingConfiguration
      description: Updates the query logging configuration for the specified workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace for which to update the query logging configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                destinations:
                  $ref: "#/components/schemas/LoggingDestinations"
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
              required:
                - destinations
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateQueryLoggingConfigurationResponse"
  /workspaces/{workspace_id}/rulegroupsnamespaces:
    post:
      operationId: CreateRuleGroupsNamespace
      description: The CreateRuleGroupsNamespace operation creates a rule groups namespace within a workspace. A rule groups namespace is associated with exactly one rules file. A workspace can have multiple rule groups namespaces. The combined length of a rule group namespace and a rule group name cannot exceed 721 UTF-8 bytes. Use this operation only to create new rule groups namespaces. To update an existing rule groups namespace, use PutRuleGroupsNamespace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to add the rule groups namespace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/RuleGroupsNamespaceName"
                data:
                  $ref: "#/components/schemas/RuleGroupsNamespaceData"
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - data
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRuleGroupsNamespaceResponse"
    get:
      operationId: ListRuleGroupsNamespaces
      description: Returns a list of rule groups namespaces in a workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace containing the rule groups namespaces.
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RuleGroupsNamespaceName"
          description: Use this parameter to filter the rule groups namespaces that are returned. Only the namespaces with names that begin with the value that you specify are returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The token for the next set of items to return. You receive this token from a previous call, and use it to get the next page of results. The other parameters must be the same as the initial call. For example, if your initial request has maxResults of 10, and there are 12 rule groups namespaces to return, then your initial request will return 10 and a nextToken. Using the next token in a subsequent call will return the remaining 2 namespaces.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRuleGroupsNamespacesRequestMaxResultsInteger"
          description: The maximum number of results to return. The default is 100.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRuleGroupsNamespacesResponse"
  /scrapers:
    post:
      operationId: CreateScraper
      description: The CreateScraper operation creates a scraper to collect metrics. A scraper pulls metrics from Prometheus-compatible sources and sends them to your Amazon Managed Service for Prometheus workspace. You can configure scrapers to collect metrics from Amazon EKS clusters, Amazon MSK clusters, or from VPC-based sources that support DNS-based service discovery. Scrapers are flexible, and can be configured to control what metrics are collected, the frequency of collection, what transformations are applied to the metrics, and more. An IAM role will be created for you that Amazon Managed Service for Prometheus uses to access the metrics in your source. You must configure this role with a policy that allows it to scrape metrics from your source. For Amazon EKS sources, see Configuring your Amazon EKS cluster in the Amazon Managed Service for Prometheus User Guide. The scrapeConfiguration parameter contains the base-64 encoded YAML configuration for the scraper. When creating a scraper, the service creates a Network Interface in each Availability Zone that are passed into CreateScraper through subnets. These network interfaces are used to connect to your source within the VPC for scraping metrics. For more information about collectors, including what metrics are collected, and how to configure the scraper, see Using an Amazon Web Services managed collector in the Amazon Managed Service for Prometheus User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alias:
                  $ref: "#/components/schemas/ScraperAlias"
                scrapeConfiguration:
                  $ref: "#/components/schemas/ScrapeConfiguration"
                source:
                  $ref: "#/components/schemas/Source"
                destination:
                  $ref: "#/components/schemas/Destination"
                roleConfiguration:
                  $ref: "#/components/schemas/RoleConfiguration"
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - scrapeConfiguration
                - source
                - destination
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateScraperResponse"
    get:
      operationId: ListScrapers
      description: The ListScrapers operation lists all of the scrapers in your account. This includes scrapers being created or deleted. You can optionally filter the returned list.
      parameters:
        - name: filters
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ScraperFilters"
          description: "(Optional) A list of key-value pairs to filter the list of scrapers returned. Keys include status, sourceArn, destinationArn, and alias. Filters on the same key are OR'd together, and filters on different keys are AND'd together. For example, status=ACTIVE&status=CREATING&alias=Test, will return all scrapers that have the alias Test, and are either in status ACTIVE or CREATING. To find all active scrapers that are sending metrics to a specific Amazon Managed Service for Prometheus workspace, you would use the ARN of the workspace in a query: status=ACTIVE&destinationArn=arn:aws:aps:us-east-1:123456789012:workspace/ws-example1-1234-abcd-56ef-123456789012 If this is included, it filters the results to only the scrapers that match the filter."
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: (Optional) The token for the next set of items to return. (You received this token from a previous call.)
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListScrapersRequestMaxResultsInteger"
          description: Optional) The maximum number of scrapers to return in one ListScrapers operation. The range is 1-1000. If you omit this parameter, the default of 100 is used.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListScrapersResponse"
  /workspaces:
    post:
      operationId: CreateWorkspace
      description: Creates a Prometheus workspace. A workspace is a logical space dedicated to the storage and querying of Prometheus metrics. You can have one or more workspaces in each Region in your account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                alias:
                  $ref: "#/components/schemas/WorkspaceAlias"
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                tags:
                  $ref: "#/components/schemas/TagMap"
                kmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkspaceResponse"
    get:
      operationId: ListWorkspaces
      description: Lists all of the Amazon Managed Service for Prometheus workspaces in your account. This includes workspaces being created or deleted.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The token for the next set of items to return. You receive this token from a previous call, and use it to get the next page of results. The other parameters must be the same as the initial call. For example, if your initial request has maxResults of 10, and there are 12 workspaces to return, then your initial request will return 10 and a nextToken. Using the next token in a subsequent call will return the remaining 2 workspaces.
        - name: alias
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/WorkspaceAlias"
          description: If this is included, it filters the results to only the workspaces with names that start with the value that you specify here. Amazon Managed Service for Prometheus will automatically strip any blank spaces from the beginning and end of the alias that you specify.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListWorkspacesRequestMaxResultsInteger"
          description: The maximum number of workspaces to return per request. The default is 100.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkspacesResponse"
  /workspaces/{workspace_id}/anomalydetectors/{anomaly_detector_id}:
    delete:
      operationId: DeleteAnomalyDetector
      description: Removes an anomaly detector from a workspace. This operation is idempotent.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The identifier of the workspace containing the anomaly detector to delete.
        - name: anomaly_detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AnomalyDetectorId"
          description: The identifier of the anomaly detector to delete.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IdempotencyToken"
          description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
      responses:
        "202":
          description: Success
    get:
      operationId: DescribeAnomalyDetector
      description: Retrieves detailed information about a specific anomaly detector, including its status and configuration.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The identifier of the workspace containing the anomaly detector.
        - name: anomaly_detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AnomalyDetectorId"
          description: The identifier of the anomaly detector to describe.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAnomalyDetectorResponse"
    put:
      operationId: PutAnomalyDetector
      description: When you call PutAnomalyDetector, the operation creates a new anomaly detector if one doesn't exist, or updates an existing one. Each call to this operation triggers a complete retraining of the detector, which includes querying the minimum required samples and backfilling the detector with historical data. This process occurs regardless of whether you're making a minor change like updating the evaluation interval or making more substantial modifications. The operation serves as the single method for creating, updating, and retraining anomaly detectors.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The identifier of the workspace containing the anomaly detector to update.
        - name: anomaly_detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AnomalyDetectorId"
          description: The identifier of the anomaly detector to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                evaluationIntervalInSeconds:
                  $ref: "#/components/schemas/AnomalyDetectorEvaluationInterval"
                missingDataAction:
                  $ref: "#/components/schemas/AnomalyDetectorMissingDataAction"
                configuration:
                  $ref: "#/components/schemas/AnomalyDetectorConfiguration"
                labels:
                  $ref: "#/components/schemas/PrometheusMetricLabelMap"
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
              required:
                - configuration
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutAnomalyDetectorResponse"
  /workspaces/{workspace_id}/policy:
    delete:
      operationId: DeleteResourcePolicy
      description: Deletes the resource-based policy attached to an Amazon Managed Service for Prometheus workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace from which to delete the resource-based policy.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IdempotencyToken"
          description: A unique, case-sensitive identifier that you provide to ensure the request is safe to retry (idempotent).
        - name: revisionId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The revision ID of the policy to delete. Use this parameter to ensure that you are deleting the correct version of the policy.
      responses:
        "202":
          description: Success
    get:
      operationId: DescribeResourcePolicy
      description: Returns information about the resource-based policy attached to an Amazon Managed Service for Prometheus workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to describe the resource-based policy for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeResourcePolicyResponse"
    put:
      operationId: PutResourcePolicy
      description: Creates or updates a resource-based policy for an Amazon Managed Service for Prometheus workspace. Use resource-based policies to grant permissions to other AWS accounts or services to access your workspace. Only Prometheus-compatible APIs can be used for workspace sharing. You can add non-Prometheus-compatible APIs to the policy, but they will be ignored. For more information, see Prometheus-compatible APIs in the Amazon Managed Service for Prometheus User Guide. If your workspace uses customer-managed KMS keys for encryption, you must grant the principals in your resource-based policy access to those KMS keys. You can do this by creating KMS grants. For more information, see CreateGrant in the AWS Key Management Service API Reference and Encryption at rest in the Amazon Managed Service for Prometheus User Guide. For more information about working with IAM, see Using Amazon Managed Service for Prometheus with IAM in the Amazon Managed Service for Prometheus User Guide.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to attach the resource-based policy to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policyDocument:
                  $ref: "#/components/schemas/String"
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                revisionId:
                  $ref: "#/components/schemas/String"
              required:
                - policyDocument
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutResourcePolicyResponse"
  /workspaces/{workspace_id}/rulegroupsnamespaces/{name}:
    delete:
      operationId: DeleteRuleGroupsNamespace
      description: Deletes one rule groups namespace and its associated rule groups definition.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace containing the rule groups namespace and definition to delete.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RuleGroupsNamespaceName"
          description: The name of the rule groups namespace to delete.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IdempotencyToken"
          description: A unique identifier that you can provide to ensure the idempotency of the request. Case-sensitive.
      responses:
        "202":
          description: Success
    get:
      operationId: DescribeRuleGroupsNamespace
      description: Returns complete information about one rule groups namespace. To retrieve a list of rule groups namespaces, use ListRuleGroupsNamespaces.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace containing the rule groups namespace.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RuleGroupsNamespaceName"
          description: The name of the rule groups namespace that you want information for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeRuleGroupsNamespaceResponse"
    put:
      operationId: PutRuleGroupsNamespace
      description: Updates an existing rule groups namespace within a workspace. A rule groups namespace is associated with exactly one rules file. A workspace can have multiple rule groups namespaces. The combined length of a rule group namespace and a rule group name cannot exceed 721 UTF-8 bytes. Use this operation only to update existing rule groups namespaces. To create a new rule groups namespace, use CreateRuleGroupsNamespace. You can't use this operation to add tags to an existing rule groups namespace. Instead, use TagResource.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace where you are updating the rule groups namespace.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RuleGroupsNamespaceName"
          description: The name of the rule groups namespace that you are updating.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: "#/components/schemas/RuleGroupsNamespaceData"
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
              required:
                - data
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutRuleGroupsNamespaceResponse"
  /scrapers/{scraper_id}:
    delete:
      operationId: DeleteScraper
      description: The DeleteScraper operation deletes one scraper, and stops any metrics collection that the scraper performs.
      parameters:
        - name: scraper_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScraperId"
          description: The ID of the scraper to delete.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IdempotencyToken"
          description: (Optional) A unique, case-sensitive identifier that you can provide to ensure the idempotency of the request.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteScraperResponse"
    get:
      operationId: DescribeScraper
      description: The DescribeScraper operation displays information about an existing scraper.
      parameters:
        - name: scraper_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScraperId"
          description: The ID of the scraper to describe.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeScraperResponse"
    put:
      operationId: UpdateScraper
      description: Updates an existing scraper. You can't use this function to update the source from which the scraper is collecting metrics. To change the source, delete the scraper and create a new one.
      parameters:
        - name: scraper_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScraperId"
          description: The ID of the scraper to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                alias:
                  $ref: "#/components/schemas/ScraperAlias"
                scrapeConfiguration:
                  $ref: "#/components/schemas/ScrapeConfiguration"
                destination:
                  $ref: "#/components/schemas/Destination"
                roleConfiguration:
                  $ref: "#/components/schemas/RoleConfiguration"
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateScraperResponse"
  /scrapers/{scraper_id}/logging-configuration:
    delete:
      operationId: DeleteScraperLoggingConfiguration
      description: Deletes the logging configuration for a Amazon Managed Service for Prometheus scraper.
      parameters:
        - name: scraper_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScraperId"
          description: The ID of the scraper whose logging configuration will be deleted.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IdempotencyToken"
          description: A unique, case-sensitive identifier that you provide to ensure the request is processed exactly once.
      responses:
        "202":
          description: Success
    get:
      operationId: DescribeScraperLoggingConfiguration
      description: Describes the logging configuration for a Amazon Managed Service for Prometheus scraper.
      parameters:
        - name: scraper_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScraperId"
          description: The ID of the scraper whose logging configuration will be described.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeScraperLoggingConfigurationResponse"
    put:
      operationId: UpdateScraperLoggingConfiguration
      description: Updates the logging configuration for a Amazon Managed Service for Prometheus scraper.
      parameters:
        - name: scraper_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScraperId"
          description: The ID of the scraper whose logging configuration will be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                loggingDestination:
                  $ref: "#/components/schemas/ScraperLoggingDestination"
                scraperComponents:
                  $ref: "#/components/schemas/ScraperComponents"
              required:
                - loggingDestination
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateScraperLoggingConfigurationResponse"
  /workspaces/{workspace_id}:
    delete:
      operationId: DeleteWorkspace
      description: Deletes an existing workspace. When you delete a workspace, the data that has been ingested into it is not immediately deleted. It will be permanently deleted within one month.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to delete.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IdempotencyToken"
          description: A unique identifier that you can provide to ensure the idempotency of the request. Case-sensitive.
      responses:
        "202":
          description: Success
    get:
      operationId: DescribeWorkspace
      description: Returns information about an existing workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to describe.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeWorkspaceResponse"
  /workspaces/{workspace_id}/configuration:
    get:
      operationId: DescribeWorkspaceConfiguration
      description: Use this operation to return information about the configuration of a workspace. The configuration details returned include workspace configuration status, label set limits, and retention period.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace that you want to retrieve information for. To find the IDs of your workspaces, use the ListWorkspaces operation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeWorkspaceConfigurationResponse"
    patch:
      operationId: UpdateWorkspaceConfiguration
      description: Use this operation to create or update the label sets, label set limits, and retention period of a workspace. You must specify at least one of limitsPerLabelSet or retentionPeriodInDays for the request to be valid.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace that you want to update. To find the IDs of your workspaces, use the ListWorkspaces operation.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                limitsPerLabelSet:
                  $ref: "#/components/schemas/LimitsPerLabelSetList"
                retentionPeriodInDays:
                  $ref: "#/components/schemas/UpdateWorkspaceConfigurationRequestRetentionPeriodInDaysInteger"
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkspaceConfigurationResponse"
  /scraperconfiguration:
    get:
      operationId: GetDefaultScraperConfiguration
      description: The GetDefaultScraperConfiguration operation returns the default scraper configuration used when Amazon EKS creates a scraper for you.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDefaultScraperConfigurationResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: The ListTagsForResource operation returns the tags that are associated with an Amazon Managed Service for Prometheus resource. Currently, the only resources that can be tagged are scrapers, workspaces, and rule groups namespaces.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the resource to list tages for. Must be a workspace, scraper, or rule groups namespace resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: The TagResource operation associates tags with an Amazon Managed Service for Prometheus resource. The only resources that can be tagged are rule groups namespaces, scrapers, and workspaces. If you specify a new tag key for the resource, this tag is appended to the list of tags associated with the resource. If you specify a tag key that is already associated with the resource, the new tag value that you specify replaces the previous value for that tag. To remove a tag, use UntagResource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the resource to apply tags to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes the specified tags from an Amazon Managed Service for Prometheus resource. The only resources that can be tagged are rule groups namespaces, scrapers, and workspaces.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the resource from which to remove a tag.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: The keys of the tags to remove.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /workspaces/{workspace_id}/alias:
    post:
      operationId: UpdateWorkspaceAlias
      description: Updates the alias of an existing workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                alias:
                  $ref: "#/components/schemas/WorkspaceAlias"
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
      responses:
        "204":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    WorkspaceId:
      description: A workspace ID.
      type: string
      minLength: 1
      maxLength: 64
      pattern: .*[0-9A-Za-z][-.0-9A-Z_a-z]*.*
    AlertManagerDefinitionData:
      description: The base-64 encoded blob that is alert manager definition. For details about the alert manager definition, see AlertManagedDefinitionData.
      type: string
      format: byte
    IdempotencyToken:
      description: An identifier used to ensure the idempotency of a write request.
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[!-~]+"
    CreateAlertManagerDefinitionResponse:
      description: Represents the output of a CreateAlertManagerDefinition operation.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/AlertManagerDefinitionStatus"
          description: A structure that displays the current status of the alert manager definition.
      required:
        - status
    AlertManagerDefinitionStatus:
      description: The status of the alert manager.
      type: object
      properties:
        statusCode:
          $ref: "#/components/schemas/AlertManagerDefinitionStatusCode"
          description: The current status of the alert manager.
        statusReason:
          $ref: "#/components/schemas/String"
          description: If there is a failure, the reason for the failure.
      required:
        - statusCode
    AlertManagerDefinitionStatusCode:
      description: State of an AlertManagerDefinition.
      type: string
      enum:
        - CREATING
        - ACTIVE
        - UPDATING
        - DELETING
        - CREATION_FAILED
        - UPDATE_FAILED
    String:
      type: string
    AnomalyDetectorAlias:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[0-9A-Za-z][-.0-9A-Z_a-z]*"
    AnomalyDetectorEvaluationInterval:
      type: integer
      minimum: 30
      maximum: 86400
    AnomalyDetectorMissingDataAction:
      description: Specifies the action to take when data is missing during anomaly detection evaluation.
      type: object
      properties:
        markAsAnomaly:
          $ref: "#/components/schemas/Boolean"
          description: Marks missing data points as anomalies.
        skip:
          $ref: "#/components/schemas/Boolean"
          description: Skips evaluation when data is missing.
    Boolean:
      type: boolean
    AnomalyDetectorConfiguration:
      description: The configuration for the anomaly detection algorithm.
      type: object
      properties:
        randomCutForest:
          $ref: "#/components/schemas/RandomCutForestConfiguration"
          description: The Random Cut Forest algorithm configuration for anomaly detection.
    RandomCutForestConfiguration:
      description: Configuration for the Random Cut Forest algorithm used for anomaly detection in time-series data.
      type: object
      properties:
        query:
          $ref: "#/components/schemas/RandomCutForestQuery"
          description: "The Prometheus query used to retrieve the time-series data for anomaly detection. Random Cut Forest queries must be wrapped by a supported PromQL aggregation operator. For more information, see Aggregation operators on the Prometheus docs website. Supported PromQL aggregation operators: avg, count, group, max, min, quantile, stddev, stdvar, and sum."
        shingleSize:
          $ref: "#/components/schemas/RandomCutForestConfigurationShingleSizeInteger"
          description: The number of consecutive data points used to create a shingle for the Random Cut Forest algorithm. The default number is 8 consecutive data points.
        sampleSize:
          $ref: "#/components/schemas/RandomCutForestConfigurationSampleSizeInteger"
          description: The number of data points sampled from the input stream for the Random Cut Forest algorithm. The default number is 256 consecutive data points.
        ignoreNearExpectedFromAbove:
          $ref: "#/components/schemas/IgnoreNearExpected"
          description: Configuration for ignoring values that are near expected values from above during anomaly detection.
        ignoreNearExpectedFromBelow:
          $ref: "#/components/schemas/IgnoreNearExpected"
          description: Configuration for ignoring values that are near expected values from below during anomaly detection.
      required:
        - query
    RandomCutForestQuery:
      type: string
      minLength: 1
      maxLength: 8192
    RandomCutForestConfigurationShingleSizeInteger:
      type: integer
      minimum: 2
      maximum: 1024
    RandomCutForestConfigurationSampleSizeInteger:
      type: integer
      minimum: 256
      maximum: 1024
    IgnoreNearExpected:
      description: Configuration for threshold settings that determine when values near expected values should be ignored during anomaly detection.
      type: object
      properties:
        amount:
          $ref: "#/components/schemas/IgnoreNearExpectedAmountDouble"
          description: The absolute amount by which values can differ from expected values before being considered anomalous.
        ratio:
          $ref: "#/components/schemas/IgnoreNearExpectedRatioDouble"
          description: The ratio by which values can differ from expected values before being considered anomalous.
    IgnoreNearExpectedAmountDouble:
      type: number
      format: double
      minimum: 0
    IgnoreNearExpectedRatioDouble:
      type: number
      format: double
      minimum: 0
    CreateAnomalyDetectorRequestLabelsMap:
      type: object
      properties: {}
    TagMap:
      description: A tag associated with a resource.
      type: object
      properties: {}
    CreateAnomalyDetectorResponse:
      type: object
      properties:
        anomalyDetectorId:
          $ref: "#/components/schemas/AnomalyDetectorId"
          description: The unique identifier of the created anomaly detector.
        arn:
          $ref: "#/components/schemas/AnomalyDetectorArn"
          description: The Amazon Resource Name (ARN) of the created anomaly detector.
        status:
          $ref: "#/components/schemas/AnomalyDetectorStatus"
          description: The status information of the created anomaly detector.
        tags:
          type: object
          properties: {}
          description: The tags applied to the created anomaly detector.
      required:
        - anomalyDetectorId
        - arn
        - status
    AnomalyDetectorId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ad-[0-9A-Za-z][-.0-9A-Z_a-z]*
    AnomalyDetectorArn:
      type: string
      pattern: arn:aws[-a-z]*:aps:[-a-z0-9]+:[0-9]{12}:anomalydetector/ws-.+/ad-.+
    AnomalyDetectorStatus:
      description: The status information of an anomaly detector.
      type: object
      properties:
        statusCode:
          $ref: "#/components/schemas/AnomalyDetectorStatusCode"
          description: The status code of the anomaly detector.
        statusReason:
          $ref: "#/components/schemas/String"
          description: A description of the current status of the anomaly detector.
      required:
        - statusCode
    AnomalyDetectorStatusCode:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - UPDATING
        - DELETING
        - CREATION_FAILED
        - UPDATE_FAILED
        - DELETION_FAILED
    LogGroupArn:
      type: string
      pattern: arn:aws[a-z0-9-]*:logs:[a-z0-9-]+:[0-9]{12}:log-group:[A-Za-z0-9\.\-\_\#/]{1,512}\:\*
    CreateLoggingConfigurationResponse:
      description: Represents the output of a CreateLoggingConfiguration operation.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/LoggingConfigurationStatus"
          description: A structure that displays the current status of the logging configuration.
      required:
        - status
    LoggingConfigurationStatus:
      description: The status of the logging configuration.
      type: object
      properties:
        statusCode:
          $ref: "#/components/schemas/LoggingConfigurationStatusCode"
          description: The current status of the current rules and alerting logging configuration. These logging configurations are only for rules and alerting logs.
        statusReason:
          $ref: "#/components/schemas/String"
          description: If failed, the reason for the failure.
      required:
        - statusCode
    LoggingConfigurationStatusCode:
      description: State of a logging configuration.
      type: string
      enum:
        - CREATING
        - ACTIVE
        - UPDATING
        - DELETING
        - CREATION_FAILED
        - UPDATE_FAILED
    LoggingDestinations:
      description: A list structure that contains a single CloudWatch Logs destination.
      type: array
      items:
        $ref: "#/components/schemas/LoggingDestination"
    LoggingDestination:
      description: Defines a destination and its associated filtering criteria for query logging.
      type: object
      properties:
        cloudWatchLogs:
          $ref: "#/components/schemas/CloudWatchLogDestination"
          description: Configuration details for logging to CloudWatch Logs.
        filters:
          $ref: "#/components/schemas/LoggingFilter"
          description: Filtering criteria that determine which queries are logged.
      required:
        - cloudWatchLogs
        - filters
    CloudWatchLogDestination:
      description: Configuration details for logging to CloudWatch Logs.
      type: object
      properties:
        logGroupArn:
          $ref: "#/components/schemas/LogGroupArn"
          description: The ARN of the CloudWatch log group to which the vended log data will be published. This log group must exist prior to calling this operation.
      required:
        - logGroupArn
    LoggingFilter:
      description: Filtering criteria that determine which queries are logged.
      type: object
      properties:
        qspThreshold:
          $ref: "#/components/schemas/LoggingFilterQspThresholdLong"
          description: The Query Samples Processed (QSP) threshold above which queries will be logged. Queries processing more samples than this threshold will be captured in logs.
      required:
        - qspThreshold
    LoggingFilterQspThresholdLong:
      type: integer
      format: int64
      minimum: 0
    CreateQueryLoggingConfigurationResponse:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/QueryLoggingConfigurationStatus"
          description: The current status of the query logging configuration.
      required:
        - status
    QueryLoggingConfigurationStatus:
      description: The status information for a query logging configuration.
      type: object
      properties:
        statusCode:
          $ref: "#/components/schemas/QueryLoggingConfigurationStatusCode"
          description: The current status of the query logging configuration.
        statusReason:
          $ref: "#/components/schemas/String"
          description: If there is a failure, the reason for the failure.
      required:
        - statusCode
    QueryLoggingConfigurationStatusCode:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - UPDATING
        - DELETING
        - CREATION_FAILED
        - UPDATE_FAILED
    RuleGroupsNamespaceName:
      description: The name of the namespace that the rule group belong to.
      type: string
      minLength: 1
      maxLength: 128
      pattern: .*[0-9A-Za-z][-.0-9A-Z_a-z]*.*
    RuleGroupsNamespaceData:
      description: The rule groups namespace data.
      type: string
      format: byte
    CreateRuleGroupsNamespaceResponse:
      description: Represents the output of a CreateRuleGroupsNamespace operation.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/RuleGroupsNamespaceName"
          description: The name of the new rule groups namespace.
        arn:
          $ref: "#/components/schemas/RuleGroupsNamespaceArn"
          description: The Amazon Resource Name (ARN) of the new rule groups namespace.
        status:
          $ref: "#/components/schemas/RuleGroupsNamespaceStatus"
          description: A structure that returns the current status of the rule groups namespace.
        tags:
          type: object
          properties: {}
          description: The list of tag keys and values that are associated with the namespace.
      required:
        - name
        - arn
        - status
    RuleGroupsNamespaceArn:
      description: An ARN identifying a rule groups namespace.
      type: string
    RuleGroupsNamespaceStatus:
      description: The status information about a rule groups namespace.
      type: object
      properties:
        statusCode:
          $ref: "#/components/schemas/RuleGroupsNamespaceStatusCode"
          description: The current status of the namespace.
        statusReason:
          $ref: "#/components/schemas/String"
          description: The reason for the failure, if any.
      required:
        - statusCode
    RuleGroupsNamespaceStatusCode:
      description: State of a namespace.
      type: string
      enum:
        - CREATING
        - ACTIVE
        - UPDATING
        - DELETING
        - CREATION_FAILED
        - UPDATE_FAILED
    ScraperAlias:
      description: An optional user-assigned scraper alias.
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[0-9A-Za-z][-.0-9A-Z_a-z]*"
    ScrapeConfiguration:
      description: A scrape configuration for a scraper, base 64 encoded. For more information, see Scraper configuration in the Amazon Managed Service for Prometheus User Guide.
      type: object
      properties:
        configurationBlob:
          $ref: "#/components/schemas/Blob"
          description: The base 64 encoded scrape configuration file.
    Blob:
      type: string
      format: byte
    Source:
      description: The source of collected metrics for a scraper.
      type: object
      properties:
        eksConfiguration:
          $ref: "#/components/schemas/EksConfiguration"
          description: The Amazon EKS cluster from which a scraper collects metrics.
        vpcConfiguration:
          $ref: "#/components/schemas/VpcConfiguration"
          description: The Amazon VPC configuration for the Prometheus collector when connecting to Amazon MSK clusters. This configuration enables secure, private network connectivity between the collector and your Amazon MSK cluster within your Amazon VPC.
    EksConfiguration:
      description: The EksConfiguration structure describes the connection to the Amazon EKS cluster from which a scraper collects metrics.
      type: object
      properties:
        clusterArn:
          $ref: "#/components/schemas/ClusterArn"
          description: ARN of the Amazon EKS cluster.
        securityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: A list of the security group IDs for the Amazon EKS cluster VPC configuration.
        subnetIds:
          $ref: "#/components/schemas/SubnetIds"
          description: A list of subnet IDs for the Amazon EKS cluster VPC configuration.
      required:
        - clusterArn
        - subnetIds
    ClusterArn:
      description: The ARN of an EKS cluster.
      type: string
      pattern: arn:aws[-a-z]*:eks:[-a-z0-9]+:[0-9]{12}:cluster/.+
    SecurityGroupIds:
      description: A list of security group IDs specified for VPC configuration.
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      description: ID of a VPC security group.
      type: string
      minLength: 0
      maxLength: 255
      pattern: sg-[0-9a-z]+
    SubnetIds:
      description: A list of subnet IDs specified for VPC configuration.
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      description: ID of a VPC subnet.
      type: string
      minLength: 0
      maxLength: 255
      pattern: subnet-[0-9a-z]+
    VpcConfiguration:
      description: The Amazon VPC configuration that specifies the network settings for a Prometheus collector to securely connect to Amazon MSK clusters. This configuration includes the security groups and subnets that control network access and placement for the collector.
      type: object
      properties:
        securityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: The security group IDs that control network access for the Prometheus collector. These security groups must allow the collector to communicate with your Amazon MSK cluster on the required ports.
        subnetIds:
          $ref: "#/components/schemas/SubnetIds"
          description: The subnet IDs where the Prometheus collector will be deployed. The subnets must be in the same Amazon VPC as your Amazon MSK cluster and have network connectivity to the cluster.
      required:
        - securityGroupIds
        - subnetIds
    Destination:
      description: Where to send the metrics from a scraper.
      type: object
      properties:
        ampConfiguration:
          $ref: "#/components/schemas/AmpConfiguration"
          description: The Amazon Managed Service for Prometheus workspace to send metrics to.
    AmpConfiguration:
      description: The AmpConfiguration structure defines the Amazon Managed Service for Prometheus instance a scraper should send metrics to.
      type: object
      properties:
        workspaceArn:
          $ref: "#/components/schemas/WorkspaceArn"
          description: ARN of the Amazon Managed Service for Prometheus workspace.
      required:
        - workspaceArn
    WorkspaceArn:
      description: An ARN identifying a Workspace.
      type: string
      pattern: arn:aws[-a-z]*:aps:[-a-z0-9]+:[0-9]{12}:workspace/.+
    RoleConfiguration:
      description: Use this structure to enable cross-account access, so that you can use a target account to access Prometheus metrics from source accounts.
      type: object
      properties:
        sourceRoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of the role used in the source account to enable cross-account scraping. For information about the contents of this policy, see Cross-account setup.
        targetRoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of the role used in the target account to enable cross-account scraping. For information about the contents of this policy, see Cross-account setup.
    IamRoleArn:
      description: An ARN identifying an IAM role used by the scraper.
      type: string
      pattern: arn:aws[-a-z]*:iam::[0-9]{12}:role/.+
    CreateScraperResponse:
      description: Represents the output of a CreateScraper operation.
      type: object
      properties:
        scraperId:
          $ref: "#/components/schemas/ScraperId"
          description: The ID of the new scraper.
        arn:
