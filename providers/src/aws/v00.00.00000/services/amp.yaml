      items:
        $ref: "#/components/schemas/LimitsPerLabelSet"
    LimitsPerLabelSet:
      description: This structure defines one label set used to enforce active time series limits for the workspace, and defines the limit for that label set. A label set is a unique combination of label-value pairs. Use them to control time series limits and to monitor usage by specific label groups. Example label sets might be team:finance or env:prod
      type: object
      properties:
