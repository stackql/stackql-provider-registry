          $ref: "#/components/schemas/String"
          description: The name of your cluster.
        arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the cluster.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix epoch timestamp at object creation.
        version:
          $ref: "#/components/schemas/String"
          description: The Kubernetes server version for the cluster.
        endpoint:
          $ref: "#/components/schemas/String"
          description: The endpoint for your Kubernetes API server.
        roleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the IAM role that provides permissions for the Kubernetes control plane to make calls to Amazon Web Services API operations on your behalf.
        resourcesVpcConfig:
          $ref: "#/components/schemas/VpcConfigResponse"
          description: The VPC configuration used by the cluster control plane. Amazon EKS VPC resources have specific requirements to work properly with Kubernetes. For more information, see Cluster VPC considerations and Cluster security group considerations in the Amazon EKS User Guide.
        kubernetesNetworkConfig:
          $ref: "#/components/schemas/KubernetesNetworkConfigResponse"
          description: The Kubernetes network configuration for the cluster.
        logging:
          $ref: "#/components/schemas/Logging"
          description: The logging configuration for your cluster.
        identity:
          $ref: "#/components/schemas/Identity"
          description: The identity provider information for the cluster.
        status:
          $ref: "#/components/schemas/ClusterStatus"
          description: The current status of the cluster.
        certificateAuthority:
          $ref: "#/components/schemas/Certificate"
          description: The certificate-authority-data for your cluster.
        clientRequestToken:
          $ref: "#/components/schemas/String"
          description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
        platformVersion:
          $ref: "#/components/schemas/String"
          description: The platform version of your Amazon EKS cluster. For more information about clusters deployed on the Amazon Web Services Cloud, see Platform versions in the Amazon EKS User Guide . For more information about local clusters deployed on an Outpost, see Amazon EKS local cluster platform versions in the Amazon EKS User Guide .
        tags:
          type: object
          properties: {}
          description: Metadata that assists with categorization and organization. Each tag consists of a key and an optional value. You define both. Tags don't propagate to any other cluster or Amazon Web Services resources.
        encryptionConfig:
          $ref: "#/components/schemas/EncryptionConfigList"
          description: The encryption configuration for the cluster.
        connectorConfig:
          $ref: "#/components/schemas/ConnectorConfigResponse"
          description: The configuration used to connect to a cluster for registration.
        id:
          $ref: "#/components/schemas/String"
          description: The ID of your local Amazon EKS cluster on an Amazon Web Services Outpost. This property isn't available for an Amazon EKS cluster on the Amazon Web Services cloud.
        health:
          $ref: "#/components/schemas/ClusterHealth"
          description: An object representing the health of your Amazon EKS cluster.
        outpostConfig:
          $ref: "#/components/schemas/OutpostConfigResponse"
          description: An object representing the configuration of your local Amazon EKS cluster on an Amazon Web Services Outpost. This object isn't available for clusters on the Amazon Web Services cloud.
        accessConfig:
          $ref: "#/components/schemas/AccessConfigResponse"
          description: The access configuration for the cluster.
        upgradePolicy:
          $ref: "#/components/schemas/UpgradePolicyResponse"
          description: This value indicates if extended support is enabled or disabled for the cluster. Learn more about EKS Extended Support in the Amazon EKS User Guide.
        zonalShiftConfig:
          $ref: "#/components/schemas/ZonalShiftConfigResponse"
          description: The configuration for zonal shift for the cluster.
        remoteNetworkConfig:
          $ref: "#/components/schemas/RemoteNetworkConfigResponse"
          description: The configuration in the cluster for EKS Hybrid Nodes. You can add, change, or remove this configuration after the cluster is created.
        computeConfig:
          $ref: "#/components/schemas/ComputeConfigResponse"
          description: Indicates the current configuration of the compute capability on your EKS Auto Mode cluster. For example, if the capability is enabled or disabled. If the compute capability is enabled, EKS Auto Mode will create and delete EC2 Managed Instances in your Amazon Web Services account. For more information, see EKS Auto Mode compute capability in the Amazon EKS User Guide.
        storageConfig:
          $ref: "#/components/schemas/StorageConfigResponse"
          description: Indicates the current configuration of the block storage capability on your EKS Auto Mode cluster. For example, if the capability is enabled or disabled. If the block storage capability is enabled, EKS Auto Mode will create and delete EBS volumes in your Amazon Web Services account. For more information, see EKS Auto Mode block storage capability in the Amazon EKS User Guide.
        deletionProtection:
          $ref: "#/components/schemas/BoxedBoolean"
          description: The current deletion protection setting for the cluster. When true, deletion protection is enabled and the cluster cannot be deleted until protection is disabled. When false, the cluster can be deleted normally. This setting only applies to clusters in an active state.
        controlPlaneScalingConfig:
          $ref: "#/components/schemas/ControlPlaneScalingConfig"
          description: The control plane scaling tier configuration. For more information, see EKS Provisioned Control Plane in the Amazon EKS User Guide.
    VpcConfigResponse:
      description: An object representing an Amazon EKS cluster VPC configuration response.
      type: object
      properties:
        subnetIds:
          $ref: "#/components/schemas/StringList"
          description: The subnets associated with your cluster.
        securityGroupIds:
          $ref: "#/components/schemas/StringList"
          description: The security groups associated with the cross-account elastic network interfaces that are used to allow communication between your nodes and the Kubernetes control plane.
        clusterSecurityGroupId:
          $ref: "#/components/schemas/String"
          description: The cluster security group that was created by Amazon EKS for the cluster. Managed node groups use this security group for control-plane-to-data-plane communication.
        vpcId:
          $ref: "#/components/schemas/String"
          description: The VPC associated with your cluster.
        endpointPublicAccess:
          $ref: "#/components/schemas/Boolean"
          description: Whether the public API server endpoint is enabled.
        endpointPrivateAccess:
          $ref: "#/components/schemas/Boolean"
          description: This parameter indicates whether the Amazon EKS private API server endpoint is enabled. If the Amazon EKS private API server endpoint is enabled, Kubernetes API requests that originate from within your cluster's VPC use the private VPC endpoint instead of traversing the internet. If this value is disabled and you have nodes or Fargate pods in the cluster, then ensure that publicAccessCidrs includes the necessary CIDR blocks for communication with the nodes or Fargate pods. For more information, see Cluster API server endpoint in the Amazon EKS User Guide .
        publicAccessCidrs:
          $ref: "#/components/schemas/StringList"
          description: The CIDR blocks that are allowed access to your cluster's public Kubernetes API server endpoint. Communication to the endpoint from addresses outside of the CIDR blocks that you specify is denied. The default value is 0.0.0.0/0 and additionally ::/0 for dual-stack `IPv6` clusters. If you've disabled private endpoint access, make sure that you specify the necessary CIDR blocks for every node and Fargate Pod in the cluster. For more information, see Cluster API server endpoint in the Amazon EKS User Guide . Note that the public endpoints are dual-stack for only IPv6 clusters that are made after October 2024. You can't add IPv6 CIDR blocks to IPv4 clusters or IPv6 clusters that were made before October 2024.
    Boolean:
      type: boolean
    KubernetesNetworkConfigResponse:
      description: The Kubernetes network configuration for the cluster. The response contains a value for serviceIpv6Cidr or serviceIpv4Cidr, but not both.
      type: object
      properties:
        serviceIpv4Cidr:
          $ref: "#/components/schemas/String"
          description: The CIDR block that Kubernetes Pod and Service object IP addresses are assigned from. Kubernetes assigns addresses from an IPv4 CIDR block assigned to a subnet that the node is in. If you didn't specify a CIDR block when you created the cluster, then Kubernetes assigns addresses from either the 10.100.0.0/16 or 172.20.0.0/16 CIDR blocks. If this was specified, then it was specified when the cluster was created and it can't be changed.
        serviceIpv6Cidr:
          $ref: "#/components/schemas/String"
          description: The CIDR block that Kubernetes pod and service IP addresses are assigned from if you created a 1.21 or later cluster with version 1.10.1 or later of the Amazon VPC CNI add-on and specified ipv6 for ipFamily when you created the cluster. Kubernetes assigns service addresses from the unique local address range (fc00::/7) because you can't specify a custom IPv6 CIDR block when you create the cluster.
        ipFamily:
          $ref: "#/components/schemas/IpFamily"
          description: The IP family used to assign Kubernetes Pod and Service objects IP addresses. The IP family is always ipv4, unless you have a 1.21 or later cluster running version 1.10.1 or later of the Amazon VPC CNI plugin for Kubernetes and specified ipv6 when you created the cluster.
        elasticLoadBalancing:
          $ref: "#/components/schemas/ElasticLoadBalancing"
          description: Indicates the current configuration of the load balancing capability on your EKS Auto Mode cluster. For example, if the capability is enabled or disabled.
    Identity:
      description: An object representing an identity provider.
      type: object
      properties:
        oidc:
          $ref: "#/components/schemas/OIDC"
          description: An object representing the OpenID Connect identity provider information.
    OIDC:
      description: An object representing the OpenID Connect (OIDC) identity provider information for the cluster.
      type: object
      properties:
        issuer:
          $ref: "#/components/schemas/String"
          description: The issuer URL for the OIDC identity provider.
    ClusterStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - DELETING
        - FAILED
        - UPDATING
        - PENDING
    Certificate:
      description: An object representing the certificate-authority-data for your cluster.
      type: object
      properties:
        data:
          $ref: "#/components/schemas/String"
          description: The Base64-encoded certificate data required to communicate with your cluster. Add this to the certificate-authority-data section of the kubeconfig file for your cluster.
    ConnectorConfigResponse:
      description: The full description of your connected cluster.
      type: object
      properties:
        activationId:
          $ref: "#/components/schemas/String"
          description: A unique ID associated with the cluster for registration purposes.
        activationCode:
          $ref: "#/components/schemas/String"
          description: A unique code associated with the cluster for registration purposes.
        activationExpiry:
          $ref: "#/components/schemas/Timestamp"
          description: The expiration time of the connected cluster. The cluster's YAML file must be applied through the native provider.
        provider:
          $ref: "#/components/schemas/String"
          description: The cluster's cloud service provider.
        roleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the role to communicate with services from the connected Kubernetes cluster.
    ClusterHealth:
      description: An object representing the health of your Amazon EKS cluster.
      type: object
      properties:
        issues:
          $ref: "#/components/schemas/ClusterIssueList"
          description: An object representing the health issues of your Amazon EKS cluster.
    ClusterIssueList:
      type: array
      items:
        $ref: "#/components/schemas/ClusterIssue"
    ClusterIssue:
      description: An issue with your Amazon EKS cluster.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/ClusterIssueCode"
          description: The error code of the issue.
        message:
          $ref: "#/components/schemas/String"
          description: A description of the issue.
        resourceIds:
          $ref: "#/components/schemas/StringList"
          description: The resource IDs that the issue relates to.
    ClusterIssueCode:
      type: string
      enum:
        - AccessDenied
        - ClusterUnreachable
        - ConfigurationConflict
        - InternalFailure
        - ResourceLimitExceeded
        - ResourceNotFound
        - IamRoleNotFound
        - VpcNotFound
        - InsufficientFreeAddresses
        - Ec2ServiceNotSubscribed
        - Ec2SubnetNotFound
        - Ec2SecurityGroupNotFound
        - KmsGrantRevoked
        - KmsKeyNotFound
        - KmsKeyMarkedForDeletion
        - KmsKeyDisabled
        - StsRegionalEndpointDisabled
        - UnsupportedVersion
        - Other
    OutpostConfigResponse:
      description: An object representing the configuration of your local Amazon EKS cluster on an Amazon Web Services Outpost. This API isn't available for Amazon EKS clusters on the Amazon Web Services cloud.
      type: object
      properties:
        outpostArns:
          $ref: "#/components/schemas/StringList"
          description: The ARN of the Outpost that you specified for use with your local Amazon EKS cluster on Outposts.
        controlPlaneInstanceType:
          $ref: "#/components/schemas/String"
          description: The Amazon EC2 instance type used for the control plane. The instance type is the same for all control plane instances.
        controlPlanePlacement:
          $ref: "#/components/schemas/ControlPlanePlacementResponse"
          description: An object representing the placement configuration for all the control plane instances of your local Amazon EKS cluster on an Amazon Web Services Outpost. For more information, see Capacity considerations in the Amazon EKS User Guide.
      required:
        - outpostArns
        - controlPlaneInstanceType
    ControlPlanePlacementResponse:
      description: The placement configuration for all the control plane instances of your local Amazon EKS cluster on an Amazon Web Services Outpost. For more information, see Capacity considerations in the Amazon EKS User Guide.
      type: object
      properties:
        groupName:
          $ref: "#/components/schemas/String"
          description: The name of the placement group for the Kubernetes control plane instances.
    AccessConfigResponse:
      description: The access configuration for the cluster.
      type: object
      properties:
        bootstrapClusterCreatorAdminPermissions:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Specifies whether or not the cluster creator IAM principal was set as a cluster admin access entry during cluster creation time.
        authenticationMode:
          $ref: "#/components/schemas/AuthenticationMode"
          description: The current authentication mode of the cluster.
    UpgradePolicyResponse:
      description: This value indicates if extended support is enabled or disabled for the cluster. Learn more about EKS Extended Support in the Amazon EKS User Guide.
      type: object
      properties:
        supportType:
          $ref: "#/components/schemas/SupportType"
          description: If the cluster is set to EXTENDED, it will enter extended support at the end of standard support. If the cluster is set to STANDARD, it will be automatically upgraded at the end of standard support. Learn more about EKS Extended Support in the Amazon EKS User Guide.
    ZonalShiftConfigResponse:
      description: The status of zonal shift configuration for the cluster
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Whether the zonal shift is enabled.
    RemoteNetworkConfigResponse:
      description: The configuration in the cluster for EKS Hybrid Nodes. You can add, change, or remove this configuration after the cluster is created.
      type: object
      properties:
        remoteNodeNetworks:
          $ref: "#/components/schemas/RemoteNodeNetworkList"
          description: The list of network CIDRs that can contain hybrid nodes.
        remotePodNetworks:
          $ref: "#/components/schemas/RemotePodNetworkList"
          description: The list of network CIDRs that can contain pods that run Kubernetes webhooks on hybrid nodes.
    ComputeConfigResponse:
      description: Indicates the status of the request to update the compute capability of your EKS Auto Mode cluster.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Indicates if the compute capability is enabled on your EKS Auto Mode cluster. If the compute capability is enabled, EKS Auto Mode will create and delete EC2 Managed Instances in your Amazon Web Services account.
        nodePools:
          $ref: "#/components/schemas/StringList"
          description: Indicates the current configuration of node pools in your EKS Auto Mode cluster. For more information, see EKS Auto Mode Node Pools in the Amazon EKS User Guide.
        nodeRoleArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the IAM Role EKS will assign to EC2 Managed Instances in your EKS Auto Mode cluster.
    StorageConfigResponse:
      description: Indicates the status of the request to update the block storage capability of your EKS Auto Mode cluster.
      type: object
      properties:
        blockStorage:
          $ref: "#/components/schemas/BlockStorage"
          description: Indicates the current configuration of the block storage capability on your EKS Auto Mode cluster. For example, if the capability is enabled or disabled.
    EksAnywhereSubscriptionName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[0-9A-Za-z][A-Za-z0-9\-_]*
    EksAnywhereSubscriptionTerm:
      description: An object representing the term duration and term unit type of your subscription. This determines the term length of your subscription. Valid values are MONTHS for term unit and 12 or 36 for term duration, indicating a 12 month or 36 month subscription.
      type: object
      properties:
        duration:
          $ref: "#/components/schemas/Integer"
          description: The duration of the subscription term. Valid values are 12 and 36, indicating a 12 month or 36 month subscription.
        unit:
          $ref: "#/components/schemas/EksAnywhereSubscriptionTermUnit"
          description: The term unit of the subscription. Valid value is MONTHS.
    Integer:
      type: integer
    EksAnywhereSubscriptionTermUnit:
      type: string
      enum:
        - MONTHS
    EksAnywhereSubscriptionLicenseType:
      type: string
      enum:
        - Cluster
    CreateEksAnywhereSubscriptionResponse:
      type: object
      properties:
        subscription:
          $ref: "#/components/schemas/EksAnywhereSubscription"
          description: The full description of the subscription.
    EksAnywhereSubscription:
      description: An EKS Anywhere subscription authorizing the customer to support for licensed clusters and access to EKS Anywhere Curated Packages.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: UUID identifying a subscription.
        arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) for the subscription.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp in seconds for when the subscription was created.
        effectiveDate:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp in seconds for when the subscription is effective.
        expirationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp in seconds for when the subscription will expire or auto renew, depending on the auto renew configuration of the subscription object.
        licenseQuantity:
          $ref: "#/components/schemas/Integer"
          description: The number of licenses included in a subscription. Valid values are between 1 and 100.
        licenseType:
          $ref: "#/components/schemas/EksAnywhereSubscriptionLicenseType"
          description: The type of licenses included in the subscription. Valid value is CLUSTER. With the CLUSTER license type, each license covers support for a single EKS Anywhere cluster.
        term:
          $ref: "#/components/schemas/EksAnywhereSubscriptionTerm"
          description: An EksAnywhereSubscriptionTerm object.
        status:
          $ref: "#/components/schemas/String"
          description: The status of a subscription.
        autoRenew:
          $ref: "#/components/schemas/Boolean"
          description: A boolean indicating whether or not a subscription will auto renew when it expires.
        licenseArns:
          $ref: "#/components/schemas/StringList"
          description: Amazon Web Services License Manager ARN associated with the subscription.
        licenses:
          $ref: "#/components/schemas/LicenseList"
          description: Includes all of the claims in the license token necessary to validate the license for extended support.
        tags:
          type: object
          properties: {}
          description: The metadata for a subscription to assist with categorization and organization. Each tag consists of a key and an optional value. Subscription tags do not propagate to any other resources associated with the subscription.
    LicenseList:
      type: array
      items:
        $ref: "#/components/schemas/License"
    License:
      description: An EKS Anywhere license associated with a subscription.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: An id associated with an EKS Anywhere subscription license.
        token:
          $ref: "#/components/schemas/String"
          description: An optional license token that can be used for extended support verification.
    FargateProfileSelectors:
      type: array
      items:
        $ref: "#/components/schemas/FargateProfileSelector"
    FargateProfileSelector:
      description: An object representing an Fargate profile selector.
      type: object
      properties:
        namespace:
          $ref: "#/components/schemas/String"
          description: The Kubernetes namespace that the selector should match.
        labels:
          type: object
          properties: {}
          description: The Kubernetes labels that the selector should match. A pod must contain all of the labels that are specified in the selector for it to be considered a match.
    CreateFargateProfileResponse:
      type: object
      properties:
        fargateProfile:
          $ref: "#/components/schemas/FargateProfile"
          description: The full description of your new Fargate profile.
    FargateProfile:
      description: An object representing an Fargate profile.
      type: object
      properties:
        fargateProfileName:
          $ref: "#/components/schemas/String"
          description: The name of the Fargate profile.
        fargateProfileArn:
          $ref: "#/components/schemas/String"
          description: The full Amazon Resource Name (ARN) of the Fargate profile.
        clusterName:
          $ref: "#/components/schemas/String"
          description: The name of your cluster.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix epoch timestamp at object creation.
        podExecutionRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Pod execution role to use for any Pod that matches the selectors in the Fargate profile. For more information, see Pod execution role in the Amazon EKS User Guide.
        subnets:
          $ref: "#/components/schemas/StringList"
          description: The IDs of subnets to launch a Pod into.
        selectors:
          $ref: "#/components/schemas/FargateProfileSelectors"
          description: The selectors to match for a Pod to use this Fargate profile.
        status:
          $ref: "#/components/schemas/FargateProfileStatus"
          description: The current status of the Fargate profile.
        tags:
          type: object
          properties: {}
          description: Metadata that assists with categorization and organization. Each tag consists of a key and an optional value. You define both. Tags don't propagate to any other cluster or Amazon Web Services resources.
        health:
          $ref: "#/components/schemas/FargateProfileHealth"
          description: The health status of the Fargate profile. If there are issues with your Fargate profile's health, they are listed here.
    FargateProfileStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - DELETING
        - CREATE_FAILED
        - DELETE_FAILED
    FargateProfileHealth:
      description: The health status of the Fargate profile. If there are issues with your Fargate profile's health, they are listed here.
      type: object
      properties:
        issues:
          $ref: "#/components/schemas/FargateProfileIssueList"
          description: Any issues that are associated with the Fargate profile.
    FargateProfileIssueList:
      type: array
      items:
        $ref: "#/components/schemas/FargateProfileIssue"
    FargateProfileIssue:
      description: An issue that is associated with the Fargate profile.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/FargateProfileIssueCode"
          description: A brief description of the error.
        message:
          $ref: "#/components/schemas/String"
          description: The error message associated with the issue.
        resourceIds:
          $ref: "#/components/schemas/StringList"
          description: The Amazon Web Services resources that are affected by this issue.
    FargateProfileIssueCode:
      type: string
      enum:
        - PodExecutionRoleAlreadyInUse
        - AccessDenied
        - ClusterUnreachable
        - InternalFailure
    NodegroupScalingConfig:
      description: An object representing the scaling configuration details for the Auto Scaling group that is associated with your node group. When creating a node group, you must specify all or none of the properties. When updating a node group, you can specify any or none of the properties.
      type: object
      properties:
        minSize:
          $ref: "#/components/schemas/ZeroCapacity"
          description: The minimum number of nodes that the managed node group can scale in to.
        maxSize:
          $ref: "#/components/schemas/Capacity"
          description: The maximum number of nodes that the managed node group can scale out to. For information about the maximum number that you can specify, see Amazon EKS service quotas in the Amazon EKS User Guide.
        desiredSize:
          $ref: "#/components/schemas/ZeroCapacity"
          description: The current number of nodes that the managed node group should maintain. If you use the Kubernetes Cluster Autoscaler, you shouldn't change the desiredSize value directly, as this can cause the Cluster Autoscaler to suddenly scale up or scale down. Whenever this parameter changes, the number of worker nodes in the node group is updated to the specified size. If this parameter is given a value that is smaller than the current number of running worker nodes, the necessary number of worker nodes are terminated to match the given value. When using CloudFormation, no action occurs if you remove this parameter from your CFN template. This parameter can be different from minSize in some cases, such as when starting with extra hosts for testing. This parameter can also be different when you want to start with an estimated number of needed hosts, but let the Cluster Autoscaler reduce the number if there are too many. When the Cluster Autoscaler is used, the desiredSize parameter is altered by the Cluster Autoscaler (but can be out-of-date for short periods of time). the Cluster Autoscaler doesn't scale a managed node group lower than minSize or higher than maxSize.
    ZeroCapacity:
      type: integer
      minimum: 0
    Capacity:
      type: integer
      minimum: 1
    BoxedInteger:
      type: integer
    AMITypes:
      type: string
      enum:
        - AL2_x86_64
        - AL2_x86_64_GPU
        - AL2_ARM_64
        - CUSTOM
        - BOTTLEROCKET_ARM_64
        - BOTTLEROCKET_x86_64
        - BOTTLEROCKET_ARM_64_FIPS
        - BOTTLEROCKET_x86_64_FIPS
        - BOTTLEROCKET_ARM_64_NVIDIA
        - BOTTLEROCKET_x86_64_NVIDIA
        - BOTTLEROCKET_ARM_64_NVIDIA_FIPS
        - BOTTLEROCKET_x86_64_NVIDIA_FIPS
        - WINDOWS_CORE_2019_x86_64
        - WINDOWS_FULL_2019_x86_64
        - WINDOWS_CORE_2022_x86_64
        - WINDOWS_FULL_2022_x86_64
        - WINDOWS_CORE_2025_x86_64
        - WINDOWS_FULL_2025_x86_64
        - AL2023_x86_64_STANDARD
        - AL2023_ARM_64_STANDARD
        - AL2023_x86_64_NEURON
        - AL2023_x86_64_NVIDIA
        - AL2023_ARM_64_NVIDIA
    RemoteAccessConfig:
      description: An object representing the remote access configuration for the managed node group.
      type: object
      properties:
        ec2SshKey:
          $ref: "#/components/schemas/String"
          description: The Amazon EC2 SSH key name that provides access for SSH communication with the nodes in the managed node group. For more information, see Amazon EC2 key pairs and Linux instances in the Amazon Elastic Compute Cloud User Guide for Linux Instances. For Windows, an Amazon EC2 SSH key is used to obtain the RDP password. For more information, see Amazon EC2 key pairs and Windows instances in the Amazon Elastic Compute Cloud User Guide for Windows Instances.
        sourceSecurityGroups:
          $ref: "#/components/schemas/StringList"
          description: The security group IDs that are allowed SSH access (port 22) to the nodes. For Windows, the port is 3389. If you specify an Amazon EC2 SSH key but don't specify a source security group when you create a managed node group, then the port on the nodes is opened to the internet (0.0.0.0/0). For more information, see Security Groups for Your VPC in the Amazon Virtual Private Cloud User Guide.
    labelsMap:
      type: object
      properties: {}
    taintsList:
      type: array
      items:
        $ref: "#/components/schemas/Taint"
    Taint:
      description: A property that allows a node to repel a Pod. For more information, see Node taints on managed node groups in the Amazon EKS User Guide.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/taintKey"
          description: The key of the taint.
        value:
          $ref: "#/components/schemas/taintValue"
          description: The value of the taint.
        effect:
          $ref: "#/components/schemas/TaintEffect"
          description: The effect of the taint.
    taintKey:
      type: string
      minLength: 1
      maxLength: 63
    taintValue:
      type: string
      minLength: 0
      maxLength: 63
    TaintEffect:
      type: string
      enum:
        - NO_SCHEDULE
        - NO_EXECUTE
        - PREFER_NO_SCHEDULE
    LaunchTemplateSpecification:
      description: An object representing a node group launch template specification. The launch template can't include SubnetId , IamInstanceProfile , RequestSpotInstances , HibernationOptions , or TerminateInstances , or the node group deployment or update will fail. For more information about launch templates, see CreateLaunchTemplate in the Amazon EC2 API Reference. For more information about using launch templates with Amazon EKS, see Customizing managed nodes with launch templates in the Amazon EKS User Guide. You must specify either the launch template ID or the launch template name in the request, but not both.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the launch template. You must specify either the launch template name or the launch template ID in the request, but not both. After node group creation, you cannot use a different name.
        version:
          $ref: "#/components/schemas/String"
          description: The version number of the launch template to use. If no version is specified, then the template's default version is used. You can use a different version for node group updates.
        id:
          $ref: "#/components/schemas/String"
          description: The ID of the launch template. You must specify either the launch template ID or the launch template name in the request, but not both. After node group creation, you cannot use a different ID.
    NodegroupUpdateConfig:
      description: The node group update configuration. An Amazon EKS managed node group updates by replacing nodes with new nodes of newer AMI versions in parallel. You choose the maximum unavailable and the update strategy.
      type: object
      properties:
        maxUnavailable:
          $ref: "#/components/schemas/NonZeroInteger"
          description: The maximum number of nodes unavailable at once during a version update. Nodes are updated in parallel. This value or maxUnavailablePercentage is required to have a value.The maximum number is 100.
        maxUnavailablePercentage:
          $ref: "#/components/schemas/PercentCapacity"
          description: The maximum percentage of nodes unavailable during a version update. This percentage of nodes are updated in parallel, up to 100 nodes at once. This value or maxUnavailable is required to have a value.
        updateStrategy:
          $ref: "#/components/schemas/NodegroupUpdateStrategies"
          description: The configuration for the behavior to follow during a node group version update of this managed node group. You choose between two possible strategies for replacing nodes during an UpdateNodegroupVersion action. An Amazon EKS managed node group updates by replacing nodes with new nodes of newer AMI versions in parallel. The update strategy changes the managed node update behavior of the managed node group for each quantity. The default strategy has guardrails to protect you from misconfiguration and launches the new instances first, before terminating the old instances. The minimal strategy removes the guardrails and terminates the old instances before launching the new instances. This minimal strategy is useful in scenarios where you are constrained to resources or costs (for example, with hardware accelerators such as GPUs).
    NonZeroInteger:
      type: integer
      minimum: 1
    PercentCapacity:
      type: integer
      minimum: 1
      maximum: 100
    NodegroupUpdateStrategies:
      type: string
      enum:
        - DEFAULT
        - MINIMAL
    NodeRepairConfig:
      description: The node auto repair configuration for the node group.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Specifies whether to enable node auto repair for the node group. Node auto repair is disabled by default.
        maxUnhealthyNodeThresholdCount:
          $ref: "#/components/schemas/NonZeroInteger"
          description: Specify a count threshold of unhealthy nodes, above which node auto repair actions will stop. When using this, you cannot also set maxUnhealthyNodeThresholdPercentage at the same time.
        maxUnhealthyNodeThresholdPercentage:
          $ref: "#/components/schemas/PercentCapacity"
          description: Specify a percentage threshold of unhealthy nodes, above which node auto repair actions will stop. When using this, you cannot also set maxUnhealthyNodeThresholdCount at the same time.
        maxParallelNodesRepairedCount:
          $ref: "#/components/schemas/NonZeroInteger"
          description: Specify the maximum number of nodes that can be repaired concurrently or in parallel, expressed as a count of unhealthy nodes. This gives you finer-grained control over the pace of node replacements. When using this, you cannot also set maxParallelNodesRepairedPercentage at the same time.
        maxParallelNodesRepairedPercentage:
          $ref: "#/components/schemas/PercentCapacity"
          description: Specify the maximum number of nodes that can be repaired concurrently or in parallel, expressed as a percentage of unhealthy nodes. This gives you finer-grained control over the pace of node replacements. When using this, you cannot also set maxParallelNodesRepairedCount at the same time.
        nodeRepairConfigOverrides:
          $ref: "#/components/schemas/NodeRepairConfigOverridesList"
          description: Specify granular overrides for specific repair actions. These overrides control the repair action and the repair delay time before a node is considered eligible for repair. If you use this, you must specify all the values.
    NodeRepairConfigOverridesList:
      type: array
      items:
        $ref: "#/components/schemas/NodeRepairConfigOverrides"
    NodeRepairConfigOverrides:
      description: Specify granular overrides for specific repair actions. These overrides control the repair action and the repair delay time before a node is considered eligible for repair. If you use this, you must specify all the values.
      type: object
      properties:
        nodeMonitoringCondition:
          $ref: "#/components/schemas/String"
          description: Specify an unhealthy condition reported by the node monitoring agent that this override would apply to.
        nodeUnhealthyReason:
          $ref: "#/components/schemas/String"
          description: Specify a reason reported by the node monitoring agent that this override would apply to.
        minRepairWaitTimeMins:
          $ref: "#/components/schemas/NonZeroInteger"
          description: Specify the minimum time in minutes to wait before attempting to repair a node with this specific nodeMonitoringCondition and nodeUnhealthyReason.
        repairAction:
          $ref: "#/components/schemas/RepairAction"
          description: Specify the repair action to take for nodes when all of the specified conditions are met.
    RepairAction:
      type: string
      enum:
        - Replace
        - Reboot
        - NoAction
    CapacityTypes:
      type: string
      enum:
        - ON_DEMAND
        - SPOT
        - CAPACITY_BLOCK
    WarmPoolConfig:
      description: The configuration for an Amazon EC2 Auto Scaling warm pool attached to an Amazon EKS managed node group. Warm pools maintain pre-initialized EC2 instances alongside your Auto Scaling group that have already completed the bootup initialization process and can be kept in a Stopped, Running, or Hibernated state.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Specifies whether to attach warm pools on the managed node group. Set to true to enable the warm pool, or false to disable and remove it. If not specified during an update, the current value is preserved.
        minSize:
          $ref: "#/components/schemas/ZeroCapacity"
          description: "The minimum number of instances to maintain in the warm pool. Default: 0. Size your warm pool based on scaling patterns to balance cost and availability. Start with 10-20% of expected peak capacity."
        maxGroupPreparedCapacity:
          $ref: "#/components/schemas/BoxedInteger"
          description: The maximum total number of instances across the warm pool and Auto Scaling group combined. This value controls the total prepared capacity available for your node group.
        poolState:
          $ref: "#/components/schemas/WarmPoolState"
          description: "The desired state for warm pool instances. Default: Stopped. Valid values are Stopped (most cost-effective with EBS storage costs only), Running (fastest transition time with full EC2 costs), and Hibernated (balance between cost and speed, only supported on specific instance types). Warm pool instances in the Hibernated state are not supported with Bottlerocket AMIs."
        reuseOnScaleIn:
          $ref: "#/components/schemas/BoxedBoolean"
          description: "Indicates whether instances should return to the warm pool during scale-in events instead of being terminated. Default: false. Enable this to reduce costs by reusing instances. This feature is not supported for Bottlerocket AMIs."
    WarmPoolState:
      type: string
      enum:
        - STOPPED
        - RUNNING
        - HIBERNATED
    CreateNodegroupResponse:
      type: object
      properties:
        nodegroup:
          $ref: "#/components/schemas/Nodegroup"
          description: The full description of your new node group.
    Nodegroup:
      description: An object representing an Amazon EKS managed node group.
      type: object
      properties:
        nodegroupName:
          $ref: "#/components/schemas/String"
          description: The name associated with an Amazon EKS managed node group.
        nodegroupArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) associated with the managed node group.
        clusterName:
          $ref: "#/components/schemas/String"
          description: The name of your cluster.
        version:
          $ref: "#/components/schemas/String"
          description: The Kubernetes version of the managed node group.
        releaseVersion:
          $ref: "#/components/schemas/String"
          description: If the node group was deployed using a launch template with a custom AMI, then this is the AMI ID that was specified in the launch template. For node groups that weren't deployed using a launch template, this is the version of the Amazon EKS optimized AMI that the node group was deployed with.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix epoch timestamp at object creation.
        modifiedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix epoch timestamp for the last modification to the object.
        status:
          $ref: "#/components/schemas/NodegroupStatus"
          description: The current status of the managed node group.
        capacityType:
          $ref: "#/components/schemas/CapacityTypes"
          description: The capacity type of your managed node group.
        scalingConfig:
          $ref: "#/components/schemas/NodegroupScalingConfig"
          description: The scaling configuration details for the Auto Scaling group that is associated with your node group.
        instanceTypes:
          $ref: "#/components/schemas/StringList"
          description: If the node group wasn't deployed with a launch template, then this is the instance type that is associated with the node group. If the node group was deployed with a launch template, then this is null.
        subnets:
          $ref: "#/components/schemas/StringList"
          description: The subnets that were specified for the Auto Scaling group that is associated with your node group.
        remoteAccess:
          $ref: "#/components/schemas/RemoteAccessConfig"
          description: If the node group wasn't deployed with a launch template, then this is the remote access configuration that is associated with the node group. If the node group was deployed with a launch template, then this is null.
        amiType:
          $ref: "#/components/schemas/AMITypes"
          description: If the node group was deployed using a launch template with a custom AMI, then this is CUSTOM. For node groups that weren't deployed using a launch template, this is the AMI type that was specified in the node group configuration.
        nodeRole:
          $ref: "#/components/schemas/String"
          description: The IAM role associated with your node group. The Amazon EKS node kubelet daemon makes calls to Amazon Web Services APIs on your behalf. Nodes receive permissions for these API calls through an IAM instance profile and associated policies.
        labels:
          type: object
          properties: {}
          description: The Kubernetes labels applied to the nodes in the node group. Only labels that are applied with the Amazon EKS API are shown here. There may be other Kubernetes labels applied to the nodes in this group.
        taints:
          $ref: "#/components/schemas/taintsList"
          description: The Kubernetes taints to be applied to the nodes in the node group when they are created. Effect is one of No_Schedule, Prefer_No_Schedule, or No_Execute. Kubernetes taints can be used together with tolerations to control how workloads are scheduled to your nodes. For more information, see Node taints on managed node groups.
        resources:
          $ref: "#/components/schemas/NodegroupResources"
          description: The resources associated with the node group, such as Auto Scaling groups and security groups for remote access.
        diskSize:
          $ref: "#/components/schemas/BoxedInteger"
          description: If the node group wasn't deployed with a launch template, then this is the disk size in the node group configuration. If the node group was deployed with a launch template, then this is null.
        health:
          $ref: "#/components/schemas/NodegroupHealth"
          description: The health status of the node group. If there are issues with your node group's health, they are listed here.
        updateConfig:
          $ref: "#/components/schemas/NodegroupUpdateConfig"
          description: The node group update configuration.
        nodeRepairConfig:
          $ref: "#/components/schemas/NodeRepairConfig"
          description: The node auto repair configuration for the node group.
        launchTemplate:
          $ref: "#/components/schemas/LaunchTemplateSpecification"
          description: If a launch template was used to create the node group, then this is the launch template that was used.
        tags:
          type: object
          properties: {}
          description: Metadata that assists with categorization and organization. Each tag consists of a key and an optional value. You define both. Tags don't propagate to any other cluster or Amazon Web Services resources.
        warmPoolConfig:
          $ref: "#/components/schemas/WarmPoolConfig"
          description: The warm pool configuration attached to the node group. Amazon EKS manages warm pools throughout the node group lifecycle using the AWSServiceRoleForAmazonEKSNodegroup service-linked role to create, update, and delete warm pool resources.
