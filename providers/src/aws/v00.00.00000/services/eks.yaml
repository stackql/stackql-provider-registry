  /clusters/{name}/pod-identity-associations:
    post:
      operationId: CreatePodIdentityAssociation
      description: "Creates an EKS Pod Identity association between a service account in an Amazon EKS cluster and an IAM role with EKS Pod Identity. Use EKS Pod Identity to give temporary IAM credentials to Pods and the credentials are rotated automatically. Amazon EKS Pod Identity associations provide the ability to manage credentials for your applications, similar to the way that Amazon EC2 instance profiles provide credentials to Amazon EC2 instances. If a Pod uses a service account that has an association, Amazon EKS sets environment variables in the containers of the Pod. The environment variables configure the Amazon Web Services SDKs, including the Command Line Interface, to use the EKS Pod Identity credentials. EKS Pod Identity is a simpler method than IAM roles for service accounts, as this method doesn't use OIDC identity providers. Additionally, you can configure a role for EKS Pod Identity once, and reuse it across clusters. Similar to Amazon Web Services IAM behavior, EKS Pod Identity associations are eventually consistent, and may take several seconds to be effective after the initial API call returns successfully. You must design your applications to account for these potential delays. We recommend that you don’t include association create/updates in the critical, high-availability code paths of your application. Instead, make changes in a separate initialization or setup routine that you run less frequently. You can set a target IAM role in the same or a different account for advanced scenarios. With a target role, EKS Pod Identity automatically performs two role assumptions in sequence: first assuming the role in the association that is in this account, then using those credentials to assume the target IAM role. This process provides your Pod with temporary credentials that have the permissions defined in the target role, allowing secure access to resources in another Amazon Web Services account."
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the cluster to create the EKS Pod Identity association in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                namespace:
                  $ref: "#/components/schemas/String"
                serviceAccount:
                  $ref: "#/components/schemas/String"
                roleArn:
                  $ref: "#/components/schemas/String"
                clientRequestToken:
                  $ref: "#/components/schemas/String"
                tags:
                  $ref: "#/components/schemas/TagMap"
                disableSessionTags:
                  $ref: "#/components/schemas/BoxedBoolean"
                targetRoleArn:
                  $ref: "#/components/schemas/String"
                policy:
                  $ref: "#/components/schemas/String"
              required:
                - namespace
                - serviceAccount
                - roleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePodIdentityAssociationResponse"
    get:
      operationId: ListPodIdentityAssociations
      description: List the EKS Pod Identity associations in a cluster. You can filter the list by the namespace that the association is in or the service account that the association uses.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the cluster that the associations are in.
        - name: namespace
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the Kubernetes namespace inside the cluster that the associations are in.
        - name: serviceAccount
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the Kubernetes service account that the associations use.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListPodIdentityAssociationsMaxResults"
          description: The maximum number of EKS Pod Identity association results returned by ListPodIdentityAssociations in paginated output. When you use this parameter, ListPodIdentityAssociations returns only maxResults results in a single page along with a nextToken response element. You can see the remaining results of the initial request by sending another ListPodIdentityAssociations request with the returned nextToken value. This value can be between 1 and 100. If you don't use this parameter, ListPodIdentityAssociations returns up to 100 results and a nextToken value if applicable.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The nextToken value returned from a previous paginated ListUpdates request where maxResults was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value. This token should be treated as an opaque identifier that is used only to retrieve the next items in a list and not for other programmatic purposes.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPodIdentityAssociationsResponse"
