        - DELETE_FAILED
        - DEGRADED
    NodegroupResources:
      description: An object representing the resources associated with the node group, such as Auto Scaling groups and security groups for remote access.
      type: object
      properties:
        autoScalingGroups:
          $ref: "#/components/schemas/AutoScalingGroupList"
          description: The Auto Scaling groups associated with the node group.
        remoteAccessSecurityGroup:
          $ref: "#/components/schemas/String"
          description: The remote access security group associated with the node group. This security group controls SSH access to the nodes.
    AutoScalingGroupList:
      type: array
      items:
        $ref: "#/components/schemas/AutoScalingGroup"
    AutoScalingGroup:
      description: An Auto Scaling group that is associated with an Amazon EKS managed node group.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the Auto Scaling group associated with an Amazon EKS managed node group.
    NodegroupHealth:
      description: An object representing the health status of the node group.
      type: object
      properties:
        issues:
          $ref: "#/components/schemas/IssueList"
          description: Any issues that are associated with the node group.
    IssueList:
      type: array
      items:
        $ref: "#/components/schemas/Issue"
    Issue:
      description: An object representing an issue with an Amazon EKS resource.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/NodegroupIssueCode"
          description: "A brief description of the error. AccessDenied: Amazon EKS or one or more of your managed nodes is failing to authenticate or authorize with your Kubernetes cluster API server. AsgInstanceLaunchFailures: Your Auto Scaling group is experiencing failures while attempting to launch instances. AutoScalingGroupNotFound: We couldn't find the Auto Scaling group associated with the managed node group. You may be able to recreate an Auto Scaling group with the same settings to recover. ClusterUnreachable: Amazon EKS or one or more of your managed nodes is unable to to communicate with your Kubernetes cluster API server. This can happen if there are network disruptions or if API servers are timing out processing requests. Ec2InstanceTypeDoesNotExist: One or more of the supplied Amazon EC2 instance types do not exist. Amazon EKS checked for the instance types that you provided in this Amazon Web Services Region, and one or more aren't available. Ec2LaunchTemplateNotFound: We couldn't find the Amazon EC2 launch template for your managed node group. You may be able to recreate a launch template with the same settings to recover. Ec2LaunchTemplateVersionMismatch: The Amazon EC2 launch template version for your managed node group does not match the version that Amazon EKS created. You may be able to revert to the version that Amazon EKS created to recover. Ec2SecurityGroupDeletionFailure: We could not delete the remote access security group for your managed node group. Remove any dependencies from the security group. Ec2SecurityGroupNotFound: We couldn't find the cluster security group for the cluster. You must recreate your cluster. Ec2SubnetInvalidConfiguration: One or more Amazon EC2 subnets specified for a node group do not automatically assign public IP addresses to instances launched into it. If you want your instances to be assigned a public IP address, then you need to enable the auto-assign public IP address setting for the subnet. See Modifying the public IPv4 addressing attribute for your subnet in the Amazon VPC User Guide. IamInstanceProfileNotFound: We couldn't find the IAM instance profile for your managed node group. You may be able to recreate an instance profile with the same settings to recover. IamNodeRoleNotFound: We couldn't find the IAM role for your managed node group. You may be able to recreate an IAM role with the same settings to recover. InstanceLimitExceeded: Your Amazon Web Services account is unable to launch any more instances of the specified instance type. You may be able to request an Amazon EC2 instance limit increase to recover. InsufficientFreeAddresses: One or more of the subnets associated with your managed node group does not have enough available IP addresses for new nodes. InternalFailure: These errors are usually caused by an Amazon EKS server-side issue. NodeCreationFailure: Your launched instances are unable to register with your Amazon EKS cluster. Common causes of this failure are insufficient node IAM role permissions or lack of outbound internet access for the nodes."
        message:
          $ref: "#/components/schemas/String"
          description: The error message associated with the issue.
        resourceIds:
          $ref: "#/components/schemas/StringList"
          description: The Amazon Web Services resources that are afflicted by this issue.
    NodegroupIssueCode:
      type: string
      enum:
        - AutoScalingGroupNotFound
        - AutoScalingGroupInvalidConfiguration
        - Ec2SecurityGroupNotFound
        - Ec2SecurityGroupDeletionFailure
        - Ec2LaunchTemplateNotFound
        - Ec2LaunchTemplateVersionMismatch
        - Ec2SubnetNotFound
        - Ec2SubnetInvalidConfiguration
        - IamInstanceProfileNotFound
        - Ec2SubnetMissingIpv6Assignment
        - IamLimitExceeded
        - IamNodeRoleNotFound
        - NodeCreationFailure
        - AsgInstanceLaunchFailures
        - InstanceLimitExceeded
        - InsufficientFreeAddresses
        - AccessDenied
        - InternalFailure
        - ClusterUnreachable
        - AmiIdNotFound
        - AutoScalingGroupOptInRequired
        - AutoScalingGroupRateLimitExceeded
        - Ec2LaunchTemplateDeletionFailure
        - Ec2LaunchTemplateInvalidConfiguration
        - Ec2LaunchTemplateMaxLimitExceeded
        - Ec2SubnetListTooLong
        - IamThrottling
        - NodeTerminationFailure
        - PodEvictionFailure
        - SourceEc2LaunchTemplateNotFound
        - LimitExceeded
        - Unknown
        - AutoScalingGroupInstanceRefreshActive
        - KubernetesLabelInvalid
        - Ec2LaunchTemplateVersionMaxLimitExceeded
        - Ec2InstanceTypeDoesNotExist
    CreatePodIdentityAssociationResponse:
      type: object
      properties:
        association:
          $ref: "#/components/schemas/PodIdentityAssociation"
          description: The full description of your new association. The description includes an ID for the association. Use the ID of the association in further actions to manage the association.
    PodIdentityAssociation:
      description: Amazon EKS Pod Identity associations provide the ability to manage credentials for your applications, similar to the way that Amazon EC2 instance profiles provide credentials to Amazon EC2 instances.
      type: object
      properties:
        clusterName:
          $ref: "#/components/schemas/String"
          description: The name of the cluster that the association is in.
        namespace:
          $ref: "#/components/schemas/String"
          description: The name of the Kubernetes namespace inside the cluster to create the association in. The service account and the Pods that use the service account must be in this namespace.
        serviceAccount:
          $ref: "#/components/schemas/String"
          description: The name of the Kubernetes service account inside the cluster to associate the IAM credentials with.
        roleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the IAM role to associate with the service account. The EKS Pod Identity agent manages credentials to assume this role for applications in the containers in the Pods that use this service account.
        associationArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the association.
        associationId:
          $ref: "#/components/schemas/String"
          description: The ID of the association.
        tags:
          type: object
          properties: {}
          description: "Metadata that assists with categorization and organization. Each tag consists of a key and an optional value. You define both. Tags don't propagate to any other cluster or Amazon Web Services resources. The following basic restrictions apply to tags: Maximum number of tags per resource – 50 For each resource, each tag key must be unique, and each tag key can have only one value. Maximum key length – 128 Unicode characters in UTF-8 Maximum value length – 256 Unicode characters in UTF-8 If your tagging schema is used across multiple services and resources, remember that other services may have restrictions on allowed characters. Generally allowed characters are: letters, numbers, and spaces representable in UTF-8, and the following characters: + - = . _ : / @. Tag keys and values are case-sensitive. Do not use aws:, AWS:, or any upper or lowercase combination of such as a prefix for either keys or values as it is reserved for Amazon Web Services use. You cannot edit or delete tag keys or values with this prefix. Tags with this prefix do not count against your tags per resource limit."
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp that the association was created at.
        modifiedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The most recent timestamp that the association was modified at.
        ownerArn:
          $ref: "#/components/schemas/String"
          description: If defined, the EKS Pod Identity association is owned by an Amazon EKS add-on.
        disableSessionTags:
          $ref: "#/components/schemas/BoxedBoolean"
          description: The state of the automatic sessions tags. The value of true disables these tags. EKS Pod Identity adds a pre-defined set of session tags when it assumes the role. You can use these tags to author a single role that can work across resources by allowing access to Amazon Web Services resources based on matching tags. By default, EKS Pod Identity attaches six tags, including tags for cluster name, namespace, and service account name. For the list of tags added by EKS Pod Identity, see List of session tags added by EKS Pod Identity in the Amazon EKS User Guide.
        targetRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the target IAM role to associate with the service account. This role is assumed by using the EKS Pod Identity association role, then the credentials for this role are injected into the Pod.
        externalId:
          $ref: "#/components/schemas/String"
          description: The unique identifier for this EKS Pod Identity association for a target IAM role. You put this value in the trust policy of the target role, in a Condition to match the sts.ExternalId. This ensures that the target role can only be assumed by this association. This prevents the confused deputy problem. For more information about the confused deputy problem, see The confused deputy problem in the IAM User Guide. If you want to use the same target role with multiple associations or other roles, use independent statements in the trust policy to allow sts:AssumeRole access from each role.
        policy:
          $ref: "#/components/schemas/String"
          description: An optional IAM policy in JSON format (as an escaped string) that applies additional restrictions to this pod identity association beyond the IAM policies attached to the IAM role. This policy is applied as the intersection of the role's policies and this policy, allowing you to reduce the permissions that applications in the pods can use. Use this policy to enforce least privilege access while still leveraging a shared IAM role across multiple applications.
