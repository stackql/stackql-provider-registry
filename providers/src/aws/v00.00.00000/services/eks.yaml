openapi: 3.0.0
info:
  version: "2017-11-01"
  title: Amazon Elastic Kubernetes Service
  description: Amazon Elastic Kubernetes Service
  x-serviceName: eks
  x-serviceAlias: eks
  x-protocol: rest-json
  x-apiVersion: "2017-11-01"
  x-endpointPrefix: eks
  x-jsonVersion: "1.1"
servers:
  - url: https://eks.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for eks
paths:
  /clusters/{name}/access-entries/{principal_arn}/access-policies:
    post:
      operationId: AssociateAccessPolicy
      description: Associates an access policy and its scope to an access entry. For more information about associating access policies, see Associating and disassociating access policies to and from access entries in the Amazon EKS User Guide.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of your cluster.
        - name: principal_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the IAM user or role for the AccessEntry that you're associating the access policy to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policyArn:
                  $ref: "#/components/schemas/String"
                accessScope:
                  $ref: "#/components/schemas/AccessScope"
              required:
                - policyArn
                - accessScope
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateAccessPolicyResponse"
    get:
      operationId: ListAssociatedAccessPolicies
      description: Lists the access policies associated with an access entry.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of your cluster.
        - name: principal_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the IAM principal for the AccessEntry.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListAssociatedAccessPoliciesRequestMaxResults"
          description: The maximum number of results, returned in paginated output. You receive maxResults in a single page, along with a nextToken response element. You can see the remaining results of the initial request by sending another request with the returned nextToken value. This value can be between 1 and 100. If you don't use this parameter, 100 results and a nextToken value, if applicable, are returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The nextToken value returned from a previous paginated request, where maxResults was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value. This value is null when there are no more results to return. This token should be treated as an opaque identifier that is used only to retrieve the next items in a list and not for other programmatic purposes.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssociatedAccessPoliciesResponse"
  /clusters/{name}/encryption-config/associate:
    post:
      operationId: AssociateEncryptionConfig
      description: Associates an encryption configuration to an existing cluster. Use this API to enable encryption on existing clusters that don't already have encryption enabled. This allows you to implement a defense-in-depth security strategy without migrating applications to new Amazon EKS clusters.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of your cluster.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                encryptionConfig:
                  $ref: "#/components/schemas/EncryptionConfigList"
                clientRequestToken:
                  $ref: "#/components/schemas/String"
              required:
                - encryptionConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateEncryptionConfigResponse"
  /clusters/{name}/identity-provider-configs/associate:
    post:
      operationId: AssociateIdentityProviderConfig
      description: Associates an identity provider configuration to a cluster. If you want to authenticate identities using an identity provider, you can create an identity provider configuration and associate it to your cluster. After configuring authentication to your cluster you can create Kubernetes Role and ClusterRole objects, assign permissions to them, and then bind them to the identities using Kubernetes RoleBinding and ClusterRoleBinding objects. For more information see Using RBAC Authorization in the Kubernetes documentation.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of your cluster.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                oidc:
                  $ref: "#/components/schemas/OidcIdentityProviderConfigRequest"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientRequestToken:
                  $ref: "#/components/schemas/String"
              required:
                - oidc
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateIdentityProviderConfigResponse"
  /clusters/{name}/access-entries:
    post:
      operationId: CreateAccessEntry
      description: "Creates an access entry. An access entry allows an IAM principal to access your cluster. Access entries can replace the need to maintain entries in the aws-auth ConfigMap for authentication. You have the following options for authorizing an IAM principal to access Kubernetes objects on your cluster: Kubernetes role-based access control (RBAC), Amazon EKS, or both. Kubernetes RBAC authorization requires you to create and manage Kubernetes Role, ClusterRole, RoleBinding, and ClusterRoleBinding objects, in addition to managing access entries. If you use Amazon EKS authorization exclusively, you don't need to create and manage Kubernetes Role, ClusterRole, RoleBinding, and ClusterRoleBinding objects. For more information about access entries, see Access entries in the Amazon EKS User Guide."
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of your cluster.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                principalArn:
                  $ref: "#/components/schemas/String"
                kubernetesGroups:
                  $ref: "#/components/schemas/StringList"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientRequestToken:
                  $ref: "#/components/schemas/String"
                username:
                  $ref: "#/components/schemas/String"
                type:
                  $ref: "#/components/schemas/String"
              required:
                - principalArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccessEntryResponse"
    get:
      operationId: ListAccessEntries
      description: Lists the access entries for your cluster.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of your cluster.
        - name: associatedPolicyArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of an AccessPolicy. When you specify an access policy ARN, only the access entries associated to that access policy are returned. For a list of available policy ARNs, use ListAccessPolicies.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListAccessEntriesRequestMaxResults"
          description: The maximum number of results, returned in paginated output. You receive maxResults in a single page, along with a nextToken response element. You can see the remaining results of the initial request by sending another request with the returned nextToken value. This value can be between 1 and 100. If you don't use this parameter, 100 results and a nextToken value, if applicable, are returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The nextToken value returned from a previous paginated request, where maxResults was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value. This value is null when there are no more results to return. This token should be treated as an opaque identifier that is used only to retrieve the next items in a list and not for other programmatic purposes.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccessEntriesOutputDisplay"
  /clusters/{name}/addons:
    post:
      operationId: CreateAddon
      description: Creates an Amazon EKS add-on. Amazon EKS add-ons help to automate the provisioning and lifecycle management of common operational software for Amazon EKS clusters. For more information, see Amazon EKS add-ons in the Amazon EKS User Guide.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ClusterName"
          description: The name of your cluster.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                addonName:
                  $ref: "#/components/schemas/String"
                addonVersion:
                  $ref: "#/components/schemas/String"
                serviceAccountRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                resolveConflicts:
                  $ref: "#/components/schemas/ResolveConflicts"
                clientRequestToken:
                  $ref: "#/components/schemas/String"
                tags:
                  $ref: "#/components/schemas/TagMap"
                configurationValues:
                  $ref: "#/components/schemas/String"
                podIdentityAssociations:
                  $ref: "#/components/schemas/AddonPodIdentityAssociationsList"
                namespaceConfig:
                  $ref: "#/components/schemas/AddonNamespaceConfigRequest"
              required:
                - addonName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAddonResponse"
    get:
      operationId: ListAddons
      description: Lists the installed add-ons.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ClusterName"
          description: The name of your cluster.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListAddonsRequestMaxResults"
          description: The maximum number of results, returned in paginated output. You receive maxResults in a single page, along with a nextToken response element. You can see the remaining results of the initial request by sending another request with the returned nextToken value. This value can be between 1 and 100. If you don't use this parameter, 100 results and a nextToken value, if applicable, are returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The nextToken value returned from a previous paginated request, where maxResults was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value. This value is null when there are no more results to return. This token should be treated as an opaque identifier that is used only to retrieve the next items in a list and not for other programmatic purposes.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAddonsOutputDisplay"
  /clusters/{name}/capabilities:
    post:
      operationId: CreateCapability
      description: Creates a managed capability resource for an Amazon EKS cluster. Capabilities provide fully managed capabilities to build and scale with Kubernetes. When you create a capability, Amazon EKSprovisions and manages the infrastructure required to run the capability outside of your cluster. This approach reduces operational overhead and preserves cluster resources. You can only create one Capability of each type on a given Amazon EKS cluster. Valid types are Argo CD for declarative GitOps deployment, Amazon Web Services Controllers for Kubernetes (ACK) for resource management, and Kube Resource Orchestrator (KRO) for Kubernetes custom resource orchestration. For more information, see EKS Capabilities in the Amazon EKS User Guide.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the Amazon EKS cluster where you want to create the capability.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                capabilityName:
                  $ref: "#/components/schemas/String"
                clientRequestToken:
                  $ref: "#/components/schemas/String"
                type:
                  $ref: "#/components/schemas/CapabilityType"
                roleArn:
                  $ref: "#/components/schemas/String"
                configuration:
                  $ref: "#/components/schemas/CapabilityConfigurationRequest"
                tags:
                  $ref: "#/components/schemas/TagMap"
                deletePropagationPolicy:
                  $ref: "#/components/schemas/CapabilityDeletePropagationPolicy"
              required:
                - capabilityName
                - type
                - roleArn
                - deletePropagationPolicy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCapabilityResponse"
    get:
      operationId: ListCapabilities
      description: Lists all managed capabilities in your Amazon EKS cluster. You can use this operation to get an overview of all capabilities and their current status.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the Amazon EKS cluster for which you want to list capabilities.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The nextToken value returned from a previous paginated request, where maxResults was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value. This value is null when there are no more results to return.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListCapabilitiesRequestMaxResults"
          description: The maximum number of results to return in a single call. To retrieve the remaining results, make another call with the returned nextToken value. If you don't specify a value, the default is 100 results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCapabilitiesResponse"
  /clusters:
    post:
      operationId: CreateCluster
      description: Creates an Amazon EKS control plane. The Amazon EKS control plane consists of control plane instances that run the Kubernetes software, such as etcd and the API server. The control plane runs in an account managed by Amazon Web Services, and the Kubernetes API is exposed by the Amazon EKS API server endpoint. Each Amazon EKS cluster control plane is single tenant and unique. It runs on its own set of Amazon EC2 instances. The cluster control plane is provisioned across multiple Availability Zones and fronted by an Elastic Load Balancing Network Load Balancer. Amazon EKS also provisions elastic network interfaces in your VPC subnets to provide connectivity from the control plane instances to the nodes (for example, to support kubectl exec, logs, and proxy data flows). Amazon EKS nodes run in your Amazon Web Services account and connect to your cluster's control plane over the Kubernetes API server endpoint and a certificate file that is created for your cluster. You can use the endpointPublicAccess and endpointPrivateAccess parameters to enable or disable public and private access to your cluster's Kubernetes API server endpoint. By default, public access is enabled, and private access is disabled. The endpoint domain name and IP address family depends on the value of the ipFamily for the cluster. For more information, see Amazon EKS Cluster Endpoint Access Control in the Amazon EKS User Guide . You can use the logging parameter to enable or disable exporting the Kubernetes control plane logs for your cluster to CloudWatch Logs. By default, cluster control plane logs aren't exported to CloudWatch Logs. For more information, see Amazon EKS Cluster Control Plane Logs in the Amazon EKS User Guide . CloudWatch Logs ingestion, archive storage, and data scanning rates apply to exported control plane logs. For more information, see CloudWatch Pricing. In most cases, it takes several minutes to create a cluster. After you create an Amazon EKS cluster, you must configure your Kubernetes tooling to communicate with the API server and launch nodes into your cluster. For more information, see Allowing users to access your cluster and Launching Amazon EKS nodes in the Amazon EKS User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ClusterName"
                version:
                  $ref: "#/components/schemas/String"
                roleArn:
                  $ref: "#/components/schemas/String"
                resourcesVpcConfig:
                  $ref: "#/components/schemas/VpcConfigRequest"
                kubernetesNetworkConfig:
                  $ref: "#/components/schemas/KubernetesNetworkConfigRequest"
                logging:
                  $ref: "#/components/schemas/Logging"
                clientRequestToken:
                  $ref: "#/components/schemas/String"
                tags:
                  $ref: "#/components/schemas/TagMap"
                encryptionConfig:
                  $ref: "#/components/schemas/EncryptionConfigList"
                outpostConfig:
                  $ref: "#/components/schemas/OutpostConfigRequest"
                accessConfig:
                  $ref: "#/components/schemas/CreateAccessConfigRequest"
                bootstrapSelfManagedAddons:
                  $ref: "#/components/schemas/BoxedBoolean"
                upgradePolicy:
                  $ref: "#/components/schemas/UpgradePolicyRequest"
                zonalShiftConfig:
                  $ref: "#/components/schemas/ZonalShiftConfigRequest"
                remoteNetworkConfig:
                  $ref: "#/components/schemas/RemoteNetworkConfigRequest"
                computeConfig:
                  $ref: "#/components/schemas/ComputeConfigRequest"
                storageConfig:
                  $ref: "#/components/schemas/StorageConfigRequest"
                deletionProtection:
                  $ref: "#/components/schemas/BoxedBoolean"
                controlPlaneScalingConfig:
                  $ref: "#/components/schemas/ControlPlaneScalingConfig"
              required:
                - name
                - roleArn
                - resourcesVpcConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClusterResponse"
    get:
      operationId: ListClusters
      description: Lists the Amazon EKS clusters in your Amazon Web Services account in the specified Amazon Web Services Region.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListClustersRequestMaxResults"
          description: The maximum number of results, returned in paginated output. You receive maxResults in a single page, along with a nextToken response element. You can see the remaining results of the initial request by sending another request with the returned nextToken value. This value can be between 1 and 100. If you don't use this parameter, 100 results and a nextToken value, if applicable, are returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The nextToken value returned from a previous paginated request, where maxResults was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value. This value is null when there are no more results to return. This token should be treated as an opaque identifier that is used only to retrieve the next items in a list and not for other programmatic purposes.
        - name: include
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IncludeClustersList"
          description: Indicates whether external clusters are included in the returned list. Use 'all' to return https://docs.aws.amazon.com/eks/latest/userguide/eks-connector.htmlconnected clusters, or blank to return only Amazon EKS clusters. 'all' must be in lowercase otherwise an error occurs.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListClustersOutputDisplay"
  /eks-anywhere-subscriptions:
    post:
      operationId: CreateEksAnywhereSubscription
      description: Creates an EKS Anywhere subscription. When a subscription is created, it is a contract agreement for the length of the term specified in the request. Licenses that are used to validate support are provisioned in Amazon Web Services License Manager and the caller account is granted access to EKS Anywhere Curated Packages.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/EksAnywhereSubscriptionName"
                term:
                  $ref: "#/components/schemas/EksAnywhereSubscriptionTerm"
                licenseQuantity:
                  $ref: "#/components/schemas/Integer"
                licenseType:
                  $ref: "#/components/schemas/EksAnywhereSubscriptionLicenseType"
                autoRenew:
                  $ref: "#/components/schemas/Boolean"
                clientRequestToken:
                  $ref: "#/components/schemas/String"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - term
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEksAnywhereSubscriptionResponse"
    get:
      operationId: ListEksAnywhereSubscriptions
      description: Displays the full description of the subscription.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListEksAnywhereSubscriptionsRequestMaxResults"
          description: The maximum number of cluster results returned by ListEksAnywhereSubscriptions in paginated output. When you use this parameter, ListEksAnywhereSubscriptions returns only maxResults results in a single page along with a nextToken response element. You can see the remaining results of the initial request by sending another ListEksAnywhereSubscriptions request with the returned nextToken value. This value can be between 1 and 100. If you don't use this parameter, ListEksAnywhereSubscriptions returns up to 10 results and a nextToken value if applicable.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The nextToken value returned from a previous paginated ListEksAnywhereSubscriptions request where maxResults was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value.
        - name: includeStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EksAnywhereSubscriptionStatusValues"
          description: An array of subscription statuses to filter on.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEksAnywhereSubscriptionsResponse"
  /clusters/{name}/fargate-profiles:
    post:
      operationId: CreateFargateProfile
      description: Creates an Fargate profile for your Amazon EKS cluster. You must have at least one Fargate profile in a cluster to be able to run pods on Fargate. The Fargate profile allows an administrator to declare which pods run on Fargate and specify which pods run on which Fargate profile. This declaration is done through the profile's selectors. Each profile can have up to five selectors that contain a namespace and labels. A namespace is required for every selector. The label field consists of multiple optional key-value pairs. Pods that match the selectors are scheduled on Fargate. If a to-be-scheduled pod matches any of the selectors in the Fargate profile, then that pod is run on Fargate. When you create a Fargate profile, you must specify a pod execution role to use with the pods that are scheduled with the profile. This role is added to the cluster's Kubernetes Role Based Access Control (RBAC) for authorization so that the kubelet that is running on the Fargate infrastructure can register with your Amazon EKS cluster so that it can appear in your cluster as a node. The pod execution role also provides IAM permissions to the Fargate infrastructure to allow read access to Amazon ECR image repositories. For more information, see Pod Execution Role in the Amazon EKS User Guide. Fargate profiles are immutable. However, you can create a new updated profile to replace an existing profile and then delete the original after the updated profile has finished creating. If any Fargate profiles in a cluster are in the DELETING status, you must wait for that Fargate profile to finish deleting before you can create any other profiles in that cluster. For more information, see Fargate profile in the Amazon EKS User Guide.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of your cluster.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fargateProfileName:
                  $ref: "#/components/schemas/String"
                podExecutionRoleArn:
                  $ref: "#/components/schemas/String"
                subnets:
                  $ref: "#/components/schemas/StringList"
                selectors:
                  $ref: "#/components/schemas/FargateProfileSelectors"
                clientRequestToken:
                  $ref: "#/components/schemas/String"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - fargateProfileName
                - podExecutionRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFargateProfileResponse"
    get:
      operationId: ListFargateProfiles
      description: Lists the Fargate profiles associated with the specified cluster in your Amazon Web Services account in the specified Amazon Web Services Region.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of your cluster.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/FargateProfilesRequestMaxResults"
          description: The maximum number of results, returned in paginated output. You receive maxResults in a single page, along with a nextToken response element. You can see the remaining results of the initial request by sending another request with the returned nextToken value. This value can be between 1 and 100. If you don't use this parameter, 100 results and a nextToken value, if applicable, are returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The nextToken value returned from a previous paginated request, where maxResults was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value. This value is null when there are no more results to return. This token should be treated as an opaque identifier that is used only to retrieve the next items in a list and not for other programmatic purposes.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFargateProfilesOutputDisplay"
  /clusters/{name}/node-groups:
    post:
      operationId: CreateNodegroup
      description: Creates a managed node group for an Amazon EKS cluster. You can only create a node group for your cluster that is equal to the current Kubernetes version for the cluster. All node groups are created with the latest AMI release version for the respective minor Kubernetes version of the cluster, unless you deploy a custom AMI using a launch template. For later updates, you will only be able to update a node group using a launch template only if it was originally deployed with a launch template. Additionally, the launch template ID or name must match what was used when the node group was created. You can update the launch template version with necessary changes. For more information about using launch templates, see Customizing managed nodes with launch templates. An Amazon EKS managed node group is an Amazon EC2 Auto Scaling group and associated Amazon EC2 instances that are managed by Amazon Web Services for an Amazon EKS cluster. For more information, see Managed node groups in the Amazon EKS User Guide. Windows AMI types are only supported for commercial Amazon Web Services Regions that support Windows on Amazon EKS.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of your cluster.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodegroupName:
                  $ref: "#/components/schemas/String"
                scalingConfig:
                  $ref: "#/components/schemas/NodegroupScalingConfig"
                diskSize:
                  $ref: "#/components/schemas/BoxedInteger"
                subnets:
                  $ref: "#/components/schemas/StringList"
                instanceTypes:
