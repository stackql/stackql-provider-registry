  /clusters/{name}/node-groups/{nodegroup_name}/update-version:
    post:
      operationId: UpdateNodegroupVersion
      description: Updates the Kubernetes version or AMI version of an Amazon EKS managed node group. You can update a node group using a launch template only if the node group was originally deployed with a launch template. Additionally, the launch template ID or name must match what was used when the node group was created. You can update the launch template version with necessary changes. If you need to update a custom AMI in a node group that was deployed with a launch template, then update your custom AMI, specify the new ID in a new version of the launch template, and then update the node group to the new version of the launch template. If you update without a launch template, then you can update to the latest available AMI version of a node group's current Kubernetes version by not specifying a Kubernetes version in the request. You can update to the latest AMI version of your cluster's current Kubernetes version by specifying your cluster's Kubernetes version in the request. For information about Linux versions, see Amazon EKS optimized Amazon Linux AMI versions in the Amazon EKS User Guide. For information about Windows versions, see Amazon EKS optimized Windows AMI versions in the Amazon EKS User Guide. You cannot roll back a node group to an earlier Kubernetes version or AMI version. When a node in a managed node group is terminated due to a scaling action or update, every Pod on that node is drained first. Amazon EKS attempts to drain the nodes gracefully and will fail if it is unable to do so. You can force the update if Amazon EKS is unable to drain the nodes as a result of a Pod disruption budget issue.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of your cluster.
        - name: nodegroup_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the managed node group to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                version:
                  $ref: "#/components/schemas/String"
                releaseVersion:
                  $ref: "#/components/schemas/String"
                launchTemplate:
                  $ref: "#/components/schemas/LaunchTemplateSpecification"
                force:
                  $ref: "#/components/schemas/Boolean"
                clientRequestToken:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateNodegroupVersionResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
