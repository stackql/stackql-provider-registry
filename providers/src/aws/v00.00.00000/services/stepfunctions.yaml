    IncludedData:
      type: string
      enum:
        - ALL_DATA
        - METADATA_ONLY
    DescribeExecutionOutput:
      type: object
      properties:
        executionArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that identifies the execution.
        stateMachineArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the executed stated machine.
        name:
          $ref: "#/components/schemas/Name"
          description: 'The name of the execution. A name must not contain: white space brackets < > { } [ ] wildcard characters ? * special characters " # % \ ^ | ~ ` $ & , ; : / control characters (U+0000-001F, U+007F-009F, U+FFFE-FFFF) surrogates (U+D800-DFFF) invalid characters ( U+10FFFF) To enable logging with CloudWatch Logs, the name should only contain 0-9, A-Z, a-z, - and _.'
        status:
          $ref: "#/components/schemas/ExecutionStatus"
          description: The current status of the execution.
        startDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date the execution is started.
        stopDate:
          $ref: "#/components/schemas/Timestamp"
          description: If the execution ended, the date the execution stopped.
        input:
          $ref: "#/components/schemas/SensitiveData"
          description: The string that contains the JSON input data of the execution. Length constraints apply to the payload size, and are expressed as bytes in UTF-8 encoding.
        inputDetails:
          $ref: "#/components/schemas/CloudWatchEventsExecutionDataDetails"
        output:
          $ref: "#/components/schemas/SensitiveData"
          description: The JSON output data of the execution. Length constraints apply to the payload size, and are expressed as bytes in UTF-8 encoding. This field is set only if the execution succeeds. If the execution fails, this field is null.
        outputDetails:
          $ref: "#/components/schemas/CloudWatchEventsExecutionDataDetails"
        traceHeader:
          $ref: "#/components/schemas/TraceHeader"
          description: The X-Ray trace header that was passed to the execution. For X-Ray traces, all Amazon Web Services services use the X-Amzn-Trace-Id header from the HTTP request. Using the header is the preferred mechanism to identify a trace. StartExecution and StartSyncExecution API operations can also use traceHeader from the body of the request payload. If both sources are provided, Step Functions will use the header value (preferred) over the value in the request body.
        mapRunArn:
          $ref: "#/components/schemas/LongArn"
          description: The Amazon Resource Name (ARN) that identifies a Map Run, which dispatched this execution.
        error:
          $ref: "#/components/schemas/SensitiveError"
          description: The error string if the state machine execution failed.
        cause:
          $ref: "#/components/schemas/SensitiveCause"
          description: The cause string if the state machine execution failed.
        stateMachineVersionArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the state machine version associated with the execution. The version ARN is a combination of state machine ARN and the version number separated by a colon (:). For example, stateMachineARN:1. If you start an execution from a StartExecution request without specifying a state machine version or alias ARN, Step Functions returns a null value.
        stateMachineAliasArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the state machine alias associated with the execution. The alias ARN is a combination of state machine ARN and the alias name separated by a colon (:). For example, stateMachineARN:PROD. If you start an execution from a StartExecution request with a state machine version ARN, this field will be null.
        redriveCount:
          $ref: "#/components/schemas/RedriveCount"
          description: The number of times you've redriven an execution. If you have not yet redriven an execution, the redriveCount is 0. This count is only updated if you successfully redrive an execution.
        redriveDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date the execution was last redriven. If you have not yet redriven an execution, the redriveDate is null. The redriveDate is unavailable if you redrive a Map Run that starts child workflow executions of type EXPRESS.
        redriveStatus:
          $ref: "#/components/schemas/ExecutionRedriveStatus"
          description: Indicates whether or not an execution can be redriven at a given point in time. For executions of type STANDARD, redriveStatus is NOT_REDRIVABLE if calling the RedriveExecution API action would return the ExecutionNotRedrivable error. For a Distributed Map that includes child workflows of type STANDARD, redriveStatus indicates whether or not the Map Run can redrive child workflow executions. For a Distributed Map that includes child workflows of type EXPRESS, redriveStatus indicates whether or not the Map Run can redrive child workflow executions. You can redrive failed or timed out EXPRESS workflows only if they're a part of a Map Run. When you redrive the Map Run, these workflows are restarted using the StartExecution API action.
        redriveStatusReason:
          $ref: "#/components/schemas/SensitiveData"
          description: "When redriveStatus is NOT_REDRIVABLE, redriveStatusReason specifies the reason why an execution cannot be redriven. For executions of type STANDARD, or for a Distributed Map that includes child workflows of type STANDARD, redriveStatusReason can include one of the following reasons: State machine is in DELETING status. Execution is RUNNING and cannot be redriven. Execution is SUCCEEDED and cannot be redriven. Execution was started before the launch of RedriveExecution. Execution history event limit exceeded. Execution has exceeded the max execution time. Execution redrivable period exceeded. For a Distributed Map that includes child workflows of type EXPRESS, redriveStatusReason is only returned if the child workflows are not redrivable. This happens when the child workflow executions have completed successfully."
      required:
        - executionArn
        - stateMachineArn
        - status
        - startDate
    ExecutionStatus:
      type: string
      enum:
        - RUNNING
        - SUCCEEDED
        - FAILED
        - TIMED_OUT
        - ABORTED
        - PENDING_REDRIVE
    SensitiveData:
      type: string
      maxLength: 262144
    CloudWatchEventsExecutionDataDetails:
