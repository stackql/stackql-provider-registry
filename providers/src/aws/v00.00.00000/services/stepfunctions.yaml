  /StartExecution:
    post:
      operationId: StartExecution
      description: "Starts a state machine execution. A qualified state machine ARN can either refer to a Distributed Map state defined within a state machine, a version ARN, or an alias ARN. The following are some examples of qualified and unqualified state machine ARNs: The following qualified state machine ARN refers to a Distributed Map state with a label mapStateLabel in a state machine named myStateMachine. arn:partition:states:region:account-id:stateMachine:myStateMachine/mapStateLabel If you provide a qualified state machine ARN that refers to a Distributed Map state, the request fails with ValidationException. The following qualified state machine ARN refers to an alias named PROD. arn:`<partition>`:states:`<region>`:`<account-id>`:stateMachine:`<myStateMachine:PROD>` If you provide a qualified state machine ARN that refers to a version ARN or an alias ARN, the request starts execution for that version or alias. The following unqualified state machine ARN refers to a state machine named myStateMachine. arn:`<partition>`:states:`<region>`:`<account-id>`:stateMachine:`<myStateMachine>` If you start an execution with an unqualified state machine ARN, Step Functions uses the latest revision of the state machine for the execution. To start executions of a state machine version, call StartExecution and provide the version ARN or the ARN of an alias that points to the version. StartExecution is idempotent for STANDARD workflows. For a STANDARD workflow, if you call StartExecution with the same name and input as a running execution, the call succeeds and return the same response as the original request. If the execution is closed or if the input is different, it returns a 400 ExecutionAlreadyExists error. You can reuse names after 90 days. StartExecution isn't idempotent for EXPRESS workflows."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSStepFunctions.StartExecution
            default: AWSStepFunctions.StartExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                stateMachineArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Name (ARN) of the state machine to execute. The stateMachineArn parameter accepts one of the following inputs: An unqualified state machine ARN – Refers to a state machine ARN that isn't qualified with a version or alias ARN. The following is an example of an unqualified state machine ARN. arn:`<partition>`:states:`<region>`:`<account-id>`:stateMachine:`<myStateMachine>` Step Functions doesn't associate state machine executions that you start with an unqualified ARN with a version. This is true even if that version uses the same revision that the execution used. A state machine version ARN – Refers to a version ARN, which is a combination of state machine ARN and the version number separated by a colon (:). The following is an example of the ARN for version 10. arn:`<partition>`:states:`<region>`:`<account-id>`:stateMachine:`<myStateMachine>`:10 Step Functions doesn't associate executions that you start with a version ARN with any aliases that point to that version. A state machine alias ARN – Refers to an alias ARN, which is a combination of state machine ARN and the alias name separated by a colon (:). The following is an example of the ARN for an alias named PROD. arn:`<partition>`:states:`<region>`:`<account-id>`:stateMachine:`<myStateMachine:PROD>` Step Functions associates executions that you start with an alias ARN with that alias and the state machine version used for that execution."
                name:
                  $ref: "#/components/schemas/Name"
                  description: "Optional name of the execution. This name must be unique for your Amazon Web Services account, Region, and state machine for 90 days. For more information, see Limits Related to State Machine Executions in the Step Functions Developer Guide. If you don't provide a name for the execution, Step Functions automatically generates a universally unique identifier (UUID) as the execution name. A name must not contain: white space brackets < > { } [ ] wildcard characters ? * special characters \" # % \\ ^ | ~ ` $ & , ; : / control characters (U+0000-001F, U+007F-009F, U+FFFE-FFFF) surrogates (U+D800-DFFF) invalid characters ( U+10FFFF) To enable logging with CloudWatch Logs, the name should only contain 0-9, A-Z, a-z, - and _."
                input:
                  $ref: "#/components/schemas/SensitiveData"
                  description: "The string that contains the JSON input data for the execution, for example: \"{\\\"first_name\\\" : \\\"Alejandro\\\"}\" If you don't include any JSON input data, you still must include the two braces, for example: \"{}\" Length constraints apply to the payload size, and are expressed as bytes in UTF-8 encoding."
                traceHeader:
                  $ref: "#/components/schemas/TraceHeader"
                  description: Passes the X-Ray trace header. The trace header can also be passed in the request payload. For X-Ray traces, all Amazon Web Services services use the X-Amzn-Trace-Id header from the HTTP request. Using the header is the preferred mechanism to identify a trace. StartExecution and StartSyncExecution API operations can also use traceHeader from the body of the request payload. If both sources are provided, Step Functions will use the header value (preferred) over the value in the request body.
              required:
                - stateMachineArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartExecutionOutput"
  /StartSyncExecution:
    post:
      operationId: StartSyncExecution
      description: Starts a Synchronous Express state machine execution. StartSyncExecution is not available for STANDARD workflows. StartSyncExecution will return a 200 OK response, even if your execution fails, because the status code in the API response doesn't reflect function errors. Error codes are reserved for errors that prevent your execution from running, such as permissions errors, limit errors, or issues with your state machine code and configuration. This API action isn't logged in CloudTrail.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSStepFunctions.StartSyncExecution
            default: AWSStepFunctions.StartSyncExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                stateMachineArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the state machine to execute.
                name:
                  $ref: "#/components/schemas/Name"
                  description: The name of the execution.
                input:
                  $ref: "#/components/schemas/SensitiveData"
                  description: "The string that contains the JSON input data for the execution, for example: \"{\\\"first_name\\\" : \\\"Alejandro\\\"}\" If you don't include any JSON input data, you still must include the two braces, for example: \"{}\" Length constraints apply to the payload size, and are expressed as bytes in UTF-8 encoding."
                traceHeader:
                  $ref: "#/components/schemas/TraceHeader"
                  description: Passes the X-Ray trace header. The trace header can also be passed in the request payload. For X-Ray traces, all Amazon Web Services services use the X-Amzn-Trace-Id header from the HTTP request. Using the header is the preferred mechanism to identify a trace. StartExecution and StartSyncExecution API operations can also use traceHeader from the body of the request payload. If both sources are provided, Step Functions will use the header value (preferred) over the value in the request body.
                includedData:
                  $ref: "#/components/schemas/IncludedData"
                  description: If your state machine definition is encrypted with a KMS key, callers must have kms:Decrypt permission to decrypt the definition. Alternatively, you can call the API with includedData = METADATA_ONLY to get a successful response without the encrypted definition.
              required:
                - stateMachineArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartSyncExecutionOutput"
  /StopExecution:
    post:
      operationId: StopExecution
      description: Stops an execution. This API action is not supported by EXPRESS state machines. For an execution with encryption enabled, Step Functions will encrypt the error and cause fields using the KMS key for the execution role. A caller can stop an execution without using any KMS permissions in the execution role if the caller provides a null value for both error and cause fields because no data needs to be encrypted.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSStepFunctions.StopExecution
            default: AWSStepFunctions.StopExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                executionArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the execution to stop.
                error:
                  $ref: "#/components/schemas/SensitiveError"
                  description: The error code of the failure.
                cause:
                  $ref: "#/components/schemas/SensitiveCause"
                  description: A more detailed explanation of the cause of the failure.
              required:
                - executionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopExecutionOutput"
  /TagResource:
    post:
      operationId: TagResource
      description: "Add a tag to a Step Functions resource. An array of key-value pairs. For more information, see Using Cost Allocation Tags in the Amazon Web Services Billing and Cost Management User Guide, and Controlling Access Using IAM Tags. Tags may only contain Unicode letters, digits, white space, or these symbols: _ . : / = + - @."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSStepFunctions.TagResource
            default: AWSStepFunctions.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) for the Step Functions state machine or activity.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: "The list of tags to add to a resource. Tags may only contain Unicode letters, digits, white space, or these symbols: _ . : / = + - @."
              required:
                - resourceArn
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
  /TestState:
    post:
      operationId: TestState
      description: "Accepts the definition of a single state and executes it. You can test a state without creating a state machine or updating an existing state machine. Using this API, you can test the following: A state's input and output processing data flow An Amazon Web Services service integration request and response An HTTP Task request and response You can call this API on only one state at a time. The states that you can test include the following: All Task types except Activity Pass Wait Choice Succeed Fail The TestState API assumes an IAM role which must contain the required IAM permissions for the resources your state is accessing. For information about the permissions a state might need, see IAM permissions to test a state. The TestState API can run for up to five minutes. If the execution of a state exceeds this duration, it fails with the States.Timeout error. TestState only supports the following when a mock is specified: Activity tasks, .sync or .waitForTaskToken service integration patterns, Parallel, or Map states."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSStepFunctions.TestState
            default: AWSStepFunctions.TestState
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                definition:
                  $ref: "#/components/schemas/Definition"
                  description: The Amazon States Language (ASL) definition of the state or state machine.
                roleArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the execution role with the required IAM permissions for the state.
                input:
                  $ref: "#/components/schemas/SensitiveData"
                  description: A string that contains the JSON input data for the state.
                inspectionLevel:
                  $ref: "#/components/schemas/InspectionLevel"
                  description: "Determines the values to return when a state is tested. You can specify one of the following types: INFO: Shows the final state output. By default, Step Functions sets inspectionLevel to INFO if you don't specify a level. DEBUG: Shows the final state output along with the input and output data processing result. TRACE: Shows the HTTP request and response for an HTTP Task. This level also shows the final state output along with the input and output data processing result. Each of these levels also provide information about the status of the state execution and the next state to transition to."
                revealSecrets:
                  $ref: "#/components/schemas/RevealSecrets"
                  description: Specifies whether or not to include secret information in the test result. For HTTP Tasks, a secret includes the data that an EventBridge connection adds to modify the HTTP request headers, query parameters, and body. Step Functions doesn't omit any information included in the state definition or the HTTP response. If you set revealSecrets to true, you must make sure that the IAM user that calls the TestState API has permission for the states:RevealSecrets action. For an example of IAM policy that sets the states:RevealSecrets permission, see IAM permissions to test a state. Without this permission, Step Functions throws an access denied error. By default, revealSecrets is set to false.
                variables:
                  $ref: "#/components/schemas/SensitiveData"
                  description: JSON object literal that sets variables used in the state under test. Object keys are the variable names and values are the variable values.
                stateName:
                  $ref: "#/components/schemas/TestStateStateName"
                  description: Denotes the particular state within a state machine definition to be tested. If this field is specified, the definition must contain a fully-formed state machine definition.
                mock:
                  $ref: "#/components/schemas/MockInput"
                  description: Defines a mocked result or error for the state under test. A mock can only be specified for Task, Map, or Parallel states. If it is specified for another state type, an exception will be thrown.
                context:
                  $ref: "#/components/schemas/SensitiveData"
                  description: A JSON string representing a valid Context object for the state under test. This field may only be specified if a mock is specified in the same request.
                stateConfiguration:
                  $ref: "#/components/schemas/TestStateConfiguration"
                  description: Contains configurations for the state under test.
              required:
                - definition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestStateOutput"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Remove a tag from a Step Functions resource
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSStepFunctions.UntagResource
            default: AWSStepFunctions.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) for the Step Functions state machine or activity.
                tagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: The list of tags to remove from the resource.
              required:
                - resourceArn
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /UpdateMapRun:
    post:
      operationId: UpdateMapRun
      description: Updates an in-progress Map Run's configuration to include changes to the settings that control maximum concurrency and Map Run failure.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSStepFunctions.UpdateMapRun
            default: AWSStepFunctions.UpdateMapRun
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                mapRunArn:
                  $ref: "#/components/schemas/LongArn"
                  description: The Amazon Resource Name (ARN) of a Map Run.
                maxConcurrency:
                  $ref: "#/components/schemas/MaxConcurrency"
                  description: The maximum number of child workflow executions that can be specified to run in parallel for the Map Run at the same time.
                toleratedFailurePercentage:
                  $ref: "#/components/schemas/ToleratedFailurePercentage"
                  description: The maximum percentage of failed items before the Map Run fails.
                toleratedFailureCount:
                  $ref: "#/components/schemas/ToleratedFailureCount"
                  description: The maximum number of failed items before the Map Run fails.
              required:
                - mapRunArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMapRunOutput"
  /UpdateStateMachine:
    post:
      operationId: UpdateStateMachine
      description: "Updates an existing state machine by modifying its definition, roleArn, loggingConfiguration, or EncryptionConfiguration. Running executions will continue to use the previous definition and roleArn. You must include at least one of definition or roleArn or you will receive a MissingRequiredParameter error. A qualified state machine ARN refers to a Distributed Map state defined within a state machine. For example, the qualified state machine ARN arn:partition:states:region:account-id:stateMachine:stateMachineName/mapStateLabel refers to a Distributed Map state with a label mapStateLabel in the state machine named stateMachineName. A qualified state machine ARN can either refer to a Distributed Map state defined within a state machine, a version ARN, or an alias ARN. The following are some examples of qualified and unqualified state machine ARNs: The following qualified state machine ARN refers to a Distributed Map state with a label mapStateLabel in a state machine named myStateMachine. arn:partition:states:region:account-id:stateMachine:myStateMachine/mapStateLabel If you provide a qualified state machine ARN that refers to a Distributed Map state, the request fails with ValidationException. The following qualified state machine ARN refers to an alias named PROD. arn:`<partition>`:states:`<region>`:`<account-id>`:stateMachine:`<myStateMachine:PROD>` If you provide a qualified state machine ARN that refers to a version ARN or an alias ARN, the request starts execution for that version or alias. The following unqualified state machine ARN refers to a state machine named myStateMachine. arn:`<partition>`:states:`<region>`:`<account-id>`:stateMachine:`<myStateMachine>` After you update your state machine, you can set the publish parameter to true in the same action to publish a new version. This way, you can opt-in to strict versioning of your state machine. Step Functions assigns monotonically increasing integers for state machine versions, starting at version number 1. All StartExecution calls within a few seconds use the updated definition and roleArn. Executions started immediately after you call UpdateStateMachine may use the previous state machine definition and roleArn."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSStepFunctions.UpdateStateMachine
            default: AWSStepFunctions.UpdateStateMachine
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                stateMachineArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the state machine.
                definition:
                  $ref: "#/components/schemas/Definition"
                  description: The Amazon States Language definition of the state machine. See Amazon States Language.
                roleArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the IAM role of the state machine.
                loggingConfiguration:
                  $ref: "#/components/schemas/LoggingConfiguration"
                  description: Use the LoggingConfiguration data type to set CloudWatch Logs options.
                tracingConfiguration:
                  $ref: "#/components/schemas/TracingConfiguration"
                  description: Selects whether X-Ray tracing is enabled.
                publish:
                  $ref: "#/components/schemas/Publish"
                  description: Specifies whether the state machine version is published. The default is false. To publish a version after updating the state machine, set publish to true.
                versionDescription:
                  $ref: "#/components/schemas/VersionDescription"
                  description: An optional description of the state machine version to publish. You can only specify the versionDescription parameter if you've set publish to true.
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                  description: Settings to configure server-side encryption.
              required:
                - stateMachineArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateStateMachineOutput"
  /UpdateStateMachineAlias:
    post:
      operationId: UpdateStateMachineAlias
      description: "Updates the configuration of an existing state machine alias by modifying its description or routingConfiguration. You must specify at least one of the description or routingConfiguration parameters to update a state machine alias. UpdateStateMachineAlias is an idempotent API. Step Functions bases the idempotency check on the stateMachineAliasArn, description, and routingConfiguration parameters. Requests with the same parameters return an idempotent response. This operation is eventually consistent. All StartExecution requests made within a few seconds use the latest alias configuration. Executions started immediately after calling UpdateStateMachineAlias may use the previous routing configuration. Related operations: CreateStateMachineAlias DescribeStateMachineAlias ListStateMachineAliases DeleteStateMachineAlias"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSStepFunctions.UpdateStateMachineAlias
            default: AWSStepFunctions.UpdateStateMachineAlias
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                stateMachineAliasArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the state machine alias.
                description:
                  $ref: "#/components/schemas/AliasDescription"
                  description: A description of the state machine alias.
                routingConfiguration:
                  $ref: "#/components/schemas/RoutingConfigurationList"
                  description: The routing configuration of the state machine alias. An array of RoutingConfig objects that specifies up to two state machine versions that the alias starts executions for.
              required:
                - stateMachineAliasArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateStateMachineAliasOutput"
  /ValidateStateMachineDefinition:
    post:
      operationId: ValidateStateMachineDefinition
      description: "Validates the syntax of a state machine definition specified in Amazon States Language (ASL), a JSON-based, structured language. You can validate that a state machine definition is correct without creating a state machine resource. Suggested uses for ValidateStateMachineDefinition: Integrate automated checks into your code review or Continuous Integration (CI) process to check state machine definitions before starting deployments. Run validation from a Git pre-commit hook to verify the definition before committing to your source repository. Validation will look for problems in your state machine definition and return a result and a list of diagnostic elements. The result value will be OK when your workflow definition can be successfully created or updated. Note the result can be OK even when diagnostic warnings are present in the response. The result value will be FAIL when the workflow definition contains errors that would prevent you from creating or updating your state machine. The list of ValidateStateMachineDefinitionDiagnostic data elements can contain zero or more WARNING and/or ERROR elements. The ValidateStateMachineDefinition API might add new diagnostics in the future, adjust diagnostic codes, or change the message wording. Your automated processes should only rely on the value of the result field value (OK, FAIL). Do not rely on the exact order, count, or wording of diagnostic messages."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSStepFunctions.ValidateStateMachineDefinition
            default: AWSStepFunctions.ValidateStateMachineDefinition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                definition:
                  $ref: "#/components/schemas/Definition"
                  description: The Amazon States Language definition of the state machine. For more information, see Amazon States Language (ASL).
                type:
                  $ref: "#/components/schemas/StateMachineType"
                  description: The target type of state machine for this definition. The default is STANDARD.
                severity:
                  $ref: "#/components/schemas/ValidateStateMachineDefinitionSeverity"
                  description: Minimum level of diagnostics to return. ERROR returns only ERROR diagnostics, whereas WARNING returns both WARNING and ERROR diagnostics. The default is ERROR.
                maxResults:
                  $ref: "#/components/schemas/ValidateStateMachineDefinitionMaxResult"
                  description: The maximum number of diagnostics that are returned per call. The default and maximum value is 100. Setting the value to 0 will also use the default of 100. If the number of diagnostics returned in the response exceeds maxResults, the value of the truncated field in the response will be set to true.
              required:
                - definition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateStateMachineDefinitionOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Name:
      type: string
      minLength: 1
      maxLength: 80
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "Tags are key-value pairs that can be associated with Step Functions state machines and activities. An array of key-value pairs. For more information, see Using Cost Allocation Tags in the Amazon Web Services Billing and Cost Management User Guide, and Controlling Access Using IAM Tags. Tags may only contain Unicode letters, digits, white space, or these symbols: _ . : / = + - @."
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: The key of a tag.
        value:
          $ref: "#/components/schemas/TagValue"
          description: The value of a tag.
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    EncryptionConfiguration:
      description: Settings to configure server-side encryption. For additional control over security, you can encrypt your data using a customer-managed key for Step Functions state machines and activities. You can configure a symmetric KMS key and data key reuse period when creating or updating a State Machine, and when creating an Activity. The execution history and state machine definition will be encrypted with the key applied to the State Machine. Activity inputs will be encrypted with the key applied to the Activity. Step Functions automatically enables encryption at rest using Amazon Web Services owned keys at no charge. However, KMS charges apply when using a customer managed key. For more information about pricing, see Key Management Service pricing. For more information on KMS, see What is Key Management Service?
      type: object
      properties:
        kmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: An alias, alias ARN, key ID, or key ARN of a symmetric encryption KMS key to encrypt data. To specify a KMS key in a different Amazon Web Services account, you must use the key ARN or alias ARN.
        kmsDataKeyReusePeriodSeconds:
          $ref: "#/components/schemas/KmsDataKeyReusePeriodSeconds"
          description: Maximum duration that Step Functions will reuse data keys. When the period expires, Step Functions will call GenerateDataKey. Only applies to customer managed keys.
        type_:
          $ref: "#/components/schemas/EncryptionType"
          description: Encryption type
      required:
        - type_
    KmsKeyId:
      type: string
      minLength: 1
      maxLength: 2048
    KmsDataKeyReusePeriodSeconds:
      type: integer
      minimum: 60
      maximum: 900
    EncryptionType:
      type: string
      enum:
        - AWS_OWNED_KEY
        - CUSTOMER_MANAGED_KMS_KEY
    CreateActivityOutput:
      type: object
      properties:
        activityArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that identifies the created activity.
        creationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date the activity is created.
      required:
        - activityArn
        - creationDate
    Arn:
      type: string
      minLength: 1
      maxLength: 256
    Timestamp:
      type: string
      format: date-time
    Definition:
      type: string
      minLength: 1
      maxLength: 1048576
    StateMachineType:
      type: string
      enum:
        - STANDARD
        - EXPRESS
    LoggingConfiguration:
      description: The LoggingConfiguration data type is used to set CloudWatch Logs options.
      type: object
      properties:
        level:
          $ref: "#/components/schemas/LogLevel"
          description: Defines which category of execution history events are logged.
        includeExecutionData:
          $ref: "#/components/schemas/IncludeExecutionData"
          description: Determines whether execution data is included in your log. When set to false, data is excluded.
        destinations:
          $ref: "#/components/schemas/LogDestinationList"
          description: An array of objects that describes where your execution history events will be logged. Limited to size 1. Required, if your log level is not set to OFF.
    LogLevel:
      type: string
      enum:
        - ALL
        - ERROR
        - FATAL
        - "OFF"
    IncludeExecutionData:
      type: boolean
    LogDestinationList:
      type: array
      items:
        $ref: "#/components/schemas/LogDestination"
    LogDestination:
      type: object
      properties:
        cloudWatchLogsLogGroup:
          $ref: "#/components/schemas/CloudWatchLogsLogGroup"
          description: An object describing a CloudWatch log group. For more information, see AWS::Logs::LogGroup in the CloudFormation User Guide.
    CloudWatchLogsLogGroup:
      type: object
      properties:
        logGroupArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the the CloudWatch log group to which you want your logs emitted to. The ARN must end with :*
    TracingConfiguration:
      description: Selects whether or not the state machine's X-Ray tracing is enabled. Default is false
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Enabled"
          description: When set to true, X-Ray tracing is enabled.
    Enabled:
      type: boolean
    Publish:
      type: boolean
    VersionDescription:
      type: string
      maxLength: 256
    CreateStateMachineOutput:
      type: object
      properties:
        stateMachineArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that identifies the created state machine.
        creationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date the state machine is created.
        stateMachineVersionArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that identifies the created state machine version. If you do not set the publish parameter to true, this field returns null value.
      required:
        - stateMachineArn
        - creationDate
    AliasDescription:
      type: string
      maxLength: 256
    CharacterRestrictedName:
      type: string
      minLength: 1
      maxLength: 80
      pattern: ^(?=.*[a-zA-Z_\-\.])[a-zA-Z0-9_\-\.]+$
    RoutingConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/RoutingConfigurationListItem"
    RoutingConfigurationListItem:
      description: Contains details about the routing configuration of a state machine alias. In a routing configuration, you define an array of objects that specify up to two state machine versions. You also specify the percentage of traffic to be routed to each version.
      type: object
      properties:
        stateMachineVersionArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that identifies one or two state machine versions defined in the routing configuration. If you specify the ARN of a second version, it must belong to the same state machine as the first version.
        weight:
          $ref: "#/components/schemas/VersionWeight"
          description: The percentage of traffic you want to route to a state machine version. The sum of the weights in the routing configuration must be equal to 100.
      required:
        - stateMachineVersionArn
        - weight
    VersionWeight:
      type: integer
      minimum: 0
      maximum: 100
    CreateStateMachineAliasOutput:
      type: object
      properties:
        stateMachineAliasArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that identifies the created state machine alias.
        creationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date the state machine alias was created.
      required:
        - stateMachineAliasArn
        - creationDate
    DeleteActivityOutput:
      type: object
    DeleteStateMachineOutput:
      type: object
    DeleteStateMachineAliasOutput:
      type: object
    LongArn:
      type: string
      minLength: 1
      maxLength: 2000
    DeleteStateMachineVersionOutput:
