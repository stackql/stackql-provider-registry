          description: "Location of the issue in the state machine, if available. For errors specific to a field, the location could be in the format: /States/`<StateName>`/`<FieldName>`, for example: /States/FailState/ErrorPath."
      required:
        - severity
        - code
        - message
    ValidateStateMachineDefinitionCode:
      type: string
    ValidateStateMachineDefinitionMessage:
      type: string
    ValidateStateMachineDefinitionLocation:
      type: string
    ValidateStateMachineDefinitionTruncated:
      type: boolean
