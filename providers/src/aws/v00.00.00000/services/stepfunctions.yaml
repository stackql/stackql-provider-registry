    SensitiveError:
      type: string
      minLength: 0
      maxLength: 256
    SensitiveCause:
      type: string
      minLength: 0
      maxLength: 32768
    RedriveCount:
      type: integer
    ExecutionRedriveStatus:
      type: string
      enum:
        - REDRIVABLE
        - NOT_REDRIVABLE
        - REDRIVABLE_BY_MAP_RUN
    DescribeMapRunOutput:
      type: object
      properties:
        mapRunArn:
          $ref: "#/components/schemas/LongArn"
          description: The Amazon Resource Name (ARN) that identifies a Map Run.
        executionArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that identifies the execution in which the Map Run was started.
        status:
          $ref: "#/components/schemas/MapRunStatus"
          description: The current status of the Map Run.
        startDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date when the Map Run was started.
        stopDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date when the Map Run was stopped.
        maxConcurrency:
          $ref: "#/components/schemas/MaxConcurrency"
          description: The maximum number of child workflow executions configured to run in parallel for the Map Run at the same time.
        toleratedFailurePercentage:
          $ref: "#/components/schemas/ToleratedFailurePercentage"
          description: The maximum percentage of failed child workflow executions before the Map Run fails.
        toleratedFailureCount:
          $ref: "#/components/schemas/ToleratedFailureCount"
          description: The maximum number of failed child workflow executions before the Map Run fails.
        itemCounts:
          $ref: "#/components/schemas/MapRunItemCounts"
          description: A JSON object that contains information about the total number of items, and the item count for each processing status, such as pending and failed.
        executionCounts:
          $ref: "#/components/schemas/MapRunExecutionCounts"
          description: A JSON object that contains information about the total number of child workflow executions for the Map Run, and the count of child workflow executions for each status, such as failed and succeeded.
        redriveCount:
          $ref: "#/components/schemas/RedriveCount"
          description: The number of times you've redriven a Map Run. If you have not yet redriven a Map Run, the redriveCount is 0. This count is only updated if you successfully redrive a Map Run.
        redriveDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date a Map Run was last redriven. If you have not yet redriven a Map Run, the redriveDate is null.
      required:
        - mapRunArn
        - executionArn
        - status
        - startDate
        - maxConcurrency
        - toleratedFailurePercentage
        - toleratedFailureCount
        - itemCounts
        - executionCounts
    MapRunStatus:
      type: string
      enum:
        - RUNNING
        - SUCCEEDED
        - FAILED
        - ABORTED
    MaxConcurrency:
      type: integer
      minimum: 0
    ToleratedFailurePercentage:
      type: number
      format: float
      minimum: 0
      maximum: 100
    ToleratedFailureCount:
      type: integer
      format: int64
      minimum: 0
    MapRunItemCounts:
      description: Contains details about items that were processed in all of the child workflow executions that were started by a Map Run.
      type: object
      properties:
        pending:
          $ref: "#/components/schemas/UnsignedLong"
          description: The total number of items to process in child workflow executions that haven't started running yet.
        running:
          $ref: "#/components/schemas/UnsignedLong"
          description: The total number of items being processed in child workflow executions that are currently in-progress.
        succeeded:
          $ref: "#/components/schemas/UnsignedLong"
          description: The total number of items processed in child workflow executions that have completed successfully.
        failed:
          $ref: "#/components/schemas/UnsignedLong"
          description: The total number of items processed in child workflow executions that have failed.
        timedOut:
          $ref: "#/components/schemas/UnsignedLong"
          description: The total number of items processed in child workflow executions that have timed out.
        aborted:
          $ref: "#/components/schemas/UnsignedLong"
          description: The total number of items processed in child workflow executions that were either stopped by the user or by Step Functions, because the Map Run failed.
        total:
          $ref: "#/components/schemas/UnsignedLong"
          description: The total number of items processed in all the child workflow executions started by a Map Run.
        resultsWritten:
          $ref: "#/components/schemas/UnsignedLong"
          description: Returns the count of items whose results were written by ResultWriter. For more information, see ResultWriter in the Step Functions Developer Guide.
        failuresNotRedrivable:
          $ref: "#/components/schemas/LongObject"
          description: The number of FAILED, ABORTED, or TIMED_OUT items in child workflow executions that cannot be redriven because the execution status of those child workflows is terminal. For example, child workflows with an execution status of FAILED, ABORTED, or TIMED_OUT and a redriveStatus of NOT_REDRIVABLE.
        pendingRedrive:
          $ref: "#/components/schemas/LongObject"
          description: The number of unsuccessful items in child workflow executions currently waiting to be redriven.
      required:
        - pending
        - running
        - succeeded
        - failed
        - timedOut
        - aborted
        - total
        - resultsWritten
    UnsignedLong:
      type: integer
      format: int64
      minimum: 0
    LongObject:
      type: integer
      format: int64
    MapRunExecutionCounts:
      description: Contains details about all of the child workflow executions started by a Map Run.
      type: object
      properties:
        pending:
          $ref: "#/components/schemas/UnsignedLong"
          description: The total number of child workflow executions that were started by a Map Run, but haven't started executing yet.
        running:
          $ref: "#/components/schemas/UnsignedLong"
          description: The total number of child workflow executions that were started by a Map Run and are currently in-progress.
        succeeded:
          $ref: "#/components/schemas/UnsignedLong"
          description: The total number of child workflow executions that were started by a Map Run and have completed successfully.
        failed:
          $ref: "#/components/schemas/UnsignedLong"
          description: The total number of child workflow executions that were started by a Map Run, but have failed.
        timedOut:
          $ref: "#/components/schemas/UnsignedLong"
          description: The total number of child workflow executions that were started by a Map Run and have timed out.
        aborted:
          $ref: "#/components/schemas/UnsignedLong"
          description: The total number of child workflow executions that were started by a Map Run and were running, but were either stopped by the user or by Step Functions because the Map Run failed.
        total:
          $ref: "#/components/schemas/UnsignedLong"
          description: The total number of child workflow executions that were started by a Map Run.
        resultsWritten:
          $ref: "#/components/schemas/UnsignedLong"
          description: Returns the count of child workflow executions whose results were written by ResultWriter. For more information, see ResultWriter in the Step Functions Developer Guide.
        failuresNotRedrivable:
          $ref: "#/components/schemas/LongObject"
          description: The number of FAILED, ABORTED, or TIMED_OUT child workflow executions that cannot be redriven because their execution status is terminal. For example, child workflows with an execution status of FAILED, ABORTED, or TIMED_OUT and a redriveStatus of NOT_REDRIVABLE.
        pendingRedrive:
          $ref: "#/components/schemas/LongObject"
          description: The number of unsuccessful child workflow executions currently waiting to be redriven. The status of these child workflow executions could be FAILED, ABORTED, or TIMED_OUT in the original execution attempt or a previous redrive attempt.
      required:
        - pending
        - running
        - succeeded
        - failed
        - timedOut
        - aborted
        - total
        - resultsWritten
    DescribeStateMachineOutput:
