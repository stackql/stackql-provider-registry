            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        delete_notification_rule:
          operation:
            $ref: "#/paths/~1deleteNotificationRule/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        describe_notification_rule:
          operation:
            $ref: "#/paths/~1describeNotificationRule/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        list_notification_rules:
          operation:
            $ref: "#/paths/~1listNotificationRules/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.NotificationRules
          request:
            nativeCasing: pascal
          config:
            pagination:
              requestToken:
                key: NextToken
                location: body
              responseToken:
                key: $.NextToken
                location: body
            requestBodyTranslate:
              algorithm: naive
        update_notification_rule:
          operation:
            $ref: "#/paths/~1updateNotificationRule/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/notification_rules/methods/describe_notification_rule"
        insert:
          - $ref: "#/components/x-stackQL-resources/notification_rules/methods/create_notification_rule"
        update:
          - $ref: "#/components/x-stackQL-resources/notification_rules/methods/update_notification_rule"
        delete:
          - $ref: "#/components/x-stackQL-resources/notification_rules/methods/delete_notification_rule"
    targets:
      id: aws.codestar_notifications.targets
      name: targets
      title: targets
      methods:
        delete_target:
          operation:
            $ref: "#/paths/~1deleteTarget/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        list_targets:
          operation:
            $ref: "#/paths/~1listTargets/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.Targets
          request:
            nativeCasing: pascal
          config:
            pagination:
              requestToken:
                key: NextToken
                location: body
              responseToken:
                key: $.NextToken
                location: body
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/targets/methods/list_targets"
        insert: []
        update: []
        delete:
          - $ref: "#/components/x-stackQL-resources/targets/methods/delete_target"
    event_types:
      id: aws.codestar_notifications.event_types
      name: event_types
      title: event_types
      methods:
        list_event_types:
          operation:
            $ref: "#/paths/~1listEventTypes/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.EventTypes
          request:
            nativeCasing: pascal
          config:
