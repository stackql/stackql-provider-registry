openapi: 3.0.0
info:
  version: "2019-10-15"
  title: AWS CodeStar Notifications
  description: AWS CodeStar Notifications
  x-serviceName: codestar-notifications
  x-serviceAlias: codestar_notifications
  x-protocol: rest-json
  x-apiVersion: "2019-10-15"
  x-endpointPrefix: codestar-notifications
  x-jsonVersion: "1.1"
servers:
  - url: https://codestar-notifications.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for codestar-notifications
paths:
  /createNotificationRule:
    post:
      operationId: CreateNotificationRule
      description: Creates a notification rule for a resource. The rule specifies the events you want notifications about and the targets (such as Amazon Q Developer in chat applications topics or Amazon Q Developer in chat applications clients configured for Slack) where you want to receive them.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NotificationRuleName"
                EventTypeIds:
                  $ref: "#/components/schemas/EventTypeIds"
                Resource:
                  $ref: "#/components/schemas/NotificationRuleResource"
                Targets:
                  $ref: "#/components/schemas/Targets"
                DetailType:
                  $ref: "#/components/schemas/DetailType"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Tags:
                  $ref: "#/components/schemas/Tags"
                Status:
                  $ref: "#/components/schemas/NotificationRuleStatus"
              required:
                - EventTypeIds
                - DetailType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNotificationRuleResult"
  /deleteNotificationRule:
    post:
      operationId: DeleteNotificationRule
      description: Deletes a notification rule for a resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/NotificationRuleArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteNotificationRuleResult"
  /deleteTarget:
    post:
      operationId: DeleteTarget
      description: Deletes a specified target for notifications.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TargetAddress:
                  $ref: "#/components/schemas/TargetAddress"
                ForceUnsubscribeAll:
                  $ref: "#/components/schemas/ForceUnsubscribeAll"
              required:
                - TargetAddress
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTargetResult"
  /describeNotificationRule:
    post:
      operationId: DescribeNotificationRule
      description: Returns information about a specified notification rule.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/NotificationRuleArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeNotificationRuleResult"
  /listEventTypes:
    post:
      operationId: ListEventTypes
      description: Returns information about the event types available for configuring notifications.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/ListEventTypesFilters"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventTypesResult"
  /listNotificationRules:
    post:
      operationId: ListNotificationRules
      description: Returns a list of the notification rules for an Amazon Web Services account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/ListNotificationRulesFilters"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNotificationRulesResult"
  /listTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Returns a list of the tags associated with a notification rule.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/NotificationRuleArn"
              required:
                - Arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResult"
  /listTargets:
    post:
      operationId: ListTargets
      description: Returns a list of the notification rule targets for an Amazon Web Services account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/ListTargetsFilters"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTargetsResult"
  /subscribe:
    post:
      operationId: Subscribe
      description: Creates an association between a notification rule and an Amazon Q Developer in chat applications topic or Amazon Q Developer in chat applications client so that the associated target can receive notifications when the events described in the rule are triggered.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/NotificationRuleArn"
                Target:
                  $ref: "#/components/schemas/Target"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - Target
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscribeResult"
  /tagResource:
    post:
      operationId: TagResource
      description: Associates a set of provided tags with a notification rule.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/NotificationRuleArn"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - Arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResult"
  /unsubscribe:
    post:
      operationId: Unsubscribe
      description: Removes an association between a notification rule and an Amazon Q Developer in chat applications topic so that subscribers to that topic stop receiving notifications when the events described in the rule are triggered.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/NotificationRuleArn"
                TargetAddress:
                  $ref: "#/components/schemas/TargetAddress"
              required:
                - TargetAddress
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnsubscribeResult"
  /untagResource/{resource_arn}:
    post:
      operationId: UntagResource
      description: Removes the association between one or more provided tags and a notification rule.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NotificationRuleArn"
          description: The Amazon Resource Name (ARN) of the notification rule from which to remove the tags.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: The key names of the tags to remove.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResult"
  /updateNotificationRule:
    post:
      operationId: UpdateNotificationRule
      description: Updates a notification rule for a resource. You can change the events that trigger the notification rule, the status of the rule, and the targets that receive the notifications. To add or remove tags for a notification rule, you must use TagResource and UntagResource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/NotificationRuleArn"
                Name:
                  $ref: "#/components/schemas/NotificationRuleName"
                Status:
                  $ref: "#/components/schemas/NotificationRuleStatus"
                EventTypeIds:
                  $ref: "#/components/schemas/EventTypeIds"
                Targets:
                  $ref: "#/components/schemas/Targets"
                DetailType:
                  $ref: "#/components/schemas/DetailType"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateNotificationRuleResult"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    NotificationRuleName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z0-9\\-_ ]+$"
    EventTypeIds:
      type: array
      items:
        $ref: "#/components/schemas/EventTypeId"
    EventTypeId:
      type: string
      minLength: 1
      maxLength: 200
    NotificationRuleResource:
      type: string
      pattern: ^arn:aws[^:\s]*:[^:\s]*:[^:\s]*:[0-9]{12}:[^\s]+$
    Targets:
      type: array
      items:
        $ref: "#/components/schemas/Target"
    Target:
      description: Information about the Amazon Q Developer in chat applications topics or Amazon Q Developer in chat applications clients associated with a notification rule.
      type: object
      properties:
        TargetType:
          $ref: "#/components/schemas/TargetType"
          description: The target type. Can be an Amazon Q Developer in chat applications topic or Amazon Q Developer in chat applications client. Amazon Q Developer in chat applications topics are specified as SNS. Amazon Q Developer in chat applications clients are specified as AWSChatbotSlack.
        TargetAddress:
          $ref: "#/components/schemas/TargetAddress"
          description: The Amazon Resource Name (ARN) of the Amazon Q Developer in chat applications topic or Amazon Q Developer in chat applications client.
    TargetType:
      type: string
      pattern: ^[A-Za-z]+$
    TargetAddress:
      type: string
      minLength: 1
      maxLength: 320
    DetailType:
      type: string
      enum:
        - BASIC
        - FULL
    ClientRequestToken:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^[\w:/-]+$
    Tags:
      type: object
      properties: {}
    NotificationRuleStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    CreateNotificationRuleResult:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/NotificationRuleArn"
          description: The Amazon Resource Name (ARN) of the notification rule.
    NotificationRuleArn:
      type: string
      pattern: ^arn:aws[^:\s]*:codestar-notifications:[^:\s]+:\d{12}:notificationrule\/(.*\S)?$
    DeleteNotificationRuleResult:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/NotificationRuleArn"
          description: The Amazon Resource Name (ARN) of the deleted notification rule.
    ForceUnsubscribeAll:
      type: boolean
    DeleteTargetResult:
      type: object
    DescribeNotificationRuleResult:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/NotificationRuleArn"
          description: The Amazon Resource Name (ARN) of the notification rule.
        Name:
          $ref: "#/components/schemas/NotificationRuleName"
          description: The name of the notification rule.
        EventTypes:
          $ref: "#/components/schemas/EventTypeBatch"
          description: A list of the event types associated with the notification rule.
        Resource:
          $ref: "#/components/schemas/NotificationRuleResource"
          description: The Amazon Resource Name (ARN) of the resource associated with the notification rule.
        Targets:
          $ref: "#/components/schemas/TargetsBatch"
          description: A list of the Amazon Q Developer in chat applications topics and Amazon Q Developer in chat applications clients associated with the notification rule.
        DetailType:
          $ref: "#/components/schemas/DetailType"
          description: The level of detail included in the notifications for this resource. BASIC will include only the contents of the event as it would appear in Amazon CloudWatch. FULL will include any supplemental information provided by CodeStar Notifications and/or the service for the resource for which the notification is created.
        CreatedBy:
          $ref: "#/components/schemas/NotificationRuleCreatedBy"
          description: The name or email alias of the person who created the notification rule.
        Status:
          $ref: "#/components/schemas/NotificationRuleStatus"
          description: The status of the notification rule. Valid statuses are on (sending notifications) or off (not sending notifications).
        CreatedTimestamp:
          $ref: "#/components/schemas/CreatedTimestamp"
          description: The date and time the notification rule was created, in timestamp format.
        LastModifiedTimestamp:
          $ref: "#/components/schemas/LastModifiedTimestamp"
          description: The date and time the notification rule was most recently updated, in timestamp format.
        Tags:
          type: object
          properties: {}
          description: The tags associated with the notification rule.
      required:
        - Arn
    EventTypeBatch:
      type: array
      items:
        $ref: "#/components/schemas/EventTypeSummary"
    EventTypeSummary:
      description: Returns information about an event that has triggered a notification rule.
      type: object
      properties:
        EventTypeId:
          $ref: "#/components/schemas/EventTypeId"
          description: The system-generated ID of the event. For a complete list of event types and IDs, see Notification concepts in the Developer Tools Console User Guide.
        ServiceName:
          $ref: "#/components/schemas/ServiceName"
          description: The name of the service for which the event applies.
        EventTypeName:
          $ref: "#/components/schemas/EventTypeName"
          description: The name of the event.
        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The resource type of the event.
    ServiceName:
      type: string
    EventTypeName:
      type: string
    ResourceType:
      type: string
      minLength: 1
      pattern: ^([a-zA-Z0-9-])+$
    TargetsBatch:
      type: array
      items:
        $ref: "#/components/schemas/TargetSummary"
    TargetSummary:
      description: Information about the targets specified for a notification rule.
      type: object
      properties:
        TargetAddress:
          $ref: "#/components/schemas/TargetAddress"
          description: The Amazon Resource Name (ARN) of the Amazon Q Developer in chat applications topic or Amazon Q Developer in chat applications client.
        TargetType:
          $ref: "#/components/schemas/TargetType"
          description: The type of the target (for example, SNS). Amazon Q Developer in chat applications topics are specified as SNS. Amazon Q Developer in chat applications clients are specified as AWSChatbotSlack.
        TargetStatus:
          $ref: "#/components/schemas/TargetStatus"
          description: The status of the target.
    TargetStatus:
      type: string
      enum:
        - PENDING
        - ACTIVE
        - UNREACHABLE
        - INACTIVE
        - DEACTIVATED
    NotificationRuleCreatedBy:
      type: string
      minLength: 1
    CreatedTimestamp:
      type: string
      format: date-time
    LastModifiedTimestamp:
      type: string
      format: date-time
    ListEventTypesFilters:
      type: array
      items:
        $ref: "#/components/schemas/ListEventTypesFilter"
    ListEventTypesFilter:
      description: Information about a filter to apply to the list of returned event types. You can filter by resource type or service name.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ListEventTypesFilterName"
          description: The system-generated name of the filter type you want to filter by.
        Value:
          $ref: "#/components/schemas/ListEventTypesFilterValue"
          description: The name of the resource type (for example, pipeline) or service name (for example, CodePipeline) that you want to filter by.
      required:
        - Name
        - Value
    ListEventTypesFilterName:
      type: string
      enum:
        - RESOURCE_TYPE
        - SERVICE_NAME
    ListEventTypesFilterValue:
      type: string
    NextToken:
      type: string
      pattern: ^[\w/+=]+$
    MaxResults:
      type: integer
      minimum: 1
      maximum: 100
    ListEventTypesResult:
      type: object
      properties:
        EventTypes:
          $ref: "#/components/schemas/EventTypeBatch"
          description: Information about each event, including service name, resource type, event ID, and event name.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: An enumeration token that can be used in a request to return the next batch of the results.
    ListNotificationRulesFilters:
      type: array
      items:
        $ref: "#/components/schemas/ListNotificationRulesFilter"
    ListNotificationRulesFilter:
      description: Information about a filter to apply to the list of returned notification rules. You can filter by event type, owner, resource, or target.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ListNotificationRulesFilterName"
          description: The name of the attribute you want to use to filter the returned notification rules.
        Value:
          $ref: "#/components/schemas/ListNotificationRulesFilterValue"
          description: The value of the attribute you want to use to filter the returned notification rules. For example, if you specify filtering by RESOURCE in Name, you might specify the ARN of a pipeline in CodePipeline for the value.
      required:
        - Name
        - Value
    ListNotificationRulesFilterName:
      type: string
      enum:
        - EVENT_TYPE_ID
        - CREATED_BY
        - RESOURCE
        - TARGET_ADDRESS
    ListNotificationRulesFilterValue:
      type: string
      maxLength: 2048
    ListNotificationRulesResult:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: An enumeration token that can be used in a request to return the next batch of the results.
        NotificationRules:
          $ref: "#/components/schemas/NotificationRuleBatch"
          description: The list of notification rules for the Amazon Web Services account, by Amazon Resource Name (ARN) and ID.
    NotificationRuleBatch:
      type: array
      items:
        $ref: "#/components/schemas/NotificationRuleSummary"
    NotificationRuleSummary:
      description: Information about a specified notification rule.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/NotificationRuleId"
          description: The unique ID of the notification rule.
        Arn:
          $ref: "#/components/schemas/NotificationRuleArn"
          description: The Amazon Resource Name (ARN) of the notification rule.
    NotificationRuleId:
      type: string
      minLength: 1
      maxLength: 40
    ListTagsForResourceResult:
      type: object
      properties:
        Tags:
          type: object
          properties: {}
          description: The tags associated with the notification rule.
    ListTargetsFilters:
      type: array
      items:
        $ref: "#/components/schemas/ListTargetsFilter"
    ListTargetsFilter:
      description: Information about a filter to apply to the list of returned targets. You can filter by target type, address, or status. For example, to filter results to notification rules that have active Amazon Q Developer in chat applications topics as targets, you could specify a ListTargetsFilter Name as TargetType and a Value of SNS, and a Name of TARGET_STATUS and a Value of ACTIVE.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ListTargetsFilterName"
          description: The name of the attribute you want to use to filter the returned targets.
        Value:
          $ref: "#/components/schemas/ListTargetsFilterValue"
          description: The value of the attribute you want to use to filter the returned targets. For example, if you specify SNS for the Target type, you could specify an Amazon Resource Name (ARN) for a topic as the value.
      required:
        - Name
        - Value
    ListTargetsFilterName:
      type: string
      enum:
        - TARGET_TYPE
        - TARGET_ADDRESS
        - TARGET_STATUS
    ListTargetsFilterValue:
      type: string
      maxLength: 2048
    ListTargetsResult:
      type: object
      properties:
        Targets:
          $ref: "#/components/schemas/TargetsBatch"
          description: The list of notification rule targets.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: An enumeration token that can be used in a request to return the next batch of results.
    SubscribeResult:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/NotificationRuleArn"
          description: The Amazon Resource Name (ARN) of the notification rule for which you have created assocations.
    TagResourceResult:
      type: object
      properties:
        Tags:
          type: object
          properties: {}
          description: The list of tags associated with the resource.
    UnsubscribeResult:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/NotificationRuleArn"
          description: The Amazon Resource Name (ARN) of the the notification rule from which you have removed a subscription.
      required:
        - Arn
    TagKeys:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    UntagResourceResult:
      type: object
    UpdateNotificationRuleResult:
      type: object
  x-stackQL-resources:
    notification_rules:
      id: aws.codestar_notifications.notification_rules
      name: notification_rules
      title: notification_rules
      methods:
        create_notification_rule:
          operation:
            $ref: "#/paths/~1createNotificationRule/post"
          response:
            openAPIDocKey: "200"
