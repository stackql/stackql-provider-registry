    DBProxyDisplay:
      type: object
      properties:
        DBProxyName:
          type: string
          description: The identifier for the proxy. This name must be unique for all proxies owned by your Amazon Web Services account in the specified Amazon Web Services Region.
        DBProxyArn:
          type: string
          description: The Amazon Resource Name (ARN) for the proxy.
        Status:
          type: string
          description: The current status of this proxy. A status of available means the proxy is ready to handle requests. Other values indicate that you must wait for the proxy to be ready, or take some action to resolve an issue.
        EngineFamily:
          type: string
          description: The kinds of databases that the proxy can connect to. This value determines which database network protocol the proxy recognizes when it interprets network traffic to and from the database. MYSQL supports Aurora MySQL, RDS for MariaDB, and RDS for MySQL databases. POSTGRESQL supports Aurora PostgreSQL and RDS for PostgreSQL databases. SQLSERVER supports RDS for Microsoft SQL Server databases.
        VpcId:
          type: string
          description: Provides the VPC ID of the DB proxy.
        VpcSecurityGroupIds:
          type: string
          description: Provides a list of VPC security groups that the proxy belongs to.
        VpcSubnetIds:
          type: string
          description: The EC2 subnet IDs for the proxy.
        DefaultAuthScheme:
          type: string
          description: The default authentication scheme that the proxy uses for client connections to the proxy and connections from the proxy to the underlying database. Valid values are NONE and IAM_AUTH. When set to IAM_AUTH, the proxy uses end-to-end IAM authentication to connect to the database.
        Auth:
          type: string
          description: One or more data structures specifying the authorization mechanism to connect to the associated RDS DB instance or Aurora DB cluster.
        RoleArn:
          type: string
          description: The Amazon Resource Name (ARN) for the IAM role that the proxy uses to access Amazon Secrets Manager.
        Endpoint:
          type: string
          description: The endpoint that you can use to connect to the DB proxy. You include the endpoint value in the connection string for a database client application.
        RequireTLS:
          type: boolean
          description: Indicates whether Transport Layer Security (TLS) encryption is required for connections to the proxy.
        IdleClientTimeout:
          type: integer
          description: "The number of seconds a connection to the proxy can have no activity before the proxy drops the client connection. The proxy keeps the underlying database connection open and puts it back into the connection pool for reuse by later connection requests. Default: 1800 (30 minutes) Constraints: 1 to 28,800"
        DebugLogging:
          type: boolean
          description: Specifies whether the proxy logs detailed connection and query information. When you enable DebugLogging, the proxy captures connection details and connection pool behavior from your queries. Debug logging increases CloudWatch costs and can impact proxy performance. Enable this option only when you need to troubleshoot connection or performance issues.
        CreatedDate:
          type: string
          description: The date and time when the proxy was first created.
        UpdatedDate:
          type: string
          description: The date and time when the proxy was last updated.
        EndpointNetworkType:
          type: string
          description: "The network type of the DB proxy endpoint. The network type determines the IP version that the proxy endpoint supports. Valid values: IPV4 - The proxy endpoint supports IPv4 only. IPV6 - The proxy endpoint supports IPv6 only. DUAL - The proxy endpoint supports both IPv4 and IPv6."
        TargetConnectionNetworkType:
          type: string
          description: "The network type that the proxy uses to connect to the target database. The network type determines the IP version that the proxy uses for connections to the database. Valid values: IPV4 - The proxy connects to the database using IPv4 only. IPV6 - The proxy connects to the database using IPv6 only."
    CreateDBProxyOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBProxyDisplay"
    CreateDBProxyRequest:
      type: object
      properties:
        DBProxyName:
          $ref: "#/components/schemas/DBProxyName"
          description: The identifier for the proxy. This name must be unique for all proxies owned by your Amazon Web Services account in the specified Amazon Web Services Region. An identifier must begin with a letter and must contain only ASCII letters, digits, and hyphens; it can't end with a hyphen or contain two consecutive hyphens.
        EngineFamily:
          $ref: "#/components/schemas/EngineFamily"
          description: The kinds of databases that the proxy can connect to. This value determines which database network protocol the proxy recognizes when it interprets network traffic to and from the database. For Aurora MySQL, RDS for MariaDB, and RDS for MySQL databases, specify MYSQL. For Aurora PostgreSQL and RDS for PostgreSQL databases, specify POSTGRESQL. For RDS for Microsoft SQL Server, specify SQLSERVER.
        DefaultAuthScheme:
          $ref: "#/components/schemas/DefaultAuthScheme"
          description: The default authentication scheme that the proxy uses for client connections to the proxy and connections from the proxy to the underlying database. Valid values are NONE and IAM_AUTH. When set to IAM_AUTH, the proxy uses end-to-end IAM authentication to connect to the database. If you don't specify DefaultAuthScheme or specify this parameter as NONE, you must specify the Auth option.
        Auth:
          $ref: "#/components/schemas/UserAuthConfigList"
          description: The authorization mechanism that the proxy uses.
        RoleArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the IAM role that the proxy uses to access secrets in Amazon Web Services Secrets Manager.
        VpcSubnetIds:
          $ref: "#/components/schemas/StringList"
          description: One or more VPC subnet IDs to associate with the new proxy.
        VpcSecurityGroupIds:
          $ref: "#/components/schemas/StringList"
          description: One or more VPC security group IDs to associate with the new proxy.
        RequireTLS:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether Transport Layer Security (TLS) encryption is required for connections to the proxy. By enabling this setting, you can enforce encrypted TLS connections to the proxy.
        IdleClientTimeout:
          $ref: "#/components/schemas/IntegerOptional"
          description: The number of seconds that a connection to the proxy can be inactive before the proxy disconnects it. You can set this value higher or lower than the connection timeout limit for the associated database.
        DebugLogging:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the proxy logs detailed connection and query information. When you enable DebugLogging, the proxy captures connection details and connection pool behavior from your queries. Debug logging increases CloudWatch costs and can impact proxy performance. Enable this option only when you need to troubleshoot connection or performance issues.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: An optional set of key-value pairs to associate arbitrary data of your choosing with the proxy.
        EndpointNetworkType:
          $ref: "#/components/schemas/EndpointNetworkType"
          description: "The network type of the DB proxy endpoint. The network type determines the IP version that the proxy endpoint supports. Valid values: IPV4 - The proxy endpoint supports IPv4 only. IPV6 - The proxy endpoint supports IPv6 only. DUAL - The proxy endpoint supports both IPv4 and IPv6. Default: IPV4 Constraints: If you specify IPV6 or DUAL, the VPC and all subnets must have an IPv6 CIDR block. If you specify IPV6 or DUAL, the VPC tenancy cannot be dedicated."
        TargetConnectionNetworkType:
          $ref: "#/components/schemas/TargetConnectionNetworkType"
          description: "The network type that the proxy uses to connect to the target database. The network type determines the IP version that the proxy uses for connections to the database. Valid values: IPV4 - The proxy connects to the database using IPv4 only. IPV6 - The proxy connects to the database using IPv6 only. Default: IPV4 Constraints: If you specify IPV6, the database must support dual-stack mode. RDS doesn't support IPv6-only databases. All targets registered with the proxy must be compatible with the specified network type."
      required:
        - DBProxyName
        - EngineFamily
        - RoleArn
        - VpcSubnetIds
