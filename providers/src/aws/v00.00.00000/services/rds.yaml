      parameters:
        - name: Engine
          in: query
          required: false
          description: "The database engine. RDS Custom for Oracle supports the following values: custom-oracle-ee custom-oracle-ee-cdb custom-oracle-se2 custom-oracle-se2-cdb RDS Custom for SQL Server supports the following values: custom-sqlserver-ee custom-sqlserver-se ccustom-sqlserver-web custom-sqlserver-dev RDS for SQL Server supports only sqlserver-dev-ee."
          schema:
            $ref: "#/components/schemas/CustomEngineName"
        - name: EngineVersion
          in: query
          required: true
          description: The custom engine version (CEV) that you want to modify. This option is required for RDS Custom for Oracle, but optional for Amazon RDS. The combination of Engine and EngineVersion is unique per customer per Amazon Web Services Region.
          schema:
            $ref: "#/components/schemas/CustomEngineVersion"
        - name: Description
          in: query
          required: false
          description: An optional description of your CEV.
          schema:
            $ref: "#/components/schemas/Description"
        - name: Status
          in: query
          required: false
          description: "The availability status to be assigned to the CEV. Valid values are as follows: available You can use this CEV to create a new RDS Custom DB instance. inactive You can create a new RDS Custom instance by restoring a DB snapshot with this CEV. You can't patch or create new instances with this CEV. You can change any status to any status. A typical reason to change status is to prevent the accidental use of a CEV, or to make a deprecated CEV eligible for use again. For example, you might change the status of your CEV from available to inactive, and from inactive back to available. To change the availability status of the CEV, it must not currently be in use by an RDS Custom instance, snapshot, or automated backup."
          schema:
            $ref: "#/components/schemas/CustomEngineVersionStatus"
      responses:
        "200":
          description: Success
          content:
            text/xml:
