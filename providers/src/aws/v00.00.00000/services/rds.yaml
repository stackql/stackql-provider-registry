          type: array
          items:
            $ref: "#/components/schemas/DBClusterDisplay"
    RestoreDBClusterFromS3Message:
      type: object
      properties:
        AvailabilityZones:
          $ref: "#/components/schemas/AvailabilityZones"
          description: A list of Availability Zones (AZs) where instances in the restored DB cluster can be created.
        BackupRetentionPeriod:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The number of days for which automated backups of the restored DB cluster are retained. You must specify a minimum value of 1. Default: 1 Constraints: Must be a value from 1 to 35"
        CharacterSetName:
          $ref: "#/components/schemas/String"
          description: A value that indicates that the restored DB cluster should be associated with the specified CharacterSet.
        DatabaseName:
          $ref: "#/components/schemas/String"
          description: The database name for the restored DB cluster.
        DBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "The name of the DB cluster to create from the source data in the Amazon S3 bucket. This parameter isn't case-sensitive. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens. First character must be a letter. Can't end with a hyphen or contain two consecutive hyphens. Example: my-cluster1"
        DBClusterParameterGroupName:
          $ref: "#/components/schemas/String"
          description: "The name of the DB cluster parameter group to associate with the restored DB cluster. If this argument is omitted, the default parameter group for the engine version is used. Constraints: If supplied, must match the name of an existing DBClusterParameterGroup."
        VpcSecurityGroupIds:
          $ref: "#/components/schemas/VpcSecurityGroupIdList"
          description: A list of EC2 VPC security groups to associate with the restored DB cluster.
        DBSubnetGroupName:
          $ref: "#/components/schemas/String"
          description: "A DB subnet group to associate with the restored DB cluster. Constraints: If supplied, must match the name of an existing DBSubnetGroup. Example: mydbsubnetgroup"
        Engine:
          $ref: "#/components/schemas/String"
          description: "The name of the database engine to be used for this DB cluster. Valid Values: aurora-mysql (for Aurora MySQL)"
        EngineVersion:
          $ref: "#/components/schemas/String"
          description: 'The version number of the database engine to use. To list all of the available engine versions for aurora-mysql (Aurora MySQL), use the following command: aws rds describe-db-engine-versions --engine aurora-mysql --query "DBEngineVersions[].EngineVersion" Aurora MySQL Examples: 5.7.mysql_aurora.2.12.0, 8.0.mysql_aurora.3.04.0'
        Port:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The port number on which the instances in the restored DB cluster accept connections. Default: 3306"
        MasterUsername:
          $ref: "#/components/schemas/String"
          description: "The name of the master user for the restored DB cluster. Constraints: Must be 1 to 16 letters or numbers. First character must be a letter. Can't be a reserved word for the chosen database engine."
        MasterUserPassword:
          $ref: "#/components/schemas/SensitiveString"
          description: "The password for the master database user. This password can contain any printable ASCII character except \"/\", \"\"\", or \"@\". Constraints: Must contain from 8 to 41 characters. Can't be specified if ManageMasterUserPassword is turned on."
        OptionGroupName:
          $ref: "#/components/schemas/String"
          description: A value that indicates that the restored DB cluster should be associated with the specified option group. Permanent options can't be removed from an option group. An option group can't be removed from a DB cluster once it is associated with a DB cluster.
        PreferredBackupWindow:
          $ref: "#/components/schemas/String"
          description: "The daily time range during which automated backups are created if automated backups are enabled using the BackupRetentionPeriod parameter. The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Web Services Region. To view the time blocks available, see Backup window in the Amazon Aurora User Guide. Constraints: Must be in the format hh24:mi-hh24:mi. Must be in Universal Coordinated Time (UTC). Must not conflict with the preferred maintenance window. Must be at least 30 minutes."
        PreferredMaintenanceWindow:
          $ref: "#/components/schemas/String"
          description: "The weekly time range during which system maintenance can occur, in Universal Coordinated Time (UTC). Format: ddd:hh24:mi-ddd:hh24:mi The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Web Services Region, occurring on a random day of the week. To see the time blocks available, see Adjusting the Preferred Maintenance Window in the Amazon Aurora User Guide. Valid Days: Mon, Tue, Wed, Thu, Fri, Sat, Sun. Constraints: Minimum 30-minute window."
        Tags:
          $ref: "#/components/schemas/TagList"
        StorageEncrypted:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether the restored DB cluster is encrypted.
        KmsKeyId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services KMS key identifier for an encrypted DB cluster. The Amazon Web Services KMS key identifier is the key ARN, key ID, alias ARN, or alias name for the KMS key. To use a KMS key in a different Amazon Web Services account, specify the key ARN or alias ARN. If the StorageEncrypted parameter is enabled, and you do not specify a value for the KmsKeyId parameter, then Amazon RDS will use your default KMS key. There is a default KMS key for your Amazon Web Services account. Your Amazon Web Services account has a different default KMS key for each Amazon Web Services Region.
        EnableIAMDatabaseAuthentication:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to enable mapping of Amazon Web Services Identity and Access Management (IAM) accounts to database accounts. By default, mapping isn't enabled. For more information, see IAM Database Authentication in the Amazon Aurora User Guide.
        SourceEngine:
          $ref: "#/components/schemas/String"
          description: "The identifier for the database engine that was backed up to create the files stored in the Amazon S3 bucket. Valid Values: mysql"
        SourceEngineVersion:
          $ref: "#/components/schemas/String"
          description: "The version of the database that the backup files were created from. MySQL versions 5.7 and 8.0 are supported. Example: 5.7.40, 8.0.28"
        S3BucketName:
          $ref: "#/components/schemas/String"
          description: The name of the Amazon S3 bucket that contains the data used to create the Amazon Aurora DB cluster.
        S3Prefix:
          $ref: "#/components/schemas/String"
          description: The prefix for all of the file names that contain the data used to create the Amazon Aurora DB cluster. If you do not specify a SourceS3Prefix value, then the Amazon Aurora DB cluster is created by using all of the files in the Amazon S3 bucket.
        S3IngestionRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Amazon Web Services Identity and Access Management (IAM) role that authorizes Amazon RDS to access the Amazon S3 bucket on your behalf.
        BacktrackWindow:
          $ref: "#/components/schemas/LongOptional"
          description: "The target backtrack window, in seconds. To disable backtracking, set this value to 0. Currently, Backtrack is only supported for Aurora MySQL DB clusters. Default: 0 Constraints: If specified, this value must be set to a number from 0 to 259,200 (72 hours)."
        EnableCloudwatchLogsExports:
          $ref: "#/components/schemas/LogTypeList"
          description: The list of logs that the restored DB cluster is to export to CloudWatch Logs. The values in the list depend on the DB engine being used. Aurora MySQL Possible values are audit, error, general, instance, slowquery, and iam-db-auth-error. Aurora PostgreSQL Possible value are instance, postgresql, and iam-db-auth-error. For more information about exporting CloudWatch Logs for Amazon RDS, see Publishing Database Logs to Amazon CloudWatch Logs in the Amazon RDS User Guide. For more information about exporting CloudWatch Logs for Amazon Aurora, see Publishing Database Logs to Amazon CloudWatch Logs in the Amazon Aurora User Guide.
        DeletionProtection:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to enable deletion protection for the DB cluster. The database can't be deleted when deletion protection is enabled. By default, deletion protection isn't enabled.
        CopyTagsToSnapshot:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to copy all tags from the restored DB cluster to snapshots of the restored DB cluster. The default is not to copy them.
        Domain:
          $ref: "#/components/schemas/String"
          description: Specify the Active Directory directory ID to restore the DB cluster in. The domain must be created prior to this operation. For Amazon Aurora DB clusters, Amazon RDS can use Kerberos Authentication to authenticate users that connect to the DB cluster. For more information, see Kerberos Authentication in the Amazon Aurora User Guide.
        DomainIAMRoleName:
          $ref: "#/components/schemas/String"
          description: Specify the name of the IAM role to be used when making API calls to the Directory Service.
        StorageType:
          $ref: "#/components/schemas/String"
          description: "Specifies the storage type to be associated with the DB cluster. Valid Values: aurora, aurora-iopt1 Default: aurora Valid for: Aurora DB clusters only"
        NetworkType:
          $ref: "#/components/schemas/String"
          description: "The network type of the DB cluster. Valid Values: IPV4 DUAL The network type is determined by the DBSubnetGroup specified for the DB cluster. A DBSubnetGroup can support only the IPv4 protocol or the IPv4 and the IPv6 protocols (DUAL). For more information, see Working with a DB instance in a VPC in the Amazon Aurora User Guide."
        ServerlessV2ScalingConfiguration:
          $ref: "#/components/schemas/ServerlessV2ScalingConfiguration"
        ManageMasterUserPassword:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to manage the master user password with Amazon Web Services Secrets Manager. For more information, see Password management with Amazon Web Services Secrets Manager in the Amazon RDS User Guide and Password management with Amazon Web Services Secrets Manager in the Amazon Aurora User Guide. Constraints: Can't manage the master user password with Amazon Web Services Secrets Manager if MasterUserPassword is specified."
        MasterUserSecretKmsKeyId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services KMS key identifier to encrypt a secret that is automatically generated and managed in Amazon Web Services Secrets Manager. This setting is valid only if the master user password is managed by RDS in Amazon Web Services Secrets Manager for the DB cluster. The Amazon Web Services KMS key identifier is the key ARN, key ID, alias ARN, or alias name for the KMS key. To use a KMS key in a different Amazon Web Services account, specify the key ARN or alias ARN. If you don't specify MasterUserSecretKmsKeyId, then the aws/secretsmanager KMS key is used to encrypt the secret. If the secret is in a different Amazon Web Services account, then you can't use the aws/secretsmanager KMS key to encrypt the secret, and you must use a customer managed KMS key. There is a default KMS key for your Amazon Web Services account. Your Amazon Web Services account has a different default KMS key for each Amazon Web Services Region.
        EngineLifecycleSupport:
          $ref: "#/components/schemas/String"
          description: "The life cycle type for this DB cluster. By default, this value is set to open-source-rds-extended-support, which enrolls your DB cluster into Amazon RDS Extended Support. At the end of standard support, you can avoid charges for Extended Support by setting the value to open-source-rds-extended-support-disabled. In this case, RDS automatically upgrades your restored DB cluster to a higher engine version, if the major engine version is past its end of standard support date. You can use this setting to enroll your DB cluster into Amazon RDS Extended Support. With RDS Extended Support, you can run the selected major engine version on your DB cluster past the end of standard support for that engine version. For more information, see the following sections: Amazon Aurora - Amazon RDS Extended Support with Amazon Aurora in the Amazon Aurora User Guide Amazon RDS - Amazon RDS Extended Support with Amazon RDS in the Amazon RDS User Guide Valid for Cluster Type: Aurora DB clusters and Multi-AZ DB clusters Valid Values: open-source-rds-extended-support | open-source-rds-extended-support-disabled Default: open-source-rds-extended-support"
        TagSpecifications:
          $ref: "#/components/schemas/TagSpecificationList"
          description: "Tags to assign to resources associated with the DB cluster. Valid Values: cluster-auto-backup - The DB cluster's automated backup."
      required:
        - DBClusterIdentifier
        - Engine
        - MasterUsername
        - SourceEngine
        - SourceEngineVersion
        - S3BucketName
        - S3IngestionRoleArn
    RestoreDBClusterFromSnapshotOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterDisplay"
    RestoreDBClusterFromSnapshotMessage:
      type: object
      properties:
        AvailabilityZones:
          $ref: "#/components/schemas/AvailabilityZones"
          description: "Provides the list of Availability Zones (AZs) where instances in the restored DB cluster can be created. Valid for: Aurora DB clusters only"
        DBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "The name of the DB cluster to create from the DB snapshot or DB cluster snapshot. This parameter isn't case-sensitive. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens First character must be a letter Can't end with a hyphen or contain two consecutive hyphens Example: my-snapshot-id Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        SnapshotIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier for the DB snapshot or DB cluster snapshot to restore from. You can use either the name or the Amazon Resource Name (ARN) to specify a DB cluster snapshot. However, you can use only the ARN to specify a DB snapshot. Constraints: Must match the identifier of an existing Snapshot. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        Engine:
          $ref: "#/components/schemas/String"
          description: "The database engine to use for the new DB cluster. Default: The same as source Constraint: Must be compatible with the engine of the source Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        EngineVersion:
          $ref: "#/components/schemas/String"
          description: "The version of the database engine to use for the new DB cluster. If you don't specify an engine version, the default version for the database engine in the Amazon Web Services Region is used. To list all of the available engine versions for Aurora MySQL, use the following command: aws rds describe-db-engine-versions --engine aurora-mysql --query \"DBEngineVersions[].EngineVersion\" To list all of the available engine versions for Aurora PostgreSQL, use the following command: aws rds describe-db-engine-versions --engine aurora-postgresql --query \"DBEngineVersions[].EngineVersion\" To list all of the available engine versions for RDS for MySQL, use the following command: aws rds describe-db-engine-versions --engine mysql --query \"DBEngineVersions[].EngineVersion\" To list all of the available engine versions for RDS for PostgreSQL, use the following command: aws rds describe-db-engine-versions --engine postgres --query \"DBEngineVersions[].EngineVersion\" Aurora MySQL See Database engine updates for Amazon Aurora MySQL in the Amazon Aurora User Guide. Aurora PostgreSQL See Amazon Aurora PostgreSQL releases and engine versions in the Amazon Aurora User Guide. MySQL See Amazon RDS for MySQL in the Amazon RDS User Guide. PostgreSQL See Amazon RDS for PostgreSQL versions and extensions in the Amazon RDS User Guide. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        Port:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The port number on which the new DB cluster accepts connections. Constraints: This value must be 1150-65535 Default: The same port as the original DB cluster. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        DBSubnetGroupName:
          $ref: "#/components/schemas/String"
          description: "The name of the DB subnet group to use for the new DB cluster. Constraints: If supplied, must match the name of an existing DB subnet group. Example: mydbsubnetgroup Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        DatabaseName:
          $ref: "#/components/schemas/String"
          description: "The database name for the restored DB cluster. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        OptionGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the option group to use for the restored DB cluster. DB clusters are associated with a default option group that can't be modified.
        VpcSecurityGroupIds:
          $ref: "#/components/schemas/VpcSecurityGroupIdList"
          description: "A list of VPC security groups that the new DB cluster will belong to. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        Tags:
          $ref: "#/components/schemas/TagList"
          description: "The tags to be assigned to the restored DB cluster. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        KmsKeyId:
          $ref: "#/components/schemas/String"
          description: "The Amazon Web Services KMS key identifier to use when restoring an encrypted DB cluster from a DB snapshot or DB cluster snapshot. The Amazon Web Services KMS key identifier is the key ARN, key ID, alias ARN, or alias name for the KMS key. To use a KMS key in a different Amazon Web Services account, specify the key ARN or alias ARN. When you don't specify a value for the KmsKeyId parameter, then the following occurs: If the DB snapshot or DB cluster snapshot in SnapshotIdentifier is encrypted, then the restored DB cluster is encrypted using the KMS key that was used to encrypt the DB snapshot or DB cluster snapshot. If the DB snapshot or DB cluster snapshot in SnapshotIdentifier isn't encrypted, then the restored DB cluster isn't encrypted. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        EnableIAMDatabaseAuthentication:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to enable mapping of Amazon Web Services Identity and Access Management (IAM) accounts to database accounts. By default, mapping isn't enabled. For more information, see IAM Database Authentication in the Amazon Aurora User Guide or IAM database authentication for MariaDB, MySQL, and PostgreSQL in the Amazon RDS User Guide. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        BacktrackWindow:
          $ref: "#/components/schemas/LongOptional"
          description: "The target backtrack window, in seconds. To disable backtracking, set this value to 0. Currently, Backtrack is only supported for Aurora MySQL DB clusters. Default: 0 Constraints: If specified, this value must be set to a number from 0 to 259,200 (72 hours). Valid for: Aurora DB clusters only"
        EnableCloudwatchLogsExports:
          $ref: "#/components/schemas/LogTypeList"
          description: "The list of logs that the restored DB cluster is to export to Amazon CloudWatch Logs. The values in the list depend on the DB engine being used. RDS for MySQL Possible values are error, general, slowquery, and iam-db-auth-error. RDS for PostgreSQL Possible values are postgresql, upgrade, and iam-db-auth-error. Aurora MySQL Possible values are audit, error, general, instance, slowquery, and iam-db-auth-error. Aurora PostgreSQL Possible value are instance, postgresql, and iam-db-auth-error. For more information about exporting CloudWatch Logs for Amazon RDS, see Publishing Database Logs to Amazon CloudWatch Logs in the Amazon RDS User Guide. For more information about exporting CloudWatch Logs for Amazon Aurora, see Publishing Database Logs to Amazon CloudWatch Logs in the Amazon Aurora User Guide. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        EngineMode:
          $ref: "#/components/schemas/String"
          description: "The DB engine mode of the DB cluster, either provisioned or serverless. For more information, see CreateDBCluster. Valid for: Aurora DB clusters only"
        ScalingConfiguration:
          $ref: "#/components/schemas/ScalingConfiguration"
          description: "For DB clusters in serverless DB engine mode, the scaling properties of the DB cluster. Valid for: Aurora DB clusters only"
        DBClusterParameterGroupName:
          $ref: "#/components/schemas/String"
          description: "The name of the DB cluster parameter group to associate with this DB cluster. If this argument is omitted, the default DB cluster parameter group for the specified engine is used. Constraints: If supplied, must match the name of an existing default DB cluster parameter group. Must be 1 to 255 letters, numbers, or hyphens. First character must be a letter. Can't end with a hyphen or contain two consecutive hyphens. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        DeletionProtection:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to enable deletion protection for the DB cluster. The database can't be deleted when deletion protection is enabled. By default, deletion protection isn't enabled. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        CopyTagsToSnapshot:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to copy all tags from the restored DB cluster to snapshots of the restored DB cluster. The default is not to copy them. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        Domain:
          $ref: "#/components/schemas/String"
          description: "The Active Directory directory ID to restore the DB cluster in. The domain must be created prior to this operation. Currently, only MySQL, Microsoft SQL Server, Oracle, and PostgreSQL DB instances can be created in an Active Directory Domain. For more information, see Kerberos Authentication in the Amazon RDS User Guide. Valid for: Aurora DB clusters only"
        DomainIAMRoleName:
          $ref: "#/components/schemas/String"
          description: "The name of the IAM role to be used when making API calls to the Directory Service. Valid for: Aurora DB clusters only"
        DBClusterInstanceClass:
          $ref: "#/components/schemas/String"
          description: "The compute and memory capacity of the each DB instance in the Multi-AZ DB cluster, for example db.m6gd.xlarge. Not all DB instance classes are available in all Amazon Web Services Regions, or for all database engines. For the full list of DB instance classes, and availability for your engine, see DB Instance Class in the Amazon RDS User Guide. Valid for: Multi-AZ DB clusters only"
        StorageType:
          $ref: "#/components/schemas/String"
          description: "Specifies the storage type to be associated with the DB cluster. When specified for a Multi-AZ DB cluster, a value for the Iops parameter is required. Valid Values: aurora, aurora-iopt1 (Aurora DB clusters); io1 (Multi-AZ DB clusters) Default: aurora (Aurora DB clusters); io1 (Multi-AZ DB clusters) Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        Iops:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The amount of Provisioned IOPS (input/output operations per second) to be initially allocated for each DB instance in the Multi-AZ DB cluster. For information about valid IOPS values, see Amazon RDS Provisioned IOPS storage in the Amazon RDS User Guide. Constraints: Must be a multiple between .5 and 50 of the storage amount for the DB instance. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        PubliclyAccessible:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether the DB cluster is publicly accessible. When the DB cluster is publicly accessible, its Domain Name System (DNS) endpoint resolves to the private IP address from within the DB cluster's virtual private cloud (VPC). It resolves to the public IP address from outside of the DB cluster's VPC. Access to the DB cluster is ultimately controlled by the security group it uses. That public access is not permitted if the security group assigned to the DB cluster doesn't permit it. When the DB cluster isn't publicly accessible, it is an internal DB cluster with a DNS name that resolves to a private IP address. Default: The default behavior varies depending on whether DBSubnetGroupName is specified. If DBSubnetGroupName isn't specified, and PubliclyAccessible isn't specified, the following applies: If the default VPC in the target Region doesn’t have an internet gateway attached to it, the DB cluster is private. If the default VPC in the target Region has an internet gateway attached to it, the DB cluster is public. If DBSubnetGroupName is specified, and PubliclyAccessible isn't specified, the following applies: If the subnets are part of a VPC that doesn’t have an internet gateway attached to it, the DB cluster is private. If the subnets are part of a VPC that has an internet gateway attached to it, the DB cluster is public. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        NetworkType:
          $ref: "#/components/schemas/String"
          description: "The network type of the DB cluster. Valid Values: IPV4 DUAL The network type is determined by the DBSubnetGroup specified for the DB cluster. A DBSubnetGroup can support only the IPv4 protocol or the IPv4 and the IPv6 protocols (DUAL). For more information, see Working with a DB instance in a VPC in the Amazon Aurora User Guide. Valid for: Aurora DB clusters only"
        ServerlessV2ScalingConfiguration:
          $ref: "#/components/schemas/ServerlessV2ScalingConfiguration"
        RdsCustomClusterConfiguration:
          $ref: "#/components/schemas/RdsCustomClusterConfiguration"
          description: Reserved for future use.
        MonitoringInterval:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The interval, in seconds, between points when Enhanced Monitoring metrics are collected for the DB cluster. To turn off collecting Enhanced Monitoring metrics, specify 0. If MonitoringRoleArn is specified, also set MonitoringInterval to a value other than 0. Valid Values: 0 | 1 | 5 | 10 | 15 | 30 | 60 Default: 0"
        MonitoringRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) for the IAM role that permits RDS to send Enhanced Monitoring metrics to Amazon CloudWatch Logs. An example is arn:aws:iam:123456789012:role/emaccess. If MonitoringInterval is set to a value other than 0, supply a MonitoringRoleArn value.
        EnablePerformanceInsights:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to turn on Performance Insights for the DB cluster.
        PerformanceInsightsKMSKeyId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services KMS key identifier for encryption of Performance Insights data. The Amazon Web Services KMS key identifier is the key ARN, key ID, alias ARN, or alias name for the KMS key. If you don't specify a value for PerformanceInsightsKMSKeyId, then Amazon RDS uses your default KMS key. There is a default KMS key for your Amazon Web Services account. Your Amazon Web Services account has a different default KMS key for each Amazon Web Services Region.
        PerformanceInsightsRetentionPeriod:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The number of days to retain Performance Insights data. Valid Values: 7 month * 31, where month is a number of months from 1-23. Examples: 93 (3 months * 31), 341 (11 months * 31), 589 (19 months * 31) 731 Default: 7 days If you specify a retention period that isn't valid, such as 94, Amazon RDS issues an error."
        BackupRetentionPeriod:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The number of days for which automated backups are retained. Specify a minimum value of 1. Valid for Cluster Type: Aurora DB clusters and Multi-AZ DB clusters Default: Uses existing setting Constraints: Must be a value from 1 to 35."
        PreferredBackupWindow:
          $ref: "#/components/schemas/String"
          description: "The daily time range during which automated backups are created if automated backups are enabled, using the BackupRetentionPeriod parameter. The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Web Services Region. To view the time blocks available, see Backup window in the Amazon Aurora User Guide. Valid for Cluster Type: Aurora DB clusters and Multi-AZ DB clusters Constraints: Must be in the format hh24:mi-hh24:mi. Must be in Universal Coordinated Time (UTC). Must not conflict with the preferred maintenance window. Must be at least 30 minutes."
        EngineLifecycleSupport:
          $ref: "#/components/schemas/String"
          description: "The life cycle type for this DB cluster. By default, this value is set to open-source-rds-extended-support, which enrolls your DB cluster into Amazon RDS Extended Support. At the end of standard support, you can avoid charges for Extended Support by setting the value to open-source-rds-extended-support-disabled. In this case, RDS automatically upgrades your restored DB cluster to a higher engine version, if the major engine version is past its end of standard support date. You can use this setting to enroll your DB cluster into Amazon RDS Extended Support. With RDS Extended Support, you can run the selected major engine version on your DB cluster past the end of standard support for that engine version. For more information, see the following sections: Amazon Aurora - Amazon RDS Extended Support with Amazon Aurora in the Amazon Aurora User Guide Amazon RDS - Amazon RDS Extended Support with Amazon RDS in the Amazon RDS User Guide Valid for Cluster Type: Aurora DB clusters and Multi-AZ DB clusters Valid Values: open-source-rds-extended-support | open-source-rds-extended-support-disabled Default: open-source-rds-extended-support"
        TagSpecifications:
          $ref: "#/components/schemas/TagSpecificationList"
          description: "Tags to assign to resources associated with the DB cluster. Valid Values: cluster-auto-backup - The DB cluster's automated backup."
        EnableVPCNetworking:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to enable VPC networking for the restored DB cluster. Set this parameter to false to create a cluster without the VPC network interface (ENI). This parameter must be used together with EnableInternetAccessGateway. When both parameters are specified, IAM database authentication is required. You must also specify EnableIAMDatabaseAuthentication. Valid for Cluster Type: Aurora PostgreSQL clusters"
        EnableInternetAccessGateway:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies that the restored DB cluster should use internet-based connectivity through an internet access gateway. This allows clients to connect to the cluster over the internet without requiring a VPC. This parameter must be used together with EnableVPCNetworking set to false. When both parameters are specified, IAM database authentication is required. You must also specify EnableIAMDatabaseAuthentication. Valid for Cluster Type: Aurora PostgreSQL clusters"
      required:
        - DBClusterIdentifier
        - SnapshotIdentifier
        - Engine
    RestoreDBClusterToPointInTimeOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterDisplay"
    RestoreDBClusterToPointInTimeMessage:
      type: object
      properties:
        DBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "The name of the new DB cluster to be created. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens First character must be a letter Can't end with a hyphen or contain two consecutive hyphens Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        RestoreType:
          $ref: "#/components/schemas/String"
          description: "The type of restore to be performed. You can specify one of the following values: full-copy - The new DB cluster is restored as a full copy of the source DB cluster. copy-on-write - The new DB cluster is restored as a clone of the source DB cluster. If you don't specify a RestoreType value, then the new DB cluster is restored as a full copy of the source DB cluster. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        SourceDBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier of the source DB cluster from which to restore. Constraints: Must match the identifier of an existing DBCluster. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        RestoreToTime:
          $ref: "#/components/schemas/TStamp"
          description: "The date and time to restore the DB cluster to. Valid Values: Value must be a time in Universal Coordinated Time (UTC) format Constraints: Must be before the latest restorable time for the DB instance Must be specified if UseLatestRestorableTime parameter isn't provided Can't be specified if the UseLatestRestorableTime parameter is enabled Can't be specified if the RestoreType parameter is copy-on-write Example: 2015-03-07T23:45:00Z Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        UseLatestRestorableTime:
          $ref: "#/components/schemas/Boolean"
          description: "Specifies whether to restore the DB cluster to the latest restorable backup time. By default, the DB cluster isn't restored to the latest restorable backup time. Constraints: Can't be specified if RestoreToTime parameter is provided. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        Port:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The port number on which the new DB cluster accepts connections. Constraints: A value from 1150-65535. Default: The default port for the engine. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        DBSubnetGroupName:
          $ref: "#/components/schemas/String"
          description: "The DB subnet group name to use for the new DB cluster. Constraints: If supplied, must match the name of an existing DBSubnetGroup. Example: mydbsubnetgroup Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        OptionGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the option group for the new DB cluster. DB clusters are associated with a default option group that can't be modified.
        VpcSecurityGroupIds:
          $ref: "#/components/schemas/VpcSecurityGroupIdList"
          description: "A list of VPC security groups that the new DB cluster belongs to. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        Tags:
          $ref: "#/components/schemas/TagList"
        KmsKeyId:
          $ref: "#/components/schemas/String"
          description: "The Amazon Web Services KMS key identifier to use when restoring an encrypted DB cluster from an encrypted DB cluster. The Amazon Web Services KMS key identifier is the key ARN, key ID, alias ARN, or alias name for the KMS key. To use a KMS key in a different Amazon Web Services account, specify the key ARN or alias ARN. You can restore to a new DB cluster and encrypt the new DB cluster with a KMS key that is different from the KMS key used to encrypt the source DB cluster. The new DB cluster is encrypted with the KMS key identified by the KmsKeyId parameter. If you don't specify a value for the KmsKeyId parameter, then the following occurs: If the DB cluster is encrypted, then the restored DB cluster is encrypted using the KMS key that was used to encrypt the source DB cluster. If the DB cluster isn't encrypted, then the restored DB cluster isn't encrypted. If DBClusterIdentifier refers to a DB cluster that isn't encrypted, then the restore request is rejected. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        EnableIAMDatabaseAuthentication:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to enable mapping of Amazon Web Services Identity and Access Management (IAM) accounts to database accounts. By default, mapping isn't enabled. For more information, see IAM Database Authentication in the Amazon Aurora User Guide or IAM database authentication for MariaDB, MySQL, and PostgreSQL in the Amazon RDS User Guide. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        BacktrackWindow:
          $ref: "#/components/schemas/LongOptional"
          description: "The target backtrack window, in seconds. To disable backtracking, set this value to 0. Default: 0 Constraints: If specified, this value must be set to a number from 0 to 259,200 (72 hours). Valid for: Aurora MySQL DB clusters only"
        EnableCloudwatchLogsExports:
          $ref: "#/components/schemas/LogTypeList"
          description: "The list of logs that the restored DB cluster is to export to CloudWatch Logs. The values in the list depend on the DB engine being used. RDS for MySQL Possible values are error, general, slowquery, and iam-db-auth-error. RDS for PostgreSQL Possible values are postgresql, upgrade, and iam-db-auth-error. Aurora MySQL Possible values are audit, error, general, instance, slowquery, and iam-db-auth-error. Aurora PostgreSQL Possible value are instance, postgresql, and iam-db-auth-error. For more information about exporting CloudWatch Logs for Amazon RDS, see Publishing Database Logs to Amazon CloudWatch Logs in the Amazon RDS User Guide. For more information about exporting CloudWatch Logs for Amazon Aurora, see Publishing Database Logs to Amazon CloudWatch Logs in the Amazon Aurora User Guide. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        DBClusterParameterGroupName:
          $ref: "#/components/schemas/String"
          description: "The name of the custom DB cluster parameter group to associate with this DB cluster. If the DBClusterParameterGroupName parameter is omitted, the default DB cluster parameter group for the specified engine is used. Constraints: If supplied, must match the name of an existing DB cluster parameter group. Must be 1 to 255 letters, numbers, or hyphens. First character must be a letter. Can't end with a hyphen or contain two consecutive hyphens. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        DeletionProtection:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to enable deletion protection for the DB cluster. The database can't be deleted when deletion protection is enabled. By default, deletion protection isn't enabled. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        CopyTagsToSnapshot:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to copy all tags from the restored DB cluster to snapshots of the restored DB cluster. The default is not to copy them. Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        Domain:
          $ref: "#/components/schemas/String"
          description: "The Active Directory directory ID to restore the DB cluster in. The domain must be created prior to this operation. For Amazon Aurora DB clusters, Amazon RDS can use Kerberos Authentication to authenticate users that connect to the DB cluster. For more information, see Kerberos Authentication in the Amazon Aurora User Guide. Valid for: Aurora DB clusters only"
        DomainIAMRoleName:
          $ref: "#/components/schemas/String"
          description: "The name of the IAM role to be used when making API calls to the Directory Service. Valid for: Aurora DB clusters only"
        DBClusterInstanceClass:
          $ref: "#/components/schemas/String"
          description: "The compute and memory capacity of the each DB instance in the Multi-AZ DB cluster, for example db.m6gd.xlarge. Not all DB instance classes are available in all Amazon Web Services Regions, or for all database engines. For the full list of DB instance classes, and availability for your engine, see DB instance class in the Amazon RDS User Guide. Valid for: Multi-AZ DB clusters only"
        StorageType:
          $ref: "#/components/schemas/String"
          description: "Specifies the storage type to be associated with the DB cluster. When specified for a Multi-AZ DB cluster, a value for the Iops parameter is required. Valid Values: aurora, aurora-iopt1 (Aurora DB clusters); io1 (Multi-AZ DB clusters) Default: aurora (Aurora DB clusters); io1 (Multi-AZ DB clusters) Valid for: Aurora DB clusters and Multi-AZ DB clusters"
        PubliclyAccessible:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether the DB cluster is publicly accessible. When the DB cluster is publicly accessible, its Domain Name System (DNS) endpoint resolves to the private IP address from within the DB cluster's virtual private cloud (VPC). It resolves to the public IP address from outside of the DB cluster's VPC. Access to the DB cluster is ultimately controlled by the security group it uses. That public access is not permitted if the security group assigned to the DB cluster doesn't permit it. When the DB cluster isn't publicly accessible, it is an internal DB cluster with a DNS name that resolves to a private IP address. Default: The default behavior varies depending on whether DBSubnetGroupName is specified. If DBSubnetGroupName isn't specified, and PubliclyAccessible isn't specified, the following applies: If the default VPC in the target Region doesn’t have an internet gateway attached to it, the DB cluster is private. If the default VPC in the target Region has an internet gateway attached to it, the DB cluster is public. If DBSubnetGroupName is specified, and PubliclyAccessible isn't specified, the following applies: If the subnets are part of a VPC that doesn’t have an internet gateway attached to it, the DB cluster is private. If the subnets are part of a VPC that has an internet gateway attached to it, the DB cluster is public. Valid for: Multi-AZ DB clusters only"
        Iops:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The amount of Provisioned IOPS (input/output operations per second) to be initially allocated for each DB instance in the Multi-AZ DB cluster. For information about valid IOPS values, see Amazon RDS Provisioned IOPS storage in the Amazon RDS User Guide. Constraints: Must be a multiple between .5 and 50 of the storage amount for the DB instance. Valid for: Multi-AZ DB clusters only"
        NetworkType:
          $ref: "#/components/schemas/String"
          description: "The network type of the DB cluster. Valid Values: IPV4 DUAL The network type is determined by the DBSubnetGroup specified for the DB cluster. A DBSubnetGroup can support only the IPv4 protocol or the IPv4 and the IPv6 protocols (DUAL). For more information, see Working with a DB instance in a VPC in the Amazon Aurora User Guide. Valid for: Aurora DB clusters only"
        SourceDbClusterResourceId:
          $ref: "#/components/schemas/String"
          description: The resource ID of the source DB cluster from which to restore.
        ServerlessV2ScalingConfiguration:
          $ref: "#/components/schemas/ServerlessV2ScalingConfiguration"
        ScalingConfiguration:
          $ref: "#/components/schemas/ScalingConfiguration"
          description: "For DB clusters in serverless DB engine mode, the scaling properties of the DB cluster. Valid for: Aurora DB clusters only"
        EngineMode:
          $ref: "#/components/schemas/String"
          description: "The engine mode of the new cluster. Specify provisioned or serverless, depending on the type of the cluster you are creating. You can create an Aurora Serverless v1 clone from a provisioned cluster, or a provisioned clone from an Aurora Serverless v1 cluster. To create a clone that is an Aurora Serverless v1 cluster, the original cluster must be an Aurora Serverless v1 cluster or an encrypted provisioned cluster. To create a full copy that is an Aurora Serverless v1 cluster, specify the engine mode serverless. Valid for: Aurora DB clusters only"
        RdsCustomClusterConfiguration:
          $ref: "#/components/schemas/RdsCustomClusterConfiguration"
          description: Reserved for future use.
        MonitoringInterval:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The interval, in seconds, between points when Enhanced Monitoring metrics are collected for the DB cluster. To turn off collecting Enhanced Monitoring metrics, specify 0. If MonitoringRoleArn is specified, also set MonitoringInterval to a value other than 0. Valid Values: 0 | 1 | 5 | 10 | 15 | 30 | 60 Default: 0"
        MonitoringRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) for the IAM role that permits RDS to send Enhanced Monitoring metrics to Amazon CloudWatch Logs. An example is arn:aws:iam:123456789012:role/emaccess. If MonitoringInterval is set to a value other than 0, supply a MonitoringRoleArn value.
        EnablePerformanceInsights:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to turn on Performance Insights for the DB cluster.
        PerformanceInsightsKMSKeyId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services KMS key identifier for encryption of Performance Insights data. The Amazon Web Services KMS key identifier is the key ARN, key ID, alias ARN, or alias name for the KMS key. If you don't specify a value for PerformanceInsightsKMSKeyId, then Amazon RDS uses your default KMS key. There is a default KMS key for your Amazon Web Services account. Your Amazon Web Services account has a different default KMS key for each Amazon Web Services Region.
        PerformanceInsightsRetentionPeriod:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The number of days to retain Performance Insights data. Valid Values: 7 month * 31, where month is a number of months from 1-23. Examples: 93 (3 months * 31), 341 (11 months * 31), 589 (19 months * 31) 731 Default: 7 days If you specify a retention period that isn't valid, such as 94, Amazon RDS issues an error."
        BackupRetentionPeriod:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The number of days for which automated backups are retained. Specify a minimum value of 1. Valid for Cluster Type: Aurora DB clusters and Multi-AZ DB clusters Default: Uses existing setting Constraints: Must be a value from 1 to 35."
        PreferredBackupWindow:
          $ref: "#/components/schemas/String"
          description: "The daily time range during which automated backups are created if automated backups are enabled, using the BackupRetentionPeriod parameter. The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Web Services Region. To view the time blocks available, see Backup window in the Amazon Aurora User Guide. Valid for Cluster Type: Aurora DB clusters and Multi-AZ DB clusters Constraints: Must be in the format hh24:mi-hh24:mi. Must be in Universal Coordinated Time (UTC). Must not conflict with the preferred maintenance window. Must be at least 30 minutes."
        EngineLifecycleSupport:
          $ref: "#/components/schemas/String"
          description: "The life cycle type for this DB cluster. By default, this value is set to open-source-rds-extended-support, which enrolls your DB cluster into Amazon RDS Extended Support. At the end of standard support, you can avoid charges for Extended Support by setting the value to open-source-rds-extended-support-disabled. In this case, RDS automatically upgrades your restored DB cluster to a higher engine version, if the major engine version is past its end of standard support date. You can use this setting to enroll your DB cluster into Amazon RDS Extended Support. With RDS Extended Support, you can run the selected major engine version on your DB cluster past the end of standard support for that engine version. For more information, see the following sections: Amazon Aurora - Amazon RDS Extended Support with Amazon Aurora in the Amazon Aurora User Guide Amazon RDS - Amazon RDS Extended Support with Amazon RDS in the Amazon RDS User Guide Valid for Cluster Type: Aurora DB clusters and Multi-AZ DB clusters Valid Values: open-source-rds-extended-support | open-source-rds-extended-support-disabled Default: open-source-rds-extended-support"
        TagSpecifications:
          $ref: "#/components/schemas/TagSpecificationList"
          description: "Tags to assign to resources associated with the DB cluster. Valid Values: cluster-auto-backup - The DB cluster's automated backup."
        EnableVPCNetworking:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to enable VPC networking for the restored DB cluster. Set this parameter to false to create a cluster without the VPC network interface (ENI). This parameter must be used together with EnableInternetAccessGateway. When both parameters are specified, IAM database authentication is required. You must also specify EnableIAMDatabaseAuthentication. Valid for Cluster Type: Aurora PostgreSQL clusters"
        EnableInternetAccessGateway:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies that the restored DB cluster should use internet-based connectivity through an internet access gateway. This allows clients to connect to the cluster over the internet without requiring a VPC. This parameter must be used together with EnableVPCNetworking set to false. When both parameters are specified, IAM database authentication is required. You must also specify EnableIAMDatabaseAuthentication. Valid for Cluster Type: Aurora PostgreSQL clusters"
      required:
        - DBClusterIdentifier
    RestoreDBInstanceFromDBSnapshotOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBInstanceDisplay"
    RestoreDBInstanceFromDBSnapshotMessage:
      type: object
      properties:
        DBInstanceIdentifier:
          $ref: "#/components/schemas/String"
          description: "The name of the DB instance to create from the DB snapshot. This parameter isn't case-sensitive. Constraints: Must contain from 1 to 63 numbers, letters, or hyphens. First character must be a letter. Can't end with a hyphen or contain two consecutive hyphens. Example: my-snapshot-id"
        DBSnapshotIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier for the DB snapshot to restore from. Constraints: Must match the identifier of an existing DB snapshot. Can't be specified when DBClusterSnapshotIdentifier is specified. Must be specified when DBClusterSnapshotIdentifier isn't specified. If you are restoring from a shared manual DB snapshot, the DBSnapshotIdentifier must be the ARN of the shared DB snapshot."
        DBInstanceClass:
          $ref: "#/components/schemas/String"
          description: "The compute and memory capacity of the Amazon RDS DB instance, for example db.m4.large. Not all DB instance classes are available in all Amazon Web Services Regions, or for all database engines. For the full list of DB instance classes, and availability for your engine, see DB Instance Class in the Amazon RDS User Guide. Default: The same DBInstanceClass as the original DB instance."
        Port:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The port number on which the database accepts connections. Default: The same port as the original DB instance Constraints: Value must be 1150-65535"
        AvailabilityZone:
          $ref: "#/components/schemas/String"
          description: "The Availability Zone (AZ) where the DB instance will be created. Default: A random, system-chosen Availability Zone. Constraint: You can't specify the AvailabilityZone parameter if the DB instance is a Multi-AZ deployment. Example: us-east-1a"
        DBSubnetGroupName:
          $ref: "#/components/schemas/String"
          description: "The name of the DB subnet group to use for the new instance. Constraints: If supplied, must match the name of an existing DB subnet group. Example: mydbsubnetgroup"
        MultiAZ:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether the DB instance is a Multi-AZ deployment. This setting doesn't apply to RDS Custom. Constraint: You can't specify the AvailabilityZone parameter if the DB instance is a Multi-AZ deployment."
        PubliclyAccessible:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether the DB instance is publicly accessible. When the DB instance is publicly accessible, its Domain Name System (DNS) endpoint resolves to the private IP address from within the DB instance's virtual private cloud (VPC). It resolves to the public IP address from outside of the DB instance's VPC. Access to the DB instance is ultimately controlled by the security group it uses. That public access is not permitted if the security group assigned to the DB instance doesn't permit it. When the DB instance isn't publicly accessible, it is an internal DB instance with a DNS name that resolves to a private IP address. For more information, see CreateDBInstance.
        AutoMinorVersionUpgrade:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to automatically apply minor version upgrades to the DB instance during the maintenance window. If you restore an RDS Custom DB instance, you must disable this parameter. For more information about automatic minor version upgrades, see Automatically upgrading the minor engine version.
        LicenseModel:
          $ref: "#/components/schemas/String"
          description: "License model information for the restored DB instance. License models for RDS for Db2 require additional configuration. The bring your own license (BYOL) model requires a custom parameter group and an Amazon Web Services License Manager self-managed license. The Db2 license through Amazon Web Services Marketplace model requires an Amazon Web Services Marketplace subscription. For more information, see Amazon RDS for Db2 licensing options in the Amazon RDS User Guide. This setting doesn't apply to Amazon Aurora or RDS Custom DB instances. Valid Values: RDS for Db2 - bring-your-own-license | marketplace-license RDS for MariaDB - general-public-license RDS for Microsoft SQL Server - license-included RDS for MySQL - general-public-license RDS for Oracle - bring-your-own-license | license-included RDS for PostgreSQL - postgresql-license Default: Same as the source."
        DBName:
          $ref: "#/components/schemas/String"
          description: The name of the database for the restored DB instance. This parameter only applies to RDS for Oracle and RDS for SQL Server DB instances. It doesn't apply to the other engines or to RDS Custom DB instances.
        Engine:
          $ref: "#/components/schemas/String"
          description: "The database engine to use for the new instance. This setting doesn't apply to RDS Custom. Default: The same as source Constraint: Must be compatible with the engine of the source. For example, you can restore a MariaDB 10.1 DB instance from a MySQL 5.6 snapshot. Valid Values: db2-ae db2-se mariadb mysql oracle-ee oracle-ee-cdb oracle-se2 oracle-se2-cdb postgres sqlserver-ee sqlserver-se sqlserver-ex sqlserver-web"
        Iops:
          $ref: "#/components/schemas/IntegerOptional"
          description: "Specifies the amount of provisioned IOPS for the DB instance, expressed in I/O operations per second. If this parameter isn't specified, the IOPS value is taken from the backup. If this parameter is set to 0, the new instance is converted to a non-PIOPS instance. The conversion takes additional time, though your DB instance is available for connections before the conversion starts. The provisioned IOPS value must follow the requirements for your database engine. For more information, see Amazon RDS Provisioned IOPS storage in the Amazon RDS User Guide. Constraints: Must be an integer greater than 1000."
        StorageThroughput:
          $ref: "#/components/schemas/IntegerOptional"
          description: Specifies the storage throughput value for the DB instance. This setting doesn't apply to RDS Custom or Amazon Aurora.
        OptionGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the option group to be used for the restored DB instance. Permanent options, such as the TDE option for Oracle Advanced Security TDE, can't be removed from an option group, and that option group can't be removed from a DB instance after it is associated with a DB instance. This setting doesn't apply to RDS Custom.
        Tags:
          $ref: "#/components/schemas/TagList"
        StorageType:
          $ref: "#/components/schemas/String"
          description: "Specifies the storage type to be associated with the DB instance. Valid Values: gp2 | gp3 | io1 | io2 | standard If you specify io1, io2, or gp3, you must also include a value for the Iops parameter. Default: io1 if the Iops parameter is specified, otherwise gp3"
        TdeCredentialArn:
          $ref: "#/components/schemas/String"
          description: The ARN from the key store with which to associate the instance for TDE encryption. This setting doesn't apply to RDS Custom.
        TdeCredentialPassword:
          $ref: "#/components/schemas/SensitiveString"
          description: The password for the given ARN from the key store in order to access the device. This setting doesn't apply to RDS Custom.
        VpcSecurityGroupIds:
          $ref: "#/components/schemas/VpcSecurityGroupIdList"
          description: "A list of EC2 VPC security groups to associate with this DB instance. Default: The default EC2 VPC security group for the DB subnet group's VPC."
        Domain:
          $ref: "#/components/schemas/String"
          description: The Active Directory directory ID to restore the DB instance in. The domain/ must be created prior to this operation. Currently, you can create only Db2, MySQL, Microsoft SQL Server, Oracle, and PostgreSQL DB instances in an Active Directory Domain. For more information, see Kerberos Authentication in the Amazon RDS User Guide. This setting doesn't apply to RDS Custom.
        DomainFqdn:
          $ref: "#/components/schemas/String"
          description: "The fully qualified domain name (FQDN) of an Active Directory domain. Constraints: Can't be longer than 64 characters. Example: mymanagedADtest.mymanagedAD.mydomain"
        DomainOu:
          $ref: "#/components/schemas/String"
          description: "The Active Directory organizational unit for your DB instance to join. Constraints: Must be in the distinguished name format. Can't be longer than 64 characters. Example: OU=mymanagedADtestOU,DC=mymanagedADtest,DC=mymanagedAD,DC=mydomain"
        DomainAuthSecretArn:
          $ref: "#/components/schemas/String"
          description: "The ARN for the Secrets Manager secret with the credentials for the user joining the domain. Constraints: Can't be longer than 64 characters. Example: arn:aws:secretsmanager:region:account-number:secret:myselfmanagedADtestsecret-123456"
        DomainDnsIps:
          $ref: "#/components/schemas/StringList"
          description: "The IPv4 DNS IP addresses of your primary and secondary Active Directory domain controllers. Constraints: Two IP addresses must be provided. If there isn't a secondary domain controller, use the IP address of the primary domain controller for both entries in the list. Example: 123.124.125.126,234.235.236.237"
        CopyTagsToSnapshot:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to copy all tags from the restored DB instance to snapshots of the DB instance. In most cases, tags aren't copied by default. However, when you restore a DB instance from a DB snapshot, RDS checks whether you specify new tags. If yes, the new tags are added to the restored DB instance. If there are no new tags, RDS looks for the tags from the source DB instance for the DB snapshot, and then adds those tags to the restored DB instance. For more information, see Copying tags to DB instance snapshots in the Amazon RDS User Guide.
        DomainIAMRoleName:
          $ref: "#/components/schemas/String"
          description: The name of the IAM role to use when making API calls to the Directory Service. This setting doesn't apply to RDS Custom DB instances.
        EnableIAMDatabaseAuthentication:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to enable mapping of Amazon Web Services Identity and Access Management (IAM) accounts to database accounts. By default, mapping is disabled. For more information about IAM database authentication, see IAM Database Authentication for MySQL and PostgreSQL in the Amazon RDS User Guide. This setting doesn't apply to RDS Custom.
        EnableCloudwatchLogsExports:
          $ref: "#/components/schemas/LogTypeList"
          description: The list of logs for the restored DB instance to export to CloudWatch Logs. The values in the list depend on the DB engine. For more information, see Publishing Database Logs to Amazon CloudWatch Logs in the Amazon RDS User Guide. This setting doesn't apply to RDS Custom.
        ProcessorFeatures:
          $ref: "#/components/schemas/ProcessorFeatureList"
          description: The number of CPU cores and the number of threads per core for the DB instance class of the DB instance. This setting doesn't apply to RDS Custom.
        UseDefaultProcessorFeatures:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether the DB instance class of the DB instance uses its default processor features. This setting doesn't apply to RDS Custom.
        DBParameterGroupName:
          $ref: "#/components/schemas/String"
          description: "The name of the DB parameter group to associate with this DB instance. If you don't specify a value for DBParameterGroupName, then RDS uses the default DBParameterGroup for the specified DB engine. This setting doesn't apply to RDS Custom. Constraints: If supplied, must match the name of an existing DB parameter group. Must be 1 to 255 letters, numbers, or hyphens. First character must be a letter. Can't end with a hyphen or contain two consecutive hyphens."
        DeletionProtection:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to enable deletion protection for the DB instance. The database can't be deleted when deletion protection is enabled. By default, deletion protection isn't enabled. For more information, see Deleting a DB Instance.
        EnableCustomerOwnedIp:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to enable a customer-owned IP address (CoIP) for an RDS on Outposts DB instance. A CoIP provides local or external connectivity to resources in your Outpost subnets through your on-premises network. For some use cases, a CoIP can provide lower latency for connections to the DB instance from outside of its virtual private cloud (VPC) on your local network. This setting doesn't apply to RDS Custom. For more information about RDS on Outposts, see Working with Amazon RDS on Amazon Web Services Outposts in the Amazon RDS User Guide. For more information about CoIPs, see Customer-owned IP addresses in the Amazon Web Services Outposts User Guide.
        NetworkType:
          $ref: "#/components/schemas/String"
          description: "The network type of the DB instance. Valid Values: IPV4 DUAL The network type is determined by the DBSubnetGroup specified for the DB instance. A DBSubnetGroup can support only the IPv4 protocol or the IPv4 and the IPv6 protocols (DUAL). For more information, see Working with a DB instance in a VPC in the Amazon RDS User Guide."
        BackupTarget:
          $ref: "#/components/schemas/String"
          description: Specifies where automated backups and manual snapshots are stored for the restored DB instance. Possible values are local (Dedicated Local Zone), outposts (Amazon Web Services Outposts), and region (Amazon Web Services Region). The default is region. For more information, see Working with Amazon RDS on Amazon Web Services Outposts in the Amazon RDS User Guide.
        CustomIamInstanceProfile:
          $ref: "#/components/schemas/String"
          description: "The instance profile associated with the underlying Amazon EC2 instance of an RDS Custom DB instance. The instance profile must meet the following requirements: The profile must exist in your account. The profile must have an IAM role that Amazon EC2 has permissions to assume. The instance profile name and the associated IAM role name must start with the prefix AWSRDSCustom. For the list of permissions required for the IAM role, see Configure IAM and your VPC in the Amazon RDS User Guide. This setting is required for RDS Custom."
        AllocatedStorage:
          $ref: "#/components/schemas/IntegerOptional"
          description: The amount of storage (in gibibytes) to allocate initially for the DB instance. Follow the allocation rules specified in CreateDBInstance. This setting isn't valid for RDS for SQL Server. Be sure to allocate enough storage for your new DB instance so that the restore operation can succeed. You can also allocate additional storage for future growth.
        DBClusterSnapshotIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier for the Multi-AZ DB cluster snapshot to restore from. For more information on Multi-AZ DB clusters, see Multi-AZ DB cluster deployments in the Amazon RDS User Guide. Constraints: Must match the identifier of an existing Multi-AZ DB cluster snapshot. Can't be specified when DBSnapshotIdentifier is specified. Must be specified when DBSnapshotIdentifier isn't specified. If you are restoring from a shared manual Multi-AZ DB cluster snapshot, the DBClusterSnapshotIdentifier must be the ARN of the shared snapshot. Can't be the identifier of an Aurora DB cluster snapshot."
        BackupRetentionPeriod:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The number of days to retain automated backups. Setting this parameter to a positive number enables backups. Setting this parameter to 0 disables automated backups. Enabling and disabling backups can result in a brief I/O suspension that lasts from a few seconds to a few minutes, depending on the size and class of your DB instance. This setting doesn't apply to Amazon Aurora DB instances. The retention period for automated backups is managed by the DB cluster. For more information, see ModifyDBCluster. Default: Uses existing setting Constraints: Must be a value from 0 to 35. Can't be set to 0 if the DB instance is a source to read replicas. Can't be set to 0 for an RDS Custom for Oracle DB instance."
        PreferredBackupWindow:
          $ref: "#/components/schemas/String"
          description: "The daily time range during which automated backups are created if automated backups are enabled, as determined by the BackupRetentionPeriod parameter. Changing this parameter doesn't result in an outage and the change is asynchronously applied as soon as possible. The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Web Services Region. For more information, see Backup window in the Amazon RDS User Guide. This setting doesn't apply to Amazon Aurora DB instances. The daily time range for creating automated backups is managed by the DB cluster. For more information, see ModifyDBCluster. Constraints: Must be in the format hh24:mi-hh24:mi. Must be in Universal Coordinated Time (UTC). Must not conflict with the preferred maintenance window. Must be at least 30 minutes."
        DedicatedLogVolume:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to enable a dedicated log volume (DLV) for the DB instance.
        CACertificateIdentifier:
          $ref: "#/components/schemas/String"
          description: The CA certificate identifier to use for the DB instance's server certificate. This setting doesn't apply to RDS Custom DB instances. For more information, see Using SSL/TLS to encrypt a connection to a DB instance in the Amazon RDS User Guide and Using SSL/TLS to encrypt a connection to a DB cluster in the Amazon Aurora User Guide.
        EngineLifecycleSupport:
          $ref: "#/components/schemas/String"
          description: "The life cycle type for this DB instance. By default, this value is set to open-source-rds-extended-support, which enrolls your DB instance into Amazon RDS Extended Support. At the end of standard support, you can avoid charges for Extended Support by setting the value to open-source-rds-extended-support-disabled. In this case, RDS automatically upgrades your restored DB instance to a higher engine version, if the major engine version is past its end of standard support date. You can use this setting to enroll your DB instance into Amazon RDS Extended Support. With RDS Extended Support, you can run the selected major engine version on your DB instance past the end of standard support for that engine version. For more information, see Amazon RDS Extended Support with Amazon RDS in the Amazon RDS User Guide. This setting applies only to RDS for MySQL and RDS for PostgreSQL. For Amazon Aurora DB instances, the life cycle type is managed by the DB cluster. Valid Values: open-source-rds-extended-support | open-source-rds-extended-support-disabled Default: open-source-rds-extended-support"
        AdditionalStorageVolumes:
          $ref: "#/components/schemas/AdditionalStorageVolumesList"
          description: A list of additional storage volumes to create for the DB instance. You can create up to three additional storage volumes using the names rdsdbdata2, rdsdbdata3, and rdsdbdata4. Additional storage volumes are supported for RDS for Oracle and RDS for SQL Server DB instances only.
        TagSpecifications:
          $ref: "#/components/schemas/TagSpecificationList"
          description: "Tags to assign to resources associated with the DB instance. Valid Values: auto-backup - The DB instance's automated backup."
        ManageMasterUserPassword:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to manage the master user password with Amazon Web Services Secrets Manager in the restored DB instance. For more information, see Password management with Amazon Web Services Secrets Manager in the Amazon RDS User Guide. Constraints: Applies to RDS for Oracle only."
        MasterUserSecretKmsKeyId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services KMS key identifier to encrypt a secret that is automatically generated and managed in Amazon Web Services Secrets Manager. This setting is valid only if the master user password is managed by RDS in Amazon Web Services Secrets Manager for the DB instance. The Amazon Web Services KMS key identifier is the key ARN, key ID, alias ARN, or alias name for the KMS key. To use a KMS key in a different Amazon Web Services account, specify the key ARN or alias ARN. If you don't specify MasterUserSecretKmsKeyId, then the aws/secretsmanager KMS key is used to encrypt the secret. If the secret is in a different Amazon Web Services account, then you can't use the aws/secretsmanager KMS key to encrypt the secret, and you must use a customer managed KMS key. There is a default KMS key for your Amazon Web Services account. Your Amazon Web Services account has a different default KMS key for each Amazon Web Services Region.
      required:
        - DBInstanceIdentifier
    RestoreDBInstanceFromS3OutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBInstanceDisplay"
    RestoreDBInstanceFromS3Message:
      type: object
      properties:
        DBName:
          $ref: "#/components/schemas/String"
          description: The name of the database to create when the DB instance is created. Follow the naming rules specified in CreateDBInstance.
        DBInstanceIdentifier:
          $ref: "#/components/schemas/String"
          description: "The DB instance identifier. This parameter is stored as a lowercase string. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens. First character must be a letter. Can't end with a hyphen or contain two consecutive hyphens. Example: mydbinstance"
        AllocatedStorage:
          $ref: "#/components/schemas/IntegerOptional"
          description: The amount of storage (in gibibytes) to allocate initially for the DB instance. Follow the allocation rules specified in CreateDBInstance. This setting isn't valid for RDS for SQL Server. Be sure to allocate enough storage for your new DB instance so that the restore operation can succeed. You can also allocate additional storage for future growth.
        DBInstanceClass:
          $ref: "#/components/schemas/String"
          description: The compute and memory capacity of the DB instance, for example db.m4.large. Not all DB instance classes are available in all Amazon Web Services Regions, or for all database engines. For the full list of DB instance classes, and availability for your engine, see DB Instance Class in the Amazon RDS User Guide. Importing from Amazon S3 isn't supported on the db.t2.micro DB instance class.
        Engine:
          $ref: "#/components/schemas/String"
          description: "The name of the database engine to be used for this instance. Valid Values: mysql"
        MasterUsername:
          $ref: "#/components/schemas/String"
          description: "The name for the master user. Constraints: Must be 1 to 16 letters or numbers. First character must be a letter. Can't be a reserved word for the chosen database engine."
        MasterUserPassword:
          $ref: "#/components/schemas/SensitiveString"
          description: "The password for the master user. Constraints: Can't be specified if ManageMasterUserPassword is turned on. Can include any printable ASCII character except \"/\", \"\"\", or \"@\". For RDS for Oracle, can't include the \"&\" (ampersand) or the \"'\" (single quotes) character. Length Constraints: RDS for Db2 - Must contain from 8 to 128 characters. RDS for MariaDB - Must contain from 8 to 41 characters. RDS for Microsoft SQL Server - Must contain from 8 to 128 characters. RDS for MySQL - Must contain from 8 to 41 characters. RDS for Oracle - Must contain from 8 to 30 characters. RDS for PostgreSQL - Must contain from 8 to 128 characters."
        DBSecurityGroups:
          $ref: "#/components/schemas/DBSecurityGroupNameList"
          description: "A list of DB security groups to associate with this DB instance. Default: The default DB security group for the database engine."
        VpcSecurityGroupIds:
          $ref: "#/components/schemas/VpcSecurityGroupIdList"
          description: A list of VPC security groups to associate with this DB instance.
        AvailabilityZone:
          $ref: "#/components/schemas/String"
          description: "The Availability Zone that the DB instance is created in. For information about Amazon Web Services Regions and Availability Zones, see Regions and Availability Zones in the Amazon RDS User Guide. Default: A random, system-chosen Availability Zone in the endpoint's Amazon Web Services Region. Example: us-east-1d Constraint: The AvailabilityZone parameter can't be specified if the DB instance is a Multi-AZ deployment. The specified Availability Zone must be in the same Amazon Web Services Region as the current endpoint."
        DBSubnetGroupName:
          $ref: "#/components/schemas/String"
          description: "A DB subnet group to associate with this DB instance. Constraints: If supplied, must match the name of an existing DBSubnetGroup. Example: mydbsubnetgroup"
        PreferredMaintenanceWindow:
          $ref: "#/components/schemas/String"
          description: "The time range each week during which system maintenance can occur, in Universal Coordinated Time (UTC). For more information, see Amazon RDS Maintenance Window in the Amazon RDS User Guide. Constraints: Must be in the format ddd:hh24:mi-ddd:hh24:mi. Valid Days: Mon, Tue, Wed, Thu, Fri, Sat, Sun. Must be in Universal Coordinated Time (UTC). Must not conflict with the preferred backup window. Must be at least 30 minutes."
        DBParameterGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the DB parameter group to associate with this DB instance. If you do not specify a value for DBParameterGroupName, then the default DBParameterGroup for the specified DB engine is used.
        BackupRetentionPeriod:
          $ref: "#/components/schemas/IntegerOptional"
          description: The number of days for which automated backups are retained. Setting this parameter to a positive number enables backups. For more information, see CreateDBInstance.
        PreferredBackupWindow:
          $ref: "#/components/schemas/String"
          description: "The time range each day during which automated backups are created if automated backups are enabled. For more information, see Backup window in the Amazon RDS User Guide. Constraints: Must be in the format hh24:mi-hh24:mi. Must be in Universal Coordinated Time (UTC). Must not conflict with the preferred maintenance window. Must be at least 30 minutes."
        Port:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The port number on which the database accepts connections. Type: Integer Valid Values: 1150-65535 Default: 3306"
        MultiAZ:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether the DB instance is a Multi-AZ deployment. If the DB instance is a Multi-AZ deployment, you can't set the AvailabilityZone parameter.
        EngineVersion:
          $ref: "#/components/schemas/String"
          description: The version number of the database engine to use. Choose the latest minor version of your database engine. For information about engine versions, see CreateDBInstance, or call DescribeDBEngineVersions.
        AutoMinorVersionUpgrade:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to automatically apply minor engine upgrades to the DB instance during the maintenance window. By default, minor engine upgrades are not applied automatically. For more information about automatic minor version upgrades, see Automatically upgrading the minor engine version.
        LicenseModel:
          $ref: "#/components/schemas/String"
          description: The license model for this DB instance. Use general-public-license.
        Iops:
          $ref: "#/components/schemas/IntegerOptional"
          description: The amount of Provisioned IOPS (input/output operations per second) to allocate initially for the DB instance. For information about valid IOPS values, see Amazon RDS Provisioned IOPS storage in the Amazon RDS User Guide.
        StorageThroughput:
          $ref: "#/components/schemas/IntegerOptional"
          description: Specifies the storage throughput value for the DB instance. This setting doesn't apply to RDS Custom or Amazon Aurora.
        OptionGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the option group to associate with this DB instance. If this argument is omitted, the default option group for the specified engine is used.
        PubliclyAccessible:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether the DB instance is publicly accessible. When the DB instance is publicly accessible, its Domain Name System (DNS) endpoint resolves to the private IP address from within the DB instance's virtual private cloud (VPC). It resolves to the public IP address from outside of the DB instance's VPC. Access to the DB instance is ultimately controlled by the security group it uses. That public access is not permitted if the security group assigned to the DB instance doesn't permit it. When the DB instance isn't publicly accessible, it is an internal DB instance with a DNS name that resolves to a private IP address. For more information, see CreateDBInstance.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tags to associate with this DB instance. For more information, see Tagging Amazon RDS Resources in the Amazon RDS User Guide.
        StorageType:
          $ref: "#/components/schemas/String"
          description: "Specifies the storage type to be associated with the DB instance. Valid Values: gp2 | gp3 | io1 | io2 | standard If you specify io1, io2, or gp3, you must also include a value for the Iops parameter. Default: io1 if the Iops parameter is specified; otherwise gp2"
        StorageEncrypted:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether the new DB instance is encrypted or not.
        KmsKeyId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services KMS key identifier for an encrypted DB instance. The Amazon Web Services KMS key identifier is the key ARN, key ID, alias ARN, or alias name for the KMS key. To use a KMS key in a different Amazon Web Services account, specify the key ARN or alias ARN. If the StorageEncrypted parameter is enabled, and you do not specify a value for the KmsKeyId parameter, then Amazon RDS will use your default KMS key. There is a default KMS key for your Amazon Web Services account. Your Amazon Web Services account has a different default KMS key for each Amazon Web Services Region.
        CopyTagsToSnapshot:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to copy all tags from the DB instance to snapshots of the DB instance. By default, tags are not copied.
        MonitoringInterval:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The interval, in seconds, between points when Enhanced Monitoring metrics are collected for the DB instance. To disable collecting Enhanced Monitoring metrics, specify 0. If MonitoringRoleArn is specified, then you must also set MonitoringInterval to a value other than 0. Valid Values: 0, 1, 5, 10, 15, 30, 60 Default: 0"
        MonitoringRoleArn:
          $ref: "#/components/schemas/String"
          description: The ARN for the IAM role that permits RDS to send enhanced monitoring metrics to Amazon CloudWatch Logs. For example, arn:aws:iam:123456789012:role/emaccess. For information on creating a monitoring role, see Setting Up and Enabling Enhanced Monitoring in the Amazon RDS User Guide. If MonitoringInterval is set to a value other than 0, then you must supply a MonitoringRoleArn value.
        EnableIAMDatabaseAuthentication:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to enable mapping of Amazon Web Services Identity and Access Management (IAM) accounts to database accounts. By default, mapping isn't enabled. For more information about IAM database authentication, see IAM Database Authentication for MySQL and PostgreSQL in the Amazon RDS User Guide.
        SourceEngine:
          $ref: "#/components/schemas/String"
          description: "The name of the engine of your source database. Valid Values: mysql"
        SourceEngineVersion:
          $ref: "#/components/schemas/String"
          description: "The version of the database that the backup files were created from. MySQL versions 5.6 and 5.7 are supported. Example: 5.6.40"
        S3BucketName:
          $ref: "#/components/schemas/String"
          description: The name of your Amazon S3 bucket that contains your database backup file.
        S3Prefix:
          $ref: "#/components/schemas/String"
          description: The prefix of your Amazon S3 bucket.
        S3IngestionRoleArn:
          $ref: "#/components/schemas/String"
          description: An Amazon Web Services Identity and Access Management (IAM) role with a trust policy and a permissions policy that allows Amazon RDS to access your Amazon S3 bucket. For information about this role, see Creating an IAM role manually in the Amazon RDS User Guide.
        DatabaseInsightsMode:
          $ref: "#/components/schemas/DatabaseInsightsMode"
          description: Specifies the mode of Database Insights to enable for the DB instance. Aurora DB instances inherit this value from the DB cluster, so you can't change this value.
        EnablePerformanceInsights:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to enable Performance Insights for the DB instance. For more information, see Using Amazon Performance Insights in the Amazon RDS User Guide.
        PerformanceInsightsKMSKeyId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services KMS key identifier for encryption of Performance Insights data. The Amazon Web Services KMS key identifier is the key ARN, key ID, alias ARN, or alias name for the KMS key. If you do not specify a value for PerformanceInsightsKMSKeyId, then Amazon RDS uses your default KMS key. There is a default KMS key for your Amazon Web Services account. Your Amazon Web Services account has a different default KMS key for each Amazon Web Services Region.
        PerformanceInsightsRetentionPeriod:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The number of days to retain Performance Insights data. The default is 7 days. The following values are valid: 7 month * 31, where month is a number of months from 1-23 731 For example, the following values are valid: 93 (3 months * 31) 341 (11 months * 31) 589 (19 months * 31) 731 If you specify a retention period such as 94, which isn't a valid value, RDS issues an error."
        EnableCloudwatchLogsExports:
          $ref: "#/components/schemas/LogTypeList"
          description: The list of logs that the restored DB instance is to export to CloudWatch Logs. The values in the list depend on the DB engine being used. For more information, see Publishing Database Logs to Amazon CloudWatch Logs in the Amazon RDS User Guide.
        ProcessorFeatures:
          $ref: "#/components/schemas/ProcessorFeatureList"
          description: The number of CPU cores and the number of threads per core for the DB instance class of the DB instance.
        UseDefaultProcessorFeatures:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether the DB instance class of the DB instance uses its default processor features.
        DeletionProtection:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to enable deletion protection for the DB instance. The database can't be deleted when deletion protection is enabled. By default, deletion protection isn't enabled. For more information, see Deleting a DB Instance.
        MaxAllocatedStorage:
          $ref: "#/components/schemas/IntegerOptional"
          description: The upper limit in gibibytes (GiB) to which Amazon RDS can automatically scale the storage of the DB instance. For more information about this setting, including limitations that apply to it, see Managing capacity automatically with Amazon RDS storage autoscaling in the Amazon RDS User Guide.
        NetworkType:
          $ref: "#/components/schemas/String"
          description: "The network type of the DB instance. Valid Values: IPV4 DUAL The network type is determined by the DBSubnetGroup specified for the DB instance. A DBSubnetGroup can support only the IPv4 protocol or the IPv4 and the IPv6 protocols (DUAL). For more information, see Working with a DB instance in a VPC in the Amazon RDS User Guide."
        ManageMasterUserPassword:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to manage the master user password with Amazon Web Services Secrets Manager. For more information, see Password management with Amazon Web Services Secrets Manager in the Amazon RDS User Guide. Constraints: Can't manage the master user password with Amazon Web Services Secrets Manager if MasterUserPassword is specified."
        MasterUserSecretKmsKeyId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services KMS key identifier to encrypt a secret that is automatically generated and managed in Amazon Web Services Secrets Manager. This setting is valid only if the master user password is managed by RDS in Amazon Web Services Secrets Manager for the DB instance. The Amazon Web Services KMS key identifier is the key ARN, key ID, alias ARN, or alias name for the KMS key. To use a KMS key in a different Amazon Web Services account, specify the key ARN or alias ARN. If you don't specify MasterUserSecretKmsKeyId, then the aws/secretsmanager KMS key is used to encrypt the secret. If the secret is in a different Amazon Web Services account, then you can't use the aws/secretsmanager KMS key to encrypt the secret, and you must use a customer managed KMS key. There is a default KMS key for your Amazon Web Services account. Your Amazon Web Services account has a different default KMS key for each Amazon Web Services Region.
        DedicatedLogVolume:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to enable a dedicated log volume (DLV) for the DB instance.
        CACertificateIdentifier:
          $ref: "#/components/schemas/String"
          description: The CA certificate identifier to use for the DB instance's server certificate. This setting doesn't apply to RDS Custom DB instances. For more information, see Using SSL/TLS to encrypt a connection to a DB instance in the Amazon RDS User Guide and Using SSL/TLS to encrypt a connection to a DB cluster in the Amazon Aurora User Guide.
        EngineLifecycleSupport:
          $ref: "#/components/schemas/String"
          description: "The life cycle type for this DB instance. By default, this value is set to open-source-rds-extended-support, which enrolls your DB instance into Amazon RDS Extended Support. At the end of standard support, you can avoid charges for Extended Support by setting the value to open-source-rds-extended-support-disabled. In this case, RDS automatically upgrades your restored DB instance to a higher engine version, if the major engine version is past its end of standard support date. You can use this setting to enroll your DB instance into Amazon RDS Extended Support. With RDS Extended Support, you can run the selected major engine version on your DB instance past the end of standard support for that engine version. For more information, see Amazon RDS Extended Support Amazon RDS in the Amazon RDS User Guide. This setting applies only to RDS for MySQL and RDS for PostgreSQL. For Amazon Aurora DB instances, the life cycle type is managed by the DB cluster. Valid Values: open-source-rds-extended-support | open-source-rds-extended-support-disabled Default: open-source-rds-extended-support"
        AdditionalStorageVolumes:
          $ref: "#/components/schemas/AdditionalStorageVolumesList"
          description: A list of additional storage volumes to modify or delete for the DB instance. You can modify or delete up to three additional storage volumes using the names rdsdbdata2, rdsdbdata3, and rdsdbdata4. Additional storage volumes are supported for RDS for Oracle and RDS for SQL Server DB instances only.
        TagSpecifications:
          $ref: "#/components/schemas/TagSpecificationList"
          description: "Tags to assign to resources associated with the DB instance. Valid Values: auto-backup - The DB instance's automated backup."
      required:
        - DBInstanceIdentifier
        - DBInstanceClass
        - Engine
        - SourceEngine
        - SourceEngineVersion
        - S3BucketName
        - S3IngestionRoleArn
    RestoreDBInstanceToPointInTimeOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBInstanceDisplay"
    RestoreDBInstanceToPointInTimeMessage:
      type: object
      properties:
        SourceDBInstanceIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier of the source DB instance from which to restore. Constraints: Must match the identifier of an existing DB instance."
        TargetDBInstanceIdentifier:
          $ref: "#/components/schemas/String"
          description: "The name of the new DB instance to create. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens. First character must be a letter. Can't end with a hyphen or contain two consecutive hyphens."
        RestoreTime:
          $ref: "#/components/schemas/TStamp"
          description: "The date and time to restore from. Constraints: Must be a time in Universal Coordinated Time (UTC) format. Must be before the latest restorable time for the DB instance. Can't be specified if the UseLatestRestorableTime parameter is enabled. Example: 2009-09-07T23:45:00Z"
        UseLatestRestorableTime:
          $ref: "#/components/schemas/Boolean"
          description: "Specifies whether the DB instance is restored from the latest backup time. By default, the DB instance isn't restored from the latest backup time. Constraints: Can't be specified if the RestoreTime parameter is provided."
        DBInstanceClass:
          $ref: "#/components/schemas/String"
          description: "The compute and memory capacity of the Amazon RDS DB instance, for example db.m4.large. Not all DB instance classes are available in all Amazon Web Services Regions, or for all database engines. For the full list of DB instance classes, and availability for your engine, see DB Instance Class in the Amazon RDS User Guide. Default: The same DB instance class as the original DB instance."
        Port:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The port number on which the database accepts connections. Default: The same port as the original DB instance. Constraints: The value must be 1150-65535."
        AvailabilityZone:
          $ref: "#/components/schemas/String"
          description: "The Availability Zone (AZ) where the DB instance will be created. Default: A random, system-chosen Availability Zone. Constraints: You can't specify the AvailabilityZone parameter if the DB instance is a Multi-AZ deployment. Example: us-east-1a"
        DBSubnetGroupName:
          $ref: "#/components/schemas/String"
          description: "The DB subnet group name to use for the new instance. Constraints: If supplied, must match the name of an existing DB subnet group. Example: mydbsubnetgroup"
        MultiAZ:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Secifies whether the DB instance is a Multi-AZ deployment. This setting doesn't apply to RDS Custom. Constraints: You can't specify the AvailabilityZone parameter if the DB instance is a Multi-AZ deployment."
        PubliclyAccessible:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether the DB instance is publicly accessible. When the DB cluster is publicly accessible, its Domain Name System (DNS) endpoint resolves to the private IP address from within the DB cluster's virtual private cloud (VPC). It resolves to the public IP address from outside of the DB cluster's VPC. Access to the DB cluster is ultimately controlled by the security group it uses. That public access isn't permitted if the security group assigned to the DB cluster doesn't permit it. When the DB instance isn't publicly accessible, it is an internal DB instance with a DNS name that resolves to a private IP address. For more information, see CreateDBInstance.
        AutoMinorVersionUpgrade:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether minor version upgrades are applied automatically to the DB instance during the maintenance window. This setting doesn't apply to RDS Custom. For more information about automatic minor version upgrades, see Automatically upgrading the minor engine version.
        LicenseModel:
          $ref: "#/components/schemas/String"
          description: "The license model information for the restored DB instance. License models for RDS for Db2 require additional configuration. The bring your own license (BYOL) model requires a custom parameter group and an Amazon Web Services License Manager self-managed license. The Db2 license through Amazon Web Services Marketplace model requires an Amazon Web Services Marketplace subscription. For more information, see Amazon RDS for Db2 licensing options in the Amazon RDS User Guide. This setting doesn't apply to Amazon Aurora or RDS Custom DB instances. Valid Values: RDS for Db2 - bring-your-own-license | marketplace-license RDS for MariaDB - general-public-license RDS for Microsoft SQL Server - license-included RDS for MySQL - general-public-license RDS for Oracle - bring-your-own-license | license-included RDS for PostgreSQL - postgresql-license Default: Same as the source."
        DBName:
          $ref: "#/components/schemas/String"
          description: "The database name for the restored DB instance. This parameter doesn't apply to the following DB instances: RDS Custom RDS for Db2 RDS for MariaDB RDS for MySQL"
        Engine:
          $ref: "#/components/schemas/String"
          description: "The database engine to use for the new instance. This setting doesn't apply to RDS Custom. Valid Values: db2-ae db2-se mariadb mysql oracle-ee oracle-ee-cdb oracle-se2 oracle-se2-cdb postgres sqlserver-ee sqlserver-se sqlserver-ex sqlserver-web Default: The same as source Constraints: Must be compatible with the engine of the source."
        Iops:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The amount of Provisioned IOPS (input/output operations per second) to initially allocate for the DB instance. This setting doesn't apply to SQL Server. Constraints: Must be an integer greater than 1000."
        StorageThroughput:
          $ref: "#/components/schemas/IntegerOptional"
          description: The storage throughput value for the DB instance. This setting doesn't apply to RDS Custom or Amazon Aurora.
        OptionGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the option group to use for the restored DB instance. Permanent options, such as the TDE option for Oracle Advanced Security TDE, can't be removed from an option group, and that option group can't be removed from a DB instance after it is associated with a DB instance This setting doesn't apply to RDS Custom.
        CopyTagsToSnapshot:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to copy all tags from the restored DB instance to snapshots of the DB instance. By default, tags are not copied.
        Tags:
          $ref: "#/components/schemas/TagList"
        StorageType:
          $ref: "#/components/schemas/String"
          description: "The storage type to associate with the DB instance. Valid Values: gp2 | gp3 | io1 | io2 | standard Default: io1, if the Iops parameter is specified. Otherwise, gp3. Constraints: If you specify io1, io2, or gp3, you must also include a value for the Iops parameter."
        TdeCredentialArn:
          $ref: "#/components/schemas/String"
          description: The ARN from the key store with which to associate the instance for TDE encryption. This setting doesn't apply to RDS Custom.
        TdeCredentialPassword:
          $ref: "#/components/schemas/SensitiveString"
          description: The password for the given ARN from the key store in order to access the device. This setting doesn't apply to RDS Custom.
        VpcSecurityGroupIds:
          $ref: "#/components/schemas/VpcSecurityGroupIdList"
          description: "A list of EC2 VPC security groups to associate with this DB instance. Default: The default EC2 VPC security group for the DB subnet group's VPC."
        Domain:
          $ref: "#/components/schemas/String"
          description: The Active Directory directory ID to restore the DB instance in. Create the domain before running this command. Currently, you can create only the MySQL, Microsoft SQL Server, Oracle, and PostgreSQL DB instances in an Active Directory Domain. This setting doesn't apply to RDS Custom. For more information, see Kerberos Authentication in the Amazon RDS User Guide.
        DomainIAMRoleName:
          $ref: "#/components/schemas/String"
          description: The name of the IAM role to use when making API calls to the Directory Service. This setting doesn't apply to RDS Custom DB instances.
        DomainFqdn:
          $ref: "#/components/schemas/String"
          description: "The fully qualified domain name (FQDN) of an Active Directory domain. Constraints: Can't be longer than 64 characters. Example: mymanagedADtest.mymanagedAD.mydomain"
        DomainOu:
          $ref: "#/components/schemas/String"
          description: "The Active Directory organizational unit for your DB instance to join. Constraints: Must be in the distinguished name format. Can't be longer than 64 characters. Example: OU=mymanagedADtestOU,DC=mymanagedADtest,DC=mymanagedAD,DC=mydomain"
        DomainAuthSecretArn:
          $ref: "#/components/schemas/String"
          description: "The ARN for the Secrets Manager secret with the credentials for the user joining the domain. Constraints: Can't be longer than 64 characters. Example: arn:aws:secretsmanager:region:account-number:secret:myselfmanagedADtestsecret-123456"
        DomainDnsIps:
          $ref: "#/components/schemas/StringList"
          description: "The IPv4 DNS IP addresses of your primary and secondary Active Directory domain controllers. Constraints: Two IP addresses must be provided. If there isn't a secondary domain controller, use the IP address of the primary domain controller for both entries in the list. Example: 123.124.125.126,234.235.236.237"
        EnableIAMDatabaseAuthentication:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to enable mapping of Amazon Web Services Identity and Access Management (IAM) accounts to database accounts. By default, mapping isn't enabled. This setting doesn't apply to RDS Custom. For more information about IAM database authentication, see IAM Database Authentication for MySQL and PostgreSQL in the Amazon RDS User Guide.
        EnableCloudwatchLogsExports:
          $ref: "#/components/schemas/LogTypeList"
          description: The list of logs that the restored DB instance is to export to CloudWatch Logs. The values in the list depend on the DB engine being used. For more information, see Publishing Database Logs to Amazon CloudWatch Logs in the Amazon RDS User Guide. This setting doesn't apply to RDS Custom.
        ProcessorFeatures:
          $ref: "#/components/schemas/ProcessorFeatureList"
          description: The number of CPU cores and the number of threads per core for the DB instance class of the DB instance. This setting doesn't apply to RDS Custom.
        UseDefaultProcessorFeatures:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether the DB instance class of the DB instance uses its default processor features. This setting doesn't apply to RDS Custom.
        DBParameterGroupName:
          $ref: "#/components/schemas/String"
          description: "The name of the DB parameter group to associate with this DB instance. If you do not specify a value for DBParameterGroupName, then the default DBParameterGroup for the specified DB engine is used. This setting doesn't apply to RDS Custom. Constraints: If supplied, must match the name of an existing DB parameter group. Must be 1 to 255 letters, numbers, or hyphens. First character must be a letter. Can't end with a hyphen or contain two consecutive hyphens."
        DeletionProtection:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether the DB instance has deletion protection enabled. The database can't be deleted when deletion protection is enabled. By default, deletion protection isn't enabled. For more information, see Deleting a DB Instance.
        SourceDbiResourceId:
          $ref: "#/components/schemas/String"
          description: The resource ID of the source DB instance from which to restore.
        MaxAllocatedStorage:
          $ref: "#/components/schemas/IntegerOptional"
          description: The upper limit in gibibytes (GiB) to which Amazon RDS can automatically scale the storage of the DB instance. For more information about this setting, including limitations that apply to it, see Managing capacity automatically with Amazon RDS storage autoscaling in the Amazon RDS User Guide. This setting doesn't apply to RDS Custom.
        EnableCustomerOwnedIp:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to enable a customer-owned IP address (CoIP) for an RDS on Outposts DB instance. A CoIP provides local or external connectivity to resources in your Outpost subnets through your on-premises network. For some use cases, a CoIP can provide lower latency for connections to the DB instance from outside of its virtual private cloud (VPC) on your local network. This setting doesn't apply to RDS Custom. For more information about RDS on Outposts, see Working with Amazon RDS on Amazon Web Services Outposts in the Amazon RDS User Guide. For more information about CoIPs, see Customer-owned IP addresses in the Amazon Web Services Outposts User Guide.
        NetworkType:
          $ref: "#/components/schemas/String"
          description: "The network type of the DB instance. The network type is determined by the DBSubnetGroup specified for the DB instance. A DBSubnetGroup can support only the IPv4 protocol or the IPv4 and the IPv6 protocols (DUAL). For more information, see Working with a DB instance in a VPC in the Amazon RDS User Guide. Valid Values: IPV4 DUAL"
        SourceDBInstanceAutomatedBackupsArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the replicated automated backups from which to restore, for example, arn:aws:rds:us-east-1:123456789012:auto-backup:ab-L2IJCEXJP7XQ7HOJ4SIEXAMPLE. This setting doesn't apply to RDS Custom.
        BackupTarget:
          $ref: "#/components/schemas/String"
          description: "The location for storing automated backups and manual snapshots for the restored DB instance. Valid Values: local (Dedicated Local Zone) outposts (Amazon Web Services Outposts) region (Amazon Web Services Region) Default: region For more information, see Working with Amazon RDS on Amazon Web Services Outposts in the Amazon RDS User Guide."
        CustomIamInstanceProfile:
          $ref: "#/components/schemas/String"
          description: "The instance profile associated with the underlying Amazon EC2 instance of an RDS Custom DB instance. The instance profile must meet the following requirements: The profile must exist in your account. The profile must have an IAM role that Amazon EC2 has permissions to assume. The instance profile name and the associated IAM role name must start with the prefix AWSRDSCustom. For the list of permissions required for the IAM role, see Configure IAM and your VPC in the Amazon RDS User Guide. This setting is required for RDS Custom."
        AllocatedStorage:
          $ref: "#/components/schemas/IntegerOptional"
          description: The amount of storage (in gibibytes) to allocate initially for the DB instance. Follow the allocation rules specified in CreateDBInstance. This setting isn't valid for RDS for SQL Server. Be sure to allocate enough storage for your new DB instance so that the restore operation can succeed. You can also allocate additional storage for future growth.
        BackupRetentionPeriod:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The number of days to retain automated backups. Setting this parameter to a positive number enables backups. Setting this parameter to 0 disables automated backups. Enabling and disabling backups can result in a brief I/O suspension that lasts from a few seconds to a few minutes, depending on the size and class of your DB instance. This setting doesn't apply to Amazon Aurora DB instances. The retention period for automated backups is managed by the DB cluster. For more information, see ModifyDBCluster. Default: Uses existing setting Constraints: Must be a value from 0 to 35. Can't be set to 0 if the DB instance is a source to read replicas. Can't be set to 0 for an RDS Custom for Oracle DB instance."
        PreferredBackupWindow:
          $ref: "#/components/schemas/String"
          description: "The daily time range during which automated backups are created if automated backups are enabled, as determined by the BackupRetentionPeriod parameter. Changing this parameter doesn't result in an outage and the change is asynchronously applied as soon as possible. The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Web Services Region. For more information, see Backup window in the Amazon RDS User Guide. This setting doesn't apply to Amazon Aurora DB instances. The daily time range for creating automated backups is managed by the DB cluster. For more information, see ModifyDBCluster. Constraints: Must be in the format hh24:mi-hh24:mi. Must be in Universal Coordinated Time (UTC). Must not conflict with the preferred maintenance window. Must be at least 30 minutes."
        DedicatedLogVolume:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to enable a dedicated log volume (DLV) for the DB instance.
        CACertificateIdentifier:
          $ref: "#/components/schemas/String"
          description: The CA certificate identifier to use for the DB instance's server certificate. This setting doesn't apply to RDS Custom DB instances. For more information, see Using SSL/TLS to encrypt a connection to a DB instance in the Amazon RDS User Guide and Using SSL/TLS to encrypt a connection to a DB cluster in the Amazon Aurora User Guide.
        EngineLifecycleSupport:
          $ref: "#/components/schemas/String"
          description: "The life cycle type for this DB instance. By default, this value is set to open-source-rds-extended-support, which enrolls your DB instance into Amazon RDS Extended Support. At the end of standard support, you can avoid charges for Extended Support by setting the value to open-source-rds-extended-support-disabled. In this case, RDS automatically upgrades your restored DB instance to a higher engine version, if the major engine version is past its end of standard support date. You can use this setting to enroll your DB instance into Amazon RDS Extended Support. With RDS Extended Support, you can run the selected major engine version on your DB instance past the end of standard support for that engine version. For more information, see Amazon RDS Extended Support with Amazon RDS in the Amazon RDS User Guide. This setting applies only to RDS for MySQL and RDS for PostgreSQL. For Amazon Aurora DB instances, the life cycle type is managed by the DB cluster. Valid Values: open-source-rds-extended-support | open-source-rds-extended-support-disabled Default: open-source-rds-extended-support"
        AdditionalStorageVolumes:
          $ref: "#/components/schemas/AdditionalStorageVolumesList"
          description: A list of additional storage volumes to restore to the DB instance. You can restore up to three additional storage volumes using the names rdsdbdata2, rdsdbdata3, and rdsdbdata4. Additional storage volumes are supported for RDS for Oracle and RDS for SQL Server DB instances only.
        TagSpecifications:
          $ref: "#/components/schemas/TagSpecificationList"
          description: "Tags to assign to resources associated with the DB instance. Valid Values: auto-backup - The DB instance's automated backup."
        ManageMasterUserPassword:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to manage the master user password with Amazon Web Services Secrets Manager in the restored DB instance. For more information, see Password management with Amazon Web Services Secrets Manager in the Amazon RDS User Guide. Constraints: Applies to RDS for Oracle only."
        MasterUserSecretKmsKeyId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services KMS key identifier to encrypt a secret that is automatically generated and managed in Amazon Web Services Secrets Manager. This setting is valid only if the master user password is managed by RDS in Amazon Web Services Secrets Manager for the DB instance. The Amazon Web Services KMS key identifier is the key ARN, key ID, alias ARN, or alias name for the KMS key. To use a KMS key in a different Amazon Web Services account, specify the key ARN or alias ARN. If you don't specify MasterUserSecretKmsKeyId, then the aws/secretsmanager KMS key is used to encrypt the secret. If the secret is in a different Amazon Web Services account, then you can't use the aws/secretsmanager KMS key to encrypt the secret, and you must use a customer managed KMS key. There is a default KMS key for your Amazon Web Services account. Your Amazon Web Services account has a different default KMS key for each Amazon Web Services Region.
      required:
        - TargetDBInstanceIdentifier
    RevokeDBSecurityGroupIngressOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBSecurityGroupDisplay"
    RevokeDBSecurityGroupIngressMessage:
      type: object
      properties:
        DBSecurityGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the DB security group to revoke ingress from.
        CIDRIP:
          $ref: "#/components/schemas/String"
          description: The IP range to revoke access from. Must be a valid CIDR range. If CIDRIP is specified, EC2SecurityGroupName, EC2SecurityGroupId and EC2SecurityGroupOwnerId can't be provided.
        EC2SecurityGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the EC2 security group to revoke access from. For VPC DB security groups, EC2SecurityGroupId must be provided. Otherwise, EC2SecurityGroupOwnerId and either EC2SecurityGroupName or EC2SecurityGroupId must be provided.
        EC2SecurityGroupId:
          $ref: "#/components/schemas/String"
          description: The id of the EC2 security group to revoke access from. For VPC DB security groups, EC2SecurityGroupId must be provided. Otherwise, EC2SecurityGroupOwnerId and either EC2SecurityGroupName or EC2SecurityGroupId must be provided.
        EC2SecurityGroupOwnerId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services account number of the owner of the EC2 security group specified in the EC2SecurityGroupName parameter. The Amazon Web Services access key ID isn't an acceptable value. For VPC DB security groups, EC2SecurityGroupId must be provided. Otherwise, EC2SecurityGroupOwnerId and either EC2SecurityGroupName or EC2SecurityGroupId must be provided.
      required:
        - DBSecurityGroupName
    ActivityStreamMode:
      type: string
      enum:
        - sync
        - async
    StartActivityStreamResponseDisplay:
      type: object
      properties:
        KmsKeyId:
          type: string
          description: The Amazon Web Services KMS key identifier for encryption of messages in the database activity stream.
        KinesisStreamName:
          type: string
          description: The name of the Amazon Kinesis data stream to be used for the database activity stream.
        Status:
          type: string
          description: The status of the database activity stream.
        Mode:
          type: string
          description: The mode of the database activity stream.
        EngineNativeAuditFieldsIncluded:
          type: boolean
          description: Indicates whether engine-native audit fields are included in the database activity stream.
        ApplyImmediately:
          type: boolean
          description: Indicates whether or not the database activity stream will start as soon as possible, regardless of the maintenance window for the database.
    StartActivityStreamOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/StartActivityStreamResponseDisplay"
    StartActivityStreamRequest:
      type: object
      properties:
        ResourceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the DB cluster, for example, arn:aws:rds:us-east-1:12345667890:cluster:das-cluster.
        Mode:
          $ref: "#/components/schemas/ActivityStreamMode"
          description: Specifies the mode of the database activity stream. Database events such as a change or access generate an activity stream event. The database session can handle these events either synchronously or asynchronously.
        KmsKeyId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services KMS key identifier for encrypting messages in the database activity stream. The Amazon Web Services KMS key identifier is the key ARN, key ID, alias ARN, or alias name for the KMS key.
        ApplyImmediately:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether or not the database activity stream is to start as soon as possible, regardless of the maintenance window for the database.
        EngineNativeAuditFieldsIncluded:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether the database activity stream includes engine-native audit fields. This option applies to an Oracle or Microsoft SQL Server DB instance. By default, no engine-native audit fields are included.
      required:
        - ResourceArn
        - Mode
        - KmsKeyId
    StartDBClusterOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterDisplay"
    StartDBClusterMessage:
      type: object
      properties:
        DBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: The DB cluster identifier of the Amazon Aurora DB cluster to be started. This parameter is stored as a lowercase string.
      required:
        - DBClusterIdentifier
    StartDBInstanceOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBInstanceDisplay"
    StartDBInstanceMessage:
      type: object
      properties:
        DBInstanceIdentifier:
          $ref: "#/components/schemas/String"
          description: The user-supplied instance identifier.
      required:
        - DBInstanceIdentifier
    StartDBInstanceAutomatedBackupsReplicationOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBInstanceAutomatedBackupDisplay"
    StartDBInstanceAutomatedBackupsReplicationMessage:
      type: object
      properties:
        SourceDBInstanceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the source DB instance for the replicated automated backups, for example, arn:aws:rds:us-west-2:123456789012:db:mydatabase.
        BackupRetentionPeriod:
          $ref: "#/components/schemas/IntegerOptional"
          description: The retention period for the replicated automated backups.
        KmsKeyId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services KMS key identifier for encryption of the replicated automated backups. The KMS key ID is the Amazon Resource Name (ARN) for the KMS encryption key in the destination Amazon Web Services Region, for example, arn:aws:kms:us-east-1:123456789012:key/AKIAIOSFODNN7EXAMPLE.
        PreSignedUrl:
          $ref: "#/components/schemas/SensitiveString"
          description: "In an Amazon Web Services GovCloud (US) Region, an URL that contains a Signature Version 4 signed request for the StartDBInstanceAutomatedBackupsReplication operation to call in the Amazon Web Services Region of the source DB instance. The presigned URL must be a valid request for the StartDBInstanceAutomatedBackupsReplication API operation that can run in the Amazon Web Services Region that contains the source DB instance. This setting applies only to Amazon Web Services GovCloud (US) Regions. It's ignored in other Amazon Web Services Regions. To learn how to generate a Signature Version 4 signed request, see Authenticating Requests: Using Query Parameters (Amazon Web Services Signature Version 4) and Signature Version 4 Signing Process. If you are using an Amazon Web Services SDK tool or the CLI, you can specify SourceRegion (or --source-region for the CLI) instead of specifying PreSignedUrl manually. Specifying SourceRegion autogenerates a presigned URL that is a valid request for the operation that can run in the source Amazon Web Services Region."
        Tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tags to associate with the replicated automated backups.
      required:
        - SourceDBInstanceArn
    StartExportTaskOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ExportTaskDisplay"
    StartExportTaskMessage:
      type: object
      properties:
        ExportTaskIdentifier:
          $ref: "#/components/schemas/String"
          description: A unique identifier for the export task. This ID isn't an identifier for the Amazon S3 bucket where the data is to be exported.
        SourceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the snapshot or cluster to export to Amazon S3.
        S3BucketName:
          $ref: "#/components/schemas/String"
          description: The name of the Amazon S3 bucket to export the snapshot or cluster data to.
        IamRoleArn:
          $ref: "#/components/schemas/String"
          description: "The name of the IAM role to use for writing to the Amazon S3 bucket when exporting a snapshot or cluster. In the IAM policy attached to your IAM role, include the following required actions to allow the transfer of files from Amazon RDS or Amazon Aurora to an S3 bucket: s3:PutObject* s3:GetObject* s3:ListBucket s3:DeleteObject* s3:GetBucketLocation In the policy, include the resources to identify the S3 bucket and objects in the bucket. The following list of resources shows the Amazon Resource Name (ARN) format for accessing S3: arn:aws:s3:::your-s3-bucket arn:aws:s3:::your-s3-bucket/*"
        KmsKeyId:
          $ref: "#/components/schemas/String"
          description: "The ID of the Amazon Web Services KMS key to use to encrypt the data exported to Amazon S3. The Amazon Web Services KMS key identifier is the key ARN, key ID, alias ARN, or alias name for the KMS key. The caller of this operation must be authorized to run the following operations. These can be set in the Amazon Web Services KMS key policy: kms:CreateGrant kms:DescribeKey"
        S3Prefix:
          $ref: "#/components/schemas/String"
          description: The Amazon S3 bucket prefix to use as the file name and path of the exported data.
        ExportOnly:
          $ref: "#/components/schemas/StringList"
          description: "The data to be exported from the snapshot or cluster. If this parameter isn't provided, all of the data is exported. Valid Values: database - Export all the data from a specified database. database.table table-name - Export a table of the snapshot or cluster. This format is valid only for RDS for MySQL, RDS for MariaDB, and Aurora MySQL. database.schema schema-name - Export a database schema of the snapshot or cluster. This format is valid only for RDS for PostgreSQL and Aurora PostgreSQL. database.schema.table table-name - Export a table of the database schema. This format is valid only for RDS for PostgreSQL and Aurora PostgreSQL."
      required:
        - ExportTaskIdentifier
        - SourceArn
        - S3BucketName
        - IamRoleArn
        - KmsKeyId
    StopActivityStreamResponseDisplay:
      type: object
      properties:
        KmsKeyId:
          type: string
          description: The Amazon Web Services KMS key identifier used for encrypting messages in the database activity stream. The Amazon Web Services KMS key identifier is the key ARN, key ID, alias ARN, or alias name for the KMS key.
        KinesisStreamName:
          type: string
          description: The name of the Amazon Kinesis data stream used for the database activity stream.
        Status:
          type: string
          description: The status of the database activity stream.
    StopActivityStreamOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/StopActivityStreamResponseDisplay"
    StopActivityStreamRequest:
      type: object
      properties:
        ResourceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the DB cluster for the database activity stream. For example, arn:aws:rds:us-east-1:12345667890:cluster:das-cluster.
        ApplyImmediately:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether or not the database activity stream is to stop as soon as possible, regardless of the maintenance window for the database.
      required:
        - ResourceArn
    StopDBClusterOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterDisplay"
    StopDBClusterMessage:
      type: object
      properties:
        DBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: The DB cluster identifier of the Amazon Aurora DB cluster to be stopped. This parameter is stored as a lowercase string.
      required:
        - DBClusterIdentifier
    StopDBInstanceOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBInstanceDisplay"
    StopDBInstanceMessage:
      type: object
      properties:
        DBInstanceIdentifier:
          $ref: "#/components/schemas/String"
          description: The user-supplied instance identifier.
        DBSnapshotIdentifier:
          $ref: "#/components/schemas/String"
          description: The user-supplied instance identifier of the DB Snapshot created immediately before the DB instance is stopped.
      required:
        - DBInstanceIdentifier
    StopDBInstanceAutomatedBackupsReplicationOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBInstanceAutomatedBackupDisplay"
    StopDBInstanceAutomatedBackupsReplicationMessage:
      type: object
      properties:
        SourceDBInstanceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the source DB instance for which to stop replicating automate backups, for example, arn:aws:rds:us-west-2:123456789012:db:mydatabase.
      required:
        - SourceDBInstanceArn
    SwitchoverTimeout:
      type: integer
      minimum: 30
    SwitchoverBlueGreenDeploymentOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/BlueGreenDeploymentDisplay"
    SwitchoverBlueGreenDeploymentRequest:
      type: object
      properties:
        BlueGreenDeploymentIdentifier:
          $ref: "#/components/schemas/BlueGreenDeploymentIdentifier"
          description: "The resource ID of the blue/green deployment. Constraints: Must match an existing blue/green deployment resource ID."
        SwitchoverTimeout:
          $ref: "#/components/schemas/SwitchoverTimeout"
          description: "The amount of time, in seconds, for the switchover to complete. Default: 300 If the switchover takes longer than the specified duration, then any changes are rolled back, and no changes are made to the environments."
      required:
        - BlueGreenDeploymentIdentifier
    SwitchoverGlobalClusterOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/GlobalClusterDisplay"
    SwitchoverGlobalClusterMessage:
      type: object
      properties:
        GlobalClusterIdentifier:
          $ref: "#/components/schemas/GlobalClusterIdentifier"
          description: "The identifier of the global database cluster to switch over. This parameter isn't case-sensitive. Constraints: Must match the identifier of an existing global database cluster (Aurora global database)."
        TargetDbClusterIdentifier:
          $ref: "#/components/schemas/DBClusterIdentifier"
          description: The identifier of the secondary Aurora DB cluster to promote to the new primary for the global database cluster. Use the Amazon Resource Name (ARN) for the identifier so that Aurora can locate the cluster in its Amazon Web Services Region.
      required:
        - GlobalClusterIdentifier
        - TargetDbClusterIdentifier
    SwitchoverReadReplicaOutputDisplay:
      type: object
