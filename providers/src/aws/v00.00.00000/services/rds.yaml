            $ref: "#/components/schemas/DBSnapshotAttributesResultDisplay"
    ModifyDBSnapshotAttributeMessage:
      type: object
      properties:
        DBSnapshotIdentifier:
          $ref: "#/components/schemas/String"
          description: The identifier for the DB snapshot to modify the attributes for.
        AttributeName:
          $ref: "#/components/schemas/String"
          description: The name of the DB snapshot attribute to modify. To manage authorization for other Amazon Web Services accounts to copy or restore a manual DB snapshot, set this value to restore. To view the list of attributes available to modify, use the DescribeDBSnapshotAttributes API operation.
        ValuesToAdd:
          $ref: "#/components/schemas/AttributeValueList"
          description: A list of DB snapshot attributes to add to the attribute specified by AttributeName. To authorize other Amazon Web Services accounts to copy or restore a manual snapshot, set this list to include one or more Amazon Web Services account IDs, or all to make the manual DB snapshot restorable by any Amazon Web Services account. Do not add the all value for any manual DB snapshots that contain private information that you don't want available to all Amazon Web Services accounts.
        ValuesToRemove:
          $ref: "#/components/schemas/AttributeValueList"
          description: A list of DB snapshot attributes to remove from the attribute specified by AttributeName. To remove authorization for other Amazon Web Services accounts to copy or restore a manual snapshot, set this list to include one or more Amazon Web Services account identifiers, or all to remove authorization for any Amazon Web Services account to copy or restore the DB snapshot. If you specify all, an Amazon Web Services account whose account ID is explicitly added to the restore attribute can still copy or restore the manual DB snapshot.
      required:
        - DBSnapshotIdentifier
        - AttributeName
