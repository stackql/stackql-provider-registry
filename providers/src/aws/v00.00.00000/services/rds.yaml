          in: query
          required: false
          description: "The type of DB snapshots to be returned. You can specify one of the following values: automated – All DB snapshots that have been automatically taken by Amazon RDS for my Amazon Web Services account. manual – All DB snapshots that have been taken by my Amazon Web Services account. shared – All manual DB snapshots that have been shared to my Amazon Web Services account. public – All DB snapshots that have been marked as public. awsbackup – All DB snapshots managed by the Amazon Web Services Backup service."
