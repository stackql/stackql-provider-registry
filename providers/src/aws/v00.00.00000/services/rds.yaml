    DBShardGroupDisplay:
      type: object
      properties:
        DBShardGroupResourceId:
          type: string
          description: The Amazon Web Services Region-unique, immutable identifier for the DB shard group.
        DBShardGroupIdentifier:
          type: string
          description: The name of the DB shard group.
        DBClusterIdentifier:
          type: string
          description: The name of the primary DB cluster for the DB shard group.
        MaxACU:
          type: number
          description: The maximum capacity of the DB shard group in Aurora capacity units (ACUs).
        MinACU:
          type: number
          description: The minimum capacity of the DB shard group in Aurora capacity units (ACUs).
        ComputeRedundancy:
          type: integer
          description: "Specifies whether to create standby DB shard groups for the DB shard group. Valid values are the following: 0 - Creates a DB shard group without a standby DB shard group. This is the default value. 1 - Creates a DB shard group with a standby DB shard group in a different Availability Zone (AZ). 2 - Creates a DB shard group with two standby DB shard groups in two different AZs."
        Status:
          type: string
          description: The status of the DB shard group.
        PubliclyAccessible:
          type: boolean
          description: Indicates whether the DB shard group is publicly accessible. When the DB shard group is publicly accessible, its Domain Name System (DNS) endpoint resolves to the private IP address from within the DB shard group's virtual private cloud (VPC). It resolves to the public IP address from outside of the DB shard group's VPC. Access to the DB shard group is ultimately controlled by the security group it uses. That public access isn't permitted if the security group assigned to the DB shard group doesn't permit it. When the DB shard group isn't publicly accessible, it is an internal DB shard group with a DNS name that resolves to a private IP address. For more information, see CreateDBShardGroup. This setting is only for Aurora Limitless Database.
        Endpoint:
          type: string
          description: The connection endpoint for the DB shard group.
        DBShardGroupArn:
          type: string
          description: The Amazon Resource Name (ARN) for the DB shard group.
        TagList:
          type: string
          description: A list of tags. For more information, see Tagging Amazon RDS resources in the Amazon RDS User Guide or Tagging Amazon Aurora and Amazon RDS resources in the Amazon Aurora User Guide.
    CreateDBShardGroupOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBShardGroupDisplay"
    CreateDBShardGroupMessage:
      type: object
      properties:
        DBShardGroupIdentifier:
          $ref: "#/components/schemas/String"
          description: The name of the DB shard group.
        DBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: The name of the primary DB cluster for the DB shard group.
        ComputeRedundancy:
          $ref: "#/components/schemas/IntegerOptional"
          description: "Specifies whether to create standby standby DB data access shard for the DB shard group. Valid values are the following: 0 - Creates a DB shard group without a standby DB data access shard. This is the default value. 1 - Creates a DB shard group with a standby DB data access shard in a different Availability Zone (AZ). 2 - Creates a DB shard group with two standby DB data access shard in two different AZs."
        MaxACU:
          $ref: "#/components/schemas/DoubleOptional"
          description: The maximum capacity of the DB shard group in Aurora capacity units (ACUs).
        MinACU:
          $ref: "#/components/schemas/DoubleOptional"
          description: The minimum capacity of the DB shard group in Aurora capacity units (ACUs).
        PubliclyAccessible:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether the DB shard group is publicly accessible. When the DB shard group is publicly accessible, its Domain Name System (DNS) endpoint resolves to the private IP address from within the DB shard group's virtual private cloud (VPC). It resolves to the public IP address from outside of the DB shard group's VPC. Access to the DB shard group is ultimately controlled by the security group it uses. That public access is not permitted if the security group assigned to the DB shard group doesn't permit it. When the DB shard group isn't publicly accessible, it is an internal DB shard group with a DNS name that resolves to a private IP address. Default: The default behavior varies depending on whether DBSubnetGroupName is specified. If DBSubnetGroupName isn't specified, and PubliclyAccessible isn't specified, the following applies: If the default VPC in the target Region doesn’t have an internet gateway attached to it, the DB shard group is private. If the default VPC in the target Region has an internet gateway attached to it, the DB shard group is public. If DBSubnetGroupName is specified, and PubliclyAccessible isn't specified, the following applies: If the subnets are part of a VPC that doesn’t have an internet gateway attached to it, the DB shard group is private. If the subnets are part of a VPC that has an internet gateway attached to it, the DB shard group is public."
        Tags:
          $ref: "#/components/schemas/TagList"
      required:
        - DBShardGroupIdentifier
        - DBClusterIdentifier
        - MaxACU
