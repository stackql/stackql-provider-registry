            $ref: "#/components/schemas/DBInstanceDisplay"
    PromoteReadReplicaMessage:
      type: object
      properties:
        DBInstanceIdentifier:
          $ref: "#/components/schemas/String"
          description: "The DB instance identifier. This value is stored as a lowercase string. Constraints: Must match the identifier of an existing read replica DB instance. Example: mydbinstance"
        BackupRetentionPeriod:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The number of days for which automated backups are retained. Setting this parameter to a positive number enables backups. Setting this parameter to 0 disables automated backups. Default: 1 Constraints: Must be a value from 0 to 35. Can't be set to 0 if the DB instance is a source to read replicas."
        PreferredBackupWindow:
          $ref: "#/components/schemas/String"
          description: "The daily time range during which automated backups are created if automated backups are enabled, using the BackupRetentionPeriod parameter. The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Web Services Region. To see the time blocks available, see Adjusting the Preferred Maintenance Window in the Amazon RDS User Guide. Constraints: Must be in the format hh24:mi-hh24:mi. Must be in Universal Coordinated Time (UTC). Must not conflict with the preferred maintenance window. Must be at least 30 minutes."
        TagSpecifications:
          $ref: "#/components/schemas/TagSpecificationList"
          description: "Tags to assign to resources associated with the DB instance. Valid Values: auto-backup - The DB instance's automated backup."
      required:
        - DBInstanceIdentifier
