        Endpoint:
          type: string
          description: The writer endpoint for the new global database cluster. This endpoint always points to the writer DB instance in the current primary cluster.
        FailoverState:
          type: string
          description: A data object containing all properties for the current state of an in-process or pending switchover or failover process for this global cluster (Aurora global database). This object is empty unless the SwitchoverGlobalCluster or FailoverGlobalCluster operation was called on this global cluster.
        TagList:
          type: string
          description: A list of tags. For more information, see Tagging Amazon RDS resources in the Amazon RDS User Guide or Tagging Amazon Aurora and Amazon RDS resources in the Amazon Aurora User Guide.
    CreateGlobalClusterOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/GlobalClusterDisplay"
    CreateGlobalClusterMessage:
      type: object
      properties:
        GlobalClusterIdentifier:
          $ref: "#/components/schemas/GlobalClusterIdentifier"
          description: The cluster identifier for this global database cluster. This parameter is stored as a lowercase string.
        SourceDBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "The Amazon Resource Name (ARN) to use as the primary cluster of the global database. If you provide a value for this parameter, don't specify values for the following settings because Amazon Aurora uses the values from the specified source DB cluster: DatabaseName Engine EngineVersion StorageEncrypted"
        Engine:
          $ref: "#/components/schemas/String"
          description: "The database engine to use for this global database cluster. Valid Values: aurora-mysql | aurora-postgresql Constraints: Can't be specified if SourceDBClusterIdentifier is specified. In this case, Amazon Aurora uses the engine of the source DB cluster."
        EngineVersion:
          $ref: "#/components/schemas/String"
          description: "The engine version to use for this global database cluster. Constraints: Can't be specified if SourceDBClusterIdentifier is specified. In this case, Amazon Aurora uses the engine version of the source DB cluster."
        EngineLifecycleSupport:
          $ref: "#/components/schemas/String"
          description: "The life cycle type for this global database cluster. By default, this value is set to open-source-rds-extended-support, which enrolls your global cluster into Amazon RDS Extended Support. At the end of standard support, you can avoid charges for Extended Support by setting the value to open-source-rds-extended-support-disabled. In this case, creating the global cluster will fail if the DB major version is past its end of standard support date. This setting only applies to Aurora PostgreSQL-based global databases. You can use this setting to enroll your global cluster into Amazon RDS Extended Support. With RDS Extended Support, you can run the selected major engine version on your global cluster past the end of standard support for that engine version. For more information, see Amazon RDS Extended Support with Amazon Aurora in the Amazon Aurora User Guide. Valid Values: open-source-rds-extended-support | open-source-rds-extended-support-disabled Default: open-source-rds-extended-support"
        DeletionProtection:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to enable deletion protection for the new global database cluster. The global database can't be deleted when deletion protection is enabled.
        DatabaseName:
          $ref: "#/components/schemas/String"
          description: "The name for your database of up to 64 alphanumeric characters. If you don't specify a name, Amazon Aurora doesn't create a database in the global database cluster. Constraints: Can't be specified if SourceDBClusterIdentifier is specified. In this case, Amazon Aurora uses the database name from the source DB cluster."
        StorageEncrypted:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to enable storage encryption for the new global database cluster. Constraints: Can't be specified if SourceDBClusterIdentifier is specified. In this case, Amazon Aurora uses the setting from the source DB cluster."
        Tags:
          $ref: "#/components/schemas/TagList"
          description: Tags to assign to the global cluster.
      required:
        - GlobalClusterIdentifier
    SourceArn:
      type: string
      minLength: 1
      maxLength: 255
      pattern: arn:aws[a-z\-]*:rds(-[a-z]*)?:[a-z0-9\-]*:[0-9]*:(cluster|db):[a-z][a-z0-9]*(-[a-z0-9]+)*
    IntegrationName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[a-zA-Z](?:-?[a-zA-Z0-9]+)*"
    EncryptionContextMap:
      type: object
      properties: {}
    DataFilter:
      type: string
      minLength: 1
      maxLength: 25600
      pattern: '[a-zA-Z0-9_ "\\\-$,*.:?+\/]*'
    IntegrationDescription:
      type: string
      minLength: 0
      maxLength: 1000
      pattern: .*
    IntegrationDisplay:
      type: object
      properties:
        SourceArn:
          type: string
          description: The Amazon Resource Name (ARN) of the database used as the source for replication.
        TargetArn:
          type: string
          description: The ARN of the Redshift data warehouse used as the target for replication.
        IntegrationName:
          type: string
          description: The name of the integration.
        IntegrationArn:
          type: string
          description: The ARN of the integration.
        KMSKeyId:
          type: string
          description: The Amazon Web Services Key Management System (Amazon Web Services KMS) key identifier for the key used to to encrypt the integration.
        AdditionalEncryptionContext:
          type: string
          description: The encryption context for the integration. For more information, see Encryption context in the Amazon Web Services Key Management Service Developer Guide.
        Status:
          type: string
          description: The current status of the integration.
        Tags:
          type: string
          description: A list of tags. For more information, see Tagging Amazon RDS resources in the Amazon RDS User Guide or Tagging Amazon Aurora and Amazon RDS resources in the Amazon Aurora User Guide.
        DataFilter:
          type: string
          description: Data filters for the integration. These filters determine which tables from the source database are sent to the target Amazon Redshift data warehouse.
        Description:
          type: string
          description: A description of the integration.
        CreateTime:
          type: string
          description: The time when the integration was created, in Universal Coordinated Time (UTC).
        Errors:
          type: string
          description: Any errors associated with the integration.
    CreateIntegrationOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/IntegrationDisplay"
    CreateIntegrationMessage:
      type: object
      properties:
        SourceArn:
          $ref: "#/components/schemas/SourceArn"
          description: The Amazon Resource Name (ARN) of the database to use as the source for replication.
        TargetArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the Redshift data warehouse to use as the target for replication.
        IntegrationName:
          $ref: "#/components/schemas/IntegrationName"
          description: The name of the integration.
        KMSKeyId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services Key Management System (Amazon Web Services KMS) key identifier for the key to use to encrypt the integration. If you don't specify an encryption key, RDS uses a default Amazon Web Services owned key.
        AdditionalEncryptionContext:
          type: object
          properties: {}
          description: An optional set of non-secret key–value pairs that contains additional contextual information about the data. For more information, see Encryption context in the Amazon Web Services Key Management Service Developer Guide. You can only include this parameter if you specify the KMSKeyId parameter.
        Tags:
          $ref: "#/components/schemas/TagList"
        DataFilter:
          $ref: "#/components/schemas/DataFilter"
          description: Data filtering options for the integration. For more information, see Data filtering for Aurora zero-ETL integrations with Amazon Redshift or Data filtering for Amazon RDS zero-ETL integrations with Amazon Redshift.
        Description:
          $ref: "#/components/schemas/IntegrationDescription"
          description: A description of the integration.
      required:
        - SourceArn
        - TargetArn
        - IntegrationName
    CreateOptionGroupOutputDisplay:
