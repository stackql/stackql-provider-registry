openapi: 3.0.0
info:
  version: "2016-01-14"
  title: AWSMarketplace Metering
  description: AWSMarketplace Metering
  x-serviceName: aws-marketplace
  x-serviceAlias: meteringmarketplace
  x-protocol: json
  x-apiVersion: "2016-01-14"
  x-endpointPrefix: metering.marketplace
  x-targetPrefix: AWSMPMeteringService
  x-jsonVersion: "1.1"
servers:
  - url: https://metering.marketplace.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for meteringmarketplace
paths:
  /BatchMeterUsage:
    post:
      operationId: BatchMeterUsage
      description: Amazon Web Services Marketplace is introducing Concurrent Agreements, enabling buyers to make multiple purchases per Amazon Web Services account. Starting June 1, 2026, new SaaS products must use CustomerAWSAccountId (instead of CustomerIdentifier), LicenseArn (instead of ProductCode) to support this feature. Existing integrations will continue to work. Review the new integration for Concurrent Agreements here. To post metering records for customers, SaaS applications call BatchMeterUsage, which is used for metering SaaS flexible consumption pricing (FCP). Identical requests are idempotent and can be retried with the same records or a subset of records. Each BatchMeterUsage request is for only one product. If you want to meter usage for multiple products, you must make multiple BatchMeterUsage calls. Usage records should be submitted in quick succession following a recorded event. Usage records aren't accepted 6 hours or more after an event. BatchMeterUsage can process up to 25 UsageRecords at a time, and each request must be less than 1 MB in size. Optionally, you can have multiple usage allocations for usage data that's split into buckets according to predefined tags. BatchMeterUsage returns a list of UsageRecordResult objects, which have each UsageRecord. It also returns a list of UnprocessedRecords, which indicate errors on the service side that should be retried. For Amazon Web Services Regions that support BatchMeterUsage, see BatchMeterUsage Region support. For an example of BatchMeterUsage, see BatchMeterUsage code example in the Amazon Web Services Marketplace Seller Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPMeteringService.BatchMeterUsage
            default: AWSMPMeteringService.BatchMeterUsage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                UsageRecords:
                  $ref: "#/components/schemas/UsageRecordList"
                  description: The set of UsageRecords to submit. BatchMeterUsage accepts up to 25 UsageRecords at a time.
                ProductCode:
                  $ref: "#/components/schemas/ProductCode"
                  description: Product code is used to uniquely identify a product in Amazon Web Services Marketplace. The product code should be the same as the one used during the publishing of a new product.
              required:
                - UsageRecords
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchMeterUsageResult"
  /MeterUsage:
    post:
      operationId: MeterUsage
      description: As a seller, your software hosted in the buyer's Amazon Web Services account uses this API action to emit metering records directly to Amazon Web Services Marketplace. You must use the following buyer Amazon Web Services account credentials to sign the API request. For Amazon EC2 deployments, your software must use the IAM role for Amazon EC2 to sign the API call for MeterUsage API operation. For Amazon EKS deployments, your software must use IAM roles for service accounts (IRSA) to sign the API call for the MeterUsage API operation. Using EKS Pod Identity, the node role, or long-term access keys is not supported. For Amazon ECS deployments, your software must use Amazon ECS task IAM role to sign the API call for the MeterUsage API operation. Using the node role or long-term access keys are not supported. For Amazon Bedrock AgentCore Runtime deployments, your software must use the AgentCore Runtime execution role to sign the API call for the MeterUsage API operation. Long-term access keys are not supported. The handling of MeterUsage requests varies between Amazon Bedrock AgentCore Runtime and non-Amazon Bedrock AgentCore deployments. For non-Amazon Bedrock AgentCore Runtime deployments, you can only report usage once per hour for each dimension. For AMI-based products, this is per dimension and per EC2 instance. For container products, this is per dimension and per ECS task or EKS pod. You can't modify values after they're recorded. If you report usage before a current hour ends, you will be unable to report additional usage until the next hour begins. The Timestamp request parameter is rounded down to the hour and used to enforce this once-per-hour rule for idempotency. For requests that are identical after the Timestamp is rounded down, the API is idempotent and returns the metering record ID. For Amazon Bedrock AgentCore Runtime deployments, you can report usage multiple times per hour for the same dimension. You do not need to aggregate metering records by the hour. You must include an idempotency token in the ClientToken request parameter. If using an Amazon SDK or the Amazon Web Services CLI, you must use the latest version which automatically includes an idempotency token in the ClientToken request parameter so that the request is processed successfully. The Timestamp request parameter is not rounded down to the hour and is not used for duplicate validation. Requests with duplicate Timestamps are aggregated as long as the ClientToken is unique. If you submit records more than six hours after events occur, the records won't be accepted. The timestamp in your request determines when an event is recorded. You can optionally include multiple usage allocations, to provide customers with usage data split into buckets by tags that you define or allow the customer to define. For Amazon Web Services Regions that support MeterUsage, see MeterUsage Region support for Amazon EC2 and MeterUsage Region support for Amazon ECS and Amazon EKS.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPMeteringService.MeterUsage
            default: AWSMPMeteringService.MeterUsage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProductCode:
                  $ref: "#/components/schemas/ProductCode"
                  description: Product code is used to uniquely identify a product in Amazon Web Services Marketplace. The product code should be the same as the one used during the publishing of a new product.
                Timestamp:
                  $ref: "#/components/schemas/Timestamp"
                  description: Timestamp, in UTC, for which the usage is being reported. Your application can meter usage for up to six hours in the past. Make sure the timestamp value is not before the start of the software usage.
                UsageDimension:
                  $ref: "#/components/schemas/UsageDimension"
                  description: It will be one of the fcp dimension name provided during the publishing of the product.
                UsageQuantity:
                  $ref: "#/components/schemas/UsageQuantity"
                  description: Consumption value for the hour. Defaults to 0 if not specified.
                DryRun:
                  $ref: "#/components/schemas/Boolean"
                  description: Checks whether you have the permissions required for the action, but does not make the request. If you have the permissions, the request returns DryRunOperation; otherwise, it returns UnauthorizedException. Defaults to false if not specified.
                UsageAllocations:
                  $ref: "#/components/schemas/UsageAllocations"
                  description: The set of UsageAllocations to submit. The sum of all UsageAllocation quantities must equal the UsageQuantity of the MeterUsage request, and each UsageAllocation must have a unique set of tags (include no tags).
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Specifies a unique, case-sensitive identifier that you provide to ensure the idempotency of the request. This lets you safely retry the request without accidentally performing the same operation a second time. Passing the same value to a later call to an operation requires that you also pass the same value for all other parameters. We recommend that you use a UUID type of value. If you don't provide this value, then Amazon Web Services generates a random one for you. If you retry the operation with the same ClientToken, but with different parameters, the retry fails with an IdempotencyConflictException error.
              required:
                - ProductCode
                - Timestamp
                - UsageDimension
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeterUsageResult"
  /RegisterUsage:
    post:
      operationId: RegisterUsage
      description: "Paid container software products sold through Amazon Web Services Marketplace must integrate with the Amazon Web Services Marketplace Metering Service and call the RegisterUsage operation for software entitlement and metering. Free and BYOL products for Amazon ECS or Amazon EKS aren't required to call RegisterUsage, but you may choose to do so if you would like to receive usage data in your seller reports. The sections below explain the behavior of RegisterUsage. RegisterUsage performs two primary functions: metering and entitlement. Entitlement: RegisterUsage allows you to verify that the customer running your paid software is subscribed to your product on Amazon Web Services Marketplace, enabling you to guard against unauthorized use. Your container image that integrates with RegisterUsage is only required to guard against unauthorized use at container startup, as such a CustomerNotSubscribedException or PlatformNotSupportedException will only be thrown on the initial call to RegisterUsage. Subsequent calls from the same Amazon ECS task instance (e.g. task-id) or Amazon EKS pod will not throw a CustomerNotSubscribedException, even if the customer unsubscribes while the Amazon ECS task or Amazon EKS pod is still running. Metering: RegisterUsage meters software use per ECS task, per hour, or per pod for Amazon EKS with usage prorated to the second. A minimum of 1 minute of usage applies to tasks that are short lived. For example, if a customer has a 10 node Amazon ECS or Amazon EKS cluster and a service configured as a Daemon Set, then Amazon ECS or Amazon EKS will launch a task on all 10 cluster nodes and the customer will be charged for 10 tasks. Software metering is handled by the Amazon Web Services Marketplace metering control plane—your software is not required to perform metering-specific actions other than to call RegisterUsage to commence metering. The Amazon Web Services Marketplace metering control plane will also bill customers for running ECS tasks and Amazon EKS pods, regardless of the customer's subscription state, which removes the need for your software to run entitlement checks at runtime. For containers, RegisterUsage should be called immediately at launch. If you don’t register the container within the first 6 hours of the launch, Amazon Web Services Marketplace Metering Service doesn’t provide any metering guarantees for previous months. Metering will continue, however, for the current month forward until the container ends. RegisterUsage is for metering paid hourly container products. For Amazon Web Services Regions that support RegisterUsage, see RegisterUsage Region support."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPMeteringService.RegisterUsage
            default: AWSMPMeteringService.RegisterUsage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProductCode:
                  $ref: "#/components/schemas/ProductCode"
                  description: Product code is used to uniquely identify a product in Amazon Web Services Marketplace. The product code should be the same as the one used during the publishing of a new product.
                PublicKeyVersion:
                  $ref: "#/components/schemas/VersionInteger"
                  description: Public Key Version provided by Amazon Web Services Marketplace
                Nonce:
                  $ref: "#/components/schemas/Nonce"
                  description: (Optional) To scope down the registration to a specific running software instance and guard against replay attacks.
              required:
                - ProductCode
                - PublicKeyVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterUsageResult"
  /ResolveCustomer:
    post:
      operationId: ResolveCustomer
      description: ResolveCustomer is called by a SaaS application during the registration process. When a buyer visits your website during the registration process, the buyer submits a registration token through their browser. The registration token is resolved through this API to obtain a CustomerIdentifier along with the CustomerAWSAccountId, ProductCode, and LicenseArn. To successfully resolve the token, the API must be called from the account that was used to publish the SaaS application. For an example of using ResolveCustomer, see ResolveCustomer code example in the Amazon Web Services Marketplace Seller Guide. Permission is required for this operation. Your IAM role or user performing this operation requires a policy to allow the aws-marketplace:ResolveCustomer action. For more information, see Actions, resources, and condition keys for Amazon Web Services Marketplace Metering Service in the Service Authorization Reference. For Amazon Web Services Regions that support ResolveCustomer, see ResolveCustomer Region support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMPMeteringService.ResolveCustomer
            default: AWSMPMeteringService.ResolveCustomer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RegistrationToken:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: When a buyer visits your website during the registration process, the buyer submits a registration token through the browser. The registration token is resolved to obtain a CustomerIdentifier along with the CustomerAWSAccountId, ProductCode, and LicenseArn.
              required:
                - RegistrationToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveCustomerResult"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    UsageRecordList:
      type: array
      items:
        $ref: "#/components/schemas/UsageRecord"
    UsageRecord:
      description: A UsageRecord indicates a quantity of usage for a given product, customer, dimension and time. Multiple requests with the same UsageRecords as input will be de-duplicated to prevent double charges.
      type: object
      properties:
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: Timestamp, in UTC, for which the usage is being reported. Your application can meter usage for up to six hours in the past. Make sure the timestamp value is not before the start of the software usage.
        CustomerIdentifier:
          $ref: "#/components/schemas/CustomerIdentifier"
          description: The CustomerIdentifier is obtained through the ResolveCustomer operation and represents an individual buyer in your application.
        Dimension:
          $ref: "#/components/schemas/UsageDimension"
          description: During the process of registering a product on Amazon Web Services Marketplace, dimensions are specified. These represent different units of value in your application.
        Quantity:
          $ref: "#/components/schemas/UsageQuantity"
          description: The quantity of usage consumed by the customer for the given dimension and time. Defaults to 0 if not specified.
        UsageAllocations:
          $ref: "#/components/schemas/UsageAllocations"
          description: The set of UsageAllocations to submit. The sum of all UsageAllocation quantities must equal the Quantity of the UsageRecord.
        CustomerAWSAccountId:
          $ref: "#/components/schemas/CustomerAWSAccountId"
          description: The CustomerAWSAccountId parameter specifies the AWS account ID of the buyer. For existing integrations, to access your CustomerIdentifier to CustomerAWSAccountId mapping, see Account Feeds.
        LicenseArn:
          $ref: "#/components/schemas/LicenseArn"
          description: The LicenseArn is a unique identifier for a specific granted license. These are used for software purchased through Amazon Web Services Marketplace. To access your CustomerAWSAccountId and LicenseArn mapping, visit Agreements Feeds.
      required:
        - Timestamp
        - Dimension
    Timestamp:
      type: string
      format: date-time
    CustomerIdentifier:
      type: string
      minLength: 0
      maxLength: 255
      pattern: "[\\s\\S]*"
    UsageDimension:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\s\\S]+"
    UsageQuantity:
      type: integer
      minimum: 0
      maximum: 2147483647
    UsageAllocations:
      type: array
      items:
        $ref: "#/components/schemas/UsageAllocation"
    UsageAllocation:
      description: Usage allocations allow you to split usage into buckets by tags. Each UsageAllocation indicates the usage quantity for a specific set of tags.
      type: object
      properties:
        AllocatedUsageQuantity:
          $ref: "#/components/schemas/AllocatedUsageQuantity"
          description: The total quantity allocated to this bucket of usage.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The set of tags that define the bucket of usage. For the bucket of items with no tags, this parameter can be left out.
      required:
        - AllocatedUsageQuantity
    AllocatedUsageQuantity:
      type: integer
      minimum: 0
      maximum: 2147483647
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Metadata assigned to an allocation. Each tag is made up of a key and a value.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: One part of a key-value pair that makes up a tag. A key is a label that acts like a category for the specific tag values.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: One part of a key-value pair that makes up a tag. A value acts as a descriptor within a tag category (key). The value can be empty or null.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[a-zA-Z0-9+ -=._:\/@]+$
    TagValue:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^[a-zA-Z0-9+ -=._:\/@]+$
    CustomerAWSAccountId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[0-9]+$
    LicenseArn:
      type: string
      pattern: ^arn:aws[a-zA-Z-]*:[A-Za-z0-9][A-Za-z0-9_/.-]{0,62}:[A-Za-z0-9_/.-]{0,63}:[A-Za-z0-9_/.-]{0,63}:[A-Za-z0-9][A-Za-z0-9:_/+=,@.-]{0,1023}$
    ProductCode:
      type: string
      minLength: 0
      maxLength: 255
      pattern: ^[-a-zA-Z0-9/=:_.@]*$
    BatchMeterUsageResult:
      description: Contains the UsageRecords processed by BatchMeterUsage and any records that have failed due to transient error.
      type: object
      properties:
        Results:
          $ref: "#/components/schemas/UsageRecordResultList"
          description: Contains all UsageRecords processed by BatchMeterUsage. These records were either honored by Amazon Web Services Marketplace Metering Service or were invalid. Invalid records should be fixed before being resubmitted.
        UnprocessedRecords:
          $ref: "#/components/schemas/UsageRecordList"
          description: Contains all UsageRecords that were not processed by BatchMeterUsage. This is a list of UsageRecords. You can retry the failed request by making another BatchMeterUsage call with this list as input in the BatchMeterUsageRequest.
    UsageRecordResultList:
      type: array
      items:
        $ref: "#/components/schemas/UsageRecordResult"
    UsageRecordResult:
      description: A UsageRecordResult indicates the status of a given UsageRecord processed by BatchMeterUsage.
      type: object
      properties:
        UsageRecord:
          $ref: "#/components/schemas/UsageRecord"
          description: The UsageRecord that was part of the BatchMeterUsage request.
        MeteringRecordId:
          $ref: "#/components/schemas/String"
          description: The MeteringRecordId is a unique identifier for this metering event.
        Status:
          $ref: "#/components/schemas/UsageRecordResultStatus"
          description: "The UsageRecordResult Status indicates the status of an individual UsageRecord processed by BatchMeterUsage. Success- The UsageRecord was accepted and honored by BatchMeterUsage. CustomerNotSubscribed- The CustomerIdentifier specified is not able to use your product. The UsageRecord was not honored. There are three causes for this result: The customer identifier is invalid. The customer identifier provided in the metering record does not have an active agreement or subscription with this product. Future UsageRecords for this customer will fail until the customer subscribes to your product. The customer's Amazon Web Services account was suspended. DuplicateRecord- Indicates that the UsageRecord was invalid and not honored. A previously metered UsageRecord had the same customer, dimension, and time, but a different quantity."
    String:
      type: string
    UsageRecordResultStatus:
      type: string
      enum:
        - Success
        - CustomerNotSubscribed
        - DuplicateRecord
    Boolean:
      type: boolean
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
    MeterUsageResult:
      type: object
      properties:
        MeteringRecordId:
          $ref: "#/components/schemas/String"
          description: Metering record id.
    VersionInteger:
      type: integer
      minimum: 1
    Nonce:
      type: string
      maxLength: 255
      pattern: "[\\s\\S]*"
    RegisterUsageResult:
      type: object
      properties:
        PublicKeyRotationTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: (Optional) Only included when public key version has expired
        Signature:
          $ref: "#/components/schemas/NonEmptyString"
          description: JWT Token
    NonEmptyString:
      type: string
      pattern: "[\\s\\S]+"
    ResolveCustomerResult:
      description: The result of the ResolveCustomer operation. Contains the CustomerIdentifier along with the CustomerAWSAccountId, ProductCode, and LicenseArn.
      type: object
      properties:
        CustomerIdentifier:
          $ref: "#/components/schemas/CustomerIdentifier"
          description: The CustomerIdentifier is used to identify an individual customer in your application.
        ProductCode:
          $ref: "#/components/schemas/ProductCode"
          description: The product code is returned to confirm that the buyer is registering for your product. Subsequent BatchMeterUsage calls should be made using this product code.
        CustomerAWSAccountId:
          $ref: "#/components/schemas/CustomerAWSAccountId"
          description: The CustomerAWSAccountId provides the Amazon Web Services account ID associated with the CustomerIdentifier for the individual customer. Calls to BatchMeterUsage require CustomerAWSAccountId for each UsageRecord.
        LicenseArn:
          $ref: "#/components/schemas/LicenseArn"
          description: The LicenseArn is a unique identifier for a specific granted license. These are typically used for software purchased through Amazon Web Services Marketplace. Calls to BatchMeterUsage require LicenseArn for each UsageRecord. Once you receive the CustomerAWSAccountId and LicenseArn in the response, store that for future purposes/API calls/integrations.
  x-stackQL-resources:
    usages:
      id: aws.meteringmarketplace.usages
      name: usages
      title: usages
      methods:
        register_usage:
          operation:
            $ref: "#/paths/~1RegisterUsage/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select: []
        insert:
          - $ref: "#/components/x-stackQL-resources/usages/methods/register_usage"
        update: []
        delete: []
