openapi: 3.0.0
info:
  version: "2020-03-31"
  title: AWS Well-Architected Tool
  description: AWS Well-Architected Tool
  x-serviceName: wellarchitected
  x-serviceAlias: wellarchitected
  x-protocol: rest-json
  x-apiVersion: "2020-03-31"
  x-endpointPrefix: wellarchitected
  x-jsonVersion: "1.1"
servers:
  - url: https://wellarchitected.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for wellarchitected
paths:
  /workloads/{workload_id}/associateLenses:
    patch:
      operationId: AssociateLenses
      description: Associate a lens to a workload. Up to 10 lenses can be associated with a workload in a single API operation. A maximum of 20 lenses can be associated with a workload. Disclaimer By accessing and/or applying custom lenses created by another Amazon Web Services user or account, you acknowledge that custom lenses created by other users and shared with you are Third Party Content as defined in the Amazon Web Services Customer Agreement.
      parameters:
        - name: workload_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkloadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                LensAliases:
                  $ref: "#/components/schemas/LensAliases"
              required:
                - LensAliases
      responses:
        "200":
          description: Success
  /workloads/{workload_id}/associateProfiles:
    patch:
      operationId: AssociateProfiles
      description: Associate a profile with a workload.
      parameters:
        - name: workload_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkloadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ProfileArns:
                  $ref: "#/components/schemas/ProfileArns"
              required:
                - ProfileArns
      responses:
        "200":
          description: Success
  /lenses/{lens_alias}/shares:
    post:
      operationId: CreateLensShare
      description: Create a lens share. The owner of a lens can share it with other Amazon Web Services accounts, users, an organization, and organizational units (OUs) in the same Amazon Web Services Region. Lenses provided by Amazon Web Services (Amazon Web Services Official Content) cannot be shared. Shared access to a lens is not removed until the lens invitation is deleted. If you share a lens with an organization or OU, all accounts in the organization or OU are granted access to the lens. For more information, see Sharing a custom lens in the Well-Architected Tool User Guide. Disclaimer By sharing your custom lenses with other Amazon Web Services accounts, you acknowledge that Amazon Web Services will make your custom lenses available to those other accounts. Those other accounts may continue to access and use your shared custom lenses even if you delete the custom lenses from your own Amazon Web Services account or terminate your Amazon Web Services account.
      parameters:
        - name: lens_alias
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LensAlias"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SharedWith:
                  $ref: "#/components/schemas/SharedWith"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - SharedWith
                - ClientRequestToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLensShareOutput"
    get:
      operationId: ListLensShares
      description: List the lens shares associated with the lens.
      parameters:
        - name: lens_alias
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LensAlias"
        - name: SharedWithPrefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SharedWithPrefix"
          description: The Amazon Web Services account ID, organization ID, or organizational unit (OU) ID with which the lens is shared.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListWorkloadSharesMaxResults"
          description: The maximum number of results to return for this request.
        - name: Status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ShareStatus"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLensSharesOutput"
  /lenses/{lens_alias}/versions:
    post:
      operationId: CreateLensVersion
      description: Create a new lens version. A lens can have up to 100 versions. Use this operation to publish a new lens version after you have imported a lens. The LensAlias is used to identify the lens to be published. The owner of a lens can share the lens with other Amazon Web Services accounts and users in the same Amazon Web Services Region. Only the owner of a lens can delete it.
      parameters:
        - name: lens_alias
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LensAlias"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                LensVersion:
                  $ref: "#/components/schemas/LensVersion"
                IsMajorVersion:
                  $ref: "#/components/schemas/IsMajorVersion"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - LensVersion
                - ClientRequestToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLensVersionOutput"
  /workloads/{workload_id}/milestones:
    post:
      operationId: CreateMilestone
      description: Create a milestone for an existing workload.
      parameters:
        - name: workload_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkloadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MilestoneName:
                  $ref: "#/components/schemas/MilestoneName"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - MilestoneName
                - ClientRequestToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMilestoneOutput"
  /profiles:
    post:
      operationId: CreateProfile
      description: Create a profile.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ProfileName:
                  $ref: "#/components/schemas/ProfileName"
                ProfileDescription:
                  $ref: "#/components/schemas/ProfileDescription"
                ProfileQuestions:
                  $ref: "#/components/schemas/ProfileQuestionUpdates"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - ProfileName
                - ProfileDescription
                - ProfileQuestions
                - ClientRequestToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProfileOutput"
  /profiles/{profile_arn}/shares:
    post:
      operationId: CreateProfileShare
      description: Create a profile share.
      parameters:
        - name: profile_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfileArn"
          description: The profile ARN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SharedWith:
                  $ref: "#/components/schemas/SharedWith"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - SharedWith
                - ClientRequestToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProfileShareOutput"
    get:
      operationId: ListProfileShares
      description: List profile shares.
      parameters:
        - name: profile_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfileArn"
          description: The profile ARN.
        - name: SharedWithPrefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SharedWithPrefix"
          description: The Amazon Web Services account ID, organization ID, or organizational unit (OU) ID with which the profile is shared.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListProfileSharesMaxResults"
          description: The maximum number of results to return for this request.
        - name: Status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ShareStatus"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProfileSharesOutput"
  /reviewTemplates:
    post:
      operationId: CreateReviewTemplate
      description: "Create a review template. Disclaimer Do not include or gather personal identifiable information (PII) of end users or other identifiable individuals in or via your review templates. If your review template or those shared with you and used in your account do include or collect PII you are responsible for: ensuring that the included PII is processed in accordance with applicable law, providing adequate privacy notices, and obtaining necessary consents for processing such data."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TemplateName:
                  $ref: "#/components/schemas/TemplateName"
                Description:
                  $ref: "#/components/schemas/TemplateDescription"
                Lenses:
                  $ref: "#/components/schemas/ReviewTemplateLenses"
                Notes:
                  $ref: "#/components/schemas/Notes"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - TemplateName
                - Description
                - Lenses
                - ClientRequestToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReviewTemplateOutput"
    get:
      operationId: ListReviewTemplates
      description: List review templates.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReviewTemplatesOutput"
  /templates/shares/{template_arn}:
    post:
      operationId: CreateTemplateShare
      description: Create a review template share. The owner of a review template can share it with other Amazon Web Services accounts, users, an organization, and organizational units (OUs) in the same Amazon Web Services Region. Shared access to a review template is not removed until the review template share invitation is deleted. If you share a review template with an organization or OU, all accounts in the organization or OU are granted access to the review template. Disclaimer By sharing your review template with other Amazon Web Services accounts, you acknowledge that Amazon Web Services will make your review template available to those other accounts.
      parameters:
        - name: template_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateArn"
          description: The review template ARN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SharedWith:
                  $ref: "#/components/schemas/SharedWith"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - SharedWith
                - ClientRequestToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTemplateShareOutput"
    get:
      operationId: ListTemplateShares
      description: List review template shares.
      parameters:
        - name: template_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateArn"
          description: The review template ARN.
        - name: SharedWithPrefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SharedWithPrefix"
          description: The Amazon Web Services account ID, organization ID, or organizational unit (OU) ID with which the profile is shared.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListTemplateSharesMaxResults"
          description: The maximum number of results to return for this request.
        - name: Status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ShareStatus"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTemplateSharesOutput"
  /workloads:
    post:
      operationId: CreateWorkload
      description: "Create a new workload. The owner of a workload can share the workload with other Amazon Web Services accounts, users, an organization, and organizational units (OUs) in the same Amazon Web Services Region. Only the owner of a workload can delete it. For more information, see Defining a Workload in the Well-Architected Tool User Guide. Either AwsRegions, NonAwsRegions, or both must be specified when creating a workload. You also must specify ReviewOwner, even though the parameter is listed as not being required in the following section. When creating a workload using a review template, you must have the following IAM permissions: wellarchitected:GetReviewTemplate wellarchitected:GetReviewTemplateAnswer wellarchitected:ListReviewTemplateAnswers wellarchitected:GetReviewTemplateLensReview"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                WorkloadName:
                  $ref: "#/components/schemas/WorkloadName"
                Description:
                  $ref: "#/components/schemas/WorkloadDescription"
                Environment:
                  $ref: "#/components/schemas/WorkloadEnvironment"
                AccountIds:
                  $ref: "#/components/schemas/WorkloadAccountIds"
                AwsRegions:
                  $ref: "#/components/schemas/WorkloadAwsRegions"
                NonAwsRegions:
                  $ref: "#/components/schemas/WorkloadNonAwsRegions"
                PillarPriorities:
                  $ref: "#/components/schemas/WorkloadPillarPriorities"
                ArchitecturalDesign:
                  $ref: "#/components/schemas/WorkloadArchitecturalDesign"
                ReviewOwner:
                  $ref: "#/components/schemas/WorkloadReviewOwner"
                IndustryType:
                  $ref: "#/components/schemas/WorkloadIndustryType"
                Industry:
                  $ref: "#/components/schemas/WorkloadIndustry"
                Lenses:
                  $ref: "#/components/schemas/WorkloadLenses"
                Notes:
                  $ref: "#/components/schemas/Notes"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                DiscoveryConfig:
                  $ref: "#/components/schemas/WorkloadDiscoveryConfig"
                Applications:
                  $ref: "#/components/schemas/WorkloadApplications"
                ProfileArns:
                  $ref: "#/components/schemas/WorkloadProfileArns"
                ReviewTemplateArns:
                  $ref: "#/components/schemas/ReviewTemplateArns"
                JiraConfiguration:
                  $ref: "#/components/schemas/WorkloadJiraConfigurationInput"
              required:
                - WorkloadName
                - Description
                - Environment
                - Lenses
                - ClientRequestToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkloadOutput"
  /workloads/{workload_id}/shares:
    post:
      operationId: CreateWorkloadShare
      description: Create a workload share. The owner of a workload can share it with other Amazon Web Services accounts and users in the same Amazon Web Services Region. Shared access to a workload is not removed until the workload invitation is deleted. If you share a workload with an organization or OU, all accounts in the organization or OU are granted access to the workload. For more information, see Sharing a workload in the Well-Architected Tool User Guide.
      parameters:
        - name: workload_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkloadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SharedWith:
                  $ref: "#/components/schemas/SharedWith"
                PermissionType:
                  $ref: "#/components/schemas/PermissionType"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - SharedWith
                - PermissionType
                - ClientRequestToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkloadShareOutput"
    get:
      operationId: ListWorkloadShares
      description: List the workload shares associated with the workload.
      parameters:
        - name: workload_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkloadId"
        - name: SharedWithPrefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SharedWithPrefix"
          description: The Amazon Web Services account ID, organization ID, or organizational unit (OU) ID with which the workload is shared.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListWorkloadSharesMaxResults"
          description: The maximum number of results to return for this request.
        - name: Status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ShareStatus"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkloadSharesOutput"
  /lenses/{lens_alias}:
    delete:
      operationId: DeleteLens
      description: Delete an existing lens. Only the owner of a lens can delete it. After the lens is deleted, Amazon Web Services accounts and users that you shared the lens with can continue to use it, but they will no longer be able to apply it to new workloads. Disclaimer By sharing your custom lenses with other Amazon Web Services accounts, you acknowledge that Amazon Web Services will make your custom lenses available to those other accounts. Those other accounts may continue to access and use your shared custom lenses even if you delete the custom lenses from your own Amazon Web Services account or terminate your Amazon Web Services account.
      parameters:
        - name: lens_alias
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LensAlias"
        - name: ClientRequestToken
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ClientRequestToken"
        - name: LensStatus
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/LensStatusType"
          description: The status of the lens to be deleted.
      responses:
        "200":
          description: Success
    get:
      operationId: GetLens
      description: Get an existing lens.
      parameters:
        - name: lens_alias
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LensAlias"
        - name: LensVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LensVersion"
          description: The lens version to be retrieved.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLensOutput"
  /lenses/{lens_alias}/shares/{share_id}:
    delete:
      operationId: DeleteLensShare
      description: Delete a lens share. After the lens share is deleted, Amazon Web Services accounts, users, organizations, and organizational units (OUs) that you shared the lens with can continue to use it, but they will no longer be able to apply it to new workloads. Disclaimer By sharing your custom lenses with other Amazon Web Services accounts, you acknowledge that Amazon Web Services will make your custom lenses available to those other accounts. Those other accounts may continue to access and use your shared custom lenses even if you delete the custom lenses from your own Amazon Web Services account or terminate your Amazon Web Services account.
      parameters:
        - name: share_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ShareId"
        - name: lens_alias
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LensAlias"
        - name: ClientRequestToken
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ClientRequestToken"
      responses:
        "200":
          description: Success
  /profiles/{profile_arn}:
    delete:
      operationId: DeleteProfile
      description: Delete a profile. Disclaimer By sharing your profile with other Amazon Web Services accounts, you acknowledge that Amazon Web Services will make your profile available to those other accounts. Those other accounts may continue to access and use your shared profile even if you delete the profile from your own Amazon Web Services account or terminate your Amazon Web Services account.
      parameters:
        - name: profile_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfileArn"
          description: The profile ARN.
        - name: ClientRequestToken
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ClientRequestToken"
      responses:
        "200":
          description: Success
    get:
      operationId: GetProfile
      description: Get profile information.
      parameters:
        - name: profile_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfileArn"
          description: The profile ARN.
        - name: ProfileVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProfileVersion"
          description: The profile version.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProfileOutput"
    patch:
      operationId: UpdateProfile
      description: Update a profile.
      parameters:
        - name: profile_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfileArn"
          description: The profile ARN.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ProfileDescription:
                  $ref: "#/components/schemas/ProfileDescription"
                ProfileQuestions:
                  $ref: "#/components/schemas/ProfileQuestionUpdates"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProfileOutput"
  /profiles/{profile_arn}/shares/{share_id}:
    delete:
      operationId: DeleteProfileShare
      description: Delete a profile share.
      parameters:
        - name: share_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ShareId"
        - name: profile_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfileArn"
          description: The profile ARN.
        - name: ClientRequestToken
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ClientRequestToken"
      responses:
        "200":
          description: Success
  /reviewTemplates/{template_arn}:
    delete:
      operationId: DeleteReviewTemplate
      description: Delete a review template. Only the owner of a review template can delete it. After the review template is deleted, Amazon Web Services accounts, users, organizations, and organizational units (OUs) that you shared the review template with will no longer be able to apply it to new workloads.
      parameters:
        - name: template_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateArn"
          description: The review template ARN.
        - name: ClientRequestToken
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ClientRequestToken"
      responses:
        "200":
          description: Success
    get:
      operationId: GetReviewTemplate
      description: Get review template.
      parameters:
        - name: template_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateArn"
          description: The review template ARN.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetReviewTemplateOutput"
    patch:
      operationId: UpdateReviewTemplate
      description: Update a review template.
      parameters:
        - name: template_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateArn"
          description: The review template ARN.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                TemplateName:
                  $ref: "#/components/schemas/TemplateName"
                Description:
                  $ref: "#/components/schemas/TemplateDescription"
                Notes:
                  $ref: "#/components/schemas/Notes"
                LensesToAssociate:
                  $ref: "#/components/schemas/ReviewTemplateLensAliases"
                LensesToDisassociate:
                  $ref: "#/components/schemas/ReviewTemplateLensAliases"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateReviewTemplateOutput"
  /templates/shares/{template_arn}/{share_id}:
    delete:
      operationId: DeleteTemplateShare
      description: Delete a review template share. After the review template share is deleted, Amazon Web Services accounts, users, organizations, and organizational units (OUs) that you shared the review template with will no longer be able to apply it to new workloads.
      parameters:
        - name: share_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ShareId"
        - name: template_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateArn"
          description: The review template ARN.
        - name: ClientRequestToken
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ClientRequestToken"
      responses:
        "200":
          description: Success
  /workloads/{workload_id}:
    delete:
      operationId: DeleteWorkload
      description: Delete an existing workload.
      parameters:
        - name: workload_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkloadId"
        - name: ClientRequestToken
          in: query
          required: true
          schema:
