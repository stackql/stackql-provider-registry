components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    WorkloadId:
      description: The ID assigned to the workload. This ID is unique within an Amazon Web Services Region.
      type: string
      minLength: 32
      maxLength: 32
      pattern: "[0-9a-f]{32}"
    LensAliases:
      description: List of lens aliases to associate or disassociate with a workload. Up to 10 lenses can be specified. Identify a lens using its LensSummary$LensAlias.
      type: array
      items:
        $ref: "#/components/schemas/LensAlias"
    LensAlias:
      description: The alias of the lens. For Amazon Web Services official lenses, this is either the lens alias, such as serverless, or the lens ARN, such as arn:aws:wellarchitected:us-east-1::lens/serverless. Note that some operations (such as ExportLens and CreateLensShare) are not permitted on Amazon Web Services official lenses. For custom lenses, this is the lens ARN, such as arn:aws:wellarchitected:us-west-2:123456789012:lens/0123456789abcdef01234567890abcdef. Each lens is identified by its LensSummary$LensAlias.
      type: string
      minLength: 1
      maxLength: 128
    ProfileArns:
      type: array
      items:
        $ref: "#/components/schemas/ProfileArn"
    ProfileArn:
      type: string
      maxLength: 2084
      pattern: arn:aws[-a-z]*:wellarchitected:[a-z]{2}(-gov)?-[a-z]+-\d:\d{12}:profile/[a-z0-9]+
    SharedWith:
      description: The Amazon Web Services account ID, organization ID, or organizational unit (OU) ID with which the workload, lens, profile, or review template is shared.
      type: string
      minLength: 12
      maxLength: 2048
    ClientRequestToken:
      description: A unique case-sensitive string used to ensure that this request is idempotent (executes only once). You should not reuse the same token for other requests. If you retry a request with the same client request token and the same parameters after the original request has completed successfully, the result of the original request is returned. This token is listed as required, however, if you do not specify it, the Amazon Web Services SDKs automatically generate one for you. If you are not using the Amazon Web Services SDK or the CLI, you must provide this token or the request will fail.
      type: string
      minLength: 1
      maxLength: 2048
    CreateLensShareOutput:
      type: object
      properties:
        ShareId:
          $ref: "#/components/schemas/ShareId"
    ShareId:
      description: The ID associated with the share.
      type: string
      pattern: "[0-9a-f]{32}"
    LensVersion:
      type: string
      minLength: 1
      maxLength: 32
    IsMajorVersion:
      type: boolean
    CreateLensVersionOutput:
      type: object
      properties:
        LensArn:
          $ref: "#/components/schemas/LensArn"
          description: The ARN for the lens.
        LensVersion:
          $ref: "#/components/schemas/LensVersion"
          description: The version of the lens.
    LensArn:
      type: string
    MilestoneName:
      description: The name of the milestone in a workload. Milestone names must be unique within a workload.
      type: string
      minLength: 3
      maxLength: 100
    CreateMilestoneOutput:
      description: Output of a create milestone call.
      type: object
      properties:
        WorkloadId:
          $ref: "#/components/schemas/WorkloadId"
        MilestoneNumber:
          $ref: "#/components/schemas/MilestoneNumber"
    MilestoneNumber:
      description: The milestone number. A workload can have a maximum of 100 milestones.
      type: integer
      minimum: 1
      maximum: 100
    ProfileName:
      type: string
      minLength: 3
      maxLength: 100
    ProfileDescription:
      type: string
      minLength: 3
      maxLength: 100
    ProfileQuestionUpdates:
      type: array
      items:
        $ref: "#/components/schemas/ProfileQuestionUpdate"
    ProfileQuestionUpdate:
      description: An update to a profile question.
      type: object
      properties:
        QuestionId:
          $ref: "#/components/schemas/QuestionId"
        SelectedChoiceIds:
          $ref: "#/components/schemas/SelectedProfileChoiceIds"
          description: The selected choices.
    QuestionId:
      description: The ID of the question.
      type: string
      minLength: 1
      maxLength: 128
    SelectedProfileChoiceIds:
      type: array
      items:
        $ref: "#/components/schemas/ChoiceId"
    ChoiceId:
      description: The ID of a choice.
      type: string
      minLength: 1
      maxLength: 64
    TagMap:
      type: object
      properties: {}
    CreateProfileOutput:
      type: object
      properties:
        ProfileArn:
          $ref: "#/components/schemas/ProfileArn"
          description: The profile ARN.
        ProfileVersion:
          $ref: "#/components/schemas/ProfileVersion"
          description: Version of the profile.
    ProfileVersion:
      type: string
      minLength: 1
      maxLength: 32
      pattern: ^[A-Za-z0-9-]+$
    CreateProfileShareOutput:
      type: object
      properties:
        ShareId:
          $ref: "#/components/schemas/ShareId"
        ProfileArn:
          $ref: "#/components/schemas/ProfileArn"
          description: The profile ARN.
    TemplateName:
      type: string
      minLength: 3
      maxLength: 100
      pattern: ^[A-Za-z0-9-_.,:/()@!&?#+'’\s]+$
    TemplateDescription:
      type: string
      minLength: 3
      maxLength: 250
      pattern: ^[A-Za-z0-9-_.,:/()@!&?#+'’\s]+$
    ReviewTemplateLenses:
      type: array
      items:
        $ref: "#/components/schemas/LensAlias"
    Notes:
      description: The notes associated with the workload. For a review template, these are the notes that will be associated with the workload when the template is applied.
      type: string
      maxLength: 2084
    CreateReviewTemplateOutput:
      type: object
      properties:
        TemplateArn:
          $ref: "#/components/schemas/TemplateArn"
          description: The review template ARN.
    TemplateArn:
      type: string
      minLength: 50
      maxLength: 250
      pattern: arn:aws(-us-gov|-iso(-[a-z])?|-cn)?:wellarchitected:[a-z]{2}(-gov|-iso([a-z])?)?-[a-z]+-\d:\d{12}:(review-template)/[a-f0-9]{32}
    CreateTemplateShareOutput:
      type: object
      properties:
        TemplateArn:
          $ref: "#/components/schemas/TemplateArn"
          description: The review template ARN.
        ShareId:
          $ref: "#/components/schemas/ShareId"
    WorkloadName:
      description: The name of the workload. The name must be unique within an account within an Amazon Web Services Region. Spaces and capitalization are ignored when checking for uniqueness.
      type: string
      minLength: 3
      maxLength: 100
    WorkloadDescription:
      description: The description for the workload.
      type: string
      minLength: 3
      maxLength: 250
    WorkloadEnvironment:
      description: The environment for the workload.
      type: string
      enum:
        - PRODUCTION
        - PREPRODUCTION
    WorkloadAccountIds:
      description: The list of Amazon Web Services account IDs associated with the workload.
      type: array
      items:
        $ref: "#/components/schemas/AwsAccountId"
    AwsAccountId:
      description: An Amazon Web Services account ID.
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[0-9]{12}"
    WorkloadAwsRegions:
      description: The list of Amazon Web Services Regions associated with the workload, for example, us-east-2, or ca-central-1.
      type: array
      items:
        $ref: "#/components/schemas/AwsRegion"
    AwsRegion:
      description: An Amazon Web Services Region, for example, us-west-2 or ap-northeast-1.
      type: string
      maxLength: 100
    WorkloadNonAwsRegions:
      description: The list of non-Amazon Web Services Regions associated with the workload.
      type: array
      items:
        $ref: "#/components/schemas/WorkloadNonAwsRegion"
    WorkloadNonAwsRegion:
      type: string
      minLength: 3
      maxLength: 25
    WorkloadPillarPriorities:
      description: The priorities of the pillars, which are used to order items in the improvement plan. Each pillar is represented by its PillarReviewSummary$PillarId.
      type: array
      items:
        $ref: "#/components/schemas/PillarId"
    PillarId:
      description: The ID used to identify a pillar, for example, security. A pillar is identified by its PillarReviewSummary$PillarId.
      type: string
      minLength: 1
      maxLength: 64
    WorkloadArchitecturalDesign:
      description: The URL of the architectural design for the workload.
      type: string
      maxLength: 2048
      pattern: ^(|(https?|ftp):\/\/[^\s/$.?#].[^\s]*)$
    WorkloadReviewOwner:
      description: The review owner of the workload. The name, email address, or identifier for the primary group or individual that owns the workload review process.
      type: string
      minLength: 3
      maxLength: 255
    WorkloadIndustryType:
      description: "The industry type for the workload. If specified, must be one of the following: Agriculture Automobile Defense Design and Engineering Digital Advertising Education Environmental Protection Financial Services Gaming General Public Services Healthcare Hospitality InfoTech Justice and Public Safety Life Sciences Manufacturing Media & Entertainment Mining & Resources Oil & Gas Power & Utilities Professional Services Real Estate & Construction Retail & Wholesale Social Protection Telecommunications Travel, Transportation & Logistics Other"
      type: string
      maxLength: 100
    WorkloadIndustry:
      description: The industry for the workload.
      type: string
      maxLength: 100
    WorkloadLenses:
      description: The list of lenses associated with the workload. Each lens is identified by its LensSummary$LensAlias. If a review template that specifies lenses is applied to the workload, those lenses are applied to the workload in addition to these lenses.
      type: array
      items:
        $ref: "#/components/schemas/LensAlias"
    WorkloadDiscoveryConfig:
      description: Discovery configuration associated to the workload.
      type: object
      properties:
        TrustedAdvisorIntegrationStatus:
          $ref: "#/components/schemas/TrustedAdvisorIntegrationStatus"
          description: Discovery integration status in respect to Trusted Advisor for the workload.
        WorkloadResourceDefinition:
          $ref: "#/components/schemas/WorkloadResourceDefinition"
          description: The mode to use for identifying resources associated with the workload. You can specify WORKLOAD_METADATA, APP_REGISTRY, or both.
    TrustedAdvisorIntegrationStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    WorkloadResourceDefinition:
      type: array
      items:
        $ref: "#/components/schemas/DefinitionType"
    DefinitionType:
      type: string
      enum:
        - WORKLOAD_METADATA
        - APP_REGISTRY
    WorkloadApplications:
      type: array
      items:
        $ref: "#/components/schemas/ApplicationArn"
    ApplicationArn:
      type: string
      maxLength: 2084
      pattern: arn:aws[-a-z]*:servicecatalog:[a-z]{2}(-gov)?-[a-z]+-\d:\d{12}:/applications/[a-z0-9]+
    WorkloadProfileArns:
      type: array
      items:
        $ref: "#/components/schemas/ProfileArn"
    ReviewTemplateArns:
      type: array
      items:
        $ref: "#/components/schemas/TemplateArn"
    WorkloadJiraConfigurationInput:
      description: "Workload-level: Input for the Jira configuration."
      type: object
      properties:
        IssueManagementStatus:
          $ref: "#/components/schemas/WorkloadIssueManagementStatus"
          description: "Workload-level: Jira issue management status."
        IssueManagementType:
          $ref: "#/components/schemas/IssueManagementType"
          description: "Workload-level: Jira issue management type."
        JiraProjectKey:
          $ref: "#/components/schemas/JiraProjectKey"
          description: "Workload-level: Jira project key to sync workloads to."
    WorkloadIssueManagementStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
        - INHERIT
    IssueManagementType:
      type: string
      enum:
        - AUTO
        - MANUAL
    JiraProjectKey:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[A-Z][A-Z0-9_]*$
    CreateWorkloadOutput:
      description: Output of a create workload call.
      type: object
      properties:
        WorkloadId:
          $ref: "#/components/schemas/WorkloadId"
        WorkloadArn:
          $ref: "#/components/schemas/WorkloadArn"
    WorkloadArn:
      description: The ARN for the workload.
      type: string
    PermissionType:
      description: Permission granted on a share request.
      type: string
      enum:
        - READONLY
        - CONTRIBUTOR
    CreateWorkloadShareOutput:
      description: Input for Create Workload Share
      type: object
      properties:
        WorkloadId:
          $ref: "#/components/schemas/WorkloadId"
        ShareId:
          $ref: "#/components/schemas/ShareId"
    LensStatusType:
      type: string
      enum:
        - ALL
        - DRAFT
        - PUBLISHED
    ExportLensOutput:
      type: object
      properties:
        LensJSON:
          $ref: "#/components/schemas/LensJSON"
          description: The JSON representation of a lens.
    LensJSON:
      type: string
      minLength: 2
      maxLength: 500000
    GetAnswerOutput:
      description: Output of a get answer call.
      type: object
      properties:
        WorkloadId:
          $ref: "#/components/schemas/WorkloadId"
        MilestoneNumber:
