    post:
      operationId: TagResource
      description: Adds one or more tags to the specified resource. The WorkloadArn parameter can be a workload ARN, a custom lens ARN, a profile ARN, or review template ARN.
      parameters:
        - name: workload_arn
          in: path
          required: true
