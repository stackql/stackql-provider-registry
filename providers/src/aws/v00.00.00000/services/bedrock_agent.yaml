    S3Prefixes:
      type: array
      items:
        $ref: "#/components/schemas/S3Prefix"
    S3Prefix:
      type: string
      minLength: 1
      maxLength: 300
    BucketOwnerAccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[0-9]{12}"
    WebDataSourceConfiguration:
      description: The configuration details for the web data source.
      type: object
      properties:
        sourceConfiguration:
          $ref: "#/components/schemas/WebSourceConfiguration"
          description: The source configuration details for the web data source.
        crawlerConfiguration:
          $ref: "#/components/schemas/WebCrawlerConfiguration"
          description: The Web Crawler configuration details for the web data source.
      required:
        - sourceConfiguration
    WebSourceConfiguration:
      description: The configuration of the URL/URLs for the web content that you want to crawl. You should be authorized to crawl the URLs.
      type: object
      properties:
        urlConfiguration:
          $ref: "#/components/schemas/UrlConfiguration"
          description: The configuration of the URL/URLs.
      required:
        - urlConfiguration
    UrlConfiguration:
      description: The configuration of web URLs that you want to crawl. You should be authorized to crawl the URLs.
      type: object
      properties:
        seedUrls:
          $ref: "#/components/schemas/SeedUrls"
          description: One or more seed or starting point URLs.
    SeedUrls:
      type: array
      items:
        $ref: "#/components/schemas/SeedUrl"
    SeedUrl:
      description: The seed or starting point URL. You should be authorized to crawl the URL.
      type: object
      properties:
        url:
          $ref: "#/components/schemas/Url"
          description: A seed or starting point URL.
    Url:
      type: string
      pattern: https?://[A-Za-z0-9][^\s]*
    WebCrawlerConfiguration:
      description: The configuration of web URLs that you want to crawl. You should be authorized to crawl the URLs.
      type: object
      properties:
        crawlerLimits:
          $ref: "#/components/schemas/WebCrawlerLimits"
          description: The configuration of crawl limits for the web URLs.
        inclusionFilters:
          $ref: "#/components/schemas/FilterList"
          description: A list of one or more inclusion regular expression patterns to include certain URLs. If you specify an inclusion and exclusion filter/pattern and both match a URL, the exclusion filter takes precedence and the web content of the URL isn’t crawled.
        exclusionFilters:
          $ref: "#/components/schemas/FilterList"
          description: A list of one or more exclusion regular expression patterns to exclude certain URLs. If you specify an inclusion and exclusion filter/pattern and both match a URL, the exclusion filter takes precedence and the web content of the URL isn’t crawled.
        scope:
          $ref: "#/components/schemas/WebScopeType"
          description: The scope of what is crawled for your URLs. You can choose to crawl only web pages that belong to the same host or primary domain. For example, only web pages that contain the seed URL "https://docs.aws.amazon.com/bedrock/latest/userguide/" and no other domains. You can choose to include sub domains in addition to the host or primary domain. For example, web pages that contain "aws.amazon.com" can also include sub domain "docs.aws.amazon.com".
        userAgent:
          $ref: "#/components/schemas/UserAgent"
          description: Returns the user agent suffix for your web crawler.
        userAgentHeader:
          $ref: "#/components/schemas/UserAgentHeader"
          description: A string used for identifying the crawler or bot when it accesses a web server. The user agent header value consists of the bedrockbot, UUID, and a user agent suffix for your crawler (if one is provided). By default, it is set to bedrockbot_UUID. You can optionally append a custom suffix to bedrockbot_UUID to allowlist a specific user agent permitted to access your source URLs.
    WebCrawlerLimits:
      description: The rate limits for the URLs that you want to crawl. You should be authorized to crawl the URLs.
      type: object
      properties:
        rateLimit:
          $ref: "#/components/schemas/WebCrawlerLimitsRateLimitInteger"
          description: The max rate at which pages are crawled, up to 300 per minute per host.
        maxPages:
          $ref: "#/components/schemas/WebCrawlerLimitsMaxPagesInteger"
          description: The max number of web pages crawled from your source URLs, up to 25,000 pages. If the web pages exceed this limit, the data source sync will fail and no web pages will be ingested.
    WebCrawlerLimitsRateLimitInteger:
      type: integer
      minimum: 1
      maximum: 300
    WebCrawlerLimitsMaxPagesInteger:
      type: integer
      minimum: 1
    FilterList:
      type: array
      items:
        $ref: "#/components/schemas/FilterPattern"
    FilterPattern:
      type: string
      minLength: 1
      maxLength: 1000
    WebScopeType:
      type: string
      enum:
        - HOST_ONLY
        - SUBDOMAINS
    UserAgent:
      type: string
      minLength: 15
      maxLength: 40
    UserAgentHeader:
      type: string
      minLength: 61
      maxLength: 86
    ConfluenceDataSourceConfiguration:
      description: The configuration information to connect to Confluence as your data source.
      type: object
      properties:
        sourceConfiguration:
          $ref: "#/components/schemas/ConfluenceSourceConfiguration"
          description: The endpoint information to connect to your Confluence data source.
        crawlerConfiguration:
          $ref: "#/components/schemas/ConfluenceCrawlerConfiguration"
          description: The configuration of the Confluence content. For example, configuring specific types of Confluence content.
      required:
        - sourceConfiguration
    ConfluenceSourceConfiguration:
      description: The endpoint information to connect to your Confluence data source.
      type: object
      properties:
        hostUrl:
          $ref: "#/components/schemas/HttpsUrl"
          description: The Confluence host URL or instance URL.
        hostType:
          $ref: "#/components/schemas/ConfluenceHostType"
          description: The supported host type, whether online/cloud or server/on-premises.
        authType:
          $ref: "#/components/schemas/ConfluenceAuthType"
          description: The supported authentication type to authenticate and connect to your Confluence instance.
        credentialsSecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The Amazon Resource Name of an Secrets Manager secret that stores your authentication credentials for your Confluence instance URL. For more information on the key-value pairs that must be included in your secret, depending on your authentication type, see Confluence connection configuration.
      required:
        - hostUrl
        - hostType
        - authType
        - credentialsSecretArn
    HttpsUrl:
      type: string
      pattern: https://[A-Za-z0-9][^\s]*
    ConfluenceHostType:
      type: string
      enum:
        - SAAS
    ConfluenceAuthType:
      type: string
      enum:
        - BASIC
        - OAUTH2_CLIENT_CREDENTIALS
    SecretArn:
      type: string
      pattern: arn:aws(|-cn|-us-gov):secretsmanager:[a-z0-9-]{1,20}:([0-9]{12}|):secret:[a-zA-Z0-9!/_+=.@-]{1,512}
    ConfluenceCrawlerConfiguration:
      description: The configuration of the Confluence content. For example, configuring specific types of Confluence content.
      type: object
      properties:
        filterConfiguration:
          $ref: "#/components/schemas/CrawlFilterConfiguration"
          description: The configuration of filtering the Confluence content. For example, configuring regular expression patterns to include or exclude certain content.
    CrawlFilterConfiguration:
      description: The configuration of filtering the data source content. For example, configuring regular expression patterns to include or exclude certain content.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/CrawlFilterConfigurationType"
          description: The type of filtering that you want to apply to certain objects or content of the data source. For example, the PATTERN type is regular expression patterns you can apply to filter your content.
        patternObjectFilter:
          $ref: "#/components/schemas/PatternObjectFilterConfiguration"
          description: The configuration of filtering certain objects or content types of the data source.
      required:
        - type_
    CrawlFilterConfigurationType:
      type: string
      enum:
        - PATTERN
    PatternObjectFilterConfiguration:
      description: The configuration of filtering certain objects or content types of the data source.
      type: object
      properties:
        filters:
          $ref: "#/components/schemas/PatternObjectFilterList"
          description: The configuration of specific filters applied to your data source content. You can filter out or include certain content.
      required:
        - filters
    PatternObjectFilterList:
      type: array
      items:
        $ref: "#/components/schemas/PatternObjectFilter"
    PatternObjectFilter:
      description: The specific filters applied to your data source content. You can filter out or include certain content.
      type: object
      properties:
        objectType:
          $ref: "#/components/schemas/FilteredObjectType"
          description: The supported object type or content type of the data source.
        inclusionFilters:
          $ref: "#/components/schemas/FilterList"
          description: A list of one or more inclusion regular expression patterns to include certain object types that adhere to the pattern. If you specify an inclusion and exclusion filter/pattern and both match a document, the exclusion filter takes precedence and the document isn’t crawled.
        exclusionFilters:
          $ref: "#/components/schemas/FilterList"
          description: A list of one or more exclusion regular expression patterns to exclude certain object types that adhere to the pattern. If you specify an inclusion and exclusion filter/pattern and both match a document, the exclusion filter takes precedence and the document isn’t crawled.
      required:
        - objectType
    FilteredObjectType:
      type: string
      minLength: 1
      maxLength: 50
    SalesforceDataSourceConfiguration:
      description: The configuration information to connect to Salesforce as your data source.
      type: object
      properties:
        sourceConfiguration:
          $ref: "#/components/schemas/SalesforceSourceConfiguration"
          description: The endpoint information to connect to your Salesforce data source.
        crawlerConfiguration:
          $ref: "#/components/schemas/SalesforceCrawlerConfiguration"
          description: The configuration of the Salesforce content. For example, configuring specific types of Salesforce content.
      required:
        - sourceConfiguration
    SalesforceSourceConfiguration:
      description: The endpoint information to connect to your Salesforce data source.
      type: object
      properties:
        hostUrl:
          $ref: "#/components/schemas/HttpsUrl"
          description: The Salesforce host URL or instance URL.
        authType:
          $ref: "#/components/schemas/SalesforceAuthType"
          description: The supported authentication type to authenticate and connect to your Salesforce instance.
        credentialsSecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The Amazon Resource Name of an Secrets Manager secret that stores your authentication credentials for your Salesforce instance URL. For more information on the key-value pairs that must be included in your secret, depending on your authentication type, see Salesforce connection configuration.
      required:
        - hostUrl
        - authType
        - credentialsSecretArn
    SalesforceAuthType:
      type: string
      enum:
        - OAUTH2_CLIENT_CREDENTIALS
    SalesforceCrawlerConfiguration:
      description: The configuration of the Salesforce content. For example, configuring specific types of Salesforce content.
      type: object
      properties:
        filterConfiguration:
          $ref: "#/components/schemas/CrawlFilterConfiguration"
          description: The configuration of filtering the Salesforce content. For example, configuring regular expression patterns to include or exclude certain content.
    SharePointDataSourceConfiguration:
      description: The configuration information to connect to SharePoint as your data source.
      type: object
      properties:
        sourceConfiguration:
          $ref: "#/components/schemas/SharePointSourceConfiguration"
          description: The endpoint information to connect to your SharePoint data source.
        crawlerConfiguration:
          $ref: "#/components/schemas/SharePointCrawlerConfiguration"
          description: The configuration of the SharePoint content. For example, configuring specific types of SharePoint content.
      required:
        - sourceConfiguration
    SharePointSourceConfiguration:
      description: The endpoint information to connect to your SharePoint data source.
      type: object
      properties:
        tenantId:
          $ref: "#/components/schemas/Microsoft365TenantId"
          description: The identifier of your Microsoft 365 tenant.
        domain:
          $ref: "#/components/schemas/SharePointDomain"
          description: The domain of your SharePoint instance or site URL/URLs.
        siteUrls:
          $ref: "#/components/schemas/SharePointSiteUrls"
          description: A list of one or more SharePoint site URLs.
        hostType:
          $ref: "#/components/schemas/SharePointHostType"
          description: The supported host type, whether online/cloud or server/on-premises.
        authType:
          $ref: "#/components/schemas/SharePointAuthType"
          description: The supported authentication type to authenticate and connect to your SharePoint site/sites.
        credentialsSecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The Amazon Resource Name of an Secrets Manager secret that stores your authentication credentials for your SharePoint site/sites. For more information on the key-value pairs that must be included in your secret, depending on your authentication type, see SharePoint connection configuration.
      required:
        - domain
        - siteUrls
        - hostType
        - authType
        - credentialsSecretArn
    Microsoft365TenantId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    SharePointDomain:
      type: string
      minLength: 1
      maxLength: 50
    SharePointSiteUrls:
      type: array
      items:
        $ref: "#/components/schemas/HttpsUrl"
    SharePointHostType:
      type: string
      enum:
        - ONLINE
    SharePointAuthType:
      type: string
      enum:
        - OAUTH2_CLIENT_CREDENTIALS
        - OAUTH2_SHAREPOINT_APP_ONLY_CLIENT_CREDENTIALS
    SharePointCrawlerConfiguration:
      description: The configuration of the SharePoint content. For example, configuring specific types of SharePoint content.
      type: object
      properties:
        filterConfiguration:
          $ref: "#/components/schemas/CrawlFilterConfiguration"
          description: The configuration of filtering the SharePoint content. For example, configuring regular expression patterns to include or exclude certain content.
    DataDeletionPolicy:
      type: string
      enum:
        - RETAIN
        - DELETE
    ServerSideEncryptionConfiguration:
      description: Contains the configuration for server-side encryption.
      type: object
      properties:
        kmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The Amazon Resource Name (ARN) of the KMS key used to encrypt the resource.
    VectorIngestionConfiguration:
      description: Contains details about how to ingest the documents in a data source.
      type: object
      properties:
        chunkingConfiguration:
          $ref: "#/components/schemas/ChunkingConfiguration"
          description: Details about how to chunk the documents in the data source. A chunk refers to an excerpt from a data source that is returned when the knowledge base that it belongs to is queried.
        customTransformationConfiguration:
          $ref: "#/components/schemas/CustomTransformationConfiguration"
          description: A custom document transformer for parsed data source documents.
        parsingConfiguration:
          $ref: "#/components/schemas/ParsingConfiguration"
          description: Configurations for a parser to use for parsing documents in your data source. If you exclude this field, the default parser will be used.
        contextEnrichmentConfiguration:
          $ref: "#/components/schemas/ContextEnrichmentConfiguration"
          description: The context enrichment configuration used for ingestion of the data into the vector store.
    ChunkingConfiguration:
      description: Details about how to chunk the documents in the data source. A chunk refers to an excerpt from a data source that is returned when the knowledge base that it belongs to is queried.
      type: object
      properties:
        chunkingStrategy:
          $ref: "#/components/schemas/ChunkingStrategy"
          description: Knowledge base can split your source data into chunks. A chunk refers to an excerpt from a data source that is returned when the knowledge base that it belongs to is queried. You have the following options for chunking your data. If you opt for NONE, then you may want to pre-process your files by splitting them up such that each file corresponds to a chunk. FIXED_SIZE – Amazon Bedrock splits your source data into chunks of the approximate size that you set in the fixedSizeChunkingConfiguration. HIERARCHICAL – Split documents into layers of chunks where the first layer contains large chunks, and the second layer contains smaller chunks derived from the first layer. SEMANTIC – Split documents into chunks based on groups of similar content derived with natural language processing. NONE – Amazon Bedrock treats each file as one chunk. If you choose this option, you may want to pre-process your documents by splitting them into separate files.
        fixedSizeChunkingConfiguration:
          $ref: "#/components/schemas/FixedSizeChunkingConfiguration"
          description: Configurations for when you choose fixed-size chunking. If you set the chunkingStrategy as NONE, exclude this field.
        hierarchicalChunkingConfiguration:
          $ref: "#/components/schemas/HierarchicalChunkingConfiguration"
          description: Settings for hierarchical document chunking for a data source. Hierarchical chunking splits documents into layers of chunks where the first layer contains large chunks, and the second layer contains smaller chunks derived from the first layer.
        semanticChunkingConfiguration:
          $ref: "#/components/schemas/SemanticChunkingConfiguration"
          description: Settings for semantic document chunking for a data source. Semantic chunking splits a document into into smaller documents based on groups of similar content derived from the text with natural language processing.
      required:
        - chunkingStrategy
    ChunkingStrategy:
      type: string
      enum:
        - FIXED_SIZE
        - NONE
        - HIERARCHICAL
        - SEMANTIC
    FixedSizeChunkingConfiguration:
      description: Configurations for when you choose fixed-size chunking. If you set the chunkingStrategy as NONE, exclude this field.
      type: object
      properties:
        maxTokens:
          $ref: "#/components/schemas/FixedSizeChunkingConfigurationMaxTokensInteger"
          description: The maximum number of tokens to include in a chunk.
        overlapPercentage:
          $ref: "#/components/schemas/FixedSizeChunkingConfigurationOverlapPercentageInteger"
          description: The percentage of overlap between adjacent chunks of a data source.
      required:
        - maxTokens
        - overlapPercentage
    FixedSizeChunkingConfigurationMaxTokensInteger:
      type: integer
      minimum: 1
    FixedSizeChunkingConfigurationOverlapPercentageInteger:
      type: integer
      minimum: 1
      maximum: 99
    HierarchicalChunkingConfiguration:
      description: Settings for hierarchical document chunking for a data source. Hierarchical chunking splits documents into layers of chunks where the first layer contains large chunks, and the second layer contains smaller chunks derived from the first layer. You configure the number of tokens to overlap, or repeat across adjacent chunks. For example, if you set overlap tokens to 60, the last 60 tokens in the first chunk are also included at the beginning of the second chunk. For each layer, you must also configure the maximum number of tokens in a chunk.
      type: object
      properties:
        levelConfigurations:
          $ref: "#/components/schemas/HierarchicalChunkingLevelConfigurations"
          description: Token settings for each layer.
        overlapTokens:
          $ref: "#/components/schemas/HierarchicalChunkingConfigurationOverlapTokensInteger"
          description: The number of tokens to repeat across chunks in the same layer.
      required:
        - levelConfigurations
        - overlapTokens
    HierarchicalChunkingLevelConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/HierarchicalChunkingLevelConfiguration"
    HierarchicalChunkingLevelConfiguration:
      description: Token settings for a layer in a hierarchical chunking configuration.
      type: object
      properties:
        maxTokens:
          $ref: "#/components/schemas/HierarchicalChunkingLevelConfigurationMaxTokensInteger"
          description: The maximum number of tokens that a chunk can contain in this layer.
      required:
        - maxTokens
    HierarchicalChunkingLevelConfigurationMaxTokensInteger:
      type: integer
      minimum: 1
      maximum: 8192
    HierarchicalChunkingConfigurationOverlapTokensInteger:
      type: integer
      minimum: 1
    SemanticChunkingConfiguration:
      description: Settings for semantic document chunking for a data source. Semantic chunking splits a document into into smaller documents based on groups of similar content derived from the text with natural language processing. With semantic chunking, each sentence is compared to the next to determine how similar they are. You specify a threshold in the form of a percentile, where adjacent sentences that are less similar than that percentage of sentence pairs are divided into separate chunks. For example, if you set the threshold to 90, then the 10 percent of sentence pairs that are least similar are split. So if you have 101 sentences, 100 sentence pairs are compared, and the 10 with the least similarity are split, creating 11 chunks. These chunks are further split if they exceed the max token size. You must also specify a buffer size, which determines whether sentences are compared in isolation, or within a moving context window that includes the previous and following sentence. For example, if you set the buffer size to 1, the embedding for sentence 10 is derived from sentences 9, 10, and 11 combined.
      type: object
      properties:
        maxTokens:
          $ref: "#/components/schemas/SemanticChunkingConfigurationMaxTokensInteger"
          description: The maximum number of tokens that a chunk can contain.
        bufferSize:
          $ref: "#/components/schemas/SemanticChunkingConfigurationBufferSizeInteger"
          description: The buffer size.
        breakpointPercentileThreshold:
          $ref: "#/components/schemas/SemanticChunkingConfigurationBreakpointPercentileThresholdInteger"
          description: The dissimilarity threshold for splitting chunks.
      required:
        - maxTokens
        - bufferSize
        - breakpointPercentileThreshold
    SemanticChunkingConfigurationMaxTokensInteger:
      type: integer
      minimum: 1
    SemanticChunkingConfigurationBufferSizeInteger:
      type: integer
      minimum: 0
      maximum: 1
    SemanticChunkingConfigurationBreakpointPercentileThresholdInteger:
      type: integer
      minimum: 50
      maximum: 99
    CustomTransformationConfiguration:
      description: Settings for customizing steps in the data source content ingestion pipeline. You can configure the data source to process documents with a Lambda function after they are parsed and converted into chunks. When you add a post-chunking transformation, the service stores chunked documents in an S3 bucket and invokes a Lambda function to process them. To process chunked documents with a Lambda function, define an S3 bucket path for input and output objects, and a transformation that specifies the Lambda function to invoke. You can use the Lambda function to customize how chunks are split, and the metadata for each chunk.
      type: object
      properties:
        intermediateStorage:
          $ref: "#/components/schemas/IntermediateStorage"
          description: An S3 bucket path for input and output objects.
        transformations:
          $ref: "#/components/schemas/Transformations"
          description: A Lambda function that processes documents.
      required:
        - intermediateStorage
        - transformations
    IntermediateStorage:
      description: A location for storing content from data sources temporarily as it is processed by custom components in the ingestion pipeline.
      type: object
      properties:
        s3Location:
          $ref: "#/components/schemas/S3Location"
          description: An S3 bucket path.
      required:
        - s3Location
    S3Location:
      description: An Amazon S3 location.
      type: object
      properties:
        uri:
          $ref: "#/components/schemas/S3BucketUri"
          description: The location's URI. For example, s3://my-bucket/chunk-processor/.
      required:
        - uri
    S3BucketUri:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: s3://.{1,128}
    Transformations:
      type: array
      items:
        $ref: "#/components/schemas/Transformation"
    Transformation:
      description: A custom processing step for documents moving through a data source ingestion pipeline. To process documents after they have been converted into chunks, set the step to apply to POST_CHUNKING.
      type: object
      properties:
        transformationFunction:
          $ref: "#/components/schemas/TransformationFunction"
          description: A Lambda function that processes documents.
        stepToApply:
          $ref: "#/components/schemas/StepType"
          description: When the service applies the transformation.
      required:
        - transformationFunction
        - stepToApply
    TransformationFunction:
      description: A Lambda function that processes documents.
      type: object
      properties:
        transformationLambdaConfiguration:
          $ref: "#/components/schemas/TransformationLambdaConfiguration"
          description: The Lambda function.
      required:
        - transformationLambdaConfiguration
    TransformationLambdaConfiguration:
      description: A Lambda function that processes documents.
      type: object
      properties:
        lambdaArn:
          $ref: "#/components/schemas/LambdaArn"
          description: The function's ARN identifier.
      required:
        - lambdaArn
    StepType:
      type: string
      enum:
        - POST_CHUNKING
    ParsingConfiguration:
      description: Settings for parsing document contents. If you exclude this field, the default parser converts the contents of each document into text before splitting it into chunks. Specify the parsing strategy to use in the parsingStrategy field and include the relevant configuration, or omit it to use the Amazon Bedrock default parser. For more information, see Parsing options for your data source. If you specify BEDROCK_DATA_AUTOMATION or BEDROCK_FOUNDATION_MODEL and it fails to parse a file, the Amazon Bedrock default parser will be used instead.
      type: object
      properties:
        parsingStrategy:
          $ref: "#/components/schemas/ParsingStrategy"
          description: The parsing strategy for the data source.
        bedrockFoundationModelConfiguration:
          $ref: "#/components/schemas/BedrockFoundationModelConfiguration"
          description: If you specify BEDROCK_FOUNDATION_MODEL as the parsing strategy for ingesting your data source, use this object to modify configurations for using a foundation model to parse documents.
        bedrockDataAutomationConfiguration:
          $ref: "#/components/schemas/BedrockDataAutomationConfiguration"
          description: If you specify BEDROCK_DATA_AUTOMATION as the parsing strategy for ingesting your data source, use this object to modify configurations for using the Amazon Bedrock Data Automation parser.
      required:
        - parsingStrategy
    ParsingStrategy:
      type: string
      enum:
        - BEDROCK_FOUNDATION_MODEL
        - BEDROCK_DATA_AUTOMATION
    BedrockFoundationModelConfiguration:
      description: Settings for a foundation model used to parse documents for a data source.
      type: object
      properties:
        modelArn:
          $ref: "#/components/schemas/BedrockModelArn"
          description: The ARN of the foundation model to use for parsing.
        parsingPrompt:
          $ref: "#/components/schemas/ParsingPrompt"
          description: Instructions for interpreting the contents of a document.
        parsingModality:
          $ref: "#/components/schemas/ParsingModality"
          description: Specifies whether to enable parsing of multimodal data, including both text and/or images.
      required:
        - modelArn
    BedrockModelArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: (arn:aws(-[^:]{1,12})?:(bedrock):[a-z0-9-]{1,20}:([0-9]{12})?:([a-z-]+/)?)?([a-zA-Z0-9.-]{1,63}){0,2}(([:][a-z0-9-]{1,63}){0,2})?(/[a-z0-9]{1,12})?
    ParsingPrompt:
      description: Instructions for interpreting the contents of a document.
      type: object
      properties:
        parsingPromptText:
          $ref: "#/components/schemas/ParsingPromptText"
          description: Instructions for interpreting the contents of a document.
      required:
        - parsingPromptText
    ParsingPromptText:
      type: string
      minLength: 1
      maxLength: 10000
    ParsingModality:
      type: string
      enum:
        - MULTIMODAL
    BedrockDataAutomationConfiguration:
      description: Contains configurations for using Amazon Bedrock Data Automation as the parser for ingesting your data sources.
      type: object
      properties:
        parsingModality:
          $ref: "#/components/schemas/ParsingModality"
          description: Specifies whether to enable parsing of multimodal data, including both text and/or images.
    ContextEnrichmentConfiguration:
      description: Context enrichment configuration is used to provide additional context to the RAG application.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/ContextEnrichmentType"
          description: The method used for context enrichment. It must be Amazon Bedrock foundation models.
        bedrockFoundationModelConfiguration:
          $ref: "#/components/schemas/BedrockFoundationModelContextEnrichmentConfiguration"
          description: The configuration of the Amazon Bedrock foundation model used for context enrichment.
      required:
        - type_
    ContextEnrichmentType:
      type: string
      enum:
        - BEDROCK_FOUNDATION_MODEL
    BedrockFoundationModelContextEnrichmentConfiguration:
      description: Context enrichment configuration is used to provide additional context to the RAG application using Amazon Bedrock foundation models.
      type: object
      properties:
        enrichmentStrategyConfiguration:
          $ref: "#/components/schemas/EnrichmentStrategyConfiguration"
          description: The enrichment stategy used to provide additional context. For example, Neptune GraphRAG uses Amazon Bedrock foundation models to perform chunk entity extraction.
        modelArn:
          $ref: "#/components/schemas/BedrockModelArn"
          description: The Amazon Resource Name (ARN) of the model used to create vector embeddings for the knowledge base.
      required:
        - enrichmentStrategyConfiguration
        - modelArn
    EnrichmentStrategyConfiguration:
      description: The strategy used for performing context enrichment.
      type: object
      properties:
        method:
          $ref: "#/components/schemas/EnrichmentStrategyMethod"
          description: The method used for the context enrichment strategy.
      required:
        - method
    EnrichmentStrategyMethod:
      type: string
      enum:
        - CHUNK_ENTITY_EXTRACTION
    CreateDataSourceResponse:
      type: object
      properties:
        dataSource:
          $ref: "#/components/schemas/DataSource"
          description: Contains details about the data source.
      required:
        - dataSource
    DataSource:
      description: Contains details about a data source.
      type: object
      properties:
        knowledgeBaseId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the knowledge base to which the data source belongs.
        dataSourceId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the data source.
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the data source.
        status:
          $ref: "#/components/schemas/DataSourceStatus"
          description: "The status of the data source. The following statuses are possible: Available – The data source has been created and is ready for ingestion into the knowledge base. Deleting – The data source is being deleted."
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the data source.
        dataSourceConfiguration:
          $ref: "#/components/schemas/DataSourceConfiguration"
          description: The connection configuration for the data source.
        serverSideEncryptionConfiguration:
          $ref: "#/components/schemas/ServerSideEncryptionConfiguration"
          description: Contains details about the configuration of the server-side encryption.
        vectorIngestionConfiguration:
          $ref: "#/components/schemas/VectorIngestionConfiguration"
          description: Contains details about how to ingest the documents in the data source.
        dataDeletionPolicy:
          $ref: "#/components/schemas/DataDeletionPolicy"
          description: The data deletion policy for the data source.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time at which the data source was created.
        updatedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time at which the data source was last updated.
        failureReasons:
          $ref: "#/components/schemas/FailureReasons"
          description: The detailed reasons on the failure to delete a data source.
      required:
        - knowledgeBaseId
        - dataSourceId
        - name
        - status
        - dataSourceConfiguration
        - createdAt
        - updatedAt
    DataSourceStatus:
      type: string
      enum:
        - AVAILABLE
        - DELETING
        - DELETE_UNSUCCESSFUL
    FlowName:
      type: string
      pattern: ([0-9a-zA-Z][_-]?){1,100}
    FlowDescription:
      type: string
      minLength: 1
      maxLength: 200
    FlowExecutionRoleArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:iam::([0-9]{12})?:role/(service-role/)?.+
    FlowDefinition:
      description: The definition of the nodes and connections between nodes in the flow.
      type: object
      properties:
        nodes:
          $ref: "#/components/schemas/FlowNodes"
          description: An array of node definitions in the flow.
        connections:
          $ref: "#/components/schemas/FlowConnections"
          description: An array of connection definitions in the flow.
    FlowNodes:
      type: array
      items:
        $ref: "#/components/schemas/FlowNode"
    FlowNode:
      description: Contains configurations about a node in the flow.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/FlowNodeName"
          description: A name for the node.
        type_:
          $ref: "#/components/schemas/FlowNodeType"
          description: The type of node. This value must match the name of the key that you provide in the configuration you provide in the FlowNodeConfiguration field.
        configuration:
          $ref: "#/components/schemas/FlowNodeConfiguration"
          description: Contains configurations for the node.
        inputs:
          $ref: "#/components/schemas/FlowNodeInputs"
          description: An array of objects, each of which contains information about an input into the node.
        outputs:
          $ref: "#/components/schemas/FlowNodeOutputs"
          description: A list of objects, each of which contains information about an output from the node.
      required:
        - name
        - type_
    FlowNodeName:
      type: string
      pattern: "[a-zA-Z]([_]?[0-9a-zA-Z]){1,50}"
    FlowNodeType:
      type: string
      enum:
        - Input
        - Output
        - KnowledgeBase
        - Condition
        - Lex
        - Prompt
        - LambdaFunction
        - Storage
        - Agent
        - Retrieval
        - Iterator
        - Collector
        - InlineCode
        - Loop
        - LoopInput
        - LoopController
    FlowNodeConfiguration:
      description: Contains configurations for a node in your flow. For more information, see Node types in a flow in the Amazon Bedrock User Guide.
      type: object
      properties:
        input:
          $ref: "#/components/schemas/InputFlowNodeConfiguration"
          description: Contains configurations for an input flow node in your flow. The first node in the flow. inputs can't be specified for this node.
        output:
          $ref: "#/components/schemas/OutputFlowNodeConfiguration"
          description: Contains configurations for an output flow node in your flow. The last node in the flow. outputs can't be specified for this node.
        knowledgeBase:
          $ref: "#/components/schemas/KnowledgeBaseFlowNodeConfiguration"
          description: Contains configurations for a knowledge base node in your flow. Queries a knowledge base and returns the retrieved results or generated response.
        condition:
          $ref: "#/components/schemas/ConditionFlowNodeConfiguration"
          description: Contains configurations for a condition node in your flow. Defines conditions that lead to different branches of the flow.
        lex:
          $ref: "#/components/schemas/LexFlowNodeConfiguration"
          description: Contains configurations for a Lex node in your flow. Invokes an Amazon Lex bot to identify the intent of the input and return the intent as the output.
        prompt:
          $ref: "#/components/schemas/PromptFlowNodeConfiguration"
          description: Contains configurations for a prompt node in your flow. Runs a prompt and generates the model response as the output. You can use a prompt from Prompt management or you can configure one in this node.
        lambdaFunction:
          $ref: "#/components/schemas/LambdaFunctionFlowNodeConfiguration"
          description: Contains configurations for a Lambda function node in your flow. Invokes an Lambda function.
        storage:
          $ref: "#/components/schemas/StorageFlowNodeConfiguration"
          description: Contains configurations for a storage node in your flow. Stores an input in an Amazon S3 location.
        agent:
          $ref: "#/components/schemas/AgentFlowNodeConfiguration"
          description: Contains configurations for an agent node in your flow. Invokes an alias of an agent and returns the response.
        retrieval:
          $ref: "#/components/schemas/RetrievalFlowNodeConfiguration"
          description: Contains configurations for a retrieval node in your flow. Retrieves data from an Amazon S3 location and returns it as the output.
        iterator:
          $ref: "#/components/schemas/IteratorFlowNodeConfiguration"
          description: Contains configurations for an iterator node in your flow. Takes an input that is an array and iteratively sends each item of the array as an output to the following node. The size of the array is also returned in the output. The output flow node at the end of the flow iteration will return a response for each member of the array. To return only one response, you can include a collector node downstream from the iterator node.
        collector:
          $ref: "#/components/schemas/CollectorFlowNodeConfiguration"
          description: Contains configurations for a collector node in your flow. Collects an iteration of inputs and consolidates them into an array of outputs.
        inlineCode:
          $ref: "#/components/schemas/InlineCodeFlowNodeConfiguration"
          description: Contains configurations for an inline code node in your flow. Inline code nodes let you write and execute code directly within your flow, enabling data transformations, custom logic, and integrations without needing an external Lambda function.
        loop:
          $ref: "#/components/schemas/LoopFlowNodeConfiguration"
          description: Contains configurations for a DoWhile loop in your flow.
        loopInput:
          $ref: "#/components/schemas/LoopInputFlowNodeConfiguration"
          description: Contains input node configurations for a DoWhile loop in your flow.
        loopController:
          $ref: "#/components/schemas/LoopControllerFlowNodeConfiguration"
          description: Contains controller node configurations for a DoWhile loop in your flow.
    InputFlowNodeConfiguration:
      description: Contains configurations for the input flow node for a flow. This node takes the input from flow invocation and passes it to the next node in the data type that you specify.
      type: object
    OutputFlowNodeConfiguration:
      description: Contains configurations for an output flow node in the flow. You specify the data type expected for the input into the node in the type field and how to return the final output in the expression field.
      type: object
    KnowledgeBaseFlowNodeConfiguration:
      description: Contains configurations for a knowledge base node in a flow. This node takes a query as the input and returns, as the output, the retrieved responses directly (as an array) or a response generated based on the retrieved responses. For more information, see Node types in a flow in the Amazon Bedrock User Guide.
      type: object
      properties:
        knowledgeBaseId:
          $ref: "#/components/schemas/FlowKnowledgeBaseId"
          description: The unique identifier of the knowledge base to query.
        modelId:
          $ref: "#/components/schemas/KnowledgeBaseModelIdentifier"
          description: The unique identifier of the model or inference profile to use to generate a response from the query results. Omit this field if you want to return the retrieved results as an array.
        guardrailConfiguration:
          $ref: "#/components/schemas/GuardrailConfiguration"
          description: Contains configurations for a guardrail to apply during query and response generation for the knowledge base in this configuration.
        numberOfResults:
          $ref: "#/components/schemas/KnowledgeBaseFlowNodeConfigurationNumberOfResultsInteger"
          description: The number of results to retrieve from the knowledge base.
        promptTemplate:
          $ref: "#/components/schemas/KnowledgeBasePromptTemplate"
          description: A custom prompt template to use with the knowledge base for generating responses.
        inferenceConfiguration:
          $ref: "#/components/schemas/PromptInferenceConfiguration"
          description: Contains inference configurations for the prompt.
        rerankingConfiguration:
          $ref: "#/components/schemas/VectorSearchRerankingConfiguration"
          description: The configuration for reranking the retrieved results from the knowledge base to improve relevance.
        orchestrationConfiguration:
          $ref: "#/components/schemas/KnowledgeBaseOrchestrationConfiguration"
          description: The configuration for orchestrating the retrieval and generation process in the knowledge base node.
      required:
        - knowledgeBaseId
    FlowKnowledgeBaseId:
      type: string
      minLength: 0
      maxLength: 10
      pattern: $|^[0-9a-zA-Z]+
    KnowledgeBaseModelIdentifier:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: (arn:aws(-[^:]{1,12})?:(bedrock|sagemaker):[a-z0-9-]{1,20}:([0-9]{12})?:([a-z-]+/)?)?([a-zA-Z0-9.-]{1,63}){0,2}(([:][a-z0-9-]{1,63}){0,2})?(/[a-z0-9]{1,12})?
    KnowledgeBaseFlowNodeConfigurationNumberOfResultsInteger:
      type: integer
      minimum: 1
      maximum: 100
    KnowledgeBasePromptTemplate:
      description: Defines a custom prompt template for orchestrating the retrieval and generation process.
      type: object
      properties:
        textPromptTemplate:
          $ref: "#/components/schemas/KnowledgeBaseTextPrompt"
          description: The text of the prompt template.
    KnowledgeBaseTextPrompt:
      type: string
      minLength: 1
      maxLength: 100000
    PromptInferenceConfiguration:
      description: Contains inference configurations for the prompt.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/PromptModelInferenceConfiguration"
          description: Contains inference configurations for a text prompt.
    PromptModelInferenceConfiguration:
      description: Contains inference configurations related to model inference for a prompt. For more information, see Inference parameters.
      type: object
      properties:
        temperature:
          $ref: "#/components/schemas/Temperature"
          description: Controls the randomness of the response. Choose a lower value for more predictable outputs and a higher value for more surprising outputs.
        topP:
          $ref: "#/components/schemas/TopP"
          description: The percentage of most-likely candidates that the model considers for the next token.
        maxTokens:
          $ref: "#/components/schemas/MaximumLength"
          description: The maximum number of tokens to return in the response.
        stopSequences:
          $ref: "#/components/schemas/StopSequences"
          description: A list of strings that define sequences after which the model will stop generating.
    VectorSearchRerankingConfiguration:
      description: Specifies how retrieved results from a knowledge base are reranked to improve relevance.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/VectorSearchRerankingConfigurationType"
          description: Specifies the type of reranking model to use. Currently, the only supported value is BEDROCK_RERANKING_MODEL.
        bedrockRerankingConfiguration:
          $ref: "#/components/schemas/VectorSearchBedrockRerankingConfiguration"
          description: Specifies the configuration for using an Amazon Bedrock reranker model to rerank retrieved results.
      required:
        - type_
    VectorSearchRerankingConfigurationType:
      type: string
      enum:
        - BEDROCK_RERANKING_MODEL
    VectorSearchBedrockRerankingConfiguration:
      description: Configures the Amazon Bedrock reranker model to improve the relevance of retrieved results.
      type: object
      properties:
        modelConfiguration:
          $ref: "#/components/schemas/VectorSearchBedrockRerankingModelConfiguration"
          description: Specifies the configuration for the Amazon Bedrock reranker model.
        numberOfRerankedResults:
          $ref: "#/components/schemas/VectorSearchBedrockRerankingConfigurationNumberOfRerankedResultsInteger"
          description: Specifies the number of results to return after reranking.
        metadataConfiguration:
          $ref: "#/components/schemas/MetadataConfigurationForReranking"
          description: Specifies how metadata fields should be handled during the reranking process.
      required:
        - modelConfiguration
    VectorSearchBedrockRerankingModelConfiguration:
      description: Configures the Amazon Bedrock model used for reranking retrieved results.
      type: object
      properties:
        modelArn:
          $ref: "#/components/schemas/BedrockRerankingModelArn"
          description: The Amazon Resource Name (ARN) of the Amazon Bedrock reranker model.
        additionalModelRequestFields:
          type: object
          properties: {}
          description: Specifies additional model-specific request parameters as key-value pairs that are included in the request to the Amazon Bedrock reranker model.
      required:
        - modelArn
    BedrockRerankingModelArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: (arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}::foundation-model/(.*))?
    VectorSearchBedrockRerankingConfigurationNumberOfRerankedResultsInteger:
      type: integer
      minimum: 1
      maximum: 100
    MetadataConfigurationForReranking:
      description: Specifies how metadata fields should be handled during the reranking process.
      type: object
      properties:
        selectionMode:
          $ref: "#/components/schemas/RerankingMetadataSelectionMode"
          description: The mode for selecting metadata fields for reranking.
        selectiveModeConfiguration:
          $ref: "#/components/schemas/RerankingMetadataSelectiveModeConfiguration"
          description: The configuration for selective metadata field inclusion or exclusion during reranking.
      required:
        - selectionMode
    RerankingMetadataSelectionMode:
      type: string
      enum:
        - SELECTIVE
        - ALL
    RerankingMetadataSelectiveModeConfiguration:
      description: Configures the metadata fields to include or exclude during the reranking process when using selective mode.
      type: object
      properties:
        fieldsToInclude:
          $ref: "#/components/schemas/FieldsForReranking"
          description: Specifies the metadata fields to include in the reranking process.
        fieldsToExclude:
          $ref: "#/components/schemas/FieldsForReranking"
          description: Specifies the metadata fields to exclude from the reranking process.
    FieldsForReranking:
      type: array
      items:
        $ref: "#/components/schemas/FieldForReranking"
    FieldForReranking:
      description: Specifies a metadata field to include or exclude during the reranking process.
      type: object
      properties:
        fieldName:
          $ref: "#/components/schemas/FieldForRerankingFieldNameString"
          description: The name of the metadata field to include or exclude during reranking.
      required:
        - fieldName
    FieldForRerankingFieldNameString:
      type: string
      minLength: 1
      maxLength: 2000
    KnowledgeBaseOrchestrationConfiguration:
      description: Configures how the knowledge base orchestrates the retrieval and generation process, allowing for customization of prompts, inference parameters, and performance settings.
      type: object
      properties:
        promptTemplate:
          $ref: "#/components/schemas/KnowledgeBasePromptTemplate"
          description: A custom prompt template for orchestrating the retrieval and generation process.
        inferenceConfig:
          $ref: "#/components/schemas/PromptInferenceConfiguration"
          description: Contains inference configurations for the prompt.
        additionalModelRequestFields:
          type: object
          properties: {}
          description: The additional model-specific request parameters as key-value pairs to be included in the request to the foundation model.
        performanceConfig:
          $ref: "#/components/schemas/PerformanceConfiguration"
          description: The performance configuration options for the knowledge base retrieval and generation process.
    PerformanceConfiguration:
      description: The performance-related configuration options for the knowledge base retrieval and generation process.
      type: object
      properties:
        latency:
          $ref: "#/components/schemas/PerformanceConfigLatency"
          description: The latency optimization setting.
    PerformanceConfigLatency:
      type: string
      enum:
        - standard
        - optimized
    ConditionFlowNodeConfiguration:
      description: Defines a condition node in your flow. You can specify conditions that determine which node comes next in the flow. For more information, see Node types in a flow in the Amazon Bedrock User Guide.
      type: object
      properties:
        conditions:
          $ref: "#/components/schemas/FlowConditions"
          description: An array of conditions. Each member contains the name of a condition and an expression that defines the condition.
      required:
        - conditions
    FlowConditions:
      type: array
      items:
        $ref: "#/components/schemas/FlowCondition"
    FlowCondition:
      description: Defines a condition in the condition node.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/FlowConditionName"
          description: A name for the condition that you can reference.
        expression:
          $ref: "#/components/schemas/FlowConditionExpression"
          description: Defines the condition. You must refer to at least one of the inputs in the condition. For more information, expand the Condition node section in Node types in prompt flows.
      required:
        - name
    FlowConditionName:
      type: string
      pattern: "[a-zA-Z]([_]?[0-9a-zA-Z]){1,50}"
    FlowConditionExpression:
      type: string
      minLength: 1
      maxLength: 64
    LexFlowNodeConfiguration:
      description: Contains configurations for a Lex node in the flow. You specify a Amazon Lex bot to invoke. This node takes an utterance as the input and returns as the output the intent identified by the Amazon Lex bot. For more information, see Node types in a flow in the Amazon Bedrock User Guide.
      type: object
      properties:
        botAliasArn:
          $ref: "#/components/schemas/FlowLexBotAliasArn"
          description: The Amazon Resource Name (ARN) of the Amazon Lex bot alias to invoke.
        localeId:
          $ref: "#/components/schemas/FlowLexBotLocaleId"
          description: The Region to invoke the Amazon Lex bot in.
      required:
        - botAliasArn
        - localeId
    FlowLexBotAliasArn:
      type: string
      minLength: 0
      maxLength: 78
      pattern: $|^arn:aws(-cn|-us-gov|-eusc|-iso(-[b-f])?)?:lex:([a-z]{2,}-){2,}\d:\d{12}:bot-alias/[0-9a-zA-Z]+/[0-9a-zA-Z]+
    FlowLexBotLocaleId:
      type: string
      minLength: 0
      maxLength: 10
    PromptFlowNodeConfiguration:
      description: Contains configurations for a prompt node in the flow. You can use a prompt from Prompt management or you can define one in this node. If the prompt contains variables, the inputs into this node will fill in the variables. The output from this node is the response generated by the model. For more information, see Node types in a flow in the Amazon Bedrock User Guide.
      type: object
      properties:
        sourceConfiguration:
          $ref: "#/components/schemas/PromptFlowNodeSourceConfiguration"
          description: Specifies whether the prompt is from Prompt management or defined inline.
        guardrailConfiguration:
          $ref: "#/components/schemas/GuardrailConfiguration"
          description: Contains configurations for a guardrail to apply to the prompt in this node and the response generated from it.
      required:
        - sourceConfiguration
    PromptFlowNodeSourceConfiguration:
      description: Contains configurations for a prompt and whether it is from Prompt management or defined inline.
      type: object
      properties:
        resource:
          $ref: "#/components/schemas/PromptFlowNodeResourceConfiguration"
          description: Contains configurations for a prompt from Prompt management.
        inline:
          $ref: "#/components/schemas/PromptFlowNodeInlineConfiguration"
          description: Contains configurations for a prompt that is defined inline
    PromptFlowNodeResourceConfiguration:
      description: Contains configurations for a prompt from Prompt management to use in a node.
      type: object
      properties:
        promptArn:
          $ref: "#/components/schemas/FlowPromptArn"
          description: The Amazon Resource Name (ARN) of the prompt from Prompt management.
      required:
        - promptArn
    FlowPromptArn:
      type: string
      pattern: $|^(arn:aws(-cn|-us-gov|-eusc|-iso(-[b-f])?)?:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:prompt/[0-9a-zA-Z]{10}(?::[0-9]{1,5})?)
    PromptFlowNodeInlineConfiguration:
      description: Contains configurations for a prompt defined inline in the node.
      type: object
      properties:
        templateType:
          $ref: "#/components/schemas/PromptTemplateType"
          description: The type of prompt template.
        templateConfiguration:
          $ref: "#/components/schemas/PromptTemplateConfiguration"
          description: Contains a prompt and variables in the prompt that can be replaced with values at runtime.
        modelId:
          $ref: "#/components/schemas/FlowPromptModelIdentifier"
          description: The unique identifier of the model or inference profile to run inference with.
        inferenceConfiguration:
          $ref: "#/components/schemas/PromptInferenceConfiguration"
          description: Contains inference configurations for the prompt.
        additionalModelRequestFields:
          $ref: "#/components/schemas/Document"
          description: Additional fields to be included in the model request for the Prompt node.
      required:
        - templateType
        - templateConfiguration
        - modelId
    PromptTemplateType:
      type: string
      enum:
        - TEXT
        - CHAT
    PromptTemplateConfiguration:
      description: Contains the message for a prompt. For more information, see Construct and store reusable prompts with Prompt management in Amazon Bedrock.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/TextPromptTemplateConfiguration"
          description: Contains configurations for the text in a message for a prompt.
        chat:
          $ref: "#/components/schemas/ChatPromptTemplateConfiguration"
          description: Contains configurations to use the prompt in a conversational format.
    TextPromptTemplateConfiguration:
      description: Contains configurations for a text prompt template. To include a variable, enclose a word in double curly braces as in {{variable}}.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/TextPrompt"
          description: The message for the prompt.
        cachePoint:
          $ref: "#/components/schemas/CachePointBlock"
          description: A cache checkpoint within a template configuration.
        inputVariables:
          $ref: "#/components/schemas/PromptInputVariablesList"
          description: An array of the variables in the prompt template.
      required:
        - text
    TextPrompt:
      type: string
      minLength: 1
    CachePointBlock:
      description: Indicates where a cache checkpoint is located. All information before this checkpoint is cached to be accessed on subsequent requests.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/CachePointType"
          description: Indicates that the CachePointBlock is of the default type
      required:
        - type_
    CachePointType:
      type: string
      enum:
        - default
    PromptInputVariablesList:
      type: array
      items:
        $ref: "#/components/schemas/PromptInputVariable"
    PromptInputVariable:
      description: Contains information about a variable in the prompt.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/PromptInputVariableName"
          description: The name of the variable.
    PromptInputVariableName:
      type: string
      pattern: ([0-9a-zA-Z][_-]?){1,100}
    ChatPromptTemplateConfiguration:
      description: Contains configurations to use a prompt in a conversational format. For more information, see Create a prompt using Prompt management.
      type: object
      properties:
        messages:
          $ref: "#/components/schemas/Messages"
          description: Contains messages in the chat for the prompt.
        system:
          $ref: "#/components/schemas/SystemContentBlocks"
          description: Contains system prompts to provide context to the model or to describe how it should behave.
        inputVariables:
          $ref: "#/components/schemas/PromptInputVariablesList"
          description: An array of the variables in the prompt template.
        toolConfiguration:
          $ref: "#/components/schemas/ToolConfiguration"
          description: Configuration information for the tools that the model can use when generating a response.
      required:
        - messages
    Messages:
      type: array
      items:
        $ref: "#/components/schemas/Message"
    Message:
      description: A message input or response from a model. For more information, see Create a prompt using Prompt management.
      type: object
      properties:
        role:
          $ref: "#/components/schemas/ConversationRole"
          description: The role that the message belongs to.
        content:
          $ref: "#/components/schemas/ContentBlocks"
          description: The content in the message.
      required:
        - role
        - content
    ConversationRole:
      type: string
      enum:
        - user
        - assistant
    ContentBlocks:
      type: array
      items:
        $ref: "#/components/schemas/ContentBlock"
    ContentBlock:
      description: Contains the content for the message you pass to, or receive from a model. For more information, see Create a prompt using Prompt management.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/String"
          description: The text in the message.
        cachePoint:
          $ref: "#/components/schemas/CachePointBlock"
          description: Creates a cache checkpoint within a message.
    SystemContentBlocks:
      type: array
      items:
        $ref: "#/components/schemas/SystemContentBlock"
    SystemContentBlock:
      description: Contains a system prompt to provide context to the model or to describe how it should behave. For more information, see Create a prompt using Prompt management.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/NonEmptyString"
          description: The text in the system prompt.
        cachePoint:
          $ref: "#/components/schemas/CachePointBlock"
          description: Creates a cache checkpoint within a tool designation
    NonEmptyString:
      type: string
      minLength: 1
    ToolConfiguration:
      description: Configuration information for the tools that the model can use when generating a response. For more information, see Use a tool to complete an Amazon Bedrock model response.
      type: object
      properties:
        tools:
          $ref: "#/components/schemas/ToolConfigurationToolsList"
          description: An array of tools to pass to a model.
        toolChoice:
          $ref: "#/components/schemas/ToolChoice"
          description: Defines which tools the model should request when invoked.
      required:
        - tools
    ToolConfigurationToolsList:
      type: array
      items:
        $ref: "#/components/schemas/Tool"
    Tool:
      description: Contains configurations for a tool that a model can use when generating a response. For more information, see Use a tool to complete an Amazon Bedrock model response.
      type: object
      properties:
        toolSpec:
          $ref: "#/components/schemas/ToolSpecification"
          description: The specification for the tool.
        cachePoint:
          $ref: "#/components/schemas/CachePointBlock"
          description: Creates a cache checkpoint within a tool designation
    ToolSpecification:
      description: Contains a specification for a tool. For more information, see Use a tool to complete an Amazon Bedrock model response.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ToolName"
          description: The name of the tool.
        description:
          $ref: "#/components/schemas/NonEmptyString"
          description: The description of the tool.
        inputSchema:
          $ref: "#/components/schemas/ToolInputSchema"
          description: The input schema for the tool.
        strict:
          $ref: "#/components/schemas/Boolean"
          description: Whether to enforce strict JSON schema adherence for the tool input
      required:
        - name
        - inputSchema
    ToolName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z][a-zA-Z0-9_]*"
    ToolInputSchema:
      description: The input schema for the tool. For more information, see Use a tool to complete an Amazon Bedrock model response.
      type: object
      properties:
        json:
          $ref: "#/components/schemas/Document"
          description: A JSON object defining the input schema for the tool.
    Boolean:
      type: boolean
    ToolChoice:
      description: Defines which tools the model should request when invoked. For more information, see Use a tool to complete an Amazon Bedrock model response.
      type: object
      properties:
        auto:
          $ref: "#/components/schemas/AutoToolChoice"
          description: Defines tools. The model automatically decides whether to call a tool or to generate text instead.
        any:
          $ref: "#/components/schemas/AnyToolChoice"
          description: Defines tools, at least one of which must be requested by the model. No text is generated but the results of tool use are sent back to the model to help generate a response.
        tool:
          $ref: "#/components/schemas/SpecificToolChoice"
          description: Defines a specific tool that the model must request. No text is generated but the results of tool use are sent back to the model to help generate a response.
    AutoToolChoice:
      description: Defines tools. The model automatically decides whether to call a tool or to generate text instead. For more information, see Use a tool to complete an Amazon Bedrock model response.
      type: object
    AnyToolChoice:
      description: Defines tools, at least one of which must be requested by the model. No text is generated but the results of tool use are sent back to the model to help generate a response. For more information, see Use a tool to complete an Amazon Bedrock model response.
      type: object
    SpecificToolChoice:
      description: Defines a specific tool that the model must request. No text is generated but the results of tool use are sent back to the model to help generate a response. For more information, see Use a tool to complete an Amazon Bedrock model response.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ToolName"
          description: The name of the tool.
      required:
        - name
    FlowPromptModelIdentifier:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: $|^(arn:aws(-cn|-us-gov|-eusc|-iso(-[b-f])?)?:(bedrock|sagemaker):[a-z0-9-]{1,20}:([0-9]{12})?:([a-z-]+/)?)?([a-zA-Z0-9.-]{1,63}){0,2}(([:][a-z0-9-]{1,63}){0,2})?(/[a-z0-9]{1,12})?
    LambdaFunctionFlowNodeConfiguration:
      description: Contains configurations for a Lambda function node in the flow. You specify the Lambda function to invoke and the inputs into the function. The output is the response that is defined in the Lambda function. For more information, see Node types in a flow in the Amazon Bedrock User Guide.
      type: object
      properties:
        lambdaArn:
          $ref: "#/components/schemas/FlowLambdaArn"
          description: The Amazon Resource Name (ARN) of the Lambda function to invoke.
      required:
        - lambdaArn
    FlowLambdaArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: $|^arn:aws(-cn|-us-gov|-eusc|-iso(-[b-f])?)?:lambda:([a-z]{2,}-){2,}\d:\d{12}:function:[a-zA-Z0-9-_\.]+(:(\$LATEST|[a-zA-Z0-9-_]+))?
    StorageFlowNodeConfiguration:
      description: Contains configurations for a Storage node in a flow. This node stores the input in an Amazon S3 location that you specify.
      type: object
      properties:
        serviceConfiguration:
          $ref: "#/components/schemas/StorageFlowNodeServiceConfiguration"
          description: Contains configurations for the service to use for storing the input into the node.
      required:
        - serviceConfiguration
    StorageFlowNodeServiceConfiguration:
      description: Contains configurations for the service to use for storing the input into the node.
      type: object
      properties:
        s3:
          $ref: "#/components/schemas/StorageFlowNodeS3Configuration"
          description: Contains configurations for the Amazon S3 location in which to store the input into the node.
    StorageFlowNodeS3Configuration:
      description: Contains configurations for the Amazon S3 location in which to store the input into the node.
      type: object
      properties:
        bucketName:
          $ref: "#/components/schemas/FlowS3BucketName"
          description: The name of the Amazon S3 bucket in which to store the input into the node.
      required:
        - bucketName
    FlowS3BucketName:
      type: string
      minLength: 0
      maxLength: 63
      pattern: $|^[a-z0-9][\.\-a-z0-9]{1,61}[a-z0-9]
    AgentFlowNodeConfiguration:
      description: Defines an agent node in your flow. You specify the agent to invoke at this point in the flow. For more information, see Node types in a flow in the Amazon Bedrock User Guide.
      type: object
      properties:
        agentAliasArn:
          $ref: "#/components/schemas/FlowAgentAliasArn"
          description: The Amazon Resource Name (ARN) of the alias of the agent to invoke.
      required:
        - agentAliasArn
    FlowAgentAliasArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: $|^arn:aws(-cn|-us-gov|-eusc|-iso(-[b-f])?)?:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:agent-alias/[0-9a-zA-Z]{10}/[0-9a-zA-Z]{10}
    RetrievalFlowNodeConfiguration:
      description: Contains configurations for a Retrieval node in a flow. This node retrieves data from the Amazon S3 location that you specify and returns it as the output.
      type: object
      properties:
        serviceConfiguration:
          $ref: "#/components/schemas/RetrievalFlowNodeServiceConfiguration"
          description: Contains configurations for the service to use for retrieving data to return as the output from the node.
      required:
        - serviceConfiguration
    RetrievalFlowNodeServiceConfiguration:
      description: Contains configurations for the service to use for retrieving data to return as the output from the node.
      type: object
      properties:
        s3:
          $ref: "#/components/schemas/RetrievalFlowNodeS3Configuration"
          description: Contains configurations for the Amazon S3 location from which to retrieve data to return as the output from the node.
    RetrievalFlowNodeS3Configuration:
      description: Contains configurations for the Amazon S3 location from which to retrieve data to return as the output from the node.
      type: object
      properties:
        bucketName:
          $ref: "#/components/schemas/FlowS3BucketName"
          description: The name of the Amazon S3 bucket from which to retrieve data.
      required:
        - bucketName
    IteratorFlowNodeConfiguration:
      description: Contains configurations for an iterator node in a flow. Takes an input that is an array and iteratively sends each item of the array as an output to the following node. The size of the array is also returned in the output. The output flow node at the end of the flow iteration will return a response for each member of the array. To return only one response, you can include a collector node downstream from the iterator node.
      type: object
    CollectorFlowNodeConfiguration:
      description: Defines a collector node in your flow. This node takes an iteration of inputs and consolidates them into an array in the output. For more information, see Node types in a flow in the Amazon Bedrock User Guide.
      type: object
    InlineCodeFlowNodeConfiguration:
      description: Contains configurations for an inline code node in your flow. Inline code nodes let you write and execute code directly within your flow, enabling data transformations, custom logic, and integrations without needing an external Lambda function.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/InlineCode"
          description: The code that's executed in your inline code node. The code can access input data from previous nodes in the flow, perform operations on that data, and produce output that can be used by other nodes in your flow. The code must be valid in the programming language that you specify.
        language:
          $ref: "#/components/schemas/SupportedLanguages"
          description: The programming language used by your inline code node. The code must be valid in the programming language that you specify. Currently, only Python 3 (Python_3) is supported.
      required:
        - code
        - language
    InlineCode:
      type: string
      minLength: 0
      maxLength: 5000000
    SupportedLanguages:
      type: string
      enum:
        - Python_3
    LoopFlowNodeConfiguration:
      description: "Contains configurations for the nodes of a DoWhile loop in your flow. A DoWhile loop is made up of the following nodes: Loop - The container node that holds the loop's flow definition. This node encompasses the entire loop structure. LoopInput - The entry point node for the loop. This node receives inputs from nodes outside the loop and from previous loop iterations. Body nodes - The processing nodes that execute within each loop iteration. These can be nodes for handling data in your flow, such as a prompt or Lambda function nodes. Some node types aren't supported inside a DoWhile loop body. For more information, see LoopIncompatibleNodeTypeFlowValidationDetails. LoopController - The node that evaluates whether the loop should continue or exit based on a condition. These nodes work together to create a loop that runs at least once and continues until a specified condition is met or a maximum number of iterations is reached."
      type: object
      properties:
        definition:
          $ref: "#/components/schemas/FlowDefinition"
          description: The definition of the DoWhile loop nodes and connections between nodes in the flow.
      required:
        - definition
    LoopInputFlowNodeConfiguration:
      description: Contains configurations for the input node of a DoWhile loop in the flow.
      type: object
    LoopControllerFlowNodeConfiguration:
      description: Contains configurations for the controller node of a DoWhile loop in the flow.
      type: object
      properties:
        continueCondition:
          $ref: "#/components/schemas/FlowCondition"
          description: Specifies the condition that determines when the flow exits the DoWhile loop. The loop executes until this condition evaluates to true.
        maxIterations:
          $ref: "#/components/schemas/LoopControllerFlowNodeConfigurationMaxIterationsInteger"
          description: Specifies the maximum number of times the DoWhile loop can iterate before the flow exits the loop.
      required:
        - continueCondition
    LoopControllerFlowNodeConfigurationMaxIterationsInteger:
      type: integer
      minimum: 1
      maximum: 1000
    FlowNodeInputs:
      type: array
      items:
        $ref: "#/components/schemas/FlowNodeInput"
    FlowNodeInput:
      description: Contains configurations for an input in an Amazon Bedrock Flows node.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/FlowNodeInputName"
          description: Specifies a name for the input that you can reference.
        type_:
          $ref: "#/components/schemas/FlowNodeIODataType"
          description: Specifies the data type of the input. If the input doesn't match this type at runtime, a validation error will be thrown.
        expression:
          $ref: "#/components/schemas/FlowNodeInputExpression"
          description: An expression that formats the input for the node. For an explanation of how to create expressions, see Expressions in Prompt flows in Amazon Bedrock.
        category:
          $ref: "#/components/schemas/FlowNodeInputCategory"
          description: Specifies how input data flows between iterations in a DoWhile loop. LoopCondition - Controls whether the loop continues by evaluating condition expressions against the input data. Use this category to define the condition that determines if the loop should continue. ReturnValueToLoopStart - Defines data to pass back to the start of the loop's next iteration. Use this category for variables that you want to update for each loop iteration. ExitLoop - Defines the value that's available once the loop ends. Use this category to expose loop results to nodes outside the loop.
      required:
        - name
        - type_
        - expression
    FlowNodeInputName:
      type: string
      pattern: "[a-zA-Z]([_]?[0-9a-zA-Z]){1,50}"
    FlowNodeIODataType:
      type: string
      enum:
        - String
        - Number
        - Boolean
        - Object
        - Array
    FlowNodeInputExpression:
      type: string
      minLength: 1
      maxLength: 64
    FlowNodeInputCategory:
      type: string
      enum:
        - LoopCondition
        - ReturnValueToLoopStart
        - ExitLoop
    FlowNodeOutputs:
      type: array
      items:
        $ref: "#/components/schemas/FlowNodeOutput"
    FlowNodeOutput:
      description: Contains configurations for an output from a node.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/FlowNodeOutputName"
          description: A name for the output that you can reference.
        type_:
          $ref: "#/components/schemas/FlowNodeIODataType"
          description: The data type of the output. If the output doesn't match this type at runtime, a validation error will be thrown.
      required:
        - name
        - type_
    FlowNodeOutputName:
      type: string
      pattern: "[a-zA-Z]([_]?[0-9a-zA-Z]){1,50}"
    FlowConnections:
      type: array
      items:
        $ref: "#/components/schemas/FlowConnection"
    FlowConnection:
      description: Contains information about a connection between two nodes in the flow.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/FlowConnectionType"
          description: Whether the source node that the connection begins from is a condition node (Conditional) or not (Data).
        name:
          $ref: "#/components/schemas/FlowConnectionName"
          description: A name for the connection that you can reference.
        source:
          $ref: "#/components/schemas/FlowNodeName"
          description: The node that the connection starts at.
        target:
          $ref: "#/components/schemas/FlowNodeName"
          description: The node that the connection ends at.
        configuration:
          $ref: "#/components/schemas/FlowConnectionConfiguration"
          description: The configuration of the connection.
      required:
        - type_
        - name
        - source
        - target
    FlowConnectionType:
      type: string
      enum:
        - Data
        - Conditional
    FlowConnectionName:
      type: string
      pattern: "[a-zA-Z]([_]?[0-9a-zA-Z]){1,100}"
    FlowConnectionConfiguration:
      description: The configuration of the connection.
      type: object
      properties:
        data:
          $ref: "#/components/schemas/FlowDataConnectionConfiguration"
          description: The configuration of a connection originating from a node that isn't a Condition node.
        conditional:
          $ref: "#/components/schemas/FlowConditionalConnectionConfiguration"
          description: The configuration of a connection originating from a Condition node.
    FlowDataConnectionConfiguration:
      description: The configuration of a connection originating from a node that isn't a Condition node.
      type: object
      properties:
        sourceOutput:
          $ref: "#/components/schemas/FlowNodeOutputName"
          description: The name of the output in the source node that the connection begins from.
        targetInput:
          $ref: "#/components/schemas/FlowNodeInputName"
          description: The name of the input in the target node that the connection ends at.
      required:
        - sourceOutput
        - targetInput
    FlowConditionalConnectionConfiguration:
      description: The configuration of a connection between a condition node and another node.
      type: object
      properties:
        condition:
          $ref: "#/components/schemas/FlowConditionName"
          description: The condition that triggers this connection. For more information about how to write conditions, see the Condition node type in the Node types topic in the Amazon Bedrock User Guide.
      required:
        - condition
    CreateFlowResponse:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/FlowName"
          description: The name of the flow.
        description:
          $ref: "#/components/schemas/FlowDescription"
          description: The description of the flow.
        executionRoleArn:
          $ref: "#/components/schemas/FlowExecutionRoleArn"
          description: The Amazon Resource Name (ARN) of the service role with permissions to create a flow. For more information, see Create a service role for flows in Amazon Bedrock in the Amazon Bedrock User Guide.
        customerEncryptionKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The Amazon Resource Name (ARN) of the KMS key that you encrypted the flow with.
        id:
          $ref: "#/components/schemas/FlowId"
          description: The unique identifier of the flow.
        arn:
          $ref: "#/components/schemas/FlowArn"
          description: The Amazon Resource Name (ARN) of the flow.
        status:
          $ref: "#/components/schemas/FlowStatus"
          description: The status of the flow. When you submit this request, the status will be NotPrepared. If creation fails, the status becomes Failed.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time at which the flow was created.
        updatedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time at which the flow was last updated.
        version:
          $ref: "#/components/schemas/DraftVersion"
          description: The version of the flow. When you create a flow, the version created is the DRAFT version.
        definition:
          $ref: "#/components/schemas/FlowDefinition"
          description: A definition of the nodes and connections between nodes in the flow.
      required:
        - name
        - executionRoleArn
        - id
        - arn
        - status
        - createdAt
        - updatedAt
        - version
    FlowId:
      type: string
      pattern: "[0-9a-zA-Z]{10}"
    FlowArn:
      type: string
      pattern: arn:aws:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:flow/[0-9a-zA-Z]{10}
    FlowStatus:
      type: string
      enum:
        - Failed
        - Prepared
        - Preparing
        - NotPrepared
    FlowIdentifier:
      type: string
      pattern: (arn:aws:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:flow/[0-9a-zA-Z]{10})|([0-9a-zA-Z]{10})
    FlowAliasRoutingConfiguration:
      type: array
      items:
        $ref: "#/components/schemas/FlowAliasRoutingConfigurationListItem"
    FlowAliasRoutingConfigurationListItem:
      description: Contains information about a version that the alias maps to.
      type: object
      properties:
        flowVersion:
          $ref: "#/components/schemas/Version"
          description: The version that the alias maps to.
    FlowAliasConcurrencyConfiguration:
      description: Determines how multiple nodes in a flow can run in parallel. Running nodes concurrently can improve your flow's performance.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/ConcurrencyType"
          description: "The type of concurrency to use for parallel node execution. Specify one of the following options: Automatic - Amazon Bedrock determines which nodes can be executed in parallel based on the flow definition and its dependencies. Manual - You specify which nodes can be executed in parallel."
        maxConcurrency:
          $ref: "#/components/schemas/FlowAliasConcurrencyConfigurationMaxConcurrencyInteger"
          description: The maximum number of nodes that can be executed concurrently in the flow.
      required:
        - type_
    ConcurrencyType:
      type: string
      enum:
        - Automatic
        - Manual
    FlowAliasConcurrencyConfigurationMaxConcurrencyInteger:
      type: integer
      minimum: 1
      maximum: 100
    CreateFlowAliasResponse:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the alias.
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the alias.
        routingConfiguration:
          $ref: "#/components/schemas/FlowAliasRoutingConfiguration"
          description: Contains information about the version that the alias is mapped to.
        concurrencyConfiguration:
          $ref: "#/components/schemas/FlowAliasConcurrencyConfiguration"
          description: The configuration that specifies how nodes in the flow are executed in parallel.
        flowId:
          $ref: "#/components/schemas/FlowId"
          description: The unique identifier of the flow that the alias belongs to.
        id:
          $ref: "#/components/schemas/FlowAliasId"
          description: The unique identifier of the alias.
        arn:
          $ref: "#/components/schemas/FlowAliasArn"
          description: The Amazon Resource Name (ARN) of the alias.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time at which the alias was created.
        updatedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time at which the alias of the flow was last updated.
      required:
        - name
        - routingConfiguration
        - flowId
        - id
        - arn
        - createdAt
        - updatedAt
    FlowAliasId:
      type: string
      pattern: (TSTALIASID|[0-9a-zA-Z]{10})
    FlowAliasArn:
      type: string
      pattern: arn:aws:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:flow/[0-9a-zA-Z]{10}/alias/(TSTALIASID|[0-9a-zA-Z]{10})
    CreateFlowVersionResponse:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/FlowName"
          description: The name of the version.
        description:
          $ref: "#/components/schemas/FlowDescription"
          description: The description of the version.
        executionRoleArn:
          $ref: "#/components/schemas/FlowExecutionRoleArn"
          description: The Amazon Resource Name (ARN) of the service role with permissions to create a flow. For more information, see Create a service role for flows in Amazon Bedrock in the Amazon Bedrock User Guide.
        customerEncryptionKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The KMS key that the flow is encrypted with.
        id:
          $ref: "#/components/schemas/FlowId"
          description: The unique identifier of the flow.
        arn:
          $ref: "#/components/schemas/FlowArn"
          description: The Amazon Resource Name (ARN) of the flow.
        status:
          $ref: "#/components/schemas/FlowStatus"
          description: The status of the flow.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time at which the flow was created.
        version:
          $ref: "#/components/schemas/NumericalVersion"
          description: The version of the flow that was created. Versions are numbered incrementally, starting from 1.
        definition:
          $ref: "#/components/schemas/FlowDefinition"
          description: A definition of the nodes and connections in the flow.
      required:
        - name
        - executionRoleArn
        - id
        - arn
        - status
        - createdAt
        - version
    NumericalVersion:
      type: string
      pattern: "[0-9]{1,5}"
    KnowledgeBaseRoleArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:iam::([0-9]{12})?:role/.+
    KnowledgeBaseConfiguration:
      description: Contains details about the vector embeddings configuration of the knowledge base.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/KnowledgeBaseType"
          description: The type of data that the data source is converted into for the knowledge base.
        vectorKnowledgeBaseConfiguration:
          $ref: "#/components/schemas/VectorKnowledgeBaseConfiguration"
          description: Contains details about the model that's used to convert the data source into vector embeddings.
        kendraKnowledgeBaseConfiguration:
          $ref: "#/components/schemas/KendraKnowledgeBaseConfiguration"
          description: Settings for an Amazon Kendra knowledge base.
        sqlKnowledgeBaseConfiguration:
          $ref: "#/components/schemas/SqlKnowledgeBaseConfiguration"
          description: Specifies configurations for a knowledge base connected to an SQL database.
      required:
        - type_
    KnowledgeBaseType:
      type: string
      enum:
        - VECTOR
        - KENDRA
        - SQL
    VectorKnowledgeBaseConfiguration:
      description: Contains details about the model used to create vector embeddings for the knowledge base.
      type: object
      properties:
        embeddingModelArn:
          $ref: "#/components/schemas/BedrockEmbeddingModelArn"
          description: The Amazon Resource Name (ARN) of the model used to create vector embeddings for the knowledge base.
        embeddingModelConfiguration:
          $ref: "#/components/schemas/EmbeddingModelConfiguration"
          description: The embeddings model configuration details for the vector model used in Knowledge Base.
        supplementalDataStorageConfiguration:
          $ref: "#/components/schemas/SupplementalDataStorageConfiguration"
          description: If you include multimodal data from your data source, use this object to specify configurations for the storage location of the images extracted from your documents. These images can be retrieved and returned to the end user. They can also be used in generation when using RetrieveAndGenerate.
      required:
        - embeddingModelArn
    BedrockEmbeddingModelArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: (arn:aws(-[^:]{1,12})?:(bedrock|sagemaker):[a-z0-9-]{1,20}:([0-9]{12})?:([a-z-]+/)?)?([a-zA-Z0-9.-]{1,63}){0,2}(([:][a-z0-9-]{1,63}){0,2})?(/[a-z0-9]{1,12})?
    EmbeddingModelConfiguration:
      description: The configuration details for the embeddings model.
      type: object
      properties:
        bedrockEmbeddingModelConfiguration:
          $ref: "#/components/schemas/BedrockEmbeddingModelConfiguration"
          description: The vector configuration details on the Bedrock embeddings model.
    BedrockEmbeddingModelConfiguration:
      description: The vector configuration details for the Bedrock embeddings model.
      type: object
      properties:
        dimensions:
          $ref: "#/components/schemas/Dimensions"
          description: The dimensions details for the vector configuration used on the Bedrock embeddings model.
        embeddingDataType:
          $ref: "#/components/schemas/EmbeddingDataType"
          description: The data type for the vectors when using a model to convert text into vector embeddings. The model must support the specified data type for vector embeddings. Floating-point (float32) is the default data type, and is supported by most models for vector embeddings. See Supported embeddings models for information on the available models and their vector data types.
        audio:
          $ref: "#/components/schemas/AudioConfigurations"
          description: Configuration settings for processing audio content in multimodal knowledge bases.
        video:
          $ref: "#/components/schemas/VideoConfigurations"
          description: Configuration settings for processing video content in multimodal knowledge bases.
    Dimensions:
      type: integer
      minimum: 0
      maximum: 4096
    EmbeddingDataType:
      description: Bedrock models embedding data type. Can be either float32 or binary.
      type: string
      enum:
        - FLOAT32
        - BINARY
    AudioConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/AudioConfiguration"
    AudioConfiguration:
      description: Configuration settings for processing audio content in multimodal knowledge bases.
      type: object
      properties:
        segmentationConfiguration:
          $ref: "#/components/schemas/AudioSegmentationConfiguration"
          description: Configuration for segmenting audio content during processing.
      required:
        - segmentationConfiguration
    AudioSegmentationConfiguration:
      description: Configuration for segmenting audio content during multimodal knowledge base ingestion. Determines how audio files are divided into chunks for processing.
      type: object
      properties:
        fixedLengthDuration:
          $ref: "#/components/schemas/AudioSegmentationConfigurationFixedLengthDurationInteger"
          description: The duration in seconds for each audio segment. Audio files will be divided into chunks of this length for processing.
      required:
        - fixedLengthDuration
    AudioSegmentationConfigurationFixedLengthDurationInteger:
      type: integer
      minimum: 1
      maximum: 30
    VideoConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/VideoConfiguration"
    VideoConfiguration:
      description: Configuration settings for processing video content in multimodal knowledge bases.
      type: object
      properties:
        segmentationConfiguration:
          $ref: "#/components/schemas/VideoSegmentationConfiguration"
          description: Configuration for segmenting video content during processing.
      required:
        - segmentationConfiguration
    VideoSegmentationConfiguration:
      description: Configuration for segmenting video content during multimodal knowledge base ingestion. Determines how video files are divided into chunks for processing.
      type: object
      properties:
        fixedLengthDuration:
          $ref: "#/components/schemas/VideoSegmentationConfigurationFixedLengthDurationInteger"
          description: The duration in seconds for each video segment. Video files will be divided into chunks of this length for processing.
      required:
        - fixedLengthDuration
    VideoSegmentationConfigurationFixedLengthDurationInteger:
      type: integer
      minimum: 1
