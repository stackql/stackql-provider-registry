        - S3
        - WEB
        - CONFLUENCE
        - SALESFORCE
        - SHAREPOINT
        - CUSTOM
        - REDSHIFT_METADATA
    S3DataSourceConfiguration:
      description: The configuration information to connect to Amazon S3 as your data source.
