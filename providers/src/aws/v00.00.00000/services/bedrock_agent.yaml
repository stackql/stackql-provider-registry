components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Id:
      type: string
      pattern: "[0-9a-zA-Z]{10}"
    DraftVersion:
      type: string
      minLength: 5
      maxLength: 5
      pattern: DRAFT
    AgentDescriptor:
      description: An agent descriptor.
      type: object
      properties:
        aliasArn:
          $ref: "#/components/schemas/AgentAliasArn"
          description: The agent's alias ARN.
    AgentAliasArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:aws:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:agent-alias/[0-9a-zA-Z]{10}/[0-9a-zA-Z]{10}
    Name:
      type: string
      pattern: ([0-9a-zA-Z][_-]?){1,100}
    CollaborationInstruction:
      type: string
      minLength: 1
      maxLength: 4000
    RelayConversationHistory:
      type: string
      enum:
        - TO_COLLABORATOR
        - DISABLED
    ClientToken:
      type: string
      minLength: 33
      maxLength: 256
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,256}"
    AssociateAgentCollaboratorResponse:
      type: object
      properties:
        agentCollaborator:
          $ref: "#/components/schemas/AgentCollaborator"
          description: Details about the collaborator.
      required:
        - agentCollaborator
    AgentCollaborator:
      description: An agent collaborator.
      type: object
      properties:
        agentId:
          $ref: "#/components/schemas/Id"
          description: The collaborator's agent ID.
        agentVersion:
          $ref: "#/components/schemas/Version"
          description: The collaborator's agent version.
        agentDescriptor:
          $ref: "#/components/schemas/AgentDescriptor"
          description: The collaborator's agent descriptor.
        collaboratorId:
          $ref: "#/components/schemas/Id"
          description: The collaborator's collaborator ID.
        collaborationInstruction:
          $ref: "#/components/schemas/CollaborationInstruction"
          description: The collaborator's instructions.
        collaboratorName:
          $ref: "#/components/schemas/Name"
          description: The collaborator's collaborator name.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: When the collaborator was created.
        lastUpdatedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: When the collaborator was updated.
        relayConversationHistory:
          $ref: "#/components/schemas/RelayConversationHistory"
          description: The collaborator's relay conversation history.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: The collaborator's client token.
      required:
        - agentId
        - agentVersion
        - agentDescriptor
        - collaboratorId
        - collaborationInstruction
        - collaboratorName
        - createdAt
        - lastUpdatedAt
    Version:
      type: string
      minLength: 1
      maxLength: 5
      pattern: (DRAFT|[0-9]{0,4}[1-9][0-9]{0,4})
    DateTimestamp:
      type: string
      format: date-time
    Description:
      type: string
      minLength: 1
      maxLength: 200
    KnowledgeBaseState:
      type: string
      enum:
        - ENABLED
        - DISABLED
    AssociateAgentKnowledgeBaseResponse:
      type: object
      properties:
        agentKnowledgeBase:
          $ref: "#/components/schemas/AgentKnowledgeBase"
          description: Contains details about the knowledge base that has been associated with the agent.
      required:
        - agentKnowledgeBase
    AgentKnowledgeBase:
      description: Contains details about a knowledge base that is associated with an agent.
      type: object
      properties:
        agentId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the agent with which the knowledge base is associated.
        agentVersion:
          $ref: "#/components/schemas/Version"
          description: The version of the agent with which the knowledge base is associated.
        knowledgeBaseId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the association between the agent and the knowledge base.
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the association between the agent and the knowledge base.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time at which the association between the agent and the knowledge base was created.
        updatedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time at which the association between the agent and the knowledge base was last updated.
        knowledgeBaseState:
          $ref: "#/components/schemas/KnowledgeBaseState"
          description: Specifies whether to use the knowledge base or not when sending an InvokeAgent request.
      required:
        - agentId
        - agentVersion
        - knowledgeBaseId
        - description
        - createdAt
        - updatedAt
        - knowledgeBaseState
    Instruction:
      type: string
      minLength: 40
      maxLength: 4000
    ModelIdentifier:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: (arn:aws(-[^:]{1,12})?:(bedrock|sagemaker):[a-z0-9-]{1,20}:([0-9]{12})?:([a-z-]+/)?)?([a-zA-Z0-9.-]{1,63}){0,2}(([:][a-z0-9-]{1,63}){0,2})?(/[a-z0-9]{1,12})?
    OrchestrationType:
      type: string
      enum:
        - DEFAULT
        - CUSTOM_ORCHESTRATION
    CustomOrchestration:
      description: Details of custom orchestration.
      type: object
      properties:
        executor:
          $ref: "#/components/schemas/OrchestrationExecutor"
          description: The structure of the executor invoking the actions in custom orchestration.
    OrchestrationExecutor:
      description: Contains details about the Lambda function containing the orchestration logic carried out upon invoking the custom orchestration.
      type: object
      properties:
        lambda:
          $ref: "#/components/schemas/LambdaArn"
          description: The Amazon Resource Name (ARN) of the Lambda function containing the business logic that is carried out upon invoking the action.
    LambdaArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:(aws[a-zA-Z-]*)?:lambda:[a-z]{2}(-gov)?-[a-z]+-\d{1}:\d{12}:function:[a-zA-Z0-9-_\.]+(:(\$LATEST|[a-zA-Z0-9-_]+))?
    SessionTTL:
      type: integer
      minimum: 60
      maximum: 5400
    AgentRoleArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:iam::([0-9]{12})?:role/.+
    KmsKeyArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws(|-cn|-us-gov):kms:[a-zA-Z0-9-]*:[0-9]{12}:key/[a-zA-Z0-9-]{36}
    TagsMap:
      type: object
      properties: {}
    PromptOverrideConfiguration:
      description: Contains configurations to override prompts in different parts of an agent sequence. For more information, see Advanced prompts.
      type: object
      properties:
        promptConfigurations:
          $ref: "#/components/schemas/PromptConfigurations"
          description: Contains configurations to override a prompt template in one part of an agent sequence. For more information, see Advanced prompts.
        overrideLambda:
          $ref: "#/components/schemas/LambdaArn"
          description: The ARN of the Lambda function to use when parsing the raw foundation model output in parts of the agent sequence. If you specify this field, at least one of the promptConfigurations must contain a parserMode value that is set to OVERRIDDEN. For more information, see Parser Lambda function in Amazon Bedrock Agents.
      required:
        - promptConfigurations
    PromptConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/PromptConfiguration"
    PromptConfiguration:
      description: Contains configurations to override a prompt template in one part of an agent sequence. For more information, see Advanced prompts.
      type: object
      properties:
        promptType:
          $ref: "#/components/schemas/PromptType"
          description: The step in the agent sequence that this prompt configuration applies to.
        promptCreationMode:
          $ref: "#/components/schemas/CreationMode"
          description: Specifies whether to override the default prompt template for this promptType. Set this value to OVERRIDDEN to use the prompt that you provide in the basePromptTemplate. If you leave it as DEFAULT, the agent uses a default prompt template.
        promptState:
          $ref: "#/components/schemas/PromptState"
          description: Specifies whether to allow the agent to carry out the step specified in the promptType. If you set this value to DISABLED, the agent skips that step. The default state for each promptType is as follows. PRE_PROCESSING – DISABLED ORCHESTRATION – ENABLED KNOWLEDGE_BASE_RESPONSE_GENERATION – ENABLED POST_PROCESSING – DISABLED
        basePromptTemplate:
          $ref: "#/components/schemas/BasePromptTemplate"
          description: Defines the prompt template with which to replace the default prompt template. You can use placeholder variables in the base prompt template to customize the prompt. For more information, see Prompt template placeholder variables. For more information, see Configure the prompt templates.
        inferenceConfiguration:
          $ref: "#/components/schemas/InferenceConfiguration"
          description: Contains inference parameters to use when the agent invokes a foundation model in the part of the agent sequence defined by the promptType. For more information, see Inference parameters for foundation models.
        parserMode:
          $ref: "#/components/schemas/CreationMode"
          description: Specifies whether to override the default parser Lambda function when parsing the raw foundation model output in the part of the agent sequence defined by the promptType. If you set the field as OVERRIDDEN, the overrideLambda field in the PromptOverrideConfiguration must be specified with the ARN of a Lambda function.
        foundationModel:
          $ref: "#/components/schemas/ModelIdentifier"
          description: The agent's foundation model.
        additionalModelRequestFields:
          $ref: "#/components/schemas/Document"
          description: If the Converse or ConverseStream operations support the model, additionalModelRequestFields contains additional inference parameters, beyond the base set of inference parameters in the inferenceConfiguration field. For more information, see Inference request parameters and response fields for foundation models in the Amazon Bedrock user guide.
    PromptType:
      type: string
      enum:
        - PRE_PROCESSING
        - ORCHESTRATION
        - POST_PROCESSING
        - KNOWLEDGE_BASE_RESPONSE_GENERATION
        - MEMORY_SUMMARIZATION
    CreationMode:
      type: string
      enum:
        - DEFAULT
        - OVERRIDDEN
    PromptState:
      type: string
      enum:
        - ENABLED
        - DISABLED
    BasePromptTemplate:
      type: string
      minLength: 1
      maxLength: 100000
    InferenceConfiguration:
      description: Contains inference parameters to use when the agent invokes a foundation model in the part of the agent sequence defined by the promptType. For more information, see Inference parameters for foundation models.
      type: object
      properties:
        temperature:
          $ref: "#/components/schemas/Temperature"
          description: The likelihood of the model selecting higher-probability options while generating a response. A lower value makes the model more likely to choose higher-probability options, while a higher value makes the model more likely to choose lower-probability options.
        topP:
          $ref: "#/components/schemas/TopP"
          description: While generating a response, the model determines the probability of the following token at each point of generation. The value that you set for Top P determines the number of most-likely candidates from which the model chooses the next token in the sequence. For example, if you set topP to 0.8, the model only selects the next token from the top 80% of the probability distribution of next tokens.
        topK:
          $ref: "#/components/schemas/TopK"
          description: While generating a response, the model determines the probability of the following token at each point of generation. The value that you set for topK is the number of most-likely candidates from which the model chooses the next token in the sequence. For example, if you set topK to 50, the model selects the next token from among the top 50 most likely choices.
        maximumLength:
          $ref: "#/components/schemas/MaximumLength"
          description: The maximum number of tokens to allow in the generated response.
        stopSequences:
          $ref: "#/components/schemas/StopSequences"
          description: A list of stop sequences. A stop sequence is a sequence of characters that causes the model to stop generating the response.
    Temperature:
      type: number
      format: float
      minimum: 0
      maximum: 1
    TopP:
      type: number
      format: float
      minimum: 0
      maximum: 1
    TopK:
      type: integer
      minimum: 0
      maximum: 500
    MaximumLength:
      type: integer
      minimum: 0
    StopSequences:
      type: array
      items:
        $ref: "#/components/schemas/String"
    String:
      type: string
    Document:
      type: object
    GuardrailConfiguration:
      description: Details about a guardrail associated with a resource.
      type: object
      properties:
        guardrailIdentifier:
          $ref: "#/components/schemas/GuardrailIdentifier"
          description: The unique identifier of the guardrail.
        guardrailVersion:
          $ref: "#/components/schemas/GuardrailVersion"
          description: The version of the guardrail.
    GuardrailIdentifier:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: (([a-z0-9]+)|(arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:guardrail/[a-z0-9]+))
    GuardrailVersion:
      type: string
      pattern: (([0-9]{1,8})|(DRAFT))
    MemoryConfiguration:
      description: Details of the memory configuration.
      type: object
      properties:
        enabledMemoryTypes:
          $ref: "#/components/schemas/EnabledMemoryTypes"
          description: The type of memory that is stored.
        storageDays:
          $ref: "#/components/schemas/StorageDays"
          description: The number of days the agent is configured to retain the conversational context.
        sessionSummaryConfiguration:
          $ref: "#/components/schemas/SessionSummaryConfiguration"
          description: Contains the configuration for SESSION_SUMMARY memory type enabled for the agent.
      required:
        - enabledMemoryTypes
    EnabledMemoryTypes:
      type: array
      items:
        $ref: "#/components/schemas/MemoryType"
    MemoryType:
      type: string
      enum:
        - SESSION_SUMMARY
    StorageDays:
      type: integer
      minimum: 0
      maximum: 365
    SessionSummaryConfiguration:
      description: Configuration for SESSION_SUMMARY memory type enabled for the agent.
      type: object
      properties:
        maxRecentSessions:
          $ref: "#/components/schemas/MaxRecentSessions"
          description: Maximum number of recent session summaries to include in the agent's prompt context.
    MaxRecentSessions:
      type: integer
      minimum: 1
    AgentCollaboration:
      type: string
      enum:
        - SUPERVISOR
        - SUPERVISOR_ROUTER
        - DISABLED
    CreateAgentResponse:
      type: object
      properties:
        agent:
          $ref: "#/components/schemas/Agent"
          description: Contains details about the agent created.
      required:
        - agent
    Agent:
      description: Contains details about an agent.
      type: object
      properties:
        agentId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the agent.
        agentName:
          $ref: "#/components/schemas/Name"
          description: The name of the agent.
        agentArn:
          $ref: "#/components/schemas/AgentArn"
          description: The Amazon Resource Name (ARN) of the agent.
        agentVersion:
          $ref: "#/components/schemas/DraftVersion"
          description: The version of the agent.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: A unique, case-sensitive identifier to ensure that the API request completes no more than one time. If this token matches a previous request, Amazon Bedrock ignores the request, but does not return an error. For more information, see Ensuring idempotency.
        instruction:
          $ref: "#/components/schemas/Instruction"
          description: Instructions that tell the agent what it should do and how it should interact with users.
        agentStatus:
          $ref: "#/components/schemas/AgentStatus"
          description: "The status of the agent and whether it is ready for use. The following statuses are possible: CREATING – The agent is being created. PREPARING – The agent is being prepared. PREPARED – The agent is prepared and ready to be invoked. NOT_PREPARED – The agent has been created but not yet prepared. FAILED – The agent API operation failed. UPDATING – The agent is being updated. DELETING – The agent is being deleted."
        foundationModel:
          $ref: "#/components/schemas/ModelIdentifier"
          description: The foundation model used for orchestration by the agent.
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the agent.
        orchestrationType:
          $ref: "#/components/schemas/OrchestrationType"
          description: Specifies the orchestration strategy for the agent.
        customOrchestration:
          $ref: "#/components/schemas/CustomOrchestration"
          description: Contains custom orchestration configurations for the agent.
        idleSessionTTLInSeconds:
          $ref: "#/components/schemas/SessionTTL"
          description: The number of seconds for which Amazon Bedrock keeps information about a user's conversation with the agent. A user interaction remains active for the amount of time specified. If no conversation occurs during this time, the session expires and Amazon Bedrock deletes any data provided before the timeout.
        agentResourceRoleArn:
          $ref: "#/components/schemas/AgentRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role with permissions to invoke API operations on the agent.
        customerEncryptionKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The Amazon Resource Name (ARN) of the KMS key that encrypts the agent.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time at which the agent was created.
        updatedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time at which the agent was last updated.
        preparedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time at which the agent was last prepared.
        failureReasons:
          $ref: "#/components/schemas/FailureReasons"
          description: Contains reasons that the agent-related API that you invoked failed.
        recommendedActions:
          $ref: "#/components/schemas/RecommendedActions"
          description: Contains recommended actions to take for the agent-related API that you invoked to succeed.
        promptOverrideConfiguration:
          $ref: "#/components/schemas/PromptOverrideConfiguration"
          description: Contains configurations to override prompt templates in different parts of an agent sequence. For more information, see Advanced prompts.
        guardrailConfiguration:
          $ref: "#/components/schemas/GuardrailConfiguration"
          description: Details about the guardrail associated with the agent.
        memoryConfiguration:
          $ref: "#/components/schemas/MemoryConfiguration"
          description: Contains memory configuration for the agent.
        agentCollaboration:
          $ref: "#/components/schemas/AgentCollaboration"
          description: The agent's collaboration settings.
      required:
        - agentId
        - agentName
        - agentArn
        - agentVersion
        - agentStatus
        - idleSessionTTLInSeconds
        - agentResourceRoleArn
        - createdAt
        - updatedAt
    AgentArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:aws:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:agent/[0-9a-zA-Z]{10}
    AgentStatus:
      type: string
      enum:
        - CREATING
        - PREPARING
        - PREPARED
        - NOT_PREPARED
        - DELETING
        - FAILED
        - VERSIONING
        - UPDATING
    FailureReasons:
      type: array
      items:
        $ref: "#/components/schemas/FailureReason"
    FailureReason:
      type: string
      minLength: 0
      maxLength: 2048
    RecommendedActions:
      type: array
      items:
        $ref: "#/components/schemas/RecommendedAction"
    RecommendedAction:
      type: string
      minLength: 0
      maxLength: 2048
    ActionGroupSignature:
      type: string
      enum:
        - AMAZON.UserInput
        - AMAZON.CodeInterpreter
        - ANTHROPIC.Computer
        - ANTHROPIC.Bash
        - ANTHROPIC.TextEditor
    ActionGroupSignatureParams:
      type: object
      properties: {}
    ActionGroupExecutor:
      description: Contains details about the Lambda function containing the business logic that is carried out upon invoking the action or the custom control method for handling the information elicited from the user.
      type: object
      properties:
        lambda:
          $ref: "#/components/schemas/LambdaArn"
          description: The Amazon Resource Name (ARN) of the Lambda function containing the business logic that is carried out upon invoking the action.
        customControl:
          $ref: "#/components/schemas/CustomControlMethod"
          description: To return the action group invocation results directly in the InvokeAgent response, specify RETURN_CONTROL.
    CustomControlMethod:
      type: string
      enum:
        - RETURN_CONTROL
    APISchema:
      description: Contains details about the OpenAPI schema for the action group. For more information, see Action group OpenAPI schemas. You can either include the schema directly in the payload field or you can upload it to an S3 bucket and specify the S3 bucket location in the s3 field.
      type: object
      properties:
        s3:
          $ref: "#/components/schemas/S3Identifier"
          description: Contains details about the S3 object containing the OpenAPI schema for the action group. For more information, see Action group OpenAPI schemas.
        payload:
          $ref: "#/components/schemas/Payload"
          description: The JSON or YAML-formatted payload defining the OpenAPI schema for the action group. For more information, see Action group OpenAPI schemas.
    S3Identifier:
      description: The identifier information for an Amazon S3 bucket.
      type: object
      properties:
        s3BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of the S3 bucket.
        s3ObjectKey:
          $ref: "#/components/schemas/S3ObjectKey"
          description: The S3 object key for the S3 resource.
    S3BucketName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: "[a-z0-9][\\.\\-a-z0-9]{1,61}[a-z0-9]"
    S3ObjectKey:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[\\.\\-\\!\\*\\_\\'\\(\\)a-zA-Z0-9][\\.\\-\\!\\*\\_\\'\\(\\)\\/a-zA-Z0-9]*"
    Payload:
      type: string
    ActionGroupState:
      type: string
      enum:
        - ENABLED
        - DISABLED
    FunctionSchema:
      description: "Defines functions that each define parameters that the agent needs to invoke from the user. Each function represents an action in an action group. This data type is used in the following API operations: CreateAgentActionGroup request CreateAgentActionGroup response UpdateAgentActionGroup request UpdateAgentActionGroup response GetAgentActionGroup response"
      type: object
      properties:
        functions:
          $ref: "#/components/schemas/Functions"
          description: A list of functions that each define an action in the action group.
    Functions:
      type: array
      items:
        $ref: "#/components/schemas/Function"
    Function:
      description: "Defines parameters that the agent needs to invoke from the user to complete the function. Corresponds to an action in an action group. This data type is used in the following API operations: CreateAgentActionGroup request CreateAgentActionGroup response UpdateAgentActionGroup request UpdateAgentActionGroup response GetAgentActionGroup response"
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
          description: A name for the function.
        description:
          $ref: "#/components/schemas/FunctionDescription"
          description: A description of the function and its purpose.
        parameters:
          type: object
          properties: {}
          description: The parameters that the agent elicits from the user to fulfill the function.
        requireConfirmation:
          $ref: "#/components/schemas/RequireConfirmation"
          description: Contains information if user confirmation is required to invoke the function.
      required:
        - name
    FunctionDescription:
      type: string
      minLength: 1
      maxLength: 1200
    RequireConfirmation:
      description: Whether the action requires user confirmation.
      type: string
      enum:
        - ENABLED
        - DISABLED
    CreateAgentActionGroupResponse:
      type: object
      properties:
        agentActionGroup:
          $ref: "#/components/schemas/AgentActionGroup"
          description: Contains details about the action group that was created.
      required:
        - agentActionGroup
    AgentActionGroup:
      description: Contains details about an action group.
      type: object
      properties:
        agentId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the agent to which the action group belongs.
        agentVersion:
          $ref: "#/components/schemas/Version"
          description: The version of the agent to which the action group belongs.
        actionGroupId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the action group.
        actionGroupName:
          $ref: "#/components/schemas/Name"
          description: The name of the action group.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: A unique, case-sensitive identifier to ensure that the API request completes no more than one time. If this token matches a previous request, Amazon Bedrock ignores the request, but does not return an error. For more information, see Ensuring idempotency.
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the action group.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time at which the action group was created.
        updatedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time at which the action group was last updated.
        parentActionSignature:
          $ref: "#/components/schemas/ActionGroupSignature"
          description: If this field is set as AMAZON.UserInput, the agent can request the user for additional information when trying to complete a task. The description, apiSchema, and actionGroupExecutor fields must be blank for this action group. During orchestration, if the agent determines that it needs to invoke an API in an action group, but doesn't have enough information to complete the API request, it will invoke this action group instead and return an Observation reprompting the user for more information.
        parentActionGroupSignatureParams:
          type: object
          properties: {}
          description: The configuration settings for a computer use action. Computer use is a new Anthropic Claude model capability (in beta) available with Claude 3.7 Sonnet and Claude 3.5 Sonnet v2 only. For more information, see Configure an Amazon Bedrock Agent to complete tasks with computer use tools.
        actionGroupExecutor:
          $ref: "#/components/schemas/ActionGroupExecutor"
          description: The Amazon Resource Name (ARN) of the Lambda function containing the business logic that is carried out upon invoking the action or the custom control method for handling the information elicited from the user.
        apiSchema:
          $ref: "#/components/schemas/APISchema"
          description: Contains either details about the S3 object containing the OpenAPI schema for the action group or the JSON or YAML-formatted payload defining the schema. For more information, see Action group OpenAPI schemas.
        functionSchema:
          $ref: "#/components/schemas/FunctionSchema"
          description: Defines functions that each define parameters that the agent needs to invoke from the user. Each function represents an action in an action group.
        actionGroupState:
          $ref: "#/components/schemas/ActionGroupState"
          description: Specifies whether the action group is available for the agent to invoke or not when sending an InvokeAgent request.
      required:
        - agentId
        - agentVersion
        - actionGroupId
        - actionGroupName
        - createdAt
        - updatedAt
        - actionGroupState
    AgentAliasRoutingConfiguration:
      type: array
      items:
        $ref: "#/components/schemas/AgentAliasRoutingConfigurationListItem"
    AgentAliasRoutingConfigurationListItem:
