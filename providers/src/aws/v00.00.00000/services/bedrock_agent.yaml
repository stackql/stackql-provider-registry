          $ref: "#/components/schemas/RedshiftConfiguration"
          description: Specifies configurations for a knowledge base connected to an Amazon Redshift database.
      required:
        - type_
    QueryEngineType:
      type: string
      enum:
        - REDSHIFT
    RedshiftConfiguration:
      description: Contains configurations for an Amazon Redshift database. For more information, see Build a knowledge base by connecting to a structured data source in the Amazon Bedrock User Guide.
