          description: Information on the failure of Provisioned Throughput assigned to an agent alias.
        aliasInvocationState:
          $ref: "#/components/schemas/AliasInvocationState"
          description: The invocation state for the agent alias. If the agent alias is running, the value is ACCEPT_INVOCATIONS. If the agent alias is paused, the value is REJECT_INVOCATIONS. Use the UpdateAgentAlias operation to change the invocation state.
      required:
