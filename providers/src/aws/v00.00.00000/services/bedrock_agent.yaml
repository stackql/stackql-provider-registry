openapi: 3.0.0
info:
  version: "2023-06-05"
  title: Agents for Amazon Bedrock
  description: Agents for Amazon Bedrock
  x-serviceName: bedrock
  x-serviceAlias: bedrock_agent
  x-protocol: rest-json
  x-apiVersion: "2023-06-05"
  x-endpointPrefix: bedrock-agent
servers:
  - url: https://bedrock-agent.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for bedrock-agent
paths:
  /agents/{agent_id}/agentversions/{agent_version}/agentcollaborators/:
    put:
      operationId: AssociateAgentCollaborator
      description: Makes an agent a collaborator for another agent.
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The agent's ID.
        - name: agent_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DraftVersion"
          description: An agent version.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentDescriptor:
                  $ref: "#/components/schemas/AgentDescriptor"
                collaboratorName:
                  $ref: "#/components/schemas/Name"
                collaborationInstruction:
                  $ref: "#/components/schemas/CollaborationInstruction"
                relayConversationHistory:
                  $ref: "#/components/schemas/RelayConversationHistory"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - agentDescriptor
                - collaboratorName
                - collaborationInstruction
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateAgentCollaboratorResponse"
    post:
      operationId: ListAgentCollaborators
      description: Retrieve a list of an agent's collaborators.
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The agent's ID.
        - name: agent_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Version"
          description: The agent's version.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentCollaboratorsResponse"
  /agents/{agent_id}/agentversions/{agent_version}/knowledgebases/:
    put:
      operationId: AssociateAgentKnowledgeBase
      description: Associates a knowledge base with an agent. If a knowledge base is associated and its indexState is set to Enabled, the agent queries the knowledge base for information to augment its response to the user.
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier of the agent with which you want to associate the knowledge base.
        - name: agent_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DraftVersion"
          description: The version of the agent with which you want to associate the knowledge base.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                knowledgeBaseId:
                  $ref: "#/components/schemas/Id"
                description:
                  $ref: "#/components/schemas/Description"
                knowledgeBaseState:
                  $ref: "#/components/schemas/KnowledgeBaseState"
              required:
                - knowledgeBaseId
                - description
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateAgentKnowledgeBaseResponse"
    post:
      operationId: ListAgentKnowledgeBases
      description: Lists knowledge bases associated with an agent and information about each one.
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier of the agent for which to return information about knowledge bases associated with it.
        - name: agent_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Version"
          description: The version of the agent for which to return information about knowledge bases associated with it.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentKnowledgeBasesResponse"
  /agents/:
    put:
      operationId: CreateAgent
      description: Creates an agent that orchestrates interactions between foundation models, data sources, software applications, user conversations, and APIs to carry out tasks to help customers. Specify the following fields for security purposes. agentResourceRoleArn – The Amazon Resource Name (ARN) of the role with permissions to invoke API operations on an agent. (Optional) customerEncryptionKeyArn – The Amazon Resource Name (ARN) of a KMS key to encrypt the creation of the agent. (Optional) idleSessionTTLinSeconds – Specify the number of seconds for which the agent should maintain session information. After this time expires, the subsequent InvokeAgent request begins a new session. To enable your agent to retain conversational context across multiple sessions, include a memoryConfiguration object. For more information, see Configure memory. To override the default prompt behavior for agent orchestration and to use advanced prompts, include a promptOverrideConfiguration object. For more information, see Advanced prompts. If your agent fails to be created, the response returns a list of failureReasons alongside a list of recommendedActions for you to troubleshoot. The agent instructions will not be honored if your agent has only one knowledge base, uses default prompts, has no action group, and user input is disabled.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentName:
                  $ref: "#/components/schemas/Name"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                instruction:
                  $ref: "#/components/schemas/Instruction"
                foundationModel:
                  $ref: "#/components/schemas/ModelIdentifier"
                description:
                  $ref: "#/components/schemas/Description"
                orchestrationType:
                  $ref: "#/components/schemas/OrchestrationType"
                customOrchestration:
                  $ref: "#/components/schemas/CustomOrchestration"
                idleSessionTTLInSeconds:
                  $ref: "#/components/schemas/SessionTTL"
                agentResourceRoleArn:
                  $ref: "#/components/schemas/AgentRoleArn"
                customerEncryptionKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                tags:
                  $ref: "#/components/schemas/TagsMap"
                promptOverrideConfiguration:
                  $ref: "#/components/schemas/PromptOverrideConfiguration"
                guardrailConfiguration:
                  $ref: "#/components/schemas/GuardrailConfiguration"
                memoryConfiguration:
                  $ref: "#/components/schemas/MemoryConfiguration"
                agentCollaboration:
                  $ref: "#/components/schemas/AgentCollaboration"
              required:
                - agentName
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAgentResponse"
    post:
      operationId: ListAgents
      description: Lists the agents belonging to an account and information about each agent.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentsResponse"
  /agents/{agent_id}/agentversions/{agent_version}/actiongroups/:
    put:
      operationId: CreateAgentActionGroup
      description: Creates an action group for an agent. An action group represents the actions that an agent can carry out for the customer by defining the APIs that an agent can call and the logic for calling them. To allow your agent to request the user for additional information when trying to complete a task, add an action group with the parentActionGroupSignature field set to AMAZON.UserInput. To allow your agent to generate, run, and troubleshoot code when trying to complete a task, add an action group with the parentActionGroupSignature field set to AMAZON.CodeInterpreter. You must leave the description, apiSchema, and actionGroupExecutor fields blank for this action group. During orchestration, if your agent determines that it needs to invoke an API in an action group, but doesn't have enough information to complete the API request, it will invoke this action group instead and return an Observation reprompting the user for more information.
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier of the agent for which to create the action group.
        - name: agent_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DraftVersion"
          description: The version of the agent for which to create the action group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                actionGroupName:
                  $ref: "#/components/schemas/Name"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                description:
                  $ref: "#/components/schemas/Description"
                parentActionGroupSignature:
                  $ref: "#/components/schemas/ActionGroupSignature"
                parentActionGroupSignatureParams:
                  $ref: "#/components/schemas/ActionGroupSignatureParams"
                actionGroupExecutor:
                  $ref: "#/components/schemas/ActionGroupExecutor"
                apiSchema:
                  $ref: "#/components/schemas/APISchema"
                actionGroupState:
                  $ref: "#/components/schemas/ActionGroupState"
                functionSchema:
                  $ref: "#/components/schemas/FunctionSchema"
              required:
                - actionGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAgentActionGroupResponse"
    post:
      operationId: ListAgentActionGroups
      description: Lists the action groups for an agent and information about each one.
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier of the agent.
        - name: agent_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Version"
          description: The version of the agent.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentActionGroupsResponse"
  /agents/{agent_id}/agentaliases/:
    put:
      operationId: CreateAgentAlias
      description: Creates an alias of an agent that can be used to deploy the agent.
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier of the agent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentAliasName:
                  $ref: "#/components/schemas/Name"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                description:
                  $ref: "#/components/schemas/Description"
                routingConfiguration:
                  $ref: "#/components/schemas/AgentAliasRoutingConfiguration"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - agentAliasName
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAgentAliasResponse"
    post:
      operationId: ListAgentAliases
      description: Lists the aliases of an agent and information about each one.
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier of the agent.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentAliasesResponse"
  /knowledgebases/{knowledge_base_id}/datasources/:
    put:
      operationId: CreateDataSource
      description: Connects a knowledge base to a data source. You specify the configuration for the specific data source service in the dataSourceConfiguration field. You can't change the chunkingConfiguration after you create the data source connector.
      parameters:
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier of the knowledge base to which to add the data source.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                name:
                  $ref: "#/components/schemas/Name"
                description:
                  $ref: "#/components/schemas/Description"
                dataSourceConfiguration:
                  $ref: "#/components/schemas/DataSourceConfiguration"
                dataDeletionPolicy:
                  $ref: "#/components/schemas/DataDeletionPolicy"
                serverSideEncryptionConfiguration:
                  $ref: "#/components/schemas/ServerSideEncryptionConfiguration"
                vectorIngestionConfiguration:
                  $ref: "#/components/schemas/VectorIngestionConfiguration"
              required:
                - name
                - dataSourceConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataSourceResponse"
    post:
      operationId: ListDataSources
      description: Lists the data sources in a knowledge base and information about each one.
      parameters:
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier of the knowledge base for which to return a list of information.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataSourcesResponse"
  /flows/:
    post:
      operationId: CreateFlow
      description: Creates a prompt flow that you can use to send an input through various steps to yield an output. Configure nodes, each of which corresponds to a step of the flow, and create connections between the nodes to create paths to different outputs. For more information, see How it works and Create a flow in Amazon Bedrock in the Amazon Bedrock User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/FlowName"
                description:
                  $ref: "#/components/schemas/FlowDescription"
                executionRoleArn:
                  $ref: "#/components/schemas/FlowExecutionRoleArn"
                customerEncryptionKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                definition:
                  $ref: "#/components/schemas/FlowDefinition"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - name
                - executionRoleArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFlowResponse"
    get:
      operationId: ListFlows
      description: Returns a list of flows and information about each flow. For more information, see Manage a flow in Amazon Bedrock in the Amazon Bedrock User Guide.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response. If the total number of results is greater than this value, use the token returned in the response in the nextToken field when making another request to return the next batch of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If the total number of results is greater than the maxResults value provided in the request, enter the token returned in the nextToken field in the response in this field to return the next batch of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFlowsResponse"
  /flows/{flow_identifier}/aliases:
    post:
      operationId: CreateFlowAlias
      description: Creates an alias of a flow for deployment. For more information, see Deploy a flow in Amazon Bedrock in the Amazon Bedrock User Guide.
      parameters:
        - name: flow_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowIdentifier"
          description: The unique identifier of the flow for which to create an alias.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Name"
                description:
                  $ref: "#/components/schemas/Description"
                routingConfiguration:
                  $ref: "#/components/schemas/FlowAliasRoutingConfiguration"
                concurrencyConfiguration:
                  $ref: "#/components/schemas/FlowAliasConcurrencyConfiguration"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - name
                - routingConfiguration
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFlowAliasResponse"
    get:
      operationId: ListFlowAliases
      description: Returns a list of aliases for a flow.
      parameters:
        - name: flow_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowIdentifier"
          description: The unique identifier of the flow for which aliases are being returned.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response. If the total number of results is greater than this value, use the token returned in the response in the nextToken field when making another request to return the next batch of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If the total number of results is greater than the maxResults value provided in the request, enter the token returned in the nextToken field in the response in this field to return the next batch of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFlowAliasesResponse"
  /flows/{flow_identifier}/versions:
    post:
      operationId: CreateFlowVersion
      description: Creates a version of the flow that you can deploy. For more information, see Deploy a flow in Amazon Bedrock in the Amazon Bedrock User Guide.
      parameters:
        - name: flow_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowIdentifier"
          description: The unique identifier of the flow that you want to create a version of.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/FlowDescription"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFlowVersionResponse"
    get:
      operationId: ListFlowVersions
      description: Returns a list of information about each flow. For more information, see Deploy a flow in Amazon Bedrock in the Amazon Bedrock User Guide.
      parameters:
        - name: flow_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowIdentifier"
          description: The unique identifier of the flow.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response. If the total number of results is greater than this value, use the token returned in the response in the nextToken field when making another request to return the next batch of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If the total number of results is greater than the maxResults value provided in the request, enter the token returned in the nextToken field in the response in this field to return the next batch of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFlowVersionsResponse"
  /knowledgebases/:
    put:
      operationId: CreateKnowledgeBase
      description: Creates a knowledge base. A knowledge base contains your data sources so that Large Language Models (LLMs) can use your data. To create a knowledge base, you must first set up your data sources and configure a supported vector store. For more information, see Set up a knowledge base. If you prefer to let Amazon Bedrock create and manage a vector store for you in Amazon OpenSearch Service, use the console. For more information, see Create a knowledge base. Provide the name and an optional description. Provide the Amazon Resource Name (ARN) with permissions to create a knowledge base in the roleArn field. Provide the embedding model to use in the embeddingModelArn field in the knowledgeBaseConfiguration object. Provide the configuration for your vector store in the storageConfiguration object. For an Amazon OpenSearch Service database, use the opensearchServerlessConfiguration object. For more information, see Create a vector store in Amazon OpenSearch Service. For an Amazon Aurora database, use the RdsConfiguration object. For more information, see Create a vector store in Amazon Aurora. For a Pinecone database, use the pineconeConfiguration object. For more information, see Create a vector store in Pinecone. For a Redis Enterprise Cloud database, use the redisEnterpriseCloudConfiguration object. For more information, see Create a vector store in Redis Enterprise Cloud.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                name:
                  $ref: "#/components/schemas/Name"
                description:
                  $ref: "#/components/schemas/Description"
                roleArn:
                  $ref: "#/components/schemas/KnowledgeBaseRoleArn"
                knowledgeBaseConfiguration:
                  $ref: "#/components/schemas/KnowledgeBaseConfiguration"
                storageConfiguration:
                  $ref: "#/components/schemas/StorageConfiguration"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - name
                - roleArn
                - knowledgeBaseConfiguration
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateKnowledgeBaseResponse"
    post:
      operationId: ListKnowledgeBases
      description: Lists the knowledge bases in an account. The list also includesinformation about each knowledge base.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListKnowledgeBasesResponse"
  /prompts/:
    post:
      operationId: CreatePrompt
      description: Creates a prompt in your prompt library that you can add to a flow. For more information, see Prompt management in Amazon Bedrock, Create a prompt using Prompt management and Prompt flows in Amazon Bedrock in the Amazon Bedrock User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/PromptName"
                description:
                  $ref: "#/components/schemas/PromptDescription"
                customerEncryptionKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                defaultVariant:
                  $ref: "#/components/schemas/PromptVariantName"
                variants:
                  $ref: "#/components/schemas/PromptVariantList"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - name
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePromptResponse"
    get:
      operationId: ListPrompts
      description: Returns either information about the working draft (DRAFT version) of each prompt in an account, or information about of all versions of a prompt, depending on whether you include the promptIdentifier field or not. For more information, see View information about prompts using Prompt management in the Amazon Bedrock User Guide.
      parameters:
        - name: promptIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PromptIdentifier"
          description: The unique identifier of the prompt for whose versions you want to return information. Omit this field to list information about all prompts in an account.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response. If the total number of results is greater than this value, use the token returned in the response in the nextToken field when making another request to return the next batch of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If the total number of results is greater than the maxResults value provided in the request, enter the token returned in the nextToken field in the response in this field to return the next batch of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPromptsResponse"
  /prompts/{prompt_identifier}/versions:
    post:
      operationId: CreatePromptVersion
      description: Creates a static snapshot of your prompt that can be deployed to production. For more information, see Deploy prompts using Prompt management by creating versions in the Amazon Bedrock User Guide.
      parameters:
        - name: prompt_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PromptIdentifier"
          description: The unique identifier of the prompt that you want to create a version of.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
