        queryEngineConfiguration:
          $ref: "#/components/schemas/RedshiftQueryEngineConfiguration"
          description: Specifies configurations for an Amazon Redshift query engine.
        queryGenerationConfiguration:
          $ref: "#/components/schemas/QueryGenerationConfiguration"
          description: Specifies configurations for generating queries.
      required:
        - storageConfigurations
        - queryEngineConfiguration
    RedshiftQueryEngineStorageConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/RedshiftQueryEngineStorageConfiguration"
    RedshiftQueryEngineStorageConfiguration:
      description: Contains configurations for Amazon Redshift data storage. Specify the data storage service to use in the type field and include the corresponding field. For more information, see Build a knowledge base by connecting to a structured data source in the Amazon Bedrock User Guide.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/RedshiftQueryEngineStorageType"
          description: The data storage service to use.
        awsDataCatalogConfiguration:
          $ref: "#/components/schemas/RedshiftQueryEngineAwsDataCatalogStorageConfiguration"
          description: Specifies configurations for storage in Glue Data Catalog.
        redshiftConfiguration:
          $ref: "#/components/schemas/RedshiftQueryEngineRedshiftStorageConfiguration"
          description: Specifies configurations for storage in Amazon Redshift.
      required:
        - type_
    RedshiftQueryEngineStorageType:
      type: string
      enum:
        - REDSHIFT
        - AWS_DATA_CATALOG
    RedshiftQueryEngineAwsDataCatalogStorageConfiguration:
      description: Contains configurations for storage in Glue Data Catalog.
      type: object
      properties:
        tableNames:
          $ref: "#/components/schemas/AwsDataCatalogTableNames"
          description: A list of names of the tables to use.
      required:
        - tableNames
    AwsDataCatalogTableNames:
      type: array
      items:
        $ref: "#/components/schemas/AwsDataCatalogTableName"
    AwsDataCatalogTableName:
      type: string
      minLength: 1
      maxLength: 200
      pattern: .*\.*
    RedshiftQueryEngineRedshiftStorageConfiguration:
      description: Contains configurations for storage in Amazon Redshift.
      type: object
      properties:
        databaseName:
          $ref: "#/components/schemas/RedshiftDatabase"
          description: The name of the Amazon Redshift database.
      required:
        - databaseName
    RedshiftDatabase:
      type: string
      minLength: 1
      maxLength: 200
    RedshiftQueryEngineConfiguration:
      description: Contains configurations for an Amazon Redshift query engine. Specify the type of query engine in type and include the corresponding field. For more information, see Build a knowledge base by connecting to a structured data source in the Amazon Bedrock User Guide.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/RedshiftQueryEngineType"
          description: The type of query engine.
        serverlessConfiguration:
          $ref: "#/components/schemas/RedshiftServerlessConfiguration"
          description: Specifies configurations for a serverless Amazon Redshift query engine.
        provisionedConfiguration:
          $ref: "#/components/schemas/RedshiftProvisionedConfiguration"
          description: Specifies configurations for a provisioned Amazon Redshift query engine.
      required:
        - type_
    RedshiftQueryEngineType:
      type: string
      enum:
        - SERVERLESS
        - PROVISIONED
    RedshiftServerlessConfiguration:
      description: Contains configurations for authentication to Amazon Redshift Serverless.
      type: object
      properties:
        workgroupArn:
          $ref: "#/components/schemas/WorkgroupArn"
          description: The ARN of the Amazon Redshift workgroup.
        authConfiguration:
          $ref: "#/components/schemas/RedshiftServerlessAuthConfiguration"
          description: Specifies configurations for authentication to an Amazon Redshift provisioned data warehouse.
      required:
        - workgroupArn
        - authConfiguration
    WorkgroupArn:
      type: string
      pattern: (arn:(aws(-[a-z]+)*):redshift-serverless:[a-z]{2}(-gov)?-[a-z]+-\d{1}:\d{12}:workgroup/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})
    RedshiftServerlessAuthConfiguration:
      description: Specifies configurations for authentication to a Redshift Serverless. Specify the type of authentication to use in the type field and include the corresponding field. If you specify IAM authentication, you don't need to include another field.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/RedshiftServerlessAuthType"
          description: The type of authentication to use.
        usernamePasswordSecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The ARN of an Secrets Manager secret for authentication.
      required:
        - type_
    RedshiftServerlessAuthType:
      type: string
      enum:
        - IAM
        - USERNAME_PASSWORD
    RedshiftProvisionedConfiguration:
      description: Contains configurations for a provisioned Amazon Redshift query engine.
      type: object
      properties:
        clusterIdentifier:
          $ref: "#/components/schemas/RedshiftClusterIdentifier"
          description: The ID of the Amazon Redshift cluster.
        authConfiguration:
          $ref: "#/components/schemas/RedshiftProvisionedAuthConfiguration"
          description: Specifies configurations for authentication to Amazon Redshift.
      required:
        - clusterIdentifier
        - authConfiguration
    RedshiftClusterIdentifier:
      type: string
      minLength: 1
      maxLength: 63
    RedshiftProvisionedAuthConfiguration:
      description: Contains configurations for authentication to an Amazon Redshift provisioned data warehouse. Specify the type of authentication to use in the type field and include the corresponding field. If you specify IAM authentication, you don't need to include another field.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/RedshiftProvisionedAuthType"
          description: The type of authentication to use.
        databaseUser:
          $ref: "#/components/schemas/String"
          description: The database username for authentication to an Amazon Redshift provisioned data warehouse.
        usernamePasswordSecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The ARN of an Secrets Manager secret for authentication.
      required:
        - type_
    RedshiftProvisionedAuthType:
      type: string
      enum:
        - IAM
        - USERNAME_PASSWORD
        - USERNAME
    QueryGenerationConfiguration:
      description: Contains configurations for query generation. For more information, see Build a knowledge base by connecting to a structured data source in the Amazon Bedrock User Guide..
      type: object
      properties:
        executionTimeoutSeconds:
          $ref: "#/components/schemas/QueryExecutionTimeoutSeconds"
          description: The time after which query generation will time out.
        generationContext:
          $ref: "#/components/schemas/QueryGenerationContext"
          description: Specifies configurations for context to use during query generation.
    QueryExecutionTimeoutSeconds:
      type: integer
      minimum: 1
      maximum: 200
    QueryGenerationContext:
      description: ">Contains configurations for context to use during query generation."
      type: object
      properties:
        tables:
          $ref: "#/components/schemas/QueryGenerationTables"
          description: An array of objects, each of which defines information about a table in the database.
        curatedQueries:
          $ref: "#/components/schemas/CuratedQueries"
          description: An array of objects, each of which defines information about example queries to help the query engine generate appropriate SQL queries.
    QueryGenerationTables:
      type: array
      items:
        $ref: "#/components/schemas/QueryGenerationTable"
    QueryGenerationTable:
      description: Contains information about a table for the query engine to consider.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/QueryGenerationTableName"
          description: The name of the table for which the other fields in this object apply.
        description:
          $ref: "#/components/schemas/DescriptionString"
          description: A description of the table that helps the query engine understand the contents of the table.
        inclusion:
          $ref: "#/components/schemas/IncludeExclude"
          description: Specifies whether to include or exclude the table during query generation. If you specify EXCLUDE, the table will be ignored. If you specify INCLUDE, all other tables will be ignored.
        columns:
          $ref: "#/components/schemas/QueryGenerationColumns"
          description: An array of objects, each of which defines information about a column in the table.
      required:
        - name
    QueryGenerationTableName:
      type: string
      pattern: .*\..*\..*
    DescriptionString:
      type: string
      minLength: 1
      maxLength: 200
    IncludeExclude:
      type: string
      enum:
        - INCLUDE
        - EXCLUDE
    QueryGenerationColumns:
      type: array
      items:
        $ref: "#/components/schemas/QueryGenerationColumn"
    QueryGenerationColumn:
      description: Contains information about a column in the current table for the query engine to consider.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/QueryGenerationColumnName"
          description: The name of the column for which the other fields in this object apply.
        description:
          $ref: "#/components/schemas/DescriptionString"
          description: A description of the column that helps the query engine understand the contents of the column.
        inclusion:
          $ref: "#/components/schemas/IncludeExclude"
          description: Specifies whether to include or exclude the column during query generation. If you specify EXCLUDE, the column will be ignored. If you specify INCLUDE, all other columns in the table will be ignored.
    QueryGenerationColumnName:
      type: string
      minLength: 1
      maxLength: 127
    CuratedQueries:
      type: array
      items:
        $ref: "#/components/schemas/CuratedQuery"
    CuratedQuery:
      description: Contains configurations for a query, each of which defines information about example queries to help the query engine generate appropriate SQL queries.
      type: object
      properties:
        naturalLanguage:
          $ref: "#/components/schemas/NaturalLanguageString"
          description: An example natural language query.
        sql:
          $ref: "#/components/schemas/SqlString"
          description: The SQL equivalent of the natural language query.
      required:
        - naturalLanguage
        - sql
    NaturalLanguageString:
      type: string
      minLength: 1
      maxLength: 1000
    SqlString:
      type: string
      minLength: 1
      maxLength: 1000
    StorageConfiguration:
      description: Contains the storage configuration of the knowledge base.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/KnowledgeBaseStorageType"
          description: The vector store service in which the knowledge base is stored.
        opensearchServerlessConfiguration:
          $ref: "#/components/schemas/OpenSearchServerlessConfiguration"
          description: Contains the storage configuration of the knowledge base in Amazon OpenSearch Service.
        opensearchManagedClusterConfiguration:
          $ref: "#/components/schemas/OpenSearchManagedClusterConfiguration"
          description: Contains details about the storage configuration of the knowledge base in OpenSearch Managed Cluster. For more information, see Create a vector index in Amazon OpenSearch Service.
        pineconeConfiguration:
          $ref: "#/components/schemas/PineconeConfiguration"
