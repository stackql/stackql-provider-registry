        knowledgeBaseConfiguration:
          $ref: "#/components/schemas/KnowledgeBaseConfiguration"
          description: Contains details about the embeddings configuration of the knowledge base.
        storageConfiguration:
          $ref: "#/components/schemas/StorageConfiguration"
          description: Contains details about the storage configuration of the knowledge base.
        status:
          $ref: "#/components/schemas/KnowledgeBaseStatus"
          description: "The status of the knowledge base. The following statuses are possible: CREATING – The knowledge base is being created. ACTIVE – The knowledge base is ready to be queried. DELETING – The knowledge base is being deleted. UPDATING – The knowledge base is being updated. FAILED – The knowledge base API operation failed."
