openapi: 3.0.0
info:
  version: "2015-03-31"
  title: AWS Lambda
  description: AWS Lambda
  x-serviceName: lambda
  x-serviceAlias: lambda
  x-protocol: rest-json
  x-apiVersion: "2015-03-31"
  x-endpointPrefix: lambda
servers:
  - url: https://lambda.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for lambda
paths:
  /2018-10-31/layers/{layer_name}/versions/{version_number}/policy:
    post:
      operationId: AddLayerVersionPermission
      description: Adds permissions to the resource-based policy of a version of an Lambda layer. Use this action to grant layer usage permission to other accounts. You can grant permission to a single account, all accounts in an organization, or all Amazon Web Services accounts. To revoke permission, call RemoveLayerVersionPermission with the statement ID that you specified when you added it.
      parameters:
        - name: layer_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LayerName"
          description: The name or Amazon Resource Name (ARN) of the layer.
        - name: version_number
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LayerVersionNumber"
          description: The version number.
        - name: RevisionId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Only update the policy if the revision ID matches the ID specified. Use this option to avoid modifying a policy that has changed since you last read it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StatementId:
                  $ref: "#/components/schemas/StatementId"
                Action:
                  $ref: "#/components/schemas/LayerPermissionAllowedAction"
                Principal:
                  $ref: "#/components/schemas/LayerPermissionAllowedPrincipal"
                OrganizationId:
                  $ref: "#/components/schemas/OrganizationId"
              required:
                - StatementId
                - Action
                - Principal
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddLayerVersionPermissionResponse"
    get:
      operationId: GetLayerVersionPolicy
      description: Returns the permission policy for a version of an Lambda layer. For more information, see AddLayerVersionPermission.
      parameters:
        - name: layer_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LayerName"
          description: The name or Amazon Resource Name (ARN) of the layer.
        - name: version_number
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LayerVersionNumber"
          description: The version number.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLayerVersionPolicyResponse"
  /2015-03-31/functions/{function_name}/policy:
    post:
      operationId: AddPermission
      description: "Grants a principal permission to use a function. You can apply the policy at the function level, or specify a qualifier to restrict access to a single version or alias. If you use a qualifier, the invoker must use the full Amazon Resource Name (ARN) of that version or alias to invoke the function. Note: Lambda does not support adding policies to version $LATEST. To grant permission to another account, specify the account ID as the Principal. To grant permission to an organization defined in Organizations, specify the organization ID as the PrincipalOrgID. For Amazon Web Services services, the principal is a domain-style identifier that the service defines, such as s3.amazonaws.com or sns.amazonaws.com. For Amazon Web Services services, you can also specify the ARN of the associated resource as the SourceArn. If you grant permission to a service principal without specifying the source, other accounts could potentially configure resources in their account to invoke your Lambda function. This operation adds a statement to a resource-based permissions policy for the function. For more information about function policies, see Using resource-based policies for Lambda."
      parameters:
        - name: function_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NamespacedFunctionName"
          description: The name or ARN of the Lambda function, version, or alias. Name formats Function name – my-function (name-only), my-function:v1 (with alias). Function ARN – arn:aws:lambda:us-west-2:123456789012:function:my-function. Partial ARN – 123456789012:function:my-function. You can append a version number or alias to any of the formats. The length constraint applies only to the full ARN. If you specify only the function name, it is limited to 64 characters in length.
        - name: Qualifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NumericLatestPublishedOrAliasQualifier"
          description: Specify a version or alias to add permissions to a published version of the function.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StatementId:
                  $ref: "#/components/schemas/StatementId"
                Action:
                  $ref: "#/components/schemas/Action"
                Principal:
                  $ref: "#/components/schemas/Principal"
                SourceArn:
                  $ref: "#/components/schemas/Arn"
                SourceAccount:
                  $ref: "#/components/schemas/SourceOwner"
                EventSourceToken:
                  $ref: "#/components/schemas/EventSourceToken"
                RevisionId:
                  $ref: "#/components/schemas/String"
                PrincipalOrgID:
                  $ref: "#/components/schemas/PrincipalOrgID"
                FunctionUrlAuthType:
                  $ref: "#/components/schemas/FunctionUrlAuthType"
                InvokedViaFunctionUrl:
                  $ref: "#/components/schemas/InvokedViaFunctionUrl"
              required:
                - StatementId
                - Action
                - Principal
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddPermissionResponse"
    get:
      operationId: GetPolicy
      description: Returns the resource-based IAM policy for a function, version, or alias.
      parameters:
        - name: function_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NamespacedFunctionName"
          description: The name or ARN of the Lambda function, version, or alias. Name formats Function name – my-function (name-only), my-function:v1 (with alias). Function ARN – arn:aws:lambda:us-west-2:123456789012:function:my-function. Partial ARN – 123456789012:function:my-function. You can append a version number or alias to any of the formats. The length constraint applies only to the full ARN. If you specify only the function name, it is limited to 64 characters in length.
        - name: Qualifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NumericLatestPublishedOrAliasQualifier"
          description: Specify a version or alias to get the policy for that resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPolicyResponse"
  /2025-12-01/durable-executions/{durable_execution_arn}/checkpoint:
    post:
      operationId: CheckpointDurableExecution
      description: Saves the progress of a durable function execution during runtime. This API is used by the Lambda durable functions SDK to checkpoint completed steps and schedule asynchronous operations. You typically don't need to call this API directly as the SDK handles checkpointing automatically. Each checkpoint operation consumes the current checkpoint token and returns a new one for the next checkpoint. This ensures that checkpoints are applied in the correct order and prevents duplicate or out-of-order state updates.
      parameters:
        - name: durable_execution_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DurableExecutionArn"
          description: The Amazon Resource Name (ARN) of the durable execution.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CheckpointToken:
                  $ref: "#/components/schemas/CheckpointToken"
                Updates:
                  $ref: "#/components/schemas/OperationUpdates"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - CheckpointToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckpointDurableExecutionResponse"
  /2015-03-31/functions/{function_name}/aliases:
    post:
      operationId: CreateAlias
      description: Creates an alias for a Lambda function version. Use aliases to provide clients with a function identifier that you can update to invoke a different version. You can also map an alias to split invocation requests between two versions. Use the RoutingConfig parameter to specify a second version and the percentage of invocation requests that it receives.
      parameters:
        - name: function_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FunctionName"
          description: The name or ARN of the Lambda function. Name formats Function name - MyFunction. Function ARN - arn:aws:lambda:us-west-2:123456789012:function:MyFunction. Partial ARN - 123456789012:function:MyFunction. The length constraint applies only to the full ARN. If you specify only the function name, it is limited to 64 characters in length.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Alias"
                FunctionVersion:
                  $ref: "#/components/schemas/VersionWithLatestPublished"
                Description:
                  $ref: "#/components/schemas/Description"
                RoutingConfig:
                  $ref: "#/components/schemas/AliasRoutingConfiguration"
              required:
                - FunctionVersion
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AliasConfiguration"
    get:
      operationId: ListAliases
      description: Returns a list of aliases for a Lambda function.
      parameters:
        - name: function_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FunctionName"
          description: The name or ARN of the Lambda function. Name formats Function name - MyFunction. Function ARN - arn:aws:lambda:us-west-2:123456789012:function:MyFunction. Partial ARN - 123456789012:function:MyFunction. The length constraint applies only to the full ARN. If you specify only the function name, it is limited to 64 characters in length.
        - name: FunctionVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/VersionWithLatestPublished"
          description: Specify a function version to only list aliases that invoke that version.
        - name: Marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Specify the pagination token that's returned by a previous request to retrieve the next page of results.
        - name: MaxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxListItems"
          description: Limit the number of aliases returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAliasesResponse"
  /2025-11-30/capacity-providers:
    post:
      operationId: CreateCapacityProvider
      description: Creates a capacity provider that manages compute resources for Lambda functions
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CapacityProviderName:
                  $ref: "#/components/schemas/CapacityProviderName"
                VpcConfig:
                  $ref: "#/components/schemas/CapacityProviderVpcConfig"
                PermissionsConfig:
                  $ref: "#/components/schemas/CapacityProviderPermissionsConfig"
                InstanceRequirements:
                  $ref: "#/components/schemas/InstanceRequirements"
                CapacityProviderScalingConfig:
                  $ref: "#/components/schemas/CapacityProviderScalingConfig"
                KmsKeyArn:
                  $ref: "#/components/schemas/KMSKeyArnNonEmpty"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - CapacityProviderName
                - VpcConfig
                - PermissionsConfig
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCapacityProviderResponse"
    get:
      operationId: ListCapacityProviders
      description: Returns a list of capacity providers in your account.
      parameters:
        - name: State
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CapacityProviderState"
          description: Filter capacity providers by their current state.
        - name: Marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Specify the pagination token that's returned by a previous request to retrieve the next page of results.
        - name: MaxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxFiftyListItems"
          description: The maximum number of capacity providers to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCapacityProvidersResponse"
  /2020-04-22/code-signing-configs:
    post:
      operationId: CreateCodeSigningConfig
      description: Creates a code signing configuration. A code signing configuration defines a list of allowed signing profiles and defines the code-signing validation policy (action to be taken if deployment validation checks fail).
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/Description"
                AllowedPublishers:
                  $ref: "#/components/schemas/AllowedPublishers"
                CodeSigningPolicies:
                  $ref: "#/components/schemas/CodeSigningPolicies"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - AllowedPublishers
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCodeSigningConfigResponse"
    get:
      operationId: ListCodeSigningConfigs
      description: Returns a list of code signing configurations. A request returns up to 10,000 configurations per call. You can use the MaxItems parameter to return fewer configurations per call.
      parameters:
        - name: Marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Specify the pagination token that's returned by a previous request to retrieve the next page of results.
        - name: MaxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxListItems"
          description: Maximum number of items to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCodeSigningConfigsResponse"
  /2015-03-31/event-source-mappings:
    post:
      operationId: CreateEventSourceMapping
      description: "Creates a mapping between an event source and an Lambda function. Lambda reads items from the event source and invokes the function. For details about how to configure different event sources, see the following topics. Amazon DynamoDB Streams Amazon Kinesis Amazon SQS Amazon MQ and RabbitMQ Amazon MSK Apache Kafka Amazon DocumentDB The following error handling options are available for stream sources (DynamoDB, Kinesis, Amazon MSK, and self-managed Apache Kafka): BisectBatchOnFunctionError – If the function returns an error, split the batch in two and retry. MaximumRecordAgeInSeconds – Discard records older than the specified age. The default value is infinite (-1). When set to infinite (-1), failed records are retried until the record expires MaximumRetryAttempts – Discard records after the specified number of retries. The default value is infinite (-1). When set to infinite (-1), failed records are retried until the record expires. OnFailure – Send discarded records to an Amazon SQS queue, Amazon SNS topic, Kafka topic, or Amazon S3 bucket. For more information, see Adding a destination. The following option is available only for DynamoDB and Kinesis event sources: ParallelizationFactor – Process multiple batches from each shard concurrently. For information about which configuration parameters apply to each event source, see the following topics. Amazon DynamoDB Streams Amazon Kinesis Amazon SQS Amazon MQ and RabbitMQ Amazon MSK Apache Kafka Amazon DocumentDB"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                EventSourceArn:
                  $ref: "#/components/schemas/Arn"
                FunctionName:
                  $ref: "#/components/schemas/NamespacedFunctionName"
                Enabled:
                  $ref: "#/components/schemas/Enabled"
                BatchSize:
                  $ref: "#/components/schemas/BatchSize"
                FilterCriteria:
                  $ref: "#/components/schemas/FilterCriteria"
                MaximumBatchingWindowInSeconds:
                  $ref: "#/components/schemas/MaximumBatchingWindowInSeconds"
                ParallelizationFactor:
                  $ref: "#/components/schemas/ParallelizationFactor"
                StartingPosition:
                  $ref: "#/components/schemas/EventSourcePosition"
                StartingPositionTimestamp:
                  $ref: "#/components/schemas/Date"
                DestinationConfig:
                  $ref: "#/components/schemas/DestinationConfig"
                MaximumRecordAgeInSeconds:
                  $ref: "#/components/schemas/MaximumRecordAgeInSeconds"
                BisectBatchOnFunctionError:
                  $ref: "#/components/schemas/BisectBatchOnFunctionError"
                MaximumRetryAttempts:
                  $ref: "#/components/schemas/MaximumRetryAttemptsEventSourceMapping"
                Tags:
                  $ref: "#/components/schemas/Tags"
                TumblingWindowInSeconds:
                  $ref: "#/components/schemas/TumblingWindowInSeconds"
                Topics:
                  $ref: "#/components/schemas/Topics"
                Queues:
                  $ref: "#/components/schemas/Queues"
                SourceAccessConfigurations:
                  $ref: "#/components/schemas/SourceAccessConfigurations"
                SelfManagedEventSource:
                  $ref: "#/components/schemas/SelfManagedEventSource"
                FunctionResponseTypes:
                  $ref: "#/components/schemas/FunctionResponseTypeList"
                AmazonManagedKafkaEventSourceConfig:
                  $ref: "#/components/schemas/AmazonManagedKafkaEventSourceConfig"
                SelfManagedKafkaEventSourceConfig:
                  $ref: "#/components/schemas/SelfManagedKafkaEventSourceConfig"
                ScalingConfig:
                  $ref: "#/components/schemas/ScalingConfig"
                DocumentDBEventSourceConfig:
                  $ref: "#/components/schemas/DocumentDBEventSourceConfig"
                KMSKeyArn:
                  $ref: "#/components/schemas/KMSKeyArn"
                MetricsConfig:
                  $ref: "#/components/schemas/EventSourceMappingMetricsConfig"
                LoggingConfig:
                  $ref: "#/components/schemas/EventSourceMappingLoggingConfig"
                ProvisionedPollerConfig:
                  $ref: "#/components/schemas/ProvisionedPollerConfig"
              required:
                - FunctionName
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventSourceMappingConfiguration"
    get:
      operationId: ListEventSourceMappings
      description: Lists event source mappings. Specify an EventSourceArn to show only event source mappings for a single event source.
      parameters:
        - name: EventSourceArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the event source. Amazon Kinesis – The ARN of the data stream or a stream consumer. Amazon DynamoDB Streams – The ARN of the stream. Amazon Simple Queue Service – The ARN of the queue. Amazon Managed Streaming for Apache Kafka – The ARN of the cluster or the ARN of the VPC connection (for cross-account event source mappings). Amazon MQ – The ARN of the broker. Amazon DocumentDB – The ARN of the DocumentDB change stream.
        - name: FunctionName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NamespacedFunctionName"
          description: The name or ARN of the Lambda function. Name formats Function name – MyFunction. Function ARN – arn:aws:lambda:us-west-2:123456789012:function:MyFunction. Version or Alias ARN – arn:aws:lambda:us-west-2:123456789012:function:MyFunction:PROD. Partial ARN – 123456789012:function:MyFunction. The length constraint applies only to the full ARN. If you specify only the function name, it's limited to 64 characters in length.
        - name: Marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A pagination token returned by a previous call.
        - name: MaxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxListItems"
          description: The maximum number of event source mappings to return. Note that ListEventSourceMappings returns a maximum of 100 items in each response, even if you set the number higher.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventSourceMappingsResponse"
  /2015-03-31/functions:
    post:
      operationId: CreateFunction
      description: Creates a Lambda function. To create a function, you need a deployment package and an execution role. The deployment package is a .zip file archive or container image that contains your function code. The execution role grants the function permission to use Amazon Web Services services, such as Amazon CloudWatch Logs for log streaming and X-Ray for request tracing. If the deployment package is a container image, then you set the package type to Image. For a container image, the code property must include the URI of a container image in the Amazon ECR registry. You do not need to specify the handler and runtime properties. If the deployment package is a .zip file archive, then you set the package type to Zip. For a .zip file archive, the code property specifies the location of the .zip file. You must also specify the handler and runtime properties. The code in the deployment package must be compatible with the target instruction set architecture of the function (x86-64 or arm64). If you do not specify the architecture, then the default value is x86-64. When you create a function, Lambda provisions an instance of the function and its supporting resources. If your function connects to a VPC, this process can take a minute or so. During this time, you can't invoke or modify the function. The State, StateReason, and StateReasonCode fields in the response from GetFunctionConfiguration indicate when the function is ready to invoke. For more information, see Lambda function states. A function has an unpublished version, and can have published versions and aliases. The unpublished version changes when you update your function's code and configuration. A published version is a snapshot of your function code and configuration that can't be changed. An alias is a named resource that maps to a version, and can be changed to map to a different version. Use the Publish parameter to create version 1 of your function from its initial configuration. The other parameters let you configure version-specific and function-level settings. You can modify version-specific settings later with UpdateFunctionConfiguration. Function-level settings apply to both the unpublished and published versions of the function, and include tags (TagResource) and per-function concurrency limits (PutFunctionConcurrency). You can use code signing if your deployment package is a .zip file archive. To enable code signing for this function, specify the ARN of a code-signing configuration. When a user attempts to deploy a code package with UpdateFunctionCode, Lambda checks that the code package has a valid signature from a trusted publisher. The code-signing configuration includes set of signing profiles, which define the trusted publishers for this function. If another Amazon Web Services account or an Amazon Web Services service invokes your function, use AddPermission to grant permission by creating a resource-based Identity and Access Management (IAM) policy. You can grant permissions at the function level, on a version, or on an alias. To invoke your function directly, use Invoke. To invoke your function in response to events in other Amazon Web Services services, create an event source mapping (CreateEventSourceMapping), or configure a function trigger in the other service. For more information, see Invoking Lambda functions.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                FunctionName:
                  $ref: "#/components/schemas/FunctionName"
                Runtime:
                  $ref: "#/components/schemas/Runtime"
                Role:
                  $ref: "#/components/schemas/RoleArn"
                Handler:
                  $ref: "#/components/schemas/Handler"
                Code:
                  $ref: "#/components/schemas/FunctionCode"
                Description:
                  $ref: "#/components/schemas/Description"
                Timeout:
                  $ref: "#/components/schemas/Timeout"
                MemorySize:
                  $ref: "#/components/schemas/MemorySize"
                Publish:
                  $ref: "#/components/schemas/Boolean"
                VpcConfig:
                  $ref: "#/components/schemas/VpcConfig"
                PackageType:
                  $ref: "#/components/schemas/PackageType"
                DeadLetterConfig:
                  $ref: "#/components/schemas/DeadLetterConfig"
                Environment:
                  $ref: "#/components/schemas/Environment"
                KMSKeyArn:
                  $ref: "#/components/schemas/KMSKeyArn"
                TracingConfig:
                  $ref: "#/components/schemas/TracingConfig"
                Tags:
                  $ref: "#/components/schemas/Tags"
                Layers:
                  $ref: "#/components/schemas/LayerList"
                FileSystemConfigs:
                  $ref: "#/components/schemas/FileSystemConfigList"
                ImageConfig:
                  $ref: "#/components/schemas/ImageConfig"
                CodeSigningConfigArn:
                  $ref: "#/components/schemas/CodeSigningConfigArn"
                Architectures:
                  $ref: "#/components/schemas/ArchitecturesList"
                EphemeralStorage:
                  $ref: "#/components/schemas/EphemeralStorage"
                SnapStart:
                  $ref: "#/components/schemas/SnapStart"
                LoggingConfig:
                  $ref: "#/components/schemas/LoggingConfig"
                CapacityProviderConfig:
                  $ref: "#/components/schemas/CapacityProviderConfig"
                PublishTo:
                  $ref: "#/components/schemas/FunctionVersionLatestPublished"
                DurableConfig:
                  $ref: "#/components/schemas/DurableConfig"
                TenancyConfig:
                  $ref: "#/components/schemas/TenancyConfig"
              required:
                - FunctionName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FunctionConfiguration"
    get:
      operationId: ListFunctions
      description: Returns a list of Lambda functions, with the version-specific configuration of each. Lambda returns up to 50 functions per call. Set FunctionVersion to ALL to include all published versions of each function in addition to the unpublished version. The ListFunctions operation returns a subset of the FunctionConfiguration fields. To get the additional fields (State, StateReasonCode, StateReason, LastUpdateStatus, LastUpdateStatusReason, LastUpdateStatusReasonCode, RuntimeVersionConfig) for a function or version, use GetFunction.
      parameters:
        - name: MasterRegion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MasterRegion"
          description: For Lambda@Edge functions, the Amazon Web Services Region of the master function. For example, us-east-1 filters the list of functions to include only Lambda@Edge functions replicated from a master function in US East (N. Virginia). If specified, you must set FunctionVersion to ALL.
        - name: FunctionVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/FunctionVersion"
          description: Set to ALL to include entries for all published versions of each function.
        - name: Marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Specify the pagination token that's returned by a previous request to retrieve the next page of results.
        - name: MaxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxListItems"
          description: The maximum number of functions to return in the response. Note that ListFunctions returns a maximum of 50 items in each response, even if you set the number higher.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFunctionsResponse"
  /2021-10-31/functions/{function_name}/url:
    post:
      operationId: CreateFunctionUrlConfig
      description: Creates a Lambda function URL with the specified configuration parameters. A function URL is a dedicated HTTP(S) endpoint that you can use to invoke your function.
      parameters:
        - name: function_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FunctionName"
