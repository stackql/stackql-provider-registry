  /2015-03-31/functions/{function_name}/code:
    put:
      operationId: UpdateFunctionCode
      description: Updates a Lambda function's code. If code signing is enabled for the function, the code package must be signed by a trusted publisher. For more information, see Configuring code signing for Lambda. If the function's package type is Image, then you must specify the code package in ImageUri as the URI of a container image in the Amazon ECR registry. If the function's package type is Zip, then you must specify the deployment package as a .zip file archive. Enter the Amazon S3 bucket and key of the code .zip file location. You can also provide the function code inline using the ZipFile field. The code in the deployment package must be compatible with the target instruction set architecture of the function (x86-64 or arm64). The function's code is locked when you publish a version. You can't modify the code of a published version, only the unpublished version. For a function defined as a container image, Lambda resolves the image tag to an image digest. In Amazon ECR, if you update the image tag to a new image, Lambda does not automatically update the function.
      parameters:
        - name: function_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FunctionName"
          description: The name or ARN of the Lambda function. Name formats Function name – my-function. Function ARN – arn:aws:lambda:us-west-2:123456789012:function:my-function. Partial ARN – 123456789012:function:my-function. The length constraint applies only to the full ARN. If you specify only the function name, it is limited to 64 characters in length.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ZipFile:
                  $ref: "#/components/schemas/Blob"
                S3Bucket:
                  $ref: "#/components/schemas/S3Bucket"
                S3Key:
                  $ref: "#/components/schemas/S3Key"
                S3ObjectVersion:
                  $ref: "#/components/schemas/S3ObjectVersion"
                ImageUri:
                  $ref: "#/components/schemas/String"
                Publish:
                  $ref: "#/components/schemas/Boolean"
                DryRun:
                  $ref: "#/components/schemas/Boolean"
                RevisionId:
                  $ref: "#/components/schemas/String"
                Architectures:
                  $ref: "#/components/schemas/ArchitecturesList"
                SourceKMSKeyArn:
                  $ref: "#/components/schemas/KMSKeyArn"
                PublishTo:
                  $ref: "#/components/schemas/FunctionVersionLatestPublished"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FunctionConfiguration"
components:
