      type: object
      properties:
        CallbackId:
          $ref: "#/components/schemas/CallbackId"
          description: The callback ID. Callback IDs are generated by the DurableContext when a durable function calls ctx.waitForCallback.
        Result:
          $ref: "#/components/schemas/OperationPayload"
          description: The response payload from the callback operation as a string.
        Error:
          $ref: "#/components/schemas/ErrorObject"
          description: An error object that contains details about the failure.
