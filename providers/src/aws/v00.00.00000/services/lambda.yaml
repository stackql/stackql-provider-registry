    TenantId:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9\\._:\\/=+\\-@ ]+"
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[\\x21-\\x7E]+"
    CheckpointDurableExecutionResponse:
      description: The response from the CheckpointDurableExecution operation.
      type: object
      properties:
        CheckpointToken:
          $ref: "#/components/schemas/CheckpointToken"
          description: A new checkpoint token to use for the next checkpoint operation. This token replaces the one provided in the request and must be used for subsequent checkpoints to maintain proper ordering.
        NewExecutionState:
          $ref: "#/components/schemas/CheckpointUpdatedExecutionState"
          description: Updated execution state information that includes any changes that occurred since the last checkpoint, such as completed callbacks or expired timers. This allows the SDK to update its internal state during replay.
      required:
        - NewExecutionState
    CheckpointUpdatedExecutionState:
      description: Contains operations that have been updated since the last checkpoint, such as completed asynchronous work like timers or callbacks.
      type: object
      properties:
        Operations:
          $ref: "#/components/schemas/Operations"
          description: A list of operations that have been updated since the last checkpoint.
        NextMarker:
          $ref: "#/components/schemas/String"
          description: Indicates that more results are available. Use this value in a subsequent call to retrieve the next page of results.
    Operations:
      type: array
      items:
        $ref: "#/components/schemas/Operation"
    Operation:
      description: Information about an operation within a durable execution.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/OperationId"
          description: The unique identifier for this operation.
        ParentId:
          $ref: "#/components/schemas/OperationId"
          description: The unique identifier of the parent operation, if this operation is running within a child context.
        Name:
          $ref: "#/components/schemas/OperationName"
          description: The customer-provided name for this operation.
        Type:
          $ref: "#/components/schemas/OperationType"
          description: The type of operation.
        SubType:
          $ref: "#/components/schemas/OperationSubType"
          description: The subtype of the operation, providing additional categorization.
        StartTimestamp:
          $ref: "#/components/schemas/ExecutionTimestamp"
          description: The date and time when the operation started, in ISO-8601 format (YYYY-MM-DDThh:mm:ss.sTZD).
        EndTimestamp:
          $ref: "#/components/schemas/ExecutionTimestamp"
          description: The date and time when the operation ended, in ISO-8601 format (YYYY-MM-DDThh:mm:ss.sTZD).
        Status:
          $ref: "#/components/schemas/OperationStatus"
          description: The current status of the operation.
        ExecutionDetails:
          $ref: "#/components/schemas/ExecutionDetails"
          description: Details about the execution, if this operation represents an execution.
        ContextDetails:
          $ref: "#/components/schemas/ContextDetails"
          description: Details about the context, if this operation represents a context.
        StepDetails:
          $ref: "#/components/schemas/StepDetails"
          description: Details about the step, if this operation represents a step.
        WaitDetails:
          $ref: "#/components/schemas/WaitDetails"
          description: Details about the wait operation, if this operation represents a wait.
        CallbackDetails:
          $ref: "#/components/schemas/CallbackDetails"
        ChainedInvokeDetails:
          $ref: "#/components/schemas/ChainedInvokeDetails"
      required:
        - Id
        - Type
        - StartTimestamp
        - Status
    ExecutionTimestamp:
      type: string
      format: date-time
    OperationStatus:
      type: string
      enum:
        - STARTED
        - PENDING
        - READY
        - SUCCEEDED
        - FAILED
        - CANCELLED
        - TIMED_OUT
        - STOPPED
    ExecutionDetails:
      description: Details about a durable execution.
      type: object
      properties:
        InputPayload:
          $ref: "#/components/schemas/InputPayload"
          description: The original input payload provided for the durable execution.
    InputPayload:
      type: string
      minLength: 0
      maxLength: 6291456
    ContextDetails:
      description: Details about a durable execution context.
      type: object
      properties:
        ReplayChildren:
          $ref: "#/components/schemas/ReplayChildren"
          description: Whether the state data of child operations of this completed context should be included in the invoke payload and GetDurableExecutionState response.
        Result:
          $ref: "#/components/schemas/OperationPayload"
          description: The response payload from the context.
        Error:
          $ref: "#/components/schemas/ErrorObject"
          description: Details about the context failure.
    StepDetails:
      description: Details about a step operation.
      type: object
      properties:
        Attempt:
