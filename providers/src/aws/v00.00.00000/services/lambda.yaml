          description: The current attempt number for this step.
        NextAttemptTimestamp:
          $ref: "#/components/schemas/ExecutionTimestamp"
          description: The date and time when the next attempt is scheduled, in ISO-8601 format (YYYY-MM-DDThh:mm:ss.sTZD). Only populated when the step is in a pending state.
        Result:
          $ref: "#/components/schemas/OperationPayload"
          description: The JSON response payload from the step operation.
        Error:
          $ref: "#/components/schemas/ErrorObject"
          description: Details about the step failure.
    AttemptCount:
      type: integer
      minimum: 0
    WaitDetails:
      description: Details about a wait operation.
      type: object
      properties:
        ScheduledEndTimestamp:
          $ref: "#/components/schemas/ExecutionTimestamp"
          description: The date and time when the wait operation is scheduled to complete, in ISO-8601 format (YYYY-MM-DDThh:mm:ss.sTZD).
    CallbackDetails:
