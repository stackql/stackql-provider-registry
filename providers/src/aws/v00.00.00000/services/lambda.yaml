        State:
          $ref: "#/components/schemas/CapacityProviderState"
          description: The current state of the capacity provider.
        VpcConfig:
          $ref: "#/components/schemas/CapacityProviderVpcConfig"
          description: The VPC configuration for the capacity provider.
        PermissionsConfig:
          $ref: "#/components/schemas/CapacityProviderPermissionsConfig"
          description: The permissions configuration for the capacity provider.
        InstanceRequirements:
          $ref: "#/components/schemas/InstanceRequirements"
          description: The instance requirements for compute resources managed by the capacity provider.
        CapacityProviderScalingConfig:
          $ref: "#/components/schemas/CapacityProviderScalingConfig"
          description: The scaling configuration for the capacity provider.
        KmsKeyArn:
          $ref: "#/components/schemas/KMSKeyArn"
          description: The ARN of the KMS key used to encrypt the capacity provider's resources.
        LastModified:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the capacity provider was last modified.
      required:
        - CapacityProviderArn
        - State
        - VpcConfig
        - PermissionsConfig
    CapacityProviderArn:
      type: string
      minLength: 1
      maxLength: 140
      pattern: arn:aws[a-zA-Z-]*:lambda:[a-z]{2}((-gov)|(-iso([a-z]?)))?-[a-z]+-\d{1}:\d{12}:capacity-provider:[a-zA-Z0-9-_]+
    CapacityProviderState:
      type: string
      enum:
        - Pending
        - Active
        - Failed
        - Deleting
    KMSKeyArn:
      type: string
      pattern: (arn:(aws[a-zA-Z-]*)?:[a-z0-9-.]+:.*)|()
    Timestamp:
      type: string
    AllowedPublishers:
      description: List of signing profiles that can sign a code package.
      type: object
      properties:
        SigningProfileVersionArns:
          $ref: "#/components/schemas/SigningProfileVersionArns"
          description: The Amazon Resource Name (ARN) for each of the signing profiles. A signing profile defines a trusted user who can sign a code package.
      required:
        - SigningProfileVersionArns
    SigningProfileVersionArns:
      type: array
      items:
        $ref: "#/components/schemas/Arn"
    CodeSigningPolicies:
      description: Code signing configuration policies specify the validation failure action for signature mismatch or expiry.
      type: object
      properties:
        UntrustedArtifactOnDeployment:
          $ref: "#/components/schemas/CodeSigningPolicy"
          description: "Code signing configuration policy for deployment validation failure. If you set the policy to Enforce, Lambda blocks the deployment request if signature validation checks fail. If you set the policy to Warn, Lambda allows the deployment and issues a new Amazon CloudWatch metric (SignatureValidationErrors) and also stores the warning in the CloudTrail log. Default value: Warn"
    CodeSigningPolicy:
      type: string
      enum:
        - Warn
        - Enforce
    CreateCodeSigningConfigResponse:
      type: object
      properties:
        CodeSigningConfig:
          $ref: "#/components/schemas/CodeSigningConfig"
          description: The code signing configuration.
      required:
        - CodeSigningConfig
    CodeSigningConfig:
      description: Details about a Code signing configuration.
      type: object
      properties:
        CodeSigningConfigId:
          $ref: "#/components/schemas/CodeSigningConfigId"
          description: Unique identifer for the Code signing configuration.
        CodeSigningConfigArn:
          $ref: "#/components/schemas/CodeSigningConfigArn"
          description: The Amazon Resource Name (ARN) of the Code signing configuration.
        Description:
          $ref: "#/components/schemas/Description"
          description: Code signing configuration description.
        AllowedPublishers:
          $ref: "#/components/schemas/AllowedPublishers"
          description: List of allowed publishers.
        CodeSigningPolicies:
          $ref: "#/components/schemas/CodeSigningPolicies"
          description: The code signing policy controls the validation failure action for signature mismatch or expiry.
        LastModified:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the Code signing configuration was last modified, in ISO-8601 format (YYYY-MM-DDThh:mm:ss.sTZD).
      required:
        - CodeSigningConfigId
        - CodeSigningConfigArn
        - AllowedPublishers
        - CodeSigningPolicies
        - LastModified
    CodeSigningConfigId:
      type: string
      pattern: csc-[a-zA-Z0-9-_\.]{17}
    CodeSigningConfigArn:
      type: string
      minLength: 0
      maxLength: 200
      pattern: arn:(aws[a-zA-Z-]*)?:lambda:[a-z]{2}((-gov)|(-iso(b?)))?-[a-z]+-\d{1}:\d{12}:code-signing-config:csc-[a-z0-9]{17}
    Enabled:
      type: boolean
    BatchSize:
      type: integer
      minimum: 1
      maximum: 10000
    FilterCriteria:
      description: An object that contains the filters for an event source.
      type: object
      properties:
        Filters:
          $ref: "#/components/schemas/FilterList"
          description: A list of filters.
    FilterList:
      type: array
      items:
        $ref: "#/components/schemas/Filter"
    Filter:
      description: A structure within a FilterCriteria object that defines an event filtering pattern.
      type: object
      properties:
        Pattern:
          $ref: "#/components/schemas/Pattern"
          description: A filter pattern. For more information on the syntax of a filter pattern, see Filter rule syntax.
    Pattern:
      type: string
      minLength: 0
      maxLength: 4096
      pattern: .*
    MaximumBatchingWindowInSeconds:
      type: integer
      minimum: 0
      maximum: 300
    ParallelizationFactor:
      type: integer
      minimum: 1
      maximum: 10
    EventSourcePosition:
      type: string
      enum:
        - TRIM_HORIZON
        - LATEST
        - AT_TIMESTAMP
    Date:
      type: string
      format: date-time
    DestinationConfig:
      description: A configuration object that specifies the destination of an event after Lambda processes it. For more information, see Adding a destination.
      type: object
      properties:
        OnSuccess:
          $ref: "#/components/schemas/OnSuccess"
          description: The destination configuration for successful invocations. Not supported in CreateEventSourceMapping or UpdateEventSourceMapping.
        OnFailure:
          $ref: "#/components/schemas/OnFailure"
          description: The destination configuration for failed invocations.
    OnSuccess:
      description: A destination for events that were processed successfully. To retain records of successful asynchronous invocations, you can configure an Amazon SNS topic, Amazon SQS queue, Lambda function, or Amazon EventBridge event bus as the destination. OnSuccess is not supported in CreateEventSourceMapping or UpdateEventSourceMapping requests.
      type: object
      properties:
        Destination:
          $ref: "#/components/schemas/DestinationArn"
          description: The Amazon Resource Name (ARN) of the destination resource. Amazon SNS destinations have a message size limit of 256 KB. If the combined size of the function request and response payload exceeds the limit, Lambda will drop the payload when sending OnFailure event to the destination. For details on this behavior, refer to Retaining records of asynchronous invocations.
    DestinationArn:
      type: string
      minLength: 0
      maxLength: 350
      pattern: $|kafka://([^.]([a-zA-Z0-9\-_.]{0,248}))|arn:(aws[a-zA-Z0-9-]*):([a-zA-Z0-9\-])+:([a-z]{2}((-gov)|(-iso([a-z]?)))?-[a-z]+-\d{1})?:(\d{12})?:(.*)
    OnFailure:
      description: A destination for events that failed processing. For more information, see Adding a destination.
      type: object
      properties:
        Destination:
          $ref: "#/components/schemas/DestinationArn"
          description: The Amazon Resource Name (ARN) of the destination resource. To retain records of failed invocations from Kinesis, DynamoDB, self-managed Apache Kafka, or Amazon MSK, you can configure an Amazon SNS topic, Amazon SQS queue, Amazon S3 bucket, or Kafka topic as the destination. Amazon SNS destinations have a message size limit of 256 KB. If the combined size of the function request and response payload exceeds the limit, Lambda will drop the payload when sending OnFailure event to the destination. For details on this behavior, refer to Retaining records of asynchronous invocations. To retain records of failed invocations from Kinesis, DynamoDB, self-managed Kafka or Amazon MSK, you can configure an Amazon SNS topic, Amazon SQS queue, or Amazon S3 bucket as the destination.
    MaximumRecordAgeInSeconds:
      type: integer
      minimum: -1
      maximum: 604800
    BisectBatchOnFunctionError:
      type: boolean
    MaximumRetryAttemptsEventSourceMapping:
      type: integer
      minimum: -1
      maximum: 10000
    TumblingWindowInSeconds:
      type: integer
      minimum: 0
      maximum: 900
    Topics:
      type: array
      items:
        $ref: "#/components/schemas/Topic"
    Topic:
      type: string
      minLength: 1
      maxLength: 249
      pattern: "[^.]([a-zA-Z0-9\\-_.]+)"
    Queues:
      type: array
      items:
        $ref: "#/components/schemas/Queue"
    Queue:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: "[\\s\\S]*"
    SourceAccessConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/SourceAccessConfiguration"
    SourceAccessConfiguration:
      description: To secure and define access to your event source, you can specify the authentication protocol, VPC components, or virtual host.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/SourceAccessType"
          description: 'The type of authentication protocol, VPC components, or virtual host for your event source. For example: "Type":"SASL_SCRAM_512_AUTH". BASIC_AUTH – (Amazon MQ) The Secrets Manager secret that stores your broker credentials. BASIC_AUTH – (Self-managed Apache Kafka) The Secrets Manager ARN of your secret key used for SASL/PLAIN authentication of your Apache Kafka brokers. VPC_SUBNET – (Self-managed Apache Kafka) The subnets associated with your VPC. Lambda connects to these subnets to fetch data from your self-managed Apache Kafka cluster. VPC_SECURITY_GROUP – (Self-managed Apache Kafka) The VPC security group used to manage access to your self-managed Apache Kafka brokers. SASL_SCRAM_256_AUTH – (Self-managed Apache Kafka) The Secrets Manager ARN of your secret key used for SASL SCRAM-256 authentication of your self-managed Apache Kafka brokers. SASL_SCRAM_512_AUTH – (Amazon MSK, Self-managed Apache Kafka) The Secrets Manager ARN of your secret key used for SASL SCRAM-512 authentication of your self-managed Apache Kafka brokers. VIRTUAL_HOST –- (RabbitMQ) The name of the virtual host in your RabbitMQ broker. Lambda uses this RabbitMQ host as the event source. This property cannot be specified in an UpdateEventSourceMapping API call. CLIENT_CERTIFICATE_TLS_AUTH – (Amazon MSK, self-managed Apache Kafka) The Secrets Manager ARN of your secret key containing the certificate chain (X.509 PEM), private key (PKCS#8 PEM), and private key password (optional) used for mutual TLS authentication of your MSK/Apache Kafka brokers. SERVER_ROOT_CA_CERTIFICATE – (Self-managed Apache Kafka) The Secrets Manager ARN of your secret key containing the root CA certificate (X.509 PEM) used for TLS encryption of your Apache Kafka brokers.'
        URI:
          $ref: "#/components/schemas/URI"
          description: 'The value for your chosen configuration in Type. For example: "URI": "arn:aws:secretsmanager:us-east-1:01234567890:secret:MyBrokerSecretName".'
    SourceAccessType:
      type: string
      enum:
        - BASIC_AUTH
        - VPC_SUBNET
        - VPC_SECURITY_GROUP
        - SASL_SCRAM_512_AUTH
        - SASL_SCRAM_256_AUTH
        - VIRTUAL_HOST
        - CLIENT_CERTIFICATE_TLS_AUTH
        - SERVER_ROOT_CA_CERTIFICATE
    URI:
      type: string
      minLength: 1
      maxLength: 200
      pattern: "[a-zA-Z0-9-\\/*:_+=.@-]*"
    SelfManagedEventSource:
      description: The self-managed Apache Kafka cluster for your event source.
      type: object
      properties:
        Endpoints:
          type: object
          properties: {}
          description: 'The list of bootstrap servers for your Kafka brokers in the following format: "KAFKA_BOOTSTRAP_SERVERS": ["abc.xyz.com:xxxx","abc2.xyz.com:xxxx"].'
    FunctionResponseTypeList:
      type: array
      items:
        $ref: "#/components/schemas/FunctionResponseType"
    FunctionResponseType:
      type: string
      enum:
        - ReportBatchItemFailures
    AmazonManagedKafkaEventSourceConfig:
      description: Specific configuration settings for an Amazon Managed Streaming for Apache Kafka (Amazon MSK) event source.
      type: object
      properties:
        ConsumerGroupId:
          $ref: "#/components/schemas/URI"
          description: The identifier for the Kafka consumer group to join. The consumer group ID must be unique among all your Kafka event sources. After creating a Kafka event source mapping with the consumer group ID specified, you cannot update this value. For more information, see Customizable consumer group ID.
        SchemaRegistryConfig:
          $ref: "#/components/schemas/KafkaSchemaRegistryConfig"
          description: Specific configuration settings for a Kafka schema registry.
    KafkaSchemaRegistryConfig:
      description: Specific configuration settings for a Kafka schema registry.
      type: object
      properties:
        SchemaRegistryURI:
          $ref: "#/components/schemas/SchemaRegistryUri"
          description: The URI for your schema registry. The correct URI format depends on the type of schema registry you're using. For Glue schema registries, use the ARN of the registry. For Confluent schema registries, use the URL of the registry.
        EventRecordFormat:
          $ref: "#/components/schemas/SchemaRegistryEventRecordFormat"
          description: The record format that Lambda delivers to your function after schema validation. Choose JSON to have Lambda deliver the record to your function as a standard JSON object. Choose SOURCE to have Lambda deliver the record to your function in its original source format. Lambda removes all schema metadata, such as the schema ID, before sending the record to your function.
        AccessConfigs:
          $ref: "#/components/schemas/KafkaSchemaRegistryAccessConfigList"
          description: An array of access configuration objects that tell Lambda how to authenticate with your schema registry.
        SchemaValidationConfigs:
          $ref: "#/components/schemas/KafkaSchemaValidationConfigList"
          description: An array of schema validation configuration objects, which tell Lambda the message attributes you want to validate and filter using your schema registry.
    SchemaRegistryUri:
      type: string
      minLength: 1
      maxLength: 10000
      pattern: "[a-zA-Z0-9-\\/*:_+=.@-]*"
    SchemaRegistryEventRecordFormat:
      type: string
      enum:
        - JSON
        - SOURCE
    KafkaSchemaRegistryAccessConfigList:
      type: array
      items:
        $ref: "#/components/schemas/KafkaSchemaRegistryAccessConfig"
    KafkaSchemaRegistryAccessConfig:
      description: Specific access configuration settings that tell Lambda how to authenticate with your schema registry. If you're working with an Glue schema registry, don't provide authentication details in this object. Instead, ensure that your execution role has the required permissions for Lambda to access your cluster. If you're working with a Confluent schema registry, choose the authentication method in the Type field, and provide the Secrets Manager secret ARN in the URI field.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/KafkaSchemaRegistryAuthType"
          description: The type of authentication Lambda uses to access your schema registry.
        URI:
          $ref: "#/components/schemas/Arn"
          description: The URI of the secret (Secrets Manager secret ARN) to authenticate with your schema registry.
    KafkaSchemaRegistryAuthType:
      type: string
      enum:
        - BASIC_AUTH
        - CLIENT_CERTIFICATE_TLS_AUTH
        - SERVER_ROOT_CA_CERTIFICATE
    KafkaSchemaValidationConfigList:
      type: array
      items:
        $ref: "#/components/schemas/KafkaSchemaValidationConfig"
    KafkaSchemaValidationConfig:
      description: Specific schema validation configuration settings that tell Lambda the message attributes you want to validate and filter using your schema registry.
      type: object
      properties:
        Attribute:
          $ref: "#/components/schemas/KafkaSchemaValidationAttribute"
          description: The attributes you want your schema registry to validate and filter for. If you selected JSON as the EventRecordFormat, Lambda also deserializes the selected message attributes.
    KafkaSchemaValidationAttribute:
      type: string
      enum:
        - KEY
        - VALUE
    SelfManagedKafkaEventSourceConfig:
      description: Specific configuration settings for a self-managed Apache Kafka event source.
      type: object
      properties:
        ConsumerGroupId:
          $ref: "#/components/schemas/URI"
          description: The identifier for the Kafka consumer group to join. The consumer group ID must be unique among all your Kafka event sources. After creating a Kafka event source mapping with the consumer group ID specified, you cannot update this value. For more information, see Customizable consumer group ID.
        SchemaRegistryConfig:
          $ref: "#/components/schemas/KafkaSchemaRegistryConfig"
          description: Specific configuration settings for a Kafka schema registry.
    ScalingConfig:
      description: (Amazon SQS only) The scaling configuration for the event source. To remove the configuration, pass an empty value.
      type: object
      properties:
        MaximumConcurrency:
          $ref: "#/components/schemas/MaximumConcurrency"
          description: Limits the number of concurrent instances that the Amazon SQS event source can invoke.
    MaximumConcurrency:
      type: integer
      minimum: 2
      maximum: 1000
    DocumentDBEventSourceConfig:
      description: Specific configuration settings for a DocumentDB event source.
      type: object
      properties:
        DatabaseName:
          $ref: "#/components/schemas/DatabaseName"
          description: The name of the database to consume within the DocumentDB cluster.
        CollectionName:
          $ref: "#/components/schemas/CollectionName"
          description: The name of the collection to consume within the database. If you do not specify a collection, Lambda consumes all collections.
        FullDocument:
          $ref: "#/components/schemas/FullDocument"
          description: Determines what DocumentDB sends to your event stream during document update operations. If set to UpdateLookup, DocumentDB sends a delta describing the changes, along with a copy of the entire document. Otherwise, DocumentDB sends only a partial document that contains the changes.
    DatabaseName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[^ /\\.$\\x22]*"
    CollectionName:
      type: string
      minLength: 1
      maxLength: 57
      pattern: (^(?!(system\x2e)))(^[_a-zA-Z0-9])([^$]*)
    FullDocument:
      type: string
      enum:
        - UpdateLookup
        - Default
    EventSourceMappingMetricsConfig:
      description: The metrics configuration for your event source. Use this configuration object to define which metrics you want your event source mapping to produce.
      type: object
      properties:
        Metrics:
          $ref: "#/components/schemas/EventSourceMappingMetricList"
          description: The metrics you want your event source mapping to produce, including EventCount, ErrorCount, KafkaMetrics. EventCount to receive metrics related to the number of events processed by your event source mapping. ErrorCount (Amazon MSK and self-managed Apache Kafka) to receive metrics related to the number of errors in your event source mapping processing. KafkaMetrics (Amazon MSK and self-managed Apache Kafka) to receive metrics related to the Kafka consumers from your event source mapping. For more information about these metrics, see Event source mapping metrics.
    EventSourceMappingMetricList:
      type: array
      items:
        $ref: "#/components/schemas/EventSourceMappingMetric"
    EventSourceMappingMetric:
      type: string
      enum:
        - EventCount
        - ErrorCount
        - KafkaMetrics
    EventSourceMappingLoggingConfig:
      description: (Amazon MSK, and self-managed Apache Kafka only) The logging configuration for your event source. Use this configuration object to define the level of logs for your event source mapping.
      type: object
      properties:
        SystemLogLevel:
          $ref: "#/components/schemas/EventSourceMappingSystemLogLevel"
          description: The log level you want your event source mapping to use. Lambda event poller only sends system logs at the selected level of detail and lower, where DEBUG is the highest level and WARN is the lowest. For more information about these metrics, see Event source mapping logging.
    EventSourceMappingSystemLogLevel:
      type: string
      enum:
        - DEBUG
        - INFO
        - WARN
    ProvisionedPollerConfig:
      description: The provisioned mode configuration for the event source. Use Provisioned Mode to customize the minimum and maximum number of event pollers for your event source.
      type: object
      properties:
        MinimumPollers:
          $ref: "#/components/schemas/MinimumNumberOfPollers"
          description: The minimum number of event pollers this event source can scale down to. For Amazon SQS events source mappings, default is 2, and minimum 2 required. For Amazon MSK and self-managed Apache Kafka event source mappings, default is 1.
        MaximumPollers:
          $ref: "#/components/schemas/MaximumNumberOfPollers"
          description: The maximum number of event pollers this event source can scale up to. For Amazon SQS events source mappings, default is 200, and minimum value allowed is 2. For Amazon MSK and self-managed Apache Kafka event source mappings, default is 200, and minimum value allowed is 1.
        PollerGroupName:
          $ref: "#/components/schemas/ProvisionedPollerGroupName"
          description: (Amazon MSK and self-managed Apache Kafka) The name of the provisioned poller group. Use this option to group multiple ESMs within the event source's VPC to share Event Poller Unit (EPU) capacity. You can use this option to optimize Provisioned mode costs for your ESMs. You can group up to 100 ESMs per poller group and aggregate maximum pollers across all ESMs in a group cannot exceed 2000.
    MinimumNumberOfPollers:
      type: integer
      minimum: 1
      maximum: 200
    MaximumNumberOfPollers:
      type: integer
      minimum: 1
      maximum: 2000
    ProvisionedPollerGroupName:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[a-zA-Z0-9-_]*"
    EventSourceMappingConfiguration:
      description: A mapping between an Amazon Web Services resource and a Lambda function. For details, see CreateEventSourceMapping.
      type: object
      properties:
        UUID:
          $ref: "#/components/schemas/String"
          description: The identifier of the event source mapping.
        StartingPosition:
          $ref: "#/components/schemas/EventSourcePosition"
          description: The position in a stream from which to start reading. Required for Amazon Kinesis and Amazon DynamoDB Stream event sources. AT_TIMESTAMP is supported only for Amazon Kinesis streams, Amazon DocumentDB, Amazon MSK, and self-managed Apache Kafka.
        StartingPositionTimestamp:
          $ref: "#/components/schemas/Date"
          description: With StartingPosition set to AT_TIMESTAMP, the time from which to start reading. StartingPositionTimestamp cannot be in the future.
        BatchSize:
          $ref: "#/components/schemas/BatchSize"
          description: "The maximum number of records in each batch that Lambda pulls from your stream or queue and sends to your function. Lambda passes all of the records in the batch to the function in a single call, up to the payload limit for synchronous invocation (6 MB). Default value: Varies by service. For Amazon SQS, the default is 10. For all other services, the default is 100. Related setting: When you set BatchSize to a value greater than 10, you must set MaximumBatchingWindowInSeconds to at least 1."
        MaximumBatchingWindowInSeconds:
          $ref: "#/components/schemas/MaximumBatchingWindowInSeconds"
          description: "The maximum amount of time, in seconds, that Lambda spends gathering records before invoking the function. You can configure MaximumBatchingWindowInSeconds to any value from 0 seconds to 300 seconds in increments of seconds. For streams and Amazon SQS event sources, the default batching window is 0 seconds. For Amazon MSK, Self-managed Apache Kafka, Amazon MQ, and DocumentDB event sources, the default batching window is 500 ms. Note that because you can only change MaximumBatchingWindowInSeconds in increments of seconds, you cannot revert back to the 500 ms default batching window after you have changed it. To restore the default batching window, you must create a new event source mapping. Related setting: For streams and Amazon SQS event sources, when you set BatchSize to a value greater than 10, you must set MaximumBatchingWindowInSeconds to at least 1."
        ParallelizationFactor:
          $ref: "#/components/schemas/ParallelizationFactor"
          description: (Kinesis and DynamoDB Streams only) The number of batches to process concurrently from each shard. The default value is 1.
        EventSourceArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the event source.
        FilterCriteria:
          $ref: "#/components/schemas/FilterCriteria"
          description: An object that defines the filter criteria that determine whether Lambda should process an event. For more information, see Lambda event filtering. If filter criteria is encrypted, this field shows up as null in the response of ListEventSourceMapping API calls. You can view this field in plaintext in the response of GetEventSourceMapping and DeleteEventSourceMapping calls if you have kms:Decrypt permissions for the correct KMS key.
        FunctionArn:
          $ref: "#/components/schemas/FunctionArn"
          description: The ARN of the Lambda function.
        LastModified:
          $ref: "#/components/schemas/Date"
          description: The date that the event source mapping was last updated or that its state changed.
        LastProcessingResult:
          $ref: "#/components/schemas/String"
          description: The result of the event source mapping's last processing attempt.
        State:
          $ref: "#/components/schemas/String"
          description: "The state of the event source mapping. It can be one of the following: Creating, Enabling, Enabled, Disabling, Disabled, Updating, or Deleting."
        StateTransitionReason:
          $ref: "#/components/schemas/String"
          description: Indicates whether a user or Lambda made the last change to the event source mapping.
        DestinationConfig:
          $ref: "#/components/schemas/DestinationConfig"
          description: (Kinesis, DynamoDB Streams, Amazon MSK, and self-managed Apache Kafka) A configuration object that specifies the destination of an event after Lambda processes it.
        Topics:
          $ref: "#/components/schemas/Topics"
          description: The name of the Kafka topic.
        Queues:
          $ref: "#/components/schemas/Queues"
          description: (Amazon MQ) The name of the Amazon MQ broker destination queue to consume.
        SourceAccessConfigurations:
          $ref: "#/components/schemas/SourceAccessConfigurations"
          description: An array of the authentication protocol, VPC components, or virtual host to secure and define your event source.
        SelfManagedEventSource:
          $ref: "#/components/schemas/SelfManagedEventSource"
          description: The self-managed Apache Kafka cluster for your event source.
        MaximumRecordAgeInSeconds:
          $ref: "#/components/schemas/MaximumRecordAgeInSeconds"
          description: (Kinesis, DynamoDB Streams, Amazon MSK, and self-managed Apache Kafka) Discard records older than the specified age. The default value is -1, which sets the maximum age to infinite. When the value is set to infinite, Lambda never discards old records. The minimum valid value for maximum record age is 60s. Although values less than 60 and greater than -1 fall within the parameter's absolute range, they are not allowed
        BisectBatchOnFunctionError:
          $ref: "#/components/schemas/BisectBatchOnFunctionError"
          description: (Kinesis, DynamoDB Streams, Amazon MSK, and self-managed Apache Kafka) If the function returns an error, split the batch in two and retry. The default value is false.
        MaximumRetryAttempts:
          $ref: "#/components/schemas/MaximumRetryAttemptsEventSourceMapping"
          description: (Kinesis, DynamoDB Streams, Amazon MSK, and self-managed Apache Kafka) Discard records after the specified number of retries. The default value is -1, which sets the maximum number of retries to infinite. When MaximumRetryAttempts is infinite, Lambda retries failed records until the record expires in the event source.
        TumblingWindowInSeconds:
          $ref: "#/components/schemas/TumblingWindowInSeconds"
          description: (Kinesis and DynamoDB Streams only) The duration in seconds of a processing window for DynamoDB and Kinesis Streams event sources. A value of 0 seconds indicates no tumbling window.
        FunctionResponseTypes:
          $ref: "#/components/schemas/FunctionResponseTypeList"
          description: (Kinesis, DynamoDB Streams, Amazon MSK, self-managed Apache Kafka, and Amazon SQS) A list of current response type enums applied to the event source mapping.
        AmazonManagedKafkaEventSourceConfig:
          $ref: "#/components/schemas/AmazonManagedKafkaEventSourceConfig"
          description: Specific configuration settings for an Amazon Managed Streaming for Apache Kafka (Amazon MSK) event source.
        SelfManagedKafkaEventSourceConfig:
          $ref: "#/components/schemas/SelfManagedKafkaEventSourceConfig"
          description: Specific configuration settings for a self-managed Apache Kafka event source.
        ScalingConfig:
          $ref: "#/components/schemas/ScalingConfig"
          description: (Amazon SQS only) The scaling configuration for the event source. For more information, see Configuring maximum concurrency for Amazon SQS event sources.
        DocumentDBEventSourceConfig:
          $ref: "#/components/schemas/DocumentDBEventSourceConfig"
          description: Specific configuration settings for a DocumentDB event source.
        KMSKeyArn:
          $ref: "#/components/schemas/KMSKeyArn"
          description: The ARN of the Key Management Service (KMS) customer managed key that Lambda uses to encrypt your function's filter criteria.
        FilterCriteriaError:
          $ref: "#/components/schemas/FilterCriteriaError"
          description: An object that contains details about an error related to filter criteria encryption.
        EventSourceMappingArn:
          $ref: "#/components/schemas/EventSourceMappingArn"
          description: The Amazon Resource Name (ARN) of the event source mapping.
        MetricsConfig:
          $ref: "#/components/schemas/EventSourceMappingMetricsConfig"
          description: The metrics configuration for your event source. For more information, see Event source mapping metrics.
        LoggingConfig:
          $ref: "#/components/schemas/EventSourceMappingLoggingConfig"
          description: (Amazon MSK, and self-managed Apache Kafka only) The logging configuration for your event source. For more information, see Event source mapping logging.
        ProvisionedPollerConfig:
          $ref: "#/components/schemas/ProvisionedPollerConfig"
          description: (Amazon SQS, Amazon MSK, and self-managed Apache Kafka only) The provisioned mode configuration for the event source. For more information, see provisioned mode.
    FilterCriteriaError:
      description: An object that contains details about an error related to filter criteria encryption.
      type: object
      properties:
        ErrorCode:
          $ref: "#/components/schemas/FilterCriteriaErrorCode"
          description: The KMS exception that resulted from filter criteria encryption or decryption.
        Message:
          $ref: "#/components/schemas/FilterCriteriaErrorMessage"
          description: The error message.
    FilterCriteriaErrorCode:
      type: string
      minLength: 10
      maxLength: 50
      pattern: "[A-Za-z]+Exception"
    FilterCriteriaErrorMessage:
      type: string
      minLength: 10
      maxLength: 2048
      pattern: .*
    EventSourceMappingArn:
      type: string
      minLength: 85
      maxLength: 120
      pattern: arn:(aws[a-zA-Z-]*)?:lambda:[a-z]{2}((-gov)|(-iso([a-z]?)))?-[a-z]+-\d{1}:\d{12}:event-source-mapping:[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}
    Runtime:
      type: string
      enum:
        - nodejs
        - nodejs4.3
        - nodejs6.10
        - nodejs8.10
        - nodejs10.x
        - nodejs12.x
        - nodejs14.x
        - nodejs16.x
        - java8
        - java8.al2
        - java11
        - python2.7
        - python3.6
        - python3.7
        - python3.8
        - python3.9
        - dotnetcore1.0
        - dotnetcore2.0
        - dotnetcore2.1
        - dotnetcore3.1
        - dotnet6
        - dotnet8
        - nodejs4.3-edge
        - go1.x
        - ruby2.5
        - ruby2.7
        - provided
        - provided.al2
        - nodejs18.x
        - python3.10
        - java17
        - ruby3.2
        - ruby3.3
        - ruby3.4
        - python3.11
        - nodejs20.x
        - provided.al2023
        - python3.12
        - java21
        - python3.13
        - nodejs22.x
        - nodejs24.x
        - python3.14
        - java25
        - dotnet10
        - ruby4.0
    Handler:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[^\\s]+"
    FunctionCode:
      description: The code for the Lambda function. You can either specify an object in Amazon S3, upload a .zip file archive deployment package directly, or specify the URI of a container image.
      type: object
      properties:
        ZipFile:
          $ref: "#/components/schemas/Blob"
          description: The base64-encoded contents of the deployment package. Amazon Web Services SDK and CLI clients handle the encoding for you.
        S3Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: An Amazon S3 bucket in the same Amazon Web Services Region as your function. The bucket can be in a different Amazon Web Services account.
        S3Key:
          $ref: "#/components/schemas/S3Key"
          description: The Amazon S3 key of the deployment package.
        S3ObjectVersion:
          $ref: "#/components/schemas/S3ObjectVersion"
          description: For versioned objects, the version of the deployment package object to use.
        ImageUri:
          $ref: "#/components/schemas/String"
          description: URI of a container image in the Amazon ECR registry.
        SourceKMSKeyArn:
          $ref: "#/components/schemas/KMSKeyArn"
          description: The ARN of the Key Management Service (KMS) customer managed key that's used to encrypt your function's .zip deployment package. If you don't provide a customer managed key, Lambda uses an Amazon Web Services owned key.
    Blob:
      type: string
      format: byte
    S3Bucket:
      type: string
      minLength: 3
      maxLength: 63
      pattern: "[0-9A-Za-z\\.\\-_]*(?<!\\.)"
    S3Key:
      type: string
      minLength: 1
      maxLength: 1024
    S3ObjectVersion:
      type: string
      minLength: 1
      maxLength: 1024
    Timeout:
      type: integer
      minimum: 1
    MemorySize:
      type: integer
      minimum: 128
      maximum: 32768
    Boolean:
      type: boolean
    VpcConfig:
      description: The VPC security groups and subnets that are attached to a Lambda function. For more information, see Configuring a Lambda function to access resources in a VPC.
      type: object
      properties:
        SubnetIds:
          $ref: "#/components/schemas/SubnetIds"
          description: A list of VPC subnet IDs.
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: A list of VPC security group IDs.
        Ipv6AllowedForDualStack:
          $ref: "#/components/schemas/NullableBoolean"
          description: Allows outbound IPv6 traffic on VPC functions that are connected to dual-stack subnets.
    SubnetIds:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SecurityGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    NullableBoolean:
      type: boolean
    PackageType:
      type: string
      enum:
        - Zip
        - Image
    DeadLetterConfig:
      description: The dead-letter queue for failed asynchronous invocations.
      type: object
      properties:
        TargetArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of an Amazon SQS queue or Amazon SNS topic.
    ResourceArn:
      type: string
      pattern: (arn:(aws[a-zA-Z-]*)?:[a-z0-9-.]+:.*)|()
    Environment:
      description: A function's environment variable settings. You can use environment variables to adjust your function's behavior without updating code. An environment variable is a pair of strings that are stored in a function's version-specific configuration.
      type: object
      properties:
        Variables:
          type: object
          properties: {}
          description: Environment variable key-value pairs. For more information, see Using Lambda environment variables.
    TracingConfig:
      description: The function's X-Ray tracing configuration. To sample and record incoming requests, set Mode to Active.
      type: object
      properties:
        Mode:
          $ref: "#/components/schemas/TracingMode"
          description: The tracing mode.
    TracingMode:
      type: string
      enum:
        - Active
        - PassThrough
    LayerList:
      type: array
      items:
        $ref: "#/components/schemas/LayerVersionArn"
    LayerVersionArn:
      type: string
      minLength: 1
      maxLength: 140
      pattern: arn:[a-zA-Z0-9-]+:lambda:[a-zA-Z0-9-]+:\d{12}:layer:[a-zA-Z0-9-_]+:[0-9]+
    FileSystemConfigList:
      type: array
      items:
        $ref: "#/components/schemas/FileSystemConfig"
    FileSystemConfig:
      description: Details about the connection between a Lambda function and an Amazon EFS file system or an Amazon S3 Files file system.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/FileSystemArn"
          description: The Amazon Resource Name (ARN) of the Amazon EFS or Amazon S3 Files access point that provides access to the file system.
        LocalMountPath:
          $ref: "#/components/schemas/LocalMountPath"
          description: The path where the function can access the file system, starting with /mnt/.
      required:
        - Arn
        - LocalMountPath
    FileSystemArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws[a-zA-Z-]*:elasticfilesystem:[a-z]{2}((-gov)|(-iso(b?)))?-[a-z]+-\d{1}:\d{12}:access-point/fsap-[a-f0-9]{17}$|^arn:aws[-a-z]*:s3files:[0-9a-z-:]+:file-system/fs-[0-9a-f]{17,40}/access-point/fsap-[0-9a-f]{17,40}
    LocalMountPath:
      type: string
      minLength: 0
      maxLength: 160
      pattern: /mnt/[a-zA-Z0-9-_.]+
    ImageConfig:
      description: Configuration values that override the container image Dockerfile settings. For more information, see Container image settings.
      type: object
      properties:
        EntryPoint:
          $ref: "#/components/schemas/StringList"
          description: Specifies the entry point to their application, which is typically the location of the runtime executable.
        Command:
          $ref: "#/components/schemas/StringList"
          description: Specifies parameters that you want to pass in with ENTRYPOINT.
        WorkingDirectory:
          $ref: "#/components/schemas/WorkingDirectory"
          description: Specifies the working directory.
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    WorkingDirectory:
      type: string
      minLength: 0
      maxLength: 1000
    EphemeralStorage:
      description: The size of the function's /tmp directory in MB. The default value is 512, but can be any whole number between 512 and 10,240 MB. For more information, see Configuring ephemeral storage (console).
      type: object
      properties:
        Size:
          $ref: "#/components/schemas/EphemeralStorageSize"
          description: The size of the function's /tmp directory.
      required:
        - Size
    EphemeralStorageSize:
      type: integer
      minimum: 512
      maximum: 10240
    SnapStart:
      description: The function's Lambda SnapStart setting. Set ApplyOn to PublishedVersions to create a snapshot of the initialized execution environment when you publish a function version.
      type: object
      properties:
        ApplyOn:
          $ref: "#/components/schemas/SnapStartApplyOn"
          description: Set to PublishedVersions to create a snapshot of the initialized execution environment when you publish a function version.
    SnapStartApplyOn:
      type: string
      enum:
        - PublishedVersions
        - None
    LoggingConfig:
      description: The function's Amazon CloudWatch Logs configuration settings.
      type: object
      properties:
        LogFormat:
          $ref: "#/components/schemas/LogFormat"
          description: The format in which Lambda sends your function's application and system logs to CloudWatch. Select between plain text and structured JSON.
        ApplicationLogLevel:
          $ref: "#/components/schemas/ApplicationLogLevel"
          description: Set this property to filter the application logs for your function that Lambda sends to CloudWatch. Lambda only sends application logs at the selected level of detail and lower, where TRACE is the highest level and FATAL is the lowest.
        SystemLogLevel:
          $ref: "#/components/schemas/SystemLogLevel"
          description: Set this property to filter the system logs for your function that Lambda sends to CloudWatch. Lambda only sends system logs at the selected level of detail and lower, where DEBUG is the highest level and WARN is the lowest.
        LogGroup:
          $ref: "#/components/schemas/LogGroup"
          description: The name of the Amazon CloudWatch log group the function sends logs to. By default, Lambda functions send logs to a default log group named /aws/lambda/<function name>. To use a different log group, enter an existing log group or enter a new log group name.
    LogFormat:
      type: string
      enum:
        - JSON
        - Text
    ApplicationLogLevel:
      type: string
      enum:
        - TRACE
        - DEBUG
        - INFO
        - WARN
        - ERROR
        - FATAL
    SystemLogLevel:
      type: string
      enum:
        - DEBUG
        - INFO
        - WARN
    LogGroup:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[\\.\\-_/#A-Za-z0-9]+"
    CapacityProviderConfig:
      description: Configuration for the capacity provider that manages compute resources for Lambda functions.
      type: object
      properties:
        LambdaManagedInstancesCapacityProviderConfig:
          $ref: "#/components/schemas/LambdaManagedInstancesCapacityProviderConfig"
          description: Configuration for Lambda-managed instances used by the capacity provider.
      required:
        - LambdaManagedInstancesCapacityProviderConfig
    LambdaManagedInstancesCapacityProviderConfig:
      description: Configuration for Lambda-managed instances used by the capacity provider.
      type: object
      properties:
        CapacityProviderArn:
          $ref: "#/components/schemas/CapacityProviderArn"
          description: The Amazon Resource Name (ARN) of the capacity provider.
        PerExecutionEnvironmentMaxConcurrency:
          $ref: "#/components/schemas/PerExecutionEnvironmentMaxConcurrency"
          description: The maximum number of concurrent execution environments that can run on each compute instance.
        ExecutionEnvironmentMemoryGiBPerVCpu:
          $ref: "#/components/schemas/ExecutionEnvironmentMemoryGiBPerVCpu"
          description: The amount of memory in GiB allocated per vCPU for execution environments.
      required:
        - CapacityProviderArn
    PerExecutionEnvironmentMaxConcurrency:
      type: integer
      minimum: 1
      maximum: 1600
    ExecutionEnvironmentMemoryGiBPerVCpu:
      type: number
      format: double
      minimum: 2
      maximum: 8
    FunctionVersionLatestPublished:
      type: string
      enum:
        - LATEST_PUBLISHED
    DurableConfig:
      description: Configuration settings for durable functions, including execution timeout and retention period for execution history.
      type: object
      properties:
        RetentionPeriodInDays:
          $ref: "#/components/schemas/RetentionPeriodInDays"
          description: The number of days to retain execution history after a durable execution completes. After this period, execution history is no longer available through the GetDurableExecutionHistory API.
        ExecutionTimeout:
          $ref: "#/components/schemas/ExecutionTimeout"
          description: The maximum time (in seconds) that a durable execution can run before timing out. This timeout applies to the entire durable execution, not individual function invocations.
    RetentionPeriodInDays:
      type: integer
      minimum: 1
      maximum: 90
    ExecutionTimeout:
      type: integer
      minimum: 1
      maximum: 31622400
    TenancyConfig:
      description: Specifies the tenant isolation mode configuration for a Lambda function. This allows you to configure specific tenant isolation strategies for your function invocations. Tenant isolation configuration cannot be modified after function creation.
      type: object
      properties:
        TenantIsolationMode:
          $ref: "#/components/schemas/TenantIsolationMode"
          description: Tenant isolation mode allows for invocation to be sent to a corresponding execution environment dedicated to a specific tenant ID.
      required:
        - TenantIsolationMode
    TenantIsolationMode:
      type: string
      enum:
        - PER_TENANT
    FunctionConfiguration:
      description: Details about a function's configuration.
      type: object
      properties:
        FunctionName:
          $ref: "#/components/schemas/NamespacedFunctionName"
          description: The name of the function.
        FunctionArn:
          $ref: "#/components/schemas/NameSpacedFunctionArn"
          description: The function's Amazon Resource Name (ARN).
        Runtime:
          $ref: "#/components/schemas/Runtime"
          description: The identifier of the function's runtime. Runtime is required if the deployment package is a .zip file archive. Specifying a runtime results in an error if you're deploying a function using a container image. The following list includes deprecated runtimes. Lambda blocks creating new functions and updating existing functions shortly after each runtime is deprecated. For more information, see Runtime use after deprecation. For a list of all currently supported runtimes, see Supported runtimes.
        Role:
          $ref: "#/components/schemas/RoleArn"
          description: The function's execution role.
        Handler:
          $ref: "#/components/schemas/Handler"
          description: The function that Lambda calls to begin running your function.
        CodeSize:
          $ref: "#/components/schemas/Long"
          description: The size of the function's deployment package, in bytes.
        Description:
          $ref: "#/components/schemas/Description"
          description: The function's description.
        Timeout:
          $ref: "#/components/schemas/Timeout"
          description: The amount of time in seconds that Lambda allows a function to run before stopping it.
        MemorySize:
          $ref: "#/components/schemas/MemorySize"
          description: The amount of memory available to the function at runtime.
        LastModified:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the function was last updated, in ISO-8601 format (YYYY-MM-DDThh:mm:ss.sTZD).
        CodeSha256:
          $ref: "#/components/schemas/String"
          description: The SHA256 hash of the function's deployment package.
        Version:
          $ref: "#/components/schemas/Version"
          description: The version of the Lambda function.
        VpcConfig:
          $ref: "#/components/schemas/VpcConfigResponse"
          description: The function's networking configuration.
        DeadLetterConfig:
          $ref: "#/components/schemas/DeadLetterConfig"
          description: The function's dead letter queue.
        Environment:
          $ref: "#/components/schemas/EnvironmentResponse"
          description: The function's environment variables. Omitted from CloudTrail logs.
        KMSKeyArn:
          $ref: "#/components/schemas/KMSKeyArn"
          description: "The ARN of the Key Management Service (KMS) customer managed key that's used to encrypt the following resources: The function's environment variables. The function's Lambda SnapStart snapshots. When used with SourceKMSKeyArn, the unzipped version of the .zip deployment package that's used for function invocations. For more information, see Specifying a customer managed key for Lambda. The optimized version of the container image that's used for function invocations. Note that this is not the same key that's used to protect your container image in the Amazon Elastic Container Registry (Amazon ECR). For more information, see Function lifecycle. If you don't provide a customer managed key, Lambda uses an Amazon Web Services owned key or an Amazon Web Services managed key."
        TracingConfig:
          $ref: "#/components/schemas/TracingConfigResponse"
          description: The function's X-Ray tracing configuration.
        MasterArn:
          $ref: "#/components/schemas/FunctionArn"
          description: For Lambda@Edge functions, the ARN of the main function.
        RevisionId:
          $ref: "#/components/schemas/String"
          description: The latest updated revision of the function or alias.
        Layers:
          $ref: "#/components/schemas/LayersReferenceList"
          description: The function's layers.
        State:
          $ref: "#/components/schemas/State"
          description: The current state of the function. When the state is Inactive, you can reactivate the function by invoking it.
        StateReason:
          $ref: "#/components/schemas/StateReason"
          description: The reason for the function's current state.
        StateReasonCode:
          $ref: "#/components/schemas/StateReasonCode"
          description: The reason code for the function's current state. When the code is Creating, you can't invoke or modify the function.
        LastUpdateStatus:
          $ref: "#/components/schemas/LastUpdateStatus"
          description: The status of the last update that was performed on the function. This is first set to Successful after function creation completes.
        LastUpdateStatusReason:
          $ref: "#/components/schemas/LastUpdateStatusReason"
          description: The reason for the last update that was performed on the function.
        LastUpdateStatusReasonCode:
          $ref: "#/components/schemas/LastUpdateStatusReasonCode"
          description: The reason code for the last update that was performed on the function.
        FileSystemConfigs:
          $ref: "#/components/schemas/FileSystemConfigList"
          description: Connection settings for an Amazon EFS file system or an Amazon S3 Files file system.
        PackageType:
          $ref: "#/components/schemas/PackageType"
          description: The type of deployment package. Set to Image for container image and set Zip for .zip file archive.
        ImageConfigResponse:
          $ref: "#/components/schemas/ImageConfigResponse"
          description: The function's image configuration values.
        SigningProfileVersionArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the signing profile version.
        SigningJobArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the signing job.
        Architectures:
          $ref: "#/components/schemas/ArchitecturesList"
          description: The instruction set architecture that the function supports. Architecture is a string array with one of the valid values. The default architecture value is x86_64.
        EphemeralStorage:
          $ref: "#/components/schemas/EphemeralStorage"
          description: The size of the function's /tmp directory in MB. The default value is 512, but can be any whole number between 512 and 10,240 MB. For more information, see Configuring ephemeral storage (console).
        SnapStart:
          $ref: "#/components/schemas/SnapStartResponse"
          description: Set ApplyOn to PublishedVersions to create a snapshot of the initialized execution environment when you publish a function version. For more information, see Improving startup performance with Lambda SnapStart.
        RuntimeVersionConfig:
          $ref: "#/components/schemas/RuntimeVersionConfig"
          description: The ARN of the runtime and any errors that occured.
        LoggingConfig:
          $ref: "#/components/schemas/LoggingConfig"
          description: The function's Amazon CloudWatch Logs configuration settings.
        CapacityProviderConfig:
          $ref: "#/components/schemas/CapacityProviderConfig"
          description: Configuration for the capacity provider that manages compute resources for Lambda functions.
        ConfigSha256:
          $ref: "#/components/schemas/String"
          description: The SHA256 hash of the function configuration.
        DurableConfig:
          $ref: "#/components/schemas/DurableConfig"
          description: The function's durable execution configuration settings, if the function is configured for durability.
        TenancyConfig:
          $ref: "#/components/schemas/TenancyConfig"
          description: The function's tenant isolation configuration settings. Determines whether the Lambda function runs on a shared or dedicated infrastructure per unique tenant.
    NameSpacedFunctionArn:
      type: string
      minLength: 0
      maxLength: 10000
      pattern: arn:(aws[a-zA-Z-]*)?:lambda:[a-z]{2}((-gov)|(-iso([a-z]?)))?-[a-z]+-\d{1}:\d{12}:function:[a-zA-Z0-9-_\.]+(:(\$LATEST(\.PUBLISHED)?|[a-zA-Z0-9-_]+))?
    Long:
      type: integer
      format: int64
    VpcConfigResponse:
      description: The VPC security groups and subnets that are attached to a Lambda function.
      type: object
      properties:
        SubnetIds:
          $ref: "#/components/schemas/SubnetIds"
          description: A list of VPC subnet IDs.
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: A list of VPC security group IDs.
        VpcId:
          $ref: "#/components/schemas/VpcId"
          description: The ID of the VPC.
        Ipv6AllowedForDualStack:
          $ref: "#/components/schemas/NullableBoolean"
          description: Allows outbound IPv6 traffic on VPC functions that are connected to dual-stack subnets.
    VpcId:
      type: string
    EnvironmentResponse:
      description: The results of an operation to update or read environment variables. If the operation succeeds, the response contains the environment variables. If it fails, the response contains details about the error.
      type: object
      properties:
        Variables:
          type: object
          properties: {}
          description: Environment variable key-value pairs. Omitted from CloudTrail logs.
        Error:
          $ref: "#/components/schemas/EnvironmentError"
          description: Error messages for environment variables that couldn't be applied.
    EnvironmentError:
      description: Error messages for environment variables that couldn't be applied.
      type: object
      properties:
        ErrorCode:
          $ref: "#/components/schemas/String"
          description: The error code.
        Message:
          $ref: "#/components/schemas/SensitiveString"
          description: The error message.
    SensitiveString:
      type: string
    TracingConfigResponse:
      description: The function's X-Ray tracing configuration.
      type: object
      properties:
        Mode:
          $ref: "#/components/schemas/TracingMode"
          description: The tracing mode.
    LayersReferenceList:
      type: array
      items:
        $ref: "#/components/schemas/Layer"
    Layer:
      description: An Lambda layer.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/LayerVersionArn"
          description: The Amazon Resource Name (ARN) of the function layer.
        CodeSize:
          $ref: "#/components/schemas/Long"
          description: The size of the layer archive in bytes.
        SigningProfileVersionArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) for a signing profile version.
        SigningJobArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of a signing job.
    State:
