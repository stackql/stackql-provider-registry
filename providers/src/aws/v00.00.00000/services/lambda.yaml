    Action:
      type: string
      pattern: (lambda:[*]|lambda:[a-zA-Z]+|[*])
    Principal:
      type: string
      pattern: "[^\\s]+"
    Arn:
      type: string
      pattern: arn:(aws[a-zA-Z0-9-]*):([a-zA-Z0-9\-])+:([a-z]{2}(-gov)?-[a-z]+-\d{1})?:(\d{12})?:(.*)
    SourceOwner:
      type: string
      minLength: 0
      maxLength: 12
      pattern: \d{12}
    EventSourceToken:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[a-zA-Z0-9._\\-]+"
    PrincipalOrgID:
      type: string
      minLength: 12
      maxLength: 34
      pattern: o-[a-z0-9]{10,32}
    FunctionUrlAuthType:
      type: string
      enum:
        - NONE
        - AWS_IAM
    InvokedViaFunctionUrl:
      type: boolean
    AddPermissionResponse:
      type: object
      properties:
        Statement:
          $ref: "#/components/schemas/String"
          description: The permission statement that's added to the function policy.
    DurableExecutionArn:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: arn:([a-zA-Z0-9-]+):lambda:([a-zA-Z0-9-]+):(\d{12}):function:([a-zA-Z0-9_-]+):(\$LATEST(?:\.PUBLISHED)?|[0-9]+)/durable-execution/([a-zA-Z0-9_-]+)/([a-zA-Z0-9_-]+)
    CheckpointToken:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[A-Za-z0-9+/]+={0,2}"
    OperationUpdates:
      type: array
      items:
        $ref: "#/components/schemas/OperationUpdate"
    OperationUpdate:
      description: An update to be applied to an operation during checkpointing.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/OperationId"
          description: The unique identifier for this operation.
        ParentId:
          $ref: "#/components/schemas/OperationId"
          description: The unique identifier of the parent operation, if this operation is running within a child context.
        Name:
          $ref: "#/components/schemas/OperationName"
          description: The customer-provided name for this operation.
        Type:
          $ref: "#/components/schemas/OperationType"
          description: The type of operation to update.
        SubType:
          $ref: "#/components/schemas/OperationSubType"
          description: The subtype of the operation, providing additional categorization.
        Action:
          $ref: "#/components/schemas/OperationAction"
          description: The action to take on the operation.
        Payload:
          $ref: "#/components/schemas/OperationPayload"
          description: The payload for successful operations.
        Error:
          $ref: "#/components/schemas/ErrorObject"
          description: The error information for failed operations.
        ContextOptions:
          $ref: "#/components/schemas/ContextOptions"
          description: Options for context operations.
        StepOptions:
          $ref: "#/components/schemas/StepOptions"
          description: Options for step operations.
        WaitOptions:
          $ref: "#/components/schemas/WaitOptions"
          description: Options for wait operations.
        CallbackOptions:
          $ref: "#/components/schemas/CallbackOptions"
        ChainedInvokeOptions:
          $ref: "#/components/schemas/ChainedInvokeOptions"
      required:
        - Id
        - Type
        - Action
    OperationId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9-_]+"
    OperationName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\x20-\\x7E]+"
    OperationType:
      type: string
      enum:
        - EXECUTION
        - CONTEXT
        - STEP
        - WAIT
        - CALLBACK
        - CHAINED_INVOKE
    OperationSubType:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[a-zA-Z0-9-_]+"
    OperationAction:
      type: string
      enum:
        - START
        - SUCCEED
        - FAIL
        - RETRY
        - CANCEL
    OperationPayload:
      type: string
      minLength: 0
      maxLength: 6291456
    ErrorObject:
      description: An object that contains error information.
      type: object
      properties:
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: A human-readable error message.
        ErrorType:
          $ref: "#/components/schemas/ErrorType"
          description: The error type.
        ErrorData:
          $ref: "#/components/schemas/ErrorData"
          description: Machine-readable error data.
        StackTrace:
          $ref: "#/components/schemas/StackTraceEntries"
          description: Stack trace information for the error.
    ErrorMessage:
      type: string
    ErrorType:
      type: string
    ErrorData:
      type: string
    StackTraceEntries:
      type: array
      items:
        $ref: "#/components/schemas/StackTraceEntry"
    StackTraceEntry:
      type: string
    ContextOptions:
      description: Configuration options for a durable execution context.
      type: object
      properties:
        ReplayChildren:
          $ref: "#/components/schemas/ReplayChildren"
          description: Whether the state data of children of the completed context should be included in the invoke payload and GetDurableExecutionState response.
    ReplayChildren:
      type: boolean
    StepOptions:
      description: Configuration options for a step operation.
      type: object
      properties:
        NextAttemptDelaySeconds:
          $ref: "#/components/schemas/StepOptionsNextAttemptDelaySecondsInteger"
          description: The delay in seconds before the next retry attempt.
    StepOptionsNextAttemptDelaySecondsInteger:
      type: integer
      minimum: 1
      maximum: 31622400
    WaitOptions:
      description: Specifies how long to pause the durable execution.
      type: object
      properties:
        WaitSeconds:
          $ref: "#/components/schemas/WaitOptionsWaitSecondsInteger"
          description: The duration to wait, in seconds.
    WaitOptionsWaitSecondsInteger:
      type: integer
      minimum: 1
      maximum: 31622400
    CallbackOptions:
      description: Configuration options for callback operations in durable executions, including timeout settings and retry behavior.
      type: object
      properties:
        TimeoutSeconds:
          $ref: "#/components/schemas/DurationSeconds"
          description: The timeout for the callback operation in seconds. If not specified or set to 0, the callback has no timeout.
        HeartbeatTimeoutSeconds:
          $ref: "#/components/schemas/DurationSeconds"
          description: The heartbeat timeout for the callback operation, in seconds. If not specified or set to 0, heartbeat timeout is disabled.
    DurationSeconds:
      type: integer
      minimum: 0
    ChainedInvokeOptions:
      description: Configuration options for chained function invocations in durable executions, including retry settings and timeout configuration.
      type: object
      properties:
        FunctionName:
          $ref: "#/components/schemas/NamespacedFunctionName"
