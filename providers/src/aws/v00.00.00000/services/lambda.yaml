        - InvalidConfiguration
        - InternalError
        - SubnetOutOfIPAddresses
        - InvalidSubnet
        - InvalidSecurityGroup
        - ImageDeleted
        - ImageAccessDenied
        - InvalidImage
        - KMSKeyAccessDenied
        - KMSKeyNotFound
        - InvalidStateKMSKey
        - DisabledKMSKey
        - EFSIOError
        - EFSMountConnectivityError
        - EFSMountFailure
        - EFSMountTimeout
        - InvalidRuntime
        - InvalidZipFileException
        - FunctionError
        - DrainingDurableExecutions
        - VcpuLimitExceeded
        - CapacityProviderScalingLimitExceeded
        - InsufficientCapacity
        - EC2RequestLimitExceeded
        - FunctionError.InitTimeout
        - FunctionError.RuntimeInitError
        - FunctionError.ExtensionInitError
        - FunctionError.InvalidEntryPoint
        - FunctionError.InvalidWorkingDirectory
        - FunctionError.PermissionDenied
        - FunctionError.TooManyExtensions
        - FunctionError.InitResourceExhausted
        - DisallowedByVpcEncryptionControl
    LastUpdateStatus:
      type: string
      enum:
        - Successful
        - Failed
        - InProgress
    LastUpdateStatusReason:
      type: string
    LastUpdateStatusReasonCode:
      type: string
      enum:
        - EniLimitExceeded
        - InsufficientRolePermissions
        - InvalidConfiguration
        - InternalError
        - SubnetOutOfIPAddresses
        - InvalidSubnet
        - InvalidSecurityGroup
        - ImageDeleted
        - ImageAccessDenied
        - InvalidImage
        - KMSKeyAccessDenied
        - KMSKeyNotFound
        - InvalidStateKMSKey
        - DisabledKMSKey
        - EFSIOError
        - EFSMountConnectivityError
        - EFSMountFailure
        - EFSMountTimeout
        - InvalidRuntime
        - InvalidZipFileException
        - FunctionError
        - VcpuLimitExceeded
        - CapacityProviderScalingLimitExceeded
        - InsufficientCapacity
        - EC2RequestLimitExceeded
        - FunctionError.InitTimeout
        - FunctionError.RuntimeInitError
        - FunctionError.ExtensionInitError
        - FunctionError.InvalidEntryPoint
        - FunctionError.InvalidWorkingDirectory
        - FunctionError.PermissionDenied
        - FunctionError.TooManyExtensions
        - FunctionError.InitResourceExhausted
        - DisallowedByVpcEncryptionControl
