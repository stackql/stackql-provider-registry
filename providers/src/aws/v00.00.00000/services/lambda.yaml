          description: The Amazon Resource Name (ARN) of the durable execution.
        DurableExecutionName:
          $ref: "#/components/schemas/DurableExecutionName"
          description: The name of the durable execution. This is either the name you provided when invoking the function, or a system-generated unique identifier if no name was provided.
        FunctionArn:
          $ref: "#/components/schemas/NameSpacedFunctionArn"
          description: The Amazon Resource Name (ARN) of the Lambda function that was invoked to start this durable execution.
        InputPayload:
          $ref: "#/components/schemas/InputPayload"
          description: The JSON input payload that was provided when the durable execution was started. For asynchronous invocations, this is limited to 256 KB. For synchronous invocations, this can be up to 6 MB.
        Result:
          $ref: "#/components/schemas/OutputPayload"
          description: The JSON result returned by the durable execution if it completed successfully. This field is only present when the execution status is SUCCEEDED. The result is limited to 256 KB.
        Error:
          $ref: "#/components/schemas/ErrorObject"
          description: Error information if the durable execution failed. This field is only present when the execution status is FAILED, TIMED_OUT, or STOPPED. The combined size of all error fields is limited to 256 KB.
        StartTimestamp:
          $ref: "#/components/schemas/ExecutionTimestamp"
          description: The date and time when the durable execution started, in Unix timestamp format.
        Status:
          $ref: "#/components/schemas/ExecutionStatus"
          description: The current status of the durable execution. Valid values are RUNNING, SUCCEEDED, FAILED, TIMED_OUT, and STOPPED.
        EndTimestamp:
          $ref: "#/components/schemas/ExecutionTimestamp"
          description: The date and time when the durable execution ended, in Unix timestamp format. This field is only present if the execution has completed (status is SUCCEEDED, FAILED, TIMED_OUT, or STOPPED).
