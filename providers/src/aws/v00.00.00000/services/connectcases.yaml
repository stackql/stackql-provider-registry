  /domains/{domain_id}/related-items-search:
    post:
      operationId: SearchAllRelatedItems
      description: 'Searches for related items across all cases within a domain. This is a global search operation that returns related items from multiple cases, unlike the case-specific SearchRelatedItems API. Use cases Following are common uses cases for this API: Find cases with similar issues across the domain. For example, search for all cases containing comments about "product defect" to identify patterns and existing solutions. Locate all cases associated with specific contacts or orders. For example, find all cases linked to a contactArn to understand the complete customer journey. Monitor SLA compliance across cases. For example, search for all cases with "Active" SLA status to prioritize remediation efforts. Important things to know This API returns case identifiers, not complete case objects. To retrieve full case details, you must make additional calls to the GetCase API for each returned case ID. This API searches across related items content, not case fields. Use the SearchCases API to search within case field values. Endpoints: See Amazon Connect endpoints and quotas.'
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/SearchAllRelatedItemsRequestMaxResultsInteger"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                filters:
                  $ref: "#/components/schemas/SearchAllRelatedItemsRequestFiltersList"
                sorts:
                  $ref: "#/components/schemas/SearchAllRelatedItemsRequestSortsList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchAllRelatedItemsResponse"
  /domains/{domain_id}/cases-search:
    post:
      operationId: SearchCases
      description: "Searches for cases within their associated Cases domain. Search results are returned as a paginated list of abridged case documents. For customer_id you must provide the full customer profile ARN in this format: arn:aws:profile:your AWS Region:your AWS account ID:domains/profiles domain name/profiles/profile ID."
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
      requestBody:
