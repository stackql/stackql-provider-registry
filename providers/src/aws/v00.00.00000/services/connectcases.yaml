components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DomainId:
      type: string
      minLength: 1
      maxLength: 500
    CaseRuleIdentifierList:
      type: array
      items:
        $ref: "#/components/schemas/CaseRuleIdentifier"
    CaseRuleIdentifier:
      description: Object containing case rule identifier information.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/CaseRuleId"
          description: Unique identifier of a case rule.
      required:
        - id
    CaseRuleId:
      type: string
      minLength: 1
      maxLength: 500
    BatchGetCaseRuleResponse:
      type: object
      properties:
        caseRules:
          $ref: "#/components/schemas/BatchGetCaseRuleResponseCaseRulesList"
          description: A list of detailed case rule information.
        errors:
          $ref: "#/components/schemas/BatchGetCaseRuleResponseErrorsList"
          description: A list of case rule errors.
        unprocessedCaseRules:
          $ref: "#/components/schemas/BatchGetCaseRuleResponseUnprocessedCaseRulesList"
          description: A list of unprocessed case rule identifiers.
      required:
        - caseRules
        - errors
    BatchGetCaseRuleResponseCaseRulesList:
      type: array
      items:
        $ref: "#/components/schemas/GetCaseRuleResponse"
    GetCaseRuleResponse:
      description: Detailed case rule information. In the Amazon Connect admin website, case rules are known as case field conditions. For more information about case field conditions, see Add case field conditions to a case template.
      type: object
      properties:
        caseRuleId:
          $ref: "#/components/schemas/CaseRuleId"
          description: Unique identifier of a case rule.
        name:
          $ref: "#/components/schemas/CaseRuleName"
          description: Name of the case rule.
        caseRuleArn:
          $ref: "#/components/schemas/CaseRuleArn"
          description: The Amazon Resource Name (ARN) of the case rule.
        rule:
          $ref: "#/components/schemas/CaseRuleDetails"
          description: Represents what rule type should take place, under what conditions.
        description:
          $ref: "#/components/schemas/CaseRuleDescription"
          description: Description of a case rule.
        deleted:
          $ref: "#/components/schemas/Deleted"
          description: Indicates whether the resource has been deleted.
        createdTime:
          $ref: "#/components/schemas/CreatedTime"
          description: Timestamp when the resource was created.
        lastModifiedTime:
          $ref: "#/components/schemas/LastModifiedTime"
          description: Timestamp when the resource was created or last modified.
        tags:
          type: object
          properties: {}
          description: A map of of key-value pairs that represent tags on a resource. Tags are used to organize, track, or control access for this resource.
      required:
        - caseRuleId
        - name
        - caseRuleArn
        - rule
    CaseRuleName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: .*[\S]
    CaseRuleArn:
      type: string
      minLength: 1
      maxLength: 500
    CaseRuleDetails:
      description: Represents what rule type should take place, under what conditions. In the Amazon Connect admin website, case rules are known as case field conditions. For more information about case field conditions, see Add case field conditions to a case template.
      type: object
      properties:
        required_:
          $ref: "#/components/schemas/RequiredCaseRule"
          description: Required rule type, used to indicate whether a field is required.
        fieldOptions:
          $ref: "#/components/schemas/FieldOptionsCaseRule"
          description: Which options are available in a child field based on the selected value in a parent field.
        hidden:
          $ref: "#/components/schemas/HiddenCaseRule"
          description: Whether a field is visible, based on values in other fields.
    RequiredCaseRule:
      description: Required rule type, used to indicate whether a field is required. In the Amazon Connect admin website, case rules are known as case field conditions. For more information about case field conditions, see Add case field conditions to a case template.
      type: object
      properties:
        defaultValue:
          $ref: "#/components/schemas/Boolean"
          description: The value of the rule (that is, whether the field is required) should none of the conditions evaluate to true.
        conditions:
          $ref: "#/components/schemas/BooleanConditionList"
          description: List of conditions for the required rule; the first condition to evaluate to true dictates the value of the rule.
      required:
        - defaultValue
        - conditions
    Boolean:
      type: boolean
    BooleanConditionList:
      type: array
      items:
        $ref: "#/components/schemas/BooleanCondition"
    BooleanCondition:
      description: Boolean condition for a rule. In the Amazon Connect admin website, case rules are known as case field conditions. For more information about case field conditions, see Add case field conditions to a case template.
      type: object
      properties:
        equalTo:
          $ref: "#/components/schemas/BooleanOperands"
          description: Tests that operandOne is equal to operandTwo.
        notEqualTo:
          $ref: "#/components/schemas/BooleanOperands"
          description: Tests that operandOne is not equal to operandTwo.
        andAll:
          $ref: "#/components/schemas/CompoundCondition"
          description: Combines multiple conditions with AND operator. All conditions must be true for the compound condition to be true.
        orAll:
          $ref: "#/components/schemas/CompoundCondition"
          description: Combines multiple conditions with OR operator. At least one condition must be true for the compound condition to be true.
    BooleanOperands:
      description: Boolean operands for a condition. In the Amazon Connect admin website, case rules are known as case field conditions. For more information about case field conditions, see Add case field conditions to a case template.
      type: object
      properties:
        operandOne:
          $ref: "#/components/schemas/OperandOne"
          description: Represents the left hand operand in the condition.
        operandTwo:
          $ref: "#/components/schemas/OperandTwo"
          description: Represents the right hand operand in the condition.
        result:
          $ref: "#/components/schemas/Boolean"
          description: The value of the outer rule if the condition evaluates to true.
      required:
        - operandOne
        - operandTwo
        - result
    OperandOne:
      description: Represents the left hand operand in the condition. In the Amazon Connect admin website, case rules are known as case field conditions. For more information about case field conditions, see Add case field conditions to a case template.
      type: object
      properties:
        fieldId:
          $ref: "#/components/schemas/FieldId"
          description: The field ID that this operand should take the value of.
    FieldId:
      type: string
      minLength: 1
      maxLength: 500
    OperandTwo:
      description: Represents the right hand operand in the condition. In the Amazon Connect admin website, case rules are known as case field conditions. For more information about case field conditions, see Add case field conditions to a case template.
      type: object
      properties:
        stringValue:
          $ref: "#/components/schemas/OperandTwoStringValueString"
          description: String value type.
        booleanValue:
          $ref: "#/components/schemas/Boolean"
          description: Boolean value type.
        doubleValue:
          $ref: "#/components/schemas/Double"
          description: Double value type.
        emptyValue:
          $ref: "#/components/schemas/EmptyOperandValue"
          description: Empty value type.
    OperandTwoStringValueString:
      type: string
      minLength: 1
      maxLength: 1500
    Double:
      type: number
      format: double
    EmptyOperandValue:
      description: Represents an empty operand value. In the Amazon Connect admin website, case rules are known as case field conditions. For more information about case field conditions, see Add case field conditions to a case template.
      type: object
    CompoundCondition:
      description: A compound condition that combines multiple boolean conditions using logical operators. In the Amazon Connect admin website, case rules are known as case field conditions. For more information about case field conditions, see Add case field conditions to a case template.
      type: object
      properties:
        conditions:
          $ref: "#/components/schemas/BooleanConditionList"
          description: "The list of conditions to combine using the logical operator. For API users: A case rule can have a maximum of 5 conditions, spread across a maximum of 2 levels of nesting."
      required:
        - conditions
    FieldOptionsCaseRule:
      description: Rules that control which options are available in a child field based on the selected value in a parent field.
      type: object
      properties:
        parentFieldId:
          $ref: "#/components/schemas/FieldId"
          description: The identifier of the parent field that controls options.
        childFieldId:
          $ref: "#/components/schemas/FieldId"
          description: The identifier of the child field whose options are controlled.
        parentChildFieldOptionsMappings:
          $ref: "#/components/schemas/ParentChildFieldOptionsMappingList"
          description: A mapping between a parent field option value and child field option values.
      required:
        - parentChildFieldOptionsMappings
    ParentChildFieldOptionsMappingList:
      type: array
      items:
        $ref: "#/components/schemas/ParentChildFieldOptionsMapping"
    ParentChildFieldOptionsMapping:
      description: A mapping between a parent field option value and child field option values.
      type: object
      properties:
        parentFieldOptionValue:
          $ref: "#/components/schemas/ParentChildFieldOptionValue"
          description: The value in the parent field.
        childFieldOptionValues:
          $ref: "#/components/schemas/ParentChildFieldOptionsMappingChildFieldOptionValuesList"
          description: A list of allowed values in the child field.
      required:
        - parentFieldOptionValue
        - childFieldOptionValues
    ParentChildFieldOptionValue:
      type: string
      minLength: 0
      maxLength: 100
      pattern: $|^.*[\S]
    ParentChildFieldOptionsMappingChildFieldOptionValuesList:
      type: array
      items:
