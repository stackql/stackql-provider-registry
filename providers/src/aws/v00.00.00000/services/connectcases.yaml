openapi: 3.0.0
info:
  version: "2022-10-03"
  title: Amazon Connect Cases
  description: Amazon Connect Cases
  x-serviceName: cases
  x-serviceAlias: connectcases
  x-protocol: rest-json
  x-apiVersion: "2022-10-03"
  x-endpointPrefix: cases
servers:
  - url: https://cases.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for connectcases
paths:
  /domains/{domain_id}/rules-batch:
    post:
      operationId: BatchGetCaseRule
      description: Gets a batch of case rules. In the Amazon Connect admin website, case rules are known as case field conditions. For more information about case field conditions, see Add case field conditions to a case template.
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: Unique identifier of a Cases domain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                caseRules:
                  $ref: "#/components/schemas/CaseRuleIdentifierList"
              required:
                - caseRules
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetCaseRuleResponse"
  /domains/{domain_id}/fields-batch:
    post:
      operationId: BatchGetField
      description: Returns the description for the list of fields in the request parameters.
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fields:
                  $ref: "#/components/schemas/BatchGetFieldIdentifierList"
              required:
                - fields
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetFieldResponse"
  /domains/{domain_id}/fields/{field_id}/options:
    put:
      operationId: BatchPutFieldOptions
      description: Creates and updates a set of field options for a single select field in a Cases domain.
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
        - name: field_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FieldId"
          description: The unique identifier of a field.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                options:
                  $ref: "#/components/schemas/BatchPutFieldOptionsRequestOptionsList"
              required:
                - options
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchPutFieldOptionsResponse"
  /domains/{domain_id}/cases:
    post:
      operationId: CreateCase
      description: "If you provide a value for PerformedBy.UserArn you must also have connect:DescribeUser permission on the User ARN resource that you provide Creates a case in the specified Cases domain. Case system and custom fields are taken as an array id/value pairs with a declared data types. When creating a case from a template that has tag propagation configurations, the specified tags are automatically applied to the case. The following fields are required when creating a case: customer_id - You must provide the full customer profile ARN in this format: arn:aws:profile:your_AWS_Region:your_AWS_account ID:domains/your_profiles_domain_name/profiles/profile_ID title"
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                templateId:
                  $ref: "#/components/schemas/TemplateId"
                fields:
                  $ref: "#/components/schemas/CreateCaseRequestFieldsList"
                clientToken:
                  $ref: "#/components/schemas/CreateCaseRequestClientTokenString"
                performedBy:
                  $ref: "#/components/schemas/UserUnion"
                tags:
                  $ref: "#/components/schemas/MutableTags"
              required:
                - templateId
                - fields
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCaseResponse"
  /domains/{domain_id}/case-rules:
    post:
      operationId: CreateCaseRule
      description: Creates a new case rule. In the Amazon Connect admin website, case rules are known as case field conditions. For more information about case field conditions, see Add case field conditions to a case template.
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: Unique identifier of a Cases domain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/CaseRuleName"
                description:
                  $ref: "#/components/schemas/CaseRuleDescription"
                rule:
                  $ref: "#/components/schemas/CaseRuleDetails"
              required:
                - name
                - rule
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCaseRuleResponse"
  /domains:
    post:
      operationId: CreateDomain
      description: Creates a domain, which is a container for all case data, such as cases, fields, templates and layouts. Each Amazon Connect instance can be associated with only one Cases domain. This will not associate your connect instance to Cases domain. Instead, use the Amazon Connect CreateIntegrationAssociation API. You need specific IAM permissions to successfully associate the Cases domain. For more information, see Onboard to Cases.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/DomainName"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDomainResponse"
  /domains/{domain_id}/fields:
    post:
      operationId: CreateField
      description: Creates a field in the Cases domain. This field is used to define the case object model (that is, defines what data can be captured on cases) in a Cases domain.
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/FieldName"
                type:
                  $ref: "#/components/schemas/FieldType"
                description:
                  $ref: "#/components/schemas/FieldDescription"
                attributes:
                  $ref: "#/components/schemas/FieldAttributes"
              required:
                - name
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFieldResponse"
  /domains/{domain_id}/layouts:
    post:
      operationId: CreateLayout
      description: "Creates a layout in the Cases domain. Layouts define the following configuration in the top section and More Info tab of the Cases user interface: Fields to display to the users Field ordering Title and Status fields cannot be part of layouts since they are not configurable."
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/LayoutName"
                content:
                  $ref: "#/components/schemas/LayoutContent"
              required:
                - name
                - content
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLayoutResponse"
  /domains/{domain_id}/cases/{case_id}/related-items/:
    post:
      operationId: CreateRelatedItem
      description: "Creates a related item (comments, tasks, and contacts) and associates it with a case. There's a quota for the number of fields allowed in a Custom type related item. See Amazon Connect Cases quotas. Use cases Following are examples of related items that you may want to associate with a case: Related contacts, such as calls, chats, emails tasks Comments, for agent notes SLAs, to capture target resolution goals Cases, to capture related Amazon Connect Cases Files, such as policy documentation or customer-provided attachments Custom related items, which provide flexibility for you to define related items that such as bookings, orders, products, notices, and more Important things to know If you are associating a contact to a case by passing in Contact for a type, you must have DescribeContact permission on the ARN of the contact that you provide in content.contact.contactArn. A Related Item is a resource that is associated with a case. It may or may not have an external identifier linking it to an external resource (for example, a contactArn). All Related Items have their own internal identifier, the relatedItemArn. Examples of related items include comments and contacts. If you provide a value for performedBy.userArn you must also have DescribeUser permission on the ARN of the user that you provide. The type field is reserved for internal use only. Endpoints: See Amazon Connect endpoints and quotas."
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: A unique identifier of the case.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  $ref: "#/components/schemas/RelatedItemType"
                content:
                  $ref: "#/components/schemas/RelatedItemInputContent"
                performedBy:
                  $ref: "#/components/schemas/UserUnion"
              required:
                - type
                - content
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRelatedItemResponse"
  /domains/{domain_id}/templates:
    post:
      operationId: CreateTemplate
      description: "Creates a template in the Cases domain. This template is used to define the case object model (that is, to define what data can be captured on cases) in a Cases domain. A template must have a unique name within a domain, and it must reference existing field IDs and layout IDs. Additionally, multiple fields with same IDs are not allowed within the same Template. A template can be either Active or Inactive, as indicated by its status. Inactive templates cannot be used to create cases. Other template APIs are: DeleteTemplate GetTemplate ListTemplates UpdateTemplate"
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/TemplateName"
                description:
                  $ref: "#/components/schemas/TemplateDescription"
                layoutConfiguration:
                  $ref: "#/components/schemas/LayoutConfiguration"
                requiredFields:
                  $ref: "#/components/schemas/RequiredFieldList"
                status:
                  $ref: "#/components/schemas/TemplateStatus"
                rules:
                  $ref: "#/components/schemas/TemplateCaseRuleList"
                tagPropagationConfigurations:
                  $ref: "#/components/schemas/TagPropagationConfigurationList"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTemplateResponse"
  /domains/{domain_id}/cases/{case_id}:
    delete:
      operationId: DeleteCase
      description: "The DeleteCase API permanently deletes a case and all its associated resources from the cases data store. After a successful deletion, you cannot: Retrieve related items Access audit history Perform any operations that require the CaseID This action is irreversible. After you delete a case, you cannot recover its data."
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: A unique identifier of the Cases domain.
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: A unique identifier of the case.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCaseResponse"
    post:
      operationId: GetCase
      description: Returns information about a specific case if it exists.
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: A unique identifier of the case.
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fields:
                  $ref: "#/components/schemas/GetCaseRequestFieldsList"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - fields
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCaseResponse"
    put:
      operationId: UpdateCase
      description: If you provide a value for PerformedBy.UserArn you must also have connect:DescribeUser permission on the User ARN resource that you provide Updates the values of fields on a case. Fields to be updated are received as an array of id/value pairs identical to the CreateCase input . If the action is successful, the service sends back an HTTP 200 response with an empty HTTP body.
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: A unique identifier of the case.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fields:
                  $ref: "#/components/schemas/UpdateCaseRequestFieldsList"
                performedBy:
                  $ref: "#/components/schemas/UserUnion"
              required:
                - fields
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCaseResponse"
  /domains/{domain_id}/case-rules/{case_rule_id}:
    delete:
      operationId: DeleteCaseRule
      description: Deletes a case rule. In the Amazon Connect admin website, case rules are known as case field conditions. For more information about case field conditions, see Add case field conditions to a case template.
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: Unique identifier of a Cases domain.
        - name: case_rule_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseRuleId"
          description: Unique identifier of a case rule.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCaseRuleResponse"
    put:
      operationId: UpdateCaseRule
      description: Updates a case rule. In the Amazon Connect admin website, case rules are known as case field conditions. For more information about case field conditions, see Add case field conditions to a case template.
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: Unique identifier of a Cases domain.
        - name: case_rule_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseRuleId"
          description: Unique identifier of a case rule.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/CaseRuleName"
                description:
                  $ref: "#/components/schemas/CaseRuleDescription"
                rule:
                  $ref: "#/components/schemas/CaseRuleDetails"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCaseRuleResponse"
  /domains/{domain_id}:
    delete:
      operationId: DeleteDomain
      description: Deletes a Cases domain. After deleting your domain you must disassociate the deleted domain from your Amazon Connect instance with another API call before being able to use Cases again with this Amazon Connect instance. See DeleteIntegrationAssociation.
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDomainResponse"
    post:
      operationId: GetDomain
      description: Returns information about a specific domain if it exists.
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDomainResponse"
  /domains/{domain_id}/fields/{field_id}:
    delete:
      operationId: DeleteField
      description: "Deletes a field from a cases template. After a field is deleted: You can still retrieve the field by calling BatchGetField. You cannot update a deleted field by calling UpdateField; it throws a ValidationException. Deleted fields are not included in the ListFields response. Calling CreateCase with a deleted field throws a ValidationException denoting which field identifiers in the request have been deleted. Calling GetCase with a deleted field identifier returns the deleted field's value if one exists. Calling UpdateCase with a deleted field ID throws a ValidationException if the case does not already contain a value for the deleted field. Otherwise it succeeds, allowing you to update or remove (using emptyValue: {}) the field's value from the case. GetTemplate does not return field IDs for deleted fields. GetLayout does not return field IDs for deleted fields. Calling SearchCases with the deleted field ID as a filter returns any cases that have a value for the deleted field that matches the filter criteria. Calling SearchCases with a searchTerm value that matches a deleted field's value on a case returns the case in the response. Calling BatchPutFieldOptions with a deleted field ID throw a ValidationException. Calling GetCaseEventConfiguration does not return field IDs for deleted fields."
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
        - name: field_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FieldId"
          description: Unique identifier of the field.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteFieldResponse"
    put:
      operationId: UpdateField
      description: Updates the properties of an existing field.
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
        - name: field_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FieldId"
          description: The unique identifier of a field.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/FieldName"
                description:
                  $ref: "#/components/schemas/FieldDescription"
                attributes:
                  $ref: "#/components/schemas/FieldAttributes"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFieldResponse"
  /domains/{domain_id}/layouts/{layout_id}:
    delete:
      operationId: DeleteLayout
      description: "Deletes a layout from a cases template. You can delete up to 100 layouts per domain. After a layout is deleted: You can still retrieve the layout by calling GetLayout. You cannot update a deleted layout by calling UpdateLayout; it throws a ValidationException. Deleted layouts are not included in the ListLayouts response."
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
        - name: layout_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LayoutId"
          description: The unique identifier of the layout.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLayoutResponse"
    post:
      operationId: GetLayout
      description: Returns the details for the requested layout.
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
        - name: layout_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LayoutId"
          description: The unique identifier of the layout.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLayoutResponse"
    put:
      operationId: UpdateLayout
      description: Updates the attributes of an existing layout. If the action is successful, the service sends back an HTTP 200 response with an empty HTTP body. A ValidationException is returned when you add non-existent fieldIds to a layout. Title and Status fields cannot be part of layouts because they are not configurable.
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
        - name: layout_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LayoutId"
          description: The unique identifier of the layout.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/LayoutName"
                content:
                  $ref: "#/components/schemas/LayoutContent"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLayoutResponse"
  /domains/{domain_id}/cases/{case_id}/related-items/{related_item_id}:
    delete:
      operationId: DeleteRelatedItem
      description: Deletes the related item resource under a case. This API cannot be used on a FILE type related attachment. To delete this type of file, use the DeleteAttachedFile API
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: A unique identifier of the Cases domain.
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: A unique identifier of the case.
        - name: related_item_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RelatedItemId"
          description: A unique identifier of a related item.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRelatedItemResponse"
    put:
      operationId: UpdateRelatedItem
      description: "Updates the content of a related item associated with a case. The following related item types are supported: Comment - Update the text content of an existing comment Custom - Update the fields of a custom related item. You can add, modify, and remove fields from a custom related item. There's a quota for the number of fields allowed in a Custom type related item. See Amazon Connect Cases quotas. Important things to know When updating a Custom related item, all existing and new fields, and their associated values should be included in the request. Fields not included as part of this request will be removed. If you provide a value for performedBy.userArn you must also have DescribeUser permission on the ARN of the user that you provide. System case fields cannot be used in a custom related item. Endpoints: See Amazon Connect endpoints and quotas."
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: A unique identifier of the case.
        - name: related_item_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RelatedItemId"
          description: Unique identifier of a related item.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  $ref: "#/components/schemas/RelatedItemUpdateContent"
                performedBy:
                  $ref: "#/components/schemas/UserUnion"
              required:
                - content
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRelatedItemResponse"
  /domains/{domain_id}/templates/{template_id}:
    delete:
      operationId: DeleteTemplate
      description: "Deletes a cases template. You can delete up to 100 templates per domain. After a cases template is deleted: You can still retrieve the template by calling GetTemplate. You cannot update the template. You cannot create a case by using the deleted template. Deleted templates are not included in the ListTemplates response."
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
        - name: template_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateId"
          description: A unique identifier of a template.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTemplateResponse"
    post:
      operationId: GetTemplate
      description: "Returns the details for the requested template. Other template APIs are: CreateTemplate DeleteTemplate ListTemplates UpdateTemplate"
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Cases domain.
        - name: template_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateId"
          description: A unique identifier of a template.
      responses:
        "200":
          description: Success
