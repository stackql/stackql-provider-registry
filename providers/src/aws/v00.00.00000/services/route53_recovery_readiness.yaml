openapi: 3.0.0
info:
  version: "2019-12-02"
  title: AWS Route53 Recovery Readiness
  description: AWS Route53 Recovery Readiness
  x-serviceName: route53-recovery-readiness
  x-serviceAlias: route53_recovery_readiness
  x-protocol: rest-json
  x-apiVersion: "2019-12-02"
  x-endpointPrefix: route53-recovery-readiness
  x-jsonVersion: "1.1"
servers:
  - url: https://route53-recovery-readiness.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for route53-recovery-readiness
paths:
  /cells:
    post:
      operationId: CreateCell
      description: Creates a cell in an account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CellName:
                  $ref: "#/components/schemas/__string"
                Cells:
                  $ref: "#/components/schemas/__listOf__string"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - CellName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCellResponse"
    get:
      operationId: ListCells
      description: Lists the cells for an account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that identifies which batch of results you want to see.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCellsResponse"
  /crossaccountauthorizations:
    post:
      operationId: CreateCrossAccountAuthorization
      description: Creates a cross-account readiness authorization. This lets you authorize another account to work with Route 53 Application Recovery Controller, for example, to check the readiness status of resources in a separate account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CrossAccountAuthorization:
                  $ref: "#/components/schemas/CrossAccountAuthorization"
              required:
                - CrossAccountAuthorization
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCrossAccountAuthorizationResponse"
    get:
      operationId: ListCrossAccountAuthorizations
      description: Lists the cross-account readiness authorizations that are in place for an account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that identifies which batch of results you want to see.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCrossAccountAuthorizationsOutputDisplay"
  /readinesschecks:
    post:
      operationId: CreateReadinessCheck
      description: Creates a readiness check in an account. A readiness check monitors a resource set in your application, such as a set of Amazon Aurora instances, that Application Recovery Controller is auditing recovery readiness for. The audits run once every minute on every resource that's associated with a readiness check.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ReadinessCheckName:
                  $ref: "#/components/schemas/__string"
                ResourceSetName:
                  $ref: "#/components/schemas/__string"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - ReadinessCheckName
                - ResourceSetName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReadinessCheckResponse"
    get:
      operationId: ListReadinessChecks
      description: Lists the readiness checks for an account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that identifies which batch of results you want to see.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReadinessChecksResponse"
  /recoverygroups:
    post:
      operationId: CreateRecoveryGroup
      description: Creates a recovery group in an account. A recovery group corresponds to an application and includes a list of the cells that make up the application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Cells:
                  $ref: "#/components/schemas/__listOf__string"
                RecoveryGroupName:
                  $ref: "#/components/schemas/__string"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - RecoveryGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRecoveryGroupResponse"
    get:
      operationId: ListRecoveryGroups
      description: Lists the recovery groups in an account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that identifies which batch of results you want to see.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecoveryGroupsResponse"
  /resourcesets:
    post:
      operationId: CreateResourceSet
      description: Creates a resource set. A resource set is a set of resources of one type that span multiple cells. You can associate a resource set with a readiness check to monitor the resources for failover readiness.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceSetName:
                  $ref: "#/components/schemas/__string"
                ResourceSetType:
                  $ref: "#/components/schemas/__stringPatternAWSAZaZ09AZaZ09"
                Resources:
                  $ref: "#/components/schemas/__listOfResource"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - ResourceSetName
                - ResourceSetType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResourceSetResponse"
    get:
      operationId: ListResourceSets
      description: Lists the resource sets in an account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that identifies which batch of results you want to see.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResourceSetsResponse"
  /cells/{cell_name}:
    delete:
      operationId: DeleteCell
      description: Delete a cell. When successful, the response code is 204, with no response body.
      parameters:
        - name: cell_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the cell.
      responses:
        "204":
          description: Success
    get:
      operationId: GetCell
      description: Gets information about a cell including cell name, cell Amazon Resource Name (ARN), ARNs of nested cells for this cell, and a list of those cell ARNs with their associated recovery group ARNs.
      parameters:
        - name: cell_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the cell.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCellResponse"
    put:
      operationId: UpdateCell
      description: Updates a cell to replace the list of nested cells with a new list of nested cells.
      parameters:
        - name: cell_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the cell.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Cells:
                  $ref: "#/components/schemas/__listOf__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCellResponse"
  /crossaccountauthorizations/{cross_account_authorization}:
    delete:
      operationId: DeleteCrossAccountAuthorization
      description: Deletes cross account readiness authorization.
      parameters:
        - name: cross_account_authorization
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The cross-account authorization.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCrossAccountAuthorizationResponse"
  /readinesschecks/{readiness_check_name}:
    delete:
      operationId: DeleteReadinessCheck
      description: Deletes a readiness check.
      parameters:
        - name: readiness_check_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: Name of a readiness check.
      responses:
        "204":
          description: Success
    get:
      operationId: GetReadinessCheck
      description: Gets details about a readiness check.
      parameters:
        - name: readiness_check_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: Name of a readiness check.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetReadinessCheckResponse"
    put:
      operationId: UpdateReadinessCheck
      description: Updates a readiness check.
      parameters:
        - name: readiness_check_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: Name of a readiness check.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceSetName:
                  $ref: "#/components/schemas/__string"
              required:
                - ResourceSetName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateReadinessCheckResponse"
  /recoverygroups/{recovery_group_name}:
    delete:
      operationId: DeleteRecoveryGroup
      description: Deletes a recovery group.
      parameters:
        - name: recovery_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of a recovery group.
      responses:
        "204":
          description: Success
    get:
      operationId: GetRecoveryGroup
      description: Gets details about a recovery group, including a list of the cells that are included in it.
      parameters:
        - name: recovery_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of a recovery group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRecoveryGroupResponse"
    put:
      operationId: UpdateRecoveryGroup
      description: Updates a recovery group.
      parameters:
        - name: recovery_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of a recovery group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Cells:
                  $ref: "#/components/schemas/__listOf__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRecoveryGroupResponse"
  /resourcesets/{resource_set_name}:
    delete:
      operationId: DeleteResourceSet
      description: Deletes a resource set.
      parameters:
        - name: resource_set_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: Name of a resource set.
      responses:
        "204":
          description: Success
    get:
      operationId: GetResourceSet
      description: Displays the details about a resource set, including a list of the resources in the set.
      parameters:
        - name: resource_set_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: Name of a resource set.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourceSetResponse"
    put:
      operationId: UpdateResourceSet
      description: Updates a resource set.
      parameters:
        - name: resource_set_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: Name of a resource set.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceSetType:
                  $ref: "#/components/schemas/__stringPatternAWSAZaZ09AZaZ09"
                Resources:
                  $ref: "#/components/schemas/__listOfResource"
              required:
                - ResourceSetType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResourceSetResponse"
  /recoverygroups/{recovery_group_name}/architectureRecommendations:
    get:
      operationId: GetArchitectureRecommendations
      description: Gets recommendations about architecture designs for improving resiliency for an application, based on a recovery group.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that identifies which batch of results you want to see.
        - name: recovery_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of a recovery group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetArchitectureRecommendationsResponse"
  /cellreadiness/{cell_name}:
    get:
      operationId: GetCellReadinessSummary
      description: Gets readiness for a cell. Aggregates the readiness of all the resources that are associated with the cell into a single value.
      parameters:
        - name: cell_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the cell.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that identifies which batch of results you want to see.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCellReadinessSummaryResponse"
  /readinesschecks/{readiness_check_name}/resource/{resource_identifier}/status:
    get:
      operationId: GetReadinessCheckResourceStatus
      description: Gets individual readiness status for a readiness check. To see the overall readiness status for a recovery group, that considers the readiness status for all the readiness checks in the recovery group, use GetRecoveryGroupReadinessSummary.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that identifies which batch of results you want to see.
        - name: readiness_check_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: Name of a readiness check.
        - name: resource_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The resource identifier, which is the Amazon Resource Name (ARN) or the identifier generated for the resource by Application Recovery Controller (for example, for a DNS target resource).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetReadinessCheckResourceStatusResponse"
  /readinesschecks/{readiness_check_name}/status:
    get:
      operationId: GetReadinessCheckStatus
      description: Gets the readiness status for an individual readiness check. To see the overall readiness status for a recovery group, that considers the readiness status for all the readiness checks in a recovery group, use GetRecoveryGroupReadinessSummary.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that identifies which batch of results you want to see.
        - name: readiness_check_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: Name of a readiness check.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetReadinessCheckStatusResponse"
  /recoverygroupreadiness/{recovery_group_name}:
    get:
      operationId: GetRecoveryGroupReadinessSummary
      description: Displays a summary of information about a recovery group's readiness status. Includes the readiness checks for resources in the recovery group and the readiness status of each one.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that identifies which batch of results you want to see.
        - name: recovery_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of a recovery group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRecoveryGroupReadinessSummaryResponse"
  /rules:
    get:
      operationId: ListRules
      description: Lists all readiness rules, or lists the readiness rules for a specific resource type.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that identifies which batch of results you want to see.
        - name: resourceType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The resource type that a readiness rule applies to.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRulesResponse"
  /tags/{resource-arn}:
    get:
      operationId: ListTagsForResources
      description: Lists the tags for a resource.
      parameters:
        - name: resource-arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) for a resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourcesResponse"
    post:
      operationId: TagResource
      description: Adds a tag to a resource.
      parameters:
        - name: resource-arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) for a resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes a tag from a resource.
      parameters:
        - name: resource-arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) for a resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/__listOf__string"
          description: The keys for tags you add to resources.
      responses:
        "204":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    __string:
      type: string
    __listOf__string:
      type: array
      items:
        $ref: "#/components/schemas/__string"
    Tags:
      description: A collection of tags associated with a resource.
      type: object
      properties: {}
    CreateCellResponse:
      type: object
      properties:
        CellArn:
          $ref: "#/components/schemas/__stringMax256"
          description: The Amazon Resource Name (ARN) for the cell.
        CellName:
          $ref: "#/components/schemas/__stringMax64PatternAAZAZ09Z"
          description: The name of the cell.
        Cells:
          $ref: "#/components/schemas/__listOf__string"
          description: A list of cell ARNs.
        ParentReadinessScopes:
          $ref: "#/components/schemas/__listOf__string"
          description: The readiness scope for the cell, which can be a cell Amazon Resource Name (ARN) or a recovery group ARN. This is a list but currently can have only one element.
        Tags:
          type: object
          properties: {}
          description: Tags on the resources.
    __stringMax256:
      type: string
      maxLength: 256
    __stringMax64PatternAAZAZ09Z:
      type: string
      maxLength: 64
      pattern: \A[a-zA-Z0-9_]+\z
    CrossAccountAuthorization:
      description: CrossAccountAuthorization
      type: string
    CreateCrossAccountAuthorizationResponse:
      type: object
      properties:
        CrossAccountAuthorization:
          $ref: "#/components/schemas/CrossAccountAuthorization"
          description: The cross-account authorization.
    CreateReadinessCheckResponse:
      type: object
      properties:
        ReadinessCheckArn:
          $ref: "#/components/schemas/__stringMax256"
          description: The Amazon Resource Name (ARN) associated with a readiness check.
        ReadinessCheckName:
          $ref: "#/components/schemas/__stringMax64PatternAAZAZ09Z"
          description: Name of a readiness check.
        ResourceSet:
          $ref: "#/components/schemas/__stringMax64PatternAAZAZ09Z"
          description: Name of the resource set to be checked.
        Tags:
          type: object
          properties: {}
    CreateRecoveryGroupResponse:
      type: object
      properties:
        Cells:
          $ref: "#/components/schemas/__listOf__string"
          description: A list of a cell's Amazon Resource Names (ARNs).
        RecoveryGroupArn:
          $ref: "#/components/schemas/__stringMax256"
          description: The Amazon Resource Name (ARN) for the recovery group.
        RecoveryGroupName:
          $ref: "#/components/schemas/__stringMax64PatternAAZAZ09Z"
          description: The name of the recovery group.
        Tags:
          type: object
          properties: {}
          description: The tags associated with the recovery group.
    __stringPatternAWSAZaZ09AZaZ09:
      type: string
      pattern: AWS::[A-Za-z0-9]+::[A-Za-z0-9]+
    __listOfResource:
      type: array
      items:
        $ref: "#/components/schemas/Resource"
    Resource:
      description: The resource element of a resource set.
      type: object
      properties:
        ComponentId:
          $ref: "#/components/schemas/__string"
          description: The component identifier of the resource, generated when DNS target resource is used.
