        terminationHook:
          $ref: "#/components/schemas/AutoScalingGroupHook"
          description: The name of the termination hook that CodeDeploy installed into the Auto Scaling group. For more information about the termination hook, see Enabling termination deployments during Auto Scaling scale-in events in the CodeDeploy User Guide.
    AutoScalingGroupName:
      type: string
    AutoScalingGroupHook:
      type: string
    Role:
      type: string
