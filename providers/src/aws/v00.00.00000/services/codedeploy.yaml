          $ref: "#/components/schemas/DeploymentsInfoList"
          description: Information about the deployments.
    DeploymentsInfoList:
      type: array
      items:
        $ref: "#/components/schemas/DeploymentInfo"
    DeploymentInfo:
      description: Information about a deployment.
      type: object
      properties:
        applicationName:
          $ref: "#/components/schemas/ApplicationName"
          description: The application name.
        deploymentGroupName:
          $ref: "#/components/schemas/DeploymentGroupName"
          description: The deployment group name.
        deploymentConfigName:
          $ref: "#/components/schemas/DeploymentConfigName"
          description: The deployment configuration name.
        deploymentId:
          $ref: "#/components/schemas/DeploymentId"
          description: The unique ID of a deployment.
        previousRevision:
          $ref: "#/components/schemas/RevisionLocation"
          description: Information about the application revision that was deployed to the deployment group before the most recent successful deployment.
        revision:
          $ref: "#/components/schemas/RevisionLocation"
          description: Information about the location of stored application artifacts and the service from which to retrieve them.
        status:
          $ref: "#/components/schemas/DeploymentStatus"
          description: The current state of the deployment as a whole.
        errorInformation:
          $ref: "#/components/schemas/ErrorInformation"
          description: Information about any error associated with this deployment.
        createTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that indicates when the deployment was created.
        startTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that indicates when the deployment was deployed to the deployment group. In some cases, the reported value of the start time might be later than the complete time. This is due to differences in the clock settings of backend servers that participate in the deployment process.
        completeTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that indicates when the deployment was complete.
        deploymentOverview:
          $ref: "#/components/schemas/DeploymentOverview"
          description: A summary of the deployment status of the instances in the deployment.
        description:
          $ref: "#/components/schemas/Description"
          description: A comment about the deployment.
        creator:
          $ref: "#/components/schemas/DeploymentCreator"
          description: "The means by which the deployment was created: user: A user created the deployment. autoscaling: Amazon EC2 Auto Scaling created the deployment. codeDeployRollback: A rollback process created the deployment. CodeDeployAutoUpdate: An auto-update process created the deployment when it detected outdated Amazon EC2 instances."
        ignoreApplicationStopFailures:
          $ref: "#/components/schemas/Boolean"
          description: If true, then if an ApplicationStop, BeforeBlockTraffic, or AfterBlockTraffic deployment lifecycle event to an instance fails, then the deployment continues to the next deployment lifecycle event. For example, if ApplicationStop fails, the deployment continues with DownloadBundle. If BeforeBlockTraffic fails, the deployment continues with BlockTraffic. If AfterBlockTraffic fails, the deployment continues with ApplicationStop. If false or not specified, then if a lifecycle event fails during a deployment to an instance, that deployment fails. If deployment to that instance is part of an overall deployment and the number of healthy hosts is not less than the minimum number of healthy hosts, then a deployment to the next instance is attempted. During a deployment, the CodeDeploy agent runs the scripts specified for ApplicationStop, BeforeBlockTraffic, and AfterBlockTraffic in the AppSpec file from the previous successful deployment. (All other scripts are run from the AppSpec file in the current deployment.) If one of these scripts contains an error and does not run successfully, the deployment can fail. If the cause of the failure is a script from the last successful deployment that will never run successfully, create a new deployment and use ignoreApplicationStopFailures to specify that the ApplicationStop, BeforeBlockTraffic, and AfterBlockTraffic failures should be ignored.
        autoRollbackConfiguration:
          $ref: "#/components/schemas/AutoRollbackConfiguration"
          description: Information about the automatic rollback configuration associated with the deployment.
        updateOutdatedInstancesOnly:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether only instances that are not running the latest application revision are to be deployed to.
        rollbackInfo:
          $ref: "#/components/schemas/RollbackInfo"
          description: Information about a deployment rollback.
        deploymentStyle:
          $ref: "#/components/schemas/DeploymentStyle"
          description: Information about the type of deployment, either in-place or blue/green, you want to run and whether to route deployment traffic behind a load balancer.
        targetInstances:
          $ref: "#/components/schemas/TargetInstances"
          description: Information about the instances that belong to the replacement environment in a blue/green deployment.
        instanceTerminationWaitTimeStarted:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the wait period set for the termination of instances in the original environment has started. Status is 'false' if the KEEP_ALIVE option is specified. Otherwise, 'true' as soon as the termination wait period starts.
        blueGreenDeploymentConfiguration:
          $ref: "#/components/schemas/BlueGreenDeploymentConfiguration"
          description: Information about blue/green deployment options for this deployment.
        loadBalancerInfo:
          $ref: "#/components/schemas/LoadBalancerInfo"
          description: Information about the load balancer used in the deployment.
        additionalDeploymentStatusInfo:
          $ref: "#/components/schemas/AdditionalDeploymentStatusInfo"
          description: Provides information about the results of a deployment, such as whether instances in the original environment in a blue/green deployment were not terminated.
        fileExistsBehavior:
          $ref: "#/components/schemas/FileExistsBehavior"
          description: "Information about how CodeDeploy handles files that already exist in a deployment target location but weren't part of the previous successful deployment. DISALLOW: The deployment fails. This is also the default behavior if no option is specified. OVERWRITE: The version of the file from the application revision currently being deployed replaces the version already on the instance. RETAIN: The version of the file already on the instance is kept and used as part of the new deployment."
        deploymentStatusMessages:
          $ref: "#/components/schemas/DeploymentStatusMessageList"
          description: Messages that contain information about the status of a deployment.
        computePlatform:
          $ref: "#/components/schemas/ComputePlatform"
          description: The destination platform type for the deployment (Lambda, Server, or ECS).
        externalId:
          $ref: "#/components/schemas/ExternalId"
          description: The unique ID for an external resource (for example, a CloudFormation stack ID) that is linked to this deployment.
        relatedDeployments:
          $ref: "#/components/schemas/RelatedDeployments"
        overrideAlarmConfiguration:
          $ref: "#/components/schemas/AlarmConfiguration"
    ErrorInformation:
      description: Information about a deployment error.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
          description: "For more information, see Error Codes for CodeDeploy in the CodeDeploy User Guide. The error code: APPLICATION_MISSING: The application was missing. This error code is most likely raised if the application is deleted after the deployment is created, but before it is started. DEPLOYMENT_GROUP_MISSING: The deployment group was missing. This error code is most likely raised if the deployment group is deleted after the deployment is created, but before it is started. HEALTH_CONSTRAINTS: The deployment failed on too many instances to be successfully deployed within the instance health constraints specified. HEALTH_CONSTRAINTS_INVALID: The revision cannot be successfully deployed within the instance health constraints specified. IAM_ROLE_MISSING: The service role cannot be accessed. IAM_ROLE_PERMISSIONS: The service role does not have the correct permissions. INTERNAL_ERROR: There was an internal error. NO_EC2_SUBSCRIPTION: The calling account is not subscribed to Amazon EC2. NO_INSTANCES: No instances were specified, or no instances can be found. OVER_MAX_INSTANCES: The maximum number of instances was exceeded. THROTTLED: The operation was throttled because the calling account exceeded the throttling limits of one or more Amazon Web Services services. TIMEOUT: The deployment has timed out. REVISION_MISSING: The revision ID was missing. This error code is most likely raised if the revision is deleted after the deployment is created, but before it is started."
        message:
          $ref: "#/components/schemas/ErrorMessage"
          description: An accompanying error message.
    ErrorCode:
      type: string
      enum:
        - AGENT_ISSUE
        - ALARM_ACTIVE
        - APPLICATION_MISSING
        - AUTOSCALING_VALIDATION_ERROR
        - AUTO_SCALING_CONFIGURATION
        - AUTO_SCALING_IAM_ROLE_PERMISSIONS
        - CODEDEPLOY_RESOURCE_CANNOT_BE_FOUND
        - CUSTOMER_APPLICATION_UNHEALTHY
        - DEPLOYMENT_GROUP_MISSING
        - ECS_UPDATE_ERROR
        - ELASTIC_LOAD_BALANCING_INVALID
        - ELB_INVALID_INSTANCE
        - HEALTH_CONSTRAINTS
        - HEALTH_CONSTRAINTS_INVALID
        - HOOK_EXECUTION_FAILURE
        - IAM_ROLE_MISSING
        - IAM_ROLE_PERMISSIONS
        - INTERNAL_ERROR
        - INVALID_ECS_SERVICE
        - INVALID_LAMBDA_CONFIGURATION
        - INVALID_LAMBDA_FUNCTION
        - INVALID_REVISION
        - MANUAL_STOP
        - MISSING_BLUE_GREEN_DEPLOYMENT_CONFIGURATION
        - MISSING_ELB_INFORMATION
        - MISSING_GITHUB_TOKEN
        - NO_EC2_SUBSCRIPTION
        - NO_INSTANCES
        - OVER_MAX_INSTANCES
        - RESOURCE_LIMIT_EXCEEDED
        - REVISION_MISSING
        - THROTTLED
        - TIMEOUT
        - CLOUDFORMATION_STACK_FAILURE
    DeploymentOverview:
