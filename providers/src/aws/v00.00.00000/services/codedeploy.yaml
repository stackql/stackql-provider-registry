        currentVersion:
          $ref: "#/components/schemas/Version"
          description: The version of a Lambda function that production traffic points to.
        targetVersion:
          $ref: "#/components/schemas/Version"
          description: The version of a Lambda function that production traffic points to after the Lambda function is deployed.
        targetVersionWeight:
          $ref: "#/components/schemas/TrafficWeight"
          description: The percentage of production traffic that the target version of a Lambda function receives.
    LambdaFunctionName:
      type: string
    LambdaFunctionAlias:
      type: string
    Version:
      type: string
    TrafficWeight:
      type: number
      format: double
    ECSTarget:
      description: Information about the target of an Amazon ECS deployment.
      type: object
      properties:
        deploymentId:
          $ref: "#/components/schemas/DeploymentId"
          description: The unique ID of a deployment.
        targetId:
          $ref: "#/components/schemas/TargetId"
          description: The unique ID of a deployment target that has a type of ecsTarget.
        targetArn:
          $ref: "#/components/schemas/TargetArn"
          description: The Amazon Resource Name (ARN) of the target.
        lastUpdatedAt:
          $ref: "#/components/schemas/Time"
          description: The date and time when the target Amazon ECS application was updated by a deployment.
        lifecycleEvents:
          $ref: "#/components/schemas/LifecycleEventList"
          description: The lifecycle events of the deployment to this target Amazon ECS application.
        status:
          $ref: "#/components/schemas/TargetStatus"
          description: The status an Amazon ECS deployment's target ECS application.
        taskSetsInfo:
          $ref: "#/components/schemas/ECSTaskSetList"
          description: The ECSTaskSet objects associated with the ECS target.
    ECSTaskSetList:
      type: array
      items:
        $ref: "#/components/schemas/ECSTaskSet"
    ECSTaskSet:
      description: Information about a set of Amazon ECS tasks in an CodeDeploy deployment. An Amazon ECS task set includes details such as the desired number of tasks, how many tasks are running, and whether the task set serves production traffic. An CodeDeploy application that uses the Amazon ECS compute platform deploys a containerized application in an Amazon ECS service as a task set.
      type: object
      properties:
        identifer:
          $ref: "#/components/schemas/ECSTaskSetIdentifier"
          description: A unique ID of an ECSTaskSet.
        desiredCount:
          $ref: "#/components/schemas/ECSTaskSetCount"
          description: The number of tasks in a task set. During a deployment that uses the Amazon ECS compute type, CodeDeploy instructs Amazon ECS to create a new task set and uses this value to determine how many tasks to create. After the updated task set is created, CodeDeploy shifts traffic to the new task set.
        pendingCount:
          $ref: "#/components/schemas/ECSTaskSetCount"
          description: The number of tasks in the task set that are in the PENDING status during an Amazon ECS deployment. A task in the PENDING state is preparing to enter the RUNNING state. A task set enters the PENDING status when it launches for the first time, or when it is restarted after being in the STOPPED state.
        runningCount:
          $ref: "#/components/schemas/ECSTaskSetCount"
          description: The number of tasks in the task set that are in the RUNNING status during an Amazon ECS deployment. A task in the RUNNING state is running and ready for use.
        status:
          $ref: "#/components/schemas/ECSTaskSetStatus"
          description: "The status of the task set. There are three valid task set statuses: PRIMARY: Indicates the task set is serving production traffic. ACTIVE: Indicates the task set is not serving production traffic. DRAINING: Indicates the tasks in the task set are being stopped and their corresponding targets are being deregistered from their target group."
        trafficWeight:
          $ref: "#/components/schemas/TrafficWeight"
          description: The percentage of traffic served by this task set.
        targetGroup:
          $ref: "#/components/schemas/TargetGroupInfo"
          description: The target group associated with the task set. The target group is used by CodeDeploy to manage traffic to a task set.
        taskSetLabel:
          $ref: "#/components/schemas/TargetLabel"
          description: A label that identifies whether the ECS task set is an original target (BLUE) or a replacement target (GREEN).
    ECSTaskSetIdentifier:
      type: string
    ECSTaskSetCount:
      type: integer
      format: int64
    ECSTaskSetStatus:
      type: string
    CloudFormationTarget:
      description: Information about the target to be updated by an CloudFormation blue/green deployment. This target type is used for all deployments initiated by a CloudFormation stack update.
      type: object
      properties:
        deploymentId:
          $ref: "#/components/schemas/DeploymentId"
          description: The unique ID of an CloudFormation blue/green deployment.
        targetId:
          $ref: "#/components/schemas/TargetId"
