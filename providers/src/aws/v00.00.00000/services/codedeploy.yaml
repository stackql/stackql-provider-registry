    MinimumHealthyHosts:
      description: Information about the minimum number of healthy instances.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/MinimumHealthyHostsType"
          description: "The minimum healthy instance type: HOST_COUNT: The minimum number of healthy instances as an absolute value. FLEET_PERCENT: The minimum number of healthy instances as a percentage of the total number of instances in the deployment. In an example of nine instances, if a HOST_COUNT of six is specified, deploy to up to three instances at a time. The deployment is successful if six or more instances are deployed to successfully. Otherwise, the deployment fails. If a FLEET_PERCENT of 40 is specified, deploy to up to five instances at a time. The deployment is successful if four or more instances are deployed to successfully. Otherwise, the deployment fails. In a call to the GetDeploymentConfig, CodeDeployDefault.OneAtATime returns a minimum healthy instance type of MOST_CONCURRENCY and a value of 1. This means a deployment to only one instance at a time. (You cannot set the type to MOST_CONCURRENCY, only to HOST_COUNT or FLEET_PERCENT.) In addition, with CodeDeployDefault.OneAtATime, CodeDeploy attempts to ensure that all instances but one are kept in a healthy state during the deployment. Although this allows one instance at a time to be taken offline for a new deployment, it also means that if the deployment to the last instance fails, the overall deployment is still successful. For more information, see CodeDeploy Instance Health in the CodeDeploy User Guide."
        value:
          $ref: "#/components/schemas/MinimumHealthyHostsValue"
          description: The minimum healthy instance value.
    MinimumHealthyHostsType:
      type: string
      enum:
        - HOST_COUNT
        - FLEET_PERCENT
    MinimumHealthyHostsValue:
      type: integer
    TrafficRoutingConfig:
      description: The configuration that specifies how traffic is shifted from one version of a Lambda function to another version during an Lambda deployment, or from one Amazon ECS task set to another during an Amazon ECS deployment.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/TrafficRoutingType"
          description: The type of traffic shifting (TimeBasedCanary or TimeBasedLinear) used by a deployment configuration.
        timeBasedCanary:
          $ref: "#/components/schemas/TimeBasedCanary"
          description: A configuration that shifts traffic from one version of a Lambda function or ECS task set to another in two increments. The original and target Lambda function versions or ECS task sets are specified in the deployment's AppSpec file.
        timeBasedLinear:
          $ref: "#/components/schemas/TimeBasedLinear"
          description: A configuration that shifts traffic from one version of a Lambda function or Amazon ECS task set to another in equal increments, with an equal number of minutes between each increment. The original and target Lambda function versions or Amazon ECS task sets are specified in the deployment's AppSpec file.
    TrafficRoutingType:
      type: string
      enum:
        - TimeBasedCanary
        - TimeBasedLinear
        - AllAtOnce
    TimeBasedCanary:
      description: A configuration that shifts traffic from one version of a Lambda function or Amazon ECS task set to another in two increments. The original and target Lambda function versions or ECS task sets are specified in the deployment's AppSpec file.
      type: object
      properties:
        canaryPercentage:
          $ref: "#/components/schemas/Percentage"
          description: The percentage of traffic to shift in the first increment of a TimeBasedCanary deployment.
        canaryInterval:
          $ref: "#/components/schemas/WaitTimeInMins"
          description: The number of minutes between the first and second traffic shifts of a TimeBasedCanary deployment.
    Percentage:
      type: integer
    WaitTimeInMins:
      type: integer
    TimeBasedLinear:
      description: A configuration that shifts traffic from one version of a Lambda function or ECS task set to another in equal increments, with an equal number of minutes between each increment. The original and target Lambda function versions or ECS task sets are specified in the deployment's AppSpec file.
      type: object
      properties:
        linearPercentage:
          $ref: "#/components/schemas/Percentage"
          description: The percentage of traffic that is shifted at the start of each increment of a TimeBasedLinear deployment.
        linearInterval:
          $ref: "#/components/schemas/WaitTimeInMins"
          description: The number of minutes between each incremental traffic shift of a TimeBasedLinear deployment.
    ZonalConfig:
      description: Configure the ZonalConfig object if you want CodeDeploy to deploy your application to one Availability Zone at a time, within an Amazon Web Services Region. By deploying to one Availability Zone at a time, you can expose your deployment to a progressively larger audience as confidence in the deployment's performance and viability grows. If you don't configure the ZonalConfig object, CodeDeploy deploys your application to a random selection of hosts across a Region. For more information about the zonal configuration feature, see zonal configuration in the CodeDeploy User Guide.
      type: object
      properties:
        firstZoneMonitorDurationInSeconds:
          $ref: "#/components/schemas/WaitTimeInSeconds"
          description: The period of time, in seconds, that CodeDeploy must wait after completing a deployment to the first Availability Zone. CodeDeploy will wait this amount of time before starting a deployment to the second Availability Zone. You might set this option if you want to allow extra bake time for the first Availability Zone. If you don't specify a value for firstZoneMonitorDurationInSeconds, then CodeDeploy uses the monitorDurationInSeconds value for the first Availability Zone. For more information about the zonal configuration feature, see zonal configuration in the CodeDeploy User Guide.
        monitorDurationInSeconds:
          $ref: "#/components/schemas/WaitTimeInSeconds"
          description: The period of time, in seconds, that CodeDeploy must wait after completing a deployment to an Availability Zone. CodeDeploy will wait this amount of time before starting a deployment to the next Availability Zone. Consider adding a monitor duration to give the deployment some time to prove itself (or 'bake') in one Availability Zone before it is released in the next zone. If you don't specify a monitorDurationInSeconds, CodeDeploy starts deploying to the next Availability Zone immediately. For more information about the zonal configuration feature, see zonal configuration in the CodeDeploy User Guide.
        minimumHealthyHostsPerZone:
          $ref: "#/components/schemas/MinimumHealthyHostsPerZone"
          description: The number or percentage of instances that must remain available per Availability Zone during a deployment. This option works in conjunction with the MinimumHealthyHosts option. For more information, see About the minimum number of healthy hosts per Availability Zone in the CodeDeploy User Guide. If you don't specify the minimumHealthyHostsPerZone option, then CodeDeploy uses a default value of 0 percent. For more information about the zonal configuration feature, see zonal configuration in the CodeDeploy User Guide.
    WaitTimeInSeconds:
      type: integer
      format: int64
    MinimumHealthyHostsPerZone:
      description: Information about the minimum number of healthy instances per Availability Zone.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/MinimumHealthyHostsPerZoneType"
          description: The type associated with the MinimumHealthyHostsPerZone option.
        value:
          $ref: "#/components/schemas/MinimumHealthyHostsPerZoneValue"
          description: The value associated with the MinimumHealthyHostsPerZone option.
    MinimumHealthyHostsPerZoneType:
      type: string
      enum:
        - HOST_COUNT
        - FLEET_PERCENT
    MinimumHealthyHostsPerZoneValue:
      type: integer
    CreateDeploymentConfigOutput:
      description: Represents the output of a CreateDeploymentConfig operation.
      type: object
      properties:
        deploymentConfigId:
          $ref: "#/components/schemas/DeploymentConfigId"
          description: A unique deployment configuration ID.
    DeploymentConfigId:
      type: string
    NullableBoolean:
      type: boolean
    CreateDeploymentGroupOutput:
      description: Represents the output of a CreateDeploymentGroup operation.
      type: object
      properties:
        deploymentGroupId:
          $ref: "#/components/schemas/DeploymentGroupId"
          description: A unique deployment group ID.
    DeleteDeploymentGroupOutput:
      description: Represents the output of a DeleteDeploymentGroup operation.
      type: object
      properties:
