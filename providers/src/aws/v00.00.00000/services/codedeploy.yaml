          description: The on-premises instance tag filter key.
        Value:
          $ref: "#/components/schemas/Value"
          description: The on-premises instance tag filter value.
        Type:
          $ref: "#/components/schemas/TagFilterType"
          description: "The on-premises instance tag filter type: KEY_ONLY: Key only. VALUE_ONLY: Value only. KEY_AND_VALUE: Key and value."
    TagFilterType:
      type: string
      enum:
        - KEY_ONLY
        - VALUE_ONLY
        - KEY_AND_VALUE
    AutoScalingGroupList:
