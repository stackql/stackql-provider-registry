          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.RegisterApplicationRevision
            default: CodeDeploy_20141006.RegisterApplicationRevision
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                applicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: The name of an CodeDeploy application associated with the user or Amazon Web Services account.
                description:
                  $ref: "#/components/schemas/Description"
                  description: A comment about the revision.
                revision:
                  $ref: "#/components/schemas/RevisionLocation"
                  description: Information about the application revision to register, including type and location.
              required:
                - applicationName
                - revision
      responses:
        "200":
          description: Success
  /RegisterOnPremisesInstance:
    post:
      operationId: RegisterOnPremisesInstance
      description: Registers an on-premises instance. Only one IAM ARN (an IAM session ARN or IAM user ARN) is supported in the request. You cannot use both.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.RegisterOnPremisesInstance
            default: CodeDeploy_20141006.RegisterOnPremisesInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                instanceName:
                  $ref: "#/components/schemas/InstanceName"
                  description: The name of the on-premises instance to register.
                iamSessionArn:
                  $ref: "#/components/schemas/IamSessionArn"
                  description: The ARN of the IAM session to associate with the on-premises instance.
                iamUserArn:
                  $ref: "#/components/schemas/IamUserArn"
                  description: The ARN of the user to associate with the on-premises instance.
              required:
                - instanceName
      responses:
        "200":
          description: Success
  /RemoveTagsFromOnPremisesInstances:
    post:
      operationId: RemoveTagsFromOnPremisesInstances
      description: Removes one or more tags from one or more on-premises instances.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.RemoveTagsFromOnPremisesInstances
            default: CodeDeploy_20141006.RemoveTagsFromOnPremisesInstances
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tag key-value pairs to remove from the on-premises instances.
                instanceNames:
                  $ref: "#/components/schemas/InstanceNameList"
                  description: The names of the on-premises instances from which to remove tags.
              required:
                - tags
                - instanceNames
      responses:
        "200":
          description: Success
  /SkipWaitTimeForInstanceTermination:
    post:
      operationId: SkipWaitTimeForInstanceTermination
      description: In a blue/green deployment, overrides any specified wait time and starts terminating instances immediately after the traffic routing is complete.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.SkipWaitTimeForInstanceTermination
            default: CodeDeploy_20141006.SkipWaitTimeForInstanceTermination
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                deploymentId:
                  $ref: "#/components/schemas/DeploymentId"
                  description: The unique ID of a blue/green deployment for which you want to skip the instance termination wait time.
      responses:
        "200":
          description: Success
  /StopDeployment:
    post:
      operationId: StopDeployment
      description: Attempts to stop an ongoing deployment.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.StopDeployment
            default: CodeDeploy_20141006.StopDeployment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                deploymentId:
                  $ref: "#/components/schemas/DeploymentId"
                  description: The unique ID of a deployment.
                autoRollbackEnabled:
                  $ref: "#/components/schemas/NullableBoolean"
                  description: Indicates, when a deployment is stopped, whether instances that have been updated should be rolled back to the previous version of the application revision.
              required:
                - deploymentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopDeploymentOutput"
  /TagResource:
    post:
      operationId: TagResource
      description: Associates the list of tags in the input Tags parameter with the resource identified by the ResourceArn input parameter.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.TagResource
            default: CodeDeploy_20141006.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of a resource, such as a CodeDeploy application or deployment group.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags that TagResource associates with a resource. The resource is identified by the ResourceArn input parameter.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Disassociates a resource from a list of tags. The resource is identified by the ResourceArn input parameter. The tags are identified by the list of keys in the TagKeys input parameter.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.UntagResource
            default: CodeDeploy_20141006.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) that specifies from which resource to disassociate the tags with the keys in the TagKeys input parameter.
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: A list of keys of Tag objects. The Tag objects identified by the keys are disassociated from the resource specified by the ResourceArn input parameter.
              required:
                - ResourceArn
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /UpdateApplication:
    post:
      operationId: UpdateApplication
      description: Changes the name of an application.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.UpdateApplication
            default: CodeDeploy_20141006.UpdateApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                applicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: The current name of the application you want to change.
                newApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: The new name to give the application.
      responses:
        "200":
          description: Success
  /UpdateDeploymentGroup:
    post:
      operationId: UpdateDeploymentGroup
      description: Changes information about a deployment group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.UpdateDeploymentGroup
            default: CodeDeploy_20141006.UpdateDeploymentGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                applicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: The application name that corresponds to the deployment group to update.
                currentDeploymentGroupName:
                  $ref: "#/components/schemas/DeploymentGroupName"
                  description: The current name of the deployment group.
                newDeploymentGroupName:
                  $ref: "#/components/schemas/DeploymentGroupName"
                  description: The new name of the deployment group, if you want to change it.
                deploymentConfigName:
                  $ref: "#/components/schemas/DeploymentConfigName"
                  description: The replacement deployment configuration name to use, if you want to change it.
                ec2TagFilters:
                  $ref: "#/components/schemas/EC2TagFilterList"
                  description: The replacement set of Amazon EC2 tags on which to filter, if you want to change them. To keep the existing tags, enter their names. To remove tags, do not enter any tag names.
                onPremisesInstanceTagFilters:
                  $ref: "#/components/schemas/TagFilterList"
                  description: The replacement set of on-premises instance tags on which to filter, if you want to change them. To keep the existing tags, enter their names. To remove tags, do not enter any tag names.
                autoScalingGroups:
                  $ref: "#/components/schemas/AutoScalingGroupNameList"
                  description: The replacement list of Auto Scaling groups to be included in the deployment group, if you want to change them. To keep the Auto Scaling groups, enter their names or do not specify this parameter. To remove Auto Scaling groups, specify a non-null empty list of Auto Scaling group names to detach all CodeDeploy-managed Auto Scaling lifecycle hooks. For examples, see Amazon EC2 instances in an Amazon EC2 Auto Scaling group fail to launch and receive the error "Heartbeat Timeout" in the CodeDeploy User Guide.
                serviceRoleArn:
                  $ref: "#/components/schemas/Role"
                  description: A replacement ARN for the service role, if you want to change it.
                triggerConfigurations:
                  $ref: "#/components/schemas/TriggerConfigList"
                  description: Information about triggers to change when the deployment group is updated. For examples, see Edit a Trigger in a CodeDeploy Deployment Group in the CodeDeploy User Guide.
                alarmConfiguration:
                  $ref: "#/components/schemas/AlarmConfiguration"
                  description: Information to add or change about Amazon CloudWatch alarms when the deployment group is updated.
                autoRollbackConfiguration:
                  $ref: "#/components/schemas/AutoRollbackConfiguration"
                  description: Information for an automatic rollback configuration that is added or changed when a deployment group is updated.
                outdatedInstancesStrategy:
                  $ref: "#/components/schemas/OutdatedInstancesStrategy"
                  description: Indicates what happens when new Amazon EC2 instances are launched mid-deployment and do not receive the deployed application revision. If this option is set to UPDATE or is unspecified, CodeDeploy initiates one or more 'auto-update outdated instances' deployments to apply the deployed application revision to the new Amazon EC2 instances. If this option is set to IGNORE, CodeDeploy does not initiate a deployment to update the new Amazon EC2 instances. This may result in instances having different revisions.
                deploymentStyle:
                  $ref: "#/components/schemas/DeploymentStyle"
                  description: Information about the type of deployment, either in-place or blue/green, you want to run and whether to route deployment traffic behind a load balancer.
                blueGreenDeploymentConfiguration:
                  $ref: "#/components/schemas/BlueGreenDeploymentConfiguration"
                  description: Information about blue/green deployment options for a deployment group.
                loadBalancerInfo:
                  $ref: "#/components/schemas/LoadBalancerInfo"
                  description: Information about the load balancer used in a deployment.
                ec2TagSet:
                  $ref: "#/components/schemas/EC2TagSet"
                  description: Information about groups of tags applied to on-premises instances. The deployment group includes only Amazon EC2 instances identified by all the tag groups.
                ecsServices:
                  $ref: "#/components/schemas/ECSServiceList"
                  description: The target Amazon ECS services in the deployment group. This applies only to deployment groups that use the Amazon ECS compute platform. A target Amazon ECS service is specified as an Amazon ECS cluster and service name pair using the format `<clustername>`:`<servicename>`.
                onPremisesTagSet:
                  $ref: "#/components/schemas/OnPremisesTagSet"
                  description: Information about an on-premises instance tag set. The deployment group includes only on-premises instances identified by all the tag groups.
                terminationHookEnabled:
                  $ref: "#/components/schemas/NullableBoolean"
                  description: This parameter only applies if you are using CodeDeploy with Amazon EC2 Auto Scaling. For more information, see Integrating CodeDeploy with Amazon EC2 Auto Scaling in the CodeDeploy User Guide. Set terminationHookEnabled to true to have CodeDeploy install a termination hook into your Auto Scaling group when you update a deployment group. When this hook is installed, CodeDeploy will perform termination deployments. For information about termination deployments, see Enabling termination deployments during Auto Scaling scale-in events in the CodeDeploy User Guide. For more information about Auto Scaling scale-in events, see the Scale in topic in the Amazon EC2 Auto Scaling User Guide.
              required:
                - applicationName
                - currentDeploymentGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDeploymentGroupOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Information about a tag.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/Key"
          description: The tag's key.
        Value:
          $ref: "#/components/schemas/Value"
          description: The tag's value.
    Key:
      type: string
    Value:
      type: string
    InstanceNameList:
      type: array
      items:
        $ref: "#/components/schemas/InstanceName"
    InstanceName:
      type: string
    ApplicationName:
      type: string
      minLength: 1
      maxLength: 100
    RevisionLocationList:
      type: array
      items:
        $ref: "#/components/schemas/RevisionLocation"
    RevisionLocation:
      description: Information about the location of an application revision.
      type: object
      properties:
        revisionType:
          $ref: "#/components/schemas/RevisionLocationType"
          description: "The type of application revision: S3: An application revision stored in Amazon S3. GitHub: An application revision stored in GitHub (EC2/On-premises deployments only). String: A YAML-formatted or JSON-formatted string (Lambda deployments only). AppSpecContent: An AppSpecContent object that contains the contents of an AppSpec file for an Lambda or Amazon ECS deployment. The content is formatted as JSON or YAML stored as a RawString."
        s3Location:
          $ref: "#/components/schemas/S3Location"
          description: Information about the location of a revision stored in Amazon S3.
        gitHubLocation:
          $ref: "#/components/schemas/GitHubLocation"
          description: Information about the location of application artifacts stored in GitHub.
        string:
          $ref: "#/components/schemas/RawString"
          description: Information about the location of an Lambda deployment revision stored as a RawString.
        appSpecContent:
          $ref: "#/components/schemas/AppSpecContent"
          description: The content of an AppSpec file for an Lambda or Amazon ECS deployment. The content is formatted as JSON or YAML and stored as a RawString.
    RevisionLocationType:
      type: string
      enum:
        - S3
        - GitHub
        - String
        - AppSpecContent
    S3Location:
      description: Information about the location of application artifacts stored in Amazon S3.
      type: object
      properties:
        bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The name of the Amazon S3 bucket where the application revision is stored.
        key:
          $ref: "#/components/schemas/S3Key"
          description: The name of the Amazon S3 object that represents the bundled artifacts for the application revision.
        bundleType:
          $ref: "#/components/schemas/BundleType"
          description: "The file type of the application revision. Must be one of the following: tar: A tar archive file. tgz: A compressed tar archive file. zip: A zip archive file. YAML: A YAML-formatted file. JSON: A JSON-formatted file."
        version:
          $ref: "#/components/schemas/VersionId"
          description: A specific version of the Amazon S3 object that represents the bundled artifacts for the application revision. If the version is not specified, the system uses the most recent version by default.
        eTag:
          $ref: "#/components/schemas/ETag"
          description: The ETag of the Amazon S3 object that represents the bundled artifacts for the application revision. If the ETag is not specified as an input parameter, ETag validation of the object is skipped.
    S3Bucket:
      type: string
    S3Key:
      type: string
    BundleType:
      type: string
      enum:
        - tar
        - tgz
        - zip
        - YAML
        - JSON
    VersionId:
      type: string
    ETag:
      type: string
    GitHubLocation:
      description: Information about the location of application artifacts stored in GitHub.
      type: object
      properties:
        repository:
          $ref: "#/components/schemas/Repository"
          description: The GitHub account and repository pair that stores a reference to the commit that represents the bundled artifacts for the application revision. Specified as account/repository.
        commitId:
          $ref: "#/components/schemas/CommitId"
          description: The SHA1 commit ID of the GitHub commit that represents the bundled artifacts for the application revision.
    Repository:
      type: string
    CommitId:
      type: string
    RawString:
      description: A revision for an Lambda deployment that is a YAML-formatted or JSON-formatted string. For Lambda deployments, the revision is the same as the AppSpec file.
      type: object
      properties:
        content:
          $ref: "#/components/schemas/RawStringContent"
          description: The YAML-formatted or JSON-formatted revision string. It includes information about which Lambda function to update and optional Lambda functions that validate deployment lifecycle events.
        sha256:
          $ref: "#/components/schemas/RawStringSha256"
          description: The SHA256 hash value of the revision content.
    RawStringContent:
      type: string
    RawStringSha256:
      type: string
    AppSpecContent:
      description: A revision for an Lambda or Amazon ECS deployment that is a YAML-formatted or JSON-formatted string. For Lambda and Amazon ECS deployments, the revision is the same as the AppSpec file. This method replaces the deprecated RawString data type.
      type: object
      properties:
        content:
          $ref: "#/components/schemas/RawStringContent"
          description: The YAML-formatted or JSON-formatted revision string. For an Lambda deployment, the content includes a Lambda function name, the alias for its original version, and the alias for its replacement version. The deployment shifts traffic from the original version of the Lambda function to the replacement version. For an Amazon ECS deployment, the content includes the task name, information about the load balancer that serves traffic to the container, and more. For both types of deployments, the content can specify Lambda functions that run at specified hooks, such as BeforeInstall, during a deployment.
        sha256:
          $ref: "#/components/schemas/RawStringSha256"
          description: The SHA256 hash value of the revision content.
    BatchGetApplicationRevisionsOutput:
      description: Represents the output of a BatchGetApplicationRevisions operation.
      type: object
      properties:
        applicationName:
          $ref: "#/components/schemas/ApplicationName"
          description: The name of the application that corresponds to the revisions.
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: Information about errors that might have occurred during the API call.
        revisions:
          $ref: "#/components/schemas/RevisionInfoList"
          description: Additional information about the revisions, including the type and location.
    ErrorMessage:
      type: string
    RevisionInfoList:
      type: array
      items:
        $ref: "#/components/schemas/RevisionInfo"
    RevisionInfo:
      description: Information about an application revision.
      type: object
      properties:
        revisionLocation:
          $ref: "#/components/schemas/RevisionLocation"
          description: Information about the location and type of an application revision.
        genericRevisionInfo:
          $ref: "#/components/schemas/GenericRevisionInfo"
          description: Information about an application revision, including usage details and associated deployment groups.
    GenericRevisionInfo:
      description: Information about an application revision.
      type: object
      properties:
        description:
          $ref: "#/components/schemas/Description"
          description: A comment about the revision.
        deploymentGroups:
          $ref: "#/components/schemas/DeploymentGroupsList"
          description: The deployment groups for which this is the current target revision.
        firstUsedTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the revision was first used by CodeDeploy.
        lastUsedTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the revision was last used by CodeDeploy.
        registerTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the revision was registered with CodeDeploy.
    Description:
      type: string
    DeploymentGroupsList:
      type: array
      items:
        $ref: "#/components/schemas/DeploymentGroupName"
    DeploymentGroupName:
      type: string
      minLength: 1
      maxLength: 100
    Timestamp:
      type: string
      format: date-time
    ApplicationsList:
      type: array
      items:
        $ref: "#/components/schemas/ApplicationName"
    BatchGetApplicationsOutput:
      description: Represents the output of a BatchGetApplications operation.
      type: object
      properties:
        applicationsInfo:
          $ref: "#/components/schemas/ApplicationsInfoList"
          description: Information about the applications.
    ApplicationsInfoList:
      type: array
      items:
        $ref: "#/components/schemas/ApplicationInfo"
    ApplicationInfo:
      description: Information about an application.
      type: object
      properties:
        applicationId:
          $ref: "#/components/schemas/ApplicationId"
          description: The application ID.
        applicationName:
          $ref: "#/components/schemas/ApplicationName"
          description: The application name.
        createTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the application was created.
        linkedToGitHub:
          $ref: "#/components/schemas/Boolean"
          description: True if the user has authenticated with GitHub for the specified application. Otherwise, false.
        gitHubAccountName:
          $ref: "#/components/schemas/GitHubAccountTokenName"
          description: The name for a connection to a GitHub account.
        computePlatform:
          $ref: "#/components/schemas/ComputePlatform"
          description: The destination platform type for deployment of the application (Lambda or Server).
    ApplicationId:
      type: string
    Boolean:
      type: boolean
    GitHubAccountTokenName:
      type: string
    ComputePlatform:
      type: string
      enum:
        - Server
        - Lambda
        - ECS
    BatchGetDeploymentGroupsOutput:
      description: Represents the output of a BatchGetDeploymentGroups operation.
      type: object
      properties:
        deploymentGroupsInfo:
          $ref: "#/components/schemas/DeploymentGroupInfoList"
          description: Information about the deployment groups.
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: Information about errors that might have occurred during the API call.
    DeploymentGroupInfoList:
      type: array
      items:
        $ref: "#/components/schemas/DeploymentGroupInfo"
    DeploymentGroupInfo:
      description: Information about a deployment group.
      type: object
      properties:
        applicationName:
          $ref: "#/components/schemas/ApplicationName"
          description: The application name.
        deploymentGroupId:
          $ref: "#/components/schemas/DeploymentGroupId"
          description: The deployment group ID.
        deploymentGroupName:
          $ref: "#/components/schemas/DeploymentGroupName"
          description: The deployment group name.
        deploymentConfigName:
          $ref: "#/components/schemas/DeploymentConfigName"
          description: The deployment configuration name.
        ec2TagFilters:
          $ref: "#/components/schemas/EC2TagFilterList"
          description: The Amazon EC2 tags on which to filter. The deployment group includes EC2 instances with any of the specified tags.
        onPremisesInstanceTagFilters:
          $ref: "#/components/schemas/TagFilterList"
          description: The on-premises instance tags on which to filter. The deployment group includes on-premises instances with any of the specified tags.
        autoScalingGroups:
          $ref: "#/components/schemas/AutoScalingGroupList"
          description: A list of associated Auto Scaling groups.
        serviceRoleArn:
          $ref: "#/components/schemas/Role"
          description: A service role Amazon Resource Name (ARN) that grants CodeDeploy permission to make calls to Amazon Web Services services on your behalf. For more information, see Create a Service Role for CodeDeploy in the CodeDeploy User Guide.
        targetRevision:
          $ref: "#/components/schemas/RevisionLocation"
          description: Information about the deployment group's target revision, including type and location.
        triggerConfigurations:
          $ref: "#/components/schemas/TriggerConfigList"
          description: Information about triggers associated with the deployment group.
        alarmConfiguration:
          $ref: "#/components/schemas/AlarmConfiguration"
          description: A list of alarms associated with the deployment group.
        autoRollbackConfiguration:
          $ref: "#/components/schemas/AutoRollbackConfiguration"
          description: Information about the automatic rollback configuration associated with the deployment group.
        deploymentStyle:
          $ref: "#/components/schemas/DeploymentStyle"
          description: Information about the type of deployment, either in-place or blue/green, you want to run and whether to route deployment traffic behind a load balancer.
        outdatedInstancesStrategy:
          $ref: "#/components/schemas/OutdatedInstancesStrategy"
          description: Indicates what happens when new Amazon EC2 instances are launched mid-deployment and do not receive the deployed application revision. If this option is set to UPDATE or is unspecified, CodeDeploy initiates one or more 'auto-update outdated instances' deployments to apply the deployed application revision to the new Amazon EC2 instances. If this option is set to IGNORE, CodeDeploy does not initiate a deployment to update the new Amazon EC2 instances. This may result in instances having different revisions.
        blueGreenDeploymentConfiguration:
          $ref: "#/components/schemas/BlueGreenDeploymentConfiguration"
          description: Information about blue/green deployment options for a deployment group.
        loadBalancerInfo:
          $ref: "#/components/schemas/LoadBalancerInfo"
          description: Information about the load balancer to use in a deployment.
        lastSuccessfulDeployment:
          $ref: "#/components/schemas/LastDeploymentInfo"
          description: Information about the most recent successful deployment to the deployment group.
        lastAttemptedDeployment:
          $ref: "#/components/schemas/LastDeploymentInfo"
          description: Information about the most recent attempted deployment to the deployment group.
        ec2TagSet:
          $ref: "#/components/schemas/EC2TagSet"
          description: Information about groups of tags applied to an Amazon EC2 instance. The deployment group includes only Amazon EC2 instances identified by all of the tag groups. Cannot be used in the same call as ec2TagFilters.
        onPremisesTagSet:
          $ref: "#/components/schemas/OnPremisesTagSet"
          description: Information about groups of tags applied to an on-premises instance. The deployment group includes only on-premises instances identified by all the tag groups. Cannot be used in the same call as onPremisesInstanceTagFilters.
        computePlatform:
          $ref: "#/components/schemas/ComputePlatform"
          description: The destination platform type for the deployment (Lambda, Server, or ECS).
        ecsServices:
          $ref: "#/components/schemas/ECSServiceList"
          description: The target Amazon ECS services in the deployment group. This applies only to deployment groups that use the Amazon ECS compute platform. A target Amazon ECS service is specified as an Amazon ECS cluster and service name pair using the format `<clustername>`:`<servicename>`.
        terminationHookEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the deployment group was configured to have CodeDeploy install a termination hook into an Auto Scaling group. For more information about the termination hook, see How Amazon EC2 Auto Scaling works with CodeDeploy in the CodeDeploy User Guide.
    DeploymentGroupId:
      type: string
    DeploymentConfigName:
      type: string
      minLength: 1
      maxLength: 100
    EC2TagFilterList:
      type: array
      items:
        $ref: "#/components/schemas/EC2TagFilter"
    EC2TagFilter:
