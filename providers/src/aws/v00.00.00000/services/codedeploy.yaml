      type: array
      items:
        $ref: "#/components/schemas/TriggerConfig"
    TriggerConfig:
      description: Information about notification triggers for the deployment group.
      type: object
      properties:
        triggerName:
          $ref: "#/components/schemas/TriggerName"
          description: The name of the notification trigger.
        triggerTargetArn:
          $ref: "#/components/schemas/TriggerTargetArn"
          description: The Amazon Resource Name (ARN) of the Amazon Simple Notification Service topic through which notifications about deployment or instance events are sent.
        triggerEvents:
          $ref: "#/components/schemas/TriggerEventTypeList"
          description: The event type or types for which notifications are triggered.
    TriggerName:
      type: string
    TriggerTargetArn:
      type: string
    TriggerEventTypeList:
      type: array
      items:
        $ref: "#/components/schemas/TriggerEventType"
    TriggerEventType:
      type: string
      enum:
        - DeploymentStart
        - DeploymentSuccess
        - DeploymentFailure
        - DeploymentStop
        - DeploymentRollback
        - DeploymentReady
        - InstanceStart
        - InstanceSuccess
        - InstanceFailure
        - InstanceReady
    AlarmConfiguration:
      description: Information about alarms associated with a deployment or deployment group.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the alarm configuration is enabled.
        ignorePollAlarmFailure:
          $ref: "#/components/schemas/Boolean"
          description: "Indicates whether a deployment should continue if information about the current state of alarms cannot be retrieved from Amazon CloudWatch. The default value is false. true: The deployment proceeds even if alarm status information can't be retrieved from Amazon CloudWatch. false: The deployment stops if alarm status information can't be retrieved from Amazon CloudWatch."
        alarms:
          $ref: "#/components/schemas/AlarmList"
          description: A list of alarms configured for the deployment or deployment group. A maximum of 10 alarms can be added.
    AlarmList:
      type: array
      items:
        $ref: "#/components/schemas/Alarm"
    Alarm:
      description: Information about an alarm.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/AlarmName"
          description: The name of the alarm. Maximum length is 255 characters. Each alarm name can be used only once in a list of alarms.
    AlarmName:
      type: string
    AutoRollbackConfiguration:
      description: Information about a configuration for automatically rolling back to a previous version of an application revision when a deployment is not completed successfully.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether a defined automatic rollback configuration is currently enabled.
        events:
          $ref: "#/components/schemas/AutoRollbackEventsList"
          description: The event type or types that trigger a rollback.
    AutoRollbackEventsList:
      type: array
      items:
        $ref: "#/components/schemas/AutoRollbackEvent"
    AutoRollbackEvent:
      type: string
      enum:
        - DEPLOYMENT_FAILURE
        - DEPLOYMENT_STOP_ON_ALARM
        - DEPLOYMENT_STOP_ON_REQUEST
    DeploymentStyle:
      description: Information about the type of deployment, either in-place or blue/green, you want to run and whether to route deployment traffic behind a load balancer.
      type: object
      properties:
        deploymentType:
          $ref: "#/components/schemas/DeploymentType"
          description: Indicates whether to run an in-place deployment or a blue/green deployment.
        deploymentOption:
          $ref: "#/components/schemas/DeploymentOption"
          description: Indicates whether to route deployment traffic behind a load balancer.
    DeploymentType:
      type: string
      enum:
        - IN_PLACE
        - BLUE_GREEN
    DeploymentOption:
      type: string
      enum:
        - WITH_TRAFFIC_CONTROL
        - WITHOUT_TRAFFIC_CONTROL
    OutdatedInstancesStrategy:
      type: string
      enum:
        - UPDATE
        - IGNORE
    BlueGreenDeploymentConfiguration:
      description: Information about blue/green deployment options for a deployment group.
      type: object
      properties:
        terminateBlueInstancesOnDeploymentSuccess:
          $ref: "#/components/schemas/BlueInstanceTerminationOption"
          description: Information about whether to terminate instances in the original fleet during a blue/green deployment.
        deploymentReadyOption:
          $ref: "#/components/schemas/DeploymentReadyOption"
          description: Information about the action to take when newly provisioned instances are ready to receive traffic in a blue/green deployment.
        greenFleetProvisioningOption:
          $ref: "#/components/schemas/GreenFleetProvisioningOption"
          description: Information about how instances are provisioned for a replacement environment in a blue/green deployment.
    BlueInstanceTerminationOption:
      description: Information about whether instances in the original environment are terminated when a blue/green deployment is successful. BlueInstanceTerminationOption does not apply to Lambda deployments.
      type: object
      properties:
        action:
          $ref: "#/components/schemas/InstanceAction"
          description: "The action to take on instances in the original environment after a successful blue/green deployment. TERMINATE: Instances are terminated after a specified wait time. KEEP_ALIVE: Instances are left running after they are deregistered from the load balancer and removed from the deployment group."
        terminationWaitTimeInMinutes:
          $ref: "#/components/schemas/Duration"
          description: For an Amazon EC2 deployment, the number of minutes to wait after a successful blue/green deployment before terminating instances from the original environment. For an Amazon ECS deployment, the number of minutes before deleting the original (blue) task set. During an Amazon ECS deployment, CodeDeploy shifts traffic from the original (blue) task set to a replacement (green) task set. The maximum setting is 2880 minutes (2 days).
    InstanceAction:
      type: string
      enum:
        - TERMINATE
        - KEEP_ALIVE
    Duration:
      type: integer
    DeploymentReadyOption:
      description: Information about how traffic is rerouted to instances in a replacement environment in a blue/green deployment.
      type: object
      properties:
        actionOnTimeout:
          $ref: "#/components/schemas/DeploymentReadyAction"
          description: "Information about when to reroute traffic from an original environment to a replacement environment in a blue/green deployment. CONTINUE_DEPLOYMENT: Register new instances with the load balancer immediately after the new application revision is installed on the instances in the replacement environment. STOP_DEPLOYMENT: Do not register new instances with a load balancer unless traffic rerouting is started using ContinueDeployment. If traffic rerouting is not started before the end of the specified wait period, the deployment status is changed to Stopped."
        waitTimeInMinutes:
          $ref: "#/components/schemas/Duration"
          description: The number of minutes to wait before the status of a blue/green deployment is changed to Stopped if rerouting is not started manually. Applies only to the STOP_DEPLOYMENT option for actionOnTimeout.
    DeploymentReadyAction:
      type: string
      enum:
        - CONTINUE_DEPLOYMENT
        - STOP_DEPLOYMENT
    GreenFleetProvisioningOption:
      description: Information about the instances that belong to the replacement environment in a blue/green deployment.
      type: object
      properties:
        action:
          $ref: "#/components/schemas/GreenFleetProvisioningAction"
          description: "The method used to add instances to a replacement environment. DISCOVER_EXISTING: Use instances that already exist or will be created manually. COPY_AUTO_SCALING_GROUP: Use settings from a specified Auto Scaling group to define and create instances in a new Auto Scaling group."
    GreenFleetProvisioningAction:
      type: string
      enum:
        - DISCOVER_EXISTING
        - COPY_AUTO_SCALING_GROUP
    LoadBalancerInfo:
      description: Information about the Elastic Load Balancing load balancer or target group used in a deployment. You can use load balancers and target groups in combination. For example, if you have two Classic Load Balancers, and five target groups tied to an Application Load Balancer, you can specify the two Classic Load Balancers in elbInfoList, and the five target groups in targetGroupInfoList.
      type: object
      properties:
        elbInfoList:
          $ref: "#/components/schemas/ELBInfoList"
          description: An array that contains information about the load balancers to use for load balancing in a deployment. If you're using Classic Load Balancers, specify those load balancers in this array. You can add up to 10 load balancers to the array. If you're using Application Load Balancers or Network Load Balancers, use the targetGroupInfoList array instead of this one.
        targetGroupInfoList:
          $ref: "#/components/schemas/TargetGroupInfoList"
          description: An array that contains information about the target groups to use for load balancing in a deployment. If you're using Application Load Balancers and Network Load Balancers, specify their associated target groups in this array. You can add up to 10 target groups to the array. If you're using Classic Load Balancers, use the elbInfoList array instead of this one.
        targetGroupPairInfoList:
          $ref: "#/components/schemas/TargetGroupPairInfoList"
          description: The target group pair information. This is an array of TargeGroupPairInfo objects with a maximum size of one.
    ELBInfoList:
      type: array
      items:
        $ref: "#/components/schemas/ELBInfo"
    ELBInfo:
      description: Information about a Classic Load Balancer in Elastic Load Balancing to use in a deployment. Instances are registered directly with a load balancer, and traffic is routed to the load balancer.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ELBName"
          description: For blue/green deployments, the name of the Classic Load Balancer that is used to route traffic from original instances to replacement instances in a blue/green deployment. For in-place deployments, the name of the Classic Load Balancer that instances are deregistered from so they are not serving traffic during a deployment, and then re-registered with after the deployment is complete.
    ELBName:
      type: string
    TargetGroupInfoList:
      type: array
      items:
        $ref: "#/components/schemas/TargetGroupInfo"
    TargetGroupInfo:
      description: Information about a target group in Elastic Load Balancing to use in a deployment. Instances are registered as targets in a target group, and traffic is routed to the target group.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/TargetGroupName"
          description: For blue/green deployments, the name of the target group that instances in the original environment are deregistered from, and instances in the replacement environment are registered with. For in-place deployments, the name of the target group that instances are deregistered from, so they are not serving traffic during a deployment, and then re-registered with after the deployment is complete.
    TargetGroupName:
      type: string
    TargetGroupPairInfoList:
      type: array
      items:
        $ref: "#/components/schemas/TargetGroupPairInfo"
    TargetGroupPairInfo:
      description: Information about two target groups and how traffic is routed during an Amazon ECS deployment. An optional test traffic route can be specified.
      type: object
      properties:
        targetGroups:
          $ref: "#/components/schemas/TargetGroupInfoList"
          description: One pair of target groups. One is associated with the original task set. The second is associated with the task set that serves traffic after the deployment is complete.
        prodTrafficRoute:
          $ref: "#/components/schemas/TrafficRoute"
          description: The path used by a load balancer to route production traffic when an Amazon ECS deployment is complete.
        testTrafficRoute:
          $ref: "#/components/schemas/TrafficRoute"
          description: An optional path used by a load balancer to route test traffic after an Amazon ECS deployment. Validation can occur while test traffic is served during a deployment.
    TrafficRoute:
      description: Information about a listener. The listener contains the path used to route traffic that is received from the load balancer to a target group.
      type: object
      properties:
        listenerArns:
          $ref: "#/components/schemas/ListenerArnList"
          description: The Amazon Resource Name (ARN) of one listener. The listener identifies the route between a target group and a load balancer. This is an array of strings with a maximum size of one.
    ListenerArnList:
      type: array
      items:
        $ref: "#/components/schemas/ListenerArn"
    ListenerArn:
      type: string
    LastDeploymentInfo:
