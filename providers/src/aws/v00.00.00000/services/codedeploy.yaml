openapi: 3.0.0
info:
  version: "2014-10-06"
  title: AWS CodeDeploy
  description: AWS CodeDeploy
  x-serviceName: codedeploy
  x-serviceAlias: codedeploy
  x-protocol: json
  x-apiVersion: "2014-10-06"
  x-endpointPrefix: codedeploy
  x-targetPrefix: CodeDeploy_20141006
  x-jsonVersion: "1.1"
servers:
  - url: https://codedeploy.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for codedeploy
paths:
  /AddTagsToOnPremisesInstances:
    post:
      operationId: AddTagsToOnPremisesInstances
      description: Adds tags to on-premises instances.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.AddTagsToOnPremisesInstances
            default: CodeDeploy_20141006.AddTagsToOnPremisesInstances
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tag key-value pairs to add to the on-premises instances. Keys and values are both required. Keys cannot be null or empty strings. Value-only tags are not allowed.
                instanceNames:
                  $ref: "#/components/schemas/InstanceNameList"
                  description: The names of the on-premises instances to which to add tags.
              required:
                - tags
                - instanceNames
      responses:
        "200":
          description: Success
  /BatchGetApplicationRevisions:
    post:
      operationId: BatchGetApplicationRevisions
      description: Gets information about one or more application revisions. The maximum number of application revisions that can be returned is 25.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.BatchGetApplicationRevisions
            default: CodeDeploy_20141006.BatchGetApplicationRevisions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                applicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: The name of an CodeDeploy application about which to get revision information.
                revisions:
                  $ref: "#/components/schemas/RevisionLocationList"
                  description: An array of RevisionLocation objects that specify information to get about the application revisions, including type and location. The maximum number of RevisionLocation objects you can specify is 25.
              required:
                - applicationName
                - revisions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetApplicationRevisionsOutput"
  /BatchGetApplications:
    post:
      operationId: BatchGetApplications
      description: Gets information about one or more applications. The maximum number of applications that can be returned is 100.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.BatchGetApplications
            default: CodeDeploy_20141006.BatchGetApplications
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                applicationNames:
                  $ref: "#/components/schemas/ApplicationsList"
                  description: A list of application names separated by spaces. The maximum number of application names you can specify is 100.
              required:
                - applicationNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetApplicationsOutput"
  /BatchGetDeploymentGroups:
    post:
      operationId: BatchGetDeploymentGroups
      description: Gets information about one or more deployment groups.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.BatchGetDeploymentGroups
            default: CodeDeploy_20141006.BatchGetDeploymentGroups
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                applicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: The name of an CodeDeploy application associated with the applicable user or Amazon Web Services account.
                deploymentGroupNames:
                  $ref: "#/components/schemas/DeploymentGroupsList"
                  description: The names of the deployment groups.
              required:
                - applicationName
                - deploymentGroupNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetDeploymentGroupsOutput"
  /BatchGetDeploymentInstances:
    post:
      operationId: BatchGetDeploymentInstances
      description: This method works, but is deprecated. Use BatchGetDeploymentTargets instead. Returns an array of one or more instances associated with a deployment. This method works with EC2/On-premises and Lambda compute platforms. The newer BatchGetDeploymentTargets works with all compute platforms. The maximum number of instances that can be returned is 25.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.BatchGetDeploymentInstances
            default: CodeDeploy_20141006.BatchGetDeploymentInstances
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                deploymentId:
                  $ref: "#/components/schemas/DeploymentId"
                  description: The unique ID of a deployment.
                instanceIds:
                  $ref: "#/components/schemas/InstancesList"
                  description: The unique IDs of instances used in the deployment. The maximum number of instance IDs you can specify is 25.
              required:
                - deploymentId
                - instanceIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetDeploymentInstancesOutput"
  /BatchGetDeploymentTargets:
    post:
      operationId: BatchGetDeploymentTargets
      description: "Returns an array of one or more targets associated with a deployment. This method works with all compute types and should be used instead of the deprecated BatchGetDeploymentInstances. The maximum number of targets that can be returned is 25. The type of targets returned depends on the deployment's compute platform or deployment method: EC2/On-premises: Information about Amazon EC2 instance targets. Lambda: Information about Lambda functions targets. Amazon ECS: Information about Amazon ECS service targets. CloudFormation: Information about targets of blue/green deployments initiated by a CloudFormation stack update."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.BatchGetDeploymentTargets
            default: CodeDeploy_20141006.BatchGetDeploymentTargets
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                deploymentId:
                  $ref: "#/components/schemas/DeploymentId"
                  description: The unique ID of a deployment.
                targetIds:
                  $ref: "#/components/schemas/TargetIdList"
                  description: The unique IDs of the deployment targets. The compute platform of the deployment determines the type of the targets and their formats. The maximum number of deployment target IDs you can specify is 25. For deployments that use the EC2/On-premises compute platform, the target IDs are Amazon EC2 or on-premises instances IDs, and their target type is instanceTarget. For deployments that use the Lambda compute platform, the target IDs are the names of Lambda functions, and their target type is instanceTarget. For deployments that use the Amazon ECS compute platform, the target IDs are pairs of Amazon ECS clusters and services specified using the format `<clustername>`:`<servicename>`. Their target type is ecsTarget. For deployments that are deployed with CloudFormation, the target IDs are CloudFormation stack IDs. Their target type is cloudFormationTarget.
              required:
                - deploymentId
                - targetIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetDeploymentTargetsOutput"
  /BatchGetDeployments:
    post:
      operationId: BatchGetDeployments
      description: Gets information about one or more deployments. The maximum number of deployments that can be returned is 25.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.BatchGetDeployments
            default: CodeDeploy_20141006.BatchGetDeployments
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                deploymentIds:
                  $ref: "#/components/schemas/DeploymentsList"
                  description: A list of deployment IDs, separated by spaces. The maximum number of deployment IDs you can specify is 25.
              required:
                - deploymentIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetDeploymentsOutput"
  /BatchGetOnPremisesInstances:
    post:
      operationId: BatchGetOnPremisesInstances
      description: Gets information about one or more on-premises instances. The maximum number of on-premises instances that can be returned is 25.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.BatchGetOnPremisesInstances
            default: CodeDeploy_20141006.BatchGetOnPremisesInstances
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                instanceNames:
                  $ref: "#/components/schemas/InstanceNameList"
                  description: The names of the on-premises instances about which to get information. The maximum number of instance names you can specify is 25.
              required:
                - instanceNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetOnPremisesInstancesOutput"
  /ContinueDeployment:
    post:
      operationId: ContinueDeployment
      description: For a blue/green deployment, starts the process of rerouting traffic from instances in the original environment to instances in the replacement environment without waiting for a specified wait time to elapse. (Traffic rerouting, which is achieved by registering instances in the replacement environment with the load balancer, can start as soon as all instances have a status of Ready.)
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.ContinueDeployment
            default: CodeDeploy_20141006.ContinueDeployment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                deploymentId:
                  $ref: "#/components/schemas/DeploymentId"
                  description: The unique ID of a blue/green deployment for which you want to start rerouting traffic to the replacement environment.
                deploymentWaitType:
                  $ref: "#/components/schemas/DeploymentWaitType"
                  description: The status of the deployment's waiting period. READY_WAIT indicates that the deployment is ready to start shifting traffic. TERMINATION_WAIT indicates that the traffic is shifted, but the original target is not terminated.
      responses:
        "200":
          description: Success
  /CreateApplication:
    post:
      operationId: CreateApplication
      description: Creates an application.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.CreateApplication
            default: CodeDeploy_20141006.CreateApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                applicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: The name of the application. This name must be unique with the applicable user or Amazon Web Services account.
                computePlatform:
                  $ref: "#/components/schemas/ComputePlatform"
                  description: The destination platform type for the deployment (Lambda, Server, or ECS).
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The metadata that you apply to CodeDeploy applications to help you organize and categorize them. Each tag consists of a key and an optional value, both of which you define.
              required:
                - applicationName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApplicationOutput"
  /CreateDeployment:
    post:
      operationId: CreateDeployment
      description: Deploys an application revision through the specified deployment group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.CreateDeployment
            default: CodeDeploy_20141006.CreateDeployment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                applicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: The name of an CodeDeploy application associated with the user or Amazon Web Services account.
                deploymentGroupName:
                  $ref: "#/components/schemas/DeploymentGroupName"
                  description: The name of the deployment group.
                revision:
                  $ref: "#/components/schemas/RevisionLocation"
                  description: The type and location of the revision to deploy.
                deploymentConfigName:
                  $ref: "#/components/schemas/DeploymentConfigName"
                  description: The name of a deployment configuration associated with the user or Amazon Web Services account. If not specified, the value configured in the deployment group is used as the default. If the deployment group does not have a deployment configuration associated with it, CodeDeployDefault.OneAtATime is used by default.
                description:
                  $ref: "#/components/schemas/Description"
                  description: A comment about the deployment.
                ignoreApplicationStopFailures:
                  $ref: "#/components/schemas/Boolean"
                  description: If true, then if an ApplicationStop, BeforeBlockTraffic, or AfterBlockTraffic deployment lifecycle event to an instance fails, then the deployment continues to the next deployment lifecycle event. For example, if ApplicationStop fails, the deployment continues with DownloadBundle. If BeforeBlockTraffic fails, the deployment continues with BlockTraffic. If AfterBlockTraffic fails, the deployment continues with ApplicationStop. If false or not specified, then if a lifecycle event fails during a deployment to an instance, that deployment fails. If deployment to that instance is part of an overall deployment and the number of healthy hosts is not less than the minimum number of healthy hosts, then a deployment to the next instance is attempted. During a deployment, the CodeDeploy agent runs the scripts specified for ApplicationStop, BeforeBlockTraffic, and AfterBlockTraffic in the AppSpec file from the previous successful deployment. (All other scripts are run from the AppSpec file in the current deployment.) If one of these scripts contains an error and does not run successfully, the deployment can fail. If the cause of the failure is a script from the last successful deployment that will never run successfully, create a new deployment and use ignoreApplicationStopFailures to specify that the ApplicationStop, BeforeBlockTraffic, and AfterBlockTraffic failures should be ignored.
                targetInstances:
                  $ref: "#/components/schemas/TargetInstances"
                  description: Information about the instances that belong to the replacement environment in a blue/green deployment.
                autoRollbackConfiguration:
                  $ref: "#/components/schemas/AutoRollbackConfiguration"
                  description: Configuration information for an automatic rollback that is added when a deployment is created.
                updateOutdatedInstancesOnly:
                  $ref: "#/components/schemas/Boolean"
                  description: Indicates whether to deploy to all instances or only to instances that are not running the latest application revision.
                fileExistsBehavior:
                  $ref: "#/components/schemas/FileExistsBehavior"
                  description: "Information about how CodeDeploy handles files that already exist in a deployment target location but weren't part of the previous successful deployment. The fileExistsBehavior parameter takes any of the following values: DISALLOW: The deployment fails. This is also the default behavior if no option is specified. OVERWRITE: The version of the file from the application revision currently being deployed replaces the version already on the instance. RETAIN: The version of the file already on the instance is kept and used as part of the new deployment."
                overrideAlarmConfiguration:
                  $ref: "#/components/schemas/AlarmConfiguration"
                  description: Allows you to specify information about alarms associated with a deployment. The alarm configuration that you specify here will override the alarm configuration at the deployment group level. Consider overriding the alarm configuration if you have set up alarms at the deployment group level that are causing deployment failures. In this case, you would call CreateDeployment to create a new deployment that uses a previous application revision that is known to work, and set its alarm configuration to turn off alarm polling. Turning off alarm polling ensures that the new deployment proceeds without being blocked by the alarm that was generated by the previous, failed, deployment. If you specify an overrideAlarmConfiguration, you need the UpdateDeploymentGroup IAM permission when calling CreateDeployment.
              required:
                - applicationName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDeploymentOutput"
  /CreateDeploymentConfig:
    post:
      operationId: CreateDeploymentConfig
      description: Creates a deployment configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.CreateDeploymentConfig
            default: CodeDeploy_20141006.CreateDeploymentConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                deploymentConfigName:
                  $ref: "#/components/schemas/DeploymentConfigName"
                  description: The name of the deployment configuration to create.
                minimumHealthyHosts:
                  $ref: "#/components/schemas/MinimumHealthyHosts"
                  description: "The minimum number of healthy instances that should be available at any time during the deployment. There are two parameters expected in the input: type and value. The type parameter takes either of the following values: HOST_COUNT: The value parameter represents the minimum number of healthy instances as an absolute value. FLEET_PERCENT: The value parameter represents the minimum number of healthy instances as a percentage of the total number of instances in the deployment. If you specify FLEET_PERCENT, at the start of the deployment, CodeDeploy converts the percentage to the equivalent number of instances and rounds up fractional instances. The value parameter takes an integer. For example, to set a minimum of 95% healthy instance, specify a type of FLEET_PERCENT and a value of 95."
                trafficRoutingConfig:
                  $ref: "#/components/schemas/TrafficRoutingConfig"
                  description: The configuration that specifies how the deployment traffic is routed.
                computePlatform:
                  $ref: "#/components/schemas/ComputePlatform"
                  description: The destination platform type for the deployment (Lambda, Server, or ECS).
                zonalConfig:
                  $ref: "#/components/schemas/ZonalConfig"
                  description: Configure the ZonalConfig object if you want CodeDeploy to deploy your application to one Availability Zone at a time, within an Amazon Web Services Region. For more information about the zonal configuration feature, see zonal configuration in the CodeDeploy User Guide.
              required:
                - deploymentConfigName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDeploymentConfigOutput"
  /CreateDeploymentGroup:
    post:
      operationId: CreateDeploymentGroup
      description: Creates a deployment group to which application revisions are deployed.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.CreateDeploymentGroup
            default: CodeDeploy_20141006.CreateDeploymentGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                applicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: The name of an CodeDeploy application associated with the user or Amazon Web Services account.
                deploymentGroupName:
                  $ref: "#/components/schemas/DeploymentGroupName"
                  description: The name of a new deployment group for the specified application.
                deploymentConfigName:
                  $ref: "#/components/schemas/DeploymentConfigName"
                  description: If specified, the deployment configuration name can be either one of the predefined configurations provided with CodeDeploy or a custom deployment configuration that you create by calling the create deployment configuration operation. CodeDeployDefault.OneAtATime is the default deployment configuration. It is used if a configuration isn't specified for the deployment or deployment group. For more information about the predefined deployment configurations in CodeDeploy, see Working with Deployment Configurations in CodeDeploy in the CodeDeploy User Guide.
                ec2TagFilters:
                  $ref: "#/components/schemas/EC2TagFilterList"
                  description: The Amazon EC2 tags on which to filter. The deployment group includes Amazon EC2 instances with any of the specified tags. Cannot be used in the same call as ec2TagSet.
                onPremisesInstanceTagFilters:
                  $ref: "#/components/schemas/TagFilterList"
                  description: The on-premises instance tags on which to filter. The deployment group includes on-premises instances with any of the specified tags. Cannot be used in the same call as OnPremisesTagSet.
                autoScalingGroups:
                  $ref: "#/components/schemas/AutoScalingGroupNameList"
                  description: A list of associated Amazon EC2 Auto Scaling groups.
                serviceRoleArn:
                  $ref: "#/components/schemas/Role"
                  description: A service role Amazon Resource Name (ARN) that allows CodeDeploy to act on the user's behalf when interacting with Amazon Web Services services.
                triggerConfigurations:
                  $ref: "#/components/schemas/TriggerConfigList"
                  description: Information about triggers to create when the deployment group is created. For examples, see Create a Trigger for an CodeDeploy Event in the CodeDeploy User Guide.
                alarmConfiguration:
                  $ref: "#/components/schemas/AlarmConfiguration"
                  description: Information to add about Amazon CloudWatch alarms when the deployment group is created.
                autoRollbackConfiguration:
                  $ref: "#/components/schemas/AutoRollbackConfiguration"
                  description: Configuration information for an automatic rollback that is added when a deployment group is created.
                outdatedInstancesStrategy:
                  $ref: "#/components/schemas/OutdatedInstancesStrategy"
                  description: Indicates what happens when new Amazon EC2 instances are launched mid-deployment and do not receive the deployed application revision. If this option is set to UPDATE or is unspecified, CodeDeploy initiates one or more 'auto-update outdated instances' deployments to apply the deployed application revision to the new Amazon EC2 instances. If this option is set to IGNORE, CodeDeploy does not initiate a deployment to update the new Amazon EC2 instances. This may result in instances having different revisions.
                deploymentStyle:
                  $ref: "#/components/schemas/DeploymentStyle"
                  description: Information about the type of deployment, in-place or blue/green, that you want to run and whether to route deployment traffic behind a load balancer.
                blueGreenDeploymentConfiguration:
                  $ref: "#/components/schemas/BlueGreenDeploymentConfiguration"
                  description: Information about blue/green deployment options for a deployment group.
                loadBalancerInfo:
                  $ref: "#/components/schemas/LoadBalancerInfo"
                  description: Information about the load balancer used in a deployment.
                ec2TagSet:
                  $ref: "#/components/schemas/EC2TagSet"
                  description: Information about groups of tags applied to Amazon EC2 instances. The deployment group includes only Amazon EC2 instances identified by all the tag groups. Cannot be used in the same call as ec2TagFilters.
                ecsServices:
                  $ref: "#/components/schemas/ECSServiceList"
                  description: The target Amazon ECS services in the deployment group. This applies only to deployment groups that use the Amazon ECS compute platform. A target Amazon ECS service is specified as an Amazon ECS cluster and service name pair using the format `<clustername>`:`<servicename>`.
                onPremisesTagSet:
                  $ref: "#/components/schemas/OnPremisesTagSet"
                  description: Information about groups of tags applied to on-premises instances. The deployment group includes only on-premises instances identified by all of the tag groups. Cannot be used in the same call as onPremisesInstanceTagFilters.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The metadata that you apply to CodeDeploy deployment groups to help you organize and categorize them. Each tag consists of a key and an optional value, both of which you define.
                terminationHookEnabled:
                  $ref: "#/components/schemas/NullableBoolean"
                  description: This parameter only applies if you are using CodeDeploy with Amazon EC2 Auto Scaling. For more information, see Integrating CodeDeploy with Amazon EC2 Auto Scaling in the CodeDeploy User Guide. Set terminationHookEnabled to true to have CodeDeploy install a termination hook into your Auto Scaling group when you create a deployment group. When this hook is installed, CodeDeploy will perform termination deployments. For information about termination deployments, see Enabling termination deployments during Auto Scaling scale-in events in the CodeDeploy User Guide. For more information about Auto Scaling scale-in events, see the Scale in topic in the Amazon EC2 Auto Scaling User Guide.
              required:
                - applicationName
                - deploymentGroupName
                - serviceRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDeploymentGroupOutput"
  /DeleteApplication:
    post:
      operationId: DeleteApplication
      description: Deletes an application.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.DeleteApplication
            default: CodeDeploy_20141006.DeleteApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                applicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: The name of an CodeDeploy application associated with the user or Amazon Web Services account.
              required:
                - applicationName
      responses:
        "200":
          description: Success
  /DeleteDeploymentConfig:
    post:
      operationId: DeleteDeploymentConfig
      description: Deletes a deployment configuration. A deployment configuration cannot be deleted if it is currently in use. Predefined configurations cannot be deleted.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.DeleteDeploymentConfig
            default: CodeDeploy_20141006.DeleteDeploymentConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                deploymentConfigName:
                  $ref: "#/components/schemas/DeploymentConfigName"
                  description: The name of a deployment configuration associated with the user or Amazon Web Services account.
              required:
                - deploymentConfigName
      responses:
        "200":
          description: Success
  /DeleteDeploymentGroup:
    post:
      operationId: DeleteDeploymentGroup
      description: Deletes a deployment group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeDeploy_20141006.DeleteDeploymentGroup
            default: CodeDeploy_20141006.DeleteDeploymentGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                applicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: The name of an CodeDeploy application associated with the user or Amazon Web Services account.
                deploymentGroupName:
                  $ref: "#/components/schemas/DeploymentGroupName"
                  description: The name of a deployment group for the specified application.
              required:
                - applicationName
                - deploymentGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDeploymentGroupOutput"
  /DeleteGitHubAccountToken:
    post:
      operationId: DeleteGitHubAccountToken
