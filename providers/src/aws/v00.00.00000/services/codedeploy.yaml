        - Pending
        - InProgress
        - Succeeded
        - Failed
        - Skipped
        - Unknown
        - Ready
    Time:
      type: string
      format: date-time
    TargetLabel:
      type: string
      enum:
        - Blue
        - Green
    LambdaTarget:
