        Key:
          $ref: "#/components/schemas/Key"
          description: The tag filter key.
        Value:
          $ref: "#/components/schemas/Value"
          description: The tag filter value.
        Type:
          $ref: "#/components/schemas/EC2TagFilterType"
          description: "The tag filter type: KEY_ONLY: Key only. VALUE_ONLY: Value only. KEY_AND_VALUE: Key and value."
    EC2TagFilterType:
      type: string
      enum:
        - KEY_ONLY
        - VALUE_ONLY
        - KEY_AND_VALUE
    TagFilterList:
      type: array
      items:
        $ref: "#/components/schemas/TagFilter"
    TagFilter:
