          description: Information about errors that might have occurred during the API call.
    InstanceSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/InstanceSummary"
    InstanceSummary:
      description: Information about an instance in a deployment.
      type: object
      properties:
        deploymentId:
          $ref: "#/components/schemas/DeploymentId"
          description: The unique ID of a deployment.
        instanceId:
          $ref: "#/components/schemas/InstanceId"
          description: The instance ID.
        status:
          $ref: "#/components/schemas/InstanceStatus"
          description: "The deployment status for this instance: Pending: The deployment is pending for this instance. In Progress: The deployment is in progress for this instance. Succeeded: The deployment has succeeded for this instance. Failed: The deployment has failed for this instance. Skipped: The deployment has been skipped for this instance. Unknown: The deployment status is unknown for this instance."
        lastUpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that indicates when the instance information was last updated.
        lifecycleEvents:
          $ref: "#/components/schemas/LifecycleEventList"
          description: A list of lifecycle events for this instance.
        instanceType:
          $ref: "#/components/schemas/InstanceType"
          description: "Information about which environment an instance belongs to in a blue/green deployment. BLUE: The instance is part of the original environment. GREEN: The instance is part of the replacement environment."
    InstanceStatus:
      type: string
      enum:
        - Pending
        - InProgress
        - Succeeded
        - Failed
        - Skipped
        - Unknown
        - Ready
    LifecycleEventList:
      type: array
      items:
        $ref: "#/components/schemas/LifecycleEvent"
    LifecycleEvent:
      description: Information about a deployment lifecycle event.
      type: object
      properties:
        lifecycleEventName:
          $ref: "#/components/schemas/LifecycleEventName"
          description: The deployment lifecycle event name, such as ApplicationStop, BeforeInstall, AfterInstall, ApplicationStart, or ValidateService.
        diagnostics:
          $ref: "#/components/schemas/Diagnostics"
          description: Diagnostic information about the deployment lifecycle event.
        startTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that indicates when the deployment lifecycle event started.
        endTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that indicates when the deployment lifecycle event ended.
        status:
          $ref: "#/components/schemas/LifecycleEventStatus"
          description: "The deployment lifecycle event status: Pending: The deployment lifecycle event is pending. InProgress: The deployment lifecycle event is in progress. Succeeded: The deployment lifecycle event ran successfully. Failed: The deployment lifecycle event has failed. Skipped: The deployment lifecycle event has been skipped. Unknown: The deployment lifecycle event is unknown."
    LifecycleEventName:
      type: string
