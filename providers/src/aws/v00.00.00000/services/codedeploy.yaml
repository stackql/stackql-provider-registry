        scriptName:
          $ref: "#/components/schemas/ScriptName"
          description: The name of the script.
        message:
          $ref: "#/components/schemas/LifecycleMessage"
          description: The message associated with the error.
        logTail:
          $ref: "#/components/schemas/LogTail"
          description: The last portion of the diagnostic log. If available, CodeDeploy returns up to the last 4 KB of the diagnostic log.
    LifecycleErrorCode:
      type: string
      enum:
        - Success
        - ScriptMissing
        - ScriptNotExecutable
        - ScriptTimedOut
        - ScriptFailed
        - UnknownError
    ScriptName:
      type: string
    LifecycleMessage:
      type: string
    LogTail:
      type: string
    LifecycleEventStatus:
      type: string
      enum:
        - Pending
        - InProgress
        - Succeeded
        - Failed
        - Skipped
        - Unknown
    InstanceType:
      type: string
      enum:
        - Blue
        - Green
    TargetIdList:
