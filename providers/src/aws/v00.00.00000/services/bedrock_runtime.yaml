        - enabled
        - disabled
        - enabled_full
    PromptVariableMap:
      type: object
      properties: {}
    ConverseRequestAdditionalModelResponseFieldPathsList:
      type: array
      items:
        $ref: "#/components/schemas/ConverseRequestAdditionalModelResponseFieldPathsListMemberString"
    ConverseRequestAdditionalModelResponseFieldPathsListMemberString:
      type: string
      minLength: 1
      maxLength: 256
    RequestMetadata:
      type: object
      properties: {}
    PerformanceConfiguration:
