      type: object
      properties:
        message:
          $ref: "#/components/schemas/NonBlankString"
    ThrottlingException:
      description: Your request was denied due to exceeding the account quotas for Amazon Bedrock. For troubleshooting this error, see ThrottlingException in the Amazon Bedrock User Guide
      type: object
      properties:
        message:
          $ref: "#/components/schemas/NonBlankString"
    ServiceUnavailableException:
      description: The service isn't currently available. For troubleshooting this error, see ServiceUnavailable in the Amazon Bedrock User Guide
      type: object
      properties:
        message:
          $ref: "#/components/schemas/NonBlankString"
    FoundationModelVersionIdentifier:
      description: ARN or ID of a Bedrock model
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z_\\.\\-/0-9:]+"
    CountTokensInput:
      description: The input value for token counting. The value should be either an InvokeModel or Converse request body.
      type: object
      properties:
        invokeModel:
          $ref: "#/components/schemas/InvokeModelTokensRequest"
          description: An InvokeModel request for which to count tokens. Use this field when you want to count tokens for a raw text input that would be sent to the InvokeModel operation.
        converse:
          $ref: "#/components/schemas/ConverseTokensRequest"
          description: A Converse request for which to count tokens. Use this field when you want to count tokens for a conversation-based input that would be sent to the Converse operation.
    InvokeModelTokensRequest:
      description: The body of an InvokeModel API request for token counting. This structure mirrors the input format for the InvokeModel operation, allowing you to count tokens for raw text inference requests.
      type: object
      properties:
        body:
          $ref: "#/components/schemas/Body"
          description: The request body to count tokens for, formatted according to the model's expected input format. To learn about the input format for different models, see Model inference parameters and responses.
      required:
        - body
    Body:
      type: string
      format: byte
      minLength: 0
      maxLength: 25000000
    ConverseTokensRequest:
      description: The inputs from a Converse API request for token counting. This structure mirrors the input format for the Converse operation, allowing you to count tokens for conversation-based inference requests.
      type: object
      properties:
        messages:
          $ref: "#/components/schemas/Messages"
          description: An array of messages to count tokens for.
        system:
          $ref: "#/components/schemas/SystemContentBlocks"
          description: The system content blocks to count tokens for. System content provides instructions or context to the model about how it should behave or respond. The token count will include any system content provided.
        toolConfig:
          $ref: "#/components/schemas/ToolConfiguration"
          description: The toolConfig of Converse input request to count tokens for. Configuration information for the tools that the model can use when generating a response.
        additionalModelRequestFields:
          $ref: "#/components/schemas/Document"
          description: The additionalModelRequestFields of Converse input request to count tokens for. Use this field when you want to pass additional parameters that the model supports.
    CountTokensResponse:
      type: object
      properties:
        inputTokens:
          $ref: "#/components/schemas/Integer"
          description: The number of tokens in the provided input according to the specified model's tokenization rules. This count represents the number of input tokens that would be processed if the same input were sent to the model in an inference request. Use this value to estimate costs and ensure your inputs stay within model token limits.
      required:
        - inputTokens
    Integer:
      type: integer
    InvocationArn:
      type: string
