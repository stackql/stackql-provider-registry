    TokenUsageOutputTokensInteger:
      type: integer
      minimum: 0
    TokenUsageTotalTokensInteger:
      type: integer
      minimum: 0
    TokenUsageCacheReadInputTokensInteger:
      type: integer
      minimum: 0
    TokenUsageCacheWriteInputTokensInteger:
      type: integer
      minimum: 0
    CacheDetailsList:
