    GuardrailAutomatedReasoningPolicyAssessment:
      description: Contains the results of automated reasoning policy evaluation, including logical findings about the validity of claims made in the input content.
      type: object
      properties:
        findings:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningFindingList"
          description: List of logical validation results produced by evaluating the input content against automated reasoning policies.
    GuardrailAutomatedReasoningFindingList:
      type: array
      items:
        $ref: "#/components/schemas/GuardrailAutomatedReasoningFinding"
    GuardrailAutomatedReasoningFinding:
      description: Represents a logical validation result from automated reasoning policy evaluation. The finding indicates whether claims in the input are logically valid, invalid, satisfiable, impossible, or have other logical issues.
      type: object
      properties:
        valid:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningValidFinding"
          description: Contains the result when the automated reasoning evaluation determines that the claims in the input are logically valid and definitively true based on the provided premises and policy rules.
        invalid:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningInvalidFinding"
          description: Contains the result when the automated reasoning evaluation determines that the claims in the input are logically invalid and contradict the established premises or policy rules.
        satisfiable:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningSatisfiableFinding"
          description: Contains the result when the automated reasoning evaluation determines that the claims in the input could be either true or false depending on additional assumptions not provided in the input context.
        impossible:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningImpossibleFinding"
          description: Contains the result when the automated reasoning evaluation determines that no valid logical conclusions can be drawn due to contradictions in the premises or policy rules themselves.
        translationAmbiguous:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningTranslationAmbiguousFinding"
          description: Contains the result when the automated reasoning evaluation detects that the input has multiple valid logical interpretations, requiring additional context or clarification to proceed with validation.
        tooComplex:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningTooComplexFinding"
          description: Contains the result when the automated reasoning evaluation cannot process the input due to its complexity or volume exceeding the system's processing capacity for logical analysis.
        noTranslations:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningNoTranslationsFinding"
          description: Contains the result when the automated reasoning evaluation cannot extract any relevant logical information from the input that can be validated against the policy rules.
    GuardrailAutomatedReasoningValidFinding:
      description: Indicates that the claims are definitively true and logically implied by the premises, with no possible alternative interpretations.
      type: object
      properties:
        translation:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningTranslation"
          description: The logical translation of the input that this finding validates.
        claimsTrueScenario:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningScenario"
          description: An example scenario demonstrating how the claims are logically true.
        supportingRules:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningRuleList"
          description: The automated reasoning policy rules that support why this result is considered valid.
        logicWarning:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningLogicWarning"
          description: Indication of a logic issue with the translation without needing to consider the automated reasoning policy rules.
    GuardrailAutomatedReasoningTranslation:
      description: Contains the logical translation of natural language input into formal logical statements, including premises, claims, and confidence scores.
      type: object
      properties:
        premises:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningStatementList"
          description: The logical statements that serve as the foundation or assumptions for the claims.
        claims:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningStatementList"
          description: The logical statements that are being validated against the premises and policy rules.
        untranslatedPremises:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningInputTextReferenceList"
          description: References to portions of the original input text that correspond to the premises but could not be fully translated.
        untranslatedClaims:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningInputTextReferenceList"
          description: References to portions of the original input text that correspond to the claims but could not be fully translated.
        confidence:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningTranslationConfidence"
          description: A confidence score between 0 and 1 indicating how certain the system is about the logical translation.
    GuardrailAutomatedReasoningStatementList:
      type: array
      items:
        $ref: "#/components/schemas/GuardrailAutomatedReasoningStatement"
    GuardrailAutomatedReasoningStatement:
      description: A logical statement that includes both formal logic representation and natural language explanation.
      type: object
      properties:
        logic:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningStatementLogicContent"
          description: The formal logical representation of the statement.
        naturalLanguage:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningStatementNaturalLanguageContent"
          description: The natural language explanation of the logical statement.
    GuardrailAutomatedReasoningStatementLogicContent:
      type: string
      minLength: 0
      maxLength: 1000
    GuardrailAutomatedReasoningStatementNaturalLanguageContent:
      type: string
      minLength: 0
      maxLength: 1000
    GuardrailAutomatedReasoningInputTextReferenceList:
      type: array
      items:
        $ref: "#/components/schemas/GuardrailAutomatedReasoningInputTextReference"
    GuardrailAutomatedReasoningInputTextReference:
      description: References a portion of the original input text that corresponds to logical elements.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningStatementNaturalLanguageContent"
          description: The specific text from the original input that this reference points to.
    GuardrailAutomatedReasoningTranslationConfidence:
      type: number
      format: double
      minimum: 0
      maximum: 1
    GuardrailAutomatedReasoningScenario:
      description: Represents a logical scenario where claims can be evaluated as true or false, containing specific logical assignments.
      type: object
      properties:
        statements:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningStatementList"
          description: List of logical assignments and statements that define this scenario.
    GuardrailAutomatedReasoningRuleList:
      type: array
      items:
        $ref: "#/components/schemas/GuardrailAutomatedReasoningRule"
    GuardrailAutomatedReasoningRule:
      description: References a specific automated reasoning policy rule that was applied during evaluation.
      type: object
      properties:
        identifier:
          $ref: "#/components/schemas/AutomatedReasoningRuleIdentifier"
          description: The unique identifier of the automated reasoning rule.
        policyVersionArn:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningPolicyVersionArn"
          description: The ARN of the automated reasoning policy version that contains this rule.
    AutomatedReasoningRuleIdentifier:
      type: string
      minLength: 0
      maxLength: 12
      pattern: "[a-z0-9]{12}"
    GuardrailAutomatedReasoningPolicyVersionArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:automated-reasoning-policy/[a-z0-9]{12}(:([1-9][0-9]{0,11}))?
    GuardrailAutomatedReasoningLogicWarning:
      description: Identifies logical issues in the translated statements that exist independent of any policy rules, such as statements that are always true or always false.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningLogicWarningType"
          description: The category of the detected logical issue, such as statements that are always true or always false.
        premises:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningStatementList"
          description: The logical statements that serve as premises under which the claims are validated.
        claims:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningStatementList"
          description: The logical statements that are validated while assuming the policy and premises.
    GuardrailAutomatedReasoningLogicWarningType:
      type: string
      enum:
        - ALWAYS_FALSE
        - ALWAYS_TRUE
    GuardrailAutomatedReasoningInvalidFinding:
      description: Indicates that the claims are logically false and contradictory to the established rules or premises.
      type: object
      properties:
        translation:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningTranslation"
          description: The logical translation of the input that this finding invalidates.
        contradictingRules:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningRuleList"
          description: The automated reasoning policy rules that contradict the claims in the input.
        logicWarning:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningLogicWarning"
          description: Indication of a logic issue with the translation without needing to consider the automated reasoning policy rules.
    GuardrailAutomatedReasoningSatisfiableFinding:
      description: Indicates that the claims could be either true or false depending on additional assumptions not provided in the input.
      type: object
      properties:
        translation:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningTranslation"
          description: The logical translation of the input that this finding evaluates.
        claimsTrueScenario:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningScenario"
          description: An example scenario demonstrating how the claims could be logically true.
        claimsFalseScenario:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningScenario"
          description: An example scenario demonstrating how the claims could be logically false.
        logicWarning:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningLogicWarning"
          description: Indication of a logic issue with the translation without needing to consider the automated reasoning policy rules.
    GuardrailAutomatedReasoningImpossibleFinding:
      description: Indicates that no valid claims can be made due to logical contradictions in the premises or rules.
      type: object
      properties:
        translation:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningTranslation"
          description: The logical translation of the input that this finding evaluates.
        contradictingRules:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningRuleList"
          description: The automated reasoning policy rules that contradict the claims and/or premises in the input.
        logicWarning:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningLogicWarning"
          description: Indication of a logic issue with the translation without needing to consider the automated reasoning policy rules.
    GuardrailAutomatedReasoningTranslationAmbiguousFinding:
      description: Indicates that the input has multiple valid logical interpretations, requiring additional context or clarification.
      type: object
      properties:
        options:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningTranslationOptionList"
          description: Different logical interpretations that were detected during translation of the input.
        differenceScenarios:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningDifferenceScenarioList"
          description: Scenarios showing how the different translation options differ in meaning.
    GuardrailAutomatedReasoningTranslationOptionList:
      type: array
      items:
        $ref: "#/components/schemas/GuardrailAutomatedReasoningTranslationOption"
    GuardrailAutomatedReasoningTranslationOption:
      description: Represents one possible logical interpretation of ambiguous input content.
      type: object
      properties:
        translations:
          $ref: "#/components/schemas/GuardrailAutomatedReasoningTranslationList"
          description: Example translations that provide this possible interpretation of the input.
    GuardrailAutomatedReasoningTranslationList:
      type: array
      items:
        $ref: "#/components/schemas/GuardrailAutomatedReasoningTranslation"
    GuardrailAutomatedReasoningDifferenceScenarioList:
      type: array
      items:
        $ref: "#/components/schemas/GuardrailAutomatedReasoningScenario"
    GuardrailAutomatedReasoningTooComplexFinding:
      description: Indicates that the input exceeds the processing capacity due to the volume or complexity of the logical information.
      type: object
    GuardrailAutomatedReasoningNoTranslationsFinding:
      description: Indicates that no relevant logical information could be extracted from the input for validation.
      type: object
    GuardrailInvocationMetrics:
      description: The invocation metrics for the guardrail.
      type: object
      properties:
        guardrailProcessingLatency:
          $ref: "#/components/schemas/GuardrailProcessingLatency"
          description: The processing latency details for the guardrail invocation metrics.
        usage:
          $ref: "#/components/schemas/GuardrailUsage"
          description: The usage details for the guardrail invocation metrics.
        guardrailCoverage:
          $ref: "#/components/schemas/GuardrailCoverage"
          description: The coverage details for the guardrail invocation metrics.
    GuardrailProcessingLatency:
      type: integer
      format: int64
    GuardrailCoverage:
      description: The action of the guardrail coverage details.
      type: object
      properties:
        textCharacters:
          $ref: "#/components/schemas/GuardrailTextCharactersCoverage"
          description: The text characters of the guardrail coverage details.
        images:
          $ref: "#/components/schemas/GuardrailImageCoverage"
          description: The guardrail coverage for images (the number of images that guardrails guarded).
    GuardrailTextCharactersCoverage:
      description: The guardrail coverage for the text characters.
      type: object
      properties:
        guarded:
          $ref: "#/components/schemas/TextCharactersGuarded"
          description: The text characters that were guarded by the guardrail coverage.
        total:
          $ref: "#/components/schemas/TextCharactersTotal"
          description: The total text characters by the guardrail coverage.
    TextCharactersGuarded:
      type: integer
    TextCharactersTotal:
      type: integer
    GuardrailImageCoverage:
      description: The details of the guardrail image coverage.
      type: object
      properties:
        guarded:
          $ref: "#/components/schemas/ImagesGuarded"
          description: The count (integer) of images guardrails guarded.
        total:
          $ref: "#/components/schemas/ImagesTotal"
          description: Represents the total number of images (integer) that were in the request (guarded and unguarded).
    ImagesGuarded:
      type: integer
    ImagesTotal:
      type: integer
    AppliedGuardrailDetails:
      description: Details about the specific guardrail that was applied during this assessment, including its identifier, version, ARN, origin, and ownership information.
      type: object
      properties:
        guardrailId:
          $ref: "#/components/schemas/GuardrailId"
          description: The unique ID of the guardrail that was applied.
        guardrailVersion:
          $ref: "#/components/schemas/GuardrailVersion"
          description: The version of the guardrail that was applied.
        guardrailArn:
          $ref: "#/components/schemas/GuardrailArn"
          description: The ARN of the guardrail that was applied.
        guardrailOrigin:
          $ref: "#/components/schemas/GuardrailOriginList"
          description: The origin of how the guardrail was applied. This can be either requested at the API level or enforced at the account or organization level as a default guardrail.
        guardrailOwnership:
          $ref: "#/components/schemas/GuardrailOwnership"
          description: The ownership type of the guardrail, indicating whether it is owned by the requesting account or is a cross-account guardrail shared from another AWS account.
    GuardrailId:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: ([a-z0-9]+)
    GuardrailArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: (arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:guardrail/[a-z0-9]+)
    GuardrailOriginList:
      type: array
      items:
        $ref: "#/components/schemas/GuardrailOrigin"
    GuardrailOrigin:
      type: string
      enum:
        - REQUEST
        - ACCOUNT_ENFORCED
        - ORGANIZATION_ENFORCED
    GuardrailOwnership:
      type: string
      enum:
        - SELF
        - CROSS_ACCOUNT
    ConversationalModelId:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: (arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:(([0-9]{12}:custom-model/[a-z0-9-]{1,63}[.]{1}[a-z0-9-]{1,63}/[a-z0-9]{12})|(:foundation-model/[a-z0-9-]{1,63}[.]{1}[a-z0-9-]{1,63}([.:]?[a-z0-9-]{1,63}))|([0-9]{12}:imported-model/[a-z0-9]{12})|([0-9]{12}:provisioned-model/[a-z0-9]{12})|([0-9]{12}:custom-model-deployment/[a-z0-9]{12})|([0-9]{12}:(inference-profile|application-inference-profile)/[a-zA-Z0-9-:.]+)))|([a-z0-9-]{1,63}[.]{1}[a-z0-9-]{1,63}([.:]?[a-z0-9-]{1,63}))|(([0-9a-zA-Z][_-]?)+)|([a-zA-Z0-9-:.]+)|(^(arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:prompt/[0-9a-zA-Z]{10}(?::[0-9]{1,5})?))$|(^arn:aws:sagemaker:[a-z0-9-]+:[0-9]{12}:endpoint/[a-zA-Z0-9-]+$)|(^arn:aws(-[^:]+)?:bedrock:([0-9a-z-]{1,20}):([0-9]{12}):(default-)?prompt-router/[a-zA-Z0-9-:.]+$)
    Messages:
      type: array
      items:
        $ref: "#/components/schemas/Message"
    Message:
      description: A message input, or returned from, a call to Converse or ConverseStream.
      type: object
      properties:
        role:
          $ref: "#/components/schemas/ConversationRole"
          description: The role that the message plays in the message.
        content:
          $ref: "#/components/schemas/ContentBlocks"
          description: "The message content. Note the following restrictions: You can include up to 20 images. Each image's size, height, and width must be no more than 3.75 MB, 8000 px, and 8000 px, respectively. You can include up to five documents. Each document's size must be no more than 4.5 MB. If you include a ContentBlock with a document field in the array, you must also include a ContentBlock with a text field. You can only include images and documents if the role is user."
      required:
        - role
        - content
    ConversationRole:
      type: string
      enum:
        - user
        - assistant
    ContentBlocks:
      type: array
      items:
        $ref: "#/components/schemas/ContentBlock"
    ContentBlock:
      description: A block of content for a message that you pass to, or receive from, a model with the Converse or ConverseStream API operations.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/String"
          description: Text to include in the message.
        image:
          $ref: "#/components/schemas/ImageBlock"
          description: Image to include in the message. This field is only supported by Anthropic Claude 3 models.
        document:
          $ref: "#/components/schemas/DocumentBlock"
          description: A document to include in the message.
        video:
          $ref: "#/components/schemas/VideoBlock"
          description: Video to include in the message.
        audio:
          $ref: "#/components/schemas/AudioBlock"
          description: An audio content block containing audio data in the conversation.
        toolUse:
          $ref: "#/components/schemas/ToolUseBlock"
          description: Information about a tool use request from a model.
        toolResult:
          $ref: "#/components/schemas/ToolResultBlock"
          description: The result for a tool request that a model makes.
        guardContent:
          $ref: "#/components/schemas/GuardrailConverseContentBlock"
          description: Contains the content to assess with the guardrail. If you don't specify guardContent in a call to the Converse API, the guardrail (if passed in the Converse API) assesses the entire message. For more information, see Use a guardrail with the Converse API in the Amazon Bedrock User Guide.
        cachePoint:
          $ref: "#/components/schemas/CachePointBlock"
          description: CachePoint to include in the message.
        reasoningContent:
          $ref: "#/components/schemas/ReasoningContentBlock"
          description: Contains content regarding the reasoning that is carried out by the model. Reasoning refers to a Chain of Thought (CoT) that the model generates to enhance the accuracy of its final response.
        citationsContent:
          $ref: "#/components/schemas/CitationsContentBlock"
          description: A content block that contains both generated text and associated citation information, providing traceability between the response and source documents.
        searchResult:
          $ref: "#/components/schemas/SearchResultBlock"
          description: Search result to include in the message.
    ImageBlock:
      description: Image content for a message.
      type: object
      properties:
        format_:
          $ref: "#/components/schemas/ImageFormat"
          description: The format of the image.
        source:
          $ref: "#/components/schemas/ImageSource"
          description: The source for the image.
        error:
          $ref: "#/components/schemas/ErrorBlock"
          description: Error information if the image block could not be processed or contains invalid data.
      required:
        - format_
        - source
    ImageFormat:
      type: string
      enum:
        - png
        - jpeg
        - gif
        - webp
    ImageSource:
      description: The source for an image.
      type: object
      properties:
        bytes:
          $ref: "#/components/schemas/ImageSourceBytesBlob"
          description: The raw image bytes for the image. If you use an AWS SDK, you don't need to encode the image bytes in base64.
        s3Location:
          $ref: "#/components/schemas/S3Location"
          description: The location of an image object in an Amazon S3 bucket. To see which models support S3 uploads, see Supported models and features for Converse.
    ImageSourceBytesBlob:
      type: string
      format: byte
      minLength: 1
    S3Location:
      description: A storage location in an Amazon S3 bucket.
      type: object
      properties:
        uri:
          $ref: "#/components/schemas/S3Uri"
          description: An object URI starting with s3://.
        bucketOwner:
          $ref: "#/components/schemas/AccountId"
          description: If the bucket belongs to another AWS account, specify that account's ID.
      required:
        - uri
    S3Uri:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: s3://[a-z0-9][\.\-a-z0-9]{1,61}[a-z0-9](/.*)?
    AccountId:
      type: string
      pattern: "[0-9]{12}"
    ErrorBlock:
      description: A block containing error information when content processing fails.
      type: object
      properties:
        message:
          $ref: "#/components/schemas/String"
          description: A human-readable error message describing what went wrong during content processing.
    DocumentBlock:
      description: A document to include in a message.
      type: object
      properties:
        format_:
          $ref: "#/components/schemas/DocumentFormat"
          description: The format of a document, or its extension.
        name:
          $ref: "#/components/schemas/DocumentBlockNameString"
          description: "A name for the document. The name can only contain the following characters: Alphanumeric characters Whitespace characters (no more than one in a row) Hyphens Parentheses Square brackets This field is vulnerable to prompt injections, because the model might inadvertently interpret it as instructions. Therefore, we recommend that you specify a neutral name."
        source:
          $ref: "#/components/schemas/DocumentSource"
          description: Contains the content of the document.
        context:
          $ref: "#/components/schemas/String"
          description: Contextual information about how the document should be processed or interpreted by the model when generating citations.
        citations:
          $ref: "#/components/schemas/CitationsConfig"
          description: Configuration settings that control how citations should be generated for this specific document.
      required:
        - name
        - source
    DocumentFormat:
      type: string
      enum:
        - pdf
        - csv
        - doc
        - docx
        - xls
        - xlsx
        - html
        - txt
        - md
    DocumentBlockNameString:
      type: string
      minLength: 1
      maxLength: 200
    DocumentSource:
      description: Contains the content of a document.
      type: object
      properties:
        bytes:
          $ref: "#/components/schemas/DocumentSourceBytesBlob"
          description: The raw bytes for the document. If you use an Amazon Web Services SDK, you don't need to encode the bytes in base64.
        s3Location:
          $ref: "#/components/schemas/S3Location"
          description: The location of a document object in an Amazon S3 bucket. To see which models support S3 uploads, see Supported models and features for Converse.
        text:
          $ref: "#/components/schemas/String"
          description: The text content of the document source.
        content:
          $ref: "#/components/schemas/DocumentContentBlocks"
          description: The structured content of the document source, which may include various content blocks such as text, images, or other document elements.
    DocumentSourceBytesBlob:
      type: string
      format: byte
      minLength: 1
    DocumentContentBlocks:
      type: array
      items:
        $ref: "#/components/schemas/DocumentContentBlock"
    DocumentContentBlock:
      description: Contains the actual content of a document that can be processed by the model and potentially cited in the response.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/String"
          description: The text content of the document.
    CitationsConfig:
      description: Configuration settings for enabling and controlling document citations in Converse API responses. When enabled, the model can include citation information that links generated content back to specific source documents.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether citations from the selected document should be used in the model's response. When set to true, the model can generate citations that reference the source documents used to inform the response.
      required:
        - enabled
    VideoBlock:
      description: A video block.
      type: object
      properties:
        format_:
          $ref: "#/components/schemas/VideoFormat"
          description: The block's format.
        source:
          $ref: "#/components/schemas/VideoSource"
          description: The block's source.
      required:
        - format_
        - source
    VideoFormat:
      type: string
      enum:
        - mkv
        - mov
        - mp4
        - webm
        - flv
        - mpeg
        - mpg
        - wmv
        - three_gp
    VideoSource:
      description: A video source. You can upload a smaller video as a base64-encoded string as long as the encoded file is less than 25MB. You can also transfer videos up to 1GB in size from an S3 bucket.
      type: object
      properties:
        bytes:
          $ref: "#/components/schemas/VideoSourceBytesBlob"
          description: Video content encoded in base64.
        s3Location:
          $ref: "#/components/schemas/S3Location"
          description: The location of a video object in an Amazon S3 bucket. To see which models support S3 uploads, see Supported models and features for Converse.
    VideoSourceBytesBlob:
      type: string
      format: byte
      minLength: 1
    AudioBlock:
      description: An audio content block that contains audio data in various supported formats.
      type: object
      properties:
        format_:
          $ref: "#/components/schemas/AudioFormat"
          description: The format of the audio data, such as MP3, WAV, FLAC, or other supported audio formats.
        source:
          $ref: "#/components/schemas/AudioSource"
          description: The source of the audio data, which can be provided as raw bytes or an S3 location.
        error:
          $ref: "#/components/schemas/ErrorBlock"
          description: Error information if the audio block could not be processed or contains invalid data.
      required:
        - format_
        - source
    AudioFormat:
      type: string
      enum:
        - mp3
        - opus
        - wav
        - aac
        - flac
        - mp4
        - ogg
        - mkv
        - mka
        - x-aac
        - m4a
        - mpeg
        - mpga
        - pcm
        - webm
    AudioSource:
      description: The source of audio data, which can be provided either as raw bytes or a reference to an S3 location.
      type: object
      properties:
        bytes:
          $ref: "#/components/schemas/AudioSourceBytesBlob"
          description: Audio data encoded in base64.
        s3Location:
          $ref: "#/components/schemas/S3Location"
          description: A reference to audio data stored in an Amazon S3 bucket. To see which models support S3 uploads, see Supported models and features for Converse.
    AudioSourceBytesBlob:
      type: string
      format: byte
      minLength: 1
    ToolUseBlock:
      description: A tool use content block. Contains information about a tool that the model is requesting be run., The model uses the result from the tool to generate a response. For more information, see Call a tool with the Converse API in the Amazon Bedrock User Guide.
      type: object
      properties:
        toolUseId:
          $ref: "#/components/schemas/ToolUseId"
          description: The ID for the tool request.
        name:
          $ref: "#/components/schemas/ToolName"
          description: The name of the tool that the model wants to use.
        input:
          $ref: "#/components/schemas/Document"
          description: The input to pass to the tool.
        type_:
          $ref: "#/components/schemas/ToolUseType"
          description: The type for the tool request.
      required:
        - toolUseId
        - name
        - input
    ToolUseId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9_.:-]+"
    ToolName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9_-]+"
    Document:
      type: object
    ToolUseType:
      type: string
      enum:
        - server_tool_use
    ToolResultBlock:
      description: A tool result block that contains the results for a tool request that the model previously made. For more information, see Call a tool with the Converse API in the Amazon Bedrock User Guide.
      type: object
      properties:
        toolUseId:
          $ref: "#/components/schemas/ToolUseId"
          description: The ID of the tool request that this is the result for.
        content:
          $ref: "#/components/schemas/ToolResultContentBlocks"
          description: The content for tool result content block.
        status:
          $ref: "#/components/schemas/ToolResultStatus"
          description: The status for the tool result content block. This field is only supported by Amazon Nova and Anthropic Claude 3 and 4 models.
        type_:
          $ref: "#/components/schemas/String"
          description: The type for the tool result content block.
      required:
        - toolUseId
        - content
    ToolResultContentBlocks:
      type: array
      items:
        $ref: "#/components/schemas/ToolResultContentBlock"
    ToolResultContentBlock:
      description: The tool result content block. For more information, see Call a tool with the Converse API in the Amazon Bedrock User Guide.
      type: object
      properties:
        json:
          $ref: "#/components/schemas/Document"
          description: A tool result that is JSON format data.
        text:
          $ref: "#/components/schemas/String"
          description: A tool result that is text.
        image:
          $ref: "#/components/schemas/ImageBlock"
          description: A tool result that is an image. This field is only supported by Amazon Nova and Anthropic Claude 3 and 4 models.
        document:
          $ref: "#/components/schemas/DocumentBlock"
          description: A tool result that is a document.
        video:
          $ref: "#/components/schemas/VideoBlock"
          description: A tool result that is video.
        searchResult:
          $ref: "#/components/schemas/SearchResultBlock"
          description: A tool result that is a search result.
    SearchResultBlock:
      description: A search result block that enables natural citations with proper source attribution for retrieved content. This field is only supported by Anthropic Claude Opus 4.1, Opus 4, Sonnet 4.5, Sonnet 4, Sonnet 3.7, and 3.5 Haiku models.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/String"
          description: The source URL or identifier for the content.
        title_:
          $ref: "#/components/schemas/String"
          description: A descriptive title for the search result.
        content:
          $ref: "#/components/schemas/SearchResultContentBlocks"
          description: An array of search result content block.
        citations:
          $ref: "#/components/schemas/CitationsConfig"
          description: Configuration setting for citations
      required:
        - source
        - title_
        - content
    SearchResultContentBlocks:
      type: array
      items:
        $ref: "#/components/schemas/SearchResultContentBlock"
    SearchResultContentBlock:
      description: A block within a search result that contains the content.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/String"
          description: The actual text content
      required:
        - text
    ToolResultStatus:
      type: string
      enum:
        - success
        - error
    GuardrailConverseContentBlock:
      description: A content block for selective guarding with the Converse or ConverseStream API operations.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/GuardrailConverseTextBlock"
          description: The text to guard.
        image:
          $ref: "#/components/schemas/GuardrailConverseImageBlock"
          description: Image within converse content block to be evaluated by the guardrail.
    GuardrailConverseTextBlock:
      description: A text block that contains text that you want to assess with a guardrail. For more information, see GuardrailConverseContentBlock.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/String"
          description: The text that you want to guard.
        qualifiers:
          $ref: "#/components/schemas/GuardrailConverseContentQualifierList"
          description: The qualifier details for the guardrails contextual grounding filter.
      required:
        - text
    GuardrailConverseContentQualifierList:
      type: array
      items:
        $ref: "#/components/schemas/GuardrailConverseContentQualifier"
    GuardrailConverseContentQualifier:
      type: string
      enum:
        - grounding_source
        - query
        - guard_content
    GuardrailConverseImageBlock:
      description: An image block that contains images that you want to assess with a guardrail.
      type: object
      properties:
        format_:
          $ref: "#/components/schemas/GuardrailConverseImageFormat"
          description: The format details for the image type of the guardrail converse image block.
        source:
          $ref: "#/components/schemas/GuardrailConverseImageSource"
          description: The image source (image bytes) of the guardrail converse image block.
      required:
        - format_
        - source
    GuardrailConverseImageFormat:
      type: string
      enum:
        - png
        - jpeg
    GuardrailConverseImageSource:
      description: The image source (image bytes) of the guardrail converse image source.
      type: object
      properties:
        bytes:
          $ref: "#/components/schemas/GuardrailConverseImageSourceBytesBlob"
          description: The raw image bytes for the image.
    GuardrailConverseImageSourceBytesBlob:
      type: string
      format: byte
      minLength: 1
    CachePointBlock:
      description: Defines a section of content to be cached for reuse in subsequent API calls.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/CachePointType"
          description: Specifies the type of cache point within the CachePointBlock.
        ttl:
          $ref: "#/components/schemas/CacheTTL"
          description: Optional TTL duration for cache entries. When specified, enables extended TTL caching with the specified duration. When omitted, uses type value for caching behavior.
      required:
        - type_
    CachePointType:
      type: string
      enum:
        - default
    CacheTTL:
      description: Time-to-live duration for ephemeral cache entries
      type: string
      enum:
        - 5m
        - 1h
    ReasoningContentBlock:
      description: Contains content regarding the reasoning that is carried out by the model with respect to the content in the content block. Reasoning refers to a Chain of Thought (CoT) that the model generates to enhance the accuracy of its final response.
      type: object
      properties:
        reasoningText:
          $ref: "#/components/schemas/ReasoningTextBlock"
          description: The reasoning that the model used to return the output.
        redactedContent:
          $ref: "#/components/schemas/Blob"
          description: The content in the reasoning that was encrypted by the model provider for safety reasons. The encryption doesn't affect the quality of responses.
    ReasoningTextBlock:
      description: Contains the reasoning that the model used to return the output.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/String"
          description: The reasoning that the model used to return the output.
        signature:
          $ref: "#/components/schemas/String"
          description: A token that verifies that the reasoning text was generated by the model. If you pass a reasoning block back to the API in a multi-turn conversation, include the text and its signature unmodified.
      required:
        - text
    Blob:
      type: string
      format: byte
    CitationsContentBlock:
      description: A content block that contains both generated text and associated citation information. This block type is returned when document citations are enabled, providing traceability between the generated content and the source documents that informed the response.
      type: object
      properties:
        content:
          $ref: "#/components/schemas/CitationGeneratedContentList"
          description: The generated content that is supported by the associated citations.
        citations:
          $ref: "#/components/schemas/Citations"
          description: An array of citations that reference the source documents used to generate the associated content.
    CitationGeneratedContentList:
      type: array
      items:
        $ref: "#/components/schemas/CitationGeneratedContent"
    CitationGeneratedContent:
      description: Contains the generated text content that corresponds to or is supported by a citation from a source document.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/String"
          description: The text content that was generated by the model and is supported by the associated citation.
    Citations:
      type: array
      items:
        $ref: "#/components/schemas/Citation"
    Citation:
      description: Contains information about a citation that references a specific source document. Citations provide traceability between the model's generated response and the source documents that informed that response.
      type: object
      properties:
        title_:
          $ref: "#/components/schemas/String"
          description: The title or identifier of the source document being cited.
        source:
          $ref: "#/components/schemas/String"
          description: The source from the original search result that provided the cited content.
        sourceContent:
          $ref: "#/components/schemas/CitationSourceContentList"
          description: The specific content from the source document that was referenced or cited in the generated response.
        location:
          $ref: "#/components/schemas/CitationLocation"
          description: The precise location within the source document where the cited content can be found, including character positions, page numbers, or chunk identifiers.
    CitationSourceContentList:
      type: array
      items:
        $ref: "#/components/schemas/CitationSourceContent"
    CitationSourceContent:
      description: Contains the actual text content from a source document that is being cited or referenced in the model's response.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/String"
          description: The text content from the source document that is being cited.
    CitationLocation:
      description: Specifies the precise location within a source document where cited content can be found. This can include character-level positions, page numbers, or document chunks depending on the document type and indexing method.
      type: object
      properties:
        web:
          $ref: "#/components/schemas/WebLocation"
          description: The web URL that was cited for this reference.
        documentChar:
          $ref: "#/components/schemas/DocumentCharLocation"
          description: The character-level location within the document where the cited content is found.
        documentPage:
          $ref: "#/components/schemas/DocumentPageLocation"
          description: The page-level location within the document where the cited content is found.
        documentChunk:
          $ref: "#/components/schemas/DocumentChunkLocation"
