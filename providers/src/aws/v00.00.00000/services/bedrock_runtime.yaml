          $ref: "#/components/schemas/DocumentCharLocationDocumentIndexInteger"
          description: The index of the document within the array of documents provided in the request.
        start:
          $ref: "#/components/schemas/DocumentCharLocationStartInteger"
          description: The starting character position of the cited content within the document.
        end:
          $ref: "#/components/schemas/DocumentCharLocationEndInteger"
          description: The ending character position of the cited content within the document.
    DocumentCharLocationDocumentIndexInteger:
      type: integer
      minimum: 0
    DocumentCharLocationStartInteger:
      type: integer
      minimum: 0
    DocumentCharLocationEndInteger:
      type: integer
      minimum: 0
    DocumentPageLocation:
      description: Specifies a page-level location within a document, providing positioning information for cited content using page numbers.
      type: object
      properties:
        documentIndex:
          $ref: "#/components/schemas/DocumentPageLocationDocumentIndexInteger"
          description: The index of the document within the array of documents provided in the request.
        start:
          $ref: "#/components/schemas/DocumentPageLocationStartInteger"
          description: The starting page number of the cited content within the document.
        end:
          $ref: "#/components/schemas/DocumentPageLocationEndInteger"
          description: The ending page number of the cited content within the document.
    DocumentPageLocationDocumentIndexInteger:
      type: integer
      minimum: 0
    DocumentPageLocationStartInteger:
      type: integer
      minimum: 0
    DocumentPageLocationEndInteger:
      type: integer
      minimum: 0
    DocumentChunkLocation:
      description: Specifies a chunk-level location within a document, providing positioning information for cited content using logical document segments or chunks.
      type: object
      properties:
        documentIndex:
          $ref: "#/components/schemas/DocumentChunkLocationDocumentIndexInteger"
          description: The index of the document within the array of documents provided in the request.
        start:
          $ref: "#/components/schemas/DocumentChunkLocationStartInteger"
          description: The starting chunk identifier or index of the cited content within the document.
        end:
          $ref: "#/components/schemas/DocumentChunkLocationEndInteger"
          description: The ending chunk identifier or index of the cited content within the document.
    DocumentChunkLocationDocumentIndexInteger:
      type: integer
      minimum: 0
    DocumentChunkLocationStartInteger:
      type: integer
      minimum: 0
    DocumentChunkLocationEndInteger:
      type: integer
      minimum: 0
    SearchResultLocation:
      description: Specifies a search result location within the content array, providing positioning information for cited content using search result index and block positions.
      type: object
      properties:
        searchResultIndex:
          $ref: "#/components/schemas/SearchResultLocationSearchResultIndexInteger"
          description: The index of the search result content block where the cited content is found.
        start:
          $ref: "#/components/schemas/SearchResultLocationStartInteger"
          description: The starting position in the content array where the cited content begins.
        end:
          $ref: "#/components/schemas/SearchResultLocationEndInteger"
          description: The ending position in the content array where the cited content ends.
    SearchResultLocationSearchResultIndexInteger:
      type: integer
      minimum: 0
    SearchResultLocationStartInteger:
      type: integer
      minimum: 0
    SearchResultLocationEndInteger:
      type: integer
      minimum: 0
    SystemContentBlocks:
      type: array
      items:
        $ref: "#/components/schemas/SystemContentBlock"
    SystemContentBlock:
      description: Contains configurations for instructions to provide the model for how to handle input. To learn more, see Using the Converse API.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/NonEmptyString"
          description: A system prompt for the model.
        guardContent:
          $ref: "#/components/schemas/GuardrailConverseContentBlock"
          description: A content block to assess with the guardrail. Use with the Converse or ConverseStream API operations. For more information, see Use a guardrail with the Converse API in the Amazon Bedrock User Guide.
        cachePoint:
          $ref: "#/components/schemas/CachePointBlock"
          description: CachePoint to include in the system prompt.
    NonEmptyString:
      type: string
      minLength: 1
    InferenceConfiguration:
      description: Base inference parameters to pass to a model in a call to Converse or ConverseStream. For more information, see Inference parameters for foundation models. If you need to pass additional parameters that the model supports, use the additionalModelRequestFields request field in the call to Converse or ConverseStream. For more information, see Model parameters.
      type: object
      properties:
        maxTokens:
          $ref: "#/components/schemas/InferenceConfigurationMaxTokensInteger"
          description: The maximum number of tokens to allow in the generated response. The default value is the maximum allowed value for the model that you are using. For more information, see Inference parameters for foundation models.
        temperature:
          $ref: "#/components/schemas/InferenceConfigurationTemperatureFloat"
          description: The likelihood of the model selecting higher-probability options while generating a response. A lower value makes the model more likely to choose higher-probability options, while a higher value makes the model more likely to choose lower-probability options. The default value is the default value for the model that you are using. For more information, see Inference parameters for foundation models.
        topP:
          $ref: "#/components/schemas/InferenceConfigurationTopPFloat"
          description: The percentage of most-likely candidates that the model considers for the next token. For example, if you choose a value of 0.8 for topP, the model selects from the top 80% of the probability distribution of tokens that could be next in the sequence. The default value is the default value for the model that you are using. For more information, see Inference parameters for foundation models.
        stopSequences:
          $ref: "#/components/schemas/InferenceConfigurationStopSequencesList"
          description: A list of stop sequences. A stop sequence is a sequence of characters that causes the model to stop generating the response.
    InferenceConfigurationMaxTokensInteger:
      type: integer
      minimum: 1
    InferenceConfigurationTemperatureFloat:
      type: number
      format: float
      minimum: 0
      maximum: 1
    InferenceConfigurationTopPFloat:
      type: number
      format: float
      minimum: 0
      maximum: 1
    InferenceConfigurationStopSequencesList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    ToolConfiguration:
      description: Configuration information for the tools that you pass to a model. For more information, see Tool use (function calling) in the Amazon Bedrock User Guide.
      type: object
      properties:
        tools:
          $ref: "#/components/schemas/ToolConfigurationToolsList"
          description: An array of tools that you want to pass to a model.
        toolChoice:
          $ref: "#/components/schemas/ToolChoice"
          description: If supported by model, forces the model to request a tool.
      required:
        - tools
    ToolConfigurationToolsList:
      type: array
      items:
        $ref: "#/components/schemas/Tool"
    Tool:
      description: Information about a tool that you can use with the Converse API. For more information, see Call a tool with the Converse API in the Amazon Bedrock User Guide.
      type: object
      properties:
        toolSpec:
          $ref: "#/components/schemas/ToolSpecification"
          description: The specfication for the tool.
        systemTool:
          $ref: "#/components/schemas/SystemTool"
          description: Specifies the system-defined tool that you want use.
        cachePoint:
          $ref: "#/components/schemas/CachePointBlock"
          description: CachePoint to include in the tool configuration.
    ToolSpecification:
      description: The specification for the tool. For more information, see Call a tool with the Converse API in the Amazon Bedrock User Guide.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ToolName"
          description: The name for the tool.
        description:
          $ref: "#/components/schemas/NonEmptyString"
          description: The description for the tool.
        inputSchema:
          $ref: "#/components/schemas/ToolInputSchema"
          description: The input schema for the tool in JSON format.
        strict:
          $ref: "#/components/schemas/Boolean"
          description: Flag to enable structured output enforcement on a tool usage response.
      required:
        - name
        - inputSchema
    ToolInputSchema:
      description: The schema for the tool. The top level schema type must be object. For more information, see Call a tool with the Converse API in the Amazon Bedrock User Guide.
      type: object
      properties:
        json:
          $ref: "#/components/schemas/Document"
          description: The JSON schema for the tool. For more information, see JSON Schema Reference.
    SystemTool:
      description: Specifies a system-defined tool for the model to use. System-defined tools are tools that are created and provided by the model provider.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ToolName"
          description: The name of the system-defined tool that you want to call.
      required:
        - name
    ToolChoice:
      description: Determines which tools the model should request in a call to Converse or ConverseStream. For more information, see Call a tool with the Converse API in the Amazon Bedrock User Guide.
      type: object
      properties:
        auto:
          $ref: "#/components/schemas/AutoToolChoice"
          description: (Default). The Model automatically decides if a tool should be called or whether to generate text instead.
        any:
          $ref: "#/components/schemas/AnyToolChoice"
          description: The model must request at least one tool (no text is generated).
        tool:
          $ref: "#/components/schemas/SpecificToolChoice"
          description: The Model must request the specified tool. Only supported by Anthropic Claude 3 and Amazon Nova models.
    AutoToolChoice:
      description: 'The Model automatically decides if a tool should be called or whether to generate text instead. For example, {"auto" : {}}. For more information, see Call a tool with the Converse API in the Amazon Bedrock User Guide'
      type: object
    AnyToolChoice:
      description: 'The model must request at least one tool (no text is generated). For example, {"any" : {}}. For more information, see Call a tool with the Converse API in the Amazon Bedrock User Guide.'
      type: object
    SpecificToolChoice:
      description: 'The model must request a specific tool. For example, {"tool" : {"name" : "Your tool name"}}. For more information, see Call a tool with the Converse API in the Amazon Bedrock User Guide This field is only supported by Anthropic Claude 3 models.'
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ToolName"
          description: The name of the tool that the model must request.
      required:
        - name
    GuardrailConfiguration:
      description: Configuration information for a guardrail that you use with the Converse operation.
      type: object
      properties:
        guardrailIdentifier:
          $ref: "#/components/schemas/GuardrailIdentifier"
          description: The identifier for the guardrail.
        guardrailVersion:
          $ref: "#/components/schemas/GuardrailVersion"
          description: The version of the guardrail.
        trace:
          $ref: "#/components/schemas/GuardrailTrace"
          description: The trace behavior for the guardrail.
    GuardrailTrace:
      type: string
