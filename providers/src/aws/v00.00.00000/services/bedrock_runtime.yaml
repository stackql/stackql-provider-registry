      type: array
      items:
        $ref: "#/components/schemas/ToolResultBlockDelta"
    ToolResultBlockDelta:
      description: Contains incremental updates to tool results information during streaming responses. This allows clients to build up tool results data progressively as the response is generated.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/String"
          description: The reasoning the model used to return the output.
        json:
          $ref: "#/components/schemas/Document"
          description: The JSON schema for the tool result content block. see JSON Schema Reference.
    ReasoningContentBlockDelta:
      description: Contains content regarding the reasoning that is carried out by the model with respect to the content in the content block. Reasoning refers to a Chain of Thought (CoT) that the model generates to enhance the accuracy of its final response.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/String"
          description: The reasoning that the model used to return the output.
        redactedContent:
          $ref: "#/components/schemas/Blob"
          description: The content in the reasoning that was encrypted by the model provider for safety reasons. The encryption doesn't affect the quality of responses.
        signature:
          $ref: "#/components/schemas/String"
          description: A token that verifies that the reasoning text was generated by the model. If you pass a reasoning block back to the API in a multi-turn conversation, include the text and its signature unmodified.
    CitationsDelta:
      description: Contains incremental updates to citation information during streaming responses. This allows clients to build up citation data progressively as the response is generated.
      type: object
      properties:
        title_:
          $ref: "#/components/schemas/String"
          description: The title or identifier of the source document being cited.
        source:
          $ref: "#/components/schemas/String"
          description: The source from the original search result that provided the cited content.
        sourceContent:
          $ref: "#/components/schemas/CitationSourceContentListDelta"
          description: The specific content from the source document that was referenced or cited in the generated response.
        location:
          $ref: "#/components/schemas/CitationLocation"
          description: Specifies the precise location within a source document where cited content can be found. This can include character-level positions, page numbers, or document chunks depending on the document type and indexing method.
    CitationSourceContentListDelta:
      type: array
      items:
        $ref: "#/components/schemas/CitationSourceContentDelta"
    CitationSourceContentDelta:
      description: Contains incremental updates to the source content text during streaming responses, allowing clients to build up the cited content progressively.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/String"
          description: An incremental update to the text content from the source document that is being cited.
    ImageBlockDelta:
      description: A streaming delta event that contains incremental image data during streaming responses.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/ImageSource"
          description: The incremental image source data for this delta event.
        error:
          $ref: "#/components/schemas/ErrorBlock"
          description: Error information if this image delta could not be processed.
    ContentBlockStopEvent:
      description: A content block stop event.
      type: object
      properties:
        contentBlockIndex:
          $ref: "#/components/schemas/NonNegativeInteger"
          description: The index for a content block.
      required:
        - contentBlockIndex
    MessageStopEvent:
      description: The stop event for a message.
      type: object
      properties:
        stopReason:
          $ref: "#/components/schemas/StopReason"
          description: The reason why the model stopped generating output.
        additionalModelResponseFields:
          $ref: "#/components/schemas/Document"
          description: The additional model response fields.
      required:
        - stopReason
    ConverseStreamMetadataEvent:
      description: A conversation stream metadata event.
      type: object
      properties:
        usage:
          $ref: "#/components/schemas/TokenUsage"
          description: Usage information for the conversation stream event.
        metrics:
          $ref: "#/components/schemas/ConverseStreamMetrics"
          description: The metrics for the conversation stream metadata event.
        trace:
          $ref: "#/components/schemas/ConverseStreamTrace"
          description: The trace object in the response from ConverseStream that contains information about the guardrail behavior.
        performanceConfig:
          $ref: "#/components/schemas/PerformanceConfiguration"
          description: Model performance configuration metadata for the conversation stream event.
        serviceTier:
          $ref: "#/components/schemas/ServiceTier"
          description: Specifies the processing tier configuration used for serving the request.
      required:
        - usage
        - metrics
    ConverseStreamMetrics:
      description: Metrics for the stream.
      type: object
      properties:
        latencyMs:
          $ref: "#/components/schemas/Long"
          description: The latency for the streaming request, in milliseconds.
      required:
        - latencyMs
    ConverseStreamTrace:
      description: The trace object in a response from ConverseStream.
      type: object
      properties:
        guardrail:
          $ref: "#/components/schemas/GuardrailTraceAssessment"
          description: The guardrail trace object.
        promptRouter:
          $ref: "#/components/schemas/PromptRouterTrace"
          description: The request's prompt router.
    InternalServerException:
