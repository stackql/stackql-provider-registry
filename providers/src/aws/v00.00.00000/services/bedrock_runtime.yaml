        structure:
          $ref: "#/components/schemas/OutputFormatStructure"
          description: The structure that the model's output must adhere to.
      required:
        - type_
        - structure
    OutputFormatType:
      description: "The type of structured output format. Available options are: json_schema."
      type: string
      enum:
        - json_schema
    OutputFormatStructure:
      description: The structure that the model's output must adhere to.
      type: object
      properties:
        jsonSchema:
          $ref: "#/components/schemas/JsonSchemaDefinition"
