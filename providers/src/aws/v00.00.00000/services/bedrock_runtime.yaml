openapi: 3.0.0
info:
  version: "2023-09-30"
  title: Amazon Bedrock Runtime
  description: Amazon Bedrock Runtime
  x-serviceName: bedrock
  x-serviceAlias: bedrock_runtime
  x-protocol: rest-json
  x-apiVersion: "2023-09-30"
  x-endpointPrefix: bedrock-runtime
servers:
  - url: https://bedrock-runtime.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for bedrock-runtime
paths:
  /guardrail/{guardrail_identifier}/version/{guardrail_version}/apply:
    post:
      operationId: ApplyGuardrail
      description: The action to apply a guardrail. For troubleshooting some of the common errors you might encounter when using the ApplyGuardrail API, see Troubleshooting Amazon Bedrock API Error Codes in the Amazon Bedrock User Guide
      parameters:
        - name: guardrail_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuardrailIdentifier"
          description: The guardrail identifier used in the request to apply the guardrail.
        - name: guardrail_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuardrailVersion"
          description: The guardrail version used in the request to apply the guardrail.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  $ref: "#/components/schemas/GuardrailContentSource"
                content:
                  $ref: "#/components/schemas/GuardrailContentBlockList"
                outputScope:
                  $ref: "#/components/schemas/GuardrailOutputScope"
              required:
                - source
                - content
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyGuardrailResponse"
  /model/{model_id}/converse:
    post:
      operationId: Converse
      description: "Sends messages to the specified Amazon Bedrock model. Converse provides a consistent interface that works with all models that support messages. This allows you to write code once and use it with different models. If a model has unique inference parameters, you can also pass those unique parameters to the model. Amazon Bedrock doesn't store any text, images, or documents that you provide as content. The data is only used to generate the response. You can submit a prompt by including it in the messages field, specifying the modelId of a foundation model or inference profile to run inference on it, and including any other fields that are relevant to your use case. You can also submit a prompt from Prompt management by specifying the ARN of the prompt version and including a map of variables to values in the promptVariables field. You can append more messages to the prompt by using the messages field. If you use a prompt from Prompt management, you can't include the following fields in the request: additionalModelRequestFields, inferenceConfig, system, or toolConfig. Instead, these fields must be defined through Prompt management. For more information, see Use a prompt from Prompt management. For information about the Converse API, see Use the Converse API in the Amazon Bedrock User Guide. To use a guardrail, see Use a guardrail with the Converse API in the Amazon Bedrock User Guide. To use a tool with a model, see Tool use (Function calling) in the Amazon Bedrock User Guide For example code, see Converse API examples in the Amazon Bedrock User Guide. This operation requires permission for the bedrock:InvokeModel action. To deny all inference access to resources that you specify in the modelId field, you need to deny access to the bedrock:InvokeModel and bedrock:InvokeModelWithResponseStream actions. Doing this also denies access to the resource through the base inference actions (InvokeModel and InvokeModelWithResponseStream). For more information see Deny access for inference on specific models. For troubleshooting some of the common errors you might encounter when using the Converse API, see Troubleshooting Amazon Bedrock API Error Codes in the Amazon Bedrock User Guide"
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConversationalModelId"
          description: "Specifies the model or throughput with which to run inference, or the prompt resource to use in inference. The value depends on the resource that you use: If you use a base model, specify the model ID or its ARN. For a list of model IDs for base models, see Amazon Bedrock base model IDs (on-demand throughput) in the Amazon Bedrock User Guide. If you use an inference profile, specify the inference profile ID or its ARN. For a list of inference profile IDs, see Supported Regions and models for cross-region inference in the Amazon Bedrock User Guide. If you use a provisioned model, specify the ARN of the Provisioned Throughput. For more information, see Run inference using a Provisioned Throughput in the Amazon Bedrock User Guide. If you use a custom model, first purchase Provisioned Throughput for it. Then specify the ARN of the resulting provisioned model. For more information, see Use a custom model in Amazon Bedrock in the Amazon Bedrock User Guide. To include a prompt that was defined in Prompt management, specify the ARN of the prompt version to use. The Converse API doesn't support imported models."
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  $ref: "#/components/schemas/Messages"
                system:
                  $ref: "#/components/schemas/SystemContentBlocks"
                inferenceConfig:
                  $ref: "#/components/schemas/InferenceConfiguration"
                toolConfig:
                  $ref: "#/components/schemas/ToolConfiguration"
                guardrailConfig:
                  $ref: "#/components/schemas/GuardrailConfiguration"
                additionalModelRequestFields:
                  $ref: "#/components/schemas/Document"
                promptVariables:
                  $ref: "#/components/schemas/PromptVariableMap"
                additionalModelResponseFieldPaths:
                  $ref: "#/components/schemas/ConverseRequestAdditionalModelResponseFieldPathsList"
                requestMetadata:
                  $ref: "#/components/schemas/RequestMetadata"
                performanceConfig:
                  $ref: "#/components/schemas/PerformanceConfiguration"
                serviceTier:
                  $ref: "#/components/schemas/ServiceTier"
                outputConfig:
                  $ref: "#/components/schemas/OutputConfig"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConverseResponse"
  /model/{model_id}/converse-stream:
    post:
      operationId: ConverseStream
      description: "Sends messages to the specified Amazon Bedrock model and returns the response in a stream. ConverseStream provides a consistent API that works with all Amazon Bedrock models that support messages. This allows you to write code once and use it with different models. Should a model have unique inference parameters, you can also pass those unique parameters to the model. To find out if a model supports streaming, call GetFoundationModel and check the responseStreamingSupported field in the response. The CLI doesn't support streaming operations in Amazon Bedrock, including ConverseStream. Amazon Bedrock doesn't store any text, images, or documents that you provide as content. The data is only used to generate the response. You can submit a prompt by including it in the messages field, specifying the modelId of a foundation model or inference profile to run inference on it, and including any other fields that are relevant to your use case. You can also submit a prompt from Prompt management by specifying the ARN of the prompt version and including a map of variables to values in the promptVariables field. You can append more messages to the prompt by using the messages field. If you use a prompt from Prompt management, you can't include the following fields in the request: additionalModelRequestFields, inferenceConfig, system, or toolConfig. Instead, these fields must be defined through Prompt management. For more information, see Use a prompt from Prompt management. For information about the Converse API, see Use the Converse API in the Amazon Bedrock User Guide. To use a guardrail, see Use a guardrail with the Converse API in the Amazon Bedrock User Guide. To use a tool with a model, see Tool use (Function calling) in the Amazon Bedrock User Guide For example code, see Conversation streaming example in the Amazon Bedrock User Guide. This operation requires permission for the bedrock:InvokeModelWithResponseStream action. To deny all inference access to resources that you specify in the modelId field, you need to deny access to the bedrock:InvokeModel and bedrock:InvokeModelWithResponseStream actions. Doing this also denies access to the resource through the base inference actions (InvokeModel and InvokeModelWithResponseStream). For more information see Deny access for inference on specific models. For troubleshooting some of the common errors you might encounter when using the ConverseStream API, see Troubleshooting Amazon Bedrock API Error Codes in the Amazon Bedrock User Guide"
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConversationalModelId"
          description: "Specifies the model or throughput with which to run inference, or the prompt resource to use in inference. The value depends on the resource that you use: If you use a base model, specify the model ID or its ARN. For a list of model IDs for base models, see Amazon Bedrock base model IDs (on-demand throughput) in the Amazon Bedrock User Guide. If you use an inference profile, specify the inference profile ID or its ARN. For a list of inference profile IDs, see Supported Regions and models for cross-region inference in the Amazon Bedrock User Guide. If you use a provisioned model, specify the ARN of the Provisioned Throughput. For more information, see Run inference using a Provisioned Throughput in the Amazon Bedrock User Guide. If you use a custom model, first purchase Provisioned Throughput for it. Then specify the ARN of the resulting provisioned model. For more information, see Use a custom model in Amazon Bedrock in the Amazon Bedrock User Guide. To include a prompt that was defined in Prompt management, specify the ARN of the prompt version to use. The Converse API doesn't support imported models."
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  $ref: "#/components/schemas/Messages"
                system:
                  $ref: "#/components/schemas/SystemContentBlocks"
                inferenceConfig:
                  $ref: "#/components/schemas/InferenceConfiguration"
                toolConfig:
                  $ref: "#/components/schemas/ToolConfiguration"
                guardrailConfig:
                  $ref: "#/components/schemas/GuardrailStreamConfiguration"
                additionalModelRequestFields:
                  $ref: "#/components/schemas/Document"
                promptVariables:
                  $ref: "#/components/schemas/PromptVariableMap"
                additionalModelResponseFieldPaths:
                  $ref: "#/components/schemas/ConverseStreamRequestAdditionalModelResponseFieldPathsList"
                requestMetadata:
                  $ref: "#/components/schemas/RequestMetadata"
                performanceConfig:
                  $ref: "#/components/schemas/PerformanceConfiguration"
                serviceTier:
                  $ref: "#/components/schemas/ServiceTier"
                outputConfig:
                  $ref: "#/components/schemas/OutputConfig"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConverseStreamResponse"
  /model/{model_id}/count-tokens:
    post:
      operationId: CountTokens
      description: "Returns the token count for a given inference request. This operation helps you estimate token usage before sending requests to foundation models by returning the token count that would be used if the same input were sent to the model in an inference request. Token counting is model-specific because different models use different tokenization strategies. The token count returned by this operation will match the token count that would be charged if the same input were sent to the model in an InvokeModel or Converse request. You can use this operation to: Estimate costs before sending inference requests. Optimize prompts to fit within token limits. Plan for token usage in your applications. This operation accepts the same input formats as InvokeModel and Converse, allowing you to count tokens for both raw text inputs and structured conversation formats. The following operations are related to CountTokens: InvokeModel - Sends inference requests to foundation models Converse - Sends conversation-based inference requests to foundation models"
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FoundationModelVersionIdentifier"
          description: The unique identifier or ARN of the foundation model to use for token counting. Each model processes tokens differently, so the token count is specific to the model you specify.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  $ref: "#/components/schemas/CountTokensInput"
              required:
                - input
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountTokensResponse"
  /async-invoke/{invocation_arn}:
    get:
      operationId: GetAsyncInvoke
      description: Retrieve information about an asynchronous invocation.
      parameters:
        - name: invocation_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InvocationArn"
          description: The invocation's ARN.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAsyncInvokeResponse"
  /model/{model_id}/invoke:
    post:
      operationId: InvokeModel
      description: Invokes the specified Amazon Bedrock model to run inference using the prompt and inference parameters provided in the request body. You use model inference to generate text, images, and embeddings. For example code, see Invoke model code examples in the Amazon Bedrock User Guide. This operation requires permission for the bedrock:InvokeModel action. To deny all inference access to resources that you specify in the modelId field, you need to deny access to the bedrock:InvokeModel and bedrock:InvokeModelWithResponseStream actions. Doing this also denies access to the resource through the Converse API actions (Converse and ConverseStream). For more information see Deny access for inference on specific models. For troubleshooting some of the common errors you might encounter when using the InvokeModel API, see Troubleshooting Amazon Bedrock API Error Codes in the Amazon Bedrock User Guide
      parameters:
        - name: Content-Type
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/MimeType"
          description: The MIME type of the input data in the request. You must specify application/json.
        - name: Accept
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/MimeType"
          description: The desired MIME type of the inference body in the response. The default value is application/json.
        - name: model_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InvokeModelIdentifier"
          description: "The unique identifier of the model to invoke to run inference. The modelId to provide depends on the type of model or throughput that you use: If you use a base model, specify the model ID or its ARN. For a list of model IDs for base models, see Amazon Bedrock base model IDs (on-demand throughput) in the Amazon Bedrock User Guide. If you use an inference profile, specify the inference profile ID or its ARN. For a list of inference profile IDs, see Supported Regions and models for cross-region inference in the Amazon Bedrock User Guide. If you use a provisioned model, specify the ARN of the Provisioned Throughput. For more information, see Run inference using a Provisioned Throughput in the Amazon Bedrock User Guide. If you use a custom model, specify the ARN of the custom model deployment (for on-demand inference) or the ARN of your provisioned model (for Provisioned Throughput). For more information, see Use a custom model in Amazon Bedrock in the Amazon Bedrock User Guide. If you use an imported model, specify the ARN of the imported model. You can get the model ARN from a successful call to CreateModelImportJob or from the Imported models page in the Amazon Bedrock console."
        - name: X-Amzn-Bedrock-Trace
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/Trace"
          description: Specifies whether to enable or disable the Bedrock trace. If enabled, you can see the full Bedrock trace.
        - name: X-Amzn-Bedrock-GuardrailIdentifier
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/GuardrailIdentifier"
          description: The unique identifier of the guardrail that you want to use. If you don't provide a value, no guardrail is applied to the invocation. An error will be thrown in the following situations. You don't provide a guardrail identifier but you specify the amazon-bedrock-guardrailConfig field in the request body. You enable the guardrail but the contentType isn't application/json. You provide a guardrail identifier, but guardrailVersion isn't specified.
        - name: X-Amzn-Bedrock-GuardrailVersion
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/GuardrailVersion"
          description: The version number for the guardrail. The value can also be DRAFT.
        - name: X-Amzn-Bedrock-PerformanceConfig-Latency
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/PerformanceConfigLatency"
          description: Model performance settings for the request.
        - name: X-Amzn-Bedrock-Service-Tier
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ServiceTierType"
          description: Specifies the processing tier type used for serving the request.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  $ref: "#/components/schemas/Body"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvokeModelResponse"
  /model/{model_id}/invoke-with-bidirectional-stream:
    post:
      operationId: InvokeModelWithBidirectionalStream
      description: Invoke the specified Amazon Bedrock model to run inference using the bidirectional stream. The response is returned in a stream that remains open for 8 minutes. A single session can contain multiple prompts and responses from the model. The prompts to the model are provided as audio files and the model's responses are spoken back to the user and transcribed. It is possible for users to interrupt the model's response with a new prompt, which will halt the response speech. The model will retain contextual awareness of the conversation while pivoting to respond to the new prompt.
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InvokeModelIdentifier"
          description: The model ID or ARN of the model ID to use. Currently, only amazon.nova-sonic-v1:0 is supported.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  $ref: "#/components/schemas/InvokeModelWithBidirectionalStreamInput"
              required:
                - body
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvokeModelWithBidirectionalStreamResponse"
  /model/{model_id}/invoke-with-response-stream:
    post:
      operationId: InvokeModelWithResponseStream
      description: Invoke the specified Amazon Bedrock model to run inference using the prompt and inference parameters provided in the request body. The response is returned in a stream. To see if a model supports streaming, call GetFoundationModel and check the responseStreamingSupported field in the response. The CLI doesn't support streaming operations in Amazon Bedrock, including InvokeModelWithResponseStream. For example code, see Invoke model with streaming code example in the Amazon Bedrock User Guide. This operation requires permissions to perform the bedrock:InvokeModelWithResponseStream action. To deny all inference access to resources that you specify in the modelId field, you need to deny access to the bedrock:InvokeModel and bedrock:InvokeModelWithResponseStream actions. Doing this also denies access to the resource through the Converse API actions (Converse and ConverseStream). For more information see Deny access for inference on specific models. For troubleshooting some of the common errors you might encounter when using the InvokeModelWithResponseStream API, see Troubleshooting Amazon Bedrock API Error Codes in the Amazon Bedrock User Guide
      parameters:
        - name: Content-Type
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/MimeType"
          description: The MIME type of the input data in the request. You must specify application/json.
        - name: X-Amzn-Bedrock-Accept
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/MimeType"
          description: The desired MIME type of the inference body in the response. The default value is application/json.
        - name: model_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InvokeModelIdentifier"
          description: "The unique identifier of the model to invoke to run inference. The modelId to provide depends on the type of model or throughput that you use: If you use a base model, specify the model ID or its ARN. For a list of model IDs for base models, see Amazon Bedrock base model IDs (on-demand throughput) in the Amazon Bedrock User Guide. If you use an inference profile, specify the inference profile ID or its ARN. For a list of inference profile IDs, see Supported Regions and models for cross-region inference in the Amazon Bedrock User Guide. If you use a provisioned model, specify the ARN of the Provisioned Throughput. For more information, see Run inference using a Provisioned Throughput in the Amazon Bedrock User Guide. If you use a custom model, specify the ARN of the custom model deployment (for on-demand inference) or the ARN of your provisioned model (for Provisioned Throughput). For more information, see Use a custom model in Amazon Bedrock in the Amazon Bedrock User Guide. If you use an imported model, specify the ARN of the imported model. You can get the model ARN from a successful call to CreateModelImportJob or from the Imported models page in the Amazon Bedrock console."
        - name: X-Amzn-Bedrock-Trace
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/Trace"
          description: Specifies whether to enable or disable the Bedrock trace. If enabled, you can see the full Bedrock trace.
        - name: X-Amzn-Bedrock-GuardrailIdentifier
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/GuardrailIdentifier"
          description: The unique identifier of the guardrail that you want to use. If you don't provide a value, no guardrail is applied to the invocation. An error is thrown in the following situations. You don't provide a guardrail identifier but you specify the amazon-bedrock-guardrailConfig field in the request body. You enable the guardrail but the contentType isn't application/json. You provide a guardrail identifier, but guardrailVersion isn't specified.
        - name: X-Amzn-Bedrock-GuardrailVersion
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/GuardrailVersion"
          description: The version number for the guardrail. The value can also be DRAFT.
        - name: X-Amzn-Bedrock-PerformanceConfig-Latency
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/PerformanceConfigLatency"
          description: Model performance settings for the request.
        - name: X-Amzn-Bedrock-Service-Tier
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ServiceTierType"
          description: Specifies the processing tier type used for serving the request.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  $ref: "#/components/schemas/Body"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvokeModelWithResponseStreamResponse"
  /async-invoke:
    get:
      operationId: ListAsyncInvokes
      description: Lists asynchronous invocations.
      parameters:
        - name: submitTimeAfter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: Include invocations submitted after this time.
        - name: submitTimeBefore
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: Include invocations submitted before this time.
        - name: statusEquals
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AsyncInvokeStatus"
          description: Filter invocations by status.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of invocations to return in one page of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: Specify the pagination token from a previous request to retrieve the next page of results.
        - name: sortBy
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortAsyncInvocationBy"
          description: How to sort the response.
        - name: sortOrder
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortOrder"
          description: The sorting order for the response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAsyncInvokesResponse"
    post:
      operationId: StartAsyncInvoke
      description: Starts an asynchronous invocation. This operation requires permission for the bedrock:InvokeModel action. To deny all inference access to resources that you specify in the modelId field, you need to deny access to the bedrock:InvokeModel and bedrock:InvokeModelWithResponseStream actions. Doing this also denies access to the resource through the Converse API actions (Converse and ConverseStream). For more information see Deny access for inference on specific models.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientRequestToken:
                  $ref: "#/components/schemas/AsyncInvokeIdempotencyToken"
                modelId:
                  $ref: "#/components/schemas/AsyncInvokeIdentifier"
                modelInput:
                  $ref: "#/components/schemas/ModelInputPayload"
                outputDataConfig:
                  $ref: "#/components/schemas/AsyncInvokeOutputDataConfig"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - modelId
                - modelInput
                - outputDataConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartAsyncInvokeResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    GuardrailIdentifier:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: (|([a-z0-9]+)|(arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:guardrail/[a-z0-9]+))
    GuardrailVersion:
      type: string
      pattern: (|([1-9][0-9]{0,7})|(DRAFT))
    GuardrailContentSource:
      type: string
      enum:
        - INPUT
        - OUTPUT
    GuardrailContentBlockList:
      type: array
      items:
        $ref: "#/components/schemas/GuardrailContentBlock"
    GuardrailContentBlock:
      description: The content block to be evaluated by the guardrail.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/GuardrailTextBlock"
          description: Text within content block to be evaluated by the guardrail.
        image:
          $ref: "#/components/schemas/GuardrailImageBlock"
          description: Image within guardrail content block to be evaluated by the guardrail.
    GuardrailTextBlock:
      description: The text block to be evaluated by the guardrail.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/String"
          description: The input text details to be evaluated by the guardrail.
        qualifiers:
          $ref: "#/components/schemas/GuardrailContentQualifierList"
          description: The qualifiers describing the text block.
      required:
        - text
    String:
      type: string
    GuardrailContentQualifierList:
      type: array
      items:
        $ref: "#/components/schemas/GuardrailContentQualifier"
    GuardrailContentQualifier:
      type: string
      enum:
        - grounding_source
        - query
        - guard_content
    GuardrailImageBlock:
      description: Contain an image which user wants guarded. This block is accepted by the guardrails independent API.
      type: object
      properties:
        format_:
          $ref: "#/components/schemas/GuardrailImageFormat"
          description: The format details for the file type of the image blocked by the guardrail.
        source:
          $ref: "#/components/schemas/GuardrailImageSource"
          description: The image source (image bytes) details of the image blocked by the guardrail.
