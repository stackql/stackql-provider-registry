    DataTableAttributeValueType:
      type: string
      enum:
        - TEXT
        - NUMBER
        - BOOLEAN
        - TEXT_LIST
        - NUMBER_LIST
    Validation:
      description: Defines validation rules for data table attribute values. Based on JSON Schema Draft 2020-12 with additional Connect-specific validations. Validation rules ensure data integrity and consistency across the data table.
      type: object
      properties:
        MinLength:
          $ref: "#/components/schemas/LengthBoundary"
          description: The minimum number of characters a text value can contain. Applies to TEXT value type and values within a TEXT_LIST. Must be less than or equal to MaxLength.
        MaxLength:
          $ref: "#/components/schemas/LengthBoundary"
          description: The maximum number of characters a text value can contain. Applies to TEXT value type and values within a TEXT_LIST. Must be greater than or equal to MinLength.
        MinValues:
          $ref: "#/components/schemas/ValueBoundary"
          description: The minimum number of values in a list. Must be an integer greater than or equal to 0 and less than or equal to MaxValues. Applies to all list types.
        MaxValues:
          $ref: "#/components/schemas/ValueBoundary"
          description: The maximum number of values in a list. Must be an integer greater than or equal to 0 and greater than or equal to MinValues. Applies to all list types.
        IgnoreCase:
          $ref: "#/components/schemas/Boolean"
          description: Boolean that defaults to false. Applies to text lists and text primary attributes. When true, enforces case-insensitive uniqueness for primary attributes and allows case-insensitive lookups.
        Minimum:
          $ref: "#/components/schemas/PositiveAndNegativeDouble"
          description: The smallest inclusive numeric value for NUMBER value type. Cannot be provided when ExclusiveMinimum is also provided. Must be less than or equal to Maximum and less than ExclusiveMaximum. Applies to NUMBER and values within NUMBER_LIST.
        Maximum:
          $ref: "#/components/schemas/PositiveAndNegativeDouble"
          description: The largest inclusive numeric value for NUMBER value type. Can be provided alongside ExclusiveMaximum where both operate independently. Must be greater than or equal to Minimum and greater than ExclusiveMinimum. Applies to NUMBER and values within NUMBER_LIST.
        ExclusiveMinimum:
          $ref: "#/components/schemas/PositiveAndNegativeDouble"
          description: The smallest exclusive numeric value for NUMBER value type. Can be provided alongside Minimum where both operate independently. Must be less than ExclusiveMaximum and Maximum. Applies to NUMBER and values within NUMBER_LIST.
        ExclusiveMaximum:
          $ref: "#/components/schemas/PositiveAndNegativeDouble"
          description: The largest exclusive numeric value for NUMBER value type. Can be provided alongside Maximum where both operate independently. Must be greater than ExclusiveMinimum and Minimum. Applies to NUMBER and values within NUMBER_LIST.
        MultipleOf:
          $ref: "#/components/schemas/PositiveDouble"
          description: Specifies that numeric values must be multiples of this number. Must be greater than 0. The result of dividing a value by this multiple must result in an integer. Applies to NUMBER and values within NUMBER_LIST.
        Enum:
          $ref: "#/components/schemas/ValidationEnum"
          description: Defines enumeration constraints for attribute values. Can specify a list of allowed values and whether custom values are permitted beyond the enumerated list.
    LengthBoundary:
      type: integer
      minimum: 0
      maximum: 1000
    ValueBoundary:
      type: integer
      minimum: 0
      maximum: 100
    PositiveAndNegativeDouble:
      type: number
      format: double
    PositiveDouble:
      type: number
      format: double
      minimum: 0
    ValidationEnum:
      description: Defines enumeration validation for attribute values. Allows specifying a list of permitted values and whether custom values beyond the enumerated list are allowed.
      type: object
      properties:
        Strict:
          $ref: "#/components/schemas/Boolean"
          description: Boolean that defaults to false. When true, only values specified in the enum list are allowed. When false, custom values beyond the enumerated list are permitted.
        Values:
          $ref: "#/components/schemas/ValidationEnumValues"
          description: A list of predefined values that are allowed for this attribute. These values are always permitted regardless of the Strict setting.
    ValidationEnumValues:
      type: array
      items:
        $ref: "#/components/schemas/String"
    CreateDataTableAttributeResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/DataTableName"
          description: The name of the created attribute since it also serves as the identifier. This could be different than the parameter passed in since it will be trimmed for whitespace.
        AttributeId:
