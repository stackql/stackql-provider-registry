      description: Contains lock version information for different levels of a data table hierarchy. Used for optimistic locking to prevent concurrent modification conflicts. Each component has its own lock version that changes when that component is modified.
      type: object
      properties:
        DataTable:
          $ref: "#/components/schemas/String"
          description: The lock version for the data table itself. Used for optimistic locking and table versioning. Changes with each update to the table's metadata or structure.
        Attribute:
          $ref: "#/components/schemas/String"
          description: The lock version for a specific attribute. When the ValueLockLevel is ATTRIBUTE, this version changes when any value for the attribute changes. For other lock levels, it only changes when the attribute's properties are directly updated.
        PrimaryValues:
          $ref: "#/components/schemas/String"
          description: The lock version for a specific set of primary values (record). This includes the default record even if the table does not have any primary attributes. Used for record-level locking.
        Value:
          $ref: "#/components/schemas/String"
          description: The lock version for a specific value. Changes each time the individual value is modified. Used for the finest-grained locking control.
