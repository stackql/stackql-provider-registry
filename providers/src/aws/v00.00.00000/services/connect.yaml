          description: The type of the view.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ViewsNextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page. The default MaxResult size is 100.
