    DescribeContactResponse:
      type: object
      properties:
        Contact:
          $ref: "#/components/schemas/Contact"
          description: Information about the contact.
    Contact:
      description: Contains information about a contact.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) for the contact.
        Id:
          $ref: "#/components/schemas/ContactId"
          description: The identifier for the contact.
        InitialContactId:
          $ref: "#/components/schemas/ContactId"
          description: If this contact is related to other contacts, this is the ID of the initial contact.
        PreviousContactId:
          $ref: "#/components/schemas/ContactId"
          description: If this contact is not the first contact, this is the ID of the previous contact.
        ContactAssociationId:
          $ref: "#/components/schemas/ContactId"
          description: This is the root contactId which is used as a unique identifier for all subsequent contacts in a contact tree.
        InitiationMethod:
          $ref: "#/components/schemas/ContactInitiationMethod"
          description: Indicates how the contact was initiated.
        Name:
          $ref: "#/components/schemas/Name"
          description: The name of the contact.
        Description:
          $ref: "#/components/schemas/Description"
          description: The description of the contact.
        Channel:
          $ref: "#/components/schemas/Channel"
          description: How the contact reached your contact center.
        QueueInfo:
          $ref: "#/components/schemas/QueueInfo"
          description: If this contact was queued, this contains information about the queue.
        AgentInfo:
          $ref: "#/components/schemas/AgentInfo"
          description: Information about the agent who accepted the contact.
        InitiationTimestamp:
          $ref: "#/components/schemas/timestamp"
          description: The date and time this contact was initiated, in UTC time. For INBOUND, this is when the contact arrived. For OUTBOUND, this is when the agent began dialing. For CALLBACK, this is when the callback contact was created. For TRANSFER and QUEUE_TRANSFER, this is when the transfer was initiated. For API, this is when the request arrived. For EXTERNAL_OUTBOUND, this is when the agent started dialing the external participant. For MONITOR, this is when the supervisor started listening to a contact.
        DisconnectTimestamp:
          $ref: "#/components/schemas/timestamp"
          description: The date and time that the customer endpoint disconnected from the current contact, in UTC time. In transfer scenarios, the DisconnectTimestamp of the previous contact indicates the date and time when that contact ended.
        LastUpdateTimestamp:
          $ref: "#/components/schemas/timestamp"
          description: The timestamp when contact was last updated.
        LastPausedTimestamp:
          $ref: "#/components/schemas/timestamp"
          description: The timestamp when the contact was last paused.
        LastResumedTimestamp:
          $ref: "#/components/schemas/timestamp"
          description: The timestamp when the contact was last resumed.
        RingStartTimestamp:
          $ref: "#/components/schemas/timestamp"
          description: The timestamp when ringing started for a campaign call.
        TotalPauseCount:
          $ref: "#/components/schemas/TotalPauseCount"
          description: Total pause count for a contact.
        TotalPauseDurationInSeconds:
          $ref: "#/components/schemas/TotalPauseDurationInSeconds"
          description: Total pause duration for a contact in seconds.
        ScheduledTimestamp:
          $ref: "#/components/schemas/timestamp"
          description: The timestamp, in Unix epoch time format, at which to start running the inbound flow.
        RelatedContactId:
          $ref: "#/components/schemas/ContactId"
          description: The contactId that is related to this contact.
        WisdomInfo:
          $ref: "#/components/schemas/WisdomInfo"
          description: Information about Amazon Connect Wisdom.
        CustomerId:
          $ref: "#/components/schemas/CustomerId"
          description: The customer's identification number. For example, the CustomerId may be a customer number from your CRM. You can create a Lambda function to pull the unique customer ID of the caller from your CRM system. If you enable Amazon Connect Voice ID capability, this attribute is populated with the CustomerSpeakerId of the caller.
        CustomerEndpoint:
          $ref: "#/components/schemas/EndpointInfo"
          description: The customer or external third party participant endpoint.
        SystemEndpoint:
          $ref: "#/components/schemas/EndpointInfo"
          description: The system endpoint. For INBOUND, this is the phone number or email address that the customer dialed. For OUTBOUND and EXTERNAL_OUTBOUND, this is the outbound caller ID number assigned to the outbound queue that is used to dial the customer. For callback, this shows up as Softphone for calls handled by agents with softphone.
        QueueTimeAdjustmentSeconds:
          $ref: "#/components/schemas/QueueTimeAdjustmentSeconds"
          description: An integer that represents the queue time adjust to be applied to the contact, in seconds (longer / larger queue time are routed preferentially). Cannot be specified if the QueuePriority is specified. Must be statically defined and a valid integer value.
        QueuePriority:
          $ref: "#/components/schemas/QueuePriority"
          description: An integer that represents the queue priority to be applied to the contact (lower priorities are routed preferentially). Cannot be specified if the QueueTimeAdjustmentSeconds is specified. Must be statically defined, must be larger than zero, and a valid integer value. Default Value is 5.
        Tags:
          type: object
          properties: {}
          description: Tags associated with the contact. This contains both Amazon Web Services generated and user-defined tags.
        ConnectedToSystemTimestamp:
          $ref: "#/components/schemas/timestamp"
          description: The timestamp when customer endpoint connected to Amazon Connect.
        RoutingCriteria:
          $ref: "#/components/schemas/RoutingCriteria"
          description: Latest routing criteria on the contact.
        Customer:
          $ref: "#/components/schemas/Customer"
          description: Information about the Customer on the contact.
        Campaign:
          $ref: "#/components/schemas/Campaign"
        AnsweringMachineDetectionStatus:
          $ref: "#/components/schemas/AnsweringMachineDetectionStatus"
          description: Indicates how an outbound campaign call is actually disposed if the contact is connected to Amazon Connect.
        CustomerVoiceActivity:
          $ref: "#/components/schemas/CustomerVoiceActivity"
          description: Information about customer’s voice activity.
        QualityMetrics:
          $ref: "#/components/schemas/QualityMetrics"
          description: Information about the quality of the participant's media connection.
        ChatMetrics:
          $ref: "#/components/schemas/ChatMetrics"
          description: Information about how agent, bot, and customer interact in a chat contact.
        DisconnectDetails:
          $ref: "#/components/schemas/DisconnectDetails"
          description: Information about the call disconnect experience.
        AdditionalEmailRecipients:
          $ref: "#/components/schemas/AdditionalEmailRecipients"
          description: List of additional email addresses for an email contact.
        SegmentAttributes:
          type: object
          properties: {}
          description: A set of system defined key-value pairs stored on individual contact segments using an attribute map. The attributes are standard Amazon Connect attributes and can be accessed in flows. Attribute keys can include only alphanumeric, -, and _ characters. This field can be used to show channel subtype. For example, connect:Guide or connect:SMS.
        Recordings:
          $ref: "#/components/schemas/Recordings"
          description: If recording was enabled, this is information about the recordings.
        DisconnectReason:
          $ref: "#/components/schemas/String"
          description: The disconnect reason for the contact. For a list and description of all the possible disconnect reasons by channel, see DisconnectReason under ContactTraceRecord in the Amazon Connect Administrator Guide.
        ContactEvaluations:
          type: object
          properties: {}
          description: Information about the contact evaluations where the key is the FormId, which is a unique identifier for the form.
        TaskTemplateInfo:
          $ref: "#/components/schemas/TaskTemplateInfoV2"
          description: If this contact was created using a task template, this contains information about the task template.
        ContactDetails:
          $ref: "#/components/schemas/ContactDetails"
          description: A map of string key/value pairs that contain user-defined attributes which are lightly typed within the contact. This object is used only for task contacts.
        OutboundStrategy:
          $ref: "#/components/schemas/OutboundStrategy"
          description: Information about the outbound strategy.
        Attributes:
          type: object
          properties: {}
          description: The attributes of the contact.
        NextContacts:
          $ref: "#/components/schemas/NextContacts"
          description: List of next contact entries for the contact.
        GlobalResiliencyMetadata:
          $ref: "#/components/schemas/GlobalResiliencyMetadata"
          description: Information about the global resiliency configuration for the contact, including traffic distribution details.
    QueueInfo:
      description: If this contact was queued, this contains information about the queue.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/QueueId"
          description: The unique identifier for the queue.
        EnqueueTimestamp:
          $ref: "#/components/schemas/timestamp"
