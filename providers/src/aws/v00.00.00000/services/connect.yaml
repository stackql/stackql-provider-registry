    AgentInfo:
      description: Information about the agent who accepted the contact.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/AgentResourceId"
          description: The identifier of the agent who accepted the contact.
        AcceptedByAgentTimestamp:
          $ref: "#/components/schemas/timestamp"
          description: The timestamp when the contact was accepted by the agent.
        PreviewEndTimestamp:
          $ref: "#/components/schemas/timestamp"
          description: The timestamp when the agent finished previewing the contact.
        ConnectedToAgentTimestamp:
          $ref: "#/components/schemas/timestamp"
          description: The timestamp when the contact was connected to the agent.
        AgentPauseDurationInSeconds:
          $ref: "#/components/schemas/AgentPauseDurationInSeconds"
          description: Agent pause duration for a contact in seconds.
        HierarchyGroups:
          $ref: "#/components/schemas/HierarchyGroups"
          description: The agent hierarchy groups for the agent.
        DeviceInfo:
          $ref: "#/components/schemas/DeviceInfo"
          description: Information regarding Agent’s device.
        Capabilities:
          $ref: "#/components/schemas/ParticipantCapabilities"
        AfterContactWorkDuration:
          $ref: "#/components/schemas/Duration"
          description: The difference in time, in whole seconds, between AfterContactWorkStartTimestamp and AfterContactWorkEndTimestamp.
        AfterContactWorkStartTimestamp:
          $ref: "#/components/schemas/timestamp"
          description: The date and time when the agent started doing After Contact Work for the contact, in UTC time.
        AfterContactWorkEndTimestamp:
          $ref: "#/components/schemas/timestamp"
          description: The date and time when the agent ended After Contact Work for the contact, in UTC time. In cases when agent finishes doing AfterContactWork for chat contacts and switches their activity status to offline or equivalent without clearing the contact in CCP, discrepancies may be noticed for AfterContactWorkEndTimestamp.
        AgentInitiatedHoldDuration:
