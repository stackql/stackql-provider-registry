      minLength: 1
      maxLength: 100
    DescribeAuthenticationProfileResponse:
      type: object
      properties:
        AuthenticationProfile:
          $ref: "#/components/schemas/AuthenticationProfile"
          description: The authentication profile object being described.
    AuthenticationProfile:
      description: This API is in preview release for Amazon Connect and is subject to change. To request access to this API, contact Amazon Web Services Support. Information about an authentication profile. An authentication profile is a resource that stores the authentication settings for users in your contact center. You use authentication profiles to set up IP address range restrictions and session timeouts. For more information, see Set IP address restrictions or session timeouts.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/AuthenticationProfileId"
          description: A unique identifier for the authentication profile.
        Arn:
          $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) for the authentication profile.
        Name:
          $ref: "#/components/schemas/AuthenticationProfileName"
          description: The name for the authentication profile.
        Description:
          $ref: "#/components/schemas/AuthenticationProfileDescription"
          description: The description for the authentication profile.
        AllowedIps:
          $ref: "#/components/schemas/IpCidrList"
          description: A list of IP address range strings that are allowed to access the Amazon Connect instance. For more information about how to configure IP addresses, see Configure IP address based access control in the Amazon Connect Administrator Guide.
        BlockedIps:
          $ref: "#/components/schemas/IpCidrList"
          description: A list of IP address range strings that are blocked from accessing the Amazon Connect instance. For more information about how to configure IP addresses, see Configure IP address based access control in the Amazon Connect Administrator Guide.
        IsDefault:
          $ref: "#/components/schemas/Boolean"
          description: Shows whether the authentication profile is the default authentication profile for the Amazon Connect instance. The default authentication profile applies to all agents in an Amazon Connect instance, unless overridden by another authentication profile.
        CreatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the authentication profile was created.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the authentication profile was last modified.
        LastModifiedRegion:
          $ref: "#/components/schemas/RegionName"
          description: The Amazon Web Services Region where the authentication profile was last modified.
        PeriodicSessionDuration:
          $ref: "#/components/schemas/AccessTokenDuration"
          description: The short lived session duration configuration for users logged in to Amazon Connect, in minutes. This value determines the maximum possible time before an agent is authenticated. For more information, see Configure the session duration in the Amazon Connect Administrator Guide.
        MaxSessionDuration:
          $ref: "#/components/schemas/RefreshTokenDuration"
          description: The long lived session duration for users logged in to Amazon Connect, in minutes. After this time period, users must log in again. For more information, see Configure the session duration in the Amazon Connect Administrator Guide.
        SessionInactivityDuration:
          $ref: "#/components/schemas/InactivityDuration"
          description: The period, in minutes, before an agent is automatically signed out of the contact center when they go inactive.
        SessionInactivityHandlingEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Determines if automatic logout on user inactivity is enabled.
    AuthenticationProfileName:
      type: string
      minLength: 1
      maxLength: 128
    AuthenticationProfileDescription:
