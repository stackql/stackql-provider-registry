openapi: 3.0.0
info:
  version: "2017-08-08"
  title: Amazon Connect Service
  description: Amazon Connect Service
  x-serviceName: connect
  x-serviceAlias: connect
  x-protocol: rest-json
  x-apiVersion: "2017-08-08"
  x-endpointPrefix: connect
  x-jsonVersion: "1.1"
servers:
  - url: https://connect.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for connect
paths:
  /evaluation-forms/{instance_id}/{evaluation_form_id}/activate:
    post:
      operationId: ActivateEvaluationForm
      description: Activates an evaluation form in the specified Amazon Connect instance. After the evaluation form is activated, it is available to start new evaluations based on the form.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
        - name: evaluation_form_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The unique identifier for the evaluation form.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                EvaluationFormVersion:
                  $ref: "#/components/schemas/VersionNumber"
              required:
                - EvaluationFormVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateEvaluationFormResponse"
  /analytics-data/instance/{instance_id}/association:
    put:
      operationId: AssociateAnalyticsDataSet
      description: Associates the specified dataset for a Amazon Connect instance with the target account. You can associate only one dataset in a single call.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DataSetId:
                  $ref: "#/components/schemas/DataSetId"
                TargetAccountId:
                  $ref: "#/components/schemas/AWSAccountId"
              required:
                - DataSetId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateAnalyticsDataSetResponse"
    post:
      operationId: DisassociateAnalyticsDataSet
      description: Removes the dataset ID associated with a given Amazon Connect instance.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DataSetId:
                  $ref: "#/components/schemas/DataSetId"
                TargetAccountId:
                  $ref: "#/components/schemas/AWSAccountId"
              required:
                - DataSetId
      responses:
        "200":
          description: Success
    get:
      operationId: ListAnalyticsDataAssociations
      description: Lists the association status of requested dataset ID for a given Amazon Connect instance.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
        - name: DataSetId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DataSetId"
          description: The identifier of the dataset to get the association status.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResult1000"
          description: The maximum number of results to return per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAnalyticsDataAssociationsResponse"
  /instance/{instance_id}/approved-origin:
    put:
      operationId: AssociateApprovedOrigin
      description: This API is in preview release for Amazon Connect and is subject to change. Associates an approved origin to an Amazon Connect instance.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Origin:
                  $ref: "#/components/schemas/Origin"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
    delete:
      operationId: DisassociateApprovedOrigin
      description: This API is in preview release for Amazon Connect and is subject to change. Revokes access to integrated applications from Amazon Connect.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
        - name: origin
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Origin"
          description: The domain URL of the integrated application.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If not provided, the Amazon Web Services SDK populates this field. For more information about idempotency, see Making retries safe with idempotent APIs.
      responses:
        "200":
          description: Success
  /instance/{instance_id}/bot:
    put:
      operationId: AssociateBot
      description: This API is in preview release for Amazon Connect and is subject to change. Allows the specified Amazon Connect instance to access the specified Amazon Lex or Amazon Lex V2 bot.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                LexBot:
                  $ref: "#/components/schemas/LexBot"
                LexV2Bot:
                  $ref: "#/components/schemas/LexV2Bot"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
    post:
      operationId: DisassociateBot
      description: This API is in preview release for Amazon Connect and is subject to change. Revokes authorization from the specified instance to access the specified Amazon Lex or Amazon Lex V2 bot.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                LexBot:
                  $ref: "#/components/schemas/LexBot"
                LexV2Bot:
                  $ref: "#/components/schemas/LexV2Bot"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
  /contacts/{instance_id}/{contact_id}/associate-user:
    post:
      operationId: AssociateContactWithUser
      description: "Associates a queued contact with an agent. Use cases Following are common uses cases for this API: Programmatically assign queued contacts to available users. Leverage the IAM context key connect:PreferredUserArn to restrict contact association to specific preferred user. Important things to know Use this API with chat, email, and task contacts. It does not support voice contacts. Use it to associate contacts with users regardless of their current state, including custom states. Ensure your application logic accounts for user availability before making associations. It honors the IAM context key connect:PreferredUserArn to prevent unauthorized contact associations. It respects the IAM context key connect:PreferredUserArn to enforce authorization controls and prevent unauthorized contact associations. Verify that your IAM policies are properly configured to support your intended use cases. The service quota Queues per routing profile per instance applies to manually assigned queues, too. For more information about this quota, see Amazon Connect quotas in the Amazon Connect Administrator Guide. Endpoints: See Amazon Connect endpoints and quotas."
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
        - name: contact_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ContactId"
          description: The identifier of the contact in this instance of Amazon Connect.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                UserId:
                  $ref: "#/components/schemas/AgentResourceId"
              required:
                - UserId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateContactWithUserResponse"
  /default-vocabulary/{instance_id}/{language_code}:
    put:
      operationId: AssociateDefaultVocabulary
      description: Associates an existing vocabulary as the default. Contact Lens for Amazon Connect uses the vocabulary in post-call and real-time analysis sessions for the given language.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
        - name: language_code
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VocabularyLanguageCode"
          description: The language code of the vocabulary entries. For a list of languages and their corresponding language codes, see What is Amazon Transcribe?
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                VocabularyId:
                  $ref: "#/components/schemas/VocabularyId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateDefaultVocabularyResponse"
  /email-addresses/{instance_id}/{email_address_id}/associate-alias:
    post:
      operationId: AssociateEmailAddressAlias
      description: "Associates an email address alias with an existing email address in an Amazon Connect instance. This creates a forwarding relationship where emails sent to the alias email address are automatically forwarded to the primary email address. Use cases Following are common uses cases for this API: Unified customer support: Create multiple entry points (for example, support@example.com, help@example.com, customercare@example.com) that all forward to a single agent queue for streamlined management. Department consolidation: Forward emails from legacy department addresses (for example, sales@example.com, info@example.com) to a centralized customer service email during organizational restructuring. Brand management: Enable you to use familiar brand-specific email addresses that forward to the appropriate Amazon Connect instance email address. Important things to know Each email address can have a maximum of one alias. You cannot create multiple aliases for the same email address. If the alias email address already receives direct emails, it continues to receive direct emails plus forwarded emails. You cannot chain email aliases together (that is, create an alias of an alias). AssociateEmailAddressAlias does not return the following information: A confirmation of the alias relationship details (you must call DescribeEmailAddress to verify). The timestamp of when the association occurred. The status of the forwarding configuration. Endpoints: See Amazon Connect endpoints and quotas. Related operations DisassociateEmailAddressAlias: Removes the alias association between two email addresses in an Amazon Connect instance. DescribeEmailAddress: View current alias configurations for an email address. SearchEmailAddresses: Find email addresses and their alias relationships across an instance. CreateEmailAddress: Create new email addresses that can participate in alias relationships. DeleteEmailAddress: Remove email addresses (automatically removes any alias relationships). UpdateEmailAddressMetadata: Modify email address properties (does not affect alias relationships)."
      parameters:
        - name: email_address_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EmailAddressId"
          description: The identifier of the email address.
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AliasConfiguration:
                  $ref: "#/components/schemas/AliasConfiguration"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - AliasConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateEmailAddressAliasResponse"
  /flow-associations/{instance_id}:
    put:
      operationId: AssociateFlow
      description: Associates a connect resource to a flow.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceId:
                  $ref: "#/components/schemas/ARN"
                FlowId:
                  $ref: "#/components/schemas/ARN"
                ResourceType:
                  $ref: "#/components/schemas/FlowAssociationResourceType"
              required:
                - ResourceId
                - FlowId
                - ResourceType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateFlowResponse"
  /hours-of-operations/{instance_id}/{hours_of_operation_id}/associate-hours:
    post:
      operationId: AssociateHoursOfOperations
      description: Associates a set of hours of operations with another hours of operation. Refer to Administrator Guide here for more information on inheriting overrides from parent hours of operation(s).
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
        - name: hours_of_operation_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/HoursOfOperationId"
          description: The identifier of the child hours of operation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ParentHoursOfOperationConfigs:
                  $ref: "#/components/schemas/ParentHoursOfOperationConfigList"
              required:
                - ParentHoursOfOperationConfigs
      responses:
        "200":
          description: Success
  /instance/{instance_id}/storage-config:
    put:
      operationId: AssociateInstanceStorageConfig
      description: This API is in preview release for Amazon Connect and is subject to change. Associates a storage resource type for the first time. You can only associate one type of storage configuration in a single call. This means, for example, that you can't define an instance with multiple S3 buckets for storing chat transcripts. This API does not create a resource that doesn't exist. It only associates it to the instance. Ensure that the resource being specified in the storage configuration, like an S3 bucket, exists when being used for association.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceType:
                  $ref: "#/components/schemas/InstanceStorageResourceType"
                StorageConfig:
                  $ref: "#/components/schemas/InstanceStorageConfig"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - ResourceType
                - StorageConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateInstanceStorageConfigResponse"
  /instance/{instance_id}/lambda-function:
    put:
      operationId: AssociateLambdaFunction
      description: This API is in preview release for Amazon Connect and is subject to change. Allows the specified Amazon Connect instance to access the specified Lambda function.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                FunctionArn:
                  $ref: "#/components/schemas/FunctionArn"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - FunctionArn
      responses:
        "200":
          description: Success
    delete:
      operationId: DisassociateLambdaFunction
      description: This API is in preview release for Amazon Connect and is subject to change. Remove the Lambda function from the dropdown options available in the relevant flow blocks.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance..
        - name: functionArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/FunctionArn"
          description: The Amazon Resource Name (ARN) of the Lambda function being disassociated.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If not provided, the Amazon Web Services SDK populates this field. For more information about idempotency, see Making retries safe with idempotent APIs.
      responses:
        "200":
          description: Success
  /instance/{instance_id}/lex-bot:
    put:
      operationId: AssociateLexBot
      description: This API is in preview release for Amazon Connect and is subject to change. Allows the specified Amazon Connect instance to access the specified Amazon Lex V1 bot. This API only supports the association of Amazon Lex V1 bots.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                LexBot:
                  $ref: "#/components/schemas/LexBot"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - LexBot
      responses:
        "200":
          description: Success
    delete:
      operationId: DisassociateLexBot
      description: This API is in preview release for Amazon Connect and is subject to change. Revokes authorization from the specified instance to access the specified Amazon Lex bot.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
        - name: botName
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the Amazon Lex bot. Maximum character limit of 50.
        - name: lexRegion
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/LexRegion"
          description: The Amazon Web Services Region in which the Amazon Lex bot has been created.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If not provided, the Amazon Web Services SDK populates this field. For more information about idempotency, see Making retries safe with idempotent APIs.
      responses:
        "200":
          description: Success
  /phone-number/{phone_number_id}/contact-flow:
    put:
      operationId: AssociatePhoneNumberContactFlow
      description: Associates a flow with a phone number claimed to your Amazon Connect instance. If the number is claimed to a traffic distribution group, and you are calling this API using an instance in the Amazon Web Services Region where the traffic distribution group was created, you can use either a full phone number ARN or UUID value for the PhoneNumberId URI request parameter. However, if the number is claimed to a traffic distribution group and you are calling this API using an instance in the alternate Amazon Web Services Region associated with the traffic distribution group, you must provide a full phone number ARN. If a UUID is provided in this scenario, you will receive a ResourceNotFoundException.
      parameters:
        - name: phone_number_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PhoneNumberId"
          description: A unique identifier for the phone number.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                InstanceId:
                  $ref: "#/components/schemas/InstanceId"
                ContactFlowId:
                  $ref: "#/components/schemas/ContactFlowId"
              required:
                - InstanceId
                - ContactFlowId
      responses:
        "200":
          description: Success
    delete:
      operationId: DisassociatePhoneNumberContactFlow
      description: Removes the flow association from a phone number claimed to your Amazon Connect instance. If the number is claimed to a traffic distribution group, and you are calling this API using an instance in the Amazon Web Services Region where the traffic distribution group was created, you can use either a full phone number ARN or UUID value for the PhoneNumberId URI request parameter. However, if the number is claimed to a traffic distribution group and you are calling this API using an instance in the alternate Amazon Web Services Region associated with the traffic distribution group, you must provide a full phone number ARN. If a UUID is provided in this scenario, you will receive a ResourceNotFoundException.
      parameters:
        - name: phone_number_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PhoneNumberId"
          description: A unique identifier for the phone number.
        - name: instanceId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      responses:
        "200":
          description: Success
  /queues/{instance_id}/{queue_id}/associate-email-addresses:
    post:
      operationId: AssociateQueueEmailAddresses
      description: Associates a set of email addresses with a queue to enable agents to select different "From" (system) email addresses when replying to inbound email contacts or initiating outbound email contacts. This allows agents to handle email contacts across different brands and business units within the same queue. Important things to know You can associate up to 49 additional email addresses with a single queue, plus 1 default outbound email address, for a total of 50. The email addresses must already exist in the Amazon Connect instance before they can be associated with a queue. Agents will be able to select from these associated email addresses when handling email contacts in the queue. For inbound email contacts, agents can select from email addresses associated with the queue where the contact was accepted. For outbound email contacts, agents can select from email addresses associated with their default outbound queue configured in their routing profile.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
        - name: queue_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/QueueId"
          description: The identifier for the queue.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                EmailAddressesConfig:
                  $ref: "#/components/schemas/EmailAddressConfigList"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - EmailAddressesConfig
      responses:
        "200":
          description: Success
  /queues/{instance_id}/{queue_id}/associate-quick-connects:
    post:
      operationId: AssociateQueueQuickConnects
      description: Associates a set of quick connects with a queue.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
        - name: queue_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/QueueId"
          description: The identifier for the queue.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                QuickConnectIds:
                  $ref: "#/components/schemas/QuickConnectsList"
              required:
                - QuickConnectIds
      responses:
        "200":
          description: Success
  /routing-profiles/{instance_id}/{routing_profile_id}/associate-queues:
    post:
      operationId: AssociateRoutingProfileQueues
      description: Associates a set of queues with a routing profile.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
        - name: routing_profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RoutingProfileId"
          description: The identifier of the routing profile.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                QueueConfigs:
                  $ref: "#/components/schemas/RoutingProfileQueueConfigList"
                ManualAssignmentQueueConfigs:
                  $ref: "#/components/schemas/RoutingProfileManualAssignmentQueueConfigList"
      responses:
        "200":
          description: Success
  /instance/{instance_id}/security-key:
    put:
      operationId: AssociateSecurityKey
      description: This API is in preview release for Amazon Connect and is subject to change. Associates a security key to the instance.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Key:
                  $ref: "#/components/schemas/PEM"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
