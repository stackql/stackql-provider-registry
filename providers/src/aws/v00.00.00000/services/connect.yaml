                Description:
                  $ref: "#/components/schemas/Description"
                References:
                  $ref: "#/components/schemas/ContactReferences"
                RelatedContactId:
                  $ref: "#/components/schemas/ContactId"
                DestinationPhoneNumber:
                  $ref: "#/components/schemas/PhoneNumber"
                ContactFlowId:
                  $ref: "#/components/schemas/ContactFlowId"
                InstanceId:
