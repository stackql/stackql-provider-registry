      description: Updates the default outbound queue of a routing profile.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
        - name: routing_profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RoutingProfileId"
          description: The identifier of the routing profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DefaultOutboundQueueId:
                  $ref: "#/components/schemas/QueueId"
              required:
                - DefaultOutboundQueueId
      responses:
        "200":
          description: Success
  /routing-profiles/{instance_id}/{routing_profile_id}/name:
    post:
      operationId: UpdateRoutingProfileName
      description: Updates the name and description of a routing profile. The request accepts the following data in JSON format. At least Name or Description must be provided.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
        - name: routing_profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RoutingProfileId"
          description: The identifier of the routing profile.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/RoutingProfileName"
                Description:
                  $ref: "#/components/schemas/RoutingProfileDescription"
      responses:
        "200":
          description: Success
  /users/{instance_id}/{user_id}/config:
    post:
      operationId: UpdateUserConfig
      description: Updates the configuration settings for the specified user, including per-channel auto-accept and after contact work (ACW) timeout settings. This operation replaces the UpdateUserPhoneConfig API. While UpdateUserPhoneConfig applies the same ACW timeout to all channels, UpdateUserConfig allows you to set different auto-accept and ACW timeout values for each channel type.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The identifier of the user account.
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                AutoAcceptConfigs:
                  $ref: "#/components/schemas/AutoAcceptConfigs"
                AfterContactWorkConfigs:
                  $ref: "#/components/schemas/AfterContactWorkConfigs"
                PhoneNumberConfigs:
                  $ref: "#/components/schemas/PhoneNumberConfigs"
                PersistentConnectionConfigs:
                  $ref: "#/components/schemas/PersistentConnectionConfigs"
                VoiceEnhancementConfigs:
                  $ref: "#/components/schemas/VoiceEnhancementConfigs"
      responses:
        "200":
          description: Success
  /users/{instance_id}/{user_id}/hierarchy:
    post:
      operationId: UpdateUserHierarchy
      description: Assigns the specified hierarchy group to the specified user.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The identifier of the user account.
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                HierarchyGroupId:
                  $ref: "#/components/schemas/HierarchyGroupId"
      responses:
        "200":
          description: Success
  /user-hierarchy-groups/{instance_id}/{hierarchy_group_id}/name:
    post:
      operationId: UpdateUserHierarchyGroupName
      description: Updates the name of the user hierarchy group.
      parameters:
        - name: hierarchy_group_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/HierarchyGroupId"
          description: The identifier of the hierarchy group.
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/HierarchyGroupName"
      responses:
        "200":
          description: Success
  /users/{instance_id}/{user_id}/identity-info:
    post:
      operationId: UpdateUserIdentityInfo
      description: Updates the identity information for the specified user. We strongly recommend limiting who has the ability to invoke UpdateUserIdentityInfo. Someone with that ability can change the login credentials of other users by changing their email address. This poses a security risk to your organization. They can change the email address of a user to the attacker's email address, and then reset the password through email. For more information, see Best Practices for Security Profiles in the Amazon Connect Administrator Guide.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The identifier of the user account.
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                IdentityInfo:
                  $ref: "#/components/schemas/UserIdentityInfo"
              required:
                - IdentityInfo
      responses:
        "200":
          description: Success
  /users/{instance_id}/{user_id}/notifications/{notification_id}:
    post:
      operationId: UpdateUserNotificationStatus
      description: Updates the status of a notification for a specific user, such as marking it as read or hidden. Users can only update notification status for notifications that have been sent to them. READ status deprioritizes the notification and greys it out, while HIDDEN status removes it from the notification widget.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
        - name: notification_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NotificationId"
          description: The unique identifier for the notification.
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The identifier of the user whose notification status is being updated.
        - name: x-amz-last-modified-time
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the notification status was last modified. Used for cross-region replication and optimistic locking.
        - name: x-amz-last-modified-region
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/RegionName"
          description: The AWS Region where the notification status was last modified. Used for cross-region replication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Status:
                  $ref: "#/components/schemas/NotificationStatus"
              required:
                - Status
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserNotificationStatusResponse"
  /users/{instance_id}/{user_id}/phone-config:
    post:
      operationId: UpdateUserPhoneConfig
      description: Updates the phone configuration settings for the specified user. We recommend using the UpdateUserConfig API, which supports additional functionality that is not available in the UpdateUserPhoneConfig API, such as voice enhancement settings and per-channel configuration for auto-accept and After Contact Work (ACW) timeouts. In comparison, the UpdateUserPhoneConfig API will always set the same ACW timeouts to all channels the user handles.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The identifier of the user account.
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PhoneConfig:
                  $ref: "#/components/schemas/UserPhoneConfig"
              required:
                - PhoneConfig
      responses:
        "200":
          description: Success
  /users/{instance_id}/{user_id}/routing-profile:
    post:
      operationId: UpdateUserRoutingProfile
      description: Assigns the specified routing profile to the specified user.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The identifier of the user account.
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RoutingProfileId:
                  $ref: "#/components/schemas/RoutingProfileId"
              required:
                - RoutingProfileId
      responses:
        "200":
          description: Success
  /users/{instance_id}/{user_id}/security-profiles:
    post:
      operationId: UpdateUserSecurityProfiles
      description: Assigns the specified security profiles to the specified user.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The identifier of the user account.
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SecurityProfileIds:
                  $ref: "#/components/schemas/SecurityProfileIds"
              required:
                - SecurityProfileIds
      responses:
        "200":
          description: Success
  /views/{instance_id}/{view_id}/metadata:
    post:
      operationId: UpdateViewMetadata
      description: Updates the view metadata. Note that either Name or Description must be provided.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ViewsInstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instanceId in the ARN of the instance.
        - name: view_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ViewId"
          description: The identifier of the view. Both ViewArn and ViewId can be used.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ViewName"
                Description:
                  $ref: "#/components/schemas/ViewDescription"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateViewMetadataResponse"
  /workspaces/{instance_id}/{workspace_id}/metadata:
    post:
      operationId: UpdateWorkspaceMetadata
      description: Updates the metadata of a workspace, such as its name and description.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The identifier of the workspace.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/WorkspaceName"
                Description:
                  $ref: "#/components/schemas/WorkspaceDescription"
                Title:
                  $ref: "#/components/schemas/WorkspaceTitle"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkspaceMetadataResponse"
  /workspaces/{instance_id}/{workspace_id}/theme:
    post:
      operationId: UpdateWorkspaceTheme
      description: Updates the theme configuration for a workspace, including colors and styling.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The identifier of the workspace.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Theme:
                  $ref: "#/components/schemas/WorkspaceTheme"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkspaceThemeResponse"
  /workspaces/{instance_id}/{workspace_id}/visibility:
    post:
      operationId: UpdateWorkspaceVisibility
      description: Updates the visibility setting of a workspace, controlling whether it is available to all users, assigned users only, or none.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The identifier of the Amazon Connect instance. You can find the instance ID in the Amazon Resource Name (ARN) of the instance.
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The identifier of the workspace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Visibility:
                  $ref: "#/components/schemas/Visibility"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkspaceVisibilityResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    InstanceId:
      type: string
      minLength: 1
      maxLength: 100
    ResourceId:
      type: string
      minLength: 1
      maxLength: 500
    VersionNumber:
      type: integer
    ActivateEvaluationFormResponse:
      type: object
      properties:
        EvaluationFormId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier for the evaluation form.
        EvaluationFormArn:
          $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) for the evaluation form resource.
        EvaluationFormVersion:
          $ref: "#/components/schemas/VersionNumber"
          description: A version of the evaluation form.
      required:
        - EvaluationFormId
        - EvaluationFormArn
        - EvaluationFormVersion
    ARN:
      type: string
    DataSetId:
      type: string
      minLength: 1
      maxLength: 255
    AWSAccountId:
      type: string
    AssociateAnalyticsDataSetResponse:
      type: object
      properties:
        DataSetId:
          $ref: "#/components/schemas/DataSetId"
          description: The identifier of the dataset that was associated.
        TargetAccountId:
          $ref: "#/components/schemas/AWSAccountId"
          description: The identifier of the target account.
        ResourceShareId:
          $ref: "#/components/schemas/String"
          description: The Resource Access Manager share ID that is generated.
        ResourceShareArn:
          $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) of the Resource Access Manager share.
    String:
      type: string
    Origin:
      type: string
      maxLength: 267
    ClientToken:
      type: string
      maxLength: 500
    LexBot:
      description: Configuration information of an Amazon Lex bot.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/BotName"
          description: The name of the Amazon Lex bot.
        LexRegion:
          $ref: "#/components/schemas/LexRegion"
          description: The Amazon Web Services Region where the Amazon Lex bot was created.
      required:
        - Name
        - LexRegion
    BotName:
      type: string
      maxLength: 50
    LexRegion:
      type: string
      maxLength: 60
    LexV2Bot:
      description: Configuration information of an Amazon Lex V2 bot.
      type: object
      properties:
        AliasArn:
          $ref: "#/components/schemas/AliasArn"
          description: The Amazon Resource Name (ARN) of the Amazon Lex V2 bot.
    AliasArn:
      type: string
      minLength: 1
      maxLength: 100
    ContactId:
      type: string
      minLength: 1
      maxLength: 256
    AgentResourceId:
      type: string
      minLength: 1
      maxLength: 256
    AssociateContactWithUserResponse:
      type: object
    VocabularyLanguageCode:
      type: string
      enum:
        - ar-AE
        - de-CH
        - de-DE
        - en-AB
        - en-AU
        - en-GB
        - en-IE
        - en-IN
        - en-US
        - en-WL
        - es-ES
        - es-US
        - fr-CA
        - fr-FR
        - hi-IN
        - it-IT
        - ja-JP
        - ko-KR
        - pt-BR
        - pt-PT
        - zh-CN
        - en-NZ
        - en-ZA
        - ca-ES
        - da-DK
        - fi-FI
        - id-ID
        - ms-MY
        - nl-NL
        - no-NO
        - pl-PL
        - sv-SE
        - tl-PH
    VocabularyId:
      type: string
      minLength: 1
      maxLength: 500
    AssociateDefaultVocabularyResponse:
      type: object
    EmailAddressId:
      type: string
      minLength: 1
      maxLength: 500
    AliasConfiguration:
      description: Configuration information of an email alias.
      type: object
      properties:
        EmailAddressId:
          $ref: "#/components/schemas/EmailAddressId"
          description: The email address ID.
      required:
        - EmailAddressId
    AssociateEmailAddressAliasResponse:
      type: object
    FlowAssociationResourceType:
      type: string
      enum:
        - SMS_PHONE_NUMBER
        - INBOUND_EMAIL
        - OUTBOUND_EMAIL
        - ANALYTICS_CONNECTOR
        - WHATSAPP_MESSAGING_PHONE_NUMBER
    AssociateFlowResponse:
      type: object
    HoursOfOperationId:
      type: string
    ParentHoursOfOperationConfigList:
      type: array
      items:
        $ref: "#/components/schemas/ParentHoursOfOperationConfig"
    ParentHoursOfOperationConfig:
      description: Contains configuration for the parent hours of operation.
      type: object
      properties:
        HoursOfOperationId:
          $ref: "#/components/schemas/HoursOfOperationId"
          description: The identifier for the hours of operation.
    InstanceStorageResourceType:
      type: string
      enum:
        - CHAT_TRANSCRIPTS
        - CALL_RECORDINGS
        - SCHEDULED_REPORTS
        - MEDIA_STREAMS
        - CONTACT_TRACE_RECORDS
        - AGENT_EVENTS
        - REAL_TIME_CONTACT_ANALYSIS_SEGMENTS
        - ATTACHMENTS
        - CONTACT_EVALUATIONS
        - SCREEN_RECORDINGS
        - REAL_TIME_CONTACT_ANALYSIS_CHAT_SEGMENTS
        - REAL_TIME_CONTACT_ANALYSIS_VOICE_SEGMENTS
        - EMAIL_MESSAGES
    InstanceStorageConfig:
      description: The storage configuration for the instance.
      type: object
      properties:
        AssociationId:
          $ref: "#/components/schemas/AssociationId"
          description: The existing association identifier that uniquely identifies the resource type and storage config for the given instance ID.
        StorageType:
          $ref: "#/components/schemas/StorageType"
          description: A valid storage type.
        S3Config:
          $ref: "#/components/schemas/S3Config"
          description: The S3 bucket configuration.
        KinesisVideoStreamConfig:
          $ref: "#/components/schemas/KinesisVideoStreamConfig"
          description: The configuration of the Kinesis video stream.
        KinesisStreamConfig:
          $ref: "#/components/schemas/KinesisStreamConfig"
          description: The configuration of the Kinesis data stream.
        KinesisFirehoseConfig:
          $ref: "#/components/schemas/KinesisFirehoseConfig"
          description: The configuration of the Kinesis Firehose delivery stream.
      required:
        - StorageType
    AssociationId:
      type: string
      minLength: 1
      maxLength: 100
    StorageType:
      type: string
      enum:
        - S3
        - KINESIS_VIDEO_STREAM
        - KINESIS_STREAM
        - KINESIS_FIREHOSE
    S3Config:
      description: Information about the Amazon Simple Storage Service (Amazon S3) storage type.
      type: object
      properties:
        BucketName:
          $ref: "#/components/schemas/BucketName"
          description: The S3 bucket name.
        BucketPrefix:
          $ref: "#/components/schemas/Prefix"
          description: The S3 bucket prefix.
        EncryptionConfig:
          $ref: "#/components/schemas/EncryptionConfig"
          description: The Amazon S3 encryption configuration.
      required:
        - BucketName
        - BucketPrefix
    BucketName:
      type: string
      minLength: 1
      maxLength: 128
    Prefix:
      type: string
      minLength: 1
      maxLength: 128
    EncryptionConfig:
      description: The encryption configuration.
      type: object
      properties:
        EncryptionType:
          $ref: "#/components/schemas/EncryptionType"
          description: The type of encryption.
        KeyId:
          $ref: "#/components/schemas/KeyId"
          description: The full ARN of the encryption key. Be sure to provide the full ARN of the encryption key, not just the ID. Amazon Connect supports only KMS keys with the default key spec of SYMMETRIC_DEFAULT .
      required:
        - EncryptionType
        - KeyId
    EncryptionType:
      type: string
      enum:
        - KMS
    KeyId:
      type: string
      minLength: 1
      maxLength: 128
    KinesisVideoStreamConfig:
      description: Configuration information of a Kinesis video stream.
      type: object
      properties:
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: The prefix of the video stream.
        RetentionPeriodHours:
          $ref: "#/components/schemas/Hours"
          description: The number of hours data is retained in the stream. Kinesis Video Streams retains the data in a data store that is associated with the stream. The default value is 0, indicating that the stream does not persist data.
        EncryptionConfig:
          $ref: "#/components/schemas/EncryptionConfig"
          description: The encryption configuration.
      required:
        - Prefix
        - RetentionPeriodHours
        - EncryptionConfig
    Hours:
      type: integer
      minimum: 0
      maximum: 87600
    KinesisStreamConfig:
      description: Configuration information of a Kinesis data stream.
      type: object
      properties:
        StreamArn:
          $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) of the data stream.
      required:
        - StreamArn
    KinesisFirehoseConfig:
      description: Configuration information of a Kinesis Data Firehose delivery stream.
      type: object
      properties:
        FirehoseArn:
          $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) of the delivery stream.
      required:
        - FirehoseArn
    AssociateInstanceStorageConfigResponse:
      type: object
      properties:
        AssociationId:
          $ref: "#/components/schemas/AssociationId"
          description: The existing association identifier that uniquely identifies the resource type and storage config for the given instance ID.
    FunctionArn:
      type: string
      minLength: 1
      maxLength: 140
    PhoneNumberId:
      type: string
    ContactFlowId:
      type: string
      maxLength: 500
    QueueId:
      type: string
    EmailAddressConfigList:
      type: array
      items:
        $ref: "#/components/schemas/EmailAddressConfig"
    EmailAddressConfig:
      description: Configuration object that specifies an email address to be associated with a queue. This configuration contains the identifier of the email address that should be linked to the queue for routing email contacts.
      type: object
      properties:
        EmailAddressId:
          $ref: "#/components/schemas/EmailAddressId"
          description: The identifier of the email address that should be associated with the queue. This email address must already exist in the Amazon Connect instance and will be used to route incoming email contacts to the specified queue.
      required:
        - EmailAddressId
    QuickConnectsList:
      type: array
      items:
        $ref: "#/components/schemas/QuickConnectId"
    QuickConnectId:
      type: string
    RoutingProfileId:
      type: string
    RoutingProfileQueueConfigList:
      type: array
