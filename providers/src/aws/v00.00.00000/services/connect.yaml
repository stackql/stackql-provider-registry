                Password:
                  $ref: "#/components/schemas/Password"
                IdentityInfo:
                  $ref: "#/components/schemas/UserIdentityInfo"
                PhoneConfig:
                  $ref: "#/components/schemas/UserPhoneConfig"
                DirectoryUserId:
                  $ref: "#/components/schemas/DirectoryUserId"
                SecurityProfileIds:
