me: Occupancy QUEUE_ANSWER_TIME Unit: SECONDS Statistic: AVG UI name: Average queue answer time QUEUED_TIME Unit: SECONDS Statistic: MAX UI name: Minimum flow time SERVICE_LEVEL You can include up to 20 SERVICE_LEVEL metrics in a request. Unit: PERCENT Statistic: AVG Threshold: For ThresholdValue, enter any whole number from 1 to 604800 (inclusive), in seconds. For Comparison, you must enter LT (for "Less than"). UI name: Service level X'
        Threshold:
