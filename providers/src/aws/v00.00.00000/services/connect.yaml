      description: Information about the interval period to use for returning results.
      type: object
      properties:
        TimeZone:
          $ref: "#/components/schemas/String"
          description: The timezone applied to requested metrics.
        IntervalPeriod:
          $ref: "#/components/schemas/IntervalPeriod"
          description: "IntervalPeriod: An aggregated grouping applied to request metrics. Valid IntervalPeriod values are: FIFTEEN_MIN | THIRTY_MIN | HOUR | DAY | WEEK | TOTAL. For example, if IntervalPeriod is selected THIRTY_MIN, StartTime and EndTime differs by 1 day, then Amazon Connect returns 48 results in the response. Each result is aggregated by the THIRTY_MIN period. By default Amazon Connect aggregates results based on the TOTAL interval period. The following list describes restrictions on StartTime and EndTime based on what IntervalPeriod is requested. FIFTEEN_MIN: The difference between StartTime and EndTime must be less than 3 days. THIRTY_MIN: The difference between StartTime and EndTime must be less than 3 days. HOUR: The difference between StartTime and EndTime must be less than 3 days. DAY: The difference between StartTime and EndTime must be less than 35 days. WEEK: The difference between StartTime and EndTime must be less than 35 days. TOTAL: The difference between StartTime and EndTime must be less than 35 days."
    IntervalPeriod:
      type: string
      enum:
        - FIFTEEN_MIN
        - THIRTY_MIN
        - HOUR
        - DAY
        - WEEK
        - TOTAL
