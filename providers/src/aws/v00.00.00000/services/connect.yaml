      type: string
      enum:
        - ESTIMATED_WAIT_TIME
        - POSITION_IN_QUEUE
    GetContactMetricsResponse:
      type: object
      properties:
        MetricResults:
          $ref: "#/components/schemas/ContactMetricResults"
          description: A list of metric results containing the calculated values for each requested metric. Each result includes the metric name and its corresponding value. For example, POSITION_IN_QUEUE returns a numeric value representing the contact's position in queue, and ESTIMATED_WAIT_TIME returns the predicted wait time in seconds.
        Id:
          $ref: "#/components/schemas/ContactId"
          description: The unique identifier of the contact for which metrics were retrieved. This matches the ContactId provided in the request.
        Arn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the contact for which metrics were retrieved.
    ContactMetricResults:
      type: array
      items:
        $ref: "#/components/schemas/ContactMetricResult"
    ContactMetricResult:
      description: Contains the result of a requested metric for the contact. This object is returned as part of the GetContactMetrics response and includes both the metric name and its calculated value.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ContactMetricName"
          description: The name of the metric that was retrieved. This corresponds to the metric name specified in the request, such as POSITION_IN_QUEUE or ESTIMATED_WAIT_TIME.
        Value:
          $ref: "#/components/schemas/ContactMetricValue"
          description: The calculated value for the requested metric. This object contains the numeric result based on the contact's current state in the queue.
      required:
        - Name
        - Value
    ContactMetricValue:
      description: Contains the numeric value of a contact metric result.
      type: object
      properties:
        Number:
          $ref: "#/components/schemas/Double"
          description: The numeric value of the metric result. For POSITION_IN_QUEUE, this represents the contact's current position in the queue (e.g., 3.00 means third in line). For ESTIMATED_WAIT_TIME, this represents the predicted wait time in seconds (e.g., 120.00 means approximately 2 minutes).
    Filters:
      description: Contains the filter to apply when retrieving metrics.
      type: object
      properties:
        Queues:
          $ref: "#/components/schemas/Queues"
          description: The queues to use to filter the metrics. You should specify at least one queue, and can specify up to 100 queues per request. The GetCurrentMetricsData API in particular requires a queue when you include a Filter in your request.
        Channels:
          $ref: "#/components/schemas/Channels"
          description: The channel to use to filter the metrics.
        RoutingProfiles:
          $ref: "#/components/schemas/RoutingProfiles"
          description: A list of up to 100 routing profile IDs or ARNs.
        RoutingStepExpressions:
          $ref: "#/components/schemas/RoutingExpressions"
          description: A list of expressions as a filter, in which an expression is an object of a step in a routing criteria.
        AgentStatuses:
          $ref: "#/components/schemas/AgentStatuses"
          description: A list of up to 50 agent status IDs or ARNs.
        Subtypes:
          $ref: "#/components/schemas/Subtypes"
          description: A list of up to 10 subtypes can be provided.
        ValidationTestTypes:
          $ref: "#/components/schemas/ValidationTestTypes"
          description: A list of up to 10 validationTestTypes can be provided.
