    post:
      operationId: GetMetricDataV2
      description: "Gets metric data from the specified Amazon Connect instance. GetMetricDataV2 offers more features than GetMetricData, the previous version of this API. It has new metrics, offers filtering at a metric level, and offers the ability to filter and group data by channels, queues, routing profiles, agents, and agent hierarchy levels. It can retrieve historical data for the last 3 months, at varying intervals. It does not support agent queues. For a description of the historical metrics that are supported by GetMetricDataV2 and GetMetricData, see Metrics definitions in the Amazon Connect Administrator Guide. When you make a successful API request, you can expect the following metric values in the response: Metric value is null: The calculation cannot be performed due to divide by zero or insufficient data Metric value is a number (including 0) of defined type: The number provided is the calculation result MetricResult list is empty: The request cannot find any data in the system The following guidelines can help you work with the API: Each dimension in the metric response must contain a value Each item in MetricResult must include all requested metrics If the response is slow due to large result sets, try these approaches: Narrow the time range of your request Add filters to reduce the amount of data returned"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ARN"
                StartTime:
                  $ref: "#/components/schemas/Timestamp"
                EndTime:
                  $ref: "#/components/schemas/Timestamp"
                Interval:
                  $ref: "#/components/schemas/IntervalDetails"
                Filters:
                  $ref: "#/components/schemas/FiltersV2List"
                Groupings:
                  $ref: "#/components/schemas/GroupingsV2"
                Metrics:
                  $ref: "#/components/schemas/MetricsV2"
                NextToken:
                  $ref: "#/components/schemas/NextToken2500"
                MaxResults:
                  $ref: "#/components/schemas/MaxResult100"
              required:
                - ResourceArn
                - StartTime
                - EndTime
                - Filters
                - Metrics
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMetricDataV2Response"
