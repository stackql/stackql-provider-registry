    DescribeDataTableResponse:
      type: object
      properties:
        DataTable:
          $ref: "#/components/schemas/DataTable"
          description: The complete data table information including metadata, configuration, and versioning details.
      required:
        - DataTable
    DataTable:
      description: Represents a data table in Amazon Connect. A data table is a JSON-like data structure where attributes and values are dynamically set by customers. Customers can reference table values within call flows, applications, views, and workspaces to pinpoint dynamic configuration that changes their contact center's behavior in a predetermined and safe way.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/DataTableName"
          description: The human-readable name of the data table. Must be unique within the instance and conform to Connect naming standards.
        Id:
          $ref: "#/components/schemas/DataTableId"
          description: The unique identifier for the data table. Does not include version aliases.
        Arn:
          $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) for the data table. Does not include version aliases.
        TimeZone:
          $ref: "#/components/schemas/TimeZone"
          description: The IANA timezone identifier used when resolving time based dynamic values. Required even if no time slices are specified.
        Description:
          $ref: "#/components/schemas/DataTableDescription"
          description: An optional description of the data table's purpose and contents.
        ValueLockLevel:
          $ref: "#/components/schemas/DataTableLockLevel"
          description: The data level that concurrent value edits are locked on. One of DATA_TABLE, PRIMARY_VALUE, ATTRIBUTE, VALUE, and NONE. Determines how concurrent edits are handled when multiple users attempt to modify values simultaneously.
        LockVersion:
          $ref: "#/components/schemas/DataTableLockVersion"
          description: The lock version information used for optimistic locking and table versioning. Changes with each update to prevent concurrent modification conflicts.
        Version:
          $ref: "#/components/schemas/DataTableVersion"
          description: A unique identifier and alias for customer managed versions (not $LATEST or $SAVED).
        VersionDescription:
          $ref: "#/components/schemas/DataTableDescription"
          description: A description of the customer managed version.
        Status:
          $ref: "#/components/schemas/DataTableStatus"
          description: The current status of the data table. One of PUBLISHED or SAVED.
        CreatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the data table was created.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the data table or any of its properties were last modified.
        LastModifiedRegion:
          $ref: "#/components/schemas/RegionName"
          description: The Amazon Web Services Region where the data table was last modified, used for region replication.
        Tags:
          type: object
          properties: {}
          description: Key-value pairs for attribute based access control (TBAC or ABAC) and organization.
      required:
        - Name
        - Id
        - Arn
        - TimeZone
        - LastModifiedTime
    DataTableVersion:
      type: string
      minLength: 0
      maxLength: 128
    DescribeDataTableAttributeResponse:
      type: object
      properties:
        Attribute:
          $ref: "#/components/schemas/DataTableAttribute"
          description: The complete attribute information including configuration, validation rules, lock version, and metadata.
      required:
        - Attribute
    DataTableAttribute:
      description: Represents an attribute (column) in a data table. Attributes define the schema and validation rules for values that can be stored in the table. They specify the data type, constraints, and whether the attribute is used as a primary key for record identification.
      type: object
      properties:
        AttributeId:
          $ref: "#/components/schemas/DataTableId"
          description: The unique identifier for the attribute within the data table.
        Name:
          $ref: "#/components/schemas/DataTableName"
          description: The human-readable name of the attribute. Must be unique within the data table and conform to Connect naming standards.
        ValueType:
          $ref: "#/components/schemas/DataTableAttributeValueType"
          description: The type of value allowed for this attribute. Must be one of TEXT, TEXT_LIST, NUMBER, NUMBER_LIST, or BOOLEAN. Determines how values are validated and processed.
        Description:
          $ref: "#/components/schemas/DataTableDescription"
          description: An optional description explaining the purpose and usage of this attribute.
        DataTableId:
          $ref: "#/components/schemas/DataTableId"
          description: The unique identifier of the data table that contains this attribute.
        DataTableArn:
          $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) of the data table that contains this attribute.
        Primary:
          $ref: "#/components/schemas/Boolean"
          description: Boolean indicating whether this attribute is used as a primary key for record identification. Primary attributes must have unique value combinations and cannot contain expressions.
        Version:
          $ref: "#/components/schemas/DataTableVersion"
          description: The version identifier for this attribute, used for versioning and change tracking.
        LockVersion:
          $ref: "#/components/schemas/DataTableLockVersion"
          description: The lock version for this attribute, used for optimistic locking to prevent concurrent modification conflicts.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when this attribute was last modified.
        LastModifiedRegion:
          $ref: "#/components/schemas/RegionName"
          description: The Amazon Web Services Region where this attribute was last modified, used for region replication.
        Validation:
          $ref: "#/components/schemas/Validation"
          description: The validation rules applied to values of this attribute. Based on JSON Schema Draft 2020-12 with additional Connect-specific validations for data integrity.
      required:
        - Name
        - ValueType
