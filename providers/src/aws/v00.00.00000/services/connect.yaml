                ScheduledTime:
                  $ref: "#/components/schemas/Timestamp"
                TaskTemplateId:
                  $ref: "#/components/schemas/TaskTemplateId"
                QuickConnectId:
                  $ref: "#/components/schemas/QuickConnectId"
                RelatedContactId:
                  $ref: "#/components/schemas/ContactId"
                SegmentAttributes:
                  $ref: "#/components/schemas/SegmentAttributes"
                Attachments:
                  $ref: "#/components/schemas/TaskAttachments"
              required:
                - InstanceId
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartTaskContactResponse"
