    ReplicationConfiguration:
      description: Details about the status of the replication of a source Amazon Connect instance across Amazon Web Services Regions. Use these details to understand the general status of a given replication. For information about why a replication process may fail, see Why a ReplicateInstance call fails in the Create a replica of your existing Amazon Connect instance topic in the Amazon Connect Administrator Guide.
      type: object
      properties:
        ReplicationStatusSummaryList:
          $ref: "#/components/schemas/ReplicationStatusSummaryList"
          description: A list of replication status summaries. The summaries contain details about the replication of configuration information for Amazon Connect resources, for each Amazon Web Services Region.
        SourceRegion:
          $ref: "#/components/schemas/AwsRegion"
          description: The Amazon Web Services Region where the source Amazon Connect instance was created. This is the Region where the ReplicateInstance API was called to start the replication process.
        GlobalSignInEndpoint:
          $ref: "#/components/schemas/GlobalSignInEndpoint"
          description: The URL that is used to sign-in to your Amazon Connect instance according to your traffic distribution group configuration. For more information about sign-in and traffic distribution groups, see Important things to know in the Create traffic distribution groups topic in the Amazon Connect Administrator Guide.
    ReplicationStatusSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/ReplicationStatusSummary"
    ReplicationStatusSummary:
      description: Status information about the replication process, where you use the ReplicateInstance API to create a replica of your Amazon Connect instance in another Amazon Web Services Region. For more information, see Set up Amazon Connect Global Resiliency in the Amazon Connect Administrator Guide.
      type: object
      properties:
        Region:
          $ref: "#/components/schemas/AwsRegion"
          description: The Amazon Web Services Region. This can be either the source or the replica Region, depending where it appears in the summary list.
        ReplicationStatus:
          $ref: "#/components/schemas/InstanceReplicationStatus"
          description: The state of the replication.
        ReplicationStatusReason:
          $ref: "#/components/schemas/ReplicationStatusReason"
          description: A description of the replication status. Use this information to resolve any issues that are preventing the successful replication of your Amazon Connect instance to another Region.
