openapi: 3.0.0
info:
  version: "2016-02-16"
  title: Amazon Inspector
  description: Amazon Inspector
  x-serviceName: inspector
  x-serviceAlias: inspector
  x-protocol: json
  x-apiVersion: "2016-02-16"
  x-endpointPrefix: inspector
  x-targetPrefix: InspectorService
  x-jsonVersion: "1.1"
servers:
  - url: https://inspector.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for inspector
paths:
  /AddAttributesToFindings:
    post:
      operationId: AddAttributesToFindings
      description: Assigns attributes (key and value pairs) to the findings that are specified by the ARNs of the findings.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.AddAttributesToFindings
            default: InspectorService.AddAttributesToFindings
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                findingArns:
                  $ref: "#/components/schemas/AddRemoveAttributesFindingArnList"
                  description: The ARNs that specify the findings that you want to assign attributes to.
                attributes:
                  $ref: "#/components/schemas/UserAttributeList"
                  description: The array of attributes that you want to assign to specified findings.
              required:
                - findingArns
                - attributes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddAttributesToFindingsResponse"
  /CreateAssessmentTarget:
    post:
      operationId: CreateAssessmentTarget
      description: Creates a new assessment target using the ARN of the resource group that is generated by CreateResourceGroup. If resourceGroupArn is not specified, all EC2 instances in the current AWS account and region are included in the assessment target. If the service-linked role isn’t already registered, this action also creates and registers a service-linked role to grant Amazon Inspector access to AWS Services needed to perform security assessments. You can create up to 50 assessment targets per AWS account. You can run up to 500 concurrent agents per AWS account. For more information, see Amazon Inspector Assessment Targets.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.CreateAssessmentTarget
            default: InspectorService.CreateAssessmentTarget
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                assessmentTargetName:
                  $ref: "#/components/schemas/AssessmentTargetName"
                  description: The user-defined name that identifies the assessment target that you want to create. The name must be unique within the AWS account.
                resourceGroupArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN that specifies the resource group that is used to create the assessment target. If resourceGroupArn is not specified, all EC2 instances in the current AWS account and region are included in the assessment target.
              required:
                - assessmentTargetName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssessmentTargetResponse"
  /CreateAssessmentTemplate:
    post:
      operationId: CreateAssessmentTemplate
      description: Creates an assessment template for the assessment target that is specified by the ARN of the assessment target. If the service-linked role isn’t already registered, this action also creates and registers a service-linked role to grant Amazon Inspector access to AWS Services needed to perform security assessments.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.CreateAssessmentTemplate
            default: InspectorService.CreateAssessmentTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                assessmentTargetArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN that specifies the assessment target for which you want to create the assessment template.
                assessmentTemplateName:
                  $ref: "#/components/schemas/AssessmentTemplateName"
                  description: The user-defined name that identifies the assessment template that you want to create. You can create several assessment templates for an assessment target. The names of the assessment templates that correspond to a particular assessment target must be unique.
                durationInSeconds:
                  $ref: "#/components/schemas/AssessmentRunDuration"
                  description: The duration of the assessment run in seconds.
                rulesPackageArns:
                  $ref: "#/components/schemas/AssessmentTemplateRulesPackageArnList"
                  description: The ARNs that specify the rules packages that you want to attach to the assessment template.
                userAttributesForFindings:
                  $ref: "#/components/schemas/UserAttributeList"
                  description: The user-defined attributes that are assigned to every finding that is generated by the assessment run that uses this assessment template. An attribute is a key and value pair (an Attribute object). Within an assessment template, each key must be unique.
              required:
                - assessmentTargetArn
                - assessmentTemplateName
                - durationInSeconds
                - rulesPackageArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssessmentTemplateResponse"
  /CreateExclusionsPreview:
    post:
      operationId: CreateExclusionsPreview
      description: Starts the generation of an exclusions preview for the specified assessment template. The exclusions preview lists the potential exclusions (ExclusionPreview) that Inspector can detect before it runs the assessment.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.CreateExclusionsPreview
            default: InspectorService.CreateExclusionsPreview
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                assessmentTemplateArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN that specifies the assessment template for which you want to create an exclusions preview.
              required:
                - assessmentTemplateArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateExclusionsPreviewResponse"
  /CreateResourceGroup:
    post:
      operationId: CreateResourceGroup
      description: Creates a resource group using the specified set of tags (key and value pairs) that are used to select the EC2 instances to be included in an Amazon Inspector assessment target. The created resource group is then used to create an Amazon Inspector assessment target. For more information, see CreateAssessmentTarget.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.CreateResourceGroup
            default: InspectorService.CreateResourceGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceGroupTags:
                  $ref: "#/components/schemas/ResourceGroupTags"
                  description: A collection of keys and an array of possible values, '[{"key":"key1","values":["Value1","Value2"]},{"key":"Key2","values":["Value3"]}]'. For example,'[{"key":"Name","values":["TestEC2Instance"]}]'.
              required:
                - resourceGroupTags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResourceGroupResponse"
  /DeleteAssessmentRun:
    post:
      operationId: DeleteAssessmentRun
      description: Deletes the assessment run that is specified by the ARN of the assessment run.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.DeleteAssessmentRun
            default: InspectorService.DeleteAssessmentRun
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                assessmentRunArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN that specifies the assessment run that you want to delete.
              required:
                - assessmentRunArn
      responses:
        "200":
          description: Success
  /DeleteAssessmentTarget:
    post:
      operationId: DeleteAssessmentTarget
      description: Deletes the assessment target that is specified by the ARN of the assessment target.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.DeleteAssessmentTarget
            default: InspectorService.DeleteAssessmentTarget
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                assessmentTargetArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN that specifies the assessment target that you want to delete.
              required:
                - assessmentTargetArn
      responses:
        "200":
          description: Success
  /DeleteAssessmentTemplate:
    post:
      operationId: DeleteAssessmentTemplate
      description: Deletes the assessment template that is specified by the ARN of the assessment template.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.DeleteAssessmentTemplate
            default: InspectorService.DeleteAssessmentTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                assessmentTemplateArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN that specifies the assessment template that you want to delete.
              required:
                - assessmentTemplateArn
      responses:
        "200":
          description: Success
  /DescribeAssessmentRuns:
    post:
      operationId: DescribeAssessmentRuns
      description: Describes the assessment runs that are specified by the ARNs of the assessment runs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.DescribeAssessmentRuns
            default: InspectorService.DescribeAssessmentRuns
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                assessmentRunArns:
                  $ref: "#/components/schemas/BatchDescribeArnList"
                  description: The ARN that specifies the assessment run that you want to describe.
              required:
                - assessmentRunArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAssessmentRunsResponse"
  /DescribeAssessmentTargets:
    post:
      operationId: DescribeAssessmentTargets
      description: Describes the assessment targets that are specified by the ARNs of the assessment targets.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.DescribeAssessmentTargets
            default: InspectorService.DescribeAssessmentTargets
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                assessmentTargetArns:
                  $ref: "#/components/schemas/BatchDescribeArnList"
                  description: The ARNs that specifies the assessment targets that you want to describe.
              required:
                - assessmentTargetArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAssessmentTargetsResponse"
  /DescribeAssessmentTemplates:
    post:
      operationId: DescribeAssessmentTemplates
      description: Describes the assessment templates that are specified by the ARNs of the assessment templates.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.DescribeAssessmentTemplates
            default: InspectorService.DescribeAssessmentTemplates
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                assessmentTemplateArns:
                  $ref: "#/components/schemas/BatchDescribeArnList"
              required:
                - assessmentTemplateArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAssessmentTemplatesResponse"
  /DescribeCrossAccountAccessRole:
    post:
      operationId: DescribeCrossAccountAccessRole
      description: Describes the IAM role that enables Amazon Inspector to access your AWS account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.DescribeCrossAccountAccessRole
            default: InspectorService.DescribeCrossAccountAccessRole
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeCrossAccountAccessRoleResponse"
  /DescribeExclusions:
    post:
      operationId: DescribeExclusions
      description: Describes the exclusions that are specified by the exclusions' ARNs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.DescribeExclusions
            default: InspectorService.DescribeExclusions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                exclusionArns:
                  $ref: "#/components/schemas/BatchDescribeExclusionsArnList"
                  description: The list of ARNs that specify the exclusions that you want to describe.
                locale:
                  $ref: "#/components/schemas/Locale"
                  description: The locale into which you want to translate the exclusion's title, description, and recommendation.
              required:
                - exclusionArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeExclusionsResponse"
  /DescribeFindings:
    post:
      operationId: DescribeFindings
      description: Describes the findings that are specified by the ARNs of the findings.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.DescribeFindings
            default: InspectorService.DescribeFindings
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                findingArns:
                  $ref: "#/components/schemas/BatchDescribeArnList"
                  description: The ARN that specifies the finding that you want to describe.
                locale:
                  $ref: "#/components/schemas/Locale"
                  description: The locale into which you want to translate a finding description, recommendation, and the short description that identifies the finding.
              required:
                - findingArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeFindingsResponse"
  /DescribeResourceGroups:
    post:
      operationId: DescribeResourceGroups
      description: Describes the resource groups that are specified by the ARNs of the resource groups.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.DescribeResourceGroups
            default: InspectorService.DescribeResourceGroups
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceGroupArns:
                  $ref: "#/components/schemas/BatchDescribeArnList"
                  description: The ARN that specifies the resource group that you want to describe.
              required:
                - resourceGroupArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeResourceGroupsResponse"
  /DescribeRulesPackages:
    post:
      operationId: DescribeRulesPackages
      description: Describes the rules packages that are specified by the ARNs of the rules packages.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.DescribeRulesPackages
            default: InspectorService.DescribeRulesPackages
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                rulesPackageArns:
                  $ref: "#/components/schemas/BatchDescribeArnList"
                  description: The ARN that specifies the rules package that you want to describe.
                locale:
                  $ref: "#/components/schemas/Locale"
                  description: The locale that you want to translate a rules package description into.
              required:
                - rulesPackageArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeRulesPackagesResponse"
  /GetAssessmentReport:
    post:
      operationId: GetAssessmentReport
      description: Produces an assessment report that includes detailed and comprehensive results of a specified assessment run.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.GetAssessmentReport
            default: InspectorService.GetAssessmentReport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                assessmentRunArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN that specifies the assessment run for which you want to generate a report.
                reportFileFormat:
                  $ref: "#/components/schemas/ReportFileFormat"
                  description: Specifies the file format (html or pdf) of the assessment report that you want to generate.
                reportType:
                  $ref: "#/components/schemas/ReportType"
                  description: "Specifies the type of the assessment report that you want to generate. There are two types of assessment reports: a finding report and a full report. For more information, see Assessment Reports."
              required:
                - assessmentRunArn
                - reportFileFormat
                - reportType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssessmentReportResponse"
  /GetExclusionsPreview:
    post:
      operationId: GetExclusionsPreview
      description: Retrieves the exclusions preview (a list of ExclusionPreview objects) specified by the preview token. You can obtain the preview token by running the CreateExclusionsPreview API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.GetExclusionsPreview
            default: InspectorService.GetExclusionsPreview
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                assessmentTemplateArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN that specifies the assessment template for which the exclusions preview was requested.
                previewToken:
                  $ref: "#/components/schemas/UUID"
                  description: The unique identifier associated of the exclusions preview.
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: You can use this parameter when paginating results. Set the value of this parameter to null on your first call to the GetExclusionsPreviewRequest action. Subsequent calls to the action fill nextToken in the request with the value of nextToken from the previous response to continue listing data.
                maxResults:
                  $ref: "#/components/schemas/ListMaxResults"
                  description: You can use this parameter to indicate the maximum number of items you want in the response. The default value is 100. The maximum value is 500.
                locale:
                  $ref: "#/components/schemas/Locale"
                  description: The locale into which you want to translate the exclusion's title, description, and recommendation.
              required:
                - assessmentTemplateArn
                - previewToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetExclusionsPreviewResponse"
  /GetTelemetryMetadata:
    post:
      operationId: GetTelemetryMetadata
      description: Information about the data that is collected for the specified assessment run.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.GetTelemetryMetadata
            default: InspectorService.GetTelemetryMetadata
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                assessmentRunArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN that specifies the assessment run that has the telemetry data that you want to obtain.
              required:
                - assessmentRunArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTelemetryMetadataResponse"
  /ListAssessmentRunAgents:
    post:
      operationId: ListAssessmentRunAgents
      description: Lists the agents of the assessment runs that are specified by the ARNs of the assessment runs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.ListAssessmentRunAgents
            default: InspectorService.ListAssessmentRunAgents
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                assessmentRunArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN that specifies the assessment run whose agents you want to list.
                filter:
                  $ref: "#/components/schemas/AgentFilter"
                  description: You can use this parameter to specify a subset of data to be included in the action's response. For a record to match a filter, all specified filter attributes must match. When multiple values are specified for a filter attribute, any of the values can match.
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: You can use this parameter when paginating results. Set the value of this parameter to null on your first call to the ListAssessmentRunAgents action. Subsequent calls to the action fill nextToken in the request with the value of NextToken from the previous response to continue listing data.
                maxResults:
                  $ref: "#/components/schemas/ListMaxResults"
                  description: You can use this parameter to indicate the maximum number of items that you want in the response. The default value is 10. The maximum value is 500.
              required:
                - assessmentRunArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssessmentRunAgentsResponse"
  /ListAssessmentRuns:
    post:
      operationId: ListAssessmentRuns
      description: Lists the assessment runs that correspond to the assessment templates that are specified by the ARNs of the assessment templates.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.ListAssessmentRuns
            default: InspectorService.ListAssessmentRuns
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                assessmentTemplateArns:
                  $ref: "#/components/schemas/ListParentArnList"
                  description: The ARNs that specify the assessment templates whose assessment runs you want to list.
                filter:
                  $ref: "#/components/schemas/AssessmentRunFilter"
                  description: You can use this parameter to specify a subset of data to be included in the action's response. For a record to match a filter, all specified filter attributes must match. When multiple values are specified for a filter attribute, any of the values can match.
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: You can use this parameter when paginating results. Set the value of this parameter to null on your first call to the ListAssessmentRuns action. Subsequent calls to the action fill nextToken in the request with the value of NextToken from the previous response to continue listing data.
                maxResults:
                  $ref: "#/components/schemas/ListMaxResults"
                  description: You can use this parameter to indicate the maximum number of items that you want in the response. The default value is 10. The maximum value is 500.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssessmentRunsOutputDisplay"
  /ListAssessmentTargets:
    post:
      operationId: ListAssessmentTargets
      description: Lists the ARNs of the assessment targets within this AWS account. For more information about assessment targets, see Amazon Inspector Assessment Targets.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.ListAssessmentTargets
            default: InspectorService.ListAssessmentTargets
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                filter:
                  $ref: "#/components/schemas/AssessmentTargetFilter"
                  description: You can use this parameter to specify a subset of data to be included in the action's response. For a record to match a filter, all specified filter attributes must match. When multiple values are specified for a filter attribute, any of the values can match.
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: You can use this parameter when paginating results. Set the value of this parameter to null on your first call to the ListAssessmentTargets action. Subsequent calls to the action fill nextToken in the request with the value of NextToken from the previous response to continue listing data.
                maxResults:
                  $ref: "#/components/schemas/ListMaxResults"
                  description: You can use this parameter to indicate the maximum number of items you want in the response. The default value is 10. The maximum value is 500.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssessmentTargetsOutputDisplay"
  /ListAssessmentTemplates:
    post:
      operationId: ListAssessmentTemplates
      description: Lists the assessment templates that correspond to the assessment targets that are specified by the ARNs of the assessment targets.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - InspectorService.ListAssessmentTemplates
            default: InspectorService.ListAssessmentTemplates
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                assessmentTargetArns:
                  $ref: "#/components/schemas/ListParentArnList"
                  description: A list of ARNs that specifies the assessment targets whose assessment templates you want to list.
                filter:
                  $ref: "#/components/schemas/AssessmentTemplateFilter"
