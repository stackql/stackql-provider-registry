  /SetTagsForResource:
    post:
      operationId: SetTagsForResource
      description: Sets tags (key and value pairs) to the assessment template that is specified by the ARN of the assessment template.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
