components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    __string:
      type: string
    __listOf__string:
      type: array
      items:
        $ref: "#/components/schemas/__string"
    BatchAssociateScramSecretResponse:
      type: object
      properties:
        ClusterArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the cluster.
        UnprocessedScramSecrets:
          $ref: "#/components/schemas/__listOfUnprocessedScramSecret"
          description: List of errors when associating secrets to cluster.
    __listOfUnprocessedScramSecret:
      type: array
      items:
        $ref: "#/components/schemas/UnprocessedScramSecret"
    UnprocessedScramSecret:
      description: Error info for scram secret associate/disassociate failure.
      type: object
      properties:
        ErrorCode:
          $ref: "#/components/schemas/__string"
          description: Error code for associate/disassociate failure.
        ErrorMessage:
          $ref: "#/components/schemas/__string"
          description: Error message for associate/disassociate failure.
        SecretArn:
          $ref: "#/components/schemas/__string"
          description: AWS Secrets Manager secret ARN.
    BatchDisassociateScramSecretResponse:
      type: object
      properties:
        ClusterArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the cluster.
        UnprocessedScramSecrets:
          $ref: "#/components/schemas/__listOfUnprocessedScramSecret"
          description: List of errors when disassociating secrets to cluster.
    BrokerNodeGroupInfo:
      description: Describes the setup to be used for Apache Kafka broker nodes in the cluster.
      type: object
      properties:
        BrokerAZDistribution:
          $ref: "#/components/schemas/BrokerAZDistribution"
          description: The distribution of broker nodes across Availability Zones. This is an optional parameter. If you don't specify it, Amazon MSK gives it the value DEFAULT. You can also explicitly set this parameter to the value DEFAULT. No other values are currently allowed. Amazon MSK distributes the broker nodes evenly across the Availability Zones that correspond to the subnets you provide when you create the cluster.
        ClientSubnets:
          $ref: "#/components/schemas/__listOf__string"
