openapi: 3.0.0
info:
  version: "2018-11-14"
  title: Managed Streaming for Kafka
  description: Managed Streaming for Kafka
  x-serviceName: kafka
  x-serviceAlias: kafka
  x-protocol: rest-json
  x-apiVersion: "2018-11-14"
  x-endpointPrefix: kafka
  x-jsonVersion: "1.1"
servers:
  - url: https://kafka.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for kafka
paths:
  /v1/clusters/{cluster_arn}/scram-secrets:
    post:
      operationId: BatchAssociateScramSecret
      description: Associates one or more Scram Secrets with an Amazon MSK cluster.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the cluster to be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SecretArnList:
                  $ref: "#/components/schemas/__listOf__string"
              required:
                - SecretArnList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAssociateScramSecretResponse"
    patch:
      operationId: BatchDisassociateScramSecret
      description: Disassociates one or more Scram Secrets from an Amazon MSK cluster.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the cluster to be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SecretArnList:
                  $ref: "#/components/schemas/__listOf__string"
              required:
                - SecretArnList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDisassociateScramSecretResponse"
    get:
      operationId: ListScramSecrets
      description: Returns a list of the Scram Secrets associated with an Amazon MSK cluster.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The arn of the cluster.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maxResults of the query.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The nextToken of the query.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListScramSecretsOutputDisplay"
  /v1/clusters:
    post:
      operationId: CreateCluster
      description: Creates a new MSK cluster.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                BrokerNodeGroupInfo:
                  $ref: "#/components/schemas/BrokerNodeGroupInfo"
                Rebalancing:
                  $ref: "#/components/schemas/Rebalancing"
                ClientAuthentication:
                  $ref: "#/components/schemas/ClientAuthentication"
                ClusterName:
                  $ref: "#/components/schemas/__stringMin1Max64"
                ConfigurationInfo:
                  $ref: "#/components/schemas/ConfigurationInfo"
                EncryptionInfo:
                  $ref: "#/components/schemas/EncryptionInfo"
                EnhancedMonitoring:
                  $ref: "#/components/schemas/EnhancedMonitoring"
                OpenMonitoring:
                  $ref: "#/components/schemas/OpenMonitoringInfo"
                KafkaVersion:
                  $ref: "#/components/schemas/__stringMin1Max128"
                LoggingInfo:
                  $ref: "#/components/schemas/LoggingInfo"
                NumberOfBrokerNodes:
                  $ref: "#/components/schemas/__integerMin1Max15"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
                StorageMode:
                  $ref: "#/components/schemas/StorageMode"
              required:
                - BrokerNodeGroupInfo
                - ClusterName
                - KafkaVersion
                - NumberOfBrokerNodes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClusterResponse"
    get:
      operationId: ListClusters
      description: Returns a list of all the MSK clusters in the current Region.
      parameters:
        - name: clusterNameFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Specify a prefix of the name of the clusters that you want to list. The service lists all the clusters whose names start with this prefix.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response. If there are more results, the response includes a NextToken parameter.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The paginated results marker. When the result of the operation is truncated, the call returns NextToken in the response. To get the next batch, provide this token in your next request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListClustersResponse"
  /api/v2/clusters:
    post:
      operationId: CreateClusterV2
      description: Creates a new MSK cluster.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClusterName:
                  $ref: "#/components/schemas/__stringMin1Max64"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
                Provisioned:
                  $ref: "#/components/schemas/ProvisionedRequest"
                Serverless:
                  $ref: "#/components/schemas/ServerlessRequest"
              required:
                - ClusterName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClusterV2Response"
    get:
      operationId: ListClustersV2
      description: Returns a list of all the MSK clusters in the current Region.
      parameters:
        - name: clusterNameFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Specify a prefix of the names of the clusters that you want to list. The service lists all the clusters whose names start with this prefix.
        - name: clusterTypeFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Specify either PROVISIONED or SERVERLESS.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response. If there are more results, the response includes a NextToken parameter.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The paginated results marker. When the result of the operation is truncated, the call returns NextToken in the response. To get the next batch, provide this token in your next request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListClustersV2Response"
  /v1/configurations:
    post:
      operationId: CreateConfiguration
      description: Creates a new MSK configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/__string"
                KafkaVersions:
                  $ref: "#/components/schemas/__listOf__string"
                Name:
                  $ref: "#/components/schemas/__string"
                ServerProperties:
                  $ref: "#/components/schemas/__blob"
              required:
                - ServerProperties
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConfigurationResponse"
    get:
      operationId: ListConfigurations
      description: Returns a list of all the MSK configurations in this Region.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response. If there are more results, the response includes a NextToken parameter.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The paginated results marker. When the result of the operation is truncated, the call returns NextToken in the response. To get the next batch, provide this token in your next request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConfigurationsResponse"
  /replication/v1/replicators:
    post:
      operationId: CreateReplicator
      description: Creates the replicator.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/__stringMax1024"
                KafkaClusters:
                  $ref: "#/components/schemas/__listOfKafkaCluster"
                ReplicationInfoList:
                  $ref: "#/components/schemas/__listOfReplicationInfo"
                ReplicatorName:
                  $ref: "#/components/schemas/__stringMin1Max128Pattern09AZaZ09AZaZ0"
                ServiceExecutionRoleArn:
                  $ref: "#/components/schemas/__string"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
                LogDelivery:
                  $ref: "#/components/schemas/LogDelivery"
              required:
                - KafkaClusters
                - ReplicationInfoList
                - ReplicatorName
                - ServiceExecutionRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReplicatorResponse"
    get:
      operationId: ListReplicators
      description: Lists the replicators.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response. If there are more results, the response includes a NextToken parameter.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: If the response of ListReplicators is truncated, it returns a NextToken in the response. This NextToken should be sent in the subsequent request to ListReplicators.
        - name: replicatorNameFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Returns replicators starting with given name.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReplicatorsResponse"
  /v1/clusters/{cluster_arn}/topics:
    post:
      operationId: CreateTopic
      description: Creates a topic in the specified MSK cluster.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) that uniquely identifies the cluster.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TopicName:
                  $ref: "#/components/schemas/__string"
                PartitionCount:
                  $ref: "#/components/schemas/__integerMin1"
                ReplicationFactor:
                  $ref: "#/components/schemas/__integerMin1"
                Configs:
                  $ref: "#/components/schemas/__string"
              required:
                - TopicName
                - PartitionCount
                - ReplicationFactor
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTopicResponse"
    get:
      operationId: ListTopics
      description: List topics in a MSK cluster.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) that uniquely identifies the cluster.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response. If there are more results, the response includes a NextToken parameter.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The paginated results marker. When the result of the operation is truncated, the call returns NextToken in the response. To get the next batch, provide this token in your next request.
        - name: topicNameFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Returns topics starting with given name.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTopicsResponse"
  /v1/vpc-connection:
    post:
      operationId: CreateVpcConnection
      description: Creates a new MSK VPC connection.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TargetClusterArn:
                  $ref: "#/components/schemas/__string"
                Authentication:
                  $ref: "#/components/schemas/__string"
                VpcId:
                  $ref: "#/components/schemas/__string"
                ClientSubnets:
                  $ref: "#/components/schemas/__listOf__string"
                SecurityGroups:
                  $ref: "#/components/schemas/__listOf__string"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
              required:
                - TargetClusterArn
                - VpcId
                - ClientSubnets
                - SecurityGroups
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVpcConnectionResponse"
  /v1/clusters/{cluster_arn}:
    delete:
      operationId: DeleteCluster
      description: Deletes the MSK cluster specified by the Amazon Resource Name (ARN) in the request.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) that uniquely identifies the cluster.
        - name: currentVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The current version of the MSK cluster.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteClusterResponse"
    get:
      operationId: DescribeCluster
      description: Returns a description of the MSK cluster whose Amazon Resource Name (ARN) is specified in the request.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) that uniquely identifies the cluster.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeClusterResponse"
  /v1/clusters/{cluster_arn}/policy:
    delete:
      operationId: DeleteClusterPolicy
      description: Deletes the MSK cluster policy specified by the Amazon Resource Name (ARN) in the request.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the cluster.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteClusterPolicyResponse"
    get:
      operationId: GetClusterPolicy
      description: Get the MSK cluster policy specified by the Amazon Resource Name (ARN) in the request.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the cluster.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetClusterPolicyResponse"
    put:
      operationId: PutClusterPolicy
      description: Creates or updates the MSK cluster policy specified by the cluster Amazon Resource Name (ARN) in the request.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the cluster.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CurrentVersion:
                  $ref: "#/components/schemas/__string"
                Policy:
                  $ref: "#/components/schemas/__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutClusterPolicyResponse"
  /v1/configurations/{arn}:
    delete:
      operationId: DeleteConfiguration
      description: Deletes an MSK Configuration.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) that uniquely identifies an MSK configuration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteConfigurationResponse"
    get:
      operationId: DescribeConfiguration
      description: Returns a description of this MSK configuration.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) that uniquely identifies an MSK configuration and all of its revisions.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeConfigurationResponse"
    put:
      operationId: UpdateConfiguration
      description: Updates an MSK configuration.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/__string"
                ServerProperties:
                  $ref: "#/components/schemas/__blob"
              required:
                - ServerProperties
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateConfigurationResponse"
  /replication/v1/replicators/{replicator_arn}:
    delete:
      operationId: DeleteReplicator
      description: Deletes a replicator.
      parameters:
        - name: currentVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The current version of the replicator.
        - name: replicator_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the replicator to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteReplicatorResponse"
    get:
      operationId: DescribeReplicator
      description: Describes a replicator.
      parameters:
        - name: replicator_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the replicator to be described.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeReplicatorResponse"
  /v1/clusters/{cluster_arn}/topics/{topic_name}:
    delete:
      operationId: DeleteTopic
      description: Deletes a topic in the specified MSK cluster.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) that uniquely identifies the cluster.
        - name: topic_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the topic to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTopicResponse"
    get:
      operationId: DescribeTopic
      description: Returns topic details of this topic on a MSK cluster.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) that uniquely identifies the cluster.
        - name: topic_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Kafka topic name that uniquely identifies the topic.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeTopicResponse"
    put:
      operationId: UpdateTopic
      description: Updates the configuration of the specified topic.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) that uniquely identifies the cluster.
        - name: topic_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the topic to update configuration for.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Configs:
                  $ref: "#/components/schemas/__string"
                PartitionCount:
                  $ref: "#/components/schemas/__integer"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTopicResponse"
  /v1/vpc-connection/{arn}:
    delete:
      operationId: DeleteVpcConnection
      description: Deletes a MSK VPC connection.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) that uniquely identifies an MSK VPC connection.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVpcConnectionResponse"
    get:
      operationId: DescribeVpcConnection
      description: Returns a description of this MSK VPC connection.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) that uniquely identifies a MSK VPC connection.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeVpcConnectionResponse"
  /v1/operations/{cluster_operation_arn}:
    get:
      operationId: DescribeClusterOperation
      description: Returns a description of the cluster operation specified by the ARN.
      parameters:
        - name: cluster_operation_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) that uniquely identifies the MSK cluster operation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeClusterOperationResponse"
  /api/v2/operations/{cluster_operation_arn}:
    get:
      operationId: DescribeClusterOperationV2
      description: Returns a description of the cluster operation specified by the ARN.
      parameters:
        - name: cluster_operation_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: ARN of the cluster operation to describe.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeClusterOperationV2Response"
  /api/v2/clusters/{cluster_arn}:
    get:
      operationId: DescribeClusterV2
      description: Returns a description of the MSK cluster whose Amazon Resource Name (ARN) is specified in the request.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) that uniquely identifies the cluster.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeClusterV2Response"
  /v1/configurations/{arn}/revisions/{revision}:
    get:
      operationId: DescribeConfigurationRevision
      description: Returns a description of this revision of the configuration.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) that uniquely identifies an MSK configuration and all of its revisions.
        - name: revision
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__long"
          description: A string that uniquely identifies a revision of an MSK configuration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeConfigurationRevisionResponse"
  /v1/clusters/{cluster_arn}/topics/{topic_name}/partitions:
    get:
      operationId: DescribeTopicPartitions
      description: Returns partition details of this topic on a MSK cluster.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) that uniquely identifies the cluster.
        - name: topic_name
          in: path
          required: true
          schema:
