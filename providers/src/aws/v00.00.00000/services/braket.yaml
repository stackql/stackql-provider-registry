openapi: 3.0.0
info:
  version: "2019-09-01"
  title: Braket
  description: Braket
  x-serviceName: braket
  x-serviceAlias: braket
  x-protocol: rest-json
  x-apiVersion: "2019-09-01"
  x-endpointPrefix: braket
servers:
  - url: https://braket.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for braket
paths:
  /job/{job_arn}/cancel:
    put:
      operationId: CancelJob
      description: Cancels an Amazon Braket hybrid job.
      parameters:
        - name: job_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobArn"
          description: The ARN of the Amazon Braket hybrid job to cancel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelJobResponse"
  /quantum-task/{quantum_task_arn}/cancel:
    put:
      operationId: CancelQuantumTask
      description: Cancels the specified task.
      parameters:
        - name: quantum_task_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/QuantumTaskArn"
          description: The ARN of the quantum task to cancel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/String64"
              required:
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelQuantumTaskResponse"
  /job:
    post:
      operationId: CreateJob
      description: Creates an Amazon Braket hybrid job.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/String64"
                algorithmSpecification:
                  $ref: "#/components/schemas/AlgorithmSpecification"
                inputDataConfig:
                  $ref: "#/components/schemas/CreateJobRequestInputDataConfigList"
                outputDataConfig:
                  $ref: "#/components/schemas/JobOutputDataConfig"
                checkpointConfig:
                  $ref: "#/components/schemas/JobCheckpointConfig"
                jobName:
                  $ref: "#/components/schemas/CreateJobRequestJobNameString"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                stoppingCondition:
                  $ref: "#/components/schemas/JobStoppingCondition"
                instanceConfig:
                  $ref: "#/components/schemas/InstanceConfig"
                hyperParameters:
                  $ref: "#/components/schemas/HyperParameters"
                deviceConfig:
                  $ref: "#/components/schemas/DeviceConfig"
                tags:
                  $ref: "#/components/schemas/TagsMap"
                associations:
                  $ref: "#/components/schemas/CreateJobRequestAssociationsList"
              required:
                - clientToken
                - algorithmSpecification
                - outputDataConfig
                - jobName
                - roleArn
                - instanceConfig
                - deviceConfig
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateJobResponse"
  /quantum-task:
    post:
      operationId: CreateQuantumTask
      description: Creates a quantum task.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/String64"
                deviceArn:
                  $ref: "#/components/schemas/DeviceArn"
                deviceParameters:
                  $ref: "#/components/schemas/CreateQuantumTaskRequestDeviceParametersString"
                shots:
                  $ref: "#/components/schemas/CreateQuantumTaskRequestShotsLong"
                outputS3Bucket:
                  $ref: "#/components/schemas/CreateQuantumTaskRequestOutputS3BucketString"
                outputS3KeyPrefix:
                  $ref: "#/components/schemas/CreateQuantumTaskRequestOutputS3KeyPrefixString"
                action:
                  $ref: "#/components/schemas/JsonValue"
                tags:
                  $ref: "#/components/schemas/TagsMap"
                jobToken:
                  $ref: "#/components/schemas/JobToken"
                associations:
                  $ref: "#/components/schemas/CreateQuantumTaskRequestAssociationsList"
                experimentalCapabilities:
                  $ref: "#/components/schemas/ExperimentalCapabilities"
              required:
                - clientToken
                - deviceArn
                - shots
                - outputS3Bucket
                - outputS3KeyPrefix
                - action
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateQuantumTaskResponse"
  /spending-limit:
    post:
      operationId: CreateSpendingLimit
      description: Creates a spending limit for a specified quantum device. Spending limits help you control costs by setting maximum amounts that can be spent on quantum computing tasks within a specified time period. Simulators do not support spending limits.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/String64"
                deviceArn:
                  $ref: "#/components/schemas/DeviceArn"
                spendingLimit:
                  $ref: "#/components/schemas/CreateSpendingLimitRequestSpendingLimitString"
                timePeriod:
                  $ref: "#/components/schemas/TimePeriod"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - clientToken
                - deviceArn
                - spendingLimit
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSpendingLimitResponse"
  /spending-limit/{spending_limit_arn}/delete:
    delete:
      operationId: DeleteSpendingLimit
      description: Deletes an existing spending limit. This operation permanently removes the spending limit and cannot be undone. After deletion, the associated device becomes unrestricted for spending.
      parameters:
        - name: spending_limit_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SpendingLimitArn"
          description: The Amazon Resource Name (ARN) of the spending limit to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSpendingLimitResponse"
  /device/{device_arn}:
    get:
      operationId: GetDevice
      description: Retrieves the devices available in Amazon Braket. For backwards compatibility with older versions of BraketSchemas, OpenQASM information is omitted from GetDevice API calls. To get this information the user-agent needs to present a recent version of the BraketSchemas (1.8.0 or later). The Braket SDK automatically reports this for you. If you do not see OpenQASM results in the GetDevice response when using a Braket SDK, you may need to set AWS_EXECUTION_ENV environment variable to configure user-agent. See the code examples provided below for how to do this for the AWS CLI, Boto3, and the Go, Java, and JavaScript/TypeScript SDKs.
      parameters:
        - name: device_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DeviceArn"
          description: The ARN of the device to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDeviceResponse"
  /job/{job_arn}:
    get:
      operationId: GetJob
      description: Retrieves the specified Amazon Braket hybrid job.
      parameters:
        - name: job_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobArn"
          description: The ARN of the hybrid job to retrieve.
        - name: additionalAttributeNames
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/HybridJobAdditionalAttributeNamesList"
          description: A list of attributes to return additional information for. Only the QueueInfo additional attribute name is currently supported.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetJobResponse"
  /quantum-task/{quantum_task_arn}:
    get:
      operationId: GetQuantumTask
      description: Retrieves the specified quantum task.
      parameters:
        - name: quantum_task_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/QuantumTaskArn"
          description: The ARN of the quantum task to retrieve.
        - name: additionalAttributeNames
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/QuantumTaskAdditionalAttributeNamesList"
          description: A list of attributes to return additional information for. Only the QueueInfo additional attribute name is currently supported.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQuantumTaskResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Shows the tags associated with this resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: Specify the resourceArn for the resource whose tags to display.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Add a tag to the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: Specify the resourceArn of the resource to which a tag will be added.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Remove tags from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: Specify the resourceArn for the resource from which to remove the tags.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: Specify the keys for the tags to remove from the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /devices:
    post:
      operationId: SearchDevices
      description: Searches for devices using the specified filters.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/SearchDevicesRequestMaxResultsInteger"
                filters:
                  $ref: "#/components/schemas/SearchDevicesRequestFiltersList"
              required:
                - filters
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchDevicesResponse"
  /jobs:
    post:
      operationId: SearchJobs
      description: Searches for Amazon Braket hybrid jobs that match the specified filter values.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/SearchJobsRequestMaxResultsInteger"
                filters:
                  $ref: "#/components/schemas/SearchJobsRequestFiltersList"
              required:
                - filters
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchJobsResponse"
  /quantum-tasks:
    post:
      operationId: SearchQuantumTasks
      description: Searches for tasks that match the specified filter values.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/SearchQuantumTasksRequestMaxResultsInteger"
                filters:
                  $ref: "#/components/schemas/SearchQuantumTasksRequestFiltersList"
              required:
                - filters
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchQuantumTasksResponse"
  /spending-limits:
    post:
      operationId: SearchSpendingLimits
      description: Searches and lists spending limits based on specified filters. This operation supports pagination and allows filtering by various criteria to find specific spending limits. We recommend using pagination to ensure that the operation returns quickly and successfully.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/SearchSpendingLimitsRequestMaxResultsInteger"
                filters:
                  $ref: "#/components/schemas/SearchSpendingLimitsRequestFiltersList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchSpendingLimitsResponse"
  /spending-limit/{spending_limit_arn}/update:
    patch:
      operationId: UpdateSpendingLimit
      description: Updates an existing spending limit. You can modify the spending amount or time period. Changes take effect immediately.
      parameters:
        - name: spending_limit_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SpendingLimitArn"
          description: The Amazon Resource Name (ARN) of the spending limit to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/String64"
                spendingLimit:
                  $ref: "#/components/schemas/UpdateSpendingLimitRequestSpendingLimitString"
                timePeriod:
                  $ref: "#/components/schemas/TimePeriod"
              required:
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSpendingLimitResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    JobArn:
      type: string
      pattern: arn:aws[a-z\-]*:braket:[a-z0-9\-]+:[0-9]{12}:job/.*
    CancelJobResponse:
      type: object
      properties:
        jobArn:
          $ref: "#/components/schemas/JobArn"
          description: The ARN of the Amazon Braket job.
        cancellationStatus:
          $ref: "#/components/schemas/CancellationStatus"
          description: The status of the hybrid job.
      required:
        - jobArn
        - cancellationStatus
    CancellationStatus:
      type: string
      enum:
        - CANCELLING
        - CANCELLED
    QuantumTaskArn:
      type: string
      minLength: 0
      maxLength: 256
    String64:
      type: string
      minLength: 1
      maxLength: 64
    CancelQuantumTaskResponse:
      type: object
      properties:
        quantumTaskArn:
          $ref: "#/components/schemas/QuantumTaskArn"
          description: The ARN of the quantum task.
        cancellationStatus:
          $ref: "#/components/schemas/CancellationStatus"
          description: The status of the quantum task.
      required:
        - quantumTaskArn
        - cancellationStatus
    AlgorithmSpecification:
      description: Defines the Amazon Braket hybrid job to be created. Specifies the container image the job uses and the paths to the Python scripts used for entry and training.
      type: object
      properties:
        scriptModeConfig:
          $ref: "#/components/schemas/ScriptModeConfig"
          description: Configures the paths to the Python scripts used for entry and training.
        containerImage:
          $ref: "#/components/schemas/ContainerImage"
          description: The container image used to create an Amazon Braket hybrid job.
    ScriptModeConfig:
      description: Contains information about algorithm scripts used for the Amazon Braket hybrid job.
      type: object
      properties:
        entryPoint:
          $ref: "#/components/schemas/String"
          description: The entry point in the algorithm scripts from where the execution begins in the hybrid job.
        s3Uri:
          $ref: "#/components/schemas/S3Path"
          description: The URI that specifies the S3 path to the algorithm scripts used by an Amazon Braket hybrid job.
        compressionType:
          $ref: "#/components/schemas/CompressionType"
          description: The type of compression used to store the algorithm scripts in Amazon S3 storage.
      required:
        - entryPoint
        - s3Uri
    String:
      type: string
    S3Path:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: (https|s3)://([^/]+)/?(.*)
    CompressionType:
      type: string
      enum:
        - NONE
        - GZIP
    ContainerImage:
      description: The container image used to create an Amazon Braket hybrid job.
      type: object
      properties:
        uri:
          $ref: "#/components/schemas/Uri"
          description: The URI locating the container image.
      required:
        - uri
    Uri:
      type: string
      minLength: 1
      maxLength: 255
      pattern: \d{10,14}\.dkr\.ecr.[a-z0-9-]+\.amazonaws\.com\/.+(@sha256)?:.+
    CreateJobRequestInputDataConfigList:
      type: array
      items:
        $ref: "#/components/schemas/InputFileConfig"
    InputFileConfig:
      description: A list of parameters that specify the input channels, type of input data, and where it is located.
      type: object
      properties:
        channelName:
          $ref: "#/components/schemas/InputFileConfigChannelNameString"
          description: A named input source that an Amazon Braket hybrid job can consume.
        contentType:
          $ref: "#/components/schemas/String256"
          description: The MIME type of the data.
        dataSource:
          $ref: "#/components/schemas/DataSource"
          description: The location of the input data.
      required:
        - channelName
        - dataSource
    InputFileConfigChannelNameString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z0-9\\.\\-_]+"
    String256:
      type: string
      minLength: 1
      maxLength: 256
    DataSource:
      description: Information about the source of the input data used by the Amazon Braket hybrid job.
      type: object
      properties:
        s3DataSource:
          $ref: "#/components/schemas/S3DataSource"
          description: Amazon S3 path of the input data used by the hybrid job.
      required:
        - s3DataSource
    S3DataSource:
      description: Information about the Amazon S3 storage used by the Amazon Braket hybrid job.
      type: object
      properties:
        s3Uri:
          $ref: "#/components/schemas/S3Path"
          description: Depending on the value specified for the S3DataType, identifies either a key name prefix or a manifest that locates the S3 data source.
      required:
        - s3Uri
    JobOutputDataConfig:
      description: Specifies the path to the S3 location where you want to store hybrid job artifacts and the encryption key used to store them.
      type: object
      properties:
        kmsKeyId:
          $ref: "#/components/schemas/String2048"
          description: The AWS Key Management Service (AWS KMS) key that Amazon Braket uses to encrypt the hybrid job training artifacts at rest using Amazon S3 server-side encryption.
        s3Path:
          $ref: "#/components/schemas/S3Path"
          description: Identifies the S3 path where you want Amazon Braket to store the hybrid job training artifacts. For example, s3://bucket-name/key-name-prefix.
      required:
        - s3Path
    String2048:
      type: string
      minLength: 1
      maxLength: 2048
    JobCheckpointConfig:
      description: Contains information about the output locations for hybrid job checkpoint data.
      type: object
      properties:
        localPath:
          $ref: "#/components/schemas/String4096"
          description: (Optional) The local directory where checkpoint data is stored. The default directory is /opt/braket/checkpoints/.
        s3Uri:
          $ref: "#/components/schemas/S3Path"
          description: Identifies the S3 path where you want Amazon Braket to store checkpoint data. For example, s3://bucket-name/key-name-prefix.
      required:
        - s3Uri
    String4096:
      type: string
      minLength: 1
      maxLength: 4096
    CreateJobRequestJobNameString:
      type: string
      minLength: 1
      maxLength: 50
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,50}"
    RoleArn:
      type: string
      pattern: arn:aws[a-z\-]*:iam::\d{12}:role/?[a-zA-Z_0-9+=,.@\-_/]+
    JobStoppingCondition:
      description: Specifies limits for how long an Amazon Braket hybrid job can run.
      type: object
      properties:
        maxRuntimeInSeconds:
          $ref: "#/components/schemas/JobStoppingConditionMaxRuntimeInSecondsInteger"
          description: The maximum length of time, in seconds, that an Amazon Braket hybrid job can run.
    JobStoppingConditionMaxRuntimeInSecondsInteger:
      type: integer
      minimum: 1
      maximum: 432000
    InstanceConfig:
      description: Configures the resource instances to use while running the Amazon Braket hybrid job on Amazon Braket.
      type: object
      properties:
        instanceType:
          $ref: "#/components/schemas/InstanceType"
          description: Configures the type of resource instances to use while running an Amazon Braket hybrid job.
        volumeSizeInGb:
          $ref: "#/components/schemas/InstanceConfigVolumeSizeInGbInteger"
          description: The size of the storage volume, in GB, to provision.
        instanceCount:
          $ref: "#/components/schemas/InstanceConfigInstanceCountInteger"
          description: Configures the number of resource instances to use while running an Amazon Braket hybrid job on Amazon Braket. The default value is 1.
      required:
        - instanceType
        - volumeSizeInGb
    InstanceType:
      type: string
      enum:
        - ml.t3.large
        - ml.t3.xlarge
        - ml.t3.2xlarge
        - ml.m4.xlarge
        - ml.m4.2xlarge
        - ml.m4.4xlarge
        - ml.m4.10xlarge
        - ml.m4.16xlarge
        - ml.m5.large
        - ml.m5.xlarge
        - ml.m5.2xlarge
        - ml.m5.4xlarge
        - ml.m5.12xlarge
        - ml.m5.24xlarge
        - ml.c4.xlarge
        - ml.c4.2xlarge
        - ml.c4.4xlarge
        - ml.c4.8xlarge
        - ml.c5.xlarge
        - ml.c5.2xlarge
        - ml.c5.4xlarge
        - ml.c5.9xlarge
        - ml.c5.18xlarge
        - ml.c5n.xlarge
        - ml.c5n.2xlarge
        - ml.c5n.4xlarge
        - ml.c5n.9xlarge
        - ml.c5n.18xlarge
        - ml.p2.xlarge
        - ml.p2.8xlarge
        - ml.p2.16xlarge
        - ml.p3.2xlarge
        - ml.p3.8xlarge
        - ml.p3.16xlarge
        - ml.p3dn.24xlarge
        - ml.p4d.24xlarge
        - ml.g4dn.xlarge
        - ml.g4dn.2xlarge
        - ml.g4dn.4xlarge
        - ml.g4dn.8xlarge
        - ml.g4dn.12xlarge
        - ml.g4dn.16xlarge
        - ml.g6.xlarge
        - ml.g6.2xlarge
        - ml.g6.4xlarge
        - ml.g6.8xlarge
        - ml.g6.12xlarge
        - ml.g6.16xlarge
        - ml.g6.24xlarge
        - ml.g6.48xlarge
        - ml.g6e.xlarge
        - ml.g6e.2xlarge
        - ml.g6e.4xlarge
        - ml.g6e.8xlarge
        - ml.g6e.12xlarge
        - ml.g6e.16xlarge
        - ml.g6e.24xlarge
        - ml.g6e.48xlarge
    InstanceConfigVolumeSizeInGbInteger:
      type: integer
      minimum: 1
    InstanceConfigInstanceCountInteger:
      type: integer
      minimum: 1
    HyperParameters:
      type: object
      properties: {}
    DeviceConfig:
      description: Configures the primary device used to create and run an Amazon Braket hybrid job.
      type: object
      properties:
        device:
          $ref: "#/components/schemas/String256"
          description: The primary device ARN used to create and run an Amazon Braket hybrid job.
      required:
        - device
    TagsMap:
      type: object
      properties: {}
    CreateJobRequestAssociationsList:
      type: array
      items:
        $ref: "#/components/schemas/Association"
    Association:
      description: The Amazon Braket resource and the association type.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/BraketResourceArn"
          description: The Amazon Braket resource arn.
        type_:
          $ref: "#/components/schemas/AssociationType"
          description: The association type for the specified Amazon Braket resource arn.
      required:
        - arn
        - type_
    BraketResourceArn:
      type: string
      pattern: arn:aws[a-z\-]*:braket:[a-z0-9\-]*:[0-9]{12}:.*
    AssociationType:
      type: string
      enum:
