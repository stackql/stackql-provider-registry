openapi: 3.0.0
info:
  version: "2016-08-04"
  title: AWS Health APIs and Notifications
  description: AWS Health APIs and Notifications
  x-serviceName: health
  x-serviceAlias: health
  x-protocol: json
  x-apiVersion: "2016-08-04"
  x-endpointPrefix: health
  x-targetPrefix: AWSHealth_20160804
  x-jsonVersion: "1.1"
servers:
  - url: https://health.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for health
paths:
  /DescribeAffectedAccountsForOrganization:
    post:
      operationId: DescribeAffectedAccountsForOrganization
      description: Returns a list of accounts in the organization from Organizations that are affected by the provided event. For more information about the different types of Health events, see Event. Before you can call this operation, you must first enable Health to work with Organizations. To do this, call the EnableHealthServiceAccessForOrganization operation from your organization's management account. This API operation uses pagination. Specify the nextToken parameter in the next request to return more results.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHealth_20160804.DescribeAffectedAccountsForOrganization
            default: AWSHealth_20160804.DescribeAffectedAccountsForOrganization
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                eventArn:
                  $ref: "#/components/schemas/eventArn"
                  description: "The unique identifier for the event. The event ARN has the arn:aws:health:event-region::event/SERVICE/EVENT_TYPE_CODE/EVENT_TYPE_PLUS_ID format. For example, an event ARN might look like the following: arn:aws:health:us-east-1::event/EC2/EC2_INSTANCE_RETIREMENT_SCHEDULED/EC2_INSTANCE_RETIREMENT_SCHEDULED_ABC123-DEF456"
                nextToken:
                  $ref: "#/components/schemas/nextToken"
                  description: If the results of a search are large, only a portion of the results are returned, and a nextToken pagination token is returned in the response. To retrieve the next batch of results, reissue the search request and include the returned token. When all results have been returned, the response does not contain a pagination token value.
                maxResults:
                  $ref: "#/components/schemas/maxResults"
                  description: The maximum number of items to return in one batch, between 10 and 100, inclusive.
              required:
                - eventArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAffectedAccountsForOrganizationOutputDisplay"
  /DescribeAffectedEntities:
    post:
      operationId: DescribeAffectedEntities
      description: Returns a list of entities that have been affected by the specified events, based on the specified filter criteria. Entities can refer to individual customer resources, groups of customer resources, or any other construct, depending on the Amazon Web Services service. Events that have impact beyond that of the affected entities, or where the extent of impact is unknown, include at least one entity indicating this. At least one event ARN is required. This API operation uses pagination. Specify the nextToken parameter in the next request to return more results. This operation supports resource-level permissions. You can use this operation to allow or deny access to specific Health events. For more information, see Resource- and action-based conditions in the Health User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHealth_20160804.DescribeAffectedEntities
            default: AWSHealth_20160804.DescribeAffectedEntities
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                filter:
                  $ref: "#/components/schemas/EntityFilter"
                  description: Values to narrow the results returned. At least one event ARN is required.
                locale:
                  $ref: "#/components/schemas/locale"
                  description: The locale (language) to return information in. English (en) is the default and the only supported value at this time.
                nextToken:
                  $ref: "#/components/schemas/nextToken"
                  description: If the results of a search are large, only a portion of the results are returned, and a nextToken pagination token is returned in the response. To retrieve the next batch of results, reissue the search request and include the returned token. When all results have been returned, the response does not contain a pagination token value.
                maxResults:
                  $ref: "#/components/schemas/maxResultsLowerRange"
                  description: The maximum number of items to return in one batch, between 1 and 100, inclusive.
              required:
                - filter
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAffectedEntitiesResponse"
  /DescribeAffectedEntitiesForOrganization:
    post:
      operationId: DescribeAffectedEntitiesForOrganization
      description: Returns a list of entities that have been affected by one or more events for one or more accounts in your organization in Organizations, based on the filter criteria. Entities can refer to individual customer resources, groups of customer resources, or any other construct, depending on the Amazon Web Services service. At least one event Amazon Resource Name (ARN) and account ID are required. Before you can call this operation, you must first enable Health to work with Organizations. To do this, call the EnableHealthServiceAccessForOrganization operation from your organization's management account. This API operation uses pagination. Specify the nextToken parameter in the next request to return more results. This operation doesn't support resource-level permissions. You can't use this operation to allow or deny access to specific Health events. For more information, see Resource- and action-based conditions in the Health User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHealth_20160804.DescribeAffectedEntitiesForOrganization
            default: AWSHealth_20160804.DescribeAffectedEntitiesForOrganization
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                organizationEntityFilters:
                  $ref: "#/components/schemas/OrganizationEntityFiltersList"
                  description: A JSON set of elements including the awsAccountId and the eventArn.
                locale:
                  $ref: "#/components/schemas/locale"
                  description: The locale (language) to return information in. English (en) is the default and the only supported value at this time.
                nextToken:
                  $ref: "#/components/schemas/nextToken"
                  description: If the results of a search are large, only a portion of the results are returned, and a nextToken pagination token is returned in the response. To retrieve the next batch of results, reissue the search request and include the returned token. When all results have been returned, the response does not contain a pagination token value.
                maxResults:
                  $ref: "#/components/schemas/maxResultsLowerRange"
                  description: The maximum number of items to return in one batch, between 1 and 100, inclusive.
                organizationEntityAccountFilters:
                  $ref: "#/components/schemas/OrganizationEntityAccountFiltersList"
                  description: A JSON set of elements including the awsAccountId, eventArn and a set of statusCodes.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAffectedEntitiesForOrganizationResponse"
  /DescribeEntityAggregates:
    post:
      operationId: DescribeEntityAggregates
      description: Returns the number of entities that are affected by each of the specified events.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHealth_20160804.DescribeEntityAggregates
            default: AWSHealth_20160804.DescribeEntityAggregates
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                eventArns:
                  $ref: "#/components/schemas/EventArnsList"
                  description: 'A list of event ARNs (unique identifiers). For example: "arn:aws:health:us-east-1::event/EC2/EC2_INSTANCE_RETIREMENT_SCHEDULED/EC2_INSTANCE_RETIREMENT_SCHEDULED_ABC123-CDE456", "arn:aws:health:us-west-1::event/EBS/AWS_EBS_LOST_VOLUME/AWS_EBS_LOST_VOLUME_CHI789_JKL101"'
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEntityAggregatesResponse"
  /DescribeEntityAggregatesForOrganization:
    post:
      operationId: DescribeEntityAggregatesForOrganization
      description: Returns a list of entity aggregates for your Organizations that are affected by each of the specified events.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHealth_20160804.DescribeEntityAggregatesForOrganization
            default: AWSHealth_20160804.DescribeEntityAggregatesForOrganization
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                eventArns:
                  $ref: "#/components/schemas/OrganizationEventArnsList"
                  description: 'A list of event ARNs (unique identifiers). For example: "arn:aws:health:us-east-1::event/EC2/EC2_INSTANCE_RETIREMENT_SCHEDULED/EC2_INSTANCE_RETIREMENT_SCHEDULED_ABC123-CDE456", "arn:aws:health:us-west-1::event/EBS/AWS_EBS_LOST_VOLUME/AWS_EBS_LOST_VOLUME_CHI789_JKL101"'
                awsAccountIds:
                  $ref: "#/components/schemas/OrganizationAccountIdsList"
                  description: A list of 12-digit Amazon Web Services account numbers that contains the affected entities.
              required:
                - eventArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEntityAggregatesForOrganizationResponse"
  /DescribeEventAggregates:
    post:
      operationId: DescribeEventAggregates
      description: Returns the number of events of each event type (issue, scheduled change, and account notification). If no filter is specified, the counts of all events in each category are returned. This API operation uses pagination. Specify the nextToken parameter in the next request to return more results.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHealth_20160804.DescribeEventAggregates
            default: AWSHealth_20160804.DescribeEventAggregates
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                filter:
                  $ref: "#/components/schemas/EventFilter"
                  description: Values to narrow the results returned.
                aggregateField:
                  $ref: "#/components/schemas/eventAggregateField"
                  description: The only currently supported value is eventTypeCategory.
                maxResults:
                  $ref: "#/components/schemas/maxResults"
                  description: The maximum number of items to return in one batch, between 10 and 100, inclusive.
                nextToken:
                  $ref: "#/components/schemas/nextToken"
                  description: If the results of a search are large, only a portion of the results are returned, and a nextToken pagination token is returned in the response. To retrieve the next batch of results, reissue the search request and include the returned token. When all results have been returned, the response does not contain a pagination token value.
              required:
                - aggregateField
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEventAggregatesResponse"
  /DescribeEventDetails:
    post:
      operationId: DescribeEventDetails
      description: Returns detailed information about one or more specified events. Information includes standard event data (Amazon Web Services Region, service, and so on, as returned by DescribeEvents), a detailed event description, and possible additional metadata that depends upon the nature of the event. Affected entities are not included. To retrieve the entities, use the DescribeAffectedEntities operation. If a specified event can't be retrieved, an error message is returned for that event. This operation supports resource-level permissions. You can use this operation to allow or deny access to specific Health events. For more information, see Resource- and action-based conditions in the Health User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHealth_20160804.DescribeEventDetails
            default: AWSHealth_20160804.DescribeEventDetails
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                eventArns:
                  $ref: "#/components/schemas/eventArnList"
                  description: 'A list of event ARNs (unique identifiers). For example: "arn:aws:health:us-east-1::event/EC2/EC2_INSTANCE_RETIREMENT_SCHEDULED/EC2_INSTANCE_RETIREMENT_SCHEDULED_ABC123-CDE456", "arn:aws:health:us-west-1::event/EBS/AWS_EBS_LOST_VOLUME/AWS_EBS_LOST_VOLUME_CHI789_JKL101"'
                locale:
                  $ref: "#/components/schemas/locale"
                  description: The locale (language) to return information in. English (en) is the default and the only supported value at this time.
              required:
                - eventArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEventDetailsResponse"
  /DescribeEventDetailsForOrganization:
    post:
      operationId: DescribeEventDetailsForOrganization
      description: "Returns detailed information about one or more specified events for one or more Amazon Web Services accounts in your organization. This information includes standard event data (such as the Amazon Web Services Region and service), an event description, and (depending on the event) possible metadata. This operation doesn't return affected entities, such as the resources related to the event. To return affected entities, use the DescribeAffectedEntitiesForOrganization operation. Before you can call this operation, you must first enable Health to work with Organizations. To do this, call the EnableHealthServiceAccessForOrganization operation from your organization's management account. When you call the DescribeEventDetailsForOrganization operation, specify the organizationEventDetailFilters object in the request. Depending on the Health event type, note the following differences: To return event details for a public event, you must specify a null value for the awsAccountId parameter. If you specify an account ID for a public event, Health returns an error message because public events aren't specific to an account. To return event details for an event that is specific to an account in your organization, you must specify the awsAccountId parameter in the request. If you don't specify an account ID, Health returns an error message because the event is specific to an account in your organization. For more information, see Event. This operation doesn't support resource-level permissions. You can't use this operation to allow or deny access to specific Health events. For more information, see Resource- and action-based conditions in the Health User Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHealth_20160804.DescribeEventDetailsForOrganization
            default: AWSHealth_20160804.DescribeEventDetailsForOrganization
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                organizationEventDetailFilters:
                  $ref: "#/components/schemas/OrganizationEventDetailFiltersList"
                  description: A set of JSON elements that includes the awsAccountId and the eventArn.
                locale:
                  $ref: "#/components/schemas/locale"
                  description: The locale (language) to return information in. English (en) is the default and the only supported value at this time.
              required:
                - organizationEventDetailFilters
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEventDetailsForOrganizationResponse"
  /DescribeEventTypes:
    post:
      operationId: DescribeEventTypes
      description: Returns the event types that meet the specified filter criteria. You can use this API operation to find information about the Health event, such as the category, Amazon Web Services service, and event code. The metadata for each event appears in the EventType object. If you don't specify a filter criteria, the API operation returns all event types, in no particular order. This API operation uses pagination. Specify the nextToken parameter in the next request to return more results.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHealth_20160804.DescribeEventTypes
            default: AWSHealth_20160804.DescribeEventTypes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                filter:
                  $ref: "#/components/schemas/EventTypeFilter"
                  description: Values to narrow the results returned.
                locale:
                  $ref: "#/components/schemas/locale"
                  description: The locale (language) to return information in. English (en) is the default and the only supported value at this time.
                nextToken:
                  $ref: "#/components/schemas/nextToken"
                  description: If the results of a search are large, only a portion of the results are returned, and a nextToken pagination token is returned in the response. To retrieve the next batch of results, reissue the search request and include the returned token. When all results have been returned, the response does not contain a pagination token value.
                maxResults:
                  $ref: "#/components/schemas/maxResults"
                  description: The maximum number of items to return in one batch, between 10 and 100, inclusive. If you don't specify the maxResults parameter, this operation returns a maximum of 30 items by default.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEventTypesResponse"
  /DescribeEvents:
    post:
      operationId: DescribeEvents
      description: Returns information about events that meet the specified filter criteria. Events are returned in a summary form and do not include the detailed description, any additional metadata that depends on the event type, or any affected resources. To retrieve that information, use the DescribeEventDetails and DescribeAffectedEntities operations. If no filter criteria are specified, all events are returned. Results are sorted by lastModifiedTime, starting with the most recent event. When you call the DescribeEvents operation and specify an entity for the entityValues parameter, Health might return public events that aren't specific to that resource. For example, if you call DescribeEvents and specify an ID for an Amazon Elastic Compute Cloud (Amazon EC2) instance, Health might return events that aren't specific to that resource or service. To get events that are specific to a service, use the services parameter in the filter object. For more information, see Event. This API operation uses pagination. Specify the nextToken parameter in the next request to return more results.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHealth_20160804.DescribeEvents
            default: AWSHealth_20160804.DescribeEvents
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                filter:
                  $ref: "#/components/schemas/EventFilter"
                  description: Values to narrow the results returned.
                nextToken:
                  $ref: "#/components/schemas/nextToken"
                  description: If the results of a search are large, only a portion of the results are returned, and a nextToken pagination token is returned in the response. To retrieve the next batch of results, reissue the search request and include the returned token. When all results have been returned, the response does not contain a pagination token value.
                maxResults:
                  $ref: "#/components/schemas/maxResultsLowerRange"
                  description: The maximum number of items to return in one batch, between 1 and 100, inclusive.
                locale:
                  $ref: "#/components/schemas/locale"
                  description: The locale (language) to return information in. English (en) is the default and the only supported value at this time.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEventsResponse"
  /DescribeEventsForOrganization:
    post:
      operationId: DescribeEventsForOrganization
      description: "Returns information about events across your organization in Organizations. You can use thefilters parameter to specify the events that you want to return. Events are returned in a summary form and don't include the affected accounts, detailed description, any additional metadata that depends on the event type, or any affected resources. To retrieve that information, use the following operations: DescribeAffectedAccountsForOrganization DescribeEventDetailsForOrganization DescribeAffectedEntitiesForOrganization If you don't specify a filter, the DescribeEventsForOrganizations returns all events across your organization. Results are sorted by lastModifiedTime, starting with the most recent event. For more information about the different types of Health events, see Event. Before you can call this operation, you must first enable Health to work with Organizations. To do this, call the EnableHealthServiceAccessForOrganization operation from your organization's management account. This API operation uses pagination. Specify the nextToken parameter in the next request to return more results."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHealth_20160804.DescribeEventsForOrganization
            default: AWSHealth_20160804.DescribeEventsForOrganization
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                filter:
                  $ref: "#/components/schemas/OrganizationEventFilter"
                  description: Values to narrow the results returned.
                nextToken:
                  $ref: "#/components/schemas/nextToken"
                  description: If the results of a search are large, only a portion of the results are returned, and a nextToken pagination token is returned in the response. To retrieve the next batch of results, reissue the search request and include the returned token. When all results have been returned, the response does not contain a pagination token value.
                maxResults:
                  $ref: "#/components/schemas/maxResultsLowerRange"
                  description: The maximum number of items to return in one batch, between 1 and 100, inclusive.
                locale:
                  $ref: "#/components/schemas/locale"
                  description: The locale (language) to return information in. English (en) is the default and the only supported value at this time.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEventsForOrganizationResponse"
  /DescribeHealthServiceStatusForOrganization:
    post:
      operationId: DescribeHealthServiceStatusForOrganization
      description: This operation provides status information on enabling or disabling Health to work with your organization. To call this operation, you must use the organization's management account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHealth_20160804.DescribeHealthServiceStatusForOrganization
            default: AWSHealth_20160804.DescribeHealthServiceStatusForOrganization
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeHealthServiceStatusForOrganizationResponse"
  /DisableHealthServiceAccessForOrganization:
    post:
      operationId: DisableHealthServiceAccessForOrganization
      description: Disables Health from working with Organizations. To call this operation, you must sign in to the organization's management account. For more information, see Aggregating Health events in the Health User Guide. This operation doesn't remove the service-linked role from the management account in your organization. You must use the IAM console, API, or Command Line Interface (CLI) to remove the service-linked role. For more information, see Deleting a Service-Linked Role in the IAM User Guide. You can also disable the organizational feature by using the Organizations DisableAWSServiceAccess API operation. After you call this operation, Health stops aggregating events for all other Amazon Web Services accounts in your organization. If you call the Health API operations for organizational view, Health returns an error. Health continues to aggregate health events for your Amazon Web Services account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHealth_20160804.DisableHealthServiceAccessForOrganization
            default: AWSHealth_20160804.DisableHealthServiceAccessForOrganization
      responses:
        "200":
          description: Success
  /EnableHealthServiceAccessForOrganization:
    post:
      operationId: EnableHealthServiceAccessForOrganization
      description: "Enables Health to work with Organizations. You can use the organizational view feature to aggregate events from all Amazon Web Services accounts in your organization in a centralized location. This operation also creates a service-linked role for the management account in the organization. To call this operation, you must meet the following requirements: You must have a Business, Enterprise On-Ramp, or Enterprise Support plan from Amazon Web Services Support to use the Health API. If you call the Health API from an Amazon Web Services account that doesn't have a Business, Enterprise On-Ramp, or Enterprise Support plan, you receive a SubscriptionRequiredException error. You must have permission to call this operation from the organization's management account. For example IAM policies, see Health identity-based policy examples. If you don't have the required support plan, you can instead use the Health console to enable the organizational view feature. For more information, see Aggregating Health events in the Health User Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHealth_20160804.EnableHealthServiceAccessForOrganization
            default: AWSHealth_20160804.EnableHealthServiceAccessForOrganization
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    eventArn:
      type: string
      maxLength: 1600
      pattern: arn:aws(-[a-z]+(-[a-z]+)?)?:health:[^:]*:[^:]*:event(?:/[\w-]+){3}
    nextToken:
      type: string
      minLength: 4
      maxLength: 10000
      pattern: "[a-zA-Z0-9=/+_.-]{4,10000}"
    maxResults:
      type: integer
      minimum: 10
      maximum: 100
    DescribeAffectedAccountsForOrganizationRowDisplay:
      type: object
      properties:
        affected_account:
          type: string
          description: A JSON set of elements of the affected accounts.
    DescribeAffectedAccountsForOrganizationOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DescribeAffectedAccountsForOrganizationRowDisplay"
    EntityFilter:
      description: The values to use to filter results from the DescribeAffectedEntities operation.
      type: object
      properties:
        eventArns:
          $ref: "#/components/schemas/eventArnList"
