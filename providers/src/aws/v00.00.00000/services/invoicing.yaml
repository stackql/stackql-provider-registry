openapi: 3.0.0
info:
  version: "2024-12-01"
  title: AWS Invoicing
  description: AWS Invoicing
  x-serviceName: invoicing
  x-serviceAlias: invoicing
  x-protocol: json
  x-apiVersion: "2024-12-01"
  x-endpointPrefix: invoicing
  x-targetPrefix: Invoicing
  x-jsonVersion: "1.0"
servers:
  - url: https://invoicing.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for invoicing
paths:
  /BatchGetInvoiceProfile:
    post:
      operationId: BatchGetInvoiceProfile
      description: This gets the invoice profile associated with a set of accounts. The accounts must be linked accounts under the requester management account organization.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Invoicing.BatchGetInvoiceProfile
            default: Invoicing.BatchGetInvoiceProfile
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                AccountIds:
                  $ref: "#/components/schemas/AccountIdList"
                  description: Retrieves the corresponding invoice profile data for these account IDs.
              required:
                - AccountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetInvoiceProfileResponse"
  /CreateInvoiceUnit:
    post:
      operationId: CreateInvoiceUnit
      description: This creates a new invoice unit with the provided definition.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Invoicing.CreateInvoiceUnit
            default: Invoicing.CreateInvoiceUnit
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/InvoiceUnitName"
                  description: The unique name of the invoice unit that is shown on the generated invoice. This can't be changed once it is set. To change this name, you must delete the invoice unit recreate.
                InvoiceReceiver:
                  $ref: "#/components/schemas/AccountIdString"
                  description: The Amazon Web Services account ID chosen to be the receiver of an invoice unit. All invoices generated for that invoice unit will be sent to this account ID.
                Description:
                  $ref: "#/components/schemas/DescriptionString"
                  description: The invoice unit's description. This can be changed at a later time.
                TaxInheritanceDisabled:
                  $ref: "#/components/schemas/TaxInheritanceDisabledFlag"
                  description: Whether the invoice unit based tax inheritance is/ should be enabled or disabled.
                Rule:
                  $ref: "#/components/schemas/InvoiceUnitRule"
                  description: The InvoiceUnitRule object used to create invoice units.
                ResourceTags:
                  $ref: "#/components/schemas/ResourceTagList"
                  description: The tag structure that contains a tag key and value.
              required:
                - InvoiceReceiver
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInvoiceUnitResponse"
  /CreateProcurementPortalPreference:
    post:
      operationId: CreateProcurementPortalPreference
      description: This feature API is subject to changing at any time. For more information, see the Amazon Web Services Service Terms (Betas and Previews). Creates a procurement portal preference configuration for e-invoice delivery and purchase order retrieval. This preference defines how invoices are delivered to a procurement portal and how purchase orders are retrieved.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Invoicing.CreateProcurementPortalPreference
            default: Invoicing.CreateProcurementPortalPreference
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ProcurementPortalName:
                  $ref: "#/components/schemas/ProcurementPortalName"
                  description: The name of the procurement portal.
                BuyerDomain:
                  $ref: "#/components/schemas/BuyerDomain"
                  description: The domain identifier for the buyer in the procurement portal.
                BuyerIdentifier:
                  $ref: "#/components/schemas/BasicStringWithoutSpace"
                  description: The unique identifier for the buyer in the procurement portal.
                SupplierDomain:
                  $ref: "#/components/schemas/SupplierDomain"
                  description: The domain identifier for the supplier in the procurement portal.
                SupplierIdentifier:
                  $ref: "#/components/schemas/BasicStringWithoutSpace"
                  description: The unique identifier for the supplier in the procurement portal.
                Selector:
                  $ref: "#/components/schemas/ProcurementPortalPreferenceSelector"
                ProcurementPortalSharedSecret:
                  $ref: "#/components/schemas/SensitiveBasicStringWithoutSpace"
                  description: The shared secret or authentication credential used to establish secure communication with the procurement portal. This value must be encrypted at rest.
                ProcurementPortalInstanceEndpoint:
                  $ref: "#/components/schemas/BasicStringWithoutSpace"
                  description: The endpoint URL where e-invoices will be delivered to the procurement portal. Must be a valid HTTPS URL.
                TestEnvPreference:
                  $ref: "#/components/schemas/TestEnvPreferenceInput"
                  description: Configuration settings for the test environment of the procurement portal. Includes test credentials and endpoints that are used for validation before production deployment.
                EinvoiceDeliveryEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: Indicates whether e-invoice delivery is enabled for this procurement portal preference. Set to true to enable e-invoice delivery, false to disable.
                EinvoiceDeliveryPreference:
                  $ref: "#/components/schemas/EinvoiceDeliveryPreference"
                  description: Specifies the e-invoice delivery configuration including document types, attachment types, and customization settings for the portal.
                PurchaseOrderRetrievalEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: Indicates whether purchase order retrieval is enabled for this procurement portal preference. Set to true to enable PO retrieval, false to disable.
                Contacts:
                  $ref: "#/components/schemas/Contacts"
                  description: List of contact information for portal administrators and technical contacts responsible for the e-invoice integration.
                ResourceTags:
                  $ref: "#/components/schemas/ResourceTagList"
                  description: The tags to apply to this procurement portal preference resource. Each tag consists of a key and an optional value.
                ClientToken:
                  $ref: "#/components/schemas/BasicStringWithoutSpace"
                  description: A unique, case-sensitive identifier that you provide to ensure idempotency of the request.
              required:
                - ProcurementPortalName
                - BuyerDomain
                - BuyerIdentifier
                - SupplierDomain
                - SupplierIdentifier
                - EinvoiceDeliveryEnabled
                - PurchaseOrderRetrievalEnabled
                - Contacts
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProcurementPortalPreferenceResponse"
  /DeleteInvoiceUnit:
    post:
      operationId: DeleteInvoiceUnit
      description: This deletes an invoice unit with the provided invoice unit ARN.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Invoicing.DeleteInvoiceUnit
            default: Invoicing.DeleteInvoiceUnit
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                InvoiceUnitArn:
                  $ref: "#/components/schemas/InvoiceUnitArnString"
                  description: The ARN to identify an invoice unit. This information can't be modified or deleted.
              required:
                - InvoiceUnitArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteInvoiceUnitResponse"
  /DeleteProcurementPortalPreference:
    post:
      operationId: DeleteProcurementPortalPreference
      description: This feature API is subject to changing at any time. For more information, see the Amazon Web Services Service Terms (Betas and Previews). Deletes an existing procurement portal preference. This action cannot be undone. Active e-invoice delivery and PO retrieval configurations will be terminated.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Invoicing.DeleteProcurementPortalPreference
            default: Invoicing.DeleteProcurementPortalPreference
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ProcurementPortalPreferenceArn:
                  $ref: "#/components/schemas/ProcurementPortalPreferenceArnString"
                  description: The Amazon Resource Name (ARN) of the procurement portal preference to delete.
              required:
                - ProcurementPortalPreferenceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteProcurementPortalPreferenceResponse"
  /GetInvoicePDF:
    post:
      operationId: GetInvoicePDF
      description: Returns a URL to download the invoice document and supplemental documents associated with an invoice. The URLs are pre-signed and have expiration time. For special cases like Brazil, where Amazon Web Services generated invoice identifiers and government provided identifiers do not match, use the Amazon Web Services generated invoice identifier when making API requests. To grant IAM permission to use this operation, the caller needs the invoicing:GetInvoicePDF policy action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Invoicing.GetInvoicePDF
            default: Invoicing.GetInvoicePDF
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                InvoiceId:
                  $ref: "#/components/schemas/StringWithoutNewLine"
                  description: Your unique invoice ID.
              required:
                - InvoiceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInvoicePDFResponse"
  /GetInvoiceUnit:
    post:
      operationId: GetInvoiceUnit
      description: This retrieves the invoice unit definition.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Invoicing.GetInvoiceUnit
            default: Invoicing.GetInvoiceUnit
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                InvoiceUnitArn:
                  $ref: "#/components/schemas/InvoiceUnitArnString"
                  description: The ARN to identify an invoice unit. This information can't be modified or deleted.
                AsOf:
                  $ref: "#/components/schemas/AsOfTimestamp"
                  description: The state of an invoice unit at a specified time. You can see legacy invoice units that are currently deleted if the AsOf time is set to before it was deleted. If an AsOf is not provided, the default value is the current time.
              required:
                - InvoiceUnitArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInvoiceUnitResponse"
  /GetProcurementPortalPreference:
    post:
      operationId: GetProcurementPortalPreference
      description: This feature API is subject to changing at any time. For more information, see the Amazon Web Services Service Terms (Betas and Previews). Retrieves the details of a specific procurement portal preference configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Invoicing.GetProcurementPortalPreference
            default: Invoicing.GetProcurementPortalPreference
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ProcurementPortalPreferenceArn:
                  $ref: "#/components/schemas/ProcurementPortalPreferenceArnString"
                  description: The Amazon Resource Name (ARN) of the procurement portal preference to retrieve.
              required:
                - ProcurementPortalPreferenceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProcurementPortalPreferenceResponse"
  /ListInvoiceSummaries:
    post:
      operationId: ListInvoiceSummaries
      description: Retrieves your invoice details programmatically, without line item details.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Invoicing.ListInvoiceSummaries
            default: Invoicing.ListInvoiceSummaries
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Selector:
                  $ref: "#/components/schemas/InvoiceSummariesSelector"
                  description: The option to retrieve details for a specific invoice by providing its unique ID. Alternatively, access information for all invoices linked to the account by providing an account ID.
                Filter:
                  $ref: "#/components/schemas/InvoiceSummariesFilter"
                  description: Filters you can use to customize your invoice summary.
                NextToken:
                  $ref: "#/components/schemas/NextTokenString"
                  description: The token to retrieve the next set of results. Amazon Web Services provides the token when the response from a previous call has more results than the maximum page size.
                MaxResults:
                  $ref: "#/components/schemas/InvoiceSummariesMaxResults"
                  description: The maximum number of invoice summaries a paginated response can contain.
              required:
                - Selector
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInvoiceSummariesResponse"
  /ListInvoiceUnits:
    post:
      operationId: ListInvoiceUnits
      description: This fetches a list of all invoice unit definitions for a given account, as of the provided AsOf date.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Invoicing.ListInvoiceUnits
            default: Invoicing.ListInvoiceUnits
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/Filters"
                  description: An optional input to the list API. If multiple filters are specified, the returned list will be a configuration that match all of the provided filters. Supported filter types are InvoiceReceivers, Names, and Accounts.
                NextToken:
                  $ref: "#/components/schemas/NextTokenString"
                  description: The next token used to indicate where the returned list should start from.
                MaxResults:
                  $ref: "#/components/schemas/MaxResultsInteger"
                  description: The maximum number of invoice units that can be returned.
                AsOf:
                  $ref: "#/components/schemas/AsOfTimestamp"
                  description: The state of an invoice unit at a specified time. You can see legacy invoice units that are currently deleted if the AsOf time is set to before it was deleted. If an AsOf is not provided, the default value is the current time.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInvoiceUnitsResponse"
  /ListProcurementPortalPreferences:
    post:
      operationId: ListProcurementPortalPreferences
      description: This feature API is subject to changing at any time. For more information, see the Amazon Web Services Service Terms (Betas and Previews). Retrieves a list of procurement portal preferences associated with the Amazon Web Services account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Invoicing.ListProcurementPortalPreferences
            default: Invoicing.ListProcurementPortalPreferences
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/BasicStringWithoutSpace"
                  description: The token for the next set of results. (You received this token from a previous call.)
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return in a single call. To retrieve the remaining results, make another call with the returned NextToken value.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProcurementPortalPreferencesResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists the tags for a resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Invoicing.ListTagsForResource
            default: Invoicing.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/TagrisArn"
                  description: The Amazon Resource Name (ARN) of tags to list.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /PutProcurementPortalPreference:
    post:
      operationId: PutProcurementPortalPreference
      description: This feature API is subject to changing at any time. For more information, see the Amazon Web Services Service Terms (Betas and Previews). Updates an existing procurement portal preference configuration. This operation can modify settings for e-invoice delivery and purchase order retrieval.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Invoicing.PutProcurementPortalPreference
            default: Invoicing.PutProcurementPortalPreference
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ProcurementPortalPreferenceArn:
                  $ref: "#/components/schemas/ProcurementPortalPreferenceArnString"
                  description: The Amazon Resource Name (ARN) of the procurement portal preference to update.
                Selector:
                  $ref: "#/components/schemas/ProcurementPortalPreferenceSelector"
                ProcurementPortalSharedSecret:
                  $ref: "#/components/schemas/SensitiveBasicStringWithoutSpace"
                  description: The updated shared secret or authentication credential for the procurement portal. This value must be encrypted at rest.
                ProcurementPortalInstanceEndpoint:
                  $ref: "#/components/schemas/BasicStringWithoutSpace"
                  description: The updated endpoint URL where e-invoices will be delivered to the procurement portal. Must be a valid HTTPS URL.
                TestEnvPreference:
                  $ref: "#/components/schemas/TestEnvPreferenceInput"
                  description: Updated configuration settings for the test environment of the procurement portal.
                EinvoiceDeliveryEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: Updated flag indicating whether e-invoice delivery is enabled for this procurement portal preference.
                EinvoiceDeliveryPreference:
                  $ref: "#/components/schemas/EinvoiceDeliveryPreference"
                  description: Updated e-invoice delivery configuration including document types, attachment types, and customization settings for the portal.
                PurchaseOrderRetrievalEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: Updated flag indicating whether purchase order retrieval is enabled for this procurement portal preference.
                Contacts:
                  $ref: "#/components/schemas/Contacts"
                  description: Updated list of contact information for portal administrators and technical contacts.
              required:
                - ProcurementPortalPreferenceArn
                - EinvoiceDeliveryEnabled
                - PurchaseOrderRetrievalEnabled
                - Contacts
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutProcurementPortalPreferenceResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds a tag to a resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Invoicing.TagResource
            default: Invoicing.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/TagrisArn"
                  description: The Amazon Resource Name (ARN) of the tags.
                ResourceTags:
                  $ref: "#/components/schemas/ResourceTagList"
                  description: Adds a tag to a resource.
              required:
                - ResourceArn
                - ResourceTags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes a tag from a resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Invoicing.UntagResource
            default: Invoicing.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/TagrisArn"
                  description: The Amazon Resource Name (ARN) to untag.
                ResourceTagKeys:
                  $ref: "#/components/schemas/ResourceTagKeyList"
                  description: Keys for the tags to be removed.
              required:
                - ResourceArn
                - ResourceTagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateInvoiceUnit:
    post:
      operationId: UpdateInvoiceUnit
      description: You can update the invoice unit configuration at any time, and Amazon Web Services will use the latest configuration at the end of the month.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Invoicing.UpdateInvoiceUnit
            default: Invoicing.UpdateInvoiceUnit
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                InvoiceUnitArn:
                  $ref: "#/components/schemas/InvoiceUnitArnString"
                  description: The ARN to identify an invoice unit. This information can't be modified or deleted.
                Description:
                  $ref: "#/components/schemas/DescriptionString"
                  description: The assigned description for an invoice unit. This information can't be modified or deleted.
                TaxInheritanceDisabled:
                  $ref: "#/components/schemas/TaxInheritanceDisabledFlag"
                  description: Whether the invoice unit based tax inheritance is/ should be enabled or disabled.
                Rule:
                  $ref: "#/components/schemas/InvoiceUnitRule"
                  description: The InvoiceUnitRule object used to update invoice units.
              required:
                - InvoiceUnitArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateInvoiceUnitResponse"
  /UpdateProcurementPortalPreferenceStatus:
    post:
      operationId: UpdateProcurementPortalPreferenceStatus
      description: This feature API is subject to changing at any time. For more information, see the Amazon Web Services Service Terms (Betas and Previews). Updates the status of a procurement portal preference, including the activation state of e-invoice delivery and purchase order retrieval features.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Invoicing.UpdateProcurementPortalPreferenceStatus
            default: Invoicing.UpdateProcurementPortalPreferenceStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ProcurementPortalPreferenceArn:
                  $ref: "#/components/schemas/ProcurementPortalPreferenceArnString"
                  description: The Amazon Resource Name (ARN) of the procurement portal preference to update.
                EinvoiceDeliveryPreferenceStatus:
                  $ref: "#/components/schemas/ProcurementPortalPreferenceStatus"
                  description: The updated status of the e-invoice delivery preference.
                EinvoiceDeliveryPreferenceStatusReason:
                  $ref: "#/components/schemas/BasicString"
                  description: The reason for the e-invoice delivery preference status update, providing context for the change.
                PurchaseOrderRetrievalPreferenceStatus:
                  $ref: "#/components/schemas/ProcurementPortalPreferenceStatus"
                  description: The updated status of the purchase order retrieval preference.
                PurchaseOrderRetrievalPreferenceStatusReason:
                  $ref: "#/components/schemas/BasicString"
                  description: The reason for the purchase order retrieval preference status update, providing context for the change.
              required:
                - ProcurementPortalPreferenceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProcurementPortalPreferenceStatusResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AccountIdList:
      type: array
      items:
        $ref: "#/components/schemas/AccountIdString"
    AccountIdString:
      type: string
      pattern: \d{12}
    BatchGetInvoiceProfileResponse:
      type: object
      properties:
        Profiles:
          $ref: "#/components/schemas/ProfileList"
          description: A list of invoice profiles corresponding to the requested accounts.
    ProfileList:
      type: array
      items:
        $ref: "#/components/schemas/InvoiceProfile"
    InvoiceProfile:
      description: Contains high-level information about the invoice receiver.
      type: object
      properties:
        AccountId:
          $ref: "#/components/schemas/AccountIdString"
