    Filters:
      description: An optional input to the list API. If multiple filters are specified, the returned list will be a configuration that match all of the provided filters. Supported filter types are InvoiceReceivers, Names, and Accounts.
      type: object
      properties:
        Names:
          $ref: "#/components/schemas/InvoiceUnitNames"
          description: An optional input to the list API. You can specify a list of invoice unit names inside filters to return invoice units that match only the specified invoice unit names. If multiple names are provided, the result is an OR condition (match any) of the specified invoice unit names.
        InvoiceReceivers:
          $ref: "#/components/schemas/AccountIdList"
          description: You can specify a list of Amazon Web Services account IDs inside filters to return invoice units that match only the specified accounts. If multiple accounts are provided, the result is an OR condition (match any) of the specified accounts. This filter only matches the specified accounts on the invoice receivers of the invoice units.
        Accounts:
          $ref: "#/components/schemas/AccountIdList"
          description: You can specify a list of Amazon Web Services account IDs inside filters to return invoice units that match only the specified accounts. If multiple accounts are provided, the result is an OR condition (match any) of the specified accounts. The specified account IDs are matched with either the receiver or the linked accounts in the rules.
        BillSourceAccounts:
          $ref: "#/components/schemas/AccountIdList"
          description: A list of Amazon Web Services account IDs used to filter invoice units. These are payer accounts from other Organizations that have delegated their billing responsibility to the receiver account through the billing transfer feature.
    InvoiceUnitNames:
      type: array
      items:
        $ref: "#/components/schemas/InvoiceUnitName"
    MaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 500
    ListInvoiceUnitsResponse:
      type: object
      properties:
        InvoiceUnits:
          $ref: "#/components/schemas/InvoiceUnits"
          description: An invoice unit is a set of mutually exclusive accounts that correspond to your business entity.
        NextToken:
          $ref: "#/components/schemas/NextTokenString"
          description: The next token used to indicate where the returned list should start from.
    InvoiceUnits:
      type: array
      items:
        $ref: "#/components/schemas/InvoiceUnit"
    InvoiceUnit:
      description: An invoice unit is a set of mutually exclusive accounts that correspond to your business entity. Invoice units allow you separate Amazon Web Services account costs and configures your invoice for each business entity going forward.
      type: object
      properties:
        InvoiceUnitArn:
          $ref: "#/components/schemas/InvoiceUnitArnString"
          description: ARN to identify an invoice unit. This information can't be modified or deleted.
        InvoiceReceiver:
          $ref: "#/components/schemas/AccountIdString"
          description: The account that receives invoices related to the invoice unit.
        Name:
          $ref: "#/components/schemas/InvoiceUnitName"
          description: A unique name that is distinctive within your Amazon Web Services.
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: The assigned description for an invoice unit. This information can't be modified or deleted.
        TaxInheritanceDisabled:
          $ref: "#/components/schemas/TaxInheritanceDisabledFlag"
          description: Whether the invoice unit based tax inheritance is/ should be enabled or disabled.
        Rule:
          $ref: "#/components/schemas/InvoiceUnitRule"
          description: An InvoiceUnitRule object used the categorize invoice units.
        LastModified:
          $ref: "#/components/schemas/LastModifiedTimestamp"
          description: The last time the invoice unit was updated. This is important to determine the version of invoice unit configuration used to create the invoices. Any invoice created after this modified time will use this invoice unit configuration.
    MaxResults:
      type: integer
      minimum: 1
      maximum: 100
    ListProcurementPortalPreferencesResponse:
