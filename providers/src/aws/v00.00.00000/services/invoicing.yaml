          description: The domain identifier for the supplier in the procurement portal.
        SupplierIdentifier:
          $ref: "#/components/schemas/BasicStringWithoutSpace"
          description: The unique identifier for the supplier in the procurement portal.
        Selector:
          $ref: "#/components/schemas/ProcurementPortalPreferenceSelector"
        EinvoiceDeliveryEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether e-invoice delivery is enabled for this procurement portal preference.
        PurchaseOrderRetrievalEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether purchase order retrieval is enabled for this procurement portal preference.
        EinvoiceDeliveryPreferenceStatus:
          $ref: "#/components/schemas/ProcurementPortalPreferenceStatus"
          description: The current status of the e-invoice delivery preference in this summary.
        EinvoiceDeliveryPreferenceStatusReason:
          $ref: "#/components/schemas/BasicString"
          description: The reason for the current e-invoice delivery preference status in this summary.
        PurchaseOrderRetrievalPreferenceStatus:
