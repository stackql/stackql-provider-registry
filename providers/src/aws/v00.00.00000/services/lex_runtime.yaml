openapi: 3.0.0
info:
  version: "2016-11-28"
  title: Amazon Lex Runtime Service
  description: Amazon Lex Runtime Service
  x-serviceName: lex
  x-serviceAlias: lex_runtime
  x-protocol: rest-json
  x-apiVersion: "2016-11-28"
  x-endpointPrefix: runtime.lex
  x-jsonVersion: "1.1"
servers:
  - url: https://runtime.lex.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for lex-runtime
paths:
  /bot/{bot_name}/alias/{bot_alias}/user/{user_id}/session:
    delete:
      operationId: DeleteSession
      description: Removes session information for a specified bot, alias, and user ID.
      parameters:
        - name: bot_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the bot that contains the session data.
        - name: bot_alias
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotAlias"
          description: The alias in use for the bot that contains the session data.
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The identifier of the user associated with the session data.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSessionResponse"
    post:
      operationId: PutSession
      description: Creates a new session or modifies an existing session with an Amazon Lex bot. Use this operation to enable your application to set the state of the bot. For more information, see Managing Sessions.
      parameters:
        - name: bot_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the bot that contains the session data.
        - name: bot_alias
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotAlias"
          description: The alias in use for the bot that contains the session data.
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The ID of the client application user. Amazon Lex uses this to identify a user's conversation with your bot.
        - name: Accept
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/Accept"
          description: "The message that Amazon Lex returns in the response can be either text or speech based depending on the value of this field. If the value is text/plain; charset=utf-8, Amazon Lex returns text in the response. If the value begins with audio/, Amazon Lex returns speech in the response. Amazon Lex uses Amazon Polly to generate the speech in the configuration that you specify. For example, if you specify audio/mpeg as the value, Amazon Lex returns speech in the MPEG format. If the value is audio/pcm, the speech is returned as audio/pcm in 16-bit, little endian format. The following are the accepted values: audio/mpeg audio/ogg audio/pcm audio/* (defaults to mpeg) text/plain; charset=utf-8"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionAttributes:
                  $ref: "#/components/schemas/StringMap"
                dialogAction:
                  $ref: "#/components/schemas/DialogAction"
                recentIntentSummaryView:
                  $ref: "#/components/schemas/IntentSummaryList"
                activeContexts:
                  $ref: "#/components/schemas/ActiveContextsList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutSessionResponse"
  /bot/{bot_name}/alias/{bot_alias}/user/{user_id}/session/:
    get:
      operationId: GetSession
      description: Returns session information for a specified bot, alias, and user ID.
      parameters:
        - name: bot_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the bot that contains the session data.
        - name: bot_alias
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotAlias"
          description: The alias in use for the bot that contains the session data.
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The ID of the client application user. Amazon Lex uses this to identify a user's conversation with your bot.
        - name: checkpointLabelFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IntentSummaryCheckpointLabel"
          description: A string used to filter the intents returned in the recentIntentSummaryView structure. When you specify a filter, only intents with their checkpointLabel field set to that string are returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSessionResponse"
  /bot/{bot_name}/alias/{bot_alias}/user/{user_id}/content:
    post:
      operationId: PostContent
      description: 'Sends user input (text or speech) to Amazon Lex. Clients use this API to send text and audio requests to Amazon Lex at runtime. Amazon Lex interprets the user input using the machine learning model that it built for the bot. The PostContent operation supports audio input at 8kHz and 16kHz. You can use 8kHz audio to achieve higher speech recognition accuracy in telephone audio applications. In response, Amazon Lex returns the next message to convey to the user. Consider the following example messages: For a user input "I would like a pizza," Amazon Lex might return a response with a message eliciting slot data (for example, PizzaSize): "What size pizza would you like?". After the user provides all of the pizza order information, Amazon Lex might return a response with a message to get user confirmation: "Order the pizza?". After the user replies "Yes" to the confirmation prompt, Amazon Lex might return a conclusion statement: "Thank you, your cheese pizza has been ordered.". Not all Amazon Lex messages require a response from the user. For example, conclusion statements do not require a response. Some messages require only a yes or no response. In addition to the message, Amazon Lex provides additional context about the message in the response that you can use to enhance client behavior, such as displaying the appropriate client user interface. Consider the following examples: If the message is to elicit slot data, Amazon Lex returns the following context information: x-amz-lex-dialog-state header set to ElicitSlot x-amz-lex-intent-name header set to the intent name in the current context x-amz-lex-slot-to-elicit header set to the slot name for which the message is eliciting information x-amz-lex-slots header set to a map of slots configured for the intent with their current values If the message is a confirmation prompt, the x-amz-lex-dialog-state header is set to Confirmation and the x-amz-lex-slot-to-elicit header is omitted. If the message is a clarification prompt configured for the intent, indicating that the user intent is not understood, the x-amz-dialog-state header is set to ElicitIntent and the x-amz-slot-to-elicit header is omitted. In addition, Amazon Lex also returns your application-specific sessionAttributes. For more information, see Managing Conversation Context.'
      parameters:
        - name: bot_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: Name of the Amazon Lex bot.
        - name: bot_alias
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotAlias"
          description: Alias of the Amazon Lex bot.
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The ID of the client application user. Amazon Lex uses this to identify a user's conversation with your bot. At runtime, each request must contain the userID field. To decide the user ID to use for your application, consider the following factors. The userID field must not contain any personally identifiable information of the user, for example, name, personal identification numbers, or other end user personal information. If you want a user to start a conversation on one device and continue on another device, use a user-specific identifier. If you want the same user to be able to have two independent conversations on two different devices, choose a device-specific identifier. A user can't have two independent conversations with two different versions of the same bot. For example, a user can't have a conversation with the PROD and BETA versions of the same bot. If you anticipate that a user will need to have conversation with two different versions, for example, while testing, include the bot alias in the user ID to separate the two conversations.
        - name: x-amz-lex-session-attributes
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AttributesString"
          description: You pass this value as the x-amz-lex-session-attributes HTTP header. Application-specific information passed between Amazon Lex and a client application. The value must be a JSON serialized and base64 encoded map with string keys and values. The total size of the sessionAttributes and requestAttributes headers is limited to 12 KB. For more information, see Setting Session Attributes.
        - name: x-amz-lex-request-attributes
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AttributesString"
          description: "You pass this value as the x-amz-lex-request-attributes HTTP header. Request-specific information passed between Amazon Lex and a client application. The value must be a JSON serialized and base64 encoded map with string keys and values. The total size of the requestAttributes and sessionAttributes headers is limited to 12 KB. The namespace x-amz-lex: is reserved for special attributes. Don't create any request attributes with the prefix x-amz-lex:. For more information, see Setting Request Attributes."
        - name: Content-Type
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/HttpContentType"
          description: "You pass this value as the Content-Type HTTP header. Indicates the audio format or text. The header value must start with one of the following prefixes: PCM format, audio data must be in little-endian byte order. audio/l16; rate=16000; channels=1 audio/x-l16; sample-rate=16000; channel-count=1 audio/lpcm; sample-rate=8000; sample-size-bits=16; channel-count=1; is-big-endian=false Opus format audio/x-cbr-opus-with-preamble; preamble-size=0; bit-rate=256000; frame-size-milliseconds=4 Text format text/plain; charset=utf-8"
        - name: Accept
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/Accept"
          description: "You pass this value as the Accept HTTP header. The message Amazon Lex returns in the response can be either text or speech based on the Accept HTTP header value in the request. If the value is text/plain; charset=utf-8, Amazon Lex returns text in the response. If the value begins with audio/, Amazon Lex returns speech in the response. Amazon Lex uses Amazon Polly to generate the speech (using the configuration you specified in the Accept header). For example, if you specify audio/mpeg as the value, Amazon Lex returns speech in the MPEG format. If the value is audio/pcm, the speech returned is audio/pcm in 16-bit, little endian format. The following are the accepted values: audio/mpeg audio/ogg audio/pcm text/plain; charset=utf-8 audio/* (defaults to mpeg)"
        - name: x-amz-lex-active-contexts
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ActiveContextsString"
          description: A list of contexts active for the request. A context can be activated when a previous intent is fulfilled, or by including the context in the request, If you don't specify a list of contexts, Amazon Lex will use the current list of contexts for the session. If you specify an empty list, all contexts for the session are cleared.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                inputStream:
                  $ref: "#/components/schemas/BlobStream"
              required:
                - inputStream
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostContentResponse"
  /bot/{bot_name}/alias/{bot_alias}/user/{user_id}/text:
    post:
      operationId: PostText
      description: 'Sends user input to Amazon Lex. Client applications can use this API to send requests to Amazon Lex at runtime. Amazon Lex then interprets the user input using the machine learning model it built for the bot. In response, Amazon Lex returns the next message to convey to the user an optional responseCard to display. Consider the following example messages: For a user input "I would like a pizza", Amazon Lex might return a response with a message eliciting slot data (for example, PizzaSize): "What size pizza would you like?" After the user provides all of the pizza order information, Amazon Lex might return a response with a message to obtain user confirmation "Proceed with the pizza order?". After the user replies to a confirmation prompt with a "yes", Amazon Lex might return a conclusion statement: "Thank you, your cheese pizza has been ordered.". Not all Amazon Lex messages require a user response. For example, a conclusion statement does not require a response. Some messages require only a "yes" or "no" user response. In addition to the message, Amazon Lex provides additional context about the message in the response that you might use to enhance client behavior, for example, to display the appropriate client user interface. These are the slotToElicit, dialogState, intentName, and slots fields in the response. Consider the following examples: If the message is to elicit slot data, Amazon Lex returns the following context information: dialogState set to ElicitSlot intentName set to the intent name in the current context slotToElicit set to the slot name for which the message is eliciting information slots set to a map of slots, configured for the intent, with currently known values If the message is a confirmation prompt, the dialogState is set to ConfirmIntent and SlotToElicit is set to null. If the message is a clarification prompt (configured for the intent) that indicates that user intent is not understood, the dialogState is set to ElicitIntent and slotToElicit is set to null. In addition, Amazon Lex also returns your application-specific sessionAttributes. For more information, see Managing Conversation Context.'
      parameters:
        - name: bot_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotName"
          description: The name of the Amazon Lex bot.
        - name: bot_alias
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotAlias"
          description: The alias of the Amazon Lex bot.
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The ID of the client application user. Amazon Lex uses this to identify a user's conversation with your bot. At runtime, each request must contain the userID field. To decide the user ID to use for your application, consider the following factors. The userID field must not contain any personally identifiable information of the user, for example, name, personal identification numbers, or other end user personal information. If you want a user to start a conversation on one device and continue on another device, use a user-specific identifier. If you want the same user to be able to have two independent conversations on two different devices, choose a device-specific identifier. A user can't have two independent conversations with two different versions of the same bot. For example, a user can't have a conversation with the PROD and BETA versions of the same bot. If you anticipate that a user will need to have conversation with two different versions, for example, while testing, include the bot alias in the user ID to separate the two conversations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionAttributes:
                  $ref: "#/components/schemas/StringMap"
                requestAttributes:
                  $ref: "#/components/schemas/StringMap"
                inputText:
                  $ref: "#/components/schemas/Text"
                activeContexts:
                  $ref: "#/components/schemas/ActiveContextsList"
              required:
                - inputText
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostTextResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    BotName:
      type: string
    BotAlias:
      type: string
    UserId:
      type: string
      minLength: 2
      maxLength: 100
      pattern: "[0-9a-zA-Z._:-]+"
    DeleteSessionResponse:
      type: object
      properties:
        botName:
          $ref: "#/components/schemas/BotName"
          description: The name of the bot associated with the session data.
        botAlias:
          $ref: "#/components/schemas/BotAlias"
          description: The alias in use for the bot associated with the session data.
        userId:
          $ref: "#/components/schemas/UserId"
          description: The ID of the client application user.
        sessionId:
          $ref: "#/components/schemas/String"
          description: The unique identifier for the session.
    String:
      type: string
    IntentSummaryCheckpointLabel:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9-]+"
    GetSessionResponse:
      type: object
      properties:
        recentIntentSummaryView:
          $ref: "#/components/schemas/IntentSummaryList"
          description: An array of information about the intents used in the session. The array can contain a maximum of three summaries. If more than three intents are used in the session, the recentIntentSummaryView operation contains information about the last three intents used. If you set the checkpointLabelFilter parameter in the request, the array contains only the intents with the specified label.
        sessionAttributes:
          type: object
          properties: {}
          description: Map of key/value pairs representing the session-specific context information. It contains application information passed between Amazon Lex and a client application.
        sessionId:
          $ref: "#/components/schemas/String"
          description: A unique identifier for the session.
        dialogAction:
          $ref: "#/components/schemas/DialogAction"
          description: Describes the current state of the bot.
        activeContexts:
          $ref: "#/components/schemas/ActiveContextsList"
          description: A list of active contexts for the session. A context can be set when an intent is fulfilled or by calling the PostContent, PostText, or PutSession operation. You can use a context to control the intents that can follow up an intent, or to modify the operation of your application.
    IntentSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/IntentSummary"
    IntentSummary:
      description: Provides information about the state of an intent. You can use this information to get the current state of an intent so that you can process the intent, or so that you can return the intent to its previous state.
      type: object
      properties:
        intentName:
          $ref: "#/components/schemas/IntentName"
          description: The name of the intent.
        checkpointLabel:
          $ref: "#/components/schemas/IntentSummaryCheckpointLabel"
          description: A user-defined label that identifies a particular intent. You can use this label to return to a previous intent. Use the checkpointLabelFilter parameter of the GetSessionRequest operation to filter the intents returned by the operation to those with only the specified label.
        slots:
          type: object
          properties: {}
          description: Map of the slots that have been gathered and their values.
        confirmationStatus:
          $ref: "#/components/schemas/ConfirmationStatus"
          description: 'The status of the intent after the user responds to the confirmation prompt. If the user confirms the intent, Amazon Lex sets this field to Confirmed. If the user denies the intent, Amazon Lex sets this value to Denied. The possible values are: Confirmed - The user has responded "Yes" to the confirmation prompt, confirming that the intent is complete and that it is ready to be fulfilled. Denied - The user has responded "No" to the confirmation prompt. None - The user has never been prompted for confirmation; or, the user was prompted but did not confirm or deny the prompt.'
        dialogActionType:
          $ref: "#/components/schemas/DialogActionType"
          description: 'The next action that the bot should take in its interaction with the user. The possible values are: ConfirmIntent - The next action is asking the user if the intent is complete and ready to be fulfilled. This is a yes/no question such as "Place the order?" Close - Indicates that the there will not be a response from the user. For example, the statement "Your order has been placed" does not require a response. ElicitIntent - The next action is to determine the intent that the user wants to fulfill. ElicitSlot - The next action is to elicit a slot value from the user.'
        fulfillmentState:
          $ref: "#/components/schemas/FulfillmentState"
          description: "The fulfillment state of the intent. The possible values are: Failed - The Lambda function associated with the intent failed to fulfill the intent. Fulfilled - The intent has fulfilled by the Lambda function associated with the intent. ReadyForFulfillment - All of the information necessary for the intent is present and the intent ready to be fulfilled by the client application."
        slotToElicit:
          $ref: "#/components/schemas/String"
          description: The next slot to elicit from the user. If there is not slot to elicit, the field is blank.
      required:
        - dialogActionType
    IntentName:
      type: string
    ConfirmationStatus:
      type: string
      enum:
        - None
        - Confirmed
        - Denied
    DialogActionType:
      type: string
      enum:
        - ElicitIntent
        - ConfirmIntent
        - ElicitSlot
        - Close
        - Delegate
    FulfillmentState:
      type: string
      enum:
        - Fulfilled
        - Failed
        - ReadyForFulfillment
    DialogAction:
      description: Describes the next action that the bot should take in its interaction with the user and provides information about the context in which the action takes place. Use the DialogAction data type to set the interaction to a specific state, or to return the interaction to a previous state.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/DialogActionType"
          description: 'The next action that the bot should take in its interaction with the user. The possible values are: ConfirmIntent - The next action is asking the user if the intent is complete and ready to be fulfilled. This is a yes/no question such as "Place the order?" Close - Indicates that the there will not be a response from the user. For example, the statement "Your order has been placed" does not require a response. Delegate - The next action is determined by Amazon Lex. ElicitIntent - The next action is to determine the intent that the user wants to fulfill. ElicitSlot - The next action is to elicit a slot value from the user.'
        intentName:
          $ref: "#/components/schemas/IntentName"
          description: The name of the intent.
        slots:
          type: object
          properties: {}
          description: Map of the slots that have been gathered and their values.
        slotToElicit:
          $ref: "#/components/schemas/String"
          description: The name of the slot that should be elicited from the user.
        fulfillmentState:
          $ref: "#/components/schemas/FulfillmentState"
          description: "The fulfillment state of the intent. The possible values are: Failed - The Lambda function associated with the intent failed to fulfill the intent. Fulfilled - The intent has fulfilled by the Lambda function associated with the intent. ReadyForFulfillment - All of the information necessary for the intent is present and the intent ready to be fulfilled by the client application."
        message:
          $ref: "#/components/schemas/Text"
          description: The message that should be shown to the user. If you don't specify a message, Amazon Lex will use the message configured for the intent.
        messageFormat:
          $ref: "#/components/schemas/MessageFormatType"
          description: PlainText - The message contains plain UTF-8 text. CustomPayload - The message is a custom format for the client. SSML - The message contains text formatted for voice output. Composite - The message contains an escaped JSON object containing one or more messages. For more information, see Message Groups.
      required:
        - type_
    Text:
      type: string
      minLength: 1
      maxLength: 1024
    MessageFormatType:
      type: string
      enum:
        - PlainText
        - CustomPayload
        - SSML
        - Composite
    ActiveContextsList:
      type: array
      items:
        $ref: "#/components/schemas/ActiveContext"
    ActiveContext:
      description: A context is a variable that contains information about the current state of the conversation between a user and Amazon Lex. Context can be set automatically by Amazon Lex when an intent is fulfilled, or it can be set at runtime using the PutContent, PutText, or PutSession operation.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ActiveContextName"
          description: The name of the context.
        timeToLive:
          $ref: "#/components/schemas/ActiveContextTimeToLive"
          description: The length of time or number of turns that a context remains active.
        parameters:
          type: object
          properties: {}
          description: State variables for the current context. You can use these values as default values for slots in subsequent events.
      required:
        - name
        - timeToLive
        - parameters
    ActiveContextName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^([A-Za-z]_?)+$
    ActiveContextTimeToLive:
      description: The length of time or number of turns that a context remains active.
      type: object
      properties:
        timeToLiveInSeconds:
          $ref: "#/components/schemas/ActiveContextTimeToLiveInSeconds"
          description: The number of seconds that the context should be active after it is first sent in a PostContent or PostText response. You can set the value between 5 and 86,400 seconds (24 hours).
        turnsToLive:
          $ref: "#/components/schemas/ActiveContextTurnsToLive"
          description: The number of conversation turns that the context should be active. A conversation turn is one PostContent or PostText request and the corresponding response from Amazon Lex.
    ActiveContextTimeToLiveInSeconds:
      type: integer
      minimum: 5
      maximum: 86400
    ActiveContextTurnsToLive:
      type: integer
      minimum: 1
      maximum: 20
    AttributesString:
      type: string
    HttpContentType:
      type: string
    Accept:
      type: string
    ActiveContextsString:
      type: string
    BlobStream:
      type: string
      format: byte
    PostContentResponse:
      type: object
      properties:
        contentType:
          $ref: "#/components/schemas/HttpContentType"
          description: Content type as specified in the Accept HTTP header in the request.
        intentName:
          $ref: "#/components/schemas/IntentName"
          description: Current user intent that Amazon Lex is aware of.
        nluIntentConfidence:
          $ref: "#/components/schemas/String"
          description: Provides a score that indicates how confident Amazon Lex is that the returned intent is the one that matches the user's intent. The score is between 0.0 and 1.0. The score is a relative score, not an absolute score. The score may change based on improvements to Amazon Lex.
        alternativeIntents:
          $ref: "#/components/schemas/String"
          description: One to four alternative intents that may be applicable to the user's intent. Each alternative includes a score that indicates how confident Amazon Lex is that the intent matches the user's intent. The intents are sorted by the confidence score.
        slots:
          $ref: "#/components/schemas/String"
          description: Map of zero or more intent slots (name/value pairs) Amazon Lex detected from the user input during the conversation. The field is base-64 encoded. Amazon Lex creates a resolution list containing likely values for a slot. The value that it returns is determined by the valueSelectionStrategy selected when the slot type was created or updated. If valueSelectionStrategy is set to ORIGINAL_VALUE, the value provided by the user is returned, if the user value is similar to the slot values. If valueSelectionStrategy is set to TOP_RESOLUTION Amazon Lex returns the first value in the resolution list or, if there is no resolution list, null. If you don't specify a valueSelectionStrategy, the default is ORIGINAL_VALUE.
        sessionAttributes:
          $ref: "#/components/schemas/String"
          description: Map of key/value pairs representing the session-specific context information.
        sentimentResponse:
          $ref: "#/components/schemas/String"
          description: The sentiment expressed in an utterance. When the bot is configured to send utterances to Amazon Comprehend for sentiment analysis, this field contains the result of the analysis.
        message:
          $ref: "#/components/schemas/Text"
          description: You can only use this field in the de-DE, en-AU, en-GB, en-US, es-419, es-ES, es-US, fr-CA, fr-FR, and it-IT locales. In all other locales, the message field is null. You should use the encodedMessage field instead. The message to convey to the user. The message can come from the bot's configuration or from a Lambda function. If the intent is not configured with a Lambda function, or if the Lambda function returned Delegate as the dialogAction.type in its response, Amazon Lex decides on the next course of action and selects an appropriate message from the bot's configuration based on the current interaction context. For example, if Amazon Lex isn't able to understand user input, it uses a clarification prompt message. When you create an intent you can assign messages to groups. When messages are assigned to groups Amazon Lex returns one message from each group in the response. The message field is an escaped JSON string containing the messages. For more information about the structure of the JSON string returned, see msg-prompts-formats. If the Lambda function returns a message, Amazon Lex passes it to the client in its response.
        encodedMessage:
          $ref: "#/components/schemas/SensitiveString"
          description: The message to convey to the user. The message can come from the bot's configuration or from a Lambda function. If the intent is not configured with a Lambda function, or if the Lambda function returned Delegate as the dialogAction.type in its response, Amazon Lex decides on the next course of action and selects an appropriate message from the bot's configuration based on the current interaction context. For example, if Amazon Lex isn't able to understand user input, it uses a clarification prompt message. When you create an intent you can assign messages to groups. When messages are assigned to groups Amazon Lex returns one message from each group in the response. The message field is an escaped JSON string containing the messages. For more information about the structure of the JSON string returned, see msg-prompts-formats. If the Lambda function returns a message, Amazon Lex passes it to the client in its response. The encodedMessage field is base-64 encoded. You must decode the field before you can use the value.
        messageFormat:
          $ref: "#/components/schemas/MessageFormatType"
          description: "The format of the response message. One of the following values: PlainText - The message contains plain UTF-8 text. CustomPayload - The message is a custom format for the client. SSML - The message contains text formatted for voice output. Composite - The message contains an escaped JSON object containing one or more messages from the groups that messages were assigned to when the intent was created."
        dialogState:
          $ref: "#/components/schemas/DialogState"
          description: "Identifies the current state of the user interaction. Amazon Lex returns one of the following values as dialogState. The client can optionally use this information to customize the user interface. ElicitIntent - Amazon Lex wants to elicit the user's intent. Consider the following examples: For example, a user might utter an intent (\"I want to order a pizza\"). If Amazon Lex cannot infer the user intent from this utterance, it will return this dialog state. ConfirmIntent - Amazon Lex is expecting a \"yes\" or \"no\" response. For example, Amazon Lex wants user confirmation before fulfilling an intent. Instead of a simple \"yes\" or \"no\" response, a user might respond with additional information. For example, \"yes, but make it a thick crust pizza\" or \"no, I want to order a drink.\" Amazon Lex can process such additional information (in these examples, update the crust type slot or change the intent from OrderPizza to OrderDrink). ElicitSlot - Amazon Lex is expecting the value of a slot for the current intent. For example, suppose that in the response Amazon Lex sends this message: \"What size pizza would you like?\". A user might reply with the slot value (e.g., \"medium\"). The user might also provide additional information in the response (e.g., \"medium thick crust pizza\"). Amazon Lex can process such additional information appropriately. Fulfilled - Conveys that the Lambda function has successfully fulfilled the intent. ReadyForFulfillment - Conveys that the client has to fulfill the request. Failed - Conveys that the conversation with the user failed. This can happen for various reasons, including that the user does not provide an appropriate response to prompts from the service (you can configure how many times Amazon Lex can prompt a user for specific information), or if the Lambda function fails to fulfill the intent."
        slotToElicit:
          $ref: "#/components/schemas/String"
          description: If the dialogState value is ElicitSlot, returns the name of the slot for which Amazon Lex is eliciting a value.
        inputTranscript:
          $ref: "#/components/schemas/String"
          description: The text used to process the request. You can use this field only in the de-DE, en-AU, en-GB, en-US, es-419, es-ES, es-US, fr-CA, fr-FR, and it-IT locales. In all other locales, the inputTranscript field is null. You should use the encodedInputTranscript field instead. If the input was an audio stream, the inputTranscript field contains the text extracted from the audio stream. This is the text that is actually processed to recognize intents and slot values. You can use this information to determine if Amazon Lex is correctly processing the audio that you send.
        encodedInputTranscript:
          $ref: "#/components/schemas/SensitiveStringUnbounded"
          description: The text used to process the request. If the input was an audio stream, the encodedInputTranscript field contains the text extracted from the audio stream. This is the text that is actually processed to recognize intents and slot values. You can use this information to determine if Amazon Lex is correctly processing the audio that you send. The encodedInputTranscript field is base-64 encoded. You must decode the field before you can use the value.
        audioStream:
          $ref: "#/components/schemas/BlobStream"
          description: "The prompt (or statement) to convey to the user. This is based on the bot configuration and context. For example, if Amazon Lex did not understand the user intent, it sends the clarificationPrompt configured for the bot. If the intent requires confirmation before taking the fulfillment action, it sends the confirmationPrompt. Another example: Suppose that the Lambda function successfully fulfilled the intent, and sent a message to convey to the user. Then Amazon Lex sends that message in the response."
        botVersion:
          $ref: "#/components/schemas/BotVersion"
          description: The version of the bot that responded to the conversation. You can use this information to help determine if one version of a bot is performing better than another version.
        sessionId:
          $ref: "#/components/schemas/String"
          description: The unique identifier for the session.
        activeContexts:
          $ref: "#/components/schemas/ActiveContextsString"
          description: A list of active contexts for the session. A context can be set when an intent is fulfilled or by calling the PostContent, PostText, or PutSession operation. You can use a context to control the intents that can follow up an intent, or to modify the operation of your application.
    SensitiveString:
      type: string
      minLength: 1
      maxLength: 1366
    DialogState:
      type: string
      enum:
        - ElicitIntent
        - ConfirmIntent
        - ElicitSlot
        - Fulfilled
        - ReadyForFulfillment
        - Failed
    SensitiveStringUnbounded:
      type: string
    BotVersion:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[0-9]+|\\$LATEST"
    StringMap:
      type: object
      properties: {}
    PostTextResponse:
      type: object
      properties:
        intentName:
          $ref: "#/components/schemas/IntentName"
          description: The current user intent that Amazon Lex is aware of.
        nluIntentConfidence:
          $ref: "#/components/schemas/IntentConfidence"
          description: Provides a score that indicates how confident Amazon Lex is that the returned intent is the one that matches the user's intent. The score is between 0.0 and 1.0. For more information, see Confidence Scores. The score is a relative score, not an absolute score. The score may change based on improvements to Amazon Lex.
        alternativeIntents:
          $ref: "#/components/schemas/IntentList"
          description: One to four alternative intents that may be applicable to the user's intent. Each alternative includes a score that indicates how confident Amazon Lex is that the intent matches the user's intent. The intents are sorted by the confidence score.
        slots:
          type: object
          properties: {}
          description: The intent slots that Amazon Lex detected from the user input in the conversation. Amazon Lex creates a resolution list containing likely values for a slot. The value that it returns is determined by the valueSelectionStrategy selected when the slot type was created or updated. If valueSelectionStrategy is set to ORIGINAL_VALUE, the value provided by the user is returned, if the user value is similar to the slot values. If valueSelectionStrategy is set to TOP_RESOLUTION Amazon Lex returns the first value in the resolution list or, if there is no resolution list, null. If you don't specify a valueSelectionStrategy, the default is ORIGINAL_VALUE.
        sessionAttributes:
          type: object
          properties: {}
          description: A map of key-value pairs representing the session-specific context information.
        message:
          $ref: "#/components/schemas/Text"
          description: The message to convey to the user. The message can come from the bot's configuration or from a Lambda function. If the intent is not configured with a Lambda function, or if the Lambda function returned Delegate as the dialogAction.type its response, Amazon Lex decides on the next course of action and selects an appropriate message from the bot's configuration based on the current interaction context. For example, if Amazon Lex isn't able to understand user input, it uses a clarification prompt message. When you create an intent you can assign messages to groups. When messages are assigned to groups Amazon Lex returns one message from each group in the response. The message field is an escaped JSON string containing the messages. For more information about the structure of the JSON string returned, see msg-prompts-formats. If the Lambda function returns a message, Amazon Lex passes it to the client in its response.
        sentimentResponse:
          $ref: "#/components/schemas/SentimentResponse"
          description: The sentiment expressed in and utterance. When the bot is configured to send utterances to Amazon Comprehend for sentiment analysis, this field contains the result of the analysis.
        messageFormat:
          $ref: "#/components/schemas/MessageFormatType"
          description: "The format of the response message. One of the following values: PlainText - The message contains plain UTF-8 text. CustomPayload - The message is a custom format defined by the Lambda function. SSML - The message contains text formatted for voice output. Composite - The message contains an escaped JSON object containing one or more messages from the groups that messages were assigned to when the intent was created."
        dialogState:
          $ref: "#/components/schemas/DialogState"
          description: 'Identifies the current state of the user interaction. Amazon Lex returns one of the following values as dialogState. The client can optionally use this information to customize the user interface. ElicitIntent - Amazon Lex wants to elicit user intent. For example, a user might utter an intent ("I want to order a pizza"). If Amazon Lex cannot infer the user intent from this utterance, it will return this dialogState. ConfirmIntent - Amazon Lex is expecting a "yes" or "no" response. For example, Amazon Lex wants user confirmation before fulfilling an intent. Instead of a simple "yes" or "no," a user might respond with additional information. For example, "yes, but make it thick crust pizza" or "no, I want to order a drink". Amazon Lex can process such additional information (in these examples, update the crust type slot value, or change intent from OrderPizza to OrderDrink). ElicitSlot - Amazon Lex is expecting a slot value for the current intent. For example, suppose that in the response Amazon Lex sends this message: "What size pizza would you like?". A user might reply with the slot value (e.g., "medium"). The user might also provide additional information in the response (e.g., "medium thick crust pizza"). Amazon Lex can process such additional information appropriately. Fulfilled - Conveys that the Lambda function configured for the intent has successfully fulfilled the intent. ReadyForFulfillment - Conveys that the client has to fulfill the intent. Failed - Conveys that the conversation with the user failed. This can happen for various reasons including that the user did not provide an appropriate response to prompts from the service (you can configure how many times Amazon Lex can prompt a user for specific information), or the Lambda function failed to fulfill the intent.'
        slotToElicit:
          $ref: "#/components/schemas/String"
          description: If the dialogState value is ElicitSlot, returns the name of the slot for which Amazon Lex is eliciting a value.
        responseCard:
          $ref: "#/components/schemas/ResponseCard"
          description: Represents the options that the user has to respond to the current prompt. Response Card can come from the bot configuration (in the Amazon Lex console, choose the settings button next to a slot) or from a code hook (Lambda function).
        sessionId:
          $ref: "#/components/schemas/String"
          description: A unique identifier for the session.
        botVersion:
          $ref: "#/components/schemas/BotVersion"
          description: The version of the bot that responded to the conversation. You can use this information to help determine if one version of a bot is performing better than another version.
        activeContexts:
          $ref: "#/components/schemas/ActiveContextsList"
          description: A list of active contexts for the session. A context can be set when an intent is fulfilled or by calling the PostContent, PostText, or PutSession operation. You can use a context to control the intents that can follow up an intent, or to modify the operation of your application.
    IntentConfidence:
      description: Provides a score that indicates the confidence that Amazon Lex has that an intent is the one that satisfies the user's intent.
      type: object
      properties:
        score:
          $ref: "#/components/schemas/Double"
          description: A score that indicates how confident Amazon Lex is that an intent satisfies the user's intent. Ranges between 0.00 and 1.00. Higher scores indicate higher confidence.
    Double:
      type: number
      format: double
    IntentList:
      type: array
      items:
        $ref: "#/components/schemas/PredictedIntent"
    PredictedIntent:
      description: An intent that Amazon Lex suggests satisfies the user's intent. Includes the name of the intent, the confidence that Amazon Lex has that the user's intent is satisfied, and the slots defined for the intent.
      type: object
      properties:
        intentName:
          $ref: "#/components/schemas/IntentName"
          description: The name of the intent that Amazon Lex suggests satisfies the user's intent.
        nluIntentConfidence:
          $ref: "#/components/schemas/IntentConfidence"
          description: Indicates how confident Amazon Lex is that an intent satisfies the user's intent.
        slots:
          type: object
          properties: {}
          description: The slot and slot values associated with the predicted intent.
    SentimentResponse:
      description: The sentiment expressed in an utterance. When the bot is configured to send utterances to Amazon Comprehend for sentiment analysis, this field structure contains the result of the analysis.
      type: object
      properties:
        sentimentLabel:
          $ref: "#/components/schemas/SentimentLabel"
          description: The inferred sentiment that Amazon Comprehend has the highest confidence in.
        sentimentScore:
          $ref: "#/components/schemas/SentimentScore"
          description: The likelihood that the sentiment was correctly inferred.
    SentimentLabel:
      type: string
    SentimentScore:
      type: string
    ResponseCard:
      description: If you configure a response card when creating your bots, Amazon Lex substitutes the session attributes and slot values that are available, and then returns it. The response card can also come from a Lambda function ( dialogCodeHook and fulfillmentActivity on an intent).
      type: object
      properties:
        version:
          $ref: "#/components/schemas/String"
          description: The version of the response card format.
        contentType:
          $ref: "#/components/schemas/ContentType"
          description: The content type of the response.
        genericAttachments:
          $ref: "#/components/schemas/genericAttachmentList"
          description: An array of attachment objects representing options.
    ContentType:
      type: string
      enum:
        - application/vnd.amazonaws.card.generic
    genericAttachmentList:
      type: array
      items:
        $ref: "#/components/schemas/GenericAttachment"
    GenericAttachment:
      description: Represents an option rendered to the user when a prompt is shown. It could be an image, a button, a link, or text.
      type: object
      properties:
        title_:
          $ref: "#/components/schemas/StringWithLength"
          description: The title of the option.
        subTitle:
          $ref: "#/components/schemas/StringWithLength"
          description: The subtitle shown below the title.
        attachmentLinkUrl:
          $ref: "#/components/schemas/StringUrlWithLength"
          description: The URL of an attachment to the response card.
        imageUrl:
          $ref: "#/components/schemas/StringUrlWithLength"
          description: The URL of an image that is displayed to the user.
        buttons:
          $ref: "#/components/schemas/listOfButtons"
          description: The list of options to show to the user.
    StringWithLength:
      type: string
      minLength: 1
      maxLength: 80
    StringUrlWithLength:
      type: string
      minLength: 1
      maxLength: 2048
    listOfButtons:
      type: array
      items:
        $ref: "#/components/schemas/Button"
    Button:
      description: Represents an option to be shown on the client platform (Facebook, Slack, etc.)
      type: object
      properties:
        text:
          $ref: "#/components/schemas/ButtonTextStringWithLength"
          description: Text that is visible to the user on the button.
        value:
          $ref: "#/components/schemas/ButtonValueStringWithLength"
          description: The value sent to Amazon Lex when a user chooses the button. For example, consider button text "NYC." When the user chooses the button, the value sent can be "New York City."
      required:
        - text
        - value
    ButtonTextStringWithLength:
      type: string
      minLength: 1
      maxLength: 15
    ButtonValueStringWithLength:
      type: string
      minLength: 1
      maxLength: 1000
    PutSessionResponse:
      type: object
      properties:
        contentType:
          $ref: "#/components/schemas/HttpContentType"
          description: Content type as specified in the Accept HTTP header in the request.
        intentName:
          $ref: "#/components/schemas/IntentName"
          description: The name of the current intent.
        slots:
          $ref: "#/components/schemas/String"
          description: Map of zero or more intent slots Amazon Lex detected from the user input during the conversation. Amazon Lex creates a resolution list containing likely values for a slot. The value that it returns is determined by the valueSelectionStrategy selected when the slot type was created or updated. If valueSelectionStrategy is set to ORIGINAL_VALUE, the value provided by the user is returned, if the user value is similar to the slot values. If valueSelectionStrategy is set to TOP_RESOLUTION Amazon Lex returns the first value in the resolution list or, if there is no resolution list, null. If you don't specify a valueSelectionStrategy the default is ORIGINAL_VALUE.
        sessionAttributes:
          $ref: "#/components/schemas/String"
          description: Map of key/value pairs representing session-specific context information.
        message:
          $ref: "#/components/schemas/Text"
          description: The next message that should be presented to the user. You can only use this field in the de-DE, en-AU, en-GB, en-US, es-419, es-ES, es-US, fr-CA, fr-FR, and it-IT locales. In all other locales, the message field is null. You should use the encodedMessage field instead.
        encodedMessage:
          $ref: "#/components/schemas/SensitiveString"
          description: The next message that should be presented to the user. The encodedMessage field is base-64 encoded. You must decode the field before you can use the value.
        messageFormat:
          $ref: "#/components/schemas/MessageFormatType"
          description: "The format of the response message. One of the following values: PlainText - The message contains plain UTF-8 text. CustomPayload - The message is a custom format for the client. SSML - The message contains text formatted for voice output. Composite - The message contains an escaped JSON object containing one or more messages from the groups that messages were assigned to when the intent was created."
        dialogState:
          $ref: "#/components/schemas/DialogState"
          description: ConfirmIntent - Amazon Lex is expecting a "yes" or "no" response to confirm the intent before fulfilling an intent. ElicitIntent - Amazon Lex wants to elicit the user's intent. ElicitSlot - Amazon Lex is expecting the value of a slot for the current intent. Failed - Conveys that the conversation with the user has failed. This can happen for various reasons, including the user does not provide an appropriate response to prompts from the service, or if the Lambda function fails to fulfill the intent. Fulfilled - Conveys that the Lambda function has sucessfully fulfilled the intent. ReadyForFulfillment - Conveys that the client has to fulfill the intent.
        slotToElicit:
          $ref: "#/components/schemas/String"
          description: If the dialogState is ElicitSlot, returns the name of the slot for which Amazon Lex is eliciting a value.
        audioStream:
          $ref: "#/components/schemas/BlobStream"
          description: The audio version of the message to convey to the user.
        sessionId:
          $ref: "#/components/schemas/String"
          description: A unique identifier for the session.
        activeContexts:
          $ref: "#/components/schemas/ActiveContextsString"
          description: A list of active contexts for the session.
  x-stackQL-resources:
    sessions:
      id: aws.lex_runtime.sessions
      name: sessions
      title: sessions
      methods:
        delete_session:
          operation:
            $ref: "#/paths/~1bot~1{bot_name}~1alias~1{bot_alias}~1user~1{user_id}~1session/delete"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        put_session:
          operation:
            $ref: "#/paths/~1bot~1{bot_name}~1alias~1{bot_alias}~1user~1{user_id}~1session/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        get_session:
          operation:
            $ref: "#/paths/~1bot~1{bot_name}~1alias~1{bot_alias}~1user~1{user_id}~1session~1/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/sessions/methods/get_session"
        insert: []
        update: []
        replace:
          - $ref: "#/components/x-stackQL-resources/sessions/methods/put_session"
        delete:
          - $ref: "#/components/x-stackQL-resources/sessions/methods/delete_session"
