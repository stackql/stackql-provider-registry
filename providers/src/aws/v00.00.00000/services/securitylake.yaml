openapi: 3.0.0
info:
  version: "2018-05-10"
  title: Amazon Security Lake
  description: Amazon Security Lake
  x-serviceName: securitylake
  x-serviceAlias: securitylake
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: securitylake
  x-jsonVersion: "1.1"
servers:
  - url: https://securitylake.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for securitylake
paths:
  /v1/datalake/logsources/aws:
    post:
      operationId: CreateAwsLogSource
      description: Adds a natively supported Amazon Web Services service as an Amazon Security Lake source. Enables source types for member accounts in required Amazon Web Services Regions, based on the parameters you specify. You can choose any source type in any Region for either accounts that are part of a trusted organization or standalone accounts. Once you add an Amazon Web Services service as a source, Security Lake starts collecting logs and events from it. You can use this API only to enable natively supported Amazon Web Services services as a source. Use CreateCustomLogSource to enable data collection from a custom source.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sources:
                  $ref: "#/components/schemas/AwsLogSourceConfigurationList"
              required:
                - sources
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAwsLogSourceResponse"
  /v1/datalake/logsources/custom:
    post:
      operationId: CreateCustomLogSource
      description: Adds a third-party custom source in Amazon Security Lake, from the Amazon Web Services Region where you want to create a custom source. Security Lake can collect logs and events from third-party custom sources. After creating the appropriate IAM role to invoke Glue crawler, use this API to add a custom source name in Security Lake. This operation creates a partition in the Amazon S3 bucket for Security Lake as the target location for log files from the custom source. In addition, this operation also creates an associated Glue table and an Glue crawler.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                configuration:
                  $ref: "#/components/schemas/CustomLogSourceConfiguration"
                eventClasses:
                  $ref: "#/components/schemas/OcsfEventClassList"
                sourceName:
                  $ref: "#/components/schemas/CustomLogSourceName"
                sourceVersion:
                  $ref: "#/components/schemas/CustomLogSourceVersion"
              required:
                - configuration
                - sourceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCustomLogSourceResponse"
  /v1/datalake:
    post:
      operationId: CreateDataLake
      description: Initializes an Amazon Security Lake instance with the provided (or default) configuration. You can enable Security Lake in Amazon Web Services Regions with customized settings before enabling log collection in Regions. To specify particular Regions, configure these Regions using the configurations parameter. If you have already enabled Security Lake in a Region when you call this command, the command will update the Region if you provide new configuration parameters. If you have not already enabled Security Lake in the Region when you call this API, it will set up the data lake in the Region with the specified configurations. When you enable Security Lake, it starts ingesting security data after the CreateAwsLogSource call and after you create subscribers using the CreateSubscriber API. This includes ingesting security data from sources, storing data, and making data accessible to subscribers. Security Lake also enables all the existing settings and resources that it stores or maintains for your Amazon Web Services account in the current Region, including security log and event data. For more information, see the Amazon Security Lake User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                configurations:
                  $ref: "#/components/schemas/DataLakeConfigurationList"
                metaStoreManagerRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - configurations
                - metaStoreManagerRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataLakeResponse"
    put:
      operationId: UpdateDataLake
      description: "You can use UpdateDataLake to specify where to store your security data, how it should be encrypted at rest and for how long. You can add a Rollup Region to consolidate data from multiple Amazon Web Services Regions, replace default encryption (SSE-S3) with Customer Manged Key, or specify transition and expiration actions through storage Lifecycle management. The UpdateDataLake API works as an \"upsert\" operation that performs an insert if the specified item or record does not exist, or an update if it already exists. Security Lake securely stores your data at rest using Amazon Web Services encryption solutions. For more details, see Data protection in Amazon Security Lake. For example, omitting the key encryptionConfiguration from a Region that is included in an update call that currently uses KMS will leave that Region's KMS key in place, but specifying encryptionConfiguration: {kmsKeyId: 'S3_MANAGED_KEY'} for that same Region will reset the key to S3-managed. For more details about lifecycle management and how to update retention settings for one or more Regions after enabling Security Lake, see the Amazon Security Lake User Guide."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                configurations:
                  $ref: "#/components/schemas/DataLakeConfigurationList"
                metaStoreManagerRoleArn:
                  $ref: "#/components/schemas/RoleArn"
              required:
                - configurations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDataLakeResponse"
  /v1/datalake/exceptions/subscription:
    post:
      operationId: CreateDataLakeExceptionSubscription
      description: Creates the specified notification subscription in Amazon Security Lake for the organization you specify. The notification subscription is created for exceptions that cannot be resolved by Security Lake automatically.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                exceptionTimeToLive:
                  $ref: "#/components/schemas/CreateDataLakeExceptionSubscriptionRequestExceptionTimeToLiveLong"
                notificationEndpoint:
                  $ref: "#/components/schemas/SafeString"
                subscriptionProtocol:
                  $ref: "#/components/schemas/SubscriptionProtocol"
              required:
                - notificationEndpoint
                - subscriptionProtocol
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataLakeExceptionSubscriptionResponse"
    delete:
      operationId: DeleteDataLakeExceptionSubscription
      description: Deletes the specified notification subscription in Amazon Security Lake for the organization you specify.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDataLakeExceptionSubscriptionResponse"
    get:
      operationId: GetDataLakeExceptionSubscription
      description: Retrieves the protocol and endpoint that were provided when subscribing to Amazon SNS topics for exception notifications.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataLakeExceptionSubscriptionResponse"
    put:
      operationId: UpdateDataLakeExceptionSubscription
      description: Updates the specified notification subscription in Amazon Security Lake for the organization you specify.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                exceptionTimeToLive:
                  $ref: "#/components/schemas/UpdateDataLakeExceptionSubscriptionRequestExceptionTimeToLiveLong"
                notificationEndpoint:
                  $ref: "#/components/schemas/SafeString"
                subscriptionProtocol:
                  $ref: "#/components/schemas/SubscriptionProtocol"
              required:
                - notificationEndpoint
                - subscriptionProtocol
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDataLakeExceptionSubscriptionResponse"
  /v1/datalake/organization/configuration:
    post:
      operationId: CreateDataLakeOrganizationConfiguration
      description: Automatically enables Amazon Security Lake for new member accounts in your organization. Security Lake is not automatically enabled for any existing member accounts in your organization. This operation merges the new data lake organization configuration with the existing configuration for Security Lake in your organization. If you want to create a new data lake organization configuration, you must delete the existing one using DeleteDataLakeOrganizationConfiguration.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                autoEnableNewAccount:
                  $ref: "#/components/schemas/DataLakeAutoEnableNewAccountConfigurationList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataLakeOrganizationConfigurationResponse"
    get:
      operationId: GetDataLakeOrganizationConfiguration
      description: Retrieves the configuration that will be automatically set up for accounts added to the organization after the organization has onboarded to Amazon Security Lake. This API does not take input parameters.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataLakeOrganizationConfigurationResponse"
  /v1/subscribers:
    post:
      operationId: CreateSubscriber
      description: Creates a subscriber for accounts that are already enabled in Amazon Security Lake. You can create a subscriber with access to data in the current Amazon Web Services Region.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accessTypes:
                  $ref: "#/components/schemas/AccessTypeList"
                sources:
                  $ref: "#/components/schemas/LogSourceResourceList"
                subscriberDescription:
                  $ref: "#/components/schemas/DescriptionString"
                subscriberIdentity:
                  $ref: "#/components/schemas/AwsIdentity"
                subscriberName:
                  $ref: "#/components/schemas/CreateSubscriberRequestSubscriberNameString"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - sources
                - subscriberIdentity
                - subscriberName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSubscriberResponse"
    get:
      operationId: ListSubscribers
      description: Lists all subscribers for the specific Amazon Security Lake account ID. You can retrieve a list of subscriptions associated with a specific organization or Amazon Web Services account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of accounts for which the configuration is displayed.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If nextToken is returned, there are more results available. You can repeat the call using the returned token to retrieve the next page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubscribersResponse"
  /v1/subscribers/{subscriber_id}/notification:
    post:
      operationId: CreateSubscriberNotification
      description: Notifies the subscriber when new data is written to the data lake for the sources that the subscriber consumes in Security Lake. You can create only one subscriber notification per subscriber.
      parameters:
        - name: subscriber_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The subscriber ID for the notification subscription.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                configuration:
                  $ref: "#/components/schemas/NotificationConfiguration"
              required:
                - configuration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSubscriberNotificationResponse"
    delete:
      operationId: DeleteSubscriberNotification
      description: Deletes the specified subscription notification in Amazon Security Lake for the organization you specify.
      parameters:
        - name: subscriber_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The ID of the Security Lake subscriber account.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSubscriberNotificationResponse"
    put:
      operationId: UpdateSubscriberNotification
      description: Updates an existing notification method for the subscription (SQS or HTTPs endpoint) or switches the notification subscription endpoint for a subscriber.
      parameters:
        - name: subscriber_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The subscription ID for which the subscription notification is specified.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                configuration:
                  $ref: "#/components/schemas/NotificationConfiguration"
              required:
                - configuration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSubscriberNotificationResponse"
  /v1/datalake/logsources/aws/delete:
    post:
      operationId: DeleteAwsLogSource
      description: Removes a natively supported Amazon Web Services service as an Amazon Security Lake source. You can remove a source for one or more Regions. When you remove the source, Security Lake stops collecting data from that source in the specified Regions and accounts, and subscribers can no longer consume new data from the source. However, subscribers can still consume data that Security Lake collected from the source before removal. You can choose any source type in any Amazon Web Services Region for either accounts that are part of a trusted organization or standalone accounts.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sources:
                  $ref: "#/components/schemas/AwsLogSourceConfigurationList"
              required:
                - sources
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAwsLogSourceResponse"
  /v1/datalake/logsources/custom/{source_name}:
    delete:
      operationId: DeleteCustomLogSource
      description: Removes a custom log source from Amazon Security Lake, to stop sending data from the custom source to Security Lake.
      parameters:
        - name: source_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CustomLogSourceName"
          description: The source name of custom log source that you want to delete.
        - name: sourceVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CustomLogSourceVersion"
          description: The source version for the third-party custom source. You can limit the custom source removal to the specified source version.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCustomLogSourceResponse"
  /v1/datalake/delete:
    post:
      operationId: DeleteDataLake
      description: When you disable Amazon Security Lake from your account, Security Lake is disabled in all Amazon Web Services Regions and it stops collecting data from your sources. Also, this API automatically takes steps to remove the account from Security Lake. However, Security Lake retains all of your existing settings and the resources that it created in your Amazon Web Services account in the current Amazon Web Services Region. The DeleteDataLake operation does not delete the data that is stored in your Amazon S3 bucket, which is owned by your Amazon Web Services account. For more information, see the Amazon Security Lake User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                regions:
                  $ref: "#/components/schemas/RegionList"
              required:
                - regions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDataLakeResponse"
  /v1/datalake/organization/configuration/delete:
    post:
      operationId: DeleteDataLakeOrganizationConfiguration
      description: Turns off automatic enablement of Amazon Security Lake for member accounts that are added to an organization in Organizations. Only the delegated Security Lake administrator for an organization can perform this operation. If the delegated Security Lake administrator performs this operation, new member accounts won't automatically contribute data to the data lake.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                autoEnableNewAccount:
                  $ref: "#/components/schemas/DataLakeAutoEnableNewAccountConfigurationList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDataLakeOrganizationConfigurationResponse"
  /v1/subscribers/{subscriber_id}:
    delete:
      operationId: DeleteSubscriber
      description: Deletes the subscription permission and all notification settings for accounts that are already enabled in Amazon Security Lake. When you run DeleteSubscriber, the subscriber will no longer consume data from Security Lake and the subscriber is removed. This operation deletes the subscriber and removes access to data in the current Amazon Web Services Region.
      parameters:
        - name: subscriber_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: A value created by Security Lake that uniquely identifies your DeleteSubscriber API request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSubscriberResponse"
    get:
      operationId: GetSubscriber
      description: Retrieves the subscription information for the specified subscription ID. You can get information about a specific subscriber.
      parameters:
        - name: subscriber_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: A value created by Amazon Security Lake that uniquely identifies your GetSubscriber API request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSubscriberResponse"
    put:
      operationId: UpdateSubscriber
      description: Updates an existing subscription for the given Amazon Security Lake account ID. You can update a subscriber by changing the sources that the subscriber consumes data from.
      parameters:
        - name: subscriber_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: A value created by Security Lake that uniquely identifies your subscription.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                sources:
                  $ref: "#/components/schemas/LogSourceResourceList"
                subscriberDescription:
                  $ref: "#/components/schemas/DescriptionString"
                subscriberIdentity:
                  $ref: "#/components/schemas/AwsIdentity"
                subscriberName:
                  $ref: "#/components/schemas/UpdateSubscriberRequestSubscriberNameString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSubscriberResponse"
  /v1/datalake/delegate:
    delete:
      operationId: DeregisterDataLakeDelegatedAdministrator
      description: Deletes the Amazon Security Lake delegated administrator account for the organization. This API can only be called by the organization management account. The organization management account cannot be the delegated administrator account.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeregisterDataLakeDelegatedAdministratorResponse"
    post:
      operationId: RegisterDataLakeDelegatedAdministrator
      description: Designates the Amazon Security Lake delegated administrator account for the organization. This API can only be called by the organization management account. The organization management account cannot be the delegated administrator account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountId:
                  $ref: "#/components/schemas/SafeString"
              required:
                - accountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterDataLakeDelegatedAdministratorResponse"
  /v1/datalake/sources:
    post:
      operationId: GetDataLakeSources
      description: Retrieves a snapshot of the current Region, including whether Amazon Security Lake is enabled for those accounts and which sources Security Lake is collecting data from.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                accounts:
                  $ref: "#/components/schemas/AccountList"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataLakeSourcesResponse"
  /v1/datalake/exceptions:
    post:
      operationId: ListDataLakeExceptions
      description: Lists the Amazon Security Lake exceptions that you can use to find the source of problems and fix them.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                regions:
                  $ref: "#/components/schemas/RegionList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataLakeExceptionsResponse"
  /v1/datalakes:
    get:
      operationId: ListDataLakes
      description: Retrieves the Amazon Security Lake configuration object for the specified Amazon Web Services Regions. You can use this operation to determine whether Security Lake is enabled for a Region.
      parameters:
        - name: regions
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RegionList"
          description: The list of Regions where Security Lake is enabled.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataLakesResponse"
  /v1/datalake/logsources/list:
    post:
      operationId: ListLogSources
      description: Retrieves the log sources.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                accounts:
                  $ref: "#/components/schemas/AccountList"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                regions:
                  $ref: "#/components/schemas/RegionList"
                sources:
                  $ref: "#/components/schemas/LogSourceResourceList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLogSourcesResponse"
  /v1/tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: "Retrieves the tags (keys and values) that are associated with an Amazon Security Lake resource: a subscriber, or the data lake configuration for your Amazon Web Services account in a particular Amazon Web Services Region."
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon Security Lake resource for which you want to retrieve the tags.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: "Adds or updates one or more tags that are associated with an Amazon Security Lake resource: a subscriber, or the data lake configuration for your Amazon Web Services account in a particular Amazon Web Services Region. A tag is a label that you can define and associate with Amazon Web Services resources. Each tag consists of a required tag key and an associated tag value. A tag key is a general label that acts as a category for a more specific tag value. A tag value acts as a descriptor for a tag key. Tags can help you identify, categorize, and manage resources in different ways, such as by owner, environment, or other criteria. For more information, see Tagging Amazon Security Lake resources in the Amazon Security Lake User Guide."
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon Security Lake resource to add or update the tags for.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: "Removes one or more tags (keys and values) from an Amazon Security Lake resource: a subscriber, or the data lake configuration for your Amazon Web Services account in a particular Amazon Web Services Region."
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon Security Lake resource to remove one or more tags from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: A list of one or more tag keys. For each value in the list, specify the tag key for a tag to remove from the Amazon Security Lake resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AwsLogSourceConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/AwsLogSourceConfiguration"
    AwsLogSourceConfiguration:
      description: To add a natively-supported Amazon Web Services service as a log source, use these parameters to specify the configuration settings for the log source.
      type: object
      properties:
        accounts:
          $ref: "#/components/schemas/AccountList"
          description: Specify the Amazon Web Services account information where you want to enable Security Lake.
        regions:
