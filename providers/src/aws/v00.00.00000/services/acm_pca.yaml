openapi: 3.0.0
info:
  version: "2017-08-22"
  title: AWS Certificate Manager Private Certificate Authority
  description: AWS Certificate Manager Private Certificate Authority
  x-serviceName: acm-pca
  x-serviceAlias: acm_pca
  x-protocol: json
  x-apiVersion: "2017-08-22"
  x-endpointPrefix: acm-pca
  x-targetPrefix: ACMPrivateCA
  x-jsonVersion: "1.1"
servers:
  - url: https://acm-pca.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for acm-pca
paths:
  /CreateCertificateAuthority:
    post:
      operationId: CreateCertificateAuthority
      description: Creates a root or subordinate private certificate authority (CA). You must specify the CA configuration, an optional configuration for Online Certificate Status Protocol (OCSP) and/or a certificate revocation list (CRL), the CA type, and an optional idempotency token to avoid accidental creation of multiple CAs. The CA configuration specifies the name of the algorithm and key size to be used to create the CA private key, the type of signing algorithm that the CA uses, and X.500 subject information. The OCSP configuration can optionally specify a custom URL for the OCSP responder. The CRL configuration specifies the CRL expiration period in days (the validity period of the CRL), the Amazon S3 bucket that will contain the CRL, and a CNAME alias for the S3 bucket that is included in certificates issued by the CA. If successful, this action returns the Amazon Resource Name (ARN) of the CA. Both Amazon Web Services Private CA and the IAM principal must have permission to write to the S3 bucket that you specify. If the IAM principal making the call does not have permission to write to the bucket, then an exception is thrown. For more information, see Access policies for CRLs in Amazon S3. Amazon Web Services Private CA assets that are stored in Amazon S3 can be protected with encryption. For more information, see Encrypting Your CRLs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.CreateCertificateAuthority
            default: ACMPrivateCA.CreateCertificateAuthority
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateAuthorityConfiguration:
                  $ref: "#/components/schemas/CertificateAuthorityConfiguration"
                  description: Name and bit size of the private key algorithm, the name of the signing algorithm, and X.500 certificate subject information.
                RevocationConfiguration:
                  $ref: "#/components/schemas/RevocationConfiguration"
                  description: Contains information to enable support for Online Certificate Status Protocol (OCSP), certificate revocation list (CRL), both protocols, or neither. By default, both certificate validation mechanisms are disabled. The following requirements apply to revocation configurations. A configuration disabling CRLs or OCSP must contain only the Enabled=False parameter, and will fail if other parameters such as CustomCname or ExpirationInDays are included. In a CRL configuration, the S3BucketName parameter must conform to Amazon S3 bucket naming rules. A configuration containing a custom Canonical Name (CNAME) parameter for CRLs or OCSP must conform to RFC2396 restrictions on the use of special characters in a CNAME. In a CRL or OCSP configuration, the value of a CNAME parameter must not include a protocol prefix such as "http://" or "https://". For more information, see the OcspConfiguration and CrlConfiguration types.
                CertificateAuthorityType:
                  $ref: "#/components/schemas/CertificateAuthorityType"
                  description: The type of the certificate authority.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: Custom string that can be used to distinguish between calls to the CreateCertificateAuthority action. Idempotency tokens for CreateCertificateAuthority time out after five minutes. Therefore, if you call CreateCertificateAuthority multiple times with the same idempotency token within five minutes, Amazon Web Services Private CA recognizes that you are requesting only certificate authority and will issue only one. If you change the idempotency token for each call, Amazon Web Services Private CA recognizes that you are requesting multiple certificate authorities.
                KeyStorageSecurityStandard:
                  $ref: "#/components/schemas/KeyStorageSecurityStandard"
                  description: "Specifies a cryptographic key management compliance standard for handling and protecting CA keys. Default: FIPS_140_2_LEVEL_3_OR_HIGHER Some Amazon Web Services Regions don't support the default value. When you create a CA in these Regions, you must use CCPC_LEVEL_1_OR_HIGHER for the KeyStorageSecurityStandard parameter. If you don't, the operation returns an InvalidArgsException with this message: \"A certificate authority cannot be created in this region with the specified security standard.\" For information about security standard support in different Amazon Web Services Regions, see Storage and security compliance of Amazon Web Services Private CA private keys."
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Key-value pairs that will be attached to the new private CA. You can associate up to 50 tags with a private CA. For information using tags with IAM to manage permissions, see Controlling Access Using IAM Tags.
                UsageMode:
                  $ref: "#/components/schemas/CertificateAuthorityUsageMode"
                  description: Specifies whether the CA issues general-purpose certificates that typically require a revocation mechanism, or short-lived certificates that may optionally omit revocation because they expire quickly. Short-lived certificate validity is limited to seven days. The default value is GENERAL_PURPOSE.
              required:
                - CertificateAuthorityConfiguration
                - CertificateAuthorityType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCertificateAuthorityResponse"
  /CreateCertificateAuthorityAuditReport:
    post:
      operationId: CreateCertificateAuthorityAuditReport
      description: Creates an audit report that lists every time that your CA private key is used to issue a certificate. The IssueCertificate and RevokeCertificate actions use the private key. To save the audit report to your designated Amazon S3 bucket, you must create a bucket policy that grants Amazon Web Services Private CA permission to access and write to it. For an example policy, see Prepare an Amazon S3 bucket for audit reports. Amazon Web Services Private CA assets that are stored in Amazon S3 can be protected with encryption. For more information, see Encrypting Your Audit Reports. You can generate a maximum of one report every 30 minutes.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.CreateCertificateAuthorityAuditReport
            default: ACMPrivateCA.CreateCertificateAuthorityAuditReport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Name (ARN) of the CA to be audited. This is of the form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012 ."
                S3BucketName:
                  $ref: "#/components/schemas/S3BucketName"
                  description: The name of the S3 bucket that will contain the audit report.
                AuditReportResponseFormat:
                  $ref: "#/components/schemas/AuditReportResponseFormat"
                  description: The format in which to create the report. This can be either JSON or CSV.
              required:
                - CertificateAuthorityArn
                - S3BucketName
                - AuditReportResponseFormat
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCertificateAuthorityAuditReportResponse"
  /CreatePermission:
    post:
      operationId: CreatePermission
      description: Grants one or more permissions on a private CA to the Certificate Manager (ACM) service principal (acm.amazonaws.com). These permissions allow ACM to issue and renew ACM certificates that reside in the same Amazon Web Services account as the CA. You can list current permissions with the ListPermissions action and revoke them with the DeletePermission action. About Permissions If the private CA and the certificates it issues reside in the same account, you can use CreatePermission to grant permissions for ACM to carry out automatic certificate renewals. For automatic certificate renewal to succeed, the ACM service principal needs permissions to create, retrieve, and list certificates. If the private CA and the ACM certificates reside in different accounts, then permissions cannot be used to enable automatic renewals. Instead, the ACM certificate owner must set up a resource-based policy to enable cross-account issuance and renewals. For more information, see Using a Resource Based Policy with Amazon Web Services Private CA.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.CreatePermission
            default: ACMPrivateCA.CreatePermission
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Name (ARN) of the CA that grants the permissions. You can find the ARN by calling the ListCertificateAuthorities action. This must have the following form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012 ."
                Principal:
                  $ref: "#/components/schemas/Principal"
                  description: The Amazon Web Services service or identity that receives the permission. At this time, the only valid principal is acm.amazonaws.com.
                SourceAccount:
                  $ref: "#/components/schemas/AccountId"
                  description: The ID of the calling account.
                Actions:
                  $ref: "#/components/schemas/ActionList"
                  description: The actions that the specified Amazon Web Services service principal can use. These include IssueCertificate, GetCertificate, and ListPermissions.
              required:
                - CertificateAuthorityArn
      responses:
        "200":
          description: Success
  /DeleteCertificateAuthority:
    post:
      operationId: DeleteCertificateAuthority
      description: Deletes a private certificate authority (CA). You must provide the Amazon Resource Name (ARN) of the private CA that you want to delete. You can find the ARN by calling the ListCertificateAuthorities action. Deleting a CA will invalidate other CAs and certificates below it in your CA hierarchy. Before you can delete a CA that you have created and activated, you must disable it. To do this, call the UpdateCertificateAuthority action and set the CertificateAuthorityStatus parameter to DISABLED. Additionally, you can delete a CA if you are waiting for it to be created (that is, the status of the CA is CREATING). You can also delete it if the CA has been created but you haven't yet imported the signed certificate into Amazon Web Services Private CA (that is, the status of the CA is PENDING_CERTIFICATE). When you successfully call DeleteCertificateAuthority, the CA's status changes to DELETED. However, the CA won't be permanently deleted until the restoration period has passed. By default, if you do not set the PermanentDeletionTimeInDays parameter, the CA remains restorable for 30 days. You can set the parameter from 7 to 30 days. The DescribeCertificateAuthority action returns the time remaining in the restoration window of a private CA in the DELETED state. To restore an eligible CA, call the RestoreCertificateAuthority action. A private CA can be deleted if it is in the PENDING_CERTIFICATE, CREATING, EXPIRED, DISABLED, or FAILED state. To delete a CA in the ACTIVE state, you must first disable it, or else the delete request results in an exception. If you are deleting a private CA in the PENDING_CERTIFICATE or DISABLED state, you can set the length of its restoration period to 7-30 days. The default is 30. During this time, the status is set to DELETED and the CA can be restored. A private CA deleted in the CREATING or FAILED state has no assigned restoration period and cannot be restored.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.DeleteCertificateAuthority
            default: ACMPrivateCA.DeleteCertificateAuthority
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Name (ARN) that was returned when you called CreateCertificateAuthority. This must have the following form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012 ."
                PermanentDeletionTimeInDays:
                  $ref: "#/components/schemas/PermanentDeletionTimeInDays"
                  description: The number of days to make a CA restorable after it has been deleted. This can be anywhere from 7 to 30 days, with 30 being the default.
              required:
                - CertificateAuthorityArn
      responses:
        "200":
          description: Success
  /DeletePermission:
    post:
      operationId: DeletePermission
      description: Revokes permissions on a private CA granted to the Certificate Manager (ACM) service principal (acm.amazonaws.com). These permissions allow ACM to issue and renew ACM certificates that reside in the same Amazon Web Services account as the CA. If you revoke these permissions, ACM will no longer renew the affected certificates automatically. Permissions can be granted with the CreatePermission action and listed with the ListPermissions action. About Permissions If the private CA and the certificates it issues reside in the same account, you can use CreatePermission to grant permissions for ACM to carry out automatic certificate renewals. For automatic certificate renewal to succeed, the ACM service principal needs permissions to create, retrieve, and list certificates. If the private CA and the ACM certificates reside in different accounts, then permissions cannot be used to enable automatic renewals. Instead, the ACM certificate owner must set up a resource-based policy to enable cross-account issuance and renewals. For more information, see Using a Resource Based Policy with Amazon Web Services Private CA.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.DeletePermission
            default: ACMPrivateCA.DeletePermission
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Number (ARN) of the private CA that issued the permissions. You can find the CA's ARN by calling the ListCertificateAuthorities action. This must have the following form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012 ."
                Principal:
                  $ref: "#/components/schemas/Principal"
                  description: The Amazon Web Services service or identity that will have its CA permissions revoked. At this time, the only valid service principal is acm.amazonaws.com
                SourceAccount:
                  $ref: "#/components/schemas/AccountId"
                  description: The Amazon Web Services account that calls this action.
              required:
                - CertificateAuthorityArn
      responses:
        "200":
          description: Success
  /DeletePolicy:
    post:
      operationId: DeletePolicy
      description: Deletes the resource-based policy attached to a private CA. Deletion will remove any access that the policy has granted. If there is no policy attached to the private CA, this action will return successful. If you delete a policy that was applied through Amazon Web Services Resource Access Manager (RAM), the CA will be removed from all shares in which it was included. The Certificate Manager Service Linked Role that the policy supports is not affected when you delete the policy. The current policy can be shown with GetPolicy and updated with PutPolicy. About Policies A policy grants access on a private CA to an Amazon Web Services customer account, to Amazon Web Services Organizations, or to an Amazon Web Services Organizations unit. Policies are under the control of a CA administrator. For more information, see Using a Resource Based Policy with Amazon Web Services Private CA. A policy permits a user of Certificate Manager (ACM) to issue ACM certificates signed by a CA in another account. For ACM to manage automatic renewal of these certificates, the ACM user must configure a Service Linked Role (SLR). The SLR allows the ACM service to assume the identity of the user, subject to confirmation against the Amazon Web Services Private CA policy. For more information, see Using a Service Linked Role with ACM. Updates made in Amazon Web Services Resource Manager (RAM) are reflected in policies. For more information, see Attach a Policy for Cross-Account Access.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.DeletePolicy
            default: ACMPrivateCA.DeletePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Number (ARN) of the private CA that will have its policy deleted. You can find the CA's ARN by calling the ListCertificateAuthorities action. The ARN value must have the form arn:aws:acm-pca:region:account:certificate-authority/01234567-89ab-cdef-0123-0123456789ab.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
  /DescribeCertificateAuthority:
    post:
      operationId: DescribeCertificateAuthority
      description: "Lists information about your private certificate authority (CA) or one that has been shared with you. You specify the private CA on input by its ARN (Amazon Resource Name). The output contains the status of your CA. This can be any of the following: CREATING - Amazon Web Services Private CA is creating your private certificate authority. PENDING_CERTIFICATE - The certificate is pending. You must use your Amazon Web Services Private CA-hosted or on-premises root or subordinate CA to sign your private CA CSR and then import it into Amazon Web Services Private CA. ACTIVE - Your private CA is active. DISABLED - Your private CA has been disabled. EXPIRED - Your private CA certificate has expired. FAILED - Your private CA has failed. Your CA can fail because of problems such a network outage or back-end Amazon Web Services failure or other errors. A failed CA can never return to the pending state. You must create a new CA. DELETED - Your private CA is within the restoration period, after which it is permanently deleted. The length of time remaining in the CA's restoration period is also included in this action's output."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.DescribeCertificateAuthority
            default: ACMPrivateCA.DescribeCertificateAuthority
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Name (ARN) that was returned when you called CreateCertificateAuthority. This must be of the form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012 ."
              required:
                - CertificateAuthorityArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeCertificateAuthorityResponse"
  /DescribeCertificateAuthorityAuditReport:
    post:
      operationId: DescribeCertificateAuthorityAuditReport
      description: Lists information about a specific audit report created by calling the CreateCertificateAuthorityAuditReport action. Audit information is created every time the certificate authority (CA) private key is used. The private key is used when you call the IssueCertificate action or the RevokeCertificate action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.DescribeCertificateAuthorityAuditReport
            default: ACMPrivateCA.DescribeCertificateAuthorityAuditReport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Name (ARN) of the private CA. This must be of the form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012 ."
                AuditReportId:
                  $ref: "#/components/schemas/AuditReportId"
                  description: The report ID returned by calling the CreateCertificateAuthorityAuditReport action.
              required:
                - CertificateAuthorityArn
                - AuditReportId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeCertificateAuthorityAuditReportResponse"
  /GetCertificate:
    post:
      operationId: GetCertificate
      description: Retrieves a certificate from your private CA or one that has been shared with you. The ARN of the certificate is returned when you call the IssueCertificate action. You must specify both the ARN of your private CA and the ARN of the issued certificate when calling the GetCertificate action. You can retrieve the certificate if it is in the ISSUED, EXPIRED, or REVOKED state. You can call the CreateCertificateAuthorityAuditReport action to create a report that contains information about all of the certificates issued and revoked by your private CA.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.GetCertificate
            default: ACMPrivateCA.GetCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Name (ARN) that was returned when you called CreateCertificateAuthority. This must be of the form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012 ."
                CertificateArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The ARN of the issued certificate. The ARN contains the certificate serial number and must be in the following form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012/certificate/286535153982981100925020015808220737245"
              required:
                - CertificateAuthorityArn
                - CertificateArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCertificateResponse"
  /GetCertificateAuthorityCertificate:
    post:
      operationId: GetCertificateAuthorityCertificate
      description: Retrieves the certificate and certificate chain for your private certificate authority (CA) or one that has been shared with you. Both the certificate and the chain are base64 PEM-encoded. The chain does not include the CA certificate. Each certificate in the chain signs the one before it.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.GetCertificateAuthorityCertificate
            default: ACMPrivateCA.GetCertificateAuthorityCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Name (ARN) of your private CA. This is of the form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012 ."
              required:
                - CertificateAuthorityArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCertificateAuthorityCertificateResponse"
  /GetCertificateAuthorityCsr:
    post:
      operationId: GetCertificateAuthorityCsr
      description: Retrieves the certificate signing request (CSR) for your private certificate authority (CA). The CSR is created when you call the CreateCertificateAuthority action. Sign the CSR with your Amazon Web Services Private CA-hosted or on-premises root or subordinate CA. Then import the signed certificate back into Amazon Web Services Private CA by calling the ImportCertificateAuthorityCertificate action. The CSR is returned as a base64 PEM-encoded string.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.GetCertificateAuthorityCsr
            default: ACMPrivateCA.GetCertificateAuthorityCsr
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Name (ARN) that was returned when you called the CreateCertificateAuthority action. This must be of the form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012"
              required:
                - CertificateAuthorityArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCertificateAuthorityCsrResponse"
  /GetPolicy:
    post:
      operationId: GetPolicy
      description: Retrieves the resource-based policy attached to a private CA. If either the private CA resource or the policy cannot be found, this action returns a ResourceNotFoundException. The policy can be attached or updated with PutPolicy and removed with DeletePolicy. About Policies A policy grants access on a private CA to an Amazon Web Services customer account, to Amazon Web Services Organizations, or to an Amazon Web Services Organizations unit. Policies are under the control of a CA administrator. For more information, see Using a Resource Based Policy with Amazon Web Services Private CA. A policy permits a user of Certificate Manager (ACM) to issue ACM certificates signed by a CA in another account. For ACM to manage automatic renewal of these certificates, the ACM user must configure a Service Linked Role (SLR). The SLR allows the ACM service to assume the identity of the user, subject to confirmation against the Amazon Web Services Private CA policy. For more information, see Using a Service Linked Role with ACM. Updates made in Amazon Web Services Resource Manager (RAM) are reflected in policies. For more information, see Attach a Policy for Cross-Account Access.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.GetPolicy
            default: ACMPrivateCA.GetPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Number (ARN) of the private CA that will have its policy retrieved. You can find the CA's ARN by calling the ListCertificateAuthorities action.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPolicyResponse"
  /ImportCertificateAuthorityCertificate:
    post:
      operationId: ImportCertificateAuthorityCertificate
      description: "Imports a signed private CA certificate into Amazon Web Services Private CA. This action is used when you are using a chain of trust whose root is located outside Amazon Web Services Private CA. Before you can call this action, the following preparations must in place: In Amazon Web Services Private CA, call the CreateCertificateAuthority action to create the private CA that you plan to back with the imported certificate. Call the GetCertificateAuthorityCsr action to generate a certificate signing request (CSR). Sign the CSR using a root or intermediate CA hosted by either an on-premises PKI hierarchy or by a commercial CA. Create a certificate chain and copy the signed certificate and the certificate chain to your working directory. Amazon Web Services Private CA supports three scenarios for installing a CA certificate: Installing a certificate for a root CA hosted by Amazon Web Services Private CA. Installing a subordinate CA certificate whose parent authority is hosted by Amazon Web Services Private CA. Installing a subordinate CA certificate whose parent authority is externally hosted. The following additional requirements apply when you import a CA certificate. Only a self-signed certificate can be imported as a root CA. A self-signed certificate cannot be imported as a subordinate CA. Your certificate chain must not include the private CA certificate that you are importing. Your root CA must be the last certificate in your chain. The subordinate certificate, if any, that your root CA signed must be next to last. The subordinate certificate signed by the preceding subordinate CA must come next, and so on until your chain is built. The chain must be PEM-encoded. The maximum allowed size of a certificate is 32 KB. The maximum allowed size of a certificate chain is 2 MB. Enforcement of Critical Constraints Amazon Web Services Private CA allows the following extensions to be marked critical in the imported CA certificate or chain. Authority key identifier Basic constraints (must be marked critical) Certificate policies Extended key usage Inhibit anyPolicy Issuer alternative name Key usage Name constraints Policy mappings Subject alternative name Subject directory attributes Subject key identifier Subject information access Amazon Web Services Private CA rejects the following extensions when they are marked critical in an imported CA certificate or chain. Authority information access CRL distribution points Freshest CRL Policy constraints Amazon Web Services Private Certificate Authority will also reject any other extension marked as critical not contained on the preceding list of allowed extensions."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.ImportCertificateAuthorityCertificate
            default: ACMPrivateCA.ImportCertificateAuthorityCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Name (ARN) that was returned when you called CreateCertificateAuthority. This must be of the form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012"
                Certificate:
                  $ref: "#/components/schemas/CertificateBodyBlob"
                  description: The PEM-encoded certificate for a private CA. This may be a self-signed certificate in the case of a root CA, or it may be signed by another CA that you control.
                CertificateChain:
                  $ref: "#/components/schemas/CertificateChainBlob"
                  description: A PEM-encoded file that contains all of your certificates, other than the certificate you're importing, chaining up to your root CA. Your Amazon Web Services Private CA-hosted or on-premises root certificate is the last in the chain, and each certificate in the chain signs the one preceding. This parameter must be supplied when you import a subordinate CA. When you import a root CA, there is no chain.
              required:
                - CertificateAuthorityArn
                - Certificate
      responses:
        "200":
          description: Success
  /IssueCertificate:
    post:
      operationId: IssueCertificate
      description: Uses your private certificate authority (CA), or one that has been shared with you, to issue a client certificate. This action returns the Amazon Resource Name (ARN) of the certificate. You can retrieve the certificate by calling the GetCertificate action and specifying the ARN. You cannot use the ACM ListCertificateAuthorities action to retrieve the ARNs of the certificates that you issue by using Amazon Web Services Private CA.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.IssueCertificate
            default: ACMPrivateCA.IssueCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApiPassthrough:
                  $ref: "#/components/schemas/ApiPassthrough"
                  description: Specifies X.509 certificate information to be included in the issued certificate. An APIPassthrough or APICSRPassthrough template variant must be selected, or else this parameter is ignored. For more information about using these templates, see Understanding Certificate Templates. If conflicting or duplicate certificate information is supplied during certificate issuance, Amazon Web Services Private CA applies order of operation rules to determine what information is used.
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Name (ARN) that was returned when you called CreateCertificateAuthority. This must be of the form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012"
                Csr:
                  $ref: "#/components/schemas/CsrBlob"
                  description: "The certificate signing request (CSR) for the certificate you want to issue. As an example, you can use the following OpenSSL command to create the CSR and a 2048 bit RSA private key. openssl req -new -newkey rsa:2048 -days 365 -keyout private/test_cert_priv_key.pem -out csr/test_cert_.csr If you have a configuration file, you can then use the following OpenSSL command. The usr_cert block in the configuration file contains your X509 version 3 extensions. openssl req -new -config openssl_rsa.cnf -extensions usr_cert -newkey rsa:2048 -days 365 -keyout private/test_cert_priv_key.pem -out csr/test_cert_.csr Note: A CSR must provide either a subject name or a subject alternative name or the request will be rejected."
                SigningAlgorithm:
                  $ref: "#/components/schemas/SigningAlgorithm"
                  description: The name of the algorithm that will be used to sign the certificate to be issued. This parameter should not be confused with the SigningAlgorithm parameter used to sign a CSR in the CreateCertificateAuthority action. The specified signing algorithm family (RSA or ECDSA) must match the algorithm family of the CA's secret key.
                TemplateArn:
                  $ref: "#/components/schemas/Arn"
                  description: "Specifies a custom configuration template to use when issuing a certificate. If this parameter is not provided, Amazon Web Services Private CA defaults to the EndEntityCertificate/V1 template. For CA certificates, you should choose the shortest path length that meets your needs. The path length is indicated by the PathLenN portion of the ARN, where N is the CA depth. Note: The CA depth configured on a subordinate CA certificate must not exceed the limit set by its parents in the CA hierarchy. For a list of TemplateArn values supported by Amazon Web Services Private CA, see Understanding Certificate Templates."
                Validity:
                  $ref: "#/components/schemas/Validity"
                  description: Information describing the end of the validity period of the certificate. This parameter sets the “Not After” date for the certificate. Certificate validity is the period of time during which a certificate is valid. Validity can be expressed as an explicit date and time when the certificate expires, or as a span of time after issuance, stated in days, months, or years. For more information, see Validity in RFC 5280. This value is unaffected when ValidityNotBefore is also specified. For example, if Validity is set to 20 days in the future, the certificate will expire 20 days from issuance time regardless of the ValidityNotBefore value. The end of the validity period configured on a certificate must not exceed the limit set on its parents in the CA hierarchy.
                ValidityNotBefore:
                  $ref: "#/components/schemas/Validity"
                  description: Information describing the start of the validity period of the certificate. This parameter sets the “Not Before" date for the certificate. By default, when issuing a certificate, Amazon Web Services Private CA sets the "Not Before" date to the issuance time minus 60 minutes. This compensates for clock inconsistencies across computer systems. The ValidityNotBefore parameter can be used to customize the “Not Before” value. Unlike the Validity parameter, the ValidityNotBefore parameter is optional. The ValidityNotBefore value is expressed as an explicit date and time, using the Validity type value ABSOLUTE. For more information, see Validity in this API reference and Validity in RFC 5280.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: Alphanumeric string that can be used to distinguish between calls to the IssueCertificate action. Idempotency tokens for IssueCertificate time out after five minutes. Therefore, if you call IssueCertificate multiple times with the same idempotency token within five minutes, Amazon Web Services Private CA recognizes that you are requesting only one certificate and will issue only one. If you change the idempotency token for each call, Amazon Web Services Private CA recognizes that you are requesting multiple certificates.
              required:
                - CertificateAuthorityArn
                - Csr
                - SigningAlgorithm
                - Validity
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueCertificateResponse"
  /ListCertificateAuthorities:
    post:
      operationId: ListCertificateAuthorities
      description: Lists the private certificate authorities that you created by using the CreateCertificateAuthority action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.ListCertificateAuthorities
            default: ACMPrivateCA.ListCertificateAuthorities
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: Use this parameter when paginating results to specify the maximum number of items to return in the response on each page. If additional items exist beyond the number you specify, the NextToken element is sent in the response. Use this NextToken value in a subsequent request to retrieve additional items. Although the maximum value is 1000, the action only returns a maximum of 100 items.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Use this parameter when paginating results in a subsequent request after you receive a response with truncated results. Set it to the value of the NextToken parameter from the response you just received.
                ResourceOwner:
                  $ref: "#/components/schemas/ResourceOwner"
                  description: Use this parameter to filter the returned set of certificate authorities based on their owner. The default is SELF.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCertificateAuthoritiesResponse"
  /ListPermissions:
    post:
      operationId: ListPermissions
      description: List all permissions on a private CA, if any, granted to the Certificate Manager (ACM) service principal (acm.amazonaws.com). These permissions allow ACM to issue and renew ACM certificates that reside in the same Amazon Web Services account as the CA. Permissions can be granted with the CreatePermission action and revoked with the DeletePermission action. About Permissions If the private CA and the certificates it issues reside in the same account, you can use CreatePermission to grant permissions for ACM to carry out automatic certificate renewals. For automatic certificate renewal to succeed, the ACM service principal needs permissions to create, retrieve, and list certificates. If the private CA and the ACM certificates reside in different accounts, then permissions cannot be used to enable automatic renewals. Instead, the ACM certificate owner must set up a resource-based policy to enable cross-account issuance and renewals. For more information, see Using a Resource Based Policy with Amazon Web Services Private CA.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.ListPermissions
            default: ACMPrivateCA.ListPermissions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: When paginating results, use this parameter to specify the maximum number of items to return in the response. If additional items exist beyond the number you specify, the NextToken element is sent in the response. Use this NextToken value in a subsequent request to retrieve additional items.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: When paginating results, use this parameter in a subsequent request after you receive a response with truncated results. Set it to the value of NextToken from the response you just received.
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Number (ARN) of the private CA to inspect. You can find the ARN by calling the ListCertificateAuthorities action. This must be of the form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012 You can get a private CA's ARN by running the ListCertificateAuthorities action."
              required:
                - CertificateAuthorityArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPermissionsResponse"
  /ListTags:
    post:
      operationId: ListTags
      description: Lists the tags, if any, that are associated with your private CA or one that has been shared with you. Tags are labels that you can use to identify and organize your CAs. Each tag consists of a key and an optional value. Call the TagCertificateAuthority action to add one or more tags to your CA. Call the UntagCertificateAuthority action to remove tags.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.ListTags
            default: ACMPrivateCA.ListTags
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: Use this parameter when paginating results to specify the maximum number of items to return in the response. If additional items exist beyond the number you specify, the NextToken element is sent in the response. Use this NextToken value in a subsequent request to retrieve additional items.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Use this parameter when paginating results in a subsequent request after you receive a response with truncated results. Set it to the value of NextToken from the response you just received.
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Name (ARN) that was returned when you called the CreateCertificateAuthority action. This must be of the form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012"
              required:
                - CertificateAuthorityArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsResponse"
  /PutPolicy:
    post:
      operationId: PutPolicy
      description: Attaches a resource-based policy to a private CA. A policy can also be applied by sharing a private CA through Amazon Web Services Resource Access Manager (RAM). For more information, see Attach a Policy for Cross-Account Access. The policy can be displayed with GetPolicy and removed with DeletePolicy. About Policies A policy grants access on a private CA to an Amazon Web Services customer account, to Amazon Web Services Organizations, or to an Amazon Web Services Organizations unit. Policies are under the control of a CA administrator. For more information, see Using a Resource Based Policy with Amazon Web Services Private CA. A policy permits a user of Certificate Manager (ACM) to issue ACM certificates signed by a CA in another account. For ACM to manage automatic renewal of these certificates, the ACM user must configure a Service Linked Role (SLR). The SLR allows the ACM service to assume the identity of the user, subject to confirmation against the Amazon Web Services Private CA policy. For more information, see Using a Service Linked Role with ACM. Updates made in Amazon Web Services Resource Manager (RAM) are reflected in policies. For more information, see Attach a Policy for Cross-Account Access.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.PutPolicy
            default: ACMPrivateCA.PutPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Number (ARN) of the private CA to associate with the policy. The ARN of the CA can be found by calling the ListCertificateAuthorities action.
                Policy:
                  $ref: "#/components/schemas/AWSPolicy"
                  description: The path and file name of a JSON-formatted IAM policy to attach to the specified private CA resource. If this policy does not contain all required statements or if it includes any statement that is not allowed, the PutPolicy action returns an InvalidPolicyException. For information about IAM policy and statement structure, see Overview of JSON Policies.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
  /RestoreCertificateAuthority:
    post:
      operationId: RestoreCertificateAuthority
      description: Restores a certificate authority (CA) that is in the DELETED state. You can restore a CA during the period that you defined in the PermanentDeletionTimeInDays parameter of the DeleteCertificateAuthority action. Currently, you can specify 7 to 30 days. If you did not specify a PermanentDeletionTimeInDays value, by default you can restore the CA at any time in a 30 day period. You can check the time remaining in the restoration period of a private CA in the DELETED state by calling the DescribeCertificateAuthority or ListCertificateAuthorities actions. The status of a restored CA is set to its pre-deletion status when the RestoreCertificateAuthority action returns. To change its status to ACTIVE, call the UpdateCertificateAuthority action. If the private CA was in the PENDING_CERTIFICATE state at deletion, you must use the ImportCertificateAuthorityCertificate action to import a certificate authority into the private CA before it can be activated. You cannot restore a CA after the restoration period has ended.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.RestoreCertificateAuthority
            default: ACMPrivateCA.RestoreCertificateAuthority
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Name (ARN) that was returned when you called the CreateCertificateAuthority action. This must be of the form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012"
              required:
                - CertificateAuthorityArn
      responses:
        "200":
          description: Success
  /RevokeCertificate:
    post:
      operationId: RevokeCertificate
      description: Revokes a certificate that was issued inside Amazon Web Services Private CA. If you enable a certificate revocation list (CRL) when you create or update your private CA, information about the revoked certificates will be included in the CRL. Amazon Web Services Private CA writes the CRL to an S3 bucket that you specify. A CRL is typically updated approximately 30 minutes after a certificate is revoked. If for any reason the CRL update fails, Amazon Web Services Private CA attempts makes further attempts every 15 minutes. With Amazon CloudWatch, you can create alarms for the metrics CRLGenerated and MisconfiguredCRLBucket. For more information, see Supported CloudWatch Metrics. Both Amazon Web Services Private CA and the IAM principal must have permission to write to the S3 bucket that you specify. If the IAM principal making the call does not have permission to write to the bucket, then an exception is thrown. For more information, see Access policies for CRLs in Amazon S3. Amazon Web Services Private CA also writes revocation information to the audit report. For more information, see CreateCertificateAuthorityAuditReport. You cannot revoke a root CA self-signed certificate.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.RevokeCertificate
            default: ACMPrivateCA.RevokeCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "Amazon Resource Name (ARN) of the private CA that issued the certificate to be revoked. This must be of the form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012"
                CertificateSerial:
                  $ref: "#/components/schemas/String128"
                  description: Serial number of the certificate to be revoked. This must be in hexadecimal format. You can retrieve the serial number by calling GetCertificate with the Amazon Resource Name (ARN) of the certificate you want and the ARN of your private CA. The GetCertificate action retrieves the certificate in the PEM format. You can use the following OpenSSL command to list the certificate in text format and copy the hexadecimal serial number. openssl x509 -in file_path -text -noout You can also copy the serial number from the console or use the DescribeCertificate action in the Certificate Manager API Reference.
                RevocationReason:
                  $ref: "#/components/schemas/RevocationReason"
                  description: Specifies why you revoked the certificate.
              required:
                - CertificateAuthorityArn
                - CertificateSerial
                - RevocationReason
      responses:
        "200":
          description: Success
  /TagCertificateAuthority:
    post:
      operationId: TagCertificateAuthority
      description: Adds one or more tags to your private CA. Tags are labels that you can use to identify and organize your Amazon Web Services resources. Each tag consists of a key and an optional value. You specify the private CA on input by its Amazon Resource Name (ARN). You specify the tag by using a key-value pair. You can apply a tag to just one private CA if you want to identify a specific characteristic of that CA, or you can apply the same tag to multiple private CAs if you want to filter for a common relationship among those CAs. To remove one or more tags, use the UntagCertificateAuthority action. Call the ListTags action to see what tags are associated with your CA. To attach tags to a private CA during the creation procedure, a CA administrator must first associate an inline IAM policy with the CreateCertificateAuthority action and explicitly allow tagging. For more information, see Attaching tags to a CA at the time of creation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.TagCertificateAuthority
            default: ACMPrivateCA.TagCertificateAuthority
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Name (ARN) that was returned when you called CreateCertificateAuthority. This must be of the form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012"
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: List of tags to be associated with the CA.
              required:
                - CertificateAuthorityArn
                - Tags
      responses:
        "200":
          description: Success
  /UntagCertificateAuthority:
    post:
      operationId: UntagCertificateAuthority
      description: Remove one or more tags from your private CA. A tag consists of a key-value pair. If you do not specify the value portion of the tag when calling this action, the tag will be removed regardless of value. If you specify a value, the tag is removed only if it is associated with the specified value. To add tags to a private CA, use the TagCertificateAuthority. Call the ListTags action to see what tags are associated with your CA.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.UntagCertificateAuthority
            default: ACMPrivateCA.UntagCertificateAuthority
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Name (ARN) that was returned when you called CreateCertificateAuthority. This must be of the form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012"
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: List of tags to be removed from the CA.
              required:
                - CertificateAuthorityArn
                - Tags
      responses:
        "200":
          description: Success
  /UpdateCertificateAuthority:
    post:
      operationId: UpdateCertificateAuthority
      description: Updates the status or configuration of a private certificate authority (CA). Your private CA must be in the ACTIVE or DISABLED state before you can update it. You can disable a private CA that is in the ACTIVE state or make a CA that is in the DISABLED state active again. Both Amazon Web Services Private CA and the IAM principal must have permission to write to the S3 bucket that you specify. If the IAM principal making the call does not have permission to write to the bucket, then an exception is thrown. For more information, see Access policies for CRLs in Amazon S3.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ACMPrivateCA.UpdateCertificateAuthority
            default: ACMPrivateCA.UpdateCertificateAuthority
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/Arn"
                  description: "Amazon Resource Name (ARN) of the private CA that issued the certificate to be revoked. This must be of the form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012"
                RevocationConfiguration:
                  $ref: "#/components/schemas/RevocationConfiguration"
                  description: Contains information to enable support for Online Certificate Status Protocol (OCSP), certificate revocation list (CRL), both protocols, or neither. If you don't supply this parameter, existing capibilites remain unchanged. For more information, see the OcspConfiguration and CrlConfiguration types. The following requirements apply to revocation configurations. A configuration disabling CRLs or OCSP must contain only the Enabled=False parameter, and will fail if other parameters such as CustomCname or ExpirationInDays are included. In a CRL configuration, the S3BucketName parameter must conform to Amazon S3 bucket naming rules. A configuration containing a custom Canonical Name (CNAME) parameter for CRLs or OCSP must conform to RFC2396 restrictions on the use of special characters in a CNAME. In a CRL or OCSP configuration, the value of a CNAME parameter must not include a protocol prefix such as "http://" or "https://". If you update the S3BucketName of CrlConfiguration, you can break revocation for existing certificates. In other words, if you call UpdateCertificateAuthority to update the CRL configuration's S3 bucket name, Amazon Web Services Private CA only writes CRLs to the new S3 bucket. Certificates issued prior to this point will have the old S3 bucket name in your CRL Distribution Point (CDP) extension, essentially breaking revocation. If you must update the S3 bucket, you'll need to reissue old certificates to keep the revocation working. Alternatively, you can use a CustomCname in your CRL configuration if you might need to change the S3 bucket name in the future.
                Status:
                  $ref: "#/components/schemas/CertificateAuthorityStatus"
                  description: Status of your private CA.
              required:
                - CertificateAuthorityArn
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    CertificateAuthorityConfiguration:
      description: Contains configuration information for your private certificate authority (CA). This includes information about the class of public key algorithm and the key pair that your private CA creates when it issues a certificate. It also includes the signature algorithm that it uses when issuing certificates, and its X.500 distinguished name. You must specify this information when you call the CreateCertificateAuthority action.
      type: object
      properties:
        KeyAlgorithm:
          $ref: "#/components/schemas/KeyAlgorithm"
          description: Type of the public key algorithm and size, in bits, of the key pair that your CA creates when it issues a certificate. When you create a subordinate CA, you must use a key algorithm supported by the parent CA.
        SigningAlgorithm:
          $ref: "#/components/schemas/SigningAlgorithm"
          description: Name of the algorithm your private CA uses to sign certificate requests. This parameter should not be confused with the SigningAlgorithm parameter used to sign certificates when they are issued.
        Subject:
          $ref: "#/components/schemas/ASN1Subject"
          description: Structure that contains X.500 distinguished name information for your private CA.
        CsrExtensions:
          $ref: "#/components/schemas/CsrExtensions"
          description: Specifies information to be added to the extension section of the certificate signing request (CSR).
      required:
        - KeyAlgorithm
        - SigningAlgorithm
        - Subject
    KeyAlgorithm:
      type: string
      enum:
        - RSA_2048
        - RSA_3072
        - RSA_4096
        - EC_prime256v1
        - EC_secp384r1
        - EC_secp521r1
        - ML_DSA_44
        - ML_DSA_65
        - ML_DSA_87
        - SM2
    SigningAlgorithm:
      type: string
      enum:
        - SHA256WITHECDSA
        - SHA384WITHECDSA
        - SHA512WITHECDSA
        - SHA256WITHRSA
        - SHA384WITHRSA
        - SHA512WITHRSA
        - SM3WITHSM2
        - ML_DSA_44
        - ML_DSA_65
        - ML_DSA_87
    ASN1Subject:
      description: Contains information about the certificate subject. The Subject field in the certificate identifies the entity that owns or controls the public key in the certificate. The entity can be a user, computer, device, or service. The Subject must contain an X.500 distinguished name (DN). A DN is a sequence of relative distinguished names (RDNs). The RDNs are separated by commas in the certificate.
      type: object
      properties:
        Country:
          $ref: "#/components/schemas/CountryCodeString"
          description: Two-digit code that specifies the country in which the certificate subject located.
        Organization:
          $ref: "#/components/schemas/String64"
          description: Legal name of the organization with which the certificate subject is affiliated.
        OrganizationalUnit:
          $ref: "#/components/schemas/String64"
          description: A subdivision or unit of the organization (such as sales or finance) with which the certificate subject is affiliated.
        DistinguishedNameQualifier:
          $ref: "#/components/schemas/ASN1PrintableString64"
          description: Disambiguating information for the certificate subject.
        State:
          $ref: "#/components/schemas/String128"
          description: State in which the subject of the certificate is located.
        CommonName:
          $ref: "#/components/schemas/String64"
          description: "For CA and end-entity certificates in a private PKI, the common name (CN) can be any string within the length limit. Note: In publicly trusted certificates, the common name must be a fully qualified domain name (FQDN) associated with the certificate subject."
        SerialNumber:
          $ref: "#/components/schemas/ASN1PrintableString64"
          description: The certificate serial number.
        Locality:
          $ref: "#/components/schemas/String128"
          description: The locality (such as a city or town) in which the certificate subject is located.
        Title:
          $ref: "#/components/schemas/String64"
          description: A title such as Mr. or Ms., which is pre-pended to the name to refer formally to the certificate subject.
        Surname:
          $ref: "#/components/schemas/String40"
          description: Family name. In the US and the UK, for example, the surname of an individual is ordered last. In Asian cultures the surname is typically ordered first.
        GivenName:
          $ref: "#/components/schemas/String16"
          description: First name.
        Initials:
          $ref: "#/components/schemas/String5"
          description: Concatenation that typically contains the first letter of the GivenName, the first letter of the middle name if one exists, and the first letter of the Surname.
        Pseudonym:
          $ref: "#/components/schemas/String128"
          description: Typically a shortened version of a longer GivenName. For example, Jonathan is often shortened to John. Elizabeth is often shortened to Beth, Liz, or Eliza.
        GenerationQualifier:
          $ref: "#/components/schemas/String3"
          description: Typically a qualifier appended to the name of an individual. Examples include Jr. for junior, Sr. for senior, and III for third.
        CustomAttributes:
          $ref: "#/components/schemas/CustomAttributeList"
          description: Contains a sequence of one or more X.500 relative distinguished names (RDNs), each of which consists of an object identifier (OID) and a value. For more information, see NIST’s definition of Object Identifier (OID). Custom attributes cannot be used in combination with standard attributes.
    CountryCodeString:
      type: string
      minLength: 2
      maxLength: 2
      pattern: "[A-Za-z]{2}"
    String64:
      type: string
      minLength: 0
      maxLength: 64
    ASN1PrintableString64:
      type: string
      minLength: 0
      maxLength: 64
      pattern: "[a-zA-Z0-9'()+-.?:/= ]*"
    String128:
      type: string
      minLength: 0
      maxLength: 128
    String40:
      type: string
      minLength: 0
      maxLength: 40
    String16:
      type: string
      minLength: 0
      maxLength: 16
    String5:
      type: string
      minLength: 0
      maxLength: 5
    String3:
      type: string
      minLength: 0
      maxLength: 3
    CustomAttributeList:
      type: array
      items:
        $ref: "#/components/schemas/CustomAttribute"
    CustomAttribute:
      description: Defines the X.500 relative distinguished name (RDN).
      type: object
      properties:
        ObjectIdentifier:
          $ref: "#/components/schemas/CustomObjectIdentifier"
          description: Specifies the object identifier (OID) of the attribute type of the relative distinguished name (RDN).
        Value:
          $ref: "#/components/schemas/String1To256"
          description: Specifies the attribute value of relative distinguished name (RDN).
      required:
        - ObjectIdentifier
        - Value
    CustomObjectIdentifier:
      type: string
      minLength: 0
      maxLength: 64
      pattern: ([0-2])\.([0-9]|([0-3][0-9]))((\.([0-9]+)){0,126})
    String1To256:
      type: string
      minLength: 1
      maxLength: 256
    CsrExtensions:
      description: Describes the certificate extensions to be added to the certificate signing request (CSR).
      type: object
      properties:
        KeyUsage:
          $ref: "#/components/schemas/KeyUsage"
          description: Indicates the purpose of the certificate and of the key contained in the certificate.
        SubjectInformationAccess:
          $ref: "#/components/schemas/AccessDescriptionList"
          description: For CA certificates, provides a path to additional information pertaining to the CA, such as revocation and policy. For more information, see Subject Information Access in RFC 5280.
    KeyUsage:
      description: Defines one or more purposes for which the key contained in the certificate can be used. Default value for each option is false.
      type: object
      properties:
        DigitalSignature:
          $ref: "#/components/schemas/Boolean"
          description: Key can be used for digital signing.
        NonRepudiation:
          $ref: "#/components/schemas/Boolean"
          description: Key can be used for non-repudiation.
        KeyEncipherment:
          $ref: "#/components/schemas/Boolean"
          description: Key can be used to encipher data.
        DataEncipherment:
          $ref: "#/components/schemas/Boolean"
          description: Key can be used to decipher data.
        KeyAgreement:
          $ref: "#/components/schemas/Boolean"
          description: Key can be used in a key-agreement protocol.
        KeyCertSign:
          $ref: "#/components/schemas/Boolean"
          description: Key can be used to sign certificates.
        CRLSign:
          $ref: "#/components/schemas/Boolean"
          description: Key can be used to sign CRLs.
        EncipherOnly:
          $ref: "#/components/schemas/Boolean"
          description: Key can be used only to encipher data.
        DecipherOnly:
          $ref: "#/components/schemas/Boolean"
          description: Key can be used only to decipher data.
    Boolean:
      type: boolean
    AccessDescriptionList:
      type: array
      items:
        $ref: "#/components/schemas/AccessDescription"
    AccessDescription:
      description: Provides access information used by the authorityInfoAccess and subjectInfoAccess extensions described in RFC 5280.
      type: object
      properties:
        AccessMethod:
          $ref: "#/components/schemas/AccessMethod"
          description: The type and format of AccessDescription information.
        AccessLocation:
          $ref: "#/components/schemas/GeneralName"
          description: The location of AccessDescription information.
      required:
        - AccessMethod
        - AccessLocation
    AccessMethod:
      description: Describes the type and format of extension access. Only one of CustomObjectIdentifier or AccessMethodType may be provided. Providing both results in InvalidArgsException.
      type: object
      properties:
        CustomObjectIdentifier:
          $ref: "#/components/schemas/CustomObjectIdentifier"
          description: An object identifier (OID) specifying the AccessMethod. The OID must satisfy the regular expression shown below. For more information, see NIST's definition of Object Identifier (OID).
        AccessMethodType:
          $ref: "#/components/schemas/AccessMethodType"
          description: Specifies the AccessMethod.
    AccessMethodType:
      type: string
      enum:
        - CA_REPOSITORY
        - RESOURCE_PKI_MANIFEST
        - RESOURCE_PKI_NOTIFY
    GeneralName:
      description: Describes an ASN.1 X.400 GeneralName as defined in RFC 5280. Only one of the following naming options should be provided. Providing more than one option results in an InvalidArgsException error.
      type: object
      properties:
        OtherName:
          $ref: "#/components/schemas/OtherName"
          description: Represents GeneralName using an OtherName object.
        Rfc822Name:
          $ref: "#/components/schemas/String256"
          description: Represents GeneralName as an RFC 822 email address.
        DnsName:
          $ref: "#/components/schemas/String253"
          description: Represents GeneralName as a DNS name.
        DirectoryName:
          $ref: "#/components/schemas/ASN1Subject"
        EdiPartyName:
          $ref: "#/components/schemas/EdiPartyName"
          description: Represents GeneralName as an EdiPartyName object.
        UniformResourceIdentifier:
          $ref: "#/components/schemas/String253"
          description: Represents GeneralName as a URI.
        IpAddress:
          $ref: "#/components/schemas/String39"
          description: Represents GeneralName as an IPv4 or IPv6 address.
        RegisteredId:
          $ref: "#/components/schemas/CustomObjectIdentifier"
          description: Represents GeneralName as an object identifier (OID).
    OtherName:
      description: Defines a custom ASN.1 X.400 GeneralName using an object identifier (OID) and value. The OID must satisfy the regular expression shown below. For more information, see NIST's definition of Object Identifier (OID).
      type: object
      properties:
        TypeId:
          $ref: "#/components/schemas/CustomObjectIdentifier"
          description: Specifies an OID.
        Value:
          $ref: "#/components/schemas/String256"
          description: Specifies an OID value.
      required:
        - TypeId
        - Value
    String256:
      type: string
      minLength: 0
      maxLength: 256
    String253:
      type: string
      minLength: 0
      maxLength: 253
    EdiPartyName:
      description: Describes an Electronic Data Interchange (EDI) entity as described in as defined in Subject Alternative Name in RFC 5280.
      type: object
      properties:
        PartyName:
          $ref: "#/components/schemas/String256"
          description: Specifies the party name.
        NameAssigner:
          $ref: "#/components/schemas/String256"
          description: Specifies the name assigner.
      required:
        - PartyName
    String39:
      type: string
      minLength: 0
      maxLength: 39
    RevocationConfiguration:
      description: Certificate revocation information used by the CreateCertificateAuthority and UpdateCertificateAuthority actions. Your private certificate authority (CA) can configure Online Certificate Status Protocol (OCSP) support and/or maintain a certificate revocation list (CRL). OCSP returns validation information about certificates as requested by clients, and a CRL contains an updated list of certificates revoked by your CA. For more information, see RevokeCertificate and Setting up a certificate revocation method in the Amazon Web Services Private Certificate Authority User Guide.
      type: object
      properties:
        CrlConfiguration:
          $ref: "#/components/schemas/CrlConfiguration"
          description: Configuration of the certificate revocation list (CRL), if any, maintained by your private CA. A CRL is typically updated approximately 30 minutes after a certificate is revoked. If for any reason a CRL update fails, Amazon Web Services Private CA makes further attempts every 15 minutes.
        OcspConfiguration:
          $ref: "#/components/schemas/OcspConfiguration"
          description: Configuration of Online Certificate Status Protocol (OCSP) support, if any, maintained by your private CA. When you revoke a certificate, OCSP responses may take up to 60 minutes to reflect the new status.
    CrlConfiguration:
      description: "Contains configuration information for a certificate revocation list (CRL). Your private certificate authority (CA) creates base CRLs. Delta CRLs are not supported. You can enable CRLs for your new or an existing private CA by setting the Enabled parameter to true. Your private CA writes CRLs to an S3 bucket that you specify in the S3BucketName parameter. You can hide the name of your bucket by specifying a value for the CustomCname parameter. Your private CA by default copies the CNAME or the S3 bucket name to the CRL Distribution Points extension of each certificate it issues. If you want to configure this default behavior to be something different, you can set the CrlDistributionPointExtensionConfiguration parameter. Your S3 bucket policy must give write permission to Amazon Web Services Private CA. Amazon Web Services Private CA assets that are stored in Amazon S3 can be protected with encryption. For more information, see Encrypting Your CRLs. Your private CA uses the value in the ExpirationInDays parameter to calculate the nextUpdate field in the CRL. The CRL is refreshed prior to a certificate's expiration date or when a certificate is revoked. When a certificate is revoked, it appears in the CRL until the certificate expires, and then in one additional CRL after expiration, and it always appears in the audit report. A CRL is typically updated approximately 30 minutes after a certificate is revoked. If for any reason a CRL update fails, Amazon Web Services Private CA makes further attempts every 15 minutes. CRLs contain the following fields: Version: The current version number defined in RFC 5280 is V2. The integer value is 0x1. Signature Algorithm: The name of the algorithm used to sign the CRL. Issuer: The X.500 distinguished name of your private CA that issued the CRL. Last Update: The issue date and time of this CRL. Next Update: The day and time by which the next CRL will be issued. Revoked Certificates: List of revoked certificates. Each list item contains the following information. Serial Number: The serial number, in hexadecimal format, of the revoked certificate. Revocation Date: Date and time the certificate was revoked. CRL Entry Extensions: Optional extensions for the CRL entry. X509v3 CRL Reason Code: Reason the certificate was revoked. CRL Extensions: Optional extensions for the CRL. X509v3 Authority Key Identifier: Identifies the public key associated with the private key used to sign the certificate. X509v3 CRL Number:: Decimal sequence number for the CRL. Signature Algorithm: Algorithm used by your private CA to sign the CRL. Signature Value: Signature computed over the CRL. Certificate revocation lists created by Amazon Web Services Private CA are DER-encoded. You can use the following OpenSSL command to list a CRL. openssl crl -inform DER -text -in crl_path -noout For more information, see Planning a certificate revocation list (CRL) in the Amazon Web Services Private Certificate Authority User Guide"
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Boolean value that specifies whether certificate revocation lists (CRLs) are enabled. You can use this value to enable certificate revocation for a new CA when you call the CreateCertificateAuthority action or for an existing CA when you call the UpdateCertificateAuthority action.
        ExpirationInDays:
          $ref: "#/components/schemas/Integer1To5000"
          description: Validity period of the CRL in days.
        CustomCname:
          $ref: "#/components/schemas/CnameString"
          description: Name inserted into the certificate CRL Distribution Points extension that enables the use of an alias for the CRL distribution point. Use this value if you don't want the name of your S3 bucket to be public. The content of a Canonical Name (CNAME) record must conform to RFC2396 restrictions on the use of special characters in URIs. Additionally, the value of the CNAME must not include a protocol prefix such as "http://" or "https://".
        S3BucketName:
          $ref: "#/components/schemas/S3BucketName3To255"
          description: Name of the S3 bucket that contains the CRL. If you do not provide a value for the CustomCname argument, the name of your S3 bucket is placed into the CRL Distribution Points extension of the issued certificate. You can change the name of your bucket by calling the UpdateCertificateAuthority operation. You must specify a bucket policy that allows Amazon Web Services Private CA to write the CRL to your bucket. The S3BucketName parameter must conform to the S3 bucket naming rules.
        S3ObjectAcl:
          $ref: "#/components/schemas/S3ObjectAcl"
          description: "Determines whether the CRL will be publicly readable or privately held in the CRL Amazon S3 bucket. If you choose PUBLIC_READ, the CRL will be accessible over the public internet. If you choose BUCKET_OWNER_FULL_CONTROL, only the owner of the CRL S3 bucket can access the CRL, and your PKI clients may need an alternative method of access. If no value is specified, the default is PUBLIC_READ. Note: This default can cause CA creation to fail in some circumstances. If you have have enabled the Block Public Access (BPA) feature in your S3 account, then you must specify the value of this parameter as BUCKET_OWNER_FULL_CONTROL, and not doing so results in an error. If you have disabled BPA in S3, then you can specify either BUCKET_OWNER_FULL_CONTROL or PUBLIC_READ as the value. For more information, see Blocking public access to the S3 bucket."
        CrlDistributionPointExtensionConfiguration:
          $ref: "#/components/schemas/CrlDistributionPointExtensionConfiguration"
          description: Configures the behavior of the CRL Distribution Point extension for certificates issued by your certificate authority. If this field is not provided, then the CRl Distribution Point Extension will be present and contain the default CRL URL.
        CrlType:
          $ref: "#/components/schemas/CrlType"
          description: Specifies whether to create a complete or partitioned CRL. This setting determines the maximum number of certificates that the certificate authority can issue and revoke. For more information, see Amazon Web Services Private CA quotas. COMPLETE - The default setting. Amazon Web Services Private CA maintains a single CRL ﬁle for all unexpired certiﬁcates issued by a CA that have been revoked for any reason. Each certiﬁcate that Amazon Web Services Private CA issues is bound to a speciﬁc CRL through its CRL distribution point (CDP) extension, deﬁned in RFC 5280. PARTITIONED - Compared to complete CRLs, partitioned CRLs dramatically increase the number of certiﬁcates your private CA can issue. When using partitioned CRLs, you must validate that the CRL's associated issuing distribution point (IDP) URI matches the certiﬁcate's CDP URI to ensure the right CRL has been fetched. Amazon Web Services Private CA marks the IDP extension as critical, which your client must be able to process.
        CustomPath:
          $ref: "#/components/schemas/CrlPathString"
          description: Designates a custom ﬁle path in S3 for CRL(s). For example, http://`<CustomName>`/ `<CustomPath>`/`<CrlPartition_GUID>`.crl.
      required:
        - Enabled
    Integer1To5000:
      type: integer
      minimum: 1
      maximum: 5000
    CnameString:
      type: string
      minLength: 0
      maxLength: 253
      pattern: "[-a-zA-Z0-9;/?:@&=+$,%_.!~*()']*"
    S3BucketName3To255:
      type: string
      minLength: 3
      maxLength: 255
      pattern: "[-a-zA-Z0-9._/]+"
    S3ObjectAcl:
      type: string
      enum:
        - PUBLIC_READ
        - BUCKET_OWNER_FULL_CONTROL
    CrlDistributionPointExtensionConfiguration:
      description: Contains configuration information for the default behavior of the CRL Distribution Point (CDP) extension in certificates issued by your CA. This extension contains a link to download the CRL, so you can check whether a certificate has been revoked. To choose whether you want this extension omitted or not in certificates issued by your CA, you can set the OmitExtension parameter.
      type: object
      properties:
        OmitExtension:
          $ref: "#/components/schemas/Boolean"
          description: Configures whether the CRL Distribution Point extension should be populated with the default URL to the CRL. If set to true, then the CDP extension will not be present in any certificates issued by that CA unless otherwise specified through CSR or API passthrough. Only set this if you have another way to distribute the CRL Distribution Points ffor certificates issued by your CA, such as the Matter Distributed Compliance Ledger This configuration cannot be enabled with a custom CNAME set.
      required:
        - OmitExtension
    CrlType:
      type: string
      enum:
        - COMPLETE
        - PARTITIONED
    CrlPathString:
      type: string
      minLength: 0
      maxLength: 253
      pattern: "[-a-zA-Z0-9;?:@&=+$,%_.!~*()']+(/[-a-zA-Z0-9;?:@&=+$,%_.!~*()']+)*"
    OcspConfiguration:
      description: Contains information to enable and configure Online Certificate Status Protocol (OCSP) for validating certificate revocation status. When you revoke a certificate, OCSP responses may take up to 60 minutes to reflect the new status.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Flag enabling use of the Online Certificate Status Protocol (OCSP) for validating certificate revocation status.
        OcspCustomCname:
          $ref: "#/components/schemas/CnameString"
          description: By default, Amazon Web Services Private CA injects an Amazon Web Services domain into certificates being validated by the Online Certificate Status Protocol (OCSP). A customer can alternatively use this object to define a CNAME specifying a customized OCSP domain. The content of a Canonical Name (CNAME) record must conform to RFC2396 restrictions on the use of special characters in URIs. Additionally, the value of the CNAME must not include a protocol prefix such as "http://" or "https://". For more information, see Customizing Online Certificate Status Protocol (OCSP) in the Amazon Web Services Private Certificate Authority User Guide.
      required:
        - Enabled
    CertificateAuthorityType:
      type: string
      enum:
        - ROOT
        - SUBORDINATE
    IdempotencyToken:
      type: string
      minLength: 1
      maxLength: 36
      pattern: "[\\u0009\\u000A\\u000D\\u0020-\\u00FF]*"
    KeyStorageSecurityStandard:
      type: string
      enum:
        - FIPS_140_2_LEVEL_2_OR_HIGHER
        - FIPS_140_2_LEVEL_3_OR_HIGHER
        - CCPC_LEVEL_1_OR_HIGHER
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Tags are labels that you can use to identify and organize your private CAs. Each tag consists of a key and an optional value. You can associate up to 50 tags with a private CA. To add one or more tags to a private CA, call the TagCertificateAuthority action. To remove a tag, call the UntagCertificateAuthority action.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: Key (name) of the tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: Value of the tag.
      required:
        - Key
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    CertificateAuthorityUsageMode:
      type: string
      enum:
        - GENERAL_PURPOSE
        - SHORT_LIVED_CERTIFICATE
    CreateCertificateAuthorityResponse:
      type: object
      properties:
        CertificateAuthorityArn:
          $ref: "#/components/schemas/Arn"
          description: "If successful, the Amazon Resource Name (ARN) of the certificate authority (CA). This is of the form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012 ."
    Arn:
      type: string
      minLength: 5
      maxLength: 200
      pattern: arn:[\w+=/,.@-]+:acm-pca:[\w+=/,.@-]*:[0-9]*:[\w+=,.@-]+(/[\w+=,.@-]+)*
    S3BucketName:
      type: string
      minLength: 3
      maxLength: 63
    AuditReportResponseFormat:
      type: string
      enum:
        - JSON
        - CSV
    CreateCertificateAuthorityAuditReportResponse:
      type: object
      properties:
        AuditReportId:
          $ref: "#/components/schemas/AuditReportId"
          description: An alphanumeric string that contains a report identifier.
        S3Key:
          $ref: "#/components/schemas/S3Key"
          description: The key that uniquely identifies the report file in your S3 bucket.
    AuditReportId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-z0-9]{8}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{12}"
    S3Key:
      type: string
      minLength: 0
      maxLength: 1024
    Principal:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[^*]+"
    AccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[0-9]+"
    ActionList:
      type: array
      items:
        $ref: "#/components/schemas/ActionType"
    ActionType:
      type: string
      enum:
        - IssueCertificate
        - GetCertificate
        - ListPermissions
    PermanentDeletionTimeInDays:
      type: integer
      minimum: 7
      maximum: 30
    DescribeCertificateAuthorityResponse:
      type: object
      properties:
        CertificateAuthority:
          $ref: "#/components/schemas/CertificateAuthority"
          description: A CertificateAuthority structure that contains information about your private CA.
    CertificateAuthority:
      description: Contains information about your private certificate authority (CA). Your private CA can issue and revoke X.509 digital certificates. Digital certificates verify that the entity named in the certificate Subject field owns or controls the public key contained in the Subject Public Key Info field. Call the CreateCertificateAuthority action to create your private CA. You must then call the GetCertificateAuthorityCertificate action to retrieve a private CA certificate signing request (CSR). Sign the CSR with your Amazon Web Services Private CA-hosted or on-premises root or subordinate CA certificate. Call the ImportCertificateAuthorityCertificate action to import the signed certificate into Certificate Manager (ACM).
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: Amazon Resource Name (ARN) for your private certificate authority (CA). The format is 12345678-1234-1234-1234-123456789012 .
        OwnerAccount:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID that owns the certificate authority.
        CreatedAt:
          $ref: "#/components/schemas/TStamp"
          description: Date and time at which your private CA was created.
        LastStateChangeAt:
          $ref: "#/components/schemas/TStamp"
          description: Date and time at which your private CA was last updated.
        Type:
          $ref: "#/components/schemas/CertificateAuthorityType"
          description: Type of your private CA.
        Serial:
          $ref: "#/components/schemas/String"
          description: Serial number of your private CA.
        Status:
          $ref: "#/components/schemas/CertificateAuthorityStatus"
          description: Status of your private CA.
        NotBefore:
          $ref: "#/components/schemas/TStamp"
          description: Date and time before which your private CA certificate is not valid.
        NotAfter:
          $ref: "#/components/schemas/TStamp"
          description: Date and time after which your private CA certificate is not valid.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: Reason the request to create your private CA failed.
        CertificateAuthorityConfiguration:
          $ref: "#/components/schemas/CertificateAuthorityConfiguration"
          description: Your private CA configuration.
        RevocationConfiguration:
          $ref: "#/components/schemas/RevocationConfiguration"
          description: Information about the Online Certificate Status Protocol (OCSP) configuration or certificate revocation list (CRL) created and maintained by your private CA.
        RestorableUntil:
          $ref: "#/components/schemas/TStamp"
          description: The period during which a deleted CA can be restored. For more information, see the PermanentDeletionTimeInDays parameter of the DeleteCertificateAuthorityRequest action.
        KeyStorageSecurityStandard:
          $ref: "#/components/schemas/KeyStorageSecurityStandard"
          description: "Defines a cryptographic key management compliance standard for handling and protecting CA keys. Default: FIPS_140_2_LEVEL_3_OR_HIGHER Starting January 26, 2023, Amazon Web Services Private CA protects all CA private keys in non-China regions using hardware security modules (HSMs) that comply with FIPS PUB 140-2 Level 3. For information about security standard support in different Amazon Web Services Regions, see Storage and security compliance of Amazon Web Services Private CA private keys."
        UsageMode:
          $ref: "#/components/schemas/CertificateAuthorityUsageMode"
          description: Specifies whether the CA issues general-purpose certificates that typically require a revocation mechanism, or short-lived certificates that may optionally omit revocation because they expire quickly. Short-lived certificate validity is limited to seven days. The default value is GENERAL_PURPOSE.
    TStamp:
      type: string
      format: date-time
    String:
      type: string
    CertificateAuthorityStatus:
      type: string
      enum:
        - CREATING
        - PENDING_CERTIFICATE
        - ACTIVE
        - DELETED
        - DISABLED
        - EXPIRED
        - FAILED
    FailureReason:
      type: string
      enum:
        - REQUEST_TIMED_OUT
        - UNSUPPORTED_ALGORITHM
        - OTHER
    DescribeCertificateAuthorityAuditReportResponse:
      type: object
      properties:
        AuditReportStatus:
          $ref: "#/components/schemas/AuditReportStatus"
          description: Specifies whether report creation is in progress, has succeeded, or has failed.
        S3BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: Name of the S3 bucket that contains the report.
        S3Key:
          $ref: "#/components/schemas/S3Key"
          description: S3 key that uniquely identifies the report file in your S3 bucket.
        CreatedAt:
          $ref: "#/components/schemas/TStamp"
          description: The date and time at which the report was created.
    AuditReportStatus:
      type: string
      enum:
        - CREATING
        - SUCCESS
        - FAILED
    GetCertificateResponse:
      type: object
      properties:
        Certificate:
          $ref: "#/components/schemas/CertificateBody"
          description: The base64 PEM-encoded certificate specified by the CertificateArn parameter.
        CertificateChain:
          $ref: "#/components/schemas/CertificateChain"
          description: The base64 PEM-encoded certificate chain that chains up to the root CA certificate that you used to sign your private CA certificate.
    CertificateBody:
      type: string
    CertificateChain:
      type: string
    GetCertificateAuthorityCertificateResponse:
      type: object
      properties:
        Certificate:
          $ref: "#/components/schemas/CertificateBody"
          description: Base64-encoded certificate authority (CA) certificate.
        CertificateChain:
          $ref: "#/components/schemas/CertificateChain"
          description: Base64-encoded certificate chain that includes any intermediate certificates and chains up to root certificate that you used to sign your private CA certificate. The chain does not include your private CA certificate. If this is a root CA, the value will be null.
    GetCertificateAuthorityCsrResponse:
      type: object
      properties:
        Csr:
          $ref: "#/components/schemas/CsrBody"
          description: The base64 PEM-encoded certificate signing request (CSR) for your private CA certificate.
    CsrBody:
      type: string
    GetPolicyResponse:
      type: object
      properties:
        Policy:
          $ref: "#/components/schemas/AWSPolicy"
          description: The policy attached to the private CA as a JSON document.
    AWSPolicy:
      type: string
      minLength: 1
      maxLength: 81920
      pattern: "[\\u0009\\u000A\\u000D\\u0020-\\u00FF]+"
    CertificateBodyBlob:
      type: string
      format: byte
      minLength: 1
      maxLength: 32768
    CertificateChainBlob:
      type: string
      format: byte
      minLength: 0
      maxLength: 2097152
    ApiPassthrough:
      description: Contains X.509 certificate information to be placed in an issued certificate. An APIPassthrough or APICSRPassthrough template variant must be selected, or else this parameter is ignored. If conflicting or duplicate certificate information is supplied from other sources, Amazon Web Services Private CA applies order of operation rules to determine what information is used.
      type: object
      properties:
        Extensions:
          $ref: "#/components/schemas/Extensions"
          description: Specifies X.509 extension information for a certificate.
        Subject:
          $ref: "#/components/schemas/ASN1Subject"
    Extensions:
      description: Contains X.509 extension information for a certificate.
      type: object
      properties:
        CertificatePolicies:
          $ref: "#/components/schemas/CertificatePolicyList"
          description: Contains a sequence of one or more policy information terms, each of which consists of an object identifier (OID) and optional qualifiers. For more information, see NIST's definition of Object Identifier (OID). In an end-entity certificate, these terms indicate the policy under which the certificate was issued and the purposes for which it may be used. In a CA certificate, these terms limit the set of policies for certification paths that include this certificate.
        ExtendedKeyUsage:
          $ref: "#/components/schemas/ExtendedKeyUsageList"
          description: Specifies additional purposes for which the certified public key may be used other than basic purposes indicated in the KeyUsage extension.
        KeyUsage:
          $ref: "#/components/schemas/KeyUsage"
        SubjectAlternativeNames:
          $ref: "#/components/schemas/GeneralNameList"
          description: The subject alternative name extension allows identities to be bound to the subject of the certificate. These identities may be included in addition to or in place of the identity in the subject field of the certificate.
        CustomExtensions:
          $ref: "#/components/schemas/CustomExtensionList"
          description: Contains a sequence of one or more X.509 extensions, each of which consists of an object identifier (OID), a base64-encoded value, and the critical flag. For more information, see the Global OID reference database.
    CertificatePolicyList:
      type: array
      items:
        $ref: "#/components/schemas/PolicyInformation"
    PolicyInformation:
      description: Defines the X.509 CertificatePolicies extension.
      type: object
      properties:
        CertPolicyId:
          $ref: "#/components/schemas/CustomObjectIdentifier"
          description: Specifies the object identifier (OID) of the certificate policy under which the certificate was issued. For more information, see NIST's definition of Object Identifier (OID).
        PolicyQualifiers:
          $ref: "#/components/schemas/PolicyQualifierInfoList"
          description: Modifies the given CertPolicyId with a qualifier. Amazon Web Services Private CA supports the certification practice statement (CPS) qualifier.
      required:
        - CertPolicyId
    PolicyQualifierInfoList:
      type: array
      items:
        $ref: "#/components/schemas/PolicyQualifierInfo"
    PolicyQualifierInfo:
      description: Modifies the CertPolicyId of a PolicyInformation object with a qualifier. Amazon Web Services Private CA supports the certification practice statement (CPS) qualifier.
      type: object
      properties:
        PolicyQualifierId:
          $ref: "#/components/schemas/PolicyQualifierId"
          description: Identifies the qualifier modifying a CertPolicyId.
        Qualifier:
          $ref: "#/components/schemas/Qualifier"
          description: Defines the qualifier type. Amazon Web Services Private CA supports the use of a URI for a CPS qualifier in this field.
      required:
        - PolicyQualifierId
        - Qualifier
    PolicyQualifierId:
      type: string
      enum:
        - CPS
    Qualifier:
      description: Defines a PolicyInformation qualifier. Amazon Web Services Private CA supports the certification practice statement (CPS) qualifier defined in RFC 5280.
      type: object
      properties:
        CpsUri:
          $ref: "#/components/schemas/String256"
          description: Contains a pointer to a certification practice statement (CPS) published by the CA.
      required:
        - CpsUri
    ExtendedKeyUsageList:
      type: array
      items:
        $ref: "#/components/schemas/ExtendedKeyUsage"
    ExtendedKeyUsage:
      description: Specifies additional purposes for which the certified public key may be used other than basic purposes indicated in the KeyUsage extension.
      type: object
      properties:
        ExtendedKeyUsageType:
          $ref: "#/components/schemas/ExtendedKeyUsageType"
          description: Specifies a standard ExtendedKeyUsage as defined as in RFC 5280.
        ExtendedKeyUsageObjectIdentifier:
          $ref: "#/components/schemas/CustomObjectIdentifier"
          description: Specifies a custom ExtendedKeyUsage with an object identifier (OID).
    ExtendedKeyUsageType:
      type: string
      enum:
        - SERVER_AUTH
        - CLIENT_AUTH
        - CODE_SIGNING
        - EMAIL_PROTECTION
        - TIME_STAMPING
        - OCSP_SIGNING
        - SMART_CARD_LOGIN
        - DOCUMENT_SIGNING
        - CERTIFICATE_TRANSPARENCY
    GeneralNameList:
      type: array
      items:
        $ref: "#/components/schemas/GeneralName"
    CustomExtensionList:
      type: array
      items:
        $ref: "#/components/schemas/CustomExtension"
    CustomExtension:
      description: Specifies the X.509 extension information for a certificate. Extensions present in CustomExtensions follow the ApiPassthrough template rules.
      type: object
      properties:
        ObjectIdentifier:
          $ref: "#/components/schemas/CustomObjectIdentifier"
          description: Specifies the object identifier (OID) of the X.509 extension. For more information, see the Global OID reference database.
        Value:
          $ref: "#/components/schemas/Base64String1To4096"
          description: Specifies the base64-encoded value of the X.509 extension.
        Critical:
          $ref: "#/components/schemas/Boolean"
          description: Specifies the critical flag of the X.509 extension.
      required:
        - ObjectIdentifier
        - Value
    Base64String1To4096:
      type: string
      minLength: 1
      maxLength: 4096
      pattern: (?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?
    CsrBlob:
      type: string
      format: byte
      minLength: 1
      maxLength: 32768
    Validity:
      description: Validity specifies the period of time during which a certificate is valid. Validity can be expressed as an explicit date and time when the validity of a certificate starts or expires, or as a span of time after issuance, stated in days, months, or years. For more information, see Validity in RFC 5280. Amazon Web Services Private CA API consumes the Validity data type differently in two distinct parameters of the IssueCertificate action. The required parameter IssueCertificate:Validity specifies the end of a certificate's validity period. The optional parameter IssueCertificate:ValidityNotBefore specifies a customized starting time for the validity period.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/PositiveLong"
          description: A long integer interpreted according to the value of Type, below.
        Type:
          $ref: "#/components/schemas/ValidityPeriodType"
          description: "Determines how Amazon Web Services Private CA interprets the Value parameter, an integer. Supported validity types include those listed below. Type definitions with values include a sample input value and the resulting output. END_DATE: The specific date and time when the certificate will expire, expressed using UTCTime (YYMMDDHHMMSS) or GeneralizedTime (YYYYMMDDHHMMSS) format. When UTCTime is used, if the year field (YY) is greater than or equal to 50, the year is interpreted as 19YY. If the year field is less than 50, the year is interpreted as 20YY. Sample input value: 491231235959 (UTCTime format) Output expiration date/time: 12/31/2049 23:59:59 ABSOLUTE: The specific date and time when the validity of a certificate will start or expire, expressed in seconds since the Unix Epoch. Sample input value: 2524608000 Output expiration date/time: 01/01/2050 00:00:00 DAYS, MONTHS, YEARS: The relative time from the moment of issuance until the certificate will expire, expressed in days, months, or years. Example if DAYS, issued on 10/12/2020 at 12:34:54 UTC: Sample input value: 90 Output expiration date: 01/10/2020 12:34:54 UTC The minimum validity duration for a certificate using relative time (DAYS) is one day. The minimum validity for a certificate using absolute time (ABSOLUTE or END_DATE) is one second."
      required:
        - Value
        - Type
    PositiveLong:
      type: integer
      format: int64
      minimum: 1
    ValidityPeriodType:
      type: string
      enum:
        - END_DATE
        - ABSOLUTE
        - DAYS
        - MONTHS
        - YEARS
    IssueCertificateResponse:
      type: object
      properties:
        CertificateArn:
          $ref: "#/components/schemas/Arn"
          description: "The Amazon Resource Name (ARN) of the issued certificate and the certificate serial number. This is of the form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012/certificate/286535153982981100925020015808220737245"
    MaxResults:
      type: integer
      minimum: 1
      maximum: 1000
    NextToken:
      type: string
      minLength: 1
      maxLength: 43739
    ResourceOwner:
      type: string
      enum:
        - SELF
        - OTHER_ACCOUNTS
    ListCertificateAuthoritiesResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: When the list is truncated, this value is present and should be used for the NextToken parameter in a subsequent pagination request.
        CertificateAuthorities:
          $ref: "#/components/schemas/CertificateAuthorities"
          description: Summary information about each certificate authority you have created.
    CertificateAuthorities:
      type: array
      items:
        $ref: "#/components/schemas/CertificateAuthority"
    ListPermissionsResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: When the list is truncated, this value is present and should be used for the NextToken parameter in a subsequent pagination request.
        Permissions:
          $ref: "#/components/schemas/PermissionList"
          description: Summary information about each permission assigned by the specified private CA, including the action enabled, the policy provided, and the time of creation.
    PermissionList:
      type: array
      items:
        $ref: "#/components/schemas/Permission"
    Permission:
      description: Permissions designate which private CA actions can be performed by an Amazon Web Services service or entity. In order for ACM to automatically renew private certificates, you must give the ACM service principal all available permissions (IssueCertificate, GetCertificate, and ListPermissions). Permissions can be assigned with the CreatePermission action, removed with the DeletePermission action, and listed with the ListPermissions action.
      type: object
      properties:
        CertificateAuthorityArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Number (ARN) of the private CA from which the permission was issued.
        CreatedAt:
          $ref: "#/components/schemas/TStamp"
          description: The time at which the permission was created.
        Principal:
          $ref: "#/components/schemas/Principal"
          description: The Amazon Web Services service or entity that holds the permission. At this time, the only valid principal is acm.amazonaws.com.
        SourceAccount:
          $ref: "#/components/schemas/AccountId"
          description: The ID of the account that assigned the permission.
        Actions:
          $ref: "#/components/schemas/ActionList"
          description: The private CA actions that can be performed by the designated Amazon Web Services service.
        Policy:
          $ref: "#/components/schemas/AWSPolicy"
          description: The name of the policy that is associated with the permission.
    ListTagsResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: When the list is truncated, this value is present and should be used for the NextToken parameter in a subsequent pagination request.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags associated with your private CA.
    RevocationReason:
