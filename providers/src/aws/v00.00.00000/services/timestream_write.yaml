openapi: 3.0.0
info:
  version: "2018-11-01"
  title: Amazon Timestream Write
  description: Amazon Timestream Write
  x-serviceName: timestream
  x-serviceAlias: timestream_write
  x-protocol: json
  x-apiVersion: "2018-11-01"
  x-endpointPrefix: ingest.timestream
  x-targetPrefix: Timestream_20181101
  x-jsonVersion: "1.0"
servers:
  - url: https://ingest.timestream.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for timestream-write
paths:
  /CreateBatchLoadTask:
    post:
      operationId: CreateBatchLoadTask
      description: Creates a new Timestream batch load task. A batch load task processes data from a CSV source in an S3 location and writes to a Timestream table. A mapping from source to target is defined in a batch load task. Errors and events are written to a report at an S3 location. For the report, if the KMS key is not specified, the report will be encrypted with an S3 managed key when SSE_S3 is the option. Otherwise an error is thrown. For more information, see Amazon Web Services managed keys. Service quotas apply. For details, see code sample.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.CreateBatchLoadTask
            default: Timestream_20181101.CreateBatchLoadTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                DataModelConfiguration:
                  $ref: "#/components/schemas/DataModelConfiguration"
                DataSourceConfiguration:
                  $ref: "#/components/schemas/DataSourceConfiguration"
                  description: Defines configuration details about the data source for a batch load task.
                ReportConfiguration:
                  $ref: "#/components/schemas/ReportConfiguration"
                TargetDatabaseName:
                  $ref: "#/components/schemas/ResourceCreateAPIName"
                  description: Target Timestream database for a batch load task.
                TargetTableName:
                  $ref: "#/components/schemas/ResourceCreateAPIName"
                  description: Target Timestream table for a batch load task.
                RecordVersion:
                  $ref: "#/components/schemas/RecordVersion"
              required:
                - DataSourceConfiguration
                - ReportConfiguration
                - TargetDatabaseName
                - TargetTableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBatchLoadTaskResponse"
  /CreateDatabase:
    post:
      operationId: CreateDatabase
      description: Creates a new Timestream database. If the KMS key is not specified, the database will be encrypted with a Timestream managed KMS key located in your account. For more information, see Amazon Web Services managed keys. Service quotas apply. For details, see code sample.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.CreateDatabase
            default: Timestream_20181101.CreateDatabase
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatabaseName:
                  $ref: "#/components/schemas/ResourceCreateAPIName"
                  description: The name of the Timestream database.
                KmsKeyId:
                  $ref: "#/components/schemas/StringValue2048"
                  description: The KMS key for the database. If the KMS key is not specified, the database will be encrypted with a Timestream managed KMS key located in your account. For more information, see Amazon Web Services managed keys.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of key-value pairs to label the table.
              required:
                - DatabaseName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDatabaseResponse"
  /CreateTable:
    post:
      operationId: CreateTable
      description: Adds a new table to an existing database in your account. In an Amazon Web Services account, table names must be at least unique within each Region if they are in the same database. You might have identical table names in the same Region if the tables are in separate databases. While creating the table, you must specify the table name, database name, and the retention properties. Service quotas apply. See code sample for details.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.CreateTable
            default: Timestream_20181101.CreateTable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatabaseName:
                  $ref: "#/components/schemas/ResourceCreateAPIName"
                  description: The name of the Timestream database.
                TableName:
                  $ref: "#/components/schemas/ResourceCreateAPIName"
                  description: The name of the Timestream table.
                RetentionProperties:
                  $ref: "#/components/schemas/RetentionProperties"
                  description: The duration for which your time-series data must be stored in the memory store and the magnetic store.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of key-value pairs to label the table.
                MagneticStoreWriteProperties:
                  $ref: "#/components/schemas/MagneticStoreWriteProperties"
                  description: Contains properties to set on the table when enabling magnetic store writes.
                Schema:
                  $ref: "#/components/schemas/Schema"
                  description: The schema of the table.
              required:
                - DatabaseName
                - TableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTableResponse"
  /DeleteDatabase:
    post:
      operationId: DeleteDatabase
      description: Deletes a given Timestream database. This is an irreversible operation. After a database is deleted, the time-series data from its tables cannot be recovered. All tables in the database must be deleted first, or a ValidationException error will be thrown. Due to the nature of distributed retries, the operation can return either success or a ResourceNotFoundException. Clients should consider them equivalent. See code sample for details.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.DeleteDatabase
            default: Timestream_20181101.DeleteDatabase
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatabaseName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Timestream database to be deleted.
              required:
                - DatabaseName
      responses:
        "200":
          description: Success
  /DeleteTable:
    post:
      operationId: DeleteTable
      description: Deletes a given Timestream table. This is an irreversible operation. After a Timestream database table is deleted, the time-series data stored in the table cannot be recovered. Due to the nature of distributed retries, the operation can return either success or a ResourceNotFoundException. Clients should consider them equivalent. See code sample for details.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.DeleteTable
            default: Timestream_20181101.DeleteTable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatabaseName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the database where the Timestream database is to be deleted.
                TableName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Timestream table to be deleted.
              required:
                - DatabaseName
                - TableName
      responses:
        "200":
          description: Success
  /DescribeBatchLoadTask:
    post:
      operationId: DescribeBatchLoadTask
      description: Returns information about the batch load task, including configurations, mappings, progress, and other details. Service quotas apply. See code sample for details.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.DescribeBatchLoadTask
            default: Timestream_20181101.DescribeBatchLoadTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TaskId:
                  $ref: "#/components/schemas/BatchLoadTaskId"
                  description: The ID of the batch load task.
              required:
                - TaskId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeBatchLoadTaskResponse"
  /DescribeDatabase:
    post:
      operationId: DescribeDatabase
      description: Returns information about the database, including the database name, time that the database was created, and the total number of tables found within the database. Service quotas apply. See code sample for details.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.DescribeDatabase
            default: Timestream_20181101.DescribeDatabase
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatabaseName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Timestream database.
              required:
                - DatabaseName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDatabaseResponse"
  /DescribeEndpoints:
    post:
      operationId: DescribeEndpoints
      description: "Returns a list of available endpoints to make Timestream API calls against. This API operation is available through both the Write and Query APIs. Because the Timestream SDKs are designed to transparently work with the service’s architecture, including the management and mapping of the service endpoints, we don't recommend that you use this API operation unless: You are using VPC endpoints (Amazon Web Services PrivateLink) with Timestream Your application uses a programming language that does not yet have SDK support You require better control over the client-side implementation For detailed information on how and when to use and implement DescribeEndpoints, see The Endpoint Discovery Pattern."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.DescribeEndpoints
            default: Timestream_20181101.DescribeEndpoints
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEndpointsResponse"
  /DescribeTable:
    post:
      operationId: DescribeTable
      description: Returns information about the table, including the table name, database name, retention duration of the memory store and the magnetic store. Service quotas apply. See code sample for details.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.DescribeTable
            default: Timestream_20181101.DescribeTable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatabaseName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Timestream database.
                TableName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Timestream table.
              required:
                - DatabaseName
                - TableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeTableResponse"
  /ListBatchLoadTasks:
    post:
      operationId: ListBatchLoadTasks
      description: Provides a list of batch load tasks, along with the name, status, when the task is resumable until, and other details. See code sample for details.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.ListBatchLoadTasks
            default: Timestream_20181101.ListBatchLoadTasks
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: A token to specify where to start paginating. This is the NextToken from a previously truncated response.
                MaxResults:
                  $ref: "#/components/schemas/PageLimit"
                  description: The total number of items to return in the output. If the total number of items available is more than the value specified, a NextToken is provided in the output. To resume pagination, provide the NextToken value as argument of a subsequent API invocation.
                TaskStatus:
                  $ref: "#/components/schemas/BatchLoadStatus"
                  description: Status of the batch load task.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBatchLoadTasksResponse"
  /ListDatabases:
    post:
      operationId: ListDatabases
      description: Returns a list of your Timestream databases. Service quotas apply. See code sample for details.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.ListDatabases
            default: Timestream_20181101.ListDatabases
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: The pagination token. To resume pagination, provide the NextToken value as argument of a subsequent API invocation.
                MaxResults:
                  $ref: "#/components/schemas/PaginationLimit"
                  description: The total number of items to return in the output. If the total number of items available is more than the value specified, a NextToken is provided in the output. To resume pagination, provide the NextToken value as argument of a subsequent API invocation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDatabasesResponse"
  /ListTables:
    post:
      operationId: ListTables
      description: Provides a list of tables, along with the name, status, and retention properties of each table. See code sample for details.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.ListTables
            default: Timestream_20181101.ListTables
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatabaseName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Timestream database.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: The pagination token. To resume pagination, provide the NextToken value as argument of a subsequent API invocation.
                MaxResults:
                  $ref: "#/components/schemas/PaginationLimit"
                  description: The total number of items to return in the output. If the total number of items available is more than the value specified, a NextToken is provided in the output. To resume pagination, provide the NextToken value as argument of a subsequent API invocation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTablesResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists all tags on a Timestream resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.ListTagsForResource
            default: Timestream_20181101.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Timestream resource with tags to be listed. This value is an Amazon Resource Name (ARN).
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /ResumeBatchLoadTask:
    post:
      operationId: ResumeBatchLoadTask
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.ResumeBatchLoadTask
            default: Timestream_20181101.ResumeBatchLoadTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TaskId:
                  $ref: "#/components/schemas/BatchLoadTaskId"
                  description: The ID of the batch load task to resume.
              required:
                - TaskId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeBatchLoadTaskResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Associates a set of tags with a Timestream resource. You can then activate these user-defined tags so that they appear on the Billing and Cost Management console for cost allocation tracking.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.TagResource
            default: Timestream_20181101.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: Identifies the Timestream resource to which tags should be added. This value is an Amazon Resource Name (ARN).
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to be assigned to the Timestream resource.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes the association of tags from a Timestream resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.UntagResource
            default: Timestream_20181101.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Timestream resource that the tags will be removed from. This value is an Amazon Resource Name (ARN).
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: A list of tags keys. Existing tags of the resource whose keys are members of this list will be removed from the Timestream resource.
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateDatabase:
    post:
      operationId: UpdateDatabase
      description: Modifies the KMS key for an existing database. While updating the database, you must specify the database name and the identifier of the new KMS key to be used (KmsKeyId). If there are any concurrent UpdateDatabase requests, first writer wins. See code sample for details.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.UpdateDatabase
            default: Timestream_20181101.UpdateDatabase
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatabaseName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the database.
                KmsKeyId:
                  $ref: "#/components/schemas/StringValue2048"
                  description: "The identifier of the new KMS key (KmsKeyId) to be used to encrypt the data stored in the database. If the KmsKeyId currently registered with the database is the same as the KmsKeyId in the request, there will not be any update. You can specify the KmsKeyId using any of the following: Key ID: 1234abcd-12ab-34cd-56ef-1234567890ab Key ARN: arn:aws:kms:us-east-1:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab Alias name: alias/ExampleAlias Alias ARN: arn:aws:kms:us-east-1:111122223333:alias/ExampleAlias"
              required:
                - DatabaseName
                - KmsKeyId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDatabaseResponse"
  /UpdateTable:
    post:
      operationId: UpdateTable
      description: Modifies the retention duration of the memory store and magnetic store for your Timestream table. Note that the change in retention duration takes effect immediately. For example, if the retention period of the memory store was initially set to 2 hours and then changed to 24 hours, the memory store will be capable of holding 24 hours of data, but will be populated with 24 hours of data 22 hours after this change was made. Timestream does not retrieve data from the magnetic store to populate the memory store. See code sample for details.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.UpdateTable
            default: Timestream_20181101.UpdateTable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatabaseName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Timestream database.
                TableName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Timestream table.
                RetentionProperties:
                  $ref: "#/components/schemas/RetentionProperties"
                  description: The retention duration of the memory store and the magnetic store.
                MagneticStoreWriteProperties:
                  $ref: "#/components/schemas/MagneticStoreWriteProperties"
                  description: Contains properties to set on the table when enabling magnetic store writes.
                Schema:
                  $ref: "#/components/schemas/Schema"
                  description: The schema of the table.
              required:
                - DatabaseName
                - TableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTableResponse"
  /WriteRecords:
    post:
      operationId: WriteRecords
      description: Enables you to write your time-series data into Timestream. You can specify a single data point or a batch of data points to be inserted into the system. Timestream offers you a flexible schema that auto detects the column names and data types for your Timestream tables based on the dimension names and data types of the data points you specify when invoking writes into the database. Timestream supports eventual consistency read semantics. This means that when you query data immediately after writing a batch of data into Timestream, the query results might not reflect the results of a recently completed write operation. The results may also include some stale data. If you repeat the query request after a short time, the results should return the latest data. Service quotas apply. See code sample for details. Upserts You can use the Version parameter in a WriteRecords request to update data points. Timestream tracks a version number with each record. Version defaults to 1 when it's not specified for the record in the request. Timestream updates an existing record’s measure value along with its Version when it receives a write request with a higher Version number for that record. When it receives an update request where the measure value is the same as that of the existing record, Timestream still updates Version, if it is greater than the existing value of Version. You can update a data point as many times as desired, as long as the value of Version continuously increases. For example, suppose you write a new record without indicating Version in the request. Timestream stores this record, and set Version to 1. Now, suppose you try to update this record with a WriteRecords request of the same record with a different measure value but, like before, do not provide Version. In this case, Timestream will reject this update with a RejectedRecordsException since the updated record’s version is not greater than the existing value of Version. However, if you were to resend the update request with Version set to 2, Timestream would then succeed in updating the record’s value, and the Version would be set to 2. Next, suppose you sent a WriteRecords request with this same record and an identical measure value, but with Version set to 3. In this case, Timestream would only update Version to 3. Any further updates would need to send a version number greater than 3, or the update requests would receive a RejectedRecordsException.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.WriteRecords
            default: Timestream_20181101.WriteRecords
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatabaseName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Timestream database.
                TableName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Timestream table.
                CommonAttributes:
                  $ref: "#/components/schemas/Record"
                  description: A record that contains the common measure, dimension, time, and version attributes shared across all the records in the request. The measure and dimension attributes specified will be merged with the measure and dimension attributes in the records object when the data is written into Timestream. Dimensions may not overlap, or a ValidationException will be thrown. In other words, a record must contain dimensions with unique names.
                Records:
                  $ref: "#/components/schemas/Records"
                  description: An array of records that contain the unique measure, dimension, time, and version attributes for each time-series data point.
              required:
                - DatabaseName
                - TableName
                - Records
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WriteRecordsResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ClientRequestToken:
      type: string
      minLength: 1
      maxLength: 64
    DataModelConfiguration:
      type: object
      properties:
        DataModel:
          $ref: "#/components/schemas/DataModel"
        DataModelS3Configuration:
          $ref: "#/components/schemas/DataModelS3Configuration"
    DataModel:
      description: Data model for a batch load task.
      type: object
      properties:
        TimeColumn:
          $ref: "#/components/schemas/StringValue256"
          description: Source column to be mapped to time.
        TimeUnit:
          $ref: "#/components/schemas/TimeUnit"
          description: The granularity of the timestamp unit. It indicates if the time value is in seconds, milliseconds, nanoseconds, or other supported values. Default is MILLISECONDS.
        DimensionMappings:
          $ref: "#/components/schemas/DimensionMappings"
          description: Source to target mappings for dimensions.
        MultiMeasureMappings:
          $ref: "#/components/schemas/MultiMeasureMappings"
          description: Source to target mappings for multi-measure records.
        MixedMeasureMappings:
          $ref: "#/components/schemas/MixedMeasureMappingList"
          description: Source to target mappings for measures.
        MeasureNameColumn:
          $ref: "#/components/schemas/StringValue256"
      required:
        - DimensionMappings
    StringValue256:
      type: string
      minLength: 1
      maxLength: 256
    TimeUnit:
      type: string
      enum:
        - MILLISECONDS
        - SECONDS
        - MICROSECONDS
        - NANOSECONDS
    DimensionMappings:
      type: array
      items:
        $ref: "#/components/schemas/DimensionMapping"
    DimensionMapping:
      type: object
      properties:
        SourceColumn:
          $ref: "#/components/schemas/SchemaName"
        DestinationColumn:
          $ref: "#/components/schemas/SchemaName"
    SchemaName:
      type: string
      minLength: 1
    MultiMeasureMappings:
      type: object
      properties:
        TargetMultiMeasureName:
          $ref: "#/components/schemas/SchemaName"
        MultiMeasureAttributeMappings:
          $ref: "#/components/schemas/MultiMeasureAttributeMappingList"
      required:
        - MultiMeasureAttributeMappings
    MultiMeasureAttributeMappingList:
      type: array
      items:
        $ref: "#/components/schemas/MultiMeasureAttributeMapping"
    MultiMeasureAttributeMapping:
      type: object
      properties:
        SourceColumn:
          $ref: "#/components/schemas/SchemaName"
        TargetMultiMeasureAttributeName:
          $ref: "#/components/schemas/SchemaName"
        MeasureValueType:
          $ref: "#/components/schemas/ScalarMeasureValueType"
      required:
        - SourceColumn
    ScalarMeasureValueType:
      type: string
      enum:
        - DOUBLE
        - BIGINT
        - BOOLEAN
        - VARCHAR
        - TIMESTAMP
    MixedMeasureMappingList:
      type: array
      items:
        $ref: "#/components/schemas/MixedMeasureMapping"
    MixedMeasureMapping:
      type: object
      properties:
        MeasureName:
          $ref: "#/components/schemas/SchemaName"
        SourceColumn:
          $ref: "#/components/schemas/SchemaName"
        TargetMeasureName:
          $ref: "#/components/schemas/SchemaName"
        MeasureValueType:
          $ref: "#/components/schemas/MeasureValueType"
        MultiMeasureAttributeMappings:
          $ref: "#/components/schemas/MultiMeasureAttributeMappingList"
      required:
        - MeasureValueType
    MeasureValueType:
      type: string
      enum:
        - DOUBLE
        - BIGINT
        - VARCHAR
        - BOOLEAN
        - TIMESTAMP
        - MULTI
    DataModelS3Configuration:
      type: object
      properties:
        BucketName:
          $ref: "#/components/schemas/S3BucketName"
        ObjectKey:
          $ref: "#/components/schemas/S3ObjectKey"
    S3BucketName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: "[a-z0-9][\\.\\-a-z0-9]{1,61}[a-z0-9]"
    S3ObjectKey:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[a-zA-Z0-9|!\\-_*'\\(\\)]([a-zA-Z0-9]|[!\\-_*'\\(\\)\\/.])+"
    DataSourceConfiguration:
      description: Defines configuration details about the data source.
      type: object
      properties:
        DataSourceS3Configuration:
          $ref: "#/components/schemas/DataSourceS3Configuration"
          description: Configuration of an S3 location for a file which contains data to load.
        CsvConfiguration:
          $ref: "#/components/schemas/CsvConfiguration"
        DataFormat:
          $ref: "#/components/schemas/BatchLoadDataFormat"
          description: This is currently CSV.
      required:
        - DataSourceS3Configuration
        - DataFormat
    DataSourceS3Configuration:
      type: object
      properties:
        BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The bucket name of the customer S3 bucket.
        ObjectKeyPrefix:
          $ref: "#/components/schemas/S3ObjectKey"
      required:
        - BucketName
    CsvConfiguration:
      description: A delimited data format where the column separator can be a comma and the record separator is a newline character.
      type: object
      properties:
        ColumnSeparator:
          $ref: "#/components/schemas/StringValue1"
          description: Column separator can be one of comma (','), pipe ('|), semicolon (';'), tab('/t'), or blank space (' ').
        EscapeChar:
          $ref: "#/components/schemas/StringValue1"
          description: Escape character can be one of
        QuoteChar:
          $ref: "#/components/schemas/StringValue1"
          description: Can be single quote (') or double quote (").
        NullValue:
          $ref: "#/components/schemas/StringValue256"
          description: Can be blank space (' ').
        TrimWhiteSpace:
          $ref: "#/components/schemas/Boolean"
          description: Specifies to trim leading and trailing white space.
    StringValue1:
      type: string
      minLength: 1
      maxLength: 1
    Boolean:
      type: boolean
    BatchLoadDataFormat:
      type: string
      enum:
        - CSV
    ReportConfiguration:
      description: Report configuration for a batch load task. This contains details about where error reports are stored.
      type: object
      properties:
        ReportS3Configuration:
          $ref: "#/components/schemas/ReportS3Configuration"
          description: Configuration of an S3 location to write error reports and events for a batch load.
    ReportS3Configuration:
      type: object
      properties:
        BucketName:
          $ref: "#/components/schemas/S3BucketName"
        ObjectKeyPrefix:
          $ref: "#/components/schemas/S3ObjectKeyPrefix"
        EncryptionOption:
          $ref: "#/components/schemas/S3EncryptionOption"
        KmsKeyId:
          $ref: "#/components/schemas/StringValue2048"
      required:
        - BucketName
    S3ObjectKeyPrefix:
      type: string
      minLength: 1
      maxLength: 928
      pattern: "[a-zA-Z0-9|!\\-_*'\\(\\)]([a-zA-Z0-9]|[!\\-_*'\\(\\)\\/.])+"
    S3EncryptionOption:
      type: string
      enum:
        - SSE_S3
        - SSE_KMS
    StringValue2048:
      type: string
      minLength: 1
      maxLength: 2048
    ResourceCreateAPIName:
      type: string
      pattern: "[a-zA-Z0-9_.-]+"
    RecordVersion:
      type: integer
      format: int64
    CreateBatchLoadTaskResponse:
      type: object
      properties:
        TaskId:
          $ref: "#/components/schemas/BatchLoadTaskId"
          description: The ID of the batch load task.
      required:
        - TaskId
    BatchLoadTaskId:
      type: string
      minLength: 3
      maxLength: 32
      pattern: "[A-Z0-9]+"
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A tag is a label that you assign to a Timestream database and/or table. Each tag consists of a key and an optional value, both of which you define. With tags, you can categorize databases and/or tables, for example, by purpose, owner, or environment.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key of the tag. Tag keys are case sensitive.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the tag. Tag values are case-sensitive and can be null.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    CreateDatabaseResponse:
      type: object
      properties:
        Database:
          $ref: "#/components/schemas/Database"
          description: The newly created Timestream database.
    Database:
      description: A top-level container for a table. Databases and tables are the fundamental management concepts in Amazon Timestream. All tables in a database are encrypted with the same KMS key.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name that uniquely identifies this database.
        DatabaseName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the Timestream database.
        TableCount:
          $ref: "#/components/schemas/Long"
          description: The total number of tables found within a Timestream database.
        KmsKeyId:
          $ref: "#/components/schemas/StringValue2048"
          description: The identifier of the KMS key used to encrypt the data stored in the database.
        CreationTime:
          $ref: "#/components/schemas/Date"
          description: The time when the database was created, calculated from the Unix epoch time.
        LastUpdatedTime:
          $ref: "#/components/schemas/Date"
          description: The last time that this database was updated.
    String:
      type: string
    ResourceName:
      type: string
    Long:
      type: integer
      format: int64
    Date:
      type: string
      format: date-time
    RetentionProperties:
      description: Retention properties contain the duration for which your time-series data must be stored in the magnetic store and the memory store.
      type: object
      properties:
        MemoryStoreRetentionPeriodInHours:
          $ref: "#/components/schemas/MemoryStoreRetentionPeriodInHours"
          description: The duration for which data must be stored in the memory store.
        MagneticStoreRetentionPeriodInDays:
          $ref: "#/components/schemas/MagneticStoreRetentionPeriodInDays"
          description: The duration for which data must be stored in the magnetic store.
      required:
        - MemoryStoreRetentionPeriodInHours
        - MagneticStoreRetentionPeriodInDays
    MemoryStoreRetentionPeriodInHours:
      type: integer
      format: int64
      minimum: 1
      maximum: 8766
    MagneticStoreRetentionPeriodInDays:
      type: integer
      format: int64
      minimum: 1
      maximum: 73000
    MagneticStoreWriteProperties:
      description: The set of properties on a table for configuring magnetic store writes.
      type: object
      properties:
        EnableMagneticStoreWrites:
          $ref: "#/components/schemas/Boolean"
          description: A flag to enable magnetic store writes.
        MagneticStoreRejectedDataLocation:
          $ref: "#/components/schemas/MagneticStoreRejectedDataLocation"
          description: The location to write error reports for records rejected asynchronously during magnetic store writes.
      required:
        - EnableMagneticStoreWrites
    MagneticStoreRejectedDataLocation:
      description: The location to write error reports for records rejected, asynchronously, during magnetic store writes.
      type: object
      properties:
        S3Configuration:
          $ref: "#/components/schemas/S3Configuration"
          description: Configuration of an S3 location to write error reports for records rejected, asynchronously, during magnetic store writes.
    S3Configuration:
      description: The configuration that specifies an S3 location.
      type: object
      properties:
        BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The bucket name of the customer S3 bucket.
        ObjectKeyPrefix:
          $ref: "#/components/schemas/S3ObjectKeyPrefix"
          description: The object key preview for the customer S3 location.
        EncryptionOption:
          $ref: "#/components/schemas/S3EncryptionOption"
          description: The encryption option for the customer S3 location. Options are S3 server-side encryption with an S3 managed key or Amazon Web Services managed key.
        KmsKeyId:
          $ref: "#/components/schemas/StringValue2048"
          description: The KMS key ID for the customer S3 location when encrypting with an Amazon Web Services managed key.
    Schema:
      description: A Schema specifies the expected data model of the table.
      type: object
      properties:
        CompositePartitionKey:
          $ref: "#/components/schemas/PartitionKeyList"
          description: A non-empty list of partition keys defining the attributes used to partition the table data. The order of the list determines the partition hierarchy. The name and type of each partition key as well as the partition key order cannot be changed after the table is created. However, the enforcement level of each partition key can be changed.
    PartitionKeyList:
      type: array
      items:
        $ref: "#/components/schemas/PartitionKey"
    PartitionKey:
      description: An attribute used in partitioning data in a table. A dimension key partitions data using the values of the dimension specified by the dimension-name as partition key, while a measure key partitions data using measure names (values of the 'measure_name' column).
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/PartitionKeyType"
          description: The type of the partition key. Options are DIMENSION (dimension key) and MEASURE (measure key).
        Name:
          $ref: "#/components/schemas/SchemaName"
          description: The name of the attribute used for a dimension key.
        EnforcementInRecord:
          $ref: "#/components/schemas/PartitionKeyEnforcementLevel"
          description: The level of enforcement for the specification of a dimension key in ingested records. Options are REQUIRED (dimension key must be specified) and OPTIONAL (dimension key does not have to be specified).
      required:
        - Type
    PartitionKeyType:
      type: string
      enum:
        - DIMENSION
        - MEASURE
    PartitionKeyEnforcementLevel:
      type: string
      enum:
        - REQUIRED
        - OPTIONAL
    CreateTableResponse:
      type: object
      properties:
        Table:
          $ref: "#/components/schemas/Table"
          description: The newly created Timestream table.
    Table:
      description: Represents a database table in Timestream. Tables contain one or more related time series. You can modify the retention duration of the memory store and the magnetic store for a table.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name that uniquely identifies this table.
        TableName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the Timestream table.
        DatabaseName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the Timestream database that contains this table.
        TableStatus:
          $ref: "#/components/schemas/TableStatus"
          description: "The current state of the table: DELETING - The table is being deleted. ACTIVE - The table is ready for use."
        RetentionProperties:
          $ref: "#/components/schemas/RetentionProperties"
          description: The retention duration for the memory store and magnetic store.
        CreationTime:
          $ref: "#/components/schemas/Date"
          description: The time when the Timestream table was created.
        LastUpdatedTime:
          $ref: "#/components/schemas/Date"
          description: The time when the Timestream table was last updated.
        MagneticStoreWriteProperties:
          $ref: "#/components/schemas/MagneticStoreWriteProperties"
          description: Contains properties to set on the table when enabling magnetic store writes.
        Schema:
          $ref: "#/components/schemas/Schema"
          description: The schema of the table.
    TableStatus:
      type: string
      enum:
        - ACTIVE
        - DELETING
        - RESTORING
    DescribeBatchLoadTaskResponse:
      type: object
      properties:
        BatchLoadTaskDescription:
          $ref: "#/components/schemas/BatchLoadTaskDescription"
          description: Description of the batch load task.
      required:
        - BatchLoadTaskDescription
    BatchLoadTaskDescription:
      description: Details about a batch load task.
      type: object
      properties:
        TaskId:
          $ref: "#/components/schemas/BatchLoadTaskId"
          description: The ID of the batch load task.
        ErrorMessage:
          $ref: "#/components/schemas/StringValue2048"
        DataSourceConfiguration:
          $ref: "#/components/schemas/DataSourceConfiguration"
          description: Configuration details about the data source for a batch load task.
        ProgressReport:
          $ref: "#/components/schemas/BatchLoadProgressReport"
        ReportConfiguration:
          $ref: "#/components/schemas/ReportConfiguration"
          description: Report configuration for a batch load task. This contains details about where error reports are stored.
        DataModelConfiguration:
          $ref: "#/components/schemas/DataModelConfiguration"
          description: Data model configuration for a batch load task. This contains details about where a data model for a batch load task is stored.
        TargetDatabaseName:
          $ref: "#/components/schemas/ResourceName"
        TargetTableName:
          $ref: "#/components/schemas/ResourceName"
        TaskStatus:
          $ref: "#/components/schemas/BatchLoadStatus"
          description: Status of the batch load task.
        RecordVersion:
          $ref: "#/components/schemas/RecordVersion"
        CreationTime:
          $ref: "#/components/schemas/Date"
          description: The time when the Timestream batch load task was created.
        LastUpdatedTime:
          $ref: "#/components/schemas/Date"
          description: The time when the Timestream batch load task was last updated.
        ResumableUntil:
          $ref: "#/components/schemas/Date"
    BatchLoadProgressReport:
      description: Details about the progress of a batch load task.
      type: object
      properties:
        RecordsProcessed:
          $ref: "#/components/schemas/Long"
        RecordsIngested:
          $ref: "#/components/schemas/Long"
        ParseFailures:
          $ref: "#/components/schemas/Long"
        RecordIngestionFailures:
          $ref: "#/components/schemas/Long"
        FileFailures:
          $ref: "#/components/schemas/Long"
        BytesMetered:
          $ref: "#/components/schemas/Long"
    BatchLoadStatus:
      type: string
      enum:
        - CREATED
        - IN_PROGRESS
        - FAILED
        - SUCCEEDED
        - PROGRESS_STOPPED
        - PENDING_RESUME
    DescribeDatabaseResponse:
      type: object
      properties:
        Database:
          $ref: "#/components/schemas/Database"
          description: The name of the Timestream table.
    DescribeEndpointsResponse:
      type: object
      properties:
        Endpoints:
          $ref: "#/components/schemas/Endpoints"
          description: An Endpoints object is returned when a DescribeEndpoints request is made.
      required:
        - Endpoints
    Endpoints:
      type: array
      items:
        $ref: "#/components/schemas/Endpoint"
    Endpoint:
      description: Represents an available endpoint against which to make API calls against, as well as the TTL for that endpoint.
      type: object
      properties:
        Address:
          $ref: "#/components/schemas/String"
          description: An endpoint address.
        CachePeriodInMinutes:
          $ref: "#/components/schemas/Long"
          description: The TTL for the endpoint, in minutes.
      required:
        - Address
        - CachePeriodInMinutes
    DescribeTableResponse:
      type: object
      properties:
        Table:
          $ref: "#/components/schemas/Table"
          description: The Timestream table.
    PageLimit:
      type: integer
      minimum: 1
      maximum: 100
    ListBatchLoadTasksResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/String"
          description: A token to specify where to start paginating. Provide the next ListBatchLoadTasksRequest.
        BatchLoadTasks:
          $ref: "#/components/schemas/BatchLoadTaskList"
          description: A list of batch load task details.
    BatchLoadTaskList:
      type: array
      items:
        $ref: "#/components/schemas/BatchLoadTask"
    BatchLoadTask:
      description: Details about a batch load task.
      type: object
      properties:
        TaskId:
          $ref: "#/components/schemas/BatchLoadTaskId"
          description: The ID of the batch load task.
        TaskStatus:
          $ref: "#/components/schemas/BatchLoadStatus"
          description: Status of the batch load task.
        DatabaseName:
          $ref: "#/components/schemas/ResourceName"
          description: Database name for the database into which a batch load task loads data.
        TableName:
          $ref: "#/components/schemas/ResourceName"
          description: Table name for the table into which a batch load task loads data.
        CreationTime:
          $ref: "#/components/schemas/Date"
          description: The time when the Timestream batch load task was created.
        LastUpdatedTime:
          $ref: "#/components/schemas/Date"
          description: The time when the Timestream batch load task was last updated.
        ResumableUntil:
          $ref: "#/components/schemas/Date"
    PaginationLimit:
      type: integer
      minimum: 1
      maximum: 20
    ListDatabasesResponse:
      type: object
      properties:
        Databases:
          $ref: "#/components/schemas/DatabaseList"
          description: A list of database names.
        NextToken:
          $ref: "#/components/schemas/String"
          description: The pagination token. This parameter is returned when the response is truncated.
    DatabaseList:
      type: array
      items:
        $ref: "#/components/schemas/Database"
    ListTablesResponse:
      type: object
      properties:
        Tables:
          $ref: "#/components/schemas/TableList"
          description: A list of tables.
        NextToken:
          $ref: "#/components/schemas/String"
          description: A token to specify where to start paginating. This is the NextToken from a previously truncated response.
    TableList:
      type: array
      items:
        $ref: "#/components/schemas/Table"
    AmazonResourceName:
      type: string
      minLength: 1
      maxLength: 1011
    ListTagsForResourceResponse:
      type: object
      properties:
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags currently associated with the Timestream resource.
    ResumeBatchLoadTaskResponse:
      type: object
    TagResourceResponse:
      type: object
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    UntagResourceResponse:
      type: object
    UpdateDatabaseResponse:
      type: object
      properties:
        Database:
          $ref: "#/components/schemas/Database"
    UpdateTableResponse:
      type: object
      properties:
        Table:
          $ref: "#/components/schemas/Table"
          description: The updated Timestream table.
    Record:
      description: Represents a time-series data point being written into Timestream. Each record contains an array of dimensions. Dimensions represent the metadata attributes of a time-series data point, such as the instance name or Availability Zone of an EC2 instance. A record also contains the measure name, which is the name of the measure being collected (for example, the CPU utilization of an EC2 instance). Additionally, a record contains the measure value and the value type, which is the data type of the measure value. Also, the record contains the timestamp of when the measure was collected and the timestamp unit, which represents the granularity of the timestamp. Records have a Version field, which is a 64-bit long that you can use for updating data points. Writes of a duplicate record with the same dimension, timestamp, and measure name but different measure value will only succeed if the Version attribute of the record in the write request is higher than that of the existing record. Timestream defaults to a Version of 1 for records without the Version field.
      type: object
      properties:
        Dimensions:
          $ref: "#/components/schemas/Dimensions"
          description: Contains the list of dimensions for time-series data points.
        MeasureName:
          $ref: "#/components/schemas/SchemaName"
          description: Measure represents the data attribute of the time series. For example, the CPU utilization of an EC2 instance or the RPM of a wind turbine are measures.
        MeasureValue:
          $ref: "#/components/schemas/StringValue2048"
          description: Contains the measure value for the time-series data point.
        MeasureValueType:
          $ref: "#/components/schemas/MeasureValueType"
          description: Contains the data type of the measure value for the time-series data point. Default type is DOUBLE. For more information, see Data types.
        Time:
          $ref: "#/components/schemas/StringValue256"
          description: Contains the time at which the measure value for the data point was collected. The time value plus the unit provides the time elapsed since the epoch. For example, if the time value is 12345 and the unit is ms, then 12345 ms have elapsed since the epoch.
        TimeUnit:
          $ref: "#/components/schemas/TimeUnit"
          description: The granularity of the timestamp unit. It indicates if the time value is in seconds, milliseconds, nanoseconds, or other supported values. Default is MILLISECONDS.
        Version:
          $ref: "#/components/schemas/RecordVersion"
          description: 64-bit attribute used for record updates. Write requests for duplicate data with a higher version number will update the existing measure value and version. In cases where the measure value is the same, Version will still be updated. Default value is 1. Version must be 1 or greater, or you will receive a ValidationException error.
        MeasureValues:
          $ref: "#/components/schemas/MeasureValues"
          description: Contains the list of MeasureValue for time-series data points. This is only allowed for type MULTI. For scalar values, use MeasureValue attribute of the record directly.
    Dimensions:
      type: array
      items:
        $ref: "#/components/schemas/Dimension"
    Dimension:
      description: Represents the metadata attributes of the time series. For example, the name and Availability Zone of an EC2 instance or the name of the manufacturer of a wind turbine are dimensions.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/SchemaName"
          description: Dimension represents the metadata attributes of the time series. For example, the name and Availability Zone of an EC2 instance or the name of the manufacturer of a wind turbine are dimensions. For constraints on dimension names, see Naming Constraints.
        Value:
          $ref: "#/components/schemas/SchemaValue"
          description: The value of the dimension.
        DimensionValueType:
          $ref: "#/components/schemas/DimensionValueType"
          description: The data type of the dimension for the time-series data point.
      required:
        - Name
        - Value
    SchemaValue:
      type: string
    DimensionValueType:
      type: string
      enum:
        - VARCHAR
    MeasureValues:
      type: array
      items:
        $ref: "#/components/schemas/MeasureValue"
    MeasureValue:
      description: Represents the data attribute of the time series. For example, the CPU utilization of an EC2 instance or the RPM of a wind turbine are measures. MeasureValue has both name and value. MeasureValue is only allowed for type MULTI. Using MULTI type, you can pass multiple data attributes associated with the same time series in a single record
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/SchemaName"
          description: The name of the MeasureValue. For constraints on MeasureValue names, see Naming Constraints in the Amazon Timestream Developer Guide.
