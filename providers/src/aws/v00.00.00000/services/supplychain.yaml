openapi: 3.0.0
info:
  version: "2024-01-01"
  title: AWS Supply Chain
  description: AWS Supply Chain
  x-serviceName: scn
  x-serviceAlias: supplychain
  x-protocol: rest-json
  x-apiVersion: "2024-01-01"
  x-endpointPrefix: scn
servers:
  - url: https://scn.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for supplychain
paths:
  /api/configuration/instances/{instance_id}/bill-of-materials-import-jobs:
    post:
      operationId: CreateBillOfMaterialsImportJob
      description: CreateBillOfMaterialsImportJob creates an import job for the Product Bill Of Materials (BOM) entity. For information on the product_bom entity, see the AWS Supply Chain User Guide. The CSV file must be located in an Amazon S3 location accessible to AWS Supply Chain. It is recommended to use the same Amazon S3 bucket created during your AWS Supply Chain instance creation.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The AWS Supply Chain instance identifier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                s3uri:
                  $ref: "#/components/schemas/ConfigurationS3Uri"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - s3uri
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBillOfMaterialsImportJobResponse"
  /api/data-integration/instance/{instance_id}/data-integration-flows/{name}:
    put:
      operationId: CreateDataIntegrationFlow
      description: Enables you to programmatically create a data pipeline to ingest data from source systems such as Amazon S3 buckets, to a predefined Amazon Web Services Supply Chain dataset (product, inbound_order) or a temporary dataset along with the data transformation query provided with the API.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Supply Chain instance identifier.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataIntegrationFlowName"
          description: Name of the DataIntegrationFlow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sources:
                  $ref: "#/components/schemas/DataIntegrationFlowSourceList"
                transformation:
                  $ref: "#/components/schemas/DataIntegrationFlowTransformation"
                target:
                  $ref: "#/components/schemas/DataIntegrationFlowTarget"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - sources
                - transformation
                - target
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataIntegrationFlowResponse"
    delete:
      operationId: DeleteDataIntegrationFlow
      description: Enable you to programmatically delete an existing data pipeline for the provided Amazon Web Services Supply Chain instance and DataIntegrationFlow name.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Supply Chain instance identifier.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataIntegrationFlowName"
          description: The name of the DataIntegrationFlow to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDataIntegrationFlowResponse"
    get:
      operationId: GetDataIntegrationFlow
      description: Enables you to programmatically view a specific data pipeline for the provided Amazon Web Services Supply Chain instance and DataIntegrationFlow name.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Supply Chain instance identifier.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataIntegrationFlowName"
          description: The name of the DataIntegrationFlow created.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataIntegrationFlowResponse"
    patch:
      operationId: UpdateDataIntegrationFlow
      description: Enables you to programmatically update an existing data pipeline to ingest data from the source systems such as, Amazon S3 buckets, to a predefined Amazon Web Services Supply Chain dataset (product, inbound_order) or a temporary dataset along with the data transformation query provided with the API.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Supply Chain instance identifier.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataIntegrationFlowName"
          description: The name of the DataIntegrationFlow to be updated.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                sources:
                  $ref: "#/components/schemas/DataIntegrationFlowSourceList"
                transformation:
                  $ref: "#/components/schemas/DataIntegrationFlowTransformation"
                target:
                  $ref: "#/components/schemas/DataIntegrationFlowTarget"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDataIntegrationFlowResponse"
  /api/datalake/instance/{instance_id}/namespaces/{namespace}/datasets/{name}:
    put:
      operationId: CreateDataLakeDataset
      description: Enables you to programmatically create an Amazon Web Services Supply Chain data lake dataset. Developers can create the datasets using their pre-defined or custom schema for a given instance ID, namespace, and dataset name.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Supply Chain instance identifier.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataLakeNamespaceName"
          description: "The namespace of the dataset, besides the custom defined namespace, every instance comes with below pre-defined namespaces: asc - For information on the Amazon Web Services Supply Chain supported datasets see https://docs.aws.amazon.com/aws-supply-chain/latest/userguide/data-model-asc.html. default - For datasets with custom user-defined schemas."
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataLakeDatasetName"
          description: The name of the dataset. For asc name space, the name must be one of the supported data entities under https://docs.aws.amazon.com/aws-supply-chain/latest/userguide/data-model-asc.html.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                schema:
                  $ref: "#/components/schemas/DataLakeDatasetSchema"
                description:
                  $ref: "#/components/schemas/DataLakeDatasetDescription"
                partitionSpec:
                  $ref: "#/components/schemas/DataLakeDatasetPartitionSpec"
                tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataLakeDatasetResponse"
    delete:
      operationId: DeleteDataLakeDataset
      description: Enables you to programmatically delete an Amazon Web Services Supply Chain data lake dataset. Developers can delete the existing datasets for a given instance ID, namespace, and instance name.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The AWS Supply Chain instance identifier.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataLakeNamespaceName"
          description: "The namespace of the dataset, besides the custom defined namespace, every instance comes with below pre-defined namespaces: asc - For information on the Amazon Web Services Supply Chain supported datasets see https://docs.aws.amazon.com/aws-supply-chain/latest/userguide/data-model-asc.html. default - For datasets with custom user-defined schemas."
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataLakeDatasetName"
          description: The name of the dataset. For asc namespace, the name must be one of the supported data entities under https://docs.aws.amazon.com/aws-supply-chain/latest/userguide/data-model-asc.html.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDataLakeDatasetResponse"
    get:
      operationId: GetDataLakeDataset
      description: Enables you to programmatically view an Amazon Web Services Supply Chain data lake dataset. Developers can view the data lake dataset information such as namespace, schema, and so on for a given instance ID, namespace, and dataset name.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Supply Chain instance identifier.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataLakeNamespaceName"
          description: "The namespace of the dataset, besides the custom defined namespace, every instance comes with below pre-defined namespaces: asc - For information on the Amazon Web Services Supply Chain supported datasets see https://docs.aws.amazon.com/aws-supply-chain/latest/userguide/data-model-asc.html. default - For datasets with custom user-defined schemas."
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataLakeDatasetName"
          description: The name of the dataset. For asc namespace, the name must be one of the supported data entities under https://docs.aws.amazon.com/aws-supply-chain/latest/userguide/data-model-asc.html.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataLakeDatasetResponse"
    patch:
      operationId: UpdateDataLakeDataset
      description: Enables you to programmatically update an Amazon Web Services Supply Chain data lake dataset. Developers can update the description of a data lake dataset for a given instance ID, namespace, and dataset name.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Chain instance identifier.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataLakeNamespaceName"
          description: "The namespace of the dataset, besides the custom defined namespace, every instance comes with below pre-defined namespaces: asc - For information on the Amazon Web Services Supply Chain supported datasets see https://docs.aws.amazon.com/aws-supply-chain/latest/userguide/data-model-asc.html. default - For datasets with custom user-defined schemas."
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataLakeDatasetName"
          description: The name of the dataset. For asc namespace, the name must be one of the supported data entities under https://docs.aws.amazon.com/aws-supply-chain/latest/userguide/data-model-asc.html.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/DataLakeDatasetDescription"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDataLakeDatasetResponse"
  /api/datalake/instance/{instance_id}/namespaces/{name}:
    put:
      operationId: CreateDataLakeNamespace
      description: Enables you to programmatically create an Amazon Web Services Supply Chain data lake namespace. Developers can create the namespaces for a given instance ID.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Supply Chain instance identifier.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataLakeNamespaceName"
          description: The name of the namespace. Noted you cannot create namespace with name starting with asc, default, scn, aws, amazon, amzn
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/DataLakeNamespaceDescription"
                tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataLakeNamespaceResponse"
    delete:
      operationId: DeleteDataLakeNamespace
      description: Enables you to programmatically delete an Amazon Web Services Supply Chain data lake namespace and its underling datasets. Developers can delete the existing namespaces for a given instance ID and namespace name.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The AWS Supply Chain instance identifier.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataLakeNamespaceName"
          description: The name of the namespace. Noted you cannot delete pre-defined namespace like asc, default which are only deleted through instance deletion.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDataLakeNamespaceResponse"
    get:
      operationId: GetDataLakeNamespace
      description: Enables you to programmatically view an Amazon Web Services Supply Chain data lake namespace. Developers can view the data lake namespace information such as description for a given instance ID and namespace name.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Supply Chain instance identifier.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataLakeNamespaceName"
          description: "The name of the namespace. Besides the namespaces user created, you can also specify the pre-defined namespaces: asc - Pre-defined namespace containing Amazon Web Services Supply Chain supported datasets, see https://docs.aws.amazon.com/aws-supply-chain/latest/userguide/data-model-asc.html. default - Pre-defined namespace containing datasets with custom user-defined schemas."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataLakeNamespaceResponse"
    patch:
      operationId: UpdateDataLakeNamespace
      description: Enables you to programmatically update an Amazon Web Services Supply Chain data lake namespace. Developers can update the description of a data lake namespace for a given instance ID and namespace name.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Chain instance identifier.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataLakeNamespaceName"
          description: The name of the namespace. Noted you cannot update namespace with name starting with asc, default, scn, aws, amazon, amzn
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/DataLakeNamespaceDescription"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDataLakeNamespaceResponse"
  /api/instance:
    post:
      operationId: CreateInstance
      description: Enables you to programmatically create an Amazon Web Services Supply Chain instance by applying KMS keys and relevant information associated with the API without using the Amazon Web Services console. This is an asynchronous operation. Upon receiving a CreateInstance request, Amazon Web Services Supply Chain immediately returns the instance resource, instance ID, and the initializing state while simultaneously creating all required Amazon Web Services resources for an instance creation. You can use GetInstance to check the status of the instance. If the instance results in an unhealthy state, you need to check the error message, delete the current instance, and recreate a new one based on the mitigation from the error message.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                instanceName:
                  $ref: "#/components/schemas/InstanceName"
                instanceDescription:
                  $ref: "#/components/schemas/InstanceDescription"
                kmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                webAppDnsDomain:
                  $ref: "#/components/schemas/InstanceWebAppDnsDomain"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInstanceResponse"
    get:
      operationId: ListInstances
      description: List all Amazon Web Services Supply Chain instances for a specific account. Enables you to programmatically list all Amazon Web Services Supply Chain instances based on their account ID, instance name, and state of the instance (active or delete).
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/InstanceNextToken"
          description: The pagination token to fetch the next page of instances.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/InstanceMaxResults"
          description: Specify the maximum number of instances to fetch in this paginated request.
        - name: instanceNameFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/InstanceNameList"
          description: The filter to ListInstances based on their names.
        - name: instanceStateFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/InstanceStateList"
          description: The filter to ListInstances based on their state.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInstancesResponse"
  /api/instance/{instance_id}:
    delete:
      operationId: DeleteInstance
      description: Enables you to programmatically delete an Amazon Web Services Supply Chain instance by deleting the KMS keys and relevant information associated with the API without using the Amazon Web Services console. This is an asynchronous operation. Upon receiving a DeleteInstance request, Amazon Web Services Supply Chain immediately returns a response with the instance resource, delete state while cleaning up all Amazon Web Services resources created during the instance creation process. You can use the GetInstance action to check the instance status.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The AWS Supply Chain instance identifier.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteInstanceResponse"
    get:
      operationId: GetInstance
      description: Enables you to programmatically retrieve the information related to an Amazon Web Services Supply Chain instance ID.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The AWS Supply Chain instance identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInstanceResponse"
    patch:
      operationId: UpdateInstance
      description: Enables you to programmatically update an Amazon Web Services Supply Chain instance description by providing all the relevant information such as account ID, instance ID and so on without using the AWS console.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The AWS Supply Chain instance identifier.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                instanceName:
                  $ref: "#/components/schemas/InstanceName"
                instanceDescription:
                  $ref: "#/components/schemas/InstanceDescription"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateInstanceResponse"
  /api/configuration/instances/{instance_id}/bill-of-materials-import-jobs/{job_id}:
    get:
      operationId: GetBillOfMaterialsImportJob
      description: Get status and details of a BillOfMaterialsImportJob.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The AWS Supply Chain instance identifier.
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The BillOfMaterialsImportJob identifier.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBillOfMaterialsImportJobResponse"
  /api-data/data-integration/instance/{instance_id}/data-integration-events/{event_id}:
    get:
      operationId: GetDataIntegrationEvent
      description: Enables you to programmatically view an Amazon Web Services Supply Chain Data Integration Event. Developers can view the eventType, eventGroupId, eventTimestamp, datasetTarget, datasetLoadExecution.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Supply Chain instance identifier.
        - name: event_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique event identifier.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataIntegrationEventResponse"
  /api-data/data-integration/instance/{instance_id}/data-integration-flows/{flow_name}/executions/{execution_id}:
    get:
      operationId: GetDataIntegrationFlowExecution
      description: Get the flow execution.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The AWS Supply Chain instance identifier.
        - name: flow_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataIntegrationFlowName"
          description: The flow name.
        - name: execution_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The flow execution identifier.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataIntegrationFlowExecutionResponse"
  /api-data/data-integration/instance/{instance_id}/data-integration-events:
    get:
      operationId: ListDataIntegrationEvents
      description: Enables you to programmatically list all data integration events for the provided Amazon Web Services Supply Chain instance.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Supply Chain instance identifier.
        - name: eventType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DataIntegrationEventType"
          description: List data integration events for the specified eventType.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DataIntegrationEventNextToken"
          description: The pagination token to fetch the next page of the data integration events.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DataIntegrationEventMaxResults"
          description: Specify the maximum number of data integration events to fetch in one paginated request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataIntegrationEventsResponse"
    post:
      operationId: SendDataIntegrationEvent
      description: Send the data payload for the event with real-time data for analysis or monitoring. The real-time data events are stored in an Amazon Web Services service before being processed and stored in data lake.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The AWS Supply Chain instance identifier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventType:
                  $ref: "#/components/schemas/DataIntegrationEventType"
                data:
                  $ref: "#/components/schemas/DataIntegrationEventData"
                eventGroupId:
                  $ref: "#/components/schemas/DataIntegrationEventGroupId"
                eventTimestamp:
                  $ref: "#/components/schemas/SyntheticTimestamp_epoch_seconds"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                datasetTarget:
                  $ref: "#/components/schemas/DataIntegrationEventDatasetTargetConfiguration"
              required:
                - eventType
                - data
                - eventGroupId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendDataIntegrationEventResponse"
  /api-data/data-integration/instance/{instance_id}/data-integration-flows/{flow_name}/executions:
    get:
      operationId: ListDataIntegrationFlowExecutions
      description: List flow executions.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The AWS Supply Chain instance identifier.
        - name: flow_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataIntegrationFlowName"
          description: The flow name.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DataIntegrationFlowExecutionNextToken"
          description: The pagination token to fetch next page of flow executions.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DataIntegrationFlowExecutionMaxResults"
          description: The number to specify the max number of flow executions to fetch in this paginated request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataIntegrationFlowExecutionsResponse"
  /api/data-integration/instance/{instance_id}/data-integration-flows:
    get:
      operationId: ListDataIntegrationFlows
      description: Enables you to programmatically list all data pipelines for the provided Amazon Web Services Supply Chain instance.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Supply Chain instance identifier.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DataIntegrationFlowNextToken"
          description: The pagination token to fetch the next page of the DataIntegrationFlows.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DataIntegrationFlowMaxResults"
          description: Specify the maximum number of DataIntegrationFlows to fetch in one paginated request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataIntegrationFlowsResponse"
  /api/datalake/instance/{instance_id}/namespaces/{namespace}/datasets:
    get:
      operationId: ListDataLakeDatasets
      description: Enables you to programmatically view the list of Amazon Web Services Supply Chain data lake datasets. Developers can view the datasets and the corresponding information such as namespace, schema, and so on for a given instance ID and namespace.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Supply Chain instance identifier.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataLakeNamespaceName"
          description: "The namespace of the dataset, besides the custom defined namespace, every instance comes with below pre-defined namespaces: asc - For information on the Amazon Web Services Supply Chain supported datasets see https://docs.aws.amazon.com/aws-supply-chain/latest/userguide/data-model-asc.html. default - For datasets with custom user-defined schemas."
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DataLakeDatasetNextToken"
          description: The pagination token to fetch next page of datasets.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DataLakeDatasetMaxResults"
          description: The max number of datasets to fetch in this paginated request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataLakeDatasetsResponse"
  /api/datalake/instance/{instance_id}/namespaces:
    get:
      operationId: ListDataLakeNamespaces
      description: Enables you to programmatically view the list of Amazon Web Services Supply Chain data lake namespaces. Developers can view the namespaces and the corresponding information such as description for a given instance ID. Note that this API only return custom namespaces, instance pre-defined namespaces are not included.
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Supply Chain instance identifier.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DataLakeNamespaceNextToken"
          description: The pagination token to fetch next page of namespaces.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DataLakeNamespaceMaxResults"
          description: The max number of namespaces to fetch in this paginated request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataLakeNamespacesResponse"
  /api/tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: List all the tags for an Amazon Web ServicesSupply Chain resource. You can list all the tags added to a resource. By listing the tags, developers can view the tag level information on a resource and perform actions such as, deleting a resource associated with a particular tag.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AscResourceArn"
          description: The Amazon Web Services Supply chain resource ARN that needs tags to be listed.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: You can create tags during or after creating a resource such as instance, data flow, or dataset in AWS Supply chain. During the data ingestion process, you can add tags such as dev, test, or prod to data flows created during the data ingestion process in the AWS Supply Chain datasets. You can use these tags to identify a group of resources or a single resource used by the developer.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AscResourceArn"
          description: The Amazon Web Services Supply chain resource ARN that needs to be tagged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: You can delete tags for an Amazon Web Services Supply chain resource such as instance, data flow, or dataset in AWS Supply Chain. During the data ingestion process, you can delete tags such as dev, test, or prod to data flows created during the data ingestion process in the AWS Supply Chain datasets.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AscResourceArn"
          description: The Amazon Web Services Supply chain resource ARN that needs to be untagged.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The list of tag keys to be deleted for an Amazon Web Services Supply Chain resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    UUID:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    ConfigurationS3Uri:
      type: string
      minLength: 10
      pattern: "[sS]3://[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]/.+"
    ClientToken:
      description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
      type: string
      minLength: 33
      maxLength: 126
    CreateBillOfMaterialsImportJobResponse:
      description: The response parameters of CreateBillOfMaterialsImportJob.
      type: object
      properties:
        jobId:
          $ref: "#/components/schemas/UUID"
          description: The new BillOfMaterialsImportJob identifier.
      required:
        - jobId
    DataIntegrationFlowName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[A-Za-z0-9-]+"
    DataIntegrationFlowSourceList:
      type: array
      items:
        $ref: "#/components/schemas/DataIntegrationFlowSource"
    DataIntegrationFlowSource:
      description: The DataIntegrationFlow source parameters.
      type: object
      properties:
        sourceType:
          $ref: "#/components/schemas/DataIntegrationFlowSourceType"
          description: The DataIntegrationFlow source type.
        sourceName:
          $ref: "#/components/schemas/DataIntegrationFlowSourceName"
          description: The DataIntegrationFlow source name that can be used as table alias in SQL transformation query.
        s3Source:
          $ref: "#/components/schemas/DataIntegrationFlowS3SourceConfiguration"
          description: The S3 DataIntegrationFlow source.
        datasetSource:
          $ref: "#/components/schemas/DataIntegrationFlowDatasetSourceConfiguration"
          description: The dataset DataIntegrationFlow source.
      required:
        - sourceType
        - sourceName
    DataIntegrationFlowSourceType:
      type: string
      enum:
        - S3
        - DATASET
    DataIntegrationFlowSourceName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[A-Za-z0-9_]+"
    DataIntegrationFlowS3SourceConfiguration:
      description: The S3 DataIntegrationFlow source configuration parameters.
      type: object
      properties:
        bucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The bucketName of the S3 source objects.
        prefix:
          $ref: "#/components/schemas/DataIntegrationFlowS3Prefix"
          description: The prefix of the S3 source objects. To trigger data ingestion, S3 files need to be put under s3://bucketName/prefix/.
        options:
          $ref: "#/components/schemas/DataIntegrationFlowS3Options"
          description: The other options of the S3 DataIntegrationFlow source.
      required:
        - bucketName
        - prefix
    S3BucketName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: "[a-z0-9][a-z0-9.-]*[a-z0-9]"
    DataIntegrationFlowS3Prefix:
      type: string
      minLength: 0
      maxLength: 700
      pattern: "[/A-Za-z0-9._-]+"
    DataIntegrationFlowS3Options:
      description: The Amazon S3 options used in S3 source and target configurations.
      type: object
      properties:
        fileType:
          $ref: "#/components/schemas/DataIntegrationFlowFileType"
          description: The Amazon S3 file type in S3 options.
    DataIntegrationFlowFileType:
      type: string
      enum:
        - CSV
        - PARQUET
        - JSON
    DataIntegrationFlowDatasetSourceConfiguration:
      description: The dataset DataIntegrationFlow source configuration parameters.
      type: object
      properties:
        datasetIdentifier:
          $ref: "#/components/schemas/DatasetIdentifier"
          description: The ARN of the dataset.
        options:
          $ref: "#/components/schemas/DataIntegrationFlowDatasetOptions"
          description: The dataset DataIntegrationFlow source options.
      required:
        - datasetIdentifier
    DatasetIdentifier:
      type: string
      minLength: 1
      maxLength: 1011
      pattern: "[-_/A-Za-z0-9:]+"
    DataIntegrationFlowDatasetOptions:
      description: The dataset options used in dataset source and target configurations.
      type: object
      properties:
        loadType:
          $ref: "#/components/schemas/DataIntegrationFlowLoadType"
          description: The target dataset's data load type. This only affects how source S3 files are selected in the S3-to-dataset flow. REPLACE - Target dataset will get replaced with the new file added under the source s3 prefix. INCREMENTAL - Target dataset will get updated with the up-to-date content under S3 prefix incorporating any file additions or removals there.
        dedupeRecords:
          $ref: "#/components/schemas/Boolean"
          description: The option to perform deduplication on data records sharing same primary key values. If disabled, transformed data with duplicate primary key values will ingest into dataset, for datasets within asc namespace, such duplicates will cause ingestion fail. If enabled without dedupeStrategy, deduplication is done by retaining a random data record among those sharing the same primary key values. If enabled with dedupeStragtegy, the deduplication is done following the strategy. Note that target dataset may have partition configured, when dedupe is enabled, it only dedupe against primary keys and retain only one record out of those duplicates regardless of its partition status.
        dedupeStrategy:
          $ref: "#/components/schemas/DataIntegrationFlowDedupeStrategy"
          description: The deduplication strategy to dedupe the data records sharing same primary key values of the target dataset. This strategy only applies to target dataset with primary keys and with dedupeRecords option enabled. If transformed data still got duplicates after the dedupeStrategy evaluation, a random data record is chosen to be retained.
    DataIntegrationFlowLoadType:
      type: string
      enum:
        - INCREMENTAL
        - REPLACE
    Boolean:
      type: boolean
    DataIntegrationFlowDedupeStrategy:
      description: The deduplication strategy details.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/DataIntegrationFlowDedupeStrategyType"
          description: The type of the deduplication strategy. FIELD_PRIORITY - Field priority configuration for the deduplication strategy specifies an ordered list of fields used to tie-break the data records sharing the same primary key values. Fields earlier in the list have higher priority for evaluation. For each field, the sort order determines whether to retain data record with larger or smaller field value.
        fieldPriority:
          $ref: "#/components/schemas/DataIntegrationFlowFieldPriorityDedupeStrategyConfiguration"
          description: The field priority deduplication strategy.
      required:
        - type_
    DataIntegrationFlowDedupeStrategyType:
      type: string
      enum:
        - FIELD_PRIORITY
    DataIntegrationFlowFieldPriorityDedupeStrategyConfiguration:
      description: The field priority deduplication strategy details.
      type: object
      properties:
        fields:
          $ref: "#/components/schemas/DataIntegrationFlowFieldPriorityDedupeFieldList"
          description: The list of field names and their sort order for deduplication, arranged in descending priority from highest to lowest.
      required:
        - fields
    DataIntegrationFlowFieldPriorityDedupeFieldList:
      type: array
      items:
        $ref: "#/components/schemas/DataIntegrationFlowFieldPriorityDedupeField"
    DataIntegrationFlowFieldPriorityDedupeField:
      description: The field used in the field priority deduplication strategy.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/DataIntegrationFlowFieldPriorityDedupeFieldName"
          description: The name of the deduplication field. Must exist in the dataset and not be a primary key.
        sortOrder:
          $ref: "#/components/schemas/DataIntegrationFlowFieldPriorityDedupeSortOrder"
          description: The sort order for the deduplication field.
      required:
        - name
        - sortOrder
    DataIntegrationFlowFieldPriorityDedupeFieldName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-z0-9_]+"
    DataIntegrationFlowFieldPriorityDedupeSortOrder:
      type: string
      enum:
        - ASC
        - DESC
    DataIntegrationFlowTransformation:
      description: The DataIntegrationFlow transformation parameters.
      type: object
      properties:
        transformationType:
          $ref: "#/components/schemas/DataIntegrationFlowTransformationType"
          description: The DataIntegrationFlow transformation type.
        sqlTransformation:
          $ref: "#/components/schemas/DataIntegrationFlowSQLTransformationConfiguration"
          description: The SQL DataIntegrationFlow transformation configuration.
      required:
        - transformationType
    DataIntegrationFlowTransformationType:
      type: string
      enum:
        - SQL
        - NONE
    DataIntegrationFlowSQLTransformationConfiguration:
      description: The SQL DataIntegrationFlow transformation configuration parameters.
      type: object
      properties:
        query:
          $ref: "#/components/schemas/DataIntegrationFlowSQLQuery"
          description: The transformation SQL query body based on SparkSQL.
      required:
        - query
    DataIntegrationFlowSQLQuery:
      type: string
      minLength: 1
      maxLength: 65535
    DataIntegrationFlowTarget:
      description: The DataIntegrationFlow target parameters.
      type: object
      properties:
        targetType:
          $ref: "#/components/schemas/DataIntegrationFlowTargetType"
          description: The DataIntegrationFlow target type.
        s3Target:
          $ref: "#/components/schemas/DataIntegrationFlowS3TargetConfiguration"
          description: The S3 DataIntegrationFlow target.
        datasetTarget:
          $ref: "#/components/schemas/DataIntegrationFlowDatasetTargetConfiguration"
          description: The dataset DataIntegrationFlow target. Note that for AWS Supply Chain dataset under asc namespace, it has a connection_id internal field that is not allowed to be provided by client directly, they will be auto populated.
      required:
        - targetType
    DataIntegrationFlowTargetType:
      type: string
      enum:
        - S3
        - DATASET
    DataIntegrationFlowS3TargetConfiguration:
      description: The S3 DataIntegrationFlow target configuration parameters.
      type: object
      properties:
        bucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The bucketName of the S3 target objects.
        prefix:
          $ref: "#/components/schemas/DataIntegrationFlowS3Prefix"
          description: The prefix of the S3 target objects.
        options:
          $ref: "#/components/schemas/DataIntegrationFlowS3Options"
          description: The S3 DataIntegrationFlow target options.
      required:
        - bucketName
        - prefix
    DataIntegrationFlowDatasetTargetConfiguration:
      description: The dataset DataIntegrationFlow target configuration parameters.
      type: object
      properties:
        datasetIdentifier:
          $ref: "#/components/schemas/DatasetIdentifier"
          description: The dataset ARN.
        options:
          $ref: "#/components/schemas/DataIntegrationFlowDatasetOptions"
          description: The dataset DataIntegrationFlow target options.
      required:
        - datasetIdentifier
    TagMap:
      type: object
      properties: {}
    CreateDataIntegrationFlowResponse:
      description: The response parameters for CreateDataIntegrationFlow.
      type: object
      properties:
        instanceId:
          $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Supply Chain instance identifier.
        name:
          $ref: "#/components/schemas/DataIntegrationFlowName"
          description: The name of the DataIntegrationFlow created.
      required:
        - instanceId
        - name
    DataLakeNamespaceName:
      type: string
      minLength: 1
      maxLength: 50
      pattern: "[a-z0-9_]+"
    DataLakeDatasetName:
      type: string
      minLength: 1
      maxLength: 75
      pattern: "[a-z0-9_]+"
    DataLakeDatasetSchema:
      description: The schema details of the dataset. Note that for AWS Supply Chain dataset under asc namespace, it may have internal fields like connection_id that will be auto populated by data ingestion methods.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/DataLakeDatasetSchemaName"
          description: The name of the dataset schema.
        fields:
          $ref: "#/components/schemas/DataLakeDatasetSchemaFieldList"
          description: The list of field details of the dataset schema.
        primaryKeys:
          $ref: "#/components/schemas/DataLakeDatasetPrimaryKeyFieldList"
          description: "The list of primary key fields for the dataset. Primary keys defined can help data ingestion methods to ensure data uniqueness: CreateDataIntegrationFlow's dedupe strategy will leverage primary keys to perform records deduplication before write to dataset; SendDataIntegrationEvent's UPSERT and DELETE can only work with dataset with primary keys. For more details, refer to those data ingestion documentations. Note that defining primary keys does not necessarily mean the dataset cannot have duplicate records, duplicate records can still be ingested if CreateDataIntegrationFlow's dedupe disabled or through SendDataIntegrationEvent's APPEND operation."
      required:
        - name
        - fields
    DataLakeDatasetSchemaName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[A-Za-z0-9]+"
    DataLakeDatasetSchemaFieldList:
      type: array
      items:
        $ref: "#/components/schemas/DataLakeDatasetSchemaField"
    DataLakeDatasetSchemaField:
      description: The dataset field details.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/DataLakeDatasetSchemaFieldName"
          description: The dataset field name.
        type_:
          $ref: "#/components/schemas/DataLakeDatasetSchemaFieldType"
          description: The dataset field type.
        isRequired:
          $ref: "#/components/schemas/Boolean"
          description: Indicate if the field is required or not.
      required:
        - name
        - type_
        - isRequired
    DataLakeDatasetSchemaFieldName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-z0-9_]+"
    DataLakeDatasetSchemaFieldType:
      type: string
      enum:
        - INT
        - DOUBLE
        - STRING
        - TIMESTAMP
        - LONG
    DataLakeDatasetPrimaryKeyFieldList:
      type: array
      items:
        $ref: "#/components/schemas/DataLakeDatasetPrimaryKeyField"
    DataLakeDatasetPrimaryKeyField:
      description: The detail of the primary key field.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/DataLakeDatasetSchemaFieldName"
          description: The name of the primary key field.
      required:
        - name
    DataLakeDatasetDescription:
      type: string
      minLength: 1
      maxLength: 500
    DataLakeDatasetPartitionSpec:
      description: The partition specification for a dataset.
      type: object
      properties:
        fields:
          $ref: "#/components/schemas/DataLakeDatasetPartitionFieldList"
          description: The fields on which to partition a dataset. The partitions will be applied hierarchically based on the order of this list.
      required:
        - fields
    DataLakeDatasetPartitionFieldList:
      type: array
      items:
        $ref: "#/components/schemas/DataLakeDatasetPartitionField"
    DataLakeDatasetPartitionField:
      description: The detail of the partition field.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/DataLakeDatasetSchemaFieldName"
          description: The name of the partition field.
        transform:
          $ref: "#/components/schemas/DataLakeDatasetPartitionFieldTransform"
          description: The transformation of the partition field. A transformation specifies how to partition on a given field. For example, with timestamp you can specify that you'd like to partition fields by day, e.g. data record with value 2025-01-03T00:00:00Z in partition field is in 2025-01-03 partition. Also noted that data record without any value in optional partition field is in NULL partition.
      required:
        - name
        - transform
    DataLakeDatasetPartitionFieldTransform:
      description: The detail of the partition field transformation.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/DataLakeDatasetPartitionTransformType"
          description: "The type of partitioning transformation for this field. The available options are: IDENTITY - Partitions data on a given field by its exact values. YEAR - Partitions data on a timestamp field using year granularity. MONTH - Partitions data on a timestamp field using month granularity. DAY - Partitions data on a timestamp field using day granularity. HOUR - Partitions data on a timestamp field using hour granularity."
      required:
        - type_
    DataLakeDatasetPartitionTransformType:
      type: string
      enum:
        - YEAR
        - MONTH
        - DAY
        - HOUR
        - IDENTITY
    CreateDataLakeDatasetResponse:
      description: The response parameters of CreateDataLakeDataset.
      type: object
      properties:
        dataset:
          $ref: "#/components/schemas/DataLakeDataset"
          description: The detail of created dataset.
      required:
        - dataset
    DataLakeDataset:
      description: The data lake dataset details.
      type: object
      properties:
        instanceId:
          $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Supply Chain instance identifier.
        namespace:
          $ref: "#/components/schemas/DataLakeNamespaceName"
          description: "The namespace of the dataset, besides the custom defined namespace, every instance comes with below pre-defined namespaces: asc - For information on the Amazon Web Services Supply Chain supported datasets see https://docs.aws.amazon.com/aws-supply-chain/latest/userguide/data-model-asc.html. default - For datasets with custom user-defined schemas."
        name:
          $ref: "#/components/schemas/DataLakeDatasetName"
          description: The name of the dataset. For asc namespace, the name must be one of the supported data entities under https://docs.aws.amazon.com/aws-supply-chain/latest/userguide/data-model-asc.html.
        arn:
          $ref: "#/components/schemas/AscResourceArn"
          description: The arn of the dataset.
        schema:
          $ref: "#/components/schemas/DataLakeDatasetSchema"
          description: The schema of the dataset.
        description:
          $ref: "#/components/schemas/DataLakeDatasetDescription"
          description: The description of the dataset.
        partitionSpec:
          $ref: "#/components/schemas/DataLakeDatasetPartitionSpec"
        createdTime:
          $ref: "#/components/schemas/Timestamp"
          description: The creation time of the dataset.
        lastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The last modified time of the dataset.
      required:
        - instanceId
        - namespace
        - name
        - arn
        - schema
        - createdTime
        - lastModifiedTime
    AscResourceArn:
      type: string
      minLength: 20
      maxLength: 1011
      pattern: arn:aws:scn(?::([a-z0-9-]+):([0-9]+):instance)?/([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})[-_./A-Za-z0-9]*
    Timestamp:
      type: string
      format: date-time
    DataLakeNamespaceDescription:
      type: string
      minLength: 1
      maxLength: 500
    CreateDataLakeNamespaceResponse:
      description: The response parameters of CreateDataLakeNamespace.
      type: object
      properties:
        namespace:
          $ref: "#/components/schemas/DataLakeNamespace"
          description: The detail of created namespace.
      required:
        - namespace
    DataLakeNamespace:
      description: The data lake namespace details.
      type: object
      properties:
        instanceId:
          $ref: "#/components/schemas/UUID"
          description: The Amazon Web Services Supply Chain instance identifier.
        name:
          $ref: "#/components/schemas/DataLakeNamespaceName"
          description: The name of the namespace.
        arn:
          $ref: "#/components/schemas/AscResourceArn"
          description: The arn of the namespace.
        description:
          $ref: "#/components/schemas/DataLakeNamespaceDescription"
          description: The description of the namespace.
        createdTime:
          $ref: "#/components/schemas/Timestamp"
          description: The creation time of the namespace.
        lastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The last modified time of the namespace.
      required:
        - instanceId
        - name
        - arn
        - createdTime
        - lastModifiedTime
    InstanceName:
      type: string
      minLength: 0
      maxLength: 63
      pattern: (?![ _ʼ'%-])[a-zA-Z0-9 _ʼ'%-]{0,62}[a-zA-Z0-9]
    InstanceDescription:
      type: string
      minLength: 0
      maxLength: 501
      pattern: ([a-zA-Z0-9., _ʼ'%-]){0,500}
    KmsKeyArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:[a-z0-9][-.a-z0-9]{0,62}:kms:([a-z0-9][-.a-z0-9]{0,62})?:([a-z0-9][-.a-z0-9]{0,62})?:key/.{0,1019}
    InstanceWebAppDnsDomain:
      type: string
