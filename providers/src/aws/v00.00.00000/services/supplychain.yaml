    DataIntegrationEventDatasetTargetDetails:
      description: The target dataset details for a DATASET event type.
      type: object
      properties:
        datasetIdentifier:
          $ref: "#/components/schemas/DataIntegrationDatasetArn"
          description: The datalake dataset ARN identifier.
        operationType:
          $ref: "#/components/schemas/DataIntegrationEventDatasetOperationType"
          description: "The target dataset load operation type. The available options are: APPEND - Add new records to the dataset. Noted that this operation type will just try to append records as-is without any primary key or partition constraints. UPSERT - Modify existing records in the dataset with primary key configured, events for datasets without primary keys are not allowed. If event data contains primary keys that match records in the dataset within same partition, then those existing records (in that partition) will be updated. If primary keys do not match, new records will be added. Note that if dataset contain records with duplicate primary key values in the same partition, those duplicate records will be deduped into one updated record. DELETE - Remove existing records in the dataset with primary key configured, events for datasets without primary keys are not allowed. If event data contains primary keys that match records in the dataset within same partition, then those existing records (in that partition) will be deleted. If primary keys do not match, no actions will be done. Note that if dataset contain records with duplicate primary key values in the same partition, all those duplicates will be removed."
        datasetLoadExecution:
          $ref: "#/components/schemas/DataIntegrationEventDatasetLoadExecutionDetails"
          description: The target dataset load execution.
      required:
        - datasetIdentifier
        - operationType
        - datasetLoadExecution
