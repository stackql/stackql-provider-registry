          description: A complex type that contains information about the service.
    GetServiceAttributesResponse:
      type: object
      properties:
        ServiceAttributes:
          $ref: "#/components/schemas/ServiceAttributes"
          description: A complex type that contains the service ARN and a list of attribute key-value pairs associated with the service.
    ServiceAttributes:
      description: A complex type that contains information about attributes associated with a specific service.
      type: object
      properties:
        ServiceArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the service that the attributes are associated with.
        ResourceOwner:
          $ref: "#/components/schemas/AWSAccountId"
          description: The ID of the Amazon Web Services account that created the namespace with which the service is associated. If this isn't your account ID, it is the ID of the account that shared the namespace with your account. For more information about shared namespaces, see Cross-account Cloud Map namespace sharing in the Cloud Map Developer Guide.
        Attributes:
          type: object
          properties: {}
          description: "A string map that contains the following information for the service that you specify in ServiceArn: The attributes that apply to the service. For each attribute, the applicable value. You can specify a total of 30 attributes."
    ListInstancesResponse:
      type: object
      properties:
        ResourceOwner:
          $ref: "#/components/schemas/AWSAccountId"
          description: The ID of the Amazon Web Services account that created the namespace that contains the specified service. If this isn't your account ID, it's the ID of the account that shared the namespace with your account.
        Instances:
          $ref: "#/components/schemas/InstanceSummaryList"
          description: Summary information about the instances that are associated with the specified service.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: If more than MaxResults instances match the specified criteria, you can submit another ListInstances request to get the next group of results. Specify the value of NextToken from the previous response in the next request.
    InstanceSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/InstanceSummary"
    InstanceSummary:
      description: A complex type that contains information about the instances that you registered by using a specified service.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ResourceId"
          description: The ID for an instance that you created by using a specified service.
        Attributes:
          type: object
          properties: {}
          description: "A string map that contains the following information: The attributes that are associated with the instance. For each attribute, the applicable value. Supported attribute keys include the following: AWS_ALIAS_DNS_NAME For an alias record that routes traffic to an Elastic Load Balancing load balancer, the DNS name that's associated with the load balancer. AWS_EC2_INSTANCE_ID (HTTP namespaces only) The Amazon EC2 instance ID for the instance. When the AWS_EC2_INSTANCE_ID attribute is specified, then the AWS_INSTANCE_IPV4 attribute contains the primary private IPv4 address. AWS_INIT_HEALTH_STATUS If the service configuration includes HealthCheckCustomConfig, you can optionally use AWS_INIT_HEALTH_STATUS to specify the initial status of the custom health check, HEALTHY or UNHEALTHY. If you don't specify a value for AWS_INIT_HEALTH_STATUS, the initial status is HEALTHY. AWS_INSTANCE_CNAME For a CNAME record, the domain name that Route 53 returns in response to DNS queries (for example, example.com). AWS_INSTANCE_IPV4 For an A record, the IPv4 address that Route 53 returns in response to DNS queries (for example, 192.0.2.44). AWS_INSTANCE_IPV6 For an AAAA record, the IPv6 address that Route 53 returns in response to DNS queries (for example, 2001:0db8:85a3:0000:0000:abcd:0001:2345). AWS_INSTANCE_PORT For an SRV record, the value that Route 53 returns for the port. In addition, if the service includes HealthCheckConfig, the port on the endpoint that Route 53 sends requests to."
        CreatedByAccount:
          $ref: "#/components/schemas/AWSAccountId"
          description: The ID of the Amazon Web Services account that registered the instance. If this isn't your account ID, it's the ID of the account that shared the namespace with your account or the ID of another account with which the namespace has been shared. For more information about shared namespaces, see Cross-account Cloud Map namespace sharing in the Cloud Map Developer Guide.
    NamespaceFilters:
      type: array
      items:
        $ref: "#/components/schemas/NamespaceFilter"
    NamespaceFilter:
      description: A complex type that identifies the namespaces that you want to list. You can choose to list public or private namespaces.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NamespaceFilterName"
          description: "Specify the namespaces that you want to get using one of the following. TYPE: Gets the namespaces of the specified type. NAME: Gets the namespaces with the specified name. HTTP_NAME: Gets the namespaces with the specified HTTP name. RESOURCE_OWNER: Gets the namespaces created by your Amazon Web Services account or by other accounts. This can be used to filter for shared namespaces. For more information about shared namespaces, see Cross-account Cloud Map namespace sharing in the Cloud Map Developer Guide."
        Values:
          $ref: "#/components/schemas/FilterValues"
          description: "Specify the values that are applicable to the value that you specify for Name. TYPE: Specify HTTP, DNS_PUBLIC, or DNS_PRIVATE. NAME: Specify the name of the namespace, which is found in Namespace.Name. HTTP_NAME: Specify the HTTP name of the namespace, which is found in Namespace.Properties.HttpProperties.HttpName. RESOURCE_OWNER: Specify one of SELF or OTHER_ACCOUNTS. SELF can be used to filter namespaces created by you and OTHER_ACCOUNTS can be used to filter namespaces shared with you that were created by other accounts."
        Condition:
          $ref: "#/components/schemas/FilterCondition"
          description: "Specify the operator that you want to use to determine whether a namespace matches the specified value. Valid values for Condition are one of the following. EQ: When you specify EQ for Condition, you can specify only one value. EQ is supported for TYPE, NAME, RESOURCE_OWNER and HTTP_NAME. EQ is the default condition and can be omitted. BEGINS_WITH: When you specify BEGINS_WITH for Condition, you can specify only one value. BEGINS_WITH is supported for TYPE, NAME, and HTTP_NAME."
      required:
        - Name
        - Values
    NamespaceFilterName:
      type: string
      enum:
        - TYPE
        - NAME
        - HTTP_NAME
        - RESOURCE_OWNER
    FilterValues:
      type: array
      items:
        $ref: "#/components/schemas/FilterValue"
    FilterValue:
      type: string
      minLength: 1
      maxLength: 255
    FilterCondition:
      type: string
      enum:
        - EQ
        - IN
        - BETWEEN
        - BEGINS_WITH
    ListNamespacesResponse:
      type: object
      properties:
        Namespaces:
          $ref: "#/components/schemas/NamespaceSummariesList"
          description: An array that contains one NamespaceSummary object for each namespace that matches the specified filter criteria.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: If the response contains NextToken, submit another ListNamespaces request to get the next group of results. Specify the value of NextToken from the previous response in the next request. Cloud Map gets MaxResults namespaces and then filters them based on the specified criteria. It's possible that no namespaces in the first MaxResults namespaces matched the specified criteria but that subsequent groups of MaxResults namespaces do contain namespaces that match the criteria.
    NamespaceSummariesList:
      type: array
      items:
        $ref: "#/components/schemas/NamespaceSummary"
    NamespaceSummary:
      description: A complex type that contains information about a namespace.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ResourceId"
          description: The ID of the namespace.
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that Cloud Map assigns to the namespace when you create it.
        ResourceOwner:
          $ref: "#/components/schemas/AWSAccountId"
          description: The ID of the Amazon Web Services account that created the namespace. If this isn't your account ID, it's the ID of the account that shared the namespace with your account. For more information about shared namespaces, see Cross-account Cloud Map namespace sharing in the Cloud Map Developer Guide.
        Name:
          $ref: "#/components/schemas/NamespaceName"
          description: The name of the namespace. When you create a namespace, Cloud Map automatically creates a Route 53 hosted zone that has the same name as the namespace.
        Type:
          $ref: "#/components/schemas/NamespaceType"
          description: The type of the namespace, either public or private.
        Description:
          $ref: "#/components/schemas/ResourceDescription"
          description: A description for the namespace.
        ServiceCount:
          $ref: "#/components/schemas/ResourceCount"
          description: The number of services that were created using the namespace.
        Properties:
          $ref: "#/components/schemas/NamespaceProperties"
          description: The properties of the namespace.
        CreateDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the namespace was created.
    OperationFilters:
      type: array
      items:
        $ref: "#/components/schemas/OperationFilter"
    OperationFilter:
      description: A complex type that lets you select the operations that you want to list.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/OperationFilterName"
          description: "Specify the operations that you want to get: NAMESPACE_ID: Gets operations related to specified namespaces. SERVICE_ID: Gets operations related to specified services. STATUS: Gets operations based on the status of the operations: SUBMITTED, PENDING, SUCCEED, or FAIL. TYPE: Gets specified types of operation. UPDATE_DATE: Gets operations that changed status during a specified date/time range."
        Values:
          $ref: "#/components/schemas/FilterValues"
          description: "Specify values that are applicable to the value that you specify for Name: NAMESPACE_ID: Specify one namespace ID. SERVICE_ID: Specify one service ID. STATUS: Specify one or more statuses: SUBMITTED, PENDING, SUCCEED, or FAIL. TYPE: Specify one or more of the following types: CREATE_NAMESPACE, DELETE_NAMESPACE, UPDATE_SERVICE, REGISTER_INSTANCE, or DEREGISTER_INSTANCE. UPDATE_DATE: Specify a start date and an end date in Unix date/time format and Coordinated Universal Time (UTC). The start date must be the first value."
        Condition:
          $ref: "#/components/schemas/FilterCondition"
          description: "The operator that you want to use to determine whether an operation matches the specified value. Valid values for condition include: EQ: When you specify EQ for the condition, you can specify only one value. EQ is supported for NAMESPACE_ID, SERVICE_ID, STATUS, and TYPE. EQ is the default condition and can be omitted. IN: When you specify IN for the condition, you can specify a list of one or more values. IN is supported for STATUS and TYPE. An operation must match one of the specified values to be returned in the response. BETWEEN: Specify a start date and an end date in Unix date/time format and Coordinated Universal Time (UTC). The start date must be the first value. BETWEEN is supported for UPDATE_DATE."
      required:
        - Name
        - Values
    OperationFilterName:
      type: string
      enum:
        - NAMESPACE_ID
        - SERVICE_ID
        - STATUS
        - TYPE
        - UPDATE_DATE
