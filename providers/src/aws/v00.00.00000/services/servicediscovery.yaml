          description: Start of Authority (SOA) record for the hosted zone.
    HttpProperties:
      description: A complex type that contains the name of an HTTP namespace.
      type: object
      properties:
        HttpName:
          $ref: "#/components/schemas/NamespaceName"
          description: The name of an HTTP namespace.
    GetOperationResponse:
      type: object
      properties:
        Operation:
          $ref: "#/components/schemas/Operation"
          description: A complex type that contains information about the operation.
    Operation:
      description: A complex type that contains information about a specified operation.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/OperationId"
          description: The ID of the operation that you want to get information about.
        OwnerAccount:
          $ref: "#/components/schemas/AWSAccountId"
          description: The ID of the Amazon Web Services account that owns the namespace associated with the operation.
        Type:
          $ref: "#/components/schemas/OperationType"
          description: The name of the operation that's associated with the specified ID.
        Status:
          $ref: "#/components/schemas/OperationStatus"
          description: "The status of the operation. Values include the following: SUBMITTED This is the initial state that occurs immediately after you submit a request. PENDING Cloud Map is performing the operation. SUCCESS The operation succeeded. FAIL The operation failed. For the failure reason, see ErrorMessage."
        ErrorMessage:
          $ref: "#/components/schemas/Message"
          description: If the value of Status is FAIL, the reason that the operation failed.
        ErrorCode:
          $ref: "#/components/schemas/Code"
          description: "The code associated with ErrorMessage. Values for ErrorCode include the following: ACCESS_DENIED CANNOT_CREATE_HOSTED_ZONE EXPIRED_TOKEN HOSTED_ZONE_NOT_FOUND INTERNAL_FAILURE INVALID_CHANGE_BATCH THROTTLED_REQUEST"
        CreateDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the request was submitted, in Unix date/time format and Coordinated Universal Time (UTC). The value of CreateDate is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        UpdateDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the value of Status changed to the current value, in Unix date/time format and Coordinated Universal Time (UTC). The value of UpdateDate is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        Targets:
          type: object
          properties: {}
          description: "The name of the target entity that's associated with the operation: NAMESPACE The namespace ID is returned in the ResourceId property. SERVICE The service ID is returned in the ResourceId property. INSTANCE The instance ID is returned in the ResourceId property."
    OperationType:
      type: string
      enum:
        - CREATE_NAMESPACE
        - DELETE_NAMESPACE
        - UPDATE_NAMESPACE
        - UPDATE_SERVICE
        - REGISTER_INSTANCE
        - DEREGISTER_INSTANCE
    OperationStatus:
      type: string
      enum:
        - SUBMITTED
        - PENDING
        - SUCCESS
        - FAIL
    Message:
      type: string
    Code:
      type: string
    GetServiceResponse:
      type: object
      properties:
        Service:
