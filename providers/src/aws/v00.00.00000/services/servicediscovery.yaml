      type: object
      properties:
        Id:
          $ref: "#/components/schemas/OperationId"
          description: The ID for an operation.
        Status:
          $ref: "#/components/schemas/OperationStatus"
          description: "The status of the operation. Values include the following: SUBMITTED: This is the initial state immediately after you submit a request. PENDING: Cloud Map is performing the operation. SUCCESS: The operation succeeded. FAIL: The operation failed. For the failure reason, see ErrorMessage."
    ServiceFilters:
      type: array
      items:
        $ref: "#/components/schemas/ServiceFilter"
    ServiceFilter:
      description: A complex type that lets you specify the namespaces that you want to list services for.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ServiceFilterName"
          description: "Specify the services that you want to get using one of the following. NAMESPACE_ID: Gets the services associated with the specified namespace. RESOURCE_OWNER: Gets the services associated with the namespaces created by your Amazon Web Services account or by other accounts. This can be used to filter for services created in a shared namespace. For more information about shared namespaces, see Cross-account Cloud Map namespace sharing in the Cloud Map Developer Guide."
        Values:
          $ref: "#/components/schemas/FilterValues"
          description: "The values that are applicable to the value that you specify for Condition to filter the list of services. NAMESPACE_ID: Specify one namespace ID or ARN. Specify the namespace ARN for namespaces that are shared with your Amazon Web Services account. RESOURCE_OWNER: Specify one of SELF or OTHER_ACCOUNTS. SELF can be used to filter services associated with namespaces created by you and OTHER_ACCOUNTS can be used to filter services associated with namespaces that were shared with you."
        Condition:
          $ref: "#/components/schemas/FilterCondition"
          description: "The operator that you want to use to determine whether a service is returned by ListServices. Valid values for Condition include the following: EQ: When you specify EQ, specify one value. EQ is the default condition and can be omitted."
      required:
        - Name
        - Values
    ServiceFilterName:
      type: string
      enum:
        - NAMESPACE_ID
        - RESOURCE_OWNER
    ListServicesResponse:
      type: object
      properties:
        Services:
          $ref: "#/components/schemas/ServiceSummariesList"
          description: An array that contains one ServiceSummary object for each service that matches the specified filter criteria.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: If the response contains NextToken, submit another ListServices request to get the next group of results. Specify the value of NextToken from the previous response in the next request. Cloud Map gets MaxResults services and then filters them based on the specified criteria. It's possible that no services in the first MaxResults services matched the specified criteria but that subsequent groups of MaxResults services do contain services that match the criteria.
    ServiceSummariesList:
      type: array
      items:
        $ref: "#/components/schemas/ServiceSummary"
    ServiceSummary:
      description: A complex type that contains information about a specified service.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ResourceId"
          description: The ID that Cloud Map assigned to the service when you created it.
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that Cloud Map assigns to the service when you create it.
        ResourceOwner:
          $ref: "#/components/schemas/AWSAccountId"
          description: The ID of the Amazon Web Services account that created the namespace with which the service is associated. If this isn't your account ID, it is the ID of the account that shared the namespace with your account. For more information about shared namespaces, see Cross-account Cloud Map namespace sharing in the Cloud Map Developer Guide.
        Name:
          $ref: "#/components/schemas/ServiceName"
          description: The name of the service.
        Type:
          $ref: "#/components/schemas/ServiceType"
          description: Describes the systems that can be used to discover the service instances. DNS_HTTP The service instances can be discovered using either DNS queries or the DiscoverInstances API operation. HTTP The service instances can only be discovered using the DiscoverInstances API operation. DNS Reserved.
        Description:
          $ref: "#/components/schemas/ResourceDescription"
          description: The description that you specify when you create the service.
        InstanceCount:
          $ref: "#/components/schemas/ResourceCount"
          description: The number of instances that are currently associated with the service. Instances that were previously associated with the service but that are deleted aren't included in the count. The count might not reflect pending registrations and deregistrations.
        DnsConfig:
          $ref: "#/components/schemas/DnsConfig"
          description: Information about the Route 53 DNS records that you want Cloud Map to create when you register an instance.
        HealthCheckConfig:
          $ref: "#/components/schemas/HealthCheckConfig"
          description: Public DNS and HTTP namespaces only. Settings for an optional health check. If you specify settings for a health check, Cloud Map associates the health check with the records that you specify in DnsConfig.
        HealthCheckCustomConfig:
          $ref: "#/components/schemas/HealthCheckCustomConfig"
          description: "Information about an optional custom health check. A custom health check, which requires that you use a third-party health checker to evaluate the health of your resources, is useful in the following circumstances: You can't use a health check that's defined by HealthCheckConfig because the resource isn't available over the internet. For example, you can use a custom health check when the instance is in an Amazon VPC. (To check the health of resources in a VPC, the health checker must also be in the VPC.) You want to use a third-party health checker regardless of where your resources are located. If you specify a health check configuration, you can specify either HealthCheckCustomConfig or HealthCheckConfig but not both."
        CreateDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the service was created.
        CreatedByAccount:
          $ref: "#/components/schemas/AWSAccountId"
          description: The ID of the Amazon Web Services account that created the service. If this isn't your account ID, it is the account ID of the namespace owner or of another account with which the namespace has been shared. For more information about shared namespaces, see Cross-account Cloud Map namespace sharing in the Cloud Map Developer Guide.
