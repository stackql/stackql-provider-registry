        CreatorRequestId:
          $ref: "#/components/schemas/ResourceId"
          description: A unique string that identifies the request and that allows failed requests to be retried without the risk of running an operation twice.
    NamespaceType:
      type: string
      enum:
        - DNS_PUBLIC
        - DNS_PRIVATE
        - HTTP
    NamespaceProperties:
      description: A complex type that contains information that's specific to the namespace type.
      type: object
      properties:
