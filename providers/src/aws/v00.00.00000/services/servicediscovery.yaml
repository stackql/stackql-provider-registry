openapi: 3.0.0
info:
  version: "2017-03-14"
  title: AWS Cloud Map
  description: AWS Cloud Map
  x-serviceName: servicediscovery
  x-serviceAlias: servicediscovery
  x-protocol: json
  x-apiVersion: "2017-03-14"
  x-endpointPrefix: servicediscovery
  x-targetPrefix: Route53AutoNaming_v20170314
  x-jsonVersion: "1.1"
servers:
  - url: https://servicediscovery.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for servicediscovery
paths:
  /CreateHttpNamespace:
    post:
      operationId: CreateHttpNamespace
      description: Creates an HTTP namespace. Service instances registered using an HTTP namespace can be discovered using a DiscoverInstances request but can't be discovered using DNS. For the current quota on the number of namespaces that you can create using the same Amazon Web Services account, see Cloud Map quotas in the Cloud Map Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53AutoNaming_v20170314.CreateHttpNamespace
            default: Route53AutoNaming_v20170314.CreateHttpNamespace
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NamespaceNameHttp"
                  description: The name that you want to assign to this namespace.
                CreatorRequestId:
                  $ref: "#/components/schemas/ResourceId"
                  description: A unique string that identifies the request and that allows failed CreateHttpNamespace requests to be retried without the risk of running the operation twice. CreatorRequestId can be any unique string (for example, a date/time stamp).
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
                  description: A description for the namespace.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to add to the namespace. Each tag consists of a key and an optional value that you define. Tags keys can be up to 128 characters in length, and tag values can be up to 256 characters in length.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateHttpNamespaceResponse"
  /CreatePrivateDnsNamespace:
    post:
      operationId: CreatePrivateDnsNamespace
      description: Creates a private namespace based on DNS, which is visible only inside a specified Amazon VPC. The namespace defines your service naming scheme. For example, if you name your namespace example.com and name your service backend, the resulting DNS name for the service is backend.example.com. Service instances that are registered using a private DNS namespace can be discovered using either a DiscoverInstances request or using DNS. For the current quota on the number of namespaces that you can create using the same Amazon Web Services account, see Cloud Map quotas in the Cloud Map Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53AutoNaming_v20170314.CreatePrivateDnsNamespace
            default: Route53AutoNaming_v20170314.CreatePrivateDnsNamespace
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NamespaceNamePrivate"
                  description: The name that you want to assign to this namespace. When you create a private DNS namespace, Cloud Map automatically creates an Amazon Route 53 private hosted zone that has the same name as the namespace.
                CreatorRequestId:
                  $ref: "#/components/schemas/ResourceId"
                  description: A unique string that identifies the request and that allows failed CreatePrivateDnsNamespace requests to be retried without the risk of running the operation twice. CreatorRequestId can be any unique string (for example, a date/timestamp).
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
                  description: A description for the namespace.
                Vpc:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the Amazon VPC that you want to associate the namespace with.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to add to the namespace. Each tag consists of a key and an optional value that you define. Tags keys can be up to 128 characters in length, and tag values can be up to 256 characters in length.
                Properties:
                  $ref: "#/components/schemas/PrivateDnsNamespaceProperties"
                  description: Properties for the private DNS namespace.
              required:
                - Vpc
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePrivateDnsNamespaceResponse"
  /CreatePublicDnsNamespace:
    post:
      operationId: CreatePublicDnsNamespace
      description: Creates a public namespace based on DNS, which is visible on the internet. The namespace defines your service naming scheme. For example, if you name your namespace example.com and name your service backend, the resulting DNS name for the service is backend.example.com. You can discover instances that were registered with a public DNS namespace by using either a DiscoverInstances request or using DNS. For the current quota on the number of namespaces that you can create using the same Amazon Web Services account, see Cloud Map quotas in the Cloud Map Developer Guide. The CreatePublicDnsNamespace API operation is not supported in the Amazon Web Services GovCloud (US) Regions.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53AutoNaming_v20170314.CreatePublicDnsNamespace
            default: Route53AutoNaming_v20170314.CreatePublicDnsNamespace
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NamespaceNamePublic"
                  description: The name that you want to assign to this namespace. Do not include sensitive information in the name. The name is publicly available using DNS queries.
                CreatorRequestId:
                  $ref: "#/components/schemas/ResourceId"
                  description: A unique string that identifies the request and that allows failed CreatePublicDnsNamespace requests to be retried without the risk of running the operation twice. CreatorRequestId can be any unique string (for example, a date/timestamp).
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
                  description: A description for the namespace.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to add to the namespace. Each tag consists of a key and an optional value that you define. Tags keys can be up to 128 characters in length, and tag values can be up to 256 characters in length.
                Properties:
                  $ref: "#/components/schemas/PublicDnsNamespaceProperties"
                  description: Properties for the public DNS namespace.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePublicDnsNamespaceResponse"
  /CreateService:
    post:
      operationId: CreateService
      description: "Creates a service. This action defines the configuration for the following entities: For public and private DNS namespaces, one of the following combinations of DNS records in Amazon Route 53: A AAAA A and AAAA SRV CNAME Optionally, a health check After you create the service, you can submit a RegisterInstance request, and Cloud Map uses the values in the configuration to create the specified entities. For the current quota on the number of instances that you can register using the same namespace and using the same service, see Cloud Map quotas in the Cloud Map Developer Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53AutoNaming_v20170314.CreateService
            default: Route53AutoNaming_v20170314.CreateService
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ServiceName"
                  description: "The name that you want to assign to the service. Do not include sensitive information in the name if the namespace is discoverable by public DNS queries. If you want Cloud Map to create an SRV record when you register an instance and you're using a system that requires a specific SRV format, such as HAProxy, specify the following for Name: Start the name with an underscore (_), such as _exampleservice. End the name with ._protocol, such as ._tcp. When you register an instance, Cloud Map creates an SRV record and assigns a name to the record by concatenating the service name and the namespace name (for example, _exampleservice._tcp.example.com). For services that are accessible by DNS queries, you can't create multiple services with names that differ only by case (such as EXAMPLE and example). Otherwise, these services have the same DNS name and can't be distinguished. However, if you use a namespace that's only accessible by API calls, then you can create services that with names that differ only by case."
                NamespaceId:
                  $ref: "#/components/schemas/Arn"
                  description: The ID or Amazon Resource Name (ARN) of the namespace that you want to use to create the service. For namespaces shared with your Amazon Web Services account, specify the namespace ARN. For more information about shared namespaces, see Cross-account Cloud Map namespace sharing in the Cloud Map Developer Guide.
                CreatorRequestId:
                  $ref: "#/components/schemas/ResourceId"
                  description: A unique string that identifies the request and that allows failed CreateService requests to be retried without the risk of running the operation twice. CreatorRequestId can be any unique string (for example, a date/timestamp).
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
                  description: A description for the service.
                DnsConfig:
                  $ref: "#/components/schemas/DnsConfig"
                  description: A complex type that contains information about the Amazon Route 53 records that you want Cloud Map to create when you register an instance.
                HealthCheckConfig:
                  $ref: "#/components/schemas/HealthCheckConfig"
                  description: Public DNS and HTTP namespaces only. A complex type that contains settings for an optional Route 53 health check. If you specify settings for a health check, Cloud Map associates the health check with all the Route 53 DNS records that you specify in DnsConfig. If you specify a health check configuration, you can specify either HealthCheckCustomConfig or HealthCheckConfig but not both. For information about the charges for health checks, see Cloud Map Pricing.
                HealthCheckCustomConfig:
                  $ref: "#/components/schemas/HealthCheckCustomConfig"
                  description: A complex type that contains information about an optional custom health check. If you specify a health check configuration, you can specify either HealthCheckCustomConfig or HealthCheckConfig but not both. You can't add, update, or delete a HealthCheckCustomConfig configuration from an existing service.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to add to the service. Each tag consists of a key and an optional value that you define. Tags keys can be up to 128 characters in length, and tag values can be up to 256 characters in length.
                Type:
                  $ref: "#/components/schemas/ServiceTypeOption"
                  description: If present, specifies that the service instances are only discoverable using the DiscoverInstances API operation. No DNS records is registered for the service instances. The only valid value is HTTP.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServiceResponse"
  /DeleteNamespace:
    post:
      operationId: DeleteNamespace
      description: Deletes a namespace from the current account. If the namespace still contains one or more services, the request fails.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53AutoNaming_v20170314.DeleteNamespace
            default: Route53AutoNaming_v20170314.DeleteNamespace
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/Arn"
                  description: The ID or Amazon Resource Name (ARN) of the namespace that you want to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteNamespaceResponse"
  /DeleteService:
    post:
      operationId: DeleteService
      description: Deletes a specified service and all associated service attributes. If the service still contains one or more registered instances, the request fails.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53AutoNaming_v20170314.DeleteService
            default: Route53AutoNaming_v20170314.DeleteService
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/Arn"
                  description: The ID or Amazon Resource Name (ARN) of the service that you want to delete. If the namespace associated with the service is shared with your Amazon Web Services account, specify the service ARN. For more information about shared namespaces, see Cross-account Cloud Map namespace sharing.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteServiceResponse"
  /DeleteServiceAttributes:
    post:
      operationId: DeleteServiceAttributes
      description: Deletes specific attributes associated with a service.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53AutoNaming_v20170314.DeleteServiceAttributes
            default: Route53AutoNaming_v20170314.DeleteServiceAttributes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceId:
                  $ref: "#/components/schemas/Arn"
                  description: The ID or Amazon Resource Name (ARN) of the service from which the attributes will be deleted. For services created in a namespace shared with your Amazon Web Services account, specify the service ARN. For more information about shared namespaces, see Cross-account Cloud Map namespace sharing in the Cloud Map Developer Guide.
                Attributes:
                  $ref: "#/components/schemas/ServiceAttributeKeyList"
                  description: A list of keys corresponding to each attribute that you want to delete.
              required:
                - ServiceId
                - Attributes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteServiceAttributesResponse"
  /DeregisterInstance:
    post:
      operationId: DeregisterInstance
      description: Deletes the Amazon Route 53 DNS records and health check, if any, that Cloud Map created for the specified instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53AutoNaming_v20170314.DeregisterInstance
            default: Route53AutoNaming_v20170314.DeregisterInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceId:
                  $ref: "#/components/schemas/Arn"
                  description: The ID or Amazon Resource Name (ARN) of the service that the instance is associated with. If the namespace associated with the service is shared with your account, specify the service ARN. For more information about shared namespaces, see Cross-account Cloud Map namespace sharing in the Cloud Map Developer Guide.
                InstanceId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The value that you specified for Id in the RegisterInstance request.
              required:
                - ServiceId
                - InstanceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeregisterInstanceResponse"
  /DiscoverInstances:
    post:
      operationId: DiscoverInstances
      description: Discovers registered instances for a specified namespace and service. You can use DiscoverInstances to discover instances for any type of namespace. DiscoverInstances returns a randomized list of instances allowing customers to distribute traffic evenly across instances. For public and private DNS namespaces, you can also use DNS queries to discover instances.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53AutoNaming_v20170314.DiscoverInstances
            default: Route53AutoNaming_v20170314.DiscoverInstances
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NamespaceName:
                  $ref: "#/components/schemas/NamespaceName"
                  description: The HttpName name of the namespace. The HttpName is found in the HttpProperties member of the Properties member of the namespace. In most cases, Name and HttpName match. However, if you reuse Name for namespace creation, a generated hash is added to HttpName to distinguish the two.
                ServiceName:
                  $ref: "#/components/schemas/ServiceName"
                  description: The name of the service that you specified when you registered the instance.
                MaxResults:
                  $ref: "#/components/schemas/DiscoverMaxResults"
                  description: The maximum number of instances that you want Cloud Map to return in the response to a DiscoverInstances request. If you don't specify a value for MaxResults, Cloud Map returns up to 100 instances.
                QueryParameters:
                  $ref: "#/components/schemas/Attributes"
                  description: Filters to scope the results based on custom attributes for the instance (for example, {version=v1, az=1a}). Only instances that match all the specified key-value pairs are returned.
                OptionalParameters:
                  $ref: "#/components/schemas/Attributes"
                  description: Opportunistic filters to scope the results based on custom attributes. If there are instances that match both the filters specified in both the QueryParameters parameter and this parameter, all of these instances are returned. Otherwise, the filters are ignored, and only instances that match the filters that are specified in the QueryParameters parameter are returned.
                HealthStatus:
                  $ref: "#/components/schemas/HealthStatusFilter"
                  description: The health status of the instances that you want to discover. This parameter is ignored for services that don't have a health check configured, and all instances are returned. HEALTHY Returns healthy instances. UNHEALTHY Returns unhealthy instances. ALL Returns all instances. HEALTHY_OR_ELSE_ALL Returns healthy instances, unless none are reporting a healthy state. In that case, return all instances. This is also called failing open.
                OwnerAccount:
                  $ref: "#/components/schemas/AWSAccountId"
                  description: The ID of the Amazon Web Services account that owns the namespace associated with the instance, as specified in the namespace ResourceOwner field. For instances associated with namespaces that are shared with your account, you must specify an OwnerAccount.
              required:
                - NamespaceName
                - ServiceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverInstancesResponse"
  /DiscoverInstancesRevision:
    post:
      operationId: DiscoverInstancesRevision
      description: Discovers the increasing revision associated with an instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53AutoNaming_v20170314.DiscoverInstancesRevision
            default: Route53AutoNaming_v20170314.DiscoverInstancesRevision
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NamespaceName:
                  $ref: "#/components/schemas/NamespaceName"
                  description: The HttpName name of the namespace. The HttpName is found in the HttpProperties member of the Properties member of the namespace.
                ServiceName:
                  $ref: "#/components/schemas/ServiceName"
                  description: The name of the service that you specified when you registered the instance.
                OwnerAccount:
                  $ref: "#/components/schemas/AWSAccountId"
                  description: The ID of the Amazon Web Services account that owns the namespace associated with the instance, as specified in the namespace ResourceOwner field. For instances associated with namespaces that are shared with your account, you must specify an OwnerAccount. For more information about shared namespaces, see Cross-account Cloud Map namespace sharing in the Cloud Map Developer Guide.
              required:
                - NamespaceName
                - ServiceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverInstancesRevisionResponse"
  /GetInstance:
    post:
      operationId: GetInstance
      description: Gets information about a specified instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53AutoNaming_v20170314.GetInstance
            default: Route53AutoNaming_v20170314.GetInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceId:
                  $ref: "#/components/schemas/Arn"
                  description: The ID or Amazon Resource Name (ARN) of the service that the instance is associated with. For services created in a shared namespace, specify the service ARN. For more information about shared namespaces, see Cross-account Cloud Map namespace sharing in the Cloud Map Developer Guide.
                InstanceId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the instance that you want to get information about.
              required:
                - ServiceId
                - InstanceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInstanceResponse"
  /GetInstancesHealthStatus:
    post:
      operationId: GetInstancesHealthStatus
      description: Gets the current health status (Healthy, Unhealthy, or Unknown) of one or more instances that are associated with a specified service. There's a brief delay between when you register an instance and when the health status for the instance is available.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53AutoNaming_v20170314.GetInstancesHealthStatus
            default: Route53AutoNaming_v20170314.GetInstancesHealthStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceId:
                  $ref: "#/components/schemas/Arn"
                  description: The ID or Amazon Resource Name (ARN) of the service that the instance is associated with. For services created in a shared namespace, specify the service ARN. For more information about shared namespaces, see Cross-account Cloud Map namespace sharing in the Cloud Map Developer Guide.
                Instances:
                  $ref: "#/components/schemas/InstanceIdList"
                  description: An array that contains the IDs of all the instances that you want to get the health status for. If you omit Instances, Cloud Map returns the health status for all the instances that are associated with the specified service. To get the IDs for the instances that you've registered by using a specified service, submit a ListInstances request.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of instances that you want Cloud Map to return in the response to a GetInstancesHealthStatus request. If you don't specify a value for MaxResults, Cloud Map returns up to 100 instances.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: For the first GetInstancesHealthStatus request, omit this value. If more than MaxResults instances match the specified criteria, you can submit another GetInstancesHealthStatus request to get the next group of results. Specify the value of NextToken from the previous response in the next request.
              required:
                - ServiceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInstancesHealthStatusResponse"
  /GetNamespace:
    post:
      operationId: GetNamespace
      description: Gets information about a namespace.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53AutoNaming_v20170314.GetNamespace
            default: Route53AutoNaming_v20170314.GetNamespace
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/Arn"
                  description: The ID or Amazon Resource Name (ARN) of the namespace that you want to get information about. For namespaces shared with your Amazon Web Services account, specify the namespace ARN. For more information about shared namespaces, see Cross-account Cloud Map namespace sharing in the Cloud Map Developer Guide
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetNamespaceResponse"
  /GetOperation:
    post:
      operationId: GetOperation
      description: Gets information about any operation that returns an operation ID in the response, such as a CreateHttpNamespace request. To get a list of operations that match specified criteria, see ListOperations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53AutoNaming_v20170314.GetOperation
            default: Route53AutoNaming_v20170314.GetOperation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                OperationId:
                  $ref: "#/components/schemas/OperationId"
                  description: The ID of the operation that you want to get more information about.
                OwnerAccount:
                  $ref: "#/components/schemas/AWSAccountId"
                  description: The ID of the Amazon Web Services account that owns the namespace associated with the operation, as specified in the namespace ResourceOwner field. For operations associated with namespaces that are shared with your account, you must specify an OwnerAccount.
              required:
                - OperationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOperationResponse"
  /GetService:
    post:
      operationId: GetService
      description: Gets the settings for a specified service.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53AutoNaming_v20170314.GetService
            default: Route53AutoNaming_v20170314.GetService
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/Arn"
                  description: The ID or Amazon Resource Name (ARN) of the service that you want to get settings for. For services created by consumers in a shared namespace, specify the service ARN. For more information about shared namespaces, see Cross-account Cloud Map namespace sharing in the Cloud Map Developer Guide.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetServiceResponse"
  /GetServiceAttributes:
    post:
      operationId: GetServiceAttributes
      description: Returns the attributes associated with a specified service.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53AutoNaming_v20170314.GetServiceAttributes
            default: Route53AutoNaming_v20170314.GetServiceAttributes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceId:
                  $ref: "#/components/schemas/Arn"
                  description: The ID or Amazon Resource Name (ARN) of the service that you want to get attributes for. For services created in a namespace shared with your Amazon Web Services account, specify the service ARN. For more information about shared namespaces, see Cross-account Cloud Map namespace sharing in the Cloud Map Developer Guide.
              required:
                - ServiceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetServiceAttributesResponse"
  /ListInstances:
    post:
      operationId: ListInstances
      description: Lists summary information about the instances that you registered by using a specified service.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53AutoNaming_v20170314.ListInstances
