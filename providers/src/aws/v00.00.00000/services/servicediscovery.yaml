components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    NamespaceNameHttp:
      type: string
      maxLength: 1024
      pattern: ^(?!arn:)[!-~]{1,1024}$
    ResourceId:
      type: string
      maxLength: 64
    ResourceDescription:
      type: string
      maxLength: 1024
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A custom key-value pair that's associated with a resource.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key identifier, or name, of the tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The string value that's associated with the key of the tag. You can set the value of a tag to an empty string, but you can't set the value of a tag to null.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    CreateHttpNamespaceResponse:
      type: object
      properties:
        OperationId:
          $ref: "#/components/schemas/OperationId"
          description: A value that you can use to determine whether the request completed successfully. To get the status of the operation, see GetOperation.
    OperationId:
      type: string
      maxLength: 255
    NamespaceNamePrivate:
      type: string
      maxLength: 253
      pattern: ^(?!arn:)[!-~]{1,253}$
    PrivateDnsNamespaceProperties:
      description: DNS properties for the private DNS namespace.
      type: object
      properties:
        DnsProperties:
          $ref: "#/components/schemas/PrivateDnsPropertiesMutable"
          description: DNS properties for the private DNS namespace.
      required:
        - DnsProperties
    PrivateDnsPropertiesMutable:
      description: DNS properties for the private DNS namespace.
      type: object
      properties:
        SOA:
          $ref: "#/components/schemas/SOA"
          description: Fields for the Start of Authority (SOA) record for the hosted zone for the private DNS namespace.
      required:
        - SOA
    SOA:
      description: Start of Authority (SOA) properties for a public or private DNS namespace.
      type: object
      properties:
        TTL:
          $ref: "#/components/schemas/RecordTTL"
          description: The time to live (TTL) for purposes of negative caching.
      required:
        - TTL
    RecordTTL:
      type: integer
      format: int64
      minimum: 0
      maximum: 2147483647
    CreatePrivateDnsNamespaceResponse:
