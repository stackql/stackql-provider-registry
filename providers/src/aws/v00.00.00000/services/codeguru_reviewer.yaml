openapi: 3.0.0
info:
  version: "2019-09-19"
  title: Amazon CodeGuru Reviewer
  description: Amazon CodeGuru Reviewer
  x-serviceName: codeguru-reviewer
  x-serviceAlias: codeguru_reviewer
  x-protocol: rest-json
  x-apiVersion: "2019-09-19"
  x-endpointPrefix: codeguru-reviewer
  x-jsonVersion: "1.1"
servers:
  - url: https://codeguru-reviewer.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for codeguru-reviewer
paths:
  /associations:
    post:
      operationId: AssociateRepository
      description: Use to associate an Amazon Web Services CodeCommit repository or a repository managed by Amazon Web Services CodeStar Connections with Amazon CodeGuru Reviewer. When you associate a repository, CodeGuru Reviewer reviews source code changes in the repository's pull requests and provides automatic recommendations. You can view recommendations using the CodeGuru Reviewer console. For more information, see Recommendations in Amazon CodeGuru Reviewer in the Amazon CodeGuru Reviewer User Guide. If you associate a CodeCommit or S3 repository, it must be in the same Amazon Web Services Region and Amazon Web Services account where its CodeGuru Reviewer code reviews are configured. Bitbucket and GitHub Enterprise Server repositories are managed by Amazon Web Services CodeStar Connections to connect to CodeGuru Reviewer. For more information, see Associate a repository in the Amazon CodeGuru Reviewer User Guide. You cannot use the CodeGuru Reviewer SDK or the Amazon Web Services CLI to associate a GitHub repository with Amazon CodeGuru Reviewer. To associate a GitHub repository, use the console. For more information, see Getting started with CodeGuru Reviewer in the CodeGuru Reviewer User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Repository:
                  $ref: "#/components/schemas/Repository"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                KMSKeyDetails:
                  $ref: "#/components/schemas/KMSKeyDetails"
              required:
                - Repository
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateRepositoryResponse"
    get:
      operationId: ListRepositoryAssociations
      description: Returns a list of RepositoryAssociationSummary objects that contain summary information about a repository association. You can filter the returned list by ProviderType, Name, State, and Owner.
      parameters:
        - name: ProviderType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProviderTypes"
          description: List of provider types to use as a filter.
        - name: State
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RepositoryAssociationStates"
          description: "List of repository association states to use as a filter. The valid repository association states are: Associated: The repository association is complete. Associating: CodeGuru Reviewer is: Setting up pull request notifications. This is required for pull requests to trigger a CodeGuru Reviewer review. If your repository ProviderType is GitHub, GitHub Enterprise Server, or Bitbucket, CodeGuru Reviewer creates webhooks in your repository to trigger CodeGuru Reviewer reviews. If you delete these webhooks, reviews of code in your repository cannot be triggered. Setting up source code access. This is required for CodeGuru Reviewer to securely clone code in your repository. Failed: The repository failed to associate or disassociate. Disassociating: CodeGuru Reviewer is removing the repository's pull request notifications and source code access. Disassociated: CodeGuru Reviewer successfully disassociated the repository. You can create a new association with this repository if you want to review source code in it later. You can control access to code reviews created in anassociated repository with tags after it has been disassociated. For more information, see Using tags to control access to associated repositories in the Amazon CodeGuru Reviewer User Guide."
        - name: Name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Names"
          description: List of repository names to use as a filter.
        - name: Owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Owners"
          description: List of owners to use as a filter. For Amazon Web Services CodeCommit, it is the name of the CodeCommit account that was used to associate the repository. For other repository source providers, such as Bitbucket and GitHub Enterprise Server, this is name of the account that was used to associate the repository.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of repository association results returned by ListRepositoryAssociations in paginated output. When this parameter is used, ListRepositoryAssociations only returns maxResults results in a single page with a nextToken response element. The remaining results of the initial request can be seen by sending another ListRepositoryAssociations request with the returned nextToken value. This value can be between 1 and 100. If this parameter is not used, ListRepositoryAssociations returns up to 100 results and a nextToken value if applicable.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The nextToken value returned from a previous paginated ListRepositoryAssociations request where maxResults was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value. Treat this token as an opaque identifier that is only used to retrieve the next items in a list and not for other programmatic purposes.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRepositoryAssociationsResponse"
  /codereviews:
    post:
      operationId: CreateCodeReview
      description: Use to create a code review with a CodeReviewType of RepositoryAnalysis. This type of code review analyzes all code under a specified branch in an associated repository. PullRequest code reviews are automatically triggered by a pull request.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/CodeReviewName"
                RepositoryAssociationArn:
                  $ref: "#/components/schemas/AssociationArn"
                Type:
                  $ref: "#/components/schemas/CodeReviewType"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - Name
                - RepositoryAssociationArn
                - Type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCodeReviewResponse"
    get:
      operationId: ListCodeReviews
      description: Lists all the code reviews that the customer has created in the past 90 days.
      parameters:
        - name: ProviderTypes
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProviderTypes"
          description: List of provider types for filtering that needs to be applied before displaying the result. For example, providerTypes=[GitHub] lists code reviews from GitHub.
        - name: States
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JobStates"
          description: "List of states for filtering that needs to be applied before displaying the result. For example, states=[Pending] lists code reviews in the Pending state. The valid code review states are: Completed: The code review is complete. Pending: The code review started and has not completed or failed. Failed: The code review failed. Deleting: The code review is being deleted."
        - name: RepositoryNames
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RepositoryNames"
          description: List of repository names for filtering that needs to be applied before displaying the result.
        - name: Type
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Type"
          description: The type of code reviews to list in the response.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListCodeReviewsMaxResults"
          description: The maximum number of results that are returned per call. The default is 100.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If nextToken is returned, there are more results available. The value of nextToken is a unique pagination token for each page. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCodeReviewsResponse"
  /codereviews/{code_review_arn}:
    get:
      operationId: DescribeCodeReview
      description: Returns the metadata associated with the code review along with its status.
      parameters:
        - name: code_review_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the CodeReview object.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeCodeReviewResponse"
  /feedback/{code_review_arn}:
    get:
      operationId: DescribeRecommendationFeedback
      description: Describes the customer feedback for a CodeGuru Reviewer recommendation.
      parameters:
        - name: code_review_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the CodeReview object.
        - name: RecommendationId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RecommendationId"
          description: The recommendation ID that can be used to track the provided recommendations and then to collect the feedback.
        - name: UserId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserId"
          description: Optional parameter to describe the feedback for a given user. If this is not supplied, it defaults to the user making the request. The UserId is an IAM principal that can be specified as an Amazon Web Services account ID or an Amazon Resource Name (ARN). For more information, see Specifying a Principal in the Amazon Web Services Identity and Access Management User Guide.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeRecommendationFeedbackResponse"
  /associations/{association_arn}:
    get:
      operationId: DescribeRepositoryAssociation
      description: Returns a RepositoryAssociation object that contains information about the requested repository association.
      parameters:
        - name: association_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssociationArn"
          description: The Amazon Resource Name (ARN) of the RepositoryAssociation object. You can retrieve this ARN by calling ListRepositoryAssociations.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeRepositoryAssociationResponse"
    delete:
      operationId: DisassociateRepository
      description: Removes the association between Amazon CodeGuru Reviewer and a repository.
      parameters:
        - name: association_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssociationArn"
          description: The Amazon Resource Name (ARN) of the RepositoryAssociation object. You can retrieve this ARN by calling ListRepositoryAssociations.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateRepositoryResponse"
  /feedback/{code_review_arn}/RecommendationFeedback:
    get:
      operationId: ListRecommendationFeedback
      description: Returns a list of RecommendationFeedbackSummary objects that contain customer recommendation feedback for all CodeGuru Reviewer users.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If nextToken is returned, there are more results available. The value of nextToken is a unique pagination token for each page. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that are returned per call. The default is 100.
        - name: code_review_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the CodeReview object.
        - name: UserIds
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserIds"
          description: An Amazon Web Services user's account ID or Amazon Resource Name (ARN). Use this ID to query the recommendation feedback for a code review from that user. The UserId is an IAM principal that can be specified as an Amazon Web Services account ID or an Amazon Resource Name (ARN). For more information, see Specifying a Principal in the Amazon Web Services Identity and Access Management User Guide.
        - name: RecommendationIds
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationIds"
          description: Used to query the recommendation feedback for a given recommendation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecommendationFeedbackResponse"
  /codereviews/{code_review_arn}/Recommendations:
    get:
      operationId: ListRecommendations
      description: Returns the list of all recommendations for a completed code review.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Pagination token.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRecommendationsMaxResults"
          description: The maximum number of results that are returned per call. The default is 100.
        - name: code_review_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the CodeReview object.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecommendationsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns the list of tags associated with an associated repository resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssociationArn"
          description: The Amazon Resource Name (ARN) of the RepositoryAssociation object. You can retrieve this ARN by calling ListRepositoryAssociations.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds one or more tags to an associated repository.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssociationArn"
          description: The Amazon Resource Name (ARN) of the RepositoryAssociation object. You can retrieve this ARN by calling ListRepositoryAssociations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes a tag from an associated repository.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssociationArn"
          description: The Amazon Resource Name (ARN) of the RepositoryAssociation object. You can retrieve this ARN by calling ListRepositoryAssociations.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: A list of the keys for each tag you want to remove from an associated repository.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /feedback:
    put:
      operationId: PutRecommendationFeedback
      description: Stores customer feedback for a CodeGuru Reviewer recommendation. When this API is called again with different reactions the previous feedback is overwritten.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CodeReviewArn:
                  $ref: "#/components/schemas/Arn"
                RecommendationId:
                  $ref: "#/components/schemas/RecommendationId"
                Reactions:
                  $ref: "#/components/schemas/Reactions"
              required:
                - CodeReviewArn
                - RecommendationId
                - Reactions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutRecommendationFeedbackResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Repository:
      description: Information about an associated Amazon Web Services CodeCommit repository or an associated repository that is managed by Amazon Web Services CodeStar Connections (for example, Bitbucket). This Repository object is not used if your source code is in an associated GitHub repository.
      type: object
      properties:
        CodeCommit:
          $ref: "#/components/schemas/CodeCommitRepository"
          description: Information about an Amazon Web Services CodeCommit repository.
        Bitbucket:
          $ref: "#/components/schemas/ThirdPartySourceRepository"
          description: Information about a Bitbucket repository.
        GitHubEnterpriseServer:
          $ref: "#/components/schemas/ThirdPartySourceRepository"
          description: Information about a GitHub Enterprise Server repository.
        S3Bucket:
          $ref: "#/components/schemas/S3Repository"
    CodeCommitRepository:
      description: Information about an Amazon Web Services CodeCommit repository. The CodeCommit repository must be in the same Amazon Web Services Region and Amazon Web Services account where its CodeGuru Reviewer code reviews are configured.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/Name"
          description: The name of the Amazon Web Services CodeCommit repository. For more information, see repositoryName in the Amazon Web Services CodeCommit API Reference.
      required:
        - Name
    Name:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^\S[\w.-]*$
    ThirdPartySourceRepository:
      description: Information about a third-party source repository connected to CodeGuru Reviewer.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/Name"
          description: The name of the third party source repository.
        ConnectionArn:
          $ref: "#/components/schemas/ConnectionArn"
          description: The Amazon Resource Name (ARN) of an Amazon Web Services CodeStar Connections connection. Its format is arn:aws:codestar-connections:region-id:aws-account_id:connection/connection-id. For more information, see Connection in the Amazon Web Services CodeStar Connections API Reference.
        Owner:
          $ref: "#/components/schemas/Owner"
          description: The owner of the repository. For a GitHub, GitHub Enterprise, or Bitbucket repository, this is the username for the account that owns the repository. For an S3 repository, this can be the username or Amazon Web Services account ID
      required:
        - Name
        - ConnectionArn
        - Owner
    ConnectionArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws(-[\w]+)*:.+:.+:[0-9]{12}:.+
    Owner:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^\S(.*\S)?$
    S3Repository:
      description: Information about a repository in an S3 bucket.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/Name"
          description: The name of the repository in the S3 bucket.
        BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of the S3 bucket used for associating a new S3 repository. It must begin with codeguru-reviewer-.
      required:
        - Name
        - BucketName
    S3BucketName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: ^\S(.*\S)?$
    ClientRequestToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[\w-]+$
    TagMap:
      type: object
      properties: {}
    KMSKeyDetails:
      description: "An object that contains: The encryption option for a repository association. It is either owned by Amazon Web Services Key Management Service (KMS) (AWS_OWNED_CMK) or customer managed (CUSTOMER_MANAGED_CMK). The ID of the Amazon Web Services KMS key that is associated with a repository association."
      type: object
      properties:
        KMSKeyId:
          $ref: "#/components/schemas/KMSKeyId"
          description: The ID of the Amazon Web Services KMS key that is associated with a repository association.
        EncryptionOption:
          $ref: "#/components/schemas/EncryptionOption"
          description: The encryption option for a repository association. It is either owned by Amazon Web Services Key Management Service (KMS) (AWS_OWNED_CMK) or customer managed (CUSTOMER_MANAGED_CMK).
    KMSKeyId:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[a-zA-Z0-9-]+"
    EncryptionOption:
      type: string
      enum:
        - AWS_OWNED_CMK
        - CUSTOMER_MANAGED_CMK
    AssociateRepositoryResponse:
      type: object
      properties:
        RepositoryAssociation:
          $ref: "#/components/schemas/RepositoryAssociation"
          description: Information about the repository association.
        Tags:
          type: object
          properties: {}
          description: "An array of key-value pairs used to tag an associated repository. A tag is a custom attribute label with two parts: A tag key (for example, CostCenter, Environment, Project, or Secret). Tag keys are case sensitive. An optional field known as a tag value (for example, 111122223333, Production, or a team name). Omitting the tag value is the same as using an empty string. Like tag keys, tag values are case sensitive."
    RepositoryAssociation:
      description: Information about a repository association. The DescribeRepositoryAssociation operation returns a RepositoryAssociation object.
      type: object
      properties:
        AssociationId:
          $ref: "#/components/schemas/AssociationId"
          description: The ID of the repository association.
        AssociationArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) identifying the repository association.
        ConnectionArn:
          $ref: "#/components/schemas/ConnectionArn"
          description: The Amazon Resource Name (ARN) of an Amazon Web Services CodeStar Connections connection. Its format is arn:aws:codestar-connections:region-id:aws-account_id:connection/connection-id. For more information, see Connection in the Amazon Web Services CodeStar Connections API Reference.
        Name:
          $ref: "#/components/schemas/Name"
          description: The name of the repository.
        Owner:
          $ref: "#/components/schemas/Owner"
          description: The owner of the repository. For an Amazon Web Services CodeCommit repository, this is the Amazon Web Services account ID of the account that owns the repository. For a GitHub, GitHub Enterprise Server, or Bitbucket repository, this is the username for the account that owns the repository. For an S3 repository, it can be the username or Amazon Web Services account ID.
        ProviderType:
          $ref: "#/components/schemas/ProviderType"
          description: The provider type of the repository association.
        State:
          $ref: "#/components/schemas/RepositoryAssociationState"
          description: "The state of the repository association. The valid repository association states are: Associated: The repository association is complete. Associating: CodeGuru Reviewer is: Setting up pull request notifications. This is required for pull requests to trigger a CodeGuru Reviewer review. If your repository ProviderType is GitHub, GitHub Enterprise Server, or Bitbucket, CodeGuru Reviewer creates webhooks in your repository to trigger CodeGuru Reviewer reviews. If you delete these webhooks, reviews of code in your repository cannot be triggered. Setting up source code access. This is required for CodeGuru Reviewer to securely clone code in your repository. Failed: The repository failed to associate or disassociate. Disassociating: CodeGuru Reviewer is removing the repository's pull request notifications and source code access. Disassociated: CodeGuru Reviewer successfully disassociated the repository. You can create a new association with this repository if you want to review source code in it later. You can control access to code reviews created in anassociated repository with tags after it has been disassociated. For more information, see Using tags to control access to associated repositories in the Amazon CodeGuru Reviewer User Guide."
        StateReason:
          $ref: "#/components/schemas/StateReason"
          description: A description of why the repository association is in the current state.
        LastUpdatedTimeStamp:
          $ref: "#/components/schemas/TimeStamp"
          description: The time, in milliseconds since the epoch, when the repository association was last updated.
        CreatedTimeStamp:
          $ref: "#/components/schemas/TimeStamp"
          description: The time, in milliseconds since the epoch, when the repository association was created.
        KMSKeyDetails:
          $ref: "#/components/schemas/KMSKeyDetails"
          description: "A KMSKeyDetails object that contains: The encryption option for this repository association. It is either owned by Amazon Web Services Key Management Service (KMS) (AWS_OWNED_CMK) or customer managed (CUSTOMER_MANAGED_CMK). The ID of the Amazon Web Services KMS key that is associated with this repository association."
        S3RepositoryDetails:
          $ref: "#/components/schemas/S3RepositoryDetails"
    AssociationId:
      type: string
      minLength: 1
      maxLength: 64
    Arn:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: ^arn:aws[^:\s]*:codeguru-reviewer:[^:\s]+:[\d]{12}:[a-z-]+:[\w-]+$
    ProviderType:
      type: string
      enum:
        - CodeCommit
        - GitHub
        - Bitbucket
        - GitHubEnterpriseServer
        - S3Bucket
    RepositoryAssociationState:
      type: string
      enum:
        - Associated
        - Associating
        - Failed
        - Disassociating
        - Disassociated
    StateReason:
      type: string
      minLength: 0
      maxLength: 256
    TimeStamp:
      type: string
      format: date-time
    S3RepositoryDetails:
      description: Specifies the name of an S3 bucket and a CodeArtifacts object that contains the S3 object keys for a source code .zip file and for a build artifacts .zip file that contains .jar or .class files.
      type: object
      properties:
        BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of the S3 bucket used for associating a new S3 repository. It must begin with codeguru-reviewer-.
        CodeArtifacts:
          $ref: "#/components/schemas/CodeArtifacts"
          description: A CodeArtifacts object. The CodeArtifacts object includes the S3 object key for a source code .zip file and for a build artifacts .zip file that contains .jar or .class files.
    CodeArtifacts:
      description: Code artifacts are source code artifacts and build artifacts used in a repository analysis or a pull request review. Source code artifacts are source code files in a Git repository that are compressed into a .zip file. Build artifacts are .jar or .class files that are compressed in a .zip file.
      type: object
      properties:
        SourceCodeArtifactsObjectKey:
          $ref: "#/components/schemas/SourceCodeArtifactsObjectKey"
          description: The S3 object key for a source code .zip file. This is required for all code reviews.
        BuildArtifactsObjectKey:
          $ref: "#/components/schemas/BuildArtifactsObjectKey"
          description: The S3 object key for a build artifacts .zip file that contains .jar or .class files. This is required for a code review with security analysis. For more information, see Create code reviews with GitHub Actions in the Amazon CodeGuru Reviewer User Guide.
      required:
        - SourceCodeArtifactsObjectKey
    SourceCodeArtifactsObjectKey:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^\S(.*\S)?$
    BuildArtifactsObjectKey:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^\S(.*\S)?$
    CodeReviewName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9-_]*"
    AssociationArn:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: ^arn:aws[^:\s]*:codeguru-reviewer:[^:\s]+:[\d]{12}:association:[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$
    CodeReviewType:
      description: "The type of a code review. There are two code review types: PullRequest - A code review that is automatically triggered by a pull request on an associated repository. RepositoryAnalysis - A code review that analyzes all code under a specified branch in an associated repository. The associated repository is specified using its ARN in CreateCodeReview."
      type: object
      properties:
        RepositoryAnalysis:
          $ref: "#/components/schemas/RepositoryAnalysis"
          description: A code review that analyzes all code under a specified branch in an associated repository. The associated repository is specified using its ARN in CreateCodeReview.
        AnalysisTypes:
          $ref: "#/components/schemas/AnalysisTypes"
          description: They types of analysis performed during a repository analysis or a pull request review. You can specify either Security, CodeQuality, or both.
      required:
        - RepositoryAnalysis
    RepositoryAnalysis:
      description: A code review type that analyzes all code under a specified branch in an associated repository. The associated repository is specified using its ARN when you call CreateCodeReview.
      type: object
      properties:
        RepositoryHead:
          $ref: "#/components/schemas/RepositoryHeadSourceCodeType"
          description: A SourceCodeType that specifies the tip of a branch in an associated repository.
        SourceCodeType:
          $ref: "#/components/schemas/SourceCodeType"
    RepositoryHeadSourceCodeType:
      description: A SourceCodeType that specifies the tip of a branch in an associated repository.
      type: object
      properties:
        BranchName:
          $ref: "#/components/schemas/BranchName"
          description: The name of the branch in an associated repository. The RepositoryHeadSourceCodeType specifies the tip of this branch.
      required:
        - BranchName
    BranchName:
      type: string
      minLength: 1
      maxLength: 256
    SourceCodeType:
      description: Specifies the source code that is analyzed in a code review.
      type: object
      properties:
        CommitDiff:
          $ref: "#/components/schemas/CommitDiffSourceCodeType"
          description: A SourceCodeType that specifies a commit diff created by a pull request on an associated repository.
        RepositoryHead:
          $ref: "#/components/schemas/RepositoryHeadSourceCodeType"
        BranchDiff:
          $ref: "#/components/schemas/BranchDiffSourceCodeType"
          description: A type of SourceCodeType that specifies a source branch name and a destination branch name in an associated repository.
        S3BucketRepository:
          $ref: "#/components/schemas/S3BucketRepository"
          description: Information about an associated repository in an S3 bucket that includes its name and an S3RepositoryDetails object. The S3RepositoryDetails object includes the name of an S3 bucket, an S3 key for a source code .zip file, and an S3 key for a build artifacts .zip file. S3BucketRepository is required in SourceCodeType for S3BucketRepository based code reviews.
        RequestMetadata:
          $ref: "#/components/schemas/RequestMetadata"
          description: Metadata that is associated with a code review. This applies to any type of code review supported by CodeGuru Reviewer. The RequestMetadaa field captures any event metadata. For example, it might capture metadata associated with an event trigger, such as a push or a pull request.
    CommitDiffSourceCodeType:
      description: A type of SourceCodeType that specifies the commit diff for a pull request on an associated repository. The SourceCommit and DestinationCommit fields are required to do a pull request code review.
      type: object
      properties:
        SourceCommit:
          $ref: "#/components/schemas/CommitId"
          description: The SHA of the source commit used to generate a commit diff. This field is required for a pull request code review.
        DestinationCommit:
          $ref: "#/components/schemas/CommitId"
          description: The SHA of the destination commit used to generate a commit diff. This field is required for a pull request code review.
        MergeBaseCommit:
          $ref: "#/components/schemas/CommitId"
          description: The SHA of the merge base of a commit.
    CommitId:
      type: string
      minLength: 6
      maxLength: 64
    BranchDiffSourceCodeType:
      description: A type of SourceCodeType that specifies a code diff between a source and destination branch in an associated repository.
      type: object
      properties:
        SourceBranchName:
          $ref: "#/components/schemas/BranchName"
          description: The source branch for a diff in an associated repository.
        DestinationBranchName:
          $ref: "#/components/schemas/BranchName"
          description: The destination branch for a diff in an associated repository.
      required:
        - SourceBranchName
        - DestinationBranchName
    S3BucketRepository:
      description: Information about an associated repository in an S3 bucket. The associated repository contains a source code .zip file and a build artifacts .zip file that contains .jar or .class files.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/Name"
          description: The name of the repository when the ProviderType is S3Bucket.
        Details:
          $ref: "#/components/schemas/S3RepositoryDetails"
          description: An S3RepositoryDetails object that specifies the name of an S3 bucket and a CodeArtifacts object. The CodeArtifacts object includes the S3 object keys for a source code .zip file and for a build artifacts .zip file.
      required:
        - Name
    RequestMetadata:
      description: Metadata that is associated with a code review. This applies to both pull request and repository analysis code reviews.
      type: object
      properties:
        RequestId:
          $ref: "#/components/schemas/RequestId"
          description: The ID of the request. This is required for a pull request code review.
        Requester:
          $ref: "#/components/schemas/Requester"
          description: An identifier, such as a name or account ID, that is associated with the requester. The Requester is used to capture the author/actor name of the event request.
        EventInfo:
          $ref: "#/components/schemas/EventInfo"
          description: Information about the event associated with a code review.
        VendorName:
          $ref: "#/components/schemas/VendorName"
          description: The name of the repository vendor used to upload code to an S3 bucket for a CI/CD code review. For example, if code and artifacts are uploaded to an S3 bucket for a CI/CD code review by GitHub scripts from a GitHub repository, then the repository association's ProviderType is S3Bucket and the CI/CD repository vendor name is GitHub. For more information, see the definition for ProviderType in RepositoryAssociation.
    RequestId:
      type: string
      minLength: 1
      maxLength: 64
    Requester:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^\S(.*\S)?$
    EventInfo:
      description: Information about an event. The event might be a push, pull request, scheduled request, or another type of event.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EventName"
          description: The name of the event. The possible names are pull_request, workflow_dispatch, schedule, and push
        State:
          $ref: "#/components/schemas/EventState"
          description: The state of an event. The state might be open, closed, or another state.
    EventName:
      type: string
      minLength: 1
      maxLength: 32
      pattern: ^[ \-A-Z_a-z]+$
    EventState:
      type: string
      minLength: 1
      maxLength: 32
      pattern: ^[ \-A-Z_a-z]+$
    VendorName:
      type: string
      enum:
        - GitHub
        - GitLab
        - NativeS3
    AnalysisTypes:
      type: array
      items:
        $ref: "#/components/schemas/AnalysisType"
    AnalysisType:
      type: string
      enum:
        - Security
        - CodeQuality
    CreateCodeReviewResponse:
      type: object
      properties:
        CodeReview:
          $ref: "#/components/schemas/CodeReview"
    CodeReview:
      description: Information about a code review. A code review belongs to the associated repository that contains the reviewed code.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/Name"
          description: The name of the code review.
        CodeReviewArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the CodeReview object.
        RepositoryName:
          $ref: "#/components/schemas/Name"
          description: The name of the repository.
        Owner:
          $ref: "#/components/schemas/Owner"
          description: The owner of the repository. For an Amazon Web Services CodeCommit repository, this is the Amazon Web Services account ID of the account that owns the repository. For a GitHub, GitHub Enterprise Server, or Bitbucket repository, this is the username for the account that owns the repository. For an S3 repository, it can be the username or Amazon Web Services account ID.
        ProviderType:
          $ref: "#/components/schemas/ProviderType"
          description: The type of repository that contains the reviewed code (for example, GitHub or Bitbucket).
        State:
          $ref: "#/components/schemas/JobState"
          description: "The valid code review states are: Completed: The code review is complete. Pending: The code review started and has not completed or failed. Failed: The code review failed. Deleting: The code review is being deleted."
        StateReason:
          $ref: "#/components/schemas/StateReason"
          description: The reason for the state of the code review.
        CreatedTimeStamp:
          $ref: "#/components/schemas/TimeStamp"
          description: The time, in milliseconds since the epoch, when the code review was created.
        LastUpdatedTimeStamp:
          $ref: "#/components/schemas/TimeStamp"
          description: The time, in milliseconds since the epoch, when the code review was last updated.
        Type:
          $ref: "#/components/schemas/Type"
          description: The type of code review.
        PullRequestId:
          $ref: "#/components/schemas/PullRequestId"
          description: The pull request ID for the code review.
        SourceCodeType:
          $ref: "#/components/schemas/SourceCodeType"
          description: The type of the source code for the code review.
        AssociationArn:
          $ref: "#/components/schemas/AssociationArn"
          description: The Amazon Resource Name (ARN) of the RepositoryAssociation that contains the reviewed source code. You can retrieve associated repository ARNs by calling ListRepositoryAssociations.
        Metrics:
          $ref: "#/components/schemas/Metrics"
          description: The statistics from the code review.
        AnalysisTypes:
          $ref: "#/components/schemas/AnalysisTypes"
          description: The types of analysis performed during a repository analysis or a pull request review. You can specify either Security, CodeQuality, or both.
        ConfigFileState:
          $ref: "#/components/schemas/ConfigFileState"
          description: The state of the aws-codeguru-reviewer.yml configuration file that allows the configuration of the CodeGuru Reviewer analysis. The file either exists, doesn't exist, or exists with errors at the root directory of your repository.
    JobState:
      type: string
      enum:
        - Completed
        - Pending
        - Failed
        - Deleting
    Type:
      type: string
      enum:
        - PullRequest
        - RepositoryAnalysis
    PullRequestId:
      type: string
      minLength: 1
      maxLength: 64
    Metrics:
      description: Information about the statistics from the code review.
      type: object
      properties:
        MeteredLinesOfCodeCount:
          $ref: "#/components/schemas/LinesOfCodeCount"
          description: MeteredLinesOfCodeCount is the number of lines of code in the repository where the code review happened. This does not include non-code lines such as comments and blank lines.
        SuppressedLinesOfCodeCount:
          $ref: "#/components/schemas/LinesOfCodeCount"
          description: SuppressedLinesOfCodeCount is the number of lines of code in the repository where the code review happened that CodeGuru Reviewer did not analyze. The lines suppressed in the analysis is based on the excludeFiles variable in the aws-codeguru-reviewer.yml file. This number does not include non-code lines such as comments and blank lines.
        FindingsCount:
          $ref: "#/components/schemas/FindingsCount"
          description: Total number of recommendations found in the code review.
    LinesOfCodeCount:
      type: integer
      format: int64
    FindingsCount:
      type: integer
      format: int64
    ConfigFileState:
      type: string
      enum:
        - Present
        - Absent
        - PresentWithErrors
    DescribeCodeReviewResponse:
      type: object
      properties:
        CodeReview:
          $ref: "#/components/schemas/CodeReview"
          description: Information about the code review.
    RecommendationId:
      type: string
      minLength: 1
      maxLength: 64
    UserId:
      type: string
      minLength: 1
      maxLength: 256
    DescribeRecommendationFeedbackResponse:
      type: object
      properties:
        RecommendationFeedback:
          $ref: "#/components/schemas/RecommendationFeedback"
          description: The recommendation feedback given by the user.
    RecommendationFeedback:
      description: Information about the recommendation feedback.
      type: object
      properties:
        CodeReviewArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the CodeReview object.
        RecommendationId:
          $ref: "#/components/schemas/RecommendationId"
          description: The recommendation ID that can be used to track the provided recommendations. Later on it can be used to collect the feedback.
        Reactions:
          $ref: "#/components/schemas/Reactions"
          description: List for storing reactions. Reactions are utf-8 text code for emojis. You can send an empty list to clear off all your feedback.
        UserId:
          $ref: "#/components/schemas/UserId"
          description: The ID of the user that made the API call. The UserId is an IAM principal that can be specified as an Amazon Web Services account ID or an Amazon Resource Name (ARN). For more information, see Specifying a Principal in the Amazon Web Services Identity and Access Management User Guide.
        CreatedTimeStamp:
          $ref: "#/components/schemas/TimeStamp"
          description: The time at which the feedback was created.
        LastUpdatedTimeStamp:
          $ref: "#/components/schemas/TimeStamp"
          description: The time at which the feedback was last updated.
    Reactions:
      type: array
      items:
        $ref: "#/components/schemas/Reaction"
    Reaction:
      type: string
      enum:
        - ThumbsUp
        - ThumbsDown
    DescribeRepositoryAssociationResponse:
      type: object
      properties:
        RepositoryAssociation:
          $ref: "#/components/schemas/RepositoryAssociation"
          description: Information about the repository association.
        Tags:
          type: object
          properties: {}
          description: "An array of key-value pairs used to tag an associated repository. A tag is a custom attribute label with two parts: A tag key (for example, CostCenter, Environment, Project, or Secret). Tag keys are case sensitive. An optional field known as a tag value (for example, 111122223333, Production, or a team name). Omitting the tag value is the same as using an empty string. Like tag keys, tag values are case sensitive."
    DisassociateRepositoryResponse:
      type: object
      properties:
        RepositoryAssociation:
          $ref: "#/components/schemas/RepositoryAssociation"
          description: Information about the disassociated repository.
        Tags:
          type: object
          properties: {}
          description: "An array of key-value pairs used to tag an associated repository. A tag is a custom attribute label with two parts: A tag key (for example, CostCenter, Environment, Project, or Secret). Tag keys are case sensitive. An optional field known as a tag value (for example, 111122223333, Production, or a team name). Omitting the tag value is the same as using an empty string. Like tag keys, tag values are case sensitive."
    ProviderTypes:
      type: array
      items:
        $ref: "#/components/schemas/ProviderType"
    JobStates:
      type: array
      items:
        $ref: "#/components/schemas/JobState"
    RepositoryNames:
      type: array
      items:
        $ref: "#/components/schemas/Name"
    ListCodeReviewsMaxResults:
      type: integer
      minimum: 1
      maximum: 100
    NextToken:
      type: string
      minLength: 1
      maxLength: 2048
    ListCodeReviewsResponse:
      type: object
      properties:
        CodeReviewSummaries:
          $ref: "#/components/schemas/CodeReviewSummaries"
          description: A list of code reviews that meet the criteria of the request.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: Pagination token.
    CodeReviewSummaries:
      type: array
      items:
        $ref: "#/components/schemas/CodeReviewSummary"
    CodeReviewSummary:
      description: Information about the summary of the code review.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/Name"
          description: The name of the code review.
        CodeReviewArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the CodeReview object.
        RepositoryName:
          $ref: "#/components/schemas/Name"
          description: The name of the repository.
        Owner:
          $ref: "#/components/schemas/Owner"
          description: The owner of the repository. For an Amazon Web Services CodeCommit repository, this is the Amazon Web Services account ID of the account that owns the repository. For a GitHub, GitHub Enterprise Server, or Bitbucket repository, this is the username for the account that owns the repository. For an S3 repository, it can be the username or Amazon Web Services account ID.
        ProviderType:
          $ref: "#/components/schemas/ProviderType"
          description: The provider type of the repository association.
        State:
          $ref: "#/components/schemas/JobState"
          description: "The state of the code review. The valid code review states are: Completed: The code review is complete. Pending: The code review started and has not completed or failed. Failed: The code review failed. Deleting: The code review is being deleted."
        CreatedTimeStamp:
          $ref: "#/components/schemas/TimeStamp"
          description: The time, in milliseconds since the epoch, when the code review was created.
        LastUpdatedTimeStamp:
          $ref: "#/components/schemas/TimeStamp"
          description: The time, in milliseconds since the epoch, when the code review was last updated.
        Type:
          $ref: "#/components/schemas/Type"
          description: The type of the code review.
        PullRequestId:
          $ref: "#/components/schemas/PullRequestId"
          description: The pull request ID for the code review.
        MetricsSummary:
          $ref: "#/components/schemas/MetricsSummary"
          description: The statistics from the code review.
        SourceCodeType:
          $ref: "#/components/schemas/SourceCodeType"
    MetricsSummary:
      description: Information about metrics summaries.
      type: object
      properties:
        MeteredLinesOfCodeCount:
          $ref: "#/components/schemas/LinesOfCodeCount"
          description: Lines of code metered in the code review. For the initial code review pull request and all subsequent revisions, this includes all lines of code in the files added to the pull request. In subsequent revisions, for files that already existed in the pull request, this includes only the changed lines of code. In both cases, this does not include non-code lines such as comments and import statements. For example, if you submit a pull request containing 5 files, each with 500 lines of code, and in a subsequent revision you added a new file with 200 lines of code, and also modified a total of 25 lines across the initial 5 files, MeteredLinesOfCodeCount includes the first 5 files (5 * 500 = 2,500 lines), the new file (200 lines) and the 25 changed lines of code for a total of 2,725 lines of code.
        SuppressedLinesOfCodeCount:
          $ref: "#/components/schemas/LinesOfCodeCount"
          description: Lines of code suppressed in the code review based on the excludeFiles element in the aws-codeguru-reviewer.yml file. For full repository analyses, this number includes all lines of code in the files that are suppressed. For pull requests, this number only includes the changed lines of code that are suppressed. In both cases, this number does not include non-code lines such as comments and import statements. For example, if you initiate a full repository analysis on a repository containing 5 files, each file with 100 lines of code, and 2 files are listed as excluded in the aws-codeguru-reviewer.yml file, then SuppressedLinesOfCodeCount returns 200 (2 * 100) as the total number of lines of code suppressed. However, if you submit a pull request for the same repository, then SuppressedLinesOfCodeCount only includes the lines in the 2 files that changed. If only 1 of the 2 files changed in the pull request, then SuppressedLinesOfCodeCount returns 100 (1 * 100) as the total number of lines of code suppressed.
        FindingsCount:
          $ref: "#/components/schemas/FindingsCount"
          description: Total number of recommendations found in the code review.
    MaxResults:
      type: integer
      minimum: 1
      maximum: 100
    UserIds:
      type: array
      items:
        $ref: "#/components/schemas/UserId"
    RecommendationIds:
      type: array
      items:
        $ref: "#/components/schemas/RecommendationId"
    ListRecommendationFeedbackResponse:
      type: object
      properties:
        RecommendationFeedbackSummaries:
          $ref: "#/components/schemas/RecommendationFeedbackSummaries"
          description: Recommendation feedback summaries corresponding to the code review ARN.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: If nextToken is returned, there are more results available. The value of nextToken is a unique pagination token for each page. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged.
    RecommendationFeedbackSummaries:
      type: array
      items:
        $ref: "#/components/schemas/RecommendationFeedbackSummary"
    RecommendationFeedbackSummary:
      description: Information about recommendation feedback summaries.
      type: object
      properties:
        RecommendationId:
          $ref: "#/components/schemas/RecommendationId"
          description: The recommendation ID that can be used to track the provided recommendations. Later on it can be used to collect the feedback.
        Reactions:
          $ref: "#/components/schemas/Reactions"
          description: List for storing reactions. Reactions are utf-8 text code for emojis.
        UserId:
          $ref: "#/components/schemas/UserId"
          description: The ID of the user that gave the feedback. The UserId is an IAM principal that can be specified as an Amazon Web Services account ID or an Amazon Resource Name (ARN). For more information, see Specifying a Principal in the Amazon Web Services Identity and Access Management User Guide.
    ListRecommendationsMaxResults:
      type: integer
      minimum: 1
      maximum: 300
    ListRecommendationsResponse:
      type: object
      properties:
        RecommendationSummaries:
          $ref: "#/components/schemas/RecommendationSummaries"
          description: List of recommendations for the requested code review.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: Pagination token.
    RecommendationSummaries:
      type: array
      items:
        $ref: "#/components/schemas/RecommendationSummary"
    RecommendationSummary:
      description: Information about recommendations.
      type: object
      properties:
        FilePath:
          $ref: "#/components/schemas/FilePath"
          description: Name of the file on which a recommendation is provided.
        RecommendationId:
          $ref: "#/components/schemas/RecommendationId"
          description: The recommendation ID that can be used to track the provided recommendations. Later on it can be used to collect the feedback.
        StartLine:
          $ref: "#/components/schemas/LineNumber"
          description: Start line from where the recommendation is applicable in the source commit or source branch.
        EndLine:
          $ref: "#/components/schemas/LineNumber"
          description: Last line where the recommendation is applicable in the source commit or source branch. For a single line comment the start line and end line values are the same.
        Description:
          $ref: "#/components/schemas/Text"
          description: A description of the recommendation generated by CodeGuru Reviewer for the lines of code between the start line and the end line.
        RecommendationCategory:
          $ref: "#/components/schemas/RecommendationCategory"
          description: The type of a recommendation.
        RuleMetadata:
          $ref: "#/components/schemas/RuleMetadata"
          description: Metadata about a rule. Rule metadata includes an ID, a name, a list of tags, and a short and long description. CodeGuru Reviewer uses rules to analyze code. A rule's recommendation is included in analysis results if code is detected that violates the rule.
        Severity:
          $ref: "#/components/schemas/Severity"
          description: The severity of the issue in the code that generated this recommendation.
    FilePath:
      type: string
      minLength: 1
      maxLength: 1024
    LineNumber:
      type: integer
    Text:
      type: string
      minLength: 1
      maxLength: 5000
    RecommendationCategory:
      type: string
      enum:
        - AWSBestPractices
        - AWSCloudFormationIssues
        - DuplicateCode
        - CodeMaintenanceIssues
        - ConcurrencyIssues
        - InputValidations
        - PythonBestPractices
        - JavaBestPractices
        - ResourceLeaks
        - SecurityIssues
        - CodeInconsistencies
    RuleMetadata:
      description: Metadata about a rule. Rule metadata includes an ID, a name, a list of tags, and a short and long description. CodeGuru Reviewer uses rules to analyze code. A rule's recommendation is included in analysis results if code is detected that violates the rule.
      type: object
      properties:
        RuleId:
          $ref: "#/components/schemas/RuleId"
          description: The ID of the rule.
        RuleName:
          $ref: "#/components/schemas/RuleName"
          description: The name of the rule.
        ShortDescription:
          $ref: "#/components/schemas/ShortDescription"
          description: A short description of the rule.
        LongDescription:
          $ref: "#/components/schemas/LongDescription"
          description: A long description of the rule.
        RuleTags:
          $ref: "#/components/schemas/RuleTags"
          description: Tags that are associated with the rule.
    RuleId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^\S+\/[a-zA-Z0-9-]+@v\d+\.\d+$
    RuleName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^\S(.*\S)?$
    ShortDescription:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^\S(.*\S)?$
    LongDescription:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: ^\S(.*\S)?$
    RuleTags:
      type: array
      items:
        $ref: "#/components/schemas/RuleTag"
    RuleTag:
      type: string
      minLength: 1
      maxLength: 50
      pattern: ^\S(.*\S)?$
    Severity:
      type: string
      enum:
        - Info
        - Low
        - Medium
        - High
        - Critical
    RepositoryAssociationStates:
      type: array
      items:
        $ref: "#/components/schemas/RepositoryAssociationState"
    Names:
      type: array
      items:
        $ref: "#/components/schemas/Name"
    Owners:
      type: array
      items:
        $ref: "#/components/schemas/Owner"
    ListRepositoryAssociationsResponse:
      type: object
      properties:
        RepositoryAssociationSummaries:
          $ref: "#/components/schemas/RepositoryAssociationSummaries"
          description: A list of repository associations that meet the criteria of the request.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The nextToken value to include in a future ListRecommendations request. When the results of a ListRecommendations request exceed maxResults, this value can be used to retrieve the next page of results. This value is null when there are no more results to return.
    RepositoryAssociationSummaries:
      type: array
      items:
        $ref: "#/components/schemas/RepositoryAssociationSummary"
    RepositoryAssociationSummary:
      description: Summary information about a repository association. The ListRepositoryAssociations operation returns a list of RepositoryAssociationSummary objects.
      type: object
      properties:
        AssociationArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the RepositoryAssociation object. You can retrieve this ARN by calling ListRepositoryAssociations.
        ConnectionArn:
          $ref: "#/components/schemas/ConnectionArn"
          description: The Amazon Resource Name (ARN) of an Amazon Web Services CodeStar Connections connection. Its format is arn:aws:codestar-connections:region-id:aws-account_id:connection/connection-id. For more information, see Connection in the Amazon Web Services CodeStar Connections API Reference.
        LastUpdatedTimeStamp:
          $ref: "#/components/schemas/TimeStamp"
          description: The time, in milliseconds since the epoch, since the repository association was last updated.
        AssociationId:
          $ref: "#/components/schemas/AssociationId"
          description: The repository association ID.
        Name:
          $ref: "#/components/schemas/Name"
          description: The name of the repository association.
        Owner:
          $ref: "#/components/schemas/Owner"
          description: The owner of the repository. For an Amazon Web Services CodeCommit repository, this is the Amazon Web Services account ID of the account that owns the repository. For a GitHub, GitHub Enterprise Server, or Bitbucket repository, this is the username for the account that owns the repository. For an S3 repository, it can be the username or Amazon Web Services account ID.
        ProviderType:
          $ref: "#/components/schemas/ProviderType"
          description: The provider type of the repository association.
        State:
          $ref: "#/components/schemas/RepositoryAssociationState"
          description: "The state of the repository association. The valid repository association states are: Associated: The repository association is complete. Associating: CodeGuru Reviewer is: Setting up pull request notifications. This is required for pull requests to trigger a CodeGuru Reviewer review. If your repository ProviderType is GitHub, GitHub Enterprise Server, or Bitbucket, CodeGuru Reviewer creates webhooks in your repository to trigger CodeGuru Reviewer reviews. If you delete these webhooks, reviews of code in your repository cannot be triggered. Setting up source code access. This is required for CodeGuru Reviewer to securely clone code in your repository. Failed: The repository failed to associate or disassociate. Disassociating: CodeGuru Reviewer is removing the repository's pull request notifications and source code access. Disassociated: CodeGuru Reviewer successfully disassociated the repository. You can create a new association with this repository if you want to review source code in it later. You can control access to code reviews created in anassociated repository with tags after it has been disassociated. For more information, see Using tags to control access to associated repositories in the Amazon CodeGuru Reviewer User Guide."
    ListTagsForResourceResponse:
      type: object
      properties:
        Tags:
          type: object
          properties: {}
          description: "An array of key-value pairs used to tag an associated repository. A tag is a custom attribute label with two parts: A tag key (for example, CostCenter, Environment, Project, or Secret). Tag keys are case sensitive. An optional field known as a tag value (for example, 111122223333, Production, or a team name). Omitting the tag value is the same as using an empty string. Like tag keys, tag values are case sensitive."
