openapi: 3.0.0
info:
  version: "2019-06-28"
  title: AWS Savings Plans
  description: AWS Savings Plans
  x-serviceName: savingsplans
  x-serviceAlias: savingsplans
  x-protocol: rest-json
  x-apiVersion: "2019-06-28"
  x-endpointPrefix: savingsplans
  x-jsonVersion: "1.0"
servers:
  - url: https://savingsplans.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Global endpoint for savingsplans
paths:
  /CreateSavingsPlan:
    post:
      operationId: CreateSavingsPlan
      description: Creates a Savings Plan.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                savingsPlanOfferingId:
                  $ref: "#/components/schemas/SavingsPlanOfferingId"
                commitment:
                  $ref: "#/components/schemas/Amount"
                upfrontPaymentAmount:
                  $ref: "#/components/schemas/Amount"
                purchaseTime:
                  $ref: "#/components/schemas/DateTime"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - savingsPlanOfferingId
                - commitment
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSavingsPlanResponse"
  /DeleteQueuedSavingsPlan:
    post:
      operationId: DeleteQueuedSavingsPlan
      description: Deletes the queued purchase for the specified Savings Plan.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                savingsPlanId:
                  $ref: "#/components/schemas/SavingsPlanId"
              required:
                - savingsPlanId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteQueuedSavingsPlanResponse"
  /DescribeSavingsPlanRates:
    post:
      operationId: DescribeSavingsPlanRates
      description: Describes the rates for a specific, existing Savings Plan.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                savingsPlanId:
                  $ref: "#/components/schemas/SavingsPlanId"
                filters:
                  $ref: "#/components/schemas/SavingsPlanRateFilterList"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
              required:
                - savingsPlanId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSavingsPlanRatesResponse"
  /DescribeSavingsPlans:
    post:
      operationId: DescribeSavingsPlans
      description: Describes the specified Savings Plans.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                savingsPlanArns:
                  $ref: "#/components/schemas/SavingsPlanArnList"
                savingsPlanIds:
                  $ref: "#/components/schemas/SavingsPlanIdList"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                states:
                  $ref: "#/components/schemas/SavingsPlanStateList"
                filters:
                  $ref: "#/components/schemas/SavingsPlanFilterList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSavingsPlansResponse"
  /DescribeSavingsPlansOfferingRates:
    post:
      operationId: DescribeSavingsPlansOfferingRates
      description: Describes the offering rates for Savings Plans you might want to purchase.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                savingsPlanOfferingIds:
                  $ref: "#/components/schemas/UUIDs"
                savingsPlanPaymentOptions:
                  $ref: "#/components/schemas/SavingsPlanPaymentOptionList"
                savingsPlanTypes:
                  $ref: "#/components/schemas/SavingsPlanTypeList"
                products:
                  $ref: "#/components/schemas/SavingsPlanProductTypeList"
                serviceCodes:
                  $ref: "#/components/schemas/SavingsPlanRateServiceCodeList"
                usageTypes:
                  $ref: "#/components/schemas/SavingsPlanRateUsageTypeList"
                operations:
                  $ref: "#/components/schemas/SavingsPlanRateOperationList"
                filters:
                  $ref: "#/components/schemas/SavingsPlanOfferingRateFiltersList"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/PageSize"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSavingsPlansOfferingRatesResponse"
  /DescribeSavingsPlansOfferings:
    post:
      operationId: DescribeSavingsPlansOfferings
      description: Describes the offerings for the specified Savings Plans.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                offeringIds:
                  $ref: "#/components/schemas/UUIDs"
                paymentOptions:
                  $ref: "#/components/schemas/SavingsPlanPaymentOptionList"
                productType:
                  $ref: "#/components/schemas/SavingsPlanProductType"
                planTypes:
                  $ref: "#/components/schemas/SavingsPlanTypeList"
                durations:
                  $ref: "#/components/schemas/DurationsList"
                currencies:
                  $ref: "#/components/schemas/CurrencyList"
                descriptions:
                  $ref: "#/components/schemas/SavingsPlanDescriptionsList"
                serviceCodes:
                  $ref: "#/components/schemas/SavingsPlanServiceCodeList"
                usageTypes:
                  $ref: "#/components/schemas/SavingsPlanUsageTypeList"
                operations:
                  $ref: "#/components/schemas/SavingsPlanOperationList"
                filters:
                  $ref: "#/components/schemas/SavingsPlanOfferingFiltersList"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/PageSize"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSavingsPlansOfferingsResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists the tags for the specified resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/SavingsPlanArn"
              required:
                - resourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /ReturnSavingsPlan:
    post:
      operationId: ReturnSavingsPlan
      description: Returns the specified Savings Plan.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                savingsPlanId:
                  $ref: "#/components/schemas/SavingsPlanId"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - savingsPlanId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReturnSavingsPlanResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds the specified tags to the specified resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/SavingsPlanArn"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - resourceArn
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes the specified tags from the specified resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/SavingsPlanArn"
                tagKeys:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - resourceArn
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    SavingsPlanOfferingId:
      type: string
    Amount:
      type: string
    DateTime:
      type: string
      format: date-time
    ClientToken:
      type: string
    TagMap:
      type: object
      properties: {}
    CreateSavingsPlanResponse:
      type: object
      properties:
        savingsPlanId:
          $ref: "#/components/schemas/SavingsPlanId"
          description: The ID of the Savings Plan.
    SavingsPlanId:
      type: string
    DeleteQueuedSavingsPlanResponse:
      type: object
    SavingsPlanRateFilterList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanRateFilter"
    SavingsPlanRateFilter:
      description: Information about a Savings Plan rate filter.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/SavingsPlanRateFilterName"
          description: The filter name.
        values:
          $ref: "#/components/schemas/ListOfStrings"
          description: The filter values.
    SavingsPlanRateFilterName:
      type: string
      enum:
        - region
        - instanceType
        - productDescription
        - tenancy
        - productType
        - serviceCode
        - usageType
        - operation
    ListOfStrings:
      type: array
      items:
        $ref: "#/components/schemas/String"
    String:
      type: string
    PaginationToken:
      type: string
      maxLength: 1024
      pattern: ^[A-Za-z0-9/=\+]+$
    MaxResults:
      type: integer
      minimum: 1
      maximum: 1000
    DescribeSavingsPlanRatesResponse:
      type: object
      properties:
        savingsPlanId:
          $ref: "#/components/schemas/SavingsPlanId"
          description: The ID of the Savings Plan.
        searchResults:
          $ref: "#/components/schemas/SavingsPlanRateList"
          description: Information about the Savings Plan rates.
        nextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: The token to use to retrieve the next page of results. This value is null when there are no more results to return.
    SavingsPlanRateList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanRate"
    SavingsPlanRate:
      description: Information about a Savings Plan rate.
      type: object
      properties:
        rate:
          $ref: "#/components/schemas/Amount"
          description: The rate.
        currency:
          $ref: "#/components/schemas/CurrencyCode"
          description: The currency.
        unit:
          $ref: "#/components/schemas/SavingsPlanRateUnit"
          description: The unit.
        productType:
          $ref: "#/components/schemas/SavingsPlanProductType"
          description: The product type.
        serviceCode:
          $ref: "#/components/schemas/SavingsPlanRateServiceCode"
          description: The service.
        usageType:
          $ref: "#/components/schemas/SavingsPlanRateUsageType"
          description: The usage details of the line item in the billing report.
        operation:
          $ref: "#/components/schemas/SavingsPlanRateOperation"
          description: The specific Amazon Web Services operation for the line item in the billing report.
        properties_:
          $ref: "#/components/schemas/SavingsPlanRatePropertyList"
          description: The properties.
    CurrencyCode:
      type: string
      enum:
        - CNY
        - USD
        - EUR
    SavingsPlanRateUnit:
      type: string
      enum:
        - Hrs
        - Lambda-GB-Second
        - Request
        - ACU-Hr
        - ReadRequestUnits
        - WriteRequestUnits
        - ReadCapacityUnit-Hrs
        - WriteCapacityUnit-Hrs
        - ReplicatedWriteRequestUnits
        - ReplicatedWriteCapacityUnit-Hrs
        - GB-Hours
        - DPU
        - ElastiCacheProcessingUnit
        - DCU-Hr
        - NCU-hr
        - OCU-hours
        - Jobs
    SavingsPlanProductType:
      type: string
      enum:
        - EC2
        - Fargate
        - Lambda
        - SageMaker
        - RDS
        - DSQL
        - DynamoDB
        - ElastiCache
        - DocDB
        - Neptune
        - Timestream
        - Keyspaces
        - DMS
        - OpenSearch
    SavingsPlanRateServiceCode:
      type: string
      enum:
        - AmazonEC2
        - AmazonECS
        - AmazonEKS
        - AWSLambda
        - AmazonSageMaker
        - AmazonRDS
        - AuroraDSQL
        - AmazonDynamoDB
        - AmazonElastiCache
        - AmazonDocDB
        - AmazonNeptune
        - AmazonTimestream
        - AmazonMCS
        - AWSDatabaseMigrationSvc
        - AmazonES
    SavingsPlanRateUsageType:
      type: string
      maxLength: 255
      pattern: ^[a-zA-Z0-9_ \/.:-]+$
    SavingsPlanRateOperation:
      type: string
      maxLength: 255
      pattern: ^[a-zA-Z0-9_ \/.:-]*$
    SavingsPlanRatePropertyList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanRateProperty"
    SavingsPlanRateProperty:
      description: Information about a Savings Plan rate property.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/SavingsPlanRatePropertyKey"
          description: The property name.
        value:
          $ref: "#/components/schemas/JsonSafeFilterValueString"
          description: The property value.
    SavingsPlanRatePropertyKey:
      type: string
      enum:
        - region
        - instanceType
        - instanceFamily
        - productDescription
        - tenancy
    JsonSafeFilterValueString:
      type: string
      pattern: ^[a-zA-Z0-9_ \/.\:\-\(\)]+$
    SavingsPlanArnList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanArn"
    SavingsPlanArn:
      type: string
      pattern: arn:aws:[a-z]+:([a-z]{2}-[a-z]+-\d{1}|):(\d{12}):savingsplan\/([0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12})$
    SavingsPlanIdList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanId"
    SavingsPlanStateList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanState"
    SavingsPlanState:
      type: string
      enum:
        - payment-pending
        - payment-failed
        - active
        - retired
        - queued
        - queued-deleted
        - pending-return
        - returned
    SavingsPlanFilterList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanFilter"
    SavingsPlanFilter:
      description: Information about a Savings Plan filter.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/SavingsPlansFilterName"
          description: The filter name.
        values:
          $ref: "#/components/schemas/ListOfStrings"
          description: The filter value.
    SavingsPlansFilterName:
      type: string
      enum:
        - region
        - ec2-instance-family
        - commitment
        - upfront
        - term
        - savings-plan-type
        - payment-option
        - start
        - end
        - instance-family
    DescribeSavingsPlansResponse:
      type: object
      properties:
        savingsPlans:
          $ref: "#/components/schemas/SavingsPlanList"
          description: Information about the Savings Plans.
        nextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: The token to use to retrieve the next page of results. This value is null when there are no more results to return.
    SavingsPlanList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlan"
    SavingsPlan:
      description: Information about a Savings Plan.
      type: object
      properties:
        offeringId:
          $ref: "#/components/schemas/SavingsPlanOfferingId"
          description: The ID of the offering.
        savingsPlanId:
          $ref: "#/components/schemas/SavingsPlanId"
          description: The ID of the Savings Plan.
        savingsPlanArn:
          $ref: "#/components/schemas/SavingsPlanArn"
          description: The Amazon Resource Name (ARN) of the Savings Plan.
        description:
          $ref: "#/components/schemas/String"
          description: The description.
        start:
          $ref: "#/components/schemas/String"
          description: The start time.
        end:
          $ref: "#/components/schemas/String"
          description: The end time.
        state:
          $ref: "#/components/schemas/SavingsPlanState"
          description: The current state.
        region:
          $ref: "#/components/schemas/Region"
          description: The Amazon Web Services Region.
        ec2InstanceFamily:
          $ref: "#/components/schemas/EC2InstanceFamily"
          description: The EC2 instance family.
        savingsPlanType:
          $ref: "#/components/schemas/SavingsPlanType"
          description: The plan type.
        paymentOption:
          $ref: "#/components/schemas/SavingsPlanPaymentOption"
          description: The payment option.
        productTypes:
          $ref: "#/components/schemas/SavingsPlanProductTypeList"
          description: The product types.
        currency:
          $ref: "#/components/schemas/CurrencyCode"
          description: The currency.
        commitment:
          $ref: "#/components/schemas/Amount"
          description: The hourly commitment amount in the specified currency.
        upfrontPaymentAmount:
          $ref: "#/components/schemas/Amount"
          description: The up-front payment amount.
        recurringPaymentAmount:
          $ref: "#/components/schemas/Amount"
          description: The recurring payment amount.
        termDurationInSeconds:
          $ref: "#/components/schemas/TermDurationInSeconds"
          description: The duration of the term, in seconds.
        tags:
          type: object
          properties: {}
          description: One or more tags.
        returnableUntil:
          $ref: "#/components/schemas/String"
          description: The time until when a return for the Savings Plan can be requested. If the Savings Plan is not returnable, the field reflects the Savings Plans start time.
    Region:
      type: string
    EC2InstanceFamily:
      type: string
    SavingsPlanType:
      type: string
      enum:
        - Compute
        - EC2Instance
        - SageMaker
        - Database
    SavingsPlanPaymentOption:
      type: string
      enum:
        - All Upfront
        - Partial Upfront
        - No Upfront
    SavingsPlanProductTypeList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanProductType"
    TermDurationInSeconds:
      type: integer
      format: int64
    UUIDs:
      type: array
      items:
        $ref: "#/components/schemas/UUID"
    UUID:
      type: string
      pattern: "[a-f0-9]+(-[a-f0-9]+)*"
    SavingsPlanPaymentOptionList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanPaymentOption"
    SavingsPlanTypeList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanType"
    SavingsPlanRateServiceCodeList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanRateServiceCode"
    SavingsPlanRateUsageTypeList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanRateUsageType"
    SavingsPlanRateOperationList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanRateOperation"
    SavingsPlanOfferingRateFiltersList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanOfferingRateFilterElement"
    SavingsPlanOfferingRateFilterElement:
      description: Information about a Savings Plan offering rate filter.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/SavingsPlanRateFilterAttribute"
          description: The filter name.
        values:
          $ref: "#/components/schemas/FilterValuesList"
          description: The filter values.
    SavingsPlanRateFilterAttribute:
      type: string
      enum:
        - region
        - instanceFamily
        - instanceType
        - productDescription
        - tenancy
        - productId
    FilterValuesList:
      type: array
      items:
        $ref: "#/components/schemas/JsonSafeFilterValueString"
    PageSize:
      type: integer
      minimum: 0
      maximum: 1000
    DescribeSavingsPlansOfferingRatesResponse:
      type: object
      properties:
        searchResults:
          $ref: "#/components/schemas/SavingsPlanOfferingRatesList"
          description: Information about the Savings Plans offering rates.
        nextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: The token to use to retrieve the next page of results. This value is null when there are no more results to return.
    SavingsPlanOfferingRatesList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanOfferingRate"
    SavingsPlanOfferingRate:
      description: Information about a Savings Plan offering rate.
      type: object
      properties:
        savingsPlanOffering:
          $ref: "#/components/schemas/ParentSavingsPlanOffering"
          description: The Savings Plan offering.
        rate:
          $ref: "#/components/schemas/SavingsPlanRatePricePerUnit"
          description: The Savings Plan rate.
        unit:
          $ref: "#/components/schemas/SavingsPlanRateUnit"
          description: The unit.
        productType:
          $ref: "#/components/schemas/SavingsPlanProductType"
          description: The product type.
        serviceCode:
          $ref: "#/components/schemas/SavingsPlanRateServiceCode"
          description: The service.
        usageType:
          $ref: "#/components/schemas/SavingsPlanRateUsageType"
          description: The usage details of the line item in the billing report.
        operation:
          $ref: "#/components/schemas/SavingsPlanRateOperation"
          description: The specific Amazon Web Services operation for the line item in the billing report.
        properties_:
          $ref: "#/components/schemas/SavingsPlanOfferingRatePropertyList"
          description: The properties.
    ParentSavingsPlanOffering:
      description: Information about a Savings Plan offering.
      type: object
      properties:
        offeringId:
          $ref: "#/components/schemas/UUID"
          description: The ID of the offering.
        paymentOption:
          $ref: "#/components/schemas/SavingsPlanPaymentOption"
          description: The payment option.
        planType:
          $ref: "#/components/schemas/SavingsPlanType"
          description: The plan type.
        durationSeconds:
          $ref: "#/components/schemas/SavingsPlansDuration"
          description: The duration, in seconds.
        currency:
          $ref: "#/components/schemas/CurrencyCode"
          description: The currency.
        planDescription:
          $ref: "#/components/schemas/SavingsPlanDescription"
          description: The description.
    SavingsPlansDuration:
      type: integer
      format: int64
      minimum: 0
    SavingsPlanDescription:
      type: string
      pattern: ^[a-zA-Z0-9_\- ]+$
    SavingsPlanRatePricePerUnit:
      type: string
    SavingsPlanOfferingRatePropertyList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanOfferingRateProperty"
    SavingsPlanOfferingRateProperty:
      description: Information about a Savings Plan offering rate property.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/JsonSafeFilterValueString"
          description: The property name.
        value:
          $ref: "#/components/schemas/JsonSafeFilterValueString"
          description: The property value.
    DurationsList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlansDuration"
    CurrencyList:
      type: array
      items:
        $ref: "#/components/schemas/CurrencyCode"
    SavingsPlanDescriptionsList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanDescription"
    SavingsPlanServiceCodeList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanServiceCode"
    SavingsPlanServiceCode:
      type: string
      maxLength: 255
      pattern: ^[a-zA-Z]+$
    SavingsPlanUsageTypeList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanUsageType"
    SavingsPlanUsageType:
      type: string
      maxLength: 255
      pattern: ^[a-zA-Z0-9_ \/.:-]+$
    SavingsPlanOperationList:
      type: array
      items:
        $ref: "#/components/schemas/SavingsPlanOperation"
    SavingsPlanOperation:
      type: string
      maxLength: 255
      pattern: ^[a-zA-Z0-9_ \/.:-]*$
