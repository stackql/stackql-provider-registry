openapi: 3.0.0
info:
  version: "2017-10-11"
  title: AWS Chatbot
  description: AWS Chatbot
  x-serviceName: chatbot
  x-serviceAlias: chatbot
  x-protocol: rest-json
  x-apiVersion: "2017-10-11"
  x-endpointPrefix: chatbot
servers:
  - url: https://chatbot.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for chatbot
paths:
  /associate-to-configuration:
    post:
      operationId: AssociateToConfiguration
      description: Links a resource (for example, a custom action) to a channel configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Resource:
                  $ref: "#/components/schemas/ResourceIdentifier"
                ChatConfiguration:
                  $ref: "#/components/schemas/ChatConfigurationArn"
              required:
                - Resource
                - ChatConfiguration
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateToConfigurationResult"
  /create-chime-webhook-configuration:
    post:
      operationId: CreateChimeWebhookConfiguration
      description: Creates an AWS Chatbot configuration for Amazon Chime.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                WebhookDescription:
                  $ref: "#/components/schemas/ChimeWebhookDescription"
                WebhookUrl:
                  $ref: "#/components/schemas/ChimeWebhookUrl"
                SnsTopicArns:
                  $ref: "#/components/schemas/SnsTopicArnList"
                IamRoleArn:
                  $ref: "#/components/schemas/Arn"
                ConfigurationName:
                  $ref: "#/components/schemas/ConfigurationName"
                LoggingLevel:
                  $ref: "#/components/schemas/CustomerCwLogLevel"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - WebhookDescription
                - WebhookUrl
                - SnsTopicArns
                - IamRoleArn
                - ConfigurationName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChimeWebhookConfigurationResult"
  /create-custom-action:
    post:
      operationId: CreateCustomAction
      description: Creates a custom action that can be invoked as an alias or as a button on a notification.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Definition:
                  $ref: "#/components/schemas/CustomActionDefinition"
                AliasName:
                  $ref: "#/components/schemas/CustomActionAliasName"
                Attachments:
                  $ref: "#/components/schemas/CustomActionAttachmentList"
                Tags:
                  $ref: "#/components/schemas/TagList"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                ActionName:
                  $ref: "#/components/schemas/CustomActionName"
              required:
                - Definition
                - ActionName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCustomActionResult"
  /create-ms-teams-channel-configuration:
    post:
      operationId: CreateMicrosoftTeamsChannelConfiguration
      description: Creates an AWS Chatbot configuration for Microsoft Teams.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChannelId:
                  $ref: "#/components/schemas/TeamsChannelId"
                ChannelName:
                  $ref: "#/components/schemas/TeamsChannelName"
                TeamId:
                  $ref: "#/components/schemas/UUID"
                TeamName:
                  $ref: "#/components/schemas/TeamName"
                TenantId:
                  $ref: "#/components/schemas/UUID"
                SnsTopicArns:
                  $ref: "#/components/schemas/SnsTopicArnList"
                IamRoleArn:
                  $ref: "#/components/schemas/Arn"
                ConfigurationName:
                  $ref: "#/components/schemas/ConfigurationName"
                LoggingLevel:
                  $ref: "#/components/schemas/CustomerCwLogLevel"
                GuardrailPolicyArns:
                  $ref: "#/components/schemas/GuardrailPolicyArnList"
                UserAuthorizationRequired:
                  $ref: "#/components/schemas/BooleanAccountPreference"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - ChannelId
                - TeamId
                - TenantId
                - IamRoleArn
                - ConfigurationName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTeamsChannelConfigurationResult"
  /create-slack-channel-configuration:
    post:
      operationId: CreateSlackChannelConfiguration
      description: Creates an AWS Chatbot confugration for Slack.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SlackTeamId:
                  $ref: "#/components/schemas/SlackTeamId"
                SlackChannelId:
                  $ref: "#/components/schemas/SlackChannelId"
                SlackChannelName:
                  $ref: "#/components/schemas/SlackChannelDisplayName"
                SnsTopicArns:
                  $ref: "#/components/schemas/SnsTopicArnList"
                IamRoleArn:
                  $ref: "#/components/schemas/Arn"
                ConfigurationName:
                  $ref: "#/components/schemas/ConfigurationName"
                LoggingLevel:
                  $ref: "#/components/schemas/CustomerCwLogLevel"
                GuardrailPolicyArns:
                  $ref: "#/components/schemas/GuardrailPolicyArnList"
                UserAuthorizationRequired:
                  $ref: "#/components/schemas/BooleanAccountPreference"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - SlackTeamId
                - SlackChannelId
                - IamRoleArn
                - ConfigurationName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSlackChannelConfigurationResult"
  /delete-chime-webhook-configuration:
    post:
      operationId: DeleteChimeWebhookConfiguration
      description: Deletes a Amazon Chime webhook configuration for AWS Chatbot.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChatConfigurationArn:
                  $ref: "#/components/schemas/ChatConfigurationArn"
              required:
                - ChatConfigurationArn
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteChimeWebhookConfigurationResult"
  /delete-custom-action:
    post:
      operationId: DeleteCustomAction
      description: Deletes a custom action.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CustomActionArn:
                  $ref: "#/components/schemas/CustomActionArn"
              required:
                - CustomActionArn
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCustomActionResult"
  /delete-ms-teams-channel-configuration:
    post:
      operationId: DeleteMicrosoftTeamsChannelConfiguration
      description: Deletes a Microsoft Teams channel configuration for AWS Chatbot
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChatConfigurationArn:
                  $ref: "#/components/schemas/ChatConfigurationArn"
              required:
                - ChatConfigurationArn
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTeamsChannelConfigurationResult"
  /delete-ms-teams-configured-teams:
    post:
      operationId: DeleteMicrosoftTeamsConfiguredTeam
      description: Deletes the Microsoft Teams team authorization allowing for channels to be configured in that Microsoft Teams team. Note that the Microsoft Teams team must have no channels configured to remove it.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TeamId:
                  $ref: "#/components/schemas/UUID"
              required:
                - TeamId
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTeamsConfiguredTeamResult"
  /delete-ms-teams-user-identity:
    post:
      operationId: DeleteMicrosoftTeamsUserIdentity
      description: Identifes a user level permission for a channel configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChatConfigurationArn:
                  $ref: "#/components/schemas/ChatConfigurationArn"
                UserId:
                  $ref: "#/components/schemas/UUID"
              required:
                - ChatConfigurationArn
                - UserId
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMicrosoftTeamsUserIdentityResult"
  /delete-slack-channel-configuration:
    post:
      operationId: DeleteSlackChannelConfiguration
      description: Deletes a Slack channel configuration for AWS Chatbot
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChatConfigurationArn:
                  $ref: "#/components/schemas/ChatConfigurationArn"
              required:
                - ChatConfigurationArn
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSlackChannelConfigurationResult"
  /delete-slack-user-identity:
    post:
      operationId: DeleteSlackUserIdentity
      description: Deletes a user level permission for a Slack channel configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChatConfigurationArn:
                  $ref: "#/components/schemas/ChatConfigurationArn"
                SlackTeamId:
                  $ref: "#/components/schemas/SlackTeamId"
                SlackUserId:
                  $ref: "#/components/schemas/SlackUserId"
              required:
                - ChatConfigurationArn
                - SlackTeamId
                - SlackUserId
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSlackUserIdentityResult"
  /delete-slack-workspace-authorization:
    post:
      operationId: DeleteSlackWorkspaceAuthorization
      description: Deletes the Slack workspace authorization that allows channels to be configured in that workspace. This requires all configured channels in the workspace to be deleted.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SlackTeamId:
                  $ref: "#/components/schemas/SlackTeamId"
              required:
                - SlackTeamId
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSlackWorkspaceAuthorizationResult"
  /describe-chime-webhook-configurations:
    post:
      operationId: DescribeChimeWebhookConfigurations
      description: Lists Amazon Chime webhook configurations optionally filtered by ChatConfigurationArn
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                ChatConfigurationArn:
                  $ref: "#/components/schemas/ChatConfigurationArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeChimeWebhookConfigurationsResult"
  /describe-slack-channel-configurations:
    post:
      operationId: DescribeSlackChannelConfigurations
      description: Lists Slack channel configurations optionally filtered by ChatConfigurationArn
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                ChatConfigurationArn:
                  $ref: "#/components/schemas/ChatConfigurationArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSlackChannelConfigurationsResult"
  /describe-slack-user-identities:
    post:
      operationId: DescribeSlackUserIdentities
      description: Lists all Slack user identities with a mapped role.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ChatConfigurationArn:
                  $ref: "#/components/schemas/ChatConfigurationArn"
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSlackUserIdentitiesResult"
  /describe-slack-workspaces:
    post:
      operationId: DescribeSlackWorkspaces
      description: List all authorized Slack workspaces connected to the AWS Account onboarded with AWS Chatbot.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSlackWorkspacesResult"
  /disassociate-from-configuration:
    post:
      operationId: DisassociateFromConfiguration
      description: Unlink a resource, for example a custom action, from a channel configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Resource:
                  $ref: "#/components/schemas/ResourceIdentifier"
                ChatConfiguration:
                  $ref: "#/components/schemas/ChatConfigurationArn"
              required:
                - Resource
                - ChatConfiguration
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateFromConfigurationResult"
  /get-account-preferences:
    post:
      operationId: GetAccountPreferences
      description: Returns AWS Chatbot account preferences.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountPreferencesResult"
  /get-custom-action:
    post:
      operationId: GetCustomAction
      description: Returns a custom action.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CustomActionArn:
                  $ref: "#/components/schemas/CustomActionArn"
              required:
                - CustomActionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCustomActionResult"
  /get-ms-teams-channel-configuration:
    post:
      operationId: GetMicrosoftTeamsChannelConfiguration
      description: Returns a Microsoft Teams channel configuration in an AWS account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChatConfigurationArn:
                  $ref: "#/components/schemas/ChatConfigurationArn"
              required:
                - ChatConfigurationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTeamsChannelConfigurationResult"
  /list-associations:
    post:
      operationId: ListAssociations
      description: Lists resources associated with a channel configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChatConfiguration:
                  $ref: "#/components/schemas/ChatConfigurationArn"
                MaxResults:
                  $ref: "#/components/schemas/ListAssociationsRequestMaxResultsInteger"
                NextToken:
                  $ref: "#/components/schemas/ListAssociationsRequestNextTokenString"
              required:
                - ChatConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssociationsResult"
  /list-custom-actions:
    post:
      operationId: ListCustomActions
      description: Lists custom actions defined in this account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListCustomActionsRequestMaxResultsInteger"
                NextToken:
                  $ref: "#/components/schemas/ListCustomActionsRequestNextTokenString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCustomActionsOutputDisplay"
  /list-ms-teams-channel-configurations:
    post:
      operationId: ListMicrosoftTeamsChannelConfigurations
      description: Lists all AWS Chatbot Microsoft Teams channel configurations in an AWS account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                TeamId:
                  $ref: "#/components/schemas/UUID"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTeamsChannelConfigurationsResult"
  /list-ms-teams-configured-teams:
    post:
      operationId: ListMicrosoftTeamsConfiguredTeams
      description: Lists all authorized Microsoft Teams for an AWS Account
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMicrosoftTeamsConfiguredTeamsResult"
  /list-ms-teams-user-identities:
    post:
      operationId: ListMicrosoftTeamsUserIdentities
      description: A list all Microsoft Teams user identities with a mapped role.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ChatConfigurationArn:
                  $ref: "#/components/schemas/ChatConfigurationArn"
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMicrosoftTeamsUserIdentitiesResult"
  /list-tags-for-resource:
    post:
      operationId: ListTagsForResource
      description: Lists all of the tags associated with the Amazon Resource Name (ARN) that you specify. The resource can be a user, server, or role.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /tag-resource:
    post:
      operationId: TagResource
      description: Attaches a key-value pair to a resource, as identified by its Amazon Resource Name (ARN). Resources are users, servers, roles, and other entities.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /untag-resource:
    post:
      operationId: UntagResource
      description: Detaches a key-value pair from a resource, as identified by its Amazon Resource Name (ARN). Resources are users, servers, roles, and other entities.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /update-account-preferences:
    post:
      operationId: UpdateAccountPreferences
      description: Updates AWS Chatbot account preferences.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                UserAuthorizationRequired:
                  $ref: "#/components/schemas/BooleanAccountPreference"
                TrainingDataCollectionEnabled:
                  $ref: "#/components/schemas/BooleanAccountPreference"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAccountPreferencesResult"
  /update-chime-webhook-configuration:
    post:
      operationId: UpdateChimeWebhookConfiguration
      description: Updates a Amazon Chime webhook configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChatConfigurationArn:
                  $ref: "#/components/schemas/ChatConfigurationArn"
                WebhookDescription:
                  $ref: "#/components/schemas/ChimeWebhookDescription"
                WebhookUrl:
                  $ref: "#/components/schemas/ChimeWebhookUrl"
                SnsTopicArns:
                  $ref: "#/components/schemas/SnsTopicArnList"
                IamRoleArn:
                  $ref: "#/components/schemas/Arn"
                LoggingLevel:
                  $ref: "#/components/schemas/CustomerCwLogLevel"
              required:
                - ChatConfigurationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateChimeWebhookConfigurationResult"
  /update-custom-action:
    post:
      operationId: UpdateCustomAction
      description: Updates a custom action.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CustomActionArn:
                  $ref: "#/components/schemas/CustomActionArn"
                Definition:
                  $ref: "#/components/schemas/CustomActionDefinition"
                AliasName:
                  $ref: "#/components/schemas/CustomActionAliasName"
                Attachments:
                  $ref: "#/components/schemas/CustomActionAttachmentList"
              required:
                - CustomActionArn
                - Definition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCustomActionResult"
  /update-ms-teams-channel-configuration:
    post:
      operationId: UpdateMicrosoftTeamsChannelConfiguration
      description: Updates an Microsoft Teams channel configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChatConfigurationArn:
                  $ref: "#/components/schemas/ChatConfigurationArn"
                ChannelId:
                  $ref: "#/components/schemas/TeamsChannelId"
                ChannelName:
                  $ref: "#/components/schemas/TeamsChannelName"
                SnsTopicArns:
                  $ref: "#/components/schemas/SnsTopicArnList"
                IamRoleArn:
                  $ref: "#/components/schemas/Arn"
                LoggingLevel:
                  $ref: "#/components/schemas/CustomerCwLogLevel"
                GuardrailPolicyArns:
                  $ref: "#/components/schemas/GuardrailPolicyArnList"
                UserAuthorizationRequired:
                  $ref: "#/components/schemas/BooleanAccountPreference"
              required:
                - ChatConfigurationArn
                - ChannelId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTeamsChannelConfigurationResult"
  /update-slack-channel-configuration:
    post:
      operationId: UpdateSlackChannelConfiguration
      description: Updates a Slack channel configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChatConfigurationArn:
                  $ref: "#/components/schemas/ChatConfigurationArn"
                SlackChannelId:
                  $ref: "#/components/schemas/SlackChannelId"
                SlackChannelName:
                  $ref: "#/components/schemas/SlackChannelDisplayName"
                SnsTopicArns:
                  $ref: "#/components/schemas/SnsTopicArnList"
                IamRoleArn:
                  $ref: "#/components/schemas/Arn"
                LoggingLevel:
                  $ref: "#/components/schemas/CustomerCwLogLevel"
                GuardrailPolicyArns:
                  $ref: "#/components/schemas/GuardrailPolicyArnList"
                UserAuthorizationRequired:
                  $ref: "#/components/schemas/BooleanAccountPreference"
              required:
                - ChatConfigurationArn
                - SlackChannelId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSlackChannelConfigurationResult"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
