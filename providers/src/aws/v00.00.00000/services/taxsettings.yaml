    MalaysiaAdditionalInfo:
      description: Additional tax information associated with your TRN in Malaysia.
      type: object
      properties:
        businessRegistrationNumber:
          $ref: "#/components/schemas/BusinessRegistrationNumber"
          description: The tax registration number (TRN) in Malaysia. For individual, you can specify the taxInformationNumber in MalaysiaAdditionalInfo with NRIC type, and a valid MyKad or NRIC number. For business, you must specify a businessRegistrationNumber in MalaysiaAdditionalInfo with a TIN type and tax identification number. For business resellers, you must specify a businessRegistrationNumber and taxInformationNumber in MalaysiaAdditionalInfo with a sales and service tax (SST) type and a valid SST number. For business resellers with service codes, you must specify businessRegistrationNumber, taxInformationNumber, and distinct serviceTaxCodes in MalaysiaAdditionalInfo with a SST type and valid sales and service tax (SST) number. By using this API operation, Amazon Web Services registers your self-declaration that you’re an authorized business reseller registered with the Royal Malaysia Customs Department (RMCD), and have a valid SST number.
        serviceTaxCodes:
          $ref: "#/components/schemas/MalaysiaServiceTaxCodesList"
          description: List of service tax codes for your TRN in Malaysia.
        taxInformationNumber:
          $ref: "#/components/schemas/TaxInformationNumber"
          description: The tax information number in Malaysia. For individual, you can specify the taxInformationNumber in MalaysiaAdditionalInfo with NRIC type, and a valid MyKad or NRIC number. For business resellers, you must specify a businessRegistrationNumber and taxInformationNumber in MalaysiaAdditionalInfo with a sales and service tax (SST) type and a valid SST number. For business resellers with service codes, you must specify businessRegistrationNumber, taxInformationNumber, and distinct serviceTaxCodes in MalaysiaAdditionalInfo with a SST type and valid sales and service tax (SST) number. By using this API operation, Amazon Web Services registers your self-declaration that you’re an authorized business reseller registered with the Royal Malaysia Customs Department (RMCD), and have a valid SST number.
    BusinessRegistrationNumber:
      type: string
      pattern: ^[0-9]{12}$
    MalaysiaServiceTaxCodesList:
      type: array
      items:
        $ref: "#/components/schemas/MalaysiaServiceTaxCode"
    MalaysiaServiceTaxCode:
