          description: The tax office where you're registered. You can enter this information as a string. The Tax Settings API will add this information to your invoice. This parameter is required for business-to-business (B2B) and business-to-government customers. It's not required for business-to-consumer (B2C) customers.
    Industries:
      type: string
      enum:
        - CirculatingOrg
        - ProfessionalOrg
