openapi: 3.0.0
info:
  version: "2018-05-10"
  title: Tax Settings
  description: Tax Settings
  x-serviceName: tax
  x-serviceAlias: taxsettings
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: tax
  x-jsonVersion: "1.1"
servers:
  - url: https://tax.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for taxsettings
paths:
  /BatchDeleteTaxRegistration:
    post:
      operationId: BatchDeleteTaxRegistration
      description: Deletes tax registration for multiple accounts in batch. This can be used to delete tax registrations for up to five accounts in one batch. This API operation can't be used to delete your tax registration in Brazil. Use the Payment preferences page in the Billing and Cost Management console instead.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/BatchDeleteTaxRegistrationRequestAccountIdsList"
              required:
                - accountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteTaxRegistrationResponse"
  /BatchGetTaxExemptions:
    post:
      operationId: BatchGetTaxExemptions
      description: Get the active tax exemptions for a given list of accounts. The IAM action is tax:GetExemptions.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/BatchGetTaxExemptionsRequestAccountIdsList"
              required:
                - accountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetTaxExemptionsResponse"
  /BatchPutTaxRegistration:
    post:
      operationId: BatchPutTaxRegistration
      description: "Adds or updates tax registration for multiple accounts in batch. This can be used to add or update tax registrations for up to five accounts in one batch. You can't set a TRN if there's a pending TRN. You'll need to delete the pending TRN first. To call this API operation for specific countries, see the following country-specific requirements. Bangladesh You must specify the tax registration certificate document in the taxRegistrationDocuments field of the VerificationDetails object. Brazil You must complete the tax registration process in the Payment preferences page in the Billing and Cost Management console. After your TRN and billing address are verified, you can call this API operation. For Amazon Web Services accounts created through Organizations, you can call this API operation when you don't have a billing address. Georgia The valid personType values are Physical Person and Business. Indonesia PutTaxRegistration: The use of this operation to submit tax information is subject to the Amazon Web Services service terms. By submitting, you’re providing consent for Amazon Web Services to validate NIK, NPWP, and NITKU data, provided by you with the Directorate General of Taxes of Indonesia in accordance with the Minister of Finance Regulation (PMK) Number 112/PMK.03/2022. BatchPutTaxRegistration: The use of this operation to submit tax information is subject to the Amazon Web Services service terms. By submitting, you’re providing consent for Amazon Web Services to validate NIK, NPWP, and NITKU data, provided by you with the Directorate General of Taxes of Indonesia in accordance with the Minister of Finance Regulation (PMK) Number 112/PMK.03/2022, through our third-party partner PT Achilles Advanced Management (OnlinePajak). You must specify the taxRegistrationNumberType in the indonesiaAdditionalInfo field of the additionalTaxInformation object. If you specify decisionNumber, you must specify the ppnExceptionDesignationCode in the indonesiaAdditionalInfo field of the additionalTaxInformation object. If the taxRegistrationNumberType is set to NPWP or NITKU, valid values for ppnExceptionDesignationCode are either 01, 02, 03, 07, or 08. For other taxRegistrationNumberType values, ppnExceptionDesignationCode must be either 01, 07, or 08. If ppnExceptionDesignationCode is 07, you must specify the decisionNumber in the indonesiaAdditionalInfo field of the additionalTaxInformation object. Kenya You must specify the personType in the kenyaAdditionalInfo field of the additionalTaxInformation object. If the personType is Physical Person, you must specify the tax registration certificate document in the taxRegistrationDocuments field of the VerificationDetails object. Malaysia The sector valid values are Business and Individual. RegistrationType valid values are NRIC for individual, and TIN and sales and service tax (SST) for Business. For individual, you can specify the taxInformationNumber in MalaysiaAdditionalInfo with NRIC type, and a valid MyKad or NRIC number. For business, you must specify a businessRegistrationNumber in MalaysiaAdditionalInfo with a TIN type and tax identification number. For business resellers, you must specify a businessRegistrationNumber and taxInformationNumber in MalaysiaAdditionalInfo with a sales and service tax (SST) type and a valid SST number. For business resellers with service codes, you must specify businessRegistrationNumber, taxInformationNumber, and distinct serviceTaxCodes in MalaysiaAdditionalInfo with a SST type and valid sales and service tax (SST) number. By using this API operation, Amazon Web Services registers your self-declaration that you’re an authorized business reseller registered with the Royal Malaysia Customs Department (RMCD), and have a valid SST number. Amazon Web Services reserves the right to seek additional information and/or take other actions to support your self-declaration as appropriate. Amazon Web Services is currently registered under the following service tax codes. You must include at least one of the service tax codes in the service tax code strings to declare yourself as an authorized registered business reseller. Taxable service and service tax codes: Consultancy - 9907061674 Training or coaching service - 9907071685 IT service - 9907101676 Digital services and electronic medium - 9907121690 Nepal The sector valid values are Business and Individual. Saudi Arabia For address, you must specify addressLine3. South Korea You must specify the certifiedEmailId and legalName in the TaxRegistrationEntry object. Use Korean characters for legalName. You must specify the businessRepresentativeName, itemOfBusiness, and lineOfBusiness in the southKoreaAdditionalInfo field of the additionalTaxInformation object. Use Korean characters for these fields. You must specify the tax registration certificate document in the taxRegistrationDocuments field of the VerificationDetails object. For the address object, use Korean characters for addressLine1, addressLine2 city, postalCode, and stateOrRegion. Spain You must specify the registrationType in the spainAdditionalInfo field of the additionalTaxInformation object. If the registrationType is Local, you must specify the tax registration certificate document in the taxRegistrationDocuments field of the VerificationDetails object. Turkey You must specify the sector in the taxRegistrationEntry object. If your sector is Business, Individual, or Government: Specify the taxOffice. If your sector is Individual, don't enter this value. (Optional) Specify the kepEmailId. If your sector is Individual, don't enter this value. Note: In the Tax Settings page of the Billing console, Government appears as Public institutions If your sector is Business and you're subject to KDV tax, you must specify your industry in the industries field. For address, you must specify districtOrCounty. Ukraine The sector valid values are Business and Individual."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/BatchPutTaxRegistrationRequestAccountIdsList"
                taxRegistrationEntry:
                  $ref: "#/components/schemas/TaxRegistrationEntry"
              required:
                - accountIds
                - taxRegistrationEntry
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchPutTaxRegistrationResponse"
  /DeleteSupplementalTaxRegistration:
    post:
      operationId: DeleteSupplementalTaxRegistration
      description: Deletes a supplemental tax registration for a single account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                authorityId:
                  $ref: "#/components/schemas/GenericString"
              required:
                - authorityId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSupplementalTaxRegistrationResponse"
  /DeleteTaxRegistration:
    post:
      operationId: DeleteTaxRegistration
      description: Deletes tax registration for a single account. This API operation can't be used to delete your tax registration in Brazil. Use the Payment preferences page in the Billing and Cost Management console instead.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                accountId:
                  $ref: "#/components/schemas/AccountId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTaxRegistrationResponse"
  /GetTaxExemptionTypes:
    post:
      operationId: GetTaxExemptionTypes
      description: Get supported tax exemption types. The IAM action is tax:GetExemptions.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTaxExemptionTypesResponse"
  /GetTaxInheritance:
    post:
      operationId: GetTaxInheritance
      description: The get account tax inheritance status.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTaxInheritanceResponse"
  /GetTaxRegistration:
    post:
      operationId: GetTaxRegistration
      description: Retrieves tax registration for a single account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                accountId:
                  $ref: "#/components/schemas/AccountId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTaxRegistrationResponse"
  /GetTaxRegistrationDocument:
    post:
      operationId: GetTaxRegistrationDocument
      description: Downloads your tax documents to the Amazon S3 bucket that you specify in your request.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                destinationS3Location:
                  $ref: "#/components/schemas/DestinationS3Location"
                taxDocumentMetadata:
                  $ref: "#/components/schemas/TaxDocumentMetadata"
              required:
                - taxDocumentMetadata
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTaxRegistrationDocumentResponse"
  /ListSupplementalTaxRegistrations:
    post:
      operationId: ListSupplementalTaxRegistrations
      description: Retrieves supplemental tax registrations for a single account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/PaginationTokenString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSupplementalTaxRegistrationsResponse"
  /ListTaxExemptions:
    post:
      operationId: ListTaxExemptions
      description: Retrieves the tax exemption of accounts listed in a consolidated billing family. The IAM action is tax:GetExemptions.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/PaginationTokenString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTaxExemptionsResponse"
  /ListTaxRegistrations:
    post:
      operationId: ListTaxRegistrations
      description: Retrieves the tax registration of accounts listed in a consolidated billing family. This can be used to retrieve up to 100 accounts' tax registrations in one call (default 50).
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/PaginationTokenString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTaxRegistrationsResponse"
  /PutSupplementalTaxRegistration:
    post:
      operationId: PutSupplementalTaxRegistration
      description: Stores supplemental tax registration for a single account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                taxRegistrationEntry:
                  $ref: "#/components/schemas/SupplementalTaxRegistrationEntry"
              required:
                - taxRegistrationEntry
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutSupplementalTaxRegistrationResponse"
  /PutTaxExemption:
    post:
      operationId: PutTaxExemption
      description: Adds the tax exemption for a single account or all accounts listed in a consolidated billing family. The IAM action is tax:UpdateExemptions.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/PutTaxExemptionRequestAccountIdsList"
                authority:
                  $ref: "#/components/schemas/Authority"
                exemptionCertificate:
                  $ref: "#/components/schemas/ExemptionCertificate"
                exemptionType:
                  $ref: "#/components/schemas/GenericString"
              required:
                - accountIds
                - authority
                - exemptionCertificate
                - exemptionType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutTaxExemptionResponse"
  /PutTaxInheritance:
    post:
      operationId: PutTaxInheritance
      description: The updated tax inheritance status.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                heritageStatus:
                  $ref: "#/components/schemas/HeritageStatus"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutTaxInheritanceResponse"
  /PutTaxRegistration:
    post:
      operationId: PutTaxRegistration
      description: "Adds or updates tax registration for a single account. You can't set a TRN if there's a pending TRN. You'll need to delete the pending TRN first. To call this API operation for specific countries, see the following country-specific requirements. Bangladesh You must specify the tax registration certificate document in the taxRegistrationDocuments field of the VerificationDetails object. Brazil You must complete the tax registration process in the Payment preferences page in the Billing and Cost Management console. After your TRN and billing address are verified, you can call this API operation. For Amazon Web Services accounts created through Organizations, you can call this API operation when you don't have a billing address. Georgia The valid personType values are Physical Person and Business. Indonesia PutTaxRegistration: The use of this operation to submit tax information is subject to the Amazon Web Services service terms. By submitting, you’re providing consent for Amazon Web Services to validate NIK, NPWP, and NITKU data, provided by you with the Directorate General of Taxes of Indonesia in accordance with the Minister of Finance Regulation (PMK) Number 112/PMK.03/2022. BatchPutTaxRegistration: The use of this operation to submit tax information is subject to the Amazon Web Services service terms. By submitting, you’re providing consent for Amazon Web Services to validate NIK, NPWP, and NITKU data, provided by you with the Directorate General of Taxes of Indonesia in accordance with the Minister of Finance Regulation (PMK) Number 112/PMK.03/2022, through our third-party partner PT Achilles Advanced Management (OnlinePajak). You must specify the taxRegistrationNumberType in the indonesiaAdditionalInfo field of the additionalTaxInformation object. If you specify decisionNumber, you must specify the ppnExceptionDesignationCode in the indonesiaAdditionalInfo field of the additionalTaxInformation object. If the taxRegistrationNumberType is set to NPWP or NITKU, valid values for ppnExceptionDesignationCode are either 01, 02, 03, 07, or 08. For other taxRegistrationNumberType values, ppnExceptionDesignationCode must be either 01, 07, or 08. If ppnExceptionDesignationCode is 07, you must specify the decisionNumber in the indonesiaAdditionalInfo field of the additionalTaxInformation object. Kenya You must specify the personType in the kenyaAdditionalInfo field of the additionalTaxInformation object. If the personType is Physical Person, you must specify the tax registration certificate document in the taxRegistrationDocuments field of the VerificationDetails object. Malaysia The sector valid values are Business and Individual. RegistrationType valid values are NRIC for individual, and TIN and sales and service tax (SST) for Business. For individual, you can specify the taxInformationNumber in MalaysiaAdditionalInfo with NRIC type, and a valid MyKad or NRIC number. For business, you must specify a businessRegistrationNumber in MalaysiaAdditionalInfo with a TIN type and tax identification number. For business resellers, you must specify a businessRegistrationNumber and taxInformationNumber in MalaysiaAdditionalInfo with a sales and service tax (SST) type and a valid SST number. For business resellers with service codes, you must specify businessRegistrationNumber, taxInformationNumber, and distinct serviceTaxCodes in MalaysiaAdditionalInfo with a SST type and valid sales and service tax (SST) number. By using this API operation, Amazon Web Services registers your self-declaration that you’re an authorized business reseller registered with the Royal Malaysia Customs Department (RMCD), and have a valid SST number. Amazon Web Services reserves the right to seek additional information and/or take other actions to support your self-declaration as appropriate. Amazon Web Services is currently registered under the following service tax codes. You must include at least one of the service tax codes in the service tax code strings to declare yourself as an authorized registered business reseller. Taxable service and service tax codes: Consultancy - 9907061674 Training or coaching service - 9907071685 IT service - 9907101676 Digital services and electronic medium - 9907121690 Nepal The sector valid values are Business and Individual. Saudi Arabia For address, you must specify addressLine3. South Korea You must specify the certifiedEmailId and legalName in the TaxRegistrationEntry object. Use Korean characters for legalName. You must specify the businessRepresentativeName, itemOfBusiness, and lineOfBusiness in the southKoreaAdditionalInfo field of the additionalTaxInformation object. Use Korean characters for these fields. You must specify the tax registration certificate document in the taxRegistrationDocuments field of the VerificationDetails object. For the address object, use Korean characters for addressLine1, addressLine2 city, postalCode, and stateOrRegion. Spain You must specify the registrationType in the spainAdditionalInfo field of the additionalTaxInformation object. If the registrationType is Local, you must specify the tax registration certificate document in the taxRegistrationDocuments field of the VerificationDetails object. Turkey You must specify the sector in the taxRegistrationEntry object. If your sector is Business, Individual, or Government: Specify the taxOffice. If your sector is Individual, don't enter this value. (Optional) Specify the kepEmailId. If your sector is Individual, don't enter this value. Note: In the Tax Settings page of the Billing console, Government appears as Public institutions If your sector is Business and you're subject to KDV tax, you must specify your industry in the industries field. For address, you must specify districtOrCounty. Ukraine The sector valid values are Business and Individual."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountId:
                  $ref: "#/components/schemas/AccountId"
                taxRegistrationEntry:
                  $ref: "#/components/schemas/TaxRegistrationEntry"
              required:
                - taxRegistrationEntry
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutTaxRegistrationResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    BatchDeleteTaxRegistrationRequestAccountIdsList:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    AccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: ^\d+$
    BatchDeleteTaxRegistrationResponse:
      type: object
      properties:
        errors:
          $ref: "#/components/schemas/BatchDeleteTaxRegistrationErrors"
          description: The list of errors for the accounts the TRN information could not be deleted for.
      required:
        - errors
    BatchDeleteTaxRegistrationErrors:
      type: array
      items:
        $ref: "#/components/schemas/BatchDeleteTaxRegistrationError"
    BatchDeleteTaxRegistrationError:
      description: The error object for representing failures in the BatchDeleteTaxRegistration operation.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: The unique account identifier for the account whose tax registration couldn't be deleted during the BatchDeleteTaxRegistration operation.
        code:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code for an individual failure in BatchDeleteTaxRegistration operation.
        message:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message for an individual failure in the BatchDeleteTaxRegistration operation.
      required:
        - accountId
        - message
    ErrorCode:
      type: string
      minLength: 0
      maxLength: 50
      pattern: ^[\s\S]*$
    ErrorMessage:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: ^[\s\S]*$
    BatchGetTaxExemptionsRequestAccountIdsList:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    BatchGetTaxExemptionsResponse:
      type: object
      properties:
        failedAccounts:
          $ref: "#/components/schemas/AccountIds"
          description: The list of accounts that failed to get tax exemptions.
        taxExemptionDetailsMap:
          type: object
          properties: {}
          description: The tax exemption details map of accountId and tax exemption details.
    AccountIds:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    BatchPutTaxRegistrationRequestAccountIdsList:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    TaxRegistrationEntry:
      description: The TRN information you provide when you add a new TRN, or update.
      type: object
      properties:
        additionalTaxInformation:
          $ref: "#/components/schemas/AdditionalInfoRequest"
          description: Additional tax information associated with your TRN. You only need to specify this parameter if Amazon Web Services collects any additional information for your country within AdditionalInfoRequest.
        certifiedEmailId:
          $ref: "#/components/schemas/CertifiedEmailId"
          description: The email address to receive VAT invoices.
        legalAddress:
          $ref: "#/components/schemas/Address"
          description: The legal address associated with your TRN. If you're setting a TRN in Brazil for the CNPJ tax type, you don't need to specify the legal address. For TRNs in other countries and for CPF tax types Brazil, you must specify the legal address.
        legalName:
          $ref: "#/components/schemas/LegalName"
          description: The legal name associated with your TRN. If you're setting a TRN in Brazil, you don't need to specify the legal name. For TRNs in other countries, you must specify the legal name.
        registrationId:
          $ref: "#/components/schemas/RegistrationId"
          description: Your tax registration unique identifier.
        registrationType:
          $ref: "#/components/schemas/TaxRegistrationType"
          description: Your tax registration type. This can be either VAT or GST.
        sector:
          $ref: "#/components/schemas/Sector"
          description: The industry that describes your business. For business-to-business (B2B) customers, specify Business. For business-to-consumer (B2C) customers, specify Individual. For business-to-government (B2G), specify Government.Note that certain values may not applicable for the request country. Please refer to country specific information in API document.
        verificationDetails:
          $ref: "#/components/schemas/VerificationDetails"
          description: Additional details needed to verify your TRN information in Brazil. You only need to specify this parameter when you set a TRN in Brazil that is the CPF tax type. Don't specify this parameter to set a TRN in Brazil of the CNPJ tax type or to set a TRN for another country.
      required:
        - registrationId
        - registrationType
    AdditionalInfoRequest:
      description: Additional tax information associated with your tax registration number (TRN). Depending on the TRN for a specific country, you might need to specify this information when you set your TRN. You can only specify one of the following parameters and the value can't be empty. The parameter that you specify must match the country for the TRN, if available. For example, if you set a TRN in Canada for specific provinces, you must also specify the canadaAdditionalInfo parameter.
      type: object
      properties:
        canadaAdditionalInfo:
          $ref: "#/components/schemas/CanadaAdditionalInfo"
          description: Additional tax information associated with your TRN in Canada.
        egyptAdditionalInfo:
          $ref: "#/components/schemas/EgyptAdditionalInfo"
          description: Additional tax information to specify for a TRN in Egypt.
        estoniaAdditionalInfo:
          $ref: "#/components/schemas/EstoniaAdditionalInfo"
          description: Additional tax information to specify for a TRN in Estonia.
        georgiaAdditionalInfo:
          $ref: "#/components/schemas/GeorgiaAdditionalInfo"
          description: Additional tax information to specify for a TRN in Georgia.
        greeceAdditionalInfo:
          $ref: "#/components/schemas/GreeceAdditionalInfo"
          description: Additional tax information to specify for a TRN in Greece.
        indonesiaAdditionalInfo:
          $ref: "#/components/schemas/IndonesiaAdditionalInfo"
        israelAdditionalInfo:
          $ref: "#/components/schemas/IsraelAdditionalInfo"
          description: Additional tax information to specify for a TRN in Israel.
        italyAdditionalInfo:
          $ref: "#/components/schemas/ItalyAdditionalInfo"
          description: Additional tax information to specify for a TRN in Italy.
        kenyaAdditionalInfo:
          $ref: "#/components/schemas/KenyaAdditionalInfo"
          description: Additional tax information to specify for a TRN in Kenya.
        malaysiaAdditionalInfo:
          $ref: "#/components/schemas/MalaysiaAdditionalInfo"
          description: Additional tax information to specify for a TRN in Malaysia.
        polandAdditionalInfo:
          $ref: "#/components/schemas/PolandAdditionalInfo"
          description: Additional tax information associated with your TRN in Poland.
        romaniaAdditionalInfo:
          $ref: "#/components/schemas/RomaniaAdditionalInfo"
          description: Additional tax information to specify for a TRN in Romania.
        saudiArabiaAdditionalInfo:
          $ref: "#/components/schemas/SaudiArabiaAdditionalInfo"
          description: Additional tax information associated with your TRN in Saudi Arabia.
        southKoreaAdditionalInfo:
          $ref: "#/components/schemas/SouthKoreaAdditionalInfo"
          description: Additional tax information to specify for a TRN in South Korea.
        spainAdditionalInfo:
          $ref: "#/components/schemas/SpainAdditionalInfo"
          description: Additional tax information to specify for a TRN in Spain.
        turkeyAdditionalInfo:
          $ref: "#/components/schemas/TurkeyAdditionalInfo"
          description: Additional tax information to specify for a TRN in Turkey.
        ukraineAdditionalInfo:
          $ref: "#/components/schemas/UkraineAdditionalInfo"
          description: Additional tax information associated with your TRN in Ukraine.
        uzbekistanAdditionalInfo:
          $ref: "#/components/schemas/UzbekistanAdditionalInfo"
          description: Additional tax information to specify for a TRN in Uzbekistan.
        vietnamAdditionalInfo:
          $ref: "#/components/schemas/VietnamAdditionalInfo"
          description: Additional tax information to specify for a TRN in Vietnam.
    CanadaAdditionalInfo:
      description: Additional tax information associated with your TRN in Canada .
      type: object
      properties:
        canadaQuebecSalesTaxNumber:
          $ref: "#/components/schemas/CanadaQuebecSalesTaxNumberString"
          description: The Quebec Sales Tax ID number. Leave blank if you do not have a Quebec Sales Tax ID number.
        canadaRetailSalesTaxNumber:
          $ref: "#/components/schemas/CanadaRetailSalesTaxNumberString"
          description: Manitoba Retail Sales Tax ID number. Customers purchasing Amazon Web Services services for resale in Manitoba must provide a valid Retail Sales Tax ID number for Manitoba. Leave this blank if you do not have a Retail Sales Tax ID number in Manitoba or are not purchasing Amazon Web Services services for resale.
        isResellerAccount:
          $ref: "#/components/schemas/Boolean"
          description: The value for this parameter must be true if the provincialSalesTaxId value is provided for a TRN in British Columbia, Saskatchewan, or Manitoba provinces. To claim a provincial sales tax (PST) and retail sales tax (RST) reseller exemption, you must confirm that purchases from this account were made for resale. Otherwise, remove the PST or RST number from the provincialSalesTaxId parameter from your request.
        provincialSalesTaxId:
          $ref: "#/components/schemas/CanadaProvincialSalesTaxIdString"
          description: "The provincial sales tax ID for your TRN in Canada. This parameter can represent the following: Provincial sales tax ID number for British Columbia and Saskatchewan provinces Manitoba retail sales tax ID number for Manitoba province Quebec sales tax ID number for Quebec province The Tax Setting API only accepts this parameter if the TRN is specified for the previous provinces. For other provinces, the Tax Settings API doesn't accept this parameter."
    CanadaQuebecSalesTaxNumberString:
      type: string
      pattern: ^([0-9]{10})(TQ[0-9]{4})?$
    CanadaRetailSalesTaxNumberString:
      type: string
      pattern: ^([0-9]{6}-[0-9]{1})$
    Boolean:
      type: boolean
    CanadaProvincialSalesTaxIdString:
      type: string
      minLength: 7
      maxLength: 16
      pattern: ^([0-9A-Z/-]+)$
