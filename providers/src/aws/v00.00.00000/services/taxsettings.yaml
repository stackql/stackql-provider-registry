      pattern: ^[a-zA-Z]+$
    District:
      type: string
      minLength: 1
      maxLength: 50
      pattern: ^(?!\s*$)[\s\S]+$
    PostalCode:
      type: string
      minLength: 1
      maxLength: 20
      pattern: ^(?!\s*$)[\s\S]+$
    State:
      type: string
      minLength: 1
      maxLength: 50
      pattern: ^(?!\s*$)[\s\S]+$
