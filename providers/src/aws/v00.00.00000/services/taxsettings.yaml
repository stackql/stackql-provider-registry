          description: The postal code associated with the address.
        stateOrRegion:
          $ref: "#/components/schemas/State"
          description: The state, region, or province that the address is located. This field is only required for Canada, India, United Arab Emirates, Romania, and Brazil (CPF). It is optional for all other countries. If this is required for tax settings, use the same name as shown on the Tax Settings page.
