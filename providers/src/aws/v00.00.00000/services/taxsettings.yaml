        kepEmailId:
          $ref: "#/components/schemas/KepEmailId"
          description: The Registered Electronic Mail (REM) that is used to send notarized communication. This parameter is optional for business-to-business (B2B) and business-to-government (B2G) customers. It's not required for business-to-consumer (B2C) customers.
