      minLength: 1
      maxLength: 60
      pattern: ^(?!\s*$)[\s\S]+$
    AddressLine3:
      type: string
      minLength: 1
      maxLength: 60
      pattern: ^(?!\s*$)[\s\S]+$
    City:
