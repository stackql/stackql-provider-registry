openapi: 3.0.0
info:
  version: "2018-05-10"
  title: IAM Roles Anywhere
  description: IAM Roles Anywhere
  x-serviceName: rolesanywhere
  x-serviceAlias: rolesanywhere
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: rolesanywhere
servers:
  - url: https://rolesanywhere.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for rolesanywhere
paths:
  /profiles:
    post:
      operationId: CreateProfile
      description: "Creates a profile, a list of the roles that Roles Anywhere service is trusted to assume. You use profiles to intersect permissions with IAM managed policies. Required permissions: rolesanywhere:CreateProfile."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                requireInstanceProperties:
                  $ref: "#/components/schemas/Boolean"
                sessionPolicy:
                  $ref: "#/components/schemas/String"
                roleArns:
                  $ref: "#/components/schemas/RoleArnList"
                managedPolicyArns:
                  $ref: "#/components/schemas/ManagedPolicyList"
                durationSeconds:
                  $ref: "#/components/schemas/CreateProfileRequestDurationSecondsInteger"
                enabled:
                  $ref: "#/components/schemas/Boolean"
                tags:
                  $ref: "#/components/schemas/TagList"
                acceptRoleSessionName:
                  $ref: "#/components/schemas/Boolean"
              required:
                - name
                - roleArns
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileDetailResponse"
    get:
      operationId: ListProfiles
      description: "Lists all profiles in the authenticated account and Amazon Web Services Region. Required permissions: rolesanywhere:ListProfiles."
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRequestNextTokenString"
          description: A token that indicates where the output should continue from, if a previous request did not show all results. To get the next results, make the request again with this value.
        - name: pageSize
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The number of resources in the paginated list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProfilesResponse"
  /trustanchors:
    post:
      operationId: CreateTrustAnchor
      description: "Creates a trust anchor to establish trust between IAM Roles Anywhere and your certificate authority (CA). You can define a trust anchor as a reference to an Private Certificate Authority (Private CA) or by uploading a CA certificate. Your Amazon Web Services workloads can authenticate with the trust anchor using certificates issued by the CA in exchange for temporary Amazon Web Services credentials. Required permissions: rolesanywhere:CreateTrustAnchor."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                source:
                  $ref: "#/components/schemas/Source"
                enabled:
                  $ref: "#/components/schemas/Boolean"
                tags:
                  $ref: "#/components/schemas/TagList"
                notificationSettings:
                  $ref: "#/components/schemas/NotificationSettings"
              required:
                - name
                - source
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustAnchorDetailResponse"
    get:
      operationId: ListTrustAnchors
      description: "Lists the trust anchors in the authenticated account and Amazon Web Services Region. Required permissions: rolesanywhere:ListTrustAnchors."
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRequestNextTokenString"
          description: A token that indicates where the output should continue from, if a previous request did not show all results. To get the next results, make the request again with this value.
        - name: pageSize
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The number of resources in the paginated list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTrustAnchorsResponse"
  /profiles/{profile_id}/mappings:
    delete:
      operationId: DeleteAttributeMapping
      description: Delete an entry from the attribute mapping rules enforced by a given profile.
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the profile.
        - name: certificateField
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/CertificateField"
          description: Fields (x509Subject, x509Issuer and x509SAN) within X.509 certificates.
        - name: specifiers
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SpecifierList"
          description: A list of specifiers of a certificate field; for example, CN, OU, UID from a Subject.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAttributeMappingResponse"
    put:
      operationId: PutAttributeMapping
      description: Put an entry in the attribute mapping rules that will be enforced by a given profile. A mapping specifies a certificate field and one or more specifiers that have contextual meanings.
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                certificateField:
                  $ref: "#/components/schemas/CertificateField"
                mappingRules:
                  $ref: "#/components/schemas/MappingRules"
              required:
                - certificateField
                - mappingRules
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutAttributeMappingResponse"
  /crl/{crl_id}:
    delete:
      operationId: DeleteCrl
      description: "Deletes a certificate revocation list (CRL). Required permissions: rolesanywhere:DeleteCrl."
      parameters:
        - name: crl_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the certificate revocation list (CRL).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrlDetailResponse"
    get:
      operationId: GetCrl
      description: "Gets a certificate revocation list (CRL). Required permissions: rolesanywhere:GetCrl."
      parameters:
        - name: crl_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the certificate revocation list (CRL).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrlDetailResponse"
    patch:
      operationId: UpdateCrl
      description: "Updates the certificate revocation list (CRL). A CRL is a list of certificates that have been revoked by the issuing certificate authority (CA). IAM Roles Anywhere validates against the CRL before issuing credentials. Required permissions: rolesanywhere:UpdateCrl."
      parameters:
        - name: crl_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the certificate revocation list (CRL).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                crlData:
                  $ref: "#/components/schemas/UpdateCrlRequestCrlDataBlob"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrlDetailResponse"
  /profile/{profile_id}:
    delete:
      operationId: DeleteProfile
      description: "Deletes a profile. Required permissions: rolesanywhere:DeleteProfile."
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the profile.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileDetailResponse"
    get:
      operationId: GetProfile
      description: "Gets a profile. Required permissions: rolesanywhere:GetProfile."
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the profile.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileDetailResponse"
    patch:
      operationId: UpdateProfile
      description: "Updates a profile, a list of the roles that IAM Roles Anywhere service is trusted to assume. You use profiles to intersect permissions with IAM managed policies. Required permissions: rolesanywhere:UpdateProfile."
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the profile.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                sessionPolicy:
                  $ref: "#/components/schemas/UpdateProfileRequestSessionPolicyString"
                roleArns:
                  $ref: "#/components/schemas/RoleArnList"
                managedPolicyArns:
                  $ref: "#/components/schemas/ManagedPolicyList"
                durationSeconds:
                  $ref: "#/components/schemas/UpdateProfileRequestDurationSecondsInteger"
                acceptRoleSessionName:
                  $ref: "#/components/schemas/Boolean"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileDetailResponse"
  /trustanchor/{trust_anchor_id}:
    delete:
      operationId: DeleteTrustAnchor
      description: "Deletes a trust anchor. Required permissions: rolesanywhere:DeleteTrustAnchor."
      parameters:
        - name: trust_anchor_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the trust anchor.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustAnchorDetailResponse"
    get:
      operationId: GetTrustAnchor
      description: "Gets a trust anchor. Required permissions: rolesanywhere:GetTrustAnchor."
      parameters:
        - name: trust_anchor_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the trust anchor.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustAnchorDetailResponse"
    patch:
      operationId: UpdateTrustAnchor
      description: "Updates a trust anchor. You establish trust between IAM Roles Anywhere and your certificate authority (CA) by configuring a trust anchor. You can define a trust anchor as a reference to an Private Certificate Authority (Private CA) or by uploading a CA certificate. Your Amazon Web Services workloads can authenticate with the trust anchor using certificates issued by the CA in exchange for temporary Amazon Web Services credentials. Required permissions: rolesanywhere:UpdateTrustAnchor."
      parameters:
        - name: trust_anchor_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the trust anchor.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                source:
                  $ref: "#/components/schemas/Source"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustAnchorDetailResponse"
  /crl/{crl_id}/disable:
    post:
      operationId: DisableCrl
      description: "Disables a certificate revocation list (CRL). Required permissions: rolesanywhere:DisableCrl."
      parameters:
        - name: crl_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the certificate revocation list (CRL).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrlDetailResponse"
  /profile/{profile_id}/disable:
    post:
      operationId: DisableProfile
      description: "Disables a profile. When disabled, temporary credential requests with this profile fail. Required permissions: rolesanywhere:DisableProfile."
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the profile.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileDetailResponse"
  /trustanchor/{trust_anchor_id}/disable:
    post:
      operationId: DisableTrustAnchor
      description: "Disables a trust anchor. When disabled, temporary credential requests specifying this trust anchor are unauthorized. Required permissions: rolesanywhere:DisableTrustAnchor."
      parameters:
        - name: trust_anchor_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the trust anchor.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustAnchorDetailResponse"
  /crl/{crl_id}/enable:
    post:
      operationId: EnableCrl
      description: "Enables a certificate revocation list (CRL). When enabled, certificates stored in the CRL are unauthorized to receive session credentials. Required permissions: rolesanywhere:EnableCrl."
      parameters:
        - name: crl_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the certificate revocation list (CRL).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrlDetailResponse"
  /profile/{profile_id}/enable:
    post:
      operationId: EnableProfile
      description: "Enables temporary credential requests for a profile. Required permissions: rolesanywhere:EnableProfile."
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the profile.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileDetailResponse"
  /trustanchor/{trust_anchor_id}/enable:
    post:
      operationId: EnableTrustAnchor
      description: "Enables a trust anchor. When enabled, certificates in the trust anchor chain are authorized for trust validation. Required permissions: rolesanywhere:EnableTrustAnchor."
      parameters:
        - name: trust_anchor_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the trust anchor.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustAnchorDetailResponse"
  /subject/{subject_id}:
    get:
      operationId: GetSubject
      description: "Gets a subject, which associates a certificate identity with authentication attempts. The subject stores auditing information such as the status of the last authentication attempt, the certificate data used in the attempt, and the last time the associated identity attempted authentication. Required permissions: rolesanywhere:GetSubject."
      parameters:
        - name: subject_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the subject.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubjectDetailResponse"
  /crls:
    post:
      operationId: ImportCrl
      description: "Imports the certificate revocation list (CRL). A CRL is a list of certificates that have been revoked by the issuing certificate Authority (CA).In order to be properly imported, a CRL must be in PEM format. IAM Roles Anywhere validates against the CRL before issuing credentials. Required permissions: rolesanywhere:ImportCrl."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                crlData:
                  $ref: "#/components/schemas/ImportCrlRequestCrlDataBlob"
                enabled:
                  $ref: "#/components/schemas/Boolean"
                tags:
                  $ref: "#/components/schemas/TagList"
                trustAnchorArn:
                  $ref: "#/components/schemas/TrustAnchorArn"
              required:
                - name
                - crlData
                - trustAnchorArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrlDetailResponse"
    get:
      operationId: ListCrls
      description: "Lists all certificate revocation lists (CRL) in the authenticated account and Amazon Web Services Region. Required permissions: rolesanywhere:ListCrls."
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRequestNextTokenString"
          description: A token that indicates where the output should continue from, if a previous request did not show all results. To get the next results, make the request again with this value.
        - name: pageSize
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The number of resources in the paginated list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCrlsResponse"
  /subjects:
    get:
      operationId: ListSubjects
      description: "Lists the subjects in the authenticated account and Amazon Web Services Region. Required permissions: rolesanywhere:ListSubjects."
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRequestNextTokenString"
          description: A token that indicates where the output should continue from, if a previous request did not show all results. To get the next results, make the request again with this value.
        - name: pageSize
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The number of resources in the paginated list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubjectsResponse"
  /ListTagsForResource:
    get:
      operationId: ListTagsForResource
      description: "Lists the tags attached to the resource. Required permissions: rolesanywhere:ListTagsForResource."
      parameters:
        - name: resourceArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /put-notifications-settings:
    patch:
      operationId: PutNotificationSettings
      description: "Attaches a list of notification settings to a trust anchor. A notification setting includes information such as event name, threshold, status of the notification setting, and the channel to notify. Required permissions: rolesanywhere:PutNotificationSettings."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trustAnchorId:
                  $ref: "#/components/schemas/Uuid"
                notificationSettings:
                  $ref: "#/components/schemas/NotificationSettings"
              required:
                - trustAnchorId
                - notificationSettings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutNotificationSettingsResponse"
  /reset-notifications-settings:
    patch:
      operationId: ResetNotificationSettings
      description: "Resets the custom notification setting to IAM Roles Anywhere default setting. Required permissions: rolesanywhere:ResetNotificationSettings."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trustAnchorId:
                  $ref: "#/components/schemas/Uuid"
                notificationSettingKeys:
                  $ref: "#/components/schemas/NotificationSettingKeys"
              required:
                - trustAnchorId
                - notificationSettingKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetNotificationSettingsResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: "Attaches tags to a resource. Required permissions: rolesanywhere:TagResource."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - resourceArn
                - tags
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: "Removes tags from the resource. Required permissions: rolesanywhere:UntagResource."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                tagKeys:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - resourceArn
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ResourceName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[ a-zA-Z0-9-_]*"
    Boolean:
      type: boolean
    String:
      type: string
    RoleArnList:
      type: array
      items:
        $ref: "#/components/schemas/RoleArn"
    RoleArn:
      type: string
      minLength: 1
      maxLength: 1011
      pattern: arn:aws(-[^:]+)?:iam(:.*){2}(:role.*)
    ManagedPolicyList:
      type: array
      items:
        $ref: "#/components/schemas/ManagedPolicyListMemberString"
    ManagedPolicyListMemberString:
      type: string
      minLength: 1
      maxLength: 200
    CreateProfileRequestDurationSecondsInteger:
      type: integer
      minimum: 900
      maximum: 43200
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A label that consists of a key and value you define.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: The tag key.
        value:
          $ref: "#/components/schemas/TagValue"
          description: The tag value.
      required:
        - key
        - value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[ a-zA-Z0-9_.:/=+@-]*"
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[ a-zA-Z0-9_.:/=+@-]*"
    ProfileDetailResponse:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/ProfileDetail"
          description: The state of the profile after a read or write operation.
    ProfileDetail:
      description: The state of the profile after a read or write operation.
      type: object
      properties:
        profileId:
          $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the profile.
        profileArn:
          $ref: "#/components/schemas/ProfileArn"
          description: The ARN of the profile.
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the profile.
        requireInstanceProperties:
          $ref: "#/components/schemas/Boolean"
          description: Unused, saved for future use. Will likely specify whether instance properties are required in temporary credential requests with this profile.
        enabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the profile is enabled.
        createdBy:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services account that created the profile.
        sessionPolicy:
          $ref: "#/components/schemas/String"
          description: A session policy that applies to the trust boundary of the vended session credentials.
        roleArns:
          $ref: "#/components/schemas/RoleArnList"
          description: A list of IAM roles that this profile can assume in a temporary credential request.
        managedPolicyArns:
          $ref: "#/components/schemas/ManagedPolicyList"
          description: A list of managed policy ARNs that apply to the vended session credentials.
        createdAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The ISO-8601 timestamp when the profile was created.
        updatedAt:
