openapi: 3.0.0
info:
  version: "2010-06-01"
  title: AWS Import/Export
  description: AWS Import/Export
  x-serviceName: importexport
  x-serviceAlias: importexport
  x-protocol: query
  x-apiVersion: "2010-06-01"
  x-endpointPrefix: importexport
servers:
  - url: https://importexport.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Global endpoint for importexport
paths:
  /?Action=CancelJob&Version=2010-06-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CancelJob
      description: This operation cancels a specified job. Only the job owner can cancel it. The operation fails if the job has already started or is complete.
      parameters:
        - name: JobId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
        - name: APIVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/APIVersion"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CancelJobOutputDisplay"
    post:
      operationId: POST_CancelJob
      description: This operation cancels a specified job. Only the job owner can cancel it. The operation fails if the job has already started or is complete.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CancelJobOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CancelJobInput"
  /?Action=CreateJob&Version=2010-06-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateJob
      description: This operation initiates the process of scheduling an upload or download of your data. You include in the request a manifest that describes the data transfer specifics. The response to the request includes a job ID, which you can use in other operations, a signature that you use to identify your storage device, and the address where you should ship your storage device.
      parameters:
        - name: JobType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/JobType"
        - name: Manifest
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Manifest"
        - name: ManifestAddendum
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ManifestAddendum"
        - name: ValidateOnly
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ValidateOnly"
        - name: APIVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/APIVersion"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateJobOutputDisplay"
    post:
      operationId: POST_CreateJob
      description: This operation initiates the process of scheduling an upload or download of your data. You include in the request a manifest that describes the data transfer specifics. The response to the request includes a job ID, which you can use in other operations, a signature that you use to identify your storage device, and the address where you should ship your storage device.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateJobOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CreateJobInput"
  /?Action=GetShippingLabel&Version=2010-06-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_GetShippingLabel
      description: This operation generates a pre-paid UPS shipping label that you will use to ship your device to AWS for processing.
      parameters:
        - name: jobIds
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/JobIdList"
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/name"
        - name: company
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/company"
        - name: phoneNumber
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/phoneNumber"
        - name: country
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/country"
        - name: stateOrProvince
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/stateOrProvince"
        - name: city
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/city"
        - name: postalCode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/postalCode"
        - name: street1
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/street1"
        - name: street2
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/street2"
        - name: street3
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/street3"
        - name: APIVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/APIVersion"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/GetShippingLabelOutputDisplay"
    post:
      operationId: POST_GetShippingLabel
      description: This operation generates a pre-paid UPS shipping label that you will use to ship your device to AWS for processing.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/GetShippingLabelOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/GetShippingLabelInput"
  /?Action=GetStatus&Version=2010-06-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_GetStatus
      description: This operation returns information about a job, including where the job is in the processing pipeline, the status of the results, and the signature value associated with the job. You can only return information about jobs you own.
      parameters:
        - name: JobId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
        - name: APIVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/APIVersion"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/GetStatusOutputDisplay"
    post:
      operationId: POST_GetStatus
      description: This operation returns information about a job, including where the job is in the processing pipeline, the status of the results, and the signature value associated with the job. You can only return information about jobs you own.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/GetStatusOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/GetStatusInput"
  /?Action=ListJobs&Version=2010-06-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_ListJobs
      description: This operation returns the jobs associated with the requester. AWS Import/Export lists the jobs in reverse chronological order based on the date of creation. For example if Job Test1 was created 2009Dec30 and Test2 was created 2010Feb05, the ListJobs operation would return Test2 followed by Test1.
      parameters:
        - name: MaxJobs
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxJobs"
        - name: Marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Marker"
        - name: APIVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/APIVersion"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ListJobsOutputDisplay"
    post:
      operationId: POST_ListJobs
      description: This operation returns the jobs associated with the requester. AWS Import/Export lists the jobs in reverse chronological order based on the date of creation. For example if Job Test1 was created 2009Dec30 and Test2 was created 2010Feb05, the ListJobs operation would return Test2 followed by Test1.
      responses:
