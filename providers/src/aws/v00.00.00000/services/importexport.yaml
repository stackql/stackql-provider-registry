components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    JobId:
      description: A unique identifier which refers to a particular job.
      type: string
    APIVersion:
      description: Specifies the version of the client tool.
      type: string
    CancelJobOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CancelJobOutputDisplay"
    CancelJobInput:
      description: Input structure for the CancelJob operation.
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/JobId"
        APIVersion:
          $ref: "#/components/schemas/APIVersion"
      required:
        - JobId
    JobType:
      description: Specifies whether the job to initiate is an import or export job.
      type: string
      enum:
        - Import
        - Export
    Manifest:
      description: The UTF-8 encoded text of the manifest file.
      type: string
    ManifestAddendum:
      description: For internal use only.
      type: string
    ValidateOnly:
      description: Validate the manifest and parameter values in the request but do not actually create a job.
      type: boolean
    CreateJobOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateJobOutputDisplay"
    CreateJobInput:
      description: Input structure for the CreateJob operation.
      type: object
      properties:
        JobType:
          $ref: "#/components/schemas/JobType"
        Manifest:
          $ref: "#/components/schemas/Manifest"
        ManifestAddendum:
          $ref: "#/components/schemas/ManifestAddendum"
        ValidateOnly:
          $ref: "#/components/schemas/ValidateOnly"
        APIVersion:
          $ref: "#/components/schemas/APIVersion"
      required:
        - JobType
        - Manifest
        - ValidateOnly
    JobIdList:
      type: array
      items:
        $ref: "#/components/schemas/GenericString"
    GenericString:
      type: string
    name:
      description: Specifies the name of the person responsible for shipping this package.
      type: string
    company:
      description: Specifies the name of the company that will ship this package.
      type: string
    phoneNumber:
      description: Specifies the phone number of the person responsible for shipping this package.
      type: string
    country:
      description: Specifies the name of your country for the return address.
      type: string
    stateOrProvince:
      description: Specifies the name of your state or your province for the return address.
      type: string
    city:
      description: Specifies the name of your city for the return address.
      type: string
    postalCode:
      description: Specifies the postal code for the return address.
      type: string
    street1:
      description: Specifies the first part of the street address for the return address, for example 1234 Main Street.
      type: string
    street2:
      description: Specifies the optional second part of the street address for the return address, for example Suite 100.
      type: string
    street3:
      description: Specifies the optional third part of the street address for the return address, for example c/o Jane Doe.
      type: string
    GetShippingLabelOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/GetShippingLabelOutputDisplay"
    GetShippingLabelInput:
      type: object
      properties:
        jobIds:
          $ref: "#/components/schemas/JobIdList"
        name:
          $ref: "#/components/schemas/name"
        company:
          $ref: "#/components/schemas/company"
        phoneNumber:
          $ref: "#/components/schemas/phoneNumber"
        country:
          $ref: "#/components/schemas/country"
        stateOrProvince:
          $ref: "#/components/schemas/stateOrProvince"
        city:
          $ref: "#/components/schemas/city"
        postalCode:
          $ref: "#/components/schemas/postalCode"
        street1:
          $ref: "#/components/schemas/street1"
        street2:
          $ref: "#/components/schemas/street2"
        street3:
          $ref: "#/components/schemas/street3"
        APIVersion:
          $ref: "#/components/schemas/APIVersion"
      required:
        - jobIds
    GetStatusOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/GetStatusOutputDisplay"
    GetStatusInput:
      description: Input structure for the GetStatus operation.
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/JobId"
        APIVersion:
          $ref: "#/components/schemas/APIVersion"
      required:
        - JobId
    MaxJobs:
      description: Sets the maximum number of jobs returned in the response. If there are additional jobs that were not returned because MaxJobs was exceeded, the response contains `<IsTruncated>`true</IsTruncated>. To return the additional jobs, see Marker.
      type: integer
    Marker:
      description: Specifies the JOBID to start after when listing the jobs created with your account. AWS Import/Export lists your jobs in reverse chronological order. See MaxJobs.
      type: string
    JobDisplay:
      type: object
      properties:
        JobId:
          type: string
          description: A unique identifier which refers to a particular job.
        CreationDate:
          type: string
          description: Timestamp of the CreateJob request in ISO8601 date format. For example "2010-03-28T20:27:35Z".
        IsCanceled:
          type: boolean
          description: Indicates whether the job was canceled.
        JobType:
          type: string
          description: Specifies whether the job to initiate is an import or export job.
    ListJobsOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/JobDisplay"
    ListJobsInput:
      description: Input structure for the ListJobs operation.
      type: object
      properties:
        MaxJobs:
          $ref: "#/components/schemas/MaxJobs"
        Marker:
          $ref: "#/components/schemas/Marker"
        APIVersion:
          $ref: "#/components/schemas/APIVersion"
    UpdateJobOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/UpdateJobOutputDisplay"
    UpdateJobInput:
      description: Input structure for the UpateJob operation.
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/JobId"
        Manifest:
          $ref: "#/components/schemas/Manifest"
        JobType:
          $ref: "#/components/schemas/JobType"
        ValidateOnly:
          $ref: "#/components/schemas/ValidateOnly"
        APIVersion:
          $ref: "#/components/schemas/APIVersion"
      required:
        - JobId
        - Manifest
        - JobType
        - ValidateOnly
