            schema:
              $ref: "#/components/schemas/ListJobsInput"
  /?Action=UpdateJob&Version=2010-06-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_UpdateJob
      description: You use this operation to change the parameters specified in the original manifest file by supplying a new manifest file. The manifest file attached to this request replaces the original manifest file. You can only use the operation after a CreateJob request but before the data transfer starts and you can only use it on jobs you own.
      parameters:
        - name: JobId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
        - name: Manifest
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Manifest"
        - name: JobType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/JobType"
        - name: ValidateOnly
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ValidateOnly"
        - name: APIVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/APIVersion"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/UpdateJobOutputDisplay"
    post:
      operationId: POST_UpdateJob
      description: You use this operation to change the parameters specified in the original manifest file by supplying a new manifest file. The manifest file attached to this request replaces the original manifest file. You can only use the operation after a CreateJob request but before the data transfer starts and you can only use it on jobs you own.
      responses:
        "200":
          description: Success
          content:
