openapi: 3.0.0
info:
  version: "2021-04-20"
  title: Amazon Chime SDK Identity
  description: Amazon Chime SDK Identity
  x-serviceName: chime
  x-serviceAlias: chime_sdk_identity
  x-protocol: rest-json
  x-apiVersion: "2021-04-20"
  x-endpointPrefix: identity-chime
servers:
  - url: https://identity-chime.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for chime-sdk-identity
paths:
  /app-instances:
    post:
      operationId: CreateAppInstance
      description: Creates an Amazon Chime SDK messaging AppInstance under an AWS account. Only SDK messaging customers use this API. CreateAppInstance supports idempotency behavior as described in the AWS API Standard. identity
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NonEmptyResourceName"
                Metadata:
                  $ref: "#/components/schemas/Metadata"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - Name
                - ClientRequestToken
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAppInstanceResponse"
    get:
      operationId: ListAppInstances
      description: Lists all Amazon Chime AppInstances created under a single AWS account.
      parameters:
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of AppInstances that you want to return.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token passed by previous API requests until you reach the maximum number of AppInstances.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppInstancesResponse"
  /app-instances/{app_instance_arn}/admins:
    post:
      operationId: CreateAppInstanceAdmin
      description: Promotes an AppInstanceUser or AppInstanceBot to an AppInstanceAdmin. The promoted entity can perform the following actions. ChannelModerator actions across all channels in the AppInstance. DeleteChannelMessage actions. Only an AppInstanceUser and AppInstanceBot can be promoted to an AppInstanceAdmin role.
      parameters:
        - name: app_instance_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AppInstanceAdminArn:
                  $ref: "#/components/schemas/ChimeArn"
              required:
                - AppInstanceAdminArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAppInstanceAdminResponse"
    get:
      operationId: ListAppInstanceAdmins
      description: Returns a list of the administrators in the AppInstance.
      parameters:
        - name: app_instance_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstance.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of administrators that you want to return.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token returned from previous API requests until the number of administrators is reached.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppInstanceAdminsResponse"
  /app-instance-bots:
    post:
      operationId: CreateAppInstanceBot
      description: Creates a bot under an Amazon Chime AppInstance. The request consists of a unique Configuration and Name for that bot.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AppInstanceArn:
                  $ref: "#/components/schemas/ChimeArn"
                Name:
                  $ref: "#/components/schemas/ResourceName"
                Metadata:
                  $ref: "#/components/schemas/Metadata"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Tags:
                  $ref: "#/components/schemas/TagList"
                Configuration:
                  $ref: "#/components/schemas/Configuration"
              required:
                - AppInstanceArn
                - ClientRequestToken
                - Configuration
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAppInstanceBotResponse"
    get:
      operationId: ListAppInstanceBots
      description: Lists all AppInstanceBots created under a single AppInstance.
      parameters:
        - name: app-instance-arn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstance.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of requests to return.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token passed by previous API calls until all requested bots are returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppInstanceBotsResponse"
  /app-instance-users:
    post:
      operationId: CreateAppInstanceUser
      description: Creates a user under an Amazon Chime AppInstance. The request consists of a unique appInstanceUserId and Name for that user.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AppInstanceArn:
                  $ref: "#/components/schemas/ChimeArn"
                AppInstanceUserId:
                  $ref: "#/components/schemas/UserId"
                Name:
                  $ref: "#/components/schemas/UserName"
                Metadata:
                  $ref: "#/components/schemas/Metadata"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Tags:
                  $ref: "#/components/schemas/TagList"
                ExpirationSettings:
                  $ref: "#/components/schemas/ExpirationSettings"
              required:
                - AppInstanceArn
                - AppInstanceUserId
                - Name
                - ClientRequestToken
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAppInstanceUserResponse"
    get:
      operationId: ListAppInstanceUsers
      description: List all AppInstanceUsers created under a single AppInstance.
      parameters:
        - name: app-instance-arn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstance.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of requests that you want returned.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token passed by previous API calls until all requested users are returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppInstanceUsersResponse"
  /app-instances/{app_instance_arn}:
    delete:
      operationId: DeleteAppInstance
      description: Deletes an AppInstance and all associated data asynchronously.
      parameters:
        - name: app_instance_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstance.
      responses:
        "204":
          description: Success
    get:
      operationId: DescribeAppInstance
      description: Returns the full details of an AppInstance.
      parameters:
        - name: app_instance_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstance.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAppInstanceResponse"
    put:
      operationId: UpdateAppInstance
      description: Updates AppInstance metadata.
      parameters:
        - name: app_instance_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NonEmptyResourceName"
                Metadata:
                  $ref: "#/components/schemas/Metadata"
              required:
                - Name
                - Metadata
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAppInstanceResponse"
  /app-instances/{app_instance_arn}/admins/{app_instance_admin_arn}:
    delete:
      operationId: DeleteAppInstanceAdmin
      description: Demotes an AppInstanceAdmin to an AppInstanceUser or AppInstanceBot. This action does not delete the user.
      parameters:
        - name: app_instance_admin_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstance's administrator.
        - name: app_instance_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstance.
      responses:
        "204":
          description: Success
    get:
      operationId: DescribeAppInstanceAdmin
      description: Returns the full details of an AppInstanceAdmin.
      parameters:
        - name: app_instance_admin_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceAdmin.
        - name: app_instance_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstance.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAppInstanceAdminResponse"
  /app-instance-bots/{app_instance_bot_arn}:
    delete:
      operationId: DeleteAppInstanceBot
      description: Deletes an AppInstanceBot.
      parameters:
        - name: app_instance_bot_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceBot being deleted.
      responses:
        "204":
          description: Success
    get:
      operationId: DescribeAppInstanceBot
      description: The AppInstanceBot's information.
      parameters:
        - name: app_instance_bot_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceBot.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAppInstanceBotResponse"
    put:
      operationId: UpdateAppInstanceBot
      description: Updates the name and metadata of an AppInstanceBot.
      parameters:
        - name: app_instance_bot_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceBot.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ResourceName"
                Metadata:
                  $ref: "#/components/schemas/Metadata"
                Configuration:
                  $ref: "#/components/schemas/Configuration"
              required:
                - Name
                - Metadata
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAppInstanceBotResponse"
  /app-instance-users/{app_instance_user_arn}:
    delete:
      operationId: DeleteAppInstanceUser
      description: Deletes an AppInstanceUser.
      parameters:
        - name: app_instance_user_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the user request being deleted.
      responses:
        "204":
          description: Success
    get:
      operationId: DescribeAppInstanceUser
      description: Returns the full details of an AppInstanceUser.
      parameters:
        - name: app_instance_user_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAppInstanceUserResponse"
    put:
      operationId: UpdateAppInstanceUser
      description: Updates the details of an AppInstanceUser. You can update names and metadata.
      parameters:
        - name: app_instance_user_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/UserName"
                Metadata:
                  $ref: "#/components/schemas/Metadata"
              required:
                - Name
                - Metadata
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAppInstanceUserResponse"
  /app-instance-users/{app_instance_user_arn}/endpoints/{endpoint_id}:
    delete:
      operationId: DeregisterAppInstanceUserEndpoint
      description: Deregisters an AppInstanceUserEndpoint.
      parameters:
        - name: app_instance_user_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser.
        - name: endpoint_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String64"
          description: The unique identifier of the AppInstanceUserEndpoint.
      responses:
        "204":
          description: Success
    get:
      operationId: DescribeAppInstanceUserEndpoint
      description: Returns the full details of an AppInstanceUserEndpoint.
      parameters:
        - name: app_instance_user_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String1600"
          description: The ARN of the AppInstanceUser.
        - name: endpoint_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String64"
          description: The unique identifier of the AppInstanceUserEndpoint.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAppInstanceUserEndpointResponse"
    put:
      operationId: UpdateAppInstanceUserEndpoint
      description: Updates the details of an AppInstanceUserEndpoint. You can update the name and AllowMessage values.
      parameters:
        - name: app_instance_user_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser.
        - name: endpoint_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String64"
          description: The unique identifier of the AppInstanceUserEndpoint.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/SensitiveString1600"
                AllowMessages:
                  $ref: "#/components/schemas/AllowMessages"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAppInstanceUserEndpointResponse"
  /app-instances/{app_instance_arn}/retention-settings:
    get:
      operationId: GetAppInstanceRetentionSettings
      description: Gets the retention settings for an AppInstance.
      parameters:
        - name: app_instance_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstance.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAppInstanceRetentionSettingsResponse"
    put:
      operationId: PutAppInstanceRetentionSettings
      description: Sets the amount of time in days that a given AppInstance retains data.
      parameters:
        - name: app_instance_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AppInstanceRetentionSettings:
                  $ref: "#/components/schemas/AppInstanceRetentionSettings"
              required:
                - AppInstanceRetentionSettings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutAppInstanceRetentionSettingsResponse"
  /app-instance-users/{app_instance_user_arn}/endpoints:
    get:
      operationId: ListAppInstanceUserEndpoints
      description: Lists all the AppInstanceUserEndpoints created under a single AppInstanceUser.
      parameters:
        - name: app_instance_user_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SensitiveChimeArn"
          description: The ARN of the AppInstanceUser.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of endpoints that you want to return.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token passed by previous API calls until all requested endpoints are returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppInstanceUserEndpointsResponse"
    post:
      operationId: RegisterAppInstanceUserEndpoint
      description: Registers an endpoint under an Amazon Chime AppInstanceUser. The endpoint receives messages for a user. For push notifications, the endpoint is a mobile device used to receive mobile push notifications for a user.
      parameters:
        - name: app_instance_user_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SensitiveChimeArn"
          description: The ARN of the AppInstanceUser.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/SensitiveString1600"
                Type:
                  $ref: "#/components/schemas/AppInstanceUserEndpointType"
                ResourceArn:
                  $ref: "#/components/schemas/ChimeArn"
                EndpointAttributes:
                  $ref: "#/components/schemas/EndpointAttributes"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                AllowMessages:
                  $ref: "#/components/schemas/AllowMessages"
              required:
                - Type
                - ResourceArn
                - EndpointAttributes
                - ClientRequestToken
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterAppInstanceUserEndpointResponse"
  /tags:
    get:
      operationId: ListTagsForResource
      description: Lists the tags applied to an Amazon Chime SDK identity resource.
      parameters:
        - name: arn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /app-instance-users/{app_instance_user_arn}/expiration-settings:
    put:
      operationId: PutAppInstanceUserExpirationSettings
      description: Sets the number of days before the AppInstanceUser is automatically deleted. A background process deletes expired AppInstanceUsers within 6 hours of expiration. Actual deletion times may vary. Expired AppInstanceUsers that have not yet been deleted appear as active, and you can update their expiration settings. The system honors the new settings.
      parameters:
        - name: app_instance_user_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ExpirationSettings:
                  $ref: "#/components/schemas/ExpirationSettings"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutAppInstanceUserExpirationSettingsResponse"
  /tags?operation=tag-resource:
    post:
      operationId: TagResource
      description: Applies the specified tags to the specified Amazon Chime SDK identity resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/ChimeArn"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - ResourceARN
      responses:
        "204":
          description: Success
  /tags?operation=untag-resource:
    post:
      operationId: UntagResource
      description: Removes the specified tags from the specified Amazon Chime SDK identity resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/ChimeArn"
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - ResourceARN
                - TagKeys
      responses:
        "204":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    NonEmptyResourceName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\u0009\\u000A\\u000D\\u0020-\\u007E\\u0085\\u00A0-\\uD7FF\\uE000-\\uFFFD\\u10000-\\u10FFFF]*"
    Metadata:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: .*
    ClientRequestToken:
      type: string
      minLength: 2
      maxLength: 64
      pattern: "[-_a-zA-Z0-9]*"
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A tag object containing a key-value pair.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key in a tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value in a tag.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 1
      maxLength: 256
    CreateAppInstanceResponse:
      type: object
      properties:
        AppInstanceArn:
          $ref: "#/components/schemas/ChimeArn"
          description: The Amazon Resource Number (ARN) of the AppInstance.
    ChimeArn:
      type: string
      minLength: 5
      maxLength: 1600
      pattern: arn:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[^/].{0,1023}
    CreateAppInstanceAdminResponse:
      type: object
      properties:
        AppInstanceAdmin:
          $ref: "#/components/schemas/Identity"
          description: The ARN and name of the administrator, the ARN of the AppInstance, and the created and last-updated timestamps. All timestamps use epoch milliseconds.
        AppInstanceArn:
          $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the of the admin for the AppInstance.
    Identity:
      description: The details of a user or bot.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ChimeArn"
          description: The ARN in an Identity.
        Name:
          $ref: "#/components/schemas/ResourceName"
          description: The name in an Identity.
    ResourceName:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[\\u0009\\u000A\\u000D\\u0020-\\u007E\\u0085\\u00A0-\\uD7FF\\uE000-\\uFFFD\\u10000-\\u10FFFF]*"
    Configuration:
      description: A structure that contains configuration data.
      type: object
      properties:
        Lex:
          $ref: "#/components/schemas/LexConfiguration"
          description: The configuration for an Amazon Lex V2 bot.
      required:
        - Lex
