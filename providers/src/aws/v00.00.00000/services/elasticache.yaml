openapi: 3.0.0
info:
  version: "2015-02-02"
  title: Amazon ElastiCache
  description: Amazon ElastiCache
  x-serviceName: elasticache
  x-serviceAlias: elasticache
  x-protocol: query
  x-apiVersion: "2015-02-02"
  x-endpointPrefix: elasticache
servers:
  - url: https://elasticache.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for elasticache
paths:
  /?Action=AddTagsToResource&Version=2015-02-02:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AddTagsToResource
      description: A tag is a key-value pair where the key and value are case-sensitive. You can use tags to categorize and track all your ElastiCache resources, with the exception of global replication group. When you add or remove tags on replication groups, those actions will be replicated to all nodes in the replication group. For more information, see Resource-level permissions. For example, you can use cost-allocation tags to your ElastiCache resources, Amazon generates a cost allocation report as a comma-separated value (CSV) file with your usage and costs aggregated by your tags. You can apply tags that represent business categories (such as cost centers, application names, or owners) to organize your costs across multiple services. For more information, see Using Cost Allocation Tags in Amazon ElastiCache in the ElastiCache User Guide.
      parameters:
        - name: ResourceName
          in: query
          required: true
          description: The Amazon Resource Name (ARN) of the resource to which the tags are to be added, for example arn:aws:elasticache:us-west-2:0123456789:cluster:myCluster or arn:aws:elasticache:us-west-2:0123456789:snapshot:mySnapshot. ElastiCache resources are cluster and snapshot. For more information about ARNs, see Amazon Resource Names (ARNs) and Amazon Service Namespaces.
          schema:
            $ref: "#/components/schemas/String"
        - name: Tags
          in: query
          required: true
          description: A list of tags to be added to this resource. A tag is a key-value pair. A tag key must be accompanied by a tag value, although null is accepted.
          schema:
            $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AddTagsToResourceOutputDisplay"
    post:
      operationId: POST_AddTagsToResource
      description: A tag is a key-value pair where the key and value are case-sensitive. You can use tags to categorize and track all your ElastiCache resources, with the exception of global replication group. When you add or remove tags on replication groups, those actions will be replicated to all nodes in the replication group. For more information, see Resource-level permissions. For example, you can use cost-allocation tags to your ElastiCache resources, Amazon generates a cost allocation report as a comma-separated value (CSV) file with your usage and costs aggregated by your tags. You can apply tags that represent business categories (such as cost centers, application names, or owners) to organize your costs across multiple services. For more information, see Using Cost Allocation Tags in Amazon ElastiCache in the ElastiCache User Guide.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AddTagsToResourceOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AddTagsToResourceMessage"
  /?Action=AuthorizeCacheSecurityGroupIngress&Version=2015-02-02:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AuthorizeCacheSecurityGroupIngress
      description: Allows network ingress to a cache security group. Applications using ElastiCache must be running on Amazon EC2, and Amazon EC2 security groups are used as the authorization mechanism. You cannot authorize ingress from an Amazon EC2 security group in one region to an ElastiCache cluster in another region.
      parameters:
        - name: CacheSecurityGroupName
          in: query
          required: true
          description: The cache security group that allows network ingress.
          schema:
            $ref: "#/components/schemas/String"
        - name: EC2SecurityGroupName
          in: query
          required: true
          description: The Amazon EC2 security group to be authorized for ingress to the cache security group.
          schema:
            $ref: "#/components/schemas/String"
        - name: EC2SecurityGroupOwnerId
          in: query
          required: true
          description: The Amazon account number of the Amazon EC2 security group owner. Note that this is not the same thing as an Amazon access key ID - you must provide a valid Amazon account number for this parameter.
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AuthorizeCacheSecurityGroupIngressOutputDisplay"
    post:
      operationId: POST_AuthorizeCacheSecurityGroupIngress
      description: Allows network ingress to a cache security group. Applications using ElastiCache must be running on Amazon EC2, and Amazon EC2 security groups are used as the authorization mechanism. You cannot authorize ingress from an Amazon EC2 security group in one region to an ElastiCache cluster in another region.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AuthorizeCacheSecurityGroupIngressOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AuthorizeCacheSecurityGroupIngressMessage"
  /?Action=BatchApplyUpdateAction&Version=2015-02-02:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
