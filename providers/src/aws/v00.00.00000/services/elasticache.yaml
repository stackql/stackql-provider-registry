components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    String:
      type: string
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A tag that can be added to an ElastiCache cluster or replication group. Tags are composed of a Key/Value pair. You can use tags to categorize and track all your ElastiCache resources, with the exception of global replication group. When you add or remove tags on replication groups, those actions will be replicated to all nodes in the replication group. A tag with a null Value is permitted.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/String"
          description: The key for the tag. May not be null.
        Value:
          $ref: "#/components/schemas/String"
          description: The tag's value. May be null.
    TagListMessageDisplay:
      type: object
      properties:
        TagList:
          type: string
          description: A list of tags as key-value pairs.
    AddTagsToResourceOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/TagListMessageDisplay"
    AddTagsToResourceMessage:
      description: Represents the input of an AddTagsToResource operation.
      type: object
      properties:
        ResourceName:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource to which the tags are to be added, for example arn:aws:elasticache:us-west-2:0123456789:cluster:myCluster or arn:aws:elasticache:us-west-2:0123456789:snapshot:mySnapshot. ElastiCache resources are cluster and snapshot. For more information about ARNs, see Amazon Resource Names (ARNs) and Amazon Service Namespaces.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tags to be added to this resource. A tag is a key-value pair. A tag key must be accompanied by a tag value, although null is accepted.
      required:
        - ResourceName
        - Tags
    CacheSecurityGroupDisplay:
      type: object
      properties:
        OwnerId:
          type: string
          description: The Amazon account ID of the cache security group owner.
        CacheSecurityGroupName:
          type: string
          description: The name of the cache security group.
        Description:
          type: string
          description: The description of the cache security group.
        EC2SecurityGroups:
          type: string
          description: A list of Amazon EC2 security groups that are associated with this cache security group.
        ARN:
          type: string
          description: The ARN of the cache security group,
    AuthorizeCacheSecurityGroupIngressOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CacheSecurityGroupDisplay"
    AuthorizeCacheSecurityGroupIngressMessage:
      description: Represents the input of an AuthorizeCacheSecurityGroupIngress operation.
      type: object
      properties:
        CacheSecurityGroupName:
          $ref: "#/components/schemas/String"
          description: The cache security group that allows network ingress.
        EC2SecurityGroupName:
          $ref: "#/components/schemas/String"
          description: The Amazon EC2 security group to be authorized for ingress to the cache security group.
        EC2SecurityGroupOwnerId:
          $ref: "#/components/schemas/String"
          description: The Amazon account number of the Amazon EC2 security group owner. Note that this is not the same thing as an Amazon access key ID - you must provide a valid Amazon account number for this parameter.
      required:
        - CacheSecurityGroupName
        - EC2SecurityGroupName
        - EC2SecurityGroupOwnerId
    ReplicationGroupIdList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    CacheClusterIdList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    UpdateActionResultsMessageDisplay:
      type: object
      properties:
        ProcessedUpdateActions:
          type: string
          description: Update actions that have been processed successfully
        UnprocessedUpdateActions:
          type: string
          description: Update actions that haven't been processed successfully
    BatchApplyUpdateActionOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/UpdateActionResultsMessageDisplay"
    BatchApplyUpdateActionMessage:
      type: object
      properties:
        ReplicationGroupIds:
          $ref: "#/components/schemas/ReplicationGroupIdList"
          description: The replication group IDs
        CacheClusterIds:
          $ref: "#/components/schemas/CacheClusterIdList"
          description: The cache cluster IDs
        ServiceUpdateName:
          $ref: "#/components/schemas/String"
          description: The unique ID of the service update
      required:
        - ServiceUpdateName
    BatchStopUpdateActionOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/UpdateActionResultsMessageDisplay"
    BatchStopUpdateActionMessage:
      type: object
      properties:
        ReplicationGroupIds:
          $ref: "#/components/schemas/ReplicationGroupIdList"
          description: The replication group IDs
        CacheClusterIds:
          $ref: "#/components/schemas/CacheClusterIdList"
          description: The cache cluster IDs
        ServiceUpdateName:
          $ref: "#/components/schemas/String"
          description: The unique ID of the service update
      required:
        - ServiceUpdateName
    Boolean:
      type: boolean
    ReplicationGroupDisplay:
      type: object
      properties:
        ReplicationGroupId:
          type: string
          description: The identifier for the replication group.
        Description:
          type: string
          description: The user supplied description of the replication group.
        GlobalReplicationGroupInfo:
          type: string
          description: The name of the Global datastore and role of this replication group in the Global datastore.
        Status:
          type: string
          description: The current state of this replication group - creating, available, modifying, deleting, create-failed, snapshotting.
        PendingModifiedValues:
          type: string
          description: A group of settings to be applied to the replication group, either immediately or during the next maintenance window.
        MemberClusters:
          type: string
          description: The names of all the cache clusters that are part of this replication group.
        NodeGroups:
          type: string
          description: A list of node groups in this replication group. For Valkey or Redis OSS (cluster mode disabled) replication groups, this is a single-element list. For Valkey or Redis OSS (cluster mode enabled) replication groups, the list contains an entry for each node group (shard).
        SnapshottingClusterId:
          type: string
          description: The cluster ID that is used as the daily snapshot source for the replication group.
        AutomaticFailover:
          type: string
          description: Indicates the status of automatic failover for this Valkey or Redis OSS replication group.
        MultiAZ:
          type: string
          description: "A flag indicating if you have Multi-AZ enabled to enhance fault tolerance. For more information, see Minimizing Downtime: Multi-AZ"
        ConfigurationEndpoint:
          type: string
          description: The configuration endpoint for this replication group. Use the configuration endpoint to connect to this replication group.
        SnapshotRetentionLimit:
          type: integer
          description: The number of days for which ElastiCache retains automatic cluster snapshots before deleting them. For example, if you set SnapshotRetentionLimit to 5, a snapshot that was taken today is retained for 5 days before being deleted. If the value of SnapshotRetentionLimit is set to zero (0), backups are turned off.
        SnapshotWindow:
          type: string
          description: "The daily time range (in UTC) during which ElastiCache begins taking a daily snapshot of your node group (shard). Example: 05:00-09:00 If you do not specify this parameter, ElastiCache automatically chooses an appropriate time range. This parameter is only valid if the Engine parameter is redis."
        ClusterEnabled:
          type: boolean
          description: "A flag indicating whether or not this replication group is cluster enabled; i.e., whether its data can be partitioned across multiple shards (API/CLI: node groups). Valid values: true | false"
        CacheNodeType:
          type: string
          description: The name of the compute and memory capacity node type for each node in the replication group.
        AuthTokenEnabled:
          type: boolean
          description: "A flag that enables using an AuthToken (password) when issuing Valkey or Redis OSS commands. Default: false"
        AuthTokenLastModifiedDate:
          type: string
          description: The date the auth token was last modified
        TransitEncryptionEnabled:
          type: boolean
          description: "A flag that enables in-transit encryption when set to true. Required: Only available when creating a replication group in an Amazon VPC using Redis OSS version 3.2.6, 4.x or later. Default: false"
        AtRestEncryptionEnabled:
          type: boolean
          description: "A flag that enables encryption at-rest when set to true. You cannot modify the value of AtRestEncryptionEnabled after the cluster is created. To enable encryption at-rest on a cluster you must set AtRestEncryptionEnabled to true when you create a cluster. Required: Only available when creating a replication group in an Amazon VPC using Redis OSS version 3.2.6, 4.x or later. Default: false"
        MemberClustersOutpostArns:
          type: string
          description: The outpost ARNs of the replication group's member clusters.
        KmsKeyId:
          type: string
          description: The ID of the KMS key used to encrypt the disk in the cluster.
        ARN:
          type: string
          description: The ARN (Amazon Resource Name) of the replication group.
        UserGroupIds:
          type: string
          description: The ID of the user group associated to the replication group.
        LogDeliveryConfigurations:
          type: string
          description: Returns the destination, format and type of the logs.
        ReplicationGroupCreateTime:
          type: string
          description: The date and time when the cluster was created.
        DataTiering:
          type: string
          description: Enables data tiering. Data tiering is only supported for replication groups using the r6gd node type. This parameter must be set to true when using r6gd nodes. For more information, see Data tiering.
        AutoMinorVersionUpgrade:
          type: boolean
          description: If you are running Valkey 7.2 and above, or Redis OSS engine version 6.0 and above, set this parameter to yes if you want to opt-in to the next auto minor version upgrade campaign. This parameter is disabled for previous versions.
        NetworkType:
          type: string
          description: Must be either ipv4 | ipv6 | dual_stack. IPv6 is supported for workloads using Valkey 7.2 and above, Redis OSS engine version 6.2 to 7.1 or Memcached engine version 1.6.6 and above on all instances built on the Nitro system.
        IpDiscovery:
          type: string
          description: The network type you choose when modifying a cluster, either ipv4 | ipv6. IPv6 is supported for workloads using Valkey 7.2 and above, Redis OSS engine version 6.2 to 7.1 or Memcached engine version 1.6.6 and above on all instances built on the Nitro system.
        TransitEncryptionMode:
          type: string
          description: A setting that allows you to migrate your clients to use in-transit encryption, with no downtime.
        ClusterMode:
          type: string
          description: Enabled or Disabled. To modify cluster mode from Disabled to Enabled, you must first set the cluster mode to Compatible. Compatible mode allows your Valkey or Redis OSS clients to connect using both cluster mode enabled and cluster mode disabled. After you migrate all Valkey or Redis OSS clients to use cluster mode enabled, you can then complete cluster mode configuration and set the cluster mode to Enabled.
        Engine:
          type: string
          description: The engine used in a replication group. The options are valkey, memcached or redis.
    CompleteMigrationOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ReplicationGroupDisplay"
    CompleteMigrationMessage:
      type: object
      properties:
        ReplicationGroupId:
          $ref: "#/components/schemas/String"
          description: The ID of the replication group to which data is being migrated.
        Force:
          $ref: "#/components/schemas/Boolean"
          description: Forces the migration to stop without ensuring that data is in sync. It is recommended to use this option only to abort the migration and not recommended when application wants to continue migration to ElastiCache.
      required:
        - ReplicationGroupId
    ServerlessCacheSnapshotDisplay:
      type: object
      properties:
        ServerlessCacheSnapshotName:
          type: string
          description: The identifier of a serverless cache snapshot. Available for Valkey, Redis OSS and Serverless Memcached only.
        ARN:
          type: string
          description: The Amazon Resource Name (ARN) of a serverless cache snapshot. Available for Valkey, Redis OSS and Serverless Memcached only.
        KmsKeyId:
          type: string
          description: The ID of the Amazon Web Services Key Management Service (KMS) key of a serverless cache snapshot. Available for Valkey, Redis OSS and Serverless Memcached only.
        SnapshotType:
          type: string
          description: The type of snapshot of serverless cache. Available for Valkey, Redis OSS and Serverless Memcached only.
        Status:
          type: string
