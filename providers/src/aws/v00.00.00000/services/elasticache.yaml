          in: query
          required: false
          description: "The upgraded version of the cache engine to be run on the clusters in the replication group. Important: You can upgrade to a newer engine version (see Selecting a Cache Engine and Version), but you cannot downgrade to an earlier engine version. If you want to use an earlier engine version, you must delete the existing replication group and create it anew with the earlier engine version."
          schema:
            $ref: "#/components/schemas/String"
        - name: AutoMinorVersionUpgrade
          in: query
          required: false
          description: If you are running Valkey or Redis OSS engine version 6.0 or later, set this parameter to yes if you want to opt-in to the next auto minor version upgrade campaign. This parameter is disabled for previous versions.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: SnapshotRetentionLimit
          in: query
          required: false
          description: The number of days for which ElastiCache retains automatic node group (shard) snapshots before deleting them. For example, if you set SnapshotRetentionLimit to 5, a snapshot that was taken today is retained for 5 days before being deleted. Important If the value of SnapshotRetentionLimit is set to zero (0), backups are turned off.
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: SnapshotWindow
          in: query
          required: false
          description: "The daily time range (in UTC) during which ElastiCache begins taking a daily snapshot of the node group (shard) specified by SnapshottingClusterId. Example: 05:00-09:00 If you do not specify this parameter, ElastiCache automatically chooses an appropriate time range."
          schema:
            $ref: "#/components/schemas/String"
        - name: CacheNodeType
          in: query
          required: false
          description: A valid cache node type that you want to scale this replication group to.
          schema:
            $ref: "#/components/schemas/String"
        - name: AuthToken
          in: query
          required: false
          description: "Reserved parameter. The password used to access a password protected server. This parameter must be specified with the auth-token-update-strategy parameter. Password constraints: Must be only printable ASCII characters Must be at least 16 characters and no more than 128 characters in length Cannot contain any of the following characters: '/', '\"', or '@', '%' For more information, see AUTH password at AUTH."
          schema:
            $ref: "#/components/schemas/String"
        - name: AuthTokenUpdateStrategy
          in: query
          required: false
          description: "Specifies the strategy to use to update the AUTH token. This parameter must be specified with the auth-token parameter. Possible values: ROTATE - default, if no update strategy is provided SET - allowed only after ROTATE DELETE - allowed only when transitioning to RBAC For more information, see Authenticating Users with AUTH"
          schema:
            $ref: "#/components/schemas/AuthTokenUpdateStrategyType"
        - name: UserGroupIdsToAdd
          in: query
          required: false
          description: The ID of the user group you are associating with the replication group.
          schema:
            $ref: "#/components/schemas/UserGroupIdList"
        - name: UserGroupIdsToRemove
          in: query
          required: false
          description: The ID of the user group to disassociate from the replication group, meaning the users in the group no longer can access the replication group.
          schema:
            $ref: "#/components/schemas/UserGroupIdList"
        - name: RemoveUserGroups
          in: query
          required: false
          description: Removes the user group associated with this replication group.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: LogDeliveryConfigurations
          in: query
          required: false
          description: Specifies the destination, format and type of the logs.
          schema:
            $ref: "#/components/schemas/LogDeliveryConfigurationRequestList"
        - name: IpDiscovery
          in: query
          required: false
          description: The network type you choose when modifying a cluster, either ipv4 | ipv6. IPv6 is supported for workloads using Valkey 7.2 and above, Redis OSS engine version 6.2 to 7.1 and Memcached engine version 1.6.6 and above on all instances built on the Nitro system.
          schema:
            $ref: "#/components/schemas/IpDiscovery"
        - name: TransitEncryptionEnabled
          in: query
          required: false
          description: A flag that enables in-transit encryption when set to true. If you are enabling in-transit encryption for an existing cluster, you must also set TransitEncryptionMode to preferred.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: TransitEncryptionMode
          in: query
          required: false
          description: A setting that allows you to migrate your clients to use in-transit encryption, with no downtime. You must set TransitEncryptionEnabled to true, for your existing cluster, and set TransitEncryptionMode to preferred in the same request to allow both encrypted and unencrypted connections at the same time. Once you migrate all your Valkey or Redis OSS clients to use encrypted connections you can set the value to required to allow encrypted connections only. Setting TransitEncryptionMode to required is a two-step process that requires you to first set the TransitEncryptionMode to preferred, after that you can set TransitEncryptionMode to required.
          schema:
            $ref: "#/components/schemas/TransitEncryptionMode"
        - name: ClusterMode
          in: query
          required: false
          description: Enabled or Disabled. To modify cluster mode from Disabled to Enabled, you must first set the cluster mode to Compatible. Compatible mode allows your Valkey or Redis OSS clients to connect using both cluster mode enabled and cluster mode disabled. After you migrate all Valkey or Redis OSS clients to use cluster mode enabled, you can then complete cluster mode configuration and set the cluster mode to Enabled.
          schema:
            $ref: "#/components/schemas/ClusterMode"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ModifyReplicationGroupOutputDisplay"
    post:
      operationId: POST_ModifyReplicationGroup
      description: Modifies the settings for a replication group. This is limited to Valkey and Redis OSS 7 and above. Scaling for Valkey or Redis OSS (cluster mode enabled) in the ElastiCache User Guide ModifyReplicationGroupShardConfiguration in the ElastiCache API Reference This operation is valid for Valkey or Redis OSS only.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ModifyReplicationGroupOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/ModifyReplicationGroupMessage"
  /?Action=ModifyReplicationGroupShardConfiguration&Version=2015-02-02:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_ModifyReplicationGroupShardConfiguration
      description: Modifies a replication group's shards (node groups) by allowing you to add shards, remove shards, or rebalance the keyspaces among existing shards.
      parameters:
        - name: ReplicationGroupId
          in: query
          required: true
          description: The name of the Valkey or Redis OSS (cluster mode enabled) cluster (replication group) on which the shards are to be configured.
          schema:
            $ref: "#/components/schemas/String"
        - name: NodeGroupCount
          in: query
          required: true
          description: The number of node groups (shards) that results from the modification of the shard configuration.
          schema:
            $ref: "#/components/schemas/Integer"
        - name: ApplyImmediately
          in: query
          required: true
          description: "Indicates that the shard reconfiguration process begins immediately. At present, the only permitted value for this parameter is true. Value: true"
          schema:
            $ref: "#/components/schemas/Boolean"
        - name: ReshardingConfiguration
          in: query
          required: false
          description: Specifies the preferred availability zones for each node group in the cluster. If the value of NodeGroupCount is greater than the current number of node groups (shards), you can use this parameter to specify the preferred availability zones of the cluster's shards. If you omit this parameter ElastiCache selects availability zones for you. You can specify this parameter only if the value of NodeGroupCount is greater than the current number of node groups (shards).
          schema:
            $ref: "#/components/schemas/ReshardingConfigurationList"
        - name: NodeGroupsToRemove
          in: query
          required: false
          description: If the value of NodeGroupCount is less than the current number of node groups (shards), then either NodeGroupsToRemove or NodeGroupsToRetain is required. NodeGroupsToRemove is a list of NodeGroupIds to remove from the cluster. ElastiCache will attempt to remove all node groups listed by NodeGroupsToRemove from the cluster.
          schema:
            $ref: "#/components/schemas/NodeGroupsToRemoveList"
        - name: NodeGroupsToRetain
          in: query
          required: false
          description: If the value of NodeGroupCount is less than the current number of node groups (shards), then either NodeGroupsToRemove or NodeGroupsToRetain is required. NodeGroupsToRetain is a list of NodeGroupIds to retain in the cluster. ElastiCache will attempt to remove all node groups except those listed by NodeGroupsToRetain from the cluster.
          schema:
            $ref: "#/components/schemas/NodeGroupsToRetainList"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ModifyReplicationGroupShardConfigurationOutputDisplay"
    post:
      operationId: POST_ModifyReplicationGroupShardConfiguration
      description: Modifies a replication group's shards (node groups) by allowing you to add shards, remove shards, or rebalance the keyspaces among existing shards.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ModifyReplicationGroupShardConfigurationOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/ModifyReplicationGroupShardConfigurationMessage"
  /?Action=ModifyServerlessCache&Version=2015-02-02:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_ModifyServerlessCache
      description: This API modifies the attributes of a serverless cache.
      parameters:
        - name: ServerlessCacheName
          in: query
          required: true
          description: User-provided identifier for the serverless cache to be modified.
          schema:
            $ref: "#/components/schemas/String"
        - name: Description
          in: query
          required: false
          description: User provided description for the serverless cache. Default = NULL, i.e. the existing description is not removed/modified. The description has a maximum length of 255 characters.
          schema:
            $ref: "#/components/schemas/String"
        - name: CacheUsageLimits
          in: query
          required: false
          description: Modify the cache usage limit for the serverless cache.
          schema:
            $ref: "#/components/schemas/CacheUsageLimits"
        - name: RemoveUserGroup
          in: query
          required: false
          description: The identifier of the UserGroup to be removed from association with the Valkey and Redis OSS serverless cache. Available for Valkey and Redis OSS only. Default is NULL.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: UserGroupId
          in: query
          required: false
          description: The identifier of the UserGroup to be associated with the serverless cache. Available for Valkey and Redis OSS only. Default is NULL - the existing UserGroup is not removed.
          schema:
            $ref: "#/components/schemas/String"
        - name: SecurityGroupIds
          in: query
          required: false
          description: The new list of VPC security groups to be associated with the serverless cache. Populating this list means the current VPC security groups will be removed. This security group is used to authorize traffic access for the VPC end-point (private-link). Default = NULL - the existing list of VPC security groups is not removed.
          schema:
            $ref: "#/components/schemas/SecurityGroupIdsList"
        - name: SnapshotRetentionLimit
          in: query
          required: false
          description: The number of days for which Elasticache retains automatic snapshots before deleting them. Available for Valkey, Redis OSS and Serverless Memcached only. Default = NULL, i.e. the existing snapshot-retention-limit will not be removed or modified. The maximum value allowed is 35 days.
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: DailySnapshotTime
          in: query
          required: false
          description: The daily time during which Elasticache begins taking a daily snapshot of the serverless cache. Available for Valkey, Redis OSS and Serverless Memcached only. The default is NULL, i.e. the existing snapshot time configured for the cluster is not removed.
          schema:
            $ref: "#/components/schemas/String"
        - name: Engine
          in: query
          required: false
          description: Modifies the engine listed in a serverless cache request. The options are valkey, memcached or redis.
          schema:
            $ref: "#/components/schemas/String"
        - name: MajorEngineVersion
          in: query
          required: false
          description: Modifies the engine vesion listed in a serverless cache request.
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ModifyServerlessCacheOutputDisplay"
    post:
      operationId: POST_ModifyServerlessCache
      description: This API modifies the attributes of a serverless cache.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ModifyServerlessCacheOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/ModifyServerlessCacheRequest"
