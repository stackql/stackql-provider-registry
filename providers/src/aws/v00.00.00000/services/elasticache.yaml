          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/IncreaseReplicaCountOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/IncreaseReplicaCountMessage"
