    Integer:
      type: integer
    GlobalNodeGroupIdList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    DecreaseNodeGroupsInGlobalReplicationGroupOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/GlobalReplicationGroupDisplay"
    DecreaseNodeGroupsInGlobalReplicationGroupMessage:
      type: object
      properties:
        GlobalReplicationGroupId:
          $ref: "#/components/schemas/String"
          description: The name of the Global datastore
        NodeGroupCount:
          $ref: "#/components/schemas/Integer"
          description: The number of node groups (shards) that results from the modification of the shard configuration
        GlobalNodeGroupsToRemove:
          $ref: "#/components/schemas/GlobalNodeGroupIdList"
          description: If the value of NodeGroupCount is less than the current number of node groups (shards), then either NodeGroupsToRemove or NodeGroupsToRetain is required. GlobalNodeGroupsToRemove is a list of NodeGroupIds to remove from the cluster. ElastiCache will attempt to remove all node groups listed by GlobalNodeGroupsToRemove from the cluster.
        GlobalNodeGroupsToRetain:
          $ref: "#/components/schemas/GlobalNodeGroupIdList"
          description: If the value of NodeGroupCount is less than the current number of node groups (shards), then either NodeGroupsToRemove or NodeGroupsToRetain is required. GlobalNodeGroupsToRetain is a list of NodeGroupIds to retain from the cluster. ElastiCache will attempt to retain all node groups listed by GlobalNodeGroupsToRetain from the cluster.
        ApplyImmediately:
          $ref: "#/components/schemas/Boolean"
          description: Indicates that the shard reconfiguration process begins immediately. At present, the only permitted value for this parameter is true.
      required:
        - GlobalReplicationGroupId
        - NodeGroupCount
        - ApplyImmediately
    ReplicaConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/ConfigureShard"
    ConfigureShard:
      description: "Node group (shard) configuration options when adding or removing replicas. Each node group (shard) configuration has the following members: NodeGroupId, NewReplicaCount, and PreferredAvailabilityZones."
      type: object
      properties:
        NodeGroupId:
          $ref: "#/components/schemas/AllowedNodeGroupId"
          description: The 4-digit id for the node group you are configuring. For Valkey or Redis OSS (cluster mode disabled) replication groups, the node group id is always 0001. To find a Valkey or Redis OSS (cluster mode enabled)'s node group's (shard's) id, see Finding a Shard's Id.
        NewReplicaCount:
          $ref: "#/components/schemas/Integer"
          description: "The number of replicas you want in this node group at the end of this operation. The maximum value for NewReplicaCount is 5. The minimum value depends upon the type of Valkey or Redis OSS replication group you are working with. The minimum number of replicas in a shard or replication group is: Valkey or Redis OSS (cluster mode disabled) If Multi-AZ: 1 If Multi-AZ: 0 Valkey or Redis OSS (cluster mode enabled): 0 (though you will not be able to failover to a replica if your primary node fails)"
        PreferredAvailabilityZones:
          $ref: "#/components/schemas/PreferredAvailabilityZoneList"
          description: A list of PreferredAvailabilityZone strings that specify which availability zones the replication group's nodes are to be in. The nummber of PreferredAvailabilityZone values must equal the value of NewReplicaCount plus 1 to account for the primary node. If this member of ReplicaConfiguration is omitted, ElastiCache selects the availability zone for each of the replicas.
        PreferredOutpostArns:
          $ref: "#/components/schemas/PreferredOutpostArnList"
          description: The outpost ARNs in which the cache cluster is created.
