        AuthTokenLastModifiedDate:
          type: string
          description: The date the auth token was last modified
        TransitEncryptionEnabled:
          type: boolean
          description: "A flag that enables in-transit encryption when set to true. Required: Only available when creating a replication group in an Amazon VPC using Redis OSS version 3.2.6, 4.x or later. Default: false"
        AtRestEncryptionEnabled:
          type: boolean
