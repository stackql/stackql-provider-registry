    get:
      operationId: GET_IncreaseReplicaCount
      description: Dynamically increases the number of replicas in a Valkey or Redis OSS (cluster mode disabled) replication group or the number of replica nodes in one or more node groups (shards) of a Valkey or Redis OSS (cluster mode enabled) replication group. This operation is performed with no cluster down time.
      parameters:
        - name: ReplicationGroupId
          in: query
          required: true
          description: The id of the replication group to which you want to add replica nodes.
          schema:
            $ref: "#/components/schemas/String"
        - name: NewReplicaCount
          in: query
          required: false
          description: The number of read replica nodes you want at the completion of this operation. For Valkey or Redis OSS (cluster mode disabled) replication groups, this is the number of replica nodes in the replication group. For Valkey or Redis OSS (cluster mode enabled) replication groups, this is the number of replica nodes in each of the replication group's node groups.
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: ReplicaConfiguration
          in: query
          required: false
          description: "A list of ConfigureShard objects that can be used to configure each shard in a Valkey or Redis OSS (cluster mode enabled) replication group. The ConfigureShard has three members: NewReplicaCount, NodeGroupId, and PreferredAvailabilityZones."
          schema:
            $ref: "#/components/schemas/ReplicaConfigurationList"
        - name: ApplyImmediately
          in: query
          required: true
          description: If True, the number of replica nodes is increased immediately. ApplyImmediately=False is not currently supported.
          schema:
            $ref: "#/components/schemas/Boolean"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/IncreaseReplicaCountOutputDisplay"
    post:
      operationId: POST_IncreaseReplicaCount
      description: Dynamically increases the number of replicas in a Valkey or Redis OSS (cluster mode disabled) replication group or the number of replica nodes in one or more node groups (shards) of a Valkey or Redis OSS (cluster mode enabled) replication group. This operation is performed with no cluster down time.
      responses:
