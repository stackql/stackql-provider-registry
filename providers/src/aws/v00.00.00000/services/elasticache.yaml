        SupportedNetworkTypes:
          type: string
          description: Either ipv4 | ipv6 | dual_stack. IPv6 is supported for workloads using Valkey 7.2 and above, Redis OSS engine version 6.2 to 7.1 or Memcached engine version 1.6.6 and above on all instances built on the Nitro system.
    CreateCacheSubnetGroupOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CacheSubnetGroupDisplay"
    CreateCacheSubnetGroupMessage:
      description: Represents the input of a CreateCacheSubnetGroup operation.
      type: object
      properties:
        CacheSubnetGroupName:
          $ref: "#/components/schemas/String"
          description: "A name for the cache subnet group. This value is stored as a lowercase string. Constraints: Must contain no more than 255 alphanumeric characters or hyphens. Example: mysubnetgroup"
        CacheSubnetGroupDescription:
          $ref: "#/components/schemas/String"
          description: A description for the cache subnet group.
        SubnetIds:
          $ref: "#/components/schemas/SubnetIdentifierList"
          description: A list of VPC subnet IDs for the cache subnet group.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tags to be added to this resource. A tag is a key-value pair. A tag key must be accompanied by a tag value, although null is accepted.
      required:
