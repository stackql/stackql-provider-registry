                $ref: "#/components/schemas/BatchStopUpdateActionOutputDisplay"
    post:
      operationId: POST_BatchStopUpdateAction
      description: Stop the service update. For more information on service updates and stopping them, see Stopping Service Updates.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/BatchStopUpdateActionOutputDisplay"
      parameters: []
