          description: Specify the input contents, as a string, for the source of an outbound transformation.
    InputFileSourceFileContentString:
      type: string
      minLength: 1
      maxLength: 5000000
    ConversionTarget:
      description: Provide a sample of what the output of the transformation should look like.
      type: object
      properties:
        fileFormat:
          $ref: "#/components/schemas/ConversionTargetFormat"
          description: Currently, only X12 format is supported.
        formatDetails:
          $ref: "#/components/schemas/ConversionTargetFormatDetails"
          description: A structure that contains the formatting details for the conversion target.
        outputSampleFile:
          $ref: "#/components/schemas/OutputSampleFileSource"
          description: Customer uses this to provide a sample on what should file look like after conversion X12 EDI use case around this would be discovering the file syntax
        advancedOptions:
          $ref: "#/components/schemas/AdvancedOptions"
      required:
        - fileFormat
    ConversionTargetFormat:
      type: string
      enum:
        - X12
    ConversionTargetFormatDetails:
      description: Contains a structure describing the X12 details for the conversion target.
      type: object
      properties:
        x12:
          $ref: "#/components/schemas/X12Details"
    OutputSampleFileSource:
      description: Container for the location of a sample file used for outbound transformations.
      type: object
      properties:
        fileLocation:
          $ref: "#/components/schemas/S3Location"
    TestConversionResponse:
      type: object
      properties:
        convertedFileContent:
          $ref: "#/components/schemas/String"
          description: Returns the converted file content.
        validationMessages:
          $ref: "#/components/schemas/ValidationMessages"
          description: Returns an array of validation messages that Amazon Web Services B2B Data Interchange generates during the conversion process. These messages include both standard EDI validation results and custom validation messages when custom validation rules are configured. Custom validation messages provide detailed feedback on element length constraints, code list validations, and element requirement checks applied during the outbound EDI generation process.
      required:
        - convertedFileContent
    ValidationMessages:
      type: array
      items:
        $ref: "#/components/schemas/String"
    TestMappingInputFileContent:
      type: string
      minLength: 0
      maxLength: 5000000
    TestMappingResponse:
      type: object
      properties:
        mappedFileContent:
          $ref: "#/components/schemas/String"
          description: Returns a string for the mapping that can be used to identify the mapping. Similar to a fingerprint
      required:
        - mappedFileContent
    TestParsingResponse:
      type: object
      properties:
        parsedFileContent:
          $ref: "#/components/schemas/String"
          description: Returns the contents of the input file being tested, parsed according to the specified EDI (electronic data interchange) type.
        parsedSplitFileContents:
          $ref: "#/components/schemas/ParsedSplitFileContentsList"
          description: Returns an array of parsed file contents when the input file is split according to the specified split options. Each element in the array represents a separate split file's parsed content.
        validationMessages:
          $ref: "#/components/schemas/ValidationMessages"
          description: Returns an array of validation messages generated during EDI validation. These messages provide detailed information about validation errors, warnings, or confirmations based on the configured X12 validation rules such as element length constraints, code list validations, and element requirement checks. This field is populated when the TestParsing API validates EDI documents.
      required:
        - parsedFileContent
    ParsedSplitFileContentsList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    UpdateCapabilityResponse:
