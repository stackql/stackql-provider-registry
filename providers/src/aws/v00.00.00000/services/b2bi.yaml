openapi: 3.0.0
info:
  version: "2022-06-23"
  title: AWS B2B Data Interchange
  description: AWS B2B Data Interchange
  x-serviceName: b2bi
  x-serviceAlias: b2bi
  x-protocol: json
  x-apiVersion: "2022-06-23"
  x-endpointPrefix: b2bi
  x-targetPrefix: B2BI
  x-jsonVersion: "1.0"
servers:
  - url: https://b2bi.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for b2bi
paths:
  /CreateCapability:
    post:
      operationId: CreateCapability
      description: Instantiates a capability based on the specified parameters. A trading capability contains the information required to transform incoming EDI documents into JSON or XML outputs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.CreateCapability
            default: B2BI.CreateCapability
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/CapabilityName"
                  description: Specifies the name of the capability, used to identify it.
                type:
                  $ref: "#/components/schemas/CapabilityType"
                  description: Specifies the type of the capability. Currently, only edi is supported.
                configuration:
                  $ref: "#/components/schemas/CapabilityConfiguration"
                  description: Specifies a structure that contains the details for a capability.
                instructionsDocuments:
                  $ref: "#/components/schemas/InstructionsDocuments"
                  description: Specifies one or more locations in Amazon S3, each specifying an EDI document that can be used with this capability. Each item contains the name of the bucket and the key, to identify the document's location.
                clientToken:
                  $ref: "#/components/schemas/String"
                  description: Reserved for future use.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: Specifies the key-value pairs assigned to ARNs that you can use to group and search for resources by type. You can attach this metadata to resources (capabilities, partnerships, and so on) for any purpose.
              required:
                - name
                - type
                - configuration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCapabilityResponse"
  /CreatePartnership:
    post:
      operationId: CreatePartnership
      description: Creates a partnership between a customer and a trading partner, based on the supplied parameters. A partnership represents the connection between you and your trading partner. It ties together a profile and one or more trading capabilities.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.CreatePartnership
            default: B2BI.CreatePartnership
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                profileId:
                  $ref: "#/components/schemas/ProfileId"
                  description: Specifies the unique, system-generated identifier for the profile connected to this partnership.
                name:
                  $ref: "#/components/schemas/PartnerName"
                  description: Specifies a descriptive name for the partnership.
                email:
                  $ref: "#/components/schemas/Email"
                  description: Specifies the email address associated with this trading partner.
                phone:
                  $ref: "#/components/schemas/Phone"
                  description: Specifies the phone number associated with the partnership.
                capabilities:
                  $ref: "#/components/schemas/PartnershipCapabilities"
                  description: Specifies a list of the capabilities associated with this partnership.
                capabilityOptions:
                  $ref: "#/components/schemas/CapabilityOptions"
                  description: Specify the structure that contains the details for the associated capabilities.
                clientToken:
                  $ref: "#/components/schemas/String"
                  description: Reserved for future use.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: Specifies the key-value pairs assigned to ARNs that you can use to group and search for resources by type. You can attach this metadata to resources (capabilities, partnerships, and so on) for any purpose.
              required:
                - profileId
                - name
                - email
                - capabilities
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePartnershipResponse"
  /CreateProfile:
    post:
      operationId: CreateProfile
      description: Creates a customer profile. You can have up to five customer profiles, each representing a distinct private network. A profile is the mechanism used to create the concept of a private network.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.CreateProfile
            default: B2BI.CreateProfile
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ProfileName"
                  description: Specifies the name of the profile.
                email:
                  $ref: "#/components/schemas/Email"
                  description: Specifies the email address associated with this customer profile.
                phone:
                  $ref: "#/components/schemas/Phone"
                  description: Specifies the phone number associated with the profile.
                businessName:
                  $ref: "#/components/schemas/BusinessName"
                  description: Specifies the name for the business associated with this profile.
                logging:
                  $ref: "#/components/schemas/Logging"
                  description: Specifies whether or not logging is enabled for this profile.
                clientToken:
                  $ref: "#/components/schemas/String"
                  description: Reserved for future use.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: Specifies the key-value pairs assigned to ARNs that you can use to group and search for resources by type. You can attach this metadata to resources (capabilities, partnerships, and so on) for any purpose.
              required:
                - name
                - phone
                - businessName
                - logging
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProfileResponse"
  /CreateStarterMappingTemplate:
    post:
      operationId: CreateStarterMappingTemplate
      description: Amazon Web Services B2B Data Interchange uses a mapping template in JSONata or XSLT format to transform a customer input file into a JSON or XML file that can be converted to EDI. If you provide a sample EDI file with the same structure as the EDI files that you wish to generate, then the service can generate a mapping template. The starter template contains placeholder values which you can replace with JSONata or XSLT expressions to take data from your input file and insert it into the JSON or XML file that is used to generate the EDI. If you do not provide a sample EDI file, then the service can generate a mapping template based on the EDI settings in the templateDetails parameter. Currently, we only support generating a template that can generate the input to produce an Outbound X12 EDI file.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.CreateStarterMappingTemplate
            default: B2BI.CreateStarterMappingTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                outputSampleLocation:
                  $ref: "#/components/schemas/S3Location"
                  description: Specify the location of the sample EDI file that is used to generate the mapping template.
                mappingType:
                  $ref: "#/components/schemas/MappingType"
                  description: "Specify the format for the mapping template: either JSONATA or XSLT."
                templateDetails:
                  $ref: "#/components/schemas/TemplateDetails"
                  description: "Describes the details needed for generating the template. Specify the X12 transaction set and version for which the template is used: currently, we only support X12."
              required:
                - mappingType
                - templateDetails
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateStarterMappingTemplateResponse"
  /CreateTransformer:
    post:
      operationId: CreateTransformer
      description: "Creates a transformer. Amazon Web Services B2B Data Interchange currently supports two scenarios: Inbound EDI: the Amazon Web Services customer receives an EDI file from their trading partner. Amazon Web Services B2B Data Interchange converts this EDI file into a JSON or XML file with a service-defined structure. A mapping template provided by the customer, in JSONata or XSLT format, is optionally applied to this file to produce a JSON or XML file with the structure the customer requires. Outbound EDI: the Amazon Web Services customer has a JSON or XML file containing data that they wish to use in an EDI file. A mapping template, provided by the customer (in either JSONata or XSLT format) is applied to this file to generate a JSON or XML file in the service-defined structure. This file is then converted to an EDI file. The following fields are provided for backwards compatibility only: fileFormat, mappingTemplate, ediType, and sampleDocument. Use the mapping data type in place of mappingTemplate and fileFormat Use the sampleDocuments data type in place of sampleDocument Use either the inputConversion or outputConversion in place of ediType"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.CreateTransformer
            default: B2BI.CreateTransformer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/TransformerName"
                  description: Specifies the name of the transformer, used to identify it.
                clientToken:
                  $ref: "#/components/schemas/String"
                  description: Reserved for future use.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: Specifies the key-value pairs assigned to ARNs that you can use to group and search for resources by type. You can attach this metadata to resources (capabilities, partnerships, and so on) for any purpose.
                fileFormat:
                  $ref: "#/components/schemas/FileFormat"
                  description: Specifies that the currently supported file formats for EDI transformations are JSON and XML.
                mappingTemplate:
                  $ref: "#/components/schemas/MappingTemplate"
                  description: Specifies the mapping template for the transformer. This template is used to map the parsed EDI file using JSONata or XSLT. This parameter is available for backwards compatibility. Use the Mapping data type instead.
                ediType:
                  $ref: "#/components/schemas/EdiType"
                  description: Specifies the details for the EDI standard that is being used for the transformer. Currently, only X12 is supported. X12 is a set of standards and corresponding messages that define specific business documents.
                sampleDocument:
                  $ref: "#/components/schemas/FileLocation"
                  description: Specifies a sample EDI document that is used by a transformer as a guide for processing the EDI data.
                inputConversion:
                  $ref: "#/components/schemas/InputConversion"
                  description: Specify the InputConversion object, which contains the format options for the inbound transformation.
                mapping:
                  $ref: "#/components/schemas/Mapping"
                  description: Specify the structure that contains the mapping template and its language (either XSLT or JSONATA).
                outputConversion:
                  $ref: "#/components/schemas/OutputConversion"
                  description: A structure that contains the OutputConversion object, which contains the format options for the outbound transformation.
                sampleDocuments:
                  $ref: "#/components/schemas/SampleDocuments"
                  description: Specify a structure that contains the Amazon S3 bucket and an array of the corresponding keys used to identify the location for your sample documents.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTransformerResponse"
  /DeleteCapability:
    post:
      operationId: DeleteCapability
      description: Deletes the specified capability. A trading capability contains the information required to transform incoming EDI documents into JSON or XML outputs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.DeleteCapability
            default: B2BI.DeleteCapability
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                capabilityId:
                  $ref: "#/components/schemas/CapabilityId"
                  description: Specifies a system-assigned unique identifier for the capability.
              required:
                - capabilityId
      responses:
        "200":
          description: Success
  /DeletePartnership:
    post:
      operationId: DeletePartnership
      description: Deletes the specified partnership. A partnership represents the connection between you and your trading partner. It ties together a profile and one or more trading capabilities.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.DeletePartnership
            default: B2BI.DeletePartnership
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                partnershipId:
                  $ref: "#/components/schemas/PartnershipId"
                  description: Specifies the unique, system-generated identifier for a partnership.
              required:
                - partnershipId
      responses:
        "200":
          description: Success
  /DeleteProfile:
    post:
      operationId: DeleteProfile
      description: Deletes the specified profile. A profile is the mechanism used to create the concept of a private network.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.DeleteProfile
            default: B2BI.DeleteProfile
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                profileId:
                  $ref: "#/components/schemas/ProfileId"
                  description: Specifies the unique, system-generated identifier for the profile.
              required:
                - profileId
      responses:
        "200":
          description: Success
  /DeleteTransformer:
    post:
      operationId: DeleteTransformer
      description: Deletes the specified transformer. A transformer can take an EDI file as input and transform it into a JSON-or XML-formatted document. Alternatively, a transformer can take a JSON-or XML-formatted document as input and transform it into an EDI file.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.DeleteTransformer
            default: B2BI.DeleteTransformer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                transformerId:
                  $ref: "#/components/schemas/TransformerId"
                  description: Specifies the system-assigned unique identifier for the transformer.
              required:
                - transformerId
      responses:
        "200":
          description: Success
  /GenerateMapping:
    post:
      operationId: GenerateMapping
      description: "Takes sample input and output documents and uses Amazon Bedrock to generate a mapping automatically. Depending on the accuracy and other factors, you can then edit the mapping for your needs. Before you can use the AI-assisted feature for Amazon Web Services B2B Data Interchange you must enable models in Amazon Bedrock. For details, see AI-assisted template mapping prerequisites in the Amazon Web Services B2B Data Interchange User guide. To generate a mapping, perform the following steps: Start with an X12 EDI document to use as the input. Call TestMapping using your EDI document. Use the output from the TestMapping operation as either input or output for your GenerateMapping call, along with your sample file."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.GenerateMapping
            default: B2BI.GenerateMapping
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                inputFileContent:
                  $ref: "#/components/schemas/GenerateMappingInputFileContent"
                  description: Provide the contents of a sample X12 EDI file, either in JSON or XML format, to use as a starting point for the mapping.
                outputFileContent:
                  $ref: "#/components/schemas/GenerateMappingOutputFileContent"
                  description: Provide the contents of a sample X12 EDI file, either in JSON or XML format, to use as a target for the mapping.
                mappingType:
                  $ref: "#/components/schemas/MappingType"
                  description: "Specify the mapping type: either JSONATA or XSLT."
              required:
                - inputFileContent
                - outputFileContent
                - mappingType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateMappingResponse"
  /GetCapability:
    post:
      operationId: GetCapability
      description: Retrieves the details for the specified capability. A trading capability contains the information required to transform incoming EDI documents into JSON or XML outputs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.GetCapability
            default: B2BI.GetCapability
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                capabilityId:
                  $ref: "#/components/schemas/CapabilityId"
                  description: Specifies a system-assigned unique identifier for the capability.
              required:
                - capabilityId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCapabilityResponse"
  /GetPartnership:
    post:
      operationId: GetPartnership
      description: Retrieves the details for a partnership, based on the partner and profile IDs specified. A partnership represents the connection between you and your trading partner. It ties together a profile and one or more trading capabilities.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.GetPartnership
            default: B2BI.GetPartnership
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                partnershipId:
                  $ref: "#/components/schemas/PartnershipId"
                  description: Specifies the unique, system-generated identifier for a partnership.
              required:
                - partnershipId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPartnershipResponse"
  /GetProfile:
    post:
      operationId: GetProfile
      description: Retrieves the details for the profile specified by the profile ID. A profile is the mechanism used to create the concept of a private network.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.GetProfile
            default: B2BI.GetProfile
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                profileId:
                  $ref: "#/components/schemas/ProfileId"
                  description: Specifies the unique, system-generated identifier for the profile.
              required:
                - profileId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProfileResponse"
  /GetTransformer:
    post:
      operationId: GetTransformer
      description: Retrieves the details for the transformer specified by the transformer ID. A transformer can take an EDI file as input and transform it into a JSON-or XML-formatted document. Alternatively, a transformer can take a JSON-or XML-formatted document as input and transform it into an EDI file.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.GetTransformer
            default: B2BI.GetTransformer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                transformerId:
                  $ref: "#/components/schemas/TransformerId"
                  description: Specifies the system-assigned unique identifier for the transformer.
              required:
                - transformerId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTransformerResponse"
  /GetTransformerJob:
    post:
      operationId: GetTransformerJob
      description: Returns the details of the transformer run, based on the Transformer job ID. If 30 days have elapsed since your transformer job was started, the system deletes it. So, if you run GetTransformerJob and supply a transformerId and transformerJobId for a job that was started more than 30 days previously, you receive a 404 response.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.GetTransformerJob
            default: B2BI.GetTransformerJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                transformerJobId:
                  $ref: "#/components/schemas/TransformerJobId"
                  description: Specifies the unique, system-generated identifier for a transformer run.
                transformerId:
                  $ref: "#/components/schemas/TransformerId"
                  description: Specifies the system-assigned unique identifier for the transformer.
              required:
                - transformerJobId
                - transformerId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTransformerJobResponse"
  /ListCapabilities:
    post:
      operationId: ListCapabilities
      description: Lists the capabilities associated with your Amazon Web Services account for your current or specified region. A trading capability contains the information required to transform incoming EDI documents into JSON or XML outputs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.ListCapabilities
            default: B2BI.ListCapabilities
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/PageToken"
                  description: When additional results are obtained from the command, a NextToken parameter is returned in the output. You can then pass the NextToken parameter in a subsequent command to continue listing additional resources.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: Specifies the maximum number of capabilities to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCapabilitiesResponse"
  /ListPartnerships:
    post:
      operationId: ListPartnerships
      description: Lists the partnerships associated with your Amazon Web Services account for your current or specified region. A partnership represents the connection between you and your trading partner. It ties together a profile and one or more trading capabilities.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.ListPartnerships
            default: B2BI.ListPartnerships
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                profileId:
                  $ref: "#/components/schemas/ProfileId"
                  description: Specifies the unique, system-generated identifier for the profile connected to this partnership.
                nextToken:
                  $ref: "#/components/schemas/PageToken"
                  description: When additional results are obtained from the command, a NextToken parameter is returned in the output. You can then pass the NextToken parameter in a subsequent command to continue listing additional resources.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: Specifies the maximum number of capabilities to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPartnershipsResponse"
  /ListProfiles:
    post:
      operationId: ListProfiles
      description: Lists the profiles associated with your Amazon Web Services account for your current or specified region. A profile is the mechanism used to create the concept of a private network.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.ListProfiles
            default: B2BI.ListProfiles
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/PageToken"
                  description: When additional results are obtained from the command, a NextToken parameter is returned in the output. You can then pass the NextToken parameter in a subsequent command to continue listing additional resources.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: Specifies the maximum number of profiles to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProfilesResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists all of the tags associated with the Amazon Resource Name (ARN) that you specify. The resource can be a capability, partnership, profile, or transformer.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.ListTagsForResource
            default: B2BI.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: Requests the tags associated with a particular Amazon Resource Name (ARN). An ARN is an identifier for a specific Amazon Web Services resource, such as a capability, partnership, profile, or transformer.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /ListTransformers:
    post:
      operationId: ListTransformers
      description: Lists the available transformers. A transformer can take an EDI file as input and transform it into a JSON-or XML-formatted document. Alternatively, a transformer can take a JSON-or XML-formatted document as input and transform it into an EDI file.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.ListTransformers
            default: B2BI.ListTransformers
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/PageToken"
                  description: When additional results are obtained from the command, a NextToken parameter is returned in the output. You can then pass the NextToken parameter in a subsequent command to continue listing additional resources.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: Specifies the number of items to return for the API response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTransformersResponse"
  /StartTransformerJob:
    post:
      operationId: StartTransformerJob
      description: Runs a job, using a transformer, to parse input EDI (electronic data interchange) file into the output structures used by Amazon Web Services B2B Data Interchange. If you only want to transform EDI (electronic data interchange) documents, you don't need to create profiles, partnerships or capabilities. Just create and configure a transformer, and then run the StartTransformerJob API to process your files. The system stores transformer jobs for 30 days. During that period, you can run GetTransformerJob and supply its transformerId and transformerJobId to return details of the job.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.StartTransformerJob
            default: B2BI.StartTransformerJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                inputFile:
                  $ref: "#/components/schemas/S3Location"
                  description: Specifies the location of the input file for the transformation. The location consists of an Amazon S3 bucket and prefix.
                outputLocation:
                  $ref: "#/components/schemas/S3Location"
                  description: Specifies the location of the output file for the transformation. The location consists of an Amazon S3 bucket and prefix.
                transformerId:
                  $ref: "#/components/schemas/TransformerId"
                  description: Specifies the system-assigned unique identifier for the transformer.
                clientToken:
                  $ref: "#/components/schemas/String"
                  description: Reserved for future use.
              required:
                - inputFile
                - outputLocation
                - transformerId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartTransformerJobResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Attaches a key-value pair to a resource, as identified by its Amazon Resource Name (ARN). Resources are capability, partnership, profile, transformers and other entities. There is no response returned from this call.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.TagResource
            default: B2BI.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: Specifies an Amazon Resource Name (ARN) for a specific Amazon Web Services resource, such as a capability, partnership, profile, or transformer.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Specifies the key-value pairs assigned to ARNs that you can use to group and search for resources by type. You can attach this metadata to resources (capabilities, partnerships, and so on) for any purpose.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
  /TestConversion:
    post:
      operationId: TestConversion
      description: This operation mimics the latter half of a typical Outbound EDI request. It takes an input JSON/XML in the B2Bi shape as input, converts it to an X12 EDI string, and return that string.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.TestConversion
            default: B2BI.TestConversion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                source:
                  $ref: "#/components/schemas/ConversionSource"
                  description: Specify the source file for an outbound EDI request.
                target:
                  $ref: "#/components/schemas/ConversionTarget"
                  description: Specify the format (X12 is the only currently supported format), and other details for the conversion target.
              required:
                - source
                - target
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestConversionResponse"
  /TestMapping:
    post:
      operationId: TestMapping
      description: Maps the input file according to the provided template file. The API call downloads the file contents from the Amazon S3 location, and passes the contents in as a string, to the inputFileContent parameter.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.TestMapping
            default: B2BI.TestMapping
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                inputFileContent:
                  $ref: "#/components/schemas/TestMappingInputFileContent"
                  description: Specify the contents of the EDI (electronic data interchange) XML or JSON file that is used as input for the transform.
                mappingTemplate:
                  $ref: "#/components/schemas/MappingTemplate"
                  description: Specifies the mapping template for the transformer. This template is used to map the parsed EDI file using JSONata or XSLT. This parameter is available for backwards compatibility. Use the Mapping data type instead.
                fileFormat:
                  $ref: "#/components/schemas/FileFormat"
                  description: Specifies that the currently supported file formats for EDI transformations are JSON and XML.
              required:
                - inputFileContent
                - mappingTemplate
                - fileFormat
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestMappingResponse"
  /TestParsing:
    post:
      operationId: TestParsing
      description: Parses the input EDI (electronic data interchange) file. The input file has a file size limit of 250 KB.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.TestParsing
            default: B2BI.TestParsing
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                inputFile:
                  $ref: "#/components/schemas/S3Location"
                  description: Specifies an S3Location object, which contains the Amazon S3 bucket and prefix for the location of the input file.
                fileFormat:
                  $ref: "#/components/schemas/FileFormat"
                  description: Specifies that the currently supported file formats for EDI transformations are JSON and XML.
                ediType:
                  $ref: "#/components/schemas/EdiType"
                  description: Specifies the details for the EDI standard that is being used for the transformer. Currently, only X12 is supported. X12 is a set of standards and corresponding messages that define specific business documents.
                advancedOptions:
                  $ref: "#/components/schemas/AdvancedOptions"
                  description: Specifies advanced options for parsing the input EDI file. These options allow for more granular control over the parsing process, including split options for X12 files.
              required:
                - inputFile
                - fileFormat
                - ediType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestParsingResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Detaches a key-value pair from the specified resource, as identified by its Amazon Resource Name (ARN). Resources are capability, partnership, profile, transformers and other entities.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.UntagResource
            default: B2BI.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: Specifies an Amazon Resource Name (ARN) for a specific Amazon Web Services resource, such as a capability, partnership, profile, or transformer.
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: Specifies the key-value pairs assigned to ARNs that you can use to group and search for resources by type. You can attach this metadata to resources (capabilities, partnerships, and so on) for any purpose.
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
  /UpdateCapability:
    post:
      operationId: UpdateCapability
      description: Updates some of the parameters for a capability, based on the specified parameters. A trading capability contains the information required to transform incoming EDI documents into JSON or XML outputs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.UpdateCapability
            default: B2BI.UpdateCapability
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                capabilityId:
                  $ref: "#/components/schemas/CapabilityId"
                  description: Specifies a system-assigned unique identifier for the capability.
                name:
                  $ref: "#/components/schemas/CapabilityName"
                  description: Specifies a new name for the capability, to replace the existing name.
                configuration:
                  $ref: "#/components/schemas/CapabilityConfiguration"
                  description: Specifies a structure that contains the details for a capability.
                instructionsDocuments:
                  $ref: "#/components/schemas/InstructionsDocuments"
                  description: Specifies one or more locations in Amazon S3, each specifying an EDI document that can be used with this capability. Each item contains the name of the bucket and the key, to identify the document's location.
              required:
                - capabilityId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCapabilityResponse"
  /UpdatePartnership:
    post:
      operationId: UpdatePartnership
      description: Updates some of the parameters for a partnership between a customer and trading partner. A partnership represents the connection between you and your trading partner. It ties together a profile and one or more trading capabilities.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.UpdatePartnership
            default: B2BI.UpdatePartnership
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                partnershipId:
                  $ref: "#/components/schemas/PartnershipId"
                  description: Specifies the unique, system-generated identifier for a partnership.
                name:
                  $ref: "#/components/schemas/PartnerName"
                  description: The name of the partnership, used to identify it.
                capabilities:
                  $ref: "#/components/schemas/PartnershipCapabilities"
                  description: List of the capabilities associated with this partnership.
                capabilityOptions:
                  $ref: "#/components/schemas/CapabilityOptions"
                  description: To update, specify the structure that contains the details for the associated capabilities.
              required:
                - partnershipId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePartnershipResponse"
  /UpdateProfile:
    post:
      operationId: UpdateProfile
      description: Updates the specified parameters for a profile. A profile is the mechanism used to create the concept of a private network.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.UpdateProfile
            default: B2BI.UpdateProfile
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                profileId:
                  $ref: "#/components/schemas/ProfileId"
                  description: Specifies the unique, system-generated identifier for the profile.
                name:
                  $ref: "#/components/schemas/ProfileName"
                  description: The name of the profile, used to identify it.
                email:
                  $ref: "#/components/schemas/Email"
                  description: Specifies the email address associated with this customer profile.
                phone:
                  $ref: "#/components/schemas/Phone"
                  description: Specifies the phone number associated with the profile.
                businessName:
                  $ref: "#/components/schemas/BusinessName"
                  description: Specifies the name for the business associated with this profile.
              required:
                - profileId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProfileResponse"
  /UpdateTransformer:
    post:
      operationId: UpdateTransformer
      description: Updates the specified parameters for a transformer. A transformer can take an EDI file as input and transform it into a JSON-or XML-formatted document. Alternatively, a transformer can take a JSON-or XML-formatted document as input and transform it into an EDI file.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - B2BI.UpdateTransformer
            default: B2BI.UpdateTransformer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                transformerId:
                  $ref: "#/components/schemas/TransformerId"
                  description: Specifies the system-assigned unique identifier for the transformer.
                name:
                  $ref: "#/components/schemas/TransformerName"
                  description: Specify a new name for the transformer, if you want to update it.
                status:
                  $ref: "#/components/schemas/TransformerStatus"
                  description: Specifies the transformer's status. You can update the state of the transformer from inactive to active.
                fileFormat:
                  $ref: "#/components/schemas/FileFormat"
                  description: Specifies that the currently supported file formats for EDI transformations are JSON and XML.
                mappingTemplate:
                  $ref: "#/components/schemas/MappingTemplate"
                  description: Specifies the mapping template for the transformer. This template is used to map the parsed EDI file using JSONata or XSLT. This parameter is available for backwards compatibility. Use the Mapping data type instead.
                ediType:
                  $ref: "#/components/schemas/EdiType"
                  description: Specifies the details for the EDI standard that is being used for the transformer. Currently, only X12 is supported. X12 is a set of standards and corresponding messages that define specific business documents.
                sampleDocument:
                  $ref: "#/components/schemas/FileLocation"
                  description: Specifies a sample EDI document that is used by a transformer as a guide for processing the EDI data.
                inputConversion:
                  $ref: "#/components/schemas/InputConversion"
                  description: To update, specify the InputConversion object, which contains the format options for the inbound transformation.
                mapping:
                  $ref: "#/components/schemas/Mapping"
                  description: Specify the structure that contains the mapping template and its language (either XSLT or JSONATA).
                outputConversion:
                  $ref: "#/components/schemas/OutputConversion"
                  description: To update, specify the OutputConversion object, which contains the format options for the outbound transformation.
                sampleDocuments:
                  $ref: "#/components/schemas/SampleDocuments"
                  description: Specify a structure that contains the Amazon S3 bucket and an array of the corresponding keys used to identify the location for your sample documents.
              required:
                - transformerId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTransformerResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    CapabilityName:
      type: string
      minLength: 1
      maxLength: 254
    CapabilityType:
      type: string
      enum:
        - edi
    CapabilityConfiguration:
      description: A capability object. Currently, only EDI (electronic data interchange) capabilities are supported. A trading capability contains the information required to transform incoming EDI documents into JSON or XML outputs.
      type: object
      properties:
        edi:
          $ref: "#/components/schemas/EdiConfiguration"
          description: An EDI (electronic data interchange) configuration object.
    EdiConfiguration:
      description: Specifies the details for the EDI (electronic data interchange) transformation.
      type: object
      properties:
        capabilityDirection:
          $ref: "#/components/schemas/CapabilityDirection"
          description: Specifies whether this is capability is for inbound or outbound transformations.
        type_:
          $ref: "#/components/schemas/EdiType"
          description: Returns the type of the capability. Currently, only edi is supported.
        inputLocation:
          $ref: "#/components/schemas/S3Location"
          description: Contains the Amazon S3 bucket and prefix for the location of the input file, which is contained in an S3Location object.
        outputLocation:
          $ref: "#/components/schemas/S3Location"
          description: Contains the Amazon S3 bucket and prefix for the location of the output file, which is contained in an S3Location object.
        transformerId:
          $ref: "#/components/schemas/TransformerId"
          description: Returns the system-assigned unique identifier for the transformer.
      required:
        - type_
        - inputLocation
        - outputLocation
        - transformerId
    CapabilityDirection:
      type: string
      enum:
        - INBOUND
        - OUTBOUND
    EdiType:
      description: Specifies the details for the EDI standard that is being used for the transformer. Currently, only X12 is supported. X12 is a set of standards and corresponding messages that define specific business documents.
      type: object
      properties:
        x12Details:
          $ref: "#/components/schemas/X12Details"
          description: Returns the details for the EDI standard that is being used for the transformer. Currently, only X12 is supported. X12 is a set of standards and corresponding messages that define specific business documents.
    X12Details:
      description: A structure that contains the X12 transaction set and version. The X12 structure is used when the system transforms an EDI (electronic data interchange) file. If an EDI input file contains more than one transaction, each transaction must have the same transaction set and version, for example 214/4010. If not, the transformer cannot parse the file.
      type: object
      properties:
        transactionSet:
          $ref: "#/components/schemas/X12TransactionSet"
          description: Returns an enumerated type where each value identifies an X12 transaction set. Transaction sets are maintained by the X12 Accredited Standards Committee.
        version:
          $ref: "#/components/schemas/X12Version"
          description: Returns the version to use for the specified X12 transaction set.
    X12TransactionSet:
      type: string
      enum:
        - X12_100
        - X12_101
        - X12_102
        - X12_103
