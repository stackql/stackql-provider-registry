    InputConversion:
      description: Contains the input formatting options for an inbound transformer (takes an X12-formatted EDI document as input and converts it to JSON or XML.
      type: object
      properties:
        fromFormat:
          $ref: "#/components/schemas/FromFormat"
          description: "The format for the transformer input: currently on X12 is supported."
        formatOptions:
          $ref: "#/components/schemas/FormatOptions"
          description: A structure that contains the formatting options for an inbound transformer.
        advancedOptions:
          $ref: "#/components/schemas/AdvancedOptions"
          description: Specifies advanced options for the input conversion process. These options provide additional control over how EDI files are processed during transformation.
      required:
        - fromFormat
    FromFormat:
      type: string
      enum:
        - X12
    FormatOptions:
      description: A structure that contains the X12 transaction set and version.
      type: object
      properties:
        x12:
          $ref: "#/components/schemas/X12Details"
    AdvancedOptions:
      description: A structure that contains advanced options for EDI processing. Currently, only X12 advanced options are supported.
      type: object
      properties:
        x12:
          $ref: "#/components/schemas/X12AdvancedOptions"
          description: A structure that contains X12-specific advanced options, such as split options for processing X12 EDI files.
    X12AdvancedOptions:
      description: Contains advanced options specific to X12 EDI processing, such as splitting large X12 files into smaller units.
      type: object
      properties:
        splitOptions:
          $ref: "#/components/schemas/X12SplitOptions"
          description: Specifies options for splitting X12 EDI files. These options control how large X12 files are divided into smaller, more manageable units.
        validationOptions:
          $ref: "#/components/schemas/X12ValidationOptions"
          description: Specifies validation options for X12 EDI processing. These options control how validation rules are applied during EDI document processing, including custom validation rules for element length constraints, code list validations, and element requirement checks.
    X12SplitOptions:
      description: Contains options for splitting X12 EDI files into smaller units. This is useful for processing large EDI files more efficiently.
      type: object
      properties:
        splitBy:
          $ref: "#/components/schemas/X12SplitBy"
          description: Specifies the method used to split X12 EDI files. Valid values include TRANSACTION (split by individual transaction sets), or NONE (no splitting).
      required:
        - splitBy
    X12SplitBy:
      type: string
      enum:
        - NONE
        - TRANSACTION
    X12ValidationOptions:
      description: Contains configuration options for X12 EDI validation. This structure allows you to specify custom validation rules that will be applied during EDI document processing, including element length constraints, code list modifications, and element requirement changes. These validation options provide flexibility to accommodate trading partner-specific requirements while maintaining EDI compliance. The validation rules are applied in addition to standard X12 validation to ensure documents meet both standard and custom requirements.
      type: object
      properties:
        validationRules:
          $ref: "#/components/schemas/X12ValidationRules"
          description: Specifies a list of validation rules to apply during EDI document processing. These rules can include code list modifications, element length constraints, and element requirement changes.
    X12ValidationRules:
      description: A list of X12 validation rules to be applied during EDI document processing. This collection allows you to specify multiple validation rules of different types that will be enforced when validating X12 EDI documents.
      type: array
      items:
        $ref: "#/components/schemas/X12ValidationRule"
    X12ValidationRule:
      description: "Represents a single validation rule that can be applied during X12 EDI processing. This is a union type that can contain one of several specific validation rule types: code list validation rules for modifying allowed element codes, element length validation rules for enforcing custom length constraints, or element requirement validation rules for changing mandatory/optional status. Each validation rule targets specific aspects of EDI document validation to ensure compliance with trading partner requirements and business rules."
      type: object
      properties:
        codeListValidationRule:
          $ref: "#/components/schemas/X12CodeListValidationRule"
          description: Specifies a code list validation rule that modifies the allowed code values for a specific X12 element. This rule enables you to customize which codes are considered valid for an element, allowing for trading partner-specific code requirements.
        elementLengthValidationRule:
          $ref: "#/components/schemas/X12ElementLengthValidationRule"
          description: Specifies an element length validation rule that defines custom length constraints for a specific X12 element. This rule allows you to enforce minimum and maximum length requirements that may differ from the standard X12 specification.
        elementRequirementValidationRule:
          $ref: "#/components/schemas/X12ElementRequirementValidationRule"
          description: Specifies an element requirement validation rule that modifies whether a specific X12 element is required or optional within a segment. This rule provides flexibility to accommodate different trading partner requirements for element presence.
    X12CodeListValidationRule:
      description: Defines a validation rule that modifies the allowed code values for a specific X12 element. This rule allows you to add or remove valid codes from an element's standard code list, providing flexibility to accommodate trading partner-specific requirements or industry variations. You can specify codes to add to expand the allowed values beyond the X12 standard, or codes to remove to restrict the allowed values for stricter validation.
      type: object
      properties:
        elementId:
          $ref: "#/components/schemas/ElementId"
          description: Specifies the four-digit element ID to which the code list modifications apply. This identifies which X12 element will have its allowed code values modified.
        codesToAdd:
          $ref: "#/components/schemas/CodeList"
          description: Specifies a list of code values to add to the element's allowed values. These codes will be considered valid for the specified element in addition to the standard codes defined by the X12 specification.
        codesToRemove:
          $ref: "#/components/schemas/CodeList"
          description: Specifies a list of code values to remove from the element's allowed values. These codes will be considered invalid for the specified element, even if they are part of the standard codes defined by the X12 specification.
      required:
        - elementId
    ElementId:
      description: A string type representing an X12 element ID. Element IDs are four-digit numeric identifiers that uniquely identify elements within the X12 standard. This type enforces a pattern of exactly four digits to ensure valid element IDs are used in validation rules.
      type: string
    CodeList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    X12ElementLengthValidationRule:
      description: Defines a validation rule that specifies custom length constraints for a specific X12 element. This rule allows you to override the standard minimum and maximum length requirements for an element, enabling validation of trading partner-specific length requirements that may differ from the X12 specification. Both minimum and maximum length values must be specified and must be between 1 and 200 characters.
      type: object
      properties:
        elementId:
          $ref: "#/components/schemas/ElementId"
          description: Specifies the four-digit element ID to which the length constraints will be applied. This identifies which X12 element will have its length requirements modified.
        maxLength_:
          $ref: "#/components/schemas/X12ElementLengthValidationRuleMaxLengthInteger"
          description: Specifies the maximum allowed length for the identified element. This value must be between 1 and 200 characters and defines the upper limit for the element's content length.
        minLength_:
          $ref: "#/components/schemas/X12ElementLengthValidationRuleMinLengthInteger"
          description: Specifies the minimum required length for the identified element. This value must be between 1 and 200 characters and defines the lower limit for the element's content length.
      required:
        - elementId
        - maxLength_
        - minLength_
    X12ElementLengthValidationRuleMaxLengthInteger:
      type: integer
      minimum: 1
      maximum: 1000000
    X12ElementLengthValidationRuleMinLengthInteger:
      type: integer
      minimum: 1
      maximum: 1000000
    X12ElementRequirementValidationRule:
      description: Defines a validation rule that modifies the requirement status of a specific X12 element within a segment. This rule allows you to make optional elements mandatory or mandatory elements optional, providing flexibility to accommodate different trading partner requirements and business rules. The rule targets a specific element position within a segment and sets its requirement status to either OPTIONAL or MANDATORY.
      type: object
      properties:
        elementPosition:
          $ref: "#/components/schemas/ElementPosition"
          description: Specifies the position of the element within an X12 segment for which the requirement status will be modified. The format follows the pattern of segment identifier followed by element position (e.g., "ST-01" for the first element of the ST segment).
        requirement:
          $ref: "#/components/schemas/ElementRequirement"
          description: Specifies the requirement status for the element at the specified position. Valid values are OPTIONAL (the element may be omitted) or MANDATORY (the element must be present).
      required:
        - elementPosition
        - requirement
    ElementPosition:
      description: A string type representing the position of an element within an X12 segment. The format follows the pattern of segment identifier followed by element position (e.g., "ST-01" for the first element of the ST segment) and optionally a component position (e.g., "ST-01-02" for the second component of the first element). This type is used in validation rules to precisely identify which element in which position is being validated.
      type: string
    ElementRequirement:
      type: string
      enum:
        - OPTIONAL
        - MANDATORY
    Mapping:
