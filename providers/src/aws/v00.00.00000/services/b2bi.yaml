        - createdAt
    UpdateTransformerResponse:
      type: object
      properties:
        transformerId:
          $ref: "#/components/schemas/TransformerId"
          description: Returns the system-assigned unique identifier for the transformer.
        transformerArn:
          $ref: "#/components/schemas/ResourceArn"
          description: Returns an Amazon Resource Name (ARN) for a specific Amazon Web Services resource, such as a capability, partnership, profile, or transformer.
        name:
          $ref: "#/components/schemas/TransformerName"
          description: Returns the name of the transformer.
        status:
          $ref: "#/components/schemas/TransformerStatus"
          description: Returns the state of the newly created transformer. The transformer can be either active or inactive. For the transformer to be used in a capability, its status must active.
        createdAt:
          $ref: "#/components/schemas/CreatedDate"
          description: Returns a timestamp for creation date and time of the transformer.
        modifiedAt:
          $ref: "#/components/schemas/ModifiedDate"
          description: Returns a timestamp for last time the transformer was modified.
        fileFormat:
          $ref: "#/components/schemas/FileFormat"
          description: Returns that the currently supported file formats for EDI transformations are JSON and XML.
        mappingTemplate:
          $ref: "#/components/schemas/MappingTemplate"
          description: Returns the mapping template for the transformer. This template is used to map the parsed EDI file using JSONata or XSLT.
        ediType:
          $ref: "#/components/schemas/EdiType"
          description: Returns the details for the EDI standard that is being used for the transformer. Currently, only X12 is supported. X12 is a set of standards and corresponding messages that define specific business documents.
        sampleDocument:
          $ref: "#/components/schemas/FileLocation"
          description: Returns a sample EDI document that is used by a transformer as a guide for processing the EDI data.
        inputConversion:
          $ref: "#/components/schemas/InputConversion"
          description: Returns the InputConversion object, which contains the format options for the inbound transformation.
        mapping:
          $ref: "#/components/schemas/Mapping"
          description: Returns the structure that contains the mapping template and its language (either XSLT or JSONATA).
        outputConversion:
          $ref: "#/components/schemas/OutputConversion"
          description: Returns the OutputConversion object, which contains the format options for the outbound transformation.
        sampleDocuments:
          $ref: "#/components/schemas/SampleDocuments"
          description: Returns a structure that contains the Amazon S3 bucket and an array of the corresponding keys used to identify the location for your sample documents.
      required:
        - transformerId
        - transformerArn
        - name
        - status
        - createdAt
        - modifiedAt
