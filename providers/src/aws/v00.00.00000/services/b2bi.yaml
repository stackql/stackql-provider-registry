    PartnershipCapabilities:
      type: array
      items:
        $ref: "#/components/schemas/CapabilityId"
    CapabilityOptions:
      description: Contains the details for an Outbound EDI capability.
      type: object
      properties:
        outboundEdi:
          $ref: "#/components/schemas/OutboundEdiOptions"
          description: A structure that contains the outbound EDI options.
        inboundEdi:
          $ref: "#/components/schemas/InboundEdiOptions"
          description: A structure that contains the inbound EDI options for the capability.
    OutboundEdiOptions:
      description: A container for outbound EDI options.
      type: object
      properties:
        x12:
          $ref: "#/components/schemas/X12Envelope"
          description: A structure that contains an X12 envelope structure.
    X12Envelope:
      description: "A wrapper structure for an X12 definition object. the X12 envelope ensures the integrity of the data and the efficiency of the information exchange. The X12 message structure has hierarchical levels. From highest to the lowest, they are: Interchange Envelope Functional Group Transaction Set"
      type: object
      properties:
        common:
          $ref: "#/components/schemas/X12OutboundEdiHeaders"
          description: A container for the X12 outbound EDI headers.
        wrapOptions:
          $ref: "#/components/schemas/WrapOptions"
    X12OutboundEdiHeaders:
      description: A structure containing the details for an outbound EDI object.
      type: object
      properties:
        interchangeControlHeaders:
          $ref: "#/components/schemas/X12InterchangeControlHeaders"
          description: In X12 EDI messages, delimiters are used to mark the end of segments or elements, and are defined in the interchange control header.
        functionalGroupHeaders:
          $ref: "#/components/schemas/X12FunctionalGroupHeaders"
          description: The functional group headers for the X12 object.
        delimiters:
          $ref: "#/components/schemas/X12Delimiters"
          description: The delimiters, for example semicolon (;), that separates sections of the headers for the X12 object.
        validateEdi:
          $ref: "#/components/schemas/X12ValidateEdi"
          description: "Specifies whether or not to validate the EDI for this X12 object: TRUE or FALSE. When enabled, this performs both standard EDI validation and applies any configured custom validation rules including element length constraints, code list validations, and element requirement checks. Validation results are returned in the response validation messages."
        controlNumbers:
          $ref: "#/components/schemas/X12ControlNumbers"
          description: Specifies control number configuration for outbound X12 EDI headers. These settings determine the starting values for interchange, functional group, and transaction set control numbers.
        gs05TimeFormat:
          $ref: "#/components/schemas/X12GS05TimeFormat"
    X12InterchangeControlHeaders:
      description: In X12, the Interchange Control Header is the first segment of an EDI document and is part of the Interchange Envelope. It contains information about the sender and receiver, the date and time of transmission, and the X12 version being used. It also includes delivery information, such as the sender and receiver IDs.
      type: object
      properties:
        senderIdQualifier:
          $ref: "#/components/schemas/X12IdQualifier"
          description: Located at position ISA-05 in the header. Qualifier for the sender ID. Together, the ID and qualifier uniquely identify the sending trading partner.
        senderId:
          $ref: "#/components/schemas/X12SenderId"
          description: Located at position ISA-06 in the header. This value (along with the senderIdQualifier) identifies the sender of the interchange.
        receiverIdQualifier:
          $ref: "#/components/schemas/X12IdQualifier"
          description: Located at position ISA-07 in the header. Qualifier for the receiver ID. Together, the ID and qualifier uniquely identify the receiving trading partner.
        receiverId:
          $ref: "#/components/schemas/X12ReceiverId"
          description: Located at position ISA-08 in the header. This value (along with the receiverIdQualifier) identifies the intended recipient of the interchange.
        repetitionSeparator:
          $ref: "#/components/schemas/X12RepetitionSeparator"
          description: Located at position ISA-11 in the header. This string makes it easier when you need to group similar adjacent element values together without using extra segments. This parameter is only honored for version greater than 401 (VERSION_4010 and higher). For versions less than 401, this field is called StandardsId, in which case our service sets the value to U.
        acknowledgmentRequestedCode:
          $ref: "#/components/schemas/X12AcknowledgmentRequestedCode"
          description: Located at position ISA-14 in the header. The value "1" indicates that the sender is requesting an interchange acknowledgment at receipt of the interchange. The value "0" is used otherwise.
        usageIndicatorCode:
          $ref: "#/components/schemas/X12UsageIndicatorCode"
          description: "Located at position ISA-15 in the header. Specifies how this interchange is being used: T indicates this interchange is for testing. P indicates this interchange is for production. I indicates this interchange is informational."
    X12IdQualifier:
      type: string
      minLength: 2
      maxLength: 2
      pattern: "[a-zA-Z0-9]*"
    X12SenderId:
      type: string
      minLength: 15
      maxLength: 15
      pattern: "[a-zA-Z0-9 ]*"
    X12ReceiverId:
      type: string
      minLength: 15
      maxLength: 15
      pattern: "[a-zA-Z0-9 ]*"
    X12RepetitionSeparator:
      type: string
      minLength: 1
      maxLength: 1
    X12AcknowledgmentRequestedCode:
      type: string
      minLength: 1
      maxLength: 1
      pattern: "[a-zA-Z0-9]*"
    X12UsageIndicatorCode:
      type: string
      minLength: 1
      maxLength: 1
      pattern: "[a-zA-Z0-9]*"
    X12FunctionalGroupHeaders:
      description: Part of the X12 message structure. These are the functional group headers for the X12 EDI object.
      type: object
      properties:
        applicationSenderCode:
          $ref: "#/components/schemas/X12ApplicationSenderCode"
          description: A value representing the code used to identify the party transmitting a message, at position GS-02.
        applicationReceiverCode:
          $ref: "#/components/schemas/X12ApplicationReceiverCode"
          description: A value representing the code used to identify the party receiving a message, at position GS-03.
        responsibleAgencyCode:
          $ref: "#/components/schemas/X12ResponsibleAgencyCode"
          description: A code that identifies the issuer of the standard, at position GS-07.
    X12ApplicationSenderCode:
      type: string
      minLength: 2
      maxLength: 15
      pattern: "[a-zA-Z0-9 ]*"
    X12ApplicationReceiverCode:
      type: string
      minLength: 2
      maxLength: 15
      pattern: "[a-zA-Z0-9 ]*"
    X12ResponsibleAgencyCode:
      type: string
      minLength: 1
      maxLength: 2
      pattern: "[a-zA-Z0-9]*"
    X12Delimiters:
      description: In X12 EDI messages, delimiters are used to mark the end of segments or elements, and are defined in the interchange control header. The delimiters are part of the message's syntax and divide up its different elements.
      type: object
      properties:
        componentSeparator:
          $ref: "#/components/schemas/X12ComponentSeparator"
          description: "The component, or sub-element, separator. The default value is : (colon)."
        dataElementSeparator:
          $ref: "#/components/schemas/X12DataElementSeparator"
          description: The data element separator. The default value is * (asterisk).
        segmentTerminator:
          $ref: "#/components/schemas/X12SegmentTerminator"
          description: The segment terminator. The default value is ~ (tilde).
    X12ComponentSeparator:
      type: string
      minLength: 1
      maxLength: 1
      pattern: "[!&'()*+,\\-./:;?=%@\\[\\]_{}|<>~^`\"]"
    X12DataElementSeparator:
      type: string
      minLength: 1
      maxLength: 1
      pattern: "[!&'()*+,\\-./:;?=%@\\[\\]_{}|<>~^`\"]"
    X12SegmentTerminator:
      type: string
      minLength: 1
      maxLength: 1
      pattern: "[!&'()*+,\\-./:;?=%@\\[\\]_{}|<>~^`\"]"
    X12ValidateEdi:
      type: boolean
    X12ControlNumbers:
      description: Contains configuration for X12 control numbers used in X12 EDI generation. Control numbers are used to uniquely identify interchanges, functional groups, and transaction sets.
      type: object
      properties:
        startingInterchangeControlNumber:
          $ref: "#/components/schemas/StartingInterchangeControlNumber"
          description: Specifies the starting interchange control number (ISA13) to use for X12 EDI generation. This number is incremented for each new interchange. For the ISA (interchange) envelope, Amazon Web Services B2B Data Interchange generates an interchange control number that is unique for the ISA05 and ISA06 (sender) & ISA07 and ISA08 (receiver) combination.
        startingFunctionalGroupControlNumber:
          $ref: "#/components/schemas/StartingFunctionalGroupControlNumber"
          description: Specifies the starting functional group control number (GS06) to use for X12 EDI generation. This number is incremented for each new functional group. For the GS (functional group) envelope, Amazon Web Services B2B Data Interchange generates a functional group control number that is unique to the sender ID, receiver ID, and functional identifier code combination.
        startingTransactionSetControlNumber:
          $ref: "#/components/schemas/StartingTransactionSetControlNumber"
          description: Specifies the starting transaction set control number (ST02) to use for X12 EDI generation. This number is incremented for each new transaction set.
    StartingInterchangeControlNumber:
      type: integer
      minimum: 1
      maximum: 999999999
    StartingFunctionalGroupControlNumber:
      type: integer
      minimum: 1
      maximum: 999999999
    StartingTransactionSetControlNumber:
      type: integer
      minimum: 1
      maximum: 999999999
    X12GS05TimeFormat:
      description: "Specifies the time format in the GS05 element (time) of the functional group header. The following formats use 24-hour clock time: HHMM - Hours and minutes HHMMSS - Hours, minutes, and seconds HHMMSSDD - Hours, minutes, seconds, and decimal seconds Where: HH - Hours (00-23) MM - Minutes (00-59) SS - Seconds (00-59) DD - Hundredths of seconds (00-99)"
      type: string
      enum:
        - HHMM
        - HHMMSS
        - HHMMSSDD
    WrapOptions:
      description: Contains options for wrapping (line folding) in X12 EDI files. Wrapping controls how long lines are handled in the EDI output.
      type: object
      properties:
        wrapBy:
          $ref: "#/components/schemas/WrapFormat"
          description: "Specifies the method used for wrapping lines in the EDI output. Valid values: SEGMENT: Wraps by segment. ONE_LINE: Indicates that the entire content is on a single line. When you specify ONE_LINE, do not provide either the line length nor the line terminator value. LINE_LENGTH: Wraps by character count, as specified by lineLength value."
        lineTerminator:
          $ref: "#/components/schemas/LineTerminator"
          description: "Specifies the character sequence used to terminate lines when wrapping. Valid values: CRLF: carriage return and line feed LF: line feed) CR: carriage return"
        lineLength:
          $ref: "#/components/schemas/LineLength"
          description: Specifies the maximum length of a line before wrapping occurs. This value is used when wrapBy is set to LINE_LENGTH.
      required:
        - wrapBy
    WrapFormat:
      type: string
      enum:
        - SEGMENT
        - ONE_LINE
        - LINE_LENGTH
    LineTerminator:
      type: string
      enum:
        - CRLF
        - LF
        - CR
    LineLength:
      type: integer
      minimum: 1
    InboundEdiOptions:
      description: Contains options for processing inbound EDI files. These options allow for customizing how incoming EDI documents are processed.
      type: object
      properties:
        x12:
          $ref: "#/components/schemas/X12InboundEdiOptions"
          description: A structure that contains X12-specific options for processing inbound X12 EDI files.
    X12InboundEdiOptions:
      description: Contains options specific to processing inbound X12 EDI files.
      type: object
      properties:
        acknowledgmentOptions:
          $ref: "#/components/schemas/X12AcknowledgmentOptions"
          description: Specifies acknowledgment options for inbound X12 EDI files. These options control how functional and technical acknowledgments are handled.
    X12AcknowledgmentOptions:
      description: Contains options for configuring X12 acknowledgments. These options control how functional and technical acknowledgments are handled.
      type: object
      properties:
        functionalAcknowledgment:
          $ref: "#/components/schemas/X12FunctionalAcknowledgment"
          description: Specifies whether functional acknowledgments (997/999) should be generated for incoming X12 transactions. Valid values are DO_NOT_GENERATE, GENERATE_ALL_SEGMENTS and GENERATE_WITHOUT_TRANSACTION_SET_RESPONSE_LOOP. If you choose GENERATE_WITHOUT_TRANSACTION_SET_RESPONSE_LOOP, Amazon Web Services B2B Data Interchange skips the AK2_Loop when generating an acknowledgment document.
        technicalAcknowledgment:
          $ref: "#/components/schemas/X12TechnicalAcknowledgment"
          description: Specifies whether technical acknowledgments (TA1) should be generated for incoming X12 interchanges. Valid values are DO_NOT_GENERATE and GENERATE_ALL_SEGMENTS and.
      required:
        - functionalAcknowledgment
        - technicalAcknowledgment
    X12FunctionalAcknowledgment:
      type: string
      enum:
        - DO_NOT_GENERATE
        - GENERATE_ALL_SEGMENTS
        - GENERATE_WITHOUT_TRANSACTION_SET_RESPONSE_LOOP
    X12TechnicalAcknowledgment:
      type: string
      enum:
        - DO_NOT_GENERATE
        - GENERATE_ALL_SEGMENTS
