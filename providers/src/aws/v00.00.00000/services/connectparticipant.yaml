openapi: 3.0.0
info:
  version: "2018-09-07"
  title: Amazon Connect Participant Service
  description: Amazon Connect Participant Service
  x-serviceName: execute-api
  x-serviceAlias: connectparticipant
  x-protocol: rest-json
  x-apiVersion: "2018-09-07"
  x-endpointPrefix: participant.connect
  x-jsonVersion: "1.1"
servers:
  - url: https://participant.connect.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for connectparticipant
paths:
  /participant/cancel-authentication:
    post:
      operationId: CancelParticipantAuthentication
      description: Cancels the authentication session. The opted out branch of the Authenticate Customer flow block will be taken. The current supported channel is chat. This API is not supported for Apple Messages for Business, WhatsApp, or SMS chats. ConnectionToken is used for invoking this API instead of ParticipantToken. The Amazon Connect Participant Service APIs do not use Signature Version 4 authentication.
      parameters:
        - name: X-Amz-Bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ParticipantToken"
          description: The authentication token associated with the participant's connection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SessionId:
                  $ref: "#/components/schemas/SessionId"
              required:
                - SessionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelParticipantAuthenticationResponse"
  /participant/complete-attachment-upload:
    post:
      operationId: CompleteAttachmentUpload
      description: Allows you to confirm that the attachment has been uploaded using the pre-signed URL provided in StartAttachmentUpload API. A conflict exception is thrown when an attachment with that identifier is already being uploaded. For security recommendations, see Amazon Connect Chat security best practices. ConnectionToken is used for invoking this API instead of ParticipantToken. The Amazon Connect Participant Service APIs do not use Signature Version 4 authentication.
      parameters:
        - name: X-Amz-Bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ParticipantToken"
          description: The authentication token associated with the participant's connection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AttachmentIds:
                  $ref: "#/components/schemas/AttachmentIdList"
                ClientToken:
                  $ref: "#/components/schemas/NonEmptyClientToken"
              required:
                - AttachmentIds
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteAttachmentUploadResponse"
  /participant/connection:
    post:
      operationId: CreateParticipantConnection
      description: "Creates the participant's connection. For security recommendations, see Amazon Connect Chat security best practices. For WebRTC security recommendations, see Amazon Connect WebRTC security best practices. ParticipantToken is used for invoking this API instead of ConnectionToken. The participant token is valid for the lifetime of the participant – until they are part of a contact. For WebRTC participants, if they leave or are disconnected for 60 seconds, a new participant needs to be created using the CreateParticipant API. For WEBSOCKET Type: The response URL for has a connect expiry timeout of 100s. Clients must manually connect to the returned websocket URL and subscribe to the desired topic. For chat, you need to publish the following on the established websocket connection: {\"topic\":\"aws/subscribe\",\"content\":{\"topics\":[\"aws/chat\"]}} Upon websocket URL expiry, as specified in the response ConnectionExpiry parameter, clients need to call this API again to obtain a new websocket URL and perform the same steps as before. The expiry time for the connection token is different than the ChatDurationInMinutes. Expiry time for the connection token is 1 day. For WEBRTC_CONNECTION Type: The response includes connection data required for the client application to join the call using the Amazon Chime SDK client libraries. The WebRTCConnection response contains Meeting and Attendee information needed to establish the media connection. The attendee join token in WebRTCConnection response is valid for the lifetime of the participant in the call. If a participant leaves or is disconnected for 60 seconds, their participant credentials will no longer be valid, and a new participant will need to be created to rejoin the call. Message streaming support: This API can also be used together with the StartContactStreaming API to create a participant connection for chat contacts that are not using a websocket. For more information about message streaming, Enable real-time chat message streaming in the Amazon Connect Administrator Guide. Multi-user web, in-app, video calling support: For WebRTC calls, this API is used in conjunction with the CreateParticipant API to enable multi-party calling. The StartWebRTCContact API creates the initial contact and routes it to an agent, while CreateParticipant adds additional participants to the ongoing call. For more information about multi-party WebRTC calls, see Enable multi-user web, in-app, and video calling in the Amazon Connect Administrator Guide. Feature specifications: For information about feature specifications, such as the allowed number of open websocket connections per participant or maximum number of WebRTC participants, see Feature specifications in the Amazon Connect Administrator Guide. The Amazon Connect Participant Service APIs do not use Signature Version 4 authentication."
      parameters:
        - name: X-Amz-Bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ParticipantToken"
          description: This is a header parameter. The ParticipantToken as obtained from StartChatContact API response.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Type:
                  $ref: "#/components/schemas/ConnectionTypeList"
                ConnectParticipant:
                  $ref: "#/components/schemas/Bool"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateParticipantConnectionResponse"
  /participant/views/{view_token}:
    get:
      operationId: DescribeView
      description: Retrieves the view for the specified view token. For security recommendations, see Amazon Connect Chat security best practices.
      parameters:
        - name: view_token
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ViewToken"
          description: An encrypted token originating from the interactive message of a ShowView block operation. Represents the desired view.
        - name: X-Amz-Bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ParticipantToken"
          description: The connection token.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeViewResponse"
  /participant/disconnect:
    post:
      operationId: DisconnectParticipant
      description: Disconnects a participant. For security recommendations, see Amazon Connect Chat security best practices. ConnectionToken is used for invoking this API instead of ParticipantToken. The Amazon Connect Participant Service APIs do not use Signature Version 4 authentication.
      parameters:
        - name: X-Amz-Bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ParticipantToken"
          description: The authentication token associated with the participant's connection.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisconnectParticipantResponse"
  /participant/attachment:
    post:
      operationId: GetAttachment
      description: Provides a pre-signed URL for download of a completed attachment. This is an asynchronous API for use with active contacts. For security recommendations, see Amazon Connect Chat security best practices. The participant role CUSTOM_BOT is not permitted to access attachments customers may upload. An AccessDeniedException can indicate that the participant may be a CUSTOM_BOT, and it doesn't have access to attachments. ConnectionToken is used for invoking this API instead of ParticipantToken. The Amazon Connect Participant Service APIs do not use Signature Version 4 authentication.
      parameters:
        - name: X-Amz-Bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ParticipantToken"
          description: The authentication token associated with the participant's connection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AttachmentId:
                  $ref: "#/components/schemas/ArtifactId"
                UrlExpiryInSeconds:
                  $ref: "#/components/schemas/URLExpiryInSeconds"
              required:
                - AttachmentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAttachmentResponse"
  /participant/authentication-url:
    post:
      operationId: GetAuthenticationUrl
      description: Retrieves the AuthenticationUrl for the current authentication session for the AuthenticateCustomer flow block. For security recommendations, see Amazon Connect Chat security best practices. This API can only be called within one minute of receiving the authenticationInitiated event. The current supported channel is chat. This API is not supported for Apple Messages for Business, WhatsApp, or SMS chats. ConnectionToken is used for invoking this API instead of ParticipantToken. The Amazon Connect Participant Service APIs do not use Signature Version 4 authentication.
      parameters:
        - name: X-Amz-Bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ParticipantToken"
          description: The authentication token associated with the participant's connection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SessionId:
                  $ref: "#/components/schemas/SessionId"
                RedirectUri:
                  $ref: "#/components/schemas/RedirectURI"
              required:
                - SessionId
                - RedirectUri
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAuthenticationUrlResponse"
  /participant/transcript:
    post:
      operationId: GetTranscript
      description: "Retrieves a transcript of the session, including details about any attachments. For information about accessing past chat contact transcripts for a persistent chat, see Enable persistent chat. For security recommendations, see Amazon Connect Chat security best practices. If you have a process that consumes events in the transcript of an chat that has ended, note that chat transcripts contain the following event content types if the event has occurred during the chat session: application/vnd.amazonaws.connect.event.participant.invited application/vnd.amazonaws.connect.event.participant.joined application/vnd.amazonaws.connect.event.participant.left application/vnd.amazonaws.connect.event.chat.ended application/vnd.amazonaws.connect.event.transfer.succeeded application/vnd.amazonaws.connect.event.transfer.failed ConnectionToken is used for invoking this API instead of ParticipantToken. The Amazon Connect Participant Service APIs do not use Signature Version 4 authentication."
      parameters:
        - name: X-Amz-Bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ParticipantToken"
          description: The authentication token associated with the participant's connection.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ContactId:
                  $ref: "#/components/schemas/ContactId"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                ScanDirection:
                  $ref: "#/components/schemas/ScanDirection"
                SortOrder:
                  $ref: "#/components/schemas/SortKey"
                StartPosition:
                  $ref: "#/components/schemas/StartPosition"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTranscriptResponse"
  /participant/event:
    post:
      operationId: SendEvent
      description: The application/vnd.amazonaws.connect.event.connection.acknowledged ContentType is no longer maintained since December 31, 2024. This event has been migrated to the CreateParticipantConnection API using the ConnectParticipant field. Sends an event. Message receipts are not supported when there are more than two active participants in the chat. Using the SendEvent API for message receipts when a supervisor is barged-in will result in a conflict exception. For security recommendations, see Amazon Connect Chat security best practices. ConnectionToken is used for invoking this API instead of ParticipantToken. The Amazon Connect Participant Service APIs do not use Signature Version 4 authentication.
      parameters:
        - name: X-Amz-Bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ParticipantToken"
          description: The authentication token associated with the participant's connection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ContentType:
                  $ref: "#/components/schemas/ChatContentType"
                Content:
                  $ref: "#/components/schemas/ChatContent"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - ContentType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendEventResponse"
  /participant/message:
    post:
      operationId: SendMessage
      description: Sends a message. For security recommendations, see Amazon Connect Chat security best practices. ConnectionToken is used for invoking this API instead of ParticipantToken. The Amazon Connect Participant Service APIs do not use Signature Version 4 authentication.
      parameters:
        - name: X-Amz-Bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ParticipantToken"
          description: The authentication token associated with the connection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ContentType:
                  $ref: "#/components/schemas/ChatContentType"
                Content:
                  $ref: "#/components/schemas/ChatContent"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - ContentType
                - Content
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
  /participant/start-attachment-upload:
    post:
      operationId: StartAttachmentUpload
      description: Provides a pre-signed Amazon S3 URL in response for uploading the file directly to S3. For security recommendations, see Amazon Connect Chat security best practices. ConnectionToken is used for invoking this API instead of ParticipantToken. The Amazon Connect Participant Service APIs do not use Signature Version 4 authentication.
      parameters:
        - name: X-Amz-Bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ParticipantToken"
          description: The authentication token associated with the participant's connection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ContentType:
                  $ref: "#/components/schemas/ContentType"
                AttachmentSizeInBytes:
                  $ref: "#/components/schemas/AttachmentSizeInBytes"
                AttachmentName:
                  $ref: "#/components/schemas/AttachmentName"
                ClientToken:
                  $ref: "#/components/schemas/NonEmptyClientToken"
              required:
                - ContentType
                - AttachmentSizeInBytes
                - AttachmentName
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartAttachmentUploadResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ParticipantToken:
      type: string
      minLength: 1
      maxLength: 1000
    SessionId:
      type: string
      minLength: 36
      maxLength: 36
    CancelParticipantAuthenticationResponse:
      type: object
    AttachmentIdList:
      type: array
      items:
        $ref: "#/components/schemas/ArtifactId"
    ArtifactId:
      type: string
      minLength: 1
      maxLength: 256
    NonEmptyClientToken:
      type: string
      minLength: 1
      maxLength: 500
    CompleteAttachmentUploadResponse:
      type: object
    ConnectionTypeList:
      type: array
      items:
        $ref: "#/components/schemas/ConnectionType"
    ConnectionType:
      type: string
      enum:
        - WEBSOCKET
        - CONNECTION_CREDENTIALS
        - WEBRTC_CONNECTION
    Bool:
      type: boolean
    CreateParticipantConnectionResponse:
      type: object
      properties:
        Websocket:
          $ref: "#/components/schemas/Websocket"
          description: Creates the participant's websocket connection.
        ConnectionCredentials:
          $ref: "#/components/schemas/ConnectionCredentials"
          description: Creates the participant's connection credentials. The authentication token associated with the participant's connection.
        WebRTCConnection:
          $ref: "#/components/schemas/WebRTCConnection"
          description: Creates the participant's WebRTC connection data required for the client application (mobile application or website) to connect to the call.
    Websocket:
      description: The websocket for the participant's connection.
      type: object
      properties:
        Url:
          $ref: "#/components/schemas/PreSignedConnectionUrl"
          description: The URL of the websocket.
        ConnectionExpiry:
          $ref: "#/components/schemas/ISO8601Datetime"
          description: "The URL expiration timestamp in ISO date format. It's specified in ISO 8601 format: yyyy-MM-ddThh:mm:ss.SSSZ. For example, 2019-11-08T02:41:28.172Z."
    PreSignedConnectionUrl:
      type: string
      minLength: 1
      maxLength: 2000
    ISO8601Datetime:
      type: string
    ConnectionCredentials:
      description: Connection credentials.
      type: object
      properties:
        ConnectionToken:
          $ref: "#/components/schemas/ParticipantToken"
          description: The connection token.
        Expiry:
          $ref: "#/components/schemas/ISO8601Datetime"
          description: "The expiration of the token. It's specified in ISO 8601 format: yyyy-MM-ddThh:mm:ss.SSSZ. For example, 2019-11-08T02:41:28.172Z."
    WebRTCConnection:
      description: Creates the participant’s WebRTC connection data required for the client application (mobile or web) to connect to the call.
      type: object
      properties:
        Attendee:
          $ref: "#/components/schemas/Attendee"
        Meeting:
          $ref: "#/components/schemas/WebRTCMeeting"
          description: A meeting created using the Amazon Chime SDK.
    Attendee:
      description: The attendee information, including attendee ID and join token.
      type: object
      properties:
        AttendeeId:
          $ref: "#/components/schemas/AttendeeId"
          description: The Amazon Chime SDK attendee ID.
        JoinToken:
          $ref: "#/components/schemas/JoinToken"
          description: The join token used by the Amazon Chime SDK attendee.
    AttendeeId:
      type: string
    JoinToken:
      type: string
    WebRTCMeeting:
      description: A meeting created using the Amazon Chime SDK.
      type: object
      properties:
        MediaPlacement:
          $ref: "#/components/schemas/WebRTCMediaPlacement"
          description: The media placement for the meeting.
        MeetingFeatures:
          $ref: "#/components/schemas/MeetingFeaturesConfiguration"
        MeetingId:
          $ref: "#/components/schemas/GuidString"
          description: The Amazon Chime SDK meeting ID.
    WebRTCMediaPlacement:
      description: A set of endpoints used by clients to connect to the media service group for an Amazon Chime SDK meeting.
      type: object
      properties:
        AudioHostUrl:
          $ref: "#/components/schemas/URI"
          description: The audio host URL.
        AudioFallbackUrl:
          $ref: "#/components/schemas/URI"
          description: The audio fallback URL.
        SignalingUrl:
          $ref: "#/components/schemas/URI"
          description: The signaling URL.
        EventIngestionUrl:
          $ref: "#/components/schemas/URI"
          description: The event ingestion URL to which you send client meeting events.
    URI:
      type: string
      minLength: 1
      maxLength: 2000
    MeetingFeaturesConfiguration:
      description: The configuration settings of the features available to a meeting.
      type: object
      properties:
        Audio:
          $ref: "#/components/schemas/AudioFeatures"
          description: The configuration settings for the audio features available to a meeting.
    AudioFeatures:
      description: Has audio-specific configurations as the operating parameter for Echo Reduction.
      type: object
      properties:
        EchoReduction:
          $ref: "#/components/schemas/MeetingFeatureStatus"
          description: Makes echo reduction available to clients who connect to the meeting.
    MeetingFeatureStatus:
      type: string
      enum:
        - AVAILABLE
        - UNAVAILABLE
    GuidString:
      type: string
      pattern: "[a-fA-F0-9]{8}(?:-[a-fA-F0-9]{4}){3}-[a-fA-F0-9]{12}"
    ViewToken:
      type: string
      minLength: 1
      maxLength: 1000
    DescribeViewResponse:
      type: object
      properties:
        View:
          $ref: "#/components/schemas/View"
          description: A view resource object. Contains metadata and content necessary to render the view.
    View:
      description: A view resource object. Contains metadata and content necessary to render the view.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ViewId"
          description: The identifier of the view.
        Arn:
          $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) of the view.
        Name:
          $ref: "#/components/schemas/ViewName"
          description: The name of the view.
        Version:
          $ref: "#/components/schemas/ViewVersion"
          description: The current version of the view.
        Content:
          $ref: "#/components/schemas/ViewContent"
          description: View content containing all content necessary to render a view except for runtime input data.
    ViewId:
      type: string
      minLength: 1
      maxLength: 500
      pattern: ^[a-zA-Z0-9\_\-:\/$]+$
    ARN:
      type: string
    ViewName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^([\p{L}\p{N}_.:\/=+\-@()']+[\p{L}\p{Z}\p{N}_.:\/=+\-@()']*)$
    ViewVersion:
      type: integer
    ViewContent:
      description: View content containing all content necessary to render a view except for runtime input data.
      type: object
      properties:
        InputSchema:
          $ref: "#/components/schemas/ViewInputSchema"
          description: The schema representing the input data that the view template must be supplied to render.
        Template:
          $ref: "#/components/schemas/ViewTemplate"
          description: The view template representing the structure of the view.
        Actions:
          $ref: "#/components/schemas/ViewActions"
          description: A list of actions possible from the view
    ViewInputSchema:
      type: string
    ViewTemplate:
      type: string
    ViewActions:
      type: array
      items:
        $ref: "#/components/schemas/ViewAction"
    ViewAction:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^([\p{L}\p{N}_.:\/=+\-@()']+[\p{L}\p{Z}\p{N}_.:\/=+\-@()']*)$
    ClientToken:
      type: string
      maxLength: 500
    DisconnectParticipantResponse:
      type: object
    URLExpiryInSeconds:
      type: integer
      minimum: 5
      maximum: 300
    GetAttachmentResponse:
      type: object
      properties:
        Url:
          $ref: "#/components/schemas/PreSignedAttachmentUrl"
          description: This is the pre-signed URL that can be used for uploading the file to Amazon S3 when used in response to StartAttachmentUpload.
        UrlExpiry:
          $ref: "#/components/schemas/ISO8601Datetime"
          description: "The expiration time of the URL in ISO timestamp. It's specified in ISO 8601 format: yyyy-MM-ddThh:mm:ss.SSSZ. For example, 2019-11-08T02:41:28.172Z."
        AttachmentSizeInBytes:
          $ref: "#/components/schemas/AttachmentSizeInBytes"
          description: The size of the attachment in bytes.
      required:
        - AttachmentSizeInBytes
    PreSignedAttachmentUrl:
      type: string
      minLength: 1
      maxLength: 2000
    AttachmentSizeInBytes:
      type: integer
      format: int64
      minimum: 1
    RedirectURI:
      type: string
      minLength: 1
      maxLength: 1024
    GetAuthenticationUrlResponse:
      type: object
      properties:
        AuthenticationUrl:
          $ref: "#/components/schemas/AuthenticationUrl"
          description: The URL where the customer will sign in to the identity provider. This URL contains the authorize endpoint for the Cognito UserPool used in the authentication.
    AuthenticationUrl:
      type: string
      minLength: 1
      maxLength: 2083
    ContactId:
      type: string
      minLength: 1
      maxLength: 256
    MaxResults:
      type: integer
      minimum: 0
      maximum: 100
    NextToken:
      type: string
      minLength: 1
      maxLength: 1000
    ScanDirection:
      type: string
      enum:
        - FORWARD
        - BACKWARD
    SortKey:
      type: string
      enum:
        - DESCENDING
        - ASCENDING
    StartPosition:
      description: A filtering option for where to start. For example, if you sent 100 messages, start with message 50.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ChatItemId"
          description: The ID of the message or event where to start.
        AbsoluteTime:
          $ref: "#/components/schemas/Instant"
          description: "The time in ISO format where to start. It's specified in ISO 8601 format: yyyy-MM-ddThh:mm:ss.SSSZ. For example, 2019-11-08T02:41:28.172Z."
        MostRecent:
          $ref: "#/components/schemas/MostRecent"
          description: The start position of the most recent message where you want to start.
    ChatItemId:
      type: string
      minLength: 1
      maxLength: 256
    Instant:
      type: string
      minLength: 1
      maxLength: 100
    MostRecent:
      type: integer
      minimum: 0
      maximum: 100
    GetTranscriptResponse:
      type: object
      properties:
        InitialContactId:
          $ref: "#/components/schemas/ContactId"
          description: The initial contact ID for the contact.
        Transcript:
          $ref: "#/components/schemas/Transcript"
          description: The list of messages in the session.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token. Use the value returned previously in the next subsequent request to retrieve the next set of results.
    Transcript:
      type: array
      items:
        $ref: "#/components/schemas/Item"
    Item:
      description: An item - message or event - that has been sent.
      type: object
      properties:
        AbsoluteTime:
          $ref: "#/components/schemas/Instant"
          description: "The time when the message or event was sent. It's specified in ISO 8601 format: yyyy-MM-ddThh:mm:ss.SSSZ. For example, 2019-11-08T02:41:28.172Z."
        Content:
          $ref: "#/components/schemas/ChatContent"
          description: The content of the message or event.
        ContentType:
          $ref: "#/components/schemas/ChatContentType"
          description: The type of content of the item.
        Id:
          $ref: "#/components/schemas/ChatItemId"
          description: The ID of the item.
        Type:
          $ref: "#/components/schemas/ChatItemType"
          description: "Type of the item: message or event."
        ParticipantId:
          $ref: "#/components/schemas/ParticipantId"
          description: The ID of the sender in the session.
        DisplayName:
          $ref: "#/components/schemas/DisplayName"
          description: The chat display name of the sender.
        ParticipantRole:
          $ref: "#/components/schemas/ParticipantRole"
          description: The role of the sender. For example, is it a customer, agent, or system.
        Attachments:
          $ref: "#/components/schemas/Attachments"
          description: Provides information about the attachments.
        MessageMetadata:
          $ref: "#/components/schemas/MessageMetadata"
          description: The metadata related to the message. Currently this supports only information related to message receipts.
        RelatedContactId:
          $ref: "#/components/schemas/ContactId"
          description: The contactId on which the transcript item was originally sent. This field is only populated for persistent chats when the transcript item is from the past chat session. For more information, see Enable persistent chat.
        ContactId:
          $ref: "#/components/schemas/ContactId"
          description: The contactId on which the transcript item was originally sent. This field is populated only when the transcript item is from the current chat session.
