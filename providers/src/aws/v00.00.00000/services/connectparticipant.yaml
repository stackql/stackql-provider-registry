        AbsoluteTime:
          $ref: "#/components/schemas/Instant"
          description: "The time when the event was sent. It's specified in ISO 8601 format: yyyy-MM-ddThh:mm:ss.SSSZ. For example, 2019-11-08T02:41:28.172Z."
    SendMessageResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ChatItemId"
          description: The ID of the message.
        AbsoluteTime:
          $ref: "#/components/schemas/Instant"
          description: "The time when the message was sent. It's specified in ISO 8601 format: yyyy-MM-ddThh:mm:ss.SSSZ. For example, 2019-11-08T02:41:28.172Z."
        MessageMetadata:
          $ref: "#/components/schemas/MessageProcessingMetadata"
          description: Contains metadata for the message.
    MessageProcessingMetadata:
      description: Contains metadata for chat messages.
      type: object
      properties:
        MessageProcessingStatus:
          $ref: "#/components/schemas/MessageProcessingStatus"
          description: The status of Message Processing for the message.
    StartAttachmentUploadResponse:
      type: object
      properties:
        AttachmentId:
          $ref: "#/components/schemas/ArtifactId"
          description: A unique identifier for the attachment.
        UploadMetadata:
          $ref: "#/components/schemas/UploadMetadata"
