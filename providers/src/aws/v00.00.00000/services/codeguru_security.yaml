          $ref: "#/components/schemas/FindingMetricsValuePerSeverity"
          description: The number of new findings of each severity on the specified date.
        closedFindings:
          $ref: "#/components/schemas/FindingMetricsValuePerSeverity"
          description: The number of closed findings of each severity on the specified date.
        openFindings:
          $ref: "#/components/schemas/FindingMetricsValuePerSeverity"
          description: The number of open findings of each severity as of the specified date.
        meanTimeToClose:
          $ref: "#/components/schemas/FindingMetricsValuePerSeverity"
          description: The average time in days it takes to close findings of each severity as of a specified date.
