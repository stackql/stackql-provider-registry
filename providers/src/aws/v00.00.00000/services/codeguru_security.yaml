openapi: 3.0.0
info:
  version: "2018-05-10"
  title: Amazon CodeGuru Security
  description: Amazon CodeGuru Security
  x-serviceName: codeguru-security
  x-serviceAlias: codeguru_security
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: codeguru-security
servers:
  - url: https://codeguru-security.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for codeguru-security
paths:
  /batchGetFindings:
    post:
      operationId: BatchGetFindings
      description: Returns a list of requested findings from standard scans.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                findingIdentifiers:
                  $ref: "#/components/schemas/FindingIdentifiers"
              required:
                - findingIdentifiers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetFindingsResponse"
  /scans:
    post:
      operationId: CreateScan
      description: Use to create a scan using code uploaded to an Amazon S3 bucket.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                resourceId:
                  $ref: "#/components/schemas/ResourceId"
                scanName:
                  $ref: "#/components/schemas/ScanName"
                scanType:
                  $ref: "#/components/schemas/ScanType"
                analysisType:
                  $ref: "#/components/schemas/AnalysisType"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - resourceId
                - scanName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateScanResponse"
    get:
      operationId: ListScans
      description: Returns a list of all scans in an account. Does not return EXPRESS scans.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token to use for paginating results that are returned in the response. Set the value of this parameter to null for the first request. For subsequent calls, use the nextToken value returned from the previous request to continue listing results after the first page.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListScansRequestMaxResultsInteger"
          description: The maximum number of results to return in the response. Use this parameter when paginating results. If additional results exist beyond the number you specify, the nextToken element is returned in the response. Use nextToken in a subsequent request to retrieve additional results. If not specified, returns 100 results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListScansResponse"
  /uploadUrl:
    post:
      operationId: CreateUploadUrl
      description: Generates a pre-signed URL, request headers used to upload a code resource, and code artifact identifier for the uploaded resource. You can upload your code resource to the URL with the request headers using any HTTP client.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scanName:
                  $ref: "#/components/schemas/ScanName"
              required:
                - scanName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUploadUrlResponse"
  /accountConfiguration/get:
    get:
      operationId: GetAccountConfiguration
      description: Use to get the encryption configuration for an account.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountConfigurationResponse"
  /findings/{scan_name}:
    get:
      operationId: GetFindings
      description: Returns a list of all findings generated by a particular scan.
      parameters:
        - name: scan_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScanName"
          description: The name of the scan you want to retrieve findings from.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token to use for paginating results that are returned in the response. Set the value of this parameter to null for the first request. For subsequent calls, use the nextToken value returned from the previous request to continue listing results after the first page.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GetFindingsRequestMaxResultsInteger"
          description: The maximum number of results to return in the response. Use this parameter when paginating results. If additional results exist beyond the number you specify, the nextToken element is returned in the response. Use nextToken in a subsequent request to retrieve additional results. If not specified, returns 1000 results.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Status"
          description: The status of the findings you want to get. Pass either Open, Closed, or All.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFindingsResponse"
  /metrics/summary:
    get:
      operationId: GetMetricsSummary
      description: Returns a summary of metrics for an account from a specified date, including number of open findings, the categories with most findings, the scans with most open findings, and scans with most open critical findings.
      parameters:
        - name: date
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The date you want to retrieve summary metrics from, rounded to the nearest day. The date must be within the past two years.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMetricsSummaryResponse"
  /scans/{scan_name}:
    get:
      operationId: GetScan
      description: Returns details about a scan, including whether or not a scan has completed.
      parameters:
        - name: scan_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScanName"
          description: The name of the scan you want to view details about.
        - name: runId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Uuid"
          description: UUID that identifies the individual scan run you want to view details about. You retrieve this when you call the CreateScan operation. Defaults to the latest scan run if missing.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetScanResponse"
  /metrics/findings:
    get:
      operationId: ListFindingsMetrics
      description: Returns metrics about all findings in an account within a specified time range.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token to use for paginating results that are returned in the response. Set the value of this parameter to null for the first request. For subsequent calls, use the nextToken value returned from the previous request to continue listing results after the first page.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListFindingsMetricsRequestMaxResultsInteger"
          description: The maximum number of results to return in the response. Use this parameter when paginating results. If additional results exist beyond the number you specify, the nextToken element is returned in the response. Use nextToken in a subsequent request to retrieve additional results. If not specified, returns 1000 results.
        - name: startDate
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The start date of the interval which you want to retrieve metrics from. Rounds to the nearest day.
        - name: endDate
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The end date of the interval which you want to retrieve metrics from. Round to the nearest day.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFindingsMetricsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns a list of all tags associated with a scan.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScanNameArn"
          description: The ARN of the ScanName object. You can retrieve this ARN by calling CreateScan, ListScans, or GetScan.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Use to add one or more tags to an existing scan.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScanNameArn"
          description: The ARN of the ScanName object. You can retrieve this ARN by calling CreateScan, ListScans, or GetScan.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Use to remove one or more tags from an existing scan.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScanNameArn"
          description: The ARN of the ScanName object. You can retrieve this ARN by calling CreateScan, ListScans, or GetScan.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: A list of keys for each tag you want to remove from a scan.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /updateAccountConfiguration:
    put:
      operationId: UpdateAccountConfiguration
      description: Use to update the encryption configuration for an account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                encryptionConfig:
                  $ref: "#/components/schemas/EncryptionConfig"
              required:
                - encryptionConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAccountConfigurationResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    FindingIdentifiers:
      type: array
      items:
        $ref: "#/components/schemas/FindingIdentifier"
    FindingIdentifier:
      description: An object that contains information about a finding and the scan that generated it.
      type: object
      properties:
        scanName:
          $ref: "#/components/schemas/String"
          description: The name of the scan that generated the finding.
        findingId:
          $ref: "#/components/schemas/String"
          description: The identifier for a finding.
      required:
        - scanName
        - findingId
    String:
      type: string
    BatchGetFindingsResponse:
      type: object
      properties:
        findings:
          $ref: "#/components/schemas/Findings"
          description: A list of all findings which were successfully fetched.
        failedFindings:
          $ref: "#/components/schemas/BatchGetFindingsErrors"
          description: A list of errors for individual findings which were not fetched. Each BatchGetFindingsError contains the scanName, findingId, errorCode and error message.
      required:
        - findings
        - failedFindings
    Findings:
      type: array
      items:
        $ref: "#/components/schemas/Finding"
    Finding:
      description: Information about a finding that was detected in your code.
      type: object
      properties:
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the finding was created.
        description:
          $ref: "#/components/schemas/String"
          description: A description of the finding.
        generatorId:
          $ref: "#/components/schemas/String"
          description: The identifier for the component that generated a finding such as AmazonCodeGuruSecurity.
        id:
          $ref: "#/components/schemas/String"
          description: The identifier for a finding.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the finding was last updated. Findings are updated when you remediate them or when the finding code location changes.
        type_:
          $ref: "#/components/schemas/String"
          description: The type of finding.
        status:
          $ref: "#/components/schemas/Status"
          description: The status of the finding. A finding status can be open or closed.
        resource:
          $ref: "#/components/schemas/Resource"
          description: The resource where Amazon CodeGuru Security detected a finding.
        vulnerability:
          $ref: "#/components/schemas/Vulnerability"
          description: An object that describes the detected security vulnerability.
        severity:
          $ref: "#/components/schemas/Severity"
          description: The severity of the finding. Severity can be critical, high, medium, low, or informational. For information on severity levels, see Finding severity in the Amazon CodeGuru Security User Guide.
        remediation:
          $ref: "#/components/schemas/Remediation"
          description: An object that contains the details about how to remediate a finding.
        title_:
          $ref: "#/components/schemas/String"
          description: The title of the finding.
        detectorTags:
          $ref: "#/components/schemas/DetectorTags"
          description: One or more tags or categorizations that are associated with a detector. These tags are defined by type, programming language, or other classification such as maintainability or consistency.
        detectorId:
          $ref: "#/components/schemas/String"
          description: The identifier for the detector that detected the finding in your code. A detector is a defined rule based on industry standards and AWS best practices.
        detectorName:
          $ref: "#/components/schemas/String"
          description: The name of the detector that identified the security vulnerability in your code.
        ruleId:
          $ref: "#/components/schemas/String"
          description: The identifier for the rule that generated the finding.
    Timestamp:
      type: string
      format: date-time
    Status:
      type: string
      enum:
        - Closed
        - Open
        - All
    Resource:
      description: Information about a resource that contains a finding.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The scanName of the scan that was run on the resource.
        subResourceId:
          $ref: "#/components/schemas/String"
          description: The identifier for a section of the resource.
    Vulnerability:
      description: Information about a security vulnerability that Amazon CodeGuru Security detected.
      type: object
      properties:
        referenceUrls:
          $ref: "#/components/schemas/ReferenceUrls"
          description: One or more URL addresses that contain details about a vulnerability.
        relatedVulnerabilities:
          $ref: "#/components/schemas/RelatedVulnerabilities"
          description: One or more vulnerabilities that are related to the vulnerability being described.
        id:
          $ref: "#/components/schemas/String"
          description: The identifier for the vulnerability.
        filePath:
          $ref: "#/components/schemas/FilePath"
          description: An object that describes the location of the detected security vulnerability in your code.
        itemCount:
          $ref: "#/components/schemas/Integer"
          description: The number of times the vulnerability appears in your code.
    ReferenceUrls:
      type: array
      items:
        $ref: "#/components/schemas/String"
    RelatedVulnerabilities:
      type: array
      items:
        $ref: "#/components/schemas/String"
    FilePath:
      description: Information about the location of security vulnerabilities that Amazon CodeGuru Security detected in your code.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the file.
        path:
          $ref: "#/components/schemas/String"
          description: The path to the resource with the security vulnerability.
        startLine:
          $ref: "#/components/schemas/Integer"
          description: The first line number of the code snippet where the security vulnerability appears in your code.
        endLine:
          $ref: "#/components/schemas/Integer"
          description: The last line number of the code snippet where the security vulnerability appears in your code.
        codeSnippet:
          $ref: "#/components/schemas/CodeSnippet"
          description: A list of CodeLine objects that describe where the security vulnerability appears in your code.
    Integer:
      type: integer
    CodeSnippet:
      type: array
      items:
        $ref: "#/components/schemas/CodeLine"
    CodeLine:
      description: The line of code where a finding was detected.
      type: object
      properties:
        number:
          $ref: "#/components/schemas/Integer"
          description: The code line number.
        content:
          $ref: "#/components/schemas/String"
          description: The code that contains a vulnerability.
    Severity:
      type: string
      enum:
        - Critical
        - High
        - Medium
        - Low
        - Info
    Remediation:
      description: Information about how to remediate a finding.
      type: object
      properties:
        recommendation:
          $ref: "#/components/schemas/Recommendation"
          description: An object that contains information about the recommended course of action to remediate a finding.
        suggestedFixes:
          $ref: "#/components/schemas/SuggestedFixes"
          description: A list of SuggestedFix objects. Each object contains information about a suggested code fix to remediate the finding.
    Recommendation:
      description: Information about the recommended course of action to remediate a finding.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/String"
          description: The recommended course of action to remediate the finding.
        url:
          $ref: "#/components/schemas/String"
          description: The URL address to the recommendation for remediating the finding.
    SuggestedFixes:
      type: array
      items:
        $ref: "#/components/schemas/SuggestedFix"
    SuggestedFix:
      description: Information about the suggested code fix to remediate a finding.
      type: object
      properties:
        description:
          $ref: "#/components/schemas/String"
          description: A description of the suggested code fix and why it is being suggested.
        code:
          $ref: "#/components/schemas/String"
          description: The suggested code fix. If applicable, includes code patch to replace your source code.
    DetectorTags:
      type: array
      items:
        $ref: "#/components/schemas/String"
    BatchGetFindingsErrors:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetFindingsError"
    BatchGetFindingsError:
      description: Contains information about the error that caused a finding to fail to be retrieved.
      type: object
      properties:
        scanName:
          $ref: "#/components/schemas/ScanName"
          description: The name of the scan that generated the finding.
        findingId:
          $ref: "#/components/schemas/String"
          description: The finding ID of the finding that was not fetched.
        errorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: A code associated with the type of error.
        message:
          $ref: "#/components/schemas/String"
          description: Describes the error.
      required:
        - scanName
        - findingId
        - errorCode
        - message
    ScanName:
      type: string
      minLength: 1
      maxLength: 140
      pattern: "[a-zA-Z0-9-_$:.]*"
    ErrorCode:
      type: string
      enum:
        - DUPLICATE_IDENTIFIER
        - ITEM_DOES_NOT_EXIST
        - INTERNAL_ERROR
        - INVALID_FINDING_ID
        - INVALID_SCAN_NAME
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[\\S]+"
    ResourceId:
      description: The identifier for a resource object that contains resources to scan. Specifying a codeArtifactId is required to create a scan.
      type: object
      properties:
        codeArtifactId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier for the code file uploaded to the resource object. Returned by CreateUploadUrl when you upload resources to be scanned.
    Uuid:
      type: string
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    ScanType:
      type: string
      enum:
        - Standard
        - Express
    AnalysisType:
      type: string
      enum:
        - Security
        - All
    TagMap:
      type: object
      properties: {}
    CreateScanResponse:
      type: object
      properties:
        scanName:
          $ref: "#/components/schemas/ScanName"
          description: The name of the scan.
        runId:
          $ref: "#/components/schemas/Uuid"
          description: UUID that identifies the individual scan run.
        resourceId:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier for the resource object that contains resources that were scanned.
        scanState:
          $ref: "#/components/schemas/ScanState"
          description: The current state of the scan. Returns either InProgress, Successful, or Failed.
        scanNameArn:
          $ref: "#/components/schemas/ScanNameArn"
          description: The ARN for the scan name.
      required:
        - scanName
        - runId
        - resourceId
        - scanState
    ScanState:
      type: string
      enum:
        - InProgress
        - Successful
        - Failed
    ScanNameArn:
      type: string
      minLength: 1
      maxLength: 300
      pattern: arn:aws:codeguru-security:[\S]+:[\d]{12}:scans\/[a-zA-Z0-9-_$:.]*
    CreateUploadUrlResponse:
      type: object
      properties:
        s3Url:
          $ref: "#/components/schemas/S3Url"
          description: A pre-signed S3 URL. You can upload the code file you want to scan with the required requestHeaders using any HTTP client.
        requestHeaders:
          type: object
          properties: {}
          description: A set of key-value pairs that contain the required headers when uploading your resource.
        codeArtifactId:
          $ref: "#/components/schemas/Uuid"
          description: The identifier for the uploaded code resource. Pass this to CreateScan to use the uploaded resources.
      required:
        - s3Url
        - requestHeaders
        - codeArtifactId
    S3Url:
      type: string
      minLength: 1
    GetAccountConfigurationResponse:
      type: object
      properties:
        encryptionConfig:
          $ref: "#/components/schemas/EncryptionConfig"
          description: An EncryptionConfig object that contains the KMS key ARN that is used for encryption. By default, CodeGuru Security uses an AWS-managed key for encryption. To specify your own key, call UpdateAccountConfiguration. If you do not specify a customer-managed key, returns empty.
      required:
        - encryptionConfig
    EncryptionConfig:
      description: Information about the encryption configuration for an account. Required to call UpdateAccountConfiguration.
      type: object
      properties:
        kmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The KMS key ARN that is used for encryption. If an AWS-managed key is used for encryption, returns empty.
    KmsKeyArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws:kms:[\S]+:[\d]{12}:key\/(([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})|(mrk-[0-9a-zA-Z]{32}))
    NextToken:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[\\S]+"
    GetFindingsRequestMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 1000
    GetFindingsResponse:
      type: object
      properties:
        findings:
          $ref: "#/components/schemas/Findings"
          description: A list of findings generated by the specified scan.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: A pagination token. You can use this in future calls to GetFindings to continue listing results after the current page.
    GetMetricsSummaryResponse:
      type: object
      properties:
        metricsSummary:
          $ref: "#/components/schemas/MetricsSummary"
          description: The summary metrics from the specified date.
    MetricsSummary:
      description: A summary of metrics for an account as of a specified date.
      type: object
      properties:
        date:
          $ref: "#/components/schemas/Timestamp"
          description: The date from which the metrics summary information was retrieved.
        openFindings:
          $ref: "#/components/schemas/FindingMetricsValuePerSeverity"
          description: The number of open findings of each severity.
        categoriesWithMostFindings:
          $ref: "#/components/schemas/CategoriesWithMostFindings"
          description: A list of CategoryWithFindingNum objects for the top 5 finding categories with the most findings.
        scansWithMostOpenFindings:
          $ref: "#/components/schemas/ScansWithMostOpenFindings"
          description: A list of ScanNameWithFindingNum objects for the top 3 scans with the most number of open findings.
        scansWithMostOpenCriticalFindings:
          $ref: "#/components/schemas/ScansWithMostOpenCriticalFindings"
          description: A list of ScanNameWithFindingNum objects for the top 3 scans with the most number of open critical findings.
    FindingMetricsValuePerSeverity:
      description: A numeric value corresponding to the severity of a finding, such as the number of open findings or the average time it takes to close findings of a given severity.
      type: object
      properties:
        info:
          $ref: "#/components/schemas/Double"
          description: A numeric value corresponding to an informational finding.
        low:
          $ref: "#/components/schemas/Double"
          description: A numeric value corresponding to a low severity finding.
        medium:
          $ref: "#/components/schemas/Double"
          description: A numeric value corresponding to a medium severity finding.
        high:
          $ref: "#/components/schemas/Double"
          description: A numeric value corresponding to a high severity finding.
        critical:
