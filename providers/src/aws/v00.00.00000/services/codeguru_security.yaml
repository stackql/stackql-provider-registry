        findingNumber:
          $ref: "#/components/schemas/Integer"
          description: The number of findings generated by a scan.
    ScansWithMostOpenCriticalFindings:
      type: array
      items:
        $ref: "#/components/schemas/ScanNameWithFindingNum"
    GetScanResponse:
      type: object
      properties:
