openapi: 3.0.0
info:
  version: "2021-02-01"
  title: AWS Account
  description: AWS Account
  x-serviceName: account
  x-serviceAlias: account
  x-protocol: rest-json
  x-apiVersion: "2021-02-01"
  x-endpointPrefix: account
servers:
  - url: https://account.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for account
paths:
  /acceptPrimaryEmailUpdate:
    post:
      operationId: AcceptPrimaryEmailUpdate
      description: Accepts the request that originated from StartPrimaryEmailUpdate to update the primary email address (also known as the root user email address) for the specified account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                PrimaryEmail:
                  $ref: "#/components/schemas/PrimaryEmailAddress"
                Otp:
                  $ref: "#/components/schemas/Otp"
              required:
                - AccountId
                - PrimaryEmail
                - Otp
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptPrimaryEmailUpdateResponse"
  /deleteAlternateContact:
    post:
      operationId: DeleteAlternateContact
      description: Deletes the specified alternate contact from an Amazon Web Services account. For complete details about how to use the alternate contact operations, see Update the alternate contacts for your Amazon Web Services account. Before you can update the alternate contact information for an Amazon Web Services account that is managed by Organizations, you must first enable integration between Amazon Web Services Account Management and Organizations. For more information, see Enable trusted access for Amazon Web Services Account Management.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AlternateContactType:
                  $ref: "#/components/schemas/AlternateContactType"
                AccountId:
                  $ref: "#/components/schemas/AccountId"
              required:
                - AlternateContactType
      responses:
        "200":
          description: Success
  /disableRegion:
    post:
      operationId: DisableRegion
      description: Disables (opts-out) a particular Region for an account. The act of disabling a Region will remove all IAM access to any resources that reside in that Region.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                RegionName:
                  $ref: "#/components/schemas/RegionName"
              required:
                - RegionName
      responses:
        "200":
          description: Success
  /enableRegion:
    post:
      operationId: EnableRegion
      description: Enables (opts-in) a particular Region for an account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                RegionName:
                  $ref: "#/components/schemas/RegionName"
              required:
                - RegionName
      responses:
        "200":
          description: Success
  /getAccountInformation:
    post:
      operationId: GetAccountInformation
      description: Retrieves information about the specified account including its account name, account ID, account creation date and time, and account state. To use this API, an IAM user or role must have the account:GetAccountInformation IAM permission.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountInformationResponse"
  /getAlternateContact:
    post:
      operationId: GetAlternateContact
      description: Retrieves the specified alternate contact attached to an Amazon Web Services account. For complete details about how to use the alternate contact operations, see Update the alternate contacts for your Amazon Web Services account. Before you can update the alternate contact information for an Amazon Web Services account that is managed by Organizations, you must first enable integration between Amazon Web Services Account Management and Organizations. For more information, see Enable trusted access for Amazon Web Services Account Management.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AlternateContactType:
                  $ref: "#/components/schemas/AlternateContactType"
                AccountId:
                  $ref: "#/components/schemas/AccountId"
              required:
                - AlternateContactType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAlternateContactResponse"
  /getContactInformation:
    post:
      operationId: GetContactInformation
      description: Retrieves the primary contact information of an Amazon Web Services account. For complete details about how to use the primary contact operations, see Update the primary contact for your Amazon Web Services account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetContactInformationResponse"
  /getGovCloudAccountInformation:
    post:
      operationId: GetGovCloudAccountInformation
      description: Retrieves information about the GovCloud account linked to the specified standard account (if it exists) including the GovCloud account ID and state. To use this API, an IAM user or role must have the account:GetGovCloudAccountInformation IAM permission.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                StandardAccountId:
                  $ref: "#/components/schemas/AccountId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGovCloudAccountInformationResponse"
  /getPrimaryEmail:
    post:
      operationId: GetPrimaryEmail
      description: Retrieves the primary email address for the specified account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
              required:
                - AccountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPrimaryEmailResponse"
  /getRegionOptStatus:
    post:
      operationId: GetRegionOptStatus
      description: Retrieves the opt-in status of a particular Region.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                RegionName:
                  $ref: "#/components/schemas/RegionName"
              required:
                - RegionName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRegionOptStatusResponse"
  /listRegions:
    post:
      operationId: ListRegions
      description: Lists all the Regions for a given account and their respective opt-in statuses. Optionally, this list can be filtered by the region-opt-status-contains parameter.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                MaxResults:
                  $ref: "#/components/schemas/ListRegionsRequestMaxResultsInteger"
                NextToken:
                  $ref: "#/components/schemas/ListRegionsRequestNextTokenString"
                RegionOptStatusContains:
                  $ref: "#/components/schemas/RegionOptStatusList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRegionsResponse"
  /putAccountName:
    post:
      operationId: PutAccountName
      description: Updates the account name of the specified account. To use this API, IAM principals must have the account:PutAccountName IAM permission.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountName:
                  $ref: "#/components/schemas/AccountName"
                AccountId:
                  $ref: "#/components/schemas/AccountId"
              required:
                - AccountName
      responses:
        "200":
          description: Success
  /putAlternateContact:
    post:
      operationId: PutAlternateContact
      description: Modifies the specified alternate contact attached to an Amazon Web Services account. For complete details about how to use the alternate contact operations, see Update the alternate contacts for your Amazon Web Services account. Before you can update the alternate contact information for an Amazon Web Services account that is managed by Organizations, you must first enable integration between Amazon Web Services Account Management and Organizations. For more information, see Enable trusted access for Amazon Web Services Account Management.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                Title:
                  $ref: "#/components/schemas/Title"
                EmailAddress:
                  $ref: "#/components/schemas/EmailAddress"
                PhoneNumber:
                  $ref: "#/components/schemas/PhoneNumber"
                AlternateContactType:
                  $ref: "#/components/schemas/AlternateContactType"
                AccountId:
                  $ref: "#/components/schemas/AccountId"
              required:
                - Name
                - Title
                - EmailAddress
                - PhoneNumber
                - AlternateContactType
      responses:
        "200":
          description: Success
  /putContactInformation:
    post:
      operationId: PutContactInformation
      description: Updates the primary contact information of an Amazon Web Services account. For complete details about how to use the primary contact operations, see Update the primary contact for your Amazon Web Services account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ContactInformation:
                  $ref: "#/components/schemas/ContactInformation"
                AccountId:
                  $ref: "#/components/schemas/AccountId"
              required:
                - ContactInformation
      responses:
        "200":
          description: Success
  /startPrimaryEmailUpdate:
    post:
      operationId: StartPrimaryEmailUpdate
      description: Starts the process to update the primary email address for the specified account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                PrimaryEmail:
                  $ref: "#/components/schemas/PrimaryEmailAddress"
              required:
                - AccountId
                - PrimaryEmail
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartPrimaryEmailUpdateResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AccountId:
      type: string
      pattern: \d{12}
    PrimaryEmailAddress:
      type: string
      minLength: 5
      maxLength: 64
    Otp:
      type: string
      pattern: "[a-zA-Z0-9]{6}"
    AcceptPrimaryEmailUpdateResponse:
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/PrimaryEmailUpdateStatus"
          description: Retrieves the status of the accepted primary email update request.
    PrimaryEmailUpdateStatus:
      type: string
      enum:
        - PENDING
        - ACCEPTED
    AlternateContactType:
      type: string
      enum:
        - BILLING
        - OPERATIONS
        - SECURITY
    RegionName:
      type: string
      minLength: 1
      maxLength: 50
    GetAccountInformationResponse:
      type: object
      properties:
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: Specifies the 12-digit account ID number of the Amazon Web Services account that you want to access or modify with this operation. To use this parameter, the caller must be an identity in the organization's management account or a delegated administrator account. The specified account ID must be a member account in the same organization. The organization must have all features enabled, and the organization must have trusted access enabled for the Account Management service, and optionally a delegated admin account assigned. This operation can only be called from the management account or the delegated administrator account of an organization for a member account. The management account can't specify its own AccountId.
        AccountName:
          $ref: "#/components/schemas/AccountName"
          description: The name of the account.
        AccountCreatedDate:
          $ref: "#/components/schemas/AccountCreatedDate"
          description: The date and time the account was created.
        AccountState:
          $ref: "#/components/schemas/AccountState"
          description: "The state of the account. Each account state represents a specific phase in the account lifecycle. Use this information to manage account access, automate workflows, or trigger actions based on account state changes. Valid values: PENDING_ACTIVATION | ACTIVE | SUSPENDED | CLOSED"
    AccountName:
      type: string
      minLength: 1
      maxLength: 50
      pattern: "[ -;=?-~]+"
    AccountCreatedDate:
      type: string
      format: date-time
    AccountState:
      type: string
      enum:
        - PENDING_ACTIVATION
        - ACTIVE
        - SUSPENDED
        - CLOSED
    GetAlternateContactResponse:
      type: object
      properties:
        AlternateContact:
          $ref: "#/components/schemas/AlternateContact"
          description: A structure that contains the details for the specified alternate contact.
    AlternateContact:
      description: A structure that contains the details of an alternate contact associated with an Amazon Web Services account
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/Name"
          description: The name associated with this alternate contact.
        Title:
          $ref: "#/components/schemas/Title"
          description: The title associated with this alternate contact.
        EmailAddress:
          $ref: "#/components/schemas/EmailAddress"
          description: The email address associated with this alternate contact.
        PhoneNumber:
          $ref: "#/components/schemas/PhoneNumber"
          description: The phone number associated with this alternate contact.
        AlternateContactType:
          $ref: "#/components/schemas/AlternateContactType"
          description: The type of alternate contact.
    Name:
      type: string
      minLength: 1
      maxLength: 64
    Title:
      type: string
      minLength: 1
      maxLength: 50
    EmailAddress:
      type: string
      minLength: 1
      maxLength: 254
      pattern: "[\\s]*[\\w+=.#|!&-]+@[\\w.-]+\\.[\\w]+[\\s]*"
    PhoneNumber:
      type: string
      minLength: 1
      maxLength: 25
      pattern: "[\\s0-9()+-]+"
    GetContactInformationResponse:
      type: object
      properties:
        ContactInformation:
          $ref: "#/components/schemas/ContactInformation"
          description: Contains the details of the primary contact information associated with an Amazon Web Services account.
    ContactInformation:
      description: Contains the details of the primary contact information associated with an Amazon Web Services account.
      type: object
      properties:
        FullName:
          $ref: "#/components/schemas/FullName"
          description: The full name of the primary contact address.
        AddressLine1:
          $ref: "#/components/schemas/AddressLine"
          description: The first line of the primary contact address.
        AddressLine2:
          $ref: "#/components/schemas/AddressLine"
          description: The second line of the primary contact address, if any.
        AddressLine3:
          $ref: "#/components/schemas/AddressLine"
          description: The third line of the primary contact address, if any.
        City:
          $ref: "#/components/schemas/City"
          description: The city of the primary contact address.
        StateOrRegion:
          $ref: "#/components/schemas/StateOrRegion"
          description: "The state or region of the primary contact address. If the mailing address is within the United States (US), the value in this field can be either a two character state code (for example, NJ) or the full state name (for example, New Jersey). This field is required in the following countries: US, CA, GB, DE, JP, IN, and BR."
        DistrictOrCounty:
          $ref: "#/components/schemas/DistrictOrCounty"
          description: The district or county of the primary contact address, if any.
        PostalCode:
          $ref: "#/components/schemas/PostalCode"
          description: The postal code of the primary contact address.
        CountryCode:
          $ref: "#/components/schemas/CountryCode"
          description: The ISO-3166 two-letter country code for the primary contact address.
        PhoneNumber:
          $ref: "#/components/schemas/ContactInformationPhoneNumber"
          description: The phone number of the primary contact information. The number will be validated and, in some countries, checked for activation.
        CompanyName:
          $ref: "#/components/schemas/CompanyName"
          description: The name of the company associated with the primary contact information, if any.
        WebsiteUrl:
          $ref: "#/components/schemas/WebsiteUrl"
          description: The URL of the website associated with the primary contact information, if any.
      required:
        - FullName
        - AddressLine1
        - City
        - PostalCode
        - CountryCode
        - PhoneNumber
    FullName:
      type: string
      minLength: 1
      maxLength: 50
    AddressLine:
      type: string
      minLength: 1
      maxLength: 60
    City:
      type: string
      minLength: 1
      maxLength: 50
    StateOrRegion:
      type: string
      minLength: 1
      maxLength: 50
    DistrictOrCounty:
      type: string
      minLength: 1
      maxLength: 50
    PostalCode:
      type: string
      minLength: 1
      maxLength: 20
    CountryCode:
      type: string
      minLength: 2
      maxLength: 2
    ContactInformationPhoneNumber:
      type: string
      minLength: 1
      maxLength: 20
      pattern: "[+][\\s0-9()-]+"
    CompanyName:
      type: string
      minLength: 1
      maxLength: 50
    WebsiteUrl:
      type: string
      minLength: 1
      maxLength: 256
    GetGovCloudAccountInformationResponse:
      type: object
      properties:
        GovCloudAccountId:
          $ref: "#/components/schemas/AccountId"
          description: The 12-digit account ID number of the linked GovCloud account.
        AccountState:
          $ref: "#/components/schemas/AwsAccountState"
          description: The account state of the linked GovCloud account.
      required:
        - GovCloudAccountId
        - AccountState
    AwsAccountState:
      type: string
      enum:
        - PENDING_ACTIVATION
        - ACTIVE
        - SUSPENDED
        - CLOSED
    GetPrimaryEmailResponse:
      type: object
      properties:
        PrimaryEmail:
          $ref: "#/components/schemas/PrimaryEmailAddress"
          description: Retrieves the primary email address associated with the specified account.
    GetRegionOptStatusResponse:
      type: object
      properties:
        RegionName:
          $ref: "#/components/schemas/RegionName"
          description: The Region code that was passed in.
        RegionOptStatus:
          $ref: "#/components/schemas/RegionOptStatus"
          description: One of the potential statuses a Region can undergo (Enabled, Enabling, Disabled, Disabling, Enabled_By_Default).
    RegionOptStatus:
      type: string
      enum:
        - ENABLED
        - ENABLING
        - DISABLING
        - DISABLED
        - ENABLED_BY_DEFAULT
    ListRegionsRequestMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 50
    ListRegionsRequestNextTokenString:
      type: string
      minLength: 0
      maxLength: 1000
    RegionOptStatusList:
      type: array
      items:
        $ref: "#/components/schemas/RegionOptStatus"
    ListRegionsResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/String"
          description: If there is more data to be returned, this will be populated. It should be passed into the next-token request parameter of list-regions.
        Regions:
          $ref: "#/components/schemas/RegionOptList"
          description: This is a list of Regions for a given account, or if the filtered parameter was used, a list of Regions that match the filter criteria set in the filter parameter.
    String:
      type: string
    RegionOptList:
      type: array
      items:
        $ref: "#/components/schemas/Region"
    Region:
      description: This is a structure that expresses the Region for a given account, consisting of a name and opt-in status.
      type: object
      properties:
        RegionName:
          $ref: "#/components/schemas/RegionName"
          description: The Region code of a given Region (for example, us-east-1).
        RegionOptStatus:
          $ref: "#/components/schemas/RegionOptStatus"
          description: One of potential statuses a Region can undergo (Enabled, Enabling, Disabled, Disabling, Enabled_By_Default).
    StartPrimaryEmailUpdateResponse:
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/PrimaryEmailUpdateStatus"
          description: The status of the primary email update request.
  x-stackQL-resources:
    primary_emails:
      id: aws.account.primary_emails
      name: primary_emails
      title: primary_emails
      methods:
        accept_primary_email_update:
          operation:
            $ref: "#/paths/~1acceptPrimaryEmailUpdate/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        get_primary_email:
          operation:
            $ref: "#/paths/~1getPrimaryEmail/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        start_primary_email_update:
          operation:
            $ref: "#/paths/~1startPrimaryEmailUpdate/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/primary_emails/methods/get_primary_email"
        insert: []
        update: []
        delete: []
    alternate_contacts:
      id: aws.account.alternate_contacts
      name: alternate_contacts
      title: alternate_contacts
      methods:
        delete_alternate_contact:
          operation:
            $ref: "#/paths/~1deleteAlternateContact/post"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        get_alternate_contact:
          operation:
            $ref: "#/paths/~1getAlternateContact/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.AlternateContact
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        put_alternate_contact:
          operation:
            $ref: "#/paths/~1putAlternateContact/post"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/alternate_contacts/methods/get_alternate_contact"
        insert: []
        update: []
        replace:
          - $ref: "#/components/x-stackQL-resources/alternate_contacts/methods/put_alternate_contact"
        delete:
          - $ref: "#/components/x-stackQL-resources/alternate_contacts/methods/delete_alternate_contact"
    regions:
      id: aws.account.regions
      name: regions
      title: regions
      methods:
        disable_region:
          operation:
            $ref: "#/paths/~1disableRegion/post"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        enable_region:
          operation:
            $ref: "#/paths/~1enableRegion/post"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        list_regions:
          operation:
            $ref: "#/paths/~1listRegions/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.Regions
          request:
            nativeCasing: pascal
          config:
            pagination:
              requestToken:
                key: NextToken
                location: body
              responseToken:
                key: $.NextToken
                location: body
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/regions/methods/list_regions"
        insert: []
        update: []
        delete: []
    account_informations:
      id: aws.account.account_informations
      name: account_informations
      title: account_informations
      methods:
        get_account_information:
          operation:
            $ref: "#/paths/~1getAccountInformation/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/account_informations/methods/get_account_information"
        insert: []
        update: []
        delete: []
    contact_informations:
      id: aws.account.contact_informations
      name: contact_informations
      title: contact_informations
      methods:
        get_contact_information:
          operation:
            $ref: "#/paths/~1getContactInformation/post"
          response:
