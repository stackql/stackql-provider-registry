openapi: 3.0.0
info:
  version: "2013-04-01"
  title: Amazon Route 53
  description: Amazon Route 53
  x-serviceName: route53
  x-serviceAlias: route53
  x-protocol: rest-xml
  x-apiVersion: "2013-04-01"
  x-endpointPrefix: route53
servers:
  - url: https://route53.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Global endpoint for route53
paths:
  /2013-04-01/keysigningkey/{hosted_zone_id}/{name}/activate:
    post:
      operationId: ActivateKeySigningKey
      description: Activates a key-signing key (KSK) so that it can be used for signing by DNSSEC. This operation changes the KSK status to ACTIVE.
      parameters:
        - name: hosted_zone_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: A unique string used to identify a hosted zone.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SigningKeyName"
          description: A string used to identify a key-signing key (KSK). Name can include numbers, letters, and underscores (_). Name must be unique for each key-signing key in the same hosted zone.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateKeySigningKeyOutputDisplay"
  /2013-04-01/hostedzone/{id}/associatevpc:
    post:
      operationId: AssociateVPCWithHostedZone
      description: "Associates an Amazon VPC with a private hosted zone. To perform the association, the VPC and the private hosted zone must already exist. You can't convert a public hosted zone into a private hosted zone. If you want to associate a VPC that was created by using one Amazon Web Services account with a private hosted zone that was created by using a different account, the Amazon Web Services account that created the private hosted zone must first submit a CreateVPCAssociationAuthorization request. Then the account that created the VPC must submit an AssociateVPCWithHostedZone request. When granting access, the hosted zone and the Amazon VPC must belong to the same partition. A partition is a group of Amazon Web Services Regions. Each Amazon Web Services account is scoped to one partition. The following are the supported partitions: aws - Amazon Web Services Regions aws-cn - China Regions aws-us-gov - Amazon Web Services GovCloud (US) Region For more information, see Access Management in the Amazon Web Services General Reference."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the private hosted zone that you want to associate an Amazon VPC with. Note that you can't associate a VPC with a hosted zone that doesn't have an existing VPC association.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                VPC:
                  $ref: "#/components/schemas/VPC"
                Comment:
                  $ref: "#/components/schemas/AssociateVPCComment"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateVPCWithHostedZoneOutputDisplay"
  /2013-04-01/cidrcollection/{cidr_collection_id}:
    post:
      operationId: ChangeCidrCollection
      description: "Creates, changes, or deletes CIDR blocks within a collection. Contains authoritative IP information mapping blocks to one or multiple locations. A change request can update multiple locations in a collection at a time, which is helpful if you want to move one or more CIDR blocks from one location to another in one transaction, without downtime. Limits The max number of CIDR blocks included in the request is 1000. As a result, big updates require multiple API calls. PUT and DELETE_IF_EXISTS Use ChangeCidrCollection to perform the following actions: PUT: Create a CIDR block within the specified collection. DELETE_IF_EXISTS: Delete an existing CIDR block from the collection."
      parameters:
        - name: cidr_collection_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The UUID of the CIDR collection to update.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                CollectionVersion:
                  $ref: "#/components/schemas/CollectionVersion"
                Changes:
                  $ref: "#/components/schemas/CidrCollectionChanges"
              required:
                - Changes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeCidrCollectionOutputDisplay"
    delete:
      operationId: DeleteCidrCollection
      description: Deletes a CIDR collection in the current Amazon Web Services account. The collection must be empty before it can be deleted.
      parameters:
        - name: cidr_collection_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The UUID of the collection to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCidrCollectionOutputDisplay"
    get:
      operationId: ListCidrLocations
      description: Returns a paginated list of CIDR locations for the given collection (metadata only, does not include CIDR blocks).
      parameters:
        - name: cidr_collection_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The CIDR collection ID.
        - name: nexttoken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: An opaque pagination token to indicate where the service is to begin enumerating results. If no value is provided, the listing of results starts from the beginning.
        - name: maxresults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of CIDR collection locations to return in the response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCidrLocationsOutputDisplay"
  /2013-04-01/hostedzone/{id}/rrset/:
    post:
      operationId: ChangeResourceRecordSets
      description: "Creates, changes, or deletes a resource record set, which contains authoritative DNS information for a specified domain name or subdomain name. For example, you can use ChangeResourceRecordSets to create a resource record set that routes traffic for test.example.com to a web server that has an IP address of 192.0.2.44. Deleting Resource Record Sets To delete a resource record set, you must specify all the same values that you specified when you created it. Change Batches and Transactional Changes The request body must include a document with a ChangeResourceRecordSetsRequest element. The request body contains a list of change items, known as a change batch. Change batches are considered transactional changes. Route 53 validates the changes in the request and then either makes all or none of the changes in the change batch request. This ensures that DNS routing isn't adversely affected by partial changes to the resource record sets in a hosted zone. For example, suppose a change batch request contains two changes: it deletes the CNAME resource record set for www.example.com and creates an alias resource record set for www.example.com. If validation for both records succeeds, Route 53 deletes the first resource record set and creates the second resource record set in a single operation. If validation for either the DELETE or the CREATE action fails, then the request is canceled, and the original CNAME record continues to exist. If you try to delete the same resource record set more than once in a single change batch, Route 53 returns an InvalidChangeBatch error. Traffic Flow To create resource record sets for complex routing configurations, use either the traffic flow visual editor in the Route 53 console or the API actions for traffic policies and traffic policy instances. Save the configuration as a traffic policy, then associate the traffic policy with one or more domain names (such as example.com) or subdomain names (such as www.example.com), in the same hosted zone or in multiple hosted zones. You can roll back the updates if the new configuration isn't performing as expected. For more information, see Using Traffic Flow to Route DNS Traffic in the Amazon Route 53 Developer Guide. Create, Delete, and Upsert Use ChangeResourceRecordsSetsRequest to perform the following actions: CREATE: Creates a resource record set that has the specified values. DELETE: Deletes an existing resource record set that has the specified values. UPSERT: If a resource set doesn't exist, Route 53 creates it. If a resource set exists Route 53 updates it with the values in the request. Syntaxes for Creating, Updating, and Deleting Resource Record Sets The syntax for a request depends on the type of resource record set that you want to create, delete, or update, such as weighted, alias, or failover. The XML elements in your request must appear in the order listed in the syntax. For an example for each type of resource record set, see \"Examples.\" Don't refer to the syntax in the \"Parameter Syntax\" section, which includes all of the elements for every kind of resource record set that you can create, delete, or update by using ChangeResourceRecordSets. Change Propagation to Route 53 DNS Servers When you submit a ChangeResourceRecordSets request, Route 53 propagates your changes to all of the Route 53 authoritative DNS servers managing the hosted zone. While your changes are propagating, GetChange returns a status of PENDING. When propagation is complete, GetChange returns a status of INSYNC. Changes generally propagate to all Route 53 name servers managing the hosted zone within 60 seconds. For more information, see GetChange. Limits on ChangeResourceRecordSets Requests For information about the limits on a ChangeResourceRecordSets request, see Limits in the Amazon Route 53 Developer Guide."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the hosted zone that contains the resource record sets that you want to change.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                ChangeBatch:
                  $ref: "#/components/schemas/ChangeBatch"
              required:
                - ChangeBatch
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeResourceRecordSetsOutputDisplay"
  /2013-04-01/tags/{resource_type}/{resource_id}:
    post:
      operationId: ChangeTagsForResource
      description: Adds, edits, or deletes tags for a health check or a hosted zone. For information about using tags for cost allocation, see Using Cost Allocation Tags in the Billing and Cost Management User Guide.
      parameters:
        - name: resource_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TagResourceType"
          description: The type of the resource. The resource type for health checks is healthcheck. The resource type for hosted zones is hostedzone.
        - name: resource_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TagResourceId"
          description: The ID of the resource for which you want to add, change, or delete tags.
      requestBody:
        required: false
        content:
          application/xml:
            schema:
              type: object
              properties:
                AddTags:
                  $ref: "#/components/schemas/TagList"
                RemoveTagKeys:
                  $ref: "#/components/schemas/TagKeyList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeTagsForResourceOutputDisplay"
    get:
      operationId: ListTagsForResource
      description: Lists tags for one health check or hosted zone. For information about using tags for cost allocation, see Using Cost Allocation Tags in the Billing and Cost Management User Guide.
      parameters:
        - name: resource_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TagResourceType"
          description: The type of the resource. The resource type for health checks is healthcheck. The resource type for hosted zones is hostedzone.
        - name: resource_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TagResourceId"
          description: The ID of the resource for which you want to retrieve tags.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutputDisplay"
  /2013-04-01/cidrcollection:
    post:
      operationId: CreateCidrCollection
      description: Creates a CIDR collection in the current Amazon Web Services account.
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/CollectionName"
                CallerReference:
                  $ref: "#/components/schemas/CidrNonce"
              required:
                - CallerReference
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCidrCollectionOutputDisplay"
    get:
      operationId: ListCidrCollections
      description: Returns a paginated list of CIDR collections in the Amazon Web Services account (metadata only).
      parameters:
        - name: nexttoken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: An opaque pagination token to indicate where the service is to begin enumerating results. If no value is provided, the listing of results starts from the beginning.
        - name: maxresults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of CIDR collections to return in the response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCidrCollectionsOutputDisplay"
  /2013-04-01/healthcheck:
    post:
      operationId: CreateHealthCheck
      description: "Creates a new health check. For information about adding health checks to resource record sets, see HealthCheckId in ChangeResourceRecordSets. ELB Load Balancers If you're registering EC2 instances with an Elastic Load Balancing (ELB) load balancer, do not create Amazon Route 53 health checks for the EC2 instances. When you register an EC2 instance with a load balancer, you configure settings for an ELB health check, which performs a similar function to a Route 53 health check. Private Hosted Zones You can associate health checks with failover resource record sets in a private hosted zone. Note the following: Route 53 health checkers are outside the VPC. To check the health of an endpoint within a VPC by IP address, you must assign a public IP address to the instance in the VPC. You can configure a health checker to check the health of an external resource that the instance relies on, such as a database server. You can create a CloudWatch metric, associate an alarm with the metric, and then create a health check that is based on the state of the alarm. For example, you might create a CloudWatch metric that checks the status of the Amazon EC2 StatusCheckFailed metric, add an alarm to the metric, and then create a health check that is based on the state of the alarm. For information about creating CloudWatch metrics and alarms by using the CloudWatch console, see the Amazon CloudWatch User Guide."
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                CallerReference:
                  $ref: "#/components/schemas/HealthCheckNonce"
                HealthCheckConfig:
                  $ref: "#/components/schemas/HealthCheckConfig"
              required:
                - CallerReference
                - HealthCheckConfig
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateHealthCheckOutputDisplay"
    get:
      operationId: ListHealthChecks
      description: Retrieve a list of the health checks that are associated with the current Amazon Web Services account.
      parameters:
        - name: marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PageMarker"
          description: If the value of IsTruncated in the previous response was true, you have more health checks. To get another group, submit another ListHealthChecks request. For the value of marker, specify the value of NextMarker from the previous response, which is the ID of the first health check that Amazon Route 53 will return if you submit another request. If the value of IsTruncated in the previous response was false, there are no more health checks to get.
        - name: maxitems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PageMaxItems"
          description: The maximum number of health checks that you want ListHealthChecks to return in response to the current request. Amazon Route 53 returns a maximum of 1000 items. If you set MaxItems to a value greater than 1000, Route 53 returns only the first 1000 health checks.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListHealthChecksOutputDisplay"
  /2013-04-01/hostedzone:
    post:
      operationId: CreateHostedZone
      description: "Creates a new public or private hosted zone. You create records in a public hosted zone to define how you want to route traffic on the internet for a domain, such as example.com, and its subdomains (apex.example.com, acme.example.com). You create records in a private hosted zone to define how you want to route traffic for a domain and its subdomains within one or more Amazon Virtual Private Clouds (Amazon VPCs). You can't convert a public hosted zone to a private hosted zone or vice versa. Instead, you must create a new hosted zone with the same name and create new resource record sets. For more information about charges for hosted zones, see Amazon Route 53 Pricing. Note the following: You can't create a hosted zone for a top-level domain (TLD) such as .com. For public hosted zones, Route 53 automatically creates a default SOA record and four NS records for the zone. For more information about SOA and NS records, see NS and SOA Records that Route 53 Creates for a Hosted Zone in the Amazon Route 53 Developer Guide. If you want to use the same name servers for multiple public hosted zones, you can optionally associate a reusable delegation set with the hosted zone. See the DelegationSetId element. If your domain is registered with a registrar other than Route 53, you must update the name servers with your registrar to make Route 53 the DNS service for the domain. For more information, see Migrating DNS Service for an Existing Domain to Amazon Route 53 in the Amazon Route 53 Developer Guide. When you submit a CreateHostedZone request, the initial status of the hosted zone is PENDING. For public hosted zones, this means that the NS and SOA records are not yet available on all Route 53 DNS servers. When the NS and SOA records are available, the status of the zone changes to INSYNC. The CreateHostedZone request requires the caller to have an ec2:DescribeVpcs permission. When creating private hosted zones, the Amazon VPC must belong to the same partition where the hosted zone is created. A partition is a group of Amazon Web Services Regions. Each Amazon Web Services account is scoped to one partition. The following are the supported partitions: aws - Amazon Web Services Regions aws-cn - China Regions aws-us-gov - Amazon Web Services GovCloud (US) Region For more information, see Access Management in the Amazon Web Services General Reference."
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/DNSName"
                VPC:
                  $ref: "#/components/schemas/VPC"
                CallerReference:
                  $ref: "#/components/schemas/Nonce"
                HostedZoneConfig:
                  $ref: "#/components/schemas/HostedZoneConfig"
                DelegationSetId:
                  $ref: "#/components/schemas/ResourceId"
              required:
                - CallerReference
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateHostedZoneOutputDisplay"
    get:
      operationId: ListHostedZones
      description: Retrieves a list of the public and private hosted zones that are associated with the current Amazon Web Services account. The response includes a HostedZones child element for each hosted zone. Amazon Route 53 returns a maximum of 100 items in each response. If you have a lot of hosted zones, you can use the maxitems parameter to list them in groups of up to 100.
      parameters:
        - name: marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PageMarker"
          description: If the value of IsTruncated in the previous response was true, you have more hosted zones. To get more hosted zones, submit another ListHostedZones request. For the value of marker, specify the value of NextMarker from the previous response, which is the ID of the first hosted zone that Amazon Route 53 will return if you submit another request. If the value of IsTruncated in the previous response was false, there are no more hosted zones to get.
        - name: maxitems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PageMaxItems"
          description: (Optional) The maximum number of hosted zones that you want Amazon Route 53 to return. If you have more than maxitems hosted zones, the value of IsTruncated in the response is true, and the value of NextMarker is the hosted zone ID of the first hosted zone that Route 53 will return if you submit another request.
        - name: delegationsetid
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: If you're using reusable delegation sets and you want to list all of the hosted zones that are associated with a reusable delegation set, specify the ID of that reusable delegation set.
        - name: hostedzonetype
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/HostedZoneType"
          description: (Optional) Specifies if the hosted zone is private.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListHostedZonesOutputDisplay"
  /2013-04-01/keysigningkey:
    post:
      operationId: CreateKeySigningKey
      description: Creates a new key-signing key (KSK) associated with a hosted zone. You can only have two KSKs per hosted zone.
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                CallerReference:
                  $ref: "#/components/schemas/Nonce"
                HostedZoneId:
                  $ref: "#/components/schemas/ResourceId"
                KeyManagementServiceArn:
                  $ref: "#/components/schemas/SigningKeyString"
                Name:
                  $ref: "#/components/schemas/SigningKeyName"
                Status:
                  $ref: "#/components/schemas/SigningKeyStatus"
              required:
                - CallerReference
                - HostedZoneId
                - KeyManagementServiceArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateKeySigningKeyOutputDisplay"
  /2013-04-01/queryloggingconfig:
    post:
      operationId: CreateQueryLoggingConfig
      description: "Creates a configuration for DNS query logging. After you create a query logging configuration, Amazon Route 53 begins to publish log data to an Amazon CloudWatch Logs log group. DNS query logs contain information about the queries that Route 53 receives for a specified public hosted zone, such as the following: Route 53 edge location that responded to the DNS query Domain or subdomain that was requested DNS record type, such as A or AAAA DNS response code, such as NoError or ServFail Log Group and Resource Policy Before you create a query logging configuration, perform the following operations. If you create a query logging configuration using the Route 53 console, Route 53 performs these operations automatically. Create a CloudWatch Logs log group, and make note of the ARN, which you specify when you create a query logging configuration. Note the following: You must create the log group in the us-east-1 region. You must use the same Amazon Web Services account to create the log group and the hosted zone that you want to configure query logging for. When you create log groups for query logging, we recommend that you use a consistent prefix, for example: /aws/route53/hosted zone name In the next step, you'll create a resource policy, which controls access to one or more log groups and the associated Amazon Web Services resources, such as Route 53 hosted zones. There's a limit on the number of resource policies that you can create, so we recommend that you use a consistent prefix so you can use the same resource policy for all the log groups that you create for query logging. Create a CloudWatch Logs resource policy, and give it the permissions that Route 53 needs to create log streams and to send query logs to log streams. You must create the CloudWatch Logs resource policy in the us-east-1 region. For the value of Resource, specify the ARN for the log group that you created in the previous step. To use the same resource policy for all the CloudWatch Logs log groups that you created for query logging configurations, replace the hosted zone name with *, for example: arn:aws:logs:us-east-1:123412341234:log-group:/aws/route53/* To avoid the confused deputy problem, a security issue where an entity without a permission for an action can coerce a more-privileged entity to perform it, you can optionally limit the permissions that a service has to a resource in a resource-based policy by supplying the following values: For aws:SourceArn, supply the hosted zone ARN used in creating the query logging configuration. For example, aws:SourceArn: arn:aws:route53:::hostedzone/hosted zone ID. For aws:SourceAccount, supply the account ID for the account that creates the query logging configuration. For example, aws:SourceAccount:111111111111. For more information, see The confused deputy problem in the Amazon Web Services IAM User Guide. You can't use the CloudWatch console to create or edit a resource policy. You must use the CloudWatch API, one of the Amazon Web Services SDKs, or the CLI. Log Streams and Edge Locations When Route 53 finishes creating the configuration for DNS query logging, it does the following: Creates a log stream for an edge location the first time that the edge location responds to DNS queries for the specified hosted zone. That log stream is used to log all queries that Route 53 responds to for that edge location. Begins to send query logs to the applicable log stream. The name of each log stream is in the following format: hosted zone ID/edge location code The edge location code is a three-letter code and an arbitrarily assigned number, for example, DFW3. The three-letter code typically corresponds with the International Air Transport Association airport code for an airport near the edge location. (These abbreviations might change in the future.) For a list of edge locations, see \"The Route 53 Global Network\" on the Route 53 Product Details page. Queries That Are Logged Query logs contain only the queries that DNS resolvers forward to Route 53. If a DNS resolver has already cached the response to a query (such as the IP address for a load balancer for example.com), the resolver will continue to return the cached response. It doesn't forward another query to Route 53 until the TTL for the corresponding resource record set expires. Depending on how many DNS queries are submitted for a resource record set, and depending on the TTL for that resource record set, query logs might contain information about only one query out of every several thousand queries that are submitted to DNS. For more information about how DNS works, see Routing Internet Traffic to Your Website or Web Application in the Amazon Route 53 Developer Guide. Log File Format For a list of the values in each query log and the format of each value, see Logging DNS Queries in the Amazon Route 53 Developer Guide. Pricing For information about charges for query logs, see Amazon CloudWatch Pricing. How to Stop Logging If you want Route 53 to stop sending query logs to CloudWatch Logs, delete the query logging configuration. For more information, see DeleteQueryLoggingConfig."
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                HostedZoneId:
                  $ref: "#/components/schemas/ResourceId"
                CloudWatchLogsLogGroupArn:
                  $ref: "#/components/schemas/CloudWatchLogsLogGroupArn"
              required:
                - HostedZoneId
                - CloudWatchLogsLogGroupArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateQueryLoggingConfigOutputDisplay"
    get:
      operationId: ListQueryLoggingConfigs
      description: Lists the configurations for DNS query logging that are associated with the current Amazon Web Services account or the configuration that is associated with a specified hosted zone. For more information about DNS query logs, see CreateQueryLoggingConfig. Additional information, including the format of DNS query logs, appears in Logging DNS Queries in the Amazon Route 53 Developer Guide.
      parameters:
        - name: hostedzoneid
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: (Optional) If you want to list the query logging configuration that is associated with a hosted zone, specify the ID in HostedZoneId. If you don't specify a hosted zone ID, ListQueryLoggingConfigs returns all of the configurations that are associated with the current Amazon Web Services account.
        - name: nexttoken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: (Optional) If the current Amazon Web Services account has more than MaxResults query logging configurations, use NextToken to get the second and subsequent pages of results. For the first ListQueryLoggingConfigs request, omit this value. For the second and subsequent requests, get the value of NextToken from the previous response and specify that value for NextToken in the request.
        - name: maxresults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: (Optional) The maximum number of query logging configurations that you want Amazon Route 53 to return in response to the current request. If the current Amazon Web Services account has more than MaxResults configurations, use the value of NextToken in the response to get the next page of results. If you don't specify a value for MaxResults, Route 53 returns up to 100 configurations.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListQueryLoggingConfigsOutputDisplay"
  /2013-04-01/delegationset:
    post:
      operationId: CreateReusableDelegationSet
      description: "Creates a delegation set (a group of four name servers) that can be reused by multiple hosted zones that were created by the same Amazon Web Services account. You can also create a reusable delegation set that uses the four name servers that are associated with an existing hosted zone. Specify the hosted zone ID in the CreateReusableDelegationSet request. You can't associate a reusable delegation set with a private hosted zone. For information about using a reusable delegation set to configure white label name servers, see Configuring White Label Name Servers. The process for migrating existing hosted zones to use a reusable delegation set is comparable to the process for configuring white label name servers. You need to perform the following steps: Create a reusable delegation set. Recreate hosted zones, and reduce the TTL to 60 seconds or less. Recreate resource record sets in the new hosted zones. Change the registrar's name servers to use the name servers for the new hosted zones. Monitor traffic for the website or application. Change TTLs back to their original values. If you want to migrate existing hosted zones to use a reusable delegation set, the existing hosted zones can't use any of the name servers that are assigned to the reusable delegation set. If one or more hosted zones do use one or more name servers that are assigned to the reusable delegation set, you can do one of the following: For small numbers of hosted zones—up to a few hundred—it's relatively easy to create reusable delegation sets until you get one that has four name servers that don't overlap with any of the name servers in your hosted zones. For larger numbers of hosted zones, the easiest solution is to use more than one reusable delegation set. For larger numbers of hosted zones, you can also migrate hosted zones that have overlapping name servers to hosted zones that don't have overlapping name servers, then migrate the hosted zones again to use the reusable delegation set."
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                CallerReference:
                  $ref: "#/components/schemas/Nonce"
                HostedZoneId:
                  $ref: "#/components/schemas/ResourceId"
              required:
                - CallerReference
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReusableDelegationSetOutputDisplay"
    get:
      operationId: ListReusableDelegationSets
      description: Retrieves a list of the reusable delegation sets that are associated with the current Amazon Web Services account.
      parameters:
        - name: marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PageMarker"
          description: If the value of IsTruncated in the previous response was true, you have more reusable delegation sets. To get another group, submit another ListReusableDelegationSets request. For the value of marker, specify the value of NextMarker from the previous response, which is the ID of the first reusable delegation set that Amazon Route 53 will return if you submit another request. If the value of IsTruncated in the previous response was false, there are no more reusable delegation sets to get.
        - name: maxitems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PageMaxItems"
          description: The number of reusable delegation sets that you want Amazon Route 53 to return in the response to this request. If you specify a value greater than 100, Route 53 returns only the first 100 reusable delegation sets.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReusableDelegationSetsOutputDisplay"
  /2013-04-01/trafficpolicy:
    post:
      operationId: CreateTrafficPolicy
      description: Creates a traffic policy, which you use to create multiple DNS resource record sets for one domain name (such as example.com) or one subdomain name (such as www.example.com).
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/TrafficPolicyName"
                Document:
                  $ref: "#/components/schemas/TrafficPolicyDocument"
                Comment:
                  $ref: "#/components/schemas/TrafficPolicyComment"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTrafficPolicyOutputDisplay"
  /2013-04-01/trafficpolicyinstance:
    post:
      operationId: CreateTrafficPolicyInstance
      description: Creates resource record sets in a specified hosted zone based on the settings in a specified traffic policy version. In addition, CreateTrafficPolicyInstance associates the resource record sets with a specified domain name (such as example.com) or subdomain name (such as www.example.com). Amazon Route 53 responds to DNS queries for the domain or subdomain name by using the resource record sets that CreateTrafficPolicyInstance created. After you submit an CreateTrafficPolicyInstance request, there's a brief delay while Amazon Route 53 creates the resource record sets that are specified in the traffic policy definition. Use GetTrafficPolicyInstance with the id of new traffic policy instance to confirm that the CreateTrafficPolicyInstance request completed successfully. For more information, see the State response element.
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                HostedZoneId:
                  $ref: "#/components/schemas/ResourceId"
                Name:
                  $ref: "#/components/schemas/DNSName"
                TTL:
                  $ref: "#/components/schemas/TTL"
                TrafficPolicyId:
                  $ref: "#/components/schemas/TrafficPolicyId"
                TrafficPolicyVersion:
                  $ref: "#/components/schemas/TrafficPolicyVersion"
              required:
                - HostedZoneId
                - TrafficPolicyId
                - TrafficPolicyVersion
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTrafficPolicyInstanceOutputDisplay"
  /2013-04-01/trafficpolicy/{id}:
    post:
      operationId: CreateTrafficPolicyVersion
      description: Creates a new version of an existing traffic policy. When you create a new version of a traffic policy, you specify the ID of the traffic policy that you want to update and a JSON-formatted document that describes the new version. You use traffic policies to create multiple DNS resource record sets for one domain name (such as example.com) or one subdomain name (such as www.example.com). You can create a maximum of 1000 versions of a traffic policy. If you reach the limit and need to create another version, you'll need to start a new traffic policy.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TrafficPolicyId"
          description: The ID of the traffic policy for which you want to create a new version.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                Document:
                  $ref: "#/components/schemas/TrafficPolicyDocument"
                Comment:
                  $ref: "#/components/schemas/TrafficPolicyComment"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTrafficPolicyVersionOutputDisplay"
  /2013-04-01/hostedzone/{id}/authorizevpcassociation:
    post:
      operationId: CreateVPCAssociationAuthorization
      description: Authorizes the Amazon Web Services account that created a specified VPC to submit an AssociateVPCWithHostedZone request to associate the VPC with a specified hosted zone that was created by a different account. To submit a CreateVPCAssociationAuthorization request, you must use the account that created the hosted zone. After you authorize the association, use the account that created the VPC to submit an AssociateVPCWithHostedZone request. If you want to associate multiple VPCs that you created by using one account with a hosted zone that you created by using a different account, you must submit one authorization request for each VPC.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the private hosted zone that you want to authorize associating a VPC with.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                VPC:
                  $ref: "#/components/schemas/VPC"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVPCAssociationAuthorizationOutputDisplay"
    get:
      operationId: ListVPCAssociationAuthorizations
      description: Gets a list of the VPCs that were created by other accounts and that can be associated with a specified hosted zone because you've submitted one or more CreateVPCAssociationAuthorization requests. The response includes a VPCs element with a VPC child element for each VPC that can be associated with the hosted zone.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the hosted zone for which you want a list of VPCs that can be associated with the hosted zone.
        - name: nexttoken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: "Optional: If a response includes a NextToken element, there are more VPCs that can be associated with the specified hosted zone. To get the next page of results, submit another request, and include the value of NextToken from the response in the nexttoken parameter in another ListVPCAssociationAuthorizations request."
        - name: maxresults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: "Optional: An integer that specifies the maximum number of VPCs that you want Amazon Route 53 to return. If you don't specify a value for MaxResults, Route 53 returns up to 50 VPCs per page."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVPCAssociationAuthorizationsOutputDisplay"
  /2013-04-01/keysigningkey/{hosted_zone_id}/{name}/deactivate:
    post:
      operationId: DeactivateKeySigningKey
      description: Deactivates a key-signing key (KSK) so that it will not be used for signing by DNSSEC. This operation changes the KSK status to INACTIVE.
      parameters:
        - name: hosted_zone_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: A unique string used to identify a hosted zone.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SigningKeyName"
          description: A string used to identify a key-signing key (KSK).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeactivateKeySigningKeyOutputDisplay"
  /2013-04-01/healthcheck/{health_check_id}:
    delete:
      operationId: DeleteHealthCheck
      description: Deletes a health check. Amazon Route 53 does not prevent you from deleting a health check even if the health check is associated with one or more resource record sets. If you delete a health check and you don't update the associated resource record sets, the future status of the health check can't be predicted and may change. This will affect the routing of DNS queries for your DNS failover configuration. For more information, see Replacing and Deleting Health Checks in the Amazon Route 53 Developer Guide. If you're using Cloud Map and you configured Cloud Map to create a Route 53 health check when you register an instance, you can't use the Route 53 DeleteHealthCheck command to delete the health check. The health check is deleted automatically when you deregister the instance; there can be a delay of several hours before the health check is deleted from Route 53.
      parameters:
        - name: health_check_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/HealthCheckId"
          description: The ID of the health check that you want to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteHealthCheckOutputDisplay"
    get:
      operationId: GetHealthCheck
      description: Gets information about a specified health check.
      parameters:
        - name: health_check_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/HealthCheckId"
          description: The identifier that Amazon Route 53 assigned to the health check when you created it. When you add or update a resource record set, you use this value to specify which health check to use. The value can be up to 64 characters long.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetHealthCheckOutputDisplay"
    post:
      operationId: UpdateHealthCheck
      description: Updates an existing health check. Note that some values can't be updated. For more information about updating health checks, see Creating, Updating, and Deleting Health Checks in the Amazon Route 53 Developer Guide.
      parameters:
        - name: health_check_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/HealthCheckId"
          description: The ID for the health check for which you want detailed information. When you created the health check, CreateHealthCheck returned the ID in the response, in the HealthCheckId element.
      requestBody:
        required: false
        content:
          application/xml:
            schema:
              type: object
              properties:
                HealthCheckVersion:
                  $ref: "#/components/schemas/HealthCheckVersion"
                IPAddress:
                  $ref: "#/components/schemas/IPAddress"
                Port:
                  $ref: "#/components/schemas/Port"
                ResourcePath:
                  $ref: "#/components/schemas/ResourcePath"
                FullyQualifiedDomainName:
                  $ref: "#/components/schemas/FullyQualifiedDomainName"
                SearchString:
                  $ref: "#/components/schemas/SearchString"
                FailureThreshold:
                  $ref: "#/components/schemas/FailureThreshold"
                Inverted:
                  $ref: "#/components/schemas/Inverted"
                Disabled:
                  $ref: "#/components/schemas/Disabled"
                HealthThreshold:
                  $ref: "#/components/schemas/HealthThreshold"
                ChildHealthChecks:
                  $ref: "#/components/schemas/ChildHealthCheckList"
                EnableSNI:
                  $ref: "#/components/schemas/EnableSNI"
                Regions:
                  $ref: "#/components/schemas/HealthCheckRegionList"
                AlarmIdentifier:
                  $ref: "#/components/schemas/AlarmIdentifier"
                InsufficientDataHealthStatus:
                  $ref: "#/components/schemas/InsufficientDataHealthStatus"
                ResetElements:
                  $ref: "#/components/schemas/ResettableElementNameList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateHealthCheckOutputDisplay"
  /2013-04-01/hostedzone/{id}:
    delete:
      operationId: DeleteHostedZone
      description: "Deletes a hosted zone. If the hosted zone was created by another service, such as Cloud Map, see Deleting Public Hosted Zones That Were Created by Another Service in the Amazon Route 53 Developer Guide for information about how to delete it. (The process is the same for public and private hosted zones that were created by another service.) If you want to keep your domain registration but you want to stop routing internet traffic to your website or web application, we recommend that you delete resource record sets in the hosted zone instead of deleting the hosted zone. If you delete a hosted zone, you can't undelete it. You must create a new hosted zone and update the name servers for your domain registration, which can require up to 48 hours to take effect. (If you delegated responsibility for a subdomain to a hosted zone and you delete the child hosted zone, you must update the name servers in the parent hosted zone.) In addition, if you delete a hosted zone, someone could hijack the domain and route traffic to their own resources using your domain name. If you want to avoid the monthly charge for the hosted zone, you can transfer DNS service for the domain to a free DNS service. When you transfer DNS service, you have to update the name servers for the domain registration. If the domain is registered with Route 53, see UpdateDomainNameservers for information about how to replace Route 53 name servers with name servers for the new DNS service. If the domain is registered with another registrar, use the method provided by the registrar to update name servers for the domain registration. For more information, perform an internet search on \"free DNS service.\" You can delete a hosted zone only if it contains only the default SOA and NS records and has DNSSEC signing disabled. If the hosted zone contains other records or has DNSSEC enabled, you must delete the records and disable DNSSEC before deletion. Attempting to delete a hosted zone with additional records or DNSSEC enabled returns a HostedZoneNotEmpty error. For information about deleting records, see ChangeResourceRecordSets. To verify that the hosted zone has been deleted, do one of the following: Use the GetHostedZone action to request information about the hosted zone. Use the ListHostedZones action to get a list of the hosted zones associated with the current Amazon Web Services account."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the hosted zone you want to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteHostedZoneOutputDisplay"
    get:
      operationId: GetHostedZone
      description: Gets information about a specified hosted zone including the four name servers assigned to the hosted zone. returns the VPCs associated with the specified hosted zone and does not reflect the VPC associations by Route 53 Profiles. To get the associations to a Profile, call the ListProfileAssociations API.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the hosted zone that you want to get information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetHostedZoneOutputDisplay"
    post:
      operationId: UpdateHostedZoneComment
      description: Updates the comment for a specified hosted zone.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID for the hosted zone that you want to update the comment for.
      requestBody:
        required: false
        content:
          application/xml:
            schema:
              type: object
              properties:
                Comment:
                  $ref: "#/components/schemas/ResourceDescription"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateHostedZoneCommentOutputDisplay"
  /2013-04-01/keysigningkey/{hosted_zone_id}/{name}:
    delete:
      operationId: DeleteKeySigningKey
      description: Deletes a key-signing key (KSK). Before you can delete a KSK, you must deactivate it. The KSK must be deactivated before you can delete it regardless of whether the hosted zone is enabled for DNSSEC signing. You can use DeactivateKeySigningKey to deactivate the key before you delete it. Use GetDNSSEC to verify that the KSK is in an INACTIVE status.
      parameters:
        - name: hosted_zone_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: A unique string used to identify a hosted zone.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SigningKeyName"
          description: A string used to identify a key-signing key (KSK).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteKeySigningKeyOutputDisplay"
  /2013-04-01/queryloggingconfig/{id}:
    delete:
      operationId: DeleteQueryLoggingConfig
      description: Deletes a configuration for DNS query logging. If you delete a configuration, Amazon Route 53 stops sending query logs to CloudWatch Logs. Route 53 doesn't delete any logs that are already in CloudWatch Logs. For more information about DNS query logs, see CreateQueryLoggingConfig.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/QueryLoggingConfigId"
          description: The ID of the configuration that you want to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteQueryLoggingConfigOutputDisplay"
    get:
      operationId: GetQueryLoggingConfig
      description: Gets information about a specified configuration for DNS query logging. For more information about DNS query logs, see CreateQueryLoggingConfig and Logging DNS Queries.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/QueryLoggingConfigId"
          description: The ID of the configuration for DNS query logging that you want to get information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQueryLoggingConfigOutputDisplay"
  /2013-04-01/delegationset/{id}:
    delete:
      operationId: DeleteReusableDelegationSet
      description: Deletes a reusable delegation set. You can delete a reusable delegation set only if it isn't associated with any hosted zones. To verify that the reusable delegation set is not associated with any hosted zones, submit a GetReusableDelegationSet request and specify the ID of the reusable delegation set that you want to delete.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the reusable delegation set that you want to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteReusableDelegationSetOutputDisplay"
    get:
      operationId: GetReusableDelegationSet
      description: Retrieves information about a specified reusable delegation set, including the four name servers that are assigned to the delegation set.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the reusable delegation set that you want to get a list of name servers for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetReusableDelegationSetOutputDisplay"
  /2013-04-01/trafficpolicy/{id}/{version}:
    delete:
      operationId: DeleteTrafficPolicy
      description: "Deletes a traffic policy. When you delete a traffic policy, Route 53 sets a flag on the policy to indicate that it has been deleted. However, Route 53 never fully deletes the traffic policy. Note the following: Deleted traffic policies aren't listed if you run ListTrafficPolicies. There's no way to get a list of deleted policies. If you retain the ID of the policy, you can get information about the policy, including the traffic policy document, by running GetTrafficPolicy."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TrafficPolicyId"
          description: The ID of the traffic policy that you want to delete.
        - name: version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TrafficPolicyVersion"
          description: The version number of the traffic policy that you want to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTrafficPolicyOutputDisplay"
    get:
      operationId: GetTrafficPolicy
      description: Gets information about a specific traffic policy version. For information about how of deleting a traffic policy affects the response from GetTrafficPolicy, see DeleteTrafficPolicy.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TrafficPolicyId"
          description: The ID of the traffic policy that you want to get information about.
        - name: version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TrafficPolicyVersion"
          description: The version number of the traffic policy that you want to get information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTrafficPolicyOutputDisplay"
    post:
      operationId: UpdateTrafficPolicyComment
      description: Updates the comment for a specified traffic policy version.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TrafficPolicyId"
          description: The value of Id for the traffic policy that you want to update the comment for.
        - name: version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TrafficPolicyVersion"
          description: The value of Version for the traffic policy that you want to update the comment for.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                Comment:
                  $ref: "#/components/schemas/TrafficPolicyComment"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTrafficPolicyCommentOutputDisplay"
  /2013-04-01/trafficpolicyinstance/{id}:
    delete:
      operationId: DeleteTrafficPolicyInstance
      description: Deletes a traffic policy instance and all of the resource record sets that Amazon Route 53 created when you created the instance. In the Route 53 console, traffic policy instances are known as policy records.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TrafficPolicyInstanceId"
          description: The ID of the traffic policy instance that you want to delete. When you delete a traffic policy instance, Amazon Route 53 also deletes all of the resource record sets that were created when you created the traffic policy instance.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTrafficPolicyInstanceOutputDisplay"
    get:
      operationId: GetTrafficPolicyInstance
      description: Gets information about a specified traffic policy instance. Use GetTrafficPolicyInstance with the id of new traffic policy instance to confirm that the CreateTrafficPolicyInstance or an UpdateTrafficPolicyInstance request completed successfully. For more information, see the State response element. In the Route 53 console, traffic policy instances are known as policy records.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TrafficPolicyInstanceId"
          description: The ID of the traffic policy instance that you want to get information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTrafficPolicyInstanceOutputDisplay"
    post:
      operationId: UpdateTrafficPolicyInstance
      description: "After you submit a UpdateTrafficPolicyInstance request, there's a brief delay while Route 53 creates the resource record sets that are specified in the traffic policy definition. Use GetTrafficPolicyInstance with the id of updated traffic policy instance confirm that the UpdateTrafficPolicyInstance request completed successfully. For more information, see the State response element. Updates the resource record sets in a specified hosted zone that were created based on the settings in a specified traffic policy version. When you update a traffic policy instance, Amazon Route 53 continues to respond to DNS queries for the root resource record set name (such as example.com) while it replaces one group of resource record sets with another. Route 53 performs the following operations: Route 53 creates a new group of resource record sets based on the specified traffic policy. This is true regardless of how significant the differences are between the existing resource record sets and the new resource record sets. When all of the new resource record sets have been created, Route 53 starts to respond to DNS queries for the root resource record set name (such as example.com) by using the new resource record sets. Route 53 deletes the old group of resource record sets that are associated with the root resource record set name."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TrafficPolicyInstanceId"
          description: The ID of the traffic policy instance that you want to update.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                TTL:
                  $ref: "#/components/schemas/TTL"
                TrafficPolicyId:
                  $ref: "#/components/schemas/TrafficPolicyId"
                TrafficPolicyVersion:
                  $ref: "#/components/schemas/TrafficPolicyVersion"
              required:
                - TrafficPolicyId
                - TrafficPolicyVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTrafficPolicyInstanceOutputDisplay"
  /2013-04-01/hostedzone/{id}/deauthorizevpcassociation:
    post:
      operationId: DeleteVPCAssociationAuthorization
      description: Removes authorization to submit an AssociateVPCWithHostedZone request to associate a specified VPC with a hosted zone that was created by a different account. You must use the account that created the hosted zone to submit a DeleteVPCAssociationAuthorization request. Sending this request only prevents the Amazon Web Services account that created the VPC from associating the VPC with the Amazon Route 53 hosted zone in the future. If the VPC is already associated with the hosted zone, DeleteVPCAssociationAuthorization won't disassociate the VPC from the hosted zone. If you want to delete an existing association, use DisassociateVPCFromHostedZone.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: When removing authorization to associate a VPC that was created by one Amazon Web Services account with a hosted zone that was created with a different Amazon Web Services account, the ID of the hosted zone.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                VPC:
                  $ref: "#/components/schemas/VPC"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVPCAssociationAuthorizationOutputDisplay"
  /2013-04-01/hostedzone/{id}/disable-dnssec:
    post:
      operationId: DisableHostedZoneDNSSEC
      description: Disables DNSSEC signing in a specific hosted zone. This action does not deactivate any key-signing keys (KSKs) that are active in the hosted zone.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: A unique string used to identify a hosted zone.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableHostedZoneDNSSECOutputDisplay"
  /2013-04-01/hostedzone/{id}/disassociatevpc:
    post:
      operationId: DisassociateVPCFromHostedZone
      description: "Disassociates an Amazon Virtual Private Cloud (Amazon VPC) from an Amazon Route 53 private hosted zone. Note the following: You can't disassociate the last Amazon VPC from a private hosted zone. You can't convert a private hosted zone into a public hosted zone. You can submit a DisassociateVPCFromHostedZone request using either the account that created the hosted zone or the account that created the Amazon VPC. Some services, such as Cloud Map and Amazon Elastic File System (Amazon EFS) automatically create hosted zones and associate VPCs with the hosted zones. A service can create a hosted zone using your account or using its own account. You can disassociate a VPC from a hosted zone only if the service created the hosted zone using your account. When you run DisassociateVPCFromHostedZone, if the hosted zone has a value for OwningAccount, you can use DisassociateVPCFromHostedZone. If the hosted zone has a value for OwningService, you can't use DisassociateVPCFromHostedZone. When revoking access, the hosted zone and the Amazon VPC must belong to the same partition. A partition is a group of Amazon Web Services Regions. Each Amazon Web Services account is scoped to one partition. The following are the supported partitions: aws - Amazon Web Services Regions aws-cn - China Regions aws-us-gov - Amazon Web Services GovCloud (US) Region For more information, see Access Management in the Amazon Web Services General Reference."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the private hosted zone that you want to disassociate a VPC from.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                VPC:
                  $ref: "#/components/schemas/VPC"
                Comment:
                  $ref: "#/components/schemas/DisassociateVPCComment"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateVPCFromHostedZoneOutputDisplay"
  /2013-04-01/hostedzone/{id}/enable-dnssec:
    post:
      operationId: EnableHostedZoneDNSSEC
      description: Enables DNSSEC signing in a specific hosted zone.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: A unique string used to identify a hosted zone.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnableHostedZoneDNSSECOutputDisplay"
  /2013-04-01/accountlimit/{type}:
    get:
      operationId: GetAccountLimit
      description: Gets the specified limit for the current account, for example, the maximum number of health checks that you can create using the account. For the default limit, see Limits in the Amazon Route 53 Developer Guide. To request a higher limit, open a case. You can also view account limits in Amazon Web Services Trusted Advisor. Sign in to the Amazon Web Services Management Console and open the Trusted Advisor console at https://console.aws.amazon.com/trustedadvisor/. Then choose Service limits in the navigation pane.
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccountLimitType"
          description: "The limit that you want to get. Valid values include the following: MAX_HEALTH_CHECKS_BY_OWNER: The maximum number of health checks that you can create using the current account. MAX_HOSTED_ZONES_BY_OWNER: The maximum number of hosted zones that you can create using the current account. MAX_REUSABLE_DELEGATION_SETS_BY_OWNER: The maximum number of reusable delegation sets that you can create using the current account. MAX_TRAFFIC_POLICIES_BY_OWNER: The maximum number of traffic policies that you can create using the current account. MAX_TRAFFIC_POLICY_INSTANCES_BY_OWNER: The maximum number of traffic policy instances that you can create using the current account. (Traffic policy instances are referred to as traffic flow policy records in the Amazon Route 53 console.)"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountLimitOutputDisplay"
  /2013-04-01/change/{id}:
    get:
      operationId: GetChange
      description: "Returns the current status of a change batch request. The status is one of the following values: PENDING indicates that the changes in this request have not propagated to all Amazon Route 53 DNS servers managing the hosted zone. This is the initial status of all change batch requests. INSYNC indicates that the changes have propagated to all Route 53 DNS servers managing the hosted zone."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChangeId"
          description: The ID of the change batch request. The value that you specify here is the value that ChangeResourceRecordSets returned in the Id element when you submitted the request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetChangeOutputDisplay"
  /2013-04-01/checkeripranges:
    get:
      operationId: GetCheckerIpRanges
      description: Route 53 does not perform authorization for this API because it retrieves information that is already available to the public. GetCheckerIpRanges still works, but we recommend that you download ip-ranges.json, which includes IP address ranges for all Amazon Web Services services. For more information, see IP Address Ranges of Amazon Route 53 Servers in the Amazon Route 53 Developer Guide.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCheckerIpRangesOutputDisplay"
  /2013-04-01/hostedzone/{id}/dnssec:
    get:
      operationId: GetDNSSEC
      description: Returns information about DNSSEC for a specific hosted zone, including the key-signing keys (KSKs) in the hosted zone.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: A unique string used to identify a hosted zone.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDNSSECOutputDisplay"
  /2013-04-01/geolocation:
    get:
      operationId: GetGeoLocation
      description: "Gets information about whether a specified geographic location is supported for Amazon Route 53 geolocation resource record sets. Route 53 does not perform authorization for this API because it retrieves information that is already available to the public. Use the following syntax to determine whether a continent is supported for geolocation: GET /2013-04-01/geolocation?continentcode=two-letter abbreviation for a continent Use the following syntax to determine whether a country is supported for geolocation: GET /2013-04-01/geolocation?countrycode=two-character country code Use the following syntax to determine whether a subdivision of a country is supported for geolocation: GET /2013-04-01/geolocation?countrycode=two-character country code&subdivisioncode=subdivision code"
      parameters:
        - name: continentcode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GeoLocationContinentCode"
          description: "For geolocation resource record sets, a two-letter abbreviation that identifies a continent. Amazon Route 53 supports the following continent codes: AF: Africa AN: Antarctica AS: Asia EU: Europe OC: Oceania NA: North America SA: South America"
        - name: countrycode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GeoLocationCountryCode"
          description: Amazon Route 53 uses the two-letter country codes that are specified in ISO standard 3166-1 alpha-2. Route 53 also supports the country code UA for Ukraine.
        - name: subdivisioncode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GeoLocationSubdivisionCode"
          description: "The code for the subdivision, such as a particular state within the United States. For a list of US state abbreviations, see Appendix B: Two–Letter State and Possession Abbreviations on the United States Postal Service website. For a list of all supported subdivision codes, use the ListGeoLocations API."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGeoLocationOutputDisplay"
  /2013-04-01/healthcheckcount:
    get:
      operationId: GetHealthCheckCount
      description: Retrieves the number of health checks that are associated with the current Amazon Web Services account.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetHealthCheckCountOutputDisplay"
  /2013-04-01/healthcheck/{health_check_id}/lastfailurereason:
    get:
      operationId: GetHealthCheckLastFailureReason
      description: Gets the reason that a specified health check failed most recently.
      parameters:
        - name: health_check_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/HealthCheckId"
          description: The ID for the health check for which you want the last failure reason. When you created the health check, CreateHealthCheck returned the ID in the response, in the HealthCheckId element. If you want to get the last failure reason for a calculated health check, you must use the Amazon Route 53 console or the CloudWatch console. You can't use GetHealthCheckLastFailureReason for a calculated health check.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetHealthCheckLastFailureReasonOutputDisplay"
  /2013-04-01/healthcheck/{health_check_id}/status:
    get:
      operationId: GetHealthCheckStatus
      description: Gets status of a specified health check. This API is intended for use during development to diagnose behavior. It doesn’t support production use-cases with high query rates that require immediate and actionable responses.
      parameters:
        - name: health_check_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/HealthCheckId"
          description: The ID for the health check that you want the current status for. When you created the health check, CreateHealthCheck returned the ID in the response, in the HealthCheckId element. If you want to check the status of a calculated health check, you must use the Amazon Route 53 console or the CloudWatch console. You can't use GetHealthCheckStatus to get the status of a calculated health check.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetHealthCheckStatusOutputDisplay"
  /2013-04-01/hostedzonecount:
    get:
      operationId: GetHostedZoneCount
      description: Retrieves the number of hosted zones that are associated with the current Amazon Web Services account.
      parameters: []
      responses:
        "200":
