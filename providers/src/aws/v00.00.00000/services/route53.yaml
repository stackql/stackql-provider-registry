                $ref: "#/components/schemas/GetTrafficPolicyInstanceCountOutputDisplay"
  /2013-04-01/cidrcollection/{cidr_collection_id}/cidrblocks:
    get:
      operationId: ListCidrBlocks
      description: Returns a paginated list of location objects and their CIDR blocks.
      parameters:
        - name: cidr_collection_id
          in: path
