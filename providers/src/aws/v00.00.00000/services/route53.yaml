    GeoProximityLocation:
      description: "(Resource record sets only): A complex type that lets you specify where your resources are located. Only one of LocalZoneGroup, Coordinates, or Amazon Web ServicesRegion is allowed per request at a time. For more information about geoproximity routing, see Geoproximity routing in the Amazon Route 53 Developer Guide."
      type: object
      properties:
        AWSRegion:
          $ref: "#/components/schemas/AWSRegion"
          description: The Amazon Web Services Region the resource you are directing DNS traffic to, is in.
        LocalZoneGroup:
          $ref: "#/components/schemas/LocalZoneGroup"
          description: 'Specifies an Amazon Web Services Local Zone Group. A local Zone Group is usually the Local Zone code without the ending character. For example, if the Local Zone is us-east-1-bue-1a the Local Zone Group is us-east-1-bue-1. You can identify the Local Zones Group for a specific Local Zone by using the describe-availability-zones CLI command: This command returns: "GroupName": "us-west-2-den-1", specifying that the Local Zone us-west-2-den-1a belongs to the Local Zone Group us-west-2-den-1.'
        Coordinates:
          $ref: "#/components/schemas/Coordinates"
          description: Contains the longitude and latitude for a geographic region.
        Bias:
          $ref: "#/components/schemas/Bias"
          description: "The bias increases or decreases the size of the geographic region from which Route 53 routes traffic to a resource. To use Bias to change the size of the geographic region, specify the applicable value for the bias: To expand the size of the geographic region from which Route 53 routes traffic to a resource, specify a positive integer from 1 to 99 for the bias. Route 53 shrinks the size of adjacent regions. To shrink the size of the geographic region from which Route 53 routes traffic to a resource, specify a negative bias of -1 to -99. Route 53 expands the size of adjacent regions."
    AWSRegion:
      type: string
      minLength: 1
      maxLength: 64
    LocalZoneGroup:
      type: string
      minLength: 1
      maxLength: 64
    Coordinates:
      description: A complex type that lists the coordinates for a geoproximity resource record.
      type: object
      properties:
        Latitude:
          $ref: "#/components/schemas/Latitude"
          description: Specifies a coordinate of the north–south position of a geographic point on the surface of the Earth (-90 - 90).
        Longitude:
          $ref: "#/components/schemas/Longitude"
          description: Specifies a coordinate of the east–west position of a geographic point on the surface of the Earth (-180 - 180).
