    SigningKeyString:
      type: string
    SigningKeyStatus:
      type: string
      minLength: 5
      maxLength: 150
    KeySigningKeyDisplay:
      type: object
      properties:
        Name:
          type: string
          description: A string used to identify a key-signing key (KSK). Name can include numbers, letters, and underscores (_). Name must be unique for each key-signing key in the same hosted zone.
        KmsArn:
          type: string
          description: 'The Amazon resource name (ARN) used to identify the customer managed key in Key Management Service (KMS). The KmsArn must be unique for each key-signing key (KSK) in a single hosted zone. You must configure the customer managed key as follows: Status Enabled Key spec ECC_NIST_P256 Key usage Sign and verify Key policy The key policy must give permission for the following actions: DescribeKey GetPublicKey Sign The key policy must also include the Amazon Route 53 service in the principal for your account. Specify the following: "Service": "dnssec-route53.amazonaws.com" For more information about working with the customer managed key in KMS, see Key Management Service concepts.'
        Flag:
          type: integer
          description: An integer that specifies how the key is used. For key-signing key (KSK), this value is always 257.
        SigningAlgorithmMnemonic:
          type: string
          description: A string used to represent the signing algorithm. This value must follow the guidelines provided by RFC-8624 Section 3.1.
        SigningAlgorithmType:
          type: integer
          description: An integer used to represent the signing algorithm. This value must follow the guidelines provided by RFC-8624 Section 3.1.
        DigestAlgorithmMnemonic:
          type: string
          description: A string used to represent the delegation signer digest algorithm. This value must follow the guidelines provided by RFC-8624 Section 3.3.
        DigestAlgorithmType:
          type: integer
          description: An integer used to represent the delegation signer digest algorithm. This value must follow the guidelines provided by RFC-8624 Section 3.3.
        KeyTag:
          type: integer
          description: An integer used to identify the DNSSEC record for the domain name. The process used to calculate the value is described in RFC-4034 Appendix B.
        DigestValue:
          type: string
          description: A cryptographic digest of a DNSKEY resource record (RR). DNSKEY records are used to publish the public key that resolvers can use to verify DNSSEC signatures that are used to secure certain kinds of information provided by the DNS system.
        PublicKey:
          type: string
          description: The public key, represented as a Base64 encoding, as required by RFC-4034 Page 5.
        DSRecord:
          type: string
          description: A string that represents a delegation signer (DS) record.
        DNSKEYRecord:
          type: string
          description: A string that represents a DNSKEY record.
        Status:
          type: string
          description: "A string that represents the current key-signing key (KSK) status. Status can have one of the following values: ACTIVE The KSK is being used for signing. INACTIVE The KSK is not being used for signing. DELETING The KSK is in the process of being deleted. ACTION_NEEDED There is a problem with the KSK that requires you to take action to resolve. For example, the customer managed key might have been deleted, or the permissions for the customer managed key might have been changed. INTERNAL_FAILURE There was an error during a request. Before you can continue to work with DNSSEC signing, including actions that involve this KSK, you must correct the problem. For example, you may need to activate or deactivate the KSK."
        StatusMessage:
          type: string
          description: "The status message provided for the following key-signing key (KSK) statuses: ACTION_NEEDED or INTERNAL_FAILURE. The status message includes information about what the problem might be and steps that you can take to correct the issue."
        CreatedDate:
          type: string
          description: The date when the key-signing key (KSK) was created.
        LastModifiedDate:
          type: string
          description: The last time that the key-signing key (KSK) was changed.
    CreateKeySigningKeyOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/KeySigningKeyDisplay"
