              schema:
                $ref: "#/components/schemas/GetHostedZoneCountOutputDisplay"
  /2013-04-01/hostedzonelimit/{id}/{type}:
    get:
      operationId: GetHostedZoneLimit
      description: Gets the specified limit for a specified hosted zone, for example, the maximum number of records that you can create in the hosted zone. For the default limit, see Limits in the Amazon Route 53 Developer Guide. To request a higher limit, open a case.
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/HostedZoneLimitType"
          description: "The limit that you want to get. Valid values include the following: MAX_RRSETS_BY_ZONE: The maximum number of records that you can create in the specified hosted zone. MAX_VPCS_ASSOCIATED_BY_ZONE: The maximum number of Amazon VPCs that you can associate with the specified private hosted zone."
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the hosted zone that you want to get a limit for.
      responses:
