    JobsList:
      type: array
      items:
        $ref: "#/components/schemas/Job"
    LaunchConfigurationTemplateIDs:
      type: array
      items:
        $ref: "#/components/schemas/LaunchConfigurationTemplateID"
    MaxResultsType:
      type: integer
