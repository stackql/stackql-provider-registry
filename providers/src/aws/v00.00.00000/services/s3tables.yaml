openapi: 3.0.0
info:
  version: "2018-05-10"
  title: Amazon S3 Tables
  description: Amazon S3 Tables
  x-serviceName: s3tables
  x-serviceAlias: s3tables
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: s3tables
servers:
  - url: https://s3tables.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for s3tables
paths:
  /namespaces/{table_bucket_arn}:
    put:
      operationId: CreateNamespace
      description: Creates a namespace. A namespace is a logical grouping of tables within your table bucket, which you can use to organize tables. For more information, see Create a namespace in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:CreateNamespace permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket to create the namespace in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                namespace:
                  $ref: "#/components/schemas/CreateNamespaceRequestNamespaceList"
              required:
                - namespace
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNamespaceResponse"
    get:
      operationId: ListNamespaces
      description: Lists the namespaces within a table bucket. For more information, see Table namespaces in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:ListNamespaces permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
        - name: prefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListNamespacesRequestPrefixString"
          description: The prefix of the namespaces.
        - name: continuationToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: ContinuationToken indicates to Amazon S3 that the list is being continued on this bucket with a token. ContinuationToken is obfuscated and is not a real key. You can use this ContinuationToken for pagination of the list results.
        - name: maxNamespaces
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListNamespacesLimit"
          description: The maximum number of namespaces to return in the list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNamespacesResponse"
  /tables/{table_bucket_arn}/{namespace}:
    put:
      operationId: CreateTable
      description: Creates a new table associated with the given namespace in a table bucket. For more information, see Creating an Amazon S3 table in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:CreateTable permission to use this operation. If you use this operation with the optional metadata request parameter you must have the s3tables:PutTableData permission. If you use this operation with the optional encryptionConfiguration request parameter you must have the s3tables:PutTableEncryption permission. If you use this operation with the storageClassConfiguration request parameter, you must have the s3tables:PutTableStorageClass permission. To create a table with tags, you must have the s3tables:TagResource permission in addition to s3tables:CreateTable permission. Additionally, If you choose SSE-KMS encryption you must grant the S3 Tables maintenance principal access to your KMS key. For more information, see Permissions requirements for S3 Tables SSE-KMS encryption.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket to create the table in.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NamespaceName"
          description: The namespace to associated with the table.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/TableName"
                format:
                  $ref: "#/components/schemas/OpenTableFormat"
                metadata:
                  $ref: "#/components/schemas/TableMetadata"
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                storageClassConfiguration:
                  $ref: "#/components/schemas/StorageClassConfiguration"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - name
                - format
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTableResponse"
  /buckets:
    put:
      operationId: CreateTableBucket
      description: Creates a table bucket. For more information, see Creating a table bucket in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:CreateTableBucket permission to use this operation. If you use this operation with the optional encryptionConfiguration parameter you must have the s3tables:PutTableBucketEncryption permission. If you use this operation with the storageClassConfiguration request parameter, you must have the s3tables:PutTableBucketStorageClass permission. To create a table bucket with tags, you must have the s3tables:TagResource permission in addition to s3tables:CreateTableBucket permission.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/TableBucketName"
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                storageClassConfiguration:
                  $ref: "#/components/schemas/StorageClassConfiguration"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTableBucketResponse"
    get:
      operationId: ListTableBuckets
      description: Lists table buckets for your account. For more information, see S3 Table buckets in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:ListTableBuckets permission to use this operation.
      parameters:
        - name: prefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListTableBucketsRequestPrefixString"
          description: The prefix of the table buckets.
        - name: continuationToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: ContinuationToken indicates to Amazon S3 that the list is being continued on this bucket with a token. ContinuationToken is obfuscated and is not a real key. You can use this ContinuationToken for pagination of the list results.
        - name: maxBuckets
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListTableBucketsLimit"
          description: The maximum number of table buckets to return in the list.
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TableBucketType"
          description: The type of table buckets to filter by in the list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTableBucketsResponse"
  /namespaces/{table_bucket_arn}/{namespace}:
    delete:
      operationId: DeleteNamespace
      description: Deletes a namespace. For more information, see Delete a namespace in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:DeleteNamespace permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket associated with the namespace.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NamespaceName"
          description: The name of the namespace.
      responses:
        "204":
          description: Success
    get:
      operationId: GetNamespace
      description: Gets details about a namespace. For more information, see Table namespaces in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:GetNamespace permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NamespaceName"
          description: The name of the namespace.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetNamespaceResponse"
  /tables/{table_bucket_arn}/{namespace}/{name}:
    delete:
      operationId: DeleteTable
      description: Deletes a table. For more information, see Deleting an Amazon S3 table in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:DeleteTable permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket that contains the table.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NamespaceName"
          description: The namespace associated with the table.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableName"
          description: The name of the table.
        - name: versionToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/VersionToken"
          description: The version token of the table.
      responses:
        "204":
          description: Success
  /buckets/{table_bucket_arn}:
    delete:
      operationId: DeleteTableBucket
      description: Deletes a table bucket. For more information, see Deleting a table bucket in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:DeleteTableBucket permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
      responses:
        "204":
          description: Success
    get:
      operationId: GetTableBucket
      description: Gets details on a table bucket. For more information, see Viewing details about an Amazon S3 table bucket in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:GetTableBucket permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableBucketResponse"
  /buckets/{table_bucket_arn}/encryption:
    delete:
      operationId: DeleteTableBucketEncryption
      description: Deletes the encryption configuration for a table bucket. Permissions You must have the s3tables:DeleteTableBucketEncryption permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
      responses:
        "204":
          description: Success
    get:
      operationId: GetTableBucketEncryption
      description: Gets the encryption configuration for a table bucket. Permissions You must have the s3tables:GetTableBucketEncryption permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableBucketEncryptionResponse"
    put:
      operationId: PutTableBucketEncryption
      description: Sets the encryption configuration for a table bucket. Permissions You must have the s3tables:PutTableBucketEncryption permission to use this operation. If you choose SSE-KMS encryption you must grant the S3 Tables maintenance principal access to your KMS key. For more information, see Permissions requirements for S3 Tables SSE-KMS encryption in the Amazon Simple Storage Service User Guide.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
              required:
                - encryptionConfiguration
      responses:
        "200":
          description: Success
  /buckets/{table_bucket_arn}/metrics:
    delete:
      operationId: DeleteTableBucketMetricsConfiguration
      description: Deletes the metrics configuration for a table bucket. Permissions You must have the s3tables:DeleteTableBucketMetricsConfiguration permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
      responses:
        "204":
          description: Success
    get:
      operationId: GetTableBucketMetricsConfiguration
      description: Gets the metrics configuration for a table bucket. Permissions You must have the s3tables:GetTableBucketMetricsConfiguration permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableBucketMetricsConfigurationResponse"
    put:
      operationId: PutTableBucketMetricsConfiguration
      description: Sets the metrics configuration for a table bucket. Permissions You must have the s3tables:PutTableBucketMetricsConfiguration permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
      responses:
        "204":
          description: Success
  /buckets/{table_bucket_arn}/policy:
    delete:
      operationId: DeleteTableBucketPolicy
      description: Deletes a table bucket policy. For more information, see Deleting a table bucket policy in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:DeleteTableBucketPolicy permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
      responses:
        "204":
          description: Success
    get:
      operationId: GetTableBucketPolicy
      description: Gets details about a table bucket policy. For more information, see Viewing a table bucket policy in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:GetTableBucketPolicy permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableBucketPolicyResponse"
    put:
      operationId: PutTableBucketPolicy
      description: Creates a new table bucket policy or replaces an existing table bucket policy for a table bucket. For more information, see Adding a table bucket policy in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:PutTableBucketPolicy permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourcePolicy:
                  $ref: "#/components/schemas/ResourcePolicy"
              required:
                - resourcePolicy
      responses:
        "200":
          description: Success
  /table-bucket-replication:
    delete:
      operationId: DeleteTableBucketReplication
      description: Deletes the replication configuration for a table bucket. After deletion, new table updates will no longer be replicated to destination buckets, though existing replicated tables will remain in destination buckets. Permissions You must have the s3tables:DeleteTableBucketReplication permission to use this operation.
      parameters:
        - name: tableBucketARN
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
        - name: versionToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/VersionToken"
          description: A version token from a previous GetTableBucketReplication call. Use this token to ensure you're deleting the expected version of the configuration.
      responses:
        "204":
          description: Success
    get:
      operationId: GetTableBucketReplication
      description: Retrieves the replication configuration for a table bucket.This operation returns the IAM role, versionToken, and replication rules that define how tables in this bucket are replicated to other buckets. Permissions You must have the s3tables:GetTableBucketReplication permission to use this operation.
      parameters:
        - name: tableBucketARN
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableBucketReplicationResponse"
    put:
      operationId: PutTableBucketReplication
      description: "Creates or updates the replication configuration for a table bucket. This operation defines how tables in the source bucket are replicated to destination buckets. Replication helps ensure data availability and disaster recovery across regions or accounts. Permissions You must have the s3tables:PutTableBucketReplication permission to use this operation. The IAM role specified in the configuration must have permissions to read from the source bucket and write permissions to all destination buckets. You must also have the following permissions: s3tables:GetTable permission on the source table. s3tables:ListTables permission on the bucket containing the table. s3tables:CreateTable permission for the destination. s3tables:CreateNamespace permission for the destination. s3tables:GetTableMaintenanceConfig permission for the source bucket. s3tables:PutTableMaintenanceConfig permission for the destination bucket. You must have iam:PassRole permission with condition allowing roles to be passed to replication.s3tables.amazonaws.com."
      parameters:
        - name: tableBucketARN
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the source table bucket.
        - name: versionToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/VersionToken"
          description: A version token from a previous GetTableBucketReplication call. Use this token to ensure you're updating the expected version of the configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                configuration:
                  $ref: "#/components/schemas/TableBucketReplicationConfiguration"
              required:
                - configuration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutTableBucketReplicationResponse"
  /tables/{table_bucket_arn}/{namespace}/{name}/policy:
    delete:
      operationId: DeleteTablePolicy
      description: Deletes a table policy. For more information, see Deleting a table policy in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:DeleteTablePolicy permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket that contains the table.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NamespaceName"
          description: The namespace associated with the table.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableName"
          description: The table name.
      responses:
        "204":
          description: Success
    get:
      operationId: GetTablePolicy
      description: Gets details about a table policy. For more information, see Viewing a table policy in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:GetTablePolicy permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket that contains the table.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NamespaceName"
          description: The namespace associated with the table.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableName"
          description: The name of the table.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTablePolicyResponse"
    put:
      operationId: PutTablePolicy
      description: Creates a new table policy or replaces an existing table policy for a table. For more information, see Adding a table policy in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:PutTablePolicy permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket that contains the table.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NamespaceName"
          description: The namespace associated with the table.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableName"
          description: The name of the table.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourcePolicy:
                  $ref: "#/components/schemas/ResourcePolicy"
              required:
                - resourcePolicy
      responses:
        "200":
          description: Success
  /table-replication:
    delete:
      operationId: DeleteTableReplication
      description: Deletes the replication configuration for a specific table. After deletion, new updates to this table will no longer be replicated to destination tables, though existing replicated copies will remain in destination buckets. Permissions You must have the s3tables:DeleteTableReplication permission to use this operation.
      parameters:
        - name: tableArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TableARN"
          description: The Amazon Resource Name (ARN) of the table.
        - name: versionToken
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: A version token from a previous GetTableReplication call. Use this token to ensure you're deleting the expected version of the configuration.
      responses:
        "204":
          description: Success
    get:
      operationId: GetTableReplication
      description: Retrieves the replication configuration for a specific table. Permissions You must have the s3tables:GetTableReplication permission to use this operation.
      parameters:
        - name: tableArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TableARN"
          description: The Amazon Resource Name (ARN) of the table.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableReplicationResponse"
    put:
      operationId: PutTableReplication
      description: "Creates or updates the replication configuration for a specific table. This operation allows you to define table-level replication independently of bucket-level replication, providing granular control over which tables are replicated and where. Permissions You must have the s3tables:PutTableReplication permission to use this operation. The IAM role specified in the configuration must have permissions to read from the source table and write to all destination tables. You must also have the following permissions: s3tables:GetTable permission on the source table being replicated. s3tables:CreateTable permission for the destination. s3tables:CreateNamespace permission for the destination. s3tables:GetTableMaintenanceConfig permission for the source table. s3tables:PutTableMaintenanceConfig permission for the destination table. You must have iam:PassRole permission with condition allowing roles to be passed to replication.s3tables.amazonaws.com."
      parameters:
        - name: tableArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TableARN"
          description: The Amazon Resource Name (ARN) of the source table.
        - name: versionToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A version token from a previous GetTableReplication call. Use this token to ensure you're updating the expected version of the configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                configuration:
                  $ref: "#/components/schemas/TableReplicationConfiguration"
              required:
                - configuration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutTableReplicationResponse"
  /get-table:
    get:
      operationId: GetTable
      description: Gets details about a table. For more information, see S3 Tables in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:GetTable permission to use this operation.
      parameters:
        - name: tableBucketARN
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket associated with the table.
        - name: namespace
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NamespaceName"
          description: The name of the namespace the table is associated with.
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TableName"
          description: The name of the table.
        - name: tableArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TableARN"
          description: The Amazon Resource Name (ARN) of the table.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableResponse"
  /buckets/{table_bucket_arn}/maintenance:
    get:
      operationId: GetTableBucketMaintenanceConfiguration
      description: Gets details about a maintenance configuration for a given table bucket. For more information, see Amazon S3 table bucket maintenance in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:GetTableBucketMaintenanceConfiguration permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket associated with the maintenance configuration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableBucketMaintenanceConfigurationResponse"
  /buckets/{table_bucket_arn}/storage-class:
    get:
      operationId: GetTableBucketStorageClass
      description: Retrieves the storage class configuration for a specific table. This allows you to view the storage class settings that apply to an individual table, which may differ from the table bucket's default configuration. Permissions You must have the s3tables:GetTableBucketStorageClass permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableBucketStorageClassResponse"
    put:
      operationId: PutTableBucketStorageClass
      description: Sets or updates the storage class configuration for a table bucket. This configuration serves as the default storage class for all new tables created in the bucket, allowing you to optimize storage costs at the bucket level. Permissions You must have the s3tables:PutTableBucketStorageClass permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                storageClassConfiguration:
                  $ref: "#/components/schemas/StorageClassConfiguration"
              required:
                - storageClassConfiguration
      responses:
        "200":
          description: Success
  /tables/{table_bucket_arn}/{namespace}/{name}/encryption:
    get:
      operationId: GetTableEncryption
      description: Gets the encryption configuration for a table. Permissions You must have the s3tables:GetTableEncryption permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket containing the table.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NamespaceName"
          description: The namespace associated with the table.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableName"
          description: The name of the table.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableEncryptionResponse"
  /tables/{table_bucket_arn}/{namespace}/{name}/maintenance:
    get:
      operationId: GetTableMaintenanceConfiguration
      description: Gets details about the maintenance configuration of a table. For more information, see S3 Tables maintenance in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:GetTableMaintenanceConfiguration permission to use this operation. You must have the s3tables:GetTableData permission to use set the compaction strategy to sort or zorder.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NamespaceName"
          description: The namespace associated with the table.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableName"
          description: The name of the table.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableMaintenanceConfigurationResponse"
  /tables/{table_bucket_arn}/{namespace}/{name}/maintenance-job-status:
    get:
      operationId: GetTableMaintenanceJobStatus
      description: Gets the status of a maintenance job for a table. For more information, see S3 Tables maintenance in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:GetTableMaintenanceJobStatus permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NamespaceName"
          description: The name of the namespace the table is associated with.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableName"
          description: The name of the table containing the maintenance job status you want to check.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableMaintenanceJobStatusResponse"
  /tables/{table_bucket_arn}/{namespace}/{name}/metadata-location:
    get:
      operationId: GetTableMetadataLocation
      description: Gets the location of the table metadata. Permissions You must have the s3tables:GetTableMetadataLocation permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NamespaceName"
          description: The namespace of the table.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableName"
          description: The name of the table.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableMetadataLocationResponse"
    put:
      operationId: UpdateTableMetadataLocation
      description: Updates the metadata location for a table. The metadata location of a table must be an S3 URI that begins with the table's warehouse location. The metadata location for an Apache Iceberg table must end with .metadata.json, or if the metadata file is Gzip-compressed, .metadata.json.gz. Permissions You must have the s3tables:UpdateTableMetadataLocation permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NamespaceName"
          description: The namespace of the table.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableName"
          description: The name of the table.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                versionToken:
                  $ref: "#/components/schemas/VersionToken"
                metadataLocation:
                  $ref: "#/components/schemas/MetadataLocation"
              required:
                - versionToken
                - metadataLocation
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTableMetadataLocationResponse"
  /table-record-expiration:
    get:
      operationId: GetTableRecordExpirationConfiguration
      description: Retrieves the expiration configuration settings for records in a table, and the status of the configuration. If the status of the configuration is enabled, records expire and are automatically removed from the table after the specified number of days. Permissions You must have the s3tables:GetTableRecordExpirationConfiguration permission to use this operation.
      parameters:
        - name: tableArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TableARN"
          description: The Amazon Resource Name (ARN) of the table.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableRecordExpirationConfigurationResponse"
    put:
      operationId: PutTableRecordExpirationConfiguration
      description: Creates or updates the expiration configuration settings for records in a table, including the status of the configuration. If you enable record expiration for a table, records expire and are automatically removed from the table after the number of days that you specify. Permissions You must have the s3tables:PutTableRecordExpirationConfiguration permission to use this operation.
      parameters:
        - name: tableArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TableARN"
          description: The Amazon Resource Name (ARN) of the table.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  $ref: "#/components/schemas/TableRecordExpirationConfigurationValue"
              required:
                - value
      responses:
        "204":
          description: Success
  /table-record-expiration-job-status:
    get:
      operationId: GetTableRecordExpirationJobStatus
      description: Retrieves the status, metrics, and details of the latest record expiration job for a table. This includes when the job ran, and whether it succeeded or failed. If the job ran successfully, this also includes statistics about the records that were removed. Permissions You must have the s3tables:GetTableRecordExpirationJobStatus permission to use this operation.
      parameters:
        - name: tableArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TableARN"
          description: The Amazon Resource Name (ARN) of the table.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableRecordExpirationJobStatusResponse"
  /replication-status:
    get:
      operationId: GetTableReplicationStatus
      description: Retrieves the replication status for a table, including the status of replication to each destination. This operation provides visibility into replication health and progress. Permissions You must have the s3tables:GetTableReplicationStatus permission to use this operation.
      parameters:
        - name: tableArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TableARN"
          description: The Amazon Resource Name (ARN) of the table.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableReplicationStatusResponse"
  /tables/{table_bucket_arn}/{namespace}/{name}/storage-class:
    get:
      operationId: GetTableStorageClass
      description: Retrieves the storage class configuration for a specific table. This allows you to view the storage class settings that apply to an individual table, which may differ from the table bucket's default configuration. Permissions You must have the s3tables:GetTableStorageClass permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket that contains the table.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NamespaceName"
          description: The namespace associated with the table.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableName"
          description: The name of the table.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableStorageClassResponse"
  /tables/{table_bucket_arn}:
    get:
      operationId: ListTables
      description: List tables in the given table bucket. For more information, see S3 Tables in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:ListTables permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon resource Name (ARN) of the table bucket.
        - name: namespace
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NamespaceName"
          description: The namespace of the tables.
        - name: prefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListTablesRequestPrefixString"
          description: The prefix of the tables.
        - name: continuationToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: ContinuationToken indicates to Amazon S3 that the list is being continued on this bucket with a token. ContinuationToken is obfuscated and is not a real key. You can use this ContinuationToken for pagination of the list results.
        - name: maxTables
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListTablesLimit"
          description: The maximum number of tables to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTablesResponse"
  /tag/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists all of the tags applied to a specified Amazon S3 Tables resource. Each tag is a label consisting of a key and value pair. Tags can help you organize, track costs for, and control access to resources. For a list of S3 resources that support tagging, see Managing tags for Amazon S3 resources. Permissions For tables and table buckets, you must have the s3tables:ListTagsForResource permission to use this operation.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the Amazon S3 Tables resource that you want to list tags for. The tagged resource can be a table bucket or a table. For a list of all S3 resources that support tagging, see Managing tags for Amazon S3 resources.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Applies one or more user-defined tags to an Amazon S3 Tables resource or updates existing tags. Each tag is a label consisting of a key and value pair. Tags can help you organize, track costs for, and control access to your resources. You can add up to 50 tags for each S3 resource. For a list of S3 resources that support tagging, see Managing tags for Amazon S3 resources. Permissions For tables and table buckets, you must have the s3tables:TagResource permission to use this operation.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the Amazon S3 Tables resource that you're applying tags to. The tagged resource can be a table bucket or a table. For a list of all S3 resources that support tagging, see Managing tags for Amazon S3 resources.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes the specified user-defined tags from an Amazon S3 Tables resource. You can pass one or more tag keys. For a list of S3 resources that support tagging, see Managing tags for Amazon S3 resources. Permissions For tables and table buckets, you must have the s3tables:UntagResource permission to use this operation.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the Amazon S3 Tables resource that you're removing tags from. The tagged resource can be a table bucket or a table. For a list of all S3 resources that support tagging, see Managing tags for Amazon S3 resources.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The array of tag keys that you're removing from the S3 Tables resource. For more information, see Tagging for cost allocation or attribute-based access control (ABAC).
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /buckets/{table_bucket_arn}/maintenance/{type}:
    put:
      operationId: PutTableBucketMaintenanceConfiguration
      description: Creates a new maintenance configuration or replaces an existing maintenance configuration for a table bucket. For more information, see Amazon S3 table bucket maintenance in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:PutTableBucketMaintenanceConfiguration permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket associated with the maintenance configuration.
        - name: type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketMaintenanceType"
          description: The type of the maintenance configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  $ref: "#/components/schemas/TableBucketMaintenanceConfigurationValue"
              required:
                - value
      responses:
        "204":
          description: Success
  /tables/{table_bucket_arn}/{namespace}/{name}/maintenance/{type}:
    put:
      operationId: PutTableMaintenanceConfiguration
      description: Creates a new maintenance configuration or replaces an existing maintenance configuration for a table. For more information, see S3 Tables maintenance in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:PutTableMaintenanceConfiguration permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table associated with the maintenance configuration.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NamespaceName"
          description: The namespace of the table.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableName"
          description: The name of the table.
        - name: type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableMaintenanceType"
          description: The type of the maintenance configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  $ref: "#/components/schemas/TableMaintenanceConfigurationValue"
              required:
                - value
      responses:
        "204":
          description: Success
  /tables/{table_bucket_arn}/{namespace}/{name}/rename:
    put:
      operationId: RenameTable
      description: Renames a table or a namespace. For more information, see S3 Tables in the Amazon Simple Storage Service User Guide. Permissions You must have the s3tables:RenameTable permission to use this operation.
      parameters:
        - name: table_bucket_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket.
        - name: namespace
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NamespaceName"
          description: The namespace associated with the table.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TableName"
          description: The current name of the table.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                newNamespaceName:
                  $ref: "#/components/schemas/NamespaceName"
                newName:
                  $ref: "#/components/schemas/TableName"
                versionToken:
                  $ref: "#/components/schemas/VersionToken"
      responses:
        "204":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    TableBucketARN:
      type: string
      pattern: (arn:aws[-a-z0-9]*:[a-z0-9]+:[-a-z0-9]*:[0-9]{12}:bucket/[a-z0-9_-]{3,63})
    CreateNamespaceRequestNamespaceList:
      type: array
      items:
        $ref: "#/components/schemas/NamespaceName"
    NamespaceName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[0-9a-z_]*"
    CreateNamespaceResponse:
      type: object
      properties:
        tableBucketARN:
          $ref: "#/components/schemas/TableBucketARN"
          description: The Amazon Resource Name (ARN) of the table bucket the namespace was created in.
        namespace:
          $ref: "#/components/schemas/NamespaceList"
          description: The name of the namespace.
      required:
        - tableBucketARN
        - namespace
    NamespaceList:
      type: array
      items:
        $ref: "#/components/schemas/NamespaceName"
    TableName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[0-9a-z_]*"
    OpenTableFormat:
      type: string
      enum:
        - ICEBERG
    TableMetadata:
      description: Contains details about the table metadata.
      type: object
      properties:
        iceberg:
          $ref: "#/components/schemas/IcebergMetadata"
          description: Contains details about the metadata of an Iceberg table.
    IcebergMetadata:
      description: Contains details about the metadata for an Iceberg table.
      type: object
      properties:
        schema:
          $ref: "#/components/schemas/IcebergSchema"
          description: The schema for an Iceberg table. Use this property to define table schemas with primitive types only. For schemas that include nested or complex types such as struct, list, or map, use schemaV2 instead.
        schemaV2:
          $ref: "#/components/schemas/IcebergSchemaV2"
          description: The schema for an Iceberg table using the V2 format. Use this property to define table schemas that include nested or complex data types such as struct, list, or map, in addition to primitive types. For schemas with only primitive types, you can use either schema or schemaV2.
        partitionSpec:
          $ref: "#/components/schemas/IcebergPartitionSpec"
          description: The partition specification for the Iceberg table. Partitioning organizes data into separate files based on the values of one or more fields, which can improve query performance by reducing the amount of data scanned. Each partition field applies a transform (such as identity, year, month, or bucket) to a single field.
        writeOrder:
          $ref: "#/components/schemas/IcebergSortOrder"
          description: The sort order for the Iceberg table. Sort order defines how data is sorted within data files, which can improve query performance by enabling more efficient data skipping and filtering.
        properties_:
          type: object
          properties: {}
          description: A map of custom configuration properties for the Iceberg table.
    IcebergSchema:
      description: Contains details about the schema for an Iceberg table.
      type: object
      properties:
        fields:
          $ref: "#/components/schemas/SchemaFieldList"
          description: The schema fields for the table
      required:
        - fields
    SchemaFieldList:
      type: array
      items:
        $ref: "#/components/schemas/SchemaField"
    SchemaField:
      description: Contains details about a schema field.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Integer"
          description: An optional unique identifier for the schema field. Field IDs are used by Apache Iceberg to track schema evolution and maintain compatibility across schema changes. If not specified, S3 Tables automatically assigns field IDs.
        name:
          $ref: "#/components/schemas/String"
          description: The name of the field.
        type_:
          $ref: "#/components/schemas/String"
          description: The field type. S3 Tables supports all Apache Iceberg primitive types. For more information, see the Apache Iceberg documentation.
        required_:
          $ref: "#/components/schemas/Boolean"
          description: A Boolean value that specifies whether values are required for each row in this field. By default, this is false and null values are allowed in the field. If this is true the field does not allow null values.
      required:
        - name
        - type_
    Integer:
      type: integer
    String:
      type: string
    Boolean:
      type: boolean
    IcebergSchemaV2:
      description: Contains details about the schema for an Iceberg table using the V2 format. This schema format supports nested and complex data types such as struct, list, and map, in addition to primitive types.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/SchemaV2FieldType"
          description: The type of the top-level schema, which is always a struct type as defined in the Apache Iceberg specification. This value must be struct.
        fields:
          $ref: "#/components/schemas/SchemaV2FieldList"
          description: The schema fields for the table. Each field defines a column in the table, including its name, type, and whether it is required.
        schemaId:
          $ref: "#/components/schemas/Integer"
          description: An optional unique identifier for the schema. Schema IDs are used by Apache Iceberg to track schema evolution.
        identifierFieldIds:
          $ref: "#/components/schemas/IntegerList"
          description: A list of field IDs that are used as the identifier fields for the table. Identifier fields uniquely identify a row in the table.
      required:
        - type_
        - fields
    SchemaV2FieldType:
      type: string
      enum:
        - struct
    SchemaV2FieldList:
      type: array
      items:
        $ref: "#/components/schemas/SchemaV2Field"
    SchemaV2Field:
      description: Contains details about a schema field in the V2 format. This field format supports nested and complex data types such as struct, list, and map, in addition to primitive types.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Integer"
          description: The unique identifier for the schema field. Field IDs are used by Apache Iceberg to track schema evolution and maintain compatibility across schema changes.
        name:
          $ref: "#/components/schemas/String"
          description: The name of the field.
        type_:
          $ref: "#/components/schemas/Document"
          description: The data type of the field. This can be a primitive type string such as boolean, int, long, float, double, string, binary, date, timestamp, or timestamptz, or a complex type represented as a JSON object for nested types such as struct, list, or map. For more information, see the Apache Iceberg schemas and data types documentation.
        required_:
          $ref: "#/components/schemas/Boolean"
          description: A Boolean value that specifies whether values are required for each row in this field. If this is true, the field does not allow null values.
        doc:
          $ref: "#/components/schemas/String"
          description: An optional description of the field.
      required:
        - id
        - name
        - type_
        - required_
    Document:
      type: object
    IntegerList:
      type: array
      items:
        $ref: "#/components/schemas/Integer"
    IcebergPartitionSpec:
      description: Defines how data in an Iceberg table is partitioned. Partitioning helps optimize query performance by organizing data into separate files based on field values. Each partition field specifies a transform to apply to a source field.
      type: object
      properties:
        fields:
          $ref: "#/components/schemas/IcebergPartitionFieldList"
          description: The list of partition fields that define how the table data is partitioned. Each field specifies a source field and a transform to apply. This field is required if partitionSpec is provided.
        specId:
          $ref: "#/components/schemas/Integer"
          description: The unique identifier for this partition specification. If not specified, defaults to 0.
      required:
        - fields
    IcebergPartitionFieldList:
      type: array
      items:
        $ref: "#/components/schemas/IcebergPartitionField"
    IcebergPartitionField:
      description: Defines a single partition field in an Iceberg partition specification.
      type: object
      properties:
        sourceId:
          $ref: "#/components/schemas/Integer"
          description: The ID of the source schema field to partition by. This must reference a valid field ID from the table schema.
        transform:
          $ref: "#/components/schemas/String"
          description: The partition transform to apply to the source field. Supported transforms include identity, year, month, day, hour, bucket, and truncate. For more information, see the Apache Iceberg partition transforms documentation.
        name:
          $ref: "#/components/schemas/String"
          description: The name for this partition field. This name is used in the partitioned file paths.
        fieldId:
          $ref: "#/components/schemas/Integer"
          description: An optional unique identifier for this partition field. If not specified, S3 Tables automatically assigns a field ID.
      required:
        - sourceId
        - transform
        - name
    IcebergSortOrder:
      description: Defines the sort order for data within an Iceberg table. Sorting data can improve query performance by enabling more efficient data skipping.
      type: object
      properties:
        orderId:
          $ref: "#/components/schemas/Integer"
          description: The unique identifier for this sort order. If not specified, defaults to 1. The order ID is used by Apache Iceberg to track sort order evolution.
        fields:
          $ref: "#/components/schemas/IcebergSortFieldList"
          description: The list of sort fields that define how data is sorted within files. Each field specifies a source field, sort direction, and null ordering. This field is required if writeOrder is provided.
      required:
        - orderId
        - fields
    IcebergSortFieldList:
      type: array
      items:
        $ref: "#/components/schemas/IcebergSortField"
    IcebergSortField:
      description: Defines a single sort field in an Iceberg sort order specification.
      type: object
      properties:
        sourceId:
          $ref: "#/components/schemas/Integer"
          description: The ID of the source schema field to sort by. This must reference a valid field ID from the table schema.
        transform:
          $ref: "#/components/schemas/String"
          description: The transform to apply to the source field before sorting. Use identity to sort by the field value directly, or specify other transforms as needed.
        direction:
          $ref: "#/components/schemas/IcebergSortDirection"
          description: The sort direction. Valid values are asc for ascending order or desc for descending order.
        nullOrder:
          $ref: "#/components/schemas/IcebergNullOrder"
          description: Specifies how null values are ordered. Valid values are nulls-first to place nulls before non-null values, or nulls-last to place nulls after non-null values.
      required:
        - sourceId
        - transform
        - direction
        - nullOrder
    IcebergSortDirection:
      type: string
      enum:
        - asc
        - desc
    IcebergNullOrder:
      type: string
      enum:
        - nulls-first
        - nulls-last
    EncryptionConfiguration:
      description: Configuration specifying how data should be encrypted. This structure defines the encryption algorithm and optional KMS key to be used for server-side encryption.
      type: object
      properties:
        sseAlgorithm:
          $ref: "#/components/schemas/SSEAlgorithm"
          description: The server-side encryption algorithm to use. Valid values are AES256 for S3-managed encryption keys, or aws:kms for Amazon Web Services KMS-managed encryption keys. If you choose SSE-KMS encryption you must grant the S3 Tables maintenance principal access to your KMS key. For more information, see Permissions requirements for S3 Tables SSE-KMS encryption.
        kmsKeyArn:
          $ref: "#/components/schemas/EncryptionConfigurationKmsKeyArnString"
          description: The Amazon Resource Name (ARN) of the KMS key to use for encryption. This field is required only when sseAlgorithm is set to aws:kms.
      required:
