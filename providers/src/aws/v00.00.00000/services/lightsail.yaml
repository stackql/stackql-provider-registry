openapi: 3.0.0
info:
  version: "2016-11-28"
  title: Amazon Lightsail
  description: Amazon Lightsail
  x-serviceName: lightsail
  x-serviceAlias: lightsail
  x-protocol: json
  x-apiVersion: "2016-11-28"
  x-endpointPrefix: lightsail
  x-targetPrefix: Lightsail_20161128
  x-jsonVersion: "1.1"
servers:
  - url: https://lightsail.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for lightsail
paths:
  /AllocateStaticIp:
    post:
      operationId: AllocateStaticIp
      description: Allocates a static IP address.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.AllocateStaticIp
            default: Lightsail_20161128.AllocateStaticIp
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                staticIpName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the static IP address.
              required:
                - staticIpName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllocateStaticIpResult"
  /AttachCertificateToDistribution:
    post:
      operationId: AttachCertificateToDistribution
      description: Attaches an SSL/TLS certificate to your Amazon Lightsail content delivery network (CDN) distribution. After the certificate is attached, your distribution accepts HTTPS traffic for all of the domains that are associated with the certificate. Use the CreateCertificate action to create a certificate that you can attach to your distribution. Only certificates created in the us-east-1 Amazon Web Services Region can be attached to Lightsail distributions. Lightsail distributions are global resources that can reference an origin in any Amazon Web Services Region, and distribute its content globally. However, all distributions are located in the us-east-1 Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.AttachCertificateToDistribution
            default: Lightsail_20161128.AttachCertificateToDistribution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                distributionName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the distribution that the certificate will be attached to. Use the GetDistributions action to get a list of distribution names that you can specify.
                certificateName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the certificate to attach to a distribution. Only certificates with a status of ISSUED can be attached to a distribution. Use the GetCertificates action to get a list of certificate names that you can specify. This is the name of the certificate resource type and is used only to reference the certificate in other API actions. It can be different than the domain name of the certificate. For example, your certificate name might be WordPress-Blog-Certificate and the domain name of the certificate might be example.com.
              required:
                - distributionName
                - certificateName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachCertificateToDistributionResult"
  /AttachDisk:
    post:
      operationId: AttachDisk
      description: Attaches a block storage disk to a running or stopped Lightsail instance and exposes it to the instance with the specified disk name. The attach disk operation supports tag-based access control via resource tags applied to the resource identified by disk name. For more information, see the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.AttachDisk
            default: Lightsail_20161128.AttachDisk
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                diskName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The unique Lightsail disk name (my-disk).
                instanceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Lightsail instance where you want to utilize the storage disk.
                diskPath:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: The disk path to expose to the instance (/dev/xvdf).
                autoMounting:
                  $ref: "#/components/schemas/boolean"
                  description: A Boolean value used to determine the automatic mounting of a storage volume to a virtual computer. The default value is False. This value only applies to Lightsail for Research resources.
              required:
                - diskName
                - instanceName
                - diskPath
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachDiskResult"
  /AttachInstancesToLoadBalancer:
    post:
      operationId: AttachInstancesToLoadBalancer
      description: Attaches one or more Lightsail instances to a load balancer. After some time, the instances are attached to the load balancer and the health check status is available. The attach instances to load balancer operation supports tag-based access control via resource tags applied to the resource identified by load balancer name. For more information, see the Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.AttachInstancesToLoadBalancer
            default: Lightsail_20161128.AttachInstancesToLoadBalancer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                loadBalancerName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the load balancer.
                instanceNames:
                  $ref: "#/components/schemas/ResourceNameList"
                  description: An array of strings representing the instance name(s) you want to attach to your load balancer. An instance must be running before you can attach it to your load balancer. There are no additional limits on the number of instances you can attach to your load balancer, aside from the limit of Lightsail instances you can create in your account (20).
              required:
                - loadBalancerName
                - instanceNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachInstancesToLoadBalancerResult"
  /AttachLoadBalancerTlsCertificate:
    post:
      operationId: AttachLoadBalancerTlsCertificate
      description: Attaches a Transport Layer Security (TLS) certificate to your load balancer. TLS is just an updated, more secure version of Secure Socket Layer (SSL). Once you create and validate your certificate, you can attach it to your load balancer. You can also use this API to rotate the certificates on your account. Use the AttachLoadBalancerTlsCertificate action with the non-attached certificate, and it will replace the existing one and become the attached certificate. The AttachLoadBalancerTlsCertificate operation supports tag-based access control via resource tags applied to the resource identified by load balancer name. For more information, see the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.AttachLoadBalancerTlsCertificate
            default: Lightsail_20161128.AttachLoadBalancerTlsCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                loadBalancerName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the load balancer to which you want to associate the SSL/TLS certificate.
                certificateName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of your SSL/TLS certificate.
              required:
                - loadBalancerName
                - certificateName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachLoadBalancerTlsCertificateResult"
  /AttachStaticIp:
    post:
      operationId: AttachStaticIp
      description: Attaches a static IP address to a specific Amazon Lightsail instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.AttachStaticIp
            default: Lightsail_20161128.AttachStaticIp
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                staticIpName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the static IP.
                instanceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The instance name to which you want to attach the static IP address.
              required:
                - staticIpName
                - instanceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachStaticIpResult"
  /CloseInstancePublicPorts:
    post:
      operationId: CloseInstancePublicPorts
      description: Closes ports for a specific Amazon Lightsail instance. The CloseInstancePublicPorts action supports tag-based access control via resource tags applied to the resource identified by instanceName. For more information, see the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.CloseInstancePublicPorts
            default: Lightsail_20161128.CloseInstancePublicPorts
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                portInfo:
                  $ref: "#/components/schemas/PortInfo"
                  description: An object to describe the ports to close for the specified instance.
                instanceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the instance for which to close ports.
              required:
                - portInfo
                - instanceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloseInstancePublicPortsResult"
  /CopySnapshot:
    post:
      operationId: CopySnapshot
      description: Copies a manual snapshot of an instance or disk as another manual snapshot, or copies an automatic snapshot of an instance or disk as a manual snapshot. This operation can also be used to copy a manual or automatic snapshot of an instance or a disk from one Amazon Web Services Region to another in Amazon Lightsail. When copying a manual snapshot, be sure to define the source region, source snapshot name, and target snapshot name parameters. When copying an automatic snapshot, be sure to define the source region, source resource name, target snapshot name, and either the restore date or the use latest restorable auto snapshot parameters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.CopySnapshot
            default: Lightsail_20161128.CopySnapshot
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                sourceSnapshotName:
                  $ref: "#/components/schemas/ResourceName"
                  description: "The name of the source manual snapshot to copy. Constraint: Define this parameter only when copying a manual snapshot as another manual snapshot."
                sourceResourceName:
                  $ref: "#/components/schemas/string"
                  description: "The name of the source instance or disk from which the source automatic snapshot was created. Constraint: Define this parameter only when copying an automatic snapshot as a manual snapshot. For more information, see the Amazon Lightsail Developer Guide."
                restoreDate:
                  $ref: "#/components/schemas/string"
                  description: "The date of the source automatic snapshot to copy. Use the get auto snapshots operation to identify the dates of the available automatic snapshots. Constraints: Must be specified in YYYY-MM-DD format. This parameter cannot be defined together with the use latest restorable auto snapshot parameter. The restore date and use latest restorable auto snapshot parameters are mutually exclusive. Define this parameter only when copying an automatic snapshot as a manual snapshot. For more information, see the Amazon Lightsail Developer Guide."
                useLatestRestorableAutoSnapshot:
                  $ref: "#/components/schemas/boolean"
                  description: "A Boolean value to indicate whether to use the latest available automatic snapshot of the specified source instance or disk. Constraints: This parameter cannot be defined together with the restore date parameter. The use latest restorable auto snapshot and restore date parameters are mutually exclusive. Define this parameter only when copying an automatic snapshot as a manual snapshot. For more information, see the Amazon Lightsail Developer Guide."
                targetSnapshotName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the new manual snapshot to be created as a copy.
                sourceRegion:
                  $ref: "#/components/schemas/RegionName"
                  description: The Amazon Web Services Region where the source manual or automatic snapshot is located.
              required:
                - targetSnapshotName
                - sourceRegion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopySnapshotResult"
  /CreateBucket:
    post:
      operationId: CreateBucket
      description: Creates an Amazon Lightsail bucket. A bucket is a cloud storage resource available in the Lightsail object storage service. Use buckets to store objects such as data and its descriptive metadata. For more information about buckets, see Buckets in Amazon Lightsail in the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.CreateBucket
            default: Lightsail_20161128.CreateBucket
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                bucketName:
                  $ref: "#/components/schemas/BucketName"
                  description: The name for the bucket. For more information about bucket names, see Bucket naming rules in Amazon Lightsail in the Amazon Lightsail Developer Guide.
                bundleId:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: The ID of the bundle to use for the bucket. A bucket bundle specifies the monthly cost, storage space, and data transfer quota for a bucket. Use the GetBucketBundles action to get a list of bundle IDs that you can specify. Use the UpdateBucketBundle action to change the bundle after the bucket is created.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tag keys and optional values to add to the bucket during creation. Use the TagResource action to tag the bucket after it's created.
                enableObjectVersioning:
                  $ref: "#/components/schemas/boolean"
                  description: A Boolean value that indicates whether to enable versioning of objects in the bucket. For more information about versioning, see Enabling and suspending object versioning in a bucket in Amazon Lightsail in the Amazon Lightsail Developer Guide.
              required:
                - bucketName
                - bundleId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBucketResult"
  /CreateBucketAccessKey:
    post:
      operationId: CreateBucketAccessKey
      description: Creates a new access key for the specified Amazon Lightsail bucket. Access keys consist of an access key ID and corresponding secret access key. Access keys grant full programmatic access to the specified bucket and its objects. You can have a maximum of two access keys per bucket. Use the GetBucketAccessKeys action to get a list of current access keys for a specific bucket. For more information about access keys, see Creating access keys for a bucket in Amazon Lightsail in the Amazon Lightsail Developer Guide. The secretAccessKey value is returned only in response to the CreateBucketAccessKey action. You can get a secret access key only when you first create an access key; you cannot get the secret access key later. If you lose the secret access key, you must create a new access key.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.CreateBucketAccessKey
            default: Lightsail_20161128.CreateBucketAccessKey
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                bucketName:
                  $ref: "#/components/schemas/BucketName"
                  description: The name of the bucket that the new access key will belong to, and grant access to.
              required:
                - bucketName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBucketAccessKeyResult"
  /CreateCertificate:
    post:
      operationId: CreateCertificate
      description: Creates an SSL/TLS certificate for an Amazon Lightsail content delivery network (CDN) distribution and a container service. After the certificate is valid, use the AttachCertificateToDistribution action to use the certificate and its domains with your distribution. Or use the UpdateContainerService action to use the certificate and its domains with your container service. Only certificates created in the us-east-1 Amazon Web Services Region can be attached to Lightsail distributions. Lightsail distributions are global resources that can reference an origin in any Amazon Web Services Region, and distribute its content globally. However, all distributions are located in the us-east-1 Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.CreateCertificate
            default: Lightsail_20161128.CreateCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                certificateName:
                  $ref: "#/components/schemas/CertificateName"
                  description: The name for the certificate.
                domainName:
                  $ref: "#/components/schemas/DomainName"
                  description: The domain name (example.com) for the certificate.
                subjectAlternativeNames:
                  $ref: "#/components/schemas/SubjectAlternativeNameList"
                  description: An array of strings that specify the alternate domains (example2.com) and subdomains (blog.example.com) for the certificate. You can specify a maximum of nine alternate domains (in addition to the primary domain name). Wildcard domain entries (*.example.com) are not supported.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tag keys and optional values to add to the certificate during create. Use the TagResource action to tag a resource after it's created.
              required:
                - certificateName
                - domainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCertificateResult"
  /CreateCloudFormationStack:
    post:
      operationId: CreateCloudFormationStack
      description: Creates an AWS CloudFormation stack, which creates a new Amazon EC2 instance from an exported Amazon Lightsail snapshot. This operation results in a CloudFormation stack record that can be used to track the AWS CloudFormation stack created. Use the get cloud formation stack records operation to get a list of the CloudFormation stacks created. Wait until after your new Amazon EC2 instance is created before running the create cloud formation stack operation again with the same export snapshot record.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.CreateCloudFormationStack
            default: Lightsail_20161128.CreateCloudFormationStack
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                instances:
                  $ref: "#/components/schemas/InstanceEntryList"
                  description: An array of parameters that will be used to create the new Amazon EC2 instance. You can only pass one instance entry at a time in this array. You will get an invalid parameter error if you pass more than one instance entry in this array.
              required:
                - instances
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCloudFormationStackResult"
  /CreateContactMethod:
    post:
      operationId: CreateContactMethod
      description: Creates an email or SMS text message contact method. A contact method is used to send you notifications about your Amazon Lightsail resources. You can add one email address and one mobile phone number contact method in each Amazon Web Services Region. However, SMS text messaging is not supported in some Amazon Web Services Regions, and SMS text messages cannot be sent to some countries/regions. For more information, see Notifications in Amazon Lightsail. The create contact method operation supports tag-based access control via request tags. For more information, see the Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.CreateContactMethod
            default: Lightsail_20161128.CreateContactMethod
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                protocol:
                  $ref: "#/components/schemas/ContactProtocol"
                  description: The protocol of the contact method, such as Email or SMS (text messaging). The SMS protocol is supported only in the following Amazon Web Services Regions. US East (N. Virginia) (us-east-1) US West (Oregon) (us-west-2) Europe (Ireland) (eu-west-1) Asia Pacific (Tokyo) (ap-northeast-1) Asia Pacific (Singapore) (ap-southeast-1) Asia Pacific (Sydney) (ap-southeast-2) For a list of countries/regions where SMS text messages can be sent, and the latest Amazon Web Services Regions where SMS text messaging is supported, see Supported Regions and Countries in the Amazon SNS Developer Guide. For more information about notifications in Amazon Lightsail, see Notifications in Amazon Lightsail.
                contactEndpoint:
                  $ref: "#/components/schemas/StringMax256"
                  description: The destination of the contact method, such as an email address or a mobile phone number. Use the E.164 format when specifying a mobile phone number. E.164 is a standard for the phone number structure used for international telecommunication. Phone numbers that follow this format can have a maximum of 15 digits, and they are prefixed with the plus character (+) and the country code. For example, a U.S. phone number in E.164 format would be specified as +1XXX5550100. For more information, see E.164 on Wikipedia.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tag keys and optional values to add to the contact method during create. Use the TagResource action to tag a resource after it's created.
              required:
                - protocol
                - contactEndpoint
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateContactMethodResult"
  /CreateContainerService:
    post:
      operationId: CreateContainerService
      description: Creates an Amazon Lightsail container service. A Lightsail container service is a compute resource to which you can deploy containers. For more information, see Container services in Amazon Lightsail in the Lightsail Dev Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.CreateContainerService
            default: Lightsail_20161128.CreateContainerService
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                serviceName:
                  $ref: "#/components/schemas/ContainerServiceName"
                  description: "The name for the container service. The name that you specify for your container service will make up part of its default domain. The default domain of a container service is typically https://`<ServiceName>`.`<RandomGUID>`.`<AWSRegion>`.cs.amazonlightsail.com. If the name of your container service is container-service-1, and it's located in the US East (Ohio) Amazon Web Services Region (us-east-2), then the domain for your container service will be like the following example: https://container-service-1.ur4EXAMPLE2uq.us-east-2.cs.amazonlightsail.com The following are the requirements for container service names: Must be unique within each Amazon Web Services Region in your Lightsail account. Must contain 1 to 63 characters. Must contain only alphanumeric characters and hyphens. A hyphen (-) can separate words but cannot be at the start or end of the name."
                power:
                  $ref: "#/components/schemas/ContainerServicePowerName"
                  description: The power specification for the container service. The power specifies the amount of memory, vCPUs, and base monthly cost of each node of the container service. The power and scale of a container service makes up its configured capacity. To determine the monthly price of your container service, multiply the base price of the power with the scale (the number of nodes) of the service. Use the GetContainerServicePowers action to get a list of power options that you can specify using this parameter, and their base monthly cost.
                scale:
                  $ref: "#/components/schemas/ContainerServiceScale"
                  description: The scale specification for the container service. The scale specifies the allocated compute nodes of the container service. The power and scale of a container service makes up its configured capacity. To determine the monthly price of your container service, multiply the base price of the power with the scale (the number of nodes) of the service.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tag keys and optional values to add to the container service during create. Use the TagResource action to tag a resource after it's created. For more information about tags in Lightsail, see the Amazon Lightsail Developer Guide.
                publicDomainNames:
                  $ref: "#/components/schemas/ContainerServicePublicDomains"
                  description: The public domain names to use with the container service, such as example.com and www.example.com. You can specify up to four public domain names for a container service. The domain names that you specify are used when you create a deployment with a container configured as the public endpoint of your container service. If you don't specify public domain names, then you can use the default domain of the container service. You must create and validate an SSL/TLS certificate before you can use public domain names with your container service. Use the CreateCertificate action to create a certificate for the public domain names you want to use with your container service. You can specify public domain names using a string to array map as shown in the example later on this page.
                deployment:
                  $ref: "#/components/schemas/ContainerServiceDeploymentRequest"
                  description: An object that describes a deployment for the container service. A deployment specifies the containers that will be launched on the container service and their settings, such as the ports to open, the environment variables to apply, and the launch command to run. It also specifies the container that will serve as the public endpoint of the deployment and its settings, such as the HTTP or HTTPS port to use, and the health check configuration.
                privateRegistryAccess:
                  $ref: "#/components/schemas/PrivateRegistryAccessRequest"
                  description: An object to describe the configuration for the container service to access private container image repositories, such as Amazon Elastic Container Registry (Amazon ECR) private repositories. For more information, see Configuring access to an Amazon ECR private repository for an Amazon Lightsail container service in the Amazon Lightsail Developer Guide.
              required:
                - serviceName
                - power
                - scale
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateContainerServiceResult"
  /CreateContainerServiceDeployment:
    post:
      operationId: CreateContainerServiceDeployment
      description: Creates a deployment for your Amazon Lightsail container service. A deployment specifies the containers that will be launched on the container service and their settings, such as the ports to open, the environment variables to apply, and the launch command to run. It also specifies the container that will serve as the public endpoint of the deployment and its settings, such as the HTTP or HTTPS port to use, and the health check configuration. You can deploy containers to your container service using container images from a public registry such as Amazon ECR Public, or from your local machine. For more information, see Creating container images for your Amazon Lightsail container services in the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.CreateContainerServiceDeployment
            default: Lightsail_20161128.CreateContainerServiceDeployment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                serviceName:
                  $ref: "#/components/schemas/ContainerServiceName"
                  description: The name of the container service for which to create the deployment.
                containers:
                  $ref: "#/components/schemas/ContainerMap"
                  description: An object that describes the settings of the containers that will be launched on the container service.
                publicEndpoint:
                  $ref: "#/components/schemas/EndpointRequest"
                  description: An object that describes the settings of the public endpoint for the container service.
              required:
