    InstanceSnapshot:
      description: Describes an instance snapshot.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the snapshot.
        arn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the snapshot (arn:aws:lightsail:us-east-2:123456789101:InstanceSnapshot/d23b5706-3322-4d83-81e5-12345EXAMPLE).
        supportCode:
          $ref: "#/components/schemas/string"
          description: The support code. Include this code in your email to support when you have questions about an instance or another resource in Lightsail. This code enables our support team to look up your Lightsail information more easily.
        createdAt:
          $ref: "#/components/schemas/IsoDate"
          description: The timestamp when the snapshot was created (1479907467.024).
        location:
          $ref: "#/components/schemas/ResourceLocation"
          description: The region name and Availability Zone where you created the snapshot.
        resourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The type of resource (usually InstanceSnapshot).
        tags:
          $ref: "#/components/schemas/TagList"
          description: The tag keys and optional values for the resource. For more information about tags in Lightsail, see the Amazon Lightsail Developer Guide.
        state:
          $ref: "#/components/schemas/InstanceSnapshotState"
          description: The state the snapshot is in.
        progress:
