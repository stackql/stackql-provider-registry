          description: An array of disk objects containing information about all block storage disks.
        fromInstanceName:
          $ref: "#/components/schemas/ResourceName"
          description: The instance from which the snapshot was created.
        fromInstanceArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the instance from which the snapshot was created (arn:aws:lightsail:us-east-2:123456789101:Instance/64b8404c-ccb1-430b-8daf-12345EXAMPLE).
        fromBlueprintId:
