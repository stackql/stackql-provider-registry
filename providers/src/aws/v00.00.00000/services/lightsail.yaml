                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the SSL/TLS certificate. If you specify certificateName, then certificateDomainName is required (and vice-versa).
                certificateDomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: The domain name with which your certificate is associated (example.com). If you specify certificateDomainName, then certificateName is required (and vice-versa).
                certificateAlternativeNames:
                  $ref: "#/components/schemas/DomainNameList"
                  description: The optional alternative domains and subdomains to use with your SSL/TLS certificate (www.example.com, example.com, m.example.com, blog.example.com).
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tag keys and optional values to add to the resource during create. Use the TagResource action to tag a resource after it's created.
                ipAddressType:
                  $ref: "#/components/schemas/IpAddressType"
                  description: The IP address type for the load balancer. The possible values are ipv4 for IPv4 only, ipv6 for IPv6 only, and dualstack for IPv4 and IPv6. The default value is dualstack.
                tlsPolicyName:
                  $ref: "#/components/schemas/string"
                  description: The name of the TLS policy to apply to the load balancer. Use the GetLoadBalancerTlsPolicies action to get a list of TLS policy names that you can specify. For more information about load balancer TLS policies, see Configuring TLS security policies on your Amazon Lightsail load balancers in the Amazon Lightsail Developer Guide.
              required:
                - loadBalancerName
                - instancePort
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLoadBalancerResult"
  /CreateLoadBalancerTlsCertificate:
    post:
      operationId: CreateLoadBalancerTlsCertificate
      description: Creates an SSL/TLS certificate for an Amazon Lightsail load balancer. TLS is just an updated, more secure version of Secure Socket Layer (SSL). The CreateLoadBalancerTlsCertificate operation supports tag-based access control via resource tags applied to the resource identified by load balancer name. For more information, see the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.CreateLoadBalancerTlsCertificate
            default: Lightsail_20161128.CreateLoadBalancerTlsCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                loadBalancerName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The load balancer name where you want to create the SSL/TLS certificate.
                certificateName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The SSL/TLS certificate name. You can have up to 10 certificates in your account at one time. Each Lightsail load balancer can have up to 2 certificates associated with it at one time. There is also an overall limit to the number of certificates that can be issue in a 365-day period. For more information, see Limits.
                certificateDomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: The domain name (example.com) for your SSL/TLS certificate.
                certificateAlternativeNames:
                  $ref: "#/components/schemas/DomainNameList"
                  description: An array of strings listing alternative domains and subdomains for your SSL/TLS certificate. Lightsail will de-dupe the names for you. You can have a maximum of 9 alternative names (in addition to the 1 primary domain). We do not support wildcards (*.example.com).
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tag keys and optional values to add to the resource during create. Use the TagResource action to tag a resource after it's created.
              required:
                - loadBalancerName
                - certificateName
                - certificateDomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLoadBalancerTlsCertificateResult"
  /CreateRelationalDatabase:
    post:
      operationId: CreateRelationalDatabase
      description: Creates a new database in Amazon Lightsail. The create relational database operation supports tag-based access control via request tags. For more information, see the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.CreateRelationalDatabase
            default: Lightsail_20161128.CreateRelationalDatabase
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                relationalDatabaseName:
                  $ref: "#/components/schemas/ResourceName"
                  description: "The name to use for your new Lightsail database resource. Constraints: Must contain from 2 to 255 alphanumeric characters, or hyphens. The first and last character must be a letter or number."
                availabilityZone:
                  $ref: "#/components/schemas/string"
                  description: The Availability Zone in which to create your new database. Use the us-east-2a case-sensitive format. You can get a list of Availability Zones by using the get regions operation. Be sure to add the include relational database Availability Zones parameter to your request.
                relationalDatabaseBlueprintId:
                  $ref: "#/components/schemas/string"
                  description: The blueprint ID for your new database. A blueprint describes the major engine version of a database. You can get a list of database blueprints IDs by using the get relational database blueprints operation.
                relationalDatabaseBundleId:
                  $ref: "#/components/schemas/string"
                  description: The bundle ID for your new database. A bundle describes the performance specifications for your database. You can get a list of database bundle IDs by using the get relational database bundles operation.
                masterDatabaseName:
                  $ref: "#/components/schemas/string"
                  description: "The meaning of this parameter differs according to the database engine you use. MySQL The name of the database to create when the Lightsail database resource is created. If this parameter isn't specified, no database is created in the database resource. Constraints: Must contain 1 to 64 letters or numbers. Must begin with a letter. Subsequent characters can be letters, underscores, or digits (0- 9). Can't be a word reserved by the specified database engine. For more information about reserved words in MySQL, see the Keywords and Reserved Words articles for MySQL 5.6, MySQL 5.7, and MySQL 8.0. PostgreSQL The name of the database to create when the Lightsail database resource is created. If this parameter isn't specified, a database named postgres is created in the database resource. Constraints: Must contain 1 to 63 letters or numbers. Must begin with a letter. Subsequent characters can be letters, underscores, or digits (0- 9). Can't be a word reserved by the specified database engine. For more information about reserved words in PostgreSQL, see the SQL Key Words articles for PostgreSQL 9.6, PostgreSQL 10, PostgreSQL 11, and PostgreSQL 12."
                masterUsername:
                  $ref: "#/components/schemas/string"
                  description: "The name for the master user. MySQL Constraints: Required for MySQL. Must be 1 to 16 letters or numbers. Can contain underscores. First character must be a letter. Can't be a reserved word for the chosen database engine. For more information about reserved words in MySQL 5.6 or 5.7, see the Keywords and Reserved Words articles for MySQL 5.6, MySQL 5.7, or MySQL 8.0. PostgreSQL Constraints: Required for PostgreSQL. Must be 1 to 63 letters or numbers. Can contain underscores. First character must be a letter. Can't be a reserved word for the chosen database engine. For more information about reserved words in MySQL 5.6 or 5.7, see the Keywords and Reserved Words articles for PostgreSQL 9.6, PostgreSQL 10, PostgreSQL 11, and PostgreSQL 12."
                masterUserPassword:
                  $ref: "#/components/schemas/SensitiveString"
                  description: 'The password for the master user. The password can include any printable ASCII character except "/", """, or "@". It cannot contain spaces. MySQL Constraints: Must contain from 8 to 41 characters. PostgreSQL Constraints: Must contain from 8 to 128 characters.'
                preferredBackupWindow:
                  $ref: "#/components/schemas/string"
                  description: "The daily time range during which automated backups are created for your new database if automated backups are enabled. The default is a 30-minute window selected at random from an 8-hour block of time for each AWS Region. For more information about the preferred backup window time blocks for each region, see the Working With Backups guide in the Amazon Relational Database Service documentation. Constraints: Must be in the hh24:mi-hh24:mi format. Example: 16:00-16:30 Specified in Coordinated Universal Time (UTC). Must not conflict with the preferred maintenance window. Must be at least 30 minutes."
                preferredMaintenanceWindow:
                  $ref: "#/components/schemas/string"
                  description: "The weekly time range during which system maintenance can occur on your new database. The default is a 30-minute window selected at random from an 8-hour block of time for each AWS Region, occurring on a random day of the week. Constraints: Must be in the ddd:hh24:mi-ddd:hh24:mi format. Valid days: Mon, Tue, Wed, Thu, Fri, Sat, Sun. Must be at least 30 minutes. Specified in Coordinated Universal Time (UTC). Example: Tue:17:00-Tue:17:30"
                publiclyAccessible:
                  $ref: "#/components/schemas/boolean"
                  description: Specifies the accessibility options for your new database. A value of true specifies a database that is available to resources outside of your Lightsail account. A value of false specifies a database that is available only to your Lightsail resources in the same region as your database.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tag keys and optional values to add to the resource during create. Use the TagResource action to tag a resource after it's created.
              required:
                - relationalDatabaseName
                - relationalDatabaseBlueprintId
                - relationalDatabaseBundleId
                - masterDatabaseName
                - masterUsername
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRelationalDatabaseResult"
  /CreateRelationalDatabaseFromSnapshot:
    post:
      operationId: CreateRelationalDatabaseFromSnapshot
      description: Creates a new database from an existing database snapshot in Amazon Lightsail. You can create a new database from a snapshot in if something goes wrong with your original database, or to change it to a different plan, such as a high availability or standard plan. The create relational database from snapshot operation supports tag-based access control via request tags and resource tags applied to the resource identified by relationalDatabaseSnapshotName. For more information, see the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.CreateRelationalDatabaseFromSnapshot
            default: Lightsail_20161128.CreateRelationalDatabaseFromSnapshot
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                relationalDatabaseName:
                  $ref: "#/components/schemas/ResourceName"
                  description: "The name to use for your new Lightsail database resource. Constraints: Must contain from 2 to 255 alphanumeric characters, or hyphens. The first and last character must be a letter or number."
                availabilityZone:
                  $ref: "#/components/schemas/string"
                  description: The Availability Zone in which to create your new database. Use the us-east-2a case-sensitive format. You can get a list of Availability Zones by using the get regions operation. Be sure to add the include relational database Availability Zones parameter to your request.
                publiclyAccessible:
                  $ref: "#/components/schemas/boolean"
                  description: Specifies the accessibility options for your new database. A value of true specifies a database that is available to resources outside of your Lightsail account. A value of false specifies a database that is available only to your Lightsail resources in the same region as your database.
                relationalDatabaseSnapshotName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the database snapshot from which to create your new database.
                relationalDatabaseBundleId:
                  $ref: "#/components/schemas/string"
                  description: The bundle ID for your new database. A bundle describes the performance specifications for your database. You can get a list of database bundle IDs by using the get relational database bundles operation. When creating a new database from a snapshot, you cannot choose a bundle that is smaller than the bundle of the source database.
                sourceRelationalDatabaseName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the source database.
                restoreTime:
                  $ref: "#/components/schemas/IsoDate"
                  description: "The date and time to restore your database from. Constraints: Must be before the latest restorable time for the database. Cannot be specified if the use latest restorable time parameter is true. Specified in Coordinated Universal Time (UTC). Specified in the Unix time format. For example, if you wish to use a restore time of October 1, 2018, at 8 PM UTC, then you input 1538424000 as the restore time."
                useLatestRestorableTime:
                  $ref: "#/components/schemas/boolean"
                  description: "Specifies whether your database is restored from the latest backup time. A value of true restores from the latest backup time. Default: false Constraints: Cannot be specified if the restore time parameter is provided."
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tag keys and optional values to add to the resource during create. Use the TagResource action to tag a resource after it's created.
              required:
                - relationalDatabaseName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRelationalDatabaseFromSnapshotResult"
  /CreateRelationalDatabaseSnapshot:
    post:
      operationId: CreateRelationalDatabaseSnapshot
      description: Creates a snapshot of your database in Amazon Lightsail. You can use snapshots for backups, to make copies of a database, and to save data before deleting a database. The create relational database snapshot operation supports tag-based access control via request tags. For more information, see the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
