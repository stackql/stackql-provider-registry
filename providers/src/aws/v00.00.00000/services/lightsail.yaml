    AlarmsList:
      type: array
      items:
        $ref: "#/components/schemas/Alarm"
    Alarm:
      description: Describes an alarm. An alarm is a way to monitor your Lightsail resource metrics. For more information, see Alarms in Amazon Lightsail.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the alarm.
        arn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the alarm.
        createdAt:
          $ref: "#/components/schemas/IsoDate"
          description: The timestamp when the alarm was created.
        location:
          $ref: "#/components/schemas/ResourceLocation"
          description: An object that lists information about the location of the alarm.
        resourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The Lightsail resource type of the alarm.
        supportCode:
          $ref: "#/components/schemas/string"
          description: The support code. Include this code in your email to support when you have questions about your Lightsail alarm. This code enables our support team to look up your Lightsail information more easily.
        monitoredResourceInfo:
          $ref: "#/components/schemas/MonitoredResourceInfo"
          description: An object that lists information about the resource monitored by the alarm.
        comparisonOperator:
          $ref: "#/components/schemas/ComparisonOperator"
          description: The arithmetic operation used when comparing the specified statistic and threshold.
        evaluationPeriods:
          $ref: "#/components/schemas/integer"
          description: The number of periods over which data is compared to the specified threshold.
        period:
          $ref: "#/components/schemas/MetricPeriod"
          description: The period, in seconds, over which the statistic is applied.
        threshold:
          $ref: "#/components/schemas/double"
          description: The value against which the specified statistic is compared.
        datapointsToAlarm:
          $ref: "#/components/schemas/integer"
          description: The number of data points that must not within the specified threshold to trigger the alarm.
        treatMissingData:
          $ref: "#/components/schemas/TreatMissingData"
          description: "Specifies how the alarm handles missing data points. An alarm can treat missing data in the following ways: breaching - Assume the missing data is not within the threshold. Missing data counts towards the number of times the metric is not within the threshold. notBreaching - Assume the missing data is within the threshold. Missing data does not count towards the number of times the metric is not within the threshold. ignore - Ignore the missing data. Maintains the current alarm state. missing - Missing data is treated as missing."
        statistic:
          $ref: "#/components/schemas/MetricStatistic"
          description: "The statistic for the metric associated with the alarm. The following statistics are available: Minimum - The lowest value observed during the specified period. Use this value to determine low volumes of activity for your application. Maximum - The highest value observed during the specified period. Use this value to determine high volumes of activity for your application. Sum - All values submitted for the matching metric added together. You can use this statistic to determine the total volume of a metric. Average - The value of Sum / SampleCount during the specified period. By comparing this statistic with the Minimum and Maximum values, you can determine the full scope of a metric and how close the average use is to the Minimum and Maximum values. This comparison helps you to know when to increase or decrease your resources. SampleCount - The count, or number, of data points used for the statistical calculation."
        metricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the metric associated with the alarm.
        state:
          $ref: "#/components/schemas/AlarmState"
          description: "The current state of the alarm. An alarm has the following possible states: ALARM - The metric is outside of the defined threshold. INSUFFICIENT_DATA - The alarm has just started, the metric is not available, or not enough data is available for the metric to determine the alarm state. OK - The metric is within the defined threshold."
        unit:
          $ref: "#/components/schemas/MetricUnit"
          description: The unit of the metric associated with the alarm.
        contactProtocols:
          $ref: "#/components/schemas/ContactProtocolsList"
          description: The contact protocols for the alarm, such as Email, SMS (text messaging), or both.
        notificationTriggers:
          $ref: "#/components/schemas/NotificationTriggerList"
          description: The alarm states that trigger a notification.
        notificationEnabled:
          $ref: "#/components/schemas/boolean"
          description: Indicates whether the alarm is enabled.
        tags:
          $ref: "#/components/schemas/TagList"
          description: The tag keys and optional values for the resource. For more information about tags in Lightsail, see the Amazon Lightsail Developer Guide.
    MonitoredResourceInfo:
      description: Describes resource being monitored by an alarm. An alarm is a way to monitor your Amazon Lightsail resource metrics. For more information, see Alarms in Amazon Lightsail.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource being monitored.
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the Lightsail resource being monitored.
        resourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The Lightsail resource type of the resource being monitored. Instances, load balancers, and relational databases are the only Lightsail resources that can currently be monitored by alarms.
    ResourceArn:
      type: string
      pattern: ^arn:(aws[^:]*):([a-zA-Z0-9-]+):([a-z0-9-]+):([0-9]+):([a-zA-Z]+)/([a-zA-Z0-9-]+)$
    ComparisonOperator:
      type: string
      enum:
        - GreaterThanOrEqualToThreshold
        - GreaterThanThreshold
        - LessThanThreshold
        - LessThanOrEqualToThreshold
    MetricPeriod:
      type: integer
      minimum: 60
      maximum: 86400
    double:
      type: number
      format: double
    TreatMissingData:
      type: string
      enum:
        - breaching
        - notBreaching
        - ignore
        - missing
    MetricStatistic:
      type: string
      enum:
        - Minimum
        - Maximum
        - Sum
        - Average
        - SampleCount
    MetricName:
      type: string
      enum:
        - CPUUtilization
        - NetworkIn
        - NetworkOut
        - StatusCheckFailed
        - StatusCheckFailed_Instance
        - StatusCheckFailed_System
        - ClientTLSNegotiationErrorCount
        - HealthyHostCount
        - UnhealthyHostCount
        - HTTPCode_LB_4XX_Count
        - HTTPCode_LB_5XX_Count
        - HTTPCode_Instance_2XX_Count
        - HTTPCode_Instance_3XX_Count
        - HTTPCode_Instance_4XX_Count
        - HTTPCode_Instance_5XX_Count
        - InstanceResponseTime
        - RejectedConnectionCount
        - RequestCount
        - DatabaseConnections
        - DiskQueueDepth
        - FreeStorageSpace
        - NetworkReceiveThroughput
        - NetworkTransmitThroughput
        - BurstCapacityTime
        - BurstCapacityPercentage
    AlarmState:
      type: string
      enum:
        - OK
        - ALARM
        - INSUFFICIENT_DATA
    MetricUnit:
      type: string
      enum:
        - Seconds
        - Microseconds
        - Milliseconds
        - Bytes
        - Kilobytes
        - Megabytes
        - Gigabytes
        - Terabytes
        - Bits
        - Kilobits
        - Megabits
        - Gigabits
        - Terabits
        - Percent
        - Count
        - Bytes/Second
        - Kilobytes/Second
        - Megabytes/Second
        - Gigabytes/Second
