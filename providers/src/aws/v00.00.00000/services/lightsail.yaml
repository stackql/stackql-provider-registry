          description: The blueprint ID from which you created the snapshot (amazon_linux_2023). A blueprint is a virtual private server (or instance) image used to create instances quickly.
        fromBundleId:
          $ref: "#/components/schemas/string"
          description: The bundle ID from which you created the snapshot (micro_x_x).
        isFromAutoSnapshot:
          $ref: "#/components/schemas/boolean"
          description: A Boolean value indicating whether the snapshot was created from an automatic snapshot.
        sizeInGb:
          $ref: "#/components/schemas/integer"
          description: The size in GB of the SSD.
    InstanceSnapshotState:
