        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                diskSnapshotName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the disk snapshot you want to delete (my-disk-snapshot).
              required:
                - diskSnapshotName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDiskSnapshotResult"
