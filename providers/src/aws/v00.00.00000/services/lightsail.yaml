              - Lightsail_20161128.CreateRelationalDatabaseSnapshot
            default: Lightsail_20161128.CreateRelationalDatabaseSnapshot
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                relationalDatabaseName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the database on which to base your new snapshot.
                relationalDatabaseSnapshotName:
                  $ref: "#/components/schemas/ResourceName"
                  description: "The name for your new database snapshot. Constraints: Must contain from 2 to 255 alphanumeric characters, or hyphens. The first and last character must be a letter or number."
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tag keys and optional values to add to the resource during create. Use the TagResource action to tag a resource after it's created.
              required:
                - relationalDatabaseName
                - relationalDatabaseSnapshotName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRelationalDatabaseSnapshotResult"
