      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetResourceAccessForBucketResult"
  /SetupInstanceHttps:
    post:
      operationId: SetupInstanceHttps
      description: Creates an SSL/TLS certificate that secures traffic for your website. After the certificate is created, it is installed on the specified Lightsail instance. If you provide more than one domain name in the request, at least one name must be less than or equal to 63 characters in length.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.SetupInstanceHttps
            default: Lightsail_20161128.SetupInstanceHttps
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                instanceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Lightsail instance.
                emailAddress:
                  $ref: "#/components/schemas/EmailAddress"
                  description: The contact method for SSL/TLS certificate renewal alerts. You can enter one email address.
                domainNames:
                  $ref: "#/components/schemas/SetupDomainNameList"
                  description: The name of the domain and subdomains that were specified for the SSL/TLS certificate.
                certificateProvider:
                  $ref: "#/components/schemas/CertificateProvider"
                  description: The certificate authority that issues the SSL/TLS certificate.
              required:
                - instanceName
                - emailAddress
                - domainNames
                - certificateProvider
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupInstanceHttpsResult"
  /StartGUISession:
    post:
      operationId: StartGUISession
      description: Initiates a graphical user interface (GUI) session that’s used to access a virtual computer’s operating system and application. The session will be active for 1 hour. Use this action to resume the session after it expires.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.StartGUISession
            default: Lightsail_20161128.StartGUISession
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The resource name.
              required:
                - resourceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartGUISessionResult"
  /StartInstance:
    post:
      operationId: StartInstance
      description: Starts a specific Amazon Lightsail instance from a stopped state. To restart an instance, use the reboot instance operation. When you start a stopped instance, Lightsail assigns a new public IP address to the instance. To use the same IP address after stopping and starting an instance, create a static IP address and attach it to the instance. For more information, see the Amazon Lightsail Developer Guide. The start instance operation supports tag-based access control via resource tags applied to the resource identified by instance name. For more information, see the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.StartInstance
            default: Lightsail_20161128.StartInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                instanceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the instance (a virtual private server) to start.
              required:
                - instanceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartInstanceResult"
  /StartRelationalDatabase:
    post:
      operationId: StartRelationalDatabase
      description: Starts a specific database from a stopped state in Amazon Lightsail. To restart a database, use the reboot relational database operation. The start relational database operation supports tag-based access control via resource tags applied to the resource identified by relationalDatabaseName. For more information, see the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.StartRelationalDatabase
            default: Lightsail_20161128.StartRelationalDatabase
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                relationalDatabaseName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of your database to start.
              required:
                - relationalDatabaseName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartRelationalDatabaseResult"
  /StopGUISession:
    post:
      operationId: StopGUISession
      description: Terminates a web-based Amazon DCV session that’s used to access a virtual computer’s operating system or application. The session will close and any unsaved data will be lost.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.StopGUISession
            default: Lightsail_20161128.StopGUISession
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The resource name.
              required:
                - resourceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopGUISessionResult"
  /StopInstance:
    post:
      operationId: StopInstance
      description: Stops a specific Amazon Lightsail instance that is currently running. When you start a stopped instance, Lightsail assigns a new public IP address to the instance. To use the same IP address after stopping and starting an instance, create a static IP address and attach it to the instance. For more information, see the Amazon Lightsail Developer Guide. The stop instance operation supports tag-based access control via resource tags applied to the resource identified by instance name. For more information, see the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.StopInstance
            default: Lightsail_20161128.StopInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                instanceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the instance (a virtual private server) to stop.
                force:
                  $ref: "#/components/schemas/boolean"
                  description: When set to True, forces a Lightsail instance that is stuck in a stopping state to stop. Only use the force parameter if your instance is stuck in the stopping state. In any other state, your instance should stop normally without adding this parameter to your API request.
              required:
                - instanceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopInstanceResult"
  /StopRelationalDatabase:
    post:
      operationId: StopRelationalDatabase
      description: Stops a specific database that is currently running in Amazon Lightsail. If you don't manually start your database instance after it has been stopped for seven consecutive days, Amazon Lightsail automatically starts it for you. This action helps ensure that your database instance doesn't fall behind on any required maintenance updates. The stop relational database operation supports tag-based access control via resource tags applied to the resource identified by relationalDatabaseName. For more information, see the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.StopRelationalDatabase
            default: Lightsail_20161128.StopRelationalDatabase
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                relationalDatabaseName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of your database to stop.
                relationalDatabaseSnapshotName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of your new database snapshot to be created before stopping your database.
              required:
                - relationalDatabaseName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopRelationalDatabaseResult"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds one or more tags to the specified Amazon Lightsail resource. Each resource can have a maximum of 50 tags. Each tag consists of a key and an optional value. Tag keys must be unique per resource. For more information about tags, see the Amazon Lightsail Developer Guide. The tag resource operation supports tag-based access control via request tags and resource tags applied to the resource identified by resource name. For more information, see the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.TagResource
            default: Lightsail_20161128.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the resource to which you are adding tags.
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource to which you want to add a tag.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tag key and optional value.
              required:
                - resourceName
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResult"
  /TestAlarm:
    post:
      operationId: TestAlarm
      description: Tests an alarm by displaying a banner on the Amazon Lightsail console. If a notification trigger is configured for the specified alarm, the test also sends a notification to the notification protocol (Email and/or SMS) configured for the alarm. An alarm is used to monitor a single metric for one of your resources. When a metric condition is met, the alarm can notify you by email, SMS text message, and a banner displayed on the Amazon Lightsail console. For more information, see Alarms in Amazon Lightsail.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.TestAlarm
            default: Lightsail_20161128.TestAlarm
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                alarmName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the alarm to test.
                state:
                  $ref: "#/components/schemas/AlarmState"
                  description: "The alarm state to test. An alarm has the following possible states that can be tested: ALARM - The metric is outside of the defined threshold. INSUFFICIENT_DATA - The alarm has just started, the metric is not available, or not enough data is available for the metric to determine the alarm state. OK - The metric is within the defined threshold."
              required:
                - alarmName
                - state
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestAlarmResult"
  /UnpeerVpc:
    post:
      operationId: UnpeerVpc
      description: Unpeers the Lightsail VPC from the user's default VPC.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.UnpeerVpc
            default: Lightsail_20161128.UnpeerVpc
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnpeerVpcResult"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Deletes the specified set of tag keys and their values from the specified Amazon Lightsail resource. The untag resource operation supports tag-based access control via request tags and resource tags applied to the resource identified by resource name. For more information, see the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.UntagResource
            default: Lightsail_20161128.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the resource from which you are removing a tag.
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource from which you want to remove a tag.
                tagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: The tag keys to delete from the specified resource.
              required:
                - resourceName
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResult"
  /UpdateBucket:
    post:
      operationId: UpdateBucket
      description: Updates an existing Amazon Lightsail bucket. Use this action to update the configuration of an existing bucket, such as versioning, public accessibility, and the Amazon Web Services accounts that can access the bucket.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.UpdateBucket
            default: Lightsail_20161128.UpdateBucket
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                bucketName:
                  $ref: "#/components/schemas/BucketName"
                  description: The name of the bucket to update.
                accessRules:
                  $ref: "#/components/schemas/AccessRules"
                  description: An object that sets the public accessibility of objects in the specified bucket.
                versioning:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: "Specifies whether to enable or suspend versioning of objects in the bucket. The following options can be specified: Enabled - Enables versioning of objects in the specified bucket. Suspended - Suspends versioning of objects in the specified bucket. Existing object versions are retained."
                readonlyAccessAccounts:
                  $ref: "#/components/schemas/PartnerIdList"
                  description: An array of strings to specify the Amazon Web Services account IDs that can access the bucket. You can give a maximum of 10 Amazon Web Services accounts access to a bucket.
                accessLogConfig:
                  $ref: "#/components/schemas/BucketAccessLogConfig"
                  description: An object that describes the access log configuration for the bucket.
                cors:
                  $ref: "#/components/schemas/BucketCorsConfig"
                  description: Sets the cross-origin resource sharing (CORS) configuration for your bucket. If a CORS configuration exists, it is replaced with the specified configuration. For AWS CLI operations, this parameter can also be passed as a file. For more information, see Configuring cross-origin resource sharing (CORS). CORS information is only returned in a response when you update the CORS policy.
              required:
                - bucketName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBucketResult"
  /UpdateBucketBundle:
    post:
      operationId: UpdateBucketBundle
      description: Updates the bundle, or storage plan, of an existing Amazon Lightsail bucket. A bucket bundle specifies the monthly cost, storage space, and data transfer quota for a bucket. You can update a bucket's bundle only one time within a monthly Amazon Web Services billing cycle. To determine if you can update a bucket's bundle, use the GetBuckets action. The ableToUpdateBundle parameter in the response will indicate whether you can currently update a bucket's bundle. Update a bucket's bundle if it's consistently going over its storage space or data transfer quota, or if a bucket's usage is consistently in the lower range of its storage space or data transfer quota. Due to the unpredictable usage fluctuations that a bucket might experience, we strongly recommend that you update a bucket's bundle only as a long-term strategy, instead of as a short-term, monthly cost-cutting measure. Choose a bucket bundle that will provide the bucket with ample storage space and data transfer for a long time to come.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.UpdateBucketBundle
            default: Lightsail_20161128.UpdateBucketBundle
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                bucketName:
                  $ref: "#/components/schemas/BucketName"
                  description: The name of the bucket for which to update the bundle.
                bundleId:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: The ID of the new bundle to apply to the bucket. Use the GetBucketBundles action to get a list of bundle IDs that you can specify.
              required:
                - bucketName
                - bundleId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBucketBundleResult"
  /UpdateContainerService:
    post:
      operationId: UpdateContainerService
      description: Updates the configuration of your Amazon Lightsail container service, such as its power, scale, and public domain names.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.UpdateContainerService
            default: Lightsail_20161128.UpdateContainerService
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                serviceName:
                  $ref: "#/components/schemas/ContainerServiceName"
                  description: The name of the container service to update.
                power:
                  $ref: "#/components/schemas/ContainerServicePowerName"
                  description: The power for the container service. The power specifies the amount of memory, vCPUs, and base monthly cost of each node of the container service. The power and scale of a container service makes up its configured capacity. To determine the monthly price of your container service, multiply the base price of the power with the scale (the number of nodes) of the service. Use the GetContainerServicePowers action to view the specifications of each power option.
                scale:
                  $ref: "#/components/schemas/ContainerServiceScale"
                  description: The scale for the container service. The scale specifies the allocated compute nodes of the container service. The power and scale of a container service makes up its configured capacity. To determine the monthly price of your container service, multiply the base price of the power with the scale (the number of nodes) of the service.
                isDisabled:
                  $ref: "#/components/schemas/boolean"
                  description: A Boolean value to indicate whether the container service is disabled.
                publicDomainNames:
                  $ref: "#/components/schemas/ContainerServicePublicDomains"
                  description: The public domain names to use with the container service, such as example.com and www.example.com. You can specify up to four public domain names for a container service. The domain names that you specify are used when you create a deployment with a container configured as the public endpoint of your container service. If you don't specify public domain names, then you can use the default domain of the container service. You must create and validate an SSL/TLS certificate before you can use public domain names with your container service. Use the CreateCertificate action to create a certificate for the public domain names you want to use with your container service. You can specify public domain names using a string to array map as shown in the example later on this page.
                privateRegistryAccess:
                  $ref: "#/components/schemas/PrivateRegistryAccessRequest"
                  description: An object to describe the configuration for the container service to access private container image repositories, such as Amazon Elastic Container Registry (Amazon ECR) private repositories. For more information, see Configuring access to an Amazon ECR private repository for an Amazon Lightsail container service in the Amazon Lightsail Developer Guide.
              required:
                - serviceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateContainerServiceResult"
  /UpdateDistribution:
    post:
      operationId: UpdateDistribution
      description: Updates an existing Amazon Lightsail content delivery network (CDN) distribution. Use this action to update the configuration of your existing distribution.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.UpdateDistribution
            default: Lightsail_20161128.UpdateDistribution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                distributionName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the distribution to update. Use the GetDistributions action to get a list of distribution names that you can specify.
                origin:
                  $ref: "#/components/schemas/InputOrigin"
                  description: An object that describes the origin resource for the distribution, such as a Lightsail instance, bucket, or load balancer. The distribution pulls, caches, and serves content from the origin.
                defaultCacheBehavior:
                  $ref: "#/components/schemas/CacheBehavior"
                  description: An object that describes the default cache behavior for the distribution.
                cacheBehaviorSettings:
                  $ref: "#/components/schemas/CacheSettings"
                  description: An object that describes the cache behavior settings for the distribution. The cacheBehaviorSettings specified in your UpdateDistributionRequest will replace your distribution's existing settings.
                cacheBehaviors:
                  $ref: "#/components/schemas/CacheBehaviorList"
                  description: An array of objects that describe the per-path cache behavior for the distribution.
                isEnabled:
                  $ref: "#/components/schemas/boolean"
                  description: Indicates whether to enable the distribution.
                viewerMinimumTlsProtocolVersion:
                  $ref: "#/components/schemas/ViewerMinimumTlsProtocolVersionEnum"
                  description: Use this parameter to update the minimum TLS protocol version for the SSL/TLS certificate that's attached to the distribution.
                certificateName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the SSL/TLS certificate that you want to attach to the distribution. Only certificates with a status of ISSUED can be attached to a distribution. Use the GetCertificates action to get a list of certificate names that you can specify.
                useDefaultCertificate:
                  $ref: "#/components/schemas/boolean"
                  description: Indicates whether the default SSL/TLS certificate is attached to the distribution. The default value is true. When true, the distribution uses the default domain name such as d111111abcdef8.cloudfront.net. Set this value to false to attach a new certificate to the distribution.
              required:
                - distributionName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDistributionResult"
  /UpdateDistributionBundle:
    post:
      operationId: UpdateDistributionBundle
      description: Updates the bundle of your Amazon Lightsail content delivery network (CDN) distribution. A distribution bundle specifies the monthly network transfer quota and monthly cost of your distribution. Update your distribution's bundle if your distribution is going over its monthly network transfer quota and is incurring an overage fee. You can update your distribution's bundle only one time within your monthly Amazon Web Services billing cycle. To determine if you can update your distribution's bundle, use the GetDistributions action. The ableToUpdateBundle parameter in the result will indicate whether you can currently update your distribution's bundle.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.UpdateDistributionBundle
            default: Lightsail_20161128.UpdateDistributionBundle
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                distributionName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the distribution for which to update the bundle. Use the GetDistributions action to get a list of distribution names that you can specify.
                bundleId:
                  $ref: "#/components/schemas/string"
                  description: The bundle ID of the new bundle to apply to your distribution. Use the GetDistributionBundles action to get a list of distribution bundle IDs that you can specify.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDistributionBundleResult"
  /UpdateDomainEntry:
    post:
      operationId: UpdateDomainEntry
      description: Updates a domain recordset after it is created. The update domain entry operation supports tag-based access control via resource tags applied to the resource identified by domain name. For more information, see the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.UpdateDomainEntry
            default: Lightsail_20161128.UpdateDomainEntry
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                domainName:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain recordset to update.
                domainEntry:
                  $ref: "#/components/schemas/DomainEntry"
                  description: An array of key-value pairs containing information about the domain entry.
              required:
                - domainName
                - domainEntry
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDomainEntryResult"
  /UpdateInstanceMetadataOptions:
    post:
      operationId: UpdateInstanceMetadataOptions
      description: Modifies the Amazon Lightsail instance metadata parameters on a running or stopped instance. When you modify the parameters on a running instance, the GetInstance or GetInstances API operation initially responds with a state of pending. After the parameter modifications are successfully applied, the state changes to applied in subsequent GetInstance or GetInstances API calls. For more information, see Use IMDSv2 with an Amazon Lightsail instance in the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.UpdateInstanceMetadataOptions
            default: Lightsail_20161128.UpdateInstanceMetadataOptions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                instanceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the instance for which to update metadata parameters.
                httpTokens:
                  $ref: "#/components/schemas/HttpTokens"
                  description: The state of token usage for your instance metadata requests. If the parameter is not specified in the request, the default state is optional. If the state is optional, you can choose whether to retrieve instance metadata with a signed token header on your request. If you retrieve the IAM role credentials without a token, the version 1.0 role credentials are returned. If you retrieve the IAM role credentials by using a valid signed token, the version 2.0 role credentials are returned. If the state is required, you must send a signed token header with all instance metadata retrieval requests. In this state, retrieving the IAM role credential always returns the version 2.0 credentials. The version 1.0 credentials are not available.
                httpEndpoint:
                  $ref: "#/components/schemas/HttpEndpoint"
                  description: Enables or disables the HTTP metadata endpoint on your instances. If this parameter is not specified, the existing state is maintained. If you specify a value of disabled, you cannot access your instance metadata.
                httpPutResponseHopLimit:
                  $ref: "#/components/schemas/integer"
                  description: The desired HTTP PUT response hop limit for instance metadata requests. A larger number means that the instance metadata requests can travel farther. If no parameter is specified, the existing state is maintained.
                httpProtocolIpv6:
                  $ref: "#/components/schemas/HttpProtocolIpv6"
                  description: Enables or disables the IPv6 endpoint for the instance metadata service. This setting applies only when the HTTP metadata endpoint is enabled. This parameter is available only for instances in the Europe (Stockholm) Amazon Web Services Region (eu-north-1).
              required:
                - instanceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateInstanceMetadataOptionsResult"
  /UpdateLoadBalancerAttribute:
    post:
      operationId: UpdateLoadBalancerAttribute
      description: Updates the specified attribute for a load balancer. You can only update one attribute at a time. The update load balancer attribute operation supports tag-based access control via resource tags applied to the resource identified by load balancer name. For more information, see the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.UpdateLoadBalancerAttribute
            default: Lightsail_20161128.UpdateLoadBalancerAttribute
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                loadBalancerName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the load balancer that you want to modify (my-load-balancer.
                attributeName:
                  $ref: "#/components/schemas/LoadBalancerAttributeName"
                  description: The name of the attribute you want to update.
                attributeValue:
                  $ref: "#/components/schemas/StringMax256"
                  description: "The value that you want to specify for the attribute name. The following values are supported depending on what you specify for the attributeName request parameter: If you specify HealthCheckPath for the attributeName request parameter, then the attributeValue request parameter must be the path to ping on the target (for example, /weather/us/wa/seattle). If you specify SessionStickinessEnabled for the attributeName request parameter, then the attributeValue request parameter must be true to activate session stickiness or false to deactivate session stickiness. If you specify SessionStickiness_LB_CookieDurationSeconds for the attributeName request parameter, then the attributeValue request parameter must be an interger that represents the cookie duration in seconds. If you specify HttpsRedirectionEnabled for the attributeName request parameter, then the attributeValue request parameter must be true to activate HTTP to HTTPS redirection or false to deactivate HTTP to HTTPS redirection. If you specify TlsPolicyName for the attributeName request parameter, then the attributeValue request parameter must be the name of the TLS policy. Use the GetLoadBalancerTlsPolicies action to get a list of TLS policy names that you can specify."
              required:
                - loadBalancerName
                - attributeName
                - attributeValue
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLoadBalancerAttributeResult"
  /UpdateRelationalDatabase:
    post:
      operationId: UpdateRelationalDatabase
      description: Allows the update of one or more attributes of a database in Amazon Lightsail. Updates are applied immediately, or in cases where the updates could result in an outage, are applied during the database's predefined maintenance window. The update relational database operation supports tag-based access control via resource tags applied to the resource identified by relationalDatabaseName. For more information, see the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.UpdateRelationalDatabase
            default: Lightsail_20161128.UpdateRelationalDatabase
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                relationalDatabaseName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of your Lightsail database resource to update.
                masterUserPassword:
                  $ref: "#/components/schemas/SensitiveString"
                  description: 'The password for the master user. The password can include any printable ASCII character except "/", """, or "@". MySQL Constraints: Must contain from 8 to 41 characters. PostgreSQL Constraints: Must contain from 8 to 128 characters.'
                rotateMasterUserPassword:
                  $ref: "#/components/schemas/boolean"
                  description: When true, the master user password is changed to a new strong password generated by Lightsail. Use the get relational database master user password operation to get the new password.
                preferredBackupWindow:
                  $ref: "#/components/schemas/string"
                  description: "The daily time range during which automated backups are created for your database if automated backups are enabled. Constraints: Must be in the hh24:mi-hh24:mi format. Example: 16:00-16:30 Specified in Coordinated Universal Time (UTC). Must not conflict with the preferred maintenance window. Must be at least 30 minutes."
                preferredMaintenanceWindow:
                  $ref: "#/components/schemas/string"
                  description: "The weekly time range during which system maintenance can occur on your database. The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Web Services Region, occurring on a random day of the week. Constraints: Must be in the ddd:hh24:mi-ddd:hh24:mi format. Valid days: Mon, Tue, Wed, Thu, Fri, Sat, Sun. Must be at least 30 minutes. Specified in Coordinated Universal Time (UTC). Example: Tue:17:00-Tue:17:30"
                enableBackupRetention:
                  $ref: "#/components/schemas/boolean"
                  description: When true, enables automated backup retention for your database. Updates are applied during the next maintenance window because this can result in an outage.
                disableBackupRetention:
                  $ref: "#/components/schemas/boolean"
                  description: When true, disables automated backup retention for your database. Disabling backup retention deletes all automated database backups. Before disabling this, you may want to create a snapshot of your database using the create relational database snapshot operation. Updates are applied during the next maintenance window because this can result in an outage.
                publiclyAccessible:
                  $ref: "#/components/schemas/boolean"
                  description: Specifies the accessibility options for your database. A value of true specifies a database that is available to resources outside of your Lightsail account. A value of false specifies a database that is available only to your Lightsail resources in the same region as your database.
                applyImmediately:
                  $ref: "#/components/schemas/boolean"
                  description: "When true, applies changes immediately. When false, applies changes during the preferred maintenance window. Some changes may cause an outage. Default: false"
                caCertificateIdentifier:
                  $ref: "#/components/schemas/string"
                  description: Indicates the certificate that needs to be associated with the database.
                relationalDatabaseBlueprintId:
                  $ref: "#/components/schemas/string"
                  description: This parameter is used to update the major version of the database. Enter the blueprintId for the major version that you want to update to. Use the GetRelationalDatabaseBlueprints action to get a list of available blueprint IDs.
              required:
                - relationalDatabaseName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRelationalDatabaseResult"
  /UpdateRelationalDatabaseParameters:
    post:
      operationId: UpdateRelationalDatabaseParameters
      description: "Allows the update of one or more parameters of a database in Amazon Lightsail. Parameter updates don't cause outages; therefore, their application is not subject to the preferred maintenance window. However, there are two ways in which parameter updates are applied: dynamic or pending-reboot. Parameters marked with a dynamic apply type are applied immediately. Parameters marked with a pending-reboot apply type are applied only after the database is rebooted using the reboot relational database operation. The update relational database parameters operation supports tag-based access control via resource tags applied to the resource identified by relationalDatabaseName. For more information, see the Amazon Lightsail Developer Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.UpdateRelationalDatabaseParameters
            default: Lightsail_20161128.UpdateRelationalDatabaseParameters
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                relationalDatabaseName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of your database for which to update parameters.
                parameters:
                  $ref: "#/components/schemas/RelationalDatabaseParameterList"
                  description: The database parameters to update.
              required:
                - relationalDatabaseName
                - parameters
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRelationalDatabaseParametersResult"
