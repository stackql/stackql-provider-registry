          description: The disks attached to the instance.
        ramSizeInGb:
          $ref: "#/components/schemas/float"
          description: The amount of RAM in GB on the instance (1.0).
    InstanceNetworking:
      description: Describes monthly data transfer rates and port information for an instance.
      type: object
      properties:
        monthlyTransfer:
          $ref: "#/components/schemas/MonthlyTransfer"
          description: The amount of data in GB allocated for monthly data transfers.
        ports:
          $ref: "#/components/schemas/InstancePortInfoList"
          description: An array of key-value pairs containing information about the ports on the instance.
    MonthlyTransfer:
      description: Describes the monthly data transfer in and out of your virtual private server (or instance).
      type: object
      properties:
        gbPerMonthAllocated:
          $ref: "#/components/schemas/integer"
          description: The amount allocated per month (in GB).
    InstancePortInfoList:
      type: array
      items:
        $ref: "#/components/schemas/InstancePortInfo"
    InstancePortInfo:
      description: Describes information about ports for an Amazon Lightsail instance.
      type: object
      properties:
        fromPort:
          $ref: "#/components/schemas/Port"
          description: "The first port in a range of open ports on an instance. Allowed ports: TCP and UDP - 0 to 65535 ICMP - The ICMP type for IPv4 addresses. For example, specify 8 as the fromPort (ICMP type), and -1 as the toPort (ICMP code), to enable ICMP Ping. For more information, see Control Messages on Wikipedia. ICMPv6 - The ICMP type for IPv6 addresses. For example, specify 128 as the fromPort (ICMPv6 type), and 0 as toPort (ICMPv6 code). For more information, see Internet Control Message Protocol for IPv6."
        toPort:
          $ref: "#/components/schemas/Port"
          description: "The last port in a range of open ports on an instance. Allowed ports: TCP and UDP - 0 to 65535 ICMP - The ICMP code for IPv4 addresses. For example, specify 8 as the fromPort (ICMP type), and -1 as the toPort (ICMP code), to enable ICMP Ping. For more information, see Control Messages on Wikipedia. ICMPv6 - The ICMP code for IPv6 addresses. For example, specify 128 as the fromPort (ICMPv6 type), and 0 as toPort (ICMPv6 code). For more information, see Internet Control Message Protocol for IPv6."
        protocol:
          $ref: "#/components/schemas/NetworkProtocol"
          description: "The IP protocol name. The name can be one of the following: tcp - Transmission Control Protocol (TCP) provides reliable, ordered, and error-checked delivery of streamed data between applications running on hosts communicating by an IP network. If you have an application that doesn't require reliable data stream service, use UDP instead. all - All transport layer protocol types. For more general information, see Transport layer on Wikipedia. udp - With User Datagram Protocol (UDP), computer applications can send messages (or datagrams) to other hosts on an Internet Protocol (IP) network. Prior communications are not required to set up transmission channels or data paths. Applications that don't require reliable data stream service can use UDP, which provides a connectionless datagram service that emphasizes reduced latency over reliability. If you do require reliable data stream service, use TCP instead. icmp - Internet Control Message Protocol (ICMP) is used to send error messages and operational information indicating success or failure when communicating with an instance. For example, an error is indicated when an instance could not be reached. When you specify icmp as the protocol, you must specify the ICMP type using the fromPort parameter, and ICMP code using the toPort parameter. icmp6 - Internet Control Message Protocol (ICMP) for IPv6. When you specify icmp6 as the protocol, you must specify the ICMP type using the fromPort parameter, and ICMP code using the toPort parameter."
        accessFrom:
          $ref: "#/components/schemas/string"
          description: The location from which access is allowed. For example, Anywhere (0.0.0.0/0), or Custom if a specific IP address or range of IP addresses is allowed.
        accessType:
          $ref: "#/components/schemas/PortAccessType"
          description: The type of access (Public or Private).
        commonName:
          $ref: "#/components/schemas/string"
          description: The common name of the port information.
        accessDirection:
          $ref: "#/components/schemas/AccessDirection"
          description: The access direction (inbound or outbound). Lightsail currently supports only inbound access direction.
        cidrs:
          $ref: "#/components/schemas/StringList"
          description: The IPv4 address, or range of IPv4 addresses (in CIDR notation) that are allowed to connect to an instance through the ports, and the protocol. The ipv6Cidrs parameter lists the IPv6 addresses that are allowed to connect to an instance. For more information about CIDR block notation, see Classless Inter-Domain Routing on Wikipedia.
        ipv6Cidrs:
          $ref: "#/components/schemas/StringList"
          description: The IPv6 address, or range of IPv6 addresses (in CIDR notation) that are allowed to connect to an instance through the ports, and the protocol. Only devices with an IPv6 address can connect to an instance through IPv6; otherwise, IPv4 should be used. The cidrs parameter lists the IPv4 addresses that are allowed to connect to an instance. For more information about CIDR block notation, see Classless Inter-Domain Routing on Wikipedia.
        cidrListAliases:
          $ref: "#/components/schemas/StringList"
          description: An alias that defines access for a preconfigured range of IP addresses. The only alias currently supported is lightsail-connect, which allows IP addresses of the browser-based RDP/SSH client in the Lightsail console to connect to your instance.
    PortAccessType:
      type: string
      enum:
        - Public
        - Private
    AccessDirection:
      type: string
      enum:
        - inbound
        - outbound
    InstanceState:
      description: Describes the virtual private server (or instance) status.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/integer"
          description: The status code for the instance.
        name:
          $ref: "#/components/schemas/string"
          description: The state of the instance (running or pending).
    InstanceMetadataOptions:
      description: The metadata options for the instance.
      type: object
      properties:
        state:
          $ref: "#/components/schemas/InstanceMetadataState"
          description: "The state of the metadata option changes. The following states are possible: pending - The metadata options are being updated. The instance is not yet ready to process metadata traffic with the new selection. applied - The metadata options have been successfully applied to the instance."
        httpTokens:
          $ref: "#/components/schemas/HttpTokens"
          description: The state of token usage for your instance metadata requests. If the state is optional, you can choose whether to retrieve instance metadata with a signed token header on your request. If you retrieve the IAM role credentials without a token, the version 1.0 role credentials are returned. If you retrieve the IAM role credentials by using a valid signed token, the version 2.0 role credentials are returned. If the state is required, you must send a signed token header with all instance metadata retrieval requests. In this state, retrieving the IAM role credential always returns the version 2.0 credentials. The version 1.0 credentials are not available. Not all instance blueprints in Lightsail support version 2.0 credentials. Use the MetadataNoToken instance metric to track the number of calls to the instance metadata service that are using version 1.0 credentials. For more information, see Viewing instance metrics in Amazon Lightsail in the Amazon Lightsail Developer Guide.
        httpEndpoint:
          $ref: "#/components/schemas/HttpEndpoint"
          description: Indicates whether the HTTP metadata endpoint on your instances is enabled or disabled. If the value is disabled, you cannot access your instance metadata.
        httpPutResponseHopLimit:
          $ref: "#/components/schemas/integer"
          description: The desired HTTP PUT response hop limit for instance metadata requests. A larger number means that the instance metadata requests can travel farther.
        httpProtocolIpv6:
          $ref: "#/components/schemas/HttpProtocolIpv6"
          description: Indicates whether the IPv6 endpoint for the instance metadata service is enabled or disabled.
    InstanceMetadataState:
      type: string
      enum:
        - pending
        - applied
    HttpTokens:
      type: string
      enum:
        - optional
        - required
    HttpEndpoint:
      type: string
      enum:
        - disabled
        - enabled
    HttpProtocolIpv6:
      type: string
      enum:
        - disabled
        - enabled
    InstanceAccessProtocol:
      type: string
      enum:
        - ssh
        - rdp
    GetInstanceAccessDetailsResult:
      type: object
      properties:
        accessDetails:
          $ref: "#/components/schemas/InstanceAccessDetails"
          description: An array of key-value pairs containing information about a get instance access request.
    InstanceAccessDetails:
      description: The parameters for gaining temporary access to one of your Amazon Lightsail instances.
      type: object
      properties:
        certKey:
          $ref: "#/components/schemas/string"
          description: For SSH access, the public key to use when accessing your instance For OpenSSH clients (command line SSH), you should save this value to tempkey-cert.pub.
        expiresAt:
          $ref: "#/components/schemas/IsoDate"
          description: For SSH access, the date on which the temporary keys expire.
        ipAddress:
          $ref: "#/components/schemas/IpAddress"
          description: The public IP address of the Amazon Lightsail instance.
        ipv6Addresses:
          $ref: "#/components/schemas/Ipv6AddressList"
          description: The IPv6 address of the Amazon Lightsail instance.
        password:
          $ref: "#/components/schemas/string"
          description: For RDP access, the password for your Amazon Lightsail instance. Password will be an empty string if the password for your new instance is not ready yet. When you create an instance, it can take up to 15 minutes for the instance to be ready. If you create an instance using any key pair other than the default (LightsailDefaultKeyPair), password will always be an empty string. If you change the Administrator password on the instance, Lightsail will continue to return the original password value. When accessing the instance using RDP, you need to manually enter the Administrator password after changing it from the default.
        passwordData:
          $ref: "#/components/schemas/PasswordData"
          description: For a Windows Server-based instance, an object with the data you can use to retrieve your password. This is only needed if password is empty and the instance is not new (and therefore the password is not ready yet). When you create an instance, it can take up to 15 minutes for the instance to be ready.
        privateKey:
          $ref: "#/components/schemas/string"
          description: For SSH access, the temporary private key. For OpenSSH clients (command line SSH), you should save this value to tempkey).
        protocol:
          $ref: "#/components/schemas/InstanceAccessProtocol"
          description: The protocol for these Amazon Lightsail instance access details.
        instanceName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of this Amazon Lightsail instance.
        username:
          $ref: "#/components/schemas/string"
          description: The user name to use when logging in to the Amazon Lightsail instance.
        hostKeys:
          $ref: "#/components/schemas/HostKeysList"
          description: Describes the public SSH host keys or the RDP certificate.
    PasswordData:
      description: The password data for the Windows Server-based instance, including the ciphertext and the key pair name.
      type: object
      properties:
        ciphertext:
          $ref: "#/components/schemas/string"
          description: The encrypted password. Ciphertext will be an empty string if access to your new instance is not ready yet. When you create an instance, it can take up to 15 minutes for the instance to be ready. If you use the default key pair (LightsailDefaultKeyPair), the decrypted password will be available in the password field. If you are using a custom key pair, you need to use your own means of decryption. If you change the Administrator password on the instance, Lightsail will continue to return the original ciphertext value. When accessing the instance using RDP, you need to manually enter the Administrator password after changing it from the default.
        keyPairName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the key pair that you used when creating your instance. If no key pair name was specified when creating the instance, Lightsail uses the default key pair (LightsailDefaultKeyPair). If you are using a custom key pair, you need to use your own means of decrypting your password using the ciphertext. Lightsail creates the ciphertext by encrypting your password with the public key part of this key pair.
    HostKeysList:
      type: array
      items:
        $ref: "#/components/schemas/HostKeyAttributes"
    HostKeyAttributes:
      description: Describes the public SSH host keys or the RDP certificate.
      type: object
      properties:
        algorithm:
          $ref: "#/components/schemas/string"
          description: The SSH host key algorithm or the RDP certificate format. For SSH host keys, the algorithm may be ssh-rsa, ecdsa-sha2-nistp256, ssh-ed25519, etc. For RDP certificates, the algorithm is always x509-cert.
        publicKey:
          $ref: "#/components/schemas/string"
          description: The public SSH host key or the RDP certificate.
        witnessedAt:
          $ref: "#/components/schemas/IsoDate"
          description: The time that the SSH host key or RDP certificate was recorded by Lightsail.
        fingerprintSHA1:
          $ref: "#/components/schemas/string"
          description: "The SHA-1 fingerprint of the returned SSH host key or RDP certificate. Example of an SHA-1 SSH fingerprint: SHA1:1CHH6FaAaXjtFOsR/t83vf91SR0 Example of an SHA-1 RDP fingerprint: af:34:51:fe:09:f0:e0:da:b8:4e:56:ca:60:c2:10:ff:38:06:db:45"
        fingerprintSHA256:
          $ref: "#/components/schemas/string"
          description: "The SHA-256 fingerprint of the returned SSH host key or RDP certificate. Example of an SHA-256 SSH fingerprint: SHA256:KTsMnRBh1IhD17HpdfsbzeGA4jOijm5tyXsMjKVbB8o Example of an SHA-256 RDP fingerprint: 03:9b:36:9f:4b:de:4e:61:70:fc:7c:c9:78:e7:d2:1a:1c:25:a8:0c:91:f6:7c:e4:d6:a0:85:c8:b4:53:99:68"
        notValidBefore:
          $ref: "#/components/schemas/IsoDate"
          description: The returned RDP certificate is valid after this point in time. This value is listed only for RDP certificates.
        notValidAfter:
          $ref: "#/components/schemas/IsoDate"
          description: The returned RDP certificate is not valid after this point in time. This value is listed only for RDP certificates.
    InstanceMetricName:
