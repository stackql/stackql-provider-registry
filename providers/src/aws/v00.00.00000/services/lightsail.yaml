    LoadBalancerTlsCertificateList:
      type: array
      items:
        $ref: "#/components/schemas/LoadBalancerTlsCertificate"
    LoadBalancerTlsCertificate:
      description: Describes a load balancer SSL/TLS certificate. TLS is just an updated, more secure version of Secure Socket Layer (SSL).
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the SSL/TLS certificate (my-certificate).
        arn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the SSL/TLS certificate.
        supportCode:
          $ref: "#/components/schemas/string"
          description: The support code. Include this code in your email to support when you have questions about your Lightsail load balancer or SSL/TLS certificate. This code enables our support team to look up your Lightsail information more easily.
        createdAt:
          $ref: "#/components/schemas/IsoDate"
          description: The time when you created your SSL/TLS certificate.
        location:
          $ref: "#/components/schemas/ResourceLocation"
          description: The Amazon Web Services Region and Availability Zone where you created your certificate.
        resourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The resource type (LoadBalancerTlsCertificate). Instance - A Lightsail instance (a virtual private server) StaticIp - A static IP address KeyPair - The key pair used to connect to a Lightsail instance InstanceSnapshot - A Lightsail instance snapshot Domain - A DNS zone PeeredVpc - A peered VPC LoadBalancer - A Lightsail load balancer LoadBalancerTlsCertificate - An SSL/TLS certificate associated with a Lightsail load balancer Disk - A Lightsail block storage disk DiskSnapshot - A block storage disk snapshot
        tags:
          $ref: "#/components/schemas/TagList"
          description: The tag keys and optional values for the resource. For more information about tags in Lightsail, see the Amazon Lightsail Developer Guide.
        loadBalancerName:
          $ref: "#/components/schemas/ResourceName"
          description: The load balancer name where your SSL/TLS certificate is attached.
        isAttached:
          $ref: "#/components/schemas/boolean"
          description: When true, the SSL/TLS certificate is attached to the Lightsail load balancer.
        status:
          $ref: "#/components/schemas/LoadBalancerTlsCertificateStatus"
          description: The validation status of the SSL/TLS certificate. Valid values are below.
        domainName:
          $ref: "#/components/schemas/DomainName"
          description: The domain name for your SSL/TLS certificate.
        domainValidationRecords:
          $ref: "#/components/schemas/LoadBalancerTlsCertificateDomainValidationRecordList"
          description: An array of LoadBalancerTlsCertificateDomainValidationRecord objects describing the records.
        failureReason:
          $ref: "#/components/schemas/LoadBalancerTlsCertificateFailureReason"
          description: "The validation failure reason, if any, of the certificate. The following failure reasons are possible: NO_AVAILABLE_CONTACTS - This failure applies to email validation, which is not available for Lightsail certificates. ADDITIONAL_VERIFICATION_REQUIRED - Lightsail requires additional information to process this certificate request. This can happen as a fraud-protection measure, such as when the domain ranks within the Alexa top 1000 websites. To provide the required information, use the AWS Support Center to contact AWS Support. You cannot request a certificate for Amazon-owned domain names such as those ending in amazonaws.com, cloudfront.net, or elasticbeanstalk.com. DOMAIN_NOT_ALLOWED - One or more of the domain names in the certificate request was reported as an unsafe domain by VirusTotal. To correct the problem, search for your domain name on the VirusTotal website. If your domain is reported as suspicious, see Google Help for Hacked Websites to learn what you can do. If you believe that the result is a false positive, notify the organization that is reporting the domain. VirusTotal is an aggregate of several antivirus and URL scanners and cannot remove your domain from a block list itself. After you correct the problem and the VirusTotal registry has been updated, request a new certificate. If you see this error and your domain is not included in the VirusTotal list, visit the AWS Support Center and create a case. INVALID_PUBLIC_DOMAIN - One or more of the domain names in the certificate request is not valid. Typically, this is because a domain name in the request is not a valid top-level domain. Try to request a certificate again, correcting any spelling errors or typos that were in the failed request, and ensure that all domain names in the request are for valid top-level domains. For example, you cannot request a certificate for example.invalidpublicdomain because invalidpublicdomain is not a valid top-level domain. OTHER - Typically, this failure occurs when there is a typographical error in one or more of the domain names in the certificate request. Try to request a certificate again, correcting any spelling errors or typos that were in the failed request."
        issuedAt:
          $ref: "#/components/schemas/IsoDate"
          description: The time when the SSL/TLS certificate was issued.
        issuer:
          $ref: "#/components/schemas/NonEmptyString"
          description: The issuer of the certificate.
        keyAlgorithm:
          $ref: "#/components/schemas/NonEmptyString"
          description: The algorithm used to generate the key pair (the public and private key).
        notAfter:
          $ref: "#/components/schemas/IsoDate"
          description: The timestamp when the SSL/TLS certificate expires.
        notBefore:
          $ref: "#/components/schemas/IsoDate"
          description: The timestamp when the SSL/TLS certificate is first valid.
        renewalSummary:
          $ref: "#/components/schemas/LoadBalancerTlsCertificateRenewalSummary"
          description: An object that describes the status of the certificate renewal managed by Lightsail.
        revocationReason:
          $ref: "#/components/schemas/LoadBalancerTlsCertificateRevocationReason"
          description: The reason the certificate was revoked. This value is present only when the certificate status is REVOKED.
        revokedAt:
          $ref: "#/components/schemas/IsoDate"
          description: The timestamp when the certificate was revoked. This value is present only when the certificate status is REVOKED.
        serial:
          $ref: "#/components/schemas/NonEmptyString"
          description: The serial number of the certificate.
        signatureAlgorithm:
          $ref: "#/components/schemas/NonEmptyString"
          description: The algorithm that was used to sign the certificate.
        subject:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the entity that is associated with the public key contained in the certificate.
        subjectAlternativeNames:
          $ref: "#/components/schemas/StringList"
          description: An array of strings that specify the alternate domains (example2.com) and subdomains (blog.example.com) for the certificate.
    LoadBalancerTlsCertificateStatus:
      type: string
      enum:
        - PENDING_VALIDATION
        - ISSUED
        - INACTIVE
        - EXPIRED
        - VALIDATION_TIMED_OUT
        - REVOKED
        - FAILED
        - UNKNOWN
    LoadBalancerTlsCertificateDomainValidationRecordList:
      type: array
      items:
        $ref: "#/components/schemas/LoadBalancerTlsCertificateDomainValidationRecord"
    LoadBalancerTlsCertificateDomainValidationRecord:
      description: Describes the validation record of each domain name in the SSL/TLS certificate.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/NonEmptyString"
          description: A fully qualified domain name in the certificate. For example, example.com.
        type_:
          $ref: "#/components/schemas/NonEmptyString"
          description: The type of validation record. For example, CNAME for domain validation.
        value:
          $ref: "#/components/schemas/NonEmptyString"
          description: The value for that type.
        validationStatus:
          $ref: "#/components/schemas/LoadBalancerTlsCertificateDomainStatus"
          description: The validation status. Valid values are listed below.
        domainName:
          $ref: "#/components/schemas/DomainName"
          description: The domain name against which your SSL/TLS certificate was validated.
        dnsRecordCreationState:
          $ref: "#/components/schemas/LoadBalancerTlsCertificateDnsRecordCreationState"
          description: An object that describes the state of the canonical name (CNAME) records that are automatically added by Lightsail to the DNS of a domain to validate domain ownership.
    LoadBalancerTlsCertificateDomainStatus:
      type: string
      enum:
        - PENDING_VALIDATION
        - FAILED
        - SUCCESS
    LoadBalancerTlsCertificateDnsRecordCreationState:
      description: An object that describes the state of the canonical name (CNAME) records that are automatically added by Lightsail to the DNS of the domain to validate domain ownership.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/LoadBalancerTlsCertificateDnsRecordCreationStateCode"
          description: "The status code for the automated DNS record creation. Following are the possible values: SUCCEEDED - The validation records were successfully added. STARTED - The automatic DNS record creation has started. FAILED - The validation record addition failed."
        message:
          $ref: "#/components/schemas/string"
          description: The message that describes the reason for the status code.
    LoadBalancerTlsCertificateDnsRecordCreationStateCode:
