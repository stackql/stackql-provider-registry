            type: string
            enum:
              - Lightsail_20161128.GetAutoSnapshots
            default: Lightsail_20161128.GetAutoSnapshots
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the source instance or disk from which to get automatic snapshot information.
              required:
                - resourceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAutoSnapshotsResult"
  /GetBlueprints:
    post:
      operationId: GetBlueprints
      description: Returns the list of available instance images, or blueprints. You can use a blueprint to create a new instance already running a specific operating system, as well as a preinstalled app or development stack. The software each instance is running depends on the blueprint image you choose. Use active blueprints when creating new instances. Inactive blueprints are listed to support customers with existing instances and are not necessarily available to create new instances. Blueprints are marked inactive when they become outdated due to operating system updates or new application releases.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.GetBlueprints
            default: Lightsail_20161128.GetBlueprints
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                includeInactive:
                  $ref: "#/components/schemas/boolean"
                  description: A Boolean value that indicates whether to include inactive (unavailable) blueprints in the response of your request.
                pageToken:
                  $ref: "#/components/schemas/string"
                  description: The token to advance to the next page of results from your request. To get a page token, perform an initial GetBlueprints request. If your results are paginated, the response will return a next page token that you can specify as the page token in a subsequent request.
                appCategory:
                  $ref: "#/components/schemas/AppCategory"
                  description: Returns a list of blueprints that are specific to Lightsail for Research. You must use this parameter to view Lightsail for Research blueprints.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBlueprintsResult"
  /GetBucketAccessKeys:
    post:
      operationId: GetBucketAccessKeys
      description: Returns the existing access key IDs for the specified Amazon Lightsail bucket. This action does not return the secret access key value of an access key. You can get a secret access key only when you create it from the response of the CreateBucketAccessKey action. If you lose the secret access key, you must create a new access key.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
