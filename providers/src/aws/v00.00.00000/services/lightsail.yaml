              required:
                - protocol
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendContactMethodVerificationResult"
  /SetIpAddressType:
    post:
      operationId: SetIpAddressType
      description: Sets the IP address type for an Amazon Lightsail resource. Use this action to enable dual-stack for a resource, which enables IPv4 and IPv6 for the specified resource. Alternately, you can use this action to disable dual-stack, and enable IPv4 only.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.SetIpAddressType
            default: Lightsail_20161128.SetIpAddressType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceType:
                  $ref: "#/components/schemas/ResourceType"
                  description: The resource type. The resource values are Distribution, Instance, and LoadBalancer. Distribution-related APIs are available only in the N. Virginia (us-east-1) Amazon Web Services Region. Set your Amazon Web Services Region configuration to us-east-1 to create, view, or edit distributions.
                resourceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the resource for which to set the IP address type.
                ipAddressType:
                  $ref: "#/components/schemas/IpAddressType"
                  description: The IP address type to set for the specified resource. The possible values are ipv4 for IPv4 only, ipv6 for IPv6 only, and dualstack for IPv4 and IPv6.
                acceptBundleUpdate:
                  $ref: "#/components/schemas/boolean"
                  description: Required parameter to accept the instance bundle update when changing to, and from, IPv6-only. An instance bundle will change when switching from dual-stack or ipv4, to ipv6. It also changes when switching from ipv6, to dual-stack or ipv4. You must include this parameter in the command to update the bundle. For example, if you switch from dual-stack to ipv6, the bundle will be updated, and billing for the IPv6-only instance bundle begins immediately.
              required:
                - resourceType
                - resourceName
                - ipAddressType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetIpAddressTypeResult"
  /SetResourceAccessForBucket:
    post:
      operationId: SetResourceAccessForBucket
      description: Sets the Amazon Lightsail resources that can access the specified Lightsail bucket. Lightsail buckets currently support setting access for Lightsail instances in the same Amazon Web Services Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.SetResourceAccessForBucket
            default: Lightsail_20161128.SetResourceAccessForBucket
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Lightsail instance for which to set bucket access. The instance must be in a running or stopped state.
                bucketName:
                  $ref: "#/components/schemas/BucketName"
                  description: The name of the bucket for which to set access to another Lightsail resource.
                access:
                  $ref: "#/components/schemas/ResourceBucketAccess"
                  description: "The access setting. The following access settings are available: allow - Allows access to the bucket and its objects. deny - Denies access to the bucket and its objects. Use this setting to remove access for a resource previously set to allow."
              required:
                - resourceName
                - bucketName
