          $ref: "#/components/schemas/OperationList"
          description: An array of objects that describe the result of the action, such as the status of the request, the timestamp of the request, and the resources affected by the request.
    Bucket:
      description: Describes an Amazon Lightsail bucket.
      type: object
      properties:
        resourceType:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Lightsail resource type of the bucket.
        accessRules:
          $ref: "#/components/schemas/AccessRules"
          description: An object that describes the access rules of the bucket.
        arn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the bucket.
        bundleId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the bundle currently applied to the bucket. A bucket bundle specifies the monthly cost, storage space, and data transfer quota for a bucket. Use the UpdateBucketBundle action to change the bundle of a bucket.
        createdAt:
          $ref: "#/components/schemas/IsoDate"
          description: The timestamp when the distribution was created.
        url:
          $ref: "#/components/schemas/NonEmptyString"
          description: The URL of the bucket.
        location:
          $ref: "#/components/schemas/ResourceLocation"
          description: An object that describes the location of the bucket, such as the Amazon Web Services Region and Availability Zone.
        name:
          $ref: "#/components/schemas/BucketName"
          description: The name of the bucket.
        supportCode:
          $ref: "#/components/schemas/NonEmptyString"
          description: The support code for a bucket. Include this code in your email to support when you have questions about a Lightsail bucket. This code enables our support team to look up your Lightsail information more easily.
        tags:
          $ref: "#/components/schemas/TagList"
          description: The tag keys and optional values for the bucket. For more information, see Tags in Amazon Lightsail in the Amazon Lightsail Developer Guide.
        objectVersioning:
          $ref: "#/components/schemas/NonEmptyString"
          description: "Indicates whether object versioning is enabled for the bucket. The following options can be configured: Enabled - Object versioning is enabled. Suspended - Object versioning was previously enabled but is currently suspended. Existing object versions are retained. NeverEnabled - Object versioning has never been enabled."
        ableToUpdateBundle:
          $ref: "#/components/schemas/boolean"
          description: Indicates whether the bundle that is currently applied to a bucket can be changed to another bundle. You can update a bucket's bundle only one time within a monthly Amazon Web Services billing cycle. Use the UpdateBucketBundle action to change a bucket's bundle.
        readonlyAccessAccounts:
          $ref: "#/components/schemas/PartnerIdList"
          description: An array of strings that specify the Amazon Web Services account IDs that have read-only access to the bucket.
        resourcesReceivingAccess:
          $ref: "#/components/schemas/AccessReceiverList"
          description: An array of objects that describe Lightsail instances that have access to the bucket. Use the SetResourceAccessForBucket action to update the instances that have access to a bucket.
        state:
          $ref: "#/components/schemas/BucketState"
          description: An object that describes the state of the bucket.
        accessLogConfig:
          $ref: "#/components/schemas/BucketAccessLogConfig"
          description: An object that describes the access log configuration for the bucket.
        cors:
          $ref: "#/components/schemas/BucketCorsConfig"
          description: An array of cross-origin resource sharing (CORS) rules that identify origins and the HTTP methods that can be executed on your bucket. This field is only included in the response when CORS configuration is requested or when updating CORS configuration. For more information, see Configuring cross-origin resource sharing (CORS).
    AccessRules:
      description: Describes the anonymous access permissions for an Amazon Lightsail bucket and its objects. For more information about bucket access permissions, see Understanding bucket permissions in Amazon Lightsail in the Amazon Lightsail Developer Guide.
      type: object
      properties:
        getObject:
          $ref: "#/components/schemas/AccessType"
          description: "Specifies the anonymous access to all objects in a bucket. The following options can be specified: public - Sets all objects in the bucket to public (read-only), making them readable by anyone in the world. If the getObject value is set to public, then all objects in the bucket default to public regardless of the allowPublicOverrides value. private - Sets all objects in the bucket to private, making them readable only by you or anyone you give access to. If the getObject value is set to private, and the allowPublicOverrides value is set to true, then all objects in the bucket default to private unless they are configured with a public-read ACL. Individual objects with a public-read ACL are readable by anyone in the world."
        allowPublicOverrides:
          $ref: "#/components/schemas/boolean"
          description: A Boolean value that indicates whether the access control list (ACL) permissions that are applied to individual objects override the getObject option that is currently specified. When this is true, you can use the PutObjectAcl Amazon S3 API action to set individual objects to public (read-only) using the public-read ACL, or to private using the private ACL.
    AccessType:
      type: string
      enum:
        - public
        - private
    PartnerIdList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    AccessReceiverList:
      type: array
      items:
        $ref: "#/components/schemas/ResourceReceivingAccess"
    ResourceReceivingAccess:
      description: Describes an Amazon Lightsail instance that has access to a Lightsail bucket.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the Lightsail instance.
        resourceType:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Lightsail resource type (for example, Instance).
    BucketState:
      description: Describes the state of an Amazon Lightsail bucket.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The state code of the bucket. The following codes are possible: OK - The bucket is in a running state. Unknown - Creation of the bucket might have timed-out. You might want to delete the bucket and create a new one."
        message:
          $ref: "#/components/schemas/string"
          description: A message that describes the state of the bucket.
    BucketAccessLogConfig:
      description: Describes the access log configuration for a bucket in the Amazon Lightsail object storage service. For more information about bucket access logs, see Logging bucket requests using access logging in Amazon Lightsail in the Amazon Lightsail Developer Guide.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/boolean"
          description: A Boolean value that indicates whether bucket access logging is enabled for the bucket.
        destination:
          $ref: "#/components/schemas/BucketName"
          description: The name of the bucket where the access logs are saved. The destination can be a Lightsail bucket in the same account, and in the same Amazon Web Services Region as the source bucket. This parameter is required when enabling the access log for a bucket, and should be omitted when disabling the access log.
        prefix:
          $ref: "#/components/schemas/BucketAccessLogPrefix"
          description: The optional object prefix for the bucket access log. The prefix is an optional addition to the object key that organizes your access log files in the destination bucket. For example, if you specify a logs/ prefix, then each log object will begin with the logs/ prefix in its key (for example, logs/2021-11-01-21-32-16-E568B2907131C0C0). This parameter can be optionally specified when enabling the access log for a bucket, and should be omitted when disabling the access log.
      required:
        - enabled
    BucketAccessLogPrefix:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[\w/!.*')(-]+$
    BucketCorsConfig:
      description: Describes the cross-origin resource sharing (CORS) configuration for a Lightsail bucket. CORS defines a way for client web applications that are loaded in one domain to interact with resources in a different domain. For more information, see Configuring cross-origin resource sharing (CORS).
      type: object
      properties:
        rules:
          $ref: "#/components/schemas/BucketCorsRules"
          description: A set of origins and methods (cross-origin access that you want to allow). You can add up to 20 rules to the configuration. The total size is limited to 64 KB.
    BucketCorsRules:
      type: array
      items:
        $ref: "#/components/schemas/BucketCorsRule"
    BucketCorsRule:
      description: Describes a cross-origin resource sharing (CORS) rule for a Lightsail bucket. CORS rules specify which origins are allowed to access the bucket, which HTTP methods are allowed, and other access control information. For more information, see Configuring cross-origin resource sharing (CORS).
      type: object
      properties:
        id:
          $ref: "#/components/schemas/BucketCorsRuleId"
          description: A unique identifier for the CORS rule. The ID value can be up to 255 characters long. The IDs help you find a rule in the configuration.
        allowedMethods:
          $ref: "#/components/schemas/BucketCorsAllowedMethods"
          description: "The HTTP methods that are allowed when accessing the bucket from the specified origin. Each CORS rule must identify at least one origin and one method. You can use the following HTTP methods: GET - Retrieves data from the server, such as downloading files or viewing content. PUT - Uploads or replaces data on the server, such as uploading new files. POST - Sends data to the server for processing, such as submitting forms or creating new resources. DELETE - Removes data from the server, such as deleting files or resources. HEAD - Retrieves only the headers from the server without the actual content, useful for checking if a resource exists."
        allowedOrigins:
          $ref: "#/components/schemas/BucketCorsAllowedOrigins"
          description: One or more origins you want customers to be able to access the bucket from. Each CORS rule must identify at least one origin and one method.
        allowedHeaders:
          $ref: "#/components/schemas/BucketCorsAllowedHeaders"
          description: Headers that are specified in the Access-Control-Request-Headers header. These headers are allowed in a preflight OPTIONS request. In response to any preflight OPTIONS request, Amazon S3 returns any requested headers that are allowed.
        exposeHeaders:
          $ref: "#/components/schemas/BucketCorsExposeHeaders"
          description: One or more headers in the response that you want customers to be able to access from their applications (for example, from a JavaScript XMLHttpRequest object).
        maxAgeSeconds:
          $ref: "#/components/schemas/integer"
          description: The time in seconds that your browser is to cache the preflight response for the specified resource. A CORS rule can have only one maxAgeSeconds element.
      required:
        - allowedMethods
        - allowedOrigins
    BucketCorsRuleId:
      type: string
      maxLength: 255
    BucketCorsAllowedMethods:
      type: array
      items:
        $ref: "#/components/schemas/BucketCorsAllowedMethod"
    BucketCorsAllowedMethod:
      type: string
      pattern: ^(DELETE|GET|HEAD|POST|PUT)$
    BucketCorsAllowedOrigins:
      type: array
      items:
        $ref: "#/components/schemas/string"
    BucketCorsAllowedHeaders:
      type: array
      items:
        $ref: "#/components/schemas/string"
    BucketCorsExposeHeaders:
      type: array
      items:
        $ref: "#/components/schemas/string"
    integer:
      type: integer
    CreateBucketAccessKeyResult:
      type: object
      properties:
        accessKey:
          $ref: "#/components/schemas/AccessKey"
          description: An object that describes the access key that is created.
        operations:
          $ref: "#/components/schemas/OperationList"
          description: An array of objects that describe the result of the action, such as the status of the request, the timestamp of the request, and the resources affected by the request.
    AccessKey:
      description: Describes an access key for an Amazon Lightsail bucket. Access keys grant full programmatic access to the specified bucket and its objects. You can have a maximum of two access keys per bucket. Use the CreateBucketAccessKey action to create an access key for a specific bucket. For more information about access keys, see Creating access keys for a bucket in Amazon Lightsail in the Amazon Lightsail Developer Guide. The secretAccessKey value is returned only in response to the CreateBucketAccessKey action. You can get a secret access key only when you first create an access key; you cannot get the secret access key later. If you lose the secret access key, you must create a new access key.
      type: object
      properties:
        accessKeyId:
          $ref: "#/components/schemas/IAMAccessKeyId"
          description: The ID of the access key.
        secretAccessKey:
          $ref: "#/components/schemas/NonEmptyString"
          description: The secret access key used to sign requests. You should store the secret access key in a safe location. We recommend that you delete the access key if the secret access key is compromised.
        status:
          $ref: "#/components/schemas/StatusType"
          description: The status of the access key. A status of Active means that the key is valid, while Inactive means it is not.
        createdAt:
          $ref: "#/components/schemas/IsoDate"
          description: The timestamp when the access key was created.
        lastUsed:
          $ref: "#/components/schemas/AccessKeyLastUsed"
          description: An object that describes the last time the access key was used. This object does not include data in the response of a CreateBucketAccessKey action. If the access key has not been used, the region and serviceName values are N/A, and the lastUsedDate value is null.
    IAMAccessKeyId:
      type: string
      minLength: 20
      maxLength: 20
      pattern: ^[A-Z0-9]{20}$
    StatusType:
      type: string
      enum:
        - Active
        - Inactive
    AccessKeyLastUsed:
      description: Describes the last time an access key was used. This object does not include data in the response of a CreateBucketAccessKey action.
      type: object
      properties:
        lastUsedDate:
          $ref: "#/components/schemas/IsoDate"
          description: The date and time when the access key was most recently used. This value is null if the access key has not been used.
        region:
          $ref: "#/components/schemas/string"
          description: The Amazon Web Services Region where this access key was most recently used. This value is N/A if the access key has not been used.
        serviceName:
          $ref: "#/components/schemas/string"
          description: The name of the Amazon Web Services service with which this access key was most recently used. This value is N/A if the access key has not been used.
    CertificateName:
      type: string
    DomainName:
      type: string
    SubjectAlternativeNameList:
      type: array
      items:
        $ref: "#/components/schemas/DomainName"
    CreateCertificateResult:
      type: object
      properties:
        certificate:
          $ref: "#/components/schemas/CertificateSummary"
          description: An object that describes the certificate created.
        operations:
          $ref: "#/components/schemas/OperationList"
          description: An array of objects that describe the result of the action, such as the status of the request, the timestamp of the request, and the resources affected by the request.
    CertificateSummary:
      description: Describes an Amazon Lightsail SSL/TLS certificate.
      type: object
      properties:
        certificateArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the certificate.
        certificateName:
          $ref: "#/components/schemas/CertificateName"
          description: The name of the certificate.
        domainName:
          $ref: "#/components/schemas/DomainName"
          description: The domain name of the certificate.
        certificateDetail:
          $ref: "#/components/schemas/Certificate"
          description: An object that describes a certificate in detail.
        tags:
          $ref: "#/components/schemas/TagList"
          description: The tag keys and optional values for the resource. For more information about tags in Lightsail, see the Amazon Lightsail Developer Guide.
    Certificate:
      description: Describes the full details of an Amazon Lightsail SSL/TLS certificate. To get a summary of a certificate, use the GetCertificates action and omit includeCertificateDetails from your request. The response will include only the certificate Amazon Resource Name (ARN), certificate name, domain name, and tags.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the certificate.
        name:
          $ref: "#/components/schemas/CertificateName"
          description: The name of the certificate (my-certificate).
        domainName:
          $ref: "#/components/schemas/DomainName"
          description: The domain name of the certificate.
        status:
          $ref: "#/components/schemas/CertificateStatus"
          description: The validation status of the certificate.
        serialNumber:
          $ref: "#/components/schemas/SerialNumber"
          description: The serial number of the certificate.
        subjectAlternativeNames:
          $ref: "#/components/schemas/SubjectAlternativeNameList"
          description: An array of strings that specify the alternate domains (example2.com) and subdomains (blog.example.com) of the certificate.
        domainValidationRecords:
          $ref: "#/components/schemas/DomainValidationRecordList"
          description: An array of objects that describe the domain validation records of the certificate.
        requestFailureReason:
          $ref: "#/components/schemas/RequestFailureReason"
          description: "The validation failure reason, if any, of the certificate. The following failure reasons are possible: NO_AVAILABLE_CONTACTS - This failure applies to email validation, which is not available for Lightsail certificates. ADDITIONAL_VERIFICATION_REQUIRED - Lightsail requires additional information to process this certificate request. This can happen as a fraud-protection measure, such as when the domain ranks within the Alexa top 1000 websites. To provide the required information, use the Amazon Web Services Support Center to contact Amazon Web Services Support. You cannot request a certificate for Amazon-owned domain names such as those ending in amazonaws.com, cloudfront.net, or elasticbeanstalk.com. DOMAIN_NOT_ALLOWED - One or more of the domain names in the certificate request was reported as an unsafe domain by VirusTotal. To correct the problem, search for your domain name on the VirusTotal website. If your domain is reported as suspicious, see Google Help for Hacked Websites to learn what you can do. If you believe that the result is a false positive, notify the organization that is reporting the domain. VirusTotal is an aggregate of several antivirus and URL scanners and cannot remove your domain from a block list itself. After you correct the problem and the VirusTotal registry has been updated, request a new certificate. If you see this error and your domain is not included in the VirusTotal list, visit the Amazon Web Services Support Center and create a case. INVALID_PUBLIC_DOMAIN - One or more of the domain names in the certificate request is not valid. Typically, this is because a domain name in the request is not a valid top-level domain. Try to request a certificate again, correcting any spelling errors or typos that were in the failed request, and ensure that all domain names in the request are for valid top-level domains. For example, you cannot request a certificate for example.invalidpublicdomain because invalidpublicdomain is not a valid top-level domain. OTHER - Typically, this failure occurs when there is a typographical error in one or more of the domain names in the certificate request. Try to request a certificate again, correcting any spelling errors or typos that were in the failed request."
        inUseResourceCount:
          $ref: "#/components/schemas/InUseResourceCount"
          description: The number of Lightsail resources that the certificate is attached to.
        keyAlgorithm:
          $ref: "#/components/schemas/KeyAlgorithm"
          description: The algorithm used to generate the key pair (the public and private key) of the certificate.
        createdAt:
          $ref: "#/components/schemas/IsoDate"
          description: The timestamp when the certificate was created.
        issuedAt:
          $ref: "#/components/schemas/IsoDate"
          description: The timestamp when the certificate was issued.
        issuerCA:
          $ref: "#/components/schemas/IssuerCA"
          description: The certificate authority that issued the certificate.
        notBefore:
          $ref: "#/components/schemas/IsoDate"
          description: The timestamp when the certificate is first valid.
        notAfter:
          $ref: "#/components/schemas/IsoDate"
          description: The timestamp when the certificate expires.
        eligibleToRenew:
          $ref: "#/components/schemas/EligibleToRenew"
          description: The renewal eligibility of the certificate.
        renewalSummary:
          $ref: "#/components/schemas/RenewalSummary"
          description: An object that describes the status of the certificate renewal managed by Lightsail.
        revokedAt:
          $ref: "#/components/schemas/IsoDate"
          description: The timestamp when the certificate was revoked. This value is present only when the certificate status is REVOKED.
        revocationReason:
          $ref: "#/components/schemas/RevocationReason"
          description: The reason the certificate was revoked. This value is present only when the certificate status is REVOKED.
        tags:
          $ref: "#/components/schemas/TagList"
          description: The tag keys and optional values for the resource. For more information about tags in Lightsail, see the Amazon Lightsail Developer Guide.
        supportCode:
          $ref: "#/components/schemas/string"
          description: The support code. Include this code in your email to support when you have questions about your Lightsail certificate. This code enables our support team to look up your Lightsail information more easily.
    CertificateStatus:
      type: string
      enum:
        - PENDING_VALIDATION
        - ISSUED
        - INACTIVE
        - EXPIRED
        - VALIDATION_TIMED_OUT
        - REVOKED
        - FAILED
    SerialNumber:
      type: string
    DomainValidationRecordList:
      type: array
      items:
        $ref: "#/components/schemas/DomainValidationRecord"
    DomainValidationRecord:
      description: Describes the domain name system (DNS) records that you must add to the DNS of your registered domain to validate ownership for an Amazon Lightsail SSL/TLS certificate.
      type: object
      properties:
        domainName:
          $ref: "#/components/schemas/DomainName"
          description: The domain name of the certificate validation record. For example, example.com or www.example.com.
        resourceRecord:
          $ref: "#/components/schemas/ResourceRecord"
          description: An object that describes the DNS records to add to your domain's DNS to validate it for the certificate.
        dnsRecordCreationState:
          $ref: "#/components/schemas/DnsRecordCreationState"
          description: An object that describes the state of the canonical name (CNAME) records that are automatically added by Lightsail to the DNS of the domain to validate domain ownership.
        validationStatus:
          $ref: "#/components/schemas/CertificateDomainValidationStatus"
          description: The validation status of the record.
    ResourceRecord:
      description: Describes the domain name system (DNS) records to add to your domain's DNS to validate it for an Amazon Lightsail certificate.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/string"
          description: The name of the record.
        type_:
          $ref: "#/components/schemas/string"
          description: The DNS record type.
        value:
          $ref: "#/components/schemas/string"
          description: The value for the DNS record.
    DnsRecordCreationState:
      description: Describes the creation state of the canonical name (CNAME) records that are automatically added by Amazon Lightsail to the DNS of a domain to validate domain ownership for an SSL/TLS certificate. When you create an SSL/TLS certificate for a Lightsail resource, you must add a set of CNAME records to the DNS of the domains for the certificate to validate that you own the domains. Lightsail can automatically add the CNAME records to the DNS of the domain if the DNS zone for the domain exists within your Lightsail account. If automatic record addition fails, or if you manage the DNS of your domain using a third-party service, then you must manually add the CNAME records to the DNS of your domain. For more information, see Verify an SSL/TLS certificate in Amazon Lightsail in the Amazon Lightsail Developer Guide.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/DnsRecordCreationStateCode"
          description: "The status code for the automated DNS record creation. Following are the possible values: SUCCEEDED - The validation records were successfully added to the domain. STARTED - The automatic DNS record creation has started. FAILED - The validation records failed to be added to the domain."
        message:
          $ref: "#/components/schemas/string"
          description: The message that describes the reason for the status code.
    DnsRecordCreationStateCode:
      type: string
      enum:
        - SUCCEEDED
        - STARTED
        - FAILED
    CertificateDomainValidationStatus:
      type: string
      enum:
        - PENDING_VALIDATION
        - FAILED
        - SUCCESS
    RequestFailureReason:
      type: string
    InUseResourceCount:
      type: integer
    KeyAlgorithm:
      type: string
    IssuerCA:
      type: string
    EligibleToRenew:
      type: string
    RenewalSummary:
      description: Describes the status of a SSL/TLS certificate renewal managed by Amazon Lightsail.
      type: object
      properties:
        domainValidationRecords:
          $ref: "#/components/schemas/DomainValidationRecordList"
          description: An array of objects that describe the domain validation records of the certificate.
        renewalStatus:
          $ref: "#/components/schemas/RenewalStatus"
          description: "The renewal status of the certificate. The following renewal status are possible: PendingAutoRenewal - Lightsail is attempting to automatically validate the domain names of the certificate. No further action is required. PendingValidation - Lightsail couldn't automatically validate one or more domain names of the certificate. You must take action to validate these domain names or the certificate won't be renewed. Check to make sure your certificate's domain validation records exist in your domain's DNS, and that your certificate remains in use. Success - All domain names in the certificate are validated, and Lightsail renewed the certificate. No further action is required. Failed - One or more domain names were not validated before the certificate expired, and Lightsail did not renew the certificate. You can request a new certificate using the CreateCertificate action."
        renewalStatusReason:
          $ref: "#/components/schemas/RenewalStatusReason"
          description: The reason for the renewal status of the certificate.
        updatedAt:
          $ref: "#/components/schemas/IsoDate"
          description: The timestamp when the certificate was last updated.
    RenewalStatus:
      type: string
      enum:
        - PendingAutoRenewal
        - PendingValidation
        - Success
        - Failed
    RenewalStatusReason:
      type: string
    RevocationReason:
      type: string
    InstanceEntryList:
      type: array
      items:
        $ref: "#/components/schemas/InstanceEntry"
    InstanceEntry:
      description: Describes the Amazon Elastic Compute Cloud instance and related resources to be created using the create cloud formation stack operation.
      type: object
      properties:
        sourceName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the export snapshot record, which contains the exported Lightsail instance snapshot that will be used as the source of the new Amazon EC2 instance. Use the get export snapshot records operation to get a list of export snapshot records that you can use to create a CloudFormation stack.
        instanceType:
          $ref: "#/components/schemas/NonEmptyString"
          description: The instance type (t2.micro) to use for the new Amazon EC2 instance.
        portInfoSource:
          $ref: "#/components/schemas/PortInfoSourceType"
          description: "The port configuration to use for the new Amazon EC2 instance. The following configuration options are available: DEFAULT - Use the default firewall settings from the Lightsail instance blueprint. If this is specified, then IPv4 and IPv6 will be configured for the new instance that is created in Amazon EC2. INSTANCE - Use the configured firewall settings from the source Lightsail instance. If this is specified, the new instance that is created in Amazon EC2 will be configured to match the configuration of the source Lightsail instance. For example, if the source instance is configured for dual-stack (IPv4 and IPv6), then IPv4 and IPv6 will be configured for the new instance that is created in Amazon EC2. If the source instance is configured for IPv4 only, then only IPv4 will be configured for the new instance that is created in Amazon EC2. NONE - Use the default Amazon EC2 security group. If this is specified, then only IPv4 will be configured for the new instance that is created in Amazon EC2. CLOSED - All ports closed. If this is specified, then only IPv4 will be configured for the new instance that is created in Amazon EC2. If you configured lightsail-connect as a cidrListAliases on your instance, or if you chose to allow the Lightsail browser-based SSH or RDP clients to connect to your instance, that configuration is not carried over to your new Amazon EC2 instance."
        userData:
          $ref: "#/components/schemas/string"
          description: A launch script you can create that configures a server with additional user data. For example, you might want to run apt-get -y update. Depending on the machine image you choose, the command to get software on your instance varies. Amazon Linux and CentOS use yum, Debian and Ubuntu use apt-get, and FreeBSD uses pkg.
        availabilityZone:
          $ref: "#/components/schemas/string"
          description: The Availability Zone for the new Amazon EC2 instance.
      required:
        - sourceName
        - instanceType
        - portInfoSource
        - availabilityZone
    PortInfoSourceType:
      type: string
      enum:
        - DEFAULT
        - INSTANCE
        - NONE
        - CLOSED
    CreateCloudFormationStackResult:
      type: object
      properties:
        operations:
          $ref: "#/components/schemas/OperationList"
          description: An array of objects that describe the result of the action, such as the status of the request, the timestamp of the request, and the resources affected by the request.
    ContactProtocol:
      type: string
      enum:
        - Email
        - SMS
    StringMax256:
      type: string
      minLength: 1
      maxLength: 256
    CreateContactMethodResult:
      type: object
      properties:
        operations:
          $ref: "#/components/schemas/OperationList"
          description: An array of objects that describe the result of the action, such as the status of the request, the timestamp of the request, and the resources affected by the request.
    ContainerServiceName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: ^[a-z0-9]{1,2}|[a-z0-9][a-z0-9-]+[a-z0-9]$
    ContainerServicePowerName:
      type: string
      enum:
        - nano
        - micro
        - small
        - medium
        - large
        - xlarge
    ContainerServiceScale:
      type: integer
      minimum: 1
      maximum: 20
    ContainerServicePublicDomains:
      type: object
      properties: {}
    ContainerServiceDeploymentRequest:
      description: Describes a container deployment configuration of an Amazon Lightsail container service. A deployment specifies the settings, such as the ports and launch command, of containers that are deployed to your container service.
      type: object
      properties:
        containers:
          type: object
          properties: {}
          description: An object that describes the configuration for the containers of the deployment.
        publicEndpoint:
          $ref: "#/components/schemas/EndpointRequest"
          description: An object that describes the endpoint of the deployment.
    EndpointRequest:
      description: Describes the settings of a public endpoint for an Amazon Lightsail container service.
      type: object
      properties:
        containerName:
          $ref: "#/components/schemas/string"
          description: The name of the container for the endpoint.
        containerPort:
          $ref: "#/components/schemas/integer"
          description: The port of the container to which traffic is forwarded to.
        healthCheck:
          $ref: "#/components/schemas/ContainerServiceHealthCheckConfig"
          description: An object that describes the health check configuration of the container.
      required:
        - containerName
        - containerPort
    ContainerServiceHealthCheckConfig:
      description: Describes the health check configuration of an Amazon Lightsail container service.
      type: object
      properties:
        healthyThreshold:
          $ref: "#/components/schemas/integer"
          description: The number of consecutive health checks successes required before moving the container to the Healthy state. The default value is 2.
        unhealthyThreshold:
          $ref: "#/components/schemas/integer"
          description: The number of consecutive health check failures required before moving the container to the Unhealthy state. The default value is 2.
        timeoutSeconds:
          $ref: "#/components/schemas/integer"
          description: The amount of time, in seconds, during which no response means a failed health check. You can specify between 2 and 60 seconds. The default value is 2.
        intervalSeconds:
          $ref: "#/components/schemas/integer"
          description: The approximate interval, in seconds, between health checks of an individual container. You can specify between 5 and 300 seconds. The default value is 5.
        path:
          $ref: "#/components/schemas/string"
          description: The path on the container on which to perform the health check. The default value is /.
        successCodes:
          $ref: "#/components/schemas/string"
          description: The HTTP codes to use when checking for a successful response from a container. You can specify values between 200 and 499. You can specify multiple values (for example, 200,202) or a range of values (for example, 200-299).
    PrivateRegistryAccessRequest:
      description: Describes a request to configure an Amazon Lightsail container service to access private container image repositories, such as Amazon Elastic Container Registry (Amazon ECR) private repositories. For more information, see Configuring access to an Amazon ECR private repository for an Amazon Lightsail container service in the Amazon Lightsail Developer Guide.
      type: object
      properties:
        ecrImagePullerRole:
          $ref: "#/components/schemas/ContainerServiceECRImagePullerRoleRequest"
          description: An object to describe a request to activate or deactivate the role that you can use to grant an Amazon Lightsail container service access to Amazon Elastic Container Registry (Amazon ECR) private repositories.
    ContainerServiceECRImagePullerRoleRequest:
      description: Describes a request to activate or deactivate the role that you can use to grant an Amazon Lightsail container service access to Amazon Elastic Container Registry (Amazon ECR) private repositories. When activated, Lightsail creates an Identity and Access Management (IAM) role for the specified Lightsail container service. You can use the ARN of the role to create a trust relationship between your Lightsail container service and an Amazon ECR private repository in your Amazon Web Services account. This allows your container service to pull images from Amazon ECR private repositories. For more information, see Configuring access to an Amazon ECR private repository for an Amazon Lightsail container service in the Amazon Lightsail Developer Guide.
      type: object
      properties:
        isActive:
          $ref: "#/components/schemas/boolean"
          description: A Boolean value that indicates whether to activate the role.
    CreateContainerServiceResult:
      type: object
      properties:
        containerService:
          $ref: "#/components/schemas/ContainerService"
          description: An object that describes a container service.
    ContainerService:
      description: Describes an Amazon Lightsail container service.
      type: object
      properties:
        containerServiceName:
          $ref: "#/components/schemas/ContainerServiceName"
          description: The name of the container service.
        arn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the container service.
        createdAt:
          $ref: "#/components/schemas/IsoDate"
          description: The timestamp when the container service was created.
        location:
          $ref: "#/components/schemas/ResourceLocation"
          description: An object that describes the location of the container service, such as the Amazon Web Services Region and Availability Zone.
        resourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The Lightsail resource type of the container service.
        tags:
          $ref: "#/components/schemas/TagList"
          description: The tag keys and optional values for the resource. For more information about tags in Lightsail, see the Amazon Lightsail Developer Guide.
        power:
          $ref: "#/components/schemas/ContainerServicePowerName"
          description: The power specification of the container service. The power specifies the amount of RAM, the number of vCPUs, and the base price of the container service.
        powerId:
          $ref: "#/components/schemas/string"
          description: The ID of the power of the container service.
        state:
          $ref: "#/components/schemas/ContainerServiceState"
          description: "The current state of the container service. The following container service states are possible: PENDING - The container service is being created. READY - The container service is running but it does not have an active container deployment. DEPLOYING - The container service is launching a container deployment. RUNNING - The container service is running and it has an active container deployment. UPDATING - The container service capacity or its custom domains are being updated. DELETING - The container service is being deleted. DISABLED - The container service is disabled, and its active deployment and containers, if any, are shut down."
        stateDetail:
          $ref: "#/components/schemas/ContainerServiceStateDetail"
          description: An object that describes the current state of the container service. The state detail is populated only when a container service is in a PENDING, DEPLOYING, or UPDATING state.
        scale:
          $ref: "#/components/schemas/ContainerServiceScale"
          description: The scale specification of the container service. The scale specifies the allocated compute nodes of the container service.
        currentDeployment:
          $ref: "#/components/schemas/ContainerServiceDeployment"
          description: An object that describes the current container deployment of the container service.
        nextDeployment:
          $ref: "#/components/schemas/ContainerServiceDeployment"
          description: An object that describes the next deployment of the container service. This value is null when there is no deployment in a pending state.
        isDisabled:
          $ref: "#/components/schemas/boolean"
          description: A Boolean value indicating whether the container service is disabled.
        principalArn:
          $ref: "#/components/schemas/string"
          description: The principal ARN of the container service. The principal ARN can be used to create a trust relationship between your standard Amazon Web Services account and your Lightsail container service. This allows you to give your service permission to access resources in your standard Amazon Web Services account.
        privateDomainName:
          $ref: "#/components/schemas/string"
          description: The private domain name of the container service. The private domain name is accessible only by other resources within the default virtual private cloud (VPC) of your Lightsail account.
        publicDomainNames:
          type: object
          properties: {}
          description: The public domain name of the container service, such as example.com and www.example.com. You can specify up to four public domain names for a container service. The domain names that you specify are used when you create a deployment with a container configured as the public endpoint of your container service. If you don't specify public domain names, then you can use the default domain of the container service. You must create and validate an SSL/TLS certificate before you can use public domain names with your container service. Use the CreateCertificate action to create a certificate for the public domain names you want to use with your container service. See CreateContainerService or UpdateContainerService for information about how to specify public domain names for your Lightsail container service.
        url:
          $ref: "#/components/schemas/string"
          description: The publicly accessible URL of the container service. If no public endpoint is specified in the currentDeployment, this URL returns a 404 response.
        privateRegistryAccess:
          $ref: "#/components/schemas/PrivateRegistryAccess"
          description: An object that describes the configuration for the container service to access private container image repositories, such as Amazon Elastic Container Registry (Amazon ECR) private repositories. For more information, see Configuring access to an Amazon ECR private repository for an Amazon Lightsail container service in the Amazon Lightsail Developer Guide.
    ContainerServiceState:
      type: string
      enum:
        - PENDING
        - READY
        - RUNNING
        - UPDATING
        - DELETING
        - DISABLED
        - DEPLOYING
    ContainerServiceStateDetail:
      description: Describes the current state of a container service.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/ContainerServiceStateDetailCode"
          description: "The state code of the container service. The following state codes are possible: The following state codes are possible if your container service is in a DEPLOYING or UPDATING state: CREATING_SYSTEM_RESOURCES - The system resources for your container service are being created. CREATING_NETWORK_INFRASTRUCTURE - The network infrastructure for your container service are being created. PROVISIONING_CERTIFICATE - The SSL/TLS certificate for your container service is being created. PROVISIONING_SERVICE - Your container service is being provisioned. CREATING_DEPLOYMENT - Your deployment is being created on your container service. EVALUATING_HEALTH_CHECK - The health of your deployment is being evaluated. ACTIVATING_DEPLOYMENT - Your deployment is being activated. The following state codes are possible if your container service is in a PENDING state: CERTIFICATE_LIMIT_EXCEEDED - The SSL/TLS certificate required for your container service exceeds the maximum number of certificates allowed for your account. UNKNOWN_ERROR - An error was experienced when your container service was being created."
        message:
          $ref: "#/components/schemas/string"
          description: A message that provides more information for the state code. The state detail is populated only when a container service is in a PENDING, DEPLOYING, or UPDATING state.
    ContainerServiceStateDetailCode:
      type: string
      enum:
        - CREATING_SYSTEM_RESOURCES
        - CREATING_NETWORK_INFRASTRUCTURE
        - PROVISIONING_CERTIFICATE
        - PROVISIONING_SERVICE
        - CREATING_DEPLOYMENT
        - EVALUATING_HEALTH_CHECK
        - ACTIVATING_DEPLOYMENT
        - CERTIFICATE_LIMIT_EXCEEDED
        - UNKNOWN_ERROR
    ContainerServiceDeployment:
      description: Describes a container deployment configuration of an Amazon Lightsail container service. A deployment specifies the settings, such as the ports and launch command, of containers that are deployed to your container service.
      type: object
      properties:
        version:
          $ref: "#/components/schemas/integer"
          description: The version number of the deployment.
        state:
          $ref: "#/components/schemas/ContainerServiceDeploymentState"
          description: "The state of the deployment. A deployment can be in one of the following states: ACTIVATING - The deployment is being created. ACTIVE - The deployment was successfully created, and it's currently running on the container service. The container service can have only one deployment in an active state at a time. INACTIVE - The deployment was previously successfully created, but it is not currently running on the container service. FAILED - The deployment failed. Use the GetContainerLog action to view the log events for the containers in the deployment to try to determine the reason for the failure."
        containers:
          type: object
          properties: {}
          description: An object that describes the configuration for the containers of the deployment.
        publicEndpoint:
          $ref: "#/components/schemas/ContainerServiceEndpoint"
          description: An object that describes the endpoint of the deployment.
        createdAt:
          $ref: "#/components/schemas/IsoDate"
          description: The timestamp when the deployment was created.
    ContainerServiceDeploymentState:
      type: string
      enum:
        - ACTIVATING
        - ACTIVE
        - INACTIVE
        - FAILED
    ContainerServiceEndpoint:
      description: Describes the public endpoint configuration of a deployment of an Amazon Lightsail container service.
      type: object
      properties:
        containerName:
          $ref: "#/components/schemas/string"
          description: The name of the container entry of the deployment that the endpoint configuration applies to.
        containerPort:
          $ref: "#/components/schemas/integer"
          description: The port of the specified container to which traffic is forwarded to.
        healthCheck:
          $ref: "#/components/schemas/ContainerServiceHealthCheckConfig"
          description: An object that describes the health check configuration of the container.
    PrivateRegistryAccess:
      description: Describes the configuration for an Amazon Lightsail container service to access private container image repositories, such as Amazon Elastic Container Registry (Amazon ECR) private repositories. For more information, see Configuring access to an Amazon ECR private repository for an Amazon Lightsail container service in the Amazon Lightsail Developer Guide.
      type: object
      properties:
        ecrImagePullerRole:
          $ref: "#/components/schemas/ContainerServiceECRImagePullerRole"
          description: An object that describes the activation status of the role that you can use to grant a Lightsail container service access to Amazon ECR private repositories. If the role is activated, the Amazon Resource Name (ARN) of the role is also listed.
    ContainerServiceECRImagePullerRole:
      description: Describes the activation status of the role that you can use to grant an Amazon Lightsail container service access to Amazon Elastic Container Registry (Amazon ECR) private repositories. When activated, Lightsail creates an Identity and Access Management (IAM) role for the specified Lightsail container service. You can use the ARN of the role to create a trust relationship between your Lightsail container service and an Amazon ECR private repository in your Amazon Web Services account. This allows your container service to pull images from Amazon ECR private repositories. For more information, see Configuring access to an Amazon ECR private repository for an Amazon Lightsail container service in the Amazon Lightsail Developer Guide.
      type: object
      properties:
        isActive:
          $ref: "#/components/schemas/boolean"
          description: A Boolean value that indicates whether the role is activated.
        principalArn:
          $ref: "#/components/schemas/string"
          description: The Amazon Resource Name (ARN) of the role, if it is activated.
    ContainerMap:
      type: object
      properties: {}
    CreateContainerServiceDeploymentResult:
      type: object
      properties:
        containerService:
          $ref: "#/components/schemas/ContainerService"
          description: An object that describes a container service.
    CreateContainerServiceRegistryLoginResult:
      type: object
      properties:
        registryLogin:
          $ref: "#/components/schemas/ContainerServiceRegistryLogin"
          description: An object that describes the log in information for the container service registry of your Lightsail account.
    ContainerServiceRegistryLogin:
      description: Describes the sign-in credentials for the container image registry of an Amazon Lightsail account.
      type: object
      properties:
        username:
          $ref: "#/components/schemas/string"
          description: The container service registry username to use to push container images to the container image registry of a Lightsail account.
        password:
          $ref: "#/components/schemas/string"
          description: The container service registry password to use to push container images to the container image registry of a Lightsail account
        expiresAt:
          $ref: "#/components/schemas/IsoDate"
          description: The timestamp of when the container image registry sign-in credentials expire. The log in credentials expire 12 hours after they are created, at which point you will need to create a new set of log in credentials using the CreateContainerServiceRegistryLogin action.
        registry:
          $ref: "#/components/schemas/string"
          description: The address to use to push container images to the container image registry of a Lightsail account.
    AddOnRequestList:
      type: array
      items:
        $ref: "#/components/schemas/AddOnRequest"
    AddOnRequest:
      description: Describes a request to enable, modify, or disable an add-on for an Amazon Lightsail resource. An additional cost may be associated with enabling add-ons. For more information, see the Lightsail pricing page.
      type: object
      properties:
        addOnType:
          $ref: "#/components/schemas/AddOnType"
          description: The add-on type.
        autoSnapshotAddOnRequest:
          $ref: "#/components/schemas/AutoSnapshotAddOnRequest"
          description: An object that represents additional parameters when enabling or modifying the automatic snapshot add-on.
        stopInstanceOnIdleRequest:
          $ref: "#/components/schemas/StopInstanceOnIdleRequest"
          description: An object that represents additional parameters when enabling or modifying the StopInstanceOnIdle add-on. This object only applies to Lightsail for Research resources.
      required:
        - addOnType
    AddOnType:
      type: string
      enum:
        - AutoSnapshot
        - StopInstanceOnIdle
    AutoSnapshotAddOnRequest:
      description: "Describes a request to enable or modify the automatic snapshot add-on for an Amazon Lightsail instance or disk. When you modify the automatic snapshot time for a resource, it is typically effective immediately except under the following conditions: If an automatic snapshot has been created for the current day, and you change the snapshot time to a later time of day, then the new snapshot time will be effective the following day. This ensures that two snapshots are not created for the current day. If an automatic snapshot has not yet been created for the current day, and you change the snapshot time to an earlier time of day, then the new snapshot time will be effective the following day and a snapshot is automatically created at the previously set time for the current day. This ensures that a snapshot is created for the current day. If an automatic snapshot has not yet been created for the current day, and you change the snapshot time to a time that is within 30 minutes from your current time, then the new snapshot time will be effective the following day and a snapshot is automatically created at the previously set time for the current day. This ensures that a snapshot is created for the current day, because 30 minutes is required between your current time and the new snapshot time that you specify. If an automatic snapshot is scheduled to be created within 30 minutes from your current time and you change the snapshot time, then the new snapshot time will be effective the following day and a snapshot is automatically created at the previously set time for the current day. This ensures that a snapshot is created for the current day, because 30 minutes is required between your current time and the new snapshot time that you specify."
      type: object
      properties:
        snapshotTimeOfDay:
          $ref: "#/components/schemas/TimeOfDay"
          description: "The daily time when an automatic snapshot will be created. Constraints: Must be in HH:00 format, and in an hourly increment. Specified in Coordinated Universal Time (UTC). The snapshot will be automatically created between the time specified and up to 45 minutes after."
    TimeOfDay:
      type: string
      pattern: ^(0[0-9]|1[0-9]|2[0-3]):[0-5][0-9]$
    StopInstanceOnIdleRequest:
      description: Describes a request to create or edit the StopInstanceOnIdle add-on. This add-on only applies to Lightsail for Research resources.
      type: object
      properties:
        threshold:
          $ref: "#/components/schemas/string"
          description: The value to compare with the duration.
        duration:
          $ref: "#/components/schemas/string"
          description: The amount of idle time in minutes after which your virtual computer will automatically stop.
    CreateDiskResult:
      type: object
      properties:
        operations:
          $ref: "#/components/schemas/OperationList"
          description: An array of objects that describe the result of the action, such as the status of the request, the timestamp of the request, and the resources affected by the request.
    CreateDiskFromSnapshotResult:
      type: object
      properties:
        operations:
          $ref: "#/components/schemas/OperationList"
          description: An array of objects that describe the result of the action, such as the status of the request, the timestamp of the request, and the resources affected by the request.
    CreateDiskSnapshotResult:
      type: object
      properties:
        operations:
          $ref: "#/components/schemas/OperationList"
          description: An array of objects that describe the result of the action, such as the status of the request, the timestamp of the request, and the resources affected by the request.
    InputOrigin:
      description: Describes the origin resource of an Amazon Lightsail content delivery network (CDN) distribution. An origin can be a Lightsail instance, bucket, container service, or load balancer. A distribution pulls content from an origin, caches it, and serves it to viewers via a worldwide network of edge servers.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the origin resource.
        regionName:
          $ref: "#/components/schemas/RegionName"
          description: The AWS Region name of the origin resource.
        protocolPolicy:
          $ref: "#/components/schemas/OriginProtocolPolicyEnum"
          description: The protocol that your Amazon Lightsail distribution uses when establishing a connection with your origin to pull content.
        responseTimeout:
          $ref: "#/components/schemas/integer"
          description: The amount of time, in seconds, that the distribution waits for a response after forwarding a request to the origin. The minimum timeout is 1 second, the maximum is 60 seconds, and the default (if you don't specify otherwise) is 30 seconds.
        ipAddressType:
          $ref: "#/components/schemas/OriginIpAddressTypeEnum"
          description: The IP address type that the distribution uses when connecting to the origin. The possible values are ipv4 for IPv4 only, ipv6 for IPv6 only, and dualstack for IPv4 and IPv6.
    OriginProtocolPolicyEnum:
      type: string
      enum:
        - http-only
        - https-only
    OriginIpAddressTypeEnum:
      type: string
      enum:
        - ipv4
        - ipv6
        - dualstack
    CacheBehavior:
      description: Describes the default cache behavior of an Amazon Lightsail content delivery network (CDN) distribution.
      type: object
      properties:
        behavior:
          $ref: "#/components/schemas/BehaviorEnum"
          description: "The cache behavior of the distribution. The following cache behaviors can be specified: cache - This option is best for static sites. When specified, your distribution caches and serves your entire website as static content. This behavior is ideal for websites with static content that doesn't change depending on who views it, or for websites that don't use cookies, headers, or query strings to personalize content. dont-cache - This option is best for sites that serve a mix of static and dynamic content. When specified, your distribution caches and serve only the content that is specified in the distribution's CacheBehaviorPerPath parameter. This behavior is ideal for websites or web applications that use cookies, headers, and query strings to personalize content for individual users."
    BehaviorEnum:
      type: string
      enum:
        - dont-cache
        - cache
    CacheSettings:
      description: Describes the cache settings of an Amazon Lightsail content delivery network (CDN) distribution. These settings apply only to your distribution's cacheBehaviors (including the defaultCacheBehavior) that have a behavior of cache.
      type: object
      properties:
        defaultTTL:
          $ref: "#/components/schemas/long"
          description: The default amount of time that objects stay in the distribution's cache before the distribution forwards another request to the origin to determine whether the content has been updated. The value specified applies only when the origin does not add HTTP headers such as Cache-Control max-age, Cache-Control s-maxage, and Expires to objects.
        minimumTTL:
          $ref: "#/components/schemas/long"
          description: The minimum amount of time that objects stay in the distribution's cache before the distribution forwards another request to the origin to determine whether the object has been updated. A value of 0 must be specified for minimumTTL if the distribution is configured to forward all headers to the origin.
        maximumTTL:
          $ref: "#/components/schemas/long"
          description: The maximum amount of time that objects stay in the distribution's cache before the distribution forwards another request to the origin to determine whether the object has been updated. The value specified applies only when the origin adds HTTP headers such as Cache-Control max-age, Cache-Control s-maxage, and Expires to objects.
        allowedHTTPMethods:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The HTTP methods that are processed and forwarded to the distribution's origin. You can specify the following options: GET,HEAD - The distribution forwards the GET and HEAD methods. GET,HEAD,OPTIONS - The distribution forwards the GET, HEAD, and OPTIONS methods. GET,HEAD,OPTIONS,PUT,PATCH,POST,DELETE - The distribution forwards the GET, HEAD, OPTIONS, PUT, PATCH, POST, and DELETE methods. If you specify the third option, you might need to restrict access to your distribution's origin so users can't perform operations that you don't want them to. For example, you might not want users to have permission to delete objects from your origin."
        cachedHTTPMethods:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The HTTP method responses that are cached by your distribution. You can specify the following options: GET,HEAD - The distribution caches responses to the GET and HEAD methods. GET,HEAD,OPTIONS - The distribution caches responses to the GET, HEAD, and OPTIONS methods."
        forwardedCookies:
          $ref: "#/components/schemas/CookieObject"
          description: An object that describes the cookies that are forwarded to the origin. Your content is cached based on the cookies that are forwarded.
        forwardedHeaders:
          $ref: "#/components/schemas/HeaderObject"
          description: An object that describes the headers that are forwarded to the origin. Your content is cached based on the headers that are forwarded.
        forwardedQueryStrings:
          $ref: "#/components/schemas/QueryStringObject"
          description: An object that describes the query strings that are forwarded to the origin. Your content is cached based on the query strings that are forwarded.
    long:
      type: integer
      format: int64
    CookieObject:
      description: Describes whether an Amazon Lightsail content delivery network (CDN) distribution forwards cookies to the origin and, if so, which ones. For the cookies that you specify, your distribution caches separate versions of the specified content based on the cookie values in viewer requests.
      type: object
      properties:
        option:
          $ref: "#/components/schemas/ForwardValues"
          description: "Specifies which cookies to forward to the distribution's origin for a cache behavior: all, none, or allow-list to forward only the cookies specified in the cookiesAllowList parameter."
        cookiesAllowList:
          $ref: "#/components/schemas/StringList"
          description: The specific cookies to forward to your distribution's origin.
    ForwardValues:
      type: string
      enum:
        - none
        - allow-list
        - all
    HeaderObject:
      description: Describes the request headers that a Lightsail distribution bases caching on. For the headers that you specify, your distribution caches separate versions of the specified content based on the header values in viewer requests. For example, suppose viewer requests for logo.jpg contain a custom product header that has a value of either acme or apex, and you configure your distribution to cache your content based on values in the product header. Your distribution forwards the product header to the origin and caches the response from the origin once for each header value.
      type: object
      properties:
        option:
          $ref: "#/components/schemas/ForwardValues"
          description: "The headers that you want your distribution to forward to your origin and base caching on. You can configure your distribution to do one of the following: all - Forward all headers to your origin. none - Forward only the default headers. allow-list - Forward only the headers you specify using the headersAllowList parameter."
        headersAllowList:
          $ref: "#/components/schemas/HeaderForwardList"
          description: The specific headers to forward to your distribution's origin.
    HeaderForwardList:
      type: array
      items:
        $ref: "#/components/schemas/HeaderEnum"
    HeaderEnum:
      type: string
      enum:
        - Accept
        - Accept-Charset
        - Accept-Datetime
        - Accept-Encoding
        - Accept-Language
        - Authorization
        - CloudFront-Forwarded-Proto
        - CloudFront-Is-Desktop-Viewer
        - CloudFront-Is-Mobile-Viewer
        - CloudFront-Is-SmartTV-Viewer
        - CloudFront-Is-Tablet-Viewer
        - CloudFront-Viewer-Country
        - Host
        - Origin
        - Referer
    QueryStringObject:
      description: Describes the query string parameters that an Amazon Lightsail content delivery network (CDN) distribution to bases caching on. For the query strings that you specify, your distribution caches separate versions of the specified content based on the query string values in viewer requests.
      type: object
      properties:
        option:
          $ref: "#/components/schemas/boolean"
          description: Indicates whether the distribution forwards and caches based on query strings.
        queryStringsAllowList:
          $ref: "#/components/schemas/StringList"
          description: The specific query strings that the distribution forwards to the origin. Your distribution will cache content based on the specified query strings. If the option parameter is true, then your distribution forwards all query strings, regardless of what you specify using the queryStringsAllowList parameter.
    CacheBehaviorList:
      type: array
      items:
        $ref: "#/components/schemas/CacheBehaviorPerPath"
    CacheBehaviorPerPath:
      description: Describes the per-path cache behavior of an Amazon Lightsail content delivery network (CDN) distribution. A per-path cache behavior is used to override, or add an exception to, the default cache behavior of a distribution. For example, if the cacheBehavior is set to cache, then a per-path cache behavior can be used to specify a directory, file, or file type that your distribution will cache. Alternately, if the distribution's cacheBehavior is dont-cache, then a per-path cache behavior can be used to specify a directory, file, or file type that your distribution will not cache.
      type: object
      properties:
        path:
          $ref: "#/components/schemas/string"
          description: "The path to a directory or file to cached, or not cache. Use an asterisk symbol to specify wildcard directories (path/to/assets/*), and file types (*.html, *jpg, *js). Directories and file paths are case-sensitive. Examples: Specify the following to cache all files in the document root of an Apache web server running on a Lightsail instance. var/www/html/ Specify the following file to cache only the index page in the document root of an Apache web server. var/www/html/index.html Specify the following to cache only the .html files in the document root of an Apache web server. var/www/html/*.html Specify the following to cache only the .jpg, .png, and .gif files in the images sub-directory of the document root of an Apache web server. var/www/html/images/*.jpg var/www/html/images/*.png var/www/html/images/*.gif Specify the following to cache all files in the images sub-directory of the document root of an Apache web server. var/www/html/images/"
        behavior:
          $ref: "#/components/schemas/BehaviorEnum"
          description: "The cache behavior for the specified path. You can specify one of the following per-path cache behaviors: cache - This behavior caches the specified path. dont-cache - This behavior doesn't cache the specified path."
    IpAddressType:
      type: string
      enum:
        - dualstack
        - ipv4
        - ipv6
    ViewerMinimumTlsProtocolVersionEnum:
      type: string
      enum:
        - TLSv1.1_2016
        - TLSv1.2_2018
        - TLSv1.2_2019
        - TLSv1.2_2021
    CreateDistributionResult:
      type: object
      properties:
        distribution:
          $ref: "#/components/schemas/LightsailDistribution"
          description: An object that describes the distribution created.
        operation:
          $ref: "#/components/schemas/Operation"
          description: An array of objects that describe the result of the action, such as the status of the request, the timestamp of the request, and the resources affected by the request.
    LightsailDistribution:
      description: Describes an Amazon Lightsail content delivery network (CDN) distribution.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the distribution.
        arn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the distribution.
        supportCode:
          $ref: "#/components/schemas/string"
          description: The support code. Include this code in your email to support when you have questions about your Lightsail distribution. This code enables our support team to look up your Lightsail information more easily.
        createdAt:
          $ref: "#/components/schemas/IsoDate"
          description: The timestamp when the distribution was created.
        location:
          $ref: "#/components/schemas/ResourceLocation"
          description: An object that describes the location of the distribution, such as the Amazon Web Services Region and Availability Zone. Lightsail distributions are global resources that can reference an origin in any Amazon Web Services Region, and distribute its content globally. However, all distributions are located in the us-east-1 Region.
        resourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The Lightsail resource type (Distribution).
        alternativeDomainNames:
          $ref: "#/components/schemas/StringList"
          description: The alternate domain names of the distribution.
        status:
          $ref: "#/components/schemas/string"
          description: The status of the distribution.
        isEnabled:
          $ref: "#/components/schemas/boolean"
          description: Indicates whether the distribution is enabled.
        domainName:
          $ref: "#/components/schemas/string"
          description: The domain name of the distribution.
        bundleId:
          $ref: "#/components/schemas/string"
          description: The ID of the bundle currently applied to the distribution.
        certificateName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the SSL/TLS certificate attached to the distribution, if any.
        origin:
          $ref: "#/components/schemas/Origin"
          description: An object that describes the origin resource of the distribution, such as a Lightsail instance, bucket, or load balancer. The distribution pulls, caches, and serves content from the origin.
        originPublicDNS:
          $ref: "#/components/schemas/string"
          description: The public DNS of the origin.
        defaultCacheBehavior:
          $ref: "#/components/schemas/CacheBehavior"
          description: An object that describes the default cache behavior of the distribution.
        cacheBehaviorSettings:
          $ref: "#/components/schemas/CacheSettings"
          description: An object that describes the cache behavior settings of the distribution.
        cacheBehaviors:
          $ref: "#/components/schemas/CacheBehaviorList"
          description: An array of objects that describe the per-path cache behavior of the distribution.
        ableToUpdateBundle:
          $ref: "#/components/schemas/boolean"
          description: Indicates whether the bundle that is currently applied to your distribution, specified using the distributionName parameter, can be changed to another bundle. Use the UpdateDistributionBundle action to change your distribution's bundle.
        ipAddressType:
          $ref: "#/components/schemas/IpAddressType"
          description: The IP address type of the distribution. The possible values are ipv4 for IPv4 only, and dualstack for IPv4 and IPv6.
        tags:
          $ref: "#/components/schemas/TagList"
          description: The tag keys and optional values for the resource. For more information about tags in Lightsail, see the Amazon Lightsail Developer Guide.
        viewerMinimumTlsProtocolVersion:
          $ref: "#/components/schemas/string"
          description: The minimum TLS protocol version that the distribution can use to communicate with viewers.
    Origin:
      description: Describes the origin resource of an Amazon Lightsail content delivery network (CDN) distribution. An origin can be a Lightsail instance, bucket, or load balancer. A distribution pulls content from an origin, caches it, and serves it to viewers via a worldwide network of edge servers.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the origin resource.
        resourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The resource type of the origin resource (Instance).
        regionName:
          $ref: "#/components/schemas/RegionName"
          description: The AWS Region name of the origin resource.
        protocolPolicy:
          $ref: "#/components/schemas/OriginProtocolPolicyEnum"
          description: The protocol that your Amazon Lightsail distribution uses when establishing a connection with your origin to pull content.
        responseTimeout:
          $ref: "#/components/schemas/integer"
          description: The amount of time, in seconds, that the distribution waits for a response after forwarding a request to the origin. The minimum timeout is 1 second, the maximum is 60 seconds, and the default (if you don't specify otherwise) is 30 seconds.
        ipAddressType:
          $ref: "#/components/schemas/OriginIpAddressTypeEnum"
          description: The IP address type that the distribution uses when connecting to the origin. The possible values are ipv4 for IPv4 only, ipv6 for IPv6 only, and dualstack for IPv4 and IPv6.
