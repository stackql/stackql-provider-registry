    DomainEntryList:
      type: array
      items:
        $ref: "#/components/schemas/DomainEntry"
    RegisteredDomainDelegationInfo:
      description: "Describes the delegation state of an Amazon Route 53 registered domain to Amazon Lightsail. When you delegate an Amazon Route 53 registered domain to Lightsail, you can manage the DNS of the domain using a Lightsail DNS zone. You no longer use the Route 53 hosted zone to manage the DNS of the domain. To delegate the domain, Lightsail automatically updates the domain's name servers in Route 53 to the name servers of the Lightsail DNS zone. Then, Lightsail automatically deletes the Route 53 hosted zone for the domain. All of the following conditions must be true for automatic domain delegation to be successful: The registered domain must be in the same Amazon Web Services account as the Lightsail account making the request. The user or entity making the request must have permission to manage domains in Route 53. The Route 53 hosted zone for the domain must be empty. It cannot contain DNS records other than start of authority (SOA) and name server records. If automatic domain delegation fails, or if you manage the DNS of your domain using a service other than Route 53, then you must manually add the Lightsail DNS zone name servers to your domain in order to delegate management of its DNS to Lightsail. For more information, see Creating a DNS zone to manage your domain’s records in Amazon Lightsail in the Amazon Lightsail Developer Guide."
      type: object
      properties:
        nameServersUpdateState:
          $ref: "#/components/schemas/NameServersUpdateState"
          description: An object that describes the state of the name server records that are automatically added to the Route 53 domain by Lightsail.
        r53HostedZoneDeletionState:
          $ref: "#/components/schemas/R53HostedZoneDeletionState"
          description: Describes the deletion state of an Amazon Route 53 hosted zone for a domain that is being automatically delegated to an Amazon Lightsail DNS zone.
    NameServersUpdateState:
      description: Describes the state of the name server records update made by Amazon Lightsail to an Amazon Route 53 registered domain. For more information, see DNS in Amazon Lightsail in the Amazon Lightsail Developer Guide.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/NameServersUpdateStateCode"
          description: "The status code for the name servers update. Following are the possible values: SUCCEEDED - The name server records were successfully updated. PENDING - The name server record update is in progress. FAILED - The name server record update failed. STARTED - The automatic name server record update started."
        message:
          $ref: "#/components/schemas/string"
          description: The message that describes the reason for the status code.
    NameServersUpdateStateCode:
      type: string
      enum:
        - SUCCEEDED
        - PENDING
        - FAILED
        - STARTED
    R53HostedZoneDeletionState:
      description: Describes the deletion state of an Amazon Route 53 hosted zone for a domain that is being automatically delegated to an Amazon Lightsail DNS zone.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/R53HostedZoneDeletionStateCode"
          description: "The status code for the deletion state. Following are the possible values: SUCCEEDED - The hosted zone was successfully deleted. PENDING - The hosted zone deletion is in progress. FAILED - The hosted zone deletion failed. STARTED - The hosted zone deletion started."
        message:
