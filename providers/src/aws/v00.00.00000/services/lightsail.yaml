  /DeleteRelationalDatabase:
    post:
      operationId: DeleteRelationalDatabase
      description: Deletes a database in Amazon Lightsail. The delete relational database operation supports tag-based access control via resource tags applied to the resource identified by relationalDatabaseName. For more information, see the Amazon Lightsail Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Lightsail_20161128.DeleteRelationalDatabase
            default: Lightsail_20161128.DeleteRelationalDatabase
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                relationalDatabaseName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the database that you are deleting.
                skipFinalSnapshot:
                  $ref: "#/components/schemas/boolean"
                  description: "Determines whether a final database snapshot is created before your database is deleted. If true is specified, no database snapshot is created. If false is specified, a database snapshot is created before your database is deleted. You must specify the final relational database snapshot name parameter if the skip final snapshot parameter is false. Default: false"
                finalRelationalDatabaseSnapshotName:
                  $ref: "#/components/schemas/ResourceName"
                  description: "The name of the database snapshot created if skip final snapshot is false, which is the default value for that parameter. Specifying this parameter and also specifying the skip final snapshot parameter to true results in an error. Constraints: Must contain from 2 to 255 alphanumeric characters, or hyphens. The first and last character must be a letter or number."
              required:
                - relationalDatabaseName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRelationalDatabaseResult"
  /DeleteRelationalDatabaseSnapshot:
    post:
      operationId: DeleteRelationalDatabaseSnapshot
      description: Deletes a database snapshot in Amazon Lightsail. The delete relational database snapshot operation supports tag-based access control via resource tags applied to the resource identified by relationalDatabaseName. For more information, see the Amazon Lightsail Developer Guide.
