          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select: []
        insert:
          - $ref: "#/components/x-stackQL-resources/subscription_providers/methods/register_subscription_provider"
        update: []
