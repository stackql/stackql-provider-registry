openapi: 3.0.0
info:
  version: "2018-05-10"
  title: AWS License Manager Linux Subscriptions
  description: AWS License Manager Linux Subscriptions
  x-serviceName: license-manager-linux-subscriptions
  x-serviceAlias: license_manager_linux_subscriptions
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: license-manager-linux-subscriptions
  x-jsonVersion: "1.1"
servers:
  - url: https://license-manager-linux-subscriptions.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for license-manager-linux-subscriptions
paths:
  /subscription/DeregisterSubscriptionProvider:
    post:
      operationId: DeregisterSubscriptionProvider
      description: Remove a third-party subscription provider from the Bring Your Own License (BYOL) subscriptions registered to your account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SubscriptionProviderArn:
                  $ref: "#/components/schemas/SubscriptionProviderArn"
              required:
                - SubscriptionProviderArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeregisterSubscriptionProviderResponse"
  /subscription/GetRegisteredSubscriptionProvider:
    post:
      operationId: GetRegisteredSubscriptionProvider
      description: Get details for a Bring Your Own License (BYOL) subscription that's registered to your account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SubscriptionProviderArn:
                  $ref: "#/components/schemas/SubscriptionProviderArn"
              required:
                - SubscriptionProviderArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRegisteredSubscriptionProviderResponse"
  /subscription/GetServiceSettings:
    post:
      operationId: GetServiceSettings
      description: Lists the Linux subscriptions service settings for your account.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetServiceSettingsResponse"
  /subscription/ListLinuxSubscriptionInstances:
    post:
      operationId: ListLinuxSubscriptionInstances
      description: Lists the running Amazon EC2 instances that were discovered with commercial Linux subscriptions.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/FilterList"
                MaxResults:
                  $ref: "#/components/schemas/BoxInteger"
                NextToken:
                  $ref: "#/components/schemas/ListLinuxSubscriptionInstancesRequestNextTokenString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLinuxSubscriptionInstancesResponse"
  /subscription/ListLinuxSubscriptions:
    post:
      operationId: ListLinuxSubscriptions
      description: Lists the Linux subscriptions that have been discovered. If you have linked your organization, the returned results will include data aggregated across your accounts in Organizations.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/FilterList"
                MaxResults:
                  $ref: "#/components/schemas/BoxInteger"
                NextToken:
                  $ref: "#/components/schemas/ListLinuxSubscriptionsRequestNextTokenString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLinuxSubscriptionsResponse"
  /subscription/ListRegisteredSubscriptionProviders:
    post:
      operationId: ListRegisteredSubscriptionProviders
      description: List Bring Your Own License (BYOL) subscription registration resources for your account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListRegisteredSubscriptionProvidersRequestMaxResultsInteger"
                NextToken:
                  $ref: "#/components/schemas/String"
                SubscriptionProviderSources:
                  $ref: "#/components/schemas/SubscriptionProviderSourceList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRegisteredSubscriptionProvidersResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: List the metadata tags that are assigned to the specified Amazon Web Services resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SubscriptionProviderArn"
          description: The Amazon Resource Name (ARN) of the resource for which to list metadata tags.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    put:
      operationId: TagResource
      description: Add metadata tags to the specified Amazon Web Services resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SubscriptionProviderArn"
          description: The Amazon Resource Name (ARN) of the Amazon Web Services resource to which to add the specified metadata tags.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Remove one or more metadata tag from the specified Amazon Web Services resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SubscriptionProviderArn"
          description: The Amazon Resource Name (ARN) of the Amazon Web Services resource to remove the metadata tags from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: A list of metadata tag keys to remove from the requested resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /subscription/RegisterSubscriptionProvider:
    post:
      operationId: RegisterSubscriptionProvider
      description: Register the supported third-party subscription provider for your Bring Your Own License (BYOL) subscription.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SecretArn:
                  $ref: "#/components/schemas/SecretArn"
                SubscriptionProviderSource:
                  $ref: "#/components/schemas/SubscriptionProviderSource"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - SecretArn
                - SubscriptionProviderSource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterSubscriptionProviderResponse"
  /subscription/UpdateServiceSettings:
    post:
      operationId: UpdateServiceSettings
      description: Updates the service settings for Linux subscriptions.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AllowUpdate:
                  $ref: "#/components/schemas/Boolean"
                LinuxSubscriptionsDiscovery:
                  $ref: "#/components/schemas/LinuxSubscriptionsDiscovery"
                LinuxSubscriptionsDiscoverySettings:
                  $ref: "#/components/schemas/LinuxSubscriptionsDiscoverySettings"
              required:
                - LinuxSubscriptionsDiscovery
                - LinuxSubscriptionsDiscoverySettings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateServiceSettingsResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    SubscriptionProviderArn:
      type: string
      pattern: ^arn:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{1,510}/[a-z0-9-\.]{1,510}$
    DeregisterSubscriptionProviderResponse:
      type: object
    GetRegisteredSubscriptionProviderResponse:
      type: object
      properties:
        LastSuccessfulDataRetrievalTime:
          $ref: "#/components/schemas/String"
          description: The timestamp from the last time License Manager retrieved subscription details from your registered third-party Linux subscription provider.
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The Amazon Resource Name (ARN) of the third-party access secret stored in Secrets Manager for the BYOL registration resource specified in the request.
        SubscriptionProviderArn:
          $ref: "#/components/schemas/SubscriptionProviderArn"
          description: The Amazon Resource Name (ARN) for the BYOL registration resource specified in the request.
        SubscriptionProviderSource:
          $ref: "#/components/schemas/SubscriptionProviderSource"
          description: The subscription provider for the BYOL registration resource specified in the request.
        SubscriptionProviderStatus:
          $ref: "#/components/schemas/SubscriptionProviderStatus"
          description: The status of the Linux subscription provider access token from the last successful subscription data request.
        SubscriptionProviderStatusMessage:
          $ref: "#/components/schemas/String"
          description: The detailed message from your subscription provider token status.
    String:
      type: string
    SecretArn:
      type: string
      pattern: ^arn:[a-z0-9-\.]{1,63}:secretsmanager:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:secret:[^/]{1,1023}$
    SubscriptionProviderSource:
      type: string
      enum:
        - RedHat
    SubscriptionProviderStatus:
      type: string
      enum:
        - ACTIVE
        - INVALID
        - PENDING
    GetServiceSettingsResponse:
      type: object
      properties:
        HomeRegions:
          $ref: "#/components/schemas/StringList"
          description: The Region in which License Manager displays the aggregated data for Linux subscriptions.
        LinuxSubscriptionsDiscovery:
          $ref: "#/components/schemas/LinuxSubscriptionsDiscovery"
          description: Lists if discovery has been enabled for Linux subscriptions.
        LinuxSubscriptionsDiscoverySettings:
          $ref: "#/components/schemas/LinuxSubscriptionsDiscoverySettings"
          description: Lists the settings defined for Linux subscriptions discovery. The settings include if Organizations integration has been enabled, and which Regions data will be aggregated from.
        Status:
          $ref: "#/components/schemas/Status"
          description: Indicates the status of Linux subscriptions settings being applied.
        StatusMessage:
          type: object
          properties: {}
          description: A message which details the Linux subscriptions service settings current status.
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/StringListMemberString"
    StringListMemberString:
      type: string
      minLength: 1
      maxLength: 100
    LinuxSubscriptionsDiscovery:
      type: string
      enum:
        - Enabled
        - Disabled
    LinuxSubscriptionsDiscoverySettings:
      description: Lists the settings defined for discovering Linux subscriptions.
      type: object
      properties:
        OrganizationIntegration:
          $ref: "#/components/schemas/OrganizationIntegration"
          description: Details if you have enabled resource discovery across your accounts in Organizations.
        SourceRegions:
          $ref: "#/components/schemas/StringList"
          description: The Regions in which to discover data for Linux subscriptions.
      required:
        - OrganizationIntegration
        - SourceRegions
    OrganizationIntegration:
      type: string
      enum:
        - Enabled
        - Disabled
    Status:
      type: string
      enum:
        - InProgress
        - Completed
        - Successful
        - Failed
    FilterList:
      type: array
      items:
        $ref: "#/components/schemas/Filter"
    Filter:
      description: A filter object that is used to return more specific results from a describe operation. Filters can be used to match a set of resources by specific criteria.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The type of name to filter by.
        Operator:
          $ref: "#/components/schemas/Operator"
          description: An operator for filtering results.
        Values:
          $ref: "#/components/schemas/StringList"
          description: One or more values for the name to filter by.
    Operator:
      type: string
      enum:
        - Equal
        - NotEqual
        - Contains
      minLength: 1
      maxLength: 20
    BoxInteger:
      type: integer
    ListLinuxSubscriptionInstancesRequestNextTokenString:
      type: string
      minLength: 1
      maxLength: 16384
    ListLinuxSubscriptionInstancesResponse:
      type: object
      properties:
        Instances:
          $ref: "#/components/schemas/InstanceList"
          description: An array that contains instance objects.
        NextToken:
          $ref: "#/components/schemas/String"
          description: The next token used for paginated responses. When this field isn't empty, there are additional elements that the service hasn't included in this request. Use this token with the next request to retrieve additional objects.
    InstanceList:
      type: array
      items:
        $ref: "#/components/schemas/Instance"
    Instance:
      description: Details discovered information about a running instance using Linux subscriptions.
      type: object
      properties:
        AccountID:
          $ref: "#/components/schemas/String"
          description: The account ID which owns the instance.
        AmiId:
          $ref: "#/components/schemas/String"
          description: The AMI ID used to launch the instance.
        DualSubscription:
          $ref: "#/components/schemas/String"
          description: Indicates that you have two different license subscriptions for the same software on your instance.
        InstanceID:
          $ref: "#/components/schemas/String"
          description: The instance ID of the resource.
        InstanceType:
          $ref: "#/components/schemas/String"
          description: The instance type of the resource.
        LastUpdatedTime:
          $ref: "#/components/schemas/String"
          description: The time in which the last discovery updated the instance details.
        OsVersion:
          $ref: "#/components/schemas/String"
          description: The operating system software version that runs on your instance.
        ProductCode:
          $ref: "#/components/schemas/ProductCodeList"
          description: The product code for the instance. For more information, see Usage operation values in the License Manager User Guide .
        Region:
          $ref: "#/components/schemas/String"
          description: The Region the instance is running in.
        RegisteredWithSubscriptionProvider:
          $ref: "#/components/schemas/String"
          description: Indicates that your instance uses a BYOL license subscription from a third-party Linux subscription provider that you've registered with License Manager.
        Status:
          $ref: "#/components/schemas/String"
          description: The status of the instance.
        SubscriptionName:
          $ref: "#/components/schemas/String"
          description: The name of the license subscription that the instance uses.
        SubscriptionProviderCreateTime:
          $ref: "#/components/schemas/String"
          description: The timestamp when you registered the third-party Linux subscription provider for the subscription that the instance uses.
        SubscriptionProviderUpdateTime:
          $ref: "#/components/schemas/String"
          description: The timestamp from the last time that the instance synced with the registered third-party Linux subscription provider.
        UsageOperation:
          $ref: "#/components/schemas/String"
          description: The usage operation of the instance. For more information, see For more information, see Usage operation values in the License Manager User Guide.
    ProductCodeList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    ListLinuxSubscriptionsRequestNextTokenString:
      type: string
      minLength: 1
      maxLength: 16384
    ListLinuxSubscriptionsResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/String"
          description: The next token used for paginated responses. When this field isn't empty, there are additional elements that the service hasn't included in this request. Use this token with the next request to retrieve additional objects.
        Subscriptions:
          $ref: "#/components/schemas/SubscriptionList"
          description: An array that contains subscription objects.
    SubscriptionList:
      type: array
      items:
        $ref: "#/components/schemas/Subscription"
    Subscription:
      description: An object which details a discovered Linux subscription.
      type: object
      properties:
        InstanceCount:
          $ref: "#/components/schemas/BoxLong"
          description: The total amount of running instances using this subscription.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the subscription.
        Type:
          $ref: "#/components/schemas/String"
          description: The type of subscription. The type can be subscription-included with Amazon EC2, Bring Your Own Subscription model (BYOS), or from the Amazon Web Services Marketplace. Certain subscriptions may use licensing from the Amazon Web Services Marketplace as well as OS licensing from Amazon EC2 or BYOS.
    BoxLong:
      type: integer
      format: int64
    ListRegisteredSubscriptionProvidersRequestMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 100
    SubscriptionProviderSourceList:
      type: array
      items:
        $ref: "#/components/schemas/SubscriptionProviderSource"
    ListRegisteredSubscriptionProvidersResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/String"
          description: The next token used for paginated responses. When this field isn't empty, there are additional elements that the service hasn't included in this request. Use this token with the next request to retrieve additional objects.
        RegisteredSubscriptionProviders:
          $ref: "#/components/schemas/RegisteredSubscriptionProviderList"
          description: The list of BYOL registration resources that fit the criteria you specified in the request.
    RegisteredSubscriptionProviderList:
      type: array
      items:
        $ref: "#/components/schemas/RegisteredSubscriptionProvider"
    RegisteredSubscriptionProvider:
      description: A third-party provider for operating system (OS) platform software and license subscriptions, such as Red Hat. When you register a third-party Linux subscription provider, License Manager can get subscription data from the registered provider.
      type: object
      properties:
        LastSuccessfulDataRetrievalTime:
          $ref: "#/components/schemas/String"
          description: The timestamp from the last time that License Manager accessed third-party subscription data for your account from your registered Linux subscription provider.
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The Amazon Resource Name (ARN) of the Secrets Manager secret that stores your registered Linux subscription provider access token. For RHEL account subscriptions, this is the offline token.
        SubscriptionProviderArn:
          $ref: "#/components/schemas/SubscriptionProviderArn"
          description: The Amazon Resource Name (ARN) of the Linux subscription provider resource that you registered.
        SubscriptionProviderSource:
          $ref: "#/components/schemas/SubscriptionProviderSource"
          description: A supported third-party Linux subscription provider. License Manager currently supports Red Hat subscriptions.
        SubscriptionProviderStatus:
          $ref: "#/components/schemas/SubscriptionProviderStatus"
          description: Indicates the status of your registered Linux subscription provider access token from the last time License Manager retrieved subscription data. For RHEL account subscriptions, this is the status of the offline token.
        SubscriptionProviderStatusMessage:
          $ref: "#/components/schemas/String"
          description: A detailed message that's associated with your BYOL subscription provider token status.
    ListTagsForResourceResponse:
      type: object
      properties:
        tags:
          type: object
          properties: {}
          description: The metadata tags for the requested resource.
    Tags:
      type: object
      properties: {}
    RegisterSubscriptionProviderResponse:
      type: object
      properties:
        SubscriptionProviderArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Linux subscription provider resource that you registered.
        SubscriptionProviderSource:
          $ref: "#/components/schemas/SubscriptionProviderSource"
          description: The Linux subscription provider that you registered.
        SubscriptionProviderStatus:
          $ref: "#/components/schemas/SubscriptionProviderStatus"
          description: Indicates the status of the registration action for the Linux subscription provider that you requested.
    TagResourceResponse:
      type: object
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    UntagResourceResponse:
      type: object
    Boolean:
      type: boolean
    UpdateServiceSettingsResponse:
      type: object
      properties:
        HomeRegions:
          $ref: "#/components/schemas/StringList"
          description: The Region in which License Manager displays the aggregated data for Linux subscriptions.
        LinuxSubscriptionsDiscovery:
          $ref: "#/components/schemas/LinuxSubscriptionsDiscovery"
          description: Lists if discovery has been enabled for Linux subscriptions.
        LinuxSubscriptionsDiscoverySettings:
          $ref: "#/components/schemas/LinuxSubscriptionsDiscoverySettings"
          description: The settings defined for Linux subscriptions discovery. The settings include if Organizations integration has been enabled, and which Regions data will be aggregated from.
        Status:
          $ref: "#/components/schemas/Status"
          description: Indicates the status of Linux subscriptions settings being applied.
        StatusMessage:
          type: object
          properties: {}
          description: A message which details the Linux subscriptions service settings current status.
  x-stackQL-resources:
    subscription_providers:
      id: aws.license_manager_linux_subscriptions.subscription_providers
