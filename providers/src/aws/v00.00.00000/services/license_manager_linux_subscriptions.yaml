      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/registered_subscription_providers/methods/get_registered_subscription_provider"
          - $ref: "#/components/x-stackQL-resources/registered_subscription_providers/methods/list_registered_subscription_providers"
