          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        list_registered_subscription_providers:
          operation:
            $ref: "#/paths/~1subscription~1ListRegisteredSubscriptionProviders/post"
          response:
            openAPIDocKey: "200"
