        delete: []
    linux_subscriptions:
      id: aws.license_manager_linux_subscriptions.linux_subscriptions
      name: linux_subscriptions
      title: linux_subscriptions
      methods:
        list_linux_subscriptions:
          operation:
            $ref: "#/paths/~1subscription~1ListLinuxSubscriptions/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
