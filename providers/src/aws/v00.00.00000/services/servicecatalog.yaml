openapi: 3.0.0
info:
  version: "2015-12-10"
  title: AWS Service Catalog
  description: AWS Service Catalog
  x-serviceName: servicecatalog
  x-serviceAlias: servicecatalog
  x-protocol: json
  x-apiVersion: "2015-12-10"
  x-endpointPrefix: servicecatalog
  x-targetPrefix: AWS242ServiceCatalogService
  x-jsonVersion: "1.1"
servers:
  - url: https://servicecatalog.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for servicecatalog
paths:
  /AcceptPortfolioShare:
    post:
      operationId: AcceptPortfolioShare
      description: Accepts an offer to share the specified portfolio.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.AcceptPortfolioShare
            default: AWS242ServiceCatalogService.AcceptPortfolioShare
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AcceptLanguage:
                  $ref: "#/components/schemas/AcceptLanguage"
                  description: The language code. jp - Japanese zh - Chinese
                PortfolioId:
                  $ref: "#/components/schemas/Id"
                  description: The portfolio identifier.
                PortfolioShareType:
                  $ref: "#/components/schemas/PortfolioShareType"
                  description: The type of shared portfolios to accept. The default is to accept imported portfolios. AWS_ORGANIZATIONS - Accept portfolios shared by the management account of your organization. IMPORTED - Accept imported portfolios. AWS_SERVICECATALOG - Not supported. (Throws ResourceNotFoundException.) For example, aws servicecatalog accept-portfolio-share --portfolio-id "port-2qwzkwxt3y5fk" --portfolio-share-type AWS_ORGANIZATIONS
              required:
                - PortfolioId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptPortfolioShareOutput"
  /AssociateBudgetWithResource:
    post:
      operationId: AssociateBudgetWithResource
      description: Associates the specified budget with the specified resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.AssociateBudgetWithResource
            default: AWS242ServiceCatalogService.AssociateBudgetWithResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                BudgetName:
                  $ref: "#/components/schemas/BudgetName"
                  description: The name of the budget you want to associate.
                ResourceId:
                  $ref: "#/components/schemas/Id"
                  description: The resource identifier. Either a portfolio-id or a product-id.
              required:
                - BudgetName
                - ResourceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateBudgetWithResourceOutput"
  /AssociatePrincipalWithPortfolio:
    post:
      operationId: AssociatePrincipalWithPortfolio
      description: Associates the specified principal ARN with the specified portfolio. If you share the portfolio with principal name sharing enabled, the PrincipalARN association is included in the share. The PortfolioID, PrincipalARN, and PrincipalType parameters are required. You can associate a maximum of 10 Principals with a portfolio using PrincipalType as IAM_PATTERN. When you associate a principal with portfolio, a potential privilege escalation path may occur when that portfolio is then shared with other accounts. For a user in a recipient account who is not an Service Catalog Admin, but still has the ability to create Principals (Users/Groups/Roles), that user could create a role that matches a principal name association for the portfolio. Although this user may not know which principal names are associated through Service Catalog, they may be able to guess the user. If this potential escalation path is a concern, then Service Catalog recommends using PrincipalType as IAM. With this configuration, the PrincipalARN must already exist in the recipient account before it can be associated.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.AssociatePrincipalWithPortfolio
            default: AWS242ServiceCatalogService.AssociatePrincipalWithPortfolio
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AcceptLanguage:
                  $ref: "#/components/schemas/AcceptLanguage"
                  description: The language code. jp - Japanese zh - Chinese
                PortfolioId:
                  $ref: "#/components/schemas/Id"
                  description: The portfolio identifier.
                PrincipalARN:
                  $ref: "#/components/schemas/PrincipalARN"
                  description: 'The ARN of the principal (user, role, or group). If the PrincipalType is IAM, the supported value is a fully defined IAM Amazon Resource Name (ARN). If the PrincipalType is IAM_PATTERN, the supported value is an IAM ARN without an AccountID in the following format: arn:partition:iam:::resource-type/resource-id The ARN resource-id can be either: A fully formed resource-id. For example, arn:aws:iam:::role/resource-name or arn:aws:iam:::role/resource-path/resource-name A wildcard ARN. The wildcard ARN accepts IAM_PATTERN values with a "*" or "?" in the resource-id segment of the ARN. For example arn:partition:service:::resource-type/resource-path/resource-name. The new symbols are exclusive to the resource-path and resource-name and cannot replace the resource-type or other ARN values. The ARN path and principal name allow unlimited wildcard characters. Examples of an acceptable wildcard ARN: arn:aws:iam:::role/ResourceName_* arn:aws:iam:::role/*/ResourceName_? Examples of an unacceptable wildcard ARN: arn:aws:iam:::*/ResourceName You can associate multiple IAM_PATTERNs even if the account has no principal with that name. The "?" wildcard character matches zero or one of any character. This is similar to ".?" in regular regex context. The "*" wildcard character matches any number of any characters. This is similar to ".*" in regular regex context. In the IAM Principal ARN format (arn:partition:iam:::resource-type/resource-path/resource-name), valid resource-type values include user/, group/, or role/. The "?" and "*" characters are allowed only after the resource-type in the resource-id segment. You can use special characters anywhere within the resource-id. The "*" character also matches the "/" character, allowing paths to be formed within the resource-id. For example, arn:aws:iam:::role/*/ResourceName_? matches both arn:aws:iam:::role/pathA/pathB/ResourceName_1 and arn:aws:iam:::role/pathA/ResourceName_1.'
                PrincipalType:
                  $ref: "#/components/schemas/PrincipalType"
                  description: The principal type. The supported value is IAM if you use a fully defined Amazon Resource Name (ARN), or IAM_PATTERN if you use an ARN with no accountID, with or without wildcard characters.
              required:
                - PortfolioId
                - PrincipalARN
                - PrincipalType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociatePrincipalWithPortfolioOutput"
  /AssociateProductWithPortfolio:
    post:
      operationId: AssociateProductWithPortfolio
      description: Associates the specified product with the specified portfolio. A delegated admin is authorized to invoke this command.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.AssociateProductWithPortfolio
            default: AWS242ServiceCatalogService.AssociateProductWithPortfolio
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AcceptLanguage:
                  $ref: "#/components/schemas/AcceptLanguage"
                  description: The language code. jp - Japanese zh - Chinese
                ProductId:
                  $ref: "#/components/schemas/Id"
                  description: The product identifier.
                PortfolioId:
                  $ref: "#/components/schemas/Id"
                  description: The portfolio identifier.
                SourcePortfolioId:
                  $ref: "#/components/schemas/Id"
                  description: The identifier of the source portfolio.
              required:
                - ProductId
                - PortfolioId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateProductWithPortfolioOutput"
  /AssociateServiceActionWithProvisioningArtifact:
    post:
      operationId: AssociateServiceActionWithProvisioningArtifact
      description: Associates a self-service action with a provisioning artifact.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.AssociateServiceActionWithProvisioningArtifact
            default: AWS242ServiceCatalogService.AssociateServiceActionWithProvisioningArtifact
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProductId:
                  $ref: "#/components/schemas/Id"
                  description: The product identifier. For example, prod-abcdzk7xy33qa.
                ProvisioningArtifactId:
                  $ref: "#/components/schemas/Id"
                  description: The identifier of the provisioning artifact. For example, pa-4abcdjnxjj6ne.
                ServiceActionId:
                  $ref: "#/components/schemas/Id"
                  description: The self-service action identifier. For example, act-fs7abcd89wxyz.
                AcceptLanguage:
                  $ref: "#/components/schemas/AcceptLanguage"
                  description: The language code. jp - Japanese zh - Chinese
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique identifier that you provide to ensure idempotency. If multiple requests from the same Amazon Web Services account use the same idempotency token, the same response is returned for each repeated request.
              required:
                - ProductId
                - ProvisioningArtifactId
                - ServiceActionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateServiceActionWithProvisioningArtifactOutput"
  /AssociateTagOptionWithResource:
    post:
      operationId: AssociateTagOptionWithResource
      description: Associate the specified TagOption with the specified portfolio or product.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.AssociateTagOptionWithResource
            default: AWS242ServiceCatalogService.AssociateTagOptionWithResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The resource identifier.
                TagOptionId:
                  $ref: "#/components/schemas/TagOptionId"
                  description: The TagOption identifier.
              required:
                - ResourceId
                - TagOptionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateTagOptionWithResourceOutput"
  /BatchAssociateServiceActionWithProvisioningArtifact:
    post:
      operationId: BatchAssociateServiceActionWithProvisioningArtifact
      description: Associates multiple self-service actions with provisioning artifacts.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.BatchAssociateServiceActionWithProvisioningArtifact
            default: AWS242ServiceCatalogService.BatchAssociateServiceActionWithProvisioningArtifact
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceActionAssociations:
                  $ref: "#/components/schemas/ServiceActionAssociations"
                  description: One or more associations, each consisting of the Action ID, the Product ID, and the Provisioning Artifact ID.
                AcceptLanguage:
                  $ref: "#/components/schemas/AcceptLanguage"
                  description: The language code. jp - Japanese zh - Chinese
              required:
                - ServiceActionAssociations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAssociateServiceActionWithProvisioningArtifactOutput"
  /BatchDisassociateServiceActionFromProvisioningArtifact:
    post:
      operationId: BatchDisassociateServiceActionFromProvisioningArtifact
      description: Disassociates a batch of self-service actions from the specified provisioning artifact.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.BatchDisassociateServiceActionFromProvisioningArtifact
            default: AWS242ServiceCatalogService.BatchDisassociateServiceActionFromProvisioningArtifact
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceActionAssociations:
                  $ref: "#/components/schemas/ServiceActionAssociations"
                  description: One or more associations, each consisting of the Action ID, the Product ID, and the Provisioning Artifact ID.
                AcceptLanguage:
                  $ref: "#/components/schemas/AcceptLanguage"
                  description: The language code. jp - Japanese zh - Chinese
              required:
                - ServiceActionAssociations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDisassociateServiceActionFromProvisioningArtifactOutput"
  /CopyProduct:
    post:
      operationId: CopyProduct
      description: Copies the specified source product to the specified target product or a new product. You can copy a product to the same account or another account. You can copy a product to the same Region or another Region. If you copy a product to another account, you must first share the product in a portfolio using CreatePortfolioShare. This operation is performed asynchronously. To track the progress of the operation, use DescribeCopyProductStatus.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.CopyProduct
            default: AWS242ServiceCatalogService.CopyProduct
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AcceptLanguage:
                  $ref: "#/components/schemas/AcceptLanguage"
                  description: The language code. jp - Japanese zh - Chinese
                SourceProductArn:
                  $ref: "#/components/schemas/ProductArn"
                  description: The Amazon Resource Name (ARN) of the source product.
                TargetProductId:
                  $ref: "#/components/schemas/Id"
                  description: The identifier of the target product. By default, a new product is created.
                TargetProductName:
                  $ref: "#/components/schemas/ProductViewName"
                  description: A name for the target product. The default is the name of the source product.
                SourceProvisioningArtifactIdentifiers:
                  $ref: "#/components/schemas/SourceProvisioningArtifactProperties"
                  description: The identifiers of the provisioning artifacts (also known as versions) of the product to copy. By default, all provisioning artifacts are copied.
                CopyOptions:
                  $ref: "#/components/schemas/CopyOptions"
                  description: The copy options. If the value is CopyTags, the tags from the source product are copied to the target product.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique identifier that you provide to ensure idempotency. If multiple requests differ only by the idempotency token, the same response is returned for each repeated request.
              required:
                - SourceProductArn
                - IdempotencyToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopyProductOutput"
  /CreateConstraint:
    post:
      operationId: CreateConstraint
      description: Creates a constraint. A delegated admin is authorized to invoke this command.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.CreateConstraint
            default: AWS242ServiceCatalogService.CreateConstraint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AcceptLanguage:
                  $ref: "#/components/schemas/AcceptLanguage"
                  description: The language code. jp - Japanese zh - Chinese
                PortfolioId:
                  $ref: "#/components/schemas/Id"
                  description: The portfolio identifier.
                ProductId:
                  $ref: "#/components/schemas/Id"
                  description: The product identifier.
                Parameters:
                  $ref: "#/components/schemas/ConstraintParameters"
                  description: "The constraint parameters, in JSON format. The syntax depends on the constraint type as follows: LAUNCH You are required to specify either the RoleArn or the LocalRoleName but can't use both. Specify the RoleArn property as follows: {\"RoleArn\" : \"arn:aws:iam::123456789012:role/LaunchRole\"} Specify the LocalRoleName property as follows: {\"LocalRoleName\": \"SCBasicLaunchRole\"} If you specify the LocalRoleName property, when an account uses the launch constraint, the IAM role with that name in the account will be used. This allows launch-role constraints to be account-agnostic so the administrator can create fewer resources per shared account. The given role name must exist in the account used to create the launch constraint and the account of the user who launches a product with this launch constraint. You cannot have both a LAUNCH and a STACKSET constraint. You also cannot have more than one LAUNCH constraint on a product and portfolio. NOTIFICATION Specify the NotificationArns property as follows: {\"NotificationArns\" : [\"arn:aws:sns:us-east-1:123456789012:Topic\"]} RESOURCE_UPDATE Specify the TagUpdatesOnProvisionedProduct property as follows: {\"Version\":\"2.0\",\"Properties\":{\"TagUpdateOnProvisionedProduct\":\"String\"}} The TagUpdatesOnProvisionedProduct property accepts a string value of ALLOWED or NOT_ALLOWED. STACKSET Specify the Parameters property as follows: {\"Version\": \"String\", \"Properties\": {\"AccountList\": [ \"String\" ], \"RegionList\": [ \"String\" ], \"AdminRole\": \"String\", \"ExecutionRole\": \"String\"}} You cannot have both a LAUNCH and a STACKSET constraint. You also cannot have more than one STACKSET constraint on a product and portfolio. Products with a STACKSET constraint will launch an CloudFormation stack set. TEMPLATE Specify the Rules property. For more information, see Template Constraint Rules."
                Type:
                  $ref: "#/components/schemas/ConstraintType"
                  description: The type of constraint. LAUNCH NOTIFICATION RESOURCE_UPDATE STACKSET TEMPLATE
                Description:
                  $ref: "#/components/schemas/ConstraintDescription"
                  description: The description of the constraint.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique identifier that you provide to ensure idempotency. If multiple requests differ only by the idempotency token, the same response is returned for each repeated request.
              required:
                - PortfolioId
                - ProductId
                - Parameters
                - Type
                - IdempotencyToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConstraintOutput"
  /CreatePortfolio:
    post:
      operationId: CreatePortfolio
      description: Creates a portfolio. A delegated admin is authorized to invoke this command.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.CreatePortfolio
            default: AWS242ServiceCatalogService.CreatePortfolio
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AcceptLanguage:
                  $ref: "#/components/schemas/AcceptLanguage"
                  description: The language code. jp - Japanese zh - Chinese
                DisplayName:
                  $ref: "#/components/schemas/PortfolioDisplayName"
                  description: The name to use for display purposes.
                Description:
                  $ref: "#/components/schemas/PortfolioDescription"
                  description: The description of the portfolio.
                ProviderName:
                  $ref: "#/components/schemas/ProviderName"
                  description: The name of the portfolio provider.
                Tags:
                  $ref: "#/components/schemas/AddTags"
                  description: One or more tags.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique identifier that you provide to ensure idempotency. If multiple requests differ only by the idempotency token, the same response is returned for each repeated request.
              required:
                - DisplayName
                - ProviderName
                - IdempotencyToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePortfolioOutput"
  /CreatePortfolioShare:
    post:
      operationId: CreatePortfolioShare
      description: Shares the specified portfolio with the specified account or organization node. Shares to an organization node can only be created by the management account of an organization or by a delegated administrator. You can share portfolios to an organization, an organizational unit, or a specific account. Note that if a delegated admin is de-registered, they can no longer create portfolio shares. AWSOrganizationsAccess must be enabled in order to create a portfolio share to an organization node. You can't share a shared resource, including portfolios that contain a shared product. If the portfolio share with the specified account or organization node already exists, this action will have no effect and will not return an error. To update an existing share, you must use the UpdatePortfolioShare API instead. When you associate a principal with portfolio, a potential privilege escalation path may occur when that portfolio is then shared with other accounts. For a user in a recipient account who is not an Service Catalog Admin, but still has the ability to create Principals (Users/Groups/Roles), that user could create a role that matches a principal name association for the portfolio. Although this user may not know which principal names are associated through Service Catalog, they may be able to guess the user. If this potential escalation path is a concern, then Service Catalog recommends using PrincipalType as IAM. With this configuration, the PrincipalARN must already exist in the recipient account before it can be associated.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.CreatePortfolioShare
            default: AWS242ServiceCatalogService.CreatePortfolioShare
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AcceptLanguage:
                  $ref: "#/components/schemas/AcceptLanguage"
                  description: The language code. jp - Japanese zh - Chinese
                PortfolioId:
                  $ref: "#/components/schemas/Id"
                  description: The portfolio identifier.
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The Amazon Web Services account ID. For example, 123456789012.
                OrganizationNode:
                  $ref: "#/components/schemas/OrganizationNode"
                  description: The organization node to whom you are going to share. When you pass OrganizationNode, it creates PortfolioShare for all of the Amazon Web Services accounts that are associated to the OrganizationNode. The output returns a PortfolioShareToken, which enables the administrator to monitor the status of the PortfolioShare creation process.
                ShareTagOptions:
                  $ref: "#/components/schemas/Boolean"
                  description: Enables or disables TagOptions sharing when creating the portfolio share. If this flag is not provided, TagOptions sharing is disabled.
                SharePrincipals:
                  $ref: "#/components/schemas/Boolean"
                  description: "This parameter is only supported for portfolios with an OrganizationalNode Type of ORGANIZATION or ORGANIZATIONAL_UNIT. Enables or disables Principal sharing when creating the portfolio share. If you do not provide this flag, principal sharing is disabled. When you enable Principal Name Sharing for a portfolio share, the share recipient account end users with a principal that matches any of the associated IAM patterns can provision products from the portfolio. Once shared, the share recipient can view associations of PrincipalType: IAM_PATTERN on their portfolio. You can create the principals in the recipient account before or after creating the share."
              required:
                - PortfolioId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePortfolioShareOutput"
  /CreateProduct:
    post:
      operationId: CreateProduct
      description: Creates a product. A delegated admin is authorized to invoke this command. The user or role that performs this operation must have the cloudformation:GetTemplate IAM policy permission. This policy permission is required when using the ImportFromPhysicalId template source in the information data section.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.CreateProduct
            default: AWS242ServiceCatalogService.CreateProduct
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AcceptLanguage:
                  $ref: "#/components/schemas/AcceptLanguage"
                  description: The language code. jp - Japanese zh - Chinese
                Name:
                  $ref: "#/components/schemas/ProductViewName"
                  description: The name of the product.
                Owner:
                  $ref: "#/components/schemas/ProductViewOwner"
                  description: The owner of the product.
                Description:
                  $ref: "#/components/schemas/ProductViewShortDescription"
                  description: The description of the product.
                Distributor:
                  $ref: "#/components/schemas/ProductViewOwner"
                  description: The distributor of the product.
                SupportDescription:
                  $ref: "#/components/schemas/SupportDescription"
                  description: The support information about the product.
                SupportEmail:
                  $ref: "#/components/schemas/SupportEmail"
                  description: The contact email for product support.
                SupportUrl:
                  $ref: "#/components/schemas/SupportUrl"
                  description: The contact URL for product support. ^https?:\/\// / is the pattern used to validate SupportUrl.
                ProductType:
                  $ref: "#/components/schemas/ProductType"
                  description: The type of product.
                Tags:
                  $ref: "#/components/schemas/AddTags"
                  description: One or more tags.
                ProvisioningArtifactParameters:
                  $ref: "#/components/schemas/ProvisioningArtifactProperties"
                  description: The configuration of the provisioning artifact.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique identifier that you provide to ensure idempotency. If multiple requests differ only by the idempotency token, the same response is returned for each repeated request.
                SourceConnection:
                  $ref: "#/components/schemas/SourceConnection"
                  description: Specifies connection details for the created product and syncs the product to the connection source artifact. This automatically manages the product's artifacts based on changes to the source. The SourceConnection parameter consists of the following sub-fields. Type ConnectionParamters
              required:
                - Name
                - Owner
                - ProductType
                - IdempotencyToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProductOutput"
  /CreateProvisionedProductPlan:
    post:
      operationId: CreateProvisionedProductPlan
      description: Creates a plan. A plan includes the list of resources to be created (when provisioning a new product) or modified (when updating a provisioned product) when the plan is executed. You can create one plan for each provisioned product. To create a plan for an existing provisioned product, the product status must be AVAILABLE or TAINTED. To view the resource changes in the change set, use DescribeProvisionedProductPlan. To create or modify the provisioned product, use ExecuteProvisionedProductPlan.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.CreateProvisionedProductPlan
            default: AWS242ServiceCatalogService.CreateProvisionedProductPlan
