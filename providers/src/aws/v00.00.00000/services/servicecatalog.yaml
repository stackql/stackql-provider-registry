                  $ref: "#/components/schemas/SupportEmail"
                  description: The updated support email for the product.
                SupportUrl:
                  $ref: "#/components/schemas/SupportUrl"
                  description: The updated support URL for the product.
                AddTags:
                  $ref: "#/components/schemas/AddTags"
                  description: The tags to add to the product.
                RemoveTags:
                  $ref: "#/components/schemas/TagKeys"
                  description: The tags to remove from the product.
                SourceConnection:
                  $ref: "#/components/schemas/SourceConnection"
                  description: Specifies connection details for the updated product and syncs the product to the connection source artifact. This automatically manages the product's artifacts based on changes to the source. The SourceConnection parameter consists of the following sub-fields. Type ConnectionParamters
              required:
                - Id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProductOutput"
  /UpdateProvisionedProduct:
    post:
      operationId: UpdateProvisionedProduct
      description: Requests updates to the configuration of the specified provisioned product. If there are tags associated with the object, they cannot be updated or added. Depending on the specific updates requested, this operation can update with no interruption, with some interruption, or replace the provisioned product entirely. You can check the status of this request using DescribeRecord.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.UpdateProvisionedProduct
            default: AWS242ServiceCatalogService.UpdateProvisionedProduct
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AcceptLanguage:
                  $ref: "#/components/schemas/AcceptLanguage"
                  description: The language code. jp - Japanese zh - Chinese
                ProvisionedProductName:
                  $ref: "#/components/schemas/ProvisionedProductNameOrArn"
                  description: The name of the provisioned product. You cannot specify both ProvisionedProductName and ProvisionedProductId.
                ProvisionedProductId:
                  $ref: "#/components/schemas/Id"
                  description: The identifier of the provisioned product. You must provide the name or ID, but not both.
                ProductId:
                  $ref: "#/components/schemas/Id"
                  description: The identifier of the product. You must provide the name or ID, but not both.
                ProductName:
                  $ref: "#/components/schemas/ProductViewName"
                  description: The name of the product. You must provide the name or ID, but not both.
                ProvisioningArtifactId:
                  $ref: "#/components/schemas/Id"
                  description: The identifier of the provisioning artifact.
                ProvisioningArtifactName:
                  $ref: "#/components/schemas/ProvisioningArtifactName"
                  description: The name of the provisioning artifact. You must provide the name or ID, but not both.
                PathId:
                  $ref: "#/components/schemas/Id"
                  description: The path identifier. This value is optional if the product has a default path, and required if the product has more than one path. You must provide the name or ID, but not both.
                PathName:
                  $ref: "#/components/schemas/PortfolioDisplayName"
                  description: The name of the path. You must provide the name or ID, but not both.
                ProvisioningParameters:
                  $ref: "#/components/schemas/UpdateProvisioningParameters"
                  description: The new parameters.
                ProvisioningPreferences:
                  $ref: "#/components/schemas/UpdateProvisioningPreferences"
                  description: An object that contains information about the provisioning preferences for a stack set.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: One or more tags. Requires the product to have RESOURCE_UPDATE constraint with TagUpdatesOnProvisionedProduct set to ALLOWED to allow tag updates.
                UpdateToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: The idempotency token that uniquely identifies the provisioning update request.
              required:
                - UpdateToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProvisionedProductOutput"
  /UpdateProvisionedProductProperties:
    post:
      operationId: UpdateProvisionedProductProperties
      description: Requests updates to the properties of the specified provisioned product.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.UpdateProvisionedProductProperties
            default: AWS242ServiceCatalogService.UpdateProvisionedProductProperties
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AcceptLanguage:
                  $ref: "#/components/schemas/AcceptLanguage"
                  description: The language code. jp - Japanese zh - Chinese
                ProvisionedProductId:
                  $ref: "#/components/schemas/Id"
                  description: The identifier of the provisioned product.
                ProvisionedProductProperties:
                  $ref: "#/components/schemas/ProvisionedProductProperties"
                  description: A map that contains the provisioned product properties to be updated. The LAUNCH_ROLE key accepts role ARNs. This key allows an administrator to call UpdateProvisionedProductProperties to update the launch role that is associated with a provisioned product. This role is used when an end user calls a provisioning operation such as UpdateProvisionedProduct, TerminateProvisionedProduct, or ExecuteProvisionedProductServiceAction. Only a role ARN is valid. A user ARN is invalid. The OWNER key accepts user ARNs, IAM role ARNs, and STS assumed-role ARNs. The owner is the user that has permission to see, update, terminate, and execute service actions in the provisioned product. The administrator can change the owner of a provisioned product to another IAM or STS entity within the same account. Both end user owners and administrators can see ownership history of the provisioned product using the ListRecordHistory API. The new owner can describe all past records for the provisioned product using the DescribeRecord API. The previous owner can no longer use DescribeRecord, but can still see the product's history from when he was an owner using ListRecordHistory. If a provisioned product ownership is assigned to an end user, they can see and perform any action through the API or Service Catalog console such as update, terminate, and execute service actions. If an end user provisions a product and the owner is updated to someone else, they will no longer be able to see or perform any actions through API or the Service Catalog console on that provisioned product.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: The idempotency token that uniquely identifies the provisioning product update request.
              required:
                - ProvisionedProductId
                - ProvisionedProductProperties
                - IdempotencyToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProvisionedProductPropertiesOutput"
  /UpdateProvisioningArtifact:
    post:
      operationId: UpdateProvisioningArtifact
      description: Updates the specified provisioning artifact (also known as a version) for the specified product. You cannot update a provisioning artifact for a product that was shared with you.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.UpdateProvisioningArtifact
            default: AWS242ServiceCatalogService.UpdateProvisioningArtifact
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AcceptLanguage:
                  $ref: "#/components/schemas/AcceptLanguage"
                  description: The language code. jp - Japanese zh - Chinese
                ProductId:
                  $ref: "#/components/schemas/Id"
                  description: The product identifier.
                ProvisioningArtifactId:
                  $ref: "#/components/schemas/Id"
                  description: The identifier of the provisioning artifact.
                Name:
                  $ref: "#/components/schemas/ProvisioningArtifactName"
                  description: The updated name of the provisioning artifact.
                Description:
                  $ref: "#/components/schemas/ProvisioningArtifactDescription"
                  description: The updated description of the provisioning artifact.
                Active:
                  $ref: "#/components/schemas/ProvisioningArtifactActive"
                  description: Indicates whether the product version is active. Inactive provisioning artifacts are invisible to end users. End users cannot launch or update a provisioned product from an inactive provisioning artifact.
                Guidance:
                  $ref: "#/components/schemas/ProvisioningArtifactGuidance"
                  description: Information set by the administrator to provide guidance to end users about which provisioning artifacts to use. The DEFAULT value indicates that the product version is active. The administrator can set the guidance to DEPRECATED to inform users that the product version is deprecated. Users are able to make updates to a provisioned product of a deprecated version but cannot launch new provisioned products using a deprecated version.
              required:
                - ProductId
                - ProvisioningArtifactId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProvisioningArtifactOutput"
  /UpdateServiceAction:
    post:
      operationId: UpdateServiceAction
      description: Updates a self-service action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.UpdateServiceAction
            default: AWS242ServiceCatalogService.UpdateServiceAction
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/Id"
                  description: The self-service action identifier.
                Name:
                  $ref: "#/components/schemas/ServiceActionName"
                  description: The self-service action name.
                Definition:
                  $ref: "#/components/schemas/ServiceActionDefinitionMap"
                  description: A map that defines the self-service action.
                Description:
                  $ref: "#/components/schemas/ServiceActionDescription"
                  description: The self-service action description.
                AcceptLanguage:
                  $ref: "#/components/schemas/AcceptLanguage"
                  description: The language code. jp - Japanese zh - Chinese
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateServiceActionOutput"
  /UpdateTagOption:
    post:
      operationId: UpdateTagOption
      description: Updates the specified TagOption.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWS242ServiceCatalogService.UpdateTagOption
            default: AWS242ServiceCatalogService.UpdateTagOption
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/TagOptionId"
                  description: The TagOption identifier.
                Value:
                  $ref: "#/components/schemas/TagOptionValue"
                  description: The updated value.
                Active:
                  $ref: "#/components/schemas/TagOptionActive"
                  description: The updated active state.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTagOptionOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AcceptLanguage:
      type: string
      maxLength: 100
    Id:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[a-zA-Z0-9_\-]*
    PortfolioShareType:
      type: string
      enum:
        - IMPORTED
        - AWS_SERVICECATALOG
        - AWS_ORGANIZATIONS
    AcceptPortfolioShareOutput:
      type: object
    BudgetName:
      type: string
      minLength: 1
      maxLength: 100
    AssociateBudgetWithResourceOutput:
      type: object
    PrincipalARN:
      type: string
      minLength: 1
      maxLength: 1000
    PrincipalType:
      type: string
      enum:
        - IAM
        - IAM_PATTERN
    AssociatePrincipalWithPortfolioOutput:
      type: object
    AssociateProductWithPortfolioOutput:
      type: object
    IdempotencyToken:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*"
    AssociateServiceActionWithProvisioningArtifactOutput:
      type: object
    ResourceId:
      type: string
    TagOptionId:
      type: string
      minLength: 1
      maxLength: 100
    AssociateTagOptionWithResourceOutput:
      type: object
    ServiceActionAssociations:
      type: array
      items:
        $ref: "#/components/schemas/ServiceActionAssociation"
    ServiceActionAssociation:
      description: A self-service action association consisting of the Action ID, the Product ID, and the Provisioning Artifact ID.
      type: object
      properties:
        ServiceActionId:
          $ref: "#/components/schemas/Id"
          description: The self-service action identifier. For example, act-fs7abcd89wxyz.
        ProductId:
          $ref: "#/components/schemas/Id"
          description: The product identifier. For example, prod-abcdzk7xy33qa.
        ProvisioningArtifactId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the provisioning artifact. For example, pa-4abcdjnxjj6ne.
      required:
        - ServiceActionId
        - ProductId
        - ProvisioningArtifactId
    BatchAssociateServiceActionWithProvisioningArtifactOutput:
      type: object
      properties:
        FailedServiceActionAssociations:
          $ref: "#/components/schemas/FailedServiceActionAssociations"
          description: An object that contains a list of errors, along with information to help you identify the self-service action.
    FailedServiceActionAssociations:
      type: array
      items:
        $ref: "#/components/schemas/FailedServiceActionAssociation"
    FailedServiceActionAssociation:
      description: An object containing information about the error, along with identifying information about the self-service action and its associations.
      type: object
      properties:
        ServiceActionId:
          $ref: "#/components/schemas/Id"
          description: The self-service action identifier. For example, act-fs7abcd89wxyz.
        ProductId:
          $ref: "#/components/schemas/Id"
          description: The product identifier. For example, prod-abcdzk7xy33qa.
        ProvisioningArtifactId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the provisioning artifact. For example, pa-4abcdjnxjj6ne.
        ErrorCode:
          $ref: "#/components/schemas/ServiceActionAssociationErrorCode"
          description: The error code. Valid values are listed below.
        ErrorMessage:
          $ref: "#/components/schemas/ServiceActionAssociationErrorMessage"
          description: A text description of the error.
    ServiceActionAssociationErrorCode:
      type: string
      enum:
        - DUPLICATE_RESOURCE
        - INTERNAL_FAILURE
        - LIMIT_EXCEEDED
        - RESOURCE_NOT_FOUND
        - THROTTLING
        - INVALID_PARAMETER
    ServiceActionAssociationErrorMessage:
      type: string
      minLength: 1
      maxLength: 1024
    BatchDisassociateServiceActionFromProvisioningArtifactOutput:
      type: object
      properties:
        FailedServiceActionAssociations:
          $ref: "#/components/schemas/FailedServiceActionAssociations"
          description: An object that contains a list of errors, along with information to help you identify the self-service action.
    ProductArn:
      type: string
      minLength: 1
      maxLength: 1224
      pattern: arn:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[^/].{0,1023}
    ProductViewName:
      type: string
      maxLength: 8191
    SourceProvisioningArtifactProperties:
      type: array
      items:
        $ref: "#/components/schemas/SourceProvisioningArtifactPropertiesMap"
    SourceProvisioningArtifactPropertiesMap:
      type: object
      properties: {}
    CopyOptions:
      type: array
      items:
        $ref: "#/components/schemas/CopyOption"
    CopyOption:
      type: string
      enum:
        - CopyTags
    CopyProductOutput:
      type: object
      properties:
        CopyProductToken:
          $ref: "#/components/schemas/Id"
          description: The token to use to track the progress of the operation.
    ConstraintParameters:
      type: string
    ConstraintType:
      type: string
      minLength: 1
      maxLength: 1024
    ConstraintDescription:
      type: string
      maxLength: 2000
    CreateConstraintOutput:
      type: object
      properties:
        ConstraintDetail:
          $ref: "#/components/schemas/ConstraintDetail"
          description: Information about the constraint.
        ConstraintParameters:
          $ref: "#/components/schemas/ConstraintParameters"
          description: The constraint parameters.
        Status:
          $ref: "#/components/schemas/Status"
          description: The status of the current request.
    ConstraintDetail:
      description: Information about a constraint.
      type: object
      properties:
        ConstraintId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the constraint.
        Type:
          $ref: "#/components/schemas/ConstraintType"
          description: The type of constraint. LAUNCH NOTIFICATION STACKSET TEMPLATE
        Description:
          $ref: "#/components/schemas/ConstraintDescription"
          description: The description of the constraint.
        Owner:
          $ref: "#/components/schemas/AccountId"
          description: The owner of the constraint.
        ProductId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the product the constraint applies to. Note that a constraint applies to a specific instance of a product within a certain portfolio.
        PortfolioId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the portfolio the product resides in. The constraint applies only to the instance of the product that lives within this portfolio.
    AccountId:
      type: string
      pattern: ^[0-9]{12}$
    Status:
      type: string
      enum:
        - AVAILABLE
        - CREATING
        - FAILED
    PortfolioDisplayName:
      type: string
      minLength: 1
      maxLength: 100
    PortfolioDescription:
      type: string
      maxLength: 2000
    ProviderName:
      type: string
      minLength: 1
      maxLength: 50
    AddTags:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Information about a tag. A tag is a key-value pair. Tags are propagated to the resources created when provisioning a product.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The tag key.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value for this key.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValue:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    CreatePortfolioOutput:
      type: object
      properties:
        PortfolioDetail:
          $ref: "#/components/schemas/PortfolioDetail"
          description: Information about the portfolio.
        Tags:
          $ref: "#/components/schemas/Tags"
          description: Information about the tags associated with the portfolio.
    PortfolioDetail:
      description: Information about a portfolio.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/Id"
          description: The portfolio identifier.
        ARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The ARN assigned to the portfolio.
        DisplayName:
          $ref: "#/components/schemas/PortfolioDisplayName"
          description: The name to use for display purposes.
        Description:
          $ref: "#/components/schemas/PortfolioDescription"
          description: The description of the portfolio.
        CreatedTime:
          $ref: "#/components/schemas/CreationTime"
          description: The UTC time stamp of the creation time.
        ProviderName:
          $ref: "#/components/schemas/ProviderName"
          description: The name of the portfolio provider.
    ResourceARN:
      type: string
      minLength: 1
      maxLength: 150
    CreationTime:
      type: string
      format: date-time
    Tags:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    OrganizationNode:
      description: Information about the organization node.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/OrganizationNodeType"
          description: The organization node type.
        Value:
          $ref: "#/components/schemas/OrganizationNodeValue"
          description: The identifier of the organization node.
    OrganizationNodeType:
      type: string
      enum:
        - ORGANIZATION
        - ORGANIZATIONAL_UNIT
        - ACCOUNT
    OrganizationNodeValue:
      type: string
      pattern: (^[0-9]{12}$)|(^arn:aws:organizations::\d{12}:organization\/o-[a-z0-9]{10,32})|(^o-[a-z0-9]{10,32}$)|(^arn:aws:organizations::\d{12}:ou\/o-[a-z0-9]{10,32}\/ou-[0-9a-z]{4,32}-[0-9a-z]{8,32}$)|(^ou-[0-9a-z]{4,32}-[a-z0-9]{8,32}$)
    Boolean:
      type: boolean
    CreatePortfolioShareOutput:
      type: object
      properties:
        PortfolioShareToken:
          $ref: "#/components/schemas/Id"
          description: The portfolio shares a unique identifier that only returns if the portfolio is shared to an organization node.
    ProductViewOwner:
      type: string
      maxLength: 8191
    ProductViewShortDescription:
      type: string
      maxLength: 8191
    SupportDescription:
      type: string
      maxLength: 8191
    SupportEmail:
      type: string
      maxLength: 254
    SupportUrl:
      type: string
      maxLength: 2083
    ProductType:
      type: string
      enum:
        - CLOUD_FORMATION_TEMPLATE
        - MARKETPLACE
        - TERRAFORM_OPEN_SOURCE
        - TERRAFORM_CLOUD
        - EXTERNAL
      maxLength: 8191
    ProvisioningArtifactProperties:
      description: Information about a provisioning artifact (also known as a version) for a product.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ProvisioningArtifactName"
          description: The name of the provisioning artifact (for example, v1 v2beta). No spaces are allowed.
        Description:
          $ref: "#/components/schemas/ProvisioningArtifactDescription"
          description: The description of the provisioning artifact, including how it differs from the previous provisioning artifact.
        Info:
          type: object
          properties: {}
          description: 'Specify the template source with one of the following options, but not both. Keys accepted: [ LoadTemplateFromURL, ImportFromPhysicalId ] The URL of the CloudFormation template in Amazon S3 or GitHub in JSON format. Specify the URL in JSON format as follows: "LoadTemplateFromURL": "https://s3.amazonaws.com/cf-templates-ozkq9d3hgiq2-us-east-1/..." ImportFromPhysicalId: The physical id of the resource that contains the template. Currently only supports CloudFormation stack arn. Specify the physical id in JSON format as follows: ImportFromPhysicalId: “arn:aws:cloudformation:[us-east-1]:[accountId]:stack/[StackName]/[resourceId]'
        Type:
          $ref: "#/components/schemas/ProvisioningArtifactType"
          description: The type of provisioning artifact. CLOUD_FORMATION_TEMPLATE - CloudFormation template TERRAFORM_OPEN_SOURCE - Terraform Open Source configuration file TERRAFORM_CLOUD - Terraform Cloud configuration file EXTERNAL - External configuration file
        DisableTemplateValidation:
          $ref: "#/components/schemas/DisableTemplateValidation"
          description: If set to true, Service Catalog stops validating the specified provisioning artifact even if it is invalid. Service Catalog does not support template validation for the TERRAFORM_OS product type.
    ProvisioningArtifactName:
      type: string
      maxLength: 8192
    ProvisioningArtifactDescription:
      type: string
      maxLength: 8192
    ProvisioningArtifactType:
      type: string
      enum:
        - CLOUD_FORMATION_TEMPLATE
        - MARKETPLACE_AMI
        - MARKETPLACE_CAR
        - TERRAFORM_OPEN_SOURCE
        - TERRAFORM_CLOUD
        - EXTERNAL
    DisableTemplateValidation:
      type: boolean
    SourceConnection:
      description: A top level ProductViewDetail response containing details about the product’s connection. Service Catalog returns this field for the CreateProduct, UpdateProduct, DescribeProductAsAdmin, and SearchProductAsAdmin APIs. This response contains the same fields as the ConnectionParameters request, with the addition of the LastSync response.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/SourceType"
          description: The only supported SourceConnection type is Codestar.
        ConnectionParameters:
          $ref: "#/components/schemas/SourceConnectionParameters"
          description: The connection details based on the connection Type.
      required:
        - ConnectionParameters
    SourceType:
      type: string
      enum:
        - CODESTAR
    SourceConnectionParameters:
      description: Provides connection details.
      type: object
      properties:
        CodeStar:
          $ref: "#/components/schemas/CodeStarParameters"
          description: Provides ConnectionType details.
    CodeStarParameters:
      description: The subtype containing details about the Codestar connection Type.
      type: object
      properties:
        ConnectionArn:
          $ref: "#/components/schemas/CodeStarConnectionArn"
          description: The CodeStar ARN, which is the connection between Service Catalog and the external repository.
        Repository:
          $ref: "#/components/schemas/Repository"
          description: The specific repository where the product’s artifact-to-be-synced resides, formatted as "Account/Repo."
        Branch:
          $ref: "#/components/schemas/RepositoryBranch"
          description: The specific branch where the artifact resides.
        ArtifactPath:
          $ref: "#/components/schemas/RepositoryArtifactPath"
          description: The absolute path wehre the artifact resides within the repo and branch, formatted as "folder/file.json."
      required:
        - ConnectionArn
        - Repository
        - Branch
        - ArtifactPath
    CodeStarConnectionArn:
      type: string
      minLength: 1
      maxLength: 1224
      pattern: arn:[a-z0-9][-.a-z0-9]{0,62}:codestar-connections:([a-z0-9][-.a-z0-9]{0,62})?:([a-z0-9][-.a-z0-9]{0,62})?:[^/].{0,1023}$
    Repository:
      type: string
      minLength: 1
      maxLength: 100
    RepositoryBranch:
