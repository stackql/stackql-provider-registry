                  description: The method the specified attributes will update the existing attributes on the vehicle. UseOverwite to replace the vehicle attributes with the specified attributes. Or use Merge to combine all attributes. This is required if attributes are present in the input.
                stateTemplatesToAdd:
                  $ref: "#/components/schemas/StateTemplateAssociations"
                  description: Associate state templates with the vehicle.
                stateTemplatesToRemove:
                  $ref: "#/components/schemas/StateTemplateAssociationIdentifiers"
                  description: Remove state templates from the vehicle.
                stateTemplatesToUpdate:
                  $ref: "#/components/schemas/StateTemplateAssociations"
                  description: Change the stateTemplateUpdateStrategy of state templates already associated with the vehicle.
              required:
                - vehicleName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateVehicleResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    vehicleName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z\\d\\-_:]+"
    fleetId:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9:_-]+"
    AssociateVehicleFleetResponse:
      type: object
    createVehicleRequestItems:
      type: array
      items:
        $ref: "#/components/schemas/CreateVehicleRequestItem"
    CreateVehicleRequestItem:
      description: Information about the vehicle to create.
      type: object
      properties:
        vehicleName:
          $ref: "#/components/schemas/vehicleName"
          description: The unique ID of the vehicle to create.
        modelManifestArn:
          $ref: "#/components/schemas/arn"
          description: The ARN of the vehicle model (model manifest) to create the vehicle from.
        decoderManifestArn:
          $ref: "#/components/schemas/arn"
          description: The Amazon Resource Name (ARN) of a decoder manifest associated with the vehicle to create.
        attributes:
          type: object
          properties: {}
          description: 'Static information about a vehicle in a key-value pair. For example: "engine Type" : "v6"'
        associationBehavior:
          $ref: "#/components/schemas/VehicleAssociationBehavior"
          description: An option to create a new Amazon Web Services IoT thing when creating a vehicle, or to validate an existing thing as a vehicle.
        tags:
          $ref: "#/components/schemas/TagList"
          description: Metadata which can be used to manage the vehicle.
        stateTemplates:
          $ref: "#/components/schemas/StateTemplateAssociations"
          description: Associate state templates to track the state of the vehicle. State templates determine which signal updates the vehicle sends to the cloud.
      required:
        - vehicleName
        - modelManifestArn
        - decoderManifestArn
    arn:
      type: string
    VehicleAssociationBehavior:
      type: string
      enum:
        - CreateIotThing
        - ValidateIotThingExists
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A set of key/value pairs that are used to manage the resource.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The tag's key.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The tag's value.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    StateTemplateAssociations:
      type: array
      items:
        $ref: "#/components/schemas/StateTemplateAssociation"
    StateTemplateAssociation:
      description: The state template associated with a vehicle. State templates contain state properties, which are signals that belong to a signal catalog that is synchronized between the Amazon Web Services IoT FleetWise Edge and the Amazon Web Services Cloud. Access to certain Amazon Web Services IoT FleetWise features is currently gated. For more information, see Amazon Web Services Region and feature availability in the Amazon Web Services IoT FleetWise Developer Guide.
      type: object
      properties:
        identifier:
          $ref: "#/components/schemas/ResourceIdentifier"
          description: The unique ID of the state template.
        stateTemplateUpdateStrategy:
          $ref: "#/components/schemas/StateTemplateUpdateStrategy"
      required:
        - identifier
        - stateTemplateUpdateStrategy
    ResourceIdentifier:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z\\d\\-_:]+"
    StateTemplateUpdateStrategy:
      description: The update strategy for the state template. Vehicles associated with the state template can stream telemetry data with either an onChange or periodic update strategy. Access to certain Amazon Web Services IoT FleetWise features is currently gated. For more information, see Amazon Web Services Region and feature availability in the Amazon Web Services IoT FleetWise Developer Guide.
      type: object
      properties:
        periodic:
          $ref: "#/components/schemas/PeriodicStateTemplateUpdateStrategy"
        onChange:
          $ref: "#/components/schemas/OnChangeStateTemplateUpdateStrategy"
    PeriodicStateTemplateUpdateStrategy:
      description: Vehicles associated with the state template will stream telemetry data during a specified time period.
      type: object
      properties:
        stateTemplateUpdateRate:
          $ref: "#/components/schemas/TimePeriod"
      required:
        - stateTemplateUpdateRate
    TimePeriod:
      description: The length of time between state template updates.
      type: object
      properties:
        unit:
          $ref: "#/components/schemas/TimeUnit"
          description: A unit of time.
        value:
          $ref: "#/components/schemas/positiveInteger"
          description: A number of time units.
      required:
        - unit
        - value
    TimeUnit:
      type: string
      enum:
        - MILLISECOND
        - SECOND
        - MINUTE
        - HOUR
    positiveInteger:
      type: integer
      minimum: 1
      maximum: 2147483647
    OnChangeStateTemplateUpdateStrategy:
      description: Vehicles associated with the state template will stream telemetry data when there is a change.
      type: object
    BatchCreateVehicleResponse:
      type: object
      properties:
        vehicles:
          $ref: "#/components/schemas/createVehicleResponses"
          description: A list of information about a batch of created vehicles. For more information, see the API data type.
        errors:
          $ref: "#/components/schemas/createVehicleErrors"
          description: A list of information about creation errors, or an empty list if there aren't any errors.
    createVehicleResponses:
      type: array
      items:
        $ref: "#/components/schemas/CreateVehicleResponseItem"
    CreateVehicleResponseItem:
      description: Information about a created vehicle.
      type: object
      properties:
        vehicleName:
          $ref: "#/components/schemas/vehicleName"
          description: The unique ID of the vehicle to create.
        arn:
          $ref: "#/components/schemas/arn"
          description: The ARN of the created vehicle.
        thingArn:
          $ref: "#/components/schemas/arn"
          description: The ARN of a created or validated Amazon Web Services IoT thing.
    createVehicleErrors:
      type: array
      items:
        $ref: "#/components/schemas/CreateVehicleError"
    CreateVehicleError:
      description: An HTTP error resulting from creating a vehicle.
      type: object
      properties:
        vehicleName:
          $ref: "#/components/schemas/vehicleName"
          description: The ID of the vehicle with the error.
        code:
          $ref: "#/components/schemas/string"
          description: An HTTP error code.
        message:
          $ref: "#/components/schemas/string"
          description: A description of the HTTP error.
    string:
      type: string
    updateVehicleRequestItems:
      type: array
      items:
        $ref: "#/components/schemas/UpdateVehicleRequestItem"
    UpdateVehicleRequestItem:
      description: Information about the vehicle to update. Access to certain Amazon Web Services IoT FleetWise features is currently gated. For more information, see Amazon Web Services Region and feature availability in the Amazon Web Services IoT FleetWise Developer Guide.
      type: object
      properties:
        vehicleName:
          $ref: "#/components/schemas/vehicleName"
          description: The unique ID of the vehicle to update.
        modelManifestArn:
          $ref: "#/components/schemas/arn"
          description: The ARN of the vehicle model (model manifest) associated with the vehicle to update.
        decoderManifestArn:
          $ref: "#/components/schemas/arn"
          description: The ARN of the signal decoder manifest associated with the vehicle to update.
        attributes:
          type: object
          properties: {}
          description: 'Static information about a vehicle in a key-value pair. For example: "engineType" : "1.3 L R2"'
        attributeUpdateMode:
          $ref: "#/components/schemas/UpdateMode"
          description: The method the specified attributes will update the existing attributes on the vehicle. UseOverwite to replace the vehicle attributes with the specified attributes. Or use Merge to combine all attributes. This is required if attributes are present in the input.
        stateTemplatesToAdd:
          $ref: "#/components/schemas/StateTemplateAssociations"
          description: Associate additional state templates to track the state of the vehicle. State templates determine which signal updates the vehicle sends to the cloud.
        stateTemplatesToRemove:
          $ref: "#/components/schemas/StateTemplateAssociationIdentifiers"
          description: Remove existing state template associations from the vehicle.
        stateTemplatesToUpdate:
          $ref: "#/components/schemas/StateTemplateAssociations"
          description: Change the stateTemplateUpdateStrategy of state templates already associated with the vehicle.
      required:
        - vehicleName
    UpdateMode:
      type: string
      enum:
        - Overwrite
        - Merge
    StateTemplateAssociationIdentifiers:
      type: array
      items:
        $ref: "#/components/schemas/ResourceIdentifier"
    BatchUpdateVehicleResponse:
      type: object
      properties:
        vehicles:
          $ref: "#/components/schemas/updateVehicleResponseItems"
          description: A list of information about the batch of updated vehicles. This list contains only unique IDs for the vehicles that were updated.
        errors:
          $ref: "#/components/schemas/updateVehicleErrors"
          description: A list of information about errors returned while updating a batch of vehicles, or, if there aren't any errors, an empty list.
    updateVehicleResponseItems:
      type: array
      items:
        $ref: "#/components/schemas/UpdateVehicleResponseItem"
    UpdateVehicleResponseItem:
      description: Information about the updated vehicle.
      type: object
      properties:
        vehicleName:
          $ref: "#/components/schemas/vehicleName"
          description: The unique ID of the updated vehicle.
        arn:
          $ref: "#/components/schemas/arn"
          description: The Amazon Resource Name (ARN) of the updated vehicle.
    updateVehicleErrors:
      type: array
      items:
        $ref: "#/components/schemas/UpdateVehicleError"
    UpdateVehicleError:
      description: An HTTP error resulting from updating the description for a vehicle.
      type: object
      properties:
        vehicleName:
          $ref: "#/components/schemas/vehicleName"
          description: The ID of the vehicle with the error.
        code:
          $ref: "#/components/schemas/number"
          description: The relevant HTTP error code (400+).
        message:
          $ref: "#/components/schemas/string"
          description: A message associated with the error.
    number:
      type: integer
    campaignName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z\\d\\-_:]+"
    description:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[^\\u0000-\\u001F\\u007F]+"
    timestamp:
      type: string
      format: date-time
    uint32:
      type: integer
      format: int64
      minimum: 0
      maximum: 4294967295
    DiagnosticsMode:
      type: string
      enum:
        - "OFF"
        - SEND_ACTIVE_DTCS
    SpoolingMode:
      type: string
      enum:
        - "OFF"
        - TO_DISK
    Compression:
      type: string
      enum:
        - "OFF"
        - SNAPPY
    priority:
      type: integer
      minimum: 0
    SignalInformationList:
      type: array
      items:
        $ref: "#/components/schemas/SignalInformation"
    SignalInformation:
      description: Information about a signal.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/wildcardSignalName"
          description: The name of the signal.
        maxSampleCount:
          $ref: "#/components/schemas/maxSampleCount"
          description: The maximum number of samples to collect.
        minimumSamplingIntervalMs:
          $ref: "#/components/schemas/uint32"
          description: The minimum duration of time (in milliseconds) between two triggering events to collect data. If a signal changes often, you might want to collect data at a slower rate.
        dataPartitionId:
          $ref: "#/components/schemas/DataPartitionId"
          description: The ID of the data partition this signal is associated with. The ID must match one of the IDs provided in dataPartitions. This is accomplished either by specifying a particular data partition ID or by using default for an established default partition. You can establish a default partition in the DataPartition data type. If you upload a signal as a condition for a campaign's data partition, the same signal must be included in signalsToCollect. Access to certain Amazon Web Services IoT FleetWise features is currently gated. For more information, see Amazon Web Services Region and feature availability in the Amazon Web Services IoT FleetWise Developer Guide.
      required:
        - name
    wildcardSignalName:
      type: string
      minLength: 1
      maxLength: 150
      pattern: "[\\w|*|-]+(\\.[\\w|*|-]+)*"
    maxSampleCount:
      type: integer
      format: int64
      minimum: 1
      maximum: 4294967295
    DataPartitionId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9]+"
    CollectionScheme:
      description: Specifies what data to collect and how often or when to collect it.
      type: object
      properties:
        timeBasedCollectionScheme:
          $ref: "#/components/schemas/TimeBasedCollectionScheme"
          description: Information about a collection scheme that uses a time period to decide how often to collect data.
        conditionBasedCollectionScheme:
          $ref: "#/components/schemas/ConditionBasedCollectionScheme"
          description: Information about a collection scheme that uses a simple logical expression to recognize what data to collect.
    TimeBasedCollectionScheme:
      description: Information about a collection scheme that uses a time period to decide how often to collect data.
      type: object
      properties:
        periodMs:
          $ref: "#/components/schemas/collectionPeriodMs"
          description: The time period (in milliseconds) to decide how often to collect data. For example, if the time period is 60000, the Edge Agent software collects data once every minute.
      required:
        - periodMs
    collectionPeriodMs:
      type: integer
      format: int64
      minimum: 10000
      maximum: 86400000
    ConditionBasedCollectionScheme:
      description: Information about a collection scheme that uses a simple logical expression to recognize what data to collect.
      type: object
      properties:
        expression:
          $ref: "#/components/schemas/eventExpression"
          description: The logical expression used to recognize what data to collect. For example, $variable.`Vehicle.OutsideAirTemperature` >= 105.0.
        minimumTriggerIntervalMs:
          $ref: "#/components/schemas/uint32"
          description: The minimum duration of time between two triggering events to collect data, in milliseconds. If a signal changes often, you might want to collect data at a slower rate.
        triggerMode:
          $ref: "#/components/schemas/TriggerMode"
          description: Whether to collect data for all triggering events (ALWAYS). Specify (RISING_EDGE), or specify only when the condition first evaluates to false. For example, triggering on "AirbagDeployed"; Users aren't interested on triggering when the airbag is already exploded; they only care about the change from not deployed => deployed.
        conditionLanguageVersion:
          $ref: "#/components/schemas/languageVersion"
          description: Specifies the version of the conditional expression language.
      required:
        - expression
    eventExpression:
      type: string
      minLength: 1
      maxLength: 2048
    TriggerMode:
      type: string
      enum:
        - ALWAYS
        - RISING_EDGE
    languageVersion:
      type: integer
      minimum: 1
      maximum: 1
    DataExtraDimensionNodePathList:
      type: array
      items:
        $ref: "#/components/schemas/NodePath"
    NodePath:
      type: string
      minLength: 1
      maxLength: 150
      pattern: "[a-zA-Z0-9_.]+"
    DataDestinationConfigs:
      type: array
      items:
        $ref: "#/components/schemas/DataDestinationConfig"
    DataDestinationConfig:
      description: The destination where the campaign sends data. You can send data to an MQTT topic, or store it in Amazon S3 or Amazon Timestream.
      type: object
      properties:
        s3Config:
          $ref: "#/components/schemas/S3Config"
          description: The Amazon S3 bucket where the Amazon Web Services IoT FleetWise campaign sends data.
        timestreamConfig:
          $ref: "#/components/schemas/TimestreamConfig"
          description: The Amazon Timestream table where the campaign sends data.
        mqttTopicConfig:
          $ref: "#/components/schemas/MqttTopicConfig"
          description: The MQTT topic to which the Amazon Web Services IoT FleetWise campaign routes data. Access to certain Amazon Web Services IoT FleetWise features is currently gated. For more information, see Amazon Web Services Region and feature availability in the Amazon Web Services IoT FleetWise Developer Guide.
    S3Config:
      description: The Amazon S3 bucket where the Amazon Web Services IoT FleetWise campaign sends data. Amazon S3 is an object storage service that stores data as objects within buckets. For more information, see Creating, configuring, and working with Amazon S3 buckets in the Amazon Simple Storage Service User Guide.
      type: object
      properties:
        bucketArn:
          $ref: "#/components/schemas/S3BucketArn"
          description: The Amazon Resource Name (ARN) of the Amazon S3 bucket.
        dataFormat:
          $ref: "#/components/schemas/DataFormat"
          description: Specify the format that files are saved in the Amazon S3 bucket. You can save files in an Apache Parquet or JSON format. Parquet - Store data in a columnar storage file format. Parquet is optimal for fast data retrieval and can reduce costs. This option is selected by default. JSON - Store data in a standard text-based JSON file format.
        storageCompressionFormat:
          $ref: "#/components/schemas/StorageCompressionFormat"
          description: By default, stored data is compressed as a .gzip file. Compressed files have a reduced file size, which can optimize the cost of data storage.
        prefix:
          $ref: "#/components/schemas/Prefix"
          description: Enter an S3 bucket prefix. The prefix is the string of characters after the bucket name and before the object name. You can use the prefix to organize data stored in Amazon S3 buckets. For more information, see Organizing objects using prefixes in the Amazon Simple Storage Service User Guide. By default, Amazon Web Services IoT FleetWise sets the prefix processed-data/year=YY/month=MM/date=DD/hour=HH/ (in UTC) to data it delivers to Amazon S3. You can enter a prefix to append it to this default prefix. For example, if you enter the prefix vehicles, the prefix will be vehicles/processed-data/year=YY/month=MM/date=DD/hour=HH/.
      required:
        - bucketArn
    S3BucketArn:
      type: string
      minLength: 16
      maxLength: 100
      pattern: arn:(aws[a-zA-Z0-9-]*):s3:::.+
    DataFormat:
      type: string
      enum:
        - JSON
        - PARQUET
    StorageCompressionFormat:
      type: string
      enum:
        - NONE
        - GZIP
    Prefix:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[a-zA-Z0-9-_:./!*'()]+"
    TimestreamConfig:
      description: The Amazon Timestream table where the Amazon Web Services IoT FleetWise campaign sends data. Timestream stores and organizes data to optimize query processing time and to reduce storage costs. For more information, see Data modeling in the Amazon Timestream Developer Guide.
      type: object
      properties:
        timestreamTableArn:
          $ref: "#/components/schemas/TimestreamTableArn"
          description: The Amazon Resource Name (ARN) of the Amazon Timestream table.
        executionRoleArn:
          $ref: "#/components/schemas/IAMRoleArn"
          description: The Amazon Resource Name (ARN) of the task execution role that grants Amazon Web Services IoT FleetWise permission to deliver data to the Amazon Timestream table.
      required:
        - timestreamTableArn
        - executionRoleArn
    TimestreamTableArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:(aws[a-zA-Z0-9-]*):timestream:[a-zA-Z0-9-]+:[0-9]{12}:database/[a-zA-Z0-9_.-]+/table/[a-zA-Z0-9_.-]+
    IAMRoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:(aws[a-zA-Z0-9-]*):iam::(\d{12})?:(role((\u002F)|(\u002F[\u0021-\u007F]+\u002F))[\w+=,.@-]+)
    MqttTopicConfig:
      description: The MQTT topic to which the Amazon Web Services IoT FleetWise campaign routes data. For more information, see Device communication protocols in the Amazon Web Services IoT Core Developer Guide. Access to certain Amazon Web Services IoT FleetWise features is currently gated. For more information, see Amazon Web Services Region and feature availability in the Amazon Web Services IoT FleetWise Developer Guide.
      type: object
      properties:
        mqttTopicArn:
          $ref: "#/components/schemas/MqttTopicArn"
          description: The ARN of the MQTT topic.
        executionRoleArn:
          $ref: "#/components/schemas/IAMRoleArn"
          description: The ARN of the role that grants Amazon Web Services IoT FleetWise permission to access and act on messages sent to the MQTT topic.
      required:
        - mqttTopicArn
        - executionRoleArn
    MqttTopicArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:.*
    DataPartitions:
      type: array
      items:
        $ref: "#/components/schemas/DataPartition"
    DataPartition:
      description: The configuration for signal data storage and upload options. You can only specify these options when the campaign's spooling mode is TO_DISK. Access to certain Amazon Web Services IoT FleetWise features is currently gated. For more information, see Amazon Web Services Region and feature availability in the Amazon Web Services IoT FleetWise Developer Guide.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/DataPartitionId"
          description: The ID of the data partition. The data partition ID must be unique within a campaign. You can establish a data partition as the default partition for a campaign by using default as the ID.
        storageOptions:
          $ref: "#/components/schemas/DataPartitionStorageOptions"
          description: The storage options for a data partition.
        uploadOptions:
          $ref: "#/components/schemas/DataPartitionUploadOptions"
          description: The upload options for the data partition.
      required:
        - id
        - storageOptions
    DataPartitionStorageOptions:
      description: Size, time, and location options for the data partition.
      type: object
      properties:
        maximumSize:
          $ref: "#/components/schemas/StorageMaximumSize"
          description: The maximum storage size of the data stored in the data partition. Newer data overwrites older data when the partition reaches the maximum size.
        storageLocation:
          $ref: "#/components/schemas/StorageLocation"
          description: The folder name for the data partition under the campaign storage folder.
        minimumTimeToLive:
          $ref: "#/components/schemas/StorageMinimumTimeToLive"
          description: The amount of time that data in this partition will be kept on disk. After the designated amount of time passes, the data can be removed, but it's not guaranteed to be removed. Before the time expires, data in this partition can still be deleted if the partition reaches its configured maximum size. Newer data will overwrite older data when the partition reaches the maximum size.
      required:
        - maximumSize
        - storageLocation
        - minimumTimeToLive
    StorageMaximumSize:
      description: The maximum storage size for the data partition. Access to certain Amazon Web Services IoT FleetWise features is currently gated. For more information, see Amazon Web Services Region and feature availability in the Amazon Web Services IoT FleetWise Developer Guide.
      type: object
      properties:
        unit:
          $ref: "#/components/schemas/StorageMaximumSizeUnit"
          description: The data type of the data to store.
        value:
          $ref: "#/components/schemas/StorageMaximumSizeValue"
          description: The maximum amount of time to store data.
      required:
        - unit
        - value
    StorageMaximumSizeUnit:
      type: string
      enum:
        - MB
        - GB
        - TB
    StorageMaximumSizeValue:
      type: integer
      minimum: 1
      maximum: 1073741824
    StorageLocation:
      type: string
      minLength: 1
      maxLength: 4096
    StorageMinimumTimeToLive:
      description: Information about the minimum amount of time that data will be kept. Access to certain Amazon Web Services IoT FleetWise features is currently gated. For more information, see Amazon Web Services Region and feature availability in the Amazon Web Services IoT FleetWise Developer Guide.
      type: object
      properties:
        unit:
          $ref: "#/components/schemas/StorageMinimumTimeToLiveUnit"
          description: The time increment type.
        value:
          $ref: "#/components/schemas/StorageMinimumTimeToLiveValue"
          description: The minimum amount of time to store the data.
      required:
        - unit
        - value
    StorageMinimumTimeToLiveUnit:
      type: string
      enum:
        - HOURS
        - DAYS
        - WEEKS
    StorageMinimumTimeToLiveValue:
      type: integer
      minimum: 1
      maximum: 876600
    DataPartitionUploadOptions:
      description: The upload options for the data partition. If upload options are specified, you must also specify storage options. See DataPartitionStorageOptions. Access to certain Amazon Web Services IoT FleetWise features is currently gated. For more information, see Amazon Web Services Region and feature availability in the Amazon Web Services IoT FleetWise Developer Guide.
      type: object
      properties:
        expression:
          $ref: "#/components/schemas/eventExpression"
          description: The logical expression used to recognize what data to collect. For example, $variable.`Vehicle.OutsideAirTemperature` >= 105.0.
        conditionLanguageVersion:
          $ref: "#/components/schemas/languageVersion"
          description: The version of the condition language. Defaults to the most recent condition language version.
      required:
        - expression
    SignalFetchInformationList:
      type: array
      items:
        $ref: "#/components/schemas/SignalFetchInformation"
    SignalFetchInformation:
      description: Information about the signal to be fetched. Access to certain Amazon Web Services IoT FleetWise features is currently gated. For more information, see Amazon Web Services Region and feature availability in the Amazon Web Services IoT FleetWise Developer Guide.
      type: object
      properties:
        fullyQualifiedName:
          $ref: "#/components/schemas/NodePath"
          description: The fully qualified name of the signal to be fetched.
        signalFetchConfig:
          $ref: "#/components/schemas/SignalFetchConfig"
          description: The configuration of the signal fetch operation.
        conditionLanguageVersion:
          $ref: "#/components/schemas/languageVersion"
          description: The version of the condition language used.
        actions:
          $ref: "#/components/schemas/EventExpressionList"
          description: The actions to be performed by the signal fetch.
      required:
        - fullyQualifiedName
        - signalFetchConfig
        - actions
    SignalFetchConfig:
