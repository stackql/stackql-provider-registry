        - DYNAMIC_BOUNDED_CAPACITY
    StructuredMessageDefinition:
      type: array
      items:
        $ref: "#/components/schemas/StructuredMessageFieldNameAndDataTypePair"
    StructuredMessageFieldNameAndDataTypePair:
      description: Represents a StructureMessageName to DataType map element.
      type: object
      properties:
        fieldName:
          $ref: "#/components/schemas/StructureMessageName"
          description: The field name of the structured message. It determines how a data value is referenced in the target language.
        dataType:
