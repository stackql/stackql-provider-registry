openapi: 3.0.0
info:
  version: "2021-06-17"
  title: AWS IoT FleetWise
  description: AWS IoT FleetWise
  x-serviceName: iotfleetwise
  x-serviceAlias: iotfleetwise
  x-protocol: json
  x-apiVersion: "2021-06-17"
  x-endpointPrefix: iotfleetwise
  x-targetPrefix: IoTAutobahnControlPlane
  x-jsonVersion: "1.0"
servers:
  - url: https://iotfleetwise.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for iotfleetwise
paths:
  /AssociateVehicleFleet:
    post:
      operationId: AssociateVehicleFleet
      description: Adds, or associates, a vehicle with a fleet.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTAutobahnControlPlane.AssociateVehicleFleet
            default: IoTAutobahnControlPlane.AssociateVehicleFleet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                vehicleName:
                  $ref: "#/components/schemas/vehicleName"
                  description: The unique ID of the vehicle to associate with the fleet.
                fleetId:
                  $ref: "#/components/schemas/fleetId"
                  description: The ID of a fleet.
              required:
                - vehicleName
                - fleetId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateVehicleFleetResponse"
  /BatchCreateVehicle:
    post:
      operationId: BatchCreateVehicle
      description: Creates a group, or batch, of vehicles. You must specify a decoder manifest and a vehicle model (model manifest) for each vehicle. For more information, see Create multiple vehicles (AWS CLI) in the Amazon Web Services IoT FleetWise Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTAutobahnControlPlane.BatchCreateVehicle
            default: IoTAutobahnControlPlane.BatchCreateVehicle
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                vehicles:
                  $ref: "#/components/schemas/createVehicleRequestItems"
                  description: A list of information about each vehicle to create. For more information, see the API data type.
              required:
                - vehicles
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateVehicleResponse"
  /BatchUpdateVehicle:
    post:
      operationId: BatchUpdateVehicle
      description: Updates a group, or batch, of vehicles. You must specify a decoder manifest and a vehicle model (model manifest) for each vehicle. For more information, see Update multiple vehicles (AWS CLI) in the Amazon Web Services IoT FleetWise Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTAutobahnControlPlane.BatchUpdateVehicle
            default: IoTAutobahnControlPlane.BatchUpdateVehicle
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                vehicles:
                  $ref: "#/components/schemas/updateVehicleRequestItems"
                  description: A list of information about the vehicles to update. For more information, see the API data type.
              required:
                - vehicles
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateVehicleResponse"
  /CreateCampaign:
    post:
      operationId: CreateCampaign
      description: Creates an orchestration of data collection rules. The Amazon Web Services IoT FleetWise Edge Agent software running in vehicles uses campaigns to decide how to collect and transfer data to the cloud. You create campaigns in the cloud. After you or your team approve campaigns, Amazon Web Services IoT FleetWise automatically deploys them to vehicles. For more information, see Collect and transfer data with campaigns in the Amazon Web Services IoT FleetWise Developer Guide. Access to certain Amazon Web Services IoT FleetWise features is currently gated. For more information, see Amazon Web Services Region and feature availability in the Amazon Web Services IoT FleetWise Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTAutobahnControlPlane.CreateCampaign
            default: IoTAutobahnControlPlane.CreateCampaign
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/campaignName"
                  description: The name of the campaign to create.
                description:
                  $ref: "#/components/schemas/description"
                  description: An optional description of the campaign to help identify its purpose.
                signalCatalogArn:
                  $ref: "#/components/schemas/arn"
                  description: The Amazon Resource Name (ARN) of the signal catalog to associate with the campaign.
                targetArn:
                  $ref: "#/components/schemas/arn"
                  description: The ARN of the vehicle or fleet to deploy a campaign to.
                startTime:
                  $ref: "#/components/schemas/timestamp"
                  description: "The time, in milliseconds, to deliver a campaign after it was approved. If it's not specified, 0 is used. Default: 0"
                expiryTime:
                  $ref: "#/components/schemas/timestamp"
                  description: "The time the campaign expires, in seconds since epoch (January 1, 1970 at midnight UTC time). Vehicle data isn't collected after the campaign expires. Default: 253402214400 (December 31, 9999, 00:00:00 UTC)"
                postTriggerCollectionDuration:
                  $ref: "#/components/schemas/uint32"
                  description: "How long (in milliseconds) to collect raw data after a triggering event initiates the collection. If it's not specified, 0 is used. Default: 0"
                diagnosticsMode:
                  $ref: "#/components/schemas/DiagnosticsMode"
                  description: "Option for a vehicle to send diagnostic trouble codes to Amazon Web Services IoT FleetWise. If you want to send diagnostic trouble codes, use SEND_ACTIVE_DTCS. If it's not specified, OFF is used. Default: OFF"
                spoolingMode:
                  $ref: "#/components/schemas/SpoolingMode"
                  description: "Determines whether to store collected data after a vehicle lost a connection with the cloud. After a connection is re-established, the data is automatically forwarded to Amazon Web Services IoT FleetWise. If you want to store collected data when a vehicle loses connection with the cloud, use TO_DISK. If it's not specified, OFF is used. Default: OFF"
                compression:
                  $ref: "#/components/schemas/Compression"
                  description: "Determines whether to compress signals before transmitting data to Amazon Web Services IoT FleetWise. If you don't want to compress the signals, use OFF. If it's not specified, SNAPPY is used. Default: SNAPPY"
                priority:
                  $ref: "#/components/schemas/priority"
                  description: "A number indicating the priority of one campaign over another campaign for a certain vehicle or fleet. A campaign with the lowest value is deployed to vehicles before any other campaigns. If it's not specified, 0 is used. Default: 0"
                signalsToCollect:
                  $ref: "#/components/schemas/SignalInformationList"
                  description: A list of information about signals to collect. If you upload a signal as a condition in a data partition for a campaign, then those same signals must be included in signalsToCollect.
                collectionScheme:
                  $ref: "#/components/schemas/CollectionScheme"
                  description: The data collection scheme associated with the campaign. You can specify a scheme that collects data based on time or an event.
                dataExtraDimensions:
                  $ref: "#/components/schemas/DataExtraDimensionNodePathList"
                  description: "A list of vehicle attributes to associate with a campaign. Enrich the data with specified vehicle attributes. For example, add make and model to the campaign, and Amazon Web Services IoT FleetWise will associate the data with those attributes as dimensions in Amazon Timestream. You can then query the data against make and model. Default: An empty array"
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: Metadata that can be used to manage the campaign.
                dataDestinationConfigs:
                  $ref: "#/components/schemas/DataDestinationConfigs"
                  description: The destination where the campaign sends data. You can send data to an MQTT topic, or store it in Amazon S3 or Amazon Timestream. MQTT is the publish/subscribe messaging protocol used by Amazon Web Services IoT to communicate with your devices. Amazon S3 optimizes the cost of data storage and provides additional mechanisms to use vehicle data, such as data lakes, centralized data storage, data processing pipelines, and analytics. Amazon Web Services IoT FleetWise supports at-least-once file delivery to S3. Your vehicle data is stored on multiple Amazon Web Services IoT FleetWise servers for redundancy and high availability. You can use Amazon Timestream to access and analyze time series data, and Timestream to query vehicle data so that you can identify trends and patterns.
                dataPartitions:
                  $ref: "#/components/schemas/DataPartitions"
                  description: The data partitions associated with the signals collected from the vehicle.
                signalsToFetch:
                  $ref: "#/components/schemas/SignalFetchInformationList"
                  description: A list of information about signals to fetch.
              required:
                - name
                - signalCatalogArn
                - targetArn
                - collectionScheme
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCampaignResponse"
  /CreateDecoderManifest:
    post:
      operationId: CreateDecoderManifest
      description: "Creates the decoder manifest associated with a model manifest. To create a decoder manifest, the following must be true: Every signal decoder has a unique name. Each signal decoder is associated with a network interface. Each network interface has a unique ID. The signal decoders are specified in the model manifest."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTAutobahnControlPlane.CreateDecoderManifest
            default: IoTAutobahnControlPlane.CreateDecoderManifest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/resourceName"
                  description: The unique name of the decoder manifest to create.
                description:
                  $ref: "#/components/schemas/description"
                  description: A brief description of the decoder manifest.
                modelManifestArn:
                  $ref: "#/components/schemas/CreateDecoderManifestRequestModelManifestArnString"
                  description: The Amazon Resource Name (ARN) of the vehicle model (model manifest).
                signalDecoders:
                  $ref: "#/components/schemas/SignalDecoders"
                  description: A list of information about signal decoders.
                networkInterfaces:
                  $ref: "#/components/schemas/NetworkInterfaces"
                  description: A list of information about available network interfaces.
                defaultForUnmappedSignals:
                  $ref: "#/components/schemas/DefaultForUnmappedSignalsType"
                  description: Use default decoders for all unmapped signals in the model. You don't need to provide any detailed decoding information. Access to certain Amazon Web Services IoT FleetWise features is currently gated. For more information, see Amazon Web Services Region and feature availability in the Amazon Web Services IoT FleetWise Developer Guide.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: Metadata that can be used to manage the decoder manifest.
              required:
                - name
                - modelManifestArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDecoderManifestResponse"
  /CreateFleet:
    post:
      operationId: CreateFleet
      description: Creates a fleet that represents a group of vehicles. You must create both a signal catalog and vehicles before you can create a fleet. For more information, see Fleets in the Amazon Web Services IoT FleetWise Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTAutobahnControlPlane.CreateFleet
            default: IoTAutobahnControlPlane.CreateFleet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                fleetId:
                  $ref: "#/components/schemas/fleetId"
                  description: The unique ID of the fleet to create.
                description:
                  $ref: "#/components/schemas/description"
                  description: A brief description of the fleet to create.
                signalCatalogArn:
                  $ref: "#/components/schemas/arn"
                  description: The Amazon Resource Name (ARN) of a signal catalog.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: Metadata that can be used to manage the fleet.
              required:
                - fleetId
                - signalCatalogArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFleetResponse"
  /CreateModelManifest:
    post:
      operationId: CreateModelManifest
      description: Creates a vehicle model (model manifest) that specifies signals (attributes, branches, sensors, and actuators). For more information, see Vehicle models in the Amazon Web Services IoT FleetWise Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTAutobahnControlPlane.CreateModelManifest
            default: IoTAutobahnControlPlane.CreateModelManifest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/resourceName"
                  description: The name of the vehicle model to create.
                description:
                  $ref: "#/components/schemas/description"
                  description: A brief description of the vehicle model.
                nodes:
                  $ref: "#/components/schemas/CreateModelManifestRequestNodesList"
                  description: A list of nodes, which are a general abstraction of signals.
                signalCatalogArn:
                  $ref: "#/components/schemas/arn"
                  description: The Amazon Resource Name (ARN) of a signal catalog.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: Metadata that can be used to manage the vehicle model.
              required:
                - name
                - nodes
                - signalCatalogArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateModelManifestResponse"
  /CreateSignalCatalog:
    post:
      operationId: CreateSignalCatalog
      description: Creates a collection of standardized signals that can be reused to create vehicle models.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTAutobahnControlPlane.CreateSignalCatalog
            default: IoTAutobahnControlPlane.CreateSignalCatalog
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/resourceName"
                  description: The name of the signal catalog to create.
                description:
                  $ref: "#/components/schemas/description"
                  description: A brief description of the signal catalog.
                nodes:
                  $ref: "#/components/schemas/Nodes"
                  description: A list of information about nodes, which are a general abstraction of signals. For more information, see the API data type.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: Metadata that can be used to manage the signal catalog.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSignalCatalogResponse"
  /CreateStateTemplate:
    post:
      operationId: CreateStateTemplate
      description: Creates a state template. State templates contain state properties, which are signals that belong to a signal catalog that is synchronized between the Amazon Web Services IoT FleetWise Edge and the Amazon Web Services Cloud. Access to certain Amazon Web Services IoT FleetWise features is currently gated. For more information, see Amazon Web Services Region and feature availability in the Amazon Web Services IoT FleetWise Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTAutobahnControlPlane.CreateStateTemplate
            default: IoTAutobahnControlPlane.CreateStateTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/resourceName"
                  description: The name of the state template.
                description:
                  $ref: "#/components/schemas/description"
                  description: A brief description of the state template.
                signalCatalogArn:
                  $ref: "#/components/schemas/arn"
                  description: The ARN of the signal catalog associated with the state template.
                stateTemplateProperties:
                  $ref: "#/components/schemas/StateTemplateProperties"
                  description: A list of signals from which data is collected. The state template properties contain the fully qualified names of the signals.
                dataExtraDimensions:
                  $ref: "#/components/schemas/StateTemplateDataExtraDimensionNodePathList"
                  description: A list of vehicle attributes to associate with the payload published on the state template's MQTT topic. (See Processing last known state vehicle data using MQTT messaging). For example, if you add Vehicle.Attributes.Make and Vehicle.Attributes.Model attributes, Amazon Web Services IoT FleetWise will enrich the protobuf encoded payload with those attributes in the extraDimensions field.
                metadataExtraDimensions:
                  $ref: "#/components/schemas/StateTemplateMetadataExtraDimensionNodePathList"
                  description: "A list of vehicle attributes to associate with user properties of the messages published on the state template's MQTT topic. (See Processing last known state vehicle data using MQTT messaging). For example, if you add Vehicle.Attributes.Make and Vehicle.Attributes.Model attributes, Amazon Web Services IoT FleetWise will include these attributes as User Properties with the MQTT message. Default: An empty array"
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: Metadata that can be used to manage the state template.
              required:
                - name
                - signalCatalogArn
                - stateTemplateProperties
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateStateTemplateResponse"
  /CreateVehicle:
    post:
      operationId: CreateVehicle
      description: Creates a vehicle, which is an instance of a vehicle model (model manifest). Vehicles created from the same vehicle model consist of the same signals inherited from the vehicle model. If you have an existing Amazon Web Services IoT thing, you can use Amazon Web Services IoT FleetWise to create a vehicle and collect data from your thing. For more information, see Create a vehicle (AWS CLI) in the Amazon Web Services IoT FleetWise Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTAutobahnControlPlane.CreateVehicle
            default: IoTAutobahnControlPlane.CreateVehicle
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                vehicleName:
                  $ref: "#/components/schemas/vehicleName"
                  description: The unique ID of the vehicle to create.
                modelManifestArn:
                  $ref: "#/components/schemas/arn"
                  description: The Amazon Resource Name ARN of a vehicle model.
                decoderManifestArn:
                  $ref: "#/components/schemas/arn"
                  description: The ARN of a decoder manifest.
                attributes:
                  $ref: "#/components/schemas/attributesMap"
                  description: 'Static information about a vehicle in a key-value pair. For example: "engineType" : "1.3 L R2" To use attributes with Campaigns or State Templates, you must include them using the request parameters dataExtraDimensions and/or metadataExtraDimensions (for state templates only) when creating your campaign/state template.'
                associationBehavior:
                  $ref: "#/components/schemas/VehicleAssociationBehavior"
                  description: "An option to create a new Amazon Web Services IoT thing when creating a vehicle, or to validate an existing Amazon Web Services IoT thing as a vehicle. Default:"
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: Metadata that can be used to manage the vehicle.
                stateTemplates:
                  $ref: "#/components/schemas/StateTemplateAssociations"
                  description: Associate state templates with the vehicle. You can monitor the last known state of the vehicle in near real time.
              required:
                - vehicleName
                - modelManifestArn
                - decoderManifestArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVehicleResponse"
  /DeleteCampaign:
    post:
      operationId: DeleteCampaign
      description: Deletes a data collection campaign. Deleting a campaign suspends all data collection and removes it from any vehicles.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTAutobahnControlPlane.DeleteCampaign
            default: IoTAutobahnControlPlane.DeleteCampaign
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/campaignName"
                  description: The name of the campaign to delete.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCampaignResponse"
  /DeleteDecoderManifest:
    post:
      operationId: DeleteDecoderManifest
      description: Deletes a decoder manifest. You can't delete a decoder manifest if it has vehicles associated with it.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTAutobahnControlPlane.DeleteDecoderManifest
            default: IoTAutobahnControlPlane.DeleteDecoderManifest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/resourceName"
                  description: The name of the decoder manifest to delete.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDecoderManifestResponse"
  /DeleteFleet:
    post:
      operationId: DeleteFleet
      description: Deletes a fleet. Before you delete a fleet, all vehicles must be dissociated from the fleet. For more information, see Delete a fleet (AWS CLI) in the Amazon Web Services IoT FleetWise Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTAutobahnControlPlane.DeleteFleet
            default: IoTAutobahnControlPlane.DeleteFleet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                fleetId:
                  $ref: "#/components/schemas/fleetId"
                  description: The ID of the fleet to delete.
              required:
                - fleetId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteFleetResponse"
  /DeleteModelManifest:
    post:
      operationId: DeleteModelManifest
      description: Deletes a vehicle model (model manifest).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTAutobahnControlPlane.DeleteModelManifest
            default: IoTAutobahnControlPlane.DeleteModelManifest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/resourceName"
                  description: The name of the model manifest to delete.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteModelManifestResponse"
  /DeleteSignalCatalog:
    post:
      operationId: DeleteSignalCatalog
      description: Deletes a signal catalog.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTAutobahnControlPlane.DeleteSignalCatalog
            default: IoTAutobahnControlPlane.DeleteSignalCatalog
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/resourceName"
                  description: The name of the signal catalog to delete.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSignalCatalogResponse"
  /DeleteStateTemplate:
    post:
      operationId: DeleteStateTemplate
      description: Deletes a state template.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTAutobahnControlPlane.DeleteStateTemplate
            default: IoTAutobahnControlPlane.DeleteStateTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                identifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
                  description: The unique ID of the state template.
              required:
                - identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteStateTemplateResponse"
  /DeleteVehicle:
    post:
      operationId: DeleteVehicle
      description: Deletes a vehicle and removes it from any campaigns.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IoTAutobahnControlPlane.DeleteVehicle
            default: IoTAutobahnControlPlane.DeleteVehicle
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                vehicleName:
                  $ref: "#/components/schemas/vehicleName"
                  description: The ID of the vehicle to delete.
              required:
                - vehicleName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVehicleResponse"
  /DisassociateVehicleFleet:
    post:
      operationId: DisassociateVehicleFleet
      description: Removes, or disassociates, a vehicle from a fleet. Disassociating a vehicle from a fleet doesn't delete the vehicle.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
