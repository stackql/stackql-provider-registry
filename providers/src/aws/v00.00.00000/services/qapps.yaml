      type: string
      minLength: 0
      maxLength: 50000
    CardOutputSource:
      type: string
      enum:
        - approved-sources
        - llm
    AttributeFilter:
      description: The filter criteria used on responses based on document attributes or metadata fields.
      type: object
      properties:
        andAllFilters:
          $ref: "#/components/schemas/AttributeFilters"
          description: Performs a logical AND operation on all supplied filters.
        orAllFilters:
          $ref: "#/components/schemas/AttributeFilters"
          description: Performs a logical OR operation on all supplied filters.
        notFilter:
          $ref: "#/components/schemas/AttributeFilter"
          description: Performs a logical NOT operation on all supplied filters.
        equalsTo:
          $ref: "#/components/schemas/DocumentAttribute"
          description: "Performs an equals operation on two document attributes or metadata fields. Supported for the following document attribute value types: dateValue, longValue, stringListValue and stringValue."
        containsAll:
          $ref: "#/components/schemas/DocumentAttribute"
          description: "Returns true when a document contains all the specified document attributes or metadata fields. Supported for the following document attribute value types: stringListValue."
        containsAny:
          $ref: "#/components/schemas/DocumentAttribute"
          description: "Returns true when a document contains any of the specified document attributes or metadata fields. Supported for the following document attribute value types: stringListValue."
        greaterThan:
          $ref: "#/components/schemas/DocumentAttribute"
          description: "Performs a greater than operation on two document attributes or metadata fields. Supported for the following document attribute value types: dateValue and longValue."
        greaterThanOrEquals:
          $ref: "#/components/schemas/DocumentAttribute"
          description: "Performs a greater than or equals operation on two document attributes or metadata fields. Supported for the following document attribute value types: dateValue and longValue."
        lessThan:
          $ref: "#/components/schemas/DocumentAttribute"
          description: "Performs a less than operation on two document attributes or metadata fields. Supported for the following document attribute value types: dateValue and longValue."
        lessThanOrEquals:
          $ref: "#/components/schemas/DocumentAttribute"
          description: "Performs a less than or equals operation on two document attributes or metadata fields.Supported for the following document attribute value type: dateValue and longValue."
    AttributeFilters:
      type: array
      items:
        $ref: "#/components/schemas/AttributeFilter"
    DocumentAttribute:
      description: A document attribute or metadata field.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/DocumentAttributeKey"
          description: The identifier for the attribute.
        value:
          $ref: "#/components/schemas/DocumentAttributeValue"
          description: The value of the attribute.
      required:
