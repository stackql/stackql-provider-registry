openapi: 3.0.0
info:
  version: "2023-11-27"
  title: QApps
  description: QApps
  x-serviceName: qapps
  x-serviceAlias: qapps
  x-protocol: rest-json
  x-apiVersion: "2023-11-27"
  x-endpointPrefix: data.qapps
servers:
  - url: https://data.qapps.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for qapps
paths:
  /catalog.associateItemRating:
    post:
      operationId: AssociateLibraryItemReview
      description: Associates a rating or review for a library item with the user submitting the request. This increments the rating count for the specified library item.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier for the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                libraryItemId:
                  $ref: "#/components/schemas/UUID"
              required:
                - libraryItemId
      responses:
        "200":
          description: Success
  /apps.install:
    post:
      operationId: AssociateQAppWithUser
      description: This operation creates a link between the user's identity calling the operation and a specific Q App. This is useful to mark the Q App as a favorite for the user if the user doesn't own the Amazon Q App so they can still run it and see it in their inventory of Q Apps.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appId:
                  $ref: "#/components/schemas/UUID"
              required:
                - appId
      responses:
        "200":
          description: Success
  /catalog.createCategories:
    post:
      operationId: BatchCreateCategory
      description: Creates Categories for the Amazon Q Business application environment instance. Web experience users use Categories to tag and filter library items. For more information, see Custom labels for Amazon Q Apps.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                categories:
                  $ref: "#/components/schemas/BatchCreateCategoryInputCategoryList"
              required:
                - categories
      responses:
        "200":
          description: Success
  /catalog.deleteCategories:
    post:
      operationId: BatchDeleteCategory
      description: Deletes Categories for the Amazon Q Business application environment instance. Web experience users use Categories to tag and filter library items. For more information, see Custom labels for Amazon Q Apps.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                categories:
                  $ref: "#/components/schemas/DeleteCategoryInputList"
              required:
                - categories
      responses:
        "200":
          description: Success
  /catalog.updateCategories:
    post:
      operationId: BatchUpdateCategory
      description: Updates Categories for the Amazon Q Business application environment instance. Web experience users use Categories to tag and filter library items. For more information, see Custom labels for Amazon Q Apps.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                categories:
                  $ref: "#/components/schemas/CategoryListInput"
              required:
                - categories
      responses:
        "200":
          description: Success
  /catalog.createItem:
    post:
      operationId: CreateLibraryItem
      description: Creates a new library item for an Amazon Q App, allowing it to be discovered and used by other allowed users.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appId:
                  $ref: "#/components/schemas/UUID"
                appVersion:
                  $ref: "#/components/schemas/AppVersion"
                categories:
                  $ref: "#/components/schemas/CategoryIdList"
              required:
                - appId
                - appVersion
                - categories
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLibraryItemOutput"
  /apps.createPresignedUrl:
    post:
      operationId: CreatePresignedUrl
      description: Creates a presigned URL for an S3 POST operation to upload a file. You can use this URL to set a default file for a FileUploadCard in a Q App definition or to provide a file for a single Q App run. The scope parameter determines how the file will be used, either at the app definition level or the app session level. The IAM permissions are derived from the qapps:ImportDocument action. For more information on the IAM policy for Amazon Q Apps, see IAM permissions for using Amazon Q Apps.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cardId:
                  $ref: "#/components/schemas/UUID"
                appId:
                  $ref: "#/components/schemas/UUID"
                fileContentsSha256:
                  $ref: "#/components/schemas/CreatePresignedUrlInputFileContentsSha256String"
                fileName:
                  $ref: "#/components/schemas/Filename"
                scope:
                  $ref: "#/components/schemas/DocumentScope"
                sessionId:
                  $ref: "#/components/schemas/UUID"
              required:
                - cardId
                - appId
                - fileContentsSha256
                - fileName
                - scope
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePresignedUrlOutput"
  /apps.create:
    post:
      operationId: CreateQApp
      description: Creates a new Amazon Q App based on the provided definition. The Q App definition specifies the cards and flow of the Q App. This operation also calculates the dependencies between the cards by inspecting the references in the prompts.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  $ref: "#/components/schemas/Title"
                description:
                  $ref: "#/components/schemas/Description"
                appDefinition:
                  $ref: "#/components/schemas/AppDefinitionInput"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - title
                - appDefinition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateQAppOutput"
  /catalog.deleteItem:
    post:
      operationId: DeleteLibraryItem
      description: Deletes a library item for an Amazon Q App, removing it from the library so it can no longer be discovered or used by other users.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                libraryItemId:
                  $ref: "#/components/schemas/UUID"
              required:
                - libraryItemId
      responses:
        "200":
          description: Success
  /apps.delete:
    post:
      operationId: DeleteQApp
      description: Deletes an Amazon Q App owned by the user. If the Q App was previously published to the library, it is also removed from the library.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appId:
                  $ref: "#/components/schemas/UUID"
              required:
                - appId
      responses:
        "200":
          description: Success
  /apps.describeQAppPermissions:
    get:
      operationId: DescribeQAppPermissions
      description: Describes read permissions for a Amazon Q App in Amazon Q Business application environment instance.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
        - name: appId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier of the Amazon Q App for which to retrieve permissions.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeQAppPermissionsOutput"
  /catalog.disassociateItemRating:
    post:
      operationId: DisassociateLibraryItemReview
      description: Removes a rating or review previously submitted by the user for a library item.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                libraryItemId:
                  $ref: "#/components/schemas/UUID"
              required:
                - libraryItemId
      responses:
        "200":
          description: Success
  /apps.uninstall:
    post:
      operationId: DisassociateQAppFromUser
      description: Disassociates a Q App from a user removing the user's access to run the Q App.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appId:
                  $ref: "#/components/schemas/UUID"
              required:
                - appId
      responses:
        "200":
          description: Success
  /runtime.exportQAppSessionData:
    post:
      operationId: ExportQAppSessionData
      description: Exports the collected data of a Q App data collection session.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  $ref: "#/components/schemas/UUID"
              required:
                - sessionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportQAppSessionDataOutput"
  /catalog.getItem:
    get:
      operationId: GetLibraryItem
      description: Retrieves details about a library item for an Amazon Q App, including its metadata, categories, ratings, and usage statistics.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
        - name: libraryItemId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier of the library item to retrieve.
        - name: appId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier of the Amazon Q App associated with the library item.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLibraryItemOutput"
  /apps.get:
    get:
      operationId: GetQApp
      description: Retrieves the full details of an Q App, including its definition specifying the cards and flow.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
        - name: appId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier of the Q App to retrieve.
        - name: appVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AppVersion"
          description: The version of the Q App.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQAppOutput"
  /runtime.getQAppSession:
    get:
      operationId: GetQAppSession
      description: Retrieves the current state and results for an active session of an Amazon Q App.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
        - name: sessionId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier of the Q App session to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQAppSessionOutput"
  /runtime.getQAppSessionMetadata:
    get:
      operationId: GetQAppSessionMetadata
      description: Retrieves the current configuration of a Q App session.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
        - name: sessionId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier of the Q App session.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQAppSessionMetadataOutput"
  /apps.importDocument:
    post:
      operationId: ImportDocument
      description: Uploads a file that can then be used either as a default in a FileUploadCard from Q App definition or as a file that is used inside a single Q App run. The purpose of the document is determined by a scope parameter that indicates whether it is at the app definition level or at the app session level.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cardId:
                  $ref: "#/components/schemas/UUID"
                appId:
                  $ref: "#/components/schemas/UUID"
                fileContentsBase64:
                  $ref: "#/components/schemas/String"
                fileName:
                  $ref: "#/components/schemas/Filename"
                scope:
                  $ref: "#/components/schemas/DocumentScope"
                sessionId:
                  $ref: "#/components/schemas/UUID"
              required:
                - cardId
                - appId
                - fileContentsBase64
                - fileName
                - scope
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportDocumentOutput"
  /catalog.listCategories:
    get:
      operationId: ListCategories
      description: Lists the categories of a Amazon Q Business application environment instance. For more information, see Custom labels for Amazon Q Apps.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCategoriesOutput"
  /catalog.list:
    get:
      operationId: ListLibraryItems
      description: Lists the library items for Amazon Q Apps that are published and available for users in your Amazon Web Services account.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PageLimit"
          description: The maximum number of library items to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The token to request the next page of results.
        - name: categoryId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UUID"
          description: Optional category to filter the library items by.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLibraryItemsOutput"
  /runtime.listQAppSessionData:
    get:
      operationId: ListQAppSessionData
      description: Lists the collected data of a Q App data collection session.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
        - name: sessionId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier of the Q App data collection session.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListQAppSessionDataOutput"
  /apps.list:
    get:
      operationId: ListQApps
      description: Lists the Amazon Q Apps owned by or associated with the user either because they created it or because they used it from the library in the past. The user identity is extracted from the credentials used to invoke this operation..
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PageLimit"
          description: The maximum number of Q Apps to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The token to request the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListQAppsOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags associated with an Amazon Q Apps resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the resource whose tags should be listed.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Associates tags with an Amazon Q Apps resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the resource to tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Disassociates tags from an Amazon Q Apps resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the resource to disassociate the tag from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: The keys of the tags to disassociate from the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /apps.predictQApp:
    post:
      operationId: PredictQApp
      description: Generates an Amazon Q App definition based on either a conversation or a problem statement provided as input.The resulting app definition can be used to call CreateQApp. This API doesn't create Amazon Q Apps directly.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                options:
                  $ref: "#/components/schemas/PredictQAppInputOptions"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictQAppOutput"
  /runtime.startQAppSession:
    post:
      operationId: StartQAppSession
      description: Starts a new session for an Amazon Q App, allowing inputs to be provided and the app to be run. Each Q App session will be condensed into a single conversation in the web experience.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appId:
                  $ref: "#/components/schemas/UUID"
                appVersion:
                  $ref: "#/components/schemas/AppVersion"
                initialValues:
                  $ref: "#/components/schemas/CardValueList"
                sessionId:
                  $ref: "#/components/schemas/String"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - appId
                - appVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartQAppSessionOutput"
  /runtime.deleteMiniAppRun:
    post:
      operationId: StopQAppSession
      description: Stops an active session for an Amazon Q App.This deletes all data related to the session and makes it invalid for future uses. The results of the session will be persisted as part of the conversation.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  $ref: "#/components/schemas/UUID"
              required:
                - sessionId
      responses:
        "200":
          description: Success
  /catalog.updateItem:
    post:
      operationId: UpdateLibraryItem
      description: Updates the library item for an Amazon Q App.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                libraryItemId:
                  $ref: "#/components/schemas/UUID"
                status:
                  $ref: "#/components/schemas/LibraryItemStatus"
                categories:
                  $ref: "#/components/schemas/CategoryIdList"
              required:
                - libraryItemId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLibraryItemOutput"
  /catalog.updateItemMetadata:
    post:
      operationId: UpdateLibraryItemMetadata
      description: Updates the verification status of a library item for an Amazon Q App.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                libraryItemId:
                  $ref: "#/components/schemas/UUID"
                isVerified:
                  $ref: "#/components/schemas/Boolean"
              required:
                - libraryItemId
      responses:
        "200":
          description: Success
  /apps.update:
    post:
      operationId: UpdateQApp
      description: Updates an existing Amazon Q App, allowing modifications to its title, description, and definition.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appId:
                  $ref: "#/components/schemas/UUID"
                title:
                  $ref: "#/components/schemas/Title"
                description:
                  $ref: "#/components/schemas/Description"
                appDefinition:
                  $ref: "#/components/schemas/AppDefinitionInput"
              required:
                - appId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateQAppOutput"
  /apps.updateQAppPermissions:
    post:
      operationId: UpdateQAppPermissions
      description: Updates read permissions for a Amazon Q App in Amazon Q Business application environment instance.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appId:
                  $ref: "#/components/schemas/UUID"
                grantPermissions:
                  $ref: "#/components/schemas/UpdateQAppPermissionsInputGrantPermissionsList"
                revokePermissions:
                  $ref: "#/components/schemas/UpdateQAppPermissionsInputRevokePermissionsList"
              required:
                - appId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateQAppPermissionsOutput"
  /runtime.updateQAppSession:
    post:
      operationId: UpdateQAppSession
      description: Updates the session for a given Q App sessionId. This is only valid when at least one card of the session is in the WAITING state. Data for each WAITING card can be provided as input. If inputs are not provided, the call will be accepted but session will not move forward. Inputs for cards that are not in the WAITING status will be ignored.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  $ref: "#/components/schemas/UUID"
                values:
                  $ref: "#/components/schemas/CardValueList"
              required:
                - sessionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateQAppSessionOutput"
  /runtime.updateQAppSessionMetadata:
    post:
      operationId: UpdateQAppSessionMetadata
      description: Updates the configuration metadata of a session for a given Q App sessionId.
      parameters:
        - name: instance-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/InstanceId"
          description: The unique identifier of the Amazon Q Business application environment instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  $ref: "#/components/schemas/UUID"
                sessionName:
                  $ref: "#/components/schemas/SessionName"
                sharingConfiguration:
                  $ref: "#/components/schemas/SessionSharingConfiguration"
              required:
                - sessionId
                - sharingConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateQAppSessionMetadataOutput"
components:
