          description: The name of the category.
        color:
          $ref: "#/components/schemas/BatchCreateCategoryInputCategoryColorString"
          description: The color to be associated with a category. The color must be a hexadecimal value of either 3 or 6 digits.
      required:
        - title_
    BatchCreateCategoryInputCategoryTitleString:
      type: string
      minLength: 1
      maxLength: 30
      pattern: "[a-zA-Z0-9_]+( [a-zA-Z0-9_]+)*"
    BatchCreateCategoryInputCategoryColorString:
      type: string
      minLength: 4
      maxLength: 7
      pattern: "#([A-Fa-f0-9]{3}|[A-Fa-f0-9]{6})"
    DeleteCategoryInputList:
      type: array
      items:
        $ref: "#/components/schemas/UUID"
    CategoryListInput:
      type: array
      items:
        $ref: "#/components/schemas/CategoryInput"
    CategoryInput:
      description: A label that web experience users associate with a library item. Web experience users use Categories to tag and filter library items.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
          description: The unique identifier of the category.
        title_:
          $ref: "#/components/schemas/CategoryInputTitleString"
          description: The name of the category.
        color:
          $ref: "#/components/schemas/CategoryInputColorString"
          description: The color of the category, represented as a hexadecimal value of either 3 or 6 digits.
      required:
        - id
        - title_
    CategoryInputTitleString:
      type: string
      minLength: 1
      maxLength: 30
      pattern: "[a-zA-Z0-9_]+( [a-zA-Z0-9_]+)*"
    CategoryInputColorString:
      type: string
      minLength: 4
      maxLength: 7
      pattern: "#([A-Fa-f0-9]{3}|[A-Fa-f0-9]{6})"
    AppVersion:
      type: integer
      minimum: 0
      maximum: 2147483647
    CategoryIdList:
      type: array
      items:
        $ref: "#/components/schemas/UUID"
    CreateLibraryItemOutput:
