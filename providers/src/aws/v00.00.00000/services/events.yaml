openapi: 3.0.0
info:
  version: "2015-10-07"
  title: Amazon EventBridge
  description: Amazon EventBridge
  x-serviceName: events
  x-serviceAlias: events
  x-protocol: json
  x-apiVersion: "2015-10-07"
  x-endpointPrefix: events
  x-targetPrefix: AWSEvents
  x-jsonVersion: "1.1"
servers:
  - url: https://events.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for events
paths:
  /ActivateEventSource:
    post:
      operationId: ActivateEventSource
      description: Activates a partner event source that has been deactivated. Once activated, your matching event bus will start receiving events from the event source.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.ActivateEventSource
            default: AWSEvents.ActivateEventSource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EventSourceName"
                  description: The name of the partner event source to activate.
              required:
                - Name
      responses:
        "200":
          description: Success
  /CancelReplay:
    post:
      operationId: CancelReplay
      description: Cancels the specified replay.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.CancelReplay
            default: AWSEvents.CancelReplay
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReplayName:
                  $ref: "#/components/schemas/ReplayName"
                  description: The name of the replay to cancel.
              required:
                - ReplayName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelReplayResponse"
  /CreateApiDestination:
    post:
      operationId: CreateApiDestination
      description: Creates an API destination, which is an HTTP invocation endpoint configured as a target for events. API destinations do not support private destinations, such as interface VPC endpoints. For more information, see API destinations in the EventBridge User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.CreateApiDestination
            default: AWSEvents.CreateApiDestination
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ApiDestinationName"
                  description: The name for the API destination to create.
                Description:
                  $ref: "#/components/schemas/ApiDestinationDescription"
                  description: A description for the API destination to create.
                ConnectionArn:
                  $ref: "#/components/schemas/ConnectionArn"
                  description: The ARN of the connection to use for the API destination. The destination endpoint must support the authorization type specified for the connection.
                InvocationEndpoint:
                  $ref: "#/components/schemas/HttpsEndpoint"
                  description: The URL to the HTTP invocation endpoint for the API destination.
                HttpMethod:
                  $ref: "#/components/schemas/ApiDestinationHttpMethod"
                  description: The method to use for the request to the HTTP invocation endpoint.
                InvocationRateLimitPerSecond:
                  $ref: "#/components/schemas/ApiDestinationInvocationRateLimitPerSecond"
                  description: The maximum number of requests per second to send to the HTTP invocation endpoint.
              required:
                - ConnectionArn
                - InvocationEndpoint
                - HttpMethod
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiDestinationResponse"
  /CreateArchive:
    post:
      operationId: CreateArchive
      description: Creates an archive of events with the specified settings. When you create an archive, incoming events might not immediately start being sent to the archive. Allow a short period of time for changes to take effect. If you do not specify a pattern to filter events sent to the archive, all events are sent to the archive except replayed events. Replayed events are not sent to an archive. If you have specified that EventBridge use a customer managed key for encrypting the source event bus, we strongly recommend you also specify a customer managed key for any archives for the event bus as well. For more information, see Encrypting archives in the Amazon EventBridge User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.CreateArchive
            default: AWSEvents.CreateArchive
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ArchiveName:
                  $ref: "#/components/schemas/ArchiveName"
                  description: The name for the archive to create.
                EventSourceArn:
                  $ref: "#/components/schemas/EventBusArn"
                  description: The ARN of the event bus that sends events to the archive.
                Description:
                  $ref: "#/components/schemas/ArchiveDescription"
                  description: A description for the archive.
                EventPattern:
                  $ref: "#/components/schemas/EventPattern"
                  description: An event pattern to use to filter events sent to the archive.
                RetentionDays:
                  $ref: "#/components/schemas/RetentionDays"
                  description: The number of days to retain events for. Default value is 0. If set to 0, events are retained indefinitely
                KmsKeyIdentifier:
                  $ref: "#/components/schemas/KmsKeyIdentifier"
                  description: The identifier of the KMS customer managed key for EventBridge to use, if you choose to use a customer managed key to encrypt this archive. The identifier can be the key Amazon Resource Name (ARN), KeyId, key alias, or key alias ARN. If you do not specify a customer managed key identifier, EventBridge uses an Amazon Web Services owned key to encrypt the archive. For more information, see Identify and view keys in the Key Management Service Developer Guide. If you have specified that EventBridge use a customer managed key for encrypting the source event bus, we strongly recommend you also specify a customer managed key for any archives for the event bus as well. For more information, see Encrypting archives in the Amazon EventBridge User Guide.
              required:
                - ArchiveName
                - EventSourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateArchiveResponse"
  /CreateConnection:
    post:
      operationId: CreateConnection
      description: Creates a connection. A connection defines the authorization type and credentials to use for authorization with an API destination HTTP endpoint. For more information, see Connections for endpoint targets in the Amazon EventBridge User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.CreateConnection
            default: AWSEvents.CreateConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ConnectionName"
                  description: The name for the connection to create.
                Description:
                  $ref: "#/components/schemas/ConnectionDescription"
                  description: A description for the connection to create.
                AuthorizationType:
                  $ref: "#/components/schemas/ConnectionAuthorizationType"
                  description: The type of authorization to use for the connection. OAUTH tokens are refreshed when a 401 or 407 response is returned.
                AuthParameters:
                  $ref: "#/components/schemas/CreateConnectionAuthRequestParameters"
                  description: The authorization parameters to use to authorize with the endpoint. You must include only authorization parameters for the AuthorizationType you specify.
                InvocationConnectivityParameters:
                  $ref: "#/components/schemas/ConnectivityResourceParameters"
                  description: For connections to private APIs, the parameters to use for invoking the API. For more information, see Connecting to private APIs in the Amazon EventBridge User Guide .
                KmsKeyIdentifier:
                  $ref: "#/components/schemas/KmsKeyIdentifier"
                  description: The identifier of the KMS customer managed key for EventBridge to use, if you choose to use a customer managed key to encrypt this connection. The identifier can be the key Amazon Resource Name (ARN), KeyId, key alias, or key alias ARN. If you do not specify a customer managed key identifier, EventBridge uses an Amazon Web Services owned key to encrypt the connection. For more information, see Identify and view keys in the Key Management Service Developer Guide.
              required:
                - AuthorizationType
                - AuthParameters
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectionResponse"
  /CreateEndpoint:
    post:
      operationId: CreateEndpoint
      description: Creates a global endpoint. Global endpoints improve your application's availability by making it regional-fault tolerant. To do this, you define a primary and secondary Region with event buses in each Region. You also create a Amazon Route 53 health check that will tell EventBridge to route events to the secondary Region when an "unhealthy" state is encountered and events will be routed back to the primary Region when the health check reports a "healthy" state.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.CreateEndpoint
            default: AWSEvents.CreateEndpoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EndpointName"
                  description: The name of the global endpoint. For example, "Name":"us-east-2-custom_bus_A-endpoint".
                Description:
                  $ref: "#/components/schemas/EndpointDescription"
                  description: A description of the global endpoint.
                RoutingConfig:
                  $ref: "#/components/schemas/RoutingConfig"
                  description: Configure the routing policy, including the health check and secondary Region..
                ReplicationConfig:
                  $ref: "#/components/schemas/ReplicationConfig"
                  description: Enable or disable event replication. The default state is ENABLED which means you must supply a RoleArn. If you don't have a RoleArn or you don't want event replication enabled, set the state to DISABLED.
                EventBuses:
                  $ref: "#/components/schemas/EndpointEventBusList"
                  description: Define the event buses used. The names of the event buses must be identical in each Region.
                RoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The ARN of the role used for replication.
              required:
                - RoutingConfig
                - EventBuses
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEndpointResponse"
  /CreateEventBus:
    post:
      operationId: CreateEventBus
      description: Creates a new event bus within your account. This can be a custom event bus which you can use to receive events from your custom applications and services, or it can be a partner event bus which can be matched to a partner event source.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.CreateEventBus
            default: AWSEvents.CreateEventBus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EventBusName"
                  description: The name of the new event bus. Custom event bus names can't contain the / character, but you can use the / character in partner event bus names. In addition, for partner event buses, the name must exactly match the name of the partner event source that this event bus is matched to. You can't use the name default for a custom event bus, as this name is already used for your account's default event bus.
                EventSourceName:
                  $ref: "#/components/schemas/EventSourceName"
                  description: If you are creating a partner event bus, this specifies the partner event source that the new event bus will be matched with.
                Description:
                  $ref: "#/components/schemas/EventBusDescription"
                  description: The event bus description.
                KmsKeyIdentifier:
                  $ref: "#/components/schemas/KmsKeyIdentifier"
                  description: "The identifier of the KMS customer managed key for EventBridge to use, if you choose to use a customer managed key to encrypt events on this event bus. The identifier can be the key Amazon Resource Name (ARN), KeyId, key alias, or key alias ARN. If you do not specify a customer managed key identifier, EventBridge uses an Amazon Web Services owned key to encrypt events on the event bus. For more information, see Identify and view keys in the Key Management Service Developer Guide. Schema discovery is not supported for event buses encrypted using a customer managed key. EventBridge returns an error if: You call CreateDiscoverer on an event bus set to use a customer managed key for encryption. You call UpdatedEventBus to set a customer managed key on an event bus with schema discovery enabled. To enable schema discovery on an event bus, choose to use an Amazon Web Services owned key. For more information, see Encrypting events in the Amazon EventBridge User Guide. If you have specified that EventBridge use a customer managed key for encrypting the source event bus, we strongly recommend you also specify a customer managed key for any archives for the event bus as well. For more information, see Encrypting archives in the Amazon EventBridge User Guide."
                DeadLetterConfig:
                  $ref: "#/components/schemas/DeadLetterConfig"
                LogConfig:
                  $ref: "#/components/schemas/LogConfig"
                  description: The logging configuration settings for the event bus. For more information, see Configuring logs for event buses in the EventBridge User Guide.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Tags to associate with the event bus.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventBusResponse"
  /CreatePartnerEventSource:
    post:
      operationId: CreatePartnerEventSource
      description: "Called by an SaaS partner to create a partner event source. This operation is not used by Amazon Web Services customers. Each partner event source can be used by one Amazon Web Services account to create a matching partner event bus in that Amazon Web Services account. A SaaS partner must create one partner event source for each Amazon Web Services account that wants to receive those event types. A partner event source creates events based on resources within the SaaS partner's service or application. An Amazon Web Services account that creates a partner event bus that matches the partner event source can use that event bus to receive events from the partner, and then process them using Amazon Web Services Events rules and targets. Partner event source names follow this format: partner_name/event_namespace/event_name partner_name is determined during partner registration, and identifies the partner to Amazon Web Services customers. event_namespace is determined by the partner, and is a way for the partner to categorize their events. event_name is determined by the partner, and should uniquely identify an event-generating resource within the partner system. The event_name must be unique across all Amazon Web Services customers. This is because the event source is a shared resource between the partner and customer accounts, and each partner event source unique in the partner account. The combination of event_namespace and event_name should help Amazon Web Services customers decide whether to create an event bus to receive these events."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.CreatePartnerEventSource
            default: AWSEvents.CreatePartnerEventSource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EventSourceName"
                  description: The name of the partner event source. This name must be unique and must be in the format partner_name/event_namespace/event_name . The Amazon Web Services account that wants to use this partner event source must create a partner event bus with a name that matches the name of the partner event source.
                Account:
                  $ref: "#/components/schemas/AccountId"
                  description: The Amazon Web Services account ID that is permitted to create a matching partner event bus for this partner event source.
              required:
                - Account
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePartnerEventSourceResponse"
  /DeactivateEventSource:
    post:
      operationId: DeactivateEventSource
      description: You can use this operation to temporarily stop receiving events from the specified partner event source. The matching event bus is not deleted. When you deactivate a partner event source, the source goes into PENDING state. If it remains in PENDING state for more than two weeks, it is deleted. To activate a deactivated partner event source, use ActivateEventSource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.DeactivateEventSource
            default: AWSEvents.DeactivateEventSource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EventSourceName"
                  description: The name of the partner event source to deactivate.
              required:
                - Name
      responses:
        "200":
          description: Success
  /DeauthorizeConnection:
    post:
      operationId: DeauthorizeConnection
      description: Removes all authorization parameters from the connection. This lets you remove the secret from the connection so you can reuse it without having to create a new connection.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.DeauthorizeConnection
            default: AWSEvents.DeauthorizeConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ConnectionName"
                  description: The name of the connection to remove authorization from.
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeauthorizeConnectionResponse"
  /DeleteApiDestination:
    post:
      operationId: DeleteApiDestination
      description: Deletes the specified API destination.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.DeleteApiDestination
            default: AWSEvents.DeleteApiDestination
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ApiDestinationName"
                  description: The name of the destination to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApiDestinationResponse"
  /DeleteArchive:
    post:
      operationId: DeleteArchive
      description: Deletes the specified archive.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.DeleteArchive
            default: AWSEvents.DeleteArchive
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ArchiveName:
                  $ref: "#/components/schemas/ArchiveName"
                  description: The name of the archive to delete.
              required:
                - ArchiveName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteArchiveResponse"
  /DeleteConnection:
    post:
      operationId: DeleteConnection
      description: Deletes a connection.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.DeleteConnection
            default: AWSEvents.DeleteConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ConnectionName"
                  description: The name of the connection to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteConnectionResponse"
  /DeleteEndpoint:
    post:
      operationId: DeleteEndpoint
      description: Delete an existing global endpoint. For more information about global endpoints, see Making applications Regional-fault tolerant with global endpoints and event replication in the Amazon EventBridge User Guide .
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.DeleteEndpoint
            default: AWSEvents.DeleteEndpoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EndpointName"
                  description: The name of the endpoint you want to delete. For example, "Name":"us-east-2-custom_bus_A-endpoint"..
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEndpointResponse"
  /DeleteEventBus:
    post:
      operationId: DeleteEventBus
      description: Deletes the specified custom event bus or partner event bus. All rules associated with this event bus need to be deleted. You can't delete your account's default event bus.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.DeleteEventBus
            default: AWSEvents.DeleteEventBus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EventBusName"
                  description: The name of the event bus to delete.
      responses:
        "200":
          description: Success
  /DeletePartnerEventSource:
    post:
      operationId: DeletePartnerEventSource
      description: This operation is used by SaaS partners to delete a partner event source. This operation is not used by Amazon Web Services customers. When you delete an event source, the status of the corresponding partner event bus in the Amazon Web Services customer account becomes DELETED.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.DeletePartnerEventSource
            default: AWSEvents.DeletePartnerEventSource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EventSourceName"
                  description: The name of the event source to delete.
                Account:
                  $ref: "#/components/schemas/AccountId"
                  description: The Amazon Web Services account ID of the Amazon Web Services customer that the event source was created for.
              required:
                - Account
      responses:
        "200":
          description: Success
  /DeleteRule:
    post:
      operationId: DeleteRule
      description: Deletes the specified rule. Before you can delete the rule, you must remove all targets, using RemoveTargets. When you delete a rule, incoming events might continue to match to the deleted rule. Allow a short period of time for changes to take effect. If you call delete rule multiple times for the same rule, all calls will succeed. When you call delete rule for a non-existent custom eventbus, ResourceNotFoundException is returned. Managed rules are rules created and managed by another Amazon Web Services service on your behalf. These rules are created by those other Amazon Web Services services to support functionality in those services. You can delete these rules using the Force option, but you should do so only if you are sure the other service is not still using that rule.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.DeleteRule
            default: AWSEvents.DeleteRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/RuleName"
                  description: The name of the rule.
                EventBusName:
                  $ref: "#/components/schemas/EventBusNameOrArn"
                  description: The name or ARN of the event bus associated with the rule. If you omit this, the default event bus is used.
                Force:
                  $ref: "#/components/schemas/Boolean"
                  description: If this is a managed rule, created by an Amazon Web Services service on your behalf, you must specify Force as True to delete the rule. This parameter is ignored for rules that are not managed rules. You can check whether a rule is a managed rule by using DescribeRule or ListRules and checking the ManagedBy field of the response.
      responses:
        "200":
          description: Success
  /DescribeApiDestination:
    post:
      operationId: DescribeApiDestination
      description: Retrieves details about an API destination.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.DescribeApiDestination
            default: AWSEvents.DescribeApiDestination
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ApiDestinationName"
                  description: The name of the API destination to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeApiDestinationResponse"
  /DescribeArchive:
    post:
      operationId: DescribeArchive
      description: Retrieves details about an archive.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.DescribeArchive
            default: AWSEvents.DescribeArchive
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ArchiveName:
                  $ref: "#/components/schemas/ArchiveName"
                  description: The name of the archive to retrieve.
              required:
                - ArchiveName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeArchiveResponse"
  /DescribeConnection:
    post:
      operationId: DescribeConnection
      description: Retrieves details about a connection.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.DescribeConnection
            default: AWSEvents.DescribeConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ConnectionName"
                  description: The name of the connection to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeConnectionResponse"
  /DescribeEndpoint:
    post:
      operationId: DescribeEndpoint
      description: Get the information about an existing global endpoint. For more information about global endpoints, see Making applications Regional-fault tolerant with global endpoints and event replication in the Amazon EventBridge User Guide .
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
