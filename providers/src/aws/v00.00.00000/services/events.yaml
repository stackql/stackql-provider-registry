                  description: The name of the rule.
                EventBusName:
                  $ref: "#/components/schemas/EventBusNameOrArn"
                  description: The name or ARN of the event bus associated with the rule. If you omit this, the default event bus is used.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token returned by a previous call, which you can use to retrieve the next set of results. The value of nextToken is a unique pagination token for each page. To retrieve the next page of results, make the call again using the returned token. Keep all other arguments unchanged. Using an expired pagination token results in an HTTP 400 InvalidToken error.
                Limit:
                  $ref: "#/components/schemas/LimitMax100"
                  description: The maximum number of results to return.
              required:
                - Rule
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTargetsByRuleResponse"
  /PutEvents:
    post:
      operationId: PutEvents
      description: "Sends custom events to Amazon EventBridge so that they can be matched to rules. You can batch multiple event entries into one request for efficiency. However, the total entry size must be less than 256KB. You can calculate the entry size before you send the events. For more information, see Calculating PutEvents event entry size in the Amazon EventBridge User Guide . PutEvents accepts the data in JSON format. For the JSON number (integer) data type, the constraints are: a minimum value of -9,223,372,036,854,775,808 and a maximum value of 9,223,372,036,854,775,807. PutEvents will only process nested JSON up to 1000 levels deep."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.PutEvents
            default: AWSEvents.PutEvents
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Entries:
                  $ref: "#/components/schemas/PutEventsRequestEntryList"
                  description: The entry that defines an event in your system. You can specify several parameters for the entry such as the source and type of the event, resources associated with the event, and so on.
                EndpointId:
                  $ref: "#/components/schemas/EndpointId"
                  description: The URL subdomain of the endpoint. For example, if the URL for Endpoint is https://abcde.veo.endpoints.event.amazonaws.com, then the EndpointId is abcde.veo. When using Java, you must include auth-crt on the class path.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutEventsResponse"
  /PutPartnerEvents:
    post:
      operationId: PutPartnerEvents
      description: This is used by SaaS partners to write events to a customer's partner event bus. Amazon Web Services customers do not use this operation. For information on calculating event batch size, see Calculating EventBridge PutEvents event entry size in the EventBridge User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.PutPartnerEvents
            default: AWSEvents.PutPartnerEvents
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Entries:
                  $ref: "#/components/schemas/PutPartnerEventsRequestEntryList"
                  description: The list of events to write to the event bus.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutPartnerEventsResponse"
  /PutPermission:
    post:
      operationId: PutPermission
      description: Running PutPermission permits the specified Amazon Web Services account or Amazon Web Services organization to put events to the specified event bus. Amazon EventBridge rules in your account are triggered by these events arriving to an event bus in your account. For another account to send events to your account, that external account must have an EventBridge rule with your account's event bus as a target. To enable multiple Amazon Web Services accounts to put events to your event bus, run PutPermission once for each of these accounts. Or, if all the accounts are members of the same Amazon Web Services organization, you can run PutPermission once specifying Principal as "*" and specifying the Amazon Web Services organization ID in Condition, to grant permissions to all accounts in that organization. If you grant permissions using an organization, then accounts in that organization must specify a RoleArn with proper permissions when they use PutTarget to add your account's event bus as a target. For more information, see Sending and Receiving Events Between Amazon Web Services Accounts in the Amazon EventBridge User Guide. The permission policy on the event bus cannot exceed 10 KB in size.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.PutPermission
            default: AWSEvents.PutPermission
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EventBusName:
                  $ref: "#/components/schemas/NonPartnerEventBusName"
                  description: The name of the event bus associated with the rule. If you omit this, the default event bus is used.
                Action:
                  $ref: "#/components/schemas/Action"
                  description: The action that you are enabling the other account to perform.
                Principal:
                  $ref: "#/components/schemas/Principal"
                  description: The 12-digit Amazon Web Services account ID that you are permitting to put events to your default event bus. Specify "*" to permit any account to put events to your default event bus. If you specify "*" without specifying Condition, avoid creating rules that may match undesirable events. To create more secure rules, make sure that the event pattern for each rule contains an account field with a specific account ID from which to receive events. Rules with an account field do not match any events sent from other accounts.
                StatementId:
                  $ref: "#/components/schemas/StatementId"
                  description: An identifier string for the external account that you are granting permissions to. If you later want to revoke the permission for this external account, specify this StatementId when you run RemovePermission. Each StatementId must be unique.
                Condition:
                  $ref: "#/components/schemas/Condition"
                  description: This parameter enables you to limit the permission to accounts that fulfill a certain condition, such as being a member of a certain Amazon Web Services organization. For more information about Amazon Web Services Organizations, see What Is Amazon Web Services Organizations in the Amazon Web Services Organizations User Guide. If you specify Condition with an Amazon Web Services organization ID, and specify "*" as the value for Principal, you grant permission to all the accounts in the named organization. The Condition is a JSON string which must contain Type, Key, and Value fields.
                Policy:
                  $ref: "#/components/schemas/String"
                  description: A JSON string that describes the permission policy statement. You can include a Policy parameter in the request instead of using the StatementId, Action, Principal, or Condition parameters.
      responses:
        "200":
          description: Success
  /PutRule:
    post:
      operationId: PutRule
      description: "Creates or updates the specified rule. Rules are enabled by default, or based on value of the state. You can disable a rule using DisableRule. A single rule watches for events from a single event bus. Events generated by Amazon Web Services services go to your account's default event bus. Events generated by SaaS partner services or applications go to the matching partner event bus. If you have custom applications or services, you can specify whether their events go to your default event bus or a custom event bus that you have created. For more information, see CreateEventBus. If you are updating an existing rule, the rule is replaced with what you specify in this PutRule command. If you omit arguments in PutRule, the old values for those arguments are not kept. Instead, they are replaced with null values. When you create or update a rule, incoming events might not immediately start matching to new or updated rules. Allow a short period of time for changes to take effect. A rule must contain at least an EventPattern or ScheduleExpression. Rules with EventPatterns are triggered when a matching event is observed. Rules with ScheduleExpressions self-trigger based on the given schedule. A rule can have both an EventPattern and a ScheduleExpression, in which case the rule triggers on matching events as well as on a schedule. When you initially create a rule, you can optionally assign one or more tags to the rule. Tags can help you organize and categorize your resources. You can also use them to scope user permissions, by granting a user permission to access or change only rules with certain tag values. To use the PutRule operation and assign tags, you must have both the events:PutRule and events:TagResource permissions. If you are updating an existing rule, any tags you specify in the PutRule operation are ignored. To update the tags of an existing rule, use TagResource and UntagResource. Most services in Amazon Web Services treat : or / as the same character in Amazon Resource Names (ARNs). However, EventBridge uses an exact match in event patterns and rules. Be sure to use the correct ARN characters when creating event patterns so that they match the ARN syntax in the event you want to match. In EventBridge, it is possible to create rules that lead to infinite loops, where a rule is fired repeatedly. For example, a rule might detect that ACLs have changed on an S3 bucket, and trigger software to change them to the desired state. If the rule is not written carefully, the subsequent change to the ACLs fires the rule again, creating an infinite loop. To prevent this, write the rules so that the triggered actions do not re-fire the same rule. For example, your rule could fire only if ACLs are found to be in a bad state, instead of after any change. An infinite loop can quickly cause higher than expected charges. We recommend that you use budgeting, which alerts you when charges exceed your specified limit. For more information, see Managing Your Costs with Budgets. To create a rule that filters for management events from Amazon Web Services services, see Receiving read-only management events from Amazon Web Services services in the EventBridge User Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.PutRule
            default: AWSEvents.PutRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/RuleName"
                  description: The name of the rule that you are creating or updating.
                ScheduleExpression:
                  $ref: "#/components/schemas/ScheduleExpression"
                  description: The scheduling expression. For example, "cron(0 20 * * ? *)" or "rate(5 minutes)".
                EventPattern:
                  $ref: "#/components/schemas/EventPattern"
                  description: The event pattern. For more information, see Amazon EventBridge event patterns in the Amazon EventBridge User Guide .
                State:
                  $ref: "#/components/schemas/RuleState"
                  description: "The state of the rule. Valid values include: DISABLED: The rule is disabled. EventBridge does not match any events against the rule. ENABLED: The rule is enabled. EventBridge matches events against the rule, except for Amazon Web Services management events delivered through CloudTrail. ENABLED_WITH_ALL_CLOUDTRAIL_MANAGEMENT_EVENTS: The rule is enabled for all events, including Amazon Web Services management events delivered through CloudTrail. Management events provide visibility into management operations that are performed on resources in your Amazon Web Services account. These are also known as control plane operations. For more information, see Logging management events in the CloudTrail User Guide, and Filtering management events from Amazon Web Services services in the Amazon EventBridge User Guide . This value is only valid for rules on the default event bus or custom event buses. It does not apply to partner event buses."
                Description:
                  $ref: "#/components/schemas/RuleDescription"
                  description: A description of the rule.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of the IAM role associated with the rule. If you're setting an event bus in another account as the target and that account granted permission to your account through an organization instead of directly by the account ID, you must specify a RoleArn with proper permissions in the Target structure, instead of here in this parameter.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The list of key-value pairs to associate with the rule.
                EventBusName:
                  $ref: "#/components/schemas/EventBusNameOrArn"
                  description: The name or ARN of the event bus to associate with this rule. If you omit this, the default event bus is used.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutRuleResponse"
  /PutTargets:
    post:
      operationId: PutTargets
      description: "Adds the specified targets to the specified rule, or updates the targets if they are already associated with the rule. Targets are the resources that are invoked when a rule is triggered. The maximum number of entries per request is 10. Each rule can have up to five (5) targets associated with it at one time. For a list of services you can configure as targets for events, see EventBridge targets in the Amazon EventBridge User Guide . Creating rules with built-in targets is supported only in the Amazon Web Services Management Console. The built-in targets are: Amazon EBS CreateSnapshot API call Amazon EC2 RebootInstances API call Amazon EC2 StopInstances API call Amazon EC2 TerminateInstances API call For some target types, PutTargets provides target-specific parameters. If the target is a Kinesis data stream, you can optionally specify which shard the event goes to by using the KinesisParameters argument. To invoke a command on multiple EC2 instances with one rule, you can use the RunCommandParameters field. To be able to make API calls against the resources that you own, Amazon EventBridge needs the appropriate permissions: For Lambda and Amazon SNS resources, EventBridge relies on resource-based policies. For EC2 instances, Kinesis Data Streams, Step Functions state machines and API Gateway APIs, EventBridge relies on IAM roles that you specify in the RoleARN argument in PutTargets. For more information, see Authentication and Access Control in the Amazon EventBridge User Guide . If another Amazon Web Services account is in the same region and has granted you permission (using PutPermission), you can send events to that account. Set that account's event bus as a target of the rules in your account. To send the matched events to the other account, specify that account's event bus as the Arn value when you run PutTargets. If your account sends events to another account, your account is charged for each sent event. Each event sent to another account is charged as a custom event. The account receiving the event is not charged. For more information, see Amazon EventBridge Pricing. Input, InputPath, and InputTransformer are not available with PutTarget if the target is an event bus of a different Amazon Web Services account. If you are setting the event bus of another account as the target, and that account granted permission to your account through an organization instead of directly by the account ID, then you must specify a RoleArn with proper permissions in the Target structure. For more information, see Sending and Receiving Events Between Amazon Web Services Accounts in the Amazon EventBridge User Guide. If you have an IAM role on a cross-account event bus target, a PutTargets call without a role on the same target (same Id and Arn) will not remove the role. For more information about enabling cross-account events, see PutPermission. Input, InputPath, and InputTransformer are mutually exclusive and optional parameters of a target. When a rule is triggered due to a matched event: If none of the following arguments are specified for a target, then the entire event is passed to the target in JSON format (unless the target is Amazon EC2 Run Command or Amazon ECS task, in which case nothing from the event is passed to the target). If Input is specified in the form of valid JSON, then the matched event is overridden with this constant. If InputPath is specified in the form of JSONPath (for example, $.detail), then only the part of the event specified in the path is passed to the target (for example, only the detail part of the event is passed). If InputTransformer is specified, then one or more specified JSONPaths are extracted from the event and used as values in a template that you specify as the input to the target. When you specify InputPath or InputTransformer, you must use JSON dot notation, not bracket notation. When you add targets to a rule and the associated rule triggers soon after, new or updated targets might not be immediately invoked. Allow a short period of time for changes to take effect. This action can partially fail if too many requests are made at the same time. If that happens, FailedEntryCount is non-zero in the response and each entry in FailedEntries provides the ID of the failed target and the error code."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.PutTargets
            default: AWSEvents.PutTargets
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Rule:
                  $ref: "#/components/schemas/RuleName"
                  description: The name of the rule.
                EventBusName:
                  $ref: "#/components/schemas/EventBusNameOrArn"
                  description: The name or ARN of the event bus associated with the rule. If you omit this, the default event bus is used.
                Targets:
                  $ref: "#/components/schemas/TargetList"
                  description: The targets to update or add to the rule.
              required:
                - Rule
                - Targets
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutTargetsResponse"
  /RemovePermission:
    post:
      operationId: RemovePermission
      description: Revokes the permission of another Amazon Web Services account to be able to put events to the specified event bus. Specify the account to revoke by the StatementId value that you associated with the account when you granted it permission with PutPermission. You can find the StatementId by using DescribeEventBus.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.RemovePermission
            default: AWSEvents.RemovePermission
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                StatementId:
                  $ref: "#/components/schemas/StatementId"
                  description: The statement ID corresponding to the account that is no longer allowed to put events to the default event bus.
                RemoveAllPermissions:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether to remove all permissions.
                EventBusName:
                  $ref: "#/components/schemas/NonPartnerEventBusName"
                  description: The name of the event bus to revoke permissions for. If you omit this, the default event bus is used.
      responses:
        "200":
          description: Success
  /RemoveTargets:
    post:
      operationId: RemoveTargets
      description: Removes the specified targets from the specified rule. When the rule is triggered, those targets are no longer be invoked. A successful execution of RemoveTargets doesn't guarantee all targets are removed from the rule, it means that the target(s) listed in the request are removed. When you remove a target, when the associated rule triggers, removed targets might continue to be invoked. Allow a short period of time for changes to take effect. This action can partially fail if too many requests are made at the same time. If that happens, FailedEntryCount is non-zero in the response and each entry in FailedEntries provides the ID of the failed target and the error code. The maximum number of entries per request is 10.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.RemoveTargets
            default: AWSEvents.RemoveTargets
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Rule:
                  $ref: "#/components/schemas/RuleName"
                  description: The name of the rule.
                EventBusName:
                  $ref: "#/components/schemas/EventBusNameOrArn"
                  description: The name or ARN of the event bus associated with the rule. If you omit this, the default event bus is used.
                Ids:
                  $ref: "#/components/schemas/TargetIdList"
                  description: The IDs of the targets to remove from the rule.
                Force:
                  $ref: "#/components/schemas/Boolean"
                  description: If this is a managed rule, created by an Amazon Web Services service on your behalf, you must specify Force as True to remove targets. This parameter is ignored for rules that are not managed rules. You can check whether a rule is a managed rule by using DescribeRule or ListRules and checking the ManagedBy field of the response.
              required:
                - Rule
                - Ids
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveTargetsResponse"
  /StartReplay:
    post:
      operationId: StartReplay
      description: Starts the specified replay. Events are not necessarily replayed in the exact same order that they were added to the archive. A replay processes events to replay based on the time in the event, and replays them using 1 minute intervals. If you specify an EventStartTime and an EventEndTime that covers a 20 minute time range, the events are replayed from the first minute of that 20 minute range first. Then the events from the second minute are replayed. You can use DescribeReplay to determine the progress of a replay. The value returned for EventLastReplayedTime indicates the time within the specified time range associated with the last event replayed.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.StartReplay
            default: AWSEvents.StartReplay
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReplayName:
                  $ref: "#/components/schemas/ReplayName"
                  description: The name of the replay to start.
                Description:
                  $ref: "#/components/schemas/ReplayDescription"
                  description: A description for the replay to start.
                EventSourceArn:
                  $ref: "#/components/schemas/ArchiveArn"
                  description: The ARN of the archive to replay events from.
                EventStartTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: A time stamp for the time to start replaying events. Only events that occurred between the EventStartTime and EventEndTime are replayed.
                EventEndTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: A time stamp for the time to stop replaying events. Only events that occurred between the EventStartTime and EventEndTime are replayed.
                Destination:
                  $ref: "#/components/schemas/ReplayDestination"
                  description: A ReplayDestination object that includes details about the destination for the replay.
              required:
                - ReplayName
                - EventSourceArn
                - EventStartTime
                - EventEndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartReplayResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Assigns one or more tags (key-value pairs) to the specified EventBridge resource. Tags can help you organize and categorize your resources. You can also use them to scope user permissions by granting a user permission to access or change only resources with certain tag values. In EventBridge, rules and event buses can be tagged. Tags don't have any semantic meaning to Amazon Web Services and are interpreted strictly as strings of characters. You can use the TagResource action with a resource that already has tags. If you specify a new tag key, this tag is appended to the list of tags associated with the resource. If you specify a tag key that is already associated with the resource, the new tag value that you specify replaces the previous value for that tag. You can associate as many as 50 tags with a resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.TagResource
            default: AWSEvents.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the EventBridge resource that you're adding tags to.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The list of key-value pairs to associate with the resource.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /TestEventPattern:
    post:
      operationId: TestEventPattern
      description: "Tests whether the specified event pattern matches the provided event. Most services in Amazon Web Services treat : or / as the same character in Amazon Resource Names (ARNs). However, EventBridge uses an exact match in event patterns and rules. Be sure to use the correct ARN characters when creating event patterns so that they match the ARN syntax in the event you want to match."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.TestEventPattern
            default: AWSEvents.TestEventPattern
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EventPattern:
                  $ref: "#/components/schemas/EventPattern"
                  description: The event pattern. For more information, see Events and Event Patterns in the Amazon EventBridge User Guide .
                Event:
                  $ref: "#/components/schemas/String"
                  description: "The event, in JSON format, to test against the event pattern. The JSON must follow the format specified in Amazon Web Services Events, and the following fields are mandatory: id account source time region resources detail-type"
              required:
                - EventPattern
                - Event
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestEventPatternResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes one or more tags from the specified EventBridge resource. In Amazon EventBridge, rules and event buses can be tagged.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.UntagResource
            default: AWSEvents.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the EventBridge resource from which you are removing tags.
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: The list of tag keys to remove from the resource.
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateApiDestination:
    post:
      operationId: UpdateApiDestination
      description: Updates an API destination.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.UpdateApiDestination
            default: AWSEvents.UpdateApiDestination
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ApiDestinationName"
                  description: The name of the API destination to update.
                Description:
                  $ref: "#/components/schemas/ApiDestinationDescription"
                  description: The name of the API destination to update.
                ConnectionArn:
                  $ref: "#/components/schemas/ConnectionArn"
                  description: The ARN of the connection to use for the API destination.
                InvocationEndpoint:
                  $ref: "#/components/schemas/HttpsEndpoint"
                  description: The URL to the endpoint to use for the API destination.
                HttpMethod:
                  $ref: "#/components/schemas/ApiDestinationHttpMethod"
                  description: The method to use for the API destination.
                InvocationRateLimitPerSecond:
                  $ref: "#/components/schemas/ApiDestinationInvocationRateLimitPerSecond"
                  description: The maximum number of invocations per second to send to the API destination.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateApiDestinationResponse"
  /UpdateArchive:
    post:
      operationId: UpdateArchive
      description: Updates the specified archive.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.UpdateArchive
            default: AWSEvents.UpdateArchive
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ArchiveName:
                  $ref: "#/components/schemas/ArchiveName"
                  description: The name of the archive to update.
                Description:
                  $ref: "#/components/schemas/ArchiveDescription"
                  description: The description for the archive.
                EventPattern:
                  $ref: "#/components/schemas/EventPattern"
                  description: The event pattern to use to filter events sent to the archive.
                RetentionDays:
                  $ref: "#/components/schemas/RetentionDays"
                  description: The number of days to retain events in the archive.
                KmsKeyIdentifier:
                  $ref: "#/components/schemas/KmsKeyIdentifier"
                  description: The identifier of the KMS customer managed key for EventBridge to use, if you choose to use a customer managed key to encrypt this archive. The identifier can be the key Amazon Resource Name (ARN), KeyId, key alias, or key alias ARN. If you do not specify a customer managed key identifier, EventBridge uses an Amazon Web Services owned key to encrypt the archive. For more information, see Identify and view keys in the Key Management Service Developer Guide. If you have specified that EventBridge use a customer managed key for encrypting the source event bus, we strongly recommend you also specify a customer managed key for any archives for the event bus as well. For more information, see Encrypting archives in the Amazon EventBridge User Guide.
              required:
                - ArchiveName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateArchiveResponse"
  /UpdateConnection:
    post:
      operationId: UpdateConnection
      description: Updates settings for a connection.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.UpdateConnection
            default: AWSEvents.UpdateConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ConnectionName"
                  description: The name of the connection to update.
                Description:
                  $ref: "#/components/schemas/ConnectionDescription"
                  description: A description for the connection.
                AuthorizationType:
                  $ref: "#/components/schemas/ConnectionAuthorizationType"
                  description: The type of authorization to use for the connection.
                AuthParameters:
                  $ref: "#/components/schemas/UpdateConnectionAuthRequestParameters"
                  description: The authorization parameters to use for the connection.
                InvocationConnectivityParameters:
                  $ref: "#/components/schemas/ConnectivityResourceParameters"
                  description: For connections to private APIs, the parameters to use for invoking the API. For more information, see Connecting to private APIs in the Amazon EventBridge User Guide .
                KmsKeyIdentifier:
                  $ref: "#/components/schemas/KmsKeyIdentifier"
                  description: The identifier of the KMS customer managed key for EventBridge to use, if you choose to use a customer managed key to encrypt this connection. The identifier can be the key Amazon Resource Name (ARN), KeyId, key alias, or key alias ARN. If you do not specify a customer managed key identifier, EventBridge uses an Amazon Web Services owned key to encrypt the connection. For more information, see Identify and view keys in the Key Management Service Developer Guide.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateConnectionResponse"
  /UpdateEndpoint:
    post:
      operationId: UpdateEndpoint
      description: Update an existing endpoint. For more information about global endpoints, see Making applications Regional-fault tolerant with global endpoints and event replication in the Amazon EventBridge User Guide .
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.UpdateEndpoint
            default: AWSEvents.UpdateEndpoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EndpointName"
                  description: The name of the endpoint you want to update.
                Description:
                  $ref: "#/components/schemas/EndpointDescription"
                  description: A description for the endpoint.
                RoutingConfig:
                  $ref: "#/components/schemas/RoutingConfig"
                  description: Configure the routing policy, including the health check and secondary Region.
                ReplicationConfig:
                  $ref: "#/components/schemas/ReplicationConfig"
                  description: Whether event replication was enabled or disabled by this request.
                EventBuses:
                  $ref: "#/components/schemas/EndpointEventBusList"
                  description: Define event buses used for replication.
                RoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The ARN of the role used by event replication for this request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEndpointResponse"
  /UpdateEventBus:
    post:
      operationId: UpdateEventBus
      description: Updates the specified event bus.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSEvents.UpdateEventBus
            default: AWSEvents.UpdateEventBus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EventBusName"
                  description: The name of the event bus.
                KmsKeyIdentifier:
                  $ref: "#/components/schemas/KmsKeyIdentifier"
                  description: "The identifier of the KMS customer managed key for EventBridge to use, if you choose to use a customer managed key to encrypt events on this event bus. The identifier can be the key Amazon Resource Name (ARN), KeyId, key alias, or key alias ARN. If you do not specify a customer managed key identifier, EventBridge uses an Amazon Web Services owned key to encrypt events on the event bus. For more information, see Identify and view keys in the Key Management Service Developer Guide. Schema discovery is not supported for event buses encrypted using a customer managed key. EventBridge returns an error if: You call CreateDiscoverer on an event bus set to use a customer managed key for encryption. You call UpdatedEventBus to set a customer managed key on an event bus with schema discovery enabled. To enable schema discovery on an event bus, choose to use an Amazon Web Services owned key. For more information, see Encrypting events in the Amazon EventBridge User Guide. If you have specified that EventBridge use a customer managed key for encrypting the source event bus, we strongly recommend you also specify a customer managed key for any archives for the event bus as well. For more information, see Encrypting archives in the Amazon EventBridge User Guide."
                Description:
                  $ref: "#/components/schemas/EventBusDescription"
                  description: The event bus description.
                DeadLetterConfig:
                  $ref: "#/components/schemas/DeadLetterConfig"
                LogConfig:
                  $ref: "#/components/schemas/LogConfig"
                  description: The logging configuration settings for the event bus. For more information, see Configuring logs for event buses in the EventBridge User Guide.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEventBusResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    EventSourceName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: aws\.partner(/[\.\-_A-Za-z0-9]+){2,}
    ReplayName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[\\.\\-_A-Za-z0-9]+"
    CancelReplayResponse:
      type: object
      properties:
        ReplayArn:
          $ref: "#/components/schemas/ReplayArn"
          description: The ARN of the replay to cancel.
        State:
          $ref: "#/components/schemas/ReplayState"
          description: The current state of the replay.
        StateReason:
          $ref: "#/components/schemas/ReplayStateReason"
          description: The reason that the replay is in the current state.
    ReplayArn:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: ^arn:aws([a-z]|\-)*:events:([a-z]|\d|\-)*:([0-9]{12})?:.+\/[\.\-_A-Za-z0-9]+$
    ReplayState:
      type: string
      enum:
        - STARTING
        - RUNNING
        - CANCELLING
        - COMPLETED
        - CANCELLED
        - FAILED
    ReplayStateReason:
      type: string
      maxLength: 512
      pattern: .*
    ApiDestinationName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[\\.\\-_A-Za-z0-9]+"
    ApiDestinationDescription:
      type: string
      maxLength: 512
      pattern: .*
    ConnectionArn:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: ^arn:aws([a-z]|\-)*:events:([a-z]|\d|\-)*:([0-9]{12})?:connection\/[\.\-_A-Za-z0-9]+\/[\-A-Za-z0-9]+$
    HttpsEndpoint:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^((%[0-9A-Fa-f]{2}|[-()_.!~*';/?:@\x26=+$,A-Za-z0-9])+)([).!';/?:,])?$
    ApiDestinationHttpMethod:
      type: string
      enum:
        - POST
        - GET
        - HEAD
        - OPTIONS
        - PUT
        - PATCH
        - DELETE
    ApiDestinationInvocationRateLimitPerSecond:
      type: integer
      minimum: 1
    CreateApiDestinationResponse:
      type: object
      properties:
        ApiDestinationArn:
          $ref: "#/components/schemas/ApiDestinationArn"
          description: The ARN of the API destination that was created by the request.
        ApiDestinationState:
          $ref: "#/components/schemas/ApiDestinationState"
          description: The state of the API destination that was created by the request.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating the time that the API destination was created.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp indicating the time that the API destination was last modified.
    ApiDestinationArn:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: ^arn:aws([a-z]|\-)*:events:([a-z]|\d|\-)*:([0-9]{12})?:api-destination\/[\.\-_A-Za-z0-9]+\/[\-A-Za-z0-9]+$
    ApiDestinationState:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
    Timestamp:
      type: string
      format: date-time
    ArchiveName:
      type: string
      minLength: 1
      maxLength: 48
      pattern: "[\\.\\-_A-Za-z0-9]+"
    EventBusArn:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: ^arn:aws([a-z]|\-)*:events:([a-z]|\d|\-)*:([0-9]{12})?:.+\/.+$
    ArchiveDescription:
      type: string
      maxLength: 512
      pattern: .*
    EventPattern:
      type: string
      maxLength: 4096
    RetentionDays:
      type: integer
      minimum: 0
    KmsKeyIdentifier:
      type: string
      maxLength: 2048
      pattern: ^[a-zA-Z0-9_\-/:]*$
    CreateArchiveResponse:
      type: object
      properties:
        ArchiveArn:
          $ref: "#/components/schemas/ArchiveArn"
          description: The ARN of the archive that was created.
        State:
          $ref: "#/components/schemas/ArchiveState"
          description: The state of the archive that was created.
        StateReason:
          $ref: "#/components/schemas/ArchiveStateReason"
          description: The reason that the archive is in the state.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the archive was created.
    ArchiveArn:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: ^arn:aws([a-z]|\-)*:events:([a-z]|\d|\-)*:([0-9]{12})?:.+\/.+$
    ArchiveState:
      type: string
      enum:
        - ENABLED
        - DISABLED
        - CREATING
        - UPDATING
        - CREATE_FAILED
        - UPDATE_FAILED
    ArchiveStateReason:
      type: string
      maxLength: 512
      pattern: .*
    ConnectionName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[\\.\\-_A-Za-z0-9]+"
    ConnectionDescription:
      type: string
      maxLength: 512
      pattern: .*
    ConnectionAuthorizationType:
      type: string
      enum:
        - BASIC
        - OAUTH_CLIENT_CREDENTIALS
        - API_KEY
    CreateConnectionAuthRequestParameters:
      description: The authorization parameters for the connection. You must include only authorization parameters for the AuthorizationType you specify.
      type: object
      properties:
        BasicAuthParameters:
          $ref: "#/components/schemas/CreateConnectionBasicAuthRequestParameters"
          description: The Basic authorization parameters to use for the connection.
        OAuthParameters:
          $ref: "#/components/schemas/CreateConnectionOAuthRequestParameters"
          description: The OAuth authorization parameters to use for the connection.
        ApiKeyAuthParameters:
          $ref: "#/components/schemas/CreateConnectionApiKeyAuthRequestParameters"
          description: The API key authorization parameters to use for the connection.
        InvocationHttpParameters:
          $ref: "#/components/schemas/ConnectionHttpParameters"
          description: The API key authorization parameters to use for the connection. Note that if you include additional parameters for the target of a rule via HttpParameters, including query strings, the parameters added for the connection take precedence.
        ConnectivityParameters:
          $ref: "#/components/schemas/ConnectivityResourceParameters"
          description: If you specify a private OAuth endpoint, the parameters for EventBridge to use when authenticating against the endpoint. For more information, see Authorization methods for connections in the Amazon EventBridge User Guide .
    CreateConnectionBasicAuthRequestParameters:
      description: Contains the Basic authorization parameters to use for the connection.
      type: object
      properties:
        Username:
          $ref: "#/components/schemas/AuthHeaderParameters"
          description: The user name to use for Basic authorization.
        Password:
          $ref: "#/components/schemas/AuthHeaderParametersSensitive"
          description: The password associated with the user name to use for Basic authorization.
      required:
        - Username
        - Password
    AuthHeaderParameters:
      type: string
      minLength: 1
      maxLength: 512
      pattern: ^[ \t]*[^\x00-\x1F:\x7F]+([ \t]+[^\x00-\x1F:\x7F]+)*[ \t]*$
    AuthHeaderParametersSensitive:
      type: string
      minLength: 1
      maxLength: 512
      pattern: ^[ \t]*[^\x00-\x1F:\x7F]+([ \t]+[^\x00-\x1F:\x7F]+)*[ \t]*$
    CreateConnectionOAuthRequestParameters:
      description: Contains the OAuth authorization parameters to use for the connection.
      type: object
      properties:
        ClientParameters:
          $ref: "#/components/schemas/CreateConnectionOAuthClientRequestParameters"
          description: The client parameters for OAuth authorization.
        AuthorizationEndpoint:
          $ref: "#/components/schemas/HttpsEndpoint"
          description: The URL to the authorization endpoint when OAuth is specified as the authorization type.
        HttpMethod:
          $ref: "#/components/schemas/ConnectionOAuthHttpMethod"
          description: The method to use for the authorization request.
        OAuthHttpParameters:
          $ref: "#/components/schemas/ConnectionHttpParameters"
          description: Details about the additional parameters to use for the connection.
      required:
        - ClientParameters
        - AuthorizationEndpoint
        - HttpMethod
    CreateConnectionOAuthClientRequestParameters:
      description: The Basic authorization parameters to use for the connection.
      type: object
      properties:
        ClientID:
          $ref: "#/components/schemas/AuthHeaderParameters"
          description: The client ID to use for OAuth authorization for the connection.
        ClientSecret:
          $ref: "#/components/schemas/AuthHeaderParametersSensitive"
          description: The client secret associated with the client ID to use for OAuth authorization for the connection.
      required:
        - ClientID
        - ClientSecret
    ConnectionOAuthHttpMethod:
      type: string
      enum:
        - GET
        - POST
        - PUT
    ConnectionHttpParameters:
      description: Any additional parameters for the connection.
      type: object
      properties:
        HeaderParameters:
          $ref: "#/components/schemas/ConnectionHeaderParametersList"
          description: Any additional header parameters for the connection.
        QueryStringParameters:
          $ref: "#/components/schemas/ConnectionQueryStringParametersList"
          description: Any additional query string parameters for the connection.
        BodyParameters:
          $ref: "#/components/schemas/ConnectionBodyParametersList"
          description: Any additional body string parameters for the connection.
    ConnectionHeaderParametersList:
      type: array
      items:
        $ref: "#/components/schemas/ConnectionHeaderParameter"
    ConnectionHeaderParameter:
      description: Additional parameter included in the header. You can include up to 100 additional header parameters per request. An event payload cannot exceed 64 KB.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/HeaderKey"
          description: The key for the parameter.
        Value:
          $ref: "#/components/schemas/HeaderValueSensitive"
          description: The value associated with the key.
        IsValueSecret:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the value is a secret.
    HeaderKey:
      type: string
      maxLength: 512
      pattern: ^[!#$%&'*+-.^_`|~0-9a-zA-Z]+$
    HeaderValueSensitive:
      type: string
      maxLength: 512
      pattern: ^[ \t]*[\x20-\x7E]+([ \t]+[\x20-\x7E]+)*[ \t]*$
    Boolean:
      type: boolean
    ConnectionQueryStringParametersList:
      type: array
      items:
        $ref: "#/components/schemas/ConnectionQueryStringParameter"
    ConnectionQueryStringParameter:
      description: Any additional query string parameter for the connection. You can include up to 100 additional query string parameters per request. Each additional parameter counts towards the event payload size, which cannot exceed 64 KB.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/QueryStringKey"
          description: The key for a query string parameter.
        Value:
          $ref: "#/components/schemas/QueryStringValueSensitive"
          description: The value associated with the key for the query string parameter.
        IsValueSecret:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the value is secret.
    QueryStringKey:
      type: string
      maxLength: 512
      pattern: "[^\\x00-\\x1F\\x7F]+"
    QueryStringValueSensitive:
      type: string
      maxLength: 512
      pattern: "[^\\x00-\\x09\\x0B\\x0C\\x0E-\\x1F\\x7F]+"
    ConnectionBodyParametersList:
      type: array
      items:
        $ref: "#/components/schemas/ConnectionBodyParameter"
    ConnectionBodyParameter:
      description: Additional parameter included in the body. You can include up to 100 additional body parameters per request. An event payload cannot exceed 64 KB.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/String"
          description: The key for the parameter.
        Value:
          $ref: "#/components/schemas/SensitiveString"
          description: The value associated with the key.
        IsValueSecret:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the value is secret.
    String:
      type: string
    SensitiveString:
      type: string
    CreateConnectionApiKeyAuthRequestParameters:
      description: The API key authorization parameters for the connection.
      type: object
      properties:
        ApiKeyName:
          $ref: "#/components/schemas/AuthHeaderParameters"
          description: The name of the API key to use for authorization.
        ApiKeyValue:
          $ref: "#/components/schemas/AuthHeaderParametersSensitive"
          description: The value for the API key to use for authorization.
      required:
        - ApiKeyName
        - ApiKeyValue
    ConnectivityResourceParameters:
      description: The parameters for EventBridge to use when invoking the resource endpoint.
      type: object
      properties:
        ResourceParameters:
          $ref: "#/components/schemas/ConnectivityResourceConfigurationArn"
          description: The parameters for EventBridge to use when invoking the resource endpoint.
      required:
        - ResourceParameters
    ConnectivityResourceConfigurationArn:
      description: The Amazon Resource Name (ARN) of the Amazon VPC Lattice resource configuration for the resource endpoint.
      type: object
      properties:
        ResourceConfigurationArn:
          $ref: "#/components/schemas/ResourceConfigurationArn"
          description: The Amazon Resource Name (ARN) of the Amazon VPC Lattice resource configuration for the resource endpoint.
      required:
        - ResourceConfigurationArn
    ResourceConfigurationArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: ^(?:^arn:[a-z0-9\-]+:vpc-lattice:[a-zA-Z0-9\-]+:\d{12}:resourceconfiguration/rcfg-[0-9a-z]{17}$|^$)
    CreateConnectionResponse:
      type: object
      properties:
        ConnectionArn:
          $ref: "#/components/schemas/ConnectionArn"
          description: The ARN of the connection that was created by the request.
        ConnectionState:
          $ref: "#/components/schemas/ConnectionState"
          description: The state of the connection that was created by the request.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp for the time that the connection was created.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp for the time that the connection was last updated.
    ConnectionState:
      type: string
      enum:
        - CREATING
        - UPDATING
        - DELETING
        - AUTHORIZED
        - DEAUTHORIZED
        - AUTHORIZING
        - DEAUTHORIZING
        - ACTIVE
        - FAILED_CONNECTIVITY
    EndpointName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[\\.\\-_A-Za-z0-9]+"
    EndpointDescription:
      type: string
      maxLength: 512
      pattern: .*
    RoutingConfig:
      description: The routing configuration of the endpoint.
      type: object
      properties:
        FailoverConfig:
          $ref: "#/components/schemas/FailoverConfig"
          description: The failover configuration for an endpoint. This includes what triggers failover and what happens when it's triggered.
      required:
        - FailoverConfig
    FailoverConfig:
      description: The failover configuration for an endpoint. This includes what triggers failover and what happens when it's triggered.
      type: object
      properties:
        Primary:
          $ref: "#/components/schemas/Primary"
          description: The main Region of the endpoint.
        Secondary:
          $ref: "#/components/schemas/Secondary"
          description: The Region that events are routed to when failover is triggered or event replication is enabled.
      required:
        - Primary
        - Secondary
    Primary:
      description: The primary Region of the endpoint.
      type: object
      properties:
        HealthCheck:
          $ref: "#/components/schemas/HealthCheck"
          description: The ARN of the health check used by the endpoint to determine whether failover is triggered.
      required:
        - HealthCheck
    HealthCheck:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: ^arn:aws([a-z]|\-)*:route53:::healthcheck/[\-a-z0-9]+$
    Secondary:
      description: The secondary Region that processes events when failover is triggered or replication is enabled.
      type: object
      properties:
        Route:
          $ref: "#/components/schemas/Route"
          description: Defines the secondary Region.
      required:
        - Route
    Route:
      type: string
      minLength: 9
      maxLength: 20
      pattern: ^[\-a-z0-9]+$
    ReplicationConfig:
      description: Endpoints can replicate all events to the secondary Region.
      type: object
      properties:
        State:
          $ref: "#/components/schemas/ReplicationState"
          description: The state of event replication.
    ReplicationState:
      type: string
      enum:
        - ENABLED
        - DISABLED
    EndpointEventBusList:
      type: array
      items:
        $ref: "#/components/schemas/EndpointEventBus"
    EndpointEventBus:
      description: The event buses the endpoint is associated with.
      type: object
      properties:
        EventBusArn:
          $ref: "#/components/schemas/NonPartnerEventBusArn"
          description: The ARN of the event bus the endpoint is associated with.
      required:
        - EventBusArn
    NonPartnerEventBusArn:
      type: string
      minLength: 1
      maxLength: 512
      pattern: ^arn:aws[a-z-]*:events:[a-z]+-[a-z-]+-\d+:\d{12}:event-bus/[\w.-]+$
    IamRoleArn:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^arn:aws[a-z-]*:iam::\d{12}:role\/[\w+=,.@/-]+$
    CreateEndpointResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EndpointName"
          description: The name of the endpoint that was created by this request.
        Arn:
          $ref: "#/components/schemas/EndpointArn"
          description: The ARN of the endpoint that was created by this request.
        RoutingConfig:
          $ref: "#/components/schemas/RoutingConfig"
          description: The routing configuration defined by this request.
        ReplicationConfig:
          $ref: "#/components/schemas/ReplicationConfig"
          description: Whether event replication was enabled or disabled by this request.
        EventBuses:
          $ref: "#/components/schemas/EndpointEventBusList"
          description: The event buses used by this request.
        RoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The ARN of the role used by event replication for this request.
        State:
          $ref: "#/components/schemas/EndpointState"
          description: The state of the endpoint that was created by this request.
    EndpointArn:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: ^arn:aws([a-z]|\-)*:events:([a-z]|\d|\-)*:([0-9]{12})?:endpoint\/[/\.\-_A-Za-z0-9]+$
    EndpointState:
      type: string
      enum:
        - ACTIVE
        - CREATING
        - UPDATING
        - DELETING
        - CREATE_FAILED
        - UPDATE_FAILED
        - DELETE_FAILED
    EventBusName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[/\\.\\-_A-Za-z0-9]+"
    EventBusDescription:
      type: string
      maxLength: 512
    DeadLetterConfig:
      description: Configuration details of the Amazon SQS queue for EventBridge to use as a dead-letter queue (DLQ). For more information, see Using dead-letter queues to process undelivered events in the EventBridge User Guide.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the SQS queue specified as the target for the dead-letter queue.
    ResourceArn:
      type: string
      minLength: 1
      maxLength: 1600
    LogConfig:
      description: The logging configuration settings for the event bus. For more information, see Configuring logs for event buses in the EventBridge User Guide.
