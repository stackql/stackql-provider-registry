        PlatformVersion:
          $ref: "#/components/schemas/String"
          description: Specifies the platform version for the task. Specify only the numeric portion of the platform version, such as 1.1.0. This structure is used only if LaunchType is FARGATE. For more information about valid platform versions, see Fargate Platform Versions in the Amazon Elastic Container Service Developer Guide.
        Group:
          $ref: "#/components/schemas/String"
          description: Specifies an ECS task group for the task. The maximum length is 255 characters.
        CapacityProviderStrategy:
          $ref: "#/components/schemas/CapacityProviderStrategy"
          description: The capacity provider strategy to use for the task. If a capacityProviderStrategy is specified, the launchType parameter must be omitted. If no capacityProviderStrategy or launchType is specified, the defaultCapacityProviderStrategy for the cluster is used.
        EnableECSManagedTags:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether to enable Amazon ECS managed tags for the task. For more information, see Tagging Your Amazon ECS Resources in the Amazon Elastic Container Service Developer Guide.
        EnableExecuteCommand:
          $ref: "#/components/schemas/Boolean"
          description: Whether or not to enable the execute command functionality for the containers in this task. If true, this enables execute command functionality on all containers in the task.
        PlacementConstraints:
          $ref: "#/components/schemas/PlacementConstraints"
          description: An array of placement constraint objects to use for the task. You can specify up to 10 constraints per task (including constraints in the task definition and those specified at runtime).
        PlacementStrategy:
          $ref: "#/components/schemas/PlacementStrategies"
          description: The placement strategy objects to use for the task. You can specify a maximum of five strategy rules per task.
        PropagateTags:
          $ref: "#/components/schemas/PropagateTags"
          description: Specifies whether to propagate the tags from the task definition to the task. If no value is specified, the tags are not propagated. Tags can only be propagated to the task during task creation. To add tags to a task after task creation, use the TagResource API action.
        ReferenceId:
          $ref: "#/components/schemas/ReferenceId"
          description: The reference ID to use for the task.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The metadata that you apply to the task to help you categorize and organize them. Each tag consists of a key and an optional value, both of which you define. To learn more, see RunTask in the Amazon ECS API Reference.
      required:
        - TaskDefinitionArn
    LimitMin1:
      type: integer
      minimum: 1
    LaunchType:
      type: string
      enum:
        - EC2
        - FARGATE
        - EXTERNAL
    NetworkConfiguration:
      description: This structure specifies the network configuration for an ECS task.
      type: object
      properties:
        awsvpcConfiguration:
          $ref: "#/components/schemas/AwsVpcConfiguration"
          description: Use this structure to specify the VPC subnets and security groups for the task, and whether a public IP address is to be used. This structure is relevant only for ECS tasks that use the awsvpc network mode.
    AwsVpcConfiguration:
      description: This structure specifies the VPC subnets and security groups for the task, and whether a public IP address is to be used. This structure is relevant only for ECS tasks that use the awsvpc network mode.
      type: object
      properties:
        Subnets:
          $ref: "#/components/schemas/StringList"
          description: Specifies the subnets associated with the task. These subnets must all be in the same VPC. You can specify as many as 16 subnets.
        SecurityGroups:
          $ref: "#/components/schemas/StringList"
          description: Specifies the security groups associated with the task. These security groups must all be in the same VPC. You can specify as many as five security groups. If you do not specify a security group, the default security group for the VPC is used.
        AssignPublicIp:
          $ref: "#/components/schemas/AssignPublicIp"
          description: Specifies whether the task's elastic network interface receives a public IP address. You can specify ENABLED only when LaunchType in EcsParameters is set to FARGATE.
      required:
        - Subnets
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    AssignPublicIp:
      type: string
      enum:
        - ENABLED
        - DISABLED
    CapacityProviderStrategy:
      type: array
      items:
        $ref: "#/components/schemas/CapacityProviderStrategyItem"
    CapacityProviderStrategyItem:
      description: The details of a capacity provider strategy. To learn more, see CapacityProviderStrategyItem in the Amazon ECS API Reference.
      type: object
      properties:
        capacityProvider:
          $ref: "#/components/schemas/CapacityProvider"
          description: The short name of the capacity provider.
        weight:
          $ref: "#/components/schemas/CapacityProviderStrategyItemWeight"
          description: The weight value designates the relative percentage of the total number of tasks launched that should use the specified capacity provider. The weight value is taken into consideration after the base value, if defined, is satisfied.
        base:
          $ref: "#/components/schemas/CapacityProviderStrategyItemBase"
          description: The base value designates how many tasks, at a minimum, to run on the specified capacity provider. Only one capacity provider in a capacity provider strategy can have a base defined. If no value is specified, the default value of 0 is used.
      required:
        - capacityProvider
    CapacityProvider:
      type: string
      minLength: 1
      maxLength: 255
    CapacityProviderStrategyItemWeight:
      type: integer
      minimum: 0
      maximum: 1000
    CapacityProviderStrategyItemBase:
      type: integer
      minimum: 0
      maximum: 100000
    PlacementConstraints:
      type: array
      items:
        $ref: "#/components/schemas/PlacementConstraint"
    PlacementConstraint:
      description: An object representing a constraint on task placement. To learn more, see Task Placement Constraints in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/PlacementConstraintType"
          description: The type of constraint. Use distinctInstance to ensure that each task in a particular group is running on a different container instance. Use memberOf to restrict the selection to a group of valid candidates.
        expression:
          $ref: "#/components/schemas/PlacementConstraintExpression"
          description: A cluster query language expression to apply to the constraint. You cannot specify an expression if the constraint type is distinctInstance. To learn more, see Cluster Query Language in the Amazon Elastic Container Service Developer Guide.
    PlacementConstraintType:
      type: string
      enum:
        - distinctInstance
        - memberOf
    PlacementConstraintExpression:
      type: string
      maxLength: 2000
    PlacementStrategies:
      type: array
      items:
        $ref: "#/components/schemas/PlacementStrategy"
    PlacementStrategy:
      description: The task placement strategy for a task or service. To learn more, see Task Placement Strategies in the Amazon Elastic Container Service Service Developer Guide.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/PlacementStrategyType"
          description: The type of placement strategy. The random placement strategy randomly places tasks on available candidates. The spread placement strategy spreads placement across available candidates evenly based on the field parameter. The binpack strategy places tasks on available candidates that have the least available amount of the resource that is specified with the field parameter. For example, if you binpack on memory, a task is placed on the instance with the least amount of remaining memory (but still enough to run the task).
        field:
          $ref: "#/components/schemas/PlacementStrategyField"
          description: The field to apply the placement strategy against. For the spread placement strategy, valid values are instanceId (or host, which has the same effect), or any platform or custom attribute that is applied to a container instance, such as attribute:ecs.availability-zone. For the binpack placement strategy, valid values are cpu and memory. For the random placement strategy, this field is not used.
    PlacementStrategyType:
      type: string
      enum:
        - random
        - spread
        - binpack
    PlacementStrategyField:
      type: string
      maxLength: 255
    PropagateTags:
      type: string
      enum:
        - TASK_DEFINITION
    ReferenceId:
      type: string
      maxLength: 1024
    BatchParameters:
      description: The custom parameters to be used when the target is an Batch job.
      type: object
      properties:
        JobDefinition:
          $ref: "#/components/schemas/String"
          description: The ARN or name of the job definition to use if the event target is an Batch job. This job definition must already exist.
        JobName:
          $ref: "#/components/schemas/String"
          description: The name to use for this execution of the job, if the target is an Batch job.
        ArrayProperties:
          $ref: "#/components/schemas/BatchArrayProperties"
          description: The array properties for the submitted job, such as the size of the array. The array size can be between 2 and 10,000. If you specify array properties for a job, it becomes an array job. This parameter is used only if the target is an Batch job.
        RetryStrategy:
          $ref: "#/components/schemas/BatchRetryStrategy"
          description: The retry strategy to use for failed jobs, if the target is an Batch job. The retry strategy is the number of times to retry the failed job execution. Valid values are 1–10. When you specify a retry strategy here, it overrides the retry strategy defined in the job definition.
      required:
        - JobDefinition
        - JobName
    BatchArrayProperties:
      description: The array properties for the submitted job, such as the size of the array. The array size can be between 2 and 10,000. If you specify array properties for a job, it becomes an array job. This parameter is used only if the target is an Batch job.
      type: object
      properties:
        Size:
          $ref: "#/components/schemas/Integer"
          description: The size of the array, if this is an array batch job. Valid values are integers between 2 and 10,000.
    Integer:
      type: integer
    BatchRetryStrategy:
      description: The retry strategy to use for failed jobs, if the target is an Batch job. If you specify a retry strategy here, it overrides the retry strategy defined in the job definition.
      type: object
      properties:
        Attempts:
          $ref: "#/components/schemas/Integer"
          description: The number of times to attempt to retry, if the job fails. Valid values are 1–10.
    SqsParameters:
      description: This structure includes the custom parameter to be used when the target is an SQS FIFO queue.
      type: object
      properties:
        MessageGroupId:
          $ref: "#/components/schemas/MessageGroupId"
          description: The FIFO message group ID to use as the target.
    MessageGroupId:
      type: string
      maxLength: 100
    HttpParameters:
      description: These are custom parameter to be used when the target is an API Gateway APIs or EventBridge ApiDestinations. In the latter case, these are merged with any InvocationParameters specified on the Connection, with any values from the Connection taking precedence.
      type: object
      properties:
        PathParameterValues:
          $ref: "#/components/schemas/PathParameterList"
          description: The path parameter values to be used to populate API Gateway API or EventBridge ApiDestination path wildcards ("*").
        HeaderParameters:
          type: object
          properties: {}
          description: The headers that need to be sent as part of request invoking the API Gateway API or EventBridge ApiDestination.
        QueryStringParameters:
          type: object
          properties: {}
          description: The query string keys/values that need to be sent as part of request invoking the API Gateway API or EventBridge ApiDestination.
    PathParameterList:
      type: array
      items:
        $ref: "#/components/schemas/PathParameter"
    PathParameter:
      type: string
      pattern: ^(?!\s*$).+
    RedshiftDataParameters:
      description: These are custom parameters to be used when the target is a Amazon Redshift cluster to invoke the Amazon Redshift Data API ExecuteStatement based on EventBridge events.
      type: object
      properties:
        SecretManagerArn:
          $ref: "#/components/schemas/RedshiftSecretManagerArn"
          description: The name or ARN of the secret that enables access to the database. Required when authenticating using Amazon Web Services Secrets Manager.
        Database:
          $ref: "#/components/schemas/Database"
          description: The name of the database. Required when authenticating using temporary credentials.
        DbUser:
          $ref: "#/components/schemas/DbUser"
          description: The database user name. Required when authenticating using temporary credentials.
        Sql:
          $ref: "#/components/schemas/Sql"
          description: The SQL statement text to run.
        StatementName:
          $ref: "#/components/schemas/StatementName"
          description: The name of the SQL statement. You can name the SQL statement when you create it to identify the query.
        WithEvent:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether to send an event back to EventBridge after the SQL statement runs.
        Sqls:
          $ref: "#/components/schemas/Sqls"
          description: One or more SQL statements to run. The SQL statements are run as a single transaction. They run serially in the order of the array. Subsequent SQL statements don't start until the previous statement in the array completes. If any SQL statement fails, then because they are run as one transaction, all work is rolled back.
      required:
        - Database
    RedshiftSecretManagerArn:
      description: Optional SecretManager ARN which stores the database credentials
      type: string
      minLength: 1
      maxLength: 1600
      pattern: (^arn:aws([a-z]|\-)*:secretsmanager:[a-z0-9-.]+:.*)|(\$(\.[\w_-]+(\[(\d+|\*)\])*)*)
    Database:
      description: Redshift Database
      type: string
      minLength: 1
      maxLength: 64
    DbUser:
      description: Database user name
      type: string
      minLength: 1
      maxLength: 128
    Sql:
      description: A single Redshift SQL
      type: string
      minLength: 1
      maxLength: 100000
    StatementName:
      description: A name for Redshift DataAPI statement which can be used as filter of ListStatement.
      type: string
      minLength: 1
      maxLength: 500
    Sqls:
      description: A list of SQLs.
      type: array
      items:
        $ref: "#/components/schemas/Sql"
    SageMakerPipelineParameters:
      description: These are custom parameters to use when the target is a SageMaker AI Model Building Pipeline that starts based on EventBridge events.
      type: object
      properties:
        PipelineParameterList:
          $ref: "#/components/schemas/SageMakerPipelineParameterList"
          description: List of Parameter names and values for SageMaker AI Model Building Pipeline execution.
    SageMakerPipelineParameterList:
      type: array
      items:
        $ref: "#/components/schemas/SageMakerPipelineParameter"
    SageMakerPipelineParameter:
      description: Name/Value pair of a parameter to start execution of a SageMaker AI Model Building Pipeline.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/SageMakerPipelineParameterName"
          description: Name of parameter to start execution of a SageMaker AI Model Building Pipeline.
        Value:
          $ref: "#/components/schemas/SageMakerPipelineParameterValue"
          description: Value of parameter to start execution of a SageMaker AI Model Building Pipeline.
      required:
        - Name
        - Value
    SageMakerPipelineParameterName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^[a-zA-Z0-9](-*[a-zA-Z0-9])*$
    SageMakerPipelineParameterValue:
      type: string
      maxLength: 1024
    RetryPolicy:
      description: A RetryPolicy object that includes information about the retry policy settings.
      type: object
      properties:
        MaximumRetryAttempts:
          $ref: "#/components/schemas/MaximumRetryAttempts"
          description: The maximum number of retry attempts to make before the request fails. Retry attempts continue until either the maximum number of attempts is made or until the duration of the MaximumEventAgeInSeconds is met.
        MaximumEventAgeInSeconds:
          $ref: "#/components/schemas/MaximumEventAgeInSeconds"
          description: The maximum amount of time, in seconds, to continue to make retry attempts.
    MaximumRetryAttempts:
      type: integer
      minimum: 0
      maximum: 185
    MaximumEventAgeInSeconds:
      type: integer
      minimum: 60
      maximum: 86400
    AppSyncParameters:
      description: Contains the GraphQL operation to be parsed and executed, if the event target is an AppSync API.
      type: object
      properties:
        GraphQLOperation:
          $ref: "#/components/schemas/GraphQLOperation"
          description: The GraphQL operation; that is, the query, mutation, or subscription to be parsed and executed by the GraphQL service. For more information, see Operations in the AppSync User Guide.
    GraphQLOperation:
      type: string
      minLength: 1
      maxLength: 1048576
    PutEventsRequestEntryList:
      type: array
      items:
        $ref: "#/components/schemas/PutEventsRequestEntry"
    PutEventsRequestEntry:
      description: Represents an event to be submitted.
      type: object
      properties:
        Time:
          $ref: "#/components/schemas/EventTime"
          description: The time stamp of the event, per RFC3339. If no time stamp is provided, the time stamp of the PutEvents call is used.
        Source:
          $ref: "#/components/schemas/String"
          description: The source of the event. Detail, DetailType, and Source are required for EventBridge to successfully send an event to an event bus. If you include event entries in a request that do not include each of those properties, EventBridge fails that entry. If you submit a request in which none of the entries have each of these properties, EventBridge fails the entire request.
        Resources:
          $ref: "#/components/schemas/EventResourceList"
          description: Amazon Web Services resources, identified by Amazon Resource Name (ARN), which the event primarily concerns. Any number, including zero, may be present.
        DetailType:
          $ref: "#/components/schemas/String"
          description: Free-form string, with a maximum of 128 characters, used to decide what fields to expect in the event detail. Detail, DetailType, and Source are required for EventBridge to successfully send an event to an event bus. If you include event entries in a request that do not include each of those properties, EventBridge fails that entry. If you submit a request in which none of the entries have each of these properties, EventBridge fails the entire request.
        Detail:
          $ref: "#/components/schemas/String"
          description: A valid JSON object. There is no other schema imposed. The JSON object may contain fields and nested sub-objects. Detail, DetailType, and Source are required for EventBridge to successfully send an event to an event bus. If you include event entries in a request that do not include each of those properties, EventBridge fails that entry. If you submit a request in which none of the entries have each of these properties, EventBridge fails the entire request.
        EventBusName:
          $ref: "#/components/schemas/NonPartnerEventBusNameOrArn"
          description: The name or ARN of the event bus to receive the event. Only the rules that are associated with this event bus are used to match the event. If you omit this, the default event bus is used. If you're using a global endpoint with a custom bus, you can enter either the name or Amazon Resource Name (ARN) of the event bus in either the primary or secondary Region here. EventBridge then determines the corresponding event bus in the other Region based on the endpoint referenced by the EndpointId. Specifying the event bus ARN is preferred.
        TraceHeader:
          $ref: "#/components/schemas/TraceHeader"
          description: An X-Ray trace header, which is an http header (X-Amzn-Trace-Id) that contains the trace-id associated with the event. To learn more about X-Ray trace headers, see Tracing header in the X-Ray Developer Guide.
    EventTime:
      type: string
      format: date-time
    EventResourceList:
      type: array
      items:
        $ref: "#/components/schemas/EventResource"
    EventResource:
      type: string
      maxLength: 2048
    NonPartnerEventBusNameOrArn:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: (arn:aws[\w-]*:events:[a-z]+-[a-z]+-[\w-]+:[0-9]{12}:event-bus\/)?[\.\-_A-Za-z0-9]+
    TraceHeader:
      type: string
      minLength: 1
      maxLength: 500
    PutEventsResponse:
      type: object
      properties:
        FailedEntryCount:
          $ref: "#/components/schemas/Integer"
          description: The number of failed entries.
        Entries:
          $ref: "#/components/schemas/PutEventsResultEntryList"
          description: The successfully and unsuccessfully ingested events results. If the ingestion was successful, the entry has the event ID in it. Otherwise, you can use the error code and error message to identify the problem with the entry. For each record, the index of the response element is the same as the index in the request array.
    PutEventsResultEntryList:
      type: array
      items:
        $ref: "#/components/schemas/PutEventsResultEntry"
    PutEventsResultEntry:
      description: Represents the results of an event submitted to an event bus. If the submission was successful, the entry has the event ID in it. Otherwise, you can use the error code and error message to identify the problem with the entry. For information about the errors that are common to all actions, see Common Errors.
      type: object
      properties:
        EventId:
          $ref: "#/components/schemas/EventId"
          description: The ID of the event.
        ErrorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: "The error code that indicates why the event submission failed. Retryable errors include: InternalFailure The request processing has failed because of an unknown error, exception or failure. ThrottlingException The request was denied due to request throttling. Non-retryable errors include: AccessDeniedException You do not have sufficient access to perform this action. InvalidAccountIdException The account ID provided is not valid. InvalidArgument A specified parameter is not valid. MalformedDetail The JSON provided is not valid. RedactionFailure Redacting the CloudTrail event failed. NotAuthorizedForSourceException You do not have permissions to publish events with this source onto this event bus. NotAuthorizedForDetailTypeException You do not have permissions to publish events with this detail type onto this event bus."
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message that explains why the event submission failed.
    EventId:
      type: string
      maxLength: 64
    ErrorCode:
      type: string
    ErrorMessage:
      type: string
    PutPartnerEventsRequestEntryList:
      type: array
      items:
        $ref: "#/components/schemas/PutPartnerEventsRequestEntry"
    PutPartnerEventsRequestEntry:
      description: The details about an event generated by an SaaS partner.
      type: object
      properties:
        Time:
          $ref: "#/components/schemas/EventTime"
          description: The date and time of the event.
        Source:
          $ref: "#/components/schemas/EventSourceName"
          description: The event source that is generating the entry. Detail, DetailType, and Source are required for EventBridge to successfully send an event to an event bus. If you include event entries in a request that do not include each of those properties, EventBridge fails that entry. If you submit a request in which none of the entries have each of these properties, EventBridge fails the entire request.
        Resources:
          $ref: "#/components/schemas/EventResourceList"
          description: Amazon Web Services resources, identified by Amazon Resource Name (ARN), which the event primarily concerns. Any number, including zero, may be present.
        DetailType:
          $ref: "#/components/schemas/String"
          description: A free-form string, with a maximum of 128 characters, used to decide what fields to expect in the event detail. Detail, DetailType, and Source are required for EventBridge to successfully send an event to an event bus. If you include event entries in a request that do not include each of those properties, EventBridge fails that entry. If you submit a request in which none of the entries have each of these properties, EventBridge fails the entire request.
        Detail:
          $ref: "#/components/schemas/String"
          description: A valid JSON string. There is no other schema imposed. The JSON string may contain fields and nested sub-objects. Detail, DetailType, and Source are required for EventBridge to successfully send an event to an event bus. If you include event entries in a request that do not include each of those properties, EventBridge fails that entry. If you submit a request in which none of the entries have each of these properties, EventBridge fails the entire request.
    PutPartnerEventsResponse:
      type: object
      properties:
        FailedEntryCount:
          $ref: "#/components/schemas/Integer"
          description: The number of events from this operation that could not be written to the partner event bus.
        Entries:
          $ref: "#/components/schemas/PutPartnerEventsResultEntryList"
          description: The results for each event entry the partner submitted in this request. If the event was successfully submitted, the entry has the event ID in it. Otherwise, you can use the error code and error message to identify the problem with the entry. For each record, the index of the response element is the same as the index in the request array.
    PutPartnerEventsResultEntryList:
      type: array
      items:
        $ref: "#/components/schemas/PutPartnerEventsResultEntry"
    PutPartnerEventsResultEntry:
      description: The result of an event entry the partner submitted in this request. If the event was successfully submitted, the entry has the event ID in it. Otherwise, you can use the error code and error message to identify the problem with the entry.
      type: object
      properties:
        EventId:
          $ref: "#/components/schemas/EventId"
          description: The ID of the event.
        ErrorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code that indicates why the event submission failed.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message that explains why the event submission failed.
    NonPartnerEventBusName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\.\\-_A-Za-z0-9]+"
    Action:
      type: string
      minLength: 1
      maxLength: 64
      pattern: events:[a-zA-Z]+
    Principal:
      type: string
      minLength: 1
      maxLength: 12
      pattern: (\d{12}|\*)
    StatementId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9-_]+"
    Condition:
      description: "A JSON string which you can use to limit the event bus permissions you are granting to only accounts that fulfill the condition. Currently, the only supported condition is membership in a certain Amazon Web Services organization. The string must contain Type, Key, and Value fields. The Value field specifies the ID of the Amazon Web Services organization. Following is an example value for Condition: '{\"Type\" : \"StringEquals\", \"Key\": \"aws:PrincipalOrgID\", \"Value\": \"o-1234567890\"}'"
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/String"
          description: Specifies the type of condition. Currently the only supported value is StringEquals.
        Key:
          $ref: "#/components/schemas/String"
          description: Specifies the key for the condition. Currently the only supported key is aws:PrincipalOrgID.
        Value:
          $ref: "#/components/schemas/String"
          description: Specifies the value for the key. Currently, this must be the ID of the organization.
      required:
        - Type
        - Key
        - Value
    PutRuleResponse:
      type: object
      properties:
        RuleArn:
          $ref: "#/components/schemas/RuleArn"
          description: The Amazon Resource Name (ARN) of the rule.
    PutTargetsResponse:
      type: object
      properties:
        FailedEntryCount:
          $ref: "#/components/schemas/Integer"
