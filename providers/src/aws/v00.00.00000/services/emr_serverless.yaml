        - SUBMITTED
        - PENDING
        - SCHEDULED
        - RUNNING
        - SUCCESS
        - FAILED
        - CANCELLING
        - CANCELLED
        - QUEUED
    ConfigurationOverrides:
      description: A configuration specification to be used to override existing configurations.
      type: object
      properties:
        applicationConfiguration:
          $ref: "#/components/schemas/ConfigurationList"
