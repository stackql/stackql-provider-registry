          description: A list of Amazon Resource Names (ARNs) to use as an execution IAM policy.
    PolicyDocument:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ([    -ÿ]+)
    PolicyArnList:
      type: array
      items:
        $ref: "#/components/schemas/Arn"
    Arn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: "([    -~         -퟿-�က0-ჿFF]+)"
    JobRunState:
      type: string
