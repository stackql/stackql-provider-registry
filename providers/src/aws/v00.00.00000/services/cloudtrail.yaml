                Prompt:
                  $ref: "#/components/schemas/Prompt"
                  description: The prompt that you want to use to generate the query. The prompt must be in English. For example prompts, see Example prompts in the CloudTrail user guide.
              required:
                - EventDataStores
                - Prompt
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateQueryResponse"
