      pattern: \d+
    DescribeQueryResponse:
      type: object
      properties:
        QueryId:
          $ref: "#/components/schemas/UUID"
          description: The ID of the query.
        QueryString:
          $ref: "#/components/schemas/QueryStatement"
          description: The SQL code of a query.
        QueryStatus:
          $ref: "#/components/schemas/QueryStatus"
          description: The status of a query. Values for QueryStatus include QUEUED, RUNNING, FINISHED, FAILED, TIMED_OUT, or CANCELLED
        QueryStatistics:
          $ref: "#/components/schemas/QueryStatisticsForDescribeQuery"
          description: Metadata about a query, including the number of events that were matched, the total number of events scanned, the query run time in milliseconds, and the query's creation time.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message returned if a query failed.
        DeliveryS3Uri:
          $ref: "#/components/schemas/DeliveryS3Uri"
          description: The URI for the S3 bucket where CloudTrail delivered query results, if applicable.
        DeliveryStatus:
          $ref: "#/components/schemas/DeliveryStatus"
          description: The delivery status.
        Prompt:
          $ref: "#/components/schemas/Prompt"
          description: The prompt used for a generated query. For information about generated queries, see Create CloudTrail Lake queries from natural language prompts in the CloudTrail user guide.
        EventDataStoreOwnerAccountId:
          $ref: "#/components/schemas/AccountId"
          description: The account ID of the event data store owner.
    QueryStatisticsForDescribeQuery:
      description: Gets metadata about a query, including the number of events that were matched, the total number of events scanned, the query run time in milliseconds, and the query's creation time.
      type: object
      properties:
        EventsMatched:
          $ref: "#/components/schemas/Long"
          description: The number of events that matched a query.
        EventsScanned:
          $ref: "#/components/schemas/Long"
          description: The number of events that the query scanned in the event data store.
        BytesScanned:
          $ref: "#/components/schemas/Long"
          description: The total bytes that the query scanned in the event data store. This value matches the number of bytes for which your account is billed for the query, unless the query is still running.
        ExecutionTimeInMillis:
          $ref: "#/components/schemas/Integer"
          description: The query's run time, in milliseconds.
        CreationTime:
          $ref: "#/components/schemas/Date"
          description: The creation time of the query.
    Long:
      type: integer
      format: int64
    Integer:
      type: integer
    ErrorMessage:
      type: string
      minLength: 4
      maxLength: 1000
      pattern: .*
    DeliveryS3Uri:
      type: string
      maxLength: 1024
      pattern: s3://[a-z0-9][\.\-a-z0-9]{1,61}[a-z0-9](/.*)?
    DeliveryStatus:
      type: string
      enum:
        - SUCCESS
        - FAILED
        - FAILED_SIGNING_FILE
        - PENDING
        - RESOURCE_NOT_FOUND
        - ACCESS_DENIED
        - ACCESS_DENIED_SIGNING_FILE
        - CANCELLED
        - UNKNOWN
    Prompt:
      type: string
      minLength: 3
      maxLength: 500
      pattern: ^[ -~\n]*$
    TrailNameList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    DescribeTrailsResponse:
      description: Returns the objects or data listed below if successful. Otherwise, returns an error.
      type: object
      properties:
        trailList:
          $ref: "#/components/schemas/TrailList"
          description: The list of trail objects. Trail objects with string values are only returned if values for the objects exist in a trail's configuration. For example, SNSTopicName and SNSTopicARN are only returned in results if a trail is configured to send SNS notifications. Similarly, KMSKeyId only appears in results if a trail's log files are encrypted with KMS customer managed keys.
    TrailList:
      type: array
      items:
        $ref: "#/components/schemas/Trail"
    Trail:
      description: The settings for a trail.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: Name of the trail set by calling CreateTrail. The maximum length is 128 characters.
        S3BucketName:
          $ref: "#/components/schemas/String"
          description: Name of the Amazon S3 bucket into which CloudTrail delivers your trail files. See Amazon S3 Bucket naming rules.
        S3KeyPrefix:
          $ref: "#/components/schemas/String"
          description: Specifies the Amazon S3 key prefix that comes after the name of the bucket you have designated for log file delivery. For more information, see Finding Your CloudTrail Log Files. The maximum length is 200 characters.
        SnsTopicName:
          $ref: "#/components/schemas/String"
          description: This field is no longer in use. Use SnsTopicARN.
        SnsTopicARN:
          $ref: "#/components/schemas/String"
          description: Specifies the ARN of the Amazon SNS topic that CloudTrail uses to send notifications when log files are delivered. The following is the format of a topic ARN. arn:aws:sns:us-east-2:123456789012:MyTopic
        IncludeGlobalServiceEvents:
          $ref: "#/components/schemas/Boolean"
          description: Set to True to include Amazon Web Services API calls from Amazon Web Services global services such as IAM. Otherwise, False.
        IsMultiRegionTrail:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the trail exists only in one Region or exists in all Regions.
        HomeRegion:
          $ref: "#/components/schemas/String"
          description: The Region in which the trail was created.
        TrailARN:
          $ref: "#/components/schemas/String"
          description: Specifies the ARN of the trail. The following is the format of a trail ARN. arn:aws:cloudtrail:us-east-2:123456789012:trail/MyTrail
        LogFileValidationEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether log file validation is enabled.
        CloudWatchLogsLogGroupArn:
          $ref: "#/components/schemas/String"
          description: Specifies an Amazon Resource Name (ARN), a unique identifier that represents the log group to which CloudTrail logs will be delivered.
        CloudWatchLogsRoleArn:
          $ref: "#/components/schemas/String"
          description: Specifies the role for the CloudWatch Logs endpoint to assume to write to a user's log group.
        KmsKeyId:
          $ref: "#/components/schemas/String"
          description: Specifies the KMS key ID that encrypts the logs and digest files delivered by CloudTrail. The value is a fully specified ARN to a KMS key in the following format. arn:aws:kms:us-east-2:123456789012:key/12345678-1234-1234-1234-123456789012
        HasCustomEventSelectors:
          $ref: "#/components/schemas/Boolean"
          description: Specifies if the trail has custom event selectors.
        HasInsightSelectors:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether a trail has insight types specified in an InsightSelector list.
        IsOrganizationTrail:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the trail is an organization trail.
    DisableFederationResponse:
      type: object
      properties:
        EventDataStoreArn:
          $ref: "#/components/schemas/EventDataStoreArn"
          description: The ARN of the event data store for which you disabled Lake query federation.
        FederationStatus:
          $ref: "#/components/schemas/FederationStatus"
          description: The federation status.
    FederationStatus:
      type: string
      enum:
        - ENABLING
        - ENABLED
        - DISABLING
        - DISABLED
    FederationRoleArn:
      type: string
      minLength: 3
      maxLength: 125
      pattern: ^[a-zA-Z0-9._/\-:@=\+,\.]+$
    EnableFederationResponse:
      type: object
      properties:
        EventDataStoreArn:
          $ref: "#/components/schemas/EventDataStoreArn"
          description: The ARN of the event data store for which you enabled Lake query federation.
        FederationStatus:
          $ref: "#/components/schemas/FederationStatus"
          description: The federation status.
        FederationRoleArn:
          $ref: "#/components/schemas/FederationRoleArn"
          description: The ARN of the federation role.
    EventDataStoreList:
      type: array
      items:
        $ref: "#/components/schemas/EventDataStoreArn"
    GenerateQueryResponse:
      type: object
      properties:
        QueryStatement:
          $ref: "#/components/schemas/QueryStatement"
          description: The SQL query statement generated from the prompt.
        QueryAlias:
          $ref: "#/components/schemas/QueryAlias"
          description: An alias that identifies the prompt. When you run the StartQuery operation, you can pass in either the QueryAlias or QueryStatement parameter.
        EventDataStoreOwnerAccountId:
          $ref: "#/components/schemas/AccountId"
          description: The account ID of the event data store owner.
    GetChannelResponse:
      type: object
      properties:
        ChannelArn:
          $ref: "#/components/schemas/ChannelArn"
          description: The ARN of an channel returned by a GetChannel request.
        Name:
          $ref: "#/components/schemas/ChannelName"
          description: The name of the CloudTrail channel. For service-linked channels, the name is aws-service-channel/service-name/custom-suffix where service-name represents the name of the Amazon Web Services service that created the channel and custom-suffix represents the suffix generated by the Amazon Web Services service.
        Source:
          $ref: "#/components/schemas/Source"
          description: The source for the CloudTrail channel.
        SourceConfig:
          $ref: "#/components/schemas/SourceConfig"
          description: Provides information about the advanced event selectors configured for the channel, and whether the channel applies to all Regions or a single Region.
        Destinations:
          $ref: "#/components/schemas/Destinations"
          description: The destinations for the channel. For channels created for integrations, the destinations are the event data stores that log events arriving through the channel. For service-linked channels, the destination is the Amazon Web Services service that created the service-linked channel to receive events.
        IngestionStatus:
          $ref: "#/components/schemas/IngestionStatus"
          description: A table showing information about the most recent successful and failed attempts to ingest events.
    SourceConfig:
      description: Contains configuration information about the channel.
      type: object
      properties:
        ApplyToAllRegions:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the channel applies to a single Region or to all Regions.
        AdvancedEventSelectors:
          $ref: "#/components/schemas/AdvancedEventSelectors"
          description: The advanced event selectors that are configured for the channel.
    IngestionStatus:
      description: A table showing information about the most recent successful and failed attempts to ingest events.
      type: object
      properties:
        LatestIngestionSuccessTime:
          $ref: "#/components/schemas/Date"
          description: The time stamp of the most recent successful ingestion of events for the channel.
        LatestIngestionSuccessEventID:
          $ref: "#/components/schemas/UUID"
          description: The event ID of the most recent successful ingestion of events.
        LatestIngestionErrorCode:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error code for the most recent failure to ingest events.
        LatestIngestionAttemptTime:
          $ref: "#/components/schemas/Date"
          description: The time stamp of the most recent attempt to ingest events on the channel.
        LatestIngestionAttemptEventID:
          $ref: "#/components/schemas/UUID"
          description: The event ID of the most recent attempt to ingest events.
    GetDashboardResponse:
      type: object
      properties:
        DashboardArn:
          $ref: "#/components/schemas/DashboardArn"
          description: The ARN for the dashboard.
        Type:
          $ref: "#/components/schemas/DashboardType"
          description: The type of dashboard.
        Status:
          $ref: "#/components/schemas/DashboardStatus"
          description: The status of the dashboard.
        Widgets:
          $ref: "#/components/schemas/WidgetList"
          description: An array of widgets for the dashboard.
        RefreshSchedule:
          $ref: "#/components/schemas/RefreshSchedule"
          description: The refresh schedule for the dashboard, if configured.
        CreatedTimestamp:
          $ref: "#/components/schemas/Date"
          description: The timestamp that shows when the dashboard was created.
        UpdatedTimestamp:
          $ref: "#/components/schemas/Date"
          description: The timestamp that shows when the dashboard was last updated.
        LastRefreshId:
          $ref: "#/components/schemas/RefreshId"
          description: The ID of the last dashboard refresh.
        LastRefreshFailureReason:
          $ref: "#/components/schemas/ErrorMessage"
          description: Provides information about failures for the last scheduled refresh.
        TerminationProtectionEnabled:
          $ref: "#/components/schemas/TerminationProtectionEnabled"
          description: Indicates whether termination protection is enabled for the dashboard.
    DashboardStatus:
      type: string
      enum:
        - CREATING
        - CREATED
        - UPDATING
        - UPDATED
        - DELETING
    GetEventConfigurationResponse:
      type: object
      properties:
        TrailARN:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the trail for which the event configuration settings are returned.
        EventDataStoreArn:
          $ref: "#/components/schemas/EventDataStoreArn"
          description: The Amazon Resource Name (ARN) or ID suffix of the ARN of the event data store for which the event configuration settings are returned.
        MaxEventSize:
          $ref: "#/components/schemas/MaxEventSize"
          description: The maximum allowed size for events stored in the specified event data store.
        ContextKeySelectors:
          $ref: "#/components/schemas/ContextKeySelectors"
          description: The list of context key selectors that are configured for the event data store.
        AggregationConfigurations:
          $ref: "#/components/schemas/AggregationConfigurations"
          description: The list of aggregation configurations that are configured for the trail.
    MaxEventSize:
      type: string
      enum:
        - Standard
        - Large
    ContextKeySelectors:
      type: array
      items:
        $ref: "#/components/schemas/ContextKeySelector"
    ContextKeySelector:
      description: An object that contains information types to be included in CloudTrail enriched events.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/Type"
          description: Specifies the type of the event record field in ContextKeySelector. Valid values include RequestContext, TagContext.
        Equals:
          $ref: "#/components/schemas/OperatorTargetList"
          description: A list of keys defined by Type to be included in CloudTrail enriched events.
      required:
        - Type
        - Equals
    Type:
      type: string
      enum:
        - TagContext
        - RequestContext
    OperatorTargetList:
      type: array
      items:
        $ref: "#/components/schemas/OperatorTargetListMember"
    OperatorTargetListMember:
      type: string
      minLength: 1
      maxLength: 128
    AggregationConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/AggregationConfiguration"
    AggregationConfiguration:
      description: An object that contains configuration settings for aggregating events.
      type: object
      properties:
        Templates:
          $ref: "#/components/schemas/Templates"
          description: A list of aggregation templates that can be used to configure event aggregation.
        EventCategory:
          $ref: "#/components/schemas/EventCategoryAggregation"
          description: Specifies the event category for which aggregation should be performed.
      required:
        - Templates
        - EventCategory
    Templates:
      type: array
      items:
        $ref: "#/components/schemas/Template"
    Template:
      description: Specifies the type of the aggregation templates in the aggregation configuration. Valid values include API_ACTIVITY, RESOURCE_ACCESS and USER_ACTIONS.
      type: string
      enum:
        - API_ACTIVITY
        - RESOURCE_ACCESS
        - USER_ACTIONS
    EventCategoryAggregation:
      type: string
      enum:
        - Data
    GetEventDataStoreResponse:
      type: object
      properties:
        EventDataStoreArn:
          $ref: "#/components/schemas/EventDataStoreArn"
          description: The event data store Amazon Resource Number (ARN).
        Name:
          $ref: "#/components/schemas/EventDataStoreName"
          description: The name of the event data store.
        Status:
          $ref: "#/components/schemas/EventDataStoreStatus"
          description: The status of an event data store.
        AdvancedEventSelectors:
          $ref: "#/components/schemas/AdvancedEventSelectors"
          description: The advanced event selectors used to select events for the data store.
        MultiRegionEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the event data store includes events from all Regions, or only from the Region in which it was created.
        OrganizationEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether an event data store is collecting logged events for an organization in Organizations.
        RetentionPeriod:
          $ref: "#/components/schemas/RetentionPeriod"
          description: The retention period of the event data store, in days.
        TerminationProtectionEnabled:
          $ref: "#/components/schemas/TerminationProtectionEnabled"
          description: Indicates that termination protection is enabled.
        CreatedTimestamp:
          $ref: "#/components/schemas/Date"
          description: The timestamp of the event data store's creation.
        UpdatedTimestamp:
          $ref: "#/components/schemas/Date"
          description: Shows the time that an event data store was updated, if applicable. UpdatedTimestamp is always either the same or newer than the time shown in CreatedTimestamp.
        KmsKeyId:
          $ref: "#/components/schemas/EventDataStoreKmsKeyId"
          description: Specifies the KMS key ID that encrypts the events delivered by CloudTrail. The value is a fully specified ARN to a KMS key in the following format. arn:aws:kms:us-east-2:123456789012:key/12345678-1234-1234-1234-123456789012
        BillingMode:
          $ref: "#/components/schemas/BillingMode"
          description: The billing mode for the event data store.
        FederationStatus:
          $ref: "#/components/schemas/FederationStatus"
          description: Indicates the Lake query federation status. The status is ENABLED if Lake query federation is enabled, or DISABLED if Lake query federation is disabled. You cannot delete an event data store if the FederationStatus is ENABLED.
        FederationRoleArn:
          $ref: "#/components/schemas/FederationRoleArn"
          description: If Lake query federation is enabled, provides the ARN of the federation role used to access the resources for the federated event data store.
        PartitionKeys:
          $ref: "#/components/schemas/PartitionKeyList"
          description: The partition keys for the event data store. To improve query performance and efficiency, CloudTrail Lake organizes event data into partitions based on values derived from partition keys.
    PartitionKeyList:
      type: array
      items:
        $ref: "#/components/schemas/PartitionKey"
    PartitionKey:
      description: Contains information about a partition key for an event data store.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/PartitionKeyName"
          description: The name of the partition key.
        Type:
          $ref: "#/components/schemas/PartitionKeyType"
          description: The data type of the partition key. For example, bigint or string.
      required:
        - Name
        - Type
    PartitionKeyName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    PartitionKeyType:
      type: string
      minLength: 0
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    GetEventSelectorsResponse:
      type: object
      properties:
        TrailARN:
          $ref: "#/components/schemas/String"
          description: The specified trail ARN that has the event selectors.
        EventSelectors:
          $ref: "#/components/schemas/EventSelectors"
          description: The event selectors that are configured for the trail.
        AdvancedEventSelectors:
          $ref: "#/components/schemas/AdvancedEventSelectors"
          description: The advanced event selectors that are configured for the trail.
    EventSelectors:
      type: array
      items:
        $ref: "#/components/schemas/EventSelector"
    EventSelector:
      description: Use event selectors to further specify the management and data event settings for your trail. By default, trails created without specific event selectors will be configured to log all read and write management events, and no data events. When an event occurs in your account, CloudTrail evaluates the event selector for all trails. For each trail, if the event matches any event selector, the trail processes and logs the event. If the event doesn't match any event selector, the trail doesn't log the event. You can configure up to five event selectors for a trail. You cannot apply both event selectors and advanced event selectors to a trail.
      type: object
      properties:
        ReadWriteType:
          $ref: "#/components/schemas/ReadWriteType"
          description: Specify if you want your trail to log read-only events, write-only events, or all. For example, the EC2 GetConsoleOutput is a read-only API operation and RunInstances is a write-only API operation. By default, the value is All.
        IncludeManagementEvents:
          $ref: "#/components/schemas/Boolean"
          description: Specify if you want your event selector to include management events for your trail. For more information, see Management Events in the CloudTrail User Guide. By default, the value is true. The first copy of management events is free. You are charged for additional copies of management events that you are logging on any subsequent trail in the same Region. For more information about CloudTrail pricing, see CloudTrail Pricing.
        DataResources:
          $ref: "#/components/schemas/DataResources"
          description: CloudTrail supports data event logging for Amazon S3 objects in standard S3 buckets, Lambda functions, and Amazon DynamoDB tables with basic event selectors. You can specify up to 250 resources for an individual event selector, but the total number of data resources cannot exceed 250 across all event selectors in a trail. This limit does not apply if you configure resource logging for all data events. For more information, see Data Events and Limits in CloudTrail in the CloudTrail User Guide. To log data events for all other resource types including objects stored in directory buckets, you must use AdvancedEventSelectors. You must also use AdvancedEventSelectors if you want to filter on the eventName field.
        ExcludeManagementEventSources:
          $ref: "#/components/schemas/ExcludeManagementEventSources"
          description: An optional list of service event sources from which you do not want management events to be logged on your trail. In this release, the list can be empty (disables the filter), or it can filter out Key Management Service or Amazon RDS Data API events by containing kms.amazonaws.com or rdsdata.amazonaws.com. By default, ExcludeManagementEventSources is empty, and KMS and Amazon RDS Data API events are logged to your trail. You can exclude management event sources only in Regions that support the event source.
    ReadWriteType:
      type: string
      enum:
        - ReadOnly
        - WriteOnly
        - All
    DataResources:
      type: array
      items:
        $ref: "#/components/schemas/DataResource"
    DataResource:
      description: "You can configure the DataResource in an EventSelector to log data events for the following three resource types: AWS::DynamoDB::Table AWS::Lambda::Function AWS::S3::Object To log data events for all other resource types including objects stored in directory buckets, you must use AdvancedEventSelectors. You must also use AdvancedEventSelectors if you want to filter on the eventName field. Configure the DataResource to specify the resource type and resource ARNs for which you want to log data events. The total number of allowed data resources is 250. This number can be distributed between 1 and 5 event selectors, but the total cannot exceed 250 across all selectors for the trail. The following example demonstrates how logging works when you configure logging of all data events for a general purpose bucket named amzn-s3-demo-bucket1. In this example, the CloudTrail user specified an empty prefix, and the option to log both Read and Write data events. A user uploads an image file to amzn-s3-demo-bucket1. The PutObject API operation is an Amazon S3 object-level API. It is recorded as a data event in CloudTrail. Because the CloudTrail user specified an S3 bucket with an empty prefix, events that occur on any object in that bucket are logged. The trail processes and logs the event. A user uploads an object to an Amazon S3 bucket named arn:aws:s3:::amzn-s3-demo-bucket1. The PutObject API operation occurred for an object in an S3 bucket that the CloudTrail user didn't specify for the trail. The trail doesn’t log the event. The following example demonstrates how logging works when you configure logging of Lambda data events for a Lambda function named MyLambdaFunction, but not for all Lambda functions. A user runs a script that includes a call to the MyLambdaFunction function and the MyOtherLambdaFunction function. The Invoke API operation on MyLambdaFunction is an Lambda API. It is recorded as a data event in CloudTrail. Because the CloudTrail user specified logging data events for MyLambdaFunction, any invocations of that function are logged. The trail processes and logs the event. The Invoke API operation on MyOtherLambdaFunction is an Lambda API. Because the CloudTrail user did not specify logging data events for all Lambda functions, the Invoke operation for MyOtherLambdaFunction does not match the function specified for the trail. The trail doesn’t log the event."
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/String"
          description: "The resource type in which you want to log data events. You can specify the following basic event selector resource types: AWS::DynamoDB::Table AWS::Lambda::Function AWS::S3::Object Additional resource types are available through advanced event selectors. For more information, see AdvancedEventSelector."
        Values:
          $ref: "#/components/schemas/DataResourceValues"
          description: An array of Amazon Resource Name (ARN) strings or partial ARN strings for the specified resource type. To log data events for all objects in all S3 buckets in your Amazon Web Services account, specify the prefix as arn:aws:s3. This also enables logging of data event activity performed by any user or role in your Amazon Web Services account, even if that activity is performed on a bucket that belongs to another Amazon Web Services account. To log data events for all objects in an S3 bucket, specify the bucket and an empty object prefix such as arn:aws:s3:::amzn-s3-demo-bucket1/. The trail logs data events for all objects in this S3 bucket. To log data events for specific objects, specify the S3 bucket and object prefix such as arn:aws:s3:::amzn-s3-demo-bucket1/example-images. The trail logs data events for objects in this S3 bucket that match the prefix. To log data events for all Lambda functions in your Amazon Web Services account, specify the prefix as arn:aws:lambda. This also enables logging of Invoke activity performed by any user or role in your Amazon Web Services account, even if that activity is performed on a function that belongs to another Amazon Web Services account. To log data events for a specific Lambda function, specify the function ARN. Lambda function ARNs are exact. For example, if you specify a function ARN arn:aws:lambda:us-west-2:111111111111:function:helloworld, data events will only be logged for arn:aws:lambda:us-west-2:111111111111:function:helloworld. They will not be logged for arn:aws:lambda:us-west-2:111111111111:function:helloworld2. To log data events for all DynamoDB tables in your Amazon Web Services account, specify the prefix as arn:aws:dynamodb.
    DataResourceValues:
      type: array
      items:
        $ref: "#/components/schemas/String"
    ExcludeManagementEventSources:
      type: array
      items:
        $ref: "#/components/schemas/String"
    GetImportResponse:
      type: object
      properties:
        ImportId:
          $ref: "#/components/schemas/UUID"
          description: The ID of the import.
        Destinations:
          $ref: "#/components/schemas/ImportDestinations"
          description: The ARN of the destination event data store.
        ImportSource:
          $ref: "#/components/schemas/ImportSource"
          description: The source S3 bucket.
        StartEventTime:
          $ref: "#/components/schemas/Date"
          description: Used with EndEventTime to bound a StartImport request, and limit imported trail events to only those events logged within a specified time period.
        EndEventTime:
          $ref: "#/components/schemas/Date"
          description: Used with StartEventTime to bound a StartImport request, and limit imported trail events to only those events logged within a specified time period.
        ImportStatus:
          $ref: "#/components/schemas/ImportStatus"
          description: The status of the import.
        CreatedTimestamp:
          $ref: "#/components/schemas/Date"
          description: The timestamp of the import's creation.
        UpdatedTimestamp:
          $ref: "#/components/schemas/Date"
          description: The timestamp of when the import was updated.
        ImportStatistics:
          $ref: "#/components/schemas/ImportStatistics"
          description: Provides statistics for the import. CloudTrail does not update import statistics in real-time. Returned values for parameters such as EventsCompleted may be lower than the actual value, because CloudTrail updates statistics incrementally over the course of the import.
    ImportDestinations:
      type: array
      items:
