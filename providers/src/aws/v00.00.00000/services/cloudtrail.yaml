openapi: 3.0.0
info:
  version: "2013-11-01"
  title: AWS CloudTrail
  description: AWS CloudTrail
  x-serviceName: cloudtrail
  x-serviceAlias: cloudtrail
  x-protocol: json
  x-apiVersion: "2013-11-01"
  x-endpointPrefix: cloudtrail
  x-targetPrefix: com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101
  x-jsonVersion: "1.1"
servers:
  - url: https://cloudtrail.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for cloudtrail
paths:
  /AddTags:
    post:
      operationId: AddTags
      description: Adds one or more tags to a trail, event data store, dashboard, or channel, up to a limit of 50. Overwrites an existing tag's value when a new value is specified for an existing tag key. Tag key names must be unique; you cannot have two keys with the same name but different values. If you specify a key without a value, the tag will be created with the specified key and a value of null. You can tag a trail or event data store that applies to all Amazon Web Services Regions only from the Region in which the trail or event data store was created (also known as its home Region).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.AddTags
            default: com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.AddTags
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceId:
                  $ref: "#/components/schemas/String"
                  description: "Specifies the ARN of the trail, event data store, dashboard, or channel to which one or more tags will be added. The format of a trail ARN is: arn:aws:cloudtrail:us-east-2:123456789012:trail/MyTrail The format of an event data store ARN is: arn:aws:cloudtrail:us-east-2:123456789012:eventdatastore/EXAMPLE-f852-4e8f-8bd1-bcf6cEXAMPLE The format of a dashboard ARN is: arn:aws:cloudtrail:us-east-1:123456789012:dashboard/exampleDash The format of a channel ARN is: arn:aws:cloudtrail:us-east-2:123456789012:channel/01234567890"
                TagsList:
                  $ref: "#/components/schemas/TagsList"
                  description: Contains a list of tags, up to a limit of 50
              required:
                - ResourceId
                - TagsList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddTagsResponse"
  /CancelQuery:
    post:
      operationId: CancelQuery
      description: Cancels a query if the query is not in a terminated state, such as CANCELLED, FAILED, TIMED_OUT, or FINISHED. You must specify an ARN value for EventDataStore. The ID of the query that you want to cancel is also required. When you run CancelQuery, the query status might show as CANCELLED even if the operation is not yet finished.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.CancelQuery
            default: com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.CancelQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EventDataStore:
                  $ref: "#/components/schemas/EventDataStoreArn"
                  description: The ARN (or the ID suffix of the ARN) of an event data store on which the specified query is running.
                QueryId:
                  $ref: "#/components/schemas/UUID"
                  description: The ID of the query that you want to cancel. The QueryId comes from the response of a StartQuery operation.
                EventDataStoreOwnerAccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The account ID of the event data store owner.
              required:
                - QueryId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelQueryResponse"
  /CreateChannel:
    post:
      operationId: CreateChannel
      description: Creates a channel for CloudTrail to ingest events from a partner or external source. After you create a channel, a CloudTrail Lake event data store can log events from the partner or source that you specify.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.CreateChannel
            default: com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.CreateChannel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ChannelName"
                  description: The name of the channel.
                Source:
                  $ref: "#/components/schemas/Source"
                  description: The name of the partner or external event source. You cannot change this name after you create the channel. A maximum of one channel is allowed per source. A source can be either Custom for all valid non-Amazon Web Services events, or the name of a partner event source. For information about the source names for available partners, see Additional information about integration partners in the CloudTrail User Guide.
                Destinations:
                  $ref: "#/components/schemas/Destinations"
                  description: One or more event data stores to which events arriving through a channel will be logged.
                Tags:
                  $ref: "#/components/schemas/TagsList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelResponse"
  /CreateDashboard:
    post:
      operationId: CreateDashboard
      description: "Creates a custom dashboard or the Highlights dashboard. Custom dashboards - Custom dashboards allow you to query events in any event data store type. You can add up to 10 widgets to a custom dashboard. You can manually refresh a custom dashboard, or you can set a refresh schedule. Highlights dashboard - You can create the Highlights dashboard to see a summary of key user activities and API usage across all your event data stores. CloudTrail Lake manages the Highlights dashboard and refreshes the dashboard every 6 hours. To create the Highlights dashboard, you must set and enable a refresh schedule. CloudTrail runs queries to populate the dashboard's widgets during a manual or scheduled refresh. CloudTrail must be granted permissions to run the StartQuery operation on your behalf. To provide permissions, run the PutResourcePolicy operation to attach a resource-based policy to each event data store. For more information, see Example: Allow CloudTrail to run queries to populate a dashboard in the CloudTrail User Guide. To set a refresh schedule, CloudTrail must be granted permissions to run the StartDashboardRefresh operation to refresh the dashboard on your behalf. To provide permissions, run the PutResourcePolicy operation to attach a resource-based policy to the dashboard. For more information, see Resource-based policy example for a dashboard in the CloudTrail User Guide. For more information about dashboards, see CloudTrail Lake dashboards in the CloudTrail User Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.CreateDashboard
            default: com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.CreateDashboard
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/DashboardName"
                  description: The name of the dashboard. The name must be unique to your account. To create the Highlights dashboard, the name must be AWSCloudTrail-Highlights.
                RefreshSchedule:
                  $ref: "#/components/schemas/RefreshSchedule"
                  description: The refresh schedule configuration for the dashboard. To create the Highlights dashboard, you must set a refresh schedule and set the Status to ENABLED. The Unit for the refresh schedule must be HOURS and the Value must be 6.
                TagsList:
                  $ref: "#/components/schemas/TagsList"
                TerminationProtectionEnabled:
                  $ref: "#/components/schemas/TerminationProtectionEnabled"
                  description: Specifies whether termination protection is enabled for the dashboard. If termination protection is enabled, you cannot delete the dashboard until termination protection is disabled.
                Widgets:
                  $ref: "#/components/schemas/RequestWidgetList"
                  description: An array of widgets for a custom dashboard. A custom dashboard can have a maximum of ten widgets. You do not need to specify widgets for the Highlights dashboard.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDashboardResponse"
  /CreateEventDataStore:
    post:
      operationId: CreateEventDataStore
      description: Creates a new event data store.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.CreateEventDataStore
            default: com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.CreateEventDataStore
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EventDataStoreName"
                  description: The name of the event data store.
                AdvancedEventSelectors:
                  $ref: "#/components/schemas/AdvancedEventSelectors"
                  description: The advanced event selectors to use to select the events for the data store. You can configure up to five advanced event selectors for each event data store. For more information about how to use advanced event selectors to log CloudTrail events, see Log events by using advanced event selectors in the CloudTrail User Guide. For more information about how to use advanced event selectors to include Config configuration items in your event data store, see Create an event data store for Config configuration items in the CloudTrail User Guide. For more information about how to use advanced event selectors to include events outside of Amazon Web Services events in your event data store, see Create an integration to log events from outside Amazon Web Services in the CloudTrail User Guide.
                MultiRegionEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether the event data store includes events from all Regions, or only from the Region in which the event data store is created.
                OrganizationEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether an event data store collects events logged for an organization in Organizations.
                RetentionPeriod:
                  $ref: "#/components/schemas/RetentionPeriod"
                  description: The retention period of the event data store, in days. If BillingMode is set to EXTENDABLE_RETENTION_PRICING, you can set a retention period of up to 3653 days, the equivalent of 10 years. If BillingMode is set to FIXED_RETENTION_PRICING, you can set a retention period of up to 2557 days, the equivalent of seven years. CloudTrail Lake determines whether to retain an event by checking if the eventTime of the event is within the specified retention period. For example, if you set a retention period of 90 days, CloudTrail will remove events when the eventTime is older than 90 days. If you plan to copy trail events to this event data store, we recommend that you consider both the age of the events that you want to copy as well as how long you want to keep the copied events in your event data store. For example, if you copy trail events that are 5 years old and specify a retention period of 7 years, the event data store will retain those events for two years.
                TerminationProtectionEnabled:
                  $ref: "#/components/schemas/TerminationProtectionEnabled"
                  description: Specifies whether termination protection is enabled for the event data store. If termination protection is enabled, you cannot delete the event data store until termination protection is disabled.
                TagsList:
                  $ref: "#/components/schemas/TagsList"
                KmsKeyId:
                  $ref: "#/components/schemas/EventDataStoreKmsKeyId"
                  description: "Specifies the KMS key ID to use to encrypt the events delivered by CloudTrail. The value can be an alias name prefixed by alias/, a fully specified ARN to an alias, a fully specified ARN to a key, or a globally unique identifier. Disabling or deleting the KMS key, or removing CloudTrail permissions on the key, prevents CloudTrail from logging events to the event data store, and prevents users from querying the data in the event data store that was encrypted with the key. After you associate an event data store with a KMS key, the KMS key cannot be removed or changed. Before you disable or delete a KMS key that you are using with an event data store, delete or back up your event data store. CloudTrail also supports KMS multi-Region keys. For more information about multi-Region keys, see Using multi-Region keys in the Key Management Service Developer Guide. Examples: alias/MyAliasName arn:aws:kms:us-east-2:123456789012:alias/MyAliasName arn:aws:kms:us-east-2:123456789012:key/12345678-1234-1234-1234-123456789012 12345678-1234-1234-1234-123456789012"
                StartIngestion:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether the event data store should start ingesting live events. The default is true.
                BillingMode:
                  $ref: "#/components/schemas/BillingMode"
                  description: "The billing mode for the event data store determines the cost for ingesting events and the default and maximum retention period for the event data store. The following are the possible values: EXTENDABLE_RETENTION_PRICING - This billing mode is generally recommended if you want a flexible retention period of up to 3653 days (about 10 years). The default retention period for this billing mode is 366 days. FIXED_RETENTION_PRICING - This billing mode is recommended if you expect to ingest more than 25 TB of event data per month and need a retention period of up to 2557 days (about 7 years). The default retention period for this billing mode is 2557 days. The default value is EXTENDABLE_RETENTION_PRICING. For more information about CloudTrail pricing, see CloudTrail Pricing and Managing CloudTrail Lake costs."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventDataStoreResponse"
  /CreateTrail:
    post:
      operationId: CreateTrail
      description: Creates a trail that specifies the settings for delivery of log data to an Amazon S3 bucket.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.CreateTrail
            default: com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.CreateTrail
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/String"
                  description: "Specifies the name of the trail. The name must meet the following requirements: Contain only ASCII letters (a-z, A-Z), numbers (0-9), periods (.), underscores (_), or dashes (-) Start with a letter or number, and end with a letter or number Be between 3 and 128 characters Have no adjacent periods, underscores or dashes. Names like my-_namespace and my--namespace are not valid. Not be in IP address format (for example, 192.168.5.4)"
                S3BucketName:
                  $ref: "#/components/schemas/String"
                  description: Specifies the name of the Amazon S3 bucket designated for publishing log files. For information about bucket naming rules, see Bucket naming rules in the Amazon Simple Storage Service User Guide.
                S3KeyPrefix:
                  $ref: "#/components/schemas/String"
                  description: Specifies the Amazon S3 key prefix that comes after the name of the bucket you have designated for log file delivery. For more information, see Finding Your CloudTrail Log Files. The maximum length is 200 characters.
                SnsTopicName:
                  $ref: "#/components/schemas/String"
                  description: Specifies the name or ARN of the Amazon SNS topic defined for notification of log file delivery. The maximum length is 256 characters.
                IncludeGlobalServiceEvents:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether the trail is publishing events from global services such as IAM to the log files.
                IsMultiRegionTrail:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether the trail is created in the current Region or in all Regions. The default is false, which creates a trail only in the Region where you are signed in. As a best practice, consider creating trails that log events in all Regions.
                EnableLogFileValidation:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether log file integrity validation is enabled. The default is false. When you disable log file integrity validation, the chain of digest files is broken after one hour. CloudTrail does not create digest files for log files that were delivered during a period in which log file integrity validation was disabled. For example, if you enable log file integrity validation at noon on January 1, disable it at noon on January 2, and re-enable it at noon on January 10, digest files will not be created for the log files delivered from noon on January 2 to noon on January 10. The same applies whenever you stop CloudTrail logging or delete a trail.
                CloudWatchLogsLogGroupArn:
                  $ref: "#/components/schemas/String"
                  description: Specifies a log group name using an Amazon Resource Name (ARN), a unique identifier that represents the log group to which CloudTrail logs will be delivered. You must use a log group that exists in your account. Not required unless you specify CloudWatchLogsRoleArn.
                CloudWatchLogsRoleArn:
                  $ref: "#/components/schemas/String"
                  description: Specifies the role for the CloudWatch Logs endpoint to assume to write to a user's log group. You must use a role that exists in your account.
                KmsKeyId:
                  $ref: "#/components/schemas/String"
                  description: "Specifies the KMS key ID to use to encrypt the logs and digest files delivered by CloudTrail. The value can be an alias name prefixed by alias/, a fully specified ARN to an alias, a fully specified ARN to a key, or a globally unique identifier. CloudTrail also supports KMS multi-Region keys. For more information about multi-Region keys, see Using multi-Region keys in the Key Management Service Developer Guide. Examples: alias/MyAliasName arn:aws:kms:us-east-2:123456789012:alias/MyAliasName arn:aws:kms:us-east-2:123456789012:key/12345678-1234-1234-1234-123456789012 12345678-1234-1234-1234-123456789012"
                IsOrganizationTrail:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether the trail is created for all accounts in an organization in Organizations, or only for the current Amazon Web Services account. The default is false, and cannot be true unless the call is made on behalf of an Amazon Web Services account that is the management account or delegated administrator account for an organization in Organizations.
                TagsList:
                  $ref: "#/components/schemas/TagsList"
              required:
                - S3BucketName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTrailResponse"
  /DeleteChannel:
    post:
      operationId: DeleteChannel
      description: Deletes a channel.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.DeleteChannel
            default: com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.DeleteChannel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Channel:
                  $ref: "#/components/schemas/ChannelArn"
                  description: The ARN or the UUID value of the channel that you want to delete.
              required:
                - Channel
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteChannelResponse"
  /DeleteDashboard:
    post:
      operationId: DeleteDashboard
      description: Deletes the specified dashboard. You cannot delete a dashboard that has termination protection enabled.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.DeleteDashboard
            default: com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.DeleteDashboard
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DashboardId:
                  $ref: "#/components/schemas/DashboardArn"
                  description: The name or ARN for the dashboard.
              required:
                - DashboardId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDashboardResponse"
  /DeleteEventDataStore:
    post:
      operationId: DeleteEventDataStore
      description: Disables the event data store specified by EventDataStore, which accepts an event data store ARN. After you run DeleteEventDataStore, the event data store enters a PENDING_DELETION state, and is automatically deleted after a wait period of seven days. TerminationProtectionEnabled must be set to False on the event data store and the FederationStatus must be DISABLED. You cannot delete an event data store if TerminationProtectionEnabled is True or the FederationStatus is ENABLED. After you run DeleteEventDataStore on an event data store, you cannot run ListQueries, DescribeQuery, or GetQueryResults on queries that are using an event data store in a PENDING_DELETION state. An event data store in the PENDING_DELETION state does not incur costs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.DeleteEventDataStore
            default: com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.DeleteEventDataStore
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EventDataStore:
                  $ref: "#/components/schemas/EventDataStoreArn"
                  description: The ARN (or the ID suffix of the ARN) of the event data store to delete.
              required:
                - EventDataStore
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEventDataStoreResponse"
  /DeleteResourcePolicy:
    post:
      operationId: DeleteResourcePolicy
      description: Deletes the resource-based policy attached to the CloudTrail event data store, dashboard, or channel.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.DeleteResourcePolicy
            default: com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.DeleteResourcePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: "The Amazon Resource Name (ARN) of the CloudTrail event data store, dashboard, or channel you're deleting the resource-based policy from. Example event data store ARN format: arn:aws:cloudtrail:us-east-2:123456789012:eventdatastore/EXAMPLE-f852-4e8f-8bd1-bcf6cEXAMPLE Example dashboard ARN format: arn:aws:cloudtrail:us-east-1:123456789012:dashboard/exampleDash Example channel ARN format: arn:aws:cloudtrail:us-east-2:123456789012:channel/01234567890"
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResourcePolicyResponse"
  /DeleteTrail:
    post:
      operationId: DeleteTrail
      description: Deletes a trail. This operation must be called from the Region in which the trail was created. DeleteTrail cannot be called on the shadow trails (replicated trails in other Regions) of a trail that is enabled in all Regions. While deleting a CloudTrail trail is an irreversible action, CloudTrail does not delete log files in the Amazon S3 bucket for that trail, the Amazon S3 bucket itself, or the CloudWatchlog group to which the trail delivers events. Deleting a multi-Region trail will stop logging of events in all Amazon Web Services Regions enabled in your Amazon Web Services account. Deleting a single-Region trail will stop logging of events in that Region only. It will not stop logging of events in other Regions even if the trails in those other Regions have identical names to the deleted trail. For information about account closure and deletion of CloudTrail trails, see https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-account-closure.html.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.DeleteTrail
            default: com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.DeleteTrail
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/String"
                  description: Specifies the name or the CloudTrail ARN of the trail to be deleted. The following is the format of a trail ARN. arn:aws:cloudtrail:us-east-2:123456789012:trail/MyTrail
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTrailResponse"
  /DeregisterOrganizationDelegatedAdmin:
    post:
      operationId: DeregisterOrganizationDelegatedAdmin
      description: Removes CloudTrail delegated administrator permissions from a member account in an organization.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.DeregisterOrganizationDelegatedAdmin
            default: com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.DeregisterOrganizationDelegatedAdmin
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DelegatedAdminAccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: A delegated administrator account ID. This is a member account in an organization that is currently designated as a delegated administrator.
              required:
                - DelegatedAdminAccountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeregisterOrganizationDelegatedAdminResponse"
  /DescribeQuery:
    post:
      operationId: DescribeQuery
      description: Returns metadata about a query, including query run time in milliseconds, number of events scanned and matched, and query status. If the query results were delivered to an S3 bucket, the response also provides the S3 URI and the delivery status. You must specify either QueryId or QueryAlias. Specifying the QueryAlias parameter returns information about the last query run for the alias. You can provide RefreshId along with QueryAlias to view the query results of a dashboard query for the specified RefreshId.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.DescribeQuery
            default: com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.DescribeQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EventDataStore:
                  $ref: "#/components/schemas/EventDataStoreArn"
                  description: The ARN (or the ID suffix of the ARN) of an event data store on which the specified query was run.
                QueryId:
                  $ref: "#/components/schemas/UUID"
                  description: The query ID.
                QueryAlias:
                  $ref: "#/components/schemas/QueryAlias"
