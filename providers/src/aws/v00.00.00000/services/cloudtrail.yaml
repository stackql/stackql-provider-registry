    GetInsightSelectorsResponse:
      type: object
      properties:
        TrailARN:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of a trail for which you want to get Insights selectors.
        InsightSelectors:
          $ref: "#/components/schemas/InsightSelectors"
          description: Contains the Insights types that are enabled on a trail or event data store. It also specifies the event categories on which a particular Insight type is enabled. ApiCallRateInsight and ApiErrorRateInsight are valid Insight types.The EventCategory field can specify Management or Data events or both. For event data store, you can log Insights for management events only.
        EventDataStoreArn:
          $ref: "#/components/schemas/EventDataStoreArn"
          description: The ARN of the source event data store that enabled Insights events.
        InsightsDestination:
          $ref: "#/components/schemas/EventDataStoreArn"
          description: The ARN of the destination event data store that logs Insights events.
    InsightSelectors:
      type: array
      items:
        $ref: "#/components/schemas/InsightSelector"
    InsightSelector:
      description: A JSON string that contains a list of Insights types that are logged on a trail or event data store.
      type: object
      properties:
        InsightType:
          $ref: "#/components/schemas/InsightType"
          description: The type of Insights events to log on a trail or event data store. ApiCallRateInsight and ApiErrorRateInsight are valid Insight types. The ApiCallRateInsight Insights type analyzes write-only management API calls or read and write data API calls that are aggregated per minute against a baseline API call volume. The ApiErrorRateInsight Insights type analyzes management and data API calls that result in error codes. The error is shown if the API call is unsuccessful.
        EventCategories:
          $ref: "#/components/schemas/SourceEventCategories"
          description: Select the event category on which Insights should be enabled. If EventCategories is not provided, the specified Insights types are enabled on management API calls by default. If EventCategories is provided, the given event categories will overwrite the existing ones. For example, if a trail already has Insights enabled on management events, and then a PutInsightSelectors request is made with only data events specified in EventCategories, Insights on management events will be disabled.
    InsightType:
      type: string
      enum:
        - ApiCallRateInsight
        - ApiErrorRateInsight
    SourceEventCategories:
      type: array
      items:
        $ref: "#/components/schemas/SourceEventCategory"
    SourceEventCategory:
      type: string
      enum:
        - Management
        - Data
