    AdvancedEventSelector:
      description: Advanced event selectors let you create fine-grained selectors for CloudTrail management, data, and network activity events. They help you control costs by logging only those events that are important to you. For more information about configuring advanced event selectors, see the Logging data events, Logging network activity events, and Logging management events topics in the CloudTrail User Guide. You cannot apply both event selectors and advanced event selectors to a trail. For information about configurable advanced event selector fields, see AdvancedEventSelector in the CloudTrail API Reference.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/SelectorName"
          description: An optional, descriptive name for an advanced event selector, such as "Log data events for only two S3 buckets".
        FieldSelectors:
          $ref: "#/components/schemas/AdvancedFieldSelectors"
          description: Contains all selector statements in an advanced event selector.
      required:
        - FieldSelectors
    SelectorName:
      type: string
      minLength: 0
      maxLength: 1000
      pattern: .*
    AdvancedFieldSelectors:
      type: array
      items:
        $ref: "#/components/schemas/AdvancedFieldSelector"
    AdvancedFieldSelector:
      description: A single selector statement in an advanced event selector.
      type: object
      properties:
        Field:
          $ref: "#/components/schemas/SelectorField"
          description: A field in a CloudTrail event record on which to filter events to be logged. For event data stores for CloudTrail Insights events, Config configuration items, Audit Manager evidence, or events outside of Amazon Web Services, the field is used only for selecting events as filtering is not supported. For more information, see AdvancedFieldSelector in the CloudTrail API Reference. Selectors don't support the use of wildcards like * . To match multiple values with a single condition, you may use StartsWith, EndsWith, NotStartsWith, or NotEndsWith to explicitly match the beginning or end of the event field.
        Equals:
          $ref: "#/components/schemas/Operator"
          description: An operator that includes events that match the exact value of the event record field specified as the value of Field. This is the only valid operator that you can use with the readOnly, eventCategory, and resources.type fields.
        StartsWith:
          $ref: "#/components/schemas/Operator"
          description: An operator that includes events that match the first few characters of the event record field specified as the value of Field.
        EndsWith:
          $ref: "#/components/schemas/Operator"
          description: An operator that includes events that match the last few characters of the event record field specified as the value of Field.
        NotEquals:
          $ref: "#/components/schemas/Operator"
          description: An operator that excludes events that match the exact value of the event record field specified as the value of Field.
        NotStartsWith:
          $ref: "#/components/schemas/Operator"
          description: An operator that excludes events that match the first few characters of the event record field specified as the value of Field.
        NotEndsWith:
          $ref: "#/components/schemas/Operator"
          description: An operator that excludes events that match the last few characters of the event record field specified as the value of Field.
      required:
        - Field
    SelectorField:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: "[\\w|\\d|\\.|_]+"
    Operator:
