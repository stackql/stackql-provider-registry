            schema:
              type: object
              properties:
                EventDataStore:
                  $ref: "#/components/schemas/EventDataStoreArn"
                  description: The ARN (or ID suffix of the ARN) of the event data store for which you want to enable Lake query federation.
                FederationRoleArn:
                  $ref: "#/components/schemas/FederationRoleArn"
                  description: The ARN of the federation role to use for the event data store. Amazon Web Services services like Lake Formation use this federation role to access data for the federated event data store. The federation role must exist in your account and provide the required minimum permissions.
              required:
