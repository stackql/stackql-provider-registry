  /ListInsightsMetricData:
    post:
      operationId: ListInsightsMetricData
      description: "Returns Insights metrics data for trails that have enabled Insights. The request must include the EventSource, EventName, and InsightType parameters. If the InsightType is set to ApiErrorRateInsight, the request must also include the ErrorCode parameter. The following are the available time periods for ListInsightsMetricData. Each cutoff is inclusive. Data points with a period of 60 seconds (1-minute) are available for 15 days. Data points with a period of 300 seconds (5-minute) are available for 63 days. Data points with a period of 3600 seconds (1 hour) are available for 90 days. To use ListInsightsMetricData operation, you must have the following permissions: If ListInsightsMetricData is invoked with TrailName parameter, access to the ListInsightsMetricData API operation is linked to the cloudtrail:LookupEvents action and cloudtrail:ListInsightsData. To use this operation, you must have permissions to perform the cloudtrail:LookupEvents and cloudtrail:ListInsightsData action on the specific trail. If ListInsightsMetricData is invoked without TrailName parameter, access to the ListInsightsMetricData API operation is linked to the cloudtrail:LookupEvents action only. To use this operation, you must have permissions to perform the cloudtrail:LookupEvents action."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.ListInsightsMetricData
            default: com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.ListInsightsMetricData
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TrailName:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name(ARN) or name of the trail for which you want to retrieve Insights metrics data. This parameter should only be provided to fetch Insights metrics data generated on trails logging data events. This parameter is not required for Insights metric data generated on trails logging management events.
                EventSource:
                  $ref: "#/components/schemas/EventSource"
                  description: The Amazon Web Services service to which the request was made, such as iam.amazonaws.com or s3.amazonaws.com.
                EventName:
                  $ref: "#/components/schemas/EventName"
                  description: The name of the event, typically the Amazon Web Services API on which unusual levels of activity were recorded.
                InsightType:
                  $ref: "#/components/schemas/InsightType"
                  description: The type of CloudTrail Insights event, which is either ApiCallRateInsight or ApiErrorRateInsight. The ApiCallRateInsight Insights type analyzes write-only management API calls that are aggregated per minute against a baseline API call volume. The ApiErrorRateInsight Insights type analyzes management API calls that result in error codes.
                ErrorCode:
                  $ref: "#/components/schemas/ErrorCode"
                  description: Conditionally required if the InsightType parameter is set to ApiErrorRateInsight. If returning metrics for the ApiErrorRateInsight Insights type, this is the error to retrieve data for. For example, AccessDenied.
                StartTime:
                  $ref: "#/components/schemas/Date"
                  description: Specifies, in UTC, the start time for time-series data. The value specified is inclusive; results include data points with the specified time stamp. The default is 90 days before the time of request.
                EndTime:
                  $ref: "#/components/schemas/Date"
                  description: Specifies, in UTC, the end time for time-series data. The value specified is exclusive; results include data points up to the specified time stamp. The default is the time of request.
                Period:
                  $ref: "#/components/schemas/InsightsMetricPeriod"
                  description: Granularity of data to retrieve, in seconds. Valid values are 60, 300, and 3600. If you specify any other value, you will get an error. The default is 3600 seconds.
                DataType:
                  $ref: "#/components/schemas/InsightsMetricDataType"
                  description: Type of data points to return. Valid values are NonZeroData and FillWithZeros. The default is NonZeroData.
                MaxResults:
                  $ref: "#/components/schemas/InsightsMetricMaxResults"
                  description: The maximum number of data points to return. Valid values are integers from 1 to 21600. The default value is 21600.
                NextToken:
                  $ref: "#/components/schemas/InsightsMetricNextToken"
                  description: Returned if all datapoints can't be returned in a single call. For example, due to reaching MaxResults. Add this parameter to the request to continue retrieving results starting from the last evaluated point.
              required:
                - EventSource
                - EventName
                - InsightType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInsightsMetricDataResponse"
  /ListPublicKeys:
    post:
      operationId: ListPublicKeys
      description: Returns all public keys whose private keys were used to sign the digest files within the specified time range. The public key is needed to validate digest files that were signed with its corresponding private key. CloudTrail uses different private and public key pairs per Region. Each digest file is signed with a private key unique to its Region. When you validate a digest file from a specific Region, you must look in the same Region for its corresponding public key.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.ListPublicKeys
            default: com.amazonaws.cloudtrail.v20131101.CloudTrail_20131101.ListPublicKeys
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                StartTime:
                  $ref: "#/components/schemas/Date"
                  description: Optionally specifies, in UTC, the start of the time range to look up public keys for CloudTrail digest files. If not specified, the current time is used, and the current public key is returned.
                EndTime:
                  $ref: "#/components/schemas/Date"
                  description: Optionally specifies, in UTC, the end of the time range to look up public keys for CloudTrail digest files. If not specified, the current time is used.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: Reserved for future use.
      responses:
