    GetResourcePolicyResponse:
      type: object
      properties:
        ResourceArn:
          $ref: "#/components/schemas/ResourceArn"
          description: "The Amazon Resource Name (ARN) of the CloudTrail event data store, dashboard, or channel attached to resource-based policy. Example event data store ARN format: arn:aws:cloudtrail:us-east-2:123456789012:eventdatastore/EXAMPLE-f852-4e8f-8bd1-bcf6cEXAMPLE Example dashboard ARN format: arn:aws:cloudtrail:us-east-1:123456789012:dashboard/exampleDash Example channel ARN format: arn:aws:cloudtrail:us-east-2:123456789012:channel/01234567890"
        ResourcePolicy:
          $ref: "#/components/schemas/ResourcePolicy"
          description: A JSON-formatted string that contains the resource-based policy attached to the CloudTrail event data store, dashboard, or channel.
        DelegatedAdminResourcePolicy:
          $ref: "#/components/schemas/ResourcePolicy"
          description: The default resource-based policy that is automatically generated for the delegated administrator of an Organizations organization. This policy will be evaluated in tandem with any policy you submit for the resource. For more information about this policy, see Default resource policy for delegated administrators.
    ResourcePolicy:
      type: string
      minLength: 1
      maxLength: 8192
    GetTrailResponse:
      type: object
      properties:
        Trail:
          $ref: "#/components/schemas/Trail"
    GetTrailStatusResponse:
      description: Returns the objects or data listed below if successful. Otherwise, returns an error.
      type: object
      properties:
        IsLogging:
          $ref: "#/components/schemas/Boolean"
          description: Whether the CloudTrail trail is currently logging Amazon Web Services API calls.
        LatestDeliveryError:
          $ref: "#/components/schemas/String"
          description: Displays any Amazon S3 error that CloudTrail encountered when attempting to deliver log files to the designated bucket. For more information, see Error Responses in the Amazon S3 API Reference. This error occurs only when there is a problem with the destination S3 bucket, and does not occur for requests that time out. To resolve the issue, fix the bucket policy so that CloudTrail can write to the bucket; or create a new bucket and call UpdateTrail to specify the new bucket.
        LatestNotificationError:
          $ref: "#/components/schemas/String"
          description: Displays any Amazon SNS error that CloudTrail encountered when attempting to send a notification. For more information about Amazon SNS errors, see the Amazon SNS Developer Guide.
        LatestDeliveryTime:
          $ref: "#/components/schemas/Date"
          description: Specifies the date and time that CloudTrail last delivered log files to an account's Amazon S3 bucket.
        LatestNotificationTime:
          $ref: "#/components/schemas/Date"
          description: Specifies the date and time of the most recent Amazon SNS notification that CloudTrail has written a new log file to an account's Amazon S3 bucket.
        StartLoggingTime:
          $ref: "#/components/schemas/Date"
          description: Specifies the most recent date and time when CloudTrail started recording API calls for an Amazon Web Services account.
        StopLoggingTime:
          $ref: "#/components/schemas/Date"
          description: Specifies the most recent date and time when CloudTrail stopped recording API calls for an Amazon Web Services account.
        LatestCloudWatchLogsDeliveryError:
          $ref: "#/components/schemas/String"
          description: Displays any CloudWatch Logs error that CloudTrail encountered when attempting to deliver logs to CloudWatch Logs.
        LatestCloudWatchLogsDeliveryTime:
          $ref: "#/components/schemas/Date"
          description: Displays the most recent date and time when CloudTrail delivered logs to CloudWatch Logs.
        LatestDigestDeliveryTime:
          $ref: "#/components/schemas/Date"
          description: Specifies the date and time that CloudTrail last delivered a digest file to an account's Amazon S3 bucket.
        LatestDigestDeliveryError:
          $ref: "#/components/schemas/String"
          description: Displays any Amazon S3 error that CloudTrail encountered when attempting to deliver a digest file to the designated bucket. For more information, see Error Responses in the Amazon S3 API Reference. This error occurs only when there is a problem with the destination S3 bucket, and does not occur for requests that time out. To resolve the issue, fix the bucket policy so that CloudTrail can write to the bucket; or create a new bucket and call UpdateTrail to specify the new bucket.
        LatestDeliveryAttemptTime:
          $ref: "#/components/schemas/String"
          description: This field is no longer in use.
        LatestNotificationAttemptTime:
          $ref: "#/components/schemas/String"
          description: This field is no longer in use.
        LatestNotificationAttemptSucceeded:
          $ref: "#/components/schemas/String"
          description: This field is no longer in use.
        LatestDeliveryAttemptSucceeded:
          $ref: "#/components/schemas/String"
          description: This field is no longer in use.
        TimeLoggingStarted:
          $ref: "#/components/schemas/String"
          description: This field is no longer in use.
        TimeLoggingStopped:
          $ref: "#/components/schemas/String"
          description: This field is no longer in use.
