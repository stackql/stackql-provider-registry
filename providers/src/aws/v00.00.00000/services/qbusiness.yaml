    BrowserExtensionConfiguration:
      description: The container for browser extension configuration for an Amazon Q Business web experience.
      type: object
      properties:
        enabledBrowserExtensions:
          $ref: "#/components/schemas/BrowserExtensionList"
          description: Specify the browser extensions allowed for your Amazon Q web experience. CHROME — Enables the extension for Chromium-based browsers (Google Chrome, Microsoft Edge, Opera, etc.). FIREFOX — Enables the extension for Mozilla Firefox. CHROME and FIREFOX — Enable the extension for Chromium-based browsers and Mozilla Firefox.
      required:
        - enabledBrowserExtensions
    BrowserExtensionList:
      type: array
      items:
        $ref: "#/components/schemas/BrowserExtension"
    BrowserExtension:
      type: string
      enum:
        - FIREFOX
        - CHROME
    CustomizationConfiguration:
