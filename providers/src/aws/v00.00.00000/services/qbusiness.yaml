          $ref: "#/components/schemas/IndexId"
          description: The identifier of the index that the user aliases are associated with.
        dataSourceId:
          $ref: "#/components/schemas/DataSourceId"
          description: The identifier of the data source that the user aliases are associated with.
        userId:
          $ref: "#/components/schemas/String"
          description: The identifier of the user id associated with the user aliases.
      required:
        - userId
    CreateUserResponse:
      type: object
    WebExperienceTitle:
      type: string
      minLength: 0
      maxLength: 500
      pattern: "[\\s\\S]*"
    WebExperienceSubtitle:
      type: string
      minLength: 0
      maxLength: 500
      pattern: "[\\s\\S]*"
    WebExperienceWelcomeMessage:
      type: string
