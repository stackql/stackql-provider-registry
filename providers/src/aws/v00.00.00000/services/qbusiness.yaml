    put:
      operationId: PutGroup
      description: Create, or updates, a mapping of users—who have access to a document—to groups. You can also map sub groups to groups. For example, the group "Company Intellectual Property Teams" includes sub groups "Research" and "Engineering". These sub groups include their own list of users or people who work in these teams. Only users who work in research and engineering, and therefore belong in the intellectual property group, can see top-secret company documents in their Amazon Q Business chat results. There are two options for creating groups, either passing group members inline or using an S3 file via the S3PathForGroupMembers field. For inline groups, there is a limit of 1000 members per group and for provided S3 files there is a limit of 100 thousand members. When creating a group using an S3 file, you provide both an S3 file and a RoleArn for Amazon Q Buisness to access the file.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the application in which the user and group mapping belongs.
        - name: index_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IndexId"
          description: The identifier of the index in which you want to map users to their groups.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                groupName:
                  $ref: "#/components/schemas/GroupName"
                dataSourceId:
                  $ref: "#/components/schemas/DataSourceId"
                type:
                  $ref: "#/components/schemas/MembershipType"
                groupMembers:
                  $ref: "#/components/schemas/GroupMembers"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
              required:
                - groupName
                - type
                - groupMembers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutGroupResponse"
  /applications/{application_id}/plugins/{plugin_id}/actions:
    get:
      operationId: ListPluginActions
      description: Lists configured Amazon Q Business actions for a specific plugin in an Amazon Q Business application.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the Amazon Q Business application the plugin is attached to.
        - name: plugin_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PluginId"
          description: The identifier of the Amazon Q Business plugin.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If the number of plugin actions returned exceeds maxResults, Amazon Q Business returns a next token as a pagination token to retrieve the next set of plugin actions.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResultsIntegerForListPluginActions"
          description: The maximum number of plugin actions to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPluginActionsResponse"
  /pluginTypes/{plugin_type}/actions:
    get:
      operationId: ListPluginTypeActions
      description: Lists configured Amazon Q Business actions for any plugin type—both built-in and custom.
      parameters:
        - name: plugin_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PluginType"
          description: The type of the plugin.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If the number of plugins returned exceeds maxResults, Amazon Q Business returns a next token as a pagination token to retrieve the next set of plugins.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResultsIntegerForListPluginTypeActions"
          description: The maximum number of plugins to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPluginTypeActionsResponse"
  /pluginTypeMetadata:
    get:
      operationId: ListPluginTypeMetadata
      description: Lists metadata for all Amazon Q Business plugin types.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If the metadata returned exceeds maxResults, Amazon Q Business returns a next token as a pagination token to retrieve the next set of metadata.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResultsIntegerForListPluginTypeMetadata"
          description: The maximum number of plugin metadata items to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPluginTypeMetadataResponse"
  /v1/tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Gets a list of tags associated with a specified resource. Amazon Q Business applications and data sources can have tags associated with them.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon Q Business application or data source to get a list of tags for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds the specified tag to the specified Amazon Q Business application or data source resource. If the tag already exists, the existing value is replaced with the new value.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon Q Business application or data source to tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes a tag from an Amazon Q Business application or a data source.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon Q Business application, or data source to remove the tag from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: A list of tag keys to remove from the Amazon Q Business application or data source. If a tag key does not exist on the resource, it is ignored.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /applications/{application_id}/conversations/{conversation_id}/messages/{message_id}/feedback:
    post:
      operationId: PutFeedback
      description: Enables your end user to provide feedback on their Amazon Q Business generated chat responses.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the application associated with the feedback.
        - name: userId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserId"
          description: The identifier of the user giving the feedback.
        - name: conversation_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConversationId"
          description: The identifier of the conversation the feedback is attached to.
        - name: message_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SystemMessageId"
          description: The identifier of the chat message that the feedback was given for.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                messageCopiedAt:
                  $ref: "#/components/schemas/Timestamp"
                messageUsefulness:
                  $ref: "#/components/schemas/MessageUsefulnessFeedback"
      responses:
        "200":
          description: Success
  /applications/{application_id}/relevant-content:
    post:
      operationId: SearchRelevantContent
      description: Searches for relevant content in a Amazon Q Business application based on a query. This operation takes a search query text, the Amazon Q Business application identifier, and optional filters (such as content source and maximum results) as input. It returns a list of relevant content items, where each item includes the content text, the unique document identifier, the document title, the document URI, any relevant document attributes, and score attributes indicating the confidence level of the relevance.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The unique identifier of the Amazon Q Business application to search.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                queryText:
                  $ref: "#/components/schemas/QueryText"
                contentSource:
                  $ref: "#/components/schemas/ContentSource"
                attributeFilter:
                  $ref: "#/components/schemas/AttributeFilter"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - queryText
                - contentSource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchRelevantContentResponse"
  /applications/{application_id}/indices/{index_id}/datasources/{data_source_id}/startsync:
    post:
      operationId: StartDataSourceSyncJob
      description: Starts a data source connector synchronization job. If a synchronization job is already in progress, Amazon Q Business returns a ConflictException.
      parameters:
        - name: data_source_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataSourceId"
          description: The identifier of the data source connector.
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of Amazon Q Business application the data source is connected to.
        - name: index_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IndexId"
          description: The identifier of the index used with the data source connector.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartDataSourceSyncJobResponse"
  /applications/{application_id}/indices/{index_id}/datasources/{data_source_id}/stopsync:
    post:
      operationId: StopDataSourceSyncJob
      description: Stops an Amazon Q Business data source connector synchronization job already in progress.
      parameters:
        - name: data_source_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataSourceId"
          description: The identifier of the data source connector.
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the Amazon Q Business application that the data source is connected to.
        - name: index_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IndexId"
          description: The identifier of the index used with the Amazon Q Business data source connector.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopDataSourceSyncJobResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ApplicationId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-zA-Z0-9][a-zA-Z0-9-]{35}"
    StatementId:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9_-]+"
    QIamActions:
      type: array
      items:
        $ref: "#/components/schemas/QIamAction"
    QIamAction:
      type: string
      pattern: qbusiness:[a-zA-Z]+
    PermissionConditions:
      type: array
      items:
        $ref: "#/components/schemas/PermissionCondition"
    PermissionCondition:
      description: Defines a condition that restricts when a permission is effective. Conditions allow you to control access based on specific attributes of the request.
      type: object
      properties:
        conditionOperator:
          $ref: "#/components/schemas/PermissionConditionOperator"
          description: The operator to use for the condition evaluation. This determines how the condition values are compared.
        conditionKey:
          $ref: "#/components/schemas/PermissionConditionKey"
          description: The key for the condition. This identifies the attribute that the condition applies to.
        conditionValues:
          $ref: "#/components/schemas/PermissionConditionValues"
          description: The values to compare against using the specified condition operator.
      required:
        - conditionOperator
        - conditionKey
        - conditionValues
    PermissionConditionOperator:
      type: string
      enum:
        - StringEquals
    PermissionConditionKey:
      type: string
      pattern: aws:[a-zA-Z][a-zA-Z0-9-/:]*
    PermissionConditionValues:
      type: array
      items:
        $ref: "#/components/schemas/PermissionConditionValue"
    PermissionConditionValue:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: "[a-zA-Z0-9][a-zA-Z0-9._-]*"
    PrincipalRoleArn:
      type: string
      minLength: 1
      maxLength: 1284
      pattern: arn:[a-z0-9-\.]{1,63}:iam::[0-9]{12}:role/[a-zA-Z0-9_/+=,.@-]+
    AssociatePermissionResponse:
      type: object
      properties:
        statement:
          $ref: "#/components/schemas/String"
          description: The JSON representation of the added permission statement.
    String:
      type: string
      minLength: 1
      maxLength: 2048
    IndexId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-zA-Z0-9][a-zA-Z0-9-]{35}"
    DeleteDocuments:
      type: array
      items:
        $ref: "#/components/schemas/DeleteDocument"
    DeleteDocument:
      description: A document deleted from an Amazon Q Business data source connector.
      type: object
      properties:
        documentId:
          $ref: "#/components/schemas/DocumentId"
          description: The identifier of the deleted document.
      required:
        - documentId
    DocumentId:
      type: string
      minLength: 1
      maxLength: 1825
      pattern: \P{C}*
    ExecutionId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-zA-Z0-9][a-zA-Z0-9-]{35}"
    BatchDeleteDocumentResponse:
      type: object
      properties:
        failedDocuments:
          $ref: "#/components/schemas/FailedDocuments"
          description: A list of documents that couldn't be removed from the Amazon Q Business index. Each entry contains an error message that indicates why the document couldn't be removed from the index.
    FailedDocuments:
      type: array
      items:
        $ref: "#/components/schemas/FailedDocument"
    FailedDocument:
      description: A list of documents that could not be removed from an Amazon Q Business index. Each entry contains an error message that indicates why the document couldn't be removed from the index.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/DocumentId"
          description: The identifier of the document that couldn't be removed from the Amazon Q Business index.
        error:
          $ref: "#/components/schemas/ErrorDetail"
          description: An explanation for why the document couldn't be removed from the index.
        dataSourceId:
          $ref: "#/components/schemas/DataSourceId"
          description: The identifier of the Amazon Q Business data source connector that contains the failed document.
    ErrorDetail:
      description: Provides information about a Amazon Q Business request error.
      type: object
      properties:
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The message explaining the Amazon Q Business request error.
        errorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The code associated with the Amazon Q Business request error.
    ErrorMessage:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[\\s\\S]*"
    ErrorCode:
      type: string
      enum:
        - InternalError
        - InvalidRequest
        - ResourceInactive
        - ResourceNotFound
    DataSourceId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-zA-Z0-9][a-zA-Z0-9-]{35}"
    Documents:
      type: array
      items:
        $ref: "#/components/schemas/Document"
    Document:
      description: A document in an Amazon Q Business application.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/DocumentId"
          description: The identifier of the document.
        attributes:
          $ref: "#/components/schemas/DocumentAttributes"
          description: Custom attributes to apply to the document for refining Amazon Q Business web experience responses.
        content:
          $ref: "#/components/schemas/DocumentContent"
          description: The contents of the document.
        contentType:
          $ref: "#/components/schemas/ContentType"
          description: The file type of the document in the Blob field. If you want to index snippets or subsets of HTML documents instead of the entirety of the HTML documents, you add the HTML start and closing tags (`<HTML>`content</HTML>) around the content.
        title_:
          $ref: "#/components/schemas/Title"
          description: The title of the document.
        accessConfiguration:
          $ref: "#/components/schemas/AccessConfiguration"
          description: Configuration information for access permission to a document.
        documentEnrichmentConfiguration:
          $ref: "#/components/schemas/DocumentEnrichmentConfiguration"
          description: The configuration information for altering document metadata and content during the document ingestion process.
        mediaExtractionConfiguration:
          $ref: "#/components/schemas/MediaExtractionConfiguration"
          description: The configuration for extracting information from media in the document.
      required:
        - id
    DocumentAttributes:
      type: array
      items:
        $ref: "#/components/schemas/DocumentAttribute"
    DocumentAttribute:
      description: A document attribute or metadata field.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/DocumentAttributeKey"
          description: The identifier for the attribute.
        value:
          $ref: "#/components/schemas/DocumentAttributeValue"
          description: The value of the attribute.
      required:
        - name
        - value
    DocumentAttributeKey:
      type: string
      minLength: 1
      maxLength: 200
      pattern: "[a-zA-Z0-9_][a-zA-Z0-9_-]*"
    DocumentAttributeValue:
      description: The value of a document attribute. You can only provide one value for a document attribute.
      type: object
      properties:
        stringValue:
          $ref: "#/components/schemas/DocumentAttributeValueStringValueString"
          description: A string.
        stringListValue:
          $ref: "#/components/schemas/DocumentAttributeStringListValue"
          description: A list of strings.
        longValue:
          $ref: "#/components/schemas/Long"
          description: A long integer value.
        dateValue:
          $ref: "#/components/schemas/Timestamp"
          description: A date expressed as an ISO 8601 string. It's important for the time zone to be included in the ISO 8601 date-time format. For example, 2012-03-25T12:30:10+01:00 is the ISO 8601 date-time format for March 25th 2012 at 12:30PM (plus 10 seconds) in Central European Time.
    DocumentAttributeValueStringValueString:
      type: string
      minLength: 0
      maxLength: 2048
    DocumentAttributeStringListValue:
      type: array
      items:
        $ref: "#/components/schemas/String"
    Long:
      type: integer
      format: int64
    Timestamp:
      type: string
      format: date-time
    DocumentContent:
      description: The contents of a document. Documents have size limitations. The maximum file size for a document is 50 MB. The maximum amount of text that can be extracted from a single document is 5 MB. For more information, see Supported document formats in Amazon Q Business.
      type: object
      properties:
        blob:
          $ref: "#/components/schemas/Blob"
          description: The contents of the document. Documents passed to the blob parameter must be base64 encoded. Your code might not need to encode the document file bytes if you're using an Amazon Web Services SDK to call Amazon Q Business APIs. If you are calling the Amazon Q Business endpoint directly using REST, you must base64 encode the contents before sending.
        s3:
          $ref: "#/components/schemas/S3"
          description: The path to the document in an Amazon S3 bucket.
    Blob:
      type: string
      format: byte
    S3:
      description: Information required for Amazon Q Business to find a specific file in an Amazon S3 bucket.
      type: object
      properties:
        bucket:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of the S3 bucket that contains the file.
        key:
          $ref: "#/components/schemas/S3ObjectKey"
          description: The name of the file.
      required:
        - bucket
        - key
    S3BucketName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[a-z0-9][\\.\\-a-z0-9]{1,61}[a-z0-9]"
    S3ObjectKey:
      type: string
      minLength: 1
      maxLength: 1024
    ContentType:
      type: string
      enum:
        - PDF
        - HTML
        - MS_WORD
        - PLAIN_TEXT
        - PPT
        - RTF
        - XML
        - XSLT
        - MS_EXCEL
        - CSV
        - JSON
        - MD
    Title:
      type: string
      minLength: 1
      maxLength: 1024
    AccessConfiguration:
      description: Used to configure access permissions for a document.
      type: object
      properties:
        accessControls:
          $ref: "#/components/schemas/AccessControls"
          description: A list of AccessControlList objects.
        memberRelation:
          $ref: "#/components/schemas/MemberRelation"
          description: Describes the member relation within the AccessControlList object.
      required:
        - accessControls
    AccessControls:
      type: array
      items:
        $ref: "#/components/schemas/AccessControl"
    AccessControl:
      description: A list of principals. Each principal can be either a USER or a GROUP and can be designated document access permissions of either ALLOW or DENY.
      type: object
      properties:
        principals:
          $ref: "#/components/schemas/Principals"
          description: "Contains a list of principals, where a principal can be either a USER or a GROUP. Each principal can be have the following type of document access: ALLOW or DENY."
        memberRelation:
          $ref: "#/components/schemas/MemberRelation"
          description: Describes the member relation within a principal list.
      required:
        - principals
    Principals:
      type: array
      items:
        $ref: "#/components/schemas/Principal"
    Principal:
      description: Provides user and group information used for filtering documents to use for generating Amazon Q Business conversation responses.
      type: object
      properties:
        user:
          $ref: "#/components/schemas/PrincipalUser"
          description: The user associated with the principal.
        group:
          $ref: "#/components/schemas/PrincipalGroup"
          description: The group associated with the principal.
    PrincipalUser:
      description: Provides information about a user associated with a principal.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UserId"
          description: The identifier of the user.
        access:
          $ref: "#/components/schemas/ReadAccessType"
          description: Provides information about whether to allow or deny access to the principal.
        membershipType:
          $ref: "#/components/schemas/MembershipType"
          description: The type of group.
      required:
        - access
    UserId:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: \P{C}*
    ReadAccessType:
      type: string
      enum:
        - ALLOW
        - DENY
    MembershipType:
      type: string
      enum:
        - INDEX
        - DATASOURCE
    PrincipalGroup:
      description: Provides information about a group associated with the principal.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/GroupName"
          description: The name of the group.
        access:
          $ref: "#/components/schemas/ReadAccessType"
          description: Provides information about whether to allow or deny access to the principal.
        membershipType:
          $ref: "#/components/schemas/MembershipType"
          description: The type of group.
      required:
        - access
    GroupName:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: \P{C}*
    MemberRelation:
      type: string
      enum:
        - AND
        - OR
    DocumentEnrichmentConfiguration:
      description: Provides the configuration information for altering document metadata and content during the document ingestion process. For more information, see Custom document enrichment.
      type: object
      properties:
        inlineConfigurations:
          $ref: "#/components/schemas/InlineDocumentEnrichmentConfigurations"
          description: Configuration information to alter document attributes or metadata fields and content when ingesting documents into Amazon Q Business.
        preExtractionHookConfiguration:
          $ref: "#/components/schemas/HookConfiguration"
        postExtractionHookConfiguration:
          $ref: "#/components/schemas/HookConfiguration"
    InlineDocumentEnrichmentConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/InlineDocumentEnrichmentConfiguration"
    InlineDocumentEnrichmentConfiguration:
      description: Provides the configuration information for applying basic logic to alter document metadata and content when ingesting documents into Amazon Q Business. To apply advanced logic, to go beyond what you can do with basic logic, see HookConfiguration . For more information, see Custom document enrichment.
      type: object
      properties:
        condition:
          $ref: "#/components/schemas/DocumentAttributeCondition"
        target:
          $ref: "#/components/schemas/DocumentAttributeTarget"
        documentContentOperator:
          $ref: "#/components/schemas/DocumentContentOperator"
          description: TRUE to delete content if the condition used for the target attribute is met.
    DocumentAttributeCondition:
      description: The condition used for the target document attribute or metadata field when ingesting documents into Amazon Q Business. You use this with DocumentAttributeTarget to apply the condition. For example, you can create the 'Department' target field and have it prefill department names associated with the documents based on information in the 'Source_URI' field. Set the condition that if the 'Source_URI' field contains 'financial' in its URI value, then prefill the target field 'Department' with the target value 'Finance' for the document. Amazon Q Business can't create a target field if it has not already been created as an index field. After you create your index field, you can create a document metadata field using DocumentAttributeTarget. Amazon Q Business then will map your newly created metadata field to your index field.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/DocumentAttributeKey"
          description: The identifier of the document attribute used for the condition. For example, 'Source_URI' could be an identifier for the attribute or metadata field that contains source URIs associated with the documents. Amazon Q Business currently doesn't support _document_body as an attribute key used for the condition.
        operator:
          $ref: "#/components/schemas/DocumentEnrichmentConditionOperator"
          description: The identifier of the document attribute used for the condition. For example, 'Source_URI' could be an identifier for the attribute or metadata field that contains source URIs associated with the documents. Amazon Q Business currently does not support _document_body as an attribute key used for the condition.
        value:
          $ref: "#/components/schemas/DocumentAttributeValue"
      required:
        - key
        - operator
    DocumentEnrichmentConditionOperator:
      type: string
      enum:
        - GREATER_THAN
        - GREATER_THAN_OR_EQUALS
        - LESS_THAN
        - LESS_THAN_OR_EQUALS
        - EQUALS
        - NOT_EQUALS
        - CONTAINS
        - NOT_CONTAINS
        - EXISTS
        - NOT_EXISTS
        - BEGINS_WITH
    DocumentAttributeTarget:
      description: The target document attribute or metadata field you want to alter when ingesting documents into Amazon Q Business. For example, you can delete all customer identification numbers associated with the documents, stored in the document metadata field called 'Customer_ID' by setting the target key as 'Customer_ID' and the deletion flag to TRUE. This removes all customer ID values in the field 'Customer_ID'. This would scrub personally identifiable information from each document's metadata. Amazon Q Business can't create a target field if it has not already been created as an index field. After you create your index field, you can create a document metadata field using DocumentAttributeTarget . Amazon Q Business will then map your newly created document attribute to your index field. You can also use this with DocumentAttributeCondition .
      type: object
      properties:
        key:
          $ref: "#/components/schemas/DocumentAttributeKey"
          description: The identifier of the target document attribute or metadata field. For example, 'Department' could be an identifier for the target attribute or metadata field that includes the department names associated with the documents.
        value:
          $ref: "#/components/schemas/DocumentAttributeValue"
        attributeValueOperator:
          $ref: "#/components/schemas/AttributeValueOperator"
          description: TRUE to delete the existing target value for your specified target attribute key. You cannot create a target value and set this to TRUE.
      required:
        - key
    AttributeValueOperator:
      type: string
      enum:
        - DELETE
    DocumentContentOperator:
      type: string
      enum:
        - DELETE
    HookConfiguration:
      description: Provides the configuration information for invoking a Lambda function in Lambda to alter document metadata and content when ingesting documents into Amazon Q Business. You can configure your Lambda function using the PreExtractionHookConfiguration parameter if you want to apply advanced alterations on the original or raw documents. If you want to apply advanced alterations on the Amazon Q Business structured documents, you must configure your Lambda function using PostExtractionHookConfiguration. You can only invoke one Lambda function. However, this function can invoke other functions it requires. For more information, see Custom document enrichment.
      type: object
      properties:
        invocationCondition:
          $ref: "#/components/schemas/DocumentAttributeCondition"
          description: The condition used for when a Lambda function should be invoked. For example, you can specify a condition that if there are empty date-time values, then Amazon Q Business should invoke a function that inserts the current date-time.
        lambdaArn:
          $ref: "#/components/schemas/LambdaArn"
          description: The Amazon Resource Name (ARN) of the Lambda function during ingestion. For more information, see Using Lambda functions for Amazon Q Business document enrichment.
        s3BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: Stores the original, raw documents or the structured, parsed documents before and after altering them. For more information, see Data contracts for Lambda functions.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of a role with permission to run PreExtractionHookConfiguration and PostExtractionHookConfiguration for altering document metadata and content during the document ingestion process.
    LambdaArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:[a-z0-9-\.]{1,63}:lambda:[a-z-]*-[0-9]:[0-9]{12}:function:[a-zA-Z0-9-_]+(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})?(:[a-zA-Z0-9-_]+)?
    RoleArn:
      type: string
      minLength: 0
      maxLength: 1284
      pattern: arn:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[^/].{0,1023}
    MediaExtractionConfiguration:
      description: The configuration for extracting information from media in documents.
      type: object
      properties:
        imageExtractionConfiguration:
          $ref: "#/components/schemas/ImageExtractionConfiguration"
          description: The configuration for extracting semantic meaning from images in documents. For more information, see Extracting semantic meaning from images and visuals.
        audioExtractionConfiguration:
          $ref: "#/components/schemas/AudioExtractionConfiguration"
          description: Configuration settings for extracting and processing audio content from media files.
        videoExtractionConfiguration:
          $ref: "#/components/schemas/VideoExtractionConfiguration"
          description: Configuration settings for extracting and processing video content from media files.
    ImageExtractionConfiguration:
      description: The configuration for extracting semantic meaning from images in documents. For more information, see Extracting semantic meaning from images and visuals.
      type: object
      properties:
        imageExtractionStatus:
          $ref: "#/components/schemas/ImageExtractionStatus"
          description: Specify whether to extract semantic meaning from images and visuals from documents.
      required:
        - imageExtractionStatus
    ImageExtractionStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    AudioExtractionConfiguration:
      description: Configuration settings for audio content extraction and processing.
      type: object
      properties:
        audioExtractionStatus:
          $ref: "#/components/schemas/AudioExtractionStatus"
          description: The status of audio extraction (ENABLED or DISABLED) for processing audio content from files.
      required:
        - audioExtractionStatus
    AudioExtractionStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    VideoExtractionConfiguration:
      description: Configuration settings for video content extraction and processing.
      type: object
      properties:
        videoExtractionStatus:
          $ref: "#/components/schemas/VideoExtractionStatus"
          description: The status of video extraction (ENABLED or DISABLED) for processing video content from files.
      required:
        - videoExtractionStatus
    VideoExtractionStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    BatchPutDocumentResponse:
      type: object
      properties:
        failedDocuments:
          $ref: "#/components/schemas/FailedDocuments"
          description: A list of documents that were not added to the Amazon Q Business index because the document failed a validation check. Each document contains an error message that indicates why the document couldn't be added to the index.
    SubscriptionId:
      type: string
      minLength: 0
      maxLength: 1224
    CancelSubscriptionResponse:
      type: object
      properties:
        subscriptionArn:
          $ref: "#/components/schemas/SubscriptionArn"
          description: The Amazon Resource Name (ARN) of the Amazon Q Business subscription being cancelled.
        currentSubscription:
          $ref: "#/components/schemas/SubscriptionDetails"
          description: The type of your current Amazon Q Business subscription.
        nextSubscription:
          $ref: "#/components/schemas/SubscriptionDetails"
          description: The type of the Amazon Q Business subscription for the next month.
    SubscriptionArn:
      type: string
      minLength: 10
      maxLength: 1224
      pattern: arn:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[^/].{0,1023}
    SubscriptionDetails:
      description: The details of an Amazon Q Business subscription.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/SubscriptionType"
          description: The type of an Amazon Q Business subscription.
    SubscriptionType:
      type: string
      enum:
        - Q_LITE
        - Q_BUSINESS
    UserGroups:
      type: array
      items:
        $ref: "#/components/schemas/String"
    ConversationId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-zA-Z0-9][a-zA-Z0-9-]{35}"
    MessageId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-zA-Z0-9][a-zA-Z0-9-]{35}"
    ClientToken:
      type: string
      minLength: 1
      maxLength: 100
    ChatInputStream:
      description: The streaming input for the Chat API.
      type: object
      properties:
        configurationEvent:
          $ref: "#/components/schemas/ConfigurationEvent"
          description: A configuration event activated by an end user request to select a specific chat mode.
        textEvent:
          $ref: "#/components/schemas/TextInputEvent"
          description: Information about the payload of the ChatInputStream event containing the end user message input.
        attachmentEvent:
          $ref: "#/components/schemas/AttachmentInputEvent"
          description: A request by an end user to upload a file during chat.
        actionExecutionEvent:
          $ref: "#/components/schemas/ActionExecutionEvent"
          description: A request from an end user to perform an Amazon Q Business plugin action.
        endOfInputEvent:
          $ref: "#/components/schemas/EndOfInputEvent"
          description: The end of the streaming input for the Chat API.
        authChallengeResponseEvent:
          $ref: "#/components/schemas/AuthChallengeResponseEvent"
          description: An authentication verification event response by a third party authentication server to Amazon Q Business.
    ConfigurationEvent:
      description: A configuration event activated by an end user request to select a specific chat mode.
      type: object
      properties:
        chatMode:
          $ref: "#/components/schemas/ChatMode"
          description: The chat modes available to an Amazon Q Business end user. RETRIEVAL_MODE - The default chat mode for an Amazon Q Business application. When this mode is enabled, Amazon Q Business generates responses only from data sources connected to an Amazon Q Business application. CREATOR_MODE - By selecting this mode, users can choose to generate responses only from the LLM knowledge, without consulting connected data sources, for a chat request. PLUGIN_MODE - By selecting this mode, users can choose to use plugins in chat. For more information, see Admin controls and guardrails, Plugins, and Conversation settings.
        chatModeConfiguration:
          $ref: "#/components/schemas/ChatModeConfiguration"
        attributeFilter:
          $ref: "#/components/schemas/AttributeFilter"
    ChatMode:
      type: string
      enum:
        - RETRIEVAL_MODE
        - CREATOR_MODE
        - PLUGIN_MODE
    ChatModeConfiguration:
      description: Configuration information for Amazon Q Business conversation modes. For more information, see Admin controls and guardrails and Conversation settings.
      type: object
      properties:
        pluginConfiguration:
          $ref: "#/components/schemas/PluginConfiguration"
          description: Configuration information required to invoke chat in PLUGIN_MODE.
    PluginConfiguration:
      description: Configuration information required to invoke chat in PLUGIN_MODE. For more information, see Admin controls and guardrails, Plugins, and Conversation settings.
      type: object
      properties:
        pluginId:
          $ref: "#/components/schemas/PluginId"
          description: The identifier of the plugin you want to use.
      required:
        - pluginId
    PluginId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    AttributeFilter:
      description: Enables filtering of responses based on document attributes or metadata fields.
      type: object
      properties:
        andAllFilters:
          $ref: "#/components/schemas/AttributeFilters"
          description: Performs a logical AND operation on all supplied filters.
        orAllFilters:
          $ref: "#/components/schemas/AttributeFilters"
          description: Performs a logical OR operation on all supplied filters.
        notFilter:
          $ref: "#/components/schemas/AttributeFilter"
          description: Performs a logical NOT operation on all supplied filters.
        equalsTo:
          $ref: "#/components/schemas/DocumentAttribute"
          description: "Performs an equals operation on two document attributes or metadata fields. Supported for the following document attribute value types: dateValue, longValue, stringListValue and stringValue."
        containsAll:
          $ref: "#/components/schemas/DocumentAttribute"
          description: "Returns true when a document contains all the specified document attributes or metadata fields. Supported for the following document attribute value types: stringListValue."
        containsAny:
          $ref: "#/components/schemas/DocumentAttribute"
          description: "Returns true when a document contains any of the specified document attributes or metadata fields. Supported for the following document attribute value types: stringListValue."
        greaterThan:
          $ref: "#/components/schemas/DocumentAttribute"
          description: "Performs a greater than operation on two document attributes or metadata fields. Supported for the following document attribute value types: dateValue and longValue."
        greaterThanOrEquals:
          $ref: "#/components/schemas/DocumentAttribute"
          description: "Performs a greater or equals than operation on two document attributes or metadata fields. Supported for the following document attribute value types: dateValue and longValue."
        lessThan:
          $ref: "#/components/schemas/DocumentAttribute"
          description: "Performs a less than operation on two document attributes or metadata fields. Supported for the following document attribute value types: dateValue and longValue."
        lessThanOrEquals:
          $ref: "#/components/schemas/DocumentAttribute"
          description: "Performs a less than or equals operation on two document attributes or metadata fields.Supported for the following document attribute value type: dateValue and longValue."
    AttributeFilters:
      type: array
      items:
        $ref: "#/components/schemas/AttributeFilter"
    TextInputEvent:
      description: An input event for a end user message in an Amazon Q Business web experience.
      type: object
      properties:
        userMessage:
          $ref: "#/components/schemas/UserMessage"
          description: A user message in a text message input event.
      required:
        - userMessage
    UserMessage:
      type: string
    AttachmentInputEvent:
      description: A file input event activated by a end user request to upload files into their web experience chat.
      type: object
      properties:
        attachment:
          $ref: "#/components/schemas/AttachmentInput"
    AttachmentInput:
      description: This is either a file directly uploaded into a web experience chat or a reference to an existing attachment that is part of a web experience chat.
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Blob"
          description: The contents of the attachment.
        name:
          $ref: "#/components/schemas/AttachmentName"
          description: The filename of the attachment.
        copyFrom:
          $ref: "#/components/schemas/CopyFromSource"
          description: A reference to an existing attachment.
    AttachmentName:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: \P{C}*
    CopyFromSource:
      description: The source reference for an existing attachment.
      type: object
      properties:
        conversation:
          $ref: "#/components/schemas/ConversationSource"
          description: A reference to an attachment in an existing conversation.
    ConversationSource:
      description: The source reference for an existing attachment in an existing conversation.
      type: object
      properties:
        conversationId:
          $ref: "#/components/schemas/ConversationId"
          description: The unique identifier of the Amazon Q Business conversation.
        attachmentId:
          $ref: "#/components/schemas/AttachmentId"
          description: The unique identifier of the Amazon Q Business attachment.
      required:
        - conversationId
        - attachmentId
    AttachmentId:
      type: string
      pattern: "[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}"
    ActionExecutionEvent:
      description: A request from an end user signalling an intent to perform an Amazon Q Business plugin action during a streaming chat.
      type: object
      properties:
        pluginId:
          $ref: "#/components/schemas/PluginId"
          description: The identifier of the plugin for which the action is being requested.
        payload:
          type: object
          properties: {}
          description: A mapping of field names to the field values in input that an end user provides to Amazon Q Business requests to perform their plugin action.
        payloadFieldNameSeparator:
          $ref: "#/components/schemas/ActionPayloadFieldNameSeparator"
          description: A string used to retain information about the hierarchical contexts within a action execution event payload.
      required:
        - pluginId
        - payload
        - payloadFieldNameSeparator
    ActionPayloadFieldNameSeparator:
      type: string
      minLength: 1
      maxLength: 1
    EndOfInputEvent:
      description: The end of the streaming input for the Chat API.
      type: object
    AuthChallengeResponseEvent:
      description: An authentication verification event response by a third party authentication server to Amazon Q Business.
      type: object
      properties:
        responseMap:
          type: object
          properties: {}
          description: The mapping of key-value pairs in an authentication challenge response.
      required:
        - responseMap
    ChatOutput:
      type: object
      properties:
        outputStream:
          $ref: "#/components/schemas/ChatOutputStream"
          description: The streaming output for the Chat API.
    ChatOutputStream:
      description: The streaming output for the Chat API.
      type: object
      properties:
        textEvent:
          $ref: "#/components/schemas/TextOutputEvent"
          description: Information about the payload of the ChatOutputStream event containing the AI-generated message output.
        metadataEvent:
          $ref: "#/components/schemas/MetadataEvent"
          description: A metadata event for a AI-generated text output message in a Amazon Q Business conversation.
        actionReviewEvent:
          $ref: "#/components/schemas/ActionReviewEvent"
          description: A request from Amazon Q Business to the end user for information Amazon Q Business needs to successfully complete a requested plugin action.
        failedAttachmentEvent:
          $ref: "#/components/schemas/FailedAttachmentEvent"
          description: A failed file upload event during a web experience chat.
        authChallengeRequestEvent:
          $ref: "#/components/schemas/AuthChallengeRequestEvent"
          description: An authentication verification event activated by an end user request to use a custom plugin.
    TextOutputEvent:
      description: An output event for an AI-generated response in an Amazon Q Business web experience.
      type: object
      properties:
        systemMessageType:
          $ref: "#/components/schemas/SystemMessageType"
          description: "The type of AI-generated message in a TextOutputEvent. Amazon Q Business currently supports two types of messages: RESPONSE - The Amazon Q Business system response. GROUNDED_RESPONSE - The corrected, hallucination-reduced, response returned by Amazon Q Business. Available only if hallucination reduction is supported and configured for the application and detected in the end user chat query by Amazon Q Business."
        conversationId:
          $ref: "#/components/schemas/ConversationId"
          description: The identifier of the conversation with which the text output event is associated.
        userMessageId:
          $ref: "#/components/schemas/MessageId"
          description: The identifier of an end user message in a TextOutputEvent.
        systemMessageId:
          $ref: "#/components/schemas/MessageId"
          description: The identifier of an AI-generated message in a TextOutputEvent.
        systemMessage:
          $ref: "#/components/schemas/String"
          description: An AI-generated message in a TextOutputEvent.
    SystemMessageType:
      type: string
      enum:
        - RESPONSE
        - GROUNDED_RESPONSE
    MetadataEvent:
      description: A metadata event for a AI-generated text output message in a Amazon Q Business conversation, containing associated metadata generated.
      type: object
      properties:
        conversationId:
          $ref: "#/components/schemas/ConversationId"
          description: The identifier of the conversation with which the generated metadata is associated.
        userMessageId:
          $ref: "#/components/schemas/MessageId"
          description: The identifier of an Amazon Q Business end user text input message within the conversation.
        systemMessageId:
          $ref: "#/components/schemas/MessageId"
          description: The identifier of an Amazon Q Business AI generated message within the conversation.
        sourceAttributions:
          $ref: "#/components/schemas/SourceAttributions"
          description: The source documents used to generate the conversation response.
        finalTextMessage:
          $ref: "#/components/schemas/String"
          description: The final text output message generated by the system.
    SourceAttributions:
      type: array
      items:
        $ref: "#/components/schemas/SourceAttribution"
    SourceAttribution:
      description: The documents used to generate an Amazon Q Business web experience response.
      type: object
      properties:
        title_:
          $ref: "#/components/schemas/String"
          description: The title of the document which is the source for the Amazon Q Business generated response.
        snippet:
          $ref: "#/components/schemas/String"
          description: The content extract from the document on which the generated response is based.
        url:
          $ref: "#/components/schemas/String"
          description: The URL of the document which is the source for the Amazon Q Business generated response.
        citationNumber:
          $ref: "#/components/schemas/Integer"
          description: The number attached to a citation in an Amazon Q Business generated response.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when the Amazon Q Business application was last updated.
        textMessageSegments:
          $ref: "#/components/schemas/TextSegmentList"
          description: A text extract from a source document that is used for source attribution.
        documentId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the source document used in the citation, obtained from the Amazon Q Business index during chat response generation. This ID is used as input to the GetDocumentContent API to retrieve the actual document content for user verification.
        indexId:
          $ref: "#/components/schemas/String"
          description: The identifier of the index containing the source document's metadata and access control information. This links the citation back to the specific Amazon Q Business index where the document's searchable content and permissions are stored.
        datasourceId:
          $ref: "#/components/schemas/String"
          description: The identifier of the data source from which the document was ingested. This field is not present if the document is ingested by directly calling the BatchPutDocument API (similar to checkDocumentAccess). If the document is from a file-upload data source, the datasource will be "uploaded-docs-file-stat-datasourceid".
    Integer:
      type: integer
    TextSegmentList:
      type: array
      items:
        $ref: "#/components/schemas/TextSegment"
    TextSegment:
      description: Provides information about a text extract in a chat response that can be attributed to a source document.
      type: object
      properties:
        beginOffset:
          $ref: "#/components/schemas/Integer"
          description: The zero-based location in the response string where the source attribution starts.
        endOffset:
          $ref: "#/components/schemas/Integer"
          description: The zero-based location in the response string where the source attribution ends.
        snippetExcerpt:
          $ref: "#/components/schemas/SnippetExcerpt"
          description: The relevant text excerpt from a source that was used to generate a citation text segment in an Amazon Q Business chat response.
        mediaId:
          $ref: "#/components/schemas/SourceAttributionMediaId"
          description: The identifier of the media object associated with the text segment in the source attribution.
        mediaMimeType:
          $ref: "#/components/schemas/String"
          description: The MIME type (image/png) of the media object associated with the text segment in the source attribution.
        sourceDetails:
          $ref: "#/components/schemas/SourceDetails"
          description: Source information for a segment of extracted text, including its media type.
    SnippetExcerpt:
      description: Contains the relevant text excerpt from a source that was used to generate a citation text segment in an Amazon Q Business chat response.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/SnippetExcerptText"
          description: The relevant text excerpt from a source that was used to generate a citation text segment in an Amazon Q chat response.
    SnippetExcerptText:
      type: string
    SourceAttributionMediaId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-zA-Z0-9][a-zA-Z0-9-]{35}"
    SourceDetails:
      description: Container for details about different types of media sources (image, audio, or video).
      type: object
      properties:
        imageSourceDetails:
          $ref: "#/components/schemas/ImageSourceDetails"
          description: Details specific to image content within the source.
        audioSourceDetails:
          $ref: "#/components/schemas/AudioSourceDetails"
          description: Details specific to audio content within the source.
        videoSourceDetails:
          $ref: "#/components/schemas/VideoSourceDetails"
          description: Details specific to video content within the source.
    ImageSourceDetails:
      description: Details about an image source, including its identifier and format.
      type: object
      properties:
        mediaId:
          $ref: "#/components/schemas/MediaId"
          description: Unique identifier for the image file.
        mediaMimeType:
          $ref: "#/components/schemas/String"
          description: The MIME type of the image file.
    MediaId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-zA-Z0-9][a-zA-Z0-9-]{35}"
    AudioSourceDetails:
      description: Details about an audio source, including its identifier, format, and time information.
      type: object
      properties:
        mediaId:
          $ref: "#/components/schemas/MediaId"
          description: Unique identifier for the audio media file.
        mediaMimeType:
          $ref: "#/components/schemas/String"
          description: The MIME type of the audio file (e.g., audio/mp3, audio/wav).
        startTimeMilliseconds:
          $ref: "#/components/schemas/Long"
          description: The starting timestamp in milliseconds for the relevant audio segment.
        endTimeMilliseconds:
          $ref: "#/components/schemas/Long"
          description: The ending timestamp in milliseconds for the relevant audio segment.
        audioExtractionType:
          $ref: "#/components/schemas/AudioExtractionType"
          description: The type of audio extraction performed on the content.
    AudioExtractionType:
      type: string
      enum:
        - TRANSCRIPT
        - SUMMARY
    VideoSourceDetails:
      description: Details about a video source, including its identifier, format, and time information.
      type: object
      properties:
        mediaId:
          $ref: "#/components/schemas/MediaId"
          description: Unique identifier for the video media file.
        mediaMimeType:
          $ref: "#/components/schemas/String"
          description: The MIME type of the video file (e.g., video/mp4, video/avi).
        startTimeMilliseconds:
          $ref: "#/components/schemas/Long"
          description: The starting timestamp in milliseconds for the relevant video segment.
        endTimeMilliseconds:
          $ref: "#/components/schemas/Long"
          description: The ending timestamp in milliseconds for the relevant video segment.
        videoExtractionType:
          $ref: "#/components/schemas/VideoExtractionType"
          description: The type of video extraction performed on the content.
    VideoExtractionType:
      type: string
      enum:
        - TRANSCRIPT
        - SUMMARY
    ActionReviewEvent:
      description: An output event that Amazon Q Business returns to an user who wants to perform a plugin action during a streaming chat conversation. It contains information about the selected action with a list of possible user input fields, some pre-populated by Amazon Q Business.
      type: object
      properties:
        conversationId:
          $ref: "#/components/schemas/ConversationId"
          description: The identifier of the conversation with which the action review event is associated.
        userMessageId:
          $ref: "#/components/schemas/MessageId"
          description: The identifier of the conversation with which the plugin action is associated.
        systemMessageId:
          $ref: "#/components/schemas/MessageId"
