                - displayName
                - type
                - authConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePluginResponse"
    get:
      operationId: ListPlugins
      description: Lists configured Amazon Q Business plugins.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the application the plugin is attached to.
        - name: nextToken
          in: query
          required: false
