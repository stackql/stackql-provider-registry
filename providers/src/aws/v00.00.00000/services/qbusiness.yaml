          description: Information about the basic authentication credentials used to configure a plugin.
        oAuth2ClientCredentialConfiguration:
          $ref: "#/components/schemas/OAuth2ClientCredentialConfiguration"
          description: Information about the OAuth 2.0 authentication credential/token used to configure a plugin.
        noAuthConfiguration:
          $ref: "#/components/schemas/NoAuthConfiguration"
          description: Information about invoking a custom plugin without any authentication.
        idcAuthConfiguration:
          $ref: "#/components/schemas/IdcAuthConfiguration"
          description: Information about the IAM Identity Center Application used to configure authentication for a plugin.
    BasicAuthConfiguration:
      description: Information about the basic authentication credentials used to configure a plugin.
      type: object
      properties:
        secretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The ARN of the Secrets Manager secret that stores the basic authentication credentials used for plugin configuration..
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of an IAM role used by Amazon Q Business to access the basic authentication credentials stored in a Secrets Manager secret.
      required:
        - secretArn
        - roleArn
    SecretArn:
      type: string
      minLength: 0
      maxLength: 1284
      pattern: arn:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[^/].{0,1023}
    OAuth2ClientCredentialConfiguration:
      description: Information about the OAuth 2.0 authentication credential/token used to configure a plugin.
      type: object
      properties:
        secretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The ARN of the Secrets Manager secret that stores the OAuth 2.0 credentials/token used for plugin configuration.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of an IAM role used by Amazon Q Business to access the OAuth 2.0 authentication credentials stored in a Secrets Manager secret.
        authorizationUrl:
          $ref: "#/components/schemas/Url"
          description: The redirect URL required by the OAuth 2.0 protocol for Amazon Q Business to authenticate a plugin user through a third party authentication server.
        tokenUrl:
          $ref: "#/components/schemas/Url"
          description: The URL required by the OAuth 2.0 protocol to exchange an end user authorization code for an access token.
      required:
        - secretArn
        - roleArn
    NoAuthConfiguration:
      description: Information about invoking a custom plugin without any authentication or authorization requirement.
      type: object
    IdcAuthConfiguration:
      description: Information about the IAM Identity Center Application used to configure authentication for a plugin.
      type: object
      properties:
        idcApplicationArn:
          $ref: "#/components/schemas/IdcApplicationArn"
          description: The Amazon Resource Name (ARN) of the IAM Identity Center Application used to configure authentication.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role with permissions to perform actions on Amazon Web Services services on your behalf.
      required:
        - idcApplicationArn
        - roleArn
    CustomPluginConfiguration:
      description: Configuration information required to create a custom plugin.
      type: object
      properties:
        description:
          $ref: "#/components/schemas/PluginDescription"
          description: A description for your custom plugin configuration.
        apiSchemaType:
          $ref: "#/components/schemas/APISchemaType"
          description: The type of OpenAPI schema to use.
        apiSchema:
          $ref: "#/components/schemas/APISchema"
          description: Contains either details about the S3 object containing the OpenAPI schema for the action group or the JSON or YAML-formatted payload defining the schema.
      required:
        - description
        - apiSchemaType
    PluginDescription:
      type: string
      minLength: 1
      maxLength: 200
    APISchemaType:
      type: string
      enum:
        - OPEN_API_V3
    APISchema:
      description: Contains details about the OpenAPI schema for a custom plugin. For more information, see custom plugin OpenAPI schemas. You can either include the schema directly in the payload field or you can upload it to an S3 bucket and specify the S3 bucket location in the s3 field.
      type: object
      properties:
        payload:
          $ref: "#/components/schemas/Payload"
          description: The JSON or YAML-formatted payload defining the OpenAPI schema for a custom plugin.
        s3:
          $ref: "#/components/schemas/S3"
          description: Contains details about the S3 object containing the OpenAPI schema for a custom plugin. The schema could be in either JSON or YAML format.
    Payload:
      type: string
    CreatePluginResponse:
      type: object
      properties:
        pluginId:
          $ref: "#/components/schemas/PluginId"
          description: The identifier of the plugin created.
        pluginArn:
          $ref: "#/components/schemas/PluginArn"
          description: The Amazon Resource Name (ARN) of a plugin.
        buildStatus:
          $ref: "#/components/schemas/PluginBuildStatus"
          description: The current status of a plugin. A plugin is modified asynchronously.
    PluginArn:
      type: string
      minLength: 0
      maxLength: 1284
      pattern: arn:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[^/].{0,1023}
    PluginBuildStatus:
      type: string
      enum:
        - READY
        - CREATE_IN_PROGRESS
        - CREATE_FAILED
        - UPDATE_IN_PROGRESS
        - UPDATE_FAILED
        - DELETE_IN_PROGRESS
        - DELETE_FAILED
    RetrieverType:
      type: string
      enum:
        - NATIVE_INDEX
        - KENDRA_INDEX
    RetrieverName:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*"
    RetrieverConfiguration:
      description: Provides information on how the retriever used for your Amazon Q Business application is configured.
      type: object
      properties:
        nativeIndexConfiguration:
          $ref: "#/components/schemas/NativeIndexConfiguration"
          description: Provides information on how a Amazon Q Business index used as a retriever for your Amazon Q Business application is configured.
        kendraIndexConfiguration:
          $ref: "#/components/schemas/KendraIndexConfiguration"
          description: Provides information on how the Amazon Kendra index used as a retriever for your Amazon Q Business application is configured.
    NativeIndexConfiguration:
      description: Configuration information for an Amazon Q Business index.
      type: object
      properties:
        indexId:
          $ref: "#/components/schemas/IndexId"
          description: The identifier for the Amazon Q Business index.
        version:
          $ref: "#/components/schemas/Long"
          description: "A read-only field that specifies the version of the NativeIndexConfiguration. Amazon Q Business introduces enhanced document retrieval capabilities in version 2 of NativeIndexConfiguration, focusing on streamlined metadata boosting that prioritizes recency and source relevance to deliver more accurate responses to your queries. Version 2 has the following differences from version 1: Version 2 supports a single Date field (created_at OR last_updated_at) for recency boosting Version 2 supports a single String field with an ordered list of up to 5 values Version 2 introduces number-based boost levels (ONE, TWO) alongside the text-based levels Version 2 allows specifying prioritization between Date and String fields Version 2 maintains backward compatibility with existing configurations"
        boostingOverride:
          type: object
          properties: {}
          description: Overrides the default boosts applied by Amazon Q Business to supported document attribute data types.
      required:
        - indexId
    KendraIndexConfiguration:
      description: Stores an Amazon Kendra index as a retriever.
      type: object
      properties:
        indexId:
          $ref: "#/components/schemas/KendraIndexId"
          description: The identifier of the Amazon Kendra index.
      required:
        - indexId
    KendraIndexId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-zA-Z0-9][a-zA-Z0-9-]{35}"
    CreateRetrieverResponse:
      type: object
      properties:
        retrieverId:
          $ref: "#/components/schemas/RetrieverId"
          description: The identifier of the retriever you are using.
        retrieverArn:
          $ref: "#/components/schemas/RetrieverArn"
          description: The Amazon Resource Name (ARN) of an IAM role associated with a retriever.
    RetrieverId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-zA-Z0-9][a-zA-Z0-9-]{35}"
    RetrieverArn:
      type: string
      minLength: 0
      maxLength: 1284
      pattern: arn:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[^/].{0,1023}
    SubscriptionPrincipal:
      description: A user or group in the IAM Identity Center instance connected to the Amazon Q Business application.
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserIdentifier"
          description: The identifier of a user in the IAM Identity Center instance connected to the Amazon Q Business application.
        group:
          $ref: "#/components/schemas/GroupIdentifier"
          description: The identifier of a group in the IAM Identity Center instance connected to the Amazon Q Business application.
    UserIdentifier:
      type: string
      minLength: 1
      maxLength: 47
      pattern: ([0-9a-f]{10}-|)[A-Fa-f0-9]{8}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{12}
    GroupIdentifier:
      type: string
      minLength: 1
      maxLength: 47
      pattern: ([0-9a-f]{10}-|)[A-Fa-f0-9]{8}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{12}
    CreateSubscriptionResponse:
      type: object
      properties:
        subscriptionId:
          $ref: "#/components/schemas/SubscriptionId"
          description: The identifier of the Amazon Q Business subscription created.
        subscriptionArn:
          $ref: "#/components/schemas/SubscriptionArn"
          description: The Amazon Resource Name (ARN) of the Amazon Q Business subscription created.
        currentSubscription:
          $ref: "#/components/schemas/SubscriptionDetails"
          description: The type of your current Amazon Q Business subscription.
        nextSubscription:
          $ref: "#/components/schemas/SubscriptionDetails"
          description: The type of the Amazon Q Business subscription for the next month.
    CreateUserRequestUserAliasesList:
      type: array
      items:
        $ref: "#/components/schemas/UserAlias"
    UserAlias:
