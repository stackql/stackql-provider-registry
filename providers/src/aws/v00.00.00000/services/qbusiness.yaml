openapi: 3.0.0
info:
  version: "2023-11-27"
  title: QBusiness
  description: QBusiness
  x-serviceName: qbusiness
  x-serviceAlias: qbusiness
  x-protocol: rest-json
  x-apiVersion: "2023-11-27"
  x-endpointPrefix: qbusiness
servers:
  - url: https://qbusiness.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for qbusiness
paths:
  /applications/{application_id}/policy:
    post:
      operationId: AssociatePermission
      description: Adds or updates a permission policy for a Amazon Q Business application, allowing cross-account access for an ISV. This operation creates a new policy statement for the specified Amazon Q Business application. The policy statement defines the IAM actions that the ISV is allowed to perform on the Amazon Q Business application's resources.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The unique identifier of the Amazon Q Business application.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                statementId:
                  $ref: "#/components/schemas/StatementId"
                actions:
                  $ref: "#/components/schemas/QIamActions"
                conditions:
                  $ref: "#/components/schemas/PermissionConditions"
                principal:
                  $ref: "#/components/schemas/PrincipalRoleArn"
              required:
                - statementId
                - actions
                - principal
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociatePermissionResponse"
    get:
      operationId: GetPolicy
      description: Retrieves the current permission policy for a Amazon Q Business application. The policy is returned as a JSON-formatted string and defines the IAM actions that are allowed or denied for the application's resources.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The unique identifier of the Amazon Q Business application.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPolicyResponse"
  /applications/{application_id}/indices/{index_id}/documents/delete:
    post:
      operationId: BatchDeleteDocument
      description: Asynchronously deletes one or more documents added using the BatchPutDocument API from an Amazon Q Business index. You can see the progress of the deletion, and any error messages related to the process, by using CloudWatch.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the Amazon Q Business application.
        - name: index_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IndexId"
          description: The identifier of the Amazon Q Business index that contains the documents to delete.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                documents:
                  $ref: "#/components/schemas/DeleteDocuments"
                dataSourceSyncId:
                  $ref: "#/components/schemas/ExecutionId"
              required:
                - documents
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteDocumentResponse"
  /applications/{application_id}/indices/{index_id}/documents:
    post:
      operationId: BatchPutDocument
      description: "Adds one or more documents to an Amazon Q Business index. You use this API to: ingest your structured and unstructured documents and documents stored in an Amazon S3 bucket into an Amazon Q Business index. add custom attributes to documents in an Amazon Q Business index. attach an access control list to the documents added to an Amazon Q Business index. You can see the progress of the deletion, and any error messages related to the process, by using CloudWatch."
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the Amazon Q Business application.
        - name: index_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IndexId"
          description: The identifier of the Amazon Q Business index to add the documents to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                documents:
                  $ref: "#/components/schemas/Documents"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                dataSourceSyncId:
                  $ref: "#/components/schemas/ExecutionId"
              required:
                - documents
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchPutDocumentResponse"
  /applications/{application_id}/subscriptions/{subscription_id}:
    delete:
      operationId: CancelSubscription
      description: Unsubscribes a user or a group from their pricing tier in an Amazon Q Business application. An unsubscribed user or group loses all Amazon Q Business feature access at the start of next month.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the Amazon Q Business application for which the subscription is being cancelled.
        - name: subscription_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SubscriptionId"
          description: The identifier of the Amazon Q Business subscription being cancelled.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelSubscriptionResponse"
    put:
      operationId: UpdateSubscription
      description: Updates the pricing tier for an Amazon Q Business subscription. Upgrades are instant. Downgrades apply at the start of the next month. Subscription tier determines feature access for the user. For more information on subscriptions and pricing tiers, see Amazon Q Business pricing.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the Amazon Q Business application where the subscription update should take effect.
        - name: subscription_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SubscriptionId"
          description: The identifier of the Amazon Q Business subscription to be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  $ref: "#/components/schemas/SubscriptionType"
              required:
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSubscriptionResponse"
  /applications/{application_id}/conversations:
    post:
      operationId: Chat
      description: Starts or continues a streaming Amazon Q Business conversation.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the Amazon Q Business application linked to a streaming Amazon Q Business conversation.
        - name: userId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserId"
          description: The identifier of the user attached to the chat input.
        - name: userGroups
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserGroups"
          description: The group names that a user associated with the chat input belongs to.
        - name: conversationId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ConversationId"
          description: The identifier of the Amazon Q Business conversation.
        - name: parentMessageId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MessageId"
          description: The identifier used to associate a user message with a AI generated response.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A token that you provide to identify the chat input.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                inputStream:
                  $ref: "#/components/schemas/ChatInputStream"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatOutput"
    get:
      operationId: ListConversations
      description: Lists one or more Amazon Q Business conversations.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the Amazon Q Business application.
        - name: userId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserId"
          description: The identifier of the user involved in the Amazon Q Business web experience conversation.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If the maxResults response was incomplete because there is more data to retrieve, Amazon Q Business returns a pagination token in the response. You can use this pagination token to retrieve the next set of Amazon Q Business conversations.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResultsIntegerForListConversations"
          description: The maximum number of Amazon Q Business conversations to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConversationsResponse"
  /applications/{application_id}/conversations?sync:
    post:
      operationId: ChatSync
      description: Starts or continues a non-streaming Amazon Q Business conversation.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the Amazon Q Business application linked to the Amazon Q Business conversation.
        - name: userId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserId"
          description: The identifier of the user attached to the chat input.
        - name: userGroups
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserGroups"
          description: The group names that a user associated with the chat input belongs to.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                userMessage:
                  $ref: "#/components/schemas/UserMessage"
                attachments:
                  $ref: "#/components/schemas/AttachmentsInput"
                actionExecution:
                  $ref: "#/components/schemas/ActionExecution"
                authChallengeResponse:
                  $ref: "#/components/schemas/AuthChallengeResponse"
                conversationId:
                  $ref: "#/components/schemas/ConversationId"
                parentMessageId:
                  $ref: "#/components/schemas/MessageId"
                attributeFilter:
                  $ref: "#/components/schemas/AttributeFilter"
                chatMode:
                  $ref: "#/components/schemas/ChatMode"
                chatModeConfiguration:
                  $ref: "#/components/schemas/ChatModeConfiguration"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSyncOutput"
  /applications/{application_id}/index/{index_id}/users/{user_id}/documents/{document_id}/check-document-access:
    get:
      operationId: CheckDocumentAccess
      description: Verifies if a user has access permissions for a specified document and returns the actual ACL attached to the document. Resolves user access on the document via user aliases and groups when verifying user access.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The unique identifier of the application. This is required to identify the specific Amazon Q Business application context for the document access check.
        - name: index_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IndexId"
          description: The unique identifier of the index. Used to locate the correct index within the application where the document is stored.
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique identifier of the user. Used to check the access permissions for this specific user against the document's ACL.
        - name: document_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DocumentId"
          description: The unique identifier of the document. Specifies which document's access permissions are being checked.
        - name: dataSourceId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DataSourceId"
          description: The unique identifier of the data source. Identifies the specific data source from which the document originates. Should not be used when a document is uploaded directly with BatchPutDocument, as no dataSourceId is available or necessary.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckDocumentAccessResponse"
  /applications/{application_id}/experiences/{web_experience_id}/anonymous-url:
    post:
      operationId: CreateAnonymousWebExperienceUrl
      description: Creates a unique URL for anonymous Amazon Q Business web experience. This URL can only be used once and must be used within 5 minutes after it's generated.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the Amazon Q Business application environment attached to the web experience.
        - name: web_experience_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WebExperienceId"
          description: The identifier of the web experience.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionDurationInMinutes:
                  $ref: "#/components/schemas/SessionDurationInMinutes"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAnonymousWebExperienceUrlResponse"
  /applications:
    post:
      operationId: CreateApplication
      description: Creates an Amazon Q Business application. There are new tiers for Amazon Q Business. Not all features in Amazon Q Business Pro are also available in Amazon Q Business Lite. For information on what's included in Amazon Q Business Lite and what's included in Amazon Q Business Pro, see Amazon Q Business tiers. You must use the Amazon Q Business console to assign subscription tiers to users. An Amazon Q Apps service linked role will be created if it's absent in the Amazon Web Services account when QAppsConfiguration is enabled in the request. For more information, see Using service-linked roles for Q Apps. When you create an application, Amazon Q Business may securely transmit data for processing from your selected Amazon Web Services region, but within your geography. For more information, see Cross region inference in Amazon Q Business.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  $ref: "#/components/schemas/ApplicationName"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                identityType:
                  $ref: "#/components/schemas/IdentityType"
                iamIdentityProviderArn:
                  $ref: "#/components/schemas/IAMIdentityProviderArn"
                identityCenterInstanceArn:
                  $ref: "#/components/schemas/InstanceArn"
                clientIdsForOIDC:
                  $ref: "#/components/schemas/ClientIdsForOIDC"
                description:
                  $ref: "#/components/schemas/Description"
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                tags:
                  $ref: "#/components/schemas/Tags"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                attachmentsConfiguration:
                  $ref: "#/components/schemas/AttachmentsConfiguration"
                qAppsConfiguration:
                  $ref: "#/components/schemas/QAppsConfiguration"
                personalizationConfiguration:
                  $ref: "#/components/schemas/PersonalizationConfiguration"
                quickSightConfiguration:
                  $ref: "#/components/schemas/QuickSightConfiguration"
              required:
                - displayName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApplicationResponse"
    get:
      operationId: ListApplications
      description: Lists Amazon Q Business applications. Amazon Q Business applications may securely transmit data for processing across Amazon Web Services Regions within your geography. For more information, see Cross region inference in Amazon Q Business.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If the maxResults response was incomplete because there is more data to retrieve, Amazon Q Business returns a pagination token in the response. You can use this pagination token to retrieve the next set of Amazon Q Business applications.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResultsIntegerForListApplications"
          description: The maximum number of Amazon Q Business applications to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApplicationsResponse"
  /applications/{application_id}/chatresponseconfigurations:
    post:
      operationId: CreateChatResponseConfiguration
      description: Creates a new chat response configuration for an Amazon Q Business application. This operation establishes a set of parameters that define how the system generates and formats responses to user queries in chat interactions.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The unique identifier of the Amazon Q Business application for which to create the new chat response configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  $ref: "#/components/schemas/DisplayName"
                clientToken:
                  $ref: "#/components/schemas/String"
                responseConfigurations:
                  $ref: "#/components/schemas/ResponseConfigurations"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - displayName
                - responseConfigurations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChatResponseConfigurationResponse"
    get:
      operationId: ListChatResponseConfigurations
      description: Retrieves a list of all chat response configurations available in a specified Amazon Q Business application. This operation returns summary information about each configuration to help administrators manage and select appropriate response settings.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The unique identifier of the Amazon Q Business application for which to list available chat response configurations.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The maximum number of chat response configurations to return in a single response. This parameter helps control pagination of results when many configurations exist.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token used to retrieve the next set of results when the number of configurations exceeds the specified maxResults value.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChatResponseConfigurationsResponse"
  /applications/{application_id}/dataaccessors:
    post:
      operationId: CreateDataAccessor
      description: Creates a new data accessor for an ISV to access data from a Amazon Q Business application. The data accessor is an entity that represents the ISV's access to the Amazon Q Business application's data. It includes the IAM role ARN for the ISV, a friendly name, and a set of action configurations that define the specific actions the ISV is allowed to perform and any associated data filters. When the data accessor is created, an IAM Identity Center application is also created to manage the ISV's identity and authentication for accessing the Amazon Q Business application.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The unique identifier of the Amazon Q Business application.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                principal:
                  $ref: "#/components/schemas/PrincipalRoleArn"
                actionConfigurations:
                  $ref: "#/components/schemas/ActionConfigurationList"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                displayName:
                  $ref: "#/components/schemas/DataAccessorName"
                authenticationDetail:
                  $ref: "#/components/schemas/DataAccessorAuthenticationDetail"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - principal
                - actionConfigurations
                - displayName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataAccessorResponse"
    get:
      operationId: ListDataAccessors
      description: Lists the data accessors for a Amazon Q Business application. This operation returns a paginated list of data accessor summaries, including the friendly name, unique identifier, ARN, associated IAM role, and creation/update timestamps for each data accessor.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The unique identifier of the Amazon Q Business application.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken1500"
          description: The token for the next set of results. (You received this token from a previous call.)
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResultsIntegerForListDataAccessors"
          description: The maximum number of results to return in a single call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataAccessorsResponse"
  /applications/{application_id}/indices/{index_id}/datasources:
    post:
      operationId: CreateDataSource
      description: Creates a data source connector for an Amazon Q Business application. CreateDataSource is a synchronous operation. The operation returns 200 if the data source was successfully created. Otherwise, an exception is raised.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the Amazon Q Business application the data source will be attached to.
        - name: index_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IndexId"
          description: The identifier of the index that you want to use with the data source connector.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  $ref: "#/components/schemas/DataSourceName"
                configuration:
                  $ref: "#/components/schemas/DataSourceConfiguration"
                vpcConfiguration:
                  $ref: "#/components/schemas/DataSourceVpcConfiguration"
                description:
                  $ref: "#/components/schemas/Description"
                tags:
                  $ref: "#/components/schemas/Tags"
                syncSchedule:
                  $ref: "#/components/schemas/SyncSchedule"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                documentEnrichmentConfiguration:
                  $ref: "#/components/schemas/DocumentEnrichmentConfiguration"
                mediaExtractionConfiguration:
                  $ref: "#/components/schemas/MediaExtractionConfiguration"
              required:
                - displayName
                - configuration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataSourceResponse"
    get:
      operationId: ListDataSources
      description: Lists the Amazon Q Business data source connectors that you have created.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the Amazon Q Business application linked to the data source connectors.
        - name: index_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IndexId"
          description: The identifier of the index used with one or more data source connectors.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If the maxResults response was incomplete because there is more data to retrieve, Amazon Q Business returns a pagination token in the response. You can use this pagination token to retrieve the next set of Amazon Q Business data source connectors.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResultsIntegerForListDataSources"
          description: The maximum number of data source connectors to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataSourcesResponse"
  /applications/{application_id}/indices:
    post:
      operationId: CreateIndex
      description: Creates an Amazon Q Business index. To determine if index creation has completed, check the Status field returned from a call to DescribeIndex. The Status field is set to ACTIVE when the index is ready to use. Once the index is active, you can index your documents using the BatchPutDocument API or the CreateDataSource API.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the Amazon Q Business application using the index.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  $ref: "#/components/schemas/IndexName"
                description:
                  $ref: "#/components/schemas/Description"
                type:
                  $ref: "#/components/schemas/IndexType"
                tags:
                  $ref: "#/components/schemas/Tags"
                capacityConfiguration:
                  $ref: "#/components/schemas/IndexCapacityConfiguration"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - displayName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIndexResponse"
    get:
      operationId: ListIndices
      description: Lists the Amazon Q Business indices you have created.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the Amazon Q Business application connected to the index.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If the maxResults response was incomplete because there is more data to retrieve, Amazon Q Business returns a pagination token in the response. You can use this pagination token to retrieve the next set of Amazon Q Business indices.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResultsIntegerForListIndices"
          description: The maximum number of indices to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIndicesResponse"
  /applications/{application_id}/plugins:
    post:
