    ActionReview:
      description: An output event that Amazon Q Business returns to an user who wants to perform a plugin action during a non-streaming chat conversation. It contains information about the selected action with a list of possible user input fields, some pre-populated by Amazon Q Business.
      type: object
      properties:
        pluginId:
          $ref: "#/components/schemas/PluginId"
          description: The identifier of the plugin associated with the action review.
        pluginType:
          $ref: "#/components/schemas/PluginType"
          description: The type of plugin.
        payload:
          type: object
          properties: {}
          description: Field values that an end user needs to provide to Amazon Q Business for Amazon Q Business to perform the requested plugin action.
        payloadFieldNameSeparator:
          $ref: "#/components/schemas/ActionPayloadFieldNameSeparator"
          description: A string used to retain information about the hierarchical contexts within an action review payload.
    AuthChallengeRequest:
      description: A request made by Amazon Q Business to a third paty authentication server to authenticate a custom plugin user.
      type: object
      properties:
        authorizationUrl:
          $ref: "#/components/schemas/Url"
          description: The URL sent by Amazon Q Business to the third party authentication server to authenticate a custom plugin user through an OAuth protocol.
      required:
        - authorizationUrl
    AttachmentsOutput:
      type: array
      items:
        $ref: "#/components/schemas/AttachmentOutput"
    CheckDocumentAccessResponse:
      type: object
      properties:
        userGroups:
          $ref: "#/components/schemas/AssociatedGroups"
          description: An array of groups the user is part of for the specified data source. Each group has a name and type.
        userAliases:
          $ref: "#/components/schemas/AssociatedUsers"
          description: An array of aliases associated with the user. This includes both global and local aliases, each with a name and type.
        hasAccess:
          $ref: "#/components/schemas/Boolean"
          description: A boolean value indicating whether the specified user has access to the document, either direct access or transitive access via groups and aliases attached to the document.
        documentAcl:
          $ref: "#/components/schemas/DocumentAcl"
          description: The Access Control List (ACL) associated with the document. Includes allowlist and denylist conditions that determine user access.
    AssociatedGroups:
      type: array
      items:
        $ref: "#/components/schemas/AssociatedGroup"
    AssociatedGroup:
      description: Represents a group associated with a given user in the access control system.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/GroupName"
          description: The name of the group associated with the user. This is used to identify the group in access control decisions.
        type_:
          $ref: "#/components/schemas/MembershipType"
          description: The type of the associated group. This indicates the scope of the group's applicability.
    AssociatedUsers:
      type: array
      items:
        $ref: "#/components/schemas/AssociatedUser"
    AssociatedUser:
      description: Represents an associated user in the access control system.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the associated user. This is used to identify the user in access control decisions.
        type_:
          $ref: "#/components/schemas/MembershipType"
          description: The type of the associated user. This indicates the scope of the user's association.
    Boolean:
      type: boolean
    DocumentAcl:
      description: Represents the Access Control List (ACL) for a document, containing both allowlist and denylist conditions.
      type: object
      properties:
        allowlist:
          $ref: "#/components/schemas/DocumentAclMembership"
          description: The allowlist conditions for the document. Users or groups matching these conditions are granted access to the document.
        denyList:
          $ref: "#/components/schemas/DocumentAclMembership"
          description: The denylist conditions for the document. Users or groups matching these conditions are denied access to the document, overriding allowlist permissions.
    DocumentAclMembership:
      description: Represents membership rules in the document's ACL, defining how users or groups are associated with access permissions.
      type: object
      properties:
        memberRelation:
          $ref: "#/components/schemas/MemberRelation"
          description: The logical relation between members in the membership rule, determining how multiple conditions are combined.
        conditions:
          $ref: "#/components/schemas/DocumentAclConditions"
          description: An array of conditions that define the membership rules. Each condition specifies criteria for users or groups to be included in this membership.
    DocumentAclConditions:
      type: array
      items:
        $ref: "#/components/schemas/DocumentAclCondition"
    DocumentAclCondition:
      description: Represents a condition in the document's ACL, specifying access rules for users and groups.
      type: object
      properties:
        memberRelation:
          $ref: "#/components/schemas/MemberRelation"
          description: The logical relation between members in the condition, determining how multiple user or group conditions are combined.
        users:
          $ref: "#/components/schemas/DocumentAclUsers"
          description: An array of user identifiers that this condition applies to. Users listed here are subject to the access rule defined by this condition.
        groups:
          $ref: "#/components/schemas/DocumentAclGroups"
          description: An array of group identifiers that this condition applies to. Groups listed here are subject to the access rule defined by this condition.
    DocumentAclUsers:
      type: array
      items:
        $ref: "#/components/schemas/DocumentAclUser"
    DocumentAclUser:
      description: Represents a user in the document's ACL, used to define access permissions for individual users.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the user in the document's ACL. This is used to identify the user when applying access rules.
        type_:
          $ref: "#/components/schemas/MembershipType"
          description: The type of the user. This indicates the scope of the user's applicability in access control.
    DocumentAclGroups:
      type: array
      items:
        $ref: "#/components/schemas/DocumentAclGroup"
    DocumentAclGroup:
      description: Represents a group in the document's ACL, used to define access permissions for multiple users collectively.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/GroupName"
          description: The name of the group in the document's ACL. This is used to identify the group when applying access rules.
        type_:
          $ref: "#/components/schemas/MembershipType"
          description: The type of the group. This indicates the scope of the group's applicability in access control.
