        orchestrationConfiguration:
          $ref: "#/components/schemas/AppliedOrchestrationConfiguration"
          description: The chat response orchestration settings for your application. Chat orchestration is optimized to work for English language content. For more details on language support in Amazon Q Business, see Supported languages.
        blockedPhrases:
          $ref: "#/components/schemas/BlockedPhrasesConfiguration"
          description: The phrases blocked from chat by your chat control configuration.
        topicConfigurations:
          $ref: "#/components/schemas/TopicConfigurations"
          description: The topic specific controls configured for a Amazon Q Business application.
        creatorModeConfiguration:
          $ref: "#/components/schemas/AppliedCreatorModeConfiguration"
          description: The configuration details for CREATOR_MODE.
        nextToken:
          $ref: "#/components/schemas/NextToken"
