        - UPDATING
        - DELETING
        - DELETED
        - RESTORING
        - INACCESSIBLE_ENCRYPTION_CREDENTIALS
    CapacitySpecificationSummary:
      description: "The read/write throughput capacity mode for a table. The options are: throughputMode:PAY_PER_REQUEST and throughputMode:PROVISIONED. For more information, see Read/write capacity modes in the Amazon Keyspaces Developer Guide."
      type: object
      properties:
        throughputMode:
          $ref: "#/components/schemas/ThroughputMode"
          description: "The read/write throughput capacity mode for a table. The options are: throughputMode:PAY_PER_REQUEST and throughputMode:PROVISIONED - Provisioned capacity mode requires readCapacityUnits and writeCapacityUnits as input. The default is throughput_mode:PAY_PER_REQUEST. For more information, see Read/write capacity modes in the Amazon Keyspaces Developer Guide."
        readCapacityUnits:
          $ref: "#/components/schemas/CapacityUnits"
          description: The throughput capacity specified for read operations defined in read capacity units (RCUs).
        writeCapacityUnits:
          $ref: "#/components/schemas/CapacityUnits"
          description: The throughput capacity specified for write operations defined in write capacity units (WCUs).
        lastUpdateToPayPerRequestTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of the last operation that changed the provisioned throughput capacity of a table.
      required:
        - throughputMode
    PointInTimeRecoverySummary:
      description: The point-in-time recovery status of the specified table.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/PointInTimeRecoveryStatus"
          description: Shows if point-in-time recovery is enabled or disabled for the specified table.
        earliestRestorableTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: Specifies the earliest possible restore point of the table in ISO 8601 format.
      required:
        - status
    ReplicaSpecificationSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/ReplicaSpecificationSummary"
    ReplicaSpecificationSummary:
      description: The Region-specific settings of a multi-Region table in the specified Amazon Web Services Region. If the multi-Region table is using provisioned capacity and has optional auto scaling policies configured, note that the Region specific summary returns both read and write capacity settings. But only Region specific read capacity settings can be configured for a multi-Region table. In a multi-Region table, your write capacity units will be synced across all Amazon Web Services Regions to ensure that there is enough capacity to replicate write events across Regions.
      type: object
      properties:
        region:
          $ref: "#/components/schemas/region"
          description: The Amazon Web Services Region.
        status:
          $ref: "#/components/schemas/TableStatus"
          description: The status of the multi-Region table in the specified Amazon Web Services Region.
        capacitySpecification:
          $ref: "#/components/schemas/CapacitySpecificationSummary"
        warmThroughputSpecification:
          $ref: "#/components/schemas/WarmThroughputSpecificationSummary"
          description: The warm throughput settings for this replica, including the current status and configured read and write capacity units.
    WarmThroughputSpecificationSummary:
      description: Contains the current warm throughput settings for a table, including the configured capacity units and the current status of the warm throughput configuration.
      type: object
      properties:
        readUnitsPerSecond:
          $ref: "#/components/schemas/Long"
          description: The number of read capacity units per second currently configured for warm throughput.
        writeUnitsPerSecond:
          $ref: "#/components/schemas/Long"
          description: The number of write capacity units per second currently configured for warm throughput.
        status:
          $ref: "#/components/schemas/WarmThroughputStatus"
          description: The current status of the warm throughput configuration. Valid values are AVAILABLE when the configuration is active, and UPDATING when changes are being applied.
      required:
        - readUnitsPerSecond
        - writeUnitsPerSecond
        - status
    Long:
