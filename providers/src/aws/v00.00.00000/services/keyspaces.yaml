        tablesReplicationProgress:
          $ref: "#/components/schemas/TablesReplicationProgress"
          description: This shows the replication progress of tables in the keyspace. The value is expressed as a percentage of the newly replicated tables with status Active compared to the total number of tables in the keyspace.
      required:
