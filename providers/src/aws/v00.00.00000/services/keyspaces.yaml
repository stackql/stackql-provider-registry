openapi: 3.0.0
info:
  version: "2022-02-10"
  title: Amazon Keyspaces
  description: Amazon Keyspaces
  x-serviceName: cassandra
  x-serviceAlias: keyspaces
  x-protocol: json
  x-apiVersion: "2022-02-10"
  x-endpointPrefix: cassandra
  x-targetPrefix: KeyspacesService
  x-jsonVersion: "1.0"
servers:
  - url: https://cassandra.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for keyspaces
paths:
  /CreateKeyspace:
    post:
      operationId: CreateKeyspace
      description: The CreateKeyspace operation adds a new keyspace to your account. In an Amazon Web Services account, keyspace names must be unique within each Region. CreateKeyspace is an asynchronous operation. You can monitor the creation status of the new keyspace by using the GetKeyspace operation. For more information, see Create a keyspace in the Amazon Keyspaces Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.CreateKeyspace
            default: KeyspacesService.CreateKeyspace
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                keyspaceName:
                  $ref: "#/components/schemas/KeyspaceName"
                  description: The name of the keyspace to be created.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of key-value pair tags to be attached to the keyspace. For more information, see Adding tags and labels to Amazon Keyspaces resources in the Amazon Keyspaces Developer Guide.
                replicationSpecification:
                  $ref: "#/components/schemas/ReplicationSpecification"
                  description: "The replication specification of the keyspace includes: replicationStrategy - the required value is SINGLE_REGION or MULTI_REGION. regionList - if the replicationStrategy is MULTI_REGION, the regionList requires the current Region and at least one additional Amazon Web Services Region where the keyspace is going to be replicated in."
              required:
                - keyspaceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateKeyspaceResponse"
  /CreateTable:
    post:
      operationId: CreateTable
      description: The CreateTable operation adds a new table to the specified keyspace. Within a keyspace, table names must be unique. CreateTable is an asynchronous operation. When the request is received, the status of the table is set to CREATING. You can monitor the creation status of the new table by using the GetTable operation, which returns the current status of the table. You can start using a table when the status is ACTIVE. For more information, see Create a table in the Amazon Keyspaces Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.CreateTable
            default: KeyspacesService.CreateTable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                keyspaceName:
                  $ref: "#/components/schemas/KeyspaceName"
                  description: The name of the keyspace that the table is going to be created in.
                tableName:
                  $ref: "#/components/schemas/TableName"
                  description: The name of the table.
                schemaDefinition:
                  $ref: "#/components/schemas/SchemaDefinition"
                  description: "The schemaDefinition consists of the following parameters. For each column to be created: name - The name of the column. type - An Amazon Keyspaces data type. For more information, see Data types in the Amazon Keyspaces Developer Guide. The primary key of the table consists of the following columns: partitionKeys - The partition key can be a single column, or it can be a compound value composed of two or more columns. The partition key portion of the primary key is required and determines how Amazon Keyspaces stores your data. name - The name of each partition key column. clusteringKeys - The optional clustering column portion of your primary key determines how the data is clustered and sorted within each partition. name - The name of the clustering column. orderBy - Sets the ascendant (ASC) or descendant (DESC) order modifier. To define a column as static use staticColumns - Static columns store values that are shared by all rows in the same partition: name - The name of the column. type - An Amazon Keyspaces data type."
                comment:
                  $ref: "#/components/schemas/Comment"
                  description: This parameter allows to enter a description of the table.
                capacitySpecification:
                  $ref: "#/components/schemas/CapacitySpecification"
                  description: "Specifies the read/write throughput capacity mode for the table. The options are: throughputMode:PAY_PER_REQUEST and throughputMode:PROVISIONED - Provisioned capacity mode requires readCapacityUnits and writeCapacityUnits as input. The default is throughput_mode:PAY_PER_REQUEST. For more information, see Read/write capacity modes in the Amazon Keyspaces Developer Guide."
                encryptionSpecification:
                  $ref: "#/components/schemas/EncryptionSpecification"
                  description: "Specifies how the encryption key for encryption at rest is managed for the table. You can choose one of the following KMS key (KMS key): type:AWS_OWNED_KMS_KEY - This key is owned by Amazon Keyspaces. type:CUSTOMER_MANAGED_KMS_KEY - This key is stored in your account and is created, owned, and managed by you. This option requires the kms_key_identifier of the KMS key in Amazon Resource Name (ARN) format as input. The default is type:AWS_OWNED_KMS_KEY. For more information, see Encryption at rest in the Amazon Keyspaces Developer Guide."
                pointInTimeRecovery:
                  $ref: "#/components/schemas/PointInTimeRecovery"
                  description: "Specifies if pointInTimeRecovery is enabled or disabled for the table. The options are: status=ENABLED status=DISABLED If it's not specified, the default is status=DISABLED. For more information, see Point-in-time recovery in the Amazon Keyspaces Developer Guide."
                ttl:
                  $ref: "#/components/schemas/TimeToLive"
                  description: "Enables Time to Live custom settings for the table. The options are: status:enabled status:disabled The default is status:disabled. After ttl is enabled, you can't disable it for the table. For more information, see Expiring data by using Amazon Keyspaces Time to Live (TTL) in the Amazon Keyspaces Developer Guide."
                defaultTimeToLive:
                  $ref: "#/components/schemas/DefaultTimeToLive"
                  description: The default Time to Live setting in seconds for the table. For more information, see Setting the default TTL value for a table in the Amazon Keyspaces Developer Guide.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of key-value pair tags to be attached to the resource. For more information, see Adding tags and labels to Amazon Keyspaces resources in the Amazon Keyspaces Developer Guide.
                clientSideTimestamps:
                  $ref: "#/components/schemas/ClientSideTimestamps"
                  description: 'Enables client-side timestamps for the table. By default, the setting is disabled. You can enable client-side timestamps with the following option: status: "enabled" Once client-side timestamps are enabled for a table, this setting cannot be disabled.'
                autoScalingSpecification:
                  $ref: "#/components/schemas/AutoScalingSpecification"
                  description: The optional auto scaling settings for a table in provisioned capacity mode. Specifies if the service can manage throughput capacity automatically on your behalf. Auto scaling helps you provision throughput capacity for variable workloads efficiently by increasing and decreasing your table's read and write capacity automatically in response to application traffic. For more information, see Managing throughput capacity automatically with Amazon Keyspaces auto scaling in the Amazon Keyspaces Developer Guide. By default, auto scaling is disabled for a table.
                replicaSpecifications:
                  $ref: "#/components/schemas/ReplicaSpecificationList"
                  description: "The optional Amazon Web Services Region specific settings of a multi-Region table. These settings overwrite the general settings of the table for the specified Region. For a multi-Region table in provisioned capacity mode, you can configure the table's read capacity differently for each Region's replica. The write capacity, however, remains synchronized between all replicas to ensure that there's enough capacity to replicate writes across all Regions. To define the read capacity for a table replica in a specific Region, you can do so by configuring the following parameters. region: The Region where these settings are applied. (Required) readCapacityUnits: The provisioned read capacity units. (Optional) readCapacityAutoScaling: The read capacity auto scaling settings for the table. (Optional)"
                cdcSpecification:
                  $ref: "#/components/schemas/CdcSpecification"
                  description: The CDC stream settings of the table.
                warmThroughputSpecification:
                  $ref: "#/components/schemas/WarmThroughputSpecification"
                  description: Specifies the warm throughput settings for the table. Pre-warming a table helps you avoid capacity exceeded exceptions by pre-provisioning read and write capacity units to reduce cold start latency when your table receives traffic. For more information about pre-warming in Amazon Keyspaces, see Pre-warm a table in Amazon Keyspaces in the Amazon Keyspaces Developer Guide.
              required:
                - keyspaceName
                - tableName
                - schemaDefinition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTableResponse"
  /CreateType:
    post:
      operationId: CreateType
      description: The CreateType operation creates a new user-defined type in the specified keyspace. To configure the required permissions, see Permissions to create a UDT in the Amazon Keyspaces Developer Guide. For more information, see User-defined types (UDTs) in the Amazon Keyspaces Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.CreateType
            default: KeyspacesService.CreateType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                keyspaceName:
                  $ref: "#/components/schemas/KeyspaceName"
                  description: The name of the keyspace.
                typeName:
                  $ref: "#/components/schemas/TypeName"
                  description: The name of the user-defined type. UDT names must contain 48 characters or less, must begin with an alphabetic character, and can only contain alpha-numeric characters and underscores. Amazon Keyspaces converts upper case characters automatically into lower case characters. Alternatively, you can declare a UDT name in double quotes. When declaring a UDT name inside double quotes, Amazon Keyspaces preserves upper casing and allows special characters. You can also use double quotes as part of the name when you create the UDT, but you must escape each double quote character with an additional double quote character.
                fieldDefinitions:
                  $ref: "#/components/schemas/FieldList"
                  description: The field definitions, consisting of names and types, that define this type.
              required:
                - keyspaceName
                - typeName
                - fieldDefinitions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTypeResponse"
  /DeleteKeyspace:
    post:
      operationId: DeleteKeyspace
      description: The DeleteKeyspace operation deletes a keyspace and all of its tables.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.DeleteKeyspace
            default: KeyspacesService.DeleteKeyspace
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                keyspaceName:
                  $ref: "#/components/schemas/KeyspaceName"
                  description: The name of the keyspace to be deleted.
              required:
                - keyspaceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteKeyspaceResponse"
  /DeleteTable:
    post:
      operationId: DeleteTable
      description: The DeleteTable operation deletes a table and all of its data. After a DeleteTable request is received, the specified table is in the DELETING state until Amazon Keyspaces completes the deletion. If the table is in the ACTIVE state, you can delete it. If a table is either in the CREATING or UPDATING states, then Amazon Keyspaces returns a ResourceInUseException. If the specified table does not exist, Amazon Keyspaces returns a ResourceNotFoundException. If the table is already in the DELETING state, no error is returned.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.DeleteTable
            default: KeyspacesService.DeleteTable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                keyspaceName:
                  $ref: "#/components/schemas/KeyspaceName"
                  description: The name of the keyspace of the to be deleted table.
                tableName:
                  $ref: "#/components/schemas/TableName"
                  description: The name of the table to be deleted.
              required:
                - keyspaceName
                - tableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTableResponse"
  /DeleteType:
    post:
      operationId: DeleteType
      description: The DeleteType operation deletes a user-defined type (UDT). You can only delete a type that is not used in a table or another UDT. To configure the required permissions, see Permissions to delete a UDT in the Amazon Keyspaces Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.DeleteType
            default: KeyspacesService.DeleteType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                keyspaceName:
                  $ref: "#/components/schemas/KeyspaceName"
                  description: The name of the keyspace of the to be deleted type.
                typeName:
                  $ref: "#/components/schemas/TypeName"
                  description: The name of the type to be deleted.
              required:
                - keyspaceName
                - typeName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTypeResponse"
  /GetKeyspace:
    post:
      operationId: GetKeyspace
      description: Returns the name of the specified keyspace, the Amazon Resource Name (ARN), the replication strategy, the Amazon Web Services Regions of a multi-Region keyspace, and the status of newly added Regions after an UpdateKeyspace operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.GetKeyspace
            default: KeyspacesService.GetKeyspace
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                keyspaceName:
                  $ref: "#/components/schemas/KeyspaceName"
                  description: The name of the keyspace.
              required:
                - keyspaceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetKeyspaceResponse"
  /GetTable:
    post:
      operationId: GetTable
      description: Returns information about the table, including the table's name and current status, the keyspace name, configuration settings, and metadata. To read table metadata using GetTable, the IAM principal needs Select action permissions for the table and the system keyspace.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.GetTable
            default: KeyspacesService.GetTable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                keyspaceName:
                  $ref: "#/components/schemas/KeyspaceName"
                  description: The name of the keyspace that the table is stored in.
                tableName:
                  $ref: "#/components/schemas/TableName"
                  description: The name of the table.
              required:
                - keyspaceName
                - tableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableResponse"
  /GetTableAutoScalingSettings:
    post:
      operationId: GetTableAutoScalingSettings
      description: "Returns auto scaling related settings of the specified table in JSON format. If the table is a multi-Region table, the Amazon Web Services Region specific auto scaling settings of the table are included. Amazon Keyspaces auto scaling helps you provision throughput capacity for variable workloads efficiently by increasing and decreasing your table's read and write capacity automatically in response to application traffic. For more information, see Managing throughput capacity automatically with Amazon Keyspaces auto scaling in the Amazon Keyspaces Developer Guide. GetTableAutoScalingSettings can't be used as an action in an IAM policy. To define permissions for GetTableAutoScalingSettings, you must allow the following two actions in the IAM policy statement's Action element: application-autoscaling:DescribeScalableTargets application-autoscaling:DescribeScalingPolicies"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.GetTableAutoScalingSettings
            default: KeyspacesService.GetTableAutoScalingSettings
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                keyspaceName:
                  $ref: "#/components/schemas/KeyspaceName"
                  description: The name of the keyspace.
                tableName:
                  $ref: "#/components/schemas/TableName"
                  description: The name of the table.
              required:
                - keyspaceName
                - tableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableAutoScalingSettingsResponse"
  /GetType:
    post:
      operationId: GetType
      description: The GetType operation returns information about the type, for example the field definitions, the timestamp when the type was last modified, the level of nesting, the status, and details about if the type is used in other types and tables. To read keyspace metadata using GetType, the IAM principal needs Select action permissions for the system keyspace. To configure the required permissions, see Permissions to view a UDT in the Amazon Keyspaces Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.GetType
            default: KeyspacesService.GetType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                keyspaceName:
                  $ref: "#/components/schemas/KeyspaceName"
                  description: The name of the keyspace that contains this type.
                typeName:
                  $ref: "#/components/schemas/TypeName"
                  description: The formatted name of the type. For example, if the name of the type was created without double quotes, Amazon Keyspaces saved the name in lower-case characters. If the name was created in double quotes, you must use double quotes to specify the type name.
              required:
                - keyspaceName
                - typeName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTypeResponse"
  /ListKeyspaces:
    post:
      operationId: ListKeyspaces
      description: The ListKeyspaces operation returns a list of keyspaces.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.ListKeyspaces
            default: KeyspacesService.ListKeyspaces
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The pagination token. To resume pagination, provide the NextToken value as argument of a subsequent API invocation.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The total number of keyspaces to return in the output. If the total number of keyspaces available is more than the value specified, a NextToken is provided in the output. To resume pagination, provide the NextToken value as an argument of a subsequent API invocation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListKeyspacesResponse"
  /ListTables:
    post:
      operationId: ListTables
      description: The ListTables operation returns a list of tables for a specified keyspace. To read keyspace metadata using ListTables, the IAM principal needs Select action permissions for the system keyspace.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.ListTables
            default: KeyspacesService.ListTables
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The pagination token. To resume pagination, provide the NextToken value as an argument of a subsequent API invocation.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The total number of tables to return in the output. If the total number of tables available is more than the value specified, a NextToken is provided in the output. To resume pagination, provide the NextToken value as an argument of a subsequent API invocation.
                keyspaceName:
                  $ref: "#/components/schemas/KeyspaceName"
                  description: The name of the keyspace.
              required:
                - keyspaceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTablesResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Returns a list of all tags associated with the specified Amazon Keyspaces resource. To read keyspace metadata using ListTagsForResource, the IAM principal needs Select action permissions for the specified resource and the system keyspace.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.ListTagsForResource
            default: KeyspacesService.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ARN"
                  description: The Amazon Resource Name (ARN) of the Amazon Keyspaces resource.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The pagination token. To resume pagination, provide the NextToken value as argument of a subsequent API invocation.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The total number of tags to return in the output. If the total number of tags available is more than the value specified, a NextToken is provided in the output. To resume pagination, provide the NextToken value as an argument of a subsequent API invocation.
              required:
                - resourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /ListTypes:
    post:
      operationId: ListTypes
      description: The ListTypes operation returns a list of types for a specified keyspace. To read keyspace metadata using ListTypes, the IAM principal needs Select action permissions for the system keyspace. To configure the required permissions, see Permissions to view a UDT in the Amazon Keyspaces Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.ListTypes
            default: KeyspacesService.ListTypes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The pagination token. To resume pagination, provide the NextToken value as an argument of a subsequent API invocation.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The total number of types to return in the output. If the total number of types available is more than the value specified, a NextToken is provided in the output. To resume pagination, provide the NextToken value as an argument of a subsequent API invocation.
                keyspaceName:
                  $ref: "#/components/schemas/KeyspaceName"
                  description: The name of the keyspace that contains the listed types.
              required:
                - keyspaceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTypesOutputDisplay"
  /RestoreTable:
    post:
      operationId: RestoreTable
      description: "Restores the table to the specified point in time within the earliest_restorable_timestamp and the current time. For more information about restore points, see Time window for PITR continuous backups in the Amazon Keyspaces Developer Guide. Any number of users can execute up to 4 concurrent restores (any type of restore) in a given account. When you restore using point in time recovery, Amazon Keyspaces restores your source table's schema and data to the state based on the selected timestamp (day:hour:minute:second) to a new table. The Time to Live (TTL) settings are also restored to the state based on the selected timestamp. In addition to the table's schema, data, and TTL settings, RestoreTable restores the capacity mode, auto scaling settings, encryption settings, and point-in-time recovery settings from the source table. Unlike the table's schema data and TTL settings, which are restored based on the selected timestamp, these settings are always restored based on the table's settings as of the current time or when the table was deleted. You can also overwrite these settings during restore: Read/write capacity mode Provisioned throughput capacity units Auto scaling settings Point-in-time (PITR) settings Tags For more information, see PITR restore settings in the Amazon Keyspaces Developer Guide. Note that the following settings are not restored, and you must configure them manually for the new table: Identity and Access Management (IAM) policies Amazon CloudWatch metrics and alarms"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.RestoreTable
            default: KeyspacesService.RestoreTable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                sourceKeyspaceName:
                  $ref: "#/components/schemas/KeyspaceName"
                  description: The keyspace name of the source table.
                sourceTableName:
                  $ref: "#/components/schemas/TableName"
                  description: The name of the source table.
                targetKeyspaceName:
                  $ref: "#/components/schemas/KeyspaceName"
                  description: The name of the target keyspace.
                targetTableName:
                  $ref: "#/components/schemas/TableName"
                  description: The name of the target table.
                restoreTimestamp:
                  $ref: "#/components/schemas/Timestamp"
                  description: The restore timestamp in ISO 8601 format.
                capacitySpecificationOverride:
                  $ref: "#/components/schemas/CapacitySpecification"
                  description: "Specifies the read/write throughput capacity mode for the target table. The options are: throughputMode:PAY_PER_REQUEST throughputMode:PROVISIONED - Provisioned capacity mode requires readCapacityUnits and writeCapacityUnits as input. The default is throughput_mode:PAY_PER_REQUEST. For more information, see Read/write capacity modes in the Amazon Keyspaces Developer Guide."
                encryptionSpecificationOverride:
                  $ref: "#/components/schemas/EncryptionSpecification"
                  description: "Specifies the encryption settings for the target table. You can choose one of the following KMS key (KMS key): type:AWS_OWNED_KMS_KEY - This key is owned by Amazon Keyspaces. type:CUSTOMER_MANAGED_KMS_KEY - This key is stored in your account and is created, owned, and managed by you. This option requires the kms_key_identifier of the KMS key in Amazon Resource Name (ARN) format as input. The default is type:AWS_OWNED_KMS_KEY. For more information, see Encryption at rest in the Amazon Keyspaces Developer Guide."
                pointInTimeRecoveryOverride:
                  $ref: "#/components/schemas/PointInTimeRecovery"
                  description: "Specifies the pointInTimeRecovery settings for the target table. The options are: status=ENABLED status=DISABLED If it's not specified, the default is status=DISABLED. For more information, see Point-in-time recovery in the Amazon Keyspaces Developer Guide."
                tagsOverride:
                  $ref: "#/components/schemas/TagList"
                  description: A list of key-value pair tags to be attached to the restored table. For more information, see Adding tags and labels to Amazon Keyspaces resources in the Amazon Keyspaces Developer Guide.
                autoScalingSpecification:
                  $ref: "#/components/schemas/AutoScalingSpecification"
                  description: The optional auto scaling settings for the restored table in provisioned capacity mode. Specifies if the service can manage throughput capacity of a provisioned table automatically on your behalf. Amazon Keyspaces auto scaling helps you provision throughput capacity for variable workloads efficiently by increasing and decreasing your table's read and write capacity automatically in response to application traffic. For more information, see Managing throughput capacity automatically with Amazon Keyspaces auto scaling in the Amazon Keyspaces Developer Guide.
                replicaSpecifications:
                  $ref: "#/components/schemas/ReplicaSpecificationList"
                  description: The optional Region specific settings of a multi-Regional table.
              required:
                - sourceKeyspaceName
                - sourceTableName
                - targetKeyspaceName
                - targetTableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreTableResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Associates a set of tags with a Amazon Keyspaces resource. You can then activate these user-defined tags so that they appear on the Cost Management Console for cost allocation tracking. For more information, see Adding tags and labels to Amazon Keyspaces resources in the Amazon Keyspaces Developer Guide. For IAM policy examples that show how to control access to Amazon Keyspaces resources based on tags, see Amazon Keyspaces resource access based on tags in the Amazon Keyspaces Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.TagResource
            default: KeyspacesService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ARN"
                  description: The Amazon Resource Name (ARN) of the Amazon Keyspaces resource to which to add tags.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to be assigned to the Amazon Keyspaces resource.
              required:
                - resourceArn
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes the association of tags from a Amazon Keyspaces resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.UntagResource
            default: KeyspacesService.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ARN"
                  description: The Amazon Keyspaces resource that the tags will be removed from. This value is an Amazon Resource Name (ARN).
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of existing tags to be removed from the Amazon Keyspaces resource.
              required:
                - resourceArn
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateKeyspace:
    post:
      operationId: UpdateKeyspace
      description: "Adds a new Amazon Web Services Region to the keyspace. You can add a new Region to a keyspace that is either a single or a multi-Region keyspace. Amazon Keyspaces is going to replicate all tables in the keyspace to the new Region. To successfully replicate all tables to the new Region, they must use client-side timestamps for conflict resolution. To enable client-side timestamps, specify clientSideTimestamps.status = enabled when invoking the API. For more information about client-side timestamps, see Client-side timestamps in Amazon Keyspaces in the Amazon Keyspaces Developer Guide. To add a Region to a keyspace using the UpdateKeyspace API, the IAM principal needs permissions for the following IAM actions: cassandra:Alter cassandra:AlterMultiRegionResource cassandra:Create cassandra:CreateMultiRegionResource cassandra:Select cassandra:SelectMultiRegionResource cassandra:Modify cassandra:ModifyMultiRegionResource If the keyspace contains a table that is configured in provisioned mode with auto scaling enabled, the following additional IAM actions need to be allowed. application-autoscaling:RegisterScalableTarget application-autoscaling:DeregisterScalableTarget application-autoscaling:DescribeScalableTargets application-autoscaling:PutScalingPolicy application-autoscaling:DescribeScalingPolicies To use the UpdateKeyspace API, the IAM principal also needs permissions to create a service-linked role with the following elements: iam:CreateServiceLinkedRole - The action the principal can perform. arn:aws:iam::*:role/aws-service-role/replication.cassandra.amazonaws.com/AWSServiceRoleForKeyspacesReplication - The resource that the action can be performed on. iam:AWSServiceName: replication.cassandra.amazonaws.com - The only Amazon Web Services service that this role can be attached to is Amazon Keyspaces. For more information, see Configure the IAM permissions required to add an Amazon Web Services Region to a keyspace in the Amazon Keyspaces Developer Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.UpdateKeyspace
            default: KeyspacesService.UpdateKeyspace
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                keyspaceName:
                  $ref: "#/components/schemas/KeyspaceName"
                  description: The name of the keyspace.
                replicationSpecification:
                  $ref: "#/components/schemas/ReplicationSpecification"
                clientSideTimestamps:
                  $ref: "#/components/schemas/ClientSideTimestamps"
              required:
                - keyspaceName
                - replicationSpecification
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateKeyspaceResponse"
  /UpdateTable:
    post:
      operationId: UpdateTable
      description: Adds new columns to the table or updates one of the table's settings, for example capacity mode, auto scaling, encryption, point-in-time recovery, or ttl settings. Note that you can only update one specific table setting per update operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesService.UpdateTable
            default: KeyspacesService.UpdateTable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                keyspaceName:
                  $ref: "#/components/schemas/KeyspaceName"
                  description: The name of the keyspace the specified table is stored in.
                tableName:
                  $ref: "#/components/schemas/TableName"
                  description: The name of the table.
                addColumns:
                  $ref: "#/components/schemas/ColumnDefinitionList"
                  description: "For each column to be added to the specified table: name - The name of the column. type - An Amazon Keyspaces data type. For more information, see Data types in the Amazon Keyspaces Developer Guide."
                capacitySpecification:
                  $ref: "#/components/schemas/CapacitySpecification"
                  description: "Modifies the read/write throughput capacity mode for the table. The options are: throughputMode:PAY_PER_REQUEST and throughputMode:PROVISIONED - Provisioned capacity mode requires readCapacityUnits and writeCapacityUnits as input. The default is throughput_mode:PAY_PER_REQUEST. For more information, see Read/write capacity modes in the Amazon Keyspaces Developer Guide."
                encryptionSpecification:
                  $ref: "#/components/schemas/EncryptionSpecification"
                  description: "Modifies the encryption settings of the table. You can choose one of the following KMS key (KMS key): type:AWS_OWNED_KMS_KEY - This key is owned by Amazon Keyspaces. type:CUSTOMER_MANAGED_KMS_KEY - This key is stored in your account and is created, owned, and managed by you. This option requires the kms_key_identifier of the KMS key in Amazon Resource Name (ARN) format as input. The default is AWS_OWNED_KMS_KEY. For more information, see Encryption at rest in the Amazon Keyspaces Developer Guide."
                pointInTimeRecovery:
                  $ref: "#/components/schemas/PointInTimeRecovery"
                  description: "Modifies the pointInTimeRecovery settings of the table. The options are: status=ENABLED status=DISABLED If it's not specified, the default is status=DISABLED. For more information, see Point-in-time recovery in the Amazon Keyspaces Developer Guide."
                ttl:
                  $ref: "#/components/schemas/TimeToLive"
                  description: "Modifies Time to Live custom settings for the table. The options are: status:enabled status:disabled The default is status:disabled. After ttl is enabled, you can't disable it for the table. For more information, see Expiring data by using Amazon Keyspaces Time to Live (TTL) in the Amazon Keyspaces Developer Guide."
                defaultTimeToLive:
                  $ref: "#/components/schemas/DefaultTimeToLive"
                  description: The default Time to Live setting in seconds for the table. For more information, see Setting the default TTL value for a table in the Amazon Keyspaces Developer Guide.
                clientSideTimestamps:
                  $ref: "#/components/schemas/ClientSideTimestamps"
                  description: 'Enables client-side timestamps for the table. By default, the setting is disabled. You can enable client-side timestamps with the following option: status: "enabled" Once client-side timestamps are enabled for a table, this setting cannot be disabled.'
                autoScalingSpecification:
                  $ref: "#/components/schemas/AutoScalingSpecification"
                  description: The optional auto scaling settings to update for a table in provisioned capacity mode. Specifies if the service can manage throughput capacity of a provisioned table automatically on your behalf. Amazon Keyspaces auto scaling helps you provision throughput capacity for variable workloads efficiently by increasing and decreasing your table's read and write capacity automatically in response to application traffic. If auto scaling is already enabled for the table, you can use UpdateTable to update the minimum and maximum values or the auto scaling policy settings independently. For more information, see Managing throughput capacity automatically with Amazon Keyspaces auto scaling in the Amazon Keyspaces Developer Guide.
                replicaSpecifications:
                  $ref: "#/components/schemas/ReplicaSpecificationList"
                  description: The Region specific settings of a multi-Regional table.
                cdcSpecification:
                  $ref: "#/components/schemas/CdcSpecification"
                  description: The CDC stream settings of the table.
                warmThroughputSpecification:
                  $ref: "#/components/schemas/WarmThroughputSpecification"
                  description: Modifies the warm throughput settings for the table. You can update the read and write capacity units to adjust the pre-provisioned throughput.
              required:
                - keyspaceName
                - tableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTableResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    KeyspaceName:
      type: string
      minLength: 1
      maxLength: 48
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_]{0,47}"
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "Describes a tag. A tag is a key-value pair. You can add up to 50 tags to a single Amazon Keyspaces resource. Amazon Web Services-assigned tag names and values are automatically assigned the aws: prefix, which the user cannot assign. Amazon Web Services-assigned tag names do not count towards the tag limit of 50. User-assigned tag names have the prefix user: in the Cost Allocation Report. You cannot backdate the application of a tag. For more information, see Adding tags and labels to Amazon Keyspaces resources in the Amazon Keyspaces Developer Guide."
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: The key of the tag. Tag keys are case sensitive. Each Amazon Keyspaces resource can only have up to one tag with the same key. If you try to add an existing tag (same key), the existing tag value will be updated to the new value.
        value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the tag. Tag values are case-sensitive and can be null.
      required:
        - key
        - value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 1
      maxLength: 256
    ReplicationSpecification:
      description: "The replication specification of the keyspace includes: regionList - the Amazon Web Services Regions where the keyspace is replicated in. replicationStrategy - the required value is SINGLE_REGION or MULTI_REGION."
      type: object
      properties:
        replicationStrategy:
          $ref: "#/components/schemas/rs"
          description: The replicationStrategy of a keyspace, the required value is SINGLE_REGION or MULTI_REGION.
        regionList:
          $ref: "#/components/schemas/RegionList"
          description: The regionList contains the Amazon Web Services Regions where the keyspace is replicated in.
      required:
        - replicationStrategy
    rs:
      type: string
      enum:
        - SINGLE_REGION
        - MULTI_REGION
      minLength: 1
      maxLength: 20
    RegionList:
      type: array
      items:
        $ref: "#/components/schemas/region"
    region:
      type: string
      minLength: 2
      maxLength: 25
    CreateKeyspaceResponse:
      type: object
      properties:
        resourceArn:
          $ref: "#/components/schemas/ARN"
          description: The unique identifier of the keyspace in the format of an Amazon Resource Name (ARN).
      required:
        - resourceArn
    ARN:
      type: string
      minLength: 20
      maxLength: 1000
      pattern: arn:(aws[a-zA-Z0-9-]*):cassandra:.+.*
    TableName:
      type: string
      minLength: 1
      maxLength: 48
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_]{0,47}"
    SchemaDefinition:
      description: Describes the schema of the table.
      type: object
      properties:
        allColumns:
          $ref: "#/components/schemas/ColumnDefinitionList"
          description: The regular columns of the table.
        partitionKeys:
          $ref: "#/components/schemas/PartitionKeyList"
          description: The columns that are part of the partition key of the table .
        clusteringKeys:
          $ref: "#/components/schemas/ClusteringKeyList"
          description: The columns that are part of the clustering key of the table.
        staticColumns:
          $ref: "#/components/schemas/StaticColumnList"
          description: The columns that have been defined as STATIC. Static columns store values that are shared by all rows in the same partition.
      required:
        - allColumns
        - partitionKeys
    ColumnDefinitionList:
      type: array
      items:
        $ref: "#/components/schemas/ColumnDefinition"
    ColumnDefinition:
      description: The names and data types of regular columns.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/GenericString"
          description: The name of the column.
        type_:
          $ref: "#/components/schemas/GenericString"
          description: The data type of the column. For a list of available data types, see Data types in the Amazon Keyspaces Developer Guide.
      required:
        - name
        - type_
    GenericString:
      type: string
    PartitionKeyList:
      type: array
      items:
        $ref: "#/components/schemas/PartitionKey"
    PartitionKey:
      description: The partition key portion of the primary key is required and determines how Amazon Keyspaces stores the data. The partition key can be a single column, or it can be a compound value composed of two or more columns.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/GenericString"
          description: The name(s) of the partition key column(s).
      required:
        - name
    ClusteringKeyList:
      type: array
      items:
        $ref: "#/components/schemas/ClusteringKey"
    ClusteringKey:
      description: The optional clustering column portion of your primary key determines how the data is clustered and sorted within each partition.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/GenericString"
          description: The name(s) of the clustering column(s).
        orderBy:
          $ref: "#/components/schemas/SortOrder"
          description: Sets the ascendant (ASC) or descendant (DESC) order modifier.
      required:
        - name
        - orderBy
    SortOrder:
      type: string
      enum:
        - ASC
        - DESC
    StaticColumnList:
      type: array
      items:
        $ref: "#/components/schemas/StaticColumn"
    StaticColumn:
      description: The static columns of the table. Static columns store values that are shared by all rows in the same partition.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/GenericString"
          description: The name of the static column.
      required:
        - name
    Comment:
      description: An optional comment that describes the table.
      type: object
      properties:
        message:
          $ref: "#/components/schemas/String"
          description: An optional description of the table.
      required:
        - message
    String:
      type: string
    CapacitySpecification:
      description: "Amazon Keyspaces has two read/write capacity modes for processing reads and writes on your tables: On-demand (default) Provisioned The read/write capacity mode that you choose controls how you are charged for read and write throughput and how table throughput capacity is managed. For more information, see Read/write capacity modes in the Amazon Keyspaces Developer Guide."
      type: object
      properties:
        throughputMode:
          $ref: "#/components/schemas/ThroughputMode"
          description: "The read/write throughput capacity mode for a table. The options are: throughputMode:PAY_PER_REQUEST and throughputMode:PROVISIONED - Provisioned capacity mode requires readCapacityUnits and writeCapacityUnits as input. The default is throughput_mode:PAY_PER_REQUEST. For more information, see Read/write capacity modes in the Amazon Keyspaces Developer Guide."
        readCapacityUnits:
          $ref: "#/components/schemas/CapacityUnits"
          description: The throughput capacity specified for read operations defined in read capacity units (RCUs).
        writeCapacityUnits:
          $ref: "#/components/schemas/CapacityUnits"
          description: The throughput capacity specified for write operations defined in write capacity units (WCUs).
      required:
        - throughputMode
    ThroughputMode:
      type: string
      enum:
        - PAY_PER_REQUEST
        - PROVISIONED
    CapacityUnits:
      type: integer
      format: int64
      minimum: 1
    EncryptionSpecification:
      description: "Amazon Keyspaces encrypts and decrypts the table data at rest transparently and integrates with Key Management Service for storing and managing the encryption key. You can choose one of the following KMS keys (KMS keys): Amazon Web Services owned key - This is the default encryption type. The key is owned by Amazon Keyspaces (no additional charge). Customer managed key - This key is stored in your account and is created, owned, and managed by you. You have full control over the customer managed key (KMS charges apply). For more information about encryption at rest in Amazon Keyspaces, see Encryption at rest in the Amazon Keyspaces Developer Guide. For more information about KMS, see KMS management service concepts in the Key Management Service Developer Guide."
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/EncryptionType"
          description: "The encryption option specified for the table. You can choose one of the following KMS keys (KMS keys): type:AWS_OWNED_KMS_KEY - This key is owned by Amazon Keyspaces. type:CUSTOMER_MANAGED_KMS_KEY - This key is stored in your account and is created, owned, and managed by you. This option requires the kms_key_identifier of the KMS key in Amazon Resource Name (ARN) format as input. The default is type:AWS_OWNED_KMS_KEY. For more information, see Encryption at rest in the Amazon Keyspaces Developer Guide."
        kmsKeyIdentifier:
          $ref: "#/components/schemas/kmsKeyARN"
          description: The Amazon Resource Name (ARN) of the customer managed KMS key, for example kms_key_identifier:ARN.
      required:
        - type_
    EncryptionType:
      type: string
      enum:
        - CUSTOMER_MANAGED_KMS_KEY
        - AWS_OWNED_KMS_KEY
    kmsKeyARN:
      type: string
      minLength: 1
      maxLength: 5096
    PointInTimeRecovery:
      description: Point-in-time recovery (PITR) helps protect your Amazon Keyspaces tables from accidental write or delete operations by providing you continuous backups of your table data. For more information, see Point-in-time recovery in the Amazon Keyspaces Developer Guide.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/PointInTimeRecoveryStatus"
          description: "The options are: status=ENABLED status=DISABLED"
      required:
        - status
    PointInTimeRecoveryStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    TimeToLive:
      description: Enable custom Time to Live (TTL) settings for rows and columns without setting a TTL default for the specified table. For more information, see Enabling TTL on tables in the Amazon Keyspaces Developer Guide.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/TimeToLiveStatus"
          description: Shows how to enable custom Time to Live (TTL) settings for the specified table.
      required:
        - status
    TimeToLiveStatus:
      type: string
      enum:
        - ENABLED
    DefaultTimeToLive:
      type: integer
      minimum: 0
      maximum: 630720000
    ClientSideTimestamps:
      description: "The client-side timestamp setting of the table. For more information, see How it works: Amazon Keyspaces client-side timestamps in the Amazon Keyspaces Developer Guide."
      type: object
      properties:
        status:
          $ref: "#/components/schemas/ClientSideTimestampsStatus"
          description: Shows how to enable client-side timestamps settings for the specified table.
      required:
        - status
    ClientSideTimestampsStatus:
      type: string
      enum:
        - ENABLED
    AutoScalingSpecification:
      description: The optional auto scaling capacity settings for a table in provisioned capacity mode.
      type: object
      properties:
        writeCapacityAutoScaling:
          $ref: "#/components/schemas/AutoScalingSettings"
          description: The auto scaling settings for the table's write capacity.
        readCapacityAutoScaling:
          $ref: "#/components/schemas/AutoScalingSettings"
          description: The auto scaling settings for the table's read capacity.
    AutoScalingSettings:
      description: "The optional auto scaling settings for a table with provisioned throughput capacity. To turn on auto scaling for a table in throughputMode:PROVISIONED, you must specify the following parameters. Configure the minimum and maximum capacity units. The auto scaling policy ensures that capacity never goes below the minimum or above the maximum range. minimumUnits: The minimum level of throughput the table should always be ready to support. The value must be between 1 and the max throughput per second quota for your account (40,000 by default). maximumUnits: The maximum level of throughput the table should always be ready to support. The value must be between 1 and the max throughput per second quota for your account (40,000 by default). scalingPolicy: Amazon Keyspaces supports the target tracking scaling policy. The auto scaling target is the provisioned capacity of the table. targetTrackingScalingPolicyConfiguration: To define the target tracking policy, you must define the target value. targetValue: The target utilization rate of the table. Amazon Keyspaces auto scaling ensures that the ratio of consumed capacity to provisioned capacity stays at or near this value. You define targetValue as a percentage. A double between 20 and 90. (Required) disableScaleIn: A boolean that specifies if scale-in is disabled or enabled for the table. This parameter is disabled by default. To turn on scale-in, set the boolean value to FALSE. This means that capacity for a table can be automatically scaled down on your behalf. (Optional) scaleInCooldown: A cooldown period in seconds between scaling activities that lets the table stabilize before another scale in activity starts. If no value is provided, the default is 0. (Optional) scaleOutCooldown: A cooldown period in seconds between scaling activities that lets the table stabilize before another scale out activity starts. If no value is provided, the default is 0. (Optional) For more information, see Managing throughput capacity automatically with Amazon Keyspaces auto scaling in the Amazon Keyspaces Developer Guide."
      type: object
      properties:
        autoScalingDisabled:
          $ref: "#/components/schemas/BooleanObject"
          description: This optional parameter enables auto scaling for the table if set to false.
        minimumUnits:
          $ref: "#/components/schemas/CapacityUnits"
          description: The minimum level of throughput the table should always be ready to support. The value must be between 1 and the max throughput per second quota for your account (40,000 by default).
        maximumUnits:
          $ref: "#/components/schemas/CapacityUnits"
          description: Manage costs by specifying the maximum amount of throughput to provision. The value must be between 1 and the max throughput per second quota for your account (40,000 by default).
        scalingPolicy:
          $ref: "#/components/schemas/AutoScalingPolicy"
          description: Amazon Keyspaces supports the target tracking auto scaling policy. With this policy, Amazon Keyspaces auto scaling ensures that the table's ratio of consumed to provisioned capacity stays at or near the target value that you specify. You define the target value as a percentage between 20 and 90.
    BooleanObject:
      type: boolean
    AutoScalingPolicy:
      description: Amazon Keyspaces supports the target tracking auto scaling policy. With this policy, Amazon Keyspaces auto scaling ensures that the table's ratio of consumed to provisioned capacity stays at or near the target value that you specify. You define the target value as a percentage between 20 and 90.
      type: object
      properties:
        targetTrackingScalingPolicyConfiguration:
          $ref: "#/components/schemas/TargetTrackingScalingPolicyConfiguration"
          description: Auto scaling scales up capacity automatically when traffic exceeds this target utilization rate, and then back down when it falls below the target. A double between 20 and 90.
    TargetTrackingScalingPolicyConfiguration:
      description: The auto scaling policy that scales a table based on the ratio of consumed to provisioned capacity.
      type: object
      properties:
        disableScaleIn:
          $ref: "#/components/schemas/BooleanObject"
          description: Specifies if scale-in is enabled. When auto scaling automatically decreases capacity for a table, the table scales in. When scaling policies are set, they can't scale in the table lower than its minimum capacity.
        scaleInCooldown:
          $ref: "#/components/schemas/IntegerObject"
          description: Specifies a scale-in cool down period. A cooldown period in seconds between scaling activities that lets the table stabilize before another scaling activity starts.
        scaleOutCooldown:
          $ref: "#/components/schemas/IntegerObject"
          description: Specifies a scale out cool down period. A cooldown period in seconds between scaling activities that lets the table stabilize before another scaling activity starts.
        targetValue:
          $ref: "#/components/schemas/DoubleObject"
          description: Specifies the target value for the target tracking auto scaling policy. Amazon Keyspaces auto scaling scales up capacity automatically when traffic exceeds this target utilization rate, and then back down when it falls below the target. This ensures that the ratio of consumed capacity to provisioned capacity stays at or near this value. You define targetValue as a percentage. A double between 20 and 90.
      required:
        - targetValue
    IntegerObject:
      type: integer
    DoubleObject:
      type: number
      format: double
    ReplicaSpecificationList:
      type: array
      items:
        $ref: "#/components/schemas/ReplicaSpecification"
    ReplicaSpecification:
      description: "The Amazon Web Services Region specific settings of a multi-Region table. For a multi-Region table, you can configure the table's read capacity differently per Amazon Web Services Region. You can do this by configuring the following parameters. region: The Region where these settings are applied. (Required) readCapacityUnits: The provisioned read capacity units. (Optional) readCapacityAutoScaling: The read capacity auto scaling settings for the table. (Optional)"
      type: object
      properties:
        region:
          $ref: "#/components/schemas/region"
          description: The Amazon Web Services Region.
        readCapacityUnits:
          $ref: "#/components/schemas/CapacityUnits"
          description: The provisioned read capacity units for the multi-Region table in the specified Amazon Web Services Region.
        readCapacityAutoScaling:
          $ref: "#/components/schemas/AutoScalingSettings"
          description: The read capacity auto scaling settings for the multi-Region table in the specified Amazon Web Services Region.
      required:
        - region
    CdcSpecification:
      description: The settings for the CDC stream of a table. For more information about CDC streams, see Working with change data capture (CDC) streams in Amazon Keyspaces in the Amazon Keyspaces Developer Guide.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/CdcStatus"
          description: The status of the CDC stream. You can enable or disable a stream for a table.
        viewType:
          $ref: "#/components/schemas/ViewType"
          description: "The view type specifies the changes Amazon Keyspaces records for each changed row in the stream. After you create the stream, you can't make changes to this selection. The options are: NEW_AND_OLD_IMAGES - both versions of the row, before and after the change. This is the default. NEW_IMAGE - the version of the row after the change. OLD_IMAGE - the version of the row before the change. KEYS_ONLY - the partition and clustering keys of the row that was changed."
        tags:
          $ref: "#/components/schemas/TagList"
          description: The tags (key-value pairs) that you want to apply to the stream.
        propagateTags:
          $ref: "#/components/schemas/CdcPropagateTags"
          description: Specifies that the stream inherits the tags from the table.
      required:
        - status
    CdcStatus:
      type: string
      enum:
        - ENABLED
        - ENABLING
        - DISABLED
        - DISABLING
    ViewType:
      type: string
      enum:
        - NEW_IMAGE
        - OLD_IMAGE
        - KEYS_ONLY
        - NEW_AND_OLD_IMAGES
    CdcPropagateTags:
      type: string
      enum:
        - TABLE
        - NONE
    WarmThroughputSpecification:
      description: Specifies the warm throughput settings for a table. Pre-warming a table by specifying warm throughput pre-provisions read and write capacity units to help avoid capacity exceeded exceptions and reduce latency when your table starts receiving traffic. For more information about pre-warming in Amazon Keyspaces, see Pre-warm a table in Amazon Keyspaces in the Amazon Keyspaces Developer Guide.
      type: object
      properties:
        readUnitsPerSecond:
          $ref: "#/components/schemas/WarmThroughputSpecificationReadUnitsPerSecondLong"
          description: The number of read capacity units per second to pre-warm the table for read capacity throughput. The minimum value is 1.
        writeUnitsPerSecond:
          $ref: "#/components/schemas/WarmThroughputSpecificationWriteUnitsPerSecondLong"
          description: The number of write capacity units per second to pre-warm the table for write capacity throughput. The minimum value is 1.
    WarmThroughputSpecificationReadUnitsPerSecondLong:
      type: integer
      format: int64
      minimum: 1
    WarmThroughputSpecificationWriteUnitsPerSecondLong:
      type: integer
      format: int64
      minimum: 1
    CreateTableResponse:
      type: object
