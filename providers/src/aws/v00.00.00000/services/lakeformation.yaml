openapi: 3.0.0
info:
  version: "2017-03-31"
  title: AWS Lake Formation
  description: AWS Lake Formation
  x-serviceName: lakeformation
  x-serviceAlias: lakeformation
  x-protocol: rest-json
  x-apiVersion: "2017-03-31"
  x-endpointPrefix: lakeformation
  x-jsonVersion: "1.1"
servers:
  - url: https://lakeformation.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for lakeformation
paths:
  /AddLFTagsToResource:
    post:
      operationId: AddLFTagsToResource
      description: Attaches one or more LF-tags to an existing resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                Resource:
                  $ref: "#/components/schemas/Resource"
                LFTags:
                  $ref: "#/components/schemas/LFTagsList"
              required:
                - Resource
                - LFTags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddLFTagsToResourceResponse"
  /AssumeDecoratedRoleWithSAML:
    post:
      operationId: AssumeDecoratedRoleWithSAML
      description: "Allows a caller to assume an IAM role decorated as the SAML user specified in the SAML assertion included in the request. This decoration allows Lake Formation to enforce access policies against the SAML users and groups. This API operation requires SAML federation setup in the caller’s account as it can only be called with valid SAML assertions. Lake Formation does not scope down the permission of the assumed role. All permissions attached to the role via the SAML federation setup will be included in the role session. This decorated role is expected to access data in Amazon S3 by getting temporary access from Lake Formation which is authorized via the virtual API GetDataAccess. Therefore, all SAML roles that can be assumed via AssumeDecoratedRoleWithSAML must at a minimum include lakeformation:GetDataAccess in their role policies. A typical IAM policy attached to such a role would include the following actions: glue:*Database* glue:*Table* glue:*Partition* glue:*UserDefinedFunction* lakeformation:GetDataAccess"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SAMLAssertion:
                  $ref: "#/components/schemas/SAMLAssertionString"
                RoleArn:
                  $ref: "#/components/schemas/IAMRoleArn"
                PrincipalArn:
                  $ref: "#/components/schemas/IAMSAMLProviderArn"
                DurationSeconds:
                  $ref: "#/components/schemas/CredentialTimeoutDurationSecondInteger"
              required:
                - SAMLAssertion
                - RoleArn
                - PrincipalArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssumeDecoratedRoleWithSAMLResponse"
  /BatchGrantPermissions:
    post:
      operationId: BatchGrantPermissions
      description: Batch operation to grant permissions to the principal.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                Entries:
                  $ref: "#/components/schemas/BatchPermissionsRequestEntryList"
              required:
                - Entries
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGrantPermissionsResponse"
  /BatchRevokePermissions:
    post:
      operationId: BatchRevokePermissions
      description: Batch operation to revoke permissions from the principal.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                Entries:
                  $ref: "#/components/schemas/BatchPermissionsRequestEntryList"
              required:
                - Entries
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchRevokePermissionsResponse"
  /CancelTransaction:
    post:
      operationId: CancelTransaction
      description: Attempts to cancel the specified transaction. Returns an exception if the transaction was previously committed.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TransactionId:
                  $ref: "#/components/schemas/TransactionIdString"
              required:
                - TransactionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelTransactionResponse"
  /CommitTransaction:
    post:
      operationId: CommitTransaction
      description: Attempts to commit the specified transaction. Returns an exception if the transaction was previously aborted. This API action is idempotent if called multiple times for the same transaction.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TransactionId:
                  $ref: "#/components/schemas/TransactionIdString"
              required:
                - TransactionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitTransactionResponse"
  /CreateDataCellsFilter:
    post:
      operationId: CreateDataCellsFilter
      description: Creates a data cell filter to allow one to grant access to certain columns on certain rows.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TableData:
                  $ref: "#/components/schemas/DataCellsFilter"
              required:
                - TableData
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataCellsFilterResponse"
  /CreateLFTag:
    post:
      operationId: CreateLFTag
      description: Creates an LF-tag with the specified name and values.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                TagKey:
                  $ref: "#/components/schemas/LFTagKey"
                TagValues:
                  $ref: "#/components/schemas/TagValueList"
              required:
                - TagKey
                - TagValues
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLFTagResponse"
  /CreateLFTagExpression:
    post:
      operationId: CreateLFTagExpression
      description: "Creates a new LF-Tag expression with the provided name, description, catalog ID, and expression body. This call fails if a LF-Tag expression with the same name already exists in the caller’s account or if the underlying LF-Tags don't exist. To call this API operation, caller needs the following Lake Formation permissions: CREATE_LF_TAG_EXPRESSION on the root catalog resource. GRANT_WITH_LF_TAG_EXPRESSION on all underlying LF-Tag key:value pairs included in the expression."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NameString"
                Description:
                  $ref: "#/components/schemas/DescriptionString"
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                Expression:
                  $ref: "#/components/schemas/Expression"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLFTagExpressionResponse"
  /CreateLakeFormationIdentityCenterConfiguration:
    post:
      operationId: CreateLakeFormationIdentityCenterConfiguration
      description: Creates an IAM Identity Center connection with Lake Formation to allow IAM Identity Center users and groups to access Data Catalog resources.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                InstanceArn:
                  $ref: "#/components/schemas/IdentityCenterInstanceArn"
                ExternalFiltering:
                  $ref: "#/components/schemas/ExternalFilteringConfiguration"
                ShareRecipients:
                  $ref: "#/components/schemas/DataLakePrincipalList"
                ServiceIntegrations:
                  $ref: "#/components/schemas/ServiceIntegrationList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLakeFormationIdentityCenterConfigurationResponse"
  /CreateLakeFormationOptIn:
    post:
      operationId: CreateLakeFormationOptIn
      description: Enforce Lake Formation permissions for the given databases, tables, and principals.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Principal:
                  $ref: "#/components/schemas/DataLakePrincipal"
                Resource:
                  $ref: "#/components/schemas/Resource"
                Condition:
                  $ref: "#/components/schemas/Condition"
              required:
                - Principal
                - Resource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLakeFormationOptInResponse"
  /DeleteDataCellsFilter:
    post:
      operationId: DeleteDataCellsFilter
      description: Deletes a data cell filter.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                TableCatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                DatabaseName:
                  $ref: "#/components/schemas/NameString"
                TableName:
                  $ref: "#/components/schemas/NameString"
                Name:
                  $ref: "#/components/schemas/NameString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDataCellsFilterResponse"
  /DeleteLFTag:
    post:
      operationId: DeleteLFTag
      description: "Deletes an LF-tag by its key name. The operation fails if the specified tag key doesn't exist. When you delete an LF-Tag: The associated LF-Tag policy becomes invalid. Resources that had this tag assigned will no longer have the tag policy applied to them."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                TagKey:
                  $ref: "#/components/schemas/LFTagKey"
              required:
                - TagKey
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLFTagResponse"
  /DeleteLFTagExpression:
    post:
      operationId: DeleteLFTagExpression
      description: Deletes the LF-Tag expression. The caller must be a data lake admin or have DROP permissions on the LF-Tag expression. Deleting a LF-Tag expression will also delete all LFTagPolicy permissions referencing the LF-Tag expression.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NameString"
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLFTagExpressionResponse"
  /DeleteLakeFormationIdentityCenterConfiguration:
    post:
      operationId: DeleteLakeFormationIdentityCenterConfiguration
      description: Deletes an IAM Identity Center connection with Lake Formation.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLakeFormationIdentityCenterConfigurationResponse"
  /DeleteLakeFormationOptIn:
    post:
      operationId: DeleteLakeFormationOptIn
      description: Remove the Lake Formation permissions enforcement of the given databases, tables, and principals.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Principal:
                  $ref: "#/components/schemas/DataLakePrincipal"
                Resource:
                  $ref: "#/components/schemas/Resource"
                Condition:
                  $ref: "#/components/schemas/Condition"
              required:
                - Principal
                - Resource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLakeFormationOptInResponse"
  /DeleteObjectsOnCancel:
    post:
      operationId: DeleteObjectsOnCancel
      description: For a specific governed table, provides a list of Amazon S3 objects that will be written during the current transaction and that can be automatically deleted if the transaction is canceled. Without this call, no Amazon S3 objects are automatically deleted when a transaction cancels. The Glue ETL library function write_dynamic_frame.from_catalog() includes an option to automatically call DeleteObjectsOnCancel before writes. For more information, see Rolling Back Amazon S3 Writes.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                DatabaseName:
                  $ref: "#/components/schemas/NameString"
                TableName:
                  $ref: "#/components/schemas/NameString"
                TransactionId:
                  $ref: "#/components/schemas/TransactionIdString"
                Objects:
                  $ref: "#/components/schemas/VirtualObjectList"
              required:
                - DatabaseName
                - TableName
                - TransactionId
                - Objects
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteObjectsOnCancelResponse"
  /DeregisterResource:
    post:
      operationId: DeregisterResource
      description: Deregisters the resource as managed by the Data Catalog. When you deregister a path, Lake Formation removes the path from the inline policy attached to your service-linked role.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArnString"
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeregisterResourceResponse"
  /DescribeLakeFormationIdentityCenterConfiguration:
    post:
      operationId: DescribeLakeFormationIdentityCenterConfiguration
      description: Retrieves the instance ARN and application ARN for the connection.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeLakeFormationIdentityCenterConfigurationResponse"
  /DescribeResource:
    post:
      operationId: DescribeResource
      description: Retrieves the current data access role for the given resource registered in Lake Formation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArnString"
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeResourceResponse"
  /DescribeTransaction:
    post:
      operationId: DescribeTransaction
      description: Returns the details of a single transaction.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TransactionId:
                  $ref: "#/components/schemas/TransactionIdString"
              required:
                - TransactionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeTransactionResponse"
  /ExtendTransaction:
    post:
      operationId: ExtendTransaction
      description: Indicates to the service that the specified transaction is still active and should not be treated as idle and aborted. Write transactions that remain idle for a long period are automatically aborted unless explicitly extended.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                TransactionId:
                  $ref: "#/components/schemas/TransactionIdString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtendTransactionResponse"
  /GetDataCellsFilter:
    post:
      operationId: GetDataCellsFilter
      description: Returns a data cells filter.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TableCatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                DatabaseName:
                  $ref: "#/components/schemas/NameString"
                TableName:
                  $ref: "#/components/schemas/NameString"
                Name:
                  $ref: "#/components/schemas/NameString"
              required:
                - TableCatalogId
                - DatabaseName
                - TableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataCellsFilterResponse"
  /GetDataLakePrincipal:
    post:
      operationId: GetDataLakePrincipal
      description: Returns the identity of the invoking principal.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataLakePrincipalResponse"
  /GetDataLakeSettings:
    post:
      operationId: GetDataLakeSettings
      description: Retrieves the list of the data lake administrators of a Lake Formation-managed data lake.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataLakeSettingsResponse"
  /GetEffectivePermissionsForPath:
    post:
      operationId: GetEffectivePermissionsForPath
      description: Returns the Lake Formation permissions for a specified table or database resource located at a path in Amazon S3. GetEffectivePermissionsForPath will not return databases and tables if the catalog is encrypted.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArnString"
                NextToken:
                  $ref: "#/components/schemas/Token"
                MaxResults:
                  $ref: "#/components/schemas/PageSize"
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEffectivePermissionsForPathResponse"
  /GetLFTag:
    post:
      operationId: GetLFTag
      description: Returns an LF-tag definition.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                TagKey:
                  $ref: "#/components/schemas/LFTagKey"
              required:
                - TagKey
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLFTagResponse"
  /GetLFTagExpression:
    post:
      operationId: GetLFTagExpression
      description: Returns the details about the LF-Tag expression. The caller must be a data lake admin or must have DESCRIBE permission on the LF-Tag expression resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NameString"
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLFTagExpressionResponse"
  /GetQueryState:
    post:
      operationId: GetQueryState
      description: Returns the state of a query previously submitted. Clients are expected to poll GetQueryState to monitor the current state of the planning before retrieving the work units. A query state is only visible to the principal that made the initial call to StartQueryPlanning.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                QueryId:
                  $ref: "#/components/schemas/GetQueryStateRequestQueryIdString"
              required:
                - QueryId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQueryStateResponse"
  /GetQueryStatistics:
    post:
      operationId: GetQueryStatistics
      description: Retrieves statistics on the planning and execution of a query.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                QueryId:
                  $ref: "#/components/schemas/GetQueryStatisticsRequestQueryIdString"
              required:
                - QueryId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQueryStatisticsResponse"
  /GetResourceLFTags:
    post:
      operationId: GetResourceLFTags
      description: Returns the LF-tags applied to a resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                Resource:
                  $ref: "#/components/schemas/Resource"
                ShowAssignedLFTags:
                  $ref: "#/components/schemas/BooleanNullable"
              required:
                - Resource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourceLFTagsResponse"
  /GetTableObjects:
    post:
      operationId: GetTableObjects
      description: Returns the set of Amazon S3 objects that make up the specified governed table. A transaction ID or timestamp can be specified for time-travel queries.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                DatabaseName:
                  $ref: "#/components/schemas/NameString"
                TableName:
                  $ref: "#/components/schemas/NameString"
                TransactionId:
                  $ref: "#/components/schemas/TransactionIdString"
                QueryAsOfTime:
                  $ref: "#/components/schemas/Timestamp"
                PartitionPredicate:
                  $ref: "#/components/schemas/PredicateString"
                MaxResults:
                  $ref: "#/components/schemas/PageSize"
                NextToken:
                  $ref: "#/components/schemas/TokenString"
              required:
                - DatabaseName
                - TableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableObjectsResponse"
  /GetTemporaryDataLocationCredentials:
    post:
      operationId: GetTemporaryDataLocationCredentials
      description: "Allows a user or application in a secure environment to access data in a specific Amazon S3 location registered with Lake Formation by providing temporary scoped credentials that are limited to the requested data location and the caller's authorized access level. GetDataAccess is logged in CloudTrail whenever a principal requests temporary data location credentials to access data in a data lake location that is registered with Lake Formation. The API operation returns an error in the following scenarios: The data location is not registered with Lake Formation. No Glue table is associated with the data location. The caller doesn't have required permissions on the associated table. The caller must have SELECT or SUPER permissions on the associated table, and credential vending for full table access must be enabled in the data lake settings. For more information, see Application integration for full table access. The data location is in a different Amazon Web Services Region. Lake Formation doesn't support cross-Region access when vending credentials for a data location. Lake Formation only supports Amazon S3 paths registered within the same Region as the API call."
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                DurationSeconds:
                  $ref: "#/components/schemas/CredentialTimeoutDurationSecondInteger"
                AuditContext:
                  $ref: "#/components/schemas/AuditContext"
                DataLocations:
                  $ref: "#/components/schemas/PathStringList"
                CredentialsScope:
                  $ref: "#/components/schemas/CredentialsScope"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTemporaryDataLocationCredentialsResponse"
  /GetTemporaryGluePartitionCredentials:
    post:
      operationId: GetTemporaryGluePartitionCredentials
      description: This API is identical to GetTemporaryTableCredentials except that this is used when the target Data Catalog resource is of type Partition. Lake Formation restricts the permission of the vended credentials with the same scope down policy which restricts access to a single Amazon S3 prefix.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TableArn:
                  $ref: "#/components/schemas/ResourceArnString"
                Partition:
                  $ref: "#/components/schemas/PartitionValueList"
                Permissions:
                  $ref: "#/components/schemas/PermissionList"
                DurationSeconds:
                  $ref: "#/components/schemas/CredentialTimeoutDurationSecondInteger"
                AuditContext:
                  $ref: "#/components/schemas/AuditContext"
                SupportedPermissionTypes:
                  $ref: "#/components/schemas/PermissionTypeList"
              required:
                - TableArn
                - Partition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
