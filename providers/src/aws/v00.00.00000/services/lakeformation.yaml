          description: A continuation token for paginating the returned list of tokens, returned if the current segment of the list is not the last.
    StorageOptimizerList:
      type: array
      items:
        $ref: "#/components/schemas/StorageOptimizer"
    StorageOptimizer:
      description: A structure describing the configuration and details of a storage optimizer.
      type: object
      properties:
        StorageOptimizerType:
          $ref: "#/components/schemas/OptimizerType"
          description: The specific type of storage optimizer. The supported value is compaction.
        Config:
          type: object
          properties: {}
          description: "A map of the storage optimizer configuration. Currently contains only one key-value pair: is_enabled indicates true or false for acceleration."
        ErrorMessage:
          $ref: "#/components/schemas/MessageString"
          description: A message that contains information about any error (if present). When an acceleration result has an enabled status, the error message is empty. When an acceleration result has a disabled status, the message describes an error or simply indicates "disabled by the user".
        Warnings:
          $ref: "#/components/schemas/MessageString"
          description: A message that contains information about any warnings (if present).
        LastRunDetails:
          $ref: "#/components/schemas/MessageString"
          description: When an acceleration result has an enabled status, contains the details of the last job run.
    MessageString:
      type: string
    TransactionStatusFilter:
      type: string
      enum:
        - ALL
        - COMPLETED
        - ACTIVE
        - COMMITTED
        - ABORTED
    ListTransactionsResponse:
      type: object
      properties:
        Transactions:
          $ref: "#/components/schemas/TransactionDescriptionList"
          description: A list of transactions. The record for each transaction is a TransactionDescription object.
        NextToken:
          $ref: "#/components/schemas/TokenString"
          description: A continuation token indicating whether additional data is available.
    TransactionDescriptionList:
