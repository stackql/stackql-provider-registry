      type: array
      items:
        $ref: "#/components/schemas/TaggedTable"
    TaggedTable:
      description: A structure describing a table resource with LF-tags.
      type: object
      properties:
        Table:
          $ref: "#/components/schemas/TableResource"
          description: A table that has LF-tags attached to it.
        LFTagOnDatabase:
          $ref: "#/components/schemas/LFTagsList"
          description: A list of LF-tags attached to the database where the table resides.
        LFTagsOnTable:
          $ref: "#/components/schemas/LFTagsList"
          description: A list of LF-tags attached to the table.
        LFTagsOnColumns:
          $ref: "#/components/schemas/ColumnLFTagsList"
          description: A list of LF-tags attached to columns in the table.
    QueryPlanningContext:
      description: A structure containing information about the query plan.
      type: object
      properties:
        CatalogId:
          $ref: "#/components/schemas/CatalogIdString"
          description: The ID of the Data Catalog where the partition in question resides. If none is provided, the Amazon Web Services account ID is used by default.
        DatabaseName:
          $ref: "#/components/schemas/QueryPlanningContextDatabaseNameString"
          description: The database containing the table.
        QueryAsOfTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time as of when to read the table contents. If not set, the most recent transaction commit time will be used. Cannot be specified along with TransactionId.
        QueryParameters:
          type: object
          properties: {}
          description: A map consisting of key-value pairs.
        TransactionId:
          $ref: "#/components/schemas/TransactionIdString"
          description: The transaction ID at which to read the table contents. If this transaction is not committed, the read will be treated as part of that transaction and will see its writes. If this transaction has aborted, an error will be returned. If not set, defaults to the most recent committed transaction. Cannot be specified along with QueryAsOfTime.
      required:
        - DatabaseName
    QueryPlanningContextDatabaseNameString:
      type: string
      minLength: 1
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    SyntheticStartQueryPlanningRequestQueryString:
      type: string
      minLength: 1
    StartQueryPlanningResponse:
      description: A structure for the output.
      type: object
      properties:
        QueryId:
          $ref: "#/components/schemas/QueryIdString"
          description: The ID of the plan query operation can be used to fetch the actual work unit descriptors that are produced as the result of the operation. The ID is also used to get the query state and as an input to the Execute operation.
      required:
        - QueryId
    TransactionType:
      type: string
      enum:
        - READ_AND_WRITE
        - READ_ONLY
    StartTransactionResponse:
      type: object
      properties:
        TransactionId:
          $ref: "#/components/schemas/TransactionIdString"
          description: An opaque identifier for the transaction.
