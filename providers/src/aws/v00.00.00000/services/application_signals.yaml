openapi: 3.0.0
info:
  version: "2024-04-15"
  title: Amazon CloudWatch Application Signals
  description: Amazon CloudWatch Application Signals
  x-serviceName: application-signals
  x-serviceAlias: application_signals
  x-protocol: rest-json
  x-apiVersion: "2024-04-15"
  x-endpointPrefix: application-signals
servers:
  - url: https://application-signals.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for application-signals
paths:
  /budget-report:
    post:
      operationId: BatchGetServiceLevelObjectiveBudgetReport
      description: Use this operation to retrieve one or more service level objective (SLO) budget reports. An error budget is the amount of time or requests in an unhealthy state that your service can accumulate during an interval before your overall SLO budget health is breached and the SLO is considered to be unmet. For example, an SLO with a threshold of 99.95% and a monthly interval translates to an error budget of 21.9 minutes of downtime in a 30-day month. Budget reports include a health indicator, the attainment value, and remaining budget. For more information about SLO error budgets, see SLO concepts.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Timestamp:
                  $ref: "#/components/schemas/Timestamp"
                SloIds:
                  $ref: "#/components/schemas/ServiceLevelObjectiveIds"
              required:
                - SloIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetServiceLevelObjectiveBudgetReportOutput"
  /exclusion-windows:
    patch:
      operationId: BatchUpdateExclusionWindows
      description: Add or remove time window exclusions for one or more Service Level Objectives (SLOs).
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SloIds:
                  $ref: "#/components/schemas/ServiceLevelObjectiveIds"
                AddExclusionWindows:
                  $ref: "#/components/schemas/ExclusionWindows"
                RemoveExclusionWindows:
                  $ref: "#/components/schemas/ExclusionWindows"
              required:
                - SloIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateExclusionWindowsOutput"
  /slo:
    post:
      operationId: CreateServiceLevelObjective
      description: "Creates a service level objective (SLO), which can help you ensure that your critical business operations are meeting customer expectations. Use SLOs to set and track specific target levels for the reliability and availability of your applications and services. SLOs use service level indicators (SLIs) to calculate whether the application is performing at the level that you want. Create an SLO to set a target for a service or operation’s availability or latency. CloudWatch measures this target frequently you can find whether it has been breached. The target performance quality that is defined for an SLO is the attainment goal. You can set SLO targets for your applications that are discovered by Application Signals, using critical metrics such as latency and availability. You can also set SLOs against any CloudWatch metric or math expression that produces a time series. You can't create an SLO for a service operation that was discovered by Application Signals until after that operation has reported standard metrics to Application Signals. When you create an SLO, you specify whether it is a period-based SLO or a request-based SLO. Each type of SLO has a different way of evaluating your application's performance against its attainment goal. A period-based SLO uses defined periods of time within a specified total time interval. For each period of time, Application Signals determines whether the application met its goal. The attainment rate is calculated as the number of good periods/number of total periods. For example, for a period-based SLO, meeting an attainment goal of 99.9% means that within your interval, your application must meet its performance goal during at least 99.9% of the time periods. A request-based SLO doesn't use pre-defined periods of time. Instead, the SLO measures number of good requests/number of total requests during the interval. At any time, you can find the ratio of good requests to total requests for the interval up to the time stamp that you specify, and measure that ratio against the goal set in your SLO. After you have created an SLO, you can retrieve error budget reports for it. An error budget is the amount of time or amount of requests that your application can be non-compliant with the SLO's goal, and still have your application meet the goal. For a period-based SLO, the error budget starts at a number defined by the highest number of periods that can fail to meet the threshold, while still meeting the overall goal. The remaining error budget decreases with every failed period that is recorded. The error budget within one interval can never increase. For example, an SLO with a threshold that 99.95% of requests must be completed under 2000ms every month translates to an error budget of 21.9 minutes of downtime per month. For a request-based SLO, the remaining error budget is dynamic and can increase or decrease, depending on the ratio of good requests to total requests. For more information about SLOs, see Service level objectives (SLOs). When you perform a CreateServiceLevelObjective operation, Application Signals creates the AWSServiceRoleForCloudWatchApplicationSignals service-linked role, if it doesn't already exist in your account. This service- linked role has the following permissions: xray:GetServiceGraph logs:StartQuery logs:GetQueryResults cloudwatch:GetMetricData cloudwatch:ListMetrics tag:GetResources autoscaling:DescribeAutoScalingGroups"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ServiceLevelObjectiveName"
                Description:
                  $ref: "#/components/schemas/ServiceLevelObjectiveDescription"
                SliConfig:
                  $ref: "#/components/schemas/ServiceLevelIndicatorConfig"
                RequestBasedSliConfig:
                  $ref: "#/components/schemas/RequestBasedServiceLevelIndicatorConfig"
                Goal:
                  $ref: "#/components/schemas/Goal"
                Tags:
                  $ref: "#/components/schemas/TagList"
                BurnRateConfigurations:
                  $ref: "#/components/schemas/BurnRateConfigurations"
                CreateRecommendedSlo:
                  $ref: "#/components/schemas/Boolean"
                AutoInvestigationEnabled:
                  $ref: "#/components/schemas/Boolean"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServiceLevelObjectiveOutput"
  /grouping-configuration:
    delete:
      operationId: DeleteGroupingConfiguration
      description: Deletes the grouping configuration for this account. This removes all custom grouping attribute definitions that were previously configured.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGroupingConfigurationOutput"
    put:
      operationId: PutGroupingConfiguration
      description: Creates or updates the grouping configuration for this account. This operation allows you to define custom grouping attributes that determine how services are logically grouped based on telemetry attributes, Amazon Web Services tags, or predefined mappings. These grouping attributes can then be used to organize and filter services in the Application Signals console and APIs.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GroupingAttributeDefinitions:
                  $ref: "#/components/schemas/GroupingAttributeDefinitions"
              required:
                - GroupingAttributeDefinitions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutGroupingConfigurationOutput"
  /slo/{id}:
    delete:
      operationId: DeleteServiceLevelObjective
      description: Deletes the specified service level objective.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ServiceLevelObjectiveId"
          description: The ARN or name of the service level objective to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteServiceLevelObjectiveOutput"
    get:
      operationId: GetServiceLevelObjective
      description: Returns information about one SLO created in the account.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ServiceLevelObjectiveId"
          description: The ARN or name of the SLO that you want to retrieve information about. You can find the ARNs of SLOs by using the ListServiceLevelObjectives operation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetServiceLevelObjectiveOutput"
    patch:
      operationId: UpdateServiceLevelObjective
      description: Updates an existing service level objective (SLO). If you omit parameters, the previous values of those parameters are retained. You cannot change from a period-based SLO to a request-based SLO, or change from a request-based SLO to a period-based SLO.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ServiceLevelObjectiveId"
          description: The Amazon Resource Name (ARN) or name of the service level objective that you want to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/ServiceLevelObjectiveDescription"
                SliConfig:
                  $ref: "#/components/schemas/ServiceLevelIndicatorConfig"
                RequestBasedSliConfig:
                  $ref: "#/components/schemas/RequestBasedServiceLevelIndicatorConfig"
                Goal:
                  $ref: "#/components/schemas/Goal"
                BurnRateConfigurations:
                  $ref: "#/components/schemas/BurnRateConfigurations"
                AutoInvestigationEnabled:
                  $ref: "#/components/schemas/Boolean"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateServiceLevelObjectiveOutput"
  /service:
    post:
      operationId: GetService
      description: Returns information about a service discovered by Application Signals.
      parameters:
        - name: StartTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: "The start of the time period to retrieve information about. When used in a raw HTTP Query API, it is formatted as be epoch time in seconds. For example: 1698778057 Your requested start time will be rounded to the nearest hour."
        - name: EndTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: "The end of the time period to retrieve information about. When used in a raw HTTP Query API, it is formatted as be epoch time in seconds. For example: 1698778057 Your requested start time will be rounded to the nearest hour."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                KeyAttributes:
                  $ref: "#/components/schemas/Attributes"
              required:
                - KeyAttributes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetServiceOutput"
  /auditFindings:
    post:
      operationId: ListAuditFindings
      description: Returns a list of audit findings that provide automated analysis of service behavior and root cause analysis. These findings help identify the most significant observations about your services, including performance issues, anomalies, and potential problems. The findings are generated using heuristic algorithms based on established troubleshooting patterns.
      parameters:
        - name: StartTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The start of the time period to retrieve audit findings for. When used in a raw HTTP Query API, it is formatted as epoch time in seconds. For example, 1698778057
        - name: EndTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The end of the time period to retrieve audit findings for. When used in a raw HTTP Query API, it is formatted as epoch time in seconds. For example, 1698778057
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Auditors:
                  $ref: "#/components/schemas/Auditors"
                AuditTargets:
                  $ref: "#/components/schemas/AuditTargets"
                DetailLevel:
                  $ref: "#/components/schemas/DetailLevel"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                MaxResults:
                  $ref: "#/components/schemas/ListAuditFindingMaxResults"
              required:
                - AuditTargets
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAuditFindingsOutput"
  /events:
    post:
      operationId: ListEntityEvents
      description: Returns a list of change events for a specific entity, such as deployments, configuration changes, or other state-changing activities. This operation helps track the history of changes that may have affected service performance.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListEntityEventsMaxResults"
          description: The maximum number of change events to return in one operation. If you omit this parameter, the default of 50 is used.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Include this value, if it was returned by the previous operation, to get the next set of change events.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Entity:
                  $ref: "#/components/schemas/Attributes"
                StartTime:
                  $ref: "#/components/schemas/Timestamp"
                EndTime:
                  $ref: "#/components/schemas/Timestamp"
              required:
                - StartTime
                - EndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEntityEventsOutput"
  /grouping-attribute-definitions:
    post:
      operationId: ListGroupingAttributeDefinitions
      description: Returns the current grouping configuration for this account, including all custom grouping attribute definitions that have been configured. These definitions determine how services are logically grouped based on telemetry attributes, Amazon Web Services tags, or predefined mappings.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Include this value, if it was returned by the previous operation, to get the next set of grouping attribute definitions.
        - name: AwsAccountId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The Amazon Web Services account ID to retrieve grouping attribute definitions for. Use this when accessing grouping configurations from a different account in cross-account monitoring scenarios.
        - name: IncludeLinkedAccounts
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: If you are using this operation in a monitoring account, specify true to include grouping attributes from source accounts in the returned data.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGroupingAttributeDefinitionsOutput"
  /service-dependencies:
    post:
      operationId: ListServiceDependencies
      description: Returns a list of service dependencies of the service that you specify. A dependency is an infrastructure component that an operation of this service connects with. Dependencies can include Amazon Web Services services, Amazon Web Services resources, and third-party services.
      parameters:
        - name: StartTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: "The start of the time period to retrieve information about. When used in a raw HTTP Query API, it is formatted as be epoch time in seconds. For example: 1698778057 Your requested start time will be rounded to the nearest hour."
        - name: EndTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: "The end of the time period to retrieve information about. When used in a raw HTTP Query API, it is formatted as be epoch time in seconds. For example: 1698778057 Your requested end time will be rounded to the nearest hour."
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListServiceDependenciesMaxResults"
          description: The maximum number of results to return in one operation. If you omit this parameter, the default of 50 is used.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Include this value, if it was returned by the previous operation, to get the next set of service dependencies.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                KeyAttributes:
                  $ref: "#/components/schemas/Attributes"
              required:
                - KeyAttributes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServiceDependenciesOutput"
  /service-dependents:
    post:
      operationId: ListServiceDependents
      description: Returns the list of dependents that invoked the specified service during the provided time range. Dependents include other services, CloudWatch Synthetics canaries, and clients that are instrumented with CloudWatch RUM app monitors.
      parameters:
        - name: StartTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: "The start of the time period to retrieve information about. When used in a raw HTTP Query API, it is formatted as be epoch time in seconds. For example: 1698778057 Your requested start time will be rounded to the nearest hour."
        - name: EndTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: "The end of the time period to retrieve information about. When used in a raw HTTP Query API, it is formatted as be epoch time in seconds. For example: 1698778057 Your requested start time will be rounded to the nearest hour."
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListServiceDependentsMaxResults"
          description: The maximum number of results to return in one operation. If you omit this parameter, the default of 50 is used.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Include this value, if it was returned by the previous operation, to get the next set of service dependents.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                KeyAttributes:
                  $ref: "#/components/schemas/Attributes"
              required:
                - KeyAttributes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServiceDependentsOutput"
  /slo/{id}/exclusion-windows:
    get:
      operationId: ListServiceLevelObjectiveExclusionWindows
      description: Retrieves all exclusion windows configured for a specific SLO.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ServiceLevelObjectiveId"
          description: The ID of the SLO to list exclusion windows for.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListServiceLevelObjectiveExclusionWindowsMaxResults"
          description: The maximum number of results to return in one operation. If you omit this parameter, the default of 50 is used.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Include this value, if it was returned by the previous operation, to get the next set of service level objectives.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServiceLevelObjectiveExclusionWindowsOutput"
  /slos:
    post:
      operationId: ListServiceLevelObjectives
      description: Returns a list of SLOs created in this account.
      parameters:
        - name: OperationName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OperationName"
          description: The name of the operation that this SLO is associated with.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListServiceLevelObjectivesMaxResults"
          description: The maximum number of results to return in one operation. If you omit this parameter, the default of 50 is used.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Include this value, if it was returned by the previous operation, to get the next set of service level objectives.
        - name: IncludeLinkedAccounts
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: If you are using this operation in a monitoring account, specify true to include SLO from source accounts in the returned data. When you are monitoring an account, you can use Amazon Web Services account ID in KeyAttribute filter for service source account and SloOwnerawsaccountID for SLO source account with IncludeLinkedAccounts to filter the returned data to only a single source account.
        - name: SloOwnerAwsAccountId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: SLO's Amazon Web Services account ID.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                KeyAttributes:
                  $ref: "#/components/schemas/Attributes"
                DependencyConfig:
                  $ref: "#/components/schemas/DependencyConfig"
                MetricSourceTypes:
                  $ref: "#/components/schemas/MetricSourceTypes"
                MetricSource:
                  $ref: "#/components/schemas/MetricSource"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServiceLevelObjectivesOutput"
  /service-operations:
    post:
      operationId: ListServiceOperations
      description: Returns a list of the operations of this service that have been discovered by Application Signals. Only the operations that were invoked during the specified time range are returned.
      parameters:
        - name: StartTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: "The start of the time period to retrieve information about. When used in a raw HTTP Query API, it is formatted as be epoch time in seconds. For example: 1698778057 Your requested start time will be rounded to the nearest hour."
        - name: EndTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: "The end of the time period to retrieve information about. When used in a raw HTTP Query API, it is formatted as be epoch time in seconds. For example: 1698778057 Your requested end time will be rounded to the nearest hour."
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListServiceOperationMaxResults"
          description: The maximum number of results to return in one operation. If you omit this parameter, the default of 50 is used.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Include this value, if it was returned by the previous operation, to get the next set of service operations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                KeyAttributes:
                  $ref: "#/components/schemas/Attributes"
              required:
                - KeyAttributes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServiceOperationsOutput"
  /service/states:
    post:
      operationId: ListServiceStates
      description: Returns information about the last deployment and other change states of services. This API provides visibility into recent changes that may have affected service performance, helping with troubleshooting and change correlation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StartTime:
                  $ref: "#/components/schemas/Timestamp"
                EndTime:
                  $ref: "#/components/schemas/Timestamp"
                MaxResults:
                  $ref: "#/components/schemas/ListServiceStatesMaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                IncludeLinkedAccounts:
                  $ref: "#/components/schemas/Boolean"
                AwsAccountId:
                  $ref: "#/components/schemas/AwsAccountId"
                AttributeFilters:
                  $ref: "#/components/schemas/AttributeFilters"
              required:
                - StartTime
                - EndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServiceStatesOutput"
  /services:
    get:
      operationId: ListServices
      description: Returns a list of services that have been discovered by Application Signals. A service represents a minimum logical and transactional unit that completes a business function. Services are discovered through Application Signals instrumentation.
      parameters:
        - name: StartTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: "The start of the time period to retrieve information about. When used in a raw HTTP Query API, it is formatted as be epoch time in seconds. For example: 1698778057 Your requested start time will be rounded to the nearest hour."
        - name: EndTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: "The end of the time period to retrieve information about. When used in a raw HTTP Query API, it is formatted as be epoch time in seconds. For example: 1698778057 Your requested start time will be rounded to the nearest hour."
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListServicesMaxResults"
          description: The maximum number of results to return in one operation. If you omit this parameter, the default of 50 is used.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Include this value, if it was returned by the previous operation, to get the next set of services.
        - name: IncludeLinkedAccounts
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: If you are using this operation in a monitoring account, specify true to include services from source accounts in the returned data.
        - name: AwsAccountId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: Amazon Web Services Account ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServicesOutput"
  /tags:
    get:
      operationId: ListTagsForResource
      description: Displays the tags associated with a CloudWatch resource. Tags can be assigned to service level objectives.
      parameters:
        - name: ResourceArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the CloudWatch resource that you want to view tags for. The ARN format of an Application Signals SLO is arn:aws:cloudwatch:Region:account-id:slo:slo-name For more information about ARN format, see Resource Types Defined by Amazon CloudWatch in the Amazon Web Services General Reference.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /start-discovery:
    post:
      operationId: StartDiscovery
      description: "Enables this Amazon Web Services account to be able to use CloudWatch Application Signals by creating the AWSServiceRoleForCloudWatchApplicationSignals service-linked role. This service- linked role has the following permissions: xray:GetServiceGraph logs:StartQuery logs:GetQueryResults cloudwatch:GetMetricData cloudwatch:ListMetrics tag:GetResources autoscaling:DescribeAutoScalingGroups A service-linked CloudTrail event channel is created to process CloudTrail events and return change event information. This includes last deployment time, userName, eventName, and other event metadata. After completing this step, you still need to instrument your Java and Python applications to send data to Application Signals. For more information, see Enabling Application Signals."
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartDiscoveryOutput"
  /tag-resource:
    post:
      operationId: TagResource
      description: Assigns one or more tags (key-value pairs) to the specified CloudWatch resource, such as a service level objective. Tags can help you organize and categorize your resources. You can also use them to scope user permissions by granting a user permission to access or change only resources with certain tag values. Tags don't have any semantic meaning to Amazon Web Services and are interpreted strictly as strings of characters. You can use the TagResource action with an alarm that already has tags. If you specify a new tag key for the alarm, this tag is appended to the list of tags associated with the alarm. If you specify a tag key that is already associated with the alarm, the new tag value that you specify replaces the previous value for that tag. You can associate as many as 50 tags with a CloudWatch resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /untag-resource:
    post:
      operationId: UntagResource
      description: Removes one or more tags from the specified resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - ResourceArn
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Timestamp:
      type: string
      format: date-time
    ServiceLevelObjectiveIds:
      type: array
      items:
        $ref: "#/components/schemas/String"
    String:
      type: string
    BatchGetServiceLevelObjectiveBudgetReportOutput:
      type: object
      properties:
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the report is for. It is expressed as the number of milliseconds since Jan 1, 1970 00:00:00 UTC.
        Reports:
          $ref: "#/components/schemas/ServiceLevelObjectiveBudgetReports"
          description: An array of structures, where each structure is one budget report.
        Errors:
          $ref: "#/components/schemas/ServiceLevelObjectiveBudgetReportErrors"
          description: An array of structures, where each structure includes an error indicating that one of the requests in the array was not valid.
      required:
        - Timestamp
        - Reports
        - Errors
    ServiceLevelObjectiveBudgetReports:
      type: array
      items:
        $ref: "#/components/schemas/ServiceLevelObjectiveBudgetReport"
    ServiceLevelObjectiveBudgetReport:
      description: A structure containing an SLO budget report that you have requested.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ServiceLevelObjectiveArn"
          description: The ARN of the SLO that this report is for.
        Name:
          $ref: "#/components/schemas/ServiceLevelObjectiveName"
          description: The name of the SLO that this report is for.
        EvaluationType:
          $ref: "#/components/schemas/EvaluationType"
          description: Displays whether this budget report is for a period-based SLO or a request-based SLO.
        BudgetStatus:
          $ref: "#/components/schemas/ServiceLevelObjectiveBudgetStatus"
          description: The status of this SLO, as it relates to the error budget for the entire time interval. OK means that the SLO had remaining budget above the warning threshold, as of the time that you specified in TimeStamp. WARNING means that the SLO's remaining budget was below the warning threshold, as of the time that you specified in TimeStamp. BREACHED means that the SLO's budget was exhausted, as of the time that you specified in TimeStamp. INSUFFICIENT_DATA means that the specified start and end times were before the SLO was created, or that attainment data is missing.
        Attainment:
          $ref: "#/components/schemas/Attainment"
          description: A number between 0 and 100 that represents the success percentage of your application compared to the goal set by the SLO. If this is a period-based SLO, the number is the percentage of time periods that the service has attained the SLO's attainment goal, as of the time of the request. If this is a request-based SLO, the number is the number of successful requests divided by the number of total requests, multiplied by 100, during the time range that you specified in your request.
        TotalBudgetSeconds:
          $ref: "#/components/schemas/TotalBudgetSeconds"
          description: The total number of seconds in the error budget for the interval. This field is included only if the SLO is a period-based SLO.
        BudgetSecondsRemaining:
          $ref: "#/components/schemas/BudgetSecondsRemaining"
          description: The budget amount remaining before the SLO status becomes BREACHING, at the time specified in the Timestemp parameter of the request. If this value is negative, then the SLO is already in BREACHING status. This field is included only if the SLO is a period-based SLO.
        TotalBudgetRequests:
          $ref: "#/components/schemas/TotalBudgetRequests"
          description: This field is displayed only for request-based SLOs. It displays the total number of failed requests that can be tolerated during the time range between the start of the interval and the time stamp supplied in the budget report request. It is based on the total number of requests that occurred, and the percentage specified in the attainment goal. If the number of failed requests matches this number or is higher, then this SLO is currently breaching. This number can go up and down between reports with different time stamps, based on both how many total requests occur.
        BudgetRequestsRemaining:
          $ref: "#/components/schemas/BudgetRequestsRemaining"
          description: This field is displayed only for request-based SLOs. It displays the number of failed requests that can be tolerated before any more successful requests occur, and still have the application meet its SLO goal. This number can go up and down between different reports, based on both how many successful requests and how many failed requests occur in that time.
        Sli:
          $ref: "#/components/schemas/ServiceLevelIndicator"
          description: A structure that contains information about the performance metric that this SLO monitors.
        RequestBasedSli:
          $ref: "#/components/schemas/RequestBasedServiceLevelIndicator"
        Goal:
          $ref: "#/components/schemas/Goal"
      required:
        - Arn
        - Name
        - BudgetStatus
    ServiceLevelObjectiveArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:(aws|aws-us-gov):application-signals:[^:]*:[^:]*:slo/[0-9A-Za-z][-._0-9A-Za-z ]{0,126}[0-9A-Za-z]
    ServiceLevelObjectiveName:
      type: string
      pattern: "[0-9A-Za-z][-._0-9A-Za-z ]{0,126}[0-9A-Za-z]"
    EvaluationType:
      type: string
      enum:
        - PeriodBased
        - RequestBased
    ServiceLevelObjectiveBudgetStatus:
      type: string
      enum:
        - OK
        - WARNING
        - BREACHED
        - INSUFFICIENT_DATA
    Attainment:
      type: number
      format: double
    TotalBudgetSeconds:
      type: integer
    BudgetSecondsRemaining:
      type: integer
    TotalBudgetRequests:
      type: integer
    BudgetRequestsRemaining:
      type: integer
    ServiceLevelIndicator:
      description: This structure contains information about the performance metric that a period-based SLO monitors.
      type: object
      properties:
        SliMetric:
          $ref: "#/components/schemas/ServiceLevelIndicatorMetric"
          description: A structure that contains information about the metric that the SLO monitors.
        MetricThreshold:
          $ref: "#/components/schemas/ServiceLevelIndicatorMetricThreshold"
          description: The value that the SLI metric is compared to.
        ComparisonOperator:
          $ref: "#/components/schemas/ServiceLevelIndicatorComparisonOperator"
          description: The arithmetic operation used when comparing the specified metric to the threshold.
      required:
        - SliMetric
        - MetricThreshold
        - ComparisonOperator
    ServiceLevelIndicatorMetric:
      description: This structure contains the information about the metric that is used for a period-based SLO.
      type: object
      properties:
        KeyAttributes:
          type: object
          properties: {}
          description: This is a string-to-string map that contains information about the type of object that this SLO is related to. It can include the following fields. Type designates the type of object that this SLO is related to. ResourceType specifies the type of the resource. This field is used only when the value of the Type field is Resource or AWS::Resource. Name specifies the name of the object. This is used only if the value of the Type field is Service, RemoteService, or AWS::Service. Identifier identifies the resource objects of this resource. This is used only if the value of the Type field is Resource or AWS::Resource. Environment specifies the location where this object is hosted, or what it belongs to.
        OperationName:
          $ref: "#/components/schemas/OperationName"
          description: If the SLO monitors a specific operation of the service, this field displays that operation name.
        MetricType:
          $ref: "#/components/schemas/ServiceLevelIndicatorMetricType"
          description: If the SLO monitors either the LATENCY or AVAILABILITY metric that Application Signals collects, this field displays which of those metrics is used.
        MetricDataQueries:
          $ref: "#/components/schemas/MetricDataQueries"
          description: If this SLO monitors a CloudWatch metric or the result of a CloudWatch metric math expression, this structure includes the information about that metric or expression.
        DependencyConfig:
          $ref: "#/components/schemas/DependencyConfig"
          description: Identifies the dependency using the DependencyKeyAttributes and DependencyOperationName.
        MetricSource:
          $ref: "#/components/schemas/MetricSource"
          description: Identifies the metric source for SLOs on resources other than Application Signals services.
        CompositeSliConfig:
          $ref: "#/components/schemas/CompositeSliConfig"
          description: The composite SLI configuration for service-level SLOs that monitor multiple operations of a service.
      required:
        - MetricDataQueries
    OperationName:
      type: string
      minLength: 1
      maxLength: 255
    ServiceLevelIndicatorMetricType:
      type: string
      enum:
        - LATENCY
        - AVAILABILITY
    MetricDataQueries:
      type: array
      items:
        $ref: "#/components/schemas/MetricDataQuery"
    MetricDataQuery:
      description: Use this structure to define a metric or metric math expression that you want to use as for a service level objective. Each MetricDataQuery in the MetricDataQueries array specifies either a metric to retrieve, or a metric math expression to be performed on retrieved metrics. A single MetricDataQueries array can include as many as 20 MetricDataQuery structures in the array. The 20 structures can include as many as 10 structures that contain a MetricStat parameter to retrieve a metric, and as many as 10 structures that contain the Expression parameter to perform a math expression. Of those Expression structures, exactly one must have true as the value for ReturnData. The result of this expression used for the SLO. For more information about metric math expressions, see CloudWatchUse metric math. Within each MetricDataQuery object, you must specify either Expression or MetricStat but not both.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/MetricId"
          description: A short name used to tie this object to the results in the response. This Id must be unique within a MetricDataQueries array. If you are performing math expressions on this set of data, this name represents that data and can serve as a variable in the metric math expression. The valid characters are letters, numbers, and underscore. The first character must be a lowercase letter.
        MetricStat:
          $ref: "#/components/schemas/MetricStat"
          description: A metric to be used directly for the SLO, or to be used in the math expression that will be used for the SLO. Within one MetricDataQuery object, you must specify either Expression or MetricStat but not both.
        Expression:
          $ref: "#/components/schemas/MetricExpression"
          description: This field can contain a metric math expression to be performed on the other metrics that you are retrieving within this MetricDataQueries structure. A math expression can use the Id of the other metrics or queries to refer to those metrics, and can also use the Id of other expressions to use the result of those expressions. For more information about metric math expressions, see Metric Math Syntax and Functions in the Amazon CloudWatch User Guide. Within each MetricDataQuery object, you must specify either Expression or MetricStat but not both.
        Label:
          $ref: "#/components/schemas/MetricLabel"
          description: A human-readable label for this metric or expression. This is especially useful if this is an expression, so that you know what the value represents. If the metric or expression is shown in a CloudWatch dashboard widget, the label is shown. If Label is omitted, CloudWatch generates a default. You can put dynamic expressions into a label, so that it is more descriptive. For more information, see Using Dynamic Labels.
        ReturnData:
          $ref: "#/components/schemas/ReturnData"
          description: Use this only if you are using a metric math expression for the SLO. Specify true for ReturnData for only the one expression result to use as the alarm. For all other metrics and expressions in the same CreateServiceLevelObjective operation, specify ReturnData as false.
        Period:
          $ref: "#/components/schemas/Period"
          description: "The granularity, in seconds, of the returned data points for this metric. For metrics with regular resolution, a period can be as short as one minute (60 seconds) and must be a multiple of 60. For high-resolution metrics that are collected at intervals of less than one minute, the period can be 1, 5, 10, 30, 60, or any multiple of 60. High-resolution metrics are those metrics stored by a PutMetricData call that includes a StorageResolution of 1 second. If the StartTime parameter specifies a time stamp that is greater than 3 hours ago, you must specify the period as follows or no data points in that time range is returned: Start time between 3 hours and 15 days ago - Use a multiple of 60 seconds (1 minute). Start time between 15 and 63 days ago - Use a multiple of 300 seconds (5 minutes). Start time greater than 63 days ago - Use a multiple of 3600 seconds (1 hour)."
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: The ID of the account where this metric is located. If you are performing this operation in a monitoring account, use this to specify which source account to retrieve this metric from.
      required:
        - Id
    MetricId:
      type: string
      minLength: 1
      maxLength: 255
    MetricStat:
      description: This structure defines the metric to be used as the service level indicator, along with the statistics, period, and unit.
      type: object
      properties:
        Metric:
          $ref: "#/components/schemas/Metric"
          description: The metric to use as the service level indicator, including the metric name, namespace, and dimensions.
        Period:
          $ref: "#/components/schemas/Period"
          description: The granularity, in seconds, to be used for the metric. For metrics with regular resolution, a period can be as short as one minute (60 seconds) and must be a multiple of 60. For high-resolution metrics that are collected at intervals of less than one minute, the period can be 1, 5, 10, 30, 60, or any multiple of 60. High-resolution metrics are those metrics stored by a PutMetricData call that includes a StorageResolution of 1 second.
        Stat:
          $ref: "#/components/schemas/Stat"
          description: The statistic to use for comparison to the threshold. It can be any CloudWatch statistic or extended statistic. For more information about statistics, see CloudWatch statistics definitions.
        Unit:
          $ref: "#/components/schemas/StandardUnit"
          description: If you omit Unit then all data that was collected with any unit is returned, along with the corresponding units that were specified when the data was reported to CloudWatch. If you specify a unit, the operation returns only data that was collected with that unit specified. If you specify a unit that does not match the data collected, the results of the operation are null. CloudWatch does not perform unit conversions.
      required:
        - Metric
        - Period
        - Stat
    Metric:
      description: This structure defines the metric used for a service level indicator, including the metric name, namespace, and dimensions
      type: object
      properties:
        Namespace:
          $ref: "#/components/schemas/Namespace"
          description: The namespace of the metric. For more information, see Namespaces.
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the metric to use.
        Dimensions:
          $ref: "#/components/schemas/Dimensions"
          description: An array of one or more dimensions to use to define the metric that you want to use. For more information, see Dimensions.
    Namespace:
      type: string
      minLength: 1
      maxLength: 255
      pattern: .*[^:].*
    MetricName:
      type: string
      minLength: 1
      maxLength: 255
    Dimensions:
      type: array
      items:
        $ref: "#/components/schemas/Dimension"
    Dimension:
      description: A dimension is a name/value pair that is part of the identity of a metric. Because dimensions are part of the unique identifier for a metric, whenever you add a unique name/value pair to one of your metrics, you are creating a new variation of that metric. For example, many Amazon EC2 metrics publish InstanceId as a dimension name, and the actual instance ID as the value for that dimension. You can assign up to 30 dimensions to a metric.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/DimensionName"
          description: The name of the dimension. Dimension names must contain only ASCII characters, must include at least one non-whitespace character, and cannot start with a colon (:). ASCII control characters are not supported as part of dimension names.
        Value:
          $ref: "#/components/schemas/DimensionValue"
          description: The value of the dimension. Dimension values must contain only ASCII characters and must include at least one non-whitespace character. ASCII control characters are not supported as part of dimension values.
      required:
        - Name
        - Value
    DimensionName:
      type: string
      minLength: 1
      maxLength: 255
    DimensionValue:
      type: string
      minLength: 1
      maxLength: 1024
    Period:
      type: integer
      minimum: 1
    Stat:
      type: string
    StandardUnit:
      type: string
      enum:
        - Microseconds
        - Milliseconds
        - Seconds
        - Bytes
        - Kilobytes
        - Megabytes
        - Gigabytes
        - Terabytes
        - Bits
        - Kilobits
        - Megabits
        - Gigabits
        - Terabits
        - Percent
        - Count
        - Bytes/Second
        - Kilobytes/Second
        - Megabytes/Second
        - Gigabytes/Second
        - Terabytes/Second
        - Bits/Second
        - Kilobits/Second
        - Megabits/Second
        - Gigabits/Second
        - Terabits/Second
        - Count/Second
        - None
    MetricExpression:
      type: string
      minLength: 1
      maxLength: 2048
    MetricLabel:
      type: string
    ReturnData:
      type: boolean
    AccountId:
      type: string
      minLength: 1
      maxLength: 255
    DependencyConfig:
      description: Identifies the dependency using the DependencyKeyAttributes and DependencyOperationName. When creating a service dependency SLO, you must specify the KeyAttributes of the service, and the DependencyConfig for the dependency. You can specify the OperationName of the service, from which it calls the dependency. Alternatively, you can exclude OperationName and the SLO will monitor all of the service's operations that call the dependency.
      type: object
      properties:
        DependencyKeyAttributes:
          type: object
          properties: {}
          description: This is a string-to-string map. It can include the following fields. Type designates the type of object this is. ResourceType specifies the type of the resource. This field is used only when the value of the Type field is Resource or AWS::Resource. Name specifies the name of the object. This is used only if the value of the Type field is Service, RemoteService, or AWS::Service. Identifier identifies the resource objects of this resource. This is used only if the value of the Type field is Resource or AWS::Resource. Environment specifies the location where this object is hosted, or what it belongs to.
        DependencyOperationName:
          $ref: "#/components/schemas/OperationName"
          description: The name of the called operation in the dependency.
      required:
        - DependencyKeyAttributes
        - DependencyOperationName
    MetricSource:
      description: Identifies the metric source for SLOs on resources other than Application Signals services.
      type: object
      properties:
        MetricSourceKeyAttributes:
          type: object
          properties: {}
          description: Key attributes that identify the metric source.
        MetricSourceAttributes:
          type: object
          properties: {}
          description: Additional attributes for the metric source.
      required:
        - MetricSourceKeyAttributes
    CompositeSliConfig:
      description: This structure contains the configuration for a composite service level indicator (SLI) that aggregates metrics across multiple operations of a service for service-level SLOs.
      type: object
      properties:
        SelectionConfig:
          $ref: "#/components/schemas/SelectionConfig"
          description: Specifies how operations are selected for this service-level SLO. Operations can be selected explicitly by listing them, by specifying a prefix to match operation names, or by providing a regular expression pattern.
        Components:
          $ref: "#/components/schemas/CompositeSliComponents"
          description: The list of operations included in this composite SLI. You must specify between 2 and 20 components. Each component is a CompositeSliComponent that identifies a single operation by its OperationName.
      required:
        - SelectionConfig
    SelectionConfig:
      description: Defines how operations are selected for a service-level SLO.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/SelectionType"
        Pattern:
          $ref: "#/components/schemas/SelectionPattern"
          description: A prefix string or regular expression that specifies which operations to include in a service-level SLO. When SelectionType is PREFIX, this value is a prefix string that matches the beginning of operation names. When SelectionType is REGEX, this value is a regular expression that matches operation names.
      required:
        - Type
    SelectionType:
      description: The strategy for selecting operations to include in a service-level SLO. EXPLICIT — You provide a specific list of operations in the Components field of CompositeSliConfig. PREFIX — You provide a prefix string in the Pattern field of SelectionConfig, and all operations whose names start with the prefix are included. REGEX — You provide a regular expression in the Pattern field of SelectionConfig, and all operations whose names match the pattern are included.
      type: string
      enum:
        - EXPLICIT
        - PREFIX
        - REGEX
    SelectionPattern:
      type: string
      pattern: .+
    CompositeSliComponents:
      description: A list of operations that form a composite SLI for a service-level SLO. Each element is a CompositeSliComponent that identifies a single operation. Used in the Components field of CompositeSliConfig.
      type: array
      items:
        $ref: "#/components/schemas/CompositeSliComponent"
    CompositeSliComponent:
      description: Identifies a single operation to include in a composite SLI for a service-level SLO. Used as an element of the Components list in CompositeSliConfig.
      type: object
      properties:
        OperationName:
          $ref: "#/components/schemas/OperationName"
          description: The name of the operation to include in the composite SLI.
    ServiceLevelIndicatorMetricThreshold:
      type: number
      format: double
    ServiceLevelIndicatorComparisonOperator:
      type: string
      enum:
        - GreaterThanOrEqualTo
        - GreaterThan
        - LessThan
        - LessThanOrEqualTo
    RequestBasedServiceLevelIndicator:
      description: This structure contains information about the performance metric that a request-based SLO monitors.
      type: object
      properties:
        RequestBasedSliMetric:
          $ref: "#/components/schemas/RequestBasedServiceLevelIndicatorMetric"
          description: A structure that contains information about the metric that the SLO monitors.
        MetricThreshold:
          $ref: "#/components/schemas/ServiceLevelIndicatorMetricThreshold"
          description: This value is the threshold that the observed metric values of the SLI metric are compared to.
        ComparisonOperator:
          $ref: "#/components/schemas/ServiceLevelIndicatorComparisonOperator"
          description: The arithmetic operation used when comparing the specified metric to the threshold.
      required:
        - RequestBasedSliMetric
    RequestBasedServiceLevelIndicatorMetric:
      description: This structure contains the information about the metric that is used for a request-based SLO.
      type: object
      properties:
        KeyAttributes:
          type: object
          properties: {}
          description: This is a string-to-string map that contains information about the type of object that this SLO is related to. It can include the following fields. Type designates the type of object that this SLO is related to. ResourceType specifies the type of the resource. This field is used only when the value of the Type field is Resource or AWS::Resource. Name specifies the name of the object. This is used only if the value of the Type field is Service, RemoteService, or AWS::Service. Identifier identifies the resource objects of this resource. This is used only if the value of the Type field is Resource or AWS::Resource. Environment specifies the location where this object is hosted, or what it belongs to.
        OperationName:
          $ref: "#/components/schemas/OperationName"
          description: If the SLO monitors a specific operation of the service, this field displays that operation name.
        MetricType:
          $ref: "#/components/schemas/ServiceLevelIndicatorMetricType"
          description: If the SLO monitors either the LATENCY or AVAILABILITY metric that Application Signals collects, this field displays which of those metrics is used.
        TotalRequestCountMetric:
          $ref: "#/components/schemas/MetricDataQueries"
          description: This structure defines the metric that is used as the "total requests" number for a request-based SLO. The number observed for this metric is divided by the number of "good requests" or "bad requests" that is observed for the metric defined in MonitoredRequestCountMetric.
        MonitoredRequestCountMetric:
          $ref: "#/components/schemas/MonitoredRequestCountMetricDataQueries"
          description: This structure defines the metric that is used as the "good request" or "bad request" value for a request-based SLO. This value observed for the metric defined in TotalRequestCountMetric is divided by the number found for MonitoredRequestCountMetric to determine the percentage of successful requests that this SLO tracks.
        DependencyConfig:
          $ref: "#/components/schemas/DependencyConfig"
          description: Identifies the dependency using the DependencyKeyAttributes and DependencyOperationName.
        MetricSource:
          $ref: "#/components/schemas/MetricSource"
          description: Identifies the metric source for SLOs on resources other than Application Signals services.
        CompositeSliConfig:
          $ref: "#/components/schemas/CompositeSliConfig"
          description: The composite SLI configuration for service-level SLOs that monitor multiple operations of a service.
      required:
        - TotalRequestCountMetric
        - MonitoredRequestCountMetric
    MonitoredRequestCountMetricDataQueries:
      description: This structure defines the metric that is used as the "good request" or "bad request" value for a request-based SLO. This value observed for the metric defined in TotalRequestCountMetric is divided by the number found for MonitoredRequestCountMetric to determine the percentage of successful requests that this SLO tracks.
      type: object
      properties:
        GoodCountMetric:
          $ref: "#/components/schemas/MetricDataQueries"
          description: If you want to count "good requests" to determine the percentage of successful requests for this request-based SLO, specify the metric to use as "good requests" in this structure.
        BadCountMetric:
          $ref: "#/components/schemas/MetricDataQueries"
          description: If you want to count "bad requests" to determine the percentage of successful requests for this request-based SLO, specify the metric to use as "bad requests" in this structure.
    Goal:
      description: This structure contains the attributes that determine the goal of an SLO. This includes the time period for evaluation and the attainment threshold.
      type: object
      properties:
        Interval:
          $ref: "#/components/schemas/Interval"
          description: The time period used to evaluate the SLO. It can be either a calendar interval or rolling interval. If you omit this parameter, a rolling interval of 7 days is used.
        AttainmentGoal:
          $ref: "#/components/schemas/AttainmentGoal"
          description: The threshold that determines if the goal is being met. If this is a period-based SLO, the attainment goal is the percentage of good periods that meet the threshold requirements to the total periods within the interval. For example, an attainment goal of 99.9% means that within your interval, you are targeting 99.9% of the periods to be in healthy state. If this is a request-based SLO, the attainment goal is the percentage of requests that must be successful to meet the attainment goal. If you omit this parameter, 99 is used to represent 99% as the attainment goal.
        WarningThreshold:
          $ref: "#/components/schemas/WarningThreshold"
          description: The percentage of remaining budget over total budget that you want to get warnings for. If you omit this parameter, the default of 50.0 is used.
    Interval:
      description: The time period used to evaluate the SLO. It can be either a calendar interval or rolling interval.
      type: object
      properties:
        RollingInterval:
          $ref: "#/components/schemas/RollingInterval"
          description: If the interval is a rolling interval, this structure contains the interval specifications.
        CalendarInterval:
          $ref: "#/components/schemas/CalendarInterval"
          description: If the interval is a calendar interval, this structure contains the interval specifications.
    RollingInterval:
      description: If the interval for this SLO is a rolling interval, this structure contains the interval specifications.
      type: object
      properties:
        DurationUnit:
          $ref: "#/components/schemas/DurationUnit"
          description: Specifies the rolling interval unit.
        Duration:
          $ref: "#/components/schemas/RollingIntervalDuration"
          description: Specifies the duration of each rolling interval. For example, if Duration is 7 and DurationUnit is DAY, each rolling interval is seven days.
      required:
        - DurationUnit
        - Duration
    DurationUnit:
      type: string
      enum:
        - MINUTE
        - HOUR
        - DAY
        - MONTH
    RollingIntervalDuration:
      type: integer
      minimum: 1
    CalendarInterval:
      description: If the interval for this service level objective is a calendar interval, this structure contains the interval specifications.
      type: object
      properties:
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: "The date and time when you want the first interval to start. Be sure to choose a time that configures the intervals the way that you want. For example, if you want weekly intervals starting on Mondays at 6 a.m., be sure to specify a start time that is a Monday at 6 a.m. When used in a raw HTTP Query API, it is formatted as be epoch time in seconds. For example: 1698778057 As soon as one calendar interval ends, another automatically begins."
        DurationUnit:
          $ref: "#/components/schemas/DurationUnit"
          description: Specifies the calendar interval unit.
        Duration:
          $ref: "#/components/schemas/CalendarIntervalDuration"
          description: Specifies the duration of each calendar interval. For example, if Duration is 1 and DurationUnit is MONTH, each interval is one month, aligned with the calendar.
      required:
        - StartTime
        - DurationUnit
        - Duration
    CalendarIntervalDuration:
      type: integer
      minimum: 1
    AttainmentGoal:
      type: number
      format: double
    WarningThreshold:
      type: number
      format: double
