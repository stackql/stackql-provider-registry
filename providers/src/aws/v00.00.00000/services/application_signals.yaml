          $ref: "#/components/schemas/ServiceLevelObjective"
          description: A structure that contains information about the SLO that you just created.
      required:
        - Slo
    ServiceLevelObjective:
      description: A structure containing information about one service level objective (SLO) that has been created in Application Signals. Creating SLOs can help you ensure your services are performing to the level that you expect. SLOs help you set and track a specific target level for the reliability and availability of your applications and services. Each SLO uses a service level indicator (SLI), which is a key performance metric, to calculate how much underperformance can be tolerated before the goal that you set for the SLO is not achieved.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ServiceLevelObjectiveArn"
          description: The ARN of this SLO.
        Name:
          $ref: "#/components/schemas/ServiceLevelObjectiveName"
          description: The name of this SLO.
        Description:
          $ref: "#/components/schemas/ServiceLevelObjectiveDescription"
          description: The description that you created for this SLO.
        CreatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that this SLO was created. When used in a raw HTTP Query API, it is formatted as yyyy-MM-dd'T'HH:mm:ss. For example, 2019-07-01T23:59:59.
        LastUpdatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that this SLO was most recently updated. When used in a raw HTTP Query API, it is formatted as yyyy-MM-dd'T'HH:mm:ss. For example, 2019-07-01T23:59:59.
        Sli:
          $ref: "#/components/schemas/ServiceLevelIndicator"
          description: A structure containing information about the performance metric that this SLO monitors, if this is a period-based SLO.
        RequestBasedSli:
          $ref: "#/components/schemas/RequestBasedServiceLevelIndicator"
          description: A structure containing information about the performance metric that this SLO monitors, if this is a request-based SLO.
        EvaluationType:
          $ref: "#/components/schemas/EvaluationType"
          description: Displays whether this is a period-based SLO or a request-based SLO.
        Goal:
          $ref: "#/components/schemas/Goal"
        BurnRateConfigurations:
          $ref: "#/components/schemas/BurnRateConfigurations"
          description: Each object in this array defines the length of the look-back window used to calculate one burn rate metric for this SLO. The burn rate measures how fast the service is consuming the error budget, relative to the attainment goal of the SLO.
        MetricSourceType:
          $ref: "#/components/schemas/MetricSourceType"
          description: "Displays the SLI metric source type for this SLO. Supported types are: Service operation Service dependency Service CloudWatch metric AppMonitor Canary"
        AutoInvestigationEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether DevOps Agent will automatically investigate this SLO when it is breached
      required:
        - Arn
        - Name
        - CreatedTime
        - LastUpdatedTime
        - Goal
    MetricSourceType:
      type: string
      enum:
        - ServiceOperation
        - CloudWatchMetric
        - ServiceDependency
        - AppMonitor
        - Canary
        - Service
