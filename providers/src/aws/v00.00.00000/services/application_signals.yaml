    ServiceLevelIndicatorConfig:
      description: This structure specifies the information about the service and the performance metric that a period-based SLO is to monitor.
      type: object
      properties:
        SliMetricConfig:
          $ref: "#/components/schemas/ServiceLevelIndicatorMetricConfig"
          description: Use this structure to specify the metric to be used for the SLO.
        MetricThreshold:
          $ref: "#/components/schemas/ServiceLevelIndicatorMetricThreshold"
          description: This parameter is used only when a request-based SLO tracks the Latency metric. Specify the threshold value that the observed Latency metric values are to be compared to. This is not required if CreateRecommendedSlo is set to true.
        ComparisonOperator:
          $ref: "#/components/schemas/ServiceLevelIndicatorComparisonOperator"
          description: The arithmetic operation to use when comparing the specified metric to the threshold. This is not required if CreateRecommendedSlo is set to true.
      required:
        - SliMetricConfig
    ServiceLevelIndicatorMetricConfig:
      description: Use this structure to specify the information for the metric that a period-based SLO will monitor.
      type: object
      properties:
        KeyAttributes:
          type: object
          properties: {}
          description: If this SLO is related to a metric collected by Application Signals, you must use this field to specify which service the SLO metric is related to. To do so, you must specify at least the Type, Name, and Environment attributes. This is a string-to-string map. It can include the following fields. Type designates the type of object this is. ResourceType specifies the type of the resource. This field is used only when the value of the Type field is Resource or AWS::Resource. Name specifies the name of the object. This is used only if the value of the Type field is Service, RemoteService, or AWS::Service. Identifier identifies the resource objects of this resource. This is used only if the value of the Type field is Resource or AWS::Resource. Environment specifies the location where this object is hosted, or what it belongs to.
        OperationName:
          $ref: "#/components/schemas/OperationName"
          description: If the SLO is to monitor a specific operation of the service, use this field to specify the name of that operation.
        MetricType:
          $ref: "#/components/schemas/ServiceLevelIndicatorMetricType"
          description: If the SLO is to monitor either the LATENCY or AVAILABILITY metric that Application Signals collects, use this field to specify which of those metrics is used.
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the CloudWatch metric to use for the SLO, when using a custom metric rather than Application Signals standard metrics.
        Statistic:
          $ref: "#/components/schemas/ServiceLevelIndicatorStatistic"
          description: The statistic to use for comparison to the threshold. It can be any CloudWatch statistic or extended statistic. For more information about statistics, see CloudWatch statistics definitions.
        PeriodSeconds:
          $ref: "#/components/schemas/SLIPeriodSeconds"
          description: The number of seconds to use as the period for SLO evaluation. Your application's performance is compared to the SLI during each period. For each period, the application is determined to have either achieved or not achieved the necessary performance.
        MetricSource:
          $ref: "#/components/schemas/MetricSource"
          description: Identifies the metric source for SLOs on resources other than Application Signals services.
        MetricDataQueries:
          $ref: "#/components/schemas/MetricDataQueries"
          description: If this SLO monitors a CloudWatch metric or the result of a CloudWatch metric math expression, use this structure to specify that metric or expression.
        DependencyConfig:
          $ref: "#/components/schemas/DependencyConfig"
          description: Identifies the dependency using the DependencyKeyAttributes and DependencyOperationName.
        CompositeSliConfig:
          $ref: "#/components/schemas/CompositeSliConfig"
          description: The composite SLI configuration for service-level SLOs that monitor multiple operations of a service.
    ServiceLevelIndicatorStatistic:
      type: string
      minLength: 1
      maxLength: 20
      pattern: "[a-zA-Z0-9.]+"
    SLIPeriodSeconds:
      type: integer
      minimum: 60
      maximum: 900
    RequestBasedServiceLevelIndicatorConfig:
      description: This structure specifies the information about the service and the performance metric that a request-based SLO is to monitor.
      type: object
      properties:
        RequestBasedSliMetricConfig:
          $ref: "#/components/schemas/RequestBasedServiceLevelIndicatorMetricConfig"
          description: Use this structure to specify the metric to be used for the SLO.
        MetricThreshold:
          $ref: "#/components/schemas/ServiceLevelIndicatorMetricThreshold"
          description: The value that the SLI metric is compared to. This parameter is required if this SLO is tracking the Latency metric.
        ComparisonOperator:
          $ref: "#/components/schemas/ServiceLevelIndicatorComparisonOperator"
          description: The arithmetic operation to use when comparing the specified metric to the threshold. This parameter is required if this SLO is tracking the Latency metric.
      required:
        - RequestBasedSliMetricConfig
    RequestBasedServiceLevelIndicatorMetricConfig:
      description: Use this structure to specify the information for the metric that a period-based SLO will monitor.
      type: object
      properties:
        KeyAttributes:
          type: object
          properties: {}
          description: If this SLO is related to a metric collected by Application Signals, you must use this field to specify which service the SLO metric is related to. To do so, you must specify at least the Type, Name, and Environment attributes. This is a string-to-string map. It can include the following fields. Type designates the type of object this is. ResourceType specifies the type of the resource. This field is used only when the value of the Type field is Resource or AWS::Resource. Name specifies the name of the object. This is used only if the value of the Type field is Service, RemoteService, or AWS::Service. Identifier identifies the resource objects of this resource. This is used only if the value of the Type field is Resource or AWS::Resource. Environment specifies the location where this object is hosted, or what it belongs to.
        OperationName:
          $ref: "#/components/schemas/OperationName"
          description: If the SLO is to monitor a specific operation of the service, use this field to specify the name of that operation.
        MetricType:
          $ref: "#/components/schemas/ServiceLevelIndicatorMetricType"
          description: If the SLO is to monitor either the LATENCY or AVAILABILITY metric that Application Signals collects, use this field to specify which of those metrics is used.
        TotalRequestCountMetric:
          $ref: "#/components/schemas/MetricDataQueries"
          description: Use this structure to define the metric that you want to use as the "total requests" number for a request-based SLO. This result will be divided by the "good request" or "bad request" value defined in MonitoredRequestCountMetric.
        MonitoredRequestCountMetric:
          $ref: "#/components/schemas/MonitoredRequestCountMetricDataQueries"
          description: Use this structure to define the metric that you want to use as the "good request" or "bad request" value for a request-based SLO. This value observed for the metric defined in TotalRequestCountMetric will be divided by the number found for MonitoredRequestCountMetric to determine the percentage of successful requests that this SLO tracks.
        DependencyConfig:
          $ref: "#/components/schemas/DependencyConfig"
          description: Identifies the dependency using the DependencyKeyAttributes and DependencyOperationName.
        MetricSource:
          $ref: "#/components/schemas/MetricSource"
          description: Identifies the metric source for SLOs on resources other than Application Signals services.
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the metric for SLOs on resources other than Application Signals services.
        CompositeSliConfig:
          $ref: "#/components/schemas/CompositeSliConfig"
          description: The composite SLI configuration for service-level SLOs that monitor multiple operations of a service.
    TagList:
