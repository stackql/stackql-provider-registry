    BurnRateConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/BurnRateConfiguration"
    BurnRateConfiguration:
      description: "This object defines the length of the look-back window used to calculate one burn rate metric for this SLO. The burn rate measures how fast the service is consuming the error budget, relative to the attainment goal of the SLO. A burn rate of exactly 1 indicates that the SLO goal will be met exactly. For example, if you specify 60 as the number of minutes in the look-back window, the burn rate is calculated as the following: burn rate = error rate over the look-back window / (100% - attainment goal percentage) For more information about burn rates, see Calculate burn rates."
      type: object
      properties:
        LookBackWindowMinutes:
          $ref: "#/components/schemas/BurnRateLookBackWindowMinutes"
          description: The number of minutes to use as the look-back window.
      required:
        - LookBackWindowMinutes
    BurnRateLookBackWindowMinutes:
      type: integer
      minimum: 1
      maximum: 10080
