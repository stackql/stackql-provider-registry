  /CreateNotebookInstance:
    post:
      operationId: CreateNotebookInstance
      description: "Creates an SageMaker AI notebook instance. A notebook instance is a machine learning (ML) compute instance running on a Jupyter notebook. In a CreateNotebookInstance request, specify the type of ML compute instance that you want to run. SageMaker AI launches the instance, installs common libraries that you can use to explore datasets for model training, and attaches an ML storage volume to the notebook instance. SageMaker AI also provides a set of example notebooks. Each notebook demonstrates how to use SageMaker AI with a specific algorithm or with a machine learning framework. After receiving the request, SageMaker AI does the following: Creates a network interface in the SageMaker AI VPC. (Option) If you specified SubnetId, SageMaker AI creates a network interface in your own VPC, which is inferred from the subnet ID that you provide in the input. When creating this network interface, SageMaker AI attaches the security group that you specified in the request to the network interface that it creates in your VPC. Launches an EC2 instance of the type specified in the request in the SageMaker AI VPC. If you specified SubnetId of your VPC, SageMaker AI specifies both network interfaces when launching this instance. This enables inbound traffic from your own VPC to the notebook instance, assuming that the security groups allow it. After creating the notebook instance, SageMaker AI returns its Amazon Resource Name (ARN). You can't change the name of a notebook instance after you create it. After SageMaker AI creates the notebook instance, you can connect to the Jupyter server and work in Jupyter notebooks. For example, you can write code to explore a dataset that you can use for model training, train a model, host models by creating SageMaker AI endpoints, and validate hosted models. For more information, see How It Works."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateNotebookInstance
            default: SageMaker.CreateNotebookInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NotebookInstanceName:
                  $ref: "#/components/schemas/NotebookInstanceName"
                  description: The name of the new notebook instance.
                InstanceType:
                  $ref: "#/components/schemas/InstanceType"
                  description: The type of ML compute instance to launch for the notebook instance.
                SubnetId:
                  $ref: "#/components/schemas/SubnetId"
                  description: The ID of the subnet in a VPC to which you would like to have a connectivity from your ML compute instance.
                SecurityGroupIds:
                  $ref: "#/components/schemas/SecurityGroupIds"
                  description: The VPC security group IDs, in the form sg-xxxxxxxx. The security groups must be for the same VPC as specified in the subnet.
                IpAddressType:
                  $ref: "#/components/schemas/IPAddressType"
                  description: The IP address type for the notebook instance. Specify ipv4 for IPv4-only connectivity or dualstack for both IPv4 and IPv6 connectivity. When you specify dualstack, the subnet must support IPv6 CIDR blocks. If not specified, defaults to ipv4.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: When you send any requests to Amazon Web Services resources from the notebook instance, SageMaker AI assumes this role to perform tasks on your behalf. You must grant this role necessary permissions so SageMaker AI can perform these tasks. The policy must allow the SageMaker AI service principal (sagemaker.amazonaws.com) permissions to assume this role. For more information, see SageMaker AI Roles. To be able to pass this role to SageMaker AI, the caller of this API must have the iam:PassRole permission.
                KmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                  description: The Amazon Resource Name (ARN) of a Amazon Web Services Key Management Service key that SageMaker AI uses to encrypt data on the storage volume attached to your notebook instance. The KMS key you provide must be enabled. For information, see Enabling and Disabling Keys in the Amazon Web Services Key Management Service Developer Guide.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key-value pairs. You can use tags to categorize your Amazon Web Services resources in different ways, for example, by purpose, owner, or environment. For more information, see Tagging Amazon Web Services Resources.
                LifecycleConfigName:
                  $ref: "#/components/schemas/NotebookInstanceLifecycleConfigName"
                  description: "The name of a lifecycle configuration to associate with the notebook instance. For information about lifestyle configurations, see Step 2.1: (Optional) Customize a Notebook Instance."
                DirectInternetAccess:
                  $ref: "#/components/schemas/DirectInternetAccess"
                  description: Sets whether SageMaker AI provides internet access to the notebook instance. If you set this to Disabled this notebook instance is able to access resources only in your VPC, and is not be able to connect to SageMaker AI training and endpoint services unless you configure a NAT Gateway in your VPC. For more information, see Notebook Instances Are Internet-Enabled by Default. You can set the value of this parameter to Disabled only if you set a value for the SubnetId parameter.
                VolumeSizeInGB:
                  $ref: "#/components/schemas/NotebookInstanceVolumeSizeInGB"
                  description: The size, in GB, of the ML storage volume to attach to the notebook instance. The default value is 5 GB.
                AcceleratorTypes:
                  $ref: "#/components/schemas/NotebookInstanceAcceleratorTypes"
                  description: This parameter is no longer supported. Elastic Inference (EI) is no longer available. This parameter was used to specify a list of EI instance types to associate with this notebook instance.
                DefaultCodeRepository:
                  $ref: "#/components/schemas/CodeRepositoryNameOrUrl"
                  description: A Git repository to associate with the notebook instance as its default code repository. This can be either the name of a Git repository stored as a resource in your account, or the URL of a Git repository in Amazon Web Services CodeCommit or in any other Git repository. When you open a notebook instance, it opens in the directory that contains this repository. For more information, see Associating Git Repositories with SageMaker AI Notebook Instances.
                AdditionalCodeRepositories:
                  $ref: "#/components/schemas/AdditionalCodeRepositoryNamesOrUrls"
                  description: An array of up to three Git repositories to associate with the notebook instance. These can be either the names of Git repositories stored as resources in your account, or the URL of Git repositories in Amazon Web Services CodeCommit or in any other Git repository. These repositories are cloned at the same level as the default repository of your notebook instance. For more information, see Associating Git Repositories with SageMaker AI Notebook Instances.
                RootAccess:
                  $ref: "#/components/schemas/RootAccess"
                  description: Whether root access is enabled or disabled for users of the notebook instance. The default value is Enabled. Lifecycle configurations need root access to be able to set up a notebook instance. Because of this, lifecycle configurations associated with a notebook instance always run with root access even if you disable root access for users.
                PlatformIdentifier:
                  $ref: "#/components/schemas/PlatformIdentifier"
                  description: The platform identifier of the notebook instance runtime environment. The default value is notebook-al2-v2.
                InstanceMetadataServiceConfiguration:
                  $ref: "#/components/schemas/InstanceMetadataServiceConfiguration"
                  description: Information on the IMDS configuration of the notebook instance
              required:
                - NotebookInstanceName
                - InstanceType
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNotebookInstanceOutput"
  /CreateNotebookInstanceLifecycleConfig:
    post:
      operationId: CreateNotebookInstanceLifecycleConfig
      description: "Creates a lifecycle configuration that you can associate with a notebook instance. A lifecycle configuration is a collection of shell scripts that run when you create or start a notebook instance. Each lifecycle configuration script has a limit of 16384 characters. The value of the $PATH environment variable that is available to both scripts is /sbin:bin:/usr/sbin:/usr/bin. View Amazon CloudWatch Logs for notebook instance lifecycle configurations in log group /aws/sagemaker/NotebookInstances in log stream [notebook-instance-name]/[LifecycleConfigHook]. Lifecycle configuration scripts cannot run for longer than 5 minutes. If a script runs for longer than 5 minutes, it fails and the notebook instance is not created or started. For information about notebook instance lifestyle configurations, see Step 2.1: (Optional) Customize a Notebook Instance. Lifecycle configuration scripts execute with root access and the notebook instance's IAM execution role privileges. Grant this permission only to trusted principals. See Customize a Notebook Instance Using a Lifecycle Configuration Script for security best practices."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateNotebookInstanceLifecycleConfig
            default: SageMaker.CreateNotebookInstanceLifecycleConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NotebookInstanceLifecycleConfigName:
                  $ref: "#/components/schemas/NotebookInstanceLifecycleConfigName"
                  description: The name of the lifecycle configuration.
                OnCreate:
                  $ref: "#/components/schemas/NotebookInstanceLifecycleConfigList"
                  description: A shell script that runs only once, when you create a notebook instance. The shell script must be a base64-encoded string.
                OnStart:
                  $ref: "#/components/schemas/NotebookInstanceLifecycleConfigList"
                  description: A shell script that runs every time you start a notebook instance, including when you create the notebook instance. The shell script must be a base64-encoded string.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key-value pairs. You can use tags to categorize your Amazon Web Services resources in different ways, for example, by purpose, owner, or environment. For more information, see Tagging Amazon Web Services Resources.
              required:
                - NotebookInstanceLifecycleConfigName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNotebookInstanceLifecycleConfigOutput"
  /CreateOptimizationJob:
    post:
      operationId: CreateOptimizationJob
      description: Creates a job that optimizes a model for inference performance. To create the job, you provide the location of a source model, and you provide the settings for the optimization techniques that you want the job to apply. When the job completes successfully, SageMaker uploads the new optimized model to the output destination that you specify. For more information about how to use this action, and about the supported optimization techniques, see Optimize model inference with Amazon SageMaker.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateOptimizationJob
            default: SageMaker.CreateOptimizationJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                OptimizationJobName:
                  $ref: "#/components/schemas/EntityName"
                  description: A custom name for the new optimization job.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: "The Amazon Resource Name (ARN) of an IAM role that enables Amazon SageMaker AI to perform tasks on your behalf. During model optimization, Amazon SageMaker AI needs your permission to: Read input data from an S3 bucket Write model artifacts to an S3 bucket Write logs to Amazon CloudWatch Logs Publish metrics to Amazon CloudWatch You grant permissions for all of these tasks to an IAM role. To pass this role to Amazon SageMaker AI, the caller of this API must have the iam:PassRole permission. For more information, see Amazon SageMaker AI Roles."
                ModelSource:
                  $ref: "#/components/schemas/OptimizationJobModelSource"
                  description: The location of the source model to optimize with an optimization job.
                DeploymentInstanceType:
                  $ref: "#/components/schemas/OptimizationJobDeploymentInstanceType"
                  description: The type of instance that hosts the optimized model that you create with the optimization job.
                MaxInstanceCount:
                  $ref: "#/components/schemas/OptimizationJobMaxInstanceCount"
                  description: The maximum number of instances to use for the optimization job.
                OptimizationEnvironment:
                  $ref: "#/components/schemas/OptimizationJobEnvironmentVariables"
                  description: The environment variables to set in the model container.
                OptimizationConfigs:
                  $ref: "#/components/schemas/OptimizationConfigs"
                  description: Settings for each of the optimization techniques that the job applies.
                OutputConfig:
                  $ref: "#/components/schemas/OptimizationJobOutputConfig"
                  description: Details for where to store the optimized model that you create with the optimization job.
                StoppingCondition:
                  $ref: "#/components/schemas/StoppingCondition"
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of key-value pairs associated with the optimization job. For more information, see Tagging Amazon Web Services resources in the Amazon Web Services General Reference Guide.
                VpcConfig:
                  $ref: "#/components/schemas/OptimizationVpcConfig"
                  description: A VPC in Amazon VPC that your optimized model has access to.
              required:
                - OptimizationJobName
                - RoleArn
                - ModelSource
                - DeploymentInstanceType
                - OptimizationConfigs
                - OutputConfig
                - StoppingCondition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOptimizationJobResponse"
  /CreatePartnerApp:
    post:
      operationId: CreatePartnerApp
      description: Creates an Amazon SageMaker Partner AI App.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
