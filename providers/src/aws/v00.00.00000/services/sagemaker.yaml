        DurationMinutes:
          $ref: "#/components/schemas/TrainingPlanDurationMinutes"
          description: The additional minutes beyond whole hours in the total duration for this training plan.
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of the training plan.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end time of the training plan.
        UpfrontFee:
          $ref: "#/components/schemas/String256"
