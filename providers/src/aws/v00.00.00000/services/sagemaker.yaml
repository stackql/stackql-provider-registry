  /CreateHubContentPresignedUrls:
    post:
      operationId: CreateHubContentPresignedUrls
      description: Creates presigned URLs for accessing hub content artifacts. This operation generates time-limited, secure URLs that allow direct download of model artifacts and associated files from Amazon SageMaker hub content, including gated models that require end-user license agreement acceptance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateHubContentPresignedUrls
            default: SageMaker.CreateHubContentPresignedUrls
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                HubName:
                  $ref: "#/components/schemas/HubNameOrArn"
                  description: The name or Amazon Resource Name (ARN) of the hub that contains the content. For public content, use SageMakerPublicHub.
                HubContentType:
                  $ref: "#/components/schemas/HubContentType"
                  description: The type of hub content to access. Valid values include Model, Notebook, and ModelReference.
                HubContentName:
                  $ref: "#/components/schemas/HubContentName"
                  description: The name of the hub content for which to generate presigned URLs. This identifies the specific model or content within the hub.
                HubContentVersion:
                  $ref: "#/components/schemas/HubContentVersion"
                  description: The version of the hub content. If not specified, the latest version is used.
                AccessConfig:
                  $ref: "#/components/schemas/PresignedUrlAccessConfig"
                  description: Configuration settings for accessing the hub content, including end-user license agreement acceptance for gated models and expected S3 URL validation.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of presigned URLs to return in the response. Default value is 100. Large models may contain hundreds of files, requiring pagination to retrieve all URLs.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token for pagination. Use this token to retrieve the next set of presigned URLs when the response is truncated.
              required:
                - HubName
                - HubContentType
                - HubContentName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateHubContentPresignedUrlsResponse"
