        JupyterLabAppImageConfig:
          $ref: "#/components/schemas/JupyterLabAppImageConfig"
          description: The configuration of the JupyterLab app.
        CodeEditorAppImageConfig:
          $ref: "#/components/schemas/CodeEditorAppImageConfig"
          description: The configuration of the Code Editor app.
    DescribeArtifactResponse:
      type: object
      properties:
        ArtifactName:
          $ref: "#/components/schemas/ExperimentEntityNameOrArn"
