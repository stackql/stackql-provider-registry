                  $ref: "#/components/schemas/Subnets"
                  description: The VPC subnets that Studio uses for communication. If removing subnets, ensure there are no apps in the InService, Pending, or Deleting state.
                AppNetworkAccessType:
                  $ref: "#/components/schemas/AppNetworkAccessType"
                  description: Specifies the VPC used for non-EFS traffic. PublicInternetOnly - Non-EFS traffic is through a VPC managed by Amazon SageMaker AI, which allows direct internet access. VpcOnly - All Studio traffic is through the specified VPC and subnets. This configuration can only be modified if there are no apps in the InService, Pending, or Deleting state. The configuration cannot be updated if DomainSettings.RStudioServerProDomainSettings.DomainExecutionRoleArn is already set or DomainSettings.RStudioServerProDomainSettings.DomainExecutionRoleArn is provided as part of the same request.
                TagPropagation:
                  $ref: "#/components/schemas/TagPropagation"
                  description: Indicates whether custom tag propagation is supported for the domain. Defaults to DISABLED.
                VpcId:
                  $ref: "#/components/schemas/VpcId"
                  description: The identifier for the VPC used by the domain for network communication. Use this field only when adding VPC configuration to a SageMaker AI domain used in Amazon SageMaker Unified Studio that was created without VPC settings. SageMaker AI doesn't automatically apply VPC updates to existing applications. Stop and restart your applications to apply the changes.
