          description: The version of the pipeline.
        FeatureGroup:
          $ref: "#/components/schemas/FeatureGroup"
        FeatureMetadata:
          $ref: "#/components/schemas/FeatureMetadata"
          description: The feature metadata used to search through the features.
        Project:
          $ref: "#/components/schemas/Project"
          description: The properties of a project.
        HyperParameterTuningJob:
          $ref: "#/components/schemas/HyperParameterTuningJobSearchEntity"
          description: The properties of a hyperparameter tuning job.
        ModelCard:
          $ref: "#/components/schemas/ModelCard"
          description: An Amazon SageMaker Model Card that documents details about a machine learning model.
        Model:
          $ref: "#/components/schemas/ModelDashboardModel"
    TrainingJob:
      description: Contains information about a training job.
      type: object
      properties:
        TrainingJobName:
          $ref: "#/components/schemas/TrainingJobName"
          description: The name of the training job.
        TrainingJobArn:
          $ref: "#/components/schemas/TrainingJobArn"
          description: The Amazon Resource Name (ARN) of the training job.
        TuningJobArn:
          $ref: "#/components/schemas/HyperParameterTuningJobArn"
          description: The Amazon Resource Name (ARN) of the associated hyperparameter tuning job if the training job was launched by a hyperparameter tuning job.
        LabelingJobArn:
          $ref: "#/components/schemas/LabelingJobArn"
          description: The Amazon Resource Name (ARN) of the labeling job.
        AutoMLJobArn:
          $ref: "#/components/schemas/AutoMLJobArn"
          description: The Amazon Resource Name (ARN) of the job.
        ModelArtifacts:
          $ref: "#/components/schemas/ModelArtifacts"
          description: Information about the Amazon S3 location that is configured for storing model artifacts.
        TrainingJobStatus:
          $ref: "#/components/schemas/TrainingJobStatus"
          description: "The status of the training job. Training job statuses are: InProgress - The training is in progress. Completed - The training job has completed. Failed - The training job has failed. To see the reason for the failure, see the FailureReason field in the response to a DescribeTrainingJobResponse call. Stopping - The training job is stopping. Stopped - The training job has stopped. For more detailed information, see SecondaryStatus."
        SecondaryStatus:
          $ref: "#/components/schemas/SecondaryStatus"
          description: "Provides detailed information about the state of the training job. For detailed information about the secondary status of the training job, see StatusMessage under SecondaryStatusTransition. SageMaker provides primary statuses and secondary statuses that apply to each of them: InProgress Starting - Starting the training job. Downloading - An optional stage for algorithms that support File training input mode. It indicates that data is being downloaded to the ML storage volumes. Training - Training is in progress. Uploading - Training is complete and the model artifacts are being uploaded to the S3 location. Completed Completed - The training job has completed. Failed Failed - The training job has failed. The reason for the failure is returned in the FailureReason field of DescribeTrainingJobResponse. Stopped MaxRuntimeExceeded - The job stopped because it exceeded the maximum allowed runtime. Stopped - The training job has stopped. Stopping Stopping - Stopping the training job. Valid values for SecondaryStatus are subject to change. We no longer support the following secondary statuses: LaunchingMLInstances PreparingTrainingStack DownloadingTrainingImage"
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: If the training job failed, the reason it failed.
        HyperParameters:
          type: object
          properties: {}
          description: Algorithm-specific parameters.
        AlgorithmSpecification:
          $ref: "#/components/schemas/AlgorithmSpecification"
          description: Information about the algorithm used for training, and algorithm metadata.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Web Services Identity and Access Management (IAM) role configured for the training job.
        InputDataConfig:
          $ref: "#/components/schemas/InputDataConfig"
          description: An array of Channel objects that describes each data input channel. Your input must be in the same Amazon Web Services region as your training job.
        OutputDataConfig:
          $ref: "#/components/schemas/OutputDataConfig"
          description: The S3 path where model artifacts that you configured when creating the job are stored. SageMaker creates subfolders for model artifacts.
        ResourceConfig:
          $ref: "#/components/schemas/ResourceConfig"
          description: Resources, including ML compute instances and ML storage volumes, that are configured for model training.
        WarmPoolStatus:
          $ref: "#/components/schemas/WarmPoolStatus"
          description: The status of the warm pool associated with the training job.
        VpcConfig:
          $ref: "#/components/schemas/VpcConfig"
          description: A VpcConfig object that specifies the VPC that this training job has access to. For more information, see Protect Training Jobs by Using an Amazon Virtual Private Cloud.
        StoppingCondition:
          $ref: "#/components/schemas/StoppingCondition"
          description: Specifies a limit to how long a model training job can run. It also specifies how long a managed Spot training job has to complete. When the job reaches the time limit, SageMaker ends the training job. Use this API to cap model training costs. To stop a job, SageMaker sends the algorithm the SIGTERM signal, which delays job termination for 120 seconds. Algorithms can use this 120-second window to save the model artifacts, so the results of training are not lost.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that indicates when the training job was created.
        TrainingStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the time when the training job starts on training instances. You are billed for the time interval between this time and the value of TrainingEndTime. The start time in CloudWatch Logs might be later than this time. The difference is due to the time it takes to download the training data and to the size of the training container.
        TrainingEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the time when the training job ends on training instances. You are billed for the time interval between the value of TrainingStartTime and this time. For successful jobs and stopped jobs, this is the time after model artifacts are uploaded. For failed jobs, this is the time when SageMaker detects a job failure.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that indicates when the status of the training job was last modified.
        SecondaryStatusTransitions:
          $ref: "#/components/schemas/SecondaryStatusTransitions"
          description: A history of all of the secondary statuses that the training job has transitioned through.
        FinalMetricDataList:
          $ref: "#/components/schemas/FinalMetricDataList"
          description: A list of final metric values that are set when the training job completes. Used only if the training job was configured to use metrics.
        EnableNetworkIsolation:
          $ref: "#/components/schemas/Boolean"
          description: If the TrainingJob was created with network isolation, the value is set to true. If network isolation is enabled, nodes can't communicate beyond the VPC they run in.
        EnableInterContainerTrafficEncryption:
          $ref: "#/components/schemas/Boolean"
          description: To encrypt all communications between ML compute instances in distributed training, choose True. Encryption provides greater security for distributed training, but training might take longer. How long it takes depends on the amount of communication between compute instances, especially if you use a deep learning algorithm in distributed training.
        EnableManagedSpotTraining:
          $ref: "#/components/schemas/Boolean"
          description: When true, enables managed spot training using Amazon EC2 Spot instances to run training jobs instead of on-demand instances. For more information, see Managed Spot Training.
        CheckpointConfig:
          $ref: "#/components/schemas/CheckpointConfig"
        TrainingTimeInSeconds:
          $ref: "#/components/schemas/TrainingTimeInSeconds"
          description: The training time in seconds.
        BillableTimeInSeconds:
          $ref: "#/components/schemas/BillableTimeInSeconds"
          description: The billable time in seconds.
        DebugHookConfig:
          $ref: "#/components/schemas/DebugHookConfig"
        ExperimentConfig:
          $ref: "#/components/schemas/ExperimentConfig"
        DebugRuleConfigurations:
          $ref: "#/components/schemas/DebugRuleConfigurations"
          description: Information about the debug rule configuration.
        TensorBoardOutputConfig:
          $ref: "#/components/schemas/TensorBoardOutputConfig"
        DebugRuleEvaluationStatuses:
          $ref: "#/components/schemas/DebugRuleEvaluationStatuses"
          description: Information about the evaluation status of the rules for the training job.
        OutputModelPackageArn:
          $ref: "#/components/schemas/ModelPackageArn"
          description: The output model package Amazon Resource Name (ARN) that contains model weights or checkpoint.
        ModelPackageConfig:
          $ref: "#/components/schemas/ModelPackageConfig"
          description: The model package configuration.
        ProfilerConfig:
          $ref: "#/components/schemas/ProfilerConfig"
        Environment:
          type: object
          properties: {}
          description: The environment variables to set in the Docker container.
        RetryStrategy:
          $ref: "#/components/schemas/RetryStrategy"
          description: The number of times to retry the job when the job fails due to an InternalServerError.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: An array of key-value pairs. You can use tags to categorize your Amazon Web Services resources in different ways, for example, by purpose, owner, or environment. For more information, see Tagging Amazon Web Services Resources.
    Experiment:
