  /CreateAutoMLJob:
    post:
      operationId: CreateAutoMLJob
      description: Creates an Autopilot job also referred to as Autopilot experiment or AutoML job. An AutoML job in SageMaker AI is a fully automated process that allows you to build machine learning models with minimal effort and machine learning expertise. When initiating an AutoML job, you provide your data and optionally specify parameters tailored to your use case. SageMaker AI then automates the entire model development lifecycle, including data preprocessing, model training, tuning, and evaluation. AutoML jobs are designed to simplify and accelerate the model building process by automating various tasks and exploring different combinations of machine learning algorithms, data preprocessing techniques, and hyperparameter values. The output of an AutoML job comprises one or more trained models ready for deployment and inference. Additionally, SageMaker AI AutoML jobs generate a candidate model leaderboard, allowing you to select the best-performing model for deployment. For more information about AutoML jobs, see https://docs.aws.amazon.com/sagemaker/latest/dg/autopilot-automate-model-development.html in the SageMaker AI developer guide. We recommend using the new versions CreateAutoMLJobV2 and DescribeAutoMLJobV2, which offer backward compatibility. CreateAutoMLJobV2 can manage tabular problem types identical to those of its previous version CreateAutoMLJob, as well as time-series forecasting, non-tabular problem types such as image or text classification, and text generation (LLMs fine-tuning). Find guidelines about how to migrate a CreateAutoMLJob to CreateAutoMLJobV2 in Migrate a CreateAutoMLJob to CreateAutoMLJobV2. You can find the best-performing model after you run an AutoML job by calling DescribeAutoMLJobV2 (recommended) or DescribeAutoMLJob.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateAutoMLJob
            default: SageMaker.CreateAutoMLJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AutoMLJobName:
                  $ref: "#/components/schemas/AutoMLJobName"
                  description: Identifies an Autopilot job. The name must be unique to your account and is case insensitive.
                InputDataConfig:
                  $ref: "#/components/schemas/AutoMLInputDataConfig"
                  description: "An array of channel objects that describes the input data and its location. Each channel is a named input source. Similar to InputDataConfig supported by HyperParameterTrainingJobDefinition. Format(s) supported: CSV, Parquet. A minimum of 500 rows is required for the training dataset. There is not a minimum number of rows required for the validation dataset."
                OutputDataConfig:
                  $ref: "#/components/schemas/AutoMLOutputDataConfig"
                  description: "Provides information about encryption and the Amazon S3 output path needed to store artifacts from an AutoML job. Format(s) supported: CSV."
                ProblemType:
                  $ref: "#/components/schemas/ProblemType"
                  description: Defines the type of supervised learning problem available for the candidates. For more information, see SageMaker Autopilot problem types.
                AutoMLJobObjective:
                  $ref: "#/components/schemas/AutoMLJobObjective"
                  description: Specifies a metric to minimize or maximize as the objective of a job. If not specified, the default objective metric depends on the problem type. See AutoMLJobObjective for the default values.
                AutoMLJobConfig:
                  $ref: "#/components/schemas/AutoMLJobConfig"
                  description: A collection of settings used to configure an AutoML job.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The ARN of the role that is used to access the data.
                GenerateCandidateDefinitionsOnly:
                  $ref: "#/components/schemas/GenerateCandidateDefinitionsOnly"
                  description: Generates possible candidates without training the models. A candidate is a combination of data preprocessors, algorithms, and algorithm parameter settings.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key-value pairs. You can use tags to categorize your Amazon Web Services resources in different ways, for example, by purpose, owner, or environment. For more information, see Tagging Amazon Web ServicesResources. Tag keys must be unique per resource.
                ModelDeployConfig:
                  $ref: "#/components/schemas/ModelDeployConfig"
                  description: Specifies how to generate the endpoint name for an automatic one-click Autopilot model deployment.
              required:
                - AutoMLJobName
                - InputDataConfig
                - OutputDataConfig
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAutoMLJobResponse"
  /CreateAutoMLJobV2:
    post:
      operationId: CreateAutoMLJobV2
      description: Creates an Autopilot job also referred to as Autopilot experiment or AutoML job V2. An AutoML job in SageMaker AI is a fully automated process that allows you to build machine learning models with minimal effort and machine learning expertise. When initiating an AutoML job, you provide your data and optionally specify parameters tailored to your use case. SageMaker AI then automates the entire model development lifecycle, including data preprocessing, model training, tuning, and evaluation. AutoML jobs are designed to simplify and accelerate the model building process by automating various tasks and exploring different combinations of machine learning algorithms, data preprocessing techniques, and hyperparameter values. The output of an AutoML job comprises one or more trained models ready for deployment and inference. Additionally, SageMaker AI AutoML jobs generate a candidate model leaderboard, allowing you to select the best-performing model for deployment. For more information about AutoML jobs, see https://docs.aws.amazon.com/sagemaker/latest/dg/autopilot-automate-model-development.html in the SageMaker AI developer guide. AutoML jobs V2 support various problem types such as regression, binary, and multiclass classification with tabular data, text and image classification, time-series forecasting, and fine-tuning of large language models (LLMs) for text generation. CreateAutoMLJobV2 and DescribeAutoMLJobV2 are new versions of CreateAutoMLJob and DescribeAutoMLJob which offer backward compatibility. CreateAutoMLJobV2 can manage tabular problem types identical to those of its previous version CreateAutoMLJob, as well as time-series forecasting, non-tabular problem types such as image or text classification, and text generation (LLMs fine-tuning). Find guidelines about how to migrate a CreateAutoMLJob to CreateAutoMLJobV2 in Migrate a CreateAutoMLJob to CreateAutoMLJobV2. For the list of available problem types supported by CreateAutoMLJobV2, see AutoMLProblemTypeConfig. You can find the best-performing model after you run an AutoML job V2 by calling DescribeAutoMLJobV2.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateAutoMLJobV2
            default: SageMaker.CreateAutoMLJobV2
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AutoMLJobName:
                  $ref: "#/components/schemas/AutoMLJobName"
                  description: Identifies an Autopilot job. The name must be unique to your account and is case insensitive.
                AutoMLJobInputDataConfig:
                  $ref: "#/components/schemas/AutoMLJobInputDataConfig"
                  description: "An array of channel objects describing the input data and their location. Each channel is a named input source. Similar to the InputDataConfig attribute in the CreateAutoMLJob input parameters. The supported formats depend on the problem type: For tabular problem types: S3Prefix, ManifestFile. For image classification: S3Prefix, ManifestFile, AugmentedManifestFile. For text classification: S3Prefix. For time-series forecasting: S3Prefix. For text generation (LLMs fine-tuning): S3Prefix."
                OutputDataConfig:
                  $ref: "#/components/schemas/AutoMLOutputDataConfig"
                  description: Provides information about encryption and the Amazon S3 output path needed to store artifacts from an AutoML job.
                AutoMLProblemTypeConfig:
                  $ref: "#/components/schemas/AutoMLProblemTypeConfig"
                  description: Defines the configuration settings of one of the supported problem types.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The ARN of the role that is used to access the data.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key-value pairs. You can use tags to categorize your Amazon Web Services resources in different ways, such as by purpose, owner, or environment. For more information, see Tagging Amazon Web ServicesResources. Tag keys must be unique per resource.
                SecurityConfig:
                  $ref: "#/components/schemas/AutoMLSecurityConfig"
                  description: The security configuration for traffic encryption or Amazon VPC settings.
                AutoMLJobObjective:
                  $ref: "#/components/schemas/AutoMLJobObjective"
                  description: "Specifies a metric to minimize or maximize as the objective of a job. If not specified, the default objective metric depends on the problem type. For the list of default values per problem type, see AutoMLJobObjective. For tabular problem types: You must either provide both the AutoMLJobObjective and indicate the type of supervised learning problem in AutoMLProblemTypeConfig (TabularJobConfig.ProblemType), or none at all. For text generation problem types (LLMs fine-tuning): Fine-tuning language models in Autopilot does not require setting the AutoMLJobObjective field. Autopilot fine-tunes LLMs without requiring multiple candidates to be trained and evaluated. Instead, using your dataset, Autopilot directly fine-tunes your target model to enhance a default objective metric, the cross-entropy loss. After fine-tuning a language model, you can evaluate the quality of its generated text using different metrics. For a list of the available metrics, see Metrics for fine-tuning LLMs in Autopilot."
                ModelDeployConfig:
                  $ref: "#/components/schemas/ModelDeployConfig"
                  description: Specifies how to generate the endpoint name for an automatic one-click Autopilot model deployment.
                DataSplitConfig:
                  $ref: "#/components/schemas/AutoMLDataSplitConfig"
                  description: This structure specifies how to split the data into train and validation datasets. The validation and training datasets must contain the same headers. For jobs created by calling CreateAutoMLJob, the validation dataset must be less than 2 GB in size. This attribute must not be set for the time-series forecasting problem type, as Autopilot automatically splits the input dataset into training and validation sets.
                AutoMLComputeConfig:
                  $ref: "#/components/schemas/AutoMLComputeConfig"
                  description: Specifies the compute configuration for the AutoML job V2.
              required:
                - AutoMLJobName
                - AutoMLJobInputDataConfig
                - OutputDataConfig
                - AutoMLProblemTypeConfig
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAutoMLJobV2Response"
  /CreateCluster:
    post:
      operationId: CreateCluster
      description: Creates an Amazon SageMaker HyperPod cluster. SageMaker HyperPod is a capability of SageMaker for creating and managing persistent clusters for developing large machine learning models, such as large language models (LLMs) and diffusion models. To learn more, see Amazon SageMaker HyperPod in the Amazon SageMaker Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateCluster
            default: SageMaker.CreateCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterName:
                  $ref: "#/components/schemas/ClusterName"
                  description: The name for the new SageMaker HyperPod cluster.
                InstanceGroups:
                  $ref: "#/components/schemas/ClusterInstanceGroupSpecifications"
                  description: The instance groups to be created in the SageMaker HyperPod cluster.
                RestrictedInstanceGroups:
                  $ref: "#/components/schemas/ClusterRestrictedInstanceGroupSpecifications"
                  description: The specialized instance groups for training models like Amazon Nova to be created in the SageMaker HyperPod cluster.
                VpcConfig:
                  $ref: "#/components/schemas/VpcConfig"
                  description: "Specifies the Amazon Virtual Private Cloud (VPC) that is associated with the Amazon SageMaker HyperPod cluster. You can control access to and from your resources by configuring your VPC. For more information, see Give SageMaker access to resources in your Amazon VPC. When your Amazon VPC and subnets support IPv6, network communications differ based on the cluster orchestration platform: Slurm-orchestrated clusters automatically configure nodes with dual IPv6 and IPv4 addresses, allowing immediate IPv6 network communications. In Amazon EKS-orchestrated clusters, nodes receive dual-stack addressing, but pods can only use IPv6 when the Amazon EKS cluster is explicitly IPv6-enabled. For information about deploying an IPv6 Amazon EKS cluster, see Amazon EKS IPv6 Cluster Deployment. Additional resources for IPv6 configuration: For information about adding IPv6 support to your VPC, see to IPv6 Support for VPC. For information about creating a new IPv6-compatible VPC, see Amazon VPC Creation Guide. To configure SageMaker HyperPod with a custom Amazon VPC, see Custom Amazon VPC Setup for SageMaker HyperPod."
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Custom tags for managing the SageMaker HyperPod cluster as an Amazon Web Services resource. You can add tags to your cluster in the same way you add them in other Amazon Web Services services that support tagging. To learn more about tagging Amazon Web Services resources in general, see Tagging Amazon Web Services Resources User Guide.
                Orchestrator:
                  $ref: "#/components/schemas/ClusterOrchestrator"
                  description: 'The type of orchestrator to use for the SageMaker HyperPod cluster. Currently, supported values are "Eks" and "Slurm", which is to use an Amazon Elastic Kubernetes Service or Slurm cluster as the orchestrator. If you specify the Orchestrator field, you must provide exactly one orchestrator configuration: either Eks or Slurm. Specifying both or providing an empty configuration returns a validation error.'
                NodeRecovery:
                  $ref: "#/components/schemas/ClusterNodeRecovery"
                  description: The node recovery mode for the SageMaker HyperPod cluster. When set to Automatic, SageMaker HyperPod will automatically reboot or replace faulty nodes when issues are detected. When set to None, cluster administrators will need to manually manage any faulty cluster instances.
                TieredStorageConfig:
                  $ref: "#/components/schemas/ClusterTieredStorageConfig"
                  description: The configuration for managed tier checkpointing on the HyperPod cluster. When enabled, this feature uses a multi-tier storage approach for storing model checkpoints, providing faster checkpoint operations and improved fault tolerance across cluster nodes.
                NodeProvisioningMode:
                  $ref: "#/components/schemas/ClusterNodeProvisioningMode"
                  description: "The mode for provisioning nodes in the cluster. You can specify the following modes: Continuous: Scaling behavior that enables 1) concurrent operation execution within instance groups, 2) continuous retry mechanisms for failed operations, 3) enhanced customer visibility into cluster events through detailed event streams, 4) partial provisioning capabilities. Your clusters and instance groups remain InService while scaling. This mode is only supported for EKS orchestrated clusters."
                ClusterRole:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of the IAM role that HyperPod assumes to perform cluster autoscaling operations. This role must have permissions for sagemaker:BatchAddClusterNodes and sagemaker:BatchDeleteClusterNodes. This is only required when autoscaling is enabled and when HyperPod is performing autoscaling operations.
                AutoScaling:
                  $ref: "#/components/schemas/ClusterAutoScalingConfig"
                  description: The autoscaling configuration for the cluster. Enables automatic scaling of cluster nodes based on workload demand using a Karpenter-based system.
              required:
                - ClusterName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClusterResponse"
  /CreateClusterSchedulerConfig:
    post:
      operationId: CreateClusterSchedulerConfig
      description: Create cluster policy configuration. This policy is used for task prioritization and fair-share allocation of idle compute. This helps prioritize critical workloads and distributes idle compute across entities.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateClusterSchedulerConfig
            default: SageMaker.CreateClusterSchedulerConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EntityName"
                  description: Name for the cluster policy.
                ClusterArn:
                  $ref: "#/components/schemas/ClusterArn"
                  description: ARN of the cluster.
                SchedulerConfig:
                  $ref: "#/components/schemas/SchedulerConfig"
                  description: Configuration about the monitoring schedule.
                Description:
                  $ref: "#/components/schemas/EntityDescription"
                  description: Description of the cluster policy.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Tags of the cluster policy.
              required:
                - ClusterArn
                - SchedulerConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClusterSchedulerConfigResponse"
  /CreateCodeRepository:
    post:
      operationId: CreateCodeRepository
      description: Creates a Git repository as a resource in your SageMaker AI account. You can associate the repository with notebook instances so that you can use Git source control for the notebooks you create. The Git repository is a resource in your SageMaker AI account, so it can be associated with more than one notebook instance, and it persists independently from the lifecycle of any notebook instances it is associated with. The repository can be hosted either in Amazon Web Services CodeCommit or in any other Git repository.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateCodeRepository
            default: SageMaker.CreateCodeRepository
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CodeRepositoryName:
                  $ref: "#/components/schemas/EntityName"
                  description: The name of the Git repository. The name must have 1 to 63 characters. Valid characters are a-z, A-Z, 0-9, and - (hyphen).
                GitConfig:
                  $ref: "#/components/schemas/GitConfig"
                  description: Specifies details about the repository, including the URL where the repository is located, the default branch, and credentials to use to access the repository.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key-value pairs. You can use tags to categorize your Amazon Web Services resources in different ways, for example, by purpose, owner, or environment. For more information, see Tagging Amazon Web Services Resources.
              required:
                - CodeRepositoryName
                - GitConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCodeRepositoryOutput"
  /CreateCompilationJob:
    post:
      operationId: CreateCompilationJob
      description: "Starts a model compilation job. After the model has been compiled, Amazon SageMaker AI saves the resulting model artifacts to an Amazon Simple Storage Service (Amazon S3) bucket that you specify. If you choose to host your model using Amazon SageMaker AI hosting services, you can use the resulting model artifacts as part of the model. You can also use the artifacts with Amazon Web Services IoT Greengrass. In that case, deploy them as an ML resource. In the request body, you provide the following: A name for the compilation job Information about the input model artifacts The output location for the compiled model and the device (target) that the model runs on The Amazon Resource Name (ARN) of the IAM role that Amazon SageMaker AI assumes to perform the model compilation job. You can also provide a Tag to track the model compilation job's resource use and costs. The response body contains the CompilationJobArn for the compiled job. To stop a model compilation job, use StopCompilationJob. To get information about a particular model compilation job, use DescribeCompilationJob. To get information about multiple model compilation jobs, use ListCompilationJobs."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateCompilationJob
            default: SageMaker.CreateCompilationJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CompilationJobName:
                  $ref: "#/components/schemas/EntityName"
                  description: A name for the model compilation job. The name must be unique within the Amazon Web Services Region and within your Amazon Web Services account.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: "The Amazon Resource Name (ARN) of an IAM role that enables Amazon SageMaker AI to perform tasks on your behalf. During model compilation, Amazon SageMaker AI needs your permission to: Read input data from an S3 bucket Write model artifacts to an S3 bucket Write logs to Amazon CloudWatch Logs Publish metrics to Amazon CloudWatch You grant permissions for all of these tasks to an IAM role. To pass this role to Amazon SageMaker AI, the caller of this API must have the iam:PassRole permission. For more information, see Amazon SageMaker AI Roles."
                ModelPackageVersionArn:
                  $ref: "#/components/schemas/ModelPackageArn"
                  description: The Amazon Resource Name (ARN) of a versioned model package. Provide either a ModelPackageVersionArn or an InputConfig object in the request syntax. The presence of both objects in the CreateCompilationJob request will return an exception.
                InputConfig:
                  $ref: "#/components/schemas/InputConfig"
                  description: Provides information about the location of input model artifacts, the name and shape of the expected data inputs, and the framework in which the model was trained.
                OutputConfig:
                  $ref: "#/components/schemas/OutputConfig"
                  description: Provides information about the output location for the compiled model and the target device the model runs on.
                VpcConfig:
                  $ref: "#/components/schemas/NeoVpcConfig"
                  description: A VpcConfig object that specifies the VPC that you want your compilation job to connect to. Control access to your models by configuring the VPC. For more information, see Protect Compilation Jobs by Using an Amazon Virtual Private Cloud.
                StoppingCondition:
                  $ref: "#/components/schemas/StoppingCondition"
                  description: Specifies a limit to how long a model compilation job can run. When the job reaches the time limit, Amazon SageMaker AI ends the compilation job. Use this API to cap model training costs.
                Tags:
                  $ref: "#/components/schemas/TagList"
