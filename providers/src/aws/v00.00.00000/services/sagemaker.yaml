  /CreatePresignedDomainUrl:
    post:
      operationId: CreatePresignedDomainUrl
      description: Creates a URL for a specified UserProfile in a Domain. When accessed in a web browser, the user will be automatically signed in to the domain, and granted access to all of the Apps and files associated with the Domain's Amazon Elastic File System volume. This operation can only be called when the authentication mode equals IAM. The IAM role or user passed to this API defines the permissions to access the app. Once the presigned URL is created, no additional permission is required to access this URL. IAM authorization policies for this API are also enforced for every HTTP request and WebSocket frame that attempts to connect to the app. You can restrict access to this API and to the URL that it returns to a list of IP addresses, Amazon VPCs or Amazon VPC Endpoints that you specify. For more information, see Connect to Amazon SageMaker AI Studio Through an Interface VPC Endpoint . The URL that you get from a call to CreatePresignedDomainUrl has a default timeout of 5 minutes. You can configure this value using ExpiresInSeconds. If you try to use the URL after the timeout limit expires, you are directed to the Amazon Web Services console sign-in page. The JupyterLab session default expiration time is 12 hours. You can configure this value using SessionExpirationDurationInSeconds.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreatePresignedDomainUrl
            default: SageMaker.CreatePresignedDomainUrl
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainId:
                  $ref: "#/components/schemas/DomainId"
                  description: The domain ID.
                UserProfileName:
                  $ref: "#/components/schemas/UserProfileName"
                  description: The name of the UserProfile to sign-in as.
                SessionExpirationDurationInSeconds:
                  $ref: "#/components/schemas/SessionExpirationDurationInSeconds"
                  description: The session expiration duration in seconds. This value defaults to 43200.
                ExpiresInSeconds:
                  $ref: "#/components/schemas/ExpiresInSeconds"
                  description: The number of seconds until the pre-signed URL expires. This value defaults to 300.
                SpaceName:
                  $ref: "#/components/schemas/SpaceName"
                  description: The name of the space.
                LandingUri:
                  $ref: "#/components/schemas/LandingUri"
                  description: "The landing page that the user is directed to when accessing the presigned URL. Using this value, users can access Studio or Studio Classic, even if it is not the default experience for the domain. The supported values are: studio::relative/path: Directs users to the relative path in Studio. app:JupyterServer:relative/path: Directs users to the relative path in the Studio Classic application. app:JupyterLab:relative/path: Directs users to the relative path in the JupyterLab application. app:RStudioServerPro:relative/path: Directs users to the relative path in the RStudio application. app:CodeEditor:relative/path: Directs users to the relative path in the Code Editor, based on Code-OSS, Visual Studio Code - Open Source application. app:Canvas:relative/path: Directs users to the relative path in the Canvas application."
              required:
                - DomainId
                - UserProfileName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePresignedDomainUrlResponse"
