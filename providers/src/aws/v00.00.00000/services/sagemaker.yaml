          description: The type of ML compute instance running on the notebook instance.
        IpAddressType:
          $ref: "#/components/schemas/IPAddressType"
          description: The IP address type configured for the notebook instance. Returns ipv4 for IPv4-only connectivity or dualstack for both IPv4 and IPv6 connectivity.
