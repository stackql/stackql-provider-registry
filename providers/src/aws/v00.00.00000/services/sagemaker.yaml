          $ref: "#/components/schemas/CreationTime"
          description: A timestamp. Use this parameter to return the time when the notebook instance was created
        NotebookInstanceLifecycleConfigName:
          $ref: "#/components/schemas/NotebookInstanceLifecycleConfigName"
          description: "Returns the name of a notebook instance lifecycle configuration. For information about notebook instance lifestyle configurations, see Step 2.1: (Optional) Customize a Notebook Instance"
        DirectInternetAccess:
          $ref: "#/components/schemas/DirectInternetAccess"
          description: Describes whether SageMaker AI provides internet access to the notebook instance. If this value is set to Disabled, the notebook instance does not have internet access, and cannot connect to SageMaker AI training and endpoint services. For more information, see Notebook Instances Are Internet-Enabled by Default.
        VolumeSizeInGB:
          $ref: "#/components/schemas/NotebookInstanceVolumeSizeInGB"
          description: The size, in GB, of the ML storage volume attached to the notebook instance.
        AcceleratorTypes:
          $ref: "#/components/schemas/NotebookInstanceAcceleratorTypes"
          description: This parameter is no longer supported. Elastic Inference (EI) is no longer available. This parameter was used to specify a list of the EI instance types associated with this notebook instance.
        DefaultCodeRepository:
          $ref: "#/components/schemas/CodeRepositoryNameOrUrl"
          description: The Git repository associated with the notebook instance as its default code repository. This can be either the name of a Git repository stored as a resource in your account, or the URL of a Git repository in Amazon Web Services CodeCommit or in any other Git repository. When you open a notebook instance, it opens in the directory that contains this repository. For more information, see Associating Git Repositories with SageMaker AI Notebook Instances.
        AdditionalCodeRepositories:
          $ref: "#/components/schemas/AdditionalCodeRepositoryNamesOrUrls"
          description: An array of up to three Git repositories associated with the notebook instance. These can be either the names of Git repositories stored as resources in your account, or the URL of Git repositories in Amazon Web Services CodeCommit or in any other Git repository. These repositories are cloned at the same level as the default repository of your notebook instance. For more information, see Associating Git Repositories with SageMaker AI Notebook Instances.
        RootAccess:
          $ref: "#/components/schemas/RootAccess"
          description: Whether root access is enabled or disabled for users of the notebook instance. Lifecycle configurations need root access to be able to set up a notebook instance. Because of this, lifecycle configurations associated with a notebook instance always run with root access even if you disable root access for users.
        PlatformIdentifier:
          $ref: "#/components/schemas/PlatformIdentifier"
          description: The platform identifier of the notebook instance runtime environment.
        InstanceMetadataServiceConfiguration:
          $ref: "#/components/schemas/InstanceMetadataServiceConfiguration"
          description: Information on the IMDS configuration of the notebook instance
