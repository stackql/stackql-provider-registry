    OptimizationJobMaxInstanceCount:
      type: integer
      minimum: 1
    OptimizationJobEnvironmentVariables:
      type: object
      properties: {}
    OptimizationConfigs:
      type: array
      items:
        $ref: "#/components/schemas/OptimizationConfig"
    OptimizationConfig:
      description: Settings for an optimization technique that you apply with a model optimization job.
      type: object
      properties:
        ModelQuantizationConfig:
          $ref: "#/components/schemas/ModelQuantizationConfig"
          description: Settings for the model quantization technique that's applied by a model optimization job.
        ModelCompilationConfig:
          $ref: "#/components/schemas/ModelCompilationConfig"
          description: Settings for the model compilation technique that's applied by a model optimization job.
        ModelShardingConfig:
          $ref: "#/components/schemas/ModelShardingConfig"
          description: Settings for the model sharding technique that's applied by a model optimization job.
        ModelSpeculativeDecodingConfig:
          $ref: "#/components/schemas/ModelSpeculativeDecodingConfig"
          description: Settings for the model speculative decoding technique that's applied by a model optimization job.
    ModelQuantizationConfig:
      description: Settings for the model quantization technique that's applied by a model optimization job.
      type: object
      properties:
        Image:
          $ref: "#/components/schemas/OptimizationContainerImage"
          description: The URI of an LMI DLC in Amazon ECR. SageMaker uses this image to run the optimization.
        OverrideEnvironment:
          type: object
          properties: {}
          description: Environment variables that override the default ones in the model container.
    OptimizationContainerImage:
      type: string
      minLength: 0
      maxLength: 255
      pattern: "[\\S]+"
    ModelCompilationConfig:
      description: Settings for the model compilation technique that's applied by a model optimization job.
      type: object
      properties:
        Image:
          $ref: "#/components/schemas/OptimizationContainerImage"
          description: The URI of an LMI DLC in Amazon ECR. SageMaker uses this image to run the optimization.
        OverrideEnvironment:
          type: object
          properties: {}
          description: Environment variables that override the default ones in the model container.
    ModelShardingConfig:
      description: Settings for the model sharding technique that's applied by a model optimization job.
      type: object
      properties:
        Image:
          $ref: "#/components/schemas/OptimizationContainerImage"
          description: The URI of an LMI DLC in Amazon ECR. SageMaker uses this image to run the optimization.
        OverrideEnvironment:
          type: object
          properties: {}
          description: Environment variables that override the default ones in the model container.
    ModelSpeculativeDecodingConfig:
      description: Settings for the model speculative decoding technique that's applied by a model optimization job.
      type: object
      properties:
        Technique:
          $ref: "#/components/schemas/ModelSpeculativeDecodingTechnique"
          description: The speculative decoding technique to apply during model optimization.
        TrainingDataSource:
          $ref: "#/components/schemas/ModelSpeculativeDecodingTrainingDataSource"
          description: The location of the training data to use for speculative decoding. The data must be formatted as ShareGPT, OpenAI Completions or OpenAI Chat Completions. The input can also be unencrypted captured data from a SageMaker endpoint as long as the endpoint uses one of the above formats.
      required:
        - Technique
    ModelSpeculativeDecodingTechnique:
      type: string
      enum:
        - EAGLE
    ModelSpeculativeDecodingTrainingDataSource:
      description: Contains information about the training data source for speculative decoding.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 URI that points to the training data for speculative decoding.
        S3DataType:
          $ref: "#/components/schemas/ModelSpeculativeDecodingS3DataType"
          description: The type of data stored in the Amazon S3 location. Valid values are S3Prefix or ManifestFile.
      required:
        - S3Uri
        - S3DataType
    ModelSpeculativeDecodingS3DataType:
      type: string
      enum:
        - S3Prefix
        - ManifestFile
    OptimizationJobOutputConfig:
      description: Details for where to store the optimized model that you create with the optimization job.
      type: object
      properties:
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The Amazon Resource Name (ARN) of a key in Amazon Web Services KMS. SageMaker uses they key to encrypt the artifacts of the optimized model when SageMaker uploads the model to Amazon S3.
        S3OutputLocation:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 URI for where to store the optimized model that you create with an optimization job.
        SageMakerModel:
          $ref: "#/components/schemas/OptimizationSageMakerModel"
          description: The name of a SageMaker model to use as the output destination for an optimization job.
      required:
        - S3OutputLocation
    OptimizationVpcConfig:
      description: A VPC in Amazon VPC that's accessible to an optimized that you create with an optimization job. You can control access to and from your resources by configuring a VPC. For more information, see Give SageMaker Access to Resources in your Amazon VPC.
      type: object
      properties:
        SecurityGroupIds:
          $ref: "#/components/schemas/OptimizationVpcSecurityGroupIds"
          description: The VPC security group IDs, in the form sg-xxxxxxxx. Specify the security groups for the VPC that is specified in the Subnets field.
        Subnets:
          $ref: "#/components/schemas/OptimizationVpcSubnets"
          description: The ID of the subnets in the VPC to which you want to connect your optimized model.
      required:
        - SecurityGroupIds
        - Subnets
    OptimizationVpcSecurityGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/OptimizationVpcSecurityGroupId"
    OptimizationVpcSecurityGroupId:
      type: string
      minLength: 0
      maxLength: 32
      pattern: "[-0-9a-zA-Z]+"
    OptimizationVpcSubnets:
      type: array
      items:
        $ref: "#/components/schemas/OptimizationVpcSubnetId"
    OptimizationVpcSubnetId:
      type: string
      minLength: 0
      maxLength: 32
      pattern: "[-0-9a-zA-Z]+"
    CreateOptimizationJobResponse:
      type: object
      properties:
        OptimizationJobArn:
          $ref: "#/components/schemas/OptimizationJobArn"
          description: The Amazon Resource Name (ARN) of the optimization job.
      required:
        - OptimizationJobArn
    OptimizationJobArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:optimization-job/.*
    PartnerAppName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9]+"
    PartnerAppType:
      type: string
      enum:
        - lakera-guard
        - comet
        - deepchecks-llm-evaluation
        - fiddler
    PartnerAppMaintenanceConfig:
      description: Maintenance configuration settings for the SageMaker Partner AI App.
      type: object
      properties:
        MaintenanceWindowStart:
          $ref: "#/components/schemas/WeeklyScheduleTimeFormat"
          description: "The day and time of the week in Coordinated Universal Time (UTC) 24-hour standard time that weekly maintenance updates are scheduled. This value must take the following format: 3-letter-day:24-h-hour:minute. For example: TUE:03:30."
    WeeklyScheduleTimeFormat:
      type: string
      minLength: 0
      maxLength: 9
      pattern: (Mon|Tue|Wed|Thu|Fri|Sat|Sun):([01]\d|2[0-3]):([0-5]\d)
    PartnerAppConfig:
      description: Configuration settings for the SageMaker Partner AI App.
      type: object
      properties:
        AdminUsers:
          $ref: "#/components/schemas/PartnerAppAdminUserList"
          description: The list of users that are given admin access to the SageMaker Partner AI App.
        Arguments:
          type: object
          properties: {}
          description: This is a map of required inputs for a SageMaker Partner AI App. Based on the application type, the map is populated with a key and value pair that is specific to the user and application.
        AssignedGroupPatterns:
          $ref: "#/components/schemas/AssignedGroupPatternsList"
          description: A list of Amazon Web Services IAM Identity Center group patterns that can access the SageMaker Partner AI App. Group names support wildcard matching using *. An empty list indicates the app will not use Identity Center group features. All groups specified in RoleGroupAssignments must match patterns in this list.
        RoleGroupAssignments:
          $ref: "#/components/schemas/RoleGroupAssignmentsList"
          description: "A map of in-app roles to Amazon Web Services IAM Identity Center group patterns. Groups assigned to specific roles receive those permissions, while groups in AssignedGroupPatterns but not in this map receive default in-app role depending on app type. Group patterns support wildcard matching using *. Currently supported by Fiddler version 1.3 and later with roles: ORG_MEMBER (default) and ORG_ADMIN."
    PartnerAppAdminUserList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString256"
    AssignedGroupPatternsList:
      type: array
      items:
        $ref: "#/components/schemas/GroupNamePattern"
    GroupNamePattern:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\w+=,.@*-]+"
    RoleGroupAssignmentsList:
      type: array
      items:
        $ref: "#/components/schemas/RoleGroupAssignment"
    RoleGroupAssignment:
      description: Defines the mapping between an in-app role and the Amazon Web Services IAM Identity Center group patterns that should be assigned to that role within the SageMaker Partner AI App.
      type: object
      properties:
        RoleName:
          $ref: "#/components/schemas/NonEmptyString256"
          description: The name of the in-app role within the SageMaker Partner AI App. The specific roles available depend on the app type and version.
        GroupPatterns:
          $ref: "#/components/schemas/GroupPatternsList"
          description: A list of Amazon Web Services IAM Identity Center group patterns that should be assigned to the specified role. Group patterns support wildcard matching using *.
      required:
        - RoleName
        - GroupPatterns
    GroupPatternsList:
      type: array
      items:
        $ref: "#/components/schemas/GroupNamePattern"
    PartnerAppAuthType:
      type: string
