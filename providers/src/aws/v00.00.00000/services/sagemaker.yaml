                $ref: "#/components/schemas/CreateMlflowAppResponse"
  /CreateMlflowTrackingServer:
    post:
      operationId: CreateMlflowTrackingServer
      description: Creates an MLflow Tracking Server using a general purpose Amazon S3 bucket as the artifact store. For more information, see Create an MLflow Tracking Server.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateMlflowTrackingServer
            default: SageMaker.CreateMlflowTrackingServer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TrackingServerName:
                  $ref: "#/components/schemas/TrackingServerName"
                  description: A unique string identifying the tracking server name. This string is part of the tracking server ARN.
                ArtifactStoreUri:
                  $ref: "#/components/schemas/S3Uri"
                  description: The S3 URI for a general purpose bucket to use as the MLflow Tracking Server artifact store.
                TrackingServerSize:
                  $ref: "#/components/schemas/TrackingServerSize"
                  description: The size of the tracking server you want to create. You can choose between "Small", "Medium", and "Large". The default MLflow Tracking Server configuration size is "Small". You can choose a size depending on the projected use of the tracking server such as the volume of data logged, number of users, and frequency of use. We recommend using a small tracking server for teams of up to 25 users, a medium tracking server for teams of up to 50 users, and a large tracking server for teams of up to 100 users.
                MlflowVersion:
                  $ref: "#/components/schemas/MlflowVersion"
                  description: The version of MLflow that the tracking server uses. To see which MLflow versions are available to use, see How it works.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) for an IAM role in your account that the MLflow Tracking Server uses to access the artifact store in Amazon S3. The role should have AmazonS3FullAccess permissions. For more information on IAM permissions for tracking server creation, see Set up IAM permissions for MLflow.
                AutomaticModelRegistration:
                  $ref: "#/components/schemas/Boolean"
                  description: Whether to enable or disable automatic registration of new MLflow models to the SageMaker Model Registry. To enable automatic model registration, set this value to True. To disable automatic model registration, set this value to False. If not specified, AutomaticModelRegistration defaults to False.
                WeeklyMaintenanceWindowStart:
                  $ref: "#/components/schemas/WeeklyMaintenanceWindowStart"
                  description: "The day and time of the week in Coordinated Universal Time (UTC) 24-hour standard time that weekly maintenance updates are scheduled. For example: TUE:03:30."
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Tags consisting of key-value pairs used to manage metadata for the tracking server.
                S3BucketOwnerAccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: Expected Amazon Web Services account ID that owns the Amazon S3 bucket for artifact storage. Defaults to caller's account ID if not provided.
                S3BucketOwnerVerification:
                  $ref: "#/components/schemas/Boolean"
                  description: Enable Amazon S3 Ownership checks when interacting with Amazon S3 buckets from a SageMaker Managed MLflow Tracking Server. Defaults to True if not provided.
              required:
                - TrackingServerName
                - ArtifactStoreUri
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMlflowTrackingServerResponse"
  /CreateModel:
    post:
      operationId: CreateModel
      description: Creates a model in SageMaker. In the request, you name the model and describe a primary container. For the primary container, you specify the Docker image that contains inference code, artifacts (from prior training), and a custom environment map that the inference code uses when you deploy the model for predictions. Use this API to create a model if you want to use SageMaker hosting services or run a batch transform job. To host your model, you create an endpoint configuration with the CreateEndpointConfig API, and then create an endpoint with the CreateEndpoint API. SageMaker then deploys all of the containers that you defined for the model in the hosting environment. To run a batch transform using your model, you start a job with the CreateTransformJob API. SageMaker uses your model and your dataset to get inferences which are then saved to a specified S3 location. In the request, you also provide an IAM role that SageMaker can assume to access model artifacts and docker image for deployment on ML compute hosting instances or for batch transform jobs. In addition, you also use the IAM role to manage permissions the inference code needs. For example, if the inference code access any other Amazon Web Services resources, you grant necessary permissions via this role.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateModel
            default: SageMaker.CreateModel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ModelName:
                  $ref: "#/components/schemas/ModelName"
                  description: The name of the new model.
                PrimaryContainer:
                  $ref: "#/components/schemas/ContainerDefinition"
                  description: The location of the primary docker image containing inference code, associated artifacts, and custom environment map that the inference code uses when the model is deployed for predictions.
                Containers:
                  $ref: "#/components/schemas/ContainerDefinitionList"
                  description: Specifies the containers in the inference pipeline.
                InferenceExecutionConfig:
                  $ref: "#/components/schemas/InferenceExecutionConfig"
                  description: Specifies details of how containers in a multi-container endpoint are called.
                ExecutionRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of the IAM role that SageMaker can assume to access model artifacts and docker image for deployment on ML compute instances or for batch transform jobs. Deploying on ML compute instances is part of model hosting. For more information, see SageMaker Roles. To be able to pass this role to SageMaker, the caller of this API must have the iam:PassRole permission.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key-value pairs. You can use tags to categorize your Amazon Web Services resources in different ways, for example, by purpose, owner, or environment. For more information, see Tagging Amazon Web Services Resources.
                VpcConfig:
                  $ref: "#/components/schemas/VpcConfig"
                  description: A VpcConfig object that specifies the VPC that you want your model to connect to. Control access to and from your model container by configuring the VPC. VpcConfig is used in hosting services and in batch transform. For more information, see Protect Endpoints by Using an Amazon Virtual Private Cloud and Protect Data in Batch Transform Jobs by Using an Amazon Virtual Private Cloud.
                EnableNetworkIsolation:
                  $ref: "#/components/schemas/Boolean"
                  description: Isolates the model container. No inbound or outbound network calls can be made to or from the model container.
              required:
                - ModelName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateModelOutput"
