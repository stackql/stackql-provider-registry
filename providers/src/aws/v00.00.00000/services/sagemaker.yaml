    FeatureGroup:
      description: Amazon SageMaker Feature Store stores features in a collection called Feature Group. A Feature Group can be visualized as a table which has rows, with a unique identifier for each row where each column in the table is a feature. In principle, a Feature Group is composed of features and values per features.
      type: object
      properties:
        FeatureGroupArn:
          $ref: "#/components/schemas/FeatureGroupArn"
          description: The Amazon Resource Name (ARN) of a FeatureGroup.
        FeatureGroupName:
          $ref: "#/components/schemas/FeatureGroupName"
          description: The name of the FeatureGroup.
        RecordIdentifierFeatureName:
          $ref: "#/components/schemas/FeatureName"
          description: The name of the Feature whose value uniquely identifies a Record defined in the FeatureGroup FeatureDefinitions.
        EventTimeFeatureName:
          $ref: "#/components/schemas/FeatureName"
          description: The name of the feature that stores the EventTime of a Record in a FeatureGroup. A EventTime is point in time when a new event occurs that corresponds to the creation or update of a Record in FeatureGroup. All Records in the FeatureGroup must have a corresponding EventTime.
        FeatureDefinitions:
          $ref: "#/components/schemas/FeatureDefinitions"
          description: "A list of Features. Each Feature must include a FeatureName and a FeatureType. Valid FeatureTypes are Integral, Fractional and String. FeatureNames cannot be any of the following: is_deleted, write_time, api_invocation_time. You can create up to 2,500 FeatureDefinitions per FeatureGroup."
        CreationTime:
          $ref: "#/components/schemas/CreationTime"
          description: The time a FeatureGroup was created.
        LastModifiedTime:
          $ref: "#/components/schemas/LastModifiedTime"
          description: A timestamp indicating the last time you updated the feature group.
        OnlineStoreConfig:
          $ref: "#/components/schemas/OnlineStoreConfig"
        OfflineStoreConfig:
          $ref: "#/components/schemas/OfflineStoreConfig"
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the IAM execution role used to create the feature group.
        FeatureGroupStatus:
          $ref: "#/components/schemas/FeatureGroupStatus"
          description: A FeatureGroup status.
        OfflineStoreStatus:
          $ref: "#/components/schemas/OfflineStoreStatus"
        LastUpdateStatus:
          $ref: "#/components/schemas/LastUpdateStatus"
          description: A value that indicates whether the feature group was updated successfully.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: The reason that the FeatureGroup failed to be replicated in the OfflineStore. This is failure may be due to a failure to create a FeatureGroup in or delete a FeatureGroup from the OfflineStore.
        Description:
          $ref: "#/components/schemas/Description"
          description: A free form description of a FeatureGroup.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: Tags used to define a FeatureGroup.
    FeatureMetadata:
      description: The metadata for a feature. It can either be metadata that you specify, or metadata that is updated automatically.
      type: object
      properties:
        FeatureGroupArn:
          $ref: "#/components/schemas/FeatureGroupArn"
