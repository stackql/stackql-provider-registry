          $ref: "#/components/schemas/MonitoringScheduleArn"
          description: The Amazon Resource Name (ARN) of the monitoring schedule.
        MonitoringScheduleName:
          $ref: "#/components/schemas/MonitoringScheduleName"
          description: The name of the monitoring schedule.
        MonitoringScheduleStatus:
          $ref: "#/components/schemas/ScheduleStatus"
          description: The status of the monitoring schedule. This can be one of the following values. PENDING - The schedule is pending being created. FAILED - The schedule failed. SCHEDULED - The schedule was successfully created. STOPPED - The schedule was stopped.
        MonitoringType:
          $ref: "#/components/schemas/MonitoringType"
          description: The type of the monitoring job definition to schedule.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: If the monitoring schedule failed, the reason it failed.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the monitoring schedule was created.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The last time the monitoring schedule was changed.
        MonitoringScheduleConfig:
          $ref: "#/components/schemas/MonitoringScheduleConfig"
        EndpointName:
          $ref: "#/components/schemas/EndpointName"
          description: The endpoint that hosts the model being monitored.
        LastMonitoringExecutionSummary:
          $ref: "#/components/schemas/MonitoringExecutionSummary"
        Tags:
          $ref: "#/components/schemas/TagList"
          description: A list of the tags associated with the monitoring schedlue. For more information, see Tagging Amazon Web Services resources in the Amazon Web Services General Reference Guide.
    ModelPackage:
      description: "A container for your trained model that can be deployed for SageMaker inference. This can include inference code, artifacts, and metadata. The model package type can be one of the following. Versioned model: A part of a model package group in Model Registry. Unversioned model: Not part of a model package group and used in Amazon Web Services Marketplace. For more information, see CreateModelPackage ."
      type: object
      properties:
        ModelPackageName:
          $ref: "#/components/schemas/EntityName"
          description: "The name of the model package. The name can be as follows: For a versioned model, the name is automatically generated by SageMaker Model Registry and follows the format 'ModelPackageGroupName/ModelPackageVersion'. For an unversioned model, you must provide the name."
        ModelPackageGroupName:
          $ref: "#/components/schemas/EntityName"
          description: The model group to which the model belongs.
        ModelPackageVersion:
          $ref: "#/components/schemas/ModelPackageVersion"
          description: The version number of a versioned model.
        ModelPackageRegistrationType:
          $ref: "#/components/schemas/ModelPackageRegistrationType"
          description: The package registration type of the model package.
        ModelPackageArn:
          $ref: "#/components/schemas/ModelPackageArn"
          description: The Amazon Resource Name (ARN) of the model package.
        ModelPackageDescription:
          $ref: "#/components/schemas/EntityDescription"
          description: The description of the model package.
        CreationTime:
          $ref: "#/components/schemas/CreationTime"
