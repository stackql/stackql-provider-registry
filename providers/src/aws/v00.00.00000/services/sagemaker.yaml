  /UpdateNotebookInstance:
    post:
      operationId: UpdateNotebookInstance
      description: Updates a notebook instance. NotebookInstance updates include upgrading or downgrading the ML compute instance used for your notebook instance to accommodate changes in your workload requirements. This API can attach lifecycle configurations to notebook instances. Lifecycle configuration scripts execute with root access and the notebook instance's IAM execution role privileges. Principals with this permission and access to lifecycle configurations can execute code with the execution role's credentials. See Customize a Notebook Instance Using a Lifecycle Configuration Script for security best practices.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.UpdateNotebookInstance
            default: SageMaker.UpdateNotebookInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NotebookInstanceName:
                  $ref: "#/components/schemas/NotebookInstanceName"
                  description: The name of the notebook instance to update.
                InstanceType:
                  $ref: "#/components/schemas/InstanceType"
                  description: The Amazon ML compute instance type.
                IpAddressType:
                  $ref: "#/components/schemas/IPAddressType"
                  description: The IP address type for the notebook instance. Specify ipv4 for IPv4-only connectivity or dualstack for both IPv4 and IPv6 connectivity. The notebook instance must be stopped before updating this setting. When you specify dualstack, the subnet must support IPv6 addressing.
                PlatformIdentifier:
                  $ref: "#/components/schemas/PlatformIdentifier"
                  description: The platform identifier of the notebook instance runtime environment.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of the IAM role that SageMaker AI can assume to access the notebook instance. For more information, see SageMaker AI Roles. To be able to pass this role to SageMaker AI, the caller of this API must have the iam:PassRole permission.
                LifecycleConfigName:
                  $ref: "#/components/schemas/NotebookInstanceLifecycleConfigName"
                  description: "The name of a lifecycle configuration to associate with the notebook instance. For information about lifestyle configurations, see Step 2.1: (Optional) Customize a Notebook Instance."
                DisassociateLifecycleConfig:
                  $ref: "#/components/schemas/DisassociateNotebookInstanceLifecycleConfig"
                  description: Set to true to remove the notebook instance lifecycle configuration currently associated with the notebook instance. This operation is idempotent. If you specify a lifecycle configuration that is not associated with the notebook instance when you call this method, it does not throw an error.
                VolumeSizeInGB:
                  $ref: "#/components/schemas/NotebookInstanceVolumeSizeInGB"
                  description: The size, in GB, of the ML storage volume to attach to the notebook instance. The default value is 5 GB. ML storage volumes are encrypted, so SageMaker AI can't determine the amount of available free space on the volume. Because of this, you can increase the volume size when you update a notebook instance, but you can't decrease the volume size. If you want to decrease the size of the ML storage volume in use, create a new notebook instance with the desired size.
                DefaultCodeRepository:
                  $ref: "#/components/schemas/CodeRepositoryNameOrUrl"
                  description: The Git repository to associate with the notebook instance as its default code repository. This can be either the name of a Git repository stored as a resource in your account, or the URL of a Git repository in Amazon Web Services CodeCommit or in any other Git repository. When you open a notebook instance, it opens in the directory that contains this repository. For more information, see Associating Git Repositories with SageMaker AI Notebook Instances.
                AdditionalCodeRepositories:
                  $ref: "#/components/schemas/AdditionalCodeRepositoryNamesOrUrls"
                  description: An array of up to three Git repositories to associate with the notebook instance. These can be either the names of Git repositories stored as resources in your account, or the URL of Git repositories in Amazon Web Services CodeCommit or in any other Git repository. These repositories are cloned at the same level as the default repository of your notebook instance. For more information, see Associating Git Repositories with SageMaker AI Notebook Instances.
                AcceleratorTypes:
                  $ref: "#/components/schemas/NotebookInstanceAcceleratorTypes"
                  description: This parameter is no longer supported. Elastic Inference (EI) is no longer available. This parameter was used to specify a list of the EI instance types to associate with this notebook instance.
                DisassociateAcceleratorTypes:
                  $ref: "#/components/schemas/DisassociateNotebookInstanceAcceleratorTypes"
                  description: This parameter is no longer supported. Elastic Inference (EI) is no longer available. This parameter was used to specify a list of the EI instance types to remove from this notebook instance.
                DisassociateDefaultCodeRepository:
                  $ref: "#/components/schemas/DisassociateDefaultCodeRepository"
                  description: The name or URL of the default Git repository to remove from this notebook instance. This operation is idempotent. If you specify a Git repository that is not associated with the notebook instance when you call this method, it does not throw an error.
                DisassociateAdditionalCodeRepositories:
                  $ref: "#/components/schemas/DisassociateAdditionalCodeRepositories"
                  description: A list of names or URLs of the default Git repositories to remove from this notebook instance. This operation is idempotent. If you specify a Git repository that is not associated with the notebook instance when you call this method, it does not throw an error.
                RootAccess:
                  $ref: "#/components/schemas/RootAccess"
                  description: Whether root access is enabled or disabled for users of the notebook instance. The default value is Enabled. If you set this to Disabled, users don't have root access on the notebook instance, but lifecycle configuration scripts still run with root permissions.
                InstanceMetadataServiceConfiguration:
                  $ref: "#/components/schemas/InstanceMetadataServiceConfiguration"
                  description: Information on the IMDS configuration of the notebook instance
              required:
                - NotebookInstanceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateNotebookInstanceOutput"
