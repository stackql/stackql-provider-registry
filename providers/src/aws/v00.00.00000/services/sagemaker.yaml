    ClusterInstanceGroupDetailsList:
      type: array
      items:
        $ref: "#/components/schemas/ClusterInstanceGroupDetails"
    ClusterInstanceGroupDetails:
      description: Details of an instance group in a SageMaker HyperPod cluster.
      type: object
      properties:
        CurrentCount:
          $ref: "#/components/schemas/ClusterNonNegativeInstanceCount"
          description: The number of instances that are currently in the instance group of a SageMaker HyperPod cluster.
        TargetCount:
          $ref: "#/components/schemas/ClusterInstanceCount"
          description: The number of instances you specified to add to the instance group of a SageMaker HyperPod cluster.
        MinCount:
          $ref: "#/components/schemas/ClusterInstanceCount"
          description: The minimum number of instances that must be available in the instance group of a SageMaker HyperPod cluster before it transitions to InService status.
        InstanceGroupName:
          $ref: "#/components/schemas/ClusterInstanceGroupName"
          description: The name of the instance group of a SageMaker HyperPod cluster.
        InstanceType:
          $ref: "#/components/schemas/ClusterInstanceType"
          description: The instance type of the instance group of a SageMaker HyperPod cluster.
        InstanceRequirements:
          $ref: "#/components/schemas/ClusterInstanceRequirementDetails"
          description: The instance requirements for the instance group, including the current and desired instance types. This field is present for flexible instance groups that support multiple instance types.
        InstanceTypeDetails:
          $ref: "#/components/schemas/ClusterInstanceTypeDetails"
          description: Details about the instance types in the instance group, including the count and configuration of each instance type. This field is present for flexible instance groups that support multiple instance types.
        LifeCycleConfig:
          $ref: "#/components/schemas/ClusterLifeCycleConfig"
          description: Details of LifeCycle configuration for the instance group.
        ExecutionRole:
          $ref: "#/components/schemas/RoleArn"
          description: The execution role for the instance group to assume.
        ThreadsPerCore:
          $ref: "#/components/schemas/ClusterThreadsPerCore"
          description: The number you specified to TreadsPerCore in CreateCluster for enabling or disabling multithreading. For instance types that support multithreading, you can specify 1 for disabling multithreading and 2 for enabling multithreading. For more information, see the reference table of CPU cores and threads per CPU core per instance type in the Amazon Elastic Compute Cloud User Guide.
        InstanceStorageConfigs:
          $ref: "#/components/schemas/ClusterInstanceStorageConfigs"
          description: The additional storage configurations for the instances in the SageMaker HyperPod cluster instance group.
        OnStartDeepHealthChecks:
          $ref: "#/components/schemas/OnStartDeepHealthChecks"
          description: A flag indicating whether deep health checks should be performed when the cluster instance group is created or updated.
        Status:
          $ref: "#/components/schemas/InstanceGroupStatus"
          description: "The current status of the cluster instance group. InService: The instance group is active and healthy. Creating: The instance group is being provisioned. Updating: The instance group is being updated. Failed: The instance group has failed to provision or is no longer healthy. Degraded: The instance group is degraded, meaning that some instances have failed to provision or are no longer healthy. Deleting: The instance group is being deleted."
        TrainingPlanArn:
          $ref: "#/components/schemas/TrainingPlanArn"
          description: The Amazon Resource Name (ARN); of the training plan associated with this cluster instance group. For more information about how to reserve GPU capacity for your SageMaker HyperPod clusters using Amazon SageMaker Training Plan, see CreateTrainingPlan .
        TrainingPlanStatus:
          $ref: "#/components/schemas/InstanceGroupTrainingPlanStatus"
          description: The current status of the training plan associated with this cluster instance group.
        OverrideVpcConfig:
          $ref: "#/components/schemas/VpcConfig"
          description: The customized Amazon VPC configuration at the instance group level that overrides the default Amazon VPC configuration of the SageMaker HyperPod cluster.
        ScheduledUpdateConfig:
          $ref: "#/components/schemas/ScheduledUpdateConfig"
          description: The configuration object of the schedule that SageMaker follows when updating the AMI.
        CurrentImageId:
          $ref: "#/components/schemas/ImageId"
          description: The ID of the Amazon Machine Image (AMI) currently in use by the instance group.
        DesiredImageId:
          $ref: "#/components/schemas/ImageId"
          description: The ID of the Amazon Machine Image (AMI) desired for the instance group.
        ImageVersionStatus:
          $ref: "#/components/schemas/ClusterImageVersionStatus"
          description: The status of the image version for the instance group. Indicates whether the instance group is running the latest image version or if an update is available.
        ActiveOperations:
          type: object
          properties: {}
          description: A map indicating active operations currently in progress for the instance group of a SageMaker HyperPod cluster. When there is a scaling operation in progress, this map contains a key Scaling with value 1.
        KubernetesConfig:
          $ref: "#/components/schemas/ClusterKubernetesConfigDetails"
          description: The Kubernetes configuration for the instance group that contains labels and taints to be applied for the nodes in this instance group.
        CapacityRequirements:
          $ref: "#/components/schemas/ClusterCapacityRequirements"
          description: The instance capacity requirements for the instance group.
        TargetStateCount:
          $ref: "#/components/schemas/ClusterInstanceCount"
          description: "Represents the number of running nodes using the desired Image ID. During software update operations: This count shows the number of nodes running on the desired Image ID. If a rollback occurs, the current image ID and desired image ID (both included in the describe cluster response) swap values. The TargetStateCount then shows the number of nodes running on the newly designated desired image ID (which was previously the current image ID). During simultaneous scaling and software update operations: This count shows the number of instances running on the desired image ID, including any new instances created as part of the scaling request. New nodes are always created using the desired image ID, so TargetStateCount reflects the total count of nodes running on the desired image ID, even during rollback scenarios."
        SoftwareUpdateStatus:
          $ref: "#/components/schemas/SoftwareUpdateStatus"
          description: "Status of the last software udpate request. Status transitions follow these possible sequences: Pending -> InProgress -> Succeeded Pending -> InProgress -> RollbackInProgress -> RollbackComplete Pending -> InProgress -> RollbackInProgress -> Failed"
        ActiveSoftwareUpdateConfig:
          $ref: "#/components/schemas/DeploymentConfiguration"
        SlurmConfig:
          $ref: "#/components/schemas/ClusterSlurmConfigDetails"
          description: The Slurm configuration for the instance group.
        NetworkInterface:
          $ref: "#/components/schemas/ClusterNetworkInterfaceDetails"
          description: The network interface configuration for the instance group.
