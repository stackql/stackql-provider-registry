      type: object
      properties:
        Content:
          $ref: "#/components/schemas/TemplateContent"
          description: The content of the Liquid template for the worker user interface.
      required:
        - Content
    TemplateContent:
      type: string
      minLength: 1
      maxLength: 128000
      pattern: "[\\S\\s]+"
    CreateHumanTaskUiResponse:
      type: object
      properties:
        HumanTaskUiArn:
          $ref: "#/components/schemas/HumanTaskUiArn"
          description: The Amazon Resource Name (ARN) of the human review workflow user interface you create.
      required:
        - HumanTaskUiArn
    HyperParameterTuningJobName:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,31}"
    HyperParameterTuningJobConfig:
      description: Configures a hyperparameter tuning job.
      type: object
      properties:
        Strategy:
          $ref: "#/components/schemas/HyperParameterTuningJobStrategyType"
          description: Specifies how hyperparameter tuning chooses the combinations of hyperparameter values to use for the training job it launches. For information about search strategies, see How Hyperparameter Tuning Works.
        StrategyConfig:
          $ref: "#/components/schemas/HyperParameterTuningJobStrategyConfig"
          description: The configuration for the Hyperband optimization strategy. This parameter should be provided only if Hyperband is selected as the strategy for HyperParameterTuningJobConfig.
        HyperParameterTuningJobObjective:
          $ref: "#/components/schemas/HyperParameterTuningJobObjective"
          description: The HyperParameterTuningJobObjective specifies the objective metric used to evaluate the performance of training jobs launched by this tuning job.
        ResourceLimits:
          $ref: "#/components/schemas/ResourceLimits"
          description: The ResourceLimits object that specifies the maximum number of training and parallel training jobs that can be used for this hyperparameter tuning job.
        ParameterRanges:
          $ref: "#/components/schemas/ParameterRanges"
          description: The ParameterRanges object that specifies the ranges of hyperparameters that this tuning job searches over to find the optimal configuration for the highest model performance against your chosen objective metric.
        TrainingJobEarlyStoppingType:
          $ref: "#/components/schemas/TrainingJobEarlyStoppingType"
          description: "Specifies whether to use early stopping for training jobs launched by the hyperparameter tuning job. Because the Hyperband strategy has its own advanced internal early stopping mechanism, TrainingJobEarlyStoppingType must be OFF to use Hyperband. This parameter can take on one of the following values (the default value is OFF): OFF Training jobs launched by the hyperparameter tuning job do not use early stopping. AUTO SageMaker stops training jobs launched by the hyperparameter tuning job when they are unlikely to perform better than previously completed training jobs. For more information, see Stop Training Jobs Early."
        TuningJobCompletionCriteria:
          $ref: "#/components/schemas/TuningJobCompletionCriteria"
          description: The tuning job's completion criteria.
        RandomSeed:
          $ref: "#/components/schemas/RandomSeed"
          description: A value used to initialize a pseudo-random number generator. Setting a random seed and using the same seed later for the same tuning job will allow hyperparameter optimization to find more a consistent hyperparameter configuration between the two runs.
      required:
        - Strategy
        - ResourceLimits
    HyperParameterTuningJobStrategyType:
      description: The strategy hyperparameter tuning uses to find the best combination of hyperparameters for your model.
      type: string
      enum:
        - Bayesian
        - Random
        - Hyperband
        - Grid
    HyperParameterTuningJobStrategyConfig:
      description: The configuration for a training job launched by a hyperparameter tuning job. Choose Bayesian for Bayesian optimization, and Random for random search optimization. For more advanced use cases, use Hyperband, which evaluates objective metrics for training jobs after every epoch. For more information about strategies, see How Hyperparameter Tuning Works.
      type: object
      properties:
        HyperbandStrategyConfig:
          $ref: "#/components/schemas/HyperbandStrategyConfig"
          description: The configuration for the object that specifies the Hyperband strategy. This parameter is only supported for the Hyperband selection for Strategy within the HyperParameterTuningJobConfig API.
    HyperbandStrategyConfig:
      description: The configuration for Hyperband, a multi-fidelity based hyperparameter tuning strategy. Hyperband uses the final and intermediate results of a training job to dynamically allocate resources to utilized hyperparameter configurations while automatically stopping under-performing configurations. This parameter should be provided only if Hyperband is selected as the StrategyConfig under the HyperParameterTuningJobConfig API.
      type: object
      properties:
        MinResource:
          $ref: "#/components/schemas/HyperbandStrategyMinResource"
          description: The minimum number of resources (such as epochs) that can be used by a training job launched by a hyperparameter tuning job. If the value for MinResource has not been reached, the training job is not stopped by Hyperband.
        MaxResource:
          $ref: "#/components/schemas/HyperbandStrategyMaxResource"
          description: "The maximum number of resources (such as epochs) that can be used by a training job launched by a hyperparameter tuning job. Once a job reaches the MaxResource value, it is stopped. If a value for MaxResource is not provided, and Hyperband is selected as the hyperparameter tuning strategy, HyperbandTraining attempts to infer MaxResource from the following keys (if present) in StaticsHyperParameters: epochs numepochs n-epochs n_epochs num_epochs If HyperbandStrategyConfig is unable to infer a value for MaxResource, it generates a validation error. The maximum value is 20,000 epochs. All metrics that correspond to an objective metric are used to derive early stopping decisions. For distributed training jobs, ensure that duplicate metrics are not printed in the logs across the individual nodes in a training job. If multiple nodes are publishing duplicate or incorrect metrics, training jobs may make an incorrect stopping decision and stop the job prematurely."
    HyperbandStrategyMinResource:
      type: integer
      minimum: 1
    HyperbandStrategyMaxResource:
      type: integer
      minimum: 1
    ResourceLimits:
      description: Specifies the maximum number of training jobs and parallel training jobs that a hyperparameter tuning job can launch.
      type: object
      properties:
        MaxNumberOfTrainingJobs:
          $ref: "#/components/schemas/MaxNumberOfTrainingJobs"
          description: The maximum number of training jobs that a hyperparameter tuning job can launch.
        MaxParallelTrainingJobs:
          $ref: "#/components/schemas/MaxParallelTrainingJobs"
          description: The maximum number of concurrent training jobs that a hyperparameter tuning job can launch.
        MaxRuntimeInSeconds:
          $ref: "#/components/schemas/HyperParameterTuningMaxRuntimeInSeconds"
          description: The maximum time in seconds that a hyperparameter tuning job can run.
      required:
        - MaxParallelTrainingJobs
    MaxNumberOfTrainingJobs:
      type: integer
      minimum: 1
    MaxParallelTrainingJobs:
      type: integer
      minimum: 1
    HyperParameterTuningMaxRuntimeInSeconds:
      type: integer
      minimum: 120
      maximum: 15768000
    ParameterRanges:
      description: Specifies ranges of integer, continuous, and categorical hyperparameters that a hyperparameter tuning job searches. The hyperparameter tuning job launches training jobs with hyperparameter values within these ranges to find the combination of values that result in the training job with the best performance as measured by the objective metric of the hyperparameter tuning job. The maximum number of items specified for Array Members refers to the maximum number of hyperparameters for each range and also the maximum for the hyperparameter tuning job itself. That is, the sum of the number of hyperparameters for all the ranges can't exceed the maximum number specified.
      type: object
      properties:
        IntegerParameterRanges:
          $ref: "#/components/schemas/IntegerParameterRanges"
          description: The array of IntegerParameterRange objects that specify ranges of integer hyperparameters that a hyperparameter tuning job searches.
        ContinuousParameterRanges:
          $ref: "#/components/schemas/ContinuousParameterRanges"
          description: The array of ContinuousParameterRange objects that specify ranges of continuous hyperparameters that a hyperparameter tuning job searches.
        CategoricalParameterRanges:
          $ref: "#/components/schemas/CategoricalParameterRanges"
          description: The array of CategoricalParameterRange objects that specify ranges of categorical hyperparameters that a hyperparameter tuning job searches.
        AutoParameters:
          $ref: "#/components/schemas/AutoParameters"
          description: A list containing hyperparameter names and example values to be used by Autotune to determine optimal ranges for your tuning job.
    IntegerParameterRanges:
      type: array
      items:
        $ref: "#/components/schemas/IntegerParameterRange"
    IntegerParameterRange:
      description: For a hyperparameter of the integer type, specifies the range that a hyperparameter tuning job searches.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ParameterKey"
          description: The name of the hyperparameter to search.
        MinValue:
          $ref: "#/components/schemas/ParameterValue"
          description: The minimum value of the hyperparameter to search.
        MaxValue:
          $ref: "#/components/schemas/ParameterValue"
          description: The maximum value of the hyperparameter to search.
        ScalingType:
          $ref: "#/components/schemas/HyperParameterScalingType"
          description: "The scale that hyperparameter tuning uses to search the hyperparameter range. For information about choosing a hyperparameter scale, see Hyperparameter Scaling. One of the following values: Auto SageMaker hyperparameter tuning chooses the best scale for the hyperparameter. Linear Hyperparameter tuning searches the values in the hyperparameter range by using a linear scale. Logarithmic Hyperparameter tuning searches the values in the hyperparameter range by using a logarithmic scale. Logarithmic scaling works only for ranges that have only values greater than 0."
      required:
        - Name
        - MinValue
        - MaxValue
    ParameterKey:
      type: string
      minLength: 0
      maxLength: 256
      pattern: .*
    HyperParameterScalingType:
      type: string
      enum:
        - Auto
        - Linear
        - Logarithmic
        - ReverseLogarithmic
    ContinuousParameterRanges:
      type: array
      items:
        $ref: "#/components/schemas/ContinuousParameterRange"
    ContinuousParameterRange:
      description: A list of continuous hyperparameters to tune.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ParameterKey"
          description: The name of the continuous hyperparameter to tune.
        MinValue:
          $ref: "#/components/schemas/ParameterValue"
          description: The minimum value for the hyperparameter. The tuning job uses floating-point values between this value and MaxValuefor tuning.
        MaxValue:
          $ref: "#/components/schemas/ParameterValue"
          description: The maximum value for the hyperparameter. The tuning job uses floating-point values between MinValue value and this value for tuning.
        ScalingType:
          $ref: "#/components/schemas/HyperParameterScalingType"
          description: "The scale that hyperparameter tuning uses to search the hyperparameter range. For information about choosing a hyperparameter scale, see Hyperparameter Scaling. One of the following values: Auto SageMaker hyperparameter tuning chooses the best scale for the hyperparameter. Linear Hyperparameter tuning searches the values in the hyperparameter range by using a linear scale. Logarithmic Hyperparameter tuning searches the values in the hyperparameter range by using a logarithmic scale. Logarithmic scaling works only for ranges that have only values greater than 0. ReverseLogarithmic Hyperparameter tuning searches the values in the hyperparameter range by using a reverse logarithmic scale. Reverse logarithmic scaling works only for ranges that are entirely within the range 0<=x<1.0."
      required:
        - Name
        - MinValue
        - MaxValue
    CategoricalParameterRanges:
      type: array
      items:
        $ref: "#/components/schemas/CategoricalParameterRange"
    CategoricalParameterRange:
      description: A list of categorical hyperparameters to tune.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ParameterKey"
          description: The name of the categorical hyperparameter to tune.
        Values:
          $ref: "#/components/schemas/ParameterValues"
          description: A list of the categories for the hyperparameter.
      required:
        - Name
        - Values
    AutoParameters:
      type: array
      items:
        $ref: "#/components/schemas/AutoParameter"
    AutoParameter:
      description: The name and an example value of the hyperparameter that you want to use in Autotune. If Automatic model tuning (AMT) determines that your hyperparameter is eligible for Autotune, an optimal hyperparameter range is selected for you.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ParameterKey"
          description: The name of the hyperparameter to optimize using Autotune.
        ValueHint:
          $ref: "#/components/schemas/ParameterValue"
          description: An example value of the hyperparameter to optimize using Autotune.
      required:
        - Name
        - ValueHint
    TrainingJobEarlyStoppingType:
      type: string
      enum:
        - "Off"
        - Auto
    TuningJobCompletionCriteria:
      description: The job completion criteria.
      type: object
      properties:
        TargetObjectiveMetricValue:
          $ref: "#/components/schemas/TargetObjectiveMetricValue"
          description: The value of the objective metric.
        BestObjectiveNotImproving:
          $ref: "#/components/schemas/BestObjectiveNotImproving"
          description: A flag to stop your hyperparameter tuning job if model performance fails to improve as evaluated against an objective function.
        ConvergenceDetected:
          $ref: "#/components/schemas/ConvergenceDetected"
          description: A flag to top your hyperparameter tuning job if automatic model tuning (AMT) has detected that your model has converged as evaluated against your objective function.
    TargetObjectiveMetricValue:
      type: number
      format: float
    BestObjectiveNotImproving:
      description: A structure that keeps track of which training jobs launched by your hyperparameter tuning job are not improving model performance as evaluated against an objective function.
      type: object
      properties:
        MaxNumberOfTrainingJobsNotImproving:
          $ref: "#/components/schemas/MaxNumberOfTrainingJobsNotImproving"
          description: The number of training jobs that have failed to improve model performance by 1% or greater over prior training jobs as evaluated against an objective function.
    MaxNumberOfTrainingJobsNotImproving:
      type: integer
      minimum: 3
    ConvergenceDetected:
      description: A flag to indicating that automatic model tuning (AMT) has detected model convergence, defined as a lack of significant improvement (1% or less) against an objective metric.
      type: object
      properties:
        CompleteOnConvergence:
          $ref: "#/components/schemas/CompleteOnConvergence"
          description: A flag to stop a tuning job once AMT has detected that the job has converged.
    CompleteOnConvergence:
      type: string
      enum:
        - Disabled
        - Enabled
    RandomSeed:
      type: integer
      minimum: 0
    HyperParameterTrainingJobDefinition:
      description: Defines the training jobs launched by a hyperparameter tuning job.
      type: object
      properties:
        DefinitionName:
          $ref: "#/components/schemas/HyperParameterTrainingJobDefinitionName"
          description: The job definition name.
        TuningObjective:
          $ref: "#/components/schemas/HyperParameterTuningJobObjective"
        HyperParameterRanges:
          $ref: "#/components/schemas/ParameterRanges"
        StaticHyperParameters:
          type: object
          properties: {}
          description: Specifies the values of hyperparameters that do not change for the tuning job.
        AlgorithmSpecification:
          $ref: "#/components/schemas/HyperParameterAlgorithmSpecification"
          description: The HyperParameterAlgorithmSpecification object that specifies the resource algorithm to use for the training jobs that the tuning job launches.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role associated with the training jobs that the tuning job launches.
        InputDataConfig:
          $ref: "#/components/schemas/InputDataConfig"
          description: An array of Channel objects that specify the input for the training jobs that the tuning job launches.
        VpcConfig:
          $ref: "#/components/schemas/VpcConfig"
          description: The VpcConfig object that specifies the VPC that you want the training jobs that this hyperparameter tuning job launches to connect to. Control access to and from your training container by configuring the VPC. For more information, see Protect Training Jobs by Using an Amazon Virtual Private Cloud.
        OutputDataConfig:
          $ref: "#/components/schemas/OutputDataConfig"
          description: Specifies the path to the Amazon S3 bucket where you store model artifacts from the training jobs that the tuning job launches.
        ResourceConfig:
          $ref: "#/components/schemas/ResourceConfig"
          description: The resources, including the compute instances and storage volumes, to use for the training jobs that the tuning job launches. Storage volumes store model artifacts and incremental states. Training algorithms might also use storage volumes for scratch space. If you want SageMaker to use the storage volume to store the training data, choose File as the TrainingInputMode in the algorithm specification. For distributed training algorithms, specify an instance count greater than 1. If you want to use hyperparameter optimization with instance type flexibility, use HyperParameterTuningResourceConfig instead.
        HyperParameterTuningResourceConfig:
          $ref: "#/components/schemas/HyperParameterTuningResourceConfig"
          description: The configuration for the hyperparameter tuning resources, including the compute instances and storage volumes, used for training jobs launched by the tuning job. By default, storage volumes hold model artifacts and incremental states. Choose File for TrainingInputMode in the AlgorithmSpecification parameter to additionally store training data in the storage volume (optional).
        StoppingCondition:
          $ref: "#/components/schemas/StoppingCondition"
          description: Specifies a limit to how long a model hyperparameter training job can run. It also specifies how long a managed spot training job has to complete. When the job reaches the time limit, SageMaker ends the training job. Use this API to cap model training costs.
        EnableNetworkIsolation:
          $ref: "#/components/schemas/Boolean"
          description: Isolates the training container. No inbound or outbound network calls can be made, except for calls between peers within a training cluster for distributed training. If network isolation is used for training jobs that are configured to use a VPC, SageMaker downloads and uploads customer data and model artifacts through the specified VPC, but the training container does not have network access.
        EnableInterContainerTrafficEncryption:
          $ref: "#/components/schemas/Boolean"
          description: To encrypt all communications between ML compute instances in distributed training, choose True. Encryption provides greater security for distributed training, but training might take longer. How long it takes depends on the amount of communication between compute instances, especially if you use a deep learning algorithm in distributed training.
        EnableManagedSpotTraining:
          $ref: "#/components/schemas/Boolean"
          description: A Boolean indicating whether managed spot training is enabled (True) or not (False).
        CheckpointConfig:
          $ref: "#/components/schemas/CheckpointConfig"
        RetryStrategy:
          $ref: "#/components/schemas/RetryStrategy"
          description: The number of times to retry the job when the job fails due to an InternalServerError.
        Environment:
          type: object
          properties: {}
          description: An environment variable that you can pass into the SageMaker CreateTrainingJob API. You can use an existing environment variable from the training container or use your own. See Define metrics and variables for more information. The maximum number of items specified for Map Entries refers to the maximum number of environment variables for each TrainingJobDefinition and also the maximum for the hyperparameter tuning job itself. That is, the sum of the number of environment variables for all the training job definitions can't exceed the maximum number specified.
      required:
        - AlgorithmSpecification
        - RoleArn
        - OutputDataConfig
        - StoppingCondition
    HyperParameterTrainingJobDefinitionName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,63}"
    HyperParameterAlgorithmSpecification:
      description: Specifies which training algorithm to use for training jobs that a hyperparameter tuning job launches and the metrics to monitor.
      type: object
      properties:
        TrainingImage:
          $ref: "#/components/schemas/AlgorithmImage"
          description: "The registry path of the Docker image that contains the training algorithm. For information about Docker registry paths for built-in algorithms, see Algorithms Provided by Amazon SageMaker: Common Parameters. SageMaker supports both registry/repository[:tag] and registry/repository[@digest] image path formats. For more information, see Using Your Own Algorithms with Amazon SageMaker."
        TrainingInputMode:
          $ref: "#/components/schemas/TrainingInputMode"
        AlgorithmName:
          $ref: "#/components/schemas/ArnOrName"
          description: The name of the resource algorithm to use for the hyperparameter tuning job. If you specify a value for this parameter, do not specify a value for TrainingImage.
        MetricDefinitions:
          $ref: "#/components/schemas/MetricDefinitionList"
          description: An array of MetricDefinition objects that specify the metrics that the algorithm emits.
      required:
        - TrainingInputMode
    AlgorithmImage:
      type: string
      minLength: 0
      maxLength: 255
      pattern: .*
    ArnOrName:
      type: string
      minLength: 1
      maxLength: 170
      pattern: (arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:[a-z\-]*\/)?([a-zA-Z0-9]([a-zA-Z0-9-]){0,62})(?<!-)
    HyperParameterTuningResourceConfig:
      description: The configuration of resources, including compute instances and storage volumes for use in training jobs launched by hyperparameter tuning jobs. HyperParameterTuningResourceConfig is similar to ResourceConfig, but has the additional InstanceConfigs and AllocationStrategy fields to allow for flexible instance management. Specify one or more instance types, count, and the allocation strategy for instance selection. HyperParameterTuningResourceConfig supports the capabilities of ResourceConfig with the exception of KeepAlivePeriodInSeconds. Hyperparameter tuning jobs use warm pools by default, which reuse clusters between training jobs.
      type: object
      properties:
        InstanceType:
          $ref: "#/components/schemas/TrainingInstanceType"
          description: The instance type used to run hyperparameter optimization tuning jobs. See descriptions of instance types for more information.
        InstanceCount:
          $ref: "#/components/schemas/TrainingInstanceCount"
          description: The number of compute instances of type InstanceType to use. For distributed training, select a value greater than 1.
        VolumeSizeInGB:
          $ref: "#/components/schemas/OptionalVolumeSizeInGB"
          description: The volume size in GB for the storage volume to be used in processing hyperparameter optimization jobs (optional). These volumes store model artifacts, incremental states and optionally, scratch space for training algorithms. Do not provide a value for this parameter if a value for InstanceConfigs is also specified. Some instance types have a fixed total local storage size. If you select one of these instances for training, VolumeSizeInGB cannot be greater than this total size. For a list of instance types with local instance storage and their sizes, see instance store volumes. SageMaker supports only the General Purpose SSD (gp2) storage volume type.
        VolumeKmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: 'A key used by Amazon Web Services Key Management Service to encrypt data on the storage volume attached to the compute instances used to run the training job. You can use either of the following formats to specify a key. KMS Key ID: "1234abcd-12ab-34cd-56ef-1234567890ab" Amazon Resource Name (ARN) of a KMS key: "arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab" Some instances use local storage, which use a hardware module to encrypt storage volumes. If you choose one of these instance types, you cannot request a VolumeKmsKeyId. For a list of instance types that use local storage, see instance store volumes. For more information about Amazon Web Services Key Management Service, see KMS encryption for more information.'
        AllocationStrategy:
          $ref: "#/components/schemas/HyperParameterTuningAllocationStrategy"
          description: The strategy that determines the order of preference for resources specified in InstanceConfigs used in hyperparameter optimization.
        InstanceConfigs:
          $ref: "#/components/schemas/HyperParameterTuningInstanceConfigs"
          description: A list containing the configuration(s) for one or more resources for processing hyperparameter jobs. These resources include compute instances and storage volumes to use in model training jobs launched by hyperparameter tuning jobs. The AllocationStrategy controls the order in which multiple configurations provided in InstanceConfigs are used. If you only want to use a single instance configuration inside the HyperParameterTuningResourceConfig API, do not provide a value for InstanceConfigs. Instead, use InstanceType, VolumeSizeInGB and InstanceCount. If you use InstanceConfigs, do not provide values for InstanceType, VolumeSizeInGB or InstanceCount.
    HyperParameterTuningAllocationStrategy:
      type: string
      enum:
        - Prioritized
    HyperParameterTuningInstanceConfigs:
      type: array
      items:
        $ref: "#/components/schemas/HyperParameterTuningInstanceConfig"
    HyperParameterTuningInstanceConfig:
      description: The configuration for hyperparameter tuning resources for use in training jobs launched by the tuning job. These resources include compute instances and storage volumes. Specify one or more compute instance configurations and allocation strategies to select resources (optional).
      type: object
      properties:
        InstanceType:
          $ref: "#/components/schemas/TrainingInstanceType"
          description: "The instance type used for processing of hyperparameter optimization jobs. Choose from general purpose (no GPUs) instance types: ml.m5.xlarge, ml.m5.2xlarge, and ml.m5.4xlarge or compute optimized (no GPUs) instance types: ml.c5.xlarge and ml.c5.2xlarge. For more information about instance types, see instance type descriptions."
        InstanceCount:
          $ref: "#/components/schemas/TrainingInstanceCount"
          description: "The number of instances of the type specified by InstanceType. Choose an instance count larger than 1 for distributed training algorithms. See Step 2: Launch a SageMaker Distributed Training Job Using the SageMaker Python SDK for more information."
        VolumeSizeInGB:
          $ref: "#/components/schemas/VolumeSizeInGB"
          description: The volume size in GB of the data to be processed for hyperparameter optimization (optional).
      required:
        - InstanceType
        - InstanceCount
        - VolumeSizeInGB
    VolumeSizeInGB:
      type: integer
      minimum: 1
    CheckpointConfig:
      description: Contains information about the output location for managed spot training checkpoint data.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: Identifies the S3 path where you want SageMaker to store checkpoints. For example, s3://bucket-name/key-name-prefix.
        LocalPath:
          $ref: "#/components/schemas/DirectoryPath"
          description: (Optional) The local directory where checkpoints are written. The default directory is /opt/ml/checkpoints/.
      required:
        - S3Uri
    RetryStrategy:
      description: The retry strategy to use when a training job fails due to an InternalServerError. RetryStrategy is specified as part of the CreateTrainingJob and CreateHyperParameterTuningJob requests. You can add the StoppingCondition parameter to the request to limit the training time for the complete job.
      type: object
      properties:
        MaximumRetryAttempts:
          $ref: "#/components/schemas/MaximumRetryAttempts"
          description: The number of times to retry the job. When the job is retried, it's SecondaryStatus is changed to STARTING.
      required:
        - MaximumRetryAttempts
    MaximumRetryAttempts:
      type: integer
      minimum: 1
      maximum: 30
    HyperParameterTrainingJobDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/HyperParameterTrainingJobDefinition"
    HyperParameterTuningJobWarmStartConfig:
      description: Specifies the configuration for a hyperparameter tuning job that uses one or more previous hyperparameter tuning jobs as a starting point. The results of previous tuning jobs are used to inform which combinations of hyperparameters to search over in the new tuning job. All training jobs launched by the new hyperparameter tuning job are evaluated by using the objective metric, and the training job that performs the best is compared to the best training jobs from the parent tuning jobs. From these, the training job that performs the best as measured by the objective metric is returned as the overall best training job. All training jobs launched by parent hyperparameter tuning jobs and the new hyperparameter tuning jobs count against the limit of training jobs for the tuning job.
      type: object
      properties:
        ParentHyperParameterTuningJobs:
          $ref: "#/components/schemas/ParentHyperParameterTuningJobs"
          description: An array of hyperparameter tuning jobs that are used as the starting point for the new hyperparameter tuning job. For more information about warm starting a hyperparameter tuning job, see Using a Previous Hyperparameter Tuning Job as a Starting Point. Hyperparameter tuning jobs created before October 1, 2018 cannot be used as parent jobs for warm start tuning jobs.
        WarmStartType:
          $ref: "#/components/schemas/HyperParameterTuningJobWarmStartType"
          description: "Specifies one of the following: IDENTICAL_DATA_AND_ALGORITHM The new hyperparameter tuning job uses the same input data and training image as the parent tuning jobs. You can change the hyperparameter ranges to search and the maximum number of training jobs that the hyperparameter tuning job launches. You cannot use a new version of the training algorithm, unless the changes in the new version do not affect the algorithm itself. For example, changes that improve logging or adding support for a different data format are allowed. You can also change hyperparameters from tunable to static, and from static to tunable, but the total number of static plus tunable hyperparameters must remain the same as it is in all parent jobs. The objective metric for the new tuning job must be the same as for all parent jobs. TRANSFER_LEARNING The new hyperparameter tuning job can include input data, hyperparameter ranges, maximum number of concurrent training jobs, and maximum number of training jobs that are different than those of its parent hyperparameter tuning jobs. The training image can also be a different version from the version used in the parent hyperparameter tuning job. You can also change hyperparameters from tunable to static, and from static to tunable, but the total number of static plus tunable hyperparameters must remain the same as it is in all parent jobs. The objective metric for the new tuning job must be the same as for all parent jobs."
      required:
        - ParentHyperParameterTuningJobs
        - WarmStartType
    ParentHyperParameterTuningJobs:
      type: array
      items:
        $ref: "#/components/schemas/ParentHyperParameterTuningJob"
    ParentHyperParameterTuningJob:
      description: A previously completed or stopped hyperparameter tuning job to be used as a starting point for a new hyperparameter tuning job.
      type: object
      properties:
        HyperParameterTuningJobName:
          $ref: "#/components/schemas/HyperParameterTuningJobName"
          description: The name of the hyperparameter tuning job to be used as a starting point for a new hyperparameter tuning job.
    HyperParameterTuningJobWarmStartType:
      type: string
      enum:
        - IdenticalDataAndAlgorithm
        - TransferLearning
    Autotune:
      description: "A flag to indicate if you want to use Autotune to automatically find optimal values for the following fields: ParameterRanges: The names and ranges of parameters that a hyperparameter tuning job can optimize. ResourceLimits: The maximum resources that can be used for a training job. These resources include the maximum number of training jobs, the maximum runtime of a tuning job, and the maximum number of training jobs to run at the same time. TrainingJobEarlyStoppingType: A flag that specifies whether or not to use early stopping for training jobs launched by a hyperparameter tuning job. RetryStrategy: The number of times to retry a training job. Strategy: Specifies how hyperparameter tuning chooses the combinations of hyperparameter values to use for the training jobs that it launches. ConvergenceDetected: A flag to indicate that Automatic model tuning (AMT) has detected model convergence."
      type: object
      properties:
        Mode:
          $ref: "#/components/schemas/AutotuneMode"
          description: Set Mode to Enabled if you want to use Autotune.
      required:
        - Mode
    AutotuneMode:
      type: string
      enum:
        - Enabled
    CreateHyperParameterTuningJobResponse:
      type: object
      properties:
        HyperParameterTuningJobArn:
          $ref: "#/components/schemas/HyperParameterTuningJobArn"
          description: The Amazon Resource Name (ARN) of the tuning job. SageMaker assigns an ARN to a hyperparameter tuning job when you create it.
      required:
        - HyperParameterTuningJobArn
    HyperParameterTuningJobArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:hyper-parameter-tuning-job/.*
    ImageDescription:
      type: string
      minLength: 1
      maxLength: 512
      pattern: .*
    ImageDisplayName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: \S(.*\S)?
    CreateImageResponse:
      type: object
      properties:
        ImageArn:
          $ref: "#/components/schemas/ImageArn"
          description: The ARN of the image.
    ImageBaseImage:
      type: string
      minLength: 1
      maxLength: 255
      pattern: .*
    ClientToken:
      type: string
      minLength: 1
      maxLength: 36
      pattern: "[a-zA-Z0-9-]+"
    SageMakerImageVersionAliases:
      type: array
      items:
        $ref: "#/components/schemas/SageMakerImageVersionAlias"
    SageMakerImageVersionAlias:
      type: string
      minLength: 1
      maxLength: 128
      pattern: (?!^[.-])^([a-zA-Z0-9-_.]+)
    VendorGuidance:
      type: string
      enum:
        - NOT_PROVIDED
        - STABLE
        - TO_BE_ARCHIVED
        - ARCHIVED
    JobType:
      type: string
      enum:
        - TRAINING
        - INFERENCE
        - NOTEBOOK_KERNEL
    MLFramework:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z]+ ?\\d+\\.\\d+(\\.\\d+)?"
    ProgrammingLang:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z]+ ?\\d+\\.\\d+(\\.\\d+)?"
    Processor:
      type: string
      enum:
        - CPU
        - GPU
    Horovod:
      type: boolean
    ReleaseNotes:
      type: string
      minLength: 1
      maxLength: 255
      pattern: .*
    CreateImageVersionResponse:
      type: object
      properties:
        ImageVersionArn:
          $ref: "#/components/schemas/ImageVersionArn"
          description: The ARN of the image version.
    InferenceComponentName:
      type: string
      minLength: 0
      maxLength: 63
      pattern: "[a-zA-Z0-9]([\\-a-zA-Z0-9]*[a-zA-Z0-9])?"
    InferenceComponentSpecification:
      description: Details about the resources to deploy with this inference component, including the model, container, and compute resources.
      type: object
      properties:
        InstanceType:
          $ref: "#/components/schemas/ProductionVariantInstanceType"
          description: The ML compute instance type for the inference component specification. Specifies which instance type this specification applies to. Required when using the Specifications parameter with multiple entries.
        ModelName:
          $ref: "#/components/schemas/ModelName"
          description: The name of an existing SageMaker AI model object in your account that you want to deploy with the inference component.
        Container:
          $ref: "#/components/schemas/InferenceComponentContainerSpecification"
          description: Defines a container that provides the runtime environment for a model that you deploy with an inference component.
        StartupParameters:
          $ref: "#/components/schemas/InferenceComponentStartupParameters"
          description: Settings that take effect while the model container starts up.
        ComputeResourceRequirements:
          $ref: "#/components/schemas/InferenceComponentComputeResourceRequirements"
          description: The compute resources allocated to run the model, plus any adapter models, that you assign to the inference component. Omit this parameter if your request is meant to create an adapter inference component. An adapter inference component is loaded by a base inference component, and it uses the compute resources of the base inference component.
        BaseInferenceComponentName:
          $ref: "#/components/schemas/InferenceComponentName"
          description: The name of an existing inference component that is to contain the inference component that you're creating with your request. Specify this parameter only if your request is meant to create an adapter inference component. An adapter inference component contains the path to an adapter model. The purpose of the adapter model is to tailor the inference output of a base foundation model, which is hosted by the base inference component. The adapter inference component uses the compute resources that you assigned to the base inference component. When you create an adapter inference component, use the Container parameter to specify the location of the adapter artifacts. In the parameter value, use the ArtifactUrl parameter of the InferenceComponentContainerSpecification data type. Before you can create an adapter inference component, you must have an existing inference component that contains the foundation model that you want to adapt.
        DataCacheConfig:
          $ref: "#/components/schemas/InferenceComponentDataCacheConfig"
          description: Settings that affect how the inference component caches data.
        SchedulingConfig:
          $ref: "#/components/schemas/InferenceComponentSchedulingConfig"
          description: The scheduling configuration that determines how inference component copies are placed across available instances when copies are added or removed.
    InferenceComponentContainerSpecification:
      description: Defines a container that provides the runtime environment for a model that you deploy with an inference component.
      type: object
      properties:
        Image:
          $ref: "#/components/schemas/ContainerImage"
          description: The Amazon Elastic Container Registry (Amazon ECR) path where the Docker image for the model is stored.
        ArtifactUrl:
          $ref: "#/components/schemas/Url"
          description: The Amazon S3 path where the model artifacts, which result from model training, are stored. This path must point to a single gzip compressed tar archive (.tar.gz suffix).
        Environment:
          type: object
          properties: {}
          description: The environment variables to set in the Docker container. Each key and value in the Environment string-to-string map can have length of up to 1024. We support up to 16 entries in the map.
    InferenceComponentStartupParameters:
      description: Settings that take effect while the model container starts up.
      type: object
      properties:
        ModelDataDownloadTimeoutInSeconds:
          $ref: "#/components/schemas/ProductionVariantModelDataDownloadTimeoutInSeconds"
          description: The timeout value, in seconds, to download and extract the model that you want to host from Amazon S3 to the individual inference instance associated with this inference component.
        ContainerStartupHealthCheckTimeoutInSeconds:
          $ref: "#/components/schemas/ProductionVariantContainerStartupHealthCheckTimeoutInSeconds"
          description: The timeout value, in seconds, for your inference container to pass health check by Amazon S3 Hosting. For more information about health check, see How Your Container Should Respond to Health Check (Ping) Requests.
    InferenceComponentComputeResourceRequirements:
      description: Defines the compute resources to allocate to run a model, plus any adapter models, that you assign to an inference component. These resources include CPU cores, accelerators, and memory.
      type: object
      properties:
        NumberOfCpuCoresRequired:
          $ref: "#/components/schemas/NumberOfCpuCores"
          description: The number of CPU cores to allocate to run a model that you assign to an inference component.
        NumberOfAcceleratorDevicesRequired:
          $ref: "#/components/schemas/NumberOfAcceleratorDevices"
          description: The number of accelerators to allocate to run a model that you assign to an inference component. Accelerators include GPUs and Amazon Web Services Inferentia.
        MinMemoryRequiredInMb:
          $ref: "#/components/schemas/MemoryInMb"
          description: The minimum MB of memory to allocate to run a model that you assign to an inference component.
        MaxMemoryRequiredInMb:
          $ref: "#/components/schemas/MemoryInMb"
          description: The maximum MB of memory to allocate to run a model that you assign to an inference component.
      required:
        - MinMemoryRequiredInMb
    NumberOfCpuCores:
      type: number
      format: float
      minimum: 0.25
    NumberOfAcceleratorDevices:
      type: number
      format: float
      minimum: 1
    MemoryInMb:
      type: integer
      minimum: 128
    InferenceComponentDataCacheConfig:
      description: Settings that affect how the inference component caches data.
      type: object
      properties:
        EnableCaching:
          $ref: "#/components/schemas/EnableCaching"
          description: Sets whether the endpoint that hosts the inference component caches the model artifacts and container image. With caching enabled, the endpoint caches this data in each instance that it provisions for the inference component. That way, the inference component deploys faster during the auto scaling process. If caching isn't enabled, the inference component takes longer to deploy because of the time it spends downloading the data.
      required:
        - EnableCaching
    EnableCaching:
      type: boolean
    InferenceComponentSchedulingConfig:
      description: The scheduling configuration that determines how inference component copies are placed across available instances when copies are added or removed.
      type: object
      properties:
        PlacementStrategy:
          $ref: "#/components/schemas/InferenceComponentPlacementStrategy"
          description: The strategy for placing inference component copies across available instances. If you also set AvailabilityZoneBalance, this strategy applies to placement within each Availability Zone. SPREAD Distributes copies evenly across available instances for better resilience. BINPACK Packs copies onto fewer instances to optimize resource utilization.
        AvailabilityZoneBalance:
          $ref: "#/components/schemas/InferenceComponentAvailabilityZoneBalance"
          description: Configuration for balancing inference component copies across Availability Zones.
      required:
        - PlacementStrategy
    InferenceComponentPlacementStrategy:
      type: string
      enum:
        - SPREAD
        - BINPACK
    InferenceComponentAvailabilityZoneBalance:
      description: Configuration for balancing inference component copies across Availability Zones.
      type: object
      properties:
        EnforcementMode:
          $ref: "#/components/schemas/AvailabilityZoneBalanceEnforcementMode"
          description: Determines how strictly the Availability Zone balance constraint is enforced. PERMISSIVE The endpoint attempts to balance copies across Availability Zones but proceeds with scheduling even if balance can't be achieved due to available capacity or instance distribution across Availability Zones.
        MaxImbalance:
          $ref: "#/components/schemas/AvailabilityZoneBalanceMaxImbalance"
          description: "The maximum allowed difference in the number of inference component copies between any two Availability Zones. This parameter applies only when the endpoint has instances across two or more Availability Zones. A copy placement is allowed if it reduces imbalance or the resulting imbalance is within this value. Default value: 0."
      required:
        - EnforcementMode
    AvailabilityZoneBalanceEnforcementMode:
      type: string
      enum:
        - PERMISSIVE
    AvailabilityZoneBalanceMaxImbalance:
      type: integer
      minimum: 0
      maximum: 100
    InferenceComponentSpecificationList:
      type: array
      items:
        $ref: "#/components/schemas/InferenceComponentSpecification"
    InferenceComponentRuntimeConfig:
      description: Runtime settings for a model that is deployed with an inference component.
      type: object
      properties:
        CopyCount:
          $ref: "#/components/schemas/InferenceComponentCopyCount"
          description: The number of runtime copies of the model container to deploy with the inference component. Each copy can serve inference requests.
      required:
        - CopyCount
    InferenceComponentCopyCount:
      type: integer
      minimum: 0
    CreateInferenceComponentOutput:
      type: object
      properties:
        InferenceComponentArn:
          $ref: "#/components/schemas/InferenceComponentArn"
          description: The Amazon Resource Name (ARN) of the inference component.
      required:
        - InferenceComponentArn
    InferenceComponentArn:
      type: string
      minLength: 20
      maxLength: 2048
    InferenceExperimentName:
      type: string
      minLength: 1
      maxLength: 120
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,119}"
    InferenceExperimentType:
      type: string
      enum:
        - ShadowMode
    InferenceExperimentSchedule:
      description: The start and end times of an inference experiment. The maximum duration that you can set for an inference experiment is 30 days.
      type: object
      properties:
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the inference experiment started or will start.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the inference experiment ended or will end.
    InferenceExperimentDescription:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: .*
    ModelVariantConfigList:
      type: array
      items:
        $ref: "#/components/schemas/ModelVariantConfig"
    ModelVariantConfig:
      description: Contains information about the deployment options of a model.
      type: object
      properties:
        ModelName:
          $ref: "#/components/schemas/ModelName"
          description: The name of the Amazon SageMaker Model entity.
        VariantName:
          $ref: "#/components/schemas/ModelVariantName"
          description: The name of the variant.
        InfrastructureConfig:
          $ref: "#/components/schemas/ModelInfrastructureConfig"
          description: The configuration for the infrastructure that the model will be deployed to.
      required:
        - ModelName
        - VariantName
        - InfrastructureConfig
    ModelVariantName:
      type: string
      minLength: 0
      maxLength: 63
      pattern: "[a-zA-Z0-9]([\\-a-zA-Z0-9]*[a-zA-Z0-9])?"
    ModelInfrastructureConfig:
      description: The configuration for the infrastructure that the model will be deployed to.
      type: object
      properties:
        InfrastructureType:
          $ref: "#/components/schemas/ModelInfrastructureType"
          description: "The inference option to which to deploy your model. Possible values are the following: RealTime: Deploy to real-time inference."
        RealTimeInferenceConfig:
          $ref: "#/components/schemas/RealTimeInferenceConfig"
          description: The infrastructure configuration for deploying the model to real-time inference.
      required:
        - InfrastructureType
        - RealTimeInferenceConfig
    ModelInfrastructureType:
      type: string
      enum:
        - RealTimeInference
    RealTimeInferenceConfig:
      description: The infrastructure configuration for deploying the model to a real-time inference endpoint.
      type: object
      properties:
        InstanceType:
          $ref: "#/components/schemas/ProductionVariantInstanceType"
          description: The instance type the model is deployed to.
        InstanceCount:
          $ref: "#/components/schemas/TaskCount"
          description: The number of instances of the type specified by InstanceType.
      required:
        - InstanceType
        - InstanceCount
    TaskCount:
      type: integer
      minimum: 0
    InferenceExperimentDataStorageConfig:
      description: The Amazon S3 location and configuration for storing inference request and response data.
      type: object
      properties:
        Destination:
          $ref: "#/components/schemas/DestinationS3Uri"
          description: The Amazon S3 bucket where the inference request and response data is stored.
        KmsKey:
          $ref: "#/components/schemas/KmsKeyId"
          description: The Amazon Web Services Key Management Service key that Amazon SageMaker uses to encrypt captured data at rest using Amazon S3 server-side encryption.
        ContentType:
          $ref: "#/components/schemas/CaptureContentTypeHeader"
      required:
        - Destination
    ShadowModeConfig:
      description: The configuration of ShadowMode inference experiment type, which specifies a production variant to take all the inference requests, and a shadow variant to which Amazon SageMaker replicates a percentage of the inference requests. For the shadow variant it also specifies the percentage of requests that Amazon SageMaker replicates.
      type: object
      properties:
        SourceModelVariantName:
          $ref: "#/components/schemas/ModelVariantName"
          description: The name of the production variant, which takes all the inference requests.
        ShadowModelVariants:
          $ref: "#/components/schemas/ShadowModelVariantConfigList"
          description: List of shadow variant configurations.
      required:
        - SourceModelVariantName
        - ShadowModelVariants
    ShadowModelVariantConfigList:
      type: array
      items:
        $ref: "#/components/schemas/ShadowModelVariantConfig"
    ShadowModelVariantConfig:
      description: The name and sampling percentage of a shadow variant.
      type: object
      properties:
        ShadowModelVariantName:
          $ref: "#/components/schemas/ModelVariantName"
          description: The name of the shadow variant.
        SamplingPercentage:
          $ref: "#/components/schemas/Percentage"
          description: The percentage of inference requests that Amazon SageMaker replicates from the production variant to the shadow variant.
      required:
        - ShadowModelVariantName
        - SamplingPercentage
    CreateInferenceExperimentResponse:
      type: object
      properties:
        InferenceExperimentArn:
          $ref: "#/components/schemas/InferenceExperimentArn"
          description: The ARN for your inference experiment.
      required:
        - InferenceExperimentArn
    InferenceExperimentArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:inference-experiment/.*
    RecommendationJobName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,63}"
    RecommendationJobType:
      type: string
      enum:
        - Default
        - Advanced
    RecommendationJobInputConfig:
      description: The input configuration of the recommendation job.
      type: object
      properties:
        ModelPackageVersionArn:
          $ref: "#/components/schemas/ModelPackageArn"
          description: The Amazon Resource Name (ARN) of a versioned model package.
        ModelName:
          $ref: "#/components/schemas/ModelName"
          description: The name of the created model.
        JobDurationInSeconds:
          $ref: "#/components/schemas/JobDurationInSeconds"
          description: Specifies the maximum duration of the job, in seconds. The maximum value is 18,000 seconds.
        TrafficPattern:
          $ref: "#/components/schemas/TrafficPattern"
          description: Specifies the traffic pattern of the job.
        ResourceLimit:
          $ref: "#/components/schemas/RecommendationJobResourceLimit"
          description: Defines the resource limit of the job.
        EndpointConfigurations:
          $ref: "#/components/schemas/EndpointInputConfigurations"
          description: Specifies the endpoint configuration to use for a job.
        VolumeKmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: 'The Amazon Resource Name (ARN) of a Amazon Web Services Key Management Service (Amazon Web Services KMS) key that Amazon SageMaker uses to encrypt data on the storage volume attached to the ML compute instance that hosts the endpoint. This key will be passed to SageMaker Hosting for endpoint creation. The SageMaker execution role must have kms:CreateGrant permission in order to encrypt data on the storage volume of the endpoints created for inference recommendation. The inference recommendation job will fail asynchronously during endpoint configuration creation if the role passed does not have kms:CreateGrant permission. The KmsKeyId can be any of the following formats: // KMS Key ID "1234abcd-12ab-34cd-56ef-1234567890ab" // Amazon Resource Name (ARN) of a KMS Key "arn:aws:kms:`<region>`:`<account>`:key/`<key-id-12ab-34cd-56ef-1234567890ab>`" // KMS Key Alias "alias/ExampleAlias" // Amazon Resource Name (ARN) of a KMS Key Alias "arn:aws:kms:`<region>`:`<account>`:alias/`<ExampleAlias>`" For more information about key identifiers, see Key identifiers (KeyID) in the Amazon Web Services Key Management Service (Amazon Web Services KMS) documentation.'
        ContainerConfig:
          $ref: "#/components/schemas/RecommendationJobContainerConfig"
          description: Specifies mandatory fields for running an Inference Recommender job. The fields specified in ContainerConfig override the corresponding fields in the model package.
        Endpoints:
          $ref: "#/components/schemas/Endpoints"
          description: Existing customer endpoints on which to run an Inference Recommender job.
        VpcConfig:
          $ref: "#/components/schemas/RecommendationJobVpcConfig"
          description: Inference Recommender provisions SageMaker endpoints with access to VPC in the inference recommendation job.
    JobDurationInSeconds:
      type: integer
      minimum: 1
    TrafficPattern:
      description: Defines the traffic pattern of the load test.
      type: object
      properties:
        TrafficType:
          $ref: "#/components/schemas/TrafficType"
          description: Defines the traffic patterns. Choose either PHASES or STAIRS.
        Phases:
          $ref: "#/components/schemas/Phases"
          description: Defines the phases traffic specification.
        Stairs:
          $ref: "#/components/schemas/Stairs"
          description: Defines the stairs traffic pattern.
    TrafficType:
      type: string
      enum:
        - PHASES
        - STAIRS
    Phases:
      type: array
      items:
        $ref: "#/components/schemas/Phase"
    Phase:
      description: Defines the traffic pattern.
      type: object
      properties:
        InitialNumberOfUsers:
          $ref: "#/components/schemas/InitialNumberOfUsers"
          description: Specifies how many concurrent users to start with. The value should be between 1 and 3.
        SpawnRate:
          $ref: "#/components/schemas/SpawnRate"
          description: Specified how many new users to spawn in a minute.
        DurationInSeconds:
          $ref: "#/components/schemas/TrafficDurationInSeconds"
          description: Specifies how long a traffic phase should be. For custom load tests, the value should be between 120 and 3600. This value should not exceed JobDurationInSeconds.
    InitialNumberOfUsers:
      type: integer
      minimum: 1
    SpawnRate:
      type: integer
      minimum: 0
    TrafficDurationInSeconds:
      type: integer
      minimum: 1
    Stairs:
      description: Defines the stairs traffic pattern for an Inference Recommender load test. This pattern type consists of multiple steps where the number of users increases at each step. Specify either the stairs or phases traffic pattern.
      type: object
      properties:
        DurationInSeconds:
          $ref: "#/components/schemas/TrafficDurationInSeconds"
          description: Defines how long each traffic step should be.
        NumberOfSteps:
          $ref: "#/components/schemas/NumberOfSteps"
          description: Specifies how many steps to perform during traffic.
        UsersPerStep:
          $ref: "#/components/schemas/UsersPerStep"
          description: Specifies how many new users to spawn in each step.
    NumberOfSteps:
      type: integer
      minimum: 1
    UsersPerStep:
      type: integer
      minimum: 1
      maximum: 3
    RecommendationJobResourceLimit:
      description: Specifies the maximum number of jobs that can run in parallel and the maximum number of jobs that can run.
      type: object
      properties:
        MaxNumberOfTests:
          $ref: "#/components/schemas/MaxNumberOfTests"
          description: Defines the maximum number of load tests.
        MaxParallelOfTests:
          $ref: "#/components/schemas/MaxParallelOfTests"
          description: Defines the maximum number of parallel load tests.
    MaxNumberOfTests:
      type: integer
      minimum: 1
    MaxParallelOfTests:
      type: integer
      minimum: 1
    EndpointInputConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/EndpointInputConfiguration"
    EndpointInputConfiguration:
      description: The endpoint configuration for the load test.
      type: object
      properties:
        InstanceType:
          $ref: "#/components/schemas/ProductionVariantInstanceType"
          description: The instance types to use for the load test.
        ServerlessConfig:
          $ref: "#/components/schemas/ProductionVariantServerlessConfig"
        InferenceSpecificationName:
          $ref: "#/components/schemas/InferenceSpecificationName"
          description: The inference specification name in the model package version.
        EnvironmentParameterRanges:
          $ref: "#/components/schemas/EnvironmentParameterRanges"
          description: The parameter you want to benchmark against.
    InferenceSpecificationName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,62}"
    EnvironmentParameterRanges:
      description: Specifies the range of environment parameters
      type: object
      properties:
        CategoricalParameterRanges:
          $ref: "#/components/schemas/CategoricalParameters"
          description: Specified a list of parameters for each category.
    CategoricalParameters:
      type: array
      items:
        $ref: "#/components/schemas/CategoricalParameter"
    CategoricalParameter:
      description: Environment parameters you want to benchmark your load test against.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String64"
          description: The Name of the environment variable.
        Value:
          $ref: "#/components/schemas/CategoricalParameterRangeValues"
          description: The list of values you can pass.
      required:
        - Name
        - Value
    String64:
      type: string
      minLength: 0
      maxLength: 64
    CategoricalParameterRangeValues:
      type: array
      items:
        $ref: "#/components/schemas/String128"
    String128:
      type: string
      minLength: 0
      maxLength: 128
    RecommendationJobContainerConfig:
      description: Specifies mandatory fields for running an Inference Recommender job directly in the CreateInferenceRecommendationsJob API. The fields specified in ContainerConfig override the corresponding fields in the model package. Use ContainerConfig if you want to specify these fields for the recommendation job but don't want to edit them in your model package.
      type: object
      properties:
        Domain:
          $ref: "#/components/schemas/String"
          description: "The machine learning domain of the model and its components. Valid Values: COMPUTER_VISION | NATURAL_LANGUAGE_PROCESSING | MACHINE_LEARNING"
        Task:
          $ref: "#/components/schemas/String"
          description: "The machine learning task that the model accomplishes. Valid Values: IMAGE_CLASSIFICATION | OBJECT_DETECTION | TEXT_GENERATION | IMAGE_SEGMENTATION | FILL_MASK | CLASSIFICATION | REGRESSION | OTHER"
        Framework:
          $ref: "#/components/schemas/String"
          description: "The machine learning framework of the container image. Valid Values: TENSORFLOW | PYTORCH | XGBOOST | SAGEMAKER-SCIKIT-LEARN"
        FrameworkVersion:
          $ref: "#/components/schemas/RecommendationJobFrameworkVersion"
          description: The framework version of the container image.
        PayloadConfig:
          $ref: "#/components/schemas/RecommendationJobPayloadConfig"
          description: Specifies the SamplePayloadUrl and all other sample payload-related fields.
        NearestModelName:
          $ref: "#/components/schemas/String"
          description: "The name of a pre-trained machine learning model benchmarked by Amazon SageMaker Inference Recommender that matches your model. Valid Values: efficientnetb7 | unet | xgboost | faster-rcnn-resnet101 | nasnetlarge | vgg16 | inception-v3 | mask-rcnn | sagemaker-scikit-learn | densenet201-gluon | resnet18v2-gluon | xception | densenet201 | yolov4 | resnet152 | bert-base-cased | xceptionV1-keras | resnet50 | retinanet"
        SupportedInstanceTypes:
          $ref: "#/components/schemas/RecommendationJobSupportedInstanceTypes"
          description: A list of the instance types that are used to generate inferences in real-time.
        SupportedEndpointType:
          $ref: "#/components/schemas/RecommendationJobSupportedEndpointType"
          description: The endpoint type to receive recommendations for. By default this is null, and the results of the inference recommendation job return a combined list of both real-time and serverless benchmarks. By specifying a value for this field, you can receive a longer list of benchmarks for the desired endpoint type.
        DataInputConfig:
          $ref: "#/components/schemas/RecommendationJobDataInputConfig"
          description: Specifies the name and shape of the expected data inputs for your trained model with a JSON dictionary form. This field is used for optimizing your model using SageMaker Neo. For more information, see DataInputConfig.
        SupportedResponseMIMETypes:
          $ref: "#/components/schemas/RecommendationJobSupportedResponseMIMETypes"
          description: The supported MIME types for the output data.
    RecommendationJobFrameworkVersion:
      type: string
      minLength: 3
      maxLength: 10
      pattern: "[0-9]\\.[A-Za-z0-9.-]+"
    RecommendationJobPayloadConfig:
      description: The configuration for the payload for a recommendation job.
      type: object
      properties:
        SamplePayloadUrl:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon Simple Storage Service (Amazon S3) path where the sample payload is stored. This path must point to a single gzip compressed tar archive (.tar.gz suffix).
        SupportedContentTypes:
          $ref: "#/components/schemas/RecommendationJobSupportedContentTypes"
          description: The supported MIME types for the input data.
    RecommendationJobSupportedContentTypes:
      type: array
      items:
        $ref: "#/components/schemas/RecommendationJobSupportedContentType"
    RecommendationJobSupportedContentType:
      type: string
      minLength: 0
      maxLength: 256
      pattern: .*
    RecommendationJobSupportedInstanceTypes:
      type: array
      items:
        $ref: "#/components/schemas/String"
    RecommendationJobSupportedEndpointType:
      type: string
      enum:
        - RealTime
        - Serverless
    RecommendationJobDataInputConfig:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[\\S\\s]+"
    RecommendationJobSupportedResponseMIMETypes:
      type: array
      items:
        $ref: "#/components/schemas/RecommendationJobSupportedResponseMIMEType"
    RecommendationJobSupportedResponseMIMEType:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[-\\w]+\\/.+"
    Endpoints:
      type: array
      items:
        $ref: "#/components/schemas/EndpointInfo"
    EndpointInfo:
      description: Details about a customer endpoint that was compared in an Inference Recommender job.
      type: object
      properties:
        EndpointName:
          $ref: "#/components/schemas/EndpointName"
          description: The name of a customer's endpoint.
    RecommendationJobVpcConfig:
      description: Inference Recommender provisions SageMaker endpoints with access to VPC in the inference recommendation job.
      type: object
      properties:
        SecurityGroupIds:
          $ref: "#/components/schemas/RecommendationJobVpcSecurityGroupIds"
          description: The VPC security group IDs. IDs have the form of sg-xxxxxxxx. Specify the security groups for the VPC that is specified in the Subnets field.
        Subnets:
          $ref: "#/components/schemas/RecommendationJobVpcSubnets"
          description: The ID of the subnets in the VPC to which you want to connect your model.
      required:
        - SecurityGroupIds
        - Subnets
    RecommendationJobVpcSecurityGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/RecommendationJobVpcSecurityGroupId"
    RecommendationJobVpcSecurityGroupId:
      type: string
      minLength: 0
      maxLength: 32
      pattern: "[-0-9a-zA-Z]+"
    RecommendationJobVpcSubnets:
      type: array
      items:
        $ref: "#/components/schemas/RecommendationJobVpcSubnetId"
    RecommendationJobVpcSubnetId:
      type: string
      minLength: 0
      maxLength: 32
      pattern: "[-0-9a-zA-Z]+"
    RecommendationJobDescription:
      type: string
      minLength: 0
      maxLength: 128
    RecommendationJobStoppingConditions:
      description: Specifies conditions for stopping a job. When a job reaches a stopping condition limit, SageMaker ends the job.
      type: object
      properties:
        MaxInvocations:
          $ref: "#/components/schemas/Integer"
          description: The maximum number of requests per minute expected for the endpoint.
        ModelLatencyThresholds:
          $ref: "#/components/schemas/ModelLatencyThresholds"
          description: The interval of time taken by a model to respond as viewed from SageMaker. The interval includes the local communication time taken to send the request and to fetch the response from the container of a model and the time taken to complete the inference in the container.
        FlatInvocations:
          $ref: "#/components/schemas/FlatInvocations"
          description: Stops a load test when the number of invocations (TPS) peaks and flattens, which means that the instance has reached capacity. The default value is Stop. If you want the load test to continue after invocations have flattened, set the value to Continue.
    Integer:
      type: integer
    ModelLatencyThresholds:
      type: array
      items:
        $ref: "#/components/schemas/ModelLatencyThreshold"
    ModelLatencyThreshold:
      description: The model latency threshold.
      type: object
      properties:
        Percentile:
          $ref: "#/components/schemas/String64"
          description: The model latency percentile threshold. Acceptable values are P95 and P99. For custom load tests, specify the value as P95.
        ValueInMilliseconds:
          $ref: "#/components/schemas/Integer"
          description: The model latency percentile value in milliseconds.
    FlatInvocations:
      type: string
      enum:
        - Continue
        - Stop
    RecommendationJobOutputConfig:
      description: Provides information about the output configuration for the compiled model.
      type: object
      properties:
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: 'The Amazon Resource Name (ARN) of a Amazon Web Services Key Management Service (Amazon Web Services KMS) key that Amazon SageMaker uses to encrypt your output artifacts with Amazon S3 server-side encryption. The SageMaker execution role must have kms:GenerateDataKey permission. The KmsKeyId can be any of the following formats: // KMS Key ID "1234abcd-12ab-34cd-56ef-1234567890ab" // Amazon Resource Name (ARN) of a KMS Key "arn:aws:kms:`<region>`:`<account>`:key/`<key-id-12ab-34cd-56ef-1234567890ab>`" // KMS Key Alias "alias/ExampleAlias" // Amazon Resource Name (ARN) of a KMS Key Alias "arn:aws:kms:`<region>`:`<account>`:alias/`<ExampleAlias>`" For more information about key identifiers, see Key identifiers (KeyID) in the Amazon Web Services Key Management Service (Amazon Web Services KMS) documentation.'
        CompiledOutputConfig:
          $ref: "#/components/schemas/RecommendationJobCompiledOutputConfig"
          description: Provides information about the output configuration for the compiled model.
    RecommendationJobCompiledOutputConfig:
      description: Provides information about the output configuration for the compiled model.
      type: object
      properties:
        S3OutputUri:
          $ref: "#/components/schemas/S3Uri"
          description: Identifies the Amazon S3 bucket where you want SageMaker to store the compiled model artifacts.
    CreateInferenceRecommendationsJobResponse:
      type: object
      properties:
        JobArn:
          $ref: "#/components/schemas/RecommendationJobArn"
          description: The Amazon Resource Name (ARN) of the recommendation job.
      required:
        - JobArn
    RecommendationJobArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:inference-recommendations-job/.*
    LabelingJobName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,62}"
    LabelAttributeName:
      type: string
      minLength: 1
      maxLength: 127
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,126}"
    LabelingJobInputConfig:
      description: Input configuration information for a labeling job.
      type: object
      properties:
        DataSource:
          $ref: "#/components/schemas/LabelingJobDataSource"
          description: The location of the input data.
        DataAttributes:
          $ref: "#/components/schemas/LabelingJobDataAttributes"
          description: Attributes of the data specified by the customer.
      required:
        - DataSource
    LabelingJobDataSource:
      description: "Provides information about the location of input data. You must specify at least one of the following: S3DataSource or SnsDataSource. Use SnsDataSource to specify an SNS input topic for a streaming labeling job. If you do not specify and SNS input topic ARN, Ground Truth will create a one-time labeling job. Use S3DataSource to specify an input manifest file for both streaming and one-time labeling jobs. Adding an S3DataSource is optional if you use SnsDataSource to create a streaming labeling job."
      type: object
      properties:
        S3DataSource:
          $ref: "#/components/schemas/LabelingJobS3DataSource"
          description: The Amazon S3 location of the input data objects.
        SnsDataSource:
          $ref: "#/components/schemas/LabelingJobSnsDataSource"
          description: An Amazon SNS data source used for streaming labeling jobs. To learn more, see Send Data to a Streaming Labeling Job.
    LabelingJobS3DataSource:
      description: The Amazon S3 location of the input data objects.
      type: object
      properties:
        ManifestS3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: "The Amazon S3 location of the manifest file that describes the input data objects. The input manifest file referenced in ManifestS3Uri must contain one of the following keys: source-ref or source. The value of the keys are interpreted as follows: source-ref: The source of the object is the Amazon S3 object specified in the value. Use this value when the object is a binary object, such as an image. source: The source of the object is the value. Use this value when the object is a text value. If you are a new user of Ground Truth, it is recommended you review Use an Input Manifest File in the Amazon SageMaker Developer Guide to learn how to create an input manifest file."
      required:
        - ManifestS3Uri
    LabelingJobSnsDataSource:
      description: An Amazon SNS data source used for streaming labeling jobs.
      type: object
      properties:
        SnsTopicArn:
          $ref: "#/components/schemas/SnsTopicArn"
          description: The Amazon SNS input topic Amazon Resource Name (ARN). Specify the ARN of the input topic you will use to send new data objects to a streaming labeling job.
      required:
        - SnsTopicArn
    LabelingJobDataAttributes:
      description: Attributes of the data specified by the customer. Use these to describe the data to be labeled.
      type: object
      properties:
        ContentClassifiers:
          $ref: "#/components/schemas/ContentClassifiers"
          description: Declares that your content is free of personally identifiable information or adult content. SageMaker may restrict the Amazon Mechanical Turk workers that can view your task based on this information.
    ContentClassifiers:
      type: array
      items:
        $ref: "#/components/schemas/ContentClassifier"
    ContentClassifier:
      type: string
      enum:
        - FreeOfPersonallyIdentifiableInformation
        - FreeOfAdultContent
    LabelingJobOutputConfig:
      description: Output configuration information for a labeling job.
      type: object
      properties:
        S3OutputPath:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 location to write output data.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The Amazon Web Services Key Management Service ID of the key used to encrypt the output data, if any. If you provide your own KMS key ID, you must add the required permissions to your KMS key described in Encrypt Output Data and Storage Volume with Amazon Web Services KMS. If you don't provide a KMS key ID, Amazon SageMaker uses the default Amazon Web Services KMS key for Amazon S3 for your role's account to encrypt your output data. If you use a bucket policy with an s3:PutObject permission that only allows objects with server-side encryption, set the condition key of s3:x-amz-server-side-encryption to "aws:kms". For more information, see KMS-Managed Encryption Keys in the Amazon Simple Storage Service Developer Guide.
        SnsTopicArn:
          $ref: "#/components/schemas/SnsTopicArn"
          description: An Amazon Simple Notification Service (Amazon SNS) output topic ARN. Provide a SnsTopicArn if you want to do real time chaining to another streaming job and receive an Amazon SNS notifications each time a data object is submitted by a worker. If you provide an SnsTopicArn in OutputConfig, when workers complete labeling tasks, Ground Truth will send labeling task output data to the SNS output topic you specify here. To learn more, see Receive Output Data from a Streaming Labeling Job.
      required:
        - S3OutputPath
    LabelingJobStoppingConditions:
      description: A set of conditions for stopping a labeling job. If any of the conditions are met, the job is automatically stopped. You can use these conditions to control the cost of data labeling. Labeling jobs fail after 30 days with an appropriate client error message.
      type: object
      properties:
        MaxHumanLabeledObjectCount:
          $ref: "#/components/schemas/MaxHumanLabeledObjectCount"
          description: The maximum number of objects that can be labeled by human workers.
        MaxPercentageOfInputDatasetLabeled:
          $ref: "#/components/schemas/MaxPercentageOfInputDatasetLabeled"
          description: The maximum number of input data objects that should be labeled.
    MaxHumanLabeledObjectCount:
      type: integer
      minimum: 1
    MaxPercentageOfInputDatasetLabeled:
      type: integer
      minimum: 1
      maximum: 100
    LabelingJobAlgorithmsConfig:
      description: Provides configuration information for auto-labeling of your data objects. A LabelingJobAlgorithmsConfig object must be supplied in order to use auto-labeling.
      type: object
      properties:
        LabelingJobAlgorithmSpecificationArn:
          $ref: "#/components/schemas/LabelingJobAlgorithmSpecificationArn"
          description: "Specifies the Amazon Resource Name (ARN) of the algorithm used for auto-labeling. You must select one of the following ARNs: Image classification arn:aws:sagemaker:region:027400017018:labeling-job-algorithm-specification/image-classification Text classification arn:aws:sagemaker:region:027400017018:labeling-job-algorithm-specification/text-classification Object detection arn:aws:sagemaker:region:027400017018:labeling-job-algorithm-specification/object-detection Semantic Segmentation arn:aws:sagemaker:region:027400017018:labeling-job-algorithm-specification/semantic-segmentation"
        InitialActiveLearningModelArn:
          $ref: "#/components/schemas/ModelArn"
          description: At the end of an auto-label job Ground Truth sends the Amazon Resource Name (ARN) of the final model used for auto-labeling. You can use this model as the starting point for subsequent similar jobs by providing the ARN of the model here.
        LabelingJobResourceConfig:
          $ref: "#/components/schemas/LabelingJobResourceConfig"
          description: Provides configuration information for a labeling job.
      required:
        - LabelingJobAlgorithmSpecificationArn
    LabelingJobAlgorithmSpecificationArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:.*
    ModelArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:model/.*
    LabelingJobResourceConfig:
      description: Configure encryption on the storage volume attached to the ML compute instance used to run automated data labeling model training and inference.
      type: object
      properties:
        VolumeKmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: 'The Amazon Web Services Key Management Service (Amazon Web Services KMS) key that Amazon SageMaker uses to encrypt data on the storage volume attached to the ML compute instance(s) that run the training and inference jobs used for automated data labeling. You can only specify a VolumeKmsKeyId when you create a labeling job with automated data labeling enabled using the API operation CreateLabelingJob. You cannot specify an Amazon Web Services KMS key to encrypt the storage volume used for automated data labeling model training and inference when you create a labeling job using the console. To learn more, see Output Data and Storage Volume Encryption. The VolumeKmsKeyId can be any of the following formats: KMS Key ID "1234abcd-12ab-34cd-56ef-1234567890ab" Amazon Resource Name (ARN) of a KMS Key "arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab"'
        VpcConfig:
          $ref: "#/components/schemas/VpcConfig"
    HumanTaskConfig:
      description: Information required for human workers to complete a labeling task.
