    DescribeEndpointOutput:
      type: object
      properties:
        EndpointName:
          $ref: "#/components/schemas/EndpointName"
          description: Name of the endpoint.
        EndpointArn:
          $ref: "#/components/schemas/EndpointArn"
          description: The Amazon Resource Name (ARN) of the endpoint.
        EndpointConfigName:
          $ref: "#/components/schemas/EndpointConfigName"
          description: The name of the endpoint configuration associated with this endpoint.
        ProductionVariants:
          $ref: "#/components/schemas/ProductionVariantSummaryList"
          description: An array of ProductionVariantSummary objects, one for each model hosted behind this endpoint.
        DataCaptureConfig:
          $ref: "#/components/schemas/DataCaptureConfigSummary"
        EndpointStatus:
          $ref: "#/components/schemas/EndpointStatus"
          description: "The status of the endpoint. OutOfService: Endpoint is not available to take incoming requests. Creating: CreateEndpoint is executing. Updating: UpdateEndpoint or UpdateEndpointWeightsAndCapacities is executing. SystemUpdating: Endpoint is undergoing maintenance and cannot be updated or deleted or re-scaled until it has completed. This maintenance operation does not change any customer-specified values such as VPC config, KMS encryption, model, instance type, or instance count. RollingBack: Endpoint fails to scale up or down or change its variant weight and is in the process of rolling back to its previous configuration. Once the rollback completes, endpoint returns to an InService status. This transitional status only applies to an endpoint that has autoscaling enabled and is undergoing variant weight or capacity changes as part of an UpdateEndpointWeightsAndCapacities call or when the UpdateEndpointWeightsAndCapacities operation is called explicitly. InService: Endpoint is available to process incoming requests. Deleting: DeleteEndpoint is executing. Failed: Endpoint could not be created, updated, or re-scaled. Use the FailureReason value returned by DescribeEndpoint for information about the failure. DeleteEndpoint is the only operation that can be performed on a failed endpoint. UpdateRollbackFailed: Both the rolling deployment and auto-rollback failed. Your endpoint is in service with a mix of the old and new endpoint configurations. For information about how to remedy this issue and restore the endpoint's status to InService, see Rolling Deployments."
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: If the status of the endpoint is Failed, the reason why it failed.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that shows when the endpoint was created.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that shows when the endpoint was last modified.
        LastDeploymentConfig:
          $ref: "#/components/schemas/DeploymentConfig"
          description: The most recent deployment configuration for the endpoint.
        AsyncInferenceConfig:
          $ref: "#/components/schemas/AsyncInferenceConfig"
          description: Returns the description of an endpoint configuration created using the CreateEndpointConfig API.
        PendingDeploymentSummary:
          $ref: "#/components/schemas/PendingDeploymentSummary"
          description: Returns the summary of an in-progress deployment. This field is only returned when the endpoint is creating or updating with a new endpoint configuration.
        ExplainerConfig:
          $ref: "#/components/schemas/ExplainerConfig"
          description: The configuration parameters for an explainer.
        ShadowProductionVariants:
          $ref: "#/components/schemas/ProductionVariantSummaryList"
          description: An array of ProductionVariantSummary objects, one for each model that you want to host at this endpoint in shadow mode with production traffic replicated from the model specified on ProductionVariants.
        MetricsConfig:
          $ref: "#/components/schemas/MetricsConfig"
          description: The configuration parameters for utilization metrics.
      required:
        - EndpointName
        - EndpointArn
        - EndpointStatus
        - CreationTime
        - LastModifiedTime
