  /UpdateWorkforce:
    post:
      operationId: UpdateWorkforce
      description: Use this operation to update your workforce. You can use this operation to require that workers use specific IP addresses to work on tasks and to update your OpenID Connect (OIDC) Identity Provider (IdP) workforce configuration. The worker portal is now supported in VPC and public internet. Use SourceIpConfig to restrict worker access to tasks to a specific range of IP addresses. You specify allowed IP addresses by creating a list of up to ten CIDRs. By default, a workforce isn't restricted to specific IP addresses. If you specify a range of IP addresses, workers who attempt to access tasks using any IP address outside the specified range are denied and get a Not Found error message on the worker portal. To restrict public internet access for all workers, configure the SourceIpConfig CIDR value. For example, when using SourceIpConfig with an IpAddressType of IPv4, you can restrict access to the IPv4 CIDR block "10.0.0.0/16". When using an IpAddressType of dualstack, you can specify both the IPv4 and IPv6 CIDR blocks, such as "10.0.0.0/16" for IPv4 only, "2001:db8:1234:1a00::/56" for IPv6 only, or "10.0.0.0/16" and "2001:db8:1234:1a00::/56" for dual stack. Amazon SageMaker does not support Source Ip restriction for worker portals in VPC. Use OidcConfig to update the configuration of a workforce created using your own OIDC IdP. You can only update your OIDC IdP configuration when there are no work teams associated with your workforce. You can delete work teams using the DeleteWorkteam operation. After restricting access to a range of IP addresses or updating your OIDC IdP configuration with this operation, you can view details about your update workforce using the DescribeWorkforce operation. This operation only applies to private workforces.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.UpdateWorkforce
            default: SageMaker.UpdateWorkforce
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WorkforceName:
                  $ref: "#/components/schemas/WorkforceName"
                  description: The name of the private workforce that you want to update. You can find your workforce name by using the ListWorkforces operation.
                SourceIpConfig:
                  $ref: "#/components/schemas/SourceIpConfig"
                  description: "A list of one to ten worker IP address ranges (CIDRs) that can be used to access tasks assigned to this workforce. Maximum: Ten CIDR values"
                OidcConfig:
                  $ref: "#/components/schemas/OidcConfig"
                  description: Use this parameter to update your OIDC Identity Provider (IdP) configuration for a workforce made using your own IdP.
                WorkforceVpcConfig:
                  $ref: "#/components/schemas/WorkforceVpcConfigRequest"
                  description: Use this parameter to update your VPC configuration for a workforce.
                IpAddressType:
                  $ref: "#/components/schemas/WorkforceIpAddressType"
                  description: Use this parameter to specify whether you want IPv4 only or dualstack (IPv4 and IPv6) to support your labeling workforce.
              required:
                - WorkforceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkforceResponse"
  /UpdateWorkteam:
    post:
      operationId: UpdateWorkteam
      description: Updates an existing work team with new member definitions or description.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.UpdateWorkteam
            default: SageMaker.UpdateWorkteam
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WorkteamName:
                  $ref: "#/components/schemas/WorkteamName"
                  description: The name of the work team to update.
                MemberDefinitions:
                  $ref: "#/components/schemas/MemberDefinitions"
                  description: A list of MemberDefinition objects that contains objects that identify the workers that make up the work team. Workforces can be created using Amazon Cognito or your own OIDC Identity Provider (IdP). For private workforces created using Amazon Cognito use CognitoMemberDefinition. For workforces created using your own OIDC identity provider (IdP) use OidcMemberDefinition. You should not provide input for both of these parameters in a single request. For workforces created using Amazon Cognito, private work teams correspond to Amazon Cognito user groups within the user pool used to create a workforce. All of the CognitoMemberDefinition objects that make up the member definition must have the same ClientId and UserPool values. To add a Amazon Cognito user group to an existing worker pool, see Adding groups to a User Pool. For more information about user pools, see Amazon Cognito User Pools. For workforces created using your own OIDC IdP, specify the user groups that you want to include in your private work team in OidcMemberDefinition by listing those groups in Groups. Be aware that user groups that are already in the work team must also be listed in Groups when you make this request to remain on the work team. If you do not include these user groups, they will no longer be associated with the work team you update.
                Description:
                  $ref: "#/components/schemas/String200"
                  description: An updated description for the work team.
                NotificationConfiguration:
                  $ref: "#/components/schemas/NotificationConfiguration"
                  description: Configures SNS topic notifications for available or expiring work items
                WorkerAccessConfiguration:
                  $ref: "#/components/schemas/WorkerAccessConfiguration"
                  description: Use this optional parameter to constrain access to an Amazon S3 resource based on the IP address using supported IAM global condition keys. The Amazon S3 resource is accessed in the worker portal using a Amazon S3 presigned URL.
              required:
                - WorkteamName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkteamResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AssociationEntityArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:(experiment|experiment-trial-component|artifact|action|context)/.*
    AssociationEdgeType:
      type: string
      enum:
        - ContributedTo
        - AssociatedWith
        - DerivedFrom
        - Produced
        - SameAs
    AddAssociationResponse:
      type: object
      properties:
        SourceArn:
          $ref: "#/components/schemas/AssociationEntityArn"
          description: The ARN of the source.
        DestinationArn:
          $ref: "#/components/schemas/AssociationEntityArn"
          description: The Amazon Resource Name (ARN) of the destination.
    ResourceArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws[a-z-]*:sagemaker:[a-z0-9-]*:[0-9]{12}:.+
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "A tag object that consists of a key and an optional value, used to manage metadata for SageMaker Amazon Web Services resources. You can add tags to notebook instances, training jobs, hyperparameter tuning jobs, batch transform jobs, models, labeling jobs, work teams, endpoint configurations, and endpoints. For more information on adding tags to SageMaker resources, see AddTags. For more information on adding metadata to your Amazon Web Services resources with tagging, see Tagging Amazon Web Services resources. For advice on best practices for managing Amazon Web Services resources with tagging, see Tagging Best Practices: Implement an Effective Amazon Web Services Resource Tagging Strategy."
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The tag key. Tag keys must be unique per resource.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The tag value.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    AddTagsOutput:
      type: object
      properties:
        Tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tags associated with the SageMaker resource.
    ExperimentEntityName:
      type: string
      minLength: 1
      maxLength: 120
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,119}"
    AssociateTrialComponentResponse:
      type: object
      properties:
        TrialComponentArn:
          $ref: "#/components/schemas/TrialComponentArn"
          description: The Amazon Resource Name (ARN) of the trial component.
        TrialArn:
          $ref: "#/components/schemas/TrialArn"
          description: The Amazon Resource Name (ARN) of the trial.
    TrialComponentArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:experiment-trial-component/.*
    TrialArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:experiment-trial/.*
    ClusterArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:cluster/[a-z0-9]{12}
    ClusterNodeId:
      type: string
      minLength: 1
      maxLength: 256
      pattern: i-[a-f0-9]{8}(?:[a-f0-9]{9})?
    VolumeId:
      type: string
      minLength: 1
      maxLength: 256
      pattern: vol-[a-f0-9]{8}(?:[a-f0-9]{9})?
    AttachClusterNodeVolumeResponse:
      type: object
      properties:
        ClusterArn:
          $ref: "#/components/schemas/ClusterArn"
          description: The Amazon Resource Name (ARN) of your SageMaker HyperPod cluster where the volume attachment operation was performed.
        NodeId:
          $ref: "#/components/schemas/ClusterNodeId"
          description: The unique identifier of the cluster node where your volume was attached.
        VolumeId:
          $ref: "#/components/schemas/VolumeId"
          description: The unique identifier of your EBS volume that was attached.
        AttachTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the volume attachment operation was initiated by the SageMaker HyperPod service.
        Status:
          $ref: "#/components/schemas/VolumeAttachmentStatus"
          description: The current status of your volume attachment operation.
        DeviceName:
          $ref: "#/components/schemas/VolumeDeviceName"
          description: The device name assigned to your attached volume on the target instance.
      required:
        - ClusterArn
        - NodeId
        - VolumeId
        - AttachTime
        - Status
        - DeviceName
    Timestamp:
      type: string
      format: date-time
    VolumeAttachmentStatus:
      type: string
      enum:
        - attaching
        - attached
        - detaching
        - detached
        - busy
    VolumeDeviceName:
      type: string
      minLength: 1
      maxLength: 32
      pattern: /dev/(xvd[a-z]|sd[b-z]|sd[f-p][1-6])
    ClusterNameOrArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: (arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:cluster/[a-z0-9]{12})|([a-zA-Z0-9](-*[a-zA-Z0-9]){0,62})
