          description: The base model Amazon Resource Name (ARN) in SageMaker Public Hub. SageMaker always selects the latest version of the provided model.
        AcceptEula:
          $ref: "#/components/schemas/AcceptEula"
          description: Specifies agreement to the model end-user license agreement (EULA). The AcceptEula value must be explicitly defined as True in order to accept the EULA that this model requires. You are responsible for reviewing and complying with any applicable license terms and making sure they are acceptable for your use case before downloading or using a model. For more information, see End-user license agreements section for more details on accepting the EULA.
        JobType:
          $ref: "#/components/schemas/ServerlessJobType"
          description: The serverless training job type.
        CustomizationTechnique:
          $ref: "#/components/schemas/CustomizationTechnique"
          description: The model customization technique.
        Peft:
          $ref: "#/components/schemas/Peft"
          description: The parameter-efficient fine-tuning configuration.
        EvaluationType:
          $ref: "#/components/schemas/EvaluationType"
          description: The evaluation job type. Required when serverless job type is Evaluation.
        EvaluatorArn:
          $ref: "#/components/schemas/EvaluatorArn"
