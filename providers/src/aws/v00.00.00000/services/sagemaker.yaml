        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the experiment was last modified.
        LastModifiedBy:
          $ref: "#/components/schemas/UserContext"
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The list of tags that are associated with the experiment. You can use Search API to search on the tags.
    Trial:
