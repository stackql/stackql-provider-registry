          schema:
            type: string
            enum:
              - SageMaker.CreateInferenceExperiment
            default: SageMaker.CreateInferenceExperiment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/InferenceExperimentName"
                  description: The name for the inference experiment.
                Type:
                  $ref: "#/components/schemas/InferenceExperimentType"
                  description: "The type of the inference experiment that you want to run. The following types of experiments are possible: ShadowMode: You can use this type to validate a shadow variant. For more information, see Shadow tests."
                Schedule:
                  $ref: "#/components/schemas/InferenceExperimentSchedule"
                  description: The duration for which you want the inference experiment to run. If you don't specify this field, the experiment automatically starts immediately upon creation and concludes after 7 days.
                Description:
                  $ref: "#/components/schemas/InferenceExperimentDescription"
                  description: A description for the inference experiment.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The ARN of the IAM role that Amazon SageMaker can assume to access model artifacts and container images, and manage Amazon SageMaker Inference endpoints for model deployment.
                EndpointName:
                  $ref: "#/components/schemas/EndpointName"
                  description: The name of the Amazon SageMaker endpoint on which you want to run the inference experiment.
                ModelVariants:
                  $ref: "#/components/schemas/ModelVariantConfigList"
                  description: An array of ModelVariantConfig objects. There is one for each variant in the inference experiment. Each ModelVariantConfig object in the array describes the infrastructure configuration for the corresponding variant.
                DataStorageConfig:
                  $ref: "#/components/schemas/InferenceExperimentDataStorageConfig"
                  description: The Amazon S3 location and configuration for storing inference request and response data. This is an optional parameter that you can use for data capture. For more information, see Capture data.
                ShadowModeConfig:
                  $ref: "#/components/schemas/ShadowModeConfig"
                  description: The configuration of ShadowMode inference experiment type. Use this field to specify a production variant which takes all the inference requests, and a shadow variant to which Amazon SageMaker replicates a percentage of the inference requests. For the shadow variant also specify the percentage of requests that Amazon SageMaker replicates.
                KmsKey:
                  $ref: "#/components/schemas/KmsKeyId"
                  description: "The Amazon Web Services Key Management Service (Amazon Web Services KMS) key that Amazon SageMaker uses to encrypt data on the storage volume attached to the ML compute instance that hosts the endpoint. The KmsKey can be any of the following formats: KMS key ID \"1234abcd-12ab-34cd-56ef-1234567890ab\" Amazon Resource Name (ARN) of a KMS key \"arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab\" KMS key Alias \"alias/ExampleAlias\" Amazon Resource Name (ARN) of a KMS key Alias \"arn:aws:kms:us-west-2:111122223333:alias/ExampleAlias\" If you use a KMS key ID or an alias of your KMS key, the Amazon SageMaker execution role must include permissions to call kms:Encrypt. If you don't provide a KMS key ID, Amazon SageMaker uses the default KMS key for Amazon S3 for your role's account. Amazon SageMaker uses server-side encryption with KMS managed keys for OutputDataConfig. If you use a bucket policy with an s3:PutObject permission that only allows objects with server-side encryption, set the condition key of s3:x-amz-server-side-encryption to \"aws:kms\". For more information, see KMS managed Encryption Keys in the Amazon Simple Storage Service Developer Guide. The KMS key policy must grant permission to the IAM role that you specify in your CreateEndpoint and UpdateEndpoint requests. For more information, see Using Key Policies in Amazon Web Services KMS in the Amazon Web Services Key Management Service Developer Guide."
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Array of key-value pairs. You can use tags to categorize your Amazon Web Services resources in different ways, for example, by purpose, owner, or environment. For more information, see Tagging your Amazon Web Services Resources.
              required:
                - RoleArn
                - EndpointName
                - ModelVariants
                - ShadowModeConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInferenceExperimentResponse"
  /CreateInferenceRecommendationsJob:
    post:
      operationId: CreateInferenceRecommendationsJob
      description: Starts a recommendation job. You can create either an instance recommendation or load test job.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateInferenceRecommendationsJob
            default: SageMaker.CreateInferenceRecommendationsJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobName:
                  $ref: "#/components/schemas/RecommendationJobName"
                  description: A name for the recommendation job. The name must be unique within the Amazon Web Services Region and within your Amazon Web Services account. The job name is passed down to the resources created by the recommendation job. The names of resources (such as the model, endpoint configuration, endpoint, and compilation) that are prefixed with the job name are truncated at 40 characters.
                JobType:
                  $ref: "#/components/schemas/RecommendationJobType"
                  description: Defines the type of recommendation job. Specify Default to initiate an instance recommendation and Advanced to initiate a load test. If left unspecified, Amazon SageMaker Inference Recommender will run an instance recommendation (DEFAULT) job.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of an IAM role that enables Amazon SageMaker to perform tasks on your behalf.
                InputConfig:
                  $ref: "#/components/schemas/RecommendationJobInputConfig"
                  description: Provides information about the versioned model package Amazon Resource Name (ARN), the traffic pattern, and endpoint configurations.
                JobDescription:
                  $ref: "#/components/schemas/RecommendationJobDescription"
                  description: Description of the recommendation job.
                StoppingConditions:
                  $ref: "#/components/schemas/RecommendationJobStoppingConditions"
                  description: A set of conditions for stopping a recommendation job. If any of the conditions are met, the job is automatically stopped.
                OutputConfig:
                  $ref: "#/components/schemas/RecommendationJobOutputConfig"
                  description: Provides information about the output artifacts and the KMS key to use for Amazon S3 server-side encryption.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The metadata that you apply to Amazon Web Services resources to help you categorize and organize them. Each tag consists of a key and a value, both of which you define. For more information, see Tagging Amazon Web Services Resources in the Amazon Web Services General Reference.
              required:
