        Environment:
          type: object
          properties: {}
          description: Sets the environment variables in the Docker container.
      required:
        - ImageUri
        - ConfigUri
    ModelExplainabilityJobInput:
      description: Inputs for the model explainability job.
      type: object
      properties:
        EndpointInput:
          $ref: "#/components/schemas/EndpointInput"
        BatchTransformInput:
          $ref: "#/components/schemas/BatchTransformInput"
          description: Input object for the batch transform job.
    CreateModelExplainabilityJobDefinitionResponse:
      type: object
      properties:
        JobDefinitionArn:
          $ref: "#/components/schemas/MonitoringJobDefinitionArn"
          description: The Amazon Resource Name (ARN) of the model explainability job.
      required:
        - JobDefinitionArn
    ModelPackageRegistrationType:
      type: string
      enum:
        - Logged
        - Registered
    ModelPackageValidationSpecification:
      description: Specifies batch transform jobs that SageMaker runs to validate your model package.
      type: object
      properties:
        ValidationRole:
          $ref: "#/components/schemas/RoleArn"
          description: The IAM roles to be used for the validation of the model package.
        ValidationProfiles:
          $ref: "#/components/schemas/ModelPackageValidationProfiles"
          description: An array of ModelPackageValidationProfile objects, each of which specifies a batch transform job that SageMaker runs to validate your model package.
      required:
        - ValidationRole
        - ValidationProfiles
    ModelPackageValidationProfiles:
      type: array
      items:
        $ref: "#/components/schemas/ModelPackageValidationProfile"
    ModelPackageValidationProfile:
      description: Contains data, such as the inputs and targeted instance types that are used in the process of validating the model package. The data provided in the validation profile is made available to your buyers on Amazon Web Services Marketplace.
      type: object
      properties:
        ProfileName:
          $ref: "#/components/schemas/EntityName"
          description: The name of the profile for the model package.
        TransformJobDefinition:
          $ref: "#/components/schemas/TransformJobDefinition"
          description: The TransformJobDefinition object that describes the transform job used for the validation of the model package.
      required:
        - ProfileName
        - TransformJobDefinition
    SourceAlgorithmSpecification:
      description: A list of algorithms that were used to create a model package.
      type: object
      properties:
        SourceAlgorithms:
          $ref: "#/components/schemas/SourceAlgorithmList"
          description: A list of the algorithms that were used to create a model package.
      required:
        - SourceAlgorithms
    SourceAlgorithmList:
      type: array
      items:
        $ref: "#/components/schemas/SourceAlgorithm"
    SourceAlgorithm:
      description: Specifies an algorithm that was used to create the model package. The algorithm must be either an algorithm resource in your SageMaker account or an algorithm in Amazon Web Services Marketplace that you are subscribed to.
      type: object
      properties:
        ModelDataUrl:
          $ref: "#/components/schemas/Url"
          description: The Amazon S3 path where the model artifacts, which result from model training, are stored. This path must point to a single gzip compressed tar archive (.tar.gz suffix). The model artifacts must be in an S3 bucket that is in the same Amazon Web Services region as the algorithm.
        ModelDataSource:
          $ref: "#/components/schemas/ModelDataSource"
          description: Specifies the location of ML model data to deploy during endpoint creation.
        ModelDataETag:
          $ref: "#/components/schemas/String"
          description: The ETag associated with Model Data URL.
        AlgorithmName:
          $ref: "#/components/schemas/ArnOrName"
          description: The name of an algorithm that was used to create the model package. The algorithm must be either an algorithm resource in your SageMaker account or an algorithm in Amazon Web Services Marketplace that you are subscribed to.
      required:
        - AlgorithmName
    ModelApprovalStatus:
      type: string
      enum:
        - Approved
        - Rejected
        - PendingManualApproval
    ModelMetrics:
      description: Contains metrics captured from a model.
      type: object
      properties:
        ModelQuality:
          $ref: "#/components/schemas/ModelQuality"
          description: Metrics that measure the quality of a model.
        ModelDataQuality:
          $ref: "#/components/schemas/ModelDataQuality"
          description: Metrics that measure the quality of the input data for a model.
        Bias:
          $ref: "#/components/schemas/Bias"
          description: Metrics that measure bias in a model.
        Explainability:
          $ref: "#/components/schemas/Explainability"
          description: Metrics that help explain a model.
    ModelQuality:
      description: Model quality statistics and constraints.
      type: object
      properties:
        Statistics:
          $ref: "#/components/schemas/MetricsSource"
          description: Model quality statistics.
        Constraints:
          $ref: "#/components/schemas/MetricsSource"
          description: Model quality constraints.
    MetricsSource:
      description: Details about the metrics source.
      type: object
      properties:
        ContentType:
          $ref: "#/components/schemas/ContentType"
          description: The metric source content type.
        ContentDigest:
          $ref: "#/components/schemas/ContentDigest"
          description: The hash key used for the metrics source.
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The S3 URI for the metrics source.
      required:
        - ContentType
        - S3Uri
    ContentDigest:
      type: string
      minLength: 0
      maxLength: 72
      pattern: "[Ss][Hh][Aa]256:[0-9a-fA-F]{64}"
    ModelDataQuality:
      description: Data quality constraints and statistics for a model.
      type: object
      properties:
        Statistics:
          $ref: "#/components/schemas/MetricsSource"
          description: Data quality statistics for a model.
        Constraints:
          $ref: "#/components/schemas/MetricsSource"
          description: Data quality constraints for a model.
    Bias:
      description: Contains bias metrics for a model.
      type: object
      properties:
        Report:
          $ref: "#/components/schemas/MetricsSource"
          description: The bias report for a model
        PreTrainingReport:
          $ref: "#/components/schemas/MetricsSource"
          description: The pre-training bias report for a model.
        PostTrainingReport:
          $ref: "#/components/schemas/MetricsSource"
          description: The post-training bias report for a model.
    Explainability:
      description: Contains explainability metrics for a model.
      type: object
      properties:
        Report:
          $ref: "#/components/schemas/MetricsSource"
          description: The explainability report for a model.
    CustomerMetadataMap:
      type: object
      properties: {}
    DriftCheckBaselines:
      description: Represents the drift check baselines that can be used when the model monitor is set using the model package.
      type: object
      properties:
        Bias:
          $ref: "#/components/schemas/DriftCheckBias"
          description: Represents the drift check bias baselines that can be used when the model monitor is set using the model package.
        Explainability:
          $ref: "#/components/schemas/DriftCheckExplainability"
          description: Represents the drift check explainability baselines that can be used when the model monitor is set using the model package.
        ModelQuality:
          $ref: "#/components/schemas/DriftCheckModelQuality"
          description: Represents the drift check model quality baselines that can be used when the model monitor is set using the model package.
        ModelDataQuality:
          $ref: "#/components/schemas/DriftCheckModelDataQuality"
          description: Represents the drift check model data quality baselines that can be used when the model monitor is set using the model package.
    DriftCheckBias:
      description: Represents the drift check bias baselines that can be used when the model monitor is set using the model package.
      type: object
      properties:
        ConfigFile:
          $ref: "#/components/schemas/FileSource"
          description: The bias config file for a model.
        PreTrainingConstraints:
          $ref: "#/components/schemas/MetricsSource"
          description: The pre-training constraints.
        PostTrainingConstraints:
          $ref: "#/components/schemas/MetricsSource"
          description: The post-training constraints.
    FileSource:
      description: Contains details regarding the file source.
      type: object
      properties:
        ContentType:
          $ref: "#/components/schemas/ContentType"
          description: The type of content stored in the file source.
        ContentDigest:
          $ref: "#/components/schemas/ContentDigest"
          description: The digest of the file source.
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 URI for the file source.
      required:
        - S3Uri
    DriftCheckExplainability:
      description: Represents the drift check explainability baselines that can be used when the model monitor is set using the model package.
      type: object
      properties:
        Constraints:
          $ref: "#/components/schemas/MetricsSource"
          description: The drift check explainability constraints.
        ConfigFile:
          $ref: "#/components/schemas/FileSource"
          description: The explainability config file for the model.
    DriftCheckModelQuality:
      description: Represents the drift check model quality baselines that can be used when the model monitor is set using the model package.
      type: object
      properties:
        Statistics:
          $ref: "#/components/schemas/MetricsSource"
          description: The drift check model quality statistics.
        Constraints:
          $ref: "#/components/schemas/MetricsSource"
          description: The drift check model quality constraints.
    DriftCheckModelDataQuality:
      description: Represents the drift check data quality baselines that can be used when the model monitor is set using the model package.
      type: object
      properties:
        Statistics:
          $ref: "#/components/schemas/MetricsSource"
          description: The drift check model data quality statistics.
        Constraints:
          $ref: "#/components/schemas/MetricsSource"
          description: The drift check model data quality constraints.
    AdditionalInferenceSpecifications:
      type: array
      items:
        $ref: "#/components/schemas/AdditionalInferenceSpecificationDefinition"
    AdditionalInferenceSpecificationDefinition:
      description: A structure of additional Inference Specification. Additional Inference Specification specifies details about inference jobs that can be run with models based on this model package
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EntityName"
          description: A unique name to identify the additional inference specification. The name must be unique within the list of your additional inference specifications for a particular model package.
        Description:
          $ref: "#/components/schemas/EntityDescription"
          description: A description of the additional Inference specification
        Containers:
          $ref: "#/components/schemas/ModelPackageContainerDefinitionList"
          description: The Amazon ECR registry path of the Docker image that contains the inference code.
        SupportedTransformInstanceTypes:
          $ref: "#/components/schemas/TransformInstanceTypes"
          description: A list of the instance types on which a transformation job can be run or on which an endpoint can be deployed.
        SupportedRealtimeInferenceInstanceTypes:
          $ref: "#/components/schemas/RealtimeInferenceInstanceTypes"
          description: A list of the instance types that are used to generate inferences in real-time.
        SupportedContentTypes:
          $ref: "#/components/schemas/ContentTypes"
          description: The supported MIME types for the input data.
        SupportedResponseMIMETypes:
          $ref: "#/components/schemas/ResponseMIMETypes"
          description: The supported MIME types for the output data.
      required:
        - Name
        - Containers
    SkipModelValidation:
      type: string
      enum:
        - All
        - None
    ModelPackageSourceUri:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[\\p{L}\\p{M}\\p{Z}\\p{N}\\p{P}]{0,1024}"
    ModelPackageSecurityConfig:
      description: An optional Key Management Service key to encrypt, decrypt, and re-encrypt model package information for regulated workloads with highly sensitive data.
      type: object
      properties:
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The KMS Key ID (KMSKeyId) used for encryption of model package information.
      required:
        - KmsKeyId
    ModelPackageModelCard:
      description: The model card associated with the model package. Since ModelPackageModelCard is tied to a model package, it is a specific usage of a model card and its schema is simplified compared to the schema of ModelCard. The ModelPackageModelCard schema does not include model_package_details, and model_overview is composed of the model_creator and model_artifact properties. For more information about the model package model card schema, see Model package model card schema. For more information about the model card associated with the model package, see View the Details of a Model Version.
      type: object
      properties:
        ModelCardContent:
          $ref: "#/components/schemas/ModelCardContent"
          description: The content of the model card. The content must follow the schema described in Model Package Model Card Schema.
        ModelCardStatus:
          $ref: "#/components/schemas/ModelCardStatus"
          description: "The approval status of the model card within your organization. Different organizations might have different criteria for model card review and approval. Draft: The model card is a work in progress. PendingReview: The model card is pending review. Approved: The model card is approved. Archived: The model card is archived. No more updates can be made to the model card content. If you try to update the model card content, you will receive the message Model Card is in Archived state."
    ModelLifeCycle:
      description: A structure describing the current state of the model in its life cycle.
      type: object
      properties:
        Stage:
          $ref: "#/components/schemas/EntityName"
          description: The current stage in the model life cycle.
        StageStatus:
          $ref: "#/components/schemas/EntityName"
          description: The current status of a stage in model life cycle.
        StageDescription:
          $ref: "#/components/schemas/StageDescription"
          description: Describes the stage related details.
      required:
        - Stage
        - StageStatus
    StageDescription:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: .{0,1024}
    ManagedStorageType:
      type: string
      enum:
        - Restricted
    CreateModelPackageOutput:
      type: object
      properties:
        ModelPackageArn:
          $ref: "#/components/schemas/ModelPackageArn"
          description: The Amazon Resource Name (ARN) of the new model package.
      required:
        - ModelPackageArn
    ManagedConfiguration:
      description: The managed configuration of a model package group.
      type: object
      properties:
        ManagedStorageType:
          $ref: "#/components/schemas/ManagedStorageType"
          description: The storage type of the model package.
    CreateModelPackageGroupOutput:
      type: object
      properties:
        ModelPackageGroupArn:
          $ref: "#/components/schemas/ModelPackageGroupArn"
          description: The Amazon Resource Name (ARN) of the model group.
      required:
        - ModelPackageGroupArn
    ModelPackageGroupArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]{9,16}:[0-9]{12}:model-package-group/[\S]{1,2048}
    ModelQualityBaselineConfig:
      description: Configuration for monitoring constraints and monitoring statistics. These baseline resources are compared against the results of the current job from the series of jobs scheduled to collect data periodically.
      type: object
      properties:
        BaseliningJobName:
          $ref: "#/components/schemas/ProcessingJobName"
          description: The name of the job that performs baselining for the monitoring job.
        ConstraintsResource:
          $ref: "#/components/schemas/MonitoringConstraintsResource"
    ModelQualityAppSpecification:
      description: Container image configuration object for the monitoring job.
      type: object
      properties:
        ImageUri:
          $ref: "#/components/schemas/ImageUri"
          description: The address of the container image that the monitoring job runs.
        ContainerEntrypoint:
          $ref: "#/components/schemas/ContainerEntrypoint"
          description: Specifies the entrypoint for a container that the monitoring job runs.
        ContainerArguments:
          $ref: "#/components/schemas/MonitoringContainerArguments"
          description: An array of arguments for the container used to run the monitoring job.
        RecordPreprocessorSourceUri:
          $ref: "#/components/schemas/S3Uri"
          description: An Amazon S3 URI to a script that is called per row prior to running analysis. It can base64 decode the payload and convert it into a flattened JSON so that the built-in container can use the converted data. Applicable only for the built-in (first party) containers.
        PostAnalyticsProcessorSourceUri:
          $ref: "#/components/schemas/S3Uri"
          description: An Amazon S3 URI to a script that is called after analysis has been performed. Applicable only for the built-in (first party) containers.
        ProblemType:
          $ref: "#/components/schemas/MonitoringProblemType"
          description: The machine learning problem type of the model that the monitoring job monitors.
        Environment:
          type: object
          properties: {}
          description: Sets the environment variables in the container that the monitoring job runs.
      required:
        - ImageUri
    MonitoringProblemType:
      type: string
      enum:
        - BinaryClassification
        - MulticlassClassification
        - Regression
    ModelQualityJobInput:
      description: The input for the model quality monitoring job. Currently endpoints are supported for input for model quality monitoring jobs.
      type: object
      properties:
        EndpointInput:
          $ref: "#/components/schemas/EndpointInput"
        BatchTransformInput:
          $ref: "#/components/schemas/BatchTransformInput"
          description: Input object for the batch transform job.
        GroundTruthS3Input:
          $ref: "#/components/schemas/MonitoringGroundTruthS3Input"
          description: The ground truth label provided for the model.
      required:
        - GroundTruthS3Input
    CreateModelQualityJobDefinitionResponse:
      type: object
      properties:
        JobDefinitionArn:
          $ref: "#/components/schemas/MonitoringJobDefinitionArn"
          description: The Amazon Resource Name (ARN) of the model quality monitoring job.
      required:
        - JobDefinitionArn
    MonitoringScheduleName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,62}"
    MonitoringScheduleConfig:
      description: Configures the monitoring schedule and defines the monitoring job.
      type: object
      properties:
        ScheduleConfig:
          $ref: "#/components/schemas/ScheduleConfig"
          description: Configures the monitoring schedule.
        MonitoringJobDefinition:
          $ref: "#/components/schemas/MonitoringJobDefinition"
          description: Defines the monitoring job.
        MonitoringJobDefinitionName:
          $ref: "#/components/schemas/MonitoringJobDefinitionName"
          description: The name of the monitoring job definition to schedule.
        MonitoringType:
          $ref: "#/components/schemas/MonitoringType"
          description: The type of the monitoring job definition to schedule.
    ScheduleConfig:
      description: Configuration details about the monitoring schedule.
      type: object
      properties:
        ScheduleExpression:
          $ref: "#/components/schemas/ScheduleExpression"
          description: "A cron expression that describes details about the monitoring schedule. The supported cron expressions are: If you want to set the job to start every hour, use the following: Hourly: cron(0 * ? * * *) If you want to start the job daily: cron(0 [00-23] ? * * *) If you want to run the job one time, immediately, use the following keyword: NOW For example, the following are valid cron expressions: Daily at noon UTC: cron(0 12 ? * * *) Daily at midnight UTC: cron(0 0 ? * * *) To support running every 6, 12 hours, the following are also supported: cron(0 [00-23]/[01-24] ? * * *) For example, the following are valid cron expressions: Every 12 hours, starting at 5pm UTC: cron(0 17/12 ? * * *) Every two hours starting at midnight: cron(0 0/2 ? * * *) Even though the cron expression is set to start at 5PM UTC, note that there could be a delay of 0-20 minutes from the actual requested time to run the execution. We recommend that if you would like a daily schedule, you do not provide this parameter. Amazon SageMaker AI will pick a time for running every day. You can also specify the keyword NOW to run the monitoring job immediately, one time, without recurring."
        DataAnalysisStartTime:
          $ref: "#/components/schemas/String"
          description: 'Sets the start time for a monitoring job window. Express this time as an offset to the times that you schedule your monitoring jobs to run. You schedule monitoring jobs with the ScheduleExpression parameter. Specify this offset in ISO 8601 duration format. For example, if you want to monitor the five hours of data in your dataset that precede the start of each monitoring job, you would specify: "-PT5H". The start time that you specify must not precede the end time that you specify by more than 24 hours. You specify the end time with the DataAnalysisEndTime parameter. If you set ScheduleExpression to NOW, this parameter is required.'
        DataAnalysisEndTime:
          $ref: "#/components/schemas/String"
          description: 'Sets the end time for a monitoring job window. Express this time as an offset to the times that you schedule your monitoring jobs to run. You schedule monitoring jobs with the ScheduleExpression parameter. Specify this offset in ISO 8601 duration format. For example, if you want to end the window one hour before the start of each monitoring job, you would specify: "-PT1H". The end time that you specify must not follow the start time that you specify by more than 24 hours. You specify the start time with the DataAnalysisStartTime parameter. If you set ScheduleExpression to NOW, this parameter is required.'
      required:
        - ScheduleExpression
    ScheduleExpression:
      type: string
      minLength: 1
      maxLength: 256
    MonitoringJobDefinition:
      description: Defines the monitoring job.
      type: object
      properties:
        BaselineConfig:
          $ref: "#/components/schemas/MonitoringBaselineConfig"
          description: Baseline configuration used to validate that the data conforms to the specified constraints and statistics
        MonitoringInputs:
          $ref: "#/components/schemas/MonitoringInputs"
          description: The array of inputs for the monitoring job. Currently we support monitoring an Amazon SageMaker AI Endpoint.
        MonitoringOutputConfig:
          $ref: "#/components/schemas/MonitoringOutputConfig"
          description: The array of outputs from the monitoring job to be uploaded to Amazon S3.
        MonitoringResources:
          $ref: "#/components/schemas/MonitoringResources"
          description: Identifies the resources, ML compute instances, and ML storage volumes to deploy for a monitoring job. In distributed processing, you specify more than one instance.
        MonitoringAppSpecification:
          $ref: "#/components/schemas/MonitoringAppSpecification"
          description: Configures the monitoring job to run a specified Docker container image.
        StoppingCondition:
          $ref: "#/components/schemas/MonitoringStoppingCondition"
          description: Specifies a time limit for how long the monitoring job is allowed to run.
        Environment:
          type: object
          properties: {}
          description: Sets the environment variables in the Docker container.
        NetworkConfig:
          $ref: "#/components/schemas/NetworkConfig"
          description: Specifies networking options for an monitoring job.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of an IAM role that Amazon SageMaker AI can assume to perform tasks on your behalf.
      required:
        - MonitoringInputs
        - MonitoringOutputConfig
        - MonitoringResources
        - MonitoringAppSpecification
        - RoleArn
    MonitoringBaselineConfig:
      description: Configuration for monitoring constraints and monitoring statistics. These baseline resources are compared against the results of the current job from the series of jobs scheduled to collect data periodically.
      type: object
      properties:
        BaseliningJobName:
          $ref: "#/components/schemas/ProcessingJobName"
          description: The name of the job that performs baselining for the monitoring job.
        ConstraintsResource:
          $ref: "#/components/schemas/MonitoringConstraintsResource"
          description: The baseline constraint file in Amazon S3 that the current monitoring job should validated against.
        StatisticsResource:
          $ref: "#/components/schemas/MonitoringStatisticsResource"
          description: The baseline statistics file in Amazon S3 that the current monitoring job should be validated against.
    MonitoringInputs:
      type: array
      items:
        $ref: "#/components/schemas/MonitoringInput"
    MonitoringInput:
      description: The inputs for a monitoring job.
      type: object
      properties:
        EndpointInput:
          $ref: "#/components/schemas/EndpointInput"
          description: The endpoint for a monitoring job.
        BatchTransformInput:
          $ref: "#/components/schemas/BatchTransformInput"
          description: Input object for the batch transform job.
    MonitoringAppSpecification:
      description: Container image configuration object for the monitoring job.
      type: object
      properties:
        ImageUri:
          $ref: "#/components/schemas/ImageUri"
          description: The container image to be run by the monitoring job.
        ContainerEntrypoint:
          $ref: "#/components/schemas/ContainerEntrypoint"
          description: Specifies the entrypoint for a container used to run the monitoring job.
        ContainerArguments:
          $ref: "#/components/schemas/MonitoringContainerArguments"
          description: An array of arguments for the container used to run the monitoring job.
        RecordPreprocessorSourceUri:
          $ref: "#/components/schemas/S3Uri"
          description: An Amazon S3 URI to a script that is called per row prior to running analysis. It can base64 decode the payload and convert it into a flattened JSON so that the built-in container can use the converted data. Applicable only for the built-in (first party) containers.
        PostAnalyticsProcessorSourceUri:
          $ref: "#/components/schemas/S3Uri"
          description: An Amazon S3 URI to a script that is called after analysis has been performed. Applicable only for the built-in (first party) containers.
      required:
        - ImageUri
    NetworkConfig:
      description: Networking options for a job, such as network traffic encryption between containers, whether to allow inbound and outbound network calls to and from containers, and the VPC subnets and security groups to use for VPC-enabled jobs.
      type: object
      properties:
        EnableInterContainerTrafficEncryption:
          $ref: "#/components/schemas/Boolean"
          description: Whether to encrypt all communications between distributed processing jobs. Choose True to encrypt communications. Encryption provides greater security for distributed processing jobs, but the processing might take longer.
        EnableNetworkIsolation:
          $ref: "#/components/schemas/Boolean"
          description: Whether to allow inbound and outbound network calls to and from the containers used for the processing job.
        VpcConfig:
          $ref: "#/components/schemas/VpcConfig"
    MonitoringType:
      type: string
      enum:
        - DataQuality
        - ModelQuality
        - ModelBias
        - ModelExplainability
    CreateMonitoringScheduleResponse:
