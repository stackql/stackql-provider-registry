    MetricDefinitionList:
      type: array
      items:
        $ref: "#/components/schemas/MetricDefinition"
    MetricDefinition:
      description: Specifies a metric that the training algorithm writes to stderr or stdout. You can view these logs to understand how your training job performs and check for any errors encountered during training. SageMaker hyperparameter tuning captures all defined metrics. Specify one of the defined metrics to use as an objective metric using the TuningObjective parameter in the HyperParameterTrainingJobDefinition API to evaluate job performance during hyperparameter tuning.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/MetricName"
          description: The name of the metric.
        Regex:
          $ref: "#/components/schemas/MetricRegex"
          description: A regular expression that searches the output of a training job and gets the value of the metric. For more information about using regular expressions to define metrics, see Defining metrics and environment variables.
      required:
        - Name
        - Regex
    MetricName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: .+
    MetricRegex:
      type: string
      minLength: 1
      maxLength: 500
      pattern: .+
    ChannelSpecifications:
      type: array
      items:
        $ref: "#/components/schemas/ChannelSpecification"
    ChannelSpecification:
      description: Defines a named input source, called a channel, to be used by an algorithm.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ChannelName"
          description: The name of the channel.
        Description:
          $ref: "#/components/schemas/EntityDescription"
          description: A brief description of the channel.
        IsRequired:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the channel is required by the algorithm.
        SupportedContentTypes:
          $ref: "#/components/schemas/ContentTypes"
          description: The supported MIME types for the data.
        SupportedCompressionTypes:
          $ref: "#/components/schemas/CompressionTypes"
          description: The allowed compression types, if data compression is used.
        SupportedInputModes:
          $ref: "#/components/schemas/InputModes"
          description: The allowed input mode, either FILE or PIPE. In FILE mode, Amazon SageMaker copies the data from the input source onto the local Amazon Elastic Block Store (Amazon EBS) volumes before starting your training algorithm. This is the most commonly used input mode. In PIPE mode, Amazon SageMaker streams input data from the source directly to your algorithm without using the EBS volume.
      required:
        - Name
        - SupportedContentTypes
        - SupportedInputModes
    ChannelName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z0-9\\.\\-_]+"
    ContentTypes:
      type: array
      items:
        $ref: "#/components/schemas/ContentType"
    ContentType:
      type: string
      minLength: 0
      maxLength: 256
      pattern: .*
    CompressionTypes:
      type: array
      items:
        $ref: "#/components/schemas/CompressionType"
    CompressionType:
      type: string
      enum:
        - None
        - Gzip
    InputModes:
      type: array
      items:
        $ref: "#/components/schemas/TrainingInputMode"
    TrainingInputMode:
      description: The training input mode that the algorithm supports. For more information about input modes, see Algorithms. Pipe mode If an algorithm supports Pipe mode, Amazon SageMaker streams data directly from Amazon S3 to the container. File mode If an algorithm supports File mode, SageMaker downloads the training data from S3 to the provisioned ML storage volume, and mounts the directory to the Docker volume for the training container. You must provision the ML storage volume with sufficient capacity to accommodate the data downloaded from S3. In addition to the training data, the ML storage volume also stores the output model. The algorithm container uses the ML storage volume to also store intermediate information, if any. For distributed algorithms, training data is distributed uniformly. Your training duration is predictable if the input data objects sizes are approximately the same. SageMaker does not split the files any further for model training. If the object sizes are skewed, training won't be optimal as the data distribution is also skewed when one host in a training cluster is overloaded, thus becoming a bottleneck in training. FastFile mode If an algorithm supports FastFile mode, SageMaker streams data directly from S3 to the container with no code changes, and provides file system access to the data. Users can author their training script to interact with these files as if they were stored on disk. FastFile mode works best when the data is read sequentially. Augmented manifest files aren't supported. The startup time is lower when there are fewer files in the S3 bucket provided.
      type: string
      enum:
        - Pipe
        - File
        - FastFile
    HyperParameterTuningJobObjectives:
      type: array
      items:
        $ref: "#/components/schemas/HyperParameterTuningJobObjective"
    HyperParameterTuningJobObjective:
      description: Defines the objective metric for a hyperparameter tuning job. Hyperparameter tuning uses the value of this metric to evaluate the training jobs it launches, and returns the training job that results in either the highest or lowest value for this metric, depending on the value you specify for the Type parameter. If you want to define a custom objective metric, see Define metrics and environment variables.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/HyperParameterTuningJobObjectiveType"
          description: Whether to minimize or maximize the objective metric.
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the metric to use for the objective metric.
      required:
        - Type
        - MetricName
    HyperParameterTuningJobObjectiveType:
      type: string
      enum:
        - Maximize
        - Minimize
    AdditionalS3DataSource:
      description: A data source used for training or inference that is in addition to the input dataset or model data.
      type: object
      properties:
        S3DataType:
          $ref: "#/components/schemas/AdditionalS3DataSourceDataType"
          description: The data type of the additional data source that you specify for use in inference or training.
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The uniform resource identifier (URI) used to identify an additional data source used in inference or training.
        CompressionType:
          $ref: "#/components/schemas/CompressionType"
          description: The type of compression used for an additional data source used in inference or training. Specify None if your additional data source is not compressed.
        ETag:
          $ref: "#/components/schemas/String"
          description: The ETag associated with S3 URI.
      required:
        - S3DataType
        - S3Uri
    AdditionalS3DataSourceDataType:
      type: string
      enum:
        - S3Object
        - S3Prefix
    InferenceSpecification:
      description: Defines how to perform inference generation after a training job is run.
      type: object
      properties:
        Containers:
          $ref: "#/components/schemas/ModelPackageContainerDefinitionList"
          description: The Amazon ECR registry path of the Docker image that contains the inference code.
        SupportedTransformInstanceTypes:
          $ref: "#/components/schemas/TransformInstanceTypes"
          description: A list of the instance types on which a transformation job can be run or on which an endpoint can be deployed. This parameter is required for unversioned models, and optional for versioned models.
        SupportedRealtimeInferenceInstanceTypes:
          $ref: "#/components/schemas/RealtimeInferenceInstanceTypes"
          description: A list of the instance types that are used to generate inferences in real-time. This parameter is required for unversioned models, and optional for versioned models.
        SupportedContentTypes:
          $ref: "#/components/schemas/ContentTypes"
          description: The supported MIME types for the input data.
        SupportedResponseMIMETypes:
          $ref: "#/components/schemas/ResponseMIMETypes"
          description: The supported MIME types for the output data.
      required:
        - Containers
    ModelPackageContainerDefinitionList:
      type: array
      items:
        $ref: "#/components/schemas/ModelPackageContainerDefinition"
    ModelPackageContainerDefinition:
      description: Describes the Docker container for the model package.
      type: object
      properties:
        ContainerHostname:
          $ref: "#/components/schemas/ContainerHostname"
          description: The DNS host name for the Docker container.
        Image:
          $ref: "#/components/schemas/ContainerImage"
          description: The Amazon Elastic Container Registry (Amazon ECR) path where inference code is stored. If you are using your own custom algorithm instead of an algorithm provided by SageMaker, the inference code must meet SageMaker requirements. SageMaker supports both registry/repository[:tag] and registry/repository[@digest] image path formats. For more information, see Using Your Own Algorithms with Amazon SageMaker.
        ImageDigest:
          $ref: "#/components/schemas/ImageDigest"
          description: An MD5 hash of the training algorithm that identifies the Docker image used for training.
        ModelDataUrl:
          $ref: "#/components/schemas/Url"
          description: The Amazon S3 path where the model artifacts, which result from model training, are stored. This path must point to a single gzip compressed tar archive (.tar.gz suffix). The model artifacts must be in an S3 bucket that is in the same region as the model package.
        ModelDataSource:
          $ref: "#/components/schemas/ModelDataSource"
          description: Specifies the location of ML model data to deploy during endpoint creation.
        ProductId:
          $ref: "#/components/schemas/ProductId"
          description: The Amazon Web Services Marketplace product ID of the model package.
        Environment:
          type: object
          properties: {}
          description: The environment variables to set in the Docker container. Each key and value in the Environment string to string map can have length of up to 1024. We support up to 16 entries in the map.
        ModelInput:
          $ref: "#/components/schemas/ModelInput"
          description: A structure with Model Input details.
        Framework:
          $ref: "#/components/schemas/String"
          description: The machine learning framework of the model package container image.
        FrameworkVersion:
          $ref: "#/components/schemas/ModelPackageFrameworkVersion"
          description: The framework version of the Model Package Container Image.
        NearestModelName:
          $ref: "#/components/schemas/String"
          description: The name of a pre-trained machine learning benchmarked by Amazon SageMaker Inference Recommender model that matches your model. You can find a list of benchmarked models by calling ListModelMetadata.
        AdditionalModelDataSources:
          $ref: "#/components/schemas/AdditionalModelDataSources"
          description: Data sources that are available to your model in addition to the one that you specify for ModelDataSource when you use the CreateModelPackage action.
        AdditionalS3DataSource:
          $ref: "#/components/schemas/AdditionalS3DataSource"
          description: The additional data source that is used during inference in the Docker container for your model package.
        ModelDataETag:
          $ref: "#/components/schemas/String"
          description: The ETag associated with Model Data URL.
        IsCheckpoint:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the model data is a training checkpoint.
        BaseModel:
          $ref: "#/components/schemas/BaseModel"
          description: Identifies the foundation model that was used as the starting point for model customization.
    ContainerHostname:
      type: string
      minLength: 0
      maxLength: 63
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,62}"
    Url:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: (https|s3)://([^/]+)/?(.*)
    ModelDataSource:
      description: Specifies the location of ML model data to deploy. If specified, you must specify one and only one of the available data sources.
      type: object
      properties:
        S3DataSource:
          $ref: "#/components/schemas/S3ModelDataSource"
          description: Specifies the S3 location of ML model data to deploy.
    S3ModelDataSource:
      description: Specifies the S3 location of ML model data to deploy.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3ModelUri"
          description: Specifies the S3 path of ML model data to deploy.
        S3DataType:
          $ref: "#/components/schemas/S3ModelDataType"
          description: Specifies the type of ML model data to deploy. If you choose S3Prefix, S3Uri identifies a key name prefix. SageMaker uses all objects that match the specified key name prefix as part of the ML model data to deploy. A valid key name prefix identified by S3Uri always ends with a forward slash (/). If you choose S3Object, S3Uri identifies an object that is the ML model data to deploy.
        CompressionType:
          $ref: "#/components/schemas/ModelCompressionType"
          description: "Specifies how the ML model data is prepared. If you choose Gzip and choose S3Object as the value of S3DataType, S3Uri identifies an object that is a gzip-compressed TAR archive. SageMaker will attempt to decompress and untar the object during model deployment. If you choose None and chooose S3Object as the value of S3DataType, S3Uri identifies an object that represents an uncompressed ML model to deploy. If you choose None and choose S3Prefix as the value of S3DataType, S3Uri identifies a key name prefix, under which all objects represents the uncompressed ML model to deploy. If you choose None, then SageMaker will follow rules below when creating model data files under /opt/ml/model directory for use by your inference code: If you choose S3Object as the value of S3DataType, then SageMaker will split the key of the S3 object referenced by S3Uri by slash (/), and use the last part as the filename of the file holding the content of the S3 object. If you choose S3Prefix as the value of S3DataType, then for each S3 object under the key name pefix referenced by S3Uri, SageMaker will trim its key by the prefix, and use the remainder as the path (relative to /opt/ml/model) of the file holding the content of the S3 object. SageMaker will split the remainder by slash (/), using intermediate parts as directory names and the last part as filename of the file holding the content of the S3 object. Do not use any of the following as file names or directory names: An empty or blank string A string which contains null bytes A string longer than 255 bytes A single dot (.) A double dot (..) Ambiguous file names will result in model deployment failure. For example, if your uncompressed ML model consists of two S3 objects s3://mybucket/model/weights and s3://mybucket/model/weights/part1 and you specify s3://mybucket/model/ as the value of S3Uri and S3Prefix as the value of S3DataType, then it will result in name clash between /opt/ml/model/weights (a regular file) and /opt/ml/model/weights/ (a directory). Do not organize the model artifacts in S3 console using folders. When you create a folder in S3 console, S3 creates a 0-byte object with a key set to the folder name you provide. They key of the 0-byte object ends with a slash (/) which violates SageMaker restrictions on model artifact file names, leading to model deployment failure."
        ModelAccessConfig:
          $ref: "#/components/schemas/ModelAccessConfig"
          description: Specifies the access configuration file for the ML model. You can explicitly accept the model end-user license agreement (EULA) within the ModelAccessConfig. You are responsible for reviewing and complying with any applicable license terms and making sure they are acceptable for your use case before downloading or using a model.
        HubAccessConfig:
          $ref: "#/components/schemas/InferenceHubAccessConfig"
          description: Configuration information for hub access.
        ManifestS3Uri:
          $ref: "#/components/schemas/S3ModelUri"
          description: The Amazon S3 URI of the manifest file. The manifest file is a CSV file that stores the artifact locations.
        ETag:
          $ref: "#/components/schemas/String"
          description: The ETag associated with S3 URI.
        ManifestEtag:
          $ref: "#/components/schemas/String"
          description: The ETag associated with Manifest S3 URI.
      required:
        - S3Uri
        - S3DataType
        - CompressionType
    S3ModelUri:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: (https|s3)://([^/]+)/?(.*)
    S3ModelDataType:
      type: string
      enum:
        - S3Prefix
        - S3Object
    ModelCompressionType:
      type: string
      enum:
        - None
        - Gzip
    ModelAccessConfig:
      description: The access configuration file to control access to the ML model. You can explicitly accept the model end-user license agreement (EULA) within the ModelAccessConfig. If you are a Jumpstart user, see the End-user license agreements section for more details on accepting the EULA. If you are an AutoML user, see the Optional Parameters section of Create an AutoML job to fine-tune text generation models using the API for details on How to set the EULA acceptance when fine-tuning a model using the AutoML API.
      type: object
      properties:
        AcceptEula:
          $ref: "#/components/schemas/AcceptEula"
          description: Specifies agreement to the model end-user license agreement (EULA). The AcceptEula value must be explicitly defined as True in order to accept the EULA that this model requires. You are responsible for reviewing and complying with any applicable license terms and making sure they are acceptable for your use case before downloading or using a model.
      required:
        - AcceptEula
    AcceptEula:
      type: boolean
    InferenceHubAccessConfig:
      description: Configuration information specifying which hub contents have accessible deployment options.
      type: object
      properties:
        HubContentArn:
          $ref: "#/components/schemas/HubContentArn"
          description: The ARN of the hub content for which deployment access is allowed.
      required:
        - HubContentArn
    HubContentArn:
      type: string
      minLength: 0
      maxLength: 255
      pattern: .*
    ProductId:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9])*"
    ModelInput:
      description: Input object for the model.
      type: object
      properties:
        DataInputConfig:
          $ref: "#/components/schemas/DataInputConfig"
          description: The input configuration object for the model.
      required:
        - DataInputConfig
    DataInputConfig:
      type: string
      minLength: 1
      maxLength: 16384
      pattern: "[\\S\\s]+"
    ModelPackageFrameworkVersion:
      type: string
      minLength: 3
      maxLength: 10
      pattern: "[0-9]\\.[A-Za-z0-9.-]+"
    AdditionalModelDataSources:
      type: array
      items:
        $ref: "#/components/schemas/AdditionalModelDataSource"
    AdditionalModelDataSource:
      description: Data sources that are available to your model in addition to the one that you specify for ModelDataSource when you use the CreateModel action.
      type: object
      properties:
        ChannelName:
          $ref: "#/components/schemas/AdditionalModelChannelName"
          description: A custom name for this AdditionalModelDataSource object.
        S3DataSource:
          $ref: "#/components/schemas/S3ModelDataSource"
      required:
        - ChannelName
        - S3DataSource
    AdditionalModelChannelName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z0-9\\.\\-_]+"
    BaseModel:
      description: Identifies the foundation model that was used as the starting point for model customization.
      type: object
      properties:
        HubContentName:
          $ref: "#/components/schemas/HubContentName"
          description: The hub content name of the base model.
        HubContentVersion:
          $ref: "#/components/schemas/HubContentVersion"
          description: The hub content version of the base model.
        RecipeName:
          $ref: "#/components/schemas/RecipeName"
          description: The recipe name of the base model.
