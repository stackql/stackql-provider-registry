          $ref: "#/components/schemas/KmsKeyId"
          description: The Amazon Web Services KMS key ID SageMaker AI uses to encrypt data when storing it on the ML storage volume attached to the instance.
        NetworkInterfaceId:
          $ref: "#/components/schemas/NetworkInterfaceId"
          description: The network interface IDs that SageMaker AI created at the time of creating the instance.
        LastModifiedTime:
          $ref: "#/components/schemas/LastModifiedTime"
          description: A timestamp. Use this parameter to retrieve the time when the notebook instance was last modified.
