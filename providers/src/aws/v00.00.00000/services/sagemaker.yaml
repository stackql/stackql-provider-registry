        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: If the transform job failed, FailureReason describes why it failed. A transform job creates a log file, which includes error messages, and stores it as an Amazon S3 object. For more information, see Log Amazon SageMaker Events with Amazon CloudWatch.
        ModelName:
          $ref: "#/components/schemas/ModelName"
