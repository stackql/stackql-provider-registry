      type: object
      properties:
        NotificationTopicArn:
          $ref: "#/components/schemas/NotificationTopicArn"
          description: The ARN for the Amazon SNS topic to which notifications should be published.
    NotificationTopicArn:
      type: string
      pattern: arn:aws[a-z\-]*:sns:[a-z0-9\-]*:[0-9]{12}:[a-zA-Z0-9_.-]*
    WorkerAccessConfiguration:
      description: Use this optional parameter to constrain access to an Amazon S3 resource based on the IP address using supported IAM global condition keys. The Amazon S3 resource is accessed in the worker portal using a Amazon S3 presigned URL.
      type: object
      properties:
        S3Presign:
          $ref: "#/components/schemas/S3Presign"
          description: Defines any Amazon S3 resource constraints.
    S3Presign:
      description: This object defines the access restrictions to Amazon S3 resources that are included in custom worker task templates using the Liquid filter, grant_read_access. To learn more about how custom templates are created, see Create custom worker task templates.
      type: object
      properties:
        IamPolicyConstraints:
          $ref: "#/components/schemas/IamPolicyConstraints"
          description: Use this parameter to specify the allowed request source. Possible sources are either SourceIp or VpcSourceIp.
    IamPolicyConstraints:
      description: Use this parameter to specify a supported global condition key that is added to the IAM policy.
      type: object
      properties:
        SourceIp:
          $ref: "#/components/schemas/EnabledOrDisabled"
          description: When SourceIp is Enabled the worker's IP address when a task is rendered in the worker portal is added to the IAM policy as a Condition used to generate the Amazon S3 presigned URL. This IP address is checked by Amazon S3 and must match in order for the Amazon S3 resource to be rendered in the worker portal.
        VpcSourceIp:
          $ref: "#/components/schemas/EnabledOrDisabled"
          description: When VpcSourceIp is Enabled the worker's IP address when a task is rendered in private worker portal inside the VPC is added to the IAM policy as a Condition used to generate the Amazon S3 presigned URL. To render the task successfully Amazon S3 checks that the presigned URL is being accessed over an Amazon S3 VPC Endpoint, and that the worker's IP address matches the IP address in the IAM policy. To learn more about configuring private worker portal, see Use Amazon VPC mode from a private worker portal.
    EnabledOrDisabled:
      type: string
      enum:
        - Enabled
        - Disabled
