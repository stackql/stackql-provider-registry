          description: The total number of instances reserved in this training plan.
        AvailableInstanceCount:
          $ref: "#/components/schemas/AvailableInstanceCount"
          description: The number of instances currently available for use in this training plan.
        InUseInstanceCount:
          $ref: "#/components/schemas/InUseInstanceCount"
          description: The number of instances currently in use from this training plan.
        UnhealthyInstanceCount:
          $ref: "#/components/schemas/UnhealthyInstanceCount"
          description: The number of instances in the training plan that are currently in an unhealthy state.
        AvailableSpareInstanceCount:
