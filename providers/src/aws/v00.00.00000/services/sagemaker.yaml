    CreateLabelingJobResponse:
      type: object
      properties:
        LabelingJobArn:
          $ref: "#/components/schemas/LabelingJobArn"
          description: The Amazon Resource Name (ARN) of the labeling job. You use this ARN to identify the labeling job.
      required:
        - LabelingJobArn
    LabelingJobArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:labeling-job/.*
    MlflowAppName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,255}"
    ModelRegistrationMode:
      type: string
      enum:
        - AutoModelRegistrationEnabled
        - AutoModelRegistrationDisabled
    WeeklyMaintenanceWindowStart:
      type: string
      minLength: 0
      maxLength: 9
      pattern: (Mon|Tue|Wed|Thu|Fri|Sat|Sun):([01]\d|2[0-3]):([0-5]\d)
    AccountDefaultStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    DefaultDomainIdList:
      type: array
      items:
        $ref: "#/components/schemas/DomainId"
    CreateMlflowAppResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/MlflowAppArn"
          description: The ARN of the MLflow App.
    MlflowAppArn:
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:mlflow-app/.*
    TrackingServerName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,255}"
    TrackingServerSize:
      type: string
      enum:
        - Small
        - Medium
        - Large
    MlflowVersion:
      type: string
      minLength: 0
      maxLength: 16
      pattern: "[0-9]*.[0-9]*.[0-9]*"
    CreateMlflowTrackingServerResponse:
      type: object
      properties:
        TrackingServerArn:
          $ref: "#/components/schemas/TrackingServerArn"
          description: The ARN of the tracking server.
    TrackingServerArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:mlflow-tracking-server/.*
    ContainerDefinition:
      description: Describes the container, as part of model definition.
      type: object
      properties:
        ContainerHostname:
          $ref: "#/components/schemas/ContainerHostname"
          description: This parameter is ignored for models that contain only a PrimaryContainer. When a ContainerDefinition is part of an inference pipeline, the value of the parameter uniquely identifies the container for the purposes of logging and metrics. For information, see Use Logs and Metrics to Monitor an Inference Pipeline. If you don't specify a value for this parameter for a ContainerDefinition that is part of an inference pipeline, a unique name is automatically assigned based on the position of the ContainerDefinition in the pipeline. If you specify a value for the ContainerHostName for any ContainerDefinition that is part of an inference pipeline, you must specify a value for the ContainerHostName parameter of every ContainerDefinition in that pipeline.
        Image:
          $ref: "#/components/schemas/ContainerImage"
          description: The path where inference code is stored. This can be either in Amazon EC2 Container Registry or in a Docker registry that is accessible from the same VPC that you configure for your endpoint. If you are using your own custom algorithm instead of an algorithm provided by SageMaker, the inference code must meet SageMaker requirements. SageMaker supports both registry/repository[:tag] and registry/repository[@digest] image path formats. For more information, see Using Your Own Algorithms with Amazon SageMaker. The model artifacts in an Amazon S3 bucket and the Docker image for inference container in Amazon EC2 Container Registry must be in the same region as the model or endpoint you are creating.
        ImageConfig:
          $ref: "#/components/schemas/ImageConfig"
          description: Specifies whether the model container is in Amazon ECR or a private Docker registry accessible from your Amazon Virtual Private Cloud (VPC). For information about storing containers in a private Docker registry, see Use a Private Docker Registry for Real-Time Inference Containers. The model artifacts in an Amazon S3 bucket and the Docker image for inference container in Amazon EC2 Container Registry must be in the same region as the model or endpoint you are creating.
        Mode:
          $ref: "#/components/schemas/ContainerMode"
          description: Whether the container hosts a single model or multiple models.
        ModelDataUrl:
          $ref: "#/components/schemas/Url"
          description: The S3 path where the model artifacts, which result from model training, are stored. This path must point to a single gzip compressed tar archive (.tar.gz suffix). The S3 path is required for SageMaker built-in algorithms, but not if you use your own algorithms. For more information on built-in algorithms, see Common Parameters. The model artifacts must be in an S3 bucket that is in the same region as the model or endpoint you are creating. If you provide a value for this parameter, SageMaker uses Amazon Web Services Security Token Service to download model artifacts from the S3 path you provide. Amazon Web Services STS is activated in your Amazon Web Services account by default. If you previously deactivated Amazon Web Services STS for a region, you need to reactivate Amazon Web Services STS for that region. For more information, see Activating and Deactivating Amazon Web Services STS in an Amazon Web Services Region in the Amazon Web Services Identity and Access Management User Guide. If you use a built-in algorithm to create a model, SageMaker requires that you provide a S3 path to the model artifacts in ModelDataUrl.
        ModelDataSource:
          $ref: "#/components/schemas/ModelDataSource"
          description: Specifies the location of ML model data to deploy. Currently you cannot use ModelDataSource in conjunction with SageMaker batch transform, SageMaker serverless endpoints, SageMaker multi-model endpoints, and SageMaker Marketplace.
        AdditionalModelDataSources:
          $ref: "#/components/schemas/AdditionalModelDataSources"
          description: Data sources that are available to your model in addition to the one that you specify for ModelDataSource when you use the CreateModel action.
        Environment:
          type: object
          properties: {}
          description: The environment variables to set in the Docker container. Don't include any sensitive data in your environment variables. The maximum length of each key and value in the Environment map is 1024 bytes. The maximum length of all keys and values in the map, combined, is 32 KB. If you pass multiple containers to a CreateModel request, then the maximum length of all of their maps, combined, is also 32 KB.
        ModelPackageName:
          $ref: "#/components/schemas/VersionedArnOrName"
          description: The name or Amazon Resource Name (ARN) of the model package to use to create the model.
        InferenceSpecificationName:
          $ref: "#/components/schemas/InferenceSpecificationName"
          description: The inference specification name in the model package version.
        MultiModelConfig:
          $ref: "#/components/schemas/MultiModelConfig"
          description: Specifies additional configuration for multi-model endpoints.
    ImageConfig:
      description: Specifies whether the model container is in Amazon ECR or a private Docker registry accessible from your Amazon Virtual Private Cloud (VPC).
      type: object
      properties:
        RepositoryAccessMode:
          $ref: "#/components/schemas/RepositoryAccessMode"
          description: "Set this to one of the following values: Platform - The model image is hosted in Amazon ECR. Vpc - The model image is hosted in a private Docker registry in your VPC."
        RepositoryAuthConfig:
          $ref: "#/components/schemas/RepositoryAuthConfig"
          description: (Optional) Specifies an authentication configuration for the private docker registry where your model image is hosted. Specify a value for this property only if you specified Vpc as the value for the RepositoryAccessMode field, and the private Docker registry where the model image is hosted requires authentication.
      required:
        - RepositoryAccessMode
    RepositoryAccessMode:
      type: string
      enum:
        - Platform
        - Vpc
    RepositoryAuthConfig:
      description: Specifies an authentication configuration for the private docker registry where your model image is hosted. Specify a value for this property only if you specified Vpc as the value for the RepositoryAccessMode field of the ImageConfig object that you passed to a call to CreateModel and the private Docker registry where the model image is hosted requires authentication.
      type: object
      properties:
        RepositoryCredentialsProviderArn:
          $ref: "#/components/schemas/RepositoryCredentialsProviderArn"
          description: The Amazon Resource Name (ARN) of an Amazon Web Services Lambda function that provides credentials to authenticate to the private Docker registry where your model image is hosted. For information about how to create an Amazon Web Services Lambda function, see Create a Lambda function with the console in the Amazon Web Services Lambda Developer Guide.
      required:
        - RepositoryCredentialsProviderArn
    RepositoryCredentialsProviderArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: .*
    ContainerMode:
      type: string
      enum:
        - SingleModel
        - MultiModel
    VersionedArnOrName:
      type: string
      minLength: 1
      maxLength: 176
      pattern: (arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:[a-z\-]*\/)?([a-zA-Z0-9]([a-zA-Z0-9-]){0,62})(?<!-)(\/[0-9]{1,9})?
    MultiModelConfig:
      description: Specifies additional configuration for hosting multi-model endpoints.
      type: object
      properties:
        ModelCacheSetting:
          $ref: "#/components/schemas/ModelCacheSetting"
          description: Whether to cache models for a multi-model endpoint. By default, multi-model endpoints cache models so that a model does not have to be loaded into memory each time it is invoked. Some use cases do not benefit from model caching. For example, if an endpoint hosts a large number of models that are each invoked infrequently, the endpoint might perform better if you disable model caching. To disable model caching, set the value of this parameter to Disabled.
    ModelCacheSetting:
      type: string
      enum:
        - Enabled
        - Disabled
    ContainerDefinitionList:
      type: array
      items:
        $ref: "#/components/schemas/ContainerDefinition"
    InferenceExecutionConfig:
      description: Specifies details about how containers in a multi-container endpoint are run.
      type: object
      properties:
        Mode:
          $ref: "#/components/schemas/InferenceExecutionMode"
          description: How containers in a multi-container are run. The following values are valid. SERIAL - Containers run as a serial pipeline. DIRECT - Only the individual container that you specify is run.
      required:
        - Mode
    InferenceExecutionMode:
      type: string
      enum:
        - Serial
        - Direct
    CreateModelOutput:
      type: object
      properties:
        ModelArn:
          $ref: "#/components/schemas/ModelArn"
          description: The ARN of the model created in SageMaker.
      required:
        - ModelArn
    ModelBiasBaselineConfig:
      description: The configuration for a baseline model bias job.
      type: object
      properties:
        BaseliningJobName:
          $ref: "#/components/schemas/ProcessingJobName"
          description: The name of the baseline model bias job.
        ConstraintsResource:
          $ref: "#/components/schemas/MonitoringConstraintsResource"
    ModelBiasAppSpecification:
      description: Docker container image configuration object for the model bias job.
