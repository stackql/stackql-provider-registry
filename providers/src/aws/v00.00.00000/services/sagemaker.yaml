        - LabelingJobName
        - LabelingJobArn
        - InputConfig
        - OutputConfig
        - RoleArn
        - HumanTaskConfig
    LabelingJobStatus:
      type: string
      enum:
        - Initializing
        - InProgress
        - Completed
        - Failed
        - Stopping
        - Stopped
    LabelCounters:
