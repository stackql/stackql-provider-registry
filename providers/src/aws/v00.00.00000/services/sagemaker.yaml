  /CreateTrainingJob:
    post:
      operationId: CreateTrainingJob
      description: "Starts a model training job. After training completes, SageMaker saves the resulting model artifacts to an Amazon S3 location that you specify. If you choose to host your model using SageMaker hosting services, you can use the resulting model artifacts as part of the model. You can also use the artifacts in a machine learning service other than SageMaker, provided that you know how to use them for inference. In the request body, you provide the following: AlgorithmSpecification - Identifies the training algorithm to use. HyperParameters - Specify these algorithm-specific parameters to enable the estimation of model parameters during training. Hyperparameters can be tuned to optimize this learning process. For a list of hyperparameters for each training algorithm provided by SageMaker, see Algorithms. Do not include any security-sensitive information including account access IDs, secrets, or tokens in any hyperparameter fields. As part of the shared responsibility model, you are responsible for any potential exposure, unauthorized access, or compromise of your sensitive data if caused by security-sensitive information included in the request hyperparameter variable or plain text fields. InputDataConfig - Describes the input required by the training job and the Amazon S3, EFS, or FSx location where it is stored. OutputDataConfig - Identifies the Amazon S3 bucket where you want SageMaker to save the results of model training. ResourceConfig - Identifies the resources, ML compute instances, and ML storage volumes to deploy for model training. In distributed training, you specify more than one instance. EnableManagedSpotTraining - Optimize the cost of training machine learning models by up to 80% by using Amazon EC2 Spot instances. For more information, see Managed Spot Training. RoleArn - The Amazon Resource Name (ARN) that SageMaker assumes to perform tasks on your behalf during model training. You must grant this role the necessary permissions so that SageMaker can successfully complete model training. StoppingCondition - To help cap training costs, use MaxRuntimeInSeconds to set a time limit for training. Use MaxWaitTimeInSeconds to specify how long a managed spot training job has to complete. Environment - The environment variables to set in the Docker container. Do not include any security-sensitive information including account access IDs, secrets, or tokens in any environment fields. As part of the shared responsibility model, you are responsible for any potential exposure, unauthorized access, or compromise of your sensitive data if caused by security-sensitive information included in the request environment variable or plain text fields. RetryStrategy - The number of times to retry the job when the job fails due to an InternalServerError. For more information about SageMaker, see How It Works."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateTrainingJob
            default: SageMaker.CreateTrainingJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TrainingJobName:
                  $ref: "#/components/schemas/TrainingJobName"
                  description: The name of the training job. The name must be unique within an Amazon Web Services Region in an Amazon Web Services account.
                HyperParameters:
                  $ref: "#/components/schemas/HyperParameters"
                  description: Algorithm-specific parameters that influence the quality of the model. You set hyperparameters before you start the learning process. For a list of hyperparameters for each training algorithm provided by SageMaker, see Algorithms. You can specify a maximum of 100 hyperparameters. Each hyperparameter is a key-value pair. Each key and value is limited to 256 characters, as specified by the Length Constraint. Do not include any security-sensitive information including account access IDs, secrets, or tokens in any hyperparameter fields. As part of the shared responsibility model, you are responsible for any potential exposure, unauthorized access, or compromise of your sensitive data if caused by any security-sensitive information included in the request hyperparameter variable or plain text fields.
                AlgorithmSpecification:
                  $ref: "#/components/schemas/AlgorithmSpecification"
                  description: The registry path of the Docker image that contains the training algorithm and algorithm-specific metadata, including the input mode. For more information about algorithms provided by SageMaker, see Algorithms. For information about providing your own algorithms, see Using Your Own Algorithms with Amazon SageMaker.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of an IAM role that SageMaker can assume to perform tasks on your behalf. During model training, SageMaker needs your permission to read input data from an S3 bucket, download a Docker image that contains training code, write model artifacts to an S3 bucket, write logs to Amazon CloudWatch Logs, and publish metrics to Amazon CloudWatch. You grant permissions for all of these tasks to an IAM role. For more information, see SageMaker Roles. To be able to pass this role to SageMaker, the caller of this API must have the iam:PassRole permission.
                InputDataConfig:
                  $ref: "#/components/schemas/InputDataConfig"
                  description: "An array of Channel objects. Each channel is a named input source. InputDataConfig describes the input data and its location. Algorithms can accept input data from one or more channels. For example, an algorithm might have two channels of input data, training_data and validation_data. The configuration for each channel provides the S3, EFS, or FSx location where the input data is stored. It also provides information about the stored data: the MIME type, compression method, and whether the data is wrapped in RecordIO format. Depending on the input mode that the algorithm supports, SageMaker either copies input data files from an S3 bucket to a local directory in the Docker container, or makes it available as input streams. For example, if you specify an EFS location, input data files are available as input streams. They do not need to be downloaded. Your input must be in the same Amazon Web Services region as your training job."
                OutputDataConfig:
                  $ref: "#/components/schemas/OutputDataConfig"
                  description: Specifies the path to the S3 location where you want to store model artifacts. SageMaker creates subfolders for the artifacts.
                ResourceConfig:
                  $ref: "#/components/schemas/ResourceConfig"
                  description: The resources, including the ML compute instances and ML storage volumes, to use for model training. ML storage volumes store model artifacts and incremental states. Training algorithms might also use ML storage volumes for scratch space. If you want SageMaker to use the ML storage volume to store the training data, choose File as the TrainingInputMode in the algorithm specification. For distributed training algorithms, specify an instance count greater than 1.
                VpcConfig:
                  $ref: "#/components/schemas/VpcConfig"
                  description: A VpcConfig object that specifies the VPC that you want your training job to connect to. Control access to and from your training container by configuring the VPC. For more information, see Protect Training Jobs by Using an Amazon Virtual Private Cloud.
                StoppingCondition:
                  $ref: "#/components/schemas/StoppingCondition"
                  description: Specifies a limit to how long a model training job can run. It also specifies how long a managed Spot training job has to complete. When the job reaches the time limit, SageMaker ends the training job. Use this API to cap model training costs. To stop a job, SageMaker sends the algorithm the SIGTERM signal, which delays job termination for 120 seconds. Algorithms can use this 120-second window to save the model artifacts, so the results of training are not lost.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key-value pairs. You can use tags to categorize your Amazon Web Services resources in different ways, for example, by purpose, owner, or environment. For more information, see Tagging Amazon Web Services Resources. Do not include any security-sensitive information including account access IDs, secrets, or tokens in any tags. As part of the shared responsibility model, you are responsible for any potential exposure, unauthorized access, or compromise of your sensitive data if caused by any security-sensitive information included in the request tag variable or plain text fields.
                EnableNetworkIsolation:
                  $ref: "#/components/schemas/Boolean"
                  description: Isolates the training container. No inbound or outbound network calls can be made, except for calls between peers within a training cluster for distributed training. If you enable network isolation for training jobs that are configured to use a VPC, SageMaker downloads and uploads customer data and model artifacts through the specified VPC, but the training container does not have network access.
                EnableInterContainerTrafficEncryption:
                  $ref: "#/components/schemas/Boolean"
                  description: To encrypt all communications between ML compute instances in distributed training, choose True. Encryption provides greater security for distributed training, but training might take longer. How long it takes depends on the amount of communication between compute instances, especially if you use a deep learning algorithm in distributed training. For more information, see Protect Communications Between ML Compute Instances in a Distributed Training Job.
                EnableManagedSpotTraining:
                  $ref: "#/components/schemas/Boolean"
                  description: To train models using managed spot training, choose True. Managed spot training provides a fully managed and scalable infrastructure for training machine learning models. this option is useful when training jobs can be interrupted and when there is flexibility when the training job is run. The complete and intermediate results of jobs are stored in an Amazon S3 bucket, and can be used as a starting point to train models incrementally. Amazon SageMaker provides metrics and logs in CloudWatch. They can be used to see when managed spot training jobs are running, interrupted, resumed, or completed.
                CheckpointConfig:
                  $ref: "#/components/schemas/CheckpointConfig"
                  description: Contains information about the output location for managed spot training checkpoint data.
                DebugHookConfig:
                  $ref: "#/components/schemas/DebugHookConfig"
                DebugRuleConfigurations:
                  $ref: "#/components/schemas/DebugRuleConfigurations"
                  description: Configuration information for Amazon SageMaker Debugger rules for debugging output tensors.
                TensorBoardOutputConfig:
                  $ref: "#/components/schemas/TensorBoardOutputConfig"
                ExperimentConfig:
                  $ref: "#/components/schemas/ExperimentConfig"
                ProfilerConfig:
                  $ref: "#/components/schemas/ProfilerConfig"
                ProfilerRuleConfigurations:
                  $ref: "#/components/schemas/ProfilerRuleConfigurations"
                  description: Configuration information for Amazon SageMaker Debugger rules for profiling system and framework metrics.
                Environment:
                  $ref: "#/components/schemas/TrainingEnvironmentMap"
                  description: The environment variables to set in the Docker container. Do not include any security-sensitive information including account access IDs, secrets, or tokens in any environment fields. As part of the shared responsibility model, you are responsible for any potential exposure, unauthorized access, or compromise of your sensitive data if caused by security-sensitive information included in the request environment variable or plain text fields.
                RetryStrategy:
                  $ref: "#/components/schemas/RetryStrategy"
                  description: The number of times to retry the job when the job fails due to an InternalServerError.
                RemoteDebugConfig:
                  $ref: "#/components/schemas/RemoteDebugConfig"
                  description: Configuration for remote debugging. To learn more about the remote debugging functionality of SageMaker, see Access a training container through Amazon Web Services Systems Manager (SSM) for remote debugging.
                InfraCheckConfig:
                  $ref: "#/components/schemas/InfraCheckConfig"
                  description: Contains information about the infrastructure health check configuration for the training job.
                SessionChainingConfig:
                  $ref: "#/components/schemas/SessionChainingConfig"
                  description: Contains information about attribute-based access control (ABAC) for the training job.
                ServerlessJobConfig:
                  $ref: "#/components/schemas/ServerlessJobConfig"
                  description: The configuration for serverless training jobs.
                MlflowConfig:
                  $ref: "#/components/schemas/MlflowConfig"
                  description: The MLflow configuration using SageMaker managed MLflow.
                ModelPackageConfig:
                  $ref: "#/components/schemas/ModelPackageConfig"
                  description: The configuration for the model package.
              required:
                - TrainingJobName
                - RoleArn
                - OutputDataConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTrainingJobResponse"
  /CreateTrainingPlan:
    post:
      operationId: CreateTrainingPlan
      description: "Creates a new training plan in SageMaker to reserve compute capacity. Amazon SageMaker Training Plan is a capability within SageMaker that allows customers to reserve and manage GPU capacity for large-scale AI model training. It provides a way to secure predictable access to computational resources within specific timelines and budgets, without the need to manage underlying infrastructure. How it works Plans can be created for specific resources such as SageMaker Training Jobs or SageMaker HyperPod clusters, automatically provisioning resources, setting up infrastructure, executing workloads, and handling infrastructure failures. Plan creation workflow Users search for available plan offerings based on their requirements (e.g., instance type, count, start time, duration) using the SearchTrainingPlanOfferings API operation. They create a plan that best matches their needs using the ID of the plan offering they want to use. After successful upfront payment, the plan's status becomes Scheduled. The plan can be used to: Queue training jobs. Allocate to an instance group of a SageMaker HyperPod cluster. When the plan start date arrives, it becomes Active. Based on available reserved capacity: Training jobs are launched. Instance groups are provisioned. Plan composition A plan can consist of one or more Reserved Capacities, each defined by a specific instance type, quantity, Availability Zone, duration, and start and end times. For more information about Reserved Capacity, see ReservedCapacitySummary ."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateTrainingPlan
            default: SageMaker.CreateTrainingPlan
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TrainingPlanName:
                  $ref: "#/components/schemas/TrainingPlanName"
                  description: The name of the training plan to create.
                TrainingPlanOfferingId:
                  $ref: "#/components/schemas/TrainingPlanOfferingId"
                  description: The unique identifier of the training plan offering to use for creating this plan.
                SpareInstanceCountPerUltraServer:
                  $ref: "#/components/schemas/SpareInstanceCountPerUltraServer"
                  description: Number of spare instances to reserve per UltraServer for enhanced resiliency. Default is 1.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key-value pairs to apply to this training plan.
              required:
                - TrainingPlanName
                - TrainingPlanOfferingId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTrainingPlanResponse"
  /CreateTransformJob:
    post:
      operationId: CreateTransformJob
      description: "Starts a transform job. A transform job uses a trained model to get inferences on a dataset and saves these results to an Amazon S3 location that you specify. To perform batch transformations, you create a transform job and use the data that you have readily available. In the request body, you provide the following: TransformJobName - Identifies the transform job. The name must be unique within an Amazon Web Services Region in an Amazon Web Services account. ModelName - Identifies the model to use. ModelName must be the name of an existing Amazon SageMaker model in the same Amazon Web Services Region and Amazon Web Services account. For information on creating a model, see CreateModel. TransformInput - Describes the dataset to be transformed and the Amazon S3 location where it is stored. TransformOutput - Identifies the Amazon S3 location where you want Amazon SageMaker to save the results from the transform job. TransformResources - Identifies the ML compute instances and AMI image versions for the transform job. For more information about how batch transformation works, see Batch Transform."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateTransformJob
            default: SageMaker.CreateTransformJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TransformJobName:
                  $ref: "#/components/schemas/TransformJobName"
                  description: The name of the transform job. The name must be unique within an Amazon Web Services Region in an Amazon Web Services account.
                ModelName:
                  $ref: "#/components/schemas/ModelName"
                  description: The name of the model that you want to use for the transform job. ModelName must be the name of an existing Amazon SageMaker model within an Amazon Web Services Region in an Amazon Web Services account.
                MaxConcurrentTransforms:
                  $ref: "#/components/schemas/MaxConcurrentTransforms"
                  description: The maximum number of parallel requests that can be sent to each instance in a transform job. If MaxConcurrentTransforms is set to 0 or left unset, Amazon SageMaker checks the optional execution-parameters to determine the settings for your chosen algorithm. If the execution-parameters endpoint is not enabled, the default value is 1. For more information on execution-parameters, see How Containers Serve Requests. For built-in algorithms, you don't need to set a value for MaxConcurrentTransforms.
                ModelClientConfig:
                  $ref: "#/components/schemas/ModelClientConfig"
                  description: Configures the timeout and maximum number of retries for processing a transform job invocation.
                MaxPayloadInMB:
                  $ref: "#/components/schemas/MaxPayloadInMB"
                  description: The maximum allowed size of the payload, in MB. A payload is the data portion of a record (without metadata). The value in MaxPayloadInMB must be greater than, or equal to, the size of a single record. To estimate the size of a record in MB, divide the size of your dataset by the number of records. To ensure that the records fit within the maximum payload size, we recommend using a slightly larger value. The default value is 6 MB. The value of MaxPayloadInMB cannot be greater than 100 MB. If you specify the MaxConcurrentTransforms parameter, the value of (MaxConcurrentTransforms * MaxPayloadInMB) also cannot exceed 100 MB. For cases where the payload might be arbitrarily large and is transmitted using HTTP chunked encoding, set the value to 0. This feature works only in supported algorithms. Currently, Amazon SageMaker built-in algorithms do not support HTTP chunked encoding.
                BatchStrategy:
                  $ref: "#/components/schemas/BatchStrategy"
                  description: Specifies the number of records to include in a mini-batch for an HTTP inference request. A record is a single unit of input data that inference can be made on. For example, a single line in a CSV file is a record. To enable the batch strategy, you must set the SplitType property to Line, RecordIO, or TFRecord. To use only one record when making an HTTP invocation request to a container, set BatchStrategy to SingleRecord and SplitType to Line. To fit as many records in a mini-batch as can fit within the MaxPayloadInMB limit, set BatchStrategy to MultiRecord and SplitType to Line.
                Environment:
                  $ref: "#/components/schemas/TransformEnvironmentMap"
                  description: The environment variables to set in the Docker container. Don't include any sensitive data in your environment variables. We support up to 16 key and values entries in the map.
                TransformInput:
                  $ref: "#/components/schemas/TransformInput"
                  description: Describes the input source and the way the transform job consumes it.
                TransformOutput:
                  $ref: "#/components/schemas/TransformOutput"
                  description: Describes the results of the transform job.
                DataCaptureConfig:
                  $ref: "#/components/schemas/BatchDataCaptureConfig"
                  description: Configuration to control how SageMaker captures inference data.
                TransformResources:
                  $ref: "#/components/schemas/TransformResources"
                  description: Describes the resources, including ML instance types and ML instance count, to use for the transform job.
                DataProcessing:
                  $ref: "#/components/schemas/DataProcessing"
                  description: The data structure used to specify the data to be used for inference in a batch transform job and to associate the data that is relevant to the prediction results in the output. The input filter provided allows you to exclude input data that is not needed for inference in a batch transform job. The output filter provided allows you to include input data relevant to interpreting the predictions in the output from the job. For more information, see Associate Prediction Results with their Corresponding Input Records.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: (Optional) An array of key-value pairs. For more information, see Using Cost Allocation Tags in the Amazon Web Services Billing and Cost Management User Guide.
                ExperimentConfig:
                  $ref: "#/components/schemas/ExperimentConfig"
              required:
                - TransformJobName
                - ModelName
                - TransformInput
                - TransformOutput
                - TransformResources
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTransformJobResponse"
  /CreateTrial:
    post:
      operationId: CreateTrial
      description: Creates an SageMaker trial. A trial is a set of steps called trial components that produce a machine learning model. A trial is part of a single SageMaker experiment. When you use SageMaker Studio or the SageMaker Python SDK, all experiments, trials, and trial components are automatically tracked, logged, and indexed. When you use the Amazon Web Services SDK for Python (Boto), you must use the logging APIs provided by the SDK. You can add tags to a trial and then use the Search API to search for the tags. To get a list of all your trials, call the ListTrials API. To view a trial's properties, call the DescribeTrial API. To create a trial component, call the CreateTrialComponent API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateTrial
            default: SageMaker.CreateTrial
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TrialName:
                  $ref: "#/components/schemas/ExperimentEntityName"
                  description: The name of the trial. The name must be unique in your Amazon Web Services account and is not case-sensitive.
                DisplayName:
                  $ref: "#/components/schemas/ExperimentEntityName"
                  description: The name of the trial as displayed. The name doesn't need to be unique. If DisplayName isn't specified, TrialName is displayed.
                ExperimentName:
                  $ref: "#/components/schemas/ExperimentEntityName"
                  description: The name of the experiment to associate the trial with.
                MetadataProperties:
                  $ref: "#/components/schemas/MetadataProperties"
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags to associate with the trial. You can use Search API to search on the tags.
              required:
                - TrialName
                - ExperimentName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTrialResponse"
  /CreateTrialComponent:
    post:
      operationId: CreateTrialComponent
      description: Creates a trial component, which is a stage of a machine learning trial. A trial is composed of one or more trial components. A trial component can be used in multiple trials. Trial components include pre-processing jobs, training jobs, and batch transform jobs. When you use SageMaker Studio or the SageMaker Python SDK, all experiments, trials, and trial components are automatically tracked, logged, and indexed. When you use the Amazon Web Services SDK for Python (Boto), you must use the logging APIs provided by the SDK. You can add tags to a trial component and then use the Search API to search for the tags.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateTrialComponent
            default: SageMaker.CreateTrialComponent
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TrialComponentName:
                  $ref: "#/components/schemas/ExperimentEntityName"
                  description: The name of the component. The name must be unique in your Amazon Web Services account and is not case-sensitive.
                DisplayName:
                  $ref: "#/components/schemas/ExperimentEntityName"
                  description: The name of the component as displayed. The name doesn't need to be unique. If DisplayName isn't specified, TrialComponentName is displayed.
                Status:
                  $ref: "#/components/schemas/TrialComponentStatus"
                  description: "The status of the component. States include: InProgress Completed Failed"
                StartTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: When the component started.
                EndTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: When the component ended.
                Parameters:
                  $ref: "#/components/schemas/TrialComponentParameters"
                  description: The hyperparameters for the component.
                InputArtifacts:
                  $ref: "#/components/schemas/TrialComponentArtifacts"
                  description: The input artifacts for the component. Examples of input artifacts are datasets, algorithms, hyperparameters, source code, and instance types.
                OutputArtifacts:
                  $ref: "#/components/schemas/TrialComponentArtifacts"
                  description: The output artifacts for the component. Examples of output artifacts are metrics, snapshots, logs, and images.
                MetadataProperties:
                  $ref: "#/components/schemas/MetadataProperties"
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags to associate with the component. You can use Search API to search on the tags.
              required:
                - TrialComponentName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTrialComponentResponse"
  /CreateUserProfile:
    post:
      operationId: CreateUserProfile
      description: Creates a user profile. A user profile represents a single user within a domain, and is the main way to reference a "person" for the purposes of sharing, reporting, and other user-oriented features. This entity is created when a user onboards to a domain. If an administrator invites a person by email or imports them from IAM Identity Center, a user profile is automatically created. A user profile is the primary holder of settings for an individual user and has a reference to the user's private Amazon Elastic File System home directory.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateUserProfile
            default: SageMaker.CreateUserProfile
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainId:
                  $ref: "#/components/schemas/DomainId"
                  description: The ID of the associated Domain.
                UserProfileName:
                  $ref: "#/components/schemas/UserProfileName"
                  description: A name for the UserProfile. This value is not case sensitive.
                SingleSignOnUserIdentifier:
                  $ref: "#/components/schemas/SingleSignOnUserIdentifier"
                  description: A specifier for the type of value specified in SingleSignOnUserValue. Currently, the only supported value is "UserName". If the Domain's AuthMode is IAM Identity Center, this field is required. If the Domain's AuthMode is not IAM Identity Center, this field cannot be specified.
                SingleSignOnUserValue:
                  $ref: "#/components/schemas/String256"
                  description: The username of the associated Amazon Web Services Single Sign-On User for this UserProfile. If the Domain's AuthMode is IAM Identity Center, this field is required, and must match a valid username of a user in your directory. If the Domain's AuthMode is not IAM Identity Center, this field cannot be specified.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Each tag consists of a key and an optional value. Tag keys must be unique per resource. Tags that you specify for the User Profile are also added to all Apps that the User Profile launches.
                UserSettings:
                  $ref: "#/components/schemas/UserSettings"
                  description: A collection of settings.
              required:
                - DomainId
                - UserProfileName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserProfileResponse"
  /CreateWorkforce:
    post:
      operationId: CreateWorkforce
      description: Use this operation to create a workforce. This operation will return an error if a workforce already exists in the Amazon Web Services Region that you specify. You can only create one workforce in each Amazon Web Services Region per Amazon Web Services account. If you want to create a new workforce in an Amazon Web Services Region where a workforce already exists, use the DeleteWorkforce API operation to delete the existing workforce and then use CreateWorkforce to create a new workforce. To create a private workforce using Amazon Cognito, you must specify a Cognito user pool in CognitoConfig. You can also create an Amazon Cognito workforce using the Amazon SageMaker console. For more information, see Create a Private Workforce (Amazon Cognito). To create a private workforce using your own OIDC Identity Provider (IdP), specify your IdP configuration in OidcConfig. Your OIDC IdP must support groups because groups are used by Ground Truth and Amazon A2I to create work teams. For more information, see Create a Private Workforce (OIDC IdP).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateWorkforce
            default: SageMaker.CreateWorkforce
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CognitoConfig:
                  $ref: "#/components/schemas/CognitoConfig"
                  description: Use this parameter to configure an Amazon Cognito private workforce. A single Cognito workforce is created using and corresponds to a single Amazon Cognito user pool. Do not use OidcConfig if you specify values for CognitoConfig.
                OidcConfig:
                  $ref: "#/components/schemas/OidcConfig"
                  description: Use this parameter to configure a private workforce using your own OIDC Identity Provider. Do not use CognitoConfig if you specify values for OidcConfig.
                SourceIpConfig:
                  $ref: "#/components/schemas/SourceIpConfig"
                WorkforceName:
                  $ref: "#/components/schemas/WorkforceName"
                  description: The name of the private workforce.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key-value pairs that contain metadata to help you categorize and organize our workforce. Each tag consists of a key and a value, both of which you define.
                WorkforceVpcConfig:
                  $ref: "#/components/schemas/WorkforceVpcConfigRequest"
                  description: Use this parameter to configure a workforce using VPC.
                IpAddressType:
                  $ref: "#/components/schemas/WorkforceIpAddressType"
                  description: Use this parameter to specify whether you want IPv4 only or dualstack (IPv4 and IPv6) to support your labeling workforce.
              required:
                - WorkforceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkforceResponse"
  /CreateWorkteam:
    post:
      operationId: CreateWorkteam
      description: Creates a new work team for labeling your data. A work team is defined by one or more Amazon Cognito user pools. You must first create the user pools before you can create a work team. You cannot create more than 25 work teams in an account and region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateWorkteam
            default: SageMaker.CreateWorkteam
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WorkteamName:
                  $ref: "#/components/schemas/WorkteamName"
                  description: The name of the work team. Use this name to identify the work team.
                WorkforceName:
                  $ref: "#/components/schemas/WorkforceName"
                  description: The name of the workforce.
                MemberDefinitions:
                  $ref: "#/components/schemas/MemberDefinitions"
                  description: A list of MemberDefinition objects that contains objects that identify the workers that make up the work team. Workforces can be created using Amazon Cognito or your own OIDC Identity Provider (IdP). For private workforces created using Amazon Cognito use CognitoMemberDefinition. For workforces created using your own OIDC identity provider (IdP) use OidcMemberDefinition. Do not provide input for both of these parameters in a single request. For workforces created using Amazon Cognito, private work teams correspond to Amazon Cognito user groups within the user pool used to create a workforce. All of the CognitoMemberDefinition objects that make up the member definition must have the same ClientId and UserPool values. To add a Amazon Cognito user group to an existing worker pool, see Adding groups to a User Pool. For more information about user pools, see Amazon Cognito User Pools. For workforces created using your own OIDC IdP, specify the user groups that you want to include in your private work team in OidcMemberDefinition by listing those groups in Groups.
                Description:
                  $ref: "#/components/schemas/String200"
                  description: A description of the work team.
                NotificationConfiguration:
                  $ref: "#/components/schemas/NotificationConfiguration"
                  description: Configures notification of workers regarding available or expiring work items.
                WorkerAccessConfiguration:
                  $ref: "#/components/schemas/WorkerAccessConfiguration"
                  description: Use this optional parameter to constrain access to an Amazon S3 resource based on the IP address using supported IAM global condition keys. The Amazon S3 resource is accessed in the worker portal using a Amazon S3 presigned URL.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key-value pairs. For more information, see Resource Tag and Using Cost Allocation Tags in the Amazon Web Services Billing and Cost Management User Guide.
              required:
                - WorkteamName
                - MemberDefinitions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkteamResponse"
  /DeleteAIBenchmarkJob:
    post:
      operationId: DeleteAIBenchmarkJob
      description: Deletes the specified AI benchmark job.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.DeleteAIBenchmarkJob
            default: SageMaker.DeleteAIBenchmarkJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AIBenchmarkJobName:
                  $ref: "#/components/schemas/AIEntityName"
                  description: The name of the AI benchmark job to delete.
              required:
                - AIBenchmarkJobName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAIBenchmarkJobResponse"
  /DeleteAIRecommendationJob:
    post:
      operationId: DeleteAIRecommendationJob
      description: Deletes the specified AI recommendation job.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.DeleteAIRecommendationJob
            default: SageMaker.DeleteAIRecommendationJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AIRecommendationJobName:
                  $ref: "#/components/schemas/AIEntityName"
                  description: The name of the AI recommendation job to delete.
              required:
                - AIRecommendationJobName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAIRecommendationJobResponse"
  /DeleteAIWorkloadConfig:
    post:
      operationId: DeleteAIWorkloadConfig
      description: Deletes the specified AI workload configuration. You cannot delete a configuration that is referenced by an active benchmark job.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.DeleteAIWorkloadConfig
            default: SageMaker.DeleteAIWorkloadConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AIWorkloadConfigName:
