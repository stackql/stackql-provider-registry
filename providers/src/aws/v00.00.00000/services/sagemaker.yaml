  /CreateModelPackage:
    post:
      operationId: CreateModelPackage
      description: "Creates a model package that you can use to create SageMaker models or list on Amazon Web Services Marketplace, or a versioned model that is part of a model group. Buyers can subscribe to model packages listed on Amazon Web Services Marketplace to create models in SageMaker. To create a model package by specifying a Docker container that contains your inference code and the Amazon S3 location of your model artifacts, provide values for InferenceSpecification. To create a model from an algorithm resource that you created or subscribed to in Amazon Web Services Marketplace, provide a value for SourceAlgorithmSpecification. There are two types of model packages: Versioned - a model that is part of a model group in the model registry. Unversioned - a model package that is not part of a model group."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateModelPackage
            default: SageMaker.CreateModelPackage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ModelPackageName:
                  $ref: "#/components/schemas/EntityName"
                  description: The name of the model package. The name must have 1 to 63 characters. Valid characters are a-z, A-Z, 0-9, and - (hyphen). This parameter is required for unversioned models. It is not applicable to versioned models.
                ModelPackageGroupName:
                  $ref: "#/components/schemas/ArnOrName"
                  description: The name or Amazon Resource Name (ARN) of the model package group that this model version belongs to. This parameter is required for versioned models, and does not apply to unversioned models.
                ModelPackageDescription:
                  $ref: "#/components/schemas/EntityDescription"
                  description: A description of the model package.
                ModelPackageRegistrationType:
                  $ref: "#/components/schemas/ModelPackageRegistrationType"
                  description: The package registration type of the model package input.
                InferenceSpecification:
                  $ref: "#/components/schemas/InferenceSpecification"
                  description: "Specifies details about inference jobs that you can run with models based on this model package, including the following information: The Amazon ECR paths of containers that contain the inference code and model artifacts. The instance types that the model package supports for transform jobs and real-time endpoints used for inference. The input and output content formats that the model package supports for inference."
                ValidationSpecification:
                  $ref: "#/components/schemas/ModelPackageValidationSpecification"
                  description: Specifies configurations for one or more transform jobs that SageMaker runs to test the model package.
                SourceAlgorithmSpecification:
                  $ref: "#/components/schemas/SourceAlgorithmSpecification"
                  description: Details about the algorithm that was used to create the model package.
                CertifyForMarketplace:
                  $ref: "#/components/schemas/CertifyForMarketplace"
                  description: Whether to certify the model package for listing on Amazon Web Services Marketplace. This parameter is optional for unversioned models, and does not apply to versioned models.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of key value pairs associated with the model. For more information, see Tagging Amazon Web Services resources in the Amazon Web Services General Reference Guide. If you supply ModelPackageGroupName, your model package belongs to the model group you specify and uses the tags associated with the model group. In this case, you cannot supply a tag argument.
                ModelApprovalStatus:
                  $ref: "#/components/schemas/ModelApprovalStatus"
                  description: Whether the model is approved for deployment. This parameter is optional for versioned models, and does not apply to unversioned models. For versioned models, the value of this parameter must be set to Approved to deploy the model.
                MetadataProperties:
                  $ref: "#/components/schemas/MetadataProperties"
                ModelMetrics:
                  $ref: "#/components/schemas/ModelMetrics"
                  description: A structure that contains model metrics reports.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique token that guarantees that the call to this API is idempotent.
                Domain:
                  $ref: "#/components/schemas/String"
                  description: The machine learning domain of your model package and its components. Common machine learning domains include computer vision and natural language processing.
                Task:
                  $ref: "#/components/schemas/String"
                  description: 'The machine learning task your model package accomplishes. Common machine learning tasks include object detection and image classification. The following tasks are supported by Inference Recommender: "IMAGE_CLASSIFICATION" | "OBJECT_DETECTION" | "TEXT_GENERATION" |"IMAGE_SEGMENTATION" | "FILL_MASK" | "CLASSIFICATION" | "REGRESSION" | "OTHER". Specify "OTHER" if none of the tasks listed fit your use case.'
                SamplePayloadUrl:
                  $ref: "#/components/schemas/S3Uri"
                  description: The Amazon Simple Storage Service (Amazon S3) path where the sample payload is stored. This path must point to a single gzip compressed tar archive (.tar.gz suffix). This archive can hold multiple files that are all equally used in the load test. Each file in the archive must satisfy the size constraints of the InvokeEndpoint call.
                CustomerMetadataProperties:
                  $ref: "#/components/schemas/CustomerMetadataMap"
                  description: The metadata properties associated with the model package versions.
                DriftCheckBaselines:
                  $ref: "#/components/schemas/DriftCheckBaselines"
                  description: Represents the drift check baselines that can be used when the model monitor is set using the model package. For more information, see the topic on Drift Detection against Previous Baselines in SageMaker Pipelines in the Amazon SageMaker Developer Guide.
                AdditionalInferenceSpecifications:
                  $ref: "#/components/schemas/AdditionalInferenceSpecifications"
                  description: An array of additional Inference Specification objects. Each additional Inference Specification specifies artifacts based on this model package that can be used on inference endpoints. Generally used with SageMaker Neo to store the compiled artifacts.
                SkipModelValidation:
                  $ref: "#/components/schemas/SkipModelValidation"
                  description: Indicates if you want to skip model validation.
                SourceUri:
                  $ref: "#/components/schemas/ModelPackageSourceUri"
                  description: The URI of the source for the model package. If you want to clone a model package, set it to the model package Amazon Resource Name (ARN). If you want to register a model, set it to the model ARN.
                SecurityConfig:
                  $ref: "#/components/schemas/ModelPackageSecurityConfig"
                  description: The KMS Key ID (KMSKeyId) used for encryption of model package information.
                ModelCard:
                  $ref: "#/components/schemas/ModelPackageModelCard"
                  description: The model card associated with the model package. Since ModelPackageModelCard is tied to a model package, it is a specific usage of a model card and its schema is simplified compared to the schema of ModelCard. The ModelPackageModelCard schema does not include model_package_details, and model_overview is composed of the model_creator and model_artifact properties. For more information about the model package model card schema, see Model package model card schema. For more information about the model card associated with the model package, see View the Details of a Model Version.
                ModelLifeCycle:
                  $ref: "#/components/schemas/ModelLifeCycle"
                  description: A structure describing the current state of the model in its life cycle.
                ManagedStorageType:
                  $ref: "#/components/schemas/ManagedStorageType"
                  description: The storage type of the model package.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateModelPackageOutput"
  /CreateModelPackageGroup:
