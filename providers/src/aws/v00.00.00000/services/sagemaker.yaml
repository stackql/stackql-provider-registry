  /UpdateEndpoint:
    post:
      operationId: UpdateEndpoint
      description: Deploys the EndpointConfig specified in the request to a new fleet of instances. SageMaker shifts endpoint traffic to the new instances with the updated endpoint configuration and then deletes the old instances using the previous EndpointConfig (there is no availability loss). For more information about how to control the update and traffic shifting process, see Update models in production. When SageMaker receives the request, it sets the endpoint status to Updating. After updating the endpoint, it sets the status to InService. To check the status of an endpoint, use the DescribeEndpoint API. You must not delete an EndpointConfig in use by an endpoint that is live or while the UpdateEndpoint or CreateEndpoint operations are being performed on the endpoint. To update an endpoint, you must create a new EndpointConfig. If you delete the EndpointConfig of an endpoint that is active or being created or updated you may lose visibility into the instance type the endpoint is using. The endpoint must be deleted in order to stop incurring charges.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.UpdateEndpoint
            default: SageMaker.UpdateEndpoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EndpointName:
                  $ref: "#/components/schemas/EndpointName"
                  description: The name of the endpoint whose configuration you want to update.
                EndpointConfigName:
                  $ref: "#/components/schemas/EndpointConfigName"
                  description: The name of the new endpoint configuration.
                RetainAllVariantProperties:
                  $ref: "#/components/schemas/Boolean"
                  description: When updating endpoint resources, enables or disables the retention of variant properties, such as the instance count or the variant weight. To retain the variant properties of an endpoint when updating it, set RetainAllVariantProperties to true. To use the variant properties specified in a new EndpointConfig call when updating an endpoint, set RetainAllVariantProperties to false. The default is false.
                ExcludeRetainedVariantProperties:
                  $ref: "#/components/schemas/VariantPropertyList"
                  description: When you are updating endpoint resources with RetainAllVariantProperties, whose value is set to true, ExcludeRetainedVariantProperties specifies the list of type VariantProperty to override with the values provided by EndpointConfig. If you don't specify a value for ExcludeRetainedVariantProperties, no variant properties are overridden.
                DeploymentConfig:
                  $ref: "#/components/schemas/DeploymentConfig"
                  description: The deployment configuration for an endpoint, which contains the desired deployment strategy and rollback configurations.
                RetainDeploymentConfig:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether to reuse the last deployment configuration. The default value is false (the configuration is not reused).
              required:
                - EndpointName
                - EndpointConfigName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEndpointOutput"
