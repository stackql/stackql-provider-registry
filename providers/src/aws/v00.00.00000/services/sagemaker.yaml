    ThroughputConfigDescription:
      description: "Active throughput configuration of the feature group. There are two modes: ON_DEMAND and PROVISIONED. With on-demand mode, you are charged for data reads and writes that your application performs on your feature group. You do not need to specify read and write throughput because Feature Store accommodates your workloads as they ramp up and down. You can switch a feature group to on-demand only once in a 24 hour period. With provisioned throughput mode, you specify the read and write capacity per second that you expect your application to require, and you are billed based on those limits. Exceeding provisioned throughput will result in your requests being throttled. Note: PROVISIONED throughput mode is supported only for feature groups that are offline-only, or use the Standard tier online store."
      type: object
      properties:
        ThroughputMode:
          $ref: "#/components/schemas/ThroughputMode"
          description: "The mode used for your feature group throughput: ON_DEMAND or PROVISIONED."
        ProvisionedReadCapacityUnits:
          $ref: "#/components/schemas/CapacityUnit"
          description: For provisioned feature groups with online store enabled, this indicates the read throughput you are billed for and can consume without throttling. This field is not applicable for on-demand feature groups.
        ProvisionedWriteCapacityUnits:
          $ref: "#/components/schemas/CapacityUnit"
          description: For provisioned feature groups, this indicates the write throughput you are billed for and can consume without throttling. This field is not applicable for on-demand feature groups.
      required:
        - ThroughputMode
