            schema:
              type: object
              properties:
                PipelineExecutionArn:
                  $ref: "#/components/schemas/PipelineExecutionArn"
                  description: The Amazon Resource Name (ARN) of the pipeline execution.
                ClientRequestToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the operation. An idempotent operation completes no more than once.
              required:
                - PipelineExecutionArn
                - ClientRequestToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopPipelineExecutionResponse"
