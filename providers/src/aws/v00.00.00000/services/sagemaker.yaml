    DescribeTrainingPlanResponse:
      type: object
      properties:
        TrainingPlanArn:
          $ref: "#/components/schemas/TrainingPlanArn"
          description: The Amazon Resource Name (ARN); of the training plan.
        TrainingPlanName:
          $ref: "#/components/schemas/TrainingPlanName"
          description: The name of the training plan.
        Status:
          $ref: "#/components/schemas/TrainingPlanStatus"
          description: The current status of the training plan (e.g., Pending, Active, Expired). To see the complete list of status values available for a training plan, refer to the Status attribute within the TrainingPlanSummary object.
        StatusMessage:
          $ref: "#/components/schemas/TrainingPlanStatusMessage"
          description: A message providing additional information about the current status of the training plan.
        DurationHours:
          $ref: "#/components/schemas/TrainingPlanDurationHours"
