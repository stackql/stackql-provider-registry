      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:experiment/.*
    FeatureGroupName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9]([_-]*[a-zA-Z0-9]){0,63}"
    FeatureName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9]([-_]*[a-zA-Z0-9]){0,63}"
    FeatureDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/FeatureDefinition"
    FeatureDefinition:
      description: A list of features. You must include FeatureName and FeatureType. Valid feature FeatureTypes are Integral, Fractional and String.
      type: object
      properties:
        FeatureName:
          $ref: "#/components/schemas/FeatureName"
          description: "The name of a feature. The type must be a string. FeatureName cannot be any of the following: is_deleted, write_time, api_invocation_time. The name: Must start with an alphanumeric character. Can only include alphanumeric characters, underscores, and hyphens. Spaces are not allowed."
        FeatureType:
          $ref: "#/components/schemas/FeatureType"
          description: The value type of a feature. Valid values are Integral, Fractional, or String.
        CollectionType:
          $ref: "#/components/schemas/CollectionType"
          description: "A grouping of elements where each element within the collection must have the same feature type (String, Integral, or Fractional). List: An ordered collection of elements. Set: An unordered collection of unique elements. Vector: A specialized list that represents a fixed-size array of elements. The vector dimension is determined by you. Must have elements with fractional feature types."
        CollectionConfig:
          $ref: "#/components/schemas/CollectionConfig"
          description: Configuration for your collection.
      required:
        - FeatureName
        - FeatureType
    FeatureType:
      type: string
      enum:
        - Integral
        - Fractional
        - String
    CollectionType:
      type: string
      enum:
        - List
        - Set
        - Vector
    CollectionConfig:
      description: Configuration for your collection.
      type: object
      properties:
        VectorConfig:
          $ref: "#/components/schemas/VectorConfig"
          description: "Configuration for your vector collection type. Dimension: The number of elements in your vector."
    VectorConfig:
      description: Configuration for your vector collection type.
      type: object
      properties:
        Dimension:
          $ref: "#/components/schemas/Dimension"
          description: The number of elements in your vector.
      required:
        - Dimension
    Dimension:
      type: integer
      minimum: 1
      maximum: 8192
    OnlineStoreConfig:
      description: Use this to specify the Amazon Web Services Key Management Service (KMS) Key ID, or KMSKeyId, for at rest data encryption. You can turn OnlineStore on or off by specifying the EnableOnlineStore flag at General Assembly. The default value is False.
      type: object
      properties:
        SecurityConfig:
          $ref: "#/components/schemas/OnlineStoreSecurityConfig"
          description: Use to specify KMS Key ID (KMSKeyId) for at-rest encryption of your OnlineStore.
        EnableOnlineStore:
          $ref: "#/components/schemas/Boolean"
          description: Turn OnlineStore off by specifying False for the EnableOnlineStore flag. Turn OnlineStore on by specifying True for the EnableOnlineStore flag. The default value is False.
        TtlDuration:
          $ref: "#/components/schemas/TtlDuration"
          description: Time to live duration, where the record is hard deleted after the expiration time is reached; ExpiresAt = EventTime + TtlDuration. For information on HardDelete, see the DeleteRecord API in the Amazon SageMaker API Reference guide.
        StorageType:
          $ref: "#/components/schemas/StorageType"
          description: "Option for different tiers of low latency storage for real-time data retrieval. Standard: A managed low latency data store for feature groups. InMemory: A managed data store for feature groups that supports very low latency retrieval."
    OnlineStoreSecurityConfig:
      description: The security configuration for OnlineStore.
      type: object
      properties:
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: 'The Amazon Web Services Key Management Service (KMS) key ARN that SageMaker Feature Store uses to encrypt the Amazon S3 objects at rest using Amazon S3 server-side encryption. The caller (either user or IAM role) of CreateFeatureGroup must have below permissions to the OnlineStore KmsKeyId: "kms:Encrypt" "kms:Decrypt" "kms:DescribeKey" "kms:CreateGrant" "kms:RetireGrant" "kms:ReEncryptFrom" "kms:ReEncryptTo" "kms:GenerateDataKey" "kms:ListAliases" "kms:ListGrants" "kms:RevokeGrant" The caller (either user or IAM role) to all DataPlane operations (PutRecord, GetRecord, DeleteRecord) must have the following permissions to the KmsKeyId: "kms:Decrypt"'
    TtlDuration:
      description: Time to live duration, where the record is hard deleted after the expiration time is reached; ExpiresAt = EventTime + TtlDuration. For information on HardDelete, see the DeleteRecord API in the Amazon SageMaker API Reference guide.
      type: object
      properties:
        Unit:
          $ref: "#/components/schemas/TtlDurationUnit"
          description: TtlDuration time unit.
        Value:
          $ref: "#/components/schemas/TtlDurationValue"
          description: TtlDuration time value.
    TtlDurationUnit:
      type: string
      enum:
        - Seconds
        - Minutes
        - Hours
        - Days
        - Weeks
    TtlDurationValue:
      type: integer
      minimum: 1
    StorageType:
      type: string
      enum:
        - Standard
        - InMemory
    OfflineStoreConfig:
      description: The configuration of an OfflineStore. Provide an OfflineStoreConfig in a request to CreateFeatureGroup to create an OfflineStore. To encrypt an OfflineStore using at rest data encryption, specify Amazon Web Services Key Management Service (KMS) key ID, or KMSKeyId, in S3StorageConfig.
      type: object
      properties:
        S3StorageConfig:
          $ref: "#/components/schemas/S3StorageConfig"
          description: The Amazon Simple Storage (Amazon S3) location of OfflineStore.
        DisableGlueTableCreation:
          $ref: "#/components/schemas/Boolean"
          description: Set to True to disable the automatic creation of an Amazon Web Services Glue table when configuring an OfflineStore. If set to True and DataCatalogConfig is provided, Feature Store associates the provided catalog configuration with the feature group without creating a table. In this case, you are responsible for creating and managing the Glue table. If set to True without DataCatalogConfig, no Glue table is created or associated with the feature group. The Iceberg table format is only supported when this is set to False. If set to False and DataCatalogConfig is provided, Feature Store creates the table using the specified names. If set to False without DataCatalogConfig, Feature Store auto-generates the table name following Athena's naming recommendations. This applies to both Glue and Apache Iceberg table formats. The default value is False.
        DataCatalogConfig:
          $ref: "#/components/schemas/DataCatalogConfig"
          description: The meta data of the Glue table for the OfflineStore. If not provided, Feature Store auto-generates the table name, database, and catalog when the OfflineStore is created. You can optionally provide this configuration to specify custom values. This applies to both Glue and Apache Iceberg table formats.
        TableFormat:
          $ref: "#/components/schemas/TableFormat"
          description: Format for the offline store table. Supported formats are Glue (Default) and Apache Iceberg.
      required:
        - S3StorageConfig
    S3StorageConfig:
      description: The Amazon Simple Storage (Amazon S3) location and security configuration for OfflineStore.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: "The S3 URI, or location in Amazon S3, of OfflineStore. S3 URIs have a format similar to the following: s3://example-bucket/prefix/."
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: 'The Amazon Web Services Key Management Service (KMS) key ARN of the key used to encrypt any objects written into the OfflineStore S3 location. The IAM roleARN that is passed as a parameter to CreateFeatureGroup must have below permissions to the KmsKeyId: "kms:GenerateDataKey"'
        ResolvedOutputS3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The S3 path where offline records are written.
      required:
        - S3Uri
    DataCatalogConfig:
      description: The meta data of the Glue table which serves as data catalog for the OfflineStore.
      type: object
      properties:
        TableName:
          $ref: "#/components/schemas/TableName"
          description: The name of the Glue table.
        Catalog:
          $ref: "#/components/schemas/Catalog"
          description: The name of the Glue table catalog.
        Database:
          $ref: "#/components/schemas/Database"
          description: The name of the Glue table database.
      required:
        - TableName
        - Catalog
        - Database
    TableName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    Catalog:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    Database:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    TableFormat:
      type: string
      enum:
        - Default
        - Glue
        - Iceberg
    ThroughputConfig:
      description: "Used to set feature group throughput configuration. There are two modes: ON_DEMAND and PROVISIONED. With on-demand mode, you are charged for data reads and writes that your application performs on your feature group. You do not need to specify read and write throughput because Feature Store accommodates your workloads as they ramp up and down. You can switch a feature group to on-demand only once in a 24 hour period. With provisioned throughput mode, you specify the read and write capacity per second that you expect your application to require, and you are billed based on those limits. Exceeding provisioned throughput will result in your requests being throttled. Note: PROVISIONED throughput mode is supported only for feature groups that are offline-only, or use the Standard tier online store."
      type: object
      properties:
        ThroughputMode:
          $ref: "#/components/schemas/ThroughputMode"
          description: "The mode used for your feature group throughput: ON_DEMAND or PROVISIONED."
        ProvisionedReadCapacityUnits:
          $ref: "#/components/schemas/CapacityUnit"
          description: For provisioned feature groups with online store enabled, this indicates the read throughput you are billed for and can consume without throttling. This field is not applicable for on-demand feature groups.
        ProvisionedWriteCapacityUnits:
          $ref: "#/components/schemas/CapacityUnit"
          description: For provisioned feature groups, this indicates the write throughput you are billed for and can consume without throttling. This field is not applicable for on-demand feature groups.
      required:
        - ThroughputMode
    ThroughputMode:
      type: string
      enum:
        - OnDemand
        - Provisioned
