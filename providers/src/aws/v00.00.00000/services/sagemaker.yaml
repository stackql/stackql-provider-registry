p-northeast-2:845288260483:function:PRE-ImageMultiClass arn:aws:lambda:ap-south-1:565803892007:function:PRE-ImageMultiClass arn:aws:lambda:ap-southeast-1:377565633583:function:PRE-ImageMultiClass arn:aws:lambda:ap-southeast-2:454466003867:function:PRE-ImageMultiClass Multi-label image classification - Uses a variant of the Expectation Maximization approach to estimate the true classes of an image based on annotations from individual workers. arn:aws:lambda:us-east-1:432418664414:function:PRE-ImageMultiClassMultiLabel arn:aws:lambda:us-east-2:266458841044:function:PRE-ImageMultiClassMultiLabel arn:aws:lambda:us-west-2:081040173940:function:PRE-ImageMultiClassMultiLabel arn:aws:lambda:ca-central-1:918755190332:function:PRE-ImageMultiClassMultiLabel arn:aws:lambda:eu-west-1:568282634449:function:PRE-ImageMultiClassMultiLabel arn:aws:lambda:eu-west-2:487402164563:function:PRE-ImageMultiClassMultiLabel arn:aws:lambda:eu-central-1:203001061592:function:PRE-ImageMultiClassMultiLabel arn:aws:lambda:ap-northeast-1:477331159723:function:PRE-ImageMultiClassMultiLabel arn:aws:lambda:ap-northeast-2:845288260483:function:PRE-ImageMultiClassMultiLabel arn:aws:lambda:ap-south-1:565803892007:function:PRE-ImageMultiClassMultiLabel arn:aws:lambda:ap-southeast-1:377565633583:function:PRE-ImageMultiClassMultiLabel arn:aws:lambda:ap-southeast-2:454466003867:function:PRE-ImageMultiClassMultiLabel Semantic segmentation - Treats each pixel in an image as a multi-class classification and treats pixel annotations from workers as "votes" for the correct label. arn:aws:lambda:us-east-1:432418664414:function:PRE-SemanticSegmentation arn:aws:lambda:us-east-2:266458841044:function:PRE-SemanticSegmentation arn:aws:lambda:us-west-2:081040173940:function:PRE-SemanticSegmentation arn:aws:lambda:ca-central-1:918755190332:function:PRE-SemanticSegmentation arn:aws:lambda:eu-west-1:568282634449:function:PRE-SemanticSegmentation arn:aws:lambda:eu-west-2:487402164563:function:PRE-SemanticSegmentation arn:aws:lambda:eu-central-1:203001061592:function:PRE-SemanticSegmentation arn:aws:lambda:ap-northeast-1:477331159723:function:PRE-SemanticSegmentation arn:aws:lambda:ap-northeast-2:845288260483:function:PRE-SemanticSegmentation arn:aws:lambda:ap-south-1:565803892007:function:PRE-SemanticSegmentation arn:aws:lambda:ap-southeast-1:377565633583:function:PRE-SemanticSegmentation arn:aws:lambda:ap-southeast-2:454466003867:function:PRE-SemanticSegmentation Text classification - Uses a variant of the Expectation Maximization approach to estimate the true class of text based on annotations from individual workers. arn:aws:lambda:us-east-1:432418664414:function:PRE-TextMultiClass arn:aws:lambda:us-east-2:266458841044:function:PRE-TextMultiClass arn:aws:lambda:us-west-2:081040173940:function:PRE-TextMultiClass arn:aws:lambda:ca-central-1:918755190332:function:PRE-TextMultiClass arn:aws:lambda:eu-west-1:568282634449:function:PRE-TextMultiClass arn:aws:lambda:eu-west-2:487402164563:function:PRE-TextMultiClass arn:aws:lambda:eu-central-1:203001061592:function:PRE-TextMultiClass arn:aws:lambda:ap-northeast-1:477331159723:function:PRE-TextMultiClass arn:aws:lambda:ap-northeast-2:845288260483:function:PRE-TextMultiClass arn:aws:lambda:ap-south-1:565803892007:function:PRE-TextMultiClass arn:aws:lambda:ap-southeast-1:377565633583:function:PRE-TextMultiClass arn:aws:lambda:ap-southeast-2:454466003867:function:PRE-TextMultiClass Multi-label text classification - Uses a variant of the Expectation Maximization approach to estimate the true classes of text based on annotations from individual workers. arn:aws:lambda:us-east-1:432418664414:function:PRE-TextMultiClassMultiLabel arn:aws:lambda:us-east-2:266458841044:function:PRE-TextMultiClassMultiLabel arn:aws:lambda:us-west-2:081040173940:function:PRE-TextMultiClassMultiLabel arn:aws:lambda:ca-central-1:918755190332:function:PRE-TextMultiClassMultiLabel arn:aws:lambda:eu-west-1:568282634449:function:PRE-TextMultiClassMultiLabel arn:aws:lambda:e