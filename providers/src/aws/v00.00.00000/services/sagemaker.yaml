      type: string
    ProcessingInputs:
      type: array
      items:
        $ref: "#/components/schemas/ProcessingInput"
    ProcessingInput:
      description: The inputs for a processing job. The processing input must specify exactly one of either S3Input or DatasetDefinition types.
      type: object
      properties:
        InputName:
          $ref: "#/components/schemas/String"
          description: The name for the processing job input.
        AppManaged:
          $ref: "#/components/schemas/AppManaged"
          description: When True, input operations such as data download are managed natively by the processing job application. When False (default), input operations are managed by Amazon SageMaker.
        S3Input:
          $ref: "#/components/schemas/ProcessingS3Input"
          description: Configuration for downloading input data from Amazon S3 into the processing container.
        DatasetDefinition:
          $ref: "#/components/schemas/DatasetDefinition"
          description: Configuration for a Dataset Definition input.
      required:
        - InputName
    AppManaged:
      type: boolean
    ProcessingS3Input:
      description: Configuration for downloading input data from Amazon S3 into the processing container.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The URI of the Amazon S3 prefix Amazon SageMaker downloads data required to run a processing job.
        LocalPath:
          $ref: "#/components/schemas/ProcessingLocalPath"
          description: The local path in your container where you want Amazon SageMaker to write input data to. LocalPath is an absolute path to the input data and must begin with /opt/ml/processing/. LocalPath is a required parameter when AppManaged is False (default).
        S3DataType:
          $ref: "#/components/schemas/ProcessingS3DataType"
          description: Whether you use an S3Prefix or a ManifestFile for the data type. If you choose S3Prefix, S3Uri identifies a key name prefix. Amazon SageMaker uses all objects with the specified key name prefix for the processing job. If you choose ManifestFile, S3Uri identifies an object that is a manifest file containing a list of object keys that you want Amazon SageMaker to use for the processing job.
        S3InputMode:
          $ref: "#/components/schemas/ProcessingS3InputMode"
          description: Whether to use File or Pipe input mode. In File mode, Amazon SageMaker copies the data from the input source onto the local ML storage volume before starting your processing container. This is the most commonly used input mode. In Pipe mode, Amazon SageMaker streams input data from the source directly to your processing container into named pipes without using the ML storage volume.
        S3DataDistributionType:
          $ref: "#/components/schemas/ProcessingS3DataDistributionType"
          description: Whether to distribute the data from Amazon S3 to all processing instances with FullyReplicated, or whether the data from Amazon S3 is sharded by Amazon S3 key, downloading one shard of data to each processing instance.
        S3CompressionType:
          $ref: "#/components/schemas/ProcessingS3CompressionType"
          description: Whether to GZIP-decompress the data in Amazon S3 as it is streamed into the processing container. Gzip can only be used when Pipe mode is specified as the S3InputMode. In Pipe mode, Amazon SageMaker streams input data from the source directly to your container without using the EBS volume.
      required:
        - S3Uri
        - S3DataType
    ProcessingS3DataType:
      type: string
      enum:
        - ManifestFile
        - S3Prefix
    ProcessingS3CompressionType:
      type: string
      enum:
        - None
        - Gzip
    DatasetDefinition:
      description: Configuration for Dataset Definition inputs. The Dataset Definition input must specify exactly one of either AthenaDatasetDefinition or RedshiftDatasetDefinition types.
      type: object
      properties:
        AthenaDatasetDefinition:
          $ref: "#/components/schemas/AthenaDatasetDefinition"
        RedshiftDatasetDefinition:
          $ref: "#/components/schemas/RedshiftDatasetDefinition"
        LocalPath:
          $ref: "#/components/schemas/ProcessingLocalPath"
          description: The local path where you want Amazon SageMaker to download the Dataset Definition inputs to run a processing job. LocalPath is an absolute path to the input data. This is a required parameter when AppManaged is False (default).
        DataDistributionType:
          $ref: "#/components/schemas/DataDistributionType"
          description: Whether the generated dataset is FullyReplicated or ShardedByS3Key (default).
        InputMode:
          $ref: "#/components/schemas/InputMode"
          description: Whether to use File or Pipe input mode. In File (default) mode, Amazon SageMaker copies the data from the input source onto the local Amazon Elastic Block Store (Amazon EBS) volumes before starting your training algorithm. This is the most commonly used input mode. In Pipe mode, Amazon SageMaker streams input data from the source directly to your algorithm without using the EBS volume.
    AthenaDatasetDefinition:
      description: Configuration for Athena Dataset Definition input.
      type: object
      properties:
        Catalog:
          $ref: "#/components/schemas/AthenaCatalog"
        Database:
          $ref: "#/components/schemas/AthenaDatabase"
        QueryString:
          $ref: "#/components/schemas/AthenaQueryString"
        WorkGroup:
          $ref: "#/components/schemas/AthenaWorkGroup"
        OutputS3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The location in Amazon S3 where Athena query results are stored.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The Amazon Web Services Key Management Service (Amazon Web Services KMS) key that Amazon SageMaker uses to encrypt data generated from an Athena query execution.
        OutputFormat:
          $ref: "#/components/schemas/AthenaResultFormat"
        OutputCompression:
          $ref: "#/components/schemas/AthenaResultCompressionType"
      required:
        - Catalog
        - Database
        - QueryString
        - OutputS3Uri
        - OutputFormat
    AthenaCatalog:
      description: The name of the data catalog used in Athena query execution.
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    AthenaDatabase:
      description: The name of the database used in the Athena query execution.
      type: string
      minLength: 1
      maxLength: 255
      pattern: .*
    AthenaQueryString:
      description: The SQL query statements, to be executed.
      type: string
      minLength: 1
      maxLength: 4096
      pattern: "[\\s\\S]+"
    AthenaWorkGroup:
      description: The name of the workgroup in which the Athena query is being started.
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9._-]+"
    AthenaResultFormat:
      description: The data storage format for Athena query results.
      type: string
      enum:
        - PARQUET
        - ORC
        - AVRO
        - JSON
        - TEXTFILE
    AthenaResultCompressionType:
      description: The compression used for Athena query results.
      type: string
      enum:
        - GZIP
        - SNAPPY
        - ZLIB
    RedshiftDatasetDefinition:
      description: Configuration for Redshift Dataset Definition input.
      type: object
      properties:
        ClusterId:
          $ref: "#/components/schemas/RedshiftClusterId"
        Database:
          $ref: "#/components/schemas/RedshiftDatabase"
        DbUser:
          $ref: "#/components/schemas/RedshiftUserName"
        QueryString:
          $ref: "#/components/schemas/RedshiftQueryString"
        ClusterRoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The IAM role attached to your Redshift cluster that Amazon SageMaker uses to generate datasets.
        OutputS3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The location in Amazon S3 where the Redshift query results are stored.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The Amazon Web Services Key Management Service (Amazon Web Services KMS) key that Amazon SageMaker uses to encrypt data from a Redshift execution.
        OutputFormat:
          $ref: "#/components/schemas/RedshiftResultFormat"
        OutputCompression:
          $ref: "#/components/schemas/RedshiftResultCompressionType"
      required:
        - ClusterId
        - Database
        - DbUser
        - QueryString
        - ClusterRoleArn
        - OutputS3Uri
        - OutputFormat
    RedshiftClusterId:
      description: The Redshift cluster Identifier.
      type: string
      minLength: 1
      maxLength: 63
      pattern: .*
    RedshiftDatabase:
      description: The name of the Redshift database used in Redshift query execution.
      type: string
      minLength: 1
      maxLength: 64
      pattern: .*
    RedshiftUserName:
      description: The database user name used in Redshift query execution.
      type: string
      minLength: 1
      maxLength: 128
      pattern: .*
    RedshiftQueryString:
      description: The SQL query statements to be executed.
      type: string
      minLength: 1
      maxLength: 4096
      pattern: "[\\s\\S]+"
    RedshiftResultFormat:
      description: The data storage format for Redshift query results.
      type: string
      enum:
        - PARQUET
        - CSV
    RedshiftResultCompressionType:
      description: The compression used for Redshift query results.
      type: string
      enum:
        - None
        - GZIP
        - BZIP2
        - ZSTD
        - SNAPPY
    DataDistributionType:
      type: string
      enum:
        - FullyReplicated
        - ShardedByS3Key
    InputMode:
      type: string
      enum:
        - Pipe
        - File
    ProcessingOutputConfig:
      description: Configuration for uploading output from the processing container.
      type: object
      properties:
        Outputs:
          $ref: "#/components/schemas/ProcessingOutputs"
          description: An array of outputs configuring the data to upload from the processing container.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The Amazon Web Services Key Management Service (Amazon Web Services KMS) key that Amazon SageMaker uses to encrypt the processing job output. KmsKeyId can be an ID of a KMS key, ARN of a KMS key, or alias of a KMS key. The KmsKeyId is applied to all outputs.
      required:
        - Outputs
    ProcessingOutputs:
      type: array
      items:
        $ref: "#/components/schemas/ProcessingOutput"
    ProcessingOutput:
      description: Describes the results of a processing job. The processing output must specify exactly one of either S3Output or FeatureStoreOutput types.
      type: object
      properties:
        OutputName:
          $ref: "#/components/schemas/String"
          description: The name for the processing job output.
        S3Output:
          $ref: "#/components/schemas/ProcessingS3Output"
          description: Configuration for processing job outputs in Amazon S3.
        FeatureStoreOutput:
          $ref: "#/components/schemas/ProcessingFeatureStoreOutput"
          description: Configuration for processing job outputs in Amazon SageMaker Feature Store. This processing output type is only supported when AppManaged is specified.
        AppManaged:
          $ref: "#/components/schemas/AppManaged"
          description: When True, output operations such as data upload are managed natively by the processing job application. When False (default), output operations are managed by Amazon SageMaker.
      required:
        - OutputName
    ProcessingS3Output:
      description: Configuration for uploading output data to Amazon S3 from the processing container.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: A URI that identifies the Amazon S3 bucket where you want Amazon SageMaker to save the results of a processing job.
        LocalPath:
          $ref: "#/components/schemas/ProcessingLocalPath"
          description: The local path of a directory where you want Amazon SageMaker to upload its contents to Amazon S3. LocalPath is an absolute path to a directory containing output files. This directory will be created by the platform and exist when your container's entrypoint is invoked.
        S3UploadMode:
          $ref: "#/components/schemas/ProcessingS3UploadMode"
          description: Whether to upload the results of the processing job continuously or after the job completes.
      required:
        - S3Uri
        - S3UploadMode
    ProcessingFeatureStoreOutput:
      description: Configuration for processing job outputs in Amazon SageMaker Feature Store.
      type: object
      properties:
        FeatureGroupName:
          $ref: "#/components/schemas/FeatureGroupName"
          description: The name of the Amazon SageMaker FeatureGroup to use as the destination for processing job output. Note that your processing script is responsible for putting records into your Feature Store.
      required:
        - FeatureGroupName
    ProcessingResources:
      description: Identifies the resources, ML compute instances, and ML storage volumes to deploy for a processing job. In distributed training, you specify more than one instance.
      type: object
      properties:
        ClusterConfig:
          $ref: "#/components/schemas/ProcessingClusterConfig"
          description: The configuration for the resources in a cluster used to run the processing job.
      required:
        - ClusterConfig
    ProcessingClusterConfig:
      description: Configuration for the cluster used to run a processing job.
      type: object
      properties:
        InstanceCount:
          $ref: "#/components/schemas/ProcessingInstanceCount"
          description: The number of ML compute instances to use in the processing job. For distributed processing jobs, specify a value greater than 1. The default value is 1.
        InstanceType:
          $ref: "#/components/schemas/ProcessingInstanceType"
          description: The ML compute instance type for the processing job.
        VolumeSizeInGB:
          $ref: "#/components/schemas/ProcessingVolumeSizeInGB"
          description: The size of the ML storage volume in gigabytes that you want to provision. You must specify sufficient ML storage for your scenario. Certain Nitro-based instances include local storage with a fixed total size, dependent on the instance type. When using these instances for processing, Amazon SageMaker mounts the local instance storage instead of Amazon EBS gp2 storage. You can't request a VolumeSizeInGB greater than the total size of the local instance storage. For a list of instance types that support local instance storage, including the total size per instance type, see Instance Store Volumes.
        VolumeKmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The Amazon Web Services Key Management Service (Amazon Web Services KMS) key that Amazon SageMaker uses to encrypt data on the storage volume attached to the ML compute instance(s) that run the processing job. Certain Nitro-based instances include local storage, dependent on the instance type. Local storage volumes are encrypted using a hardware module on the instance. You can't request a VolumeKmsKeyId when using an instance type with local storage. For a list of instance types that support local instance storage, see Instance Store Volumes. For more information about local instance storage encryption, see SSD Instance Store Volumes.
      required:
        - InstanceCount
        - InstanceType
        - VolumeSizeInGB
    ProcessingStoppingCondition:
      description: Configures conditions under which the processing job should be stopped, such as how long the processing job has been running. After the condition is met, the processing job is stopped.
      type: object
      properties:
        MaxRuntimeInSeconds:
          $ref: "#/components/schemas/ProcessingMaxRuntimeInSeconds"
          description: Specifies the maximum runtime in seconds.
      required:
        - MaxRuntimeInSeconds
    ProcessingMaxRuntimeInSeconds:
      type: integer
      minimum: 1
      maximum: 777600
    AppSpecification:
      description: Configuration to run a processing job in a specified container image.
      type: object
      properties:
        ImageUri:
          $ref: "#/components/schemas/ImageUri"
          description: The container image to be run by the processing job.
        ContainerEntrypoint:
          $ref: "#/components/schemas/ContainerEntrypoint"
          description: The entrypoint for a container used to run a processing job.
        ContainerArguments:
          $ref: "#/components/schemas/ContainerArguments"
          description: The arguments for a container used to run a processing job.
      required:
        - ImageUri
    ContainerArguments:
      type: array
      items:
        $ref: "#/components/schemas/ContainerArgument"
    ProcessingEnvironmentMap:
      type: object
      properties: {}
    ExperimentConfig:
      description: "Associates a SageMaker job as a trial component with an experiment and trial. Specified when you call the following APIs: CreateProcessingJob CreateTrainingJob CreateTransformJob"
      type: object
      properties:
        ExperimentName:
          $ref: "#/components/schemas/ExperimentEntityName"
          description: The name of an existing experiment to associate with the trial component.
        TrialName:
          $ref: "#/components/schemas/ExperimentEntityName"
          description: The name of an existing trial to associate the trial component with. If not specified, a new trial is created.
        TrialComponentDisplayName:
          $ref: "#/components/schemas/ExperimentEntityName"
          description: The display name for the trial component. If this key isn't specified, the display name is the trial component name.
        RunName:
          $ref: "#/components/schemas/ExperimentEntityName"
          description: The name of the experiment run to associate with the trial component.
    CreateProcessingJobResponse:
      type: object
      properties:
        ProcessingJobArn:
          $ref: "#/components/schemas/ProcessingJobArn"
          description: The Amazon Resource Name (ARN) of the processing job.
      required:
        - ProcessingJobArn
    ProcessingJobArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:processing-job/[a-zA-Z0-9](-*[a-zA-Z0-9]){0,62}
    ProjectEntityName:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,31}"
    ServiceCatalogProvisioningDetails:
      description: Details that you specify to provision a service catalog product. For information about service catalog, see What is Amazon Web Services Service Catalog.
      type: object
      properties:
        ProductId:
          $ref: "#/components/schemas/ServiceCatalogEntityId"
          description: The ID of the product to provision.
        ProvisioningArtifactId:
          $ref: "#/components/schemas/ServiceCatalogEntityId"
          description: The ID of the provisioning artifact.
        PathId:
          $ref: "#/components/schemas/ServiceCatalogEntityId"
          description: The path identifier of the product. This value is optional if the product has a default path, and required if the product has more than one path.
        ProvisioningParameters:
          $ref: "#/components/schemas/ProvisioningParameters"
          description: A list of key value pairs that you specify when you provision a product.
      required:
        - ProductId
    ServiceCatalogEntityId:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9_\\-]*"
    ProvisioningParameters:
      type: array
      items:
        $ref: "#/components/schemas/ProvisioningParameter"
    ProvisioningParameter:
      description: A key value pair used when you provision a project as a service catalog product. For information, see What is Amazon Web Services Service Catalog.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/ProvisioningParameterKey"
          description: The key that identifies a provisioning parameter.
        Value:
          $ref: "#/components/schemas/ProvisioningParameterValue"
          description: The value of the provisioning parameter.
    ProvisioningParameterKey:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: .*
    ProvisioningParameterValue:
      type: string
      minLength: 0
      maxLength: 4096
      pattern: .*
    CreateTemplateProviderList:
      type: array
      items:
        $ref: "#/components/schemas/CreateTemplateProvider"
    CreateTemplateProvider:
      description: Contains configuration details for a template provider. Only one type of template provider can be specified.
      type: object
      properties:
        CfnTemplateProvider:
          $ref: "#/components/schemas/CfnCreateTemplateProvider"
          description: The CloudFormation template provider configuration for creating infrastructure resources.
    CfnCreateTemplateProvider:
      description: The CloudFormation template provider configuration for creating infrastructure resources.
      type: object
      properties:
        TemplateName:
          $ref: "#/components/schemas/CfnTemplateName"
          description: A unique identifier for the template within the project.
        TemplateURL:
          $ref: "#/components/schemas/CfnTemplateURL"
          description: The Amazon S3 URL of the CloudFormation template.
        RoleARN:
          $ref: "#/components/schemas/RoleArn"
          description: The IAM role that CloudFormation assumes when creating the stack.
        Parameters:
          $ref: "#/components/schemas/CfnStackCreateParameters"
          description: An array of CloudFormation stack parameters.
      required:
        - TemplateName
        - TemplateURL
    CfnTemplateName:
      type: string
      minLength: 1
      maxLength: 32
      pattern: (?=.{1,32}$)[a-zA-Z0-9](-*[a-zA-Z0-9])*
    CfnTemplateURL:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: (?=.{1,1024}$)(https)://([^/]+)/(.+)
    CfnStackCreateParameters:
      type: array
      items:
        $ref: "#/components/schemas/CfnStackCreateParameter"
    CfnStackCreateParameter:
      description: A key-value pair that represents a parameter for the CloudFormation stack.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/CfnStackParameterKey"
          description: The name of the CloudFormation parameter.
        Value:
          $ref: "#/components/schemas/CfnStackParameterValue"
          description: The value of the CloudFormation parameter.
      required:
        - Key
    CfnStackParameterKey:
      type: string
      minLength: 1
      maxLength: 255
      pattern: .{1,255}
    CfnStackParameterValue:
      type: string
      minLength: 0
      maxLength: 4096
      pattern: .{0,4096}
    CreateProjectOutput:
      type: object
      properties:
        ProjectArn:
          $ref: "#/components/schemas/ProjectArn"
          description: The Amazon Resource Name (ARN) of the project.
        ProjectId:
          $ref: "#/components/schemas/ProjectId"
          description: The ID of the new project.
      required:
        - ProjectArn
        - ProjectId
    ProjectArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]{9,16}:[0-9]{12}:project/[\S]{1,2048}
    ProjectId:
      type: string
      minLength: 1
      maxLength: 20
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9])*"
    SpaceSettings:
      description: A collection of space settings.
      type: object
      properties:
        JupyterServerAppSettings:
          $ref: "#/components/schemas/JupyterServerAppSettings"
        KernelGatewayAppSettings:
          $ref: "#/components/schemas/KernelGatewayAppSettings"
        CodeEditorAppSettings:
          $ref: "#/components/schemas/SpaceCodeEditorAppSettings"
          description: The Code Editor application settings.
        JupyterLabAppSettings:
          $ref: "#/components/schemas/SpaceJupyterLabAppSettings"
          description: The settings for the JupyterLab application.
        AppType:
          $ref: "#/components/schemas/AppType"
          description: The type of app created within the space. If using the UpdateSpace API, you can't change the app type of your space by specifying a different value for this field.
        SpaceStorageSettings:
          $ref: "#/components/schemas/SpaceStorageSettings"
          description: The storage settings for a space.
        SpaceManagedResources:
          $ref: "#/components/schemas/FeatureStatus"
          description: "If you enable this option, SageMaker AI creates the following resources on your behalf when you create the space: The user profile that possesses the space. The app that the space contains."
        CustomFileSystems:
          $ref: "#/components/schemas/CustomFileSystems"
          description: A file system, created by you, that you assign to a space for an Amazon SageMaker AI Domain. Permitted users can access this file system in Amazon SageMaker AI Studio.
        RemoteAccess:
          $ref: "#/components/schemas/FeatureStatus"
          description: A setting that enables or disables remote access for a SageMaker space. When enabled, this allows you to connect to the remote space from your local IDE.
    SpaceCodeEditorAppSettings:
      description: The application settings for a Code Editor space.
      type: object
      properties:
        DefaultResourceSpec:
          $ref: "#/components/schemas/ResourceSpec"
        AppLifecycleManagement:
          $ref: "#/components/schemas/SpaceAppLifecycleManagement"
          description: Settings that are used to configure and manage the lifecycle of CodeEditor applications in a space.
    SpaceAppLifecycleManagement:
      description: Settings that are used to configure and manage the lifecycle of Amazon SageMaker Studio applications in a space.
      type: object
      properties:
        IdleSettings:
          $ref: "#/components/schemas/SpaceIdleSettings"
          description: Settings related to idle shutdown of Studio applications.
    SpaceIdleSettings:
      description: Settings related to idle shutdown of Studio applications in a space.
      type: object
      properties:
        IdleTimeoutInMinutes:
          $ref: "#/components/schemas/IdleTimeoutInMinutes"
          description: The time that SageMaker waits after the application becomes idle before shutting it down.
    SpaceJupyterLabAppSettings:
      description: The settings for the JupyterLab application within a space.
      type: object
      properties:
        DefaultResourceSpec:
          $ref: "#/components/schemas/ResourceSpec"
        CodeRepositories:
          $ref: "#/components/schemas/CodeRepositories"
          description: A list of Git repositories that SageMaker automatically displays to users for cloning in the JupyterLab application.
        AppLifecycleManagement:
          $ref: "#/components/schemas/SpaceAppLifecycleManagement"
          description: Settings that are used to configure and manage the lifecycle of JupyterLab applications in a space.
    SpaceStorageSettings:
      description: The storage settings for a space.
      type: object
      properties:
        EbsStorageSettings:
          $ref: "#/components/schemas/EbsStorageSettings"
          description: A collection of EBS storage settings for a space.
    EbsStorageSettings:
      description: A collection of EBS storage settings that apply to both private and shared spaces.
      type: object
      properties:
        EbsVolumeSizeInGb:
          $ref: "#/components/schemas/SpaceEbsVolumeSizeInGb"
          description: The size of an EBS storage volume for a space.
      required:
        - EbsVolumeSizeInGb
    CustomFileSystems:
      type: array
      items:
        $ref: "#/components/schemas/CustomFileSystem"
    CustomFileSystem:
      description: A file system, created by you, that you assign to a user profile or space for an Amazon SageMaker AI Domain. Permitted users can access this file system in Amazon SageMaker AI Studio.
      type: object
      properties:
        EFSFileSystem:
          $ref: "#/components/schemas/EFSFileSystem"
          description: A custom file system in Amazon EFS.
        FSxLustreFileSystem:
          $ref: "#/components/schemas/FSxLustreFileSystem"
          description: A custom file system in Amazon FSx for Lustre.
        S3FileSystem:
          $ref: "#/components/schemas/S3FileSystem"
          description: A custom file system in Amazon S3. This is only supported in Amazon SageMaker Unified Studio.
    EFSFileSystem:
      description: A file system, created by you in Amazon EFS, that you assign to a user profile or space for an Amazon SageMaker AI Domain. Permitted users can access this file system in Amazon SageMaker AI Studio.
      type: object
      properties:
        FileSystemId:
          $ref: "#/components/schemas/FileSystemId"
          description: The ID of your Amazon EFS file system.
      required:
        - FileSystemId
    FSxLustreFileSystem:
      description: A custom file system in Amazon FSx for Lustre.
      type: object
      properties:
        FileSystemId:
          $ref: "#/components/schemas/FileSystemId"
          description: Amazon FSx for Lustre file system ID.
      required:
        - FileSystemId
    S3FileSystem:
      description: A custom file system in Amazon S3. This is only supported in Amazon SageMaker Unified Studio.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3SchemaUri"
          description: "The Amazon S3 URI that specifies the location in S3 where files are stored, which is mounted within the Studio environment. For example: s3://`<bucket-name>`/`<prefix>`/."
      required:
        - S3Uri
    OwnershipSettings:
      description: The collection of ownership settings for a space.
      type: object
      properties:
        OwnerUserProfileName:
          $ref: "#/components/schemas/UserProfileName"
          description: The user profile who is the owner of the space.
