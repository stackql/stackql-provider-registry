  /Search:
    post:
      operationId: Search
      description: "Finds SageMaker resources that match a search query. Matching resources are returned as a list of SearchRecord objects in the response. You can sort the search results by any resource property in a ascending or descending order. You can query against the following value types: numeric, text, Boolean, and timestamp. The Search API may provide access to otherwise restricted data. See Amazon SageMaker API Permissions: Actions, Permissions, and Resources Reference for more information."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.Search
            default: SageMaker.Search
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Resource:
                  $ref: "#/components/schemas/ResourceType"
                  description: The name of the SageMaker resource to search for.
                SearchExpression:
                  $ref: "#/components/schemas/SearchExpression"
                  description: A Boolean conditional statement. Resources must satisfy this condition to be included in search results. You must provide at least one subexpression, filter, or nested filter. The maximum number of recursive SubExpressions, NestedFilters, and Filters that can be included in a SearchExpression object is 50.
                SortBy:
                  $ref: "#/components/schemas/ResourcePropertyName"
                  description: The name of the resource property used to sort the SearchResults. The default is LastModifiedTime.
                SortOrder:
                  $ref: "#/components/schemas/SearchSortOrder"
                  description: How SearchResults are ordered. Valid values are Ascending or Descending. The default is Descending.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: If more than MaxResults resources match the specified SearchExpression, the response includes a NextToken. The NextToken can be passed to the next SearchRequest to continue retrieving results.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return.
                CrossAccountFilterOption:
                  $ref: "#/components/schemas/CrossAccountFilterOption"
                  description: A cross account filter option. When the value is "CrossAccount" the search results will only include resources made discoverable to you from other accounts. When the value is "SameAccount" or null the search results will only include resources from your account. Default is null. For more information on searching for resources made discoverable to your account, see Search discoverable resources in the SageMaker Developer Guide. The maximum number of ResourceCatalogs viewable is 1000.
                VisibilityConditions:
                  $ref: "#/components/schemas/VisibilityConditionsList"
                  description: Limits the results of your search request to the resources that you can access.
              required:
                - Resource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
  /SearchTrainingPlanOfferings:
    post:
      operationId: SearchTrainingPlanOfferings
      description: Searches for available training plan offerings based on specified criteria. Users search for available plan offerings based on their requirements (e.g., instance type, count, start time, duration). And then, they create a plan that best matches their needs using the ID of the plan offering they want to use. For more information about how to reserve GPU capacity for your SageMaker training jobs or SageMaker HyperPod clusters using Amazon SageMaker Training Plan , see CreateTrainingPlan .
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.SearchTrainingPlanOfferings
            default: SageMaker.SearchTrainingPlanOfferings
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                InstanceType:
                  $ref: "#/components/schemas/ReservedCapacityInstanceType"
                  description: The type of instance you want to search for in the available training plan offerings. This field allows you to filter the search results based on the specific compute resources you require for your SageMaker training jobs or SageMaker HyperPod clusters. When searching for training plan offerings, specifying the instance type helps you find Reserved Instances that match your computational needs.
                InstanceCount:
                  $ref: "#/components/schemas/ReservedCapacityInstanceCount"
                  description: The number of instances you want to reserve in the training plan offerings. This allows you to specify the quantity of compute resources needed for your SageMaker training jobs or SageMaker HyperPod clusters, helping you find reserved capacity offerings that match your requirements.
                UltraServerType:
                  $ref: "#/components/schemas/UltraServerType"
                  description: The type of UltraServer to search for, such as ml.u-p6e-gb200x72.
                UltraServerCount:
                  $ref: "#/components/schemas/UltraServerCount"
                  description: The number of UltraServers to search for.
                StartTimeAfter:
                  $ref: "#/components/schemas/Timestamp"
                  description: A filter to search for training plan offerings with a start time after a specified date.
                EndTimeBefore:
                  $ref: "#/components/schemas/Timestamp"
                  description: A filter to search for reserved capacity offerings with an end time before a specified date.
                DurationHours:
                  $ref: "#/components/schemas/TrainingPlanDurationHoursInput"
                  description: The desired duration in hours for the training plan offerings.
                TargetResources:
                  $ref: "#/components/schemas/SageMakerResourceNames"
                  description: The target resources (e.g., SageMaker Training Jobs, SageMaker HyperPod, SageMaker Endpoints, Studio apps) to search for in the offerings. Training plans are specific to their target resource. A training plan designed for SageMaker training jobs can only be used to schedule and run training jobs. A training plan for HyperPod clusters can be used exclusively to provide compute resources to a cluster's instance group. A training plan for SageMaker endpoints can be used exclusively to provide compute resources to SageMaker endpoints for model deployment. A training plan for Studio apps can be used to launch JupyterLab and Code Editor apps on reserved training plan capacity.
                TrainingPlanArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN); of an existing training plan to search for extension offerings. When specified, the API returns extension offerings that can be used to extend the specified training plan.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchTrainingPlanOfferingsResponse"
