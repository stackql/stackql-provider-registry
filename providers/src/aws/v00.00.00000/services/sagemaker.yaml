    MetricsConfig:
      description: The configuration for Utilization metrics.
      type: object
      properties:
        EnableEnhancedMetrics:
          $ref: "#/components/schemas/EnableEnhancedMetrics"
          description: Specifies whether to enable enhanced metrics for the endpoint. Enhanced metrics provide utilization and invocation data at instance and container granularity. Container granularity is supported for Inference Components. The default is False.
        MetricPublishFrequencyInSeconds:
          $ref: "#/components/schemas/MetricPublishFrequencyInSeconds"
          description: "The interval, in seconds, at which metrics are published to Amazon CloudWatch. Defaults to 60. Valid values: 10, 30, 60, 120, 180, 240, 300. When EnableEnhancedMetrics is set to False, this interval applies to utilization metrics only; invocation metrics continue to be published at the default 60-second interval. When EnableEnhancedMetrics is set to True, this interval applies to both utilization and invocation metrics."
    EnableEnhancedMetrics:
      type: boolean
    MetricPublishFrequencyInSeconds:
      type: integer
    CreateEndpointConfigOutput:
