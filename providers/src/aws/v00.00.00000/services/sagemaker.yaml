      type: string
      minLength: 0
      maxLength: 63
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9])*"
    DirectInternetAccess:
      type: string
      enum:
        - Enabled
        - Disabled
    NotebookInstanceVolumeSizeInGB:
      type: integer
      minimum: 5
      maximum: 16384
    NotebookInstanceAcceleratorTypes:
      type: array
      items:
        $ref: "#/components/schemas/NotebookInstanceAcceleratorType"
    NotebookInstanceAcceleratorType:
      type: string
      enum:
        - ml.eia1.medium
        - ml.eia1.large
        - ml.eia1.xlarge
        - ml.eia2.medium
        - ml.eia2.large
        - ml.eia2.xlarge
    CodeRepositoryNameOrUrl:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: https://([^/]+)/?(.*)$|^[a-zA-Z0-9](-*[a-zA-Z0-9])*
    AdditionalCodeRepositoryNamesOrUrls:
      type: array
      items:
        $ref: "#/components/schemas/CodeRepositoryNameOrUrl"
    RootAccess:
      type: string
      enum:
        - Enabled
        - Disabled
    PlatformIdentifier:
      type: string
      minLength: 0
      maxLength: 20
      pattern: (notebook-al1-v1|notebook-al2-v1|notebook-al2-v2|notebook-al2-v3|notebook-al2023-v1)
    InstanceMetadataServiceConfiguration:
      description: Information on the IMDS configuration of the notebook instance
      type: object
      properties:
        MinimumInstanceMetadataServiceVersion:
          $ref: "#/components/schemas/MinimumInstanceMetadataServiceVersion"
          description: Indicates the minimum IMDS version that the notebook instance supports. When passed as part of CreateNotebookInstance, if no value is selected, then it defaults to IMDSv1. This means that both IMDSv1 and IMDSv2 are supported. If passed as part of UpdateNotebookInstance, there is no default.
      required:
        - MinimumInstanceMetadataServiceVersion
    MinimumInstanceMetadataServiceVersion:
      type: string
      minLength: 0
      maxLength: 1
      pattern: 1|2
    CreateNotebookInstanceOutput:
      type: object
      properties:
        NotebookInstanceArn:
          $ref: "#/components/schemas/NotebookInstanceArn"
          description: The Amazon Resource Name (ARN) of the notebook instance.
    NotebookInstanceArn:
      type: string
      minLength: 0
      maxLength: 256
    NotebookInstanceLifecycleConfigList:
      type: array
      items:
        $ref: "#/components/schemas/NotebookInstanceLifecycleHook"
    NotebookInstanceLifecycleHook:
      description: "Contains the notebook instance lifecycle configuration script. Each lifecycle configuration script has a limit of 16384 characters. The value of the $PATH environment variable that is available to both scripts is /sbin:bin:/usr/sbin:/usr/bin. View Amazon CloudWatch Logs for notebook instance lifecycle configurations in log group /aws/sagemaker/NotebookInstances in log stream [notebook-instance-name]/[LifecycleConfigHook]. Lifecycle configuration scripts cannot run for longer than 5 minutes. If a script runs for longer than 5 minutes, it fails and the notebook instance is not created or started. For information about notebook instance lifestyle configurations, see Step 2.1: (Optional) Customize a Notebook Instance."
      type: object
      properties:
        Content:
          $ref: "#/components/schemas/NotebookInstanceLifecycleConfigContent"
          description: A base64-encoded string that contains a shell script for a notebook instance lifecycle configuration.
    NotebookInstanceLifecycleConfigContent:
      type: string
      minLength: 1
      maxLength: 16384
      pattern: "[\\S\\s]+"
    CreateNotebookInstanceLifecycleConfigOutput:
      type: object
      properties:
        NotebookInstanceLifecycleConfigArn:
          $ref: "#/components/schemas/NotebookInstanceLifecycleConfigArn"
          description: The Amazon Resource Name (ARN) of the lifecycle configuration.
    NotebookInstanceLifecycleConfigArn:
      type: string
      minLength: 0
      maxLength: 256
