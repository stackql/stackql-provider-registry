      type: object
      properties:
        Succeeded:
          $ref: "#/components/schemas/ObjectiveStatusCounter"
          description: The number of training jobs whose final objective metric was evaluated by the hyperparameter tuning job and used in the hyperparameter tuning process.
        Pending:
          $ref: "#/components/schemas/ObjectiveStatusCounter"
          description: The number of training jobs that are in progress and pending evaluation of their final objective metric.
        Failed:
          $ref: "#/components/schemas/ObjectiveStatusCounter"
          description: The number of training jobs whose final objective metric was not evaluated and used in the hyperparameter tuning process. This typically occurs when the training job failed or did not emit an objective metric.
    ObjectiveStatusCounter:
      type: integer
      minimum: 0
    HyperParameterTrainingJobSummary:
      description: The container for the summary information about a training job.
      type: object
      properties:
        TrainingJobDefinitionName:
          $ref: "#/components/schemas/HyperParameterTrainingJobDefinitionName"
          description: The training job definition name.
        TrainingJobName:
          $ref: "#/components/schemas/TrainingJobName"
          description: The name of the training job.
        TrainingJobArn:
          $ref: "#/components/schemas/TrainingJobArn"
          description: The Amazon Resource Name (ARN) of the training job.
        TuningJobName:
          $ref: "#/components/schemas/HyperParameterTuningJobName"
          description: The HyperParameter tuning job that launched the training job.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the training job was created.
        TrainingStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the training job started.
        TrainingEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: Specifies the time when the training job ends on training instances. You are billed for the time interval between the value of TrainingStartTime and this time. For successful jobs and stopped jobs, this is the time after model artifacts are uploaded. For failed jobs, this is the time when SageMaker detects a job failure.
        TrainingJobStatus:
          $ref: "#/components/schemas/TrainingJobStatus"
          description: The status of the training job.
        TunedHyperParameters:
          type: object
          properties: {}
          description: A list of the hyperparameters for which you specified ranges to search.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: The reason that the training job failed.
        FinalHyperParameterTuningJobObjectiveMetric:
          $ref: "#/components/schemas/FinalHyperParameterTuningJobObjectiveMetric"
          description: The FinalHyperParameterTuningJobObjectiveMetric object that specifies the value of the objective metric of the tuning job that launched this training job.
        ObjectiveStatus:
          $ref: "#/components/schemas/ObjectiveStatus"
          description: "The status of the objective metric for the training job: Succeeded: The final objective metric for the training job was evaluated by the hyperparameter tuning job and used in the hyperparameter tuning process. Pending: The training job is in progress and evaluation of its final objective metric is pending. Failed: The final objective metric for the training job was not evaluated, and was not used in the hyperparameter tuning process. This typically occurs when the training job failed or did not emit an objective metric."
      required:
        - TrainingJobName
        - TrainingJobArn
        - CreationTime
        - TrainingJobStatus
        - TunedHyperParameters
    TrainingJobStatus:
      type: string
      enum:
        - InProgress
        - Completed
        - Failed
        - Stopping
        - Stopped
        - Deleting
    FinalHyperParameterTuningJobObjectiveMetric:
      description: Shows the latest objective metric emitted by a training job that was launched by a hyperparameter tuning job. You define the objective metric in the HyperParameterTuningJobObjective parameter of HyperParameterTuningJobConfig.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/HyperParameterTuningJobObjectiveType"
          description: Select if you want to minimize or maximize the objective metric during hyperparameter tuning.
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the objective metric. For SageMaker built-in algorithms, metrics are defined per algorithm. See the metrics for XGBoost as an example. You can also use a custom algorithm for training and define your own metrics. For more information, see Define metrics and environment variables.
        Value:
          $ref: "#/components/schemas/MetricValue"
          description: The value of the objective metric.
      required:
        - MetricName
        - Value
    HyperParameterTuningJobCompletionDetails:
      description: A structure that contains runtime information about both current and completed hyperparameter tuning jobs.
      type: object
      properties:
        NumberOfTrainingJobsObjectiveNotImproving:
          $ref: "#/components/schemas/Integer"
          description: The number of training jobs launched by a tuning job that are not improving (1% or less) as measured by model performance evaluated against an objective function.
        ConvergenceDetectedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time in timestamp format that AMT detected model convergence, as defined by a lack of significant improvement over time based on criteria developed over a wide range of diverse benchmarking tests.
    HyperParameterTuningJobConsumedResources:
      description: The total resources consumed by your hyperparameter tuning job.
      type: object
      properties:
        RuntimeInSeconds:
          $ref: "#/components/schemas/Integer"
          description: The wall clock runtime in seconds used by your hyperparameter tuning job.
    DescribeImageResponse:
      type: object
      properties:
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the image was created.
        Description:
          $ref: "#/components/schemas/ImageDescription"
          description: The description of the image.
        DisplayName:
          $ref: "#/components/schemas/ImageDisplayName"
          description: The name of the image as displayed.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: When a create, update, or delete operation fails, the reason for the failure.
        ImageArn:
          $ref: "#/components/schemas/ImageArn"
          description: The ARN of the image.
        ImageName:
          $ref: "#/components/schemas/ImageName"
          description: The name of the image.
        ImageStatus:
          $ref: "#/components/schemas/ImageStatus"
          description: The status of the image.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the image was last modified.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of the IAM role that enables Amazon SageMaker AI to perform tasks on your behalf.
    ImageStatus:
      type: string
      enum:
        - CREATING
        - CREATED
        - CREATE_FAILED
        - UPDATING
        - UPDATE_FAILED
        - DELETING
        - DELETE_FAILED
    DescribeImageVersionResponse:
      type: object
      properties:
        BaseImage:
          $ref: "#/components/schemas/ImageBaseImage"
          description: The registry path of the container image on which this image version is based.
        ContainerImage:
          $ref: "#/components/schemas/ImageContainerImage"
          description: The registry path of the container image that contains this image version.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the version was created.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: When a create or delete operation fails, the reason for the failure.
        ImageArn:
          $ref: "#/components/schemas/ImageArn"
          description: The ARN of the image the version is based on.
        ImageVersionArn:
          $ref: "#/components/schemas/ImageVersionArn"
          description: The ARN of the version.
        ImageVersionStatus:
          $ref: "#/components/schemas/ImageVersionStatus"
          description: The status of the version.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the version was last modified.
        Version:
          $ref: "#/components/schemas/ImageVersionNumber"
          description: The version number.
        VendorGuidance:
          $ref: "#/components/schemas/VendorGuidance"
          description: "The stability of the image version specified by the maintainer. NOT_PROVIDED: The maintainers did not provide a status for image version stability. STABLE: The image version is stable. TO_BE_ARCHIVED: The image version is set to be archived. Custom image versions that are set to be archived are automatically archived after three months. ARCHIVED: The image version is archived. Archived image versions are not searchable and are no longer actively supported."
        JobType:
          $ref: "#/components/schemas/JobType"
          description: "Indicates SageMaker AI job type compatibility. TRAINING: The image version is compatible with SageMaker AI training jobs. INFERENCE: The image version is compatible with SageMaker AI inference jobs. NOTEBOOK_KERNEL: The image version is compatible with SageMaker AI notebook kernels."
        MLFramework:
          $ref: "#/components/schemas/MLFramework"
          description: The machine learning framework vended in the image version.
        ProgrammingLang:
          $ref: "#/components/schemas/ProgrammingLang"
          description: The supported programming language and its version.
        Processor:
          $ref: "#/components/schemas/Processor"
          description: "Indicates CPU or GPU compatibility. CPU: The image version is compatible with CPU. GPU: The image version is compatible with GPU."
        Horovod:
          $ref: "#/components/schemas/Horovod"
          description: Indicates Horovod compatibility.
        ReleaseNotes:
          $ref: "#/components/schemas/ReleaseNotes"
          description: The maintainer description of the image version.
    ImageContainerImage:
      type: string
      minLength: 1
      maxLength: 255
    ImageVersionStatus:
      type: string
      enum:
        - CREATING
        - CREATED
        - CREATE_FAILED
        - DELETING
        - DELETE_FAILED
    DescribeInferenceComponentOutput:
      type: object
      properties:
        InferenceComponentName:
          $ref: "#/components/schemas/InferenceComponentName"
          description: The name of the inference component.
        InferenceComponentArn:
          $ref: "#/components/schemas/InferenceComponentArn"
          description: The Amazon Resource Name (ARN) of the inference component.
        EndpointName:
          $ref: "#/components/schemas/EndpointName"
          description: The name of the endpoint that hosts the inference component.
        EndpointArn:
          $ref: "#/components/schemas/EndpointArn"
          description: The Amazon Resource Name (ARN) of the endpoint that hosts the inference component.
        VariantName:
          $ref: "#/components/schemas/VariantName"
          description: The name of the production variant that hosts the inference component.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: If the inference component status is Failed, the reason for the failure.
        Specification:
          $ref: "#/components/schemas/InferenceComponentSpecificationSummary"
          description: Details about the resources that are deployed with this inference component.
        Specifications:
          $ref: "#/components/schemas/InferenceComponentSpecificationSummaryList"
          description: A list of specification summaries for the inference component, one per instance type. This parameter is populated when the inference component was created with multiple specifications. When this parameter is populated, the singular Specification parameter is not returned.
        RuntimeConfig:
          $ref: "#/components/schemas/InferenceComponentRuntimeConfigSummary"
          description: Details about the runtime settings for the model that is deployed with the inference component.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the inference component was created.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the inference component was last updated.
        InferenceComponentStatus:
          $ref: "#/components/schemas/InferenceComponentStatus"
          description: The status of the inference component.
        LastDeploymentConfig:
          $ref: "#/components/schemas/InferenceComponentDeploymentConfig"
          description: The deployment and rollback settings that you assigned to the inference component.
      required:
        - InferenceComponentName
        - InferenceComponentArn
        - EndpointName
        - EndpointArn
        - CreationTime
        - LastModifiedTime
    InferenceComponentSpecificationSummary:
      description: Details about the resources that are deployed with this inference component.
      type: object
      properties:
        InstanceType:
          $ref: "#/components/schemas/ProductionVariantInstanceType"
          description: The ML compute instance type associated with this inference component specification.
        ModelName:
          $ref: "#/components/schemas/ModelName"
          description: The name of the SageMaker AI model object that is deployed with the inference component.
        Container:
          $ref: "#/components/schemas/InferenceComponentContainerSpecificationSummary"
          description: Details about the container that provides the runtime environment for the model that is deployed with the inference component.
        StartupParameters:
          $ref: "#/components/schemas/InferenceComponentStartupParameters"
          description: Settings that take effect while the model container starts up.
        ComputeResourceRequirements:
          $ref: "#/components/schemas/InferenceComponentComputeResourceRequirements"
          description: The compute resources allocated to run the model, plus any adapter models, that you assign to the inference component.
        BaseInferenceComponentName:
          $ref: "#/components/schemas/InferenceComponentName"
          description: The name of the base inference component that contains this inference component.
        DataCacheConfig:
          $ref: "#/components/schemas/InferenceComponentDataCacheConfigSummary"
          description: Settings that affect how the inference component caches data.
        SchedulingConfig:
          $ref: "#/components/schemas/InferenceComponentSchedulingConfig"
          description: The scheduling configuration that determines how inference component copies are placed across available instances when copies are added or removed.
    InferenceComponentContainerSpecificationSummary:
      description: Details about the resources that are deployed with this inference component.
      type: object
      properties:
        DeployedImage:
          $ref: "#/components/schemas/DeployedImage"
        ArtifactUrl:
          $ref: "#/components/schemas/Url"
          description: The Amazon S3 path where the model artifacts are stored.
        Environment:
          type: object
          properties: {}
          description: The environment variables to set in the Docker container.
    InferenceComponentDataCacheConfigSummary:
      description: Settings that affect how the inference component caches data.
      type: object
      properties:
        EnableCaching:
          $ref: "#/components/schemas/EnableCaching"
          description: Indicates whether the inference component caches model artifacts as part of the auto scaling process.
      required:
        - EnableCaching
    InferenceComponentSpecificationSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/InferenceComponentSpecificationSummary"
    InferenceComponentRuntimeConfigSummary:
      description: Details about the runtime settings for the model that is deployed with the inference component.
      type: object
      properties:
        DesiredCopyCount:
          $ref: "#/components/schemas/InferenceComponentCopyCount"
          description: The number of runtime copies of the model container that you requested to deploy with the inference component.
        CurrentCopyCount:
          $ref: "#/components/schemas/InferenceComponentCopyCount"
          description: The number of runtime copies of the model container that are currently deployed.
        PlacementStatus:
          $ref: "#/components/schemas/InferenceComponentPlacementStatusList"
          description: The placement status of the inference component across instance types. Shows how the inference component copies are distributed across instance types.
    InferenceComponentPlacementStatusList:
      type: array
      items:
        $ref: "#/components/schemas/InferenceComponentPlacementStatus"
    InferenceComponentPlacementStatus:
      description: The placement status of an inference component on a specific instance type. Shows the number of inference component copies currently placed on instances of a given type.
      type: object
      properties:
        InstanceType:
          $ref: "#/components/schemas/ProductionVariantInstanceType"
          description: The ML compute instance type where the inference component copies are placed.
        CurrentCopyCount:
          $ref: "#/components/schemas/InferenceComponentCopyCount"
          description: The number of inference component copies currently placed on instances of this type.
      required:
        - InstanceType
        - CurrentCopyCount
    InferenceComponentStatus:
      type: string
      enum:
        - InService
        - Creating
        - Updating
        - Failed
        - Deleting
    InferenceComponentDeploymentConfig:
      description: The deployment configuration for an endpoint that hosts inference components. The configuration includes the desired deployment strategy and rollback settings.
      type: object
      properties:
        RollingUpdatePolicy:
          $ref: "#/components/schemas/InferenceComponentRollingUpdatePolicy"
          description: Specifies a rolling deployment strategy for updating a SageMaker AI endpoint.
        AutoRollbackConfiguration:
          $ref: "#/components/schemas/AutoRollbackConfig"
      required:
        - RollingUpdatePolicy
    InferenceComponentRollingUpdatePolicy:
      description: Specifies a rolling deployment strategy for updating a SageMaker AI inference component.
      type: object
      properties:
        MaximumBatchSize:
          $ref: "#/components/schemas/InferenceComponentCapacitySize"
          description: The batch size for each rolling step in the deployment process. For each step, SageMaker AI provisions capacity on the new endpoint fleet, routes traffic to that fleet, and terminates capacity on the old endpoint fleet. The value must be between 5% to 50% of the copy count of the inference component.
        WaitIntervalInSeconds:
          $ref: "#/components/schemas/WaitIntervalInSeconds"
          description: The length of the baking period, during which SageMaker AI monitors alarms for each batch on the new fleet.
        MaximumExecutionTimeoutInSeconds:
          $ref: "#/components/schemas/MaximumExecutionTimeoutInSeconds"
          description: The time limit for the total deployment. Exceeding this limit causes a timeout.
        RollbackMaximumBatchSize:
          $ref: "#/components/schemas/InferenceComponentCapacitySize"
          description: The batch size for a rollback to the old endpoint fleet. If this field is absent, the value is set to the default, which is 100% of the total capacity. When the default is used, SageMaker AI provisions the entire capacity of the old fleet at once during rollback.
      required:
        - MaximumBatchSize
        - WaitIntervalInSeconds
    InferenceComponentCapacitySize:
      description: "Specifies the type and size of the endpoint capacity to activate for a rolling deployment or a rollback strategy. You can specify your batches as either of the following: A count of inference component copies The overall percentage or your fleet For a rollback strategy, if you don't specify the fields in this object, or if you set the Value parameter to 100%, then SageMaker AI uses a blue/green rollback strategy and rolls all traffic back to the blue fleet."
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/InferenceComponentCapacitySizeType"
          description: Specifies the endpoint capacity type. COPY_COUNT The endpoint activates based on the number of inference component copies. CAPACITY_PERCENT The endpoint activates based on the specified percentage of capacity.
        Value:
          $ref: "#/components/schemas/CapacitySizeValue"
          description: Defines the capacity size, either as a number of inference component copies or a capacity percentage.
      required:
        - Type
        - Value
    InferenceComponentCapacitySizeType:
      type: string
      enum:
        - COPY_COUNT
        - CAPACITY_PERCENT
    DescribeInferenceExperimentResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/InferenceExperimentArn"
          description: The ARN of the inference experiment being described.
        Name:
          $ref: "#/components/schemas/InferenceExperimentName"
          description: The name of the inference experiment.
        Type:
          $ref: "#/components/schemas/InferenceExperimentType"
          description: The type of the inference experiment.
        Schedule:
          $ref: "#/components/schemas/InferenceExperimentSchedule"
          description: The duration for which the inference experiment ran or will run.
        Status:
          $ref: "#/components/schemas/InferenceExperimentStatus"
          description: "The status of the inference experiment. The following are the possible statuses for an inference experiment: Creating - Amazon SageMaker is creating your experiment. Created - Amazon SageMaker has finished the creation of your experiment and will begin the experiment at the scheduled time. Updating - When you make changes to your experiment, your experiment shows as updating. Starting - Amazon SageMaker is beginning your experiment. Running - Your experiment is in progress. Stopping - Amazon SageMaker is stopping your experiment. Completed - Your experiment has completed. Cancelled - When you conclude your experiment early using the StopInferenceExperiment API, or if any operation fails with an unexpected error, it shows as cancelled."
        StatusReason:
          $ref: "#/components/schemas/InferenceExperimentStatusReason"
          description: The error message or client-specified Reason from the StopInferenceExperiment API, that explains the status of the inference experiment.
        Description:
          $ref: "#/components/schemas/InferenceExperimentDescription"
          description: The description of the inference experiment.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which you created the inference experiment.
        CompletionTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the inference experiment was completed.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which you last modified the inference experiment.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of the IAM role that Amazon SageMaker can assume to access model artifacts and container images, and manage Amazon SageMaker Inference endpoints for model deployment.
        EndpointMetadata:
          $ref: "#/components/schemas/EndpointMetadata"
          description: The metadata of the endpoint on which the inference experiment ran.
        ModelVariants:
          $ref: "#/components/schemas/ModelVariantConfigSummaryList"
          description: An array of ModelVariantConfigSummary objects. There is one for each variant in the inference experiment. Each ModelVariantConfigSummary object in the array describes the infrastructure configuration for deploying the corresponding variant.
        DataStorageConfig:
          $ref: "#/components/schemas/InferenceExperimentDataStorageConfig"
          description: The Amazon S3 location and configuration for storing inference request and response data.
        ShadowModeConfig:
          $ref: "#/components/schemas/ShadowModeConfig"
          description: The configuration of ShadowMode inference experiment type, which shows the production variant that takes all the inference requests, and the shadow variant to which Amazon SageMaker replicates a percentage of the inference requests. For the shadow variant it also shows the percentage of requests that Amazon SageMaker replicates.
        KmsKey:
          $ref: "#/components/schemas/KmsKeyId"
          description: The Amazon Web Services Key Management Service (Amazon Web Services KMS) key that Amazon SageMaker uses to encrypt data on the storage volume attached to the ML compute instance that hosts the endpoint. For more information, see CreateInferenceExperiment.
      required:
        - Arn
        - Name
        - Type
        - Status
        - EndpointMetadata
        - ModelVariants
    InferenceExperimentStatus:
      type: string
      enum:
        - Creating
        - Created
        - Updating
        - Running
        - Starting
        - Stopping
        - Completed
        - Cancelled
    InferenceExperimentStatusReason:
