      maximum: 3600
    InvocationsMaxRetries:
      type: integer
      minimum: 0
      maximum: 3
    TransformEnvironmentMap:
      type: object
      properties: {}
    BatchDataCaptureConfig:
      description: Configuration to control how SageMaker captures inference data for batch transform jobs.
      type: object
      properties:
        DestinationS3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 location being used to capture the data.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: "The Amazon Resource Name (ARN) of a Amazon Web Services Key Management Service key that SageMaker uses to encrypt data on the storage volume attached to the ML compute instance that hosts the batch transform job. The KmsKeyId can be any of the following formats: Key ID: 1234abcd-12ab-34cd-56ef-1234567890ab Key ARN: arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab Alias name: alias/ExampleAlias Alias name ARN: arn:aws:kms:us-west-2:111122223333:alias/ExampleAlias"
        GenerateInferenceId:
          $ref: "#/components/schemas/Boolean"
          description: Flag that indicates whether to append inference id to the output.
      required:
        - DestinationS3Uri
    DataProcessing:
      description: The data structure used to specify the data to be used for inference in a batch transform job and to associate the data that is relevant to the prediction results in the output. The input filter provided allows you to exclude input data that is not needed for inference in a batch transform job. The output filter provided allows you to include input data relevant to interpreting the predictions in the output from the job. For more information, see Associate Prediction Results with their Corresponding Input Records.
      type: object
      properties:
        InputFilter:
          $ref: "#/components/schemas/JsonPath"
          description: 'A JSONPath expression used to select a portion of the input data to pass to the algorithm. Use the InputFilter parameter to exclude fields, such as an ID column, from the input. If you want SageMaker to pass the entire input dataset to the algorithm, accept the default value $. Examples: "$", "$[1:]", "$.features"'
        OutputFilter:
          $ref: "#/components/schemas/JsonPath"
          description: "A JSONPath expression used to select a portion of the joined dataset to save in the output file for a batch transform job. If you want SageMaker to store the entire input dataset in the output file, leave the default value, $. If you specify indexes that aren't within the dimension size of the joined dataset, you get an error. Examples: \"$\", \"$[0,5:]\", \"$['id','SageMakerOutput']\""
        JoinSource:
          $ref: "#/components/schemas/JoinSource"
          description: Specifies the source of the data to join with the transformed data. The valid values are None and Input. The default value is None, which specifies not to join the input with the transformed data. If you want the batch transform job to join the original input data with the transformed data, set JoinSource to Input. You can specify OutputFilter as an additional filter to select a portion of the joined dataset and store it in the output file. For JSON or JSONLines objects, such as a JSON array, SageMaker adds the transformed data to the input JSON object in an attribute called SageMakerOutput. The joined result for JSON must be a key-value pair object. If the input is not a key-value pair object, SageMaker creates a new JSON file. In the new JSON file, and the input data is stored under the SageMakerInput key and the results are stored in SageMakerOutput. For CSV data, SageMaker takes each row as a JSON array and joins the transformed data with the input by appending each transformed row to the end of the input. The joined data has the original input data followed by the transformed data and the output is a CSV file. For information on how joining in applied, see Workflow for Associating Inferences with Input Records.
    JsonPath:
      type: string
      minLength: 0
      maxLength: 63
    JoinSource:
      type: string
      enum:
        - Input
        - None
    CreateTransformJobResponse:
      type: object
      properties:
        TransformJobArn:
          $ref: "#/components/schemas/TransformJobArn"
          description: The Amazon Resource Name (ARN) of the transform job.
      required:
        - TransformJobArn
    TransformJobArn:
