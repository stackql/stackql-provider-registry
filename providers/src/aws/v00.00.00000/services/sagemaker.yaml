          description: The number of available spare instances in the training plan.
        TotalUltraServerCount:
          $ref: "#/components/schemas/UltraServerCount"
          description: The total number of UltraServers reserved to this training plan.
        TargetResources:
          $ref: "#/components/schemas/SageMakerResourceNames"
          description: The target resources (e.g., SageMaker Training Jobs, SageMaker HyperPod, SageMaker Endpoints, Studio apps) that can use this training plan. Training plans are specific to their target resource. A training plan designed for SageMaker training jobs can only be used to schedule and run training jobs. A training plan for HyperPod clusters can be used exclusively to provide compute resources to a cluster's instance group. A training plan for SageMaker endpoints can be used exclusively to provide compute resources to SageMaker endpoints for model deployment. A training plan for Studio apps can be used to launch JupyterLab and Code Editor apps on reserved training plan capacity.
        ReservedCapacitySummaries:
          $ref: "#/components/schemas/ReservedCapacitySummaries"
          description: The list of Reserved Capacity providing the underlying compute resources of the plan.
      required:
        - TrainingPlanArn
        - TrainingPlanName
        - Status
