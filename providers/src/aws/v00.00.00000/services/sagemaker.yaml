          $ref: "#/components/schemas/UserContext"
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the artifact was last modified.
        LastModifiedBy:
          $ref: "#/components/schemas/UserContext"
        MetadataProperties:
          $ref: "#/components/schemas/MetadataProperties"
        LineageGroupArn:
          $ref: "#/components/schemas/LineageGroupArn"
          description: The Amazon Resource Name (ARN) of the lineage group.
    DescribeAutoMLJobResponse:
      type: object
      properties:
        AutoMLJobName:
          $ref: "#/components/schemas/AutoMLJobName"
          description: Returns the name of the AutoML job.
        AutoMLJobArn:
          $ref: "#/components/schemas/AutoMLJobArn"
          description: Returns the ARN of the AutoML job.
        InputDataConfig:
          $ref: "#/components/schemas/AutoMLInputDataConfig"
          description: Returns the input data configuration for the AutoML job.
        OutputDataConfig:
          $ref: "#/components/schemas/AutoMLOutputDataConfig"
          description: Returns the job's output data config.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of the IAM role that has read permission to the input data location and write permission to the output data location in Amazon S3.
        AutoMLJobObjective:
          $ref: "#/components/schemas/AutoMLJobObjective"
          description: Returns the job's objective.
        ProblemType:
          $ref: "#/components/schemas/ProblemType"
          description: Returns the job's problem type.
        AutoMLJobConfig:
          $ref: "#/components/schemas/AutoMLJobConfig"
          description: Returns the configuration for the AutoML job.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: Returns the creation time of the AutoML job.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: Returns the end time of the AutoML job.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: Returns the job's last modified time.
        FailureReason:
          $ref: "#/components/schemas/AutoMLFailureReason"
          description: Returns the failure reason for an AutoML job, when applicable.
        PartialFailureReasons:
          $ref: "#/components/schemas/AutoMLPartialFailureReasons"
          description: Returns a list of reasons for partial failures within an AutoML job.
        BestCandidate:
          $ref: "#/components/schemas/AutoMLCandidate"
          description: The best model candidate selected by SageMaker AI Autopilot using both the best objective metric and lowest InferenceLatency for an experiment.
        AutoMLJobStatus:
          $ref: "#/components/schemas/AutoMLJobStatus"
          description: Returns the status of the AutoML job.
        AutoMLJobSecondaryStatus:
          $ref: "#/components/schemas/AutoMLJobSecondaryStatus"
          description: Returns the secondary status of the AutoML job.
        GenerateCandidateDefinitionsOnly:
          $ref: "#/components/schemas/GenerateCandidateDefinitionsOnly"
          description: Indicates whether the output for an AutoML job generates candidate definitions only.
        AutoMLJobArtifacts:
          $ref: "#/components/schemas/AutoMLJobArtifacts"
          description: Returns information on the job's artifacts found in AutoMLJobArtifacts.
        ResolvedAttributes:
          $ref: "#/components/schemas/ResolvedAttributes"
          description: Contains ProblemType, AutoMLJobObjective, and CompletionCriteria. If you do not provide these values, they are inferred.
        ModelDeployConfig:
          $ref: "#/components/schemas/ModelDeployConfig"
          description: Indicates whether the model was deployed automatically to an endpoint and the name of that endpoint if deployed automatically.
        ModelDeployResult:
          $ref: "#/components/schemas/ModelDeployResult"
          description: Provides information about endpoint for the model deployment.
      required:
        - AutoMLJobName
        - AutoMLJobArn
        - InputDataConfig
        - OutputDataConfig
        - RoleArn
        - CreationTime
        - LastModifiedTime
        - AutoMLJobStatus
        - AutoMLJobSecondaryStatus
    AutoMLFailureReason:
      type: string
      minLength: 0
      maxLength: 1024
    AutoMLPartialFailureReasons:
      type: array
      items:
        $ref: "#/components/schemas/AutoMLPartialFailureReason"
    AutoMLPartialFailureReason:
      description: The reason for a partial failure of an AutoML job.
      type: object
      properties:
        PartialFailureMessage:
          $ref: "#/components/schemas/AutoMLFailureReason"
          description: The message containing the reason for a partial failure of an AutoML job.
    AutoMLCandidate:
      description: Information about a candidate produced by an AutoML training job, including its status, steps, and other properties.
      type: object
      properties:
        CandidateName:
          $ref: "#/components/schemas/CandidateName"
          description: The name of the candidate.
        FinalAutoMLJobObjectiveMetric:
          $ref: "#/components/schemas/FinalAutoMLJobObjectiveMetric"
        ObjectiveStatus:
          $ref: "#/components/schemas/ObjectiveStatus"
          description: The objective's status.
        CandidateSteps:
          $ref: "#/components/schemas/CandidateSteps"
          description: Information about the candidate's steps.
        CandidateStatus:
          $ref: "#/components/schemas/CandidateStatus"
          description: The candidate's status.
        InferenceContainers:
          $ref: "#/components/schemas/AutoMLContainerDefinitions"
          description: Information about the recommended inference container definitions.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The creation time.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end time.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The last modified time.
        FailureReason:
          $ref: "#/components/schemas/AutoMLFailureReason"
          description: The failure reason.
        CandidateProperties:
          $ref: "#/components/schemas/CandidateProperties"
          description: The properties of an AutoML candidate job.
        InferenceContainerDefinitions:
          type: object
          properties: {}
          description: The mapping of all supported processing unit (CPU, GPU, etc...) to inference container definitions for the candidate. This field is populated for the AutoML jobs V2 (for example, for jobs created by calling CreateAutoMLJobV2) related to image or text classification problem types only.
      required:
        - CandidateName
        - ObjectiveStatus
        - CandidateSteps
        - CandidateStatus
        - CreationTime
        - LastModifiedTime
    CandidateName:
      type: string
      minLength: 1
      maxLength: 64
    FinalAutoMLJobObjectiveMetric:
      description: The best candidate result from an AutoML training job.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/AutoMLJobObjectiveType"
          description: The type of metric with the best result.
        MetricName:
          $ref: "#/components/schemas/AutoMLMetricEnum"
          description: The name of the metric with the best result. For a description of the possible objective metrics, see AutoMLJobObjective$MetricName.
        Value:
          $ref: "#/components/schemas/MetricValue"
          description: The value of the metric with the best result.
        StandardMetricName:
          $ref: "#/components/schemas/AutoMLMetricEnum"
          description: The name of the standard metric. For a description of the standard metrics, see Autopilot candidate metrics.
      required:
        - MetricName
        - Value
    AutoMLJobObjectiveType:
      type: string
      enum:
        - Maximize
        - Minimize
    MetricValue:
      type: number
      format: float
    ObjectiveStatus:
      type: string
      enum:
        - Succeeded
        - Pending
        - Failed
    CandidateSteps:
      type: array
      items:
        $ref: "#/components/schemas/AutoMLCandidateStep"
    AutoMLCandidateStep:
      description: Information about the steps for a candidate and what step it is working on.
      type: object
      properties:
        CandidateStepType:
          $ref: "#/components/schemas/CandidateStepType"
          description: Whether the candidate is at the transform, training, or processing step.
        CandidateStepArn:
          $ref: "#/components/schemas/CandidateStepArn"
          description: The ARN for the candidate's step.
        CandidateStepName:
          $ref: "#/components/schemas/CandidateStepName"
          description: The name for the candidate's step.
      required:
        - CandidateStepType
        - CandidateStepArn
        - CandidateStepName
    CandidateStepType:
      type: string
      enum:
        - AWS::SageMaker::TrainingJob
        - AWS::SageMaker::TransformJob
        - AWS::SageMaker::ProcessingJob
    CandidateStepArn:
      type: string
      minLength: 1
      maxLength: 256
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:.*/.*
    CandidateStepName:
      type: string
      minLength: 1
      maxLength: 64
    CandidateStatus:
      type: string
      enum:
        - Completed
        - InProgress
        - Failed
        - Stopped
        - Stopping
    AutoMLContainerDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/AutoMLContainerDefinition"
    AutoMLContainerDefinition:
      description: A list of container definitions that describe the different containers that make up an AutoML candidate. For more information, see ContainerDefinition.
      type: object
      properties:
        Image:
          $ref: "#/components/schemas/ContainerImage"
          description: The Amazon Elastic Container Registry (Amazon ECR) path of the container. For more information, see ContainerDefinition.
        ModelDataUrl:
          $ref: "#/components/schemas/Url"
          description: The location of the model artifacts. For more information, see ContainerDefinition.
        Environment:
          type: object
          properties: {}
          description: The environment variables to set in the container. For more information, see ContainerDefinition.
      required:
        - Image
        - ModelDataUrl
    CandidateProperties:
      description: The properties of an AutoML candidate job.
      type: object
      properties:
        CandidateArtifactLocations:
          $ref: "#/components/schemas/CandidateArtifactLocations"
          description: The Amazon S3 prefix to the artifacts generated for an AutoML candidate.
        CandidateMetrics:
          $ref: "#/components/schemas/MetricDataList"
          description: Information about the candidate metrics for an AutoML job.
    CandidateArtifactLocations:
      description: The location of artifacts for an AutoML candidate job.
      type: object
      properties:
        Explainability:
          $ref: "#/components/schemas/ExplainabilityLocation"
          description: The Amazon S3 prefix to the explainability artifacts generated for the AutoML candidate.
        ModelInsights:
          $ref: "#/components/schemas/ModelInsightsLocation"
          description: The Amazon S3 prefix to the model insight artifacts generated for the AutoML candidate.
        BacktestResults:
          $ref: "#/components/schemas/BacktestResultsLocation"
          description: The Amazon S3 prefix to the accuracy metrics and the inference results observed over the testing window. Available only for the time-series forecasting problem type.
      required:
        - Explainability
    ExplainabilityLocation:
      type: string
      minLength: 1
    ModelInsightsLocation:
      type: string
      minLength: 1
    BacktestResultsLocation:
      type: string
      minLength: 1
    MetricDataList:
      type: array
      items:
        $ref: "#/components/schemas/MetricDatum"
    MetricDatum:
      description: Information about the metric for a candidate produced by an AutoML job.
      type: object
      properties:
        MetricName:
          $ref: "#/components/schemas/AutoMLMetricEnum"
          description: The name of the metric.
        StandardMetricName:
          $ref: "#/components/schemas/AutoMLMetricExtendedEnum"
          description: The name of the standard metric. For definitions of the standard metrics, see Autopilot candidate metrics .
        Value:
          $ref: "#/components/schemas/Float"
          description: The value of the metric.
        Set:
          $ref: "#/components/schemas/MetricSetSource"
          description: The dataset split from which the AutoML job produced the metric.
    AutoMLMetricExtendedEnum:
      type: string
      enum:
        - Accuracy
        - MSE
        - F1
        - F1macro
        - AUC
        - RMSE
        - MAE
        - R2
        - BalancedAccuracy
        - Precision
        - PrecisionMacro
        - Recall
        - RecallMacro
        - LogLoss
        - InferenceLatency
        - MAPE
        - MASE
        - WAPE
        - AverageWeightedQuantileLoss
        - Rouge1
        - Rouge2
        - RougeL
        - RougeLSum
        - Perplexity
        - ValidationLoss
        - TrainingLoss
    Float:
      type: number
      format: float
    MetricSetSource:
      type: string
      enum:
        - Train
        - Validation
        - Test
    AutoMLJobStatus:
      type: string
      enum:
        - Completed
        - InProgress
        - Failed
        - Stopped
        - Stopping
    AutoMLJobSecondaryStatus:
      type: string
      enum:
        - Starting
        - MaxCandidatesReached
        - Failed
        - Stopped
        - MaxAutoMLJobRuntimeReached
        - Stopping
        - CandidateDefinitionsGenerated
        - Completed
        - ExplainabilityError
        - DeployingModel
        - ModelDeploymentError
        - GeneratingModelInsightsReport
        - ModelInsightsError
        - AnalyzingData
        - FeatureEngineering
        - ModelTuning
        - GeneratingExplainabilityReport
        - TrainingModels
        - PreTraining
    AutoMLJobArtifacts:
      description: The artifacts that are generated during an AutoML job.
      type: object
      properties:
        CandidateDefinitionNotebookLocation:
          $ref: "#/components/schemas/CandidateDefinitionNotebookLocation"
