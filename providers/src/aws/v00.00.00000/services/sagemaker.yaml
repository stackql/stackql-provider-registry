    ResponseMIMETypes:
      type: array
      items:
        $ref: "#/components/schemas/ResponseMIMEType"
    ResponseMIMEType:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[-\\w]+\\/.+"
    AlgorithmValidationSpecification:
      description: Specifies configurations for one or more training jobs that SageMaker runs to test the algorithm.
      type: object
      properties:
        ValidationRole:
          $ref: "#/components/schemas/RoleArn"
          description: The IAM roles that SageMaker uses to run the training jobs.
        ValidationProfiles:
          $ref: "#/components/schemas/AlgorithmValidationProfiles"
          description: An array of AlgorithmValidationProfile objects, each of which specifies a training job and batch transform job that SageMaker runs to validate your algorithm.
      required:
        - ValidationRole
        - ValidationProfiles
    AlgorithmValidationProfiles:
      type: array
      items:
        $ref: "#/components/schemas/AlgorithmValidationProfile"
    AlgorithmValidationProfile:
      description: Defines a training job and a batch transform job that SageMaker runs to validate your algorithm. The data provided in the validation profile is made available to your buyers on Amazon Web Services Marketplace.
      type: object
      properties:
        ProfileName:
          $ref: "#/components/schemas/EntityName"
          description: The name of the profile for the algorithm. The name must have 1 to 63 characters. Valid characters are a-z, A-Z, 0-9, and - (hyphen).
        TrainingJobDefinition:
          $ref: "#/components/schemas/TrainingJobDefinition"
          description: The TrainingJobDefinition object that describes the training job that SageMaker runs to validate your algorithm.
        TransformJobDefinition:
          $ref: "#/components/schemas/TransformJobDefinition"
          description: The TransformJobDefinition object that describes the transform job that SageMaker runs to validate your algorithm.
      required:
        - ProfileName
        - TrainingJobDefinition
    TrainingJobDefinition:
      description: Defines the input needed to run a training job using the algorithm.
      type: object
      properties:
        TrainingInputMode:
          $ref: "#/components/schemas/TrainingInputMode"
        HyperParameters:
          type: object
          properties: {}
          description: The hyperparameters used for the training job.
        InputDataConfig:
          $ref: "#/components/schemas/InputDataConfig"
          description: An array of Channel objects, each of which specifies an input source.
        OutputDataConfig:
          $ref: "#/components/schemas/OutputDataConfig"
          description: the path to the S3 bucket where you want to store model artifacts. SageMaker creates subfolders for the artifacts.
        ResourceConfig:
          $ref: "#/components/schemas/ResourceConfig"
          description: The resources, including the ML compute instances and ML storage volumes, to use for model training.
        StoppingCondition:
          $ref: "#/components/schemas/StoppingCondition"
          description: Specifies a limit to how long a model training job can run. It also specifies how long a managed Spot training job has to complete. When the job reaches the time limit, SageMaker ends the training job. Use this API to cap model training costs. To stop a job, SageMaker sends the algorithm the SIGTERM signal, which delays job termination for 120 seconds. Algorithms can use this 120-second window to save the model artifacts.
      required:
        - TrainingInputMode
        - InputDataConfig
        - OutputDataConfig
        - ResourceConfig
        - StoppingCondition
    InputDataConfig:
      type: array
      items:
        $ref: "#/components/schemas/Channel"
    Channel:
      description: A channel is a named input source that training algorithms can consume.
      type: object
      properties:
        ChannelName:
          $ref: "#/components/schemas/ChannelName"
          description: The name of the channel.
        DataSource:
          $ref: "#/components/schemas/DataSource"
          description: The location of the channel data.
        ContentType:
          $ref: "#/components/schemas/ContentType"
          description: The MIME type of the data.
        CompressionType:
          $ref: "#/components/schemas/CompressionType"
          description: If training data is compressed, the compression type. The default value is None. CompressionType is used only in Pipe input mode. In File mode, leave this field unset or set it to None.
        RecordWrapperType:
          $ref: "#/components/schemas/RecordWrapper"
          description: Specify RecordIO as the value when input data is in raw format but the training algorithm requires the RecordIO format. In this case, SageMaker wraps each individual S3 object in a RecordIO record. If the input data is already in RecordIO format, you don't need to set this attribute. For more information, see Create a Dataset Using RecordIO. In File mode, leave this field unset or set it to None.
        InputMode:
          $ref: "#/components/schemas/TrainingInputMode"
          description: (Optional) The input mode to use for the data channel in a training job. If you don't set a value for InputMode, SageMaker uses the value set for TrainingInputMode. Use this parameter to override the TrainingInputMode setting in a AlgorithmSpecification request when you have a channel that needs a different input mode from the training job's general setting. To download the data from Amazon Simple Storage Service (Amazon S3) to the provisioned ML storage volume, and mount the directory to a Docker volume, use File input mode. To stream data directly from Amazon S3 to the container, choose Pipe input mode. To use a model for incremental training, choose File input model.
        ShuffleConfig:
          $ref: "#/components/schemas/ShuffleConfig"
          description: A configuration for a shuffle option for input data in a channel. If you use S3Prefix for S3DataType, this shuffles the results of the S3 key prefix matches. If you use ManifestFile, the order of the S3 object references in the ManifestFile is shuffled. If you use AugmentedManifestFile, the order of the JSON lines in the AugmentedManifestFile is shuffled. The shuffling order is determined using the Seed value. For Pipe input mode, shuffling is done at the start of every epoch. With large datasets this ensures that the order of the training data is different for each epoch, it helps reduce bias and possible overfitting. In a multi-node training job when ShuffleConfig is combined with S3DataDistributionType of ShardedByS3Key, the data is shuffled across nodes so that the content sent to a particular node on the first epoch might be sent to a different node on the second epoch.
      required:
        - ChannelName
        - DataSource
    DataSource:
      description: Describes the location of the channel data.
      type: object
      properties:
        S3DataSource:
          $ref: "#/components/schemas/S3DataSource"
          description: The S3 location of the data source that is associated with a channel.
        FileSystemDataSource:
          $ref: "#/components/schemas/FileSystemDataSource"
          description: The file system that is associated with a channel.
        DatasetSource:
          $ref: "#/components/schemas/DatasetSource"
          description: The dataset resource that's associated with a channel.
    S3DataSource:
      description: Describes the S3 data source. Your input bucket must be in the same Amazon Web Services region as your training job.
      type: object
      properties:
        S3DataType:
          $ref: "#/components/schemas/S3DataType"
          description: If you choose S3Prefix, S3Uri identifies a key name prefix. SageMaker uses all objects that match the specified key name prefix for model training. If you choose ManifestFile, S3Uri identifies an object that is a manifest file containing a list of object keys that you want SageMaker to use for model training. If you choose AugmentedManifestFile, S3Uri identifies an object that is an augmented manifest file in JSON lines format. This file contains the data you want to use for model training. AugmentedManifestFile can only be used if the Channel's input mode is Pipe. If you choose Converse, S3Uri identifies an Amazon S3 location that contains data formatted according to Converse format. This format structures conversational messages with specific roles and content types used for training and fine-tuning foundational models.
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: 'Depending on the value specified for the S3DataType, identifies either a key name prefix or a manifest. For example: A key name prefix might look like this: s3://bucketname/exampleprefix/ A manifest might look like this: s3://bucketname/example.manifest A manifest is an S3 object which is a JSON file consisting of an array of elements. The first element is a prefix which is followed by one or more suffixes. SageMaker appends the suffix elements to the prefix to get a full set of S3Uri. Note that the prefix must be a valid non-empty S3Uri that precludes users from specifying a manifest whose individual S3Uri is sourced from different S3 buckets. The following code example shows a valid manifest format: [ {"prefix": "s3://customer_bucket/some/prefix/"}, "relative/path/to/custdata-1", "relative/path/custdata-2", ... "relative/path/custdata-N" ] This JSON is equivalent to the following S3Uri list: s3://customer_bucket/some/prefix/relative/path/to/custdata-1 s3://customer_bucket/some/prefix/relative/path/custdata-2 ... s3://customer_bucket/some/prefix/relative/path/custdata-N The complete set of S3Uri in this manifest is the input data for the channel for this data source. The object that each S3Uri points to must be readable by the IAM role that SageMaker uses to perform tasks on your behalf. Your input bucket must be located in same Amazon Web Services region as your training job.'
        S3DataDistributionType:
          $ref: "#/components/schemas/S3DataDistribution"
          description: If you want SageMaker to replicate the entire dataset on each ML compute instance that is launched for model training, specify FullyReplicated. If you want SageMaker to replicate a subset of data on each ML compute instance that is launched for model training, specify ShardedByS3Key. If there are n ML compute instances launched for a training job, each instance gets approximately 1/n of the number of S3 objects. In this case, model training on each machine uses only the subset of training data. Don't choose more ML compute instances for training than available S3 objects. If you do, some nodes won't get any data and you will pay for nodes that aren't getting any training data. This applies in both File and Pipe modes. Keep this in mind when developing algorithms. In distributed training, where you use multiple ML compute EC2 instances, you might choose ShardedByS3Key. If the algorithm requires copying training data to the ML storage volume (when TrainingInputMode is set to File), this copies 1/n of the number of objects.
        AttributeNames:
          $ref: "#/components/schemas/AttributeNames"
          description: A list of one or more attribute names to use that are found in a specified augmented manifest file.
        InstanceGroupNames:
          $ref: "#/components/schemas/InstanceGroupNames"
          description: A list of names of instance groups that get data from the S3 data source.
        ModelAccessConfig:
          $ref: "#/components/schemas/ModelAccessConfig"
        HubAccessConfig:
          $ref: "#/components/schemas/HubAccessConfig"
          description: The configuration for a private hub model reference that points to a SageMaker JumpStart public hub model.
      required:
        - S3DataType
        - S3Uri
    S3DataType:
      type: string
      enum:
        - ManifestFile
        - S3Prefix
        - AugmentedManifestFile
        - Converse
    S3DataDistribution:
      type: string
      enum:
        - FullyReplicated
        - ShardedByS3Key
    AttributeNames:
      type: array
      items:
        $ref: "#/components/schemas/AttributeName"
    AttributeName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: .+
    InstanceGroupNames:
      type: array
      items:
        $ref: "#/components/schemas/InstanceGroupName"
    HubAccessConfig:
      description: The configuration for a private hub model reference that points to a public SageMaker JumpStart model. For more information about private hubs, see Private curated hubs for foundation model access control in JumpStart.
      type: object
      properties:
        HubContentArn:
          $ref: "#/components/schemas/HubContentArn"
          description: The ARN of your private model hub content. This should be a ModelReference resource type that points to a SageMaker JumpStart public hub model.
      required:
        - HubContentArn
    FileSystemDataSource:
      description: Specifies a file system data source for a channel.
      type: object
      properties:
        FileSystemId:
          $ref: "#/components/schemas/FileSystemId"
          description: The file system id.
        FileSystemAccessMode:
          $ref: "#/components/schemas/FileSystemAccessMode"
          description: The access mode of the mount of the directory associated with the channel. A directory can be mounted either in ro (read-only) or rw (read-write) mode.
        FileSystemType:
          $ref: "#/components/schemas/FileSystemType"
          description: The file system type.
        DirectoryPath:
          $ref: "#/components/schemas/DirectoryPath"
          description: The full path to the directory to associate with the channel.
      required:
        - FileSystemId
        - FileSystemAccessMode
        - FileSystemType
        - DirectoryPath
    FileSystemId:
      type: string
      minLength: 11
      maxLength: 21
      pattern: (fs-[0-9a-f]{8,})
    FileSystemAccessMode:
      type: string
      enum:
        - rw
        - ro
    FileSystemType:
      type: string
      enum:
        - EFS
        - FSxLustre
    DirectoryPath:
      type: string
      minLength: 0
      maxLength: 4096
      pattern: .*
    DatasetSource:
      description: Specifies a dataset source for a channel.
      type: object
      properties:
        DatasetArn:
          $ref: "#/components/schemas/HubDataSetArn"
          description: The Amazon Resource Name (ARN) of the dataset resource.
      required:
        - DatasetArn
    HubDataSetArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: (arn:[a-z0-9-\.]{1,63}:sagemaker:\w+(?:-\w+)+:(\d{12}|aws):hub-content\/)[a-zA-Z0-9](-*[a-zA-Z0-9]){0,62}\/DataSet\/[a-zA-Z0-9](-*[a-zA-Z0-9]){0,63}(\/\d{1,4}.\d{1,4}.\d{1,4})?
    RecordWrapper:
      type: string
      enum:
        - None
        - RecordIO
    ShuffleConfig:
      description: A configuration for a shuffle option for input data in a channel. If you use S3Prefix for S3DataType, the results of the S3 key prefix matches are shuffled. If you use ManifestFile, the order of the S3 object references in the ManifestFile is shuffled. If you use AugmentedManifestFile, the order of the JSON lines in the AugmentedManifestFile is shuffled. The shuffling order is determined using the Seed value. For Pipe input mode, when ShuffleConfig is specified shuffling is done at the start of every epoch. With large datasets, this ensures that the order of the training data is different for each epoch, and it helps reduce bias and possible overfitting. In a multi-node training job when ShuffleConfig is combined with S3DataDistributionType of ShardedByS3Key, the data is shuffled across nodes so that the content sent to a particular node on the first epoch might be sent to a different node on the second epoch.
      type: object
      properties:
        Seed:
          $ref: "#/components/schemas/Seed"
          description: Determines the shuffling order in ShuffleConfig value.
      required:
        - Seed
    Seed:
      type: integer
      format: int64
    OutputDataConfig:
      description: Provides information about how to store model training results (model artifacts).
      type: object
      properties:
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: "The Amazon Web Services Key Management Service (Amazon Web Services KMS) key that SageMaker uses to encrypt the model artifacts at rest using Amazon S3 server-side encryption. The KmsKeyId can be any of the following formats: // KMS Key ID \"1234abcd-12ab-34cd-56ef-1234567890ab\" // Amazon Resource Name (ARN) of a KMS Key \"arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab\" // KMS Key Alias \"alias/ExampleAlias\" // Amazon Resource Name (ARN) of a KMS Key Alias \"arn:aws:kms:us-west-2:111122223333:alias/ExampleAlias\" If you use a KMS key ID or an alias of your KMS key, the SageMaker execution role must include permissions to call kms:Encrypt. If you don't provide a KMS key ID, SageMaker uses the default KMS key for Amazon S3 for your role's account. For more information, see KMS-Managed Encryption Keys in the Amazon Simple Storage Service Developer Guide. If the output data is stored in Amazon S3 Express One Zone, it is encrypted with server-side encryption with Amazon S3 managed keys (SSE-S3). KMS key is not supported for Amazon S3 Express One Zone The KMS key policy must grant permission to the IAM role that you specify in your CreateTrainingJob, CreateTransformJob, or CreateHyperParameterTuningJob requests. For more information, see Using Key Policies in Amazon Web Services KMS in the Amazon Web Services Key Management Service Developer Guide."
        S3OutputPath:
          $ref: "#/components/schemas/S3Uri"
          description: Identifies the S3 path where you want SageMaker to store the model artifacts. For example, s3://bucket-name/key-name-prefix.
        CompressionType:
          $ref: "#/components/schemas/OutputCompressionType"
          description: The model output compression type. Select None to output an uncompressed model, recommended for large model outputs. Defaults to gzip.
      required:
        - S3OutputPath
    KmsKeyId:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: "[a-zA-Z0-9:/_-]*"
    OutputCompressionType:
      type: string
      enum:
        - GZIP
        - NONE
    ResourceConfig:
      description: Describes the resources, including machine learning (ML) compute instances and ML storage volumes, to use for model training.
      type: object
      properties:
        InstanceType:
          $ref: "#/components/schemas/TrainingInstanceType"
          description: The ML compute instance type.
        InstanceCount:
          $ref: "#/components/schemas/TrainingInstanceCount"
          description: The number of ML compute instances to use. For distributed training, provide a value greater than 1.
        VolumeSizeInGB:
          $ref: "#/components/schemas/OptionalVolumeSizeInGB"
          description: The size of the ML storage volume that you want to provision. SageMaker automatically selects the volume size for serverless training jobs. You cannot customize this setting. ML storage volumes store model artifacts and incremental states. Training algorithms might also use the ML storage volume for scratch space. If you want to store the training data in the ML storage volume, choose File as the TrainingInputMode in the algorithm specification. When using an ML instance with NVMe SSD volumes, SageMaker doesn't provision Amazon EBS General Purpose SSD (gp2) storage. Available storage is fixed to the NVMe-type instance's storage capacity. SageMaker configures storage paths for training datasets, checkpoints, model artifacts, and outputs to use the entire capacity of the instance storage. For example, ML instance families with the NVMe-type instance storage include ml.p4d, ml.g4dn, and ml.g5. When using an ML instance with the EBS-only storage option and without instance storage, you must define the size of EBS volume through VolumeSizeInGB in the ResourceConfig API. For example, ML instance families that use EBS volumes include ml.c5 and ml.p2. To look up instance types and their instance storage types and volumes, see Amazon EC2 Instance Types. To find the default local paths defined by the SageMaker training platform, see Amazon SageMaker Training Storage Folders for Training Datasets, Checkpoints, Model Artifacts, and Outputs.
        VolumeKmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: "The Amazon Web Services KMS key that SageMaker uses to encrypt data on the storage volume attached to the ML compute instance(s) that run the training job. Certain Nitro-based instances include local storage, dependent on the instance type. Local storage volumes are encrypted using a hardware module on the instance. You can't request a VolumeKmsKeyId when using an instance type with local storage. For a list of instance types that support local instance storage, see Instance Store Volumes. For more information about local instance storage encryption, see SSD Instance Store Volumes. The VolumeKmsKeyId can be in any of the following formats: // KMS Key ID \"1234abcd-12ab-34cd-56ef-1234567890ab\" // Amazon Resource Name (ARN) of a KMS Key \"arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab\""
        KeepAlivePeriodInSeconds:
          $ref: "#/components/schemas/KeepAlivePeriodInSeconds"
          description: The duration of time in seconds to retain configured resources in a warm pool for subsequent training jobs.
        InstanceGroups:
          $ref: "#/components/schemas/InstanceGroups"
          description: The configuration of a heterogeneous cluster in JSON format.
        TrainingPlanArn:
          $ref: "#/components/schemas/TrainingPlanArn"
          description: The Amazon Resource Name (ARN); of the training plan to use for this resource configuration.
        InstancePlacementConfig:
          $ref: "#/components/schemas/InstancePlacementConfig"
          description: Configuration for how training job instances are placed and allocated within UltraServers. Only applicable for UltraServer capacity.
    TrainingInstanceCount:
      type: integer
      minimum: 0
    OptionalVolumeSizeInGB:
      type: integer
      minimum: 0
    KeepAlivePeriodInSeconds:
      description: Optional. Customer requested period in seconds for which the Training cluster is kept alive after the job is finished.
      type: integer
      minimum: 0
      maximum: 21600
    InstanceGroups:
      type: array
      items:
        $ref: "#/components/schemas/InstanceGroup"
    InstanceGroup:
      description: Defines an instance group for heterogeneous cluster training. When requesting a training job using the CreateTrainingJob API, you can configure multiple instance groups .
      type: object
      properties:
        InstanceType:
          $ref: "#/components/schemas/TrainingInstanceType"
          description: Specifies the instance type of the instance group.
        InstanceCount:
          $ref: "#/components/schemas/TrainingInstanceCount"
          description: Specifies the number of instances of the instance group.
        InstanceGroupName:
          $ref: "#/components/schemas/InstanceGroupName"
          description: Specifies the name of the instance group.
      required:
        - InstanceType
        - InstanceCount
        - InstanceGroupName
    TrainingPlanArn:
      type: string
      minLength: 50
      maxLength: 2048
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:training-plan/.*
    InstancePlacementConfig:
      description: Configuration for how instances are placed and allocated within UltraServers. This is only applicable for UltraServer capacity.
      type: object
      properties:
        EnableMultipleJobs:
          $ref: "#/components/schemas/Boolean"
          description: If set to true, allows multiple jobs to share the same UltraServer instances. If set to false, ensures this job's instances are placed on an UltraServer exclusively, with no other jobs sharing the same UltraServer. Default is false.
        PlacementSpecifications:
          $ref: "#/components/schemas/PlacementSpecifications"
          description: A list of specifications for how instances should be placed on specific UltraServers. Maximum of 10 items is supported.
    PlacementSpecifications:
      type: array
      items:
        $ref: "#/components/schemas/PlacementSpecification"
    PlacementSpecification:
      description: Specifies how instances should be placed on a specific UltraServer.
      type: object
      properties:
        UltraServerId:
          $ref: "#/components/schemas/String256"
          description: The unique identifier of the UltraServer where instances should be placed.
        InstanceCount:
          $ref: "#/components/schemas/TrainingInstanceCount"
          description: The number of ML compute instances required to be placed together on the same UltraServer. Minimum value of 1.
      required:
        - InstanceCount
    StoppingCondition:
      description: Specifies a limit to how long a job can run. When the job reaches the time limit, SageMaker ends the job. Use this API to cap costs. To stop a training job, SageMaker sends the algorithm the SIGTERM signal, which delays job termination for 120 seconds. Algorithms can use this 120-second window to save the model artifacts, so the results of training are not lost. The training algorithms provided by SageMaker automatically save the intermediate results of a model training job when possible. This attempt to save artifacts is only a best effort case as model might not be in a state from which it can be saved. For example, if training has just started, the model might not be ready to save. When saved, this intermediate data is a valid model artifact. You can use it to create a model with CreateModel. The Neural Topic Model (NTM) currently does not support saving intermediate model artifacts. When training NTMs, make sure that the maximum runtime is sufficient for the training job to complete.
      type: object
      properties:
        MaxRuntimeInSeconds:
          $ref: "#/components/schemas/MaxRuntimeInSeconds"
          description: The maximum length of time, in seconds, that a training or compilation job can run before it is stopped. For compilation jobs, if the job does not complete during this time, a TimeOut error is generated. We recommend starting with 900 seconds and increasing as necessary based on your model. For all other jobs, if the job does not complete during this time, SageMaker ends the job. When RetryStrategy is specified in the job request, MaxRuntimeInSeconds specifies the maximum time for all of the attempts in total, not each individual attempt. The default value is 1 day. The maximum value is 28 days. The maximum time that a TrainingJob can run in total, including any time spent publishing metrics or archiving and uploading models after it has been stopped, is 30 days.
        MaxWaitTimeInSeconds:
          $ref: "#/components/schemas/MaxWaitTimeInSeconds"
          description: The maximum length of time, in seconds, that a managed Spot training job has to complete. It is the amount of time spent waiting for Spot capacity plus the amount of time the job can run. It must be equal to or greater than MaxRuntimeInSeconds. If the job does not complete during this time, SageMaker ends the job. When RetryStrategy is specified in the job request, MaxWaitTimeInSeconds specifies the maximum time for all of the attempts in total, not each individual attempt.
        MaxPendingTimeInSeconds:
          $ref: "#/components/schemas/MaxPendingTimeInSeconds"
          description: "The maximum length of time, in seconds, that a training or compilation job can be pending before it is stopped. When working with training jobs that use capacity from training plans, not all Pending job states count against the MaxPendingTimeInSeconds limit. The following scenarios do not increment the MaxPendingTimeInSeconds counter: The plan is in a Scheduled state: Jobs queued (in Pending status) before a plan's start date (waiting for scheduled start time) Between capacity reservations: Jobs temporarily back to Pending status between two capacity reservation periods MaxPendingTimeInSeconds only increments when jobs are actively waiting for capacity in an Active plan."
    MaxRuntimeInSeconds:
      type: integer
      minimum: 1
    MaxWaitTimeInSeconds:
      type: integer
      minimum: 1
    MaxPendingTimeInSeconds:
      description: Maximum job scheduler pending time in seconds.
      type: integer
      minimum: 7200
      maximum: 2419200
    TransformJobDefinition:
      description: Defines the input needed to run a transform job using the inference specification specified in the algorithm.
      type: object
      properties:
        MaxConcurrentTransforms:
          $ref: "#/components/schemas/MaxConcurrentTransforms"
          description: The maximum number of parallel requests that can be sent to each instance in a transform job. The default value is 1.
        MaxPayloadInMB:
          $ref: "#/components/schemas/MaxPayloadInMB"
          description: The maximum payload size allowed, in MB. A payload is the data portion of a record (without metadata).
        BatchStrategy:
          $ref: "#/components/schemas/BatchStrategy"
          description: A string that determines the number of records included in a single mini-batch. SingleRecord means only one record is used per mini-batch. MultiRecord means a mini-batch is set to contain as many records that can fit within the MaxPayloadInMB limit.
        Environment:
          type: object
          properties: {}
          description: The environment variables to set in the Docker container. We support up to 16 key and values entries in the map.
        TransformInput:
          $ref: "#/components/schemas/TransformInput"
          description: A description of the input source and the way the transform job consumes it.
        TransformOutput:
          $ref: "#/components/schemas/TransformOutput"
          description: Identifies the Amazon S3 location where you want Amazon SageMaker to save the results from the transform job.
        TransformResources:
          $ref: "#/components/schemas/TransformResources"
          description: Identifies the ML compute instances for the transform job.
      required:
        - TransformInput
        - TransformOutput
        - TransformResources
    MaxConcurrentTransforms:
      type: integer
      minimum: 0
    MaxPayloadInMB:
      type: integer
      minimum: 0
    BatchStrategy:
      type: string
      enum:
        - MultiRecord
        - SingleRecord
    TransformInput:
      description: Describes the input source of a transform job and the way the transform job consumes it.
      type: object
      properties:
        DataSource:
          $ref: "#/components/schemas/TransformDataSource"
          description: Describes the location of the channel data, which is, the S3 location of the input data that the model can consume.
        ContentType:
          $ref: "#/components/schemas/ContentType"
          description: The multipurpose internet mail extension (MIME) type of the data. Amazon SageMaker uses the MIME type with each http call to transfer data to the transform job.
        CompressionType:
          $ref: "#/components/schemas/CompressionType"
          description: If your transform data is compressed, specify the compression type. Amazon SageMaker automatically decompresses the data for the transform job accordingly. The default value is None.
        SplitType:
          $ref: "#/components/schemas/SplitType"
          description: "The method to use to split the transform job's data files into smaller batches. Splitting is necessary when the total size of each object is too large to fit in a single request. You can also use data splitting to improve performance by processing multiple concurrent mini-batches. The default value for SplitType is None, which indicates that input data files are not split, and request payloads contain the entire contents of an input object. Set the value of this parameter to Line to split records on a newline character boundary. SplitType also supports a number of record-oriented binary data formats. Currently, the supported record formats are: RecordIO TFRecord When splitting is enabled, the size of a mini-batch depends on the values of the BatchStrategy and MaxPayloadInMB parameters. When the value of BatchStrategy is MultiRecord, Amazon SageMaker sends the maximum number of records in each request, up to the MaxPayloadInMB limit. If the value of BatchStrategy is SingleRecord, Amazon SageMaker sends individual records in each request. Some data formats represent a record as a binary payload wrapped with extra padding bytes. When splitting is applied to a binary data format, padding is removed if the value of BatchStrategy is set to SingleRecord. Padding is not removed if the value of BatchStrategy is set to MultiRecord. For more information about RecordIO, see Create a Dataset Using RecordIO in the MXNet documentation. For more information about TFRecord, see Consuming TFRecord data in the TensorFlow documentation."
      required:
        - DataSource
    TransformDataSource:
      description: Describes the location of the channel data.
      type: object
      properties:
        S3DataSource:
          $ref: "#/components/schemas/TransformS3DataSource"
          description: The S3 location of the data source that is associated with a channel.
      required:
        - S3DataSource
    TransformS3DataSource:
      description: Describes the S3 data source.
      type: object
      properties:
        S3DataType:
          $ref: "#/components/schemas/S3DataType"
          description: "If you choose S3Prefix, S3Uri identifies a key name prefix. Amazon SageMaker uses all objects with the specified key name prefix for batch transform. If you choose ManifestFile, S3Uri identifies an object that is a manifest file containing a list of object keys that you want Amazon SageMaker to use for batch transform. The following values are compatible: ManifestFile, S3Prefix The following value is not compatible: AugmentedManifestFile"
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: 'Depending on the value specified for the S3DataType, identifies either a key name prefix or a manifest. For example: A key name prefix might look like this: s3://bucketname/exampleprefix/. A manifest might look like this: s3://bucketname/example.manifest The manifest is an S3 object which is a JSON file with the following format: [ {"prefix": "s3://customer_bucket/some/prefix/"}, "relative/path/to/custdata-1", "relative/path/custdata-2", ... "relative/path/custdata-N" ] The preceding JSON matches the following S3Uris: s3://customer_bucket/some/prefix/relative/path/to/custdata-1 s3://customer_bucket/some/prefix/relative/path/custdata-2 ... s3://customer_bucket/some/prefix/relative/path/custdata-N The complete set of S3Uris in this manifest constitutes the input data for the channel for this datasource. The object that each S3Uris points to must be readable by the IAM role that Amazon SageMaker uses to perform tasks on your behalf.'
      required:
        - S3DataType
        - S3Uri
    SplitType:
      type: string
      enum:
        - None
        - Line
        - RecordIO
        - TFRecord
    TransformOutput:
      description: Describes the results of a transform job.
      type: object
      properties:
        S3OutputPath:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 path where you want Amazon SageMaker to store the results of the transform job. For example, s3://bucket-name/key-name-prefix. For every S3 object used as input for the transform job, batch transform stores the transformed data with an .out suffix in a corresponding subfolder in the location in the output prefix. For example, for the input data stored at s3://bucket-name/input-name-prefix/dataset01/data.csv, batch transform stores the transformed data at s3://bucket-name/output-name-prefix/input-name-prefix/data.csv.out. Batch transform doesn't upload partially processed objects. For an input S3 object that contains multiple records, it creates an .out file only if the transform job succeeds on the entire file. When the input contains multiple S3 objects, the batch transform job processes the listed S3 objects and uploads only the output for successfully processed objects. If any object fails in the transform job batch transform marks the job as failed to prompt investigation.
        Accept:
          $ref: "#/components/schemas/Accept"
          description: The MIME type used to specify the output data. Amazon SageMaker uses the MIME type with each http call to transfer data from the transform job.
        AssembleWith:
          $ref: "#/components/schemas/AssemblyType"
          description: Defines how to assemble the results of the transform job as a single S3 object. Choose a format that is most convenient to you. To concatenate the results in binary format, specify None. To add a newline character at the end of every transformed record, specify Line.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: "The Amazon Web Services Key Management Service (Amazon Web Services KMS) key that Amazon SageMaker uses to encrypt the model artifacts at rest using Amazon S3 server-side encryption. The KmsKeyId can be any of the following formats: Key ID: 1234abcd-12ab-34cd-56ef-1234567890ab Key ARN: arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab Alias name: alias/ExampleAlias Alias name ARN: arn:aws:kms:us-west-2:111122223333:alias/ExampleAlias If you don't provide a KMS key ID, Amazon SageMaker uses the default KMS key for Amazon S3 for your role's account. For more information, see KMS-Managed Encryption Keys in the Amazon Simple Storage Service Developer Guide. The KMS key policy must grant permission to the IAM role that you specify in your CreateModel request. For more information, see Using Key Policies in Amazon Web Services KMS in the Amazon Web Services Key Management Service Developer Guide."
      required:
        - S3OutputPath
    Accept:
      type: string
      minLength: 0
      maxLength: 256
      pattern: .*
    AssemblyType:
      type: string
      enum:
        - None
        - Line
    TransformResources:
      description: Describes the resources, including ML instance types and ML instance count, to use for transform job.
      type: object
      properties:
        InstanceType:
          $ref: "#/components/schemas/TransformInstanceType"
          description: The ML compute instance type for the transform job. If you are using built-in algorithms to transform moderately sized datasets, we recommend using ml.m4.xlarge or ml.m5.largeinstance types.
        InstanceCount:
          $ref: "#/components/schemas/TransformInstanceCount"
          description: The number of ML compute instances to use in the transform job. The default value is 1, and the maximum is 100. For distributed transform jobs, specify a value greater than 1.
        VolumeKmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: "The Amazon Web Services Key Management Service (Amazon Web Services KMS) key that Amazon SageMaker uses to encrypt model data on the storage volume attached to the ML compute instance(s) that run the batch transform job. Certain Nitro-based instances include local storage, dependent on the instance type. Local storage volumes are encrypted using a hardware module on the instance. You can't request a VolumeKmsKeyId when using an instance type with local storage. For a list of instance types that support local instance storage, see Instance Store Volumes. For more information about local instance storage encryption, see SSD Instance Store Volumes. The VolumeKmsKeyId can be any of the following formats: Key ID: 1234abcd-12ab-34cd-56ef-1234567890ab Key ARN: arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab Alias name: alias/ExampleAlias Alias name ARN: arn:aws:kms:us-west-2:111122223333:alias/ExampleAlias"
        TransformAmiVersion:
          $ref: "#/components/schemas/TransformAmiVersion"
          description: "Specifies an option from a collection of preconfigured Amazon Machine Image (AMI) images. Each image is configured by Amazon Web Services with a set of software and driver versions. al2-ami-sagemaker-batch-gpu-470 Accelerator: GPU NVIDIA driver version: 470 al2-ami-sagemaker-batch-gpu-535 Accelerator: GPU NVIDIA driver version: 535"
      required:
        - InstanceType
        - InstanceCount
    TransformInstanceCount:
      type: integer
      minimum: 1
    TransformAmiVersion:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[a-zA-Z0-9]+(-[a-zA-Z0-9]+)*"
    CertifyForMarketplace:
      type: boolean
    CreateAlgorithmOutput:
      type: object
      properties:
        AlgorithmArn:
          $ref: "#/components/schemas/AlgorithmArn"
          description: The Amazon Resource Name (ARN) of the new algorithm.
      required:
        - AlgorithmArn
    AlgorithmArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]{9,16}:[0-9]{12}:algorithm/[\S]{1,2048}
    DomainId:
      description: Types duplicated from IronmanApiServiceModel for federation. These types are defined in other service directories and are not available via IronmanApiServiceCommonModel.
      type: string
      minLength: 0
      maxLength: 63
      pattern: d-(-*[a-z0-9]){1,61}
    UserProfileName:
      type: string
      minLength: 0
      maxLength: 63
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,62}"
    SpaceName:
      type: string
      minLength: 0
      maxLength: 63
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,62}"
    AppType:
      type: string
      enum:
        - JupyterServer
        - KernelGateway
        - DetailedProfiler
        - TensorBoard
        - CodeEditor
        - JupyterLab
        - RStudioServerPro
        - RSessionGateway
        - Canvas
    AppName:
      type: string
      minLength: 0
      maxLength: 63
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,62}"
    ResourceSpec:
      description: Specifies the ARN's of a SageMaker AI image and SageMaker AI image version, and the instance type that the version runs on. When both SageMakerImageVersionArn and SageMakerImageArn are passed, SageMakerImageVersionArn is used. Any updates to SageMakerImageArn will not take effect if SageMakerImageVersionArn already exists in the ResourceSpec because SageMakerImageVersionArn always takes precedence. To clear the value set for SageMakerImageVersionArn, pass None as the value.
      type: object
      properties:
        SageMakerImageArn:
          $ref: "#/components/schemas/ImageArn"
          description: The ARN of the SageMaker AI image that the image version belongs to.
        SageMakerImageVersionArn:
          $ref: "#/components/schemas/ImageVersionArn"
          description: The ARN of the image version created on the instance. To clear the value set for SageMakerImageVersionArn, pass None as the value.
        SageMakerImageVersionAlias:
          $ref: "#/components/schemas/ImageVersionAlias"
          description: The SageMakerImageVersionAlias of the image to launch with. This value is in SemVer 2.0.0 versioning format.
        InstanceType:
          $ref: "#/components/schemas/AppInstanceType"
          description: The instance type that the image version runs on. JupyterServer apps only support the system value. For KernelGateway apps, the system value is translated to ml.t3.medium. KernelGateway apps also support all other values for available instance types.
        LifecycleConfigArn:
          $ref: "#/components/schemas/StudioLifecycleConfigArn"
          description: The Amazon Resource Name (ARN) of the Lifecycle Configuration attached to the Resource.
        TrainingPlanArn:
          $ref: "#/components/schemas/StudioResourceSpecTrainingPlanArn"
          description: The ARN of the SageMaker AI Training Plan to use for this app. When you specify a training plan, the app launches on reserved GPU capacity. This field is supported for JupyterLab and CodeEditor app types. For more information about how to reserve GPU capacity with SageMaker AI Training Plans, see Using training plans in Studio applications.
