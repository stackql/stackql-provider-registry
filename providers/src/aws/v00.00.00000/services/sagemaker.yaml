        SecondaryStatus:
          $ref: "#/components/schemas/SecondaryStatus"
          description: "Provides detailed information about the state of the training job. For detailed information on the secondary status of the training job, see StatusMessage under SecondaryStatusTransition. SageMaker provides primary statuses and secondary statuses that apply to each of them: InProgress Starting - Starting the training job. Pending - The training job is waiting for compute capacity or compute resource provision. Downloading - An optional stage for algorithms that support File training input mode. It indicates that data is being downloaded to the ML storage volumes. Training - Training is in progress. Interrupted - The job stopped because the managed spot training instances were interrupted. Uploading - Training is complete and the model artifacts are being uploaded to the S3 location. Completed Completed - The training job has completed. Failed Failed - The training job has failed. The reason for the failure is returned in the FailureReason field of DescribeTrainingJobResponse. Stopped MaxRuntimeExceeded - The job stopped because it exceeded the maximum allowed runtime. MaxWaitTimeExceeded - The job stopped because it exceeded the maximum allowed wait time. Stopped - The training job has stopped. Stopping Stopping - Stopping the training job. Valid values for SecondaryStatus are subject to change. We no longer support the following secondary statuses: LaunchingMLInstances PreparingTraining DownloadingTrainingImage"
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: If the training job failed, the reason it failed.
        HyperParameters:
          type: object
          properties: {}
          description: Algorithm-specific parameters.
        AlgorithmSpecification:
          $ref: "#/components/schemas/AlgorithmSpecification"
          description: Information about the algorithm used for training, and algorithm metadata.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Web Services Identity and Access Management (IAM) role configured for the training job.
        InputDataConfig:
          $ref: "#/components/schemas/InputDataConfig"
          description: An array of Channel objects that describes each data input channel.
        OutputDataConfig:
          $ref: "#/components/schemas/OutputDataConfig"
          description: The S3 path where model artifacts that you configured when creating the job are stored. SageMaker creates subfolders for model artifacts.
        ResourceConfig:
          $ref: "#/components/schemas/ResourceConfig"
          description: Resources, including ML compute instances and ML storage volumes, that are configured for model training.
        WarmPoolStatus:
          $ref: "#/components/schemas/WarmPoolStatus"
          description: The status of the warm pool associated with the training job.
        VpcConfig:
          $ref: "#/components/schemas/VpcConfig"
          description: A VpcConfig object that specifies the VPC that this training job has access to. For more information, see Protect Training Jobs by Using an Amazon Virtual Private Cloud.
        StoppingCondition:
          $ref: "#/components/schemas/StoppingCondition"
          description: Specifies a limit to how long a model training job can run. It also specifies how long a managed Spot training job has to complete. When the job reaches the time limit, SageMaker ends the training job. Use this API to cap model training costs. To stop a job, SageMaker sends the algorithm the SIGTERM signal, which delays job termination for 120 seconds. Algorithms can use this 120-second window to save the model artifacts, so the results of training are not lost.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that indicates when the training job was created.
        TrainingStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the time when the training job starts on training instances. You are billed for the time interval between this time and the value of TrainingEndTime. The start time in CloudWatch Logs might be later than this time. The difference is due to the time it takes to download the training data and to the size of the training container.
        TrainingEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the time when the training job ends on training instances. You are billed for the time interval between the value of TrainingStartTime and this time. For successful jobs and stopped jobs, this is the time after model artifacts are uploaded. For failed jobs, this is the time when SageMaker detects a job failure.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that indicates when the status of the training job was last modified.
        SecondaryStatusTransitions:
          $ref: "#/components/schemas/SecondaryStatusTransitions"
          description: A history of all of the secondary statuses that the training job has transitioned through.
        FinalMetricDataList:
          $ref: "#/components/schemas/FinalMetricDataList"
          description: A collection of MetricData objects that specify the names, values, and dates and times that the training algorithm emitted to Amazon CloudWatch.
        EnableNetworkIsolation:
          $ref: "#/components/schemas/Boolean"
          description: If you want to allow inbound or outbound network calls, except for calls between peers within a training cluster for distributed training, choose True. If you enable network isolation for training jobs that are configured to use a VPC, SageMaker downloads and uploads customer data and model artifacts through the specified VPC, but the training container does not have network access.
        EnableInterContainerTrafficEncryption:
          $ref: "#/components/schemas/Boolean"
          description: To encrypt all communications between ML compute instances in distributed training, choose True. Encryption provides greater security for distributed training, but training might take longer. How long it takes depends on the amount of communication between compute instances, especially if you use a deep learning algorithms in distributed training.
        EnableManagedSpotTraining:
          $ref: "#/components/schemas/Boolean"
          description: A Boolean indicating whether managed spot training is enabled (True) or not (False).
        CheckpointConfig:
          $ref: "#/components/schemas/CheckpointConfig"
        TrainingTimeInSeconds:
          $ref: "#/components/schemas/TrainingTimeInSeconds"
          description: The training time in seconds.
        BillableTimeInSeconds:
          $ref: "#/components/schemas/BillableTimeInSeconds"
          description: "The billable time in seconds. Billable time refers to the absolute wall-clock time. Multiply BillableTimeInSeconds by the number of instances (InstanceCount) in your training cluster to get the total compute time SageMaker bills you if you run distributed training. The formula is as follows: BillableTimeInSeconds * InstanceCount . You can calculate the savings from using managed spot training using the formula (1 - BillableTimeInSeconds / TrainingTimeInSeconds) * 100. For example, if BillableTimeInSeconds is 100 and TrainingTimeInSeconds is 500, the savings is 80%."
        BillableTokenCount:
          $ref: "#/components/schemas/BillableTokenCount"
          description: The billable token count for eligible serverless training jobs.
        DebugHookConfig:
          $ref: "#/components/schemas/DebugHookConfig"
        ExperimentConfig:
          $ref: "#/components/schemas/ExperimentConfig"
        DebugRuleConfigurations:
          $ref: "#/components/schemas/DebugRuleConfigurations"
          description: Configuration information for Amazon SageMaker Debugger rules for debugging output tensors.
        TensorBoardOutputConfig:
          $ref: "#/components/schemas/TensorBoardOutputConfig"
        DebugRuleEvaluationStatuses:
          $ref: "#/components/schemas/DebugRuleEvaluationStatuses"
          description: Evaluation status of Amazon SageMaker Debugger rules for debugging on a training job.
        ProfilerConfig:
          $ref: "#/components/schemas/ProfilerConfig"
        ProfilerRuleConfigurations:
          $ref: "#/components/schemas/ProfilerRuleConfigurations"
          description: Configuration information for Amazon SageMaker Debugger rules for profiling system and framework metrics.
        ProfilerRuleEvaluationStatuses:
          $ref: "#/components/schemas/ProfilerRuleEvaluationStatuses"
          description: Evaluation status of Amazon SageMaker Debugger rules for profiling on a training job.
        ProfilingStatus:
          $ref: "#/components/schemas/ProfilingStatus"
          description: Profiling status of a training job.
        Environment:
          type: object
          properties: {}
          description: The environment variables to set in the Docker container. Do not include any security-sensitive information including account access IDs, secrets, or tokens in any environment fields. As part of the shared responsibility model, you are responsible for any potential exposure, unauthorized access, or compromise of your sensitive data if caused by security-sensitive information included in the request environment variable or plain text fields.
        RetryStrategy:
          $ref: "#/components/schemas/RetryStrategy"
          description: The number of times to retry the job when the job fails due to an InternalServerError.
        RemoteDebugConfig:
          $ref: "#/components/schemas/RemoteDebugConfig"
          description: Configuration for remote debugging. To learn more about the remote debugging functionality of SageMaker, see Access a training container through Amazon Web Services Systems Manager (SSM) for remote debugging.
        InfraCheckConfig:
          $ref: "#/components/schemas/InfraCheckConfig"
          description: Contains information about the infrastructure health check configuration for the training job.
        ServerlessJobConfig:
          $ref: "#/components/schemas/ServerlessJobConfig"
          description: The configuration for serverless training jobs.
        MlflowConfig:
          $ref: "#/components/schemas/MlflowConfig"
          description: The MLflow configuration using SageMaker managed MLflow.
        ModelPackageConfig:
          $ref: "#/components/schemas/ModelPackageConfig"
          description: The configuration for the model package.
        MlflowDetails:
          $ref: "#/components/schemas/MlflowDetails"
          description: The MLflow details of this job.
        ProgressInfo:
          $ref: "#/components/schemas/TrainingProgressInfo"
          description: The Serverless training job progress information.
        OutputModelPackageArn:
          $ref: "#/components/schemas/ModelPackageArn"
          description: The Amazon Resource Name (ARN) of the output model package containing model weights or checkpoints.
      required:
        - TrainingJobName
        - TrainingJobArn
        - ModelArtifacts
        - TrainingJobStatus
        - SecondaryStatus
        - StoppingCondition
        - CreationTime
    SecondaryStatus:
      type: string
      enum:
        - Starting
        - LaunchingMLInstances
        - PreparingTrainingStack
        - Downloading
        - DownloadingTrainingImage
        - Training
        - Uploading
        - Stopping
        - Stopped
        - MaxRuntimeExceeded
        - Completed
        - Failed
        - Interrupted
        - MaxWaitTimeExceeded
        - Updating
        - Restarting
        - Pending
    WarmPoolStatus:
      description: Status and billing information about the warm pool.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/WarmPoolResourceStatus"
          description: "The status of the warm pool. InUse: The warm pool is in use for the training job. Available: The warm pool is available to reuse for a matching training job. Reused: The warm pool moved to a matching training job for reuse. Terminated: The warm pool is no longer available. Warm pools are unavailable if they are terminated by a user, terminated for a patch update, or terminated for exceeding the specified KeepAlivePeriodInSeconds."
        ResourceRetainedBillableTimeInSeconds:
          $ref: "#/components/schemas/ResourceRetainedBillableTimeInSeconds"
          description: "The billable time in seconds used by the warm pool. Billable time refers to the absolute wall-clock time. Multiply ResourceRetainedBillableTimeInSeconds by the number of instances (InstanceCount) in your training cluster to get the total compute time SageMaker bills you if you run warm pool training. The formula is as follows: ResourceRetainedBillableTimeInSeconds * InstanceCount."
        ReusedByJob:
          $ref: "#/components/schemas/TrainingJobName"
          description: The name of the matching training job that reused the warm pool.
      required:
        - Status
    WarmPoolResourceStatus:
      type: string
      enum:
        - Available
        - Terminated
        - Reused
        - InUse
    ResourceRetainedBillableTimeInSeconds:
      description: Optional. Indicates how many seconds the resource stayed in ResourceRetained state. Populated only after resource reaches ResourceReused or ResourceReleased state.
      type: integer
      minimum: 0
    SecondaryStatusTransitions:
      type: array
      items:
        $ref: "#/components/schemas/SecondaryStatusTransition"
    SecondaryStatusTransition:
      description: An array element of SecondaryStatusTransitions for DescribeTrainingJob. It provides additional details about a status that the training job has transitioned through. A training job can be in one of several states, for example, starting, downloading, training, or uploading. Within each state, there are a number of intermediate states. For example, within the starting state, SageMaker could be starting the training job or launching the ML instances. These transitional states are referred to as the job's secondary status.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/SecondaryStatus"
          description: "Contains a secondary status information from a training job. Status might be one of the following secondary statuses: InProgress Starting - Starting the training job. Downloading - An optional stage for algorithms that support File training input mode. It indicates that data is being downloaded to the ML storage volumes. Training - Training is in progress. Uploading - Training is complete and the model artifacts are being uploaded to the S3 location. Completed Completed - The training job has completed. Failed Failed - The training job has failed. The reason for the failure is returned in the FailureReason field of DescribeTrainingJobResponse. Stopped MaxRuntimeExceeded - The job stopped because it exceeded the maximum allowed runtime. Stopped - The training job has stopped. Stopping Stopping - Stopping the training job. We no longer support the following secondary statuses: LaunchingMLInstances PreparingTrainingStack DownloadingTrainingImage"
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that shows when the training job transitioned to the current secondary status state.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that shows when the training job transitioned out of this secondary status state into another secondary status state or when the training job has ended.
        StatusMessage:
          $ref: "#/components/schemas/StatusMessage"
          description: "A detailed description of the progress within a secondary status. SageMaker provides secondary statuses and status messages that apply to each of them: Starting Starting the training job. Launching requested ML instances. Insufficient capacity error from EC2 while launching instances, retrying! Launched instance was unhealthy, replacing it! Preparing the instances for training. Training Training image download completed. Training in progress. Status messages are subject to change. Therefore, we recommend not including them in code that programmatically initiates actions. For examples, don't use status messages in if statements. To have an overview of your training job's progress, view TrainingJobStatus and SecondaryStatus in DescribeTrainingJob, and StatusMessage together. For example, at the start of a training job, you might see the following: TrainingJobStatus - InProgress SecondaryStatus - Training StatusMessage - Downloading the training image"
      required:
        - Status
        - StartTime
    StatusMessage:
      type: string
    FinalMetricDataList:
      type: array
      items:
        $ref: "#/components/schemas/MetricData"
    MetricData:
      description: The name, value, and date and time of a metric that was emitted to Amazon CloudWatch.
      type: object
      properties:
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the metric.
        Value:
          $ref: "#/components/schemas/Float"
          description: The value of the metric.
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the algorithm emitted the metric.
    TrainingTimeInSeconds:
      type: integer
      minimum: 1
    BillableTimeInSeconds:
      type: integer
      minimum: 1
    BillableTokenCount:
      type: integer
      format: int64
      minimum: 0
    DebugRuleEvaluationStatuses:
      type: array
      items:
        $ref: "#/components/schemas/DebugRuleEvaluationStatus"
    DebugRuleEvaluationStatus:
