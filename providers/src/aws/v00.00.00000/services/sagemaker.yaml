            schema:
              type: object
              properties:
                AppImageConfigName:
                  $ref: "#/components/schemas/AppImageConfigName"
                  description: The name of the AppImageConfig. Must be unique to your account.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags to apply to the AppImageConfig.
                KernelGatewayImageConfig:
                  $ref: "#/components/schemas/KernelGatewayImageConfig"
                  description: The KernelGatewayImageConfig. You can only specify one image kernel in the AppImageConfig API. This kernel will be shown to users before the image starts. Once the image runs, all kernels are visible in JupyterLab.
                JupyterLabAppImageConfig:
                  $ref: "#/components/schemas/JupyterLabAppImageConfig"
                  description: The JupyterLabAppImageConfig. You can only specify one image kernel in the AppImageConfig API. This kernel is shown to users before the image starts. After the image runs, all kernels are visible in JupyterLab.
                CodeEditorAppImageConfig:
                  $ref: "#/components/schemas/CodeEditorAppImageConfig"
                  description: The CodeEditorAppImageConfig. You can only specify one image kernel in the AppImageConfig API. This kernel is shown to users before the image starts. After the image runs, all kernels are visible in Code Editor.
              required:
                - AppImageConfigName
      responses:
        "200":
          description: Success
