        TaskKeywords:
          $ref: "#/components/schemas/TaskKeywords"
          description: Keywords used to describe the task so that workers on Amazon Mechanical Turk can discover the task.
        TaskTitle:
          $ref: "#/components/schemas/TaskTitle"
          description: A title for the task for your human workers.
        TaskDescription:
          $ref: "#/components/schemas/TaskDescription"
          description: A description of the task for your human workers.
        NumberOfHumanWorkersPerDataObject:
          $ref: "#/components/schemas/NumberOfHumanWorkersPerDataObject"
          description: The number of human workers that will label an object.
        TaskTimeLimitInSeconds:
          $ref: "#/components/schemas/TaskTimeLimitInSeconds"
          description: "The amount of time that a worker has to complete a task. If you create a custom labeling job, the maximum value for this parameter is 8 hours (28,800 seconds). If you create a labeling job using a built-in task type the maximum for this parameter depends on the task type you use: For image and text labeling jobs, the maximum is 8 hours (28,800 seconds). For 3D point cloud and video frame labeling jobs, the maximum is 30 days (2952,000 seconds) for non-AL mode. For most users, the maximum is also 30 days."
        TaskAvailabilityLifetimeInSeconds:
          $ref: "#/components/schemas/TaskAvailabilityLifetimeInSeconds"
          description: The length of time that a task remains available for labeling by human workers. The default and maximum values for this parameter depend on the type of workforce you use. If you choose the Amazon Mechanical Turk workforce, the maximum is 12 hours (43,200 seconds). The default is 6 hours (21,600 seconds). If you choose a private or vendor workforce, the default value is 30 days (2592,000 seconds) for non-AL mode. For most users, the maximum is also 30 days.
        MaxConcurrentTaskCount:
          $ref: "#/components/schemas/MaxConcurrentTaskCount"
          description: Defines the maximum number of data objects that can be labeled by human workers at the same time. Also referred to as batch size. Each object may have more than one worker at one time. The default value is 1000 objects. To increase the maximum value to 5000 objects, contact Amazon Web Services Support.
        AnnotationConsolidationConfig:
          $ref: "#/components/schemas/AnnotationConsolidationConfig"
          description: Configures how labels are consolidated across human workers.
        PublicWorkforceTaskPrice:
          $ref: "#/components/schemas/PublicWorkforceTaskPrice"
          description: The price that you pay for each task performed by an Amazon Mechanical Turk worker.
      required:
        - WorkteamArn
        - UiConfig
        - TaskTitle
        - TaskDescription
        - NumberOfHumanWorkersPerDataObject
        - TaskTimeLimitInSeconds
    UiConfig:
      description: Provided configuration information for the worker UI for a labeling job. Provide either HumanTaskUiArn or UiTemplateS3Uri. For named entity recognition, 3D point cloud and video frame labeling jobs, use HumanTaskUiArn. For all other Ground Truth built-in task types and custom task types, use UiTemplateS3Uri to specify the location of a worker task template in Amazon S3.
      type: object
      properties:
        UiTemplateS3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 bucket location of the UI template, or worker task template. This is the template used to render the worker UI and tools for labeling job tasks. For more information about the contents of a UI template, see Creating Your Custom Labeling Task Template.
        HumanTaskUiArn:
          $ref: "#/components/schemas/HumanTaskUiArn"
          description: "The ARN of the worker task template used to render the worker UI and tools for labeling job tasks. Use this parameter when you are creating a labeling job for named entity recognition, 3D point cloud and video frame labeling jobs. Use your labeling job task type to select one of the following ARNs and use it with this parameter when you create a labeling job. Replace aws-region with the Amazon Web Services Region you are creating your labeling job in. For example, replace aws-region with us-west-1 if you create a labeling job in US West (N. California). Named Entity Recognition Use the following HumanTaskUiArn for named entity recognition labeling jobs: arn:aws:sagemaker:aws-region:394669845002:human-task-ui/NamedEntityRecognition 3D Point Cloud HumanTaskUiArns Use this HumanTaskUiArn for 3D point cloud object detection and 3D point cloud object detection adjustment labeling jobs. arn:aws:sagemaker:aws-region:394669845002:human-task-ui/PointCloudObjectDetection Use this HumanTaskUiArn for 3D point cloud object tracking and 3D point cloud object tracking adjustment labeling jobs. arn:aws:sagemaker:aws-region:394669845002:human-task-ui/PointCloudObjectTracking Use this HumanTaskUiArn for 3D point cloud semantic segmentation and 3D point cloud semantic segmentation adjustment labeling jobs. arn:aws:sagemaker:aws-region:394669845002:human-task-ui/PointCloudSemanticSegmentation Video Frame HumanTaskUiArns Use this HumanTaskUiArn for video frame object detection and video frame object detection adjustment labeling jobs. arn:aws:sagemaker:region:394669845002:human-task-ui/VideoObjectDetection Use this HumanTaskUiArn for video frame object tracking and video frame object tracking adjustment labeling jobs. arn:aws:sagemaker:aws-region:394669845002:human-task-ui/VideoObjectTracking"
    LambdaFunctionArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:aws[a-z\-]*:lambda:[a-z0-9\-]*:[0-9]{12}:function:.*
    TaskKeywords:
      type: array
      items:
        $ref: "#/components/schemas/TaskKeyword"
    TaskKeyword:
      type: string
      minLength: 1
      maxLength: 30
      pattern: "[A-Za-z0-9]+( [A-Za-z0-9]+)*"
    TaskTitle:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\t\\n\\r -\\uD7FF\\uE000-\\uFFFD]*"
    TaskDescription:
      type: string
      minLength: 1
      maxLength: 255
      pattern: .+
    NumberOfHumanWorkersPerDataObject:
      type: integer
      minimum: 1
      maximum: 9
    TaskTimeLimitInSeconds:
      type: integer
      minimum: 30
    TaskAvailabilityLifetimeInSeconds:
      type: integer
      minimum: 60
    MaxConcurrentTaskCount:
      type: integer
      minimum: 1
      maximum: 5000
