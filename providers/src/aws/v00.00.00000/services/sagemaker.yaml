          $ref: "#/components/schemas/S3Uri"
          description: 'The S3 location of the JSON file that defines the categories used to label data objects. Please note the following label-category limits: Semantic segmentation labeling jobs using automated labeling: 20 labels Box bounding labeling jobs (all): 10 labels The file is a JSON structure in the following format: { "document-version": "2018-11-28" "labels": [ { "label": "label 1" }, { "label": "label 2" }, ... { "label": "label n" } ] }'
        StoppingConditions:
          $ref: "#/components/schemas/LabelingJobStoppingConditions"
          description: A set of conditions for stopping a labeling job. If any of the conditions are met, the job is automatically stopped.
        LabelingJobAlgorithmsConfig:
          $ref: "#/components/schemas/LabelingJobAlgorithmsConfig"
          description: Configuration information for automated data labeling.
        HumanTaskConfig:
          $ref: "#/components/schemas/HumanTaskConfig"
          description: Configuration information required for human workers to complete a labeling task.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: An array of key-value pairs. You can use tags to categorize your Amazon Web Services resources in different ways, for example, by purpose, owner, or environment. For more information, see Tagging Amazon Web Services Resources.
        LabelingJobOutput:
          $ref: "#/components/schemas/LabelingJobOutput"
          description: The location of the output produced by the labeling job.
