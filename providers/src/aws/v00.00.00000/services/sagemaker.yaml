    SearchExpression:
      description: "A multi-expression that searches for the specified resource or resources in a search. All resource objects that satisfy the expression's condition are included in the search results. You must specify at least one subexpression, filter, or nested filter. A SearchExpression can contain up to twenty elements. A SearchExpression contains the following components: A list of Filter objects. Each filter defines a simple Boolean expression comprised of a resource property name, Boolean operator, and value. A list of NestedFilter objects. Each nested filter defines a list of Boolean expressions using a list of resource properties. A nested filter is satisfied if a single object in the list satisfies all Boolean expressions. A list of SearchExpression objects. A search expression object can be nested in a list of search expression objects. A Boolean operator: And or Or."
      type: object
      properties:
        Filters:
          $ref: "#/components/schemas/FilterList"
          description: A list of filter objects.
        NestedFilters:
          $ref: "#/components/schemas/NestedFiltersList"
          description: A list of nested filter objects.
        SubExpressions:
          $ref: "#/components/schemas/SearchExpressionList"
          description: A list of search expression objects.
        Operator:
          $ref: "#/components/schemas/BooleanOperator"
          description: A Boolean operator used to evaluate the search expression. If you want every conditional statement in all lists to be satisfied for the entire search expression to be true, specify And. If only a single conditional statement needs to be true for the entire search expression to be true, specify Or. The default value is And.
    FilterList:
      type: array
      items:
        $ref: "#/components/schemas/Filter"
    Filter:
      description: 'A conditional statement for a search expression that includes a resource property, a Boolean operator, and a value. Resources that match the statement are returned in the results from the Search API. If you specify a Value, but not an Operator, SageMaker uses the equals operator. In search, there are several property types: Metrics To define a metric filter, enter a value using the form "Metrics.`<name>`", where `<name>` is a metric name. For example, the following filter searches for training jobs with an "accuracy" metric greater than "0.9": { "Name": "Metrics.accuracy", "Operator": "GreaterThan", "Value": "0.9" } HyperParameters To define a hyperparameter filter, enter a value with the form "HyperParameters.`<name>`". Decimal hyperparameter values are treated as a decimal in a comparison if the specified Value is also a decimal value. If the specified Value is an integer, the decimal hyperparameter values are treated as integers. For example, the following filter is satisfied by training jobs with a "learning_rate" hyperparameter that is less than "0.5": { "Name": "HyperParameters.learning_rate", "Operator": "LessThan", "Value": "0.5" } Tags To define a tag filter, enter a value with the form Tags.`<key>`.'
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ResourcePropertyName"
          description: A resource property name. For example, TrainingJobName. For valid property names, see SearchRecord. You must specify a valid property for the resource.
        Operator:
          $ref: "#/components/schemas/Operator"
          description: "A Boolean binary operator that is used to evaluate the filter. The operator field contains one of the following values: Equals The value of Name equals Value. NotEquals The value of Name doesn't equal Value. Exists The Name property exists. NotExists The Name property does not exist. GreaterThan The value of Name is greater than Value. Not supported for text properties. GreaterThanOrEqualTo The value of Name is greater than or equal to Value. Not supported for text properties. LessThan The value of Name is less than Value. Not supported for text properties. LessThanOrEqualTo The value of Name is less than or equal to Value. Not supported for text properties. In The value of Name is one of the comma delimited strings in Value. Only supported for text properties. Contains The value of Name contains the string Value. Only supported for text properties. A SearchExpression can include the Contains operator multiple times when the value of Name is one of the following: Experiment.DisplayName Experiment.ExperimentName Experiment.Tags Trial.DisplayName Trial.TrialName Trial.Tags TrialComponent.DisplayName TrialComponent.TrialComponentName TrialComponent.Tags TrialComponent.InputArtifacts TrialComponent.OutputArtifacts A SearchExpression can include only one Contains operator for all other values of Name. In these cases, if you include multiple Contains operators in the SearchExpression, the result is the following error message: \"'CONTAINS' operator usage limit of 1 exceeded.\""
        Value:
          $ref: "#/components/schemas/FilterValue"
          description: "A value used with Name and Operator to determine which resources satisfy the filter's condition. For numerical properties, Value must be an integer or floating-point decimal. For timestamp properties, Value must be an ISO 8601 date-time string of the following format: YYYY-mm-dd'T'HH:MM:SS."
      required:
        - Name
    Operator:
      type: string
      enum:
        - Equals
        - NotEquals
        - GreaterThan
        - GreaterThanOrEqualTo
        - LessThan
        - LessThanOrEqualTo
        - Contains
        - Exists
        - NotExists
        - In
    FilterValue:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: .+
    NestedFiltersList:
      type: array
      items:
        $ref: "#/components/schemas/NestedFilters"
    NestedFilters:
      description: "A list of nested Filter objects. A resource must satisfy the conditions of all filters to be included in the results returned from the Search API. For example, to filter on a training job's InputDataConfig property with a specific channel name and S3Uri prefix, define the following filters: '{Name:\"InputDataConfig.ChannelName\", \"Operator\":\"Equals\", \"Value\":\"train\"}', '{Name:\"InputDataConfig.DataSource.S3DataSource.S3Uri\", \"Operator\":\"Contains\", \"Value\":\"mybucket/catdata\"}'"
      type: object
      properties:
        NestedPropertyName:
          $ref: "#/components/schemas/ResourcePropertyName"
          description: The name of the property to use in the nested filters. The value must match a listed property name, such as InputDataConfig.
        Filters:
          $ref: "#/components/schemas/FilterList"
          description: "A list of filters. Each filter acts on a property. Filters must contain at least one Filters value. For example, a NestedFilters call might include a filter on the PropertyName parameter of the InputDataConfig property: InputDataConfig.DataSource.S3DataSource.S3Uri."
      required:
        - NestedPropertyName
        - Filters
    SearchExpressionList:
      type: array
      items:
        $ref: "#/components/schemas/SearchExpression"
    BooleanOperator:
      type: string
      enum:
        - And
        - Or
    SearchSortOrder:
      type: string
      enum:
        - Ascending
        - Descending
    VisibilityConditionsList:
      type: array
      items:
        $ref: "#/components/schemas/VisibilityConditions"
    VisibilityConditions:
      description: The list of key-value pairs used to filter your search results. If a search result contains a key from your list, it is included in the final search response if the value associated with the key in the result matches the value you specified. If the value doesn't match, the result is excluded from the search response. Any resources that don't have a key from the list that you've provided will also be included in the search response.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/VisibilityConditionsKey"
          description: "The key that specifies the tag that you're using to filter the search results. It must be in the following format: Tags.`<key>`."
        Value:
          $ref: "#/components/schemas/VisibilityConditionsValue"
          description: The value for the tag that you're using to filter the search results.
    VisibilityConditionsKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    VisibilityConditionsValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
