openapi: 3.0.0
info:
  version: "2017-07-24"
  title: Amazon SageMaker Service
  description: Amazon SageMaker Service
  x-serviceName: sagemaker
  x-serviceAlias: sagemaker
  x-protocol: json
  x-apiVersion: "2017-07-24"
  x-endpointPrefix: api.sagemaker
  x-targetPrefix: SageMaker
  x-jsonVersion: "1.1"
servers:
  - url: https://api.sagemaker.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for sagemaker
paths:
  /AddAssociation:
    post:
      operationId: AddAssociation
      description: Creates an association between the source and the destination. A source can be associated with multiple destinations, and a destination can be associated with multiple sources. An association is a lineage tracking entity. For more information, see Amazon SageMaker ML Lineage Tracking.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.AddAssociation
            default: SageMaker.AddAssociation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SourceArn:
                  $ref: "#/components/schemas/AssociationEntityArn"
                  description: The ARN of the source.
                DestinationArn:
                  $ref: "#/components/schemas/AssociationEntityArn"
                  description: The Amazon Resource Name (ARN) of the destination.
                AssociationType:
                  $ref: "#/components/schemas/AssociationEdgeType"
                  description: The type of association. The following are suggested uses for each type. Amazon SageMaker places no restrictions on their use. ContributedTo - The source contributed to the destination or had a part in enabling the destination. For example, the training data contributed to the training job. AssociatedWith - The source is connected to the destination. For example, an approval workflow is associated with a model deployment. DerivedFrom - The destination is a modification of the source. For example, a digest output of a channel input for a processing job is derived from the original inputs. Produced - The source generated the destination. For example, a training job produced a model artifact.
              required:
                - SourceArn
                - DestinationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddAssociationResponse"
  /AddTags:
    post:
      operationId: AddTags
      description: Adds or overwrites one or more tags for the specified SageMaker resource. You can add tags to notebook instances, training jobs, hyperparameter tuning jobs, batch transform jobs, models, labeling jobs, work teams, endpoint configurations, and endpoints. Each tag consists of a key and an optional value. Tag keys must be unique per resource. For more information about tags, see For more information, see Amazon Web Services Tagging Strategies. Tags that you add to a hyperparameter tuning job by calling this API are also added to any training jobs that the hyperparameter tuning job launches after you call this API, but not to training jobs that the hyperparameter tuning job launched before you called this API. To make sure that the tags associated with a hyperparameter tuning job are also added to all training jobs that the hyperparameter tuning job launches, add the tags when you first create the tuning job by specifying them in the Tags parameter of CreateHyperParameterTuningJob Tags that you add to a SageMaker Domain or User Profile by calling this API are also added to any Apps that the Domain or User Profile launches after you call this API, but not to Apps that the Domain or User Profile launched before you called this API. To make sure that the tags associated with a Domain or User Profile are also added to all Apps that the Domain or User Profile launches, add the tags when you first create the Domain or User Profile by specifying them in the Tags parameter of CreateDomain or CreateUserProfile.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.AddTags
            default: SageMaker.AddTags
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource that you want to tag.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key-value pairs. You can use tags to categorize your Amazon Web Services resources in different ways, for example, by purpose, owner, or environment. For more information, see Tagging Amazon Web Services Resources.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddTagsOutput"
  /AssociateTrialComponent:
    post:
      operationId: AssociateTrialComponent
      description: Associates a trial component with a trial. A trial component can be associated with multiple trials. To disassociate a trial component from a trial, call the DisassociateTrialComponent API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.AssociateTrialComponent
            default: SageMaker.AssociateTrialComponent
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TrialComponentName:
                  $ref: "#/components/schemas/ExperimentEntityName"
                  description: The name of the component to associated with the trial.
                TrialName:
                  $ref: "#/components/schemas/ExperimentEntityName"
                  description: The name of the trial to associate with.
              required:
                - TrialComponentName
                - TrialName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateTrialComponentResponse"
  /AttachClusterNodeVolume:
    post:
      operationId: AttachClusterNodeVolume
      description: Attaches your Amazon Elastic Block Store (Amazon EBS) volume to a node in your EKS orchestrated HyperPod cluster. This API works with the Amazon Elastic Block Store (Amazon EBS) Container Storage Interface (CSI) driver to manage the lifecycle of persistent storage in your HyperPod EKS clusters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.AttachClusterNodeVolume
            default: SageMaker.AttachClusterNodeVolume
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterArn:
                  $ref: "#/components/schemas/ClusterArn"
                  description: The Amazon Resource Name (ARN) of your SageMaker HyperPod cluster containing the target node. Your cluster must use EKS as the orchestration and be in the InService state.
                NodeId:
                  $ref: "#/components/schemas/ClusterNodeId"
                  description: The unique identifier of the cluster node to which you want to attach the volume. The node must belong to your specified HyperPod cluster and cannot be part of a Restricted Instance Group (RIG).
                VolumeId:
                  $ref: "#/components/schemas/VolumeId"
                  description: The unique identifier of your EBS volume to attach. The volume must be in the available state.
              required:
                - ClusterArn
                - NodeId
                - VolumeId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachClusterNodeVolumeResponse"
  /BatchAddClusterNodes:
    post:
      operationId: BatchAddClusterNodes
      description: Adds nodes to a HyperPod cluster by incrementing the target count for one or more instance groups. This operation returns a unique NodeLogicalId for each node being added, which can be used to track the provisioning status of the node. This API provides a safer alternative to UpdateCluster for scaling operations by avoiding unintended configuration changes. This API is only supported for clusters using Continuous as the NodeProvisioningMode.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.BatchAddClusterNodes
            default: SageMaker.BatchAddClusterNodes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterName:
                  $ref: "#/components/schemas/ClusterNameOrArn"
                  description: The name of the HyperPod cluster to which you want to add nodes.
                ClientToken:
                  $ref: "#/components/schemas/BatchAddClusterNodesRequestClientTokenString"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. This token is valid for 8 hours. If you retry the request with the same client token within this timeframe and the same parameters, the API returns the same set of NodeLogicalIds with their latest status.
                NodesToAdd:
                  $ref: "#/components/schemas/AddClusterNodeSpecificationList"
                  description: A list of instance groups and the number of nodes to add to each. You can specify up to 5 instance groups in a single request, with a maximum of 50 nodes total across all instance groups.
              required:
                - ClusterName
                - NodesToAdd
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAddClusterNodesResponse"
  /BatchDeleteClusterNodes:
    post:
      operationId: BatchDeleteClusterNodes
      description: Deletes specific nodes within a SageMaker HyperPod cluster. BatchDeleteClusterNodes accepts a cluster name and a list of node IDs. To safeguard your work, back up your data to Amazon S3 or an FSx for Lustre file system before invoking the API on a worker node group. This will help prevent any potential data loss from the instance root volume. For more information about backup, see Use the backup script provided by SageMaker HyperPod. If you want to invoke this API on an existing cluster, you'll first need to patch the cluster by running the UpdateClusterSoftware API. For more information about patching a cluster, see Update the SageMaker HyperPod platform software of a cluster.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.BatchDeleteClusterNodes
            default: SageMaker.BatchDeleteClusterNodes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterName:
                  $ref: "#/components/schemas/ClusterNameOrArn"
                  description: The name of the SageMaker HyperPod cluster from which to delete the specified nodes.
                NodeIds:
                  $ref: "#/components/schemas/ClusterNodeIds"
                  description: A list of node IDs to be deleted from the specified cluster. For SageMaker HyperPod clusters using the Slurm workload manager, you cannot remove instances that are configured as Slurm controller nodes. If you need to delete more than 99 instances, contact Support for assistance.
                NodeLogicalIds:
                  $ref: "#/components/schemas/ClusterNodeLogicalIdList"
                  description: A list of NodeLogicalIds identifying the nodes to be deleted. You can specify up to 50 NodeLogicalIds. You must specify either NodeLogicalIds, InstanceIds, or both, with a combined maximum of 50 identifiers.
              required:
                - ClusterName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteClusterNodesResponse"
  /BatchDescribeModelPackage:
    post:
      operationId: BatchDescribeModelPackage
      description: This action batch describes a list of versioned model packages
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.BatchDescribeModelPackage
            default: SageMaker.BatchDescribeModelPackage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ModelPackageArnList:
                  $ref: "#/components/schemas/ModelPackageArnList"
                  description: The list of Amazon Resource Name (ARN) of the model package groups.
              required:
                - ModelPackageArnList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDescribeModelPackageOutput"
  /BatchRebootClusterNodes:
    post:
      operationId: BatchRebootClusterNodes
      description: Reboots specific nodes within a SageMaker HyperPod cluster using a soft recovery mechanism. BatchRebootClusterNodes performs a graceful reboot of the specified nodes by calling the Amazon Elastic Compute Cloud RebootInstances API, which attempts to cleanly shut down the operating system before restarting the instance. This operation is useful for recovering from transient issues or applying certain configuration changes that require a restart. Rebooting a node may cause temporary service interruption for workloads running on that node. Ensure your workloads can handle node restarts or use appropriate scheduling to minimize impact. You can reboot up to 25 nodes in a single request. For SageMaker HyperPod clusters using the Slurm workload manager, ensure rebooting nodes will not disrupt critical cluster operations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.BatchRebootClusterNodes
            default: SageMaker.BatchRebootClusterNodes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterName:
                  $ref: "#/components/schemas/ClusterNameOrArn"
                  description: The name or Amazon Resource Name (ARN) of the SageMaker HyperPod cluster containing the nodes to reboot.
                NodeIds:
                  $ref: "#/components/schemas/BatchRebootClusterNodesRequestNodeIdsList"
                  description: A list of EC2 instance IDs to reboot using soft recovery. You can specify between 1 and 25 instance IDs. Either NodeIds or NodeLogicalIds must be provided (or both), but at least one is required. Each instance ID must follow the pattern i- followed by 17 hexadecimal characters (for example, i-0123456789abcdef0).
                NodeLogicalIds:
                  $ref: "#/components/schemas/BatchRebootClusterNodesRequestNodeLogicalIdsList"
                  description: A list of logical node IDs to reboot using soft recovery. You can specify between 1 and 25 logical node IDs. The NodeLogicalId is a unique identifier that persists throughout the node's lifecycle and can be used to track nodes that are still being provisioned and don't yet have an EC2 instance ID assigned. This parameter is only supported for clusters using Continuous as the NodeProvisioningMode. For clusters using the default provisioning mode, use NodeIds instead. Either NodeIds or NodeLogicalIds must be provided (or both), but at least one is required.
              required:
                - ClusterName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchRebootClusterNodesResponse"
  /BatchReplaceClusterNodes:
    post:
      operationId: BatchReplaceClusterNodes
      description: "Replaces specific nodes within a SageMaker HyperPod cluster with new hardware. BatchReplaceClusterNodes terminates the specified instances and provisions new replacement instances with the same configuration but fresh hardware. The Amazon Machine Image (AMI) and instance configuration remain the same. This operation is useful for recovering from hardware failures or persistent issues that cannot be resolved through a reboot. Data Loss Warning: Replacing nodes destroys all instance volumes, including both root and secondary volumes. All data stored on these volumes will be permanently lost and cannot be recovered. To safeguard your work, back up your data to Amazon S3 or an FSx for Lustre file system before invoking the API on a worker node group. This will help prevent any potential data loss from the instance root volume. For more information about backup, see Use the backup script provided by SageMaker HyperPod. If you want to invoke this API on an existing cluster, you'll first need to patch the cluster by running the UpdateClusterSoftware API. For more information about patching a cluster, see Update the SageMaker HyperPod platform software of a cluster. You can replace up to 25 nodes in a single request."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.BatchReplaceClusterNodes
            default: SageMaker.BatchReplaceClusterNodes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterName:
                  $ref: "#/components/schemas/ClusterNameOrArn"
                  description: The name or Amazon Resource Name (ARN) of the SageMaker HyperPod cluster containing the nodes to replace.
                NodeIds:
                  $ref: "#/components/schemas/BatchReplaceClusterNodesRequestNodeIdsList"
                  description: A list of EC2 instance IDs to replace with new hardware. You can specify between 1 and 25 instance IDs. Replace operations destroy all instance volumes (root and secondary). Ensure you have backed up any important data before proceeding. Either NodeIds or NodeLogicalIds must be provided (or both), but at least one is required. Each instance ID must follow the pattern i- followed by 17 hexadecimal characters (for example, i-0123456789abcdef0). For SageMaker HyperPod clusters using the Slurm workload manager, you cannot replace instances that are configured as Slurm controller nodes.
                NodeLogicalIds:
                  $ref: "#/components/schemas/BatchReplaceClusterNodesRequestNodeLogicalIdsList"
                  description: A list of logical node IDs to replace with new hardware. You can specify between 1 and 25 logical node IDs. The NodeLogicalId is a unique identifier that persists throughout the node's lifecycle and can be used to track nodes that are still being provisioned and don't yet have an EC2 instance ID assigned. Replace operations destroy all instance volumes (root and secondary). Ensure you have backed up any important data before proceeding. This parameter is only supported for clusters using Continuous as the NodeProvisioningMode. For clusters using the default provisioning mode, use NodeIds instead. Either NodeIds or NodeLogicalIds must be provided (or both), but at least one is required.
              required:
                - ClusterName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchReplaceClusterNodesResponse"
  /CreateAIBenchmarkJob:
    post:
      operationId: CreateAIBenchmarkJob
      description: Creates a benchmark job that runs performance benchmarks against inference infrastructure using a predefined AI workload configuration. The benchmark job measures metrics such as latency, throughput, and cost for your generative AI inference endpoints.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateAIBenchmarkJob
            default: SageMaker.CreateAIBenchmarkJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AIBenchmarkJobName:
                  $ref: "#/components/schemas/AIEntityName"
                  description: The name of the AI benchmark job. The name must be unique within your Amazon Web Services account in the current Amazon Web Services Region.
                BenchmarkTarget:
                  $ref: "#/components/schemas/AIBenchmarkTarget"
                  description: The target endpoint to benchmark. Specify a SageMaker endpoint by providing its name or Amazon Resource Name (ARN).
                OutputConfig:
                  $ref: "#/components/schemas/AIBenchmarkOutputConfig"
                  description: The output configuration for the benchmark job, including the Amazon S3 location where benchmark results are stored.
                AIWorkloadConfigIdentifier:
                  $ref: "#/components/schemas/AIResourceIdentifier"
                  description: The name or Amazon Resource Name (ARN) of the AI workload configuration to use for this benchmark job.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of an IAM role that enables Amazon SageMaker AI to perform tasks on your behalf.
                NetworkConfig:
                  $ref: "#/components/schemas/AIBenchmarkNetworkConfig"
                  description: The network configuration for the benchmark job, including VPC settings.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The metadata that you apply to Amazon Web Services resources to help you categorize and organize them. Each tag consists of a key and a value, both of which you define.
              required:
                - AIBenchmarkJobName
                - BenchmarkTarget
                - OutputConfig
                - AIWorkloadConfigIdentifier
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAIBenchmarkJobResponse"
  /CreateAIRecommendationJob:
    post:
      operationId: CreateAIRecommendationJob
      description: Creates a recommendation job that generates intelligent optimization recommendations for generative AI inference deployments. The job analyzes your model, workload configuration, and performance targets to recommend optimal instance types, model optimization techniques (such as quantization and speculative decoding), and deployment configurations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateAIRecommendationJob
            default: SageMaker.CreateAIRecommendationJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AIRecommendationJobName:
                  $ref: "#/components/schemas/AIEntityName"
                  description: The name of the AI recommendation job. The name must be unique within your Amazon Web Services account in the current Amazon Web Services Region.
                ModelSource:
                  $ref: "#/components/schemas/AIModelSource"
                  description: The source of the model to optimize. Specify the Amazon S3 location of the model artifacts.
                OutputConfig:
                  $ref: "#/components/schemas/AIRecommendationOutputConfig"
                  description: The output configuration for the recommendation job, including the Amazon S3 location for results and an optional model package group where the optimized model is registered.
                AIWorkloadConfigIdentifier:
                  $ref: "#/components/schemas/AIResourceIdentifier"
                  description: The name or Amazon Resource Name (ARN) of the AI workload configuration to use for this recommendation job.
                PerformanceTarget:
                  $ref: "#/components/schemas/AIRecommendationPerformanceTarget"
                  description: The performance targets for the recommendation job. Specify constraints on metrics such as time to first token (ttft-ms), throughput, or cost.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of an IAM role that enables Amazon SageMaker AI to perform tasks on your behalf.
                InferenceSpecification:
                  $ref: "#/components/schemas/AIRecommendationInferenceSpecification"
                  description: The inference framework configuration. Specify the framework (such as LMI or vLLM) for the recommendation job.
                OptimizeModel:
                  $ref: "#/components/schemas/AIRecommendationAllowOptimization"
                  description: Whether to allow model optimization techniques such as quantization, speculative decoding, and kernel tuning. The default is true.
                ComputeSpec:
                  $ref: "#/components/schemas/AIRecommendationComputeSpec"
                  description: The compute resource specification for the recommendation job. You can specify up to 3 instance types to consider, and optionally provide capacity reservation configuration.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The metadata that you apply to Amazon Web Services resources to help you categorize and organize them.
              required:
                - AIRecommendationJobName
                - ModelSource
                - OutputConfig
                - AIWorkloadConfigIdentifier
                - PerformanceTarget
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAIRecommendationJobResponse"
  /CreateAIWorkloadConfig:
    post:
      operationId: CreateAIWorkloadConfig
      description: Creates a reusable AI workload configuration that defines datasets, data sources, and benchmark tool settings for consistent performance testing of generative AI inference deployments on Amazon SageMaker AI.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateAIWorkloadConfig
            default: SageMaker.CreateAIWorkloadConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AIWorkloadConfigName:
                  $ref: "#/components/schemas/AIEntityName"
                  description: The name of the AI workload configuration. The name must be unique within your Amazon Web Services account in the current Amazon Web Services Region.
                DatasetConfig:
                  $ref: "#/components/schemas/AIDatasetConfig"
                  description: The dataset configuration for the workload. Specify input data channels with their data sources for benchmark workloads.
                AIWorkloadConfigs:
                  $ref: "#/components/schemas/AIWorkloadConfigs"
                  description: The benchmark tool configuration and workload specification. Provide the specification as an inline YAML or JSON string.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The metadata that you apply to Amazon Web Services resources to help you categorize and organize them. Each tag consists of a key and a value, both of which you define. For more information, see Tagging Amazon Web Services Resources in the Amazon Web Services General Reference.
              required:
                - AIWorkloadConfigName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAIWorkloadConfigResponse"
  /CreateAction:
    post:
      operationId: CreateAction
      description: Creates an action. An action is a lineage tracking entity that represents an action or activity. For example, a model deployment or an HPO job. Generally, an action involves at least one input or output artifact. For more information, see Amazon SageMaker ML Lineage Tracking.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateAction
            default: SageMaker.CreateAction
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ActionName:
                  $ref: "#/components/schemas/ExperimentEntityName"
                  description: The name of the action. Must be unique to your account in an Amazon Web Services Region.
                Source:
                  $ref: "#/components/schemas/ActionSource"
                  description: The source type, ID, and URI.
                ActionType:
                  $ref: "#/components/schemas/String256"
                  description: The action type.
                Description:
                  $ref: "#/components/schemas/ExperimentDescription"
                  description: The description of the action.
                Status:
                  $ref: "#/components/schemas/ActionStatus"
                  description: The status of the action.
                Properties:
                  $ref: "#/components/schemas/LineageEntityParameters"
                  description: A list of properties to add to the action.
                MetadataProperties:
                  $ref: "#/components/schemas/MetadataProperties"
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags to apply to the action.
              required:
                - ActionName
                - ActionType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateActionResponse"
  /CreateAlgorithm:
    post:
      operationId: CreateAlgorithm
      description: Create a machine learning algorithm that you can use in SageMaker and list in the Amazon Web Services Marketplace.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateAlgorithm
            default: SageMaker.CreateAlgorithm
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AlgorithmName:
                  $ref: "#/components/schemas/EntityName"
                  description: The name of the algorithm.
                AlgorithmDescription:
                  $ref: "#/components/schemas/EntityDescription"
                  description: A description of the algorithm.
                TrainingSpecification:
                  $ref: "#/components/schemas/TrainingSpecification"
                  description: "Specifies details about training jobs run by this algorithm, including the following: The Amazon ECR path of the container and the version digest of the algorithm. The hyperparameters that the algorithm supports. The instance types that the algorithm supports for training. Whether the algorithm supports distributed training. The metrics that the algorithm emits to Amazon CloudWatch. Which metrics that the algorithm emits can be used as the objective metric for hyperparameter tuning jobs. The input channels that the algorithm supports for training data. For example, an algorithm might support train, validation, and test channels."
                InferenceSpecification:
                  $ref: "#/components/schemas/InferenceSpecification"
                  description: "Specifies details about inference jobs that the algorithm runs, including the following: The Amazon ECR paths of containers that contain the inference code and model artifacts. The instance types that the algorithm supports for transform jobs and real-time endpoints used for inference. The input and output content formats that the algorithm supports for inference."
                ValidationSpecification:
                  $ref: "#/components/schemas/AlgorithmValidationSpecification"
                  description: Specifies configurations for one or more training jobs and that SageMaker runs to test the algorithm's training code and, optionally, one or more batch transform jobs that SageMaker runs to test the algorithm's inference code.
                CertifyForMarketplace:
                  $ref: "#/components/schemas/CertifyForMarketplace"
                  description: Whether to certify the algorithm so that it can be listed in Amazon Web Services Marketplace.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key-value pairs. You can use tags to categorize your Amazon Web Services resources in different ways, for example, by purpose, owner, or environment. For more information, see Tagging Amazon Web Services Resources.
              required:
                - AlgorithmName
                - TrainingSpecification
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAlgorithmOutput"
  /CreateApp:
    post:
      operationId: CreateApp
      description: Creates a running app for the specified UserProfile. This operation is automatically invoked by Amazon SageMaker AI upon access to the associated Domain, and when new kernel configurations are selected by the user. A user may have multiple Apps active simultaneously.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.CreateApp
            default: SageMaker.CreateApp
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainId:
                  $ref: "#/components/schemas/DomainId"
                  description: The domain ID.
                UserProfileName:
                  $ref: "#/components/schemas/UserProfileName"
                  description: The user profile name. If this value is not set, then SpaceName must be set.
                SpaceName:
                  $ref: "#/components/schemas/SpaceName"
                  description: The name of the space. If this value is not set, then UserProfileName must be set.
                AppType:
                  $ref: "#/components/schemas/AppType"
                  description: The type of app.
                AppName:
                  $ref: "#/components/schemas/AppName"
                  description: The name of the app.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Each tag consists of a key and an optional value. Tag keys must be unique per resource.
                ResourceSpec:
                  $ref: "#/components/schemas/ResourceSpec"
                  description: The instance type and the Amazon Resource Name (ARN) of the SageMaker AI image created on the instance. The value of InstanceType passed as part of the ResourceSpec in the CreateApp call overrides the value passed as part of the ResourceSpec configured for the user profile or the domain. If InstanceType is not specified in any of those three ResourceSpec values for a KernelGateway app, the CreateApp call fails with a request validation error.
                RecoveryMode:
                  $ref: "#/components/schemas/Boolean"
                  description: Indicates whether the application is launched in recovery mode.
              required:
                - DomainId
                - AppType
                - AppName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAppResponse"
  /CreateAppImageConfig:
    post:
      operationId: CreateAppImageConfig
      description: Creates a configuration for running a SageMaker AI image as a KernelGateway app. The configuration specifies the Amazon Elastic File System storage volume on the image, and a list of the kernels in the image.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
