      description: Information about the Capacity Reservation used by an instance or instance group.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Capacity Reservation.
        Type:
          $ref: "#/components/schemas/CapacityReservationType"
          description: The type of Capacity Reservation. Valid values are ODCR (On-Demand Capacity Reservation) or CRG (Capacity Reservation Group).
    CapacityReservationType:
      type: string
      enum:
        - ODCR
        - CRG
    InstanceGroupScalingMetadata:
      description: Metadata information about scaling operations for an instance group.
      type: object
      properties:
        InstanceCount:
          $ref: "#/components/schemas/InstanceCount"
          description: The current number of instances in the group.
        TargetCount:
          $ref: "#/components/schemas/TargetCount"
          description: The desired number of instances for the group after scaling.
        MinCount:
          $ref: "#/components/schemas/InstanceCount"
          description: Minimum instance count of the instance group.
        FailureMessage:
          $ref: "#/components/schemas/String"
          description: An error message describing why the scaling operation failed, if applicable.
    TargetCount:
      type: integer
      minimum: 0
    InstanceMetadata:
      description: Metadata information about an instance in a HyperPod cluster.
      type: object
      properties:
        CustomerEni:
          $ref: "#/components/schemas/String"
          description: The ID of the customer-managed Elastic Network Interface (ENI) associated with the instance.
        AdditionalEnis:
          $ref: "#/components/schemas/AdditionalEnis"
          description: Information about additional Elastic Network Interfaces (ENIs) associated with the instance.
        InstanceRequirementsEniConfigurations:
          $ref: "#/components/schemas/InstanceRequirementsEniConfigurations"
          description: The ENI configurations for the instance types in the instance requirements, grouped by network interface category (for example, ENI-only or EFA with ENIs). At most one configuration per category.
        CapacityReservation:
          $ref: "#/components/schemas/CapacityReservation"
          description: Information about the Capacity Reservation used by the instance.
        FailureMessage:
          $ref: "#/components/schemas/String"
          description: An error message describing why the instance creation or update failed, if applicable.
        LcsExecutionState:
          $ref: "#/components/schemas/String"
          description: The execution state of the Lifecycle Script (LCS) for the instance.
        NodeLogicalId:
          $ref: "#/components/schemas/ClusterNodeLogicalId"
          description: The unique logical identifier of the node within the cluster. The ID used here is the same object as in the BatchAddClusterNodes API.
    AdditionalEnis:
      description: Information about additional Elastic Network Interfaces (ENIs) associated with an instance.
      type: object
      properties:
        EfaEnis:
          $ref: "#/components/schemas/EfaEnis"
          description: A list of Elastic Fabric Adapter (EFA) ENIs associated with the instance.
    EfaEnis:
      type: array
      items:
        $ref: "#/components/schemas/String"
    InstanceRequirementsEniConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/InstanceRequirementsEniConfiguration"
    InstanceRequirementsEniConfiguration:
      description: The customer ENI and additional ENIs associated with a network interface category.
      type: object
      properties:
        CustomerEni:
          $ref: "#/components/schemas/String"
          description: The ID of the customer-managed Elastic Network Interface (ENI) associated with the instance type category.
        AdditionalEnis:
          $ref: "#/components/schemas/AdditionalEnis"
          description: Information about additional Elastic Network Interfaces (ENIs) associated with the instance type category.
    ClusterEventLevel:
      description: The severity level for a HyperPod cluster event.
      type: string
      enum:
        - Info
        - Warn
        - Error
    DescribeClusterNodeResponse:
      type: object
      properties:
        NodeDetails:
          $ref: "#/components/schemas/ClusterNodeDetails"
          description: The details of the SageMaker HyperPod cluster node.
      required:
        - NodeDetails
    ClusterNodeDetails:
      description: Details of an instance (also called a node interchangeably) in a SageMaker HyperPod cluster.
      type: object
      properties:
        InstanceGroupName:
          $ref: "#/components/schemas/ClusterInstanceGroupName"
          description: The instance group name in which the instance is.
        InstanceId:
          $ref: "#/components/schemas/String"
          description: The ID of the instance.
        NodeLogicalId:
          $ref: "#/components/schemas/ClusterNodeLogicalId"
          description: A unique identifier for the node that persists throughout its lifecycle, from provisioning request to termination. This identifier can be used to track the node even before it has an assigned InstanceId.
        InstanceStatus:
          $ref: "#/components/schemas/ClusterInstanceStatusDetails"
          description: The status of the instance.
        InstanceType:
          $ref: "#/components/schemas/ClusterInstanceType"
          description: The type of the instance.
        LaunchTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the instance is launched.
        LastSoftwareUpdateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the cluster was last updated.
        LifeCycleConfig:
          $ref: "#/components/schemas/ClusterLifeCycleConfig"
          description: The LifeCycle configuration applied to the instance.
        OverrideVpcConfig:
          $ref: "#/components/schemas/VpcConfig"
          description: The customized Amazon VPC configuration at the instance group level that overrides the default Amazon VPC configuration of the SageMaker HyperPod cluster.
        ThreadsPerCore:
          $ref: "#/components/schemas/ClusterThreadsPerCore"
          description: The number of threads per CPU core you specified under CreateCluster.
        InstanceStorageConfigs:
          $ref: "#/components/schemas/ClusterInstanceStorageConfigs"
          description: The configurations of additional storage specified to the instance group where the instance (node) is launched.
        PrivatePrimaryIp:
          $ref: "#/components/schemas/ClusterPrivatePrimaryIp"
          description: The private primary IP address of the SageMaker HyperPod cluster node.
        PrivatePrimaryIpv6:
          $ref: "#/components/schemas/ClusterPrivatePrimaryIpv6"
          description: The private primary IPv6 address of the SageMaker HyperPod cluster node when configured with an Amazon VPC that supports IPv6 and includes subnets with IPv6 addressing enabled in either the cluster Amazon VPC configuration or the instance group Amazon VPC configuration.
        PrivateDnsHostname:
          $ref: "#/components/schemas/ClusterPrivateDnsHostname"
          description: The private DNS hostname of the SageMaker HyperPod cluster node.
        Placement:
          $ref: "#/components/schemas/ClusterInstancePlacement"
          description: The placement details of the SageMaker HyperPod cluster node.
        CurrentImageId:
          $ref: "#/components/schemas/ImageId"
          description: The ID of the Amazon Machine Image (AMI) currently in use by the node.
        DesiredImageId:
          $ref: "#/components/schemas/ImageId"
          description: The ID of the Amazon Machine Image (AMI) desired for the node.
        ImageVersionStatus:
          $ref: "#/components/schemas/ClusterImageVersionStatus"
          description: The status of the image version for the cluster node.
        UltraServerInfo:
          $ref: "#/components/schemas/UltraServerInfo"
          description: Contains information about the UltraServer.
        KubernetesConfig:
          $ref: "#/components/schemas/ClusterKubernetesConfigNodeDetails"
          description: The Kubernetes configuration applied to this node, showing both the current and desired state of labels and taints. The cluster works to reconcile the actual state with the declared state.
        CapacityType:
          $ref: "#/components/schemas/ClusterCapacityType"
          description: The capacity type of the node. Valid values are OnDemand and Spot. When set to OnDemand, the node is launched as an On-Demand instance. When set to Spot, the node is launched as a Spot instance.
        NetworkInterface:
          $ref: "#/components/schemas/ClusterNetworkInterfaceDetails"
          description: The network interface configuration for the cluster node.
    ClusterInstanceStatusDetails:
      description: Details of an instance in a SageMaker HyperPod cluster.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/ClusterInstanceStatus"
          description: The status of an instance in a SageMaker HyperPod cluster.
        Message:
          $ref: "#/components/schemas/String"
          description: The message from an instance in a SageMaker HyperPod cluster.
      required:
        - Status
    ClusterPrivatePrimaryIp:
      type: string
      pattern: ((25[0-5]|(2[0-4]|1\d|[1-9]|)\d)\.?\b){4}
    ClusterPrivatePrimaryIpv6:
      type: string
    ClusterPrivateDnsHostname:
      type: string
      pattern: ip-((25[0-5]|(2[0-4]|1\d|[1-9]|)\d)-?\b){4}\..*
    ClusterInstancePlacement:
      description: Specifies the placement details for the node in the SageMaker HyperPod cluster, including the Availability Zone and the unique identifier (ID) of the Availability Zone.
      type: object
      properties:
        AvailabilityZone:
          $ref: "#/components/schemas/ClusterAvailabilityZone"
          description: The Availability Zone where the node in the SageMaker HyperPod cluster is launched.
        AvailabilityZoneId:
          $ref: "#/components/schemas/ClusterAvailabilityZoneId"
          description: The unique identifier (ID) of the Availability Zone where the node in the SageMaker HyperPod cluster is launched.
    ClusterAvailabilityZoneId:
      type: string
      pattern: "[a-z]{3}\\d-az\\d"
    UltraServerInfo:
      description: Contains information about the UltraServer object.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the UltraServer.
        Type:
          $ref: "#/components/schemas/String"
          description: The type of the UltraServer.
    ClusterKubernetesConfigNodeDetails:
      description: Node-specific Kubernetes configuration showing both current and desired state of labels and taints for an individual cluster node.
      type: object
      properties:
        CurrentLabels:
          type: object
          properties: {}
          description: The current labels applied to the cluster node.
        DesiredLabels:
          type: object
          properties: {}
          description: The desired labels to be applied to the cluster node.
        CurrentTaints:
          $ref: "#/components/schemas/ClusterKubernetesTaints"
          description: The current taints applied to the cluster node.
        DesiredTaints:
          $ref: "#/components/schemas/ClusterKubernetesTaints"
          description: The desired taints to be applied to the cluster node.
    ClusterCapacityType:
      type: string
      enum:
        - Spot
        - OnDemand
    DescribeClusterSchedulerConfigResponse:
      type: object
      properties:
        ClusterSchedulerConfigArn:
          $ref: "#/components/schemas/ClusterSchedulerConfigArn"
          description: ARN of the cluster policy.
        ClusterSchedulerConfigId:
          $ref: "#/components/schemas/ClusterSchedulerConfigId"
          description: ID of the cluster policy.
        Name:
          $ref: "#/components/schemas/EntityName"
          description: Name of the cluster policy.
        ClusterSchedulerConfigVersion:
          $ref: "#/components/schemas/Integer"
          description: Version of the cluster policy.
        Status:
          $ref: "#/components/schemas/SchedulerResourceStatus"
          description: Status of the cluster policy.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: Failure reason of the cluster policy.
        StatusDetails:
          type: object
          properties: {}
          description: Additional details about the status of the cluster policy. This field provides context when the policy is in a non-active state, such as during creation, updates, or if failures occur.
        ClusterArn:
          $ref: "#/components/schemas/ClusterArn"
          description: ARN of the cluster where the cluster policy is applied.
        SchedulerConfig:
          $ref: "#/components/schemas/SchedulerConfig"
          description: Cluster policy configuration. This policy is used for task prioritization and fair-share allocation. This helps prioritize critical workloads and distributes idle compute across entities.
        Description:
          $ref: "#/components/schemas/EntityDescription"
          description: Description of the cluster policy.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: Creation time of the cluster policy.
        CreatedBy:
          $ref: "#/components/schemas/UserContext"
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: Last modified time of the cluster policy.
        LastModifiedBy:
          $ref: "#/components/schemas/UserContext"
      required:
        - ClusterSchedulerConfigArn
        - ClusterSchedulerConfigId
        - Name
        - ClusterSchedulerConfigVersion
        - Status
        - CreationTime
    SchedulerResourceStatus:
      type: string
      enum:
        - Creating
        - CreateFailed
        - CreateRollbackFailed
        - Created
        - Updating
        - UpdateFailed
        - UpdateRollbackFailed
        - Updated
        - Deleting
        - DeleteFailed
        - DeleteRollbackFailed
        - Deleted
    DescribeCodeRepositoryOutput:
      type: object
      properties:
        CodeRepositoryName:
          $ref: "#/components/schemas/EntityName"
          description: The name of the Git repository.
        CodeRepositoryArn:
          $ref: "#/components/schemas/CodeRepositoryArn"
          description: The Amazon Resource Name (ARN) of the Git repository.
        CreationTime:
          $ref: "#/components/schemas/CreationTime"
          description: The date and time that the repository was created.
        LastModifiedTime:
          $ref: "#/components/schemas/LastModifiedTime"
          description: The date and time that the repository was last changed.
        GitConfig:
          $ref: "#/components/schemas/GitConfig"
          description: Configuration details about the repository, including the URL where the repository is located, the default branch, and the Amazon Resource Name (ARN) of the Amazon Web Services Secrets Manager secret that contains the credentials used to access the repository.
      required:
        - CodeRepositoryName
        - CodeRepositoryArn
        - CreationTime
        - LastModifiedTime
    LastModifiedTime:
      type: string
      format: date-time
    DescribeCompilationJobResponse:
      type: object
      properties:
        CompilationJobName:
          $ref: "#/components/schemas/EntityName"
          description: The name of the model compilation job.
        CompilationJobArn:
          $ref: "#/components/schemas/CompilationJobArn"
          description: The Amazon Resource Name (ARN) of the model compilation job.
        CompilationJobStatus:
          $ref: "#/components/schemas/CompilationJobStatus"
          description: The status of the model compilation job.
        CompilationStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the model compilation job started the CompilationJob instances. You are billed for the time between this timestamp and the timestamp in the CompilationEndTime field. In Amazon CloudWatch Logs, the start time might be later than this time. That's because it takes time to download the compilation job, which depends on the size of the compilation job container.
        CompilationEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the model compilation job on a compilation job instance ended. For a successful or stopped job, this is when the job's model artifacts have finished uploading. For a failed job, this is when Amazon SageMaker AI detected that the job failed.
        StoppingCondition:
          $ref: "#/components/schemas/StoppingCondition"
          description: Specifies a limit to how long a model compilation job can run. When the job reaches the time limit, Amazon SageMaker AI ends the compilation job. Use this API to cap model training costs.
        InferenceImage:
          $ref: "#/components/schemas/InferenceImage"
          description: The inference image to use when compiling a model. Specify an image only if the target device is a cloud instance.
        ModelPackageVersionArn:
          $ref: "#/components/schemas/ModelPackageArn"
          description: The Amazon Resource Name (ARN) of the versioned model package that was provided to SageMaker Neo when you initiated a compilation job.
        CreationTime:
          $ref: "#/components/schemas/CreationTime"
          description: The time that the model compilation job was created.
        LastModifiedTime:
          $ref: "#/components/schemas/LastModifiedTime"
          description: The time that the status of the model compilation job was last modified.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: If a model compilation job failed, the reason it failed.
        ModelArtifacts:
          $ref: "#/components/schemas/ModelArtifacts"
          description: Information about the location in Amazon S3 that has been configured for storing the model artifacts used in the compilation job.
        ModelDigests:
          $ref: "#/components/schemas/ModelDigests"
          description: Provides a BLAKE2 hash value that identifies the compiled model artifacts in Amazon S3.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of an IAM role that Amazon SageMaker AI assumes to perform the model compilation job.
        InputConfig:
          $ref: "#/components/schemas/InputConfig"
          description: Information about the location in Amazon S3 of the input model artifacts, the name and shape of the expected data inputs, and the framework in which the model was trained.
        OutputConfig:
          $ref: "#/components/schemas/OutputConfig"
          description: Information about the output location for the compiled model and the target device that the model runs on.
        VpcConfig:
          $ref: "#/components/schemas/NeoVpcConfig"
          description: A VpcConfig object that specifies the VPC that you want your compilation job to connect to. Control access to your models by configuring the VPC. For more information, see Protect Compilation Jobs by Using an Amazon Virtual Private Cloud.
        DerivedInformation:
          $ref: "#/components/schemas/DerivedInformation"
          description: Information that SageMaker Neo automatically derived about the model.
      required:
        - CompilationJobName
        - CompilationJobArn
        - CompilationJobStatus
        - StoppingCondition
        - CreationTime
        - LastModifiedTime
        - FailureReason
        - ModelArtifacts
        - RoleArn
        - InputConfig
        - OutputConfig
    CompilationJobStatus:
      type: string
      enum:
        - INPROGRESS
        - COMPLETED
        - FAILED
        - STARTING
        - STOPPING
        - STOPPED
    InferenceImage:
      type: string
      minLength: 0
      maxLength: 256
    ModelArtifacts:
      description: Provides information about the location that is configured for storing model artifacts. Model artifacts are outputs that result from training a model. They typically consist of trained parameters, a model definition that describes how to compute inferences, and other metadata. A SageMaker container stores your trained model artifacts in the /opt/ml/model directory. After training has completed, by default, these artifacts are uploaded to your Amazon S3 bucket as compressed files.
      type: object
      properties:
        S3ModelArtifacts:
          $ref: "#/components/schemas/S3Uri"
          description: The path of the S3 object that contains the model artifacts. For example, s3://bucket-name/keynameprefix/model.tar.gz.
      required:
        - S3ModelArtifacts
    ModelDigests:
      description: Provides information to verify the integrity of stored model artifacts.
      type: object
      properties:
        ArtifactDigest:
          $ref: "#/components/schemas/ArtifactDigest"
          description: Provides a hash value that uniquely identifies the stored model artifacts.
    ArtifactDigest:
      type: string
      pattern: "[\\w:]+"
    DerivedInformation:
      description: Information that SageMaker Neo automatically derived about the model.
      type: object
      properties:
        DerivedDataInputConfig:
          $ref: "#/components/schemas/DataInputConfig"
          description: The data input configuration that SageMaker Neo automatically derived for the model. When SageMaker Neo derives this information, you don't need to specify the data input configuration when you create a compilation job.
    DescribeComputeQuotaResponse:
      type: object
      properties:
        ComputeQuotaArn:
          $ref: "#/components/schemas/ComputeQuotaArn"
          description: ARN of the compute allocation definition.
        ComputeQuotaId:
          $ref: "#/components/schemas/ComputeQuotaId"
          description: ID of the compute allocation definition.
        Name:
          $ref: "#/components/schemas/EntityName"
          description: Name of the compute allocation definition.
        Description:
          $ref: "#/components/schemas/EntityDescription"
          description: Description of the compute allocation definition.
        ComputeQuotaVersion:
          $ref: "#/components/schemas/Integer"
          description: Version of the compute allocation definition.
        Status:
          $ref: "#/components/schemas/SchedulerResourceStatus"
          description: Status of the compute allocation definition.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: Failure reason of the compute allocation definition.
        ClusterArn:
          $ref: "#/components/schemas/ClusterArn"
          description: ARN of the cluster.
        ComputeQuotaConfig:
          $ref: "#/components/schemas/ComputeQuotaConfig"
          description: Configuration of the compute allocation definition. This includes the resource sharing option, and the setting to preempt low priority tasks.
        ComputeQuotaTarget:
          $ref: "#/components/schemas/ComputeQuotaTarget"
          description: The target entity to allocate compute resources to.
        ActivationState:
          $ref: "#/components/schemas/ActivationState"
          description: The state of the compute allocation being described. Use to enable or disable compute allocation. Default is Enabled.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: Creation time of the compute allocation configuration.
        CreatedBy:
          $ref: "#/components/schemas/UserContext"
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: Last modified time of the compute allocation configuration.
        LastModifiedBy:
          $ref: "#/components/schemas/UserContext"
      required:
        - ComputeQuotaArn
        - ComputeQuotaId
        - Name
        - ComputeQuotaVersion
        - Status
        - ComputeQuotaTarget
        - CreationTime
    ContextNameOrArn:
      type: string
      minLength: 1
      maxLength: 256
      pattern: (arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:context\/)?([a-zA-Z0-9]([-_]*[a-zA-Z0-9]){0,119})
    DescribeContextResponse:
      type: object
      properties:
        ContextName:
          $ref: "#/components/schemas/ContextName"
          description: The name of the context.
        ContextArn:
          $ref: "#/components/schemas/ContextArn"
          description: The Amazon Resource Name (ARN) of the context.
        Source:
          $ref: "#/components/schemas/ContextSource"
          description: The source of the context.
        ContextType:
          $ref: "#/components/schemas/String256"
          description: The type of the context.
        Description:
          $ref: "#/components/schemas/ExperimentDescription"
          description: The description of the context.
        Properties:
          type: object
          properties: {}
          description: A list of the context's properties.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the context was created.
        CreatedBy:
          $ref: "#/components/schemas/UserContext"
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the context was last modified.
        LastModifiedBy:
          $ref: "#/components/schemas/UserContext"
        LineageGroupArn:
          $ref: "#/components/schemas/LineageGroupArn"
          description: The Amazon Resource Name (ARN) of the lineage group.
    DescribeDataQualityJobDefinitionResponse:
      type: object
      properties:
        JobDefinitionArn:
          $ref: "#/components/schemas/MonitoringJobDefinitionArn"
          description: The Amazon Resource Name (ARN) of the data quality monitoring job definition.
        JobDefinitionName:
          $ref: "#/components/schemas/MonitoringJobDefinitionName"
          description: The name of the data quality monitoring job definition.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the data quality monitoring job definition was created.
        DataQualityBaselineConfig:
          $ref: "#/components/schemas/DataQualityBaselineConfig"
          description: The constraints and baselines for the data quality monitoring job definition.
        DataQualityAppSpecification:
          $ref: "#/components/schemas/DataQualityAppSpecification"
          description: Information about the container that runs the data quality monitoring job.
        DataQualityJobInput:
          $ref: "#/components/schemas/DataQualityJobInput"
          description: The list of inputs for the data quality monitoring job. Currently endpoints are supported.
        DataQualityJobOutputConfig:
          $ref: "#/components/schemas/MonitoringOutputConfig"
        JobResources:
          $ref: "#/components/schemas/MonitoringResources"
        NetworkConfig:
          $ref: "#/components/schemas/MonitoringNetworkConfig"
          description: The networking configuration for the data quality monitoring job.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of an IAM role that Amazon SageMaker AI can assume to perform tasks on your behalf.
        StoppingCondition:
          $ref: "#/components/schemas/MonitoringStoppingCondition"
      required:
        - JobDefinitionArn
        - JobDefinitionName
        - CreationTime
        - DataQualityAppSpecification
        - DataQualityJobInput
        - DataQualityJobOutputConfig
        - JobResources
        - RoleArn
    DescribeDeviceResponse:
      type: object
      properties:
        DeviceArn:
          $ref: "#/components/schemas/DeviceArn"
          description: The Amazon Resource Name (ARN) of the device.
        DeviceName:
          $ref: "#/components/schemas/EntityName"
          description: The unique identifier of the device.
        Description:
          $ref: "#/components/schemas/DeviceDescription"
          description: A description of the device.
        DeviceFleetName:
          $ref: "#/components/schemas/EntityName"
          description: The name of the fleet the device belongs to.
        IotThingName:
          $ref: "#/components/schemas/ThingName"
          description: The Amazon Web Services Internet of Things (IoT) object thing name associated with the device.
        RegistrationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of the last registration or de-reregistration.
        LatestHeartbeat:
          $ref: "#/components/schemas/Timestamp"
          description: The last heartbeat received from the device.
        Models:
          $ref: "#/components/schemas/EdgeModels"
