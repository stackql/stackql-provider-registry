          description: A value indicating whether the update made to the feature group was successful.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: "The reason that the FeatureGroup failed to be replicated in the OfflineStore. This is failure can occur because: The FeatureGroup could not be created in the OfflineStore. The FeatureGroup could not be deleted from the OfflineStore."
        Description:
          $ref: "#/components/schemas/Description"
