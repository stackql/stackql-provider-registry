    BatchAddClusterNodesResponse:
      type: object
      properties:
        Successful:
          $ref: "#/components/schemas/NodeAdditionResultList"
          description: A list of NodeLogicalIDs that were successfully added to the cluster. The NodeLogicalID is unique per cluster and does not change between instance replacements. Each entry includes a NodeLogicalId that can be used to track the node's provisioning status (with DescribeClusterNode), the instance group name, and the current status of the node.
        Failed:
          $ref: "#/components/schemas/BatchAddClusterNodesErrorList"
          description: A list of errors that occurred during the node addition operation. Each entry includes the instance group name, error code, number of failed additions, and an error message.
      required:
        - Successful
        - Failed
    NodeAdditionResultList:
      type: array
      items:
        $ref: "#/components/schemas/NodeAdditionResult"
    NodeAdditionResult:
      description: Information about a node that was successfully added to the cluster.
      type: object
      properties:
        NodeLogicalId:
          $ref: "#/components/schemas/ClusterNodeLogicalId"
          description: A unique identifier assigned to the node that can be used to track its provisioning status through the DescribeClusterNode operation.
        InstanceGroupName:
          $ref: "#/components/schemas/ClusterInstanceGroupName"
          description: The name of the instance group to which the node was added.
        Status:
          $ref: "#/components/schemas/ClusterInstanceStatus"
          description: The current status of the node. Possible values include Pending, Running, Failed, ShuttingDown, SystemUpdating, DeepHealthCheckInProgress, and NotFound.
        AvailabilityZones:
          $ref: "#/components/schemas/ClusterAvailabilityZones"
          description: The availability zones associated with the successfully added node.
        InstanceTypes:
          $ref: "#/components/schemas/ClusterInstanceTypes"
          description: The instance types associated with the successfully added node.
      required:
        - NodeLogicalId
        - InstanceGroupName
        - Status
    ClusterNodeLogicalId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9][a-zA-Z0-9\\-]*[a-zA-Z0-9]"
    ClusterInstanceStatus:
      type: string
      enum:
        - Running
        - Failure
        - Pending
        - ShuttingDown
        - SystemUpdating
        - DeepHealthCheckInProgress
        - NotFound
    BatchAddClusterNodesErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchAddClusterNodesError"
    BatchAddClusterNodesError:
      description: Information about an error that occurred during the node addition operation.
      type: object
      properties:
        InstanceGroupName:
          $ref: "#/components/schemas/InstanceGroupName"
          description: The name of the instance group for which the error occurred.
        ErrorCode:
          $ref: "#/components/schemas/BatchAddClusterNodesErrorCode"
          description: The error code associated with the failure. Possible values include InstanceGroupNotFound and InvalidInstanceGroupState.
