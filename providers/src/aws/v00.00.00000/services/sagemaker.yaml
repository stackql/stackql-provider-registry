        SecurityGroupIds:
          $ref: "#/components/schemas/WorkforceSecurityGroupIds"
          description: The VPC security group IDs, in the form sg-xxxxxxxx. The security groups must be for the same VPC as specified in the subnet.
        Subnets:
          $ref: "#/components/schemas/WorkforceSubnets"
          description: The ID of the subnets in the VPC that you want to connect.
    WorkforceVpcId:
      type: string
      minLength: 0
      maxLength: 32
      pattern: vpc-[0-9a-z]*
    WorkforceSecurityGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/WorkforceSecurityGroupId"
    WorkforceSecurityGroupId:
      type: string
      minLength: 0
      maxLength: 32
      pattern: sg-[0-9a-z]*
    WorkforceSubnets:
      type: array
      items:
        $ref: "#/components/schemas/WorkforceSubnetId"
