    DescribeLabelingJobResponse:
      type: object
      properties:
        LabelingJobStatus:
          $ref: "#/components/schemas/LabelingJobStatus"
          description: The processing status of the labeling job.
        LabelCounters:
          $ref: "#/components/schemas/LabelCounters"
