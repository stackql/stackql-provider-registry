                  description: The name of the SageMaker hub that contains the hub content you want to update. You can optionally use the hub ARN instead.
                HubContentName:
                  $ref: "#/components/schemas/HubContentName"
                  description: The name of the hub content resource that you want to update.
                HubContentType:
                  $ref: "#/components/schemas/HubContentType"
                  description: The content type of the resource that you want to update. Only specify a ModelReference resource for this API. To update a Model or Notebook resource, use the UpdateHubContent API instead.
                MinVersion:
