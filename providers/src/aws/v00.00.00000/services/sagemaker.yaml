                  description: A list of aliases created with the image version.
                VendorGuidance:
                  $ref: "#/components/schemas/VendorGuidance"
                  description: "The stability of the image version, specified by the maintainer. NOT_PROVIDED: The maintainers did not provide a status for image version stability. STABLE: The image version is stable. TO_BE_ARCHIVED: The image version is set to be archived. Custom image versions that are set to be archived are automatically archived after three months. ARCHIVED: The image version is archived. Archived image versions are not searchable and are no longer actively supported."
                JobType:
                  $ref: "#/components/schemas/JobType"
                  description: "Indicates SageMaker AI job type compatibility. TRAINING: The image version is compatible with SageMaker AI training jobs. INFERENCE: The image version is compatible with SageMaker AI inference jobs. NOTEBOOK_KERNEL: The image version is compatible with SageMaker AI notebook kernels."
                MLFramework:
                  $ref: "#/components/schemas/MLFramework"
                  description: The machine learning framework vended in the image version.
                ProgrammingLang:
