      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTrainingJobResponse"
  /UpdateTrial:
    post:
      operationId: UpdateTrial
      description: Updates the display name of a trial.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.UpdateTrial
            default: SageMaker.UpdateTrial
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TrialName:
                  $ref: "#/components/schemas/ExperimentEntityName"
                  description: The name of the trial to update.
                DisplayName:
                  $ref: "#/components/schemas/ExperimentEntityName"
                  description: The name of the trial as displayed. The name doesn't need to be unique. If DisplayName isn't specified, TrialName is displayed.
              required:
                - TrialName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTrialResponse"
  /UpdateTrialComponent:
    post:
      operationId: UpdateTrialComponent
      description: Updates one or more properties of a trial component.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SageMaker.UpdateTrialComponent
            default: SageMaker.UpdateTrialComponent
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TrialComponentName:
                  $ref: "#/components/schemas/ExperimentEntityName"
                  description: The name of the component to update.
                DisplayName:
                  $ref: "#/components/schemas/ExperimentEntityName"
                  description: The name of the component as displayed. The name doesn't need to be unique. If DisplayName isn't specified, TrialComponentName is displayed.
                Status:
                  $ref: "#/components/schemas/TrialComponentStatus"
                  description: The new status of the component.
                StartTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: When the component started.
                EndTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: When the component ended.
                Parameters:
                  $ref: "#/components/schemas/TrialComponentParameters"
                  description: Replaces all of the component's hyperparameters with the specified hyperparameters or add new hyperparameters. Existing hyperparameters are replaced if the trial component is updated with an identical hyperparameter key.
                ParametersToRemove:
                  $ref: "#/components/schemas/ListTrialComponentKey256"
                  description: The hyperparameters to remove from the component.
                InputArtifacts:
                  $ref: "#/components/schemas/TrialComponentArtifacts"
                  description: Replaces all of the component's input artifacts with the specified artifacts or adds new input artifacts. Existing input artifacts are replaced if the trial component is updated with an identical input artifact key.
                InputArtifactsToRemove:
                  $ref: "#/components/schemas/ListTrialComponentKey256"
                  description: The input artifacts to remove from the component.
                OutputArtifacts:
                  $ref: "#/components/schemas/TrialComponentArtifacts"
                  description: Replaces all of the component's output artifacts with the specified artifacts or adds new output artifacts. Existing output artifacts are replaced if the trial component is updated with an identical output artifact key.
                OutputArtifactsToRemove:
                  $ref: "#/components/schemas/ListTrialComponentKey256"
                  description: The output artifacts to remove from the component.
              required:
                - TrialComponentName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTrialComponentResponse"
  /UpdateUserProfile:
