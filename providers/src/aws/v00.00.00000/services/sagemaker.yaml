                EndpointName:
                  $ref: "#/components/schemas/EndpointName"
                  description: The name of an existing endpoint where you host the inference component.
                VariantName:
                  $ref: "#/components/schemas/VariantName"
                  description: The name of an existing production variant where you host the inference component.
                Specification:
                  $ref: "#/components/schemas/InferenceComponentSpecification"
                  description: Details about the resources to deploy with this inference component, including the model, container, and compute resources.
                Specifications:
                  $ref: "#/components/schemas/InferenceComponentSpecificationList"
                  description: A list of specification objects for the inference component, one per instance type. Use this parameter when you want to deploy a different model or resource configuration for the inference component on each instance type. You can use either this parameter or the singular Specification parameter, but not both.
                RuntimeConfig:
                  $ref: "#/components/schemas/InferenceComponentRuntimeConfig"
