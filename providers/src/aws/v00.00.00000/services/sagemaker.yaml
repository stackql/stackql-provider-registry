    MonitoringNetworkConfig:
      description: The networking configuration for the monitoring job.
      type: object
      properties:
        EnableInterContainerTrafficEncryption:
          $ref: "#/components/schemas/Boolean"
          description: Whether to encrypt all communications between the instances used for the monitoring jobs. Choose True to encrypt communications. Encryption provides greater security for distributed jobs, but the processing might take longer.
        EnableNetworkIsolation:
          $ref: "#/components/schemas/Boolean"
          description: Whether to allow inbound and outbound network calls to and from the containers used for the monitoring job.
        VpcConfig:
          $ref: "#/components/schemas/VpcConfig"
    MonitoringStoppingCondition:
      description: A time limit for how long the monitoring job is allowed to run before stopping.
      type: object
      properties:
        MaxRuntimeInSeconds:
          $ref: "#/components/schemas/MonitoringMaxRuntimeInSeconds"
          description: The maximum runtime allowed in seconds. The MaxRuntimeInSeconds cannot exceed the frequency of the job. For data quality and model explainability, this can be up to 3600 seconds for an hourly schedule. For model bias and model quality hourly schedules, this can be up to 1800 seconds.
      required:
        - MaxRuntimeInSeconds
    MonitoringMaxRuntimeInSeconds:
      type: integer
      minimum: 1
      maximum: 86400
    CreateDataQualityJobDefinitionResponse:
      type: object
      properties:
        JobDefinitionArn:
          $ref: "#/components/schemas/MonitoringJobDefinitionArn"
          description: The Amazon Resource Name (ARN) of the job definition.
      required:
        - JobDefinitionArn
    MonitoringJobDefinitionArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: .*
    DeviceFleetDescription:
      type: string
      minLength: 1
      maxLength: 800
      pattern: "[-a-zA-Z0-9_.,;:! ]*"
    EdgeOutputConfig:
      description: The output configuration.
      type: object
      properties:
        S3OutputLocation:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon Simple Storage (S3) bucker URI.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The Amazon Web Services Key Management Service (Amazon Web Services KMS) key that Amazon SageMaker uses to encrypt data on the storage volume after compilation job. If you don't provide a KMS key ID, Amazon SageMaker uses the default KMS key for Amazon S3 for your role's account.
        PresetDeploymentType:
          $ref: "#/components/schemas/EdgePresetDeploymentType"
          description: The deployment type SageMaker Edge Manager will create. Currently only supports Amazon Web Services IoT Greengrass Version 2 components.
        PresetDeploymentConfig:
          $ref: "#/components/schemas/String"
          description: 'The configuration used to create deployment artifacts. Specify configuration options with a JSON string. The available configuration options for each type are: ComponentName (optional) - Name of the GreenGrass V2 component. If not specified, the default name generated consists of "SagemakerEdgeManager" and the name of your SageMaker Edge Manager packaging job. ComponentDescription (optional) - Description of the component. ComponentVersion (optional) - The version of the component. Amazon Web Services IoT Greengrass uses semantic versions for components. Semantic versions follow a major.minor.patch number system. For example, version 1.0.0 represents the first major release for a component. For more information, see the semantic version specification. PlatformOS (optional) - The name of the operating system for the platform. Supported platforms include Windows and Linux. PlatformArchitecture (optional) - The processor architecture for the platform. Supported architectures Windows include: Windows32_x86, Windows64_x64. Supported architectures for Linux include: Linux x86_64, Linux ARMV8.'
      required:
        - S3OutputLocation
    EdgePresetDeploymentType:
      type: string
      enum:
        - GreengrassV2Component
    EnableIotRoleAlias:
      type: boolean
    DomainName:
      type: string
      minLength: 0
      maxLength: 63
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,62}"
    AuthMode:
      type: string
      enum:
        - SSO
        - IAM
    UserSettings:
      description: A collection of settings that apply to users in a domain. These settings are specified when the CreateUserProfile API is called, and as DefaultUserSettings when the CreateDomain API is called. SecurityGroups is aggregated when specified in both calls. For all other settings in UserSettings, the values specified in CreateUserProfile take precedence over those specified in CreateDomain.
      type: object
      properties:
        ExecutionRole:
          $ref: "#/components/schemas/RoleArn"
          description: The execution role for the user. SageMaker applies this setting only to private spaces that the user creates in the domain. SageMaker doesn't apply this setting to shared spaces.
        SecurityGroups:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: The security groups for the Amazon Virtual Private Cloud (VPC) that the domain uses for communication. Optional when the CreateDomain.AppNetworkAccessType parameter is set to PublicInternetOnly. Required when the CreateDomain.AppNetworkAccessType parameter is set to VpcOnly, unless specified as part of the DefaultUserSettings for the domain. Amazon SageMaker AI adds a security group to allow NFS traffic from Amazon SageMaker AI Studio. Therefore, the number of security groups that you can specify is one less than the maximum number shown. SageMaker applies these settings only to private spaces that the user creates in the domain. SageMaker doesn't apply these settings to shared spaces.
        SharingSettings:
          $ref: "#/components/schemas/SharingSettings"
          description: Specifies options for sharing Amazon SageMaker AI Studio notebooks.
        JupyterServerAppSettings:
          $ref: "#/components/schemas/JupyterServerAppSettings"
          description: The Jupyter server's app settings.
        KernelGatewayAppSettings:
          $ref: "#/components/schemas/KernelGatewayAppSettings"
          description: The kernel gateway app settings.
        TensorBoardAppSettings:
          $ref: "#/components/schemas/TensorBoardAppSettings"
          description: The TensorBoard app settings.
        RStudioServerProAppSettings:
          $ref: "#/components/schemas/RStudioServerProAppSettings"
          description: A collection of settings that configure user interaction with the RStudioServerPro app.
        RSessionAppSettings:
          $ref: "#/components/schemas/RSessionAppSettings"
          description: A collection of settings that configure the RSessionGateway app.
        CanvasAppSettings:
          $ref: "#/components/schemas/CanvasAppSettings"
          description: The Canvas app settings. SageMaker applies these settings only to private spaces that SageMaker creates for the Canvas app.
        CodeEditorAppSettings:
          $ref: "#/components/schemas/CodeEditorAppSettings"
          description: The Code Editor application settings. SageMaker applies these settings only to private spaces that the user creates in the domain. SageMaker doesn't apply these settings to shared spaces.
        JupyterLabAppSettings:
          $ref: "#/components/schemas/JupyterLabAppSettings"
          description: The settings for the JupyterLab application. SageMaker applies these settings only to private spaces that the user creates in the domain. SageMaker doesn't apply these settings to shared spaces.
        SpaceStorageSettings:
          $ref: "#/components/schemas/DefaultSpaceStorageSettings"
          description: The storage settings for a space. SageMaker applies these settings only to private spaces that the user creates in the domain. SageMaker doesn't apply these settings to shared spaces.
        DefaultLandingUri:
          $ref: "#/components/schemas/LandingUri"
          description: "The default experience that the user is directed to when accessing the domain. The supported values are: studio::: Indicates that Studio is the default experience. This value can only be passed if StudioWebPortal is set to ENABLED. app:JupyterServer:: Indicates that Studio Classic is the default experience."
        StudioWebPortal:
          $ref: "#/components/schemas/StudioWebPortal"
          description: Whether the user can access Studio. If this value is set to DISABLED, the user cannot access Studio, even if that is the default experience for the domain.
        CustomPosixUserConfig:
          $ref: "#/components/schemas/CustomPosixUserConfig"
          description: Details about the POSIX identity that is used for file system operations. SageMaker applies these settings only to private spaces that the user creates in the domain. SageMaker doesn't apply these settings to shared spaces.
        CustomFileSystemConfigs:
          $ref: "#/components/schemas/CustomFileSystemConfigs"
          description: The settings for assigning a custom file system to a user profile. Permitted users can access this file system in Amazon SageMaker AI Studio. SageMaker applies these settings only to private spaces that the user creates in the domain. SageMaker doesn't apply these settings to shared spaces.
        StudioWebPortalSettings:
          $ref: "#/components/schemas/StudioWebPortalSettings"
          description: Studio settings. If these settings are applied on a user level, they take priority over the settings applied on a domain level.
        AutoMountHomeEFS:
          $ref: "#/components/schemas/AutoMountHomeEFS"
          description: Indicates whether auto-mounting of an EFS volume is supported for the user profile. The DefaultAsDomain value is only supported for user profiles. Do not use the DefaultAsDomain value when setting this parameter for a domain. SageMaker applies this setting only to private spaces that the user creates in the domain. SageMaker doesn't apply this setting to shared spaces.
    SecurityGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SharingSettings:
      description: Specifies options for sharing Amazon SageMaker AI Studio notebooks. These settings are specified as part of DefaultUserSettings when the CreateDomain API is called, and as part of UserSettings when the CreateUserProfile API is called. When SharingSettings is not specified, notebook sharing isn't allowed.
      type: object
      properties:
        NotebookOutputOption:
          $ref: "#/components/schemas/NotebookOutputOption"
          description: Whether to include the notebook cell output when sharing the notebook. The default is Disabled.
        S3OutputPath:
          $ref: "#/components/schemas/S3Uri"
          description: When NotebookOutputOption is Allowed, the Amazon S3 bucket used to store the shared notebook snapshots.
        S3KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: When NotebookOutputOption is Allowed, the Amazon Web Services Key Management Service (KMS) encryption key ID used to encrypt the notebook cell output in the Amazon S3 bucket.
    NotebookOutputOption:
      type: string
      enum:
        - Allowed
        - Disabled
    JupyterServerAppSettings:
      description: The JupyterServer app settings.
      type: object
      properties:
        DefaultResourceSpec:
          $ref: "#/components/schemas/ResourceSpec"
          description: The default instance type and the Amazon Resource Name (ARN) of the default SageMaker AI image used by the JupyterServer app. If you use the LifecycleConfigArns parameter, then this parameter is also required.
        LifecycleConfigArns:
          $ref: "#/components/schemas/LifecycleConfigArns"
          description: The Amazon Resource Name (ARN) of the Lifecycle Configurations attached to the JupyterServerApp. If you use this parameter, the DefaultResourceSpec parameter is also required. To remove a Lifecycle Config, you must set LifecycleConfigArns to an empty list.
        CodeRepositories:
          $ref: "#/components/schemas/CodeRepositories"
          description: A list of Git repositories that SageMaker AI automatically displays to users for cloning in the JupyterServer application.
    LifecycleConfigArns:
      type: array
      items:
        $ref: "#/components/schemas/StudioLifecycleConfigArn"
    CodeRepositories:
      type: array
      items:
        $ref: "#/components/schemas/CodeRepository"
    CodeRepository:
      description: A Git repository that SageMaker AI automatically displays to users for cloning in the JupyterServer application.
      type: object
      properties:
        RepositoryUrl:
          $ref: "#/components/schemas/RepositoryUrl"
          description: The URL of the Git repository.
      required:
        - RepositoryUrl
    RepositoryUrl:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: https://([.\-_a-zA-Z0-9]+/?){3,1016}
    KernelGatewayAppSettings:
      description: The KernelGateway app settings.
      type: object
      properties:
        DefaultResourceSpec:
          $ref: "#/components/schemas/ResourceSpec"
          description: The default instance type and the Amazon Resource Name (ARN) of the default SageMaker AI image used by the KernelGateway app. The Amazon SageMaker AI Studio UI does not use the default instance type value set here. The default instance type set here is used when Apps are created using the CLI or CloudFormation and the instance type parameter value is not passed.
        CustomImages:
          $ref: "#/components/schemas/CustomImages"
          description: "A list of custom SageMaker AI images that are configured to run as a KernelGateway app. The maximum number of custom images are as follows. On a domain level: 200 On a space level: 5 On a user profile level: 5"
        LifecycleConfigArns:
          $ref: "#/components/schemas/LifecycleConfigArns"
          description: The Amazon Resource Name (ARN) of the Lifecycle Configurations attached to the the user profile or domain. To remove a Lifecycle Config, you must set LifecycleConfigArns to an empty list.
    CustomImages:
      type: array
      items:
        $ref: "#/components/schemas/CustomImage"
    CustomImage:
      description: A custom SageMaker AI image. For more information, see Bring your own SageMaker AI image.
      type: object
      properties:
        ImageName:
          $ref: "#/components/schemas/ImageName"
          description: The name of the CustomImage. Must be unique to your account.
        ImageVersionNumber:
          $ref: "#/components/schemas/ImageVersionNumber"
          description: The version number of the CustomImage.
        AppImageConfigName:
          $ref: "#/components/schemas/AppImageConfigName"
          description: The name of the AppImageConfig.
      required:
        - ImageName
        - AppImageConfigName
    ImageName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[a-zA-Z0-9]([-.]?[a-zA-Z0-9]){0,62}"
    ImageVersionNumber:
      type: integer
      minimum: 0
    TensorBoardAppSettings:
      description: The TensorBoard app settings.
      type: object
      properties:
        DefaultResourceSpec:
          $ref: "#/components/schemas/ResourceSpec"
          description: The default instance type and the Amazon Resource Name (ARN) of the SageMaker AI image created on the instance.
    RStudioServerProAppSettings:
      description: A collection of settings that configure user interaction with the RStudioServerPro app.
      type: object
      properties:
        AccessStatus:
          $ref: "#/components/schemas/RStudioServerProAccessStatus"
          description: Indicates whether the current user has access to the RStudioServerPro app.
        UserGroup:
          $ref: "#/components/schemas/RStudioServerProUserGroup"
          description: The level of permissions that the user has within the RStudioServerPro app. This value defaults to `User`. The `Admin` value allows the user access to the RStudio Administrative Dashboard.
    RStudioServerProAccessStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    RStudioServerProUserGroup:
      type: string
      enum:
        - R_STUDIO_ADMIN
        - R_STUDIO_USER
    RSessionAppSettings:
      description: A collection of settings that apply to an RSessionGateway app.
      type: object
      properties:
        DefaultResourceSpec:
          $ref: "#/components/schemas/ResourceSpec"
        CustomImages:
          $ref: "#/components/schemas/CustomImages"
          description: A list of custom SageMaker AI images that are configured to run as a RSession app.
    CanvasAppSettings:
      description: The SageMaker Canvas application settings.
      type: object
      properties:
        TimeSeriesForecastingSettings:
          $ref: "#/components/schemas/TimeSeriesForecastingSettings"
          description: Time series forecast settings for the SageMaker Canvas application.
        ModelRegisterSettings:
          $ref: "#/components/schemas/ModelRegisterSettings"
          description: The model registry settings for the SageMaker Canvas application.
        WorkspaceSettings:
          $ref: "#/components/schemas/WorkspaceSettings"
          description: The workspace settings for the SageMaker Canvas application.
        IdentityProviderOAuthSettings:
          $ref: "#/components/schemas/IdentityProviderOAuthSettings"
          description: The settings for connecting to an external data source with OAuth.
        DirectDeploySettings:
          $ref: "#/components/schemas/DirectDeploySettings"
          description: The model deployment settings for the SageMaker Canvas application.
        KendraSettings:
          $ref: "#/components/schemas/KendraSettings"
          description: The settings for document querying.
        GenerativeAiSettings:
          $ref: "#/components/schemas/GenerativeAiSettings"
          description: The generative AI settings for the SageMaker Canvas application.
        EmrServerlessSettings:
          $ref: "#/components/schemas/EmrServerlessSettings"
          description: The settings for running Amazon EMR Serverless data processing jobs in SageMaker Canvas.
    TimeSeriesForecastingSettings:
      description: Time series forecast settings for the SageMaker Canvas application.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/FeatureStatus"
          description: Describes whether time series forecasting is enabled or disabled in the Canvas application.
        AmazonForecastRoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The IAM role that Canvas passes to Amazon Forecast for time series forecasting. By default, Canvas uses the execution role specified in the UserProfile that launches the Canvas application. If an execution role is not specified in the UserProfile, Canvas uses the execution role specified in the Domain that owns the UserProfile. To allow time series forecasting, this IAM role should have the AmazonSageMakerCanvasForecastAccess policy attached and forecast.amazonaws.com added in the trust relationship as a service principal.
    FeatureStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    ModelRegisterSettings:
      description: The model registry settings for the SageMaker Canvas application.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/FeatureStatus"
          description: Describes whether the integration to the model registry is enabled or disabled in the Canvas application.
        CrossAccountModelRegisterRoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the SageMaker model registry account. Required only to register model versions created by a different SageMaker Canvas Amazon Web Services account than the Amazon Web Services account in which SageMaker model registry is set up.
    WorkspaceSettings:
      description: The workspace settings for the SageMaker Canvas application.
      type: object
      properties:
        S3ArtifactPath:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 bucket used to store artifacts generated by Canvas. Updating the Amazon S3 location impacts existing configuration settings, and Canvas users no longer have access to their artifacts. Canvas users must log out and log back in to apply the new location.
        S3KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The Amazon Web Services Key Management Service (KMS) encryption key ID that is used to encrypt artifacts generated by Canvas in the Amazon S3 bucket.
    IdentityProviderOAuthSettings:
      type: array
      items:
        $ref: "#/components/schemas/IdentityProviderOAuthSetting"
    IdentityProviderOAuthSetting:
      description: The Amazon SageMaker Canvas application setting where you configure OAuth for connecting to an external data source, such as Snowflake.
      type: object
      properties:
        DataSourceName:
          $ref: "#/components/schemas/DataSourceName"
          description: The name of the data source that you're connecting to. Canvas currently supports OAuth for Snowflake and Salesforce Data Cloud.
        Status:
          $ref: "#/components/schemas/FeatureStatus"
          description: Describes whether OAuth for a data source is enabled or disabled in the Canvas application.
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The ARN of an Amazon Web Services Secrets Manager secret that stores the credentials from your identity provider, such as the client ID and secret, authorization URL, and token URL.
    DataSourceName:
      type: string
      enum:
        - SalesforceGenie
        - Snowflake
    DirectDeploySettings:
      description: The model deployment settings for the SageMaker Canvas application. In order to enable model deployment for Canvas, the SageMaker Domain's or user profile's Amazon Web Services IAM execution role must have the AmazonSageMakerCanvasDirectDeployAccess policy attached. You can also turn on model deployment permissions through the SageMaker Domain's or user profile's settings in the SageMaker console.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/FeatureStatus"
          description: Describes whether model deployment permissions are enabled or disabled in the Canvas application.
    KendraSettings:
      description: The Amazon SageMaker Canvas application setting where you configure document querying.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/FeatureStatus"
          description: Describes whether the document querying feature is enabled or disabled in the Canvas application.
    GenerativeAiSettings:
      description: The generative AI settings for the SageMaker Canvas application. Configure these settings for Canvas users starting chats with generative AI foundation models. For more information, see Use generative AI with foundation models.
      type: object
      properties:
        AmazonBedrockRoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of an Amazon Web Services IAM role that allows fine-tuning of large language models (LLMs) in Amazon Bedrock. The IAM role should have Amazon S3 read and write permissions, as well as a trust relationship that establishes bedrock.amazonaws.com as a service principal.
    EmrServerlessSettings:
      description: The settings for running Amazon EMR Serverless jobs in SageMaker Canvas.
      type: object
      properties:
        ExecutionRoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the Amazon Web Services IAM role that is assumed for running Amazon EMR Serverless jobs in SageMaker Canvas. This role should have the necessary permissions to read and write data attached and a trust relationship with EMR Serverless.
        Status:
          $ref: "#/components/schemas/FeatureStatus"
          description: Describes whether Amazon EMR Serverless job capabilities are enabled or disabled in the SageMaker Canvas application.
    CodeEditorAppSettings:
      description: The Code Editor application settings. For more information about Code Editor, see Get started with Code Editor in Amazon SageMaker.
      type: object
      properties:
        DefaultResourceSpec:
          $ref: "#/components/schemas/ResourceSpec"
        CustomImages:
          $ref: "#/components/schemas/CustomImages"
          description: A list of custom SageMaker images that are configured to run as a Code Editor app.
        LifecycleConfigArns:
          $ref: "#/components/schemas/LifecycleConfigArns"
          description: The Amazon Resource Name (ARN) of the Code Editor application lifecycle configuration.
        AppLifecycleManagement:
          $ref: "#/components/schemas/AppLifecycleManagement"
          description: Settings that are used to configure and manage the lifecycle of CodeEditor applications.
        BuiltInLifecycleConfigArn:
          $ref: "#/components/schemas/StudioLifecycleConfigArn"
          description: The lifecycle configuration that runs before the default lifecycle configuration. It can override changes made in the default lifecycle configuration.
    AppLifecycleManagement:
      description: Settings that are used to configure and manage the lifecycle of Amazon SageMaker Studio applications.
      type: object
      properties:
        IdleSettings:
          $ref: "#/components/schemas/IdleSettings"
          description: Settings related to idle shutdown of Studio applications.
    IdleSettings:
      description: Settings related to idle shutdown of Studio applications.
      type: object
      properties:
        LifecycleManagement:
          $ref: "#/components/schemas/LifecycleManagement"
          description: Indicates whether idle shutdown is activated for the application type.
        IdleTimeoutInMinutes:
          $ref: "#/components/schemas/IdleTimeoutInMinutes"
          description: The time that SageMaker waits after the application becomes idle before shutting it down.
        MinIdleTimeoutInMinutes:
          $ref: "#/components/schemas/IdleTimeoutInMinutes"
          description: The minimum value in minutes that custom idle shutdown can be set to by the user.
        MaxIdleTimeoutInMinutes:
          $ref: "#/components/schemas/IdleTimeoutInMinutes"
          description: The maximum value in minutes that custom idle shutdown can be set to by the user.
    LifecycleManagement:
      type: string
      enum:
        - ENABLED
        - DISABLED
    IdleTimeoutInMinutes:
      type: integer
      minimum: 60
      maximum: 525600
    JupyterLabAppSettings:
      description: The settings for the JupyterLab application.
      type: object
      properties:
        DefaultResourceSpec:
          $ref: "#/components/schemas/ResourceSpec"
        CustomImages:
          $ref: "#/components/schemas/CustomImages"
          description: A list of custom SageMaker images that are configured to run as a JupyterLab app.
        LifecycleConfigArns:
          $ref: "#/components/schemas/LifecycleConfigArns"
          description: The Amazon Resource Name (ARN) of the lifecycle configurations attached to the user profile or domain. To remove a lifecycle config, you must set LifecycleConfigArns to an empty list.
        CodeRepositories:
          $ref: "#/components/schemas/CodeRepositories"
          description: A list of Git repositories that SageMaker automatically displays to users for cloning in the JupyterLab application.
        AppLifecycleManagement:
          $ref: "#/components/schemas/AppLifecycleManagement"
          description: Indicates whether idle shutdown is activated for JupyterLab applications.
        EmrSettings:
          $ref: "#/components/schemas/EmrSettings"
          description: The configuration parameters that specify the IAM roles assumed by the execution role of SageMaker (assumable roles) and the cluster instances or job execution environments (execution roles or runtime roles) to manage and access resources required for running Amazon EMR clusters or Amazon EMR Serverless applications.
        BuiltInLifecycleConfigArn:
          $ref: "#/components/schemas/StudioLifecycleConfigArn"
          description: The lifecycle configuration that runs before the default lifecycle configuration. It can override changes made in the default lifecycle configuration.
    EmrSettings:
      description: The configuration parameters that specify the IAM roles assumed by the execution role of SageMaker (assumable roles) and the cluster instances or job execution environments (execution roles or runtime roles) to manage and access resources required for running Amazon EMR clusters or Amazon EMR Serverless applications.
      type: object
      properties:
        AssumableRoleArns:
          $ref: "#/components/schemas/AssumableRoleArns"
          description: An array of Amazon Resource Names (ARNs) of the IAM roles that the execution role of SageMaker can assume for performing operations or tasks related to Amazon EMR clusters or Amazon EMR Serverless applications. These roles define the permissions and access policies required when performing Amazon EMR-related operations, such as listing, connecting to, or terminating Amazon EMR clusters or Amazon EMR Serverless applications. They are typically used in cross-account access scenarios, where the Amazon EMR resources (clusters or serverless applications) are located in a different Amazon Web Services account than the SageMaker domain.
        ExecutionRoleArns:
          $ref: "#/components/schemas/ExecutionRoleArns"
          description: An array of Amazon Resource Names (ARNs) of the IAM roles used by the Amazon EMR cluster instances or job execution environments to access other Amazon Web Services services and resources needed during the runtime of your Amazon EMR or Amazon EMR Serverless workloads, such as Amazon S3 for data access, Amazon CloudWatch for logging, or other Amazon Web Services services based on the particular workload requirements.
    AssumableRoleArns:
      type: array
      items:
        $ref: "#/components/schemas/RoleArn"
    ExecutionRoleArns:
      type: array
      items:
        $ref: "#/components/schemas/RoleArn"
    DefaultSpaceStorageSettings:
      description: The default storage settings for a space.
      type: object
      properties:
        DefaultEbsStorageSettings:
          $ref: "#/components/schemas/DefaultEbsStorageSettings"
          description: The default EBS storage settings for a space.
    DefaultEbsStorageSettings:
      description: A collection of default EBS storage settings that apply to spaces created within a domain or user profile.
      type: object
      properties:
        DefaultEbsVolumeSizeInGb:
          $ref: "#/components/schemas/SpaceEbsVolumeSizeInGb"
          description: The default size of the EBS storage volume for a space.
        MaximumEbsVolumeSizeInGb:
          $ref: "#/components/schemas/SpaceEbsVolumeSizeInGb"
          description: The maximum size of the EBS storage volume for a space.
      required:
        - DefaultEbsVolumeSizeInGb
        - MaximumEbsVolumeSizeInGb
    SpaceEbsVolumeSizeInGb:
      type: integer
      minimum: 5
      maximum: 16384
    LandingUri:
      type: string
      minLength: 0
      maxLength: 1023
    StudioWebPortal:
      type: string
      enum:
        - ENABLED
        - DISABLED
    CustomPosixUserConfig:
      description: Details about the POSIX identity that is used for file system operations.
      type: object
      properties:
        Uid:
          $ref: "#/components/schemas/Uid"
          description: The POSIX user ID.
        Gid:
          $ref: "#/components/schemas/Gid"
          description: The POSIX group ID.
      required:
        - Uid
        - Gid
    Uid:
      type: integer
      format: int64
      minimum: 10000
      maximum: 4000000
    Gid:
      type: integer
      format: int64
      minimum: 1001
      maximum: 4000000
    CustomFileSystemConfigs:
      type: array
      items:
        $ref: "#/components/schemas/CustomFileSystemConfig"
    CustomFileSystemConfig:
      description: The settings for assigning a custom file system to a user profile or space for an Amazon SageMaker AI Domain. Permitted users can access this file system in Amazon SageMaker AI Studio.
      type: object
      properties:
        EFSFileSystemConfig:
          $ref: "#/components/schemas/EFSFileSystemConfig"
          description: The settings for a custom Amazon EFS file system.
        FSxLustreFileSystemConfig:
          $ref: "#/components/schemas/FSxLustreFileSystemConfig"
          description: The settings for a custom Amazon FSx for Lustre file system.
        S3FileSystemConfig:
          $ref: "#/components/schemas/S3FileSystemConfig"
          description: Configuration settings for a custom Amazon S3 file system.
    EFSFileSystemConfig:
      description: The settings for assigning a custom Amazon EFS file system to a user profile or space for an Amazon SageMaker AI Domain.
      type: object
      properties:
        FileSystemId:
          $ref: "#/components/schemas/FileSystemId"
          description: The ID of your Amazon EFS file system.
        FileSystemPath:
          $ref: "#/components/schemas/FileSystemPath"
          description: The path to the file system directory that is accessible in Amazon SageMaker AI Studio. Permitted users can access only this directory and below.
      required:
        - FileSystemId
    FileSystemPath:
      type: string
      minLength: 1
      maxLength: 256
      pattern: \/\S*
    FSxLustreFileSystemConfig:
      description: The settings for assigning a custom Amazon FSx for Lustre file system to a user profile or space for an Amazon SageMaker Domain.
      type: object
      properties:
        FileSystemId:
          $ref: "#/components/schemas/FileSystemId"
          description: The globally unique, 17-digit, ID of the file system, assigned by Amazon FSx for Lustre.
        FileSystemPath:
          $ref: "#/components/schemas/FileSystemPath"
          description: The path to the file system directory that is accessible in Amazon SageMaker Studio. Permitted users can access only this directory and below.
      required:
        - FileSystemId
    S3FileSystemConfig:
      description: Configuration for the custom Amazon S3 file system.
      type: object
      properties:
        MountPath:
          $ref: "#/components/schemas/String1024"
          description: The file system path where the Amazon S3 storage location will be mounted within the Amazon SageMaker Studio environment.
        S3Uri:
          $ref: "#/components/schemas/S3SchemaUri"
          description: The Amazon S3 URI of the S3 file system configuration.
      required:
        - S3Uri
    String1024:
      type: string
      minLength: 0
      maxLength: 1024
    S3SchemaUri:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: (s3)://([^/]+)/?(.*)
    StudioWebPortalSettings:
      description: Studio settings. If these settings are applied on a user level, they take priority over the settings applied on a domain level.
      type: object
      properties:
        HiddenMlTools:
          $ref: "#/components/schemas/HiddenMlToolsList"
          description: The machine learning tools that are hidden from the Studio left navigation pane.
        HiddenAppTypes:
          $ref: "#/components/schemas/HiddenAppTypesList"
          description: The Applications supported in Studio that are hidden from the Studio left navigation pane.
        HiddenInstanceTypes:
          $ref: "#/components/schemas/HiddenInstanceTypesList"
          description: The instance types you are hiding from the Studio user interface.
        HiddenSageMakerImageVersionAliases:
          $ref: "#/components/schemas/HiddenSageMakerImageVersionAliasesList"
          description: The version aliases you are hiding from the Studio user interface.
        ExecutionRoleSessionNameMode:
          $ref: "#/components/schemas/ExecutionRoleSessionNameMode"
          description: The execution role session name mode. If this value is set to USER_IDENTITY, the session name of the execution role corresponds to the user's identity. For IAM domains, the session name is the IAM session name used to generate the presigned URL. For IAM Identity Center domains, the session name is the username of the associated IAM Identity Center user. If this value is set to STATIC or is not set, the session name defaults to SageMaker.
    HiddenMlToolsList:
      type: array
      items:
        $ref: "#/components/schemas/MlTools"
    MlTools:
      type: string
      enum:
        - DataWrangler
        - FeatureStore
        - EmrClusters
        - AutoMl
        - Experiments
        - Training
        - ModelEvaluation
        - Pipelines
        - Models
        - JumpStart
        - InferenceRecommender
        - Endpoints
        - Projects
        - InferenceOptimization
        - PerformanceEvaluation
        - LakeraGuard
        - Comet
        - DeepchecksLLMEvaluation
        - Fiddler
        - HyperPodClusters
        - RunningInstances
        - Datasets
        - Evaluators
    HiddenAppTypesList:
      type: array
      items:
        $ref: "#/components/schemas/AppType"
    HiddenInstanceTypesList:
      type: array
      items:
        $ref: "#/components/schemas/AppInstanceType"
    HiddenSageMakerImageVersionAliasesList:
      type: array
      items:
        $ref: "#/components/schemas/HiddenSageMakerImage"
    HiddenSageMakerImage:
      description: The SageMaker images that are hidden from the Studio user interface. You must specify the SageMaker image name and version aliases.
      type: object
      properties:
        SageMakerImageName:
          $ref: "#/components/schemas/SageMakerImageName"
          description: The SageMaker image name that you are hiding from the Studio user interface.
        VersionAliases:
          $ref: "#/components/schemas/VersionAliasesList"
          description: The version aliases you are hiding from the Studio user interface.
    SageMakerImageName:
      type: string
      enum:
        - sagemaker_distribution
    VersionAliasesList:
      type: array
      items:
        $ref: "#/components/schemas/ImageVersionAliasPattern"
    ImageVersionAliasPattern:
      type: string
      minLength: 1
      maxLength: 128
      pattern: (0|[1-9]\d*)\.(0|[1-9]\d*)
    ExecutionRoleSessionNameMode:
      type: string
      enum:
        - STATIC
        - USER_IDENTITY
    AutoMountHomeEFS:
      type: string
      enum:
        - Enabled
        - Disabled
        - DefaultAsDomain
    DomainSettings:
      description: A collection of settings that apply to the SageMaker Domain. These settings are specified through the CreateDomain API call.
      type: object
      properties:
        SecurityGroupIds:
          $ref: "#/components/schemas/DomainSecurityGroupIds"
          description: The security groups for the Amazon Virtual Private Cloud that the Domain uses for communication between Domain-level apps and user apps.
        RStudioServerProDomainSettings:
          $ref: "#/components/schemas/RStudioServerProDomainSettings"
          description: A collection of settings that configure the RStudioServerPro Domain-level app.
        ExecutionRoleIdentityConfig:
          $ref: "#/components/schemas/ExecutionRoleIdentityConfig"
          description: The configuration for attaching a SageMaker AI user profile name to the execution role as a sts:SourceIdentity key.
        TrustedIdentityPropagationSettings:
          $ref: "#/components/schemas/TrustedIdentityPropagationSettings"
          description: The Trusted Identity Propagation (TIP) settings for the SageMaker domain. These settings determine how user identities from IAM Identity Center are propagated through the domain to TIP enabled Amazon Web Services services.
        DockerSettings:
          $ref: "#/components/schemas/DockerSettings"
          description: A collection of settings that configure the domain's Docker interaction.
        AmazonQSettings:
          $ref: "#/components/schemas/AmazonQSettings"
          description: A collection of settings that configure the Amazon Q experience within the domain. The AuthMode that you use to create the domain must be SSO.
        UnifiedStudioSettings:
          $ref: "#/components/schemas/UnifiedStudioSettings"
          description: The settings that apply to an SageMaker AI domain when you use it in Amazon SageMaker Unified Studio.
        IpAddressType:
          $ref: "#/components/schemas/IPAddressType"
          description: The IP address type for the domain. Specify ipv4 for IPv4-only connectivity or dualstack for both IPv4 and IPv6 connectivity. When you specify dualstack, the subnet must support IPv6 CIDR blocks. If not specified, defaults to ipv4.
    DomainSecurityGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    RStudioServerProDomainSettings:
      description: A collection of settings that configure the RStudioServerPro Domain-level app.
      type: object
      properties:
        DomainExecutionRoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of the execution role for the RStudioServerPro Domain-level app.
        RStudioConnectUrl:
          $ref: "#/components/schemas/String"
          description: A URL pointing to an RStudio Connect server.
        RStudioPackageManagerUrl:
          $ref: "#/components/schemas/String"
          description: A URL pointing to an RStudio Package Manager server.
        DefaultResourceSpec:
          $ref: "#/components/schemas/ResourceSpec"
      required:
        - DomainExecutionRoleArn
    ExecutionRoleIdentityConfig:
      type: string
      enum:
        - USER_PROFILE_NAME
        - DISABLED
    TrustedIdentityPropagationSettings:
      description: The Trusted Identity Propagation (TIP) settings for the SageMaker domain. These settings determine how user identities from IAM Identity Center are propagated through the domain to TIP enabled Amazon Web Services services.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/FeatureStatus"
          description: "The status of Trusted Identity Propagation (TIP) at the SageMaker domain level. When disabled, standard IAM role-based access is used. When enabled: User identities from IAM Identity Center are propagated through the application to TIP enabled Amazon Web Services services. New applications or existing applications that are automatically patched, will use the domain level configuration."
      required:
        - Status
    DockerSettings:
      description: A collection of settings that configure the domain's Docker interaction.
      type: object
      properties:
        EnableDockerAccess:
          $ref: "#/components/schemas/FeatureStatus"
          description: Indicates whether the domain can access Docker.
        VpcOnlyTrustedAccounts:
          $ref: "#/components/schemas/VpcOnlyTrustedAccounts"
          description: The list of Amazon Web Services accounts that are trusted when the domain is created in VPC-only mode.
        RootlessDocker:
          $ref: "#/components/schemas/FeatureStatus"
          description: Indicates whether to use rootless Docker.
    VpcOnlyTrustedAccounts:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    AccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: \d+
    AmazonQSettings:
      description: A collection of settings that configure the Amazon Q experience within the domain.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/FeatureStatus"
          description: Whether Amazon Q has been enabled within the domain.
        QProfileArn:
          $ref: "#/components/schemas/QProfileArn"
          description: The ARN of the Amazon Q profile used within the domain.
    QProfileArn:
      type: string
      pattern: arn:[-.a-z0-9]{1,63}:codewhisperer:([-.a-z0-9]{0,63}:){2}([a-zA-Z0-9-_:/]){1,1023}
    UnifiedStudioSettings:
      description: The settings that apply to an Amazon SageMaker AI domain when you use it in Amazon SageMaker Unified Studio.
      type: object
      properties:
        StudioWebPortalAccess:
          $ref: "#/components/schemas/FeatureStatus"
          description: "Sets whether you can access the domain in Amazon SageMaker Studio: ENABLED You can access the domain in Amazon SageMaker Studio. If you migrate the domain to Amazon SageMaker Unified Studio, you can access it in both studio interfaces. DISABLED You can't access the domain in Amazon SageMaker Studio. If you migrate the domain to Amazon SageMaker Unified Studio, you can access it only in that studio interface. To migrate a domain to Amazon SageMaker Unified Studio, you specify the UnifiedStudioSettings data type when you use the UpdateDomain action."
        DomainAccountId:
          $ref: "#/components/schemas/AccountId"
          description: The ID of the Amazon Web Services account that has the Amazon SageMaker Unified Studio domain. The default value, if you don't specify an ID, is the ID of the account that has the Amazon SageMaker AI domain.
        DomainRegion:
          $ref: "#/components/schemas/RegionName"
          description: The Amazon Web Services Region where the domain is located in Amazon SageMaker Unified Studio. The default value, if you don't specify a Region, is the Region where the Amazon SageMaker AI domain is located.
        DomainId:
          $ref: "#/components/schemas/UnifiedStudioDomainId"
          description: The ID of the Amazon SageMaker Unified Studio domain associated with this domain.
        ProjectId:
          $ref: "#/components/schemas/UnifiedStudioProjectId"
          description: The ID of the Amazon SageMaker Unified Studio project that corresponds to the domain.
        EnvironmentId:
          $ref: "#/components/schemas/UnifiedStudioEnvironmentId"
          description: The ID of the environment that Amazon SageMaker Unified Studio associates with the domain.
        ProjectS3Path:
          $ref: "#/components/schemas/S3Uri"
          description: The location where Amazon S3 stores temporary execution data and other artifacts for the project that corresponds to the domain.
        SingleSignOnApplicationArn:
          $ref: "#/components/schemas/SingleSignOnApplicationArn"
          description: The ARN of the Amazon DataZone application managed by Amazon SageMaker Unified Studio in the Amazon Web Services IAM Identity Center.
    RegionName:
      type: string
      minLength: 1
      maxLength: 24
    UnifiedStudioDomainId:
      type: string
      pattern: dzd[-_][a-zA-Z0-9_-]{1,36}
    UnifiedStudioProjectId:
      type: string
      pattern: "[a-zA-Z0-9_-]{1,36}"
    UnifiedStudioEnvironmentId:
      type: string
      pattern: "[a-zA-Z0-9_-]{1,36}"
    SingleSignOnApplicationArn:
      type: string
      pattern: arn:(aws|aws-us-gov|aws-cn|aws-iso|aws-iso-b):sso::[0-9]+:application\/[a-zA-Z0-9-_.]+\/apl-[a-zA-Z0-9]+
    IPAddressType:
      type: string
      enum:
        - ipv4
        - dualstack
    VpcId:
      type: string
      minLength: 0
      maxLength: 32
      pattern: "[-0-9a-zA-Z]+"
    AppNetworkAccessType:
      type: string
      enum:
        - PublicInternetOnly
        - VpcOnly
    AppSecurityGroupManagement:
      type: string
      enum:
        - Service
        - Customer
    TagPropagation:
      type: string
      enum:
        - ENABLED
        - DISABLED
    DefaultSpaceSettings:
      description: The default settings for shared spaces that users create in the domain. SageMaker applies these settings only to shared spaces. It doesn't apply them to private spaces.
      type: object
      properties:
        ExecutionRole:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of the execution role for the space.
        SecurityGroups:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: The security group IDs for the Amazon VPC that the space uses for communication.
        JupyterServerAppSettings:
          $ref: "#/components/schemas/JupyterServerAppSettings"
        KernelGatewayAppSettings:
          $ref: "#/components/schemas/KernelGatewayAppSettings"
        JupyterLabAppSettings:
          $ref: "#/components/schemas/JupyterLabAppSettings"
        SpaceStorageSettings:
          $ref: "#/components/schemas/DefaultSpaceStorageSettings"
        CustomPosixUserConfig:
          $ref: "#/components/schemas/CustomPosixUserConfig"
        CustomFileSystemConfigs:
          $ref: "#/components/schemas/CustomFileSystemConfigs"
          description: The settings for assigning a custom file system to a domain. Permitted users can access this file system in Amazon SageMaker AI Studio.
    CreateDomainResponse:
      type: object
      properties:
        DomainArn:
          $ref: "#/components/schemas/DomainArn"
          description: The Amazon Resource Name (ARN) of the created domain.
        DomainId:
          $ref: "#/components/schemas/DomainId"
          description: The ID of the created domain.
        Url:
          $ref: "#/components/schemas/String1024"
          description: The URL to the created domain.
    DomainArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:domain/.*
    EdgeDeploymentModelConfigs:
      type: array
      items:
        $ref: "#/components/schemas/EdgeDeploymentModelConfig"
    EdgeDeploymentModelConfig:
      description: Contains information about the configuration of a model in a deployment.
      type: object
      properties:
        ModelHandle:
          $ref: "#/components/schemas/EntityName"
          description: The name the device application uses to reference this model.
        EdgePackagingJobName:
          $ref: "#/components/schemas/EntityName"
          description: The edge packaging job associated with this deployment.
      required:
        - ModelHandle
        - EdgePackagingJobName
    DeploymentStages:
      type: array
      items:
        $ref: "#/components/schemas/DeploymentStage"
    DeploymentStage:
      description: Contains information about a stage in an edge deployment plan.
      type: object
      properties:
        StageName:
          $ref: "#/components/schemas/EntityName"
          description: The name of the stage.
        DeviceSelectionConfig:
          $ref: "#/components/schemas/DeviceSelectionConfig"
          description: Configuration of the devices in the stage.
        DeploymentConfig:
          $ref: "#/components/schemas/EdgeDeploymentConfig"
          description: Configuration of the deployment details.
      required:
        - StageName
        - DeviceSelectionConfig
    DeviceSelectionConfig:
      description: Contains information about the configurations of selected devices.
      type: object
      properties:
        DeviceSubsetType:
          $ref: "#/components/schemas/DeviceSubsetType"
          description: Type of device subsets to deploy to the current stage.
        Percentage:
          $ref: "#/components/schemas/Percentage"
          description: Percentage of devices in the fleet to deploy to the current stage.
        DeviceNames:
          $ref: "#/components/schemas/DeviceNames"
          description: List of devices chosen to deploy.
        DeviceNameContains:
          $ref: "#/components/schemas/DeviceName"
          description: A filter to select devices with names containing this name.
      required:
        - DeviceSubsetType
    DeviceSubsetType:
      type: string
      enum:
        - PERCENTAGE
        - SELECTION
        - NAMECONTAINS
    Percentage:
      type: integer
      maximum: 100
    DeviceNames:
      type: array
      items:
        $ref: "#/components/schemas/DeviceName"
    DeviceName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,62}"
    EdgeDeploymentConfig:
      description: Contains information about the configuration of a deployment.
      type: object
      properties:
        FailureHandlingPolicy:
          $ref: "#/components/schemas/FailureHandlingPolicy"
          description: Toggle that determines whether to rollback to previous configuration if the current deployment fails. By default this is turned on. You may turn this off if you want to investigate the errors yourself.
      required:
        - FailureHandlingPolicy
    FailureHandlingPolicy:
      type: string
      enum:
        - ROLLBACK_ON_FAILURE
        - DO_NOTHING
    CreateEdgeDeploymentPlanResponse:
      type: object
      properties:
        EdgeDeploymentPlanArn:
          $ref: "#/components/schemas/EdgeDeploymentPlanArn"
          description: The ARN of the edge deployment plan.
      required:
        - EdgeDeploymentPlanArn
    EdgeDeploymentPlanArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z\-]*:\d{12}:edge-deployment/?[a-zA-Z_0-9+=,.@\-_/]+
    EdgeVersion:
      type: string
      minLength: 1
      maxLength: 30
      pattern: "[a-zA-Z0-9\\ \\_\\.]+"
    EndpointConfigName:
      type: string
      minLength: 0
      maxLength: 63
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,62}"
    DeploymentConfig:
      description: The deployment configuration for an endpoint, which contains the desired deployment strategy and rollback configurations.
      type: object
      properties:
        BlueGreenUpdatePolicy:
          $ref: "#/components/schemas/BlueGreenUpdatePolicy"
          description: Update policy for a blue/green deployment. If this update policy is specified, SageMaker creates a new fleet during the deployment while maintaining the old fleet. SageMaker flips traffic to the new fleet according to the specified traffic routing configuration. Only one update policy should be used in the deployment configuration. If no update policy is specified, SageMaker uses a blue/green deployment strategy with all at once traffic shifting by default.
        RollingUpdatePolicy:
          $ref: "#/components/schemas/RollingUpdatePolicy"
          description: Specifies a rolling deployment strategy for updating a SageMaker endpoint.
        AutoRollbackConfiguration:
          $ref: "#/components/schemas/AutoRollbackConfig"
          description: Automatic rollback configuration for handling endpoint deployment failures and recovery.
    BlueGreenUpdatePolicy:
      description: Update policy for a blue/green deployment. If this update policy is specified, SageMaker creates a new fleet during the deployment while maintaining the old fleet. SageMaker flips traffic to the new fleet according to the specified traffic routing configuration. Only one update policy should be used in the deployment configuration. If no update policy is specified, SageMaker uses a blue/green deployment strategy with all at once traffic shifting by default.
      type: object
      properties:
        TrafficRoutingConfiguration:
          $ref: "#/components/schemas/TrafficRoutingConfig"
          description: Defines the traffic routing strategy to shift traffic from the old fleet to the new fleet during an endpoint deployment.
        TerminationWaitInSeconds:
          $ref: "#/components/schemas/TerminationWaitInSeconds"
          description: Additional waiting time in seconds after the completion of an endpoint deployment before terminating the old endpoint fleet. Default is 0.
        MaximumExecutionTimeoutInSeconds:
          $ref: "#/components/schemas/MaximumExecutionTimeoutInSeconds"
          description: Maximum execution timeout for the deployment. Note that the timeout value should be larger than the total waiting time specified in TerminationWaitInSeconds and WaitIntervalInSeconds.
      required:
        - TrafficRoutingConfiguration
    TrafficRoutingConfig:
      description: Defines the traffic routing strategy during an endpoint deployment to shift traffic from the old fleet to the new fleet.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/TrafficRoutingConfigType"
          description: "Traffic routing strategy type. ALL_AT_ONCE: Endpoint traffic shifts to the new fleet in a single step. CANARY: Endpoint traffic shifts to the new fleet in two steps. The first step is the canary, which is a small portion of the traffic. The second step is the remainder of the traffic. LINEAR: Endpoint traffic shifts to the new fleet in n steps of a configurable size."
        WaitIntervalInSeconds:
          $ref: "#/components/schemas/WaitIntervalInSeconds"
          description: The waiting time (in seconds) between incremental steps to turn on traffic on the new endpoint fleet.
        CanarySize:
          $ref: "#/components/schemas/CapacitySize"
          description: Batch size for the first step to turn on traffic on the new endpoint fleet. Value must be less than or equal to 50% of the variant's total instance count.
        LinearStepSize:
          $ref: "#/components/schemas/CapacitySize"
          description: Batch size for each step to turn on traffic on the new endpoint fleet. Value must be 10-50% of the variant's total instance count.
      required:
        - Type
        - WaitIntervalInSeconds
    TrafficRoutingConfigType:
      type: string
      enum:
        - ALL_AT_ONCE
        - CANARY
        - LINEAR
    WaitIntervalInSeconds:
      type: integer
      minimum: 0
      maximum: 3600
    CapacitySize:
      description: Specifies the type and size of the endpoint capacity to activate for a blue/green deployment, a rolling deployment, or a rollback strategy. You can specify your batches as either instance count or the overall percentage or your fleet. For a rollback strategy, if you don't specify the fields in this object, or if you set the Value to 100%, then SageMaker uses a blue/green rollback strategy and rolls all traffic back to the blue fleet.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/CapacitySizeType"
          description: "Specifies the endpoint capacity type. INSTANCE_COUNT: The endpoint activates based on the number of instances. CAPACITY_PERCENT: The endpoint activates based on the specified percentage of capacity."
        Value:
          $ref: "#/components/schemas/CapacitySizeValue"
          description: Defines the capacity size, either as a number of instances or a capacity percentage.
      required:
        - Type
        - Value
    CapacitySizeType:
      type: string
      enum:
        - INSTANCE_COUNT
        - CAPACITY_PERCENT
    CapacitySizeValue:
      type: integer
      minimum: 1
    TerminationWaitInSeconds:
      type: integer
      minimum: 0
      maximum: 3600
    MaximumExecutionTimeoutInSeconds:
      type: integer
      minimum: 600
      maximum: 28800
    RollingUpdatePolicy:
      description: Specifies a rolling deployment strategy for updating a SageMaker endpoint.
      type: object
      properties:
        MaximumBatchSize:
          $ref: "#/components/schemas/CapacitySize"
          description: Batch size for each rolling step to provision capacity and turn on traffic on the new endpoint fleet, and terminate capacity on the old endpoint fleet. Value must be between 5% to 50% of the variant's total instance count.
        WaitIntervalInSeconds:
          $ref: "#/components/schemas/WaitIntervalInSeconds"
          description: The length of the baking period, during which SageMaker monitors alarms for each batch on the new fleet.
        MaximumExecutionTimeoutInSeconds:
          $ref: "#/components/schemas/MaximumExecutionTimeoutInSeconds"
          description: The time limit for the total deployment. Exceeding this limit causes a timeout.
        RollbackMaximumBatchSize:
          $ref: "#/components/schemas/CapacitySize"
          description: Batch size for rollback to the old endpoint fleet. Each rolling step to provision capacity and turn on traffic on the old endpoint fleet, and terminate capacity on the new endpoint fleet. If this field is absent, the default value will be set to 100% of total capacity which means to bring up the whole capacity of the old fleet at once during rollback.
      required:
        - MaximumBatchSize
        - WaitIntervalInSeconds
    AutoRollbackConfig:
      description: Automatic rollback configuration for handling endpoint deployment failures and recovery.
      type: object
      properties:
        Alarms:
          $ref: "#/components/schemas/AlarmList"
          description: List of CloudWatch alarms in your account that are configured to monitor metrics on an endpoint. If any alarms are tripped during a deployment, SageMaker rolls back the deployment.
    AlarmList:
      type: array
      items:
        $ref: "#/components/schemas/Alarm"
    Alarm:
      description: An Amazon CloudWatch alarm configured to monitor metrics on an endpoint.
      type: object
      properties:
        AlarmName:
          $ref: "#/components/schemas/AlarmName"
          description: The name of a CloudWatch alarm in your account.
    CreateEndpointOutput:
      type: object
      properties:
        EndpointArn:
          $ref: "#/components/schemas/EndpointArn"
          description: The Amazon Resource Name (ARN) of the endpoint.
      required:
        - EndpointArn
    EndpointArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:endpoint/.*
    ProductionVariantList:
      type: array
      items:
        $ref: "#/components/schemas/ProductionVariant"
    ProductionVariant:
      description: Identifies a model that you want to host and the resources chosen to deploy for hosting it. If you are deploying multiple models, tell SageMaker how to distribute traffic among the models by specifying variant weights. For more information on production variants, check Production variants.
      type: object
      properties:
        VariantName:
          $ref: "#/components/schemas/VariantName"
          description: The name of the production variant.
        ModelName:
          $ref: "#/components/schemas/ModelName"
          description: The name of the model that you want to host. This is the name that you specified when creating the model.
        InitialInstanceCount:
          $ref: "#/components/schemas/InitialTaskCount"
          description: Number of instances to launch initially.
        InstanceType:
          $ref: "#/components/schemas/ProductionVariantInstanceType"
          description: The ML compute instance type.
        InstancePools:
          $ref: "#/components/schemas/InstancePoolList"
          description: A list of instance pools for the production variant. Each instance pool specifies an instance type and its priority for provisioning. Use instance pools to configure heterogeneous endpoints that deploy models across multiple instance types.
        VariantInstanceProvisionTimeoutInSeconds:
          $ref: "#/components/schemas/VariantInstanceProvisionTimeoutInSeconds"
          description: "The timeout value, in seconds, for provisioning instances for the production variant. When SageMaker encounters an insufficient capacity error while provisioning instances, it retries with the next instance pool (if configured) or waits until the timeout expires. This timeout applies only to capacity provisioning and does not include the time for model download or container startup. Valid values: 300 to 3600."
        InitialVariantWeight:
          $ref: "#/components/schemas/VariantWeight"
          description: Determines initial traffic distribution among all of the models that you specify in the endpoint configuration. The traffic to a production variant is determined by the ratio of the VariantWeight to the sum of all VariantWeight values across all ProductionVariants. If unspecified, it defaults to 1.0.
        AcceleratorType:
          $ref: "#/components/schemas/ProductionVariantAcceleratorType"
          description: This parameter is no longer supported. Elastic Inference (EI) is no longer available. This parameter was used to specify the size of the EI instance to use for the production variant.
        CoreDumpConfig:
          $ref: "#/components/schemas/ProductionVariantCoreDumpConfig"
          description: Specifies configuration for a core dump from the model container when the process crashes.
        ServerlessConfig:
          $ref: "#/components/schemas/ProductionVariantServerlessConfig"
          description: The serverless configuration for an endpoint. Specifies a serverless endpoint configuration instead of an instance-based endpoint configuration.
        VolumeSizeInGB:
          $ref: "#/components/schemas/ProductionVariantVolumeSizeInGB"
          description: The size, in GB, of the ML storage volume attached to individual inference instance associated with the production variant. Currently only Amazon EBS gp2 storage volumes are supported.
        ModelDataDownloadTimeoutInSeconds:
          $ref: "#/components/schemas/ProductionVariantModelDataDownloadTimeoutInSeconds"
          description: The timeout value, in seconds, to download and extract the model that you want to host from Amazon S3 to the individual inference instance associated with this production variant.
        ContainerStartupHealthCheckTimeoutInSeconds:
          $ref: "#/components/schemas/ProductionVariantContainerStartupHealthCheckTimeoutInSeconds"
          description: The timeout value, in seconds, for your inference container to pass health check by SageMaker Hosting. For more information about health check, see How Your Container Should Respond to Health Check (Ping) Requests.
        EnableSSMAccess:
          $ref: "#/components/schemas/ProductionVariantSSMAccess"
          description: You can use this parameter to turn on native Amazon Web Services Systems Manager (SSM) access for a production variant behind an endpoint. By default, SSM access is disabled for all production variants behind an endpoint. You can turn on or turn off SSM access for a production variant behind an existing endpoint by creating a new endpoint configuration and calling UpdateEndpoint.
        ManagedInstanceScaling:
          $ref: "#/components/schemas/ProductionVariantManagedInstanceScaling"
          description: Settings that control the range in the number of instances that the endpoint provisions as it scales up or down to accommodate traffic.
        RoutingConfig:
          $ref: "#/components/schemas/ProductionVariantRoutingConfig"
          description: Settings that control how the endpoint routes incoming traffic to the instances that the endpoint hosts.
        InferenceAmiVersion:
          $ref: "#/components/schemas/ProductionVariantInferenceAmiVersion"
          description: "Specifies an option from a collection of preconfigured Amazon Machine Image (AMI) images. Each image is configured by Amazon Web Services with a set of software and driver versions. Amazon Web Services optimizes these configurations for different machine learning workloads. By selecting an AMI version, you can ensure that your inference environment is compatible with specific software requirements, such as CUDA driver versions, Linux kernel versions, or Amazon Web Services Neuron driver versions. The AMI version names, and their configurations, are the following: al2-ami-sagemaker-inference-gpu-2 Accelerator: GPU NVIDIA driver version: 535 CUDA version: 12.2 al2-ami-sagemaker-inference-gpu-2-1 Accelerator: GPU NVIDIA driver version: 535 CUDA version: 12.2 NVIDIA Container Toolkit with disabled CUDA-compat mounting al2-ami-sagemaker-inference-gpu-3-1 Accelerator: GPU NVIDIA driver version: 550 CUDA version: 12.4 NVIDIA Container Toolkit with disabled CUDA-compat mounting al2023-ami-sagemaker-inference-gpu-4-1 Accelerator: GPU NVIDIA driver version: 580 CUDA version: 13.0 NVIDIA Container Toolkit with disabled CUDA-compat mounting al2-ami-sagemaker-inference-neuron-2 Accelerator: Inferentia2 and Trainium Neuron driver version: 2.19"
        CapacityReservationConfig:
          $ref: "#/components/schemas/ProductionVariantCapacityReservationConfig"
          description: Settings for the capacity reservation for the compute instances that SageMaker AI reserves for an endpoint.
      required:
        - VariantName
    VariantName:
      type: string
      minLength: 0
      maxLength: 63
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,62}"
    ModelName:
      type: string
      minLength: 0
      maxLength: 63
      pattern: "[a-zA-Z0-9]([\\-a-zA-Z0-9]*[a-zA-Z0-9])?"
    InitialTaskCount:
      type: integer
      minimum: 1
    InstancePoolList:
      type: array
      items:
        $ref: "#/components/schemas/InstancePool"
    InstancePool:
      description: Specifies an instance type and its priority for a heterogeneous endpoint. Use instance pools to configure a production variant with multiple instance types, enabling the endpoint to provision instances across different types based on priority.
      type: object
      properties:
        InstanceType:
          $ref: "#/components/schemas/ProductionVariantInstanceType"
          description: The ML compute instance type for the instance pool.
        ModelNameOverride:
          $ref: "#/components/schemas/ModelName"
          description: The name of a SageMaker model to use for this instance pool instead of the model specified for the production variant. Use this to deploy a different model optimized for the instance type in this pool.
        Priority:
          $ref: "#/components/schemas/InstancePoolPriority"
          description: "The priority for the instance pool. SageMaker attempts to provision instances in order of priority, starting with the lowest value. If instances for a higher-priority pool are unavailable, SageMaker attempts to provision from the next pool. Valid values: 1 to 5, where 1 is the highest priority."
      required:
        - InstanceType
        - Priority
    InstancePoolPriority:
      type: integer
      minimum: 1
      maximum: 5
    VariantInstanceProvisionTimeoutInSeconds:
      type: integer
      minimum: 300
      maximum: 3600
    VariantWeight:
      type: number
      format: float
      minimum: 0
    ProductionVariantAcceleratorType:
      type: string
      enum:
        - ml.eia1.medium
        - ml.eia1.large
        - ml.eia1.xlarge
        - ml.eia2.medium
        - ml.eia2.large
        - ml.eia2.xlarge
    ProductionVariantCoreDumpConfig:
      description: Specifies configuration for a core dump from the model container when the process crashes.
      type: object
      properties:
        DestinationS3Uri:
          $ref: "#/components/schemas/DestinationS3Uri"
          description: The Amazon S3 bucket to send the core dump to.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: "The Amazon Web Services Key Management Service (Amazon Web Services KMS) key that SageMaker uses to encrypt the core dump data at rest using Amazon S3 server-side encryption. The KmsKeyId can be any of the following formats: // KMS Key ID \"1234abcd-12ab-34cd-56ef-1234567890ab\" // Amazon Resource Name (ARN) of a KMS Key \"arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab\" // KMS Key Alias \"alias/ExampleAlias\" // Amazon Resource Name (ARN) of a KMS Key Alias \"arn:aws:kms:us-west-2:111122223333:alias/ExampleAlias\" If you use a KMS key ID or an alias of your KMS key, the SageMaker execution role must include permissions to call kms:Encrypt. If you don't provide a KMS key ID, SageMaker uses the default KMS key for Amazon S3 for your role's account. SageMaker uses server-side encryption with KMS-managed keys for OutputDataConfig. If you use a bucket policy with an s3:PutObject permission that only allows objects with server-side encryption, set the condition key of s3:x-amz-server-side-encryption to \"aws:kms\". For more information, see KMS-Managed Encryption Keys in the Amazon Simple Storage Service Developer Guide. The KMS key policy must grant permission to the IAM role that you specify in your CreateEndpoint and UpdateEndpoint requests. For more information, see Using Key Policies in Amazon Web Services KMS in the Amazon Web Services Key Management Service Developer Guide."
      required:
        - DestinationS3Uri
    ProductionVariantServerlessConfig:
      description: Specifies the serverless configuration for an endpoint variant.
      type: object
      properties:
        MemorySizeInMB:
          $ref: "#/components/schemas/ServerlessMemorySizeInMB"
          description: "The memory size of your serverless endpoint. Valid values are in 1 GB increments: 1024 MB, 2048 MB, 3072 MB, 4096 MB, 5120 MB, or 6144 MB."
        MaxConcurrency:
          $ref: "#/components/schemas/ServerlessMaxConcurrency"
          description: The maximum number of concurrent invocations your serverless endpoint can process.
        ProvisionedConcurrency:
          $ref: "#/components/schemas/ServerlessProvisionedConcurrency"
          description: The amount of provisioned concurrency to allocate for the serverless endpoint. Should be less than or equal to MaxConcurrency. This field is not supported for serverless endpoint recommendations for Inference Recommender jobs. For more information about creating an Inference Recommender job, see CreateInferenceRecommendationsJobs.
      required:
        - MemorySizeInMB
        - MaxConcurrency
    ServerlessMemorySizeInMB:
      type: integer
      minimum: 1024
      maximum: 6144
    ServerlessMaxConcurrency:
      type: integer
      minimum: 1
      maximum: 200
    ServerlessProvisionedConcurrency:
      type: integer
      minimum: 1
      maximum: 200
    ProductionVariantVolumeSizeInGB:
      type: integer
      minimum: 1
      maximum: 512
    ProductionVariantModelDataDownloadTimeoutInSeconds:
      type: integer
      minimum: 60
      maximum: 3600
    ProductionVariantContainerStartupHealthCheckTimeoutInSeconds:
      type: integer
      minimum: 60
      maximum: 3600
    ProductionVariantSSMAccess:
      type: boolean
    ProductionVariantManagedInstanceScaling:
      description: Settings that control the range in the number of instances that the endpoint provisions as it scales up or down to accommodate traffic.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/ManagedInstanceScalingStatus"
          description: Indicates whether managed instance scaling is enabled.
        MinInstanceCount:
          $ref: "#/components/schemas/ManagedInstanceScalingMinInstanceCount"
          description: The minimum number of instances that the endpoint must retain when it scales down to accommodate a decrease in traffic.
        MaxInstanceCount:
          $ref: "#/components/schemas/ManagedInstanceScalingMaxInstanceCount"
          description: The maximum number of instances that the endpoint can provision when it scales up to accommodate an increase in traffic.
        ScaleInPolicy:
          $ref: "#/components/schemas/ProductionVariantManagedInstanceScalingScaleInPolicy"
          description: Configures the scale-in behavior for managed instance scaling.
    ManagedInstanceScalingStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    ManagedInstanceScalingMinInstanceCount:
      type: integer
      minimum: 0
    ManagedInstanceScalingMaxInstanceCount:
      type: integer
      minimum: 1
    ProductionVariantManagedInstanceScalingScaleInPolicy:
      description: Configures the scale-in behavior for managed instance scaling.
      type: object
      properties:
        Strategy:
          $ref: "#/components/schemas/ManagedInstanceScalingScaleInStrategy"
          description: The strategy for scaling in instances. IDLE_RELEASE Releases instances that have no hosted inference component copies. CONSOLIDATION Consolidates inference component copies onto fewer instances to release more instances. Consolidation honors the scheduling configuration of each inference component. For example, if an inference component specifies Availability Zone balance, consolidation only proceeds when the resulting distribution does not increase the imbalance.
        MaximumStepSize:
          $ref: "#/components/schemas/ManagedInstanceScalingMaximumStepSize"
          description: "The maximum number of instances that the endpoint can terminate at a time during a consolidation scale-in operation. Default value: 1."
        CooldownInMinutes:
          $ref: "#/components/schemas/ManagedInstanceScalingCooldownInMinutes"
          description: "The cooldown period, in minutes, after the last endpoint operation before the endpoint evaluates consolidation scale-in opportunities. Default value: 20."
      required:
        - Strategy
    ManagedInstanceScalingScaleInStrategy:
      type: string
      enum:
        - IDLE_RELEASE
        - CONSOLIDATION
    ManagedInstanceScalingMaximumStepSize:
      type: integer
      minimum: 1
      maximum: 100
    ManagedInstanceScalingCooldownInMinutes:
      type: integer
      minimum: 5
      maximum: 1440
    ProductionVariantRoutingConfig:
      description: Settings that control how the endpoint routes incoming traffic to the instances that the endpoint hosts.
      type: object
      properties:
        RoutingStrategy:
          $ref: "#/components/schemas/RoutingStrategy"
          description: "Sets how the endpoint routes incoming traffic: LEAST_OUTSTANDING_REQUESTS: The endpoint routes requests to the specific instances that have more capacity to process them. RANDOM: The endpoint routes each request to a randomly chosen instance."
      required:
        - RoutingStrategy
    RoutingStrategy:
      type: string
      enum:
        - LEAST_OUTSTANDING_REQUESTS
        - RANDOM
    ProductionVariantInferenceAmiVersion:
      type: string
      enum:
        - al2-ami-sagemaker-inference-gpu-2
        - al2-ami-sagemaker-inference-gpu-2-1
        - al2-ami-sagemaker-inference-gpu-3-1
        - al2-ami-sagemaker-inference-neuron-2
        - al2023-ami-sagemaker-inference-gpu-4-1
    ProductionVariantCapacityReservationConfig:
      description: Settings for the capacity reservation for the compute instances that SageMaker AI reserves for an endpoint.
      type: object
      properties:
        CapacityReservationPreference:
          $ref: "#/components/schemas/CapacityReservationPreference"
          description: "Options that you can choose for the capacity reservation. SageMaker AI supports the following options: capacity-reservations-only SageMaker AI launches instances only into an ML capacity reservation. If no capacity is available, the instances fail to launch."
        MlReservationArn:
          $ref: "#/components/schemas/MlReservationArn"
          description: The Amazon Resource Name (ARN) that uniquely identifies the ML capacity reservation that SageMaker AI applies when it deploys the endpoint.
    CapacityReservationPreference:
      type: string
      enum:
        - capacity-reservations-only
    MlReservationArn:
      type: string
      minLength: 20
      maxLength: 258
      pattern: arn:aws[a-z\-]*:sagemaker:[a-z0-9\-]*:[0-9]{12}:[a-z0-9\-]{1,14}/.*
    DataCaptureConfig:
      description: Configuration to control how SageMaker AI captures inference data.
      type: object
      properties:
        EnableCapture:
          $ref: "#/components/schemas/EnableCapture"
          description: Whether data capture should be enabled or disabled (defaults to enabled).
        InitialSamplingPercentage:
          $ref: "#/components/schemas/SamplingPercentage"
          description: The percentage of requests SageMaker AI will capture. A lower value is recommended for Endpoints with high traffic.
        DestinationS3Uri:
          $ref: "#/components/schemas/DestinationS3Uri"
          description: The Amazon S3 location used to capture the data.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: "The Amazon Resource Name (ARN) of an Key Management Service key that SageMaker AI uses to encrypt the captured data at rest using Amazon S3 server-side encryption. The KmsKeyId can be any of the following formats: Key ID: 1234abcd-12ab-34cd-56ef-1234567890ab Key ARN: arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab Alias name: alias/ExampleAlias Alias name ARN: arn:aws:kms:us-west-2:111122223333:alias/ExampleAlias"
        CaptureOptions:
          $ref: "#/components/schemas/CaptureOptionList"
          description: Specifies data Model Monitor will capture. You can configure whether to collect only input, only output, or both
        CaptureContentTypeHeader:
          $ref: "#/components/schemas/CaptureContentTypeHeader"
          description: Configuration specifying how to treat different headers. If no headers are specified SageMaker AI will by default base64 encode when capturing the data.
      required:
        - InitialSamplingPercentage
        - DestinationS3Uri
        - CaptureOptions
    EnableCapture:
      type: boolean
    SamplingPercentage:
      type: integer
      minimum: 0
      maximum: 100
    CaptureOptionList:
      type: array
      items:
        $ref: "#/components/schemas/CaptureOption"
    CaptureOption:
      description: Specifies data Model Monitor will capture.
      type: object
      properties:
        CaptureMode:
          $ref: "#/components/schemas/CaptureMode"
          description: Specify the boundary of data to capture.
      required:
        - CaptureMode
    CaptureMode:
      type: string
      enum:
        - Input
        - Output
        - InputAndOutput
    CaptureContentTypeHeader:
      description: Configuration specifying how to treat different headers. If no headers are specified Amazon SageMaker AI will by default base64 encode when capturing the data.
      type: object
      properties:
        CsvContentTypes:
          $ref: "#/components/schemas/CsvContentTypes"
          description: The list of all content type headers that Amazon SageMaker AI will treat as CSV and capture accordingly.
        JsonContentTypes:
          $ref: "#/components/schemas/JsonContentTypes"
          description: The list of all content type headers that SageMaker AI will treat as JSON and capture accordingly.
    CsvContentTypes:
      type: array
      items:
        $ref: "#/components/schemas/CsvContentType"
    CsvContentType:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9])*\\/[a-zA-Z0-9](-*[a-zA-Z0-9.])*"
    JsonContentTypes:
      type: array
      items:
        $ref: "#/components/schemas/JsonContentType"
    JsonContentType:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9])*\\/[a-zA-Z0-9](-*[a-zA-Z0-9.])*"
    AsyncInferenceConfig:
      description: Specifies configuration for how an endpoint performs asynchronous inference.
      type: object
      properties:
        ClientConfig:
          $ref: "#/components/schemas/AsyncInferenceClientConfig"
          description: Configures the behavior of the client used by SageMaker to interact with the model container during asynchronous inference.
        OutputConfig:
          $ref: "#/components/schemas/AsyncInferenceOutputConfig"
          description: Specifies the configuration for asynchronous inference invocation outputs.
      required:
        - OutputConfig
    AsyncInferenceClientConfig:
      description: Configures the behavior of the client used by SageMaker to interact with the model container during asynchronous inference.
      type: object
      properties:
        MaxConcurrentInvocationsPerInstance:
          $ref: "#/components/schemas/MaxConcurrentInvocationsPerInstance"
          description: The maximum number of concurrent requests sent by the SageMaker client to the model container. If no value is provided, SageMaker chooses an optimal value.
    MaxConcurrentInvocationsPerInstance:
      type: integer
      minimum: 1
      maximum: 1000
    AsyncInferenceOutputConfig:
      description: Specifies the configuration for asynchronous inference invocation outputs.
      type: object
      properties:
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The Amazon Web Services Key Management Service (Amazon Web Services KMS) key that SageMaker uses to encrypt the asynchronous inference output in Amazon S3.
        S3OutputPath:
          $ref: "#/components/schemas/DestinationS3Uri"
          description: The Amazon S3 location to upload inference responses to.
        NotificationConfig:
          $ref: "#/components/schemas/AsyncInferenceNotificationConfig"
          description: Specifies the configuration for notifications of inference results for asynchronous inference.
        S3FailurePath:
          $ref: "#/components/schemas/DestinationS3Uri"
          description: The Amazon S3 location to upload failure inference responses to.
    AsyncInferenceNotificationConfig:
      description: Specifies the configuration for notifications of inference results for asynchronous inference.
      type: object
      properties:
        SuccessTopic:
          $ref: "#/components/schemas/SnsTopicArn"
          description: Amazon SNS topic to post a notification to when inference completes successfully. If no topic is provided, no notification is sent on success.
        ErrorTopic:
          $ref: "#/components/schemas/SnsTopicArn"
          description: Amazon SNS topic to post a notification to when inference fails. If no topic is provided, no notification is sent on failure.
        IncludeInferenceResponseIn:
          $ref: "#/components/schemas/AsyncNotificationTopicTypeList"
          description: The Amazon SNS topics where you want the inference response to be included. The inference response is included only if the response size is less than or equal to 128 KB.
    SnsTopicArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:aws[a-z\-]*:sns:[a-z0-9\-]*:[0-9]{12}:[a-zA-Z0-9_.-]+
    AsyncNotificationTopicTypeList:
      type: array
      items:
        $ref: "#/components/schemas/AsyncNotificationTopicTypes"
    AsyncNotificationTopicTypes:
      type: string
      enum:
        - SUCCESS_NOTIFICATION_TOPIC
        - ERROR_NOTIFICATION_TOPIC
    ExplainerConfig:
      description: A parameter to activate explainers.
      type: object
      properties:
        ClarifyExplainerConfig:
          $ref: "#/components/schemas/ClarifyExplainerConfig"
          description: A member of ExplainerConfig that contains configuration parameters for the SageMaker Clarify explainer.
    ClarifyExplainerConfig:
      description: The configuration parameters for the SageMaker Clarify explainer.
      type: object
      properties:
        EnableExplanations:
          $ref: "#/components/schemas/ClarifyEnableExplanations"
          description: A JMESPath boolean expression used to filter which records to explain. Explanations are activated by default. See EnableExplanations for additional information.
        InferenceConfig:
          $ref: "#/components/schemas/ClarifyInferenceConfig"
          description: The inference configuration parameter for the model container.
        ShapConfig:
          $ref: "#/components/schemas/ClarifyShapConfig"
          description: The configuration for SHAP analysis.
      required:
        - ShapConfig
    ClarifyEnableExplanations:
      type: string
      minLength: 1
      maxLength: 64
      pattern: .*
    ClarifyInferenceConfig:
      description: The inference configuration parameter for the model container.
      type: object
      properties:
        FeaturesAttribute:
          $ref: "#/components/schemas/ClarifyFeaturesAttribute"
          description: Provides the JMESPath expression to extract the features from a model container input in JSON Lines format. For example, if FeaturesAttribute is the JMESPath expression 'myfeatures', it extracts a list of features [1,2,3] from request data '{"myfeatures":[1,2,3]}'.
        ContentTemplate:
          $ref: "#/components/schemas/ClarifyContentTemplate"
          description: A template string used to format a JSON record into an acceptable model container input. For example, a ContentTemplate string '{"myfeatures":$features}' will format a list of features [1,2,3] into the record string '{"myfeatures":[1,2,3]}'. Required only when the model container input is in JSON Lines format.
        MaxRecordCount:
          $ref: "#/components/schemas/ClarifyMaxRecordCount"
          description: The maximum number of records in a request that the model container can process when querying the model container for the predictions of a synthetic dataset. A record is a unit of input data that inference can be made on, for example, a single line in CSV data. If MaxRecordCount is 1, the model container expects one record per request. A value of 2 or greater means that the model expects batch requests, which can reduce overhead and speed up the inferencing process. If this parameter is not provided, the explainer will tune the record count per request according to the model container's capacity at runtime.
        MaxPayloadInMB:
          $ref: "#/components/schemas/ClarifyMaxPayloadInMB"
          description: The maximum payload size (MB) allowed of a request from the explainer to the model container. Defaults to 6 MB.
        ProbabilityIndex:
          $ref: "#/components/schemas/ClarifyProbabilityIndex"
          description: "A zero-based index used to extract a probability value (score) or list from model container output in CSV format. If this value is not provided, the entire model container output will be treated as a probability value (score) or list. Example for a single class model: If the model container output consists of a string-formatted prediction label followed by its probability: '1,0.6', set ProbabilityIndex to 1 to select the probability value 0.6. Example for a multiclass model: If the model container output consists of a string-formatted prediction label followed by its probability: '\"[\\'cat\\',\\'dog\\',\\'fish\\']\",\"[0.1,0.6,0.3]\"', set ProbabilityIndex to 1 to select the probability values [0.1,0.6,0.3]."
        LabelIndex:
          $ref: "#/components/schemas/ClarifyLabelIndex"
          description: "A zero-based index used to extract a label header or list of label headers from model container output in CSV format. Example for a multiclass model: If the model container output consists of label headers followed by probabilities: '\"[\\'cat\\',\\'dog\\',\\'fish\\']\",\"[0.1,0.6,0.3]\"', set LabelIndex to 0 to select the label headers ['cat','dog','fish']."
        ProbabilityAttribute:
          $ref: "#/components/schemas/ClarifyProbabilityAttribute"
          description: "A JMESPath expression used to extract the probability (or score) from the model container output if the model container is in JSON Lines format. Example: If the model container output of a single request is '{\"predicted_label\":1,\"probability\":0.6}', then set ProbabilityAttribute to 'probability'."
        LabelAttribute:
          $ref: "#/components/schemas/ClarifyLabelAttribute"
          description: "A JMESPath expression used to locate the list of label headers in the model container output. Example: If the model container output of a batch request is '{\"labels\":[\"cat\",\"dog\",\"fish\"],\"probability\":[0.6,0.3,0.1]}', then set LabelAttribute to 'labels' to extract the list of label headers [\"cat\",\"dog\",\"fish\"]"
        LabelHeaders:
          $ref: "#/components/schemas/ClarifyLabelHeaders"
          description: For multiclass classification problems, the label headers are the names of the classes. Otherwise, the label header is the name of the predicted label. These are used to help readability for the output of the InvokeEndpoint API. See the response section under Invoke the endpoint in the Developer Guide for more information. If there are no label headers in the model container output, provide them manually using this parameter.
        FeatureHeaders:
          $ref: "#/components/schemas/ClarifyFeatureHeaders"
          description: The names of the features. If provided, these are included in the endpoint response payload to help readability of the InvokeEndpoint output. See the Response section under Invoke the endpoint in the Developer Guide for more information.
        FeatureTypes:
          $ref: "#/components/schemas/ClarifyFeatureTypes"
          description: A list of data types of the features (optional). Applicable only to NLP explainability. If provided, FeatureTypes must have at least one 'text' string (for example, ['text']). If FeatureTypes is not provided, the explainer infers the feature types based on the baseline data. The feature types are included in the endpoint response payload. For additional information see the response section under Invoke the endpoint in the Developer Guide for more information.
    ClarifyFeaturesAttribute:
      type: string
      minLength: 1
      maxLength: 64
      pattern: .*
    ClarifyContentTemplate:
      type: string
      minLength: 1
      maxLength: 64
      pattern: .*
    ClarifyMaxRecordCount:
      type: integer
      minimum: 1
    ClarifyMaxPayloadInMB:
      type: integer
      minimum: 1
      maximum: 25
    ClarifyProbabilityIndex:
      type: integer
      minimum: 0
    ClarifyLabelIndex:
      type: integer
      minimum: 0
    ClarifyProbabilityAttribute:
      type: string
      minLength: 1
      maxLength: 64
      pattern: .*
    ClarifyLabelAttribute:
      type: string
      minLength: 1
      maxLength: 64
      pattern: .*
    ClarifyLabelHeaders:
      type: array
      items:
        $ref: "#/components/schemas/ClarifyHeader"
    ClarifyHeader:
      type: string
      minLength: 1
      maxLength: 64
      pattern: .*
    ClarifyFeatureHeaders:
      type: array
      items:
        $ref: "#/components/schemas/ClarifyHeader"
    ClarifyFeatureTypes:
      type: array
      items:
        $ref: "#/components/schemas/ClarifyFeatureType"
    ClarifyFeatureType:
      type: string
      enum:
        - numerical
        - categorical
        - text
    ClarifyShapConfig:
      description: The configuration for SHAP analysis using SageMaker Clarify Explainer.
      type: object
      properties:
        ShapBaselineConfig:
          $ref: "#/components/schemas/ClarifyShapBaselineConfig"
          description: The configuration for the SHAP baseline of the Kernal SHAP algorithm.
        NumberOfSamples:
          $ref: "#/components/schemas/ClarifyShapNumberOfSamples"
          description: The number of samples to be used for analysis by the Kernal SHAP algorithm. The number of samples determines the size of the synthetic dataset, which has an impact on latency of explainability requests. For more information, see the Synthetic data of Configure and create an endpoint.
        UseLogit:
          $ref: "#/components/schemas/ClarifyShapUseLogit"
          description: A Boolean toggle to indicate if you want to use the logit function (true) or log-odds units (false) for model predictions. Defaults to false.
        Seed:
          $ref: "#/components/schemas/ClarifyShapSeed"
          description: The starting value used to initialize the random number generator in the explainer. Provide a value for this parameter to obtain a deterministic SHAP result.
        TextConfig:
          $ref: "#/components/schemas/ClarifyTextConfig"
          description: A parameter that indicates if text features are treated as text and explanations are provided for individual units of text. Required for natural language processing (NLP) explainability only.
      required:
        - ShapBaselineConfig
    ClarifyShapBaselineConfig:
      description: The configuration for the SHAP baseline (also called the background or reference dataset) of the Kernal SHAP algorithm. The number of records in the baseline data determines the size of the synthetic dataset, which has an impact on latency of explainability requests. For more information, see the Synthetic data of Configure and create an endpoint. ShapBaseline and ShapBaselineUri are mutually exclusive parameters. One or the either is required to configure a SHAP baseline.
      type: object
      properties:
        MimeType:
          $ref: "#/components/schemas/ClarifyMimeType"
          description: The MIME type of the baseline data. Choose from 'text/csv' or 'application/jsonlines'. Defaults to 'text/csv'.
        ShapBaseline:
          $ref: "#/components/schemas/ClarifyShapBaseline"
          description: The inline SHAP baseline data in string format. ShapBaseline can have one or multiple records to be used as the baseline dataset. The format of the SHAP baseline file should be the same format as the training dataset. For example, if the training dataset is in CSV format and each record contains four features, and all features are numerical, then the format of the baseline data should also share these characteristics. For natural language processing (NLP) of text columns, the baseline value should be the value used to replace the unit of text specified by the Granularity of the TextConfig parameter. The size limit for ShapBasline is 4 KB. Use the ShapBaselineUri parameter if you want to provide more than 4 KB of baseline data.
        ShapBaselineUri:
          $ref: "#/components/schemas/Url"
          description: The uniform resource identifier (URI) of the S3 bucket where the SHAP baseline file is stored. The format of the SHAP baseline file should be the same format as the format of the training dataset. For example, if the training dataset is in CSV format, and each record in the training dataset has four features, and all features are numerical, then the baseline file should also have this same format. Each record should contain only the features. If you are using a virtual private cloud (VPC), the ShapBaselineUri should be accessible to the VPC. For more information about setting up endpoints with Amazon Virtual Private Cloud, see Give SageMaker access to Resources in your Amazon Virtual Private Cloud.
    ClarifyMimeType:
      type: string
      minLength: 0
      maxLength: 255
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9])*\\/[a-zA-Z0-9](-*[a-zA-Z0-9+.])*"
    ClarifyShapBaseline:
      type: string
      minLength: 1
      maxLength: 4096
      pattern: "[\\s\\S]+"
    ClarifyShapNumberOfSamples:
      type: integer
      minimum: 1
    ClarifyShapUseLogit:
      type: boolean
    ClarifyShapSeed:
      type: integer
    ClarifyTextConfig:
      description: A parameter used to configure the SageMaker Clarify explainer to treat text features as text so that explanations are provided for individual units of text. Required only for natural language processing (NLP) explainability.
      type: object
      properties:
        Language:
          $ref: "#/components/schemas/ClarifyTextLanguage"
          description: Specifies the language of the text features in ISO 639-1 or ISO 639-3 code of a supported language. For a mix of multiple languages, use code 'xx'.
        Granularity:
          $ref: "#/components/schemas/ClarifyTextGranularity"
          description: The unit of granularity for the analysis of text features. For example, if the unit is 'token', then each token (like a word in English) of the text is treated as a feature. SHAP values are computed for each unit/feature.
      required:
        - Language
        - Granularity
    ClarifyTextLanguage:
      type: string
      enum:
        - af
        - sq
        - ar
        - hy
        - eu
        - bn
        - bg
        - ca
        - zh
        - hr
        - cs
        - da
        - nl
        - en
        - et
        - fi
        - fr
        - de
        - el
        - gu
        - he
        - hi
        - hu
        - is
        - id
        - ga
        - it
        - kn
        - ky
        - lv
        - lt
        - lb
        - mk
        - ml
        - mr
        - ne
        - nb
