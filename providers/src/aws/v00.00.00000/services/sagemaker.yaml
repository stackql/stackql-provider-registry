          description: Set to True to allow SageMaker to extract session tags from a training job creation role and reuse these tags when assuming the training job execution role.
    EnableSessionTagChaining:
      type: boolean
    ServerlessJobConfig:
      description: The configuration for the serverless training job.
      type: object
