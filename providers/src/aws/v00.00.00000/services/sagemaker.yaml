        ImageScanStatuses:
          $ref: "#/components/schemas/AlgorithmStatusItemList"
          description: The status of the scan of the algorithm's Docker image container.
    AlgorithmStatusItemList:
      type: array
      items:
        $ref: "#/components/schemas/AlgorithmStatusItem"
    AlgorithmStatusItem:
      description: Represents the overall status of an algorithm.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EntityName"
          description: The name of the algorithm for which the overall status is being reported.
        Status:
          $ref: "#/components/schemas/DetailedAlgorithmStatus"
          description: The current status.
        FailureReason:
          $ref: "#/components/schemas/String"
          description: if the overall status is Failed, the reason for the failure.
      required:
        - Name
        - Status
    DetailedAlgorithmStatus:
      type: string
      enum:
        - NotStarted
        - InProgress
        - Completed
        - Failed
    DescribeAppResponse:
      type: object
      properties:
        AppArn:
          $ref: "#/components/schemas/AppArn"
          description: The Amazon Resource Name (ARN) of the app.
        AppType:
          $ref: "#/components/schemas/AppType"
          description: The type of app.
        AppName:
          $ref: "#/components/schemas/AppName"
          description: The name of the app.
        DomainId:
          $ref: "#/components/schemas/DomainId"
          description: The domain ID.
        UserProfileName:
          $ref: "#/components/schemas/UserProfileName"
          description: The user profile name.
        SpaceName:
          $ref: "#/components/schemas/SpaceName"
          description: The name of the space. If this value is not set, then UserProfileName must be set.
        Status:
          $ref: "#/components/schemas/AppStatus"
          description: The status.
        EffectiveTrustedIdentityPropagationStatus:
          $ref: "#/components/schemas/FeatureStatus"
          description: The effective status of Trusted Identity Propagation (TIP) for this application. When enabled, user identities from IAM Identity Center are being propagated through the application to TIP enabled Amazon Web Services services. When disabled, standard IAM role-based access is used.
        RecoveryMode:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the application is launched in recovery mode.
        LastHealthCheckTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of the last health check.
        LastUserActivityTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of the last user's activity. LastUserActivityTimestamp is also updated when SageMaker AI performs health checks without user activity. As a result, this value is set to the same value as LastHealthCheckTimestamp.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The creation time of the application. After an application has been shut down for 24 hours, SageMaker AI deletes all metadata for the application. To be considered an update and retain application metadata, applications must be restarted within 24 hours after the previous application has been shut down. After this time window, creation of an application is considered a new application rather than an update of the previous application.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: The failure reason.
        ResourceSpec:
          $ref: "#/components/schemas/ResourceSpec"
          description: The instance type and the Amazon Resource Name (ARN) of the SageMaker AI image created on the instance.
        BuiltInLifecycleConfigArn:
          $ref: "#/components/schemas/StudioLifecycleConfigArn"
          description: The lifecycle configuration that runs before the default lifecycle configuration
    AppStatus:
      type: string
      enum:
        - Deleted
        - Deleting
        - Failed
        - InService
        - Pending
    DescribeAppImageConfigResponse:
      type: object
      properties:
        AppImageConfigArn:
          $ref: "#/components/schemas/AppImageConfigArn"
          description: The ARN of the AppImageConfig.
        AppImageConfigName:
          $ref: "#/components/schemas/AppImageConfigName"
          description: The name of the AppImageConfig.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the AppImageConfig was created.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the AppImageConfig was last modified.
        KernelGatewayImageConfig:
          $ref: "#/components/schemas/KernelGatewayImageConfig"
