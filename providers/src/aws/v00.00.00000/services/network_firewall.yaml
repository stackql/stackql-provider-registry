    DescribeFirewallResponse:
      type: object
      properties:
        UpdateToken:
          $ref: "#/components/schemas/UpdateToken"
          description: An optional token that you can use for optimistic locking. Network Firewall returns a token to your requests that access the firewall. The token marks the state of the firewall resource at the time of the request. To make an unconditional change to the firewall, omit the token in your update request. Without the token, Network Firewall performs your updates regardless of whether the firewall has changed since you last retrieved it. To make a conditional change to the firewall, provide the token in your update request. Network Firewall uses the token to ensure that the firewall hasn't changed since you last retrieved it. If it has changed, the operation fails with an InvalidTokenException. If this happens, retrieve the firewall again to get a current copy of it with a new token. Reapply your changes as needed, then try the operation again using the new token.
        Firewall:
          $ref: "#/components/schemas/Firewall"
          description: The configuration settings for the firewall. These settings include the firewall policy and the subnets in your VPC to use for the firewall endpoints.
        FirewallStatus:
          $ref: "#/components/schemas/FirewallStatus"
          description: Detailed information about the current status of a Firewall. You can retrieve this for a firewall by calling DescribeFirewall and providing the firewall name and ARN. The firewall status indicates a combined status. It indicates whether all subnets are up-to-date with the latest firewall configurations, which is based on the sync states config values, and also whether all subnets have their endpoints fully enabled, based on their sync states attachment values.
    DescribeFirewallMetadataResponse:
      type: object
      properties:
        FirewallArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the firewall.
        FirewallPolicyArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the firewall policy.
        Description:
          $ref: "#/components/schemas/Description"
          description: A description of the firewall.
        Status:
          $ref: "#/components/schemas/FirewallStatusValue"
          description: The readiness of the configured firewall to handle network traffic across all of the Availability Zones where you have it configured. This setting is READY only when the ConfigurationSyncStateSummary value is IN_SYNC and the Attachment Status values for all of the configured subnets are READY.
        SupportedAvailabilityZones:
          type: object
          properties: {}
          description: The Availability Zones that the firewall currently supports. This includes all Availability Zones for which the firewall has a subnet defined.
        TransitGatewayAttachmentId:
          $ref: "#/components/schemas/TransitGatewayAttachmentId"
          description: The unique identifier of the transit gateway attachment associated with this firewall. This field is only present for transit gateway-attached firewalls.
    DescribeFirewallPolicyResponse:
      type: object
