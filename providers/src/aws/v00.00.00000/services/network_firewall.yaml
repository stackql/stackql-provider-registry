openapi: 3.0.0
info:
  version: "2020-11-12"
  title: AWS Network Firewall
  description: AWS Network Firewall
  x-serviceName: network-firewall
  x-serviceAlias: network_firewall
  x-protocol: json
  x-apiVersion: "2020-11-12"
  x-endpointPrefix: network-firewall
  x-targetPrefix: NetworkFirewall_20201112
  x-jsonVersion: "1.0"
servers:
  - url: https://network-firewall.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for network-firewall
paths:
  /AcceptNetworkFirewallTransitGatewayAttachment:
    post:
      operationId: AcceptNetworkFirewallTransitGatewayAttachment
      description: Accepts a transit gateway attachment request for Network Firewall. When you accept the attachment request, Network Firewall creates the necessary routing components to enable traffic flow between the transit gateway and firewall endpoints. You must accept a transit gateway attachment to complete the creation of a transit gateway-attached firewall, unless auto-accept is enabled on the transit gateway. After acceptance, use DescribeFirewall to verify the firewall status. To reject an attachment instead of accepting it, use RejectNetworkFirewallTransitGatewayAttachment. It can take several minutes for the attachment acceptance to complete and the firewall to become available.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - NetworkFirewall_20201112.AcceptNetworkFirewallTransitGatewayAttachment
            default: NetworkFirewall_20201112.AcceptNetworkFirewallTransitGatewayAttachment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TransitGatewayAttachmentId:
                  $ref: "#/components/schemas/TransitGatewayAttachmentId"
                  description: Required. The unique identifier of the transit gateway attachment to accept. This ID is returned in the response when creating a transit gateway-attached firewall.
              required:
                - TransitGatewayAttachmentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptNetworkFirewallTransitGatewayAttachmentResponse"
  /AssociateAvailabilityZones:
    post:
      operationId: AssociateAvailabilityZones
      description: Associates the specified Availability Zones with a transit gateway-attached firewall. For each Availability Zone, Network Firewall creates a firewall endpoint to process traffic. You can specify one or more Availability Zones where you want to deploy the firewall. After adding Availability Zones, you must update your transit gateway route tables to direct traffic through the new firewall endpoints. Use DescribeFirewall to monitor the status of the new endpoints.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - NetworkFirewall_20201112.AssociateAvailabilityZones
            default: NetworkFirewall_20201112.AssociateAvailabilityZones
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                UpdateToken:
                  $ref: "#/components/schemas/UpdateToken"
                  description: An optional token that you can use for optimistic locking. Network Firewall returns a token to your requests that access the firewall. The token marks the state of the firewall resource at the time of the request. To make an unconditional change to the firewall, omit the token in your update request. Without the token, Network Firewall performs your updates regardless of whether the firewall has changed since you last retrieved it. To make a conditional change to the firewall, provide the token in your update request. Network Firewall uses the token to ensure that the firewall hasn't changed since you last retrieved it. If it has changed, the operation fails with an InvalidTokenException. If this happens, retrieve the firewall again to get a current copy of it with a new token. Reapply your changes as needed, then try the operation again using the new token.
                FirewallArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the firewall. You must specify the ARN or the name, and you can specify both.
                FirewallName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The descriptive name of the firewall. You can't change the name of a firewall after you create it. You must specify the ARN or the name, and you can specify both.
                AvailabilityZoneMappings:
                  $ref: "#/components/schemas/AvailabilityZoneMappings"
                  description: Required. The Availability Zones where you want to create firewall endpoints. You must specify at least one Availability Zone.
              required:
                - AvailabilityZoneMappings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateAvailabilityZonesResponse"
  /AssociateFirewallPolicy:
    post:
      operationId: AssociateFirewallPolicy
      description: Associates a FirewallPolicy to a Firewall. A firewall policy defines how to monitor and manage your VPC network traffic, using a collection of inspection rule groups and other settings. Each firewall requires one firewall policy association, and you can use the same firewall policy for multiple firewalls.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - NetworkFirewall_20201112.AssociateFirewallPolicy
            default: NetworkFirewall_20201112.AssociateFirewallPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                UpdateToken:
                  $ref: "#/components/schemas/UpdateToken"
                  description: An optional token that you can use for optimistic locking. Network Firewall returns a token to your requests that access the firewall. The token marks the state of the firewall resource at the time of the request. To make an unconditional change to the firewall, omit the token in your update request. Without the token, Network Firewall performs your updates regardless of whether the firewall has changed since you last retrieved it. To make a conditional change to the firewall, provide the token in your update request. Network Firewall uses the token to ensure that the firewall hasn't changed since you last retrieved it. If it has changed, the operation fails with an InvalidTokenException. If this happens, retrieve the firewall again to get a current copy of it with a new token. Reapply your changes as needed, then try the operation again using the new token.
                FirewallArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the firewall. You must specify the ARN or the name, and you can specify both.
                FirewallName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The descriptive name of the firewall. You can't change the name of a firewall after you create it. You must specify the ARN or the name, and you can specify both.
                FirewallPolicyArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the firewall policy.
              required:
                - FirewallPolicyArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateFirewallPolicyResponse"
  /AssociateSubnets:
    post:
      operationId: AssociateSubnets
      description: Associates the specified subnets in the Amazon VPC to the firewall. You can specify one subnet for each of the Availability Zones that the VPC spans. This request creates an Network Firewall firewall endpoint in each of the subnets. To enable the firewall's protections, you must also modify the VPC's route tables for each subnet's Availability Zone, to redirect the traffic that's coming into and going out of the zone through the firewall endpoint.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - NetworkFirewall_20201112.AssociateSubnets
            default: NetworkFirewall_20201112.AssociateSubnets
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                UpdateToken:
                  $ref: "#/components/schemas/UpdateToken"
                  description: An optional token that you can use for optimistic locking. Network Firewall returns a token to your requests that access the firewall. The token marks the state of the firewall resource at the time of the request. To make an unconditional change to the firewall, omit the token in your update request. Without the token, Network Firewall performs your updates regardless of whether the firewall has changed since you last retrieved it. To make a conditional change to the firewall, provide the token in your update request. Network Firewall uses the token to ensure that the firewall hasn't changed since you last retrieved it. If it has changed, the operation fails with an InvalidTokenException. If this happens, retrieve the firewall again to get a current copy of it with a new token. Reapply your changes as needed, then try the operation again using the new token.
                FirewallArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the firewall. You must specify the ARN or the name, and you can specify both.
                FirewallName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The descriptive name of the firewall. You can't change the name of a firewall after you create it. You must specify the ARN or the name, and you can specify both.
                SubnetMappings:
                  $ref: "#/components/schemas/SubnetMappings"
                  description: The IDs of the subnets that you want to associate with the firewall.
              required:
                - SubnetMappings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateSubnetsResponse"
  /AttachRuleGroupsToProxyConfiguration:
    post:
      operationId: AttachRuleGroupsToProxyConfiguration
      description: Attaches ProxyRuleGroup resources to a ProxyConfiguration A Proxy Configuration defines the monitoring and protection behavior for a Proxy. The details of the behavior are defined in the rule groups that you add to your configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - NetworkFirewall_20201112.AttachRuleGroupsToProxyConfiguration
            default: NetworkFirewall_20201112.AttachRuleGroupsToProxyConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ProxyConfigurationName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The descriptive name of the proxy configuration. You can't change the name of a proxy configuration after you create it. You must specify the ARN or the name, and you can specify both.
                ProxyConfigurationArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of a proxy configuration. You must specify the ARN or the name, and you can specify both.
                RuleGroups:
                  $ref: "#/components/schemas/ProxyRuleGroupAttachmentList"
                  description: The proxy rule group(s) to attach to the proxy configuration
                UpdateToken:
                  $ref: "#/components/schemas/UpdateToken"
                  description: A token used for optimistic locking. Network Firewall returns a token to your requests that access the proxy configuration. The token marks the state of the proxy configuration resource at the time of the request. To make changes to the proxy configuration, you provide the token in your request. Network Firewall uses the token to ensure that the proxy configuration hasn't changed since you last retrieved it. If it has changed, the operation fails with an InvalidTokenException. If this happens, retrieve the proxy configuration again to get a current copy of it with a current token. Reapply your changes as needed, then try the operation again using the new token.
              required:
                - RuleGroups
                - UpdateToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachRuleGroupsToProxyConfigurationResponse"
  /CreateFirewall:
    post:
      operationId: CreateFirewall
      description: Creates an Network Firewall Firewall and accompanying FirewallStatus for a VPC. The firewall defines the configuration settings for an Network Firewall firewall. The settings that you can define at creation include the firewall policy, the subnets in your VPC to use for the firewall endpoints, and any tags that are attached to the firewall Amazon Web Services resource. After you create a firewall, you can provide additional settings, like the logging configuration. To update the settings for a firewall, you use the operations that apply to the settings themselves, for example UpdateLoggingConfiguration, AssociateSubnets, and UpdateFirewallDeleteProtection. To manage a firewall's tags, use the standard Amazon Web Services resource tagging operations, ListTagsForResource, TagResource, and UntagResource. To retrieve information about firewalls, use ListFirewalls and DescribeFirewall. To generate a report on the last 30 days of traffic monitored by a firewall, use StartAnalysisReport.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - NetworkFirewall_20201112.CreateFirewall
            default: NetworkFirewall_20201112.CreateFirewall
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                FirewallName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The descriptive name of the firewall. You can't change the name of a firewall after you create it.
                FirewallPolicyArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the FirewallPolicy that you want to use for the firewall.
                VpcId:
                  $ref: "#/components/schemas/VpcId"
                  description: The unique identifier of the VPC where Network Firewall should create the firewall. You can't change this setting after you create the firewall.
                SubnetMappings:
                  $ref: "#/components/schemas/SubnetMappings"
                  description: The public subnets to use for your Network Firewall firewalls. Each subnet must belong to a different Availability Zone in the VPC. Network Firewall creates a firewall endpoint in each subnet.
                DeleteProtection:
                  $ref: "#/components/schemas/Boolean"
                  description: A flag indicating whether it is possible to delete the firewall. A setting of TRUE indicates that the firewall is protected against deletion. Use this setting to protect against accidentally deleting a firewall that is in use. When you create a firewall, the operation initializes this flag to TRUE.
                SubnetChangeProtection:
                  $ref: "#/components/schemas/Boolean"
                  description: A setting indicating whether the firewall is protected against changes to the subnet associations. Use this setting to protect against accidentally modifying the subnet associations for a firewall that is in use. When you create a firewall, the operation initializes this setting to TRUE.
                FirewallPolicyChangeProtection:
                  $ref: "#/components/schemas/Boolean"
                  description: A setting indicating whether the firewall is protected against a change to the firewall policy association. Use this setting to protect against accidentally modifying the firewall policy for a firewall that is in use. When you create a firewall, the operation initializes this setting to TRUE.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A description of the firewall.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The key:value pairs to associate with the resource.
                EncryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                  description: A complex type that contains settings for encryption of your firewall resources.
                EnabledAnalysisTypes:
                  $ref: "#/components/schemas/EnabledAnalysisTypes"
                  description: An optional setting indicating the specific traffic analysis types to enable on the firewall.
                TransitGatewayId:
                  $ref: "#/components/schemas/TransitGatewayId"
                  description: Required when creating a transit gateway-attached firewall. The unique identifier of the transit gateway to attach to this firewall. You can provide either a transit gateway from your account or one that has been shared with you through Resource Access Manager. After creating the firewall, you cannot change the transit gateway association. To use a different transit gateway, you must create a new firewall. For information about creating firewalls, see CreateFirewall. For specific guidance about transit gateway-attached firewalls, see Considerations for transit gateway-attached firewalls in the Network Firewall Developer Guide.
                AvailabilityZoneMappings:
                  $ref: "#/components/schemas/AvailabilityZoneMappings"
                  description: Required. The Availability Zones where you want to create firewall endpoints for a transit gateway-attached firewall. You must specify at least one Availability Zone. Consider enabling the firewall in every Availability Zone where you have workloads to maintain Availability Zone isolation. You can modify Availability Zones later using AssociateAvailabilityZones or DisassociateAvailabilityZones, but this may briefly disrupt traffic. The AvailabilityZoneChangeProtection setting controls whether you can make these modifications.
                AvailabilityZoneChangeProtection:
                  $ref: "#/components/schemas/Boolean"
                  description: "Optional. A setting indicating whether the firewall is protected against changes to its Availability Zone configuration. When set to TRUE, you cannot add or remove Availability Zones without first disabling this protection using UpdateAvailabilityZoneChangeProtection. Default value: FALSE"
              required:
                - FirewallName
                - FirewallPolicyArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFirewallResponse"
  /CreateFirewallPolicy:
    post:
      operationId: CreateFirewallPolicy
      description: Creates the firewall policy for the firewall according to the specifications. An Network Firewall firewall policy defines the behavior of a firewall, in a collection of stateless and stateful rule groups and other settings. You can use one firewall policy for multiple firewalls.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - NetworkFirewall_20201112.CreateFirewallPolicy
            default: NetworkFirewall_20201112.CreateFirewallPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                FirewallPolicyName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The descriptive name of the firewall policy. You can't change the name of a firewall policy after you create it.
                FirewallPolicy:
                  $ref: "#/components/schemas/FirewallPolicy"
                  description: The rule groups and policy actions to use in the firewall policy.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A description of the firewall policy.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The key:value pairs to associate with the resource.
                DryRun:
                  $ref: "#/components/schemas/Boolean"
                  description: Indicates whether you want Network Firewall to just check the validity of the request, rather than run the request. If set to TRUE, Network Firewall checks whether the request can run successfully, but doesn't actually make the requested changes. The call returns the value that the request would return if you ran it with dry run set to FALSE, but doesn't make additions or changes to your resources. This option allows you to make sure that you have the required permissions to run the request and that your request parameters are valid. If set to FALSE, Network Firewall makes the requested changes to your resources.
                EncryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                  description: A complex type that contains settings for encryption of your firewall policy resources.
              required:
                - FirewallPolicyName
                - FirewallPolicy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFirewallPolicyResponse"
  /CreateProxy:
    post:
      operationId: CreateProxy
      description: Creates an Network Firewall Proxy Attaches a Proxy configuration to a NAT Gateway. To manage a proxy's tags, use the standard Amazon Web Services resource tagging operations, ListTagsForResource, TagResource, and UntagResource. To retrieve information about proxies, use ListProxies and DescribeProxy.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - NetworkFirewall_20201112.CreateProxy
            default: NetworkFirewall_20201112.CreateProxy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ProxyName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The descriptive name of the proxy. You can't change the name of a proxy after you create it.
                NatGatewayId:
                  $ref: "#/components/schemas/NatGatewayId"
                  description: A unique identifier for the NAT gateway to use with proxy resources.
                ProxyConfigurationName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The descriptive name of the proxy configuration. You can't change the name of a proxy configuration after you create it. You must specify the ARN or the name, and you can specify both.
                ProxyConfigurationArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of a proxy configuration. You must specify the ARN or the name, and you can specify both.
                ListenerProperties:
                  $ref: "#/components/schemas/ListenerPropertiesRequest"
                  description: Listener properties for HTTP and HTTPS traffic.
                TlsInterceptProperties:
                  $ref: "#/components/schemas/TlsInterceptPropertiesRequest"
                  description: TLS decryption on traffic to filter on attributes in the HTTP header.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The key:value pairs to associate with the resource.
              required:
                - ProxyName
                - NatGatewayId
                - TlsInterceptProperties
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProxyResponse"
  /CreateProxyConfiguration:
    post:
      operationId: CreateProxyConfiguration
      description: Creates an Network Firewall ProxyConfiguration A Proxy Configuration defines the monitoring and protection behavior for a Proxy. The details of the behavior are defined in the rule groups that you add to your configuration. To manage a proxy configuration's tags, use the standard Amazon Web Services resource tagging operations, ListTagsForResource, TagResource, and UntagResource. To retrieve information about proxies, use ListProxyConfigurations and DescribeProxyConfiguration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - NetworkFirewall_20201112.CreateProxyConfiguration
            default: NetworkFirewall_20201112.CreateProxyConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ProxyConfigurationName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The descriptive name of the proxy configuration. You can't change the name of a proxy configuration after you create it.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A description of the proxy configuration.
                RuleGroupNames:
                  $ref: "#/components/schemas/ResourceNameList"
                  description: The proxy rule group name(s) to attach to the proxy configuration. You must specify the ARNs or the names, and you can specify both.
                RuleGroupArns:
                  $ref: "#/components/schemas/ResourceArnList"
                  description: The proxy rule group arn(s) to attach to the proxy configuration. You must specify the ARNs or the names, and you can specify both.
                DefaultRulePhaseActions:
                  $ref: "#/components/schemas/ProxyConfigDefaultRulePhaseActionsRequest"
                  description: Evaluation points in the traffic flow where rules are applied. There are three phases in a traffic where the rule match is applied.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The key:value pairs to associate with the resource.
              required:
                - ProxyConfigurationName
                - DefaultRulePhaseActions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProxyConfigurationResponse"
  /CreateProxyRuleGroup:
    post:
      operationId: CreateProxyRuleGroup
      description: Creates an Network Firewall ProxyRuleGroup Collections of related proxy filtering rules. Rule groups help you manage and reuse sets of rules across multiple proxy configurations. To manage a proxy rule group's tags, use the standard Amazon Web Services resource tagging operations, ListTagsForResource, TagResource, and UntagResource. To retrieve information about proxy rule groups, use ListProxyRuleGroups and DescribeProxyRuleGroup. To retrieve information about individual proxy rules, use DescribeProxyRuleGroup and DescribeProxyRule.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - NetworkFirewall_20201112.CreateProxyRuleGroup
            default: NetworkFirewall_20201112.CreateProxyRuleGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ProxyRuleGroupName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The descriptive name of the proxy rule group. You can't change the name of a proxy rule group after you create it.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A description of the proxy rule group.
                Rules:
                  $ref: "#/components/schemas/ProxyRulesByRequestPhase"
                  description: Individual rules that define match conditions and actions for application-layer traffic. Rules specify what to inspect (domains, headers, methods) and what action to take (allow, deny, alert).
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The key:value pairs to associate with the resource.
              required:
                - ProxyRuleGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProxyRuleGroupResponse"
  /CreateProxyRules:
    post:
      operationId: CreateProxyRules
      description: Creates Network Firewall ProxyRule resources. Attaches new proxy rule(s) to an existing proxy rule group. To retrieve information about individual proxy rules, use DescribeProxyRuleGroup and DescribeProxyRule.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - NetworkFirewall_20201112.CreateProxyRules
            default: NetworkFirewall_20201112.CreateProxyRules
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ProxyRuleGroupArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of a proxy rule group. You must specify the ARN or the name, and you can specify both.
                ProxyRuleGroupName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The descriptive name of the proxy rule group. You can't change the name of a proxy rule group after you create it. You must specify the ARN or the name, and you can specify both.
                Rules:
                  $ref: "#/components/schemas/CreateProxyRulesByRequestPhase"
                  description: Individual rules that define match conditions and actions for application-layer traffic. Rules specify what to inspect (domains, headers, methods) and what action to take (allow, deny, alert).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProxyRulesResponse"
  /CreateRuleGroup:
    post:
      operationId: CreateRuleGroup
      description: Creates the specified stateless or stateful rule group, which includes the rules for network traffic inspection, a capacity setting, and tags. You provide your rule group specification in your request using either RuleGroup or Rules.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - NetworkFirewall_20201112.CreateRuleGroup
            default: NetworkFirewall_20201112.CreateRuleGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                RuleGroupName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The descriptive name of the rule group. You can't change the name of a rule group after you create it.
                RuleGroup:
                  $ref: "#/components/schemas/RuleGroup"
                  description: An object that defines the rule group rules. You must provide either this rule group setting or a Rules setting, but not both.
                Rules:
                  $ref: "#/components/schemas/RulesString"
                  description: A string containing stateful rule group rules specifications in Suricata flat format, with one rule per line. Use this to import your existing Suricata compatible rule groups. You must provide either this rules setting or a populated RuleGroup setting, but not both. You can provide your rule group specification in Suricata flat format through this setting when you create or update your rule group. The call response returns a RuleGroup object that Network Firewall has populated from your string.
                Type:
                  $ref: "#/components/schemas/RuleGroupType"
                  description: Indicates whether the rule group is stateless or stateful. If the rule group is stateless, it contains stateless rules. If it is stateful, it contains stateful rules.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A description of the rule group.
                Capacity:
                  $ref: "#/components/schemas/RuleCapacity"
                  description: "The maximum operating resources that this rule group can use. Rule group capacity is fixed at creation. When you update a rule group, you are limited to this capacity. When you reference a rule group from a firewall policy, Network Firewall reserves this capacity for the rule group. You can retrieve the capacity that would be required for a rule group before you create the rule group by calling CreateRuleGroup with DryRun set to TRUE. You can't change or exceed this capacity when you update the rule group, so leave room for your rule group to grow. Capacity for a stateless rule group For a stateless rule group, the capacity required is the sum of the capacity requirements of the individual rules that you expect to have in the rule group. To calculate the capacity requirement of a single rule, multiply the capacity requirement values of each of the rule's match settings: A match setting with no criteria specified has a value of 1. A match setting with Any specified has a value of 1. All other match settings have a value equal to the number of elements provided in the setting. For example, a protocol setting [\"UDP\"] and a source setting [\"10.0.0.0/24\"] each have a value of 1. A protocol setting [\"UDP\",\"TCP\"] has a value of 2. A source setting [\"10.0.0.0/24\",\"10.0.0.1/24\",\"10.0.0.2/24\"] has a value of 3. A rule with no criteria specified in any of its match settings has a capacity requirement of 1. A rule with protocol setting [\"UDP\",\"TCP\"], source setting [\"10.0.0.0/24\",\"10.0.0.1/24\",\"10.0.0.2/24\"], and a single specification or no specification for each of the other match settings has a capacity requirement of 6. Capacity for a stateful rule group For a stateful rule group, the minimum capacity required is the number of individual rules that you expect to have in the rule group."
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The key:value pairs to associate with the resource.
                DryRun:
                  $ref: "#/components/schemas/Boolean"
                  description: Indicates whether you want Network Firewall to just check the validity of the request, rather than run the request. If set to TRUE, Network Firewall checks whether the request can run successfully, but doesn't actually make the requested changes. The call returns the value that the request would return if you ran it with dry run set to FALSE, but doesn't make additions or changes to your resources. This option allows you to make sure that you have the required permissions to run the request and that your request parameters are valid. If set to FALSE, Network Firewall makes the requested changes to your resources.
                EncryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                  description: A complex type that contains settings for encryption of your rule group resources.
                SourceMetadata:
                  $ref: "#/components/schemas/SourceMetadata"
                  description: A complex type that contains metadata about the rule group that your own rule group is copied from. You can use the metadata to keep track of updates made to the originating rule group.
                AnalyzeRuleGroup:
                  $ref: "#/components/schemas/Boolean"
                  description: Indicates whether you want Network Firewall to analyze the stateless rules in the rule group for rule behavior such as asymmetric routing. If set to TRUE, Network Firewall runs the analysis and then creates the rule group for you. To run the stateless rule group analyzer without creating the rule group, set DryRun to TRUE.
                SummaryConfiguration:
                  $ref: "#/components/schemas/SummaryConfiguration"
                  description: An object that contains a RuleOptions array of strings. You use RuleOptions to determine which of the following RuleSummary values are returned in response to DescribeRuleGroupSummary. Metadata - returns Msg SID
              required:
                - RuleGroupName
                - Type
                - Capacity
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRuleGroupResponse"
  /CreateTLSInspectionConfiguration:
    post:
      operationId: CreateTLSInspectionConfiguration
      description: Creates an Network Firewall TLS inspection configuration. Network Firewall uses TLS inspection configurations to decrypt your firewall's inbound and outbound SSL/TLS traffic. After decryption, Network Firewall inspects the traffic according to your firewall policy's stateful rules, and then re-encrypts it before sending it to its destination. You can enable inspection of your firewall's inbound traffic, outbound traffic, or both. To use TLS inspection with your firewall, you must first import or provision certificates using ACM, create a TLS inspection configuration, add that configuration to a new firewall policy, and then associate that policy with your firewall. To update the settings for a TLS inspection configuration, use UpdateTLSInspectionConfiguration. To manage a TLS inspection configuration's tags, use the standard Amazon Web Services resource tagging operations, ListTagsForResource, TagResource, and UntagResource. To retrieve information about TLS inspection configurations, use ListTLSInspectionConfigurations and DescribeTLSInspectionConfiguration. For more information about TLS inspection configurations, see Inspecting SSL/TLS traffic with TLS inspection configurations in the Network Firewall Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - NetworkFirewall_20201112.CreateTLSInspectionConfiguration
            default: NetworkFirewall_20201112.CreateTLSInspectionConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TLSInspectionConfigurationName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The descriptive name of the TLS inspection configuration. You can't change the name of a TLS inspection configuration after you create it.
                TLSInspectionConfiguration:
                  $ref: "#/components/schemas/TLSInspectionConfiguration"
                  description: The object that defines a TLS inspection configuration. This, along with TLSInspectionConfigurationResponse, define the TLS inspection configuration. You can retrieve all objects for a TLS inspection configuration by calling DescribeTLSInspectionConfiguration. Network Firewall uses a TLS inspection configuration to decrypt traffic. Network Firewall re-encrypts the traffic before sending it to its destination. To use a TLS inspection configuration, you add it to a new Network Firewall firewall policy, then you apply the firewall policy to a firewall. Network Firewall acts as a proxy service to decrypt and inspect the traffic traveling through your firewalls. You can reference a TLS inspection configuration from more than one firewall policy, and you can use a firewall policy in more than one firewall. For more information about using TLS inspection configurations, see Inspecting SSL/TLS traffic with TLS inspection configurations in the Network Firewall Developer Guide.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A description of the TLS inspection configuration.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The key:value pairs to associate with the resource.
                EncryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
              required:
                - TLSInspectionConfigurationName
                - TLSInspectionConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTLSInspectionConfigurationResponse"
