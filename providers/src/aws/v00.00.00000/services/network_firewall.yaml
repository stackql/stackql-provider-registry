    DescribeFlowOperationResponse:
      type: object
      properties:
        FirewallArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the firewall.
        AvailabilityZone:
          $ref: "#/components/schemas/AvailabilityZone"
          description: The ID of the Availability Zone where the firewall is located. For example, us-east-2a. Defines the scope a flow operation. You can use up to 20 filters to configure a single flow operation.
        VpcEndpointAssociationArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of a VPC endpoint association.
        VpcEndpointId:
          $ref: "#/components/schemas/VpcEndpointId"
          description: A unique identifier for the primary endpoint associated with a firewall.
        FlowOperationId:
          $ref: "#/components/schemas/FlowOperationId"
          description: A unique identifier for the flow operation. This ID is returned in the responses to start and list commands. You provide to describe commands.
        FlowOperationType:
          $ref: "#/components/schemas/FlowOperationType"
          description: Defines the type of FlowOperation.
        FlowOperationStatus:
          $ref: "#/components/schemas/FlowOperationStatus"
          description: Returns the status of the flow operation. This string is returned in the responses to start, list, and describe commands. If the status is COMPLETED_WITH_ERRORS, results may be returned with any number of Flows missing from the response. If the status is FAILED, Flows returned will be empty.
        StatusMessage:
          $ref: "#/components/schemas/StatusReason"
          description: If the asynchronous operation fails, Network Firewall populates this with the reason for the error or failure. Options include Flow operation error and Flow timeout.
        FlowRequestTimestamp:
          $ref: "#/components/schemas/FlowRequestTimestamp"
          description: A timestamp indicating when the Suricata engine identified flows impacted by an operation.
        FlowOperation:
          $ref: "#/components/schemas/FlowOperation"
          description: Returns key information about a flow operation, such as related statuses, unique identifiers, and all filters defined in the operation.
    FlowOperationType:
      type: string
      enum:
        - FLOW_FLUSH
        - FLOW_CAPTURE
    FlowOperationStatus:
      type: string
      enum:
        - COMPLETED
        - IN_PROGRESS
        - FAILED
        - COMPLETED_WITH_ERRORS
    FlowRequestTimestamp:
      type: string
      format: date-time
    FlowOperation:
      description: Contains information about a flow operation, such as related statuses, unique identifiers, and all filters defined in the operation. Flow operations let you manage the flows tracked in the flow table, also known as the firewall table. A flow is network traffic that is monitored by a firewall, either by stateful or stateless rules. For traffic to be considered part of a flow, it must share Destination, DestinationPort, Direction, Protocol, Source, and SourcePort.
      type: object
      properties:
        MinimumFlowAgeInSeconds:
          $ref: "#/components/schemas/Age"
          description: The reqested FlowOperation ignores flows with an age (in seconds) lower than MinimumFlowAgeInSeconds. You provide this for start commands.
        FlowFilters:
          $ref: "#/components/schemas/FlowFilters"
          description: Defines the scope a flow operation. You can use up to 20 filters to configure a single flow operation.
    Age:
      type: integer
    FlowFilters:
      type: array
      items:
        $ref: "#/components/schemas/FlowFilter"
    FlowFilter:
      description: Defines the scope a flow operation. You can use up to 20 filters to configure a single flow operation.
      type: object
      properties:
        SourceAddress:
          $ref: "#/components/schemas/Address"
        DestinationAddress:
          $ref: "#/components/schemas/Address"
        SourcePort:
          $ref: "#/components/schemas/Port"
          description: The source port to inspect for. You can specify an individual port, for example 1994 and you can specify a port range, for example 1990:1994. To match with any port, specify ANY.
        DestinationPort:
          $ref: "#/components/schemas/Port"
          description: The destination port to inspect for. You can specify an individual port, for example 1994 and you can specify a port range, for example 1990:1994. To match with any port, specify ANY.
        Protocols:
          $ref: "#/components/schemas/ProtocolStrings"
          description: The protocols to inspect for, specified using the assigned internet protocol number (IANA) for each protocol. If not specified, this matches with any protocol.
    ProtocolStrings:
      type: array
      items:
        $ref: "#/components/schemas/ProtocolString"
    ProtocolString:
      type: string
      minLength: 1
      maxLength: 12
      pattern: ^.*$
    DescribeLoggingConfigurationResponse:
