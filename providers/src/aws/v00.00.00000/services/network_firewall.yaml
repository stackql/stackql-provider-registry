        ConditionKey:
          $ref: "#/components/schemas/ConditionKey"
          description: Defines what is to be matched.
        ConditionValues:
          $ref: "#/components/schemas/ProxyConditionValueList"
          description: Specifes the exact value that needs to be matched against.
    ConditionOperator:
      type: string
    ConditionKey:
      type: string
    ProxyConditionValueList:
      type: array
      items:
        $ref: "#/components/schemas/ProxyConditionValue"
    ProxyConditionValue:
      type: string
    CreateProxyRuleGroupResponse:
      type: object
      properties:
        ProxyRuleGroup:
          $ref: "#/components/schemas/ProxyRuleGroup"
          description: The properties that define the proxy rule group.
        UpdateToken:
          $ref: "#/components/schemas/UpdateToken"
          description: A token used for optimistic locking. Network Firewall returns a token to your requests that access the proxy rule group. The token marks the state of the proxy rule group resource at the time of the request. To make changes to the proxy rule group, you provide the token in your request. Network Firewall uses the token to ensure that the proxy rule group hasn't changed since you last retrieved it. If it has changed, the operation fails with an InvalidTokenException. If this happens, retrieve the proxy rule group again to get a current copy of it with a current token. Reapply your changes as needed, then try the operation again using the new token.
    ProxyRuleGroup:
      description: Collections of related proxy filtering rules. Rule groups help you manage and reuse sets of rules across multiple proxy configurations.
      type: object
      properties:
        ProxyRuleGroupName:
          $ref: "#/components/schemas/ResourceName"
          description: The descriptive name of the proxy rule group. You can't change the name of a proxy rule group after you create it.
        ProxyRuleGroupArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of a proxy rule group.
        CreateTime:
          $ref: "#/components/schemas/CreateTime"
          description: Time the Proxy Rule Group was created.
        DeleteTime:
          $ref: "#/components/schemas/DeleteTime"
          description: Time the Proxy Rule Group was deleted.
        Rules:
          $ref: "#/components/schemas/ProxyRulesByRequestPhase"
          description: Individual rules that define match conditions and actions for application-layer traffic. Rules specify what to inspect (domains, headers, methods) and what action to take (allow, deny, alert).
        Description:
          $ref: "#/components/schemas/Description"
          description: A description of the proxy rule group.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The key:value pairs to associate with the resource.
    CreateProxyRulesByRequestPhase:
      description: Evaluation points in the traffic flow where rules are applied. There are three phases in a traffic where the rule match is applied. This data type is used specifically for the CreateProxyRules API. Pre-DNS - before domain resolution. Pre-Request - after DNS, before request. Post-Response - after receiving response.
      type: object
      properties:
        PreDNS:
          $ref: "#/components/schemas/CreateProxyRuleList"
          description: Before domain resolution.
        PreREQUEST:
          $ref: "#/components/schemas/CreateProxyRuleList"
          description: After DNS, before request.
        PostRESPONSE:
          $ref: "#/components/schemas/CreateProxyRuleList"
          description: After receiving response.
    CreateProxyRuleList:
      type: array
      items:
        $ref: "#/components/schemas/CreateProxyRule"
    CreateProxyRule:
      description: Individual rules that define match conditions and actions for application-layer traffic. Rules specify what to inspect (domains, headers, methods) and what action to take (allow, deny, alert).
      type: object
      properties:
        ProxyRuleName:
          $ref: "#/components/schemas/ResourceName"
          description: The descriptive name of the proxy rule. You can't change the name of a proxy rule after you create it.
        Description:
          $ref: "#/components/schemas/Description"
          description: A description of the proxy rule.
        Action:
          $ref: "#/components/schemas/ProxyRulePhaseAction"
          description: Action to take.
        Conditions:
          $ref: "#/components/schemas/ProxyRuleConditionList"
          description: Match criteria that specify what traffic attributes to examine. Conditions include operators (StringEquals, StringLike) and values to match against.
        InsertPosition:
          $ref: "#/components/schemas/InsertPosition"
          description: Where to insert a proxy rule in a proxy rule group.
    CreateProxyRulesResponse:
      type: object
      properties:
        ProxyRuleGroup:
          $ref: "#/components/schemas/ProxyRuleGroup"
          description: The properties that define the proxy rule group with the newly created proxy rule(s).
        UpdateToken:
          $ref: "#/components/schemas/UpdateToken"
          description: A token used for optimistic locking. Network Firewall returns a token to your requests that access the proxy rule. The token marks the state of the proxy rule resource at the time of the request. To make changes to the proxy rule, you provide the token in your request. Network Firewall uses the token to ensure that the proxy rule hasn't changed since you last retrieved it. If it has changed, the operation fails with an InvalidTokenException. If this happens, retrieve the proxy rule again to get a current copy of it with a current token. Reapply your changes as needed, then try the operation again using the new token.
    RuleGroup:
      description: The object that defines the rules in a rule group. This, along with RuleGroupResponse, define the rule group. You can retrieve all objects for a rule group by calling DescribeRuleGroup. Network Firewall uses a rule group to inspect and control network traffic. You define stateless rule groups to inspect individual packets and you define stateful rule groups to inspect packets in the context of their traffic flow. To use a rule group, you include it by reference in an Network Firewall firewall policy, then you use the policy in a firewall. You can reference a rule group from more than one firewall policy, and you can use a firewall policy in more than one firewall.
      type: object
      properties:
        RuleVariables:
          $ref: "#/components/schemas/RuleVariables"
          description: Settings that are available for use in the rules in the rule group. You can only use these for stateful rule groups.
        ReferenceSets:
          $ref: "#/components/schemas/ReferenceSets"
          description: The list of a rule group's reference sets.
        RulesSource:
          $ref: "#/components/schemas/RulesSource"
          description: The stateful rules or stateless rules for the rule group.
        StatefulRuleOptions:
          $ref: "#/components/schemas/StatefulRuleOptions"
          description: Additional options governing how Network Firewall handles stateful rules. The policies where you use your stateful rule group must have stateful rule options settings that are compatible with these settings. Some limitations apply; for more information, see Strict evaluation order in the Network Firewall Developer Guide.
      required:
        - RulesSource
    RuleVariables:
      description: Settings that are available for use in the rules in the RuleGroup where this is defined. See CreateRuleGroup or UpdateRuleGroup for usage.
      type: object
      properties:
        IPSets:
          type: object
          properties: {}
          description: A list of IP addresses and address ranges, in CIDR notation.
        PortSets:
          type: object
          properties: {}
          description: A list of port ranges.
    ReferenceSets:
      description: Contains a set of IP set references.
      type: object
      properties:
        IPSetReferences:
          type: object
          properties: {}
          description: The list of IP set references.
    RulesSource:
      description: The stateless or stateful rules definitions for use in a single rule group. Each rule group requires a single RulesSource. You can use an instance of this for either stateless rules or stateful rules.
      type: object
      properties:
        RulesString:
          $ref: "#/components/schemas/RulesString"
          description: Stateful inspection criteria, provided in Suricata compatible rules. Suricata is an open-source threat detection framework that includes a standard rule-based language for network traffic inspection. These rules contain the inspection criteria and the action to take for traffic that matches the criteria, so this type of rule group doesn't have a separate action setting. You can't use the priority keyword if the RuleOrder option in StatefulRuleOptions is set to STRICT_ORDER.
        RulesSourceList:
          $ref: "#/components/schemas/RulesSourceList"
          description: Stateful inspection criteria for a domain list rule group.
        StatefulRules:
          $ref: "#/components/schemas/StatefulRules"
          description: An array of individual stateful rules inspection criteria to be used together in a stateful rule group. Use this option to specify simple Suricata rules with protocol, source and destination, ports, direction, and rule options. For information about the Suricata Rules format, see Rules Format.
        StatelessRulesAndCustomActions:
          $ref: "#/components/schemas/StatelessRulesAndCustomActions"
          description: Stateless inspection criteria to be used in a stateless rule group.
    RulesString:
      type: string
      minLength: 0
      maxLength: 2000000
    RulesSourceList:
      description: Stateful inspection criteria for a domain list rule group. For HTTPS traffic, domain filtering is SNI-based. It uses the server name indicator extension of the TLS handshake. By default, Network Firewall domain list inspection only includes traffic coming from the VPC where you deploy the firewall. To inspect traffic from IP addresses outside of the deployment VPC, you set the HOME_NET rule variable to include the CIDR range of the deployment VPC plus the other CIDR ranges. For more information, see RuleVariables in this guide and Stateful domain list rule groups in Network Firewall in the Network Firewall Developer Guide.
      type: object
      properties:
        Targets:
          $ref: "#/components/schemas/RuleTargets"
          description: "The domains that you want to inspect for in your traffic flows. Valid domain specifications are the following: Explicit names. For example, abc.example.com matches only the domain abc.example.com. Names that use a domain wildcard, which you indicate with an initial '.'. For example,.example.com matches example.com and matches all subdomains of example.com, such as abc.example.com and www.example.com."
        TargetTypes:
          $ref: "#/components/schemas/TargetTypes"
          description: The protocols you want to inspect. Specify TLS_SNI for HTTPS. Specify HTTP_HOST for HTTP. You can specify either or both.
        GeneratedRulesType:
          $ref: "#/components/schemas/GeneratedRulesType"
          description: Whether you want to apply allow, reject, alert, or drop behavior to the domains in your target list. When logging is enabled and you choose Alert, traffic that matches the domain specifications generates an alert in the firewall's logs. Then, traffic either passes, is rejected, or drops based on other rules in the firewall policy.
      required:
        - Targets
        - TargetTypes
        - GeneratedRulesType
    RuleTargets:
      type: array
      items:
        $ref: "#/components/schemas/CollectionMember_String"
    TargetTypes:
      type: array
      items:
        $ref: "#/components/schemas/TargetType"
    TargetType:
      type: string
      enum:
        - TLS_SNI
        - HTTP_HOST
    GeneratedRulesType:
      type: string
      enum:
        - ALLOWLIST
        - DENYLIST
        - REJECTLIST
        - ALERTLIST
    StatefulRules:
      type: array
      items:
        $ref: "#/components/schemas/StatefulRule"
    StatefulRule:
      description: A single Suricata rules specification, for use in a stateful rule group. Use this option to specify a simple Suricata rule with protocol, source and destination, ports, direction, and rule options. For information about the Suricata Rules format, see Rules Format.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/StatefulAction"
          description: "Defines what Network Firewall should do with the packets in a traffic flow when the flow matches the stateful rule criteria. For all actions, Network Firewall performs the specified action and discontinues stateful inspection of the traffic flow. The actions for a stateful rule are defined as follows: PASS - Permits the packets to go to the intended destination. DROP - Blocks the packets from going to the intended destination and sends an alert log message, if alert logging is configured in the Firewall LoggingConfiguration. ALERT - Sends an alert log message, if alert logging is configured in the Firewall LoggingConfiguration. You can use this action to test a rule that you intend to use to drop traffic. You can enable the rule with ALERT action, verify in the logs that the rule is filtering as you want, then change the action to DROP. REJECT - Drops traffic that matches the conditions of the stateful rule, and sends a TCP reset packet back to sender of the packet. A TCP reset packet is a packet with no payload and an RST bit contained in the TCP header flags. REJECT is available only for TCP traffic. This option doesn't support FTP or IMAP protocols."
        Header:
          $ref: "#/components/schemas/Header"
          description: The stateful inspection criteria for this rule, used to inspect traffic flows.
        RuleOptions:
          $ref: "#/components/schemas/RuleOptions"
          description: Additional options for the rule. These are the Suricata RuleOptions settings.
      required:
        - Action
        - Header
        - RuleOptions
    StatefulAction:
      type: string
      enum:
        - PASS
        - DROP
        - ALERT
        - REJECT
    Header:
      description: The basic rule criteria for Network Firewall to use to inspect packet headers in stateful traffic flow inspection. Traffic flows that match the criteria are a match for the corresponding StatefulRule.
      type: object
      properties:
        Protocol:
          $ref: "#/components/schemas/StatefulRuleProtocol"
          description: The protocol to inspect for. To specify all, you can use IP, because all traffic on Amazon Web Services and on the internet is IP.
        Source:
          $ref: "#/components/schemas/Source"
          description: "The source IP address or address range to inspect for, in CIDR notation. To match with any address, specify ANY. Specify an IP address or a block of IP addresses in Classless Inter-Domain Routing (CIDR) notation. Network Firewall supports all address ranges for IPv4 and IPv6. Examples: To configure Network Firewall to inspect for the IP address 192.0.2.44, specify 192.0.2.44/32. To configure Network Firewall to inspect for IP addresses from 192.0.2.0 to 192.0.2.255, specify 192.0.2.0/24. To configure Network Firewall to inspect for the IP address 1111:0000:0000:0000:0000:0000:0000:0111, specify 1111:0000:0000:0000:0000:0000:0000:0111/128. To configure Network Firewall to inspect for IP addresses from 1111:0000:0000:0000:0000:0000:0000:0000 to 1111:0000:0000:0000:ffff:ffff:ffff:ffff, specify 1111:0000:0000:0000:0000:0000:0000:0000/64. For more information about CIDR notation, see the Wikipedia entry Classless Inter-Domain Routing."
        SourcePort:
          $ref: "#/components/schemas/Port"
          description: The source port to inspect for. You can specify an individual port, for example 1994 and you can specify a port range, for example 1990:1994. To match with any port, specify ANY.
        Direction:
          $ref: "#/components/schemas/StatefulRuleDirection"
          description: The direction of traffic flow to inspect. If set to ANY, the inspection matches bidirectional traffic, both from the source to the destination and from the destination to the source. If set to FORWARD, the inspection only matches traffic going from the source to the destination.
        Destination:
          $ref: "#/components/schemas/Destination"
          description: "The destination IP address or address range to inspect for, in CIDR notation. To match with any address, specify ANY. Specify an IP address or a block of IP addresses in Classless Inter-Domain Routing (CIDR) notation. Network Firewall supports all address ranges for IPv4 and IPv6. Examples: To configure Network Firewall to inspect for the IP address 192.0.2.44, specify 192.0.2.44/32. To configure Network Firewall to inspect for IP addresses from 192.0.2.0 to 192.0.2.255, specify 192.0.2.0/24. To configure Network Firewall to inspect for the IP address 1111:0000:0000:0000:0000:0000:0000:0111, specify 1111:0000:0000:0000:0000:0000:0000:0111/128. To configure Network Firewall to inspect for IP addresses from 1111:0000:0000:0000:0000:0000:0000:0000 to 1111:0000:0000:0000:ffff:ffff:ffff:ffff, specify 1111:0000:0000:0000:0000:0000:0000:0000/64. For more information about CIDR notation, see the Wikipedia entry Classless Inter-Domain Routing."
        DestinationPort:
          $ref: "#/components/schemas/Port"
          description: The destination port to inspect for. You can specify an individual port, for example 1994 and you can specify a port range, for example 1990:1994. To match with any port, specify ANY.
      required:
        - Protocol
        - Source
        - SourcePort
        - Direction
        - Destination
        - DestinationPort
    StatefulRuleProtocol:
      type: string
      enum:
        - IP
        - TCP
        - UDP
        - ICMP
        - HTTP
        - FTP
        - TLS
        - SMB
        - DNS
        - DCERPC
        - SSH
        - SMTP
        - IMAP
        - MSN
        - KRB5
        - IKEV2
        - TFTP
        - NTP
        - DHCP
        - HTTP2
        - QUIC
    Source:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^.*$
    Port:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^.*$
    StatefulRuleDirection:
      type: string
      enum:
        - FORWARD
        - ANY
    Destination:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^.*$
    RuleOptions:
      type: array
      items:
        $ref: "#/components/schemas/RuleOption"
    RuleOption:
      description: Additional settings for a stateful rule. This is part of the StatefulRule configuration.
      type: object
      properties:
        Keyword:
          $ref: "#/components/schemas/Keyword"
          description: The keyword for the Suricata compatible rule option. You must include a sid (signature ID), and can optionally include other keywords. For information about Suricata compatible keywords, see Rule options in the Suricata documentation.
        Settings:
          $ref: "#/components/schemas/Settings"
          description: The settings of the Suricata compatible rule option. Rule options have zero or more setting values, and the number of possible and required settings depends on the Keyword. For more information about the settings for specific options, see Rule options.
      required:
        - Keyword
    Keyword:
      type: string
      minLength: 1
      maxLength: 128
      pattern: .*
    Settings:
      type: array
      items:
        $ref: "#/components/schemas/Setting"
    Setting:
      type: string
      minLength: 1
      maxLength: 8192
      pattern: .*
    StatelessRulesAndCustomActions:
      description: Stateless inspection criteria. Each stateless rule group uses exactly one of these data types to define its stateless rules.
      type: object
      properties:
        StatelessRules:
          $ref: "#/components/schemas/StatelessRules"
          description: Defines the set of stateless rules for use in a stateless rule group.
        CustomActions:
          $ref: "#/components/schemas/CustomActions"
          description: Defines an array of individual custom action definitions that are available for use by the stateless rules in this StatelessRulesAndCustomActions specification. You name each custom action that you define, and then you can use it by name in your StatelessRule RuleDefinition Actions specification.
      required:
        - StatelessRules
    StatelessRules:
      type: array
      items:
        $ref: "#/components/schemas/StatelessRule"
    StatelessRule:
      description: A single stateless rule. This is used in StatelessRulesAndCustomActions.
      type: object
      properties:
        RuleDefinition:
          $ref: "#/components/schemas/RuleDefinition"
          description: Defines the stateless 5-tuple packet inspection criteria and the action to take on a packet that matches the criteria.
        Priority:
          $ref: "#/components/schemas/Priority"
          description: Indicates the order in which to run this rule relative to all of the rules that are defined for a stateless rule group. Network Firewall evaluates the rules in a rule group starting with the lowest priority setting. You must ensure that the priority settings are unique for the rule group. Each stateless rule group uses exactly one StatelessRulesAndCustomActions object, and each StatelessRulesAndCustomActions contains exactly one StatelessRules object. To ensure unique priority settings for your rule groups, set unique priorities for the stateless rules that you define inside any single StatelessRules object. You can change the priority settings of your rules at any time. To make it easier to insert rules later, number them so there's a wide range in between, for example use 100, 200, and so on.
      required:
        - RuleDefinition
        - Priority
    RuleDefinition:
      description: The inspection criteria and action for a single stateless rule. Network Firewall inspects each packet for the specified matching criteria. When a packet matches the criteria, Network Firewall performs the rule's actions on the packet.
      type: object
      properties:
        MatchAttributes:
          $ref: "#/components/schemas/MatchAttributes"
          description: Criteria for Network Firewall to use to inspect an individual packet in stateless rule inspection. Each match attributes set can include one or more items such as IP address, CIDR range, port number, protocol, and TCP flags.
        Actions:
          $ref: "#/components/schemas/StatelessActions"
          description: The actions to take on a packet that matches one of the stateless rule definition's match attributes. You must specify a standard action and you can add custom actions. Network Firewall only forwards a packet for stateful rule inspection if you specify aws:forward_to_sfe for a rule that the packet matches, or if the packet doesn't match any stateless rule and you specify aws:forward_to_sfe for the StatelessDefaultActions setting for the FirewallPolicy. For every rule, you must specify exactly one of the following standard actions. aws:pass - Discontinues all inspection of the packet and permits it to go to its intended destination. aws:drop - Discontinues all inspection of the packet and blocks it from going to its intended destination. aws:forward_to_sfe - Discontinues stateless inspection of the packet and forwards it to the stateful rule engine for inspection. Additionally, you can specify a custom action. To do this, you define a custom action by name and type, then provide the name you've assigned to the action in this Actions setting. For information about the options, see CustomAction. To provide more than one action in this setting, separate the settings with a comma. For example, if you have a custom PublishMetrics action that you've named MyMetricsAction, then you could specify the standard action aws:pass and the custom action with [“aws:pass”, “MyMetricsAction”].
      required:
        - MatchAttributes
        - Actions
    MatchAttributes:
      description: Criteria for Network Firewall to use to inspect an individual packet in stateless rule inspection. Each match attributes set can include one or more items such as IP address, CIDR range, port number, protocol, and TCP flags.
      type: object
      properties:
        Sources:
          $ref: "#/components/schemas/Addresses"
          description: The source IP addresses and address ranges to inspect for, in CIDR notation. If not specified, this matches with any source address.
        Destinations:
          $ref: "#/components/schemas/Addresses"
          description: The destination IP addresses and address ranges to inspect for, in CIDR notation. If not specified, this matches with any destination address.
        SourcePorts:
          $ref: "#/components/schemas/PortRanges"
          description: The source port to inspect for. You can specify an individual port, for example 1994 and you can specify a port range, for example 1990:1994. To match with any port, specify ANY. If not specified, this matches with any source port. This setting is only used for protocols 6 (TCP) and 17 (UDP).
        DestinationPorts:
          $ref: "#/components/schemas/PortRanges"
          description: The destination port to inspect for. You can specify an individual port, for example 1994 and you can specify a port range, for example 1990:1994. To match with any port, specify ANY. This setting is only used for protocols 6 (TCP) and 17 (UDP).
        Protocols:
          $ref: "#/components/schemas/ProtocolNumbers"
          description: The protocols to inspect for, specified using the assigned internet protocol number (IANA) for each protocol. If not specified, this matches with any protocol.
        TCPFlags:
          $ref: "#/components/schemas/TCPFlags"
          description: The TCP flags and masks to inspect for. If not specified, this matches with any settings. This setting is only used for protocol 6 (TCP).
    Addresses:
      type: array
      items:
        $ref: "#/components/schemas/Address"
    Address:
      description: A single IP address specification. This is used in the MatchAttributes source and destination specifications.
      type: object
      properties:
        AddressDefinition:
          $ref: "#/components/schemas/AddressDefinition"
          description: "Specify an IP address or a block of IP addresses in Classless Inter-Domain Routing (CIDR) notation. Network Firewall supports all address ranges for IPv4 and IPv6. Examples: To configure Network Firewall to inspect for the IP address 192.0.2.44, specify 192.0.2.44/32. To configure Network Firewall to inspect for IP addresses from 192.0.2.0 to 192.0.2.255, specify 192.0.2.0/24. To configure Network Firewall to inspect for the IP address 1111:0000:0000:0000:0000:0000:0000:0111, specify 1111:0000:0000:0000:0000:0000:0000:0111/128. To configure Network Firewall to inspect for IP addresses from 1111:0000:0000:0000:0000:0000:0000:0000 to 1111:0000:0000:0000:ffff:ffff:ffff:ffff, specify 1111:0000:0000:0000:0000:0000:0000:0000/64. For more information about CIDR notation, see the Wikipedia entry Classless Inter-Domain Routing."
      required:
        - AddressDefinition
    AddressDefinition:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^([a-fA-F\d:\.]+($|/\d{1,3}))$
    PortRanges:
      type: array
      items:
        $ref: "#/components/schemas/PortRange"
    PortRange:
      description: A single port range specification. This is used for source and destination port ranges in the stateless rule MatchAttributes, SourcePorts, and DestinationPorts settings.
      type: object
      properties:
        FromPort:
          $ref: "#/components/schemas/PortRangeBound"
          description: The lower limit of the port range. This must be less than or equal to the ToPort specification.
        ToPort:
          $ref: "#/components/schemas/PortRangeBound"
          description: The upper limit of the port range. This must be greater than or equal to the FromPort specification.
      required:
        - FromPort
        - ToPort
    PortRangeBound:
      type: integer
      minimum: 0
      maximum: 65535
    ProtocolNumbers:
      type: array
      items:
        $ref: "#/components/schemas/ProtocolNumber"
    ProtocolNumber:
      type: integer
      minimum: 0
      maximum: 255
    TCPFlags:
      type: array
      items:
        $ref: "#/components/schemas/TCPFlagField"
    TCPFlagField:
      description: TCP flags and masks to inspect packets for, used in stateless rules MatchAttributes settings.
      type: object
      properties:
        Flags:
          $ref: "#/components/schemas/Flags"
          description: "Used in conjunction with the Masks setting to define the flags that must be set and flags that must not be set in order for the packet to match. This setting can only specify values that are also specified in the Masks setting. For the flags that are specified in the masks setting, the following must be true for the packet to match: The ones that are set in this flags setting must be set in the packet. The ones that are not set in this flags setting must also not be set in the packet."
        Masks:
          $ref: "#/components/schemas/Flags"
          description: The set of flags to consider in the inspection. To inspect all flags in the valid values list, leave this with no setting.
      required:
        - Flags
    Flags:
      type: array
      items:
        $ref: "#/components/schemas/TCPFlag"
    TCPFlag:
      type: string
      enum:
        - FIN
        - SYN
        - RST
        - PSH
        - ACK
        - URG
        - ECE
        - CWR
    StatefulRuleOptions:
      description: Additional options governing how Network Firewall handles the rule group. You can only use these for stateful rule groups.
      type: object
      properties:
        RuleOrder:
          $ref: "#/components/schemas/RuleOrder"
          description: Indicates how to manage the order of the rule evaluation for the rule group. DEFAULT_ACTION_ORDER is the default behavior. Stateful rules are provided to the rule engine as Suricata compatible strings, and Suricata evaluates them based on certain settings. For more information, see Evaluation order for stateful rules in the Network Firewall Developer Guide.
    RuleGroupType:
      type: string
      enum:
        - STATELESS
        - STATEFUL
        - STATEFUL_DOMAIN
    SourceMetadata:
      description: High-level information about the managed rule group that your own rule group is copied from. You can use the the metadata to track version updates made to the originating rule group. You can retrieve all objects for a rule group by calling DescribeRuleGroup.
      type: object
      properties:
        SourceArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the rule group that your own rule group is copied from.
        SourceUpdateToken:
          $ref: "#/components/schemas/UpdateToken"
          description: The update token of the Amazon Web Services managed rule group that your own rule group is copied from. To determine the update token for the managed rule group, call DescribeRuleGroup.
    SummaryConfiguration:
      description: "A complex type that specifies which Suricata rule metadata fields to use when displaying threat information. Contains: RuleOptions - The Suricata rule options fields to extract and display These settings affect how threat information appears in both the console and API responses. Summaries are available for rule groups you manage and for active threat defense Amazon Web Services managed rule groups."
      type: object
      properties:
        RuleOptions:
          $ref: "#/components/schemas/SummaryRuleOptions"
          description: Specifies the selected rule options returned by DescribeRuleGroupSummary.
    SummaryRuleOptions:
      type: array
      items:
        $ref: "#/components/schemas/SummaryRuleOption"
    SummaryRuleOption:
      type: string
      enum:
        - SID
        - MSG
        - METADATA
    CreateRuleGroupResponse:
      type: object
      properties:
        UpdateToken:
          $ref: "#/components/schemas/UpdateToken"
          description: A token used for optimistic locking. Network Firewall returns a token to your requests that access the rule group. The token marks the state of the rule group resource at the time of the request. To make changes to the rule group, you provide the token in your request. Network Firewall uses the token to ensure that the rule group hasn't changed since you last retrieved it. If it has changed, the operation fails with an InvalidTokenException. If this happens, retrieve the rule group again to get a current copy of it with a current token. Reapply your changes as needed, then try the operation again using the new token.
        RuleGroupResponse:
          $ref: "#/components/schemas/RuleGroupResponse"
          description: The high-level properties of a rule group. This, along with the RuleGroup, define the rule group. You can retrieve all objects for a rule group by calling DescribeRuleGroup.
      required:
        - UpdateToken
        - RuleGroupResponse
    RuleGroupResponse:
      description: The high-level properties of a rule group. This, along with the RuleGroup, define the rule group. You can retrieve all objects for a rule group by calling DescribeRuleGroup.
      type: object
      properties:
        RuleGroupArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the rule group. If this response is for a create request that had DryRun set to TRUE, then this ARN is a placeholder that isn't attached to a valid resource.
        RuleGroupName:
          $ref: "#/components/schemas/ResourceName"
          description: The descriptive name of the rule group. You can't change the name of a rule group after you create it.
        RuleGroupId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier for the rule group.
        Description:
          $ref: "#/components/schemas/Description"
          description: A description of the rule group.
        Type:
          $ref: "#/components/schemas/RuleGroupType"
          description: Indicates whether the rule group is stateless or stateful. If the rule group is stateless, it contains stateless rules. If it is stateful, it contains stateful rules.
        Capacity:
          $ref: "#/components/schemas/RuleCapacity"
          description: The maximum operating resources that this rule group can use. Rule group capacity is fixed at creation. When you update a rule group, you are limited to this capacity. When you reference a rule group from a firewall policy, Network Firewall reserves this capacity for the rule group. You can retrieve the capacity that would be required for a rule group before you create the rule group by calling CreateRuleGroup with DryRun set to TRUE.
        RuleGroupStatus:
          $ref: "#/components/schemas/ResourceStatus"
          description: Detailed information about the current status of a rule group.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The key:value pairs to associate with the resource.
        ConsumedCapacity:
          $ref: "#/components/schemas/RuleCapacity"
          description: The number of capacity units currently consumed by the rule group rules.
        NumberOfAssociations:
          $ref: "#/components/schemas/NumberOfAssociations"
          description: The number of firewall policies that use this rule group.
        EncryptionConfiguration:
          $ref: "#/components/schemas/EncryptionConfiguration"
          description: A complex type that contains the Amazon Web Services KMS encryption configuration settings for your rule group.
        SourceMetadata:
          $ref: "#/components/schemas/SourceMetadata"
          description: A complex type that contains metadata about the rule group that your own rule group is copied from. You can use the metadata to track the version updates made to the originating rule group.
        SnsTopic:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the Amazon Simple Notification Service SNS topic that's used to record changes to the managed rule group. You can subscribe to the SNS topic to receive notifications when the managed rule group is modified, such as for new versions and for version expiration. For more information, see the Amazon Simple Notification Service Developer Guide..
        LastModifiedTime:
          $ref: "#/components/schemas/LastUpdateTime"
          description: The last time that the rule group was changed.
        AnalysisResults:
          $ref: "#/components/schemas/AnalysisResultList"
          description: The list of analysis results for AnalyzeRuleGroup. If you set AnalyzeRuleGroup to TRUE in CreateRuleGroup, UpdateRuleGroup, or DescribeRuleGroup, Network Firewall analyzes the rule group and identifies the rules that might adversely effect your firewall's functionality. For example, if Network Firewall detects a rule that's routing traffic asymmetrically, which impacts the service's ability to properly process traffic, the service includes the rule in the list of analysis results.
        SummaryConfiguration:
          $ref: "#/components/schemas/SummaryConfiguration"
          description: A complex type containing the currently selected rule option fields that will be displayed for rule summarization returned by DescribeRuleGroupSummary. The RuleOptions specified in SummaryConfiguration Rule metadata organization preferences
      required:
        - RuleGroupArn
        - RuleGroupName
        - RuleGroupId
    AnalysisResultList:
      type: array
      items:
        $ref: "#/components/schemas/AnalysisResult"
    AnalysisResult:
      description: The analysis result for Network Firewall's stateless rule group analyzer. Every time you call CreateRuleGroup, UpdateRuleGroup, or DescribeRuleGroup on a stateless rule group, Network Firewall analyzes the stateless rule groups in your account and identifies the rules that might adversely effect your firewall's functionality. For example, if Network Firewall detects a rule that's routing traffic asymmetrically, which impacts the service's ability to properly process traffic, the service includes the rule in a list of analysis results. The AnalysisResult data type is not related to traffic analysis reports you generate using StartAnalysisReport. For information on traffic analysis report results, see AnalysisTypeReportResult.
      type: object
      properties:
        IdentifiedRuleIds:
          $ref: "#/components/schemas/RuleIdList"
          description: The priority number of the stateless rules identified in the analysis.
        IdentifiedType:
          $ref: "#/components/schemas/IdentifiedType"
          description: "The types of rule configurations that Network Firewall analyzes your rule groups for. Network Firewall analyzes stateless rule groups for the following types of rule configurations: STATELESS_RULE_FORWARDING_ASYMMETRICALLY Cause: One or more stateless rules with the action pass or forward are forwarding traffic asymmetrically. Specifically, the rule's set of source IP addresses or their associated port numbers, don't match the set of destination IP addresses or their associated port numbers. To mitigate: Make sure that there's an existing return path. For example, if the rule allows traffic from source 10.1.0.0/24 to destination 20.1.0.0/24, you should allow return traffic from source 20.1.0.0/24 to destination 10.1.0.0/24. STATELESS_RULE_CONTAINS_TCP_FLAGS Cause: At least one stateless rule with the action pass orforward contains TCP flags that are inconsistent in the forward and return directions. To mitigate: Prevent asymmetric routing issues caused by TCP flags by following these actions: Remove unnecessary TCP flag inspections from the rules. If you need to inspect TCP flags, check that the rules correctly account for changes in TCP flags throughout the TCP connection cycle, for example SYN and ACK flags used in a 3-way TCP handshake."
        AnalysisDetail:
          $ref: "#/components/schemas/CollectionMember_String"
          description: Provides analysis details for the identified rule.
    RuleIdList:
      type: array
      items:
        $ref: "#/components/schemas/CollectionMember_String"
    IdentifiedType:
      type: string
      enum:
        - STATELESS_RULE_FORWARDING_ASYMMETRICALLY
        - STATELESS_RULE_CONTAINS_TCP_FLAGS
    TLSInspectionConfiguration:
      description: The object that defines a TLS inspection configuration. This, along with TLSInspectionConfigurationResponse, define the TLS inspection configuration. You can retrieve all objects for a TLS inspection configuration by calling DescribeTLSInspectionConfiguration. Network Firewall uses a TLS inspection configuration to decrypt traffic. Network Firewall re-encrypts the traffic before sending it to its destination. To use a TLS inspection configuration, you add it to a new Network Firewall firewall policy, then you apply the firewall policy to a firewall. Network Firewall acts as a proxy service to decrypt and inspect the traffic traveling through your firewalls. You can reference a TLS inspection configuration from more than one firewall policy, and you can use a firewall policy in more than one firewall. For more information about using TLS inspection configurations, see Inspecting SSL/TLS traffic with TLS inspection configurations in the Network Firewall Developer Guide.
      type: object
      properties:
        ServerCertificateConfigurations:
          $ref: "#/components/schemas/ServerCertificateConfigurations"
          description: Lists the server certificate configurations that are associated with the TLS configuration.
    ServerCertificateConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/ServerCertificateConfiguration"
    ServerCertificateConfiguration:
      description: Configures the Certificate Manager certificates and scope that Network Firewall uses to decrypt and re-encrypt traffic using a TLSInspectionConfiguration. You can configure ServerCertificates for inbound SSL/TLS inspection, a CertificateAuthorityArn for outbound SSL/TLS inspection, or both. For information about working with certificates for TLS inspection, see Using SSL/TLS server certficiates with TLS inspection configurations in the Network Firewall Developer Guide. If a server certificate that's associated with your TLSInspectionConfiguration is revoked, deleted, or expired it can result in client-side TLS errors.
      type: object
      properties:
        ServerCertificates:
          $ref: "#/components/schemas/ServerCertificates"
          description: The list of server certificates to use for inbound SSL/TLS inspection.
        Scopes:
          $ref: "#/components/schemas/ServerCertificateScopes"
          description: A list of scopes.
        CertificateAuthorityArn:
          $ref: "#/components/schemas/ResourceArn"
          description: "The Amazon Resource Name (ARN) of the imported certificate authority (CA) certificate within Certificate Manager (ACM) to use for outbound SSL/TLS inspection. The following limitations apply: You can use CA certificates that you imported into ACM, but you can't generate CA certificates with ACM. You can't use certificates issued by Private Certificate Authority. For more information about configuring certificates for outbound inspection, see Using SSL/TLS certificates with TLS inspection configurations in the Network Firewall Developer Guide. For information about working with certificates in ACM, see Importing certificates in the Certificate Manager User Guide."
        CheckCertificateRevocationStatus:
          $ref: "#/components/schemas/CheckCertificateRevocationStatusActions"
          description: When enabled, Network Firewall checks if the server certificate presented by the server in the SSL/TLS connection has a revoked or unkown status. If the certificate has an unknown or revoked status, you must specify the actions that Network Firewall takes on outbound traffic. To check the certificate revocation status, you must also specify a CertificateAuthorityArn in ServerCertificateConfiguration.
    ServerCertificates:
      type: array
      items:
        $ref: "#/components/schemas/ServerCertificate"
    ServerCertificate:
      description: Any Certificate Manager (ACM) Secure Sockets Layer/Transport Layer Security (SSL/TLS) server certificate that's associated with a ServerCertificateConfiguration. Used in a TLSInspectionConfiguration for inspection of inbound traffic to your firewall. You must request or import a SSL/TLS certificate into ACM for each domain Network Firewall needs to decrypt and inspect. Network Firewall uses the SSL/TLS certificates to decrypt specified inbound SSL/TLS traffic going to your firewall. For information about working with certificates in Certificate Manager, see Request a public certificate or Importing certificates in the Certificate Manager User Guide.
      type: object
      properties:
        ResourceArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the Certificate Manager SSL/TLS server certificate that's used for inbound SSL/TLS inspection.
    ServerCertificateScopes:
      type: array
      items:
        $ref: "#/components/schemas/ServerCertificateScope"
    ServerCertificateScope:
      description: Settings that define the Secure Sockets Layer/Transport Layer Security (SSL/TLS) traffic that Network Firewall should decrypt for inspection by the stateful rule engine.
      type: object
      properties:
        Sources:
          $ref: "#/components/schemas/Addresses"
          description: The source IP addresses and address ranges to decrypt for inspection, in CIDR notation. If not specified, this matches with any source address.
        Destinations:
          $ref: "#/components/schemas/Addresses"
          description: The destination IP addresses and address ranges to decrypt for inspection, in CIDR notation. If not specified, this matches with any destination address.
        SourcePorts:
          $ref: "#/components/schemas/PortRanges"
          description: The source ports to decrypt for inspection, in Transmission Control Protocol (TCP) format. If not specified, this matches with any source port. You can specify individual ports, for example 1994, and you can specify port ranges, such as 1990:1994.
        DestinationPorts:
          $ref: "#/components/schemas/PortRanges"
          description: The destination ports to decrypt for inspection, in Transmission Control Protocol (TCP) format. If not specified, this matches with any destination port. You can specify individual ports, for example 1994, and you can specify port ranges, such as 1990:1994.
        Protocols:
          $ref: "#/components/schemas/ProtocolNumbers"
          description: The protocols to inspect for, specified using the assigned internet protocol number (IANA) for each protocol. If not specified, this matches with any protocol. Network Firewall currently supports only TCP.
    CheckCertificateRevocationStatusActions:
      description: Defines the actions to take on the SSL/TLS connection if the certificate presented by the server in the connection has a revoked or unknown status.
      type: object
      properties:
        RevokedStatusAction:
          $ref: "#/components/schemas/RevocationCheckAction"
          description: Configures how Network Firewall processes traffic when it determines that the certificate presented by the server in the SSL/TLS connection has a revoked status. PASS - Allow the connection to continue, and pass subsequent packets to the stateful engine for inspection. DROP - Network Firewall closes the connection and drops subsequent packets for that connection. REJECT - Network Firewall sends a TCP reject packet back to your client. The service closes the connection and drops subsequent packets for that connection. REJECT is available only for TCP traffic.
        UnknownStatusAction:
          $ref: "#/components/schemas/RevocationCheckAction"
          description: Configures how Network Firewall processes traffic when it determines that the certificate presented by the server in the SSL/TLS connection has an unknown status, or a status that cannot be determined for any other reason, including when the service is unable to connect to the OCSP and CRL endpoints for the certificate. PASS - Allow the connection to continue, and pass subsequent packets to the stateful engine for inspection. DROP - Network Firewall closes the connection and drops subsequent packets for that connection. REJECT - Network Firewall sends a TCP reject packet back to your client. The service closes the connection and drops subsequent packets for that connection. REJECT is available only for TCP traffic.
    RevocationCheckAction:
      type: string
      enum:
        - PASS
        - DROP
        - REJECT
    CreateTLSInspectionConfigurationResponse:
      type: object
      properties:
        UpdateToken:
          $ref: "#/components/schemas/UpdateToken"
          description: A token used for optimistic locking. Network Firewall returns a token to your requests that access the TLS inspection configuration. The token marks the state of the TLS inspection configuration resource at the time of the request. To make changes to the TLS inspection configuration, you provide the token in your request. Network Firewall uses the token to ensure that the TLS inspection configuration hasn't changed since you last retrieved it. If it has changed, the operation fails with an InvalidTokenException. If this happens, retrieve the TLS inspection configuration again to get a current copy of it with a current token. Reapply your changes as needed, then try the operation again using the new token.
        TLSInspectionConfigurationResponse:
          $ref: "#/components/schemas/TLSInspectionConfigurationResponse"
          description: The high-level properties of a TLS inspection configuration. This, along with the TLSInspectionConfiguration, define the TLS inspection configuration. You can retrieve all objects for a TLS inspection configuration by calling DescribeTLSInspectionConfiguration.
      required:
        - UpdateToken
        - TLSInspectionConfigurationResponse
    TLSInspectionConfigurationResponse:
      description: The high-level properties of a TLS inspection configuration. This, along with the TLSInspectionConfiguration, define the TLS inspection configuration. You can retrieve all objects for a TLS inspection configuration by calling DescribeTLSInspectionConfiguration.
      type: object
      properties:
        TLSInspectionConfigurationArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the TLS inspection configuration.
        TLSInspectionConfigurationName:
          $ref: "#/components/schemas/ResourceName"
          description: The descriptive name of the TLS inspection configuration. You can't change the name of a TLS inspection configuration after you create it.
        TLSInspectionConfigurationId:
          $ref: "#/components/schemas/ResourceId"
          description: A unique identifier for the TLS inspection configuration. This ID is returned in the responses to create and list commands. You provide it to operations such as update and delete.
        TLSInspectionConfigurationStatus:
          $ref: "#/components/schemas/ResourceStatus"
          description: Detailed information about the current status of a TLSInspectionConfiguration. You can retrieve this for a TLS inspection configuration by calling DescribeTLSInspectionConfiguration and providing the TLS inspection configuration name and ARN.
        Description:
          $ref: "#/components/schemas/Description"
          description: A description of the TLS inspection configuration.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The key:value pairs to associate with the resource.
        LastModifiedTime:
          $ref: "#/components/schemas/LastUpdateTime"
          description: The last time that the TLS inspection configuration was changed.
        NumberOfAssociations:
          $ref: "#/components/schemas/NumberOfAssociations"
          description: The number of firewall policies that use this TLS inspection configuration.
        EncryptionConfiguration:
          $ref: "#/components/schemas/EncryptionConfiguration"
          description: A complex type that contains the Amazon Web Services KMS encryption configuration settings for your TLS inspection configuration.
        Certificates:
          $ref: "#/components/schemas/Certificates"
          description: A list of the certificates associated with the TLS inspection configuration.
        CertificateAuthority:
          $ref: "#/components/schemas/TlsCertificateData"
      required:
        - TLSInspectionConfigurationArn
        - TLSInspectionConfigurationName
        - TLSInspectionConfigurationId
    Certificates:
      type: array
      items:
        $ref: "#/components/schemas/TlsCertificateData"
    TlsCertificateData:
      description: Contains metadata about an Certificate Manager certificate.
      type: object
      properties:
        CertificateArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the certificate.
        CertificateSerial:
          $ref: "#/components/schemas/CollectionMember_String"
          description: The serial number of the certificate.
        Status:
          $ref: "#/components/schemas/CollectionMember_String"
          description: The status of the certificate.
        StatusMessage:
          $ref: "#/components/schemas/StatusReason"
          description: Contains details about the certificate status, including information about certificate errors.
    StatusReason:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^[a-zA-Z0-9- ]+$
    CreateVpcEndpointAssociationResponse:
      type: object
      properties:
        VpcEndpointAssociation:
          $ref: "#/components/schemas/VpcEndpointAssociation"
          description: The configuration settings for the VPC endpoint association. These settings include the firewall and the VPC and subnet to use for the firewall endpoint.
        VpcEndpointAssociationStatus:
          $ref: "#/components/schemas/VpcEndpointAssociationStatus"
          description: Detailed information about the current status of a VpcEndpointAssociation. You can retrieve this by calling DescribeVpcEndpointAssociation and providing the VPC endpoint association ARN.
    VpcEndpointAssociation:
      description: "A VPC endpoint association defines a single subnet to use for a firewall endpoint for a Firewall. You can define VPC endpoint associations only in the Availability Zones that already have a subnet mapping defined in the Firewall resource. You can retrieve the list of Availability Zones that are available for use by calling DescribeFirewallMetadata. To manage firewall endpoints, first, in the Firewall specification, you specify a single VPC and one subnet for each of the Availability Zones where you want to use the firewall. Then you can define additional endpoints as VPC endpoint associations. You can use VPC endpoint associations to expand the protections of the firewall as follows: Protect multiple VPCs with a single firewall - You can use the firewall to protect other VPCs, either in your account or in accounts where the firewall is shared. You can only specify Availability Zones that already have a firewall endpoint defined in the Firewall subnet mappings. Define multiple firewall endpoints for a VPC in an Availability Zone - You can create additional firewall endpoints for the VPC that you have defined in the firewall, in any Availability Zone that already has an endpoint defined in the Firewall subnet mappings. You can create multiple VPC endpoint associations for any other VPC where you use the firewall. You can use Resource Access Manager to share a Firewall that you own with other accounts, which gives them the ability to use the firewall to create VPC endpoint associations. For information about sharing a firewall, see PutResourcePolicy in this guide and see Sharing Network Firewall resources in the Network Firewall Developer Guide. The status of the VPC endpoint association, which indicates whether it's ready to filter network traffic, is provided in the corresponding VpcEndpointAssociationStatus. You can retrieve both the association and its status by calling DescribeVpcEndpointAssociation."
      type: object
      properties:
        VpcEndpointAssociationId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier of the VPC endpoint association.
        VpcEndpointAssociationArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of a VPC endpoint association.
        FirewallArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the firewall.
        VpcId:
          $ref: "#/components/schemas/VpcId"
          description: The unique identifier of the VPC for the endpoint association.
        SubnetMapping:
          $ref: "#/components/schemas/SubnetMapping"
        Description:
          $ref: "#/components/schemas/Description"
          description: A description of the VPC endpoint association.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The key:value pairs to associate with the resource.
