          description: A boolean that reflects whether or not the firewall monitoring dashboard is enabled on a firewall. Returns TRUE when the firewall monitoring dashboard is enabled on the firewall. Returns FALSE when the firewall monitoring dashboard is not enabled on the firewall.
    LoggingConfiguration:
      description: Defines how Network Firewall performs logging for a Firewall.
      type: object
      properties:
        LogDestinationConfigs:
          $ref: "#/components/schemas/LogDestinationConfigs"
          description: Defines the logging destinations for the logs for a firewall. Network Firewall generates logs for stateful rule groups.
      required:
        - LogDestinationConfigs
    LogDestinationConfigs:
      type: array
      items:
        $ref: "#/components/schemas/LogDestinationConfig"
    LogDestinationConfig:
      description: Defines where Network Firewall sends logs for the firewall for one log type. This is used in LoggingConfiguration. You can send each type of log to an Amazon S3 bucket, a CloudWatch log group, or a Firehose delivery stream. Network Firewall generates logs for stateful rule groups. You can save alert, flow, and TLS log types.
      type: object
      properties:
        LogType:
          $ref: "#/components/schemas/LogType"
          description: The type of log to record. You can record the following types of logs from your Network Firewall stateful engine. ALERT - Logs for traffic that matches your stateful rules and that have an action that sends an alert. A stateful rule sends alerts for the rule actions DROP, ALERT, and REJECT. For more information, see StatefulRule. FLOW - Standard network traffic flow logs. The stateful rules engine records flow logs for all network traffic that it receives. Each flow log record captures the network flow for a specific standard stateless rule group. TLS - Logs for events that are related to TLS inspection. For more information, see Inspecting SSL/TLS traffic with TLS inspection configurations in the Network Firewall Developer Guide.
        LogDestinationType:
          $ref: "#/components/schemas/LogDestinationType"
          description: The type of storage destination to send these logs to. You can send logs to an Amazon S3 bucket, a CloudWatch log group, or a Firehose delivery stream.
        LogDestination:
          type: object
          properties: {}
          description: 'The named location for the logs, provided in a key:value mapping that is specific to the chosen destination type. For an Amazon S3 bucket, provide the name of the bucket, with key bucketName, and optionally provide a prefix, with key prefix. The following example specifies an Amazon S3 bucket named DOC-EXAMPLE-BUCKET and the prefix alerts: "LogDestination": { "bucketName": "DOC-EXAMPLE-BUCKET", "prefix": "alerts" } For a CloudWatch log group, provide the name of the CloudWatch log group, with key logGroup. The following example specifies a log group named alert-log-group: "LogDestination": { "logGroup": "alert-log-group" } For a Firehose delivery stream, provide the name of the delivery stream, with key deliveryStream. The following example specifies a delivery stream named alert-delivery-stream: "LogDestination": { "deliveryStream": "alert-delivery-stream" }'
      required:
        - LogType
        - LogDestinationType
        - LogDestination
    LogType:
      type: string
      enum:
        - ALERT
        - FLOW
        - TLS
    LogDestinationType:
      type: string
      enum:
        - S3
        - CloudWatchLogs
        - KinesisDataFirehose
      minLength: 2
      maxLength: 30
      pattern: "[0-9A-Za-z]+"
    EnableMonitoringDashboard:
      type: boolean
