      type: array
      items:
        $ref: "#/components/schemas/EnabledAnalysisType"
    EnabledAnalysisType:
      type: string
      enum:
        - TLS_SNI
        - HTTP_HOST
    TransitGatewayId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^tgw-[0-9a-z]+$
    CreateFirewallResponse:
      type: object
      properties:
        Firewall:
          $ref: "#/components/schemas/Firewall"
          description: The configuration settings for the firewall. These settings include the firewall policy and the subnets in your VPC to use for the firewall endpoints.
        FirewallStatus:
          $ref: "#/components/schemas/FirewallStatus"
          description: Detailed information about the current status of a Firewall. You can retrieve this for a firewall by calling DescribeFirewall and providing the firewall name and ARN. The firewall status indicates a combined status. It indicates whether all subnets are up-to-date with the latest firewall configurations, which is based on the sync states config values, and also whether all subnets have their endpoints fully enabled, based on their sync states attachment values.
    Firewall:
      description: A firewall defines the behavior of a firewall, the main VPC where the firewall is used, the Availability Zones where the firewall can be used, and one subnet to use for a firewall endpoint within each of the Availability Zones. The Availability Zones are defined implicitly in the subnet specifications. In addition to the firewall endpoints that you define in this Firewall specification, you can create firewall endpoints in VpcEndpointAssociation resources for any VPC, in any Availability Zone where the firewall is already in use. The status of the firewall, for example whether it's ready to filter network traffic, is provided in the corresponding FirewallStatus. You can retrieve both the firewall and firewall status by calling DescribeFirewall.
      type: object
      properties:
        FirewallName:
          $ref: "#/components/schemas/ResourceName"
          description: The descriptive name of the firewall. You can't change the name of a firewall after you create it.
        FirewallArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the firewall.
        FirewallPolicyArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the firewall policy. The relationship of firewall to firewall policy is many to one. Each firewall requires one firewall policy association, and you can use the same firewall policy for multiple firewalls.
        VpcId:
          $ref: "#/components/schemas/VpcId"
          description: The unique identifier of the VPC where the firewall is in use.
        SubnetMappings:
          $ref: "#/components/schemas/SubnetMappings"
          description: The primary public subnets that Network Firewall is using for the firewall. Network Firewall creates a firewall endpoint in each subnet. Create a subnet mapping for each Availability Zone where you want to use the firewall. These subnets are all defined for a single, primary VPC, and each must belong to a different Availability Zone. Each of these subnets establishes the availability of the firewall in its Availability Zone. In addition to these subnets, you can define other endpoints for the firewall in VpcEndpointAssociation resources. You can define these additional endpoints for any VPC, and for any of the Availability Zones where the firewall resource already has a subnet mapping. VPC endpoint associations give you the ability to protect multiple VPCs using a single firewall, and to define multiple firewall endpoints for a VPC in a single Availability Zone.
        DeleteProtection:
          $ref: "#/components/schemas/Boolean"
          description: A flag indicating whether it is possible to delete the firewall. A setting of TRUE indicates that the firewall is protected against deletion. Use this setting to protect against accidentally deleting a firewall that is in use. When you create a firewall, the operation initializes this flag to TRUE.
        SubnetChangeProtection:
          $ref: "#/components/schemas/Boolean"
          description: A setting indicating whether the firewall is protected against changes to the subnet associations. Use this setting to protect against accidentally modifying the subnet associations for a firewall that is in use. When you create a firewall, the operation initializes this setting to TRUE.
        FirewallPolicyChangeProtection:
          $ref: "#/components/schemas/Boolean"
          description: A setting indicating whether the firewall is protected against a change to the firewall policy association. Use this setting to protect against accidentally modifying the firewall policy for a firewall that is in use. When you create a firewall, the operation initializes this setting to TRUE.
        Description:
          $ref: "#/components/schemas/Description"
          description: A description of the firewall.
        FirewallId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier for the firewall.
        Tags:
          $ref: "#/components/schemas/TagList"
        EncryptionConfiguration:
          $ref: "#/components/schemas/EncryptionConfiguration"
          description: A complex type that contains the Amazon Web Services KMS encryption configuration settings for your firewall.
        NumberOfAssociations:
          $ref: "#/components/schemas/NumberOfAssociations"
          description: The number of VpcEndpointAssociation resources that use this firewall.
        EnabledAnalysisTypes:
          $ref: "#/components/schemas/EnabledAnalysisTypes"
          description: An optional setting indicating the specific traffic analysis types to enable on the firewall.
        TransitGatewayId:
          $ref: "#/components/schemas/TransitGatewayId"
          description: The unique identifier of the transit gateway associated with this firewall. This field is only present for transit gateway-attached firewalls.
        TransitGatewayOwnerAccountId:
          $ref: "#/components/schemas/AWSAccountId"
          description: The Amazon Web Services account ID that owns the transit gateway. This may be different from the firewall owner's account ID when using a shared transit gateway.
        AvailabilityZoneMappings:
          $ref: "#/components/schemas/AvailabilityZoneMappings"
          description: The Availability Zones where the firewall endpoints are created for a transit gateway-attached firewall. Each mapping specifies an Availability Zone where the firewall processes traffic.
        AvailabilityZoneChangeProtection:
          $ref: "#/components/schemas/Boolean"
          description: A setting indicating whether the firewall is protected against changes to its Availability Zone configuration. When set to TRUE, you must first disable this protection before adding or removing Availability Zones.
      required:
        - FirewallPolicyArn
        - VpcId
        - SubnetMappings
        - FirewallId
    ResourceId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: ^([0-9a-f]{8})-([0-9a-f]{4}-){3}([0-9a-f]{12})$
    NumberOfAssociations:
      type: integer
    AWSAccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: ^\d{12}$
    FirewallStatus:
      description: Detailed information about the current status of a Firewall. You can retrieve this for a firewall by calling DescribeFirewall and providing the firewall name and ARN. The firewall status indicates a combined status. It indicates whether all subnets are up-to-date with the latest firewall configurations, which is based on the sync states config values, and also whether all subnets have their endpoints fully enabled, based on their sync states attachment values.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/FirewallStatusValue"
          description: The readiness of the configured firewall to handle network traffic across all of the Availability Zones where you have it configured. This setting is READY only when the ConfigurationSyncStateSummary value is IN_SYNC and the Attachment Status values for all of the configured subnets are READY.
        ConfigurationSyncStateSummary:
          $ref: "#/components/schemas/ConfigurationSyncState"
          description: The configuration sync state for the firewall. This summarizes the Config settings in the SyncStates for this firewall status object. When you create a firewall or update its configuration, for example by adding a rule group to its firewall policy, Network Firewall distributes the configuration changes to all Availability Zones that have subnets defined for the firewall. This summary indicates whether the configuration changes have been applied everywhere. This status must be IN_SYNC for the firewall to be ready for use, but it doesn't indicate that the firewall is ready. The Status setting indicates firewall readiness. It's based on this setting and the readiness of the firewall endpoints to take traffic.
        SyncStates:
          type: object
          properties: {}
          description: Status for the subnets that you've configured in the firewall. This contains one array element per Availability Zone where you've configured a subnet in the firewall. These objects provide detailed information for the settings ConfigurationSyncStateSummary and Status.
        CapacityUsageSummary:
          $ref: "#/components/schemas/CapacityUsageSummary"
          description: Describes the capacity usage of the resources contained in a firewall's reference sets. Network Firewall calculates the capacity usage by taking an aggregated count of all of the resources used by all of the reference sets in a firewall.
        TransitGatewayAttachmentSyncState:
          $ref: "#/components/schemas/TransitGatewayAttachmentSyncState"
          description: The synchronization state of the transit gateway attachment. This indicates whether the firewall's transit gateway configuration is properly synchronized and operational. Use this to verify that your transit gateway configuration changes have been applied.
      required:
        - Status
        - ConfigurationSyncStateSummary
    FirewallStatusValue:
      type: string
      enum:
        - PROVISIONING
        - DELETING
        - READY
    ConfigurationSyncState:
      type: string
      enum:
        - PENDING
        - IN_SYNC
        - CAPACITY_CONSTRAINED
    CapacityUsageSummary:
      description: The capacity usage summary of the resources used by the ReferenceSets in a firewall.
      type: object
      properties:
        CIDRs:
          $ref: "#/components/schemas/CIDRSummary"
          description: Describes the capacity usage of the CIDR blocks used by the IP set references in a firewall.
    CIDRSummary:
      description: Summarizes the CIDR blocks used by the IP set references in a firewall. Network Firewall calculates the number of CIDRs by taking an aggregated count of all CIDRs used by the IP sets you are referencing.
      type: object
      properties:
        AvailableCIDRCount:
          $ref: "#/components/schemas/CIDRCount"
          description: The number of CIDR blocks available for use by the IP set references in a firewall.
        UtilizedCIDRCount:
          $ref: "#/components/schemas/CIDRCount"
          description: The number of CIDR blocks used by the IP set references in a firewall.
        IPSetReferences:
          type: object
          properties: {}
          description: The list of the IP set references used by a firewall.
    CIDRCount:
      type: integer
      minimum: 0
      maximum: 1000000
    TransitGatewayAttachmentSyncState:
      description: Contains information about the synchronization state of a transit gateway attachment, including its current status and any error messages. Network Firewall uses this to track the state of your transit gateway configuration changes.
      type: object
      properties:
        AttachmentId:
          $ref: "#/components/schemas/AttachmentId"
          description: The unique identifier of the transit gateway attachment.
        TransitGatewayAttachmentStatus:
          $ref: "#/components/schemas/TransitGatewayAttachmentStatus"
          description: "The current status of the transit gateway attachment. Valid values are: CREATING - The attachment is being created DELETING - The attachment is being deleted DELETED - The attachment has been deleted FAILED - The attachment creation has failed and cannot be recovered ERROR - The attachment is in an error state that might be recoverable READY - The attachment is active and processing traffic PENDING_ACCEPTANCE - The attachment is waiting to be accepted REJECTING - The attachment is in the process of being rejected REJECTED - The attachment has been rejected"
        StatusMessage:
          $ref: "#/components/schemas/TransitGatewayAttachmentSyncStateMessage"
          description: "A message providing additional information about the current status, particularly useful when the transit gateway attachment is in a non-READY state. Valid values are: CREATING - The attachment is being created DELETING - The attachment is being deleted DELETED - The attachment has been deleted FAILED - The attachment creation has failed and cannot be recovered ERROR - The attachment is in an error state that might be recoverable READY - The attachment is active and processing traffic PENDING_ACCEPTANCE - The attachment is waiting to be accepted REJECTING - The attachment is in the process of being rejected REJECTED - The attachment has been rejected For information about troubleshooting endpoint failures, see Troubleshooting firewall endpoint failures in the Network Firewall Developer Guide."
    AttachmentId:
      type: string
    TransitGatewayAttachmentSyncStateMessage:
      type: string
    FirewallPolicy:
      description: The firewall policy defines the behavior of a firewall using a collection of stateless and stateful rule groups and other settings. You can use one firewall policy for multiple firewalls. This, along with FirewallPolicyResponse, define the policy. You can retrieve all objects for a firewall policy by calling DescribeFirewallPolicy.
      type: object
      properties:
        StatelessRuleGroupReferences:
          $ref: "#/components/schemas/StatelessRuleGroupReferences"
          description: References to the stateless rule groups that are used in the policy. These define the matching criteria in stateless rules.
        StatelessDefaultActions:
          $ref: "#/components/schemas/StatelessActions"
          description: "The actions to take on a packet if it doesn't match any of the stateless rules in the policy. If you want non-matching packets to be forwarded for stateful inspection, specify aws:forward_to_sfe. You must specify one of the standard actions: aws:pass, aws:drop, or aws:forward_to_sfe. In addition, you can specify custom actions that are compatible with your standard section choice. For example, you could specify [\"aws:pass\"] or you could specify [\"aws:pass\", “customActionName”]. For information about compatibility, see the custom action descriptions under CustomAction."
        StatelessFragmentDefaultActions:
          $ref: "#/components/schemas/StatelessActions"
          description: "The actions to take on a fragmented UDP packet if it doesn't match any of the stateless rules in the policy. Network Firewall only manages UDP packet fragments and silently drops packet fragments for other protocols. If you want non-matching fragmented UDP packets to be forwarded for stateful inspection, specify aws:forward_to_sfe. You must specify one of the standard actions: aws:pass, aws:drop, or aws:forward_to_sfe. In addition, you can specify custom actions that are compatible with your standard section choice. For example, you could specify [\"aws:pass\"] or you could specify [\"aws:pass\", “customActionName”]. For information about compatibility, see the custom action descriptions under CustomAction."
        StatelessCustomActions:
          $ref: "#/components/schemas/CustomActions"
          description: The custom action definitions that are available for use in the firewall policy's StatelessDefaultActions setting. You name each custom action that you define, and then you can use it by name in your default actions specifications.
        StatefulRuleGroupReferences:
          $ref: "#/components/schemas/StatefulRuleGroupReferences"
          description: References to the stateful rule groups that are used in the policy. These define the inspection criteria in stateful rules.
        StatefulDefaultActions:
          $ref: "#/components/schemas/StatefulActions"
          description: "The default actions to take on a packet that doesn't match any stateful rules. The stateful default action is optional, and is only valid when using the strict rule order. Valid values of the stateful default action: aws:drop_strict aws:drop_established aws:alert_strict aws:alert_established For more information, see Strict evaluation order in the Network Firewall Developer Guide."
        StatefulEngineOptions:
          $ref: "#/components/schemas/StatefulEngineOptions"
          description: Additional options governing how Network Firewall handles stateful rules. The stateful rule groups that you use in your policy must have stateful rule options settings that are compatible with these settings.
        TLSInspectionConfigurationArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the TLS inspection configuration.
        PolicyVariables:
          $ref: "#/components/schemas/PolicyVariables"
          description: Contains variables that you can use to override default Suricata settings in your firewall policy.
        EnableTLSSessionHolding:
          $ref: "#/components/schemas/EnableTLSSessionHolding"
          description: When true, prevents TCP and TLS packets from reaching destination servers until TLS Inspection has evaluated Server Name Indication (SNI) rules. Requires an associated TLS Inspection configuration.
      required:
        - StatelessDefaultActions
        - StatelessFragmentDefaultActions
    StatelessRuleGroupReferences:
      type: array
      items:
        $ref: "#/components/schemas/StatelessRuleGroupReference"
    StatelessRuleGroupReference:
      description: Identifier for a single stateless rule group, used in a firewall policy to refer to the rule group.
      type: object
      properties:
        ResourceArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the stateless rule group.
        Priority:
          $ref: "#/components/schemas/Priority"
          description: An integer setting that indicates the order in which to run the stateless rule groups in a single FirewallPolicy. Network Firewall applies each stateless rule group to a packet starting with the group that has the lowest priority setting. You must ensure that the priority settings are unique within each policy.
      required:
        - ResourceArn
        - Priority
    Priority:
      type: integer
      minimum: 1
      maximum: 65535
    StatelessActions:
      type: array
      items:
        $ref: "#/components/schemas/CollectionMember_String"
    CustomActions:
      type: array
      items:
        $ref: "#/components/schemas/CustomAction"
    CustomAction:
      description: "An optional, non-standard action to use for stateless packet handling. You can define this in addition to the standard action that you must specify. You define and name the custom actions that you want to be able to use, and then you reference them by name in your actions settings. You can use custom actions in the following places: In a rule group's StatelessRulesAndCustomActions specification. The custom actions are available for use by name inside the StatelessRulesAndCustomActions where you define them. You can use them for your stateless rule actions to specify what to do with a packet that matches the rule's match attributes. In a FirewallPolicy specification, in StatelessCustomActions. The custom actions are available for use inside the policy where you define them. You can use them for the policy's default stateless actions settings to specify what to do with packets that don't match any of the policy's stateless rules."
      type: object
      properties:
        ActionName:
          $ref: "#/components/schemas/ActionName"
          description: The descriptive name of the custom action. You can't change the name of a custom action after you create it.
        ActionDefinition:
          $ref: "#/components/schemas/ActionDefinition"
          description: The custom action associated with the action name.
      required:
        - ActionName
        - ActionDefinition
    ActionName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z0-9]+$
    ActionDefinition:
      description: A custom action to use in stateless rule actions settings. This is used in CustomAction.
      type: object
      properties:
        PublishMetricAction:
          $ref: "#/components/schemas/PublishMetricAction"
          description: Stateless inspection criteria that publishes the specified metrics to Amazon CloudWatch for the matching packet. This setting defines a CloudWatch dimension value to be published. You can pair this custom action with any of the standard stateless rule actions. For example, you could pair this in a rule action with the standard action that forwards the packet for stateful inspection. Then, when a packet matches the rule, Network Firewall publishes metrics for the packet and forwards it.
    PublishMetricAction:
      description: Stateless inspection criteria that publishes the specified metrics to Amazon CloudWatch for the matching packet. This setting defines a CloudWatch dimension value to be published.
      type: object
      properties:
        Dimensions:
          $ref: "#/components/schemas/Dimensions"
      required:
        - Dimensions
    Dimensions:
      type: array
      items:
        $ref: "#/components/schemas/Dimension"
    Dimension:
      description: The value to use in an Amazon CloudWatch custom metric dimension. This is used in the PublishMetrics CustomAction. A CloudWatch custom metric dimension is a name/value pair that's part of the identity of a metric. Network Firewall sets the dimension name to CustomAction and you provide the dimension value. For more information about CloudWatch custom metric dimensions, see Publishing Custom Metrics in the Amazon CloudWatch User Guide.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/DimensionValue"
          description: The value to use in the custom metric dimension.
      required:
        - Value
    DimensionValue:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z0-9-_ ]+$
    StatefulRuleGroupReferences:
      type: array
      items:
        $ref: "#/components/schemas/StatefulRuleGroupReference"
    StatefulRuleGroupReference:
      description: Identifier for a single stateful rule group, used in a firewall policy to refer to a rule group.
      type: object
      properties:
        ResourceArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the stateful rule group.
        Priority:
          $ref: "#/components/schemas/Priority"
          description: An integer setting that indicates the order in which to run the stateful rule groups in a single FirewallPolicy. This setting only applies to firewall policies that specify the STRICT_ORDER rule order in the stateful engine options settings. Network Firewall evalutes each stateful rule group against a packet starting with the group that has the lowest priority setting. You must ensure that the priority settings are unique within each policy. You can change the priority settings of your rule groups at any time. To make it easier to insert rule groups later, number them so there's a wide range in between, for example use 100, 200, and so on.
        Override:
          $ref: "#/components/schemas/StatefulRuleGroupOverride"
          description: The action that allows the policy owner to override the behavior of the rule group within a policy.
        DeepThreatInspection:
          $ref: "#/components/schemas/DeepThreatInspection"
          description: Network Firewall plans to augment the active threat defense managed rule group with an additional deep threat inspection capability. When this capability is released, Amazon Web Services will analyze service logs of network traffic processed by these rule groups to identify threat indicators across customers. Amazon Web Services will use these threat indicators to improve the active threat defense managed rule groups and protect the security of Amazon Web Services customers and services. Customers can opt-out of deep threat inspection at any time through the Network Firewall console or API. When customers opt out, Network Firewall will not use the network traffic processed by those customers' active threat defense rule groups for rule group improvement.
      required:
        - ResourceArn
    StatefulRuleGroupOverride:
      description: The setting that allows the policy owner to change the behavior of the rule group within a policy.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/OverrideAction"
          description: The action that changes the rule group from DROP to ALERT. This only applies to managed rule groups.
    OverrideAction:
      type: string
      enum:
        - DROP_TO_ALERT
    DeepThreatInspection:
      type: boolean
    StatefulActions:
      type: array
      items:
        $ref: "#/components/schemas/CollectionMember_String"
    StatefulEngineOptions:
      description: Configuration settings for the handling of the stateful rule groups in a firewall policy.
      type: object
      properties:
        RuleOrder:
          $ref: "#/components/schemas/RuleOrder"
          description: Indicates how to manage the order of stateful rule evaluation for the policy. STRICT_ORDER is the recommended option, but DEFAULT_ACTION_ORDER is the default option. With STRICT_ORDER, provide your rules in the order that you want them to be evaluated. You can then choose one or more default actions for packets that don't match any rules. Choose STRICT_ORDER to have the stateful rules engine determine the evaluation order of your rules. The default action for this rule order is PASS, followed by DROP, REJECT, and ALERT actions. Stateful rules are provided to the rule engine as Suricata compatible strings, and Suricata evaluates them based on your settings. For more information, see Evaluation order for stateful rules in the Network Firewall Developer Guide.
        StreamExceptionPolicy:
          $ref: "#/components/schemas/StreamExceptionPolicy"
          description: Configures how Network Firewall processes traffic when a network connection breaks midstream. Network connections can break due to disruptions in external networks or within the firewall itself. DROP - Network Firewall fails closed and drops all subsequent traffic going to the firewall. This is the default behavior. CONTINUE - Network Firewall continues to apply rules to the subsequent traffic without context from traffic before the break. This impacts the behavior of rules that depend on this context. For example, if you have a stateful rule to drop http traffic, Network Firewall won't match the traffic for this rule because the service won't have the context from session initialization defining the application layer protocol as HTTP. However, this behavior is rule dependent—a TCP-layer rule using a flow:stateless rule would still match, as would the aws:drop_strict default action. REJECT - Network Firewall fails closed and drops all subsequent traffic going to the firewall. Network Firewall also sends a TCP reject packet back to your client so that the client can immediately establish a new session. Network Firewall will have context about the new session and will apply rules to the subsequent traffic.
        FlowTimeouts:
          $ref: "#/components/schemas/FlowTimeouts"
          description: Configures the amount of time that can pass without any traffic sent through the firewall before the firewall determines that the connection is idle.
    RuleOrder:
      type: string
      enum:
        - DEFAULT_ACTION_ORDER
        - STRICT_ORDER
    StreamExceptionPolicy:
      type: string
      enum:
        - DROP
        - CONTINUE
        - REJECT
    FlowTimeouts:
      description: Describes the amount of time that can pass without any traffic sent through the firewall before the firewall determines that the connection is idle and Network Firewall removes the flow entry from its flow table. Existing connections and flows are not impacted when you update this value. Only new connections after you update this value are impacted.
      type: object
      properties:
        TcpIdleTimeoutSeconds:
          $ref: "#/components/schemas/TcpIdleTimeoutRangeBound"
          description: The number of seconds that can pass without any TCP traffic sent through the firewall before the firewall determines that the connection is idle. After the idle timeout passes, data packets are dropped, however, the next TCP SYN packet is considered a new flow and is processed by the firewall. Clients or targets can use TCP keepalive packets to reset the idle timeout. You can define the TcpIdleTimeoutSeconds value to be between 60 and 6000 seconds. If no value is provided, it defaults to 350 seconds.
    TcpIdleTimeoutRangeBound:
      type: integer
    PolicyVariables:
      description: Contains variables that you can use to override default Suricata settings in your firewall policy.
      type: object
      properties:
        RuleVariables:
          type: object
          properties: {}
          description: The IPv4 or IPv6 addresses in CIDR notation to use for the Suricata HOME_NET variable. If your firewall uses an inspection VPC, you might want to override the HOME_NET variable with the CIDRs of your home networks. If you don't override HOME_NET with your own CIDRs, Network Firewall by default uses the CIDR of your inspection VPC.
    EnableTLSSessionHolding:
      type: boolean
    CreateFirewallPolicyResponse:
      type: object
      properties:
        UpdateToken:
          $ref: "#/components/schemas/UpdateToken"
          description: A token used for optimistic locking. Network Firewall returns a token to your requests that access the firewall policy. The token marks the state of the policy resource at the time of the request. To make changes to the policy, you provide the token in your request. Network Firewall uses the token to ensure that the policy hasn't changed since you last retrieved it. If it has changed, the operation fails with an InvalidTokenException. If this happens, retrieve the firewall policy again to get a current copy of it with current token. Reapply your changes as needed, then try the operation again using the new token.
        FirewallPolicyResponse:
          $ref: "#/components/schemas/FirewallPolicyResponse"
          description: The high-level properties of a firewall policy. This, along with the FirewallPolicy, define the policy. You can retrieve all objects for a firewall policy by calling DescribeFirewallPolicy.
      required:
        - UpdateToken
        - FirewallPolicyResponse
    FirewallPolicyResponse:
      description: The high-level properties of a firewall policy. This, along with the FirewallPolicy, define the policy. You can retrieve all objects for a firewall policy by calling DescribeFirewallPolicy.
      type: object
      properties:
        FirewallPolicyName:
          $ref: "#/components/schemas/ResourceName"
          description: The descriptive name of the firewall policy. You can't change the name of a firewall policy after you create it.
        FirewallPolicyArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the firewall policy. If this response is for a create request that had DryRun set to TRUE, then this ARN is a placeholder that isn't attached to a valid resource.
        FirewallPolicyId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier for the firewall policy.
        Description:
          $ref: "#/components/schemas/Description"
          description: A description of the firewall policy.
        FirewallPolicyStatus:
          $ref: "#/components/schemas/ResourceStatus"
          description: The current status of the firewall policy. You can retrieve this for a firewall policy by calling DescribeFirewallPolicy and providing the firewall policy's name or ARN.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The key:value pairs to associate with the resource.
        ConsumedStatelessRuleCapacity:
          $ref: "#/components/schemas/RuleCapacity"
          description: The number of capacity units currently consumed by the policy's stateless rules.
        ConsumedStatefulRuleCapacity:
          $ref: "#/components/schemas/RuleCapacity"
          description: The number of capacity units currently consumed by the policy's stateful rules.
        ConsumedStatefulDomainCapacity:
          $ref: "#/components/schemas/RuleCapacity"
          description: The total number of domain name specifications across all domain list rule groups in the firewall policy that use the stateful-domain-rulegroup resource type.
        NumberOfAssociations:
          $ref: "#/components/schemas/NumberOfAssociations"
          description: The number of firewalls that are associated with this firewall policy.
        EncryptionConfiguration:
          $ref: "#/components/schemas/EncryptionConfiguration"
          description: A complex type that contains the Amazon Web Services KMS encryption configuration settings for your firewall policy.
        LastModifiedTime:
          $ref: "#/components/schemas/LastUpdateTime"
          description: The last time that the firewall policy was changed.
      required:
        - FirewallPolicyName
        - FirewallPolicyArn
        - FirewallPolicyId
    ResourceStatus:
      type: string
      enum:
        - ACTIVE
        - DELETING
        - ERROR
    RuleCapacity:
      type: integer
    LastUpdateTime:
      type: string
      format: date-time
    NatGatewayId:
      type: string
      minLength: 1
    ListenerPropertiesRequest:
      type: array
      items:
        $ref: "#/components/schemas/ListenerPropertyRequest"
    ListenerPropertyRequest:
      description: This data type is used specifically for the CreateProxy and UpdateProxy APIs. Open port for taking HTTP or HTTPS traffic.
      type: object
      properties:
        Port:
          $ref: "#/components/schemas/NatGatewayPort"
          description: Port for processing traffic.
        Type:
