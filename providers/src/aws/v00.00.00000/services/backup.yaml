          schema:
            $ref: "#/components/schemas/ReportPlanName"
          description: The unique name of a report plan.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                IdempotencyToken:
                  $ref: "#/components/schemas/string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartReportJobOutput"
  /restore-jobs:
    put:
      operationId: StartRestoreJob
      description: Recovers the saved resource identified by an Amazon Resource Name (ARN).
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RecoveryPointArn:
                  $ref: "#/components/schemas/ARN"
                Metadata:
                  $ref: "#/components/schemas/Metadata"
                IamRoleArn:
                  $ref: "#/components/schemas/IAMRoleArn"
                IdempotencyToken:
                  $ref: "#/components/schemas/string"
                ResourceType:
                  $ref: "#/components/schemas/ResourceType"
                CopySourceTagsToRestoredResource:
                  $ref: "#/components/schemas/boolean"
              required:
                - RecoveryPointArn
                - Metadata
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartRestoreJobOutput"
  /scan/job:
    put:
      operationId: StartScanJob
      description: Starts scanning jobs for specific resources.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                BackupVaultName:
                  $ref: "#/components/schemas/String"
                IamRoleArn:
                  $ref: "#/components/schemas/String"
                IdempotencyToken:
                  $ref: "#/components/schemas/String"
                MalwareScanner:
                  $ref: "#/components/schemas/MalwareScanner"
                RecoveryPointArn:
                  $ref: "#/components/schemas/String"
                ScanBaseRecoveryPointArn:
                  $ref: "#/components/schemas/String"
                ScanMode:
                  $ref: "#/components/schemas/ScanMode"
                ScannerRoleArn:
                  $ref: "#/components/schemas/String"
              required:
                - BackupVaultName
                - IamRoleArn
                - MalwareScanner
                - RecoveryPointArn
                - ScanMode
                - ScannerRoleArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartScanJobOutput"
  /tags/{resource_arn}:
    post:
      operationId: TagResource
      description: Assigns a set of key-value pairs to a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ARN"
          description: The ARN that uniquely identifies the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "200":
          description: Success
  /untag/{resource_arn}:
    post:
      operationId: UntagResource
      description: Removes a set of key-value pairs from a recovery point, backup plan, or backup vault identified by an Amazon Resource Name (ARN) This API is not supported for recovery points for resource types including Aurora, Amazon DocumentDB. Amazon EBS, Amazon FSx, Neptune, and Amazon RDS.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ARN"
          description: An ARN that uniquely identifies a resource. The format of the ARN depends on the type of the tagged resource. ARNs that do not include backup are incompatible with tagging. TagResource and UntagResource with invalid ARNs will result in an error. Acceptable ARN content can include arn:aws:backup:us-east. Invalid ARN content may look like arn:aws:ec2:us-east.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TagKeyList:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - TagKeyList
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    BackupVaultName:
      type: string
      pattern: ^[a-zA-Z0-9\-\_]{2,50}$
    ARN:
      type: string
    RequesterComment:
      type: string
    string:
      type: string
    Long:
      type: integer
      format: int64
    CancelLegalHoldOutput:
      type: object
    BackupPlanInput:
      description: Contains an optional backup plan display name and an array of BackupRule objects, each of which specifies a backup rule. Each rule in a backup plan is a separate scheduled task.
      type: object
      properties:
        BackupPlanName:
          $ref: "#/components/schemas/BackupPlanName"
          description: The display name of a backup plan. Must contain 1 to 50 alphanumeric or '-_.' characters.
        Rules:
          $ref: "#/components/schemas/BackupRulesInput"
          description: An array of BackupRule objects, each of which specifies a scheduled task that is used to back up a selection of resources.
        AdvancedBackupSettings:
          $ref: "#/components/schemas/AdvancedBackupSettings"
          description: Specifies a list of BackupOptions for each resource type. These settings are only available for Windows Volume Shadow Copy Service (VSS) backup jobs.
        ScanSettings:
          $ref: "#/components/schemas/ScanSettings"
          description: Contains your scanning configuration for the backup rule and includes the malware scanner, and scan mode of either full or incremental.
      required:
        - BackupPlanName
        - Rules
    BackupPlanName:
      type: string
    BackupRulesInput:
      type: array
      items:
        $ref: "#/components/schemas/BackupRuleInput"
    BackupRuleInput:
      description: Specifies a scheduled task used to back up a selection of resources.
      type: object
      properties:
        RuleName:
          $ref: "#/components/schemas/BackupRuleName"
          description: A display name for a backup rule. Must contain 1 to 50 alphanumeric or '-_.' characters.
        TargetBackupVaultName:
          $ref: "#/components/schemas/BackupVaultName"
          description: The name of a logical container where backups are stored. Backup vaults are identified by names that are unique to the account used to create them and the Amazon Web Services Region where they are created.
        TargetLogicallyAirGappedBackupVaultArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of a logically air-gapped vault. ARN must be in the same account and Region. If provided, supported fully managed resources back up directly to logically air-gapped vault, while other supported resources create a temporary (billable) snapshot in backup vault, then copy it to logically air-gapped vault. Unsupported resources only back up to the specified backup vault.
        ScheduleExpression:
          $ref: "#/components/schemas/CronExpression"
          description: A CRON expression in UTC specifying when Backup initiates a backup job. When no CRON expression is provided, Backup will use the default expression cron(0 5 ? * * *).
        StartWindowMinutes:
          $ref: "#/components/schemas/WindowMinutes"
          description: A value in minutes after a backup is scheduled before a job will be canceled if it doesn't start successfully. This value is optional. If this value is included, it must be at least 60 minutes to avoid errors. This parameter has a maximum value of 100 years (52,560,000 minutes). During the start window, the backup job status remains in CREATED status until it has successfully begun or until the start window time has run out. If within the start window time Backup receives an error that allows the job to be retried, Backup will automatically retry to begin the job at least every 10 minutes until the backup successfully begins (the job status changes to RUNNING) or until the job status changes to EXPIRED (which is expected to occur when the start window time is over).
        CompletionWindowMinutes:
          $ref: "#/components/schemas/WindowMinutes"
          description: A value in minutes after a backup job is successfully started before it must be completed or it will be canceled by Backup. This value is optional.
        Lifecycle:
          $ref: "#/components/schemas/Lifecycle"
          description: The lifecycle defines when a protected resource is transitioned to cold storage and when it expires. Backup will transition and expire backups automatically according to the lifecycle that you define. Backups transitioned to cold storage must be stored in cold storage for a minimum of 90 days. Therefore, the “retention” setting must be 90 days greater than the “transition to cold after days” setting. The “transition to cold after days” setting cannot be changed after a backup has been transitioned to cold storage. Resource types that can transition to cold storage are listed in the Feature availability by resource table. Backup ignores this expression for other resource types. This parameter has a maximum value of 100 years (36,500 days).
        RecoveryPointTags:
          type: object
          properties: {}
          description: The tags to assign to the resources.
        CopyActions:
          $ref: "#/components/schemas/CopyActions"
          description: An array of CopyAction objects, which contains the details of the copy operation.
        EnableContinuousBackup:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether Backup creates continuous backups. True causes Backup to create continuous backups capable of point-in-time restore (PITR). False (or not specified) causes Backup to create snapshot backups.
        ScheduleExpressionTimezone:
          $ref: "#/components/schemas/Timezone"
          description: The timezone in which the schedule expression is set. By default, ScheduleExpressions are in UTC. You can modify this to a specified timezone.
        IndexActions:
          $ref: "#/components/schemas/IndexActions"
          description: "There can up to one IndexAction in each BackupRule, as each backup can have 0 or 1 backup index associated with it. Within the array is ResourceTypes. Only 1 resource type will be accepted for each BackupRule. Valid values: EBS for Amazon Elastic Block Store S3 for Amazon Simple Storage Service (Amazon S3)"
        ScanActions:
          $ref: "#/components/schemas/ScanActions"
          description: Contains your scanning configuration for the backup rule and includes the malware scanner, and scan mode of either full or incremental.
      required:
        - RuleName
        - TargetBackupVaultName
    BackupRuleName:
      type: string
      pattern: ^[a-zA-Z0-9\-\_\.]{1,50}$
    CronExpression:
      type: string
    WindowMinutes:
      type: integer
      format: int64
    Lifecycle:
      description: Specifies the time period, in days, before a recovery point transitions to cold storage or is deleted. Backups transitioned to cold storage must be stored in cold storage for a minimum of 90 days. Therefore, on the console, the retention setting must be 90 days greater than the transition to cold after days setting. The transition to cold after days setting can't be changed after a backup has been transitioned to cold. Resource types that can transition to cold storage are listed in the Feature availability by resource table. Backup ignores this expression for other resource types. To remove the existing lifecycle and retention periods and keep your recovery points indefinitely, specify -1 for MoveToColdStorageAfterDays and DeleteAfterDays.
      type: object
      properties:
        MoveToColdStorageAfterDays:
          $ref: "#/components/schemas/Long"
          description: The number of days after creation that a recovery point is moved to cold storage.
        DeleteAfterDays:
          $ref: "#/components/schemas/Long"
          description: The number of days after creation that a recovery point is deleted. This value must be at least 90 days after the number of days specified in MoveToColdStorageAfterDays.
        OptInToArchiveForSupportedResources:
          $ref: "#/components/schemas/Boolean"
          description: If the value is true, your backup plan transitions supported resources to archive (cold) storage tier in accordance with your lifecycle settings.
        DeleteAfterEvent:
          $ref: "#/components/schemas/LifecycleDeleteAfterEvent"
          description: The event after which a recovery point is deleted. A recovery point with both DeleteAfterDays and DeleteAfterEvent will delete after whichever condition is satisfied first. Not valid as an input.
    Boolean:
      type: boolean
    LifecycleDeleteAfterEvent:
      type: string
      enum:
        - DELETE_AFTER_COPY
    CopyActions:
      type: array
      items:
        $ref: "#/components/schemas/CopyAction"
    CopyAction:
      description: The details of the copy operation.
      type: object
      properties:
        Lifecycle:
          $ref: "#/components/schemas/Lifecycle"
        DestinationBackupVaultArn:
          $ref: "#/components/schemas/ARN"
          description: An Amazon Resource Name (ARN) that uniquely identifies the destination backup vault for the copied backup. For example, arn:aws:backup:us-east-1:123456789012:backup-vault:aBackupVault.
      required:
        - DestinationBackupVaultArn
    Timezone:
      type: string
    IndexActions:
      type: array
      items:
        $ref: "#/components/schemas/IndexAction"
    IndexAction:
      description: This is an optional array within a BackupRule. IndexAction consists of one ResourceTypes.
      type: object
      properties:
        ResourceTypes:
          $ref: "#/components/schemas/ResourceTypes"
          description: "0 or 1 index action will be accepted for each BackupRule. Valid values: EBS for Amazon Elastic Block Store S3 for Amazon Simple Storage Service (Amazon S3)"
    ResourceTypes:
      type: array
      items:
        $ref: "#/components/schemas/ResourceType"
    ResourceType:
      type: string
      pattern: ^[a-zA-Z0-9\-\_\.]{1,50}$
    ScanActions:
      type: array
      items:
        $ref: "#/components/schemas/ScanAction"
    ScanAction:
      description: Defines a scanning action that specifies the malware scanner and scan mode to use.
      type: object
      properties:
        MalwareScanner:
          $ref: "#/components/schemas/MalwareScanner"
          description: The malware scanner to use for the scan action. Currently only GUARDDUTY is supported.
        ScanMode:
          $ref: "#/components/schemas/ScanMode"
          description: "The scanning mode to use for the scan action. Valid values: FULL_SCAN | INCREMENTAL_SCAN."
    MalwareScanner:
      type: string
      enum:
        - GUARDDUTY
    ScanMode:
      type: string
      enum:
        - FULL_SCAN
        - INCREMENTAL_SCAN
    AdvancedBackupSettings:
      type: array
      items:
        $ref: "#/components/schemas/AdvancedBackupSetting"
    AdvancedBackupSetting:
      description: The backup options for each resource type.
      type: object
      properties:
        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: "Specifies an object containing resource type and backup options. The only supported resource type is Amazon EC2 instances with Windows Volume Shadow Copy Service (VSS). For a CloudFormation example, see the sample CloudFormation template to enable Windows VSS in the Backup User Guide. Valid values: EC2."
        BackupOptions:
          type: object
          properties: {}
          description: 'Specifies the backup option for a selected resource. This option is available for Windows VSS backup jobs and S3 backups. Valid values: Set to "WindowsVSS":"enabled" to enable the WindowsVSS backup option and create a Windows VSS backup. Set to "WindowsVSS":"disabled" to create a regular backup. The WindowsVSS option is not enabled by default. For S3 backups, set to "BackupACLs":"disabled" to exclude ACLs from the backup, or "BackupObjectTags":"disabled" to exclude object tags from the backup. By default, both ACLs and object tags are included in S3 backups. If you specify an invalid option, you get an InvalidParameterValueException exception. For more information about Windows VSS backups, see Creating a VSS-Enabled Windows Backup.'
    ScanSettings:
      type: array
      items:
        $ref: "#/components/schemas/ScanSetting"
    ScanSetting:
      description: Contains configuration settings for malware scanning, including the scanner type, target resource types, and scanner role.
      type: object
      properties:
        MalwareScanner:
          $ref: "#/components/schemas/MalwareScanner"
          description: The malware scanner to use for scanning. Currently only GUARDDUTY is supported.
        ResourceTypes:
          $ref: "#/components/schemas/ResourceTypes"
          description: An array of resource types to be scanned for malware.
        ScannerRoleArn:
          $ref: "#/components/schemas/IAMRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role that the scanner uses to access resources; for example, arn:aws:iam::123456789012:role/ScannerRole.
    IAMRoleArn:
      type: string
    Tags:
      type: object
      properties: {}
    CreateBackupPlanOutput:
      type: object
      properties:
        BackupPlanId:
          $ref: "#/components/schemas/string"
          description: The ID of the backup plan.
        BackupPlanArn:
          $ref: "#/components/schemas/ARN"
          description: An Amazon Resource Name (ARN) that uniquely identifies a backup plan; for example, arn:aws:backup:us-east-1:123456789012:plan:8F81F553-3A74-4A3F-B93D-B3360DC80C50.
        CreationDate:
          $ref: "#/components/schemas/timestamp"
          description: The date and time that a backup plan is created, in Unix format and Coordinated Universal Time (UTC). The value of CreationDate is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        VersionId:
          $ref: "#/components/schemas/string"
          description: Unique, randomly generated, Unicode, UTF-8 encoded strings that are at most 1,024 bytes long. They cannot be edited.
        AdvancedBackupSettings:
          $ref: "#/components/schemas/AdvancedBackupSettings"
          description: The settings for a resource type. This option is only available for Windows Volume Shadow Copy Service (VSS) backup jobs.
    timestamp:
      type: string
      format: date-time
    BackupSelection:
      description: Used to specify a set of resources to a backup plan. We recommend that you specify conditions, tags, or resources to include or exclude. Otherwise, Backup attempts to select all supported and opted-in storage resources, which could have unintended cost implications. For more information, see Assigning resources programmatically.
      type: object
      properties:
        SelectionName:
          $ref: "#/components/schemas/BackupSelectionName"
          description: The display name of a resource selection document. Must contain 1 to 50 alphanumeric or '-_.' characters.
        IamRoleArn:
          $ref: "#/components/schemas/IAMRoleArn"
          description: The ARN of the IAM role that Backup uses to authenticate when backing up the target resource; for example, arn:aws:iam::123456789012:role/S3Access.
        Resources:
          $ref: "#/components/schemas/ResourceArns"
          description: The Amazon Resource Names (ARNs) of the resources to assign to a backup plan. The maximum number of ARNs is 500 without wildcards, or 30 ARNs with wildcards. If you need to assign many resources to a backup plan, consider a different resource selection strategy, such as assigning all resources of a resource type or refining your resource selection using tags. If you specify multiple ARNs, the resources much match any of the ARNs (OR logic). When using wildcards in ARN patterns for backup selections, the asterisk (*) must appear at the end of the ARN string (prefix pattern). For example, arn:aws:s3:::my-bucket-* is valid, but arn:aws:s3:::*-logs is not supported.
        ListOfTags:
          $ref: "#/components/schemas/ListOfTags"
          description: 'The conditions that you define to assign resources to your backup plans using tags. For example, "StringEquals": { "ConditionKey": "backup", "ConditionValue": "daily"}. ListOfTags supports only StringEquals. Condition operators are case sensitive. If you specify multiple conditions, the resources much match any of the conditions (OR logic).'
        NotResources:
          $ref: "#/components/schemas/ResourceArns"
          description: The Amazon Resource Names (ARNs) of the resources to exclude from a backup plan. The maximum number of ARNs is 500 without wildcards, or 30 ARNs with wildcards. If you need to exclude many resources from a backup plan, consider a different resource selection strategy, such as assigning only one or a few resource types or refining your resource selection using tags.
        Conditions:
          $ref: "#/components/schemas/Conditions"
          description: 'The conditions that you define to assign resources to your backup plans using tags. For example, "StringEquals": { "ConditionKey": "aws:ResourceTag/backup", "ConditionValue": "daily" }. Conditions supports StringEquals, StringLike, StringNotEquals, and StringNotLike. Condition operators are case sensitive. If you specify multiple conditions, the resources much match all conditions (AND logic).'
      required:
        - SelectionName
        - IamRoleArn
    BackupSelectionName:
      type: string
      pattern: ^[a-zA-Z0-9\-\_\.]{1,50}$
    ResourceArns:
      type: array
      items:
        $ref: "#/components/schemas/ARN"
    ListOfTags:
      type: array
      items:
        $ref: "#/components/schemas/Condition"
    Condition:
      description: Contains an array of triplets made up of a condition type (such as StringEquals), a key, and a value. Used to filter resources using their tags and assign them to a backup plan. Case sensitive.
      type: object
      properties:
        ConditionType:
          $ref: "#/components/schemas/ConditionType"
          description: An operation applied to a key-value pair used to assign resources to your backup plan. Condition only supports StringEquals. For more flexible assignment options, including StringLike and the ability to exclude resources from your backup plan, use Conditions (with an "s" on the end) for your BackupSelection .
        ConditionKey:
          $ref: "#/components/schemas/ConditionKey"
          description: "The key in a key-value pair. For example, in the tag Department: Accounting, Department is the key."
        ConditionValue:
          $ref: "#/components/schemas/ConditionValue"
          description: "The value in a key-value pair. For example, in the tag Department: Accounting, Accounting is the value."
      required:
        - ConditionType
        - ConditionKey
        - ConditionValue
    ConditionType:
      type: string
      enum:
        - STRINGEQUALS
    ConditionKey:
      type: string
    ConditionValue:
      type: string
    Conditions:
      description: Contains information about which resources to include or exclude from a backup plan using their tags. Conditions are case sensitive.
      type: object
      properties:
        StringEquals:
          $ref: "#/components/schemas/ConditionParameters"
          description: Filters the values of your tagged resources for only those resources that you tagged with the same value. Also called "exact matching."
        StringNotEquals:
          $ref: "#/components/schemas/ConditionParameters"
          description: Filters the values of your tagged resources for only those resources that you tagged that do not have the same value. Also called "negated matching."
        StringLike:
          $ref: "#/components/schemas/ConditionParameters"
          description: Filters the values of your tagged resources for matching tag values with the use of a wildcard character (*) anywhere in the string. For example, "prod*" or "*rod*" matches the tag value "production".
        StringNotLike:
          $ref: "#/components/schemas/ConditionParameters"
          description: Filters the values of your tagged resources for non-matching tag values with the use of a wildcard character (*) anywhere in the string.
    ConditionParameters:
      type: array
      items:
        $ref: "#/components/schemas/ConditionParameter"
    ConditionParameter:
      description: 'Includes information about tags you define to assign tagged resources to a backup plan. Include the prefix aws:ResourceTag in your tags. For example, "aws:ResourceTag/TagKey1": "Value1".'
      type: object
      properties:
        ConditionKey:
          $ref: "#/components/schemas/ConditionKey"
          description: "The key in a key-value pair. For example, in the tag Department: Accounting, Department is the key."
        ConditionValue:
          $ref: "#/components/schemas/ConditionValue"
          description: "The value in a key-value pair. For example, in the tag Department: Accounting, Accounting is the value."
    CreateBackupSelectionOutput:
      type: object
      properties:
        SelectionId:
          $ref: "#/components/schemas/string"
          description: Uniquely identifies the body of a request to assign a set of resources to a backup plan.
        BackupPlanId:
          $ref: "#/components/schemas/string"
          description: The ID of the backup plan.
        CreationDate:
          $ref: "#/components/schemas/timestamp"
          description: The date and time a backup selection is created, in Unix format and Coordinated Universal Time (UTC). The value of CreationDate is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
    CreateBackupVaultOutput:
      type: object
      properties:
        BackupVaultName:
          $ref: "#/components/schemas/BackupVaultName"
          description: The name of a logical container where backups are stored. Backup vaults are identified by names that are unique to the account used to create them and the Region where they are created. They consist of lowercase letters, numbers, and hyphens.
        BackupVaultArn:
          $ref: "#/components/schemas/ARN"
          description: An Amazon Resource Name (ARN) that uniquely identifies a backup vault; for example, arn:aws:backup:us-east-1:123456789012:backup-vault:aBackupVault.
        CreationDate:
          $ref: "#/components/schemas/timestamp"
          description: The date and time a backup vault is created, in Unix format and Coordinated Universal Time (UTC). The value of CreationDate is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
    FrameworkName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z][_a-zA-Z0-9]*"
    FrameworkDescription:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: .*\S.*
    FrameworkControls:
      type: array
      items:
        $ref: "#/components/schemas/FrameworkControl"
    FrameworkControl:
      description: Contains detailed information about all of the controls of a framework. Each framework must contain at least one control.
      type: object
      properties:
        ControlName:
          $ref: "#/components/schemas/ControlName"
          description: The name of a control. This name is between 1 and 256 characters.
        ControlInputParameters:
          $ref: "#/components/schemas/ControlInputParameters"
          description: The name/value pairs.
        ControlScope:
          $ref: "#/components/schemas/ControlScope"
          description: "The scope of a control. The control scope defines what the control will evaluate. Three examples of control scopes are: a specific backup plan, all backup plans with a specific tag, or all backup plans. For more information, see ControlScope."
      required:
        - ControlName
    ControlName:
      type: string
    ControlInputParameters:
      type: array
      items:
        $ref: "#/components/schemas/ControlInputParameter"
    ControlInputParameter:
      description: 'The parameters for a control. A control can have zero, one, or more than one parameter. An example of a control with two parameters is: "backup plan frequency is at least daily and the retention period is at least 1 year". The first parameter is daily. The second parameter is 1 year.'
      type: object
      properties:
        ParameterName:
          $ref: "#/components/schemas/ParameterName"
          description: The name of a parameter, for example, BackupPlanFrequency.
        ParameterValue:
          $ref: "#/components/schemas/ParameterValue"
          description: The value of parameter, for example, hourly.
    ParameterName:
      type: string
    ParameterValue:
      type: string
    ControlScope:
      description: A framework consists of one or more controls. Each control has its own control scope. The control scope can include one or more resource types, a combination of a tag key and value, or a combination of one resource type and one resource ID. If no scope is specified, evaluations for the rule are triggered when any resource in your recording group changes in configuration. To set a control scope that includes all of a particular resource, leave the ControlScope empty or do not pass it when calling CreateFramework.
      type: object
      properties:
        ComplianceResourceIds:
          $ref: "#/components/schemas/ComplianceResourceIdList"
          description: The ID of the only Amazon Web Services resource that you want your control scope to contain.
        ComplianceResourceTypes:
          $ref: "#/components/schemas/ResourceTypeList"
          description: Describes whether the control scope includes one or more types of resources, such as EFS or RDS.
        Tags:
          type: object
          properties: {}
          description: 'The tag key-value pair applied to those Amazon Web Services resources that you want to trigger an evaluation for a rule. A maximum of one key-value pair can be provided. The tag value is optional, but it cannot be an empty string if you are creating or editing a framework from the console (though the value can be an empty string when included in a CloudFormation template). The structure to assign a tag is: [{"Key":"string","Value":"string"}].'
    ComplianceResourceIdList:
      type: array
      items:
        $ref: "#/components/schemas/string"
    ResourceTypeList:
      type: array
      items:
        $ref: "#/components/schemas/ARN"
    stringMap:
      type: object
      properties: {}
    CreateFrameworkOutput:
      type: object
      properties:
        FrameworkName:
          $ref: "#/components/schemas/FrameworkName"
          description: The unique name of the framework. The name must be between 1 and 256 characters, starting with a letter, and consisting of letters (a-z, A-Z), numbers (0-9), and underscores (_).
        FrameworkArn:
          $ref: "#/components/schemas/ARN"
          description: An Amazon Resource Name (ARN) that uniquely identifies a resource. The format of the ARN depends on the resource type.
    RecoveryPointSelection:
      description: This specifies criteria to assign a set of resources, such as resource types or backup vaults.
      type: object
      properties:
        VaultNames:
          $ref: "#/components/schemas/VaultNames"
          description: These are the names of the vaults in which the selected recovery points are contained.
        ResourceIdentifiers:
          $ref: "#/components/schemas/ResourceIdentifiers"
          description: These are the resources included in the resource selection (including type of resources and vaults).
        DateRange:
          $ref: "#/components/schemas/DateRange"
    VaultNames:
      type: array
      items:
        $ref: "#/components/schemas/string"
    ResourceIdentifiers:
      type: array
      items:
        $ref: "#/components/schemas/string"
    DateRange:
      description: "This is a resource filter containing FromDate: DateTime and ToDate: DateTime. Both values are required. Future DateTime values are not permitted. The date and time are in Unix format and Coordinated Universal Time (UTC), and it is accurate to milliseconds ((milliseconds are optional). For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM."
      type: object
      properties:
        FromDate:
          $ref: "#/components/schemas/timestamp"
          description: This value is the beginning date, inclusive. The date and time are in Unix format and Coordinated Universal Time (UTC), and it is accurate to milliseconds (milliseconds are optional).
        ToDate:
          $ref: "#/components/schemas/timestamp"
          description: This value is the end date, inclusive. The date and time are in Unix format and Coordinated Universal Time (UTC), and it is accurate to milliseconds (milliseconds are optional).
      required:
        - FromDate
        - ToDate
    CreateLegalHoldOutput:
      type: object
      properties:
        Title:
          $ref: "#/components/schemas/string"
          description: The title of the legal hold.
        Status:
          $ref: "#/components/schemas/LegalHoldStatus"
          description: The status of the legal hold.
        Description:
          $ref: "#/components/schemas/string"
          description: The description of the legal hold.
        LegalHoldId:
          $ref: "#/components/schemas/string"
          description: The ID of the legal hold.
        LegalHoldArn:
          $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) of the legal hold.
        CreationDate:
          $ref: "#/components/schemas/timestamp"
          description: The time when the legal hold was created.
        RecoveryPointSelection:
          $ref: "#/components/schemas/RecoveryPointSelection"
          description: The criteria to assign to a set of resources, such as resource types or backup vaults.
    LegalHoldStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - CANCELING
        - CANCELED
    CreateLogicallyAirGappedBackupVaultOutput:
      type: object
      properties:
        BackupVaultName:
          $ref: "#/components/schemas/BackupVaultName"
          description: The name of a logical container where backups are stored. Logically air-gapped backup vaults are identified by names that are unique to the account used to create them and the Region where they are created.
        BackupVaultArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN (Amazon Resource Name) of the vault.
        CreationDate:
          $ref: "#/components/schemas/timestamp"
          description: The date and time when the vault was created. This value is in Unix format, Coordinated Universal Time (UTC), and accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        VaultState:
          $ref: "#/components/schemas/VaultState"
          description: The current state of the vault.
    VaultState:
      type: string
      enum:
        - CREATING
        - AVAILABLE
        - FAILED
    ReportPlanName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z][_a-zA-Z0-9]*"
    ReportPlanDescription:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: .*\S.*
    ReportDeliveryChannel:
      description: Contains information from your report plan about where to deliver your reports, specifically your Amazon S3 bucket name, S3 key prefix, and the formats of your reports.
      type: object
      properties:
        S3BucketName:
          $ref: "#/components/schemas/string"
          description: The unique name of the S3 bucket that receives your reports.
        S3KeyPrefix:
          $ref: "#/components/schemas/string"
          description: "The prefix for where Backup Audit Manager delivers your reports to Amazon S3. The prefix is this part of the following path: s3://your-bucket-name/prefix/Backup/us-west-2/year/month/day/report-name. If not specified, there is no prefix."
        Formats:
          $ref: "#/components/schemas/FormatList"
          description: "The format of your reports: CSV, JSON, or both. If not specified, the default format is CSV."
      required:
        - S3BucketName
    FormatList:
      type: array
      items:
        $ref: "#/components/schemas/string"
    ReportSetting:
      description: Contains detailed information about a report setting.
      type: object
      properties:
        ReportTemplate:
          $ref: "#/components/schemas/string"
          description: "Identifies the report template for the report. Reports are built using a report template. The report templates are: RESOURCE_COMPLIANCE_REPORT | CONTROL_COMPLIANCE_REPORT | BACKUP_JOB_REPORT | COPY_JOB_REPORT | RESTORE_JOB_REPORT | SCAN_JOB_REPORT"
        FrameworkArns:
          $ref: "#/components/schemas/stringList"
          description: The Amazon Resource Names (ARNs) of the frameworks a report covers.
        NumberOfFrameworks:
          $ref: "#/components/schemas/integer"
          description: The number of frameworks a report covers.
        Accounts:
          $ref: "#/components/schemas/stringList"
          description: These are the accounts to be included in the report. Use string value of ROOT to include all organizational units.
        OrganizationUnits:
          $ref: "#/components/schemas/stringList"
          description: These are the Organizational Units to be included in the report.
        Regions:
          $ref: "#/components/schemas/stringList"
          description: These are the Regions to be included in the report. Use the wildcard as the string value to include all Regions.
      required:
        - ReportTemplate
    stringList:
      type: array
      items:
        $ref: "#/components/schemas/string"
    integer:
      type: integer
    CreateReportPlanOutput:
      type: object
      properties:
        ReportPlanName:
          $ref: "#/components/schemas/ReportPlanName"
          description: The unique name of the report plan.
        ReportPlanArn:
          $ref: "#/components/schemas/ARN"
          description: An Amazon Resource Name (ARN) that uniquely identifies a resource. The format of the ARN depends on the resource type.
        CreationTime:
          $ref: "#/components/schemas/timestamp"
          description: The date and time a backup vault is created, in Unix format and Coordinated Universal Time (UTC). The value of CreationTime is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
    CreateRestoreAccessBackupVaultOutput:
      type: object
      properties:
        RestoreAccessBackupVaultArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN that uniquely identifies the created restore access backup vault.
        VaultState:
          $ref: "#/components/schemas/VaultState"
          description: The current state of the restore access backup vault.
        RestoreAccessBackupVaultName:
          $ref: "#/components/schemas/BackupVaultName"
          description: The name of the created restore access backup vault.
        CreationDate:
          $ref: "#/components/schemas/timestamp"
          description: ">The date and time when the restore access backup vault was created, in Unix format and Coordinated Universal Time"
    String:
      type: string
    RestoreTestingPlanForCreate:
      description: This contains metadata about a restore testing plan.
      type: object
      properties:
        RecoveryPointSelection:
          $ref: "#/components/schemas/RestoreTestingRecoveryPointSelection"
          description: "RecoveryPointSelection has five parameters (three required and two optional). The values you specify determine which recovery point is included in the restore test. You must indicate with Algorithm if you want the latest recovery point within your SelectionWindowDays or if you want a random recovery point, and you must indicate through IncludeVaults from which vaults the recovery points can be chosen. Algorithm (required) Valid values: \"LATEST_WITHIN_WINDOW\" or \"RANDOM_WITHIN_WINDOW\". Recovery point types (required) Valid values: \"SNAPSHOT\" and/or \"CONTINUOUS\". Include SNAPSHOT to restore only snapshot recovery points; include CONTINUOUS to restore continuous recovery points (point in time restore / PITR); use both to restore either a snapshot or a continuous recovery point. The recovery point will be determined by the value for Algorithm. IncludeVaults (required). You must include one or more backup vaults. Use the wildcard [\"*\"] or specific ARNs. SelectionWindowDays (optional) Value must be an integer (in days) from 1 to 365. If not included, the value defaults to 30. ExcludeVaults (optional). You can choose to input one or more specific backup vault ARNs to exclude those vaults' contents from restore eligibility. Or, you can include a list of selectors. If this parameter and its value are not included, it defaults to empty list."
        RestoreTestingPlanName:
          $ref: "#/components/schemas/String"
          description: The RestoreTestingPlanName is a unique string that is the name of the restore testing plan. This cannot be changed after creation, and it must consist of only alphanumeric characters and underscores.
        ScheduleExpression:
          $ref: "#/components/schemas/String"
          description: A CRON expression in specified timezone when a restore testing plan is executed. When no CRON expression is provided, Backup will use the default expression cron(0 5 ? * * *).
        ScheduleExpressionTimezone:
          $ref: "#/components/schemas/String"
          description: Optional. This is the timezone in which the schedule expression is set. By default, ScheduleExpressions are in UTC. You can modify this to a specified timezone.
        StartWindowHours:
          $ref: "#/components/schemas/integer"
          description: Defaults to 24 hours. A value in hours after a restore test is scheduled before a job will be canceled if it doesn't start successfully. This value is optional. If this value is included, this parameter has a maximum value of 168 hours (one week).
      required:
        - RecoveryPointSelection
        - RestoreTestingPlanName
        - ScheduleExpression
    RestoreTestingRecoveryPointSelection:
      description: "RecoveryPointSelection has five parameters (three required and two optional). The values you specify determine which recovery point is included in the restore test. You must indicate with Algorithm if you want the latest recovery point within your SelectionWindowDays or if you want a random recovery point, and you must indicate through IncludeVaults from which vaults the recovery points can be chosen. Algorithm (required) Valid values: \"LATEST_WITHIN_WINDOW\" or \"RANDOM_WITHIN_WINDOW\". Recovery point types (required) Valid values: \"SNAPSHOT\" and/or \"CONTINUOUS\". Include SNAPSHOT to restore only snapshot recovery points; include CONTINUOUS to restore continuous recovery points (point in time restore / PITR); use both to restore either a snapshot or a continuous recovery point. The recovery point will be determined by the value for Algorithm. IncludeVaults (required). You must include one or more backup vaults. Use the wildcard [\"*\"] or specific ARNs. SelectionWindowDays (optional) Value must be an integer (in days) from 1 to 365. If not included, the value defaults to 30. ExcludeVaults (optional). You can choose to input one or more specific backup vault ARNs to exclude those vaults' contents from restore eligibility. Or, you can include a list of selectors. If this parameter and its value are not included, it defaults to empty list."
      type: object
      properties:
        Algorithm:
          $ref: "#/components/schemas/RestoreTestingRecoveryPointSelectionAlgorithm"
          description: Acceptable values include "LATEST_WITHIN_WINDOW" or "RANDOM_WITHIN_WINDOW"
        ExcludeVaults:
          $ref: "#/components/schemas/stringList"
          description: Accepted values include specific ARNs or list of selectors. Defaults to empty list if not listed.
        IncludeVaults:
          $ref: "#/components/schemas/stringList"
          description: Accepted values include wildcard ["*"] or by specific ARNs or ARN wilcard replacement ["arn:aws:backup:us-west-2:123456789012:backup-vault:asdf", ...] ["arn:aws:backup:*:*:backup-vault:asdf-*", ...]
        RecoveryPointTypes:
          $ref: "#/components/schemas/RestoreTestingRecoveryPointTypeList"
          description: These are the types of recovery points. Include SNAPSHOT to restore only snapshot recovery points; include CONTINUOUS to restore continuous recovery points (point in time restore / PITR); use both to restore either a snapshot or a continuous recovery point. The recovery point will be determined by the value for Algorithm.
        SelectionWindowDays:
          $ref: "#/components/schemas/integer"
          description: Accepted values are integers from 1 to 365.
    RestoreTestingRecoveryPointSelectionAlgorithm:
      type: string
      enum:
        - LATEST_WITHIN_WINDOW
        - RANDOM_WITHIN_WINDOW
    RestoreTestingRecoveryPointTypeList:
      type: array
      items:
        $ref: "#/components/schemas/RestoreTestingRecoveryPointType"
    RestoreTestingRecoveryPointType:
      type: string
      enum:
        - CONTINUOUS
        - SNAPSHOT
    SensitiveStringMap:
      type: object
      properties: {}
    CreateRestoreTestingPlanOutput:
      type: object
      properties:
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time a restore testing plan was created, in Unix format and Coordinated Universal Time (UTC). The value of CreationTime is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087AM.
        RestoreTestingPlanArn:
          $ref: "#/components/schemas/String"
          description: An Amazon Resource Name (ARN) that uniquely identifies the created restore testing plan.
        RestoreTestingPlanName:
          $ref: "#/components/schemas/String"
          description: This unique string is the name of the restore testing plan. The name cannot be changed after creation. The name consists of only alphanumeric characters and underscores. Maximum length is 50.
      required:
        - CreationTime
        - RestoreTestingPlanArn
        - RestoreTestingPlanName
    Timestamp:
      type: string
      format: date-time
    RestoreTestingSelectionForCreate:
      description: 'This contains metadata about a specific restore testing selection. ProtectedResourceType is required, such as Amazon EBS or Amazon EC2. This consists of RestoreTestingSelectionName, ProtectedResourceType, and one of the following: ProtectedResourceArns ProtectedResourceConditions Each protected resource type can have one single value. A restore testing selection can include a wildcard value ("*") for ProtectedResourceArns along with ProtectedResourceConditions. Alternatively, you can include up to 30 specific protected resource ARNs in ProtectedResourceArns. ProtectedResourceConditions examples include as StringEquals and StringNotEquals.'
      type: object
      properties:
        IamRoleArn:
          $ref: "#/components/schemas/String"
          description: "The Amazon Resource Name (ARN) of the IAM role that Backup uses to create the target resource; for example: arn:aws:iam::123456789012:role/S3Access."
        ProtectedResourceArns:
          $ref: "#/components/schemas/stringList"
          description: 'Each protected resource can be filtered by its specific ARNs, such as ProtectedResourceArns: ["arn:aws:...", "arn:aws:..."] or by a wildcard: ProtectedResourceArns: ["*"], but not both.'
        ProtectedResourceConditions:
          $ref: "#/components/schemas/ProtectedResourceConditions"
          description: 'If you have included the wildcard in ProtectedResourceArns, you can include resource conditions, such as ProtectedResourceConditions: { StringEquals: [{ key: "XXXX", value: "YYYY" }].'
        ProtectedResourceType:
          $ref: "#/components/schemas/String"
          description: "The type of Amazon Web Services resource included in a restore testing selection; for example, an Amazon EBS volume or an Amazon RDS database. Supported resource types accepted include: Aurora for Amazon Aurora DocumentDB for Amazon DocumentDB (with MongoDB compatibility) DynamoDB for Amazon DynamoDB EBS for Amazon Elastic Block Store EC2 for Amazon Elastic Compute Cloud EFS for Amazon Elastic File System FSx for Amazon FSx Neptune for Amazon Neptune RDS for Amazon Relational Database Service S3 for Amazon S3"
        RestoreMetadataOverrides:
          type: object
          properties: {}
          description: You can override certain restore metadata keys by including the parameter RestoreMetadataOverrides in the body of RestoreTestingSelection. Key values are not case sensitive. See the complete list of restore testing inferred metadata.
        RestoreTestingSelectionName:
          $ref: "#/components/schemas/String"
          description: The unique name of the restore testing selection that belongs to the related restore testing plan. The name consists of only alphanumeric characters and underscores. Maximum length is 50.
        ValidationWindowHours:
          $ref: "#/components/schemas/integer"
          description: This is amount of hours (0 to 168) available to run a validation script on the data. The data will be deleted upon the completion of the validation script or the end of the specified retention period, whichever comes first.
      required:
        - IamRoleArn
        - ProtectedResourceType
        - RestoreTestingSelectionName
    ProtectedResourceConditions:
      description: The conditions that you define for resources in your restore testing plan using tags.
      type: object
      properties:
        StringEquals:
          $ref: "#/components/schemas/KeyValueList"
          description: Filters the values of your tagged resources for only those resources that you tagged with the same value. Also called "exact matching."
        StringNotEquals:
          $ref: "#/components/schemas/KeyValueList"
          description: Filters the values of your tagged resources for only those resources that you tagged that do not have the same value. Also called "negated matching."
    KeyValueList:
      type: array
      items:
        $ref: "#/components/schemas/KeyValue"
    KeyValue:
      description: "Pair of two related strings. Allowed characters are letters, white space, and numbers that can be represented in UTF-8 and the following characters: + - = . _ : /"
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/String"
          description: "The tag key (String). The key can't start with aws:. Length Constraints: Minimum length of 1. Maximum length of 128. Pattern: ^(?![aA]{1}[wW]{1}[sS]{1}:)([\\p{L}\\p{Z}\\p{N}_.:/=+\\-@]+)$"
        Value:
          $ref: "#/components/schemas/String"
          description: "The value of the key. Length Constraints: Maximum length of 256. Pattern: ^([\\p{L}\\p{Z}\\p{N}_.:/=+\\-@]*)$"
      required:
        - Key
        - Value
    CreateRestoreTestingSelectionOutput:
      type: object
      properties:
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the resource testing selection was created.
        RestoreTestingPlanArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the restore testing plan with which the restore testing selection is associated.
        RestoreTestingPlanName:
          $ref: "#/components/schemas/String"
