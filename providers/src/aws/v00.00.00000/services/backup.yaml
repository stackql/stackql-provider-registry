openapi: 3.0.0
info:
  version: "2018-11-15"
  title: AWS Backup
  description: AWS Backup
  x-serviceName: backup
  x-serviceAlias: backup
  x-protocol: rest-json
  x-apiVersion: "2018-11-15"
  x-endpointPrefix: backup
  x-jsonVersion: "1.1"
servers:
  - url: https://backup.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for backup
paths:
  /backup-vaults/{backup_vault_name}/mpaApprovalTeam:
    put:
      operationId: AssociateBackupVaultMpaApprovalTeam
      description: Associates an MPA approval team with a backup vault.
      parameters:
        - name: backup_vault_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BackupVaultName"
          description: The name of the backup vault to associate with the MPA approval team.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MpaApprovalTeamArn:
                  $ref: "#/components/schemas/ARN"
                RequesterComment:
                  $ref: "#/components/schemas/RequesterComment"
              required:
                - MpaApprovalTeamArn
      responses:
        "204":
          description: Success
  /legal-holds/{legal_hold_id}:
    delete:
      operationId: CancelLegalHold
      description: Removes the specified legal hold on a recovery point. This action can only be performed by a user with sufficient permissions.
      parameters:
        - name: legal_hold_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The ID of the legal hold.
        - name: cancelDescription
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: A string the describes the reason for removing the legal hold.
        - name: retainRecordInDays
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Long"
          description: The integer amount, in days, after which to remove legal hold.
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelLegalHoldOutput"
  /backup/plans/:
    put:
      operationId: CreateBackupPlan
      description: Creates a backup plan using a backup plan name and backup rules. A backup plan is a document that contains information that Backup uses to schedule tasks that create recovery points for resources. If you call CreateBackupPlan with a plan that already exists, you receive an AlreadyExistsException exception.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                BackupPlan:
                  $ref: "#/components/schemas/BackupPlanInput"
                BackupPlanTags:
                  $ref: "#/components/schemas/Tags"
                CreatorRequestId:
                  $ref: "#/components/schemas/string"
              required:
                - BackupPlan
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBackupPlanOutput"
    get:
      operationId: ListBackupPlans
      description: Lists the active backup plans for the account.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The next item following a partial list of returned items. For example, if a request is made to return MaxResults number of items, NextToken allows you to return more items in your list starting at the location pointed to by the next token.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to be returned.
        - name: includeDeleted
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: A Boolean value with a default value of FALSE that returns deleted backup plans when set to TRUE.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBackupPlansOutput"
  /backup/plans/{backup_plan_id}/selections/:
    put:
      operationId: CreateBackupSelection
      description: Creates a JSON document that specifies a set of resources to assign to a backup plan. For examples, see Assigning resources programmatically.
      parameters:
        - name: backup_plan_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The ID of the backup plan.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                BackupSelection:
                  $ref: "#/components/schemas/BackupSelection"
                CreatorRequestId:
                  $ref: "#/components/schemas/string"
              required:
                - BackupSelection
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBackupSelectionOutput"
    get:
      operationId: ListBackupSelections
      description: Returns an array containing metadata of the resources associated with the target backup plan.
      parameters:
        - name: backup_plan_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: Uniquely identifies a backup plan.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The next item following a partial list of returned items. For example, if a request is made to return MaxResults number of items, NextToken allows you to return more items in your list starting at the location pointed to by the next token.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to be returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBackupSelectionsOutput"
  /backup-vaults/{backup_vault_name}:
    put:
      operationId: CreateBackupVault
      description: Creates a logical container where backups are stored. A CreateBackupVault request includes a name, optionally one or more resource tags, an encryption key, and a request ID. Do not include sensitive data, such as passport numbers, in the name of a backup vault.
      parameters:
        - name: backup_vault_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BackupVaultName"
          description: The name of a logical container where backups are stored. Backup vaults are identified by names that are unique to the account used to create them and the Amazon Web Services Region where they are created. They consist of letters, numbers, and hyphens.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                BackupVaultTags:
                  $ref: "#/components/schemas/Tags"
                EncryptionKeyArn:
                  $ref: "#/components/schemas/ARN"
                CreatorRequestId:
                  $ref: "#/components/schemas/string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBackupVaultOutput"
    delete:
      operationId: DeleteBackupVault
      description: Deletes the backup vault identified by its name. A vault can be deleted only if it is empty.
      parameters:
        - name: backup_vault_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The name of a logical container where backups are stored. Backup vaults are identified by names that are unique to the account used to create them and the Amazon Web Services Region where they are created.
      responses:
        "200":
          description: Success
    get:
      operationId: DescribeBackupVault
      description: Returns metadata about a backup vault specified by its name.
      parameters:
        - name: backup_vault_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The name of a logical container where backups are stored. Backup vaults are identified by names that are unique to the account used to create them and the Amazon Web Services Region where they are created.
        - name: backupVaultAccountId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The account ID of the specified backup vault.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeBackupVaultOutput"
  /audit/frameworks:
    post:
      operationId: CreateFramework
      description: Creates a framework with one or more controls. A framework is a collection of controls that you can use to evaluate your backup practices. By using pre-built customizable controls to define your policies, you can evaluate whether your backup practices comply with your policies and which resources are not yet in compliance.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                FrameworkName:
                  $ref: "#/components/schemas/FrameworkName"
                FrameworkDescription:
                  $ref: "#/components/schemas/FrameworkDescription"
                FrameworkControls:
                  $ref: "#/components/schemas/FrameworkControls"
                IdempotencyToken:
                  $ref: "#/components/schemas/string"
                FrameworkTags:
                  $ref: "#/components/schemas/stringMap"
              required:
                - FrameworkName
                - FrameworkControls
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFrameworkOutput"
    get:
      operationId: ListFrameworks
      description: Returns a list of all frameworks for an Amazon Web Services account and Amazon Web Services Region.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxFrameworkInputs"
          description: The number of desired results from 1 to 1000. Optional. If unspecified, the query will return 1 MB of data.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: An identifier that was returned from the previous call to this operation, which can be used to return the next set of items in the list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFrameworksOutput"
  /legal-holds/:
    post:
      operationId: CreateLegalHold
      description: Creates a legal hold on a recovery point (backup). A legal hold is a restraint on altering or deleting a backup until an authorized user cancels the legal hold. Any actions to delete or disassociate a recovery point will fail with an error if one or more active legal holds are on the recovery point.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Title:
                  $ref: "#/components/schemas/string"
                Description:
                  $ref: "#/components/schemas/string"
                IdempotencyToken:
                  $ref: "#/components/schemas/string"
                RecoveryPointSelection:
                  $ref: "#/components/schemas/RecoveryPointSelection"
                Tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLegalHoldOutput"
    get:
      operationId: ListLegalHolds
      description: This action returns metadata about active and previous legal holds.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The next item following a partial list of returned resources. For example, if a request is made to return MaxResults number of resources, NextToken allows you to return more items in your list starting at the location pointed to by the next token.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of resource list items to be returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLegalHoldsOutput"
  /logically-air-gapped-backup-vaults/{backup_vault_name}:
    put:
      operationId: CreateLogicallyAirGappedBackupVault
      description: Creates a logical container to where backups may be copied. This request includes a name, the Region, the maximum number of retention days, the minimum number of retention days, and optionally can include tags and a creator request ID. Do not include sensitive data, such as passport numbers, in the name of a backup vault.
      parameters:
        - name: backup_vault_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BackupVaultName"
          description: The name of a logical container where backups are stored. Logically air-gapped backup vaults are identified by names that are unique to the account used to create them and the Region where they are created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                BackupVaultTags:
                  $ref: "#/components/schemas/Tags"
                CreatorRequestId:
                  $ref: "#/components/schemas/string"
                MinRetentionDays:
                  $ref: "#/components/schemas/Long"
                MaxRetentionDays:
                  $ref: "#/components/schemas/Long"
                EncryptionKeyArn:
                  $ref: "#/components/schemas/ARN"
              required:
                - MinRetentionDays
                - MaxRetentionDays
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLogicallyAirGappedBackupVaultOutput"
  /audit/report-plans:
    post:
      operationId: CreateReportPlan
      description: Creates a report plan. A report plan is a document that contains information about the contents of the report and where Backup will deliver it. If you call CreateReportPlan with a plan that already exists, you receive an AlreadyExistsException exception.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ReportPlanName:
                  $ref: "#/components/schemas/ReportPlanName"
                ReportPlanDescription:
                  $ref: "#/components/schemas/ReportPlanDescription"
                ReportDeliveryChannel:
                  $ref: "#/components/schemas/ReportDeliveryChannel"
                ReportSetting:
                  $ref: "#/components/schemas/ReportSetting"
                ReportPlanTags:
                  $ref: "#/components/schemas/stringMap"
                IdempotencyToken:
                  $ref: "#/components/schemas/string"
              required:
                - ReportPlanName
                - ReportDeliveryChannel
                - ReportSetting
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReportPlanOutput"
    get:
      operationId: ListReportPlans
      description: Returns a list of your report plans. For detailed information about a single report plan, use DescribeReportPlan.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of desired results from 1 to 1000. Optional. If unspecified, the query will return 1 MB of data.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: An identifier that was returned from the previous call to this operation, which can be used to return the next set of items in the list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReportPlansOutput"
  /restore-access-backup-vaults:
    put:
      operationId: CreateRestoreAccessBackupVault
      description: Creates a restore access backup vault that provides temporary access to recovery points in a logically air-gapped backup vault, subject to MPA approval.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SourceBackupVaultArn:
                  $ref: "#/components/schemas/ARN"
                BackupVaultName:
                  $ref: "#/components/schemas/BackupVaultName"
                BackupVaultTags:
                  $ref: "#/components/schemas/Tags"
                CreatorRequestId:
                  $ref: "#/components/schemas/string"
                RequesterComment:
                  $ref: "#/components/schemas/RequesterComment"
              required:
                - SourceBackupVaultArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRestoreAccessBackupVaultOutput"
  /restore-testing/plans:
    put:
      operationId: CreateRestoreTestingPlan
      description: Creates a restore testing plan. The first of two steps to create a restore testing plan. After this request is successful, finish the procedure using CreateRestoreTestingSelection.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CreatorRequestId:
                  $ref: "#/components/schemas/String"
                RestoreTestingPlan:
                  $ref: "#/components/schemas/RestoreTestingPlanForCreate"
                Tags:
                  $ref: "#/components/schemas/SensitiveStringMap"
              required:
                - RestoreTestingPlan
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRestoreTestingPlanOutput"
    get:
      operationId: ListRestoreTestingPlans
      description: Returns a list of restore testing plans.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRestoreTestingPlansInputMaxResultsInteger"
          description: The maximum number of items to be returned.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The next item following a partial list of returned items. For example, if a request is made to return MaxResults number of items, NextToken allows you to return more items in your list starting at the location pointed to by the nexttoken.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRestoreTestingPlansOutput"
  /restore-testing/plans/{restore_testing_plan_name}/selections:
    put:
      operationId: CreateRestoreTestingSelection
      description: 'This request can be sent after CreateRestoreTestingPlan request returns successfully. This is the second part of creating a resource testing plan, and it must be completed sequentially. This consists of RestoreTestingSelectionName, ProtectedResourceType, and one of the following: ProtectedResourceArns ProtectedResourceConditions Each protected resource type can have one single value. A restore testing selection can include a wildcard value ("*") for ProtectedResourceArns along with ProtectedResourceConditions. Alternatively, you can include up to 30 specific protected resource ARNs in ProtectedResourceArns. Cannot select by both protected resource types AND specific ARNs. Request will fail if both are included.'
      parameters:
        - name: restore_testing_plan_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: Input the restore testing plan name that was returned from the related CreateRestoreTestingPlan request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CreatorRequestId:
                  $ref: "#/components/schemas/String"
                RestoreTestingSelection:
                  $ref: "#/components/schemas/RestoreTestingSelectionForCreate"
              required:
                - RestoreTestingSelection
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRestoreTestingSelectionOutput"
    get:
      operationId: ListRestoreTestingSelections
      description: Returns a list of restore testing selections. Can be filtered by MaxResults and RestoreTestingPlanName.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRestoreTestingSelectionsInputMaxResultsInteger"
          description: The maximum number of items to be returned.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The next item following a partial list of returned items. For example, if a request is made to return MaxResults number of items, NextToken allows you to return more items in your list starting at the location pointed to by the nexttoken.
        - name: restore_testing_plan_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: Returns restore testing selections by the specified restore testing plan name.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRestoreTestingSelectionsOutput"
  /tiering-configurations:
    put:
      operationId: CreateTieringConfiguration
      description: Creates a tiering configuration. A tiering configuration enables automatic movement of backup data to a lower-cost storage tier based on the age of backed-up objects in the backup vault. Each vault can only have one vault-specific tiering configuration, in addition to any global configuration that applies to all vaults.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TieringConfiguration:
                  $ref: "#/components/schemas/TieringConfigurationInputForCreate"
                TieringConfigurationTags:
                  $ref: "#/components/schemas/Tags"
                CreatorRequestId:
                  $ref: "#/components/schemas/CreatorRequestId"
              required:
                - TieringConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTieringConfigurationOutput"
  /backup/plans/{backup_plan_id}:
    delete:
      operationId: DeleteBackupPlan
      description: Deletes a backup plan. A backup plan can only be deleted after all associated selections of resources have been deleted. Deleting a backup plan deletes the current version of a backup plan. Previous versions, if any, will still exist.
      parameters:
        - name: backup_plan_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: Uniquely identifies a backup plan.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBackupPlanOutput"
    post:
      operationId: UpdateBackupPlan
      description: Updates the specified backup plan. The new version is uniquely identified by its ID.
      parameters:
        - name: backup_plan_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: The ID of the backup plan.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                BackupPlan:
                  $ref: "#/components/schemas/BackupPlanInput"
              required:
                - BackupPlan
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBackupPlanOutput"
  /backup/plans/{backup_plan_id}/selections/{selection_id}:
    delete:
      operationId: DeleteBackupSelection
      description: Deletes the resource selection associated with a backup plan that is specified by the SelectionId.
      parameters:
        - name: backup_plan_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: Uniquely identifies a backup plan.
        - name: selection_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: Uniquely identifies the body of a request to assign a set of resources to a backup plan.
      responses:
        "200":
          description: Success
    get:
      operationId: GetBackupSelection
      description: Returns selection metadata and a document in JSON format that specifies a list of resources that are associated with a backup plan.
      parameters:
        - name: backup_plan_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: Uniquely identifies a backup plan.
        - name: selection_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/string"
          description: Uniquely identifies the body of a request to assign a set of resources to a backup plan.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBackupSelectionOutput"
  /backup-vaults/{backup_vault_name}/access-policy:
    delete:
      operationId: DeleteBackupVaultAccessPolicy
      description: Deletes the policy document that manages permissions on a backup vault.
      parameters:
        - name: backup_vault_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BackupVaultName"
          description: The name of a logical container where backups are stored. Backup vaults are identified by names that are unique to the account used to create them and the Amazon Web Services Region where they are created. They consist of lowercase letters, numbers, and hyphens.
      responses:
        "200":
          description: Success
    get:
      operationId: GetBackupVaultAccessPolicy
      description: Returns the access policy document that is associated with the named backup vault.
      parameters:
        - name: backup_vault_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BackupVaultName"
          description: The name of a logical container where backups are stored. Backup vaults are identified by names that are unique to the account used to create them and the Amazon Web Services Region where they are created.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBackupVaultAccessPolicyOutput"
    put:
      operationId: PutBackupVaultAccessPolicy
      description: Sets a resource-based policy that is used to manage access permissions on the target backup vault. Requires a backup vault name and an access policy document in JSON format.
      parameters:
        - name: backup_vault_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BackupVaultName"
          description: The name of a logical container where backups are stored. Backup vaults are identified by names that are unique to the account used to create them and the Amazon Web Services Region where they are created.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Policy:
                  $ref: "#/components/schemas/IAMPolicy"
      responses:
        "200":
          description: Success
  /backup-vaults/{backup_vault_name}/vault-lock:
    delete:
      operationId: DeleteBackupVaultLockConfiguration
      description: Deletes Backup Vault Lock from a backup vault specified by a backup vault name. If the Vault Lock configuration is immutable, then you cannot delete Vault Lock using API operations, and you will receive an InvalidRequestException if you attempt to do so. For more information, see Vault Lock in the Backup Developer Guide.
      parameters:
        - name: backup_vault_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BackupVaultName"
          description: The name of the backup vault from which to delete Backup Vault Lock.
      responses:
        "200":
          description: Success
    put:
