          schema:
            $ref: "#/components/schemas/ListScanJobsInputMaxResultsInteger"
          description: "The maximum number of items to be returned. Valid Range: Minimum value of 1. Maximum value of 1000."
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The next item following a partial list of returned items. For example, if a request is made to return MaxResults number of items, NextToken allows you to return more items in your list starting at the location pointed to by the next token.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListScanJobsOutput"
  /tags/{resource_arn}/:
    get:
      operationId: ListTags
      description: Returns the tags assigned to the resource, such as a target recovery point, backup plan, or backup vault. This operation returns results depending on the resource type used in the value for resourceArn. For example, recovery points of Amazon DynamoDB with Advanced Settings have an ARN (Amazon Resource Name) that begins with arn:aws:backup. Recovery points (backups) of DynamoDB without Advanced Settings enabled have an ARN that begins with arn:aws:dynamodb. When this operation is called and when you include values of resourceArn that have an ARN other than arn:aws:backup, it may return one of the exceptions listed below. To prevent this exception, include only values representing resource types that are fully managed by Backup. These have an ARN that begins arn:aws:backup and they are noted in the Feature availability by resource table.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ARN"
          description: An Amazon Resource Name (ARN) that uniquely identifies a resource. The format of the ARN depends on the type of resource. Valid targets for ListTags are recovery points, backup plans, and backup vaults.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The next item following a partial list of returned items. For example, if a request is made to return MaxResults number of items, NextToken allows you to return more items in your list starting at the location pointed to by the next token.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to be returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsOutput"
  /tiering-configurations/:
    get:
      operationId: ListTieringConfigurations
      description: Returns a list of tiering configurations.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to be returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: The next item following a partial list of returned items. For example, if a request is made to return MaxResults number of items, NextToken allows you to return more items in your list starting at the location pointed to by the next token.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTieringConfigurationsOutput"
  /restore-jobs/{restore_job_id}/validations:
    put:
      operationId: PutRestoreValidationResult
      description: This request allows you to send your independent self-run restore test validation results. RestoreJobId and ValidationStatus are required. Optionally, you can input a ValidationStatusMessage.
      parameters:
        - name: restore_job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RestoreJobId"
          description: This is a unique identifier of a restore job within Backup.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ValidationStatus:
                  $ref: "#/components/schemas/RestoreValidationStatus"
                ValidationStatusMessage:
                  $ref: "#/components/schemas/string"
              required:
                - ValidationStatus
      responses:
        "204":
          description: Success
  /logically-air-gapped-backup-vaults/{backup_vault_name}/restore-access-backup-vaults/{restore_access_backup_vault_arn}:
    delete:
      operationId: RevokeRestoreAccessBackupVault
      description: Revokes access to a restore access backup vault, removing the ability to restore from its recovery points and permanently deleting the vault.
      parameters:
        - name: backup_vault_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BackupVaultName"
          description: The name of the source backup vault associated with the restore access backup vault to be revoked.
        - name: restore_access_backup_vault_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ARN"
          description: The ARN of the restore access backup vault to revoke.
        - name: requesterComment
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RequesterComment"
          description: A comment explaining the reason for revoking access to the restore access backup vault.
      responses:
        "200":
          description: Success
  /backup-jobs:
    put:
      operationId: StartBackupJob
      description: Starts an on-demand backup job for the specified resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                BackupVaultName:
                  $ref: "#/components/schemas/BackupVaultName"
                LogicallyAirGappedBackupVaultArn:
                  $ref: "#/components/schemas/ARN"
                ResourceArn:
                  $ref: "#/components/schemas/ARN"
                IamRoleArn:
                  $ref: "#/components/schemas/IAMRoleArn"
                IdempotencyToken:
                  $ref: "#/components/schemas/string"
                StartWindowMinutes:
                  $ref: "#/components/schemas/WindowMinutes"
                CompleteWindowMinutes:
                  $ref: "#/components/schemas/WindowMinutes"
                Lifecycle:
                  $ref: "#/components/schemas/Lifecycle"
                RecoveryPointTags:
                  $ref: "#/components/schemas/Tags"
                BackupOptions:
                  $ref: "#/components/schemas/BackupOptions"
                Index:
                  $ref: "#/components/schemas/Index"
              required:
                - BackupVaultName
                - ResourceArn
                - IamRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartBackupJobOutput"
  /copy-jobs:
    put:
      operationId: StartCopyJob
