          description: The maximum number of items to be returned.
        - name: resourceArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ARN"
          description: Returns only backup jobs that match the specified resource Amazon Resource Name (ARN).
        - name: state
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BackupJobState"
          description: "Returns only backup jobs that are in the specified state. Completed with issues is a status found only in the Backup console. For API, this status refers to jobs with a state of COMPLETED and a MessageCategory with a value other than SUCCESS; that is, the status is completed but comes with a status message. To obtain the job count for Completed with issues, run two GET requests, and subtract the second, smaller number: GET /backup-jobs/?state=COMPLETED GET /backup-jobs/?messageCategory=SUCCESS&state=COMPLETED"
        - name: backupVaultName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BackupVaultName"
          description: Returns only backup jobs that will be stored in the specified backup vault. Backup vaults are identified by names that are unique to the account used to create them and the Amazon Web Services Region where they are created.
        - name: createdBefore
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/timestamp"
          description: Returns only backup jobs that were created before the specified date.
        - name: createdAfter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/timestamp"
          description: Returns only backup jobs that were created after the specified date.
        - name: resourceType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceType"
          description: "Returns only backup jobs for the specified resources: Aurora for Amazon Aurora CloudFormation for CloudFormation DocumentDB for Amazon DocumentDB (with MongoDB compatibility) DynamoDB for Amazon DynamoDB EBS for Amazon Elastic Block Store EC2 for Amazon Elastic Compute Cloud EFS for Amazon Elastic File System EKS for Amazon Elastic Kubernetes Service FSx for Amazon FSx Neptune for Amazon Neptune RDS for Amazon Relational Database Service Redshift for Amazon Redshift S3 for Amazon Simple Storage Service (Amazon S3) SAP HANA on Amazon EC2 for SAP HANA databases on Amazon Elastic Compute Cloud instances Storage Gateway for Storage Gateway Timestream for Amazon Timestream VirtualMachine for VMware virtual machines"
        - name: accountId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The account ID to list the jobs from. Returns only backup jobs associated with the specified account ID. If used from an Organizations management account, passing * returns all jobs across the organization.
        - name: completeAfter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/timestamp"
          description: Returns only backup jobs completed after a date expressed in Unix format and Coordinated Universal Time (UTC).
        - name: completeBefore
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/timestamp"
          description: Returns only backup jobs completed before a date expressed in Unix format and Coordinated Universal Time (UTC).
        - name: parentJobId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: This is a filter to list child (nested) jobs based on parent job ID.
        - name: messageCategory
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/string"
          description: This is an optional parameter that can be used to filter out jobs with a MessageCategory which matches the value you input. Example strings may include AccessDenied, SUCCESS, AGGREGATE_ALL, and InvalidParameters. View Monitoring The wildcard () returns count of all message categories. AGGREGATE_ALL aggregates job counts for all message categories and returns the sum.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBackupJobsOutput"
