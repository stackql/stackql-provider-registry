        LastExecutionTime:
          $ref: "#/components/schemas/Timestamp"
          description: The last time a restore test was run with the specified restore testing plan. A date and time, in Unix format and Coordinated Universal Time (UTC). The value of LastExecutionDate is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        LastUpdateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the restore testing plan was updated. This update is in Unix format and Coordinated Universal Time (UTC). The value of LastUpdateTime is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        RestoreTestingPlanArn:
          $ref: "#/components/schemas/String"
          description: An Amazon Resource Name (ARN) that uniquely identifiesa restore testing plan.
