    BackupVaultNameOrWildcard:
      type: string
      pattern: ^(\*|[a-zA-Z0-9\-\_]{2,50})$
    ResourceSelections:
      type: array
      items:
        $ref: "#/components/schemas/ResourceSelection"
    ResourceSelection:
      description: This contains metadata about resource selection for tiering configurations. You can specify up to 5 different resource selections per tiering configuration. Data moved to lower-cost tier remains there until deletion (one-way transition).
      type: object
      properties:
        Resources:
          $ref: "#/components/schemas/ResourceArns"
          description: An array of strings that either contains ARNs of the associated resources or contains a wildcard * to specify all resources. You can specify up to 100 specific resources per tiering configuration.
        TieringDownSettingsInDays:
          $ref: "#/components/schemas/TieringDownSettingsInDays"
          description: The number of days after creation within a backup vault that an object can transition to the low cost warm storage tier. Must be a positive integer between 60 and 36500 days.
        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The type of Amazon Web Services resource; for example, S3 for Amazon S3. For tiering configurations, this is currently limited to S3.
      required:
        - Resources
        - TieringDownSettingsInDays
        - ResourceType
    TieringDownSettingsInDays:
      type: integer
      minimum: 60
      maximum: 36500
    CreatorRequestId:
      type: string
    CreateTieringConfigurationOutput:
      type: object
      properties:
        TieringConfigurationArn:
          $ref: "#/components/schemas/ARN"
          description: An Amazon Resource Name (ARN) that uniquely identifies the created tiering configuration.
        TieringConfigurationName:
          $ref: "#/components/schemas/string"
          description: This unique string is the name of the tiering configuration. The name cannot be changed after creation. The name consists of only alphanumeric characters and underscores. Maximum length is 200.
        CreationTime:
          $ref: "#/components/schemas/timestamp"
          description: The date and time a tiering configuration was created, in Unix format and Coordinated Universal Time (UTC). The value of CreationTime is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087AM.
