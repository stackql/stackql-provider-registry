    GetBackupPlanOutput:
      type: object
      properties:
        BackupPlan:
          $ref: "#/components/schemas/BackupPlan"
          description: Specifies the body of a backup plan. Includes a BackupPlanName and one or more sets of Rules.
        BackupPlanId:
          $ref: "#/components/schemas/string"
          description: Uniquely identifies a backup plan.
        BackupPlanArn:
          $ref: "#/components/schemas/ARN"
          description: An Amazon Resource Name (ARN) that uniquely identifies a backup plan; for example, arn:aws:backup:us-east-1:123456789012:plan:8F81F553-3A74-4A3F-B93D-B3360DC80C50.
        VersionId:
          $ref: "#/components/schemas/string"
          description: Unique, randomly generated, Unicode, UTF-8 encoded strings that are at most 1,024 bytes long. Version IDs cannot be edited.
        CreatorRequestId:
          $ref: "#/components/schemas/string"
          description: A unique string that identifies the request and allows failed requests to be retried without the risk of running the operation twice.
        CreationDate:
          $ref: "#/components/schemas/timestamp"
          description: The date and time that a backup plan is created, in Unix format and Coordinated Universal Time (UTC). The value of CreationDate is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        DeletionDate:
          $ref: "#/components/schemas/timestamp"
          description: The date and time that a backup plan is deleted, in Unix format and Coordinated Universal Time (UTC). The value of DeletionDate is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        LastExecutionDate:
          $ref: "#/components/schemas/timestamp"
          description: The last time this backup plan was run. A date and time, in Unix format and Coordinated Universal Time (UTC). The value of LastExecutionDate is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        AdvancedBackupSettings:
          $ref: "#/components/schemas/AdvancedBackupSettings"
          description: Contains a list of BackupOptions for each resource type. The list is populated only if the advanced option is set for the backup plan.
        ScheduledRunsPreview:
          $ref: "#/components/schemas/ScheduledRunsPreview"
          description: List of upcoming scheduled backup runs. Only included when MaxScheduledRunsPreview parameter is greater than 0. Contains up to 10 future backup executions with their scheduled times, execution types, and associated rule IDs.
    BackupPlan:
      description: Contains an optional backup plan display name and an array of BackupRule objects, each of which specifies a backup rule. Each rule in a backup plan is a separate scheduled task and can back up a different selection of Amazon Web Services resources.
      type: object
      properties:
        BackupPlanName:
          $ref: "#/components/schemas/BackupPlanName"
          description: The display name of a backup plan. Must contain only alphanumeric or '-_.' special characters. If this is set in the console, it can contain 1 to 50 characters; if this is set through CLI or API, it can contain 1 to 200 characters.
        Rules:
          $ref: "#/components/schemas/BackupRules"
          description: An array of BackupRule objects, each of which specifies a scheduled task that is used to back up a selection of resources.
        AdvancedBackupSettings:
          $ref: "#/components/schemas/AdvancedBackupSettings"
          description: Contains a list of BackupOptions for each resource type.
        ScanSettings:
          $ref: "#/components/schemas/ScanSettings"
          description: Contains your scanning configuration for the backup plan and includes the Malware scanner, your selected resources, and scanner role.
      required:
        - BackupPlanName
        - Rules
    BackupRules:
      type: array
      items:
        $ref: "#/components/schemas/BackupRule"
    BackupRule:
      description: Specifies a scheduled task used to back up a selection of resources.
      type: object
      properties:
        RuleName:
          $ref: "#/components/schemas/BackupRuleName"
          description: A display name for a backup rule. Must contain 1 to 50 alphanumeric or '-_.' characters.
        TargetBackupVaultName:
          $ref: "#/components/schemas/BackupVaultName"
          description: The name of a logical container where backups are stored. Backup vaults are identified by names that are unique to the account used to create them and the Amazon Web Services Region where they are created.
        TargetLogicallyAirGappedBackupVaultArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of a logically air-gapped vault. ARN must be in the same account and Region. If provided, supported fully managed resources back up directly to logically air-gapped vault, while other supported resources create a temporary (billable) snapshot in backup vault, then copy it to logically air-gapped vault. Unsupported resources only back up to the specified backup vault.
        ScheduleExpression:
          $ref: "#/components/schemas/CronExpression"
          description: A cron expression in UTC specifying when Backup initiates a backup job. When no CRON expression is provided, Backup will use the default expression cron(0 5 ? * * *). For more information about Amazon Web Services cron expressions, see Schedule Expressions for Rules in the Amazon CloudWatch Events User Guide. Two examples of Amazon Web Services cron expressions are 15 * ? * * * (take a backup every hour at 15 minutes past the hour) and 0 12 * * ? * (take a backup every day at 12 noon UTC). For a table of examples, click the preceding link and scroll down the page.
        StartWindowMinutes:
          $ref: "#/components/schemas/WindowMinutes"
          description: A value in minutes after a backup is scheduled before a job will be canceled if it doesn't start successfully. This value is optional. If this value is included, it must be at least 60 minutes to avoid errors. During the start window, the backup job status remains in CREATED status until it has successfully begun or until the start window time has run out. If within the start window time Backup receives an error that allows the job to be retried, Backup will automatically retry to begin the job at least every 10 minutes until the backup successfully begins (the job status changes to RUNNING) or until the job status changes to EXPIRED (which is expected to occur when the start window time is over).
        CompletionWindowMinutes:
          $ref: "#/components/schemas/WindowMinutes"
          description: A value in minutes after a backup job is successfully started before it must be completed or it will be canceled by Backup. This value is optional.
        Lifecycle:
          $ref: "#/components/schemas/Lifecycle"
          description: The lifecycle defines when a protected resource is transitioned to cold storage and when it expires. Backup transitions and expires backups automatically according to the lifecycle that you define. Backups transitioned to cold storage must be stored in cold storage for a minimum of 90 days. Therefore, the “retention” setting must be 90 days greater than the “transition to cold after days” setting. The “transition to cold after days” setting cannot be changed after a backup has been transitioned to cold. Resource types that can transition to cold storage are listed in the Feature availability by resource table. Backup ignores this expression for other resource types.
        RecoveryPointTags:
          type: object
          properties: {}
          description: The tags that are assigned to resources that are associated with this rule when restored from backup.
        RuleId:
          $ref: "#/components/schemas/string"
          description: Uniquely identifies a rule that is used to schedule the backup of a selection of resources.
        CopyActions:
          $ref: "#/components/schemas/CopyActions"
          description: An array of CopyAction objects, which contains the details of the copy operation.
        EnableContinuousBackup:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether Backup creates continuous backups. True causes Backup to create continuous backups capable of point-in-time restore (PITR). False (or not specified) causes Backup to create snapshot backups.
        ScheduleExpressionTimezone:
          $ref: "#/components/schemas/Timezone"
          description: The timezone in which the schedule expression is set. By default, ScheduleExpressions are in UTC. You can modify this to a specified timezone.
        IndexActions:
          $ref: "#/components/schemas/IndexActions"
          description: IndexActions is an array you use to specify how backup data should be indexed. eEach BackupRule can have 0 or 1 IndexAction, as each backup can have up to one index associated with it. Within the array is ResourceType. Only one will be accepted for each BackupRule.
        ScanActions:
          $ref: "#/components/schemas/ScanActions"
          description: Contains your scanning configuration for the backup rule and includes the malware scanner, and scan mode of either full or incremental.
      required:
        - RuleName
        - TargetBackupVaultName
