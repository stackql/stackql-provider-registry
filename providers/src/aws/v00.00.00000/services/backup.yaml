        ProtectedResourceArns:
          $ref: "#/components/schemas/stringList"
          description: 'You can include a list of specific ARNs, such as ProtectedResourceArns: ["arn:aws:...", "arn:aws:..."] or you can include a wildcard: ProtectedResourceArns: ["*"], but not both.'
        ProtectedResourceConditions:
