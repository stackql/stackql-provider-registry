        GlobalSettings:
          type: object
          properties: {}
          description: "The status of the flags isCrossAccountBackupEnabled, isMpaEnabled ('Mpa' refers to multi-party approval), and isDelegatedAdministratorEnabled. isCrossAccountBackupEnabled: Allow accounts in your organization to copy backups to other accounts. isMpaEnabled: Add cross-account access to your organization with the option to assign a Multi-party approval team to a logically air-gapped vault. isDelegatedAdministratorEnabled: Allow Backup to automatically synchronize delegated administrator permissions with Organizations."
        LastUpdateTime:
          $ref: "#/components/schemas/timestamp"
          description: The date and time that the supported flags were last updated. This update is in Unix format and Coordinated Universal Time (UTC). The value of LastUpdateTime is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
    DescribeProtectedResourceOutput:
      type: object
      properties:
        ResourceArn:
          $ref: "#/components/schemas/ARN"
          description: An ARN that uniquely identifies a resource. The format of the ARN depends on the resource type.
        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The type of Amazon Web Services resource saved as a recovery point; for example, an Amazon EBS volume or an Amazon RDS database.
        LastBackupTime:
          $ref: "#/components/schemas/timestamp"
          description: The date and time that a resource was last backed up, in Unix format and Coordinated Universal Time (UTC). The value of LastBackupTime is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        ResourceName:
          $ref: "#/components/schemas/string"
          description: The name of the resource that belongs to the specified backup.
        LastBackupVaultArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN (Amazon Resource Name) of the backup vault that contains the most recent backup recovery point.
        LastRecoveryPointArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN (Amazon Resource Name) of the most recent recovery point.
        LatestRestoreExecutionTimeMinutes:
          $ref: "#/components/schemas/Long"
          description: The time, in minutes, that the most recent restore job took to complete.
        LatestRestoreJobCreationDate:
          $ref: "#/components/schemas/timestamp"
          description: The creation date of the most recent restore job.
        LatestRestoreRecoveryPointCreationDate:
          $ref: "#/components/schemas/timestamp"
          description: The date the most recent recovery point was created.
    DescribeRecoveryPointOutput:
      type: object
      properties:
        RecoveryPointArn:
          $ref: "#/components/schemas/ARN"
          description: An ARN that uniquely identifies a recovery point; for example, arn:aws:backup:us-east-1:123456789012:recovery-point:1EB3B5E7-9EB0-435A-A80B-108B488B0D45.
        BackupVaultName:
          $ref: "#/components/schemas/BackupVaultName"
          description: The name of a logical container where backups are stored. Backup vaults are identified by names that are unique to the account used to create them and the Region where they are created.
        BackupVaultArn:
          $ref: "#/components/schemas/ARN"
          description: An ARN that uniquely identifies a backup vault; for example, arn:aws:backup:us-east-1:123456789012:backup-vault:aBackupVault.
        SourceBackupVaultArn:
          $ref: "#/components/schemas/ARN"
          description: An Amazon Resource Name (ARN) that uniquely identifies the source vault where the resource was originally backed up in; for example, arn:aws:backup:us-east-1:123456789012:backup-vault:aBackupVault. If the recovery is restored to the same Amazon Web Services account or Region, this value will be null.
        ResourceArn:
          $ref: "#/components/schemas/ARN"
          description: An ARN that uniquely identifies a saved resource. The format of the ARN depends on the resource type.
        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The type of Amazon Web Services resource to save as a recovery point; for example, an Amazon Elastic Block Store (Amazon EBS) volume or an Amazon Relational Database Service (Amazon RDS) database.
        CreatedBy:
          $ref: "#/components/schemas/RecoveryPointCreator"
          description: Contains identifying information about the creation of a recovery point, including the BackupPlanArn, BackupPlanId, BackupPlanVersion, and BackupRuleId of the backup plan used to create it.
        IamRoleArn:
          $ref: "#/components/schemas/IAMRoleArn"
          description: Specifies the IAM role ARN used to create the target recovery point; for example, arn:aws:iam::123456789012:role/S3Access.
        Status:
          $ref: "#/components/schemas/RecoveryPointStatus"
          description: "A status code specifying the state of the recovery point. For more information, see Recovery point status in the Backup Developer Guide. CREATING status indicates that an Backup job has been initiated for a resource. The backup process has started and is actively processing a backup job for the associated recovery point. AVAILABLE status indicates that the backup was successfully created for the recovery point. The backup process has completed without any issues, and the recovery point is now ready for use. PARTIAL status indicates a composite recovery point has one or more nested recovery points that were not in the backup. EXPIRED status indicates that the recovery point has exceeded its retention period, but Backup lacks permission or is otherwise unable to delete it. To manually delete these recovery points, see Step 3: Delete the recovery points in the Clean up resources section of Getting started. STOPPED status occurs on a continuous backup where a user has taken some action that causes the continuous backup to be disabled. This can be caused by the removal of permissions, turning off versioning, turning off events being sent to EventBridge, or disabling the EventBridge rules that are put in place by Backup. For recovery points of Amazon S3, Amazon RDS, and Amazon Aurora resources, this status occurs when the retention period of a continuous backup rule is changed. To resolve STOPPED status, ensure that all requested permissions are in place and that versioning is enabled on the S3 bucket. Once these conditions are met, the next instance of a backup rule running will result in a new continuous recovery point being created. The recovery points with STOPPED status do not need to be deleted. For SAP HANA on Amazon EC2 STOPPED status occurs due to user action, application misconfiguration, or backup failure. To ensure that future continuous backups succeed, refer to the recovery point status and check SAP HANA for details."
        StatusMessage:
          $ref: "#/components/schemas/string"
          description: A status message explaining the status of the recovery point.
        CreationDate:
          $ref: "#/components/schemas/timestamp"
          description: The date and time that a recovery point is created, in Unix format and Coordinated Universal Time (UTC). The value of CreationDate is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        InitiationDate:
          $ref: "#/components/schemas/timestamp"
          description: The date and time when the backup job that created this recovery point was initiated, in Unix format and Coordinated Universal Time (UTC).
        CompletionDate:
          $ref: "#/components/schemas/timestamp"
          description: The date and time that a job to create a recovery point is completed, in Unix format and Coordinated Universal Time (UTC). The value of CompletionDate is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        BackupSizeInBytes:
          $ref: "#/components/schemas/Long"
          description: The size, in bytes, of a backup.
        CalculatedLifecycle:
          $ref: "#/components/schemas/CalculatedLifecycle"
          description: A CalculatedLifecycle object containing DeleteAt and MoveToColdStorageAt timestamps.
        Lifecycle:
          $ref: "#/components/schemas/Lifecycle"
          description: The lifecycle defines when a protected resource is transitioned to cold storage and when it expires. Backup transitions and expires backups automatically according to the lifecycle that you define. Backups that are transitioned to cold storage must be stored in cold storage for a minimum of 90 days. Therefore, the “retention” setting must be 90 days greater than the “transition to cold after days” setting. The “transition to cold after days” setting cannot be changed after a backup has been transitioned to cold. Resource types that can transition to cold storage are listed in the Feature availability by resource table. Backup ignores this expression for other resource types.
        EncryptionKeyArn:
          $ref: "#/components/schemas/ARN"
          description: The server-side encryption key used to protect your backups; for example, arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab.
        IsEncrypted:
          $ref: "#/components/schemas/boolean"
          description: A Boolean value that is returned as TRUE if the specified recovery point is encrypted, or FALSE if the recovery point is not encrypted.
        StorageClass:
          $ref: "#/components/schemas/StorageClass"
          description: Specifies the storage class of the recovery point. Valid values are WARM or COLD.
        LastRestoreTime:
          $ref: "#/components/schemas/timestamp"
          description: The date and time that a recovery point was last restored, in Unix format and Coordinated Universal Time (UTC). The value of LastRestoreTime is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        ParentRecoveryPointArn:
          $ref: "#/components/schemas/ARN"
          description: This is an ARN that uniquely identifies a parent (composite) recovery point; for example, arn:aws:backup:us-east-1:123456789012:recovery-point:1EB3B5E7-9EB0-435A-A80B-108B488B0D45.
        CompositeMemberIdentifier:
          $ref: "#/components/schemas/string"
          description: The identifier of a resource within a composite group, such as nested (child) recovery point belonging to a composite (parent) stack. The ID is transferred from the logical ID within a stack.
        IsParent:
          $ref: "#/components/schemas/boolean"
          description: This returns the boolean value that a recovery point is a parent (composite) job.
        ResourceName:
          $ref: "#/components/schemas/string"
          description: The name of the resource that belongs to the specified backup.
        VaultType:
          $ref: "#/components/schemas/VaultType"
          description: The type of vault in which the described recovery point is stored.
        IndexStatus:
          $ref: "#/components/schemas/IndexStatus"
          description: "This is the current status for the backup index associated with the specified recovery point. Statuses are: PENDING | ACTIVE | FAILED | DELETING A recovery point with an index that has the status of ACTIVE can be included in a search."
        IndexStatusMessage:
          $ref: "#/components/schemas/string"
          description: A string in the form of a detailed message explaining the status of a backup index associated with the recovery point.
        EncryptionKeyType:
          $ref: "#/components/schemas/EncryptionKeyType"
          description: The type of encryption key used for the recovery point. Valid values are CUSTOMER_MANAGED_KMS_KEY for customer-managed keys or Amazon Web Services_OWNED_KMS_KEY for Amazon Web Services-owned keys.
        ScanResults:
          $ref: "#/components/schemas/ScanResults"
          description: Contains the latest scanning results against the recovery point and currently include MalwareScanner, ScanJobState, Findings, and LastScanTimestamp
    RecoveryPointStatus:
      type: string
      enum:
        - COMPLETED
        - PARTIAL
        - DELETING
        - EXPIRED
        - AVAILABLE
        - STOPPED
        - CREATING
    CalculatedLifecycle:
      description: Contains DeleteAt and MoveToColdStorageAt timestamps, which are used to specify a lifecycle for a recovery point. The lifecycle defines when a protected resource is transitioned to cold storage and when it expires. Backup transitions and expires backups automatically according to the lifecycle that you define. Backups transitioned to cold storage must be stored in cold storage for a minimum of 90 days. Therefore, the “retention” setting must be 90 days greater than the “transition to cold after days” setting. The “transition to cold after days” setting cannot be changed after a backup has been transitioned to cold. Resource types that can transition to cold storage are listed in the Feature availability by resource table. Backup ignores this expression for other resource types.
      type: object
      properties:
        MoveToColdStorageAt:
          $ref: "#/components/schemas/timestamp"
          description: A timestamp that specifies when to transition a recovery point to cold storage.
        DeleteAt:
          $ref: "#/components/schemas/timestamp"
          description: A timestamp that specifies when to delete a recovery point.
    StorageClass:
      type: string
      enum:
        - WARM
        - COLD
        - DELETED
    IndexStatus:
      type: string
      enum:
        - PENDING
        - ACTIVE
        - FAILED
        - DELETING
    ScanResults:
      type: array
      items:
        $ref: "#/components/schemas/ScanResult"
    ScanResult:
      description: Contains the results of a security scan, including scanner information, scan state, and any findings discovered.
      type: object
      properties:
        MalwareScanner:
          $ref: "#/components/schemas/MalwareScanner"
          description: The malware scanner used to perform the scan. Currently only GUARDDUTY is supported.
        ScanJobState:
          $ref: "#/components/schemas/ScanJobState"
          description: "The final state of the scan job. Valid values: COMPLETED | FAILED | CANCELED."
        LastScanTimestamp:
          $ref: "#/components/schemas/timestamp"
          description: The timestamp of when the last scan was performed, in Unix format and Coordinated Universal Time (UTC).
        Findings:
          $ref: "#/components/schemas/ScanFindings"
          description: An array of findings discovered during the scan.
    ScanJobState:
      type: string
      enum:
        - COMPLETED
        - COMPLETED_WITH_ISSUES
        - FAILED
        - CANCELED
    ScanFindings:
      type: array
      items:
        $ref: "#/components/schemas/ScanFinding"
    ScanFinding:
      type: string
      enum:
        - MALWARE
    DescribeRegionSettingsOutput:
      type: object
      properties:
        ResourceTypeOptInPreference:
          type: object
          properties: {}
          description: The services along with the opt-in preferences in the Region.
        ResourceTypeManagementPreference:
          type: object
          properties: {}
          description: Returns whether Backup fully manages the backups for a resource type. For the benefits of full Backup management, see Full Backup management. For a list of resource types and whether each supports full Backup management, see the Feature availability by resource table. If "DynamoDB":false, you can enable full Backup management for DynamoDB backup by enabling Backup's advanced DynamoDB backup features.
    ReportJobId:
      type: string
    DescribeReportJobOutput:
      type: object
      properties:
        ReportJob:
          $ref: "#/components/schemas/ReportJob"
          description: The information about a report job, including its completion and creation times, report destination, unique report job ID, Amazon Resource Name (ARN), report template, status, and status message.
    ReportJob:
      description: Contains detailed information about a report job. A report job compiles a report based on a report plan and publishes it to Amazon S3.
      type: object
      properties:
        ReportJobId:
          $ref: "#/components/schemas/ReportJobId"
          description: The identifier for a report job. A unique, randomly generated, Unicode, UTF-8 encoded string that is at most 1,024 bytes long. Report job IDs cannot be edited.
        ReportPlanArn:
          $ref: "#/components/schemas/ARN"
          description: An Amazon Resource Name (ARN) that uniquely identifies a resource. The format of the ARN depends on the resource type.
        ReportTemplate:
          $ref: "#/components/schemas/string"
          description: "Identifies the report template for the report. Reports are built using a report template. The report templates are: RESOURCE_COMPLIANCE_REPORT | CONTROL_COMPLIANCE_REPORT | BACKUP_JOB_REPORT | COPY_JOB_REPORT | RESTORE_JOB_REPORT"
        CreationTime:
          $ref: "#/components/schemas/timestamp"
          description: The date and time that a report job is created, in Unix format and Coordinated Universal Time (UTC). The value of CreationTime is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        CompletionTime:
          $ref: "#/components/schemas/timestamp"
          description: The date and time that a report job is completed, in Unix format and Coordinated Universal Time (UTC). The value of CompletionTime is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        Status:
          $ref: "#/components/schemas/string"
          description: "The status of a report job. The statuses are: CREATED | RUNNING | COMPLETED | FAILED COMPLETED means that the report is available for your review at your designated destination. If the status is FAILED, review the StatusMessage for the reason."
        StatusMessage:
          $ref: "#/components/schemas/string"
          description: A message explaining the status of the report job.
        ReportDestination:
          $ref: "#/components/schemas/ReportDestination"
          description: The S3 bucket name and S3 keys for the destination where the report job publishes the report.
    ReportDestination:
      description: Contains information from your report job about your report destination.
      type: object
      properties:
        S3BucketName:
          $ref: "#/components/schemas/string"
          description: The unique name of the Amazon S3 bucket that receives your reports.
        S3Keys:
          $ref: "#/components/schemas/stringList"
          description: The object key that uniquely identifies your reports in your S3 bucket.
    DescribeReportPlanOutput:
      type: object
      properties:
        ReportPlan:
          $ref: "#/components/schemas/ReportPlan"
          description: Returns details about the report plan that is specified by its name. These details include the report plan's Amazon Resource Name (ARN), description, settings, delivery channel, deployment status, creation time, and last attempted and successful run times.
    ReportPlan:
      description: Contains detailed information about a report plan.
      type: object
      properties:
        ReportPlanArn:
          $ref: "#/components/schemas/ARN"
          description: An Amazon Resource Name (ARN) that uniquely identifies a resource. The format of the ARN depends on the resource type.
        ReportPlanName:
          $ref: "#/components/schemas/ReportPlanName"
          description: The unique name of the report plan. This name is between 1 and 256 characters starting with a letter, and consisting of letters (a-z, A-Z), numbers (0-9), and underscores (_).
        ReportPlanDescription:
          $ref: "#/components/schemas/ReportPlanDescription"
          description: An optional description of the report plan with a maximum 1,024 characters.
        ReportSetting:
          $ref: "#/components/schemas/ReportSetting"
          description: "Identifies the report template for the report. Reports are built using a report template. The report templates are: RESOURCE_COMPLIANCE_REPORT | CONTROL_COMPLIANCE_REPORT | BACKUP_JOB_REPORT | COPY_JOB_REPORT | RESTORE_JOB_REPORT If the report template is RESOURCE_COMPLIANCE_REPORT or CONTROL_COMPLIANCE_REPORT, this API resource also describes the report coverage by Amazon Web Services Regions and frameworks."
        ReportDeliveryChannel:
          $ref: "#/components/schemas/ReportDeliveryChannel"
          description: Contains information about where and how to deliver your reports, specifically your Amazon S3 bucket name, S3 key prefix, and the formats of your reports.
        DeploymentStatus:
          $ref: "#/components/schemas/string"
          description: "The deployment status of a report plan. The statuses are: CREATE_IN_PROGRESS | UPDATE_IN_PROGRESS | DELETE_IN_PROGRESS | COMPLETED"
        CreationTime:
          $ref: "#/components/schemas/timestamp"
          description: The date and time that a report plan is created, in Unix format and Coordinated Universal Time (UTC). The value of CreationTime is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        LastAttemptedExecutionTime:
          $ref: "#/components/schemas/timestamp"
          description: The date and time that a report job associated with this report plan last attempted to run, in Unix format and Coordinated Universal Time (UTC). The value of LastAttemptedExecutionTime is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        LastSuccessfulExecutionTime:
          $ref: "#/components/schemas/timestamp"
          description: The date and time that a report job associated with this report plan last successfully ran, in Unix format and Coordinated Universal Time (UTC). The value of LastSuccessfulExecutionTime is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
    RestoreJobId:
      type: string
    DescribeRestoreJobOutput:
      type: object
      properties:
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: Returns the account ID that owns the restore job.
        RestoreJobId:
          $ref: "#/components/schemas/string"
          description: Uniquely identifies the job that restores a recovery point.
        RecoveryPointArn:
          $ref: "#/components/schemas/ARN"
          description: An ARN that uniquely identifies a recovery point; for example, arn:aws:backup:us-east-1:123456789012:recovery-point:1EB3B5E7-9EB0-435A-A80B-108B488B0D45.
        SourceResourceArn:
          $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) of the original resource that was backed up. This provides context about what resource is being restored.
        BackupVaultArn:
          $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) of the backup vault containing the recovery point being restored. This helps identify vault access policies and permissions.
        CreationDate:
          $ref: "#/components/schemas/timestamp"
          description: The date and time that a restore job is created, in Unix format and Coordinated Universal Time (UTC). The value of CreationDate is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        CompletionDate:
          $ref: "#/components/schemas/timestamp"
          description: The date and time that a job to restore a recovery point is completed, in Unix format and Coordinated Universal Time (UTC). The value of CompletionDate is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        Status:
          $ref: "#/components/schemas/RestoreJobStatus"
          description: Status code specifying the state of the job that is initiated by Backup to restore a recovery point.
        StatusMessage:
          $ref: "#/components/schemas/string"
          description: A message showing the status of a job to restore a recovery point.
        PercentDone:
          $ref: "#/components/schemas/string"
          description: Contains an estimated percentage that is complete of a job at the time the job status was queried.
        BackupSizeInBytes:
          $ref: "#/components/schemas/Long"
          description: The size, in bytes, of the restored resource.
        IamRoleArn:
          $ref: "#/components/schemas/IAMRoleArn"
          description: Specifies the IAM role ARN used to create the target recovery point; for example, arn:aws:iam::123456789012:role/S3Access.
        ExpectedCompletionTimeMinutes:
          $ref: "#/components/schemas/Long"
          description: The amount of time in minutes that a job restoring a recovery point is expected to take.
        CreatedResourceArn:
          $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) of the resource that was created by the restore job. The format of the ARN depends on the resource type of the backed-up resource.
        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: Returns metadata associated with a restore job listed by resource type.
        RecoveryPointCreationDate:
          $ref: "#/components/schemas/timestamp"
          description: The creation date of the recovery point made by the specifed restore job.
        CreatedBy:
          $ref: "#/components/schemas/RestoreJobCreator"
          description: Contains identifying information about the creation of a restore job.
        ValidationStatus:
          $ref: "#/components/schemas/RestoreValidationStatus"
          description: The status of validation run on the indicated restore job.
        ValidationStatusMessage:
          $ref: "#/components/schemas/string"
          description: The status message.
        DeletionStatus:
          $ref: "#/components/schemas/RestoreDeletionStatus"
          description: The status of the data generated by the restore test.
        DeletionStatusMessage:
          $ref: "#/components/schemas/string"
          description: This describes the restore job deletion status.
        IsParent:
          $ref: "#/components/schemas/boolean"
          description: This is a boolean value indicating whether the restore job is a parent (composite) restore job.
        ParentJobId:
          $ref: "#/components/schemas/string"
          description: This is the unique identifier of the parent restore job for the selected restore job.
    RestoreJobStatus:
