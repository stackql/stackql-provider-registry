          description: Specifies the IAM role ARN used to create the target recovery point; for example, arn:aws:iam::123456789012:role/S3Access.
        Status:
          $ref: "#/components/schemas/RecoveryPointStatus"
          description: A status code specifying the state of the recovery point.
        StatusMessage:
          $ref: "#/components/schemas/string"
          description: A message explaining the current status of the recovery point.
        CreationDate:
          $ref: "#/components/schemas/timestamp"
          description: The date and time a recovery point is created, in Unix format and Coordinated Universal Time (UTC). The value of CreationDate is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        InitiationDate:
          $ref: "#/components/schemas/timestamp"
          description: The date and time when the backup job that created this recovery point was initiated, in Unix format and Coordinated Universal Time (UTC).
        CompletionDate:
          $ref: "#/components/schemas/timestamp"
          description: The date and time a job to restore a recovery point is completed, in Unix format and Coordinated Universal Time (UTC). The value of CompletionDate is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        BackupSizeInBytes:
          $ref: "#/components/schemas/Long"
          description: The size, in bytes, of a backup.
        CalculatedLifecycle:
          $ref: "#/components/schemas/CalculatedLifecycle"
          description: A CalculatedLifecycle object containing DeleteAt and MoveToColdStorageAt timestamps.
        Lifecycle:
          $ref: "#/components/schemas/Lifecycle"
          description: The lifecycle defines when a protected resource is transitioned to cold storage and when it expires. Backup transitions and expires backups automatically according to the lifecycle that you define. Backups transitioned to cold storage must be stored in cold storage for a minimum of 90 days. Therefore, the “retention” setting must be 90 days greater than the “transition to cold after days” setting. The “transition to cold after days” setting cannot be changed after a backup has been transitioned to cold. Resource types that can transition to cold storage are listed in the Feature availability by resource table. Backup ignores this expression for other resource types.
        EncryptionKeyArn:
          $ref: "#/components/schemas/ARN"
          description: The server-side encryption key that is used to protect your backups; for example, arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab.
        IsEncrypted:
          $ref: "#/components/schemas/boolean"
          description: A Boolean value that is returned as TRUE if the specified recovery point is encrypted, or FALSE if the recovery point is not encrypted.
        LastRestoreTime:
          $ref: "#/components/schemas/timestamp"
          description: The date and time a recovery point was last restored, in Unix format and Coordinated Universal Time (UTC). The value of LastRestoreTime is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        ParentRecoveryPointArn:
          $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) of the parent (composite) recovery point.
        CompositeMemberIdentifier:
          $ref: "#/components/schemas/string"
          description: The identifier of a resource within a composite group, such as nested (child) recovery point belonging to a composite (parent) stack. The ID is transferred from the logical ID within a stack.
        IsParent:
          $ref: "#/components/schemas/boolean"
          description: This is a boolean value indicating this is a parent (composite) recovery point.
        ResourceName:
          $ref: "#/components/schemas/string"
          description: The non-unique name of the resource that belongs to the specified backup.
        VaultType:
          $ref: "#/components/schemas/VaultType"
          description: The type of vault in which the described recovery point is stored.
        IndexStatus:
          $ref: "#/components/schemas/IndexStatus"
          description: "This is the current status for the backup index associated with the specified recovery point. Statuses are: PENDING | ACTIVE | FAILED | DELETING A recovery point with an index that has the status of ACTIVE can be included in a search."
        IndexStatusMessage:
          $ref: "#/components/schemas/string"
          description: A string in the form of a detailed message explaining the status of a backup index associated with the recovery point.
        EncryptionKeyType:
          $ref: "#/components/schemas/EncryptionKeyType"
          description: The type of encryption key used for the recovery point. Valid values are CUSTOMER_MANAGED_KMS_KEY for customer-managed keys or Amazon Web Services_OWNED_KMS_KEY for Amazon Web Services-owned keys.
        AggregatedScanResult:
          $ref: "#/components/schemas/AggregatedScanResult"
