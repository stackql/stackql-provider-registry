    ZoneAwarenessConfig:
      description: The zone awareness configuration for an Amazon OpenSearch Service domain.
      type: object
      properties:
        AvailabilityZoneCount:
          $ref: "#/components/schemas/IntegerClass"
          description: If you enabled multiple Availability Zones, this value is the number of zones that you want the domain to use. Valid values are 2 and 3. If your domain is provisioned within a VPC, this value be equal to number of subnets.
    OpenSearchWarmPartitionInstanceType:
      type: string
      enum:
        - ultrawarm1.medium.search
        - ultrawarm1.large.search
        - ultrawarm1.xlarge.search
    ColdStorageOptions:
      description: Container for the parameters required to enable cold storage for an OpenSearch Service domain. For more information, see Cold storage for Amazon OpenSearch Service.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether to enable or disable cold storage on the domain. You must enable UltraWarm storage to enable cold storage.
      required:
        - Enabled
    NodeOptionsList:
      type: array
      items:
        $ref: "#/components/schemas/NodeOption"
    NodeOption:
      description: Configuration settings for defining the node type within a cluster.
      type: object
      properties:
        NodeType:
          $ref: "#/components/schemas/NodeOptionsNodeType"
          description: Defines the type of node, such as coordinating nodes.
        NodeConfig:
          $ref: "#/components/schemas/NodeConfig"
          description: Configuration options for defining the setup of any node type.
    NodeOptionsNodeType:
      type: string
      enum:
        - coordinator
    NodeConfig:
      description: Configuration options for defining the setup of any node type within the cluster.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: A boolean value indicating whether a specific node type is active or inactive.
        Type:
          $ref: "#/components/schemas/OpenSearchPartitionInstanceType"
          description: The instance type of a particular node within the cluster.
        Count:
          $ref: "#/components/schemas/IntegerClass"
          description: The number of nodes of a specific type within the cluster.
    EBSOptions:
      description: Container for the parameters required to enable EBS-based storage for an OpenSearch Service domain.
      type: object
      properties:
        EBSEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether EBS volumes are attached to data nodes in an OpenSearch Service domain.
        VolumeType:
          $ref: "#/components/schemas/VolumeType"
          description: Specifies the type of EBS volumes attached to data nodes.
        VolumeSize:
          $ref: "#/components/schemas/IntegerClass"
          description: Specifies the size (in GiB) of EBS volumes attached to data nodes.
        Iops:
          $ref: "#/components/schemas/IntegerClass"
          description: Specifies the baseline input/output (I/O) performance of EBS volumes attached to data nodes. Applicable only for the gp3 and provisioned IOPS EBS volume types.
        Throughput:
          $ref: "#/components/schemas/IntegerClass"
          description: Specifies the throughput (in MiB/s) of the EBS volumes attached to data nodes. Applicable only for the gp3 volume type.
    VolumeType:
      description: The type of EBS volume that a domain uses. For more information, see Configuring EBS-based storage.
      type: string
      enum:
        - standard
        - gp2
        - io1
        - gp3
    IPAddressType:
      type: string
      enum:
        - ipv4
        - dualstack
    SnapshotOptions:
      description: The time, in UTC format, when OpenSearch Service takes a daily automated snapshot of the specified domain. Default is 0 hours.
      type: object
      properties:
        AutomatedSnapshotStartHour:
          $ref: "#/components/schemas/IntegerClass"
          description: The time, in UTC format, when OpenSearch Service takes a daily automated snapshot of the specified domain. Default is 0 hours.
    VPCOptions:
      description: Options to specify the subnets and security groups for an Amazon OpenSearch Service VPC endpoint. For more information, see Launching your Amazon OpenSearch Service domains using a VPC.
      type: object
      properties:
        SubnetIds:
          $ref: "#/components/schemas/StringList"
          description: A list of subnet IDs associated with the VPC endpoints for the domain. If your domain uses multiple Availability Zones, you need to provide two subnet IDs, one per zone. Otherwise, provide only one.
        SecurityGroupIds:
          $ref: "#/components/schemas/StringList"
          description: The list of security group IDs associated with the VPC endpoints for the domain. If you do not provide a security group ID, OpenSearch Service uses the default security group for the VPC.
        EgressEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Controls whether egress traffic from the domain is routed through the customer VPC. When true, outbound traffic flows through the VPC. When false, outbound traffic goes through the public internet.
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    CognitoOptions:
      description: Container for the parameters required to enable Cognito authentication for an OpenSearch Service domain. For more information, see Configuring Amazon Cognito authentication for OpenSearch Dashboards.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether to enable or disable Amazon Cognito authentication for OpenSearch Dashboards.
        UserPoolId:
          $ref: "#/components/schemas/UserPoolId"
          description: The Amazon Cognito user pool ID that you want OpenSearch Service to use for OpenSearch Dashboards authentication.
        IdentityPoolId:
          $ref: "#/components/schemas/IdentityPoolId"
          description: The Amazon Cognito identity pool ID that you want OpenSearch Service to use for OpenSearch Dashboards authentication.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The AmazonOpenSearchServiceCognitoAccess role that allows OpenSearch Service to configure your user pool and identity pool.
    UserPoolId:
      type: string
      minLength: 1
      maxLength: 55
      pattern: "[\\w-]+_[0-9a-zA-Z]+"
    IdentityPoolId:
      type: string
      minLength: 1
      maxLength: 55
      pattern: "[\\w-]+:[0-9a-f-]+"
    EncryptionAtRestOptions:
      description: Specifies whether the domain should encrypt data at rest, and if so, the Key Management Service (KMS) key to use. Can only be used when creating a new domain or enabling encryption at rest for the first time on an existing domain. You can't modify this parameter after it's already been specified.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: True to enable encryption at rest.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The KMS key ID. Takes the form 1a2a3a4-1a2a-3a4a-5a6a-1a2a3a4a5a6a.
    KmsKeyId:
      type: string
      minLength: 1
      maxLength: 500
      pattern: .*
    NodeToNodeEncryptionOptions:
      description: Enables or disables node-to-node encryption. For more information, see Node-to-node encryption for Amazon OpenSearch Service.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: True to enable node-to-node encryption.
    AdvancedOptions:
      description: "Exposes native OpenSearch configuration values from opensearch.yml. The following advanced options are available: Allows references to indexes in an HTTP request body. Must be false when configuring access to individual sub-resources. Default is true. Specifies the percentage of heap space allocated to field data. Default is unbounded. For more information, see Advanced cluster parameters."
      type: object
      properties: {}
    LogPublishingOptions:
      type: object
      properties: {}
    DomainEndpointOptions:
      description: Options to configure a custom endpoint for an OpenSearch Service domain.
      type: object
      properties:
        EnforceHTTPS:
          $ref: "#/components/schemas/Boolean"
          description: True to require that all traffic to the domain arrive over HTTPS.
        TLSSecurityPolicy:
          $ref: "#/components/schemas/TLSSecurityPolicy"
          description: "Specify the TLS security policy to apply to the HTTPS endpoint of the domain. The policy can be one of the following values: Policy-Min-TLS-1-0-2019-07: TLS security policy that supports TLS version 1.0 to TLS version 1.2 Policy-Min-TLS-1-2-2019-07: TLS security policy that supports only TLS version 1.2 Policy-Min-TLS-1-2-PFS-2023-10: TLS security policy that supports TLS version 1.2 to TLS version 1.3 with perfect forward secrecy cipher suites Policy-Min-TLS-1-2-RFC9151-FIPS-2024-08: TLS security policy that supports TLS version 1.3 with FIPS"
        CustomEndpointEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether to enable a custom endpoint for the domain.
        CustomEndpoint:
          $ref: "#/components/schemas/DomainNameFqdn"
          description: The fully qualified URL for the custom endpoint.
        CustomEndpointCertificateArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN for your security certificate, managed in Amazon Web Services Certificate Manager (ACM).
    TLSSecurityPolicy:
      type: string
      enum:
        - Policy-Min-TLS-1-0-2019-07
        - Policy-Min-TLS-1-2-2019-07
        - Policy-Min-TLS-1-2-PFS-2023-10
        - Policy-Min-TLS-1-2-RFC9151-FIPS-2024-08
    DomainNameFqdn:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^(((?!-)[A-Za-z0-9-]{0,62}[A-Za-z0-9])\.)+((?!-)[A-Za-z0-9-]{1,62}[A-Za-z0-9])$
    AdvancedSecurityOptionsInput:
      description: Options for enabling and configuring fine-grained access control. For more information, see Fine-grained access control in Amazon OpenSearch Service.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: True to enable fine-grained access control.
        InternalUserDatabaseEnabled:
          $ref: "#/components/schemas/Boolean"
          description: True to enable the internal user database.
        MasterUserOptions:
          $ref: "#/components/schemas/MasterUserOptions"
          description: Container for information about the master user.
        SAMLOptions:
          $ref: "#/components/schemas/SAMLOptionsInput"
          description: Container for information about the SAML configuration for OpenSearch Dashboards.
        JWTOptions:
          $ref: "#/components/schemas/JWTOptionsInput"
          description: Container for information about the JWT configuration of the Amazon OpenSearch Service.
        IAMFederationOptions:
          $ref: "#/components/schemas/IAMFederationOptionsInput"
          description: Input configuration for IAM identity federation within advanced security options.
        AnonymousAuthEnabled:
          $ref: "#/components/schemas/Boolean"
          description: True to enable a 30-day migration period during which administrators can create role mappings. Only necessary when enabling fine-grained access control on an existing domain.
    MasterUserOptions:
      description: Credentials for the master user for a domain.
      type: object
      properties:
        MasterUserARN:
          $ref: "#/components/schemas/ARN"
          description: Amazon Resource Name (ARN) for the master user. Only specify if InternalUserDatabaseEnabled is false.
        MasterUserName:
          $ref: "#/components/schemas/Username"
          description: User name for the master user. Only specify if InternalUserDatabaseEnabled is true.
        MasterUserPassword:
          $ref: "#/components/schemas/Password"
          description: Password for the master user. Only specify if InternalUserDatabaseEnabled is true.
    Username:
      type: string
      minLength: 1
      maxLength: 64
      pattern: .*
    Password:
      type: string
      minLength: 8
      maxLength: 128
      pattern: .*
    SAMLOptionsInput:
      description: The SAML authentication configuration for an Amazon OpenSearch Service domain.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: True to enable SAML authentication for a domain.
        Idp:
          $ref: "#/components/schemas/SAMLIdp"
          description: The SAML Identity Provider's information.
        MasterUserName:
          $ref: "#/components/schemas/Username"
          description: The SAML master user name, which is stored in the domain's internal user database.
        MasterBackendRole:
          $ref: "#/components/schemas/BackendRole"
          description: The backend role that the SAML master user is mapped to.
        SubjectKey:
          $ref: "#/components/schemas/String"
          description: Element of the SAML assertion to use for the user name. Default is NameID.
        RolesKey:
          $ref: "#/components/schemas/String"
          description: Element of the SAML assertion to use for backend roles. Default is roles.
        SessionTimeoutMinutes:
          $ref: "#/components/schemas/IntegerClass"
          description: The duration, in minutes, after which a user session becomes inactive. Acceptable values are between 1 and 1440, and the default value is 60.
    SAMLIdp:
      description: The SAML identity povider information.
      type: object
      properties:
        MetadataContent:
          $ref: "#/components/schemas/SAMLMetadata"
          description: The metadata of the SAML application, in XML format.
        EntityId:
          $ref: "#/components/schemas/SAMLEntityId"
          description: The unique entity ID of the application in the SAML identity provider.
      required:
        - MetadataContent
        - EntityId
    SAMLMetadata:
      type: string
      minLength: 1
      maxLength: 1048576
    SAMLEntityId:
      type: string
      minLength: 8
      maxLength: 512
    BackendRole:
      type: string
      minLength: 1
      maxLength: 256
    JWTOptionsInput:
      description: The JWT authentication and authorization configuration for an Amazon OpenSearch Service domain.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: True to enable JWT authentication and authorization for a domain.
        SubjectKey:
          $ref: "#/components/schemas/SubjectKey"
          description: Element of the JWT assertion to use for the user name.
        RolesKey:
          $ref: "#/components/schemas/RolesKey"
          description: Element of the JWT assertion to use for roles.
        JwksUrl:
          $ref: "#/components/schemas/JwksUrl"
          description: The URL endpoint that hosts the JSON Web Key Set (JWKS) containing public keys used to verify JWT signatures.
        PublicKey:
          $ref: "#/components/schemas/String"
          description: Element of the JWT assertion used by the cluster to verify JWT signatures.
    SubjectKey:
      type: string
      minLength: 1
      maxLength: 64
    RolesKey:
      type: string
      minLength: 1
      maxLength: 64
    JwksUrl:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: ^$|^https://(?!(?:10|127|169\.254|192\.168|172\.(?:1[6-9]|2[0-9]|3[01]))\.)[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*\.[a-zA-Z]{2,}(?::[0-9]{1,5})?(?:/[a-zA-Z0-9\-._~%!$&'()*+,;=:']*)?$
    IAMFederationOptionsInput:
      description: Input parameters for configuring IAM identity federation settings.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether IAM identity federation is enabled for the OpenSearch domain.
        SubjectKey:
          $ref: "#/components/schemas/IAMFederationSubjectKey"
          description: The key in the SAML assertion that contains the user's subject identifier.
        RolesKey:
          $ref: "#/components/schemas/IAMFederationRolesKey"
          description: The key in the SAML assertion that contains the user's role information.
    IAMFederationSubjectKey:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^(null|[A-Za-z][A-Za-z0-9_.:/=+\-@]*)$
    IAMFederationRolesKey:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^(null|[A-Za-z][A-Za-z0-9_.:/=+\-@]*)$
    IdentityCenterOptionsInput:
      description: Configuration settings for enabling and managing IAM Identity Center.
      type: object
      properties:
        EnabledAPIAccess:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether IAM Identity Center is enabled for API access in Amazon OpenSearch Service.
        IdentityCenterInstanceARN:
          $ref: "#/components/schemas/IdentityCenterInstanceARN"
          description: The ARN of the IAM Identity Center instance used to create an OpenSearch UI application that uses IAM Identity Center for authentication.
        IdentityCenterInstanceRegion:
          $ref: "#/components/schemas/Region"
          description: The Region of the IAM Identity Center instance.
        SubjectKey:
          $ref: "#/components/schemas/SubjectKeyIdCOption"
          description: Specifies the attribute that contains the subject identifier (such as username, user ID, or email) in IAM Identity Center.
        RolesKey:
          $ref: "#/components/schemas/RolesKeyIdCOption"
          description: Specifies the attribute that contains the backend role identifier (such as group name or group ID) in IAM Identity Center.
    IdentityCenterInstanceARN:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:aws[a-z\\-]*:[a-z]+:[a-z0-9\\-]*:[0-9]*:[a-z0-9\\-]+\/[a-z0-9\\-]+
    SubjectKeyIdCOption:
      type: string
      enum:
        - UserName
        - UserId
        - Email
    RolesKeyIdCOption:
      type: string
      enum:
        - GroupName
        - GroupId
    AutoTuneOptionsInput:
      description: Options for configuring Auto-Tune. For more information, see Auto-Tune for Amazon OpenSearch Service
      type: object
      properties:
        DesiredState:
          $ref: "#/components/schemas/AutoTuneDesiredState"
          description: Whether Auto-Tune is enabled or disabled.
        MaintenanceSchedules:
          $ref: "#/components/schemas/AutoTuneMaintenanceScheduleList"
          description: A list of maintenance schedules during which Auto-Tune can deploy changes. Maintenance windows are deprecated and have been replaced with off-peak windows.
        UseOffPeakWindow:
          $ref: "#/components/schemas/Boolean"
          description: Whether to schedule Auto-Tune optimizations that require blue/green deployments during the domain's configured daily off-peak window.
    AutoTuneDesiredState:
      description: The Auto-Tune desired state. Valid values are ENABLED and DISABLED.
      type: string
      enum:
        - ENABLED
        - DISABLED
    AutoTuneMaintenanceScheduleList:
      type: array
      items:
        $ref: "#/components/schemas/AutoTuneMaintenanceSchedule"
    AutoTuneMaintenanceSchedule:
      description: This object is deprecated. Use the domain's off-peak window to schedule Auto-Tune optimizations. For migration instructions, see Migrating from Auto-Tune maintenance windows. The Auto-Tune maintenance schedule. For more information, see Auto-Tune for Amazon OpenSearch Service.
      type: object
      properties:
        StartAt:
          $ref: "#/components/schemas/StartAt"
          description: The Epoch timestamp at which the Auto-Tune maintenance schedule starts.
        Duration:
          $ref: "#/components/schemas/Duration"
          description: 'The duration of the maintenance schedule. For example, "Duration": {"Value": 2, "Unit": "HOURS"}.'
        CronExpressionForRecurrence:
          $ref: "#/components/schemas/String"
          description: A cron expression for a recurring maintenance schedule during which Auto-Tune can deploy changes.
    StartAt:
      type: string
      format: date-time
    Duration:
      description: The duration of a maintenance schedule. For more information, see Auto-Tune for Amazon OpenSearch Service.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/DurationValue"
          description: Integer to specify the value of a maintenance schedule duration.
        Unit:
          $ref: "#/components/schemas/TimeUnit"
          description: The unit of measurement for the duration of a maintenance schedule.
    DurationValue:
      description: Integer that specifies the value of a maintenance schedule duration.
      type: integer
      format: int64
      minimum: 1
      maximum: 24
    TimeUnit:
      description: The unit of a maintenance schedule duration. Valid value is HOUR.
      type: string
      enum:
        - HOURS
    OffPeakWindowOptions:
      description: Options for a domain's off-peak window, during which OpenSearch Service can perform mandatory configuration changes on the domain.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether to enable an off-peak window. This option is only available when modifying a domain created prior to February 16, 2023, not when creating a new domain. All domains created after this date have the off-peak window enabled by default. You can't disable the off-peak window after it's enabled for a domain.
        OffPeakWindow:
          $ref: "#/components/schemas/OffPeakWindow"
          description: Off-peak window settings for the domain.
    OffPeakWindow:
      description: A custom 10-hour, low-traffic window during which OpenSearch Service can perform mandatory configuration changes on the domain. These actions can include scheduled service software updates and blue/green Auto-Tune enhancements. OpenSearch Service will schedule these actions during the window that you specify. If you don't specify a window start time, it defaults to 10:00 P.M. local time. For more information, see Defining off-peak maintenance windows for Amazon OpenSearch Service.
      type: object
      properties:
        WindowStartTime:
          $ref: "#/components/schemas/WindowStartTime"
          description: A custom start time for the off-peak window, in Coordinated Universal Time (UTC). The window length will always be 10 hours, so you can't specify an end time. For example, if you specify 11:00 P.M. UTC as a start time, the end time will automatically be set to 9:00 A.M.
    WindowStartTime:
      description: The desired start time for an off-peak maintenance window.
      type: object
      properties:
        Hours:
          $ref: "#/components/schemas/StartTimeHours"
          description: The start hour of the window in Coordinated Universal Time (UTC), using 24-hour time. For example, 17 refers to 5:00 P.M. UTC.
        Minutes:
          $ref: "#/components/schemas/StartTimeMinutes"
          description: The start minute of the window, in UTC.
      required:
        - Hours
        - Minutes
    StartTimeHours:
      type: integer
      format: int64
      minimum: 0
      maximum: 23
    StartTimeMinutes:
      type: integer
      format: int64
      minimum: 0
      maximum: 59
    SoftwareUpdateOptions:
      description: Options for configuring service software updates for a domain.
      type: object
      properties:
        AutoSoftwareUpdateEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether automatic service software updates are enabled for the domain.
        UseLatestServiceSoftwareForBlueGreen:
          $ref: "#/components/schemas/Boolean"
          description: Whether the domain should use the latest service software version during a blue/green deployment. If enabled, the domain will automatically use the latest available service software when a blue/green deployment is triggered.
    AIMLOptionsInput:
      description: Container for parameters required to enable all machine learning features.
      type: object
      properties:
        NaturalLanguageQueryGenerationOptions:
          $ref: "#/components/schemas/NaturalLanguageQueryGenerationOptionsInput"
          description: Container for parameters required for natural language query generation on the specified domain.
        S3VectorsEngine:
          $ref: "#/components/schemas/S3VectorsEngine"
          description: Container for parameters required to enable S3 vectors engine features on the specified domain.
        ServerlessVectorAcceleration:
          $ref: "#/components/schemas/ServerlessVectorAcceleration"
          description: Specifies whether to enable serverless vector acceleration for the domain. When enabled, provides GPU-accelerated vector search capabilities for improved performance on vector workloads.
    NaturalLanguageQueryGenerationOptionsInput:
      description: Container for parameters required to enable the natural language query generation feature.
      type: object
      properties:
        DesiredState:
          $ref: "#/components/schemas/NaturalLanguageQueryGenerationDesiredState"
          description: The desired state of the natural language query generation feature. Valid values are ENABLED and DISABLED.
    NaturalLanguageQueryGenerationDesiredState:
      type: string
      enum:
        - ENABLED
        - DISABLED
    S3VectorsEngine:
      description: Options for enabling S3 vectors engine features on the specified domain.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Enables S3 vectors engine features.
    ServerlessVectorAcceleration:
      description: Configuration for serverless vector acceleration, which provides GPU-accelerated vector search capabilities for improved performance on vector workloads.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether serverless vector acceleration is enabled for the domain.
    DeploymentStrategyOptions:
      description: Specifies the deployment strategy options for the domain.
      type: object
      properties:
        DeploymentStrategy:
          $ref: "#/components/schemas/DeploymentStrategy"
          description: Specifies the deployment strategy for the domain. Valid values are Default and CapacityOptimized.
      required:
        - DeploymentStrategy
    DeploymentStrategy:
      description: Specifies the deployment strategy for the domain. Valid values are Default and CapacityOptimized.
      type: string
      enum:
        - Default
        - CapacityOptimized
    AutomatedSnapshotPauseRequestOptions:
      description: "Specifies the automated snapshot pause request options for the domain. Suspending snapshots reduces data protection. You cannot restore your domain to points in time when snapshots are suspended. Use this feature only for short-term operational needs such as migrations or maintenance windows. Maximum suspension duration: 3 days."
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether to enable or disable automated snapshot pause for the domain.
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the automated snapshot pause should begin.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the automated snapshot pause should end. The maximum allowed duration between StartTime and EndTime is 3 days.
      required:
        - Enabled
    CreateDomainResponse:
      description: The result of a CreateDomain operation. Contains the status of the newly created domain.
      type: object
      properties:
        DomainStatus:
          $ref: "#/components/schemas/DomainStatus"
          description: The status of the newly created domain.
    DomainStatus:
      description: The current status of an OpenSearch Service domain.
      type: object
      properties:
        DomainId:
          $ref: "#/components/schemas/DomainId"
          description: Unique identifier for the domain.
        DomainName:
          $ref: "#/components/schemas/DomainName"
          description: Name of the domain. Domain names are unique across all domains owned by the same account within an Amazon Web Services Region.
        ARN:
          $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) of the domain. For more information, see IAM identifiers in the Amazon Web Services Identity and Access Management User Guide.
        Created:
          $ref: "#/components/schemas/Boolean"
          description: Creation status of an OpenSearch Service domain. True if domain creation is complete. False if domain creation is still in progress.
        Deleted:
          $ref: "#/components/schemas/Boolean"
          description: Deletion status of an OpenSearch Service domain. True if domain deletion is complete. False if domain deletion is still in progress. Once deletion is complete, the status of the domain is no longer returned.
        Endpoint:
          $ref: "#/components/schemas/ServiceUrl"
          description: Domain-specific endpoint used to submit index, search, and data upload requests to the domain.
        EndpointV2:
          $ref: "#/components/schemas/ServiceUrl"
          description: If IPAddressType to set to dualstack, a version 2 domain endpoint is provisioned. This endpoint functions like a normal endpoint, except that it works with both IPv4 and IPv6 IP addresses. Normal endpoints work only with IPv4 IP addresses.
        Endpoints:
          type: object
          properties: {}
          description: "The key-value pair that exists if the OpenSearch Service domain uses VPC endpoints. For example: IPv4 IP addresses - 'vpc','vpc-endpoint-h2dsd34efgyghrtguk5gt6j2foh4.us-east-1.es.amazonaws.com' Dual stack IP addresses - 'vpcv2':'vpc-endpoint-h2dsd34efgyghrtguk5gt6j2foh4.aos.us-east-1.on.aws'"
        DomainEndpointV2HostedZoneId:
          $ref: "#/components/schemas/HostedZoneId"
          description: The dual stack hosted zone ID for the domain.
        Processing:
          $ref: "#/components/schemas/Boolean"
          description: The status of the domain configuration. True if OpenSearch Service is processing configuration changes. False if the configuration is active.
        UpgradeProcessing:
          $ref: "#/components/schemas/Boolean"
          description: The status of a domain version upgrade to a new version of OpenSearch or Elasticsearch. True if OpenSearch Service is in the process of a version upgrade. False if the configuration is active.
        EngineVersion:
          $ref: "#/components/schemas/VersionString"
          description: Version of OpenSearch or Elasticsearch that the domain is running, in the format Elasticsearch_X.Y or OpenSearch_X.Y.
        ClusterConfig:
          $ref: "#/components/schemas/ClusterConfig"
          description: Container for the cluster configuration of the domain.
        EBSOptions:
          $ref: "#/components/schemas/EBSOptions"
          description: Container for EBS-based storage settings for the domain.
        AccessPolicies:
          $ref: "#/components/schemas/PolicyDocument"
          description: Identity and Access Management (IAM) policy document specifying the access policies for the domain.
        IPAddressType:
          $ref: "#/components/schemas/IPAddressType"
          description: The type of IP addresses supported by the endpoint for the domain.
        SnapshotOptions:
          $ref: "#/components/schemas/SnapshotOptions"
          description: DEPRECATED. Container for parameters required to configure automated snapshots of domain indexes.
        VPCOptions:
          $ref: "#/components/schemas/VPCDerivedInfo"
          description: The VPC configuration for the domain.
        CognitoOptions:
          $ref: "#/components/schemas/CognitoOptions"
          description: Key-value pairs to configure Amazon Cognito authentication for OpenSearch Dashboards.
        EncryptionAtRestOptions:
          $ref: "#/components/schemas/EncryptionAtRestOptions"
          description: Encryption at rest settings for the domain.
        NodeToNodeEncryptionOptions:
          $ref: "#/components/schemas/NodeToNodeEncryptionOptions"
          description: Whether node-to-node encryption is enabled or disabled.
        AdvancedOptions:
          type: object
          properties: {}
          description: Key-value pairs that specify advanced configuration options.
        LogPublishingOptions:
          type: object
          properties: {}
          description: Log publishing options for the domain.
        ServiceSoftwareOptions:
          $ref: "#/components/schemas/ServiceSoftwareOptions"
          description: The current status of the domain's service software.
        DomainEndpointOptions:
          $ref: "#/components/schemas/DomainEndpointOptions"
          description: Additional options for the domain endpoint, such as whether to require HTTPS for all traffic.
        AdvancedSecurityOptions:
          $ref: "#/components/schemas/AdvancedSecurityOptions"
          description: Settings for fine-grained access control.
        IdentityCenterOptions:
          $ref: "#/components/schemas/IdentityCenterOptions"
          description: Configuration options for controlling IAM Identity Center integration within a domain.
        AutoTuneOptions:
          $ref: "#/components/schemas/AutoTuneOptionsOutput"
          description: Auto-Tune settings for the domain.
        ChangeProgressDetails:
          $ref: "#/components/schemas/ChangeProgressDetails"
          description: Information about a configuration change happening on the domain.
        OffPeakWindowOptions:
          $ref: "#/components/schemas/OffPeakWindowOptions"
          description: Options that specify a custom 10-hour window during which OpenSearch Service can perform configuration changes on the domain.
        SoftwareUpdateOptions:
          $ref: "#/components/schemas/SoftwareUpdateOptions"
          description: Service software update options for the domain.
        DomainProcessingStatus:
          $ref: "#/components/schemas/DomainProcessingStatusType"
          description: The status of any changes that are currently in progress for the domain.
        ModifyingProperties:
          $ref: "#/components/schemas/ModifyingPropertiesList"
          description: Information about the domain properties that are currently being modified.
        AIMLOptions:
          $ref: "#/components/schemas/AIMLOptionsOutput"
          description: Container for parameters required to enable all machine learning features.
        DeploymentStrategyOptions:
          $ref: "#/components/schemas/DeploymentStrategyOptions"
          description: The current status of the domain's deployment strategy options.
        AutomatedSnapshotPauseOptions:
          $ref: "#/components/schemas/AutomatedSnapshotPauseOptions"
          description: The current status of the domain's automated snapshot pause options.
      required:
        - DomainId
        - DomainName
        - ARN
        - ClusterConfig
    DomainId:
      description: Unique identifier for an OpenSearch Service domain.
      type: string
      minLength: 1
      maxLength: 64
    ServiceUrl:
      description: The domain endpoint to which index and search requests are submitted. For example, search-imdb-movies-oopcnjfn6ugo.eu-west-1.es.amazonaws.com or doc-imdb-movies-oopcnjfn6u.eu-west-1.es.amazonaws.com.
      type: string
    HostedZoneId:
      type: string
    VPCDerivedInfo:
      description: Information about the subnets and security groups for an Amazon OpenSearch Service domain provisioned within a virtual private cloud (VPC). For more information, see Launching your Amazon OpenSearch Service domains using a VPC. This information only exists if the domain was created with VPCOptions.
      type: object
      properties:
        VPCId:
          $ref: "#/components/schemas/String"
          description: The ID for your VPC. Amazon VPC generates this value when you create a VPC.
        SubnetIds:
          $ref: "#/components/schemas/StringList"
          description: A list of subnet IDs associated with the VPC endpoints for the domain.
        AvailabilityZones:
          $ref: "#/components/schemas/StringList"
          description: The list of Availability Zones associated with the VPC subnets.
        SecurityGroupIds:
          $ref: "#/components/schemas/StringList"
          description: The list of security group IDs associated with the VPC endpoints for the domain.
        EgressEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether egress traffic from the domain is routed through the customer VPC. When true, outbound traffic flows through the VPC. When false, outbound traffic goes through the public internet.
    AdvancedSecurityOptions:
      description: Container for fine-grained access control settings.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: True if fine-grained access control is enabled.
        InternalUserDatabaseEnabled:
          $ref: "#/components/schemas/Boolean"
          description: True if the internal user database is enabled.
        SAMLOptions:
          $ref: "#/components/schemas/SAMLOptionsOutput"
          description: Container for information about the SAML configuration for OpenSearch Dashboards.
        JWTOptions:
          $ref: "#/components/schemas/JWTOptionsOutput"
          description: Container for information about the JWT configuration of the Amazon OpenSearch Service.
        IAMFederationOptions:
          $ref: "#/components/schemas/IAMFederationOptionsOutput"
          description: Configuration options for IAM identity federation in advanced security settings.
        AnonymousAuthDisableDate:
          $ref: "#/components/schemas/DisableTimestamp"
          description: Date and time when the migration period will be disabled. Only necessary when enabling fine-grained access control on an existing domain.
        AnonymousAuthEnabled:
          $ref: "#/components/schemas/Boolean"
          description: True if a 30-day migration period is enabled, during which administrators can create role mappings. Only necessary when enabling fine-grained access control on an existing domain.
    SAMLOptionsOutput:
      description: Describes the SAML application configured for the domain.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: True if SAML is enabled.
        Idp:
          $ref: "#/components/schemas/SAMLIdp"
          description: Describes the SAML identity provider's information.
        SubjectKey:
          $ref: "#/components/schemas/String"
          description: The key used for matching the SAML subject attribute.
        RolesKey:
          $ref: "#/components/schemas/String"
          description: The key used for matching the SAML roles attribute.
        SessionTimeoutMinutes:
          $ref: "#/components/schemas/IntegerClass"
          description: The duration, in minutes, after which a user session becomes inactive.
    JWTOptionsOutput:
      description: Describes the JWT options configured for the domain.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: True if JWT use is enabled.
        SubjectKey:
          $ref: "#/components/schemas/String"
          description: The key used for matching the JWT subject attribute.
        RolesKey:
          $ref: "#/components/schemas/String"
          description: The key used for matching the JWT roles attribute.
        JwksUrl:
          $ref: "#/components/schemas/JwksUrl"
          description: The configured JWKS URL endpoint from which the cluster retrieves public keys to verify JWT requests.
        PublicKey:
          $ref: "#/components/schemas/String"
          description: The key used to verify the signature of incoming JWT requests.
    IAMFederationOptionsOutput:
      description: Output parameters showing the current IAM identity federation configuration.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether IAM identity federation is currently enabled for the domain.
        SubjectKey:
          $ref: "#/components/schemas/IAMFederationSubjectKey"
          description: The configured key in the SAML assertion for the user's subject identifier.
        RolesKey:
          $ref: "#/components/schemas/IAMFederationRolesKey"
          description: The configured key in the SAML assertion for the user's role information.
    DisableTimestamp:
      type: string
      format: date-time
    IdentityCenterOptions:
      description: Settings container for integrating IAM Identity Center with OpenSearch UI applications, which enables enabling secure user authentication and access control across multiple data sources. This setup supports single sign-on (SSO) through IAM Identity Center, allowing centralized user management.
      type: object
      properties:
        EnabledAPIAccess:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether IAM Identity Center is enabled for the application.
        IdentityCenterInstanceARN:
          $ref: "#/components/schemas/IdentityCenterInstanceARN"
          description: The Amazon Resource Name (ARN) of the IAM Identity Center instance.
        IdentityCenterInstanceRegion:
          $ref: "#/components/schemas/Region"
          description: The Region of the IAM Identity Center instance.
        SubjectKey:
          $ref: "#/components/schemas/SubjectKeyIdCOption"
          description: Specifies the attribute that contains the subject identifier (such as username, user ID, or email) in IAM Identity Center.
        RolesKey:
          $ref: "#/components/schemas/RolesKeyIdCOption"
          description: Specifies the attribute that contains the backend role identifier (such as group name or group ID) in IAM Identity Center.
        IdentityCenterApplicationARN:
          $ref: "#/components/schemas/IdentityCenterApplicationARN"
          description: The ARN of the IAM Identity Center application that integrates with Amazon OpenSearch Service.
        IdentityStoreId:
          $ref: "#/components/schemas/IdentityStoreId"
          description: The identifier of the IAM Identity Store.
    IdentityCenterApplicationARN:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:aws[a-z\\-]*:[a-z]+:[a-z0-9\\-]*:[0-9]*:[a-z0-9\\-]+\/[a-z0-9\\-]+\/[a-z0-9\\-]+
    IdentityStoreId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^d-[0-9a-f]{10}$|^[0-9a-f]{8}\\b-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-\\b[0-9a-f]{12}$
    AutoTuneOptionsOutput:
      description: The Auto-Tune settings for a domain, displayed when enabling or disabling Auto-Tune.
      type: object
      properties:
        State:
          $ref: "#/components/schemas/AutoTuneState"
          description: The current state of Auto-Tune on the domain.
        ErrorMessage:
          $ref: "#/components/schemas/String"
          description: Any errors that occurred while enabling or disabling Auto-Tune.
        UseOffPeakWindow:
          $ref: "#/components/schemas/Boolean"
          description: Whether the domain's off-peak window will be used to deploy Auto-Tune changes rather than a maintenance schedule.
    AutoTuneState:
      description: The Auto-Tune state for the domain. For valid states see Auto-Tune for Amazon OpenSearch Service.
      type: string
      enum:
        - ENABLED
        - DISABLED
        - ENABLE_IN_PROGRESS
        - DISABLE_IN_PROGRESS
        - DISABLED_AND_ROLLBACK_SCHEDULED
        - DISABLED_AND_ROLLBACK_IN_PROGRESS
        - DISABLED_AND_ROLLBACK_COMPLETE
        - DISABLED_AND_ROLLBACK_ERROR
        - ERROR
    ChangeProgressDetails:
      description: Container for information about a configuration change happening on a domain.
      type: object
      properties:
        ChangeId:
          $ref: "#/components/schemas/GUID"
          description: The ID of the configuration change.
        Message:
          $ref: "#/components/schemas/Message"
          description: A message corresponding to the status of the configuration change.
        ConfigChangeStatus:
          $ref: "#/components/schemas/ConfigChangeStatus"
          description: The current status of the configuration change.
        InitiatedBy:
          $ref: "#/components/schemas/InitiatedBy"
          description: The IAM principal who initiated the configuration change.
        StartTime:
          $ref: "#/components/schemas/UpdateTimestamp"
          description: The time that the configuration change was initiated, in Universal Coordinated Time (UTC).
        LastUpdatedTime:
          $ref: "#/components/schemas/UpdateTimestamp"
          description: The last time that the configuration change was updated.
    Message:
      type: string
      minLength: 0
      maxLength: 1024
    ConfigChangeStatus:
      type: string
      enum:
        - Pending
        - Initializing
        - Validating
        - ValidationFailed
        - ApplyingChanges
        - Completed
        - PendingUserInput
        - Cancelled
    InitiatedBy:
      type: string
      enum:
        - CUSTOMER
        - SERVICE
    UpdateTimestamp:
      type: string
      format: date-time
    DomainProcessingStatusType:
      type: string
      enum:
        - Creating
        - Active
        - Modifying
        - UpgradingEngineVersion
        - UpdatingServiceSoftware
        - Isolated
        - Deleting
    ModifyingPropertiesList:
      type: array
      items:
        $ref: "#/components/schemas/ModifyingProperties"
    ModifyingProperties:
      description: Information about the domain properties that are currently being modified.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the property that is currently being modified.
        ActiveValue:
          $ref: "#/components/schemas/String"
          description: The current value of the domain property that is being modified.
        PendingValue:
          $ref: "#/components/schemas/String"
          description: The value that the property that is currently being modified will eventually have.
        ValueType:
          $ref: "#/components/schemas/PropertyValueType"
          description: 'The type of value that is currently being modified. Properties can have two types: PLAIN_TEXT: Contain direct values such as "1", "True", or "c5.large.search". STRINGIFIED_JSON: Contain content in JSON format, such as {"Enabled":"True"}".'
    PropertyValueType:
      type: string
      enum:
        - PLAIN_TEXT
        - STRINGIFIED_JSON
    AIMLOptionsOutput:
      description: Container for parameters representing the state of machine learning features on the specified domain.
      type: object
      properties:
        NaturalLanguageQueryGenerationOptions:
          $ref: "#/components/schemas/NaturalLanguageQueryGenerationOptionsOutput"
          description: Container for parameters required for natural language query generation on the specified domain.
        S3VectorsEngine:
          $ref: "#/components/schemas/S3VectorsEngine"
          description: Container for parameters representing the state of S3 vectors engine features on the specified domain.
        ServerlessVectorAcceleration:
          $ref: "#/components/schemas/ServerlessVectorAcceleration"
          description: The current serverless vector acceleration configuration for the domain.
    NaturalLanguageQueryGenerationOptionsOutput:
      description: Container for parameters representing the state of the natural language query generation feature on the specified domain.
      type: object
      properties:
        DesiredState:
          $ref: "#/components/schemas/NaturalLanguageQueryGenerationDesiredState"
          description: The desired state of the natural language query generation feature. Valid values are ENABLED and DISABLED.
        CurrentState:
          $ref: "#/components/schemas/NaturalLanguageQueryGenerationCurrentState"
          description: The current state of the natural language query generation feature, indicating completion, in progress, or failure.
    NaturalLanguageQueryGenerationCurrentState:
      type: string
      enum:
        - NOT_ENABLED
        - ENABLE_COMPLETE
        - ENABLE_IN_PROGRESS
        - ENABLE_FAILED
        - DISABLE_COMPLETE
        - DISABLE_IN_PROGRESS
        - DISABLE_FAILED
    AutomatedSnapshotPauseOptions:
      description: Specifies the automated snapshot pause options for the domain. These options allow you to temporarily pause automated snapshots for a specified time period.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether automated snapshot pause is enabled for the domain.
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the automated snapshot pause begins.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the automated snapshot pause ends.
        State:
          $ref: "#/components/schemas/PauseState"
          description: The current state of the automated snapshot pause. Valid values are Active, Completed, Scheduled, and Disabled.
      required:
        - Enabled
    PauseState:
      description: The state of the automated snapshot pause. Valid values are Active, Completed, Scheduled, and Disabled.
      type: string
      enum:
        - Active
        - Completed
        - Scheduled
        - Disabled
    IndexName:
      description: Name of OpenSearch index to be created/updated/retrieved/deleted for customer's domain
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^(?!\.\.?$)[^_ ,:"+/*\\|?#><A-Z-][^ ,:"+/*\\|?#><A-Z]*$
    IndexSchema:
      type: object
    CreateIndexResponse:
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/IndexStatus"
          description: The status of the index creation operation.
      required:
        - Status
    IndexStatus:
      type: string
      enum:
        - CREATED
        - UPDATED
        - DELETED
    ConnectionAlias:
      type: string
      minLength: 2
      maxLength: 100
      pattern: "[a-zA-Z][a-zA-Z0-9\\-\\_]+"
    ConnectionProperties:
      description: The connection properties of an outbound connection.
      type: object
      properties:
        Endpoint:
          $ref: "#/components/schemas/Endpoint"
          description: The Endpoint attribute cannot be modified. The endpoint of the remote domain. Applicable for VPC_ENDPOINT connection mode.
        CrossClusterSearch:
          $ref: "#/components/schemas/CrossClusterSearchConnectionProperties"
          description: The connection properties for cross cluster search.
    Endpoint:
      type: string
      pattern: ^[A-Za-z0-9\-\.]+$
    CrossClusterSearchConnectionProperties:
      description: Cross-cluster search specific connection properties.
      type: object
      properties:
        SkipUnavailable:
          $ref: "#/components/schemas/SkipUnavailableStatus"
          description: The status of the SkipUnavailable setting for the outbound connection. This feature allows you to specify some clusters as optional and ensure that your cross-cluster queries return partial results despite failures on one or more remote clusters.
    SkipUnavailableStatus:
      description: The status of SkipUnavailable setting for the outbound connection. ENABLED - The SkipUnavailable setting is enabled for the connection. DISABLED - The SkipUnavailable setting is disabled for the connection.
      type: string
      enum:
        - ENABLED
        - DISABLED
    CreateOutboundConnectionResponse:
      description: The result of a CreateOutboundConnection request. Contains details about the newly created cross-cluster connection.
      type: object
      properties:
        LocalDomainInfo:
          $ref: "#/components/schemas/DomainInformationContainer"
          description: Information about the source (local) domain.
        RemoteDomainInfo:
          $ref: "#/components/schemas/DomainInformationContainer"
          description: Information about the destination (remote) domain.
        ConnectionAlias:
          $ref: "#/components/schemas/ConnectionAlias"
          description: Name of the connection.
        ConnectionStatus:
          $ref: "#/components/schemas/OutboundConnectionStatus"
          description: The status of the connection.
        ConnectionId:
          $ref: "#/components/schemas/ConnectionId"
          description: The unique identifier for the created outbound connection, which is used for subsequent operations on the connection.
        ConnectionMode:
          $ref: "#/components/schemas/ConnectionMode"
          description: The connection mode.
        ConnectionProperties:
          $ref: "#/components/schemas/ConnectionProperties"
          description: The ConnectionProperties for the newly created connection.
    OutboundConnectionStatus:
      description: The status of an outbound cross-cluster connection.
      type: object
      properties:
        StatusCode:
          $ref: "#/components/schemas/OutboundConnectionStatusCode"
          description: "The status code for the outbound connection. Can be one of the following: VALIDATING - The outbound connection request is being validated. VALIDATION_FAILED - Validation failed for the connection request. PENDING_ACCEPTANCE: Outbound connection request is validated and is not yet accepted by the remote domain owner. APPROVED - Outbound connection has been approved by the remote domain owner for getting provisioned. PROVISIONING - Outbound connection request is in process. ACTIVE - Outbound connection is active and ready to use. REJECTING - Outbound connection rejection by remote domain owner is in progress. REJECTED - Outbound connection request is rejected by remote domain owner. DELETING - Outbound connection deletion is in progress. DELETED - Outbound connection is deleted and can no longer be used."
        Message:
          $ref: "#/components/schemas/ConnectionStatusMessage"
          description: Verbose information for the outbound connection.
    OutboundConnectionStatusCode:
      type: string
      enum:
        - VALIDATING
        - VALIDATION_FAILED
        - PENDING_ACCEPTANCE
        - APPROVED
        - PROVISIONING
        - ACTIVE
        - REJECTING
        - REJECTED
        - DELETING
        - DELETED
    PackageDescription:
      type: string
      maxLength: 1024
    PackageSource:
      description: The Amazon S3 location to import the package from.
      type: object
      properties:
        S3BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of the Amazon S3 bucket containing the package.
        S3Key:
          $ref: "#/components/schemas/S3Key"
          description: Key (file name) of the package.
    S3BucketName:
      type: string
      minLength: 3
      maxLength: 63
    S3Key:
      type: string
      minLength: 1
      maxLength: 1024
    PackageConfiguration:
      description: The configuration parameters for a package.
      type: object
      properties:
        LicenseRequirement:
          $ref: "#/components/schemas/RequirementLevel"
          description: The license requirements for the package.
        LicenseFilepath:
          $ref: "#/components/schemas/LicenseFilepath"
          description: The relative file path for the license associated with the package.
        ConfigurationRequirement:
          $ref: "#/components/schemas/RequirementLevel"
          description: The configuration requirements for the package.
        RequiresRestartForConfigurationUpdate:
          $ref: "#/components/schemas/Boolean"
          description: This indicates whether a B/G deployment is required for updating the configuration that the plugin is prerequisite for.
      required:
        - LicenseRequirement
        - ConfigurationRequirement
    RequirementLevel:
      type: string
      enum:
        - REQUIRED
        - OPTIONAL
        - NONE
    LicenseFilepath:
      type: string
      maxLength: 256
      pattern: ^(?!.*\/\.{2,})(?!.*\.\.)[a-zA-Z0-9_.-]+(?:\/[a-zA-Z0-9_.-]+)*$
    EngineVersion:
      type: string
      pattern: ^Elasticsearch_[0-9]{1}\.[0-9]{1,2}$|^OpenSearch_[0-9]{1,2}\.[0-9]{1,2}$
    PackageVendingOptions:
      description: Configuration options for determining whether a package can be made available for use by other users.
      type: object
      properties:
        VendingEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the package vending feature is enabled, allowing the package to be used by other users.
      required:
        - VendingEnabled
    PackageEncryptionOptions:
      description: Encryption options for a package.
      type: object
      properties:
        KmsKeyIdentifier:
          $ref: "#/components/schemas/KmsKeyId"
          description: KMS key ID for encrypting the package.
        EncryptionEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether encryption is enabled for the package.
      required:
        - EncryptionEnabled
    CreatePackageResponse:
      description: Container for the response returned by the CreatePackage operation.
      type: object
      properties:
        PackageDetails:
          $ref: "#/components/schemas/PackageDetails"
          description: Basic information about an OpenSearch Service package.
    PackageDetails:
      description: Basic information about a package.
      type: object
      properties:
        PackageID:
          $ref: "#/components/schemas/PackageID"
          description: The unique identifier of the package.
        PackageName:
          $ref: "#/components/schemas/PackageName"
          description: The user-specified name of the package.
        PackageType:
          $ref: "#/components/schemas/PackageType"
          description: The type of package.
        PackageDescription:
          $ref: "#/components/schemas/PackageDescription"
          description: User-specified description of the package.
        PackageStatus:
          $ref: "#/components/schemas/PackageStatus"
          description: The current status of the package. The available options are AVAILABLE, COPYING, COPY_FAILED, VALIDATNG, VALIDATION_FAILED, DELETING, and DELETE_FAILED.
        CreatedAt:
          $ref: "#/components/schemas/CreatedAt"
          description: The timestamp when the package was created.
        LastUpdatedAt:
          $ref: "#/components/schemas/LastUpdated"
          description: Date and time when the package was last updated.
        AvailablePackageVersion:
          $ref: "#/components/schemas/PackageVersion"
          description: The package version.
        ErrorDetails:
          $ref: "#/components/schemas/ErrorDetails"
          description: Additional information if the package is in an error state. Null otherwise.
        EngineVersion:
          $ref: "#/components/schemas/EngineVersion"
          description: Version of OpenSearch or Elasticsearch, in the format Elasticsearch_X.Y or OpenSearch_X.Y. Defaults to the latest version of OpenSearch.
        AvailablePluginProperties:
          $ref: "#/components/schemas/PluginProperties"
          description: If the package is a ZIP-PLUGIN package, additional information about plugin properties.
        AvailablePackageConfiguration:
          $ref: "#/components/schemas/PackageConfiguration"
          description: This represents the available configuration parameters for the package.
        AllowListedUserList:
          $ref: "#/components/schemas/PackageUserList"
          description: A list of users who are allowed to view and associate the package. This field is only visible to the owner of a package.
        PackageOwner:
          $ref: "#/components/schemas/PackageOwner"
          description: The owner of the package who is allowed to create and update a package and add users to the package scope.
        PackageVendingOptions:
          $ref: "#/components/schemas/PackageVendingOptions"
          description: Package Vending Options for a package.
        PackageEncryptionOptions:
          $ref: "#/components/schemas/PackageEncryptionOptions"
          description: Encryption options for a package.
    PackageStatus:
      type: string
      enum:
        - COPYING
        - COPY_FAILED
        - VALIDATING
        - VALIDATION_FAILED
        - AVAILABLE
        - DELETING
        - DELETED
        - DELETE_FAILED
    CreatedAt:
      type: string
      format: date-time
    PluginProperties:
      description: Basic information about the plugin.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/PluginName"
          description: The name of the plugin.
        Description:
          $ref: "#/components/schemas/PluginDescription"
          description: The description of the plugin.
        Version:
          $ref: "#/components/schemas/PluginVersion"
          description: The version of the plugin.
        ClassName:
          $ref: "#/components/schemas/PluginClassName"
          description: The name of the class to load.
        UncompressedSizeInBytes:
          $ref: "#/components/schemas/UncompressedPluginSizeInBytes"
          description: The uncompressed size of the plugin.
    PluginName:
      type: string
