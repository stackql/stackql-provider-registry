        KeyStoreAccessEnabled:
          $ref: "#/components/schemas/Boolean"
          description: This indicates whether Key Store access is enabled
      required:
        - KeyStoreAccessEnabled
    Boolean:
      type: boolean
    AssociatePackageResponse:
      description: Container for the response returned by the AssociatePackage operation.
      type: object
      properties:
        DomainPackageDetails:
          $ref: "#/components/schemas/DomainPackageDetails"
          description: Information about a package that is associated with a domain.
    DomainPackageDetails:
      description: Information about a package that is associated with a domain. For more information, see Custom packages for Amazon OpenSearch Service.
      type: object
      properties:
        PackageID:
          $ref: "#/components/schemas/PackageID"
          description: Internal ID of the package.
        PackageName:
          $ref: "#/components/schemas/PackageName"
          description: User-specified name of the package.
        PackageType:
          $ref: "#/components/schemas/PackageType"
          description: The type of package.
        LastUpdated:
          $ref: "#/components/schemas/LastUpdated"
          description: Timestamp of the most recent update to the package association status.
        DomainName:
          $ref: "#/components/schemas/DomainName"
          description: Name of the domain that the package is associated with.
        DomainPackageStatus:
          $ref: "#/components/schemas/DomainPackageStatus"
          description: State of the association.
        PackageVersion:
          $ref: "#/components/schemas/PackageVersion"
          description: The current version of the package.
        PrerequisitePackageIDList:
          $ref: "#/components/schemas/PackageIDList"
          description: A list of package IDs that must be associated with the domain before or with the package can be associated.
        ReferencePath:
          $ref: "#/components/schemas/ReferencePath"
          description: The relative path of the package on the OpenSearch Service cluster nodes. This is synonym_path when the package is for synonym files.
        ErrorDetails:
          $ref: "#/components/schemas/ErrorDetails"
          description: Additional information if the package is in an error state. Null otherwise.
        AssociationConfiguration:
          $ref: "#/components/schemas/PackageAssociationConfiguration"
          description: The configuration for associating a package with an Amazon OpenSearch Service domain.
    PackageName:
      type: string
      minLength: 3
      maxLength: 256
      pattern: "[a-z][a-z0-9\\-]+"
    PackageType:
      type: string
      enum:
        - TXT-DICTIONARY
        - ZIP-PLUGIN
        - PACKAGE-LICENSE
        - PACKAGE-CONFIG
    LastUpdated:
      type: string
      format: date-time
    DomainPackageStatus:
      type: string
