      description: A tag (key-value pair) for an Amazon OpenSearch Service resource.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The tag key. Tag keys must be unique for the domain to which they are attached.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: "The value assigned to the corresponding tag key. Tag values can be null and don't have to be unique in a tag set. For example, you can have a key value pair in a tag set of project : Trinity and cost-center : Trinity"
      required:
        - Key
        - Value
    TagKey:
      description: A string between 1 to 128 characters that specifies the key for a tag. Tag keys must be unique for the domain to which they're attached.
      type: string
      minLength: 1
      maxLength: 128
      pattern: .*
    TagValue:
      description: A string between 0 to 256 characters that specifies the value for a tag. Tag values can be null and don't have to be unique in a tag set.
      type: string
      minLength: 0
      maxLength: 256
      pattern: .*
    AddDirectQueryDataSourceResponse:
      type: object
      properties:
        DataSourceArn:
          $ref: "#/components/schemas/String"
          description: The unique, system-generated identifier that represents the data source.
    PackageID:
