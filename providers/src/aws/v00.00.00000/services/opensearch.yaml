openapi: 3.0.0
info:
  version: "2021-01-01"
  title: Amazon OpenSearch Service
  description: Amazon OpenSearch Service
  x-serviceName: es
  x-serviceAlias: opensearch
  x-protocol: rest-json
  x-apiVersion: "2021-01-01"
  x-endpointPrefix: es
servers:
  - url: https://es.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for opensearch
paths:
  /2021-01-01/opensearch/cc/inboundConnection/{connection_id}/accept:
    put:
      operationId: AcceptInboundConnection
      description: Allows the destination Amazon OpenSearch Service domain owner to accept an inbound cross-cluster search connection request. For more information, see Cross-cluster search for Amazon OpenSearch Service.
      parameters:
        - name: connection_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConnectionId"
          description: The ID of the inbound connection to accept.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptInboundConnectionResponse"
  /2021-01-01/opensearch/domain/{domain_name}/dataSource:
    post:
      operationId: AddDataSource
      description: Creates a new direct-query data source to the specified domain. For more information, see Creating Amazon OpenSearch Service data source integrations with Amazon S3.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain to add the data source to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/DataSourceName"
                DataSourceType:
                  $ref: "#/components/schemas/DataSourceType"
                Description:
                  $ref: "#/components/schemas/DataSourceDescription"
              required:
                - DataSourceType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddDataSourceResponse"
    get:
      operationId: ListDataSources
      description: Lists direct-query data sources for a specific domain. For more information, see For more information, see Working with Amazon OpenSearch Service direct queries with Amazon S3.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataSourcesResponse"
  /2021-01-01/opensearch/directQueryDataSource:
    post:
      operationId: AddDirectQueryDataSource
      description: Adds a new data source in Amazon OpenSearch Service so that you can perform direct queries on external data.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DataSourceName:
                  $ref: "#/components/schemas/DirectQueryDataSourceName"
                DataSourceType:
                  $ref: "#/components/schemas/DirectQueryDataSourceType"
                Description:
                  $ref: "#/components/schemas/DirectQueryDataSourceDescription"
                OpenSearchArns:
                  $ref: "#/components/schemas/DirectQueryOpenSearchARNList"
                DataSourceAccessPolicy:
                  $ref: "#/components/schemas/PolicyDocument"
                TagList:
                  $ref: "#/components/schemas/TagList"
              required:
                - DataSourceName
                - DataSourceType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddDirectQueryDataSourceResponse"
    get:
      operationId: ListDirectQueryDataSources
      description: Lists an inventory of all the direct query data sources that you have configured within Amazon OpenSearch Service.
      parameters:
        - name: nexttoken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDirectQueryDataSourcesResponse"
  /2021-01-01/tags:
    post:
      operationId: AddTags
      description: Attaches tags to an existing Amazon OpenSearch Service domain, data source, or application. Tags are a set of case-sensitive key-value pairs. A domain, data source, or application can have up to 10 tags. For more information, see Tagging Amazon OpenSearch Service resources.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ARN:
                  $ref: "#/components/schemas/ARN"
                TagList:
                  $ref: "#/components/schemas/TagList"
              required:
                - TagList
      responses:
        "200":
          description: Success
  /2021-01-01/packages/associate/{package_id}/{domain_name}:
    post:
      operationId: AssociatePackage
      description: Associates a package with an Amazon OpenSearch Service domain. For more information, see Custom packages for Amazon OpenSearch Service.
      parameters:
        - name: package_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PackageID"
          description: Internal ID of the package to associate with a domain. Use DescribePackages to find this value.
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: Name of the domain to associate the package with.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                PrerequisitePackageIDList:
                  $ref: "#/components/schemas/PackageIDList"
                AssociationConfiguration:
                  $ref: "#/components/schemas/PackageAssociationConfiguration"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociatePackageResponse"
  /2021-01-01/packages/associateMultiple:
    post:
      operationId: AssociatePackages
      description: Operation in the Amazon OpenSearch Service API for associating multiple packages with a domain simultaneously.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PackageList:
                  $ref: "#/components/schemas/PackageDetailsForAssociationList"
                DomainName:
                  $ref: "#/components/schemas/DomainName"
              required:
                - PackageList
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociatePackagesResponse"
  /2021-01-01/opensearch/domain/{domain_name}/authorizeVpcEndpointAccess:
    post:
      operationId: AuthorizeVpcEndpointAccess
      description: Provides access to an Amazon OpenSearch Service domain through the use of an interface VPC endpoint.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the OpenSearch Service domain to provide access to.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Account:
                  $ref: "#/components/schemas/AWSAccount"
                Service:
                  $ref: "#/components/schemas/AWSServicePrincipal"
                ServiceOptions:
                  $ref: "#/components/schemas/ServiceOptions"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizeVpcEndpointAccessResponse"
  /2021-01-01/opensearch/domain/{domain_name}/config/cancel:
    post:
      operationId: CancelDomainConfigChange
      description: Cancels a pending configuration change on an Amazon OpenSearch Service domain.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                DryRun:
                  $ref: "#/components/schemas/DryRun"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelDomainConfigChangeResponse"
  /2021-01-01/opensearch/serviceSoftwareUpdate/cancel:
    post:
      operationId: CancelServiceSoftwareUpdate
      description: Cancels a scheduled service software update for an Amazon OpenSearch Service domain. You can only perform this operation before the AutomatedUpdateDate and when the domain's UpdateStatus is PENDING_UPDATE. For more information, see Service software updates in Amazon OpenSearch Service.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
              required:
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelServiceSoftwareUpdateResponse"
  /2021-01-01/opensearch/application:
    post:
      operationId: CreateApplication
      description: Creates an OpenSearch UI application. For more information, see Using the OpenSearch user interface in Amazon OpenSearch Service.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                name:
                  $ref: "#/components/schemas/ApplicationName"
                dataSources:
                  $ref: "#/components/schemas/DataSources"
                iamIdentityCenterOptions:
                  $ref: "#/components/schemas/IamIdentityCenterOptionsInput"
                appConfigs:
                  $ref: "#/components/schemas/AppConfigs"
                tagList:
                  $ref: "#/components/schemas/TagList"
                kmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApplicationResponse"
  /2021-01-01/opensearch/domain:
    post:
      operationId: CreateDomain
      description: Creates an Amazon OpenSearch Service domain. For more information, see Creating and managing Amazon OpenSearch Service domains.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                EngineVersion:
                  $ref: "#/components/schemas/VersionString"
                ClusterConfig:
                  $ref: "#/components/schemas/ClusterConfig"
                EBSOptions:
                  $ref: "#/components/schemas/EBSOptions"
                AccessPolicies:
                  $ref: "#/components/schemas/PolicyDocument"
                IPAddressType:
                  $ref: "#/components/schemas/IPAddressType"
                SnapshotOptions:
                  $ref: "#/components/schemas/SnapshotOptions"
                VPCOptions:
                  $ref: "#/components/schemas/VPCOptions"
                CognitoOptions:
                  $ref: "#/components/schemas/CognitoOptions"
                EncryptionAtRestOptions:
                  $ref: "#/components/schemas/EncryptionAtRestOptions"
                NodeToNodeEncryptionOptions:
                  $ref: "#/components/schemas/NodeToNodeEncryptionOptions"
                AdvancedOptions:
                  $ref: "#/components/schemas/AdvancedOptions"
                LogPublishingOptions:
                  $ref: "#/components/schemas/LogPublishingOptions"
                DomainEndpointOptions:
                  $ref: "#/components/schemas/DomainEndpointOptions"
                AdvancedSecurityOptions:
                  $ref: "#/components/schemas/AdvancedSecurityOptionsInput"
                IdentityCenterOptions:
                  $ref: "#/components/schemas/IdentityCenterOptionsInput"
                TagList:
                  $ref: "#/components/schemas/TagList"
                AutoTuneOptions:
                  $ref: "#/components/schemas/AutoTuneOptionsInput"
                OffPeakWindowOptions:
                  $ref: "#/components/schemas/OffPeakWindowOptions"
                SoftwareUpdateOptions:
                  $ref: "#/components/schemas/SoftwareUpdateOptions"
                AIMLOptions:
                  $ref: "#/components/schemas/AIMLOptionsInput"
                DeploymentStrategyOptions:
                  $ref: "#/components/schemas/DeploymentStrategyOptions"
                AutomatedSnapshotPauseOptions:
                  $ref: "#/components/schemas/AutomatedSnapshotPauseRequestOptions"
              required:
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDomainResponse"
  /2021-01-01/opensearch/domain/{domain_name}/index:
    post:
      operationId: CreateIndex
      description: Creates an OpenSearch index with optional automatic semantic enrichment for specified text fields. Automatic semantic enrichment enables semantic search capabilities without requiring machine learning expertise, improving search relevance by up to 20% by understanding search intent and contextual meaning beyond keyword matching. The semantic enrichment process has zero impact on search latency as sparse encodings are stored directly within the index during indexing. For more information, see Automatic semantic enrichment.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                IndexName:
                  $ref: "#/components/schemas/IndexName"
                IndexSchema:
                  $ref: "#/components/schemas/IndexSchema"
              required:
                - IndexName
                - IndexSchema
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIndexResponse"
  /2021-01-01/opensearch/cc/outboundConnection:
    post:
      operationId: CreateOutboundConnection
      description: Creates a new cross-cluster search connection from a source Amazon OpenSearch Service domain to a destination domain. For more information, see Cross-cluster search for Amazon OpenSearch Service.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                LocalDomainInfo:
                  $ref: "#/components/schemas/DomainInformationContainer"
                RemoteDomainInfo:
                  $ref: "#/components/schemas/DomainInformationContainer"
                ConnectionAlias:
                  $ref: "#/components/schemas/ConnectionAlias"
                ConnectionMode:
                  $ref: "#/components/schemas/ConnectionMode"
                ConnectionProperties:
                  $ref: "#/components/schemas/ConnectionProperties"
              required:
                - LocalDomainInfo
                - RemoteDomainInfo
                - ConnectionAlias
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOutboundConnectionResponse"
  /2021-01-01/packages:
    post:
      operationId: CreatePackage
      description: Creates a package for use with Amazon OpenSearch Service domains. For more information, see Custom packages for Amazon OpenSearch Service.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PackageName:
                  $ref: "#/components/schemas/PackageName"
                PackageType:
                  $ref: "#/components/schemas/PackageType"
                PackageDescription:
                  $ref: "#/components/schemas/PackageDescription"
                PackageSource:
                  $ref: "#/components/schemas/PackageSource"
                PackageConfiguration:
                  $ref: "#/components/schemas/PackageConfiguration"
                EngineVersion:
                  $ref: "#/components/schemas/EngineVersion"
                PackageVendingOptions:
                  $ref: "#/components/schemas/PackageVendingOptions"
                PackageEncryptionOptions:
                  $ref: "#/components/schemas/PackageEncryptionOptions"
              required:
                - PackageName
                - PackageType
                - PackageSource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePackageResponse"
  /2021-01-01/opensearch/vpcEndpoints:
    post:
      operationId: CreateVpcEndpoint
      description: Creates an Amazon OpenSearch Service-managed VPC endpoint.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DomainArn:
                  $ref: "#/components/schemas/DomainArn"
                VpcOptions:
                  $ref: "#/components/schemas/VPCOptions"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - DomainArn
                - VpcOptions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVpcEndpointResponse"
    get:
      operationId: ListVpcEndpoints
      description: Retrieves all Amazon OpenSearch Service-managed VPC endpoints in the current Amazon Web Services account and Region.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If your initial ListVpcEndpoints operation returns a nextToken, you can include the returned nextToken in subsequent ListVpcEndpoints operations, which returns results in the next page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVpcEndpointsResponse"
  /2021-01-01/opensearch/application/{id}:
    delete:
      operationId: DeleteApplication
      description: Deletes a specified OpenSearch application.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier of the OpenSearch application to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApplicationResponse"
    get:
      operationId: GetApplication
      description: Retrieves the configuration and status of an existing OpenSearch application.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier of the OpenSearch application to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetApplicationResponse"
    put:
      operationId: UpdateApplication
      description: Updates the configuration and settings of an existing OpenSearch application.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for the OpenSearch application to be updated.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                dataSources:
                  $ref: "#/components/schemas/DataSources"
                appConfigs:
                  $ref: "#/components/schemas/AppConfigs"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateApplicationResponse"
  /2021-01-01/opensearch/domain/{domain_name}/dataSource/{data_source_name}:
    delete:
      operationId: DeleteDataSource
      description: Deletes a direct-query data source. For more information, see Deleting an Amazon OpenSearch Service data source with Amazon S3.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain.
        - name: data_source_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataSourceName"
          description: The name of the data source to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDataSourceResponse"
    get:
      operationId: GetDataSource
      description: Retrieves information about a direct query data source.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain.
        - name: data_source_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataSourceName"
          description: The name of the data source to get information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataSourceResponse"
    put:
      operationId: UpdateDataSource
      description: Updates a direct-query data source. For more information, see Working with Amazon OpenSearch Service data source integrations with Amazon S3.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain.
        - name: data_source_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataSourceName"
          description: The name of the data source to modify.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DataSourceType:
                  $ref: "#/components/schemas/DataSourceType"
                Description:
                  $ref: "#/components/schemas/DataSourceDescription"
                Status:
                  $ref: "#/components/schemas/DataSourceStatus"
              required:
                - DataSourceType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDataSourceResponse"
  /2021-01-01/opensearch/directQueryDataSource/{data_source_name}:
    delete:
      operationId: DeleteDirectQueryDataSource
      description: Deletes a previously configured direct query data source from Amazon OpenSearch Service.
      parameters:
        - name: data_source_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DirectQueryDataSourceName"
          description: A unique, user-defined label to identify the data source within your OpenSearch Service environment.
      responses:
        "200":
          description: Success
    get:
      operationId: GetDirectQueryDataSource
      description: Returns detailed configuration information for a specific direct query data source in Amazon OpenSearch Service.
      parameters:
        - name: data_source_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DirectQueryDataSourceName"
          description: A unique, user-defined label that identifies the data source within your OpenSearch Service environment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDirectQueryDataSourceResponse"
    put:
      operationId: UpdateDirectQueryDataSource
      description: Updates the configuration or properties of an existing direct query data source in Amazon OpenSearch Service.
      parameters:
        - name: data_source_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DirectQueryDataSourceName"
          description: A unique, user-defined label to identify the data source within your OpenSearch Service environment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DataSourceType:
                  $ref: "#/components/schemas/DirectQueryDataSourceType"
                Description:
                  $ref: "#/components/schemas/DirectQueryDataSourceDescription"
                OpenSearchArns:
                  $ref: "#/components/schemas/DirectQueryOpenSearchARNList"
                DataSourceAccessPolicy:
                  $ref: "#/components/schemas/PolicyDocument"
              required:
                - DataSourceType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDirectQueryDataSourceResponse"
  /2021-01-01/opensearch/domain/{domain_name}:
    delete:
      operationId: DeleteDomain
      description: Deletes an Amazon OpenSearch Service domain and all of its data. You can't recover a domain after you delete it.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain you want to permanently delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDomainResponse"
    get:
      operationId: DescribeDomain
      description: Describes the domain configuration for the specified Amazon OpenSearch Service domain, including the domain ID, domain service endpoint, and domain ARN.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain that you want information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDomainResponse"
  /2021-01-01/opensearch/cc/inboundConnection/{connection_id}:
    delete:
      operationId: DeleteInboundConnection
      description: Allows the destination Amazon OpenSearch Service domain owner to delete an existing inbound cross-cluster search connection. For more information, see Cross-cluster search for Amazon OpenSearch Service.
      parameters:
        - name: connection_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConnectionId"
          description: The ID of the inbound connection to permanently delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteInboundConnectionResponse"
  /2021-01-01/opensearch/domain/{domain_name}/index/{index_name}:
    delete:
      operationId: DeleteIndex
      description: Deletes an OpenSearch index. This operation permanently removes the index and cannot be undone.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
        - name: index_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IndexName"
          description: The name of the index to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIndexResponse"
    get:
      operationId: GetIndex
      description: Retrieves information about an OpenSearch index including its schema and semantic enrichment configuration. Use this operation to view the current index structure and semantic search settings.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
        - name: index_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IndexName"
          description: The name of the index to retrieve information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIndexResponse"
    put:
      operationId: UpdateIndex
      description: Updates an existing OpenSearch index schema and semantic enrichment configuration. This operation allows modification of field mappings and semantic search settings for text fields. Changes to semantic enrichment configuration will apply to newly ingested documents.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
