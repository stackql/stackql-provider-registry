      type: string
    DirectQueryDataSourceName:
      type: string
      minLength: 3
      maxLength: 80
      pattern: "[a-z][a-z0-9_]+"
    DirectQueryDataSourceType:
      description: The type of data source that is used for direct queries. This is a supported Amazon Web Services service, such as CloudWatch Logs or Security Lake.
      type: object
      properties:
        CloudWatchLog:
          $ref: "#/components/schemas/CloudWatchDirectQueryDataSource"
          description: Specifies CloudWatch Logs as a type of data source for direct queries.
        SecurityLake:
          $ref: "#/components/schemas/SecurityLakeDirectQueryDataSource"
          description: Specifies Security Lake as a type of data source for direct queries.
        Prometheus:
          $ref: "#/components/schemas/PrometheusDirectQueryDataSource"
          description: Specifies Prometheus as a type of data source for direct queries.
    CloudWatchDirectQueryDataSource:
      description: Configuration details for a CloudWatch Logs data source that can be used for direct queries.
      type: object
      properties:
        RoleArn:
          $ref: "#/components/schemas/DirectQueryDataSourceRoleArn"
          description: The unique identifier of the IAM role that grants OpenSearch Service permission to access the specified data source.
      required:
        - RoleArn
    DirectQueryDataSourceRoleArn:
      type: string
