      type: string
      minLength: 20
      maxLength: 2048
      pattern: .*
    PolicyDocument:
      description: Access policy rules for an Amazon OpenSearch Service domain endpoint. For more information, see Configuring access policies. The maximum size of a policy document is 100 KB.
      type: string
      minLength: 0
      maxLength: 102400
      pattern: .*
    TagList:
      description: A list of tags attached to a domain.
      type: array
      items:
        $ref: "#/components/schemas/Tag"
