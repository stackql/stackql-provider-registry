          $ref: "#/components/schemas/NumberOfAZs"
          description: The number of Availability Zones configured for the domain. If the service is unable to fetch this information, it will return NotAvailable.
        ActiveAvailabilityZoneCount:
          $ref: "#/components/schemas/NumberOfAZs"
          description: The number of active Availability Zones configured for the domain. If the service is unable to fetch this information, it will return NotAvailable.
        StandByAvailabilityZoneCount:
          $ref: "#/components/schemas/NumberOfAZs"
          description: The number of standby Availability Zones configured for the domain. If the service is unable to fetch this information, it will return NotAvailable.
