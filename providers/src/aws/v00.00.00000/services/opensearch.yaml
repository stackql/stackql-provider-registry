components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ConnectionId:
      type: string
      minLength: 10
      maxLength: 256
      pattern: "[a-z][a-z0-9\\-]+"
    AcceptInboundConnectionResponse:
      description: Contains details about the accepted inbound connection.
      type: object
      properties:
        Connection:
          $ref: "#/components/schemas/InboundConnection"
          description: Information about the accepted inbound connection.
    InboundConnection:
      description: Describes an inbound cross-cluster connection for Amazon OpenSearch Service. For more information, see Cross-cluster search for Amazon OpenSearch Service.
      type: object
      properties:
        LocalDomainInfo:
          $ref: "#/components/schemas/DomainInformationContainer"
          description: Information about the source (local) domain.
        RemoteDomainInfo:
          $ref: "#/components/schemas/DomainInformationContainer"
          description: Information about the destination (remote) domain.
        ConnectionId:
          $ref: "#/components/schemas/ConnectionId"
          description: The unique identifier of the connection.
        ConnectionStatus:
          $ref: "#/components/schemas/InboundConnectionStatus"
          description: The current status of the connection.
        ConnectionMode:
          $ref: "#/components/schemas/ConnectionMode"
          description: The connection mode.
    DomainInformationContainer:
      description: Container for information about an OpenSearch Service domain.
      type: object
      properties:
        AWSDomainInformation:
          $ref: "#/components/schemas/AWSDomainInformation"
          description: Information about an Amazon OpenSearch Service domain.
    AWSDomainInformation:
      description: Information about an Amazon OpenSearch Service domain.
      type: object
      properties:
        OwnerId:
          $ref: "#/components/schemas/OwnerId"
          description: The Amazon Web Services account ID of the domain owner.
        DomainName:
          $ref: "#/components/schemas/DomainName"
          description: Name of the domain.
        Region:
          $ref: "#/components/schemas/Region"
          description: The Amazon Web Services Region in which the domain is located.
      required:
        - DomainName
    OwnerId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[0-9]+"
    DomainName:
      description: The name of an OpenSearch Service domain. Domain names are unique across the domains owned by an account within an Amazon Web Services Region.
      type: string
      minLength: 3
      maxLength: 28
      pattern: "[a-z][a-z0-9\\-]+"
    Region:
      description: An Amazon Web Services Region, such as us-east-1.
      type: string
      minLength: 5
      maxLength: 30
      pattern: "[a-z][a-z0-9\\-]+"
    InboundConnectionStatus:
      description: The status of an inbound cross-cluster connection for OpenSearch Service.
      type: object
      properties:
        StatusCode:
          $ref: "#/components/schemas/InboundConnectionStatusCode"
          description: "The status code for the connection. Can be one of the following: PENDING_ACCEPTANCE - Inbound connection is not yet accepted by the remote domain owner. APPROVED: Inbound connection is pending acceptance by the remote domain owner. PROVISIONING: Inbound connection is being provisioned. ACTIVE: Inbound connection is active and ready to use. REJECTING: Inbound connection rejection is in process. REJECTED: Inbound connection is rejected. DELETING: Inbound connection deletion is in progress. DELETED: Inbound connection is deleted and can no longer be used."
        Message:
          $ref: "#/components/schemas/ConnectionStatusMessage"
          description: Information about the connection.
    InboundConnectionStatusCode:
      type: string
      enum:
        - PENDING_ACCEPTANCE
