      pattern: ^arn:aws[a-zA-Z-]*:iam::\d{12}:role(\/service-role)?\/[A-Za-z0-9+=,.@\-_]{1,64}$
    SecurityLakeDirectQueryDataSource:
      description: Configuration details for a Security Lake data source that can be used for direct queries.
      type: object
      properties:
        RoleArn:
          $ref: "#/components/schemas/DirectQueryDataSourceRoleArn"
          description: The unique identifier of the IAM role that grants OpenSearch Service permission to access the specified data source.
      required:
        - RoleArn
    PrometheusDirectQueryDataSource:
      description: Configuration details for a Prometheus data source that can be used for direct queries.
      type: object
      properties:
        RoleArn:
          $ref: "#/components/schemas/DirectQueryDataSourceRoleArn"
          description: The unique identifier of the IAM role that grants OpenSearch Service permission to access the specified data source.
        WorkspaceArn:
          $ref: "#/components/schemas/AMPWorkspaceArn"
          description: The unique identifier of the Amazon Managed Prometheus Workspace that is associated with the specified data source.
      required:
