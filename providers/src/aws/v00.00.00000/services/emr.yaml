        InstanceGroupIds:
          $ref: "#/components/schemas/InstanceGroupIdsList"
          description: Instance group IDs of the newly created instance groups.
        ClusterArn:
          $ref: "#/components/schemas/ArnType"
          description: The Amazon Resource Name of the cluster.
    InstanceGroupIdsList:
      type: array
      items:
        $ref: "#/components/schemas/XmlStringMaxLen256"
    StepConfigList:
      type: array
      items:
        $ref: "#/components/schemas/StepConfig"
    StepConfig:
      description: Specification for a cluster (job flow) step.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The name of the step.
        ActionOnFailure:
          $ref: "#/components/schemas/ActionOnFailure"
          description: "The action to take when the step fails. Use one of the following values: TERMINATE_CLUSTER - Shuts down the cluster. CANCEL_AND_WAIT - Cancels any pending steps and returns the cluster to the WAITING state. CONTINUE - Continues to the next step in the queue. TERMINATE_JOB_FLOW - Shuts down the cluster. TERMINATE_JOB_FLOW is provided for backward compatibility. We recommend using TERMINATE_CLUSTER instead. If a cluster's StepConcurrencyLevel is greater than 1, do not use AddJobFlowSteps to submit a step with this parameter set to CANCEL_AND_WAIT or TERMINATE_CLUSTER. The step is not submitted and the action fails with a message that the ActionOnFailure setting is not valid. If you change a cluster's StepConcurrencyLevel to be greater than 1 while a step is running, the ActionOnFailure parameter may not behave as you expect. In this case, for a step that fails with this parameter set to CANCEL_AND_WAIT, pending steps and the running step are not canceled; for a step that fails with this parameter set to TERMINATE_CLUSTER, the cluster does not terminate."
        HadoopJarStep:
          $ref: "#/components/schemas/HadoopJarStepConfig"
          description: The JAR file used for the step.
        StepMonitoringConfiguration:
          $ref: "#/components/schemas/StepMonitoringConfiguration"
          description: Object that holds configuration properties for logging.
      required:
        - Name
        - HadoopJarStep
    ActionOnFailure:
      type: string
      enum:
        - TERMINATE_JOB_FLOW
        - TERMINATE_CLUSTER
        - CANCEL_AND_WAIT
        - CONTINUE
    HadoopJarStepConfig:
      description: A job flow step consisting of a JAR file whose main function will be executed. The main function submits a job for Hadoop to execute and waits for the job to finish or fail.
      type: object
      properties:
        Properties:
          $ref: "#/components/schemas/KeyValueList"
          description: A list of Java properties that are set when the step runs. You can use these properties to pass key-value pairs to your main function.
        Jar:
          $ref: "#/components/schemas/XmlString"
          description: A path to a JAR file run during the step.
        MainClass:
          $ref: "#/components/schemas/XmlString"
          description: The name of the main class in the specified Java file. If not specified, the JAR file should specify a Main-Class in its manifest file.
        Args:
