  /RunJobFlow:
    post:
      operationId: RunJobFlow
      description: RunJobFlow creates and starts running a new cluster (job flow). The cluster runs the steps specified. After the steps complete, the cluster stops and the HDFS partition is lost. To prevent loss of data, configure the last step of the job flow to store results in Amazon S3. If the JobFlowInstancesConfig KeepJobFlowAliveWhenNoSteps parameter is set to TRUE, the cluster transitions to the WAITING state rather than shutting down after the steps have completed. For additional protection, you can set the JobFlowInstancesConfig TerminationProtected parameter to TRUE to lock the cluster and prevent it from being terminated by API call, user intervention, or in the event of a job flow error. A maximum of 256 steps are allowed in each job flow. If your cluster is long-running (such as a Hive data warehouse) or complex, you may require more than 256 steps to process your data. You can bypass the 256-step limitation in various ways, including using the SSH shell to connect to the master node and submitting queries directly to the software running on the master node, such as Hive and Hadoop. For long-running clusters, we recommend that you periodically store your results. The instance fleets configuration is available only in Amazon EMR releases 4.8.0 and later, excluding 5.0.x versions. The RunJobFlow request can contain InstanceFleets parameters or InstanceGroups parameters, but not both.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.RunJobFlow
            default: ElasticMapReduce.RunJobFlow
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The name of the job flow.
                LogUri:
                  $ref: "#/components/schemas/XmlString"
                  description: The location in Amazon S3 to write the log files of the job flow. If a value is not provided, logs are not created.
                LogEncryptionKmsKeyId:
                  $ref: "#/components/schemas/XmlString"
                  description: The KMS key used for encrypting log files. If a value is not provided, the logs remain encrypted by AES-256. This attribute is only available with Amazon EMR releases 5.30.0 and later, excluding Amazon EMR 6.0.0.
                AdditionalInfo:
                  $ref: "#/components/schemas/XmlString"
                  description: A JSON string for selecting additional features.
                AmiVersion:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: Applies only to Amazon EMR AMI versions 3.x and 2.x. For Amazon EMR releases 4.0 and later, ReleaseLabel is used. To specify a custom AMI, use CustomAmiID.
                ReleaseLabel:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The Amazon EMR release label, which determines the version of open-source application packages installed on the cluster. Release labels are in the form emr-x.x.x, where x.x.x is an Amazon EMR release version such as emr-5.14.0. For more information about Amazon EMR release versions and included application versions and features, see https://docs.aws.amazon.com/emr/latest/ReleaseGuide/. The release label applies only to Amazon EMR releases version 4.0 and later. Earlier versions use AmiVersion.
                Instances:
                  $ref: "#/components/schemas/JobFlowInstancesConfig"
                  description: A specification of the number and type of Amazon EC2 instances.
                Steps:
                  $ref: "#/components/schemas/StepConfigList"
                  description: A list of steps to run.
                StepExecutionRoleArn:
                  $ref: "#/components/schemas/ArnType"
                  description: "The Amazon Resource Name (ARN) of the runtime role for steps specified in the RunJobFlow request. The runtime role can be a cross-account IAM role. The runtime role ARN is a combination of account ID, role name, and role type using the following format: arn:partition:iam::account-id:role/role-name. For example, arn:aws:iam::1234567890:role/ReadOnly is a correctly formatted runtime role ARN. This parameter applies only to steps included in the Steps parameter of this RunJobFlow request. It does not apply to steps added later to the cluster."
                BootstrapActions:
                  $ref: "#/components/schemas/BootstrapActionConfigList"
                  description: A list of bootstrap actions to run before Hadoop starts on the cluster nodes.
                SupportedProducts:
                  $ref: "#/components/schemas/SupportedProductsList"
                  description: 'For Amazon EMR releases 3.x and 2.x. For Amazon EMR releases 4.x and later, use Applications. A list of strings that indicates third-party software to use. For more information, see the Amazon EMR Developer Guide. Currently supported values are: "mapr-m3" - launch the job flow using MapR M3 Edition. "mapr-m5" - launch the job flow using MapR M5 Edition.'
                NewSupportedProducts:
                  $ref: "#/components/schemas/NewSupportedProductsList"
                  description: 'For Amazon EMR releases 3.x and 2.x. For Amazon EMR releases 4.x and later, use Applications. A list of strings that indicates third-party software to use with the job flow that accepts a user argument list. Amazon EMR accepts and forwards the argument list to the corresponding installation script as bootstrap action arguments. For more information, see "Launch a Job Flow on the MapR Distribution for Hadoop" in the Amazon EMR Developer Guide. Supported values are: "mapr-m3" - launch the cluster using MapR M3 Edition. "mapr-m5" - launch the cluster using MapR M5 Edition. "mapr" with the user arguments specifying "--edition,m3" or "--edition,m5" - launch the job flow using MapR M3 or M5 Edition respectively. "mapr-m7" - launch the cluster using MapR M7 Edition. "hunk" - launch the cluster with the Hunk Big Data Analytics Platform. "hue"- launch the cluster with Hue installed. "spark" - launch the cluster with Apache Spark installed. "ganglia" - launch the cluster with the Ganglia Monitoring System installed.'
                Applications:
                  $ref: "#/components/schemas/ApplicationList"
                  description: Applies to Amazon EMR releases 4.0 and later. A case-insensitive list of applications for Amazon EMR to install and configure when launching the cluster. For a list of applications available for each Amazon EMR release version, see the Amazon EMRRelease Guide.
                Configurations:
                  $ref: "#/components/schemas/ConfigurationList"
                  description: For Amazon EMR releases 4.0 and later. The list of configurations supplied for the Amazon EMR cluster that you are creating.
                VisibleToAllUsers:
                  $ref: "#/components/schemas/Boolean"
                  description: The VisibleToAllUsers parameter is no longer supported. By default, the value is set to true. Setting it to false now has no effect. Set this value to true so that IAM principals in the Amazon Web Services account associated with the cluster can perform Amazon EMR actions on the cluster that their IAM policies allow. This value defaults to true for clusters created using the Amazon EMR API or the CLI create-cluster command. When set to false, only the IAM principal that created the cluster and the Amazon Web Services account root user can perform Amazon EMR actions for the cluster, regardless of the IAM permissions policies attached to other IAM principals. For more information, see Understanding the Amazon EMR cluster VisibleToAllUsers setting in the Amazon EMR Management Guide.
                JobFlowRole:
                  $ref: "#/components/schemas/XmlString"
                  description: Also called instance profile and Amazon EC2 role. An IAM role for an Amazon EMR cluster. The Amazon EC2 instances of the cluster assume this role. The default role is EMR_EC2_DefaultRole. In order to use the default role, you must have already created it using the CLI or console.
                ServiceRole:
                  $ref: "#/components/schemas/XmlString"
                  description: The IAM role that Amazon EMR assumes in order to access Amazon Web Services resources on your behalf. If you've created a custom service role path, you must specify it for the service role when you launch your cluster.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags to associate with a cluster and propagate to Amazon EC2 instances.
                SecurityConfiguration:
                  $ref: "#/components/schemas/XmlString"
                  description: The name of a security configuration to apply to the cluster.
                AutoScalingRole:
                  $ref: "#/components/schemas/XmlString"
                  description: An IAM role for automatic scaling policies. The default role is EMR_AutoScaling_DefaultRole. The IAM role provides permissions that the automatic scaling feature requires to launch and terminate Amazon EC2 instances in an instance group.
                ScaleDownBehavior:
                  $ref: "#/components/schemas/ScaleDownBehavior"
                  description: Specifies the way that individual Amazon EC2 instances terminate when an automatic scale-in activity occurs or an instance group is resized. TERMINATE_AT_INSTANCE_HOUR indicates that Amazon EMR terminates nodes at the instance-hour boundary, regardless of when the request to terminate the instance was submitted. This option is only available with Amazon EMR 5.1.0 and later and is the default for clusters created using that version. TERMINATE_AT_TASK_COMPLETION indicates that Amazon EMR adds nodes to a deny list and drains tasks from nodes before terminating the Amazon EC2 instances, regardless of the instance-hour boundary. With either behavior, Amazon EMR removes the least active nodes first and blocks instance termination if it could lead to HDFS corruption. TERMINATE_AT_TASK_COMPLETION available only in Amazon EMR releases 4.1.0 and later, and is the default for releases of Amazon EMR earlier than 5.1.0.
                CustomAmiId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: Available only in Amazon EMR releases 5.7.0 and later. The ID of a custom Amazon EBS-backed Linux AMI. If specified, Amazon EMR uses this AMI when it launches cluster Amazon EC2 instances. For more information about custom AMIs in Amazon EMR, see Using a Custom AMI in the Amazon EMR Management Guide. If omitted, the cluster uses the base Linux AMI for the ReleaseLabel specified. For Amazon EMR releases 2.x and 3.x, use AmiVersion instead. For information about creating a custom AMI, see Creating an Amazon EBS-Backed Linux AMI in the Amazon Elastic Compute Cloud User Guide for Linux Instances. For information about finding an AMI ID, see Finding a Linux AMI.
                EbsRootVolumeSize:
                  $ref: "#/components/schemas/Integer"
                  description: The size, in GiB, of the Amazon EBS root device volume of the Linux AMI that is used for each Amazon EC2 instance. Available in Amazon EMR releases 4.x and later.
                RepoUpgradeOnBoot:
                  $ref: "#/components/schemas/RepoUpgradeOnBoot"
                  description: Applies only when CustomAmiID is used. Specifies which updates from the Amazon Linux AMI package repositories to apply automatically when the instance boots using the AMI. If omitted, the default is SECURITY, which indicates that only security updates are applied. If NONE is specified, no updates are applied, and all updates must be applied manually.
                KerberosAttributes:
                  $ref: "#/components/schemas/KerberosAttributes"
                  description: Attributes for Kerberos configuration when Kerberos authentication is enabled using a security configuration. For more information see Use Kerberos Authentication in the Amazon EMR Management Guide.
                StepConcurrencyLevel:
                  $ref: "#/components/schemas/Integer"
                  description: Specifies the number of steps that can be executed concurrently. The default value is 1. The maximum value is 256.
                ManagedScalingPolicy:
                  $ref: "#/components/schemas/ManagedScalingPolicy"
                  description: The specified managed scaling policy for an Amazon EMR cluster.
                PlacementGroupConfigs:
                  $ref: "#/components/schemas/PlacementGroupConfigList"
                  description: The specified placement group configuration for an Amazon EMR cluster.
                AutoTerminationPolicy:
                  $ref: "#/components/schemas/AutoTerminationPolicy"
                OSReleaseLabel:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: Specifies a particular Amazon Linux release for all nodes in a cluster launch RunJobFlow request. If a release is not specified, Amazon EMR uses the latest validated Amazon Linux release for cluster launch.
                EbsRootVolumeIops:
                  $ref: "#/components/schemas/Integer"
                  description: The IOPS, of the Amazon EBS root device volume of the Linux AMI that is used for each Amazon EC2 instance. Available in Amazon EMR releases 6.15.0 and later.
                EbsRootVolumeThroughput:
                  $ref: "#/components/schemas/Integer"
                  description: The throughput, in MiB/s, of the Amazon EBS root device volume of the Linux AMI that is used for each Amazon EC2 instance. Available in Amazon EMR releases 6.15.0 and later.
                ExtendedSupport:
                  $ref: "#/components/schemas/BooleanObject"
                  description: Reserved.
                MonitoringConfiguration:
                  $ref: "#/components/schemas/MonitoringConfiguration"
                  description: Contains CloudWatch log configuration metadata and settings.
              required:
                - Name
                - Instances
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunJobFlowOutput"
  /SetKeepJobFlowAliveWhenNoSteps:
    post:
      operationId: SetKeepJobFlowAliveWhenNoSteps
      description: You can use the SetKeepJobFlowAliveWhenNoSteps to configure a cluster (job flow) to terminate after the step execution, i.e., all your steps are executed. If you want a transient cluster that shuts down after the last of the current executing steps are completed, you can configure SetKeepJobFlowAliveWhenNoSteps to false. If you want a long running cluster, configure SetKeepJobFlowAliveWhenNoSteps to true. For more information, see Managing Cluster Termination in the Amazon EMR Management Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.SetKeepJobFlowAliveWhenNoSteps
            default: ElasticMapReduce.SetKeepJobFlowAliveWhenNoSteps
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobFlowIds:
                  $ref: "#/components/schemas/XmlStringList"
                  description: A list of strings that uniquely identify the clusters to protect. This identifier is returned by RunJobFlow and can also be obtained from DescribeJobFlows.
                KeepJobFlowAliveWhenNoSteps:
                  $ref: "#/components/schemas/Boolean"
                  description: A Boolean that indicates whether to terminate the cluster after all steps are executed.
              required:
                - JobFlowIds
                - KeepJobFlowAliveWhenNoSteps
      responses:
        "200":
          description: Success
  /SetTerminationProtection:
    post:
      operationId: SetTerminationProtection
      description: SetTerminationProtection locks a cluster (job flow) so the Amazon EC2 instances in the cluster cannot be terminated by user intervention, an API call, or in the event of a job-flow error. The cluster still terminates upon successful completion of the job flow. Calling SetTerminationProtection on a cluster is similar to calling the Amazon EC2 DisableAPITermination API on all Amazon EC2 instances in a cluster. SetTerminationProtection is used to prevent accidental termination of a cluster and to ensure that in the event of an error, the instances persist so that you can recover any data stored in their ephemeral instance storage. To terminate a cluster that has been locked by setting SetTerminationProtection to true, you must first unlock the job flow by a subsequent call to SetTerminationProtection in which you set the value to false. For more information, see Managing Cluster Termination in the Amazon EMR Management Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.SetTerminationProtection
            default: ElasticMapReduce.SetTerminationProtection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobFlowIds:
                  $ref: "#/components/schemas/XmlStringList"
                  description: A list of strings that uniquely identify the clusters to protect. This identifier is returned by RunJobFlow and can also be obtained from DescribeJobFlows .
                TerminationProtected:
                  $ref: "#/components/schemas/Boolean"
                  description: A Boolean that indicates whether to protect the cluster and prevent the Amazon EC2 instances in the cluster from shutting down due to API calls, user intervention, or job-flow error.
              required:
                - JobFlowIds
                - TerminationProtected
      responses:
        "200":
          description: Success
  /SetUnhealthyNodeReplacement:
    post:
      operationId: SetUnhealthyNodeReplacement
      description: Specify whether to enable unhealthy node replacement, which lets Amazon EMR gracefully replace core nodes on a cluster if any nodes become unhealthy. For example, a node becomes unhealthy if disk usage is above 90%. If unhealthy node replacement is on and TerminationProtected are off, Amazon EMR immediately terminates the unhealthy core nodes. To use unhealthy node replacement and retain unhealthy core nodes, use to turn on termination protection. In such cases, Amazon EMR adds the unhealthy nodes to a denylist, reducing job interruptions and failures. If unhealthy node replacement is on, Amazon EMR notifies YARN and other applications on the cluster to stop scheduling tasks with these nodes, moves the data, and then terminates the nodes. For more information, see graceful node replacement in the Amazon EMR Management Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.SetUnhealthyNodeReplacement
            default: ElasticMapReduce.SetUnhealthyNodeReplacement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobFlowIds:
                  $ref: "#/components/schemas/XmlStringList"
                  description: The list of strings that uniquely identify the clusters for which to turn on unhealthy node replacement. You can get these identifiers by running the RunJobFlow or the DescribeJobFlows operations.
                UnhealthyNodeReplacement:
                  $ref: "#/components/schemas/BooleanObject"
                  description: Indicates whether to turn on or turn off graceful unhealthy node replacement.
              required:
                - JobFlowIds
                - UnhealthyNodeReplacement
      responses:
        "200":
          description: Success
  /SetVisibleToAllUsers:
    post:
      operationId: SetVisibleToAllUsers
      description: The SetVisibleToAllUsers parameter is no longer supported. Your cluster may be visible to all users in your account. To restrict cluster access using an IAM policy, see Identity and Access Management for Amazon EMR. Sets the Cluster$VisibleToAllUsers value for an Amazon EMR cluster. When true, IAM principals in the Amazon Web Services account can perform Amazon EMR cluster actions that their IAM policies allow. When false, only the IAM principal that created the cluster and the Amazon Web Services account root user can perform Amazon EMR actions on the cluster, regardless of IAM permissions policies attached to other IAM principals. This action works on running clusters. When you create a cluster, use the RunJobFlowInput$VisibleToAllUsers parameter. For more information, see Understanding the Amazon EMR Cluster VisibleToAllUsers Setting in the Amazon EMR Management Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.SetVisibleToAllUsers
            default: ElasticMapReduce.SetVisibleToAllUsers
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobFlowIds:
                  $ref: "#/components/schemas/XmlStringList"
                  description: The unique identifier of the job flow (cluster).
                VisibleToAllUsers:
                  $ref: "#/components/schemas/Boolean"
                  description: A value of true indicates that an IAM principal in the Amazon Web Services account can perform Amazon EMR actions on the cluster that the IAM policies attached to the principal allow. A value of false indicates that only the IAM principal that created the cluster and the Amazon Web Services root user can perform Amazon EMR actions on the cluster.
              required:
                - JobFlowIds
                - VisibleToAllUsers
      responses:
        "200":
          description: Success
  /StartNotebookExecution:
    post:
      operationId: StartNotebookExecution
      description: Starts a notebook execution.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.StartNotebookExecution
            default: ElasticMapReduce.StartNotebookExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EditorId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The unique identifier of the Amazon EMR Notebook to use for notebook execution.
                RelativePath:
                  $ref: "#/components/schemas/XmlString"
                  description: The path and file name of the notebook file for this execution, relative to the path specified for the Amazon EMR Notebook. For example, if you specify a path of s3://MyBucket/MyNotebooks when you create an Amazon EMR Notebook for a notebook with an ID of e-ABCDEFGHIJK1234567890ABCD (the EditorID of this request), and you specify a RelativePath of my_notebook_executions/notebook_execution.ipynb, the location of the file for the notebook execution is s3://MyBucket/MyNotebooks/e-ABCDEFGHIJK1234567890ABCD/my_notebook_executions/notebook_execution.ipynb.
                NotebookExecutionName:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: An optional name for the notebook execution.
                NotebookParams:
                  $ref: "#/components/schemas/XmlString"
                  description: Input parameters in JSON format passed to the Amazon EMR Notebook at runtime for execution.
                ExecutionEngine:
                  $ref: "#/components/schemas/ExecutionEngineConfig"
                  description: Specifies the execution engine (cluster) that runs the notebook execution.
                ServiceRole:
                  $ref: "#/components/schemas/XmlString"
                  description: The name or ARN of the IAM role that is used as the service role for Amazon EMR (the Amazon EMR role) for the notebook execution.
                NotebookInstanceSecurityGroupId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The unique identifier of the Amazon EC2 security group to associate with the Amazon EMR Notebook for this notebook execution.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags associated with a notebook execution. Tags are user-defined key-value pairs that consist of a required key string with a maximum of 128 characters and an optional value string with a maximum of 256 characters.
                NotebookS3Location:
                  $ref: "#/components/schemas/NotebookS3LocationFromInput"
                  description: The Amazon S3 location for the notebook execution input.
                OutputNotebookS3Location:
                  $ref: "#/components/schemas/OutputNotebookS3LocationFromInput"
                  description: The Amazon S3 location for the notebook execution output.
                OutputNotebookFormat:
                  $ref: "#/components/schemas/OutputNotebookFormat"
                  description: The output format for the notebook execution.
                EnvironmentVariables:
                  $ref: "#/components/schemas/EnvironmentVariablesMap"
                  description: The environment variables associated with the notebook execution.
              required:
                - ExecutionEngine
                - ServiceRole
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartNotebookExecutionOutput"
  /StopNotebookExecution:
    post:
      operationId: StopNotebookExecution
      description: Stops a notebook execution.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.StopNotebookExecution
            default: ElasticMapReduce.StopNotebookExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NotebookExecutionId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The unique identifier of the notebook execution.
              required:
                - NotebookExecutionId
      responses:
        "200":
          description: Success
  /TerminateJobFlows:
    post:
      operationId: TerminateJobFlows
      description: TerminateJobFlows shuts a list of clusters (job flows) down. When a job flow is shut down, any step not yet completed is canceled and the Amazon EC2 instances on which the cluster is running are stopped. Any log files not already saved are uploaded to Amazon S3 if a LogUri was specified when the cluster was created. The maximum number of clusters allowed is 10. The call to TerminateJobFlows is asynchronous. Depending on the configuration of the cluster, it may take up to 1-5 minutes for the cluster to completely terminate and release allocated resources, such as Amazon EC2 instances.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.TerminateJobFlows
            default: ElasticMapReduce.TerminateJobFlows
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobFlowIds:
                  $ref: "#/components/schemas/XmlStringList"
                  description: A list of job flows to be shut down.
              required:
                - JobFlowIds
      responses:
        "200":
          description: Success
  /UpdateStudio:
    post:
      operationId: UpdateStudio
      description: Updates an Amazon EMR Studio configuration, including attributes such as name, description, and subnets.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.UpdateStudio
            default: ElasticMapReduce.UpdateStudio
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                StudioId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The ID of the Amazon EMR Studio to update.
                Name:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: A descriptive name for the Amazon EMR Studio.
                Description:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: A detailed description to assign to the Amazon EMR Studio.
                SubnetIds:
                  $ref: "#/components/schemas/SubnetIdList"
                  description: A list of subnet IDs to associate with the Amazon EMR Studio. The list can include new subnet IDs, but must also include all of the subnet IDs previously associated with the Studio. The list order does not matter. A Studio can have a maximum of 5 subnets. The subnets must belong to the same VPC as the Studio.
                DefaultS3Location:
                  $ref: "#/components/schemas/XmlString"
                  description: The Amazon S3 location to back up Workspaces and notebook files for the Amazon EMR Studio.
                EncryptionKeyArn:
                  $ref: "#/components/schemas/XmlString"
                  description: The KMS key identifier (ARN) used to encrypt Amazon EMR Studio workspace and notebook files when backed up to Amazon S3.
              required:
                - StudioId
      responses:
        "200":
          description: Success
  /UpdateStudioSessionMapping:
    post:
      operationId: UpdateStudioSessionMapping
      description: Updates the session policy attached to the user or group for the specified Amazon EMR Studio.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.UpdateStudioSessionMapping
            default: ElasticMapReduce.UpdateStudioSessionMapping
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                StudioId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The ID of the Amazon EMR Studio.
                IdentityId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The globally unique identifier (GUID) of the user or group. For more information, see UserId and GroupId in the IAM Identity Center Identity Store API Reference. Either IdentityName or IdentityId must be specified.
                IdentityName:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The name of the user or group to update. For more information, see UserName and DisplayName in the IAM Identity Center Identity Store API Reference. Either IdentityName or IdentityId must be specified.
                IdentityType:
                  $ref: "#/components/schemas/IdentityType"
                  description: Specifies whether the identity to update is a user or a group.
                SessionPolicyArn:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The Amazon Resource Name (ARN) of the session policy to associate with the specified user or group.
              required:
                - StudioId
                - IdentityType
                - SessionPolicyArn
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    XmlStringMaxLen256:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    InstanceFleetConfig:
      description: The configuration that defines an instance fleet. The instance fleet configuration is available only in Amazon EMR releases 4.8.0 and later, excluding 5.0.x versions.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The friendly name of the instance fleet.
        InstanceFleetType:
          $ref: "#/components/schemas/InstanceFleetType"
          description: The node type that the instance fleet hosts. Valid values are MASTER, CORE, and TASK.
        TargetOnDemandCapacity:
          $ref: "#/components/schemas/WholeNumber"
          description: The target capacity of On-Demand units for the instance fleet, which determines how many On-Demand Instances to provision. When the instance fleet launches, Amazon EMR tries to provision On-Demand Instances as specified by InstanceTypeConfig. Each instance configuration has a specified WeightedCapacity. When an On-Demand Instance is provisioned, the WeightedCapacity units count toward the target capacity. Amazon EMR provisions instances until the target capacity is totally fulfilled, even if this results in an overage. For example, if there are 2 units remaining to fulfill capacity, and Amazon EMR can only provision an instance with a WeightedCapacity of 5 units, the instance is provisioned, and the target capacity is exceeded by 3 units. If not specified or set to 0, only Spot Instances are provisioned for the instance fleet using TargetSpotCapacity. At least one of TargetSpotCapacity and TargetOnDemandCapacity should be greater than 0. For a master instance fleet, only one of TargetSpotCapacity and TargetOnDemandCapacity can be specified, and its value must be 1.
        TargetSpotCapacity:
          $ref: "#/components/schemas/WholeNumber"
          description: The target capacity of Spot units for the instance fleet, which determines how many Spot Instances to provision. When the instance fleet launches, Amazon EMR tries to provision Spot Instances as specified by InstanceTypeConfig. Each instance configuration has a specified WeightedCapacity. When a Spot Instance is provisioned, the WeightedCapacity units count toward the target capacity. Amazon EMR provisions instances until the target capacity is totally fulfilled, even if this results in an overage. For example, if there are 2 units remaining to fulfill capacity, and Amazon EMR can only provision an instance with a WeightedCapacity of 5 units, the instance is provisioned, and the target capacity is exceeded by 3 units. If not specified or set to 0, only On-Demand Instances are provisioned for the instance fleet. At least one of TargetSpotCapacity and TargetOnDemandCapacity should be greater than 0. For a master instance fleet, only one of TargetSpotCapacity and TargetOnDemandCapacity can be specified, and its value must be 1.
        InstanceTypeConfigs:
          $ref: "#/components/schemas/InstanceTypeConfigList"
          description: The instance type configurations that define the Amazon EC2 instances in the instance fleet.
        LaunchSpecifications:
          $ref: "#/components/schemas/InstanceFleetProvisioningSpecifications"
          description: The launch specification for the instance fleet.
        ResizeSpecifications:
          $ref: "#/components/schemas/InstanceFleetResizingSpecifications"
          description: The resize specification for the instance fleet.
        Context:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: Reserved.
      required:
        - InstanceFleetType
    InstanceFleetType:
      type: string
      enum:
        - MASTER
        - CORE
        - TASK
    WholeNumber:
      type: integer
      minimum: 0
    InstanceTypeConfigList:
      type: array
      items:
        $ref: "#/components/schemas/InstanceTypeConfig"
    InstanceTypeConfig:
      description: An instance type configuration for each instance type in an instance fleet, which determines the Amazon EC2 instances Amazon EMR attempts to provision to fulfill On-Demand and Spot target capacities. When you use an allocation strategy, you can include a maximum of 30 instance type configurations for a fleet. For more information about how to use an allocation strategy, see Configure Instance Fleets. Without an allocation strategy, you may specify a maximum of five instance type configurations for a fleet. The instance fleet configuration is available only in Amazon EMR releases 4.8.0 and later, excluding 5.0.x versions.
      type: object
      properties:
        InstanceType:
          $ref: "#/components/schemas/InstanceType"
          description: An Amazon EC2 instance type, such as m3.xlarge.
        WeightedCapacity:
          $ref: "#/components/schemas/WholeNumber"
          description: The number of units that a provisioned instance of this type provides toward fulfilling the target capacities defined in InstanceFleetConfig. This value is 1 for a master instance fleet, and must be 1 or greater for core and task instance fleets. Defaults to 1 if not specified.
        BidPrice:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The bid price for each Amazon EC2 Spot Instance type as defined by InstanceType. Expressed in USD. If neither BidPrice nor BidPriceAsPercentageOfOnDemandPrice is provided, BidPriceAsPercentageOfOnDemandPrice defaults to 100%.
        BidPriceAsPercentageOfOnDemandPrice:
          $ref: "#/components/schemas/NonNegativeDouble"
          description: The bid price, as a percentage of On-Demand price, for each Amazon EC2 Spot Instance as defined by InstanceType. Expressed as a number (for example, 20 specifies 20%). If neither BidPrice nor BidPriceAsPercentageOfOnDemandPrice is provided, BidPriceAsPercentageOfOnDemandPrice defaults to 100%.
        EbsConfiguration:
          $ref: "#/components/schemas/EbsConfiguration"
          description: The configuration of Amazon Elastic Block Store (Amazon EBS) attached to each instance as defined by InstanceType.
        Configurations:
          $ref: "#/components/schemas/ConfigurationList"
          description: A configuration classification that applies when provisioning cluster instances, which can include configurations for applications and software that run on the cluster.
        CustomAmiId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The custom AMI ID to use for the instance type.
        Priority:
          $ref: "#/components/schemas/NonNegativeDouble"
          description: The priority at which Amazon EMR launches the Amazon EC2 instances with this instance type. Priority starts at 0, which is the highest priority. Amazon EMR considers the highest priority first.
      required:
        - InstanceType
    InstanceType:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    NonNegativeDouble:
      type: number
      format: double
      minimum: 0
    EbsConfiguration:
      description: The Amazon EBS configuration of a cluster instance.
      type: object
      properties:
        EbsBlockDeviceConfigs:
          $ref: "#/components/schemas/EbsBlockDeviceConfigList"
          description: An array of Amazon EBS volume specifications attached to a cluster instance.
        EbsOptimized:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether an Amazon EBS volume is EBS-optimized. The default is false. You should explicitly set this value to true to enable the Amazon EBS-optimized setting for an EC2 instance.
    EbsBlockDeviceConfigList:
      type: array
      items:
        $ref: "#/components/schemas/EbsBlockDeviceConfig"
    EbsBlockDeviceConfig:
      description: Configuration of requested EBS block device associated with the instance group with count of volumes that are associated to every instance.
      type: object
      properties:
        VolumeSpecification:
          $ref: "#/components/schemas/VolumeSpecification"
          description: EBS volume specifications such as volume type, IOPS, size (GiB) and throughput (MiB/s) that are requested for the EBS volume attached to an Amazon EC2 instance in the cluster.
        VolumesPerInstance:
          $ref: "#/components/schemas/Integer"
          description: Number of EBS volumes with a specific volume configuration that are associated with every instance in the instance group
      required:
        - VolumeSpecification
    VolumeSpecification:
      description: EBS volume specifications such as volume type, IOPS, size (GiB) and throughput (MiB/s) that are requested for the EBS volume attached to an Amazon EC2 instance in the cluster.
      type: object
      properties:
        VolumeType:
          $ref: "#/components/schemas/String"
          description: The volume type. Volume types supported are gp3, gp2, io1, st1, sc1, and standard.
        Iops:
          $ref: "#/components/schemas/Integer"
          description: The number of I/O operations per second (IOPS) that the volume supports.
        SizeInGB:
          $ref: "#/components/schemas/Integer"
          description: The volume size, in gibibytes (GiB). This can be a number from 1 - 1024. If the volume type is EBS-optimized, the minimum value is 10.
        Throughput:
          $ref: "#/components/schemas/ThroughputVal"
          description: The throughput, in mebibyte per second (MiB/s). This optional parameter can be a number from 125 - 1000 and is valid only for gp3 volumes.
      required:
        - VolumeType
        - SizeInGB
    String:
      type: string
    Integer:
      type: integer
    ThroughputVal:
      type: integer
      minimum: 0
    BooleanObject:
      type: boolean
    ConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/Configuration"
    Configuration:
      description: Amazon EMR releases 4.x or later. An optional configuration specification to be used when provisioning cluster instances, which can include configurations for applications and software bundled with Amazon EMR. A configuration consists of a classification, properties, and optional nested configurations. A classification refers to an application-specific configuration file. Properties are the settings you want to change in that file. For more information, see Configuring Applications.
      type: object
      properties:
        Classification:
          $ref: "#/components/schemas/String"
          description: The classification within a configuration.
        Configurations:
          $ref: "#/components/schemas/ConfigurationList"
          description: A list of additional configurations to apply within a configuration object.
        Properties:
          type: object
          properties: {}
          description: A set of properties specified within a configuration classification.
    InstanceFleetProvisioningSpecifications:
      description: The launch specification for On-Demand and Spot Instances in the fleet. The instance fleet configuration is available only in Amazon EMR releases 4.8.0 and later, excluding 5.0.x versions. On-Demand and Spot instance allocation strategies are available in Amazon EMR releases 5.12.1 and later.
      type: object
      properties:
        SpotSpecification:
          $ref: "#/components/schemas/SpotProvisioningSpecification"
          description: The launch specification for Spot instances in the fleet, which determines the allocation strategy, defined duration, and provisioning timeout behavior.
        OnDemandSpecification:
          $ref: "#/components/schemas/OnDemandProvisioningSpecification"
          description: The launch specification for On-Demand Instances in the instance fleet, which determines the allocation strategy and capacity reservation options. The instance fleet configuration is available only in Amazon EMR releases 4.8.0 and later, excluding 5.0.x versions. On-Demand Instances allocation strategy is available in Amazon EMR releases 5.12.1 and later.
    SpotProvisioningSpecification:
      description: The launch specification for Spot Instances in the instance fleet, which determines the defined duration, provisioning timeout behavior, and allocation strategy. The instance fleet configuration is available only in Amazon EMR releases 4.8.0 and later, excluding 5.0.x versions. Spot Instance allocation strategy is available in Amazon EMR releases 5.12.1 and later. Spot Instances with a defined duration (also known as Spot blocks) are no longer available to new customers from July 1, 2021. For customers who have previously used the feature, we will continue to support Spot Instances with a defined duration until December 31, 2022.
      type: object
      properties:
        TimeoutDurationMinutes:
          $ref: "#/components/schemas/WholeNumber"
          description: The Spot provisioning timeout period in minutes. If Spot Instances are not provisioned within this time period, the TimeOutAction is taken. Minimum value is 5 and maximum value is 1440. The timeout applies only during initial provisioning, when the cluster is first created.
        TimeoutAction:
          $ref: "#/components/schemas/SpotProvisioningTimeoutAction"
          description: The action to take when TargetSpotCapacity has not been fulfilled when the TimeoutDurationMinutes has expired; that is, when all Spot Instances could not be provisioned within the Spot provisioning timeout. Valid values are TERMINATE_CLUSTER and SWITCH_TO_ON_DEMAND. SWITCH_TO_ON_DEMAND specifies that if no Spot Instances are available, On-Demand Instances should be provisioned to fulfill any remaining Spot capacity.
        BlockDurationMinutes:
          $ref: "#/components/schemas/WholeNumber"
          description: The defined duration for Spot Instances (also known as Spot blocks) in minutes. When specified, the Spot Instance does not terminate before the defined duration expires, and defined duration pricing for Spot Instances applies. Valid values are 60, 120, 180, 240, 300, or 360. The duration period starts as soon as a Spot Instance receives its instance ID. At the end of the duration, Amazon EC2 marks the Spot Instance for termination and provides a Spot Instance termination notice, which gives the instance a two-minute warning before it terminates. Spot Instances with a defined duration (also known as Spot blocks) are no longer available to new customers from July 1, 2021. For customers who have previously used the feature, we will continue to support Spot Instances with a defined duration until December 31, 2022.
        AllocationStrategy:
          $ref: "#/components/schemas/SpotProvisioningAllocationStrategy"
          description: "Specifies one of the following strategies to launch Spot Instance fleets: capacity-optimized, price-capacity-optimized, lowest-price, or diversified, and capacity-optimized-prioritized. For more information on the provisioning strategies, see Allocation strategies for Spot Instances in the Amazon EC2 User Guide for Linux Instances. When you launch a Spot Instance fleet with the old console, it automatically launches with the capacity-optimized strategy. You can't change the allocation strategy from the old console."
      required:
        - TimeoutDurationMinutes
        - TimeoutAction
    SpotProvisioningTimeoutAction:
      type: string
      enum:
        - SWITCH_TO_ON_DEMAND
        - TERMINATE_CLUSTER
    SpotProvisioningAllocationStrategy:
      type: string
      enum:
        - capacity-optimized
        - price-capacity-optimized
        - lowest-price
        - diversified
        - capacity-optimized-prioritized
    OnDemandProvisioningSpecification:
      description: The launch specification for On-Demand Instances in the instance fleet, which determines the allocation strategy. The instance fleet configuration is available only in Amazon EMR releases 4.8.0 and later, excluding 5.0.x versions. On-Demand Instances allocation strategy is available in Amazon EMR releases 5.12.1 and later.
      type: object
      properties:
        AllocationStrategy:
          $ref: "#/components/schemas/OnDemandProvisioningAllocationStrategy"
          description: Specifies the strategy to use in launching On-Demand instance fleets. Available options are lowest-price and prioritized. lowest-price specifies to launch the instances with the lowest price first, and prioritized specifies that Amazon EMR should launch the instances with the highest priority first. The default is lowest-price.
        CapacityReservationOptions:
          $ref: "#/components/schemas/OnDemandCapacityReservationOptions"
          description: The launch specification for On-Demand instances in the instance fleet, which determines the allocation strategy.
      required:
        - AllocationStrategy
    OnDemandProvisioningAllocationStrategy:
      type: string
      enum:
        - lowest-price
        - prioritized
    OnDemandCapacityReservationOptions:
      description: Describes the strategy for using unused Capacity Reservations for fulfilling On-Demand capacity.
      type: object
      properties:
        UsageStrategy:
          $ref: "#/components/schemas/OnDemandCapacityReservationUsageStrategy"
          description: Indicates whether to use unused Capacity Reservations for fulfilling On-Demand capacity. If you specify use-capacity-reservations-first, the fleet uses unused Capacity Reservations to fulfill On-Demand capacity up to the target On-Demand capacity. If multiple instance pools have unused Capacity Reservations, the On-Demand allocation strategy (lowest-price) is applied. If the number of unused Capacity Reservations is less than the On-Demand target capacity, the remaining On-Demand target capacity is launched according to the On-Demand allocation strategy (lowest-price). If you do not specify a value, the fleet fulfills the On-Demand capacity according to the chosen On-Demand allocation strategy.
        CapacityReservationPreference:
          $ref: "#/components/schemas/OnDemandCapacityReservationPreference"
          description: "Indicates the instance's Capacity Reservation preferences. Possible preferences include: open - The instance can run in any open Capacity Reservation that has matching attributes (instance type, platform, Availability Zone). none - The instance avoids running in a Capacity Reservation even if one is available. The instance runs as an On-Demand Instance."
        CapacityReservationResourceGroupArn:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The ARN of the Capacity Reservation resource group in which to run the instance.
    OnDemandCapacityReservationUsageStrategy:
      type: string
      enum:
        - use-capacity-reservations-first
    OnDemandCapacityReservationPreference:
      type: string
      enum:
        - open
        - none
    InstanceFleetResizingSpecifications:
      description: The resize specification for On-Demand and Spot Instances in the fleet.
      type: object
      properties:
        SpotResizeSpecification:
          $ref: "#/components/schemas/SpotResizingSpecification"
          description: The resize specification for Spot Instances in the instance fleet, which contains the allocation strategy and the resize timeout period.
        OnDemandResizeSpecification:
          $ref: "#/components/schemas/OnDemandResizingSpecification"
          description: The resize specification for On-Demand Instances in the instance fleet, which contains the allocation strategy, capacity reservation options, and the resize timeout period.
    SpotResizingSpecification:
      description: The resize specification for Spot Instances in the instance fleet, which contains the resize timeout period.
      type: object
      properties:
        TimeoutDurationMinutes:
          $ref: "#/components/schemas/WholeNumber"
          description: Spot resize timeout in minutes. If Spot Instances are not provisioned within this time, the resize workflow will stop provisioning of Spot instances. Minimum value is 5 minutes and maximum value is 10,080 minutes (7 days). The timeout applies to all resize workflows on the Instance Fleet. The resize could be triggered by Amazon EMR Managed Scaling or by the customer (via Amazon EMR Console, Amazon EMR CLI modify-instance-fleet or Amazon EMR SDK ModifyInstanceFleet API) or by Amazon EMR due to Amazon EC2 Spot Reclamation.
        AllocationStrategy:
          $ref: "#/components/schemas/SpotProvisioningAllocationStrategy"
          description: Specifies the allocation strategy to use to launch Spot instances during a resize. If you run Amazon EMR releases 6.9.0 or higher, the default is price-capacity-optimized. If you run Amazon EMR releases 6.8.0 or lower, the default is capacity-optimized.
    OnDemandResizingSpecification:
      description: The resize specification for On-Demand Instances in the instance fleet, which contains the resize timeout period.
      type: object
      properties:
        TimeoutDurationMinutes:
          $ref: "#/components/schemas/WholeNumber"
          description: On-Demand resize timeout in minutes. If On-Demand Instances are not provisioned within this time, the resize workflow stops. The minimum value is 5 minutes, and the maximum value is 10,080 minutes (7 days). The timeout applies to all resize workflows on the Instance Fleet. The resize could be triggered by Amazon EMR Managed Scaling or by the customer (via Amazon EMR Console, Amazon EMR CLI modify-instance-fleet or Amazon EMR SDK ModifyInstanceFleet API) or by Amazon EMR due to Amazon EC2 Spot Reclamation.
        AllocationStrategy:
          $ref: "#/components/schemas/OnDemandProvisioningAllocationStrategy"
          description: Specifies the allocation strategy to use to launch On-Demand instances during a resize. The default is lowest-price.
        CapacityReservationOptions:
          $ref: "#/components/schemas/OnDemandCapacityReservationOptions"
    AddInstanceFleetOutput:
      type: object
      properties:
        ClusterId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The unique identifier of the cluster.
        InstanceFleetId:
          $ref: "#/components/schemas/InstanceFleetId"
          description: The unique identifier of the instance fleet.
        ClusterArn:
          $ref: "#/components/schemas/ArnType"
          description: The Amazon Resource Name of the cluster.
    InstanceFleetId:
      type: string
    ArnType:
      type: string
      minLength: 20
      maxLength: 2048
    InstanceGroupConfigList:
      type: array
      items:
        $ref: "#/components/schemas/InstanceGroupConfig"
    InstanceGroupConfig:
      description: Configuration defining a new instance group.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: Friendly name given to the instance group.
        Market:
          $ref: "#/components/schemas/MarketType"
          description: Market type of the Amazon EC2 instances used to create a cluster node.
        InstanceRole:
          $ref: "#/components/schemas/InstanceRoleType"
          description: The role of the instance group in the cluster.
        BidPrice:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The bid price for each Amazon EC2 Spot Instance type as defined by InstanceType. Expressed in USD. If neither BidPrice nor BidPriceAsPercentageOfOnDemandPrice is provided, BidPriceAsPercentageOfOnDemandPrice defaults to 100%.
        InstanceType:
          $ref: "#/components/schemas/InstanceType"
          description: The Amazon EC2 instance type for all instances in the instance group.
        InstanceCount:
          $ref: "#/components/schemas/Integer"
          description: Target number of instances for the instance group.
        Configurations:
          $ref: "#/components/schemas/ConfigurationList"
          description: Amazon EMR releases 4.x or later. The list of configurations supplied for an Amazon EMR cluster instance group. You can specify a separate configuration for each instance group (master, core, and task).
        EbsConfiguration:
          $ref: "#/components/schemas/EbsConfiguration"
          description: EBS configurations that will be attached to each Amazon EC2 instance in the instance group.
        AutoScalingPolicy:
          $ref: "#/components/schemas/AutoScalingPolicy"
          description: An automatic scaling policy for a core instance group or task instance group in an Amazon EMR cluster. The automatic scaling policy defines how an instance group dynamically adds and terminates Amazon EC2 instances in response to the value of a CloudWatch metric. See PutAutoScalingPolicy.
        CustomAmiId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The custom AMI ID to use for the provisioned instance group.
      required:
        - InstanceRole
        - InstanceType
        - InstanceCount
    MarketType:
      type: string
      enum:
        - ON_DEMAND
        - SPOT
    InstanceRoleType:
      type: string
      enum:
        - MASTER
        - CORE
        - TASK
    AutoScalingPolicy:
      description: An automatic scaling policy for a core instance group or task instance group in an Amazon EMR cluster. An automatic scaling policy defines how an instance group dynamically adds and terminates Amazon EC2 instances in response to the value of a CloudWatch metric. See PutAutoScalingPolicy.
      type: object
      properties:
        Constraints:
          $ref: "#/components/schemas/ScalingConstraints"
          description: The upper and lower Amazon EC2 instance limits for an automatic scaling policy. Automatic scaling activity will not cause an instance group to grow above or below these limits.
        Rules:
          $ref: "#/components/schemas/ScalingRuleList"
          description: The scale-in and scale-out rules that comprise the automatic scaling policy.
      required:
        - Constraints
        - Rules
    ScalingConstraints:
      description: The upper and lower Amazon EC2 instance limits for an automatic scaling policy. Automatic scaling activities triggered by automatic scaling rules will not cause an instance group to grow above or below these limits.
      type: object
      properties:
        MinCapacity:
          $ref: "#/components/schemas/Integer"
          description: The lower boundary of Amazon EC2 instances in an instance group below which scaling activities are not allowed to shrink. Scale-in activities will not terminate instances below this boundary.
        MaxCapacity:
          $ref: "#/components/schemas/Integer"
          description: The upper boundary of Amazon EC2 instances in an instance group beyond which scaling activities are not allowed to grow. Scale-out activities will not add instances beyond this boundary.
      required:
        - MinCapacity
        - MaxCapacity
    ScalingRuleList:
      type: array
      items:
        $ref: "#/components/schemas/ScalingRule"
    ScalingRule:
      description: A scale-in or scale-out rule that defines scaling activity, including the CloudWatch metric alarm that triggers activity, how Amazon EC2 instances are added or removed, and the periodicity of adjustments. The automatic scaling policy for an instance group can comprise one or more automatic scaling rules.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name used to identify an automatic scaling rule. Rule names must be unique within a scaling policy.
        Description:
          $ref: "#/components/schemas/String"
          description: A friendly, more verbose description of the automatic scaling rule.
        Action:
          $ref: "#/components/schemas/ScalingAction"
          description: The conditions that trigger an automatic scaling activity.
        Trigger:
          $ref: "#/components/schemas/ScalingTrigger"
          description: The CloudWatch alarm definition that determines when automatic scaling activity is triggered.
      required:
        - Name
        - Action
        - Trigger
    ScalingAction:
      description: The type of adjustment the automatic scaling activity makes when triggered, and the periodicity of the adjustment.
      type: object
      properties:
        Market:
          $ref: "#/components/schemas/MarketType"
          description: Not available for instance groups. Instance groups use the market type specified for the group.
        SimpleScalingPolicyConfiguration:
          $ref: "#/components/schemas/SimpleScalingPolicyConfiguration"
          description: The type of adjustment the automatic scaling activity makes when triggered, and the periodicity of the adjustment.
      required:
        - SimpleScalingPolicyConfiguration
    SimpleScalingPolicyConfiguration:
      description: An automatic scaling configuration, which describes how the policy adds or removes instances, the cooldown period, and the number of Amazon EC2 instances that will be added each time the CloudWatch metric alarm condition is satisfied.
      type: object
      properties:
        AdjustmentType:
          $ref: "#/components/schemas/AdjustmentType"
          description: The way in which Amazon EC2 instances are added (if ScalingAdjustment is a positive number) or terminated (if ScalingAdjustment is a negative number) each time the scaling activity is triggered. CHANGE_IN_CAPACITY is the default. CHANGE_IN_CAPACITY indicates that the Amazon EC2 instance count increments or decrements by ScalingAdjustment, which should be expressed as an integer. PERCENT_CHANGE_IN_CAPACITY indicates the instance count increments or decrements by the percentage specified by ScalingAdjustment, which should be expressed as an integer. For example, 20 indicates an increase in 20% increments of cluster capacity. EXACT_CAPACITY indicates the scaling activity results in an instance group with the number of Amazon EC2 instances specified by ScalingAdjustment, which should be expressed as a positive integer.
        ScalingAdjustment:
          $ref: "#/components/schemas/Integer"
          description: The amount by which to scale in or scale out, based on the specified AdjustmentType. A positive value adds to the instance group's Amazon EC2 instance count while a negative number removes instances. If AdjustmentType is set to EXACT_CAPACITY, the number should only be a positive integer. If AdjustmentType is set to PERCENT_CHANGE_IN_CAPACITY, the value should express the percentage as an integer. For example, -20 indicates a decrease in 20% increments of cluster capacity.
        CoolDown:
          $ref: "#/components/schemas/Integer"
          description: The amount of time, in seconds, after a scaling activity completes before any further trigger-related scaling activities can start. The default value is 0.
      required:
        - ScalingAdjustment
    AdjustmentType:
      type: string
      enum:
        - CHANGE_IN_CAPACITY
        - PERCENT_CHANGE_IN_CAPACITY
        - EXACT_CAPACITY
    ScalingTrigger:
      description: The conditions that trigger an automatic scaling activity.
      type: object
      properties:
        CloudWatchAlarmDefinition:
          $ref: "#/components/schemas/CloudWatchAlarmDefinition"
          description: The definition of a CloudWatch metric alarm. When the defined alarm conditions are met along with other trigger parameters, scaling activity begins.
      required:
        - CloudWatchAlarmDefinition
    CloudWatchAlarmDefinition:
      description: The definition of a CloudWatch metric alarm, which determines when an automatic scaling activity is triggered. When the defined alarm conditions are satisfied, scaling activity begins.
      type: object
      properties:
        ComparisonOperator:
          $ref: "#/components/schemas/ComparisonOperator"
          description: Determines how the metric specified by MetricName is compared to the value specified by Threshold.
        EvaluationPeriods:
          $ref: "#/components/schemas/Integer"
          description: The number of periods, in five-minute increments, during which the alarm condition must exist before the alarm triggers automatic scaling activity. The default value is 1.
        MetricName:
          $ref: "#/components/schemas/String"
          description: The name of the CloudWatch metric that is watched to determine an alarm condition.
        Namespace:
          $ref: "#/components/schemas/String"
          description: The namespace for the CloudWatch metric. The default is AWS/ElasticMapReduce.
        Period:
          $ref: "#/components/schemas/Integer"
          description: The period, in seconds, over which the statistic is applied. CloudWatch metrics for Amazon EMR are emitted every five minutes (300 seconds), so if you specify a CloudWatch metric, specify 300.
        Statistic:
          $ref: "#/components/schemas/Statistic"
          description: The statistic to apply to the metric associated with the alarm. The default is AVERAGE.
        Threshold:
          $ref: "#/components/schemas/NonNegativeDouble"
          description: The value against which the specified statistic is compared.
        Unit:
          $ref: "#/components/schemas/Unit"
          description: The unit of measure associated with the CloudWatch metric being watched. The value specified for Unit must correspond to the units specified in the CloudWatch metric.
        Dimensions:
          $ref: "#/components/schemas/MetricDimensionList"
          description: A CloudWatch metric dimension.
      required:
        - ComparisonOperator
        - MetricName
        - Period
        - Threshold
    ComparisonOperator:
      type: string
      enum:
        - GREATER_THAN_OR_EQUAL
        - GREATER_THAN
        - LESS_THAN
        - LESS_THAN_OR_EQUAL
    Statistic:
      type: string
      enum:
        - SAMPLE_COUNT
        - AVERAGE
        - SUM
        - MINIMUM
        - MAXIMUM
    Unit:
      type: string
      enum:
        - NONE
        - SECONDS
        - MICRO_SECONDS
        - MILLI_SECONDS
        - BYTES
        - KILO_BYTES
        - MEGA_BYTES
        - GIGA_BYTES
        - TERA_BYTES
        - BITS
        - KILO_BITS
        - MEGA_BITS
        - GIGA_BITS
        - TERA_BITS
        - PERCENT
        - COUNT
        - BYTES_PER_SECOND
        - KILO_BYTES_PER_SECOND
        - MEGA_BYTES_PER_SECOND
        - GIGA_BYTES_PER_SECOND
        - TERA_BYTES_PER_SECOND
        - BITS_PER_SECOND
        - KILO_BITS_PER_SECOND
        - MEGA_BITS_PER_SECOND
        - GIGA_BITS_PER_SECOND
        - TERA_BITS_PER_SECOND
        - COUNT_PER_SECOND
    MetricDimensionList:
      type: array
      items:
        $ref: "#/components/schemas/MetricDimension"
    MetricDimension:
      description: A CloudWatch dimension, which is specified using a Key (known as a Name in CloudWatch), Value pair. By default, Amazon EMR uses one dimension whose Key is JobFlowID and Value is a variable representing the cluster ID, which is ${emr.clusterId}. This enables the rule to bootstrap when the cluster ID becomes available.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/String"
          description: The dimension name.
        Value:
          $ref: "#/components/schemas/String"
          description: The dimension value.
    AddInstanceGroupsOutput:
