    StepMonitoringConfiguration:
      description: Object that holds configuration properties for logging.
      type: object
      properties:
        S3MonitoringConfiguration:
          $ref: "#/components/schemas/S3MonitoringConfiguration"
          description: The Amazon S3 configuration for monitoring log publishing. You can configure your step to send log information to Amazon S3. When it's specified, it takes precedence over the cluster's logging configuration. If you don't specify this configuration entirely, or omit individual fields, EMR falls back to cluster-level logging behavior.
    S3MonitoringConfiguration:
      description: The Amazon S3 configuration for monitoring log publishing. You can configure your step to send log information to Amazon S3. When it's specified, it takes precedence over the cluster's logging configuration. If you don't specify this configuration entirely, or omit individual fields, EMR falls back to cluster-level logging behavior.
