            schema:
              type: object
              properties:
                EditorId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The unique ID of the editor associated with the notebook execution.
                Status:
                  $ref: "#/components/schemas/NotebookExecutionStatus"
                  description: The status filter for listing notebook executions. START_PENDING indicates that the cluster has received the execution request but execution has not begun. STARTING indicates that the execution is starting on the cluster. RUNNING indicates that the execution is being processed by the cluster. FINISHING indicates that execution processing is in the final stages. FINISHED indicates that the execution has completed without error. FAILING indicates that the execution is failing and will not finish successfully. FAILED indicates that the execution failed. STOP_PENDING indicates that the cluster has received a StopNotebookExecution request and the stop is pending. STOPPING indicates that the cluster is in the process of stopping the execution as a result of a StopNotebookExecution request. STOPPED indicates that the execution stopped because of a StopNotebookExecution request.
                From:
                  $ref: "#/components/schemas/Date"
                  description: The beginning of time range filter for listing notebook executions. The default is the timestamp of 30 days ago.
                To:
                  $ref: "#/components/schemas/Date"
                  description: The end of time range filter for listing notebook executions. The default is the current timestamp.
                Marker:
                  $ref: "#/components/schemas/Marker"
                  description: The pagination token, returned by a previous ListNotebookExecutions call, that indicates the start of the list for this ListNotebookExecutions call.
