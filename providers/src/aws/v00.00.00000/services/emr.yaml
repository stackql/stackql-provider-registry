openapi: 3.0.0
info:
  version: "2009-03-31"
  title: Amazon EMR
  description: Amazon EMR
  x-serviceName: elasticmapreduce
  x-serviceAlias: emr
  x-protocol: json
  x-apiVersion: "2009-03-31"
  x-endpointPrefix: elasticmapreduce
  x-targetPrefix: ElasticMapReduce
  x-jsonVersion: "1.1"
servers:
  - url: https://elasticmapreduce.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for emr
paths:
  /AddInstanceFleet:
    post:
      operationId: AddInstanceFleet
      description: Adds an instance fleet to a running cluster. The instance fleet configuration is available only in Amazon EMR releases 4.8.0 and later, excluding 5.0.x.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.AddInstanceFleet
            default: ElasticMapReduce.AddInstanceFleet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The unique identifier of the cluster.
                InstanceFleet:
                  $ref: "#/components/schemas/InstanceFleetConfig"
                  description: Specifies the configuration of the instance fleet.
              required:
                - ClusterId
                - InstanceFleet
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddInstanceFleetOutput"
  /AddInstanceGroups:
    post:
      operationId: AddInstanceGroups
      description: Adds one or more instance groups to a running cluster.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.AddInstanceGroups
            default: ElasticMapReduce.AddInstanceGroups
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                InstanceGroups:
                  $ref: "#/components/schemas/InstanceGroupConfigList"
                  description: Instance groups to add.
                JobFlowId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: Job flow in which to add the instance groups.
              required:
                - InstanceGroups
                - JobFlowId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddInstanceGroupsOutput"
  /AddJobFlowSteps:
    post:
      operationId: AddJobFlowSteps
      description: "AddJobFlowSteps adds new steps to a running cluster. A maximum of 256 steps are allowed in each job flow. If your cluster is long-running (such as a Hive data warehouse) or complex, you may require more than 256 steps to process your data. You can bypass the 256-step limitation in various ways, including using SSH to connect to the master node and submitting queries directly to the software running on the master node, such as Hive and Hadoop. A step specifies the location of a JAR file stored either on the master node of the cluster or in Amazon S3. Each step is performed by the main function of the main class of the JAR file. The main class can be specified either in the manifest of the JAR or by using the MainFunction parameter of the step. Amazon EMR executes each step in the order listed. For a step to be considered complete, the main function must exit with a zero exit code and all Hadoop jobs started while the step was running must have completed and run successfully. You can only add steps to a cluster that is in one of the following states: STARTING, BOOTSTRAPPING, RUNNING, or WAITING. The string values passed into HadoopJarStep object cannot exceed a total of 10240 characters."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.AddJobFlowSteps
            default: ElasticMapReduce.AddJobFlowSteps
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobFlowId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: A string that uniquely identifies the job flow. This identifier is returned by RunJobFlow and can also be obtained from ListClusters.
                Steps:
                  $ref: "#/components/schemas/StepConfigList"
                  description: A list of StepConfig to be executed by the job flow.
                ExecutionRoleArn:
                  $ref: "#/components/schemas/ArnType"
                  description: "The Amazon Resource Name (ARN) of the runtime role for a step on the cluster. The runtime role can be a cross-account IAM role. The runtime role ARN is a combination of account ID, role name, and role type using the following format: arn:partition:service:region:account:resource. For example, arn:aws:IAM::1234567890:role/ReadOnly is a correctly formatted runtime role ARN."
              required:
                - JobFlowId
                - Steps
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddJobFlowStepsOutput"
  /AddTags:
    post:
      operationId: AddTags
      description: Adds tags to an Amazon EMR resource, such as a cluster or an Amazon EMR Studio. Tags make it easier to associate resources in various ways, such as grouping clusters to track your Amazon EMR resource allocation costs. For more information, see Tag Clusters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.AddTags
            default: ElasticMapReduce.AddTags
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The Amazon EMR resource identifier to which tags will be added. For example, a cluster identifier or an Amazon EMR Studio ID.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags to associate with a resource. Tags are user-defined key-value pairs that consist of a required key string with a maximum of 128 characters, and an optional value string with a maximum of 256 characters.
              required:
                - ResourceId
                - Tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddTagsOutput"
  /CancelSteps:
    post:
      operationId: CancelSteps
      description: Cancels a pending step or steps in a running cluster. Available only in Amazon EMR versions 4.8.0 and later, excluding version 5.0.0. A maximum of 256 steps are allowed in each CancelSteps request. CancelSteps is idempotent but asynchronous; it does not guarantee that a step will be canceled, even if the request is successfully submitted. When you use Amazon EMR releases 5.28.0 and later, you can cancel steps that are in a PENDING or RUNNING state. In earlier versions of Amazon EMR, you can only cancel steps that are in a PENDING state.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.CancelSteps
            default: ElasticMapReduce.CancelSteps
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The ClusterID for the specified steps that will be canceled. Use RunJobFlow and ListClusters to get ClusterIDs.
                StepIds:
                  $ref: "#/components/schemas/StepIdsList"
                  description: The list of StepIDs to cancel. Use ListSteps to get steps and their states for the specified cluster.
                StepCancellationOption:
                  $ref: "#/components/schemas/StepCancellationOption"
                  description: The option to choose to cancel RUNNING steps. By default, the value is SEND_INTERRUPT.
              required:
                - ClusterId
                - StepIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelStepsOutput"
  /CreatePersistentAppUI:
    post:
      operationId: CreatePersistentAppUI
      description: Creates a persistent application user interface.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.CreatePersistentAppUI
            default: ElasticMapReduce.CreatePersistentAppUI
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TargetResourceArn:
                  $ref: "#/components/schemas/ArnType"
                  description: The unique Amazon Resource Name (ARN) of the target resource.
                EMRContainersConfig:
                  $ref: "#/components/schemas/EMRContainersConfig"
                  description: The EMR containers configuration.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Tags for the persistent application user interface.
                XReferer:
                  $ref: "#/components/schemas/String"
                  description: The cross reference for the persistent application user interface.
                ProfilerType:
                  $ref: "#/components/schemas/ProfilerType"
                  description: The profiler type for the persistent application user interface.
              required:
                - TargetResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePersistentAppUIOutput"
  /CreateSecurityConfiguration:
    post:
      operationId: CreateSecurityConfiguration
      description: Creates a security configuration, which is stored in the service and can be specified when a cluster is created.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.CreateSecurityConfiguration
            default: ElasticMapReduce.CreateSecurityConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/XmlString"
                  description: The name of the security configuration.
                SecurityConfiguration:
                  $ref: "#/components/schemas/String"
                  description: The security configuration details in JSON format. For JSON parameters and examples, see Use Security Configurations to Set Up Cluster Security in the Amazon EMR Management Guide.
              required:
                - SecurityConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSecurityConfigurationOutput"
  /CreateStudio:
    post:
      operationId: CreateStudio
      description: Creates a new Amazon EMR Studio.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.CreateStudio
            default: ElasticMapReduce.CreateStudio
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: A descriptive name for the Amazon EMR Studio.
                Description:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: A detailed description of the Amazon EMR Studio.
                AuthMode:
                  $ref: "#/components/schemas/AuthMode"
                  description: Specifies whether the Studio authenticates users using IAM or IAM Identity Center.
                VpcId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The ID of the Amazon Virtual Private Cloud (Amazon VPC) to associate with the Studio.
                SubnetIds:
                  $ref: "#/components/schemas/SubnetIdList"
                  description: A list of subnet IDs to associate with the Amazon EMR Studio. A Studio can have a maximum of 5 subnets. The subnets must belong to the VPC specified by VpcId. Studio users can create a Workspace in any of the specified subnets.
                ServiceRole:
                  $ref: "#/components/schemas/XmlString"
                  description: The IAM role that the Amazon EMR Studio assumes. The service role provides a way for Amazon EMR Studio to interoperate with other Amazon Web Services services.
                UserRole:
                  $ref: "#/components/schemas/XmlString"
                  description: The IAM user role that users and groups assume when logged in to an Amazon EMR Studio. Only specify a UserRole when you use IAM Identity Center authentication. The permissions attached to the UserRole can be scoped down for each user or group using session policies.
                WorkspaceSecurityGroupId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The ID of the Amazon EMR Studio Workspace security group. The Workspace security group allows outbound network traffic to resources in the Engine security group, and it must be in the same VPC specified by VpcId.
                EngineSecurityGroupId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The ID of the Amazon EMR Studio Engine security group. The Engine security group allows inbound network traffic from the Workspace security group, and it must be in the same VPC specified by VpcId.
                DefaultS3Location:
                  $ref: "#/components/schemas/XmlString"
                  description: The Amazon S3 location to back up Amazon EMR Studio Workspaces and notebook files.
                IdpAuthUrl:
                  $ref: "#/components/schemas/XmlString"
                  description: The authentication endpoint of your identity provider (IdP). Specify this value when you use IAM authentication and want to let federated users log in to a Studio with the Studio URL and credentials from your IdP. Amazon EMR Studio redirects users to this endpoint to enter credentials.
                IdpRelayStateParameterName:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The name that your identity provider (IdP) uses for its RelayState parameter. For example, RelayState or TargetSource. Specify this value when you use IAM authentication and want to let federated users log in to a Studio using the Studio URL. The RelayState parameter differs by IdP.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags to associate with the Amazon EMR Studio. Tags are user-defined key-value pairs that consist of a required key string with a maximum of 128 characters, and an optional value string with a maximum of 256 characters.
                TrustedIdentityPropagationEnabled:
                  $ref: "#/components/schemas/BooleanObject"
                  description: A Boolean indicating whether to enable Trusted identity propagation for the Studio. The default value is false.
                IdcUserAssignment:
                  $ref: "#/components/schemas/IdcUserAssignment"
                  description: Specifies whether IAM Identity Center user assignment is REQUIRED or OPTIONAL. If the value is set to REQUIRED, users must be explicitly assigned to the Studio application to access the Studio.
                IdcInstanceArn:
                  $ref: "#/components/schemas/ArnType"
                  description: The ARN of the IAM Identity Center instance to create the Studio application.
                EncryptionKeyArn:
                  $ref: "#/components/schemas/XmlString"
                  description: The KMS key identifier (ARN) used to encrypt Amazon EMR Studio workspace and notebook files when backed up to Amazon S3.
              required:
                - AuthMode
                - VpcId
                - SubnetIds
                - ServiceRole
                - WorkspaceSecurityGroupId
                - EngineSecurityGroupId
                - DefaultS3Location
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateStudioOutput"
  /CreateStudioSessionMapping:
    post:
      operationId: CreateStudioSessionMapping
      description: Maps a user or group to the Amazon EMR Studio specified by StudioId, and applies a session policy to refine Studio permissions for that user or group. Use CreateStudioSessionMapping to assign users to a Studio when you use IAM Identity Center authentication. For instructions on how to assign users to a Studio when you use IAM authentication, see Assign a user or group to your EMR Studio.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.CreateStudioSessionMapping
            default: ElasticMapReduce.CreateStudioSessionMapping
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                StudioId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The ID of the Amazon EMR Studio to which the user or group will be mapped.
                IdentityId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The globally unique identifier (GUID) of the user or group from the IAM Identity Center Identity Store. For more information, see UserId and GroupId in the IAM Identity Center Identity Store API Reference. Either IdentityName or IdentityId must be specified, but not both.
                IdentityName:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The name of the user or group. For more information, see UserName and DisplayName in the IAM Identity Center Identity Store API Reference. Either IdentityName or IdentityId must be specified, but not both.
                IdentityType:
                  $ref: "#/components/schemas/IdentityType"
                  description: Specifies whether the identity to map to the Amazon EMR Studio is a user or a group.
                SessionPolicyArn:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The Amazon Resource Name (ARN) for the session policy that will be applied to the user or group. You should specify the ARN for the session policy that you want to apply, not the ARN of your user role. For more information, see Create an Amazon EMR Studio User Role with Session Policies.
              required:
                - StudioId
                - IdentityType
                - SessionPolicyArn
      responses:
        "200":
          description: Success
  /DeleteSecurityConfiguration:
    post:
      operationId: DeleteSecurityConfiguration
      description: Deletes a security configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.DeleteSecurityConfiguration
            default: ElasticMapReduce.DeleteSecurityConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/XmlString"
                  description: The name of the security configuration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSecurityConfigurationOutput"
  /DeleteStudio:
    post:
      operationId: DeleteStudio
      description: Removes an Amazon EMR Studio from the Studio metadata store.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.DeleteStudio
            default: ElasticMapReduce.DeleteStudio
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                StudioId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The ID of the Amazon EMR Studio.
              required:
                - StudioId
      responses:
        "200":
          description: Success
  /DeleteStudioSessionMapping:
    post:
      operationId: DeleteStudioSessionMapping
      description: Removes a user or group from an Amazon EMR Studio.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.DeleteStudioSessionMapping
            default: ElasticMapReduce.DeleteStudioSessionMapping
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                StudioId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The ID of the Amazon EMR Studio.
                IdentityId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The globally unique identifier (GUID) of the user or group to remove from the Amazon EMR Studio. For more information, see UserId and GroupId in the IAM Identity Center Identity Store API Reference. Either IdentityName or IdentityId must be specified.
                IdentityName:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The name of the user name or group to remove from the Amazon EMR Studio. For more information, see UserName and DisplayName in the IAM Identity Center Store API Reference. Either IdentityName or IdentityId must be specified.
                IdentityType:
                  $ref: "#/components/schemas/IdentityType"
                  description: Specifies whether the identity to delete from the Amazon EMR Studio is a user or a group.
              required:
                - StudioId
                - IdentityType
      responses:
        "200":
          description: Success
  /DescribeCluster:
    post:
      operationId: DescribeCluster
      description: Provides cluster-level details including status, hardware and software configuration, VPC settings, and so on.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.DescribeCluster
            default: ElasticMapReduce.DescribeCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterId:
                  $ref: "#/components/schemas/ClusterId"
                  description: The identifier of the cluster to describe.
              required:
                - ClusterId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeClusterOutput"
  /DescribeJobFlows:
    post:
      operationId: DescribeJobFlows
      description: "This API is no longer supported and will eventually be removed. We recommend you use ListClusters, DescribeCluster, ListSteps, ListInstanceGroups and ListBootstrapActions instead. DescribeJobFlows returns a list of job flows that match all of the supplied parameters. The parameters can include a list of job flow IDs, job flow states, and restrictions on job flow creation date and time. Regardless of supplied parameters, only job flows created within the last two months are returned. If no parameters are supplied, then job flows matching either of the following criteria are returned: Job flows created and completed in the last two weeks Job flows created within the last two months that are in one of the following states: RUNNING, WAITING, SHUTTING_DOWN, STARTING Amazon EMR can return a maximum of 512 job flow descriptions."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.DescribeJobFlows
            default: ElasticMapReduce.DescribeJobFlows
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CreatedAfter:
                  $ref: "#/components/schemas/Date"
                  description: Return only job flows created after this date and time.
                CreatedBefore:
                  $ref: "#/components/schemas/Date"
                  description: Return only job flows created before this date and time.
                JobFlowIds:
                  $ref: "#/components/schemas/XmlStringList"
                  description: Return only job flows whose job flow ID is contained in this list.
                JobFlowStates:
                  $ref: "#/components/schemas/JobFlowExecutionStateList"
                  description: Return only job flows whose state is contained in this list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeJobFlowsOutput"
  /DescribeNotebookExecution:
    post:
      operationId: DescribeNotebookExecution
      description: Provides details of a notebook execution.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.DescribeNotebookExecution
            default: ElasticMapReduce.DescribeNotebookExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NotebookExecutionId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The unique identifier of the notebook execution.
              required:
                - NotebookExecutionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeNotebookExecutionOutput"
  /DescribePersistentAppUI:
    post:
      operationId: DescribePersistentAppUI
      description: Describes a persistent application user interface.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.DescribePersistentAppUI
            default: ElasticMapReduce.DescribePersistentAppUI
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PersistentAppUIId:
                  $ref: "#/components/schemas/XmlStringMaxLen256"
                  description: The identifier for the persistent application user interface.
              required:
                - PersistentAppUIId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribePersistentAppUIOutput"
  /DescribeReleaseLabel:
    post:
      operationId: DescribeReleaseLabel
      description: Provides Amazon EMR release label details, such as the releases available the Region where the API request is run, and the available applications for a specific Amazon EMR release label. Can also list Amazon EMR releases that support a specified version of Spark.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.DescribeReleaseLabel
            default: ElasticMapReduce.DescribeReleaseLabel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReleaseLabel:
                  $ref: "#/components/schemas/String"
                  description: The target release label to be described.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: The pagination token. Reserved for future use. Currently set to null.
                MaxResults:
                  $ref: "#/components/schemas/MaxResultsNumber"
                  description: Reserved for future use. Currently set to null.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeReleaseLabelOutput"
  /DescribeSecurityConfiguration:
    post:
      operationId: DescribeSecurityConfiguration
      description: Provides the details of a security configuration by returning the configuration JSON.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ElasticMapReduce.DescribeSecurityConfiguration
            default: ElasticMapReduce.DescribeSecurityConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/XmlString"
                  description: The name of the security configuration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSecurityConfigurationOutput"
  /DescribeStep:
    post:
      operationId: DescribeStep
      description: Provides more detail about the cluster step.
