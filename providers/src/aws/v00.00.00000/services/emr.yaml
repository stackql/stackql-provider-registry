    JobFlowInstancesConfig:
      description: A description of the Amazon EC2 instance on which the cluster (job flow) runs. A valid JobFlowInstancesConfig must contain either InstanceGroups or InstanceFleets. They cannot be used together. You may also have MasterInstanceType, SlaveInstanceType, and InstanceCount (all three must be present), but we don't recommend this configuration.
      type: object
      properties:
        MasterInstanceType:
          $ref: "#/components/schemas/InstanceType"
          description: The Amazon EC2 instance type of the master node.
        SlaveInstanceType:
          $ref: "#/components/schemas/InstanceType"
          description: The Amazon EC2 instance type of the core and task nodes.
        InstanceCount:
          $ref: "#/components/schemas/Integer"
          description: The number of Amazon EC2 instances in the cluster.
        InstanceGroups:
          $ref: "#/components/schemas/InstanceGroupConfigList"
          description: Configuration for the instance groups in a cluster.
        InstanceFleets:
          $ref: "#/components/schemas/InstanceFleetConfigList"
          description: The instance fleet configuration is available only in Amazon EMR releases 4.8.0 and later, excluding 5.0.x versions. Describes the Amazon EC2 instances and instance configurations for clusters that use the instance fleet configuration.
        Ec2KeyName:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The name of the Amazon EC2 key pair that can be used to connect to the master node using SSH as the user called "hadoop."
        Placement:
          $ref: "#/components/schemas/PlacementType"
          description: The Availability Zone in which the cluster runs.
        KeepJobFlowAliveWhenNoSteps:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the cluster should remain available after completing all steps. Defaults to false. For more information about configuring cluster termination, see Control Cluster Termination in the EMR Management Guide.
        TerminationProtected:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether to lock the cluster to prevent the Amazon EC2 instances from being terminated by API call, user intervention, or in the event of a job-flow error.
        UnhealthyNodeReplacement:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether Amazon EMR should gracefully replace core nodes that have degraded within the cluster.
        HadoopVersion:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: Applies only to Amazon EMR release versions earlier than 4.0. The Hadoop version for the cluster. Valid inputs are "0.18" (no longer maintained), "0.20" (no longer maintained), "0.20.205" (no longer maintained), "1.0.3", "2.2.0", or "2.4.0". If you do not set this value, the default of 0.18 is used, unless the AmiVersion parameter is set in the RunJobFlow call, in which case the default version of Hadoop for that AMI version is used.
        Ec2SubnetId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: Applies to clusters that use the uniform instance group configuration. To launch the cluster in Amazon Virtual Private Cloud (Amazon VPC), set this parameter to the identifier of the Amazon VPC subnet where you want the cluster to launch. If you do not specify this value and your account supports EC2-Classic, the cluster launches in EC2-Classic.
        Ec2SubnetIds:
          $ref: "#/components/schemas/XmlStringMaxLen256List"
          description: Applies to clusters that use the instance fleet configuration. When multiple Amazon EC2 subnet IDs are specified, Amazon EMR evaluates them and launches instances in the optimal subnet. The instance fleet configuration is available only in Amazon EMR releases 4.8.0 and later, excluding 5.0.x versions.
        EmrManagedMasterSecurityGroup:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The identifier of the Amazon EC2 security group for the master node. If you specify EmrManagedMasterSecurityGroup, you must also specify EmrManagedSlaveSecurityGroup.
        EmrManagedSlaveSecurityGroup:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The identifier of the Amazon EC2 security group for the core and task nodes. If you specify EmrManagedSlaveSecurityGroup, you must also specify EmrManagedMasterSecurityGroup.
        ServiceAccessSecurityGroup:
          $ref: "#/components/schemas/XmlStringMaxLen256"
