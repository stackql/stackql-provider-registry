        Ec2InstanceAttributes:
          $ref: "#/components/schemas/Ec2InstanceAttributes"
          description: Provides information about the Amazon EC2 instances in a cluster grouped by category. For example, key name, subnet ID, IAM instance profile, and so on.
        InstanceCollectionType:
          $ref: "#/components/schemas/InstanceCollectionType"
          description: The instance fleet configuration is available only in Amazon EMR releases 4.8.0 and later, excluding 5.0.x versions. The instance group configuration of the cluster. A value of INSTANCE_GROUP indicates a uniform instance group configuration. A value of INSTANCE_FLEET indicates an instance fleets configuration.
        LogUri:
          $ref: "#/components/schemas/String"
          description: The path to the Amazon S3 location where logs for this cluster are stored.
        LogEncryptionKmsKeyId:
          $ref: "#/components/schemas/String"
          description: The KMS key used for encrypting log files. This attribute is only available with Amazon EMR 5.30.0 and later, excluding Amazon EMR 6.0.0.
        RequestedAmiVersion:
          $ref: "#/components/schemas/String"
          description: The AMI version requested for this cluster.
        RunningAmiVersion:
          $ref: "#/components/schemas/String"
          description: The AMI version running on this cluster.
        ReleaseLabel:
          $ref: "#/components/schemas/String"
          description: The Amazon EMR release label, which determines the version of open-source application packages installed on the cluster. Release labels are in the form emr-x.x.x, where x.x.x is an Amazon EMR release version such as emr-5.14.0. For more information about Amazon EMR release versions and included application versions and features, see https://docs.aws.amazon.com/emr/latest/ReleaseGuide/. The release label applies only to Amazon EMR releases version 4.0 and later. Earlier versions use AmiVersion.
        AutoTerminate:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the cluster should terminate after completing all steps.
        TerminationProtected:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether Amazon EMR will lock the cluster to prevent the Amazon EC2 instances from being terminated by an API call or user intervention, or in the event of a cluster error.
        UnhealthyNodeReplacement:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether Amazon EMR should gracefully replace Amazon EC2 core instances that have degraded within the cluster.
        VisibleToAllUsers:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the cluster is visible to IAM principals in the Amazon Web Services account associated with the cluster. When true, IAM principals in the Amazon Web Services account can perform Amazon EMR cluster actions on the cluster that their IAM policies allow. When false, only the IAM principal that created the cluster and the Amazon Web Services account root user can perform Amazon EMR actions, regardless of IAM permissions policies attached to other IAM principals. The default value is true if a value is not provided when creating a cluster using the Amazon EMR API RunJobFlow command, the CLI create-cluster command, or the Amazon Web Services Management Console.
        Applications:
          $ref: "#/components/schemas/ApplicationList"
          description: The applications installed on this cluster.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tags associated with a cluster.
        ServiceRole:
          $ref: "#/components/schemas/String"
          description: The IAM role that Amazon EMR assumes in order to access Amazon Web Services resources on your behalf.
        NormalizedInstanceHours:
          $ref: "#/components/schemas/Integer"
          description: An approximation of the cost of the cluster, represented in m1.small/hours. This value is incremented one time for every hour an m1.small instance runs. Larger instances are weighted more, so an Amazon EC2 instance that is roughly four times more expensive would result in the normalized instance hours being incremented by four. This result is only an approximation and does not reflect the actual billing rate.
        MasterPublicDnsName:
          $ref: "#/components/schemas/String"
          description: The DNS name of the master node. If the cluster is on a private subnet, this is the private DNS name. On a public subnet, this is the public DNS name.
        Configurations:
          $ref: "#/components/schemas/ConfigurationList"
          description: Applies only to Amazon EMR releases 4.x and later. The list of configurations that are supplied to the Amazon EMR cluster.
        SecurityConfiguration:
          $ref: "#/components/schemas/XmlString"
          description: The name of the security configuration applied to the cluster.
        AutoScalingRole:
          $ref: "#/components/schemas/XmlString"
          description: An IAM role for automatic scaling policies. The default role is EMR_AutoScaling_DefaultRole. The IAM role provides permissions that the automatic scaling feature requires to launch and terminate Amazon EC2 instances in an instance group.
        ScaleDownBehavior:
          $ref: "#/components/schemas/ScaleDownBehavior"
          description: The way that individual Amazon EC2 instances terminate when an automatic scale-in activity occurs or an instance group is resized. TERMINATE_AT_INSTANCE_HOUR indicates that Amazon EMR terminates nodes at the instance-hour boundary, regardless of when the request to terminate the instance was submitted. This option is only available with Amazon EMR 5.1.0 and later and is the default for clusters created using that version. TERMINATE_AT_TASK_COMPLETION indicates that Amazon EMR adds nodes to a deny list and drains tasks from nodes before terminating the Amazon EC2 instances, regardless of the instance-hour boundary. With either behavior, Amazon EMR removes the least active nodes first and blocks instance termination if it could lead to HDFS corruption. TERMINATE_AT_TASK_COMPLETION is available only in Amazon EMR releases 4.1.0 and later, and is the default for versions of Amazon EMR earlier than 5.1.0.
        CustomAmiId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: Available only in Amazon EMR releases 5.7.0 and later. The ID of a custom Amazon EBS-backed Linux AMI if the cluster uses a custom AMI.
        EbsRootVolumeSize:
          $ref: "#/components/schemas/Integer"
          description: The size, in GiB, of the Amazon EBS root device volume of the Linux AMI that is used for each Amazon EC2 instance. Available in Amazon EMR releases 4.x and later.
        RepoUpgradeOnBoot:
          $ref: "#/components/schemas/RepoUpgradeOnBoot"
          description: Applies only when CustomAmiID is used. Specifies the type of updates that the Amazon Linux AMI package repositories apply when an instance boots using the AMI.
        KerberosAttributes:
          $ref: "#/components/schemas/KerberosAttributes"
          description: Attributes for Kerberos configuration when Kerberos authentication is enabled using a security configuration. For more information see Use Kerberos Authentication in the Amazon EMR Management Guide.
        ClusterArn:
          $ref: "#/components/schemas/ArnType"
          description: The Amazon Resource Name of the cluster.
        OutpostArn:
          $ref: "#/components/schemas/OptionalArnType"
          description: The Amazon Resource Name (ARN) of the Outpost where the cluster is launched.
        StepConcurrencyLevel:
          $ref: "#/components/schemas/Integer"
          description: Specifies the number of steps that can be executed concurrently.
        PlacementGroups:
          $ref: "#/components/schemas/PlacementGroupConfigList"
          description: Placement group configured for an Amazon EMR cluster.
        OSReleaseLabel:
          $ref: "#/components/schemas/String"
          description: The Amazon Linux release specified in a cluster launch RunJobFlow request. If no Amazon Linux release was specified, the default Amazon Linux release is shown in the response.
        EbsRootVolumeIops:
          $ref: "#/components/schemas/Integer"
          description: The IOPS, of the Amazon EBS root device volume of the Linux AMI that is used for each Amazon EC2 instance. Available in Amazon EMR releases 6.15.0 and later.
        EbsRootVolumeThroughput:
          $ref: "#/components/schemas/Integer"
          description: The throughput, in MiB/s, of the Amazon EBS root device volume of the Linux AMI that is used for each Amazon EC2 instance. Available in Amazon EMR releases 6.15.0 and later.
        ExtendedSupport:
          $ref: "#/components/schemas/BooleanObject"
          description: Reserved.
        MonitoringConfiguration:
          $ref: "#/components/schemas/MonitoringConfiguration"
          description: Contains Cloudwatch log configuration metadata and settings.
    ClusterStatus:
      description: The detailed status of the cluster.
      type: object
      properties:
        State:
          $ref: "#/components/schemas/ClusterState"
          description: The current state of the cluster.
        StateChangeReason:
          $ref: "#/components/schemas/ClusterStateChangeReason"
          description: The reason for the cluster status change.
        Timeline:
          $ref: "#/components/schemas/ClusterTimeline"
          description: A timeline that represents the status of a cluster over the lifetime of the cluster.
        ErrorDetails:
          $ref: "#/components/schemas/ErrorDetailList"
          description: A list of tuples that provides information about the errors that caused a cluster to terminate. This structure can contain up to 10 different ErrorDetail tuples.
    ClusterState:
      type: string
      enum:
        - STARTING
        - BOOTSTRAPPING
        - RUNNING
        - WAITING
        - TERMINATING
        - TERMINATED
        - TERMINATED_WITH_ERRORS
    ClusterStateChangeReason:
      description: The reason that the cluster changed to its current state.
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/ClusterStateChangeReasonCode"
          description: The programmatic code for the state change reason.
        Message:
          $ref: "#/components/schemas/String"
          description: The descriptive message for the state change reason.
    ClusterStateChangeReasonCode:
      type: string
      enum:
        - INTERNAL_ERROR
        - VALIDATION_ERROR
        - INSTANCE_FAILURE
        - INSTANCE_FLEET_TIMEOUT
        - BOOTSTRAP_FAILURE
        - USER_REQUEST
        - STEP_FAILURE
        - ALL_STEPS_COMPLETED
    ClusterTimeline:
      description: Represents the timeline of the cluster's lifecycle.
      type: object
      properties:
        CreationDateTime:
          $ref: "#/components/schemas/Date"
          description: The creation date and time of the cluster.
        ReadyDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time when the cluster was ready to run steps.
        EndDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time when the cluster was terminated.
    ErrorDetailList:
      type: array
      items:
        $ref: "#/components/schemas/ErrorDetail"
    ErrorDetail:
      description: A tuple that provides information about an error that caused a cluster to terminate.
      type: object
      properties:
        ErrorCode:
          $ref: "#/components/schemas/String"
          description: The name or code associated with the error.
        ErrorData:
          $ref: "#/components/schemas/ErrorData"
          description: A list of key value pairs that provides contextual information about why an error occured.
        ErrorMessage:
          $ref: "#/components/schemas/String"
          description: A message that describes the error.
    ErrorData:
      type: array
      items:
        $ref: "#/components/schemas/StringMap"
    StringMap:
      type: object
      properties: {}
    Ec2InstanceAttributes:
      description: Provides information about the Amazon EC2 instances in a cluster grouped by category. For example, key name, subnet ID, IAM instance profile, and so on.
      type: object
      properties:
        Ec2KeyName:
          $ref: "#/components/schemas/String"
          description: The name of the Amazon EC2 key pair to use when connecting with SSH into the master node as a user named "hadoop".
        Ec2SubnetId:
          $ref: "#/components/schemas/String"
          description: Set this parameter to the identifier of the Amazon VPC subnet where you want the cluster to launch. If you do not specify this value, and your account supports EC2-Classic, the cluster launches in EC2-Classic.
        RequestedEc2SubnetIds:
          $ref: "#/components/schemas/XmlStringMaxLen256List"
          description: Applies to clusters configured with the instance fleets option. Specifies the unique identifier of one or more Amazon EC2 subnets in which to launch Amazon EC2 cluster instances. Subnets must exist within the same VPC. Amazon EMR chooses the Amazon EC2 subnet with the best fit from among the list of RequestedEc2SubnetIds, and then launches all cluster instances within that Subnet. If this value is not specified, and the account and Region support EC2-Classic networks, the cluster launches instances in the EC2-Classic network and uses RequestedEc2AvailabilityZones instead of this setting. If EC2-Classic is not supported, and no Subnet is specified, Amazon EMR chooses the subnet for you. RequestedEc2SubnetIDs and RequestedEc2AvailabilityZones cannot be specified together.
        Ec2AvailabilityZone:
          $ref: "#/components/schemas/String"
          description: The Availability Zone in which the cluster will run.
        RequestedEc2AvailabilityZones:
          $ref: "#/components/schemas/XmlStringMaxLen256List"
          description: Applies to clusters configured with the instance fleets option. Specifies one or more Availability Zones in which to launch Amazon EC2 cluster instances when the EC2-Classic network configuration is supported. Amazon EMR chooses the Availability Zone with the best fit from among the list of RequestedEc2AvailabilityZones, and then launches all cluster instances within that Availability Zone. If you do not specify this value, Amazon EMR chooses the Availability Zone for you. RequestedEc2SubnetIDs and RequestedEc2AvailabilityZones cannot be specified together.
        IamInstanceProfile:
          $ref: "#/components/schemas/String"
          description: The IAM role that was specified when the cluster was launched. The Amazon EC2 instances of the cluster assume this role.
        EmrManagedMasterSecurityGroup:
          $ref: "#/components/schemas/String"
          description: The identifier of the Amazon EC2 security group for the master node.
        EmrManagedSlaveSecurityGroup:
          $ref: "#/components/schemas/String"
          description: The identifier of the Amazon EC2 security group for the core and task nodes.
        ServiceAccessSecurityGroup:
          $ref: "#/components/schemas/String"
          description: The identifier of the Amazon EC2 security group for the Amazon EMR service to access clusters in VPC private subnets.
        AdditionalMasterSecurityGroups:
          $ref: "#/components/schemas/StringList"
          description: A list of additional Amazon EC2 security group IDs for the master node.
        AdditionalSlaveSecurityGroups:
          $ref: "#/components/schemas/StringList"
          description: A list of additional Amazon EC2 security group IDs for the core and task nodes.
    XmlStringMaxLen256List:
      type: array
      items:
        $ref: "#/components/schemas/XmlStringMaxLen256"
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    InstanceCollectionType:
      type: string
      enum:
        - INSTANCE_FLEET
        - INSTANCE_GROUP
    ApplicationList:
      type: array
      items:
        $ref: "#/components/schemas/Application"
    Application:
      description: With Amazon EMR release version 4.0 and later, the only accepted parameter is the application name. To pass arguments to applications, you use configuration classifications specified using configuration JSON objects. For more information, see Configuring Applications. With earlier Amazon EMR releases, the application is any Amazon or third-party software that you can add to the cluster. This structure contains a list of strings that indicates the software to use with the cluster and accepts a user argument list. Amazon EMR accepts and forwards the argument list to the corresponding installation script as bootstrap action argument.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the application.
        Version:
          $ref: "#/components/schemas/String"
          description: The version of the application.
        Args:
          $ref: "#/components/schemas/StringList"
          description: Arguments for Amazon EMR to pass to the application.
        AdditionalInfo:
          type: object
          properties: {}
          description: This option is for advanced users only. This is meta information about third-party applications that third-party vendors use for testing purposes.
    ScaleDownBehavior:
      type: string
      enum:
        - TERMINATE_AT_INSTANCE_HOUR
        - TERMINATE_AT_TASK_COMPLETION
    RepoUpgradeOnBoot:
      type: string
      enum:
        - SECURITY
        - NONE
    KerberosAttributes:
      description: Attributes for Kerberos configuration when Kerberos authentication is enabled using a security configuration. For more information see Use Kerberos Authentication in the Amazon EMR Management Guide.
      type: object
      properties:
        Realm:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The name of the Kerberos realm to which all nodes in a cluster belong. For example, EC2.INTERNAL.
        KdcAdminPassword:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The password used within the cluster for the kadmin service on the cluster-dedicated KDC, which maintains Kerberos principals, password policies, and keytabs for the cluster.
        CrossRealmTrustPrincipalPassword:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: Required only when establishing a cross-realm trust with a KDC in a different realm. The cross-realm principal password, which must be identical across realms.
        ADDomainJoinUser:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: Required only when establishing a cross-realm trust with an Active Directory domain. A user with sufficient privileges to join resources to the domain.
        ADDomainJoinPassword:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The Active Directory password for ADDomainJoinUser.
      required:
        - Realm
        - KdcAdminPassword
    OptionalArnType:
      type: string
      minLength: 0
      maxLength: 2048
    PlacementGroupConfigList:
      type: array
      items:
        $ref: "#/components/schemas/PlacementGroupConfig"
    PlacementGroupConfig:
      description: Placement group configuration for an Amazon EMR cluster. The configuration specifies the placement strategy that can be applied to instance roles during cluster creation. To use this configuration, consider attaching managed policy AmazonElasticMapReducePlacementGroupPolicy to the Amazon EMR role.
      type: object
      properties:
        InstanceRole:
          $ref: "#/components/schemas/InstanceRoleType"
          description: Role of the instance in the cluster. Starting with Amazon EMR release 5.23.0, the only supported instance role is MASTER.
        PlacementStrategy:
          $ref: "#/components/schemas/PlacementGroupStrategy"
          description: Amazon EC2 Placement Group strategy associated with instance role. Starting with Amazon EMR release 5.23.0, the only supported placement strategy is SPREAD for the MASTER instance role.
      required:
        - InstanceRole
    PlacementGroupStrategy:
      type: string
      enum:
        - SPREAD
        - PARTITION
        - CLUSTER
        - NONE
    MonitoringConfiguration:
      description: Contains CloudWatch log configuration and S3 logging configuration metadata and settings.
      type: object
      properties:
        CloudWatchLogConfiguration:
          $ref: "#/components/schemas/CloudWatchLogConfiguration"
          description: CloudWatch log configuration settings and metadata that specify settings like log files to monitor and where to send them.
        S3LoggingConfiguration:
          $ref: "#/components/schemas/S3LoggingConfiguration"
          description: S3 logging configuration that controls how different types of logs (system logs, application logs, and persistent UI logs) are uploaded to S3. Each log type can be configured with a specific upload policy.
    CloudWatchLogConfiguration:
      description: Holds CloudWatch log configuration settings and metadata that specify settings like log files to monitor and where to send them.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies if CloudWatch logging is enabled.
        LogGroupName:
          $ref: "#/components/schemas/XmlString"
          description: The name of the CloudWatch log group where logs are published.
        LogStreamNamePrefix:
          $ref: "#/components/schemas/XmlString"
          description: The prefix of the log stream name.
        EncryptionKeyArn:
          $ref: "#/components/schemas/XmlString"
          description: The ARN of the encryption key used to encrypt the logs.
        LogTypes:
          type: object
          properties: {}
          description: A map of log types to file names for publishing logs to the standard output or standard error streams for CloudWatch. Valid log types include STEP_LOGS, SPARK_DRIVER, and SPARK_EXECUTOR. Valid file names for each type include STDOUT and STDERR.
      required:
        - Enabled
    S3LoggingConfiguration:
      description: Configuration for S3 logging behavior in EMR clusters. Defines how different types of logs are uploaded to S3 based on the specified upload policies for each log type.
      type: object
      properties:
        LogTypeUploadPolicy:
          type: object
          properties: {}
          description: "A map that specifies the upload policy for each log type. The key is the log type, and the value is the upload policy. Valid log types: system-logs: System-level logs including daemon logs, bootstrap logs, and other infrastructure logs. application-logs: Application-level logs from frameworks like Hadoop, Spark, Hive, etc. persistent-ui-logs: Logs for persistent application UIs like Spark History Server. Valid upload policies: emr-managed: Logs are uploaded to both the EMR-managed S3 bucket and the customer-specified S3 bucket (if LogUri is provided). on-customer-s3only: Logs are uploaded only to the customer-specified S3 bucket. Requires LogUri to be specified in the cluster configuration. disabled: Log upload is disabled for this log type."
    JobFlowExecutionStateList:
      type: array
      items:
        $ref: "#/components/schemas/JobFlowExecutionState"
    JobFlowExecutionState:
      description: The type of instance.
      type: string
      enum:
        - STARTING
        - BOOTSTRAPPING
        - RUNNING
        - WAITING
        - SHUTTING_DOWN
        - TERMINATED
        - COMPLETED
        - FAILED
    DescribeJobFlowsOutput:
      description: The output for the DescribeJobFlows operation.
      type: object
      properties:
        JobFlows:
          $ref: "#/components/schemas/JobFlowDetailList"
          description: A list of job flows matching the parameters supplied.
    JobFlowDetailList:
      type: array
      items:
        $ref: "#/components/schemas/JobFlowDetail"
    JobFlowDetail:
      description: A description of a cluster (job flow).
      type: object
      properties:
        JobFlowId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The job flow identifier.
        Name:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The name of the job flow.
        LogUri:
          $ref: "#/components/schemas/XmlString"
          description: The location in Amazon S3 where log files for the job are stored.
        LogEncryptionKmsKeyId:
          $ref: "#/components/schemas/XmlString"
          description: The KMS key used for encrypting log files. This attribute is only available with Amazon EMR 5.30.0 and later, excluding 6.0.0.
        AmiVersion:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: Applies only to Amazon EMR AMI versions 3.x and 2.x. For Amazon EMR releases 4.0 and later, ReleaseLabel is used. To specify a custom AMI, use CustomAmiID.
        ExecutionStatusDetail:
          $ref: "#/components/schemas/JobFlowExecutionStatusDetail"
          description: Describes the execution status of the job flow.
        Instances:
          $ref: "#/components/schemas/JobFlowInstancesDetail"
          description: Describes the Amazon EC2 instances of the job flow.
        Steps:
          $ref: "#/components/schemas/StepDetailList"
          description: A list of steps run by the job flow.
        BootstrapActions:
          $ref: "#/components/schemas/BootstrapActionDetailList"
          description: A list of the bootstrap actions run by the job flow.
        SupportedProducts:
          $ref: "#/components/schemas/SupportedProductsList"
          description: A list of strings set by third-party software when the job flow is launched. If you are not using third-party software to manage the job flow, this value is empty.
        VisibleToAllUsers:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the cluster is visible to IAM principals in the Amazon Web Services account associated with the cluster. When true, IAM principals in the Amazon Web Services account can perform Amazon EMR cluster actions that their IAM policies allow. When false, only the IAM principal that created the cluster and the Amazon Web Services account root user can perform Amazon EMR actions, regardless of IAM permissions policies attached to other IAM principals. The default value is true if a value is not provided when creating a cluster using the Amazon EMR API RunJobFlow command, the CLI create-cluster command, or the Amazon Web Services Management Console.
        JobFlowRole:
          $ref: "#/components/schemas/XmlString"
          description: The IAM role that was specified when the job flow was launched. The Amazon EC2 instances of the job flow assume this role.
        ServiceRole:
          $ref: "#/components/schemas/XmlString"
          description: The IAM role that is assumed by the Amazon EMR service to access Amazon Web Services resources on your behalf.
        AutoScalingRole:
          $ref: "#/components/schemas/XmlString"
          description: An IAM role for automatic scaling policies. The default role is EMR_AutoScaling_DefaultRole. The IAM role provides a way for the automatic scaling feature to get the required permissions it needs to launch and terminate Amazon EC2 instances in an instance group.
        ScaleDownBehavior:
          $ref: "#/components/schemas/ScaleDownBehavior"
          description: The way that individual Amazon EC2 instances terminate when an automatic scale-in activity occurs or an instance group is resized. TERMINATE_AT_INSTANCE_HOUR indicates that Amazon EMR terminates nodes at the instance-hour boundary, regardless of when the request to terminate the instance was submitted. This option is only available with Amazon EMR 5.1.0 and later and is the default for clusters created using that version. TERMINATE_AT_TASK_COMPLETION indicates that Amazon EMR adds nodes to a deny list and drains tasks from nodes before terminating the Amazon EC2 instances, regardless of the instance-hour boundary. With either behavior, Amazon EMR removes the least active nodes first and blocks instance termination if it could lead to HDFS corruption. TERMINATE_AT_TASK_COMPLETION available only in Amazon EMR releases 4.1.0 and later, and is the default for releases of Amazon EMR earlier than 5.1.0.
      required:
        - JobFlowId
        - Name
        - ExecutionStatusDetail
        - Instances
    JobFlowExecutionStatusDetail:
      description: Describes the status of the cluster (job flow).
      type: object
      properties:
        State:
          $ref: "#/components/schemas/JobFlowExecutionState"
          description: The state of the job flow.
        CreationDateTime:
          $ref: "#/components/schemas/Date"
          description: The creation date and time of the job flow.
        StartDateTime:
          $ref: "#/components/schemas/Date"
          description: The start date and time of the job flow.
        ReadyDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time when the job flow was ready to start running bootstrap actions.
        EndDateTime:
          $ref: "#/components/schemas/Date"
          description: The completion date and time of the job flow.
        LastStateChangeReason:
          $ref: "#/components/schemas/XmlString"
          description: Description of the job flow last changed state.
      required:
        - State
        - CreationDateTime
    JobFlowInstancesDetail:
      description: Specify the type of Amazon EC2 instances that the cluster (job flow) runs on.
      type: object
      properties:
        MasterInstanceType:
          $ref: "#/components/schemas/InstanceType"
          description: The Amazon EC2 master node instance type.
        MasterPublicDnsName:
          $ref: "#/components/schemas/XmlString"
          description: The DNS name of the master node. If the cluster is on a private subnet, this is the private DNS name. On a public subnet, this is the public DNS name.
        MasterInstanceId:
          $ref: "#/components/schemas/XmlString"
          description: The Amazon EC2 instance identifier of the master node.
        SlaveInstanceType:
          $ref: "#/components/schemas/InstanceType"
          description: The Amazon EC2 core and task node instance type.
        InstanceCount:
          $ref: "#/components/schemas/Integer"
          description: The number of Amazon EC2 instances in the cluster. If the value is 1, the same instance serves as both the master and core and task node. If the value is greater than 1, one instance is the master node and all others are core and task nodes.
        InstanceGroups:
          $ref: "#/components/schemas/InstanceGroupDetailList"
          description: Details about the instance groups in a cluster.
        NormalizedInstanceHours:
          $ref: "#/components/schemas/Integer"
          description: An approximation of the cost of the cluster, represented in m1.small/hours. This value is increased one time for every hour that an m1.small instance runs. Larger instances are weighted more heavily, so an Amazon EC2 instance that is roughly four times more expensive would result in the normalized instance hours being increased incrementally four times. This result is only an approximation and does not reflect the actual billing rate.
        Ec2KeyName:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The name of an Amazon EC2 key pair that can be used to connect to the master node using SSH.
        Ec2SubnetId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: For clusters launched within Amazon Virtual Private Cloud, this is the identifier of the subnet where the cluster was launched.
        Placement:
          $ref: "#/components/schemas/PlacementType"
          description: The Amazon EC2 Availability Zone for the cluster.
        KeepJobFlowAliveWhenNoSteps:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the cluster should remain available after completing all steps.
        TerminationProtected:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the Amazon EC2 instances in the cluster are protected from termination by API calls, user intervention, or in the event of a job-flow error.
        UnhealthyNodeReplacement:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether Amazon EMR should gracefully replace core nodes that have degraded within the cluster.
        HadoopVersion:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The Hadoop version for the cluster.
      required:
        - MasterInstanceType
        - SlaveInstanceType
        - InstanceCount
    InstanceGroupDetailList:
      type: array
      items:
        $ref: "#/components/schemas/InstanceGroupDetail"
    InstanceGroupDetail:
      description: Detailed information about an instance group.
      type: object
      properties:
        InstanceGroupId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: Unique identifier for the instance group.
        Name:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: Friendly name for the instance group.
        Market:
          $ref: "#/components/schemas/MarketType"
          description: Market type of the Amazon EC2 instances used to create a cluster node.
        InstanceRole:
          $ref: "#/components/schemas/InstanceRoleType"
          description: Instance group role in the cluster
        BidPrice:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The bid price for each Amazon EC2 Spot Instance type as defined by InstanceType. Expressed in USD. If neither BidPrice nor BidPriceAsPercentageOfOnDemandPrice is provided, BidPriceAsPercentageOfOnDemandPrice defaults to 100%.
        InstanceType:
          $ref: "#/components/schemas/InstanceType"
          description: Amazon EC2 instance type.
        InstanceRequestCount:
          $ref: "#/components/schemas/Integer"
          description: Target number of instances to run in the instance group.
        InstanceRunningCount:
          $ref: "#/components/schemas/Integer"
          description: Actual count of running instances.
        State:
          $ref: "#/components/schemas/InstanceGroupState"
          description: "State of instance group. The following values are no longer supported: STARTING, TERMINATED, and FAILED."
        LastStateChangeReason:
          $ref: "#/components/schemas/XmlString"
          description: Details regarding the state of the instance group.
        CreationDateTime:
          $ref: "#/components/schemas/Date"
          description: The date/time the instance group was created.
        StartDateTime:
          $ref: "#/components/schemas/Date"
          description: The date/time the instance group was started.
        ReadyDateTime:
          $ref: "#/components/schemas/Date"
          description: The date/time the instance group was available to the cluster.
        EndDateTime:
          $ref: "#/components/schemas/Date"
          description: The date/time the instance group was terminated.
        CustomAmiId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The custom AMI ID to use for the provisioned instance group.
      required:
        - Market
        - InstanceRole
        - InstanceType
        - InstanceRequestCount
        - InstanceRunningCount
        - State
        - CreationDateTime
    InstanceGroupState:
      type: string
      enum:
        - PROVISIONING
        - BOOTSTRAPPING
        - RUNNING
        - RECONFIGURING
        - RESIZING
        - SUSPENDED
        - TERMINATING
        - TERMINATED
        - ARRESTED
        - SHUTTING_DOWN
        - ENDED
    PlacementType:
      description: The Amazon EC2 Availability Zone configuration of the cluster (job flow).
      type: object
      properties:
        AvailabilityZone:
          $ref: "#/components/schemas/XmlString"
          description: The Amazon EC2 Availability Zone for the cluster. AvailabilityZone is used for uniform instance groups, while AvailabilityZones (plural) is used for instance fleets.
        AvailabilityZones:
          $ref: "#/components/schemas/XmlStringMaxLen256List"
          description: When multiple Availability Zones are specified, Amazon EMR evaluates them and launches instances in the optimal Availability Zone. AvailabilityZones is used for instance fleets, while AvailabilityZone (singular) is used for uniform instance groups. The instance fleet configuration is available only in Amazon EMR releases 4.8.0 and later, excluding 5.0.x versions.
    StepDetailList:
      type: array
      items:
        $ref: "#/components/schemas/StepDetail"
    StepDetail:
      description: Combines the execution state and configuration of a step.
      type: object
      properties:
        StepConfig:
          $ref: "#/components/schemas/StepConfig"
          description: The step configuration.
        ExecutionStatusDetail:
          $ref: "#/components/schemas/StepExecutionStatusDetail"
          description: The description of the step status.
      required:
        - StepConfig
        - ExecutionStatusDetail
    StepExecutionStatusDetail:
      description: The execution state of a step.
      type: object
      properties:
        State:
          $ref: "#/components/schemas/StepExecutionState"
          description: The state of the step.
        CreationDateTime:
          $ref: "#/components/schemas/Date"
          description: The creation date and time of the step.
        StartDateTime:
          $ref: "#/components/schemas/Date"
          description: The start date and time of the step.
        EndDateTime:
          $ref: "#/components/schemas/Date"
          description: The completion date and time of the step.
        LastStateChangeReason:
          $ref: "#/components/schemas/XmlString"
          description: A description of the step's current state.
      required:
        - State
        - CreationDateTime
    StepExecutionState:
      type: string
      enum:
        - PENDING
        - RUNNING
        - CONTINUE
        - COMPLETED
        - CANCELLED
        - FAILED
        - INTERRUPTED
    BootstrapActionDetailList:
      type: array
      items:
        $ref: "#/components/schemas/BootstrapActionDetail"
    BootstrapActionDetail:
      description: Reports the configuration of a bootstrap action in a cluster (job flow).
      type: object
      properties:
        BootstrapActionConfig:
          $ref: "#/components/schemas/BootstrapActionConfig"
          description: A description of the bootstrap action.
    BootstrapActionConfig:
      description: Configuration of a bootstrap action.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The name of the bootstrap action.
        ScriptBootstrapAction:
          $ref: "#/components/schemas/ScriptBootstrapActionConfig"
          description: The script run by the bootstrap action.
      required:
        - Name
        - ScriptBootstrapAction
    ScriptBootstrapActionConfig:
      description: Configuration of the script to run during a bootstrap action.
      type: object
      properties:
        Path:
          $ref: "#/components/schemas/XmlString"
          description: Location in Amazon S3 of the script to run during a bootstrap action.
        Args:
          $ref: "#/components/schemas/XmlStringList"
          description: A list of command line arguments to pass to the bootstrap action script.
      required:
        - Path
    SupportedProductsList:
      type: array
      items:
        $ref: "#/components/schemas/XmlStringMaxLen256"
    DescribeNotebookExecutionOutput:
      type: object
      properties:
        NotebookExecution:
          $ref: "#/components/schemas/NotebookExecution"
          description: Properties of the notebook execution.
    NotebookExecution:
      description: A notebook execution. An execution is a specific instance that an Amazon EMR Notebook is run using the StartNotebookExecution action.
      type: object
      properties:
        NotebookExecutionId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The unique identifier of a notebook execution.
        EditorId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The unique identifier of the Amazon EMR Notebook that is used for the notebook execution.
        ExecutionEngine:
          $ref: "#/components/schemas/ExecutionEngineConfig"
          description: The execution engine, such as an Amazon EMR cluster, used to run the Amazon EMR notebook and perform the notebook execution.
        NotebookExecutionName:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: A name for the notebook execution.
        NotebookParams:
          $ref: "#/components/schemas/XmlString"
          description: Input parameters in JSON format passed to the Amazon EMR Notebook at runtime for execution.
        Status:
          $ref: "#/components/schemas/NotebookExecutionStatus"
          description: The status of the notebook execution. START_PENDING indicates that the cluster has received the execution request but execution has not begun. STARTING indicates that the execution is starting on the cluster. RUNNING indicates that the execution is being processed by the cluster. FINISHING indicates that execution processing is in the final stages. FINISHED indicates that the execution has completed without error. FAILING indicates that the execution is failing and will not finish successfully. FAILED indicates that the execution failed. STOP_PENDING indicates that the cluster has received a StopNotebookExecution request and the stop is pending. STOPPING indicates that the cluster is in the process of stopping the execution as a result of a StopNotebookExecution request. STOPPED indicates that the execution stopped because of a StopNotebookExecution request.
        StartTime:
          $ref: "#/components/schemas/Date"
          description: The timestamp when notebook execution started.
        EndTime:
          $ref: "#/components/schemas/Date"
          description: The timestamp when notebook execution ended.
        Arn:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The Amazon Resource Name (ARN) of the notebook execution.
        OutputNotebookURI:
          $ref: "#/components/schemas/XmlString"
          description: The location of the notebook execution's output file in Amazon S3.
        LastStateChangeReason:
          $ref: "#/components/schemas/XmlString"
          description: The reason for the latest status change of the notebook execution.
        NotebookInstanceSecurityGroupId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The unique identifier of the Amazon EC2 security group associated with the Amazon EMR Notebook instance. For more information see Specifying Amazon EC2 Security Groups for Amazon EMR Notebooks in the Amazon EMR Management Guide.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tags associated with a notebook execution. Tags are user-defined key-value pairs that consist of a required key string with a maximum of 128 characters and an optional value string with a maximum of 256 characters.
        NotebookS3Location:
          $ref: "#/components/schemas/NotebookS3LocationForOutput"
          description: The Amazon S3 location that stores the notebook execution input.
        OutputNotebookS3Location:
          $ref: "#/components/schemas/OutputNotebookS3LocationForOutput"
          description: The Amazon S3 location for the notebook execution output.
        OutputNotebookFormat:
          $ref: "#/components/schemas/OutputNotebookFormat"
          description: The output format for the notebook execution.
        EnvironmentVariables:
          type: object
          properties: {}
          description: The environment variables associated with the notebook execution.
    ExecutionEngineConfig:
      description: Specifies the execution engine (cluster) to run the notebook and perform the notebook execution, for example, an Amazon EMR cluster.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The unique identifier of the execution engine. For an Amazon EMR cluster, this is the cluster ID.
        Type:
          $ref: "#/components/schemas/ExecutionEngineType"
          description: The type of execution engine. A value of EMR specifies an Amazon EMR cluster.
        MasterInstanceSecurityGroupId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: An optional unique ID of an Amazon EC2 security group to associate with the master instance of the Amazon EMR cluster for this notebook execution. For more information see Specifying Amazon EC2 Security Groups for Amazon EMR Notebooks in the EMR Management Guide.
        ExecutionRoleArn:
          $ref: "#/components/schemas/IAMRoleArn"
          description: The execution role ARN required for the notebook execution.
      required:
        - Id
    ExecutionEngineType:
      type: string
      enum:
        - EMR
    IAMRoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:(aws[a-zA-Z0-9-]*):iam::(\d{12})?:(role((\u002F)|(\u002F[\u0021-\u007F]+\u002F))[\w+=,.@-]+)$
    NotebookExecutionStatus:
      type: string
      enum:
        - START_PENDING
        - STARTING
        - RUNNING
        - FINISHING
        - FINISHED
        - FAILING
        - FAILED
        - STOP_PENDING
        - STOPPING
        - STOPPED
    NotebookS3LocationForOutput:
      description: The Amazon S3 location that stores the notebook execution input.
      type: object
      properties:
        Bucket:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The Amazon S3 bucket that stores the notebook execution input.
        Key:
          $ref: "#/components/schemas/UriString"
          description: The key to the Amazon S3 location that stores the notebook execution input.
    UriString:
      type: string
      minLength: 1
      maxLength: 10280
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDBFF-\\uDC00\\uDFFF\\r\\n\\t]*"
    OutputNotebookS3LocationForOutput:
      description: The Amazon S3 location that stores the notebook execution output.
      type: object
      properties:
        Bucket:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The Amazon S3 bucket that stores the notebook execution output.
        Key:
          $ref: "#/components/schemas/UriString"
          description: The key to the Amazon S3 location that stores the notebook execution output.
    OutputNotebookFormat:
      type: string
      enum:
        - HTML
    DescribePersistentAppUIOutput:
      type: object
      properties:
        PersistentAppUI:
          $ref: "#/components/schemas/PersistentAppUI"
          description: The persistent application user interface.
    PersistentAppUI:
      description: Holds persistent application user interface information. Applications installed on the Amazon EMR cluster publish user interfaces as web sites to monitor cluster activity.
      type: object
      properties:
        PersistentAppUIId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The identifier for the persistent application user interface object.
        PersistentAppUITypeList:
          $ref: "#/components/schemas/PersistentAppUITypeList"
          description: The type list for the persistent application user interface object. Valid values include SHS, YTS, or TEZ.
        PersistentAppUIStatus:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The status for the persistent application user interface object.
        AuthorId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The author ID for the persistent application user interface object.
        CreationTime:
          $ref: "#/components/schemas/Date"
          description: The creation date and time for the persistent application user interface object.
        LastModifiedTime:
          $ref: "#/components/schemas/Date"
          description: The date and time the persistent application user interface object was last changed.
        LastStateChangeReason:
          $ref: "#/components/schemas/XmlString"
          description: The reason the persistent application user interface object was last changed.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: A collection of tags for the persistent application user interface object.
    PersistentAppUITypeList:
      type: array
      items:
        $ref: "#/components/schemas/PersistentAppUIType"
    PersistentAppUIType:
      type: string
      enum:
        - SHS
        - TEZ
        - YTS
    MaxResultsNumber:
      type: integer
      minimum: 1
      maximum: 100
    DescribeReleaseLabelOutput:
      type: object
      properties:
        ReleaseLabel:
          $ref: "#/components/schemas/String"
          description: The target release label described in the response.
        Applications:
          $ref: "#/components/schemas/SimplifiedApplicationList"
          description: The list of applications available for the target release label. Name is the name of the application. Version is the concise version of the application.
        NextToken:
          $ref: "#/components/schemas/String"
          description: The pagination token. Reserved for future use. Currently set to null.
        AvailableOSReleases:
          $ref: "#/components/schemas/OSReleaseList"
          description: The list of available Amazon Linux release versions for an Amazon EMR release. Contains a Label field that is formatted as shown in Amazon Linux 2 Release Notes . For example, 2.0.20220218.1.
    SimplifiedApplicationList:
      type: array
      items:
        $ref: "#/components/schemas/SimplifiedApplication"
    SimplifiedApplication:
      description: The returned release label application names or versions.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The returned release label application name. For example, hadoop.
        Version:
          $ref: "#/components/schemas/String"
          description: The returned release label application version. For example, 3.2.1.
    OSReleaseList:
      type: array
      items:
        $ref: "#/components/schemas/OSRelease"
    OSRelease:
      description: The Amazon Linux release specified for a cluster in the RunJobFlow request.
      type: object
      properties:
        Label:
          $ref: "#/components/schemas/String"
          description: The Amazon Linux release specified for a cluster in the RunJobFlow request. The format is as shown in Amazon Linux 2 Release Notes . For example, 2.0.20220218.1.
    DescribeSecurityConfigurationOutput:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/XmlString"
          description: The name of the security configuration.
        SecurityConfiguration:
          $ref: "#/components/schemas/String"
          description: The security configuration details in JSON format.
        CreationDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time the security configuration was created
    DescribeStepOutput:
      description: This output contains the description of the cluster step.
      type: object
      properties:
        Step:
          $ref: "#/components/schemas/Step"
          description: The step details for the requested step identifier.
    Step:
      description: This represents a step in a cluster.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/StepId"
          description: The identifier of the cluster step.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the cluster step.
        Config:
          $ref: "#/components/schemas/HadoopStepConfig"
          description: The Hadoop job configuration of the cluster step.
        ActionOnFailure:
          $ref: "#/components/schemas/ActionOnFailure"
          description: The action to take when the cluster step fails. Possible values are TERMINATE_CLUSTER, CANCEL_AND_WAIT, and CONTINUE. TERMINATE_JOB_FLOW is provided for backward compatibility. We recommend using TERMINATE_CLUSTER instead. If a cluster's StepConcurrencyLevel is greater than 1, do not use AddJobFlowSteps to submit a step with this parameter set to CANCEL_AND_WAIT or TERMINATE_CLUSTER. The step is not submitted and the action fails with a message that the ActionOnFailure setting is not valid. If you change a cluster's StepConcurrencyLevel to be greater than 1 while a step is running, the ActionOnFailure parameter may not behave as you expect. In this case, for a step that fails with this parameter set to CANCEL_AND_WAIT, pending steps and the running step are not canceled; for a step that fails with this parameter set to TERMINATE_CLUSTER, the cluster does not terminate.
        Status:
          $ref: "#/components/schemas/StepStatus"
          description: The current execution status details of the cluster step.
        ExecutionRoleArn:
          $ref: "#/components/schemas/OptionalArnType"
          description: "The Amazon Resource Name (ARN) of the runtime role for a step on the cluster. The runtime role can be a cross-account IAM role. The runtime role ARN is a combination of account ID, role name, and role type using the following format: arn:partition:service:region:account:resource. For example, arn:aws:IAM::1234567890:role/ReadOnly is a correctly formatted runtime role ARN."
        LogUri:
          $ref: "#/components/schemas/String"
          description: The Amazon S3 destination URI for log publishing.
        EncryptionKeyArn:
          $ref: "#/components/schemas/String"
          description: The KMS key ARN to encrypt the logs published to the given Amazon S3 destination.
    HadoopStepConfig:
      description: A cluster step consisting of a JAR file whose main function will be executed. The main function submits a job for Hadoop to execute and waits for the job to finish or fail.
      type: object
      properties:
        Jar:
          $ref: "#/components/schemas/String"
          description: The path to the JAR file that runs during the step.
        Properties:
          type: object
          properties: {}
          description: The list of Java properties that are set when the step runs. You can use these properties to pass key-value pairs to your main function.
        MainClass:
          $ref: "#/components/schemas/String"
          description: The name of the main class in the specified Java file. If not specified, the JAR file should specify a main class in its manifest file.
        Args:
          $ref: "#/components/schemas/StringList"
          description: The list of command line arguments to pass to the JAR file's main function for execution.
    StepStatus:
      description: The execution status details of the cluster step.
      type: object
      properties:
        State:
          $ref: "#/components/schemas/StepState"
          description: The execution state of the cluster step.
        StateChangeReason:
          $ref: "#/components/schemas/StepStateChangeReason"
          description: The reason for the step execution status change.
        FailureDetails:
          $ref: "#/components/schemas/FailureDetails"
          description: The details for the step failure including reason, message, and log file path where the root cause was identified.
        Timeline:
          $ref: "#/components/schemas/StepTimeline"
          description: The timeline of the cluster step status over time.
    StepState:
      type: string
      enum:
        - PENDING
        - CANCEL_PENDING
        - RUNNING
        - COMPLETED
        - CANCELLED
        - FAILED
        - INTERRUPTED
    StepStateChangeReason:
      description: The details of the step state change reason.
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/StepStateChangeReasonCode"
          description: "The programmable code for the state change reason. Note: Currently, the service provides no code for the state change."
        Message:
          $ref: "#/components/schemas/String"
          description: The descriptive message for the state change reason.
    StepStateChangeReasonCode:
      type: string
      enum:
        - NONE
    FailureDetails:
      description: The details of the step failure. The service attempts to detect the root cause for many common failures.
      type: object
      properties:
        Reason:
          $ref: "#/components/schemas/String"
          description: The reason for the step failure. In the case where the service cannot successfully determine the root cause of the failure, it returns "Unknown Error" as a reason.
        Message:
          $ref: "#/components/schemas/String"
          description: The descriptive message including the error the Amazon EMR service has identified as the cause of step failure. This is text from an error log that describes the root cause of the failure.
        LogFile:
          $ref: "#/components/schemas/String"
          description: The path to the log file where the step failure root cause was originally recorded.
    StepTimeline:
      description: The timeline of the cluster step lifecycle.
      type: object
      properties:
        CreationDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time when the cluster step was created.
        StartDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time when the cluster step execution started.
        EndDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time when the cluster step execution completed or failed.
    DescribeStudioOutput:
      type: object
      properties:
        Studio:
          $ref: "#/components/schemas/Studio"
          description: The Amazon EMR Studio details.
    Studio:
      description: Details for an Amazon EMR Studio including ID, creation time, name, and so on.
      type: object
      properties:
        StudioId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The ID of the Amazon EMR Studio.
        StudioArn:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The Amazon Resource Name (ARN) of the Amazon EMR Studio.
        Name:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The name of the Amazon EMR Studio.
        Description:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The detailed description of the Amazon EMR Studio.
        AuthMode:
          $ref: "#/components/schemas/AuthMode"
          description: Specifies whether the Amazon EMR Studio authenticates users with IAM or IAM Identity Center.
        VpcId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The ID of the VPC associated with the Amazon EMR Studio.
        SubnetIds:
          $ref: "#/components/schemas/SubnetIdList"
          description: The list of IDs of the subnets associated with the Amazon EMR Studio.
        ServiceRole:
          $ref: "#/components/schemas/XmlString"
          description: The name of the IAM role assumed by the Amazon EMR Studio.
        UserRole:
          $ref: "#/components/schemas/XmlString"
          description: The name of the IAM role assumed by users logged in to the Amazon EMR Studio. A Studio only requires a UserRole when you use IAM authentication.
        WorkspaceSecurityGroupId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The ID of the Workspace security group associated with the Amazon EMR Studio. The Workspace security group allows outbound network traffic to resources in the Engine security group and to the internet.
        EngineSecurityGroupId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The ID of the Engine security group associated with the Amazon EMR Studio. The Engine security group allows inbound network traffic from resources in the Workspace security group.
        Url:
          $ref: "#/components/schemas/XmlString"
          description: The unique access URL of the Amazon EMR Studio.
        CreationTime:
          $ref: "#/components/schemas/Date"
          description: The time the Amazon EMR Studio was created.
        DefaultS3Location:
          $ref: "#/components/schemas/XmlString"
          description: The Amazon S3 location to back up Amazon EMR Studio Workspaces and notebook files.
        IdpAuthUrl:
          $ref: "#/components/schemas/XmlString"
          description: Your identity provider's authentication endpoint. Amazon EMR Studio redirects federated users to this endpoint for authentication when logging in to a Studio with the Studio URL.
        IdpRelayStateParameterName:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The name of your identity provider's RelayState parameter.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tags associated with the Amazon EMR Studio.
        IdcInstanceArn:
          $ref: "#/components/schemas/ArnType"
          description: The ARN of the IAM Identity Center instance the Studio application belongs to.
        TrustedIdentityPropagationEnabled:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether the Studio has Trusted identity propagation enabled. The default value is false.
        IdcUserAssignment:
          $ref: "#/components/schemas/IdcUserAssignment"
          description: Indicates whether the Studio has REQUIRED or OPTIONAL IAM Identity Center user assignment. If the value is set to REQUIRED, users must be explicitly assigned to the Studio application to access the Studio.
        EncryptionKeyArn:
          $ref: "#/components/schemas/XmlString"
          description: The KMS key identifier (ARN) used to encrypt Amazon EMR Studio workspace and notebook files when backed up to Amazon S3.
    GetAutoTerminationPolicyOutput:
      type: object
      properties:
        AutoTerminationPolicy:
          $ref: "#/components/schemas/AutoTerminationPolicy"
          description: Specifies the auto-termination policy that is attached to an Amazon EMR cluster.
    AutoTerminationPolicy:
      description: An auto-termination policy for an Amazon EMR cluster. An auto-termination policy defines the amount of idle time in seconds after which a cluster automatically terminates. For alternative cluster termination options, see Control cluster termination.
      type: object
      properties:
        IdleTimeout:
          $ref: "#/components/schemas/Long"
          description: Specifies the amount of idle time in seconds after which the cluster automatically terminates. You can specify a minimum of 60 seconds and a maximum of 604800 seconds (seven days).
    Long:
      type: integer
      format: int64
    GetBlockPublicAccessConfigurationOutput:
      type: object
      properties:
        BlockPublicAccessConfiguration:
          $ref: "#/components/schemas/BlockPublicAccessConfiguration"
          description: A configuration for Amazon EMR block public access. The configuration applies to all clusters created in your account for the current Region. The configuration specifies whether block public access is enabled. If block public access is enabled, security groups associated with the cluster cannot have rules that allow inbound traffic from 0.0.0.0/0 or ::/0 on a port, unless the port is specified as an exception using PermittedPublicSecurityGroupRuleRanges in the BlockPublicAccessConfiguration. By default, Port 22 (SSH) is an exception, and public access is allowed on this port. You can change this by updating the block public access configuration to remove the exception. For accounts that created clusters in a Region before November 25, 2019, block public access is disabled by default in that Region. To use this feature, you must manually enable and configure it. For accounts that did not create an Amazon EMR cluster in a Region before this date, block public access is enabled by default in that Region.
        BlockPublicAccessConfigurationMetadata:
          $ref: "#/components/schemas/BlockPublicAccessConfigurationMetadata"
          description: Properties that describe the Amazon Web Services principal that created the BlockPublicAccessConfiguration using the PutBlockPublicAccessConfiguration action as well as the date and time that the configuration was created. Each time a configuration for block public access is updated, Amazon EMR updates this metadata.
      required:
        - BlockPublicAccessConfiguration
        - BlockPublicAccessConfigurationMetadata
    BlockPublicAccessConfiguration:
      description: A configuration for Amazon EMR block public access. When BlockPublicSecurityGroupRules is set to true, Amazon EMR prevents cluster creation if one of the cluster's security groups has a rule that allows inbound traffic from 0.0.0.0/0 or ::/0 on a port, unless the port is specified as an exception using PermittedPublicSecurityGroupRuleRanges.
      type: object
      properties:
        BlockPublicSecurityGroupRules:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether Amazon EMR block public access is enabled (true) or disabled (false). By default, the value is false for accounts that have created Amazon EMR clusters before July 2019. For accounts created after this, the default is true.
        PermittedPublicSecurityGroupRuleRanges:
          $ref: "#/components/schemas/PortRanges"
          description: Specifies ports and port ranges that are permitted to have security group rules that allow inbound traffic from all public sources. For example, if Port 23 (Telnet) is specified for PermittedPublicSecurityGroupRuleRanges, Amazon EMR allows cluster creation if a security group associated with the cluster has a rule that allows inbound traffic on Port 23 from IPv4 0.0.0.0/0 or IPv6 port ::/0 as the source. By default, Port 22, which is used for SSH access to the cluster Amazon EC2 instances, is in the list of PermittedPublicSecurityGroupRuleRanges.
      required:
        - BlockPublicSecurityGroupRules
    PortRanges:
      type: array
      items:
        $ref: "#/components/schemas/PortRange"
    PortRange:
      description: A list of port ranges that are permitted to allow inbound traffic from all public IP addresses. To specify a single port, use the same value for MinRange and MaxRange.
      type: object
      properties:
        MinRange:
          $ref: "#/components/schemas/Port"
          description: The smallest port number in a specified range of port numbers.
        MaxRange:
          $ref: "#/components/schemas/Port"
          description: The smallest port number in a specified range of port numbers.
      required:
        - MinRange
    Port:
      type: integer
      minimum: -1
      maximum: 65535
    BlockPublicAccessConfigurationMetadata:
      description: Properties that describe the Amazon Web Services principal that created the BlockPublicAccessConfiguration using the PutBlockPublicAccessConfiguration action as well as the date and time that the configuration was created. Each time a configuration for block public access is updated, Amazon EMR updates this metadata.
      type: object
      properties:
        CreationDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time that the configuration was created.
        CreatedByArn:
          $ref: "#/components/schemas/ArnType"
          description: The Amazon Resource Name that created or last modified the configuration.
      required:
        - CreationDateTime
        - CreatedByArn
    GetClusterSessionCredentialsOutput:
      type: object
      properties:
        Credentials:
          $ref: "#/components/schemas/Credentials"
          description: The credentials that you can use to connect to cluster endpoints that support username and password authentication.
        ExpiresAt:
          $ref: "#/components/schemas/Date"
          description: The time when the credentials that are returned by the GetClusterSessionCredentials API expire.
    Credentials:
      description: The credentials that you can use to connect to cluster endpoints. Credentials consist of a username and a password.
      type: object
      properties:
        UsernamePassword:
          $ref: "#/components/schemas/UsernamePassword"
          description: The username and password that you use to connect to cluster endpoints.
    UsernamePassword:
      description: The username and password that you use to connect to cluster endpoints.
      type: object
      properties:
        Username:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The username associated with the temporary credentials that you use to connect to cluster endpoints.
        Password:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The password associated with the temporary credentials that you use to connect to cluster endpoints.
    GetManagedScalingPolicyOutput:
      type: object
      properties:
        ManagedScalingPolicy:
          $ref: "#/components/schemas/ManagedScalingPolicy"
          description: Specifies the managed scaling policy that is attached to an Amazon EMR cluster.
    ManagedScalingPolicy:
      description: Managed scaling policy for an Amazon EMR cluster. The policy specifies the limits for resources that can be added or terminated from a cluster. The policy only applies to the core and task nodes. The master node cannot be scaled after initial configuration.
      type: object
      properties:
        ComputeLimits:
          $ref: "#/components/schemas/ComputeLimits"
          description: The Amazon EC2 unit limits for a managed scaling policy. The managed scaling activity of a cluster is not allowed to go above or below these limits. The limit only applies to the core and task nodes. The master node cannot be scaled after initial configuration.
        UtilizationPerformanceIndex:
          $ref: "#/components/schemas/UtilizationPerformanceIndexInteger"
          description: An integer value that represents an advanced scaling strategy. Setting a higher value optimizes for performance. Setting a lower value optimizes for resource conservation. Setting the value to 50 balances performance and resource conservation. Possible values are 1, 25, 50, 75, and 100.
        ScalingStrategy:
          $ref: "#/components/schemas/ScalingStrategy"
          description: Determines whether a custom scaling utilization performance index can be set. Possible values include ADVANCED or DEFAULT.
    ComputeLimits:
      description: The Amazon EC2 unit limits for a managed scaling policy. The managed scaling activity of a cluster can not be above or below these limits. The limit only applies to the core and task nodes. The master node cannot be scaled after initial configuration.
      type: object
      properties:
        UnitType:
          $ref: "#/components/schemas/ComputeLimitsUnitType"
          description: The unit type used for specifying a managed scaling policy.
        MinimumCapacityUnits:
          $ref: "#/components/schemas/Integer"
          description: The lower boundary of Amazon EC2 units. It is measured through vCPU cores or instances for instance groups and measured through units for instance fleets. Managed scaling activities are not allowed beyond this boundary. The limit only applies to the core and task nodes. The master node cannot be scaled after initial configuration.
        MaximumCapacityUnits:
          $ref: "#/components/schemas/Integer"
          description: The upper boundary of Amazon EC2 units. It is measured through vCPU cores or instances for instance groups and measured through units for instance fleets. Managed scaling activities are not allowed beyond this boundary. The limit only applies to the core and task nodes. The master node cannot be scaled after initial configuration.
        MaximumOnDemandCapacityUnits:
          $ref: "#/components/schemas/Integer"
          description: The upper boundary of On-Demand Amazon EC2 units. It is measured through vCPU cores or instances for instance groups and measured through units for instance fleets. The On-Demand units are not allowed to scale beyond this boundary. The parameter is used to split capacity allocation between On-Demand and Spot Instances.
        MaximumCoreCapacityUnits:
          $ref: "#/components/schemas/Integer"
          description: The upper boundary of Amazon EC2 units for core node type in a cluster. It is measured through vCPU cores or instances for instance groups and measured through units for instance fleets. The core units are not allowed to scale beyond this boundary. The parameter is used to split capacity allocation between core and task nodes.
      required:
        - UnitType
        - MinimumCapacityUnits
        - MaximumCapacityUnits
    ComputeLimitsUnitType:
      type: string
      enum:
        - InstanceFleetUnits
        - Instances
        - VCPU
    UtilizationPerformanceIndexInteger:
      type: integer
      minimum: 1
      maximum: 100
    ScalingStrategy:
      type: string
      enum:
        - DEFAULT
        - ADVANCED
    OnClusterAppUIType:
      type: string
      enum:
        - SparkHistoryServer
        - YarnTimelineService
        - TezUI
        - ApplicationMaster
        - JobHistoryServer
        - ResourceManager
    GetOnClusterAppUIPresignedURLOutput:
      type: object
      properties:
        PresignedURLReady:
          $ref: "#/components/schemas/Boolean"
          description: Used to determine if the presigned URL is ready.
        PresignedURL:
          $ref: "#/components/schemas/XmlString"
          description: The cluster's generated presigned URL.
    GetPersistentAppUIPresignedURLOutput:
      type: object
      properties:
        PresignedURLReady:
          $ref: "#/components/schemas/Boolean"
          description: Used to determine if the presigned URL is ready.
        PresignedURL:
          $ref: "#/components/schemas/XmlString"
          description: The returned presigned URL.
    GetStudioSessionMappingOutput:
      type: object
      properties:
        SessionMapping:
          $ref: "#/components/schemas/SessionMappingDetail"
          description: The session mapping details for the specified Amazon EMR Studio and identity, including session policy ARN and creation time.
    SessionMappingDetail:
      description: Details for an Amazon EMR Studio session mapping including creation time, user or group ID, Studio ID, and so on.
      type: object
      properties:
        StudioId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The ID of the Amazon EMR Studio.
        IdentityId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The globally unique identifier (GUID) of the user or group.
        IdentityName:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The name of the user or group. For more information, see UserName and DisplayName in the IAM Identity Center Identity Store API Reference.
        IdentityType:
          $ref: "#/components/schemas/IdentityType"
          description: Specifies whether the identity mapped to the Amazon EMR Studio is a user or a group.
        SessionPolicyArn:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The Amazon Resource Name (ARN) of the session policy associated with the user or group.
        CreationTime:
          $ref: "#/components/schemas/Date"
          description: The time the session mapping was created.
        LastModifiedTime:
          $ref: "#/components/schemas/Date"
          description: The time the session mapping was last modified.
    Marker:
      type: string
    ListBootstrapActionsOutput:
      description: This output contains the bootstrap actions detail.
      type: object
      properties:
        BootstrapActions:
          $ref: "#/components/schemas/CommandList"
          description: The bootstrap actions associated with the cluster.
        Marker:
          $ref: "#/components/schemas/Marker"
          description: The pagination token that indicates the next set of results to retrieve.
    CommandList:
      type: array
      items:
        $ref: "#/components/schemas/Command"
    Command:
      description: An entity describing an executable that runs on a cluster.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the command.
        ScriptPath:
          $ref: "#/components/schemas/String"
          description: The Amazon S3 location of the command script.
        Args:
          $ref: "#/components/schemas/StringList"
          description: Arguments for Amazon EMR to pass to the command for execution.
    ClusterStateList:
      type: array
      items:
        $ref: "#/components/schemas/ClusterState"
    ListClustersOutput:
      description: This contains a ClusterSummaryList with the cluster details; for example, the cluster IDs, names, and status.
      type: object
      properties:
        Clusters:
          $ref: "#/components/schemas/ClusterSummaryList"
          description: The list of clusters for the account based on the given filters.
        Marker:
          $ref: "#/components/schemas/Marker"
          description: The pagination token that indicates the next set of results to retrieve.
    ClusterSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/ClusterSummary"
    ClusterSummary:
      description: The summary description of the cluster.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ClusterId"
          description: The unique identifier for the cluster.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the cluster.
        Status:
          $ref: "#/components/schemas/ClusterStatus"
          description: The details about the current status of the cluster.
        NormalizedInstanceHours:
          $ref: "#/components/schemas/Integer"
          description: An approximation of the cost of the cluster, represented in m1.small/hours. This value is incremented one time for every hour an m1.small instance runs. Larger instances are weighted more, so an Amazon EC2 instance that is roughly four times more expensive would result in the normalized instance hours being incremented by four. This result is only an approximation and does not reflect the actual billing rate.
        ClusterArn:
          $ref: "#/components/schemas/ArnType"
          description: The Amazon Resource Name of the cluster.
        OutpostArn:
          $ref: "#/components/schemas/OptionalArnType"
          description: The Amazon Resource Name (ARN) of the Outpost where the cluster is launched.
    ListInstanceFleetsOutput:
      type: object
      properties:
        InstanceFleets:
          $ref: "#/components/schemas/InstanceFleetList"
          description: The list of instance fleets for the cluster and given filters.
        Marker:
          $ref: "#/components/schemas/Marker"
          description: The pagination token that indicates the next set of results to retrieve.
    InstanceFleetList:
      type: array
      items:
        $ref: "#/components/schemas/InstanceFleet"
    InstanceFleet:
      description: Describes an instance fleet, which is a group of Amazon EC2 instances that host a particular node type (master, core, or task) in an Amazon EMR cluster. Instance fleets can consist of a mix of instance types and On-Demand and Spot Instances, which are provisioned to meet a defined target capacity. The instance fleet configuration is available only in Amazon EMR releases 4.8.0 and later, excluding 5.0.x versions.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/InstanceFleetId"
          description: The unique identifier of the instance fleet.
        Name:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: A friendly name for the instance fleet.
        Status:
          $ref: "#/components/schemas/InstanceFleetStatus"
          description: The current status of the instance fleet.
        InstanceFleetType:
          $ref: "#/components/schemas/InstanceFleetType"
          description: The node type that the instance fleet hosts. Valid values are MASTER, CORE, or TASK.
        TargetOnDemandCapacity:
          $ref: "#/components/schemas/WholeNumber"
          description: The target capacity of On-Demand units for the instance fleet, which determines how many On-Demand Instances to provision. When the instance fleet launches, Amazon EMR tries to provision On-Demand Instances as specified by InstanceTypeConfig. Each instance configuration has a specified WeightedCapacity. When an On-Demand Instance is provisioned, the WeightedCapacity units count toward the target capacity. Amazon EMR provisions instances until the target capacity is totally fulfilled, even if this results in an overage. For example, if there are 2 units remaining to fulfill capacity, and Amazon EMR can only provision an instance with a WeightedCapacity of 5 units, the instance is provisioned, and the target capacity is exceeded by 3 units. You can use InstanceFleet$ProvisionedOnDemandCapacity to determine the Spot capacity units that have been provisioned for the instance fleet. If not specified or set to 0, only Spot Instances are provisioned for the instance fleet using TargetSpotCapacity. At least one of TargetSpotCapacity and TargetOnDemandCapacity should be greater than 0. For a master instance fleet, only one of TargetSpotCapacity and TargetOnDemandCapacity can be specified, and its value must be 1.
        TargetSpotCapacity:
          $ref: "#/components/schemas/WholeNumber"
          description: The target capacity of Spot units for the instance fleet, which determines how many Spot Instances to provision. When the instance fleet launches, Amazon EMR tries to provision Spot Instances as specified by InstanceTypeConfig. Each instance configuration has a specified WeightedCapacity. When a Spot instance is provisioned, the WeightedCapacity units count toward the target capacity. Amazon EMR provisions instances until the target capacity is totally fulfilled, even if this results in an overage. For example, if there are 2 units remaining to fulfill capacity, and Amazon EMR can only provision an instance with a WeightedCapacity of 5 units, the instance is provisioned, and the target capacity is exceeded by 3 units. You can use InstanceFleet$ProvisionedSpotCapacity to determine the Spot capacity units that have been provisioned for the instance fleet. If not specified or set to 0, only On-Demand Instances are provisioned for the instance fleet. At least one of TargetSpotCapacity and TargetOnDemandCapacity should be greater than 0. For a master instance fleet, only one of TargetSpotCapacity and TargetOnDemandCapacity can be specified, and its value must be 1.
        ProvisionedOnDemandCapacity:
          $ref: "#/components/schemas/WholeNumber"
          description: The number of On-Demand units that have been provisioned for the instance fleet to fulfill TargetOnDemandCapacity. This provisioned capacity might be less than or greater than TargetOnDemandCapacity.
        ProvisionedSpotCapacity:
          $ref: "#/components/schemas/WholeNumber"
          description: The number of Spot units that have been provisioned for this instance fleet to fulfill TargetSpotCapacity. This provisioned capacity might be less than or greater than TargetSpotCapacity.
        InstanceTypeSpecifications:
          $ref: "#/components/schemas/InstanceTypeSpecificationList"
          description: An array of specifications for the instance types that comprise an instance fleet.
        LaunchSpecifications:
          $ref: "#/components/schemas/InstanceFleetProvisioningSpecifications"
          description: Describes the launch specification for an instance fleet.
        ResizeSpecifications:
          $ref: "#/components/schemas/InstanceFleetResizingSpecifications"
          description: The resize specification for the instance fleet.
        Context:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: Reserved.
    InstanceFleetStatus:
      description: The status of the instance fleet. The instance fleet configuration is available only in Amazon EMR releases 4.8.0 and later, excluding 5.0.x versions.
      type: object
      properties:
        State:
          $ref: "#/components/schemas/InstanceFleetState"
          description: A code representing the instance fleet status. PROVISIONING—The instance fleet is provisioning Amazon EC2 resources and is not yet ready to run jobs. BOOTSTRAPPING—Amazon EC2 instances and other resources have been provisioned and the bootstrap actions specified for the instances are underway. RUNNING—Amazon EC2 instances and other resources are running. They are either executing jobs or waiting to execute jobs. RESIZING—A resize operation is underway. Amazon EC2 instances are either being added or removed. SUSPENDED—A resize operation could not complete. Existing Amazon EC2 instances are running, but instances can't be added or removed. TERMINATING—The instance fleet is terminating Amazon EC2 instances. TERMINATED—The instance fleet is no longer active, and all Amazon EC2 instances have been terminated.
        StateChangeReason:
          $ref: "#/components/schemas/InstanceFleetStateChangeReason"
          description: Provides status change reason details for the instance fleet.
        Timeline:
          $ref: "#/components/schemas/InstanceFleetTimeline"
          description: Provides historical timestamps for the instance fleet, including the time of creation, the time it became ready to run jobs, and the time of termination.
    InstanceFleetState:
      type: string
      enum:
        - PROVISIONING
        - BOOTSTRAPPING
        - RUNNING
        - RESIZING
        - RECONFIGURING
        - SUSPENDED
        - TERMINATING
        - TERMINATED
    InstanceFleetStateChangeReason:
      description: Provides status change reason details for the instance fleet. The instance fleet configuration is available only in Amazon EMR releases 4.8.0 and later, excluding 5.0.x versions.
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/InstanceFleetStateChangeReasonCode"
          description: A code corresponding to the reason the state change occurred.
        Message:
          $ref: "#/components/schemas/String"
          description: An explanatory message.
    InstanceFleetStateChangeReasonCode:
      type: string
      enum:
        - INTERNAL_ERROR
        - VALIDATION_ERROR
        - INSTANCE_FAILURE
        - CLUSTER_TERMINATED
    InstanceFleetTimeline:
      description: Provides historical timestamps for the instance fleet, including the time of creation, the time it became ready to run jobs, and the time of termination. The instance fleet configuration is available only in Amazon EMR releases 4.8.0 and later, excluding 5.0.x versions.
      type: object
      properties:
        CreationDateTime:
          $ref: "#/components/schemas/Date"
          description: The time and date the instance fleet was created.
        ReadyDateTime:
          $ref: "#/components/schemas/Date"
          description: The time and date the instance fleet was ready to run jobs.
        EndDateTime:
          $ref: "#/components/schemas/Date"
          description: The time and date the instance fleet terminated.
    InstanceTypeSpecificationList:
      type: array
      items:
        $ref: "#/components/schemas/InstanceTypeSpecification"
    InstanceTypeSpecification:
      description: The configuration specification for each instance type in an instance fleet. The instance fleet configuration is available only in Amazon EMR releases 4.8.0 and later, excluding 5.0.x versions.
      type: object
      properties:
        InstanceType:
          $ref: "#/components/schemas/InstanceType"
          description: The Amazon EC2 instance type, for example m3.xlarge.
        WeightedCapacity:
          $ref: "#/components/schemas/WholeNumber"
          description: The number of units that a provisioned instance of this type provides toward fulfilling the target capacities defined in InstanceFleetConfig. Capacity values represent performance characteristics such as vCPUs, memory, or I/O. If not specified, the default value is 1.
        BidPrice:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The bid price for each Amazon EC2 Spot Instance type as defined by InstanceType. Expressed in USD. If neither BidPrice nor BidPriceAsPercentageOfOnDemandPrice is provided, BidPriceAsPercentageOfOnDemandPrice defaults to 100%.
        BidPriceAsPercentageOfOnDemandPrice:
          $ref: "#/components/schemas/NonNegativeDouble"
          description: The bid price, as a percentage of On-Demand price, for each Amazon EC2 Spot Instance as defined by InstanceType. Expressed as a number (for example, 20 specifies 20%).
        Configurations:
          $ref: "#/components/schemas/ConfigurationList"
          description: A configuration classification that applies when provisioning cluster instances, which can include configurations for applications and software bundled with Amazon EMR.
        EbsBlockDevices:
          $ref: "#/components/schemas/EbsBlockDeviceList"
          description: The configuration of Amazon Elastic Block Store (Amazon EBS) attached to each instance as defined by InstanceType.
        EbsOptimized:
          $ref: "#/components/schemas/BooleanObject"
          description: Evaluates to TRUE when the specified InstanceType is EBS-optimized.
        CustomAmiId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The custom AMI ID to use for the instance type.
        Priority:
          $ref: "#/components/schemas/NonNegativeDouble"
          description: The priority at which Amazon EMR launches the Amazon EC2 instances with this instance type. Priority starts at 0, which is the highest priority. Amazon EMR considers the highest priority first.
    EbsBlockDeviceList:
      type: array
      items:
        $ref: "#/components/schemas/EbsBlockDevice"
    EbsBlockDevice:
      description: Configuration of requested EBS block device associated with the instance group.
      type: object
      properties:
        VolumeSpecification:
          $ref: "#/components/schemas/VolumeSpecification"
          description: EBS volume specifications such as volume type, IOPS, size (GiB) and throughput (MiB/s) that are requested for the EBS volume attached to an Amazon EC2 instance in the cluster.
        Device:
          $ref: "#/components/schemas/String"
          description: The device name that is exposed to the instance, such as /dev/sdh.
    ListInstanceGroupsOutput:
      description: This input determines which instance groups to retrieve.
      type: object
      properties:
        InstanceGroups:
          $ref: "#/components/schemas/InstanceGroupList"
          description: The list of instance groups for the cluster and given filters.
        Marker:
          $ref: "#/components/schemas/Marker"
          description: The pagination token that indicates the next set of results to retrieve.
    InstanceGroupList:
      type: array
      items:
        $ref: "#/components/schemas/InstanceGroup"
    InstanceGroup:
      description: This entity represents an instance group, which is a group of instances that have common purpose. For example, CORE instance group is used for HDFS.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/InstanceGroupId"
          description: The identifier of the instance group.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the instance group.
        Market:
          $ref: "#/components/schemas/MarketType"
          description: The marketplace to provision instances for this group. Valid values are ON_DEMAND or SPOT.
        InstanceGroupType:
          $ref: "#/components/schemas/InstanceGroupType"
          description: The type of the instance group. Valid values are MASTER, CORE or TASK.
        BidPrice:
          $ref: "#/components/schemas/String"
          description: The bid price for each Amazon EC2 Spot Instance type as defined by InstanceType. Expressed in USD. If neither BidPrice nor BidPriceAsPercentageOfOnDemandPrice is provided, BidPriceAsPercentageOfOnDemandPrice defaults to 100%.
        InstanceType:
          $ref: "#/components/schemas/InstanceType"
          description: The Amazon EC2 instance type for all instances in the instance group.
        RequestedInstanceCount:
          $ref: "#/components/schemas/Integer"
          description: The target number of instances for the instance group.
        RunningInstanceCount:
          $ref: "#/components/schemas/Integer"
          description: The number of instances currently running in this instance group.
        Status:
          $ref: "#/components/schemas/InstanceGroupStatus"
          description: The current status of the instance group.
        Configurations:
          $ref: "#/components/schemas/ConfigurationList"
          description: Amazon EMR releases 4.x or later. The list of configurations supplied for an Amazon EMR cluster instance group. You can specify a separate configuration for each instance group (master, core, and task).
        ConfigurationsVersion:
          $ref: "#/components/schemas/Long"
          description: The version number of the requested configuration specification for this instance group.
        LastSuccessfullyAppliedConfigurations:
          $ref: "#/components/schemas/ConfigurationList"
          description: A list of configurations that were successfully applied for an instance group last time.
        LastSuccessfullyAppliedConfigurationsVersion:
          $ref: "#/components/schemas/Long"
          description: The version number of a configuration specification that was successfully applied for an instance group last time.
        EbsBlockDevices:
          $ref: "#/components/schemas/EbsBlockDeviceList"
          description: The EBS block devices that are mapped to this instance group.
        EbsOptimized:
          $ref: "#/components/schemas/BooleanObject"
          description: If the instance group is EBS-optimized. An Amazon EBS-optimized instance uses an optimized configuration stack and provides additional, dedicated capacity for Amazon EBS I/O.
        ShrinkPolicy:
          $ref: "#/components/schemas/ShrinkPolicy"
          description: Policy for customizing shrink operations.
        AutoScalingPolicy:
          $ref: "#/components/schemas/AutoScalingPolicyDescription"
          description: An automatic scaling policy for a core instance group or task instance group in an Amazon EMR cluster. The automatic scaling policy defines how an instance group dynamically adds and terminates Amazon EC2 instances in response to the value of a CloudWatch metric. See PutAutoScalingPolicy.
        CustomAmiId:
          $ref: "#/components/schemas/XmlStringMaxLen256"
          description: The custom AMI ID to use for the provisioned instance group.
    InstanceGroupId:
      type: string
    InstanceGroupType:
      type: string
      enum:
        - MASTER
        - CORE
        - TASK
    InstanceGroupStatus:
      description: The details of the instance group status.
      type: object
      properties:
        State:
          $ref: "#/components/schemas/InstanceGroupState"
          description: The current state of the instance group.
        StateChangeReason:
          $ref: "#/components/schemas/InstanceGroupStateChangeReason"
          description: The status change reason details for the instance group.
        Timeline:
          $ref: "#/components/schemas/InstanceGroupTimeline"
          description: The timeline of the instance group status over time.
    InstanceGroupStateChangeReason:
      description: The status change reason details for the instance group.
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/InstanceGroupStateChangeReasonCode"
          description: The programmable code for the state change reason.
        Message:
          $ref: "#/components/schemas/String"
          description: The status change reason description.
    InstanceGroupStateChangeReasonCode:
      type: string
      enum:
        - INTERNAL_ERROR
        - VALIDATION_ERROR
        - INSTANCE_FAILURE
