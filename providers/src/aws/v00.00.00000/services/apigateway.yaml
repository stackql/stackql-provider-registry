          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: A query parameter to indicate whether to rollback the API creation (true) or not (false) when a warning is encountered. The default value is false.
        - name: parameters
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MapOfStringToString"
          description: A key-value map of context-specific query string parameters specifying the behavior of different API importing operations. The following shows operation-specific parameters and their supported values. To exclude DocumentationParts from the import, set parameters as ignore=documentation. To configure the endpoint type, set parameters as endpointConfigurationTypes=EDGE, endpointConfigurationTypes=REGIONAL, or endpointConfigurationTypes=PRIVATE. The default endpoint type is EDGE. To handle imported basepath, set parameters as basepath=ignore, basepath=prepend or basepath=split.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  $ref: "#/components/schemas/Blob"
              required:
                - body
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestApi"
  /rejectdomainnameaccessassociations:
    post:
      operationId: RejectDomainNameAccessAssociation
      description: Rejects a domain name access association with a private custom domain name. To reject a domain name access association with an access association source in another AWS account, use this operation. To remove a domain name access association with an access association source in your own account, use the DeleteDomainNameAccessAssociation operation.
      parameters:
        - name: domainNameAccessAssociationArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the domain name access association resource.
        - name: domainNameArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the domain name.
      responses:
        "202":
          description: Success
  /usageplans/{usageplan_id}/keys/{key_id}/usage:
    patch:
      operationId: UpdateUsage
      description: Grants a temporary extension to the remaining quota of a usage plan associated with a specified API key.
      parameters:
        - name: usageplan_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Id of the usage plan associated with the usage data.
        - name: key_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The identifier of the API key associated with the usage plan in which a temporary extension is granted to the remaining quota.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                patchOperations:
                  $ref: "#/components/schemas/ListOfPatchOperation"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Usage"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    String:
      type: string
    Boolean:
      type: boolean
    ListOfStageKeys:
      type: array
      items:
        $ref: "#/components/schemas/StageKey"
    StageKey:
      description: A reference to a unique stage identified in the format {restApiId}/{stage}.
      type: object
      properties:
        restApiId:
          $ref: "#/components/schemas/String"
          description: The string identifier of the associated RestApi.
        stageName:
          $ref: "#/components/schemas/String"
          description: The stage name associated with the stage key.
    MapOfStringToString:
      type: object
      properties: {}
    ApiKey:
      description: A resource that can be distributed to callers for executing Method resources that require an API key. API keys can be mapped to any Stage on any RestApi, which indicates that the callers with the API key can make requests to that stage.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The identifier of the API Key.
        value:
          $ref: "#/components/schemas/String"
          description: The value of the API Key.
        name:
          $ref: "#/components/schemas/String"
          description: The name of the API Key.
        customerId:
          $ref: "#/components/schemas/String"
          description: An Amazon Web Services Marketplace customer identifier, when integrating with the Amazon Web Services SaaS Marketplace.
        description:
          $ref: "#/components/schemas/String"
          description: The description of the API Key.
        enabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the API Key can be used by callers.
        createdDate:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the API Key was created.
        lastUpdatedDate:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the API Key was last updated.
        stageKeys:
          $ref: "#/components/schemas/ListOfString"
          description: A list of Stage resources that are associated with the ApiKey resource.
        tags:
          type: object
          properties: {}
          description: The collection of tags. Each tag element is associated with a given resource.
    Timestamp:
      type: string
      format: date-time
    ListOfString:
      type: array
      items:
        $ref: "#/components/schemas/String"
    AuthorizerType:
      description: The authorizer type. Valid values are TOKEN for a Lambda function using a single authorization token submitted in a custom header, REQUEST for a Lambda function using incoming request parameters, and COGNITO_USER_POOLS for using an Amazon Cognito user pool.
      type: string
      enum:
        - TOKEN
        - REQUEST
        - COGNITO_USER_POOLS
    ListOfARNs:
      type: array
      items:
        $ref: "#/components/schemas/ProviderARN"
    ProviderARN:
      type: string
    NullableInteger:
      type: integer
    Authorizer:
      description: Represents an authorization layer for methods. If enabled on a method, API Gateway will activate the authorizer when a client calls the method.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The identifier for the authorizer resource.
        name:
          $ref: "#/components/schemas/String"
          description: The name of the authorizer.
        type_:
          $ref: "#/components/schemas/AuthorizerType"
          description: The authorizer type. Valid values are TOKEN for a Lambda function using a single authorization token submitted in a custom header, REQUEST for a Lambda function using incoming request parameters, and COGNITO_USER_POOLS for using an Amazon Cognito user pool.
        providerARNs:
          $ref: "#/components/schemas/ListOfARNs"
          description: "A list of the Amazon Cognito user pool ARNs for the COGNITO_USER_POOLS authorizer. Each element is of this format: arn:aws:cognito-idp:{region}:{account_id}:userpool/{user_pool_id}. For a TOKEN or REQUEST authorizer, this is not defined."
        authType:
          $ref: "#/components/schemas/String"
          description: Optional customer-defined field, used in OpenAPI imports and exports without functional impact.
        authorizerUri:
          $ref: "#/components/schemas/String"
          description: Specifies the authorizer's Uniform Resource Identifier (URI). For TOKEN or REQUEST authorizers, this must be a well-formed Lambda function URI, for example, arn:aws:apigateway:us-west-2:lambda:path/2015-03-31/functions/arn:aws:lambda:us-west-2:{account_id}:function:{lambda_function_name}/invocations. In general, the URI has this form arn:aws:apigateway:{region}:lambda:path/{service_api}, where {region} is the same as the region hosting the Lambda function, path indicates that the remaining substring in the URI should be treated as the path to the resource, including the initial /. For Lambda functions, this is usually of the form /2015-03-31/functions/[FunctionARN]/invocations.
        authorizerCredentials:
          $ref: "#/components/schemas/String"
          description: Specifies the required credentials as an IAM role for API Gateway to invoke the authorizer. To specify an IAM role for API Gateway to assume, use the role's Amazon Resource Name (ARN). To use resource-based permissions on the Lambda function, specify null.
        identitySource:
          $ref: "#/components/schemas/String"
          description: The identity source for which authorization is requested. For a TOKEN or COGNITO_USER_POOLS authorizer, this is required and specifies the request header mapping expression for the custom header holding the authorization token submitted by the client. For example, if the token header name is Auth, the header mapping expression is method.request.header.Auth. For the REQUEST authorizer, this is required when authorization caching is enabled. The value is a comma-separated string of one or more mapping expressions of the specified request parameters. For example, if an Auth header, a Name query string parameter are defined as identity sources, this value is method.request.header.Auth, method.request.querystring.Name. These parameters will be used to derive the authorization caching key and to perform runtime validation of the REQUEST authorizer by verifying all of the identity-related request parameters are present, not null and non-empty. Only when this is true does the authorizer invoke the authorizer Lambda function, otherwise, it returns a 401 Unauthorized response without calling the Lambda function. The valid value is a string of comma-separated mapping expressions of the specified request parameters. When the authorization caching is not enabled, this property is optional.
        identityValidationExpression:
          $ref: "#/components/schemas/String"
          description: A validation expression for the incoming identity token. For TOKEN authorizers, this value is a regular expression. For COGNITO_USER_POOLS authorizers, API Gateway will match the aud field of the incoming token from the client against the specified regular expression. It will invoke the authorizer's Lambda function when there is a match. Otherwise, it will return a 401 Unauthorized response without calling the Lambda function. The validation expression does not apply to the REQUEST authorizer.
        authorizerResultTtlInSeconds:
          $ref: "#/components/schemas/NullableInteger"
          description: The TTL in seconds of cached authorizer results. If it equals 0, authorization caching is disabled. If it is greater than 0, API Gateway will cache authorizer responses. If this field is not set, the default value is 300. The maximum value is 3600, or 1 hour.
    BasePathMapping:
      description: Represents the base path that callers of the API must provide as part of the URL after the domain name.
      type: object
      properties:
        basePath:
          $ref: "#/components/schemas/String"
          description: The base path name that callers of the API must provide as part of the URL after the domain name.
        restApiId:
          $ref: "#/components/schemas/String"
          description: The string identifier of the associated RestApi.
        stage:
          $ref: "#/components/schemas/String"
          description: The name of the associated stage.
    NullableBoolean:
      type: boolean
    CacheClusterSize:
      description: Returns the size of the CacheCluster.
      type: string
      enum:
        - "0.5"
        - "1.6"
        - "6.1"
        - "13.5"
        - "28.4"
        - "58.2"
        - "118"
        - "237"
    DeploymentCanarySettings:
      description: The input configuration for a canary deployment.
      type: object
      properties:
        percentTraffic:
          $ref: "#/components/schemas/Double"
          description: The percentage (0.0-100.0) of traffic routed to the canary deployment.
        stageVariableOverrides:
          type: object
          properties: {}
          description: A stage variable overrides used for the canary release deployment. They can override existing stage variables or add new stage variables for the canary release deployment. These stage variables are represented as a string-to-string map between stage variable names and their values.
        useStageCache:
          $ref: "#/components/schemas/Boolean"
          description: A Boolean flag to indicate whether the canary release deployment uses the stage cache or not.
    Double:
      type: number
      format: double
    Deployment:
      description: An immutable representation of a RestApi resource that can be called by users using Stages. A deployment must be associated with a Stage for it to be callable over the Internet.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The identifier for the deployment resource.
        description:
          $ref: "#/components/schemas/String"
          description: The description for the deployment resource.
        createdDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the deployment resource was created.
        apiSummary:
          type: object
          properties: {}
          description: A summary of the RestApi at the date and time that the deployment resource was created.
    DocumentationPartLocation:
      description: Specifies the target API entity to which the documentation applies.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/DocumentationPartType"
          description: The type of API entity to which the documentation content applies. Valid values are API, AUTHORIZER, MODEL, RESOURCE, METHOD, PATH_PARAMETER, QUERY_PARAMETER, REQUEST_HEADER, REQUEST_BODY, RESPONSE, RESPONSE_HEADER, and RESPONSE_BODY. Content inheritance does not apply to any entity of the API, AUTHORIZER, METHOD, MODEL, REQUEST_BODY, or RESOURCE type.
        path:
          $ref: "#/components/schemas/String"
          description: The URL path of the target. It is a valid field for the API entity types of RESOURCE, METHOD, PATH_PARAMETER, QUERY_PARAMETER, REQUEST_HEADER, REQUEST_BODY, RESPONSE, RESPONSE_HEADER, and RESPONSE_BODY. The default value is / for the root resource. When an applicable child entity inherits the content of another entity of the same type with more general specifications of the other location attributes, the child entity's path attribute must match that of the parent entity as a prefix.
        method:
          $ref: "#/components/schemas/String"
          description: The HTTP verb of a method. It is a valid field for the API entity types of METHOD, PATH_PARAMETER, QUERY_PARAMETER, REQUEST_HEADER, REQUEST_BODY, RESPONSE, RESPONSE_HEADER, and RESPONSE_BODY. The default value is * for any method. When an applicable child entity inherits the content of an entity of the same type with more general specifications of the other location attributes, the child entity's method attribute must match that of the parent entity exactly.
        statusCode:
          $ref: "#/components/schemas/DocumentationPartLocationStatusCode"
          description: The HTTP status code of a response. It is a valid field for the API entity types of RESPONSE, RESPONSE_HEADER, and RESPONSE_BODY. The default value is * for any status code. When an applicable child entity inherits the content of an entity of the same type with more general specifications of the other location attributes, the child entity's statusCode attribute must match that of the parent entity exactly.
        name:
          $ref: "#/components/schemas/String"
          description: The name of the targeted API entity. It is a valid and required field for the API entity types of AUTHORIZER, MODEL, PATH_PARAMETER, QUERY_PARAMETER, REQUEST_HEADER, REQUEST_BODY and RESPONSE_HEADER. It is an invalid field for any other entity type.
      required:
        - type_
    DocumentationPartType:
      type: string
      enum:
        - API
        - AUTHORIZER
        - MODEL
        - RESOURCE
        - METHOD
        - PATH_PARAMETER
        - QUERY_PARAMETER
        - REQUEST_HEADER
        - REQUEST_BODY
        - RESPONSE
        - RESPONSE_HEADER
        - RESPONSE_BODY
    DocumentationPartLocationStatusCode:
      type: string
      pattern: ^([1-5]\d\d|\*|\s*)$
    DocumentationPart:
      description: A documentation part for a targeted API entity.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The DocumentationPart identifier, generated by API Gateway when the DocumentationPart is created.
        location:
          $ref: "#/components/schemas/DocumentationPartLocation"
          description: The location of the API entity to which the documentation applies. Valid fields depend on the targeted API entity type. All the valid location fields are not required. If not explicitly specified, a valid location field is treated as a wildcard and associated documentation content may be inherited by matching entities, unless overridden.
        properties_:
          $ref: "#/components/schemas/String"
          description: 'A content map of API-specific key-value pairs describing the targeted API entity. The map must be encoded as a JSON string, e.g., "{ \"description\": \"The API does ...\" }". Only OpenAPI-compliant documentation-related fields from the properties map are exported and, hence, published as part of the API entity definitions, while the original documentation parts are exported in a OpenAPI extension of x-amazon-apigateway-documentation.'
    DocumentationVersion:
      description: A snapshot of the documentation of an API.
      type: object
      properties:
        version:
          $ref: "#/components/schemas/String"
          description: The version identifier of the API documentation snapshot.
        createdDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date when the API documentation snapshot is created.
        description:
          $ref: "#/components/schemas/String"
          description: The description of the API documentation snapshot.
    EndpointConfiguration:
      description: The endpoint configuration to indicate the types of endpoints an API (RestApi) or its custom domain name (DomainName) has and the IP address types that can invoke it.
      type: object
      properties:
        types:
          $ref: "#/components/schemas/ListOfEndpointType"
          description: A list of endpoint types of an API (RestApi) or its custom domain name (DomainName). For an edge-optimized API and its custom domain name, the endpoint type is "EDGE". For a regional API and its custom domain name, the endpoint type is REGIONAL. For a private API, the endpoint type is PRIVATE.
        ipAddressType:
          $ref: "#/components/schemas/IpAddressType"
          description: The IP address types that can invoke an API (RestApi) or a DomainName. Use ipv4 to allow only IPv4 addresses to invoke an API or DomainName, or use dualstack to allow both IPv4 and IPv6 addresses to invoke an API or a DomainName. For the PRIVATE endpoint type, only dualstack is supported.
        vpcEndpointIds:
          $ref: "#/components/schemas/ListOfString"
          description: A list of VpcEndpointIds of an API (RestApi) against which to create Route53 ALIASes. It is only supported for PRIVATE endpoint type.
    ListOfEndpointType:
      type: array
      items:
        $ref: "#/components/schemas/EndpointType"
    EndpointType:
      description: The endpoint type. The valid values are EDGE for edge-optimized API setup, most suitable for mobile applications; REGIONAL for regional API endpoint setup, most suitable for calling from AWS Region; and PRIVATE for private APIs.
      type: string
      enum:
        - REGIONAL
        - EDGE
        - PRIVATE
    IpAddressType:
      type: string
      enum:
        - ipv4
        - dualstack
    SecurityPolicy:
      type: string
      enum:
        - TLS_1_0
        - TLS_1_2
        - SecurityPolicy_TLS13_1_3_2025_09
        - SecurityPolicy_TLS13_1_3_FIPS_2025_09
        - SecurityPolicy_TLS13_1_2_PFS_PQ_2025_09
        - SecurityPolicy_TLS13_1_2_FIPS_PQ_2025_09
        - SecurityPolicy_TLS13_1_2_FIPS_PFS_PQ_2025_09
        - SecurityPolicy_TLS13_1_2_PQ_2025_09
        - SecurityPolicy_TLS13_1_2_2021_06
        - SecurityPolicy_TLS13_2025_EDGE
        - SecurityPolicy_TLS12_PFS_2025_EDGE
        - SecurityPolicy_TLS12_2018_EDGE
    EndpointAccessMode:
      type: string
      enum:
        - BASIC
        - STRICT
    MutualTlsAuthenticationInput:
      description: The mutual TLS authentication configuration for a custom domain name. If specified, API Gateway performs two-way authentication between the client and the server. Clients must present a trusted certificate to access your API.
      type: object
      properties:
        truststoreUri:
          $ref: "#/components/schemas/String"
          description: An Amazon S3 URL that specifies the truststore for mutual TLS authentication, for example s3://bucket-name/key-name. The truststore can contain certificates from public or private certificate authorities. To update the truststore, upload a new version to S3, and then update your custom domain name to use the new version. To update the truststore, you must have permissions to access the S3 object.
        truststoreVersion:
          $ref: "#/components/schemas/String"
          description: The version of the S3 object that contains your truststore. To specify a version, you must have versioning enabled for the S3 bucket
    RoutingMode:
      type: string
      enum:
        - BASE_PATH_MAPPING_ONLY
        - ROUTING_RULE_ONLY
        - ROUTING_RULE_THEN_BASE_PATH_MAPPING
    DomainName:
      description: Represents a custom domain name as a user-friendly host name of an API (RestApi).
      type: object
      properties:
        domainName:
          $ref: "#/components/schemas/String"
          description: The custom domain name as an API host name, for example, my-api.example.com.
        domainNameId:
          $ref: "#/components/schemas/String"
          description: The identifier for the domain name resource. Supported only for private custom domain names.
        domainNameArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the domain name.
        certificateName:
          $ref: "#/components/schemas/String"
          description: The name of the certificate that will be used by edge-optimized endpoint or private endpoint for this domain name.
        certificateArn:
          $ref: "#/components/schemas/String"
          description: The reference to an Amazon Web Services-managed certificate that will be used by edge-optimized endpoint or private endpoint for this domain name. Certificate Manager is the only supported source.
        certificateUploadDate:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the certificate that was used by edge-optimized endpoint or private endpoint for this domain name was uploaded.
        regionalDomainName:
          $ref: "#/components/schemas/String"
          description: The domain name associated with the regional endpoint for this custom domain name. You set up this association by adding a DNS record that points the custom domain name to this regional domain name. The regional domain name is returned by API Gateway when you create a regional endpoint.
        regionalHostedZoneId:
          $ref: "#/components/schemas/String"
          description: The region-specific Amazon Route 53 Hosted Zone ID of the regional endpoint. For more information, see Set up a Regional Custom Domain Name and AWS Regions and Endpoints for API Gateway.
        regionalCertificateName:
          $ref: "#/components/schemas/String"
          description: The name of the certificate that will be used for validating the regional domain name.
        regionalCertificateArn:
          $ref: "#/components/schemas/String"
          description: The reference to an Amazon Web Services-managed certificate that will be used for validating the regional domain name. Certificate Manager is the only supported source.
        distributionDomainName:
          $ref: "#/components/schemas/String"
          description: The domain name of the Amazon CloudFront distribution associated with this custom domain name for an edge-optimized endpoint. You set up this association when adding a DNS record pointing the custom domain name to this distribution name. For more information about CloudFront distributions, see the Amazon CloudFront documentation.
        distributionHostedZoneId:
          $ref: "#/components/schemas/String"
          description: The region-agnostic Amazon Route 53 Hosted Zone ID of the edge-optimized endpoint. The valid value is Z2FDTNDATAQYW2 for all the regions. For more information, see Set up a Regional Custom Domain Name and AWS Regions and Endpoints for API Gateway.
        endpointConfiguration:
          $ref: "#/components/schemas/EndpointConfiguration"
          description: The endpoint configuration of this DomainName showing the endpoint types and IP address types of the domain name.
        domainNameStatus:
          $ref: "#/components/schemas/DomainNameStatus"
          description: The status of the DomainName migration. The valid values are AVAILABLE and UPDATING. If the status is UPDATING, the domain cannot be modified further until the existing operation is complete. If it is AVAILABLE, the domain can be updated.
        domainNameStatusMessage:
          $ref: "#/components/schemas/String"
          description: An optional text message containing detailed information about status of the DomainName migration.
        securityPolicy:
          $ref: "#/components/schemas/SecurityPolicy"
          description: The Transport Layer Security (TLS) version + cipher suite for this DomainName.
        endpointAccessMode:
          $ref: "#/components/schemas/EndpointAccessMode"
          description: The endpoint access mode of the DomainName.
        tags:
          type: object
          properties: {}
          description: The collection of tags. Each tag element is associated with a given resource.
        mutualTlsAuthentication:
          $ref: "#/components/schemas/MutualTlsAuthentication"
          description: The mutual TLS authentication configuration for a custom domain name. If specified, API Gateway performs two-way authentication between the client and the server. Clients must present a trusted certificate to access your API.
        ownershipVerificationCertificateArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the public certificate issued by ACM to validate ownership of your custom domain. Only required when configuring mutual TLS and using an ACM imported or private CA certificate ARN as the regionalCertificateArn.
        managementPolicy:
          $ref: "#/components/schemas/String"
          description: A stringified JSON policy document that applies to the API Gateway Management service for this DomainName. This policy document controls access for access association sources to create domain name access associations with this DomainName. Supported only for private custom domain names.
        policy:
          $ref: "#/components/schemas/String"
          description: A stringified JSON policy document that applies to the execute-api service for this DomainName regardless of the caller and Method configuration. Supported only for private custom domain names.
        routingMode:
          $ref: "#/components/schemas/RoutingMode"
          description: The routing mode for this domain name. The routing mode determines how API Gateway sends traffic from your custom domain name to your private APIs.
    DomainNameStatus:
      type: string
      enum:
        - AVAILABLE
        - UPDATING
        - PENDING
        - PENDING_CERTIFICATE_REIMPORT
        - PENDING_OWNERSHIP_VERIFICATION
        - FAILED
    MutualTlsAuthentication:
      description: The mutual TLS authentication configuration for a custom domain name. If specified, API Gateway performs two-way authentication between the client and the server. Clients must present a trusted certificate to access your API.
      type: object
      properties:
        truststoreUri:
          $ref: "#/components/schemas/String"
          description: An Amazon S3 URL that specifies the truststore for mutual TLS authentication, for example s3://bucket-name/key-name. The truststore can contain certificates from public or private certificate authorities. To update the truststore, upload a new version to S3, and then update your custom domain name to use the new version. To update the truststore, you must have permissions to access the S3 object.
        truststoreVersion:
          $ref: "#/components/schemas/String"
          description: The version of the S3 object that contains your truststore. To specify a version, you must have versioning enabled for the S3 bucket.
        truststoreWarnings:
          $ref: "#/components/schemas/ListOfString"
          description: A list of warnings that API Gateway returns while processing your truststore. Invalid certificates produce warnings. Mutual TLS is still enabled, but some clients might not be able to access your API. To resolve warnings, upload a new truststore to S3, and then update you domain name to use the new version.
    AccessAssociationSourceType:
      type: string
      enum:
        - VPCE
    DomainNameAccessAssociation:
      description: Represents a domain name access association between an access association source and a private custom domain name. With a domain name access association, an access association source can invoke a private custom domain name while isolated from the public internet.
      type: object
      properties:
        domainNameAccessAssociationArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the domain name access association resource.
        domainNameArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the domain name.
        accessAssociationSourceType:
          $ref: "#/components/schemas/AccessAssociationSourceType"
          description: The type of the domain name access association source.
        accessAssociationSource:
          $ref: "#/components/schemas/String"
          description: The ARN of the domain name access association source. For a VPCE, the ARN must be a VPC endpoint.
