      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestApis"
  /restapis/{restapi_id}/stages:
    post:
      operationId: CreateStage
      description: Creates a new Stage resource that references a pre-existing Deployment for the API.
      parameters:
        - name: restapi_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The string identifier of the associated RestApi.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stageName:
                  $ref: "#/components/schemas/String"
                deploymentId:
                  $ref: "#/components/schemas/String"
                description:
                  $ref: "#/components/schemas/String"
                cacheClusterEnabled:
                  $ref: "#/components/schemas/Boolean"
                cacheClusterSize:
                  $ref: "#/components/schemas/CacheClusterSize"
                variables:
                  $ref: "#/components/schemas/MapOfStringToString"
                documentationVersion:
                  $ref: "#/components/schemas/String"
                canarySettings:
                  $ref: "#/components/schemas/CanarySettings"
                tracingEnabled:
                  $ref: "#/components/schemas/Boolean"
                tags:
                  $ref: "#/components/schemas/MapOfStringToString"
              required:
                - stageName
                - deploymentId
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stage"
    get:
