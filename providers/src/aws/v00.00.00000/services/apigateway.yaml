          description: The Transport Layer Security (TLS) version + cipher suite for this RestApi.
        endpointAccessMode:
          $ref: "#/components/schemas/EndpointAccessMode"
          description: The endpoint access mode of the RestApi.
        apiStatus:
          $ref: "#/components/schemas/ApiStatus"
          description: The ApiStatus of the RestApi.
        apiStatusMessage:
          $ref: "#/components/schemas/String"
          description: The status message of the RestApi. When the status message is UPDATING you can still invoke it.
