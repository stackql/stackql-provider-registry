openapi: 3.0.0
info:
  version: "2015-07-09"
  title: Amazon API Gateway
  description: Amazon API Gateway
  x-serviceName: apigateway
  x-serviceAlias: apigateway
  x-protocol: rest-json
  x-apiVersion: "2015-07-09"
  x-endpointPrefix: apigateway
servers:
  - url: https://apigateway.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for apigateway
paths:
  /apikeys:
    post:
      operationId: CreateApiKey
      description: Create an ApiKey resource.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/String"
                description:
                  $ref: "#/components/schemas/String"
                enabled:
                  $ref: "#/components/schemas/Boolean"
                generateDistinctId:
                  $ref: "#/components/schemas/Boolean"
                value:
                  $ref: "#/components/schemas/String"
                stageKeys:
                  $ref: "#/components/schemas/ListOfStageKeys"
                customerId:
                  $ref: "#/components/schemas/String"
                tags:
                  $ref: "#/components/schemas/MapOfStringToString"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKey"
    get:
      operationId: GetApiKeys
      description: Gets information about the current ApiKeys resource.
      parameters:
        - name: position
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The current pagination position in the paged result set.
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NullableInteger"
          description: The maximum number of returned results per page. The default value is 25 and the maximum value is 500.
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The name of queried API keys.
        - name: customerId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The identifier of a customer in Amazon Web Services Marketplace or an external system, such as a developer portal.
        - name: includeValues
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NullableBoolean"
          description: A boolean flag to specify whether (true) or not (false) the result contains key values.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeys"
  /restapis/{restapi_id}/authorizers:
    post:
      operationId: CreateAuthorizer
      description: Adds a new Authorizer resource to an existing RestApi resource.
      parameters:
        - name: restapi_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The string identifier of the associated RestApi.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/String"
                type:
                  $ref: "#/components/schemas/AuthorizerType"
                providerARNs:
                  $ref: "#/components/schemas/ListOfARNs"
                authType:
                  $ref: "#/components/schemas/String"
                authorizerUri:
                  $ref: "#/components/schemas/String"
                authorizerCredentials:
                  $ref: "#/components/schemas/String"
                identitySource:
                  $ref: "#/components/schemas/String"
                identityValidationExpression:
                  $ref: "#/components/schemas/String"
                authorizerResultTtlInSeconds:
                  $ref: "#/components/schemas/NullableInteger"
              required:
                - name
                - type
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Authorizer"
    get:
      operationId: GetAuthorizers
      description: Describe an existing Authorizers resource.
      parameters:
        - name: restapi_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The string identifier of the associated RestApi.
        - name: position
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The current pagination position in the paged result set.
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NullableInteger"
          description: The maximum number of returned results per page. The default value is 25 and the maximum value is 500.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Authorizers"
  /domainnames/{domain_name}/basepathmappings:
    post:
      operationId: CreateBasePathMapping
      description: Creates a new BasePathMapping resource.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The domain name of the BasePathMapping resource to create.
        - name: domainNameId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The identifier for the domain name resource. Required for private custom domain names.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                basePath:
                  $ref: "#/components/schemas/String"
                restApiId:
                  $ref: "#/components/schemas/String"
                stage:
                  $ref: "#/components/schemas/String"
              required:
                - restApiId
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasePathMapping"
    get:
      operationId: GetBasePathMappings
      description: Represents a collection of BasePathMapping resources.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The domain name of a BasePathMapping resource.
        - name: domainNameId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The identifier for the domain name resource. Supported only for private custom domain names.
        - name: position
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The current pagination position in the paged result set.
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NullableInteger"
          description: The maximum number of returned results per page. The default value is 25 and the maximum value is 500.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasePathMappings"
  /restapis/{restapi_id}/deployments:
    post:
      operationId: CreateDeployment
      description: Creates a Deployment resource, which makes a specified RestApi callable over the internet.
      parameters:
        - name: restapi_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The string identifier of the associated RestApi.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                stageName:
                  $ref: "#/components/schemas/String"
                stageDescription:
                  $ref: "#/components/schemas/String"
                description:
                  $ref: "#/components/schemas/String"
                cacheClusterEnabled:
                  $ref: "#/components/schemas/NullableBoolean"
                cacheClusterSize:
                  $ref: "#/components/schemas/CacheClusterSize"
                variables:
                  $ref: "#/components/schemas/MapOfStringToString"
                canarySettings:
                  $ref: "#/components/schemas/DeploymentCanarySettings"
                tracingEnabled:
                  $ref: "#/components/schemas/NullableBoolean"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"
    get:
      operationId: GetDeployments
      description: Gets information about a Deployments collection.
      parameters:
        - name: restapi_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The string identifier of the associated RestApi.
        - name: position
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The current pagination position in the paged result set.
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NullableInteger"
          description: The maximum number of returned results per page. The default value is 25 and the maximum value is 500.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployments"
  /restapis/{restapi_id}/documentation/parts:
    post:
      operationId: CreateDocumentationPart
      description: Creates a documentation part.
      parameters:
        - name: restapi_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The string identifier of the associated RestApi.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                location:
                  $ref: "#/components/schemas/DocumentationPartLocation"
                properties:
                  $ref: "#/components/schemas/String"
              required:
                - location
                - properties
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentationPart"
    get:
      operationId: GetDocumentationParts
      description: Gets documentation parts.
      parameters:
        - name: restapi_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The string identifier of the associated RestApi.
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DocumentationPartType"
          description: The type of API entities of the to-be-retrieved documentation parts.
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The name of API entities of the to-be-retrieved documentation parts.
        - name: path
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The path of API entities of the to-be-retrieved documentation parts.
        - name: position
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The current pagination position in the paged result set.
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NullableInteger"
          description: The maximum number of returned results per page. The default value is 25 and the maximum value is 500.
        - name: locationStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LocationStatusType"
          description: The status of the API documentation parts to retrieve. Valid values are DOCUMENTED for retrieving DocumentationPart resources with content and UNDOCUMENTED for DocumentationPart resources without content.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentationParts"
    put:
      operationId: ImportDocumentationParts
      description: Imports documentation parts
      parameters:
        - name: restapi_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The string identifier of the associated RestApi.
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PutMode"
          description: A query parameter to indicate whether to overwrite (overwrite) any existing DocumentationParts definition or to merge (merge) the new definition into the existing one. The default value is merge.
        - name: failonwarnings
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: A query parameter to specify whether to rollback the documentation importation (true) or not (false) when a warning is encountered. The default value is false.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  $ref: "#/components/schemas/Blob"
              required:
                - body
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentationPartIds"
  /restapis/{restapi_id}/documentation/versions:
    post:
      operationId: CreateDocumentationVersion
      description: Creates a documentation version
      parameters:
        - name: restapi_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The string identifier of the associated RestApi.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                documentationVersion:
                  $ref: "#/components/schemas/String"
                stageName:
                  $ref: "#/components/schemas/String"
                description:
                  $ref: "#/components/schemas/String"
              required:
                - documentationVersion
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentationVersion"
    get:
      operationId: GetDocumentationVersions
      description: Gets documentation versions.
      parameters:
        - name: restapi_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The string identifier of the associated RestApi.
        - name: position
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The current pagination position in the paged result set.
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NullableInteger"
          description: The maximum number of returned results per page. The default value is 25 and the maximum value is 500.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentationVersions"
  /domainnames:
    post:
      operationId: CreateDomainName
      description: Creates a new domain name.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domainName:
                  $ref: "#/components/schemas/String"
                certificateName:
                  $ref: "#/components/schemas/String"
                certificateBody:
                  $ref: "#/components/schemas/String"
                certificatePrivateKey:
                  $ref: "#/components/schemas/String"
                certificateChain:
                  $ref: "#/components/schemas/String"
                certificateArn:
                  $ref: "#/components/schemas/String"
                regionalCertificateName:
                  $ref: "#/components/schemas/String"
                regionalCertificateArn:
                  $ref: "#/components/schemas/String"
                endpointConfiguration:
                  $ref: "#/components/schemas/EndpointConfiguration"
                tags:
                  $ref: "#/components/schemas/MapOfStringToString"
                securityPolicy:
                  $ref: "#/components/schemas/SecurityPolicy"
                endpointAccessMode:
                  $ref: "#/components/schemas/EndpointAccessMode"
                mutualTlsAuthentication:
                  $ref: "#/components/schemas/MutualTlsAuthenticationInput"
                ownershipVerificationCertificateArn:
                  $ref: "#/components/schemas/String"
                policy:
                  $ref: "#/components/schemas/String"
                routingMode:
                  $ref: "#/components/schemas/RoutingMode"
              required:
                - domainName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainName"
    get:
      operationId: GetDomainNames
      description: Represents a collection of DomainName resources.
      parameters:
        - name: position
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The current pagination position in the paged result set.
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NullableInteger"
          description: The maximum number of returned results per page. The default value is 25 and the maximum value is 500.
        - name: resourceOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceOwner"
          description: The owner of the domain name access association.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainNames"
  /domainnameaccessassociations:
    post:
      operationId: CreateDomainNameAccessAssociation
      description: Creates a domain name access association resource between an access association source and a private custom domain name.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domainNameArn:
                  $ref: "#/components/schemas/String"
                accessAssociationSourceType:
                  $ref: "#/components/schemas/AccessAssociationSourceType"
                accessAssociationSource:
                  $ref: "#/components/schemas/String"
                tags:
                  $ref: "#/components/schemas/MapOfStringToString"
              required:
                - domainNameArn
                - accessAssociationSourceType
                - accessAssociationSource
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainNameAccessAssociation"
    get:
      operationId: GetDomainNameAccessAssociations
      description: Represents a collection on DomainNameAccessAssociations resources.
      parameters:
        - name: position
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The current pagination position in the paged result set.
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NullableInteger"
          description: The maximum number of returned results per page. The default value is 25 and the maximum value is 500.
        - name: resourceOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceOwner"
          description: The owner of the domain name access association. Use SELF to only list the domain name access associations owned by your own account. Use OTHER_ACCOUNTS to list the domain name access associations with your private custom domain names that are owned by other AWS accounts.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainNameAccessAssociations"
  /restapis/{restapi_id}/models:
    post:
      operationId: CreateModel
      description: Adds a new Model resource to an existing RestApi resource.
      parameters:
        - name: restapi_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The RestApi identifier under which the Model will be created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/String"
                description:
                  $ref: "#/components/schemas/String"
                schema:
                  $ref: "#/components/schemas/String"
                contentType:
                  $ref: "#/components/schemas/String"
              required:
                - name
                - contentType
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Model"
    get:
      operationId: GetModels
      description: Describes existing Models defined for a RestApi resource.
      parameters:
        - name: restapi_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The string identifier of the associated RestApi.
        - name: position
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The current pagination position in the paged result set.
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NullableInteger"
          description: The maximum number of returned results per page. The default value is 25 and the maximum value is 500.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Models"
  /restapis/{restapi_id}/requestvalidators:
    post:
      operationId: CreateRequestValidator
      description: Creates a RequestValidator of a given RestApi.
      parameters:
        - name: restapi_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The string identifier of the associated RestApi.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/String"
                validateRequestBody:
                  $ref: "#/components/schemas/Boolean"
                validateRequestParameters:
                  $ref: "#/components/schemas/Boolean"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestValidator"
    get:
      operationId: GetRequestValidators
      description: Gets the RequestValidators collection of a given RestApi.
      parameters:
        - name: restapi_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The string identifier of the associated RestApi.
        - name: position
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The current pagination position in the paged result set.
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NullableInteger"
          description: The maximum number of returned results per page. The default value is 25 and the maximum value is 500.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestValidators"
  /restapis/{restapi_id}/resources/{parent_id}:
    post:
      operationId: CreateResource
      description: Creates a Resource resource.
      parameters:
        - name: restapi_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The string identifier of the associated RestApi.
        - name: parent_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The parent resource's identifier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pathPart:
                  $ref: "#/components/schemas/String"
              required:
                - pathPart
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
  /restapis:
    post:
      operationId: CreateRestApi
      description: Creates a new RestApi resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/String"
                description:
                  $ref: "#/components/schemas/String"
                version:
                  $ref: "#/components/schemas/String"
                cloneFrom:
                  $ref: "#/components/schemas/String"
                binaryMediaTypes:
                  $ref: "#/components/schemas/ListOfString"
                minimumCompressionSize:
                  $ref: "#/components/schemas/NullableInteger"
                apiKeySource:
                  $ref: "#/components/schemas/ApiKeySourceType"
                endpointConfiguration:
                  $ref: "#/components/schemas/EndpointConfiguration"
                policy:
                  $ref: "#/components/schemas/String"
                tags:
                  $ref: "#/components/schemas/MapOfStringToString"
                disableExecuteApiEndpoint:
                  $ref: "#/components/schemas/Boolean"
                securityPolicy:
                  $ref: "#/components/schemas/SecurityPolicy"
                endpointAccessMode:
                  $ref: "#/components/schemas/EndpointAccessMode"
