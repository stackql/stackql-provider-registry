openapi: 3.0.0
info:
  version: "2023-09-07"
  title: AWS Billing
  description: AWS Billing
  x-serviceName: billing
  x-serviceAlias: billing
  x-protocol: json
  x-apiVersion: "2023-09-07"
  x-endpointPrefix: billing
  x-targetPrefix: AWSBilling
  x-jsonVersion: "1.0"
servers:
  - url: https://billing.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for billing
paths:
  /AssociateSourceViews:
    post:
      operationId: AssociateSourceViews
      description: Associates one or more source billing views with an existing billing view. This allows creating aggregate billing views that combine data from multiple sources.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBilling.AssociateSourceViews
            default: AWSBilling.AssociateSourceViews
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/BillingViewArn"
                  description: The Amazon Resource Name (ARN) of the billing view to associate source views with.
                sourceViews:
                  $ref: "#/components/schemas/BillingViewSourceViewsList"
                  description: A list of ARNs of the source billing views to associate.
              required:
                - arn
                - sourceViews
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateSourceViewsResponse"
  /CreateBillingView:
    post:
      operationId: CreateBillingView
      description: Creates a billing view with the specified billing view attributes.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBilling.CreateBillingView
            default: AWSBilling.CreateBillingView
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/BillingViewName"
                  description: The name of the billing view.
                description:
                  $ref: "#/components/schemas/BillingViewDescription"
                  description: The description of the billing view.
                sourceViews:
                  $ref: "#/components/schemas/BillingViewSourceViewsList"
                  description: A list of billing views used as the data source for the custom billing view.
                dataFilterExpression:
                  $ref: "#/components/schemas/Expression"
                  description: See Expression. Billing view only supports LINKED_ACCOUNT, Tags, and CostCategories.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier you specify to ensure idempotency of the request. Idempotency ensures that an API request completes no more than one time. If the original request completes successfully, any subsequent retries complete successfully without performing any further actions with an idempotent request.
                resourceTags:
                  $ref: "#/components/schemas/ResourceTagList"
                  description: A list of key value map specifying tags associated to the billing view being created.
              required:
                - name
                - sourceViews
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBillingViewResponse"
  /DeleteBillingView:
    post:
      operationId: DeleteBillingView
      description: Deletes the specified billing view.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBilling.DeleteBillingView
            default: AWSBilling.DeleteBillingView
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/BillingViewArn"
                  description: The Amazon Resource Name (ARN) that can be used to uniquely identify the billing view.
                force:
                  $ref: "#/components/schemas/Boolean"
                  description: If set to true, forces deletion of the billing view even if it has derived resources (e.g. other billing views or budgets). Use with caution as this may break dependent resources.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBillingViewResponse"
  /DisassociateSourceViews:
    post:
      operationId: DisassociateSourceViews
      description: Removes the association between one or more source billing views and an existing billing view. This allows modifying the composition of aggregate billing views.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBilling.DisassociateSourceViews
            default: AWSBilling.DisassociateSourceViews
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/BillingViewArn"
                  description: The Amazon Resource Name (ARN) of the billing view to disassociate source views from.
                sourceViews:
                  $ref: "#/components/schemas/BillingViewSourceViewsList"
                  description: A list of ARNs of the source billing views to disassociate.
              required:
                - arn
                - sourceViews
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateSourceViewsResponse"
  /GetBillingView:
    post:
      operationId: GetBillingView
      description: Returns the metadata associated to the specified billing view ARN.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBilling.GetBillingView
            default: AWSBilling.GetBillingView
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/BillingViewArn"
                  description: The Amazon Resource Name (ARN) that can be used to uniquely identify the billing view.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBillingViewResponse"
  /GetResourcePolicy:
    post:
      operationId: GetResourcePolicy
      description: Returns the resource-based policy document attached to the resource in JSON format.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBilling.GetResourcePolicy
            default: AWSBilling.GetResourcePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the billing view resource to which the policy is attached to.
              required:
                - resourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourcePolicyResponse"
  /ListBillingViews:
    post:
      operationId: ListBillingViews
      description: Lists the billing views available for a given time period. Every Amazon Web Services account has a unique PRIMARY billing view that represents the billing data available by default. Accounts that use Billing Conductor also have BILLING_GROUP billing views representing pro forma costs associated with each created billing group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBilling.ListBillingViews
            default: AWSBilling.ListBillingViews
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                activeTimeRange:
                  $ref: "#/components/schemas/ActiveTimeRange"
                  description: The time range for the billing views listed. PRIMARY billing view is always listed. BILLING_GROUP billing views are listed for time ranges when the associated billing group resource in Billing Conductor is active. The time range must be within one calendar month.
                arns:
                  $ref: "#/components/schemas/BillingViewArnList"
                  description: The Amazon Resource Name (ARN) that can be used to uniquely identify the billing view.
                billingViewTypes:
                  $ref: "#/components/schemas/BillingViewTypeList"
                  description: The type of billing view.
                names:
                  $ref: "#/components/schemas/StringSearches"
                  description: Filters the list of billing views by name. You can specify search criteria to match billing view names based on the search option provided.
                ownerAccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The list of owners of the billing view.
                sourceAccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: Filters the results to include only billing views that use the specified account as a source.
                maxResults:
                  $ref: "#/components/schemas/BillingViewsMaxResults"
                  description: The maximum number of billing views to retrieve. Default is 100.
                nextToken:
                  $ref: "#/components/schemas/PageToken"
                  description: The pagination token that is used on subsequent calls to list billing views.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBillingViewsResponse"
  /ListSourceViewsForBillingView:
    post:
      operationId: ListSourceViewsForBillingView
      description: Lists the source views (managed Amazon Web Services billing views) associated with the billing view.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBilling.ListSourceViewsForBillingView
            default: AWSBilling.ListSourceViewsForBillingView
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/BillingViewArn"
                  description: The Amazon Resource Name (ARN) that can be used to uniquely identify the billing view.
                maxResults:
                  $ref: "#/components/schemas/BillingViewsMaxResults"
                  description: The number of entries a paginated response contains.
                nextToken:
                  $ref: "#/components/schemas/PageToken"
                  description: The pagination token that is used on subsequent calls to list billing views.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSourceViewsForBillingViewOutputDisplay"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists tags associated with the billing view resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBilling.ListTagsForResource
            default: AWSBilling.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource.
              required:
                - resourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: An API operation for adding one or more tags (key-value pairs) to a resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBilling.TagResource
            default: AWSBilling.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource.
                resourceTags:
                  $ref: "#/components/schemas/ResourceTagList"
                  description: A list of tag key value pairs that are associated with the resource.
              required:
                - resourceArn
                - resourceTags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes one or more tags from a resource. Specify only tag keys in your request. Don't specify the value.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBilling.UntagResource
            default: AWSBilling.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource.
                resourceTagKeys:
                  $ref: "#/components/schemas/ResourceTagKeyList"
                  description: A list of tag key value pairs that are associated with the resource.
              required:
                - resourceArn
                - resourceTagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateBillingView:
    post:
      operationId: UpdateBillingView
      description: An API to update the attributes of the billing view.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBilling.UpdateBillingView
            default: AWSBilling.UpdateBillingView
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/BillingViewArn"
                  description: The Amazon Resource Name (ARN) that can be used to uniquely identify the billing view.
                name:
                  $ref: "#/components/schemas/BillingViewName"
                  description: The name of the billing view.
                description:
                  $ref: "#/components/schemas/BillingViewDescription"
                  description: The description of the billing view.
                dataFilterExpression:
                  $ref: "#/components/schemas/Expression"
                  description: See Expression. Billing view only supports LINKED_ACCOUNT, Tags, and CostCategories.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBillingViewResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    BillingViewArn:
      type: string
      pattern: arn:aws[a-z-]*:(billing)::[0-9]{12}:billingview/[a-zA-Z0-9/:_\+=\.\-@]{0,75}[a-zA-Z0-9]
    BillingViewSourceViewsList:
      type: array
      items:
        $ref: "#/components/schemas/BillingViewArn"
    AssociateSourceViewsResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/BillingViewArn"
          description: The ARN of the billing view that the source views were associated with.
      required:
        - arn
    BillingViewName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[ a-zA-Z0-9_\\+=\\.\\-@]+"
    BillingViewDescription:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: ([ a-zA-Z0-9_\+=\.\-@]+)?
    Expression:
      description: See Expression. Billing view only supports LINKED_ACCOUNT, Tags, and CostCategories.
      type: object
      properties:
        dimensions:
          $ref: "#/components/schemas/DimensionValues"
          description: The specific Dimension to use for Expression.
        tags:
          $ref: "#/components/schemas/TagValues"
          description: The specific Tag to use for Expression.
        costCategories:
          $ref: "#/components/schemas/CostCategoryValues"
          description: The filter that's based on CostCategory values.
        timeRange:
          $ref: "#/components/schemas/TimeRange"
          description: Specifies a time range filter for the billing view data.
    DimensionValues:
      description: The metadata that you can use to filter and group your results.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/Dimension"
          description: The names of the metadata types that you can use to filter and group your results.
        values:
          $ref: "#/components/schemas/Values"
          description: The metadata values that you can use to filter and group your results.
      required:
        - key
        - values
    Dimension:
      type: string
      enum:
        - LINKED_ACCOUNT
    Values:
      type: array
      items:
        $ref: "#/components/schemas/Value"
    Value:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[\\S\\s]*"
    TagValues:
      description: The values that are available for a tag.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: The key for the tag.
        values:
          $ref: "#/components/schemas/Values"
          description: The specific value of the tag.
      required:
        - key
        - values
    TagKey:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[\\S\\s]*"
    CostCategoryValues:
      description: The Cost Categories values used for filtering the costs.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/CostCategoryName"
          description: The unique name of the Cost Category.
        values:
          $ref: "#/components/schemas/Values"
          description: The specific value of the Cost Category.
      required:
        - key
        - values
    CostCategoryName:
      type: string
      minLength: 1
      maxLength: 50
      pattern: (?! )[\p{L}\p{N}\p{Z}-_]*(?<! )
    TimeRange:
      description: Specifies a time range with inclusive begin and end dates.
      type: object
      properties:
        beginDateInclusive:
          $ref: "#/components/schemas/Timestamp"
          description: The inclusive start date of the time range.
        endDateInclusive:
          $ref: "#/components/schemas/Timestamp"
          description: The inclusive end date of the time range.
    Timestamp:
      type: string
      format: date-time
    ClientToken:
      type: string
      pattern: "[a-zA-Z0-9-]+"
    ResourceTagList:
      type: array
      items:
        $ref: "#/components/schemas/ResourceTag"
    ResourceTag:
      description: The tag structure that contains a tag key and value.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/ResourceTagKey"
          description: The key that's associated with the tag.
        value:
          $ref: "#/components/schemas/ResourceTagValue"
          description: The value that's associated with the tag.
      required:
        - key
    ResourceTagKey:
      type: string
      minLength: 1
      maxLength: 128
    ResourceTagValue:
      type: string
      minLength: 0
      maxLength: 256
    CreateBillingViewResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/BillingViewArn"
          description: The Amazon Resource Name (ARN) that can be used to uniquely identify the billing view.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the billing view was created.
      required:
        - arn
    Boolean:
      type: boolean
    DeleteBillingViewResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/BillingViewArn"
          description: The Amazon Resource Name (ARN) that can be used to uniquely identify the billing view.
      required:
        - arn
    DisassociateSourceViewsResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/BillingViewArn"
          description: The ARN of the billing view that the source views were disassociated from.
      required:
        - arn
    GetBillingViewResponse:
      type: object
      properties:
        billingView:
          $ref: "#/components/schemas/BillingViewElement"
          description: The billing view element associated with the specified ARN.
      required:
        - billingView
    BillingViewElement:
      description: The metadata associated to the billing view.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/BillingViewArn"
          description: The Amazon Resource Name (ARN) that can be used to uniquely identify the billing view.
        name:
          $ref: "#/components/schemas/BillingViewName"
          description: The account name of the billing view.
        description:
          $ref: "#/components/schemas/BillingViewDescription"
          description: The description of the billing view.
        billingViewType:
          $ref: "#/components/schemas/BillingViewType"
          description: The type of billing group.
        ownerAccountId:
          $ref: "#/components/schemas/AccountId"
          description: The account owner of the billing view.
        sourceAccountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID that owns the source billing view, if this is a derived billing view.
        dataFilterExpression:
          $ref: "#/components/schemas/Expression"
          description: See Expression. Billing view only supports LINKED_ACCOUNT, Tags, and CostCategories.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the billing view was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the billing view was last updated.
        derivedViewCount:
          $ref: "#/components/schemas/Integer"
          description: The number of billing views that use this billing view as a source.
        sourceViewCount:
          $ref: "#/components/schemas/Integer"
          description: The number of source views associated with this billing view.
        viewDefinitionLastUpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of when the billing view definition was last updated.
        healthStatus:
          $ref: "#/components/schemas/BillingViewHealthStatus"
          description: The current health status of the billing view.
    BillingViewType:
      type: string
      enum:
        - PRIMARY
        - BILLING_GROUP
        - CUSTOM
        - BILLING_TRANSFER
        - BILLING_TRANSFER_SHOWBACK
    AccountId:
      type: string
      pattern: "[0-9]{12}"
    Integer:
      type: integer
    BillingViewHealthStatus:
      description: Represents the health status of a billing view, including a status code and optional reasons for the status.
      type: object
      properties:
        statusCode:
          $ref: "#/components/schemas/BillingViewStatus"
          description: The current health status code of the billing view.
        statusReasons:
          $ref: "#/components/schemas/BillingViewStatusReasons"
          description: A list of reasons explaining the current health status, if applicable.
    BillingViewStatus:
      type: string
      enum:
        - HEALTHY
        - UNHEALTHY
        - CREATING
        - UPDATING
    BillingViewStatusReasons:
      type: array
      items:
        $ref: "#/components/schemas/BillingViewStatusReason"
    BillingViewStatusReason:
      type: string
      enum:
        - SOURCE_VIEW_UNHEALTHY
        - SOURCE_VIEW_UPDATING
        - SOURCE_VIEW_ACCESS_DENIED
        - SOURCE_VIEW_NOT_FOUND
        - CYCLIC_DEPENDENCY
        - SOURCE_VIEW_DEPTH_EXCEEDED
        - AGGREGATE_SOURCE
        - VIEW_OWNER_NOT_MANAGEMENT_ACCOUNT
    ResourceArn:
      type: string
      pattern: arn:aws[a-z-]*:(billing)::[0-9]{12}:[a-zA-Z0-9/:_\+=\.\@-]{0,70}[a-zA-Z0-9]
    GetResourcePolicyResponse:
      type: object
      properties:
        resourceArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the billing view resource to which the policy is attached to.
        policy:
          $ref: "#/components/schemas/PolicyDocument"
          description: The resource-based policy document attached to the resource in JSON format.
      required:
        - resourceArn
    PolicyDocument:
      type: string
    ActiveTimeRange:
      description: A time range with a start and end time.
      type: object
      properties:
        activeAfterInclusive:
          $ref: "#/components/schemas/Timestamp"
          description: The inclusive time range start date.
        activeBeforeInclusive:
          $ref: "#/components/schemas/Timestamp"
          description: The inclusive time range end date.
      required:
        - activeAfterInclusive
        - activeBeforeInclusive
    BillingViewArnList:
      type: array
      items:
        $ref: "#/components/schemas/BillingViewArn"
    BillingViewTypeList:
      type: array
      items:
        $ref: "#/components/schemas/BillingViewType"
    StringSearches:
      type: array
      items:
        $ref: "#/components/schemas/StringSearch"
    StringSearch:
      description: A structure that defines how to search for string values. You can specify a search option and the value to search for.
      type: object
      properties:
        searchOption:
          $ref: "#/components/schemas/SearchOption"
          description: The type of search operation to perform on the string value. Determines how the search value is matched against the target field.
        searchValue:
          $ref: "#/components/schemas/SearchValue"
