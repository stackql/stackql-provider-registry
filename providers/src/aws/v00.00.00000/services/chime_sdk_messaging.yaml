            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /channels/{channel_arn}/expiration-settings:
    put:
      operationId: PutChannelExpirationSettings
      description: Sets the number of days before the channel is automatically deleted. A background process deletes expired channels within 6 hours of expiration. Actual deletion times may vary. Expired channels that have not yet been deleted appear as active, and you can update their expiration settings. The system honors the new settings. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUser or AppInstanceBot that makes the API call as the value in the header.
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel.
        - name: x-amz-chime-bearer
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ExpirationSettings:
                  $ref: "#/components/schemas/ExpirationSettings"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutChannelExpirationSettingsResponse"
  /channels/{channel_arn}/messages/{message_id}?operation=redact:
    post:
      operationId: RedactChannelMessage
      description: Redacts message content and metadata. The message exists in the back end, but the action returns null content, and the state shows as redacted. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUser or AppInstanceBot that makes the API call as the value in the header.
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel containing the messages that you want to redact.
        - name: message_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MessageId"
          description: The ID of the message being redacted.
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                SubChannelId:
                  $ref: "#/components/schemas/SubChannelId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedactChannelMessageResponse"
  /channels?operation=search:
    post:
      operationId: SearchChannels
      description: Allows the ChimeBearer to search channels by channel members. Users or bots can search across the channels that they belong to. Users in the AppInstanceAdmin role can search across all channels. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUser or AppInstanceBot that makes the API call as the value in the header. This operation isn't supported for AppInstanceUsers with a large number of memberships.
      parameters:
        - name: x-amz-chime-bearer
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The AppInstanceUserArn of the user making the API call.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of channels that you want returned.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token returned from previous API requests until the number of channels is reached.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Fields:
                  $ref: "#/components/schemas/SearchFields"
              required:
                - Fields
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchChannelsResponse"
  /tags?operation=tag-resource:
    post:
      operationId: TagResource
      description: Applies the specified tags to the specified Amazon Chime SDK messaging resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/ChimeArn"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - ResourceARN
      responses:
        "204":
          description: Success
  /tags?operation=untag-resource:
    post:
      operationId: UntagResource
      description: Removes the specified tags from the specified Amazon Chime SDK messaging resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/ChimeArn"
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - ResourceARN
                - TagKeys
      responses:
        "204":
          description: Success
  /channels/{channel_arn}/readMarker:
    put:
      operationId: UpdateChannelReadMarker
      description: The details of the time when a user last read messages in a channel. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUser or AppInstanceBot that makes the API call as the value in the header.
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel.
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateChannelReadMarkerResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ChimeArn:
      type: string
      minLength: 5
      maxLength: 1600
      pattern: arn:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[^/].{0,1023}
    ChannelMembershipType:
      type: string
      enum:
        - DEFAULT
        - HIDDEN
    MemberArns:
      type: array
      items:
        $ref: "#/components/schemas/ChimeArn"
    SubChannelId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[-_a-zA-Z0-9]*"
    BatchCreateChannelMembershipResponse:
      type: object
      properties:
        BatchChannelMemberships:
          $ref: "#/components/schemas/BatchChannelMemberships"
          description: The list of channel memberships in the response.
        Errors:
          $ref: "#/components/schemas/BatchCreateChannelMembershipErrors"
          description: If the action fails for one or more of the memberships in the request, a list of the memberships is returned, along with error codes and error messages.
    BatchChannelMemberships:
      description: The membership information, including member ARNs, the channel ARN, and membership types.
      type: object
      properties:
        InvitedBy:
          $ref: "#/components/schemas/Identity"
          description: The identifier of the member who invited another member.
        Type:
          $ref: "#/components/schemas/ChannelMembershipType"
          description: The membership types set for the channel members.
        Members:
          $ref: "#/components/schemas/Members"
          description: The users successfully added to the request.
        ChannelArn:
          $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel to which you're adding members.
        SubChannelId:
          $ref: "#/components/schemas/SubChannelId"
          description: The ID of the SubChannel.
    Identity:
      description: The details of a user or bot.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ChimeArn"
          description: The ARN in an Identity.
        Name:
          $ref: "#/components/schemas/ResourceName"
          description: The name in an Identity.
    ResourceName:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[\\u0009\\u000A\\u000D\\u0020-\\u007E\\u0085\\u00A0-\\uD7FF\\uE000-\\uFFFD\\u10000-\\u10FFFF]*"
    Members:
      type: array
      items:
        $ref: "#/components/schemas/Identity"
    BatchCreateChannelMembershipErrors:
      type: array
      items:
        $ref: "#/components/schemas/BatchCreateChannelMembershipError"
    BatchCreateChannelMembershipError:
      description: A list of failed member ARNs, error codes, and error messages.
      type: object
      properties:
        MemberArn:
          $ref: "#/components/schemas/ChimeArn"
          description: The AppInstanceUserArn of the member that the service couldn't add.
        ErrorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code.
        ErrorMessage:
          $ref: "#/components/schemas/String"
          description: The error message.
    ErrorCode:
      type: string
      enum:
        - BadRequest
        - Conflict
        - Forbidden
        - NotFound
        - PreconditionFailed
        - ResourceLimitExceeded
        - ServiceFailure
        - AccessDenied
        - ServiceUnavailable
        - Throttled
        - Throttling
        - Unauthorized
        - Unprocessable
        - VoiceConnectorGroupAssociationsExist
        - PhoneNumberAssociationsExist
    String:
      type: string
    CallbackIdType:
      type: string
      minLength: 32
      maxLength: 64
    NonNullableBoolean:
      type: boolean
    ChannelMessageCallback:
      description: Stores information about a callback.
      type: object
      properties:
        MessageId:
          $ref: "#/components/schemas/MessageId"
          description: The message ID.
        Content:
          $ref: "#/components/schemas/NonEmptyContent"
          description: The message content. For Amazon Lex V2 bot responses, this field holds a list of messages originating from the bot. For more information, refer to Processing responses from an AppInstanceBot in the Amazon Chime SDK Messaging Developer Guide.
        Metadata:
          $ref: "#/components/schemas/Metadata"
          description: The message metadata.
        PushNotification:
          $ref: "#/components/schemas/PushNotificationConfiguration"
          description: The push notification configuration of the message.
        MessageAttributes:
          type: object
          properties: {}
          description: The attributes for the channel message. For Amazon Lex V2 bot responses, the attributes are mapped to specific fields from the bot. For more information, refer to Processing responses from an AppInstanceBot in the Amazon Chime SDK Messaging Developer Guide.
        SubChannelId:
          $ref: "#/components/schemas/SubChannelId"
          description: The ID of the SubChannel.
        ContentType:
          $ref: "#/components/schemas/ContentType"
          description: The content type of the call-back message. For Amazon Lex V2 bot responses, the content type is application/amz-chime-lex-msgs for success responses and application/amz-chime-lex-error for failure responses. For more information, refer to Processing responses from an AppInstanceBot in the Amazon Chime SDK Messaging Developer Guide.
      required:
        - MessageId
    MessageId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[-_a-zA-Z0-9]*"
    NonEmptyContent:
      type: string
      minLength: 1
      pattern: "[\\s\\S]*"
    Metadata:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: .*
    PushNotificationConfiguration:
      description: The push notification configuration of the message.
      type: object
      properties:
        Title:
          $ref: "#/components/schemas/PushNotificationTitle"
          description: The title of the push notification.
        Body:
          $ref: "#/components/schemas/PushNotificationBody"
          description: The body of the push notification.
        Type:
          $ref: "#/components/schemas/PushNotificationType"
          description: "Enum value that indicates the type of the push notification for a message. DEFAULT: Normal mobile push notification. VOIP: VOIP mobile push notification."
    PushNotificationTitle:
      type: string
      minLength: 1
      maxLength: 50
      pattern: .*
    PushNotificationBody:
      type: string
      minLength: 1
      maxLength: 150
      pattern: "[\\s\\S]*"
    PushNotificationType:
      type: string
      enum:
        - DEFAULT
        - VOIP
    ContentType:
      type: string
      minLength: 0
      maxLength: 45
      pattern: "[\\s\\S]*"
    ChannelFlowCallbackResponse:
      type: object
      properties:
        ChannelArn:
          $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel.
        CallbackId:
          $ref: "#/components/schemas/CallbackIdType"
          description: The call back ID passed in the request.
    NonEmptyResourceName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\u0009\\u000A\\u000D\\u0020-\\u007E\\u0085\\u00A0-\\uD7FF\\uE000-\\uFFFD\\u10000-\\u10FFFF]*"
    ChannelMode:
      type: string
      enum:
        - UNRESTRICTED
        - RESTRICTED
    ChannelPrivacy:
      type: string
      enum:
        - PUBLIC
        - PRIVATE
    ClientRequestToken:
      type: string
      minLength: 2
      maxLength: 64
      pattern: "[-_a-zA-Z0-9]*"
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A tag object containing a key-value pair.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key in a tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value in a tag.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 1
      maxLength: 256
    ChannelId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z0-9]([A-Za-z0-9\\:\\-\\_\\.\\@]{0,62}[A-Za-z0-9])?"
    ChannelMemberArns:
      type: array
      items:
        $ref: "#/components/schemas/ChimeArn"
    ChannelModeratorArns:
      type: array
      items:
        $ref: "#/components/schemas/ChimeArn"
    ElasticChannelConfiguration:
      description: The attributes required to configure and create an elastic channel. An elastic channel can support a maximum of 1-million members.
      type: object
      properties:
        MaximumSubChannels:
          $ref: "#/components/schemas/MaximumSubChannels"
          description: The maximum number of SubChannels that you want to allow in the elastic channel.
        TargetMembershipsPerSubChannel:
          $ref: "#/components/schemas/TargetMembershipsPerSubChannel"
          description: The maximum number of members allowed in a SubChannel.
        MinimumMembershipPercentage:
          $ref: "#/components/schemas/MinimumMembershipPercentage"
          description: The minimum allowed percentage of TargetMembershipsPerSubChannel users. Ceil of the calculated value is used in balancing members among SubChannels of the elastic channel.
      required:
        - MaximumSubChannels
        - TargetMembershipsPerSubChannel
        - MinimumMembershipPercentage
    MaximumSubChannels:
      type: integer
      minimum: 2
    TargetMembershipsPerSubChannel:
      type: integer
      minimum: 2
    MinimumMembershipPercentage:
      type: integer
      minimum: 1
      maximum: 40
    ExpirationSettings:
      description: Settings that control the interval after which a channel is deleted.
      type: object
      properties:
        ExpirationDays:
          $ref: "#/components/schemas/ExpirationDays"
          description: The period in days after which the system automatically deletes a channel.
        ExpirationCriterion:
          $ref: "#/components/schemas/ExpirationCriterion"
          description: The conditions that must be met for a channel to expire.
      required:
        - ExpirationDays
        - ExpirationCriterion
    ExpirationDays:
      type: integer
      minimum: 1
      maximum: 5475
    ExpirationCriterion:
      type: string
      enum:
        - CREATED_TIMESTAMP
        - LAST_MESSAGE_TIMESTAMP
    CreateChannelResponse:
      type: object
      properties:
        ChannelArn:
          $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel.
    CreateChannelBanResponse:
      type: object
      properties:
        ChannelArn:
          $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the response to the ban request.
        Member:
          $ref: "#/components/schemas/Identity"
          description: The ChannelArn and BannedIdentity of the member in the ban response.
    ProcessorList:
      type: array
      items:
        $ref: "#/components/schemas/Processor"
    Processor:
      description: The information about a processor in a channel flow.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyResourceName"
          description: The name of the channel flow.
        Configuration:
          $ref: "#/components/schemas/ProcessorConfiguration"
          description: The information about the type of processor and its identifier.
        ExecutionOrder:
          $ref: "#/components/schemas/ChannelFlowExecutionOrder"
          description: The sequence in which processors run. If you have multiple processors in a channel flow, message processing goes through each processor in the sequence. The value determines the sequence. At this point, we support only 1 processor within a flow.
        FallbackAction:
          $ref: "#/components/schemas/FallbackAction"
          description: Determines whether to continue with message processing or stop it in cases where communication with a processor fails. If a processor has a fallback action of ABORT and communication with it fails, the processor sets the message status to FAILED and does not send the message to any recipients. Note that if the last processor in the channel flow sequence has a fallback action of CONTINUE and communication with the processor fails, then the message is considered processed and sent to recipients of the channel.
      required:
        - Name
        - Configuration
        - ExecutionOrder
        - FallbackAction
    ProcessorConfiguration:
      description: A processor's metadata.
      type: object
      properties:
        Lambda:
          $ref: "#/components/schemas/LambdaConfiguration"
          description: Indicates that the processor is of type Lambda.
      required:
        - Lambda
    LambdaConfiguration:
      description: Stores metadata about a Lambda processor.
      type: object
      properties:
        ResourceArn:
          $ref: "#/components/schemas/LambdaFunctionArn"
          description: The ARN of the Lambda message processing function.
        InvocationType:
          $ref: "#/components/schemas/InvocationType"
          description: Controls how the Lambda function is invoked.
      required:
        - ResourceArn
        - InvocationType
    LambdaFunctionArn:
      type: string
      minLength: 15
      maxLength: 2048
      pattern: arn:aws:lambda:[a-z]{2}-[a-z]+-\d{1}:\d{12}:function:[a-zA-Z0-9\-_\.]+(:(\$LATEST|[a-zA-Z0-9\-_]+))?
    InvocationType:
      type: string
      enum:
        - ASYNC
    ChannelFlowExecutionOrder:
      type: integer
      minimum: 1
      maximum: 3
    FallbackAction:
      type: string
      enum:
        - CONTINUE
        - ABORT
    CreateChannelFlowResponse:
      type: object
      properties:
        ChannelFlowArn:
          $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel flow.
    CreateChannelMembershipResponse:
      type: object
      properties:
        ChannelArn:
          $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel.
        Member:
          $ref: "#/components/schemas/Identity"
          description: The ARN and metadata of the member being added.
        SubChannelId:
          $ref: "#/components/schemas/SubChannelId"
          description: The ID of the SubChannel in the response.
    CreateChannelModeratorResponse:
      type: object
      properties:
        ChannelArn:
          $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel.
        ChannelModerator:
          $ref: "#/components/schemas/Identity"
          description: The ARNs of the channel and the moderator.
    DescribeChannelResponse:
      type: object
      properties:
        Channel:
          $ref: "#/components/schemas/Channel"
          description: The channel details.
    Channel:
      description: The details of a channel.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyResourceName"
          description: The name of a channel.
        ChannelArn:
          $ref: "#/components/schemas/ChimeArn"
          description: The ARN of a channel.
        Mode:
          $ref: "#/components/schemas/ChannelMode"
          description: The mode of the channel.
        Privacy:
          $ref: "#/components/schemas/ChannelPrivacy"
          description: The channel's privacy setting.
        Metadata:
          $ref: "#/components/schemas/Metadata"
          description: The channel's metadata.
        CreatedBy:
          $ref: "#/components/schemas/Identity"
          description: The AppInstanceUser who created the channel.
        CreatedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the AppInstanceUser created the channel.
        LastMessageTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which a member sent the last message in the channel.
        LastUpdatedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which a channel was last updated.
        ChannelFlowArn:
          $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel flow.
        ElasticChannelConfiguration:
          $ref: "#/components/schemas/ElasticChannelConfiguration"
          description: The attributes required to configure and create an elastic channel. An elastic channel can support a maximum of 1-million members.
        ExpirationSettings:
          $ref: "#/components/schemas/ExpirationSettings"
          description: Settings that control when a channel expires.
    Timestamp:
      type: string
      format: date-time
    DescribeChannelBanResponse:
      type: object
      properties:
        ChannelBan:
          $ref: "#/components/schemas/ChannelBan"
          description: The details of the ban.
    ChannelBan:
      description: The details of a channel ban.
      type: object
      properties:
        Member:
          $ref: "#/components/schemas/Identity"
          description: The member being banned from the channel.
        ChannelArn:
          $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel from which a member is being banned.
        CreatedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the ban was created.
        CreatedBy:
          $ref: "#/components/schemas/Identity"
          description: The AppInstanceUser who created the ban.
    DescribeChannelFlowResponse:
      type: object
      properties:
        ChannelFlow:
          $ref: "#/components/schemas/ChannelFlow"
          description: The channel flow details.
    ChannelFlow:
      description: The details of a channel flow.
      type: object
      properties:
        ChannelFlowArn:
          $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel flow.
        Processors:
          $ref: "#/components/schemas/ProcessorList"
          description: Information about the processor Lambda functions.
        Name:
          $ref: "#/components/schemas/NonEmptyResourceName"
          description: The name of the channel flow.
        CreatedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the channel flow was created.
        LastUpdatedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which a channel flow was updated.
    DescribeChannelMembershipResponse:
      type: object
      properties:
        ChannelMembership:
          $ref: "#/components/schemas/ChannelMembership"
          description: The details of the membership.
    ChannelMembership:
      description: The details of a channel member.
      type: object
      properties:
        InvitedBy:
          $ref: "#/components/schemas/Identity"
          description: The identifier of the member who invited another member.
        Type:
          $ref: "#/components/schemas/ChannelMembershipType"
          description: The membership type set for the channel member.
        Member:
          $ref: "#/components/schemas/Identity"
          description: The data of the channel member.
        ChannelArn:
          $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the member's channel.
        CreatedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the channel membership was created.
        LastUpdatedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which a channel membership was last updated.
        SubChannelId:
          $ref: "#/components/schemas/SubChannelId"
          description: The ID of the SubChannel that a user belongs to.
    DescribeChannelMembershipForAppInstanceUserResponse:
      type: object
      properties:
        ChannelMembership:
          $ref: "#/components/schemas/ChannelMembershipForAppInstanceUserSummary"
          description: The channel to which a user belongs.
    ChannelMembershipForAppInstanceUserSummary:
      description: Summary of the channel membership details of an AppInstanceUser.
      type: object
      properties:
        ChannelSummary:
          $ref: "#/components/schemas/ChannelSummary"
          description: Returns the channel data for an AppInstance.
        AppInstanceUserMembershipSummary:
          $ref: "#/components/schemas/AppInstanceUserMembershipSummary"
          description: Returns the channel membership data for an AppInstance.
    ChannelSummary:
      description: Summary of the details of a Channel.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyResourceName"
          description: The name of the channel.
        ChannelArn:
          $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel.
        Mode:
          $ref: "#/components/schemas/ChannelMode"
          description: The mode of the channel.
        Privacy:
          $ref: "#/components/schemas/ChannelPrivacy"
          description: The privacy setting of the channel.
        Metadata:
          $ref: "#/components/schemas/Metadata"
