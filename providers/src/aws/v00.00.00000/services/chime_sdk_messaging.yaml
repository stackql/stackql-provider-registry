openapi: 3.0.0
info:
  version: "2021-05-15"
  title: Amazon Chime SDK Messaging
  description: Amazon Chime SDK Messaging
  x-serviceName: chime
  x-serviceAlias: chime_sdk_messaging
  x-protocol: rest-json
  x-apiVersion: "2021-05-15"
  x-endpointPrefix: messaging-chime
servers:
  - url: https://messaging-chime.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for chime-sdk-messaging
paths:
  /channels/{channel_arn}/channel-flow:
    put:
      operationId: AssociateChannelFlow
      description: Associates a channel flow with a channel. Once associated, all messages to that channel go through channel flow processors. To stop processing, use the DisassociateChannelFlow API. Only administrators or channel moderators can associate a channel flow. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUser or AppInstanceBot that makes the API call as the value in the header.
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel.
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The AppInstanceUserArn of the user making the API call.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChannelFlowArn:
                  $ref: "#/components/schemas/ChimeArn"
              required:
                - ChannelFlowArn
      responses:
        "200":
          description: Success
  /channels/{channel_arn}/memberships?operation=batch-create:
    post:
      operationId: BatchCreateChannelMembership
      description: Adds a specified number of users and bots to a channel.
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel to which you're adding users or bots.
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Type:
                  $ref: "#/components/schemas/ChannelMembershipType"
                MemberArns:
                  $ref: "#/components/schemas/MemberArns"
                SubChannelId:
                  $ref: "#/components/schemas/SubChannelId"
              required:
                - MemberArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateChannelMembershipResponse"
  /channels/{channel_arn}?operation=channel-flow-callback:
    post:
      operationId: ChannelFlowCallback
      description: "Calls back Amazon Chime SDK messaging with a processing response message. This should be invoked from the processor Lambda. This is a developer API. You can return one of the following processing responses: Update message content or metadata Deny a message Make no changes to the message"
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CallbackId:
                  $ref: "#/components/schemas/CallbackIdType"
                DeleteResource:
                  $ref: "#/components/schemas/NonNullableBoolean"
                ChannelMessage:
                  $ref: "#/components/schemas/ChannelMessageCallback"
              required:
                - CallbackId
                - ChannelMessage
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelFlowCallbackResponse"
  /channels:
    post:
      operationId: CreateChannel
      description: "Creates a channel to which you can add users and send messages. Restriction: You can't change a channel's privacy. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUser or AppInstanceBot that makes the API call as the value in the header."
      parameters:
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AppInstanceArn:
                  $ref: "#/components/schemas/ChimeArn"
                Name:
                  $ref: "#/components/schemas/NonEmptyResourceName"
                Mode:
                  $ref: "#/components/schemas/ChannelMode"
                Privacy:
                  $ref: "#/components/schemas/ChannelPrivacy"
                Metadata:
                  $ref: "#/components/schemas/Metadata"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Tags:
                  $ref: "#/components/schemas/TagList"
                ChannelId:
                  $ref: "#/components/schemas/ChannelId"
                MemberArns:
                  $ref: "#/components/schemas/ChannelMemberArns"
                ModeratorArns:
                  $ref: "#/components/schemas/ChannelModeratorArns"
                ElasticChannelConfiguration:
                  $ref: "#/components/schemas/ElasticChannelConfiguration"
                ExpirationSettings:
                  $ref: "#/components/schemas/ExpirationSettings"
              required:
                - AppInstanceArn
                - Name
                - ClientRequestToken
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelResponse"
    get:
      operationId: ListChannels
      description: Lists all Channels created under a single Chime App as a paginated list. You can specify filters to narrow results. Functionality & restrictions Use privacy = PUBLIC to retrieve all public channels in the account. Only an AppInstanceAdmin can set privacy = PRIVATE to list the private channels in an account. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUser or AppInstanceBot that makes the API call as the value in the header.
      parameters:
        - name: app-instance-arn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstance.
        - name: privacy
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ChannelPrivacy"
          description: The privacy setting. PUBLIC retrieves all the public channels. PRIVATE retrieves private channels. Only an AppInstanceAdmin can retrieve private channels.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of channels that you want to return.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token passed by previous API calls until all requested channels are returned.
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChannelsResponse"
  /channels/{channel_arn}/bans:
    post:
      operationId: CreateChannelBan
      description: Permanently bans a member from a channel. Moderators can't add banned members to a channel. To undo a ban, you first have to DeleteChannelBan, and then CreateChannelMembership. Bans are cleaned up when you delete users or channels. If you ban a user who is already part of a channel, that user is automatically kicked from the channel. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUser or AppInstanceBot that makes the API call as the value in the header.
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the ban request.
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MemberArn:
                  $ref: "#/components/schemas/ChimeArn"
              required:
                - MemberArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelBanResponse"
    get:
      operationId: ListChannelBans
      description: Lists all the users and bots banned from a particular channel. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUser or AppInstanceBot that makes the API call as the value in the header.
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of bans that you want returned.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token passed by previous API calls until all requested bans are returned.
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChannelBansResponse"
  /channel-flows:
    post:
      operationId: CreateChannelFlow
      description: "Creates a channel flow, a container for processors. Processors are AWS Lambda functions that perform actions on chat messages, such as stripping out profanity. You can associate channel flows with channels, and the processors in the channel flow then take action on all messages sent to that channel. This is a developer API. Channel flows process the following items: New and updated messages Persistent and non-persistent messages The Standard message type Channel flows don't process Control or System messages. For more information about the message types provided by Chime SDK messaging, refer to Message types in the Amazon Chime developer guide."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AppInstanceArn:
                  $ref: "#/components/schemas/ChimeArn"
                Processors:
                  $ref: "#/components/schemas/ProcessorList"
                Name:
                  $ref: "#/components/schemas/NonEmptyResourceName"
                Tags:
                  $ref: "#/components/schemas/TagList"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - AppInstanceArn
                - Processors
                - Name
                - ClientRequestToken
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelFlowResponse"
    get:
      operationId: ListChannelFlows
      description: Returns a paginated lists of all the channel flows created under a single Chime. This is a developer API.
      parameters:
        - name: app-instance-arn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the app instance.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of channel flows that you want to return.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token passed by previous API calls until all requested channel flows are returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChannelFlowsResponse"
  /channels/{channel_arn}/memberships:
    post:
      operationId: CreateChannelMembership
      description: "Adds a member to a channel. The InvitedBy field in ChannelMembership is derived from the request header. A channel member can: List messages Send messages Receive messages Edit their own messages Leave the channel Privacy settings impact this action as follows: Public Channels: You do not need to be a member to list messages, but you must be a member to send messages. Private Channels: You must be a member to list or send messages. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUserArn or AppInstanceBot that makes the API call as the value in the header."
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel to which you're adding users.
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MemberArn:
                  $ref: "#/components/schemas/ChimeArn"
                Type:
                  $ref: "#/components/schemas/ChannelMembershipType"
                SubChannelId:
                  $ref: "#/components/schemas/SubChannelId"
              required:
                - MemberArn
                - Type
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelMembershipResponse"
    get:
      operationId: ListChannelMemberships
      description: Lists all channel memberships in a channel. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUser or AppInstanceBot that makes the API call as the value in the header. If you want to list the channels to which a specific app instance user belongs, see the ListChannelMembershipsForAppInstanceUser API.
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The maximum number of channel memberships that you want returned.
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ChannelMembershipType"
          description: The membership type of a user, DEFAULT or HIDDEN. Default members are returned as part of ListChannelMemberships if no type is specified. Hidden members are only returned if the type filter in ListChannelMemberships equals HIDDEN.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of channel memberships that you want returned.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token passed by previous API calls until all requested channel memberships are returned.
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
        - name: sub-channel-id
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SubChannelId"
          description: The ID of the SubChannel in the request. Only required when listing a user's memberships in a particular sub-channel of an elastic channel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChannelMembershipsResponse"
  /channels/{channel_arn}/moderators:
    post:
      operationId: CreateChannelModerator
      description: "Creates a new ChannelModerator. A channel moderator can: Add and remove other members of the channel. Add and remove other moderators of the channel. Add and remove user bans for the channel. Redact messages in the channel. List messages in the channel. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUser or AppInstanceBotof the user that makes the API call as the value in the header."
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel.
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChannelModeratorArn:
                  $ref: "#/components/schemas/ChimeArn"
              required:
                - ChannelModeratorArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelModeratorResponse"
    get:
      operationId: ListChannelModerators
      description: Lists all the moderators for a channel. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUser or AppInstanceBot that makes the API call as the value in the header.
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of moderators that you want returned.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token passed by previous API calls until all requested moderators are returned.
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChannelModeratorsResponse"
  /channels/{channel_arn}:
    delete:
      operationId: DeleteChannel
      description: Immediately makes a channel and its memberships inaccessible and marks them for deletion. This is an irreversible process. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUserArn or AppInstanceBot that makes the API call as the value in the header.
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel being deleted.
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
      responses:
        "204":
          description: Success
    get:
      operationId: DescribeChannel
      description: Returns the full details of a channel in an Amazon Chime AppInstance. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUser or AppInstanceBot that makes the API call as the value in the header.
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel.
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeChannelResponse"
    put:
      operationId: UpdateChannel
      description: "Update a channel's attributes. Restriction: You can't change a channel's privacy. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUser or AppInstanceBot that makes the API call as the value in the header."
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel.
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NonEmptyResourceName"
                Mode:
                  $ref: "#/components/schemas/ChannelMode"
                Metadata:
                  $ref: "#/components/schemas/Metadata"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateChannelResponse"
  /channels/{channel_arn}/bans/{member_arn}:
    delete:
      operationId: DeleteChannelBan
      description: Removes a member from a channel's ban list. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUser or AppInstanceBot that makes the API call as the value in the header.
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel from which the AppInstanceUser was banned.
        - name: member_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser that you want to reinstate.
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
      responses:
        "204":
          description: Success
    get:
      operationId: DescribeChannelBan
      description: Returns the full details of a channel ban. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUser or AppInstanceBot that makes the API call as the value in the header.
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel from which the user is banned.
        - name: member_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The AppInstanceUserArn of the member being banned.
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeChannelBanResponse"
  /channel-flows/{channel_flow_arn}:
    delete:
      operationId: DeleteChannelFlow
      description: Deletes a channel flow, an irreversible process. This is a developer API. This API works only when the channel flow is not associated with any channel. To get a list of all channels that a channel flow is associated with, use the ListChannelsAssociatedWithChannelFlow API. Use the DisassociateChannelFlow API to disassociate a channel flow from all channels.
      parameters:
        - name: channel_flow_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel flow.
      responses:
        "204":
          description: Success
    get:
      operationId: DescribeChannelFlow
      description: Returns the full details of a channel flow in an Amazon Chime AppInstance. This is a developer API.
      parameters:
        - name: channel_flow_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel flow.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeChannelFlowResponse"
    put:
      operationId: UpdateChannelFlow
      description: Updates channel flow attributes. This is a developer API.
      parameters:
        - name: channel_flow_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Processors:
                  $ref: "#/components/schemas/ProcessorList"
                Name:
                  $ref: "#/components/schemas/NonEmptyResourceName"
              required:
                - Processors
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateChannelFlowResponse"
  /channels/{channel_arn}/memberships/{member_arn}:
    delete:
      operationId: DeleteChannelMembership
      description: Removes a member from a channel. The x-amz-chime-bearer request header is mandatory. Use the AppInstanceUserArn of the user that makes the API call as the value in the header.
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel from which you want to remove the user.
        - name: member_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The AppInstanceUserArn of the member that you're removing from the channel.
        - name: x-amz-chime-bearer
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the AppInstanceUser or AppInstanceBot that makes the API call.
        - name: sub-channel-id
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SubChannelId"
          description: The ID of the SubChannel in the request. Only for use by moderators.
      responses:
        "204":
          description: Success
    get:
      operationId: DescribeChannelMembership
      description: Returns the full details of a user's channel membership. The x-amz-chime-bearer request header is mandatory. Use the ARN of the AppInstanceUser or AppInstanceBot that makes the API call as the value in the header.
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
          description: The ARN of the channel.
        - name: member_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChimeArn"
