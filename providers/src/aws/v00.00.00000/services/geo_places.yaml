openapi: 3.0.0
info:
  version: "2020-11-19"
  title: Amazon Location Service Places V2
  description: Amazon Location Service Places V2
  x-serviceName: geo-places
  x-serviceAlias: geo_places
  x-protocol: rest-json
  x-apiVersion: "2020-11-19"
  x-endpointPrefix: geo-places
servers:
  - url: https://geo-places.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for geo-places
paths:
  /v2/autocomplete:
    post:
      operationId: Autocomplete
      description: Autocomplete completes potential places and addresses as the user types, based on the partial input. The API enhances the efficiency and accuracy of address by completing query based on a few entered keystrokes. It helps you by completing partial queries with valid address completion. Also, the API supports the filtering of results based on geographic location, country, or specific place types, and can be tailored using optional parameters like language and political views. For more information, see Autocomplete in the Amazon Location Service Developer Guide.
      parameters:
        - name: key
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApiKey"
          description: "Optional: The API key to be used for authorization. Either an API key or valid SigV4 signature must be provided when making a request."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                QueryText:
                  $ref: "#/components/schemas/AutocompleteRequestQueryTextString"
                MaxResults:
                  $ref: "#/components/schemas/AutocompleteRequestMaxResultsInteger"
                BiasPosition:
                  $ref: "#/components/schemas/Position"
                Filter:
                  $ref: "#/components/schemas/AutocompleteFilter"
                PostalCodeMode:
                  $ref: "#/components/schemas/PostalCodeMode"
                AdditionalFeatures:
                  $ref: "#/components/schemas/AutocompleteAdditionalFeatureList"
                Language:
                  $ref: "#/components/schemas/LanguageTag"
                PoliticalView:
                  $ref: "#/components/schemas/CountryCode"
                IntendedUse:
                  $ref: "#/components/schemas/AutocompleteIntendedUse"
              required:
                - QueryText
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutocompleteResponse"
  /v2/geocode:
    post:
      operationId: Geocode
      description: Geocode converts a textual address or place into geographic coordinates. You can obtain geographic coordinates, address component, and other related information. It supports flexible queries, including free-form text or structured queries with components like street names, postal codes, and regions. The Geocode API can also provide additional features such as time zone information and the inclusion of political views. For more information, see Geocode in the Amazon Location Service Developer Guide.
      parameters:
        - name: key
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApiKey"
          description: "Optional: The API key to be used for authorization. Either an API key or valid SigV4 signature must be provided when making a request."
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                QueryText:
                  $ref: "#/components/schemas/GeocodeRequestQueryTextString"
                QueryComponents:
                  $ref: "#/components/schemas/GeocodeQueryComponents"
                MaxResults:
                  $ref: "#/components/schemas/GeocodeRequestMaxResultsInteger"
                BiasPosition:
                  $ref: "#/components/schemas/Position"
                Filter:
                  $ref: "#/components/schemas/GeocodeFilter"
                AdditionalFeatures:
                  $ref: "#/components/schemas/GeocodeAdditionalFeatureList"
                Language:
                  $ref: "#/components/schemas/LanguageTag"
                PoliticalView:
                  $ref: "#/components/schemas/CountryCode"
                IntendedUse:
                  $ref: "#/components/schemas/GeocodeIntendedUse"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeocodeResponse"
  /v2/place/{place_id}:
    get:
      operationId: GetPlace
      description: GetPlace finds a place by its unique ID. A PlaceId is returned by other place operations. For more information, see GetPlace in the Amazon Location Service Developer Guide.
      parameters:
        - name: place_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GetPlaceRequestPlaceIdString"
          description: The PlaceId of the place you wish to receive the information for.
        - name: additional-features
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GetPlaceAdditionalFeatureList"
          description: A list of optional additional parameters such as time zone that can be requested for each result. For GrabMaps customers, ap-southeast-1 and ap-southeast-5 regions support only the TimeZone value.
        - name: language
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LanguageTag"
          description: "A list of BCP 47 compliant language codes for the results to be rendered in. If there is no data for the result in the requested language, data will be returned in the default language for the entry. For GrabMaps customers, ap-southeast-1 and ap-southeast-5 regions support only the following codes: en, id, km, lo, ms, my, pt, th, tl, vi, zh"
        - name: political-view
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CountryCode"
          description: The alpha-2 or alpha-3 character code for the political view of a country. The political view applies to the results of the request to represent unresolved territorial claims through the point of view of the specified country. Not supported in ap-southeast-1 and ap-southeast-5 regions for GrabMaps customers.
        - name: intended-use
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GetPlaceIntendedUse"
          description: Indicates if the query results will be persisted in customer infrastructure. Defaults to SingleUse (not stored). Not supported in ap-southeast-1 and ap-southeast-5 regions for GrabMaps customers. When storing GetPlace responses, you must set this field to Storage to comply with the terms of service. These requests will be charged at a higher rate. Please review the user agreement and service pricing structure to determine the correct setting for your use case.
        - name: key
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApiKey"
          description: "Optional: The API key to be used for authorization. Either an API key or valid SigV4 signature must be provided when making a request."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPlaceResponse"
  /v2/reverse-geocode:
    post:
      operationId: ReverseGeocode
      description: ReverseGeocode converts geographic coordinates into a human-readable address or place. You can obtain address component, and other related information such as place type, category, street information. The Reverse Geocode API supports filtering to on place type so that you can refine result based on your need. Also, The Reverse Geocode API can also provide additional features such as time zone information and the inclusion of political views. For more information, see Reverse Geocode in the Amazon Location Service Developer Guide.
      parameters:
        - name: key
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApiKey"
          description: "Optional: The API key to be used for authorization. Either an API key or valid SigV4 signature must be provided when making a request."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                QueryPosition:
                  $ref: "#/components/schemas/Position"
                QueryRadius:
                  $ref: "#/components/schemas/ReverseGeocodeRequestQueryRadiusLong"
                MaxResults:
                  $ref: "#/components/schemas/ReverseGeocodeRequestMaxResultsInteger"
                Filter:
                  $ref: "#/components/schemas/ReverseGeocodeFilter"
                AdditionalFeatures:
                  $ref: "#/components/schemas/ReverseGeocodeAdditionalFeatureList"
                Language:
                  $ref: "#/components/schemas/LanguageTag"
                PoliticalView:
                  $ref: "#/components/schemas/CountryCode"
                IntendedUse:
                  $ref: "#/components/schemas/ReverseGeocodeIntendedUse"
                Heading:
                  $ref: "#/components/schemas/Heading"
              required:
                - QueryPosition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReverseGeocodeResponse"
  /v2/search-nearby:
    post:
      operationId: SearchNearby
      description: SearchNearby queries for points of interest within a radius from a central coordinates, returning place results with optional filters such as categories, business chains, food types and more. The API returns details such as a place name, address, phone, category, food type, contact, opening hours. Also, the API can return phonemes, time zones and more based on requested parameters. For more information, see Search Nearby in the Amazon Location Service Developer Guide.
      parameters:
        - name: key
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApiKey"
          description: "Optional: The API key to be used for authorization. Either an API key or valid SigV4 signature must be provided when making a request."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                QueryPosition:
                  $ref: "#/components/schemas/Position"
                QueryRadius:
                  $ref: "#/components/schemas/SearchNearbyRequestQueryRadiusLong"
                MaxResults:
                  $ref: "#/components/schemas/SearchNearbyRequestMaxResultsInteger"
                Filter:
                  $ref: "#/components/schemas/SearchNearbyFilter"
                AdditionalFeatures:
                  $ref: "#/components/schemas/SearchNearbyAdditionalFeatureList"
                Language:
                  $ref: "#/components/schemas/LanguageTag"
                PoliticalView:
                  $ref: "#/components/schemas/CountryCode"
                IntendedUse:
                  $ref: "#/components/schemas/SearchNearbyIntendedUse"
                NextToken:
                  $ref: "#/components/schemas/Token"
              required:
                - QueryPosition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchNearbyResponse"
  /v2/search-text:
    post:
      operationId: SearchText
      description: SearchText searches for geocode and place information. You can then complete a follow-up query suggested from the Suggest API via a query id. For more information, see Search Text in the Amazon Location Service Developer Guide.
      parameters:
        - name: key
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApiKey"
          description: "Optional: The API key to be used for authorization. Either an API key or valid SigV4 signature must be provided when making a request."
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                QueryText:
                  $ref: "#/components/schemas/SearchTextRequestQueryTextString"
                QueryId:
                  $ref: "#/components/schemas/SearchTextRequestQueryIdString"
                MaxResults:
                  $ref: "#/components/schemas/SearchTextRequestMaxResultsInteger"
                BiasPosition:
                  $ref: "#/components/schemas/Position"
                Filter:
                  $ref: "#/components/schemas/SearchTextFilter"
                AdditionalFeatures:
                  $ref: "#/components/schemas/SearchTextAdditionalFeatureList"
                Language:
                  $ref: "#/components/schemas/LanguageTag"
                PoliticalView:
                  $ref: "#/components/schemas/CountryCode"
                IntendedUse:
                  $ref: "#/components/schemas/SearchTextIntendedUse"
                NextToken:
                  $ref: "#/components/schemas/Token"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchTextResponse"
  /v2/suggest:
    post:
      operationId: Suggest
      description: Suggest provides intelligent predictions or recommendations based on the user's input or context, such as relevant places, points of interest, query terms or search category. It is designed to help users find places or point of interests candidates or identify a follow on query based on incomplete or misspelled queries. It returns a list of possible matches or refinements that can be used to formulate a more accurate query. Users can select the most appropriate suggestion and use it for further searching. The API provides options for filtering results by location and other attributes, and allows for additional features like phonemes and timezones. The response includes refined query terms and detailed place information. For more information, see Suggest in the Amazon Location Service Developer Guide.
      parameters:
        - name: key
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApiKey"
          description: "Optional: The API key to be used for authorization. Either an API key or valid SigV4 signature must be provided when making a request."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                QueryText:
                  $ref: "#/components/schemas/SuggestRequestQueryTextString"
                MaxResults:
                  $ref: "#/components/schemas/SuggestRequestMaxResultsInteger"
                MaxQueryRefinements:
                  $ref: "#/components/schemas/SuggestRequestMaxQueryRefinementsInteger"
                BiasPosition:
                  $ref: "#/components/schemas/Position"
                Filter:
                  $ref: "#/components/schemas/SuggestFilter"
                AdditionalFeatures:
                  $ref: "#/components/schemas/SuggestAdditionalFeatureList"
                Language:
                  $ref: "#/components/schemas/LanguageTag"
                PoliticalView:
                  $ref: "#/components/schemas/CountryCode"
                IntendedUse:
                  $ref: "#/components/schemas/SuggestIntendedUse"
              required:
                - QueryText
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ApiKey:
      type: string
      minLength: 0
      maxLength: 1000
    AutocompleteRequestQueryTextString:
      type: string
      minLength: 1
      maxLength: 200
    AutocompleteRequestMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 20
    Position:
      type: array
      items:
        $ref: "#/components/schemas/Double"
    Double:
      type: number
      format: double
    AutocompleteFilter:
      description: Autocomplete structure which contains a set of inclusion/exclusion properties that results must possess in order to be returned as a result.
      type: object
      properties:
        BoundingBox:
          $ref: "#/components/schemas/BoundingBox"
          description: "The bounding box enclosing the geometric shape (area or line) that an individual result covers. The bounding box formed is defined as a set 4 coordinates: [{westward lng}, {southern lat}, {eastward lng}, {northern lat}]"
        Circle:
          $ref: "#/components/schemas/FilterCircle"
        IncludeCountries:
          $ref: "#/components/schemas/CountryCodeList"
          description: A list of countries that all results must be in. Countries are represented by either their alpha-2 or alpha-3 character codes.
        IncludePlaceTypes:
          $ref: "#/components/schemas/AutocompleteFilterPlaceTypeList"
          description: The included place types.
    BoundingBox:
      type: array
      items:
        $ref: "#/components/schemas/Double"
    FilterCircle:
      description: The Circle that all results must be in.
      type: object
      properties:
        Center:
          $ref: "#/components/schemas/Position"
          description: "The center position in World Geodetic System (WGS 84) format: [longitude, latitude]."
        Radius:
          $ref: "#/components/schemas/FilterCircleRadiusLong"
          description: The radius, in meters, of the FilterCircle. For GrabMaps customers,ap-southeast-1 and ap-southeast-5 regions support only up to a maximum value of 300,000.
      required:
        - Center
        - Radius
    FilterCircleRadiusLong:
      type: integer
      format: int64
      minimum: 1
      maximum: 21000000
    CountryCodeList:
      type: array
      items:
        $ref: "#/components/schemas/CountryCode"
    CountryCode:
      type: string
      minLength: 2
      maxLength: 3
      pattern: ([A-Z]{2}|[A-Z]{3})
    AutocompleteFilterPlaceTypeList:
      type: array
      items:
        $ref: "#/components/schemas/AutocompleteFilterPlaceType"
    AutocompleteFilterPlaceType:
      type: string
      enum:
        - Locality
        - PostalCode
    PostalCodeMode:
      type: string
      enum:
        - MergeAllSpannedLocalities
        - EnumerateSpannedLocalities
    AutocompleteAdditionalFeatureList:
      type: array
      items:
        $ref: "#/components/schemas/AutocompleteAdditionalFeature"
    AutocompleteAdditionalFeature:
      type: string
      enum:
        - Core
    LanguageTag:
      type: string
      minLength: 2
      maxLength: 35
    AutocompleteIntendedUse:
      type: string
      enum:
        - SingleUse
    AutocompleteResponse:
      type: object
      properties:
        PricingBucket:
          $ref: "#/components/schemas/String"
          description: The pricing bucket for which the query is charged at. For more information on pricing, please visit Amazon Location Service Pricing.
        ResultItems:
          $ref: "#/components/schemas/AutocompleteResultItemList"
          description: List of places or results returned for a query.
      required:
        - PricingBucket
    String:
      type: string
    AutocompleteResultItemList:
      type: array
      items:
        $ref: "#/components/schemas/AutocompleteResultItem"
    AutocompleteResultItem:
      description: A result matching the input query text.
      type: object
      properties:
        PlaceId:
          $ref: "#/components/schemas/AutocompleteResultItemPlaceIdString"
          description: The PlaceId of the place associated with this result. This can be used to look up additional details about the result via GetPlace.
        PlaceType:
          $ref: "#/components/schemas/PlaceType"
          description: PlaceType describes the type of result entry returned.
        Title:
          $ref: "#/components/schemas/AutocompleteResultItemTitleString"
          description: A formatted string for display when presenting this result to an end user.
        Address:
          $ref: "#/components/schemas/Address"
          description: The address associated with this result.
        Distance:
          $ref: "#/components/schemas/DistanceMeters"
          description: The distance in meters between the center of the search area and this result. Useful to evaluate how far away from the original bias position the result is.
        Language:
          $ref: "#/components/schemas/LanguageTag"
          description: A list of BCP 47 compliant language codes for the results to be rendered in. If there is no data for the result in the requested language, data will be returned in the default language for the entry.
        PoliticalView:
          $ref: "#/components/schemas/CountryCode3"
          description: The alpha-2 or alpha-3 character code for the political view of a country. The political view applies to the results of the request to represent unresolved territorial claims through the point of view of the specified country.
        Highlights:
          $ref: "#/components/schemas/AutocompleteHighlights"
          description: Indicates the starting and ending index of the place in the text query that match the found title.
      required:
        - PlaceId
        - PlaceType
        - Title
    AutocompleteResultItemPlaceIdString:
      type: string
      minLength: 0
      maxLength: 500
    PlaceType:
      type: string
      enum:
        - Country
        - Region
        - SubRegion
        - Locality
        - District
        - SubDistrict
        - PostalCode
        - Block
        - SubBlock
        - Intersection
        - Street
        - PointOfInterest
        - PointAddress
        - InterpolatedAddress
        - SecondaryAddress
        - InferredSecondaryAddress
    AutocompleteResultItemTitleString:
      type: string
      minLength: 0
      maxLength: 200
    Address:
      description: The place address.
      type: object
      properties:
        Label:
          $ref: "#/components/schemas/AddressLabelString"
          description: Assembled address value built out of the address components, according to the regional postal rules. This is the correctly formatted address.
        Country:
          $ref: "#/components/schemas/Country"
          description: The country component of the address.
        Region:
          $ref: "#/components/schemas/Region"
          description: "The region or state results should be present in. Example: North Rhine-Westphalia."
        SubRegion:
          $ref: "#/components/schemas/SubRegion"
          description: The sub-region or county for which results should be present in.
        Locality:
          $ref: "#/components/schemas/AddressLocalityString"
          description: "The city or locality of the address. Example: Vancouver."
        District:
          $ref: "#/components/schemas/AddressDistrictString"
          description: The district or division of a locality associated with this address.
        SubDistrict:
          $ref: "#/components/schemas/AddressSubDistrictString"
          description: "A subdivision of a district. Example: Minden-Lübbecke."
        PostalCode:
          $ref: "#/components/schemas/AddressPostalCodeString"
          description: An alphanumeric string included in a postal address to facilitate mail sorting, such as post code, postcode, or ZIP code, for which the result should possess.
        Block:
          $ref: "#/components/schemas/AddressBlockString"
          description: "Name of the block. Not available in ap-southeast-1 and ap-southeast-5 regions for GrabMaps customers. Example: Sunny Mansion 203 block: 2 Chome"
        SubBlock:
          $ref: "#/components/schemas/AddressSubBlockString"
          description: "Name of sub-block. Not available in ap-southeast-1 and ap-southeast-5 regions for GrabMaps customers. Example: Sunny Mansion 203 sub-block: 4"
        Intersection:
          $ref: "#/components/schemas/IntersectionStreetList"
          description: 'Name of the streets in the intersection. Not available in ap-southeast-1 and ap-southeast-5 regions for GrabMaps customers. Example: ["Friedrichstraße","Unter den Linden"]'
        Street:
          $ref: "#/components/schemas/AddressStreetString"
          description: The name of the street results should be present in.
        StreetComponents:
          $ref: "#/components/schemas/StreetComponentsList"
          description: 'Components of the street. Not available in ap-southeast-1 and ap-southeast-5 regions for GrabMaps customers. Example: Yonge from "Yonge street".'
        AddressNumber:
          $ref: "#/components/schemas/AddressAddressNumberString"
          description: The number that identifies an address within a street.
        Building:
          $ref: "#/components/schemas/AddressBuildingString"
          description: The name of the building at the address. Not available in ap-southeast-1 and ap-southeast-5 regions for GrabMaps customers.
        SecondaryAddressComponents:
          $ref: "#/components/schemas/SecondaryAddressComponentList"
          description: "Components that correspond to secondary identifiers on an Address. Secondary address components include information such as Suite or Unit Number, Building, or Floor. Not available in ap-southeast-1 and ap-southeast-5 regions for GrabMaps customers. Coverage for Address.SecondaryAddressComponents is available in the following countries: AUS, CAN, NZL, USA, PRI"
    AddressLabelString:
      type: string
      minLength: 0
      maxLength: 200
    Country:
      description: The alpha-2 or alpha-3 character code for the country that the results will be present in.
      type: object
      properties:
        Code2:
          $ref: "#/components/schemas/CountryCode2"
          description: Country, represented by its alpha 2-character code.
        Code3:
          $ref: "#/components/schemas/CountryCode3"
          description: Country, represented by its alpha t-character code.
        Name:
          $ref: "#/components/schemas/CountryNameString"
          description: Name of the country.
    CountryCode2:
      type: string
      minLength: 2
      maxLength: 2
      pattern: "[A-Z]{2}"
    CountryCode3:
      type: string
      minLength: 3
      maxLength: 3
      pattern: "[A-Z]{3}"
    CountryNameString:
      type: string
      minLength: 0
      maxLength: 100
    Region:
      description: "The region or state results should be to be present in. Example: North Rhine-Westphalia."
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/RegionCodeString"
          description: "Abbreviated code for a the state, province or region of the country. Not available in ap-southeast-1 and ap-southeast-5 regions for GrabMaps customers. Example: BC."
        Name:
          $ref: "#/components/schemas/RegionNameString"
          description: "Name for a the state, province, or region of the country. Example: British Columbia."
    RegionCodeString:
      type: string
      minLength: 0
      maxLength: 3
    RegionNameString:
      type: string
      minLength: 0
      maxLength: 200
    SubRegion:
      description: The sub-region.
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/SubRegionCodeString"
          description: Abbreviated code for the county or sub-region. Not available in ap-southeast-1 and ap-southeast-5 regions for GrabMaps customers.
        Name:
          $ref: "#/components/schemas/SubRegionNameString"
          description: Name for the county or sub-region.
    SubRegionCodeString:
      type: string
      minLength: 0
      maxLength: 3
    SubRegionNameString:
      type: string
      minLength: 0
      maxLength: 200
    AddressLocalityString:
      type: string
      minLength: 0
      maxLength: 200
    AddressDistrictString:
      type: string
      minLength: 0
      maxLength: 200
    AddressSubDistrictString:
      type: string
      minLength: 0
      maxLength: 200
    AddressPostalCodeString:
      type: string
      minLength: 0
      maxLength: 50
    AddressBlockString:
      type: string
      minLength: 0
      maxLength: 200
    AddressSubBlockString:
      type: string
      minLength: 0
      maxLength: 200
    IntersectionStreetList:
      type: array
      items:
        $ref: "#/components/schemas/IntersectionStreet"
    IntersectionStreet:
      type: string
      minLength: 0
      maxLength: 200
    AddressStreetString:
      type: string
      minLength: 0
      maxLength: 200
    StreetComponentsList:
      type: array
      items:
        $ref: "#/components/schemas/StreetComponents"
    StreetComponents:
      description: Components of a street.
      type: object
      properties:
        BaseName:
          $ref: "#/components/schemas/StreetComponentsBaseNameString"
          description: 'Base name part of the street name. Example: Younge from the "Younge street".'
        Type:
          $ref: "#/components/schemas/StreetComponentsTypeString"
          description: 'Street type part of the street name. Example: "avenue".'
        TypePlacement:
          $ref: "#/components/schemas/TypePlacement"
          description: Defines if the street type is before or after the base name.
        TypeSeparator:
          $ref: "#/components/schemas/TypeSeparator"
          description: Defines a separator character such as "" or " " between the base name and type.
        Prefix:
          $ref: "#/components/schemas/StreetComponentsPrefixString"
