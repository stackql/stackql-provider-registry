openapi: 3.0.0
info:
  version: "2023-05-31"
  title: AWS Directory Service Data
  description: AWS Directory Service Data
  x-serviceName: ds-data
  x-serviceAlias: ds_data
  x-protocol: rest-json
  x-apiVersion: "2023-05-31"
  x-endpointPrefix: ds-data
  x-jsonVersion: "1.1"
servers:
  - url: https://ds-data.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for ds-data
paths:
  /GroupMemberships/AddGroupMember:
    post:
      operationId: AddGroupMember
      description: Adds an existing user, group, or computer as a group member.
      parameters:
        - name: DirectoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                GroupName:
                  $ref: "#/components/schemas/GroupName"
                MemberName:
                  $ref: "#/components/schemas/MemberName"
                MemberRealm:
                  $ref: "#/components/schemas/Realm"
              required:
                - GroupName
                - MemberName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddGroupMemberResult"
  /Groups/CreateGroup:
    post:
      operationId: CreateGroup
      description: Creates a new group.
      parameters:
        - name: DirectoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                GroupScope:
                  $ref: "#/components/schemas/GroupScope"
                GroupType:
                  $ref: "#/components/schemas/GroupType"
                OtherAttributes:
                  $ref: "#/components/schemas/Attributes"
                SAMAccountName:
                  $ref: "#/components/schemas/GroupName"
              required:
                - SAMAccountName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGroupResult"
  /Users/CreateUser:
    post:
      operationId: CreateUser
      description: Creates a new user.
      parameters:
        - name: DirectoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that’s associated with the user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                EmailAddress:
                  $ref: "#/components/schemas/EmailAddress"
                GivenName:
                  $ref: "#/components/schemas/GivenName"
                OtherAttributes:
                  $ref: "#/components/schemas/Attributes"
                SAMAccountName:
                  $ref: "#/components/schemas/UserName"
                Surname:
                  $ref: "#/components/schemas/Surname"
              required:
                - SAMAccountName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserResult"
  /Groups/DeleteGroup:
    post:
      operationId: DeleteGroup
      description: Deletes a group.
      parameters:
        - name: DirectoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                SAMAccountName:
                  $ref: "#/components/schemas/GroupName"
              required:
                - SAMAccountName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGroupResult"
  /Users/DeleteUser:
    post:
      operationId: DeleteUser
      description: Deletes a user.
      parameters:
        - name: DirectoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                SAMAccountName:
                  $ref: "#/components/schemas/UserName"
              required:
                - SAMAccountName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteUserResult"
  /Groups/DescribeGroup:
    post:
      operationId: DescribeGroup
      description: Returns information about a specific group.
      parameters:
        - name: DirectoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryId"
          description: The Identifier (ID) of the directory associated with the group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                OtherAttributes:
                  $ref: "#/components/schemas/LdapDisplayNameList"
                Realm:
                  $ref: "#/components/schemas/Realm"
                SAMAccountName:
                  $ref: "#/components/schemas/GroupName"
              required:
                - SAMAccountName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeGroupResult"
  /Users/DescribeUser:
    post:
      operationId: DescribeUser
      description: Returns information about a specific user.
      parameters:
        - name: DirectoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                OtherAttributes:
                  $ref: "#/components/schemas/LdapDisplayNameList"
                Realm:
                  $ref: "#/components/schemas/Realm"
                SAMAccountName:
                  $ref: "#/components/schemas/UserName"
              required:
                - SAMAccountName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeUserResult"
  /Users/DisableUser:
    post:
      operationId: DisableUser
      description: Deactivates an active user account. For information about how to enable an inactive user account, see ResetUserPassword in the Directory Service API Reference.
      parameters:
        - name: DirectoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                SAMAccountName:
                  $ref: "#/components/schemas/UserName"
              required:
                - SAMAccountName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableUserResult"
  /GroupMemberships/ListGroupMembers:
    post:
      operationId: ListGroupMembers
      description: Returns member information for the specified group. This operation supports pagination with the use of the NextToken request and response parameters. If more results are available, the ListGroupMembers.NextToken member contains a token that you pass in the next call to ListGroupMembers. This retrieves the next set of items. You can also specify a maximum number of return results with the MaxResults parameter.
      parameters:
        - name: DirectoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                MemberRealm:
                  $ref: "#/components/schemas/Realm"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                Realm:
                  $ref: "#/components/schemas/Realm"
                SAMAccountName:
                  $ref: "#/components/schemas/GroupName"
              required:
                - SAMAccountName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGroupMembersResult"
  /Groups/ListGroups:
    post:
      operationId: ListGroups
      description: Returns group information for the specified directory. This operation supports pagination with the use of the NextToken request and response parameters. If more results are available, the ListGroups.NextToken member contains a token that you pass in the next call to ListGroups. This retrieves the next set of items. You can also specify a maximum number of return results with the MaxResults parameter.
      parameters:
        - name: DirectoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the group.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                Realm:
                  $ref: "#/components/schemas/Realm"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGroupsResult"
  /GroupMemberships/ListGroupsForMember:
    post:
      operationId: ListGroupsForMember
      description: Returns group information for the specified member. This operation supports pagination with the use of the NextToken request and response parameters. If more results are available, the ListGroupsForMember.NextToken member contains a token that you pass in the next call to ListGroupsForMember. This retrieves the next set of items. You can also specify a maximum number of return results with the MaxResults parameter.
      parameters:
        - name: DirectoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                MemberRealm:
                  $ref: "#/components/schemas/Realm"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                Realm:
                  $ref: "#/components/schemas/Realm"
                SAMAccountName:
                  $ref: "#/components/schemas/MemberName"
              required:
                - SAMAccountName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGroupsForMemberResult"
  /Users/ListUsers:
    post:
      operationId: ListUsers
      description: Returns user information for the specified directory. This operation supports pagination with the use of the NextToken request and response parameters. If more results are available, the ListUsers.NextToken member contains a token that you pass in the next call to ListUsers. This retrieves the next set of items. You can also specify a maximum number of return results with the MaxResults parameter.
      parameters:
        - name: DirectoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the user.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                Realm:
                  $ref: "#/components/schemas/Realm"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUsersResult"
  /GroupMemberships/RemoveGroupMember:
    post:
      operationId: RemoveGroupMember
      description: Removes a member from a group.
      parameters:
        - name: DirectoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                GroupName:
                  $ref: "#/components/schemas/GroupName"
                MemberName:
                  $ref: "#/components/schemas/MemberName"
                MemberRealm:
                  $ref: "#/components/schemas/Realm"
              required:
                - GroupName
                - MemberName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveGroupMemberResult"
  /Groups/SearchGroups:
    post:
      operationId: SearchGroups
      description: Searches the specified directory for a group. You can find groups that match the SearchString parameter with the value of their attributes included in the SearchString parameter. This operation supports pagination with the use of the NextToken request and response parameters. If more results are available, the SearchGroups.NextToken member contains a token that you pass in the next call to SearchGroups. This retrieves the next set of items. You can also specify a maximum number of return results with the MaxResults parameter.
      parameters:
        - name: DirectoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                Realm:
                  $ref: "#/components/schemas/Realm"
                SearchAttributes:
                  $ref: "#/components/schemas/LdapDisplayNameList"
                SearchString:
                  $ref: "#/components/schemas/SearchString"
              required:
                - SearchAttributes
                - SearchString
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchGroupsResult"
  /Users/SearchUsers:
    post:
      operationId: SearchUsers
      description: Searches the specified directory for a user. You can find users that match the SearchString parameter with the value of their attributes included in the SearchString parameter. This operation supports pagination with the use of the NextToken request and response parameters. If more results are available, the SearchUsers.NextToken member contains a token that you pass in the next call to SearchUsers. This retrieves the next set of items. You can also specify a maximum number of return results with the MaxResults parameter.
      parameters:
        - name: DirectoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                Realm:
                  $ref: "#/components/schemas/Realm"
                SearchAttributes:
                  $ref: "#/components/schemas/LdapDisplayNameList"
                SearchString:
                  $ref: "#/components/schemas/SearchString"
              required:
                - SearchAttributes
                - SearchString
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchUsersResult"
  /Groups/UpdateGroup:
    post:
      operationId: UpdateGroup
      description: Updates group information.
      parameters:
        - name: DirectoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                GroupScope:
                  $ref: "#/components/schemas/GroupScope"
                GroupType:
                  $ref: "#/components/schemas/GroupType"
                OtherAttributes:
                  $ref: "#/components/schemas/Attributes"
                SAMAccountName:
                  $ref: "#/components/schemas/GroupName"
                UpdateType:
                  $ref: "#/components/schemas/UpdateType"
              required:
                - SAMAccountName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGroupResult"
  /Users/UpdateUser:
    post:
      operationId: UpdateUser
      description: Updates user information.
      parameters:
        - name: DirectoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                EmailAddress:
                  $ref: "#/components/schemas/EmailAddress"
                GivenName:
                  $ref: "#/components/schemas/GivenName"
                OtherAttributes:
                  $ref: "#/components/schemas/Attributes"
                SAMAccountName:
                  $ref: "#/components/schemas/UserName"
                Surname:
                  $ref: "#/components/schemas/Surname"
                UpdateType:
                  $ref: "#/components/schemas/UpdateType"
              required:
                - SAMAccountName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserResult"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DirectoryId:
      type: string
      pattern: ^d-[0-9a-f]{10}$
    ClientToken:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[\x00-\x7F]+$
    GroupName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[^:;|=+"*?<>/\\,\[\]@]+$
    MemberName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: ^[^:;|=+"*?<>/\\,\[\]@]+$
    Realm:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^([a-zA-Z0-9]+[\\.-])+([a-zA-Z0-9])+[.]?$
    AddGroupMemberResult:
      type: object
    GroupScope:
      type: string
      enum:
        - DomainLocal
        - Global
        - Universal
        - BuiltinLocal
    GroupType:
      type: string
      enum:
        - Distribution
        - Security
    Attributes:
      type: object
      properties: {}
    CreateGroupResult:
      type: object
      properties:
        DirectoryId:
          $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the group.
        SAMAccountName:
          $ref: "#/components/schemas/GroupName"
          description: The name of the group.
        SID:
          $ref: "#/components/schemas/SID"
          description: The unique security identifier (SID) of the group.
    SID:
      type: string
      minLength: 1
      maxLength: 256
    EmailAddress:
      type: string
      minLength: 1
      maxLength: 256
    GivenName:
      type: string
      minLength: 1
      maxLength: 64
    UserName:
      type: string
      minLength: 1
      maxLength: 20
      pattern: ^[\w\-.]+$
    Surname:
      type: string
      minLength: 1
      maxLength: 64
    CreateUserResult:
      type: object
      properties:
        DirectoryId:
          $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory where the address block is added.
        SAMAccountName:
          $ref: "#/components/schemas/UserName"
          description: The name of the user.
        SID:
          $ref: "#/components/schemas/SID"
          description: The unique security identifier (SID) of the user.
    DeleteGroupResult:
      type: object
    DeleteUserResult:
      type: object
    LdapDisplayNameList:
      type: array
      items:
        $ref: "#/components/schemas/LdapDisplayName"
    LdapDisplayName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: ^[A-Za-z*][A-Za-z-*]*$
    DescribeGroupResult:
      type: object
      properties:
        DirectoryId:
          $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the group.
        DistinguishedName:
          $ref: "#/components/schemas/DistinguishedName"
          description: The distinguished name of the object.
        GroupScope:
          $ref: "#/components/schemas/GroupScope"
          description: The scope of the AD group. For details, see Active Directory security groups.
        GroupType:
          $ref: "#/components/schemas/GroupType"
          description: The AD group type. For details, see Active Directory security group type.
        OtherAttributes:
          type: object
          properties: {}
          description: The attribute values that are returned for the attribute names that are included in the request.
        Realm:
          $ref: "#/components/schemas/Realm"
          description: The domain name that's associated with the group.
        SAMAccountName:
          $ref: "#/components/schemas/GroupName"
          description: The name of the group.
        SID:
          $ref: "#/components/schemas/SID"
          description: The unique security identifier (SID) of the group.
    DistinguishedName:
      type: string
      minLength: 1
      maxLength: 256
    DescribeUserResult:
      type: object
      properties:
        DirectoryId:
          $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the user.
        DistinguishedName:
          $ref: "#/components/schemas/DistinguishedName"
          description: The distinguished name of the object.
        EmailAddress:
          $ref: "#/components/schemas/EmailAddress"
          description: The email address of the user.
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the user account is active.
        GivenName:
          $ref: "#/components/schemas/GivenName"
          description: The first name of the user.
        OtherAttributes:
          type: object
          properties: {}
          description: The attribute values that are returned for the attribute names that are included in the request. Attribute names are case insensitive.
        Realm:
          $ref: "#/components/schemas/Realm"
          description: The domain name that's associated with the user.
        SAMAccountName:
          $ref: "#/components/schemas/UserName"
          description: The name of the user.
        SID:
          $ref: "#/components/schemas/SID"
          description: The unique security identifier (SID) of the user.
        Surname:
          $ref: "#/components/schemas/Surname"
          description: The last name of the user.
        UserPrincipalName:
          $ref: "#/components/schemas/UserPrincipalName"
          description: The UPN that is an Internet-style login name for a user and is based on the Internet standard RFC 822. The UPN is shorter than the distinguished name and easier to remember.
    Boolean:
      type: boolean
    UserPrincipalName:
      type: string
      minLength: 1
      maxLength: 256
    DisableUserResult:
      type: object
    MaxResults:
      type: integer
      minimum: 1
      maximum: 250
    NextToken:
      type: string
      minLength: 1
      maxLength: 6144
    ListGroupMembersResult:
      type: object
      properties:
        DirectoryId:
          $ref: "#/components/schemas/DirectoryId"
          description: Identifier (ID) of the directory associated with the group.
        MemberRealm:
          $ref: "#/components/schemas/Realm"
          description: The domain name that's associated with the member.
        Members:
          $ref: "#/components/schemas/MemberList"
          description: The member information that the request returns.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: An encoded paging token for paginated calls that can be passed back to retrieve the next page.
        Realm:
          $ref: "#/components/schemas/Realm"
          description: The domain name that's associated with the group.
    MemberList:
      type: array
      items:
        $ref: "#/components/schemas/Member"
    Member:
      description: A member object that contains identifying information for a specified member.
      type: object
      properties:
        MemberType:
          $ref: "#/components/schemas/MemberType"
          description: The AD type of the member object.
        SAMAccountName:
          $ref: "#/components/schemas/MemberName"
          description: The name of the group member.
        SID:
          $ref: "#/components/schemas/SID"
          description: The unique security identifier (SID) of the group member.
      required:
        - MemberType
        - SAMAccountName
        - SID
    MemberType:
      type: string
      enum:
        - USER
        - GROUP
        - COMPUTER
    ListGroupsResult:
      type: object
      properties:
        DirectoryId:
          $ref: "#/components/schemas/DirectoryId"
          description: The identifier (ID) of the directory that's associated with the group.
