openapi: 3.0.0
info:
  version: "2023-02-10"
  title: AWS Parallel Computing Service
  description: AWS Parallel Computing Service
  x-serviceName: pcs
  x-serviceAlias: pcs
  x-protocol: json
  x-apiVersion: "2023-02-10"
  x-endpointPrefix: pcs
  x-targetPrefix: AWSParallelComputingService
  x-jsonVersion: "1.0"
servers:
  - url: https://pcs.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for pcs
paths:
  /CreateCluster:
    post:
      operationId: CreateCluster
      description: Creates a cluster in your account. PCS creates the cluster controller in a service-owned account. The cluster controller communicates with the cluster resources in your account. The subnets and security groups for the cluster must already exist before you use this API action. It takes time for PCS to create the cluster. The cluster is in a Creating state until it is ready to use. There can only be 1 cluster in a Creating state per Amazon Web Services Region per Amazon Web Services account. CreateCluster fails with a ServiceQuotaExceededException if there is already a cluster in a Creating state.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.CreateCluster
            default: AWSParallelComputingService.CreateCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clusterName:
                  $ref: "#/components/schemas/ClusterName"
                  description: "A name to identify the cluster. Example: MyCluster"
                scheduler:
                  $ref: "#/components/schemas/SchedulerRequest"
                  description: The cluster management and job scheduling software associated with the cluster.
                size:
                  $ref: "#/components/schemas/Size"
                  description: "A value that determines the maximum number of compute nodes in the cluster and the maximum number of jobs (active and queued). SMALL: 32 compute nodes and 256 jobs MEDIUM: 512 compute nodes and 8192 jobs LARGE: 2048 compute nodes and 16,384 jobs"
                networking:
                  $ref: "#/components/schemas/NetworkingRequest"
                  description: The networking configuration used to set up the cluster's control plane.
                slurmConfiguration:
                  $ref: "#/components/schemas/ClusterSlurmConfigurationRequest"
                  description: Additional options related to the Slurm scheduler.
                clientToken:
                  $ref: "#/components/schemas/SBClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. Idempotency ensures that an API request completes only once. With an idempotent request, if the original request completes successfully, the subsequent retries with the same client token return the result from the original successful request and they have no additional effect. If you don't specify a client token, the CLI and SDK automatically generate 1 for you.
                tags:
                  $ref: "#/components/schemas/RequestTagMap"
                  description: 1 or more tags added to the resource. Each tag consists of a tag key and tag value. The tag value is optional and can be an empty string.
              required:
                - clusterName
                - scheduler
                - size
                - networking
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClusterResponse"
  /CreateComputeNodeGroup:
    post:
      operationId: CreateComputeNodeGroup
      description: Creates a managed set of compute nodes. You associate a compute node group with a cluster through 1 or more PCS queues or as part of the login fleet. A compute node group includes the definition of the compute properties and lifecycle management. PCS uses the information you provide to this API action to launch compute nodes in your account. You can only specify subnets in the same Amazon VPC as your cluster. You receive billing charges for the compute nodes that PCS launches in your account. You must already have a launch template before you call this API. For more information, see Launch an instance from a launch template in the Amazon Elastic Compute Cloud User Guide for Linux Instances.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.CreateComputeNodeGroup
            default: AWSParallelComputingService.CreateComputeNodeGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifier"
                  description: The name or ID of the cluster to create a compute node group in.
                computeNodeGroupName:
                  $ref: "#/components/schemas/ComputeNodeGroupName"
                  description: "A name to identify the cluster. Example: MyCluster"
                amiId:
                  $ref: "#/components/schemas/AmiId"
                  description: The ID of the Amazon Machine Image (AMI) that PCS uses to launch compute nodes (Amazon EC2 instances). If you don't provide this value, PCS uses the AMI ID specified in the custom launch template.
                subnetIds:
                  $ref: "#/components/schemas/StringList"
                  description: The list of subnet IDs where the compute node group launches instances. Subnets must be in the same VPC as the cluster.
                purchaseOption:
                  $ref: "#/components/schemas/PurchaseOption"
                  description: Specifies how EC2 instances are purchased on your behalf. PCS supports On-Demand Instances, Spot Instances, Interruptible Capacity Reservations, On-Demand Capacity Reservations, and Amazon EC2 Capacity Blocks for ML. For more information, see Amazon EC2 billing and purchasing options in the Amazon Elastic Compute Cloud User Guide. For more information about PCS support for Capacity Blocks, see Using Amazon EC2 Capacity Blocks for ML with PCS in the PCS User Guide. For more information about PCS support for interruptible capacity reservations, see Using I-ODCRs with PCS in the PCS User Guide. Choose On-Demand if you plan to use an On-Demand Capacity Reservation (ODCR). For more information, see Using ODCRs with PCS. If you don't provide this option, it defaults to On-Demand.
                customLaunchTemplate:
                  $ref: "#/components/schemas/CustomLaunchTemplate"
                iamInstanceProfileArn:
                  $ref: "#/components/schemas/InstanceProfileArn"
                  description: The Amazon Resource Name (ARN) of the IAM instance profile used to pass an IAM role when launching EC2 instances. The role contained in your instance profile must have the pcs:RegisterComputeNodeGroupInstance permission and the role name must start with AWSPCS or must have the path /aws-pcs/. For more information, see IAM instance profiles for PCS in the PCS User Guide.
                scalingConfiguration:
                  $ref: "#/components/schemas/ScalingConfigurationRequest"
                  description: Specifies the boundaries of the compute node group auto scaling.
                instanceConfigs:
                  $ref: "#/components/schemas/InstanceList"
                  description: A list of EC2 instance configurations that PCS can provision in the compute node group.
                spotOptions:
                  $ref: "#/components/schemas/SpotOptions"
                slurmConfiguration:
                  $ref: "#/components/schemas/ComputeNodeGroupSlurmConfigurationRequest"
                  description: Additional options related to the Slurm scheduler.
                clientToken:
                  $ref: "#/components/schemas/SBClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. Idempotency ensures that an API request completes only once. With an idempotent request, if the original request completes successfully, the subsequent retries with the same client token return the result from the original successful request and they have no additional effect. If you don't specify a client token, the CLI and SDK automatically generate 1 for you.
                tags:
                  $ref: "#/components/schemas/RequestTagMap"
                  description: 1 or more tags added to the resource. Each tag consists of a tag key and tag value. The tag value is optional and can be an empty string.
              required:
                - clusterIdentifier
                - computeNodeGroupName
                - subnetIds
                - customLaunchTemplate
                - iamInstanceProfileArn
                - scalingConfiguration
                - instanceConfigs
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateComputeNodeGroupResponse"
  /CreateQueue:
    post:
      operationId: CreateQueue
      description: Creates a job queue. You must associate 1 or more compute node groups with the queue. You can associate 1 compute node group with multiple queues.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.CreateQueue
            default: AWSParallelComputingService.CreateQueue
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifier"
                  description: The name or ID of the cluster for which to create a queue.
                queueName:
                  $ref: "#/components/schemas/QueueName"
                  description: A name to identify the queue.
                computeNodeGroupConfigurations:
                  $ref: "#/components/schemas/ComputeNodeGroupConfigurationList"
                  description: The list of compute node group configurations to associate with the queue. Queues assign jobs to associated compute node groups.
                slurmConfiguration:
                  $ref: "#/components/schemas/QueueSlurmConfigurationRequest"
                  description: Additional options related to the Slurm scheduler.
                clientToken:
                  $ref: "#/components/schemas/SBClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. Idempotency ensures that an API request completes only once. With an idempotent request, if the original request completes successfully, the subsequent retries with the same client token return the result from the original successful request and they have no additional effect. If you don't specify a client token, the CLI and SDK automatically generate 1 for you.
                tags:
                  $ref: "#/components/schemas/RequestTagMap"
                  description: 1 or more tags added to the resource. Each tag consists of a tag key and tag value. The tag value is optional and can be an empty string.
              required:
                - clusterIdentifier
                - queueName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateQueueResponse"
  /DeleteCluster:
    post:
      operationId: DeleteCluster
      description: Deletes a cluster and all its linked resources. You must delete all queues and compute node groups associated with the cluster before you can delete the cluster.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.DeleteCluster
            default: AWSParallelComputingService.DeleteCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifier"
                  description: The name or ID of the cluster to delete.
                clientToken:
                  $ref: "#/components/schemas/SBClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. Idempotency ensures that an API request completes only once. With an idempotent request, if the original request completes successfully, the subsequent retries with the same client token return the result from the original successful request and they have no additional effect. If you don't specify a client token, the CLI and SDK automatically generate 1 for you.
              required:
                - clusterIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteClusterResponse"
  /DeleteComputeNodeGroup:
    post:
      operationId: DeleteComputeNodeGroup
      description: Deletes a compute node group. You must delete all queues associated with the compute node group first.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.DeleteComputeNodeGroup
            default: AWSParallelComputingService.DeleteComputeNodeGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifier"
                  description: The name or ID of the cluster of the compute node group.
                computeNodeGroupIdentifier:
                  $ref: "#/components/schemas/ComputeNodeGroupIdentifier"
                  description: The name or ID of the compute node group to delete.
                clientToken:
                  $ref: "#/components/schemas/SBClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. Idempotency ensures that an API request completes only once. With an idempotent request, if the original request completes successfully, the subsequent retries with the same client token return the result from the original successful request and they have no additional effect. If you don't specify a client token, the CLI and SDK automatically generate 1 for you.
              required:
                - clusterIdentifier
                - computeNodeGroupIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteComputeNodeGroupResponse"
  /DeleteQueue:
    post:
      operationId: DeleteQueue
      description: Deletes a job queue. If the compute node group associated with this queue isn't associated with any other queues, PCS terminates all the compute nodes for this queue.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.DeleteQueue
            default: AWSParallelComputingService.DeleteQueue
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifier"
                  description: The name or ID of the cluster of the queue.
                queueIdentifier:
                  $ref: "#/components/schemas/QueueIdentifier"
                  description: The name or ID of the queue to delete.
                clientToken:
                  $ref: "#/components/schemas/SBClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. Idempotency ensures that an API request completes only once. With an idempotent request, if the original request completes successfully, the subsequent retries with the same client token return the result from the original successful request and they have no additional effect. If you don't specify a client token, the CLI and SDK automatically generate 1 for you.
              required:
                - clusterIdentifier
                - queueIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteQueueResponse"
  /GetCluster:
    post:
      operationId: GetCluster
      description: Returns detailed information about a running cluster in your account. This API action provides networking information, endpoint information for communication with the scheduler, and provisioning status.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.GetCluster
            default: AWSParallelComputingService.GetCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifier"
                  description: The name or ID of the cluster.
              required:
                - clusterIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetClusterResponse"
  /GetComputeNodeGroup:
    post:
      operationId: GetComputeNodeGroup
      description: Returns detailed information about a compute node group. This API action provides networking information, EC2 instance type, compute node group status, and scheduler (such as Slurm) configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.GetComputeNodeGroup
            default: AWSParallelComputingService.GetComputeNodeGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifier"
                  description: The name or ID of the cluster.
                computeNodeGroupIdentifier:
                  $ref: "#/components/schemas/ComputeNodeGroupIdentifier"
                  description: The name or ID of the compute node group.
              required:
                - clusterIdentifier
                - computeNodeGroupIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetComputeNodeGroupResponse"
  /GetQueue:
    post:
      operationId: GetQueue
      description: Returns detailed information about a queue. The information includes the compute node groups that the queue uses to schedule jobs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.GetQueue
            default: AWSParallelComputingService.GetQueue
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifier"
                  description: The name or ID of the cluster of the queue.
                queueIdentifier:
                  $ref: "#/components/schemas/QueueIdentifier"
                  description: The name or ID of the queue.
              required:
                - clusterIdentifier
                - queueIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQueueResponse"
  /ListClusters:
    post:
      operationId: ListClusters
      description: Returns a list of running clusters in your account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.ListClusters
            default: AWSParallelComputingService.ListClusters
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/String"
                  description: The value of nextToken is a unique pagination token for each page of results returned. If nextToken is returned, there are more results available. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token returns an HTTP 400 InvalidToken error.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results that are returned per call. You can use nextToken to obtain further pages of results. The default is 10 results, and the maximum allowed page size is 100 results. A value of 0 uses the default.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListClustersResponse"
  /ListComputeNodeGroups:
    post:
      operationId: ListComputeNodeGroups
      description: Returns a list of all compute node groups associated with a cluster.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.ListComputeNodeGroups
            default: AWSParallelComputingService.ListComputeNodeGroups
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifier"
                  description: The name or ID of the cluster to list compute node groups for.
                nextToken:
                  $ref: "#/components/schemas/String"
                  description: The value of nextToken is a unique pagination token for each page of results returned. If nextToken is returned, there are more results available. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token returns an HTTP 400 InvalidToken error.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results that are returned per call. You can use nextToken to obtain further pages of results. The default is 10 results, and the maximum allowed page size is 100 results. A value of 0 uses the default.
              required:
                - clusterIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListComputeNodeGroupsResponse"
  /ListQueues:
    post:
      operationId: ListQueues
      description: Returns a list of all queues associated with a cluster.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.ListQueues
            default: AWSParallelComputingService.ListQueues
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifier"
                  description: The name or ID of the cluster to list queues for.
                nextToken:
                  $ref: "#/components/schemas/String"
                  description: The value of nextToken is a unique pagination token for each page of results returned. If nextToken is returned, there are more results available. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token returns an HTTP 400 InvalidToken error.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results that are returned per call. You can use nextToken to obtain further pages of results. The default is 10 results, and the maximum allowed page size is 100 results. A value of 0 uses the default.
              required:
                - clusterIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListQueuesResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Returns a list of all tags on an PCS resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.ListTagsForResource
            default: AWSParallelComputingService.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the resource for which to list tags.
              required:
                - resourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /RegisterComputeNodeGroupInstance:
    post:
      operationId: RegisterComputeNodeGroupInstance
      description: This API action isn't intended for you to use. PCS uses this API action to register the compute nodes it launches in your account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.RegisterComputeNodeGroupInstance
            default: AWSParallelComputingService.RegisterComputeNodeGroupInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifier"
                  description: The name or ID of the cluster to register the compute node group instance in.
                bootstrapId:
                  $ref: "#/components/schemas/BootstrapId"
                  description: The client-generated token to allow for retries.
              required:
                - clusterIdentifier
                - bootstrapId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterComputeNodeGroupInstanceResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds or edits tags on an PCS resource. Each tag consists of a tag key and a tag value. The tag key and tag value are case-sensitive strings. The tag value can be an empty (null) string. To add a tag, specify a new tag key and a tag value. To edit a tag, specify an existing tag key and a new tag value.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.TagResource
            default: AWSParallelComputingService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the resource.
                tags:
                  $ref: "#/components/schemas/RequestTagMap"
                  description: 1 or more tags added to the resource. Each tag consists of a tag key and tag value. The tag value is optional and can be an empty string.
              required:
                - resourceArn
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Deletes tags from an PCS resource. To delete a tag, specify the tag key and the Amazon Resource Name (ARN) of the PCS resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.UntagResource
            default: AWSParallelComputingService.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the resource.
                tagKeys:
                  $ref: "#/components/schemas/TagKeys"
                  description: 1 or more tag keys to remove from the resource. Specify only tag keys and not tag values.
              required:
                - resourceArn
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateCluster:
    post:
      operationId: UpdateCluster
      description: Updates a cluster configuration. You can modify Slurm scheduler settings, accounting configuration, and security groups for an existing cluster. You can only update clusters that are in ACTIVE, UPDATE_FAILED, or SUSPENDED state. All associated resources (queues and compute node groups) must be in ACTIVE state before you can update the cluster.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.UpdateCluster
            default: AWSParallelComputingService.UpdateCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifier"
                  description: The name or ID of the cluster to update.
                clientToken:
                  $ref: "#/components/schemas/SBClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. Idempotency ensures that an API request completes only once. With an idempotent request, if the original request completes successfully, the subsequent retries with the same client token return the result from the original successful request and they have no additional effect. If you don't specify a client token, the CLI and SDK automatically generate 1 for you.
                slurmConfiguration:
                  $ref: "#/components/schemas/UpdateClusterSlurmConfigurationRequest"
                  description: Additional options related to the Slurm scheduler.
              required:
                - clusterIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateClusterResponse"
  /UpdateComputeNodeGroup:
    post:
      operationId: UpdateComputeNodeGroup
      description: Updates a compute node group. You can update many of the fields related to your compute node group including the configurations for networking, compute nodes, and settings specific to your scheduler (such as Slurm).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.UpdateComputeNodeGroup
            default: AWSParallelComputingService.UpdateComputeNodeGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifier"
                  description: The name or ID of the cluster of the compute node group.
                computeNodeGroupIdentifier:
                  $ref: "#/components/schemas/ComputeNodeGroupIdentifier"
                  description: The name or ID of the compute node group.
                amiId:
                  $ref: "#/components/schemas/AmiId"
                  description: The ID of the Amazon Machine Image (AMI) that PCS uses to launch instances. If not provided, PCS uses the AMI ID specified in the custom launch template.
                subnetIds:
                  $ref: "#/components/schemas/StringList"
                  description: The list of subnet IDs where the compute node group provisions instances. The subnets must be in the same VPC as the cluster.
                customLaunchTemplate:
                  $ref: "#/components/schemas/CustomLaunchTemplate"
                purchaseOption:
                  $ref: "#/components/schemas/PurchaseOption"
                  description: Specifies how EC2 instances are purchased on your behalf. PCS supports On-Demand Instances, Spot Instances, Interruptible Capacity Reservations, On-Demand Capacity Reservations, and Amazon EC2 Capacity Blocks for ML. For more information, see Amazon EC2 billing and purchasing options in the Amazon Elastic Compute Cloud User Guide. For more information about PCS support for Capacity Blocks, see Using Amazon EC2 Capacity Blocks for ML with PCS in the PCS User Guide. For more information about PCS support for interruptible capacity reservations, see Using I-ODCRs with PCS in the PCS User Guide. Choose On-Demand if you plan to use an On-Demand Capacity Reservation (ODCR). For more information, see Using ODCRs with PCS. If you don't provide this option, it defaults to On-Demand.
                spotOptions:
                  $ref: "#/components/schemas/SpotOptions"
                scalingConfiguration:
                  $ref: "#/components/schemas/ScalingConfigurationRequest"
                  description: Specifies the boundaries of the compute node group auto scaling.
                iamInstanceProfileArn:
                  $ref: "#/components/schemas/InstanceProfileArn"
                  description: The Amazon Resource Name (ARN) of the IAM instance profile used to pass an IAM role when launching EC2 instances. The role contained in your instance profile must have the pcs:RegisterComputeNodeGroupInstance permission and the role name must start with AWSPCS or must have the path /aws-pcs/. For more information, see IAM instance profiles for PCS in the PCS User Guide.
                slurmConfiguration:
                  $ref: "#/components/schemas/UpdateComputeNodeGroupSlurmConfigurationRequest"
                  description: Additional options related to the Slurm scheduler.
                clientToken:
                  $ref: "#/components/schemas/SBClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. Idempotency ensures that an API request completes only once. With an idempotent request, if the original request completes successfully, the subsequent retries with the same client token return the result from the original successful request and they have no additional effect. If you don't specify a client token, the CLI and SDK automatically generate 1 for you.
              required:
                - clusterIdentifier
                - computeNodeGroupIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateComputeNodeGroupResponse"
  /UpdateQueue:
    post:
      operationId: UpdateQueue
      description: Updates the compute node group configuration of a queue. Use this API to change the compute node groups that the queue can send jobs to.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSParallelComputingService.UpdateQueue
            default: AWSParallelComputingService.UpdateQueue
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifier"
                  description: The name or ID of the cluster of the queue.
                queueIdentifier:
                  $ref: "#/components/schemas/QueueIdentifier"
                  description: The name or ID of the queue.
                computeNodeGroupConfigurations:
                  $ref: "#/components/schemas/ComputeNodeGroupConfigurationList"
                  description: The list of compute node group configurations to associate with the queue. Queues assign jobs to associated compute node groups.
                slurmConfiguration:
                  $ref: "#/components/schemas/UpdateQueueSlurmConfigurationRequest"
                  description: Additional options related to the Slurm scheduler.
                clientToken:
                  $ref: "#/components/schemas/SBClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. Idempotency ensures that an API request completes only once. With an idempotent request, if the original request completes successfully, the subsequent retries with the same client token return the result from the original successful request and they have no additional effect. If you don't specify a client token, the CLI and SDK automatically generate 1 for you.
              required:
                - clusterIdentifier
                - queueIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateQueueResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ClusterName:
      type: string
      minLength: 3
      maxLength: 40
      pattern: (?!pcs_)^[A-Za-z][A-Za-z0-9-]+
    SchedulerRequest:
      description: The cluster management and job scheduling software associated with the cluster.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/SchedulerType"
          description: The software PCS uses to manage cluster scaling and job scheduling.
        version:
          $ref: "#/components/schemas/String"
          description: "The version of the specified scheduling software that PCS uses to manage cluster scaling and job scheduling. For more information, see Slurm versions in PCS in the PCS User Guide. Valid Values: 24.11 | 25.05 | 25.11"
      required:
        - type_
        - version
    SchedulerType:
      type: string
      enum:
        - SLURM
    String:
      type: string
    Size:
      type: string
      enum:
        - SMALL
        - MEDIUM
        - LARGE
    NetworkingRequest:
      description: The networking configuration for the cluster's control plane.
      type: object
      properties:
        subnetIds:
          $ref: "#/components/schemas/SubnetIdList"
          description: The list of subnet IDs where PCS creates an Elastic Network Interface (ENI) to enable communication between managed controllers and PCS resources. Subnet IDs have the form subnet-0123456789abcdef0. Subnets can't be in Outposts, Wavelength or an Amazon Web Services Local Zone. PCS currently supports only 1 subnet in this list.
        securityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIdList"
          description: A list of security group IDs associated with the Elastic Network Interface (ENI) created in subnets.
        networkType:
          $ref: "#/components/schemas/NetworkType"
          description: The IP address version the cluster uses. The default is IPV4.
    SubnetIdList:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      type: string
      pattern: subnet-\w{8,17}
    SecurityGroupIdList:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      type: string
      pattern: sg-\w{8,17}
    NetworkType:
      type: string
      enum:
        - IPV4
        - IPV6
    ClusterSlurmConfigurationRequest:
      description: Additional options related to the Slurm scheduler.
      type: object
      properties:
        scaleDownIdleTimeInSeconds:
          $ref: "#/components/schemas/ClusterSlurmConfigurationRequestScaleDownIdleTimeInSecondsInteger"
          description: "The time (in seconds) before an idle node is scaled down. Default: 600"
        slurmCustomSettings:
          $ref: "#/components/schemas/SlurmCustomSettings"
          description: Additional Slurm-specific configuration that directly maps to Slurm settings.
        slurmdbdCustomSettings:
          $ref: "#/components/schemas/SlurmdbdCustomSettings"
          description: Additional SlurmDBD-specific configuration that directly maps to SlurmDBD settings.
        cgroupCustomSettings:
          $ref: "#/components/schemas/CgroupCustomSettings"
          description: Additional Cgroup-specific configuration that directly maps to Cgroup settings.
        accounting:
          $ref: "#/components/schemas/AccountingRequest"
          description: The accounting configuration includes configurable settings for Slurm accounting.
        slurmRest:
          $ref: "#/components/schemas/SlurmRestRequest"
          description: The Slurm REST API configuration for the cluster.
    ClusterSlurmConfigurationRequestScaleDownIdleTimeInSecondsInteger:
      type: integer
      minimum: 1
      maximum: 10000000
    SlurmCustomSettings:
      type: array
      items:
        $ref: "#/components/schemas/SlurmCustomSetting"
    SlurmCustomSetting:
      description: Additional settings that directly map to Slurm settings. PCS supports a subset of Slurm settings. For more information, see Configuring custom Slurm settings in PCS in the PCS User Guide.
      type: object
      properties:
        parameterName:
          $ref: "#/components/schemas/String"
          description: PCS supports custom Slurm settings for clusters, compute node groups, and queues. For more information, see Configuring custom Slurm settings in PCS in the PCS User Guide.
        parameterValue:
          $ref: "#/components/schemas/String"
          description: The values for the configured Slurm settings.
      required:
        - parameterName
        - parameterValue
    SlurmdbdCustomSettings:
      type: array
      items:
        $ref: "#/components/schemas/SlurmdbdCustomSetting"
    SlurmdbdCustomSetting:
      description: Additional settings that directly map to SlurmDBD settings. PCS supports a subset of SlurmDBD settings. For more information, see Configuring custom SlurmDBD settings in PCS in the PCS User Guide.
      type: object
      properties:
        parameterName:
          $ref: "#/components/schemas/String"
          description: PCS supports custom SlurmDBD settings for clusters. For more information, see Configuring custom SlurmDBD settings in PCS in the PCS User Guide.
        parameterValue:
          $ref: "#/components/schemas/String"
          description: The values for the configured SlurmDBD settings.
      required:
        - parameterName
        - parameterValue
    CgroupCustomSettings:
      type: array
      items:
        $ref: "#/components/schemas/CgroupCustomSetting"
    CgroupCustomSetting:
      description: Additional settings that directly map to Cgroup settings. PCS supports a subset of Cgroup settings. For more information, see Configuring custom Cgroup settings in PCS in the PCS User Guide.
      type: object
      properties:
        parameterName:
          $ref: "#/components/schemas/String"
          description: PCS supports custom Cgroup settings for clusters. For more information, see Configuring custom Cgroup settings in PCS in the PCS User Guide.
        parameterValue:
          $ref: "#/components/schemas/String"
          description: The values for the configured Cgroup settings.
      required:
        - parameterName
        - parameterValue
    AccountingRequest:
      description: The accounting configuration includes configurable settings for Slurm accounting. It's a property of the ClusterSlurmConfiguration object.
      type: object
      properties:
        defaultPurgeTimeInDays:
          $ref: "#/components/schemas/AccountingRequestDefaultPurgeTimeInDaysInteger"
          description: The default value for all purge settings for slurmdbd.conf. For more information, see the slurmdbd.conf documentation at SchedMD. The default value for defaultPurgeTimeInDays is -1. A value of -1 means there is no purge time and records persist as long as the cluster exists. 0 isn't a valid value.
        mode:
          $ref: "#/components/schemas/AccountingMode"
          description: The default value for mode is NONE. A value of STANDARD means Slurm accounting is enabled.
      required:
        - mode
    AccountingRequestDefaultPurgeTimeInDaysInteger:
      type: integer
      minimum: -1
      maximum: 10000
    AccountingMode:
      type: string
      enum:
        - STANDARD
        - NONE
    SlurmRestRequest:
      description: The Slurm REST API configuration includes settings for enabling and configuring the Slurm REST API. It's a property of the ClusterSlurmConfiguration object.
      type: object
      properties:
        mode:
          $ref: "#/components/schemas/SlurmRestMode"
          description: The default value for mode is NONE. A value of STANDARD means the Slurm REST API is enabled.
      required:
        - mode
    SlurmRestMode:
      type: string
      enum:
        - STANDARD
        - NONE
    SBClientToken:
      type: string
      minLength: 8
      maxLength: 100
    RequestTagMap:
      type: object
      properties: {}
    CreateClusterResponse:
      type: object
      properties:
        cluster:
          $ref: "#/components/schemas/Cluster"
          description: The cluster resource.
    Cluster:
      description: The cluster resource and configuration.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name that identifies the cluster.
        id:
          $ref: "#/components/schemas/String"
          description: The generated unique ID of the cluster.
        arn:
          $ref: "#/components/schemas/String"
          description: The unique Amazon Resource Name (ARN) of the cluster.
        status:
          $ref: "#/components/schemas/ClusterStatus"
          description: The provisioning status of the cluster. The provisioning status doesn't indicate the overall health of the cluster. The resource enters the SUSPENDING and SUSPENDED states when the scheduler is beyond end of life and we have suspended the cluster. When in these states, you can't use the cluster. The cluster controller is down and all compute instances are terminated. The resources still count toward your service quotas. You can delete a resource if its status is SUSPENDED. For more information, see Frequently asked questions about Slurm versions in PCS in the PCS User Guide.
        createdAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time the resource was created.
        modifiedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time the resource was modified.
        scheduler:
          $ref: "#/components/schemas/Scheduler"
        size:
          $ref: "#/components/schemas/Size"
          description: "The size of the cluster. SMALL: 32 compute nodes and 256 jobs MEDIUM: 512 compute nodes and 8192 jobs LARGE: 2048 compute nodes and 16,384 jobs"
        slurmConfiguration:
          $ref: "#/components/schemas/ClusterSlurmConfiguration"
          description: Additional options related to the Slurm scheduler.
        networking:
          $ref: "#/components/schemas/Networking"
        endpoints:
          $ref: "#/components/schemas/Endpoints"
          description: The list of endpoints available for interaction with the scheduler.
        errorInfo:
          $ref: "#/components/schemas/ErrorInfoList"
          description: The list of errors that occurred during cluster provisioning.
      required:
        - name
        - id
        - arn
        - status
        - createdAt
        - modifiedAt
        - scheduler
        - size
        - networking
    ClusterStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - UPDATING
        - DELETING
        - CREATE_FAILED
        - DELETE_FAILED
        - UPDATE_FAILED
        - SUSPENDING
        - SUSPENDED
        - RESUMING
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    Scheduler:
      description: The cluster management and job scheduling software associated with the cluster.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/SchedulerType"
          description: The software PCS uses to manage cluster scaling and job scheduling.
        version:
          $ref: "#/components/schemas/String"
          description: "The version of the specified scheduling software that PCS uses to manage cluster scaling and job scheduling. For more information, see Slurm versions in PCS in the PCS User Guide. Valid Values: 23.11 | 24.05 | 24.11 | 25.05 | 25.11"
      required:
        - type_
        - version
    ClusterSlurmConfiguration:
      description: Additional options related to the Slurm scheduler.
      type: object
      properties:
        scaleDownIdleTimeInSeconds:
          $ref: "#/components/schemas/ClusterSlurmConfigurationScaleDownIdleTimeInSecondsInteger"
          description: "The time (in seconds) before an idle node is scaled down. Default: 600"
        slurmCustomSettings:
          $ref: "#/components/schemas/SlurmCustomSettings"
          description: Additional Slurm-specific configuration that directly maps to Slurm settings.
        slurmdbdCustomSettings:
          $ref: "#/components/schemas/SlurmdbdCustomSettings"
          description: Additional SlurmDBD-specific configuration that directly maps to SlurmDBD settings.
        cgroupCustomSettings:
          $ref: "#/components/schemas/CgroupCustomSettings"
          description: Additional Cgroup-specific configuration that directly maps to Cgroup settings.
        authKey:
          $ref: "#/components/schemas/SlurmAuthKey"
          description: The shared Slurm key for authentication, also known as the cluster secret.
        jwtAuth:
          $ref: "#/components/schemas/JwtAuth"
          description: The JWT authentication configuration for Slurm REST API access.
        accounting:
          $ref: "#/components/schemas/Accounting"
          description: The accounting configuration includes configurable settings for Slurm accounting.
        slurmRest:
          $ref: "#/components/schemas/SlurmRest"
          description: The Slurm REST API configuration for the cluster.
    ClusterSlurmConfigurationScaleDownIdleTimeInSecondsInteger:
      type: integer
      minimum: 1
      maximum: 10000000
    SlurmAuthKey:
      description: The shared Slurm key for authentication, also known as the cluster secret.
      type: object
      properties:
        secretArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the shared Slurm key.
        secretVersion:
          $ref: "#/components/schemas/String"
          description: The version of the shared Slurm key.
      required:
        - secretArn
        - secretVersion
    JwtAuth:
      description: The JWT authentication configuration for Slurm REST API access.
      type: object
      properties:
        jwtKey:
          $ref: "#/components/schemas/JwtKey"
          description: The JWT key for Slurm REST API authentication.
    JwtKey:
      description: The JWT key stored in Amazon Web Services Secrets Manager for Slurm REST API authentication.
      type: object
      properties:
        secretArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Amazon Web Services Secrets Manager secret containing the JWT key.
        secretVersion:
          $ref: "#/components/schemas/String"
          description: The version of the Amazon Web Services Secrets Manager secret containing the JWT key.
      required:
        - secretArn
        - secretVersion
    Accounting:
      description: The accounting configuration includes configurable settings for Slurm accounting. It's a property of the ClusterSlurmConfiguration object.
      type: object
      properties:
        defaultPurgeTimeInDays:
          $ref: "#/components/schemas/AccountingDefaultPurgeTimeInDaysInteger"
          description: The default value for all purge settings for slurmdbd.conf. For more information, see the slurmdbd.conf documentation at SchedMD. The default value for defaultPurgeTimeInDays is -1. A value of -1 means there is no purge time and records persist as long as the cluster exists. 0 isn't a valid value.
        mode:
          $ref: "#/components/schemas/AccountingMode"
          description: The default value for mode is NONE. A value of STANDARD means Slurm accounting is enabled.
      required:
        - mode
    AccountingDefaultPurgeTimeInDaysInteger:
      type: integer
      minimum: -1
      maximum: 10000
    SlurmRest:
      description: The Slurm REST API configuration includes settings for enabling and configuring the Slurm REST API. It's a property of the ClusterSlurmConfiguration object.
      type: object
      properties:
        mode:
          $ref: "#/components/schemas/SlurmRestMode"
          description: The default value for mode is NONE. A value of STANDARD means the Slurm REST API is enabled.
      required:
        - mode
    Networking:
      description: The networking configuration for the cluster's control plane.
      type: object
      properties:
        subnetIds:
          $ref: "#/components/schemas/SubnetIdList"
          description: "The ID of the subnet where PCS creates an Elastic Network Interface (ENI) to enable communication between managed controllers and PCS resources. The subnet must have an available IP address, cannot reside in Outposts, Wavelength, or an Amazon Web Services Local Zone. Example: subnet-abcd1234"
        securityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIdList"
          description: "The list of security group IDs associated with the Elastic Network Interface (ENI) created in subnets. The following rules are required: Inbound rule 1 Protocol: All Ports: All Source: Self Outbound rule 1 Protocol: All Ports: All Destination: 0.0.0.0/0 (IPv4) or ::/0 (IPv6) Outbound rule 2 Protocol: All Ports: All Destination: Self"
        networkType:
          $ref: "#/components/schemas/NetworkType"
          description: The IP address version the cluster uses. The default is IPV4.
    Endpoints:
      type: array
      items:
        $ref: "#/components/schemas/Endpoint"
    Endpoint:
      description: An endpoint available for interaction with the scheduler.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/EndpointType"
          description: Indicates the type of endpoint running at the specific IP address.
        privateIpAddress:
          $ref: "#/components/schemas/String"
          description: "For clusters that use IPv4, this is the endpoint's private IP address. Example: 10.1.2.3 For clusters configured to use IPv6, this is an empty string."
        publicIpAddress:
          $ref: "#/components/schemas/String"
          description: "The endpoint's public IP address. Example: 192.0.2.1"
        ipv6Address:
          $ref: "#/components/schemas/String"
          description: "The endpoint's IPv6 address. Example: 2001:db8::1"
        port:
          $ref: "#/components/schemas/String"
          description: "The endpoint's connection port number. Example: 1234"
      required:
        - type_
        - privateIpAddress
        - port
    EndpointType:
      type: string
      enum:
        - SLURMCTLD
        - SLURMDBD
        - SLURMRESTD
    ErrorInfoList:
      type: array
      items:
        $ref: "#/components/schemas/ErrorInfo"
    ErrorInfo:
      description: An error that occurred during resource creation.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/String"
          description: The short-form error code.
        message:
          $ref: "#/components/schemas/String"
          description: The detailed error information.
    ClusterIdentifier:
      type: string
      pattern: (pcs_[a-zA-Z0-9]+|[A-Za-z][A-Za-z0-9-]{2,40})
    ComputeNodeGroupName:
      type: string
      minLength: 3
      maxLength: 25
      pattern: (?!pcs_)^[A-Za-z][A-Za-z0-9-]+
    AmiId:
      type: string
      pattern: ami-[a-z0-9]+
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    PurchaseOption:
      type: string
      enum:
        - ONDEMAND
        - SPOT
        - CAPACITY_BLOCK
        - INTERRUPTIBLE_CAPACITY_RESERVATION
    CustomLaunchTemplate:
      description: An Amazon EC2 launch template PCS uses to launch compute nodes.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: "The ID of the EC2 launch template to use to provision instances. Example: lt-xxxx"
        version:
          $ref: "#/components/schemas/String"
          description: The version of the EC2 launch template to use to provision instances.
      required:
        - id
        - version
    InstanceProfileArn:
      type: string
      pattern: arn:aws([a-zA-Z-]{0,10})?:iam::[0-9]{12}:instance-profile/([!-~]{1,510}/)?([\w+=,.@-]{1,128})
    ScalingConfigurationRequest:
      description: Specifies the boundaries of the compute node group auto scaling.
      type: object
      properties:
        minInstanceCount:
          $ref: "#/components/schemas/ScalingConfigurationRequestMinInstanceCountInteger"
          description: The lower bound of the number of instances allowed in the compute fleet.
        maxInstanceCount:
          $ref: "#/components/schemas/ScalingConfigurationRequestMaxInstanceCountInteger"
          description: The upper bound of the number of instances allowed in the compute fleet.
      required:
        - minInstanceCount
        - maxInstanceCount
    ScalingConfigurationRequestMinInstanceCountInteger:
      type: integer
      minimum: 0
    ScalingConfigurationRequestMaxInstanceCountInteger:
      type: integer
      minimum: 0
    InstanceList:
      type: array
      items:
        $ref: "#/components/schemas/InstanceConfig"
    InstanceConfig:
      description: An EC2 instance configuration PCS uses to launch compute nodes.
      type: object
      properties:
        instanceType:
          $ref: "#/components/schemas/String"
          description: "The EC2 instance type that PCS can provision in the compute node group. Example: t2.xlarge"
    SpotOptions:
      description: Additional configuration when you specify SPOT as the purchaseOption for the CreateComputeNodeGroup API action.
      type: object
      properties:
        allocationStrategy:
          $ref: "#/components/schemas/SpotAllocationStrategy"
          description: The Amazon EC2 allocation strategy PCS uses to provision EC2 instances. PCS supports lowest price, capacity optimized, and price capacity optimized. For more information, see Use allocation strategies to determine how EC2 Fleet or Spot Fleet fulfills Spot and On-Demand capacity in the Amazon Elastic Compute Cloud User Guide. If you don't provide this option, it defaults to price capacity optimized.
    SpotAllocationStrategy:
      type: string
      enum:
        - lowest-price
        - capacity-optimized
        - price-capacity-optimized
    ComputeNodeGroupSlurmConfigurationRequest:
      description: Additional options related to the Slurm scheduler.
      type: object
      properties:
