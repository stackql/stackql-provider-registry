openapi: 3.0.0
info:
  version: "2025-08-22"
  title: Nova Act Service
  description: Nova Act Service
  x-serviceName: nova-act
  x-serviceAlias: nova_act
  x-protocol: rest-json
  x-apiVersion: "2025-08-22"
  x-endpointPrefix: nova-act
servers:
  - url: https://nova-act.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for nova-act
paths:
  /workflow-definitions/{workflow_definition_name}/workflow-runs/{workflow_run_id}/sessions/{session_id}/acts:
    put:
      operationId: CreateAct
      description: Creates a new AI task (act) within a session that can interact with tools and perform specific actions.
      parameters:
        - name: workflow_definition_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkflowDefinitionName"
          description: The name of the workflow definition containing the session.
        - name: workflow_run_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidString"
          description: The unique identifier of the workflow run containing the session.
        - name: session_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidString"
          description: The unique identifier of the session to create the act in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                task:
                  $ref: "#/components/schemas/Task"
                toolSpecs:
                  $ref: "#/components/schemas/ToolSpecs"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - task
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateActResponse"
  /workflow-definitions/{workflow_definition_name}/workflow-runs/{workflow_run_id}/sessions:
    put:
      operationId: CreateSession
      description: Creates a new session context within a workflow run to manage conversation state and acts.
      parameters:
        - name: workflow_definition_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkflowDefinitionName"
          description: The name of the workflow definition containing the workflow run.
        - name: workflow_run_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidString"
          description: The unique identifier of the workflow run to create the session in.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionResponse"
  /workflow-definitions:
    put:
      operationId: CreateWorkflowDefinition
      description: Creates a new workflow definition template that can be used to execute multiple workflow runs.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/WorkflowDefinitionName"
                description:
                  $ref: "#/components/schemas/WorkflowDescription"
                exportConfig:
                  $ref: "#/components/schemas/WorkflowExportConfig"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - name
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkflowDefinitionResponse"
    post:
      operationId: ListWorkflowDefinitions
      description: Lists all workflow definitions in your account with optional filtering and pagination.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of workflow definitions to return in a single response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for retrieving the next page of results.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                sortOrder:
                  $ref: "#/components/schemas/SortOrder"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkflowDefinitionsResponse"
  /workflow-definitions/{workflow_definition_name}/workflow-runs:
    put:
      operationId: CreateWorkflowRun
      description: Creates a new execution instance of a workflow definition with specified parameters.
      parameters:
        - name: workflow_definition_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkflowDefinitionName"
          description: The name of the workflow definition to execute.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                modelId:
                  $ref: "#/components/schemas/ModelId"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                logGroupName:
                  $ref: "#/components/schemas/CloudWatchLogGroupName"
                clientInfo:
                  $ref: "#/components/schemas/ClientInfo"
              required:
                - modelId
                - clientInfo
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkflowRunResponse"
    post:
      operationId: ListWorkflowRuns
      description: Lists all workflow runs for a specific workflow definition with optional filtering and pagination.
      parameters:
        - name: workflow_definition_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkflowDefinitionName"
          description: The name of the workflow definition to list workflow runs for.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of workflow runs to return in a single response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for retrieving the next page of results.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                sortOrder:
                  $ref: "#/components/schemas/SortOrder"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkflowRunsResponse"
  /workflow-definitions/{workflow_definition_name}:
    delete:
      operationId: DeleteWorkflowDefinition
      description: Deletes a workflow definition and all associated resources. This operation cannot be undone.
      parameters:
        - name: workflow_definition_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkflowDefinitionName"
          description: The name of the workflow definition to delete.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWorkflowDefinitionResponse"
    get:
      operationId: GetWorkflowDefinition
      description: Retrieves the details and configuration of a specific workflow definition.
      parameters:
        - name: workflow_definition_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkflowDefinitionName"
          description: The name of the workflow definition to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWorkflowDefinitionResponse"
  /workflow-definitions/{workflow_definition_name}/workflow-runs/{workflow_run_id}:
    delete:
      operationId: DeleteWorkflowRun
      description: Terminates and cleans up a workflow run, stopping all associated acts and sessions.
      parameters:
        - name: workflow_definition_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkflowDefinitionName"
          description: The name of the workflow definition containing the workflow run.
        - name: workflow_run_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidString"
          description: The unique identifier of the workflow run to delete.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWorkflowRunResponse"
    get:
      operationId: GetWorkflowRun
      description: Retrieves the current state, configuration, and execution details of a workflow run.
      parameters:
        - name: workflow_definition_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkflowDefinitionName"
          description: The name of the workflow definition containing the workflow run.
        - name: workflow_run_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidString"
          description: The unique identifier of the workflow run to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWorkflowRunResponse"
    post:
      operationId: ListSessions
      description: Lists all sessions within a specific workflow run.
      parameters:
        - name: workflow_definition_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkflowDefinitionName"
          description: The name of the workflow definition containing the workflow run.
        - name: workflow_run_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidString"
          description: The unique identifier of the workflow run to list sessions for.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of sessions to return in a single response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for retrieving the next page of results.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                sortOrder:
                  $ref: "#/components/schemas/SortOrder"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSessionsResponse"
    put:
      operationId: UpdateWorkflowRun
      description: Updates the configuration or state of an active workflow run.
      parameters:
        - name: workflow_definition_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkflowDefinitionName"
          description: The name of the workflow definition containing the workflow run.
        - name: workflow_run_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidString"
          description: The unique identifier of the workflow run to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/WorkflowRunStatus"
              required:
                - status
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkflowRunResponse"
  /workflow-definitions/{workflow_definition_name}/workflow-runs/{workflow_run_id}/sessions/{session_id}/acts/{act_id}/invoke-step/:
    put:
      operationId: InvokeActStep
      description: Executes the next step of an act, processing tool call results and returning new tool calls if needed.
      parameters:
        - name: workflow_definition_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkflowDefinitionName"
          description: The name of the workflow definition containing the act.
        - name: workflow_run_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidString"
          description: The unique identifier of the workflow run containing the act.
        - name: session_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidString"
          description: The unique identifier of the session containing the act.
        - name: act_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidString"
          description: The unique identifier of the act to invoke the next step for.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                callResults:
                  $ref: "#/components/schemas/CallResults"
                previousStepId:
                  $ref: "#/components/schemas/UuidString"
              required:
                - callResults
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvokeActStepResponse"
  /workflow-definitions/{workflow_definition_name}/acts:
    post:
      operationId: ListActs
      description: Lists all acts within a specific session with their current status and execution details.
      parameters:
        - name: workflow_definition_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkflowDefinitionName"
          description: The name of the workflow definition containing the session.
        - name: workflowRunId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UuidString"
          description: The unique identifier of the workflow run containing the session.
        - name: sessionId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UuidString"
          description: The unique identifier of the session to list acts for.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of acts to return in a single response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for retrieving the next page of results.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                sortOrder:
                  $ref: "#/components/schemas/SortOrder"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListActsResponse"
  /models:
    post:
      operationId: ListModels
      description: Lists all available AI models that can be used for workflow execution, including their status and compatibility information.
      parameters:
        - name: clientCompatibilityVersion
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Integer"
          description: The client compatibility version to filter models by compatibility.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListModelsResponse"
  /workflow-definitions/{workflow_definition_name}/workflow-runs/{workflow_run_id}/sessions/{session_id}/acts/{act_id}:
    put:
      operationId: UpdateAct
      description: Updates an existing act's configuration, status, or error information.
      parameters:
        - name: workflow_definition_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkflowDefinitionName"
          description: The name of the workflow definition containing the act.
        - name: workflow_run_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidString"
          description: The unique identifier of the workflow run containing the act.
        - name: session_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidString"
          description: The unique identifier of the session containing the act.
        - name: act_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UuidString"
          description: The unique identifier of the act to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/ActStatus"
                error:
                  $ref: "#/components/schemas/ActError"
              required:
                - status
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateActResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    WorkflowDefinitionName:
      type: string
      minLength: 1
      maxLength: 40
      pattern: "[a-zA-Z0-9_-]{1,40}"
    UuidString:
      type: string
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    Task:
      type: string
      minLength: 1
      maxLength: 10000
    ToolSpecs:
      type: array
      items:
        $ref: "#/components/schemas/ToolSpec"
    ToolSpec:
      description: Specification for a tool that acts can invoke, including its name, description, and input schema.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ToolName"
          description: The unique name of the tool that acts will use to invoke it.
        description:
          $ref: "#/components/schemas/ToolDescription"
          description: A description of what the tool does and how it should be used.
        inputSchema:
          $ref: "#/components/schemas/ToolInputSchema"
          description: The JSON schema that defines the expected input format for the tool.
      required:
        - name
        - description
        - inputSchema
    ToolName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9_-]+"
    ToolDescription:
      type: string
      minLength: 1
      maxLength: 10000
    ToolInputSchema:
      description: The schema definition for tool input parameters.
      type: object
      properties:
        json:
          $ref: "#/components/schemas/ToolInputSchemaDocument"
          description: The JSON schema that defines the expected input format for the tool.
    ToolInputSchemaDocument:
      type: object
    ClientToken:
      type: string
      minLength: 33
      maxLength: 256
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,256}"
    CreateActResponse:
      type: object
      properties:
        actId:
          $ref: "#/components/schemas/UuidString"
          description: The unique identifier for the created act.
        status:
          $ref: "#/components/schemas/ActStatus"
          description: The initial status of the act after creation.
      required:
        - actId
        - status
    ActStatus:
      type: string
      enum:
        - RUNNING
        - PENDING_CLIENT_ACTION
        - PENDING_HUMAN_ACTION
        - SUCCEEDED
        - FAILED
        - TIMED_OUT
    CreateSessionResponse:
      type: object
      properties:
        sessionId:
          $ref: "#/components/schemas/UuidString"
          description: The unique identifier for the created session.
      required:
        - sessionId
    WorkflowDescription:
      type: string
      minLength: 1
      maxLength: 4000
    WorkflowExportConfig:
      description: Configuration settings for exporting workflow execution data and logs to Amazon Simple Storage Service (Amazon S3).
      type: object
      properties:
        s3BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of your Amazon S3 bucket, that Nova Act uses to export your workflow data. Note that the IAM role used to access Nova Act must also have write permissions to this bucket.
        s3KeyPrefix:
          $ref: "#/components/schemas/S3KeyPrefix"
          description: An optional prefix for Amazon S3 object keys to organize exported data.
      required:
        - s3BucketName
    S3BucketName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: "[a-z0-9][a-z0-9.-]*[a-z0-9]"
    S3KeyPrefix:
      description: A prefix for S3 object keys that will be prepended to 'step_{N}.json'. Must follow S3 object key naming guidelines and cannot end with a forward slash as it will be directly concatenated with the filename.
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9!\\-_.*'()]+(?:/[a-zA-Z0-9!\\-_.*'()]+)*"
    CreateWorkflowDefinitionResponse:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/WorkflowDefinitionStatus"
          description: The current status of the workflow definition after creation.
      required:
        - status
    WorkflowDefinitionStatus:
      type: string
      enum:
        - ACTIVE
        - DELETING
    ModelId:
      type: string
      minLength: 1
      maxLength: 100
    CloudWatchLogGroupName:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[a-zA-Z0-9_/.-]+"
    ClientInfo:
      description: Information about the client making API requests, used for compatibility checking.
      type: object
      properties:
        compatibilityVersion:
          $ref: "#/components/schemas/Integer"
          description: The compatibility version of the client, used to ensure API compatibility.
        sdkVersion:
          $ref: "#/components/schemas/NonBlankString"
          description: The version of the SDK being used by the client.
      required:
        - compatibilityVersion
    Integer:
      type: integer
    NonBlankString:
      type: string
      pattern: "[\\s\\S]+"
    CreateWorkflowRunResponse:
      type: object
      properties:
        workflowRunId:
          $ref: "#/components/schemas/UuidString"
          description: The unique identifier for the created workflow run.
        status:
          $ref: "#/components/schemas/WorkflowRunStatus"
          description: The initial status of the workflow run after creation.
      required:
        - workflowRunId
        - status
    WorkflowRunStatus:
      type: string
      enum:
        - RUNNING
        - SUCCEEDED
        - FAILED
        - TIMED_OUT
        - DELETING
    DeleteWorkflowDefinitionResponse:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/WorkflowDefinitionStatus"
          description: The status of the workflow definition after deletion request.
      required:
        - status
    DeleteWorkflowRunResponse:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/WorkflowRunStatus"
          description: The status of the workflow run after deletion request.
      required:
        - status
    GetWorkflowDefinitionResponse:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/WorkflowDefinitionName"
          description: The name of the workflow definition.
        arn:
          $ref: "#/components/schemas/WorkflowDefinitionArn"
          description: The Amazon Resource Name (ARN) of the workflow definition.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the workflow definition was created.
        description:
          $ref: "#/components/schemas/WorkflowDescription"
          description: The description of the workflow definition.
        exportConfig:
          $ref: "#/components/schemas/WorkflowExportConfig"
          description: The export configuration for the workflow definition.
        status:
          $ref: "#/components/schemas/WorkflowDefinitionStatus"
          description: The current status of the workflow definition.
      required:
        - name
        - arn
        - createdAt
        - status
    WorkflowDefinitionArn:
      type: string
      pattern: arn:(aws|aws-cn|aws-us-gov):nova-act:[a-z0-9-]+:[0-9]{12}:workflow-definition/[a-zA-Z0-9_-]{1,40}
    DateTimestamp:
      type: string
      format: date-time
    GetWorkflowRunResponse:
      type: object
      properties:
        workflowRunArn:
          $ref: "#/components/schemas/WorkflowRunArn"
          description: The Amazon Resource Name (ARN) of the workflow run.
        workflowRunId:
          $ref: "#/components/schemas/UuidString"
          description: The unique identifier of the workflow run.
        status:
          $ref: "#/components/schemas/WorkflowRunStatus"
          description: The current execution status of the workflow run.
        startedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the workflow run started execution.
        endedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the workflow run completed execution, if applicable.
        modelId:
          $ref: "#/components/schemas/ModelId"
          description: The ID of the AI model being used for this workflow run.
        logGroupName:
          $ref: "#/components/schemas/CloudWatchLogGroupName"
          description: The CloudWatch log group name for this workflow run's logs.
      required:
        - workflowRunArn
        - workflowRunId
        - status
        - startedAt
        - modelId
    WorkflowRunArn:
      type: string
      pattern: arn:(aws|aws-cn|aws-us-gov):nova-act:[a-z0-9-]+:[0-9]{12}:workflow-definition/[a-zA-Z0-9_-]{1,40}/workflow-run/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}
    CallResults:
      type: array
      items:
        $ref: "#/components/schemas/CallResult"
    CallResult:
      description: The result returned from executing a tool call.
      type: object
      properties:
        callId:
          $ref: "#/components/schemas/CallId"
          description: The identifier of the tool call that this result corresponds to.
        content:
          $ref: "#/components/schemas/CallResultContents"
          description: The content returned by the tool execution, which can include text or other media types.
      required:
        - content
    CallId:
      type: string
      minLength: 1
