            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetWorkerResponse"
  /2023-10-12/batch-update-job:
    patch:
      operationId: BatchUpdateJob
      description: Updates multiple jobs in a single request. This is a batch version of the UpdateJob API. The result of updating each job is reported individually in the response. Because the batch request can result in a combination of successful and unsuccessful actions, you should check for batch errors even when the call returns an HTTP status code of 200. When you change the status of a job to ARCHIVED, the job can't be scheduled or archived. An archived job and its steps and tasks are deleted after 120 days. The job can't be recovered.
      parameters:
        - name: X-Amz-Client-Token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: The unique token which the server uses to recognize retries of the same request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobs:
                  $ref: "#/components/schemas/BatchUpdateJobItems"
              required:
                - jobs
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateJobResponse"
  /2023-10-12/batch-update-task:
    patch:
      operationId: BatchUpdateTask
      description: Updates multiple tasks in a single request. This is a batch version of the UpdateTask API. The result of updating each task is reported individually in the response. Because the batch request can result in a combination of successful and unsuccessful actions, you should check for batch errors even when the call returns an HTTP status code of 200.
      parameters:
        - name: X-Amz-Client-Token
          in: header
