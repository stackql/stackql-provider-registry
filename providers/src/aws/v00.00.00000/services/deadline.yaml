            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateTaskResponse"
  /2023-10-12/farms/{farm_id}/queues/{queue_id}/jobs/{job_id}/template:
    post:
      operationId: CopyJobTemplate
      description: Copies a job template to an Amazon S3 bucket.
      parameters:
        - name: farm_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FarmId"
          description: The farm ID to copy.
        - name: queue_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/QueueId"
          description: The queue ID to copy.
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The job ID to copy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetS3Location:
                  $ref: "#/components/schemas/S3Location"
              required:
                - targetS3Location
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopyJobTemplateResponse"
  /2023-10-12/farms/{farm_id}/budgets:
    post:
      operationId: CreateBudget
      description: Creates a budget to set spending thresholds for your rendering activity.
      parameters:
        - name: farm_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FarmId"
          description: The farm ID to include in this budget.
        - name: X-Amz-Client-Token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: The unique token which the server uses to recognize retries of the same request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  $ref: "#/components/schemas/ResourceName"
                description:
                  $ref: "#/components/schemas/Description"
                usageTrackingResource:
                  $ref: "#/components/schemas/UsageTrackingResource"
                approximateDollarLimit:
                  $ref: "#/components/schemas/ConsumedUsageLimit"
                actions:
                  $ref: "#/components/schemas/BudgetActionsToAdd"
                schedule:
                  $ref: "#/components/schemas/BudgetSchedule"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - displayName
                - usageTrackingResource
                - approximateDollarLimit
                - actions
                - schedule
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBudgetResponse"
    get:
      operationId: ListBudgets
      description: A list of budgets in a farm.
      parameters:
        - name: farm_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FarmId"
          description: The farm ID associated with the budgets.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results, or null to start from the beginning.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return. Use this parameter with NextToken to get results as a set of sequential pages.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BudgetStatus"
          description: The status to list for the budgets.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBudgetsResponse"
  /2023-10-12/farms:
    post:
      operationId: CreateFarm
      description: Creates a farm to allow space for queues and fleets. Farms are the space where the components of your renders gather and are pieced together in the cloud. Farms contain budgets and allow you to enforce permissions. Deadline Cloud farms are a useful container for large projects.
      parameters:
        - name: X-Amz-Client-Token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: The unique token which the server uses to recognize retries of the same request.
      requestBody:
