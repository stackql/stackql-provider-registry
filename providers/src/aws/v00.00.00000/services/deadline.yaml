    AcceleratorCapabilities:
      description: "Provides information about the GPU accelerators used for jobs processed by a fleet. Accelerator capabilities cannot be used with wait-and-save fleets. If you specify accelerator capabilities, you must use either spot or on-demand instance market options. Each accelerator type maps to specific EC2 instance families: t4: Uses G4dn instance family a10g: Uses G5 instance family l4: Uses G6 and Gr6 instance families l40s: Uses G6e instance family rtx-pro-server-6000: Uses G7e instance family"
      type: object
      properties:
        selections:
          $ref: "#/components/schemas/AcceleratorSelections"
          description: A list of accelerator capabilities requested for this fleet. Only Amazon Elastic Compute Cloud instances that provide these capabilities will be used. For example, if you specify both L4 and T4 chips, Amazon Web Services Deadline Cloud will use Amazon EC2 instances that have either the L4 or the T4 chip installed. You must specify at least one accelerator selection. You cannot specify the same accelerator name multiple times in the selections list. All accelerators in the selections must use the same runtime version.
        count:
          $ref: "#/components/schemas/AcceleratorCountRange"
          description: The number of GPU accelerators specified for worker hosts in this fleet. You must specify either acceleratorCapabilities.count.max or allowedInstanceTypes when using accelerator capabilities. If you don't specify a maximum count, Amazon Web Services Deadline Cloud uses the instance types you specify in allowedInstanceTypes to determine the maximum number of accelerators.
      required:
        - selections
    AcceleratorSelections:
      type: array
      items:
        $ref: "#/components/schemas/AcceleratorSelection"
    AcceleratorSelection:
      description: Describes a specific GPU accelerator required for an Amazon Elastic Compute Cloud worker host.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/AcceleratorName"
          description: "The name of the chip used by the GPU accelerator. The available GPU accelerators are: t4 - NVIDIA T4 Tensor Core GPU (16 GiB memory) a10g - NVIDIA A10G Tensor Core GPU (24 GiB memory) l4 - NVIDIA L4 Tensor Core GPU (24 GiB memory) l40s - NVIDIA L40S Tensor Core GPU (48 GiB memory) rtx-pro-server-6000 - NVIDIA RTX PRO Server 6000 GPU (96 GiB memory)"
        runtime:
          $ref: "#/components/schemas/AcceleratorRuntime"
          description: "Specifies the runtime driver to use for the GPU accelerator. You must use the same runtime for all GPUs in a fleet. You can choose from the following runtimes: latest - Use the latest runtime available for the chip. If you specify latest and a new version of the runtime is released, the new version of the runtime is used. grid:r580 - NVIDIA vGPU software 19 grid:r570 - NVIDIA vGPU software 18 grid:r535 - NVIDIA vGPU software 16 If you don't specify a runtime, Amazon Web Services Deadline Cloud uses latest as the default. However, if you have multiple accelerators and specify latest for some and leave others blank, Amazon Web Services Deadline Cloud raises an exception. Not all runtimes are compatible with all accelerator types: t4 and a10g: Support all runtimes (grid:r580, grid:r570, grid:r535) l4 and l40s: Only support grid:r570 and newer rtx-pro-server-6000: Only supports grid:r580 All accelerators in a fleet must use the same runtime version. You cannot mix different runtime versions within a single fleet. When you specify latest, it resolves to grid:r580 for all currently supported accelerators."
      required:
        - name
    AcceleratorName:
      type: string
      enum:
        - t4
        - a10g
        - l4
        - l40s
        - rtx-pro-server-6000
    AcceleratorRuntime:
      type: string
      minLength: 1
      maxLength: 100
    InstanceTypes:
      type: array
      items:
        $ref: "#/components/schemas/InstanceType"
