openapi: 3.0.0
info:
  version: "2023-10-12"
  title: AWSDeadlineCloud
  description: AWSDeadlineCloud
  x-serviceName: deadline
  x-serviceAlias: deadline
  x-protocol: rest-json
  x-apiVersion: "2023-10-12"
  x-endpointPrefix: deadline
servers:
  - url: https://deadline.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for deadline
paths:
  /2023-10-12/farms/{farm_id}/members/{principal_id}:
    put:
      operationId: AssociateMemberToFarm
      description: Assigns a farm membership level to a member.
      parameters:
        - name: farm_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FarmId"
          description: The ID of the farm to associate with the member.
        - name: principal_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityCenterPrincipalId"
          description: The member's principal ID to associate with the farm.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                principalType:
                  $ref: "#/components/schemas/PrincipalType"
                identityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                membershipLevel:
                  $ref: "#/components/schemas/MembershipLevel"
              required:
                - principalType
                - identityStoreId
                - membershipLevel
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateMemberToFarmResponse"
    delete:
      operationId: DisassociateMemberFromFarm
      description: Disassociates a member from a farm.
      parameters:
        - name: farm_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FarmId"
          description: The farm ID of the farm to disassociate from the member.
        - name: principal_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityCenterPrincipalId"
          description: A member's principal ID to disassociate from a farm.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateMemberFromFarmResponse"
  /2023-10-12/farms/{farm_id}/fleets/{fleet_id}/members/{principal_id}:
    put:
      operationId: AssociateMemberToFleet
      description: Assigns a fleet membership level to a member.
      parameters:
        - name: farm_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FarmId"
          description: The farm ID of the fleet to associate with the member.
        - name: fleet_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FleetId"
          description: The ID of the fleet to associate with a member.
        - name: principal_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityCenterPrincipalId"
          description: The member's principal ID to associate with a fleet.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                principalType:
                  $ref: "#/components/schemas/PrincipalType"
                identityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                membershipLevel:
                  $ref: "#/components/schemas/MembershipLevel"
              required:
                - principalType
                - identityStoreId
                - membershipLevel
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateMemberToFleetResponse"
    delete:
      operationId: DisassociateMemberFromFleet
      description: Disassociates a member from a fleet.
      parameters:
        - name: farm_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FarmId"
          description: The farm ID of the fleet to disassociate a member from.
        - name: fleet_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FleetId"
          description: The fleet ID of the fleet to from which to disassociate a member.
        - name: principal_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityCenterPrincipalId"
          description: A member's principal ID to disassociate from a fleet.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateMemberFromFleetResponse"
  /2023-10-12/farms/{farm_id}/queues/{queue_id}/jobs/{job_id}/members/{principal_id}:
    put:
      operationId: AssociateMemberToJob
      description: Assigns a job membership level to a member
      parameters:
        - name: farm_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FarmId"
          description: The farm ID of the job to associate with the member.
        - name: queue_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/QueueId"
          description: The queue ID to associate to the member.
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The job ID to associate with the member.
        - name: principal_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityCenterPrincipalId"
          description: The member's principal ID to associate with the job.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                principalType:
                  $ref: "#/components/schemas/PrincipalType"
                identityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                membershipLevel:
                  $ref: "#/components/schemas/MembershipLevel"
              required:
                - principalType
                - identityStoreId
                - membershipLevel
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateMemberToJobResponse"
    delete:
      operationId: DisassociateMemberFromJob
      description: Disassociates a member from a job.
      parameters:
        - name: farm_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FarmId"
          description: The farm ID for the job to disassociate from the member.
        - name: queue_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/QueueId"
          description: The queue ID connected to a job for which you're disassociating a member.
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The job ID to disassociate from a member in a job.
        - name: principal_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityCenterPrincipalId"
          description: A member's principal ID to disassociate from a job.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateMemberFromJobResponse"
  /2023-10-12/farms/{farm_id}/queues/{queue_id}/members/{principal_id}:
    put:
      operationId: AssociateMemberToQueue
      description: Assigns a queue membership level to a member
      parameters:
        - name: farm_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FarmId"
          description: The farm ID of the queue to associate with the member.
        - name: queue_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/QueueId"
          description: The ID of the queue to associate to the member.
        - name: principal_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityCenterPrincipalId"
          description: The member's principal ID to associate with the queue.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                principalType:
                  $ref: "#/components/schemas/PrincipalType"
                identityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                membershipLevel:
                  $ref: "#/components/schemas/MembershipLevel"
              required:
                - principalType
                - identityStoreId
                - membershipLevel
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateMemberToQueueResponse"
    delete:
      operationId: DisassociateMemberFromQueue
      description: Disassociates a member from a queue.
      parameters:
        - name: farm_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FarmId"
          description: The farm ID for the queue to disassociate from a member.
        - name: queue_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/QueueId"
          description: The queue ID of the queue in which you're disassociating from a member.
        - name: principal_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityCenterPrincipalId"
          description: A member's principal ID to disassociate from a queue.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateMemberFromQueueResponse"
  /2023-10-12/farms/{farm_id}/fleets/{fleet_id}/read-roles:
    get:
      operationId: AssumeFleetRoleForRead
      description: Get Amazon Web Services credentials from the fleet role. The IAM permissions of the credentials are scoped down to have read-only access.
      parameters:
        - name: farm_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FarmId"
          description: The farm ID for the fleet's farm.
        - name: fleet_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FleetId"
          description: The fleet ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssumeFleetRoleForReadResponse"
  /2023-10-12/farms/{farm_id}/fleets/{fleet_id}/workers/{worker_id}/fleet-roles:
    get:
      operationId: AssumeFleetRoleForWorker
      description: Get credentials from the fleet role for a worker.
      parameters:
        - name: farm_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FarmId"
          description: The farm ID for the fleet's farm.
        - name: fleet_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FleetId"
          description: The fleet ID that contains the worker.
        - name: worker_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkerId"
          description: The ID of the worker assuming the fleet role.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssumeFleetRoleForWorkerResponse"
  /2023-10-12/farms/{farm_id}/queues/{queue_id}/read-roles:
    get:
      operationId: AssumeQueueRoleForRead
      description: Gets Amazon Web Services credentials from the queue role. The IAM permissions of the credentials are scoped down to have read-only access.
      parameters:
        - name: farm_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FarmId"
          description: The farm ID of the farm containing the queue.
        - name: queue_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/QueueId"
          description: The queue ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssumeQueueRoleForReadResponse"
  /2023-10-12/farms/{farm_id}/queues/{queue_id}/user-roles:
    get:
      operationId: AssumeQueueRoleForUser
      description: Allows a user to assume a role for a queue.
      parameters:
        - name: farm_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FarmId"
          description: The farm ID of the queue that the user assumes the role for.
        - name: queue_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/QueueId"
          description: The queue ID of the queue that the user assumes the role for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssumeQueueRoleForUserResponse"
  /2023-10-12/farms/{farm_id}/fleets/{fleet_id}/workers/{worker_id}/queue-roles:
    get:
      operationId: AssumeQueueRoleForWorker
      description: Allows a worker to assume a queue role.
      parameters:
        - name: farm_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FarmId"
          description: The farm ID of the worker assuming the queue role.
        - name: fleet_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FleetId"
          description: The fleet ID of the worker assuming the queue role.
        - name: worker_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkerId"
          description: The worker ID of the worker assuming the queue role.
        - name: queueId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/QueueId"
          description: The queue ID of the worker assuming the queue role.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssumeQueueRoleForWorkerResponse"
  /2023-10-12/batch-get-job:
    post:
      operationId: BatchGetJob
      description: Retrieves multiple jobs in a single request. This is a batch version of the GetJob API. The result of getting each job is reported individually in the response. Because the batch request can result in a combination of successful and unsuccessful actions, you should check for batch errors even when the call returns an HTTP status code of 200.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identifiers:
                  $ref: "#/components/schemas/BatchGetJobIdentifiers"
              required:
                - identifiers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetJobResponse"
  /2023-10-12/farms/{farm_id}/fleets/{fleet_id}/workers/{worker_id}/batchGetJobEntity:
    post:
      operationId: BatchGetJobEntity
      description: Get batched job details for a worker.
      parameters:
        - name: farm_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FarmId"
          description: The farm ID of the worker that's fetching job details. The worker must have an assignment on a job to fetch job details.
        - name: fleet_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FleetId"
          description: The fleet ID of the worker that's fetching job details. The worker must have an assignment on a job to fetch job details.
        - name: worker_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkerId"
          description: The worker ID of the worker containing the job details to get.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identifiers:
                  $ref: "#/components/schemas/JobEntityIdentifiers"
              required:
                - identifiers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetJobEntityResponse"
  /2023-10-12/batch-get-session:
    post:
      operationId: BatchGetSession
      description: Retrieves multiple sessions in a single request. This is a batch version of the GetSession API. The result of getting each session is reported individually in the response. Because the batch request can result in a combination of successful and unsuccessful actions, you should check for batch errors even when the call returns an HTTP status code of 200.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identifiers:
                  $ref: "#/components/schemas/BatchGetSessionIdentifiers"
              required:
                - identifiers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetSessionResponse"
  /2023-10-12/batch-get-session-action:
    post:
      operationId: BatchGetSessionAction
      description: Retrieves multiple session actions in a single request. This is a batch version of the GetSessionAction API. The result of getting each session action is reported individually in the response. Because the batch request can result in a combination of successful and unsuccessful actions, you should check for batch errors even when the call returns an HTTP status code of 200.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identifiers:
                  $ref: "#/components/schemas/BatchGetSessionActionIdentifiers"
              required:
                - identifiers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetSessionActionResponse"
  /2023-10-12/batch-get-step:
    post:
      operationId: BatchGetStep
      description: Retrieves multiple steps in a single request. This is a batch version of the GetStep API. The result of getting each step is reported individually in the response. Because the batch request can result in a combination of successful and unsuccessful actions, you should check for batch errors even when the call returns an HTTP status code of 200.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identifiers:
                  $ref: "#/components/schemas/BatchGetStepIdentifiers"
              required:
