    SchedulingConfiguration:
      description: The scheduling configuration for a queue. Defines the strategy used to assign workers to jobs.
      type: object
      properties:
        priorityFifo:
          $ref: "#/components/schemas/PriorityFifoSchedulingConfiguration"
          description: Workers are assigned to the highest-priority job first. When multiple jobs share the same priority, the job submitted earliest receives workers first. This is the default scheduling configuration for new queues.
        priorityBalanced:
          $ref: "#/components/schemas/PriorityBalancedSchedulingConfiguration"
          description: Workers are distributed evenly across all jobs at the highest priority level. When workers cannot be evenly divided, the extra workers are assigned to the jobs submitted earliest. If a job has fewer remaining tasks than its share of workers, the surplus workers are redistributed to other jobs at the same priority level.
        weightedBalanced:
          $ref: "#/components/schemas/WeightedBalancedSchedulingConfiguration"
          description: Workers are assigned to jobs based on a weighted formula that considers job priority, error count, submission time, and the number of tasks currently rendering. Each factor has a configurable weight that determines its influence on scheduling decisions.
    PriorityFifoSchedulingConfiguration:
      description: Configuration for priority first-in, first-out (FIFO) scheduling. Workers are assigned to the highest-priority job first. When multiple jobs share the same priority, the job submitted earliest receives workers first.
      type: object
    PriorityBalancedSchedulingConfiguration:
      description: Configuration for priority balanced scheduling. Workers are distributed evenly across all jobs at the highest priority level.
      type: object
      properties:
        renderingTaskBuffer:
          $ref: "#/components/schemas/SchedulingRenderingTaskBuffer"
          description: The rendering task buffer controls worker stickiness. A worker only switches from its current job to another job at the same priority if the other job has fewer rendering tasks by more than this buffer value. Higher values make workers stickier to their current jobs. The default value is 1.
    SchedulingRenderingTaskBuffer:
      description: The rendering task buffer used in balanced scheduling.
      type: integer
      minimum: 0
      maximum: 1000
    WeightedBalancedSchedulingConfiguration:
      description: "Configuration for weighted balanced scheduling. Workers are assigned to jobs based on a weighted formula: weight = (priority * priorityWeight) + (errors * errorWeight) + ((currentTime - submissionTime) * submissionTimeWeight) + ((renderingTasks - renderingTaskBuffer) * renderingTaskWeight) The job with the highest calculated weight is scheduled first. Workers are distributed evenly amongst jobs with the same weight."
      type: object
      properties:
        priorityWeight:
          $ref: "#/components/schemas/SchedulingPriorityWeight"
          description: The weight applied to job priority in the scheduling formula. Higher values give more influence to job priority. A value of 0 means priority is ignored. The default value is 100.0.
        errorWeight:
          $ref: "#/components/schemas/SchedulingErrorWeight"
          description: The weight applied to the number of errors on a job. A negative value means jobs without errors are scheduled first. A value of 0 means errors are ignored. The default value is -10.0.
        submissionTimeWeight:
          $ref: "#/components/schemas/SchedulingSubmissionTimeWeight"
          description: The weight applied to job submission time. A positive value means earlier jobs are scheduled first. A value of 0 means submission time is ignored. The default value is 3.0.
        renderingTaskWeight:
          $ref: "#/components/schemas/SchedulingRenderingTaskWeight"
          description: The weight applied to the number of tasks currently rendering on a job. A negative value means jobs that are not already rendering are scheduled next. A value of 0 means the rendering state is ignored. The default value is -100.0.
        renderingTaskBuffer:
          $ref: "#/components/schemas/SchedulingRenderingTaskBuffer"
          description: The rendering task buffer is subtracted from the number of rendering tasks before applying the rendering task weight. This creates a stickiness effect where workers prefer to stay with their current job. Higher values make workers stickier. The default value is 1. The buffer is only applied in the weight calculation for a job if the worker is currently assigned to that job.
        maxPriorityOverride:
          $ref: "#/components/schemas/SchedulingMaxPriorityOverride"
          description: Overrides the weighted scheduling formula for jobs at the maximum priority (100). When set, jobs with priority 100 are always scheduled first regardless of their calculated weight. When absent, maximum priority jobs use the standard weighted formula.
        minPriorityOverride:
          $ref: "#/components/schemas/SchedulingMinPriorityOverride"
          description: Overrides the weighted scheduling formula for jobs at the minimum priority (0). When set, jobs with priority 0 are always scheduled last regardless of their calculated weight. When absent, minimum priority jobs use the standard weighted formula.
    SchedulingPriorityWeight:
      description: The weight applied to job priority in the weighted balanced scheduling formula.
      type: number
      format: double
      minimum: 0
      maximum: 10000
    SchedulingErrorWeight:
      description: The weight applied to the number of errors on a job in the weighted balanced scheduling formula.
      type: number
      format: double
      minimum: -10000
      maximum: 10000
    SchedulingSubmissionTimeWeight:
      description: The weight applied to job submission time in the weighted balanced scheduling formula.
      type: number
      format: double
      minimum: 0
      maximum: 10000
    SchedulingRenderingTaskWeight:
      description: The weight applied to the number of rendering tasks in the weighted balanced scheduling formula.
      type: number
      format: double
      minimum: -10000
      maximum: 10000
    SchedulingMaxPriorityOverride:
      description: Defines the override behavior for jobs at the maximum priority (100) in weighted balanced scheduling.
      type: object
      properties:
        alwaysScheduleFirst:
          $ref: "#/components/schemas/SchedulingMaxPriorityOverrideAlwaysScheduleFirst"
          description: Jobs at the maximum priority (100) are always scheduled before other jobs, regardless of the weighted scheduling formula. If multiple jobs have priority 100, ties are broken using the standard weighted formula.
    SchedulingMaxPriorityOverrideAlwaysScheduleFirst:
      description: Specifies that jobs at the maximum priority (100) are always scheduled first.
      type: object
    SchedulingMinPriorityOverride:
      description: Defines the override behavior for jobs at the minimum priority (0) in weighted balanced scheduling.
      type: object
      properties:
        alwaysScheduleLast:
          $ref: "#/components/schemas/SchedulingMinPriorityOverrideAlwaysScheduleLast"
          description: Jobs at the minimum priority (0) are always scheduled after all other jobs, regardless of the weighted scheduling formula. If multiple jobs have priority 0, ties are broken using the standard weighted formula.
    SchedulingMinPriorityOverrideAlwaysScheduleLast:
      description: Specifies that jobs at the minimum priority (0) are always scheduled last.
      type: object
