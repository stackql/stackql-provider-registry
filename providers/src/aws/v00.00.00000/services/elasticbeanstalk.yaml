          description: "A list of tags to add or update. If a key of an existing tag is added, the tag's value is updated. Specify at least one of these parameters: TagsToAdd, TagsToRemove."
          schema:
            $ref: "#/components/schemas/TagList"
        - name: TagsToRemove
          in: query
          required: false
          description: "A list of tag keys to remove. If a tag key doesn't exist, it is silently ignored. Specify at least one of these parameters: TagsToAdd, TagsToRemove."
          schema:
            $ref: "#/components/schemas/TagKeyList"
      responses:
        "200":
          description: Success
    post:
      operationId: POST_UpdateTagsForResource
      description: "Update the list of tags applied to an AWS Elastic Beanstalk resource. Two lists can be passed: TagsToAdd for tags to add or update, and TagsToRemove. Elastic Beanstalk supports tagging of all of its resources. For details about resource tagging, see Tagging Application Resources. If you create a custom IAM user policy to control permission to this operation, specify one of the following two virtual actions (or both) instead of the API operation name: elasticbeanstalk:AddTags Controls permission to call UpdateTagsForResource and pass a list of tags to add in the TagsToAdd parameter. elasticbeanstalk:RemoveTags Controls permission to call UpdateTagsForResource and pass a list of tag keys to remove in the TagsToRemove parameter. For details about creating a custom user policy, see Creating a Custom User Policy."
      responses:
        "200":
          description: Success
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/UpdateTagsForResourceMessage"
  /?Action=ValidateConfigurationSettings&Version=2010-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_ValidateConfigurationSettings
      description: Takes a set of configuration settings and either a configuration template or environment, and determines whether those values are valid. This action returns a list of messages indicating any errors or warnings associated with the selection of option values.
      parameters:
        - name: ApplicationName
          in: query
          required: true
          description: The name of the application that the configuration template or environment belongs to.
          schema:
            $ref: "#/components/schemas/ApplicationName"
        - name: TemplateName
          in: query
          required: false
          description: "The name of the configuration template to validate the settings against. Condition: You cannot specify both this and an environment name."
          schema:
            $ref: "#/components/schemas/ConfigurationTemplateName"
        - name: EnvironmentName
          in: query
          required: false
          description: "The name of the environment to validate the settings against. Condition: You cannot specify both this and a configuration template name."
          schema:
            $ref: "#/components/schemas/EnvironmentName"
        - name: OptionSettings
          in: query
          required: true
          description: A list of the options and desired values to evaluate.
          schema:
            $ref: "#/components/schemas/ConfigurationOptionSettingsList"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ValidateConfigurationSettingsOutputDisplay"
    post:
      operationId: POST_ValidateConfigurationSettings
      description: Takes a set of configuration settings and either a configuration template or environment, and determines whether those values are valid. This action returns a list of messages indicating any errors or warnings associated with the selection of option values.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ValidateConfigurationSettingsOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/ValidateConfigurationSettingsMessage"
