    ApplicationName:
      type: string
      minLength: 1
      maxLength: 100
    GroupName:
      type: string
      minLength: 1
      maxLength: 19
    VersionLabels:
      type: array
      items:
        $ref: "#/components/schemas/VersionLabel"
    VersionLabel:
      type: string
      minLength: 1
      maxLength: 100
    EnvironmentDescriptionsMessageDisplay:
      type: object
      properties:
        Environments:
          type: string
          description: Returns an EnvironmentDescription list.
        NextToken:
          type: string
          description: In a paginated request, the token that you can pass in a subsequent request to get the next response page.
    ComposeEnvironmentsOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentDescriptionsMessageDisplay"
    ComposeEnvironmentsMessage:
      description: Request to create or update a group of environments.
      type: object
      properties:
        ApplicationName:
          $ref: "#/components/schemas/ApplicationName"
          description: The name of the application to which the specified source bundles belong.
        GroupName:
          $ref: "#/components/schemas/GroupName"
          description: The name of the group to which the target environments belong. Specify a group name only if the environment name defined in each target environment's manifest ends with a + (plus) character. See Environment Manifest (env.yaml) for details.
        VersionLabels:
          $ref: "#/components/schemas/VersionLabels"
          description: A list of version labels, specifying one or more application source bundles that belong to the target application. Each source bundle must include an environment manifest that specifies the name of the environment and the name of the solution stack to use, and optionally can specify environment links to create.
    Description:
      type: string
      maxLength: 200
    ApplicationResourceLifecycleConfig:
      description: The resource lifecycle configuration for an application. Defines lifecycle settings for resources that belong to the application, and the service role that AWS Elastic Beanstalk assumes in order to apply lifecycle settings. The version lifecycle configuration defines lifecycle settings for application versions.
      type: object
      properties:
        ServiceRole:
          $ref: "#/components/schemas/String"
          description: The ARN of an IAM service role that Elastic Beanstalk has permission to assume. The ServiceRole property is required the first time that you provide a VersionLifecycleConfig for the application in one of the supporting calls (CreateApplication or UpdateApplicationResourceLifecycle). After you provide it once, in either one of the calls, Elastic Beanstalk persists the Service Role with the application, and you don't need to specify it again in subsequent UpdateApplicationResourceLifecycle calls. You can, however, specify it in subsequent calls to change the Service Role to another value.
        VersionLifecycleConfig:
          $ref: "#/components/schemas/ApplicationVersionLifecycleConfig"
          description: Defines lifecycle settings for application versions.
    ApplicationVersionLifecycleConfig:
      description: The application version lifecycle settings for an application. Defines the rules that Elastic Beanstalk applies to an application's versions in order to avoid hitting the per-region limit for application versions. When Elastic Beanstalk deletes an application version from its database, you can no longer deploy that version to an environment. The source bundle remains in S3 unless you configure the rule to delete it.
      type: object
      properties:
        MaxCountRule:
          $ref: "#/components/schemas/MaxCountRule"
          description: Specify a max count rule to restrict the number of application versions that are retained for an application.
        MaxAgeRule:
          $ref: "#/components/schemas/MaxAgeRule"
          description: Specify a max age rule to restrict the length of time that application versions are retained for an application.
    MaxCountRule:
      description: A lifecycle rule that deletes the oldest application version when the maximum count is exceeded.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Specify true to apply the rule, or false to disable it.
        MaxCount:
          $ref: "#/components/schemas/BoxedInt"
          description: Specify the maximum number of application versions to retain.
        DeleteSourceFromS3:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Set to true to delete a version's source bundle from Amazon S3 when Elastic Beanstalk deletes the application version.
      required:
        - Enabled
    BoxedBoolean:
      type: boolean
    BoxedInt:
      type: integer
    MaxAgeRule:
      description: A lifecycle rule that deletes application versions after the specified number of days.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Specify true to apply the rule, or false to disable it.
        MaxAgeInDays:
          $ref: "#/components/schemas/BoxedInt"
          description: Specify the number of days to retain an application versions.
        DeleteSourceFromS3:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Set to true to delete a version's source bundle from Amazon S3 when Elastic Beanstalk deletes the application version.
      required:
        - Enabled
    Tags:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Describes a tag applied to a resource in an environment.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key of the tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the tag.
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 1
      maxLength: 256
    ApplicationDescriptionDisplay:
      type: object
      properties:
        ApplicationArn:
          type: string
          description: The Amazon Resource Name (ARN) of the application.
        ApplicationName:
          type: string
          description: The name of the application.
        Description:
          type: string
          description: User-defined description of the application.
        DateCreated:
          type: string
          description: The date when the application was created.
        DateUpdated:
          type: string
          description: The date when the application was last modified.
        Versions:
          type: string
          description: The names of the versions for this application.
        ConfigurationTemplates:
          type: string
          description: The names of the configuration templates associated with this application.
        ResourceLifecycleConfig:
          type: string
          description: The lifecycle settings for the application.
    CreateApplicationOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationDescriptionDisplay"
    CreateApplicationMessage:
      description: Request to create an application.
      type: object
      properties:
        ApplicationName:
          $ref: "#/components/schemas/ApplicationName"
          description: The name of the application. Must be unique within your account.
        Description:
          $ref: "#/components/schemas/Description"
          description: Your description of the application.
        ResourceLifecycleConfig:
          $ref: "#/components/schemas/ApplicationResourceLifecycleConfig"
          description: Specifies an application resource lifecycle configuration to prevent your application from accumulating too many versions.
        Tags:
          $ref: "#/components/schemas/Tags"
          description: Specifies the tags applied to the application. Elastic Beanstalk applies these tags only to the application. Environments that you create in the application don't inherit the tags.
      required:
        - ApplicationName
    SourceBuildInformation:
      description: Location of the source code for an application version.
      type: object
      properties:
        SourceType:
          $ref: "#/components/schemas/SourceType"
          description: The type of repository. Git Zip
        SourceRepository:
          $ref: "#/components/schemas/SourceRepository"
          description: Location where the repository is stored. CodeCommit S3
        SourceLocation:
          $ref: "#/components/schemas/SourceLocation"
          description: The location of the source code, as a formatted string, depending on the value of SourceRepository For CodeCommit, the format is the repository name and commit ID, separated by a forward slash. For example, my-git-repo/265cfa0cf6af46153527f55d6503ec030551f57a. For S3, the format is the S3 bucket name and object key, separated by a forward slash. For example, my-s3-bucket/Folders/my-source-file.
      required:
        - SourceType
        - SourceRepository
        - SourceLocation
    SourceType:
      type: string
      enum:
        - Git
        - Zip
    SourceRepository:
      type: string
      enum:
        - CodeCommit
        - S3
    SourceLocation:
      type: string
      minLength: 3
      maxLength: 255
      pattern: .+/.+
    S3Location:
      description: The bucket and key of an item stored in Amazon S3.
      type: object
      properties:
        S3Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The Amazon S3 bucket where the data is located.
        S3Key:
          $ref: "#/components/schemas/S3Key"
          description: The Amazon S3 key where the data is located.
    S3Bucket:
      type: string
      maxLength: 255
    S3Key:
      type: string
      maxLength: 1024
    BuildConfiguration:
      description: Settings for an AWS CodeBuild build.
      type: object
      properties:
        ArtifactName:
          $ref: "#/components/schemas/String"
          description: The name of the artifact of the CodeBuild build. If provided, Elastic Beanstalk stores the build artifact in the S3 location S3-bucket/resources/application-name/codebuild/codebuild-version-label-artifact-name.zip. If not provided, Elastic Beanstalk stores the build artifact in the S3 location S3-bucket/resources/application-name/codebuild/codebuild-version-label.zip.
        CodeBuildServiceRole:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the AWS Identity and Access Management (IAM) role that enables AWS CodeBuild to interact with dependent AWS services on behalf of the AWS account.
        ComputeType:
          $ref: "#/components/schemas/ComputeType"
          description: "Information about the compute resources the build project will use. BUILD_GENERAL1_SMALL: Use up to 3 GB memory and 2 vCPUs for builds BUILD_GENERAL1_MEDIUM: Use up to 7 GB memory and 4 vCPUs for builds BUILD_GENERAL1_LARGE: Use up to 15 GB memory and 8 vCPUs for builds"
        Image:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the Docker image to use for this build project.
        TimeoutInMinutes:
          $ref: "#/components/schemas/BoxedInt"
          description: How long in minutes, from 5 to 480 (8 hours), for AWS CodeBuild to wait until timing out any related build that does not get marked as completed. The default is 60 minutes.
      required:
        - CodeBuildServiceRole
        - Image
    NonEmptyString:
      type: string
      pattern: .*\S.*
    ComputeType:
      type: string
      enum:
        - BUILD_GENERAL1_SMALL
        - BUILD_GENERAL1_MEDIUM
        - BUILD_GENERAL1_LARGE
    AutoCreateApplication:
      type: boolean
    ApplicationVersionProccess:
      type: boolean
    ApplicationVersionDescriptionDisplay:
      type: object
      properties:
        ApplicationVersionArn:
          type: string
          description: The Amazon Resource Name (ARN) of the application version.
        ApplicationName:
          type: string
          description: The name of the application to which the application version belongs.
        Description:
          type: string
          description: The description of the application version.
        VersionLabel:
          type: string
          description: A unique identifier for the application version.
        SourceBuildInformation:
          type: string
          description: If the version's source code was retrieved from AWS CodeCommit, the location of the source code for the application version.
        BuildArn:
          type: string
          description: Reference to the artifact from the AWS CodeBuild build.
        SourceBundle:
          type: string
          description: The storage location of the application version's source bundle in Amazon S3.
        DateCreated:
          type: string
          description: The creation date of the application version.
        DateUpdated:
          type: string
          description: The last modified date of the application version.
        Status:
          type: string
          description: The processing status of the application version. Reflects the state of the application version during its creation. Many of the values are only applicable if you specified True for the Process parameter of the CreateApplicationVersion action. The following list describes the possible values. Unprocessed – Application version wasn't pre-processed or validated. Elastic Beanstalk will validate configuration files during deployment of the application version to an environment. Processing – Elastic Beanstalk is currently processing the application version. Building – Application version is currently undergoing an AWS CodeBuild build. Processed – Elastic Beanstalk was successfully pre-processed and validated. Failed – Either the AWS CodeBuild build failed or configuration files didn't pass validation. This application version isn't usable.
    CreateApplicationVersionOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationVersionDescriptionDisplay"
    CreateApplicationVersionMessage:
      type: object
      properties:
        ApplicationName:
          $ref: "#/components/schemas/ApplicationName"
          description: The name of the application. If no application is found with this name, and AutoCreateApplication is false, returns an InvalidParameterValue error.
        VersionLabel:
          $ref: "#/components/schemas/VersionLabel"
          description: "A label identifying this version. Constraint: Must be unique per application. If an application version already exists with this label for the specified application, AWS Elastic Beanstalk returns an InvalidParameterValue error."
        Description:
          $ref: "#/components/schemas/Description"
          description: A description of this application version.
        SourceBuildInformation:
          $ref: "#/components/schemas/SourceBuildInformation"
          description: Specify a commit in an AWS CodeCommit Git repository to use as the source code for the application version.
        SourceBundle:
          $ref: "#/components/schemas/S3Location"
          description: The Amazon S3 bucket and key that identify the location of the source bundle for this version. The Amazon S3 bucket must be in the same region as the environment. Specify a source bundle in S3 or a commit in an AWS CodeCommit repository (with SourceBuildInformation), but not both. If neither SourceBundle nor SourceBuildInformation are provided, Elastic Beanstalk uses a sample application.
        BuildConfiguration:
          $ref: "#/components/schemas/BuildConfiguration"
          description: Settings for an AWS CodeBuild build.
        AutoCreateApplication:
          $ref: "#/components/schemas/AutoCreateApplication"
          description: Set to true to create an application with the specified name if it doesn't already exist.
        Process:
          $ref: "#/components/schemas/ApplicationVersionProccess"
          description: Pre-processes and validates the environment manifest (env.yaml) and configuration files (*.config files in the .ebextensions folder) in the source bundle. Validating configuration files can identify issues prior to deploying the application version to an environment. You must turn processing on for application versions that you create using AWS CodeBuild or AWS CodeCommit. For application versions built from a source bundle in Amazon S3, processing is optional. The Process option validates Elastic Beanstalk configuration files. It doesn't validate your application's configuration files, like proxy server or Docker configuration.
        Tags:
          $ref: "#/components/schemas/Tags"
          description: Specifies the tags applied to the application version. Elastic Beanstalk applies these tags only to the application version. Environments that use the application version don't inherit the tags.
      required:
        - ApplicationName
        - VersionLabel
    ConfigurationTemplateName:
      type: string
      minLength: 1
      maxLength: 100
    SolutionStackName:
      type: string
    PlatformArn:
      type: string
    SourceConfiguration:
      description: A specification for an environment configuration.
      type: object
      properties:
        ApplicationName:
          $ref: "#/components/schemas/ApplicationName"
          description: The name of the application associated with the configuration.
        TemplateName:
          $ref: "#/components/schemas/ConfigurationTemplateName"
          description: The name of the configuration template.
    ConfigurationOptionSettingsList:
      type: array
      items:
        $ref: "#/components/schemas/ConfigurationOptionSetting"
    ConfigurationOptionSetting:
      description: A specification identifying an individual configuration option along with its current value. For a list of possible namespaces and option values, see Option Values in the AWS Elastic Beanstalk Developer Guide.
      type: object
      properties:
        ResourceName:
          $ref: "#/components/schemas/ResourceName"
          description: A unique resource name for the option setting. Use it for a time–based scaling configuration option.
        Namespace:
          $ref: "#/components/schemas/OptionNamespace"
          description: A unique namespace that identifies the option's associated AWS resource.
        OptionName:
          $ref: "#/components/schemas/ConfigurationOptionName"
          description: The name of the configuration option.
        Value:
          $ref: "#/components/schemas/ConfigurationOptionValue"
          description: The current value for the configuration option.
    ResourceName:
      type: string
      minLength: 1
      maxLength: 256
    OptionNamespace:
      type: string
    ConfigurationOptionName:
      type: string
    ConfigurationOptionValue:
      type: string
    ConfigurationSettingsDescriptionDisplay:
      type: object
      properties:
        SolutionStackName:
          type: string
          description: The name of the solution stack this configuration set uses.
        PlatformArn:
          type: string
          description: The ARN of the platform version.
        ApplicationName:
          type: string
          description: The name of the application associated with this configuration set.
        TemplateName:
          type: string
          description: If not null, the name of the configuration template for this configuration set.
        Description:
          type: string
          description: Describes this configuration set.
        EnvironmentName:
          type: string
          description: If not null, the name of the environment for this configuration set.
        DeploymentStatus:
          type: string
          description: "If this configuration set is associated with an environment, the DeploymentStatus parameter indicates the deployment status of this configuration set: null: This configuration is not associated with a running environment. pending: This is a draft configuration that is not deployed to the associated environment but is in the process of deploying. deployed: This is the configuration that is currently deployed to the associated running environment. failed: This is a draft configuration that failed to successfully deploy."
        DateCreated:
          type: string
          description: The date (in UTC time) when this configuration set was created.
        DateUpdated:
          type: string
          description: The date (in UTC time) when this configuration set was last modified.
        OptionSettings:
          type: string
          description: A list of the configuration options and their values in this configuration set.
    CreateConfigurationTemplateOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ConfigurationSettingsDescriptionDisplay"
    CreateConfigurationTemplateMessage:
      description: Request to create a configuration template.
      type: object
      properties:
        ApplicationName:
          $ref: "#/components/schemas/ApplicationName"
          description: The name of the Elastic Beanstalk application to associate with this configuration template.
        TemplateName:
          $ref: "#/components/schemas/ConfigurationTemplateName"
          description: "The name of the configuration template. Constraint: This name must be unique per application."
        SolutionStackName:
          $ref: "#/components/schemas/SolutionStackName"
          description: The name of an Elastic Beanstalk solution stack (platform version) that this configuration uses. For example, 64bit Amazon Linux 2013.09 running Tomcat 7 Java 7. A solution stack specifies the operating system, runtime, and application server for a configuration template. It also determines the set of configuration options as well as the possible and default values. For more information, see Supported Platforms in the AWS Elastic Beanstalk Developer Guide. You must specify SolutionStackName if you don't specify PlatformArn, EnvironmentId, or SourceConfiguration. Use the ListAvailableSolutionStacks API to obtain a list of available solution stacks.
        PlatformArn:
          $ref: "#/components/schemas/PlatformArn"
          description: The Amazon Resource Name (ARN) of the custom platform. For more information, see Custom Platforms in the AWS Elastic Beanstalk Developer Guide. If you specify PlatformArn, then don't specify SolutionStackName.
        SourceConfiguration:
          $ref: "#/components/schemas/SourceConfiguration"
          description: "An Elastic Beanstalk configuration template to base this one on. If specified, Elastic Beanstalk uses the configuration values from the specified configuration template to create a new configuration. Values specified in OptionSettings override any values obtained from the SourceConfiguration. You must specify SourceConfiguration if you don't specify PlatformArn, EnvironmentId, or SolutionStackName. Constraint: If both solution stack name and source configuration are specified, the solution stack of the source configuration template must match the specified solution stack name."
        EnvironmentId:
          $ref: "#/components/schemas/EnvironmentId"
          description: The ID of an environment whose settings you want to use to create the configuration template. You must specify EnvironmentId if you don't specify PlatformArn, SolutionStackName, or SourceConfiguration.
        Description:
          $ref: "#/components/schemas/Description"
          description: An optional description for this configuration.
