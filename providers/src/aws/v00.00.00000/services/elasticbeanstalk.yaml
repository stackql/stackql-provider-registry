openapi: 3.0.0
info:
  version: "2010-12-01"
  title: AWS Elastic Beanstalk
  description: AWS Elastic Beanstalk
  x-serviceName: elasticbeanstalk
  x-serviceAlias: elasticbeanstalk
  x-protocol: query
  x-apiVersion: "2010-12-01"
  x-endpointPrefix: elasticbeanstalk
servers:
  - url: https://elasticbeanstalk.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for elasticbeanstalk
paths:
  /?Action=AbortEnvironmentUpdate&Version=2010-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AbortEnvironmentUpdate
      description: Cancels in-progress environment configuration update or application version deployment.
      parameters:
        - name: EnvironmentId
          in: query
          required: false
          description: This specifies the ID of the environment with the in-progress update that you want to cancel.
          schema:
            $ref: "#/components/schemas/EnvironmentId"
        - name: EnvironmentName
          in: query
          required: false
          description: This specifies the name of the environment with the in-progress update that you want to cancel.
          schema:
            $ref: "#/components/schemas/EnvironmentName"
      responses:
        "200":
          description: Success
    post:
      operationId: POST_AbortEnvironmentUpdate
      description: Cancels in-progress environment configuration update or application version deployment.
      responses:
        "200":
          description: Success
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AbortEnvironmentUpdateMessage"
  /?Action=ApplyEnvironmentManagedAction&Version=2010-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_ApplyEnvironmentManagedAction
      description: Applies a scheduled managed action immediately. A managed action can be applied only if its status is Scheduled. Get the status and action ID of a managed action with DescribeEnvironmentManagedActions.
      parameters:
        - name: EnvironmentName
          in: query
          required: false
          description: The name of the target environment.
          schema:
            $ref: "#/components/schemas/String"
        - name: EnvironmentId
          in: query
          required: false
          description: The environment ID of the target environment.
          schema:
            $ref: "#/components/schemas/String"
        - name: ActionId
          in: query
          required: true
          description: The action ID of the scheduled managed action to execute.
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ApplyEnvironmentManagedActionOutputDisplay"
    post:
      operationId: POST_ApplyEnvironmentManagedAction
      description: Applies a scheduled managed action immediately. A managed action can be applied only if its status is Scheduled. Get the status and action ID of a managed action with DescribeEnvironmentManagedActions.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ApplyEnvironmentManagedActionOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/ApplyEnvironmentManagedActionRequest"
  /?Action=AssociateEnvironmentOperationsRole&Version=2010-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AssociateEnvironmentOperationsRole
      description: Add or change the operations role used by an environment. After this call is made, Elastic Beanstalk uses the associated operations role for permissions to downstream services during subsequent calls acting on this environment. For more information, see Operations roles in the AWS Elastic Beanstalk Developer Guide.
      parameters:
        - name: EnvironmentName
          in: query
          required: true
          description: The name of the environment to which to set the operations role.
          schema:
            $ref: "#/components/schemas/EnvironmentName"
        - name: OperationsRole
          in: query
          required: true
          description: The Amazon Resource Name (ARN) of an existing IAM role to be used as the environment's operations role.
          schema:
            $ref: "#/components/schemas/OperationsRole"
      responses:
        "200":
          description: Success
    post:
      operationId: POST_AssociateEnvironmentOperationsRole
      description: Add or change the operations role used by an environment. After this call is made, Elastic Beanstalk uses the associated operations role for permissions to downstream services during subsequent calls acting on this environment. For more information, see Operations roles in the AWS Elastic Beanstalk Developer Guide.
      responses:
        "200":
          description: Success
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AssociateEnvironmentOperationsRoleMessage"
  /?Action=CheckDNSAvailability&Version=2010-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CheckDNSAvailability
      description: Checks if the specified CNAME is available.
      parameters:
        - name: CNAMEPrefix
          in: query
          required: true
          description: The prefix used when this CNAME is reserved.
          schema:
            $ref: "#/components/schemas/DNSCnamePrefix"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CheckDNSAvailabilityOutputDisplay"
    post:
      operationId: POST_CheckDNSAvailability
      description: Checks if the specified CNAME is available.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CheckDNSAvailabilityOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CheckDNSAvailabilityMessage"
  /?Action=ComposeEnvironments&Version=2010-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_ComposeEnvironments
      description: Create or update a group of environments that each run a separate component of a single application. Takes a list of version labels that specify application source bundles for each of the environments to create or update. The name of each environment and other required information must be included in the source bundles in an environment manifest named env.yaml. See Compose Environments for details.
      parameters:
        - name: ApplicationName
          in: query
          required: false
          description: The name of the application to which the specified source bundles belong.
          schema:
            $ref: "#/components/schemas/ApplicationName"
        - name: GroupName
          in: query
          required: false
          description: The name of the group to which the target environments belong. Specify a group name only if the environment name defined in each target environment's manifest ends with a + (plus) character. See Environment Manifest (env.yaml) for details.
          schema:
            $ref: "#/components/schemas/GroupName"
        - name: VersionLabels
          in: query
          required: false
          description: A list of version labels, specifying one or more application source bundles that belong to the target application. Each source bundle must include an environment manifest that specifies the name of the environment and the name of the solution stack to use, and optionally can specify environment links to create.
          schema:
            $ref: "#/components/schemas/VersionLabels"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ComposeEnvironmentsOutputDisplay"
    post:
      operationId: POST_ComposeEnvironments
      description: Create or update a group of environments that each run a separate component of a single application. Takes a list of version labels that specify application source bundles for each of the environments to create or update. The name of each environment and other required information must be included in the source bundles in an environment manifest named env.yaml. See Compose Environments for details.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ComposeEnvironmentsOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/ComposeEnvironmentsMessage"
  /?Action=CreateApplication&Version=2010-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateApplication
      description: Creates an application that has one configuration template named default and no application versions.
      parameters:
        - name: ApplicationName
          in: query
          required: true
          description: The name of the application. Must be unique within your account.
          schema:
            $ref: "#/components/schemas/ApplicationName"
        - name: Description
          in: query
          required: false
          description: Your description of the application.
          schema:
            $ref: "#/components/schemas/Description"
        - name: ResourceLifecycleConfig
          in: query
          required: false
          description: Specifies an application resource lifecycle configuration to prevent your application from accumulating too many versions.
          schema:
            $ref: "#/components/schemas/ApplicationResourceLifecycleConfig"
        - name: Tags
          in: query
          required: false
          description: Specifies the tags applied to the application. Elastic Beanstalk applies these tags only to the application. Environments that you create in the application don't inherit the tags.
          schema:
            $ref: "#/components/schemas/Tags"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateApplicationOutputDisplay"
    post:
      operationId: POST_CreateApplication
      description: Creates an application that has one configuration template named default and no application versions.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateApplicationOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CreateApplicationMessage"
  /?Action=CreateApplicationVersion&Version=2010-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateApplicationVersion
      description: "Creates an application version for the specified application. You can create an application version from a source bundle in Amazon S3, a commit in AWS CodeCommit, or the output of an AWS CodeBuild build as follows: Specify a commit in an AWS CodeCommit repository with SourceBuildInformation. Specify a build in an AWS CodeBuild with SourceBuildInformation and BuildConfiguration. Specify a source bundle in S3 with SourceBundle Omit both SourceBuildInformation and SourceBundle to use the default sample application. After you create an application version with a specified Amazon S3 bucket and key location, you can't change that Amazon S3 location. If you change the Amazon S3 location, you receive an exception when you attempt to launch an environment from the application version."
      parameters:
        - name: ApplicationName
          in: query
          required: true
          description: The name of the application. If no application is found with this name, and AutoCreateApplication is false, returns an InvalidParameterValue error.
          schema:
            $ref: "#/components/schemas/ApplicationName"
        - name: VersionLabel
          in: query
          required: true
          description: "A label identifying this version. Constraint: Must be unique per application. If an application version already exists with this label for the specified application, AWS Elastic Beanstalk returns an InvalidParameterValue error."
          schema:
            $ref: "#/components/schemas/VersionLabel"
        - name: Description
          in: query
          required: false
          description: A description of this application version.
          schema:
            $ref: "#/components/schemas/Description"
        - name: SourceBuildInformation
          in: query
          required: false
          description: Specify a commit in an AWS CodeCommit Git repository to use as the source code for the application version.
          schema:
            $ref: "#/components/schemas/SourceBuildInformation"
        - name: SourceBundle
          in: query
          required: false
          description: The Amazon S3 bucket and key that identify the location of the source bundle for this version. The Amazon S3 bucket must be in the same region as the environment. Specify a source bundle in S3 or a commit in an AWS CodeCommit repository (with SourceBuildInformation), but not both. If neither SourceBundle nor SourceBuildInformation are provided, Elastic Beanstalk uses a sample application.
          schema:
            $ref: "#/components/schemas/S3Location"
        - name: BuildConfiguration
          in: query
          required: false
          description: Settings for an AWS CodeBuild build.
          schema:
            $ref: "#/components/schemas/BuildConfiguration"
        - name: AutoCreateApplication
          in: query
          required: false
          description: Set to true to create an application with the specified name if it doesn't already exist.
          schema:
            $ref: "#/components/schemas/AutoCreateApplication"
        - name: Process
          in: query
          required: false
          description: Pre-processes and validates the environment manifest (env.yaml) and configuration files (*.config files in the .ebextensions folder) in the source bundle. Validating configuration files can identify issues prior to deploying the application version to an environment. You must turn processing on for application versions that you create using AWS CodeBuild or AWS CodeCommit. For application versions built from a source bundle in Amazon S3, processing is optional. The Process option validates Elastic Beanstalk configuration files. It doesn't validate your application's configuration files, like proxy server or Docker configuration.
          schema:
            $ref: "#/components/schemas/ApplicationVersionProccess"
        - name: Tags
          in: query
          required: false
          description: Specifies the tags applied to the application version. Elastic Beanstalk applies these tags only to the application version. Environments that use the application version don't inherit the tags.
          schema:
            $ref: "#/components/schemas/Tags"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateApplicationVersionOutputDisplay"
    post:
      operationId: POST_CreateApplicationVersion
      description: "Creates an application version for the specified application. You can create an application version from a source bundle in Amazon S3, a commit in AWS CodeCommit, or the output of an AWS CodeBuild build as follows: Specify a commit in an AWS CodeCommit repository with SourceBuildInformation. Specify a build in an AWS CodeBuild with SourceBuildInformation and BuildConfiguration. Specify a source bundle in S3 with SourceBundle Omit both SourceBuildInformation and SourceBundle to use the default sample application. After you create an application version with a specified Amazon S3 bucket and key location, you can't change that Amazon S3 location. If you change the Amazon S3 location, you receive an exception when you attempt to launch an environment from the application version."
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateApplicationVersionOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CreateApplicationVersionMessage"
  /?Action=CreateConfigurationTemplate&Version=2010-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateConfigurationTemplate
      description: Creates an AWS Elastic Beanstalk configuration template, associated with a specific Elastic Beanstalk application. You define application configuration settings in a configuration template. You can then use the configuration template to deploy different versions of the application with the same configuration settings. Templates aren't associated with any environment. The EnvironmentName response element is always null. Related Topics DescribeConfigurationOptions DescribeConfigurationSettings ListAvailableSolutionStacks
      parameters:
        - name: ApplicationName
          in: query
          required: true
          description: The name of the Elastic Beanstalk application to associate with this configuration template.
          schema:
            $ref: "#/components/schemas/ApplicationName"
        - name: TemplateName
          in: query
          required: true
          description: "The name of the configuration template. Constraint: This name must be unique per application."
          schema:
            $ref: "#/components/schemas/ConfigurationTemplateName"
        - name: SolutionStackName
          in: query
          required: false
          description: The name of an Elastic Beanstalk solution stack (platform version) that this configuration uses. For example, 64bit Amazon Linux 2013.09 running Tomcat 7 Java 7. A solution stack specifies the operating system, runtime, and application server for a configuration template. It also determines the set of configuration options as well as the possible and default values. For more information, see Supported Platforms in the AWS Elastic Beanstalk Developer Guide. You must specify SolutionStackName if you don't specify PlatformArn, EnvironmentId, or SourceConfiguration. Use the ListAvailableSolutionStacks API to obtain a list of available solution stacks.
          schema:
            $ref: "#/components/schemas/SolutionStackName"
        - name: PlatformArn
          in: query
          required: false
          description: The Amazon Resource Name (ARN) of the custom platform. For more information, see Custom Platforms in the AWS Elastic Beanstalk Developer Guide. If you specify PlatformArn, then don't specify SolutionStackName.
          schema:
            $ref: "#/components/schemas/PlatformArn"
        - name: SourceConfiguration
          in: query
          required: false
          description: "An Elastic Beanstalk configuration template to base this one on. If specified, Elastic Beanstalk uses the configuration values from the specified configuration template to create a new configuration. Values specified in OptionSettings override any values obtained from the SourceConfiguration. You must specify SourceConfiguration if you don't specify PlatformArn, EnvironmentId, or SolutionStackName. Constraint: If both solution stack name and source configuration are specified, the solution stack of the source configuration template must match the specified solution stack name."
          schema:
            $ref: "#/components/schemas/SourceConfiguration"
        - name: EnvironmentId
          in: query
          required: false
          description: The ID of an environment whose settings you want to use to create the configuration template. You must specify EnvironmentId if you don't specify PlatformArn, SolutionStackName, or SourceConfiguration.
          schema:
            $ref: "#/components/schemas/EnvironmentId"
        - name: Description
          in: query
          required: false
          description: An optional description for this configuration.
          schema:
            $ref: "#/components/schemas/Description"
        - name: OptionSettings
          in: query
          required: false
          description: Option values for the Elastic Beanstalk configuration, such as the instance type. If specified, these values override the values obtained from the solution stack or the source configuration template. For a complete list of Elastic Beanstalk configuration options, see Option Values in the AWS Elastic Beanstalk Developer Guide.
          schema:
            $ref: "#/components/schemas/ConfigurationOptionSettingsList"
        - name: Tags
          in: query
          required: false
          description: Specifies the tags applied to the configuration template.
          schema:
            $ref: "#/components/schemas/Tags"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateConfigurationTemplateOutputDisplay"
    post:
      operationId: POST_CreateConfigurationTemplate
      description: Creates an AWS Elastic Beanstalk configuration template, associated with a specific Elastic Beanstalk application. You define application configuration settings in a configuration template. You can then use the configuration template to deploy different versions of the application with the same configuration settings. Templates aren't associated with any environment. The EnvironmentName response element is always null. Related Topics DescribeConfigurationOptions DescribeConfigurationSettings ListAvailableSolutionStacks
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateConfigurationTemplateOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CreateConfigurationTemplateMessage"
  /?Action=CreateEnvironment&Version=2010-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateEnvironment
      description: Launches an AWS Elastic Beanstalk environment for the specified application using the specified configuration.
      parameters:
        - name: ApplicationName
          in: query
          required: true
          description: The name of the application that is associated with this environment.
          schema:
            $ref: "#/components/schemas/ApplicationName"
        - name: EnvironmentName
          in: query
          required: false
          description: "A unique name for the environment. Constraint: Must be from 4 to 40 characters in length. The name can contain only letters, numbers, and hyphens. It can't start or end with a hyphen. This name must be unique within a region in your account. If the specified name already exists in the region, Elastic Beanstalk returns an InvalidParameterValue error. If you don't specify the CNAMEPrefix parameter, the environment name becomes part of the CNAME, and therefore part of the visible URL for your application."
          schema:
            $ref: "#/components/schemas/EnvironmentName"
        - name: GroupName
          in: query
          required: false
          description: The name of the group to which the target environment belongs. Specify a group name only if the environment's name is specified in an environment manifest and not with the environment name parameter. See Environment Manifest (env.yaml) for details.
          schema:
            $ref: "#/components/schemas/GroupName"
        - name: Description
          in: query
          required: false
          description: Your description for this environment.
          schema:
            $ref: "#/components/schemas/Description"
        - name: CNAMEPrefix
          in: query
          required: false
          description: If specified, the environment attempts to use this value as the prefix for the CNAME in your Elastic Beanstalk environment URL. If not specified, the CNAME is generated automatically by appending a random alphanumeric string to the environment name.
          schema:
            $ref: "#/components/schemas/DNSCnamePrefix"
        - name: Tier
          in: query
          required: false
          description: Specifies the tier to use in creating this environment. The environment tier that you choose determines whether Elastic Beanstalk provisions resources to support a web application that handles HTTP(S) requests or a web application that handles background-processing tasks.
          schema:
            $ref: "#/components/schemas/EnvironmentTier"
        - name: Tags
          in: query
          required: false
          description: Specifies the tags applied to resources in the environment.
          schema:
            $ref: "#/components/schemas/Tags"
        - name: VersionLabel
          in: query
          required: false
          description: "The name of the application version to deploy. Default: If not specified, Elastic Beanstalk attempts to deploy the sample application."
          schema:
            $ref: "#/components/schemas/VersionLabel"
        - name: TemplateName
          in: query
          required: false
          description: The name of the Elastic Beanstalk configuration template to use with the environment. If you specify TemplateName, then don't specify SolutionStackName.
          schema:
            $ref: "#/components/schemas/ConfigurationTemplateName"
        - name: SolutionStackName
          in: query
          required: false
          description: The name of an Elastic Beanstalk solution stack (platform version) to use with the environment. If specified, Elastic Beanstalk sets the configuration values to the default values associated with the specified solution stack. For a list of current solution stacks, see Elastic Beanstalk Supported Platforms in the AWS Elastic Beanstalk Platforms guide. If you specify SolutionStackName, don't specify PlatformArn or TemplateName.
          schema:
            $ref: "#/components/schemas/SolutionStackName"
        - name: PlatformArn
          in: query
          required: false
          description: The Amazon Resource Name (ARN) of the custom platform to use with the environment. For more information, see Custom Platforms in the AWS Elastic Beanstalk Developer Guide. If you specify PlatformArn, don't specify SolutionStackName.
          schema:
            $ref: "#/components/schemas/PlatformArn"
        - name: OptionSettings
          in: query
          required: false
          description: If specified, AWS Elastic Beanstalk sets the specified configuration options to the requested value in the configuration set for the new environment. These override the values obtained from the solution stack or the configuration template.
          schema:
            $ref: "#/components/schemas/ConfigurationOptionSettingsList"
        - name: OptionsToRemove
          in: query
          required: false
          description: A list of custom user-defined configuration options to remove from the configuration set for this new environment.
          schema:
            $ref: "#/components/schemas/OptionsSpecifierList"
        - name: OperationsRole
          in: query
          required: false
          description: The Amazon Resource Name (ARN) of an existing IAM role to be used as the environment's operations role. If specified, Elastic Beanstalk uses the operations role for permissions to downstream services during this call and during subsequent calls acting on this environment. To specify an operations role, you must have the iam:PassRole permission for the role. For more information, see Operations roles in the AWS Elastic Beanstalk Developer Guide.
          schema:
            $ref: "#/components/schemas/OperationsRole"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateEnvironmentOutputDisplay"
    post:
      operationId: POST_CreateEnvironment
      description: Launches an AWS Elastic Beanstalk environment for the specified application using the specified configuration.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateEnvironmentOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CreateEnvironmentMessage"
