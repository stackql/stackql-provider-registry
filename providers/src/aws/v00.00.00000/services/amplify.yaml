openapi: 3.0.0
info:
  version: "2017-07-25"
  title: AWS Amplify
  description: AWS Amplify
  x-serviceName: amplify
  x-serviceAlias: amplify
  x-protocol: rest-json
  x-apiVersion: "2017-07-25"
  x-endpointPrefix: amplify
  x-jsonVersion: "1.1"
servers:
  - url: https://amplify.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for amplify
paths:
  /apps:
    post:
      operationId: CreateApp
      description: Creates a new Amplify app.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Name"
                description:
                  $ref: "#/components/schemas/Description"
                repository:
                  $ref: "#/components/schemas/Repository"
                platform:
                  $ref: "#/components/schemas/Platform"
                computeRoleArn:
                  $ref: "#/components/schemas/ComputeRoleArn"
                iamServiceRoleArn:
                  $ref: "#/components/schemas/ServiceRoleArn"
                oauthToken:
                  $ref: "#/components/schemas/OauthToken"
                accessToken:
                  $ref: "#/components/schemas/AccessToken"
                environmentVariables:
                  $ref: "#/components/schemas/EnvironmentVariables"
                enableBranchAutoBuild:
                  $ref: "#/components/schemas/EnableBranchAutoBuild"
                enableBranchAutoDeletion:
                  $ref: "#/components/schemas/EnableBranchAutoDeletion"
                enableBasicAuth:
                  $ref: "#/components/schemas/EnableBasicAuth"
                basicAuthCredentials:
                  $ref: "#/components/schemas/BasicAuthCredentials"
                customRules:
                  $ref: "#/components/schemas/CustomRules"
                tags:
                  $ref: "#/components/schemas/TagMap"
                buildSpec:
                  $ref: "#/components/schemas/BuildSpec"
                customHeaders:
                  $ref: "#/components/schemas/CustomHeaders"
                enableAutoBranchCreation:
                  $ref: "#/components/schemas/EnableAutoBranchCreation"
                autoBranchCreationPatterns:
                  $ref: "#/components/schemas/AutoBranchCreationPatterns"
                autoBranchCreationConfig:
                  $ref: "#/components/schemas/AutoBranchCreationConfig"
                jobConfig:
                  $ref: "#/components/schemas/JobConfig"
                cacheConfig:
                  $ref: "#/components/schemas/CacheConfig"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAppResult"
    get:
      operationId: ListApps
      description: Returns a list of the existing Amplify apps.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token. If non-null, the pagination token is returned in a result. Pass its value in another request to retrieve more entries.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResultsForListApps"
          description: The maximum number of records to list in a single response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppsResult"
  /apps/{app_id}/backendenvironments:
    post:
      operationId: CreateBackendEnvironment
      description: Creates a new backend environment for an Amplify app. This API is available only to Amplify Gen 1 applications where the backend is created using Amplify Studio or the Amplify command line interface (CLI). This API isn’t available to Amplify Gen 2 applications. When you deploy an application with Amplify Gen 2, you provision the app's backend infrastructure using Typescript code.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                environmentName:
                  $ref: "#/components/schemas/EnvironmentName"
                stackName:
                  $ref: "#/components/schemas/StackName"
                deploymentArtifacts:
                  $ref: "#/components/schemas/DeploymentArtifacts"
              required:
                - environmentName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBackendEnvironmentResult"
    get:
      operationId: ListBackendEnvironments
      description: Lists the backend environments for an Amplify app. This API is available only to Amplify Gen 1 applications where the backend is created using Amplify Studio or the Amplify command line interface (CLI). This API isn’t available to Amplify Gen 2 applications. When you deploy an application with Amplify Gen 2, you provision the app's backend infrastructure using Typescript code.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
        - name: environmentName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentName"
          description: The name of the backend environment
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token. Set to null to start listing backend environments from the start. If a non-null pagination token is returned in a result, pass its value in here to list more backend environments.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of records to list in a single response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBackendEnvironmentsResult"
  /apps/{app_id}/branches:
    post:
      operationId: CreateBranch
      description: Creates a new branch for an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                branchName:
                  $ref: "#/components/schemas/BranchName"
                description:
                  $ref: "#/components/schemas/Description"
                stage:
                  $ref: "#/components/schemas/Stage"
                framework:
                  $ref: "#/components/schemas/Framework"
                enableNotification:
                  $ref: "#/components/schemas/EnableNotification"
                enableAutoBuild:
                  $ref: "#/components/schemas/EnableAutoBuild"
                enableSkewProtection:
                  $ref: "#/components/schemas/EnableSkewProtection"
                environmentVariables:
                  $ref: "#/components/schemas/EnvironmentVariables"
                basicAuthCredentials:
                  $ref: "#/components/schemas/BasicAuthCredentials"
                enableBasicAuth:
                  $ref: "#/components/schemas/EnableBasicAuth"
                enablePerformanceMode:
                  $ref: "#/components/schemas/EnablePerformanceMode"
                tags:
                  $ref: "#/components/schemas/TagMap"
                buildSpec:
                  $ref: "#/components/schemas/BuildSpec"
                ttl:
                  $ref: "#/components/schemas/TTL"
                displayName:
                  $ref: "#/components/schemas/DisplayName"
                enablePullRequestPreview:
                  $ref: "#/components/schemas/EnablePullRequestPreview"
                pullRequestEnvironmentName:
                  $ref: "#/components/schemas/PullRequestEnvironmentName"
                backendEnvironmentArn:
                  $ref: "#/components/schemas/BackendEnvironmentArn"
                backend:
                  $ref: "#/components/schemas/Backend"
                computeRoleArn:
                  $ref: "#/components/schemas/ComputeRoleArn"
              required:
                - branchName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBranchResult"
    get:
      operationId: ListBranches
      description: Lists the branches of an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token. Set to null to start listing branches from the start. If a non-null pagination token is returned in a result, pass its value in here to list more branches.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of records to list in a single response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBranchesResult"
  /apps/{app_id}/branches/{branch_name}/deployments:
    post:
      operationId: CreateDeployment
      description: Creates a deployment for a manually deployed Amplify app. Manually deployed apps are not connected to a Git repository. The maximum duration between the CreateDeployment call and the StartDeployment call cannot exceed 8 hours. If the duration exceeds 8 hours, the StartDeployment call and the associated Job will fail.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
        - name: branch_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BranchName"
          description: The name of the branch to use for the job.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                fileMap:
                  $ref: "#/components/schemas/FileMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDeploymentResult"
  /apps/{app_id}/domains:
    post:
      operationId: CreateDomainAssociation
      description: Creates a new domain association for an Amplify app. This action associates a custom domain with the Amplify app
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domainName:
                  $ref: "#/components/schemas/DomainName"
                enableAutoSubDomain:
                  $ref: "#/components/schemas/EnableAutoSubDomain"
                subDomainSettings:
                  $ref: "#/components/schemas/SubDomainSettings"
                autoSubDomainCreationPatterns:
                  $ref: "#/components/schemas/AutoSubDomainCreationPatterns"
                autoSubDomainIAMRole:
                  $ref: "#/components/schemas/AutoSubDomainIAMRole"
                certificateSettings:
                  $ref: "#/components/schemas/CertificateSettings"
              required:
                - domainName
                - subDomainSettings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDomainAssociationResult"
    get:
      operationId: ListDomainAssociations
      description: Returns the domain associations for an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token. Set to null to start listing apps from the start. If non-null, a pagination token is returned in a result. Pass its value in here to list more projects.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of records to list in a single response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDomainAssociationsResult"
  /apps/{app_id}/webhooks:
    post:
      operationId: CreateWebhook
      description: Creates a new webhook on an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                branchName:
                  $ref: "#/components/schemas/BranchName"
                description:
                  $ref: "#/components/schemas/Description"
              required:
                - branchName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWebhookResult"
    get:
      operationId: ListWebhooks
      description: Returns a list of webhooks for an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token. Set to null to start listing webhooks from the start. If non-null,the pagination token is returned in a result. Pass its value in here to list more webhooks.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of records to list in a single response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWebhooksResult"
  /apps/{app_id}:
    delete:
      operationId: DeleteApp
      description: Deletes an existing Amplify app specified by an app ID.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAppResult"
    get:
      operationId: GetApp
      description: Returns an existing Amplify app specified by an app ID.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAppResult"
    post:
      operationId: UpdateApp
      description: Updates an existing Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Name"
                description:
                  $ref: "#/components/schemas/Description"
                platform:
                  $ref: "#/components/schemas/Platform"
                computeRoleArn:
                  $ref: "#/components/schemas/ComputeRoleArn"
                iamServiceRoleArn:
                  $ref: "#/components/schemas/ServiceRoleArn"
                environmentVariables:
                  $ref: "#/components/schemas/EnvironmentVariables"
                enableBranchAutoBuild:
                  $ref: "#/components/schemas/EnableAutoBuild"
                enableBranchAutoDeletion:
                  $ref: "#/components/schemas/EnableBranchAutoDeletion"
                enableBasicAuth:
                  $ref: "#/components/schemas/EnableBasicAuth"
                basicAuthCredentials:
                  $ref: "#/components/schemas/BasicAuthCredentials"
                customRules:
                  $ref: "#/components/schemas/CustomRules"
                buildSpec:
                  $ref: "#/components/schemas/BuildSpec"
                customHeaders:
                  $ref: "#/components/schemas/CustomHeaders"
                enableAutoBranchCreation:
                  $ref: "#/components/schemas/EnableAutoBranchCreation"
                autoBranchCreationPatterns:
                  $ref: "#/components/schemas/AutoBranchCreationPatterns"
                autoBranchCreationConfig:
                  $ref: "#/components/schemas/AutoBranchCreationConfig"
                repository:
                  $ref: "#/components/schemas/Repository"
                oauthToken:
                  $ref: "#/components/schemas/OauthToken"
                accessToken:
                  $ref: "#/components/schemas/AccessToken"
                jobConfig:
                  $ref: "#/components/schemas/JobConfig"
                cacheConfig:
                  $ref: "#/components/schemas/CacheConfig"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAppResult"
  /apps/{app_id}/backendenvironments/{environment_name}:
    delete:
      operationId: DeleteBackendEnvironment
      description: Deletes a backend environment for an Amplify app. This API is available only to Amplify Gen 1 applications where the backend is created using Amplify Studio or the Amplify command line interface (CLI). This API isn’t available to Amplify Gen 2 applications. When you deploy an application with Amplify Gen 2, you provision the app's backend infrastructure using Typescript code.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID of an Amplify app.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentName"
          description: The name of a backend environment of an Amplify app.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBackendEnvironmentResult"
    get:
      operationId: GetBackendEnvironment
      description: Returns a backend environment for an Amplify app. This API is available only to Amplify Gen 1 applications where the backend is created using Amplify Studio or the Amplify command line interface (CLI). This API isn’t available to Amplify Gen 2 applications. When you deploy an application with Amplify Gen 2, you provision the app's backend infrastructure using Typescript code.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique id for an Amplify app.
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentName"
          description: The name for the backend environment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBackendEnvironmentResult"
  /apps/{app_id}/branches/{branch_name}:
    delete:
      operationId: DeleteBranch
      description: Deletes a branch for an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
        - name: branch_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BranchName"
          description: The name of the branch.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBranchResult"
    get:
      operationId: GetBranch
      description: Returns a branch for an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
        - name: branch_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BranchName"
          description: The name of the branch.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBranchResult"
    post:
      operationId: UpdateBranch
      description: Updates a branch for an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
        - name: branch_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BranchName"
          description: The name of the branch.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/Description"
                framework:
                  $ref: "#/components/schemas/Framework"
                stage:
                  $ref: "#/components/schemas/Stage"
                enableNotification:
                  $ref: "#/components/schemas/EnableNotification"
                enableAutoBuild:
                  $ref: "#/components/schemas/EnableAutoBuild"
                enableSkewProtection:
                  $ref: "#/components/schemas/EnableSkewProtection"
                environmentVariables:
                  $ref: "#/components/schemas/EnvironmentVariables"
                basicAuthCredentials:
                  $ref: "#/components/schemas/BasicAuthCredentials"
                enableBasicAuth:
                  $ref: "#/components/schemas/EnableBasicAuth"
                enablePerformanceMode:
                  $ref: "#/components/schemas/EnablePerformanceMode"
                buildSpec:
                  $ref: "#/components/schemas/BuildSpec"
                ttl:
                  $ref: "#/components/schemas/TTL"
                displayName:
                  $ref: "#/components/schemas/DisplayName"
                enablePullRequestPreview:
                  $ref: "#/components/schemas/EnablePullRequestPreview"
                pullRequestEnvironmentName:
                  $ref: "#/components/schemas/PullRequestEnvironmentName"
                backendEnvironmentArn:
                  $ref: "#/components/schemas/BackendEnvironmentArn"
                backend:
                  $ref: "#/components/schemas/Backend"
                computeRoleArn:
                  $ref: "#/components/schemas/ComputeRoleArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBranchResult"
  /apps/{app_id}/domains/{domain_name}:
    delete:
      operationId: DeleteDomainAssociation
      description: Deletes a domain association for an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique id for an Amplify app.
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDomainAssociationResult"
    get:
      operationId: GetDomainAssociation
      description: Returns the domain information for an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique id for an Amplify app.
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDomainAssociationResult"
    post:
      operationId: UpdateDomainAssociation
      description: Creates a new domain association for an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the domain.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                enableAutoSubDomain:
                  $ref: "#/components/schemas/EnableAutoSubDomain"
                subDomainSettings:
                  $ref: "#/components/schemas/SubDomainSettings"
                autoSubDomainCreationPatterns:
                  $ref: "#/components/schemas/AutoSubDomainCreationPatterns"
                autoSubDomainIAMRole:
                  $ref: "#/components/schemas/AutoSubDomainIAMRole"
                certificateSettings:
                  $ref: "#/components/schemas/CertificateSettings"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDomainAssociationResult"
  /apps/{app_id}/branches/{branch_name}/jobs/{job_id}:
    delete:
      operationId: DeleteJob
      description: Deletes a job for a branch of an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
        - name: branch_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BranchName"
          description: The name of the branch to use for the job.
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The unique ID for the job.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteJobResult"
    get:
      operationId: GetJob
      description: Returns a job for a branch of an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
        - name: branch_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BranchName"
          description: The name of the branch to use for the job.
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The unique ID for the job.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetJobResult"
  /webhooks/{webhook_id}:
    delete:
      operationId: DeleteWebhook
      description: Deletes a webhook.
      parameters:
        - name: webhook_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WebhookId"
          description: The unique ID for a webhook.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWebhookResult"
    get:
      operationId: GetWebhook
      description: Returns the webhook information that corresponds to a specified webhook ID.
      parameters:
        - name: webhook_id
          in: path
