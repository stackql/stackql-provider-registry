          $ref: "#/components/schemas/CertificateVerificationDNSRecord"
          description: The DNS record for certificate verification.
        subDomains:
          $ref: "#/components/schemas/SubDomains"
          description: The subdomains for the domain association.
        certificate:
          $ref: "#/components/schemas/Certificate"
          description: Describes the SSL/TLS certificate for the domain association. This can be your own custom certificate or the default certificate that Amplify provisions for you. If you are updating your domain to use a different certificate, certificate points to the new certificate that is being created instead of the current active certificate. Otherwise, certificate points to the current active certificate.
