          schema:
            $ref: "#/components/schemas/WebhookId"
          description: The unique ID for a webhook.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWebhookResult"
    post:
      operationId: UpdateWebhook
      description: Updates a webhook.
      parameters:
        - name: webhook_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WebhookId"
          description: The unique ID for a webhook.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                branchName:
                  $ref: "#/components/schemas/BranchName"
                description:
                  $ref: "#/components/schemas/Description"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWebhookResult"
  /apps/{app_id}/accesslogs:
    post:
      operationId: GenerateAccessLogs
      description: Returns the website access logs for a specific time range using a presigned URL.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                startTime:
                  $ref: "#/components/schemas/StartTime"
                endTime:
                  $ref: "#/components/schemas/EndTime"
                domainName:
                  $ref: "#/components/schemas/DomainName"
              required:
                - domainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateAccessLogsResult"
  /artifacts/{artifact_id}:
    get:
      operationId: GetArtifactUrl
      description: Returns the artifact info that corresponds to an artifact id.
      parameters:
        - name: artifact_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ArtifactId"
          description: The unique ID for an artifact.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetArtifactUrlResult"
  /apps/{app_id}/branches/{branch_name}/jobs/{job_id}/artifacts:
    get:
      operationId: ListArtifacts
      description: Returns a list of end-to-end testing artifacts for a specified app, branch, and job. To return the build artifacts, use the GetJob API. For more information about Amplify testing support, see Setting up end-to-end Cypress tests for your Amplify application in the Amplify Hosting User Guide.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
        - name: branch_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BranchName"
          description: The name of a branch that is part of an Amplify app.
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The unique ID for a job.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token. Set to null to start listing artifacts from start. If a non-null pagination token is returned in a result, pass its value in here to list more artifacts.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of records to list in a single response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListArtifactsResult"
  /apps/{app_id}/branches/{branch_name}/jobs:
    get:
      operationId: ListJobs
      description: Lists the jobs for a branch of an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
        - name: branch_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BranchName"
          description: The name of the branch to use for the request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token. Set to null to start listing steps from the start. If a non-null pagination token is returned in a result, pass its value in here to list more steps.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of records to list in a single response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListJobsResult"
    post:
      operationId: StartJob
      description: Starts a new job for a branch of an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
        - name: branch_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BranchName"
          description: The name of the branch to use for the job.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobId:
                  $ref: "#/components/schemas/JobId"
                jobType:
                  $ref: "#/components/schemas/JobType"
                jobReason:
                  $ref: "#/components/schemas/JobReason"
                commitId:
                  $ref: "#/components/schemas/CommitId"
                commitMessage:
                  $ref: "#/components/schemas/CommitMessage"
                commitTime:
                  $ref: "#/components/schemas/CommitTime"
              required:
                - jobType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartJobResult"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns a list of tags for a specified Amazon Resource Name (ARN).
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) to use to list tags.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Tags the resource with a tag key and value.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) to use to tag a resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Untags a resource with a specified Amazon Resource Name (ARN).
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) to use to untag a resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The tag keys to use to untag a resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /apps/{app_id}/branches/{branch_name}/deployments/start:
    post:
      operationId: StartDeployment
      description: Starts a deployment for a manually deployed app. Manually deployed apps are not connected to a Git repository. The maximum duration between the CreateDeployment call and the StartDeployment call cannot exceed 8 hours. If the duration exceeds 8 hours, the StartDeployment call and the associated Job will fail.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
        - name: branch_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BranchName"
          description: The name of the branch to use for the deployment job.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                jobId:
                  $ref: "#/components/schemas/JobId"
                sourceUrl:
                  $ref: "#/components/schemas/SourceUrl"
                sourceUrlType:
                  $ref: "#/components/schemas/SourceUrlType"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartDeploymentResult"
  /apps/{app_id}/branches/{branch_name}/jobs/{job_id}/stop:
    delete:
      operationId: StopJob
      description: Stops a job that is in progress for a branch of an Amplify app.
      parameters:
        - name: app_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AppId"
          description: The unique ID for an Amplify app.
        - name: branch_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BranchName"
          description: The name of the branch to use for the stop job request.
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The unique id for the job.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopJobResult"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Name:
      type: string
      minLength: 1
      maxLength: 255
      pattern: (?s).+
    Description:
      type: string
      maxLength: 1000
      pattern: (?s).*
    Repository:
      type: string
      maxLength: 1000
      pattern: (?s).*
    Platform:
      type: string
      enum:
        - WEB
        - WEB_DYNAMIC
        - WEB_COMPUTE
    ComputeRoleArn:
      type: string
      minLength: 0
      maxLength: 1000
      pattern: (?s).*
    ServiceRoleArn:
      type: string
      minLength: 0
      maxLength: 1000
      pattern: (?s).*
    OauthToken:
      type: string
      maxLength: 1000
      pattern: (?s).*
    AccessToken:
      type: string
      minLength: 1
      maxLength: 255
      pattern: (?s).+
    EnvironmentVariables:
      type: object
      properties: {}
    EnableBranchAutoBuild:
      type: boolean
    EnableBranchAutoDeletion:
      type: boolean
    EnableBasicAuth:
      type: boolean
    BasicAuthCredentials:
      type: string
      maxLength: 2000
      pattern: (?s).*
    CustomRules:
      type: array
      items:
        $ref: "#/components/schemas/CustomRule"
    CustomRule:
      description: Describes a custom rewrite or redirect rule.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
          description: The source pattern for a URL rewrite or redirect rule.
        target:
          $ref: "#/components/schemas/Target"
          description: The target pattern for a URL rewrite or redirect rule.
        status:
          $ref: "#/components/schemas/Status"
          description: The status code for a URL rewrite or redirect rule. 200 Represents a 200 rewrite rule. 301 Represents a 301 (moved permanently) redirect rule. This and all future requests should be directed to the target URL. 302 Represents a 302 temporary redirect rule. 404 Represents a 404 redirect rule. 404-200 Represents a 404 rewrite rule.
        condition:
          $ref: "#/components/schemas/Condition"
          description: The condition for a URL rewrite or redirect rule, such as a country code.
      required:
        - source
        - target
    Source:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: (?s).+
    Target:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: (?s).+
    Status:
      type: string
      minLength: 3
      maxLength: 7
      pattern: .{3,7}
    Condition:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: (?s).*
    TagMap:
      type: object
      properties: {}
    BuildSpec:
      description: The build specification (build spec) file for an Amplify app build.
      type: string
      minLength: 1
      maxLength: 25000
      pattern: (?s).+
    CustomHeaders:
      type: string
      minLength: 0
      maxLength: 25000
      pattern: (?s).*
    EnableAutoBranchCreation:
      type: boolean
    AutoBranchCreationPatterns:
      type: array
      items:
        $ref: "#/components/schemas/AutoBranchCreationPattern"
    AutoBranchCreationPattern:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: (?s).+
    AutoBranchCreationConfig:
      description: Describes the automated branch creation configuration.
      type: object
      properties:
        stage:
          $ref: "#/components/schemas/Stage"
          description: Describes the current stage for the autocreated branch.
        framework:
          $ref: "#/components/schemas/Framework"
          description: The framework for the autocreated branch.
        enableAutoBuild:
          $ref: "#/components/schemas/EnableAutoBuild"
          description: Enables auto building for the autocreated branch.
        environmentVariables:
          type: object
          properties: {}
          description: The environment variables for the autocreated branch.
        basicAuthCredentials:
          $ref: "#/components/schemas/BasicAuthCredentials"
          description: The basic authorization credentials for the autocreated branch. You must base64-encode the authorization credentials and provide them in the format user:password.
        enableBasicAuth:
          $ref: "#/components/schemas/EnableBasicAuth"
          description: Enables basic authorization for the autocreated branch.
        enablePerformanceMode:
          $ref: "#/components/schemas/EnablePerformanceMode"
          description: Enables performance mode for the branch. Performance mode optimizes for faster hosting performance by keeping content cached at the edge for a longer interval. When performance mode is enabled, hosting configuration or code changes can take up to 10 minutes to roll out.
        buildSpec:
          $ref: "#/components/schemas/BuildSpec"
          description: The build specification (build spec) for the autocreated branch.
        enablePullRequestPreview:
          $ref: "#/components/schemas/EnablePullRequestPreview"
          description: Enables pull request previews for the autocreated branch.
        pullRequestEnvironmentName:
          $ref: "#/components/schemas/PullRequestEnvironmentName"
          description: The Amplify environment name for the pull request.
    Stage:
      type: string
      enum:
        - PRODUCTION
        - BETA
        - DEVELOPMENT
        - EXPERIMENTAL
        - PULL_REQUEST
    Framework:
      type: string
      maxLength: 255
      pattern: (?s).*
    EnableAutoBuild:
      type: boolean
    EnablePerformanceMode:
      type: boolean
    EnablePullRequestPreview:
      type: boolean
    PullRequestEnvironmentName:
      type: string
      maxLength: 20
      pattern: (?s).*
    JobConfig:
      description: Describes the configuration details that apply to the jobs for an Amplify app. Use JobConfig to apply configuration to jobs, such as customizing the build instance size when you create or update an Amplify app. For more information about customizable build instances, see Custom build instances in the Amplify User Guide.
      type: object
      properties:
        buildComputeType:
          $ref: "#/components/schemas/BuildComputeType"
          description: "Specifies the size of the build instance. Amplify supports three instance sizes: STANDARD_8GB, LARGE_16GB, and XLARGE_72GB. If you don't specify a value, Amplify uses the STANDARD_8GB default. The following list describes the CPU, memory, and storage capacity for each build instance type: STANDARD_8GB vCPUs: 4 Memory: 8 GiB Disk space: 128 GB LARGE_16GB vCPUs: 8 Memory: 16 GiB Disk space: 128 GB XLARGE_72GB vCPUs: 36 Memory: 72 GiB Disk space: 256 GB"
      required:
        - buildComputeType
    BuildComputeType:
      type: string
      enum:
        - STANDARD_8GB
        - LARGE_16GB
        - XLARGE_72GB
    CacheConfig:
      description: Describes the cache configuration for an Amplify app. For more information about how Amplify applies an optimal cache configuration for your app based on the type of content that is being served, see Managing cache configuration in the Amplify User guide.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/CacheConfigType"
          description: The type of cache configuration to use for an Amplify app. The AMPLIFY_MANAGED cache configuration automatically applies an optimized cache configuration for your app based on its platform, routing rules, and rewrite rules. The AMPLIFY_MANAGED_NO_COOKIES cache configuration type is the same as AMPLIFY_MANAGED, except that it excludes all cookies from the cache key. This is the default setting.
      required:
        - type_
    CacheConfigType:
      type: string
      enum:
        - AMPLIFY_MANAGED
        - AMPLIFY_MANAGED_NO_COOKIES
    CreateAppResult:
      type: object
      properties:
        app:
          $ref: "#/components/schemas/App"
      required:
        - app
    App:
      description: Represents the different branches of a repository for building, deploying, and hosting an Amplify app.
      type: object
      properties:
        appId:
          $ref: "#/components/schemas/AppId"
          description: The unique ID of the Amplify app.
        appArn:
          $ref: "#/components/schemas/AppArn"
          description: The Amazon Resource Name (ARN) of the Amplify app.
        name:
          $ref: "#/components/schemas/Name"
          description: The name for the Amplify app.
        tags:
          type: object
          properties: {}
          description: The tag for the Amplify app.
        description:
          $ref: "#/components/schemas/Description"
          description: The description for the Amplify app.
        repository:
          $ref: "#/components/schemas/Repository"
          description: The Git repository for the Amplify app.
        platform:
          $ref: "#/components/schemas/Platform"
          description: The platform for the Amplify app. For a static app, set the platform type to WEB. For a dynamic server-side rendered (SSR) app, set the platform type to WEB_COMPUTE. For an app requiring Amplify Hosting's original SSR support only, set the platform type to WEB_DYNAMIC. If you are deploying an SSG only app with Next.js 14 or later, you must use the platform type WEB_COMPUTE.
        createTime:
          $ref: "#/components/schemas/CreateTime"
          description: A timestamp of when Amplify created the application.
        updateTime:
          $ref: "#/components/schemas/UpdateTime"
          description: A timestamp of when Amplify updated the application.
        computeRoleArn:
          $ref: "#/components/schemas/ComputeRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role for an SSR app. The Compute role allows the Amplify Hosting compute service to securely access specific Amazon Web Services resources based on the role's permissions. For more information about the SSR Compute role, see Adding an SSR Compute role in the Amplify User Guide.
        iamServiceRoleArn:
          $ref: "#/components/schemas/ServiceRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM service role for the Amplify app.
        environmentVariables:
          type: object
          properties: {}
          description: The environment variables for the Amplify app. For a list of the environment variables that are accessible to Amplify by default, see Amplify Environment variables in the Amplify Hosting User Guide.
        defaultDomain:
          $ref: "#/components/schemas/DefaultDomain"
          description: The default domain for the Amplify app.
        enableBranchAutoBuild:
          $ref: "#/components/schemas/EnableBranchAutoBuild"
          description: Enables the auto-building of branches for the Amplify app.
        enableBranchAutoDeletion:
          $ref: "#/components/schemas/EnableBranchAutoDeletion"
          description: Automatically disconnect a branch in the Amplify console when you delete a branch from your Git repository.
        enableBasicAuth:
          $ref: "#/components/schemas/EnableBasicAuth"
          description: Enables basic authorization for the Amplify app's branches.
        basicAuthCredentials:
          $ref: "#/components/schemas/BasicAuthCredentials"
          description: The basic authorization credentials for branches for the Amplify app. You must base64-encode the authorization credentials and provide them in the format user:password.
        customRules:
          $ref: "#/components/schemas/CustomRules"
          description: Describes the custom redirect and rewrite rules for the Amplify app.
        productionBranch:
          $ref: "#/components/schemas/ProductionBranch"
          description: Describes the information about a production branch of the Amplify app.
        buildSpec:
          $ref: "#/components/schemas/BuildSpec"
          description: Describes the content of the build specification (build spec) for the Amplify app.
        customHeaders:
          $ref: "#/components/schemas/CustomHeaders"
          description: Describes the custom HTTP headers for the Amplify app.
        enableAutoBranchCreation:
          $ref: "#/components/schemas/EnableAutoBranchCreation"
          description: Enables automated branch creation for the Amplify app.
        autoBranchCreationPatterns:
          $ref: "#/components/schemas/AutoBranchCreationPatterns"
          description: Describes the automated branch creation glob patterns for the Amplify app.
        autoBranchCreationConfig:
          $ref: "#/components/schemas/AutoBranchCreationConfig"
          description: Describes the automated branch creation configuration for the Amplify app.
        repositoryCloneMethod:
          $ref: "#/components/schemas/RepositoryCloneMethod"
          description: This is for internal use. The Amplify service uses this parameter to specify the authentication protocol to use to access the Git repository for an Amplify app. Amplify specifies TOKEN for a GitHub repository, SIGV4 for an Amazon Web Services CodeCommit repository, and SSH for GitLab and Bitbucket repositories.
        cacheConfig:
          $ref: "#/components/schemas/CacheConfig"
          description: The cache configuration for the Amplify app. If you don't specify the cache configuration type, Amplify uses the default AMPLIFY_MANAGED setting.
        webhookCreateTime:
          $ref: "#/components/schemas/webhookCreateTime"
          description: A timestamp of when Amplify created the webhook in your Git repository.
        wafConfiguration:
          $ref: "#/components/schemas/WafConfiguration"
          description: Describes the Firewall configuration for the Amplify app. Firewall support enables you to protect your hosted applications with a direct integration with WAF.
        jobConfig:
          $ref: "#/components/schemas/JobConfig"
          description: The configuration details that apply to the jobs for an Amplify app.
      required:
        - appId
        - appArn
        - name
        - description
        - repository
        - platform
        - createTime
        - updateTime
        - environmentVariables
        - defaultDomain
        - enableBranchAutoBuild
        - enableBasicAuth
    AppId:
      type: string
      minLength: 1
      maxLength: 20
      pattern: d[a-z0-9]+
    AppArn:
      type: string
      maxLength: 1000
    CreateTime:
      type: string
      format: date-time
    UpdateTime:
      type: string
      format: date-time
    DefaultDomain:
      type: string
      minLength: 1
      maxLength: 1000
    ProductionBranch:
      description: Describes the information about a production branch for an Amplify app.
      type: object
      properties:
        lastDeployTime:
          $ref: "#/components/schemas/LastDeployTime"
          description: The last deploy time of the production branch.
        status:
          $ref: "#/components/schemas/Status"
          description: The status of the production branch.
        thumbnailUrl:
          $ref: "#/components/schemas/ThumbnailUrl"
          description: The thumbnail URL for the production branch.
        branchName:
          $ref: "#/components/schemas/BranchName"
          description: The branch name for the production branch.
    LastDeployTime:
      type: string
      format: date-time
    ThumbnailUrl:
      type: string
      minLength: 1
      maxLength: 2000
    BranchName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: (?s).+
    RepositoryCloneMethod:
      type: string
      enum:
        - SSH
        - TOKEN
        - SIGV4
    webhookCreateTime:
      type: string
      format: date-time
    WafConfiguration:
      description: Describes the Firewall configuration for a hosted Amplify application. Firewall support enables you to protect your web applications with a direct integration with WAF. For more information about using WAF protections for an Amplify application, see Firewall support for hosted sites in the Amplify User Guide.
      type: object
      properties:
        webAclArn:
          $ref: "#/components/schemas/WebAclArn"
          description: The Amazon Resource Name (ARN) for the web ACL associated with an Amplify app.
        wafStatus:
          $ref: "#/components/schemas/WafStatus"
          description: The status of the process to associate or disassociate a web ACL to an Amplify app.
        statusReason:
          $ref: "#/components/schemas/StatusReason"
          description: The reason for the current status of the Firewall configuration.
    WebAclArn:
      type: string
      minLength: 0
      maxLength: 512
      pattern: ^arn:aws:wafv2:.*
    WafStatus:
