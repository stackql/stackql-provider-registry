        totalNumberOfJobs:
          $ref: "#/components/schemas/TotalNumberOfJobs"
          description: The total number of jobs that are part of an Amplify app.
        enableBasicAuth:
          $ref: "#/components/schemas/EnableBasicAuth"
          description: Enables basic authorization for a branch of an Amplify app.
        enablePerformanceMode:
          $ref: "#/components/schemas/EnablePerformanceMode"
          description: Enables performance mode for the branch. Performance mode optimizes for faster hosting performance by keeping content cached at the edge for a longer interval. When performance mode is enabled, hosting configuration or code changes can take up to 10 minutes to roll out.
        thumbnailUrl:
          $ref: "#/components/schemas/ThumbnailUrl"
