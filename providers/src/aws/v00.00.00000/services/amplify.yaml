          $ref: "#/components/schemas/EnableAutoBuild"
          description: Enables auto-building on push for a branch of an Amplify app.
        enableSkewProtection:
          $ref: "#/components/schemas/EnableSkewProtection"
          description: Specifies whether the skew protection feature is enabled for the branch. Deployment skew protection is available to Amplify applications to eliminate version skew issues between client and servers in web applications. When you apply skew protection to a branch, you can ensure that your clients always interact with the correct version of server-side assets, regardless of when a deployment occurs. For more information about skew protection, see Skew protection for Amplify deployments in the Amplify User Guide.
        customDomains:
          $ref: "#/components/schemas/CustomDomains"
          description: The custom domains for a branch of an Amplify app.
        framework:
          $ref: "#/components/schemas/Framework"
          description: The framework for a branch of an Amplify app.
        activeJobId:
          $ref: "#/components/schemas/ActiveJobId"
