openapi: 3.0.0
info:
  version: "2021-09-30"
  title: AWS Cloud Control API
  description: AWS Cloud Control API
  x-serviceName: cloudcontrolapi
  x-serviceAlias: cloudcontrol
  x-protocol: json
  x-apiVersion: "2021-09-30"
  x-endpointPrefix: cloudcontrolapi
  x-targetPrefix: CloudApiService
  x-jsonVersion: "1.0"
servers:
  - url: https://cloudcontrolapi.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for cloudcontrol
paths:
  /CancelResourceRequest:
    post:
      operationId: CancelResourceRequest
      description: Cancels the specified resource operation request. For more information, see Canceling resource operation requests in the Amazon Web Services Cloud Control API User Guide. Only resource operations requests with a status of PENDING or IN_PROGRESS can be canceled.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CloudApiService.CancelResourceRequest
            default: CloudApiService.CancelResourceRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                RequestToken:
                  $ref: "#/components/schemas/RequestToken"
                  description: The RequestToken of the ProgressEvent object returned by the resource operation request.
              required:
                - RequestToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelResourceRequestOutput"
  /CreateResource:
    post:
      operationId: CreateResource
      description: Creates the specified resource. For more information, see Creating a resource in the Amazon Web Services Cloud Control API User Guide. After you have initiated a resource creation request, you can monitor the progress of your request by calling GetResourceRequestStatus using the RequestToken of the ProgressEvent type returned by CreateResource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CloudApiService.CreateResource
            default: CloudApiService.CreateResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TypeName:
                  $ref: "#/components/schemas/TypeName"
                  description: The name of the resource type.
                TypeVersionId:
                  $ref: "#/components/schemas/TypeVersionId"
                  description: For private resource types, the type version to use in this resource operation. If you do not specify a resource version, CloudFormation uses the default version.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of the Identity and Access Management (IAM) role for Cloud Control API to use when performing this resource operation. The role specified must have the permissions required for this operation. The necessary permissions for each event handler are defined in the handlers section of the resource type definition schema. If you do not specify a role, Cloud Control API uses a temporary session created using your Amazon Web Services user credentials. For more information, see Specifying credentials in the Amazon Web Services Cloud Control API User Guide.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique identifier to ensure the idempotency of the resource request. As a best practice, specify this token to ensure idempotency, so that Amazon Web Services Cloud Control API can accurately distinguish between request retries and new resource requests. You might retry a resource request to ensure that it was successfully received. A client token is valid for 36 hours once used. After that, a resource request with the same client token is treated as a new request. If you do not specify a client token, one is generated for inclusion in the request. For more information, see Ensuring resource operation requests are unique in the Amazon Web Services Cloud Control API User Guide.
                DesiredState:
                  $ref: "#/components/schemas/Properties"
                  description: "Structured data format representing the desired state of the resource, consisting of that resource's properties and their desired values. Cloud Control API currently supports JSON as a structured data format. Specify the desired state as one of the following: A JSON blob A local path containing the desired state in JSON data format For more information, see Composing the desired state of the resource in the Amazon Web Services Cloud Control API User Guide. For more information about the properties of a specific resource, refer to the related topic for the resource in the Resource and property types reference in the CloudFormation Users Guide."
              required:
                - TypeName
                - DesiredState
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResourceOutput"
  /DeleteResource:
    post:
      operationId: DeleteResource
      description: Deletes the specified resource. For details, see Deleting a resource in the Amazon Web Services Cloud Control API User Guide. After you have initiated a resource deletion request, you can monitor the progress of your request by calling GetResourceRequestStatus using the RequestToken of the ProgressEvent returned by DeleteResource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CloudApiService.DeleteResource
            default: CloudApiService.DeleteResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TypeName:
                  $ref: "#/components/schemas/TypeName"
                  description: The name of the resource type.
                TypeVersionId:
                  $ref: "#/components/schemas/TypeVersionId"
                  description: For private resource types, the type version to use in this resource operation. If you do not specify a resource version, CloudFormation uses the default version.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of the Identity and Access Management (IAM) role for Cloud Control API to use when performing this resource operation. The role specified must have the permissions required for this operation. The necessary permissions for each event handler are defined in the handlers section of the resource type definition schema. If you do not specify a role, Cloud Control API uses a temporary session created using your Amazon Web Services user credentials. For more information, see Specifying credentials in the Amazon Web Services Cloud Control API User Guide.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique identifier to ensure the idempotency of the resource request. As a best practice, specify this token to ensure idempotency, so that Amazon Web Services Cloud Control API can accurately distinguish between request retries and new resource requests. You might retry a resource request to ensure that it was successfully received. A client token is valid for 36 hours once used. After that, a resource request with the same client token is treated as a new request. If you do not specify a client token, one is generated for inclusion in the request. For more information, see Ensuring resource operation requests are unique in the Amazon Web Services Cloud Control API User Guide.
                Identifier:
                  $ref: "#/components/schemas/Identifier"
                  description: The identifier for the resource. You can specify the primary identifier, or any secondary identifier defined for the resource type in its resource schema. You can only specify one identifier. Primary identifiers can be specified as a string or JSON; secondary identifiers must be specified as JSON. For compound primary identifiers (that is, one that consists of multiple resource properties strung together), to specify the primary identifier as a string, list the property values in the order they are specified in the primary identifier definition, separated by |. For more information, see Identifying resources in the Amazon Web Services Cloud Control API User Guide.
              required:
                - TypeName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResourceOutput"
  /GetResource:
    post:
      operationId: GetResource
      description: Returns information about the current state of the specified resource. For details, see Reading a resource's current state. You can use this action to return information about an existing resource in your account and Amazon Web Services Region, whether those resources were provisioned using Cloud Control API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CloudApiService.GetResource
            default: CloudApiService.GetResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TypeName:
                  $ref: "#/components/schemas/TypeName"
                  description: The name of the resource type.
                TypeVersionId:
                  $ref: "#/components/schemas/TypeVersionId"
                  description: For private resource types, the type version to use in this resource operation. If you do not specify a resource version, CloudFormation uses the default version.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of the Identity and Access Management (IAM) role for Cloud Control API to use when performing this resource operation. The role specified must have the permissions required for this operation. The necessary permissions for each event handler are defined in the handlers section of the resource type definition schema. If you do not specify a role, Cloud Control API uses a temporary session created using your Amazon Web Services user credentials. For more information, see Specifying credentials in the Amazon Web Services Cloud Control API User Guide.
                Identifier:
                  $ref: "#/components/schemas/Identifier"
                  description: The identifier for the resource. You can specify the primary identifier, or any secondary identifier defined for the resource type in its resource schema. You can only specify one identifier. Primary identifiers can be specified as a string or JSON; secondary identifiers must be specified as JSON. For compound primary identifiers (that is, one that consists of multiple resource properties strung together), to specify the primary identifier as a string, list the property values in the order they are specified in the primary identifier definition, separated by |. For more information, see Identifying resources in the Amazon Web Services Cloud Control API User Guide.
              required:
                - TypeName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourceOutput"
  /GetResourceRequestStatus:
    post:
      operationId: GetResourceRequestStatus
      description: Returns the current status of a resource operation request. For more information, see Tracking the progress of resource operation requests in the Amazon Web Services Cloud Control API User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CloudApiService.GetResourceRequestStatus
            default: CloudApiService.GetResourceRequestStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                RequestToken:
                  $ref: "#/components/schemas/RequestToken"
                  description: A unique token used to track the progress of the resource operation request. Request tokens are included in the ProgressEvent type returned by a resource operation request.
              required:
                - RequestToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourceRequestStatusOutput"
  /ListResourceRequests:
    post:
      operationId: ListResourceRequests
      description: Returns existing resource operation requests. This includes requests of all status types. For more information, see Listing active resource operation requests in the Amazon Web Services Cloud Control API User Guide. Resource operation requests expire after 7 days.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CloudApiService.ListResourceRequests
            default: CloudApiService.ListResourceRequests
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to be returned with a single call. If the number of available results exceeds this maximum, the response includes a NextToken value that you can assign to the NextToken request parameter to get the next set of results. The default is 20.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: If the previous paginated request didn't return all of the remaining results, the response object's NextToken parameter value is set to a token. To retrieve the next set of results, call this action again and assign that token to the request object's NextToken parameter. If there are no remaining results, the previous response object's NextToken parameter is set to null.
                ResourceRequestStatusFilter:
                  $ref: "#/components/schemas/ResourceRequestStatusFilter"
                  description: The filter criteria to apply to the requests returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResourceRequestsOutput"
  /ListResources:
    post:
      operationId: ListResources
      description: Returns information about the specified resources. For more information, see Discovering resources in the Amazon Web Services Cloud Control API User Guide. You can use this action to return information about existing resources in your account and Amazon Web Services Region, whether those resources were provisioned using Cloud Control API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CloudApiService.ListResources
            default: CloudApiService.ListResources
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TypeName:
                  $ref: "#/components/schemas/TypeName"
                  description: The name of the resource type.
                TypeVersionId:
                  $ref: "#/components/schemas/TypeVersionId"
                  description: For private resource types, the type version to use in this resource operation. If you do not specify a resource version, CloudFormation uses the default version.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of the Identity and Access Management (IAM) role for Cloud Control API to use when performing this resource operation. The role specified must have the permissions required for this operation. The necessary permissions for each event handler are defined in the handlers section of the resource type definition schema. If you do not specify a role, Cloud Control API uses a temporary session created using your Amazon Web Services user credentials. For more information, see Specifying credentials in the Amazon Web Services Cloud Control API User Guide.
                NextToken:
                  $ref: "#/components/schemas/HandlerNextToken"
                  description: If the previous paginated request didn't return all of the remaining results, the response object's NextToken parameter value is set to a token. To retrieve the next set of results, call this action again and assign that token to the request object's NextToken parameter. If there are no remaining results, the previous response object's NextToken parameter is set to null.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: Reserved.
                ResourceModel:
                  $ref: "#/components/schemas/Properties"
                  description: The resource model to use to select the resources to return.
              required:
                - TypeName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResourcesOutput"
  /UpdateResource:
    post:
      operationId: UpdateResource
      description: Updates the specified property values in the resource. You specify your resource property updates as a list of patch operations contained in a JSON patch document that adheres to the RFC 6902 - JavaScript Object Notation (JSON) Patch standard. For details on how Cloud Control API performs resource update operations, see Updating a resource in the Amazon Web Services Cloud Control API User Guide. After you have initiated a resource update request, you can monitor the progress of your request by calling GetResourceRequestStatus using the RequestToken of the ProgressEvent returned by UpdateResource. For more information about the properties of a specific resource, refer to the related topic for the resource in the Resource and property types reference in the CloudFormation Users Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CloudApiService.UpdateResource
            default: CloudApiService.UpdateResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TypeName:
                  $ref: "#/components/schemas/TypeName"
                  description: The name of the resource type.
                TypeVersionId:
                  $ref: "#/components/schemas/TypeVersionId"
                  description: For private resource types, the type version to use in this resource operation. If you do not specify a resource version, CloudFormation uses the default version.
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of the Identity and Access Management (IAM) role for Cloud Control API to use when performing this resource operation. The role specified must have the permissions required for this operation. The necessary permissions for each event handler are defined in the handlers section of the resource type definition schema. If you do not specify a role, Cloud Control API uses a temporary session created using your Amazon Web Services user credentials. For more information, see Specifying credentials in the Amazon Web Services Cloud Control API User Guide.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique identifier to ensure the idempotency of the resource request. As a best practice, specify this token to ensure idempotency, so that Amazon Web Services Cloud Control API can accurately distinguish between request retries and new resource requests. You might retry a resource request to ensure that it was successfully received. A client token is valid for 36 hours once used. After that, a resource request with the same client token is treated as a new request. If you do not specify a client token, one is generated for inclusion in the request. For more information, see Ensuring resource operation requests are unique in the Amazon Web Services Cloud Control API User Guide.
                Identifier:
                  $ref: "#/components/schemas/Identifier"
                  description: The identifier for the resource. You can specify the primary identifier, or any secondary identifier defined for the resource type in its resource schema. You can only specify one identifier. Primary identifiers can be specified as a string or JSON; secondary identifiers must be specified as JSON. For compound primary identifiers (that is, one that consists of multiple resource properties strung together), to specify the primary identifier as a string, list the property values in the order they are specified in the primary identifier definition, separated by |. For more information, see Identifying resources in the Amazon Web Services Cloud Control API User Guide.
                PatchDocument:
                  $ref: "#/components/schemas/PatchDocument"
                  description: A JavaScript Object Notation (JSON) document listing the patch operations that represent the updates to apply to the current resource properties. For details, see Composing the patch document in the Amazon Web Services Cloud Control API User Guide.
              required:
                - TypeName
                - PatchDocument
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResourceOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    RequestToken:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[-A-Za-z0-9+/=]+"
    CancelResourceRequestOutput:
      type: object
      properties:
        ProgressEvent:
          $ref: "#/components/schemas/ProgressEvent"
    ProgressEvent:
      description: Represents the current status of a resource operation request. For more information, see Managing resource operation requests in the Amazon Web Services Cloud Control API User Guide.
      type: object
      properties:
        TypeName:
          $ref: "#/components/schemas/TypeName"
          description: The name of the resource type used in the operation.
        Identifier:
          $ref: "#/components/schemas/Identifier"
          description: The primary identifier for the resource. In some cases, the resource identifier may be available before the resource operation has reached a status of SUCCESS.
        RequestToken:
          $ref: "#/components/schemas/RequestToken"
          description: The unique token representing this resource operation request. Use the RequestToken with GetResourceRequestStatus to return the current status of a resource operation request.
        HooksRequestToken:
          $ref: "#/components/schemas/RequestToken"
          description: The unique token representing the Hooks operation for the request.
        Operation:
          $ref: "#/components/schemas/Operation"
          description: The resource operation type.
        OperationStatus:
          $ref: "#/components/schemas/OperationStatus"
          description: "The current status of the resource operation request. PENDING: The resource operation hasn't yet started. IN_PROGRESS: The resource operation is currently in progress. SUCCESS: The resource operation has successfully completed. FAILED: The resource operation has failed. Refer to the error code and status message for more information. CANCEL_IN_PROGRESS: The resource operation is in the process of being canceled. CANCEL_COMPLETE: The resource operation has been canceled."
        EventTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the resource operation request was initiated.
        ResourceModel:
          $ref: "#/components/schemas/Properties"
          description: A JSON string containing the resource model, consisting of each resource property and its current value.
        StatusMessage:
          $ref: "#/components/schemas/StatusMessage"
          description: Any message explaining the current status.
        ErrorCode:
          $ref: "#/components/schemas/HandlerErrorCode"
          description: For requests with a status of FAILED, the associated error code. For error code definitions, see Handler error codes in the CloudFormation Command Line Interface User Guide for Extension Development.
        RetryAfter:
          $ref: "#/components/schemas/Timestamp"
          description: When to next request the status of this resource operation request.
    TypeName:
      type: string
      minLength: 10
      maxLength: 196
      pattern: "[A-Za-z0-9]{2,64}::[A-Za-z0-9]{2,64}::[A-Za-z0-9]{2,64}"
    Identifier:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: .+
    Operation:
      type: string
      enum:
        - CREATE
        - DELETE
        - UPDATE
    OperationStatus:
      type: string
      enum:
        - PENDING
        - IN_PROGRESS
        - SUCCESS
        - FAILED
        - CANCEL_IN_PROGRESS
        - CANCEL_COMPLETE
    Timestamp:
      type: string
      format: date-time
    Properties:
      description: Allow up to 256K length of Resource properties
      type: string
      minLength: 1
      maxLength: 262144
      pattern: "[\\s\\S]*"
    StatusMessage:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: "[\\s\\S]*"
    HandlerErrorCode:
      type: string
      enum:
        - NotUpdatable
        - InvalidRequest
        - AccessDenied
        - UnauthorizedTaggingOperation
        - InvalidCredentials
        - AlreadyExists
        - NotFound
        - ResourceConflict
        - Throttling
        - ServiceLimitExceeded
        - NotStabilized
        - GeneralServiceException
        - ServiceInternalError
        - ServiceTimeout
        - NetworkFailure
        - InternalFailure
    TypeVersionId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[A-Za-z0-9-]+"
    RoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:.+:iam::[0-9]{12}:role/.+
    ClientToken:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[-A-Za-z0-9+/=]+"
    CreateResourceOutput:
      type: object
      properties:
        ProgressEvent:
          $ref: "#/components/schemas/ProgressEvent"
          description: Represents the current status of the resource creation request. After you have initiated a resource creation request, you can monitor the progress of your request by calling GetResourceRequestStatus using the RequestToken of the ProgressEvent returned by CreateResource.
    DeleteResourceOutput:
      type: object
      properties:
        ProgressEvent:
          $ref: "#/components/schemas/ProgressEvent"
          description: Represents the current status of the resource deletion request. After you have initiated a resource deletion request, you can monitor the progress of your request by calling GetResourceRequestStatus using the RequestToken of the ProgressEvent returned by DeleteResource.
    GetResourceOutput:
      type: object
      properties:
        TypeName:
          $ref: "#/components/schemas/TypeName"
          description: The name of the resource type.
        ResourceDescription:
          $ref: "#/components/schemas/ResourceDescription"
    ResourceDescription:
      description: Represents information about a provisioned resource.
      type: object
      properties:
        Identifier:
          $ref: "#/components/schemas/Identifier"
          description: The primary identifier for the resource. For more information, see Identifying resources in the Amazon Web Services Cloud Control API User Guide.
        Properties:
          $ref: "#/components/schemas/Properties"
          description: A list of the resource properties and their current values.
    GetResourceRequestStatusOutput:
      type: object
      properties:
        ProgressEvent:
          $ref: "#/components/schemas/ProgressEvent"
          description: Represents the current status of the resource operation request.
        HooksProgressEvent:
          $ref: "#/components/schemas/HooksProgressEvent"
          description: Lists Hook invocations for the specified target in the request. This is a list since the same target can invoke multiple Hooks.
    HooksProgressEvent:
      type: array
      items:
        $ref: "#/components/schemas/HookProgressEvent"
    HookProgressEvent:
      description: Represents the current status of applicable Hooks for a resource operation request. It contains list of Hook invocation information for the resource specified in the request since the same target can invoke multiple Hooks. For more information, see Managing resource operation requests with Amazon Web Services Cloud Control API .
      type: object
      properties:
        HookTypeName:
          $ref: "#/components/schemas/TypeName"
          description: The type name of the Hook being invoked.
        HookTypeVersionId:
          $ref: "#/components/schemas/TypeVersionId"
          description: The type version of the Hook being invoked.
        HookTypeArn:
          $ref: "#/components/schemas/HookTypeArn"
          description: The ARN of the Hook being invoked.
        InvocationPoint:
          $ref: "#/components/schemas/HookInvocationPoint"
          description: States whether the Hook is invoked before or after resource provisioning.
        HookStatus:
          $ref: "#/components/schemas/HookStatus"
          description: "The status of the Hook invocation. The following are potential statuses: HOOK_PENDING: The Hook was added to the invocation plan, but not yet invoked. HOOK_IN_PROGRESS: The Hook was invoked, but hasn't completed. HOOK_COMPLETE_SUCCEEDED: The Hook invocation is complete with a successful result. HOOK_COMPLETE_FAILED: The Hook invocation is complete with a failed result. HOOK_FAILED: The Hook invocation didn't complete successfully."
        HookEventTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the Hook invocation request initiated.
        HookStatusMessage:
          $ref: "#/components/schemas/StatusMessage"
          description: The message explaining the current Hook status.
        FailureMode:
          $ref: "#/components/schemas/HookFailureMode"
          description: "The failure mode of the invocation. The following are the potential statuses: FAIL: This will fail the Hook invocation and the request associated with it. WARN: This will fail the Hook invocation, but not the request associated with it."
    HookTypeArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws.*:.+:.*:.*:.+
    HookInvocationPoint:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[-A-Za-z_]+"
    HookStatus:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[-A-Za-z_]+"
    HookFailureMode:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[-A-Za-z_]+"
    MaxResults:
      type: integer
      minimum: 1
      maximum: 100
    NextToken:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[-A-Za-z0-9+/=]+"
    ResourceRequestStatusFilter:
      description: The filter criteria to use in determining the requests returned.
      type: object
      properties:
        Operations:
          $ref: "#/components/schemas/Operations"
          description: The operation types to include in the filter.
        OperationStatuses:
          $ref: "#/components/schemas/OperationStatuses"
