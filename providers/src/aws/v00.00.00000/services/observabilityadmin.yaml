openapi: 3.0.0
info:
  version: "2018-05-10"
  title: CloudWatch Observability Admin Service
  description: CloudWatch Observability Admin Service
  x-serviceName: observabilityadmin
  x-serviceAlias: observabilityadmin
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: observabilityadmin
servers:
  - url: https://observabilityadmin.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for observabilityadmin
paths:
  /CreateCentralizationRuleForOrganization:
    post:
      operationId: CreateCentralizationRuleForOrganization
      description: Creates a centralization rule that applies across an Amazon Web Services Organization. This operation can only be called by the organization's management account or a delegated administrator account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RuleName:
                  $ref: "#/components/schemas/RuleName"
                Rule:
                  $ref: "#/components/schemas/CentralizationRule"
                Tags:
                  $ref: "#/components/schemas/TagMapInput"
              required:
                - RuleName
                - Rule
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCentralizationRuleForOrganizationOutput"
  /CreateS3TableIntegration:
    post:
      operationId: CreateS3TableIntegration
      description: Creates an integration between CloudWatch and S3 Tables for analytics. This integration enables querying CloudWatch telemetry data using analytics engines like Amazon Athena, Amazon Redshift, and Apache Spark.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Encryption:
                  $ref: "#/components/schemas/Encryption"
                RoleArn:
                  $ref: "#/components/schemas/ResourceArn"
                Tags:
                  $ref: "#/components/schemas/TagMapInput"
              required:
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateS3TableIntegrationOutput"
  /CreateTelemetryPipeline:
    post:
      operationId: CreateTelemetryPipeline
      description: Creates a telemetry pipeline for processing and transforming telemetry data. The pipeline defines how data flows from sources through processors to destinations, enabling data transformation and delivering capabilities.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/TelemetryPipelineName"
                Configuration:
                  $ref: "#/components/schemas/TelemetryPipelineConfiguration"
                Tags:
                  $ref: "#/components/schemas/TagMapInput"
              required:
                - Configuration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTelemetryPipelineOutput"
  /CreateTelemetryRule:
    post:
      operationId: CreateTelemetryRule
      description: Creates a telemetry rule that defines how telemetry should be configured for Amazon Web Services resources in your account. The rule specifies which resources should have telemetry enabled and how that telemetry data should be collected based on resource type, telemetry type, and selection criteria.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RuleName:
                  $ref: "#/components/schemas/RuleName"
                Rule:
                  $ref: "#/components/schemas/TelemetryRule"
                Tags:
                  $ref: "#/components/schemas/TagMapInput"
              required:
                - RuleName
                - Rule
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTelemetryRuleOutput"
  /CreateTelemetryRuleForOrganization:
    post:
      operationId: CreateTelemetryRuleForOrganization
      description: Creates a telemetry rule that applies across an Amazon Web Services Organization. This operation can only be called by the organization's management account or a delegated administrator account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RuleName:
                  $ref: "#/components/schemas/RuleName"
                Rule:
                  $ref: "#/components/schemas/TelemetryRule"
                Tags:
                  $ref: "#/components/schemas/TagMapInput"
              required:
                - RuleName
                - Rule
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTelemetryRuleForOrganizationOutput"
  /DeleteCentralizationRuleForOrganization:
    post:
      operationId: DeleteCentralizationRuleForOrganization
      description: Deletes an organization-wide centralization rule. This operation can only be called by the organization's management account or a delegated administrator account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RuleIdentifier:
                  $ref: "#/components/schemas/RuleIdentifier"
              required:
                - RuleIdentifier
      responses:
        "200":
          description: Success
  /DeleteS3TableIntegration:
    post:
      operationId: DeleteS3TableIntegration
      description: Deletes an S3 Table integration and its associated data. This operation removes the connection between CloudWatch Observability Admin and S3 Tables.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/ResourceArn"
      responses:
        "204":
          description: Success
  /DeleteTelemetryPipeline:
    post:
      operationId: DeleteTelemetryPipeline
      description: Deletes a telemetry pipeline and its associated resources. This operation stops data processing and removes the pipeline configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PipelineIdentifier:
                  $ref: "#/components/schemas/TelemetryPipelineIdentifier"
              required:
                - PipelineIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTelemetryPipelineOutput"
  /DeleteTelemetryRule:
    post:
      operationId: DeleteTelemetryRule
      description: Deletes a telemetry rule from your account. Any telemetry configurations previously created by the rule will remain but no new resources will be configured by this rule.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RuleIdentifier:
                  $ref: "#/components/schemas/RuleIdentifier"
              required:
                - RuleIdentifier
      responses:
        "200":
          description: Success
  /DeleteTelemetryRuleForOrganization:
    post:
      operationId: DeleteTelemetryRuleForOrganization
      description: Deletes an organization-wide telemetry rule. This operation can only be called by the organization's management account or a delegated administrator account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RuleIdentifier:
                  $ref: "#/components/schemas/RuleIdentifier"
              required:
                - RuleIdentifier
      responses:
        "200":
          description: Success
  /GetCentralizationRuleForOrganization:
    post:
      operationId: GetCentralizationRuleForOrganization
      description: Retrieves the details of a specific organization centralization rule. This operation can only be called by the organization's management account or a delegated administrator account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RuleIdentifier:
                  $ref: "#/components/schemas/RuleIdentifier"
              required:
                - RuleIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCentralizationRuleForOrganizationOutput"
  /GetS3TableIntegration:
    post:
      operationId: GetS3TableIntegration
      description: Retrieves information about a specific S3 Table integration, including its configuration, status, and metadata.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/ResourceArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetS3TableIntegrationOutput"
  /GetTelemetryEnrichmentStatus:
    post:
      operationId: GetTelemetryEnrichmentStatus
      description: Returns the current status of the resource tags for telemetry feature, which enhances telemetry data with additional resource metadata from Resource Explorer.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTelemetryEnrichmentStatusOutput"
  /GetTelemetryEvaluationStatus:
    post:
      operationId: GetTelemetryEvaluationStatus
      description: Returns the current onboarding status of the telemetry config feature, including the status of the feature and reason the feature failed to start or stop.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTelemetryEvaluationStatusOutput"
  /GetTelemetryEvaluationStatusForOrganization:
    post:
      operationId: GetTelemetryEvaluationStatusForOrganization
      description: This returns the onboarding status of the telemetry configuration feature for the organization. It can only be called by a Management Account of an Amazon Web Services Organization or an assigned Delegated Admin Account of Amazon CloudWatch telemetry config.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTelemetryEvaluationStatusForOrganizationOutput"
  /GetTelemetryPipeline:
    post:
      operationId: GetTelemetryPipeline
      description: Retrieves information about a specific telemetry pipeline, including its configuration, status, and metadata.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PipelineIdentifier:
                  $ref: "#/components/schemas/TelemetryPipelineIdentifier"
              required:
                - PipelineIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTelemetryPipelineOutput"
  /GetTelemetryRule:
    post:
      operationId: GetTelemetryRule
      description: Retrieves the details of a specific telemetry rule in your account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RuleIdentifier:
                  $ref: "#/components/schemas/RuleIdentifier"
              required:
                - RuleIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTelemetryRuleOutput"
  /GetTelemetryRuleForOrganization:
    post:
      operationId: GetTelemetryRuleForOrganization
      description: Retrieves the details of a specific organization telemetry rule. This operation can only be called by the organization's management account or a delegated administrator account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RuleIdentifier:
                  $ref: "#/components/schemas/RuleIdentifier"
              required:
                - RuleIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTelemetryRuleForOrganizationOutput"
  /ListCentralizationRulesForOrganization:
    post:
      operationId: ListCentralizationRulesForOrganization
      description: Lists all centralization rules in your organization. This operation can only be called by the organization's management account or a delegated administrator account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                RuleNamePrefix:
                  $ref: "#/components/schemas/ListCentralizationRulesForOrganizationInputRuleNamePrefixString"
                AllRegions:
                  $ref: "#/components/schemas/Boolean"
                MaxResults:
                  $ref: "#/components/schemas/ListCentralizationRulesForOrganizationMaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCentralizationRulesForOrganizationOutput"
  /ListResourceTelemetry:
    post:
      operationId: ListResourceTelemetry
      description: Returns a list of telemetry configurations for Amazon Web Services resources supported by telemetry config. For more information, see Auditing CloudWatch telemetry configurations.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceIdentifierPrefix:
                  $ref: "#/components/schemas/ResourceIdentifierPrefix"
                ResourceTypes:
                  $ref: "#/components/schemas/ResourceTypes"
                TelemetryConfigurationState:
                  $ref: "#/components/schemas/TelemetryConfigurationState"
                ResourceTags:
                  $ref: "#/components/schemas/TagMapInput"
                MaxResults:
                  $ref: "#/components/schemas/ListResourceTelemetryMaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResourceTelemetryOutput"
  /ListResourceTelemetryForOrganization:
    post:
      operationId: ListResourceTelemetryForOrganization
      description: Returns a list of telemetry configurations for Amazon Web Services resources supported by telemetry config in the organization.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountIdentifiers:
                  $ref: "#/components/schemas/AccountIdentifiers"
                ResourceIdentifierPrefix:
                  $ref: "#/components/schemas/ResourceIdentifierPrefix"
                ResourceTypes:
                  $ref: "#/components/schemas/ResourceTypes"
                TelemetryConfigurationState:
                  $ref: "#/components/schemas/TelemetryConfigurationState"
                ResourceTags:
                  $ref: "#/components/schemas/TagMapInput"
                MaxResults:
                  $ref: "#/components/schemas/ListResourceTelemetryForOrganizationMaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResourceTelemetryForOrganizationOutput"
  /ListS3TableIntegrations:
    post:
      operationId: ListS3TableIntegrations
      description: Lists all S3 Table integrations in your account. We recommend using pagination to ensure that the operation returns quickly and successfully.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListS3TableIntegrationsMaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListS3TableIntegrationsOutput"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists all tags attached to the specified resource. Supports telemetry rule resources and telemetry pipeline resources.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/ResourceArn"
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
  /ListTelemetryPipelines:
    post:
      operationId: ListTelemetryPipelines
      description: Returns a list of telemetry pipelines in your account. Returns up to 100 results. If more than 100 telemetry pipelines exist, include the NextToken value from the response to retrieve the next set of results.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListTelemetryPipelinesMaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTelemetryPipelinesOutput"
  /ListTelemetryRules:
    post:
      operationId: ListTelemetryRules
      description: Lists all telemetry rules in your account. You can filter the results by specifying a rule name prefix.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                RuleNamePrefix:
                  $ref: "#/components/schemas/String"
                MaxResults:
                  $ref: "#/components/schemas/ListTelemetryRulesMaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTelemetryRulesOutput"
  /ListTelemetryRulesForOrganization:
    post:
      operationId: ListTelemetryRulesForOrganization
      description: Lists all telemetry rules in your organization. This operation can only be called by the organization's management account or a delegated administrator account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                RuleNamePrefix:
                  $ref: "#/components/schemas/String"
                SourceAccountIds:
                  $ref: "#/components/schemas/AccountIdentifiers"
                SourceOrganizationUnitIds:
                  $ref: "#/components/schemas/OrganizationUnitIdentifiers"
                MaxResults:
                  $ref: "#/components/schemas/ListTelemetryRulesForOrganizationMaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTelemetryRulesForOrganizationOutput"
  /StartTelemetryEnrichment:
    post:
      operationId: StartTelemetryEnrichment
      description: Enables the resource tags for telemetry feature for your account, which enhances telemetry data with additional resource metadata from Resource Explorer to provide richer context for monitoring and observability.
      parameters: []
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartTelemetryEnrichmentOutput"
  /StartTelemetryEvaluation:
    post:
      operationId: StartTelemetryEvaluation
      description: This action begins onboarding the caller Amazon Web Services account to the telemetry config feature.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Regions:
                  $ref: "#/components/schemas/Regions"
                AllRegions:
                  $ref: "#/components/schemas/AllRegions"
      responses:
        "200":
          description: Success
  /StartTelemetryEvaluationForOrganization:
    post:
      operationId: StartTelemetryEvaluationForOrganization
      description: This actions begins onboarding the organization and all member accounts to the telemetry config feature.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Regions:
                  $ref: "#/components/schemas/Regions"
                AllRegions:
                  $ref: "#/components/schemas/AllRegions"
      responses:
        "200":
          description: Success
  /StopTelemetryEnrichment:
    post:
      operationId: StopTelemetryEnrichment
      description: Disables the resource tags for telemetry feature for your account, stopping the enhancement of telemetry data with additional resource metadata.
      parameters: []
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopTelemetryEnrichmentOutput"
  /StopTelemetryEvaluation:
    post:
      operationId: StopTelemetryEvaluation
      description: This action begins offboarding the caller Amazon Web Services account from the telemetry config feature.
      parameters: []
      responses:
        "200":
          description: Success
  /StopTelemetryEvaluationForOrganization:
    post:
      operationId: StopTelemetryEvaluationForOrganization
      description: This action offboards the Organization of the caller Amazon Web Services account from the telemetry config feature.
      parameters: []
      responses:
        "200":
          description: Success
  /TagResource:
    post:
      operationId: TagResource
      description: Adds or updates tags for a resource. Supports telemetry rule resources and telemetry pipeline resources.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/ResourceArn"
                Tags:
                  $ref: "#/components/schemas/TagMapInput"
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
  /TestTelemetryPipeline:
    post:
      operationId: TestTelemetryPipeline
      description: Tests a pipeline configuration with sample records to validate data processing before deployment. This operation helps ensure your pipeline configuration works as expected.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Records:
                  $ref: "#/components/schemas/Records"
                Configuration:
                  $ref: "#/components/schemas/TelemetryPipelineConfiguration"
              required:
                - Records
                - Configuration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestTelemetryPipelineOutput"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes tags from a resource. Supports telemetry rule resources and telemetry pipeline resources.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/ResourceArn"
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
  /UpdateCentralizationRuleForOrganization:
    post:
      operationId: UpdateCentralizationRuleForOrganization
      description: Updates an existing centralization rule that applies across an Amazon Web Services Organization. This operation can only be called by the organization's management account or a delegated administrator account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RuleIdentifier:
                  $ref: "#/components/schemas/RuleIdentifier"
                Rule:
                  $ref: "#/components/schemas/CentralizationRule"
              required:
                - RuleIdentifier
                - Rule
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCentralizationRuleForOrganizationOutput"
  /UpdateTelemetryPipeline:
    post:
      operationId: UpdateTelemetryPipeline
      description: "Updates the configuration of an existing telemetry pipeline. The following attributes cannot be updated after pipeline creation: Pipeline name - The pipeline name is immutable Pipeline ARN - The ARN is automatically generated and cannot be changed Source type - Once a pipeline is created with a specific source type (such as S3, CloudWatch Logs, GitHub, or third-party sources), it cannot be changed to a different source type Processors can be added, removed, or modified. However, some processors are not supported for third-party pipelines and cannot be added through updates. Source-Specific Update Rules CloudWatch Logs Sources (Vended and Custom) Updatable: sts_role_arn Fixed: data_source_name, data_source_type, sink (must remain @original) S3 Sources (Crowdstrike, Zscaler, SentinelOne, Custom) Updatable: All SQS configuration parameters, sts_role_arn, codec settings, compression type, bucket ownership settings, sink log group Fixed: notification_type, aws.region GitHub Audit Logs Updatable: All Amazon Web Services Secrets Manager attributes, scope (can switch between ORGANIZATION/ENTERPRISE), organization or enterprise name, range, authentication credentials (PAT or GitHub App) Microsoft Sources (Entra ID, Office365, Windows) Updatable: All Amazon Web Services Secrets Manager attributes, tenant_id, workspace_id (Windows only), OAuth2 credentials (client_id, client_secret) Okta Sources (SSO, Auth0) Updatable: All Amazon Web Services Secrets Manager attributes, domain, range, OAuth2 credentials (client_id, client_secret) Palo Alto Networks Updatable: All Amazon Web Services Secrets Manager attributes, hostname, basic authentication credentials (username, password) ServiceNow CMDB Updatable: All Amazon Web Services Secrets Manager attributes, instance_url, range, OAuth2 credentials (client_id, client_secret) Wiz CNAPP Updatable: All Amazon Web Services Secrets Manager attributes, region, range, OAuth2 credentials (client_id, client_secret)"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PipelineIdentifier:
                  $ref: "#/components/schemas/TelemetryPipelineIdentifier"
                Configuration:
                  $ref: "#/components/schemas/TelemetryPipelineConfiguration"
              required:
                - PipelineIdentifier
                - Configuration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTelemetryPipelineOutput"
  /UpdateTelemetryRule:
    post:
      operationId: UpdateTelemetryRule
      description: Updates an existing telemetry rule in your account. If multiple users attempt to modify the same telemetry rule simultaneously, a ConflictException is returned to provide specific error information for concurrent modification scenarios.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RuleIdentifier:
                  $ref: "#/components/schemas/RuleIdentifier"
                Rule:
                  $ref: "#/components/schemas/TelemetryRule"
              required:
                - RuleIdentifier
                - Rule
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTelemetryRuleOutput"
  /UpdateTelemetryRuleForOrganization:
    post:
      operationId: UpdateTelemetryRuleForOrganization
      description: Updates an existing telemetry rule that applies across an Amazon Web Services Organization. This operation can only be called by the organization's management account or a delegated administrator account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RuleIdentifier:
                  $ref: "#/components/schemas/RuleIdentifier"
                Rule:
                  $ref: "#/components/schemas/TelemetryRule"
              required:
                - RuleIdentifier
                - Rule
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTelemetryRuleForOrganizationOutput"
  /ValidateTelemetryPipelineConfiguration:
    post:
      operationId: ValidateTelemetryPipelineConfiguration
      description: Validates a pipeline configuration without creating the pipeline. This operation checks the configuration for syntax errors and compatibility issues.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Configuration:
                  $ref: "#/components/schemas/TelemetryPipelineConfiguration"
              required:
                - Configuration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateTelemetryPipelineConfigurationOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    RuleName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[0-9A-Za-z-_.#/]+"
    CentralizationRule:
      description: Defines how telemetry data should be centralized across an Amazon Web Services Organization, including source and destination configurations.
      type: object
      properties:
        Source:
          $ref: "#/components/schemas/CentralizationRuleSource"
          description: Configuration determining the source of the telemetry data to be centralized.
        Destination:
          $ref: "#/components/schemas/CentralizationRuleDestination"
          description: Configuration determining where the telemetry data should be centralized, backed up, as well as encryption configuration for the primary and backup destinations.
      required:
        - Source
        - Destination
    CentralizationRuleSource:
      description: Configuration specifying the source of telemetry data to be centralized.
      type: object
      properties:
        Regions:
          $ref: "#/components/schemas/Regions"
          description: The list of source regions from which telemetry data should be centralized.
        Scope:
          $ref: "#/components/schemas/SourceFilterString"
          description: The organizational scope from which telemetry data should be centralized, specified using organization id, accounts or organizational unit ids.
        SourceLogsConfiguration:
          $ref: "#/components/schemas/SourceLogsConfiguration"
          description: Log specific configuration for centralization source log groups.
      required:
        - Regions
    Regions:
      type: array
      items:
        $ref: "#/components/schemas/Region"
    Region:
      type: string
      minLength: 1
    SourceFilterString:
      type: string
      minLength: 1
      maxLength: 2000
    SourceLogsConfiguration:
      description: Configuration for selecting and handling source log groups for centralization.
      type: object
      properties:
        LogGroupSelectionCriteria:
          $ref: "#/components/schemas/LogsFilterString"
          description: The selection criteria that specifies which source log groups to centralize. The selection criteria uses the same format as OAM link filters.
        DataSourceSelectionCriteria:
          $ref: "#/components/schemas/DataSourceFilterString"
          description: The selection criteria that specifies which data sources to centralize. The selection criteria uses the same filter expression format as LogGroupSelectionCriteria, but operates on DataSourceName and DataSourceType operands. When both LogGroupSelectionCriteria and DataSourceSelectionCriteria are specified, a log event must match both criteria to be centralized.
        EncryptedLogGroupStrategy:
          $ref: "#/components/schemas/EncryptedLogGroupStrategy"
          description: A strategy determining whether to centralize source log groups that are encrypted with customer managed KMS keys (CMK). ALLOW will consider CMK encrypted source log groups for centralization while SKIP will skip CMK encrypted source log groups from centralization.
      required:
        - EncryptedLogGroupStrategy
    LogsFilterString:
      type: string
      minLength: 1
      maxLength: 2000
    DataSourceFilterString:
      type: string
      minLength: 1
      maxLength: 2000
    EncryptedLogGroupStrategy:
      type: string
      enum:
        - ALLOW
        - SKIP
    CentralizationRuleDestination:
      description: Configuration specifying the primary destination for centralized telemetry data.
      type: object
      properties:
        Region:
          $ref: "#/components/schemas/Region"
          description: The primary destination region to which telemetry data should be centralized.
        Account:
          $ref: "#/components/schemas/AccountIdentifier"
          description: The destination account (within the organization) to which the telemetry data should be centralized.
        DestinationLogsConfiguration:
          $ref: "#/components/schemas/DestinationLogsConfiguration"
          description: Log specific configuration for centralization destination log groups.
      required:
        - Region
    AccountIdentifier:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[0-9]{12}"
    DestinationLogsConfiguration:
      description: Configuration for centralization destination log groups, including encryption and backup settings.
      type: object
      properties:
        LogsEncryptionConfiguration:
          $ref: "#/components/schemas/LogsEncryptionConfiguration"
          description: The encryption configuration for centralization destination log groups.
        BackupConfiguration:
          $ref: "#/components/schemas/LogsBackupConfiguration"
          description: Configuration defining the backup region and an optional KMS key for the backup destination.
        LogGroupNameConfiguration:
          $ref: "#/components/schemas/LogGroupNameConfiguration"
          description: Configuration that specifies a naming pattern for destination log groups created during centralization. The pattern supports static text and dynamic variables that are replaced with source attributes when log groups are created.
    LogsEncryptionConfiguration:
      description: Configuration for encrypting centralized log groups. This configuration is only applied to destination log groups for which the corresponding source log groups are encrypted using Customer Managed KMS Keys.
      type: object
      properties:
        EncryptionStrategy:
          $ref: "#/components/schemas/EncryptionStrategy"
          description: Configuration that determines the encryption strategy of the destination log groups. CUSTOMER_MANAGED uses the configured KmsKeyArn to encrypt newly created destination log groups.
        KmsKeyArn:
          $ref: "#/components/schemas/ResourceArn"
          description: KMS Key ARN belonging to the primary destination account and region, to encrypt newly created central log groups in the primary destination.
        EncryptionConflictResolutionStrategy:
          $ref: "#/components/schemas/EncryptionConflictResolutionStrategy"
          description: Conflict resolution strategy for centralization if the encryption strategy is set to CUSTOMER_MANAGED and the destination log group is encrypted with an AWS_OWNED KMS Key. ALLOW lets centralization go through while SKIP prevents centralization into the destination log group.
      required:
        - EncryptionStrategy
    EncryptionStrategy:
      type: string
      enum:
        - CUSTOMER_MANAGED
        - AWS_OWNED
    ResourceArn:
      type: string
      minLength: 1
      maxLength: 1011
      pattern: arn:aws([a-z0-9\-]+)?:([a-zA-Z0-9\-]+):([a-z0-9\-]+)?:([0-9]{12})?:(.+)
    EncryptionConflictResolutionStrategy:
      type: string
      enum:
        - ALLOW
        - SKIP
    LogsBackupConfiguration:
      description: Configuration for backing up centralized log data to a secondary region.
      type: object
      properties:
        Region:
          $ref: "#/components/schemas/Region"
          description: Logs specific backup destination region within the primary destination account to which log data should be centralized.
        KmsKeyArn:
          $ref: "#/components/schemas/ResourceArn"
          description: KMS Key ARN belonging to the primary destination account and backup region, to encrypt newly created central log groups in the backup destination.
      required:
        - Region
    LogGroupNameConfiguration:
      description: Configuration that specifies a naming pattern for destination log groups created during centralization. The pattern supports static text and dynamic variables that are replaced with source attributes when log groups are created.
      type: object
      properties:
        LogGroupNamePattern:
          $ref: "#/components/schemas/LogGroupNamePattern"
          description: "The pattern used to generate destination log group names during centralization. The pattern can contain static text and dynamic variables that are replaced with source attributes. If a variable cannot be resolved, it inherits the value from its parent variable in the hierarchy. The pattern must be between 1 and 512 characters. Supported variables: ${source.logGroup} — The original log group name from the source account. ${source.accountId} — The Amazon Web Services account ID where the log originated. ${source.region} — The Amazon Web Services Region where the log originated. ${source.org.id} — The Amazon Web Services Organization ID of the source account. ${source.org.ouId} — The organizational unit ID of the source account. ${source.org.rootId} — The organization Root ID. ${source.org.path} — The organizational path from account to root."
      required:
        - LogGroupNamePattern
    LogGroupNamePattern:
      description: "The pattern used to generate destination log group names during centralization. The pattern can contain static text and dynamic variables that are replaced with source attributes. If a variable cannot be resolved, it inherits the value from its parent variable in the hierarchy. The pattern must be between 1 and 512 characters. Supported variables: ${source.logGroup} — The original log group name from the source account. ${source.accountId} — The Amazon Web Services account ID where the log originated. ${source.region} — The Amazon Web Services Region where the log originated. ${source.org.id} — The Amazon Web Services Organization ID of the source account. ${source.org.ouId} — The organizational unit ID of the source account. ${source.org.rootId} — The organization Root ID. ${source.org.path} — The organizational path from account to root."
      type: string
      minLength: 1
      maxLength: 512
      pattern: (?:[\._\-/#A-Za-z0-9]+|\$\{[A-Za-z]+(?:\.[A-Za-z]+){1,2}\})+
    TagMapInput:
      type: object
      properties: {}
    CreateCentralizationRuleForOrganizationOutput:
      type: object
      properties:
        RuleArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the created organization centralization rule.
    Encryption:
      description: Defines the encryption configuration for S3 Table integrations, including the encryption algorithm and KMS key settings.
      type: object
      properties:
        SseAlgorithm:
          $ref: "#/components/schemas/SSEAlgorithm"
          description: The server-side encryption algorithm used for encrypting data in the S3 Table integration.
        KmsKeyArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the KMS key used for encryption when using customer-managed keys.
      required:
        - SseAlgorithm
    SSEAlgorithm:
      type: string
      enum:
        - aws:kms
        - AES256
    CreateS3TableIntegrationOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the created S3 Table integration.
    TelemetryPipelineName:
      type: string
      minLength: 3
      maxLength: 28
      pattern: .*[a-z][a-z0-9\-]+.*
    TelemetryPipelineConfiguration:
      description: "Defines the configuration for a pipeline, including how data flows from sources through processors to destinations. The configuration is specified in YAML format and must include a valid pipeline definition with required source and sink components. This pipeline enables end-to-end telemetry data collection, transformation, and delivery while supporting optional processing steps and extensions for enhanced functionality. The primary pipeline configuration section are: Source: Defines where log data originates from (S3 buckets, CloudWatch Logs, third-party APIs). Each pipeline must have exactly one source. Processors (optional): Transform, parse, and enrich log data as it flows through the pipeline. Processors are applied sequentially in the order they are defined. Sink: Defines the destination where processed log data is sent. Each pipeline must have exactly one sink. Extensions (optional): Provide additional functionality such as Amazon Web Services Secrets Manager integration for credential management. For more details on each configuration section see CloudWatch pipelines User Guide. Additional comprehensive configuration examples can be found in the CreateTelemetryPipeline API docs."
      type: object
      properties:
        Body:
          $ref: "#/components/schemas/TelemetryPipelineConfigurationBody"
          description: The pipeline configuration body that defines the data processing rules and transformations.
      required:
        - Body
    TelemetryPipelineConfigurationBody:
      type: string
      minLength: 1
      maxLength: 24000
    CreateTelemetryPipelineOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the created telemetry pipeline.
    TelemetryRule:
      description: Defines how telemetry should be configured for specific Amazon Web Services resources.
      type: object
      properties:
        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The type of Amazon Web Services resource to configure telemetry for (e.g., "AWS::EC2::VPC", "AWS::EKS::Cluster", "AWS::WAFv2::WebACL").
        TelemetryType:
          $ref: "#/components/schemas/TelemetryType"
          description: The type of telemetry to collect (Logs, Metrics, or Traces).
        TelemetrySourceTypes:
          $ref: "#/components/schemas/TelemetrySourceTypes"
          description: The specific telemetry source types to configure for the resource, such as VPC_FLOW_LOGS or EKS_AUDIT_LOGS. TelemetrySourceTypes must be correlated with the specific resource type.
        DestinationConfiguration:
          $ref: "#/components/schemas/TelemetryDestinationConfiguration"
          description: Configuration specifying where and how the telemetry data should be delivered.
        Scope:
          $ref: "#/components/schemas/String"
          description: The organizational scope to which the rule applies, specified using accounts or organizational units.
        SelectionCriteria:
          $ref: "#/components/schemas/String"
          description: Criteria for selecting which resources the rule applies to, such as resource tags.
        AllowFieldUpdates:
          $ref: "#/components/schemas/Boolean"
          description: If set to true, Amazon CloudWatch Observability Admin detects and remediates configuration drift in telemetry resources that it manages. For example, if a VPC flow log's format, traffic type, or aggregation interval no longer matches the rule's destination configuration, the flow log is replaced with one that matches. Only Observability Admin-managed resources are updated; customer-created resources are never modified. Currently supported for AWS::EC2::VPC resources (VPC flow logs).
        Regions:
          $ref: "#/components/schemas/Regions"
          description: An optional list of Amazon Web Services Regions where this telemetry rule should be replicated. When specified, the rule is created in the home region and automatically replicated to all listed regions. Mutually exclusive with AllRegions.
        AllRegions:
          $ref: "#/components/schemas/AllRegions"
          description: If set to true, the telemetry rule is replicated to all Amazon Web Services Regions where Amazon CloudWatch Observability Admin is available in the current partition. When new regions become available, the rule automatically replicates to them. Mutually exclusive with Regions.
      required:
        - TelemetryType
    ResourceType:
      type: string
      enum:
        - AWS::EC2::Instance
        - AWS::EC2::VPC
        - AWS::Lambda::Function
        - AWS::CloudTrail
        - AWS::EKS::Cluster
        - AWS::WAFv2::WebACL
        - AWS::ElasticLoadBalancingV2::LoadBalancer
        - AWS::Route53Resolver::ResolverEndpoint
        - AWS::BedrockAgentCore::Runtime
        - AWS::BedrockAgentCore::Browser
        - AWS::BedrockAgentCore::CodeInterpreter
        - AWS::BedrockAgentCore::Gateway
        - AWS::BedrockAgentCore::Memory
        - AWS::BedrockAgentCore::WorkloadIdentity
        - AWS::SecurityHub::Hub
        - AWS::CloudFront::Distribution
        - AWS::SecurityHub::HubV2
        - AWS::CloudWatch::OTelEnrichment
        - AWS::MSK::Cluster
    TelemetryType:
      type: string
      enum:
        - Logs
        - Metrics
        - Traces
    TelemetrySourceTypes:
      description: A list of telemetry source types that specify what kind of telemetry data to collect from a resource.
      type: array
      items:
        $ref: "#/components/schemas/TelemetrySourceType"
    TelemetrySourceType:
      description: Specifies the type of telemetry source for a resource, such as EKS cluster logs.
      type: string
      enum:
        - VPC_FLOW_LOGS
        - ROUTE53_RESOLVER_QUERY_LOGS
        - EKS_AUDIT_LOGS
        - EKS_AUTHENTICATOR_LOGS
        - EKS_CONTROLLER_MANAGER_LOGS
        - EKS_SCHEDULER_LOGS
        - EKS_API_LOGS
    TelemetryDestinationConfiguration:
      description: Configuration specifying where and how telemetry data should be delivered for Amazon Web Services resources.
      type: object
      properties:
        DestinationType:
          $ref: "#/components/schemas/DestinationType"
          description: The type of destination for the telemetry data (e.g., "Amazon CloudWatch Logs", "S3").
        DestinationPattern:
          $ref: "#/components/schemas/String"
          description: The pattern used to generate the destination path or name, supporting macros like `<resourceId>` and `<accountId>`.
        RetentionInDays:
          $ref: "#/components/schemas/RetentionPeriodInDays"
          description: The number of days to retain the telemetry data in the destination.
        VPCFlowLogParameters:
          $ref: "#/components/schemas/VPCFlowLogParameters"
          description: Configuration parameters specific to VPC Flow Logs when VPC is the resource type.
        CloudtrailParameters:
          $ref: "#/components/schemas/CloudtrailParameters"
          description: Configuration parameters specific to Amazon Web Services CloudTrail when CloudTrail is the source type.
        ELBLoadBalancerLoggingParameters:
          $ref: "#/components/schemas/ELBLoadBalancerLoggingParameters"
          description: Configuration parameters specific to ELB load balancer logging when ELB is the resource type.
        WAFLoggingParameters:
          $ref: "#/components/schemas/WAFLoggingParameters"
          description: Configuration parameters specific to WAF logging when WAF is the resource type.
        LogDeliveryParameters:
          $ref: "#/components/schemas/LogDeliveryParameters"
          description: Configuration parameters specific to Amazon Bedrock AgentCore logging when Amazon Bedrock AgentCore is the resource type.
        MskMonitoringParameters:
          $ref: "#/components/schemas/MskMonitoringParameters"
          description: Configuration parameters specific to MSK monitoring when MSK is the resource type.
    DestinationType:
      type: string
      enum:
        - cloud-watch-logs
    String:
      type: string
    RetentionPeriodInDays:
      type: integer
      minimum: 1
      maximum: 3653
    VPCFlowLogParameters:
      description: Configuration parameters specific to VPC Flow Logs.
      type: object
      properties:
        LogFormat:
          $ref: "#/components/schemas/String"
          description: The format in which VPC Flow Log entries should be logged.
        TrafficType:
          $ref: "#/components/schemas/String"
          description: The type of traffic to log (ACCEPT, REJECT, or ALL).
        MaxAggregationInterval:
          $ref: "#/components/schemas/Integer"
          description: The maximum interval in seconds between the capture of flow log records.
    Integer:
      type: integer
    CloudtrailParameters:
      description: Parameters specific to Amazon Web Services CloudTrail telemetry configuration.
      type: object
      properties:
        AdvancedEventSelectors:
          $ref: "#/components/schemas/AdvancedEventSelectors"
          description: The advanced event selectors to use for filtering Amazon Web Services CloudTrail events.
      required:
        - AdvancedEventSelectors
    AdvancedEventSelectors:
      type: array
      items:
        $ref: "#/components/schemas/AdvancedEventSelector"
    AdvancedEventSelector:
      description: Advanced event selectors let you create fine-grained selectors for management, data, and network activity events.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: An optional, descriptive name for an advanced event selector, such as "Log data events for only two S3 buckets".
        FieldSelectors:
          $ref: "#/components/schemas/FieldSelectors"
          description: Contains all selector statements in an advanced event selector.
      required:
        - FieldSelectors
    FieldSelectors:
      type: array
      items:
        $ref: "#/components/schemas/AdvancedFieldSelector"
    AdvancedFieldSelector:
      description: Defines criteria for selecting resources based on field values.
      type: object
      properties:
        Field:
          $ref: "#/components/schemas/String"
          description: The name of the field to use for selection.
        Equals:
          $ref: "#/components/schemas/StringList"
          description: Matches if the field value equals the specified value.
        StartsWith:
          $ref: "#/components/schemas/StringList"
          description: Matches if the field value starts with the specified value.
        EndsWith:
          $ref: "#/components/schemas/StringList"
          description: Matches if the field value ends with the specified value.
        NotEquals:
          $ref: "#/components/schemas/StringList"
          description: Matches if the field value does not equal the specified value.
        NotStartsWith:
          $ref: "#/components/schemas/StringList"
          description: Matches if the field value does not start with the specified value.
        NotEndsWith:
          $ref: "#/components/schemas/StringList"
          description: Matches if the field value does not end with the specified value.
      required:
        - Field
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    ELBLoadBalancerLoggingParameters:
      description: Configuration parameters for ELB load balancer logging, including output format and field delimiter settings.
      type: object
      properties:
        OutputFormat:
          $ref: "#/components/schemas/OutputFormat"
          description: The format for ELB access log entries (plain text or JSON format).
        FieldDelimiter:
          $ref: "#/components/schemas/String"
          description: The delimiter character used to separate fields in ELB access log entries when using plain text format.
    OutputFormat:
      description: "Enumeration of supported output formats for ELB access logs: PLAIN for space-delimited format, JSON for structured JSON format."
      type: string
      enum:
        - plain
        - json
    WAFLoggingParameters:
      description: Configuration parameters for WAF logging, including redacted fields and logging filters.
      type: object
      properties:
        RedactedFields:
          $ref: "#/components/schemas/RedactedFields"
          description: The fields to redact from WAF logs to protect sensitive information.
        LoggingFilter:
          $ref: "#/components/schemas/LoggingFilter"
          description: A filter configuration that determines which WAF log records to include or exclude.
        LogType:
          $ref: "#/components/schemas/WAFLogType"
          description: The type of WAF logs to collect (currently supports WAF_LOGS).
    RedactedFields:
      description: A list of fields to redact from WAF logs to protect sensitive information, with a maximum of 100 fields.
      type: array
      items:
        $ref: "#/components/schemas/FieldToMatch"
    FieldToMatch:
      description: Specifies a field in the request to redact from WAF logs, such as headers, query parameters, or body content.
      type: object
      properties:
        SingleHeader:
          $ref: "#/components/schemas/SingleHeader"
          description: Redacts a specific header field by name from WAF logs.
        UriPath:
          $ref: "#/components/schemas/String"
          description: Redacts the URI path from WAF logs.
        QueryString:
          $ref: "#/components/schemas/String"
          description: Redacts the entire query string from WAF logs.
        Method:
          $ref: "#/components/schemas/String"
          description: Redacts the HTTP method from WAF logs.
    SingleHeader:
      description: Structure containing a name field limited to 64 characters for header or query parameter identification.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/SingleHeaderNameString"
          description: The name value, limited to 64 characters.
    SingleHeaderNameString:
      type: string
      minLength: 1
      maxLength: 64
    LoggingFilter:
      description: Configuration that determines which WAF log records to keep or drop based on specified conditions.
      type: object
      properties:
        Filters:
          $ref: "#/components/schemas/Filters"
          description: A list of filter conditions that determine log record handling behavior.
        DefaultBehavior:
          $ref: "#/components/schemas/FilterBehavior"
          description: The default action (KEEP or DROP) for log records that don't match any filter conditions.
    Filters:
      description: A list of filter conditions, with at least one filter required.
      type: array
      items:
        $ref: "#/components/schemas/Filter"
    Filter:
      description: A single filter condition that specifies behavior, requirement, and matching conditions for WAF log records.
      type: object
      properties:
        Behavior:
          $ref: "#/components/schemas/FilterBehavior"
          description: The action to take for log records matching this filter (KEEP or DROP).
        Requirement:
          $ref: "#/components/schemas/FilterRequirement"
          description: Whether the log record must meet all conditions (MEETS_ALL) or any condition (MEETS_ANY) to match this filter.
        Conditions:
          $ref: "#/components/schemas/Conditions"
          description: The list of conditions that determine if a log record matches this filter.
    FilterBehavior:
      description: "Enumeration of filter actions: KEEP to include log records, DROP to exclude them."
      type: string
      enum:
        - KEEP
        - DROP
    FilterRequirement:
      description: "Enumeration of condition matching requirements: MEETS_ALL requires all conditions to match, MEETS_ANY requires at least one."
      type: string
      enum:
        - MEETS_ALL
        - MEETS_ANY
    Conditions:
      description: A list of conditions for filter matching, with at least one condition required.
      type: array
      items:
        $ref: "#/components/schemas/Condition"
    Condition:
      description: A single condition that can match based on WAF rule action or label name.
      type: object
      properties:
        ActionCondition:
          $ref: "#/components/schemas/ActionCondition"
          description: Matches log records based on the WAF rule action taken (ALLOW, BLOCK, COUNT, etc.).
        LabelNameCondition:
          $ref: "#/components/schemas/LabelNameCondition"
          description: Matches log records based on WAF rule labels applied to the request.
    ActionCondition:
      description: Condition that matches based on the specific WAF action taken on the request.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/Action"
          description: The WAF action to match against (ALLOW, BLOCK, COUNT, CAPTCHA, CHALLENGE, EXCLUDED_AS_COUNT).
    Action:
      description: Enumeration of WAF actions that can be matched in filter conditions.
      type: string
      enum:
        - ALLOW
        - BLOCK
        - COUNT
        - CAPTCHA
        - CHALLENGE
        - EXCLUDED_AS_COUNT
    LabelNameCondition:
      description: Condition that matches based on WAF rule labels, with label names limited to 1024 characters.
      type: object
      properties:
        LabelName:
          $ref: "#/components/schemas/LabelNameConditionLabelNameString"
          description: The label name to match, supporting alphanumeric characters, underscores, hyphens, and colons.
    LabelNameConditionLabelNameString:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[0-9A-Za-z_\\-:]+"
    WAFLogType:
      description: Enumeration of supported WAF log types. Currently only WAF_LOGS is supported.
      type: string
      enum:
        - WAF_LOGS
    LogDeliveryParameters:
      description: Configuration parameters for Amazon Bedrock AgentCore logging, including logType settings.
      type: object
      properties:
        LogTypes:
          $ref: "#/components/schemas/LogTypes"
          description: The type of log that the source is sending.
    LogTypes:
      type: array
      items:
        $ref: "#/components/schemas/LogType"
    LogType:
      type: string
      enum:
        - APPLICATION_LOGS
        - USAGE_LOGS
        - SECURITY_FINDING_LOGS
        - ACCESS_LOGS
        - CONNECTION_LOGS
    MskMonitoringParameters:
      description: Configuration parameters for Amazon MSK cluster monitoring, including enhanced monitoring level settings.
      type: object
      properties:
        EnhancedMonitoring:
          $ref: "#/components/schemas/MskEnhancedMonitoringLevel"
          description: The level of enhanced monitoring for the MSK cluster.
    MskEnhancedMonitoringLevel:
      description: "Enumeration of supported enhanced monitoring levels for Amazon MSK clusters: DEFAULT, PER_BROKER, PER_TOPIC_PER_BROKER, and PER_TOPIC_PER_PARTITION."
