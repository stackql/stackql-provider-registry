      type: object
      properties:
        maxRuntimeInSeconds:
          $ref: "#/components/schemas/StoppingConditionMaxRuntimeInSecondsInteger"
          description: The maximum amount of time, in seconds, that model training can run before it is terminated.
    StoppingConditionMaxRuntimeInSecondsInteger:
      type: integer
      minimum: 1
      maximum: 2419200
    IncrementalTrainingDataChannels:
      type: array
      items:
        $ref: "#/components/schemas/IncrementalTrainingDataChannel"
    IncrementalTrainingDataChannel:
      description: Defines an incremental training data channel that references a previously trained model. Incremental training allows you to update an existing trained model with new data, building upon the knowledge from a base model rather than training from scratch. This can significantly reduce training time and computational costs while improving model performance with additional data.
      type: object
      properties:
        trainedModelArn:
          $ref: "#/components/schemas/TrainedModelArn"
          description: The Amazon Resource Name (ARN) of the base trained model to use for incremental training. This model serves as the starting point for the incremental training process.
        versionIdentifier:
          $ref: "#/components/schemas/UUID"
          description: The version identifier of the base trained model to use for incremental training. If not specified, the latest version of the trained model is used.
        channelName:
          $ref: "#/components/schemas/ModelTrainingDataChannelName"
          description: The name of the incremental training data channel. This name is used to identify the channel during the training process and must be unique within the training job.
      required:
        - trainedModelArn
        - channelName
    ModelTrainingDataChannelName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z0-9\\.\\-_]+"
    ModelTrainingDataChannels:
      type: array
      items:
        $ref: "#/components/schemas/ModelTrainingDataChannel"
    ModelTrainingDataChannel:
      description: Information about the model training data channel. A training data channel is a named data source that the training algorithms can consume.
      type: object
      properties:
        mlInputChannelArn:
          $ref: "#/components/schemas/MLInputChannelArn"
          description: The Amazon Resource Name (ARN) of the ML input channel for this model training data channel.
        channelName:
          $ref: "#/components/schemas/ModelTrainingDataChannelName"
          description: The name of the training data channel.
        s3DataDistributionType:
          $ref: "#/components/schemas/S3DataDistributionType"
          description: "Specifies how the training data stored in Amazon S3 should be distributed to training instances. This parameter controls the data distribution strategy for the training job: FullyReplicated - The entire dataset is replicated on each training instance. This is suitable for smaller datasets and algorithms that require access to the complete dataset. ShardedByS3Key - The dataset is distributed across training instances based on Amazon S3 key names. This is suitable for larger datasets and distributed training scenarios where each instance processes a subset of the data."
      required:
        - mlInputChannelArn
        - channelName
    S3DataDistributionType:
      type: string
      enum:
        - FullyReplicated
        - ShardedByS3Key
    TrainingInputMode:
      type: string
      enum:
        - File
        - FastFile
        - Pipe
    CreateTrainedModelResponse:
      type: object
      properties:
        trainedModelArn:
          $ref: "#/components/schemas/TrainedModelArn"
          description: The Amazon Resource Name (ARN) of the trained model.
        versionIdentifier:
          $ref: "#/components/schemas/UUID"
          description: The unique version identifier assigned to the newly created trained model. This identifier can be used to reference this specific version of the trained model in subsequent operations such as inference jobs or incremental training. The initial version identifier for the base version of the trained model is "NULL".
      required:
        - trainedModelArn
    CreateTrainingDatasetRequestTrainingDataList:
      type: array
      items:
        $ref: "#/components/schemas/Dataset"
    Dataset:
      description: Defines where the training dataset is located, what type of data it contains, and how to access the data.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/DatasetType"
          description: What type of information is found in the dataset.
        inputConfig:
          $ref: "#/components/schemas/DatasetInputConfig"
          description: A DatasetInputConfig object that defines the data source and schema mapping.
      required:
        - type_
        - inputConfig
    DatasetType:
      type: string
      enum:
        - INTERACTIONS
    DatasetInputConfig:
      description: Defines the Glue data source and schema mapping information.
      type: object
      properties:
        schema:
          $ref: "#/components/schemas/DatasetInputConfigSchemaList"
          description: The schema information for the training data.
        dataSource:
          $ref: "#/components/schemas/DataSource"
          description: A DataSource object that specifies the Glue data source for the training data.
      required:
        - schema
        - dataSource
    DatasetInputConfigSchemaList:
      type: array
      items:
        $ref: "#/components/schemas/ColumnSchema"
    ColumnSchema:
      description: Metadata for a column.
      type: object
      properties:
        columnName:
          $ref: "#/components/schemas/ColumnName"
          description: The name of a column.
        columnTypes:
          $ref: "#/components/schemas/ColumnTypeList"
          description: The data type of column.
      required:
        - columnName
        - columnTypes
    ColumnName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_](([a-zA-Z0-9_ ]+-)*([a-zA-Z0-9_ ]+))?"
    ColumnTypeList:
      type: array
      items:
        $ref: "#/components/schemas/ColumnType"
    ColumnType:
      type: string
      enum:
        - USER_ID
        - ITEM_ID
        - TIMESTAMP
        - CATEGORICAL_FEATURE
        - NUMERICAL_FEATURE
    DataSource:
