openapi: 3.0.0
info:
  version: "2023-09-06"
  title: AWS Clean Rooms ML
  description: AWS Clean Rooms ML
  x-serviceName: cleanrooms-ml
  x-serviceAlias: cleanroomsml
  x-protocol: rest-json
  x-apiVersion: "2023-09-06"
  x-endpointPrefix: cleanrooms-ml
servers:
  - url: https://cleanrooms-ml.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for cleanroomsml
paths:
  /memberships/{membership_identifier}/trained-models/{trained_model_arn}:
    patch:
      operationId: CancelTrainedModel
      description: Submits a request to cancel the trained model job.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The membership ID of the trained model job that you want to cancel.
        - name: trained_model_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TrainedModelArn"
          description: The Amazon Resource Name (ARN) of the trained model job that you want to cancel.
        - name: versionIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UUID"
          description: The version identifier of the trained model to cancel. This parameter allows you to specify which version of the trained model you want to cancel when multiple versions exist. If versionIdentifier is not specified, the base model will be cancelled.
      responses:
        "200":
          description: Success
    delete:
      operationId: DeleteTrainedModelOutput
      description: Deletes the model artifacts stored by the service.
      parameters:
        - name: trained_model_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TrainedModelArn"
          description: The Amazon Resource Name (ARN) of the trained model whose output you want to delete.
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The membership ID of the member that is deleting the trained model output.
        - name: versionIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UUID"
          description: The version identifier of the trained model to delete. If not specified, the operation will delete the base version of the trained model. When specified, only the particular version will be deleted.
      responses:
        "200":
          description: Success
    get:
      operationId: GetTrainedModel
      description: Returns information about a trained model.
      parameters:
        - name: trained_model_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TrainedModelArn"
          description: The Amazon Resource Name (ARN) of the trained model that you are interested in.
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The membership ID of the member that created the trained model that you are interested in.
        - name: versionIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UUID"
          description: The version identifier of the trained model to retrieve. If not specified, the operation returns information about the latest version of the trained model.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTrainedModelResponse"
  /memberships/{membership_identifier}/trained-model-inference-jobs/{trained_model_inference_job_arn}:
    patch:
      operationId: CancelTrainedModelInferenceJob
      description: Submits a request to cancel a trained model inference job.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The membership ID of the trained model inference job that you want to cancel.
        - name: trained_model_inference_job_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TrainedModelInferenceJobArn"
          description: The Amazon Resource Name (ARN) of the trained model inference job that you want to cancel.
      responses:
        "200":
          description: Success
    get:
      operationId: GetTrainedModelInferenceJob
      description: Returns information about a trained model inference job.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: Provides the membership ID of the membership that contains the trained model inference job that you are interested in.
        - name: trained_model_inference_job_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TrainedModelInferenceJobArn"
          description: Provides the Amazon Resource Name (ARN) of the trained model inference job that you are interested in.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTrainedModelInferenceJobResponse"
  /audience-model:
    post:
      operationId: CreateAudienceModel
      description: Defines the information necessary to create an audience model. An audience model is a machine learning model that Clean Rooms ML trains to measure similarity between users. Clean Rooms ML manages training and storing the audience model. The audience model can be used in multiple calls to the StartAudienceGenerationJob API.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trainingDataStartTime:
                  $ref: "#/components/schemas/SyntheticTimestamp_date_time"
                trainingDataEndTime:
                  $ref: "#/components/schemas/SyntheticTimestamp_date_time"
                name:
                  $ref: "#/components/schemas/NameString"
                trainingDatasetArn:
                  $ref: "#/components/schemas/TrainingDatasetArn"
                kmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                tags:
                  $ref: "#/components/schemas/TagMap"
                description:
                  $ref: "#/components/schemas/ResourceDescription"
              required:
                - name
                - trainingDatasetArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAudienceModelResponse"
    get:
      operationId: ListAudienceModels
      description: Returns a list of audience models.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token value retrieved from a previous call to access the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum size of the results that is returned per call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAudienceModelsResponse"
  /configured-audience-model:
    post:
      operationId: CreateConfiguredAudienceModel
      description: Defines the information necessary to create a configured audience model.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/NameString"
                audienceModelArn:
                  $ref: "#/components/schemas/AudienceModelArn"
                outputConfig:
                  $ref: "#/components/schemas/ConfiguredAudienceModelOutputConfig"
                description:
                  $ref: "#/components/schemas/ResourceDescription"
                sharedAudienceMetrics:
                  $ref: "#/components/schemas/MetricsList"
                minMatchingSeedSize:
                  $ref: "#/components/schemas/MinMatchingSeedSize"
                audienceSizeConfig:
                  $ref: "#/components/schemas/AudienceSizeConfig"
                tags:
                  $ref: "#/components/schemas/TagMap"
                childResourceTagOnCreatePolicy:
                  $ref: "#/components/schemas/TagOnCreatePolicy"
              required:
                - name
                - audienceModelArn
                - outputConfig
                - sharedAudienceMetrics
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConfiguredAudienceModelResponse"
    get:
      operationId: ListConfiguredAudienceModels
      description: Returns a list of the configured audience models.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token value retrieved from a previous call to access the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum size of the results that is returned per call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConfiguredAudienceModelsResponse"
  /configured-model-algorithms:
    post:
      operationId: CreateConfiguredModelAlgorithm
      description: Creates a configured model algorithm using a container image stored in an ECR repository.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/NameString"
                description:
                  $ref: "#/components/schemas/ResourceDescription"
                roleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                trainingContainerConfig:
                  $ref: "#/components/schemas/ContainerConfig"
                inferenceContainerConfig:
                  $ref: "#/components/schemas/InferenceContainerConfig"
                tags:
                  $ref: "#/components/schemas/TagMap"
                kmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
              required:
                - name
                - roleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConfiguredModelAlgorithmResponse"
    get:
      operationId: ListConfiguredModelAlgorithms
      description: Returns a list of configured model algorithms.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token value retrieved from a previous call to access the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum size of the results that is returned per call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConfiguredModelAlgorithmsResponse"
  /memberships/{membership_identifier}/configured-model-algorithm-associations:
    post:
      operationId: CreateConfiguredModelAlgorithmAssociation
      description: Associates a configured model algorithm to a collaboration for use by any member of the collaboration.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The membership ID of the member who is associating this configured model algorithm.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                configuredModelAlgorithmArn:
                  $ref: "#/components/schemas/ConfiguredModelAlgorithmArn"
                name:
                  $ref: "#/components/schemas/NameString"
                description:
                  $ref: "#/components/schemas/ResourceDescription"
                privacyConfiguration:
                  $ref: "#/components/schemas/PrivacyConfiguration"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - configuredModelAlgorithmArn
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConfiguredModelAlgorithmAssociationResponse"
    get:
      operationId: ListConfiguredModelAlgorithmAssociations
      description: Returns a list of configured model algorithm associations.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token value retrieved from a previous call to access the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum size of the results that is returned per call.
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The membership ID of the member that created the configured model algorithm associations you are interested in.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConfiguredModelAlgorithmAssociationsResponse"
  /memberships/{membership_identifier}/ml-input-channels:
    post:
      operationId: CreateMLInputChannel
      description: Provides the information to create an ML input channel. An ML input channel is the result of a query that can be used for ML modeling.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The membership ID of the member that is creating the ML input channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                configuredModelAlgorithmAssociations:
                  $ref: "#/components/schemas/CreateMLInputChannelRequestConfiguredModelAlgorithmAssociationsList"
                inputChannel:
                  $ref: "#/components/schemas/InputChannel"
                name:
                  $ref: "#/components/schemas/NameString"
                retentionInDays:
                  $ref: "#/components/schemas/CreateMLInputChannelRequestRetentionInDaysInteger"
                description:
                  $ref: "#/components/schemas/ResourceDescription"
                kmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - configuredModelAlgorithmAssociations
                - inputChannel
                - name
                - retentionInDays
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMLInputChannelResponse"
    get:
      operationId: ListMLInputChannels
      description: Returns a list of ML input channels.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token value retrieved from a previous call to access the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of ML input channels to return.
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The membership ID of the membership that contains the ML input channels that you want to list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMLInputChannelsResponse"
  /memberships/{membership_identifier}/trained-models:
    post:
      operationId: CreateTrainedModel
      description: Creates a trained model from an associated configured model algorithm using data from any member of the collaboration.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The membership ID of the member that is creating the trained model.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/NameString"
                configuredModelAlgorithmAssociationArn:
                  $ref: "#/components/schemas/ConfiguredModelAlgorithmAssociationArn"
                hyperparameters:
                  $ref: "#/components/schemas/HyperParameters"
                environment:
                  $ref: "#/components/schemas/Environment"
                resourceConfig:
                  $ref: "#/components/schemas/ResourceConfig"
                stoppingCondition:
                  $ref: "#/components/schemas/StoppingCondition"
                incrementalTrainingDataChannels:
                  $ref: "#/components/schemas/IncrementalTrainingDataChannels"
                dataChannels:
                  $ref: "#/components/schemas/ModelTrainingDataChannels"
                trainingInputMode:
                  $ref: "#/components/schemas/TrainingInputMode"
                description:
                  $ref: "#/components/schemas/ResourceDescription"
                kmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - configuredModelAlgorithmAssociationArn
                - resourceConfig
                - dataChannels
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTrainedModelResponse"
    get:
      operationId: ListTrainedModels
      description: Returns a list of trained models.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token value retrieved from a previous call to access the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum size of the results that is returned per call.
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The membership ID of the member that created the trained models you are interested in.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTrainedModelsResponse"
  /training-dataset:
    post:
      operationId: CreateTrainingDataset
      description: Defines the information necessary to create a training dataset. In Clean Rooms ML, the TrainingDataset is metadata that points to a Glue table, which is read only during AudienceModel creation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/NameString"
                roleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                trainingData:
                  $ref: "#/components/schemas/CreateTrainingDatasetRequestTrainingDataList"
                tags:
                  $ref: "#/components/schemas/TagMap"
                description:
                  $ref: "#/components/schemas/ResourceDescription"
              required:
                - name
                - roleArn
                - trainingData
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTrainingDatasetResponse"
    get:
      operationId: ListTrainingDatasets
      description: Returns a list of training datasets.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token value retrieved from a previous call to access the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum size of the results that is returned per call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTrainingDatasetsResponse"
  /audience-generation-job/{audience_generation_job_arn}:
    delete:
      operationId: DeleteAudienceGenerationJob
      description: Deletes the specified audience generation job, and removes all data associated with the job.
      parameters:
        - name: audience_generation_job_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AudienceGenerationJobArn"
          description: The Amazon Resource Name (ARN) of the audience generation job that you want to delete.
      responses:
        "200":
          description: Success
    get:
      operationId: GetAudienceGenerationJob
      description: Returns information about an audience generation job.
      parameters:
        - name: audience_generation_job_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AudienceGenerationJobArn"
          description: The Amazon Resource Name (ARN) of the audience generation job that you are interested in.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAudienceGenerationJobResponse"
  /audience-model/{audience_model_arn}:
    delete:
      operationId: DeleteAudienceModel
      description: Specifies an audience model that you want to delete. You can't delete an audience model if there are any configured audience models that depend on the audience model.
      parameters:
        - name: audience_model_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AudienceModelArn"
          description: The Amazon Resource Name (ARN) of the audience model that you want to delete.
      responses:
        "200":
          description: Success
    get:
      operationId: GetAudienceModel
      description: Returns information about an audience model
      parameters:
        - name: audience_model_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AudienceModelArn"
          description: The Amazon Resource Name (ARN) of the audience model that you are interested in.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAudienceModelResponse"
  /configured-audience-model/{configured_audience_model_arn}:
    delete:
      operationId: DeleteConfiguredAudienceModel
      description: Deletes the specified configured audience model. You can't delete a configured audience model if there are any lookalike models that use the configured audience model. If you delete a configured audience model, it will be removed from any collaborations that it is associated to.
      parameters:
        - name: configured_audience_model_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConfiguredAudienceModelArn"
          description: The Amazon Resource Name (ARN) of the configured audience model that you want to delete.
      responses:
        "200":
          description: Success
    get:
      operationId: GetConfiguredAudienceModel
      description: Returns information about a specified configured audience model.
      parameters:
        - name: configured_audience_model_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConfiguredAudienceModelArn"
          description: The Amazon Resource Name (ARN) of the configured audience model that you are interested in.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConfiguredAudienceModelResponse"
    patch:
      operationId: UpdateConfiguredAudienceModel
      description: Provides the information necessary to update a configured audience model. Updates that impact audience generation jobs take effect when a new job starts, but do not impact currently running jobs.
      parameters:
        - name: configured_audience_model_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConfiguredAudienceModelArn"
          description: The Amazon Resource Name (ARN) of the configured audience model that you want to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                outputConfig:
                  $ref: "#/components/schemas/ConfiguredAudienceModelOutputConfig"
                audienceModelArn:
                  $ref: "#/components/schemas/AudienceModelArn"
                sharedAudienceMetrics:
                  $ref: "#/components/schemas/MetricsList"
                minMatchingSeedSize:
                  $ref: "#/components/schemas/MinMatchingSeedSize"
                audienceSizeConfig:
                  $ref: "#/components/schemas/AudienceSizeConfig"
                description:
                  $ref: "#/components/schemas/ResourceDescription"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateConfiguredAudienceModelResponse"
  /configured-audience-model/{configured_audience_model_arn}/policy:
    delete:
      operationId: DeleteConfiguredAudienceModelPolicy
      description: Deletes the specified configured audience model policy.
      parameters:
        - name: configured_audience_model_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConfiguredAudienceModelArn"
          description: The Amazon Resource Name (ARN) of the configured audience model policy that you want to delete.
      responses:
        "200":
          description: Success
    get:
      operationId: GetConfiguredAudienceModelPolicy
      description: Returns information about a configured audience model policy.
      parameters:
        - name: configured_audience_model_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConfiguredAudienceModelArn"
          description: The Amazon Resource Name (ARN) of the configured audience model that you are interested in.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConfiguredAudienceModelPolicyResponse"
    put:
      operationId: PutConfiguredAudienceModelPolicy
      description: Create or update the resource policy for a configured audience model.
      parameters:
        - name: configured_audience_model_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConfiguredAudienceModelArn"
          description: The Amazon Resource Name (ARN) of the configured audience model that the resource policy will govern.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                configuredAudienceModelPolicy:
                  $ref: "#/components/schemas/ResourcePolicy"
                previousPolicyHash:
                  $ref: "#/components/schemas/Hash"
                policyExistenceCondition:
                  $ref: "#/components/schemas/PolicyExistenceCondition"
              required:
                - configuredAudienceModelPolicy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutConfiguredAudienceModelPolicyResponse"
  /configured-model-algorithms/{configured_model_algorithm_arn}:
    delete:
      operationId: DeleteConfiguredModelAlgorithm
      description: Deletes a configured model algorithm.
      parameters:
        - name: configured_model_algorithm_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConfiguredModelAlgorithmArn"
          description: The Amazon Resource Name (ARN) of the configured model algorithm that you want to delete.
      responses:
        "200":
          description: Success
    get:
      operationId: GetConfiguredModelAlgorithm
      description: Returns information about a configured model algorithm.
      parameters:
        - name: configured_model_algorithm_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConfiguredModelAlgorithmArn"
          description: The Amazon Resource Name (ARN) of the configured model algorithm that you want to return information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConfiguredModelAlgorithmResponse"
  /memberships/{membership_identifier}/configured-model-algorithm-associations/{configured_model_algorithm_association_arn}:
    delete:
      operationId: DeleteConfiguredModelAlgorithmAssociation
      description: Deletes a configured model algorithm association.
      parameters:
        - name: configured_model_algorithm_association_arn
          in: path
          required: true
          schema:
