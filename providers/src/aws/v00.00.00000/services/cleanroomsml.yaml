          description: The numerical score representing the vulnerability to membership inference attacks.
      required:
        - attackVersion
        - score
    MembershipInferenceAttackVersion:
      type: string
      enum:
        - DISTANCE_TO_CLOSEST_RECORD_V1
    MembershipInferenceAttackScoreScoreDouble:
      type: number
      format: double
      minimum: 0
      maximum: 1
