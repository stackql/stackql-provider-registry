        - NUMERICAL
    SyntheticDataEvaluationScores:
      description: Comprehensive evaluation metrics for synthetic data that assess both the utility of the generated data for machine learning tasks and its privacy preservation characteristics.
      type: object
      properties:
        dataPrivacyScores:
          $ref: "#/components/schemas/DataPrivacyScores"
          description: Privacy-specific evaluation scores that measure how well the synthetic data protects individual privacy, including assessments of potential privacy risks such as membership inference attacks.
      required:
        - dataPrivacyScores
    DataPrivacyScores:
      description: Privacy evaluation scores that measure the privacy characteristics of the generated synthetic data, including assessments of potential privacy risks such as membership inference attacks.
      type: object
      properties:
        membershipInferenceAttackScores:
          $ref: "#/components/schemas/MembershipInferenceAttackScoreList"
          description: Scores that evaluate the vulnerability of the synthetic data to membership inference attacks, which attempt to determine whether a specific individual was a member of the original dataset.
      required:
        - membershipInferenceAttackScores
    MembershipInferenceAttackScoreList:
      type: array
      items:
        $ref: "#/components/schemas/MembershipInferenceAttackScore"
    MembershipInferenceAttackScore:
