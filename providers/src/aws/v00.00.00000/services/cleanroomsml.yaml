      type: object
      properties:
        glueDataSource:
          $ref: "#/components/schemas/GlueDataSource"
          description: A GlueDataSource object that defines the catalog ID, database name, and table name for the training data.
      required:
        - glueDataSource
    GlueDataSource:
      description: Defines the Glue data source that contains the training data.
      type: object
      properties:
        tableName:
          $ref: "#/components/schemas/GlueTableName"
          description: The Glue table that contains the training data.
        databaseName:
          $ref: "#/components/schemas/GlueDatabaseName"
          description: The Glue database that contains the training data.
        catalogId:
          $ref: "#/components/schemas/AccountId"
          description: The Glue catalog that contains the training data.
      required:
        - tableName
        - databaseName
    GlueTableName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_](([a-zA-Z0-9_ ]+-)*([a-zA-Z0-9_ ]+))?"
    GlueDatabaseName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_](([a-zA-Z0-9_]+-)*([a-zA-Z0-9_]+))?"
    AccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[0-9]{12}"
    CreateTrainingDatasetResponse:
      type: object
      properties:
        trainingDatasetArn:
          $ref: "#/components/schemas/TrainingDatasetArn"
          description: The Amazon Resource Name (ARN) of the training dataset resource.
      required:
        - trainingDatasetArn
    AudienceGenerationJobArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[-a-z]*:cleanrooms-ml:[-a-z0-9]+:[0-9]{12}:audience-generation-job/[-a-zA-Z0-9_/.]+
    GetAudienceGenerationJobResponse:
      type: object
      properties:
        createTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The time at which the audience generation job was created.
        updateTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The most recent time at which the audience generation job was updated.
        audienceGenerationJobArn:
          $ref: "#/components/schemas/AudienceGenerationJobArn"
          description: The Amazon Resource Name (ARN) of the audience generation job.
        name:
          $ref: "#/components/schemas/NameString"
          description: The name of the audience generation job.
        description:
          $ref: "#/components/schemas/ResourceDescription"
          description: The description of the audience generation job.
        status:
          $ref: "#/components/schemas/AudienceGenerationJobStatus"
          description: The status of the audience generation job.
        statusDetails:
          $ref: "#/components/schemas/StatusDetails"
          description: Details about the status of the audience generation job.
        configuredAudienceModelArn:
          $ref: "#/components/schemas/ConfiguredAudienceModelArn"
          description: The Amazon Resource Name (ARN) of the configured audience model used for this audience generation job.
        seedAudience:
          $ref: "#/components/schemas/AudienceGenerationJobDataSource"
          description: The seed audience that was used for this audience generation job. This field will be null if the account calling the API is the account that started this audience generation job.
        includeSeedInOutput:
          $ref: "#/components/schemas/Boolean"
          description: Configure whether the seed users are included in the output audience. By default, Clean Rooms ML removes seed users from the output audience. If you specify TRUE, the seed users will appear first in the output. Clean Rooms ML does not explicitly reveal whether a user was in the seed, but the recipient of the audience will know that the first minimumSeedSize count of users are from the seed.
        collaborationId:
          $ref: "#/components/schemas/UUID"
          description: The identifier of the collaboration that this audience generation job is associated with.
        metrics:
          $ref: "#/components/schemas/AudienceQualityMetrics"
          description: The relevance scores for different audience sizes and the recall score of the generated audience.
        startedBy:
          $ref: "#/components/schemas/AccountId"
          description: The AWS account that started this audience generation job.
        tags:
          type: object
          properties: {}
          description: The tags that are associated to this audience generation job.
        protectedQueryIdentifier:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the protected query for this audience generation job.
      required:
        - createTime
        - updateTime
        - audienceGenerationJobArn
        - name
        - status
        - configuredAudienceModelArn
    AudienceGenerationJobStatus:
      type: string
      enum:
        - CREATE_PENDING
        - CREATE_IN_PROGRESS
        - CREATE_FAILED
        - ACTIVE
        - DELETE_PENDING
        - DELETE_IN_PROGRESS
        - DELETE_FAILED
    StatusDetails:
      description: Details about the status of a resource.
      type: object
      properties:
        statusCode:
          $ref: "#/components/schemas/String"
          description: The status code that was returned. The status code is intended for programmatic error handling. Clean Rooms ML will not change the status code for existing error conditions.
        message:
          $ref: "#/components/schemas/String"
          description: The error message that was returned. The message is intended for human consumption and can change at any time. Use the statusCode for programmatic error handling.
    AudienceGenerationJobDataSource:
      description: Defines the Amazon S3 bucket where the seed audience for the generating audience is stored.
      type: object
      properties:
        dataSource:
          $ref: "#/components/schemas/S3ConfigMap"
          description: 'Defines the Amazon S3 bucket where the seed audience for the generating audience is stored. A valid data source is a JSON line file in the following format: {"user_id": "111111"} {"user_id": "222222"} ...'
        roleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The ARN of the IAM role that can read the Amazon S3 bucket where the seed audience is stored.
        sqlParameters:
          $ref: "#/components/schemas/ProtectedQuerySQLParameters"
          description: The protected SQL query parameters.
        sqlComputeConfiguration:
          $ref: "#/components/schemas/ComputeConfiguration"
      required:
        - roleArn
    Boolean:
      type: boolean
    AudienceQualityMetrics:
      description: Metrics that describe the quality of the generated audience.
      type: object
      properties:
        relevanceMetrics:
          $ref: "#/components/schemas/RelevanceMetrics"
          description: The relevance scores of the generated audience.
        recallMetric:
          $ref: "#/components/schemas/AudienceQualityMetricsRecallMetricDouble"
          description: The recall score of the generated audience. Recall is the percentage of the most similar users (by default, the most similar 20%) from a sample of the training data that are included in the seed audience by the audience generation job. Values range from 0-1, larger values indicate a better audience. A recall value approximately equal to the maximum bin size indicates that the audience model is equivalent to random selection.
      required:
        - relevanceMetrics
    RelevanceMetrics:
      type: array
      items:
        $ref: "#/components/schemas/RelevanceMetric"
    RelevanceMetric:
      description: The relevance score of a generated audience.
      type: object
      properties:
        audienceSize:
          $ref: "#/components/schemas/AudienceSize"
        score:
          $ref: "#/components/schemas/RelevanceMetricScoreDouble"
          description: The relevance score of the generated audience.
      required:
        - audienceSize
    AudienceSize:
      description: The size of the generated audience. Must match one of the sizes in the configured audience model.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/AudienceSizeType"
          description: Whether the audience size is defined in absolute terms or as a percentage. You can use the ABSOLUTE AudienceSize to configure out audience sizes using the count of identifiers in the output. You can use the Percentage AudienceSize to configure sizes in the range 1-100 percent.
        value:
          $ref: "#/components/schemas/AudienceSizeValue"
          description: Specify an audience size value.
      required:
        - type_
        - value
    RelevanceMetricScoreDouble:
      type: number
      format: double
      minimum: 0
      maximum: 10
    AudienceQualityMetricsRecallMetricDouble:
      type: number
      format: double
      minimum: 0
      maximum: 1
