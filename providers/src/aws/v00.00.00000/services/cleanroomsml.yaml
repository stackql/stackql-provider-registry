      description: An access budget that defines consumption limits for a specific resource within defined time periods.
      type: object
      properties:
        resourceArn:
          $ref: "#/components/schemas/BudgetedResourceArn"
          description: The Amazon Resource Name (ARN) of the resource that this access budget applies to.
        details:
          $ref: "#/components/schemas/AccessBudgetDetailsList"
          description: A list of budget details for this resource. Contains active budget periods that apply to the resource.
        aggregateRemainingBudget:
          $ref: "#/components/schemas/Budget"
          description: The total remaining budget across all active budget periods for this resource.
      required:
        - resourceArn
        - details
        - aggregateRemainingBudget
    BudgetedResourceArn:
      type: string
      minLength: 0
      maxLength: 200
      pattern: arn:aws:[\w]+:[\w]{2}-[\w]{4,9}-[\d]:[\d]{12}:membership/[\d\w-]+/configuredtableassociation/[\d\w-]+
    AccessBudgetDetailsList:
      type: array
      items:
        $ref: "#/components/schemas/AccessBudgetDetails"
    AccessBudgetDetails:
      description: The detailed information for a specific budget period, including time boundaries and budget amounts.
      type: object
      properties:
        startTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The start time of this budget period.
        endTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The end time of this budget period. If not specified, the budget period continues indefinitely.
        remainingBudget:
          $ref: "#/components/schemas/Budget"
          description: The amount of budget remaining in this period.
        budget:
          $ref: "#/components/schemas/Budget"
          description: The total budget amount allocated for this period.
        budgetType:
          $ref: "#/components/schemas/AccessBudgetType"
          description: The type of budget period. Calendar-based types reset automatically at regular intervals, while LIFETIME budgets never reset.
        autoRefresh:
          $ref: "#/components/schemas/AutoRefreshMode"
          description: Specifies whether this budget automatically refreshes when the current period ends.
      required:
        - startTime
        - remainingBudget
        - budget
        - budgetType
    Budget:
      type: integer
      minimum: 0
    AccessBudgetType:
      type: string
      enum:
        - CALENDAR_DAY
        - CALENDAR_MONTH
        - CALENDAR_WEEK
        - LIFETIME
    AutoRefreshMode:
      type: string
      enum:
        - ENABLED
        - DISABLED
    SyntheticDataConfiguration:
      description: Configuration settings for synthetic data generation, including the parameters that control data synthesis and the evaluation scores that measure the quality and privacy characteristics of the generated synthetic data.
      type: object
      properties:
        syntheticDataParameters:
          $ref: "#/components/schemas/MLSyntheticDataParameters"
          description: The parameters that control how synthetic data is generated, including privacy settings, column classifications, and other configuration options that affect the data synthesis process.
        syntheticDataEvaluationScores:
          $ref: "#/components/schemas/SyntheticDataEvaluationScores"
          description: Evaluation scores that assess the quality and privacy characteristics of the generated synthetic data, providing metrics on data utility and privacy preservation.
      required:
        - syntheticDataParameters
    MLSyntheticDataParameters:
      description: Parameters that control the generation of synthetic data for custom model training, including privacy settings and column classification details.
      type: object
      properties:
        epsilon:
          $ref: "#/components/schemas/MLSyntheticDataParametersEpsilonDouble"
          description: The epsilon value for differential privacy, which controls the privacy-utility tradeoff in synthetic data generation. Lower values provide stronger privacy guarantees but may reduce data utility.
        maxMembershipInferenceAttackScore:
