      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    UUID:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    TrainedModelArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[-a-z]*:cleanrooms-ml:[-a-z0-9]+:[0-9]{12}:membership/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/trained-model/[-a-zA-Z0-9_/.]+
    TrainedModelInferenceJobArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[-a-z]*:cleanrooms-ml:[-a-z0-9]+:[0-9]{12}:membership/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/trained-model-inference-job/[-a-zA-Z0-9_/.]+
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    NameString:
      type: string
      minLength: 1
      maxLength: 63
      pattern: (?!\s*$)[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDBFF-\uDC00\uDFFF\t]*
    TrainingDatasetArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[-a-z]*:cleanrooms-ml:[-a-z0-9]+:[0-9]{12}:training-dataset/[-a-zA-Z0-9_/.]+
    KmsKeyArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[-a-z]*:kms:[-a-z0-9]+:[0-9]{12}:key/.+
    TagMap:
      type: object
      properties: {}
    ResourceDescription:
      type: string
      minLength: 0
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDBFF-\\uDC00\\uDFFF\\t\\r\\n]*"
    CreateAudienceModelResponse:
      type: object
      properties:
        audienceModelArn:
          $ref: "#/components/schemas/AudienceModelArn"
          description: The Amazon Resource Name (ARN) of the audience model.
      required:
        - audienceModelArn
    AudienceModelArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[-a-z]*:cleanrooms-ml:[-a-z0-9]+:[0-9]{12}:audience-model/[-a-zA-Z0-9_/.]+
    ConfiguredAudienceModelOutputConfig:
      description: Configuration information necessary for the configure audience model output.
      type: object
      properties:
        destination:
          $ref: "#/components/schemas/AudienceDestination"
        roleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The ARN of the IAM role that can write the Amazon S3 bucket.
      required:
        - destination
        - roleArn
    AudienceDestination:
      description: Defines the Amazon S3 bucket where the configured audience is stored.
      type: object
      properties:
        s3Destination:
          $ref: "#/components/schemas/S3ConfigMap"
          description: The Amazon S3 bucket and path for the configured audience.
      required:
        - s3Destination
    S3ConfigMap:
      description: Provides information about an Amazon S3 bucket and path.
      type: object
      properties:
        s3Uri:
          $ref: "#/components/schemas/S3Path"
          description: The Amazon S3 location URI.
      required:
        - s3Uri
    S3Path:
      type: string
      minLength: 1
      maxLength: 1285
      pattern: s3://.+
    IamRoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[-a-z]*:iam::[0-9]{12}:role/.+
    MetricsList:
      type: array
      items:
        $ref: "#/components/schemas/SharedAudienceMetrics"
    SharedAudienceMetrics:
      type: string
      enum:
        - ALL
        - NONE
    MinMatchingSeedSize:
      type: integer
      minimum: 25
      maximum: 500000
    AudienceSizeConfig:
      description: Returns the relevance scores at these audience sizes when used in the GetAudienceGenerationJob for a specified audience generation job and configured audience model. Specifies the list of allowed audienceSize values when used in the StartAudienceExportJob for an audience generation job. You can use the ABSOLUTE AudienceSize to configure out audience sizes using the count of identifiers in the output. You can use the Percentage AudienceSize to configure sizes in the range 1-100 percent.
      type: object
      properties:
        audienceSizeType:
          $ref: "#/components/schemas/AudienceSizeType"
          description: Whether the audience output sizes are defined as an absolute number or a percentage.
        audienceSizeBins:
          $ref: "#/components/schemas/AudienceSizeBins"
          description: An array of the different audience output sizes.
      required:
        - audienceSizeType
        - audienceSizeBins
    AudienceSizeType:
      type: string
      enum:
        - ABSOLUTE
        - PERCENTAGE
    AudienceSizeBins:
      type: array
      items:
        $ref: "#/components/schemas/AudienceSizeValue"
    AudienceSizeValue:
      type: integer
      minimum: 1
      maximum: 20000000
    TagOnCreatePolicy:
      type: string
      enum:
        - FROM_PARENT_RESOURCE
        - NONE
    CreateConfiguredAudienceModelResponse:
      type: object
      properties:
        configuredAudienceModelArn:
          $ref: "#/components/schemas/ConfiguredAudienceModelArn"
          description: The Amazon Resource Name (ARN) of the configured audience model.
      required:
        - configuredAudienceModelArn
    ConfiguredAudienceModelArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[-a-z]*:cleanrooms-ml:[-a-z0-9]+:[0-9]{12}:configured-audience-model/[-a-zA-Z0-9_/.]+
    ContainerConfig:
      description: Provides configuration information for the dockerized container where the model algorithm is stored.
      type: object
      properties:
        imageUri:
          $ref: "#/components/schemas/AlgorithmImage"
          description: The registry path of the docker image that contains the algorithm. Clean Rooms ML currently only supports the registry/repository[:tag] image path format. For more information about using images in Clean Rooms ML, see the Sagemaker API reference.
        entrypoint:
          $ref: "#/components/schemas/ContainerEntrypoint"
          description: The entrypoint script for a Docker container used to run a training job. This script takes precedence over the default train processing instructions. See How Amazon SageMaker Runs Your Training Image for additional information. For more information, see How Sagemaker runs your training image.
        arguments:
          $ref: "#/components/schemas/ContainerArguments"
          description: The arguments for a container used to run a training job. See How Amazon SageMaker Runs Your Training Image for additional information. For more information, see How Sagemaker runs your training image.
        metricDefinitions:
          $ref: "#/components/schemas/MetricDefinitionList"
          description: A list of metric definition objects. Each object specifies the metric name and regular expressions used to parse algorithm logs. Amazon Web Services Clean Rooms ML publishes each metric to all members' Amazon CloudWatch using IAM role configured in PutMLConfiguration.
      required:
        - imageUri
    AlgorithmImage:
      type: string
      minLength: 1
      maxLength: 255
      pattern: .*
    ContainerEntrypoint:
      type: array
      items:
        $ref: "#/components/schemas/ContainerEntrypointString"
    ContainerEntrypointString:
      type: string
      minLength: 1
      maxLength: 256
      pattern: .*
    ContainerArguments:
      type: array
      items:
        $ref: "#/components/schemas/ContainerArgument"
    ContainerArgument:
      type: string
      minLength: 1
      maxLength: 256
      pattern: .*
    MetricDefinitionList:
      type: array
      items:
        $ref: "#/components/schemas/MetricDefinition"
    MetricDefinition:
      description: Information about the model metric that is reported for a trained model.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/MetricName"
          description: The name of the model metric.
        regex:
          $ref: "#/components/schemas/MetricRegex"
          description: The regular expression statement that defines how the model metric is reported.
      required:
        - name
        - regex
    MetricName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: .+
    MetricRegex:
      type: string
      minLength: 1
      maxLength: 500
      pattern: .+
    InferenceContainerConfig:
      description: Provides configuration information for the inference container.
      type: object
      properties:
        imageUri:
          $ref: "#/components/schemas/AlgorithmImage"
          description: The registry path of the docker image that contains the inference algorithm. Clean Rooms ML currently only supports the registry/repository[:tag] image path format. For more information about using images in Clean Rooms ML, see the Sagemaker API reference.
      required:
        - imageUri
    CreateConfiguredModelAlgorithmResponse:
      type: object
      properties:
        configuredModelAlgorithmArn:
          $ref: "#/components/schemas/ConfiguredModelAlgorithmArn"
          description: The Amazon Resource Name (ARN) of the configured model algorithm.
      required:
        - configuredModelAlgorithmArn
    ConfiguredModelAlgorithmArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[-a-z]*:cleanrooms-ml:[-a-z0-9]+:[0-9]{12}:configured-model-algorithm/[-a-zA-Z0-9_/.]+
    PrivacyConfiguration:
      description: Information about the privacy configuration for a configured model algorithm association.
      type: object
      properties:
        policies:
          $ref: "#/components/schemas/PrivacyConfigurationPolicies"
          description: The privacy configuration policies for a configured model algorithm association.
      required:
        - policies
    PrivacyConfigurationPolicies:
      description: Information about the privacy configuration policies for a configured model algorithm association.
      type: object
      properties:
        trainedModels:
          $ref: "#/components/schemas/TrainedModelsConfigurationPolicy"
          description: Specifies who will receive the trained models.
        trainedModelExports:
          $ref: "#/components/schemas/TrainedModelExportsConfigurationPolicy"
          description: Specifies who will receive the trained model export.
        trainedModelInferenceJobs:
          $ref: "#/components/schemas/TrainedModelInferenceJobsConfigurationPolicy"
          description: Specifies who will receive the trained model inference jobs.
    TrainedModelsConfigurationPolicy:
      description: The configuration policy for the trained models.
      type: object
      properties:
        containerLogs:
          $ref: "#/components/schemas/LogsConfigurationPolicyList"
          description: The container for the logs of the trained model.
        containerMetrics:
          $ref: "#/components/schemas/MetricsConfigurationPolicy"
          description: The container for the metrics of the trained model.
        maxArtifactSize:
          $ref: "#/components/schemas/TrainedModelArtifactMaxSize"
          description: The maximum size limit for trained model artifacts as defined in the configuration policy. This setting helps enforce consistent size limits across trained models in the collaboration.
    LogsConfigurationPolicyList:
      type: array
      items:
        $ref: "#/components/schemas/LogsConfigurationPolicy"
    LogsConfigurationPolicy:
      description: Provides the information necessary for a user to access the logs.
      type: object
      properties:
        allowedAccountIds:
          $ref: "#/components/schemas/AccountIdList"
          description: A list of account IDs that are allowed to access the logs.
        filterPattern:
          $ref: "#/components/schemas/LogsConfigurationPolicyFilterPatternString"
          description: A regular expression pattern that is used to parse the logs and return information that matches the pattern.
        logType:
          $ref: "#/components/schemas/LogType"
          description: Specifies the type of log this policy applies to. The currently supported policies are ALL or ERROR_SUMMARY.
        logRedactionConfiguration:
          $ref: "#/components/schemas/LogRedactionConfiguration"
          description: Specifies the log redaction configuration for this policy.
      required:
        - allowedAccountIds
    AccountIdList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    String:
      type: string
    LogsConfigurationPolicyFilterPatternString:
      type: string
      minLength: 0
      maxLength: 1024
    LogType:
      type: string
      enum:
        - ALL
        - ERROR_SUMMARY
    LogRedactionConfiguration:
      description: The configuration for log redaction.
      type: object
      properties:
        entitiesToRedact:
          $ref: "#/components/schemas/EntityTypeList"
          description: Specifies the entities to be redacted from logs. Entities to redact are "ALL_PERSONALLY_IDENTIFIABLE_INFORMATION", "NUMBERS","CUSTOM". If CUSTOM is supplied or configured, custom patterns (customDataIdentifiers) should be provided, and the patterns will be redacted in logs or error messages.
        customEntityConfig:
          $ref: "#/components/schemas/CustomEntityConfig"
          description: Specifies the configuration for custom entities in the context of log redaction.
      required:
        - entitiesToRedact
    EntityTypeList:
      type: array
      items:
        $ref: "#/components/schemas/EntityType"
    EntityType:
      type: string
      enum:
        - ALL_PERSONALLY_IDENTIFIABLE_INFORMATION
        - NUMBERS
        - CUSTOM
    CustomEntityConfig:
      description: The configuration for defining custom patterns to be redacted from logs and error messages. This is for the CUSTOM config under entitiesToRedact. Both CustomEntityConfig and entitiesToRedact need to be present or not present.
      type: object
      properties:
        customDataIdentifiers:
          $ref: "#/components/schemas/CustomDataIdentifierList"
          description: Defines data identifiers for the custom entity configuration. Provide this only if CUSTOM redaction is configured.
      required:
        - customDataIdentifiers
    CustomDataIdentifierList:
      type: array
      items:
        $ref: "#/components/schemas/CustomDataIdentifier"
    CustomDataIdentifier:
      type: string
      minLength: 1
      maxLength: 200
      pattern: "[a-zA-Z0-9\\_\\#\\=\\@/\\;\\,\\-\\ \\^\\$\\?\\[\\]\\{\\}\\|\\\\\\*\\+\\.\\(\\)]+"
    MetricsConfigurationPolicy:
      description: Provides the configuration policy for metrics generation.
      type: object
      properties:
        noiseLevel:
          $ref: "#/components/schemas/NoiseLevelType"
          description: The noise level for the generated metrics.
      required:
        - noiseLevel
    NoiseLevelType:
      type: string
      enum:
        - HIGH
        - MEDIUM
        - LOW
        - NONE
    TrainedModelArtifactMaxSize:
      description: Specifies the maximum size limit for trained model artifacts. This configuration helps control storage costs and ensures that trained models don't exceed specified size constraints. The size limit applies to the total size of all artifacts produced by the training job.
      type: object
      properties:
        unit:
          $ref: "#/components/schemas/TrainedModelArtifactMaxSizeUnitType"
          description: The unit of measurement for the maximum artifact size. Valid values include common storage units such as bytes, kilobytes, megabytes, gigabytes, and terabytes.
        value:
          $ref: "#/components/schemas/TrainedModelArtifactMaxSizeValue"
          description: The numerical value for the maximum artifact size limit. This value is interpreted according to the specified unit.
      required:
        - unit
        - value
    TrainedModelArtifactMaxSizeUnitType:
      type: string
      enum:
        - GB
    TrainedModelArtifactMaxSizeValue:
      type: number
      format: double
      minimum: 0.01
      maximum: 100
    TrainedModelExportsConfigurationPolicy:
      description: Information about how the trained model exports are configured.
      type: object
      properties:
        maxSize:
          $ref: "#/components/schemas/TrainedModelExportsMaxSize"
          description: The maximum size of the data that can be exported.
        filesToExport:
          $ref: "#/components/schemas/TrainedModelExportFileTypeList"
          description: The files that are exported during the trained model export job.
      required:
        - maxSize
        - filesToExport
    TrainedModelExportsMaxSize:
      description: The maximum size of the trained model metrics that can be exported. If the trained model metrics dataset is larger than this value, it will not be exported.
      type: object
      properties:
        unit:
          $ref: "#/components/schemas/TrainedModelExportsMaxSizeUnitType"
          description: The unit of measurement for the data size.
        value:
          $ref: "#/components/schemas/TrainedModelExportsMaxSizeValue"
          description: The maximum size of the dataset to export.
      required:
        - unit
        - value
    TrainedModelExportsMaxSizeUnitType:
      type: string
      enum:
        - GB
    TrainedModelExportsMaxSizeValue:
      type: number
      format: double
      minimum: 0.01
      maximum: 50
    TrainedModelExportFileTypeList:
      type: array
      items:
        $ref: "#/components/schemas/TrainedModelExportFileType"
    TrainedModelExportFileType:
      type: string
      enum:
        - MODEL
        - OUTPUT
    TrainedModelInferenceJobsConfigurationPolicy:
      description: Provides configuration information for the trained model inference job.
      type: object
      properties:
        containerLogs:
          $ref: "#/components/schemas/LogsConfigurationPolicyList"
          description: The logs container for the trained model inference job.
        maxOutputSize:
          $ref: "#/components/schemas/TrainedModelInferenceMaxOutputSize"
          description: The maximum allowed size of the output of the trained model inference job.
    TrainedModelInferenceMaxOutputSize:
      description: Information about the maximum output size for a trained model inference job.
      type: object
      properties:
        unit:
          $ref: "#/components/schemas/TrainedModelInferenceMaxOutputSizeUnitType"
          description: The measurement unit to use.
        value:
          $ref: "#/components/schemas/TrainedModelInferenceMaxOutputSizeValue"
          description: The maximum output size value.
      required:
        - unit
        - value
    TrainedModelInferenceMaxOutputSizeUnitType:
      type: string
      enum:
        - GB
    TrainedModelInferenceMaxOutputSizeValue:
      type: number
      format: double
      minimum: 0.01
      maximum: 100
    CreateConfiguredModelAlgorithmAssociationResponse:
      type: object
      properties:
        configuredModelAlgorithmAssociationArn:
          $ref: "#/components/schemas/ConfiguredModelAlgorithmAssociationArn"
          description: The Amazon Resource Name (ARN) of the configured model algorithm association.
      required:
        - configuredModelAlgorithmAssociationArn
    ConfiguredModelAlgorithmAssociationArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[-a-z]*:cleanrooms-ml:[-a-z0-9]+:[0-9]{12}:membership/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/configured-model-algorithm-association/[-a-zA-Z0-9_/.]+
    CreateMLInputChannelRequestConfiguredModelAlgorithmAssociationsList:
      type: array
      items:
        $ref: "#/components/schemas/ConfiguredModelAlgorithmAssociationArn"
    InputChannel:
      description: Provides information about the data source that is used to create an ML input channel.
      type: object
      properties:
        dataSource:
          $ref: "#/components/schemas/InputChannelDataSource"
          description: The data source that is used to create the ML input channel.
        roleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of the role used to run the query specified in the dataSource field of the input channel. Passing a role across AWS accounts is not allowed. If you pass a role that isn't in your account, you get an AccessDeniedException error.
      required:
        - dataSource
        - roleArn
    InputChannelDataSource:
      description: Provides the data source that is used to define an input channel.
      type: object
      properties:
        protectedQueryInputParameters:
          $ref: "#/components/schemas/ProtectedQueryInputParameters"
    ProtectedQueryInputParameters:
      description: Provides information necessary to perform the protected query.
      type: object
      properties:
        sqlParameters:
          $ref: "#/components/schemas/ProtectedQuerySQLParameters"
        computeConfiguration:
          $ref: "#/components/schemas/ComputeConfiguration"
          description: Provides configuration information for the workers that will perform the protected query.
        resultFormat:
          $ref: "#/components/schemas/ResultFormat"
          description: The format in which the query results should be returned. If not specified, defaults to CSV.
      required:
        - sqlParameters
    ProtectedQuerySQLParameters:
      description: The parameters for the SQL type Protected Query.
      type: object
      properties:
        queryString:
          $ref: "#/components/schemas/ProtectedQuerySQLParametersQueryStringString"
          description: The query string to be submitted.
        analysisTemplateArn:
          $ref: "#/components/schemas/AnalysisTemplateArn"
          description: The Amazon Resource Name (ARN) associated with the analysis template within a collaboration.
        parameters:
          type: object
          properties: {}
          description: The protected query SQL parameters.
    ProtectedQuerySQLParametersQueryStringString:
      type: string
      minLength: 0
      maxLength: 500000
    AnalysisTemplateArn:
      type: string
      minLength: 0
      maxLength: 200
      pattern: arn:aws[-a-z]*:cleanrooms:[\w]{2}-[\w]{4,9}-[\d]:[\d]{12}:membership/[\d\w-]+/analysistemplate/[\d\w-]+
    ComputeConfiguration:
      description: Provides configuration information for the instances that will perform the compute work.
      type: object
      properties:
        worker:
          $ref: "#/components/schemas/WorkerComputeConfiguration"
          description: The worker instances that will perform the compute work.
    WorkerComputeConfiguration:
      description: Configuration information about the compute workers that perform the transform job.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/WorkerComputeType"
          description: The instance type of the compute workers that are used.
        number:
          $ref: "#/components/schemas/WorkerComputeConfigurationNumberInteger"
          description: The number of compute workers that are used.
        properties_:
          $ref: "#/components/schemas/WorkerComputeConfigurationProperties"
    WorkerComputeType:
      type: string
      enum:
        - CR.1X
        - CR.4X
    WorkerComputeConfigurationNumberInteger:
      type: integer
      minimum: 2
      maximum: 1024
    WorkerComputeConfigurationProperties:
      description: The configuration properties for the worker compute environment. These properties allow you to customize the compute settings for your Clean Rooms workloads.
      type: object
      properties:
        spark:
          type: object
          properties: {}
          description: The Spark configuration properties for SQL workloads. This map contains key-value pairs that configure Apache Spark settings to optimize performance for your data processing jobs. You can specify up to 50 Spark properties, with each key being 1-200 characters and each value being 0-500 characters. These properties allow you to adjust compute capacity for large datasets and complex workloads.
    ResultFormat:
      description: File format of the returned data.
      type: string
      enum:
        - CSV
        - PARQUET
    CreateMLInputChannelRequestRetentionInDaysInteger:
      type: integer
      minimum: 1
      maximum: 30
    CreateMLInputChannelResponse:
      type: object
      properties:
        mlInputChannelArn:
          $ref: "#/components/schemas/MLInputChannelArn"
          description: The Amazon Resource Name (ARN) of the ML input channel.
      required:
        - mlInputChannelArn
    MLInputChannelArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[-a-z]*:cleanrooms-ml:[-a-z0-9]+:[0-9]{12}:membership/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/ml-input-channel/[-a-zA-Z0-9_/.]+
