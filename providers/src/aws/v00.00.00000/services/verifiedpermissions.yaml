                principal:
                  $ref: "#/components/schemas/EntityIdentifier"
                  description: Specifies the principal for which the authorization decision is to be made.
                action:
                  $ref: "#/components/schemas/ActionIdentifier"
                  description: Specifies the requested action to be authorized. For example, is the principal authorized to perform this action on the resource?
                resource:
                  $ref: "#/components/schemas/EntityIdentifier"
                  description: Specifies the resource for which the authorization decision is to be made.
                context:
                  $ref: "#/components/schemas/ContextDefinition"
                  description: Specifies additional context that can be used to make more granular authorization decisions.
                entities:
                  $ref: "#/components/schemas/EntitiesDefinition"
                  description: (Optional) Specifies the list of resources and principals and their associated attributes that Verified Permissions can examine when evaluating the policies. These additional entities and their attributes can be referenced and checked by conditional elements in the policies in the specified policy store. You can include only principal and resource entities in this parameter; you can't include actions. You must specify actions in the schema.
