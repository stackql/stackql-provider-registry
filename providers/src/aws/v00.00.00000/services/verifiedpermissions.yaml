          description: The customer-managed KMS key Amazon Resource Name (ARN), alias or ID to be used for encryption processes. Users can provide the full KMS key ARN, a KMS key alias, or a KMS key ID, but it will be mapped to the full KMS key ARN after policy store creation, and referenced when encrypting child resources.
        encryptionContext:
          type: object
          properties: {}
          description: User-defined, additional context to be added to encryption processes.
      required:
