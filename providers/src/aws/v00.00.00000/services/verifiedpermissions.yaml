openapi: 3.0.0
info:
  version: "2021-12-01"
  title: Amazon Verified Permissions
  description: Amazon Verified Permissions
  x-serviceName: verifiedpermissions
  x-serviceAlias: verifiedpermissions
  x-protocol: json
  x-apiVersion: "2021-12-01"
  x-endpointPrefix: verifiedpermissions
  x-targetPrefix: VerifiedPermissions
  x-jsonVersion: "1.0"
servers:
  - url: https://verifiedpermissions.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for verifiedpermissions
paths:
  /BatchGetPolicy:
    post:
      operationId: BatchGetPolicy
      description: Retrieves information about a group (batch) of policies. The BatchGetPolicy operation doesn't have its own IAM permission. To authorize this operation for Amazon Web Services principals, include the permission verifiedpermissions:GetPolicy in their IAM policies.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - VerifiedPermissions.BatchGetPolicy
            default: VerifiedPermissions.BatchGetPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                requests:
                  $ref: "#/components/schemas/BatchGetPolicyInputList"
                  description: An array of up to 100 policies you want information about.
              required:
                - requests
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetPolicyOutput"
  /BatchIsAuthorized:
    post:
      operationId: BatchIsAuthorized
      description: "Makes a series of decisions about multiple authorization requests for one principal or resource. Each request contains the equivalent content of an IsAuthorized request: principal, action, resource, and context. Either the principal or the resource parameter must be identical across all requests. For example, Verified Permissions won't evaluate a pair of requests where bob views photo1 and alice views photo2. Authorization of bob to view photo1 and photo2, or bob and alice to view photo1, are valid batches. The request is evaluated against all policies in the specified policy store that match the entities that you declare. The result of the decisions is a series of Allow or Deny responses, along with the IDs of the policies that produced each decision. The entities of a BatchIsAuthorized API request can contain up to 100 principals and up to 100 resources. The requests of a BatchIsAuthorized API request can contain up to 30 requests. The BatchIsAuthorized operation doesn't have its own IAM permission. To authorize this operation for Amazon Web Services principals, include the permission verifiedpermissions:IsAuthorized in their IAM policies."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - VerifiedPermissions.BatchIsAuthorized
            default: VerifiedPermissions.BatchIsAuthorized
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                policyStoreId:
                  $ref: "#/components/schemas/PolicyStoreId"
                  description: "Specifies the ID of the policy store. Policies in this policy store will be used to make the authorization decisions for the input. To specify a policy store, use its ID or alias name. When using an alias name, prefix it with policy-store-alias/. For example: ID: PSEXAMPLEabcdefg111111 Alias name: policy-store-alias/example-policy-store To view aliases, use ListPolicyStoreAliases."
                entities:
                  $ref: "#/components/schemas/EntitiesDefinition"
                  description: (Optional) Specifies the list of resources and principals and their associated attributes that Verified Permissions can examine when evaluating the policies. These additional entities and their attributes can be referenced and checked by conditional elements in the policies in the specified policy store. You can include only principal and resource entities in this parameter; you can't include actions. You must specify actions in the schema.
                requests:
                  $ref: "#/components/schemas/BatchIsAuthorizedInputList"
                  description: An array of up to 30 requests that you want Verified Permissions to evaluate.
              required:
                - policyStoreId
                - requests
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchIsAuthorizedOutput"
  /BatchIsAuthorizedWithToken:
    post:
      operationId: BatchIsAuthorizedWithToken
      description: Makes a series of decisions about multiple authorization requests for one token. The principal in this request comes from an external identity source in the form of an identity or access token, formatted as a JSON web token (JWT). The information in the parameters can also define additional context that Verified Permissions can include in the evaluations. The request is evaluated against all policies in the specified policy store that match the entities that you provide in the entities declaration and in the token. The result of the decisions is a series of Allow or Deny responses, along with the IDs of the policies that produced each decision. The entities of a BatchIsAuthorizedWithToken API request can contain up to 100 resources and up to 99 user groups. The requests of a BatchIsAuthorizedWithToken API request can contain up to 30 requests. The BatchIsAuthorizedWithToken operation doesn't have its own IAM permission. To authorize this operation for Amazon Web Services principals, include the permission verifiedpermissions:IsAuthorizedWithToken in their IAM policies.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - VerifiedPermissions.BatchIsAuthorizedWithToken
            default: VerifiedPermissions.BatchIsAuthorizedWithToken
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                policyStoreId:
                  $ref: "#/components/schemas/PolicyStoreId"
                  description: "Specifies the ID of the policy store. Policies in this policy store will be used to make an authorization decision for the input. To specify a policy store, use its ID or alias name. When using an alias name, prefix it with policy-store-alias/. For example: ID: PSEXAMPLEabcdefg111111 Alias name: policy-store-alias/example-policy-store To view aliases, use ListPolicyStoreAliases."
                identityToken:
                  $ref: "#/components/schemas/Token"
                  description: Specifies an identity (ID) token for the principal that you want to authorize in each request. This token is provided to you by the identity provider (IdP) associated with the specified identity source. You must specify either an accessToken, an identityToken, or both. Must be an ID token. Verified Permissions returns an error if the token_use claim in the submitted token isn't id.
                accessToken:
                  $ref: "#/components/schemas/Token"
                  description: Specifies an access token for the principal that you want to authorize in each request. This token is provided to you by the identity provider (IdP) associated with the specified identity source. You must specify either an accessToken, an identityToken, or both. Must be an access token. Verified Permissions returns an error if the token_use claim in the submitted token isn't access.
                entities:
                  $ref: "#/components/schemas/EntitiesDefinition"
                  description: (Optional) Specifies the list of resources and their associated attributes that Verified Permissions can examine when evaluating the policies. These additional entities and their attributes can be referenced and checked by conditional elements in the policies in the specified policy store. You can't include principals in this parameter, only resource and action entities. This parameter can't include any entities of a type that matches the user or group entity types that you defined in your identity source. The BatchIsAuthorizedWithToken operation takes principal attributes from only the identityToken or accessToken passed to the operation. For action entities, you can include only their Identifier and EntityType.
                requests:
                  $ref: "#/components/schemas/BatchIsAuthorizedWithTokenInputList"
                  description: An array of up to 30 requests that you want Verified Permissions to evaluate.
              required:
                - policyStoreId
                - requests
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchIsAuthorizedWithTokenOutput"
  /CreateIdentitySource:
    post:
      operationId: CreateIdentitySource
      description: "Adds an identity source to a policy store–an Amazon Cognito user pool or OpenID Connect (OIDC) identity provider (IdP). After you create an identity source, you can use the identities provided by the IdP as proxies for the principal in authorization queries that use the IsAuthorizedWithToken or BatchIsAuthorizedWithToken API operations. These identities take the form of tokens that contain claims about the user, such as IDs, attributes and group memberships. Identity sources provide identity (ID) tokens and access tokens. Verified Permissions derives information about your user and session from token claims. Access tokens provide action context to your policies, and ID tokens provide principal Attributes. Tokens from an identity source user continue to be usable until they expire. Token revocation and resource deletion have no effect on the validity of a token in your policy store To reference a user from this identity source in your Cedar policies, refer to the following syntax examples. Amazon Cognito user pool: Namespace::[Entity type]::[User pool ID]|[user principal attribute], for example MyCorp::User::us-east-1_EXAMPLE|a1b2c3d4-5678-90ab-cdef-EXAMPLE11111. OpenID Connect (OIDC) provider: Namespace::[Entity type]::[entityIdPrefix]|[user principal attribute], for example MyCorp::User::MyOIDCProvider|a1b2c3d4-5678-90ab-cdef-EXAMPLE22222. Verified Permissions is eventually consistent . It can take a few seconds for a new or changed element to propagate through the service and be visible in the results of other Verified Permissions operations."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - VerifiedPermissions.CreateIdentitySource
            default: VerifiedPermissions.CreateIdentitySource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: Specifies a unique, case-sensitive ID that you provide to ensure the idempotency of the request. This lets you safely retry the request without accidentally performing the same operation a second time. Passing the same value to a later call to an operation requires that you also pass the same value for all other parameters. We recommend that you use a UUID type of value.. If you don't provide this value, then Amazon Web Services generates a random one for you. If you retry the operation with the same ClientToken, but with different parameters, the retry fails with an ConflictException error. Verified Permissions recognizes a ClientToken for eight hours. After eight hours, the next request with the same parameters performs the operation again regardless of the value of ClientToken.
                policyStoreId:
                  $ref: "#/components/schemas/PolicyStoreId"
                  description: "Specifies the ID of the policy store in which you want to store this identity source. Only policies and requests made using this policy store can reference identities from the identity provider configured in the new identity source. To specify a policy store, use its ID or alias name. When using an alias name, prefix it with policy-store-alias/. For example: ID: PSEXAMPLEabcdefg111111 Alias name: policy-store-alias/example-policy-store To view aliases, use ListPolicyStoreAliases."
                configuration:
                  $ref: "#/components/schemas/Configuration"
                  description: Specifies the details required to communicate with the identity provider (IdP) associated with this identity source.
                principalEntityType:
                  $ref: "#/components/schemas/PrincipalEntityType"
                  description: Specifies the namespace and data type of the principals generated for identities authenticated by the new identity source.
              required:
                - policyStoreId
                - configuration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIdentitySourceOutput"
  /CreatePolicy:
    post:
      operationId: CreatePolicy
      description: Creates a Cedar policy and saves it in the specified policy store. You can create either a static policy or a policy linked to a policy template. To create a static policy, provide the Cedar policy text in the StaticPolicy section of the PolicyDefinition. To create a policy that is dynamically linked to a policy template, specify the policy template ID and the principal and resource to associate with this policy in the templateLinked section of the PolicyDefinition. If the policy template is ever updated, any policies linked to the policy template automatically use the updated template. Creating a policy causes it to be validated against the schema in the policy store. If the policy doesn't pass validation, the operation fails and the policy isn't stored. Verified Permissions is eventually consistent . It can take a few seconds for a new or changed element to propagate through the service and be visible in the results of other Verified Permissions operations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - VerifiedPermissions.CreatePolicy
            default: VerifiedPermissions.CreatePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: Specifies a unique, case-sensitive ID that you provide to ensure the idempotency of the request. This lets you safely retry the request without accidentally performing the same operation a second time. Passing the same value to a later call to an operation requires that you also pass the same value for all other parameters. We recommend that you use a UUID type of value.. If you don't provide this value, then Amazon Web Services generates a random one for you. If you retry the operation with the same ClientToken, but with different parameters, the retry fails with an ConflictException error. Verified Permissions recognizes a ClientToken for eight hours. After eight hours, the next request with the same parameters performs the operation again regardless of the value of ClientToken.
                policyStoreId:
                  $ref: "#/components/schemas/PolicyStoreId"
                  description: "Specifies the PolicyStoreId of the policy store you want to store the policy in. To specify a policy store, use its ID or alias name. When using an alias name, prefix it with policy-store-alias/. For example: ID: PSEXAMPLEabcdefg111111 Alias name: policy-store-alias/example-policy-store To view aliases, use ListPolicyStoreAliases."
                definition:
                  $ref: "#/components/schemas/PolicyDefinition"
                  description: A structure that specifies the policy type and content to use for the new policy. You must include either a static or a templateLinked element. The policy content must be written in the Cedar policy language.
                name:
                  $ref: "#/components/schemas/PolicyName"
                  description: Specifies a name for the policy that is unique among all policies within the policy store. You can use the name in place of the policy ID in API operations that reference the policy. The name must be prefixed with name/. If you specify a name that is already associated with another policy in the policy store, you receive a ConflictException error.
              required:
                - policyStoreId
                - definition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePolicyOutput"
  /CreatePolicyStore:
    post:
      operationId: CreatePolicyStore
      description: Creates a policy store. A policy store is a container for policy resources. Although Cedar supports multiple namespaces, Verified Permissions currently supports only one namespace per policy store. Verified Permissions is eventually consistent . It can take a few seconds for a new or changed element to propagate through the service and be visible in the results of other Verified Permissions operations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - VerifiedPermissions.CreatePolicyStore
            default: VerifiedPermissions.CreatePolicyStore
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: Specifies a unique, case-sensitive ID that you provide to ensure the idempotency of the request. This lets you safely retry the request without accidentally performing the same operation a second time. Passing the same value to a later call to an operation requires that you also pass the same value for all other parameters. We recommend that you use a UUID type of value.. If you don't provide this value, then Amazon Web Services generates a random one for you. If you retry the operation with the same ClientToken, but with different parameters, the retry fails with an ConflictException error. Verified Permissions recognizes a ClientToken for eight hours. After eight hours, the next request with the same parameters performs the operation again regardless of the value of ClientToken.
                validationSettings:
                  $ref: "#/components/schemas/ValidationSettings"
                  description: Specifies the validation setting for this policy store. Currently, the only valid and required value is Mode. We recommend that you turn on STRICT mode only after you define a schema. If a schema doesn't exist, then STRICT mode causes any policy to fail validation, and Verified Permissions rejects the policy. You can turn off validation by using the UpdatePolicyStore. Then, when you have a schema defined, use UpdatePolicyStore again to turn validation back on.
                description:
                  $ref: "#/components/schemas/PolicyStoreDescription"
                  description: Descriptive text that you can provide to help with identification of the current policy store.
                deletionProtection:
                  $ref: "#/components/schemas/DeletionProtection"
                  description: Specifies whether the policy store can be deleted. If enabled, the policy store can't be deleted. The default state is DISABLED.
                encryptionSettings:
                  $ref: "#/components/schemas/EncryptionSettings"
                  description: Specifies the encryption settings used to encrypt the policy store and their child resources. Allows for the ability to use a customer owned KMS key for encryption of data. This is an optional field to be used when providing a customer-managed KMS key for encryption.
                tags:
                  $ref: "#/components/schemas/TagMap"
                  description: The list of key-value pairs to associate with the policy store.
              required:
                - validationSettings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePolicyStoreOutput"
  /CreatePolicyStoreAlias:
    post:
      operationId: CreatePolicyStoreAlias
      description: Creates a policy store alias for the specified policy store. A policy store alias is an alternative identifier that you can use to reference a policy store in API operations. This operation is idempotent. If multiple CreatePolicyStoreAlias requests are made where the aliasName and policyStoreId fields are the same between the requests, subsequent requests will be ignored. For each duplicate CreatePolicyStoreAlias request, a Success response will be returned and a new policy store alias will not be created. Verified Permissions is eventually consistent . It can take a few seconds for a new or changed element to propagate through the service and be visible in the results of other Verified Permissions operations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - VerifiedPermissions.CreatePolicyStoreAlias
            default: VerifiedPermissions.CreatePolicyStoreAlias
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                aliasName:
                  $ref: "#/components/schemas/Alias"
                  description: Specifies the name of the policy store alias to create. The name must be unique within your Amazon Web Services account and Amazon Web Services Region. The alias name must always be prefixed with policy-store-alias/.
                policyStoreId:
                  $ref: "#/components/schemas/PolicyStoreId"
                  description: Specifies the ID of the policy store to associate with the alias. The associated policy store must be specified using its ID. The alias name cannot be used.
              required:
                - aliasName
                - policyStoreId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePolicyStoreAliasOutput"
  /CreatePolicyTemplate:
    post:
      operationId: CreatePolicyTemplate
      description: Creates a policy template. A template can use placeholders for the principal and resource. A template must be instantiated into a policy by associating it with specific principals and resources to use for the placeholders. That instantiated policy can then be considered in authorization decisions. The instantiated policy works identically to any other policy, except that it is dynamically linked to the template. If the template changes, then any policies that are linked to that template are immediately updated as well. Verified Permissions is eventually consistent . It can take a few seconds for a new or changed element to propagate through the service and be visible in the results of other Verified Permissions operations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - VerifiedPermissions.CreatePolicyTemplate
            default: VerifiedPermissions.CreatePolicyTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: Specifies a unique, case-sensitive ID that you provide to ensure the idempotency of the request. This lets you safely retry the request without accidentally performing the same operation a second time. Passing the same value to a later call to an operation requires that you also pass the same value for all other parameters. We recommend that you use a UUID type of value.. If you don't provide this value, then Amazon Web Services generates a random one for you. If you retry the operation with the same ClientToken, but with different parameters, the retry fails with an ConflictException error. Verified Permissions recognizes a ClientToken for eight hours. After eight hours, the next request with the same parameters performs the operation again regardless of the value of ClientToken.
                policyStoreId:
                  $ref: "#/components/schemas/PolicyStoreId"
                  description: "The ID of the policy store in which to create the policy template. To specify a policy store, use its ID or alias name. When using an alias name, prefix it with policy-store-alias/. For example: ID: PSEXAMPLEabcdefg111111 Alias name: policy-store-alias/example-policy-store To view aliases, use ListPolicyStoreAliases."
                description:
                  $ref: "#/components/schemas/PolicyTemplateDescription"
                  description: Specifies a description for the policy template.
                statement:
                  $ref: "#/components/schemas/PolicyStatement"
                  description: Specifies the content that you want to use for the new policy template, written in the Cedar policy language.
                name:
                  $ref: "#/components/schemas/PolicyTemplateName"
                  description: Specifies a name for the policy template that is unique among all policy templates within the policy store. You can use the name in place of the policy template ID in API operations that reference the policy template. The name must be prefixed with name/. If you specify a name that is already associated with another policy template in the policy store, you receive a ConflictException error.
              required:
                - policyStoreId
                - statement
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePolicyTemplateOutput"
  /DeleteIdentitySource:
    post:
      operationId: DeleteIdentitySource
      description: Deletes an identity source that references an identity provider (IdP) such as Amazon Cognito. After you delete the identity source, you can no longer use tokens for identities from that identity source to represent principals in authorization queries made using IsAuthorizedWithToken. operations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - VerifiedPermissions.DeleteIdentitySource
            default: VerifiedPermissions.DeleteIdentitySource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                policyStoreId:
                  $ref: "#/components/schemas/PolicyStoreId"
                  description: "Specifies the ID of the policy store that contains the identity source that you want to delete. To specify a policy store, use its ID or alias name. When using an alias name, prefix it with policy-store-alias/. For example: ID: PSEXAMPLEabcdefg111111 Alias name: policy-store-alias/example-policy-store To view aliases, use ListPolicyStoreAliases."
                identitySourceId:
                  $ref: "#/components/schemas/IdentitySourceId"
                  description: Specifies the ID of the identity source that you want to delete.
              required:
                - policyStoreId
                - identitySourceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIdentitySourceOutput"
  /DeletePolicy:
    post:
      operationId: DeletePolicy
      description: Deletes the specified policy from the policy store. This operation is idempotent; if you specify a policy that doesn't exist, the request response returns a successful HTTP 200 status code.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - VerifiedPermissions.DeletePolicy
            default: VerifiedPermissions.DeletePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                policyStoreId:
                  $ref: "#/components/schemas/PolicyStoreId"
                  description: "Specifies the ID of the policy store that contains the policy that you want to delete. To specify a policy store, use its ID or alias name. When using an alias name, prefix it with policy-store-alias/. For example: ID: PSEXAMPLEabcdefg111111 Alias name: policy-store-alias/example-policy-store To view aliases, use ListPolicyStoreAliases."
                policyId:
                  $ref: "#/components/schemas/PolicyId"
                  description: "Specifies the ID of the policy that you want to delete. You can use the policy name in place of the policy ID. When using a name, prefix it with name/. For example: ID: SPEXAMPLEabcdefg111111 Name: name/example-policy"
              required:
                - policyStoreId
                - policyId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePolicyOutput"
  /DeletePolicyStore:
    post:
      operationId: DeletePolicyStore
      description: Deletes the specified policy store. This operation is idempotent. If you specify a policy store that does not exist, the request response will still return a successful HTTP 200 status code.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - VerifiedPermissions.DeletePolicyStore
            default: VerifiedPermissions.DeletePolicyStore
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                policyStoreId:
                  $ref: "#/components/schemas/PolicyStoreId"
                  description: Specifies the ID of the policy store that you want to delete. To specify a policy store, the alias name cannot be used. Only the ID can be used.
              required:
                - policyStoreId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePolicyStoreOutput"
  /DeletePolicyStoreAlias:
    post:
      operationId: DeletePolicyStoreAlias
      description: Deletes the specified policy store alias. This operation is idempotent. If you specify a policy store alias that does not exist, the request response will still return a successful HTTP 200 status code. When a policy store alias is deleted, it enters the PendingDeletion state. When a policy store alias is in the PendingDeletion state, new policy store aliases cannot be created with the same name. If the policy store alias is used in an API that has a policyStoreId field, the operation will fail with a ResourceNotFound exception.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - VerifiedPermissions.DeletePolicyStoreAlias
            default: VerifiedPermissions.DeletePolicyStoreAlias
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                aliasName:
                  $ref: "#/components/schemas/Alias"
                  description: Specifies the name of the policy store alias that you want to delete. The alias name must always be prefixed with policy-store-alias/.
              required:
                - aliasName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePolicyStoreAliasOutput"
  /DeletePolicyTemplate:
    post:
      operationId: DeletePolicyTemplate
      description: Deletes the specified policy template from the policy store. This operation also deletes any policies that were created from the specified policy template. Those policies are immediately removed from all future API responses, and are asynchronously deleted from the policy store.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - VerifiedPermissions.DeletePolicyTemplate
            default: VerifiedPermissions.DeletePolicyTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                policyStoreId:
                  $ref: "#/components/schemas/PolicyStoreId"
                  description: "Specifies the ID of the policy store that contains the policy template that you want to delete. To specify a policy store, use its ID or alias name. When using an alias name, prefix it with policy-store-alias/. For example: ID: PSEXAMPLEabcdefg111111 Alias name: policy-store-alias/example-policy-store To view aliases, use ListPolicyStoreAliases."
                policyTemplateId:
