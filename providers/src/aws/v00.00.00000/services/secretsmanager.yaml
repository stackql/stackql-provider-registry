          $ref: "#/components/schemas/RoleARNType"
          description: The role that Secrets Manager assumes to call APIs required to perform the rotation. For more information about the required information, see Managed external secrets partners.
        LastRotatedDate:
          $ref: "#/components/schemas/LastRotatedDateType"
          description: The most recent date and time that the Secrets Manager rotation process was successfully completed. This value is null if the secret hasn't ever rotated.
        LastChangedDate:
          $ref: "#/components/schemas/LastChangedDateType"
          description: The last date and time that this secret was modified in any way.
        LastAccessedDate:
          $ref: "#/components/schemas/LastAccessedDateType"
          description: The date that the secret was last accessed in the Region. This field is omitted if the secret has never been retrieved in the Region.
        DeletedDate:
          $ref: "#/components/schemas/DeletedDateType"
          description: The date and time the deletion of the secret occurred. Not present on active secrets. The secret can be recovered until the number of days in the recovery window has passed, as specified in the RecoveryWindowInDays parameter of the DeleteSecret operation.
        NextRotationDate:
          $ref: "#/components/schemas/NextRotationDateType"
          description: The next rotation is scheduled to occur on or before this date. If the secret isn't configured for rotation or rotation has been disabled, Secrets Manager returns null.
        Tags:
          $ref: "#/components/schemas/TagListType"
          description: The list of user-defined tags associated with the secret. To add tags to a secret, use TagResource . To remove tags, use UntagResource .
        SecretVersionsToStages:
          type: object
          properties: {}
          description: A list of all of the currently assigned SecretVersionStage staging labels and the SecretVersionId attached to each one. Staging labels are used to keep track of the different versions during the rotation process. A version that does not have any SecretVersionStage is considered deprecated and subject to deletion. Such versions are not included in this list.
