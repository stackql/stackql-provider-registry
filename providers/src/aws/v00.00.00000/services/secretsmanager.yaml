          description: The exact string that identifies the third-party partner that holds the external secret. For more information, see Managed external secret partners.
        Description:
          $ref: "#/components/schemas/DescriptionType"
          description: The user-provided description of the secret.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyIdType"
          description: The ARN of the KMS key that Secrets Manager uses to encrypt the secret value. If the secret is encrypted with the Amazon Web Services managed key aws/secretsmanager, this field is omitted.
        RotationEnabled:
          $ref: "#/components/schemas/RotationEnabledType"
          description: Indicates whether automatic, scheduled rotation is enabled for this secret.
        RotationLambdaARN:
          $ref: "#/components/schemas/RotationLambdaARNType"
          description: The ARN of an Amazon Web Services Lambda function invoked by Secrets Manager to rotate and expire the secret either automatically per the schedule or manually by a call to RotateSecret .
        RotationRules:
          $ref: "#/components/schemas/RotationRulesType"
          description: A structure that defines the rotation configuration for the secret.
