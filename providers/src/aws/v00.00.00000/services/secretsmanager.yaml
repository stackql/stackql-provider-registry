                  description: If you include SecretString or SecretBinary, then Secrets Manager creates a new version for the secret, and this parameter specifies the unique identifier for the new version. If you use the Amazon Web Services CLI or one of the Amazon Web Services SDKs to call this operation, then you can leave this parameter empty. The CLI or SDK generates a random UUID for you and includes it as the value for this parameter in the request. If you generate a raw HTTP request to the Secrets Manager service endpoint, then you must generate a ClientRequestToken and include it in the request. This value helps ensure idempotency. Secrets Manager uses this value to prevent the accidental creation of duplicate versions if there are failures and retries during a rotation. We recommend that you generate a UUID-type value to ensure uniqueness of your versions within the specified secret.
                Description:
                  $ref: "#/components/schemas/DescriptionType"
                  description: The description of the secret.
                KmsKeyId:
                  $ref: "#/components/schemas/KmsKeyIdType"
                  description: "The ARN, key ID, or alias of the KMS key that Secrets Manager uses to encrypt new secret versions as well as any existing versions with the staging labels AWSCURRENT, AWSPENDING, or AWSPREVIOUS. If you don't have kms:Encrypt permission to the new key, Secrets Manager does not re-encrypt existing secret versions with the new key. For more information about versions and staging labels, see Concepts: Version. A key alias is always prefixed by alias/, for example alias/aws/secretsmanager. For more information, see About aliases. If you set this to an empty string, Secrets Manager uses the Amazon Web Services managed key aws/secretsmanager. If this key doesn't already exist in your account, then Secrets Manager creates it for you automatically. All users and roles in the Amazon Web Services account automatically have access to use aws/secretsmanager. Creating aws/secretsmanager can result in a one-time significant delay in returning the result. You can only use the Amazon Web Services managed key aws/secretsmanager if you call this operation using credentials from the same Amazon Web Services account that owns the secret. If the secret is in a different account, then you must use a customer managed key and provide the ARN of that KMS key in this field. The user making the call must have permissions to both the secret and the KMS key in their respective accounts."
                SecretBinary:
                  $ref: "#/components/schemas/SecretBinaryType"
                  description: "The binary data to encrypt and store in the new version of the secret. We recommend that you store your binary data in a file and then pass the contents of the file as a parameter. Either SecretBinary or SecretString must have a value, but not both. You can't access this parameter in the Secrets Manager console. Sensitive: This field contains sensitive information, so the service does not include it in CloudTrail log entries. If you create your own log entries, you must also avoid logging the information in this field."
                SecretString:
                  $ref: "#/components/schemas/SecretStringType"
                  description: "The text data to encrypt and store in the new version of the secret. We recommend you use a JSON structure of key/value pairs for your secret value. Either SecretBinary or SecretString must have a value, but not both. Sensitive: This field contains sensitive information, so the service does not include it in CloudTrail log entries. If you create your own log entries, you must also avoid logging the information in this field."
                Type:
                  $ref: "#/components/schemas/MedeaTypeType"
                  description: The exact string that identifies the third-party partner that holds the external secret. For more information, see Managed external secret partners.
              required:
                - SecretId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSecretResponse"
  /UpdateSecretVersionStage:
    post:
      operationId: UpdateSecretVersionStage
      description: "Modifies the staging labels attached to a version of a secret. Secrets Manager uses staging labels to track a version as it progresses through the secret rotation process. Each staging label can be attached to only one version at a time. To add a staging label to a version when it is already attached to another version, Secrets Manager first removes it from the other version first and then attaches it to this one. For more information about versions and staging labels, see Concepts: Version. The staging labels that you specify in the VersionStage parameter are added to the existing list of staging labels for the version. You can move the AWSCURRENT staging label to this version by including it in this call. Whenever you move AWSCURRENT, Secrets Manager automatically moves the label AWSPREVIOUS to the version that AWSCURRENT was removed from. If this action results in the last label being removed from a version, then the version is considered to be 'deprecated' and can be deleted by Secrets Manager. Secrets Manager generates a CloudTrail log entry when you call this action. Do not include sensitive information in request parameters because it might be logged. For more information, see Logging Secrets Manager events with CloudTrail. Required permissions: secretsmanager:UpdateSecretVersionStage. For more information, see IAM policy actions for Secrets Manager and Authentication and access control in Secrets Manager."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - secretsmanager.UpdateSecretVersionStage
            default: secretsmanager.UpdateSecretVersionStage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SecretId:
                  $ref: "#/components/schemas/SecretIdType"
                  description: The ARN or the name of the secret with the version and staging labelsto modify. For an ARN, we recommend that you specify a complete ARN rather than a partial ARN. See Finding a secret from a partial ARN.
                VersionStage:
                  $ref: "#/components/schemas/SecretVersionStageType"
                  description: The staging label to add to this version.
                RemoveFromVersionId:
                  $ref: "#/components/schemas/SecretVersionIdType"
                  description: The ID of the version that the staging label is to be removed from. If the staging label you are trying to attach to one version is already attached to a different version, then you must include this parameter and specify the version that the label is to be removed from. If the label is attached and you either do not specify this parameter, or the version ID does not match, then the operation fails.
                MoveToVersionId:
                  $ref: "#/components/schemas/SecretVersionIdType"
                  description: The ID of the version to add the staging label to. To remove a label from a version, then do not specify this parameter. If the staging label is already attached to a different version of the secret, then you must also specify the RemoveFromVersionId parameter.
              required:
                - SecretId
                - VersionStage
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSecretVersionStageResponse"
  /ValidateResourcePolicy:
    post:
      operationId: ValidateResourcePolicy
      description: "Validates that a resource policy does not grant a wide range of principals access to your secret. A resource-based policy is optional for secrets. The API performs three checks when validating the policy: Sends a call to Zelkova, an automated reasoning engine, to ensure your resource policy does not allow broad access to your secret, for example policies that use a wildcard for the principal. Checks for correct syntax in a policy. Verifies the policy does not lock out a caller. Secrets Manager generates a CloudTrail log entry when you call this action. Do not include sensitive information in request parameters because it might be logged. For more information, see Logging Secrets Manager events with CloudTrail. Required permissions: secretsmanager:ValidateResourcePolicy and secretsmanager:PutResourcePolicy. For more information, see IAM policy actions for Secrets Manager and Authentication and access control in Secrets Manager."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - secretsmanager.ValidateResourcePolicy
            default: secretsmanager.ValidateResourcePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SecretId:
                  $ref: "#/components/schemas/SecretIdType"
                  description: The ARN or name of the secret with the resource-based policy you want to validate.
                ResourcePolicy:
                  $ref: "#/components/schemas/NonEmptyResourcePolicyType"
                  description: A JSON-formatted string that contains an Amazon Web Services resource-based policy. The policy in the string identifies who can access or manage this secret and its versions. For example policies, see Permissions policy examples.
              required:
                - ResourcePolicy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateResourcePolicyResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    SecretIdListType:
      type: array
      items:
        $ref: "#/components/schemas/SecretIdType"
    SecretIdType:
      type: string
      minLength: 1
      maxLength: 2048
    FiltersListType:
      type: array
      items:
        $ref: "#/components/schemas/Filter"
    Filter:
      description: Allows you to add filters when you use the search function in Secrets Manager. For more information, see Find secrets in Secrets Manager.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/FilterNameStringType"
          description: "The following are keys you can use: description: Prefix match, not case-sensitive. name: Prefix match, case-sensitive. tag-key: Prefix match, case-sensitive. tag-value: Prefix match, case-sensitive. primary-region: Prefix match, case-sensitive. owning-service: Prefix match, case-sensitive. all: Breaks the filter value string into words and then searches all attributes for matches. Not case-sensitive."
        Values:
          $ref: "#/components/schemas/FilterValuesStringList"
          description: The keyword to filter for. You can prefix your search value with an exclamation mark (!) in order to perform negation filters.
    FilterNameStringType:
      type: string
      enum:
        - description
        - name
        - tag-key
        - tag-value
        - primary-region
        - owning-service
        - all
    FilterValuesStringList:
      type: array
      items:
        $ref: "#/components/schemas/FilterValueStringType"
    FilterValueStringType:
      type: string
      maxLength: 512
      pattern: ^\!?[a-zA-Z0-9 :_@\/\+\=\.\-\!]*$
    MaxResultsBatchType:
      type: integer
      minimum: 1
      maximum: 20
    NextTokenType:
      type: string
      minLength: 1
      maxLength: 4096
    BatchGetSecretValueResponse:
      type: object
      properties:
        SecretValues:
          $ref: "#/components/schemas/SecretValuesType"
          description: A list of secret values.
        NextToken:
          $ref: "#/components/schemas/NextTokenType"
          description: Secrets Manager includes this value if there's more output available than what is included in the current response. This can occur even when the response includes no values at all, such as when you ask for a filtered view of a long list. To get the next results, call BatchGetSecretValue again with this value.
        Errors:
          $ref: "#/components/schemas/APIErrorListType"
          description: A list of errors Secrets Manager encountered while attempting to retrieve individual secrets.
    SecretValuesType:
      type: array
      items:
        $ref: "#/components/schemas/SecretValueEntry"
    SecretValueEntry:
      description: A structure that contains the secret value and other details for a secret.
      type: object
      properties:
        ARN:
          $ref: "#/components/schemas/SecretARNType"
          description: The Amazon Resource Name (ARN) of the secret.
        Name:
          $ref: "#/components/schemas/SecretNameType"
          description: The friendly name of the secret.
        VersionId:
          $ref: "#/components/schemas/SecretVersionIdType"
          description: The unique version identifier of this version of the secret.
        SecretBinary:
          $ref: "#/components/schemas/SecretBinaryType"
          description: The decrypted secret value, if the secret value was originally provided as binary data in the form of a byte array. The parameter represents the binary data as a base64-encoded string.
        SecretString:
          $ref: "#/components/schemas/SecretStringType"
          description: The decrypted secret value, if the secret value was originally provided as a string or through the Secrets Manager console.
        VersionStages:
          $ref: "#/components/schemas/SecretVersionStagesType"
          description: A list of all of the staging labels currently attached to this version of the secret.
        CreatedDate:
          $ref: "#/components/schemas/CreatedDateType"
          description: The date the secret was created.
    SecretARNType:
      type: string
      minLength: 20
      maxLength: 2048
    SecretNameType:
      type: string
      minLength: 1
      maxLength: 256
    SecretVersionIdType:
      type: string
      minLength: 32
      maxLength: 64
    SecretBinaryType:
      type: string
      format: byte
      minLength: 1
      maxLength: 65536
    SecretStringType:
      type: string
      minLength: 1
      maxLength: 65536
    SecretVersionStagesType:
      type: array
      items:
        $ref: "#/components/schemas/SecretVersionStageType"
    SecretVersionStageType:
      type: string
      minLength: 1
      maxLength: 256
    CreatedDateType:
      type: string
      format: date-time
    APIErrorListType:
      type: array
      items:
        $ref: "#/components/schemas/APIErrorType"
    APIErrorType:
      description: The error Secrets Manager encountered while retrieving an individual secret as part of BatchGetSecretValue.
      type: object
      properties:
        SecretId:
          $ref: "#/components/schemas/SecretIdType"
          description: The ARN or name of the secret.
        ErrorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error Secrets Manager encountered while retrieving an individual secret as part of BatchGetSecretValue, for example ResourceNotFoundException,InvalidParameterException, InvalidRequestException, DecryptionFailure, or AccessDeniedException.
        Message:
          $ref: "#/components/schemas/ErrorMessage"
          description: A message describing the error.
    ErrorCode:
      type: string
    ErrorMessage:
      type: string
    CancelRotateSecretResponse:
      type: object
      properties:
        ARN:
          $ref: "#/components/schemas/SecretARNType"
          description: The ARN of the secret.
        Name:
          $ref: "#/components/schemas/SecretNameType"
          description: The name of the secret.
        VersionId:
          $ref: "#/components/schemas/SecretVersionIdType"
          description: The unique identifier of the version of the secret created during the rotation. This version might not be complete, and should be evaluated for possible deletion. We recommend that you remove the VersionStage value AWSPENDING from this version so that Secrets Manager can delete it. Failing to clean up a cancelled rotation can block you from starting future rotations.
    NameType:
      type: string
      minLength: 1
      maxLength: 512
    ClientRequestTokenType:
      type: string
      minLength: 32
      maxLength: 64
    DescriptionType:
      type: string
      maxLength: 2048
    KmsKeyIdType:
      type: string
      minLength: 0
      maxLength: 2048
    TagListType:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A structure that contains information about a tag.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKeyType"
          description: The key identifier, or name, of the tag.
        Value:
          $ref: "#/components/schemas/TagValueType"
          description: The string value associated with the key of the tag.
    TagKeyType:
      type: string
      minLength: 1
      maxLength: 128
    TagValueType:
      type: string
      minLength: 0
      maxLength: 256
    AddReplicaRegionListType:
      type: array
      items:
        $ref: "#/components/schemas/ReplicaRegionType"
    ReplicaRegionType:
      description: A custom type that specifies a Region and the KmsKeyId for a replica secret.
      type: object
      properties:
        Region:
          $ref: "#/components/schemas/RegionType"
          description: A Region code. For a list of Region codes, see Name and code of Regions.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyIdType"
          description: The ARN, key ID, or alias of the KMS key to encrypt the secret. If you don't include this field, Secrets Manager uses aws/secretsmanager.
    RegionType:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([a-z]+-)+\d+$
    BooleanType:
      type: boolean
    MedeaTypeType:
      type: string
      minLength: 0
      maxLength: 256
    CreateSecretResponse:
      type: object
      properties:
        ARN:
          $ref: "#/components/schemas/SecretARNType"
          description: The ARN of the new secret. The ARN includes the name of the secret followed by six random characters. This ensures that if you create a new secret with the same name as a deleted secret, then users with access to the old secret don't get access to the new secret because the ARNs are different.
        Name:
          $ref: "#/components/schemas/SecretNameType"
          description: The name of the new secret.
        VersionId:
          $ref: "#/components/schemas/SecretVersionIdType"
          description: The unique identifier associated with the version of the new secret.
        ReplicationStatus:
          $ref: "#/components/schemas/ReplicationStatusListType"
          description: "A list of the replicas of this secret and their status: Failed, which indicates that the replica was not created. InProgress, which indicates that Secrets Manager is in the process of creating the replica. InSync, which indicates that the replica was created."
    ReplicationStatusListType:
      type: array
      items:
        $ref: "#/components/schemas/ReplicationStatusType"
    ReplicationStatusType:
      description: A replication object consisting of a RegionReplicationStatus object and includes a Region, KMSKeyId, status, and status message.
      type: object
      properties:
        Region:
          $ref: "#/components/schemas/RegionType"
          description: The Region where replication occurs.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyIdType"
          description: Can be an ARN, Key ID, or Alias.
        Status:
          $ref: "#/components/schemas/StatusType"
          description: The status can be InProgress, Failed, or InSync.
        StatusMessage:
          $ref: "#/components/schemas/StatusMessageType"
          description: Status message such as "Secret with this name already exists in this region".
        LastAccessedDate:
          $ref: "#/components/schemas/LastAccessedDateType"
          description: The date that the secret was last accessed in the Region. This field is omitted if the secret has never been retrieved in the Region.
    StatusType:
      type: string
      enum:
        - InSync
        - Failed
        - InProgress
    StatusMessageType:
      type: string
      minLength: 1
      maxLength: 4096
    LastAccessedDateType:
      type: string
      format: date-time
    DeleteResourcePolicyResponse:
      type: object
      properties:
        ARN:
          $ref: "#/components/schemas/SecretARNType"
          description: The ARN of the secret that the resource-based policy was deleted for.
        Name:
          $ref: "#/components/schemas/NameType"
          description: The name of the secret that the resource-based policy was deleted for.
    RecoveryWindowInDaysType:
      type: integer
      format: int64
    DeleteSecretResponse:
      type: object
      properties:
        ARN:
          $ref: "#/components/schemas/SecretARNType"
          description: The ARN of the secret.
        Name:
          $ref: "#/components/schemas/SecretNameType"
          description: The name of the secret.
        DeletionDate:
          $ref: "#/components/schemas/DeletionDateType"
          description: The date and time after which this secret Secrets Manager can permanently delete this secret, and it can no longer be restored. This value is the date and time of the delete request plus the number of days in RecoveryWindowInDays.
    DeletionDateType:
      type: string
      format: date-time
    DescribeSecretResponse:
      type: object
      properties:
        ARN:
          $ref: "#/components/schemas/SecretARNType"
          description: The ARN of the secret.
        Name:
          $ref: "#/components/schemas/SecretNameType"
          description: The name of the secret.
        Type:
          $ref: "#/components/schemas/MedeaTypeType"
          description: The exact string that identifies the partner that holds the external secret. For more information, see Using Secrets Manager managed external secrets.
        Description:
          $ref: "#/components/schemas/DescriptionType"
          description: The description of the secret.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyIdType"
          description: The key ID or alias ARN of the KMS key that Secrets Manager uses to encrypt the secret value. If the secret is encrypted with the Amazon Web Services managed key aws/secretsmanager, this field is omitted. Secrets created using the console use an KMS key ID.
        RotationEnabled:
          $ref: "#/components/schemas/RotationEnabledType"
          description: Specifies whether automatic rotation is turned on for this secret. If the secret has never been configured for rotation, Secrets Manager returns null. To turn on rotation, use RotateSecret. To turn off rotation, use CancelRotateSecret.
        RotationLambdaARN:
          $ref: "#/components/schemas/RotationLambdaARNType"
          description: The ARN of the Lambda function that Secrets Manager invokes to rotate the secret.
        RotationRules:
          $ref: "#/components/schemas/RotationRulesType"
          description: The rotation schedule and Lambda function for this secret. If the secret previously had rotation turned on, but it is now turned off, this field shows the previous rotation schedule and rotation function. If the secret never had rotation turned on, this field is omitted.
        ExternalSecretRotationMetadata:
          $ref: "#/components/schemas/ExternalSecretRotationMetadataType"
          description: The metadata needed to successfully rotate a managed external secret. A list of key value pairs in JSON format specified by the partner. For more information about the required information, see Managed external secrets partners.
        ExternalSecretRotationRoleArn:
          $ref: "#/components/schemas/RoleARNType"
          description: The Amazon Resource Name (ARN) of the role that allows Secrets Manager to rotate a secret held by a third-party partner. For more information, see Security and permissions.
        LastRotatedDate:
          $ref: "#/components/schemas/LastRotatedDateType"
          description: The last date and time that Secrets Manager rotated the secret. If the secret isn't configured for rotation or rotation has been disabled, Secrets Manager returns null.
        LastChangedDate:
          $ref: "#/components/schemas/LastChangedDateType"
          description: The last date and time that this secret was modified in any way.
        LastAccessedDate:
          $ref: "#/components/schemas/LastAccessedDateType"
          description: The date that the secret was last accessed in the Region. This field is omitted if the secret has never been retrieved in the Region.
        DeletedDate:
          $ref: "#/components/schemas/DeletedDateType"
          description: The date the secret is scheduled for deletion. If it is not scheduled for deletion, this field is omitted. When you delete a secret, Secrets Manager requires a recovery window of at least 7 days before deleting the secret. Some time after the deleted date, Secrets Manager deletes the secret, including all of its versions. If a secret is scheduled for deletion, then its details, including the encrypted secret value, is not accessible. To cancel a scheduled deletion and restore access to the secret, use RestoreSecret.
        NextRotationDate:
          $ref: "#/components/schemas/NextRotationDateType"
          description: The next rotation is scheduled to occur on or before this date. If the secret isn't configured for rotation or rotation has been disabled, Secrets Manager returns null. If rotation fails, Secrets Manager retries the entire rotation process multiple times. If rotation is unsuccessful, this date may be in the past. This date represents the latest date that rotation will occur, but it is not an approximate rotation date. In some cases, for example if you turn off automatic rotation and then turn it back on, the next rotation may occur much sooner than this date.
        Tags:
          $ref: "#/components/schemas/TagListType"
          description: The list of tags attached to the secret. To add tags to a secret, use TagResource. To remove tags, use UntagResource.
        VersionIdsToStages:
          type: object
          properties: {}
          description: "A list of the versions of the secret that have staging labels attached. Versions that don't have staging labels are considered deprecated and Secrets Manager can delete them. Secrets Manager uses staging labels to indicate the status of a secret version during rotation. The three staging labels for rotation are: AWSCURRENT, which indicates the current version of the secret. AWSPENDING, which indicates the version of the secret that contains new secret information that will become the next current version when rotation finishes. During rotation, Secrets Manager creates an AWSPENDING version ID before creating the new secret version. To check if a secret version exists, call GetSecretValue. AWSPREVIOUS, which indicates the previous current version of the secret. You can use this as the last known good version. For more information about rotation and staging labels, see How rotation works."
        OwningService:
          $ref: "#/components/schemas/OwningServiceType"
          description: The ID of the service that created this secret. For more information, see Secrets managed by other Amazon Web Services services.
        CreatedDate:
          $ref: "#/components/schemas/TimestampType"
          description: The date the secret was created.
        PrimaryRegion:
          $ref: "#/components/schemas/RegionType"
          description: The Region the secret is in. If a secret is replicated to other Regions, the replicas are listed in ReplicationStatus.
        ReplicationStatus:
          $ref: "#/components/schemas/ReplicationStatusListType"
          description: "A list of the replicas of this secret and their status: Failed, which indicates that the replica was not created. InProgress, which indicates that Secrets Manager is in the process of creating the replica. InSync, which indicates that the replica was created."
    RotationEnabledType:
      type: boolean
    RotationLambdaARNType:
      type: string
      minLength: 0
      maxLength: 2048
    RotationRulesType:
      description: A structure that defines the rotation configuration for the secret.
      type: object
      properties:
        AutomaticallyAfterDays:
          $ref: "#/components/schemas/AutomaticallyRotateAfterDaysType"
          description: The number of days between rotations of the secret. You can use this value to check that your secret meets your compliance guidelines for how often secrets must be rotated. If you use this field to set the rotation schedule, Secrets Manager calculates the next rotation date based on the previous rotation. Manually updating the secret value by calling PutSecretValue or UpdateSecret is considered a valid rotation. In DescribeSecret and ListSecrets, this value is calculated from the rotation schedule after every successful rotation. In RotateSecret, you can set the rotation schedule in RotationRules with AutomaticallyAfterDays or ScheduleExpression, but not both. To set a rotation schedule in hours, use ScheduleExpression.
        Duration:
          $ref: "#/components/schemas/DurationType"
          description: The length of the rotation window in hours, for example 3h for a three hour window. Secrets Manager rotates your secret at any time during this window. The window must not extend into the next rotation window or the next UTC day. The window starts according to the ScheduleExpression. If you don't specify a Duration, for a ScheduleExpression in hours, the window automatically closes after one hour. For a ScheduleExpression in days, the window automatically closes at the end of the UTC day. For more information, including examples, see Schedule expressions in Secrets Manager rotation in the Secrets Manager Users Guide.
        ScheduleExpression:
          $ref: "#/components/schemas/ScheduleExpressionType"
          description: A cron() or rate() expression that defines the schedule for rotating your secret. Secrets Manager rotation schedules use UTC time zone. Secrets Manager rotates your secret any time during a rotation window. Secrets Manager rate() expressions represent the interval in hours or days that you want to rotate your secret, for example rate(12 hours) or rate(10 days). You can rotate a secret as often as every four hours. If you use a rate() expression, the rotation window starts at midnight. For a rate in hours, the default rotation window closes after one hour. For a rate in days, the default rotation window closes at the end of the day. You can set the Duration to change the rotation window. The rotation window must not extend into the next UTC day or into the next rotation window. You can use a cron() expression to create a rotation schedule that is more detailed than a rotation interval. For more information, including examples, see Schedule expressions in Secrets Manager rotation in the Secrets Manager Users Guide. For a cron expression that represents a schedule in hours, the default rotation window closes after one hour. For a cron expression that represents a schedule in days, the default rotation window closes at the end of the day. You can set the Duration to change the rotation window. The rotation window must not extend into the next UTC day or into the next rotation window.
    AutomaticallyRotateAfterDaysType:
      type: integer
      format: int64
      minimum: 1
      maximum: 1000
    DurationType:
      type: string
      minLength: 2
      maxLength: 3
      pattern: "[0-9]+h"
    ScheduleExpressionType:
      type: string
