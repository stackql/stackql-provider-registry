            schema:
              type: object
              properties:
                SecretId:
                  $ref: "#/components/schemas/SecretIdType"
                  description: The ARN or name of the secret to attach the resource-based policy. For an ARN, we recommend that you specify a complete ARN rather than a partial ARN. See Finding a secret from a partial ARN.
                ResourcePolicy:
                  $ref: "#/components/schemas/NonEmptyResourcePolicyType"
                  description: A JSON-formatted string for an Amazon Web Services resource-based policy. For example policies, see Permissions policy examples.
                BlockPublicPolicy:
                  $ref: "#/components/schemas/BooleanType"
                  description: "Specifies whether to block resource-based policies that allow broad access to the secret, for example those that use a wildcard for the principal. By default, public policies aren't blocked. Resource policy validation and the BlockPublicPolicy parameter help protect your resources by preventing public access from being granted through the resource policies that are directly attached to your secrets. In addition to using these features, carefully inspect the following policies to confirm that they do not grant public access: Identity-based policies attached to associated Amazon Web Services principals (for example, IAM roles) Resource-based policies attached to associated Amazon Web Services resources (for example, Key Management Service (KMS) keys) To review permissions to your secrets, see Determine who has permissions to your secrets."
              required:
