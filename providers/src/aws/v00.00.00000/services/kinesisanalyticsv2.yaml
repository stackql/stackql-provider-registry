        $ref: "#/components/schemas/ReferenceDataSourceDescription"
    ReferenceDataSourceDescription:
      description: For a SQL-based Kinesis Data Analytics application, describes the reference data source configured for an application.
      type: object
      properties:
        ReferenceId:
          $ref: "#/components/schemas/Id"
          description: The ID of the reference data source. This is the ID that Kinesis Data Analytics assigns when you add the reference data source to your application using the CreateApplication or UpdateApplication operation.
        TableName:
          $ref: "#/components/schemas/InAppTableName"
          description: The in-application table name created by the specific reference data source configuration.
        S3ReferenceDataSourceDescription:
          $ref: "#/components/schemas/S3ReferenceDataSourceDescription"
          description: Provides the Amazon S3 bucket name, the object key name that contains the reference data.
        ReferenceSchema:
          $ref: "#/components/schemas/SourceSchema"
          description: Describes the format of the data in the streaming source, and how each data element maps to corresponding columns created in the in-application stream.
      required:
        - ReferenceId
        - TableName
        - S3ReferenceDataSourceDescription
    S3ReferenceDataSourceDescription:
      description: For a SQL-based Kinesis Data Analytics application, provides the bucket name and object key name that stores the reference data.
      type: object
      properties:
        BucketARN:
          $ref: "#/components/schemas/BucketARN"
          description: The Amazon Resource Name (ARN) of the S3 bucket.
        FileKey:
          $ref: "#/components/schemas/FileKey"
          description: Amazon S3 object key name.
        ReferenceRoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The ARN of the IAM role that Kinesis Data Analytics can assume to read the Amazon S3 object on your behalf to populate the in-application reference table. Provided for backward compatibility. Applications that are created with the current API version have an application-level service execution role rather than a resource-level role.
      required:
        - BucketARN
        - FileKey
    VpcConfiguration:
      description: Describes the parameters of a VPC used by the application.
      type: object
      properties:
        SubnetIds:
          $ref: "#/components/schemas/SubnetIds"
          description: The array of Subnet IDs used by the VPC configuration.
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: The array of SecurityGroup IDs used by the VPC configuration.
      required:
        - SubnetIds
        - SecurityGroupIds
    SubnetIds:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      type: string
    SecurityGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      type: string
    AddApplicationVpcConfigurationResponse:
      type: object
      properties:
        ApplicationARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The ARN of the application.
        ApplicationVersionId:
          $ref: "#/components/schemas/ApplicationVersionId"
          description: Provides the current application version. Managed Service for Apache Flink updates the ApplicationVersionId each time you update the application.
        VpcConfigurationDescription:
          $ref: "#/components/schemas/VpcConfigurationDescription"
          description: The parameters of the new VPC configuration.
        OperationId:
          $ref: "#/components/schemas/OperationId"
          description: The operation ID that can be used to track the request.
    VpcConfigurationDescription:
      description: Describes the parameters of a VPC used by the application.
      type: object
      properties:
        VpcConfigurationId:
          $ref: "#/components/schemas/Id"
          description: The ID of the VPC configuration.
        VpcId:
          $ref: "#/components/schemas/VpcId"
          description: The ID of the associated VPC.
        SubnetIds:
          $ref: "#/components/schemas/SubnetIds"
          description: The array of Subnet IDs used by the VPC configuration.
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
