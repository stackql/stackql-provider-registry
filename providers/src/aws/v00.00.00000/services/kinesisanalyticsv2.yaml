    FlinkApplicationConfiguration:
      description: Describes configuration parameters for a Managed Service for Apache Flink application or a Studio notebook.
      type: object
      properties:
        CheckpointConfiguration:
          $ref: "#/components/schemas/CheckpointConfiguration"
          description: Describes an application's checkpointing configuration. Checkpointing is the process of persisting application state for fault tolerance. For more information, see Checkpoints for Fault Tolerance in the Apache Flink Documentation.
        MonitoringConfiguration:
          $ref: "#/components/schemas/MonitoringConfiguration"
          description: Describes configuration parameters for Amazon CloudWatch logging for an application.
        ParallelismConfiguration:
          $ref: "#/components/schemas/ParallelismConfiguration"
          description: Describes parameters for how an application executes multiple tasks simultaneously.
    CheckpointConfiguration:
      description: Describes an application's checkpointing configuration. Checkpointing is the process of persisting application state for fault tolerance. For more information, see Checkpoints for Fault Tolerance in the Apache Flink Documentation.
      type: object
      properties:
        ConfigurationType:
          $ref: "#/components/schemas/ConfigurationType"
          description: "Describes whether the application uses Managed Service for Apache Flink' default checkpointing behavior. You must set this property to CUSTOM in order to set the CheckpointingEnabled, CheckpointInterval, or MinPauseBetweenCheckpoints parameters. If this value is set to DEFAULT, the application will use the following values, even if they are set to other values using APIs or application code: CheckpointingEnabled: true CheckpointInterval: 60000 MinPauseBetweenCheckpoints: 5000"
        CheckpointingEnabled:
          $ref: "#/components/schemas/BooleanObject"
          description: Describes whether checkpointing is enabled for a Managed Service for Apache Flink application. If CheckpointConfiguration.ConfigurationType is DEFAULT, the application will use a CheckpointingEnabled value of true, even if this value is set to another value using this API or in application code.
        CheckpointInterval:
          $ref: "#/components/schemas/CheckpointInterval"
          description: Describes the interval in milliseconds between checkpoint operations. If CheckpointConfiguration.ConfigurationType is DEFAULT, the application will use a CheckpointInterval value of 60000, even if this value is set to another value using this API or in application code.
        MinPauseBetweenCheckpoints:
          $ref: "#/components/schemas/MinPauseBetweenCheckpoints"
          description: Describes the minimum time in milliseconds after a checkpoint operation completes that a new checkpoint operation can start. If a checkpoint operation takes longer than the CheckpointInterval, the application otherwise performs continual checkpoint operations. For more information, see Tuning Checkpointing in the Apache Flink Documentation. If CheckpointConfiguration.ConfigurationType is DEFAULT, the application will use a MinPauseBetweenCheckpoints value of 5000, even if this value is set using this API or in application code.
      required:
        - ConfigurationType
    ConfigurationType:
      type: string
      enum:
        - DEFAULT
        - CUSTOM
    BooleanObject:
      type: boolean
    CheckpointInterval:
      type: integer
      format: int64
      minimum: 1
    MinPauseBetweenCheckpoints:
      type: integer
      format: int64
      minimum: 0
    MonitoringConfiguration:
      description: Describes configuration parameters for Amazon CloudWatch logging for an application. For more information about CloudWatch logging, see Monitoring.
      type: object
      properties:
        ConfigurationType:
          $ref: "#/components/schemas/ConfigurationType"
          description: Describes whether to use the default CloudWatch logging configuration for an application. You must set this property to CUSTOM in order to set the LogLevel or MetricsLevel parameters.
        MetricsLevel:
          $ref: "#/components/schemas/MetricsLevel"
          description: Describes the granularity of the CloudWatch Logs for an application. The Parallelism level is not recommended for applications with a Parallelism over 64 due to excessive costs.
        LogLevel:
          $ref: "#/components/schemas/LogLevel"
          description: Describes the verbosity of the CloudWatch Logs for an application.
      required:
        - ConfigurationType
    MetricsLevel:
      type: string
      enum:
        - APPLICATION
        - TASK
        - OPERATOR
        - PARALLELISM
    LogLevel:
      type: string
      enum:
        - INFO
        - WARN
        - ERROR
        - DEBUG
    ParallelismConfiguration:
      description: Describes parameters for how a Managed Service for Apache Flink application executes multiple tasks simultaneously. For more information about parallelism, see Parallel Execution in the Apache Flink Documentation.
      type: object
      properties:
        ConfigurationType:
          $ref: "#/components/schemas/ConfigurationType"
          description: Describes whether the application uses the default parallelism for the Managed Service for Apache Flink service. You must set this property to CUSTOM in order to change your application's AutoScalingEnabled, Parallelism, or ParallelismPerKPU properties.
        Parallelism:
          $ref: "#/components/schemas/Parallelism"
          description: Describes the initial number of parallel tasks that a Managed Service for Apache Flink application can perform. If AutoScalingEnabled is set to True, Managed Service for Apache Flink increases the CurrentParallelism value in response to application load. The service can increase the CurrentParallelism value up to the maximum parallelism, which is ParalellismPerKPU times the maximum KPUs for the application. The maximum KPUs for an application is 64 by default, and can be increased by requesting a limit increase. If application load is reduced, the service can reduce the CurrentParallelism value down to the Parallelism setting.
        ParallelismPerKPU:
          $ref: "#/components/schemas/ParallelismPerKPU"
          description: Describes the number of parallel tasks that a Managed Service for Apache Flink application can perform per Kinesis Processing Unit (KPU) used by the application. For more information about KPUs, see Amazon Managed Service for Apache Flink Pricing.
        AutoScalingEnabled:
          $ref: "#/components/schemas/BooleanObject"
          description: Describes whether the Managed Service for Apache Flink service can increase the parallelism of the application in response to increased throughput.
      required:
        - ConfigurationType
    Parallelism:
      type: integer
      minimum: 1
    ParallelismPerKPU:
      type: integer
      minimum: 1
    EnvironmentProperties:
