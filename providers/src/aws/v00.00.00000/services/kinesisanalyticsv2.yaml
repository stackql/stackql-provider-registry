          $ref: "#/components/schemas/FlinkRunConfiguration"
    ApplicationRestoreConfiguration:
      description: Specifies the method and snapshot to use when restarting an application using previously saved application state.
      type: object
      properties:
        ApplicationRestoreType:
          $ref: "#/components/schemas/ApplicationRestoreType"
          description: Specifies how the application should be restored.
        SnapshotName:
          $ref: "#/components/schemas/SnapshotName"
          description: The identifier of an existing snapshot of application state to use to restart an application. The application uses this value if RESTORE_FROM_CUSTOM_SNAPSHOT is specified for the ApplicationRestoreType.
      required:
        - ApplicationRestoreType
    ApplicationRestoreType:
      type: string
      enum:
        - SKIP_RESTORE_FROM_SNAPSHOT
        - RESTORE_FROM_LATEST_SNAPSHOT
        - RESTORE_FROM_CUSTOM_SNAPSHOT
    SnapshotName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9_.-]+"
    FlinkRunConfiguration:
      description: Describes the starting parameters for a Managed Service for Apache Flink application.
      type: object
      properties:
        AllowNonRestoredState:
          $ref: "#/components/schemas/BooleanObject"
          description: When restoring from a snapshot, specifies whether the runtime is allowed to skip a state that cannot be mapped to the new program. This will happen if the program is updated between snapshots to remove stateful parameters, and state data in the snapshot no longer corresponds to valid application data. For more information, see Allowing Non-Restored State in the Apache Flink documentation. This value defaults to false. If you update your application without specifying this parameter, AllowNonRestoredState will be set to false, even if it was previously set to true.
    FlinkApplicationConfigurationDescription:
      description: Describes configuration parameters for a Managed Service for Apache Flink application.
      type: object
      properties:
        CheckpointConfigurationDescription:
          $ref: "#/components/schemas/CheckpointConfigurationDescription"
          description: Describes an application's checkpointing configuration. Checkpointing is the process of persisting application state for fault tolerance.
        MonitoringConfigurationDescription:
          $ref: "#/components/schemas/MonitoringConfigurationDescription"
          description: Describes configuration parameters for Amazon CloudWatch logging for an application.
        ParallelismConfigurationDescription:
          $ref: "#/components/schemas/ParallelismConfigurationDescription"
          description: Describes parameters for how an application executes multiple tasks simultaneously.
        JobPlanDescription:
          $ref: "#/components/schemas/JobPlanDescription"
          description: The job plan for an application. For more information about the job plan, see Jobs and Scheduling in the Apache Flink Documentation. To retrieve the job plan for the application, use the DescribeApplicationRequest$IncludeAdditionalDetails parameter of the DescribeApplication operation.
    CheckpointConfigurationDescription:
      description: Describes checkpointing parameters for a Managed Service for Apache Flink application.
      type: object
      properties:
        ConfigurationType:
          $ref: "#/components/schemas/ConfigurationType"
          description: "Describes whether the application uses the default checkpointing behavior in Managed Service for Apache Flink. If this value is set to DEFAULT, the application will use the following values, even if they are set to other values using APIs or application code: CheckpointingEnabled: true CheckpointInterval: 60000 MinPauseBetweenCheckpoints: 5000"
        CheckpointingEnabled:
          $ref: "#/components/schemas/BooleanObject"
          description: Describes whether checkpointing is enabled for a Managed Service for Apache Flink application. If CheckpointConfiguration.ConfigurationType is DEFAULT, the application will use a CheckpointingEnabled value of true, even if this value is set to another value using this API or in application code.
        CheckpointInterval:
          $ref: "#/components/schemas/CheckpointInterval"
          description: Describes the interval in milliseconds between checkpoint operations. If CheckpointConfiguration.ConfigurationType is DEFAULT, the application will use a CheckpointInterval value of 60000, even if this value is set to another value using this API or in application code.
        MinPauseBetweenCheckpoints:
          $ref: "#/components/schemas/MinPauseBetweenCheckpoints"
          description: Describes the minimum time in milliseconds after a checkpoint operation completes that a new checkpoint operation can start. If CheckpointConfiguration.ConfigurationType is DEFAULT, the application will use a MinPauseBetweenCheckpoints value of 5000, even if this value is set using this API or in application code.
    MonitoringConfigurationDescription:
      description: Describes configuration parameters for CloudWatch logging for an application.
      type: object
      properties:
        ConfigurationType:
          $ref: "#/components/schemas/ConfigurationType"
          description: Describes whether to use the default CloudWatch logging configuration for an application.
        MetricsLevel:
          $ref: "#/components/schemas/MetricsLevel"
          description: Describes the granularity of the CloudWatch Logs for an application.
        LogLevel:
          $ref: "#/components/schemas/LogLevel"
          description: Describes the verbosity of the CloudWatch Logs for an application.
    ParallelismConfigurationDescription:
      description: Describes parameters for how a Managed Service for Apache Flink application executes multiple tasks simultaneously.
      type: object
      properties:
        ConfigurationType:
          $ref: "#/components/schemas/ConfigurationType"
          description: Describes whether the application uses the default parallelism for the Managed Service for Apache Flink service.
        Parallelism:
          $ref: "#/components/schemas/Parallelism"
          description: Describes the initial number of parallel tasks that a Managed Service for Apache Flink application can perform. If AutoScalingEnabled is set to True, then Managed Service for Apache Flink can increase the CurrentParallelism value in response to application load. The service can increase CurrentParallelism up to the maximum parallelism, which is ParalellismPerKPU times the maximum KPUs for the application. The maximum KPUs for an application is 64 by default, and can be increased by requesting a limit increase. If application load is reduced, the service can reduce the CurrentParallelism value down to the Parallelism setting.
        ParallelismPerKPU:
          $ref: "#/components/schemas/ParallelismPerKPU"
          description: Describes the number of parallel tasks that a Managed Service for Apache Flink application can perform per Kinesis Processing Unit (KPU) used by the application.
        CurrentParallelism:
          $ref: "#/components/schemas/Parallelism"
          description: Describes the current number of parallel tasks that a Managed Service for Apache Flink application can perform. If AutoScalingEnabled is set to True, Managed Service for Apache Flink can increase this value in response to application load. The service can increase this value up to the maximum parallelism, which is ParalellismPerKPU times the maximum KPUs for the application. The maximum KPUs for an application is 32 by default, and can be increased by requesting a limit increase. If application load is reduced, the service can reduce the CurrentParallelism value down to the Parallelism setting.
        AutoScalingEnabled:
          $ref: "#/components/schemas/BooleanObject"
          description: Describes whether the Managed Service for Apache Flink service can increase the parallelism of the application in response to increased throughput.
    JobPlanDescription:
      type: string
    EnvironmentPropertyDescriptions:
      description: Describes the execution properties for an Apache Flink runtime.
      type: object
      properties:
        PropertyGroupDescriptions:
          $ref: "#/components/schemas/PropertyGroups"
