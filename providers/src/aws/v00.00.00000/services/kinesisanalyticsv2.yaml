          $ref: "#/components/schemas/Id"
          description: The input source ID. You can get this ID by calling the DescribeApplication operation.
        InputStartingPositionConfiguration:
          $ref: "#/components/schemas/InputStartingPositionConfiguration"
          description: The point at which you want the application to start processing records from the streaming source.
      required:
        - InputId
        - InputStartingPositionConfiguration
    StartApplicationResponse:
      type: object
      properties:
        OperationId:
          $ref: "#/components/schemas/OperationId"
          description: The operation ID that can be used to track the request.
    StopApplicationResponse:
      type: object
      properties:
        OperationId:
          $ref: "#/components/schemas/OperationId"
          description: The operation ID that can be used to track the request.
    TagResourceResponse:
      type: object
    TagKeys:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    UntagResourceResponse:
      type: object
    ApplicationConfigurationUpdate:
      description: Describes updates to an application's configuration.
      type: object
      properties:
        SqlApplicationConfigurationUpdate:
          $ref: "#/components/schemas/SqlApplicationConfigurationUpdate"
          description: Describes updates to a SQL-based Kinesis Data Analytics application's configuration.
        ApplicationCodeConfigurationUpdate:
          $ref: "#/components/schemas/ApplicationCodeConfigurationUpdate"
          description: Describes updates to an application's code configuration.
        FlinkApplicationConfigurationUpdate:
          $ref: "#/components/schemas/FlinkApplicationConfigurationUpdate"
          description: Describes updates to a Managed Service for Apache Flink application's configuration.
        EnvironmentPropertyUpdates:
          $ref: "#/components/schemas/EnvironmentPropertyUpdates"
          description: Describes updates to the environment properties for a Managed Service for Apache Flink application.
        ApplicationSnapshotConfigurationUpdate:
          $ref: "#/components/schemas/ApplicationSnapshotConfigurationUpdate"
          description: Describes whether snapshots are enabled for a Managed Service for Apache Flink application.
        ApplicationSystemRollbackConfigurationUpdate:
          $ref: "#/components/schemas/ApplicationSystemRollbackConfigurationUpdate"
          description: Describes whether system rollbacks are enabled for a Managed Service for Apache Flink application.
        VpcConfigurationUpdates:
          $ref: "#/components/schemas/VpcConfigurationUpdates"
          description: Updates to the array of descriptions of VPC configurations available to the application.
        ZeppelinApplicationConfigurationUpdate:
          $ref: "#/components/schemas/ZeppelinApplicationConfigurationUpdate"
          description: Updates to the configuration of a Managed Service for Apache Flink Studio notebook.
        ApplicationEncryptionConfigurationUpdate:
          $ref: "#/components/schemas/ApplicationEncryptionConfigurationUpdate"
          description: Represents an update for encryption at rest configuration.
    SqlApplicationConfigurationUpdate:
      description: Describes updates to the input streams, destination streams, and reference data sources for a SQL-based Kinesis Data Analytics application.
      type: object
      properties:
        InputUpdates:
          $ref: "#/components/schemas/InputUpdates"
          description: The array of InputUpdate objects describing the new input streams used by the application.
        OutputUpdates:
          $ref: "#/components/schemas/OutputUpdates"
          description: The array of OutputUpdate objects describing the new destination streams used by the application.
        ReferenceDataSourceUpdates:
          $ref: "#/components/schemas/ReferenceDataSourceUpdates"
          description: The array of ReferenceDataSourceUpdate objects describing the new reference data sources used by the application.
    InputUpdates:
      type: array
      items:
        $ref: "#/components/schemas/InputUpdate"
    InputUpdate:
      description: For a SQL-based Kinesis Data Analytics application, describes updates to a specific input configuration (identified by the InputId of an application).
      type: object
      properties:
        InputId:
          $ref: "#/components/schemas/Id"
          description: The input ID of the application input to be updated.
        NamePrefixUpdate:
          $ref: "#/components/schemas/InAppStreamName"
          description: The name prefix for in-application streams that Kinesis Data Analytics creates for the specific streaming source.
        InputProcessingConfigurationUpdate:
          $ref: "#/components/schemas/InputProcessingConfigurationUpdate"
          description: Describes updates to an InputProcessingConfiguration.
        KinesisStreamsInputUpdate:
          $ref: "#/components/schemas/KinesisStreamsInputUpdate"
          description: If a Kinesis data stream is the streaming source to be updated, provides an updated stream Amazon Resource Name (ARN).
        KinesisFirehoseInputUpdate:
          $ref: "#/components/schemas/KinesisFirehoseInputUpdate"
          description: If a Kinesis Data Firehose delivery stream is the streaming source to be updated, provides an updated stream ARN.
        InputSchemaUpdate:
          $ref: "#/components/schemas/InputSchemaUpdate"
          description: Describes the data format on the streaming source, and how record elements on the streaming source map to columns of the in-application stream that is created.
        InputParallelismUpdate:
          $ref: "#/components/schemas/InputParallelismUpdate"
          description: Describes the parallelism updates (the number of in-application streams Kinesis Data Analytics creates for the specific streaming source).
      required:
        - InputId
    InputProcessingConfigurationUpdate:
      description: For a SQL-based Kinesis Data Analytics application, describes updates to an InputProcessingConfiguration.
      type: object
      properties:
        InputLambdaProcessorUpdate:
          $ref: "#/components/schemas/InputLambdaProcessorUpdate"
          description: Provides update information for an InputLambdaProcessor.
      required:
        - InputLambdaProcessorUpdate
    InputLambdaProcessorUpdate:
      description: For a SQL-based Kinesis Data Analytics application, represents an update to the InputLambdaProcessor that is used to preprocess the records in the stream.
      type: object
      properties:
        ResourceARNUpdate:
          $ref: "#/components/schemas/ResourceARN"
          description: "The Amazon Resource Name (ARN) of the new Amazon Lambda function that is used to preprocess the records in the stream. To specify an earlier version of the Lambda function than the latest, include the Lambda function version in the Lambda function ARN. For more information about Lambda ARNs, see Example ARNs: Amazon Lambda"
      required:
        - ResourceARNUpdate
    KinesisStreamsInputUpdate:
      description: When you update the input configuration for a SQL-based Kinesis Data Analytics application, provides information about a Kinesis stream as the streaming source.
      type: object
      properties:
        ResourceARNUpdate:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the input Kinesis data stream to read.
      required:
        - ResourceARNUpdate
    KinesisFirehoseInputUpdate:
      description: For a SQL-based Kinesis Data Analytics application, when updating application input configuration, provides information about a Kinesis Data Firehose delivery stream as the streaming source.
      type: object
      properties:
        ResourceARNUpdate:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the input delivery stream to read.
      required:
        - ResourceARNUpdate
    InputSchemaUpdate:
      description: Describes updates for an SQL-based Kinesis Data Analytics application's input schema.
      type: object
      properties:
        RecordFormatUpdate:
          $ref: "#/components/schemas/RecordFormat"
          description: Specifies the format of the records on the streaming source.
        RecordEncodingUpdate:
          $ref: "#/components/schemas/RecordEncoding"
          description: Specifies the encoding of the records in the streaming source; for example, UTF-8.
        RecordColumnUpdates:
          $ref: "#/components/schemas/RecordColumns"
          description: A list of RecordColumn objects. Each object describes the mapping of the streaming source element to the corresponding column in the in-application stream.
    InputParallelismUpdate:
      description: For a SQL-based Kinesis Data Analytics application, provides updates to the parallelism count.
      type: object
      properties:
        CountUpdate:
          $ref: "#/components/schemas/InputParallelismCount"
          description: The number of in-application streams to create for the specified streaming source.
      required:
        - CountUpdate
    OutputUpdates:
      type: array
      items:
        $ref: "#/components/schemas/OutputUpdate"
    OutputUpdate:
      description: For a SQL-based Kinesis Data Analytics application, describes updates to the output configuration identified by the OutputId.
      type: object
      properties:
        OutputId:
          $ref: "#/components/schemas/Id"
          description: Identifies the specific output configuration that you want to update.
        NameUpdate:
          $ref: "#/components/schemas/InAppStreamName"
          description: If you want to specify a different in-application stream for this output configuration, use this field to specify the new in-application stream name.
        KinesisStreamsOutputUpdate:
          $ref: "#/components/schemas/KinesisStreamsOutputUpdate"
          description: Describes a Kinesis data stream as the destination for the output.
        KinesisFirehoseOutputUpdate:
          $ref: "#/components/schemas/KinesisFirehoseOutputUpdate"
          description: Describes a Kinesis Data Firehose delivery stream as the destination for the output.
        LambdaOutputUpdate:
          $ref: "#/components/schemas/LambdaOutputUpdate"
          description: Describes an Amazon Lambda function as the destination for the output.
        DestinationSchemaUpdate:
          $ref: "#/components/schemas/DestinationSchema"
          description: Describes the data format when records are written to the destination.
      required:
        - OutputId
    KinesisStreamsOutputUpdate:
      description: When you update a SQL-based Kinesis Data Analytics application's output configuration using the UpdateApplication operation, provides information about a Kinesis data stream that is configured as the destination.
      type: object
      properties:
        ResourceARNUpdate:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the Kinesis data stream where you want to write the output.
      required:
        - ResourceARNUpdate
    KinesisFirehoseOutputUpdate:
      description: For a SQL-based Kinesis Data Analytics application, when updating an output configuration using the UpdateApplication operation, provides information about a Kinesis Data Firehose delivery stream that is configured as the destination.
      type: object
      properties:
        ResourceARNUpdate:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the delivery stream to write to.
      required:
        - ResourceARNUpdate
    LambdaOutputUpdate:
      description: When you update an SQL-based Kinesis Data Analytics application's output configuration using the UpdateApplication operation, provides information about an Amazon Lambda function that is configured as the destination.
      type: object
      properties:
        ResourceARNUpdate:
          $ref: "#/components/schemas/ResourceARN"
          description: "The Amazon Resource Name (ARN) of the destination Amazon Lambda function. To specify an earlier version of the Lambda function than the latest, include the Lambda function version in the Lambda function ARN. For more information about Lambda ARNs, see Example ARNs: Amazon Lambda"
      required:
        - ResourceARNUpdate
    ReferenceDataSourceUpdates:
      type: array
      items:
        $ref: "#/components/schemas/ReferenceDataSourceUpdate"
    ReferenceDataSourceUpdate:
      description: When you update a reference data source configuration for a SQL-based Kinesis Data Analytics application, this object provides all the updated values (such as the source bucket name and object key name), the in-application table name that is created, and updated mapping information that maps the data in the Amazon S3 object to the in-application reference table that is created.
      type: object
      properties:
        ReferenceId:
          $ref: "#/components/schemas/Id"
          description: The ID of the reference data source that is being updated. You can use the DescribeApplication operation to get this value.
        TableNameUpdate:
          $ref: "#/components/schemas/InAppTableName"
          description: The in-application table name that is created by this update.
        S3ReferenceDataSourceUpdate:
          $ref: "#/components/schemas/S3ReferenceDataSourceUpdate"
          description: Describes the S3 bucket name, object key name, and IAM role that Kinesis Data Analytics can assume to read the Amazon S3 object on your behalf and populate the in-application reference table.
        ReferenceSchemaUpdate:
          $ref: "#/components/schemas/SourceSchema"
          description: Describes the format of the data in the streaming source, and how each data element maps to corresponding columns created in the in-application stream.
      required:
        - ReferenceId
    S3ReferenceDataSourceUpdate:
      description: For a SQL-based Kinesis Data Analytics application, describes the Amazon S3 bucket name and object key name for an in-application reference table.
      type: object
      properties:
        BucketARNUpdate:
          $ref: "#/components/schemas/BucketARN"
          description: The Amazon Resource Name (ARN) of the S3 bucket.
        FileKeyUpdate:
          $ref: "#/components/schemas/FileKey"
          description: The object key name.
    ApplicationCodeConfigurationUpdate:
      description: Describes code configuration updates for an application. This is supported for a Managed Service for Apache Flink application or a SQL-based Kinesis Data Analytics application.
      type: object
      properties:
        CodeContentTypeUpdate:
          $ref: "#/components/schemas/CodeContentType"
          description: Describes updates to the code content type.
        CodeContentUpdate:
          $ref: "#/components/schemas/CodeContentUpdate"
          description: Describes updates to the code content of an application.
    CodeContentUpdate:
      description: Describes an update to the code of an application. Not supported for Apache Zeppelin.
      type: object
      properties:
        TextContentUpdate:
          $ref: "#/components/schemas/TextContent"
          description: Describes an update to the text code for an application.
        ZipFileContentUpdate:
          $ref: "#/components/schemas/ZipFileContent"
          description: Describes an update to the zipped code for an application.
        S3ContentLocationUpdate:
          $ref: "#/components/schemas/S3ContentLocationUpdate"
          description: Describes an update to the location of code for an application.
    S3ContentLocationUpdate:
      description: Describes an update for the Amazon S3 code content location for an application.
      type: object
      properties:
        BucketARNUpdate:
          $ref: "#/components/schemas/BucketARN"
          description: The new Amazon Resource Name (ARN) for the S3 bucket containing the application code.
        FileKeyUpdate:
          $ref: "#/components/schemas/FileKey"
          description: The new file key for the object containing the application code.
        ObjectVersionUpdate:
          $ref: "#/components/schemas/ObjectVersion"
          description: The new version of the object containing the application code.
    FlinkApplicationConfigurationUpdate:
      description: Describes updates to the configuration parameters for a Managed Service for Apache Flink application.
      type: object
      properties:
        CheckpointConfigurationUpdate:
          $ref: "#/components/schemas/CheckpointConfigurationUpdate"
          description: Describes updates to an application's checkpointing configuration. Checkpointing is the process of persisting application state for fault tolerance.
        MonitoringConfigurationUpdate:
          $ref: "#/components/schemas/MonitoringConfigurationUpdate"
          description: Describes updates to the configuration parameters for Amazon CloudWatch logging for an application.
        ParallelismConfigurationUpdate:
          $ref: "#/components/schemas/ParallelismConfigurationUpdate"
          description: Describes updates to the parameters for how an application executes multiple tasks simultaneously.
    CheckpointConfigurationUpdate:
      description: Describes updates to the checkpointing parameters for a Managed Service for Apache Flink application.
      type: object
      properties:
        ConfigurationTypeUpdate:
          $ref: "#/components/schemas/ConfigurationType"
          description: "Describes updates to whether the application uses the default checkpointing behavior of Managed Service for Apache Flink. You must set this property to CUSTOM in order to set the CheckpointingEnabled, CheckpointInterval, or MinPauseBetweenCheckpoints parameters. If this value is set to DEFAULT, the application will use the following values, even if they are set to other values using APIs or application code: CheckpointingEnabled: true CheckpointInterval: 60000 MinPauseBetweenCheckpoints: 5000"
        CheckpointingEnabledUpdate:
          $ref: "#/components/schemas/BooleanObject"
          description: Describes updates to whether checkpointing is enabled for an application. If CheckpointConfiguration.ConfigurationType is DEFAULT, the application will use a CheckpointingEnabled value of true, even if this value is set to another value using this API or in application code.
        CheckpointIntervalUpdate:
          $ref: "#/components/schemas/CheckpointInterval"
          description: Describes updates to the interval in milliseconds between checkpoint operations. If CheckpointConfiguration.ConfigurationType is DEFAULT, the application will use a CheckpointInterval value of 60000, even if this value is set to another value using this API or in application code.
        MinPauseBetweenCheckpointsUpdate:
          $ref: "#/components/schemas/MinPauseBetweenCheckpoints"
          description: Describes updates to the minimum time in milliseconds after a checkpoint operation completes that a new checkpoint operation can start. If CheckpointConfiguration.ConfigurationType is DEFAULT, the application will use a MinPauseBetweenCheckpoints value of 5000, even if this value is set using this API or in application code.
    MonitoringConfigurationUpdate:
      description: Describes updates to configuration parameters for Amazon CloudWatch logging for an application.
      type: object
      properties:
        ConfigurationTypeUpdate:
          $ref: "#/components/schemas/ConfigurationType"
          description: Describes updates to whether to use the default CloudWatch logging configuration for an application. You must set this property to CUSTOM in order to set the LogLevel or MetricsLevel parameters.
        MetricsLevelUpdate:
          $ref: "#/components/schemas/MetricsLevel"
          description: Describes updates to the granularity of the CloudWatch Logs for an application. The Parallelism level is not recommended for applications with a Parallelism over 64 due to excessive costs.
        LogLevelUpdate:
          $ref: "#/components/schemas/LogLevel"
          description: Describes updates to the verbosity of the CloudWatch Logs for an application.
    ParallelismConfigurationUpdate:
      description: Describes updates to parameters for how an application executes multiple tasks simultaneously.
      type: object
      properties:
        ConfigurationTypeUpdate:
          $ref: "#/components/schemas/ConfigurationType"
          description: Describes updates to whether the application uses the default parallelism for the Managed Service for Apache Flink service, or if a custom parallelism is used. You must set this property to CUSTOM in order to change your application's AutoScalingEnabled, Parallelism, or ParallelismPerKPU properties.
        ParallelismUpdate:
          $ref: "#/components/schemas/Parallelism"
          description: Describes updates to the initial number of parallel tasks an application can perform. If AutoScalingEnabled is set to True, then Managed Service for Apache Flink can increase the CurrentParallelism value in response to application load. The service can increase CurrentParallelism up to the maximum parallelism, which is ParalellismPerKPU times the maximum KPUs for the application. The maximum KPUs for an application is 32 by default, and can be increased by requesting a limit increase. If application load is reduced, the service will reduce CurrentParallelism down to the Parallelism setting.
        ParallelismPerKPUUpdate:
          $ref: "#/components/schemas/ParallelismPerKPU"
          description: Describes updates to the number of parallel tasks an application can perform per Kinesis Processing Unit (KPU) used by the application.
        AutoScalingEnabledUpdate:
          $ref: "#/components/schemas/BooleanObject"
          description: Describes updates to whether the Managed Service for Apache Flink service can increase the parallelism of a Managed Service for Apache Flink application in response to increased throughput.
    EnvironmentPropertyUpdates:
      description: Describes updates to the execution property groups for a Managed Service for Apache Flink application or a Studio notebook.
      type: object
      properties:
        PropertyGroups:
          $ref: "#/components/schemas/PropertyGroups"
          description: Describes updates to the execution property groups.
      required:
        - PropertyGroups
    ApplicationSnapshotConfigurationUpdate:
      description: Describes updates to whether snapshots are enabled for a Managed Service for Apache Flink application.
      type: object
      properties:
        SnapshotsEnabledUpdate:
          $ref: "#/components/schemas/BooleanObject"
          description: Describes updates to whether snapshots are enabled for an application.
      required:
        - SnapshotsEnabledUpdate
    ApplicationSystemRollbackConfigurationUpdate:
      description: Describes the system rollback configuration for a Managed Service for Apache Flink application.
      type: object
      properties:
        RollbackEnabledUpdate:
          $ref: "#/components/schemas/BooleanObject"
          description: Describes whether system rollbacks are enabled for a Managed Service for Apache Flink application.
      required:
        - RollbackEnabledUpdate
    VpcConfigurationUpdates:
      type: array
      items:
        $ref: "#/components/schemas/VpcConfigurationUpdate"
    VpcConfigurationUpdate:
      description: Describes updates to the VPC configuration used by the application.
      type: object
      properties:
        VpcConfigurationId:
          $ref: "#/components/schemas/Id"
          description: Describes an update to the ID of the VPC configuration.
        SubnetIdUpdates:
          $ref: "#/components/schemas/SubnetIds"
          description: Describes updates to the array of Subnet IDs used by the VPC configuration.
        SecurityGroupIdUpdates:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: Describes updates to the array of SecurityGroup IDs used by the VPC configuration.
      required:
        - VpcConfigurationId
    ZeppelinApplicationConfigurationUpdate:
      description: Updates to the configuration of Managed Service for Apache Flink Studio notebook.
      type: object
      properties:
        MonitoringConfigurationUpdate:
          $ref: "#/components/schemas/ZeppelinMonitoringConfigurationUpdate"
          description: Updates to the monitoring configuration of a Managed Service for Apache Flink Studio notebook.
        CatalogConfigurationUpdate:
          $ref: "#/components/schemas/CatalogConfigurationUpdate"
          description: Updates to the configuration of the Amazon Glue Data Catalog that is associated with the Managed Service for Apache Flink Studio notebook.
        DeployAsApplicationConfigurationUpdate:
          $ref: "#/components/schemas/DeployAsApplicationConfigurationUpdate"
        CustomArtifactsConfigurationUpdate:
          $ref: "#/components/schemas/CustomArtifactsConfigurationList"
          description: Updates to the customer artifacts. Custom artifacts are dependency JAR files and user-defined functions (UDF).
    ZeppelinMonitoringConfigurationUpdate:
      description: Updates to the monitoring configuration for Apache Zeppelin within a Managed Service for Apache Flink Studio notebook.
      type: object
      properties:
        LogLevelUpdate:
          $ref: "#/components/schemas/LogLevel"
          description: Updates to the logging level for Apache Zeppelin within a Managed Service for Apache Flink Studio notebook.
      required:
        - LogLevelUpdate
    CatalogConfigurationUpdate:
      description: Updates to the configuration parameters for the default Amazon Glue database. You use this database for SQL queries that you write in a Managed Service for Apache Flink Studio notebook.
      type: object
      properties:
        GlueDataCatalogConfigurationUpdate:
          $ref: "#/components/schemas/GlueDataCatalogConfigurationUpdate"
          description: Updates to the configuration parameters for the default Amazon Glue database. You use this database for SQL queries that you write in a Managed Service for Apache Flink Studio notebook.
      required:
        - GlueDataCatalogConfigurationUpdate
    GlueDataCatalogConfigurationUpdate:
      description: Updates to the configuration of the Glue Data Catalog that you use for SQL queries that you write in a Managed Service for Apache Flink Studio notebook.
      type: object
      properties:
        DatabaseARNUpdate:
          $ref: "#/components/schemas/DatabaseARN"
          description: The updated Amazon Resource Name (ARN) of the database.
      required:
        - DatabaseARNUpdate
    DeployAsApplicationConfigurationUpdate:
      description: Updates to the configuration information required to deploy an Amazon Data Analytics Studio notebook as an application with durable state.
      type: object
      properties:
        S3ContentLocationUpdate:
          $ref: "#/components/schemas/S3ContentBaseLocationUpdate"
          description: Updates to the location that holds the data required to specify an Amazon Data Analytics application.
    S3ContentBaseLocationUpdate:
      description: The information required to update the S3 base location that holds the application.
      type: object
      properties:
        BucketARNUpdate:
          $ref: "#/components/schemas/BucketARN"
          description: The updated Amazon Resource Name (ARN) of the S3 bucket.
        BasePathUpdate:
          $ref: "#/components/schemas/BasePath"
          description: The updated S3 bucket path.
    ApplicationEncryptionConfigurationUpdate:
      description: Describes configuration updates to encryption at rest.
      type: object
      properties:
        KeyIdUpdate:
          $ref: "#/components/schemas/KeyId"
          description: The key ARN, key ID, alias ARN, or alias name of the KMS key to be used for encryption at rest.
        KeyTypeUpdate:
          $ref: "#/components/schemas/KeyType"
          description: Specifies the type of key to be used for encryption at rest.
      required:
        - KeyTypeUpdate
    RunConfigurationUpdate:
      description: Describes the updates to the starting parameters for a Managed Service for Apache Flink application.
      type: object
      properties:
        FlinkRunConfiguration:
          $ref: "#/components/schemas/FlinkRunConfiguration"
          description: Describes the starting parameters for a Managed Service for Apache Flink application.
        ApplicationRestoreConfiguration:
          $ref: "#/components/schemas/ApplicationRestoreConfiguration"
          description: Describes updates to the restore behavior of a restarting application.
    CloudWatchLoggingOptionUpdates:
      type: array
      items:
        $ref: "#/components/schemas/CloudWatchLoggingOptionUpdate"
    CloudWatchLoggingOptionUpdate:
      description: Describes the Amazon CloudWatch logging option updates.
      type: object
      properties:
        CloudWatchLoggingOptionId:
          $ref: "#/components/schemas/Id"
          description: The ID of the CloudWatch logging option to update
        LogStreamARNUpdate:
          $ref: "#/components/schemas/LogStreamARN"
          description: The Amazon Resource Name (ARN) of the CloudWatch log to receive application messages.
      required:
        - CloudWatchLoggingOptionId
    UpdateApplicationResponse:
      type: object
      properties:
        ApplicationDetail:
          $ref: "#/components/schemas/ApplicationDetail"
          description: Describes application updates.
        OperationId:
          $ref: "#/components/schemas/OperationId"
          description: The operation ID that can be used to track the request.
      required:
        - ApplicationDetail
    ApplicationMaintenanceConfigurationUpdate:
      description: Describes the updated maintenance configuration for the application.
      type: object
      properties:
        ApplicationMaintenanceWindowStartTimeUpdate:
          $ref: "#/components/schemas/ApplicationMaintenanceWindowStartTime"
          description: The updated start time for the maintenance window.
      required:
        - ApplicationMaintenanceWindowStartTimeUpdate
    UpdateApplicationMaintenanceConfigurationResponse:
      type: object
      properties:
        ApplicationARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the application.
        ApplicationMaintenanceConfigurationDescription:
          $ref: "#/components/schemas/ApplicationMaintenanceConfigurationDescription"
          description: The application maintenance configuration description after the update.
