      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/KinesisAnalyticsARN"
                  description: The ARN of the application to assign the tags.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: The key-value tags to assign to the application.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes one or more tags from a Managed Service for Apache Flink application. For more information, see Using Tagging.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20180523.UntagResource
            default: KinesisAnalytics_20180523.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/KinesisAnalyticsARN"
                  description: The ARN of the Managed Service for Apache Flink application from which to remove the tags.
                TagKeys:
                  $ref: "#/components/schemas/TagKeys"
                  description: A list of keys of tags to remove from the specified application.
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateApplication:
    post:
      operationId: UpdateApplication
      description: Updates an existing Managed Service for Apache Flink application. Using this operation, you can update application code, input configuration, and output configuration. Managed Service for Apache Flink updates the ApplicationVersionId each time you update your application.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20180523.UpdateApplication
            default: KinesisAnalytics_20180523.UpdateApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: The name of the application to update.
                CurrentApplicationVersionId:
                  $ref: "#/components/schemas/ApplicationVersionId"
                  description: The current application version ID. You must provide the CurrentApplicationVersionId or the ConditionalToken.You can retrieve the application version ID using DescribeApplication. For better concurrency support, use the ConditionalToken parameter instead of CurrentApplicationVersionId.
                ApplicationConfigurationUpdate:
                  $ref: "#/components/schemas/ApplicationConfigurationUpdate"
                  description: Describes application configuration updates.
                ServiceExecutionRoleUpdate:
                  $ref: "#/components/schemas/RoleARN"
                  description: Describes updates to the service execution role.
                RunConfigurationUpdate:
                  $ref: "#/components/schemas/RunConfigurationUpdate"
                  description: Describes updates to the application's starting parameters.
                CloudWatchLoggingOptionUpdates:
                  $ref: "#/components/schemas/CloudWatchLoggingOptionUpdates"
                  description: Describes application Amazon CloudWatch logging option updates. You can only update existing CloudWatch logging options with this action. To add a new CloudWatch logging option, use AddApplicationCloudWatchLoggingOption.
                ConditionalToken:
                  $ref: "#/components/schemas/ConditionalToken"
                  description: A value you use to implement strong concurrency for application updates. You must provide the CurrentApplicationVersionId or the ConditionalToken. You get the application's current ConditionalToken using DescribeApplication. For better concurrency support, use the ConditionalToken parameter instead of CurrentApplicationVersionId.
                RuntimeEnvironmentUpdate:
                  $ref: "#/components/schemas/RuntimeEnvironment"
                  description: "Updates the Managed Service for Apache Flink runtime environment used to run your code. To avoid issues you must: Ensure your new jar and dependencies are compatible with the new runtime selected. Ensure your new code's state is compatible with the snapshot from which your application will start"
              required:
                - ApplicationName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateApplicationResponse"
  /UpdateApplicationMaintenanceConfiguration:
    post:
      operationId: UpdateApplicationMaintenanceConfiguration
      description: "Updates the maintenance configuration of the Managed Service for Apache Flink application. You can invoke this operation on an application that is in one of the two following states: READY or RUNNING. If you invoke it when the application is in a state other than these two states, it throws a ResourceInUseException. The service makes use of the updated configuration the next time it schedules maintenance for the application. If you invoke this operation after the service schedules maintenance, the service will apply the configuration update the next time it schedules maintenance for the application. This means that you might not see the maintenance configuration update applied to the maintenance process that follows a successful invocation of this operation, but to the following maintenance process instead. To see the current maintenance configuration of your application, invoke the DescribeApplication operation. For information about application maintenance, see Managed Service for Apache Flink for Apache Flink Maintenance. This operation is supported only for Managed Service for Apache Flink."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20180523.UpdateApplicationMaintenanceConfiguration
            default: KinesisAnalytics_20180523.UpdateApplicationMaintenanceConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: The name of the application for which you want to update the maintenance configuration.
                ApplicationMaintenanceConfigurationUpdate:
                  $ref: "#/components/schemas/ApplicationMaintenanceConfigurationUpdate"
                  description: Describes the application maintenance configuration update.
              required:
                - ApplicationName
                - ApplicationMaintenanceConfigurationUpdate
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateApplicationMaintenanceConfigurationResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ApplicationName:
      description: The name of the application.
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_.-]+"
    ApplicationVersionId:
      type: integer
      format: int64
      minimum: 1
      maximum: 999999999
    CloudWatchLoggingOption:
      description: Provides a description of Amazon CloudWatch logging options, including the log stream Amazon Resource Name (ARN).
      type: object
      properties:
        LogStreamARN:
          $ref: "#/components/schemas/LogStreamARN"
          description: The ARN of the CloudWatch log to receive application messages.
      required:
        - LogStreamARN
    LogStreamARN:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:.*
    ConditionalToken:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[a-zA-Z0-9-_+/=]+"
    AddApplicationCloudWatchLoggingOptionResponse:
      type: object
      properties:
        ApplicationARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The application's ARN.
        ApplicationVersionId:
          $ref: "#/components/schemas/ApplicationVersionId"
          description: The new version ID of the SQL-based Kinesis Data Analytics application. Kinesis Data Analytics updates the ApplicationVersionId each time you change the CloudWatch logging options.
        CloudWatchLoggingOptionDescriptions:
          $ref: "#/components/schemas/CloudWatchLoggingOptionDescriptions"
          description: The descriptions of the current CloudWatch logging options for the SQL-based Kinesis Data Analytics application.
        OperationId:
          $ref: "#/components/schemas/OperationId"
          description: The operation ID that can be used to track the request.
    ResourceARN:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:.*
    CloudWatchLoggingOptionDescriptions:
      type: array
      items:
        $ref: "#/components/schemas/CloudWatchLoggingOptionDescription"
    CloudWatchLoggingOptionDescription:
      description: Describes the Amazon CloudWatch logging option.
      type: object
      properties:
        CloudWatchLoggingOptionId:
          $ref: "#/components/schemas/Id"
          description: The ID of the CloudWatch logging option description.
        LogStreamARN:
          $ref: "#/components/schemas/LogStreamARN"
          description: The Amazon Resource Name (ARN) of the CloudWatch log to receive application messages.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The IAM ARN of the role to use to send application messages. Provided for backward compatibility. Applications created with the current API version have an application-level service execution role rather than a resource-level role.
      required:
        - LogStreamARN
    Id:
      type: string
      minLength: 1
      maxLength: 50
      pattern: "[a-zA-Z0-9_.-]+"
    RoleARN:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:.*
    OperationId:
      description: The operation ID of the request.
      type: string
      minLength: 1
      maxLength: 64
    Input:
      description: When you configure the application input for a SQL-based Kinesis Data Analytics application, you specify the streaming source, the in-application stream name that is created, and the mapping between the two.
      type: object
      properties:
        NamePrefix:
          $ref: "#/components/schemas/InAppStreamName"
          description: The name prefix to use when creating an in-application stream. Suppose that you specify a prefix "MyInApplicationStream." Kinesis Data Analytics then creates one or more (as per the InputParallelism count you specified) in-application streams with the names "MyInApplicationStream_001," "MyInApplicationStream_002," and so on.
        InputProcessingConfiguration:
          $ref: "#/components/schemas/InputProcessingConfiguration"
          description: The InputProcessingConfiguration for the input. An input processor transforms records as they are received from the stream, before the application's SQL code executes. Currently, the only input processing configuration available is InputLambdaProcessor.
        KinesisStreamsInput:
          $ref: "#/components/schemas/KinesisStreamsInput"
          description: If the streaming source is an Amazon Kinesis data stream, identifies the stream's Amazon Resource Name (ARN).
        KinesisFirehoseInput:
          $ref: "#/components/schemas/KinesisFirehoseInput"
          description: If the streaming source is an Amazon Kinesis Data Firehose delivery stream, identifies the delivery stream's ARN.
        InputParallelism:
          $ref: "#/components/schemas/InputParallelism"
          description: Describes the number of in-application streams to create.
        InputSchema:
          $ref: "#/components/schemas/SourceSchema"
          description: Describes the format of the data in the streaming source, and how each data element maps to corresponding columns in the in-application stream that is being created. Also used to describe the format of the reference data source.
      required:
        - NamePrefix
        - InputSchema
    InAppStreamName:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[^-\\s<>&]*"
    InputProcessingConfiguration:
      description: For a SQL-based Kinesis Data Analytics application, describes a processor that is used to preprocess the records in the stream before being processed by your application code. Currently, the only input processor available is Amazon Lambda.
      type: object
      properties:
        InputLambdaProcessor:
          $ref: "#/components/schemas/InputLambdaProcessor"
          description: The InputLambdaProcessor that is used to preprocess the records in the stream before being processed by your application code.
      required:
        - InputLambdaProcessor
    InputLambdaProcessor:
      description: An object that contains the Amazon Resource Name (ARN) of the Amazon Lambda function that is used to preprocess records in the stream in a SQL-based Kinesis Data Analytics application.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: "The ARN of the Amazon Lambda function that operates on records in the stream. To specify an earlier version of the Lambda function than the latest, include the Lambda function version in the Lambda function ARN. For more information about Lambda ARNs, see Example ARNs: Amazon Lambda"
      required:
        - ResourceARN
    KinesisStreamsInput:
      description: Identifies a Kinesis data stream as the streaming source. You provide the stream's Amazon Resource Name (ARN).
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The ARN of the input Kinesis data stream to read.
      required:
        - ResourceARN
    KinesisFirehoseInput:
      description: For a SQL-based Kinesis Data Analytics application, identifies a Kinesis Data Firehose delivery stream as the streaming source. You provide the delivery stream's Amazon Resource Name (ARN).
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the delivery stream.
      required:
        - ResourceARN
    InputParallelism:
      description: For a SQL-based Kinesis Data Analytics application, describes the number of in-application streams to create for a given streaming source.
      type: object
      properties:
        Count:
          $ref: "#/components/schemas/InputParallelismCount"
          description: The number of in-application streams to create.
    InputParallelismCount:
      type: integer
      minimum: 1
      maximum: 64
    SourceSchema:
      description: For a SQL-based Kinesis Data Analytics application, describes the format of the data in the streaming source, and how each data element maps to corresponding columns created in the in-application stream.
      type: object
      properties:
        RecordFormat:
          $ref: "#/components/schemas/RecordFormat"
          description: Specifies the format of the records on the streaming source.
        RecordEncoding:
          $ref: "#/components/schemas/RecordEncoding"
          description: Specifies the encoding of the records in the streaming source. For example, UTF-8.
        RecordColumns:
          $ref: "#/components/schemas/RecordColumns"
          description: A list of RecordColumn objects.
      required:
        - RecordFormat
        - RecordColumns
    RecordFormat:
      description: For a SQL-based Kinesis Data Analytics application, describes the record format and relevant mapping information that should be applied to schematize the records on the stream.
      type: object
      properties:
        RecordFormatType:
          $ref: "#/components/schemas/RecordFormatType"
          description: The type of record format.
        MappingParameters:
          $ref: "#/components/schemas/MappingParameters"
          description: When you configure application input at the time of creating or updating an application, provides additional mapping information specific to the record format (such as JSON, CSV, or record fields delimited by some delimiter) on the streaming source.
      required:
        - RecordFormatType
    RecordFormatType:
      type: string
      enum:
        - JSON
        - CSV
    MappingParameters:
      description: When you configure a SQL-based Kinesis Data Analytics application's input at the time of creating or updating an application, provides additional mapping information specific to the record format (such as JSON, CSV, or record fields delimited by some delimiter) on the streaming source.
      type: object
      properties:
        JSONMappingParameters:
          $ref: "#/components/schemas/JSONMappingParameters"
          description: Provides additional mapping information when JSON is the record format on the streaming source.
        CSVMappingParameters:
          $ref: "#/components/schemas/CSVMappingParameters"
          description: Provides additional mapping information when the record format uses delimiters (for example, CSV).
    JSONMappingParameters:
      description: For a SQL-based Kinesis Data Analytics application, provides additional mapping information when JSON is the record format on the streaming source.
      type: object
      properties:
        RecordRowPath:
          $ref: "#/components/schemas/RecordRowPath"
          description: The path to the top-level parent that contains the records.
      required:
        - RecordRowPath
    RecordRowPath:
      type: string
      minLength: 1
      maxLength: 65535
      pattern: ^(?=^\$)(?=^\S+$).*$
    CSVMappingParameters:
      description: "For a SQL-based Kinesis Data Analytics application, provides additional mapping information when the record format uses delimiters, such as CSV. For example, the following sample records use CSV format, where the records use the '\\n' as the row delimiter and a comma (\",\") as the column delimiter: \"name1\", \"address1\" \"name2\", \"address2\""
      type: object
      properties:
        RecordRowDelimiter:
          $ref: "#/components/schemas/RecordRowDelimiter"
          description: The row delimiter. For example, in a CSV format, '\n' is the typical row delimiter.
        RecordColumnDelimiter:
          $ref: "#/components/schemas/RecordColumnDelimiter"
          description: The column delimiter. For example, in a CSV format, a comma (",") is the typical column delimiter.
      required:
        - RecordRowDelimiter
        - RecordColumnDelimiter
    RecordRowDelimiter:
      type: string
      minLength: 1
      maxLength: 1024
    RecordColumnDelimiter:
      type: string
      minLength: 1
      maxLength: 1024
    RecordEncoding:
      type: string
      minLength: 5
      maxLength: 5
      pattern: UTF-8
    RecordColumns:
      type: array
      items:
        $ref: "#/components/schemas/RecordColumn"
    RecordColumn:
      description: For a SQL-based Kinesis Data Analytics application, describes the mapping of each data element in the streaming source to the corresponding column in the in-application stream. Also used to describe the format of the reference data source.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/RecordColumnName"
          description: The name of the column that is created in the in-application input stream or reference table.
        Mapping:
          $ref: "#/components/schemas/RecordColumnMapping"
          description: A reference to the data element in the streaming input or the reference data source.
        SqlType:
          $ref: "#/components/schemas/RecordColumnSqlType"
          description: The type of column created in the in-application input stream or reference table.
      required:
        - Name
        - SqlType
    RecordColumnName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[^-\\s<>&]*"
    RecordColumnMapping:
      type: string
      minLength: 0
      maxLength: 65535
    RecordColumnSqlType:
      type: string
      minLength: 1
      maxLength: 100
    AddApplicationInputResponse:
      type: object
      properties:
        ApplicationARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the application.
        ApplicationVersionId:
          $ref: "#/components/schemas/ApplicationVersionId"
          description: Provides the current application version.
        InputDescriptions:
          $ref: "#/components/schemas/InputDescriptions"
          description: Describes the application input configuration.
    InputDescriptions:
      type: array
      items:
        $ref: "#/components/schemas/InputDescription"
    InputDescription:
      description: Describes the application input configuration for a SQL-based Kinesis Data Analytics application.
      type: object
      properties:
        InputId:
          $ref: "#/components/schemas/Id"
          description: The input ID that is associated with the application input. This is the ID that Kinesis Data Analytics assigns to each input configuration that you add to your application.
        NamePrefix:
          $ref: "#/components/schemas/InAppStreamName"
          description: The in-application name prefix.
        InAppStreamNames:
          $ref: "#/components/schemas/InAppStreamNames"
          description: Returns the in-application stream names that are mapped to the stream source.
        InputProcessingConfigurationDescription:
          $ref: "#/components/schemas/InputProcessingConfigurationDescription"
          description: The description of the preprocessor that executes on records in this input before the application's code is run.
        KinesisStreamsInputDescription:
          $ref: "#/components/schemas/KinesisStreamsInputDescription"
          description: If a Kinesis data stream is configured as a streaming source, provides the Kinesis data stream's Amazon Resource Name (ARN).
        KinesisFirehoseInputDescription:
          $ref: "#/components/schemas/KinesisFirehoseInputDescription"
          description: If a Kinesis Data Firehose delivery stream is configured as a streaming source, provides the delivery stream's ARN.
        InputSchema:
          $ref: "#/components/schemas/SourceSchema"
          description: Describes the format of the data in the streaming source, and how each data element maps to corresponding columns in the in-application stream that is being created.
        InputParallelism:
          $ref: "#/components/schemas/InputParallelism"
          description: Describes the configured parallelism (number of in-application streams mapped to the streaming source).
        InputStartingPositionConfiguration:
          $ref: "#/components/schemas/InputStartingPositionConfiguration"
          description: The point at which the application is configured to read from the input stream.
    InAppStreamNames:
      type: array
      items:
        $ref: "#/components/schemas/InAppStreamName"
    InputProcessingConfigurationDescription:
      description: For a SQL-based Kinesis Data Analytics application, provides the configuration information about an input processor. Currently, the only input processor available is Amazon Lambda.
      type: object
      properties:
        InputLambdaProcessorDescription:
          $ref: "#/components/schemas/InputLambdaProcessorDescription"
          description: Provides configuration information about the associated InputLambdaProcessorDescription
    InputLambdaProcessorDescription:
      description: For a SQL-based Kinesis Data Analytics application, an object that contains the Amazon Resource Name (ARN) of the Amazon Lambda function that is used to preprocess records in the stream.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: "The ARN of the Amazon Lambda function that is used to preprocess the records in the stream. To specify an earlier version of the Lambda function than the latest, include the Lambda function version in the Lambda function ARN. For more information about Lambda ARNs, see Example ARNs: Amazon Lambda"
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The ARN of the IAM role that is used to access the Amazon Lambda function. Provided for backward compatibility. Applications that are created with the current API version have an application-level service execution role rather than a resource-level role.
      required:
        - ResourceARN
    KinesisStreamsInputDescription:
      description: For a SQL-based Kinesis Data Analytics application, describes the Kinesis data stream that is configured as the streaming source in the application input configuration.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the Kinesis data stream.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The ARN of the IAM role that Kinesis Data Analytics can assume to access the stream. Provided for backward compatibility. Applications that are created with the current API version have an application-level service execution role rather than a resource-level role.
      required:
        - ResourceARN
    KinesisFirehoseInputDescription:
      description: Describes the Amazon Kinesis Data Firehose delivery stream that is configured as the streaming source in the application input configuration.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the delivery stream.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The ARN of the IAM role that Kinesis Data Analytics assumes to access the stream. Provided for backward compatibility. Applications that are created with the current API version have an application-level service execution role rather than a resource-level role.
      required:
        - ResourceARN
    InputStartingPositionConfiguration:
      description: Describes the point at which the application reads from the streaming source.
      type: object
      properties:
        InputStartingPosition:
          $ref: "#/components/schemas/InputStartingPosition"
          description: The starting position on the stream. NOW - Start reading just after the most recent record in the stream, and start at the request timestamp that the customer issued. TRIM_HORIZON - Start reading at the last untrimmed record in the stream, which is the oldest record available in the stream. This option is not available for an Amazon Kinesis Data Firehose delivery stream. LAST_STOPPED_POINT - Resume reading from where the application last stopped reading.
    InputStartingPosition:
      type: string
      enum:
        - NOW
        - TRIM_HORIZON
        - LAST_STOPPED_POINT
    AddApplicationInputProcessingConfigurationResponse:
      type: object
      properties:
        ApplicationARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the application.
        ApplicationVersionId:
          $ref: "#/components/schemas/ApplicationVersionId"
          description: Provides the current application version.
        InputId:
          $ref: "#/components/schemas/Id"
          description: The input ID that is associated with the application input. This is the ID that Kinesis Data Analytics assigns to each input configuration that you add to your application.
        InputProcessingConfigurationDescription:
          $ref: "#/components/schemas/InputProcessingConfigurationDescription"
          description: The description of the preprocessor that executes on records in this input before the application's code is run.
    Output:
      description: Describes a SQL-based Kinesis Data Analytics application's output configuration, in which you identify an in-application stream and a destination where you want the in-application stream data to be written. The destination can be a Kinesis data stream or a Kinesis Data Firehose delivery stream.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/InAppStreamName"
          description: The name of the in-application stream.
        KinesisStreamsOutput:
          $ref: "#/components/schemas/KinesisStreamsOutput"
          description: Identifies a Kinesis data stream as the destination.
        KinesisFirehoseOutput:
          $ref: "#/components/schemas/KinesisFirehoseOutput"
          description: Identifies a Kinesis Data Firehose delivery stream as the destination.
        LambdaOutput:
          $ref: "#/components/schemas/LambdaOutput"
          description: Identifies an Amazon Lambda function as the destination.
        DestinationSchema:
          $ref: "#/components/schemas/DestinationSchema"
          description: Describes the data format when records are written to the destination.
      required:
        - Name
        - DestinationSchema
    KinesisStreamsOutput:
      description: When you configure a SQL-based Kinesis Data Analytics application's output, identifies a Kinesis data stream as the destination. You provide the stream Amazon Resource Name (ARN).
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The ARN of the destination Kinesis data stream to write to.
      required:
        - ResourceARN
    KinesisFirehoseOutput:
      description: For a SQL-based Kinesis Data Analytics application, when configuring application output, identifies a Kinesis Data Firehose delivery stream as the destination. You provide the stream Amazon Resource Name (ARN) of the delivery stream.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The ARN of the destination delivery stream to write to.
      required:
        - ResourceARN
    LambdaOutput:
      description: When you configure a SQL-based Kinesis Data Analytics application's output, identifies an Amazon Lambda function as the destination. You provide the function Amazon Resource Name (ARN) of the Lambda function.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: "The Amazon Resource Name (ARN) of the destination Lambda function to write to. To specify an earlier version of the Lambda function than the latest, include the Lambda function version in the Lambda function ARN. For more information about Lambda ARNs, see Example ARNs: Amazon Lambda"
      required:
        - ResourceARN
    DestinationSchema:
      description: Describes the data format when records are written to the destination in a SQL-based Kinesis Data Analytics application.
      type: object
      properties:
        RecordFormatType:
          $ref: "#/components/schemas/RecordFormatType"
          description: Specifies the format of the records on the output stream.
      required:
        - RecordFormatType
    AddApplicationOutputResponse:
      type: object
      properties:
        ApplicationARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The application Amazon Resource Name (ARN).
        ApplicationVersionId:
          $ref: "#/components/schemas/ApplicationVersionId"
          description: The updated application version ID. Kinesis Data Analytics increments this ID when the application is updated.
        OutputDescriptions:
          $ref: "#/components/schemas/OutputDescriptions"
          description: Describes the application output configuration. For more information, see Configuring Application Output.
    OutputDescriptions:
      type: array
      items:
        $ref: "#/components/schemas/OutputDescription"
    OutputDescription:
      description: For a SQL-based Kinesis Data Analytics application, describes the application output configuration, which includes the in-application stream name and the destination where the stream data is written. The destination can be a Kinesis data stream or a Kinesis Data Firehose delivery stream.
      type: object
      properties:
        OutputId:
          $ref: "#/components/schemas/Id"
          description: A unique identifier for the output configuration.
        Name:
          $ref: "#/components/schemas/InAppStreamName"
          description: The name of the in-application stream that is configured as output.
        KinesisStreamsOutputDescription:
          $ref: "#/components/schemas/KinesisStreamsOutputDescription"
          description: Describes the Kinesis data stream that is configured as the destination where output is written.
        KinesisFirehoseOutputDescription:
          $ref: "#/components/schemas/KinesisFirehoseOutputDescription"
          description: Describes the Kinesis Data Firehose delivery stream that is configured as the destination where output is written.
        LambdaOutputDescription:
          $ref: "#/components/schemas/LambdaOutputDescription"
          description: Describes the Lambda function that is configured as the destination where output is written.
        DestinationSchema:
          $ref: "#/components/schemas/DestinationSchema"
          description: The data format used for writing data to the destination.
    KinesisStreamsOutputDescription:
      description: For an SQL-based Kinesis Data Analytics application's output, describes the Kinesis data stream that is configured as its destination.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the Kinesis data stream.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The ARN of the IAM role that Kinesis Data Analytics can assume to access the stream. Provided for backward compatibility. Applications that are created with the current API version have an application-level service execution role rather than a resource-level role.
      required:
        - ResourceARN
    KinesisFirehoseOutputDescription:
      description: For a SQL-based Kinesis Data Analytics application's output, describes the Kinesis Data Firehose delivery stream that is configured as its destination.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the delivery stream.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The ARN of the IAM role that Kinesis Data Analytics can assume to access the stream. Provided for backward compatibility. Applications that are created with the current API version have an application-level service execution role rather than a resource-level role.
      required:
        - ResourceARN
    LambdaOutputDescription:
      description: For a SQL-based Kinesis Data Analytics application's output, describes the Amazon Lambda function that is configured as its destination.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the destination Lambda function.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The ARN of the IAM role that Kinesis Data Analytics can assume to write to the destination function. Provided for backward compatibility. Applications that are created with the current API version have an application-level service execution role rather than a resource-level role.
      required:
        - ResourceARN
    ReferenceDataSource:
      description: For a SQL-based Kinesis Data Analytics application, describes the reference data source by providing the source information (Amazon S3 bucket name and object key name), the resulting in-application table name that is created, and the necessary schema to map the data elements in the Amazon S3 object to the in-application table.
      type: object
      properties:
        TableName:
          $ref: "#/components/schemas/InAppTableName"
          description: The name of the in-application table to create.
        S3ReferenceDataSource:
          $ref: "#/components/schemas/S3ReferenceDataSource"
          description: Identifies the S3 bucket and object that contains the reference data. A SQL-based Kinesis Data Analytics application loads reference data only once. If the data changes, you call the UpdateApplication operation to trigger reloading of data into your application.
        ReferenceSchema:
          $ref: "#/components/schemas/SourceSchema"
          description: Describes the format of the data in the streaming source, and how each data element maps to corresponding columns created in the in-application stream.
      required:
        - TableName
        - ReferenceSchema
    InAppTableName:
      type: string
      minLength: 1
      maxLength: 32
    S3ReferenceDataSource:
      description: For a SQL-based Kinesis Data Analytics application, identifies the Amazon S3 bucket and object that contains the reference data. A SQL-based Kinesis Data Analytics application loads reference data only once. If the data changes, you call the UpdateApplication operation to trigger reloading of data into your application.
      type: object
      properties:
        BucketARN:
          $ref: "#/components/schemas/BucketARN"
          description: The Amazon Resource Name (ARN) of the S3 bucket.
        FileKey:
          $ref: "#/components/schemas/FileKey"
          description: The object key name containing the reference data.
    BucketARN:
