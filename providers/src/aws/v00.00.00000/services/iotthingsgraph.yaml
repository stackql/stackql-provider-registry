  /UpdateFlowTemplate:
    post:
      operationId: UpdateFlowTemplate
      description: Updates the specified workflow. All deployed systems and system instances that use the workflow will see the changes in the flow when it is redeployed. If you don't want this behavior, copy the workflow (creating a new workflow with a different ID), and update the copy. The workflow can contain only entities in the specified namespace.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.UpdateFlowTemplate
            default: IotThingsGraphFrontEndService.UpdateFlowTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/Urn"
                  description: The ID of the workflow to be updated. The ID should be in the following format. urn:tdm:REGION/ACCOUNT ID/default:workflow:WORKFLOWNAME
                definition:
                  $ref: "#/components/schemas/DefinitionDocument"
                  description: The DefinitionDocument that contains the updated workflow definition.
                compatibleNamespaceVersion:
                  $ref: "#/components/schemas/Version"
                  description: The version of the user's namespace. If no value is specified, the latest version is used by default. Use the GetFlowTemplateRevisions if you want to find earlier revisions of the flow to update.
              required:
                - id
                - definition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFlowTemplateResponse"
  /UpdateSystemTemplate:
    post:
      operationId: UpdateSystemTemplate
      description: Updates the specified system. You don't need to run this action after updating a workflow. Any deployment that uses the system will see the changes in the system when it is redeployed.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.UpdateSystemTemplate
