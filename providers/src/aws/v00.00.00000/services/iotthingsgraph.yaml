        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSystemTemplateResponse"
  /UploadEntityDefinitions:
    post:
      operationId: UploadEntityDefinitions
      description: Asynchronously uploads one or more entity definitions to the user's namespace. The document parameter is required if syncWithPublicNamespace and deleteExistingEntites are false. If the syncWithPublicNamespace parameter is set to true, the user's namespace will synchronize with the latest version of the public namespace. If deprecateExistingEntities is set to true, all entities in the latest version will be deleted before the new DefinitionDocument is uploaded. When a user uploads entity definitions for the first time, the service creates a new namespace for the user. The new namespace tracks the public namespace. Currently users can have only one namespace. The namespace version increments whenever a user uploads entity definitions that are backwards-incompatible and whenever a user sets the syncWithPublicNamespace parameter or the deprecateExistingEntities parameter to true. The IDs for all of the entities should be in URN format. Each entity must be in the user's namespace. Users can't create entities in the public namespace, but entity definitions can refer to entities in the public namespace. Valid entities are Device, DeviceModel, Service, Capability, State, Action, Event, Property, Mapping, Enum.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.UploadEntityDefinitions
            default: IotThingsGraphFrontEndService.UploadEntityDefinitions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                document:
                  $ref: "#/components/schemas/DefinitionDocument"
                  description: The DefinitionDocument that defines the updated entities.
                syncWithPublicNamespace:
                  $ref: "#/components/schemas/SyncWithPublicNamespace"
                  description: A Boolean that specifies whether to synchronize with the latest version of the public namespace. If set to true, the upload will create a new namespace version.
                deprecateExistingEntities:
                  $ref: "#/components/schemas/DeprecateExistingEntities"
                  description: A Boolean that specifies whether to deprecate all entities in the latest version before uploading the new DefinitionDocument. If set to true, the upload will create a new namespace version.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadEntityDefinitionsResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ThingName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9:_-]+"
    Urn:
      type: string
      maxLength: 160
      pattern: ^urn:tdm:(([a-z]{2}-(gov-)?[a-z]{4,9}-[0-9]{1,3}/[0-9]+/)*[\p{Alnum}_]+(/[\p{Alnum}_]+)*):([\p{Alpha}]*):([\p{Alnum}_]+(/[\p{Alnum}_]+)*)$
    Version:
      type: integer
      format: int64
    AssociateEntityToThingResponse:
      type: object
    DefinitionDocument:
      description: A document that defines an entity.
      type: object
      properties:
        language:
          $ref: "#/components/schemas/DefinitionLanguage"
          description: The language used to define the entity. GRAPHQL is the only valid value.
        text:
          $ref: "#/components/schemas/DefinitionText"
          description: The GraphQL text that defines the entity.
      required:
        - language
        - text
    DefinitionLanguage:
      type: string
      enum:
        - GRAPHQL
    DefinitionText:
      type: string
      maxLength: 1048576
    CreateFlowTemplateResponse:
      type: object
      properties:
        summary:
          $ref: "#/components/schemas/FlowTemplateSummary"
          description: The summary object that describes the created workflow.
    FlowTemplateSummary:
      description: An object that contains summary information about a workflow.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Urn"
          description: The ID of the workflow.
        arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the workflow.
        revisionNumber:
          $ref: "#/components/schemas/Version"
          description: The revision number of the workflow.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date when the workflow was created.
    Arn:
      type: string
    Timestamp:
      type: string
      format: date-time
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Metadata assigned to an AWS IoT Things Graph resource consisting of a key-value pair.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: The required name of the tag. The string value can be from 1 to 128 Unicode characters in length.
        value:
          $ref: "#/components/schemas/TagValue"
          description: The optional value of the tag. The string value can be from 1 to 256 Unicode characters in length.
      required:
        - key
        - value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValue:
      type: string
      minLength: 1
      maxLength: 256
    DeploymentTarget:
      type: string
      enum:
        - GREENGRASS
        - CLOUD
    GroupName:
      type: string
    S3BucketName:
      type: string
    MetricsConfiguration:
      description: An object that specifies whether cloud metrics are collected in a deployment and, if so, what role is used to collect metrics.
      type: object
      properties:
        cloudMetricEnabled:
          $ref: "#/components/schemas/Enabled"
          description: A Boolean that specifies whether cloud metrics are collected.
        metricRuleRoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of the role that is used to collect cloud metrics.
    Enabled:
      type: boolean
    RoleArn:
      type: string
      minLength: 20
      maxLength: 2048
    CreateSystemInstanceResponse:
      type: object
      properties:
        summary:
          $ref: "#/components/schemas/SystemInstanceSummary"
          description: The summary object that describes the new system instance.
    SystemInstanceSummary:
      description: An object that contains summary information about a system instance.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Urn"
          description: The ID of the system instance.
        arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the system instance.
        status:
          $ref: "#/components/schemas/SystemInstanceDeploymentStatus"
          description: The status of the system instance.
        target:
          $ref: "#/components/schemas/DeploymentTarget"
          description: The target of the system instance.
        greengrassGroupName:
          $ref: "#/components/schemas/GroupName"
          description: The ID of the Greengrass group where the system instance is deployed.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date when the system instance was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the system instance was last updated.
        greengrassGroupId:
          $ref: "#/components/schemas/GreengrassGroupId"
          description: The ID of the Greengrass group where the system instance is deployed.
        greengrassGroupVersionId:
          $ref: "#/components/schemas/GreengrassGroupVersionId"
          description: The version of the Greengrass group where the system instance is deployed.
    SystemInstanceDeploymentStatus:
      type: string
      enum:
        - NOT_DEPLOYED
        - BOOTSTRAP
        - DEPLOY_IN_PROGRESS
        - DEPLOYED_IN_TARGET
        - UNDEPLOY_IN_PROGRESS
        - FAILED
        - PENDING_DELETE
        - DELETED_IN_TARGET
    GreengrassGroupId:
      type: string
    GreengrassGroupVersionId:
      type: string
    CreateSystemTemplateResponse:
      type: object
      properties:
        summary:
          $ref: "#/components/schemas/SystemTemplateSummary"
          description: The summary object that describes the created system.
    SystemTemplateSummary:
      description: An object that contains information about a system.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Urn"
          description: The ID of the system.
        arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the system.
        revisionNumber:
          $ref: "#/components/schemas/Version"
          description: The revision number of the system.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date when the system was created.
    DeleteFlowTemplateResponse:
      type: object
    DeleteNamespaceResponse:
      type: object
      properties:
        namespaceArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the namespace to be deleted.
        namespaceName:
          $ref: "#/components/schemas/NamespaceName"
          description: The name of the namespace to be deleted.
    NamespaceName:
      type: string
      maxLength: 128
    DeleteSystemInstanceResponse:
      type: object
    DeleteSystemTemplateResponse:
      type: object
    DeploySystemInstanceResponse:
      type: object
      properties:
        summary:
          $ref: "#/components/schemas/SystemInstanceSummary"
          description: An object that contains summary information about a system instance that was deployed.
        greengrassDeploymentId:
          $ref: "#/components/schemas/GreengrassDeploymentId"
          description: The ID of the Greengrass deployment used to deploy the system instance.
      required:
        - summary
    GreengrassDeploymentId:
      type: string
    DeprecateFlowTemplateResponse:
      type: object
    DeprecateSystemTemplateResponse:
      type: object
    DescribeNamespaceResponse:
      type: object
      properties:
        namespaceArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the namespace.
        namespaceName:
          $ref: "#/components/schemas/NamespaceName"
          description: The name of the namespace.
        trackingNamespaceName:
          $ref: "#/components/schemas/NamespaceName"
          description: The name of the public namespace that the latest namespace version is tracking.
        trackingNamespaceVersion:
          $ref: "#/components/schemas/Version"
          description: The version of the public namespace that the latest version is tracking.
        namespaceVersion:
          $ref: "#/components/schemas/Version"
          description: The version of the user's namespace to describe.
    EntityType:
      type: string
      enum:
        - DEVICE
        - SERVICE
        - DEVICE_MODEL
        - CAPABILITY
        - STATE
        - ACTION
        - EVENT
        - PROPERTY
        - MAPPING
        - ENUM
    DissociateEntityFromThingResponse:
      type: object
    Urns:
      type: array
      items:
