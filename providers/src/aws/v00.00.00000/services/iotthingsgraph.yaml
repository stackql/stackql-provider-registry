openapi: 3.0.0
info:
  version: "2018-09-06"
  title: AWS IoT Things Graph
  description: AWS IoT Things Graph
  x-serviceName: iotthingsgraph
  x-serviceAlias: iotthingsgraph
  x-protocol: json
  x-apiVersion: "2018-09-06"
  x-endpointPrefix: iotthingsgraph
  x-targetPrefix: IotThingsGraphFrontEndService
  x-jsonVersion: "1.1"
servers:
  - url: https://iotthingsgraph.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for iotthingsgraph
paths:
  /AssociateEntityToThing:
    post:
      operationId: AssociateEntityToThing
      description: Associates a device with a concrete thing that is in the user's registry. A thing can be associated with only one device at a time. If you associate a thing with a new device id, its previous association will be removed.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.AssociateEntityToThing
            default: IotThingsGraphFrontEndService.AssociateEntityToThing
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                thingName:
                  $ref: "#/components/schemas/ThingName"
                  description: The name of the thing to which the entity is to be associated.
                entityId:
                  $ref: "#/components/schemas/Urn"
                  description: The ID of the device to be associated with the thing. The ID should be in the following format. urn:tdm:REGION/ACCOUNT ID/default:device:DEVICENAME
                namespaceVersion:
                  $ref: "#/components/schemas/Version"
                  description: The version of the user's namespace. Defaults to the latest version of the user's namespace.
              required:
                - thingName
                - entityId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateEntityToThingResponse"
  /CreateFlowTemplate:
    post:
      operationId: CreateFlowTemplate
      description: Creates a workflow template. Workflows can be created only in the user's namespace. (The public namespace contains only entities.) The workflow can contain only entities in the specified namespace. The workflow is validated against the entities in the latest version of the user's namespace unless another namespace version is specified in the request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.CreateFlowTemplate
            default: IotThingsGraphFrontEndService.CreateFlowTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                definition:
                  $ref: "#/components/schemas/DefinitionDocument"
                  description: The workflow DefinitionDocument.
                compatibleNamespaceVersion:
                  $ref: "#/components/schemas/Version"
                  description: The namespace version in which the workflow is to be created. If no value is specified, the latest version is used by default.
              required:
                - definition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFlowTemplateResponse"
  /CreateSystemInstance:
    post:
      operationId: CreateSystemInstance
      description: Creates a system instance. This action validates the system instance, prepares the deployment-related resources. For Greengrass deployments, it updates the Greengrass group that is specified by the greengrassGroupName parameter. It also adds a file to the S3 bucket specified by the s3BucketName parameter. You need to call DeploySystemInstance after running this action. For Greengrass deployments, since this action modifies and adds resources to a Greengrass group and an S3 bucket on the caller's behalf, the calling identity must have write permissions to both the specified Greengrass group and S3 bucket. Otherwise, the call will fail with an authorization error. For cloud deployments, this action requires a flowActionsRoleArn value. This is an IAM role that has permissions to access AWS services, such as AWS Lambda and AWS IoT, that the flow uses when it executes. If the definition document doesn't specify a version of the user's namespace, the latest version will be used by default.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.CreateSystemInstance
            default: IotThingsGraphFrontEndService.CreateSystemInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: Metadata, consisting of key-value pairs, that can be used to categorize your system instances.
                definition:
                  $ref: "#/components/schemas/DefinitionDocument"
                target:
                  $ref: "#/components/schemas/DeploymentTarget"
                  description: The target type of the deployment. Valid values are GREENGRASS and CLOUD.
                greengrassGroupName:
                  $ref: "#/components/schemas/GroupName"
                  description: The name of the Greengrass group where the system instance will be deployed. This value is required if the value of the target parameter is GREENGRASS.
                s3BucketName:
                  $ref: "#/components/schemas/S3BucketName"
                  description: The name of the Amazon Simple Storage Service bucket that will be used to store and deploy the system instance's resource file. This value is required if the value of the target parameter is GREENGRASS.
                metricsConfiguration:
                  $ref: "#/components/schemas/MetricsConfiguration"
                flowActionsRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The ARN of the IAM role that AWS IoT Things Graph will assume when it executes the flow. This role must have read and write access to AWS Lambda and AWS IoT and any other AWS services that the flow uses when it executes. This value is required if the value of the target parameter is CLOUD.
              required:
                - definition
                - target
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSystemInstanceResponse"
  /CreateSystemTemplate:
    post:
      operationId: CreateSystemTemplate
      description: Creates a system. The system is validated against the entities in the latest version of the user's namespace unless another namespace version is specified in the request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.CreateSystemTemplate
            default: IotThingsGraphFrontEndService.CreateSystemTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                definition:
                  $ref: "#/components/schemas/DefinitionDocument"
                  description: The DefinitionDocument used to create the system.
                compatibleNamespaceVersion:
                  $ref: "#/components/schemas/Version"
                  description: The namespace version in which the system is to be created. If no value is specified, the latest version is used by default.
              required:
                - definition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSystemTemplateResponse"
  /DeleteFlowTemplate:
    post:
      operationId: DeleteFlowTemplate
      description: Deletes a workflow. Any new system or deployment that contains this workflow will fail to update or deploy. Existing deployments that contain the workflow will continue to run (since they use a snapshot of the workflow taken at the time of deployment).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.DeleteFlowTemplate
            default: IotThingsGraphFrontEndService.DeleteFlowTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/Urn"
                  description: The ID of the workflow to be deleted. The ID should be in the following format. urn:tdm:REGION/ACCOUNT ID/default:workflow:WORKFLOWNAME
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteFlowTemplateResponse"
  /DeleteNamespace:
    post:
      operationId: DeleteNamespace
      description: Deletes the specified namespace. This action deletes all of the entities in the namespace. Delete the systems and flows that use entities in the namespace before performing this action. This action takes no request parameters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.DeleteNamespace
            default: IotThingsGraphFrontEndService.DeleteNamespace
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteNamespaceResponse"
  /DeleteSystemInstance:
    post:
      operationId: DeleteSystemInstance
      description: Deletes a system instance. Only system instances that have never been deployed, or that have been undeployed can be deleted. Users can create a new system instance that has the same ID as a deleted system instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.DeleteSystemInstance
            default: IotThingsGraphFrontEndService.DeleteSystemInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/Urn"
                  description: The ID of the system instance to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSystemInstanceResponse"
  /DeleteSystemTemplate:
    post:
      operationId: DeleteSystemTemplate
      description: Deletes a system. New deployments can't contain the system after its deletion. Existing deployments that contain the system will continue to work because they use a snapshot of the system that is taken when it is deployed.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.DeleteSystemTemplate
            default: IotThingsGraphFrontEndService.DeleteSystemTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/Urn"
                  description: The ID of the system to be deleted. The ID should be in the following format. urn:tdm:REGION/ACCOUNT ID/default:system:SYSTEMNAME
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSystemTemplateResponse"
  /DeploySystemInstance:
    post:
      operationId: DeploySystemInstance
      description: Greengrass and Cloud Deployments Deploys the system instance to the target specified in CreateSystemInstance. Greengrass Deployments If the system or any workflows and entities have been updated before this action is called, then the deployment will create a new Amazon Simple Storage Service resource file and then deploy it. Since this action creates a Greengrass deployment on the caller's behalf, the calling identity must have write permissions to the specified Greengrass group. Otherwise, the call will fail with an authorization error. For information about the artifacts that get added to your Greengrass core device when you use this API, see AWS IoT Things Graph and AWS IoT Greengrass.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.DeploySystemInstance
            default: IotThingsGraphFrontEndService.DeploySystemInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/Urn"
                  description: The ID of the system instance. This value is returned by the CreateSystemInstance action. The ID should be in the following format. urn:tdm:REGION/ACCOUNT ID/default:deployment:DEPLOYMENTNAME
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploySystemInstanceResponse"
  /DeprecateFlowTemplate:
    post:
      operationId: DeprecateFlowTemplate
      description: Deprecates the specified workflow. This action marks the workflow for deletion. Deprecated flows can't be deployed, but existing deployments will continue to run.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.DeprecateFlowTemplate
            default: IotThingsGraphFrontEndService.DeprecateFlowTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/Urn"
                  description: The ID of the workflow to be deleted. The ID should be in the following format. urn:tdm:REGION/ACCOUNT ID/default:workflow:WORKFLOWNAME
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeprecateFlowTemplateResponse"
  /DeprecateSystemTemplate:
    post:
      operationId: DeprecateSystemTemplate
      description: Deprecates the specified system.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.DeprecateSystemTemplate
            default: IotThingsGraphFrontEndService.DeprecateSystemTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/Urn"
                  description: The ID of the system to delete. The ID should be in the following format. urn:tdm:REGION/ACCOUNT ID/default:system:SYSTEMNAME
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeprecateSystemTemplateResponse"
  /DescribeNamespace:
    post:
      operationId: DescribeNamespace
      description: Gets the latest version of the user's namespace and the public version that it is tracking.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.DescribeNamespace
            default: IotThingsGraphFrontEndService.DescribeNamespace
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                namespaceName:
                  $ref: "#/components/schemas/NamespaceName"
                  description: The name of the user's namespace. Set this to aws to get the public namespace.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeNamespaceResponse"
  /DissociateEntityFromThing:
    post:
      operationId: DissociateEntityFromThing
      description: Dissociates a device entity from a concrete thing. The action takes only the type of the entity that you need to dissociate because only one entity of a particular type can be associated with a thing.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.DissociateEntityFromThing
            default: IotThingsGraphFrontEndService.DissociateEntityFromThing
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                thingName:
                  $ref: "#/components/schemas/ThingName"
                  description: The name of the thing to disassociate.
                entityType:
                  $ref: "#/components/schemas/EntityType"
                  description: The entity type from which to disassociate the thing.
              required:
                - thingName
                - entityType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DissociateEntityFromThingResponse"
  /GetEntities:
    post:
      operationId: GetEntities
      description: Gets definitions of the specified entities. Uses the latest version of the user's namespace by default. This API returns the following TDM entities. Properties States Events Actions Capabilities Mappings Devices Device Models Services This action doesn't return definitions for systems, flows, and deployments.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.GetEntities
            default: IotThingsGraphFrontEndService.GetEntities
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ids:
                  $ref: "#/components/schemas/Urns"
                  description: An array of entity IDs. The IDs should be in the following format. urn:tdm:REGION/ACCOUNT ID/default:device:DEVICENAME
                namespaceVersion:
                  $ref: "#/components/schemas/Version"
                  description: The version of the user's namespace. Defaults to the latest version of the user's namespace.
              required:
                - ids
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEntitiesResponse"
  /GetFlowTemplate:
    post:
      operationId: GetFlowTemplate
      description: Gets the latest version of the DefinitionDocument and FlowTemplateSummary for the specified workflow.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.GetFlowTemplate
            default: IotThingsGraphFrontEndService.GetFlowTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/Urn"
                  description: The ID of the workflow. The ID should be in the following format. urn:tdm:REGION/ACCOUNT ID/default:workflow:WORKFLOWNAME
                revisionNumber:
                  $ref: "#/components/schemas/Version"
                  description: The number of the workflow revision to retrieve.
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFlowTemplateResponse"
  /GetFlowTemplateRevisions:
    post:
      operationId: GetFlowTemplateRevisions
      description: Gets revisions of the specified workflow. Only the last 100 revisions are stored. If the workflow has been deprecated, this action will return revisions that occurred before the deprecation. This action won't work for workflows that have been deleted.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.GetFlowTemplateRevisions
            default: IotThingsGraphFrontEndService.GetFlowTemplateRevisions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/Urn"
                  description: The ID of the workflow. The ID should be in the following format. urn:tdm:REGION/ACCOUNT ID/default:workflow:WORKFLOWNAME
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The string that specifies the next page of results. Use this when you're paginating results.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return in the response.
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFlowTemplateRevisionsResponse"
  /GetNamespaceDeletionStatus:
    post:
      operationId: GetNamespaceDeletionStatus
      description: Gets the status of a namespace deletion task.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.GetNamespaceDeletionStatus
            default: IotThingsGraphFrontEndService.GetNamespaceDeletionStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetNamespaceDeletionStatusResponse"
  /GetSystemInstance:
    post:
      operationId: GetSystemInstance
      description: Gets a system instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.GetSystemInstance
            default: IotThingsGraphFrontEndService.GetSystemInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/Urn"
                  description: The ID of the system deployment instance. This value is returned by CreateSystemInstance. The ID should be in the following format. urn:tdm:REGION/ACCOUNT ID/default:deployment:DEPLOYMENTNAME
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSystemInstanceResponse"
  /GetSystemTemplate:
    post:
      operationId: GetSystemTemplate
      description: Gets a system.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.GetSystemTemplate
            default: IotThingsGraphFrontEndService.GetSystemTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/Urn"
                  description: The ID of the system to get. This ID must be in the user's namespace. The ID should be in the following format. urn:tdm:REGION/ACCOUNT ID/default:system:SYSTEMNAME
                revisionNumber:
                  $ref: "#/components/schemas/Version"
                  description: The number that specifies the revision of the system to get.
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSystemTemplateResponse"
  /GetSystemTemplateRevisions:
    post:
      operationId: GetSystemTemplateRevisions
      description: Gets revisions made to the specified system template. Only the previous 100 revisions are stored. If the system has been deprecated, this action will return the revisions that occurred before its deprecation. This action won't work with systems that have been deleted.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.GetSystemTemplateRevisions
            default: IotThingsGraphFrontEndService.GetSystemTemplateRevisions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/Urn"
                  description: The ID of the system template. The ID should be in the following format. urn:tdm:REGION/ACCOUNT ID/default:system:SYSTEMNAME
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The string that specifies the next page of results. Use this when you're paginating results.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return in the response.
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSystemTemplateRevisionsResponse"
  /GetUploadStatus:
    post:
      operationId: GetUploadStatus
      description: Gets the status of the specified upload.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.GetUploadStatus
            default: IotThingsGraphFrontEndService.GetUploadStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                uploadId:
                  $ref: "#/components/schemas/UploadId"
                  description: The ID of the upload. This value is returned by the UploadEntityDefinitions action.
              required:
                - uploadId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUploadStatusResponse"
  /ListFlowExecutionMessages:
    post:
      operationId: ListFlowExecutionMessages
      description: Returns a list of objects that contain information about events in a flow execution.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.ListFlowExecutionMessages
            default: IotThingsGraphFrontEndService.ListFlowExecutionMessages
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                flowExecutionId:
                  $ref: "#/components/schemas/FlowExecutionId"
                  description: The ID of the flow execution.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The string that specifies the next page of results. Use this when you're paginating results.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return in the response.
              required:
                - flowExecutionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFlowExecutionMessagesResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists all tags on an AWS IoT Things Graph resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - IotThingsGraphFrontEndService.ListTagsForResource
