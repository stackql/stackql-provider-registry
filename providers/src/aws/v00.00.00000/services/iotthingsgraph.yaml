                definition:
                  $ref: "#/components/schemas/DefinitionDocument"
                  description: The DefinitionDocument that contains the updated system definition.
                compatibleNamespaceVersion:
                  $ref: "#/components/schemas/Version"
                  description: The version of the user's namespace. Defaults to the latest version of the user's namespace. If no value is specified, the latest version is used by default.
              required:
