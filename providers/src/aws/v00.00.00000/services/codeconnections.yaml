openapi: 3.0.0
info:
  version: "2023-12-01"
  title: AWS CodeConnections
  description: AWS CodeConnections
  x-serviceName: codeconnections
  x-serviceAlias: codeconnections
  x-protocol: json
  x-apiVersion: "2023-12-01"
  x-endpointPrefix: codeconnections
  x-targetPrefix: com.amazonaws.codeconnections.CodeConnections_20231201
  x-jsonVersion: "1.0"
servers:
  - url: https://codeconnections.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for codeconnections
paths:
  /CreateConnection:
    post:
      operationId: CreateConnection
      description: Creates a connection that can then be given to other Amazon Web Services services like CodePipeline so that it can access third-party code repositories. The connection is in pending status until the third-party connection handshake is completed from the console.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.CreateConnection
            default: com.amazonaws.codeconnections.CodeConnections_20231201.CreateConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ProviderType:
                  $ref: "#/components/schemas/ProviderType"
                  description: The name of the external provider where your third-party code repository is configured.
                ConnectionName:
                  $ref: "#/components/schemas/ConnectionName"
                  description: The name of the connection to be created.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The key-value pair to use when tagging the resource.
                HostArn:
                  $ref: "#/components/schemas/HostArn"
                  description: The Amazon Resource Name (ARN) of the host associated with the connection to be created.
              required:
                - ConnectionName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectionOutput"
  /CreateHost:
    post:
      operationId: CreateHost
      description: Creates a resource that represents the infrastructure where a third-party provider is installed. The host is used when you create connections to an installed third-party provider type, such as GitHub Enterprise Server. You create one host for all connections to that provider. A host created through the CLI or the SDK is in `PENDING` status by default. You can make its status `AVAILABLE` by setting up the host in the console.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.CreateHost
            default: com.amazonaws.codeconnections.CodeConnections_20231201.CreateHost
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/HostName"
                  description: The name of the host to be created.
                ProviderType:
                  $ref: "#/components/schemas/ProviderType"
                  description: The name of the installed provider to be associated with your connection. The host resource represents the infrastructure where your provider type is installed. The valid provider type is GitHub Enterprise Server.
                ProviderEndpoint:
                  $ref: "#/components/schemas/Url"
                  description: The endpoint of the infrastructure to be represented by the host after it is created.
                VpcConfiguration:
                  $ref: "#/components/schemas/VpcConfiguration"
                  description: The VPC configuration to be provisioned for the host. A VPC must be configured and the infrastructure to be represented by the host must already be connected to the VPC.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Tags for the host to be created.
              required:
                - ProviderType
                - ProviderEndpoint
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateHostOutput"
  /CreateRepositoryLink:
    post:
      operationId: CreateRepositoryLink
      description: Creates a link to a specified external Git repository. A repository link allows Git sync to monitor and sync changes to files in a specified Git repository.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.CreateRepositoryLink
            default: com.amazonaws.codeconnections.CodeConnections_20231201.CreateRepositoryLink
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ConnectionArn:
                  $ref: "#/components/schemas/ConnectionArn"
                  description: The Amazon Resource Name (ARN) of the connection to be associated with the repository link.
                OwnerId:
                  $ref: "#/components/schemas/OwnerId"
                  description: The owner ID for the repository associated with a specific sync configuration, such as the owner ID in GitHub.
                RepositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The name of the repository to be associated with the repository link.
                EncryptionKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                  description: The Amazon Resource Name (ARN) encryption key for the repository to be associated with the repository link.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags for the repository to be associated with the repository link.
              required:
                - ConnectionArn
                - OwnerId
                - RepositoryName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRepositoryLinkOutput"
  /CreateSyncConfiguration:
    post:
      operationId: CreateSyncConfiguration
      description: Creates a sync configuration which allows Amazon Web Services to sync content from a Git repository to update a specified Amazon Web Services resource. Parameters for the sync configuration are determined by the sync type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.CreateSyncConfiguration
            default: com.amazonaws.codeconnections.CodeConnections_20231201.CreateSyncConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Branch:
                  $ref: "#/components/schemas/BranchName"
                  description: The branch in the repository from which changes will be synced.
                ConfigFile:
                  $ref: "#/components/schemas/DeploymentFilePath"
                  description: The file name of the configuration file that manages syncing between the connection and the repository. This configuration file is stored in the repository.
                RepositoryLinkId:
                  $ref: "#/components/schemas/RepositoryLinkId"
                  description: The ID of the repository link created for the connection. A repository link allows Git sync to monitor and sync changes to files in a specified Git repository.
                ResourceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Amazon Web Services resource (for example, a CloudFormation stack in the case of CFN_STACK_SYNC) that will be synchronized from the linked repository.
                RoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The ARN of the IAM role that grants permission for Amazon Web Services to use Git sync to update a given Amazon Web Services resource on your behalf.
                SyncType:
                  $ref: "#/components/schemas/SyncConfigurationType"
                  description: The type of sync configuration.
                PublishDeploymentStatus:
                  $ref: "#/components/schemas/PublishDeploymentStatus"
                  description: Whether to enable or disable publishing of deployment status to source providers.
                TriggerResourceUpdateOn:
                  $ref: "#/components/schemas/TriggerResourceUpdateOn"
                  description: When to trigger Git sync to begin the stack update.
                PullRequestComment:
                  $ref: "#/components/schemas/PullRequestComment"
                  description: A toggle that specifies whether to enable or disable pull request comments for the sync configuration to be created.
              required:
                - Branch
                - ConfigFile
                - RepositoryLinkId
                - ResourceName
                - RoleArn
                - SyncType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSyncConfigurationOutput"
  /DeleteConnection:
    post:
      operationId: DeleteConnection
      description: The connection to be deleted.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.DeleteConnection
            default: com.amazonaws.codeconnections.CodeConnections_20231201.DeleteConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ConnectionArn:
                  $ref: "#/components/schemas/ConnectionArn"
                  description: The Amazon Resource Name (ARN) of the connection to be deleted. The ARN is never reused if the connection is deleted.
              required:
                - ConnectionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteConnectionOutput"
  /DeleteHost:
    post:
      operationId: DeleteHost
      description: The host to be deleted. Before you delete a host, all connections associated to the host must be deleted. A host cannot be deleted if it is in the VPC_CONFIG_INITIALIZING or VPC_CONFIG_DELETING state.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.DeleteHost
            default: com.amazonaws.codeconnections.CodeConnections_20231201.DeleteHost
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                HostArn:
                  $ref: "#/components/schemas/HostArn"
                  description: The Amazon Resource Name (ARN) of the host to be deleted.
              required:
                - HostArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteHostOutput"
  /DeleteRepositoryLink:
    post:
      operationId: DeleteRepositoryLink
      description: Deletes the association between your connection and a specified external Git repository.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.DeleteRepositoryLink
            default: com.amazonaws.codeconnections.CodeConnections_20231201.DeleteRepositoryLink
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                RepositoryLinkId:
                  $ref: "#/components/schemas/RepositoryLinkId"
                  description: The ID of the repository link to be deleted.
              required:
                - RepositoryLinkId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRepositoryLinkOutput"
  /DeleteSyncConfiguration:
    post:
      operationId: DeleteSyncConfiguration
      description: Deletes the sync configuration for a specified repository and connection.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.DeleteSyncConfiguration
            default: com.amazonaws.codeconnections.CodeConnections_20231201.DeleteSyncConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                SyncType:
                  $ref: "#/components/schemas/SyncConfigurationType"
                  description: The type of sync configuration to be deleted.
                ResourceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Amazon Web Services resource associated with the sync configuration to be deleted.
              required:
                - SyncType
                - ResourceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSyncConfigurationOutput"
  /GetConnection:
    post:
      operationId: GetConnection
      description: Returns the connection ARN and details such as status, owner, and provider type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.GetConnection
            default: com.amazonaws.codeconnections.CodeConnections_20231201.GetConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ConnectionArn:
                  $ref: "#/components/schemas/ConnectionArn"
                  description: The Amazon Resource Name (ARN) of a connection.
              required:
                - ConnectionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectionOutput"
  /GetHost:
    post:
      operationId: GetHost
      description: Returns the host ARN and details such as status, provider type, endpoint, and, if applicable, the VPC configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.GetHost
            default: com.amazonaws.codeconnections.CodeConnections_20231201.GetHost
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                HostArn:
                  $ref: "#/components/schemas/HostArn"
                  description: The Amazon Resource Name (ARN) of the requested host.
              required:
                - HostArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetHostOutput"
  /GetRepositoryLink:
    post:
      operationId: GetRepositoryLink
      description: Returns details about a repository link. A repository link allows Git sync to monitor and sync changes from files in a specified Git repository.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.GetRepositoryLink
            default: com.amazonaws.codeconnections.CodeConnections_20231201.GetRepositoryLink
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                RepositoryLinkId:
                  $ref: "#/components/schemas/RepositoryLinkId"
                  description: The ID of the repository link to get.
              required:
                - RepositoryLinkId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRepositoryLinkOutput"
  /GetRepositorySyncStatus:
    post:
      operationId: GetRepositorySyncStatus
      description: Returns details about the sync status for a repository. A repository sync uses Git sync to push and pull changes from your remote repository.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.GetRepositorySyncStatus
            default: com.amazonaws.codeconnections.CodeConnections_20231201.GetRepositorySyncStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Branch:
                  $ref: "#/components/schemas/BranchName"
                  description: The branch of the repository link for the requested repository sync status.
                RepositoryLinkId:
                  $ref: "#/components/schemas/RepositoryLinkId"
                  description: The repository link ID for the requested repository sync status.
                SyncType:
                  $ref: "#/components/schemas/SyncConfigurationType"
                  description: The sync type of the requested sync status.
              required:
                - Branch
                - RepositoryLinkId
                - SyncType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRepositorySyncStatusOutput"
  /GetResourceSyncStatus:
    post:
      operationId: GetResourceSyncStatus
      description: Returns the status of the sync with the Git repository for a specific Amazon Web Services resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.GetResourceSyncStatus
            default: com.amazonaws.codeconnections.CodeConnections_20231201.GetResourceSyncStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Amazon Web Services resource for the sync status with the Git repository.
                SyncType:
                  $ref: "#/components/schemas/SyncConfigurationType"
                  description: The sync type for the sync status with the Git repository.
              required:
                - ResourceName
                - SyncType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourceSyncStatusOutput"
  /GetSyncBlockerSummary:
    post:
      operationId: GetSyncBlockerSummary
      description: Returns a list of the most recent sync blockers.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.GetSyncBlockerSummary
            default: com.amazonaws.codeconnections.CodeConnections_20231201.GetSyncBlockerSummary
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                SyncType:
                  $ref: "#/components/schemas/SyncConfigurationType"
                  description: The sync type for the sync blocker summary.
                ResourceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Amazon Web Services resource currently blocked from automatically being synced from a Git repository.
              required:
                - SyncType
                - ResourceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSyncBlockerSummaryOutput"
  /GetSyncConfiguration:
    post:
      operationId: GetSyncConfiguration
      description: Returns details about a sync configuration, including the sync type and resource name. A sync configuration allows the configuration to sync (push and pull) changes from the remote repository for a specified branch in a Git repository.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.GetSyncConfiguration
            default: com.amazonaws.codeconnections.CodeConnections_20231201.GetSyncConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                SyncType:
                  $ref: "#/components/schemas/SyncConfigurationType"
                  description: The sync type for the sync configuration for which you want to retrieve information.
                ResourceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Amazon Web Services resource for the sync configuration for which you want to retrieve information.
              required:
                - SyncType
                - ResourceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSyncConfigurationOutput"
  /ListConnections:
    post:
      operationId: ListConnections
      description: Lists the connections associated with your account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.ListConnections
            default: com.amazonaws.codeconnections.CodeConnections_20231201.ListConnections
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ProviderTypeFilter:
                  $ref: "#/components/schemas/ProviderType"
                  description: Filters the list of connections to those associated with a specified provider, such as Bitbucket.
                HostArnFilter:
                  $ref: "#/components/schemas/HostArn"
                  description: Filters the list of connections to those associated with a specified host.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return in a single call. To retrieve the remaining results, make another call with the returned nextToken value.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token that was returned from the previous ListConnections call, which can be used to return the next set of connections in the list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConnectionsOutput"
  /ListHosts:
    post:
      operationId: ListHosts
      description: Lists the hosts associated with your account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.ListHosts
            default: com.amazonaws.codeconnections.CodeConnections_20231201.ListHosts
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return in a single call. To retrieve the remaining results, make another call with the returned nextToken value.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token that was returned from the previous ListHosts call, which can be used to return the next set of hosts in the list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListHostsOutput"
  /ListRepositoryLinks:
    post:
      operationId: ListRepositoryLinks
      description: Lists the repository links created for connections in your account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.ListRepositoryLinks
            default: com.amazonaws.codeconnections.CodeConnections_20231201.ListRepositoryLinks
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: A non-zero, non-negative integer used to limit the number of returned results.
                NextToken:
                  $ref: "#/components/schemas/SharpNextToken"
                  description: An enumeration token that, when provided in a request, returns the next batch of the results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRepositoryLinksOutput"
  /ListRepositorySyncDefinitions:
    post:
      operationId: ListRepositorySyncDefinitions
      description: Lists the repository sync definitions for repository links in your account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.ListRepositorySyncDefinitions
            default: com.amazonaws.codeconnections.CodeConnections_20231201.ListRepositorySyncDefinitions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                RepositoryLinkId:
                  $ref: "#/components/schemas/RepositoryLinkId"
                  description: The ID of the repository link for the sync definition for which you want to retrieve information.
                SyncType:
                  $ref: "#/components/schemas/SyncConfigurationType"
                  description: The sync type of the repository link for the the sync definition for which you want to retrieve information.
              required:
                - RepositoryLinkId
                - SyncType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRepositorySyncDefinitionsOutput"
  /ListSyncConfigurations:
    post:
      operationId: ListSyncConfigurations
      description: Returns a list of sync configurations for a specified repository.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.ListSyncConfigurations
            default: com.amazonaws.codeconnections.CodeConnections_20231201.ListSyncConfigurations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: A non-zero, non-negative integer used to limit the number of returned results.
                NextToken:
                  $ref: "#/components/schemas/SharpNextToken"
                  description: An enumeration token that allows the operation to batch the results of the operation.
                RepositoryLinkId:
                  $ref: "#/components/schemas/RepositoryLinkId"
                  description: The ID of the repository link for the requested list of sync configurations.
                SyncType:
                  $ref: "#/components/schemas/SyncConfigurationType"
                  description: The sync type for the requested list of sync configurations.
              required:
                - RepositoryLinkId
                - SyncType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSyncConfigurationsOutput"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Gets the set of key-value pairs (metadata) that are used to manage the resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.ListTagsForResource
            default: com.amazonaws.codeconnections.CodeConnections_20231201.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the resource for which you want to get information about tags, if any.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds to or modifies the tags of the given resource. Tags are metadata that can be used to manage a resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.TagResource
            default: com.amazonaws.codeconnections.CodeConnections_20231201.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the resource to which you want to add or update tags.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags you want to modify or add to the resource.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes tags from an Amazon Web Services resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.UntagResource
            default: com.amazonaws.codeconnections.CodeConnections_20231201.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the resource to remove tags from.
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: The list of keys for the tags to be removed from the resource.
              required:
                - ResourceArn
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /UpdateHost:
    post:
      operationId: UpdateHost
      description: Updates a specified host with the provided configurations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.UpdateHost
            default: com.amazonaws.codeconnections.CodeConnections_20231201.UpdateHost
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                HostArn:
                  $ref: "#/components/schemas/HostArn"
                  description: The Amazon Resource Name (ARN) of the host to be updated.
                ProviderEndpoint:
                  $ref: "#/components/schemas/Url"
                  description: The URL or endpoint of the host to be updated.
                VpcConfiguration:
                  $ref: "#/components/schemas/VpcConfiguration"
                  description: The VPC configuration of the host to be updated. A VPC must be configured and the infrastructure to be represented by the host must already be connected to the VPC.
              required:
                - HostArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateHostOutput"
  /UpdateRepositoryLink:
    post:
      operationId: UpdateRepositoryLink
      description: Updates the association between your connection and a specified external Git repository. A repository link allows Git sync to monitor and sync changes to files in a specified Git repository.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.UpdateRepositoryLink
            default: com.amazonaws.codeconnections.CodeConnections_20231201.UpdateRepositoryLink
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ConnectionArn:
                  $ref: "#/components/schemas/ConnectionArn"
                  description: The Amazon Resource Name (ARN) of the connection for the repository link to be updated. The updated connection ARN must have the same providerType (such as GitHub) as the original connection ARN for the repo link.
                EncryptionKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                  description: The Amazon Resource Name (ARN) of the encryption key for the repository link to be updated.
                RepositoryLinkId:
                  $ref: "#/components/schemas/RepositoryLinkId"
                  description: The ID of the repository link to be updated.
              required:
                - RepositoryLinkId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRepositoryLinkOutput"
  /UpdateSyncBlocker:
    post:
      operationId: UpdateSyncBlocker
      description: Allows you to update the status of a sync blocker, resolving the blocker and allowing syncing to continue.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.UpdateSyncBlocker
            default: com.amazonaws.codeconnections.CodeConnections_20231201.UpdateSyncBlocker
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/Id"
                  description: The ID of the sync blocker to be updated.
                SyncType:
                  $ref: "#/components/schemas/SyncConfigurationType"
                  description: The sync type of the sync blocker to be updated.
                ResourceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the resource for the sync blocker to be updated.
                ResolvedReason:
                  $ref: "#/components/schemas/ResolvedReason"
                  description: The reason for resolving the sync blocker.
              required:
                - Id
                - SyncType
                - ResourceName
                - ResolvedReason
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSyncBlockerOutput"
  /UpdateSyncConfiguration:
    post:
      operationId: UpdateSyncConfiguration
      description: Updates the sync configuration for your connection and a specified external Git repository.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - com.amazonaws.codeconnections.CodeConnections_20231201.UpdateSyncConfiguration
            default: com.amazonaws.codeconnections.CodeConnections_20231201.UpdateSyncConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Branch:
                  $ref: "#/components/schemas/BranchName"
                  description: The branch for the sync configuration to be updated.
                ConfigFile:
                  $ref: "#/components/schemas/DeploymentFilePath"
                  description: The configuration file for the sync configuration to be updated.
                RepositoryLinkId:
                  $ref: "#/components/schemas/RepositoryLinkId"
                  description: The ID of the repository link for the sync configuration to be updated.
                ResourceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The name of the Amazon Web Services resource for the sync configuration to be updated.
                RoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The ARN of the IAM role for the sync configuration to be updated.
                SyncType:
                  $ref: "#/components/schemas/SyncConfigurationType"
                  description: The sync type for the sync configuration to be updated.
                PublishDeploymentStatus:
                  $ref: "#/components/schemas/PublishDeploymentStatus"
                  description: Whether to enable or disable publishing of deployment status to source providers.
                TriggerResourceUpdateOn:
                  $ref: "#/components/schemas/TriggerResourceUpdateOn"
                  description: When to trigger Git sync to begin the stack update.
                PullRequestComment:
                  $ref: "#/components/schemas/PullRequestComment"
                  description: TA toggle that specifies whether to enable or disable pull request comments for the sync configuration to be updated.
              required:
                - ResourceName
                - SyncType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSyncConfigurationOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ProviderType:
      type: string
      enum:
        - Bitbucket
        - GitHub
        - GitHubEnterpriseServer
        - GitLab
        - GitLabSelfManaged
        - AzureDevOps
    ConnectionName:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[\\s\\S]*"
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A tag is a key-value pair that is used to manage the resource. This tag is available for use by Amazon Web Services services that support tags.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The tag's key.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The tag's value.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: .*
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: .*
    HostArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws(-[\w]+)*:(codestar-connections|codeconnections):.+:[0-9]{12}:host\/.+
    CreateConnectionOutput:
      type: object
      properties:
        ConnectionArn:
          $ref: "#/components/schemas/ConnectionArn"
          description: The Amazon Resource Name (ARN) of the connection to be created. The ARN is used as the connection reference when the connection is shared between Amazon Web Services services. The ARN is never reused if the connection is deleted.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: Specifies the tags applied to the resource.
      required:
        - ConnectionArn
    ConnectionArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws(-[\w]+)*:.+:.+:[0-9]{12}:.+
    HostName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: .*
    Url:
      type: string
      minLength: 1
      maxLength: 512
      pattern: .*
    VpcConfiguration:
      description: The VPC configuration provisioned for the host.
      type: object
      properties:
        VpcId:
          $ref: "#/components/schemas/VpcId"
          description: The ID of the Amazon VPC connected to the infrastructure where your provider type is installed.
        SubnetIds:
          $ref: "#/components/schemas/SubnetIds"
          description: The ID of the subnet or subnets associated with the Amazon VPC connected to the infrastructure where your provider type is installed.
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: The ID of the security group or security groups associated with the Amazon VPC connected to the infrastructure where your provider type is installed.
        TlsCertificate:
          $ref: "#/components/schemas/TlsCertificate"
          description: The value of the Transport Layer Security (TLS) certificate associated with the infrastructure where your provider type is installed.
      required:
        - VpcId
        - SubnetIds
        - SecurityGroupIds
    VpcId:
      type: string
      minLength: 12
      maxLength: 21
      pattern: vpc-\w{8}(\w{9})?
    SubnetIds:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      type: string
      minLength: 15
      maxLength: 24
      pattern: subnet-\w{8}(\w{9})?
    SecurityGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      type: string
      minLength: 11
      maxLength: 20
      pattern: sg-\w{8}(\w{9})?
    TlsCertificate:
      type: string
      minLength: 1
      maxLength: 16384
      pattern: "[\\s\\S]*"
    CreateHostOutput:
      type: object
      properties:
        HostArn:
          $ref: "#/components/schemas/HostArn"
          description: The Amazon Resource Name (ARN) of the host to be created.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: Tags for the created host.
    OwnerId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^.*$
    RepositoryName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^.*$
    KmsKeyArn:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: arn:aws(-[\w]+)*:kms:[a-z\-0-9]+:\d{12}:key/[a-zA-Z0-9\-]+
    CreateRepositoryLinkOutput:
      type: object
      properties:
        RepositoryLinkInfo:
          $ref: "#/components/schemas/RepositoryLinkInfo"
          description: The returned information about the created repository link.
      required:
        - RepositoryLinkInfo
    RepositoryLinkInfo:
      description: Information about the repository link resource, such as the repository link ARN, the associated connection ARN, encryption key ARN, and owner ID.
      type: object
      properties:
        ConnectionArn:
          $ref: "#/components/schemas/ConnectionArn"
          description: The Amazon Resource Name (ARN) of the connection associated with the repository link.
        EncryptionKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The Amazon Resource Name (ARN) of the encryption key for the repository associated with the repository link.
        OwnerId:
          $ref: "#/components/schemas/OwnerId"
          description: The owner ID for the repository associated with the repository link, such as the owner ID in GitHub.
        ProviderType:
          $ref: "#/components/schemas/ProviderType"
          description: The provider type for the connection, such as GitHub, associated with the repository link.
        RepositoryLinkArn:
          $ref: "#/components/schemas/RepositoryLinkArn"
          description: The Amazon Resource Name (ARN) of the repository link.
        RepositoryLinkId:
          $ref: "#/components/schemas/RepositoryLinkId"
          description: The ID of the repository link.
        RepositoryName:
          $ref: "#/components/schemas/RepositoryName"
          description: The name of the repository associated with the repository link.
      required:
        - ConnectionArn
        - OwnerId
        - ProviderType
        - RepositoryLinkArn
        - RepositoryLinkId
        - RepositoryName
    RepositoryLinkArn:
      type: string
      pattern: ^arn:aws(?:-[a-z]+)*:(codestar-connections|codeconnections):[a-z\-0-9]+:\d{12}:repository-link\/[a-zA-Z0-9\-:/]+
    RepositoryLinkId:
      type: string
      pattern: ^[0-9a-fA-F]{8}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{12}$
    BranchName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^.*$
    DeploymentFilePath:
      type: string
    ResourceName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[0-9A-Za-z]+[0-9A-Za-z_\\-]*$
    IamRoleArn:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: arn:aws(-[\w]+)*:iam::\d{12}:role/[a-zA-Z_0-9+=,.@\-_/]+
    SyncConfigurationType:
      type: string
      enum:
        - CFN_STACK_SYNC
    PublishDeploymentStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    TriggerResourceUpdateOn:
      type: string
      enum:
        - ANY_CHANGE
        - FILE_CHANGE
    PullRequestComment:
      type: string
      enum:
        - ENABLED
        - DISABLED
    CreateSyncConfigurationOutput:
      type: object
      properties:
        SyncConfiguration:
          $ref: "#/components/schemas/SyncConfiguration"
          description: The created sync configuration for the connection. A sync configuration allows Amazon Web Services to sync content from a Git repository to update a specified Amazon Web Services resource.
      required:
        - SyncConfiguration
    SyncConfiguration:
      description: Information, such as repository, branch, provider, and resource names for a specific sync configuration.
      type: object
      properties:
        Branch:
          $ref: "#/components/schemas/BranchName"
          description: The branch associated with a specific sync configuration.
        ConfigFile:
          $ref: "#/components/schemas/DeploymentFilePath"
          description: The file path to the configuration file associated with a specific sync configuration. The path should point to an actual file in the sync configurations linked repository.
        OwnerId:
          $ref: "#/components/schemas/OwnerId"
          description: The owner ID for the repository associated with a specific sync configuration, such as the owner ID in GitHub.
        ProviderType:
          $ref: "#/components/schemas/ProviderType"
          description: The connection provider type associated with a specific sync configuration, such as GitHub.
        RepositoryLinkId:
          $ref: "#/components/schemas/RepositoryLinkId"
          description: The ID of the repository link associated with a specific sync configuration.
        RepositoryName:
          $ref: "#/components/schemas/RepositoryName"
          description: The name of the repository associated with a specific sync configuration.
        ResourceName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the connection resource associated with a specific sync configuration.
        RoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role associated with a specific sync configuration.
        SyncType:
          $ref: "#/components/schemas/SyncConfigurationType"
          description: The type of sync for a specific sync configuration.
        PublishDeploymentStatus:
          $ref: "#/components/schemas/PublishDeploymentStatus"
          description: Whether to enable or disable publishing of deployment status to source providers.
        TriggerResourceUpdateOn:
          $ref: "#/components/schemas/TriggerResourceUpdateOn"
          description: When to trigger Git sync to begin the stack update.
        PullRequestComment:
          $ref: "#/components/schemas/PullRequestComment"
          description: A toggle that specifies whether to enable or disable pull request comments for the sync configuration to be created.
      required:
        - Branch
        - OwnerId
        - ProviderType
        - RepositoryLinkId
        - RepositoryName
        - ResourceName
        - RoleArn
        - SyncType
    DeleteConnectionOutput:
      type: object
    DeleteHostOutput:
      type: object
    DeleteRepositoryLinkOutput:
      type: object
    DeleteSyncConfigurationOutput:
      type: object
    GetConnectionOutput:
      type: object
      properties:
        Connection:
          $ref: "#/components/schemas/Connection"
          description: The connection details, such as status, owner, and provider type.
    Connection:
      description: "A resource that is used to connect third-party source providers with services like CodePipeline. Note: A connection created through CloudFormation, the CLI, or the SDK is in `PENDING` status by default. You can make its status `AVAILABLE` by updating the connection in the console."
      type: object
      properties:
        ConnectionName:
          $ref: "#/components/schemas/ConnectionName"
          description: The name of the connection. Connection names must be unique in an Amazon Web Services account.
        ConnectionArn:
          $ref: "#/components/schemas/ConnectionArn"
          description: The Amazon Resource Name (ARN) of the connection. The ARN is used as the connection reference when the connection is shared between Amazon Web Services services. The ARN is never reused if the connection is deleted.
        ProviderType:
          $ref: "#/components/schemas/ProviderType"
          description: The name of the external provider where your third-party code repository is configured.
        OwnerAccountId:
          $ref: "#/components/schemas/AccountId"
          description: The identifier of the external provider where your third-party code repository is configured. For Bitbucket, this is the account ID of the owner of the Bitbucket repository.
        ConnectionStatus:
          $ref: "#/components/schemas/ConnectionStatus"
          description: The current status of the connection.
        HostArn:
          $ref: "#/components/schemas/HostArn"
          description: The Amazon Resource Name (ARN) of the host associated with the connection.
    AccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[0-9]{12}"
    ConnectionStatus:
      type: string
      enum:
        - PENDING
        - AVAILABLE
        - ERROR
    GetHostOutput:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/HostName"
          description: The name of the requested host.
        Status:
          $ref: "#/components/schemas/HostStatus"
          description: The status of the requested host.
        ProviderType:
          $ref: "#/components/schemas/ProviderType"
          description: The provider type of the requested host, such as GitHub Enterprise Server.
        ProviderEndpoint:
          $ref: "#/components/schemas/Url"
          description: The endpoint of the infrastructure represented by the requested host.
        VpcConfiguration:
          $ref: "#/components/schemas/VpcConfiguration"
          description: The VPC configuration of the requested host.
    HostStatus:
      type: string
      minLength: 1
      maxLength: 64
      pattern: .*
    GetRepositoryLinkOutput:
      type: object
      properties:
        RepositoryLinkInfo:
          $ref: "#/components/schemas/RepositoryLinkInfo"
          description: The information returned for a specified repository link.
      required:
        - RepositoryLinkInfo
    GetRepositorySyncStatusOutput:
      type: object
      properties:
        LatestSync:
          $ref: "#/components/schemas/RepositorySyncAttempt"
          description: The status of the latest sync returned for a specified repository and branch.
      required:
        - LatestSync
    RepositorySyncAttempt:
      description: Information about a repository sync attempt for a repository with a sync configuration.
      type: object
      properties:
        StartedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of a specific sync attempt.
        Status:
          $ref: "#/components/schemas/RepositorySyncStatus"
          description: "The status of a specific sync attempt. The following are valid statuses: INITIATED - A repository sync attempt has been created and will begin soon. IN_PROGRESS - A repository sync attempt has started and work is being done to reconcile the branch. SUCCEEDED - The repository sync attempt has completed successfully. FAILED - The repository sync attempt has failed. QUEUED - The repository sync attempt didn't execute and was queued."
        Events:
          $ref: "#/components/schemas/RepositorySyncEventList"
          description: The events associated with a specific sync attempt.
      required:
        - StartedAt
        - Status
        - Events
    Timestamp:
      type: string
      format: date-time
    RepositorySyncStatus:
      type: string
      enum:
        - FAILED
        - INITIATED
        - IN_PROGRESS
        - SUCCEEDED
        - QUEUED
    RepositorySyncEventList:
      type: array
      items:
        $ref: "#/components/schemas/RepositorySyncEvent"
    RepositorySyncEvent:
      description: Information about a repository sync event.
      type: object
      properties:
        Event:
          $ref: "#/components/schemas/Event"
          description: A description of a repository sync event.
        ExternalId:
          $ref: "#/components/schemas/ExternalId"
          description: The ID for a repository sync event.
        Time:
          $ref: "#/components/schemas/Timestamp"
          description: The time that a repository sync event occurred.
        Type:
          $ref: "#/components/schemas/Type"
          description: The event type for a repository sync event.
      required:
        - Event
        - Time
        - Type
    Event:
      type: string
    ExternalId:
      type: string
    Type:
      type: string
    GetResourceSyncStatusOutput:
      type: object
      properties:
        DesiredState:
          $ref: "#/components/schemas/Revision"
          description: The desired state of the Amazon Web Services resource for the sync status with the Git repository.
        LatestSuccessfulSync:
          $ref: "#/components/schemas/ResourceSyncAttempt"
          description: The latest successful sync for the sync status with the Git repository.
        LatestSync:
          $ref: "#/components/schemas/ResourceSyncAttempt"
          description: The latest sync for the sync status with the Git repository, whether successful or not.
      required:
        - LatestSync
    Revision:
      description: Information about the revision for a specific sync event, such as the branch, owner ID, and name of the repository.
      type: object
      properties:
        Branch:
          $ref: "#/components/schemas/BranchName"
          description: The branch name for a specific revision.
        Directory:
          $ref: "#/components/schemas/Directory"
          description: The directory, if any, for a specific revision.
        OwnerId:
          $ref: "#/components/schemas/OwnerId"
          description: The owner ID for a specific revision, such as the GitHub owner ID for a GitHub repository.
        RepositoryName:
          $ref: "#/components/schemas/RepositoryName"
          description: The repository name for a specific revision.
        ProviderType:
          $ref: "#/components/schemas/ProviderType"
          description: The provider type for a revision, such as GitHub.
        Sha:
          $ref: "#/components/schemas/SHA"
          description: The SHA, such as the commit ID, for a specific revision.
      required:
        - Branch
        - Directory
        - OwnerId
        - RepositoryName
        - ProviderType
        - Sha
    Directory:
      type: string
    SHA:
      type: string
      minLength: 1
      maxLength: 255
    ResourceSyncAttempt:
      description: Information about a resource sync attempt.
      type: object
      properties:
        Events:
          $ref: "#/components/schemas/ResourceSyncEventList"
          description: The events related to a resource sync attempt.
        InitialRevision:
          $ref: "#/components/schemas/Revision"
          description: The current state of the resource as defined in the resource's config-file in the linked repository.
        StartedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The start time for a resource sync attempt.
        Status:
