openapi: 3.0.0
info:
  version: "2016-08-10"
  title: AWS Batch
  description: AWS Batch
  x-serviceName: batch
  x-serviceAlias: batch
  x-protocol: rest-json
  x-apiVersion: "2016-08-10"
  x-endpointPrefix: batch
  x-jsonVersion: "1.1"
servers:
  - url: https://batch.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for batch
paths:
  /v1/canceljob:
    post:
      operationId: CancelJob
      description: Cancels a job in an Batch job queue. Jobs that are in a SUBMITTED, PENDING, or RUNNABLE state are cancelled and the job status is updated to FAILED. A PENDING job is canceled after all dependency jobs are completed. Therefore, it may take longer than expected to cancel a job in PENDING status. When you try to cancel an array parent job in PENDING, Batch attempts to cancel all child jobs. The array parent job is canceled when all child jobs are completed. Jobs that progressed to the STARTING or RUNNING state aren't canceled. However, the API operation still succeeds, even if no job is canceled. These jobs must be terminated with the TerminateJob operation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobId:
                  $ref: "#/components/schemas/String"
                reason:
                  $ref: "#/components/schemas/String"
              required:
                - jobId
                - reason
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelJobResponse"
  /v1/createcomputeenvironment:
    post:
      operationId: CreateComputeEnvironment
      description: Creates an Batch compute environment. You can create MANAGED or UNMANAGED compute environments. MANAGED compute environments can use Amazon EC2 or Fargate resources. UNMANAGED compute environments can only use EC2 resources. In a managed compute environment, Batch manages the capacity and instance types of the compute resources within the environment. This is based on the compute resource specification that you define or the launch template that you specify when you create the compute environment. Either, you can choose to use EC2 On-Demand Instances and EC2 Spot Instances. Or, you can use Fargate and Fargate Spot capacity in your managed compute environment. You can optionally set a maximum price so that Spot Instances only launch when the Spot Instance price is less than a specified percentage of the On-Demand price. In an unmanaged compute environment, you can manage your own EC2 compute resources and have flexibility with how you configure your compute resources. For example, you can use custom AMIs. However, you must verify that each of your AMIs meet the Amazon ECS container instance AMI specification. For more information, see container instance AMIs in the Amazon Elastic Container Service Developer Guide. After you created your unmanaged compute environment, you can use the DescribeComputeEnvironments operation to find the Amazon ECS cluster that's associated with it. Then, launch your container instances into that Amazon ECS cluster. For more information, see Launching an Amazon ECS container instance in the Amazon Elastic Container Service Developer Guide. Batch doesn't automatically upgrade the AMIs in a compute environment after it's created. For more information on how to update a compute environment's AMI, see Updating compute environments in the Batch User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                computeEnvironmentName:
                  $ref: "#/components/schemas/String"
                type:
                  $ref: "#/components/schemas/CEType"
                state:
                  $ref: "#/components/schemas/CEState"
                unmanagedvCpus:
                  $ref: "#/components/schemas/Integer"
                computeResources:
                  $ref: "#/components/schemas/ComputeResource"
                serviceRole:
                  $ref: "#/components/schemas/String"
                tags:
                  $ref: "#/components/schemas/TagrisTagsMap"
                eksConfiguration:
                  $ref: "#/components/schemas/EksConfiguration"
                context:
                  $ref: "#/components/schemas/String"
              required:
                - computeEnvironmentName
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateComputeEnvironmentResponse"
  /v1/createconsumableresource:
    post:
      operationId: CreateConsumableResource
      description: Creates an Batch consumable resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                consumableResourceName:
                  $ref: "#/components/schemas/String"
                totalQuantity:
                  $ref: "#/components/schemas/Long"
                resourceType:
                  $ref: "#/components/schemas/String"
                tags:
                  $ref: "#/components/schemas/TagrisTagsMap"
              required:
                - consumableResourceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConsumableResourceResponse"
  /v1/createjobqueue:
    post:
      operationId: CreateJobQueue
      description: Creates an Batch job queue. When you create a job queue, you associate one or more compute environments to the queue and assign an order of preference for the compute environments. You also set a priority to the job queue that determines the order that the Batch scheduler places jobs onto its associated compute environments. For example, if a compute environment is associated with more than one job queue, the job queue with a higher priority is given preference for scheduling jobs to that compute environment.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobQueueName:
                  $ref: "#/components/schemas/String"
                state:
                  $ref: "#/components/schemas/JQState"
                schedulingPolicyArn:
                  $ref: "#/components/schemas/String"
                priority:
                  $ref: "#/components/schemas/Integer"
                computeEnvironmentOrder:
                  $ref: "#/components/schemas/ComputeEnvironmentOrders"
                serviceEnvironmentOrder:
                  $ref: "#/components/schemas/ServiceEnvironmentOrders"
                jobQueueType:
                  $ref: "#/components/schemas/JobQueueType"
                tags:
                  $ref: "#/components/schemas/TagrisTagsMap"
                jobStateTimeLimitActions:
                  $ref: "#/components/schemas/JobStateTimeLimitActions"
              required:
                - jobQueueName
                - priority
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateJobQueueResponse"
  /v1/createquotashare:
    post:
      operationId: CreateQuotaShare
      description: Creates an Batch quota share. Each quota share operates as a virtual queue with a configured compute capacity, resource sharing strategy, and borrow limits.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quotaShareName:
                  $ref: "#/components/schemas/String"
                jobQueue:
                  $ref: "#/components/schemas/String"
                capacityLimits:
                  $ref: "#/components/schemas/QuotaShareCapacityLimits"
                resourceSharingConfiguration:
                  $ref: "#/components/schemas/QuotaShareResourceSharingConfiguration"
                preemptionConfiguration:
                  $ref: "#/components/schemas/QuotaSharePreemptionConfiguration"
                state:
                  $ref: "#/components/schemas/QuotaShareState"
                tags:
                  $ref: "#/components/schemas/TagrisTagsMap"
              required:
                - quotaShareName
                - jobQueue
                - capacityLimits
                - resourceSharingConfiguration
                - preemptionConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateQuotaShareResponse"
  /v1/createschedulingpolicy:
    post:
      operationId: CreateSchedulingPolicy
      description: Creates an Batch scheduling policy.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/String"
                quotaSharePolicy:
                  $ref: "#/components/schemas/QuotaSharePolicy"
                fairsharePolicy:
                  $ref: "#/components/schemas/FairsharePolicy"
                tags:
                  $ref: "#/components/schemas/TagrisTagsMap"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSchedulingPolicyResponse"
  /v1/createserviceenvironment:
    post:
      operationId: CreateServiceEnvironment
      description: Creates a service environment for running service jobs. Service environments define capacity limits for specific service types such as SageMaker Training jobs.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serviceEnvironmentName:
                  $ref: "#/components/schemas/String"
                serviceEnvironmentType:
                  $ref: "#/components/schemas/ServiceEnvironmentType"
                state:
                  $ref: "#/components/schemas/ServiceEnvironmentState"
                capacityLimits:
                  $ref: "#/components/schemas/CapacityLimits"
                tags:
                  $ref: "#/components/schemas/TagrisTagsMap"
              required:
                - serviceEnvironmentName
                - serviceEnvironmentType
                - capacityLimits
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServiceEnvironmentResponse"
  /v1/deletecomputeenvironment:
    post:
      operationId: DeleteComputeEnvironment
      description: Deletes an Batch compute environment. Before you can delete a compute environment, you must set its state to DISABLED with the UpdateComputeEnvironment API operation and disassociate it from any job queues with the UpdateJobQueue API operation. Compute environments that use Fargate resources must terminate all active jobs on that compute environment before deleting the compute environment. If this isn't done, the compute environment enters an invalid state.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                computeEnvironment:
                  $ref: "#/components/schemas/String"
              required:
                - computeEnvironment
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteComputeEnvironmentResponse"
  /v1/deleteconsumableresource:
    post:
      operationId: DeleteConsumableResource
      description: Deletes the specified consumable resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                consumableResource:
                  $ref: "#/components/schemas/String"
              required:
                - consumableResource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteConsumableResourceResponse"
  /v1/deletejobqueue:
    post:
      operationId: DeleteJobQueue
      description: Deletes the specified job queue. You must first disable submissions for a queue with the UpdateJobQueue operation. All jobs in the queue are eventually terminated when you delete a job queue. It's not necessary to disassociate compute environments from a queue before submitting a DeleteJobQueue request.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobQueue:
                  $ref: "#/components/schemas/String"
              required:
                - jobQueue
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteJobQueueResponse"
  /v1/deletequotashare:
    post:
      operationId: DeleteQuotaShare
      description: Deletes the specified quota share. You must first disable submissions for the share by updating the state to DISABLED using the UpdateQuotaShare operation. All jobs in the share are eventually terminated when you delete a quota share.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quotaShareArn:
                  $ref: "#/components/schemas/String"
              required:
                - quotaShareArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteQuotaShareResponse"
  /v1/deleteschedulingpolicy:
    post:
      operationId: DeleteSchedulingPolicy
      description: Deletes the specified scheduling policy. You can't delete a scheduling policy that's used in any job queues.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/String"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSchedulingPolicyResponse"
  /v1/deleteserviceenvironment:
    post:
      operationId: DeleteServiceEnvironment
      description: Deletes a Service environment. Before you can delete a service environment, you must first set its state to DISABLED with the UpdateServiceEnvironment API operation and disassociate it from any job queues with the UpdateJobQueue API operation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serviceEnvironment:
                  $ref: "#/components/schemas/String"
              required:
                - serviceEnvironment
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteServiceEnvironmentResponse"
  /v1/deregisterjobdefinition:
    post:
      operationId: DeregisterJobDefinition
      description: Deregisters an Batch job definition. Job definitions are permanently deleted after 180 days.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobDefinition:
                  $ref: "#/components/schemas/String"
              required:
                - jobDefinition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeregisterJobDefinitionResponse"
  /v1/describecomputeenvironments:
    post:
      operationId: DescribeComputeEnvironments
      description: Describes one or more of your compute environments. If you're using an unmanaged compute environment, you can use the DescribeComputeEnvironment operation to determine the ecsClusterArn that you launch your Amazon ECS container instances into.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                computeEnvironments:
                  $ref: "#/components/schemas/StringList"
                maxResults:
                  $ref: "#/components/schemas/Integer"
                nextToken:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeComputeEnvironmentsResponse"
  /v1/describeconsumableresource:
    post:
      operationId: DescribeConsumableResource
      description: Returns a description of the specified consumable resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                consumableResource:
                  $ref: "#/components/schemas/String"
              required:
                - consumableResource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeConsumableResourceResponse"
  /v1/describejobdefinitions:
    post:
      operationId: DescribeJobDefinitions
      description: Describes a list of job definitions. You can specify a status (such as ACTIVE) to only return job definitions that match that status.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                jobDefinitions:
                  $ref: "#/components/schemas/StringList"
                maxResults:
                  $ref: "#/components/schemas/Integer"
                jobDefinitionName:
                  $ref: "#/components/schemas/String"
                status:
                  $ref: "#/components/schemas/String"
                nextToken:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeJobDefinitionsResponse"
  /v1/describejobqueues:
    post:
      operationId: DescribeJobQueues
      description: Describes one or more of your job queues.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                jobQueues:
                  $ref: "#/components/schemas/StringList"
                maxResults:
                  $ref: "#/components/schemas/Integer"
                nextToken:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeJobQueuesResponse"
  /v1/describejobs:
    post:
      operationId: DescribeJobs
      description: Describes a list of Batch jobs.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobs:
                  $ref: "#/components/schemas/StringList"
              required:
                - jobs
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeJobsResponse"
  /v1/describequotashare:
    post:
      operationId: DescribeQuotaShare
      description: Returns a description of the specified quota share.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quotaShareArn:
                  $ref: "#/components/schemas/String"
              required:
                - quotaShareArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeQuotaShareResponse"
  /v1/describeschedulingpolicies:
    post:
      operationId: DescribeSchedulingPolicies
      description: Describes one or more of your scheduling policies.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arns:
                  $ref: "#/components/schemas/StringList"
              required:
                - arns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSchedulingPoliciesResponse"
  /v1/describeserviceenvironments:
    post:
      operationId: DescribeServiceEnvironments
      description: Describes one or more of your service environments.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                serviceEnvironments:
                  $ref: "#/components/schemas/StringList"
                maxResults:
                  $ref: "#/components/schemas/Integer"
                nextToken:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeServiceEnvironmentsResponse"
  /v1/describeservicejob:
    post:
      operationId: DescribeServiceJob
      description: The details of a service job.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobId:
                  $ref: "#/components/schemas/String"
              required:
                - jobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeServiceJobResponse"
  /v1/getjobqueuesnapshot:
    post:
      operationId: GetJobQueueSnapshot
      description: Provides a snapshot of job queue state, including ordering of RUNNABLE jobs, as well as capacity utilization for already dispatched jobs. The first 100 RUNNABLE jobs in the job queue are listed in order of dispatch. For job queues with an attached quota-share policy, the first RUNNABLE job in each quota share is also listed. Capacity utilization for the job queue is provided, as well as break downs by share for job queues with attached fair-share or quota-share scheduling policies.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobQueue:
                  $ref: "#/components/schemas/String"
              required:
                - jobQueue
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetJobQueueSnapshotResponse"
  /v1/listconsumableresources:
    post:
      operationId: ListConsumableResources
      description: Returns a list of Batch consumable resources.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  $ref: "#/components/schemas/ListConsumableResourcesFilterList"
                maxResults:
                  $ref: "#/components/schemas/Integer"
                nextToken:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConsumableResourcesResponse"
  /v1/listjobs:
    post:
      operationId: ListJobs
      description: "Returns a list of Batch jobs. You must specify only one of the following items: A job queue ID to return a list of jobs in that job queue A multi-node parallel job ID to return a list of nodes for that job An array job ID to return a list of the children for that job"
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                jobQueue:
                  $ref: "#/components/schemas/String"
                arrayJobId:
                  $ref: "#/components/schemas/String"
                multiNodeJobId:
                  $ref: "#/components/schemas/String"
                jobStatus:
                  $ref: "#/components/schemas/JobStatus"
                maxResults:
                  $ref: "#/components/schemas/Integer"
                nextToken:
                  $ref: "#/components/schemas/String"
                filters:
                  $ref: "#/components/schemas/ListJobsFilterList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListJobsResponse"
  /v1/listjobsbyconsumableresource:
    post:
      operationId: ListJobsByConsumableResource
      description: Returns a list of Batch jobs that require a specific consumable resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                consumableResource:
                  $ref: "#/components/schemas/String"
                filters:
                  $ref: "#/components/schemas/ListJobsByConsumableResourceFilterList"
                maxResults:
                  $ref: "#/components/schemas/Integer"
                nextToken:
                  $ref: "#/components/schemas/String"
              required:
                - consumableResource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListJobsByConsumableResourceResponse"
  /v1/listquotashares:
    post:
      operationId: ListQuotaShares
      description: Returns a list of Batch quota shares associated with a job queue.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobQueue:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/Integer"
                nextToken:
                  $ref: "#/components/schemas/String"
              required:
                - jobQueue
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListQuotaSharesResponse"
  /v1/listschedulingpolicies:
    post:
      operationId: ListSchedulingPolicies
      description: Returns a list of Batch scheduling policies.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/Integer"
                nextToken:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSchedulingPoliciesResponse"
  /v1/listservicejobs:
    post:
      operationId: ListServiceJobs
      description: Returns a list of service jobs for a specified job queue.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                jobQueue:
                  $ref: "#/components/schemas/String"
                jobStatus:
                  $ref: "#/components/schemas/ServiceJobStatus"
                maxResults:
                  $ref: "#/components/schemas/Integer"
                nextToken:
                  $ref: "#/components/schemas/String"
                filters:
                  $ref: "#/components/schemas/ListJobsFilterList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServiceJobsResponse"
  /v1/tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags for an Batch resource. Batch resources that support tags are compute environments, jobs, job definitions, job queues, and scheduling policies. ARNs for child jobs of array and multi-node parallel (MNP) jobs aren't supported.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that identifies the resource that tags are listed for. Batch resources that support tags are compute environments, jobs, job definitions, job queues, and scheduling policies. ARNs for child jobs of array and multi-node parallel (MNP) jobs aren't supported.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Associates the specified tags to a resource with the specified resourceArn. If existing tags on a resource aren't specified in the request parameters, they aren't changed. When a resource is deleted, the tags that are associated with that resource are deleted as well. Batch resources that support tags are compute environments, jobs, job definitions, job queues, and scheduling policies. ARNs for child jobs of array and multi-node parallel (MNP) jobs aren't supported.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource that tags are added to. Batch resources that support tags are compute environments, jobs, job definitions, job queues, and scheduling policies. ARNs for child jobs of array and multi-node parallel (MNP) jobs aren't supported.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagrisTagsMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Deletes specified tags from an Batch resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource from which to delete tags. Batch resources that support tags are compute environments, jobs, job definitions, job queues, and scheduling policies. ARNs for child jobs of array and multi-node parallel (MNP) jobs aren't supported.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeysList"
          description: The keys of the tags to be removed.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
