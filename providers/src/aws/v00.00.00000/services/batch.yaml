  /v1/submitjob:
    post:
      operationId: SubmitJob
      description: Submits an Batch job from a job definition. Parameters that are specified during SubmitJob override parameters defined in the job definition. vCPU and memory requirements that are specified in the resourceRequirements objects in the job definition are the exception. They can't be overridden this way using the memory and vcpus parameters. Rather, you must specify updates to job definition parameters in a resourceRequirements object that's included in the containerOverrides parameter. Job queues with a scheduling policy are limited to 500 active share identifiers at a time. Jobs that run on Fargate resources can't be guaranteed to run for more than 14 days. This is because, after 14 days, Fargate resources might become unavailable and job might be terminated.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobName:
                  $ref: "#/components/schemas/String"
                jobQueue:
                  $ref: "#/components/schemas/String"
                shareIdentifier:
                  $ref: "#/components/schemas/String"
                schedulingPriorityOverride:
                  $ref: "#/components/schemas/Integer"
                arrayProperties:
                  $ref: "#/components/schemas/ArrayProperties"
                dependsOn:
                  $ref: "#/components/schemas/JobDependencyList"
                jobDefinition:
                  $ref: "#/components/schemas/String"
                parameters:
                  $ref: "#/components/schemas/ParametersMap"
                containerOverrides:
                  $ref: "#/components/schemas/ContainerOverrides"
                nodeOverrides:
                  $ref: "#/components/schemas/NodeOverrides"
                retryStrategy:
                  $ref: "#/components/schemas/RetryStrategy"
                propagateTags:
                  $ref: "#/components/schemas/Boolean"
                timeout:
                  $ref: "#/components/schemas/JobTimeout"
                tags:
                  $ref: "#/components/schemas/TagrisTagsMap"
                eksPropertiesOverride:
                  $ref: "#/components/schemas/EksPropertiesOverride"
                ecsPropertiesOverride:
