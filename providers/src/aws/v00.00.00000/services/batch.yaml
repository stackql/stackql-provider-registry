components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    String:
      type: string
    CancelJobResponse:
      type: object
    CEType:
      type: string
      enum:
        - MANAGED
        - UNMANAGED
    CEState:
      type: string
      enum:
        - ENABLED
        - DISABLED
    Integer:
      type: integer
    ComputeResource:
      description: An object that represents an Batch compute resource. For more information, see Compute environments in the Batch User Guide.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/CRType"
          description: "The type of compute environment: EC2, SPOT, FARGATE, or FARGATE_SPOT. For more information, see Compute environments in the Batch User Guide. If you choose SPOT, you must also specify an Amazon EC2 Spot Fleet role with the spotIamFleetRole parameter. For more information, see Amazon EC2 spot fleet role in the Batch User Guide. Multi-node parallel jobs aren't supported on Spot Instances."
        allocationStrategy:
          $ref: "#/components/schemas/CRAllocationStrategy"
          description: The allocation strategy to use for the compute resource if not enough instances of the best fitting instance type can be allocated. This might be because of availability of the instance type in the Region or Amazon EC2 service limits. For more information, see Allocation strategies in the Batch User Guide. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it. BEST_FIT (default) Batch selects an instance type that best fits the needs of the jobs with a preference for the lowest-cost instance type. If additional instances of the selected instance type aren't available, Batch waits for the additional instances to be available. If there aren't enough instances available or the user is reaching Amazon EC2 service limits, additional jobs aren't run until the currently running jobs are completed. This allocation strategy keeps costs lower but can limit scaling. If you're using Spot Fleets with BEST_FIT, the Spot Fleet IAM Role must be specified. Compute resources that use a BEST_FIT allocation strategy don't support infrastructure updates and can't update some parameters. For more information, see Updating compute environments in the Batch User Guide. BEST_FIT_PROGRESSIVE Batch selects additional instance types that are large enough to meet the requirements of the jobs in the queue. Its preference is for instance types with lower cost vCPUs. If additional instances of the previously selected instance types aren't available, Batch selects new instance types. SPOT_CAPACITY_OPTIMIZED Batch selects one or more instance types that are large enough to meet the requirements of the jobs in the queue. Its preference is for instance types that are less likely to be interrupted. This allocation strategy is only available for Spot Instance compute resources. SPOT_PRICE_CAPACITY_OPTIMIZED The price and capacity optimized allocation strategy looks at both price and capacity to select the Spot Instance pools that are the least likely to be interrupted and have the lowest possible price. This allocation strategy is only available for Spot Instance compute resources. With BEST_FIT_PROGRESSIVE,SPOT_CAPACITY_OPTIMIZED and SPOT_PRICE_CAPACITY_OPTIMIZED (recommended) strategies using On-Demand or Spot Instances, and the BEST_FIT strategy using Spot Instances, Batch might need to exceed maxvCpus to meet your capacity requirements. In this event, Batch never exceeds maxvCpus by more than a single instance.
        minvCpus:
          $ref: "#/components/schemas/Integer"
          description: The minimum number of vCPUs that a compute environment should maintain (even if the compute environment is DISABLED). This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it.
        maxvCpus:
          $ref: "#/components/schemas/Integer"
          description: The maximum number of vCPUs that a compute environment can support. With BEST_FIT_PROGRESSIVE,SPOT_CAPACITY_OPTIMIZED and SPOT_PRICE_CAPACITY_OPTIMIZED (recommended) strategies using On-Demand or Spot Instances, and the BEST_FIT strategy using Spot Instances, Batch might need to exceed maxvCpus to meet your capacity requirements. In this event, Batch never exceeds maxvCpus by more than a single instance.
        desiredvCpus:
          $ref: "#/components/schemas/Integer"
          description: The desired number of vCPUS in the compute environment. Batch modifies this value between the minimum and maximum values based on job queue demand. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it.
        instanceTypes:
          $ref: "#/components/schemas/StringList"
          description: "The instances types that can be launched. You can specify instance families to launch any instance type within those families (for example, c5 or p3), or you can specify specific sizes within a family (such as c5.8xlarge). Batch can select the instance type for you if you choose one of the following: optimal to select instance types (from the c4, m4, r4, c5, m5, and r5 instance families) that match the demand of your job queues. default_x86_64 to choose x86 based instance types (from the m6i, c6i, r6i, and c7i instance families) that matches the resource demands of the job queue. default_arm64 to choose ARM based instance types (from the m6g, c6g, r6g, and c7g instance families) that matches the resource demands of the job queue. Starting on 11/01/2025 the behavior of optimal is going to be changed to match default_x86_64. During the change your instance families could be updated to a newer generation. You do not need to perform any actions for the upgrade to happen. For more information about change, see Optimal instance type configuration to receive automatic instance family updates. Instance family availability varies by Amazon Web Services Region. For example, some Amazon Web Services Regions may not have any fourth generation instance families but have fifth and sixth generation instance families. When using default_x86_64 or default_arm64 instance bundles, Batch selects instance families based on a balance of cost-effectiveness and performance. While newer generation instances often provide better price-performance, Batch may choose an earlier generation instance family if it provides the optimal combination of availability, cost, and performance for your workload. For example, in an Amazon Web Services Region where both c6i and c7i instances are available, Batch might select c6i instances if they offer better cost-effectiveness for your specific job requirements. For more information on Batch instance types and Amazon Web Services Region availability, see Instance type compute table in the Batch User Guide. Batch periodically updates your instances in default bundles to newer, more cost-effective options. Updates happen automatically without requiring any action from you. Your workloads continue running during updates with no interruption This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it. When you create a compute environment, the instance types that you select for the compute environment must share the same architecture. For example, you can't mix x86 and ARM instances in the same compute environment."
        imageId:
          $ref: "#/components/schemas/String"
          description: The Amazon Machine Image (AMI) ID used for instances launched in the compute environment. This parameter is overridden by the imageIdOverride member of the Ec2Configuration structure. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it. The AMI that you choose for a compute environment must match the architecture of the instance types that you intend to use for that compute environment. For example, if your compute environment uses A1 instance types, the compute resource AMI that you choose must support ARM instances. Amazon ECS vends both x86 and ARM versions of the Amazon ECS-optimized Amazon Linux 2023 AMI. For more information, see Amazon ECS-optimized Amazon Linux 2023 AMI in the Amazon Elastic Container Service Developer Guide.
        subnets:
          $ref: "#/components/schemas/StringList"
          description: The VPC subnets where the compute resources are launched. These subnets must be within the same VPC. Fargate compute resources can contain up to 16 subnets. For more information, see VPCs and subnets in the Amazon VPC User Guide. Batch on Amazon EC2 and Batch on Amazon EKS support Local Zones. For more information, see Local Zones in the Amazon EC2 User Guide for Linux Instances, Amazon EKS and Amazon Web Services Local Zones in the Amazon EKS User Guide and Amazon ECS clusters in Local Zones, Wavelength Zones, and Amazon Web Services Outposts in the Amazon ECS Developer Guide. Batch on Fargate doesn't currently support Local Zones.
        securityGroupIds:
          $ref: "#/components/schemas/StringList"
          description: The Amazon EC2 security groups that are associated with instances launched in the compute environment. One or more security groups must be specified, either in securityGroupIds or using a launch template referenced in launchTemplate. This parameter is required for jobs that are running on Fargate resources and must contain at least one security group. Fargate doesn't support launch templates. If security groups are specified using both securityGroupIds and launchTemplate, the values in securityGroupIds are used.
        ec2KeyPair:
          $ref: "#/components/schemas/String"
          description: The Amazon EC2 key pair that's used for instances launched in the compute environment. You can use this key pair to log in to your instances with SSH. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it.
        instanceRole:
          $ref: "#/components/schemas/String"
          description: The Amazon ECS instance profile applied to Amazon EC2 instances in a compute environment. This parameter is required for Amazon EC2 instances types. You can specify the short name or full Amazon Resource Name (ARN) of an instance profile. For example, ecsInstanceRole or arn:aws:iam::`<aws_account_id>`:instance-profile/ecsInstanceRole . For more information, see Amazon ECS instance role in the Batch User Guide. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it.
        tags:
          type: object
          properties: {}
          description: "Key-value pair tags to be applied to Amazon EC2 resources that are launched in the compute environment. For Batch, these take the form of \"String1\": \"String2\", where String1 is the tag key and String2 is the tag value (for example, { \"Name\": \"Batch Instance - C4OnDemand\" }). This is helpful for recognizing your Batch instances in the Amazon EC2 console. Updating these tags requires an infrastructure update to the compute environment. For more information, see Updating compute environments in the Batch User Guide. These tags aren't seen when using the Batch ListTagsForResource API operation. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it."
        placementGroup:
          $ref: "#/components/schemas/String"
          description: The Amazon EC2 placement group to associate with your compute resources. If you intend to submit multi-node parallel jobs to your compute environment, you should consider creating a cluster placement group and associate it with your compute resources. This keeps your multi-node parallel job on a logical grouping of instances within a single Availability Zone with high network flow potential. For more information, see Placement groups in the Amazon EC2 User Guide for Linux Instances. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it.
        bidPercentage:
          $ref: "#/components/schemas/Integer"
          description: The maximum percentage that a Spot Instance price can be when compared with the On-Demand price for that instance type before instances are launched. For example, if your maximum percentage is 20%, then the Spot price must be less than 20% of the current On-Demand price for that Amazon EC2 instance. You always pay the lowest (market) price and never more than your maximum percentage. If you leave this field empty, the default value is 100% of the On-Demand price. For most use cases, we recommend leaving this field empty. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it.
        spotIamFleetRole:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Amazon EC2 Spot Fleet IAM role applied to a SPOT compute environment. This role is required if the allocation strategy set to BEST_FIT or if the allocation strategy isn't specified. For more information, see Amazon EC2 spot fleet role in the Batch User Guide. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it. To tag your Spot Instances on creation, the Spot Fleet IAM role specified here must use the newer AmazonEC2SpotFleetTaggingRole managed policy. The previously recommended AmazonEC2SpotFleetRole managed policy doesn't have the required permissions to tag Spot Instances. For more information, see Spot instances not tagged on creation in the Batch User Guide.
        launchTemplate:
          $ref: "#/components/schemas/LaunchTemplateSpecification"
          description: The launch template to use for your compute resources. Any other compute resource parameters that you specify in a CreateComputeEnvironment API operation override the same parameters in the launch template. You must specify either the launch template ID or launch template name in the request, but not both. For more information, see Launch template support in the Batch User Guide. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it.
        ec2Configuration:
          $ref: "#/components/schemas/Ec2ConfigurationList"
          description: Provides information that's used to select Amazon Machine Images (AMIs) for Amazon EC2 instances in the compute environment. If Ec2Configuration isn't specified, the default is ECS_AL2023 for EC2 (ECS) compute environments and EKS_AL2023 for EKS compute environments. One or two values can be provided. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it.
        scalingPolicy:
          $ref: "#/components/schemas/ComputeScalingPolicy"
          description: The scaling policy configuration for the compute environment. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it.
      required:
        - type_
        - maxvCpus
        - subnets
    CRType:
      type: string
      enum:
        - EC2
        - SPOT
        - FARGATE
        - FARGATE_SPOT
    CRAllocationStrategy:
      type: string
      enum:
        - BEST_FIT
        - BEST_FIT_PROGRESSIVE
        - SPOT_CAPACITY_OPTIMIZED
        - SPOT_PRICE_CAPACITY_OPTIMIZED
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    LaunchTemplateSpecification:
      description: An object that represents a launch template that's associated with a compute resource. You must specify either the launch template ID or launch template name in the request, but not both. If security groups are specified using both the securityGroupIds parameter of CreateComputeEnvironment and the launch template, the values in the securityGroupIds parameter of CreateComputeEnvironment will be used. This object isn't applicable to jobs that are running on Fargate resources.
      type: object
      properties:
        launchTemplateId:
          $ref: "#/components/schemas/String"
          description: The ID of the launch template.
        launchTemplateName:
          $ref: "#/components/schemas/String"
          description: The name of the launch template.
        version:
          $ref: "#/components/schemas/String"
          description: "The version number of the launch template, $Default, or $Latest. If the value is $Default, the default version of the launch template is used. If the value is $Latest, the latest version of the launch template is used. If the AMI ID that's used in a compute environment is from the launch template, the AMI isn't changed when the compute environment is updated. It's only changed if the updateToLatestImageVersion parameter for the compute environment is set to true. During an infrastructure update, if either $Default or $Latest is specified, Batch re-evaluates the launch template version, and it might use a different version of the launch template. This is the case even if the launch template isn't specified in the update. When updating a compute environment, changing the launch template requires an infrastructure update of the compute environment. For more information, see Updating compute environments in the Batch User Guide. Default: $Default Latest: $Latest"
        overrides:
          $ref: "#/components/schemas/LaunchTemplateSpecificationOverrideList"
          description: A launch template to use in place of the default launch template. You must specify either the launch template ID or launch template name in the request, but not both. You can specify up to ten (10) launch template overrides that are associated to unique instance types or families for each compute environment. To unset all override templates for a compute environment, you can pass an empty array to the UpdateComputeEnvironment.overrides parameter, or not include the overrides parameter when submitting the UpdateComputeEnvironment API operation.
        userdataType:
          $ref: "#/components/schemas/UserdataType"
          description: The EKS node initialization process to use. You only need to specify this value if you are using a custom AMI. The default value is EKS_BOOTSTRAP_SH. If imageType is a custom AMI based on EKS_AL2023 or EKS_AL2023_NVIDIA then you must choose EKS_NODEADM.
    LaunchTemplateSpecificationOverrideList:
      type: array
      items:
        $ref: "#/components/schemas/LaunchTemplateSpecificationOverride"
    LaunchTemplateSpecificationOverride:
      description: An object that represents a launch template to use in place of the default launch template. You must specify either the launch template ID or launch template name in the request, but not both. If security groups are specified using both the securityGroupIds parameter of CreateComputeEnvironment and the launch template, the values in the securityGroupIds parameter of CreateComputeEnvironment will be used. You can define up to ten (10) overrides for each compute environment. This object isn't applicable to jobs that are running on Fargate resources. To unset all override templates for a compute environment, you can pass an empty array to the UpdateComputeEnvironment.overrides parameter, or not include the overrides parameter when submitting the UpdateComputeEnvironment API operation.
      type: object
      properties:
        launchTemplateId:
          $ref: "#/components/schemas/String"
          description: "The ID of the launch template. Note: If you specify the launchTemplateId you can't specify the launchTemplateName as well."
        launchTemplateName:
          $ref: "#/components/schemas/String"
          description: "The name of the launch template. Note: If you specify the launchTemplateName you can't specify the launchTemplateId as well."
        version:
          $ref: "#/components/schemas/String"
          description: "The version number of the launch template, $Default, or $Latest. If the value is $Default, the default version of the launch template is used. If the value is $Latest, the latest version of the launch template is used. If the AMI ID that's used in a compute environment is from the launch template, the AMI isn't changed when the compute environment is updated. It's only changed if the updateToLatestImageVersion parameter for the compute environment is set to true. During an infrastructure update, if either $Default or $Latest is specified, Batch re-evaluates the launch template version, and it might use a different version of the launch template. This is the case even if the launch template isn't specified in the update. When updating a compute environment, changing the launch template requires an infrastructure update of the compute environment. For more information, see Updating compute environments in the Batch User Guide. Default: $Default Latest: $Latest"
        targetInstanceTypes:
          $ref: "#/components/schemas/StringList"
          description: "The instance type or family that this override launch template should be applied to. This parameter is required when defining a launch template override. Information included in this parameter must meet the following requirements: Must be a valid Amazon EC2 instance type or family. The following Batch InstanceTypes are not allowed: optimal, default_x86_64, and default_arm64. targetInstanceTypes can target only instance types and families that are included within the ComputeResource.instanceTypes set. targetInstanceTypes doesn't need to include all of the instances from the instanceType set, but at least a subset. For example, if ComputeResource.instanceTypes includes [m5, g5], targetInstanceTypes can include [m5.2xlarge] and [m5.large] but not [c5.large]. targetInstanceTypes included within the same launch template override or across launch template overrides can't overlap for the same compute environment. For example, you can't define one launch template override to target an instance family and another define an instance type within this same family."
        userdataType:
          $ref: "#/components/schemas/UserdataType"
          description: The EKS node initialization process to use. You only need to specify this value if you are using a custom AMI. The default value is EKS_BOOTSTRAP_SH. If imageType is a custom AMI based on EKS_AL2023 or EKS_AL2023_NVIDIA then you must choose EKS_NODEADM.
    UserdataType:
      type: string
      enum:
        - EKS_BOOTSTRAP_SH
        - EKS_NODEADM
    Ec2ConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/Ec2Configuration"
    Ec2Configuration:
      description: Provides information used to select Amazon Machine Images (AMIs) for instances in the compute environment. If Ec2Configuration isn't specified, the default is ECS_AL2023 (Amazon ECS-optimized Amazon Linux 2023) for EC2 (ECS) compute environments and EKS_AL2023 (Amazon EKS-optimized Amazon Linux 2023 AMI) for EKS compute environments. This object isn't applicable to jobs that are running on Fargate resources.
      type: object
      properties:
        imageType:
          $ref: "#/components/schemas/ImageType"
          description: "The image type to match with the instance type to select an AMI. The supported values are different for ECS and EKS resources. ECS If the imageIdOverride parameter isn't specified, then a recent Amazon ECS-optimized Amazon Linux 2023 AMI (ECS_AL2023) is used. If a new image type is specified in an update, but neither an imageId nor a imageIdOverride parameter is specified, then the latest Amazon ECS optimized AMI for that image type that's supported by Batch is used. Amazon Web Services is ending support for Amazon ECS Amazon Linux 2-optimized and accelerated AMIs on June 30, 2026. On January 12, 2026, Batch changed the default AMI for new Amazon ECS compute environments from Amazon Linux 2 to Amazon Linux 2023. Effective June 30, 2026, Batch will block creation of new Amazon ECS compute environments using Batch-provided Amazon Linux 2 AMIs. We strongly recommend migrating your existing Batch Amazon ECS compute environments to Amazon Linux 2023 prior to June 30, 2026. For more information on upgrading from AL2 to AL2023, see How to migrate from ECS AL2 to ECS AL2023 in the Batch User Guide. ECS_AL2 Amazon Linux 2: Used for non-GPU instance families. ECS_AL2_NVIDIA Amazon Linux 2 (GPU): Used for GPU instance families (for example P4 and G4) and non Amazon Web Services Graviton-based instance types. ECS_AL2023 Amazon Linux 2023: Default for all non-GPU instance families. Amazon Linux 2023 does not support A1 instances. ECS_AL2023_NVIDIA Amazon Linux 2023 (GPU): Default for all GPU instance families and can be used for all non Amazon Web Services Graviton-based instance types. ECS_AL2023_NVIDIA doesn't support p3 and g3 instance types. EKS If the imageIdOverride parameter isn't specified, then a recent Amazon EKS-optimized Amazon Linux 2023 AMI (EKS_AL2023) is used. If a new image type is specified in an update, but neither an imageId nor a imageIdOverride parameter is specified, then the latest Amazon EKS optimized AMI for that image type that Batch supports is used. Amazon Linux 2023 AMIs are the default on Batch for Amazon EKS. Amazon Web Services ended support for Amazon EKS AL2-optimized and AL2-accelerated AMIs on November 26, 2025. Batch Amazon EKS compute environments using Amazon Linux 2 will no longer receive software updates, security patches, or bug fixes from Amazon Web Services. We recommend migrating to Amazon Linux 2023. For more information on upgrading from AL2 to AL2023, see How to upgrade from EKS AL2 to EKS AL2023 in the Batch User Guide. EKS_AL2 Amazon Linux 2: Used for non-GPU instance families. EKS_AL2_NVIDIA Amazon Linux 2 (accelerated): Used for GPU instance families (for example, P4 and G4) and can be used for all non Amazon Web Services Graviton-based instance types. EKS_AL2023 Amazon Linux 2023: Default for non-GPU instance families. Amazon Linux 2023 does not support A1 instances. EKS_AL2023_NVIDIA Amazon Linux 2023 (accelerated): Default for GPU instance families and can be used for all non Amazon Web Services Graviton-based instance types."
        imageIdOverride:
          $ref: "#/components/schemas/ImageIdOverride"
          description: The AMI ID used for instances launched in the compute environment that match the image type. This setting overrides the imageId set in the computeResource object. The AMI that you choose for a compute environment must match the architecture of the instance types that you intend to use for that compute environment. For example, if your compute environment uses A1 instance types, the compute resource AMI that you choose must support ARM instances. Amazon ECS vends both x86 and ARM versions of the Amazon ECS-optimized Amazon Linux 2023 AMI. For more information, see Amazon ECS-optimized Amazon Linux 2023 AMI in the Amazon Elastic Container Service Developer Guide.
        batchImageStatus:
          $ref: "#/components/schemas/String"
          description: The status of the Batch-provided default AMIs associated with the imageType. The field only appears after the compute environment has begun scaling instances using the imageType. The field is not present when an image is specified in ComputeResources.imageId (deprecated), the default launch template, or Ec2Configuration.imageIdOverride. The field is also not present when the compute environment has a launch template override. For more information on image selection, see AMI selection order. This field is read-only and only appears in the DescribeComputeEnvironments response. LATEST − Using the most recent AMI supported UPDATE_AVAILABLE − An updated AMI is available If a compute environment has multiple AMIs for the imageType and any one AMI has UPDATE_AVAILABLE, the status shows UPDATE_AVAILABLE. For compute environments that use BEST_FIT as their allocation strategy, you can perform a blue/green update to update the AMI. For all other compute environments, you can perform an AMI version update to update the AMI to the latest version.
        imageKubernetesVersion:
          $ref: "#/components/schemas/KubernetesVersion"
          description: The Kubernetes version for the compute environment. If you don't specify a value, the latest version that Batch supports is used.
      required:
        - imageType
    ImageType:
      type: string
      minLength: 1
      maxLength: 256
    ImageIdOverride:
      type: string
      minLength: 1
      maxLength: 256
    KubernetesVersion:
      type: string
      minLength: 1
      maxLength: 256
    ComputeScalingPolicy:
      description: An object that represents a scaling policy for a compute environment.
      type: object
      properties:
        minScaleDownDelayMinutes:
          $ref: "#/components/schemas/Integer"
          description: "The minimum time (in minutes) that Batch keeps instances running in the compute environment after their jobs complete. For each instance, the delay period begins when the last job finishes. If no new jobs are placed on the instance during this delay, Batch terminates the instance once the delay expires. Valid Range: Minimum value of 20. Maximum value of 10080. Use 0 to unset and disable the scale down delay. Idle instances retained during the scale-down delay period are billable at standard EC2 pricing. The scale down delay does not apply to: Instances being replaced during infrastructure updates Newly launched instances that have not yet run any jobs Spot instances reclaimed due to interruption"
    TagrisTagsMap:
      type: object
      properties: {}
    EksConfiguration:
      description: Configuration for the Amazon EKS cluster that supports the Batch compute environment. The cluster must exist before the compute environment can be created.
      type: object
      properties:
        eksClusterArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Amazon EKS cluster. An example is arn:aws:eks:us-east-1:123456789012:cluster/ClusterForBatch .
        kubernetesNamespace:
          $ref: "#/components/schemas/String"
          description: "The namespace of the Amazon EKS cluster. Batch manages pods in this namespace. The value can't left empty or null. It must be fewer than 64 characters long, can't be set to default, can't start with \"kube-,\" and must match this regular expression: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$. For more information, see Namespaces in the Kubernetes documentation."
      required:
        - eksClusterArn
        - kubernetesNamespace
    CreateComputeEnvironmentResponse:
      type: object
      properties:
        computeEnvironmentName:
          $ref: "#/components/schemas/String"
          description: The name of the compute environment. It can be up to 128 characters long. It can contain uppercase and lowercase letters, numbers, hyphens (-), and underscores (_).
        computeEnvironmentArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the compute environment.
    Long:
      type: integer
      format: int64
    CreateConsumableResourceResponse:
      type: object
      properties:
        consumableResourceName:
          $ref: "#/components/schemas/String"
          description: The name of the consumable resource.
        consumableResourceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the consumable resource.
      required:
        - consumableResourceName
        - consumableResourceArn
    JQState:
      type: string
      enum:
        - ENABLED
        - DISABLED
    ComputeEnvironmentOrders:
      type: array
      items:
        $ref: "#/components/schemas/ComputeEnvironmentOrder"
    ComputeEnvironmentOrder:
      description: The order that compute environments are tried in for job placement within a queue. Compute environments are tried in ascending order. For example, if two compute environments are associated with a job queue, the compute environment with a lower order integer value is tried for job placement first. Compute environments must be in the VALID state before you can associate them with a job queue. All of the compute environments must be either EC2 (EC2 or SPOT) or Fargate (FARGATE or FARGATE_SPOT); Amazon EC2 and Fargate compute environments can't be mixed. All compute environments that are associated with a job queue must share the same architecture. Batch doesn't support mixing compute environment architecture types in a single job queue.
      type: object
      properties:
        order:
          $ref: "#/components/schemas/Integer"
          description: The order of the compute environment. Compute environments are tried in ascending order. For example, if two compute environments are associated with a job queue, the compute environment with a lower order integer value is tried for job placement first.
        computeEnvironment:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the compute environment.
      required:
        - order
        - computeEnvironment
    ServiceEnvironmentOrders:
      type: array
      items:
        $ref: "#/components/schemas/ServiceEnvironmentOrder"
    ServiceEnvironmentOrder:
      description: Specifies the order of a service environment for a job queue. This determines the priority order when multiple service environments are associated with the same job queue.
      type: object
      properties:
        order:
          $ref: "#/components/schemas/Integer"
          description: The order of the service environment. Job queues with a higher priority are evaluated first when associated with the same service environment.
        serviceEnvironment:
          $ref: "#/components/schemas/String"
          description: The name or ARN of the service environment.
      required:
        - order
        - serviceEnvironment
    JobQueueType:
      type: string
      enum:
        - EKS
        - ECS
        - ECS_FARGATE
        - SAGEMAKER_TRAINING
    JobStateTimeLimitActions:
      type: array
      items:
        $ref: "#/components/schemas/JobStateTimeLimitAction"
    JobStateTimeLimitAction:
      description: Specifies an action that Batch will take after the job has remained at the head of the queue in the specified state for longer than the specified time.
      type: object
      properties:
        reason:
          $ref: "#/components/schemas/String"
          description: The reason to log for the action being taken.
        state:
          $ref: "#/components/schemas/JobStateTimeLimitActionsState"
          description: The state of the job needed to trigger the action. The only supported value is RUNNABLE.
        maxTimeSeconds:
          $ref: "#/components/schemas/Integer"
          description: The approximate amount of time, in seconds, that must pass with the job in the specified state before the action is taken. The minimum value is 600 (10 minutes) and the maximum value is 86,400 (24 hours).
        action:
          $ref: "#/components/schemas/JobStateTimeLimitActionsAction"
          description: The action to take when a job is at the head of the job queue in the specified state for the specified period of time. For job queues connected to a ECS, FARGATE or EKS compute environment, the only supported value is CANCEL, which will cancel the job. For job queues connected to a SAGEMAKER_TRAINING service environment, the only supported value is TERMINATE, which will terminate the job.
      required:
        - reason
        - state
        - maxTimeSeconds
        - action
    JobStateTimeLimitActionsState:
      type: string
      enum:
        - RUNNABLE
    JobStateTimeLimitActionsAction:
      type: string
      enum:
        - CANCEL
        - TERMINATE
    CreateJobQueueResponse:
      type: object
      properties:
        jobQueueName:
          $ref: "#/components/schemas/String"
          description: The name of the job queue.
        jobQueueArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the job queue.
      required:
        - jobQueueName
        - jobQueueArn
    QuotaShareCapacityLimits:
      type: array
      items:
        $ref: "#/components/schemas/QuotaShareCapacityLimit"
    QuotaShareCapacityLimit:
      description: Defines the capacity limit for a quota share, or the type and maximum quantity of a particular resource that can be allocated to jobs in the quota share without borrowing.
      type: object
      properties:
        maxCapacity:
          $ref: "#/components/schemas/Integer"
          description: The maximum capacity available for the quota share. This value represents the maximum quantity of a resource that can be allocated to jobs in the quota share without borrowing.
        capacityUnit:
          $ref: "#/components/schemas/String"
          description: The unit of compute capacity for the capacityLimit. For example, ml.m5.large.
      required:
        - maxCapacity
        - capacityUnit
    QuotaShareResourceSharingConfiguration:
      description: Specifies whether a quota share reserves, lends, or both lends and borrows idle compute capacity.
      type: object
      properties:
        strategy:
          $ref: "#/components/schemas/QuotaShareResourceSharingStrategy"
          description: The resource sharing strategy for the quota share. The RESERVE strategy allows a quota share to reserve idle capacity for itself. LEND configures the share to lend its idle capacity to another share in need of capacity. The LEND_AND_BORROW strategy configures the share to borrow idle capacity from an underutilized share, as well as lend to another share.
        borrowLimit:
          $ref: "#/components/schemas/Integer"
          description: The maximum percentage of additional capacity that the quota share can borrow from other shares. borrowLimit can only be applied to quota shares with a strategy of LEND_AND_BORROW. This value is expressed as a percentage of the quota share's configured CapacityLimits. The borrowLimit is applied uniformly across all capacity units. For example, if the borrowLimit is 200, the quota share can borrow up to 200% of its configured maxCapacity for each capacity unit. The default borrowLimit is -1, which indicates unlimited borrowing.
      required:
        - strategy
    QuotaShareResourceSharingStrategy:
      type: string
      enum:
        - RESERVE
        - LEND
        - LEND_AND_BORROW
    QuotaSharePreemptionConfiguration:
      description: Specifies the preemption behavior for jobs in a quota share.
      type: object
      properties:
        inSharePreemption:
          $ref: "#/components/schemas/QuotaShareInSharePreemptionState"
          description: Specifies whether jobs within a quota share can be preempted by another, higher priority job in the same quota share.
      required:
        - inSharePreemption
    QuotaShareInSharePreemptionState:
      type: string
      enum:
        - ENABLED
        - DISABLED
    QuotaShareState:
      type: string
      enum:
        - ENABLED
        - DISABLED
    CreateQuotaShareResponse:
      type: object
      properties:
        quotaShareName:
          $ref: "#/components/schemas/String"
          description: The name of the quota share.
        quotaShareArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the quota share.
    QuotaSharePolicy:
      description: The quota share scheduling policy details for a job queue.
      type: object
      properties:
        idleResourceAssignmentStrategy:
          $ref: "#/components/schemas/QuotaShareIdleResourceAssignmentStrategy"
          description: The strategy that determines how idle resources are assigned to quota shares that are borrowing capacity. Currently, only FIFO is supported.
      required:
        - idleResourceAssignmentStrategy
    QuotaShareIdleResourceAssignmentStrategy:
      type: string
      enum:
        - FIFO
    FairsharePolicy:
      description: The fair-share scheduling policy details.
      type: object
      properties:
        shareDecaySeconds:
          $ref: "#/components/schemas/Integer"
          description: The amount of time (in seconds) to use to calculate a fair-share percentage for each share identifier in use. A value of zero (0) indicates the default minimum time window (600 seconds). The maximum supported value is 604800 (1 week). The decay allows for more recently run jobs to have more weight than jobs that ran earlier. Consider adjusting this number if you have jobs that (on average) run longer than ten minutes, or a large difference in job count or job run times between share identifiers, and the allocation of resources doesn't meet your needs.
        computeReservation:
          $ref: "#/components/schemas/Integer"
          description: A value used to reserve some of the available maximum vCPU for share identifiers that aren't already used. The reserved ratio is (computeReservation/100)^ActiveFairShares where ActiveFairShares is the number of active share identifiers. For example, a computeReservation value of 50 indicates that Batch reserves 50% of the maximum available vCPU if there's only one share identifier. It reserves 25% if there are two share identifiers. It reserves 12.5% if there are three share identifiers. A computeReservation value of 25 indicates that Batch should reserve 25% of the maximum available vCPU if there's only one share identifier, 6.25% if there are two fair share identifiers, and 1.56% if there are three share identifiers. The minimum value is 0 and the maximum value is 99.
        shareDistribution:
          $ref: "#/components/schemas/ShareAttributesList"
          description: An array of SharedIdentifier objects that contain the weights for the share identifiers for the fair-share policy. Share identifiers that aren't included have a default weight of 1.0.
    ShareAttributesList:
      type: array
      items:
        $ref: "#/components/schemas/ShareAttributes"
    ShareAttributes:
      description: Specifies the weights for the share identifiers for the fair-share policy. Share identifiers that aren't included have a default weight of 1.0.
      type: object
      properties:
        shareIdentifier:
          $ref: "#/components/schemas/String"
          description: A share identifier or share identifier prefix. If the string ends with an asterisk (*), this entry specifies the weight factor to use for share identifiers that start with that prefix. The list of share identifiers in a fair-share policy can't overlap. For example, you can't have one that specifies a shareIdentifier of UserA* and another that specifies a shareIdentifier of UserA1. There can be no more than 500 share identifiers active in a job queue. The string is limited to 255 alphanumeric characters, and can be followed by an asterisk (*).
        weightFactor:
          $ref: "#/components/schemas/Float"
          description: The weight factor for the share identifier. The default value is 1.0. A lower value has a higher priority for compute resources. For example, jobs that use a share identifier with a weight factor of 0.125 (1/8) get 8 times the compute resources of jobs that use a share identifier with a weight factor of 1. The smallest supported value is 0.0001, and the largest supported value is 999.9999.
      required:
        - shareIdentifier
    Float:
      type: number
      format: float
    CreateSchedulingPolicyResponse:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the scheduling policy.
        arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the scheduling policy. The format is aws:Partition:batch:Region:Account:scheduling-policy/Name . For example, aws:aws:batch:us-west-2:123456789012:scheduling-policy/MySchedulingPolicy.
      required:
        - name
        - arn
    ServiceEnvironmentType:
      type: string
      enum:
        - SAGEMAKER_TRAINING
    ServiceEnvironmentState:
      type: string
      enum:
        - ENABLED
        - DISABLED
    CapacityLimits:
      type: array
      items:
        $ref: "#/components/schemas/CapacityLimit"
    CapacityLimit:
      description: Defines the type and maximum quantity of resources that can be allocated to service jobs in a service environment.
      type: object
      properties:
        maxCapacity:
          $ref: "#/components/schemas/Integer"
          description: The maximum capacity available for the service environment. For a quota management enabled service environment, this value represents the maximum quantity of a particular resource type (specified by capacityUnit) that can be allocated to service jobs. For other service environments, this value represents the maximum quantity of all resources that can be allocated to service jobs. For example, if maxCapacity=50 and capacityUnit=NUM_INSTANCES, you can run up to 50 instances concurrently. If you run 5 SageMaker Training jobs that each use 10 instances, a subsequent job requiring 10 instances waits in the queue until capacity is available. In a quota management enabled service environment with capacityUnit=ml.m5.large, only ml.m5.large instances count against this limit, and jobs requiring other instance types wait until a matching capacity limit is configured.
        capacityUnit:
          $ref: "#/components/schemas/String"
          description: The unit of measure for the capacity limit, which defines how maxCapacity is interpreted. For SAGEMAKER_TRAINING jobs in a quota management enabled service environment, specify the instance type (for example, ml.m5.large). Otherwise, use NUM_INSTANCES.
    CreateServiceEnvironmentResponse:
      type: object
      properties:
        serviceEnvironmentName:
          $ref: "#/components/schemas/String"
          description: The name of the service environment.
        serviceEnvironmentArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the service environment.
      required:
        - serviceEnvironmentName
        - serviceEnvironmentArn
    DeleteComputeEnvironmentResponse:
      type: object
    DeleteConsumableResourceResponse:
      type: object
    DeleteJobQueueResponse:
      type: object
    DeleteQuotaShareResponse:
      type: object
    DeleteSchedulingPolicyResponse:
      type: object
    DeleteServiceEnvironmentResponse:
      type: object
    DeregisterJobDefinitionResponse:
      type: object
    DescribeComputeEnvironmentsResponse:
      type: object
      properties:
        computeEnvironments:
          $ref: "#/components/schemas/ComputeEnvironmentDetailList"
          description: The list of compute environments.
        nextToken:
          $ref: "#/components/schemas/String"
          description: The nextToken value to include in a future DescribeComputeEnvironments request. When the results of a DescribeComputeEnvironments request exceed maxResults, this value can be used to retrieve the next page of results. This value is null when there are no more results to return.
    ComputeEnvironmentDetailList:
      type: array
      items:
        $ref: "#/components/schemas/ComputeEnvironmentDetail"
    ComputeEnvironmentDetail:
      description: An object that represents an Batch compute environment.
      type: object
      properties:
        computeEnvironmentName:
          $ref: "#/components/schemas/String"
          description: The name of the compute environment. It can be up to 128 characters long. It can contain uppercase and lowercase letters, numbers, hyphens (-), and underscores (_).
        computeEnvironmentArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the compute environment.
        unmanagedvCpus:
          $ref: "#/components/schemas/Integer"
          description: The maximum number of VCPUs expected to be used for an unmanaged compute environment.
        ecsClusterArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the underlying Amazon ECS cluster that the compute environment uses.
        tags:
          type: object
          properties: {}
          description: The tags applied to the compute environment.
        type_:
          $ref: "#/components/schemas/CEType"
          description: "The type of the compute environment: MANAGED or UNMANAGED. For more information, see Compute environments in the Batch User Guide."
        state:
          $ref: "#/components/schemas/CEState"
          description: The state of the compute environment. The valid values are ENABLED or DISABLED. If the state is ENABLED, then the Batch scheduler can attempt to place jobs from an associated job queue on the compute resources within the environment. If the compute environment is managed, then it can scale its instances out or in automatically based on the job queue demand. If the state is DISABLED, then the Batch scheduler doesn't attempt to place jobs within the environment. Jobs in a STARTING or RUNNING state continue to progress normally. Managed compute environments in the DISABLED state don't scale out. Compute environments in a DISABLED state may continue to incur billing charges, for example, if they have running instances due to jobs that are still executing or a non-zero minvCpus setting. To prevent additional charges, disable and delete the compute environment. When an instance is idle, the instance scales down to the minvCpus value. However, the instance size doesn't change. For example, consider a c5.8xlarge instance with a minvCpus value of 4 and a desiredvCpus value of 36. This instance doesn't scale down to a c5.large instance.
        status:
          $ref: "#/components/schemas/CEStatus"
          description: The current status of the compute environment (for example, CREATING or VALID).
        statusReason:
          $ref: "#/components/schemas/String"
          description: A short, human-readable string to provide additional details for the current status of the compute environment.
        computeResources:
          $ref: "#/components/schemas/ComputeResource"
          description: The compute resources defined for the compute environment. For more information, see Compute environments in the Batch User Guide.
        serviceRole:
          $ref: "#/components/schemas/String"
          description: The service role that's associated with the compute environment that allows Batch to make calls to Amazon Web Services API operations on your behalf. For more information, see Batch service IAM role in the Batch User Guide.
        updatePolicy:
          $ref: "#/components/schemas/UpdatePolicy"
          description: Specifies the infrastructure update policy for the compute environment. For more information about infrastructure updates, see Updating compute environments in the Batch User Guide.
        eksConfiguration:
          $ref: "#/components/schemas/EksConfiguration"
          description: The configuration for the Amazon EKS cluster that supports the Batch compute environment. Only specify this parameter if the containerOrchestrationType is EKS.
        containerOrchestrationType:
          $ref: "#/components/schemas/OrchestrationType"
          description: The orchestration type of the compute environment. The valid values are ECS (default) or EKS.
        uuid:
          $ref: "#/components/schemas/String"
          description: Unique identifier for the compute environment.
        context:
          $ref: "#/components/schemas/String"
          description: Reserved.
      required:
        - computeEnvironmentName
        - computeEnvironmentArn
    CEStatus:
      type: string
      enum:
        - CREATING
        - UPDATING
        - DELETING
        - DELETED
        - VALID
        - INVALID
    UpdatePolicy:
      description: Specifies the infrastructure update policy for the Amazon EC2 compute environment. For more information about infrastructure updates, see Updating compute environments in the Batch User Guide.
      type: object
      properties:
        terminateJobsOnUpdate:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether jobs are automatically terminated when the compute environment infrastructure is updated. The default value is false.
        jobExecutionTimeoutMinutes:
          $ref: "#/components/schemas/JobExecutionTimeoutMinutes"
          description: Specifies the job timeout (in minutes) when the compute environment infrastructure is updated. The default value is 30.
    Boolean:
      type: boolean
    JobExecutionTimeoutMinutes:
      type: integer
      format: int64
      minimum: 1
      maximum: 360
    OrchestrationType:
      type: string
      enum:
        - ECS
        - EKS
    DescribeConsumableResourceResponse:
      type: object
      properties:
        consumableResourceName:
          $ref: "#/components/schemas/String"
          description: The name of the consumable resource.
        consumableResourceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the consumable resource.
        totalQuantity:
          $ref: "#/components/schemas/Long"
          description: The total amount of the consumable resource that is available.
        inUseQuantity:
          $ref: "#/components/schemas/Long"
          description: The amount of the consumable resource that is currently in use.
        availableQuantity:
          $ref: "#/components/schemas/Long"
          description: The amount of the consumable resource that is currently available to use.
        resourceType:
          $ref: "#/components/schemas/String"
          description: "Indicates whether the resource is available to be re-used after a job completes. Can be one of: REPLENISHABLE NON_REPLENISHABLE"
        createdAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the consumable resource was created.
        tags:
          type: object
          properties: {}
          description: The tags that you apply to the consumable resource to help you categorize and organize your resources. Each tag consists of a key and an optional value. For more information, see Tagging your Batch resources.
      required:
        - consumableResourceName
        - consumableResourceArn
    DescribeJobDefinitionsResponse:
      type: object
      properties:
        jobDefinitions:
          $ref: "#/components/schemas/JobDefinitionList"
          description: The list of job definitions.
        nextToken:
          $ref: "#/components/schemas/String"
          description: The nextToken value to include in a future DescribeJobDefinitions request. When the results of a DescribeJobDefinitions request exceed maxResults, this value can be used to retrieve the next page of results. This value is null when there are no more results to return.
    JobDefinitionList:
      type: array
      items:
        $ref: "#/components/schemas/JobDefinition"
    JobDefinition:
      description: An object that represents an Batch job definition.
      type: object
      properties:
        jobDefinitionName:
          $ref: "#/components/schemas/String"
          description: The name of the job definition.
        jobDefinitionArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) for the job definition.
        revision:
          $ref: "#/components/schemas/Integer"
          description: The revision of the job definition.
        status:
          $ref: "#/components/schemas/String"
          description: The status of the job definition.
        type_:
          $ref: "#/components/schemas/String"
          description: The type of job definition. It's either container or multinode. If the job is run on Fargate resources, then multinode isn't supported. For more information about multi-node parallel jobs, see Creating a multi-node parallel job definition in the Batch User Guide.
        schedulingPriority:
          $ref: "#/components/schemas/Integer"
          description: The scheduling priority of the job definition. This only affects jobs in job queues with a fair-share policy. Jobs with a higher scheduling priority are scheduled before jobs with a lower scheduling priority.
        parameters:
          type: object
          properties: {}
          description: Default parameters or parameter substitution placeholders that are set in the job definition. Parameters are specified as a key-value pair mapping. Parameters in a SubmitJob request override any corresponding parameter defaults from the job definition. For more information about specifying parameters, see Job definition parameters in the Batch User Guide.
        retryStrategy:
          $ref: "#/components/schemas/RetryStrategy"
          description: The retry strategy to use for failed jobs that are submitted with this job definition.
        containerProperties:
          $ref: "#/components/schemas/ContainerProperties"
          description: An object with properties specific to Amazon ECS-based jobs. When containerProperties is used in the job definition, it can't be used in addition to eksProperties, ecsProperties, or nodeProperties.
        timeout:
          $ref: "#/components/schemas/JobTimeout"
          description: The timeout time for jobs that are submitted with this job definition. After the amount of time you specify passes, Batch terminates your jobs if they aren't finished.
        nodeProperties:
          $ref: "#/components/schemas/NodeProperties"
          description: An object with properties that are specific to multi-node parallel jobs. When nodeProperties is used in the job definition, it can't be used in addition to containerProperties, ecsProperties, or eksProperties. If the job runs on Fargate resources, don't specify nodeProperties. Use containerProperties instead.
        tags:
          type: object
          properties: {}
          description: The tags that are applied to the job definition.
        propagateTags:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether to propagate the tags from the job or job definition to the corresponding Amazon ECS task. If no value is specified, the tags aren't propagated. Tags can only be propagated to the tasks when the tasks are created. For tags with the same name, job tags are given priority over job definitions tags. If the total number of combined tags from the job and job definition is over 50, the job is moved to the FAILED state.
        platformCapabilities:
          $ref: "#/components/schemas/PlatformCapabilityList"
          description: The platform capabilities required by the job definition. If no value is specified, it defaults to EC2. Jobs run on Fargate resources specify FARGATE.
        ecsProperties:
          $ref: "#/components/schemas/EcsProperties"
          description: An object that contains the properties for the Amazon ECS resources of a job.When ecsProperties is used in the job definition, it can't be used in addition to containerProperties, eksProperties, or nodeProperties.
        eksProperties:
          $ref: "#/components/schemas/EksProperties"
          description: An object with properties that are specific to Amazon EKS-based jobs. When eksProperties is used in the job definition, it can't be used in addition to containerProperties, ecsProperties, or nodeProperties.
        containerOrchestrationType:
          $ref: "#/components/schemas/OrchestrationType"
          description: The orchestration type of the compute environment. The valid values are ECS (default) or EKS.
        consumableResourceProperties:
          $ref: "#/components/schemas/ConsumableResourceProperties"
          description: Contains a list of consumable resources required by the job.
      required:
        - jobDefinitionName
        - jobDefinitionArn
        - revision
        - type_
    RetryStrategy:
      description: The retry strategy that's associated with a job. For more information, see Automated job retries in the Batch User Guide.
      type: object
      properties:
        attempts:
          $ref: "#/components/schemas/Integer"
          description: The number of times to move a job to the RUNNABLE status. You can specify between 1 and 10 attempts. If the value of attempts is greater than one, the job is retried on failure the same number of attempts as the value.
        evaluateOnExit:
          $ref: "#/components/schemas/EvaluateOnExitList"
          description: Array of up to 5 objects that specify the conditions where jobs are retried or failed. If this parameter is specified, then the attempts parameter must also be specified. If none of the listed conditions match, then the job is retried.
    EvaluateOnExitList:
      type: array
      items:
        $ref: "#/components/schemas/EvaluateOnExit"
    EvaluateOnExit:
      description: Specifies an array of up to 5 conditions to be met, and an action to take (RETRY or EXIT) if all conditions are met. If none of the EvaluateOnExit conditions in a RetryStrategy match, then the job is retried.
      type: object
      properties:
        onStatusReason:
          $ref: "#/components/schemas/String"
          description: Contains a glob pattern to match against the StatusReason returned for a job. The pattern can contain up to 512 characters. It can contain letters, numbers, periods (.), colons (:), and white spaces (including spaces or tabs). It can optionally end with an asterisk (*) so that only the start of the string needs to be an exact match.
        onReason:
          $ref: "#/components/schemas/String"
          description: Contains a glob pattern to match against the Reason returned for a job. The pattern can contain up to 512 characters. It can contain letters, numbers, periods (.), colons (:), and white space (including spaces and tabs). It can optionally end with an asterisk (*) so that only the start of the string needs to be an exact match.
        onExitCode:
          $ref: "#/components/schemas/String"
          description: Contains a glob pattern to match against the decimal representation of the ExitCode returned for a job. The pattern can be up to 512 characters long. It can contain only numbers, and can end with an asterisk (*) so that only the start of the string needs to be an exact match. The string can contain up to 512 characters.
        action:
          $ref: "#/components/schemas/RetryAction"
          description: Specifies the action to take if all of the specified conditions (onStatusReason, onReason, and onExitCode) are met. The values aren't case sensitive.
      required:
        - action
    RetryAction:
      type: string
      enum:
        - RETRY
        - EXIT
    ContainerProperties:
      description: Container properties are used for Amazon ECS based job definitions. These properties to describe the container that's launched as part of a job.
      type: object
      properties:
        image:
          $ref: "#/components/schemas/String"
          description: Required. The image used to start a container. This string is passed directly to the Docker daemon. Images in the Docker Hub registry are available by default. Other repositories are specified with repository-url/image:tag . It can be 255 characters long. It can contain uppercase and lowercase letters, numbers, hyphens (-), underscores (_), colons (:), periods (.), forward slashes (/), and number signs (#). This parameter maps to Image in the Create a container section of the Docker Remote API and the IMAGE parameter of docker run. Docker image architecture must match the processor architecture of the compute resources that they're scheduled on. For example, ARM-based Docker images can only run on ARM-based compute resources. Images in Amazon ECR Public repositories use the full registry/repository[:tag] or registry/repository[@digest] naming conventions. For example, public.ecr.aws/registry_alias/my-web-app:latest . Images in Amazon ECR repositories use the full registry and repository URI (for example, 123456789012.dkr.ecr.`<region-name>`.amazonaws.com/`<repository-name>`). Images in official repositories on Docker Hub use a single name (for example, ubuntu or mongo). Images in other repositories on Docker Hub are qualified with an organization name (for example, amazon/amazon-ecs-agent). Images in other online repositories are qualified further by a domain name (for example, quay.io/assemblyline/ubuntu).
        vcpus:
          $ref: "#/components/schemas/Integer"
          description: This parameter is deprecated, use resourceRequirements to specify the vCPU requirements for the job definition. It's not supported for jobs running on Fargate resources. For jobs running on Amazon EC2 resources, it specifies the number of vCPUs reserved for the job. Each vCPU is equivalent to 1,024 CPU shares. This parameter maps to CpuShares in the Create a container section of the Docker Remote API and the --cpu-shares option to docker run. The number of vCPUs must be specified but can be specified in several places. You must specify it at least once for each node.
        memory:
          $ref: "#/components/schemas/Integer"
          description: This parameter is deprecated, use resourceRequirements to specify the memory requirements for the job definition. It's not supported for jobs running on Fargate resources. For jobs that run on Amazon EC2 resources, it specifies the memory hard limit (in MiB) for a container. If your container attempts to exceed the specified number, it's terminated. You must specify at least 4 MiB of memory for a job using this parameter. The memory hard limit can be specified in several places. It must be specified for each node at least once.
        command:
          $ref: "#/components/schemas/StringList"
          description: The command that's passed to the container. This parameter maps to Cmd in the Create a container section of the Docker Remote API and the COMMAND parameter to docker run. For more information, see https://docs.docker.com/engine/reference/builder/#cmd.
        jobRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the IAM role that the container can assume for Amazon Web Services permissions. For more information, see IAM roles for tasks in the Amazon Elastic Container Service Developer Guide.
        executionRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the execution role that Batch can assume. For jobs that run on Fargate resources, you must provide an execution role. For more information, see Batch execution IAM role in the Batch User Guide.
        volumes:
          $ref: "#/components/schemas/Volumes"
          description: A list of data volumes used in a job.
        environment:
          $ref: "#/components/schemas/EnvironmentVariables"
          description: The environment variables to pass to a container. This parameter maps to Env in the Create a container section of the Docker Remote API and the --env option to docker run. We don't recommend using plaintext environment variables for sensitive information, such as credential data. Environment variables cannot start with "AWS_BATCH". This naming convention is reserved for variables that Batch sets.
        mountPoints:
          $ref: "#/components/schemas/MountPoints"
          description: The mount points for data volumes in your container. This parameter maps to Volumes in the Create a container section of the Docker Remote API and the --volume option to docker run.
        readonlyRootFilesystem:
          $ref: "#/components/schemas/Boolean"
          description: When this parameter is true, the container is given read-only access to its root file system. This parameter maps to ReadonlyRootfs in the Create a container section of the Docker Remote API and the --read-only option to docker run.
        privileged:
          $ref: "#/components/schemas/Boolean"
          description: When this parameter is true, the container is given elevated permissions on the host container instance (similar to the root user). This parameter maps to Privileged in the Create a container section of the Docker Remote API and the --privileged option to docker run. The default value is false. This parameter isn't applicable to jobs that are running on Fargate resources and shouldn't be provided, or specified as false.
        ulimits:
          $ref: "#/components/schemas/Ulimits"
          description: A list of ulimits to set in the container. This parameter maps to Ulimits in the Create a container section of the Docker Remote API and the --ulimit option to docker run. This parameter isn't applicable to jobs that are running on Fargate resources and shouldn't be provided.
        user:
          $ref: "#/components/schemas/String"
          description: The user name to use inside the container. This parameter maps to User in the Create a container section of the Docker Remote API and the --user option to docker run.
        instanceType:
          $ref: "#/components/schemas/String"
          description: The instance type to use for a multi-node parallel job. All node groups in a multi-node parallel job must use the same instance type. This parameter isn't applicable to single-node container jobs or jobs that run on Fargate resources, and shouldn't be provided.
        resourceRequirements:
          $ref: "#/components/schemas/ResourceRequirements"
          description: The type and amount of resources to assign to a container. The supported resources include GPU, MEMORY, and VCPU.
        linuxParameters:
          $ref: "#/components/schemas/LinuxParameters"
          description: Linux-specific modifications that are applied to the container, such as details for device mappings.
        logConfiguration:
          $ref: "#/components/schemas/LogConfiguration"
          description: 'The log configuration specification for the container. This parameter maps to LogConfig in the Create a container section of the Docker Remote API and the --log-driver option to docker run. By default, containers use the same logging driver that the Docker daemon uses. However the container might use a different logging driver than the Docker daemon by specifying a log driver with this parameter in the container definition. To use a different logging driver for a container, the log system must be configured properly on the container instance (or on a different log server for remote logging options). For more information on the options for different supported log drivers, see Configure logging drivers in the Docker documentation. Batch currently supports a subset of the logging drivers available to the Docker daemon (shown in the LogConfiguration data type). This parameter requires version 1.18 of the Docker Remote API or greater on your container instance. To check the Docker Remote API version on your container instance, log in to your container instance and run the following command: sudo docker version | grep "Server API version" The Amazon ECS container agent running on a container instance must register the logging drivers available on that instance with the ECS_AVAILABLE_LOGGING_DRIVERS environment variable before containers placed on that instance can use these log configuration options. For more information, see Amazon ECS container agent configuration in the Amazon Elastic Container Service Developer Guide.'
        secrets:
          $ref: "#/components/schemas/SecretList"
          description: The secrets for the container. For more information, see Specifying sensitive data in the Batch User Guide.
        networkConfiguration:
          $ref: "#/components/schemas/NetworkConfiguration"
          description: The network configuration for jobs that are running on Fargate resources. Jobs that are running on Amazon EC2 resources must not specify this parameter.
        fargatePlatformConfiguration:
          $ref: "#/components/schemas/FargatePlatformConfiguration"
          description: The platform configuration for jobs that are running on Fargate resources. Jobs that are running on Amazon EC2 resources must not specify this parameter.
        enableExecuteCommand:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether execute command functionality is turned on for this task. If true, execute command functionality is turned on all the containers in the task.
        ephemeralStorage:
          $ref: "#/components/schemas/EphemeralStorage"
          description: The amount of ephemeral storage to allocate for the task. This parameter is used to expand the total amount of ephemeral storage available, beyond the default amount, for tasks hosted on Fargate.
        runtimePlatform:
          $ref: "#/components/schemas/RuntimePlatform"
          description: An object that represents the compute environment architecture for Batch jobs on Fargate.
        repositoryCredentials:
          $ref: "#/components/schemas/RepositoryCredentials"
          description: The private repository authentication credentials to use.
    Volumes:
      type: array
      items:
        $ref: "#/components/schemas/Volume"
    Volume:
      description: A data volume that's used in a job's container properties.
      type: object
      properties:
        host:
          $ref: "#/components/schemas/Host"
          description: The contents of the host parameter determine whether your data volume persists on the host container instance and where it's stored. If the host parameter is empty, then the Docker daemon assigns a host path for your data volume. However, the data isn't guaranteed to persist after the containers that are associated with it stop running. This parameter isn't applicable to jobs that are running on Fargate resources and shouldn't be provided.
        name:
          $ref: "#/components/schemas/String"
          description: The name of the volume. It can be up to 255 characters long. It can contain uppercase and lowercase letters, numbers, hyphens (-), and underscores (_). This name is referenced in the sourceVolume parameter of container definition mountPoints.
        efsVolumeConfiguration:
          $ref: "#/components/schemas/EFSVolumeConfiguration"
          description: This parameter is specified when you're using an Amazon Elastic File System file system for job storage. Jobs that are running on Fargate resources must specify a platformVersion of at least 1.4.0.
        s3filesVolumeConfiguration:
          $ref: "#/components/schemas/S3FilesVolumeConfiguration"
          description: This parameter is specified when you're using an S3Files file system for job storage.
    Host:
      description: Determine whether your data volume persists on the host container instance and where it's stored. If this parameter is empty, then the Docker daemon assigns a host path for your data volume. However, the data isn't guaranteed to persist after the containers that are associated with it stop running.
      type: object
      properties:
        sourcePath:
          $ref: "#/components/schemas/String"
          description: The path on the host container instance that's presented to the container. If this parameter is empty, then the Docker daemon has assigned a host path for you. If this parameter contains a file location, then the data volume persists at the specified location on the host container instance until you delete it manually. If the source path location doesn't exist on the host container instance, the Docker daemon creates it. If the location does exist, the contents of the source path folder are exported. This parameter isn't applicable to jobs that run on Fargate resources. Don't provide this for these jobs.
    EFSVolumeConfiguration:
      description: This is used when you're using an Amazon Elastic File System file system for job storage. For more information, see Amazon EFS Volumes in the Batch User Guide.
      type: object
      properties:
        fileSystemId:
          $ref: "#/components/schemas/String"
          description: The Amazon EFS file system ID to use.
        rootDirectory:
          $ref: "#/components/schemas/String"
          description: The directory within the Amazon EFS file system to mount as the root directory inside the host. If this parameter is omitted, the root of the Amazon EFS volume is used instead. Specifying / has the same effect as omitting this parameter. The maximum length is 4,096 characters. If an EFS access point is specified in the authorizationConfig, the root directory parameter must either be omitted or set to /, which enforces the path set on the Amazon EFS access point.
        transitEncryption:
          $ref: "#/components/schemas/EFSTransitEncryption"
          description: Determines whether to enable encryption for Amazon EFS data in transit between the Amazon ECS host and the Amazon EFS server. Transit encryption must be enabled if Amazon EFS IAM authorization is used. If this parameter is omitted, the default value of DISABLED is used. For more information, see Encrypting data in transit in the Amazon Elastic File System User Guide.
        transitEncryptionPort:
          $ref: "#/components/schemas/Integer"
          description: The port to use when sending encrypted data between the Amazon ECS host and the Amazon EFS server. If you don't specify a transit encryption port, it uses the port selection strategy that the Amazon EFS mount helper uses. The value must be between 0 and 65,535. For more information, see EFS mount helper in the Amazon Elastic File System User Guide.
        authorizationConfig:
          $ref: "#/components/schemas/EFSAuthorizationConfig"
          description: The authorization configuration details for the Amazon EFS file system.
      required:
        - fileSystemId
    EFSTransitEncryption:
      type: string
      enum:
        - ENABLED
        - DISABLED
    EFSAuthorizationConfig:
      description: The authorization configuration details for the Amazon EFS file system.
      type: object
      properties:
        accessPointId:
          $ref: "#/components/schemas/String"
          description: The Amazon EFS access point ID to use. If an access point is specified, the root directory value specified in the EFSVolumeConfiguration must either be omitted or set to / which enforces the path set on the EFS access point. If an access point is used, transit encryption must be enabled in the EFSVolumeConfiguration. For more information, see Working with Amazon EFS access points in the Amazon Elastic File System User Guide.
        iam:
          $ref: "#/components/schemas/EFSAuthorizationConfigIAM"
          description: Whether or not to use the Batch job IAM role defined in a job definition when mounting the Amazon EFS file system. If enabled, transit encryption must be enabled in the EFSVolumeConfiguration. If this parameter is omitted, the default value of DISABLED is used. For more information, see Using Amazon EFS access points in the Batch User Guide. EFS IAM authorization requires that TransitEncryption be ENABLED and that a JobRoleArn is specified.
    EFSAuthorizationConfigIAM:
      type: string
      enum:
        - ENABLED
        - DISABLED
    S3FilesVolumeConfiguration:
      description: This is used when you're using an S3Files file system for job storage.
      type: object
      properties:
        fileSystemArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the S3Files file system to use.
        rootDirectory:
          $ref: "#/components/schemas/String"
          description: The directory within the S3Files file system to mount as the root directory.
        transitEncryptionPort:
          $ref: "#/components/schemas/Integer"
          description: The port to use when sending encrypted data between the Amazon ECS host and the S3Files file system server.
        accessPointArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the S3Files access point to use.
      required:
        - fileSystemArn
    EnvironmentVariables:
      type: array
      items:
        $ref: "#/components/schemas/KeyValuePair"
    KeyValuePair:
      description: A key-value pair object.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the key-value pair. For environment variables, this is the name of the environment variable.
        value:
          $ref: "#/components/schemas/String"
          description: The value of the key-value pair. For environment variables, this is the value of the environment variable.
    MountPoints:
      type: array
      items:
        $ref: "#/components/schemas/MountPoint"
    MountPoint:
      description: Details for a Docker volume mount point that's used in a job's container properties. This parameter maps to Volumes in the Create a container section of the Docker Remote API and the --volume option to docker run.
      type: object
      properties:
        containerPath:
          $ref: "#/components/schemas/String"
          description: The path on the container where the host volume is mounted.
        readOnly_:
          $ref: "#/components/schemas/Boolean"
          description: If this value is true, the container has read-only access to the volume. Otherwise, the container can write to the volume. The default value is false.
        sourceVolume:
          $ref: "#/components/schemas/String"
          description: The name of the volume to mount.
    Ulimits:
      type: array
      items:
        $ref: "#/components/schemas/Ulimit"
    Ulimit:
      description: The ulimit settings to pass to the container. For more information, see Ulimit. This object isn't applicable to jobs that are running on Fargate resources.
      type: object
      properties:
        hardLimit:
          $ref: "#/components/schemas/Integer"
          description: The hard limit for the ulimit type.
        name:
          $ref: "#/components/schemas/String"
          description: "The type of the ulimit. Valid values are: core | cpu | data | fsize | locks | memlock | msgqueue | nice | nofile | nproc | rss | rtprio | rttime | sigpending | stack."
        softLimit:
          $ref: "#/components/schemas/Integer"
          description: The soft limit for the ulimit type.
      required:
        - hardLimit
        - name
        - softLimit
    ResourceRequirements:
      type: array
      items:
        $ref: "#/components/schemas/ResourceRequirement"
    ResourceRequirement:
      description: The type and amount of a resource to assign to a container. The supported resources include GPU, MEMORY, and VCPU.
      type: object
      properties:
        value:
          $ref: "#/components/schemas/String"
          description: The quantity of the specified resource to reserve for the container. The values vary based on the type specified. type="GPU" The number of physical GPUs to reserve for the container. Make sure that the number of GPUs reserved for all containers in a job doesn't exceed the number of available GPUs on the compute resource that the job is launched on. GPUs aren't available for jobs that are running on Fargate resources. type="MEMORY" The memory hard limit (in MiB) present to the container. This parameter is supported for jobs that are running on Amazon EC2 resources. If your container attempts to exceed the memory specified, the container is terminated. This parameter maps to Memory in the Create a container section of the Docker Remote API and the --memory option to docker run. You must specify at least 4 MiB of memory for a job. This is required but can be specified in several places for multi-node parallel (MNP) jobs. It must be specified for each node at least once. This parameter maps to Memory in the Create a container section of the Docker Remote API and the --memory option to docker run. If you're trying to maximize your resource utilization by providing your jobs as much memory as possible for a particular instance type, see Memory management in the Batch User Guide. For jobs that are running on Fargate resources, then value is the hard limit (in MiB), and must match one of the supported values and the VCPU values must be one of the values supported for that memory value. value = 512 VCPU = 0.25 value = 1024 VCPU = 0.25 or 0.5 value = 2048 VCPU = 0.25, 0.5, or 1 value = 3072 VCPU = 0.5, or 1 value = 4096 VCPU = 0.5, 1, or 2 value = 5120, 6144, or 7168 VCPU = 1 or 2 value = 8192 VCPU = 1, 2, or 4 value = 9216, 10240, 11264, 12288, 13312, 14336, or 15360 VCPU = 2 or 4 value = 16384 VCPU = 2, 4, or 8 value = 17408, 18432, 19456, 21504, 22528, 23552, 25600, 26624, 27648, 29696, or 30720 VCPU = 4 value = 20480, 24576, or 28672 VCPU = 4 or 8 value = 36864, 45056, 53248, or 61440 VCPU = 8 value = 32768, 40960, 49152, or 57344 VCPU = 8 or 16 value = 65536, 73728, 81920, 90112, 98304, 106496, 114688, or 122880 VCPU = 16 type="VCPU" The number of vCPUs reserved for the container. This parameter maps to CpuShares in the Create a container section of the Docker Remote API and the --cpu-shares option to docker run. Each vCPU is equivalent to 1,024 CPU shares. For Amazon EC2 resources, you must specify at least one vCPU. This is required but can be specified in several places; it must be specified for each node at least once. The default for the Fargate On-Demand vCPU resource count quota is 6 vCPUs. For more information about Fargate quotas, see Fargate quotas in the Amazon Web Services General Reference. For jobs that are running on Fargate resources, then value must match one of the supported values and the MEMORY values must be one of the values supported for that VCPU value. The supported values are 0.25, 0.5, 1, 2, 4, 8, and 16 value = 0.25 MEMORY = 512, 1024, or 2048 value = 0.5 MEMORY = 1024, 2048, 3072, or 4096 value = 1 MEMORY = 2048, 3072, 4096, 5120, 6144, 7168, or 8192 value = 2 MEMORY = 4096, 5120, 6144, 7168, 8192, 9216, 10240, 11264, 12288, 13312, 14336, 15360, or 16384 value = 4 MEMORY = 8192, 9216, 10240, 11264, 12288, 13312, 14336, 15360, 16384, 17408, 18432, 19456, 20480, 21504, 22528, 23552, 24576, 25600, 26624, 27648, 28672, 29696, or 30720 value = 8 MEMORY = 16384, 20480, 24576, 28672, 32768, 36864, 40960, 45056, 49152, 53248, 57344, or 61440 value = 16 MEMORY = 32768, 40960, 49152, 57344, 65536, 73728, 81920, 90112, 98304, 106496, 114688, or 122880
        type_:
          $ref: "#/components/schemas/ResourceType"
          description: The type of resource to assign to a container. The supported resources include GPU, MEMORY, and VCPU.
      required:
        - value
        - type_
    ResourceType:
      type: string
      enum:
        - GPU
        - VCPU
        - MEMORY
    LinuxParameters:
      description: Linux-specific modifications that are applied to the container, such as details for device mappings.
      type: object
      properties:
        devices:
          $ref: "#/components/schemas/DevicesList"
          description: Any of the host devices to expose to the container. This parameter maps to Devices in the Create a container section of the Docker Remote API and the --device option to docker run. This parameter isn't applicable to jobs that are running on Fargate resources. Don't provide it for these jobs.
        initProcessEnabled:
          $ref: "#/components/schemas/Boolean"
          description: 'If true, run an init process inside the container that forwards signals and reaps processes. This parameter maps to the --init option to docker run. This parameter requires version 1.25 of the Docker Remote API or greater on your container instance. To check the Docker Remote API version on your container instance, log in to your container instance and run the following command: sudo docker version | grep "Server API version"'
        sharedMemorySize:
          $ref: "#/components/schemas/Integer"
          description: The value for the size (in MiB) of the /dev/shm volume. This parameter maps to the --shm-size option to docker run. This parameter isn't applicable to jobs that are running on Fargate resources. Don't provide it for these jobs.
        tmpfs:
          $ref: "#/components/schemas/TmpfsList"
          description: The container path, mount options, and size (in MiB) of the tmpfs mount. This parameter maps to the --tmpfs option to docker run. This parameter isn't applicable to jobs that are running on Fargate resources. Don't provide this parameter for this resource type.
        maxSwap:
          $ref: "#/components/schemas/Integer"
          description: The total amount of swap memory (in MiB) a container can use. This parameter is translated to the --memory-swap option to docker run where the value is the sum of the container memory plus the maxSwap value. For more information, see --memory-swap details in the Docker documentation. If a maxSwap value of 0 is specified, the container doesn't use swap. Accepted values are 0 or any positive integer. If the maxSwap parameter is omitted, the container doesn't use the swap configuration for the container instance on which it runs. A maxSwap value must be set for the swappiness parameter to be used. This parameter isn't applicable to jobs that are running on Fargate resources. Don't provide it for these jobs.
        swappiness:
          $ref: "#/components/schemas/Integer"
          description: You can use this parameter to tune a container's memory swappiness behavior. A swappiness value of 0 causes swapping to not occur unless absolutely necessary. A swappiness value of 100 causes pages to be swapped aggressively. Valid values are whole numbers between 0 and 100. If the swappiness parameter isn't specified, a default value of 60 is used. If a value isn't specified for maxSwap, then this parameter is ignored. If maxSwap is set to 0, the container doesn't use swap. This parameter maps to the --memory-swappiness option to docker run. Consider the following when you use a per-container swap configuration. Swap space must be enabled and allocated on the container instance for the containers to use. By default, the Amazon ECS optimized AMIs don't have swap enabled. You must enable swap on the instance to use this feature. For more information, see Instance store swap volumes in the Amazon EC2 User Guide for Linux Instances or How do I allocate memory to work as swap space in an Amazon EC2 instance by using a swap file? The swap space parameters are only supported for job definitions using EC2 resources. If the maxSwap and swappiness parameters are omitted from a job definition, each container has a default swappiness value of 60. Moreover, the total swap usage is limited to two times the memory reservation of the container. This parameter isn't applicable to jobs that are running on Fargate resources. Don't provide it for these jobs.
    DevicesList:
      type: array
      items:
        $ref: "#/components/schemas/Device"
    Device:
      description: An object that represents a container instance host device. This object isn't applicable to jobs that are running on Fargate resources and shouldn't be provided.
      type: object
      properties:
        hostPath:
          $ref: "#/components/schemas/String"
          description: The path for the device on the host container instance.
        containerPath:
          $ref: "#/components/schemas/String"
          description: The path inside the container that's used to expose the host device. By default, the hostPath value is used.
        permissions:
          $ref: "#/components/schemas/DeviceCgroupPermissions"
          description: The explicit permissions to provide to the container for the device. By default, the container has permissions for read, write, and mknod for the device.
      required:
        - hostPath
    DeviceCgroupPermissions:
      type: array
      items:
        $ref: "#/components/schemas/DeviceCgroupPermission"
    DeviceCgroupPermission:
      type: string
      enum:
        - READ
        - WRITE
        - MKNOD
    TmpfsList:
      type: array
      items:
        $ref: "#/components/schemas/Tmpfs"
    Tmpfs:
      description: The container path, mount options, and size of the tmpfs mount. This object isn't applicable to jobs that are running on Fargate resources.
      type: object
      properties:
        containerPath:
          $ref: "#/components/schemas/String"
          description: The absolute file path in the container where the tmpfs volume is mounted.
        size:
          $ref: "#/components/schemas/Integer"
          description: The size (in MiB) of the tmpfs volume.
        mountOptions:
          $ref: "#/components/schemas/StringList"
          description: 'The list of tmpfs volume mount options. Valid values: "defaults" | "ro" | "rw" | "suid" | "nosuid" | "dev" | "nodev" | "exec" | "noexec" | "sync" | "async" | "dirsync" | "remount" | "mand" | "nomand" | "atime" | "noatime" | "diratime" | "nodiratime" | "bind" | "rbind" | "unbindable" | "runbindable" | "private" | "rprivate" | "shared" | "rshared" | "slave" | "rslave" | "relatime" | "norelatime" | "strictatime" | "nostrictatime" | "mode" | "uid" | "gid" | "nr_inodes" | "nr_blocks" | "mpol"'
      required:
        - containerPath
        - size
    LogConfiguration:
      description: Log configuration options to send to a custom log driver for the container.
      type: object
      properties:
        logDriver:
          $ref: "#/components/schemas/LogDriver"
          description: "The log driver to use for the container. The valid values that are listed for this parameter are log drivers that the Amazon ECS container agent can communicate with by default. The supported log drivers are awsfirelens, awslogs, fluentd, gelf, json-file, journald, logentries, syslog, and splunk. Jobs that are running on Fargate resources are restricted to the awslogs and splunk log drivers. awsfirelens Specifies the firelens logging driver. For more information on configuring Firelens, see Send Amazon ECS logs to an Amazon Web Services service or Amazon Web Services Partner in the Amazon Elastic Container Service Developer Guide. awslogs Specifies the Amazon CloudWatch Logs logging driver. For more information, see Using the awslogs log driver in the Batch User Guide and Amazon CloudWatch Logs logging driver in the Docker documentation. fluentd Specifies the Fluentd logging driver. For more information including usage and options, see Fluentd logging driver in the Docker documentation. gelf Specifies the Graylog Extended Format (GELF) logging driver. For more information including usage and options, see Graylog Extended Format logging driver in the Docker documentation. journald Specifies the journald logging driver. For more information including usage and options, see Journald logging driver in the Docker documentation. json-file Specifies the JSON file logging driver. For more information including usage and options, see JSON File logging driver in the Docker documentation. splunk Specifies the Splunk logging driver. For more information including usage and options, see Splunk logging driver in the Docker documentation. syslog Specifies the syslog logging driver. For more information including usage and options, see Syslog logging driver in the Docker documentation. If you have a custom driver that's not listed earlier that you want to work with the Amazon ECS container agent, you can fork the Amazon ECS container agent project that's available on GitHub and customize it to work with that driver. We encourage you to submit pull requests for changes that you want to have included. However, Amazon Web Services doesn't currently support running modified copies of this software. This parameter requires version 1.18 of the Docker Remote API or greater on your container instance. To check the Docker Remote API version on your container instance, log in to your container instance and run the following command: sudo docker version | grep \"Server API version\""
        options:
          type: object
          properties: {}
          description: 'The configuration options to send to the log driver. This parameter requires version 1.19 of the Docker Remote API or greater on your container instance. To check the Docker Remote API version on your container instance, log in to your container instance and run the following command: sudo docker version | grep "Server API version"'
        secretOptions:
          $ref: "#/components/schemas/SecretList"
          description: The secrets to pass to the log configuration. For more information, see Specifying sensitive data in the Batch User Guide.
      required:
        - logDriver
    LogDriver:
      type: string
      enum:
        - json-file
        - syslog
        - journald
        - gelf
        - fluentd
        - awslogs
        - splunk
        - awsfirelens
    SecretList:
      type: array
      items:
        $ref: "#/components/schemas/Secret"
    Secret:
      description: "An object that represents the secret to expose to your container. Secrets can be exposed to a container in the following ways: To inject sensitive data into your containers as environment variables, use the secrets container definition parameter. To reference sensitive information in the log configuration of a container, use the secretOptions container definition parameter. For more information, see Specifying sensitive data in the Batch User Guide."
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the secret.
        valueFrom:
          $ref: "#/components/schemas/String"
          description: The secret to expose to the container. The supported values are either the full Amazon Resource Name (ARN) of the Secrets Manager secret or the full ARN of the parameter in the Amazon Web Services Systems Manager Parameter Store. If the Amazon Web Services Systems Manager Parameter Store parameter exists in the same Region as the job you're launching, then you can use either the full Amazon Resource Name (ARN) or name of the parameter. If the parameter exists in a different Region, then the full ARN must be specified.
      required:
        - name
        - valueFrom
    NetworkConfiguration:
      description: The network configuration for jobs that are running on Fargate resources. Jobs that are running on Amazon EC2 resources must not specify this parameter.
      type: object
      properties:
        assignPublicIp:
          $ref: "#/components/schemas/AssignPublicIp"
          description: Indicates whether the job has a public IP address. For a job that's running on Fargate resources in a private subnet to send outbound traffic to the internet (for example, to pull container images), the private subnet requires a NAT gateway be attached to route requests to the internet. For more information, see Amazon ECS task networking in the Amazon Elastic Container Service Developer Guide. The default value is "DISABLED".
    AssignPublicIp:
      type: string
      enum:
        - ENABLED
        - DISABLED
    FargatePlatformConfiguration:
      description: The platform configuration for jobs that are running on Fargate resources. Jobs that run on Amazon EC2 resources must not specify this parameter.
      type: object
      properties:
        platformVersion:
          $ref: "#/components/schemas/String"
          description: The Fargate platform version where the jobs are running. A platform version is specified only for jobs that are running on Fargate resources. If one isn't specified, the LATEST platform version is used by default. This uses a recent, approved version of the Fargate platform for compute resources. For more information, see Fargate platform versions in the Amazon Elastic Container Service Developer Guide.
    EphemeralStorage:
      description: The amount of ephemeral storage to allocate for the task. This parameter is used to expand the total amount of ephemeral storage available, beyond the default amount, for tasks hosted on Fargate.
      type: object
      properties:
        sizeInGiB:
          $ref: "#/components/schemas/Integer"
          description: The total amount, in GiB, of ephemeral storage to set for the task. The minimum supported value is 21 GiB and the maximum supported value is 200 GiB.
      required:
        - sizeInGiB
    RuntimePlatform:
      description: An object that represents the compute environment architecture for Batch jobs on Fargate.
      type: object
      properties:
        operatingSystemFamily:
          $ref: "#/components/schemas/String"
          description: "The operating system for the compute environment. Valid values are: LINUX (default), WINDOWS_SERVER_2019_CORE, WINDOWS_SERVER_2019_FULL, WINDOWS_SERVER_2022_CORE, and WINDOWS_SERVER_2022_FULL. The following parameters can’t be set for Windows containers: linuxParameters, privileged, user, ulimits, readonlyRootFilesystem, and efsVolumeConfiguration. The Batch Scheduler checks the compute environments that are attached to the job queue before registering a task definition with Fargate. In this scenario, the job queue is where the job is submitted. If the job requires a Windows container and the first compute environment is LINUX, the compute environment is skipped and the next compute environment is checked until a Windows-based compute environment is found. Fargate Spot is not supported on Windows-based containers on Fargate. A job queue will be blocked if a Windows job is submitted to a job queue with only Fargate Spot compute environments. However, you can attach both FARGATE and FARGATE_SPOT compute environments to the same job queue."
        cpuArchitecture:
          $ref: "#/components/schemas/String"
          description: The vCPU architecture. The default value is X86_64. Valid values are X86_64 and ARM64. This parameter must be set to X86_64 for Windows containers. Fargate Spot is not supported on Windows-based containers on Fargate. A job queue will be blocked if a Windows job is submitted to a job queue with only Fargate Spot compute environments. However, you can attach both FARGATE and FARGATE_SPOT compute environments to the same job queue.
    RepositoryCredentials:
      description: The repository credentials for private registry authentication.
      type: object
      properties:
        credentialsParameter:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the secret containing the private repository credentials.
      required:
        - credentialsParameter
    JobTimeout:
      description: An object that represents a job timeout configuration.
      type: object
      properties:
        attemptDurationSeconds:
          $ref: "#/components/schemas/Integer"
          description: The job timeout time (in seconds) that's measured from the job attempt's startedAt timestamp. After this time passes, Batch terminates your jobs if they aren't finished. The minimum value for the timeout is 60 seconds. For array jobs, the timeout applies to the child jobs, not to the parent array job. For multi-node parallel (MNP) jobs, the timeout applies to the whole job, not to the individual nodes.
    NodeProperties:
      description: An object that represents the node properties of a multi-node parallel job. Node properties can't be specified for Amazon EKS based job definitions.
      type: object
      properties:
        numNodes:
          $ref: "#/components/schemas/Integer"
          description: The number of nodes that are associated with a multi-node parallel job.
        mainNode:
          $ref: "#/components/schemas/Integer"
          description: Specifies the node index for the main node of a multi-node parallel job. This node index value must be fewer than the number of nodes.
        nodeRangeProperties:
          $ref: "#/components/schemas/NodeRangeProperties"
          description: A list of node ranges and their properties that are associated with a multi-node parallel job.
      required:
        - numNodes
        - mainNode
        - nodeRangeProperties
    NodeRangeProperties:
      type: array
      items:
        $ref: "#/components/schemas/NodeRangeProperty"
    NodeRangeProperty:
      description: This is an object that represents the properties of the node range for a multi-node parallel job.
      type: object
      properties:
        targetNodes:
          $ref: "#/components/schemas/String"
          description: The range of nodes, using node index values. A range of 0:3 indicates nodes with index values of 0 through 3. If the starting range value is omitted (:n), then 0 is used to start the range. If the ending range value is omitted (n:), then the highest possible node index is used to end the range. Your accumulative node ranges must account for all nodes (0:n). You can nest node ranges (for example, 0:10 and 4:5). In this case, the 4:5 range properties override the 0:10 properties.
        container:
          $ref: "#/components/schemas/ContainerProperties"
          description: The container details for the node range.
        instanceTypes:
          $ref: "#/components/schemas/StringList"
          description: The instance types of the underlying host infrastructure of a multi-node parallel job. This parameter isn't applicable to jobs that are running on Fargate resources. In addition, this list object is currently limited to one element.
        ecsProperties:
          $ref: "#/components/schemas/EcsProperties"
          description: This is an object that represents the properties of the node range for a multi-node parallel job.
        eksProperties:
          $ref: "#/components/schemas/EksProperties"
          description: This is an object that represents the properties of the node range for a multi-node parallel job.
        consumableResourceProperties:
          $ref: "#/components/schemas/ConsumableResourceProperties"
          description: Contains a list of consumable resources required by a job.
      required:
        - targetNodes
    EcsProperties:
      description: An object that contains the properties for the Amazon ECS resources of a job.
      type: object
      properties:
        taskProperties:
          $ref: "#/components/schemas/ListEcsTaskProperties"
          description: An object that contains the properties for the Amazon ECS task definition of a job. This object is currently limited to one task element. However, the task element can run up to 10 containers.
      required:
        - taskProperties
    ListEcsTaskProperties:
      type: array
      items:
        $ref: "#/components/schemas/EcsTaskProperties"
    EcsTaskProperties:
      description: The properties for a task definition that describes the container and volume definitions of an Amazon ECS task. You can specify which Docker images to use, the required resources, and other configurations related to launching the task definition through an Amazon ECS service or task.
      type: object
      properties:
        containers:
          $ref: "#/components/schemas/ListTaskContainerProperties"
          description: This object is a list of containers.
        ephemeralStorage:
          $ref: "#/components/schemas/EphemeralStorage"
          description: The amount of ephemeral storage to allocate for the task. This parameter is used to expand the total amount of ephemeral storage available, beyond the default amount, for tasks hosted on Fargate.
        executionRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the execution role that Batch can assume. For jobs that run on Fargate resources, you must provide an execution role. For more information, see Batch execution IAM role in the Batch User Guide.
        platformVersion:
          $ref: "#/components/schemas/String"
          description: The Fargate platform version where the jobs are running. A platform version is specified only for jobs that are running on Fargate resources. If one isn't specified, the LATEST platform version is used by default. This uses a recent, approved version of the Fargate platform for compute resources. For more information, see Fargate platform versions in the Amazon Elastic Container Service Developer Guide.
        ipcMode:
          $ref: "#/components/schemas/String"
          description: The IPC resource namespace to use for the containers in the task. The valid values are host, task, or none. If host is specified, all containers within the tasks that specified the host IPC mode on the same container instance share the same IPC resources with the host Amazon EC2 instance. If task is specified, all containers within the specified task share the same IPC resources. If none is specified, the IPC resources within the containers of a task are private, and are not shared with other containers in a task or on the container instance. If no value is specified, then the IPC resource namespace sharing depends on the Docker daemon setting on the container instance. For more information, see IPC settings in the Docker run reference.
        taskRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that's associated with the Amazon ECS task. This is object is comparable to ContainerProperties:jobRoleArn.
        pidMode:
          $ref: "#/components/schemas/String"
          description: The process namespace to use for the containers in the task. The valid values are host or task. For example, monitoring sidecars might need pidMode to access information about other containers running in the same task. If host is specified, all containers within the tasks that specified the host PID mode on the same container instance share the process namespace with the host Amazon EC2 instance. If task is specified, all containers within the specified task share the same process namespace. If no value is specified, the default is a private namespace for each container. For more information, see PID settings in the Docker run reference.
        networkConfiguration:
          $ref: "#/components/schemas/NetworkConfiguration"
          description: The network configuration for jobs that are running on Fargate resources. Jobs that are running on Amazon EC2 resources must not specify this parameter.
        runtimePlatform:
          $ref: "#/components/schemas/RuntimePlatform"
          description: An object that represents the compute environment architecture for Batch jobs on Fargate.
        volumes:
          $ref: "#/components/schemas/Volumes"
          description: A list of volumes that are associated with the job.
        enableExecuteCommand:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether execute command functionality is turned on for this task. If true, execute command functionality is turned on all the containers in the task.
      required:
        - containers
    ListTaskContainerProperties:
      type: array
      items:
        $ref: "#/components/schemas/TaskContainerProperties"
    TaskContainerProperties:
      description: Container properties are used for Amazon ECS-based job definitions. These properties to describe the container that's launched as part of a job.
      type: object
      properties:
        command:
          $ref: "#/components/schemas/StringList"
          description: "The command that's passed to the container. This parameter maps to Cmd in the Create a container section of the Docker Remote API and the COMMAND parameter to docker run. For more information, see Dockerfile reference: CMD."
        dependsOn:
          $ref: "#/components/schemas/TaskContainerDependencyList"
          description: A list of containers that this container depends on.
        environment:
          $ref: "#/components/schemas/EnvironmentVariables"
          description: The environment variables to pass to a container. This parameter maps to Env in the Create a container section of the Docker Remote API and the --env parameter to docker run. We don't recommend using plaintext environment variables for sensitive information, such as credential data. Environment variables cannot start with AWS_BATCH. This naming convention is reserved for variables that Batch sets.
        essential:
          $ref: "#/components/schemas/Boolean"
          description: If the essential parameter of a container is marked as true, and that container fails or stops for any reason, all other containers that are part of the task are stopped. If the essential parameter of a container is marked as false, its failure doesn't affect the rest of the containers in a task. If this parameter is omitted, a container is assumed to be essential. All jobs must have at least one essential container. If you have an application that's composed of multiple containers, group containers that are used for a common purpose into components, and separate the different components into multiple task definitions. For more information, see Application Architecture in the Amazon Elastic Container Service Developer Guide.
        firelensConfiguration:
          $ref: "#/components/schemas/FirelensConfiguration"
          description: The FireLens configuration for the container. This is used to specify and configure a log router for container logs. For more information, see Custom log routing in the Amazon Elastic Container Service Developer Guide.
        image:
          $ref: "#/components/schemas/String"
          description: The image used to start a container. This string is passed directly to the Docker daemon. By default, images in the Docker Hub registry are available. Other repositories are specified with either repository-url/image:tag or repository-url/image@digest. Up to 255 letters (uppercase and lowercase), numbers, hyphens, underscores, colons, periods, forward slashes, and number signs are allowed. This parameter maps to Image in the Create a container section of the Docker Remote API and the IMAGE parameter of the docker run .
        linuxParameters:
          $ref: "#/components/schemas/LinuxParameters"
          description: Linux-specific modifications that are applied to the container, such as Linux kernel capabilities. For more information, see KernelCapabilities.
        logConfiguration:
          $ref: "#/components/schemas/LogConfiguration"
          description: "The log configuration specification for the container. This parameter maps to LogConfig in the Create a container section of the Docker Remote API and the --log-driver option to docker run. By default, containers use the same logging driver that the Docker daemon uses. However the container can use a different logging driver than the Docker daemon by specifying a log driver with this parameter in the container definition. To use a different logging driver for a container, the log system must be configured properly on the container instance (or on a different log server for remote logging options). For more information about the options for different supported log drivers, see Configure logging drivers in the Docker documentation. Amazon ECS currently supports a subset of the logging drivers available to the Docker daemon (shown in the LogConfiguration data type). Additional log drivers may be available in future releases of the Amazon ECS container agent. This parameter requires version 1.18 of the Docker Remote API or greater on your container instance. To check the Docker Remote API version on your container instance, log in to your container instance and run the following command: sudo docker version --format '{{.Server.APIVersion}}' The Amazon ECS container agent running on a container instance must register the logging drivers available on that instance with the ECS_AVAILABLE_LOGGING_DRIVERS environment variable before containers placed on that instance can use these log configuration options. For more information, see Amazon ECS container agent configuration in the Amazon Elastic Container Service Developer Guide."
        mountPoints:
          $ref: "#/components/schemas/MountPoints"
          description: The mount points for data volumes in your container. This parameter maps to Volumes in the Create a container section of the Docker Remote API and the --volume option to docker run. Windows containers can mount whole directories on the same drive as $env:ProgramData. Windows containers can't mount directories on a different drive, and mount point can't be across drives.
        name:
          $ref: "#/components/schemas/String"
          description: The name of a container. The name can be used as a unique identifier to target your dependsOn and Overrides objects.
        privileged:
          $ref: "#/components/schemas/Boolean"
          description: When this parameter is true, the container is given elevated privileges on the host container instance (similar to the root user). This parameter maps to Privileged in the Create a container section of the Docker Remote API and the --privileged option to docker run. This parameter is not supported for Windows containers or tasks run on Fargate.
        readonlyRootFilesystem:
          $ref: "#/components/schemas/Boolean"
          description: When this parameter is true, the container is given read-only access to its root file system. This parameter maps to ReadonlyRootfs in the Create a container section of the Docker Remote API and the --read-only option to docker run. This parameter is not supported for Windows containers.
        repositoryCredentials:
          $ref: "#/components/schemas/RepositoryCredentials"
          description: The private repository authentication credentials to use.
        resourceRequirements:
          $ref: "#/components/schemas/ResourceRequirements"
          description: The type and amount of a resource to assign to a container. The only supported resource is a GPU.
        secrets:
          $ref: "#/components/schemas/SecretList"
          description: The secrets to pass to the container. For more information, see Specifying Sensitive Data in the Amazon Elastic Container Service Developer Guide.
        ulimits:
          $ref: "#/components/schemas/Ulimits"
          description: "A list of ulimits to set in the container. If a ulimit value is specified in a task definition, it overrides the default values set by Docker. This parameter maps to Ulimits in the Create a container section of the Docker Remote API and the --ulimit option to docker run. Amazon ECS tasks hosted on Fargate use the default resource limit values set by the operating system with the exception of the nofile resource limit parameter which Fargate overrides. The nofile resource limit sets a restriction on the number of open files that a container can use. The default nofile soft limit is 1024 and the default hard limit is 65535. This parameter requires version 1.18 of the Docker Remote API or greater on your container instance. To check the Docker Remote API version on your container instance, log in to your container instance and run the following command: sudo docker version --format '{{.Server.APIVersion}}' This parameter is not supported for Windows containers."
        user:
          $ref: "#/components/schemas/String"
          description: The user to use inside the container. This parameter maps to User in the Create a container section of the Docker Remote API and the --user option to docker run. When running tasks using the host network mode, don't run containers using the root user (UID 0). We recommend using a non-root user for better security. You can specify the user using the following formats. If specifying a UID or GID, you must specify it as a positive integer. user user:group uid uid:gid user:gi uid:group This parameter is not supported for Windows containers.
        startTimeout:
          $ref: "#/components/schemas/Integer"
          description: Time duration (in seconds) to wait before giving up on resolving dependencies for a container. The minimum value is 2 seconds and the maximum value for Fargate is 120 seconds.
        stopTimeout:
          $ref: "#/components/schemas/Integer"
          description: Time duration (in seconds) to wait before the container is forcefully killed if it doesn't exit normally on its own. The minimum value is 2 seconds and the maximum value for Fargate is 120 seconds. If the parameter is not specified, the default value of 30 seconds is used. For tasks that use the EC2 launch type, if the stopTimeout parameter isn't specified, the value set for the Amazon ECS container agent configuration variable ECS_CONTAINER_STOP_TIMEOUT is used. If neither the stopTimeout parameter nor the ECS_CONTAINER_STOP_TIMEOUT agent configuration variable are set, then the default value of 30 seconds is used.
      required:
        - image
    TaskContainerDependencyList:
      type: array
      items:
        $ref: "#/components/schemas/TaskContainerDependency"
    TaskContainerDependency:
      description: A list of containers that this task depends on.
      type: object
      properties:
        containerName:
          $ref: "#/components/schemas/String"
          description: A unique identifier for the container.
        condition:
          $ref: "#/components/schemas/String"
          description: "The dependency condition of the container. The following are the available conditions and their behavior: START - This condition emulates the behavior of links and volumes today. It validates that a dependent container is started before permitting other containers to start. COMPLETE - This condition validates that a dependent container runs to completion (exits) before permitting other containers to start. This can be useful for nonessential containers that run a script and then exit. This condition can't be set on an essential container. SUCCESS - This condition is the same as COMPLETE, but it also requires that the container exits with a zero status. This condition can't be set on an essential container."
    FirelensConfiguration:
      description: The FireLens configuration for the container. This is used to specify and configure a log router for container logs. For more information, see Custom log routing in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/FirelensConfigurationType"
          description: The log router to use. The valid values are fluentd or fluentbit.
        options:
          type: object
          properties: {}
          description: The options to use when configuring the log router. This field is optional and can be used to specify a custom configuration file or to add additional metadata, such as the task, task definition, cluster, and container instance details to the log event. If specified, the syntax to use is "options":{"enable-ecs-log-metadata":"true|false","config-file-type:"s3|file","config-file-value":"arn:aws:s3:::mybucket/fluent.conf|filepath"}. For more information, see Creating a task definition that uses a FireLens configuration in the Amazon Elastic Container Service Developer Guide.
      required:
        - type_
    FirelensConfigurationType:
      type: string
      enum:
        - fluentd
        - fluentbit
    EksProperties:
      description: An object that contains the properties for the Kubernetes resources of a job.
      type: object
      properties:
        podProperties:
          $ref: "#/components/schemas/EksPodProperties"
          description: The properties for the Kubernetes pod resources of a job.
    EksPodProperties:
      description: The properties for the pod.
      type: object
      properties:
        serviceAccountName:
          $ref: "#/components/schemas/String"
          description: The name of the service account that's used to run the pod. For more information, see Kubernetes service accounts and Configure a Kubernetes service account to assume an IAM role in the Amazon EKS User Guide and Configure service accounts for pods in the Kubernetes documentation.
        hostNetwork:
          $ref: "#/components/schemas/Boolean"
          description: Indicates if the pod uses the hosts' network IP address. The default value is true. Setting this to false enables the Kubernetes pod networking model. Most Batch workloads are egress-only and don't require the overhead of IP allocation for each pod for incoming connections. For more information, see Host namespaces and Pod networking in the Kubernetes documentation.
        dnsPolicy:
          $ref: "#/components/schemas/String"
          description: "The DNS policy for the pod. The default value is ClusterFirst. If the hostNetwork parameter is not specified, the default is ClusterFirstWithHostNet. ClusterFirst indicates that any DNS query that does not match the configured cluster domain suffix is forwarded to the upstream nameserver inherited from the node. For more information, see Pod's DNS policy in the Kubernetes documentation. Valid values: Default | ClusterFirst | ClusterFirstWithHostNet"
        imagePullSecrets:
          $ref: "#/components/schemas/ImagePullSecrets"
          description: References a Kubernetes secret resource. It holds a list of secrets. These secrets help to gain access to pull an images from a private registry. ImagePullSecret$name is required when this object is used.
        containers:
          $ref: "#/components/schemas/EksContainers"
          description: The properties of the container that's used on the Amazon EKS pod. This object is limited to 10 elements.
        initContainers:
          $ref: "#/components/schemas/EksContainers"
          description: These containers run before application containers, always runs to completion, and must complete successfully before the next container starts. These containers are registered with the Amazon EKS Connector agent and persists the registration information in the Kubernetes backend data store. For more information, see Init Containers in the Kubernetes documentation. This object is limited to 10 elements.
        volumes:
          $ref: "#/components/schemas/EksVolumes"
          description: Specifies the volumes for a job definition that uses Amazon EKS resources.
        metadata:
          $ref: "#/components/schemas/EksMetadata"
          description: Metadata about the Kubernetes pod. For more information, see Understanding Kubernetes Objects in the Kubernetes documentation.
        shareProcessNamespace:
          $ref: "#/components/schemas/Boolean"
          description: Indicates if the processes in a container are shared, or visible, to other containers in the same pod. For more information, see Share Process Namespace between Containers in a Pod.
    ImagePullSecrets:
      type: array
      items:
        $ref: "#/components/schemas/ImagePullSecret"
    ImagePullSecret:
      description: References a Kubernetes secret resource. This name of the secret must start and end with an alphanumeric character, is required to be lowercase, can include periods (.) and hyphens (-), and can't contain more than 253 characters.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: Provides a unique identifier for the ImagePullSecret. This object is required when EksPodProperties$imagePullSecrets is used.
      required:
        - name
    EksContainers:
      type: array
      items:
        $ref: "#/components/schemas/EksContainer"
    EksContainer:
      description: EKS container properties are used in job definitions for Amazon EKS based job definitions to describe the properties for a container node in the pod that's launched as part of a job. This can't be specified for Amazon ECS based job definitions.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the container. If the name isn't specified, the default name "Default" is used. Each container in a pod must have a unique name.
        image:
          $ref: "#/components/schemas/String"
          description: The Docker image used to start the container.
        imagePullPolicy:
          $ref: "#/components/schemas/String"
          description: The image pull policy for the container. Supported values are Always, IfNotPresent, and Never. This parameter defaults to IfNotPresent. However, if the :latest tag is specified, it defaults to Always. For more information, see Updating images in the Kubernetes documentation.
        command:
          $ref: "#/components/schemas/StringList"
          description: The entrypoint for the container. This isn't run within a shell. If this isn't specified, the ENTRYPOINT of the container image is used. Environment variable references are expanded using the container's environment. If the referenced environment variable doesn't exist, the reference in the command isn't changed. For example, if the reference is to "$(NAME1)" and the NAME1 environment variable doesn't exist, the command string will remain "$(NAME1)." $$ is replaced with $ and the resulting string isn't expanded. For example, $$(VAR_NAME) will be passed as $(VAR_NAME) whether or not the VAR_NAME environment variable exists. The entrypoint can't be updated. For more information, see ENTRYPOINT in the Dockerfile reference and Define a command and arguments for a container and Entrypoint in the Kubernetes documentation.
        args:
          $ref: "#/components/schemas/StringList"
          description: "An array of arguments to the entrypoint. If this isn't specified, the CMD of the container image is used. This corresponds to the args member in the Entrypoint portion of the Pod in Kubernetes. Environment variable references are expanded using the container's environment. If the referenced environment variable doesn't exist, the reference in the command isn't changed. For example, if the reference is to \"$(NAME1)\" and the NAME1 environment variable doesn't exist, the command string will remain \"$(NAME1).\" $$ is replaced with $, and the resulting string isn't expanded. For example, $$(VAR_NAME) is passed as $(VAR_NAME) whether or not the VAR_NAME environment variable exists. For more information, see Dockerfile reference: CMD and Define a command and arguments for a pod in the Kubernetes documentation."
        env:
          $ref: "#/components/schemas/EksContainerEnvironmentVariables"
          description: The environment variables to pass to a container. Environment variables cannot start with "AWS_BATCH". This naming convention is reserved for variables that Batch sets.
        resources:
          $ref: "#/components/schemas/EksContainerResourceRequirements"
          description: The type and amount of resources to assign to a container. The supported resources include memory, cpu, and nvidia.com/gpu. For more information, see Resource management for pods and containers in the Kubernetes documentation.
        volumeMounts:
          $ref: "#/components/schemas/EksContainerVolumeMounts"
          description: The volume mounts for the container. Batch supports emptyDir, hostPath, and secret volume types. For more information about volumes and volume mounts in Kubernetes, see Volumes in the Kubernetes documentation.
        securityContext:
          $ref: "#/components/schemas/EksContainerSecurityContext"
          description: The security context for a job. For more information, see Configure a security context for a pod or container in the Kubernetes documentation.
      required:
        - image
    EksContainerEnvironmentVariables:
      type: array
      items:
        $ref: "#/components/schemas/EksContainerEnvironmentVariable"
    EksContainerEnvironmentVariable:
      description: An environment variable.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the environment variable.
        value:
          $ref: "#/components/schemas/String"
          description: The value of the environment variable.
      required:
        - name
    EksContainerResourceRequirements:
      description: The type and amount of resources to assign to a container. The supported resources include memory, cpu, and nvidia.com/gpu. For more information, see Resource management for pods and containers in the Kubernetes documentation.
      type: object
      properties:
        limits:
          type: object
          properties: {}
          description: The type and quantity of the resources to reserve for the container. The values vary based on the name that's specified. Resources can be requested using either the limits or the requests objects. memory The memory hard limit (in MiB) for the container, using whole integers, with a "Mi" suffix. If your container attempts to exceed the memory specified, the container is terminated. You must specify at least 4 MiB of memory for a job. memory can be specified in limits, requests, or both. If memory is specified in both places, then the value that's specified in limits must be equal to the value that's specified in requests. To maximize your resource utilization, provide your jobs with as much memory as possible for the specific instance type that you are using. To learn how, see Memory management in the Batch User Guide. cpu The number of CPUs that's reserved for the container. Values must be an even multiple of 0.25. cpu can be specified in limits, requests, or both. If cpu is specified in both places, then the value that's specified in limits must be at least as large as the value that's specified in requests. nvidia.com/gpu The number of GPUs that's reserved for the container. Values must be a whole integer. memory can be specified in limits, requests, or both. If memory is specified in both places, then the value that's specified in limits must be equal to the value that's specified in requests.
        requests:
          type: object
          properties: {}
          description: The type and quantity of the resources to request for the container. The values vary based on the name that's specified. Resources can be requested by using either the limits or the requests objects. memory The memory hard limit (in MiB) for the container, using whole integers, with a "Mi" suffix. If your container attempts to exceed the memory specified, the container is terminated. You must specify at least 4 MiB of memory for a job. memory can be specified in limits, requests, or both. If memory is specified in both, then the value that's specified in limits must be equal to the value that's specified in requests. If you're trying to maximize your resource utilization by providing your jobs as much memory as possible for a particular instance type, see Memory management in the Batch User Guide. cpu The number of CPUs that are reserved for the container. Values must be an even multiple of 0.25. cpu can be specified in limits, requests, or both. If cpu is specified in both, then the value that's specified in limits must be at least as large as the value that's specified in requests. nvidia.com/gpu The number of GPUs that are reserved for the container. Values must be a whole integer. nvidia.com/gpu can be specified in limits, requests, or both. If nvidia.com/gpu is specified in both, then the value that's specified in limits must be equal to the value that's specified in requests.
    EksContainerVolumeMounts:
      type: array
      items:
        $ref: "#/components/schemas/EksContainerVolumeMount"
    EksContainerVolumeMount:
      description: The volume mounts for a container for an Amazon EKS job. For more information about volumes and volume mounts in Kubernetes, see Volumes in the Kubernetes documentation.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name the volume mount. This must match the name of one of the volumes in the pod.
        mountPath:
          $ref: "#/components/schemas/String"
          description: The path on the container where the volume is mounted.
        subPath:
          $ref: "#/components/schemas/String"
          description: A sub-path inside the referenced volume instead of its root.
        readOnly_:
          $ref: "#/components/schemas/Boolean"
          description: If this value is true, the container has read-only access to the volume. Otherwise, the container can write to the volume. The default value is false.
    EksContainerSecurityContext:
      description: The security context for a job. For more information, see Configure a security context for a pod or container in the Kubernetes documentation.
      type: object
      properties:
        runAsUser:
          $ref: "#/components/schemas/Long"
          description: When this parameter is specified, the container is run as the specified user ID (uid). If this parameter isn't specified, the default is the user that's specified in the image metadata. This parameter maps to RunAsUser and MustRanAs policy in the Users and groups pod security policies in the Kubernetes documentation.
        runAsGroup:
          $ref: "#/components/schemas/Long"
          description: When this parameter is specified, the container is run as the specified group ID (gid). If this parameter isn't specified, the default is the group that's specified in the image metadata. This parameter maps to RunAsGroup and MustRunAs policy in the Users and groups pod security policies in the Kubernetes documentation.
        privileged:
          $ref: "#/components/schemas/Boolean"
          description: When this parameter is true, the container is given elevated permissions on the host container instance. The level of permissions are similar to the root user permissions. The default value is false. This parameter maps to privileged policy in the Privileged pod security policies in the Kubernetes documentation.
        allowPrivilegeEscalation:
          $ref: "#/components/schemas/Boolean"
          description: Whether or not a container or a Kubernetes pod is allowed to gain more privileges than its parent process. The default value is false.
        readOnlyRootFilesystem:
          $ref: "#/components/schemas/Boolean"
          description: When this parameter is true, the container is given read-only access to its root file system. The default value is false. This parameter maps to ReadOnlyRootFilesystem policy in the Volumes and file systems pod security policies in the Kubernetes documentation.
        runAsNonRoot:
          $ref: "#/components/schemas/Boolean"
          description: When this parameter is specified, the container is run as a user with a uid other than 0. If this parameter isn't specified, so such rule is enforced. This parameter maps to RunAsUser and MustRunAsNonRoot policy in the Users and groups pod security policies in the Kubernetes documentation.
    EksVolumes:
      type: array
      items:
        $ref: "#/components/schemas/EksVolume"
    EksVolume:
      description: Specifies an Amazon EKS volume for a job definition.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the volume. The name must be allowed as a DNS subdomain name. For more information, see DNS subdomain names in the Kubernetes documentation.
        hostPath:
          $ref: "#/components/schemas/EksHostPath"
          description: Specifies the configuration of a Kubernetes hostPath volume. For more information, see hostPath in the Kubernetes documentation.
        emptyDir:
          $ref: "#/components/schemas/EksEmptyDir"
          description: Specifies the configuration of a Kubernetes emptyDir volume. For more information, see emptyDir in the Kubernetes documentation.
        secret:
          $ref: "#/components/schemas/EksSecret"
          description: Specifies the configuration of a Kubernetes secret volume. For more information, see secret in the Kubernetes documentation.
        persistentVolumeClaim:
          $ref: "#/components/schemas/EksPersistentVolumeClaim"
          description: Specifies the configuration of a Kubernetes persistentVolumeClaim bounded to a persistentVolume. For more information, see Persistent Volume Claims in the Kubernetes documentation.
      required:
        - name
    EksHostPath:
      description: Specifies the configuration of a Kubernetes hostPath volume. A hostPath volume mounts an existing file or directory from the host node's filesystem into your pod. For more information, see hostPath in the Kubernetes documentation.
      type: object
      properties:
        path:
          $ref: "#/components/schemas/String"
          description: The path of the file or directory on the host to mount into containers on the pod.
    EksEmptyDir:
      description: Specifies the configuration of a Kubernetes emptyDir volume. An emptyDir volume is first created when a pod is assigned to a node. It exists as long as that pod is running on that node. The emptyDir volume is initially empty. All containers in the pod can read and write the files in the emptyDir volume. However, the emptyDir volume can be mounted at the same or different paths in each container. When a pod is removed from a node for any reason, the data in the emptyDir is deleted permanently. For more information, see emptyDir in the Kubernetes documentation.
      type: object
      properties:
        medium:
          $ref: "#/components/schemas/String"
          description: The medium to store the volume. The default value is an empty string, which uses the storage of the node. "" (Default) Use the disk storage of the node. "Memory" Use the tmpfs volume that's backed by the RAM of the node. Contents of the volume are lost when the node reboots, and any storage on the volume counts against the container's memory limit.
        sizeLimit:
          $ref: "#/components/schemas/Quantity"
          description: The maximum size of the volume. By default, there's no maximum size defined.
    Quantity:
      type: string
      minLength: 1
      maxLength: 256
    EksSecret:
      description: Specifies the configuration of a Kubernetes secret volume. For more information, see secret in the Kubernetes documentation.
      type: object
      properties:
        secretName:
          $ref: "#/components/schemas/String"
          description: The name of the secret. The name must be allowed as a DNS subdomain name. For more information, see DNS subdomain names in the Kubernetes documentation.
        optional:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the secret or the secret's keys must be defined.
      required:
        - secretName
    EksPersistentVolumeClaim:
      description: A persistentVolumeClaim volume is used to mount a PersistentVolume into a Pod. PersistentVolumeClaims are a way for users to "claim" durable storage without knowing the details of the particular cloud environment. See the information about PersistentVolumes in the Kubernetes documentation.
      type: object
      properties:
        claimName:
          $ref: "#/components/schemas/String"
          description: The name of the persistentVolumeClaim bounded to a persistentVolume. For more information, see Persistent Volume Claims in the Kubernetes documentation.
        readOnly_:
          $ref: "#/components/schemas/Boolean"
          description: An optional boolean value indicating if the mount is read only. Default is false. For more information, see Read Only Mounts in the Kubernetes documentation.
      required:
        - claimName
    EksMetadata:
      description: Describes and uniquely identifies Kubernetes resources. For example, the compute environment that a pod runs in or the jobID for a job running in the pod. For more information, see Understanding Kubernetes Objects in the Kubernetes documentation.
      type: object
      properties:
        labels:
          type: object
          properties: {}
          description: Key-value pairs used to identify, sort, and organize cube resources. Can contain up to 63 uppercase letters, lowercase letters, numbers, hyphens (-), and underscores (_). Labels can be added or modified at any time. Each resource can have multiple labels, but each key must be unique for a given object.
        annotations:
          type: object
          properties: {}
          description: "Key-value pairs used to attach arbitrary, non-identifying metadata to Kubernetes objects. Valid annotation keys have two segments: an optional prefix and a name, separated by a slash (/). The prefix is optional and must be 253 characters or less. If specified, the prefix must be a DNS subdomain− a series of DNS labels separated by dots (.), and it must end with a slash (/). The name segment is required and must be 63 characters or less. It can include alphanumeric characters ([a-z0-9A-Z]), dashes (-), underscores (_), and dots (.), but must begin and end with an alphanumeric character. Annotation values must be 255 characters or less. Annotations can be added or modified at any time. Each resource can have multiple annotations."
        namespace:
          $ref: "#/components/schemas/String"
          description: "The namespace of the Amazon EKS cluster. In Kubernetes, namespaces provide a mechanism for isolating groups of resources within a single cluster. Names of resources need to be unique within a namespace, but not across namespaces. Batch places Batch Job pods in this namespace. If this field is provided, the value can't be empty or null. It must meet the following requirements: 1-63 characters long Can't be set to default Can't start with kube Must match the following regular expression: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$ For more information, see Namespaces in the Kubernetes documentation. This namespace can be different from the kubernetesNamespace set in the compute environment's EksConfiguration, but must have identical role-based access control (RBAC) roles as the compute environment's kubernetesNamespace. For multi-node parallel jobs, the same value must be provided across all the node ranges."
    ConsumableResourceProperties:
      description: Contains a list of consumable resources required by a job.
      type: object
      properties:
        consumableResourceList:
          $ref: "#/components/schemas/ConsumableResourceList"
          description: The list of consumable resources required by a job.
    ConsumableResourceList:
      type: array
      items:
        $ref: "#/components/schemas/ConsumableResourceRequirement"
    ConsumableResourceRequirement:
      description: Information about a consumable resource required to run a job.
      type: object
      properties:
        consumableResource:
          $ref: "#/components/schemas/String"
          description: The name or ARN of the consumable resource.
        quantity:
          $ref: "#/components/schemas/Long"
          description: The quantity of the consumable resource that is needed.
    PlatformCapabilityList:
      type: array
      items:
        $ref: "#/components/schemas/PlatformCapability"
    PlatformCapability:
      type: string
      enum:
        - EC2
        - FARGATE
    DescribeJobQueuesResponse:
      type: object
      properties:
        jobQueues:
          $ref: "#/components/schemas/JobQueueDetailList"
          description: The list of job queues.
        nextToken:
          $ref: "#/components/schemas/String"
          description: The nextToken value to include in a future DescribeJobQueues request. When the results of a DescribeJobQueues request exceed maxResults, this value can be used to retrieve the next page of results. This value is null when there are no more results to return.
    JobQueueDetailList:
      type: array
      items:
        $ref: "#/components/schemas/JobQueueDetail"
    JobQueueDetail:
      description: An object that represents the details for an Batch job queue.
      type: object
      properties:
        jobQueueName:
          $ref: "#/components/schemas/String"
          description: The job queue name.
        jobQueueArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the job queue.
        state:
          $ref: "#/components/schemas/JQState"
          description: Describes the ability of the queue to accept new jobs. If the job queue state is ENABLED, it can accept jobs. If the job queue state is DISABLED, new jobs can't be added to the queue, but jobs already in the queue can finish.
        schedulingPolicyArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the scheduling policy. The format is aws:Partition:batch:Region:Account:scheduling-policy/Name . For example, aws:aws:batch:us-west-2:123456789012:scheduling-policy/MySchedulingPolicy.
        status:
          $ref: "#/components/schemas/JQStatus"
          description: The status of the job queue (for example, CREATING or VALID).
        statusReason:
          $ref: "#/components/schemas/String"
          description: A short, human-readable string to provide additional details for the current status of the job queue.
        priority:
          $ref: "#/components/schemas/Integer"
          description: The priority of the job queue. Job queue priority determines the order that job queues are evaluated when multiple queues dispatch jobs within a shared compute environment. A higher value for priority indicates a higher priority. Queues are evaluated in cycles, in descending order by priority. For example, a job queue with a priority value of 10 is evaluated before a queue with a priority value of 1. All of the compute environments must be either Amazon EC2 (EC2 or SPOT) or Fargate (FARGATE or FARGATE_SPOT). Amazon EC2 and Fargate compute environments can't be mixed. Job queue priority doesn't guarantee that a particular job executes before a job in a lower priority queue. Jobs added to higher priority queues during the queue evaluation cycle might not be evaluated until the next cycle. A job is dispatched from a queue only if resources are available when the queue is evaluated. If there are insufficient resources available at that time, the cycle proceeds to the next queue. This means that jobs added to higher priority queues might have to wait for jobs in multiple lower priority queues to complete before they are dispatched. You can use job dependencies to control the order for jobs from queues with different priorities. For more information, see Job Dependencies in the Batch User Guide.
        computeEnvironmentOrder:
          $ref: "#/components/schemas/ComputeEnvironmentOrders"
          description: The compute environments that are attached to the job queue and the order that job placement is preferred. Compute environments are selected for job placement in ascending order.
        serviceEnvironmentOrder:
          $ref: "#/components/schemas/ServiceEnvironmentOrders"
          description: The order of the service environment associated with the job queue. Job queues with a higher priority are evaluated first when associated with the same service environment.
        jobQueueType:
          $ref: "#/components/schemas/JobQueueType"
          description: The type of job queue. For service jobs that run on SageMaker Training, this value is SAGEMAKER_TRAINING. For regular container jobs, this value is EKS, ECS, or ECS_FARGATE depending on the compute environment.
        tags:
          type: object
          properties: {}
          description: The tags that are applied to the job queue. For more information, see Tagging your Batch resources in Batch User Guide.
        jobStateTimeLimitActions:
          $ref: "#/components/schemas/JobStateTimeLimitActions"
          description: The set of actions that Batch perform on jobs that remain at the head of the job queue in the specified state longer than specified times. Batch will perform each action after maxTimeSeconds has passed.
      required:
        - jobQueueName
        - jobQueueArn
        - state
        - priority
        - computeEnvironmentOrder
    JQStatus:
      type: string
      enum:
        - CREATING
        - UPDATING
        - DELETING
        - DELETED
        - VALID
        - INVALID
    DescribeJobsResponse:
      type: object
      properties:
        jobs:
          $ref: "#/components/schemas/JobDetailList"
          description: The list of jobs.
    JobDetailList:
      type: array
      items:
        $ref: "#/components/schemas/JobDetail"
    JobDetail:
      description: An object that represents an Batch job.
      type: object
      properties:
        jobArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the job.
        jobName:
          $ref: "#/components/schemas/String"
          description: The job name.
        jobId:
          $ref: "#/components/schemas/String"
          description: The job ID.
        jobQueue:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the job queue that the job is associated with.
        status:
          $ref: "#/components/schemas/JobStatus"
          description: The current status for the job. If your jobs don't progress to STARTING, see Jobs stuck in RUNNABLE status in the troubleshooting section of the Batch User Guide.
        shareIdentifier:
          $ref: "#/components/schemas/String"
          description: The share identifier for the job.
        schedulingPriority:
          $ref: "#/components/schemas/Integer"
          description: The scheduling policy of the job definition. This only affects jobs in job queues with a fair-share policy. Jobs with a higher scheduling priority are scheduled before jobs with a lower scheduling priority.
        attempts:
          $ref: "#/components/schemas/AttemptDetails"
          description: A list of job attempts that are associated with this job.
        statusReason:
          $ref: "#/components/schemas/String"
          description: A short, human-readable string to provide more details for the current status of the job. CAPACITY:INSUFFICIENT_INSTANCE_CAPACITY - All compute environments have insufficient capacity to service the job. MISCONFIGURATION:COMPUTE_ENVIRONMENT_MAX_RESOURCE - All compute environments have a maxVcpu setting that is smaller than the job requirements. MISCONFIGURATION:JOB_RESOURCE_REQUIREMENT - All compute environments have no connected instances that meet the job requirements. MISCONFIGURATION:SERVICE_ROLE_PERMISSIONS - All compute environments have problems with the service role permissions.
        createdAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the job was created. For non-array jobs and parent array jobs, this is when the job entered the SUBMITTED state. This is specifically at the time SubmitJob was called. For array child jobs, this is when the child job was spawned by its parent and entered the PENDING state.
        retryStrategy:
          $ref: "#/components/schemas/RetryStrategy"
          description: The retry strategy to use for this job if an attempt fails.
        startedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the job was started. More specifically, it's when the job transitioned from the STARTING state to the RUNNING state.
        stoppedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the job was stopped. More specifically, it's when the job transitioned from the RUNNING state to a terminal state, such as SUCCEEDED or FAILED.
        dependsOn:
          $ref: "#/components/schemas/JobDependencyList"
          description: A list of job IDs that this job depends on.
        jobDefinition:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the job definition that this job uses.
        parameters:
          type: object
          properties: {}
          description: Additional parameters that are passed to the job that replace parameter substitution placeholders or override any corresponding parameter defaults from the job definition.
        container:
          $ref: "#/components/schemas/ContainerDetail"
          description: An object that represents the details for the container that's associated with the job. If the details are for a multiple-container job, this object will be empty.
        nodeDetails:
          $ref: "#/components/schemas/NodeDetails"
          description: An object that represents the details of a node that's associated with a multi-node parallel job.
        nodeProperties:
          $ref: "#/components/schemas/NodeProperties"
          description: An object that represents the node properties of a multi-node parallel job. This isn't applicable to jobs that are running on Fargate resources.
        arrayProperties:
          $ref: "#/components/schemas/ArrayPropertiesDetail"
          description: The array properties of the job, if it's an array job.
        timeout:
          $ref: "#/components/schemas/JobTimeout"
          description: The timeout configuration for the job.
        tags:
          type: object
          properties: {}
          description: The tags that are applied to the job.
        propagateTags:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether to propagate the tags from the job or job definition to the corresponding Amazon ECS task. If no value is specified, the tags aren't propagated. Tags can only be propagated to the tasks when the tasks are created. For tags with the same name, job tags are given priority over job definitions tags. If the total number of combined tags from the job and job definition is over 50, the job is moved to the FAILED state.
        platformCapabilities:
          $ref: "#/components/schemas/PlatformCapabilityList"
          description: The platform capabilities required by the job definition. If no value is specified, it defaults to EC2. Jobs run on Fargate resources specify FARGATE.
        eksProperties:
          $ref: "#/components/schemas/EksPropertiesDetail"
          description: An object with various properties that are specific to Amazon EKS based jobs.
        eksAttempts:
          $ref: "#/components/schemas/EksAttemptDetails"
          description: A list of job attempts that are associated with this job.
        ecsProperties:
          $ref: "#/components/schemas/EcsPropertiesDetail"
          description: An object with properties that are specific to Amazon ECS-based jobs.
        isCancelled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the job is canceled.
        isTerminated:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the job is terminated.
        consumableResourceProperties:
          $ref: "#/components/schemas/ConsumableResourceProperties"
          description: Contains a list of consumable resources required by the job.
      required:
        - jobName
        - jobId
        - jobQueue
        - status
        - startedAt
        - jobDefinition
    JobStatus:
      type: string
      enum:
        - SUBMITTED
        - PENDING
        - RUNNABLE
        - STARTING
        - RUNNING
        - SUCCEEDED
        - FAILED
    AttemptDetails:
      type: array
      items:
        $ref: "#/components/schemas/AttemptDetail"
    AttemptDetail:
      description: An object that represents a job attempt.
      type: object
      properties:
        container:
          $ref: "#/components/schemas/AttemptContainerDetail"
          description: The details for the container in this job attempt.
        startedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the attempt was started (when the attempt transitioned from the STARTING state to the RUNNING state).
        stoppedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the attempt was stopped (when the attempt transitioned from the RUNNING state to a terminal state, such as SUCCEEDED or FAILED).
        statusReason:
          $ref: "#/components/schemas/String"
          description: A short, human-readable string to provide additional details for the current status of the job attempt.
        taskProperties:
          $ref: "#/components/schemas/ListAttemptEcsTaskDetails"
          description: The properties for a task definition that describes the container and volume definitions of an Amazon ECS task.
    AttemptContainerDetail:
      description: An object that represents the details of a container that's part of a job attempt.
      type: object
      properties:
        containerInstanceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Amazon ECS container instance that hosts the job attempt.
        taskArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Amazon ECS task that's associated with the job attempt. Each container attempt receives a task ARN when they reach the STARTING status.
        exitCode:
          $ref: "#/components/schemas/Integer"
          description: The exit code for the job attempt. A non-zero exit code is considered failed.
        reason:
          $ref: "#/components/schemas/String"
          description: A short (255 max characters) human-readable string to provide additional details for a running or stopped container.
        logStreamName:
          $ref: "#/components/schemas/String"
          description: The name of the CloudWatch Logs log stream that's associated with the container. The log group for Batch jobs is /aws/batch/job. Each container attempt receives a log stream name when they reach the RUNNING status.
        networkInterfaces:
          $ref: "#/components/schemas/NetworkInterfaceList"
          description: The network interfaces that are associated with the job attempt.
    NetworkInterfaceList:
      type: array
      items:
        $ref: "#/components/schemas/NetworkInterface"
    NetworkInterface:
      description: An object that represents the elastic network interface for a multi-node parallel job node.
      type: object
      properties:
        attachmentId:
          $ref: "#/components/schemas/String"
          description: The attachment ID for the network interface.
        ipv6Address:
          $ref: "#/components/schemas/String"
          description: The private IPv6 address for the network interface.
        privateIpv4Address:
          $ref: "#/components/schemas/String"
          description: The private IPv4 address for the network interface.
    ListAttemptEcsTaskDetails:
      type: array
      items:
        $ref: "#/components/schemas/AttemptEcsTaskDetails"
    AttemptEcsTaskDetails:
      description: An object that represents the details of a task.
      type: object
      properties:
        containerInstanceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the container instance that hosts the task.
        taskArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the Amazon ECS task.
        containers:
          $ref: "#/components/schemas/ListAttemptTaskContainerDetails"
          description: A list of containers that are included in the taskProperties list.
    ListAttemptTaskContainerDetails:
      type: array
      items:
        $ref: "#/components/schemas/AttemptTaskContainerDetails"
    AttemptTaskContainerDetails:
      description: An object that represents the details of a container that's part of a job attempt.
      type: object
      properties:
        exitCode:
          $ref: "#/components/schemas/Integer"
          description: The exit code for the container’s attempt. A non-zero exit code is considered failed.
        name:
          $ref: "#/components/schemas/String"
          description: The name of a container.
        reason:
          $ref: "#/components/schemas/String"
          description: A short (255 max characters) string that's easy to understand and provides additional details for a running or stopped container.
        logStreamName:
          $ref: "#/components/schemas/String"
          description: The name of the Amazon CloudWatch Logs log stream that's associated with the container. The log group for Batch jobs is /aws/batch/job. Each container attempt receives a log stream name when they reach the RUNNING status.
        networkInterfaces:
          $ref: "#/components/schemas/NetworkInterfaceList"
          description: The network interfaces that are associated with the job attempt.
    JobDependencyList:
      type: array
      items:
        $ref: "#/components/schemas/JobDependency"
    JobDependency:
      description: An object that represents an Batch job dependency.
      type: object
      properties:
        jobId:
          $ref: "#/components/schemas/String"
          description: The job ID of the Batch job that's associated with this dependency.
        type_:
          $ref: "#/components/schemas/ArrayJobDependency"
          description: The type of the job dependency.
    ArrayJobDependency:
      type: string
      enum:
        - N_TO_N
        - SEQUENTIAL
    ContainerDetail:
      description: An object that represents the details of a container that's part of a job.
      type: object
      properties:
        image:
          $ref: "#/components/schemas/String"
          description: The image used to start the container.
        vcpus:
          $ref: "#/components/schemas/Integer"
          description: The number of vCPUs reserved for the container. For jobs that run on Amazon EC2 resources, you can specify the vCPU requirement for the job using resourceRequirements, but you can't specify the vCPU requirements in both the vcpus and resourceRequirements object. This parameter maps to CpuShares in the Create a container section of the Docker Remote API and the --cpu-shares option to docker run. Each vCPU is equivalent to 1,024 CPU shares. You must specify at least one vCPU. This is required but can be specified in several places. It must be specified for each node at least once. This parameter isn't applicable to jobs that run on Fargate resources. For jobs that run on Fargate resources, you must specify the vCPU requirement for the job using resourceRequirements.
        memory:
          $ref: "#/components/schemas/Integer"
          description: For jobs running on Amazon EC2 resources that didn't specify memory requirements using resourceRequirements, the number of MiB of memory reserved for the job. For other jobs, including all run on Fargate resources, see resourceRequirements.
        command:
          $ref: "#/components/schemas/StringList"
          description: The command that's passed to the container.
        jobRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that's associated with the job when run.
        executionRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the execution role that Batch can assume. For more information, see Batch execution IAM role in the Batch User Guide.
        volumes:
          $ref: "#/components/schemas/Volumes"
          description: A list of volumes that are associated with the job.
        environment:
          $ref: "#/components/schemas/EnvironmentVariables"
          description: The environment variables to pass to a container. Environment variables cannot start with "AWS_BATCH". This naming convention is reserved for variables that Batch sets.
        mountPoints:
          $ref: "#/components/schemas/MountPoints"
          description: The mount points for data volumes in your container.
        readonlyRootFilesystem:
          $ref: "#/components/schemas/Boolean"
          description: When this parameter is true, the container is given read-only access to its root file system. This parameter maps to ReadonlyRootfs in the Create a container section of the Docker Remote API and the --read-only option to docker run .
        ulimits:
          $ref: "#/components/schemas/Ulimits"
          description: A list of ulimit values to set in the container. This parameter maps to Ulimits in the Create a container section of the Docker Remote API and the --ulimit option to docker run. This parameter isn't applicable to jobs that are running on Fargate resources.
        privileged:
          $ref: "#/components/schemas/Boolean"
          description: When this parameter is true, the container is given elevated permissions on the host container instance (similar to the root user). The default value is false. This parameter isn't applicable to jobs that are running on Fargate resources and shouldn't be provided, or specified as false.
        user:
          $ref: "#/components/schemas/String"
          description: The user name to use inside the container. This parameter maps to User in the Create a container section of the Docker Remote API and the --user option to docker run.
        exitCode:
          $ref: "#/components/schemas/Integer"
          description: The exit code returned upon completion.
        reason:
          $ref: "#/components/schemas/String"
          description: A short (255 max characters) human-readable string to provide additional details for a running or stopped container.
        containerInstanceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the container instance that the container is running on.
        taskArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Amazon ECS task that's associated with the container job. Each container attempt receives a task ARN when they reach the STARTING status.
        logStreamName:
          $ref: "#/components/schemas/String"
          description: The name of the Amazon CloudWatch Logs log stream that's associated with the container. The log group for Batch jobs is /aws/batch/job. Each container attempt receives a log stream name when they reach the RUNNING status.
        instanceType:
          $ref: "#/components/schemas/String"
          description: The instance type of the underlying host infrastructure of a multi-node parallel job. This parameter isn't applicable to jobs that are running on Fargate resources.
        networkInterfaces:
          $ref: "#/components/schemas/NetworkInterfaceList"
          description: The network interfaces that are associated with the job.
        resourceRequirements:
          $ref: "#/components/schemas/ResourceRequirements"
          description: The type and amount of resources to assign to a container. The supported resources include GPU, MEMORY, and VCPU.
        linuxParameters:
          $ref: "#/components/schemas/LinuxParameters"
          description: Linux-specific modifications that are applied to the container, such as details for device mappings.
        logConfiguration:
          $ref: "#/components/schemas/LogConfiguration"
          description: 'The log configuration specification for the container. This parameter maps to LogConfig in the Create a container section of the Docker Remote API and the --log-driver option to docker run. By default, containers use the same logging driver that the Docker daemon uses. However, the container might use a different logging driver than the Docker daemon by specifying a log driver with this parameter in the container definition. To use a different logging driver for a container, the log system must be configured properly on the container instance. Or, alternatively, it must be configured on a different log server for remote logging options. For more information on the options for different supported log drivers, see Configure logging drivers in the Docker documentation. Batch currently supports a subset of the logging drivers available to the Docker daemon (shown in the LogConfiguration data type). Additional log drivers might be available in future releases of the Amazon ECS container agent. This parameter requires version 1.18 of the Docker Remote API or greater on your container instance. To check the Docker Remote API version on your container instance, log in to your container instance and run the following command: sudo docker version | grep "Server API version" The Amazon ECS container agent running on a container instance must register the logging drivers available on that instance with the ECS_AVAILABLE_LOGGING_DRIVERS environment variable before containers placed on that instance can use these log configuration options. For more information, see Amazon ECS container agent configuration in the Amazon Elastic Container Service Developer Guide.'
        secrets:
          $ref: "#/components/schemas/SecretList"
          description: The secrets to pass to the container. For more information, see Specifying sensitive data in the Batch User Guide.
        networkConfiguration:
          $ref: "#/components/schemas/NetworkConfiguration"
          description: The network configuration for jobs that are running on Fargate resources. Jobs that are running on Amazon EC2 resources must not specify this parameter.
        fargatePlatformConfiguration:
          $ref: "#/components/schemas/FargatePlatformConfiguration"
          description: The platform configuration for jobs that are running on Fargate resources. Jobs that are running on Amazon EC2 resources must not specify this parameter.
        ephemeralStorage:
          $ref: "#/components/schemas/EphemeralStorage"
          description: The amount of ephemeral storage allocated for the task. This parameter is used to expand the total amount of ephemeral storage available, beyond the default amount, for tasks hosted on Fargate.
        runtimePlatform:
          $ref: "#/components/schemas/RuntimePlatform"
          description: An object that represents the compute environment architecture for Batch jobs on Fargate.
        repositoryCredentials:
          $ref: "#/components/schemas/RepositoryCredentials"
          description: The private repository authentication credentials to use.
        enableExecuteCommand:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether execute command functionality is turned on for this task. If true, execute command functionality is turned on all the containers in the task.
    NodeDetails:
      description: An object that represents the details of a multi-node parallel job node.
      type: object
      properties:
        nodeIndex:
          $ref: "#/components/schemas/Integer"
          description: The node index for the node. Node index numbering starts at zero. This index is also available on the node with the AWS_BATCH_JOB_NODE_INDEX environment variable.
        isMainNode:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the current node is the main node for a multi-node parallel job.
    ArrayPropertiesDetail:
      description: An object that represents the array properties of a job.
      type: object
      properties:
        statusSummary:
          type: object
          properties: {}
          description: A summary of the number of array job children in each available job status. This parameter is returned for parent array jobs.
        statusSummaryLastUpdatedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the statusSummary was last updated.
        size:
          $ref: "#/components/schemas/Integer"
          description: The size of the array job. This parameter is returned for parent array jobs.
        index:
          $ref: "#/components/schemas/Integer"
          description: The job index within the array that's associated with this job. This parameter is returned for array job children.
    EksPropertiesDetail:
      description: An object that contains the details for the Kubernetes resources of a job.
      type: object
      properties:
        podProperties:
          $ref: "#/components/schemas/EksPodPropertiesDetail"
          description: The properties for the Kubernetes pod resources of a job.
    EksPodPropertiesDetail:
      description: The details for the pod.
      type: object
      properties:
        serviceAccountName:
          $ref: "#/components/schemas/String"
          description: The name of the service account that's used to run the pod. For more information, see Kubernetes service accounts and Configure a Kubernetes service account to assume an IAM role in the Amazon EKS User Guide and Configure service accounts for pods in the Kubernetes documentation.
        hostNetwork:
          $ref: "#/components/schemas/Boolean"
          description: Indicates if the pod uses the hosts' network IP address. The default value is true. Setting this to false enables the Kubernetes pod networking model. Most Batch workloads are egress-only and don't require the overhead of IP allocation for each pod for incoming connections. For more information, see Host namespaces and Pod networking in the Kubernetes documentation.
        dnsPolicy:
          $ref: "#/components/schemas/String"
          description: "The DNS policy for the pod. The default value is ClusterFirst. If the hostNetwork parameter is not specified, the default is ClusterFirstWithHostNet. ClusterFirst indicates that any DNS query that does not match the configured cluster domain suffix is forwarded to the upstream nameserver inherited from the node. If no value was specified for dnsPolicy in the RegisterJobDefinition API operation, then no value will be returned for dnsPolicy by either of DescribeJobDefinitions or DescribeJobs API operations. The pod spec setting will contain either ClusterFirst or ClusterFirstWithHostNet, depending on the value of the hostNetwork parameter. For more information, see Pod's DNS policy in the Kubernetes documentation. Valid values: Default | ClusterFirst | ClusterFirstWithHostNet"
        imagePullSecrets:
          $ref: "#/components/schemas/ImagePullSecrets"
          description: Displays the reference pointer to the Kubernetes secret resource. These secrets help to gain access to pull an images from a private registry.
        containers:
          $ref: "#/components/schemas/EksContainerDetails"
          description: The properties of the container that's used on the Amazon EKS pod.
        initContainers:
          $ref: "#/components/schemas/EksContainerDetails"
          description: The container registered with the Amazon EKS Connector agent and persists the registration information in the Kubernetes backend data store.
        volumes:
          $ref: "#/components/schemas/EksVolumes"
          description: Specifies the volumes for a job definition using Amazon EKS resources.
        podName:
          $ref: "#/components/schemas/String"
          description: The name of the pod for this job.
        nodeName:
          $ref: "#/components/schemas/String"
          description: The name of the node for this job.
        metadata:
          $ref: "#/components/schemas/EksMetadata"
          description: Describes and uniquely identifies Kubernetes resources. For example, the compute environment that a pod runs in or the jobID for a job running in the pod. For more information, see Understanding Kubernetes Objects in the Kubernetes documentation.
        shareProcessNamespace:
          $ref: "#/components/schemas/Boolean"
          description: Indicates if the processes in a container are shared, or visible, to other containers in the same pod. For more information, see Share Process Namespace between Containers in a Pod.
    EksContainerDetails:
      type: array
      items:
        $ref: "#/components/schemas/EksContainerDetail"
    EksContainerDetail:
      description: The details for container properties that are returned by DescribeJobs for jobs that use Amazon EKS.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the container. If the name isn't specified, the default name "Default" is used. Each container in a pod must have a unique name.
        image:
          $ref: "#/components/schemas/String"
          description: The Docker image used to start the container.
        imagePullPolicy:
          $ref: "#/components/schemas/String"
          description: The image pull policy for the container. Supported values are Always, IfNotPresent, and Never. This parameter defaults to Always if the :latest tag is specified, IfNotPresent otherwise. For more information, see Updating images in the Kubernetes documentation.
        command:
          $ref: "#/components/schemas/StringList"
          description: The entrypoint for the container. For more information, see Entrypoint in the Kubernetes documentation.
        args:
          $ref: "#/components/schemas/StringList"
          description: "An array of arguments to the entrypoint. If this isn't specified, the CMD of the container image is used. This corresponds to the args member in the Entrypoint portion of the Pod in Kubernetes. Environment variable references are expanded using the container's environment. If the referenced environment variable doesn't exist, the reference in the command isn't changed. For example, if the reference is to \"$(NAME1)\" and the NAME1 environment variable doesn't exist, the command string will remain \"$(NAME1)\". $$ is replaced with $ and the resulting string isn't expanded. For example, $$(VAR_NAME) is passed as $(VAR_NAME) whether or not the VAR_NAME environment variable exists. For more information, see Dockerfile reference: CMD and Define a command and arguments for a pod in the Kubernetes documentation."
        env:
          $ref: "#/components/schemas/EksContainerEnvironmentVariables"
          description: The environment variables to pass to a container. Environment variables cannot start with "AWS_BATCH". This naming convention is reserved for variables that Batch sets.
        resources:
          $ref: "#/components/schemas/EksContainerResourceRequirements"
          description: The type and amount of resources to assign to a container. The supported resources include memory, cpu, and nvidia.com/gpu. For more information, see Resource management for pods and containers in the Kubernetes documentation.
        exitCode:
          $ref: "#/components/schemas/Integer"
          description: The exit code returned for the job attempt. A non-zero exit code is considered failed.
        reason:
          $ref: "#/components/schemas/String"
          description: A short human-readable string to provide additional details for a running or stopped container. It can be up to 255 characters long.
        volumeMounts:
          $ref: "#/components/schemas/EksContainerVolumeMounts"
          description: The volume mounts for the container. Batch supports emptyDir, hostPath, and secret volume types. For more information about volumes and volume mounts in Kubernetes, see Volumes in the Kubernetes documentation.
        securityContext:
          $ref: "#/components/schemas/EksContainerSecurityContext"
          description: The security context for a job. For more information, see Configure a security context for a pod or container in the Kubernetes documentation.
    EksAttemptDetails:
      type: array
      items:
        $ref: "#/components/schemas/EksAttemptDetail"
    EksAttemptDetail:
      description: An object that represents the details of a job attempt for a job attempt by an Amazon EKS container.
      type: object
      properties:
        containers:
          $ref: "#/components/schemas/EksAttemptContainerDetails"
          description: The details for the final status of the containers for this job attempt.
        initContainers:
          $ref: "#/components/schemas/EksAttemptContainerDetails"
          description: The details for the init containers.
        eksClusterArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Amazon EKS cluster.
        podName:
          $ref: "#/components/schemas/String"
          description: The name of the pod for this job attempt.
        podNamespace:
          $ref: "#/components/schemas/String"
          description: The namespace of the Amazon EKS cluster that the pod exists in.
        nodeName:
          $ref: "#/components/schemas/String"
          description: The name of the node for this job attempt.
        startedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the attempt was started (when the attempt transitioned from the STARTING state to the RUNNING state).
        stoppedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the attempt was stopped. This happens when the attempt transitioned from the RUNNING state to a terminal state, such as SUCCEEDED or FAILED.
        statusReason:
          $ref: "#/components/schemas/String"
          description: A short, human-readable string to provide additional details for the current status of the job attempt.
    EksAttemptContainerDetails:
      type: array
      items:
        $ref: "#/components/schemas/EksAttemptContainerDetail"
    EksAttemptContainerDetail:
      description: An object that represents the details for an attempt for a job attempt that an Amazon EKS container runs.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of a container.
        containerID:
          $ref: "#/components/schemas/String"
          description: The ID for the container.
        exitCode:
          $ref: "#/components/schemas/Integer"
          description: The exit code returned for the job attempt. A non-zero exit code is considered failed.
        reason:
          $ref: "#/components/schemas/String"
          description: A short (255 max characters) human-readable string to provide additional details for a running or stopped container.
    EcsPropertiesDetail:
      description: An object that contains the details for the Amazon ECS resources of a job.
      type: object
      properties:
        taskProperties:
          $ref: "#/components/schemas/ListEcsTaskDetails"
          description: The properties for the Amazon ECS task definition of a job.
    ListEcsTaskDetails:
      type: array
      items:
        $ref: "#/components/schemas/EcsTaskDetails"
    EcsTaskDetails:
      description: The details of a task definition that describes the container and volume definitions of an Amazon ECS task.
      type: object
      properties:
        containers:
          $ref: "#/components/schemas/ListTaskContainerDetails"
          description: A list of containers that are included in the taskProperties list.
        containerInstanceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the container instance that hosts the task.
        taskArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the Amazon ECS task.
        ephemeralStorage:
          $ref: "#/components/schemas/EphemeralStorage"
          description: The amount of ephemeral storage allocated for the task.
        executionRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the execution role that Batch can assume. For more information, see Batch execution IAM role in the Batch User Guide.
        platformVersion:
          $ref: "#/components/schemas/String"
          description: The Fargate platform version where the jobs are running.
        ipcMode:
          $ref: "#/components/schemas/String"
          description: The IPC resource namespace to use for the containers in the task. The valid values are host, task, or none. For more information see ipcMode in EcsTaskProperties.
        taskRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the IAM role that the container can assume for Amazon Web Services permissions. For more information, see IAM roles for tasks in the Amazon Elastic Container Service Developer Guide. This is object is comparable to ContainerProperties:jobRoleArn.
        pidMode:
          $ref: "#/components/schemas/String"
          description: The process namespace to use for the containers in the task. The valid values are host, or task. For more information see pidMode in EcsTaskProperties.
        networkConfiguration:
          $ref: "#/components/schemas/NetworkConfiguration"
          description: The network configuration for jobs that are running on Fargate resources. Jobs that are running on Amazon EC2 resources must not specify this parameter.
        runtimePlatform:
          $ref: "#/components/schemas/RuntimePlatform"
          description: An object that represents the compute environment architecture for Batch jobs on Fargate.
        volumes:
          $ref: "#/components/schemas/Volumes"
          description: A list of data volumes used in a job.
        enableExecuteCommand:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether execute command functionality is turned on for this task. If true, execute command functionality is turned on all the containers in the task.
    ListTaskContainerDetails:
      type: array
      items:
        $ref: "#/components/schemas/TaskContainerDetails"
    TaskContainerDetails:
      description: The details for the container in this task attempt.
      type: object
      properties:
        command:
          $ref: "#/components/schemas/StringList"
          description: The command that's passed to the container. This parameter maps to Cmd in the Create a container section of the Docker Remote API and the COMMAND parameter to docker run. For more information, see https://docs.docker.com/engine/reference/builder/#cmd.
        dependsOn:
          $ref: "#/components/schemas/TaskContainerDependencyList"
          description: A list of containers that this container depends on.
        environment:
          $ref: "#/components/schemas/EnvironmentVariables"
          description: The environment variables to pass to a container. This parameter maps to Env in the Create a container section of the Docker Remote API and the --env option to docker run. We don't recommend using plaintext environment variables for sensitive information, such as credential data.
        essential:
          $ref: "#/components/schemas/Boolean"
          description: If the essential parameter of a container is marked as true, and that container fails or stops for any reason, all other containers that are part of the task are stopped. If the essential parameter of a container is marked as false, its failure doesn't affect the rest of the containers in a task. If this parameter is omitted, a container is assumed to be essential. All jobs must have at least one essential container. If you have an application that's composed of multiple containers, group containers that are used for a common purpose into components, and separate the different components into multiple task definitions. For more information, see Application Architecture in the Amazon Elastic Container Service Developer Guide.
        firelensConfiguration:
          $ref: "#/components/schemas/FirelensConfiguration"
          description: The FireLens configuration for the container. This is used to specify and configure a log router for container logs. For more information, see Custom log routing in the Amazon Elastic Container Service Developer Guide.
        image:
          $ref: "#/components/schemas/String"
          description: The image used to start a container. This string is passed directly to the Docker daemon. By default, images in the Docker Hub registry are available. Other repositories are specified with either repository-url/image:tag or repository-url/image@digest. Up to 255 letters (uppercase and lowercase), numbers, hyphens, underscores, colons, periods, forward slashes, and number signs are allowed. This parameter maps to Image in the Create a container section of the Docker Remote API and the IMAGE parameter of the docker run .
        linuxParameters:
          $ref: "#/components/schemas/LinuxParameters"
          description: Linux-specific modifications that are applied to the container, such as Linux kernel capabilities. For more information, see KernelCapabilities. This parameter is not supported for Windows containers.
        logConfiguration:
          $ref: "#/components/schemas/LogConfiguration"
          description: "The log configuration specification for the container. This parameter maps to LogConfig in the Create a container section of the Docker Remote API and the --log-driver option to docker run. By default, containers use the same logging driver that the Docker daemon uses. However the container can use a different logging driver than the Docker daemon by specifying a log driver with this parameter in the container definition. To use a different logging driver for a container, the log system must be configured properly on the container instance (or on a different log server for remote logging options). For more information about the options for different supported log drivers, see Configure logging drivers in the Docker documentation. Amazon ECS currently supports a subset of the logging drivers available to the Docker daemon (shown in the LogConfiguration data type). Additional log drivers may be available in future releases of the Amazon ECS container agent. This parameter requires version 1.18 of the Docker Remote API or greater on your container instance. To check the Docker Remote API version on your container instance, log in to your container instance and run the following command: sudo docker version --format '{{.Server.APIVersion}}' The Amazon ECS container agent running on a container instance must register the logging drivers available on that instance with the ECS_AVAILABLE_LOGGING_DRIVERS environment variable before containers placed on that instance can use these log configuration options. For more information, see Amazon ECS container agent configuration in the Amazon Elastic Container Service Developer Guide."
        mountPoints:
          $ref: "#/components/schemas/MountPoints"
          description: The mount points for data volumes in your container. This parameter maps to Volumes in the Create a container section of the Docker Remote API and the --volume option to docker run. Windows containers can mount whole directories on the same drive as $env:ProgramData. Windows containers can't mount directories on a different drive, and mount point can't be across drives.
        name:
          $ref: "#/components/schemas/String"
          description: The name of a container.
        privileged:
          $ref: "#/components/schemas/Boolean"
          description: When this parameter is true, the container is given elevated privileges on the host container instance (similar to the root user). This parameter maps to Privileged in the Create a container section of the Docker Remote API and the --privileged option to docker run. This parameter is not supported for Windows containers or tasks run on Fargate.
        readonlyRootFilesystem:
          $ref: "#/components/schemas/Boolean"
          description: When this parameter is true, the container is given read-only access to its root file system. This parameter maps to ReadonlyRootfs in the Create a container section of the Docker Remote API and the --read-only option to docker run. This parameter is not supported for Windows containers.
        repositoryCredentials:
          $ref: "#/components/schemas/RepositoryCredentials"
          description: The private repository authentication credentials to use.
        resourceRequirements:
          $ref: "#/components/schemas/ResourceRequirements"
          description: The type and amount of a resource to assign to a container. The only supported resource is a GPU.
        secrets:
          $ref: "#/components/schemas/SecretList"
          description: The secrets to pass to the container. For more information, see Specifying Sensitive Data in the Amazon Elastic Container Service Developer Guide.
        ulimits:
          $ref: "#/components/schemas/Ulimits"
          description: "A list of ulimits to set in the container. If a ulimit value is specified in a task definition, it overrides the default values set by Docker. This parameter maps to Ulimits in the Create a container section of the Docker Remote API and the --ulimit option to docker run. Amazon ECS tasks hosted on Fargate use the default resource limit values set by the operating system with the exception of the nofile resource limit parameter which Fargate overrides. The nofile resource limit sets a restriction on the number of open files that a container can use. The default nofile soft limit is 1024 and the default hard limit is 65535. This parameter requires version 1.18 of the Docker Remote API or greater on your container instance. To check the Docker Remote API version on your container instance, log in to your container instance and run the following command: sudo docker version --format '{{.Server.APIVersion}}' This parameter is not supported for Windows containers."
        user:
          $ref: "#/components/schemas/String"
          description: The user to use inside the container. This parameter maps to User in the Create a container section of the Docker Remote API and the --user option to docker run. When running tasks using the host network mode, don't run containers using the root user (UID 0). We recommend using a non-root user for better security. You can specify the user using the following formats. If specifying a UID or GID, you must specify it as a positive integer. user user:group uid uid:gid user:gi uid:group This parameter is not supported for Windows containers.
        startTimeout:
          $ref: "#/components/schemas/Integer"
          description: Time duration (in seconds) to wait before giving up on resolving dependencies for a container. The minimum value is 2 seconds and the maximum value for Fargate is 120 seconds.
        stopTimeout:
          $ref: "#/components/schemas/Integer"
          description: Time duration (in seconds) to wait before the container is forcefully killed if it doesn't exit normally on its own. The minimum value is 2 seconds and the maximum value for Fargate is 120 seconds. If the parameter is not specified, the default value of 30 seconds is used. For tasks that use the EC2 launch type, if the stopTimeout parameter isn't specified, the value set for the Amazon ECS container agent configuration variable ECS_CONTAINER_STOP_TIMEOUT is used. If neither the stopTimeout parameter nor the ECS_CONTAINER_STOP_TIMEOUT agent configuration variable are set, then the default value of 30 seconds is used.
        exitCode:
          $ref: "#/components/schemas/Integer"
          description: The exit code returned upon completion.
        reason:
          $ref: "#/components/schemas/String"
          description: A short (255 max characters) human-readable string to provide additional details for a running or stopped container.
        logStreamName:
          $ref: "#/components/schemas/String"
          description: The name of the CloudWatch Logs log stream that's associated with the container. The log group for Batch jobs is /aws/batch/job. Each container attempt receives a log stream name when they reach the RUNNING status.
        networkInterfaces:
          $ref: "#/components/schemas/NetworkInterfaceList"
          description: The network interfaces that are associated with the job.
    DescribeQuotaShareResponse:
      type: object
      properties:
        quotaShareName:
          $ref: "#/components/schemas/String"
          description: The name of the quota share.
        quotaShareArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the quota share.
        jobQueueArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the job queue associated with the quota share.
        capacityLimits:
          $ref: "#/components/schemas/QuotaShareCapacityLimits"
          description: A list that specifies the quantity and type of compute capacity allocated to the quota share.
        resourceSharingConfiguration:
          $ref: "#/components/schemas/QuotaShareResourceSharingConfiguration"
          description: Specifies whether a quota share reserves, lends, or both lends and borrows idle compute capacity.
        preemptionConfiguration:
          $ref: "#/components/schemas/QuotaSharePreemptionConfiguration"
          description: Specifies the preemption behavior for jobs in a quota share.
        state:
          $ref: "#/components/schemas/QuotaShareState"
          description: The state of the quota share.
        status:
          $ref: "#/components/schemas/QuotaShareStatus"
          description: The current status of the quota share.
        tags:
          type: object
          properties: {}
          description: The tags applied to the quota share.
    QuotaShareStatus:
      type: string
      enum:
        - CREATING
        - VALID
        - INVALID
        - UPDATING
        - DELETING
    DescribeSchedulingPoliciesResponse:
      type: object
      properties:
        schedulingPolicies:
          $ref: "#/components/schemas/SchedulingPolicyDetailList"
          description: The list of scheduling policies.
    SchedulingPolicyDetailList:
      type: array
      items:
        $ref: "#/components/schemas/SchedulingPolicyDetail"
    SchedulingPolicyDetail:
      description: An object that represents a scheduling policy.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the fair-share scheduling policy.
        arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the scheduling policy. An example is arn:aws:batch:us-east-1:123456789012:scheduling-policy/HighPriority .
        quotaSharePolicy:
          $ref: "#/components/schemas/QuotaSharePolicy"
          description: The quota share scheduling policy details.
        fairsharePolicy:
          $ref: "#/components/schemas/FairsharePolicy"
          description: The fair-share scheduling policy details.
        tags:
          type: object
          properties: {}
          description: The tags that you apply to the fair-share scheduling policy to categorize and organize your resources. Each tag consists of a key and an optional value. For more information, see Tagging Amazon Web Services resources in Amazon Web Services General Reference.
      required:
        - name
        - arn
    DescribeServiceEnvironmentsResponse:
      type: object
      properties:
        serviceEnvironments:
          $ref: "#/components/schemas/ServiceEnvironmentDetailList"
          description: The list of service environments that match the request.
        nextToken:
          $ref: "#/components/schemas/String"
          description: The nextToken value to include in a future DescribeServiceEnvironments request. When the results of a DescribeServiceEnvironments request exceed maxResults, this value can be used to retrieve the next page of results. This value is null when there are no more results to return.
    ServiceEnvironmentDetailList:
      type: array
      items:
        $ref: "#/components/schemas/ServiceEnvironmentDetail"
    ServiceEnvironmentDetail:
      description: Detailed information about a service environment, including its configuration, state, and capacity limits.
      type: object
      properties:
        serviceEnvironmentName:
          $ref: "#/components/schemas/String"
          description: The name of the service environment.
        serviceEnvironmentArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the service environment.
        serviceEnvironmentType:
          $ref: "#/components/schemas/ServiceEnvironmentType"
          description: The type of service environment. For SageMaker Training jobs, this value is SAGEMAKER_TRAINING.
        state:
          $ref: "#/components/schemas/ServiceEnvironmentState"
          description: The state of the service environment. Valid values are ENABLED and DISABLED.
        status:
          $ref: "#/components/schemas/ServiceEnvironmentStatus"
          description: The current status of the service environment.
        capacityLimits:
          $ref: "#/components/schemas/CapacityLimits"
          description: The capacity limits for the service environment. This defines the maximum resources that can be used by service jobs in this environment.
        tags:
          type: object
          properties: {}
          description: The tags associated with the service environment. Each tag consists of a key and an optional value. For more information, see Tagging your Batch resources.
      required:
        - serviceEnvironmentName
        - serviceEnvironmentArn
        - serviceEnvironmentType
        - capacityLimits
    ServiceEnvironmentStatus:
      type: string
      enum:
        - CREATING
        - UPDATING
        - DELETING
        - DELETED
        - VALID
        - INVALID
    DescribeServiceJobResponse:
      type: object
      properties:
        attempts:
          $ref: "#/components/schemas/ServiceJobAttemptDetails"
          description: A list of job attempts associated with the service job.
        capacityUsage:
          $ref: "#/components/schemas/ServiceJobCapacityUsageDetailList"
          description: The configured capacity for the service job, such as the number of instances. The number of instances should be the same value as the serviceRequestPayload.InstanceCount field.
        createdAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the service job was created.
        isTerminated:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the service job has been terminated.
        jobArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the service job.
        jobId:
          $ref: "#/components/schemas/String"
          description: The job ID for the service job.
        jobName:
          $ref: "#/components/schemas/String"
          description: The name of the service job.
        jobQueue:
          $ref: "#/components/schemas/String"
          description: The ARN of the job queue that the service job is associated with.
        latestAttempt:
          $ref: "#/components/schemas/LatestServiceJobAttempt"
          description: The latest attempt associated with the service job.
        retryStrategy:
          $ref: "#/components/schemas/ServiceJobRetryStrategy"
          description: The retry strategy to use for failed service jobs that are submitted with this service job.
        scheduledAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the service job was scheduled. This represents when the service job was dispatched to SageMaker and the service job transitioned to the SCHEDULED state.
        schedulingPriority:
          $ref: "#/components/schemas/Integer"
          description: The scheduling priority of the service job.
        serviceRequestPayload:
          $ref: "#/components/schemas/String"
          description: The request, in JSON, for the service that the SubmitServiceJob operation is queueing.
        serviceJobType:
          $ref: "#/components/schemas/ServiceJobType"
          description: The type of service job. For SageMaker Training jobs, this value is SAGEMAKER_TRAINING.
        shareIdentifier:
          $ref: "#/components/schemas/String"
          description: The share identifier for the service job. This is used for fair-share scheduling.
        quotaShareName:
          $ref: "#/components/schemas/String"
          description: The name of the quota share that the service job is associated with.
        preemptionConfiguration:
          $ref: "#/components/schemas/ServiceJobPreemptionConfiguration"
          description: Specifies the service job behavior when preempted.
        preemptionSummary:
          $ref: "#/components/schemas/ServiceJobPreemptionSummary"
          description: Summarizes the preemptions of the service job. This field appears on a service job when it has been preempted.
        startedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the service job was started.
        status:
          $ref: "#/components/schemas/ServiceJobStatus"
          description: The current status of the service job.
        statusReason:
          $ref: "#/components/schemas/String"
          description: A short, human-readable string to provide more details for the current status of the service job.
        stoppedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the service job stopped running.
        tags:
          type: object
          properties: {}
          description: The tags that are associated with the service job. Each tag consists of a key and an optional value. For more information, see Tagging your Batch resources.
        timeoutConfig:
          $ref: "#/components/schemas/ServiceJobTimeout"
          description: The timeout configuration for the service job.
      required:
        - jobId
        - jobName
        - jobQueue
        - serviceJobType
        - startedAt
        - status
    ServiceJobAttemptDetails:
      type: array
      items:
        $ref: "#/components/schemas/ServiceJobAttemptDetail"
    ServiceJobAttemptDetail:
      description: Detailed information about an attempt to run a service job.
      type: object
      properties:
        serviceResourceId:
          $ref: "#/components/schemas/ServiceResourceId"
          description: The service resource identifier associated with the service job attempt.
        startedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the service job attempt was started.
        stoppedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the service job attempt stopped running.
        statusReason:
          $ref: "#/components/schemas/String"
          description: A string that provides additional details for the current status of the service job attempt.
    ServiceResourceId:
      description: The Batch unique identifier.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ServiceResourceIdName"
          description: The name of the resource identifier.
        value:
          $ref: "#/components/schemas/String"
          description: The value of the resource identifier.
      required:
        - name
        - value
    ServiceResourceIdName:
      type: string
      enum:
        - TrainingJobArn
    ServiceJobCapacityUsageDetailList:
      type: array
      items:
        $ref: "#/components/schemas/ServiceJobCapacityUsageDetail"
    ServiceJobCapacityUsageDetail:
      description: The capacity usage for a service job, including the unit of measure and quantity of resources being consumed.
      type: object
      properties:
        capacityUnit:
          $ref: "#/components/schemas/String"
          description: The unit of measure for the service job capacity usage. For service jobs, this is the instance type.
        quantity:
          $ref: "#/components/schemas/Double"
          description: The quantity of capacity being used by the service job, measured in the units specified by capacityUnit.
    Double:
      type: number
      format: double
    LatestServiceJobAttempt:
      description: Information about the latest attempt of a service job. A Service job can transition from SCHEDULED back to RUNNABLE state when they encounter capacity constraints.
      type: object
      properties:
        serviceResourceId:
          $ref: "#/components/schemas/ServiceResourceId"
          description: The service resource identifier associated with the service job attempt.
    ServiceJobRetryStrategy:
      description: The retry strategy for service jobs. This defines how many times to retry a failed service job and under what conditions. For more information, see Service job retry strategies in the Batch User Guide.
      type: object
      properties:
        attempts:
          $ref: "#/components/schemas/Integer"
          description: The number of times to move a service job to RUNNABLE status. You can specify between 1 and 10 attempts.
        evaluateOnExit:
          $ref: "#/components/schemas/ServiceJobEvaluateOnExitList"
          description: Array of ServiceJobEvaluateOnExit objects that specify conditions under which the service job should be retried or failed.
      required:
        - attempts
    ServiceJobEvaluateOnExitList:
      type: array
      items:
        $ref: "#/components/schemas/ServiceJobEvaluateOnExit"
    ServiceJobEvaluateOnExit:
      description: Specifies conditions for when to exit or retry a service job based on the exit status or status reason.
      type: object
      properties:
        action:
          $ref: "#/components/schemas/ServiceJobRetryAction"
          description: The action to take if the service job exits with the specified condition. Valid values are RETRY and EXIT.
        onStatusReason:
          $ref: "#/components/schemas/String"
          description: Contains a glob pattern to match against the StatusReason returned for a job. The pattern can contain up to 512 characters and can contain all printable characters. It can optionally end with an asterisk (*) so that only the start of the string needs to be an exact match.
    ServiceJobRetryAction:
      type: string
      enum:
        - RETRY
        - EXIT
    ServiceJobType:
      type: string
      enum:
        - SAGEMAKER_TRAINING
    ServiceJobPreemptionConfiguration:
      description: Specifies the service job behavior when preempted.
      type: object
      properties:
        preemptionRetriesBeforeTermination:
          $ref: "#/components/schemas/Integer"
          description: The number of times a service job can be retried after it is preempted. A job will be terminated when preemption retries have been exhausted. If this field is unset, preempted jobs will be requeued an unlimited number of times.
    ServiceJobPreemptionSummary:
      description: Summarizes the preemptions of the service job. This field appears on a service job when it has been preempted.
      type: object
      properties:
        preemptedAttemptCount:
          $ref: "#/components/schemas/Integer"
          description: The total number of times the service job has been preempted.
        recentPreemptedAttempts:
          $ref: "#/components/schemas/ServiceJobRecentPreemptedAttemptList"
          description: A list of the most recent preemption attempts for the service job.
    ServiceJobRecentPreemptedAttemptList:
      type: array
      items:
        $ref: "#/components/schemas/ServiceJobPreemptedAttempt"
    ServiceJobPreemptedAttempt:
      description: Detailed information about a preempted attempt of a service job.
      type: object
      properties:
        serviceResourceId:
          $ref: "#/components/schemas/ServiceResourceId"
          description: The service resource identifier associated with the service job attempt.
        startedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the service job attempt was started.
        stoppedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the service job attempt stopped running.
        statusReason:
          $ref: "#/components/schemas/String"
          description: A string that provides additional details for the current status of the service job attempt.
    ServiceJobStatus:
      type: string
      enum:
        - SUBMITTED
        - PENDING
        - RUNNABLE
        - SCHEDULED
        - STARTING
        - RUNNING
        - SUCCEEDED
        - FAILED
    ServiceJobTimeout:
      description: The timeout configuration for service jobs.
      type: object
      properties:
        attemptDurationSeconds:
          $ref: "#/components/schemas/Integer"
          description: The maximum duration in seconds that a service job attempt can run. After this time is reached, Batch terminates the service job attempt.
    GetJobQueueSnapshotResponse:
      type: object
      properties:
        frontOfQueue:
          $ref: "#/components/schemas/FrontOfQueueDetail"
          description: The list of the first 100 RUNNABLE jobs in each job queue. For first-in-first-out (FIFO) job queues, jobs are ordered based on their submission time. For job queues with an attached fair-share scheduling (FSS) or quota-share policy, jobs are ordered based on their job priority and share usage.
        frontOfQuotaShares:
          $ref: "#/components/schemas/FrontOfQuotaSharesDetail"
          description: The first RUNNABLE job in each quota share. Jobs are ordered based on their job priority and share usage.
        queueUtilization:
          $ref: "#/components/schemas/QueueSnapshotUtilizationDetail"
          description: The job queue's capacity utilization, including total usage and breakdown per given share.
    FrontOfQueueDetail:
      description: Contains a list of the first 100 RUNNABLE jobs associated to a single job queue.
      type: object
      properties:
        jobs:
          $ref: "#/components/schemas/FrontOfQueueJobSummaryList"
          description: The Amazon Resource Names (ARNs) of the first 100 RUNNABLE jobs in a named job queue. For first-in-first-out (FIFO) job queues, jobs are ordered based on their submission time. For fair-share scheduling (FSS) job queues, jobs are ordered based on their job priority and share usage.
        lastUpdatedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when each of the first 100 RUNNABLE jobs were last updated.
    FrontOfQueueJobSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/FrontOfQueueJobSummary"
    FrontOfQueueJobSummary:
      description: An object that represents summary details for the first 100 RUNNABLE jobs in a job queue.
      type: object
      properties:
        jobArn:
          $ref: "#/components/schemas/String"
          description: The ARN for a job in a named job queue.
        earliestTimeAtPosition:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the job transitioned to its current position in the job queue.
    FrontOfQuotaSharesDetail:
      description: An object that represents the details of the first RUNNABLE job in each named quota share associated with a single job queue.
      type: object
      properties:
        quotaShares:
          type: object
