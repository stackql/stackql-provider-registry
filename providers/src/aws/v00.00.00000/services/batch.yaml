        $ref: "#/components/schemas/KeyValuesPair"
    ListJobsResponse:
      type: object
      properties:
        jobSummaryList:
          $ref: "#/components/schemas/JobSummaryList"
          description: A list of job summaries that match the request.
        nextToken:
          $ref: "#/components/schemas/String"
          description: The nextToken value to include in a future ListJobs request. When the results of a ListJobs request exceed maxResults, this value can be used to retrieve the next page of results. This value is null when there are no more results to return.
      required:
        - jobSummaryList
    JobSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/JobSummary"
    JobSummary:
      description: An object that represents summary details of a job.
      type: object
      properties:
        jobArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the job.
        jobId:
          $ref: "#/components/schemas/String"
          description: The job ID.
        jobName:
          $ref: "#/components/schemas/String"
          description: The job name.
        capacityUsage:
          $ref: "#/components/schemas/JobCapacityUsageSummaryList"
          description: The configured capacity usage information for this job, including the unit of measure and quantity of resources.
        createdAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the job was created. For non-array jobs and parent array jobs, this is when the job entered the SUBMITTED state (at the time SubmitJob was called). For array child jobs, this is when the child job was spawned by its parent and entered the PENDING state.
        scheduledAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the job was scheduled for execution. For more information on job statues, see Service job status in the Batch User Guide.
        shareIdentifier:
          $ref: "#/components/schemas/String"
          description: The share identifier for the fairshare scheduling queue that this job is associated with.
        status:
          $ref: "#/components/schemas/JobStatus"
          description: The current status for the job.
        statusReason:
          $ref: "#/components/schemas/String"
          description: A short, human-readable string to provide more details for the current status of the job.
        startedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp for when the job was started. More specifically, it's when the job transitioned from the STARTING state to the RUNNING state.
        stoppedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp for when the job was stopped. More specifically, it's when the job transitioned from the RUNNING state to a terminal state, such as SUCCEEDED or FAILED.
        container:
          $ref: "#/components/schemas/ContainerSummary"
          description: An object that represents the details of the container that's associated with the job.
        arrayProperties:
          $ref: "#/components/schemas/ArrayPropertiesSummary"
          description: The array properties of the job, if it's an array job.
        nodeProperties:
          $ref: "#/components/schemas/NodePropertiesSummary"
          description: The node properties for a single node in a job summary list. This isn't applicable to jobs that are running on Fargate resources.
        jobDefinition:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the job definition.
      required:
        - jobId
        - jobName
    JobCapacityUsageSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/JobCapacityUsageSummary"
    JobCapacityUsageSummary:
      description: The capacity usage for a job, including the unit of measure and quantity of resources being used.
      type: object
      properties:
        capacityUnit:
          $ref: "#/components/schemas/String"
          description: The unit of measure for the capacity usage. This is VCPU for Amazon EC2 and cpu for Amazon EKS.
        quantity:
          $ref: "#/components/schemas/Double"
          description: The quantity of capacity being used by the job, measured in the units specified by capacityUnit.
    ContainerSummary:
      description: An object that represents summary details of a container within a job.
      type: object
      properties:
        exitCode:
          $ref: "#/components/schemas/Integer"
          description: The exit code to return upon completion.
        reason:
          $ref: "#/components/schemas/String"
          description: A short (255 max characters) human-readable string to provide additional details for a running or stopped container.
    ArrayPropertiesSummary:
      description: An object that represents the array properties of a job.
      type: object
      properties:
        size:
          $ref: "#/components/schemas/Integer"
          description: The size of the array job. This parameter is returned for parent array jobs.
        index:
          $ref: "#/components/schemas/Integer"
          description: The job index within the array that's associated with this job. This parameter is returned for children of array jobs.
        statusSummary:
          type: object
          properties: {}
          description: A summary of the number of array job children in each available job status. This parameter is returned for parent array jobs.
        statusSummaryLastUpdatedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the statusSummary was last updated.
    NodePropertiesSummary:
      description: An object that represents the properties of a node that's associated with a multi-node parallel job.
      type: object
      properties:
        isMainNode:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the current node is the main node for a multi-node parallel job.
        numNodes:
          $ref: "#/components/schemas/Integer"
          description: The number of nodes that are associated with a multi-node parallel job.
        nodeIndex:
          $ref: "#/components/schemas/Integer"
          description: The node index for the node. Node index numbering begins at zero. This index is also available on the node with the AWS_BATCH_JOB_NODE_INDEX environment variable.
    ListJobsByConsumableResourceFilterList:
      type: array
      items:
        $ref: "#/components/schemas/KeyValuesPair"
    ListJobsByConsumableResourceResponse:
      type: object
      properties:
        jobs:
          $ref: "#/components/schemas/ListJobsByConsumableResourceSummaryList"
          description: The list of jobs that require the specified consumable resources.
        nextToken:
          $ref: "#/components/schemas/String"
          description: The nextToken value to include in a future ListJobsByConsumableResource request. When the results of a ListJobsByConsumableResource request exceed maxResults, this value can be used to retrieve the next page of results. This value is null when there are no more results to return.
      required:
        - jobs
    ListJobsByConsumableResourceSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/ListJobsByConsumableResourceSummary"
    ListJobsByConsumableResourceSummary:
      description: Current information about a consumable resource required by a job.
      type: object
      properties:
        jobArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the job.
        jobQueueArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the job queue.
        jobName:
          $ref: "#/components/schemas/String"
          description: The name of the job.
        jobDefinitionArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the job definition.
        shareIdentifier:
          $ref: "#/components/schemas/String"
          description: The fair-share scheduling identifier for the job.
        jobStatus:
          $ref: "#/components/schemas/String"
          description: "The status of the job. Can be one of: SUBMITTED PENDING RUNNABLE STARTING RUNNING SUCCEEDED FAILED"
        quantity:
          $ref: "#/components/schemas/Long"
          description: The total amount of the consumable resource that is available.
        statusReason:
          $ref: "#/components/schemas/String"
          description: A short, human-readable string to provide more details for the current status of the job.
        startedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp for when the job was started. More specifically, it's when the job transitioned from the STARTING state to the RUNNING state.
        createdAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the consumable resource was created.
        consumableResourceProperties:
          $ref: "#/components/schemas/ConsumableResourceProperties"
          description: Contains a list of consumable resources required by the job.
      required:
        - jobArn
        - jobQueueArn
        - jobName
        - jobStatus
        - quantity
        - createdAt
        - consumableResourceProperties
    ListQuotaSharesResponse:
      type: object
