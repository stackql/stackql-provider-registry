      type: object
      properties:
        quotaShareName:
          $ref: "#/components/schemas/String"
          description: The name of the quota share.
        quotaShareArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the quota share.
        jobQueueArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the job queue associated with the quota share.
        capacityLimits:
          $ref: "#/components/schemas/QuotaShareCapacityLimits"
          description: A list that specifies the quantity and type of compute capacity allocated to the quota share.
        resourceSharingConfiguration:
          $ref: "#/components/schemas/QuotaShareResourceSharingConfiguration"
          description: Specifies whether a quota share reserves, lends, or both lends and borrows idle compute capacity.
        preemptionConfiguration:
          $ref: "#/components/schemas/QuotaSharePreemptionConfiguration"
          description: Specifies the preemption behavior for jobs in a quota share.
        state:
          $ref: "#/components/schemas/QuotaShareState"
          description: The state of the quota share.
        status:
          $ref: "#/components/schemas/QuotaShareStatus"
          description: The current status of the quota share.
    ListSchedulingPoliciesResponse:
      type: object
