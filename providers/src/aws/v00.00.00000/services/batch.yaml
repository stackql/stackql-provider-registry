        latestAttempt:
          $ref: "#/components/schemas/LatestServiceJobAttempt"
          description: Information about the latest attempt for the service job.
        capacityUsage:
          $ref: "#/components/schemas/ServiceJobCapacityUsageSummaryList"
          description: The capacity usage information for this service job, including the unit of measure and quantity of resources being used.
        createdAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the service job was created.
        jobArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the service job.
        jobId:
          $ref: "#/components/schemas/String"
          description: The job ID for the service job.
        jobName:
          $ref: "#/components/schemas/String"
          description: The name of the service job.
        scheduledAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the service job was scheduled for execution.
        serviceJobType:
          $ref: "#/components/schemas/ServiceJobType"
          description: The type of service job. For SageMaker Training jobs, this value is SAGEMAKER_TRAINING.
        shareIdentifier:
          $ref: "#/components/schemas/String"
          description: The share identifier for the job.
        quotaShareName:
          $ref: "#/components/schemas/String"
          description: The quota share for the service job.
        status:
          $ref: "#/components/schemas/ServiceJobStatus"
          description: The current status of the service job.
        statusReason:
          $ref: "#/components/schemas/String"
          description: A short string to provide more details on the current status of the service job.
        startedAt:
          $ref: "#/components/schemas/Long"
