          description: The Unix timestamp (in milliseconds) for when the first RUNNABLE job per quota share were all last updated.
    QueueSnapshotUtilizationDetail:
      description: The job queue utilization at a specific point in time, including total capacity usage, and quota share or fairshare utilization breakdown depending on the job queue scheduling policy.
