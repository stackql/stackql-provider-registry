          $ref: "#/components/schemas/FairshareUtilizationDetail"
          description: The utilization information for a fairshare scheduling job queues, including active share count and top capacity utilization by share.
        quotaShareUtilization:
          $ref: "#/components/schemas/QuotaShareUtilizationDetail"
          description: The utilization information for a job queue with a quota share scheduling policy.
        lastUpdatedAt:
          $ref: "#/components/schemas/Long"
          description: The Unix timestamp (in milliseconds) for when the queue utilization information was last updated.
    QueueSnapshotCapacityUsageList:
      type: array
      items:
        $ref: "#/components/schemas/QueueSnapshotCapacityUsage"
    QueueSnapshotCapacityUsage:
      description: The configured capacity usage for a job queue snapshot, including the unit of measure and quantity of resources being used.
      type: object
      properties:
        capacityUnit:
          $ref: "#/components/schemas/String"
          description: The unit of measure for the capacity usage. For compute jobs, this is VCPU for Amazon EC2 and cpu for Amazon EKS. For service jobs, this is the instance type.
        quantity:
          $ref: "#/components/schemas/Double"
          description: The quantity of capacity being used in the queue snapshot, measured in the units specified by capacityUnit.
    FairshareUtilizationDetail:
      description: The fairshare utilization for a job queue, including the number of active shares and top capacity utilization.
      type: object
      properties:
        activeShareCount:
          $ref: "#/components/schemas/Long"
          description: The total number of active shares in the fairshare scheduling job queue that are currently utilizing capacity.
        topCapacityUtilization:
          $ref: "#/components/schemas/FairshareCapacityUtilizationList"
          description: A list of the top 20 shares with the highest capacity utilization, ordered by usage amount.
    FairshareCapacityUtilizationList:
      type: array
      items:
        $ref: "#/components/schemas/FairshareCapacityUtilization"
    FairshareCapacityUtilization:
      description: The capacity utilization for a specific share in a fairshare scheduling job queue, including the share identifier and its current usage.
      type: object
      properties:
        shareIdentifier:
          $ref: "#/components/schemas/String"
          description: The share identifier for the fairshare scheduling job queue.
        capacityUsage:
          $ref: "#/components/schemas/FairshareCapacityUsageList"
          description: The capacity usage information for this share, including the unit of measure and quantity being used. This is VCPU for Amazon EC2 and cpu for Amazon EKS.
    FairshareCapacityUsageList:
      type: array
      items:
        $ref: "#/components/schemas/FairshareCapacityUsage"
    FairshareCapacityUsage:
      description: The capacity usage for a fairshare scheduling job queue.
      type: object
      properties:
        capacityUnit:
          $ref: "#/components/schemas/String"
          description: The unit of measure for the capacity usage. For compute jobs, this is VCPU for Amazon EC2 and cpu for Amazon EKS. For service jobs, this is the instance type.
        quantity:
          $ref: "#/components/schemas/Double"
          description: The quantity of capacity being used, measured in the units specified by capacityUnit.
    QuotaShareUtilizationDetail:
      description: An object that represents the capacity utilization details of all quota shares associated with a single job queue.
      type: object
      properties:
        topCapacityUtilization:
          $ref: "#/components/schemas/QuotaShareCapacityUtilizationList"
          description: A list of the top capacity utilizations across quota shares associated with a job queue.
    QuotaShareCapacityUtilizationList:
      type: array
      items:
        $ref: "#/components/schemas/QuotaShareCapacityUtilization"
    QuotaShareCapacityUtilization:
      description: The capacity utilization for a specific quota share, including the quota share name and its current usage.
      type: object
      properties:
        quotaShareName:
          $ref: "#/components/schemas/String"
          description: The name of the quota share.
        capacityUsage:
          $ref: "#/components/schemas/QuotaShareCapacityUsageList"
          description: The capacity usage information for this quota share, including the units of compute capacity and quantity being used.
    QuotaShareCapacityUsageList:
      type: array
      items:
        $ref: "#/components/schemas/QuotaShareCapacityUsage"
    QuotaShareCapacityUsage:
      description: The capacity usage for a quota share, including units of compute capacity and quantity of resources being used.
      type: object
      properties:
        capacityUnit:
          $ref: "#/components/schemas/String"
          description: The unit of compute capacity for the capacity usage.
        quantity:
          $ref: "#/components/schemas/Double"
          description: The quantity of capacity being used.
    ListConsumableResourcesFilterList:
      type: array
