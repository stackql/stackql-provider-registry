      type: object
      properties:
        capacityUnit:
          $ref: "#/components/schemas/String"
          description: The unit of measure for the service job capacity usage. For service jobs, this is the instance type.
        quantity:
          $ref: "#/components/schemas/Double"
          description: The quantity of capacity being used by the service job, measured in the units specified by capacityUnit.
    ListTagsForResourceResponse:
      type: object
      properties:
        tags:
          type: object
          properties: {}
          description: The tags for the resource.
    JobDefinitionType:
      type: string
      enum:
        - container
        - multinode
    ParametersMap:
      type: object
      properties: {}
    RegisterJobDefinitionResponse:
      type: object
      properties:
        jobDefinitionName:
          $ref: "#/components/schemas/String"
          description: The name of the job definition.
        jobDefinitionArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the job definition.
        revision:
          $ref: "#/components/schemas/Integer"
          description: The revision of the job definition.
      required:
        - jobDefinitionName
        - jobDefinitionArn
        - revision
    ArrayProperties:
      description: An object that represents an Batch array job.
      type: object
      properties:
        size:
          $ref: "#/components/schemas/Integer"
          description: The size of the array job.
    ContainerOverrides:
      description: The overrides that should be sent to a container. For information about using Batch overrides when you connect event sources to targets, see BatchContainerOverrides.
      type: object
      properties:
        vcpus:
          $ref: "#/components/schemas/Integer"
          description: This parameter is deprecated, use resourceRequirements to override the vcpus parameter that's set in the job definition. It's not supported for jobs running on Fargate resources. For jobs that run on Amazon EC2 resources, it overrides the vcpus parameter set in the job definition, but doesn't override any vCPU requirement specified in the resourceRequirements structure in the job definition. To override vCPU requirements that are specified in the resourceRequirements structure in the job definition, resourceRequirements must be specified in the SubmitJob request, with type set to VCPU and value set to the new value. For more information, see Can't override job definition resource requirements in the Batch User Guide.
        memory:
          $ref: "#/components/schemas/Integer"
          description: This parameter is deprecated, use resourceRequirements to override the memory requirements specified in the job definition. It's not supported for jobs running on Fargate resources. For jobs that run on Amazon EC2 resources, it overrides the memory parameter set in the job definition, but doesn't override any memory requirement that's specified in the resourceRequirements structure in the job definition. To override memory requirements that are specified in the resourceRequirements structure in the job definition, resourceRequirements must be specified in the SubmitJob request, with type set to MEMORY and value set to the new value. For more information, see Can't override job definition resource requirements in the Batch User Guide.
        command:
          $ref: "#/components/schemas/StringList"
          description: The command to send to the container that overrides the default command from the Docker image or the job definition. This parameter can't contain an empty string.
        instanceType:
          $ref: "#/components/schemas/String"
          description: The instance type to use for a multi-node parallel job. This parameter isn't applicable to single-node container jobs or jobs that run on Fargate resources, and shouldn't be provided.
        environment:
          $ref: "#/components/schemas/EnvironmentVariables"
          description: The environment variables to send to the container. You can add new environment variables, which are added to the container at launch, or you can override the existing environment variables from the Docker image or the job definition. Environment variables cannot start with "AWS_BATCH". This naming convention is reserved for variables that Batch sets.
        resourceRequirements:
          $ref: "#/components/schemas/ResourceRequirements"
          description: The type and amount of resources to assign to a container. This overrides the settings in the job definition. The supported resources include GPU, MEMORY, and VCPU.
    NodeOverrides:
      description: An object that represents any node overrides to a job definition that's used in a SubmitJob API operation. This parameter isn't applicable to jobs that are running on Fargate resources. Don't provide it for these jobs. Rather, use containerOverrides instead.
      type: object
      properties:
        numNodes:
          $ref: "#/components/schemas/Integer"
          description: "The number of nodes to use with a multi-node parallel job. This value overrides the number of nodes that are specified in the job definition. To use this override, you must meet the following conditions: There must be at least one node range in your job definition that has an open upper boundary, such as : or n:. The lower boundary of the node range that's specified in the job definition must be fewer than the number of nodes specified in the override. The main node index that's specified in the job definition must be fewer than the number of nodes specified in the override."
        nodePropertyOverrides:
          $ref: "#/components/schemas/NodePropertyOverrides"
          description: The node property overrides for the job.
    NodePropertyOverrides:
      type: array
      items:
        $ref: "#/components/schemas/NodePropertyOverride"
    NodePropertyOverride:
      description: The object that represents any node overrides to a job definition that's used in a SubmitJob API operation.
      type: object
      properties:
        targetNodes:
          $ref: "#/components/schemas/String"
          description: The range of nodes, using node index values, that's used to override. A range of 0:3 indicates nodes with index values of 0 through 3. If the starting range value is omitted (:n), then 0 is used to start the range. If the ending range value is omitted (n:), then the highest possible node index is used to end the range.
        containerOverrides:
          $ref: "#/components/schemas/ContainerOverrides"
          description: The overrides that are sent to a node range.
        ecsPropertiesOverride:
          $ref: "#/components/schemas/EcsPropertiesOverride"
          description: An object that contains the properties that you want to replace for the existing Amazon ECS resources of a job.
        instanceTypes:
          $ref: "#/components/schemas/StringList"
          description: An object that contains the instance types that you want to replace for the existing resources of a job.
        eksPropertiesOverride:
          $ref: "#/components/schemas/EksPropertiesOverride"
          description: An object that contains the properties that you want to replace for the existing Amazon EKS resources of a job.
        consumableResourcePropertiesOverride:
          $ref: "#/components/schemas/ConsumableResourceProperties"
          description: An object that contains overrides for the consumable resources of a job.
      required:
        - targetNodes
    EcsPropertiesOverride:
      description: An object that contains overrides for the Amazon ECS task definition of a job.
      type: object
      properties:
        taskProperties:
          $ref: "#/components/schemas/ListTaskPropertiesOverride"
          description: The overrides for the Amazon ECS task definition of a job. This object is currently limited to one element.
    ListTaskPropertiesOverride:
      type: array
      items:
        $ref: "#/components/schemas/TaskPropertiesOverride"
    TaskPropertiesOverride:
      description: An object that contains overrides for the task definition of a job.
      type: object
      properties:
        containers:
          $ref: "#/components/schemas/ListTaskContainerOverrides"
          description: The overrides for the container definition of a job.
    ListTaskContainerOverrides:
      type: array
      items:
        $ref: "#/components/schemas/TaskContainerOverrides"
    TaskContainerOverrides:
      description: The overrides that should be sent to a container. For information about using Batch overrides when you connect event sources to targets, see BatchContainerOverrides.
      type: object
      properties:
        command:
          $ref: "#/components/schemas/StringList"
          description: The command to send to the container that overrides the default command from the Docker image or the job definition. This parameter can't contain an empty string.
        environment:
          $ref: "#/components/schemas/EnvironmentVariables"
          description: The environment variables to send to the container. You can add new environment variables, which are added to the container at launch, or you can override the existing environment variables from the Docker image or the job definition. Environment variables cannot start with AWS_BATCH. This naming convention is reserved for variables that Batch sets.
        name:
          $ref: "#/components/schemas/String"
          description: A pointer to the container that you want to override. The container's name provides a unique identifier for the container being used.
        resourceRequirements:
          $ref: "#/components/schemas/ResourceRequirements"
          description: The type and amount of resources to assign to a container. This overrides the settings in the job definition. The supported resources include GPU, MEMORY, and VCPU.
    EksPropertiesOverride:
      description: An object that contains overrides for the Kubernetes resources of a job.
      type: object
      properties:
        podProperties:
          $ref: "#/components/schemas/EksPodPropertiesOverride"
          description: The overrides for the Kubernetes pod resources of a job.
    EksPodPropertiesOverride:
      description: An object that contains overrides for the Kubernetes pod properties of a job.
      type: object
      properties:
        containers:
          $ref: "#/components/schemas/EksContainerOverrideList"
          description: The overrides for the container that's used on the Amazon EKS pod.
        initContainers:
          $ref: "#/components/schemas/EksContainerOverrideList"
          description: The overrides for the initContainers defined in the Amazon EKS pod. These containers run before application containers, always run to completion, and must complete successfully before the next container starts. These containers are registered with the Amazon EKS Connector agent and persists the registration information in the Kubernetes backend data store. For more information, see Init Containers in the Kubernetes documentation.
        metadata:
          $ref: "#/components/schemas/EksMetadata"
          description: Metadata about the overrides for the container that's used on the Amazon EKS pod.
    EksContainerOverrideList:
      type: array
      items:
        $ref: "#/components/schemas/EksContainerOverride"
    EksContainerOverride:
      description: Object representing any Kubernetes overrides to a job definition that's used in a SubmitJob API operation.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: A pointer to the container that you want to override. The name must match a unique container name that you wish to override.
        image:
          $ref: "#/components/schemas/String"
          description: The override of the Docker image that's used to start the container.
        command:
          $ref: "#/components/schemas/StringList"
          description: The command to send to the container that overrides the default command from the Docker image or the job definition.
        args:
          $ref: "#/components/schemas/StringList"
          description: "The arguments to the entrypoint to send to the container that overrides the default arguments from the Docker image or the job definition. For more information, see Dockerfile reference: CMD and Define a command an arguments for a pod in the Kubernetes documentation."
        env:
          $ref: "#/components/schemas/EksContainerEnvironmentVariables"
          description: The environment variables to send to the container. You can add new environment variables, which are added to the container at launch. Or, you can override the existing environment variables from the Docker image or the job definition. Environment variables cannot start with "AWS_BATCH". This naming convention is reserved for variables that Batch sets.
        resources:
          $ref: "#/components/schemas/EksContainerResourceRequirements"
          description: The type and amount of resources to assign to a container. These override the settings in the job definition. The supported resources include memory, cpu, and nvidia.com/gpu. For more information, see Resource management for pods and containers in the Kubernetes documentation.
    SubmitJobResponse:
      type: object
      properties:
        jobArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) for the job.
        jobName:
          $ref: "#/components/schemas/String"
          description: The name of the job.
        jobId:
          $ref: "#/components/schemas/String"
          description: The unique identifier for the job.
      required:
        - jobName
        - jobId
    ClientRequestToken:
      type: string
      minLength: 1
      maxLength: 64
    SubmitServiceJobResponse:
      type: object
      properties:
        jobArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) for the service job.
        jobName:
          $ref: "#/components/schemas/String"
          description: The name of the service job.
        jobId:
          $ref: "#/components/schemas/String"
          description: The unique identifier for the service job.
      required:
        - jobName
        - jobId
    TagResourceResponse:
      type: object
    TerminateJobResponse:
      type: object
    TerminateServiceJobResponse:
      type: object
    TagKeysList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    UntagResourceResponse:
      type: object
    ComputeResourceUpdate:
      description: An object that represents the attributes of a compute environment that can be updated. For more information, see Updating compute environments in the Batch User Guide.
      type: object
      properties:
        minvCpus:
          $ref: "#/components/schemas/Integer"
          description: The minimum number of vCPUs that an environment should maintain (even if the compute environment is DISABLED). This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it.
        maxvCpus:
          $ref: "#/components/schemas/Integer"
          description: The maximum number of Amazon EC2 vCPUs that an environment can reach. With BEST_FIT_PROGRESSIVE,SPOT_CAPACITY_OPTIMIZED and SPOT_PRICE_CAPACITY_OPTIMIZED (recommended) strategies using On-Demand or Spot Instances, and the BEST_FIT strategy using Spot Instances, Batch might need to exceed maxvCpus to meet your capacity requirements. In this event, Batch never exceeds maxvCpus by more than a single instance.
        desiredvCpus:
          $ref: "#/components/schemas/Integer"
          description: The desired number of vCPUS in the compute environment. Batch modifies this value between the minimum and maximum values based on job queue demand. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it. Batch doesn't support changing the desired number of vCPUs of an existing compute environment. Don't specify this parameter for compute environments using Amazon EKS clusters. When you update the desiredvCpus setting, the value must be between the minvCpus and maxvCpus values. Additionally, the updated desiredvCpus value must be greater than or equal to the current desiredvCpus value. For more information, see Troubleshooting Batch in the Batch User Guide.
        subnets:
          $ref: "#/components/schemas/StringList"
          description: The VPC subnets where the compute resources are launched. Fargate compute resources can contain up to 16 subnets. For Fargate compute resources, providing an empty list will be handled as if this parameter wasn't specified and no change is made. For Amazon EC2 compute resources, providing an empty list removes the VPC subnets from the compute resource. For more information, see VPCs and subnets in the Amazon VPC User Guide. When updating a compute environment, changing the VPC subnets requires an infrastructure update of the compute environment. For more information, see Updating compute environments in the Batch User Guide. Batch on Amazon EC2 and Batch on Amazon EKS support Local Zones. For more information, see Local Zones in the Amazon EC2 User Guide for Linux Instances, Amazon EKS and Amazon Web Services Local Zones in the Amazon EKS User Guide and Amazon ECS clusters in Local Zones, Wavelength Zones, and Amazon Web Services Outposts in the Amazon ECS Developer Guide. Batch on Fargate doesn't currently support Local Zones.
        securityGroupIds:
          $ref: "#/components/schemas/StringList"
          description: The Amazon EC2 security groups that are associated with instances launched in the compute environment. This parameter is required for Fargate compute resources, where it can contain up to 5 security groups. For Fargate compute resources, providing an empty list is handled as if this parameter wasn't specified and no change is made. For Amazon EC2 compute resources, providing an empty list removes the security groups from the compute resource. When updating a compute environment, changing the Amazon EC2 security groups requires an infrastructure update of the compute environment. For more information, see Updating compute environments in the Batch User Guide.
        allocationStrategy:
          $ref: "#/components/schemas/CRUpdateAllocationStrategy"
          description: The allocation strategy to use for the compute resource if there's not enough instances of the best fitting instance type that can be allocated. This might be because of availability of the instance type in the Region or Amazon EC2 service limits. For more information, see Allocation strategies in the Batch User Guide. When updating a compute environment, changing the allocation strategy requires an infrastructure update of the compute environment. For more information, see Updating compute environments in the Batch User Guide. BEST_FIT isn't supported when updating a compute environment. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it. BEST_FIT_PROGRESSIVE Batch selects additional instance types that are large enough to meet the requirements of the jobs in the queue. Its preference is for instance types with lower cost vCPUs. If additional instances of the previously selected instance types aren't available, Batch selects new instance types. SPOT_CAPACITY_OPTIMIZED Batch selects one or more instance types that are large enough to meet the requirements of the jobs in the queue. Its preference is for instance types that are less likely to be interrupted. This allocation strategy is only available for Spot Instance compute resources. SPOT_PRICE_CAPACITY_OPTIMIZED The price and capacity optimized allocation strategy looks at both price and capacity to select the Spot Instance pools that are the least likely to be interrupted and have the lowest possible price. This allocation strategy is only available for Spot Instance compute resources. With BEST_FIT_PROGRESSIVE,SPOT_CAPACITY_OPTIMIZED and SPOT_PRICE_CAPACITY_OPTIMIZED (recommended) strategies using On-Demand or Spot Instances, and the BEST_FIT strategy using Spot Instances, Batch might need to exceed maxvCpus to meet your capacity requirements. In this event, Batch never exceeds maxvCpus by more than a single instance.
        instanceTypes:
          $ref: "#/components/schemas/StringList"
          description: "The instances types that can be launched. You can specify instance families to launch any instance type within those families (for example, c5 or p3), or you can specify specific sizes within a family (such as c5.8xlarge). Batch can select the instance type for you if you choose one of the following: optimal to select instance types (from the c4, m4, r4, c5, m5, and r5 instance families) that match the demand of your job queues. default_x86_64 to choose x86 based instance types (from the m6i, c6i, r6i, and c7i instance families) that matches the resource demands of the job queue. default_arm64 to choose x86 based instance types (from the m6g, c6g, r6g, and c7g instance families) that matches the resource demands of the job queue. Starting on 11/01/2025 the behavior of optimal is going to be changed to match default_x86_64. During the change your instance families could be updated to a newer generation. You do not need to perform any actions for the upgrade to happen. For more information about change, see Optimal instance type configuration to receive automatic instance family updates. Instance family availability varies by Amazon Web Services Region. For example, some Amazon Web Services Regions may not have any fourth generation instance families but have fifth and sixth generation instance families. When using default_x86_64 or default_arm64 instance bundles, Batch selects instance families based on a balance of cost-effectiveness and performance. While newer generation instances often provide better price-performance, Batch may choose an earlier generation instance family if it provides the optimal combination of availability, cost, and performance for your workload. For example, in an Amazon Web Services Region where both c6i and c7i instances are available, Batch might select c6i instances if they offer better cost-effectiveness for your specific job requirements. For more information on Batch instance types and Amazon Web Services Region availability, see Instance type compute table in the Batch User Guide. Batch periodically updates your instances in default bundles to newer, more cost-effective options. Updates happen automatically without requiring any action from you. Your workloads continue running during updates with no interruption This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it. When you create a compute environment, the instance types that you select for the compute environment must share the same architecture. For example, you can't mix x86 and ARM instances in the same compute environment."
        ec2KeyPair:
          $ref: "#/components/schemas/String"
          description: The Amazon EC2 key pair that's used for instances launched in the compute environment. You can use this key pair to log in to your instances with SSH. To remove the Amazon EC2 key pair, set this value to an empty string. When updating a compute environment, changing the Amazon EC2 key pair requires an infrastructure update of the compute environment. For more information, see Updating compute environments in the Batch User Guide. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it.
        instanceRole:
          $ref: "#/components/schemas/String"
          description: The Amazon ECS instance profile applied to Amazon EC2 instances in a compute environment. Required for Amazon EC2 instances. You can specify the short name or full Amazon Resource Name (ARN) of an instance profile. For example, ecsInstanceRole or arn:aws:iam::`<aws_account_id>`:instance-profile/ecsInstanceRole . For more information, see Amazon ECS instance role in the Batch User Guide. When updating a compute environment, changing this setting requires an infrastructure update of the compute environment. For more information, see Updating compute environments in the Batch User Guide. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it.
        tags:
          type: object
          properties: {}
          description: "Key-value pair tags to be applied to Amazon EC2 resources that are launched in the compute environment. For Batch, these take the form of \"String1\": \"String2\", where String1 is the tag key and String2 is the tag value (for example, { \"Name\": \"Batch Instance - C4OnDemand\" }). This is helpful for recognizing your Batch instances in the Amazon EC2 console. These tags aren't seen when using the Batch ListTagsForResource API operation. When updating a compute environment, changing this setting requires an infrastructure update of the compute environment. For more information, see Updating compute environments in the Batch User Guide. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it."
        placementGroup:
          $ref: "#/components/schemas/String"
          description: The Amazon EC2 placement group to associate with your compute resources. If you intend to submit multi-node parallel jobs to your compute environment, you should consider creating a cluster placement group and associate it with your compute resources. This keeps your multi-node parallel job on a logical grouping of instances within a single Availability Zone with high network flow potential. For more information, see Placement groups in the Amazon EC2 User Guide for Linux Instances. When updating a compute environment, changing the placement group requires an infrastructure update of the compute environment. For more information, see Updating compute environments in the Batch User Guide. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it.
        bidPercentage:
          $ref: "#/components/schemas/Integer"
          description: The maximum percentage that a Spot Instance price can be when compared with the On-Demand price for that instance type before instances are launched. For example, if your maximum percentage is 20%, the Spot price must be less than 20% of the current On-Demand price for that Amazon EC2 instance. You always pay the lowest (market) price and never more than your maximum percentage. For most use cases, we recommend leaving this field empty. When updating a compute environment, changing the bid percentage requires an infrastructure update of the compute environment. For more information, see Updating compute environments in the Batch User Guide. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it.
        launchTemplate:
          $ref: "#/components/schemas/LaunchTemplateSpecification"
          description: The updated launch template to use for your compute resources. You must specify either the launch template ID or launch template name in the request, but not both. For more information, see Launch template support in the Batch User Guide. To remove the custom launch template and use the default launch template, set launchTemplateId or launchTemplateName member of the launch template specification to an empty string. Removing the launch template from a compute environment will not remove the AMI specified in the launch template. In order to update the AMI specified in a launch template, the updateToLatestImageVersion parameter must be set to true. When updating a compute environment, changing the launch template requires an infrastructure update of the compute environment. For more information, see Updating compute environments in the Batch User Guide. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it.
        ec2Configuration:
          $ref: "#/components/schemas/Ec2ConfigurationList"
          description: Provides information used to select Amazon Machine Images (AMIs) for Amazon EC2 instances in the compute environment. If Ec2Configuration isn't specified, the default is ECS_AL2023 for EC2 (ECS) compute environments and EKS_AL2023 for EKS compute environments. When updating a compute environment, changing this setting requires an infrastructure update of the compute environment. For more information, see Updating compute environments in the Batch User Guide. To remove the Amazon EC2 configuration and any custom AMI ID specified in imageIdOverride, set this value to an empty string. One or two values can be provided. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it.
        updateToLatestImageVersion:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the AMI ID is updated to the latest one that's supported by Batch when the compute environment has an infrastructure update. The default value is false. An AMI ID can either be specified in the imageId or imageIdOverride parameters or be determined by the launch template that's specified in the launchTemplate parameter. If an AMI ID is specified any of these ways, this parameter is ignored. For more information about to update AMI IDs during an infrastructure update, see Updating the AMI ID in the Batch User Guide. When updating a compute environment, changing this setting requires an infrastructure update of the compute environment. For more information, see Updating compute environments in the Batch User Guide.
        type_:
          $ref: "#/components/schemas/CRType"
          description: "The type of compute environment: EC2, SPOT, FARGATE, or FARGATE_SPOT. For more information, see Compute environments in the Batch User Guide. If you choose SPOT, you must also specify an Amazon EC2 Spot Fleet role with the spotIamFleetRole parameter. For more information, see Amazon EC2 spot fleet role in the Batch User Guide. When updating a compute environment, changing the type of a compute environment requires an infrastructure update of the compute environment. For more information, see Updating compute environments in the Batch User Guide."
        imageId:
          $ref: "#/components/schemas/String"
          description: The Amazon Machine Image (AMI) ID used for instances launched in the compute environment. This parameter is overridden by the imageIdOverride member of the Ec2Configuration structure. To remove the custom AMI ID and use the default AMI ID, set this value to an empty string. When updating a compute environment, changing the AMI ID requires an infrastructure update of the compute environment. For more information, see Updating compute environments in the Batch User Guide. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it. The AMI that you choose for a compute environment must match the architecture of the instance types that you intend to use for that compute environment. For example, if your compute environment uses A1 instance types, the compute resource AMI that you choose must support ARM instances. Amazon ECS vends both x86 and ARM versions of the Amazon ECS-optimized Amazon Linux 2023 AMI. For more information, see Amazon ECS-optimized Amazon Linux 2023 AMI in the Amazon Elastic Container Service Developer Guide.
        scalingPolicy:
          $ref: "#/components/schemas/ComputeScalingPolicy"
          description: The scaling policy configuration for the compute environment. This parameter isn't applicable to jobs that are running on Fargate resources. Don't specify it.
    CRUpdateAllocationStrategy:
      type: string
      enum:
        - BEST_FIT_PROGRESSIVE
        - SPOT_CAPACITY_OPTIMIZED
        - SPOT_PRICE_CAPACITY_OPTIMIZED
    UpdateComputeEnvironmentResponse:
      type: object
      properties:
        computeEnvironmentName:
          $ref: "#/components/schemas/String"
          description: The name of the compute environment. It can be up to 128 characters long. It can contain uppercase and lowercase letters, numbers, hyphens (-), and underscores (_).
