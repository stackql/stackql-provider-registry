    DataSource:
      description: Describes a data source.
      type: object
      properties:
        dataSourceArn:
          $ref: "#/components/schemas/String"
          description: The data source Amazon Resource Name (ARN).
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the data source.
        description:
          $ref: "#/components/schemas/String"
          description: The description of the data source.
        type_:
          $ref: "#/components/schemas/DataSourceType"
          description: "The type of the data source. AWS_LAMBDA: The data source is an Lambda function. AMAZON_DYNAMODB: The data source is an Amazon DynamoDB table. AMAZON_ELASTICSEARCH: The data source is an Amazon OpenSearch Service domain. AMAZON_OPENSEARCH_SERVICE: The data source is an Amazon OpenSearch Service domain. AMAZON_EVENTBRIDGE: The data source is an Amazon EventBridge configuration. AMAZON_BEDROCK_RUNTIME: The data source is the Amazon Bedrock runtime. NONE: There is no data source. Use this type when you want to invoke a GraphQL operation without connecting to a data source, such as when you're performing data transformation with resolvers or invoking a subscription from a mutation. HTTP: The data source is an HTTP endpoint. RELATIONAL_DATABASE: The data source is a relational database."
        serviceRoleArn:
          $ref: "#/components/schemas/String"
          description: The Identity and Access Management (IAM) service role Amazon Resource Name (ARN) for the data source. The system assumes this role when accessing the data source.
        dynamodbConfig:
          $ref: "#/components/schemas/DynamodbDataSourceConfig"
          description: DynamoDB settings.
        lambdaConfig:
          $ref: "#/components/schemas/LambdaDataSourceConfig"
          description: Lambda settings.
        elasticsearchConfig:
          $ref: "#/components/schemas/ElasticsearchDataSourceConfig"
          description: Amazon OpenSearch Service settings.
        openSearchServiceConfig:
          $ref: "#/components/schemas/OpenSearchServiceDataSourceConfig"
          description: Amazon OpenSearch Service settings.
        httpConfig:
          $ref: "#/components/schemas/HttpDataSourceConfig"
          description: HTTP endpoint settings.
        relationalDatabaseConfig:
          $ref: "#/components/schemas/RelationalDatabaseDataSourceConfig"
          description: Relational database settings.
        eventBridgeConfig:
          $ref: "#/components/schemas/EventBridgeDataSourceConfig"
          description: Amazon EventBridge settings.
        metricsConfig:
          $ref: "#/components/schemas/DataSourceLevelMetricsConfig"
          description: Enables or disables enhanced data source metrics for specified data sources. Note that metricsConfig won't be used unless the dataSourceLevelMetricsBehavior value is set to PER_DATA_SOURCE_METRICS. If the dataSourceLevelMetricsBehavior is set to FULL_REQUEST_DATA_SOURCE_METRICS instead, metricsConfig will be ignored. However, you can still set its value. metricsConfig can be ENABLED or DISABLED.
    CertificateArn:
      type: string
