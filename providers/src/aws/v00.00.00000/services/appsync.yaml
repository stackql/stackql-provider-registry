      description: Retrieves the record of an existing introspection. If the retrieval is successful, the result of the instrospection will also be returned. If the retrieval fails the operation, an error message will be returned instead.
      parameters:
        - name: introspection_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The introspection ID. Each introspection contains a unique ID that can be used to reference the instrospection record.
        - name: includeModelsSDL
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: A boolean flag that determines whether SDL should be generated for introspected types. If set to true, each model will contain an sdl property that contains the SDL for that type. The SDL only contains the type data and no additional metadata or directives.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: Determines the number of types to be returned in a single response before paginating. This value is typically taken from nextToken value from the previous response.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of introspected types that will be returned in a single response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataSourceIntrospectionResponse"
  /v1/apis/{api_id}/environmentVariables:
    get:
      operationId: GetGraphqlApiEnvironmentVariables
      description: Retrieves the list of environmental variable key-value pairs associated with an API by its ID value.
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the API from which the environmental variable list will be retrieved.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGraphqlApiEnvironmentVariablesResponse"
    put:
      operationId: PutGraphqlApiEnvironmentVariables
      description: 'Creates a list of environmental variables in an API by its ID value. When creating an environmental variable, it must follow the constraints below: Both JavaScript and VTL templates support environmental variables. Environmental variables are not evaluated before function invocation. Environmental variables only support string values. Any defined value in an environmental variable is considered a string literal and not expanded. Variable evaluations should ideally be performed in the function code. When creating an environmental variable key-value pair, it must follow the additional constraints below: Keys must begin with a letter. Keys must be at least two characters long. Keys can only contain letters, numbers, and the underscore character (_). Values can be up to 512 characters long. You can configure up to 50 key-value pairs in a GraphQL API. You can create a list of environmental variables by adding it to the environmentVariables payload as a list in the format {"key1":"value1","key2":"value2", …}. Note that each call of the PutGraphqlApiEnvironmentVariables action will result in the overwriting of the existing environmental variable list of that API. This means the existing environmental variables will be lost. To avoid this, you must include all existing and new environmental variables in the list each time you call this action.'
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the API to which the environmental variable list will be written.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                environmentVariables:
                  $ref: "#/components/schemas/EnvironmentVariableMap"
              required:
                - environmentVariables
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutGraphqlApiEnvironmentVariablesResponse"
  /v1/apis/{api_id}/schema:
