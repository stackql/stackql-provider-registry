openapi: 3.0.0
info:
  version: "2017-07-25"
  title: AWS AppSync
  description: AWS AppSync
  x-serviceName: appsync
  x-serviceAlias: appsync
  x-protocol: rest-json
  x-apiVersion: "2017-07-25"
  x-endpointPrefix: appsync
  x-jsonVersion: "1.1"
servers:
  - url: https://appsync.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for appsync
paths:
  /v1/domainnames/{domain_name}/apiassociation:
    post:
      operationId: AssociateApi
      description: Maps an endpoint to your custom domain.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The domain name.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                apiId:
                  $ref: "#/components/schemas/String"
              required:
                - apiId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateApiResponse"
    delete:
      operationId: DisassociateApi
      description: Removes an ApiAssociation object from a custom domain.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The domain name.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateApiResponse"
    get:
      operationId: GetApiAssociation
      description: Retrieves an ApiAssociation object.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The domain name.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetApiAssociationResponse"
  /v1/sourceApis/{source_api_identifier}/mergedApiAssociations:
    post:
      operationId: AssociateMergedGraphqlApi
      description: Creates an association between a Merged API and source API using the source API's identifier.
      parameters:
        - name: source_api_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The identifier of the AppSync Source API. This is generated by the AppSync service. In most cases, source APIs (especially in your account) only require the API ID value or ARN of the source API. However, source APIs from other accounts (cross-account use cases) strictly require the full resource ARN of the source API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mergedApiIdentifier:
                  $ref: "#/components/schemas/String"
                description:
                  $ref: "#/components/schemas/String"
                sourceApiAssociationConfig:
                  $ref: "#/components/schemas/SourceApiAssociationConfig"
              required:
                - mergedApiIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateMergedGraphqlApiResponse"
  /v1/mergedApis/{merged_api_identifier}/sourceApiAssociations:
    post:
      operationId: AssociateSourceGraphqlApi
      description: Creates an association between a Merged API and source API using the Merged API's identifier.
      parameters:
        - name: merged_api_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The identifier of the AppSync Merged API. This is generated by the AppSync service. In most cases, Merged APIs (especially in your account) only require the API ID value or ARN of the merged API. However, Merged APIs in other accounts (cross-account use cases) strictly require the full resource ARN of the merged API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceApiIdentifier:
                  $ref: "#/components/schemas/String"
                description:
                  $ref: "#/components/schemas/String"
                sourceApiAssociationConfig:
                  $ref: "#/components/schemas/SourceApiAssociationConfig"
              required:
                - sourceApiIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateSourceGraphqlApiResponse"
  /v2/apis:
    post:
      operationId: CreateApi
      description: Creates an Api object. Use this operation to create an AppSync API with your preferred configuration, such as an Event API that provides real-time message publishing and message subscriptions over WebSockets.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ApiName"
                ownerContact:
                  $ref: "#/components/schemas/String"
                tags:
                  $ref: "#/components/schemas/TagMap"
                eventConfig:
                  $ref: "#/components/schemas/EventConfig"
              required:
                - name
                - eventConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiResponse"
    get:
      operationId: ListApis
      description: Lists the APIs in your AppSync account. ListApis returns only the high level API details. For more detailed information about an API, use GetApi.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: An identifier that was returned from the previous call to this operation, which you can use to return the next set of items in the list.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that you want the request to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApisResponse"
  /v1/apis/{api_id}/ApiCaches:
    post:
      operationId: CreateApiCache
      description: Creates a cache for the GraphQL API.
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The GraphQL API ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ttl:
                  $ref: "#/components/schemas/Long"
                transitEncryptionEnabled:
                  $ref: "#/components/schemas/Boolean"
                atRestEncryptionEnabled:
                  $ref: "#/components/schemas/Boolean"
                apiCachingBehavior:
                  $ref: "#/components/schemas/ApiCachingBehavior"
                type:
                  $ref: "#/components/schemas/ApiCacheType"
                healthMetricsConfig:
                  $ref: "#/components/schemas/CacheHealthMetricsConfig"
              required:
                - ttl
                - apiCachingBehavior
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiCacheResponse"
    delete:
      operationId: DeleteApiCache
      description: Deletes an ApiCache object.
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The API ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApiCacheResponse"
    get:
      operationId: GetApiCache
      description: Retrieves an ApiCache object.
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The API ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetApiCacheResponse"
  /v1/apis/{api_id}/apikeys:
    post:
      operationId: CreateApiKey
      description: Creates a unique key that you can distribute to clients who invoke your API.
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID for your GraphQL API.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/String"
                expires:
                  $ref: "#/components/schemas/Long"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyResponse"
    get:
      operationId: ListApiKeys
      description: Lists the API keys for a given API. API keys are deleted automatically 60 days after they expire. However, they may still be included in the response until they have actually been deleted. You can safely call DeleteApiKey to manually delete a key before it's automatically deleted.
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The API ID.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: An identifier that was returned from the previous call to this operation, which you can use to return the next set of items in the list.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that you want the request to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApiKeysResponse"
  /v2/apis/{api_id}/channelNamespaces:
    post:
      operationId: CreateChannelNamespace
      description: Creates a ChannelNamespace for an Api.
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Api ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Namespace"
                subscribeAuthModes:
                  $ref: "#/components/schemas/AuthModes"
                publishAuthModes:
                  $ref: "#/components/schemas/AuthModes"
                codeHandlers:
                  $ref: "#/components/schemas/Code"
                tags:
                  $ref: "#/components/schemas/TagMap"
                handlerConfigs:
                  $ref: "#/components/schemas/HandlerConfigs"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelNamespaceResponse"
    get:
      operationId: ListChannelNamespaces
      description: Lists the channel namespaces for a specified Api. ListChannelNamespaces returns only high level details for the channel namespace. To retrieve code handlers, use GetChannelNamespace.
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Api ID.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: An identifier that was returned from the previous call to this operation, which you can use to return the next set of items in the list.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that you want the request to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChannelNamespacesResponse"
  /v1/apis/{api_id}/datasources:
    post:
      operationId: CreateDataSource
      description: Creates a DataSource object.
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The API ID for the GraphQL API for the DataSource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                description:
                  $ref: "#/components/schemas/String"
                type:
                  $ref: "#/components/schemas/DataSourceType"
                serviceRoleArn:
                  $ref: "#/components/schemas/String"
                dynamodbConfig:
                  $ref: "#/components/schemas/DynamodbDataSourceConfig"
                lambdaConfig:
                  $ref: "#/components/schemas/LambdaDataSourceConfig"
                elasticsearchConfig:
                  $ref: "#/components/schemas/ElasticsearchDataSourceConfig"
                openSearchServiceConfig:
                  $ref: "#/components/schemas/OpenSearchServiceDataSourceConfig"
                httpConfig:
                  $ref: "#/components/schemas/HttpDataSourceConfig"
                relationalDatabaseConfig:
                  $ref: "#/components/schemas/RelationalDatabaseDataSourceConfig"
                eventBridgeConfig:
                  $ref: "#/components/schemas/EventBridgeDataSourceConfig"
                metricsConfig:
                  $ref: "#/components/schemas/DataSourceLevelMetricsConfig"
              required:
                - name
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataSourceResponse"
    get:
      operationId: ListDataSources
      description: Lists the data sources for a given API.
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The API ID.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: An identifier that was returned from the previous call to this operation, which you can use to return the next set of items in the list.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that you want the request to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataSourcesResponse"
  /v1/domainnames:
    post:
      operationId: CreateDomainName
      description: Creates a custom DomainName object.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domainName:
                  $ref: "#/components/schemas/DomainName"
                certificateArn:
                  $ref: "#/components/schemas/CertificateArn"
                description:
                  $ref: "#/components/schemas/Description"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - domainName
                - certificateArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDomainNameResponse"
    get:
      operationId: ListDomainNames
      description: Lists multiple custom domain names.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: An identifier that was returned from the previous call to this operation, which you can use to return the next set of items in the list.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that you want the request to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDomainNamesResponse"
  /v1/apis/{api_id}/functions:
    post:
      operationId: CreateFunction
      description: Creates a Function object. A function is a reusable entity. You can use multiple functions to compose the resolver logic.
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The GraphQL API ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                description:
                  $ref: "#/components/schemas/String"
                dataSourceName:
                  $ref: "#/components/schemas/ResourceName"
                requestMappingTemplate:
                  $ref: "#/components/schemas/MappingTemplate"
                responseMappingTemplate:
                  $ref: "#/components/schemas/MappingTemplate"
                functionVersion:
                  $ref: "#/components/schemas/String"
                syncConfig:
                  $ref: "#/components/schemas/SyncConfig"
                maxBatchSize:
                  $ref: "#/components/schemas/MaxBatchSize"
                runtime:
                  $ref: "#/components/schemas/AppSyncRuntime"
                code:
                  $ref: "#/components/schemas/Code"
              required:
                - name
                - dataSourceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFunctionResponse"
    get:
      operationId: ListFunctions
      description: List multiple functions.
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The GraphQL API ID.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: An identifier that was returned from the previous call to this operation, which you can use to return the next set of items in the list.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that you want the request to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFunctionsResponse"
  /v1/apis:
    post:
      operationId: CreateGraphqlApi
      description: Creates a GraphqlApi object.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/String"
                logConfig:
                  $ref: "#/components/schemas/LogConfig"
                authenticationType:
                  $ref: "#/components/schemas/AuthenticationType"
                userPoolConfig:
                  $ref: "#/components/schemas/UserPoolConfig"
                openIDConnectConfig:
                  $ref: "#/components/schemas/OpenIDConnectConfig"
                tags:
                  $ref: "#/components/schemas/TagMap"
                additionalAuthenticationProviders:
                  $ref: "#/components/schemas/AdditionalAuthenticationProviders"
                xrayEnabled:
                  $ref: "#/components/schemas/Boolean"
                lambdaAuthorizerConfig:
                  $ref: "#/components/schemas/LambdaAuthorizerConfig"
                apiType:
                  $ref: "#/components/schemas/GraphQLApiType"
                mergedApiExecutionRoleArn:
                  $ref: "#/components/schemas/String"
                visibility:
                  $ref: "#/components/schemas/GraphQLApiVisibility"
                ownerContact:
                  $ref: "#/components/schemas/String"
                introspectionConfig:
                  $ref: "#/components/schemas/GraphQLApiIntrospectionConfig"
                queryDepthLimit:
                  $ref: "#/components/schemas/QueryDepthLimit"
                resolverCountLimit:
                  $ref: "#/components/schemas/ResolverCountLimit"
                enhancedMetricsConfig:
                  $ref: "#/components/schemas/EnhancedMetricsConfig"
              required:
                - name
                - authenticationType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGraphqlApiResponse"
    get:
      operationId: ListGraphqlApis
      description: Lists your GraphQL APIs.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: An identifier that was returned from the previous call to this operation, which you can use to return the next set of items in the list.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that you want the request to return.
        - name: apiType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GraphQLApiType"
          description: The value that indicates whether the GraphQL API is a standard API (GRAPHQL) or merged API (MERGED).
        - name: owner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Ownership"
          description: The account owner of the GraphQL API.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGraphqlApisResponse"
  /v1/apis/{api_id}/types/{type_name}/resolvers:
    post:
      operationId: CreateResolver
      description: Creates a Resolver object. A resolver converts incoming requests into a format that a data source can understand, and converts the data source's responses into GraphQL.
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID for the GraphQL API for which the resolver is being created.
        - name: type_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the Type.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fieldName:
                  $ref: "#/components/schemas/ResourceName"
                dataSourceName:
                  $ref: "#/components/schemas/ResourceName"
                requestMappingTemplate:
                  $ref: "#/components/schemas/MappingTemplate"
                responseMappingTemplate:
                  $ref: "#/components/schemas/MappingTemplate"
                kind:
                  $ref: "#/components/schemas/ResolverKind"
                pipelineConfig:
                  $ref: "#/components/schemas/PipelineConfig"
                syncConfig:
                  $ref: "#/components/schemas/SyncConfig"
                cachingConfig:
                  $ref: "#/components/schemas/CachingConfig"
                maxBatchSize:
                  $ref: "#/components/schemas/MaxBatchSize"
                runtime:
                  $ref: "#/components/schemas/AppSyncRuntime"
                code:
                  $ref: "#/components/schemas/Code"
                metricsConfig:
                  $ref: "#/components/schemas/ResolverLevelMetricsConfig"
              required:
                - fieldName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResolverResponse"
    get:
      operationId: ListResolvers
      description: Lists the resolvers for a given API and type.
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The API ID.
        - name: type_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The type name.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: An identifier that was returned from the previous call to this operation, which you can use to return the next set of items in the list.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that you want the request to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResolversResponse"
  /v1/apis/{api_id}/types:
    post:
      operationId: CreateType
      description: Creates a Type object.
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The API ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                definition:
                  $ref: "#/components/schemas/String"
                format:
                  $ref: "#/components/schemas/TypeDefinitionFormat"
              required:
                - definition
                - format
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTypeResponse"
    get:
      operationId: ListTypes
      description: Lists the types for a given API.
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The API ID.
        - name: format
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TypeDefinitionFormat"
          description: "The type format: SDL or JSON."
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: An identifier that was returned from the previous call to this operation, which you can use to return the next set of items in the list.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that you want the request to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTypesResponse"
  /v2/apis/{api_id}:
    delete:
      operationId: DeleteApi
      description: Deletes an Api object
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Api ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApiResponse"
    get:
      operationId: GetApi
      description: Retrieves an Api object.
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Api ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
