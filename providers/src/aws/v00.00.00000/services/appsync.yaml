components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DomainName:
      type: string
      minLength: 1
      maxLength: 253
      pattern: ^(\*[\w\d-]*\.)?([\w\d-]+\.)+[\w\d-]+$
    String:
      type: string
    AssociateApiResponse:
      type: object
      properties:
        apiAssociation:
          $ref: "#/components/schemas/ApiAssociation"
          description: The ApiAssociation object.
    ApiAssociation:
      description: Describes an ApiAssociation object.
      type: object
      properties:
        domainName:
          $ref: "#/components/schemas/DomainName"
          description: The domain name.
        apiId:
          $ref: "#/components/schemas/String"
          description: The API ID.
        associationStatus:
          $ref: "#/components/schemas/AssociationStatus"
          description: "Identifies the status of an association. PROCESSING: The API association is being created. You cannot modify association requests during processing. SUCCESS: The API association was successful. You can modify associations after success. FAILED: The API association has failed. You can modify associations after failure."
        deploymentDetail:
          $ref: "#/components/schemas/String"
          description: Details about the last deployment status.
    AssociationStatus:
      type: string
      enum:
        - PROCESSING
        - FAILED
        - SUCCESS
    SourceApiAssociationConfig:
      description: Describes properties used to specify configurations related to a source API.
      type: object
      properties:
        mergeType:
          $ref: "#/components/schemas/MergeType"
          description: The property that indicates which merging option is enabled in the source API association. Valid merge types are MANUAL_MERGE (default) and AUTO_MERGE. Manual merges are the default behavior and require the user to trigger any changes from the source APIs to the merged API manually. Auto merges subscribe the merged API to the changes performed on the source APIs so that any change in the source APIs are also made to the merged API. Auto merges use MergedApiExecutionRoleArn to perform merge operations.
    MergeType:
      type: string
      enum:
        - MANUAL_MERGE
        - AUTO_MERGE
    AssociateMergedGraphqlApiResponse:
      type: object
      properties:
        sourceApiAssociation:
          $ref: "#/components/schemas/SourceApiAssociation"
          description: The SourceApiAssociation object data.
    SourceApiAssociation:
      description: Describes the configuration of a source API. A source API is a GraphQL API that is linked to a merged API. There can be multiple source APIs attached to each merged API. When linked to a merged API, the source API's schema, data sources, and resolvers will be combined with other linked source API data to form a new, singular API. Source APIs can originate from your account or from other accounts via Amazon Web Services Resource Access Manager. For more information about sharing resources from other accounts, see What is Amazon Web Services Resource Access Manager? in the Amazon Web Services Resource Access Manager guide.
      type: object
      properties:
        associationId:
          $ref: "#/components/schemas/String"
          description: The ID generated by the AppSync service for the source API association.
        associationArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the source API association.
        sourceApiId:
          $ref: "#/components/schemas/String"
          description: The ID of the AppSync source API.
        sourceApiArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the AppSync source API.
        mergedApiArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the AppSync Merged API.
        mergedApiId:
          $ref: "#/components/schemas/String"
          description: The ID of the AppSync Merged API.
        description:
          $ref: "#/components/schemas/String"
          description: The description field.
        sourceApiAssociationConfig:
          $ref: "#/components/schemas/SourceApiAssociationConfig"
          description: The SourceApiAssociationConfig object data.
        sourceApiAssociationStatus:
          $ref: "#/components/schemas/SourceApiAssociationStatus"
          description: The state of the source API association.
        sourceApiAssociationStatusDetail:
          $ref: "#/components/schemas/String"
          description: The detailed message related to the current state of the source API association.
        lastSuccessfulMergeDate:
          $ref: "#/components/schemas/Date"
          description: The datetime value of the last successful merge of the source API association. The result will be in UTC format and your local time zone.
    SourceApiAssociationStatus:
      type: string
      enum:
        - MERGE_SCHEDULED
        - MERGE_FAILED
        - MERGE_SUCCESS
        - MERGE_IN_PROGRESS
        - AUTO_MERGE_SCHEDULE_FAILED
        - DELETION_SCHEDULED
        - DELETION_IN_PROGRESS
        - DELETION_FAILED
    Date:
      type: string
      format: date-time
    AssociateSourceGraphqlApiResponse:
      type: object
      properties:
        sourceApiAssociation:
          $ref: "#/components/schemas/SourceApiAssociation"
          description: The SourceApiAssociation object data.
    ApiName:
      type: string
      minLength: 1
      maxLength: 50
      pattern: "[A-Za-z0-9_\\-\\ ]+"
    TagMap:
      description: A map with keys of TagKey objects and values of TagValue objects.
      type: object
      properties: {}
    EventConfig:
      description: Describes the authorization configuration for connections, message publishing, message subscriptions, and logging for an Event API.
      type: object
      properties:
        authProviders:
          $ref: "#/components/schemas/AuthProviders"
          description: A list of authorization providers.
        connectionAuthModes:
          $ref: "#/components/schemas/AuthModes"
          description: A list of valid authorization modes for the Event API connections.
        defaultPublishAuthModes:
          $ref: "#/components/schemas/AuthModes"
          description: A list of valid authorization modes for the Event API publishing.
        defaultSubscribeAuthModes:
          $ref: "#/components/schemas/AuthModes"
          description: A list of valid authorization modes for the Event API subscriptions.
        logConfig:
          $ref: "#/components/schemas/EventLogConfig"
          description: The CloudWatch Logs configuration for the Event API.
      required:
        - authProviders
        - connectionAuthModes
        - defaultPublishAuthModes
        - defaultSubscribeAuthModes
    AuthProviders:
      type: array
      items:
        $ref: "#/components/schemas/AuthProvider"
    AuthProvider:
      description: Describes an authorization provider.
      type: object
      properties:
        authType:
          $ref: "#/components/schemas/AuthenticationType"
          description: The authorization type.
        cognitoConfig:
          $ref: "#/components/schemas/CognitoConfig"
          description: Describes an Amazon Cognito user pool configuration.
        openIDConnectConfig:
          $ref: "#/components/schemas/OpenIDConnectConfig"
        lambdaAuthorizerConfig:
          $ref: "#/components/schemas/LambdaAuthorizerConfig"
      required:
        - authType
    AuthenticationType:
      type: string
      enum:
        - API_KEY
        - AWS_IAM
        - AMAZON_COGNITO_USER_POOLS
        - OPENID_CONNECT
        - AWS_LAMBDA
    CognitoConfig:
      description: Describes an Amazon Cognito configuration.
      type: object
      properties:
        userPoolId:
          $ref: "#/components/schemas/String"
          description: The user pool ID.
        awsRegion:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services Region in which the user pool was created.
        appIdClientRegex:
          $ref: "#/components/schemas/String"
          description: A regular expression for validating the incoming Amazon Cognito user pool app client ID. If this value isn't set, no filtering is applied.
      required:
        - userPoolId
        - awsRegion
    OpenIDConnectConfig:
      description: Describes an OpenID Connect (OIDC) configuration.
      type: object
      properties:
        issuer:
          $ref: "#/components/schemas/String"
          description: The issuer for the OIDC configuration. The issuer returned by discovery must exactly match the value of iss in the ID token.
        clientId:
          $ref: "#/components/schemas/String"
          description: The client identifier of the relying party at the OpenID identity provider. This identifier is typically obtained when the relying party is registered with the OpenID identity provider. You can specify a regular expression so that AppSync can validate against multiple client identifiers at a time.
        iatTTL:
          $ref: "#/components/schemas/Long"
          description: The number of milliseconds that a token is valid after it's issued to a user.
        authTTL:
          $ref: "#/components/schemas/Long"
          description: The number of milliseconds that a token is valid after being authenticated.
      required:
        - issuer
    Long:
      type: integer
      format: int64
    LambdaAuthorizerConfig:
      description: A LambdaAuthorizerConfig specifies how to authorize AppSync API access when using the AWS_LAMBDA authorizer mode. Be aware that an AppSync API can have only one Lambda authorizer configured at a time.
      type: object
      properties:
        authorizerResultTtlInSeconds:
          $ref: "#/components/schemas/TTL"
          description: The number of seconds a response should be cached for. The default is 0 seconds, which disables caching. If you don't specify a value for authorizerResultTtlInSeconds, the default value is used. The maximum value is one hour (3600 seconds). The Lambda function can override this by returning a ttlOverride key in its response.
        authorizerUri:
          $ref: "#/components/schemas/String"
          description: 'The Amazon Resource Name (ARN) of the Lambda function to be called for authorization. This can be a standard Lambda ARN, a version ARN (.../v3), or an alias ARN. Note: This Lambda function must have the following resource-based policy assigned to it. When configuring Lambda authorizers in the console, this is done for you. To use the Command Line Interface (CLI), run the following: aws lambda add-permission --function-name "arn:aws:lambda:us-east-2:111122223333:function:my-function" --statement-id "appsync" --principal appsync.amazonaws.com --action lambda:InvokeFunction'
        identityValidationExpression:
          $ref: "#/components/schemas/String"
          description: A regular expression for validation of tokens before the Lambda function is called.
      required:
        - authorizerUri
    TTL:
      type: integer
      minimum: 0
      maximum: 3600
    AuthModes:
      type: array
      items:
        $ref: "#/components/schemas/AuthMode"
    AuthMode:
      description: Describes an authorization configuration. Use AuthMode to specify the publishing and subscription authorization configuration for an Event API.
      type: object
      properties:
        authType:
          $ref: "#/components/schemas/AuthenticationType"
          description: The authorization type.
      required:
        - authType
    EventLogConfig:
      description: Describes the CloudWatch Logs configuration for the Event API.
      type: object
      properties:
        logLevel:
          $ref: "#/components/schemas/EventLogLevel"
          description: The type of information to log for the Event API.
        cloudWatchLogsRoleArn:
          $ref: "#/components/schemas/String"
          description: The IAM service role that AppSync assumes to publish CloudWatch Logs in your account.
      required:
        - logLevel
        - cloudWatchLogsRoleArn
    EventLogLevel:
      type: string
      enum:
        - NONE
        - ERROR
        - ALL
        - INFO
        - DEBUG
    CreateApiResponse:
      type: object
      properties:
        api:
          $ref: "#/components/schemas/Api"
          description: The Api object.
    Api:
      description: Describes an AppSync API. You can use Api for an AppSync API with your preferred configuration, such as an Event API that provides real-time message publishing and message subscriptions over WebSockets.
      type: object
      properties:
        apiId:
          $ref: "#/components/schemas/String"
          description: The Api ID.
        name:
          $ref: "#/components/schemas/ApiName"
          description: The name of the Api.
        ownerContact:
          $ref: "#/components/schemas/OwnerContact"
          description: The owner contact information for the Api
        tags:
          type: object
          properties: {}
        dns:
          type: object
          properties: {}
          description: The DNS records for the API. This will include an HTTP and a real-time endpoint.
        apiArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) for the Api.
        created:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the Api was created.
        xrayEnabled:
          $ref: "#/components/schemas/Boolean"
          description: A flag indicating whether to use X-Ray tracing for this Api.
        wafWebAclArn:
          $ref: "#/components/schemas/String"
