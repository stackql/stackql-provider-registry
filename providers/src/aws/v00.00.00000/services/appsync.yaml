        maxBatchSize:
          $ref: "#/components/schemas/MaxBatchSize"
          description: The maximum batching size for a resolver.
        runtime:
          $ref: "#/components/schemas/AppSyncRuntime"
        code:
          $ref: "#/components/schemas/Code"
          description: The function code that contains the request and response functions. When code is used, the runtime is required. The runtime value must be APPSYNC_JS.
    LogConfig:
      description: The Amazon CloudWatch Logs configuration.
      type: object
      properties:
        fieldLogLevel:
          $ref: "#/components/schemas/FieldLogLevel"
          description: "The field logging level. Values can be NONE, ERROR, or ALL. NONE: No field-level logs are captured. ERROR: Logs the following information only for the fields that are in error: The error section in the server response. Field-level errors. The generated request/response functions that got resolved for error fields. ALL: The following information is logged for all fields in the query: Field-level tracing information. The generated request/response functions that got resolved for each field."
