        - FULL_REQUEST_CACHING
        - PER_RESOLVER_CACHING
        - OPERATION_LEVEL_CACHING
    ApiCacheType:
      type: string
      enum:
        - T2_SMALL
        - T2_MEDIUM
        - R4_LARGE
        - R4_XLARGE
        - R4_2XLARGE
        - R4_4XLARGE
        - R4_8XLARGE
        - SMALL
        - MEDIUM
        - LARGE
        - XLARGE
        - LARGE_2X
        - LARGE_4X
        - LARGE_8X
        - LARGE_12X
    CacheHealthMetricsConfig:
      type: string
      enum:
        - ENABLED
        - DISABLED
    CreateApiCacheResponse:
      description: Represents the output of a CreateApiCache operation.
      type: object
      properties:
        apiCache:
          $ref: "#/components/schemas/ApiCache"
          description: The ApiCache object.
    ApiCache:
      description: The ApiCache object.
      type: object
      properties:
        ttl:
          $ref: "#/components/schemas/Long"
          description: TTL in seconds for cache entries. Valid values are 1–3,600 seconds.
        apiCachingBehavior:
          $ref: "#/components/schemas/ApiCachingBehavior"
          description: "Caching behavior. FULL_REQUEST_CACHING: All requests from the same user are cached. Individual resolvers are automatically cached. All API calls will try to return responses from the cache. PER_RESOLVER_CACHING: Individual resolvers that you specify are cached. OPERATION_LEVEL_CACHING: Full requests are cached together and returned without executing resolvers."
        transitEncryptionEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Transit encryption flag when connecting to cache. You cannot update this setting after creation.
        atRestEncryptionEnabled:
          $ref: "#/components/schemas/Boolean"
          description: At-rest encryption flag for cache. You cannot update this setting after creation.
        type_:
          $ref: "#/components/schemas/ApiCacheType"
          description: "The cache instance type. Valid values are SMALL MEDIUM LARGE XLARGE LARGE_2X LARGE_4X LARGE_8X (not available in all regions) LARGE_12X Historically, instance types were identified by an EC2-style value. As of July 2020, this is deprecated, and the generic identifiers above should be used. The following legacy instance types are available, but their use is discouraged: T2_SMALL: A t2.small instance type. T2_MEDIUM: A t2.medium instance type. R4_LARGE: A r4.large instance type. R4_XLARGE: A r4.xlarge instance type. R4_2XLARGE: A r4.2xlarge instance type. R4_4XLARGE: A r4.4xlarge instance type. R4_8XLARGE: A r4.8xlarge instance type."
        status:
          $ref: "#/components/schemas/ApiCacheStatus"
          description: "The cache instance status. AVAILABLE: The instance is available for use. CREATING: The instance is currently creating. DELETING: The instance is currently deleting. MODIFYING: The instance is currently modifying. FAILED: The instance has failed creation."
        healthMetricsConfig:
          $ref: "#/components/schemas/CacheHealthMetricsConfig"
          description: "Controls how cache health metrics will be emitted to CloudWatch. Cache health metrics include: NetworkBandwidthOutAllowanceExceeded: The network packets dropped because the throughput exceeded the aggregated bandwidth limit. This is useful for diagnosing bottlenecks in a cache configuration. EngineCPUUtilization: The CPU utilization (percentage) allocated to the Redis process. This is useful for diagnosing bottlenecks in a cache configuration. Metrics will be recorded by API ID. You can set the value to ENABLED or DISABLED."
    ApiCacheStatus:
      type: string
      enum:
        - AVAILABLE
        - CREATING
        - DELETING
        - MODIFYING
        - FAILED
    CreateApiKeyResponse:
      type: object
      properties:
        apiKey:
          $ref: "#/components/schemas/ApiKey"
          description: The API key.
    ApiKey:
      description: "Describes an API key. Customers invoke AppSync GraphQL API operations with API keys as an identity mechanism. There are two key versions: da1: We introduced this version at launch in November 2017. These keys always expire after 7 days. Amazon DynamoDB TTL manages key expiration. These keys ceased to be valid after February 21, 2018, and they should no longer be used. ListApiKeys returns the expiration time in milliseconds. CreateApiKey returns the expiration time in milliseconds. UpdateApiKey is not available for this key version. DeleteApiKey deletes the item from the table. Expiration is stored in DynamoDB as milliseconds. This results in a bug where keys are not automatically deleted because DynamoDB expects the TTL to be stored in seconds. As a one-time action, we deleted these keys from the table on February 21, 2018. da2: We introduced this version in February 2018 when AppSync added support to extend key expiration. ListApiKeys returns the expiration time and deletion time in seconds. CreateApiKey returns the expiration time and deletion time in seconds and accepts a user-provided expiration time in seconds. UpdateApiKey returns the expiration time and and deletion time in seconds and accepts a user-provided expiration time in seconds. Expired API keys are kept for 60 days after the expiration time. You can update the key expiration time as long as the key isn't deleted. DeleteApiKey deletes the item from the table. Expiration is stored in DynamoDB as seconds. After the expiration time, using the key to authenticate will fail. However, you can reinstate the key before deletion. Deletion is stored in DynamoDB as seconds. The key is deleted after deletion time."
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The API key ID.
        description:
          $ref: "#/components/schemas/String"
          description: A description of the purpose of the API key.
        expires:
          $ref: "#/components/schemas/Long"
          description: The time after which the API key expires. The date is represented as seconds since the epoch, rounded down to the nearest hour.
        deletes:
          $ref: "#/components/schemas/Long"
          description: The time after which the API key is deleted. The date is represented as seconds since the epoch, rounded down to the nearest hour.
    Namespace:
      type: string
      minLength: 1
      maxLength: 50
      pattern: ([A-Za-z0-9](?:[A-Za-z0-9\-]{0,48}[A-Za-z0-9])?)
    Code:
      type: string
      minLength: 1
      maxLength: 32768
