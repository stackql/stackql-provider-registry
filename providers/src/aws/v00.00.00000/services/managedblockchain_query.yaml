openapi: 3.0.0
info:
  version: "2023-05-04"
  title: Amazon Managed Blockchain Query
  description: Amazon Managed Blockchain Query
  x-serviceName: managedblockchain-query
  x-serviceAlias: managedblockchain_query
  x-protocol: rest-json
  x-apiVersion: "2023-05-04"
  x-endpointPrefix: managedblockchain-query
  x-jsonVersion: "1.1"
servers:
  - url: https://managedblockchain-query.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for managedblockchain-query
paths:
  /batch-get-token-balance:
    post:
      operationId: BatchGetTokenBalance
      description: Gets the token balance for a batch of tokens by using the BatchGetTokenBalance action for every token in the request. Only the native tokens BTC and ETH, and the ERC-20, ERC-721, and ERC 1155 token standards are supported.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                getTokenBalanceInputs:
                  $ref: "#/components/schemas/GetTokenBalanceInputList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetTokenBalanceOutput"
  /get-asset-contract:
    post:
      operationId: GetAssetContract
      description: Gets the information about a specific contract deployed on the blockchain. The Bitcoin blockchain networks do not support this operation. Metadata is currently only available for some ERC-20 contracts. Metadata will be available for additional contracts in the future.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contractIdentifier:
                  $ref: "#/components/schemas/ContractIdentifier"
              required:
                - contractIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssetContractOutput"
  /get-token-balance:
    post:
      operationId: GetTokenBalance
      description: Gets the balance of a specific token, including native tokens, for a given address (wallet or contract) on the blockchain. Only the native tokens BTC and ETH, and the ERC-20, ERC-721, and ERC 1155 token standards are supported.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tokenIdentifier:
                  $ref: "#/components/schemas/TokenIdentifier"
                ownerIdentifier:
                  $ref: "#/components/schemas/OwnerIdentifier"
                atBlockchainInstant:
                  $ref: "#/components/schemas/BlockchainInstant"
              required:
                - tokenIdentifier
                - ownerIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTokenBalanceOutput"
  /get-transaction:
    post:
      operationId: GetTransaction
      description: Gets the details of a transaction. This action will return transaction details for all transactions that are confirmed on the blockchain, even if they have not reached finality.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                transactionHash:
                  $ref: "#/components/schemas/QueryTransactionHash"
                transactionId:
                  $ref: "#/components/schemas/QueryTransactionId"
                network:
                  $ref: "#/components/schemas/QueryNetwork"
              required:
                - network
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTransactionOutput"
  /list-asset-contracts:
    post:
      operationId: ListAssetContracts
      description: Lists all the contracts for a given contract type deployed by an address (either a contract address or a wallet address). The Bitcoin blockchain networks do not support this operation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contractFilter:
                  $ref: "#/components/schemas/ContractFilter"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                maxResults:
                  $ref: "#/components/schemas/ListAssetContractsInputMaxResultsInteger"
              required:
                - contractFilter
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssetContractsOutput"
  /list-filtered-transaction-events:
    post:
      operationId: ListFilteredTransactionEvents
      description: Lists all the transaction events for an address on the blockchain. This operation is only supported on the Bitcoin networks.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                network:
                  $ref: "#/components/schemas/String"
                addressIdentifierFilter:
                  $ref: "#/components/schemas/AddressIdentifierFilter"
                timeFilter:
                  $ref: "#/components/schemas/TimeFilter"
                voutFilter:
                  $ref: "#/components/schemas/VoutFilter"
                confirmationStatusFilter:
                  $ref: "#/components/schemas/ConfirmationStatusFilter"
                sort:
                  $ref: "#/components/schemas/ListFilteredTransactionEventsSort"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                maxResults:
                  $ref: "#/components/schemas/ListFilteredTransactionEventsInputMaxResultsInteger"
              required:
                - network
                - addressIdentifierFilter
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFilteredTransactionEventsOutput"
  /list-token-balances:
    post:
      operationId: ListTokenBalances
      description: "This action returns the following for a given blockchain network: Lists all token balances owned by an address (either a contract address or a wallet address). Lists all token balances for all tokens created by a contract. Lists all token balances for a given token. You must always specify the network property of the tokenFilter when using this operation."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ownerFilter:
                  $ref: "#/components/schemas/OwnerFilter"
                tokenFilter:
                  $ref: "#/components/schemas/TokenFilter"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                maxResults:
                  $ref: "#/components/schemas/ListTokenBalancesInputMaxResultsInteger"
              required:
                - tokenFilter
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTokenBalancesOutput"
  /list-transaction-events:
    post:
      operationId: ListTransactionEvents
      description: Lists all the transaction events for a transaction This action will return transaction details for all transactions that are confirmed on the blockchain, even if they have not reached finality.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                transactionHash:
                  $ref: "#/components/schemas/QueryTransactionHash"
                transactionId:
                  $ref: "#/components/schemas/QueryTransactionId"
                network:
                  $ref: "#/components/schemas/QueryNetwork"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                maxResults:
                  $ref: "#/components/schemas/ListTransactionEventsInputMaxResultsInteger"
              required:
                - network
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTransactionEventsOutput"
  /list-transactions:
    post:
      operationId: ListTransactions
      description: Lists all the transaction events for a transaction.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                address:
                  $ref: "#/components/schemas/ChainAddress"
                network:
                  $ref: "#/components/schemas/QueryNetwork"
                fromBlockchainInstant:
                  $ref: "#/components/schemas/BlockchainInstant"
                toBlockchainInstant:
                  $ref: "#/components/schemas/BlockchainInstant"
                sort:
                  $ref: "#/components/schemas/ListTransactionsSort"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                maxResults:
                  $ref: "#/components/schemas/ListTransactionsInputMaxResultsInteger"
                confirmationStatusFilter:
                  $ref: "#/components/schemas/ConfirmationStatusFilter"
              required:
                - address
                - network
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTransactionsOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    GetTokenBalanceInputList:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetTokenBalanceInputItem"
    BatchGetTokenBalanceInputItem:
      description: The container for the input for getting a token balance.
      type: object
      properties:
        tokenIdentifier:
          $ref: "#/components/schemas/TokenIdentifier"
        ownerIdentifier:
          $ref: "#/components/schemas/OwnerIdentifier"
        atBlockchainInstant:
          $ref: "#/components/schemas/BlockchainInstant"
      required:
        - tokenIdentifier
        - ownerIdentifier
    TokenIdentifier:
      description: The container for the identifier for the token including the unique token ID and its blockchain network. Only the native tokens BTC and ETH, and the ERC-20, ERC-721, and ERC 1155 token standards are supported.
      type: object
      properties:
        network:
          $ref: "#/components/schemas/QueryNetwork"
          description: The blockchain network of the token.
        contractAddress:
          $ref: "#/components/schemas/ChainAddress"
          description: This is the token's contract address.
        tokenId:
          $ref: "#/components/schemas/QueryTokenId"
          description: The unique identifier of the token. For native tokens, use the 3 character abbreviation that best matches your token. For example, btc for Bitcoin, eth for Ether, etc. For all other token types you must specify the tokenId in the 64 character hexadecimal tokenid format.
      required:
        - network
    QueryNetwork:
      type: string
      enum:
        - ETHEREUM_MAINNET
        - ETHEREUM_SEPOLIA_TESTNET
        - BITCOIN_MAINNET
        - BITCOIN_TESTNET
    ChainAddress:
      type: string
      pattern: "[-A-Za-z0-9]{13,74}"
    QueryTokenId:
      type: string
      pattern: "[a-zA-Z0-9]{1,66}"
    OwnerIdentifier:
      description: The container for the owner identifier.
      type: object
      properties:
        address:
          $ref: "#/components/schemas/ChainAddress"
          description: The contract or wallet address for the owner.
      required:
        - address
    BlockchainInstant:
      description: The container for time.
      type: object
      properties:
        time:
          $ref: "#/components/schemas/Timestamp"
          description: The container of the Timestamp of the blockchain instant. This timestamp will only be recorded up to the second.
    Timestamp:
      type: string
      format: date-time
    BatchGetTokenBalanceOutput:
      type: object
      properties:
        tokenBalances:
          $ref: "#/components/schemas/BatchGetTokenBalanceOutputList"
          description: An array of BatchGetTokenBalanceOutputItem objects returned by the response.
        errors:
          $ref: "#/components/schemas/BatchGetTokenBalanceErrors"
          description: An array of BatchGetTokenBalanceErrorItem objects returned from the request.
      required:
        - tokenBalances
        - errors
    BatchGetTokenBalanceOutputList:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetTokenBalanceOutputItem"
    BatchGetTokenBalanceOutputItem:
      description: The container for the properties of a token balance output.
      type: object
      properties:
        ownerIdentifier:
          $ref: "#/components/schemas/OwnerIdentifier"
        tokenIdentifier:
          $ref: "#/components/schemas/TokenIdentifier"
        balance:
          $ref: "#/components/schemas/String"
          description: The container for the token balance.
        atBlockchainInstant:
          $ref: "#/components/schemas/BlockchainInstant"
        lastUpdatedTime:
          $ref: "#/components/schemas/BlockchainInstant"
      required:
        - balance
        - atBlockchainInstant
    String:
      type: string
    BatchGetTokenBalanceErrors:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetTokenBalanceErrorItem"
    BatchGetTokenBalanceErrorItem:
      description: Error generated from a failed BatchGetTokenBalance request.
      type: object
      properties:
        tokenIdentifier:
          $ref: "#/components/schemas/TokenIdentifier"
        ownerIdentifier:
          $ref: "#/components/schemas/OwnerIdentifier"
        atBlockchainInstant:
          $ref: "#/components/schemas/BlockchainInstant"
        errorCode:
          $ref: "#/components/schemas/String"
          description: The error code associated with the error.
        errorMessage:
          $ref: "#/components/schemas/String"
          description: The message associated with the error.
        errorType:
          $ref: "#/components/schemas/ErrorType"
          description: The type of error.
      required:
        - errorCode
        - errorMessage
        - errorType
    ErrorType:
      type: string
      enum:
        - VALIDATION_EXCEPTION
        - RESOURCE_NOT_FOUND_EXCEPTION
    ContractIdentifier:
      description: Container for the blockchain address and network information about a contract.
      type: object
      properties:
        network:
          $ref: "#/components/schemas/QueryNetwork"
          description: The blockchain network of the contract.
        contractAddress:
          $ref: "#/components/schemas/ChainAddress"
          description: Container for the blockchain address about a contract.
      required:
        - network
        - contractAddress
    GetAssetContractOutput:
      type: object
      properties:
        contractIdentifier:
          $ref: "#/components/schemas/ContractIdentifier"
          description: Contains the blockchain address and network information about the contract.
        tokenStandard:
          $ref: "#/components/schemas/QueryTokenStandard"
          description: The token standard of the contract requested.
        deployerAddress:
          $ref: "#/components/schemas/ChainAddress"
          description: The address of the deployer of contract.
        metadata:
          $ref: "#/components/schemas/ContractMetadata"
      required:
        - contractIdentifier
        - tokenStandard
        - deployerAddress
    QueryTokenStandard:
      type: string
      enum:
        - ERC20
        - ERC721
        - ERC1155
    ContractMetadata:
      description: The metadata of the contract.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the token contract.
        symbol:
          $ref: "#/components/schemas/String"
          description: The symbol of the token contract.
        decimals:
          $ref: "#/components/schemas/Integer"
          description: The decimals used by the token contract.
    Integer:
      type: integer
    GetTokenBalanceOutput:
      type: object
      properties:
        ownerIdentifier:
          $ref: "#/components/schemas/OwnerIdentifier"
        tokenIdentifier:
          $ref: "#/components/schemas/TokenIdentifier"
        balance:
          $ref: "#/components/schemas/String"
          description: The container for the token balance.
        atBlockchainInstant:
          $ref: "#/components/schemas/BlockchainInstant"
        lastUpdatedTime:
          $ref: "#/components/schemas/BlockchainInstant"
      required:
        - balance
        - atBlockchainInstant
    QueryTransactionHash:
      type: string
      pattern: (0x[A-Fa-f0-9]{64}|[A-Fa-f0-9]{64})
    QueryTransactionId:
      type: string
      pattern: (0x[A-Fa-f0-9]{64}|[A-Fa-f0-9]{64})
    GetTransactionOutput:
      type: object
      properties:
        transaction:
          $ref: "#/components/schemas/Transaction"
          description: Contains the details of the transaction.
      required:
        - transaction
    Transaction:
      description: "There are two possible types of transactions used for this data type: A Bitcoin transaction is a movement of BTC from one address to another. An Ethereum transaction refers to an action initiated by an externally owned account, which is an account managed by a human, not a contract. For example, if Bob sends Alice 1 ETH, Bob's account must be debited and Alice's must be credited. This state-changing action occurs within a transaction."
      type: object
      properties:
        network:
          $ref: "#/components/schemas/QueryNetwork"
          description: The blockchain network where the transaction occurred.
        blockHash:
          $ref: "#/components/schemas/BlockHash"
          description: The block hash is a unique identifier for a block. It is a fixed-size string that is calculated by using the information in the block. The block hash is used to verify the integrity of the data in the block.
        transactionHash:
          $ref: "#/components/schemas/QueryTransactionHash"
          description: The hash of a transaction. It is generated when a transaction is created.
        blockNumber:
          $ref: "#/components/schemas/String"
          description: The block number in which the transaction is recorded.
        transactionTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The Timestamp of the transaction.
        transactionIndex:
          $ref: "#/components/schemas/Long"
          description: The index of the transaction within a blockchain.
        numberOfTransactions:
          $ref: "#/components/schemas/Long"
          description: The number of transactions in the block.
        to:
          $ref: "#/components/schemas/ChainAddress"
          description: The identifier of the transaction. It is generated whenever a transaction is verified and added to the blockchain.
        from:
          $ref: "#/components/schemas/ChainAddress"
          description: The initiator of the transaction. It is either in the form a public key or a contract address.
        contractAddress:
          $ref: "#/components/schemas/ChainAddress"
          description: The blockchain address for the contract.
        gasUsed:
          $ref: "#/components/schemas/String"
          description: The amount of gas used for the transaction.
        cumulativeGasUsed:
          $ref: "#/components/schemas/String"
          description: The amount of gas used up to the specified point in the block.
        effectiveGasPrice:
          $ref: "#/components/schemas/String"
          description: The effective gas price.
        signatureV:
          $ref: "#/components/schemas/Integer"
          description: The signature of the transaction. The Z coordinate of a point V.
        signatureR:
          $ref: "#/components/schemas/String"
          description: The signature of the transaction. The X coordinate of a point R.
        signatureS:
          $ref: "#/components/schemas/String"
          description: The signature of the transaction. The Y coordinate of a point S.
        transactionFee:
          $ref: "#/components/schemas/String"
          description: The transaction fee.
        transactionId:
          $ref: "#/components/schemas/String"
          description: The identifier of a Bitcoin transaction. It is generated when a transaction is created.
        confirmationStatus:
          $ref: "#/components/schemas/ConfirmationStatus"
          description: Specifies whether the transaction has reached Finality.
        executionStatus:
          $ref: "#/components/schemas/ExecutionStatus"
          description: Identifies whether the transaction has succeeded or failed.
      required:
        - network
        - transactionHash
        - transactionTimestamp
        - transactionIndex
        - numberOfTransactions
        - to
    BlockHash:
      type: string
      pattern: (0x[A-Fa-f0-9]{64}|[A-Fa-f0-9]{64})
    Long:
      type: integer
      format: int64
    ConfirmationStatus:
      type: string
      enum:
        - FINAL
        - NONFINAL
    ExecutionStatus:
      type: string
      enum:
        - FAILED
        - SUCCEEDED
    ContractFilter:
      description: The contract or wallet address by which to filter the request.
      type: object
      properties:
        network:
          $ref: "#/components/schemas/QueryNetwork"
          description: The blockchain network of the contract.
        tokenStandard:
          $ref: "#/components/schemas/QueryTokenStandard"
          description: The container for the token standard.
        deployerAddress:
          $ref: "#/components/schemas/ChainAddress"
          description: The network address of the deployer.
      required:
        - network
        - tokenStandard
        - deployerAddress
    NextToken:
      type: string
      minLength: 0
      maxLength: 131070
    ListAssetContractsInputMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 250
    ListAssetContractsOutput:
      type: object
      properties:
        contracts:
          $ref: "#/components/schemas/AssetContractList"
          description: An array of contract objects that contain the properties for each contract.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token that indicates the next set of results to retrieve.
      required:
        - contracts
    AssetContractList:
      type: array
      items:
        $ref: "#/components/schemas/AssetContract"
    AssetContract:
      description: This container contains information about an contract.
      type: object
      properties:
        contractIdentifier:
          $ref: "#/components/schemas/ContractIdentifier"
          description: The container for the contract identifier containing its blockchain network and address.
        tokenStandard:
          $ref: "#/components/schemas/QueryTokenStandard"
          description: The token standard of the contract.
        deployerAddress:
          $ref: "#/components/schemas/ChainAddress"
          description: The address of the contract deployer.
      required:
        - contractIdentifier
        - tokenStandard
        - deployerAddress
    AddressIdentifierFilter:
      description: This is the container for the unique public address on the blockchain.
      type: object
      properties:
        transactionEventToAddress:
          $ref: "#/components/schemas/AddressIdentifierFilterTransactionEventToAddressList"
          description: The container for the recipient address of the transaction.
      required:
        - transactionEventToAddress
    AddressIdentifierFilterTransactionEventToAddressList:
      type: array
      items:
        $ref: "#/components/schemas/ChainAddress"
    TimeFilter:
      description: This container is used to specify a time frame.
      type: object
      properties:
        from:
          $ref: "#/components/schemas/BlockchainInstant"
        to:
          $ref: "#/components/schemas/BlockchainInstant"
    VoutFilter:
      description: This container specifies filtering attributes related to BITCOIN_VOUT event types
      type: object
      properties:
        voutSpent:
          $ref: "#/components/schemas/Boolean"
          description: Specifies if the transaction output is spent or unspent.
      required:
        - voutSpent
    Boolean:
      type: boolean
    ConfirmationStatusFilter:
      description: The container for the ConfirmationStatusFilter that filters for the finality of the results.
      type: object
      properties:
        include:
          $ref: "#/components/schemas/ConfirmationStatusIncludeList"
          description: The container to determine whether to list results that have only reached finality . Transactions that have reached finality are always part of the response.
      required:
        - include
    ConfirmationStatusIncludeList:
      type: array
      items:
        $ref: "#/components/schemas/ConfirmationStatus"
    ListFilteredTransactionEventsSort:
      description: Lists all the transaction events for an address on the blockchain. This operation is only supported on the Bitcoin blockchain networks.
      type: object
      properties:
        sortBy:
          $ref: "#/components/schemas/ListFilteredTransactionEventsSortBy"
          description: Container on how the results will be sorted by?
        sortOrder:
          $ref: "#/components/schemas/SortOrder"
          description: The container for the sort order for ListFilteredTransactionEvents. The SortOrder field only accepts the values ASCENDING and DESCENDING. Not providing SortOrder will default to ASCENDING.
    ListFilteredTransactionEventsSortBy:
      type: string
      enum:
        - blockchainInstant
    SortOrder:
      type: string
      enum:
        - ASCENDING
        - DESCENDING
    ListFilteredTransactionEventsInputMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 250
    ListFilteredTransactionEventsOutput:
      type: object
      properties:
        events:
          $ref: "#/components/schemas/TransactionEventList"
          description: The transaction events returned by the request.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token that indicates the next set of results to retrieve.
      required:
        - events
    TransactionEventList:
      type: array
      items:
        $ref: "#/components/schemas/TransactionEvent"
    TransactionEvent:
      description: The container for the properties of a transaction event.
      type: object
      properties:
        network:
          $ref: "#/components/schemas/QueryNetwork"
          description: The blockchain network where the transaction occurred.
        transactionHash:
          $ref: "#/components/schemas/QueryTransactionHash"
          description: The hash of a transaction. It is generated when a transaction is created.
        eventType:
          $ref: "#/components/schemas/QueryTransactionEventType"
          description: The type of transaction event.
        from:
          $ref: "#/components/schemas/ChainAddress"
          description: The wallet address initiating the transaction. It can either be a public key or a contract.
        to:
          $ref: "#/components/schemas/ChainAddress"
          description: The wallet address receiving the transaction. It can either be a public key or a contract.
        value:
          $ref: "#/components/schemas/String"
          description: The value that was transacted.
        contractAddress:
          $ref: "#/components/schemas/ChainAddress"
          description: The blockchain address for the contract
        tokenId:
          $ref: "#/components/schemas/QueryTokenId"
          description: The unique identifier for the token involved in the transaction.
        transactionId:
          $ref: "#/components/schemas/String"
          description: The identifier of a Bitcoin transaction. It is generated when a transaction is created.
        voutIndex:
          $ref: "#/components/schemas/Integer"
          description: The position of the transaction output in the transaction output list.
        voutSpent:
          $ref: "#/components/schemas/Boolean"
          description: Specifies if the transaction output is spent or unspent. This is only returned for BITCOIN_VOUT event types. This is only returned for BITCOIN_VOUT event types.
        spentVoutTransactionId:
          $ref: "#/components/schemas/String"
          description: The transactionId that created the spent transaction output. This is only returned for BITCOIN_VIN event types.
        spentVoutTransactionHash:
          $ref: "#/components/schemas/String"
          description: The transactionHash that created the spent transaction output. This is only returned for BITCOIN_VIN event types.
        spentVoutIndex:
          $ref: "#/components/schemas/Integer"
          description: The position of the spent transaction output in the output list of the creating transaction. This is only returned for BITCOIN_VIN event types.
        blockchainInstant:
          $ref: "#/components/schemas/BlockchainInstant"
        confirmationStatus:
          $ref: "#/components/schemas/ConfirmationStatus"
          description: This container specifies whether the transaction has reached Finality.
      required:
        - network
        - transactionHash
        - eventType
    QueryTransactionEventType:
      type: string
      enum:
        - ERC20_TRANSFER
        - ERC20_MINT
        - ERC20_BURN
        - ERC20_DEPOSIT
        - ERC20_WITHDRAWAL
        - ERC721_TRANSFER
        - ERC1155_TRANSFER
        - BITCOIN_VIN
        - BITCOIN_VOUT
        - INTERNAL_ETH_TRANSFER
        - ETH_TRANSFER
    OwnerFilter:
      description: The container for the owner information to filter by.
      type: object
      properties:
        address:
          $ref: "#/components/schemas/ChainAddress"
          description: The contract or wallet address.
      required:
        - address
    TokenFilter:
      description: The container of the token filter like the contract address on a given blockchain network or a unique token identifier on a given blockchain network. You must always specify the network property of this container when using this operation.
      type: object
      properties:
        network:
          $ref: "#/components/schemas/QueryNetwork"
          description: The blockchain network of the token.
        contractAddress:
          $ref: "#/components/schemas/ChainAddress"
          description: This is the address of the contract.
        tokenId:
          $ref: "#/components/schemas/QueryTokenId"
          description: The unique identifier of the token.
      required:
        - network
    ListTokenBalancesInputMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 250
    ListTokenBalancesOutput:
      type: object
      properties:
        tokenBalances:
          $ref: "#/components/schemas/TokenBalanceList"
          description: An array of TokenBalance objects. Each object contains details about the token balance.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token that indicates the next set of results to retrieve.
      required:
        - tokenBalances
    TokenBalanceList:
      type: array
      items:
        $ref: "#/components/schemas/TokenBalance"
    TokenBalance:
      description: The balance of the token.
      type: object
      properties:
        ownerIdentifier:
          $ref: "#/components/schemas/OwnerIdentifier"
          description: The container for the identifier of the owner.
        tokenIdentifier:
          $ref: "#/components/schemas/TokenIdentifier"
          description: The identifier for the token, including the unique token ID and its blockchain network.
        balance:
          $ref: "#/components/schemas/String"
          description: The container of the token balance.
        atBlockchainInstant:
          $ref: "#/components/schemas/BlockchainInstant"
          description: The time for when the TokenBalance is requested or the current time if a time is not provided in the request. This time will only be recorded up to the second.
        lastUpdatedTime:
          $ref: "#/components/schemas/BlockchainInstant"
          description: The Timestamp of the last transaction at which the balance for the token in the wallet was updated.
      required:
        - balance
        - atBlockchainInstant
    ListTransactionEventsInputMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 250
    ListTransactionEventsOutput:
      type: object
      properties:
        events:
          $ref: "#/components/schemas/TransactionEventList"
          description: An array of TransactionEvent objects. Each object contains details about the transaction events.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token that indicates the next set of results to retrieve.
      required:
        - events
    ListTransactionsSort:
      description: The container for determining how the list transaction result will be sorted.
      type: object
      properties:
        sortBy:
          $ref: "#/components/schemas/ListTransactionsSortBy"
          description: Defaults to the value TRANSACTION_TIMESTAMP.
        sortOrder:
          $ref: "#/components/schemas/SortOrder"
          description: The container for the sort order for ListTransactions. The SortOrder field only accepts the values ASCENDING and DESCENDING. Not providing SortOrder will default to ASCENDING.
    ListTransactionsSortBy:
      type: string
      enum:
        - TRANSACTION_TIMESTAMP
    ListTransactionsInputMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 250
    ListTransactionsOutput:
      type: object
      properties:
        transactions:
          $ref: "#/components/schemas/TransactionOutputList"
          description: The array of transactions returned by the request.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token that indicates the next set of results to retrieve.
      required:
        - transactions
    TransactionOutputList:
      type: array
      items:
        $ref: "#/components/schemas/TransactionOutputItem"
    TransactionOutputItem:
      description: The container of the transaction output.
      type: object
      properties:
        transactionHash:
          $ref: "#/components/schemas/QueryTransactionHash"
          description: The hash of a transaction. It is generated when a transaction is created.
        transactionId:
          $ref: "#/components/schemas/QueryTransactionId"
          description: The identifier of a Bitcoin transaction. It is generated when a transaction is created.
        network:
          $ref: "#/components/schemas/QueryNetwork"
          description: The blockchain network where the transaction occurred.
        transactionTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the transaction occurred.
        confirmationStatus:
          $ref: "#/components/schemas/ConfirmationStatus"
          description: Specifies whether to list transactions that have not reached Finality.
      required:
        - transactionHash
        - network
        - transactionTimestamp
