openapi: 3.0.0
info:
  version: "2025-08-18"
  title: AWS Billing and Cost Management Dashboards
  description: AWS Billing and Cost Management Dashboards
  x-serviceName: bcm-dashboards
  x-serviceAlias: bcm_dashboards
  x-protocol: json
  x-apiVersion: "2025-08-18"
  x-endpointPrefix: bcm-dashboards
  x-targetPrefix: AWSBCMDashboardsService
  x-jsonVersion: "1.0"
servers:
  - url: https://bcm-dashboards.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for bcm-dashboards
paths:
  /CreateDashboard:
    post:
      operationId: CreateDashboard
      description: Creates a new dashboard that can contain multiple widgets displaying cost and usage data. You can add custom widgets or use predefined widgets, arranging them in your preferred layout.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMDashboardsService.CreateDashboard
            default: AWSBCMDashboardsService.CreateDashboard
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/DashboardName"
                  description: The name of the dashboard. The name must be unique within your account.
                description:
                  $ref: "#/components/schemas/Description"
                  description: A description of the dashboard's purpose or contents.
                widgets:
                  $ref: "#/components/schemas/WidgetList"
                  description: An array of widget configurations that define the visualizations to be displayed in the dashboard. Each dashboard can contain up to 20 widgets.
                resourceTags:
                  $ref: "#/components/schemas/ResourceTagList"
                  description: The tags to apply to the dashboard resource for organization and management.
              required:
                - name
                - widgets
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDashboardResponse"
  /CreateScheduledReport:
    post:
      operationId: CreateScheduledReport
      description: Creates a new scheduled report for a dashboard. A scheduled report automatically generates and delivers dashboard snapshots on a recurring schedule. Reports are delivered within 15 minutes of the scheduled delivery time.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMDashboardsService.CreateScheduledReport
            default: AWSBCMDashboardsService.CreateScheduledReport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                scheduledReport:
                  $ref: "#/components/schemas/ScheduledReportInput"
                  description: The configuration for the scheduled report, including the dashboard to report on, the schedule, and the execution role that the service will use to generate the dashboard snapshot.
                resourceTags:
                  $ref: "#/components/schemas/ResourceTagList"
                  description: The tags to apply to the scheduled report resource for organization and management.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
              required:
                - scheduledReport
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateScheduledReportResponse"
  /DeleteDashboard:
    post:
      operationId: DeleteDashboard
      description: Deletes a specified dashboard. This action cannot be undone.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMDashboardsService.DeleteDashboard
            default: AWSBCMDashboardsService.DeleteDashboard
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/DashboardArn"
                  description: The ARN of the dashboard to be deleted.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDashboardResponse"
  /DeleteScheduledReport:
    post:
      operationId: DeleteScheduledReport
      description: Deletes a specified scheduled report. This is an irreversible operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMDashboardsService.DeleteScheduledReport
            default: AWSBCMDashboardsService.DeleteScheduledReport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/ScheduledReportArn"
                  description: The ARN of the scheduled report to delete.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteScheduledReportResponse"
  /ExecuteScheduledReport:
    post:
      operationId: ExecuteScheduledReport
      description: Triggers an immediate execution of a scheduled report, outside of its regular schedule. The scheduled report must be in ENABLED state. Calling this operation on a DISABLED scheduled report returns a ValidationException. If a clientToken is provided, the service uses it for idempotency. Requests with the same client token will not trigger a new execution within the same minute.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMDashboardsService.ExecuteScheduledReport
            default: AWSBCMDashboardsService.ExecuteScheduledReport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/ScheduledReportArn"
                  description: The ARN of the scheduled report to execute.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                dryRun:
                  $ref: "#/components/schemas/Boolean"
                  description: When set to true, validates the scheduled report configuration without triggering an actual execution.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteScheduledReportResponse"
  /GetDashboard:
    post:
      operationId: GetDashboard
      description: Retrieves the configuration and metadata of a specified dashboard, including its widgets and layout settings.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMDashboardsService.GetDashboard
            default: AWSBCMDashboardsService.GetDashboard
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/DashboardArn"
                  description: The ARN of the dashboard to retrieve. This is required to uniquely identify the dashboard.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDashboardResponse"
  /GetResourcePolicy:
    post:
      operationId: GetResourcePolicy
      description: Retrieves the resource-based policy attached to a dashboard, showing sharing configurations and permissions.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMDashboardsService.GetResourcePolicy
            default: AWSBCMDashboardsService.GetResourcePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/DashboardArn"
                  description: The ARN of the dashboard whose resource-based policy you want to retrieve.
              required:
                - resourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourcePolicyResponse"
  /GetScheduledReport:
    post:
      operationId: GetScheduledReport
      description: Retrieves the configuration and metadata of a specified scheduled report.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMDashboardsService.GetScheduledReport
            default: AWSBCMDashboardsService.GetScheduledReport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/ScheduledReportArn"
                  description: The ARN of the scheduled report to retrieve.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetScheduledReportResponse"
  /ListDashboards:
    post:
      operationId: ListDashboards
      description: Returns a list of all dashboards in your account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMDashboardsService.ListDashboards
            default: AWSBCMDashboardsService.ListDashboards
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return in a single call. The default value is 20.
                nextToken:
                  $ref: "#/components/schemas/NextPageToken"
                  description: The token for the next page of results. Use the value returned in the previous response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDashboardsResponse"
  /ListScheduledReports:
    post:
      operationId: ListScheduledReports
      description: Returns a list of scheduled reports in your account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMDashboardsService.ListScheduledReports
            default: AWSBCMDashboardsService.ListScheduledReports
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/NextPageToken"
                  description: The token for the next page of results. Use the value returned in the previous response.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return in a single call. Valid range is 1 to 100. The default value is 50.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListScheduledReportsResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Returns a list of all tags associated with a specified dashboard resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMDashboardsService.ListTagsForResource
            default: AWSBCMDashboardsService.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The unique identifier for the resource.
              required:
                - resourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds or updates tags for a specified dashboard resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMDashboardsService.TagResource
            default: AWSBCMDashboardsService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The unique identifier for the resource.
                resourceTags:
                  $ref: "#/components/schemas/ResourceTagList"
                  description: The tags to add to the dashboard resource.
              required:
                - resourceArn
                - resourceTags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes specified tags from a dashboard resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMDashboardsService.UntagResource
            default: AWSBCMDashboardsService.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The unique identifier for the resource.
                resourceTagKeys:
                  $ref: "#/components/schemas/ResourceTagKeyList"
                  description: The keys of the tags to remove from the dashboard resource.
              required:
                - resourceArn
                - resourceTagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateDashboard:
    post:
      operationId: UpdateDashboard
      description: Updates an existing dashboard's properties, including its name, description, and widget configurations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMDashboardsService.UpdateDashboard
            default: AWSBCMDashboardsService.UpdateDashboard
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/DashboardArn"
                  description: The ARN of the dashboard to update.
                name:
                  $ref: "#/components/schemas/DashboardName"
                  description: The new name for the dashboard.
                description:
                  $ref: "#/components/schemas/Description"
                  description: The new description for the dashboard.
                widgets:
                  $ref: "#/components/schemas/WidgetList"
                  description: The updated array of widget configurations for the dashboard. Replaces all existing widgets.
              required:
                - arn
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDashboardResponse"
  /UpdateScheduledReport:
    post:
      operationId: UpdateScheduledReport
      description: Updates an existing scheduled report's properties, including its name, description, schedule configuration, and widget settings. Only the parameters included in the request are updated; all other properties remain unchanged.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBCMDashboardsService.UpdateScheduledReport
            default: AWSBCMDashboardsService.UpdateScheduledReport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/ScheduledReportArn"
                  description: The ARN of the scheduled report to update.
                name:
                  $ref: "#/components/schemas/ScheduledReportName"
                  description: The new name for the scheduled report.
                description:
                  $ref: "#/components/schemas/Description"
                  description: The new description for the scheduled report.
                dashboardArn:
                  $ref: "#/components/schemas/DashboardArn"
                  description: The ARN of the dashboard to associate with the scheduled report.
                scheduledReportExecutionRoleArn:
                  $ref: "#/components/schemas/ServiceRoleArn"
                  description: The ARN of the IAM role that the scheduled report uses to execute. Amazon Web Services Billing and Cost Management Dashboards will assume this IAM role while executing the scheduled report.
                scheduleConfig:
                  $ref: "#/components/schemas/ScheduleConfig"
                  description: The updated schedule configuration for the report.
                widgetIds:
                  $ref: "#/components/schemas/WidgetIdList"
                  description: The list of widget identifiers to include in the scheduled report. If not specified, all widgets in the dashboard are included.
                widgetDateRangeOverride:
                  $ref: "#/components/schemas/DateTimeRange"
                  description: The date range override to apply to widgets in the scheduled report.
                clearWidgetIds:
                  $ref: "#/components/schemas/Boolean"
                  description: Set to true to clear existing widgetIds.
                clearWidgetDateRangeOverride:
                  $ref: "#/components/schemas/Boolean"
                  description: Set to true to clear existing widgetDateRangeOverride.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateScheduledReportResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DashboardName:
      type: string
      minLength: 2
      maxLength: 50
      pattern: (?!.* {2})[a-zA-Z][a-zA-Z0-9 _-]{0,48}[a-zA-Z0-9_-]
    Description:
      type: string
      minLength: 1
      maxLength: 200
      pattern: (?!.* {2})[ a-zA-Z0-9.,!?;:@#$%&\-_/\\]*
    WidgetList:
      type: array
      items:
        $ref: "#/components/schemas/Widget"
    Widget:
      description: A configurable visualization component within a dashboard that displays specific cost and usage metrics. Each widget can show data as charts or tables and includes settings for data querying, filtering, and visual presentation.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/WidgetId"
          description: The unique identifier for the widget.
        title_:
          $ref: "#/components/schemas/WidgetTitle"
          description: The title of the widget.
        description:
          $ref: "#/components/schemas/Description"
          description: A description of the widget's purpose or the data it displays.
        width:
          $ref: "#/components/schemas/WidgetWidth"
          description: The width of the widget in column spans. The dashboard layout consists of a grid system.
        height:
          $ref: "#/components/schemas/WidgetHeight"
          description: The height of the widget in row spans. The dashboard layout consists of a grid system.
        horizontalOffset:
          $ref: "#/components/schemas/Integer"
          description: Specifies the starting column position of the widget in the dashboard's grid layout. Used to control widget placement.
        configs:
          $ref: "#/components/schemas/WidgetConfigList"
          description: An array of configurations that define the data queries and display settings for the widget.
      required:
        - title_
        - configs
    WidgetId:
      type: string
      minLength: 32
      maxLength: 32
      pattern: "[0-9a-f]{32}"
    WidgetTitle:
      type: string
      minLength: 2
      maxLength: 50
      pattern: (?!.* {2})[a-zA-Z0-9_-][ a-zA-Z0-9_-]*[a-zA-Z0-9_-]
    WidgetWidth:
      type: integer
      minimum: 2
      maximum: 6
    WidgetHeight:
      type: integer
      minimum: 4
      maximum: 10
    Integer:
      type: integer
    WidgetConfigList:
      type: array
      items:
        $ref: "#/components/schemas/WidgetConfig"
    WidgetConfig:
      description: Defines the complete configuration for a widget, including data retrieval settings and visualization preferences.
      type: object
      properties:
        queryParameters:
          $ref: "#/components/schemas/QueryParameters"
          description: The parameters that define what data the widget should retrieve and how it should be filtered or grouped.
        displayConfig:
          $ref: "#/components/schemas/DisplayConfig"
          description: The configuration that determines how the retrieved data should be visualized in the widget.
      required:
        - queryParameters
        - displayConfig
    QueryParameters:
      description: Defines the data retrieval parameters for a widget.
      type: object
      properties:
        costAndUsage:
          $ref: "#/components/schemas/CostAndUsageQuery"
          description: The parameters for querying cost and usage data, including metrics, time range, granularity, grouping dimensions, and filters.
        savingsPlansCoverage:
          $ref: "#/components/schemas/SavingsPlansCoverageQuery"
          description: The parameters for querying Savings Plans coverage data, showing how much of your eligible compute usage is covered by Savings Plans.
        savingsPlansUtilization:
          $ref: "#/components/schemas/SavingsPlansUtilizationQuery"
          description: The parameters for querying Savings Plans utilization data, showing how effectively your Savings Plans are being used.
        reservationCoverage:
          $ref: "#/components/schemas/ReservationCoverageQuery"
          description: The parameters for querying Reserved Instance coverage data, showing how much of your eligible instance usage is covered by Reserved Instances.
        reservationUtilization:
          $ref: "#/components/schemas/ReservationUtilizationQuery"
          description: The parameters for querying Reserved Instance utilization data, showing how effectively your Reserved Instances are being used.
    CostAndUsageQuery:
      description: Defines the parameters for retrieving Amazon Web Services cost and usage data. Includes specifications for metrics, time periods, granularity, grouping dimensions, and filtering conditions.
      type: object
      properties:
        metrics:
          $ref: "#/components/schemas/MetricNames"
          description: The specific cost and usage metrics to retrieve. Valid values for CostAndUsageQuery metrics are AmortizedCost, BlendedCost, NetAmortizedCost, NetUnblendedCost, NormalizedUsageAmount, UnblendedCost, and UsageQuantity.
        timeRange:
          $ref: "#/components/schemas/DateTimeRange"
          description: The time period for which to retrieve data. Can be specified as absolute dates or relative time periods.
        granularity:
          $ref: "#/components/schemas/Granularity"
          description: "The granularity of the retrieved data: HOURLY, DAILY, or MONTHLY."
        groupBy:
          $ref: "#/components/schemas/GroupDefinitions"
          description: Specifies how to group the retrieved data, such as by SERVICE, ACCOUNT, or TAG.
        filter:
          $ref: "#/components/schemas/Expression"
          description: The filter expression to be applied to the cost and usage data.
      required:
        - metrics
        - timeRange
        - granularity
    MetricNames:
      type: array
      items:
        $ref: "#/components/schemas/MetricName"
    MetricName:
      type: string
      enum:
        - AmortizedCost
        - BlendedCost
        - NetAmortizedCost
        - NetUnblendedCost
        - NormalizedUsageAmount
        - UnblendedCost
        - UsageQuantity
        - SpendCoveredBySavingsPlans
        - Hour
        - Unit
        - Cost
    DateTimeRange:
      description: Defines a time period with explicit start and end times for data queries.
      type: object
      properties:
        startTime:
          $ref: "#/components/schemas/DateTimeValue"
          description: The start time of the date range for querying data.
        endTime:
          $ref: "#/components/schemas/DateTimeValue"
          description: The end time of the date range for querying data.
      required:
        - startTime
        - endTime
    DateTimeValue:
      description: Represents a point in time that can be specified as either an absolute date (for example, "2025-07-01") or a relative time period using ISO 8601 duration format (for example, "-P3M" for three months ago).
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/DateTimeType"
          description: "The type of date/time value: ABSOLUTE for specific dates or RELATIVE for dynamic time periods."
        value:
          $ref: "#/components/schemas/GenericString"
          description: The actual date/time value.
      required:
        - type_
        - value
    DateTimeType:
      type: string
      enum:
        - ABSOLUTE
        - RELATIVE
    GenericString:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[\\S\\s]*"
    Granularity:
      type: string
      enum:
        - HOURLY
        - DAILY
        - MONTHLY
    GroupDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/GroupDefinition"
    GroupDefinition:
      description: Specifies how to group cost and usage data.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/GroupDefinitionKeyString"
          description: The key to use for grouping cost and usage data.
        type_:
          $ref: "#/components/schemas/GroupDefinitionType"
          description: The type of grouping to apply.
      required:
        - key
    GroupDefinitionKeyString:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[\\S\\s]*"
    GroupDefinitionType:
      type: string
      enum:
        - DIMENSION
        - TAG
        - COST_CATEGORY
    Expression:
      description: Defines complex filtering conditions using logical operators (AND, OR, NOT) and various filter types.
      type: object
      properties:
        or:
          $ref: "#/components/schemas/Expressions"
          description: A list of expressions to combine with OR logic.
        and:
          $ref: "#/components/schemas/Expressions"
