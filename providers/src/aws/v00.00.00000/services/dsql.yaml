openapi: 3.0.0
info:
  version: "2018-05-10"
  title: Amazon Aurora DSQL
  description: Amazon Aurora DSQL
  x-serviceName: dsql
  x-serviceAlias: dsql
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: dsql
servers:
  - url: https://dsql.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for dsql
paths:
  /cluster:
    post:
      operationId: CreateCluster
      description: "The CreateCluster API allows you to create both single-Region clusters and multi-Region clusters. With the addition of the multiRegionProperties parameter, you can create a cluster with witness Region support and establish peer relationships with clusters in other Regions during creation. Creating multi-Region clusters requires additional IAM permissions beyond those needed for single-Region clusters, as detailed in the Required permissions section below. Required permissions dsql:CreateCluster Required to create a cluster. Resources: arn:aws:dsql:region:account-id:cluster/* dsql:TagResource Permission to add tags to a resource. Resources: arn:aws:dsql:region:account-id:cluster/* dsql:PutMultiRegionProperties Permission to configure multi-Region properties for a cluster. Resources: arn:aws:dsql:region:account-id:cluster/* dsql:AddPeerCluster When specifying multiRegionProperties.clusters, permission to add peer clusters. Resources: Local cluster: arn:aws:dsql:region:account-id:cluster/* Each peer cluster: exact ARN of each specified peer cluster dsql:PutWitnessRegion When specifying multiRegionProperties.witnessRegion, permission to set a witness Region. This permission is checked both in the cluster Region and in the witness Region. Resources: arn:aws:dsql:region:account-id:cluster/* Condition Keys: dsql:WitnessRegion (matching the specified witness region) The witness Region specified in multiRegionProperties.witnessRegion cannot be the same as the cluster's Region."
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                deletionProtectionEnabled:
                  $ref: "#/components/schemas/DeletionProtectionEnabled"
                kmsEncryptionKey:
                  $ref: "#/components/schemas/KmsEncryptionKey"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                multiRegionProperties:
                  $ref: "#/components/schemas/MultiRegionProperties"
                policy:
                  $ref: "#/components/schemas/PolicyDocument"
                bypassPolicyLockoutSafetyCheck:
                  $ref: "#/components/schemas/BypassPolicyLockoutSafetyCheck"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClusterOutput"
    get:
      operationId: ListClusters
      description: Retrieves information about a list of clusters.
      parameters:
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: An optional parameter that specifies the maximum number of results to return. You can use nextToken to display the next page of results.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If your initial ListClusters operation returns a nextToken, you can include the returned nextToken in following ListClusters operations, which returns results in the next page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListClustersOutput"
  /stream/{cluster_identifier}:
    post:
      operationId: CreateStream
      description: "Creates a new change data capture (CDC) stream for a cluster. The stream captures database changes and delivers them to the specified target destination. Required permissions dsql:CreateStream Permission to create a new stream. Resources: arn:aws:dsql:region:account-id:cluster/cluster-id iam:PassRole Permission to pass the IAM role specified in the target definition to the service. Resources: ARN of the IAM role specified in targetDefinition.kinesis.roleArn kms:Decrypt Required when the cluster uses a customer managed KMS key (CMK). Permission to decrypt data using the cluster's CMK. Resources: ARN of the KMS key used by the cluster"
      parameters:
        - name: cluster_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ClusterId"
          description: The ID of the cluster for which to create the stream.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetDefinition:
                  $ref: "#/components/schemas/TargetDefinition"
                ordering:
                  $ref: "#/components/schemas/StreamOrdering"
                format:
                  $ref: "#/components/schemas/StreamFormat"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - targetDefinition
                - ordering
                - format
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateStreamOutput"
    get:
      operationId: ListStreams
      description: Retrieves information about a list of streams for a cluster.
      parameters:
        - name: cluster_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ClusterId"
          description: The ID of the cluster for which to list streams.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: "An optional parameter that specifies the maximum number of results to return. You can use nextToken to display the next page of results. Default: 10."
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If your initial ListStreams operation returns a nextToken, you can include the returned nextToken in following ListStreams operations, which returns results in the next page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStreamsOutput"
  /cluster/{identifier}:
    delete:
      operationId: DeleteCluster
      description: Deletes a cluster in Amazon Aurora DSQL.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ClusterId"
          description: The ID of the cluster to delete.
        - name: client-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. Idempotency ensures that an API request completes only once. With an idempotent request, if the original request completes successfully. The subsequent retries with the same client token return the result from the original successful request and they have no additional effect. If you don't specify a client token, the Amazon Web Services SDK automatically generates one.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteClusterOutput"
    get:
      operationId: GetCluster
      description: Retrieves information about a cluster.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ClusterId"
          description: The ID of the cluster to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetClusterOutput"
    post:
      operationId: UpdateCluster
      description: "The UpdateCluster API allows you to modify both single-Region and multi-Region cluster configurations. With the multiRegionProperties parameter, you can add or modify witness Region support and manage peer relationships with clusters in other Regions. Note that updating multi-Region clusters requires additional IAM permissions beyond those needed for standard cluster updates, as detailed in the Permissions section. Required permissions dsql:UpdateCluster Permission to update a DSQL cluster. Resources: arn:aws:dsql:region:account-id:cluster/cluster-id dsql:PutMultiRegionProperties Permission to configure multi-Region properties for a cluster. Resources: arn:aws:dsql:region:account-id:cluster/cluster-id dsql:GetCluster Permission to retrieve cluster information. Resources: arn:aws:dsql:region:account-id:cluster/cluster-id dsql:AddPeerCluster Permission to add peer clusters. Resources: Local cluster: arn:aws:dsql:region:account-id:cluster/cluster-id Each peer cluster: exact ARN of each specified peer cluster dsql:RemovePeerCluster Permission to remove peer clusters. The dsql:RemovePeerCluster permission uses a wildcard ARN pattern to simplify permission management during updates. Resources: arn:aws:dsql:*:account-id:cluster/* dsql:PutWitnessRegion Permission to set a witness Region. Resources: arn:aws:dsql:region:account-id:cluster/cluster-id Condition Keys: dsql:WitnessRegion (matching the specified witness Region) This permission is checked both in the cluster Region and in the witness Region. The witness region specified in multiRegionProperties.witnessRegion cannot be the same as the cluster's Region. When updating clusters with peer relationships, permissions are checked for both adding and removing peers. The dsql:RemovePeerCluster permission uses a wildcard ARN pattern to simplify permission management during updates."
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ClusterId"
          description: The ID of the cluster you want to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                deletionProtectionEnabled:
                  $ref: "#/components/schemas/DeletionProtectionEnabled"
                kmsEncryptionKey:
                  $ref: "#/components/schemas/KmsEncryptionKey"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                multiRegionProperties:
                  $ref: "#/components/schemas/MultiRegionProperties"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateClusterOutput"
  /cluster/{identifier}/policy:
    delete:
      operationId: DeleteClusterPolicy
      description: Deletes the resource-based policy attached to a cluster. This removes all access permissions defined by the policy, reverting to default access controls.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ClusterId"
        - name: expected-policy-version
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PolicyVersion"
          description: The expected version of the policy to delete. This parameter ensures that you're deleting the correct version of the policy and helps prevent accidental deletions.
        - name: client-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteClusterPolicyOutput"
    get:
      operationId: GetClusterPolicy
      description: Retrieves the resource-based policy document attached to a cluster. This policy defines the access permissions and conditions for the cluster.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ClusterId"
          description: The ID of the cluster to retrieve the policy from.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetClusterPolicyOutput"
    post:
      operationId: PutClusterPolicy
      description: Attaches a resource-based policy to a cluster. This policy defines access permissions and conditions for the cluster, allowing you to control which principals can perform actions on the cluster.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ClusterId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policy:
                  $ref: "#/components/schemas/PolicyDocument"
                bypassPolicyLockoutSafetyCheck:
                  $ref: "#/components/schemas/BypassPolicyLockoutSafetyCheck"
                expectedPolicyVersion:
                  $ref: "#/components/schemas/PolicyVersion"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - policy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutClusterPolicyOutput"
  /stream/{cluster_identifier}/{stream_identifier}:
    delete:
      operationId: DeleteStream
      description: Deletes a stream from a cluster.
      parameters:
        - name: cluster_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ClusterId"
          description: The ID of the cluster containing the stream to delete.
        - name: stream_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/StreamId"
          description: The ID of the stream to delete.
        - name: client-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. Idempotency ensures that an API request completes only once. With an idempotent request, if the original request completes successfully, the subsequent retries with the same client token return the result from the original successful request and they have no additional effect. If you don't specify a client token, the Amazon Web Services SDK automatically generates one.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteStreamOutput"
    get:
      operationId: GetStream
      description: Retrieves information about a stream.
      parameters:
        - name: cluster_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ClusterId"
          description: The ID of the cluster containing the stream to retrieve.
        - name: stream_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/StreamId"
          description: The ID of the stream to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetStreamOutput"
  /clusters/{identifier}/vpc-endpoint-service-name:
    get:
      operationId: GetVpcEndpointServiceName
      description: Retrieves the VPC endpoint service name.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ClusterId"
          description: The ID of the cluster to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetVpcEndpointServiceNameOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists all of the tags for a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the resource for which you want to list the tags.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
    post:
      operationId: TagResource
      description: Tags a resource with a map of key and value pairs.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the resource that you want to tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
    delete:
      operationId: UntagResource
      description: Removes a tag from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the resource from which to remove tags.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The array of keys of the tags that you want to remove.
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DeletionProtectionEnabled:
      description: Indicates whether deletion protection is enabled for a cluster.
      type: boolean
    KmsEncryptionKey:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[a-zA-Z0-9:/_-]+"
    TagMap:
      description: Map of tags.
      type: object
      properties: {}
    ClientToken:
      description: Idempotency token so a request is only processed once.
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[!-~]+"
    MultiRegionProperties:
      description: Defines the structure for multi-Region cluster configurations, containing the witness region and linked cluster settings.
      type: object
      properties:
        witnessRegion:
          $ref: "#/components/schemas/Region"
          description: The Region that serves as the witness region for a multi-Region cluster. The witness Region helps maintain cluster consistency and quorum.
        clusters:
          $ref: "#/components/schemas/ClusterArnList"
          description: The set of peered clusters that form the multi-Region cluster configuration. Each peered cluster represents a database instance in a different Region.
    Region:
      description: Region name.
      type: string
      minLength: 0
      maxLength: 50
    ClusterArnList:
      description: A list of the Amazon Resource Names of the cluster.
      type: array
      items:
        $ref: "#/components/schemas/ClusterArn"
    ClusterArn:
      description: The Amazon Resource Name of the cluster.
      type: string
      pattern: arn:aws(-[^:]+)?:dsql:[a-z0-9-]{1,20}:[0-9]{12}:cluster/[a-z0-9]{26}
    PolicyDocument:
      description: "A resource-based policy document in JSON format. Length constraints: Minimum length of 1. Maximum length of 20480 characters (approximately 20KB)."
      type: string
      minLength: 1
      maxLength: 20480
    BypassPolicyLockoutSafetyCheck:
      type: boolean
    CreateClusterOutput:
      description: The output of a created cluster.
      type: object
      properties:
        identifier:
          $ref: "#/components/schemas/ClusterId"
          description: The ID of the created cluster.
        arn:
          $ref: "#/components/schemas/ClusterArn"
          description: The ARN of the created cluster.
        status:
          $ref: "#/components/schemas/ClusterStatus"
          description: The status of the created cluster.
        creationTime:
          $ref: "#/components/schemas/ClusterCreationTime"
          description: The time of when created the cluster.
        multiRegionProperties:
          $ref: "#/components/schemas/MultiRegionProperties"
          description: The multi-Region cluster configuration details that were set during cluster creation
        encryptionDetails:
          $ref: "#/components/schemas/EncryptionDetails"
          description: The encryption configuration for the cluster that was specified during the creation process, including the KMS key identifier and encryption state.
        deletionProtectionEnabled:
          $ref: "#/components/schemas/DeletionProtectionEnabled"
          description: Whether deletion protection is enabled on this cluster.
        endpoint:
          $ref: "#/components/schemas/Endpoint"
          description: The connection endpoint for the created cluster.
      required:
        - identifier
        - arn
        - status
        - creationTime
        - deletionProtectionEnabled
    ClusterId:
      description: The ID of the cluster.
      type: string
      pattern: "[a-z0-9]{26}"
    ClusterStatus:
      description: The current status of a cluster.
      type: string
      enum:
        - CREATING
        - ACTIVE
        - IDLE
        - INACTIVE
        - UPDATING
        - DELETING
        - DELETED
        - FAILED
        - PENDING_SETUP
        - PENDING_DELETE
    ClusterCreationTime:
      description: The timestamp when the cluster was created.
      type: string
      format: date-time
    EncryptionDetails:
      description: Configuration details about encryption for the cluster including the KMS key ARN, encryption type, and encryption status.
      type: object
      properties:
        encryptionType:
          $ref: "#/components/schemas/EncryptionType"
          description: The type of encryption that protects the data on your cluster.
        kmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The ARN of the KMS key that encrypts data in the cluster.
        encryptionStatus:
          $ref: "#/components/schemas/EncryptionStatus"
          description: The status of encryption for the cluster.
      required:
        - encryptionType
        - encryptionStatus
    EncryptionType:
      type: string
      enum:
        - AWS_OWNED_KMS_KEY
        - CUSTOMER_MANAGED_KMS_KEY
    KmsKeyArn:
      type: string
    EncryptionStatus:
      type: string
      enum:
        - ENABLED
        - UPDATING
        - KMS_KEY_INACCESSIBLE
        - ENABLING
    Endpoint:
      type: string
      pattern: "[a-zA-Z0-9.-]+"
    TargetDefinition:
      description: Target definition for stream destination.
      type: object
      properties:
        kinesis:
          $ref: "#/components/schemas/KinesisTargetDefinition"
          description: Kinesis stream target configuration.
    KinesisTargetDefinition:
      description: Kinesis stream target configuration.
      type: object
      properties:
        streamArn:
          $ref: "#/components/schemas/KinesisStreamArn"
          description: The ARN of the Kinesis stream.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of the IAM role that grants permission to write to the Kinesis stream. This can be a standard role (arn:aws:iam::account-id:role/role-name) or a role with a path prefix (arn:aws:iam::account-id:role/service-role/role-name), such as roles auto-created by the console.
      required:
        - streamArn
        - roleArn
    KinesisStreamArn:
      description: The Amazon Resource Name (ARN) of an Amazon Kinesis Data Stream.
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws.*:kinesis:.*:\d{12}:stream/\S+
    RoleArn:
      description: The Amazon Resource Name (ARN) of an IAM role.
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:iam::[0-9]{12}:role(/[a-zA-Z0-9+=,.@_-]+)+
    StreamOrdering:
      description: Stream ordering mode. UNORDERED Changes are streamed without ordering guarantees.
      type: string
      enum:
        - UNORDERED
    StreamFormat:
      description: Stream record format. JSON Stream records are formatted as JSON.
      type: string
      enum:
        - JSON
    CreateStreamOutput:
      description: The output of a created stream.
      type: object
      properties:
        clusterIdentifier:
          $ref: "#/components/schemas/ClusterId"
          description: The ID of the cluster for the created stream.
        streamIdentifier:
          $ref: "#/components/schemas/StreamId"
          description: The ID of the created stream.
        arn:
          $ref: "#/components/schemas/StreamArn"
          description: The ARN of the created stream.
        status:
          $ref: "#/components/schemas/StreamStatus"
          description: The status of the created stream.
        creationTime:
          $ref: "#/components/schemas/StreamCreationTime"
          description: The time when created the stream.
        ordering:
          $ref: "#/components/schemas/StreamOrdering"
          description: The ordering mode of the created stream.
        format_:
          $ref: "#/components/schemas/StreamFormat"
          description: The format of the created stream records.
      required:
        - clusterIdentifier
        - streamIdentifier
        - arn
        - status
        - creationTime
        - ordering
        - format_
    StreamId:
      description: The ID of the stream.
      type: string
      pattern: "[a-z0-9]{26}"
    StreamArn:
      description: The Amazon Resource Name (ARN) of the stream.
      type: string
      pattern: arn:aws(-[^:]+)?:dsql:[a-z0-9-]{1,20}:[0-9]{12}:cluster/[a-z0-9]{26}/stream/[a-z0-9]{26}
    StreamStatus:
      description: The current status of a stream. CREATING The stream is being created. ACTIVE The stream is active and processing changes. DELETING The stream is being deleted. DELETED The stream has been deleted. FAILED The stream has failed. IMPAIRED The stream is impaired and may not be processing changes correctly.
      type: string
      enum:
        - CREATING
        - ACTIVE
        - DELETING
        - DELETED
        - FAILED
        - IMPAIRED
    StreamCreationTime:
      description: The timestamp when the stream was created.
      type: string
      format: date-time
    DeleteClusterOutput:
      description: The output from a deleted cluster.
      type: object
      properties:
        identifier:
          $ref: "#/components/schemas/ClusterId"
          description: The ID of the deleted cluster.
        arn:
          $ref: "#/components/schemas/ClusterArn"
          description: The ARN of the deleted cluster.
        status:
          $ref: "#/components/schemas/ClusterStatus"
          description: The status of the cluster.
        creationTime:
          $ref: "#/components/schemas/ClusterCreationTime"
          description: The time of when the cluster was created.
      required:
        - identifier
        - arn
        - status
        - creationTime
    PolicyVersion:
      type: string
    DeleteClusterPolicyOutput:
      type: object
      properties:
        policyVersion:
          $ref: "#/components/schemas/PolicyVersion"
          description: The version of the policy that was deleted.
      required:
        - policyVersion
    DeleteStreamOutput:
      description: The output from a deleted stream.
      type: object
      properties:
        clusterIdentifier:
          $ref: "#/components/schemas/ClusterId"
          description: The ID of the cluster for the deleted stream.
        streamIdentifier:
          $ref: "#/components/schemas/StreamId"
          description: The ID of the deleted stream.
        arn:
          $ref: "#/components/schemas/StreamArn"
          description: The ARN of the deleted stream.
        status:
          $ref: "#/components/schemas/StreamStatus"
          description: The status of the stream.
        creationTime:
          $ref: "#/components/schemas/StreamCreationTime"
          description: The time when the stream was created.
      required:
        - clusterIdentifier
        - streamIdentifier
        - arn
        - status
        - creationTime
    GetClusterOutput:
      description: The output of a cluster.
      type: object
      properties:
        identifier:
