          description: VPC to create the service-managed Resource Gateway in.
        subnetIds:
          $ref: "#/components/schemas/ListOfSubnetIds"
          description: Subnets that the service-managed Resource Gateway will span.
        securityGroupIds:
          $ref: "#/components/schemas/ListOfSecurityGroupIds"
          description: Security groups to attach to the service-managed Resource Gateway. If not specified, a default security group is created.
