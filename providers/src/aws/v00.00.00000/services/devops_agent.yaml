openapi: 3.0.0
info:
  version: "2026-01-01"
  title: AWS DevOps Agent Service
  description: AWS DevOps Agent Service
  x-serviceName: aidevops
  x-serviceAlias: devops_agent
  x-protocol: rest-json
  x-apiVersion: "2026-01-01"
  x-endpointPrefix: aidevops
servers:
  - url: https://aidevops.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for devops-agent
paths:
  /v1/agentspaces/{agent_space_id}/associations:
    post:
      operationId: AssociateService
      description: Adds a specific service association to an AgentSpace. It overwrites the existing association of the same service. Returns 201 Created on success.
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier of the AgentSpace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serviceId:
                  $ref: "#/components/schemas/ServiceId"
                configuration:
                  $ref: "#/components/schemas/ServiceConfiguration"
              required:
                - serviceId
                - configuration
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateServiceOutput"
  /v1/agentspaces:
    post:
      operationId: CreateAgentSpace
      description: Creates a new AgentSpace with the specified name and description. Duplicate space names are allowed.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/AgentSpaceName"
                description:
                  $ref: "#/components/schemas/Description"
                locale:
                  $ref: "#/components/schemas/Locale"
                kmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                clientToken:
                  $ref: "#/components/schemas/CreateAgentSpaceInputClientTokenString"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - name
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAgentSpaceOutput"
  /backlog/agent-space/{agent_space_id}/tasks:
    post:
      operationId: CreateBacklogTask
      description: Creates a new backlog task in the specified agent space
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier for the agent space where the task will be created
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reference:
                  $ref: "#/components/schemas/ReferenceInput"
                taskType:
                  $ref: "#/components/schemas/TaskType"
                title:
                  $ref: "#/components/schemas/BacklogTaskTitle"
                description:
                  $ref: "#/components/schemas/BacklogTaskDescription"
                priority:
                  $ref: "#/components/schemas/Priority"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - taskType
                - title
                - priority
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBacklogTaskResponse"
  /agents/agent-space/{agent_space_id}/chat/create:
    post:
      operationId: CreateChat
      description: Creates a new chat execution in the specified agent space
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
        - name: userId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The user identifier for the chat. This field is deprecated and will be ignored — the service resolves user identity from the authenticated session.
        - name: userType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserType"
          description: The authentication type of the user
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChatResponse"
  /v1/private-connections:
    post:
      operationId: CreatePrivateConnection
      description: Creates a Private Connection to a target resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/PrivateConnectionName"
                mode:
                  $ref: "#/components/schemas/PrivateConnectionMode"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - name
                - mode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePrivateConnectionOutput"
    get:
      operationId: ListPrivateConnections
      description: Lists all Private Connections in the caller's account.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPrivateConnectionsOutput"
  /v1/agentspaces/{agent_space_id}:
    delete:
      operationId: DeleteAgentSpace
      description: Deletes an AgentSpace. This operation is idempotent and returns a 204 No Content response on success.
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier of the AgentSpace
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAgentSpaceOutput"
    get:
      operationId: GetAgentSpace
      description: Retrieves detailed information about a specific AgentSpace.
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier of the AgentSpace
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAgentSpaceOutput"
    patch:
      operationId: UpdateAgentSpace
      description: Updates the information of an existing AgentSpace.
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier of the AgentSpace
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/AgentSpaceName"
                description:
                  $ref: "#/components/schemas/Description"
                locale:
                  $ref: "#/components/schemas/Locale"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAgentSpaceOutput"
  /v1/private-connections/{name}:
    delete:
      operationId: DeletePrivateConnection
      description: Deletes a Private Connection. The deletion is asynchronous and returns DELETE_IN_PROGRESS status.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PrivateConnectionName"
          description: The name of the Private Connection.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePrivateConnectionOutput"
    get:
      operationId: DescribePrivateConnection
      description: Retrieves details of an existing Private Connection.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PrivateConnectionName"
          description: The name of the Private Connection.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribePrivateConnectionOutput"
  /v1/services/{service_id}:
    delete:
      operationId: DeregisterService
      description: Deregister a service
      parameters:
        - name: service_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ServiceId"
          description: The service id to deregister. A service can only be deregistered if it is not associated with any AgentSpace.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeregisterServiceOutput"
    get:
      operationId: GetService
      description: Retrieves given service by it's unique identifier
      parameters:
        - name: service_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ServiceId"
          description: The unique identifier of the given service.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetServiceOutput"
  /v1/agentspaces/{agent_space_id}/operator:
    delete:
      operationId: DisableOperatorApp
      description: Disable the Operator App for the specified AgentSpace
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier of the AgentSpace
        - name: x-amzn-app-auth-flow
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthFlow"
          description: The authentication flow configured for the operator App. e.g. idc
      responses:
        "200":
          description: Success
    post:
      operationId: EnableOperatorApp
      description: Enable the Operator App to access the given AgentSpace
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier of the AgentSpace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                authFlow:
                  $ref: "#/components/schemas/AuthFlow"
                operatorAppRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                idcInstanceArn:
                  $ref: "#/components/schemas/String"
                issuerUrl:
                  $ref: "#/components/schemas/String"
                idpClientId:
                  $ref: "#/components/schemas/IdpClientId"
                idpClientSecret:
                  $ref: "#/components/schemas/IdpClientSecret"
                provider:
                  $ref: "#/components/schemas/String"
              required:
                - authFlow
                - operatorAppRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnableOperatorAppOutput"
  /v1/agentspaces/{agent_space_id}/associations/{association_id}:
    delete:
      operationId: DisassociateService
      description: Deletes a specific service association from an AgentSpace. This operation is idempotent and returns a 204 No Content response on success.
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier of the AgentSpace
        - name: association_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssociationId"
          description: The unique identifier of the given association.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateServiceOutput"
    get:
      operationId: GetAssociation
      description: Retrieves given associations configured for a specific AgentSpace.
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier of the AgentSpace
        - name: association_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssociationId"
          description: The unique identifier of the given association.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssociationOutput"
    patch:
      operationId: UpdateAssociation
      description: Partially updates the configuration of an existing service association for an AgentSpace. Present fields are fully replaced; absent fields are left unchanged. Returns 200 OK on success.
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier of the AgentSpace
        - name: association_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssociationId"
          description: The unique identifier of the given association.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                configuration:
                  $ref: "#/components/schemas/ServiceConfiguration"
              required:
                - configuration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAssociationOutput"
  /usage/account:
    get:
      operationId: GetAccountUsage
      description: Retrieves monthly account usage metrics and limits for the AWS account.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountUsageOutput"
  /backlog/agent-space/{agent_space_id}/tasks/{task_id}:
    get:
      operationId: GetBacklogTask
      description: Gets a backlog task for the specified agent space and task id
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier for the agent space containing the task
        - name: task_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The unique identifier of the task to retrieve
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBacklogTaskResponse"
    patch:
      operationId: UpdateBacklogTask
      description: Update an existing backlog task.
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier for the agent space containing the task
        - name: task_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The unique identifier of the task to update
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                taskStatus:
                  $ref: "#/components/schemas/TaskStatus"
                clientToken:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBacklogTaskResponse"
  /v2/agentspaces/{agent_space_id}/operator:
    get:
      operationId: GetOperatorApp
      description: Get the full auth configuration of operator including any enabled auth flow
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier of the AgentSpace
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOperatorAppOutput"
  /backlog/agent-space/{agent_space_id}/recommendations/{recommendation_id}:
    get:
      operationId: GetRecommendation
      description: Retrieves a specific recommendation by its ID
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier for the agent space containing the recommendation
        - name: recommendation_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The unique identifier for the recommendation to retrieve
        - name: recommendationVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Long"
          description: Specific version of the recommendation to retrieve. If not specified, returns the latest version.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRecommendationResponse"
    patch:
      operationId: UpdateRecommendation
      description: Updates an existing recommendation with new content, status, or metadata
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier for the agent space containing the recommendation
        - name: recommendation_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The unique identifier for the recommendation to update
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/RecommendationStatus"
                additionalContext:
                  $ref: "#/components/schemas/String"
                clientToken:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRecommendationResponse"
  /v1/agentspaces/list:
    post:
      operationId: ListAgentSpaces
      description: Lists all AgentSpaces with optional pagination.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListAgentSpacesInputMaxResultsInteger"
          description: Maximum number of results to return in a single call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentSpacesOutput"
  /v1/agentspaces/{agent_space_id}/associations/list:
    post:
      operationId: ListAssociations
      description: List all associations for given AgentSpace
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier of the AgentSpace
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListAssociationsInputMaxResultsInteger"
          description: Maximum number of results to return in a single call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Token for the next page of results.
        - name: filterServiceTypes
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListAssociationsInputFilterServiceTypesString"
          description: A comma-separated list of service types to filter list associations output
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssociationsOutput"
  /backlog/agent-space/{agent_space_id}/tasks/list:
    post:
      operationId: ListBacklogTasks
      description: Lists backlog tasks in the specified agent space with optional filtering and sorting
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier for the agent space containing the tasks
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  $ref: "#/components/schemas/TaskFilter"
                limit:
                  $ref: "#/components/schemas/ListBacklogTasksRequestLimitInteger"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                sortField:
                  $ref: "#/components/schemas/TaskSortField"
                order:
                  $ref: "#/components/schemas/TaskSortOrder"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBacklogTasksResponse"
  /agents/agent-space/{agent_space_id}/chat/list:
    get:
      operationId: ListChats
      description: Retrieves a paginated list of the user's recent chat executions
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
        - name: userId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The user identifier to list chats for. This field is deprecated and will be ignored — the service resolves user identity from the authenticated session.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListChatsRequestMaxResultsInteger"
          description: Maximum number of results to return
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Token for pagination
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChatsResponse"
  /journal/agent-space/{agent_space_id}/executions:
    post:
      operationId: ListExecutions
      description: List executions
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier for the agent space
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                taskId:
                  $ref: "#/components/schemas/ResourceId"
                limit:
                  $ref: "#/components/schemas/Integer"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - taskId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListExecutionsResponse"
  /backlog/agent-space/{agent_space_id}/goals/list:
    post:
      operationId: ListGoals
      description: Lists goals in the specified agent space with optional filtering
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier for the agent space
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/GoalStatus"
                goalType:
                  $ref: "#/components/schemas/GoalType"
                limit:
                  $ref: "#/components/schemas/ListGoalsRequestLimitInteger"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGoalsResponse"
  /journal/agent-space/{agent_space_id}/journalRecords:
    post:
      operationId: ListJournalRecords
      description: List journal records for a specific execution
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier for the agent space containing the execution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                executionId:
                  $ref: "#/components/schemas/ResourceId"
                limit:
                  $ref: "#/components/schemas/ListJournalRecordsRequestLimitInteger"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                recordType:
                  $ref: "#/components/schemas/String"
                order:
                  $ref: "#/components/schemas/OrderType"
              required:
                - executionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListJournalRecordsResponse"
  /agents/agent-space/{agent_space_id}/pendingMessages:
    post:
      operationId: ListPendingMessages
      description: List pending messages for a specific execution.
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                executionId:
                  $ref: "#/components/schemas/ResourceId"
              required:
                - executionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPendingMessagesResponse"
  /backlog/agent-space/{agent_space_id}/recommendations/list:
    post:
      operationId: ListRecommendations
      description: Lists recommendations for the specified agent space
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier for the agent space containing the recommendations
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                taskId:
                  $ref: "#/components/schemas/ResourceId"
                goalId:
                  $ref: "#/components/schemas/ResourceId"
                status:
                  $ref: "#/components/schemas/RecommendationStatus"
                priority:
                  $ref: "#/components/schemas/RecommendationPriority"
                limit:
                  $ref: "#/components/schemas/ListRecommendationsRequestLimitInteger"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecommendationsResponse"
  /v1/services/list:
    post:
      operationId: ListServices
      description: List a list of registered service on the account level.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListServicesInputMaxResultsInteger"
          description: Maximum number of results to return in a single call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Token for the next page of results.
        - name: filterServiceType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Service"
          description: Optional filter to list only services of a specific type.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServicesOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists tags for the specified AWS DevOps Agent resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ListTagsForResourceRequestResourceArnString"
          description: The ARN of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds or overwrites tags for the specified AWS DevOps Agent resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TagResourceRequestResourceArnString"
          description: The ARN of the resource to tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - tags
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes tags from the specified AWS DevOps Agent resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UntagResourceRequestResourceArnString"
          description: The ARN of the resource to untag.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: Tag keys to remove.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /v1/agentspaces/{agent_space_id}/associations/{association_id}/webhooks/list:
    post:
      operationId: ListWebhooks
      description: List all webhooks for given Association
      parameters:
        - name: agent_space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier of the AgentSpace
        - name: association_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssociationId"
          description: The unique identifier of the given association.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWebhooksOutput"
  /v1/register/{service}:
    post:
      operationId: RegisterService
      description: This operation registers the specified service
      parameters:
        - name: service
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PostRegisterServiceSupportedService"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serviceDetails:
                  $ref: "#/components/schemas/ServiceDetails"
                kmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                privateConnectionName:
                  $ref: "#/components/schemas/PrivateConnectionName"
                name:
                  $ref: "#/components/schemas/ServiceName"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - serviceDetails
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterServiceOutput"
  /agents/agent-space/{agent_space_id}/chat/sendMessage:
    post:
      operationId: SendMessage
      description: Sends a chat message and streams the response for the specified agent space execution
      parameters:
        - name: agent_space_id
