        events:
          $ref: "#/components/schemas/SendMessageEvents"
          description: The stream of chat message events
      required:
        - events
    SendMessageEvents:
      description: "Event stream for chat message responses using the content block model. Events follow a lifecycle: responseCreated -> responseInProgress -> (contentBlockStart/contentBlockDelta/contentBlockStop events) -> responseCompleted|responseFailed SendMessage always uses content block mode — legacy per-field events (outputTextDelta, functionCallArgumentsDelta, etc.) are not emitted."
      type: object
      properties:
        responseCreated:
          $ref: "#/components/schemas/SendMessageResponseCreatedEvent"
          description: Emitted when the response is created
        responseInProgress:
          $ref: "#/components/schemas/SendMessageResponseInProgressEvent"
          description: Emitted while the response is being generated
        responseCompleted:
          $ref: "#/components/schemas/SendMessageResponseCompletedEvent"
          description: Emitted when the response completes successfully
        responseFailed:
          $ref: "#/components/schemas/SendMessageResponseFailedEvent"
          description: Emitted when the response fails
        summary:
          $ref: "#/components/schemas/SendMessageSummaryEvent"
          description: Emitted to provide a summary of agent actions
        heartbeat:
          $ref: "#/components/schemas/SendMessageHeartbeatEvent"
          description: Heartbeat event sent periodically to keep the connection alive during idle periods
        contentBlockStart:
          $ref: "#/components/schemas/SendMessageContentBlockStartEvent"
          description: Emitted when a new content block starts
        contentBlockDelta:
          $ref: "#/components/schemas/SendMessageContentBlockDeltaEvent"
          description: Emitted for each incremental content delta within a content block
        contentBlockStop:
          $ref: "#/components/schemas/SendMessageContentBlockStopEvent"
          description: Emitted when a content block is complete
    SendMessageResponseCreatedEvent:
      description: Event emitted when the response is created
      type: object
      properties:
