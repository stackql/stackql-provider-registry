      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                executionId:
                  $ref: "#/components/schemas/ResourceId"
                content:
                  $ref: "#/components/schemas/MessageContent"
                context:
                  $ref: "#/components/schemas/SendMessageContext"
                userId:
                  $ref: "#/components/schemas/ResourceId"
              required:
                - executionId
                - content
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
  /backlog/agent-space/{agent_space_id}/goals/{goal_id}:
    patch:
      operationId: UpdateGoal
