openapi: 3.0.0
info:
  version: "2021-08-20"
  title: AWS Support App
  description: AWS Support App
  x-serviceName: supportapp
  x-serviceAlias: support_app
  x-protocol: rest-json
  x-apiVersion: "2021-08-20"
  x-endpointPrefix: supportapp
  x-jsonVersion: "1.1"
servers:
  - url: https://supportapp.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for support-app
paths:
  /control/create-slack-channel-configuration:
    post:
      operationId: CreateSlackChannelConfiguration
      description: Creates a Slack channel configuration for your Amazon Web Services account. You can add up to 5 Slack workspaces for your account. You can add up to 20 Slack channels for your account. A Slack channel can have up to 100 Amazon Web Services accounts. This means that only 100 accounts can add the same Slack channel to the Amazon Web Services Support App. We recommend that you only add the accounts that you need to manage support cases for your organization. This can reduce the notifications about case updates that you receive in the Slack channel. We recommend that you choose a private Slack channel so that only members in that channel have read and write access to your support cases. Anyone in your Slack channel can create, update, or resolve support cases for your account. Users require an invitation to join private channels.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channelId:
                  $ref: "#/components/schemas/channelId"
                channelName:
                  $ref: "#/components/schemas/channelName"
                channelRoleArn:
                  $ref: "#/components/schemas/roleArn"
                notifyOnAddCorrespondenceToCase:
                  $ref: "#/components/schemas/booleanValue"
                notifyOnCaseSeverity:
                  $ref: "#/components/schemas/NotificationSeverityLevel"
                notifyOnCreateOrReopenCase:
                  $ref: "#/components/schemas/booleanValue"
                notifyOnResolveCase:
                  $ref: "#/components/schemas/booleanValue"
                teamId:
                  $ref: "#/components/schemas/teamId"
              required:
                - channelId
                - channelRoleArn
                - notifyOnCaseSeverity
                - teamId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSlackChannelConfigurationResult"
  /control/delete-account-alias:
    post:
      operationId: DeleteAccountAlias
      description: Deletes an alias for an Amazon Web Services account ID. The alias appears in the Amazon Web Services Support App page of the Amazon Web Services Support Center. The alias also appears in Slack messages from the Amazon Web Services Support App.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAccountAliasResult"
  /control/delete-slack-channel-configuration:
    post:
      operationId: DeleteSlackChannelConfiguration
      description: Deletes a Slack channel configuration from your Amazon Web Services account. This operation doesn't delete your Slack channel.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channelId:
                  $ref: "#/components/schemas/channelId"
                teamId:
                  $ref: "#/components/schemas/teamId"
              required:
                - channelId
                - teamId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSlackChannelConfigurationResult"
  /control/delete-slack-workspace-configuration:
    post:
      operationId: DeleteSlackWorkspaceConfiguration
      description: Deletes a Slack workspace configuration from your Amazon Web Services account. This operation doesn't delete your Slack workspace.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                teamId:
                  $ref: "#/components/schemas/teamId"
              required:
                - teamId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSlackWorkspaceConfigurationResult"
  /control/get-account-alias:
    post:
      operationId: GetAccountAlias
      description: Retrieves the alias from an Amazon Web Services account ID. The alias appears in the Amazon Web Services Support App page of the Amazon Web Services Support Center. The alias also appears in Slack messages from the Amazon Web Services Support App.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountAliasResult"
  /control/list-slack-channel-configurations:
    post:
      operationId: ListSlackChannelConfigurations
      description: Lists the Slack channel configurations for an Amazon Web Services account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/paginationToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSlackChannelConfigurationsResult"
  /control/list-slack-workspace-configurations:
    post:
      operationId: ListSlackWorkspaceConfigurations
      description: Lists the Slack workspace configurations for an Amazon Web Services account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/paginationToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSlackWorkspaceConfigurationsResult"
  /control/put-account-alias:
    post:
      operationId: PutAccountAlias
      description: Creates or updates an individual alias for each Amazon Web Services account ID. The alias appears in the Amazon Web Services Support App page of the Amazon Web Services Support Center. The alias also appears in Slack messages from the Amazon Web Services Support App.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountAlias:
                  $ref: "#/components/schemas/awsAccountAlias"
              required:
                - accountAlias
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutAccountAliasResult"
  /control/register-slack-workspace-for-organization:
    post:
      operationId: RegisterSlackWorkspaceForOrganization
      description: "Registers a Slack workspace for your Amazon Web Services account. To call this API, your account must be part of an organization in Organizations. If you're the management account and you want to register Slack workspaces for your organization, you must complete the following tasks: Sign in to the Amazon Web Services Support Center and authorize the Slack workspaces where you want your organization to have access to. See Authorize a Slack workspace in the Amazon Web Services Support User Guide. Call the RegisterSlackWorkspaceForOrganization API to authorize each Slack workspace for the organization. After the management account authorizes the Slack workspace, member accounts can call this API to authorize the same Slack workspace for their individual accounts. Member accounts don't need to authorize the Slack workspace manually through the Amazon Web Services Support Center. To use the Amazon Web Services Support App, each account must then complete the following tasks: Create an Identity and Access Management (IAM) role with the required permission. For more information, see Managing access to the Amazon Web Services Support App. Configure a Slack channel to use the Amazon Web Services Support App for support cases for that account. For more information, see Configuring a Slack channel."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                teamId:
                  $ref: "#/components/schemas/teamId"
              required:
                - teamId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterSlackWorkspaceForOrganizationResult"
  /control/update-slack-channel-configuration:
    post:
      operationId: UpdateSlackChannelConfiguration
      description: Updates the configuration for a Slack channel, such as case update notifications.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channelId:
                  $ref: "#/components/schemas/channelId"
                channelName:
                  $ref: "#/components/schemas/channelName"
                channelRoleArn:
                  $ref: "#/components/schemas/roleArn"
                notifyOnAddCorrespondenceToCase:
                  $ref: "#/components/schemas/booleanValue"
                notifyOnCaseSeverity:
                  $ref: "#/components/schemas/NotificationSeverityLevel"
                notifyOnCreateOrReopenCase:
                  $ref: "#/components/schemas/booleanValue"
                notifyOnResolveCase:
                  $ref: "#/components/schemas/booleanValue"
                teamId:
                  $ref: "#/components/schemas/teamId"
              required:
                - channelId
                - teamId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSlackChannelConfigurationResult"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    channelId:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^\S+$
    channelName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^.+$
    roleArn:
      type: string
      minLength: 31
      maxLength: 2048
      pattern: ^arn:aws:iam::[0-9]{12}:role/(.+)$
    booleanValue:
      type: boolean
    NotificationSeverityLevel:
      type: string
      enum:
        - none
        - all
        - high
    teamId:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^\S+$
    CreateSlackChannelConfigurationResult:
      type: object
    DeleteAccountAliasResult:
      type: object
    DeleteSlackChannelConfigurationResult:
      type: object
    DeleteSlackWorkspaceConfigurationResult:
      type: object
    GetAccountAliasResult:
      type: object
      properties:
        accountAlias:
          $ref: "#/components/schemas/awsAccountAlias"
          description: An alias or short name for an Amazon Web Services account.
    awsAccountAlias:
      type: string
      minLength: 1
      maxLength: 30
      pattern: ^[\w\- ]+$
    paginationToken:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^\S+$
    ListSlackChannelConfigurationsResult:
      type: object
      properties:
        nextToken:
          $ref: "#/components/schemas/paginationToken"
          description: The point where pagination should resume when the response returns only partial results.
        slackChannelConfigurations:
          $ref: "#/components/schemas/slackChannelConfigurationList"
          description: The configurations for a Slack channel.
      required:
        - slackChannelConfigurations
    slackChannelConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/SlackChannelConfiguration"
    SlackChannelConfiguration:
      description: The configuration for a Slack channel that you added for your Amazon Web Services account.
      type: object
      properties:
        channelId:
          $ref: "#/components/schemas/channelId"
          description: The channel ID in Slack. This ID identifies a channel within a Slack workspace.
        channelName:
          $ref: "#/components/schemas/channelName"
          description: The name of the Slack channel that you configured with the Amazon Web Services Support App for your Amazon Web Services account.
        channelRoleArn:
          $ref: "#/components/schemas/roleArn"
          description: The Amazon Resource Name (ARN) of an IAM role that you want to use to perform operations on Amazon Web Services. For more information, see Managing access to the Amazon Web Services Support App in the Amazon Web Services Support User Guide.
        notifyOnAddCorrespondenceToCase:
          $ref: "#/components/schemas/booleanValue"
          description: Whether you want to get notified when a support case has a new correspondence.
        notifyOnCaseSeverity:
          $ref: "#/components/schemas/NotificationSeverityLevel"
          description: The case severity for a support case that you want to receive notifications.
        notifyOnCreateOrReopenCase:
          $ref: "#/components/schemas/booleanValue"
          description: Whether you want to get notified when a support case is created or reopened.
        notifyOnResolveCase:
          $ref: "#/components/schemas/booleanValue"
          description: Whether you want to get notified when a support case is resolved.
        teamId:
          $ref: "#/components/schemas/teamId"
          description: The team ID in Slack. This ID uniquely identifies a Slack workspace, such as T012ABCDEFG.
      required:
        - channelId
        - teamId
    ListSlackWorkspaceConfigurationsResult:
      type: object
      properties:
        nextToken:
          $ref: "#/components/schemas/paginationToken"
          description: The point where pagination should resume when the response returns only partial results.
        slackWorkspaceConfigurations:
          $ref: "#/components/schemas/SlackWorkspaceConfigurationList"
          description: The configurations for a Slack workspace.
    SlackWorkspaceConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/SlackWorkspaceConfiguration"
    SlackWorkspaceConfiguration:
      description: The configuration for a Slack workspace that you added to an Amazon Web Services account.
      type: object
      properties:
        allowOrganizationMemberAccount:
          $ref: "#/components/schemas/booleanValue"
          description: Whether to allow member accounts to authorize Slack workspaces. Member accounts must be part of an organization in Organizations.
        teamId:
          $ref: "#/components/schemas/teamId"
          description: The team ID in Slack. This ID uniquely identifies a Slack workspace, such as T012ABCDEFG.
        teamName:
          $ref: "#/components/schemas/teamName"
          description: The name of the Slack workspace.
      required:
        - teamId
    teamName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^.+$
    PutAccountAliasResult:
      type: object
    RegisterSlackWorkspaceForOrganizationResult:
      type: object
      properties:
        accountType:
          $ref: "#/components/schemas/AccountType"
          description: Whether the Amazon Web Services account is a management or member account that's part of an organization in Organizations.
        teamId:
          $ref: "#/components/schemas/teamId"
          description: The team ID in Slack. This ID uniquely identifies a Slack workspace, such as T012ABCDEFG.
        teamName:
          $ref: "#/components/schemas/teamName"
          description: The name of the Slack workspace.
    AccountType:
      type: string
      enum:
        - management
        - member
    UpdateSlackChannelConfigurationResult:
      type: object
      properties:
        channelId:
          $ref: "#/components/schemas/channelId"
          description: The channel ID in Slack. This ID identifies a channel within a Slack workspace.
        channelName:
          $ref: "#/components/schemas/channelName"
          description: The name of the Slack channel that you configure for the Amazon Web Services Support App.
        channelRoleArn:
          $ref: "#/components/schemas/roleArn"
          description: The Amazon Resource Name (ARN) of an IAM role that you want to use to perform operations on Amazon Web Services. For more information, see Managing access to the Amazon Web Services Support App in the Amazon Web Services Support User Guide.
        notifyOnAddCorrespondenceToCase:
          $ref: "#/components/schemas/booleanValue"
          description: Whether you want to get notified when a support case has a new correspondence.
        notifyOnCaseSeverity:
          $ref: "#/components/schemas/NotificationSeverityLevel"
          description: The case severity for a support case that you want to receive notifications.
        notifyOnCreateOrReopenCase:
          $ref: "#/components/schemas/booleanValue"
          description: Whether you want to get notified when a support case is created or reopened.
        notifyOnResolveCase:
          $ref: "#/components/schemas/booleanValue"
          description: Whether you want to get notified when a support case is resolved.
        teamId:
          $ref: "#/components/schemas/teamId"
          description: The team ID in Slack. This ID uniquely identifies a Slack workspace, such as T012ABCDEFG.
  x-stackQL-resources:
    slack_channel_configurations:
      id: aws.support_app.slack_channel_configurations
      name: slack_channel_configurations
      title: slack_channel_configurations
      methods:
        create_slack_channel_configuration:
          operation:
            $ref: "#/paths/~1control~1create-slack-channel-configuration/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        delete_slack_channel_configuration:
          operation:
            $ref: "#/paths/~1control~1delete-slack-channel-configuration/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        list_slack_channel_configurations:
          operation:
            $ref: "#/paths/~1control~1list-slack-channel-configurations/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        update_slack_channel_configuration:
          operation:
            $ref: "#/paths/~1control~1update-slack-channel-configuration/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/slack_channel_configurations/methods/list_slack_channel_configurations"
        insert:
          - $ref: "#/components/x-stackQL-resources/slack_channel_configurations/methods/create_slack_channel_configuration"
        update:
          - $ref: "#/components/x-stackQL-resources/slack_channel_configurations/methods/update_slack_channel_configuration"
        delete:
          - $ref: "#/components/x-stackQL-resources/slack_channel_configurations/methods/delete_slack_channel_configuration"
    account_alias:
      id: aws.support_app.account_alias
      name: account_alias
      title: account_alias
      methods:
        delete_account_alias:
          operation:
            $ref: "#/paths/~1control~1delete-account-alias/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        get_account_alias:
          operation:
            $ref: "#/paths/~1control~1get-account-alias/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        put_account_alias:
          operation:
            $ref: "#/paths/~1control~1put-account-alias/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/account_alias/methods/get_account_alias"
        insert: []
        update: []
        replace:
          - $ref: "#/components/x-stackQL-resources/account_alias/methods/put_account_alias"
        delete:
          - $ref: "#/components/x-stackQL-resources/account_alias/methods/delete_account_alias"
    slack_workspace_configurations:
      id: aws.support_app.slack_workspace_configurations
      name: slack_workspace_configurations
      title: slack_workspace_configurations
      methods:
        delete_slack_workspace_configuration:
          operation:
            $ref: "#/paths/~1control~1delete-slack-workspace-configuration/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        list_slack_workspace_configurations:
          operation:
            $ref: "#/paths/~1control~1list-slack-workspace-configurations/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/slack_workspace_configurations/methods/list_slack_workspace_configurations"
        insert: []
        update: []
        delete:
          - $ref: "#/components/x-stackQL-resources/slack_workspace_configurations/methods/delete_slack_workspace_configuration"
    slack_workspace_for_organizations:
      id: aws.support_app.slack_workspace_for_organizations
      name: slack_workspace_for_organizations
      title: slack_workspace_for_organizations
      methods:
        register_slack_workspace_for_organization:
          operation:
            $ref: "#/paths/~1control~1register-slack-workspace-for-organization/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select: []
        insert:
          - $ref: "#/components/x-stackQL-resources/slack_workspace_for_organizations/methods/register_slack_workspace_for_organization"
        update: []
        delete: []
