          description: A detailed status code providing additional information about the assessment state.
        StatusReason:
          $ref: "#/components/schemas/AssessmentStatusReason"
          description: A human-readable description of the current assessment status, including any error details or progress information.
        CustomerDnsIps:
          $ref: "#/components/schemas/CustomerDnsIps"
