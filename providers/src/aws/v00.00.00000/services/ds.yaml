                $ref: "#/components/schemas/VerifyTrustResult"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DirectoryId:
      type: string
      pattern: ^d-[0-9a-f]{10}$
    AcceptSharedDirectoryResult:
      type: object
      properties:
        SharedDirectory:
          $ref: "#/components/schemas/SharedDirectory"
          description: The shared directory in the directory consumer account.
    SharedDirectory:
      description: Details about the shared directory in the directory owner account for which the share request in the directory consumer account has been accepted.
      type: object
      properties:
        OwnerAccountId:
          $ref: "#/components/schemas/CustomerId"
          description: Identifier of the directory owner account, which contains the directory that has been shared to the consumer account.
        OwnerDirectoryId:
          $ref: "#/components/schemas/DirectoryId"
          description: Identifier of the directory in the directory owner account.
        ShareMethod:
          $ref: "#/components/schemas/ShareMethod"
          description: The method used when sharing a directory to determine whether the directory should be shared within your Amazon Web Services organization (ORGANIZATIONS) or with any Amazon Web Services account by sending a shared directory request (HANDSHAKE).
        SharedAccountId:
          $ref: "#/components/schemas/CustomerId"
          description: Identifier of the directory consumer account that has access to the shared directory (OwnerDirectoryId) in the directory owner account.
        SharedDirectoryId:
          $ref: "#/components/schemas/DirectoryId"
          description: Identifier of the shared directory in the directory consumer account. This identifier is different for each directory owner account.
        ShareStatus:
          $ref: "#/components/schemas/ShareStatus"
          description: Current directory status of the shared Managed Microsoft AD directory.
        ShareNotes:
          $ref: "#/components/schemas/Notes"
          description: A directory share request that is sent by the directory owner to the directory consumer. The request includes a typed message to help the directory consumer administrator determine whether to approve or reject the share invitation.
        CreatedDateTime:
          $ref: "#/components/schemas/CreatedDateTime"
          description: The date and time that the shared directory was created.
        LastUpdatedDateTime:
          $ref: "#/components/schemas/LastUpdatedDateTime"
          description: The date and time that the shared directory was last updated.
    CustomerId:
      type: string
      pattern: ^(\d{12})$
    ShareMethod:
      type: string
      enum:
        - ORGANIZATIONS
        - HANDSHAKE
    ShareStatus:
      type: string
      enum:
        - Shared
        - PendingAcceptance
        - Rejected
        - Rejecting
        - RejectFailed
        - Sharing
        - ShareFailed
        - Deleted
        - Deleting
    Notes:
      type: string
      maxLength: 1024
    CreatedDateTime:
      type: string
      format: date-time
    LastUpdatedDateTime:
      type: string
      format: date-time
    IpRoutes:
      type: array
      items:
        $ref: "#/components/schemas/IpRoute"
    IpRoute:
      description: Contains the IP address block. This is often the address block of the DNS server used for your self-managed domain.
      type: object
      properties:
        CidrIp:
          $ref: "#/components/schemas/CidrIp"
          description: IP address block in CIDR format, such as 10.0.0.0/24. This is often the address block of the DNS server used for your self-managed domain. For a single IP address, use a CIDR address block with /32. For example, 10.0.0.0/32.
        CidrIpv6:
          $ref: "#/components/schemas/CidrIpv6"
          description: IPv6 address block in CIDR format, such as 2001:db8::/32. This is often the address block of the DNS server used for your self-managed domain. For a single IPv6 address, use a CIDR address block with /128. For example, 2001:db8::1/128.
        Description:
          $ref: "#/components/schemas/Description"
          description: Description of the address block.
    CidrIp:
      type: string
      pattern: ^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([1-9]|[1-2][0-9]|3[0-2]))$
    CidrIpv6:
      type: string
      pattern: ^((([0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4})|(([0-9a-fA-F]{1,4}:){1,7}:)|(([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4})|(([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2})|(([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3})|(([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4})|(([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5})|([0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6}))|(:((:[0-9a-fA-F]{1,4}){1,7}|:)))\/(12[0-8]|1[01][0-9]|[1-9]?[0-9])$
    Description:
      type: string
      minLength: 0
      maxLength: 128
      pattern: ^([a-zA-Z0-9_])[\\a-zA-Z0-9_@#%*+=:?./!\s-]*$
    UpdateSecurityGroupForDirectoryControllers:
      type: boolean
    AddIpRoutesResult:
      type: object
    RegionName:
      type: string
      minLength: 8
      maxLength: 32
    DirectoryVpcSettings:
      description: Contains VPC information for the CreateDirectory, CreateMicrosoftAD, or CreateHybridAD operation.
      type: object
      properties:
        VpcId:
          $ref: "#/components/schemas/VpcId"
          description: The identifier of the VPC in which to create the directory.
        SubnetIds:
          $ref: "#/components/schemas/SubnetIds"
          description: The identifiers of the subnets for the directory servers. The two subnets must be in different Availability Zones. Directory Service creates a directory server and a DNS server in each of these subnets.
      required:
        - VpcId
        - SubnetIds
    VpcId:
      type: string
      pattern: ^(vpc-[0-9a-f]{8}|vpc-[0-9a-f]{17})$
    SubnetIds:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      type: string
      pattern: ^(subnet-[0-9a-f]{8}|subnet-[0-9a-f]{17})$
    AddRegionResult:
      type: object
    ResourceId:
      type: string
      pattern: ^[d]-[0-9a-f]{10}$
    Tags:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Metadata assigned to a directory consisting of a key-value pair.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: "Required name of the tag. The string value can be Unicode characters and cannot be prefixed with \"aws:\". The string can contain only the set of Unicode letters, digits, white-space, '_', '.', '/', '=', '+', '-', ':', '@'(Java regex: \"^([\\\\p{L}\\\\p{Z}\\\\p{N}_.:/=+\\\\-]*)$\")."
        Value:
          $ref: "#/components/schemas/TagValue"
          description: "The optional value of the tag. The string value can be Unicode characters. The string can contain only the set of Unicode letters, digits, white-space, '_', '.', '/', '=', '+', '-', ':', '@' (Java regex: \"^([\\\\p{L}\\\\p{Z}\\\\p{N}_.:/=+\\\\-]*)$\")."
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    AddTagsToResourceResult:
      type: object
    SchemaExtensionId:
      type: string
      pattern: ^e-[0-9a-f]{10}$
    CancelSchemaExtensionResult:
      type: object
    DirectoryName:
      type: string
      pattern: ^([a-zA-Z0-9]+[\\.-])+([a-zA-Z0-9])+$
    DirectoryShortName:
      type: string
      pattern: ^[^\\/:*?"<>|.]+[^\\/:*?"<>|]*$
    ConnectPassword:
      type: string
      minLength: 1
      maxLength: 128
    DirectorySize:
      type: string
      enum:
        - Small
        - Large
    DirectoryConnectSettings:
      description: Contains connection settings for creating an AD Connector with the ConnectDirectory action.
      type: object
      properties:
        VpcId:
          $ref: "#/components/schemas/VpcId"
          description: The identifier of the VPC in which the AD Connector is created.
        SubnetIds:
          $ref: "#/components/schemas/SubnetIds"
          description: A list of subnet identifiers in the VPC in which the AD Connector is created.
        CustomerDnsIps:
          $ref: "#/components/schemas/DnsIpAddrs"
          description: The IP addresses of DNS servers or domain controllers in your self-managed directory.
        CustomerDnsIpsV6:
          $ref: "#/components/schemas/DnsIpv6Addrs"
          description: The IPv6 addresses of DNS servers or domain controllers in your self-managed directory.
        CustomerUserName:
          $ref: "#/components/schemas/UserName"
          description: "The user name of an account in your self-managed directory that is used to connect to the directory. This account must have the following permissions: Read users and groups Create computer objects Join computers to the domain"
      required:
