                $ref: "#/components/schemas/RemoveTagsFromResourceResult"
  /ResetUserPassword:
    post:
      operationId: ResetUserPassword
      description: "Resets the password for any user in your Managed Microsoft AD or Simple AD directory. Disabled users will become enabled and can be authenticated following the API call. You can reset the password for any user in your directory with the following exceptions: For Simple AD, you cannot reset the password for any user that is a member of either the Domain Admins or Enterprise Admins group except for the administrator user. For Managed Microsoft AD, you can only reset the password for a user that is in an OU based off of the NetBIOS name that you typed when you created your directory. For example, you cannot reset the password for a user in the Amazon Web Services Reserved OU. For more information about the OU structure for an Managed Microsoft AD directory, see What Gets Created in the Directory Service Administration Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.ResetUserPassword
            default: DirectoryService_20150416.ResetUserPassword
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: Identifier of the Managed Microsoft AD or Simple AD directory in which the user resides.
                UserName:
                  $ref: "#/components/schemas/CustomerUserName"
                  description: The user name of the user whose password will be reset.
                NewPassword:
                  $ref: "#/components/schemas/UserPassword"
                  description: The new password that will be reset.
              required:
                - DirectoryId
                - UserName
                - NewPassword
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetUserPasswordResult"
  /RestoreFromSnapshot:
    post:
      operationId: RestoreFromSnapshot
      description: Restores a directory using an existing directory snapshot. When you restore a directory from a snapshot, any changes made to the directory after the snapshot date are overwritten. This action returns as soon as the restore operation is initiated. You can monitor the progress of the restore operation by calling the DescribeDirectories operation with the directory identifier. When the DirectoryDescription.Stage value changes to Active, the restore operation is complete.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.RestoreFromSnapshot
            default: DirectoryService_20150416.RestoreFromSnapshot
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SnapshotId:
                  $ref: "#/components/schemas/SnapshotId"
                  description: The identifier of the snapshot to restore from.
              required:
                - SnapshotId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreFromSnapshotResult"
  /ShareDirectory:
    post:
      operationId: ShareDirectory
      description: Shares a specified directory (DirectoryId) in your Amazon Web Services account (directory owner) with another Amazon Web Services account (directory consumer). With this operation you can use your directory from any Amazon Web Services account and from any Amazon VPC within an Amazon Web Services Region. When you share your Managed Microsoft AD directory, Directory Service creates a shared directory in the directory consumer account. This shared directory contains the metadata to provide access to the directory within the directory owner account. The shared directory is visible in all VPCs in the directory consumer account. The ShareMethod parameter determines whether the specified directory can be shared between Amazon Web Services accounts inside the same Amazon Web Services organization (ORGANIZATIONS). It also determines whether you can share the directory with any other Amazon Web Services account either inside or outside of the organization (HANDSHAKE). The ShareNotes parameter is only used when HANDSHAKE is called, which sends a directory sharing request to the directory consumer.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.ShareDirectory
            default: DirectoryService_20150416.ShareDirectory
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: Identifier of the Managed Microsoft AD directory that you want to share with other Amazon Web Services accounts.
                ShareNotes:
                  $ref: "#/components/schemas/Notes"
                  description: A directory share request that is sent by the directory owner to the directory consumer. The request includes a typed message to help the directory consumer administrator determine whether to approve or reject the share invitation.
                ShareTarget:
                  $ref: "#/components/schemas/ShareTarget"
                  description: Identifier for the directory consumer account with whom the directory is to be shared.
                ShareMethod:
                  $ref: "#/components/schemas/ShareMethod"
                  description: The method used when sharing a directory to determine whether the directory should be shared within your Amazon Web Services organization (ORGANIZATIONS) or with any Amazon Web Services account by sending a directory sharing request (HANDSHAKE).
              required:
                - DirectoryId
                - ShareTarget
                - ShareMethod
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareDirectoryResult"
  /StartADAssessment:
    post:
      operationId: StartADAssessment
      description: "Initiates a directory assessment to validate your self-managed AD environment for hybrid domain join. The assessment checks compatibility and connectivity of the self-managed AD environment. A directory assessment is automatically created when you create a hybrid directory. There are two types of assessments: CUSTOMER and SYSTEM. Your Amazon Web Services account has a limit of 100 CUSTOMER directory assessments. The assessment process typically takes 30 minutes or more to complete. The assessment process is asynchronous and you can monitor it with DescribeADAssessment. The InstanceIds must have a one-to-one correspondence with CustomerDnsIps, meaning that if the IP address for instance i-10243410 is 10.24.34.100 and the IP address for instance i-10243420 is 10.24.34.200, then the input arrays must maintain the same order relationship, either [10.24.34.100, 10.24.34.200] paired with [i-10243410, i-10243420] or [10.24.34.200, 10.24.34.100] paired with [i-10243420, i-10243410]. Note: You must provide exactly one DirectoryId or AssessmentConfiguration."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.StartADAssessment
            default: DirectoryService_20150416.StartADAssessment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AssessmentConfiguration:
                  $ref: "#/components/schemas/AssessmentConfiguration"
                  description: Configuration parameters for the directory assessment, including DNS server information, domain name, Amazon VPC subnet, and Amazon Web Services System Manager managed node details.
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The identifier of the directory for which to perform the assessment. This should be an existing directory. If the assessment is not for an existing directory, this parameter should be omitted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartADAssessmentResult"
  /StartSchemaExtension:
    post:
      operationId: StartSchemaExtension
      description: Applies a schema extension to a Microsoft AD directory.
