      operationId: UpdateDirectorySetup
      description: Updates directory configuration for the specified update type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.UpdateDirectorySetup
            default: DirectoryService_20150416.UpdateDirectorySetup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The identifier of the directory to update.
                UpdateType:
                  $ref: "#/components/schemas/UpdateType"
                  description: The type of update to perform on the directory.
                OSUpdateSettings:
                  $ref: "#/components/schemas/OSUpdateSettings"
                  description: Operating system configuration to apply during the directory update operation.
                DirectorySizeUpdateSettings:
                  $ref: "#/components/schemas/DirectorySizeUpdateSettings"
                  description: Directory size configuration to apply during the update operation.
                NetworkUpdateSettings:
                  $ref: "#/components/schemas/NetworkUpdateSettings"
                  description: Network configuration to apply during the directory update operation.
                CreateSnapshotBeforeUpdate:
                  $ref: "#/components/schemas/CreateSnapshotBeforeUpdate"
                  description: Specifies whether to create a directory snapshot before performing the update.
              required:
