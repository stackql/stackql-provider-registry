                SelectiveAuth:
                  $ref: "#/components/schemas/SelectiveAuth"
                  description: Updates selective authentication for the trust.
              required:
                - TrustId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTrustResult"
  /VerifyTrust:
    post:
      operationId: VerifyTrust
      description: Directory Service for Microsoft Active Directory allows you to configure and verify trust relationships. This action verifies a trust relationship between your Managed Microsoft AD directory and an external domain.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
