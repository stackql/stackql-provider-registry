          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDirectorySetupResult"
  /UpdateHybridAD:
    post:
      operationId: UpdateHybridAD
      description: Updates the configuration of an existing hybrid directory. You can recover hybrid directory administrator account or modify self-managed instance settings. Updates are applied asynchronously. Use DescribeHybridADUpdate to monitor the progress of configuration changes. The InstanceIds must have a one-to-one correspondence with CustomerDnsIps, meaning that if the IP address for instance i-10243410 is 10.24.34.100 and the IP address for instance i-10243420 is 10.24.34.200, then the input arrays must maintain the same order relationship, either [10.24.34.100, 10.24.34.200] paired with [i-10243410, i-10243420] or [10.24.34.200, 10.24.34.100] paired with [i-10243420, i-10243410]. You must provide at least one update to UpdateHybridADRequest$HybridAdministratorAccountUpdate or UpdateHybridADRequest$SelfManagedInstancesSettings.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.UpdateHybridAD
            default: DirectoryService_20150416.UpdateHybridAD
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The identifier of the hybrid directory to update.
                HybridAdministratorAccountUpdate:
                  $ref: "#/components/schemas/HybridAdministratorAccountUpdate"
                  description: We create a hybrid directory administrator account when we create a hybrid directory. Use HybridAdministratorAccountUpdate to recover the hybrid directory administrator account if you have deleted it. To recover your hybrid directory administrator account, we need temporary access to a user in your self-managed AD with administrator permissions in the form of a secret from Amazon Web Services Secrets Manager. We use these credentials once during recovery and don't store them. If your hybrid directory administrator account exists, then you don’t need to use HybridAdministratorAccountUpdate, even if you have updated your self-managed AD administrator user.
                SelfManagedInstancesSettings:
                  $ref: "#/components/schemas/HybridCustomerInstancesSettings"
                  description: Updates to the self-managed AD configuration, including DNS server IP addresses and Amazon Web Services System Manager managed node identifiers.
              required:
                - DirectoryId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateHybridADResult"
  /UpdateNumberOfDomainControllers:
    post:
      operationId: UpdateNumberOfDomainControllers
      description: Adds or removes domain controllers to or from the directory. Based on the difference between current value and new value (provided through this API call), domain controllers will be added or removed. It may take up to 45 minutes for any new domain controllers to become fully active once the requested number of domain controllers is updated. During this time, you cannot make another update request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.UpdateNumberOfDomainControllers
            default: DirectoryService_20150416.UpdateNumberOfDomainControllers
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: Identifier of the directory to which the domain controllers will be added or removed.
                DesiredNumber:
                  $ref: "#/components/schemas/DesiredNumberOfDomainControllers"
                  description: The number of domain controllers desired in the directory.
              required:
                - DirectoryId
                - DesiredNumber
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateNumberOfDomainControllersResult"
  /UpdateRadius:
