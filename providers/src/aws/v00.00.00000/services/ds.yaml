            schema:
              type: object
              properties:
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The identifier of the directory for which you want to remove Region replication.
              required:
                - DirectoryId
      responses:
        "200":
          description: Success
          content:
