openapi: 3.0.0
info:
  version: "2015-04-16"
  title: AWS Directory Service
  description: AWS Directory Service
  x-serviceName: ds
  x-serviceAlias: ds
  x-protocol: json
  x-apiVersion: "2015-04-16"
  x-endpointPrefix: ds
  x-targetPrefix: DirectoryService_20150416
  x-jsonVersion: "1.1"
servers:
  - url: https://ds.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for ds
paths:
  /AcceptSharedDirectory:
    post:
      operationId: AcceptSharedDirectory
      description: Accepts a directory sharing request that was sent from the directory owner account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.AcceptSharedDirectory
            default: DirectoryService_20150416.AcceptSharedDirectory
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SharedDirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: Identifier of the shared directory in the directory consumer account. This identifier is different for each directory owner account.
              required:
                - SharedDirectoryId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptSharedDirectoryResult"
  /AddIpRoutes:
    post:
      operationId: AddIpRoutes
      description: "If the DNS server for your self-managed domain uses a publicly addressable IP address, you must add a CIDR address block to correctly route traffic to and from your Microsoft AD on Amazon Web Services. AddIpRoutes adds this address block. You can also use AddIpRoutes to facilitate routing traffic that uses public IP ranges from your Microsoft AD on Amazon Web Services to a peer VPC. Before you call AddIpRoutes, ensure that all of the required permissions have been explicitly granted through a policy. For details about what permissions are required to run the AddIpRoutes operation, see Directory Service API Permissions: Actions, Resources, and Conditions Reference."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.AddIpRoutes
            default: DirectoryService_20150416.AddIpRoutes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: Identifier (ID) of the directory to which to add the address block.
                IpRoutes:
                  $ref: "#/components/schemas/IpRoutes"
                  description: IP address blocks, using CIDR format, of the traffic to route. This is often the IP address block of the DNS server used for your self-managed domain.
                UpdateSecurityGroupForDirectoryControllers:
                  $ref: "#/components/schemas/UpdateSecurityGroupForDirectoryControllers"
                  description: 'If set to true, updates the inbound and outbound rules of the security group that has the description: "Amazon Web Services created security group for directory ID directory controllers." Following are the new rules: Inbound: Type: Custom UDP Rule, Protocol: UDP, Range: 88, Source: Managed Microsoft AD VPC IPv4 CIDR Type: Custom UDP Rule, Protocol: UDP, Range: 123, Source: Managed Microsoft AD VPC IPv4 CIDR Type: Custom UDP Rule, Protocol: UDP, Range: 138, Source: Managed Microsoft AD VPC IPv4 CIDR Type: Custom UDP Rule, Protocol: UDP, Range: 389, Source: Managed Microsoft AD VPC IPv4 CIDR Type: Custom UDP Rule, Protocol: UDP, Range: 464, Source: Managed Microsoft AD VPC IPv4 CIDR Type: Custom UDP Rule, Protocol: UDP, Range: 445, Source: Managed Microsoft AD VPC IPv4 CIDR Type: Custom TCP Rule, Protocol: TCP, Range: 88, Source: Managed Microsoft AD VPC IPv4 CIDR Type: Custom TCP Rule, Protocol: TCP, Range: 135, Source: Managed Microsoft AD VPC IPv4 CIDR Type: Custom TCP Rule, Protocol: TCP, Range: 445, Source: Managed Microsoft AD VPC IPv4 CIDR Type: Custom TCP Rule, Protocol: TCP, Range: 464, Source: Managed Microsoft AD VPC IPv4 CIDR Type: Custom TCP Rule, Protocol: TCP, Range: 636, Source: Managed Microsoft AD VPC IPv4 CIDR Type: Custom TCP Rule, Protocol: TCP, Range: 1024-65535, Source: Managed Microsoft AD VPC IPv4 CIDR Type: Custom TCP Rule, Protocol: TCP, Range: 3268-33269, Source: Managed Microsoft AD VPC IPv4 CIDR Type: DNS (UDP), Protocol: UDP, Range: 53, Source: Managed Microsoft AD VPC IPv4 CIDR Type: DNS (TCP), Protocol: TCP, Range: 53, Source: Managed Microsoft AD VPC IPv4 CIDR Type: LDAP, Protocol: TCP, Range: 389, Source: Managed Microsoft AD VPC IPv4 CIDR Type: All ICMP, Protocol: All, Range: N/A, Source: Managed Microsoft AD VPC IPv4 CIDR Outbound: Type: All traffic, Protocol: All, Range: All, Destination: 0.0.0.0/0 These security rules impact an internal network interface that is not exposed publicly.'
              required:
                - DirectoryId
                - IpRoutes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddIpRoutesResult"
  /AddRegion:
    post:
      operationId: AddRegion
      description: Adds two domain controllers in the specified Region for the specified directory.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.AddRegion
            default: DirectoryService_20150416.AddRegion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The identifier of the directory to which you want to add Region replication.
                RegionName:
                  $ref: "#/components/schemas/RegionName"
                  description: The name of the Region where you want to add domain controllers for replication. For example, us-east-1.
                VPCSettings:
                  $ref: "#/components/schemas/DirectoryVpcSettings"
              required:
                - DirectoryId
                - RegionName
                - VPCSettings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddRegionResult"
  /AddTagsToResource:
    post:
      operationId: AddTagsToResource
      description: Adds or overwrites one or more tags for the specified directory. Each directory can have a maximum of 50 tags. Each tag consists of a key and optional value. Tag keys must be unique to each resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.AddTagsToResource
            default: DirectoryService_20150416.AddTagsToResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceId:
                  $ref: "#/components/schemas/ResourceId"
                  description: Identifier (ID) for the directory to which to add the tag.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: The tags to be assigned to the directory.
              required:
                - ResourceId
                - Tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddTagsToResourceResult"
  /CancelSchemaExtension:
    post:
      operationId: CancelSchemaExtension
      description: Cancels an in-progress schema extension to a Microsoft AD directory. Once a schema extension has started replicating to all domain controllers, the task can no longer be canceled. A schema extension can be canceled during any of the following states; Initializing, CreatingSnapshot, and UpdatingSchema.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.CancelSchemaExtension
            default: DirectoryService_20150416.CancelSchemaExtension
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The identifier of the directory whose schema extension will be canceled.
                SchemaExtensionId:
                  $ref: "#/components/schemas/SchemaExtensionId"
                  description: The identifier of the schema extension that will be canceled.
              required:
                - DirectoryId
                - SchemaExtensionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelSchemaExtensionResult"
  /ConnectDirectory:
    post:
      operationId: ConnectDirectory
      description: "Creates an AD Connector to connect to a self-managed directory. Before you call ConnectDirectory, ensure that all of the required permissions have been explicitly granted through a policy. For details about what permissions are required to run the ConnectDirectory operation, see Directory Service API Permissions: Actions, Resources, and Conditions Reference."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.ConnectDirectory
            default: DirectoryService_20150416.ConnectDirectory
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/DirectoryName"
                  description: The fully qualified name of your self-managed directory, such as corp.example.com.
                ShortName:
                  $ref: "#/components/schemas/DirectoryShortName"
                  description: The NetBIOS name of your self-managed directory, such as CORP.
                Password:
                  $ref: "#/components/schemas/ConnectPassword"
                  description: The password for your self-managed user account.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A description for the directory.
                Size:
                  $ref: "#/components/schemas/DirectorySize"
                  description: The size of the directory.
                ConnectSettings:
                  $ref: "#/components/schemas/DirectoryConnectSettings"
                  description: A DirectoryConnectSettings object that contains additional information for the operation.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: The tags to be assigned to AD Connector.
                NetworkType:
                  $ref: "#/components/schemas/NetworkType"
                  description: The network type for your directory. The default value is IPv4 or IPv6 based on the provided subnet capabilities.
              required:
                - Name
                - Password
                - Size
                - ConnectSettings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectDirectoryResult"
  /CreateAlias:
    post:
      operationId: CreateAlias
      description: Creates an alias for a directory and assigns the alias to the directory. The alias is used to construct the access URL for the directory, such as http://`<alias>`.awsapps.com. After an alias has been created, it cannot be deleted or reused, so this operation should only be used when absolutely necessary.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.CreateAlias
            default: DirectoryService_20150416.CreateAlias
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The identifier of the directory for which to create the alias.
                Alias:
                  $ref: "#/components/schemas/AliasName"
                  description: The requested alias. The alias must be unique amongst all aliases in Amazon Web Services. This operation throws an EntityAlreadyExistsException error if the alias already exists.
              required:
                - DirectoryId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAliasResult"
  /CreateComputer:
    post:
      operationId: CreateComputer
      description: Creates an Active Directory computer object in the specified directory.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.CreateComputer
            default: DirectoryService_20150416.CreateComputer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The identifier of the directory in which to create the computer account.
                ComputerName:
                  $ref: "#/components/schemas/ComputerName"
                  description: The name of the computer account.
                Password:
                  $ref: "#/components/schemas/ComputerPassword"
                  description: A one-time password that is used to join the computer to the directory. You should generate a random, strong password to use for this parameter.
                OrganizationalUnitDistinguishedName:
                  $ref: "#/components/schemas/OrganizationalUnitDN"
                  description: The fully-qualified distinguished name of the organizational unit to place the computer account in.
                ComputerAttributes:
                  $ref: "#/components/schemas/Attributes"
                  description: An array of Attribute objects that contain any LDAP attributes to apply to the computer account.
              required:
                - DirectoryId
                - ComputerName
                - Password
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateComputerResult"
  /CreateConditionalForwarder:
    post:
      operationId: CreateConditionalForwarder
      description: Creates a conditional forwarder associated with your Amazon Web Services directory. Conditional forwarders are required in order to set up a trust relationship with another domain. The conditional forwarder points to the trusted domain.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.CreateConditionalForwarder
            default: DirectoryService_20150416.CreateConditionalForwarder
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The directory ID of the Amazon Web Services directory for which you are creating the conditional forwarder.
                RemoteDomainName:
                  $ref: "#/components/schemas/RemoteDomainName"
                  description: The fully qualified domain name (FQDN) of the remote domain with which you will set up a trust relationship.
                DnsIpAddrs:
                  $ref: "#/components/schemas/DnsIpAddrs"
                  description: The IP addresses of the remote DNS server associated with RemoteDomainName.
                DnsIpv6Addrs:
                  $ref: "#/components/schemas/DnsIpv6Addrs"
                  description: The IPv6 addresses of the remote DNS server associated with RemoteDomainName.
              required:
                - DirectoryId
                - RemoteDomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConditionalForwarderResult"
  /CreateDirectory:
    post:
      operationId: CreateDirectory
      description: "Creates a Simple AD directory. For more information, see Simple Active Directory in the Directory Service Admin Guide. Before you call CreateDirectory, ensure that all of the required permissions have been explicitly granted through a policy. For details about what permissions are required to run the CreateDirectory operation, see Directory Service API Permissions: Actions, Resources, and Conditions Reference."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.CreateDirectory
            default: DirectoryService_20150416.CreateDirectory
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/DirectoryName"
                  description: The fully qualified name for the directory, such as corp.example.com.
                ShortName:
                  $ref: "#/components/schemas/DirectoryShortName"
                  description: The NetBIOS name of the directory, such as CORP.
                Password:
                  $ref: "#/components/schemas/Password"
                  description: "The password for the directory administrator. The directory creation process creates a directory administrator account with the user name Administrator and this password. If you need to change the password for the administrator account, you can use the ResetUserPassword API call. The regex pattern for this string is made up of the following conditions: Length (?=^.{8,64}$) – Must be between 8 and 64 characters AND any 3 of the following password complexity rules required by Active Directory: Numbers and upper case and lowercase (?=.*\\d)(?=.*[A-Z])(?=.*[a-z]) Numbers and special characters and lower case (?=.*\\d)(?=.*[^A-Za-z0-9\\s])(?=.*[a-z]) Special characters and upper case and lower case (?=.*[^A-Za-z0-9\\s])(?=.*[A-Z])(?=.*[a-z]) Numbers and upper case and special characters (?=.*\\d)(?=.*[A-Z])(?=.*[^A-Za-z0-9\\s]) For additional information about how Active Directory passwords are enforced, see Password must meet complexity requirements on the Microsoft website."
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A description for the directory.
                Size:
                  $ref: "#/components/schemas/DirectorySize"
                  description: The size of the directory.
                VpcSettings:
                  $ref: "#/components/schemas/DirectoryVpcSettings"
                  description: A DirectoryVpcSettings object that contains additional information for the operation.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: The tags to be assigned to the Simple AD directory.
                NetworkType:
                  $ref: "#/components/schemas/NetworkType"
                  description: The network type for your directory. Simple AD supports IPv4 and Dual-stack only.
              required:
                - Password
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDirectoryResult"
  /CreateHybridAD:
    post:
      operationId: CreateHybridAD
      description: Creates a hybrid directory that connects your self-managed Active Directory (AD) infrastructure and Amazon Web Services. You must have a successful directory assessment using StartADAssessment to validate your environment compatibility before you use this operation. Updates are applied asynchronously. Use DescribeDirectories to monitor the progress of directory creation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.CreateHybridAD
            default: DirectoryService_20150416.CreateHybridAD
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SecretArn:
                  $ref: "#/components/schemas/SecretArn"
                  description: 'The Amazon Resource Name (ARN) of the Amazon Web Services Secrets Manager secret that contains the credentials for the service account used to join hybrid domain controllers to your self-managed AD domain. This secret is used once and not stored. The secret must contain key-value pairs with keys matching customerAdAdminDomainUsername and customerAdAdminDomainPassword. For example: {"customerAdAdminDomainUsername":"carlos_salazar","customerAdAdminDomainPassword":"ExamplePassword123!"}.'
                AssessmentId:
                  $ref: "#/components/schemas/AssessmentId"
                  description: The unique identifier of the successful directory assessment that validates your self-managed AD environment. You must have a successful directory assessment before you create a hybrid directory.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: The tags to be assigned to the directory. Each tag consists of a key and value pair. You can specify multiple tags as a list.
              required:
                - SecretArn
                - AssessmentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateHybridADResult"
  /CreateLogSubscription:
    post:
      operationId: CreateLogSubscription
      description: Creates a subscription to forward real-time Directory Service domain controller security logs to the specified Amazon CloudWatch log group in your Amazon Web Services account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.CreateLogSubscription
            default: DirectoryService_20150416.CreateLogSubscription
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: Identifier of the directory to which you want to subscribe and receive real-time logs to your specified CloudWatch log group.
                LogGroupName:
                  $ref: "#/components/schemas/LogGroupName"
                  description: The name of the CloudWatch log group where the real-time domain controller logs are forwarded.
              required:
                - DirectoryId
                - LogGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLogSubscriptionResult"
  /CreateMicrosoftAD:
    post:
      operationId: CreateMicrosoftAD
      description: "Creates a Microsoft AD directory in the Amazon Web Services Cloud. For more information, see Managed Microsoft AD in the Directory Service Admin Guide. Before you call CreateMicrosoftAD, ensure that all of the required permissions have been explicitly granted through a policy. For details about what permissions are required to run the CreateMicrosoftAD operation, see Directory Service API Permissions: Actions, Resources, and Conditions Reference."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.CreateMicrosoftAD
            default: DirectoryService_20150416.CreateMicrosoftAD
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/DirectoryName"
                  description: The fully qualified domain name for the Managed Microsoft AD directory, such as corp.example.com. This name will resolve inside your VPC only. It does not need to be publicly resolvable.
                ShortName:
                  $ref: "#/components/schemas/DirectoryShortName"
                  description: The NetBIOS name for your domain, such as CORP. If you don't specify a NetBIOS name, it will default to the first part of your directory DNS. For example, CORP for the directory DNS corp.example.com.
                Password:
                  $ref: "#/components/schemas/Password"
                  description: The password for the default administrative user named Admin. If you need to change the password for the administrator account, you can use the ResetUserPassword API call.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A description for the directory. This label will appear on the Amazon Web Services console Directory Details page after the directory is created.
                VpcSettings:
                  $ref: "#/components/schemas/DirectoryVpcSettings"
                  description: Contains VPC information for the CreateDirectory or CreateMicrosoftAD operation.
                Edition:
                  $ref: "#/components/schemas/DirectoryEdition"
                  description: "Managed Microsoft AD is available in two editions: Standard and Enterprise. Enterprise is the default."
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: The tags to be assigned to the Managed Microsoft AD directory.
                NetworkType:
                  $ref: "#/components/schemas/NetworkType"
                  description: The network type for your domain. The default value is IPv4 or IPv6 based on the provided subnet capabilities.
              required:
                - Name
                - Password
                - VpcSettings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMicrosoftADResult"
  /CreateSnapshot:
    post:
      operationId: CreateSnapshot
      description: Creates a snapshot of a Simple AD or Microsoft AD directory in the Amazon Web Services cloud. You cannot take snapshots of AD Connector directories.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.CreateSnapshot
            default: DirectoryService_20150416.CreateSnapshot
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The identifier of the directory of which to take a snapshot.
                Name:
                  $ref: "#/components/schemas/SnapshotName"
                  description: The descriptive name to apply to the snapshot.
              required:
                - DirectoryId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSnapshotResult"
  /CreateTrust:
    post:
      operationId: CreateTrust
      description: Directory Service for Microsoft Active Directory allows you to configure trust relationships. For example, you can establish a trust between your Managed Microsoft AD directory, and your existing self-managed Microsoft Active Directory. This would allow you to provide users and groups access to resources in either domain, with a single set of credentials. This action initiates the creation of the Amazon Web Services side of a trust relationship between an Managed Microsoft AD directory and an external domain. You can create either a forest trust or an external trust.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.CreateTrust
            default: DirectoryService_20150416.CreateTrust
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The Directory ID of the Managed Microsoft AD directory for which to establish the trust relationship.
                RemoteDomainName:
                  $ref: "#/components/schemas/RemoteDomainName"
                  description: The Fully Qualified Domain Name (FQDN) of the external domain for which to create the trust relationship.
                TrustPassword:
                  $ref: "#/components/schemas/TrustPassword"
                  description: The trust password. The trust password must be the same password that was used when creating the trust relationship on the external domain.
                TrustDirection:
                  $ref: "#/components/schemas/TrustDirection"
                  description: The direction of the trust relationship.
                TrustType:
                  $ref: "#/components/schemas/TrustType"
                  description: The trust relationship type. Forest is the default.
                ConditionalForwarderIpAddrs:
                  $ref: "#/components/schemas/DnsIpAddrs"
                  description: The IP addresses of the remote DNS server associated with RemoteDomainName.
                ConditionalForwarderIpv6Addrs:
                  $ref: "#/components/schemas/DnsIpv6Addrs"
                  description: The IPv6 addresses of the remote DNS server associated with RemoteDomainName.
                SelectiveAuth:
                  $ref: "#/components/schemas/SelectiveAuth"
                  description: Optional parameter to enable selective authentication for the trust.
              required:
                - DirectoryId
                - RemoteDomainName
                - TrustPassword
                - TrustDirection
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTrustResult"
  /DeleteADAssessment:
    post:
      operationId: DeleteADAssessment
      description: Deletes a directory assessment and all associated data. This operation permanently removes the assessment results, validation reports, and configuration information. You cannot delete system-initiated assessments. You can delete customer-created assessments even if they are in progress.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DirectoryService_20150416.DeleteADAssessment
            default: DirectoryService_20150416.DeleteADAssessment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
