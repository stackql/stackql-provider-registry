          $ref: "#/components/schemas/AssessmentReports"
          description: A list of assessment reports containing validation results for each domain controller and test category. Each report includes specific validation details and outcomes.
    Assessment:
      description: Contains detailed information about a directory assessment, including configuration parameters, status, and validation results.
      type: object
      properties:
        AssessmentId:
