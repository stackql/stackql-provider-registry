                RadiusSettings:
                  $ref: "#/components/schemas/RadiusSettings"
                  description: A RadiusSettings object that contains information about the RADIUS server.
              required:
                - DirectoryId
                - RadiusSettings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRadiusResult"
  /UpdateSettings:
    post:
      operationId: UpdateSettings
      description: Updates the configurable settings for the specified directory.
      parameters:
        - name: X-Amz-Target
