        DnsName:
          $ref: "#/components/schemas/DirectoryName"
          description: The fully qualified domain name (FQDN) of the Active Directory domain being assessed.
        StartTime:
          $ref: "#/components/schemas/AssessmentStartTime"
          description: The date and time when the assessment was initiated.
        LastUpdateDateTime:
          $ref: "#/components/schemas/LastUpdateDateTime"
          description: The date and time when the assessment status was last updated.
        Status:
