        Status:
          $ref: "#/components/schemas/AssessmentValidationStatus"
          description: The result status of the validation test. Valid values include SUCCESS, FAILED, PENDING, and IN_PROGRESS.
        StatusCode:
          $ref: "#/components/schemas/AssessmentValidationStatusCode"
          description: A detailed status code providing additional information about the validation result.
        StatusReason:
          $ref: "#/components/schemas/AssessmentValidationStatusReason"
