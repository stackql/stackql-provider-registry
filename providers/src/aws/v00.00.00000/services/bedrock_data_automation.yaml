openapi: 3.0.0
info:
  version: "2023-07-26"
  title: Data Automation for Amazon Bedrock
  description: Data Automation for Amazon Bedrock
  x-serviceName: bedrock
  x-serviceAlias: bedrock_data_automation
  x-protocol: rest-json
  x-apiVersion: "2023-07-26"
  x-endpointPrefix: bedrock-data-automation
servers:
  - url: https://bedrock-data-automation.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for bedrock-data-automation
paths:
  /blueprints/{blueprint_arn}/copy-stage:
    put:
      operationId: CopyBlueprintStage
      description: Copies a Blueprint from one stage to another
      parameters:
        - name: blueprint_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BlueprintArn"
          description: Blueprint to be copied
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceStage:
                  $ref: "#/components/schemas/BlueprintStage"
                targetStage:
                  $ref: "#/components/schemas/BlueprintStage"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - sourceStage
                - targetStage
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopyBlueprintStageResponse"
  /blueprints/:
    put:
      operationId: CreateBlueprint
      description: Creates an Amazon Bedrock Data Automation Blueprint
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                blueprintName:
                  $ref: "#/components/schemas/BlueprintName"
                type:
                  $ref: "#/components/schemas/Type"
                blueprintStage:
                  $ref: "#/components/schemas/BlueprintStage"
                schema:
                  $ref: "#/components/schemas/BlueprintSchema"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - blueprintName
                - type
                - schema
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBlueprintResponse"
    post:
      operationId: ListBlueprints
      description: Lists all existing Amazon Bedrock Data Automation Blueprints
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                blueprintArn:
                  $ref: "#/components/schemas/BlueprintArn"
                resourceOwner:
                  $ref: "#/components/schemas/ResourceOwner"
                blueprintStageFilter:
                  $ref: "#/components/schemas/BlueprintStageFilter"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                projectFilter:
                  $ref: "#/components/schemas/DataAutomationProjectFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBlueprintsResponse"
  /blueprints/{blueprint_arn}/versions/:
    post:
      operationId: CreateBlueprintVersion
      description: Creates a new version of an existing Amazon Bedrock Data Automation Blueprint
      parameters:
        - name: blueprint_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BlueprintArn"
          description: ARN generated at the server side when a Blueprint is created
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBlueprintVersionResponse"
  /data-automation-libraries/:
    put:
      operationId: CreateDataAutomationLibrary
      description: Creates an Amazon Bedrock Data Automation Library
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                libraryName:
                  $ref: "#/components/schemas/DataAutomationLibraryName"
                libraryDescription:
                  $ref: "#/components/schemas/DataAutomationLibraryDescription"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - libraryName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataAutomationLibraryResponse"
    post:
      operationId: ListDataAutomationLibraries
      description: Lists all existing Amazon Bedrock Data Automation Libraries
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                projectFilter:
                  $ref: "#/components/schemas/DataAutomationProjectFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataAutomationLibrariesResponse"
  /data-automation-projects/:
    put:
      operationId: CreateDataAutomationProject
      description: Creates an Amazon Bedrock Data Automation Project
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                projectName:
                  $ref: "#/components/schemas/DataAutomationProjectName"
                projectDescription:
                  $ref: "#/components/schemas/DataAutomationProjectDescription"
                projectStage:
                  $ref: "#/components/schemas/DataAutomationProjectStage"
                projectType:
                  $ref: "#/components/schemas/DataAutomationProjectType"
                standardOutputConfiguration:
                  $ref: "#/components/schemas/StandardOutputConfiguration"
                customOutputConfiguration:
                  $ref: "#/components/schemas/CustomOutputConfiguration"
                overrideConfiguration:
                  $ref: "#/components/schemas/OverrideConfiguration"
                dataAutomationLibraryConfiguration:
                  $ref: "#/components/schemas/DataAutomationLibraryConfiguration"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - projectName
                - standardOutputConfiguration
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataAutomationProjectResponse"
    post:
      operationId: ListDataAutomationProjects
      description: Lists all existing Amazon Bedrock Data Automation Projects
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                projectStageFilter:
                  $ref: "#/components/schemas/DataAutomationProjectStageFilter"
                blueprintFilter:
                  $ref: "#/components/schemas/BlueprintFilter"
                resourceOwner:
                  $ref: "#/components/schemas/ResourceOwner"
                libraryFilter:
                  $ref: "#/components/schemas/DataAutomationLibraryFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataAutomationProjectsResponse"
  /blueprints/{blueprint_arn}/:
    delete:
      operationId: DeleteBlueprint
      description: Deletes an existing Amazon Bedrock Data Automation Blueprint
      parameters:
        - name: blueprint_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BlueprintArn"
          description: ARN generated at the server side when a Blueprint is created
        - name: blueprintVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BlueprintVersion"
          description: Optional field to delete a specific Blueprint version
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBlueprintResponse"
    post:
      operationId: GetBlueprint
      description: Gets an existing Amazon Bedrock Data Automation Blueprint
      parameters:
        - name: blueprint_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BlueprintArn"
          description: ARN generated at the server side when a Blueprint is created
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                blueprintVersion:
                  $ref: "#/components/schemas/BlueprintVersion"
                blueprintStage:
                  $ref: "#/components/schemas/BlueprintStage"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBlueprintResponse"
    put:
      operationId: UpdateBlueprint
      description: Updates an existing Amazon Bedrock Data Automation Blueprint
      parameters:
        - name: blueprint_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BlueprintArn"
          description: ARN generated at the server side when a Blueprint is created
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                schema:
                  $ref: "#/components/schemas/BlueprintSchema"
                blueprintStage:
                  $ref: "#/components/schemas/BlueprintStage"
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
              required:
                - schema
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBlueprintResponse"
  /data-automation-libraries/{library_arn}/:
    delete:
      operationId: DeleteDataAutomationLibrary
      description: Deletes an existing Amazon Bedrock Data Automation Library
      parameters:
        - name: library_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataAutomationLibraryArn"
          description: ARN generated at the server side when a DataAutomationLibrary is created
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDataAutomationLibraryResponse"
    post:
      operationId: GetDataAutomationLibrary
      description: Gets an existing Amazon Bedrock Data Automation Library
      parameters:
        - name: library_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataAutomationLibraryArn"
          description: ARN generated at the server side when a DataAutomationLibrary is created
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataAutomationLibraryResponse"
    put:
      operationId: UpdateDataAutomationLibrary
      description: Updates an existing Amazon Bedrock Data Automation Library
      parameters:
        - name: library_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataAutomationLibraryArn"
          description: ARN generated at the server side when a DataAutomationLibrary is created
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                libraryDescription:
                  $ref: "#/components/schemas/DataAutomationLibraryDescription"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDataAutomationLibraryResponse"
  /data-automation-projects/{project_arn}/:
    delete:
      operationId: DeleteDataAutomationProject
      description: Deletes an existing Amazon Bedrock Data Automation Project
      parameters:
        - name: project_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataAutomationProjectArn"
          description: ARN generated at the server side when a DataAutomationProject is created
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDataAutomationProjectResponse"
    post:
      operationId: GetDataAutomationProject
      description: Gets an existing Amazon Bedrock Data Automation Project
      parameters:
        - name: project_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataAutomationProjectArn"
          description: ARN generated at the server side when a DataAutomationProject is created
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                projectStage:
                  $ref: "#/components/schemas/DataAutomationProjectStage"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataAutomationProjectResponse"
    put:
      operationId: UpdateDataAutomationProject
      description: Updates an existing Amazon Bedrock Data Automation Project
      parameters:
        - name: project_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataAutomationProjectArn"
          description: ARN generated at the server side when a DataAutomationProject is created
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                projectStage:
                  $ref: "#/components/schemas/DataAutomationProjectStage"
                projectDescription:
                  $ref: "#/components/schemas/DataAutomationProjectDescription"
                standardOutputConfiguration:
                  $ref: "#/components/schemas/StandardOutputConfiguration"
                customOutputConfiguration:
                  $ref: "#/components/schemas/CustomOutputConfiguration"
                overrideConfiguration:
                  $ref: "#/components/schemas/OverrideConfiguration"
                dataAutomationLibraryConfiguration:
                  $ref: "#/components/schemas/DataAutomationLibraryConfiguration"
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
              required:
                - standardOutputConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDataAutomationProjectResponse"
  /getBlueprintOptimizationStatus/{invocation_arn}:
    post:
      operationId: GetBlueprintOptimizationStatus
      description: API used to get blueprint optimization status.
      parameters:
        - name: invocation_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BlueprintOptimizationInvocationArn"
          description: Invocation arn.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBlueprintOptimizationStatusResponse"
  /data-automation-libraries/{library_arn}/entityType/{entity_type}/entities/{entity_id}:
    post:
      operationId: GetDataAutomationLibraryEntity
      description: Gets an existing entity based on entity type from the library
      parameters:
        - name: library_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataAutomationLibraryArn"
          description: ARN generated at the server side when a DataAutomationLibrary is created
        - name: entity_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EntityType"
          description: The entity type for which the entity is requested
        - name: entity_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EntityId"
          description: Unique identifier for the entity
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataAutomationLibraryEntityResponse"
  /data-automation-libraries/{library_arn}/library-ingestion-jobs/{job_arn}:
    post:
      operationId: GetDataAutomationLibraryIngestionJob
      description: API used to get status of data automation library ingestion job
      parameters:
        - name: library_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataAutomationLibraryArn"
          description: ARN generated at the server side when a DataAutomationLibrary is created
        - name: job_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataAutomationLibraryIngestionJobArn"
          description: ARN of the DataAutomationLibraryIngestionJob
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataAutomationLibraryIngestionJobResponse"
  /invokeBlueprintOptimizationAsync:
    post:
      operationId: InvokeBlueprintOptimizationAsync
      description: Invoke an async job to perform Blueprint Optimization
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                blueprint:
                  $ref: "#/components/schemas/BlueprintOptimizationObject"
                samples:
                  $ref: "#/components/schemas/BlueprintOptimizationSamples"
                outputConfiguration:
                  $ref: "#/components/schemas/BlueprintOptimizationOutputConfiguration"
                dataAutomationProfileArn:
                  $ref: "#/components/schemas/DataAutomationProfileArn"
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - blueprint
                - samples
                - outputConfiguration
                - dataAutomationProfileArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvokeBlueprintOptimizationAsyncResponse"
  /data-automation-libraries/{library_arn}/library-ingestion-jobs/:
    put:
      operationId: InvokeDataAutomationLibraryIngestionJob
      description: "Async API: Invoke data automation library ingestion job"
      parameters:
        - name: library_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataAutomationLibraryArn"
          description: ARN generated at the server side when a DataAutomationLibrary is created
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                inputConfiguration:
                  $ref: "#/components/schemas/InputConfiguration"
                entityType:
                  $ref: "#/components/schemas/EntityType"
                operationType:
                  $ref: "#/components/schemas/LibraryIngestionJobOperationType"
                outputConfiguration:
                  $ref: "#/components/schemas/OutputConfiguration"
                notificationConfiguration:
                  $ref: "#/components/schemas/NotificationConfiguration"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - inputConfiguration
                - entityType
                - operationType
                - outputConfiguration
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvokeDataAutomationLibraryIngestionJobResponse"
    post:
      operationId: ListDataAutomationLibraryIngestionJobs
      description: Lists all data automation library ingestion jobs
      parameters:
        - name: library_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataAutomationLibraryArn"
          description: ARN generated at the server side when a DataAutomationLibrary is created
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataAutomationLibraryIngestionJobsResponse"
  /data-automation-libraries/{library_arn}/entityType/{entity_type}/entities/:
    post:
      operationId: ListDataAutomationLibraryEntities
      description: Lists all stored entities in the library
      parameters:
        - name: library_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataAutomationLibraryArn"
          description: ARN generated at the server side when a DataAutomationLibrary is created
        - name: entity_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EntityType"
          description: The entity type for which the entity list is requested
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataAutomationLibraryEntitiesResponse"
  /listTagsForResource:
    post:
      operationId: ListTagsForResource
      description: List tags for an Amazon Bedrock Data Automation resource
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceARN:
                  $ref: "#/components/schemas/TaggableResourceArn"
              required:
                - resourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /tagResource:
    post:
      operationId: TagResource
      description: Tag an Amazon Bedrock Data Automation resource
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceARN:
                  $ref: "#/components/schemas/TaggableResourceArn"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - resourceARN
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /untagResource:
    post:
      operationId: UntagResource
      description: Untag an Amazon Bedrock Data Automation resource
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceARN:
                  $ref: "#/components/schemas/TaggableResourceArn"
                tagKeys:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - resourceARN
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    BlueprintArn:
      description: ARN of a Blueprint
      type: string
      minLength: 0
      maxLength: 128
      pattern: arn:aws(|-cn|-us-gov):bedrock:[a-zA-Z0-9-]*:(aws|[0-9]{12}):blueprint/(bedrock-data-automation-public-[a-zA-Z0-9-_]{1,30}|[a-zA-Z0-9-]{12,36})
    BlueprintStage:
      description: Stage of the Blueprint
      type: string
      enum:
        - DEVELOPMENT
        - LIVE
    ClientToken:
      description: Client specified token used for idempotency checks
      type: string
      minLength: 33
      maxLength: 256
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){0,256}"
    CopyBlueprintStageResponse:
      description: CopyBlueprintStage Response
      type: object
    BlueprintName:
      description: Name of the Blueprint
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9-_]+"
    Type:
      description: Type
      type: string
      enum:
        - DOCUMENT
        - IMAGE
        - AUDIO
        - VIDEO
    BlueprintSchema:
      description: Schema of the blueprint
      type: string
      minLength: 1
      maxLength: 100000
    EncryptionConfiguration:
      description: KMS Encryption Configuration
      type: object
      properties:
        kmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
        kmsEncryptionContext:
          type: object
          properties: {}
      required:
        - kmsKeyId
    KmsKeyId:
      description: KMS Key Identifier
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[A-Za-z0-9][A-Za-z0-9:_/+=,@.-]+"
    TagList:
      description: List of tags
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Key value pair of a tag
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
        value:
          $ref: "#/components/schemas/TagValue"
      required:
        - key
        - value
    TagKey:
      description: Defines the context of the tag.
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      description: Defines the value within the context. e.g. <key=reason, value=training>.
      type: string
      minLength: 0
      maxLength: 256
    CreateBlueprintResponse:
      description: Create Blueprint Response
      type: object
      properties:
        blueprint:
