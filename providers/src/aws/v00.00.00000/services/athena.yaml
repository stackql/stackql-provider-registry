    post:
      operationId: TagResource
      description: "Adds one or more tags to an Athena resource. A tag is a label that you assign to a resource. Each tag consists of a key and an optional value, both of which you define. For example, you can use tags to categorize Athena workgroups, data catalogs, or capacity reservations by purpose, owner, or environment. Use a consistent set of tag keys to make it easier to search and filter the resources in your account. For best practices, see Tagging Best Practices. Tag keys can be from 1 to 128 UTF-8 Unicode characters, and tag values can be from 0 to 256 UTF-8 Unicode characters. Tags can use letters and numbers representable in UTF-8, and the following characters: + - = . _ : / @. Tag keys and values are case-sensitive. Tag keys must be unique per resource. If you specify more than one tag, separate them by commas."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.TagResource
            default: AmazonAthena.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: Specifies the ARN of the Athena resource to which tags are to be added.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A collection of one or more tags, separated by commas, to be added to an Athena resource.
              required:
                - ResourceARN
                - Tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
  /TerminateSession:
    post:
      operationId: TerminateSession
      description: Terminates an active session. A TerminateSession call on a session that is already inactive (for example, in a FAILED, TERMINATED or TERMINATING state) succeeds but has no effect. Calculations running in the session when TerminateSession is called are forcefully stopped, but may display as FAILED instead of STOPPED.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.TerminateSession
            default: AmazonAthena.TerminateSession
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SessionId:
                  $ref: "#/components/schemas/SessionId"
                  description: The session ID.
              required:
                - SessionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerminateSessionResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes one or more tags from an Athena resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.UntagResource
            default: AmazonAthena.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: Specifies the ARN of the resource from which tags are to be removed.
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: A comma-separated list of one or more tag keys whose tags are to be removed from the specified resource.
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /UpdateCapacityReservation:
    post:
      operationId: UpdateCapacityReservation
      description: Updates the number of requested data processing units for the capacity reservation with the specified name.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.UpdateCapacityReservation
            default: AmazonAthena.UpdateCapacityReservation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TargetDpus:
                  $ref: "#/components/schemas/TargetDpusInteger"
                  description: The new number of requested data processing units.
                Name:
                  $ref: "#/components/schemas/CapacityReservationName"
                  description: The name of the capacity reservation.
              required:
                - TargetDpus
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCapacityReservationOutput"
  /UpdateDataCatalog:
    post:
      operationId: UpdateDataCatalog
      description: Updates the data catalog that has the specified name.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.UpdateDataCatalog
            default: AmazonAthena.UpdateDataCatalog
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/CatalogNameString"
                  description: The name of the data catalog to update. The catalog name must be unique for the Amazon Web Services account and can use a maximum of 127 alphanumeric, underscore, at sign, or hyphen characters. The remainder of the length constraint of 256 is reserved for use by Athena.
                Type:
                  $ref: "#/components/schemas/DataCatalogType"
                  description: Specifies the type of data catalog to update. Specify LAMBDA for a federated catalog, HIVE for an external hive metastore, or GLUE for an Glue Data Catalog.
                Description:
                  $ref: "#/components/schemas/DescriptionString"
                  description: New or modified text that describes the data catalog.
                Parameters:
                  $ref: "#/components/schemas/ParametersMap"
                  description: Specifies the Lambda function or functions to use for updating the data catalog. This is a mapping whose values depend on the catalog type. For the HIVE data catalog type, use the following syntax. The metadata-function parameter is required. The sdk-version parameter is optional and defaults to the currently supported version. metadata-function=lambda_arn, sdk-version=version_number For the LAMBDA data catalog type, use one of the following sets of required parameters, but not both. If you have one Lambda function that processes metadata and another for reading the actual data, use the following syntax. Both parameters are required. metadata-function=lambda_arn, record-function=lambda_arn If you have a composite Lambda function that processes both metadata and data, use the following syntax to specify your Lambda function. function=lambda_arn
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDataCatalogOutput"
  /UpdateNamedQuery:
    post:
      operationId: UpdateNamedQuery
      description: Updates a NamedQuery object. The database or workgroup cannot be updated.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.UpdateNamedQuery
            default: AmazonAthena.UpdateNamedQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NamedQueryId:
                  $ref: "#/components/schemas/NamedQueryId"
                  description: The unique identifier (UUID) of the query.
                Name:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the query.
                Description:
                  $ref: "#/components/schemas/NamedQueryDescriptionString"
                  description: The query description.
                QueryString:
                  $ref: "#/components/schemas/QueryString"
                  description: The contents of the query with all query statements.
              required:
                - NamedQueryId
                - Name
                - QueryString
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateNamedQueryOutput"
  /UpdateNotebook:
    post:
      operationId: UpdateNotebook
      description: Updates the contents of a Spark notebook.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.UpdateNotebook
            default: AmazonAthena.UpdateNotebook
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NotebookId:
                  $ref: "#/components/schemas/NotebookId"
                  description: The ID of the notebook to update.
                Payload:
                  $ref: "#/components/schemas/Payload"
                  description: The updated content for the notebook.
                Type:
                  $ref: "#/components/schemas/NotebookType"
                  description: The notebook content type. Currently, the only valid type is IPYNB.
                SessionId:
                  $ref: "#/components/schemas/SessionId"
                  description: The active notebook session ID. Required if the notebook has an active session.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: A unique case-sensitive string used to ensure the request to create the notebook is idempotent (executes only once). This token is listed as not required because Amazon Web Services SDKs (for example the Amazon Web Services SDK for Java) auto-generate the token for you. If you are not using the Amazon Web Services SDK or the Amazon Web Services CLI, you must provide this token or the action will fail.
              required:
                - NotebookId
                - Payload
                - Type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateNotebookOutput"
  /UpdateNotebookMetadata:
    post:
      operationId: UpdateNotebookMetadata
      description: Updates the metadata for a notebook.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.UpdateNotebookMetadata
            default: AmazonAthena.UpdateNotebookMetadata
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NotebookId:
                  $ref: "#/components/schemas/NotebookId"
                  description: The ID of the notebook to update the metadata for.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: A unique case-sensitive string used to ensure the request to create the notebook is idempotent (executes only once). This token is listed as not required because Amazon Web Services SDKs (for example the Amazon Web Services SDK for Java) auto-generate the token for you. If you are not using the Amazon Web Services SDK or the Amazon Web Services CLI, you must provide this token or the action will fail.
                Name:
                  $ref: "#/components/schemas/NotebookName"
                  description: The name to update the notebook to.
              required:
                - NotebookId
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateNotebookMetadataOutput"
  /UpdatePreparedStatement:
    post:
      operationId: UpdatePreparedStatement
      description: Updates a prepared statement.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.UpdatePreparedStatement
            default: AmazonAthena.UpdatePreparedStatement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                StatementName:
                  $ref: "#/components/schemas/StatementName"
                  description: The name of the prepared statement.
                WorkGroup:
                  $ref: "#/components/schemas/WorkGroupName"
                  description: The workgroup for the prepared statement.
                QueryStatement:
                  $ref: "#/components/schemas/QueryString"
                  description: The query string for the prepared statement.
                Description:
                  $ref: "#/components/schemas/DescriptionString"
                  description: The description of the prepared statement.
              required:
                - StatementName
                - WorkGroup
                - QueryStatement
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePreparedStatementOutput"
  /UpdateWorkGroup:
    post:
      operationId: UpdateWorkGroup
      description: Updates the workgroup with the specified name. The workgroup's name cannot be changed. Only ConfigurationUpdates can be specified.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.UpdateWorkGroup
            default: AmazonAthena.UpdateWorkGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WorkGroup:
                  $ref: "#/components/schemas/WorkGroupName"
                  description: The specified workgroup that will be updated.
                Description:
                  $ref: "#/components/schemas/WorkGroupDescriptionString"
                  description: The workgroup description.
                ConfigurationUpdates:
                  $ref: "#/components/schemas/WorkGroupConfigurationUpdates"
                  description: Contains configuration updates for an Athena SQL workgroup.
                State:
                  $ref: "#/components/schemas/WorkGroupState"
                  description: The workgroup state that will be updated for the given workgroup.
              required:
                - WorkGroup
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkGroupOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    NamedQueryIdList:
      type: array
      items:
        $ref: "#/components/schemas/NamedQueryId"
    NamedQueryId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: \S+
    BatchGetNamedQueryOutput:
      type: object
      properties:
        NamedQueries:
          $ref: "#/components/schemas/NamedQueryList"
          description: Information about the named query IDs submitted.
        UnprocessedNamedQueryIds:
          $ref: "#/components/schemas/UnprocessedNamedQueryIdList"
          description: Information about provided query IDs.
    NamedQueryList:
      type: array
      items:
        $ref: "#/components/schemas/NamedQuery"
    NamedQuery:
      description: A query, where QueryString contains the SQL statements that make up the query.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The query name.
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: The query description.
        Database:
          $ref: "#/components/schemas/DatabaseString"
          description: The database to which the query belongs.
        QueryString:
          $ref: "#/components/schemas/QueryString"
          description: The SQL statements that make up the query.
        NamedQueryId:
          $ref: "#/components/schemas/NamedQueryId"
          description: The unique identifier of the query.
        WorkGroup:
          $ref: "#/components/schemas/WorkGroupName"
          description: The name of the workgroup that contains the named query.
      required:
        - Name
        - Database
        - QueryString
    NameString:
      type: string
      minLength: 1
      maxLength: 128
    DescriptionString:
      type: string
      minLength: 1
      maxLength: 1024
    DatabaseString:
      type: string
      minLength: 1
      maxLength: 255
    QueryString:
      type: string
      minLength: 1
      maxLength: 262144
    WorkGroupName:
      type: string
      pattern: "[a-zA-Z0-9._-]{1,128}"
    UnprocessedNamedQueryIdList:
      type: array
      items:
        $ref: "#/components/schemas/UnprocessedNamedQueryId"
    UnprocessedNamedQueryId:
      description: Information about a named query ID that could not be processed.
      type: object
      properties:
        NamedQueryId:
          $ref: "#/components/schemas/NamedQueryId"
          description: The unique identifier of the named query.
        ErrorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code returned when the processing request for the named query failed, if applicable.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message returned when the processing request for the named query failed, if applicable.
    ErrorCode:
      description: The error code returned when the query execution failed to process, or when the processing request for the named query failed.
      type: string
      minLength: 1
      maxLength: 256
    ErrorMessage:
      type: string
    PreparedStatementNameList:
      type: array
      items:
        $ref: "#/components/schemas/StatementName"
    StatementName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z_][a-zA-Z0-9_@:]{1,256}"
    BatchGetPreparedStatementOutput:
      type: object
      properties:
        PreparedStatements:
          $ref: "#/components/schemas/PreparedStatementDetailsList"
          description: The list of prepared statements returned.
        UnprocessedPreparedStatementNames:
          $ref: "#/components/schemas/UnprocessedPreparedStatementNameList"
          description: A list of one or more prepared statements that were requested but could not be returned.
    PreparedStatementDetailsList:
      type: array
      items:
        $ref: "#/components/schemas/PreparedStatement"
    PreparedStatement:
      description: A prepared SQL statement for use with Athena.
      type: object
      properties:
        StatementName:
          $ref: "#/components/schemas/StatementName"
          description: The name of the prepared statement.
        QueryStatement:
          $ref: "#/components/schemas/QueryString"
          description: The query string for the prepared statement.
        WorkGroupName:
          $ref: "#/components/schemas/WorkGroupName"
          description: The name of the workgroup to which the prepared statement belongs.
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: The description of the prepared statement.
        LastModifiedTime:
          $ref: "#/components/schemas/Date"
          description: The last modified time of the prepared statement.
    Date:
      type: string
      format: date-time
    UnprocessedPreparedStatementNameList:
      type: array
      items:
        $ref: "#/components/schemas/UnprocessedPreparedStatementName"
    UnprocessedPreparedStatementName:
      description: The name of a prepared statement that could not be returned.
      type: object
      properties:
        StatementName:
          $ref: "#/components/schemas/StatementName"
          description: The name of a prepared statement that could not be returned due to an error.
        ErrorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code returned when the request for the prepared statement failed.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: "The error message containing the reason why the prepared statement could not be returned. The following error messages are possible: INVALID_INPUT - The name of the prepared statement that was provided is not valid (for example, the name is too long). STATEMENT_NOT_FOUND - A prepared statement with the name provided could not be found. UNAUTHORIZED - The requester does not have permission to access the workgroup that contains the prepared statement."
    QueryExecutionIdList:
      type: array
      items:
        $ref: "#/components/schemas/QueryExecutionId"
    QueryExecutionId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: \S+
    BatchGetQueryExecutionOutput:
      type: object
      properties:
        QueryExecutions:
          $ref: "#/components/schemas/QueryExecutionList"
          description: Information about a query execution.
        UnprocessedQueryExecutionIds:
          $ref: "#/components/schemas/UnprocessedQueryExecutionIdList"
          description: Information about the query executions that failed to run.
    QueryExecutionList:
      type: array
      items:
        $ref: "#/components/schemas/QueryExecution"
    QueryExecution:
      description: Information about a single instance of a query execution.
      type: object
      properties:
        QueryExecutionId:
          $ref: "#/components/schemas/QueryExecutionId"
          description: The unique identifier for each query execution.
        Query:
          $ref: "#/components/schemas/QueryString"
          description: The SQL query statements which the query execution ran.
        StatementType:
          $ref: "#/components/schemas/StatementType"
          description: The type of query statement that was run. DDL indicates DDL query statements. DML indicates DML (Data Manipulation Language) query statements, such as CREATE TABLE AS SELECT. UTILITY indicates query statements other than DDL and DML, such as SHOW CREATE TABLE, EXPLAIN, DESCRIBE, or SHOW TABLES.
        ManagedQueryResultsConfiguration:
          $ref: "#/components/schemas/ManagedQueryResultsConfiguration"
          description: The configuration for storing results in Athena owned storage, which includes whether this feature is enabled; whether encryption configuration, if any, is used for encrypting query results.
        ResultConfiguration:
          $ref: "#/components/schemas/ResultConfiguration"
          description: The location in Amazon S3 where query and calculation results are stored and the encryption option, if any, used for query results. These are known as "client-side settings". If workgroup settings override client-side settings, then the query uses the location for the query results and the encryption configuration that are specified for the workgroup.
        ResultReuseConfiguration:
          $ref: "#/components/schemas/ResultReuseConfiguration"
          description: Specifies the query result reuse behavior that was used for the query.
        QueryExecutionContext:
          $ref: "#/components/schemas/QueryExecutionContext"
          description: The database in which the query execution occurred.
        Status:
          $ref: "#/components/schemas/QueryExecutionStatus"
          description: The completion date, current state, submission time, and state change reason (if applicable) for the query execution.
        Statistics:
          $ref: "#/components/schemas/QueryExecutionStatistics"
          description: Query execution statistics, such as the amount of data scanned, the amount of time that the query took to process, and the type of statement that was run.
        WorkGroup:
          $ref: "#/components/schemas/WorkGroupName"
          description: The name of the workgroup in which the query ran.
        EngineVersion:
          $ref: "#/components/schemas/EngineVersion"
          description: The engine version that executed the query.
        ExecutionParameters:
          $ref: "#/components/schemas/ExecutionParameters"
          description: A list of values for the parameters in a query. The values are applied sequentially to the parameters in the query in the order in which the parameters occur. The list of parameters is not returned in the response.
        SubstatementType:
          $ref: "#/components/schemas/String"
          description: The kind of query statement that was run.
        QueryResultsS3AccessGrantsConfiguration:
          $ref: "#/components/schemas/QueryResultsS3AccessGrantsConfiguration"
          description: Specifies whether Amazon S3 access grants are enabled for query results.
    StatementType:
      type: string
      enum:
        - DDL
        - DML
        - UTILITY
    ManagedQueryResultsConfiguration:
      description: The configuration for storing results in Athena owned storage, which includes whether this feature is enabled; whether encryption configuration, if any, is used for encrypting query results.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: If set to true, allows you to store query results in Athena owned storage. If set to false, workgroup member stores query results in location specified under ResultConfiguration$OutputLocation. The default is false. A workgroup cannot have the ResultConfiguration$OutputLocation parameter when you set this field to true.
        EncryptionConfiguration:
          $ref: "#/components/schemas/ManagedQueryResultsEncryptionConfiguration"
          description: If you encrypt query and calculation results in Athena owned storage, this field indicates the encryption option (for example, SSE_KMS or CSE_KMS) and key information.
      required:
        - Enabled
    Boolean:
      type: boolean
    ManagedQueryResultsEncryptionConfiguration:
      description: If you encrypt query and calculation results in Athena owned storage, this field indicates the encryption option (for example, SSE_KMS or CSE_KMS) and key information.
      type: object
      properties:
        KmsKey:
          $ref: "#/components/schemas/KmsKey"
          description: The ARN of an KMS key for encrypting managed query results.
      required:
        - KmsKey
    KmsKey:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^arn:aws[a-z\-]*:kms:([a-z0-9\-]+):\d{12}:key/?[a-zA-Z_0-9+=,.@\-_/]+$|^arn:aws[a-z\-]*:kms:([a-z0-9\-]+):\d{12}:alias/?[a-zA-Z_0-9+=,.@\-_/]+$|^alias/[a-zA-Z0-9/_-]+$|[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}
    ResultConfiguration:
      description: The location in Amazon S3 where query and calculation results are stored and the encryption option, if any, used for query and calculation results. These are known as "client-side settings". If workgroup settings override client-side settings, then the query uses the workgroup settings.
      type: object
      properties:
        OutputLocation:
          $ref: "#/components/schemas/ResultOutputLocation"
          description: "The location in Amazon S3 where your query and calculation results are stored, such as s3://path/to/query/bucket/. To run the query, you must specify the query results location using one of the ways: either for individual queries using either this setting (client-side), or in the workgroup, using WorkGroupConfiguration. If none of them is set, Athena issues an error that no output location is provided. If workgroup settings override client-side settings, then the query uses the settings specified for the workgroup. See WorkGroupConfiguration$EnforceWorkGroupConfiguration."
        EncryptionConfiguration:
          $ref: "#/components/schemas/EncryptionConfiguration"
          description: If query and calculation results are encrypted in Amazon S3, indicates the encryption option used (for example, SSE_KMS or CSE_KMS) and key information. This is a client-side setting. If workgroup settings override client-side settings, then the query uses the encryption configuration that is specified for the workgroup, and also uses the location for storing query results specified in the workgroup. See WorkGroupConfiguration$EnforceWorkGroupConfiguration and Workgroup Settings Override Client-Side Settings.
        ExpectedBucketOwner:
          $ref: "#/components/schemas/AwsAccountId"
          description: The Amazon Web Services account ID that you expect to be the owner of the Amazon S3 bucket specified by ResultConfiguration$OutputLocation. If set, Athena uses the value for ExpectedBucketOwner when it makes Amazon S3 calls to your specified output location. If the ExpectedBucketOwner Amazon Web Services account ID does not match the actual owner of the Amazon S3 bucket, the call fails with a permissions error. This is a client-side setting. If workgroup settings override client-side settings, then the query uses the ExpectedBucketOwner setting that is specified for the workgroup, and also uses the location for storing query results specified in the workgroup. See WorkGroupConfiguration$EnforceWorkGroupConfiguration and Workgroup Settings Override Client-Side Settings.
        AclConfiguration:
          $ref: "#/components/schemas/AclConfiguration"
          description: Indicates that an Amazon S3 canned ACL should be set to control ownership of stored query results. Currently the only supported canned ACL is BUCKET_OWNER_FULL_CONTROL. This is a client-side setting. If workgroup settings override client-side settings, then the query uses the ACL configuration that is specified for the workgroup, and also uses the location for storing query results specified in the workgroup. For more information, see WorkGroupConfiguration$EnforceWorkGroupConfiguration and Workgroup Settings Override Client-Side Settings.
    ResultOutputLocation:
      type: string
    EncryptionConfiguration:
      description: If query and calculation results are encrypted in Amazon S3, indicates the encryption option used (for example, SSE_KMS or CSE_KMS) and key information.
      type: object
      properties:
        EncryptionOption:
          $ref: "#/components/schemas/EncryptionOption"
          description: Indicates whether Amazon S3 server-side encryption with Amazon S3-managed keys (SSE_S3), server-side encryption with KMS-managed keys (SSE_KMS), or client-side encryption with KMS-managed keys (CSE_KMS) is used. If a query runs in a workgroup and the workgroup overrides client-side settings, then the workgroup's setting for encryption is used. It specifies whether query results must be encrypted, for all queries that run in this workgroup.
        KmsKey:
          $ref: "#/components/schemas/String"
          description: For SSE_KMS and CSE_KMS, this is the KMS key ARN or ID.
      required:
        - EncryptionOption
    EncryptionOption:
      type: string
      enum:
        - SSE_S3
        - SSE_KMS
        - CSE_KMS
    String:
      type: string
    AwsAccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: ^[0-9]+$
    AclConfiguration:
      description: Indicates that an Amazon S3 canned ACL should be set to control ownership of stored query results, including data files inserted by Athena as the result of statements like CTAS or INSERT INTO. When Athena stores query results in Amazon S3, the canned ACL is set with the x-amz-acl request header. For more information about S3 Object Ownership, see Object Ownership settings in the Amazon S3 User Guide.
      type: object
      properties:
        S3AclOption:
          $ref: "#/components/schemas/S3AclOption"
          description: The Amazon S3 canned ACL that Athena should specify when storing query results, including data files inserted by Athena as the result of statements like CTAS or INSERT INTO. Currently the only supported canned ACL is BUCKET_OWNER_FULL_CONTROL. If a query runs in a workgroup and the workgroup overrides client-side settings, then the Amazon S3 canned ACL specified in the workgroup's settings is used for all queries that run in the workgroup. For more information about Amazon S3 canned ACLs, see Canned ACL in the Amazon S3 User Guide.
      required:
        - S3AclOption
    S3AclOption:
      type: string
      enum:
        - BUCKET_OWNER_FULL_CONTROL
    ResultReuseConfiguration:
      description: Specifies the query result reuse behavior for the query.
      type: object
      properties:
        ResultReuseByAgeConfiguration:
          $ref: "#/components/schemas/ResultReuseByAgeConfiguration"
          description: Specifies whether previous query results are reused, and if so, their maximum age.
    ResultReuseByAgeConfiguration:
      description: Specifies whether previous query results are reused, and if so, their maximum age.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: True if previous query results can be reused when the query is run; otherwise, false. The default is false.
        MaxAgeInMinutes:
          $ref: "#/components/schemas/Age"
          description: Specifies, in minutes, the maximum age of a previous query result that Athena should consider for reuse. The default is 60.
      required:
        - Enabled
    Age:
      type: integer
      minimum: 0
      maximum: 10080
    QueryExecutionContext:
      description: The database and data catalog context in which the query execution occurs.
      type: object
      properties:
        Database:
          $ref: "#/components/schemas/DatabaseString"
          description: The name of the database used in the query execution. The database must exist in the catalog.
        Catalog:
          $ref: "#/components/schemas/CatalogNameString"
          description: The name of the data catalog used in the query execution.
    CatalogNameString:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    QueryExecutionStatus:
      description: The completion date, current state, submission time, and state change reason (if applicable) for the query execution.
      type: object
      properties:
        State:
          $ref: "#/components/schemas/QueryExecutionState"
          description: The state of query execution. QUEUED indicates that the query has been submitted to the service, and Athena will execute the query as soon as resources are available. RUNNING indicates that the query is in execution phase. SUCCEEDED indicates that the query completed without errors. FAILED indicates that the query experienced an error and did not complete processing. CANCELLED indicates that a user input interrupted query execution. For queries that experience certain transient errors, the state transitions from RUNNING back to QUEUED. The FAILED state is always terminal with no automatic retry.
        StateChangeReason:
          $ref: "#/components/schemas/String"
          description: Further detail about the status of the query.
        SubmissionDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time that the query was submitted.
        CompletionDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time that the query completed.
        AthenaError:
          $ref: "#/components/schemas/AthenaError"
          description: Provides information about an Athena query error.
    QueryExecutionState:
      type: string
      enum:
        - QUEUED
        - RUNNING
        - SUCCEEDED
        - FAILED
        - CANCELLED
    AthenaError:
      description: Provides information about an Athena query error. The AthenaError feature provides standardized error information to help you understand failed queries and take steps after a query failure occurs. AthenaError includes an ErrorCategory field that specifies whether the cause of the failed query is due to system error, user error, or other error.
      type: object
      properties:
        ErrorCategory:
          $ref: "#/components/schemas/ErrorCategory"
          description: An integer value that specifies the category of a query failure error. The following list shows the category for each integer value. 1 - System 2 - User 3 - Other
        ErrorType:
          $ref: "#/components/schemas/ErrorType"
          description: An integer value that provides specific information about an Athena query error. For the meaning of specific values, see the Error Type Reference in the Amazon Athena User Guide.
        Retryable:
          $ref: "#/components/schemas/Boolean"
          description: True if the query might succeed if resubmitted.
        ErrorMessage:
          $ref: "#/components/schemas/String"
          description: Contains a short description of the error that occurred.
    ErrorCategory:
      type: integer
      minimum: 1
      maximum: 3
    ErrorType:
      type: integer
      minimum: 0
      maximum: 9999
    QueryExecutionStatistics:
      description: The amount of data scanned during the query execution and the amount of time that it took to execute, and the type of statement that was run.
      type: object
      properties:
        EngineExecutionTimeInMillis:
          $ref: "#/components/schemas/Long"
          description: The number of milliseconds that the query took to execute.
        DataScannedInBytes:
          $ref: "#/components/schemas/Long"
          description: The number of bytes in the data that was queried.
        DataManifestLocation:
          $ref: "#/components/schemas/String"
          description: The location and file name of a data manifest file. The manifest file is saved to the Athena query results location in Amazon S3. The manifest file tracks files that the query wrote to Amazon S3. If the query fails, the manifest file also tracks files that the query intended to write. The manifest is useful for identifying orphaned files resulting from a failed query. For more information, see Working with Query Results, Output Files, and Query History in the Amazon Athena User Guide.
        TotalExecutionTimeInMillis:
          $ref: "#/components/schemas/Long"
          description: The number of milliseconds that Athena took to run the query.
        QueryQueueTimeInMillis:
          $ref: "#/components/schemas/Long"
          description: The number of milliseconds that the query was in your query queue waiting for resources. Note that if transient errors occur, Athena might automatically add the query back to the queue.
        ServicePreProcessingTimeInMillis:
          $ref: "#/components/schemas/Long"
          description: The number of milliseconds that Athena took to preprocess the query before submitting the query to the query engine.
        QueryPlanningTimeInMillis:
          $ref: "#/components/schemas/Long"
          description: The number of milliseconds that Athena took to plan the query processing flow. This includes the time spent retrieving table partitions from the data source. Note that because the query engine performs the query planning, query planning time is a subset of engine processing time.
        ServiceProcessingTimeInMillis:
          $ref: "#/components/schemas/Long"
          description: The number of milliseconds that Athena took to finalize and publish the query results after the query engine finished running the query.
        ResultReuseInformation:
          $ref: "#/components/schemas/ResultReuseInformation"
          description: Contains information about whether previous query results were reused for the query.
        DpuCount:
          $ref: "#/components/schemas/DpuCount"
          description: The number of Data Processing Units (DPUs) that Athena used to run the query.
    Long:
      type: integer
      format: int64
    ResultReuseInformation:
      description: Contains information about whether the result of a previous query was reused.
      type: object
      properties:
        ReusedPreviousResult:
          $ref: "#/components/schemas/Boolean"
          description: True if a previous query result was reused; false if the result was generated from a new run of the query.
      required:
        - ReusedPreviousResult
    DpuCount:
      type: number
      format: double
    EngineVersion:
      description: The Athena engine version for running queries, or the PySpark engine version for running sessions.
      type: object
      properties:
        SelectedEngineVersion:
          $ref: "#/components/schemas/NameString"
          description: The engine version requested by the user. Possible values are determined by the output of ListEngineVersions, including AUTO. The default is AUTO.
        EffectiveEngineVersion:
          $ref: "#/components/schemas/NameString"
          description: Read only. The engine version on which the query runs. If the user requests a valid engine version other than Auto, the effective engine version is the same as the engine version that the user requested. If the user requests Auto, the effective engine version is chosen by Athena. When a request to update the engine version is made by a CreateWorkGroup or UpdateWorkGroup operation, the EffectiveEngineVersion field is ignored.
    ExecutionParameters:
      type: array
      items:
        $ref: "#/components/schemas/ExecutionParameter"
    ExecutionParameter:
      type: string
      minLength: 1
      maxLength: 1024
    QueryResultsS3AccessGrantsConfiguration:
      description: Specifies whether Amazon S3 access grants are enabled for query results.
      type: object
      properties:
        EnableS3AccessGrants:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Specifies whether Amazon S3 access grants are enabled for query results.
        CreateUserLevelPrefix:
          $ref: "#/components/schemas/BoxedBoolean"
          description: When enabled, appends the user ID as an Amazon S3 path prefix to the query result output location.
        AuthenticationType:
          $ref: "#/components/schemas/AuthenticationType"
          description: The authentication type used for Amazon S3 access grants. Currently, only DIRECTORY_IDENTITY is supported.
      required:
        - EnableS3AccessGrants
        - AuthenticationType
    BoxedBoolean:
      type: boolean
    AuthenticationType:
      type: string
      enum:
        - DIRECTORY_IDENTITY
    UnprocessedQueryExecutionIdList:
      type: array
      items:
        $ref: "#/components/schemas/UnprocessedQueryExecutionId"
    UnprocessedQueryExecutionId:
      description: Describes a query execution that failed to process.
      type: object
      properties:
        QueryExecutionId:
          $ref: "#/components/schemas/QueryExecutionId"
          description: The unique identifier of the query execution.
        ErrorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code returned when the query execution failed to process, if applicable.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message returned when the query execution failed to process, if applicable.
    CapacityReservationName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9._-]+"
    CancelCapacityReservationOutput:
      type: object
    TargetDpusInteger:
      type: integer
      minimum: 4
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "A label that you assign to a resource. Athena resources include workgroups, data catalogs, and capacity reservations. Each tag consists of a key and an optional value, both of which you define. For example, you can use tags to categorize Athena resources by purpose, owner, or environment. Use a consistent set of tag keys to make it easier to search and filter the resources in your account. For best practices, see Tagging Best Practices. Tag keys can be from 1 to 128 UTF-8 Unicode characters, and tag values can be from 0 to 256 UTF-8 Unicode characters. Tags can use letters and numbers representable in UTF-8, and the following characters: + - = . _ : / @. Tag keys and values are case-sensitive. Tag keys must be unique per resource. If you specify more than one tag, separate them by commas."
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: "A tag key. The tag key length is from 1 to 128 Unicode characters in UTF-8. You can use letters and numbers representable in UTF-8, and the following characters: + - = . _ : / @. Tag keys are case-sensitive and must be unique per resource."
        Value:
          $ref: "#/components/schemas/TagValue"
          description: "A tag value. The tag value length is from 0 to 256 Unicode characters in UTF-8. You can use letters and numbers representable in UTF-8, and the following characters: + - = . _ : / @. Tag values are case-sensitive."
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    CreateCapacityReservationOutput:
      type: object
    DataCatalogType:
      type: string
      enum:
        - LAMBDA
        - GLUE
        - HIVE
        - FEDERATED
    ParametersMap:
      type: object
      properties: {}
    CreateDataCatalogOutput:
      type: object
      properties:
        DataCatalog:
          $ref: "#/components/schemas/DataCatalog"
    DataCatalog:
      description: Contains information about a data catalog in an Amazon Web Services account. In the Athena console, data catalogs are listed as "data sources" on the Data sources page under the Data source name column.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/CatalogNameString"
          description: The name of the data catalog. The catalog name must be unique for the Amazon Web Services account and can use a maximum of 127 alphanumeric, underscore, at sign, or hyphen characters. The remainder of the length constraint of 256 is reserved for use by Athena.
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: An optional description of the data catalog.
        Type:
          $ref: "#/components/schemas/DataCatalogType"
          description: "The type of data catalog to create: LAMBDA for a federated catalog, GLUE for an Glue Data Catalog, and HIVE for an external Apache Hive metastore. FEDERATED is a federated catalog for which Athena creates the connection and the Lambda function for you based on the parameters that you pass."
        Parameters:
          type: object
          properties: {}
          description: Specifies the Lambda function or functions to use for the data catalog. This is a mapping whose values depend on the catalog type. For the HIVE data catalog type, use the following syntax. The metadata-function parameter is required. The sdk-version parameter is optional and defaults to the currently supported version. metadata-function=lambda_arn, sdk-version=version_number For the LAMBDA data catalog type, use one of the following sets of required parameters, but not both. If you have one Lambda function that processes metadata and another for reading the actual data, use the following syntax. Both parameters are required. metadata-function=lambda_arn, record-function=lambda_arn If you have a composite Lambda function that processes both metadata and data, use the following syntax to specify your Lambda function. function=lambda_arn The GLUE type takes a catalog ID parameter and is required. The catalog_id is the account ID of the Amazon Web Services account to which the Glue catalog belongs. catalog-id=catalog_id The GLUE data catalog type also applies to the default AwsDataCatalog that already exists in your account, of which you can have only one and cannot modify. The FEDERATED data catalog type uses one of the following parameters, but not both. Use connection-arn for an existing Glue connection. Use connection-type and connection-properties to specify the configuration setting for a new connection. connection-arn:`<glue_connection_arn_to_reuse>` connection-type:MYSQL|REDSHIFT|...., connection-properties:"`<json_string>`" For `<json_string>` , use escaped JSON text, as in the following example. "{\"spill_bucket\":\"my_spill\",\"spill_prefix\":\"athena-spill\",\"host\":\"abc12345.snowflakecomputing.com\",\"port\":\"1234\",\"warehouse\":\"DEV_WH\",\"database\":\"TEST\",\"schema\":\"PUBLIC\",\"SecretArn\":\"arn:aws:secretsmanager:ap-south-1:111122223333:secret:snowflake-XHb67j\"}"
        Status:
          $ref: "#/components/schemas/DataCatalogStatus"
          description: "The status of the creation or deletion of the data catalog. The LAMBDA, GLUE, and HIVE data catalog types are created synchronously. Their status is either CREATE_COMPLETE or CREATE_FAILED. The FEDERATED data catalog type is created asynchronously. Data catalog creation status: CREATE_IN_PROGRESS: Federated data catalog creation in progress. CREATE_COMPLETE: Data catalog creation complete. CREATE_FAILED: Data catalog could not be created. CREATE_FAILED_CLEANUP_IN_PROGRESS: Federated data catalog creation failed and is being removed. CREATE_FAILED_CLEANUP_COMPLETE: Federated data catalog creation failed and was removed. CREATE_FAILED_CLEANUP_FAILED: Federated data catalog creation failed but could not be removed. Data catalog deletion status: DELETE_IN_PROGRESS: Federated data catalog deletion in progress. DELETE_COMPLETE: Federated data catalog deleted. DELETE_FAILED: Federated data catalog could not be deleted."
        ConnectionType:
          $ref: "#/components/schemas/ConnectionType"
          description: The type of connection for a FEDERATED data catalog (for example, REDSHIFT, MYSQL, or SQLSERVER). For information about individual connectors, see Available data source connectors.
        Error:
          $ref: "#/components/schemas/ErrorMessage"
          description: Text of the error that occurred during data catalog creation or deletion.
      required:
        - Name
        - Type
    DataCatalogStatus:
      type: string
      enum:
        - CREATE_IN_PROGRESS
        - CREATE_COMPLETE
        - CREATE_FAILED
        - CREATE_FAILED_CLEANUP_IN_PROGRESS
        - CREATE_FAILED_CLEANUP_COMPLETE
        - CREATE_FAILED_CLEANUP_FAILED
        - DELETE_IN_PROGRESS
        - DELETE_COMPLETE
        - DELETE_FAILED
    ConnectionType:
      type: string
      enum:
        - DYNAMODB
        - MYSQL
        - POSTGRESQL
        - REDSHIFT
        - ORACLE
        - SYNAPSE
        - SQLSERVER
        - DB2
        - OPENSEARCH
        - BIGQUERY
        - GOOGLECLOUDSTORAGE
        - HBASE
        - DOCUMENTDB
        - CMDB
        - TPCDS
        - TIMESTREAM
        - SAPHANA
        - SNOWFLAKE
        - DATALAKEGEN2
        - DB2AS400
    IdempotencyToken:
      type: string
      minLength: 32
      maxLength: 128
    CreateNamedQueryOutput:
      type: object
      properties:
        NamedQueryId:
          $ref: "#/components/schemas/NamedQueryId"
          description: The unique ID of the query.
    NotebookName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: (?!.*[/:\\])[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDC00-\uDBFF\uDFFF\t]+
    ClientRequestToken:
      type: string
      minLength: 1
      maxLength: 36
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    CreateNotebookOutput:
      type: object
      properties:
        NotebookId:
          $ref: "#/components/schemas/NotebookId"
          description: A unique identifier for the notebook.
    NotebookId:
      type: string
      minLength: 1
      maxLength: 36
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    CreatePreparedStatementOutput:
      type: object
    SessionId:
      type: string
      minLength: 1
      maxLength: 256
    CreatePresignedNotebookUrlResponse:
      type: object
      properties:
        NotebookUrl:
          $ref: "#/components/schemas/String"
          description: The URL of the notebook. The URL includes the authentication token and notebook file name and points directly to the opened notebook.
        AuthToken:
          $ref: "#/components/schemas/AuthToken"
          description: The authentication token for the notebook.
        AuthTokenExpirationTime:
          $ref: "#/components/schemas/Long"
          description: The UTC epoch time when the authentication token expires.
      required:
        - NotebookUrl
        - AuthToken
        - AuthTokenExpirationTime
    AuthToken:
      type: string
      maxLength: 2048
    WorkGroupConfiguration:
      description: The configuration of the workgroup, which includes the location in Amazon S3 where query and calculation results are stored, the encryption option, if any, used for query and calculation results, whether the Amazon CloudWatch Metrics are enabled for the workgroup and whether workgroup settings override query settings, and the data usage limits for the amount of data scanned per query or per workgroup. The workgroup settings override is specified in EnforceWorkGroupConfiguration (true/false) in the WorkGroupConfiguration. See WorkGroupConfiguration$EnforceWorkGroupConfiguration.
      type: object
      properties:
        ResultConfiguration:
          $ref: "#/components/schemas/ResultConfiguration"
          description: "The configuration for the workgroup, which includes the location in Amazon S3 where query and calculation results are stored and the encryption option, if any, used for query and calculation results. To run the query, you must specify the query results location using one of the ways: either in the workgroup using this setting, or for individual queries (client-side), using ResultConfiguration$OutputLocation. If none of them is set, Athena issues an error that no output location is provided."
        ManagedQueryResultsConfiguration:
          $ref: "#/components/schemas/ManagedQueryResultsConfiguration"
          description: The configuration for storing results in Athena owned storage, which includes whether this feature is enabled; whether encryption configuration, if any, is used for encrypting query results.
        EnforceWorkGroupConfiguration:
          $ref: "#/components/schemas/BoxedBoolean"
          description: If set to "true", the settings for the workgroup override client-side settings. If set to "false", client-side settings are used. This property is not required for Apache Spark enabled workgroups. For more information, see Workgroup Settings Override Client-Side Settings.
        PublishCloudWatchMetricsEnabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Indicates that the Amazon CloudWatch metrics are enabled for the workgroup.
        BytesScannedCutoffPerQuery:
          $ref: "#/components/schemas/BytesScannedCutoffValue"
          description: The upper data usage limit (cutoff) for the amount of bytes a single query in a workgroup is allowed to scan.
        RequesterPaysEnabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: If set to true, allows members assigned to a workgroup to reference Amazon S3 Requester Pays buckets in queries. If set to false, workgroup members cannot query data from Requester Pays buckets, and queries that retrieve data from Requester Pays buckets cause an error. The default is false. For more information about Requester Pays buckets, see Requester Pays Buckets in the Amazon Simple Storage Service Developer Guide.
        EngineVersion:
          $ref: "#/components/schemas/EngineVersion"
          description: The engine version that all queries running on the workgroup use. Queries on the AmazonAthenaPreviewFunctionality workgroup run on the preview engine regardless of this setting.
        AdditionalConfiguration:
          $ref: "#/components/schemas/NameString"
          description: Specifies a user defined JSON string that is passed to the notebook engine.
        ExecutionRole:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of the execution role used to access user resources for Spark sessions and IAM Identity Center enabled workgroups. This property applies only to Spark enabled workgroups and IAM Identity Center enabled workgroups. The property is required for IAM Identity Center enabled workgroups.
        MonitoringConfiguration:
          $ref: "#/components/schemas/MonitoringConfiguration"
          description: Contains the configuration settings for managed log persistence, delivering logs to Amazon S3 buckets, Amazon CloudWatch log groups etc.
        EngineConfiguration:
          $ref: "#/components/schemas/EngineConfiguration"
        CustomerContentEncryptionConfiguration:
          $ref: "#/components/schemas/CustomerContentEncryptionConfiguration"
          description: Specifies the KMS key that is used to encrypt the user's data stores in Athena. This setting does not apply to Athena SQL workgroups.
        EnableMinimumEncryptionConfiguration:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Enforces a minimal level of encryption for the workgroup for query and calculation results that are written to Amazon S3. When enabled, workgroup users can set encryption only to the minimum level set by the administrator or higher when they submit queries. The EnforceWorkGroupConfiguration setting takes precedence over the EnableMinimumEncryptionConfiguration flag. This means that if EnforceWorkGroupConfiguration is true, the EnableMinimumEncryptionConfiguration flag is ignored, and the workgroup configuration for encryption is used.
        IdentityCenterConfiguration:
          $ref: "#/components/schemas/IdentityCenterConfiguration"
          description: Specifies whether the workgroup is IAM Identity Center supported.
        QueryResultsS3AccessGrantsConfiguration:
          $ref: "#/components/schemas/QueryResultsS3AccessGrantsConfiguration"
          description: Specifies whether Amazon S3 access grants are enabled for query results.
    BytesScannedCutoffValue:
      type: integer
      format: int64
      minimum: 10000000
    RoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:aws[a-z\-]*:iam::\d{12}:role/?[a-zA-Z_0-9+=,.@\-_/]+$
    MonitoringConfiguration:
      description: Contains the configuration settings for managed log persistence, delivering logs to Amazon S3 buckets, Amazon CloudWatch log groups etc.
      type: object
      properties:
        CloudWatchLoggingConfiguration:
          $ref: "#/components/schemas/CloudWatchLoggingConfiguration"
          description: Configuration settings for delivering logs to Amazon CloudWatch log groups.
        ManagedLoggingConfiguration:
          $ref: "#/components/schemas/ManagedLoggingConfiguration"
          description: Configuration settings for managed log persistence.
        S3LoggingConfiguration:
          $ref: "#/components/schemas/S3LoggingConfiguration"
          description: Configuration settings for delivering logs to Amazon S3 buckets.
    CloudWatchLoggingConfiguration:
      description: Configuration settings for delivering logs to Amazon CloudWatch log groups.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Enables CloudWatch logging.
        LogGroup:
          $ref: "#/components/schemas/LogGroupName"
          description: The name of the log group in Amazon CloudWatch Logs where you want to publish your logs.
        LogStreamNamePrefix:
          $ref: "#/components/schemas/LogStreamNamePrefix"
          description: Prefix for the CloudWatch log stream name.
        LogTypes:
          type: object
          properties: {}
          description: The types of logs that you want to publish to CloudWatch.
      required:
        - Enabled
    LogGroupName:
      type: string
      minLength: 1
      maxLength: 512
      pattern: ^[a-zA-Z0-9._/-]+$
    LogStreamNamePrefix:
      type: string
      minLength: 1
      maxLength: 512
      pattern: ^[^:*]*$
    ManagedLoggingConfiguration:
      description: Configuration settings for delivering logs to Amazon S3 buckets.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Enables mamanged log persistence.
        KmsKey:
          $ref: "#/components/schemas/KmsKey"
          description: The KMS key ARN to encrypt the logs stored in managed log persistence.
      required:
        - Enabled
    S3LoggingConfiguration:
      description: Configuration settings for delivering logs to Amazon S3 buckets.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Enables S3 log delivery.
        KmsKey:
          $ref: "#/components/schemas/KmsKey"
          description: The KMS key ARN to encrypt the logs published to the given Amazon S3 destination.
        LogLocation:
          $ref: "#/components/schemas/S3OutputLocation"
          description: The Amazon S3 destination URI for log publishing.
      required:
        - Enabled
    S3OutputLocation:
      type: string
      maxLength: 1024
      pattern: ^s3://[a-z0-9][a-z0-9\-]*[a-z0-9](/.*)?$
    EngineConfiguration:
      description: "The engine configuration for the workgroup, which includes the minimum/maximum number of Data Processing Units (DPU) that queries should use when running in provisioned capacity. If not specified, Athena uses default values (Default value for min is 4 and for max is Minimum of 124 and allocated DPUs). To specify DPU values for PC queries the WG containing EngineConfiguration should have the following values: The name of the Classifications should be athena-query-engine-properties, with the only allowed properties as max-dpu-count and min-dpu-count."
      type: object
      properties:
        CoordinatorDpuSize:
          $ref: "#/components/schemas/CoordinatorDpuSize"
          description: The number of DPUs to use for the coordinator. A coordinator is a special executor that orchestrates processing work and manages other executors in a notebook session. The default is 1.
        MaxConcurrentDpus:
          $ref: "#/components/schemas/MaxConcurrentDpus"
          description: The maximum number of DPUs that can run concurrently.
        DefaultExecutorDpuSize:
          $ref: "#/components/schemas/DefaultExecutorDpuSize"
          description: The default number of DPUs to use for executors. An executor is the smallest unit of compute that a notebook session can request from Athena. The default is 1.
        AdditionalConfigs:
          type: object
          properties: {}
          description: Contains additional notebook engine MAP<string, string> parameter mappings in the form of key-value pairs. To specify an Athena notebook that the Jupyter server will download and serve, specify a value for the StartSessionRequest$NotebookVersion field, and then add a key named NotebookId to AdditionalConfigs that has the value of the Athena notebook ID.
        SparkProperties:
          type: object
          properties: {}
          description: Specifies custom jar files and Spark properties for use cases like cluster encryption, table formats, and general Spark tuning.
        Classifications:
          $ref: "#/components/schemas/ClassificationList"
          description: The configuration classifications that can be specified for the engine.
    CoordinatorDpuSize:
      type: integer
      minimum: 1
      maximum: 1
    MaxConcurrentDpus:
      type: integer
      minimum: 2
      maximum: 5000
    DefaultExecutorDpuSize:
      type: integer
      minimum: 1
      maximum: 1
    ClassificationList:
      type: array
      items:
        $ref: "#/components/schemas/Classification"
    Classification:
      description: A classification refers to a set of specific configurations.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the configuration classification.
        Properties:
          type: object
          properties: {}
          description: A set of properties specified within a configuration classification.
    CustomerContentEncryptionConfiguration:
      description: Specifies the customer managed KMS key that is used to encrypt the user's data stores in Athena. When an Amazon Web Services managed key is used, this value is null. This setting does not apply to Athena SQL workgroups.
      type: object
      properties:
        KmsKey:
          $ref: "#/components/schemas/KmsKey"
          description: The customer managed KMS key that is used to encrypt the user's data stores in Athena.
      required:
        - KmsKey
    IdentityCenterConfiguration:
      description: Specifies whether the workgroup is IAM Identity Center supported.
      type: object
      properties:
        EnableIdentityCenter:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Specifies whether the workgroup is IAM Identity Center supported.
        IdentityCenterInstanceArn:
          $ref: "#/components/schemas/IdentityCenterInstanceArn"
          description: The IAM Identity Center instance ARN that the workgroup associates to.
    IdentityCenterInstanceArn:
      type: string
      minLength: 0
      maxLength: 255
      pattern: ^arn:(aws|aws-us-gov|aws-cn|aws-iso|aws-iso-b):sso:::instance/(sso)?ins-[a-zA-Z0-9-.]{16}$
    WorkGroupDescriptionString:
      type: string
      minLength: 0
      maxLength: 1024
    CreateWorkGroupOutput:
      type: object
    DeleteCapacityReservationOutput:
      type: object
    DeleteDataCatalogOutput:
      type: object
      properties:
        DataCatalog:
          $ref: "#/components/schemas/DataCatalog"
    DeleteNamedQueryOutput:
      type: object
    DeleteNotebookOutput:
      type: object
    DeletePreparedStatementOutput:
      type: object
    DeleteWorkGroupOutput:
      type: object
    ExportNotebookOutput:
      type: object
      properties:
        NotebookMetadata:
          $ref: "#/components/schemas/NotebookMetadata"
          description: The notebook metadata, including notebook ID, notebook name, and workgroup name.
        Payload:
          $ref: "#/components/schemas/Payload"
          description: The content of the exported notebook.
    NotebookMetadata:
      description: Contains metadata for notebook, including the notebook name, ID, workgroup, and time created.
      type: object
      properties:
        NotebookId:
          $ref: "#/components/schemas/NotebookId"
          description: The notebook ID.
        Name:
          $ref: "#/components/schemas/NotebookName"
          description: The name of the notebook.
        WorkGroup:
          $ref: "#/components/schemas/WorkGroupName"
          description: The name of the Spark enabled workgroup to which the notebook belongs.
        CreationTime:
          $ref: "#/components/schemas/Date"
          description: The time when the notebook was created.
        Type:
          $ref: "#/components/schemas/NotebookType"
          description: The type of notebook. Currently, the only valid type is IPYNB.
        LastModifiedTime:
          $ref: "#/components/schemas/Date"
          description: The time when the notebook was last modified.
    NotebookType:
      type: string
      enum:
        - IPYNB
    Payload:
      type: string
      minLength: 1
      maxLength: 10485760
    CalculationExecutionId:
      type: string
      minLength: 1
      maxLength: 36
    GetCalculationExecutionResponse:
      type: object
      properties:
        CalculationExecutionId:
          $ref: "#/components/schemas/CalculationExecutionId"
          description: The calculation execution UUID.
        SessionId:
          $ref: "#/components/schemas/SessionId"
          description: The session ID that the calculation ran in.
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: The description of the calculation execution.
        WorkingDirectory:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 location in which calculation results are stored.
        Status:
          $ref: "#/components/schemas/CalculationStatus"
          description: Contains information about the status of the calculation.
        Statistics:
          $ref: "#/components/schemas/CalculationStatistics"
          description: Contains information about the data processing unit (DPU) execution time and progress. This field is populated only when statistics are available.
        Result:
          $ref: "#/components/schemas/CalculationResult"
          description: Contains result information. This field is populated only if the calculation is completed.
    S3Uri:
      type: string
      maxLength: 1024
      pattern: ^(https|s3|S3)://([^/]+)/?(.*)$
    CalculationStatus:
      description: Contains information about the status of a notebook calculation.
      type: object
      properties:
        SubmissionDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time the calculation was submitted for processing.
        CompletionDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time the calculation completed processing.
        State:
          $ref: "#/components/schemas/CalculationExecutionState"
          description: The state of the calculation execution. A description of each state follows. CREATING - The calculation is in the process of being created. CREATED - The calculation has been created and is ready to run. QUEUED - The calculation has been queued for processing. RUNNING - The calculation is running. CANCELING - A request to cancel the calculation has been received and the system is working to stop it. CANCELED - The calculation is no longer running as the result of a cancel request. COMPLETED - The calculation has completed without error. FAILED - The calculation failed and is no longer running.
        StateChangeReason:
          $ref: "#/components/schemas/DescriptionString"
          description: The reason for the calculation state change (for example, the calculation was canceled because the session was terminated).
    CalculationExecutionState:
      type: string
      enum:
        - CREATING
        - CREATED
        - QUEUED
        - RUNNING
        - CANCELING
        - CANCELED
        - COMPLETED
        - FAILED
    CalculationStatistics:
      description: Contains statistics for a notebook calculation.
      type: object
      properties:
        DpuExecutionInMillis:
          $ref: "#/components/schemas/Long"
          description: The data processing unit execution time in milliseconds for the calculation.
        Progress:
          $ref: "#/components/schemas/DescriptionString"
          description: The progress of the calculation.
    CalculationResult:
      description: Contains information about an application-specific calculation result.
      type: object
      properties:
        StdOutS3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 location of the stdout file for the calculation.
        StdErrorS3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 location of the stderr error messages file for the calculation.
        ResultS3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 location of the folder for the calculation results.
        ResultType:
          $ref: "#/components/schemas/CalculationResultType"
          description: The data format of the calculation result.
    CalculationResultType:
      type: string
      minLength: 1
      maxLength: 256
      pattern: \w+\/[-+.\w]+
    GetCalculationExecutionCodeResponse:
      type: object
      properties:
        CodeBlock:
          $ref: "#/components/schemas/CodeBlock"
          description: The unencrypted code that was executed for the calculation.
    CodeBlock:
      type: string
      maxLength: 68000
    GetCalculationExecutionStatusResponse:
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/CalculationStatus"
          description: Contains information about the calculation execution status.
        Statistics:
          $ref: "#/components/schemas/CalculationStatistics"
          description: Contains information about the DPU execution time and progress.
    GetCapacityAssignmentConfigurationOutput:
      type: object
      properties:
        CapacityAssignmentConfiguration:
          $ref: "#/components/schemas/CapacityAssignmentConfiguration"
          description: The requested capacity assignment configuration for the specified capacity reservation.
      required:
        - CapacityAssignmentConfiguration
    CapacityAssignmentConfiguration:
      description: Assigns Athena workgroups (and hence their queries) to capacity reservations. A capacity reservation can have only one capacity assignment configuration, but the capacity assignment configuration can be made up of multiple individual assignments. Each assignment specifies how Athena queries can consume capacity from the capacity reservation that their workgroup is mapped to.
      type: object
      properties:
        CapacityReservationName:
          $ref: "#/components/schemas/CapacityReservationName"
          description: The name of the reservation that the capacity assignment configuration is for.
        CapacityAssignments:
          $ref: "#/components/schemas/CapacityAssignmentsList"
          description: The list of assignments that make up the capacity assignment configuration.
    CapacityAssignmentsList:
      type: array
      items:
        $ref: "#/components/schemas/CapacityAssignment"
    CapacityAssignment:
      description: A mapping between one or more workgroups and a capacity reservation.
      type: object
      properties:
        WorkGroupNames:
          $ref: "#/components/schemas/WorkGroupNamesList"
          description: The list of workgroup names for the capacity assignment.
    WorkGroupNamesList:
      type: array
      items:
        $ref: "#/components/schemas/WorkGroupName"
    GetCapacityReservationOutput:
      type: object
      properties:
        CapacityReservation:
          $ref: "#/components/schemas/CapacityReservation"
          description: The requested capacity reservation structure.
      required:
        - CapacityReservation
    CapacityReservation:
      description: A reservation for a specified number of data processing units (DPUs). When a reservation is initially created, it has no DPUs. Athena allocates DPUs until the allocated amount equals the requested amount.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/CapacityReservationName"
          description: The name of the capacity reservation.
        Status:
          $ref: "#/components/schemas/CapacityReservationStatus"
          description: The status of the capacity reservation.
        TargetDpus:
          $ref: "#/components/schemas/TargetDpusInteger"
          description: The number of data processing units requested.
        AllocatedDpus:
          $ref: "#/components/schemas/AllocatedDpusInteger"
          description: The number of data processing units currently allocated.
        LastAllocation:
          $ref: "#/components/schemas/CapacityAllocation"
        LastSuccessfulAllocationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time of the most recent capacity allocation that succeeded.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time in UTC epoch millis when the capacity reservation was created.
      required:
        - Name
        - Status
        - TargetDpus
        - AllocatedDpus
        - CreationTime
    CapacityReservationStatus:
      type: string
      enum:
        - PENDING
        - ACTIVE
        - CANCELLING
        - CANCELLED
        - FAILED
        - UPDATE_PENDING
    AllocatedDpusInteger:
      type: integer
      minimum: 0
    CapacityAllocation:
      description: Contains the submission time of a single allocation request for a capacity reservation and the most recent status of the attempted allocation.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/CapacityAllocationStatus"
          description: The status of the capacity allocation.
        StatusMessage:
          $ref: "#/components/schemas/String"
          description: The status message of the capacity allocation.
        RequestTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the capacity allocation was requested.
        RequestCompletionTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the capacity allocation request was completed.
      required:
        - Status
        - RequestTime
    CapacityAllocationStatus:
      type: string
      enum:
        - PENDING
        - SUCCEEDED
        - FAILED
    Timestamp:
      type: string
      format: date-time
    GetDataCatalogOutput:
      type: object
      properties:
        DataCatalog:
          $ref: "#/components/schemas/DataCatalog"
          description: The data catalog returned.
    GetDatabaseOutput:
      type: object
      properties:
        Database:
          $ref: "#/components/schemas/Database"
          description: The database returned.
    Database:
      description: Contains metadata information for a database in a data catalog.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the database.
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: An optional description of the database.
        Parameters:
          type: object
          properties: {}
          description: A set of custom key/value pairs.
      required:
        - Name
    GetNamedQueryOutput:
      type: object
      properties:
        NamedQuery:
          $ref: "#/components/schemas/NamedQuery"
          description: Information about the query.
    GetNotebookMetadataOutput:
      type: object
      properties:
        NotebookMetadata:
          $ref: "#/components/schemas/NotebookMetadata"
          description: The metadata that is returned for the specified notebook ID.
    GetPreparedStatementOutput:
      type: object
      properties:
        PreparedStatement:
          $ref: "#/components/schemas/PreparedStatement"
          description: The name of the prepared statement that was retrieved.
    GetQueryExecutionOutput:
      type: object
      properties:
        QueryExecution:
          $ref: "#/components/schemas/QueryExecution"
          description: Information about the query execution.
    Token:
      type: string
      minLength: 1
      maxLength: 1024
    MaxQueryResults:
      type: integer
      minimum: 1
      maximum: 1000
    QueryResultType:
      type: string
      enum:
        - DATA_MANIFEST
        - DATA_ROWS
    GetQueryResultsOutput:
      type: object
      properties:
        UpdateCount:
          $ref: "#/components/schemas/Long"
          description: The number of rows inserted with a CREATE TABLE AS SELECT, INSERT INTO, or UPDATE statement.
        ResultSet:
          $ref: "#/components/schemas/ResultSet"
          description: The results of the query execution.
        NextToken:
          $ref: "#/components/schemas/Token"
          description: A token generated by the Athena service that specifies where to continue pagination if a previous request was truncated. To obtain the next set of pages, pass in the NextToken from the response object of the previous page call.
    ResultSet:
      description: The metadata and rows that make up a query result set. The metadata describes the column structure and data types. To return a ResultSet object, use GetQueryResults.
      type: object
      properties:
        Rows:
          $ref: "#/components/schemas/RowList"
          description: The rows in the table.
        ResultSetMetadata:
          $ref: "#/components/schemas/ResultSetMetadata"
          description: The metadata that describes the column structure and data types of a table of query results.
    RowList:
      type: array
      items:
        $ref: "#/components/schemas/Row"
    Row:
      description: The rows that make up a query result table.
      type: object
      properties:
        Data:
          $ref: "#/components/schemas/datumList"
          description: The data that populates a row in a query result table.
    datumList:
      type: array
      items:
        $ref: "#/components/schemas/Datum"
    Datum:
      description: A piece of data (a field in the table).
      type: object
      properties:
        VarCharValue:
          $ref: "#/components/schemas/datumString"
          description: The value of the datum.
    datumString:
      type: string
    ResultSetMetadata:
      description: The metadata that describes the column structure and data types of a table of query results. To return a ResultSetMetadata object, use GetQueryResults.
      type: object
      properties:
        ColumnInfo:
          $ref: "#/components/schemas/ColumnInfoList"
          description: Information about the columns returned in a query result metadata.
    ColumnInfoList:
      type: array
      items:
        $ref: "#/components/schemas/ColumnInfo"
    ColumnInfo:
      description: Information about the columns in a query execution result.
      type: object
      properties:
        CatalogName:
          $ref: "#/components/schemas/String"
          description: The catalog to which the query results belong.
        SchemaName:
          $ref: "#/components/schemas/String"
          description: The schema name (database name) to which the query results belong.
        TableName:
          $ref: "#/components/schemas/String"
          description: The table name for the query results.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the column.
        Label:
          $ref: "#/components/schemas/String"
          description: A column label.
        Type:
          $ref: "#/components/schemas/String"
          description: The data type of the column.
        Precision:
          $ref: "#/components/schemas/Integer"
          description: For DECIMAL data types, specifies the total number of digits, up to 38. For performance reasons, we recommend up to 18 digits.
        Scale:
          $ref: "#/components/schemas/Integer"
          description: For DECIMAL data types, specifies the total number of digits in the fractional part of the value. Defaults to 0.
        Nullable:
          $ref: "#/components/schemas/ColumnNullable"
          description: Unsupported constraint. This value always shows as UNKNOWN.
        CaseSensitive:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether values in the column are case-sensitive.
      required:
        - Name
        - Type
    Integer:
      type: integer
    ColumnNullable:
      type: string
      enum:
        - NOT_NULL
        - NULLABLE
        - UNKNOWN
    GetQueryRuntimeStatisticsOutput:
      type: object
      properties:
        QueryRuntimeStatistics:
          $ref: "#/components/schemas/QueryRuntimeStatistics"
          description: Runtime statistics about the query execution.
    QueryRuntimeStatistics:
      description: The query execution timeline, statistics on input and output rows and bytes, and the different query stages that form the query execution plan.
      type: object
      properties:
        Timeline:
          $ref: "#/components/schemas/QueryRuntimeStatisticsTimeline"
        Rows:
          $ref: "#/components/schemas/QueryRuntimeStatisticsRows"
        OutputStage:
          $ref: "#/components/schemas/QueryStage"
          description: Stage statistics such as input and output rows and bytes, execution time, and stage state. This information also includes substages and the query stage plan.
    QueryRuntimeStatisticsTimeline:
      description: Timeline statistics such as query queue time, planning time, execution time, service processing time, and total execution time.
      type: object
      properties:
        QueryQueueTimeInMillis:
          $ref: "#/components/schemas/Long"
          description: The number of milliseconds that the query was in your query queue waiting for resources. Note that if transient errors occur, Athena might automatically add the query back to the queue.
        ServicePreProcessingTimeInMillis:
          $ref: "#/components/schemas/Long"
          description: The number of milliseconds that Athena spends on preprocessing before it submits the query to the engine.
        QueryPlanningTimeInMillis:
          $ref: "#/components/schemas/Long"
          description: The number of milliseconds that Athena took to plan the query processing flow. This includes the time spent retrieving table partitions from the data source. Note that because the query engine performs the query planning, query planning time is a subset of engine processing time.
        EngineExecutionTimeInMillis:
          $ref: "#/components/schemas/Long"
          description: The number of milliseconds that the query took to execute.
        ServiceProcessingTimeInMillis:
          $ref: "#/components/schemas/Long"
          description: The number of milliseconds that Athena took to finalize and publish the query results after the query engine finished running the query.
        TotalExecutionTimeInMillis:
          $ref: "#/components/schemas/Long"
          description: The number of milliseconds that Athena took to run the query.
    QueryRuntimeStatisticsRows:
      description: Statistics such as input rows and bytes read by the query, rows and bytes output by the query, and the number of rows written by the query.
      type: object
      properties:
        InputRows:
          $ref: "#/components/schemas/Long"
          description: The number of rows read to execute the query.
        InputBytes:
          $ref: "#/components/schemas/Long"
          description: The number of bytes read to execute the query.
        OutputBytes:
          $ref: "#/components/schemas/Long"
          description: The number of bytes returned by the query.
        OutputRows:
          $ref: "#/components/schemas/Long"
          description: The number of rows returned by the query.
    QueryStage:
      description: Stage statistics such as input and output rows and bytes, execution time and stage state. This information also includes substages and the query stage plan.
      type: object
      properties:
        StageId:
          $ref: "#/components/schemas/Long"
          description: The identifier for a stage.
        State:
          $ref: "#/components/schemas/String"
          description: State of the stage after query execution.
        OutputBytes:
          $ref: "#/components/schemas/Long"
          description: The number of bytes output from the stage after execution.
        OutputRows:
          $ref: "#/components/schemas/Long"
          description: The number of rows output from the stage after execution.
        InputBytes:
          $ref: "#/components/schemas/Long"
          description: The number of bytes input into the stage for execution.
        InputRows:
          $ref: "#/components/schemas/Long"
          description: The number of rows input into the stage for execution.
        ExecutionTime:
          $ref: "#/components/schemas/Long"
          description: Time taken to execute this stage.
        QueryStagePlan:
          $ref: "#/components/schemas/QueryStagePlanNode"
          description: Stage plan information such as name, identifier, sub plans, and source stages.
        SubStages:
          $ref: "#/components/schemas/QueryStages"
          description: List of sub query stages that form this stage execution plan.
    QueryStagePlanNode:
      description: Stage plan information such as name, identifier, sub plans, and remote sources.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: Name of the query stage plan that describes the operation this stage is performing as part of query execution.
        Identifier:
          $ref: "#/components/schemas/String"
          description: Information about the operation this query stage plan node is performing.
        Children:
          $ref: "#/components/schemas/QueryStagePlanNodes"
          description: Stage plan information such as name, identifier, sub plans, and remote sources of child plan nodes/
        RemoteSources:
          $ref: "#/components/schemas/StringList"
          description: Source plan node IDs.
    QueryStagePlanNodes:
      type: array
      items:
        $ref: "#/components/schemas/QueryStagePlanNode"
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    QueryStages:
      type: array
      items:
        $ref: "#/components/schemas/QueryStage"
    AmazonResourceName:
      type: string
      minLength: 1
      maxLength: 1011
    GetResourceDashboardResponse:
      type: object
      properties:
        Url:
          $ref: "#/components/schemas/String"
          description: The Live UI/Persistence UI url for a session.
      required:
        - Url
    GetSessionResponse:
      type: object
      properties:
        SessionId:
          $ref: "#/components/schemas/SessionId"
          description: The session ID.
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: The session description.
        WorkGroup:
          $ref: "#/components/schemas/WorkGroupName"
          description: The workgroup to which the session belongs.
        EngineVersion:
          $ref: "#/components/schemas/NameString"
          description: The engine version used by the session (for example, PySpark engine version 3). You can get a list of engine versions by calling ListEngineVersions.
        EngineConfiguration:
          $ref: "#/components/schemas/EngineConfiguration"
          description: Contains engine configuration information like DPU usage.
        NotebookVersion:
          $ref: "#/components/schemas/NameString"
          description: The notebook version.
        MonitoringConfiguration:
          $ref: "#/components/schemas/MonitoringConfiguration"
        SessionConfiguration:
          $ref: "#/components/schemas/SessionConfiguration"
          description: Contains the workgroup configuration information used by the session.
        Status:
          $ref: "#/components/schemas/SessionStatus"
          description: Contains information about the status of the session.
        Statistics:
          $ref: "#/components/schemas/SessionStatistics"
          description: Contains the DPU execution time.
    SessionConfiguration:
      description: Contains session configuration information.
      type: object
      properties:
        ExecutionRole:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of the execution role used to access user resources for Spark sessions and Identity Center enabled workgroups. This property applies only to Spark enabled workgroups and Identity Center enabled workgroups.
        WorkingDirectory:
          $ref: "#/components/schemas/ResultOutputLocation"
          description: The Amazon S3 location that stores information for the notebook.
        IdleTimeoutSeconds:
          $ref: "#/components/schemas/Long"
          description: The idle timeout in seconds for the session.
        SessionIdleTimeoutInMinutes:
          $ref: "#/components/schemas/SessionIdleTimeoutInMinutes"
          description: The idle timeout in seconds for the session.
        EncryptionConfiguration:
          $ref: "#/components/schemas/EncryptionConfiguration"
