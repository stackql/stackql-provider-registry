    WorkGroupConfigurationUpdates:
      description: The configuration information that will be updated for this workgroup, which includes the location in Amazon S3 where query and calculation results are stored, the encryption option, if any, used for query results, whether the Amazon CloudWatch Metrics are enabled for the workgroup, whether the workgroup settings override the client-side settings, and the data usage limit for the amount of bytes scanned per query, if it is specified.
      type: object
      properties:
        EnforceWorkGroupConfiguration:
          $ref: "#/components/schemas/BoxedBoolean"
          description: If set to "true", the settings for the workgroup override client-side settings. If set to "false" client-side settings are used. For more information, see Workgroup Settings Override Client-Side Settings.
        ResultConfigurationUpdates:
          $ref: "#/components/schemas/ResultConfigurationUpdates"
          description: The result configuration information about the queries in this workgroup that will be updated. Includes the updated results location and an updated option for encrypting query results.
        ManagedQueryResultsConfigurationUpdates:
          $ref: "#/components/schemas/ManagedQueryResultsConfigurationUpdates"
          description: Updates configuration information for managed query results in the workgroup.
        PublishCloudWatchMetricsEnabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Indicates whether this workgroup enables publishing metrics to Amazon CloudWatch.
        BytesScannedCutoffPerQuery:
          $ref: "#/components/schemas/BytesScannedCutoffValue"
          description: The upper limit (cutoff) for the amount of bytes a single query in a workgroup is allowed to scan.
        RemoveBytesScannedCutoffPerQuery:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Indicates that the data usage control limit per query is removed. WorkGroupConfiguration$BytesScannedCutoffPerQuery
        RequesterPaysEnabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: If set to true, allows members assigned to a workgroup to specify Amazon S3 Requester Pays buckets in queries. If set to false, workgroup members cannot query data from Requester Pays buckets, and queries that retrieve data from Requester Pays buckets cause an error. The default is false. For more information about Requester Pays buckets, see Requester Pays Buckets in the Amazon Simple Storage Service Developer Guide.
        EngineVersion:
          $ref: "#/components/schemas/EngineVersion"
          description: The engine version requested when a workgroup is updated. After the update, all queries on the workgroup run on the requested engine version. If no value was previously set, the default is Auto. Queries on the AmazonAthenaPreviewFunctionality workgroup run on the preview engine regardless of this setting.
        RemoveCustomerContentEncryptionConfiguration:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Removes content encryption configuration from an Apache Spark-enabled Athena workgroup.
        AdditionalConfiguration:
          $ref: "#/components/schemas/NameString"
          description: Contains a user defined string in JSON format for a Spark-enabled workgroup.
        ExecutionRole:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of the execution role used to access user resources for Spark sessions and Identity Center enabled workgroups. This property applies only to Spark enabled workgroups and Identity Center enabled workgroups.
        CustomerContentEncryptionConfiguration:
          $ref: "#/components/schemas/CustomerContentEncryptionConfiguration"
        EnableMinimumEncryptionConfiguration:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Enforces a minimal level of encryption for the workgroup for query and calculation results that are written to Amazon S3. When enabled, workgroup users can set encryption only to the minimum level set by the administrator or higher when they submit queries. This setting does not apply to Spark-enabled workgroups. The EnforceWorkGroupConfiguration setting takes precedence over the EnableMinimumEncryptionConfiguration flag. This means that if EnforceWorkGroupConfiguration is true, the EnableMinimumEncryptionConfiguration flag is ignored, and the workgroup configuration for encryption is used.
        QueryResultsS3AccessGrantsConfiguration:
          $ref: "#/components/schemas/QueryResultsS3AccessGrantsConfiguration"
          description: Specifies whether Amazon S3 access grants are enabled for query results.
        MonitoringConfiguration:
          $ref: "#/components/schemas/MonitoringConfiguration"
          description: Contains the configuration settings for managed log persistence, delivering logs to Amazon S3 buckets, Amazon CloudWatch log groups etc.
        EngineConfiguration:
          $ref: "#/components/schemas/EngineConfiguration"
    ResultConfigurationUpdates:
      description: The information about the updates in the query results, such as output location and encryption configuration for the query results.
      type: object
      properties:
        OutputLocation:
          $ref: "#/components/schemas/ResultOutputLocation"
          description: The location in Amazon S3 where your query and calculation results are stored, such as s3://path/to/query/bucket/. If workgroup settings override client-side settings, then the query uses the location for the query results and the encryption configuration that are specified for the workgroup. The "workgroup settings override" is specified in EnforceWorkGroupConfiguration (true/false) in the WorkGroupConfiguration. See WorkGroupConfiguration$EnforceWorkGroupConfiguration.
        RemoveOutputLocation:
          $ref: "#/components/schemas/BoxedBoolean"
          description: If set to "true", indicates that the previously-specified query results location (also known as a client-side setting) for queries in this workgroup should be ignored and set to null. If set to "false" or not set, and a value is present in the OutputLocation in ResultConfigurationUpdates (the client-side setting), the OutputLocation in the workgroup's ResultConfiguration will be updated with the new value. For more information, see Workgroup Settings Override Client-Side Settings.
        EncryptionConfiguration:
          $ref: "#/components/schemas/EncryptionConfiguration"
          description: The encryption configuration for query and calculation results.
        RemoveEncryptionConfiguration:
          $ref: "#/components/schemas/BoxedBoolean"
          description: If set to "true", indicates that the previously-specified encryption configuration (also known as the client-side setting) for queries in this workgroup should be ignored and set to null. If set to "false" or not set, and a value is present in the EncryptionConfiguration in ResultConfigurationUpdates (the client-side setting), the EncryptionConfiguration in the workgroup's ResultConfiguration will be updated with the new value. For more information, see Workgroup Settings Override Client-Side Settings.
        ExpectedBucketOwner:
          $ref: "#/components/schemas/AwsAccountId"
          description: The Amazon Web Services account ID that you expect to be the owner of the Amazon S3 bucket specified by ResultConfiguration$OutputLocation. If set, Athena uses the value for ExpectedBucketOwner when it makes Amazon S3 calls to your specified output location. If the ExpectedBucketOwner Amazon Web Services account ID does not match the actual owner of the Amazon S3 bucket, the call fails with a permissions error. If workgroup settings override client-side settings, then the query uses the ExpectedBucketOwner setting that is specified for the workgroup, and also uses the location for storing query results specified in the workgroup. See WorkGroupConfiguration$EnforceWorkGroupConfiguration and Workgroup Settings Override Client-Side Settings.
        RemoveExpectedBucketOwner:
          $ref: "#/components/schemas/BoxedBoolean"
          description: If set to "true", removes the Amazon Web Services account ID previously specified for ResultConfiguration$ExpectedBucketOwner. If set to "false" or not set, and a value is present in the ExpectedBucketOwner in ResultConfigurationUpdates (the client-side setting), the ExpectedBucketOwner in the workgroup's ResultConfiguration is updated with the new value. For more information, see Workgroup Settings Override Client-Side Settings.
        AclConfiguration:
          $ref: "#/components/schemas/AclConfiguration"
          description: The ACL configuration for the query results.
        RemoveAclConfiguration:
          $ref: "#/components/schemas/BoxedBoolean"
          description: If set to true, indicates that the previously-specified ACL configuration for queries in this workgroup should be ignored and set to null. If set to false or not set, and a value is present in the AclConfiguration of ResultConfigurationUpdates, the AclConfiguration in the workgroup's ResultConfiguration is updated with the new value. For more information, see Workgroup Settings Override Client-Side Settings.
    ManagedQueryResultsConfigurationUpdates:
      description: Updates the configuration for managed query results.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: If set to true, specifies that Athena manages query results in Athena owned storage.
        EncryptionConfiguration:
          $ref: "#/components/schemas/ManagedQueryResultsEncryptionConfiguration"
          description: If you encrypt query and calculation results in Athena owned storage, this field indicates the encryption option (for example, SSE_KMS or CSE_KMS) and key information.
        RemoveEncryptionConfiguration:
          $ref: "#/components/schemas/BoxedBoolean"
          description: If set to true, it removes workgroup from Athena owned storage. The existing query results are cleaned up after 24hrs. You must provide query results in location specified under ResultConfiguration$OutputLocation.
    UpdateWorkGroupOutput:
      type: object
