    post:
      operationId: ListCalculationExecutions
      description: Lists the calculations that have been submitted to a session in descending order. Newer calculations are listed first; older calculations are listed later.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.ListCalculationExecutions
            default: AmazonAthena.ListCalculationExecutions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SessionId:
                  $ref: "#/components/schemas/SessionId"
                  description: The session ID.
                StateFilter:
                  $ref: "#/components/schemas/CalculationExecutionState"
                  description: A filter for a specific calculation execution state. A description of each state follows. CREATING - The calculation is in the process of being created. CREATED - The calculation has been created and is ready to run. QUEUED - The calculation has been queued for processing. RUNNING - The calculation is running. CANCELING - A request to cancel the calculation has been received and the system is working to stop it. CANCELED - The calculation is no longer running as the result of a cancel request. COMPLETED - The calculation has completed without error. FAILED - The calculation failed and is no longer running.
                MaxResults:
                  $ref: "#/components/schemas/MaxCalculationsCount"
                  description: The maximum number of calculation executions to return.
                NextToken:
                  $ref: "#/components/schemas/SessionManagerToken"
                  description: A token generated by the Athena service that specifies where to continue pagination if a previous request was truncated. To obtain the next set of pages, pass in the NextToken from the response object of the previous page call.
              required:
                - SessionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCalculationExecutionsResponse"
