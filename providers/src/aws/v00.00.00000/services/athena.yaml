                  $ref: "#/components/schemas/WorkGroupName"
                  description: The name of the workgroup in which the query is being started.
                ExecutionParameters:
                  $ref: "#/components/schemas/ExecutionParameters"
                  description: A list of values for the parameters in a query. The values are applied sequentially to the parameters in the query in the order in which the parameters occur.
                ResultReuseConfiguration:
                  $ref: "#/components/schemas/ResultReuseConfiguration"
                  description: Specifies the query result reuse behavior for the query.
                EngineConfiguration:
                  $ref: "#/components/schemas/EngineConfiguration"
                  description: "The engine configuration for the workgroup, which includes the minimum/maximum number of Data Processing Units (DPU) that queries should use when running in provisioned capacity. If not specified, Athena uses default values (Default value for min is 4 and for max is Minimum of 124 and allocated DPUs). To specify minimum and maximum DPU values for Capacity Reservations queries, the workgroup containing EngineConfiguration should have the following values: The name of the Classifications should be athena-query-engine-properties, with the only allowed properties as max-dpu-count and min-dpu-count."
              required:
                - QueryString
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartQueryExecutionOutput"
