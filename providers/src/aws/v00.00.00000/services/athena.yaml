openapi: 3.0.0
info:
  version: "2017-05-18"
  title: Amazon Athena
  description: Amazon Athena
  x-serviceName: athena
  x-serviceAlias: athena
  x-protocol: json
  x-apiVersion: "2017-05-18"
  x-endpointPrefix: athena
  x-targetPrefix: AmazonAthena
  x-jsonVersion: "1.1"
servers:
  - url: https://athena.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for athena
paths:
  /BatchGetNamedQuery:
    post:
      operationId: BatchGetNamedQuery
      description: Returns the details of a single named query or a list of up to 50 queries, which you provide as an array of query ID strings. Requires you to have access to the workgroup in which the queries were saved. Use ListNamedQueriesInput to get the list of named query IDs in the specified workgroup. If information could not be retrieved for a submitted query ID, information about the query ID submitted is listed under UnprocessedNamedQueryId. Named queries differ from executed queries. Use BatchGetQueryExecutionInput to get details about each unique query execution, and ListQueryExecutionsInput to get a list of query execution IDs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.BatchGetNamedQuery
            default: AmazonAthena.BatchGetNamedQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NamedQueryIds:
                  $ref: "#/components/schemas/NamedQueryIdList"
                  description: An array of query IDs.
              required:
                - NamedQueryIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetNamedQueryOutput"
  /BatchGetPreparedStatement:
    post:
      operationId: BatchGetPreparedStatement
      description: Returns the details of a single prepared statement or a list of up to 256 prepared statements for the array of prepared statement names that you provide. Requires you to have access to the workgroup to which the prepared statements belong. If a prepared statement cannot be retrieved for the name specified, the statement is listed in UnprocessedPreparedStatementNames.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.BatchGetPreparedStatement
            default: AmazonAthena.BatchGetPreparedStatement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PreparedStatementNames:
                  $ref: "#/components/schemas/PreparedStatementNameList"
                  description: A list of prepared statement names to return.
                WorkGroup:
                  $ref: "#/components/schemas/WorkGroupName"
                  description: The name of the workgroup to which the prepared statements belong.
              required:
                - PreparedStatementNames
                - WorkGroup
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetPreparedStatementOutput"
  /BatchGetQueryExecution:
    post:
      operationId: BatchGetQueryExecution
      description: Returns the details of a single query execution or a list of up to 50 query executions, which you provide as an array of query execution ID strings. Requires you to have access to the workgroup in which the queries ran. To get a list of query execution IDs, use ListQueryExecutionsInput$WorkGroup. Query executions differ from named (saved) queries. Use BatchGetNamedQueryInput to get details about named queries.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.BatchGetQueryExecution
            default: AmazonAthena.BatchGetQueryExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                QueryExecutionIds:
                  $ref: "#/components/schemas/QueryExecutionIdList"
                  description: An array of query execution IDs.
              required:
                - QueryExecutionIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetQueryExecutionOutput"
  /CancelCapacityReservation:
    post:
      operationId: CancelCapacityReservation
      description: Cancels the capacity reservation with the specified name. Cancelled reservations remain in your account and will be deleted 45 days after cancellation. During the 45 days, you cannot re-purpose or reuse a reservation that has been cancelled, but you can refer to its tags and view it for historical reference.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.CancelCapacityReservation
            default: AmazonAthena.CancelCapacityReservation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/CapacityReservationName"
                  description: The name of the capacity reservation to cancel.
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelCapacityReservationOutput"
  /CreateCapacityReservation:
    post:
      operationId: CreateCapacityReservation
      description: Creates a capacity reservation with the specified name and number of requested data processing units.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.CreateCapacityReservation
            default: AmazonAthena.CreateCapacityReservation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TargetDpus:
                  $ref: "#/components/schemas/TargetDpusInteger"
                  description: The number of requested data processing units.
                Name:
                  $ref: "#/components/schemas/CapacityReservationName"
                  description: The name of the capacity reservation to create.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags for the capacity reservation.
              required:
                - TargetDpus
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCapacityReservationOutput"
  /CreateDataCatalog:
    post:
      operationId: CreateDataCatalog
      description: Creates (registers) a data catalog with the specified name and properties. Catalogs created are visible to all users of the same Amazon Web Services account. For a FEDERATED catalog, this API operation creates the following resources. CFN Stack Name with a maximum length of 128 characters and prefix athenafederatedcatalog-CATALOG_NAME_SANITIZED with length 23 characters. Lambda Function Name with a maximum length of 64 characters and prefix athenafederatedcatalog_CATALOG_NAME_SANITIZED with length 23 characters. Glue Connection Name with a maximum length of 255 characters and a prefix athenafederatedcatalog_CATALOG_NAME_SANITIZED with length 23 characters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.CreateDataCatalog
            default: AmazonAthena.CreateDataCatalog
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/CatalogNameString"
                  description: "The name of the data catalog to create. The catalog name must be unique for the Amazon Web Services account and can use a maximum of 127 alphanumeric, underscore, at sign, or hyphen characters. The remainder of the length constraint of 256 is reserved for use by Athena. For FEDERATED type the catalog name has following considerations and limits: The catalog name allows special characters such as _ , @ , \\ , - . These characters are replaced with a hyphen (-) when creating the CFN Stack Name and with an underscore (_) when creating the Lambda Function and Glue Connection Name. The catalog name has a theoretical limit of 128 characters. However, since we use it to create other resources that allow less characters and we prepend a prefix to it, the actual catalog name limit for FEDERATED catalog is 64 - 23 = 41 characters."
                Type:
                  $ref: "#/components/schemas/DataCatalogType"
                  description: "The type of data catalog to create: LAMBDA for a federated catalog, GLUE for an Glue Data Catalog, and HIVE for an external Apache Hive metastore. FEDERATED is a federated catalog for which Athena creates the connection and the Lambda function for you based on the parameters that you pass. For FEDERATED type, we do not support IAM identity center."
                Description:
                  $ref: "#/components/schemas/DescriptionString"
                  description: A description of the data catalog to be created.
                Parameters:
                  $ref: "#/components/schemas/ParametersMap"
                  description: 'Specifies the Lambda function or functions to use for creating the data catalog. This is a mapping whose values depend on the catalog type. For the HIVE data catalog type, use the following syntax. The metadata-function parameter is required. The sdk-version parameter is optional and defaults to the currently supported version. metadata-function=lambda_arn, sdk-version=version_number For the LAMBDA data catalog type, use one of the following sets of required parameters, but not both. If you have one Lambda function that processes metadata and another for reading the actual data, use the following syntax. Both parameters are required. metadata-function=lambda_arn, record-function=lambda_arn If you have a composite Lambda function that processes both metadata and data, use the following syntax to specify your Lambda function. function=lambda_arn The GLUE type takes a catalog ID parameter and is required. The catalog_id is the account ID of the Amazon Web Services account to which the Glue Data Catalog belongs. catalog-id=catalog_id The GLUE data catalog type also applies to the default AwsDataCatalog that already exists in your account, of which you can have only one and cannot modify. The FEDERATED data catalog type uses one of the following parameters, but not both. Use connection-arn for an existing Glue connection. Use connection-type and connection-properties to specify the configuration setting for a new connection. connection-arn:`<glue_connection_arn_to_reuse>` lambda-role-arn (optional): The execution role to use for the Lambda function. If not provided, one is created. connection-type:MYSQL|REDSHIFT|...., connection-properties:"`<json_string>`" For `<json_string>` , use escaped JSON text, as in the following example. "{\"spill_bucket\":\"my_spill\",\"spill_prefix\":\"athena-spill\",\"host\":\"abc12345.snowflakecomputing.com\",\"port\":\"1234\",\"warehouse\":\"DEV_WH\",\"database\":\"TEST\",\"schema\":\"PUBLIC\",\"SecretArn\":\"arn:aws:secretsmanager:ap-south-1:111122223333:secret:snowflake-XHb67j\"}"'
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of comma separated tags to add to the data catalog that is created. All the resources that are created by the CreateDataCatalog API operation with FEDERATED type will have the tag federated_athena_datacatalog="true". This includes the CFN Stack, Glue Connection, Athena DataCatalog, and all the resources created as part of the CFN Stack (Lambda Function, IAM policies/roles).
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataCatalogOutput"
  /CreateNamedQuery:
    post:
      operationId: CreateNamedQuery
      description: Creates a named query in the specified workgroup. Requires that you have access to the workgroup.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.CreateNamedQuery
            default: AmazonAthena.CreateNamedQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NameString"
                  description: The query name.
                Description:
                  $ref: "#/components/schemas/DescriptionString"
                  description: The query description.
                Database:
                  $ref: "#/components/schemas/DatabaseString"
                  description: The database to which the query belongs.
                QueryString:
                  $ref: "#/components/schemas/QueryString"
                  description: The contents of the query with all query statements.
                ClientRequestToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique case-sensitive string used to ensure the request to create the query is idempotent (executes only once). If another CreateNamedQuery request is received, the same response is returned and another query is not created. If a parameter has changed, for example, the QueryString, an error is returned. This token is listed as not required because Amazon Web Services SDKs (for example the Amazon Web Services SDK for Java) auto-generate the token for users. If you are not using the Amazon Web Services SDK or the Amazon Web Services CLI, you must provide this token or the action will fail.
                WorkGroup:
                  $ref: "#/components/schemas/WorkGroupName"
                  description: The name of the workgroup in which the named query is being created.
              required:
                - Name
                - Database
                - QueryString
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNamedQueryOutput"
  /CreateNotebook:
    post:
      operationId: CreateNotebook
      description: Creates an empty ipynb file in the specified Apache Spark enabled workgroup. Throws an error if a file in the workgroup with the same name already exists.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.CreateNotebook
            default: AmazonAthena.CreateNotebook
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WorkGroup:
                  $ref: "#/components/schemas/WorkGroupName"
                  description: The name of the Spark enabled workgroup in which the notebook will be created.
                Name:
                  $ref: "#/components/schemas/NotebookName"
                  description: The name of the ipynb file to be created in the Spark workgroup, without the .ipynb extension.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: A unique case-sensitive string used to ensure the request to create the notebook is idempotent (executes only once). This token is listed as not required because Amazon Web Services SDKs (for example the Amazon Web Services SDK for Java) auto-generate the token for you. If you are not using the Amazon Web Services SDK or the Amazon Web Services CLI, you must provide this token or the action will fail.
              required:
                - WorkGroup
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNotebookOutput"
  /CreatePreparedStatement:
    post:
      operationId: CreatePreparedStatement
      description: Creates a prepared statement for use with SQL queries in Athena.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.CreatePreparedStatement
            default: AmazonAthena.CreatePreparedStatement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                StatementName:
                  $ref: "#/components/schemas/StatementName"
                  description: The name of the prepared statement.
                WorkGroup:
                  $ref: "#/components/schemas/WorkGroupName"
                  description: The name of the workgroup to which the prepared statement belongs.
                QueryStatement:
                  $ref: "#/components/schemas/QueryString"
                  description: The query string for the prepared statement.
                Description:
                  $ref: "#/components/schemas/DescriptionString"
                  description: The description of the prepared statement.
              required:
                - StatementName
                - WorkGroup
                - QueryStatement
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePreparedStatementOutput"
  /CreatePresignedNotebookUrl:
    post:
      operationId: CreatePresignedNotebookUrl
      description: Gets an authentication token and the URL at which the notebook can be accessed. During programmatic access, CreatePresignedNotebookUrl must be called every 10 minutes to refresh the authentication token. For information about granting programmatic access, see Grant programmatic access.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.CreatePresignedNotebookUrl
            default: AmazonAthena.CreatePresignedNotebookUrl
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SessionId:
                  $ref: "#/components/schemas/SessionId"
                  description: The session ID.
              required:
                - SessionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePresignedNotebookUrlResponse"
  /CreateWorkGroup:
    post:
      operationId: CreateWorkGroup
      description: Creates a workgroup with the specified name. A workgroup can be an Apache Spark enabled workgroup or an Athena SQL workgroup.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.CreateWorkGroup
            default: AmazonAthena.CreateWorkGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/WorkGroupName"
                  description: The workgroup name.
                Configuration:
                  $ref: "#/components/schemas/WorkGroupConfiguration"
                  description: Contains configuration information for creating an Athena SQL workgroup or Spark enabled Athena workgroup. Athena SQL workgroup configuration includes the location in Amazon S3 where query and calculation results are stored, the encryption configuration, if any, used for encrypting query results, whether the Amazon CloudWatch Metrics are enabled for the workgroup, the limit for the amount of bytes scanned (cutoff) per query, if it is specified, and whether workgroup's settings (specified with EnforceWorkGroupConfiguration) in the WorkGroupConfiguration override client-side settings. See WorkGroupConfiguration$EnforceWorkGroupConfiguration.
                Description:
                  $ref: "#/components/schemas/WorkGroupDescriptionString"
                  description: The workgroup description.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of comma separated tags to add to the workgroup that is created.
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkGroupOutput"
  /DeleteCapacityReservation:
    post:
      operationId: DeleteCapacityReservation
      description: Deletes a cancelled capacity reservation. A reservation must be cancelled before it can be deleted. A deleted reservation is immediately removed from your account and can no longer be referenced, including by its ARN. A deleted reservation cannot be called by GetCapacityReservation, and deleted reservations do not appear in the output of ListCapacityReservations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.DeleteCapacityReservation
            default: AmazonAthena.DeleteCapacityReservation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/CapacityReservationName"
                  description: The name of the capacity reservation to delete.
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCapacityReservationOutput"
  /DeleteDataCatalog:
    post:
      operationId: DeleteDataCatalog
      description: Deletes a data catalog.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.DeleteDataCatalog
            default: AmazonAthena.DeleteDataCatalog
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/CatalogNameString"
                  description: The name of the data catalog to delete.
                DeleteCatalogOnly:
                  $ref: "#/components/schemas/Boolean"
                  description: Deletes the Athena Data Catalog. You can only use this with the FEDERATED catalogs. You usually perform this before registering the connector with Glue Data Catalog. After deletion, you will have to manage the Glue Connection and Lambda function.
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDataCatalogOutput"
  /DeleteNamedQuery:
    post:
      operationId: DeleteNamedQuery
      description: Deletes the named query if you have access to the workgroup in which the query was saved.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.DeleteNamedQuery
            default: AmazonAthena.DeleteNamedQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NamedQueryId:
                  $ref: "#/components/schemas/NamedQueryId"
                  description: The unique ID of the query to delete.
              required:
                - NamedQueryId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteNamedQueryOutput"
  /DeleteNotebook:
    post:
      operationId: DeleteNotebook
      description: Deletes the specified notebook.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.DeleteNotebook
            default: AmazonAthena.DeleteNotebook
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NotebookId:
                  $ref: "#/components/schemas/NotebookId"
                  description: The ID of the notebook to delete.
              required:
                - NotebookId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteNotebookOutput"
  /DeletePreparedStatement:
    post:
      operationId: DeletePreparedStatement
      description: Deletes the prepared statement with the specified name from the specified workgroup.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.DeletePreparedStatement
            default: AmazonAthena.DeletePreparedStatement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                StatementName:
                  $ref: "#/components/schemas/StatementName"
                  description: The name of the prepared statement to delete.
                WorkGroup:
                  $ref: "#/components/schemas/WorkGroupName"
                  description: The workgroup to which the statement to be deleted belongs.
              required:
                - StatementName
                - WorkGroup
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePreparedStatementOutput"
  /DeleteWorkGroup:
    post:
      operationId: DeleteWorkGroup
      description: Deletes the workgroup with the specified name. The primary workgroup cannot be deleted.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.DeleteWorkGroup
            default: AmazonAthena.DeleteWorkGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WorkGroup:
                  $ref: "#/components/schemas/WorkGroupName"
                  description: The unique name of the workgroup to delete.
                RecursiveDeleteOption:
                  $ref: "#/components/schemas/BoxedBoolean"
                  description: The option to delete the workgroup and its contents even if the workgroup contains any named queries, query executions, or notebooks.
              required:
                - WorkGroup
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWorkGroupOutput"
  /ExportNotebook:
    post:
      operationId: ExportNotebook
      description: Exports the specified notebook and its metadata.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.ExportNotebook
            default: AmazonAthena.ExportNotebook
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NotebookId:
                  $ref: "#/components/schemas/NotebookId"
                  description: The ID of the notebook to export.
              required:
                - NotebookId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportNotebookOutput"
  /GetCalculationExecution:
    post:
      operationId: GetCalculationExecution
      description: Describes a previously submitted calculation execution.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.GetCalculationExecution
            default: AmazonAthena.GetCalculationExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CalculationExecutionId:
                  $ref: "#/components/schemas/CalculationExecutionId"
                  description: The calculation execution UUID.
              required:
                - CalculationExecutionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCalculationExecutionResponse"
  /GetCalculationExecutionCode:
    post:
      operationId: GetCalculationExecutionCode
      description: Retrieves the unencrypted code that was executed for the calculation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonAthena.GetCalculationExecutionCode
            default: AmazonAthena.GetCalculationExecutionCode
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CalculationExecutionId:
                  $ref: "#/components/schemas/CalculationExecutionId"
                  description: The calculation execution UUID.
              required:
                - CalculationExecutionId
      responses:
        "200":
