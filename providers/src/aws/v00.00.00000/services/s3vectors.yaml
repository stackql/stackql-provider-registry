openapi: 3.0.0
info:
  version: "2025-07-15"
  title: Amazon S3 Vectors
  description: Amazon S3 Vectors
  x-serviceName: s3vectors
  x-serviceAlias: s3vectors
  x-protocol: rest-json
  x-apiVersion: "2025-07-15"
  x-endpointPrefix: s3vectors
servers:
  - url: https://s3vectors.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for s3vectors
paths:
  /CreateIndex:
    post:
      operationId: CreateIndex
      description: Creates a vector index within a vector bucket. To specify the vector bucket, you must use either the vector bucket name or the vector bucket Amazon Resource Name (ARN). Permissions You must have the s3vectors:CreateIndex permission to use this operation. You must have the s3vectors:TagResource permission in addition to s3vectors:CreateIndex permission to create a vector index with tags.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vectorBucketName:
                  $ref: "#/components/schemas/VectorBucketName"
                vectorBucketArn:
                  $ref: "#/components/schemas/VectorBucketArn"
                indexName:
                  $ref: "#/components/schemas/IndexName"
                dataType:
                  $ref: "#/components/schemas/DataType"
                dimension:
                  $ref: "#/components/schemas/Dimension"
                distanceMetric:
                  $ref: "#/components/schemas/DistanceMetric"
                metadataConfiguration:
                  $ref: "#/components/schemas/MetadataConfiguration"
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - indexName
                - dataType
                - dimension
                - distanceMetric
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIndexOutput"
  /CreateVectorBucket:
    post:
      operationId: CreateVectorBucket
      description: Creates a vector bucket in the Amazon Web Services Region that you want your bucket to be in. Permissions You must have the s3vectors:CreateVectorBucket permission to use this operation. You must have the s3vectors:TagResource permission in addition to s3vectors:CreateVectorBucket permission to create a vector bucket with tags.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vectorBucketName:
                  $ref: "#/components/schemas/VectorBucketName"
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - vectorBucketName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVectorBucketOutput"
  /DeleteIndex:
    post:
      operationId: DeleteIndex
      description: Deletes a vector index. To specify the vector index, you can either use both the vector bucket name and vector index name, or use the vector index Amazon Resource Name (ARN). Permissions You must have the s3vectors:DeleteIndex permission to use this operation.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                vectorBucketName:
                  $ref: "#/components/schemas/VectorBucketName"
                indexName:
                  $ref: "#/components/schemas/IndexName"
                indexArn:
                  $ref: "#/components/schemas/IndexArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIndexOutput"
  /DeleteVectorBucket:
    post:
      operationId: DeleteVectorBucket
      description: Deletes a vector bucket. All vector indexes in the vector bucket must be deleted before the vector bucket can be deleted. To perform this operation, you must use either the vector bucket name or the vector bucket Amazon Resource Name (ARN). Permissions You must have the s3vectors:DeleteVectorBucket permission to use this operation.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                vectorBucketName:
                  $ref: "#/components/schemas/VectorBucketName"
                vectorBucketArn:
                  $ref: "#/components/schemas/VectorBucketArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVectorBucketOutput"
  /DeleteVectorBucketPolicy:
    post:
      operationId: DeleteVectorBucketPolicy
      description: Deletes a vector bucket policy. To specify the bucket, you must use either the vector bucket name or the vector bucket Amazon Resource Name (ARN). Permissions You must have the s3vectors:DeleteVectorBucketPolicy permission to use this operation.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                vectorBucketName:
                  $ref: "#/components/schemas/VectorBucketName"
                vectorBucketArn:
                  $ref: "#/components/schemas/VectorBucketArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVectorBucketPolicyOutput"
  /DeleteVectors:
    post:
      operationId: DeleteVectors
      description: Deletes one or more vectors in a vector index. To specify the vector index, you can either use both the vector bucket name and vector index name, or use the vector index Amazon Resource Name (ARN). Permissions You must have the s3vectors:DeleteVectors permission to use this operation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vectorBucketName:
                  $ref: "#/components/schemas/VectorBucketName"
                indexName:
                  $ref: "#/components/schemas/IndexName"
                indexArn:
                  $ref: "#/components/schemas/IndexArn"
                keys:
                  $ref: "#/components/schemas/DeleteVectorsInputList"
              required:
                - keys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVectorsOutput"
  /GetIndex:
    post:
      operationId: GetIndex
      description: Returns vector index attributes. To specify the vector index, you can either use both the vector bucket name and the vector index name, or use the vector index Amazon Resource Name (ARN). Permissions You must have the s3vectors:GetIndex permission to use this operation.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                vectorBucketName:
                  $ref: "#/components/schemas/VectorBucketName"
                indexName:
                  $ref: "#/components/schemas/IndexName"
                indexArn:
                  $ref: "#/components/schemas/IndexArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIndexOutput"
  /GetVectorBucket:
    post:
      operationId: GetVectorBucket
      description: Returns vector bucket attributes. To specify the bucket, you must use either the vector bucket name or the vector bucket Amazon Resource Name (ARN). Permissions You must have the s3vectors:GetVectorBucket permission to use this operation.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                vectorBucketName:
                  $ref: "#/components/schemas/VectorBucketName"
                vectorBucketArn:
                  $ref: "#/components/schemas/VectorBucketArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetVectorBucketOutput"
  /GetVectorBucketPolicy:
    post:
      operationId: GetVectorBucketPolicy
      description: Gets details about a vector bucket policy. To specify the bucket, you must use either the vector bucket name or the vector bucket Amazon Resource Name (ARN). Permissions You must have the s3vectors:GetVectorBucketPolicy permission to use this operation.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                vectorBucketName:
                  $ref: "#/components/schemas/VectorBucketName"
                vectorBucketArn:
                  $ref: "#/components/schemas/VectorBucketArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetVectorBucketPolicyOutput"
  /GetVectors:
    post:
      operationId: GetVectors
      description: Returns vector attributes. To specify the vector index, you can either use both the vector bucket name and the vector index name, or use the vector index Amazon Resource Name (ARN). Permissions You must have the s3vectors:GetVectors permission to use this operation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vectorBucketName:
                  $ref: "#/components/schemas/VectorBucketName"
                indexName:
                  $ref: "#/components/schemas/IndexName"
                indexArn:
                  $ref: "#/components/schemas/IndexArn"
                keys:
                  $ref: "#/components/schemas/GetVectorsInputList"
                returnData:
                  $ref: "#/components/schemas/Boolean"
                returnMetadata:
                  $ref: "#/components/schemas/Boolean"
              required:
                - keys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetVectorsOutput"
  /ListIndexes:
    post:
      operationId: ListIndexes
      description: Returns a list of all the vector indexes within the specified vector bucket. To specify the bucket, you must use either the vector bucket name or the vector bucket Amazon Resource Name (ARN). Permissions You must have the s3vectors:ListIndexes permission to use this operation.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                vectorBucketName:
                  $ref: "#/components/schemas/VectorBucketName"
                vectorBucketArn:
                  $ref: "#/components/schemas/VectorBucketArn"
                maxResults:
                  $ref: "#/components/schemas/ListIndexesMaxResults"
                nextToken:
                  $ref: "#/components/schemas/ListIndexesNextToken"
                prefix:
                  $ref: "#/components/schemas/ListIndexesPrefix"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIndexesOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists all of the tags applied to a specified Amazon S3 Vectors resource. Each tag is a label consisting of a key and value pair. Tags can help you organize, track costs for, and control access to resources. For a list of S3 resources that support tagging, see Managing tags for Amazon S3 resources. Permissions For vector buckets and vector indexes, you must have the s3vectors:ListTagsForResource permission to use this operation.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the Amazon S3 Vectors resource that you want to list tags for. The tagged resource can be a vector bucket or a vector index.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
    post:
      operationId: TagResource
      description: Applies one or more user-defined tags to an Amazon S3 Vectors resource or updates existing tags. Each tag is a label consisting of a key and value pair. Tags can help you organize, track costs for, and control access to your resources. You can add up to 50 tags for each resource. For a list of S3 resources that support tagging, see Managing tags for Amazon S3 resources. Permissions For vector buckets and vector indexes, you must have the s3vectors:TagResource permission to use this operation.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the Amazon S3 Vectors resource that you're applying tags to. The tagged resource can be a vector bucket or a vector index.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
    delete:
      operationId: UntagResource
      description: Removes the specified user-defined tags from an Amazon S3 Vectors resource. You can pass one or more tag keys. For a list of S3 resources that support tagging, see Managing tags for Amazon S3 resources. Permissions For vector buckets and vector indexes, you must have the s3vectors:UntagResource permission to use this operation.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the Amazon S3 Vectors resource that you're removing tags from. The tagged resource can be a vector bucket or a vector index.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The array of tag keys that you're removing from the S3 Vectors resource. For more information, see Tagging for cost allocation or attribute-based access control (ABAC).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /ListVectorBuckets:
    post:
      operationId: ListVectorBuckets
      description: Returns a list of all the vector buckets that are owned by the authenticated sender of the request. Permissions You must have the s3vectors:ListVectorBuckets permission to use this operation.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/ListVectorBucketsMaxResults"
                nextToken:
                  $ref: "#/components/schemas/ListVectorBucketsNextToken"
                prefix:
                  $ref: "#/components/schemas/ListVectorBucketsPrefix"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVectorBucketsOutput"
  /ListVectors:
    post:
      operationId: ListVectors
      description: "List vectors in the specified vector index. To specify the vector index, you can either use both the vector bucket name and the vector index name, or use the vector index Amazon Resource Name (ARN). ListVectors operations proceed sequentially; however, for faster performance on a large number of vectors in a vector index, applications can request a parallel ListVectors operation by providing the segmentCount and segmentIndex parameters. Permissions You must have the s3vectors:ListVectors permission to use this operation. Additional permissions are required based on the request parameters you specify: With only s3vectors:ListVectors permission, you can list vector keys when returnData and returnMetadata are both set to false or not specified.. If you set returnData or returnMetadata to true, you must have both s3vectors:ListVectors and s3vectors:GetVectors permissions. The request fails with a 403 Forbidden error if you request vector data or metadata without the s3vectors:GetVectors permission."
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                vectorBucketName:
                  $ref: "#/components/schemas/VectorBucketName"
                indexName:
                  $ref: "#/components/schemas/IndexName"
                indexArn:
                  $ref: "#/components/schemas/IndexArn"
                maxResults:
                  $ref: "#/components/schemas/ListVectorsMaxResults"
                nextToken:
                  $ref: "#/components/schemas/ListVectorsNextToken"
                segmentCount:
                  $ref: "#/components/schemas/ListVectorsSegmentCount"
                segmentIndex:
                  $ref: "#/components/schemas/ListVectorsSegmentIndex"
                returnData:
                  $ref: "#/components/schemas/Boolean"
                returnMetadata:
                  $ref: "#/components/schemas/Boolean"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVectorsOutput"
  /PutVectorBucketPolicy:
    post:
      operationId: PutVectorBucketPolicy
      description: Creates a bucket policy for a vector bucket. To specify the bucket, you must use either the vector bucket name or the vector bucket Amazon Resource Name (ARN). Permissions You must have the s3vectors:PutVectorBucketPolicy permission to use this operation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vectorBucketName:
                  $ref: "#/components/schemas/VectorBucketName"
                vectorBucketArn:
                  $ref: "#/components/schemas/VectorBucketArn"
                policy:
                  $ref: "#/components/schemas/VectorBucketPolicy"
              required:
                - policy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutVectorBucketPolicyOutput"
  /PutVectors:
    post:
      operationId: PutVectors
      description: Adds one or more vectors to a vector index. To specify the vector index, you can either use both the vector bucket name and the vector index name, or use the vector index Amazon Resource Name (ARN). For more information about limits, see Limitations and restrictions in the Amazon S3 User Guide. When inserting vector data into your vector index, you must provide the vector data as float32 (32-bit floating point) values. If you pass higher-precision values to an Amazon Web Services SDK, S3 Vectors converts the values to 32-bit floating point before storing them, and GetVectors, ListVectors, and QueryVectors operations return the float32 values. Different Amazon Web Services SDKs may have different default numeric types, so ensure your vectors are properly formatted as float32 values regardless of which SDK you're using. For example, in Python, use numpy.float32 or explicitly cast your values. Permissions You must have the s3vectors:PutVectors permission to use this operation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vectorBucketName:
                  $ref: "#/components/schemas/VectorBucketName"
                indexName:
                  $ref: "#/components/schemas/IndexName"
                indexArn:
                  $ref: "#/components/schemas/IndexArn"
                vectors:
                  $ref: "#/components/schemas/PutVectorsInputList"
              required:
                - vectors
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutVectorsOutput"
  /QueryVectors:
    post:
      operationId: QueryVectors
      description: "Performs an approximate nearest neighbor search query in a vector index using a query vector. By default, it returns the keys of approximate nearest neighbors. You can optionally include the computed distance (between the query vector and each vector in the response), the vector data, and metadata of each vector in the response. To specify the vector index, you can either use both the vector bucket name and the vector index name, or use the vector index Amazon Resource Name (ARN). Permissions You must have the s3vectors:QueryVectors permission to use this operation. Additional permissions are required based on the request parameters you specify: With only s3vectors:QueryVectors permission, you can retrieve vector keys of approximate nearest neighbors and computed distances between these vectors. This permission is sufficient only when you don't set any metadata filters and don't request vector data or metadata (by keeping the returnMetadata parameter set to false or not specified). If you specify a metadata filter or set returnMetadata to true, you must have both s3vectors:QueryVectors and s3vectors:GetVectors permissions. The request fails with a 403 Forbidden error if you request metadata filtering, vector data, or metadata without the s3vectors:GetVectors permission."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vectorBucketName:
                  $ref: "#/components/schemas/VectorBucketName"
                indexName:
                  $ref: "#/components/schemas/IndexName"
                indexArn:
                  $ref: "#/components/schemas/IndexArn"
                topK:
                  $ref: "#/components/schemas/TopK"
                queryVector:
                  $ref: "#/components/schemas/VectorData"
                filter:
                  $ref: "#/components/schemas/Document"
                returnMetadata:
                  $ref: "#/components/schemas/Boolean"
                returnDistance:
                  $ref: "#/components/schemas/Boolean"
              required:
                - topK
                - queryVector
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryVectorsOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    VectorBucketName:
      type: string
      minLength: 3
      maxLength: 63
    VectorBucketArn:
      type: string
      pattern: arn:aws[-a-z0-9]*:s3vectors:[a-z0-9-]+:[0-9]{12}:bucket/[a-z0-9][a-z0-9-.]{1,61}[a-z0-9]
    IndexName:
      type: string
      minLength: 3
      maxLength: 63
    DataType:
      type: string
      enum:
        - float32
    Dimension:
      type: integer
      minimum: 1
      maximum: 4096
    DistanceMetric:
      type: string
      enum:
        - euclidean
        - cosine
    MetadataConfiguration:
      description: The metadata configuration for a vector index.
      type: object
      properties:
        nonFilterableMetadataKeys:
          $ref: "#/components/schemas/NonFilterableMetadataKeys"
          description: Non-filterable metadata keys allow you to enrich vectors with additional context during storage and retrieval. Unlike default metadata keys, these keys can’t be used as query filters. Non-filterable metadata keys can be retrieved but can’t be searched, queried, or filtered. You can access non-filterable metadata keys of your vectors after finding the vectors. For more information about non-filterable metadata keys, see Vectors and Limitations and restrictions in the Amazon S3 User Guide.
      required:
        - nonFilterableMetadataKeys
    NonFilterableMetadataKeys:
      type: array
      items:
        $ref: "#/components/schemas/MetadataKey"
    MetadataKey:
      type: string
      minLength: 1
      maxLength: 63
    EncryptionConfiguration:
      description: The encryption configuration for a vector bucket or index. By default, if you don't specify, all new vectors in Amazon S3 vector buckets use server-side encryption with Amazon S3 managed keys (SSE-S3), specifically AES256. You can optionally override bucket level encryption settings, and set a specific encryption configuration for a vector index at the time of index creation.
      type: object
      properties:
        sseType:
          $ref: "#/components/schemas/SseType"
          description: The server-side encryption type to use for the encryption configuration of the vector bucket. By default, if you don't specify, all new vectors in Amazon S3 vector buckets use server-side encryption with Amazon S3 managed keys (SSE-S3), specifically AES256.
        kmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: "Amazon Web Services Key Management Service (KMS) customer managed key ID to use for the encryption configuration. This parameter is allowed if and only if sseType is set to aws:kms. To specify the KMS key, you must use the format of the KMS key Amazon Resource Name (ARN). For example, specify Key ARN in the following format: arn:aws:kms:us-east-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab"
    SseType:
      type: string
      enum:
        - AES256
        - aws:kms
    KmsKeyArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: (arn:aws[-a-z0-9]*:kms:[-a-z0-9]*:[0-9]{12}:key/.+)
    TagsMap:
      type: object
      properties: {}
    CreateIndexOutput:
      type: object
      properties:
        indexArn:
          $ref: "#/components/schemas/IndexArn"
          description: The Amazon Resource Name (ARN) of the newly created vector index.
      required:
        - indexArn
    IndexArn:
      type: string
      pattern: arn:aws[-a-z0-9]*:s3vectors:[a-z0-9-]+:[0-9]{12}:bucket/[a-z0-9][a-z0-9-.]{1,61}[a-z0-9]/index/[a-z0-9][a-z0-9-.]{1,61}[a-z0-9]
    CreateVectorBucketOutput:
      type: object
      properties:
        vectorBucketArn:
          $ref: "#/components/schemas/VectorBucketArn"
          description: The Amazon Resource Name (ARN) of the newly created vector bucket.
      required:
        - vectorBucketArn
    DeleteIndexOutput:
      type: object
    DeleteVectorBucketOutput:
      type: object
    DeleteVectorBucketPolicyOutput:
      type: object
    DeleteVectorsInputList:
      type: array
      items:
        $ref: "#/components/schemas/VectorKey"
    VectorKey:
      type: string
      minLength: 1
      maxLength: 1024
    DeleteVectorsOutput:
      type: object
    GetIndexOutput:
      type: object
      properties:
        index:
          $ref: "#/components/schemas/Index"
          description: The attributes of the vector index.
      required:
        - index
    Index:
      description: The attributes of a vector index.
      type: object
      properties:
        vectorBucketName:
          $ref: "#/components/schemas/VectorBucketName"
          description: The name of the vector bucket that contains the vector index.
        indexName:
          $ref: "#/components/schemas/IndexName"
          description: The name of the vector index.
        indexArn:
          $ref: "#/components/schemas/IndexArn"
          description: The Amazon Resource Name (ARN) of the vector index.
        creationTime:
          $ref: "#/components/schemas/Timestamp"
          description: Date and time when the vector index was created.
        dataType:
          $ref: "#/components/schemas/DataType"
          description: The data type of the vectors inserted into the vector index.
        dimension:
          $ref: "#/components/schemas/Dimension"
          description: The number of values in the vectors that are inserted into the vector index.
        distanceMetric:
          $ref: "#/components/schemas/DistanceMetric"
          description: The distance metric to be used for similarity search.
        metadataConfiguration:
          $ref: "#/components/schemas/MetadataConfiguration"
          description: The metadata configuration for the vector index.
        encryptionConfiguration:
          $ref: "#/components/schemas/EncryptionConfiguration"
          description: The encryption configuration for a vector index. By default, if you don't specify, all new vectors in the vector index will use the encryption configuration of the vector bucket.
      required:
