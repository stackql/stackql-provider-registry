                  description: The Amazon Resource Name (ARN) of the resource to add tags to.
                tags:
                  $ref: "#/components/schemas/RequestTagMap"
                  description: Metadata that assists with categorization and organization. Each tag consists of a key and an optional value. You define both. Tags don't propagate to any other environment or Amazon Web Services resources.
              required:
