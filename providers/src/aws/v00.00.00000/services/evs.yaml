          description: The date and time that the environment was created.
        modifiedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the environment was modified.
        environmentArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the environment.
    Host:
      description: An ESX host that runs on an Amazon EC2 bare metal instance. Four hosts are created in an Amazon EVS environment during environment creation. You can add hosts to an environment using the CreateEnvironmentHost operation. Amazon EVS supports 4-16 hosts per environment.
      type: object
      properties:
        hostName:
          $ref: "#/components/schemas/HostName"
          description: The DNS hostname of the host. DNS hostnames for hosts must be unique across Amazon EVS environments and within VCF.
        ipAddress:
          $ref: "#/components/schemas/IpAddress"
          description: The IP address of the host.
        keyName:
          $ref: "#/components/schemas/KeyName"
          description: The name of the SSH key that is used to access the host.
        instanceType:
          $ref: "#/components/schemas/InstanceType"
          description: The EC2 instance type of the host. EC2 instances created through Amazon EVS do not support associating an IAM instance profile.
        placementGroupId:
          $ref: "#/components/schemas/PlacementGroupId"
          description: The unique ID of the placement group where the host is placed.
        dedicatedHostId:
          $ref: "#/components/schemas/DedicatedHostId"
          description: The unique ID of the Amazon EC2 Dedicated Host.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the host was created.
        modifiedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the host was modified.
        hostState:
          $ref: "#/components/schemas/HostState"
          description: The state of the host.
        stateDetails:
          $ref: "#/components/schemas/StateDetails"
          description: A detailed description of the hostState of a host.
        ec2InstanceId:
          $ref: "#/components/schemas/String"
          description: The unique ID of the EC2 instance that represents the host.
        networkInterfaces:
          $ref: "#/components/schemas/NetworkInterfaceList"
          description: The elastic network interfaces that are attached to the host.
    HostState:
      type: string
