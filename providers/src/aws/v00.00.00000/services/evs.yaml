  /UpdateEnvironmentConnector:
    post:
      operationId: UpdateEnvironmentConnector
      description: Updates a connector for an Amazon EVS environment. You can update the Amazon Web Services Secrets Manager secret ARN or the appliance FQDN to reconfigure the connector metadata. You cannot update both the secret and the FQDN in the same request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonElasticVMwareService.UpdateEnvironmentConnector
            default: AmazonElasticVMwareService.UpdateEnvironmentConnector
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: This parameter is not used in Amazon EVS currently. If you supply input for this parameter, it will have no effect. A unique, case-sensitive identifier that you provide to ensure the idempotency of the connector update request. If you do not specify a client token, a randomly generated token is used for the request to ensure idempotency.
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: A unique ID for the environment that the connector belongs to.
                connectorId:
                  $ref: "#/components/schemas/ConnectorId"
                  description: A unique ID for the connector to update.
                applianceFqdn:
                  $ref: "#/components/schemas/ApplianceFqdn"
                  description: The new fully qualified domain name (FQDN) of the VCF appliance that the connector connects to.
                secretIdentifier:
                  $ref: "#/components/schemas/SecretIdentifier"
                  description: The new ARN or name of the Amazon Web Services Secrets Manager secret that stores the credentials for the VCF appliance.
              required:
                - environmentId
                - connectorId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEnvironmentConnectorResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ClientToken:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[!-~]+"
    EnvironmentId:
      type: string
      pattern: (env-[a-zA-Z0-9]{10})
    AssociateEipToVlanRequestVlanNameString:
      type: string
      minLength: 1
      maxLength: 200
    AllocationId:
      type: string
      minLength: 9
      maxLength: 26
      pattern: eipalloc-[a-zA-Z0-9_-]+
    AssociateEipToVlanResponse:
      type: object
      properties:
        vlan:
          $ref: "#/components/schemas/Vlan"
    Vlan:
      description: The VLANs that Amazon EVS creates during environment creation.
      type: object
      properties:
        vlanId:
          $ref: "#/components/schemas/VlanId"
          description: The unique ID of the VLAN.
        cidr:
          $ref: "#/components/schemas/Cidr"
          description: The CIDR block of the VLAN. Amazon EVS VLAN subnets have a minimum CIDR block size of /28 and a maximum size of /24.
        availabilityZone:
          $ref: "#/components/schemas/String"
          description: The availability zone of the VLAN.
        functionName:
          $ref: "#/components/schemas/String"
          description: The VMware VCF traffic type that is carried over the VLAN. For example, a VLAN with a functionName of hcx is being used to carry VMware HCX traffic.
        subnetId:
          $ref: "#/components/schemas/SubnetId"
          description: The unique ID of the VLAN subnet.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the VLAN was created.
        modifiedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the VLAN was modified.
        vlanState:
          $ref: "#/components/schemas/VlanState"
          description: The state of the VLAN.
        stateDetails:
          $ref: "#/components/schemas/StateDetails"
          description: The state details of the VLAN.
        eipAssociations:
          $ref: "#/components/schemas/EipAssociationList"
          description: An array of Elastic IP address associations.
        isPublic:
          $ref: "#/components/schemas/Boolean"
          description: Determines if the VLAN that Amazon EVS provisions is public or private.
        networkAclId:
          $ref: "#/components/schemas/NetworkAclId"
          description: A unique ID for a network access control list.
    VlanId:
      type: integer
    Cidr:
      type: string
      pattern: ((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)/(3[0-2]|[1-2][0-9]|[0-9])
    String:
      type: string
    SubnetId:
      type: string
      minLength: 15
      maxLength: 24
      pattern: subnet-[a-f0-9]{8}([a-f0-9]{9})?
    Timestamp:
      type: string
      format: date-time
    VlanState:
      type: string
      enum:
        - CREATING
        - CREATED
        - DELETING
        - DELETED
        - CREATE_FAILED
    StateDetails:
      type: string
    EipAssociationList:
      type: array
      items:
        $ref: "#/components/schemas/EipAssociation"
    EipAssociation:
      description: An Elastic IP address association with the elastic network interface in the VLAN subnet.
      type: object
      properties:
        associationId:
          $ref: "#/components/schemas/AssociationId"
          description: A unique ID for the elastic IP address association with the VLAN subnet.
        allocationId:
          $ref: "#/components/schemas/AllocationId"
          description: The Elastic IP address allocation ID.
        ipAddress:
          $ref: "#/components/schemas/IpAddress"
          description: The Elastic IP address.
    AssociationId:
      type: string
      minLength: 9
      maxLength: 26
      pattern: eipassoc-[a-zA-Z0-9_-]+
    IpAddress:
      type: string
      pattern: (\d{1,3}\.){3}\d{1,3}
    Boolean:
      type: boolean
    NetworkAclId:
      type: string
      minLength: 4
      maxLength: 21
      pattern: acl-[a-zA-Z0-9_-]+
    ConnectorId:
      type: string
      pattern: (cnctr-[a-zA-Z0-9]{10})
    EntitlementType:
      type: string
      enum:
        - WINDOWS_SERVER
    VmIdList:
      type: array
      items:
        $ref: "#/components/schemas/VmId"
    VmId:
      type: string
      minLength: 4
      maxLength: 1024
      pattern: vm-[0-9]+
    CreateEntitlementResponse:
      type: object
      properties:
        entitlements:
          $ref: "#/components/schemas/VmEntitlementList"
          description: A list of the created entitlements.
    VmEntitlementList:
      type: array
      items:
        $ref: "#/components/schemas/VmEntitlement"
    VmEntitlement:
      description: An object that represents a Windows Server License entitlement for a virtual machine in an Amazon EVS environment.
      type: object
      properties:
        vmId:
          $ref: "#/components/schemas/VmId"
          description: The unique ID of the virtual machine.
        environmentId:
          $ref: "#/components/schemas/EnvironmentId"
          description: The unique ID of the environment.
        connectorId:
          $ref: "#/components/schemas/ConnectorId"
          description: The unique ID of the connector associated with the entitlement.
        vmName:
          $ref: "#/components/schemas/VmName"
          description: The name of the virtual machine.
        type_:
          $ref: "#/components/schemas/EntitlementType"
          description: The type of entitlement.
        status:
          $ref: "#/components/schemas/EntitlementStatus"
          description: The status of the entitlement.
        lastSyncedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the entitlement was last synced.
        startedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the entitlement started.
        stoppedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the entitlement stopped.
        errorDetail:
          $ref: "#/components/schemas/ErrorDetail"
          description: The error details associated with the entitlement, if applicable.
    VmName:
      type: string
      minLength: 1
      maxLength: 1024
    EntitlementStatus:
      type: string
      enum:
        - CREATING
        - CREATED
        - DELETED
        - AT_RISK
        - ENTITLEMENT_REMOVED
        - CREATE_FAILED
    ErrorDetail:
      description: An object that contains error details for an entitlement.
      type: object
      properties:
        errorCode:
          $ref: "#/components/schemas/String"
          description: The error code.
        errorMessage:
          $ref: "#/components/schemas/String"
          description: The error message.
      required:
        - errorCode
        - errorMessage
    EnvironmentName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9_-]+"
    RequestTagMap:
      type: object
      properties: {}
    ServiceAccessSecurityGroups:
      description: The security groups that allow traffic between the Amazon EVS control plane and your VPC for Amazon EVS service access. If a security group is not specified, Amazon EVS uses the default security group in your account for service access.
      type: object
      properties:
        securityGroups:
          $ref: "#/components/schemas/SecurityGroups"
          description: The security groups that allow service access.
    SecurityGroups:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      type: string
      minLength: 3
      maxLength: 25
      pattern: sg-[0-9a-zA-Z]*
    VpcId:
      type: string
      minLength: 12
      maxLength: 21
      pattern: vpc-[a-f0-9]{8}([a-f0-9]{9})?
    VcfVersion:
      type: string
      enum:
        - VCF-5.2.1
        - VCF-5.2.2
    LicenseInfoList:
      type: array
      items:
        $ref: "#/components/schemas/LicenseInfo"
    LicenseInfo:
      description: "The license information that Amazon EVS requires to create an environment. Amazon EVS requires two license keys: a VCF solution key and a vSAN license key."
      type: object
      properties:
        solutionKey:
          $ref: "#/components/schemas/SolutionKey"
          description: The VCF solution key. This license unlocks VMware VCF product features, including vSphere, NSX, SDDC Manager, and vCenter Server. The VCF solution key must meet the instance-type-specific minimum core requirements.
        vsanKey:
          $ref: "#/components/schemas/VSanLicenseKey"
          description: The VSAN license key. This license unlocks vSAN features. The vSAN license key must meet the instance-type-specific minimum capacity requirements.
      required:
        - solutionKey
        - vsanKey
    SolutionKey:
      type: string
      pattern: "[a-zA-Z0-9]{5}-[a-zA-Z0-9]{5}-[a-zA-Z0-9]{5}-[a-zA-Z0-9]{5}-[a-zA-Z0-9]{5}"
    VSanLicenseKey:
      type: string
      pattern: "[a-zA-Z0-9]{5}-[a-zA-Z0-9]{5}-[a-zA-Z0-9]{5}-[a-zA-Z0-9]{5}-[a-zA-Z0-9]{5}"
    InitialVlans:
      description: The initial VLAN subnets for the environment. Amazon EVS VLAN subnets have a minimum CIDR block size of /28 and a maximum size of /24. Amazon EVS VLAN subnet CIDR blocks must not overlap with other subnets in the VPC.
      type: object
      properties:
        vmkManagement:
          $ref: "#/components/schemas/InitialVlanInfo"
          description: The host VMkernel management VLAN subnet. This VLAN subnet carries traffic for managing ESX hosts and communicating with VMware vCenter Server.
        vmManagement:
          $ref: "#/components/schemas/InitialVlanInfo"
          description: The VM management VLAN subnet. This VLAN subnet carries traffic for vSphere virtual machines.
        vMotion:
          $ref: "#/components/schemas/InitialVlanInfo"
          description: The vMotion VLAN subnet. This VLAN subnet carries traffic for vSphere vMotion.
        vSan:
          $ref: "#/components/schemas/InitialVlanInfo"
          description: The vSAN VLAN subnet. This VLAN subnet carries the communication between ESX hosts to implement a vSAN shared storage pool.
        vTep:
          $ref: "#/components/schemas/InitialVlanInfo"
          description: The VTEP VLAN subnet. This VLAN subnet handles internal network traffic between virtual machines within a VCF instance.
        edgeVTep:
          $ref: "#/components/schemas/InitialVlanInfo"
          description: The edge VTEP VLAN subnet. This VLAN subnet manages traffic flowing between the internal network and external networks, including internet access and other site connections.
        nsxUplink:
          $ref: "#/components/schemas/InitialVlanInfo"
          description: The NSX uplink VLAN subnet. This VLAN subnet allows connectivity to the NSX overlay network.
        hcx:
          $ref: "#/components/schemas/InitialVlanInfo"
          description: "The HCX VLAN subnet. This VLAN subnet allows the HCX Interconnnect (IX) and HCX Network Extension (NE) to reach their peers and enable HCX Service Mesh creation. If you plan to use a public HCX VLAN subnet, the following requirements must be met: Must have a /28 netmask and be allocated from the IPAM public pool. Required for HCX internet access configuration. The HCX public VLAN CIDR block must be added to the VPC as a secondary CIDR block. Must have at least two Elastic IP addresses to be allocated from the public IPAM pool for HCX components."
        expansionVlan1:
          $ref: "#/components/schemas/InitialVlanInfo"
          description: An additional VLAN subnet that can be used to extend VCF capabilities once configured. For example, you can configure an expansion VLAN subnet to use NSX Federation for centralized management and synchronization of multiple NSX deployments across different locations.
        expansionVlan2:
          $ref: "#/components/schemas/InitialVlanInfo"
          description: An additional VLAN subnet that can be used to extend VCF capabilities once configured. For example, you can configure an expansion VLAN subnet to use NSX Federation for centralized management and synchronization of multiple NSX deployments across different locations.
        isHcxPublic:
          $ref: "#/components/schemas/Boolean"
          description: Determines if the HCX VLAN that Amazon EVS provisions is public or private.
        hcxNetworkAclId:
          $ref: "#/components/schemas/NetworkAclId"
          description: A unique ID for a network access control list that the HCX VLAN uses. Required when isHcxPublic is set to true.
      required:
        - vmkManagement
        - vmManagement
        - vMotion
        - vSan
        - vTep
        - edgeVTep
        - nsxUplink
        - hcx
        - expansionVlan1
        - expansionVlan2
    InitialVlanInfo:
      description: "An object that represents an initial VLAN subnet for the Amazon EVS environment. Amazon EVS creates initial VLAN subnets when you first create the environment. Amazon EVS creates the following 10 VLAN subnets: host management VLAN, vMotion VLAN, vSAN VLAN, VTEP VLAN, Edge VTEP VLAN, Management VM VLAN, HCX uplink VLAN, NSX uplink VLAN, expansion VLAN 1, expansion VLAN 2. For each Amazon EVS VLAN subnet, you must specify a non-overlapping CIDR block. Amazon EVS VLAN subnets have a minimum CIDR block size of /28 and a maximum size of /24."
      type: object
      properties:
        cidr:
          $ref: "#/components/schemas/Cidr"
          description: The CIDR block that you provide to create an Amazon EVS VLAN subnet. Amazon EVS VLAN subnets have a minimum CIDR block size of /28 and a maximum size of /24. Amazon EVS VLAN subnet CIDR blocks must not overlap with other subnets in the VPC.
      required:
        - cidr
    HostInfoForCreateList:
      type: array
      items:
        $ref: "#/components/schemas/HostInfoForCreate"
    HostInfoForCreate:
      description: An object that represents a host. You cannot use dedicatedHostId and placementGroupId together in the same HostInfoForCreateobject. This results in a ValidationException response.
      type: object
      properties:
        hostName:
          $ref: "#/components/schemas/HostName"
          description: The DNS hostname of the host. DNS hostnames for hosts must be unique across Amazon EVS environments and within VCF.
        keyName:
          $ref: "#/components/schemas/KeyName"
          description: The name of the SSH key that is used to access the host.
        instanceType:
          $ref: "#/components/schemas/InstanceType"
          description: The EC2 instance type that represents the host.
        placementGroupId:
          $ref: "#/components/schemas/PlacementGroupId"
          description: The unique ID of the placement group where the host is placed.
        dedicatedHostId:
          $ref: "#/components/schemas/DedicatedHostId"
          description: The unique ID of the Amazon EC2 Dedicated Host.
      required:
        - hostName
        - keyName
        - instanceType
    HostName:
      type: string
      pattern: ([a-zA-Z0-9\-]*)
    KeyName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9_-]+"
    InstanceType:
      type: string
      enum:
        - i4i.metal
        - i7i.metal-24xl
    PlacementGroupId:
      type: string
      minLength: 1
      maxLength: 25
      pattern: pg-[a-f0-9]{8}([a-f0-9]{9})?
    DedicatedHostId:
      type: string
      minLength: 1
      maxLength: 25
      pattern: h-[a-f0-9]{8}([a-f0-9]{9})?
    ConnectivityInfo:
      description: The connectivity configuration for the environment. Amazon EVS requires that you specify two route server peer IDs. During environment creation, the route server endpoints peer with the NSX uplink VLAN for connectivity to the NSX overlay network.
      type: object
      properties:
        privateRouteServerPeerings:
          $ref: "#/components/schemas/RouteServerPeeringList"
          description: The unique IDs for private route server peers.
      required:
        - privateRouteServerPeerings
    RouteServerPeeringList:
      type: array
      items:
        $ref: "#/components/schemas/RouteServerPeering"
    RouteServerPeering:
      type: string
      minLength: 3
      maxLength: 21
    VcfHostnames:
      description: The DNS hostnames that Amazon EVS uses to install VMware vCenter Server, NSX, SDDC Manager, and Cloud Builder. Each hostname must be unique, and resolve to a domain name that you've registered in your DNS service of choice. Hostnames cannot be changed. VMware VCF requires the deployment of two NSX Edge nodes, and three NSX Manager virtual machines.
      type: object
      properties:
        vCenter:
          $ref: "#/components/schemas/HostName"
          description: The VMware vCenter hostname.
        nsx:
          $ref: "#/components/schemas/HostName"
          description: The VMware NSX hostname.
        nsxManager1:
          $ref: "#/components/schemas/HostName"
          description: The hostname for the first VMware NSX Manager virtual machine (VM).
        nsxManager2:
          $ref: "#/components/schemas/HostName"
          description: The hostname for the second VMware NSX Manager virtual machine (VM).
        nsxManager3:
          $ref: "#/components/schemas/HostName"
          description: The hostname for the third VMware NSX Manager virtual machine (VM).
        nsxEdge1:
          $ref: "#/components/schemas/HostName"
          description: The hostname for the first NSX Edge node.
        nsxEdge2:
          $ref: "#/components/schemas/HostName"
          description: The hostname for the second NSX Edge node.
        sddcManager:
          $ref: "#/components/schemas/HostName"
          description: The hostname for SDDC Manager.
        cloudBuilder:
          $ref: "#/components/schemas/HostName"
          description: The hostname for VMware Cloud Builder.
      required:
        - vCenter
        - nsx
        - nsxManager1
        - nsxManager2
        - nsxManager3
        - nsxEdge1
        - nsxEdge2
        - sddcManager
        - cloudBuilder
    CreateEnvironmentResponse:
      type: object
      properties:
        environment:
          $ref: "#/components/schemas/Environment"
          description: A description of the created environment.
    Environment:
      description: An object that represents an Amazon EVS environment.
      type: object
      properties:
        environmentId:
          $ref: "#/components/schemas/EnvironmentId"
          description: The unique ID for the environment.
        environmentState:
          $ref: "#/components/schemas/EnvironmentState"
          description: The state of an environment.
        stateDetails:
          $ref: "#/components/schemas/StateDetails"
          description: A detailed description of the environmentState of an environment.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the environment was created.
        modifiedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the environment was modified.
        environmentArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the environment.
        environmentName:
          $ref: "#/components/schemas/EnvironmentName"
          description: The name of the environment.
        vpcId:
          $ref: "#/components/schemas/VpcId"
          description: The VPC associated with the environment.
        serviceAccessSubnetId:
          $ref: "#/components/schemas/SubnetId"
          description: The subnet that is used to establish connectivity between the Amazon EVS control plane and VPC. Amazon EVS uses this subnet to perform validations and create the environment.
        vcfVersion:
          $ref: "#/components/schemas/VcfVersion"
          description: The VCF version of the environment.
        termsAccepted:
          $ref: "#/components/schemas/Boolean"
          description: Customer confirmation that the customer has purchased and will continue to maintain the required number of VCF software licenses to cover all physical processor cores in the Amazon EVS environment. Information about your VCF software in Amazon EVS will be shared with Broadcom to verify license compliance. Amazon EVS does not validate license keys. To validate license keys, visit the Broadcom support portal.
        licenseInfo:
          $ref: "#/components/schemas/LicenseInfoList"
          description: "The license information that Amazon EVS requires to create an environment. Amazon EVS requires two license keys: a VCF solution key and a vSAN license key. The VCF solution key must meet minimum core requirements, and the vSAN license key must meet minimum capacity requirements for your selected instance type. For information about minimum license requirements, see the VCF subscriptions section in the Amazon EVS User Guide."
        siteId:
          $ref: "#/components/schemas/String"
          description: The Broadcom Site ID that is associated with your Amazon EVS environment. Amazon EVS uses the Broadcom Site ID that you provide to meet Broadcom VCF license usage reporting requirements for Amazon EVS.
        environmentStatus:
          $ref: "#/components/schemas/CheckResult"
          description: Reports impaired functionality that stems from issues internal to the environment, such as impaired reachability.
        checks:
          $ref: "#/components/schemas/ChecksList"
          description: A check on the environment to identify instance health and VMware VCF licensing issues.
        connectivityInfo:
          $ref: "#/components/schemas/ConnectivityInfo"
          description: The connectivity configuration for the environment. Amazon EVS requires that you specify two route server peer IDs. During environment creation, the route server endpoints peer with the NSX uplink VLAN for connectivity to the NSX overlay network.
        vcfHostnames:
          $ref: "#/components/schemas/VcfHostnames"
          description: The DNS hostnames to be used by the VCF management appliances in your environment. For environment creation to be successful, each hostname entry must resolve to a domain name that you've registered in your DNS service of choice and configured in the DHCP option set of your VPC. DNS hostnames cannot be changed after environment creation has started.
        kmsKeyId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services KMS key ID that Amazon Web Services Secrets Manager uses to encrypt secrets that are associated with the environment. These secrets contain the VCF credentials that are needed to install vCenter Server, NSX, and SDDC Manager. By default, Amazon EVS use the Amazon Web Services Secrets Manager managed key aws/secretsmanager. You can also specify a customer managed key.
        serviceAccessSecurityGroups:
          $ref: "#/components/schemas/ServiceAccessSecurityGroups"
          description: The security groups that allow traffic between the Amazon EVS control plane and your VPC for service access. If a security group is not specified, Amazon EVS uses the default security group in your account for service access.
        credentials:
          $ref: "#/components/schemas/SecretList"
          description: The VCF credentials that are stored as Amazon EVS managed secrets in Amazon Web Services Secrets Manager. Amazon EVS stores credentials that are needed to install vCenter Server, NSX, and SDDC Manager.
    EnvironmentState:
      type: string
      enum:
        - CREATING
        - CREATED
        - DELETING
        - DELETED
        - CREATE_FAILED
    Arn:
      type: string
      minLength: 1
      maxLength: 1011
      pattern: arn:aws:evs:[a-z]{2}-[a-z]+-[0-9]:[0-9]{12}:environment/[a-zA-Z0-9_-]+
    CheckResult:
      type: string
      enum:
        - PASSED
        - FAILED
        - UNKNOWN
    ChecksList:
      type: array
      items:
        $ref: "#/components/schemas/Check"
    Check:
      description: A check on the environment to identify environment health and validate VMware VCF licensing compliance.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/CheckType"
          description: "The check type. Amazon EVS performs the following checks. KEY_REUSE: checks that the VCF license key is not used by another Amazon EVS environment. This check fails if a used license is added to the environment. KEY_COVERAGE: checks that your VCF license key allocates sufficient vCPU cores for all deployed hosts. The check fails when any assigned hosts in the EVS environment are not covered by license keys, or when any unassigned hosts cannot be covered by available vCPU cores in keys. REACHABILITY: checks that the Amazon EVS control plane has a persistent connection to SDDC Manager. If Amazon EVS cannot reach the environment, this check fails. HOST_COUNT: Checks that your environment has a minimum of 4 hosts. If this check fails, you will need to add hosts so that your environment meets this minimum requirement. Amazon EVS only supports environments with 4-16 hosts."
        result:
          $ref: "#/components/schemas/CheckResult"
          description: The check result.
        impairedSince:
          $ref: "#/components/schemas/Timestamp"
          description: The time when environment health began to be impaired.
    CheckType:
      type: string
      enum:
        - KEY_REUSE
        - KEY_COVERAGE
        - REACHABILITY
        - HOST_COUNT
        - VCENTER_REACHABILITY
        - VCENTER_VM_SYNC
        - VCENTER_VM_EVENT
    SecretList:
      type: array
      items:
        $ref: "#/components/schemas/Secret"
    Secret:
      description: A managed secret that contains the credentials for installing vCenter Server, NSX, and SDDC Manager. During environment creation, the Amazon EVS control plane uses Amazon Web Services Secrets Manager to create, encrypt, validate, and store secrets. If you choose to delete your environment, Amazon EVS also deletes the secrets that are associated with your environment. Amazon EVS does not provide managed rotation of secrets. We recommend that you rotate secrets regularly to ensure that secrets are not long-lived.
      type: object
      properties:
        secretArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the secret.
    ConnectorType:
      type: string
      enum:
        - VCENTER
    ApplianceFqdn:
      type: string
      minLength: 1
      maxLength: 253
      pattern: "[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(\\.[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*"
    SecretIdentifier:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: (arn:aws:secretsmanager:[a-z0-9-]+:[0-9]{12}:secret:[a-zA-Z0-9/_+=.@!-]+|[a-zA-Z0-9/_+=.@!-]+)
    CreateEnvironmentConnectorResponse:
      type: object
      properties:
        connector:
          $ref: "#/components/schemas/Connector"
          description: A description of the created connector.
    Connector:
      description: An object that represents a connector for an Amazon EVS environment. A connector establishes a vCenter connection using the credentials stored in Amazon Web Services Secrets Manager.
      type: object
      properties:
        environmentId:
          $ref: "#/components/schemas/EnvironmentId"
          description: The unique ID of the environment that the connector belongs to.
        connectorId:
          $ref: "#/components/schemas/ConnectorId"
          description: The unique ID of the connector.
        type_:
          $ref: "#/components/schemas/ConnectorType"
          description: The type of the connector.
        applianceFqdn:
          $ref: "#/components/schemas/ApplianceFqdn"
          description: The fully qualified domain name (FQDN) of the VCF appliance that the connector connects to.
        secretArn:
          $ref: "#/components/schemas/SecretIdentifier"
          description: The Amazon Resource Name (ARN) of the Amazon Web Services Secrets Manager secret that stores the credentials for the VCF appliance.
        state:
          $ref: "#/components/schemas/ConnectorState"
          description: The state of the connector.
        stateDetails:
          $ref: "#/components/schemas/StateDetails"
          description: A detailed description of the connector state.
        status:
          $ref: "#/components/schemas/CheckResult"
          description: The status of the connector.
        checks:
          $ref: "#/components/schemas/ConnectorsChecksList"
          description: A list of checks that are run on the connector.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the connector was created.
        modifiedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the connector was modified.
    ConnectorState:
      type: string
      enum:
        - CREATING
        - CREATE_FAILED
        - ACTIVE
        - UPDATING
        - UPDATE_FAILED
        - DELETING
        - DELETED
    ConnectorsChecksList:
      type: array
      items:
        $ref: "#/components/schemas/ConnectorCheck"
    ConnectorCheck:
      description: A check on a connector to identify connectivity health.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/CheckType"
          description: The check type.
        result:
          $ref: "#/components/schemas/CheckResult"
          description: The check result.
        lastCheckAttempt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time of the last check attempt.
        impairedSince:
          $ref: "#/components/schemas/Timestamp"
          description: The time when connector health began to be impaired.
    EsxVersion:
      type: string
      minLength: 0
      maxLength: 128
    CreateEnvironmentHostResponse:
      type: object
