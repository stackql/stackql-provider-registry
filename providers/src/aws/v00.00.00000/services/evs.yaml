openapi: 3.0.0
info:
  version: "2023-07-27"
  title: Amazon Elastic VMware Service
  description: Amazon Elastic VMware Service
  x-serviceName: evs
  x-serviceAlias: evs
  x-protocol: json
  x-apiVersion: "2023-07-27"
  x-endpointPrefix: evs
  x-targetPrefix: AmazonElasticVMwareService
  x-jsonVersion: "1.0"
servers:
  - url: https://evs.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for evs
paths:
  /AssociateEipToVlan:
    post:
      operationId: AssociateEipToVlan
      description: Associates an Elastic IP address with a public HCX VLAN. This operation is only allowed for public HCX VLANs at this time.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonElasticVMwareService.AssociateEipToVlan
            default: AmazonElasticVMwareService.AssociateEipToVlan
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: This parameter is not used in Amazon EVS currently. If you supply input for this parameter, it will have no effect. A unique, case-sensitive identifier that you provide to ensure the idempotency of the environment creation request. If you do not specify a client token, a randomly generated token is used for the request to ensure idempotency.
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: A unique ID for the environment containing the VLAN that the Elastic IP address associates with.
                vlanName:
                  $ref: "#/components/schemas/AssociateEipToVlanRequestVlanNameString"
                  description: The name of the VLAN. hcx is the only accepted VLAN name at this time.
                allocationId:
                  $ref: "#/components/schemas/AllocationId"
                  description: The Elastic IP address allocation ID.
              required:
                - environmentId
                - vlanName
                - allocationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateEipToVlanResponse"
  /CreateEntitlement:
    post:
      operationId: CreateEntitlement
      description: Creates a Windows Server License entitlement for virtual machines in an Amazon EVS environment using the provided vCenter Server connector. This is an asynchronous operation. Amazon EVS validates the specified virtual machines before starting usage tracking.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonElasticVMwareService.CreateEntitlement
            default: AmazonElasticVMwareService.CreateEntitlement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: This parameter is not used in Amazon EVS currently. If you supply input for this parameter, it will have no effect. A unique, case-sensitive identifier that you provide to ensure the idempotency of the entitlement creation request. If you do not specify a client token, a randomly generated token is used for the request to ensure idempotency.
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: A unique ID for the environment to create the entitlement in.
                connectorId:
                  $ref: "#/components/schemas/ConnectorId"
                  description: A unique ID for the connector associated with the entitlement.
                entitlementType:
                  $ref: "#/components/schemas/EntitlementType"
                  description: The type of entitlement to create.
                vmIds:
                  $ref: "#/components/schemas/VmIdList"
                  description: The list of VMware vSphere virtual machine managed object IDs to create entitlements for.
              required:
                - environmentId
                - connectorId
                - entitlementType
                - vmIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEntitlementResponse"
  /CreateEnvironment:
    post:
      operationId: CreateEnvironment
      description: Creates an Amazon EVS environment that runs VCF software, such as SDDC Manager, NSX Manager, and vCenter Server. During environment creation, Amazon EVS performs validations on DNS settings, provisions VLAN subnets and hosts, and deploys the supplied version of VCF. It can take several hours to create an environment. After the deployment completes, you can configure VCF in the vSphere user interface according to your needs. When creating a new environment, the default ESX version for the selected VCF version will be used, you cannot choose a specific ESX version in CreateEnvironment action. When a host has been added with a specific ESX version, it can only be upgraded using vCenter Lifecycle Manager. You cannot use the dedicatedHostId and placementGroupId parameters together in the same CreateEnvironment action. This results in a ValidationException response.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonElasticVMwareService.CreateEnvironment
            default: AmazonElasticVMwareService.CreateEnvironment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: This parameter is not used in Amazon EVS currently. If you supply input for this parameter, it will have no effect. A unique, case-sensitive identifier that you provide to ensure the idempotency of the environment creation request. If you do not specify a client token, a randomly generated token is used for the request to ensure idempotency.
                environmentName:
                  $ref: "#/components/schemas/EnvironmentName"
                  description: The name to give to your environment. The name can contain only alphanumeric characters (case-sensitive), hyphens, and underscores. It must start with an alphanumeric character, and can't be longer than 100 characters. The name must be unique within the Amazon Web Services Region and Amazon Web Services account that you're creating the environment in.
                kmsKeyId:
                  $ref: "#/components/schemas/String"
                  description: A unique ID for the customer-managed KMS key that is used to encrypt the VCF credential pairs for SDDC Manager, NSX Manager, and vCenter appliances. These credentials are stored in Amazon Web Services Secrets Manager.
                tags:
                  $ref: "#/components/schemas/RequestTagMap"
                  description: Metadata that assists with categorization and organization. Each tag consists of a key and an optional value. You define both. Tags don't propagate to any other cluster or Amazon Web Services resources.
                serviceAccessSecurityGroups:
                  $ref: "#/components/schemas/ServiceAccessSecurityGroups"
                  description: The security group that controls communication between the Amazon EVS control plane and VPC. The default security group is used if a custom security group isn't specified. The security group should allow access to the following. TCP/UDP access to the DNS servers HTTPS/SSH access to the host management VLAN subnet HTTPS/SSH access to the Management VM VLAN subnet You should avoid modifying the security group rules after deployment, as this can break the persistent connection between the Amazon EVS control plane and VPC. This can cause future environment actions like adding or removing hosts to fail.
                vpcId:
                  $ref: "#/components/schemas/VpcId"
                  description: "A unique ID for the VPC that the environment is deployed inside. Amazon EVS requires that all VPC subnets exist in a single Availability Zone in a Region where the service is available. The VPC that you specify must have a valid DHCP option set with domain name, at least two DNS servers, and an NTP server. These settings are used to configure your VCF appliances and hosts. The VPC cannot be used with any other deployed Amazon EVS environment. Amazon EVS does not provide multi-VPC support for environments at this time. Amazon EVS does not support the following Amazon Web Services networking options for NSX overlay connectivity: cross-Region VPC peering, Amazon S3 gateway endpoints, or Amazon Web Services Direct Connect virtual private gateway associations. Ensure that you specify a VPC that is adequately sized to accommodate the Amazon EVS subnets."
                serviceAccessSubnetId:
                  $ref: "#/components/schemas/SubnetId"
                  description: The subnet that is used to establish connectivity between the Amazon EVS control plane and VPC. Amazon EVS uses this subnet to validate mandatory DNS records for your VCF appliances and hosts and create the environment.
                vcfVersion:
                  $ref: "#/components/schemas/VcfVersion"
                  description: The VCF version to use for the environment.
                termsAccepted:
                  $ref: "#/components/schemas/Boolean"
                  description: Customer confirmation that the customer has purchased and will continue to maintain the required number of VCF software licenses to cover all physical processor cores in the Amazon EVS environment. Information about your VCF software in Amazon EVS will be shared with Broadcom to verify license compliance. Amazon EVS does not validate license keys. To validate license keys, visit the Broadcom support portal.
                licenseInfo:
                  $ref: "#/components/schemas/LicenseInfoList"
                  description: "The license information that Amazon EVS requires to create an environment. Amazon EVS requires two license keys: a VCF solution key and a vSAN license key. The VCF solution key must meet minimum core requirements, and the vSAN license key must meet minimum capacity requirements for your selected instance type. For information about minimum license requirements, see the VCF subscriptions section in the Amazon EVS User Guide. VCF licenses can be used for only one Amazon EVS environment. Amazon EVS does not support reuse of VCF licenses for multiple environments. VCF license information can be retrieved from the Broadcom portal."
                initialVlans:
                  $ref: "#/components/schemas/InitialVlans"
                  description: The initial VLAN subnets for the Amazon EVS environment. For each Amazon EVS VLAN subnet, you must specify a non-overlapping CIDR block. Amazon EVS VLAN subnets have a minimum CIDR block size of /28 and a maximum size of /24.
                hosts:
                  $ref: "#/components/schemas/HostInfoForCreateList"
                  description: The ESX hosts to add to the environment. Amazon EVS requires that you provide details for a minimum of 4 hosts during environment creation. For each host, you must provide the desired hostname, EC2 SSH keypair name, and EC2 instance type. Optionally, you can also provide a partition or cluster placement group to use, or use Amazon EC2 Dedicated Hosts.
                connectivityInfo:
                  $ref: "#/components/schemas/ConnectivityInfo"
                  description: The connectivity configuration for the environment. Amazon EVS requires that you specify two route server peer IDs. During environment creation, the route server endpoints peer with the NSX edges over the NSX uplink subnet, providing BGP-based dynamic routing for overlay networks.
                vcfHostnames:
                  $ref: "#/components/schemas/VcfHostnames"
                  description: "The DNS hostnames for the virtual machines that host the VCF management appliances. Amazon EVS requires that you provide DNS hostnames for the following appliances: vCenter, NSX Manager, SDDC Manager, and Cloud Builder."
                siteId:
                  $ref: "#/components/schemas/String"
                  description: The Broadcom Site ID that is allocated to you as part of your electronic software delivery. This ID allows customer access to the Broadcom portal, and is provided to you by Broadcom at the close of your software contract or contract renewal. Amazon EVS uses the Broadcom Site ID that you provide to meet Broadcom VCF license usage reporting requirements for Amazon EVS.
              required:
                - vpcId
                - serviceAccessSubnetId
                - vcfVersion
                - termsAccepted
                - licenseInfo
                - initialVlans
                - hosts
                - connectivityInfo
                - vcfHostnames
                - siteId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEnvironmentResponse"
  /CreateEnvironmentConnector:
    post:
      operationId: CreateEnvironmentConnector
      description: Creates a connector for an Amazon EVS environment. A connector establishes a connection to a VCF appliance, such as vCenter, using a fully qualified domain name and an Amazon Web Services Secrets Manager secret that stores the appliance credentials.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonElasticVMwareService.CreateEnvironmentConnector
            default: AmazonElasticVMwareService.CreateEnvironmentConnector
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: This parameter is not used in Amazon EVS currently. If you supply input for this parameter, it will have no effect. A unique, case-sensitive identifier that you provide to ensure the idempotency of the connector creation request. If you do not specify a client token, a randomly generated token is used for the request to ensure idempotency.
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: A unique ID for the environment to create the connector in.
                type:
                  $ref: "#/components/schemas/ConnectorType"
                  description: The type of connector to create.
                applianceFqdn:
                  $ref: "#/components/schemas/ApplianceFqdn"
                  description: The fully qualified domain name (FQDN) of the VCF appliance that the connector targets.
                secretIdentifier:
                  $ref: "#/components/schemas/SecretIdentifier"
                  description: The ARN or name of the Amazon Web Services Secrets Manager secret that stores the credentials for the VCF appliance. Do not use credentials with Administrator privileges. We recommend using a service account with the minimum required permissions.
              required:
                - environmentId
                - type
                - applianceFqdn
                - secretIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEnvironmentConnectorResponse"
  /CreateEnvironmentHost:
    post:
      operationId: CreateEnvironmentHost
      description: Creates an ESX host and adds it to an Amazon EVS environment. Amazon EVS supports 4-16 hosts per environment. This action can only be used after the Amazon EVS environment is deployed. You can use the dedicatedHostId parameter to specify an Amazon EC2 Dedicated Host for ESX host creation. You can use the placementGroupId parameter to specify a cluster or partition placement group to launch EC2 instances into. If you don't specify an ESX version when adding hosts using CreateEnvironmentHost action, Amazon EVS automatically uses the default ESX version associated with your environment's VCF version. To find the default ESX version for a particular VCF version, use the GetVersions action. You cannot use the dedicatedHostId and placementGroupId parameters together in the same CreateEnvironmentHost action. This results in a ValidationException response.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonElasticVMwareService.CreateEnvironmentHost
            default: AmazonElasticVMwareService.CreateEnvironmentHost
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: This parameter is not used in Amazon EVS currently. If you supply input for this parameter, it will have no effect. A unique, case-sensitive identifier that you provide to ensure the idempotency of the host creation request. If you do not specify a client token, a randomly generated token is used for the request to ensure idempotency.
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: A unique ID for the environment that the host is added to.
                host:
                  $ref: "#/components/schemas/HostInfoForCreate"
                  description: The host that is created and added to the environment.
                esxVersion:
                  $ref: "#/components/schemas/EsxVersion"
                  description: The ESX version to use for the host.
              required:
                - environmentId
                - host
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEnvironmentHostResponse"
  /DeleteEntitlement:
    post:
      operationId: DeleteEntitlement
      description: Deletes a Windows Server License entitlement for virtual machines in an Amazon EVS environment. Deleting an entitlement stops usage tracking for the specified virtual machines.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonElasticVMwareService.DeleteEntitlement
            default: AmazonElasticVMwareService.DeleteEntitlement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: This parameter is not used in Amazon EVS currently. If you supply input for this parameter, it will have no effect. A unique, case-sensitive identifier that you provide to ensure the idempotency of the entitlement deletion request. If you do not specify a client token, a randomly generated token is used for the request to ensure idempotency.
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: A unique ID for the environment that the entitlement belongs to.
                connectorId:
                  $ref: "#/components/schemas/ConnectorId"
                  description: A unique ID for the connector associated with the entitlement.
                entitlementType:
                  $ref: "#/components/schemas/EntitlementType"
                  description: The type of entitlement to delete.
                vmIds:
                  $ref: "#/components/schemas/VmIdList"
                  description: The list of VMware vSphere virtual machine managed object IDs to delete entitlements for.
              required:
                - environmentId
                - connectorId
                - entitlementType
                - vmIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEntitlementResponse"
  /DeleteEnvironment:
    post:
      operationId: DeleteEnvironment
      description: Deletes an Amazon EVS environment. Amazon EVS environments will only be enabled for deletion once the hosts are deleted. You can delete hosts using the DeleteEnvironmentHost action. Environment deletion also deletes the associated Amazon EVS VLAN subnets and Amazon Web Services Secrets Manager secrets that Amazon EVS created. Amazon Web Services resources that you create are not deleted. These resources may continue to incur costs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonElasticVMwareService.DeleteEnvironment
            default: AmazonElasticVMwareService.DeleteEnvironment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: This parameter is not used in Amazon EVS currently. If you supply input for this parameter, it will have no effect. A unique, case-sensitive identifier that you provide to ensure the idempotency of the environment deletion request. If you do not specify a client token, a randomly generated token is used for the request to ensure idempotency.
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: A unique ID associated with the environment to be deleted.
              required:
                - environmentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEnvironmentResponse"
  /DeleteEnvironmentConnector:
    post:
      operationId: DeleteEnvironmentConnector
      description: Deletes a connector from an Amazon EVS environment. Before deleting a connector, you must remove all entitlements that are associated with the same vCenter.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonElasticVMwareService.DeleteEnvironmentConnector
            default: AmazonElasticVMwareService.DeleteEnvironmentConnector
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: This parameter is not used in Amazon EVS currently. If you supply input for this parameter, it will have no effect. A unique, case-sensitive identifier that you provide to ensure the idempotency of the connector deletion request. If you do not specify a client token, a randomly generated token is used for the request to ensure idempotency.
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: A unique ID for the environment that the connector belongs to.
                connectorId:
                  $ref: "#/components/schemas/ConnectorId"
                  description: A unique ID for the connector to be deleted.
              required:
                - environmentId
                - connectorId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEnvironmentConnectorResponse"
  /DeleteEnvironmentHost:
    post:
      operationId: DeleteEnvironmentHost
      description: Deletes a host from an Amazon EVS environment. Before deleting a host, you must unassign and decommission the host from within the SDDC Manager user interface. Not doing so could impact the availability of your virtual machines or result in data loss.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonElasticVMwareService.DeleteEnvironmentHost
            default: AmazonElasticVMwareService.DeleteEnvironmentHost
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: This parameter is not used in Amazon EVS currently. If you supply input for this parameter, it will have no effect. A unique, case-sensitive identifier that you provide to ensure the idempotency of the host deletion request. If you do not specify a client token, a randomly generated token is used for the request to ensure idempotency.
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: A unique ID for the host's environment.
                hostName:
                  $ref: "#/components/schemas/HostName"
                  description: The DNS hostname associated with the host to be deleted.
              required:
                - environmentId
                - hostName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEnvironmentHostResponse"
  /DisassociateEipFromVlan:
    post:
      operationId: DisassociateEipFromVlan
      description: Disassociates an Elastic IP address from a public HCX VLAN. This operation is only allowed for public HCX VLANs at this time.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonElasticVMwareService.DisassociateEipFromVlan
            default: AmazonElasticVMwareService.DisassociateEipFromVlan
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: This parameter is not used in Amazon EVS currently. If you supply input for this parameter, it will have no effect. A unique, case-sensitive identifier that you provide to ensure the idempotency of the environment creation request. If you do not specify a client token, a randomly generated token is used for the request to ensure idempotency.
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: A unique ID for the environment containing the VLAN that the Elastic IP address disassociates from.
                vlanName:
                  $ref: "#/components/schemas/DisassociateEipFromVlanRequestVlanNameString"
                  description: The name of the VLAN. hcx is the only accepted VLAN name at this time.
                associationId:
                  $ref: "#/components/schemas/AssociationId"
                  description: A unique ID for the Elastic IP address association.
              required:
                - environmentId
                - vlanName
                - associationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateEipFromVlanResponse"
  /GetEnvironment:
    post:
      operationId: GetEnvironment
      description: Returns a description of the specified environment.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonElasticVMwareService.GetEnvironment
            default: AmazonElasticVMwareService.GetEnvironment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: A unique ID for the environment.
              required:
                - environmentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEnvironmentResponse"
  /GetVersions:
    post:
      operationId: GetVersions
      description: Returns information about VCF versions, ESX versions and EC2 instance types provided by Amazon EVS. For each VCF version, the response also includes the default ESX version and provided EC2 instance types.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonElasticVMwareService.GetVersions
            default: AmazonElasticVMwareService.GetVersions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetVersionsResponse"
  /ListEnvironmentConnectors:
    post:
      operationId: ListEnvironmentConnectors
      description: Lists the connectors within an environment. Returns the status of each connector and its applicable checks, among other connector details.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonElasticVMwareService.ListEnvironmentConnectors
            default: AmazonElasticVMwareService.ListEnvironmentConnectors
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: A unique pagination token for each page. If nextToken is returned, there are more results available. Make the call again using the returned token with all other arguments unchanged to retrieve the next page. Each pagination token expires after 24 hours. Using an expired pagination token will return an HTTP 400 InvalidToken error.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return. If you specify MaxResults in the request, the response includes information up to the limit specified.
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: A unique ID for the environment.
              required:
                - environmentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEnvironmentConnectorsResponse"
  /ListEnvironmentHosts:
    post:
      operationId: ListEnvironmentHosts
      description: List the hosts within an environment.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonElasticVMwareService.ListEnvironmentHosts
            default: AmazonElasticVMwareService.ListEnvironmentHosts
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: A unique pagination token for each page. If nextToken is returned, there are more results available. Make the call again using the returned token with all other arguments unchanged to retrieve the next page. Each pagination token expires after 24 hours. Using an expired pagination token will return an HTTP 400 InvalidToken error.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return. If you specify MaxResults in the request, the response includes information up to the limit specified.
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: A unique ID for the environment.
              required:
                - environmentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEnvironmentHostsResponse"
  /ListEnvironmentVlans:
    post:
      operationId: ListEnvironmentVlans
