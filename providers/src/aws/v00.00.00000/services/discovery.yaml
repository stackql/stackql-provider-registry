      type: object
      properties:
        importTaskId:
          $ref: "#/components/schemas/ImportTaskIdentifier"
          description: The unique ID for a specific import task. These IDs aren't globally unique, but they are unique within an Amazon Web Services account.
        clientRequestToken:
          $ref: "#/components/schemas/ClientRequestToken"
          description: A unique token used to prevent the same import request from occurring more than once. If you didn't provide a token, a token was automatically generated when the import task request was sent.
        name:
