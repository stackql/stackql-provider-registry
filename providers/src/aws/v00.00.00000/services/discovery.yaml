            application/json:
              schema:
                $ref: "#/components/schemas/UpdateApplicationResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ApplicationId:
      type: string
      maxLength: 200
      pattern: \S+
    ConfigurationIdList:
      type: array
      items:
        $ref: "#/components/schemas/ConfigurationId"
    ConfigurationId:
      type: string
      maxLength: 200
      pattern: \S*
    AssociateConfigurationItemsToApplicationResponse:
      type: object
    DeleteAgents:
      type: array
      items:
        $ref: "#/components/schemas/DeleteAgent"
    DeleteAgent:
      description: An object representing the agent or data collector to be deleted along with the optional configurations for error handling.
      type: object
      properties:
        agentId:
          $ref: "#/components/schemas/AgentId"
          description: The ID of the agent or data collector to delete.
        force:
          $ref: "#/components/schemas/Boolean"
          description: Optional flag used to force delete an agent or data collector. It is needed to delete any agent in HEALTHY/UNHEALTHY/RUNNING status. Note that deleting an agent that is actively reporting health causes it to be re-registered with a different agent ID after data collector re-connects with Amazon Web Services.
      required:
        - agentId
    AgentId:
      type: string
      minLength: 10
      maxLength: 20
      pattern: \S+
    Boolean:
      type: boolean
    BatchDeleteAgentsResponse:
      type: object
      properties:
        errors:
          $ref: "#/components/schemas/BatchDeleteAgentErrors"
          description: A list of agent IDs that failed to delete during the deletion task, each paired with an error message.
    BatchDeleteAgentErrors:
      type: array
      items:
        $ref: "#/components/schemas/BatchDeleteAgentError"
    BatchDeleteAgentError:
      description: An object representing the agent or data collector that failed to delete, each containing agentId, errorMessage, and errorCode.
      type: object
      properties:
        agentId:
          $ref: "#/components/schemas/AgentId"
          description: The ID of the agent or data collector to delete.
        errorMessage:
          $ref: "#/components/schemas/String"
          description: The description of the error that occurred for the delete failed agent.
        errorCode:
          $ref: "#/components/schemas/DeleteAgentErrorCode"
          description: "The type of error that occurred for the delete failed agent. Valid status are: AGENT_IN_USE | NOT_FOUND | INTERNAL_SERVER_ERROR."
      required:
        - agentId
        - errorMessage
        - errorCode
    String:
      type: string
      maxLength: 10000
      pattern: "[\\s\\S]*"
    DeleteAgentErrorCode:
      type: string
      enum:
        - NOT_FOUND
        - INTERNAL_SERVER_ERROR
        - AGENT_IN_USE
    ToDeleteIdentifierList:
      type: array
      items:
        $ref: "#/components/schemas/ImportTaskIdentifier"
    ImportTaskIdentifier:
      type: string
      maxLength: 200
      pattern: ^import-task-[a-fA-F0-9]{32}$
    BatchDeleteImportDataResponse:
      type: object
      properties:
        errors:
          $ref: "#/components/schemas/BatchDeleteImportDataErrorList"
          description: Error messages returned for each import task that you deleted as a response for this command.
    BatchDeleteImportDataErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchDeleteImportDataError"
    BatchDeleteImportDataError:
      description: Error messages returned for each import task that you deleted as a response for this command.
      type: object
      properties:
        importTaskId:
          $ref: "#/components/schemas/ImportTaskIdentifier"
          description: The unique import ID associated with the error that occurred.
        errorCode:
          $ref: "#/components/schemas/BatchDeleteImportDataErrorCode"
          description: The type of error that occurred for a specific import task.
        errorDescription:
          $ref: "#/components/schemas/BatchDeleteImportDataErrorDescription"
          description: The description of the error that occurred for a specific import task.
    BatchDeleteImportDataErrorCode:
      type: string
      enum:
        - NOT_FOUND
        - INTERNAL_SERVER_ERROR
        - OVER_LIMIT
    BatchDeleteImportDataErrorDescription:
      type: string
    ApplicationName:
      type: string
      maxLength: 127
      pattern: "[\\s\\S]*\\S[\\s\\S]*"
    ApplicationDescription:
      type: string
      maxLength: 1000
      pattern: (^$|[\s\S]*\S[\s\S]*)
    ApplicationWave:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^($|[^\s\x00]( *[^\s\x00])*$)
    CreateApplicationResponse:
      type: object
      properties:
        configurationId:
          $ref: "#/components/schemas/String"
          description: The configuration ID of an application to be created.
    TagSet:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Metadata that help you categorize IT assets. Do not store sensitive information (like personal data) in tags.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: The type of tag on which to filter.
        value:
          $ref: "#/components/schemas/TagValue"
          description: A value for a tag key on which to filter.
      required:
        - key
        - value
    TagKey:
      type: string
    TagValue:
      type: string
    CreateTagsResponse:
      type: object
    ApplicationIdsList:
      type: array
      items:
        $ref: "#/components/schemas/ApplicationId"
    DeleteApplicationsResponse:
      type: object
    DeleteTagsResponse:
      type: object
    AgentIds:
      type: array
      items:
        $ref: "#/components/schemas/AgentId"
    Filters:
      type: array
      items:
        $ref: "#/components/schemas/Filter"
    Filter:
      description: A filter that can use conditional operators. For more information about filters, see Querying Discovered Configuration Items in the Amazon Web Services Application Discovery Service User Guide.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the filter.
        values:
          $ref: "#/components/schemas/FilterValues"
          description: A string value on which to filter. For example, if you choose the destinationServer.osVersion filter name, you could specify Ubuntu for the value.
        condition:
          $ref: "#/components/schemas/Condition"
          description: "A conditional operator. The following operators are valid: EQUALS, NOT_EQUALS, CONTAINS, NOT_CONTAINS. If you specify multiple filters, the system utilizes all filters as though concatenated by AND. If you specify multiple values for a particular filter, the system differentiates the values using OR. Calling either DescribeConfigurations or ListConfigurations returns attributes of matching configuration items."
      required:
        - name
        - values
        - condition
    FilterValues:
      type: array
      items:
        $ref: "#/components/schemas/FilterValue"
    FilterValue:
      type: string
      maxLength: 1000
      pattern: (^$|[\s\S]*\S[\s\S]*)
    Condition:
      type: string
      maxLength: 200
      pattern: \S+
    Integer:
      type: integer
    NextToken:
      type: string
    DescribeAgentsResponse:
      type: object
      properties:
        agentsInfo:
          $ref: "#/components/schemas/AgentsInfo"
          description: Lists agents or the collector by ID or lists all agents/collectors associated with your user, if you did not specify an agent/collector ID. The output includes agent/collector IDs, IP addresses, media access control (MAC) addresses, agent/collector health, host name where the agent/collector resides, and the version number of each agent/collector.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: Token to retrieve the next set of results. For example, if you specified 100 IDs for DescribeAgentsRequest$agentIds but set DescribeAgentsRequest$maxResults to 10, you received a set of 10 results along with this token. Use this token in the next query to retrieve the next set of 10.
    AgentsInfo:
      type: array
      items:
        $ref: "#/components/schemas/AgentInfo"
    AgentInfo:
      description: Information about agents associated with the user’s Amazon Web Services account. Information includes agent IDs, IP addresses, media access control (MAC) addresses, agent or collector status, hostname where the agent resides, and agent version for each agent.
      type: object
      properties:
        agentId:
          $ref: "#/components/schemas/AgentId"
          description: The agent or collector ID.
        hostName:
          $ref: "#/components/schemas/String"
          description: The name of the host where the agent or collector resides. The host can be a server or virtual machine.
        agentNetworkInfoList:
          $ref: "#/components/schemas/AgentNetworkInfoList"
          description: Network details about the host where the agent or collector resides.
        connectorId:
          $ref: "#/components/schemas/String"
          description: The ID of the connector.
        version:
          $ref: "#/components/schemas/String"
          description: The agent or collector version.
        health:
          $ref: "#/components/schemas/AgentStatus"
          description: The health of the agent.
        lastHealthPingTime:
          $ref: "#/components/schemas/String"
          description: Time since agent health was reported.
        collectionStatus:
          $ref: "#/components/schemas/String"
          description: Status of the collection process for an agent.
        agentType:
          $ref: "#/components/schemas/String"
          description: Type of agent.
        registeredTime:
          $ref: "#/components/schemas/String"
          description: Agent's first registration timestamp in UTC.
    AgentNetworkInfoList:
      type: array
      items:
        $ref: "#/components/schemas/AgentNetworkInfo"
    AgentNetworkInfo:
      description: Network details about the host where the agent/collector resides.
      type: object
      properties:
        ipAddress:
          $ref: "#/components/schemas/String"
          description: The IP address for the host where the agent/collector resides.
        macAddress:
          $ref: "#/components/schemas/String"
          description: The MAC address for the host where the agent/collector resides.
    AgentStatus:
      type: string
      enum:
        - HEALTHY
        - UNHEALTHY
        - RUNNING
        - UNKNOWN
        - BLACKLISTED
        - SHUTDOWN
    UUID:
      type: string
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    DescribeBatchDeleteConfigurationTaskResponse:
      type: object
      properties:
        task:
          $ref: "#/components/schemas/BatchDeleteConfigurationTask"
          description: The BatchDeleteConfigurationTask that represents the deletion task being executed.
    BatchDeleteConfigurationTask:
      description: A metadata object that represents the deletion task being executed.
      type: object
      properties:
        taskId:
          $ref: "#/components/schemas/UUID"
          description: The deletion task's unique identifier.
        status:
          $ref: "#/components/schemas/BatchDeleteConfigurationTaskStatus"
          description: "The current execution status of the deletion task. Valid status are: INITIALIZING | VALIDATING | DELETING | COMPLETED | FAILED."
        startTime:
          $ref: "#/components/schemas/TimeStamp"
          description: An epoch seconds timestamp (UTC) of when the deletion task was started.
        endTime:
          $ref: "#/components/schemas/TimeStamp"
          description: An epoch seconds timestamp (UTC) of when the deletion task was completed or failed.
        configurationType:
          $ref: "#/components/schemas/DeletionConfigurationItemType"
          description: "The type of configuration item to delete. Supported types are: SERVER."
        requestedConfigurations:
          $ref: "#/components/schemas/ConfigurationIdList"
          description: The list of configuration IDs that were originally requested to be deleted by the deletion task.
        deletedConfigurations:
          $ref: "#/components/schemas/ConfigurationIdList"
          description: The list of configuration IDs that were successfully deleted by the deletion task.
        failedConfigurations:
          $ref: "#/components/schemas/FailedConfigurationList"
          description: A list of configuration IDs that failed to delete during the deletion task, each paired with an error message.
        deletionWarnings:
          $ref: "#/components/schemas/DeletionWarningsList"
          description: A list of configuration IDs that produced warnings regarding their deletion, paired with a warning message.
    BatchDeleteConfigurationTaskStatus:
      type: string
      enum:
        - INITIALIZING
        - VALIDATING
        - DELETING
        - COMPLETED
        - FAILED
    TimeStamp:
      type: string
      format: date-time
    DeletionConfigurationItemType:
      type: string
      enum:
        - SERVER
    FailedConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/FailedConfiguration"
    FailedConfiguration:
      description: A configuration ID paired with an error message.
      type: object
      properties:
        configurationId:
          $ref: "#/components/schemas/ConfigurationId"
          description: The unique identifier of the configuration the failed to delete.
        errorStatusCode:
          $ref: "#/components/schemas/ErrorStatusCode"
          description: The integer error code associated with the error message.
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: A descriptive message indicating why the associated configuration failed to delete.
    ErrorStatusCode:
      type: integer
    ErrorMessage:
      type: string
    DeletionWarningsList:
      type: array
      items:
        $ref: "#/components/schemas/DeletionWarning"
    DeletionWarning:
      description: A configuration ID paired with a warning message.
      type: object
      properties:
        configurationId:
          $ref: "#/components/schemas/ConfigurationId"
          description: The unique identifier of the configuration that produced a warning.
        warningCode:
          $ref: "#/components/schemas/WarningCode"
          description: The integer warning code associated with the warning message.
        warningText:
          $ref: "#/components/schemas/WarningText"
          description: A descriptive message of the warning the associated configuration ID produced.
    WarningCode:
      type: integer
    WarningText:
      type: string
    DescribeConfigurationsRowDisplay:
      type: object
      properties:
        configuration:
          type: object
          description: A key in the response map. The value is an array of data.
    DescribeConfigurationsOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DescribeConfigurationsRowDisplay"
    ContinuousExportIds:
      type: array
      items:
        $ref: "#/components/schemas/ConfigurationsExportId"
    ConfigurationsExportId:
      type: string
      maxLength: 200
      pattern: \S*
    DescribeContinuousExportsMaxResults:
      type: integer
      minimum: 1
      maximum: 100
    DescribeContinuousExportsResponse:
      type: object
      properties:
        descriptions:
          $ref: "#/components/schemas/ContinuousExportDescriptions"
          description: A list of continuous export descriptions.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token from the previous call to DescribeExportTasks.
    ContinuousExportDescriptions:
      type: array
      items:
        $ref: "#/components/schemas/ContinuousExportDescription"
    ContinuousExportDescription:
      description: A list of continuous export descriptions.
      type: object
      properties:
        exportId:
          $ref: "#/components/schemas/ConfigurationsExportId"
          description: The unique ID assigned to this export.
        status:
          $ref: "#/components/schemas/ContinuousExportStatus"
          description: "Describes the status of the export. Can be one of the following values: START_IN_PROGRESS - setting up resources to start continuous export. START_FAILED - an error occurred setting up continuous export. To recover, call start-continuous-export again. ACTIVE - data is being exported to the customer bucket. ERROR - an error occurred during export. To fix the issue, call stop-continuous-export and start-continuous-export. STOP_IN_PROGRESS - stopping the export. STOP_FAILED - an error occurred stopping the export. To recover, call stop-continuous-export again. INACTIVE - the continuous export has been stopped. Data is no longer being exported to the customer bucket."
        statusDetail:
          $ref: "#/components/schemas/StringMax255"
          description: "Contains information about any errors that have occurred. This data type can have the following values: ACCESS_DENIED - You don’t have permission to start Data Exploration in Amazon Athena. Contact your Amazon Web Services administrator for help. For more information, see Setting Up Amazon Web Services Application Discovery Service in the Application Discovery Service User Guide. DELIVERY_STREAM_LIMIT_FAILURE - You reached the limit for Amazon Kinesis Data Firehose delivery streams. Reduce the number of streams or request a limit increase and try again. For more information, see Kinesis Data Streams Limits in the Amazon Kinesis Data Streams Developer Guide. FIREHOSE_ROLE_MISSING - The Data Exploration feature is in an error state because your user is missing the Amazon Web ServicesApplicationDiscoveryServiceFirehose role. Turn on Data Exploration in Amazon Athena and try again. For more information, see Creating the Amazon Web ServicesApplicationDiscoveryServiceFirehose Role in the Application Discovery Service User Guide. FIREHOSE_STREAM_DOES_NOT_EXIST - The Data Exploration feature is in an error state because your user is missing one or more of the Kinesis data delivery streams. INTERNAL_FAILURE - The Data Exploration feature is in an error state because of an internal failure. Try again later. If this problem persists, contact Amazon Web Services Support. LAKE_FORMATION_ACCESS_DENIED - You don't have sufficient lake formation permissions to start continuous export. For more information, see Upgrading Amazon Web Services Glue Data Permissions to the Amazon Web Services Lake Formation Model in the Amazon Web Services Lake Formation Developer Guide. You can use one of the following two ways to resolve this issue. If you don’t want to use the Lake Formation permission model, you can change the default Data Catalog settings to use only Amazon Web Services Identity and Access Management (IAM) access control for new databases. For more information, see Change Data Catalog Settings in the Lake Formation Developer Guide. You can give the service-linked IAM roles AWSServiceRoleForApplicationDiscoveryServiceContinuousExport and AWSApplicationDiscoveryServiceFirehose the required Lake Formation permissions. For more information, see Granting Database Permissions in the Lake Formation Developer Guide. AWSServiceRoleForApplicationDiscoveryServiceContinuousExport - Grant database creator permissions, which gives the role database creation ability and implicit permissions for any created tables. For more information, see Implicit Lake Formation Permissions in the Lake Formation Developer Guide. AWSApplicationDiscoveryServiceFirehose - Grant describe permissions for all tables in the database. S3_BUCKET_LIMIT_FAILURE - You reached the limit for Amazon S3 buckets. Reduce the number of S3 buckets or request a limit increase and try again. For more information, see Bucket Restrictions and Limitations in the Amazon Simple Storage Service Developer Guide. S3_NOT_SIGNED_UP - Your account is not signed up for the Amazon S3 service. You must sign up before you can use Amazon S3. You can sign up at the following URL: https://aws.amazon.com/s3."
        s3Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The name of the s3 bucket where the export data parquet files are stored.
        startTime:
          $ref: "#/components/schemas/TimeStamp"
          description: The timestamp representing when the continuous export was started.
        stopTime:
          $ref: "#/components/schemas/TimeStamp"
          description: The timestamp that represents when this continuous export was stopped.
        dataSource:
          $ref: "#/components/schemas/DataSource"
          description: The type of data collector used to gather this data (currently only offered for AGENT).
        schemaStorageConfig:
          type: object
          properties: {}
          description: An object which describes how the data is stored. databaseName - the name of the Glue database used to store the schema.
