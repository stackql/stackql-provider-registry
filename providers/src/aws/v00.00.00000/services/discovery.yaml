          description: A descriptive name for an import task. You can use this name to filter future requests related to this import task, such as identifying applications and servers that were included in this import task. We recommend that you use a meaningful name for each import task.
        importUrl:
          $ref: "#/components/schemas/ImportURL"
          description: The URL for your import file that you've uploaded to Amazon S3.
        status:
          $ref: "#/components/schemas/ImportStatus"
          description: The status of the import task. An import can have the status of IMPORT_COMPLETE and still have some records fail to import from the overall request. More information can be found in the downloadable archive defined in the errorsAndFailedEntriesZip field, or in the Migration Hub management console.
        importRequestTime:
          $ref: "#/components/schemas/TimeStamp"
          description: The time that the import task request was made, presented in the Unix time stamp format.
        importCompletionTime:
          $ref: "#/components/schemas/TimeStamp"
