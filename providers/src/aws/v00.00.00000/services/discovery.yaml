          description: If set to true, the export preferences is set to Ec2RecommendationsExportPreferences.
        cpuPerformanceMetricBasis:
          $ref: "#/components/schemas/UsageMetricBasis"
          description: The recommended EC2 instance type that matches the CPU usage metric of server performance data.
        ramPerformanceMetricBasis:
          $ref: "#/components/schemas/UsageMetricBasis"
          description: The recommended EC2 instance type that matches the Memory usage metric of server performance data.
        tenancy:
          $ref: "#/components/schemas/Tenancy"
          description: The target tenancy to use for your recommended EC2 instances.
        excludedInstanceTypes:
          $ref: "#/components/schemas/ExcludedInstanceTypes"
          description: An array of instance types to exclude from recommendations.
        preferredRegion:
          $ref: "#/components/schemas/UserPreferredRegion"
          description: The target Amazon Web Services Region for the recommendations. You can use any of the Region codes available for the chosen service, as listed in Amazon Web Services service endpoints in the Amazon Web Services General Reference.
        reservedInstanceOptions:
          $ref: "#/components/schemas/ReservedInstanceOptions"
          description: The contract type for a reserved instance. If blank, we assume an On-Demand instance is preferred.
    ExportEnabled:
      type: boolean
    UsageMetricBasis:
      description: Specifies the performance metrics to use for the server that is used for recommendations.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/UsageMetricBasisName"
          description: A utilization metric that is used by the recommendations.
        percentageAdjust:
          $ref: "#/components/schemas/UsageMetricPercentageAdjust"
          description: Specifies the percentage of the specified utilization metric that is used by the recommendations.
    UsageMetricBasisName:
      type: string
      pattern: ^(p(\d{1,2}|100)|AVG|SPEC|MAX)$
    UsageMetricPercentageAdjust:
      type: number
      format: double
      minimum: 0
      maximum: 100
    Tenancy:
      type: string
      enum:
        - DEDICATED
        - SHARED
    ExcludedInstanceTypes:
      type: array
      items:
        $ref: "#/components/schemas/EC2InstanceType"
    EC2InstanceType:
      type: string
      minLength: 1
      maxLength: 25
      pattern: "[a-zA-Z0-9\\d\\.\\-]+"
    UserPreferredRegion:
      type: string
      minLength: 1
      maxLength: 30
      pattern: "[a-z]{2}-[a-z\\-]+-[0-9]+"
    ReservedInstanceOptions:
      description: Used to provide Reserved Instance preferences for the recommendation.
      type: object
      properties:
        purchasingOption:
          $ref: "#/components/schemas/PurchasingOption"
          description: The payment plan to use for your Reserved Instance.
        offeringClass:
          $ref: "#/components/schemas/OfferingClass"
          description: The flexibility to change the instance types needed for your Reserved Instance.
        termLength:
          $ref: "#/components/schemas/TermLength"
          description: The preferred duration of the Reserved Instance term.
      required:
        - purchasingOption
        - offeringClass
        - termLength
    PurchasingOption:
      type: string
      enum:
        - ALL_UPFRONT
        - PARTIAL_UPFRONT
        - NO_UPFRONT
    OfferingClass:
      type: string
      enum:
        - STANDARD
        - CONVERTIBLE
    TermLength:
      type: string
      enum:
        - ONE_YEAR
        - THREE_YEAR
    StartExportTaskResponse:
      type: object
      properties:
        exportId:
          $ref: "#/components/schemas/ConfigurationsExportId"
