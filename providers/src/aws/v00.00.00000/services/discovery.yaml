openapi: 3.0.0
info:
  version: "2015-11-01"
  title: AWS Application Discovery Service
  description: AWS Application Discovery Service
  x-serviceName: discovery
  x-serviceAlias: discovery
  x-protocol: json
  x-apiVersion: "2015-11-01"
  x-endpointPrefix: discovery
  x-targetPrefix: AWSPoseidonService_V2015_11_01
  x-jsonVersion: "1.1"
servers:
  - url: https://discovery.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for discovery
paths:
  /AssociateConfigurationItemsToApplication:
    post:
      operationId: AssociateConfigurationItemsToApplication
      description: Associates one or more configuration items with an application.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.AssociateConfigurationItemsToApplication
            default: AWSPoseidonService_V2015_11_01.AssociateConfigurationItemsToApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                applicationConfigurationId:
                  $ref: "#/components/schemas/ApplicationId"
                  description: The configuration ID of an application with which items are to be associated.
                configurationIds:
                  $ref: "#/components/schemas/ConfigurationIdList"
                  description: The ID of each configuration item to be associated with an application.
              required:
                - applicationConfigurationId
                - configurationIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateConfigurationItemsToApplicationResponse"
  /BatchDeleteAgents:
    post:
      operationId: BatchDeleteAgents
      description: Deletes one or more agents or collectors as specified by ID. Deleting an agent or collector does not delete the previously discovered data. To delete the data collected, use StartBatchDeleteConfigurationTask.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.BatchDeleteAgents
            default: AWSPoseidonService_V2015_11_01.BatchDeleteAgents
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                deleteAgents:
                  $ref: "#/components/schemas/DeleteAgents"
                  description: The list of agents to delete.
              required:
                - deleteAgents
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteAgentsResponse"
  /BatchDeleteImportData:
    post:
      operationId: BatchDeleteImportData
      description: Deletes one or more import tasks, each identified by their import ID. Each import task has a number of records that can identify servers or applications. Amazon Web Services Application Discovery Service has built-in matching logic that will identify when discovered servers match existing entries that you've previously discovered, the information for the already-existing discovered server is updated. When you delete an import task that contains records that were used to match, the information in those matched records that comes from the deleted records will also be deleted.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.BatchDeleteImportData
            default: AWSPoseidonService_V2015_11_01.BatchDeleteImportData
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                importTaskIds:
                  $ref: "#/components/schemas/ToDeleteIdentifierList"
                  description: The IDs for the import tasks that you want to delete.
                deleteHistory:
                  $ref: "#/components/schemas/Boolean"
                  description: Set to true to remove the deleted import task from DescribeImportTasks.
              required:
                - importTaskIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteImportDataResponse"
  /CreateApplication:
    post:
      operationId: CreateApplication
      description: Creates an application with the given name and description.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.CreateApplication
            default: AWSPoseidonService_V2015_11_01.CreateApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ApplicationName"
                  description: The name of the application to be created.
                description:
                  $ref: "#/components/schemas/ApplicationDescription"
                  description: The description of the application to be created.
                wave:
                  $ref: "#/components/schemas/ApplicationWave"
                  description: The name of the migration wave of the application to be created.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApplicationResponse"
  /CreateTags:
    post:
      operationId: CreateTags
      description: Creates one or more tags for configuration items. Tags are metadata that help you categorize IT assets. This API accepts a list of multiple configuration items. Do not store sensitive information (like personal data) in tags.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.CreateTags
            default: AWSPoseidonService_V2015_11_01.CreateTags
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                configurationIds:
                  $ref: "#/components/schemas/ConfigurationIdList"
                  description: A list of configuration items that you want to tag.
                tags:
                  $ref: "#/components/schemas/TagSet"
                  description: 'Tags that you want to associate with one or more configuration items. Specify the tags that you want to create in a key-value format. For example: {"key": "serverType", "value": "webServer"}'
              required:
                - configurationIds
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTagsResponse"
  /DeleteApplications:
    post:
      operationId: DeleteApplications
      description: Deletes a list of applications and their associations with configuration items.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.DeleteApplications
            default: AWSPoseidonService_V2015_11_01.DeleteApplications
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                configurationIds:
                  $ref: "#/components/schemas/ApplicationIdsList"
                  description: Configuration ID of an application to be deleted.
              required:
                - configurationIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApplicationsResponse"
  /DeleteTags:
    post:
      operationId: DeleteTags
      description: Deletes the association between configuration items and one or more tags. This API accepts a list of multiple configuration items.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.DeleteTags
            default: AWSPoseidonService_V2015_11_01.DeleteTags
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                configurationIds:
                  $ref: "#/components/schemas/ConfigurationIdList"
                  description: A list of configuration items with tags that you want to delete.
                tags:
                  $ref: "#/components/schemas/TagSet"
                  description: 'Tags that you want to delete from one or more configuration items. Specify the tags that you want to delete in a key-value format. For example: {"key": "serverType", "value": "webServer"}'
              required:
                - configurationIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTagsResponse"
  /DescribeAgents:
    post:
      operationId: DescribeAgents
      description: Lists agents or collectors as specified by ID or other filters. All agents/collectors associated with your user can be listed if you call DescribeAgents as is without passing any parameters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.DescribeAgents
            default: AWSPoseidonService_V2015_11_01.DescribeAgents
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                agentIds:
                  $ref: "#/components/schemas/AgentIds"
                  description: The agent or the collector IDs for which you want information. If you specify no IDs, the system returns information about all agents/collectors associated with your user.
                filters:
                  $ref: "#/components/schemas/Filters"
                  description: 'You can filter the request using various logical operators and a key-value format. For example: {"key": "collectionStatus", "value": "STARTED"}'
                maxResults:
                  $ref: "#/components/schemas/Integer"
                  description: The total number of agents/collectors to return in a single page of output. The maximum value is 100.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Token to retrieve the next set of results. For example, if you previously specified 100 IDs for DescribeAgentsRequest$agentIds but set DescribeAgentsRequest$maxResults to 10, you received a set of 10 results along with a token. Use that token in this query to get the next set of 10.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAgentsResponse"
  /DescribeBatchDeleteConfigurationTask:
    post:
      operationId: DescribeBatchDeleteConfigurationTask
      description: Takes a unique deletion task identifier as input and returns metadata about a configuration deletion task.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.DescribeBatchDeleteConfigurationTask
            default: AWSPoseidonService_V2015_11_01.DescribeBatchDeleteConfigurationTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                taskId:
                  $ref: "#/components/schemas/UUID"
                  description: The ID of the task to delete.
              required:
                - taskId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeBatchDeleteConfigurationTaskResponse"
  /DescribeConfigurations:
    post:
      operationId: DescribeConfigurations
      description: "Retrieves attributes for a list of configuration item IDs. All of the supplied IDs must be for the same asset type from one of the following: server application process connection Output fields are specific to the asset type specified. For example, the output for a server configuration item includes a list of attributes about the server, such as host name, operating system, number of network cards, etc. For a complete list of outputs for each asset type, see Using the DescribeConfigurations Action in the Amazon Web Services Application Discovery Service User Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.DescribeConfigurations
            default: AWSPoseidonService_V2015_11_01.DescribeConfigurations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                configurationIds:
                  $ref: "#/components/schemas/ConfigurationIdList"
                  description: One or more configuration IDs.
              required:
                - configurationIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeConfigurationsOutputDisplay"
  /DescribeContinuousExports:
    post:
      operationId: DescribeContinuousExports
      description: Lists exports as specified by ID. All continuous exports associated with your user can be listed if you call DescribeContinuousExports as is without passing any parameters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.DescribeContinuousExports
            default: AWSPoseidonService_V2015_11_01.DescribeContinuousExports
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                exportIds:
                  $ref: "#/components/schemas/ContinuousExportIds"
                  description: The unique IDs assigned to the exports.
                maxResults:
                  $ref: "#/components/schemas/DescribeContinuousExportsMaxResults"
                  description: A number between 1 and 100 specifying the maximum number of continuous export descriptions returned.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token from the previous call to DescribeExportTasks.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeContinuousExportsResponse"
  /DescribeExportConfigurations:
    post:
      operationId: DescribeExportConfigurations
      description: DescribeExportConfigurations is deprecated. Use DescribeExportTasks, instead.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.DescribeExportConfigurations
            default: AWSPoseidonService_V2015_11_01.DescribeExportConfigurations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                exportIds:
                  $ref: "#/components/schemas/ExportIds"
                  description: A list of continuous export IDs to search for.
                maxResults:
                  $ref: "#/components/schemas/Integer"
                  description: A number between 1 and 100 specifying the maximum number of continuous export descriptions returned.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token from the previous call to describe-export-tasks.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeExportConfigurationsResponse"
  /DescribeExportTasks:
    post:
      operationId: DescribeExportTasks
      description: Retrieve status of one or more export tasks. You can retrieve the status of up to 100 export tasks.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.DescribeExportTasks
            default: AWSPoseidonService_V2015_11_01.DescribeExportTasks
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                exportIds:
                  $ref: "#/components/schemas/ExportIds"
                  description: One or more unique identifiers used to query the status of an export request.
                filters:
                  $ref: "#/components/schemas/ExportFilters"
                  description: One or more filters. AgentId - ID of the agent whose collected data will be exported
                maxResults:
                  $ref: "#/components/schemas/Integer"
                  description: The maximum number of volume results returned by DescribeExportTasks in paginated output. When this parameter is used, DescribeExportTasks only returns maxResults results in a single page along with a nextToken response element.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The nextToken value returned from a previous paginated DescribeExportTasks request where maxResults was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value. This value is null when there are no more results to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeExportTasksResponse"
  /DescribeImportTasks:
    post:
      operationId: DescribeImportTasks
      description: Returns an array of import tasks for your account, including status information, times, IDs, the Amazon S3 Object URL for the import file, and more.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.DescribeImportTasks
            default: AWSPoseidonService_V2015_11_01.DescribeImportTasks
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                filters:
                  $ref: "#/components/schemas/DescribeImportTasksFilterList"
                  description: An array of name-value pairs that you provide to filter the results for the DescribeImportTask request to a specific subset of results. Currently, wildcard values aren't supported for filters.
                maxResults:
                  $ref: "#/components/schemas/DescribeImportTasksMaxResults"
                  description: The maximum number of results that you want this request to return, up to 100.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token to request a specific page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeImportTasksResponse"
  /DescribeTags:
    post:
      operationId: DescribeTags
      description: "Retrieves a list of configuration items that have tags as specified by the key-value pairs, name and value, passed to the optional parameter filters. There are three valid tag filter names: tagKey tagValue configurationId Also, all configuration items associated with your user that have tags can be listed if you call DescribeTags as is without passing any parameters."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.DescribeTags
            default: AWSPoseidonService_V2015_11_01.DescribeTags
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                filters:
                  $ref: "#/components/schemas/TagFilters"
                  description: You can filter the list using a key-value format. You can separate these items by using logical operators. Allowed filters include tagKey, tagValue, and configurationId.
                maxResults:
                  $ref: "#/components/schemas/Integer"
                  description: The total number of items to return in a single page of output. The maximum value is 100.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token to start the list. Use this token to get the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeTagsResponse"
  /DisassociateConfigurationItemsFromApplication:
    post:
      operationId: DisassociateConfigurationItemsFromApplication
      description: Disassociates one or more configuration items from an application.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.DisassociateConfigurationItemsFromApplication
            default: AWSPoseidonService_V2015_11_01.DisassociateConfigurationItemsFromApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                applicationConfigurationId:
                  $ref: "#/components/schemas/ApplicationId"
                  description: Configuration ID of an application from which each item is disassociated.
                configurationIds:
                  $ref: "#/components/schemas/ConfigurationIdList"
                  description: Configuration ID of each item to be disassociated from an application.
              required:
                - applicationConfigurationId
                - configurationIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateConfigurationItemsFromApplicationResponse"
  /ExportConfigurations:
    post:
      operationId: ExportConfigurations
      description: Deprecated. Use StartExportTask instead. Exports all discovered configuration data to an Amazon S3 bucket or an application that enables you to view and evaluate the data. Data includes tags and tag associations, processes, connections, servers, and system performance. This API returns an export ID that you can query using the DescribeExportConfigurations API. The system imposes a limit of two configuration exports in six hours.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.ExportConfigurations
            default: AWSPoseidonService_V2015_11_01.ExportConfigurations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportConfigurationsResponse"
  /GetDiscoverySummary:
    post:
      operationId: GetDiscoverySummary
      description: Retrieves a short summary of discovered assets. This API operation takes no request parameters and is called as is at the command prompt as shown in the example.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.GetDiscoverySummary
            default: AWSPoseidonService_V2015_11_01.GetDiscoverySummary
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDiscoverySummaryResponse"
  /ListConfigurations:
    post:
      operationId: ListConfigurations
      description: Retrieves a list of configuration items as specified by the value passed to the required parameter configurationType. Optional filtering may be applied to refine search results.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.ListConfigurations
            default: AWSPoseidonService_V2015_11_01.ListConfigurations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                configurationType:
                  $ref: "#/components/schemas/ConfigurationItemType"
                  description: A valid configuration identified by Application Discovery Service.
                filters:
                  $ref: "#/components/schemas/Filters"
                  description: 'You can filter the request using various logical operators and a key-value format. For example: {"key": "serverType", "value": "webServer"} For a complete list of filter options and guidance about using them with this action, see Using the ListConfigurations Action in the Amazon Web Services Application Discovery Service User Guide.'
                maxResults:
                  $ref: "#/components/schemas/Integer"
                  description: The total number of items to return. The maximum value is 100.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Token to retrieve the next set of results. For example, if a previous call to ListConfigurations returned 100 items, but you set ListConfigurationsRequest$maxResults to 10, you received a set of 10 results along with a token. Use that token in this query to get the next set of 10.
                orderBy:
                  $ref: "#/components/schemas/OrderByList"
                  description: Certain filter criteria return output that can be sorted in ascending or descending order. For a list of output characteristics for each filter, see Using the ListConfigurations Action in the Amazon Web Services Application Discovery Service User Guide.
              required:
                - configurationType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConfigurationsOutputDisplay"
  /ListServerNeighbors:
    post:
      operationId: ListServerNeighbors
      description: Retrieves a list of servers that are one network hop away from a specified server.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.ListServerNeighbors
            default: AWSPoseidonService_V2015_11_01.ListServerNeighbors
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                configurationId:
                  $ref: "#/components/schemas/ConfigurationId"
                  description: Configuration ID of the server for which neighbors are being listed.
                portInformationNeeded:
                  $ref: "#/components/schemas/Boolean"
                  description: Flag to indicate if port and protocol information is needed as part of the response.
                neighborConfigurationIds:
                  $ref: "#/components/schemas/ConfigurationIdList"
                  description: List of configuration IDs to test for one-hop-away.
                maxResults:
                  $ref: "#/components/schemas/Integer"
                  description: Maximum number of results to return in a single page of output.
                nextToken:
                  $ref: "#/components/schemas/String"
                  description: Token to retrieve the next set of results. For example, if you previously specified 100 IDs for ListServerNeighborsRequest$neighborConfigurationIds but set ListServerNeighborsRequest$maxResults to 10, you received a set of 10 results along with a token. Use that token in this query to get the next set of 10.
              required:
                - configurationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServerNeighborsResponse"
  /StartBatchDeleteConfigurationTask:
    post:
      operationId: StartBatchDeleteConfigurationTask
      description: Takes a list of configurationId as input and starts an asynchronous deletion task to remove the configurationItems. Returns a unique deletion task identifier.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.StartBatchDeleteConfigurationTask
            default: AWSPoseidonService_V2015_11_01.StartBatchDeleteConfigurationTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                configurationType:
                  $ref: "#/components/schemas/DeletionConfigurationItemType"
                  description: "The type of configuration item to delete. Supported types are: SERVER."
                configurationIds:
                  $ref: "#/components/schemas/ConfigurationIdList"
                  description: The list of configuration IDs that will be deleted by the task.
              required:
                - configurationType
                - configurationIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartBatchDeleteConfigurationTaskResponse"
  /StartContinuousExport:
    post:
      operationId: StartContinuousExport
      description: Start the continuous flow of agent's discovered data into Amazon Athena.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.StartContinuousExport
            default: AWSPoseidonService_V2015_11_01.StartContinuousExport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartContinuousExportResponse"
  /StartDataCollectionByAgentIds:
    post:
      operationId: StartDataCollectionByAgentIds
      description: Instructs the specified agents to start collecting data.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.StartDataCollectionByAgentIds
            default: AWSPoseidonService_V2015_11_01.StartDataCollectionByAgentIds
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                agentIds:
                  $ref: "#/components/schemas/AgentIds"
                  description: The IDs of the agents from which to start collecting data. If you send a request to an agent ID that you do not have permission to contact, according to your Amazon Web Services account, the service does not throw an exception. Instead, it returns the error in the Description field. If you send a request to multiple agents and you do not have permission to contact some of those agents, the system does not throw an exception. Instead, the system shows Failed in the Description field.
              required:
                - agentIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartDataCollectionByAgentIdsResponse"
  /StartExportTask:
    post:
      operationId: StartExportTask
      description: Begins the export of a discovered data report to an Amazon S3 bucket managed by Amazon Web Services. Exports might provide an estimate of fees and savings based on certain information that you provide. Fee estimates do not include any taxes that might apply. Your actual fees and savings depend on a variety of factors, including your actual usage of Amazon Web Services services, which might vary from the estimates provided in this report. If you do not specify preferences or agentIds in the filter, a summary of all servers, applications, tags, and performance is generated. This data is an aggregation of all server data collected through on-premises tooling, file import, application grouping and applying tags. If you specify agentIds in a filter, the task exports up to 72 hours of detailed data collected by the identified Application Discovery Agent, including network, process, and performance details. A time range for exported agent data may be set by using startTime and endTime. Export of detailed agent data is limited to five concurrently running exports. Export of detailed agent data is limited to two exports per day. If you enable ec2RecommendationsPreferences in preferences , an Amazon EC2 instance matching the characteristics of each server in Application Discovery Service is generated. Changing the attributes of the ec2RecommendationsPreferences changes the criteria of the recommendation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.StartExportTask
            default: AWSPoseidonService_V2015_11_01.StartExportTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                exportDataFormat:
                  $ref: "#/components/schemas/ExportDataFormats"
                  description: "The file format for the returned export data. Default value is CSV. Note: The GRAPHML option has been deprecated."
                filters:
                  $ref: "#/components/schemas/ExportFilters"
                  description: If a filter is present, it selects the single agentId of the Application Discovery Agent for which data is exported. The agentId can be found in the results of the DescribeAgents API or CLI. If no filter is present, startTime and endTime are ignored and exported data includes both Amazon Web Services Application Discovery Service Agentless Collector collectors data and summary data from Application Discovery Agent agents.
                startTime:
                  $ref: "#/components/schemas/TimeStamp"
                  description: The start timestamp for exported data from the single Application Discovery Agent selected in the filters. If no value is specified, data is exported starting from the first data collected by the agent.
                endTime:
                  $ref: "#/components/schemas/TimeStamp"
                  description: The end timestamp for exported data from the single Application Discovery Agent selected in the filters. If no value is specified, exported data includes the most recent data collected by the agent.
                preferences:
                  $ref: "#/components/schemas/ExportPreferences"
                  description: Indicates the type of data that needs to be exported. Only one ExportPreferences can be enabled at any time.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartExportTaskResponse"
  /StartImportTask:
    post:
      operationId: StartImportTask
      description: "Starts an import task, which allows you to import details of your on-premises environment directly into Amazon Web Services Migration Hub without having to use the Amazon Web Services Application Discovery Service (Application Discovery Service) tools such as the Amazon Web Services Application Discovery Service Agentless Collector or Application Discovery Agent. This gives you the option to perform migration assessment and planning directly from your imported data, including the ability to group your devices as applications and track their migration status. To start an import request, do this: Download the specially formatted comma separated value (CSV) import template, which you can find here: https://s3.us-west-2.amazonaws.com/templates-7cffcf56-bd96-4b1c-b45b-a5b42f282e46/import_template.csv. Fill out the template with your server and application data. Upload your import file to an Amazon S3 bucket, and make a note of it's Object URL. Your import file must be in the CSV format. Use the console or the StartImportTask command with the Amazon Web Services CLI or one of the Amazon Web Services SDKs to import the records from your file. For more information, including step-by-step procedures, see Migration Hub Import in the Amazon Web Services Application Discovery Service User Guide. There are limits to the number of import tasks you can create (and delete) in an Amazon Web Services account. For more information, see Amazon Web Services Application Discovery Service Limits in the Amazon Web Services Application Discovery Service User Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.StartImportTask
            default: AWSPoseidonService_V2015_11_01.StartImportTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                clientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: Optional. A unique token that you can provide to prevent the same import request from occurring more than once. If you don't provide a token, a token is automatically generated. Sending more than one StartImportTask request with the same client request token will return information about the original import task with that client request token.
                name:
                  $ref: "#/components/schemas/ImportTaskName"
                  description: A descriptive name for this request. You can use this name to filter future requests related to this import task, such as identifying applications and servers that were included in this import task. We recommend that you use a meaningful name for each import task.
                importUrl:
                  $ref: "#/components/schemas/ImportURL"
                  description: "The URL for your import file that you've uploaded to Amazon S3. If you're using the Amazon Web Services CLI, this URL is structured as follows: s3://BucketName/ImportFileName.CSV"
              required:
                - name
                - importUrl
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartImportTaskResponse"
  /StopContinuousExport:
    post:
      operationId: StopContinuousExport
      description: Stop the continuous flow of agent's discovered data into Amazon Athena.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPoseidonService_V2015_11_01.StopContinuousExport
            default: AWSPoseidonService_V2015_11_01.StopContinuousExport
      requestBody:
        required: true
