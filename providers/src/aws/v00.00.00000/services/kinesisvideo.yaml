openapi: 3.0.0
info:
  version: "2017-09-30"
  title: Amazon Kinesis Video Streams
  description: Amazon Kinesis Video Streams
  x-serviceName: kinesisvideo
  x-serviceAlias: kinesisvideo
  x-protocol: rest-json
  x-apiVersion: "2017-09-30"
  x-endpointPrefix: kinesisvideo
servers:
  - url: https://kinesisvideo.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for kinesisvideo
paths:
  /createSignalingChannel:
    post:
      operationId: CreateSignalingChannel
      description: Creates a signaling channel. CreateSignalingChannel is an asynchronous operation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChannelName:
                  $ref: "#/components/schemas/ChannelName"
                ChannelType:
                  $ref: "#/components/schemas/ChannelType"
                SingleMasterConfiguration:
                  $ref: "#/components/schemas/SingleMasterConfiguration"
                Tags:
                  $ref: "#/components/schemas/TagOnCreateList"
              required:
                - ChannelName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSignalingChannelOutput"
  /createStream:
    post:
      operationId: CreateStream
      description: Creates a new Kinesis video stream. When you create a new stream, Kinesis Video Streams assigns it a version number. When you change the stream's metadata, Kinesis Video Streams updates the version. CreateStream is an asynchronous operation. For information about how the service works, see How it Works. You must have permissions for the KinesisVideo:CreateStream action.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DeviceName:
                  $ref: "#/components/schemas/DeviceName"
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                MediaType:
                  $ref: "#/components/schemas/MediaType"
                KmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                DataRetentionInHours:
                  $ref: "#/components/schemas/DataRetentionInHours"
                Tags:
                  $ref: "#/components/schemas/ResourceTags"
                StreamStorageConfiguration:
                  $ref: "#/components/schemas/StreamStorageConfiguration"
              required:
                - StreamName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateStreamOutput"
  /deleteEdgeConfiguration:
    post:
      operationId: DeleteEdgeConfiguration
      description: An asynchronous API that deletes a stream’s existing edge configuration, as well as the corresponding media from the Edge Agent. When you invoke this API, the sync status is set to DELETING. A deletion process starts, in which active edge jobs are stopped and all media is deleted from the edge device. The time to delete varies, depending on the total amount of stored media. If the deletion process fails, the sync status changes to DELETE_FAILED. You will need to re-try the deletion. When the deletion process has completed successfully, the edge configuration is no longer accessible.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEdgeConfigurationOutput"
  /deleteSignalingChannel:
    post:
      operationId: DeleteSignalingChannel
      description: Deletes a specified signaling channel. DeleteSignalingChannel is an asynchronous operation. If you don't specify the channel's current version, the most recent version is deleted.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChannelARN:
                  $ref: "#/components/schemas/ResourceARN"
                CurrentVersion:
                  $ref: "#/components/schemas/Version"
              required:
                - ChannelARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSignalingChannelOutput"
  /deleteStream:
    post:
      operationId: DeleteStream
      description: Deletes a Kinesis video stream and the data contained in the stream. This method marks the stream for deletion, and makes the data in the stream inaccessible immediately. To ensure that you have the latest version of the stream before deleting it, you can specify the stream version. Kinesis Video Streams assigns a version to each stream. When you update a stream, Kinesis Video Streams assigns a new version number. To get the latest stream version, use the DescribeStream API. This operation requires permission for the KinesisVideo:DeleteStream action.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                CurrentVersion:
                  $ref: "#/components/schemas/Version"
              required:
                - StreamARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteStreamOutput"
  /describeEdgeConfiguration:
    post:
      operationId: DescribeEdgeConfiguration
      description: Describes a stream’s edge configuration that was set using the StartEdgeConfigurationUpdate API and the latest status of the edge agent's recorder and uploader jobs. Use this API to get the status of the configuration to determine if the configuration is in sync with the Edge Agent. Use this API to evaluate the health of the Edge Agent.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEdgeConfigurationOutput"
  /describeImageGenerationConfiguration:
    post:
      operationId: DescribeImageGenerationConfiguration
      description: Gets the ImageGenerationConfiguration for a given Kinesis video stream.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeImageGenerationConfigurationOutput"
  /describeMappedResourceConfiguration:
    post:
      operationId: DescribeMappedResourceConfiguration
      description: Returns the most current information about the stream. The streamName or streamARN should be provided in the input.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                MaxResults:
                  $ref: "#/components/schemas/MappedResourceConfigurationListLimit"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeMappedResourceConfigurationOutput"
  /describeMediaStorageConfiguration:
    post:
      operationId: DescribeMediaStorageConfiguration
      description: Returns the most current information about the channel. Specify the ChannelName or ChannelARN in the input.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ChannelName:
                  $ref: "#/components/schemas/ChannelName"
                ChannelARN:
                  $ref: "#/components/schemas/ResourceARN"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeMediaStorageConfigurationOutput"
  /describeNotificationConfiguration:
    post:
      operationId: DescribeNotificationConfiguration
      description: Gets the NotificationConfiguration for a given Kinesis video stream.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeNotificationConfigurationOutput"
  /describeSignalingChannel:
    post:
      operationId: DescribeSignalingChannel
      description: Returns the most current information about the signaling channel. You must specify either the name or the Amazon Resource Name (ARN) of the channel that you want to describe.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ChannelName:
                  $ref: "#/components/schemas/ChannelName"
                ChannelARN:
                  $ref: "#/components/schemas/ResourceARN"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSignalingChannelOutput"
  /describeStream:
    post:
      operationId: DescribeStream
      description: Returns the most current information about the specified stream. You must specify either the StreamName or the StreamARN.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeStreamOutput"
  /describeStreamStorageConfiguration:
    post:
      operationId: DescribeStreamStorageConfiguration
      description: Retrieves the current storage configuration for the specified Kinesis video stream. In the request, you must specify either the StreamName or the StreamARN. You must have permissions for the KinesisVideo:DescribeStreamStorageConfiguration action.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeStreamStorageConfigurationOutput"
  /getDataEndpoint:
    post:
      operationId: GetDataEndpoint
      description: Gets an endpoint for a specified stream for either reading or writing. Use this endpoint in your application to read from the specified stream (using the GetMedia or GetMediaForFragmentList operations) or write to it (using the PutMedia operation). The returned endpoint does not have the API name appended. The client needs to add the API name to the returned endpoint. In the request, specify the stream either by StreamName or StreamARN.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                APIName:
                  $ref: "#/components/schemas/APIName"
              required:
                - APIName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataEndpointOutput"
  /getSignalingChannelEndpoint:
    post:
      operationId: GetSignalingChannelEndpoint
      description: Provides an endpoint for the specified signaling channel to send and receive messages. This API uses the SingleMasterChannelEndpointConfiguration input parameter, which consists of the Protocols and Role properties. Protocols is used to determine the communication mechanism. For example, if you specify WSS as the protocol, this API produces a secure websocket endpoint. If you specify HTTPS as the protocol, this API generates an HTTPS endpoint. If you specify WEBRTC as the protocol, but the signaling channel isn't configured for ingestion, you will receive the error InvalidArgumentException. Role determines the messaging permissions. A MASTER role results in this API generating an endpoint that a client can use to communicate with any of the viewers on the channel. A VIEWER role results in this API generating an endpoint that a client can use to communicate only with a MASTER.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChannelARN:
                  $ref: "#/components/schemas/ResourceARN"
                SingleMasterChannelEndpointConfiguration:
                  $ref: "#/components/schemas/SingleMasterChannelEndpointConfiguration"
              required:
                - ChannelARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSignalingChannelEndpointOutput"
  /listEdgeAgentConfigurations:
    post:
      operationId: ListEdgeAgentConfigurations
      description: Returns an array of edge configurations associated with the specified Edge Agent. In the request, you must specify the Edge Agent HubDeviceArn.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                HubDeviceArn:
                  $ref: "#/components/schemas/HubDeviceArn"
                MaxResults:
                  $ref: "#/components/schemas/ListEdgeAgentConfigurationsInputLimit"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - HubDeviceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEdgeAgentConfigurationsOutput"
  /listSignalingChannels:
    post:
      operationId: ListSignalingChannels
      description: Returns an array of ChannelInfo objects. Each object describes a signaling channel. To retrieve only those channels that satisfy a specific condition, you can specify a ChannelNameCondition.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListStreamsInputLimit"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                ChannelNameCondition:
                  $ref: "#/components/schemas/ChannelNameCondition"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSignalingChannelsOutput"
  /listStreams:
    post:
      operationId: ListStreams
      description: Returns an array of StreamInfo objects. Each object describes a stream. To retrieve only streams that satisfy a specific condition, you can specify a StreamNameCondition.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListStreamsInputLimit"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                StreamNameCondition:
                  $ref: "#/components/schemas/StreamNameCondition"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStreamsOutput"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Returns a list of tags associated with the specified signaling channel.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                ResourceARN:
                  $ref: "#/components/schemas/ResourceARN"
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
  /listTagsForStream:
    post:
      operationId: ListTagsForStream
      description: Returns a list of tags associated with the specified stream. In the request, you must specify either the StreamName or the StreamARN.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                StreamName:
                  $ref: "#/components/schemas/StreamName"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForStreamOutput"
  /startEdgeConfigurationUpdate:
    post:
      operationId: StartEdgeConfigurationUpdate
      description: "An asynchronous API that updates a stream’s existing edge configuration. The Kinesis Video Stream will sync the stream’s edge configuration with the Edge Agent IoT Greengrass component that runs on an IoT Hub Device, setup at your premise. The time to sync can vary and depends on the connectivity of the Hub Device. The SyncStatus will be updated as the edge configuration is acknowledged, and synced with the Edge Agent. If this API is invoked for the first time, a new edge configuration will be created for the stream, and the sync status will be set to SYNCING. You will have to wait for the sync status to reach a terminal state such as: IN_SYNC, or SYNC_FAILED, before using this API again. If you invoke this API during the syncing process, a ResourceInUseException will be thrown. The connectivity of the stream’s edge configuration and the Edge Agent will be retried for 15 minutes. After 15 minutes, the status will transition into the SYNC_FAILED state. To move an edge configuration from one device to another, use DeleteEdgeConfiguration to delete the current edge configuration. You can then invoke StartEdgeConfigurationUpdate with an updated Hub Device ARN."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                EdgeConfig:
                  $ref: "#/components/schemas/EdgeConfig"
              required:
                - EdgeConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartEdgeConfigurationUpdateOutput"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds one or more tags to a signaling channel. A tag is a key-value pair (the value is optional) that you can define and assign to Amazon Web Services resources. If you specify a tag that already exists, the tag value is replaced with the value that you specify in the request. For more information, see Using Cost Allocation Tags in the Billing and Cost Management and Cost Management User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/ResourceARN"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
  /tagStream:
    post:
      operationId: TagStream
      description: Adds one or more tags to a stream. A tag is a key-value pair (the value is optional) that you can define and assign to Amazon Web Services resources. If you specify a tag that already exists, the tag value is replaced with the value that you specify in the request. For more information, see Using Cost Allocation Tags in the Billing and Cost Management and Cost Management User Guide. You must provide either the StreamName or the StreamARN. This operation requires permission for the KinesisVideo:TagStream action. A Kinesis video stream can support up to 50 tags.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                Tags:
                  $ref: "#/components/schemas/ResourceTags"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagStreamOutput"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes one or more tags from a signaling channel. In the request, specify only a tag key or keys; don't specify the value. If you specify a tag key that does not exist, it's ignored.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/ResourceARN"
                TagKeyList:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - ResourceARN
                - TagKeyList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /untagStream:
    post:
      operationId: UntagStream
      description: Removes one or more tags from a stream. In the request, specify only a tag key or keys; don't specify the value. If you specify a tag key that does not exist, it's ignored. In the request, you must provide the StreamName or StreamARN.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                TagKeyList:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - TagKeyList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagStreamOutput"
  /updateDataRetention:
    post:
      operationId: UpdateDataRetention
      description: "Increases or decreases the stream's data retention period by the value that you specify. To indicate whether you want to increase or decrease the data retention period, specify the Operation parameter in the request body. In the request, you must specify either the StreamName or the StreamARN. This operation requires permission for the KinesisVideo:UpdateDataRetention action. Changing the data retention period affects the data in the stream as follows: If the data retention period is increased, existing data is retained for the new retention period. For example, if the data retention period is increased from one hour to seven hours, all existing data is retained for seven hours. If the data retention period is decreased, existing data is retained for the new retention period. For example, if the data retention period is decreased from seven hours to one hour, all existing data is retained for one hour, and any data older than one hour is deleted immediately."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                CurrentVersion:
                  $ref: "#/components/schemas/Version"
                Operation:
                  $ref: "#/components/schemas/UpdateDataRetentionOperation"
                DataRetentionChangeInHours:
                  $ref: "#/components/schemas/DataRetentionChangeInHours"
              required:
                - CurrentVersion
                - Operation
                - DataRetentionChangeInHours
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDataRetentionOutput"
  /updateImageGenerationConfiguration:
    post:
      operationId: UpdateImageGenerationConfiguration
      description: Updates the StreamInfo and ImageProcessingConfiguration fields.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                ImageGenerationConfiguration:
                  $ref: "#/components/schemas/ImageGenerationConfiguration"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateImageGenerationConfigurationOutput"
  /updateMediaStorageConfiguration:
    post:
      operationId: UpdateMediaStorageConfiguration
      description: "Associates a SignalingChannel to a stream to store the media. There are two signaling modes that you can specify : If StorageStatus is enabled, the data will be stored in the StreamARN provided. In order for WebRTC Ingestion to work, the stream must have data retention enabled. If StorageStatus is disabled, no data will be stored, and the StreamARN parameter will not be needed. If StorageStatus is enabled, direct peer-to-peer (master-viewer) connections no longer occur. Peers connect directly to the storage session. You must call the JoinStorageSession API to trigger an SDP offer send and establish a connection between a peer and the storage session."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChannelARN:
                  $ref: "#/components/schemas/ResourceARN"
                MediaStorageConfiguration:
                  $ref: "#/components/schemas/MediaStorageConfiguration"
              required:
                - ChannelARN
                - MediaStorageConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMediaStorageConfigurationOutput"
  /updateNotificationConfiguration:
    post:
      operationId: UpdateNotificationConfiguration
      description: Updates the notification information for a stream.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                NotificationConfiguration:
                  $ref: "#/components/schemas/NotificationConfiguration"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateNotificationConfigurationOutput"
  /updateSignalingChannel:
    post:
      operationId: UpdateSignalingChannel
      description: Updates the existing signaling channel. This is an asynchronous operation and takes time to complete. If the MessageTtlSeconds value is updated (either increased or reduced), it only applies to new messages sent via this channel after it's been updated. Existing messages are still expired as per the previous MessageTtlSeconds value.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChannelARN:
                  $ref: "#/components/schemas/ResourceARN"
                CurrentVersion:
                  $ref: "#/components/schemas/Version"
                SingleMasterConfiguration:
                  $ref: "#/components/schemas/SingleMasterConfiguration"
              required:
                - ChannelARN
                - CurrentVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSignalingChannelOutput"
  /updateStream:
    post:
      operationId: UpdateStream
      description: Updates stream metadata, such as the device name and media type. You must provide the stream name or the Amazon Resource Name (ARN) of the stream. To make sure that you have the latest version of the stream before updating it, you can specify the stream version. Kinesis Video Streams assigns a version to each stream. When you update a stream, Kinesis Video Streams assigns a new version number. To get the latest stream version, use the DescribeStream API. UpdateStream is an asynchronous operation, and takes time to complete.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                CurrentVersion:
                  $ref: "#/components/schemas/Version"
                DeviceName:
                  $ref: "#/components/schemas/DeviceName"
                MediaType:
                  $ref: "#/components/schemas/MediaType"
              required:
                - CurrentVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateStreamOutput"
  /updateStreamStorageConfiguration:
    post:
      operationId: UpdateStreamStorageConfiguration
      description: Updates the storage configuration for an existing Kinesis video stream. This operation allows you to modify the storage tier settings for a stream, enabling you to optimize storage costs and performance based on your access patterns. UpdateStreamStorageConfiguration is an asynchronous operation. You must have permissions for the KinesisVideo:UpdateStreamStorageConfiguration action.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamName:
                  $ref: "#/components/schemas/StreamName"
                StreamARN:
                  $ref: "#/components/schemas/ResourceARN"
                CurrentVersion:
                  $ref: "#/components/schemas/Version"
                StreamStorageConfiguration:
                  $ref: "#/components/schemas/StreamStorageConfiguration"
              required:
                - CurrentVersion
                - StreamStorageConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateStreamStorageConfigurationOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ChannelName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9_.-]+"
    ChannelType:
      type: string
      enum:
        - SINGLE_MASTER
        - FULL_MESH
    SingleMasterConfiguration:
      description: A structure that contains the configuration for the SINGLE_MASTER channel type.
      type: object
      properties:
        MessageTtlSeconds:
          $ref: "#/components/schemas/MessageTtlSeconds"
          description: The period of time (in seconds) a signaling channel retains undelivered messages before they are discarded. Use to update this value.
    MessageTtlSeconds:
      type: integer
      minimum: 5
      maximum: 120
    TagOnCreateList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A key and value pair that is associated with the specified signaling channel.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key of the tag that is associated with the specified signaling channel.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the tag that is associated with the specified signaling channel.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[\\p{L}\\p{Z}\\p{N}_.:/=+\\-@]*"
    CreateSignalingChannelOutput:
      type: object
      properties:
        ChannelARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the created channel.
    ResourceARN:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: arn:[a-z\d-]+:kinesisvideo:[a-z0-9-]+:[0-9]+:[a-z]+/[a-zA-Z0-9_.-]+/[0-9]+
    DeviceName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_.-]+"
    StreamName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9_.-]+"
    MediaType:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\w\\-\\.\\+]+/[\\w\\-\\.\\+]+(,[\\w\\-\\.\\+]+/[\\w\\-\\.\\+]+)*"
    KmsKeyId:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: .+
    DataRetentionInHours:
      type: integer
      minimum: 0
    ResourceTags:
      type: object
      properties: {}
    StreamStorageConfiguration:
      description: The configuration for stream storage, including the default storage tier for stream data. This configuration determines how stream data is stored and accessed, with different tiers offering varying levels of performance and cost optimization.
      type: object
      properties:
        DefaultStorageTier:
          $ref: "#/components/schemas/DefaultStorageTier"
          description: "The default storage tier for the stream data. This setting determines the storage class used for stream data, affecting both performance characteristics and storage costs. Available storage tiers: HOT - Optimized for frequent access with the lowest latency and highest performance. Ideal for real-time applications and frequently accessed data. WARM - Balanced performance and cost for moderately accessed data. Suitable for data that is accessed regularly but not continuously."
      required:
        - DefaultStorageTier
    DefaultStorageTier:
      type: string
      enum:
        - HOT
        - WARM
    CreateStreamOutput:
      type: object
      properties:
        StreamARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the stream.
    DeleteEdgeConfigurationOutput:
      type: object
    Version:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9]+"
    DeleteSignalingChannelOutput:
      type: object
    DeleteStreamOutput:
      type: object
    DescribeEdgeConfigurationOutput:
      type: object
      properties:
        StreamName:
          $ref: "#/components/schemas/StreamName"
          description: The name of the stream from which the edge configuration was updated.
        StreamARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the stream.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which a stream’s edge configuration was first created.
        LastUpdatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which a stream’s edge configuration was last updated.
        SyncStatus:
          $ref: "#/components/schemas/SyncStatus"
          description: The latest status of the edge configuration update.
        FailedStatusDetails:
          $ref: "#/components/schemas/FailedStatusDetails"
          description: A description of the generated failure status.
        EdgeConfig:
          $ref: "#/components/schemas/EdgeConfig"
          description: A description of the stream's edge configuration that will be used to sync with the Edge Agent IoT Greengrass component. The Edge Agent component will run on an IoT Hub Device setup at your premise.
        EdgeAgentStatus:
          $ref: "#/components/schemas/EdgeAgentStatus"
          description: An object that contains the latest status details for an edge agent's recorder and uploader jobs. Use this information to determine the current health of an edge agent.
    Timestamp:
      type: string
      format: date-time
    SyncStatus:
      type: string
      enum:
        - SYNCING
        - ACKNOWLEDGED
        - IN_SYNC
        - SYNC_FAILED
        - DELETING
        - DELETE_FAILED
        - DELETING_ACKNOWLEDGED
    FailedStatusDetails:
      type: string
    EdgeConfig:
      description: A description of the stream's edge configuration that will be used to sync with the Edge Agent IoT Greengrass component. The Edge Agent component will run on an IoT Hub Device setup at your premise.
      type: object
      properties:
        HubDeviceArn:
          $ref: "#/components/schemas/HubDeviceArn"
          description: The "Internet of Things (IoT) Thing" Arn of the stream.
        RecorderConfig:
          $ref: "#/components/schemas/RecorderConfig"
          description: The recorder configuration consists of the local MediaSourceConfig details, that are used as credentials to access the local media files streamed on the camera.
        UploaderConfig:
          $ref: "#/components/schemas/UploaderConfig"
          description: The uploader configuration contains the ScheduleExpression details that are used to schedule upload jobs for the recorded media files from the Edge Agent to a Kinesis Video Stream.
        DeletionConfig:
          $ref: "#/components/schemas/DeletionConfig"
          description: The deletion configuration is made up of the retention time (EdgeRetentionInHours) and local size configuration (LocalSizeConfig) details that are used to make the deletion.
      required:
        - HubDeviceArn
        - RecorderConfig
    HubDeviceArn:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: arn:[a-z\d-]+:iot:[a-z0-9-]+:[0-9]+:thing/[a-zA-Z0-9_.-]+
    RecorderConfig:
      description: The recorder configuration consists of the local MediaSourceConfig details that are used as credentials to access the local media files streamed on the camera.
      type: object
      properties:
        MediaSourceConfig:
          $ref: "#/components/schemas/MediaSourceConfig"
          description: The configuration details that consist of the credentials required (MediaUriSecretArn and MediaUriType) to access the media files streamed to the camera.
        ScheduleConfig:
          $ref: "#/components/schemas/ScheduleConfig"
          description: The configuration that consists of the ScheduleExpression and the DurationInMinutes details that specify the scheduling to record from a camera, or local media file, onto the Edge Agent. If the ScheduleExpression attribute is not provided, then the Edge Agent will always be set to recording mode.
      required:
        - MediaSourceConfig
    MediaSourceConfig:
      description: The configuration details that consist of the credentials required (MediaUriSecretArn and MediaUriType) to access the media files that are streamed to the camera.
      type: object
      properties:
        MediaUriSecretArn:
          $ref: "#/components/schemas/MediaUriSecretArn"
          description: The Amazon Web Services Secrets Manager ARN for the username and password of the camera, or a local media file location.
        MediaUriType:
          $ref: "#/components/schemas/MediaUriType"
          description: The Uniform Resource Identifier (URI) type. The FILE_URI value can be used to stream local media files. Preview only supports the RTSP_URI media source URI format .
      required:
        - MediaUriSecretArn
        - MediaUriType
    MediaUriSecretArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:[a-z\d-]+:secretsmanager:[a-z0-9-]+:[0-9]+:secret:[a-zA-Z0-9_.-]+
    MediaUriType:
      type: string
      enum:
        - RTSP_URI
        - FILE_URI
    ScheduleConfig:
      description: This API enables you to specify the duration that the camera, or local media file, should record onto the Edge Agent. The ScheduleConfig consists of the ScheduleExpression and the DurationInMinutes attributes. If the ScheduleConfig is not provided in the RecorderConfig, then the Edge Agent will always be set to recording mode. If the ScheduleConfig is not provided in the UploaderConfig, then the Edge Agent will upload at regular intervals (every 1 hour).
      type: object
      properties:
        ScheduleExpression:
          $ref: "#/components/schemas/ScheduleExpression"
          description: The Quartz cron expression that takes care of scheduling jobs to record from the camera, or local media file, onto the Edge Agent. If the ScheduleExpression is not provided for the RecorderConfig, then the Edge Agent will always be set to recording mode. For more information about Quartz, refer to the Cron Trigger Tutorial page to understand the valid expressions and its use.
        DurationInSeconds:
          $ref: "#/components/schemas/DurationInSeconds"
          description: The total duration to record the media. If the ScheduleExpression attribute is provided, then the DurationInSeconds attribute should also be specified.
      required:
        - ScheduleExpression
        - DurationInSeconds
    ScheduleExpression:
      type: string
      minLength: 11
      maxLength: 100
      pattern: "[^\\n]{11,100}"
    DurationInSeconds:
      type: integer
      minimum: 60
      maximum: 3600
    UploaderConfig:
      description: The configuration that consists of the ScheduleExpression and the DurationInMinutes details that specify the scheduling to record from a camera, or local media file, onto the Edge Agent. If the ScheduleConfig is not provided in the UploaderConfig, then the Edge Agent will upload at regular intervals (every 1 hour).
      type: object
      properties:
        ScheduleConfig:
          $ref: "#/components/schemas/ScheduleConfig"
          description: The configuration that consists of the ScheduleExpression and the DurationInMinutes details that specify the scheduling to record from a camera, or local media file, onto the Edge Agent. If the ScheduleConfig is not provided in this UploaderConfig, then the Edge Agent will upload at regular intervals (every 1 hour).
      required:
        - ScheduleConfig
    DeletionConfig:
      description: The configuration details required to delete the connection of the stream from the Edge Agent.
      type: object
      properties:
        EdgeRetentionInHours:
          $ref: "#/components/schemas/EdgeRetentionInHours"
          description: The number of hours that you want to retain the data in the stream on the Edge Agent. The default value of the retention time is 720 hours, which translates to 30 days.
        LocalSizeConfig:
          $ref: "#/components/schemas/LocalSizeConfig"
          description: The value of the local size required in order to delete the edge configuration.
        DeleteAfterUpload:
          $ref: "#/components/schemas/DeleteAfterUpload"
          description: The boolean value used to indicate whether or not you want to mark the media for deletion, once it has been uploaded to the Kinesis Video Stream cloud. The media files can be deleted if any of the deletion configuration values are set to true, such as when the limit for the EdgeRetentionInHours, or the MaxLocalMediaSizeInMB, has been reached. Since the default value is set to true, configure the uploader schedule such that the media files are not being deleted before they are initially uploaded to the Amazon Web Services cloud.
    EdgeRetentionInHours:
      type: integer
      minimum: 1
      maximum: 720
    LocalSizeConfig:
      description: The configuration details that include the maximum size of the media (MaxLocalMediaSizeInMB) that you want to store for a stream on the Edge Agent, as well as the strategy that should be used (StrategyOnFullSize) when a stream's maximum size has been reached.
      type: object
      properties:
        MaxLocalMediaSizeInMB:
          $ref: "#/components/schemas/MaxLocalMediaSizeInMB"
          description: The overall maximum size of the media that you want to store for a stream on the Edge Agent.
        StrategyOnFullSize:
          $ref: "#/components/schemas/StrategyOnFullSize"
          description: The strategy to perform when a stream’s MaxLocalMediaSizeInMB limit is reached.
    MaxLocalMediaSizeInMB:
      type: integer
      minimum: 64
      maximum: 2000000
    StrategyOnFullSize:
      type: string
      enum:
        - DELETE_OLDEST_MEDIA
        - DENY_NEW_MEDIA
    DeleteAfterUpload:
      type: boolean
    EdgeAgentStatus:
      description: An object that contains the latest status details for an edge agent's recorder and uploader jobs. Use this information to determine the current health of an edge agent.
      type: object
      properties:
        LastRecorderStatus:
          $ref: "#/components/schemas/LastRecorderStatus"
          description: The latest status of a stream’s edge recording job.
        LastUploaderStatus:
          $ref: "#/components/schemas/LastUploaderStatus"
          description: The latest status of a stream’s edge to cloud uploader job.
    LastRecorderStatus:
      description: The latest status of a stream's edge recording job.
      type: object
      properties:
        JobStatusDetails:
          $ref: "#/components/schemas/JobStatusDetails"
          description: A description of a recorder job’s latest status.
        LastCollectedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the recorder job was last executed and media stored to local disk.
        LastUpdatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the recorder status was last updated.
        RecorderStatus:
          $ref: "#/components/schemas/RecorderStatus"
          description: The status of the latest recorder job.
    JobStatusDetails:
      type: string
    RecorderStatus:
      type: string
      enum:
        - SUCCESS
        - USER_ERROR
        - SYSTEM_ERROR
    LastUploaderStatus:
      description: The latest status of a stream’s edge to cloud uploader job.
      type: object
      properties:
        JobStatusDetails:
          $ref: "#/components/schemas/JobStatusDetails"
          description: A description of an uploader job’s latest status.
        LastCollectedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the uploader job was last executed and media collected to the cloud.
        LastUpdatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the uploader status was last updated.
        UploaderStatus:
          $ref: "#/components/schemas/UploaderStatus"
          description: The status of the latest uploader job.
    UploaderStatus:
      type: string
      enum:
        - SUCCESS
        - USER_ERROR
        - SYSTEM_ERROR
    DescribeImageGenerationConfigurationOutput:
      type: object
      properties:
        ImageGenerationConfiguration:
          $ref: "#/components/schemas/ImageGenerationConfiguration"
          description: The structure that contains the information required for the Kinesis video stream (KVS) images delivery. If this structure is null, the configuration will be deleted from the stream.
    ImageGenerationConfiguration:
      description: The structure that contains the information required for the KVS images delivery. If null, the configuration will be deleted from the stream.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/ConfigurationStatus"
          description: Indicates whether the ContinuousImageGenerationConfigurations API is enabled or disabled.
        ImageSelectorType:
          $ref: "#/components/schemas/ImageSelectorType"
          description: The origin of the Server or Producer timestamps to use to generate the images.
        DestinationConfig:
          $ref: "#/components/schemas/ImageGenerationDestinationConfig"
          description: The structure that contains the information required to deliver images to a customer.
        SamplingInterval:
          $ref: "#/components/schemas/SamplingInterval"
          description: The time interval in milliseconds (ms) at which the images need to be generated from the stream. The minimum value that can be provided is 200 ms. If the timestamp range is less than the sampling interval, the Image from the StartTimestamp will be returned if available.
        Format:
          $ref: "#/components/schemas/Format"
          description: The accepted image format.
        FormatConfig:
          type: object
          properties: {}
          description: The list of a key-value pair structure that contains extra parameters that can be applied when the image is generated. The FormatConfig key is the JPEGQuality, which indicates the JPEG quality key to be used to generate the image. The FormatConfig value accepts ints from 1 to 100. If the value is 1, the image will be generated with less quality and the best compression. If the value is 100, the image will be generated with the best quality and less compression. If no value is provided, the default value of the JPEGQuality key will be set to 80.
        WidthPixels:
          $ref: "#/components/schemas/WidthPixels"
          description: The width of the output image that is used in conjunction with the HeightPixels parameter. When both WidthPixels and HeightPixels parameters are provided, the image will be stretched to fit the specified aspect ratio. If only the WidthPixels parameter is provided, its original aspect ratio will be used to calculate the HeightPixels ratio. If neither parameter is provided, the original image size will be returned.
        HeightPixels:
          $ref: "#/components/schemas/HeightPixels"
          description: The height of the output image that is used in conjunction with the WidthPixels parameter. When both HeightPixels and WidthPixels parameters are provided, the image will be stretched to fit the specified aspect ratio. If only the HeightPixels parameter is provided, its original aspect ratio will be used to calculate the WidthPixels ratio. If neither parameter is provided, the original image size will be returned.
      required:
        - Status
        - ImageSelectorType
        - DestinationConfig
        - SamplingInterval
        - Format
    ConfigurationStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    ImageSelectorType:
      type: string
      enum:
        - SERVER_TIMESTAMP
        - PRODUCER_TIMESTAMP
    ImageGenerationDestinationConfig:
      description: The structure that contains the information required to deliver images to a customer.
      type: object
      properties:
        Uri:
          $ref: "#/components/schemas/DestinationUri"
          description: The Uniform Resource Identifier (URI) that identifies where the images will be delivered.
        DestinationRegion:
          $ref: "#/components/schemas/DestinationRegion"
          description: The Amazon Web Services Region of the S3 bucket where images will be delivered. This DestinationRegion must match the Region where the stream is located.
      required:
        - Uri
        - DestinationRegion
    DestinationUri:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-zA-Z_0-9]+:(//)?([^/]+)/?([^*]*)$
    DestinationRegion:
      type: string
      minLength: 9
      maxLength: 14
      pattern: ^[a-z]+(-[a-z]+)?-[a-z]+-[0-9]$
    SamplingInterval:
      type: integer
    Format:
      type: string
      enum:
        - JPEG
        - PNG
    WidthPixels:
      type: integer
      minimum: 1
      maximum: 3840
    HeightPixels:
      type: integer
      minimum: 1
      maximum: 2160
    MappedResourceConfigurationListLimit:
      type: integer
      minimum: 1
      maximum: 1
    NextToken:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[a-zA-Z0-9+/=]*"
    DescribeMappedResourceConfigurationOutput:
      type: object
      properties:
        MappedResourceConfigurationList:
          $ref: "#/components/schemas/MappedResourceConfigurationList"
          description: A structure that encapsulates, or contains, the media storage configuration properties.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token that was used in the NextTokenrequest to fetch the next set of results.
    MappedResourceConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/MappedResourceConfigurationListItem"
    MappedResourceConfigurationListItem:
      description: A structure that encapsulates, or contains, the media storage configuration properties.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/Type"
          description: The type of the associated resource for the kinesis video stream.
        ARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the Kinesis Video Stream resource, associated with the stream.
    Type:
      type: string
    DescribeMediaStorageConfigurationOutput:
      type: object
      properties:
        MediaStorageConfiguration:
          $ref: "#/components/schemas/MediaStorageConfiguration"
          description: A structure that encapsulates, or contains, the media storage configuration properties.
    MediaStorageConfiguration:
      description: A structure that encapsulates, or contains, the media storage configuration properties. If StorageStatus is enabled, the data will be stored in the StreamARN provided. In order for WebRTC Ingestion to work, the stream must have data retention enabled. If StorageStatus is disabled, no data will be stored, and the StreamARN parameter will not be needed.
      type: object
      properties:
        StreamARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the stream.
        Status:
          $ref: "#/components/schemas/MediaStorageConfigurationStatus"
          description: The status of the media storage configuration.
      required:
        - Status
    MediaStorageConfigurationStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    DescribeNotificationConfigurationOutput:
      type: object
      properties:
        NotificationConfiguration:
          $ref: "#/components/schemas/NotificationConfiguration"
          description: The structure that contains the information required for notifications. If the structure is null, the configuration will be deleted from the stream.
    NotificationConfiguration:
      description: Use this API to configure Amazon Simple Notification Service (Amazon SNS) notifications for when fragments become available in a stream. If this parameter is null, the configuration will be deleted from the stream. See Notifications in Kinesis Video Streams for more information.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/ConfigurationStatus"
          description: Indicates if a notification configuration is enabled or disabled.
        DestinationConfig:
          $ref: "#/components/schemas/NotificationDestinationConfig"
          description: The destination information required to deliver a notification to a customer.
      required:
        - Status
        - DestinationConfig
    NotificationDestinationConfig:
      description: The structure that contains the information required to deliver a notification to a customer.
      type: object
      properties:
        Uri:
          $ref: "#/components/schemas/DestinationUri"
          description: The Uniform Resource Identifier (URI) that identifies where the images will be delivered.
      required:
        - Uri
    DescribeSignalingChannelOutput:
      type: object
      properties:
        ChannelInfo:
          $ref: "#/components/schemas/ChannelInfo"
          description: A structure that encapsulates the specified signaling channel's metadata and properties.
    ChannelInfo:
      description: A structure that encapsulates a signaling channel's metadata and properties.
      type: object
      properties:
        ChannelName:
          $ref: "#/components/schemas/ChannelName"
          description: The name of the signaling channel.
        ChannelARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the signaling channel.
        ChannelType:
          $ref: "#/components/schemas/ChannelType"
          description: The type of the signaling channel.
        ChannelStatus:
          $ref: "#/components/schemas/Status"
          description: Current status of the signaling channel.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the signaling channel was created.
        SingleMasterConfiguration:
          $ref: "#/components/schemas/SingleMasterConfiguration"
          description: A structure that contains the configuration for the SINGLE_MASTER channel type.
        Version:
          $ref: "#/components/schemas/Version"
          description: The current version of the signaling channel.
    Status:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - UPDATING
        - DELETING
    DescribeStreamOutput:
      type: object
      properties:
        StreamInfo:
          $ref: "#/components/schemas/StreamInfo"
          description: An object that describes the stream.
    StreamInfo:
      description: An object describing a Kinesis video stream.
      type: object
      properties:
        DeviceName:
          $ref: "#/components/schemas/DeviceName"
          description: The name of the device that is associated with the stream.
        StreamName:
          $ref: "#/components/schemas/StreamName"
          description: The name of the stream.
        StreamARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the stream.
        MediaType:
          $ref: "#/components/schemas/MediaType"
          description: The MediaType of the stream.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The ID of the Key Management Service (KMS) key that Kinesis Video Streams uses to encrypt data on the stream.
        Version:
          $ref: "#/components/schemas/Version"
          description: The version of the stream.
        Status:
          $ref: "#/components/schemas/Status"
          description: The status of the stream.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: A time stamp that indicates when the stream was created.
        DataRetentionInHours:
          $ref: "#/components/schemas/DataRetentionInHours"
          description: How long the stream retains data, in hours.
    DescribeStreamStorageConfigurationOutput:
      type: object
      properties:
        StreamName:
          $ref: "#/components/schemas/StreamName"
          description: The name of the stream.
        StreamARN:
          $ref: "#/components/schemas/ResourceARN"
