openapi: 3.0.0
info:
  version: "2021-03-12"
  title: FinSpace User Environment Management service
  description: FinSpace User Environment Management service
  x-serviceName: finspace
  x-serviceAlias: finspace
  x-protocol: rest-json
  x-apiVersion: "2021-03-12"
  x-endpointPrefix: finspace
  x-jsonVersion: "1.1"
servers:
  - url: https://finspace.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for finspace
paths:
  /environment:
    post:
      operationId: CreateEnvironment
      description: Create a new FinSpace environment.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/EnvironmentName"
                description:
                  $ref: "#/components/schemas/Description"
                kmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                tags:
                  $ref: "#/components/schemas/TagMap"
                federationMode:
                  $ref: "#/components/schemas/FederationMode"
                federationParameters:
                  $ref: "#/components/schemas/FederationParameters"
                superuserParameters:
                  $ref: "#/components/schemas/SuperuserParameters"
                dataBundles:
                  $ref: "#/components/schemas/DataBundleArns"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEnvironmentResponse"
    get:
      operationId: ListEnvironments
      description: A list of all of your FinSpace environments.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A token generated by FinSpace that specifies where to continue pagination if a previous request was truncated. To get the next set of pages, pass in the nextTokennextToken value from the response object of the previous page call.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultLimit"
          description: The maximum number of results to return in this request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEnvironmentsResponse"
  /kx/environments/{environment_id}/databases/{database_name}/changesets:
    post:
      operationId: CreateKxChangeset
      description: Creates a changeset for a kdb database. A changeset allows you to add and delete existing files by using an ordered list of change requests.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentId"
          description: A unique identifier of the kdb environment.
        - name: database_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatabaseName"
          description: The name of the kdb database.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                changeRequests:
                  $ref: "#/components/schemas/ChangeRequests"
                clientToken:
                  $ref: "#/components/schemas/ClientTokenString"
              required:
                - changeRequests
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateKxChangesetResponse"
    get:
      operationId: ListKxChangesets
      description: Returns a list of all the changesets for a database.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentId"
          description: A unique identifier for the kdb environment.
        - name: database_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatabaseName"
          description: The name of the kdb database.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A token that indicates where a results page should begin.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in this request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListKxChangesetsResponse"
  /kx/environments/{environment_id}/clusters:
    post:
      operationId: CreateKxCluster
      description: Creates a new kdb cluster.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/KxEnvironmentId"
          description: A unique identifier for the kdb environment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                clusterName:
                  $ref: "#/components/schemas/KxClusterName"
                clusterType:
                  $ref: "#/components/schemas/KxClusterType"
                tickerplantLogConfiguration:
                  $ref: "#/components/schemas/TickerplantLogConfiguration"
                databases:
                  $ref: "#/components/schemas/KxDatabaseConfigurations"
                cacheStorageConfigurations:
                  $ref: "#/components/schemas/KxCacheStorageConfigurations"
                autoScalingConfiguration:
                  $ref: "#/components/schemas/AutoScalingConfiguration"
                clusterDescription:
                  $ref: "#/components/schemas/KxClusterDescription"
                capacityConfiguration:
                  $ref: "#/components/schemas/CapacityConfiguration"
                releaseLabel:
                  $ref: "#/components/schemas/ReleaseLabel"
                vpcConfiguration:
                  $ref: "#/components/schemas/VpcConfiguration"
                initializationScript:
                  $ref: "#/components/schemas/InitializationScriptFilePath"
                commandLineArguments:
                  $ref: "#/components/schemas/KxCommandLineArguments"
                code:
                  $ref: "#/components/schemas/CodeConfiguration"
                executionRole:
                  $ref: "#/components/schemas/ExecutionRoleArn"
                savedownStorageConfiguration:
                  $ref: "#/components/schemas/KxSavedownStorageConfiguration"
                azMode:
                  $ref: "#/components/schemas/KxAzMode"
                availabilityZoneId:
                  $ref: "#/components/schemas/AvailabilityZoneId"
                tags:
                  $ref: "#/components/schemas/TagMap"
                scalingGroupConfiguration:
                  $ref: "#/components/schemas/KxScalingGroupConfiguration"
              required:
                - clusterName
                - clusterType
                - releaseLabel
                - vpcConfiguration
                - azMode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateKxClusterResponse"
    get:
      operationId: ListKxClusters
      description: Returns a list of clusters.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/KxEnvironmentId"
          description: A unique identifier for the kdb environment.
        - name: clusterType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/KxClusterType"
          description: "Specifies the type of KDB database that is being created. The following types are available: HDB – A Historical Database. The data is only accessible with read-only permissions from one of the FinSpace managed kdb databases mounted to the cluster. RDB – A Realtime Database. This type of database captures all the data from a ticker plant and stores it in memory until the end of day, after which it writes all of its data to a disk and reloads the HDB. This cluster type requires local storage for temporary storage of data during the savedown process. If you specify this field in your request, you must provide the savedownStorageConfiguration parameter. GATEWAY – A gateway cluster allows you to access data across processes in kdb systems. It allows you to create your own routing logic using the initialization scripts and custom code. This type of cluster does not require a writable local storage. GP – A general purpose cluster allows you to quickly iterate on code during development by granting greater access to system commands and enabling a fast reload of custom code. This cluster type can optionally mount databases including cache and savedown storage. For this cluster type, the node count is fixed at 1. It does not support autoscaling and supports only SINGLE AZ mode. Tickerplant – A tickerplant cluster allows you to subscribe to feed handlers based on IAM permissions. It can publish to RDBs, other Tickerplants, and real-time subscribers (RTS). Tickerplants can persist messages to log, which is readable by any RDB environment. It supports only single-node that is only one kdb process."
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in this request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A token that indicates where a results page should begin.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListKxClustersResponse"
  /kx/environments/{environment_id}/databases:
    post:
      operationId: CreateKxDatabase
      description: Creates a new kdb database in the environment.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentId"
          description: A unique identifier for the kdb environment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                databaseName:
                  $ref: "#/components/schemas/DatabaseName"
                description:
                  $ref: "#/components/schemas/Description"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientTokenString"
              required:
                - databaseName
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateKxDatabaseResponse"
    get:
      operationId: ListKxDatabases
      description: Returns a list of all the databases in the kdb environment.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentId"
          description: A unique identifier for the kdb environment.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A token that indicates where a results page should begin.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in this request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListKxDatabasesResponse"
  /kx/environments/{environment_id}/databases/{database_name}/dataviews:
    post:
      operationId: CreateKxDataview
      description: Creates a snapshot of kdb database with tiered storage capabilities and a pre-warmed cache, ready for mounting on kdb clusters. Dataviews are only available for clusters running on a scaling group. They are not supported on dedicated clusters.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentId"
          description: A unique identifier for the kdb environment, where you want to create the dataview.
        - name: database_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatabaseName"
          description: The name of the database where you want to create a dataview.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dataviewName:
                  $ref: "#/components/schemas/KxDataviewName"
                azMode:
                  $ref: "#/components/schemas/KxAzMode"
                availabilityZoneId:
                  $ref: "#/components/schemas/AvailabilityZoneId"
                changesetId:
                  $ref: "#/components/schemas/ChangesetId"
                segmentConfigurations:
                  $ref: "#/components/schemas/KxDataviewSegmentConfigurationList"
                autoUpdate:
                  $ref: "#/components/schemas/booleanValue"
                readWrite:
                  $ref: "#/components/schemas/booleanValue"
                description:
                  $ref: "#/components/schemas/Description"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientTokenString"
              required:
                - dataviewName
                - azMode
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateKxDataviewResponse"
    get:
      operationId: ListKxDataviews
      description: Returns a list of all the dataviews in the database.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentId"
          description: A unique identifier for the kdb environment, for which you want to retrieve a list of dataviews.
        - name: database_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatabaseName"
          description: The name of the database where the dataviews were created.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A token that indicates where a results page should begin.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in this request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListKxDataviewsResponse"
  /kx/environments:
    post:
      operationId: CreateKxEnvironment
      description: Creates a managed kdb environment for the account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/KxEnvironmentName"
                description:
                  $ref: "#/components/schemas/Description"
                kmsKeyId:
                  $ref: "#/components/schemas/KmsKeyARN"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - name
                - kmsKeyId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateKxEnvironmentResponse"
    get:
      operationId: ListKxEnvironments
      description: Returns a list of kdb environments created in an account.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A token that indicates where a results page should begin.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BoxedInteger"
          description: The maximum number of results to return in this request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListKxEnvironmentsResponse"
  /kx/environments/{environment_id}/scalingGroups:
    post:
      operationId: CreateKxScalingGroup
      description: Creates a new scaling group.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/KxEnvironmentId"
          description: A unique identifier for the kdb environment, where you want to create the scaling group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                scalingGroupName:
                  $ref: "#/components/schemas/KxScalingGroupName"
                hostType:
                  $ref: "#/components/schemas/KxHostType"
                availabilityZoneId:
                  $ref: "#/components/schemas/AvailabilityZoneId"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - clientToken
                - scalingGroupName
                - hostType
                - availabilityZoneId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateKxScalingGroupResponse"
    get:
      operationId: ListKxScalingGroups
      description: Returns a list of scaling groups in a kdb environment.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/KxEnvironmentId"
          description: A unique identifier for the kdb environment, for which you want to retrieve a list of scaling groups.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in this request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A token that indicates where a results page should begin.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListKxScalingGroupsResponse"
  /kx/environments/{environment_id}/users:
    post:
      operationId: CreateKxUser
      description: Creates a user in FinSpace kdb environment with an associated IAM role.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdType"
          description: A unique identifier for the kdb environment where you want to create a user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userName:
                  $ref: "#/components/schemas/KxUserNameString"
                iamRole:
                  $ref: "#/components/schemas/RoleArn"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - userName
                - iamRole
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateKxUserResponse"
    get:
      operationId: ListKxUsers
      description: Lists all the users in a kdb environment.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdType"
          description: A unique identifier for the kdb environment.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A token that indicates where a results page should begin.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultLimit"
          description: The maximum number of results to return in this request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListKxUsersResponse"
  /kx/environments/{environment_id}/kxvolumes:
    post:
      operationId: CreateKxVolume
      description: Creates a new volume with a specific amount of throughput and storage capacity.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/KxEnvironmentId"
          description: A unique identifier for the kdb environment, whose clusters can attach to the volume.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                volumeType:
                  $ref: "#/components/schemas/KxVolumeType"
                volumeName:
                  $ref: "#/components/schemas/KxVolumeName"
                description:
                  $ref: "#/components/schemas/Description"
                nas1Configuration:
                  $ref: "#/components/schemas/KxNAS1Configuration"
                azMode:
                  $ref: "#/components/schemas/KxAzMode"
                availabilityZoneIds:
                  $ref: "#/components/schemas/AvailabilityZoneIds"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - volumeType
                - volumeName
                - azMode
                - availabilityZoneIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateKxVolumeResponse"
    get:
      operationId: ListKxVolumes
      description: Lists all the volumes in a kdb environment.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/KxEnvironmentId"
          description: A unique identifier for the kdb environment, whose clusters can attach to the volume.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in this request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A token that indicates where a results page should begin.
        - name: volumeType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/KxVolumeType"
          description: The type of file system volume. Currently, FinSpace only supports NAS_1 volume type.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListKxVolumesResponse"
  /environment/{environment_id}:
    delete:
      operationId: DeleteEnvironment
      description: Delete an FinSpace environment.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdType"
          description: The identifier for the FinSpace environment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEnvironmentResponse"
    get:
      operationId: GetEnvironment
      description: Returns the FinSpace environment object.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdType"
          description: The identifier of the FinSpace environment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEnvironmentResponse"
    put:
      operationId: UpdateEnvironment
      description: Update your FinSpace environment.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdType"
          description: The identifier of the FinSpace environment.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/EnvironmentName"
                description:
                  $ref: "#/components/schemas/Description"
                federationMode:
                  $ref: "#/components/schemas/FederationMode"
                federationParameters:
                  $ref: "#/components/schemas/FederationParameters"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEnvironmentResponse"
  /kx/environments/{environment_id}/clusters/{cluster_name}:
    delete:
      operationId: DeleteKxCluster
      description: Deletes a kdb cluster.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/KxEnvironmentId"
          description: A unique identifier for the kdb environment.
        - name: cluster_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/KxClusterName"
          description: The name of the cluster that you want to delete.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientTokenString"
          description: A token that ensures idempotency. This token expires in 10 minutes.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteKxClusterResponse"
    get:
      operationId: GetKxCluster
      description: Retrieves information about a kdb cluster.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/KxEnvironmentId"
          description: A unique identifier for the kdb environment.
        - name: cluster_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/KxClusterName"
          description: The name of the cluster that you want to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetKxClusterResponse"
  /kx/environments/{environment_id}/clusters/{cluster_name}/nodes/{node_id}:
    delete:
      operationId: DeleteKxClusterNode
      description: Deletes the specified nodes from a cluster.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/KxEnvironmentId"
          description: A unique identifier for the kdb environment.
        - name: cluster_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/KxClusterName"
          description: The name of the cluster, for which you want to delete the nodes.
        - name: node_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/KxClusterNodeIdString"
          description: A unique identifier for the node that you want to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteKxClusterNodeResponse"
  /kx/environments/{environment_id}/databases/{database_name}:
    delete:
      operationId: DeleteKxDatabase
      description: Deletes the specified database and all of its associated data. This action is irreversible. You must copy any data out of the database before deleting it if the data is to be retained.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentId"
          description: A unique identifier for the kdb environment.
        - name: database_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatabaseName"
          description: The name of the kdb database that you want to delete.
        - name: clientToken
          in: query
