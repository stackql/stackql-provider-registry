          $ref: "#/components/schemas/KxNAS1Configuration"
          description: Specifies the configuration for the Network attached storage (NAS_1) file system volume.
        status:
          $ref: "#/components/schemas/KxVolumeStatus"
          description: The status of the volume. CREATING – The volume creation is in progress. CREATE_FAILED – The volume creation has failed. ACTIVE – The volume is active. UPDATING – The volume is in the process of being updated. UPDATE_FAILED – The update action failed. UPDATED – The volume is successfully updated. DELETING – The volume is in the process of being deleted. DELETE_FAILED – The system failed to delete the volume. DELETED – The volume is successfully deleted.
        description:
          $ref: "#/components/schemas/Description"
          description: The description for the volume.
        statusReason:
          $ref: "#/components/schemas/KxVolumeStatusReason"
          description: The error message when a failed state occurs.
        createdTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the volume was created in FinSpace. The value is determined as epoch time in milliseconds. For example, the value for Monday, November 1, 2021 12:00:00 PM UTC is specified as 1635768000000.
        azMode:
          $ref: "#/components/schemas/KxAzMode"
          description: The number of availability zones you want to assign per volume. Currently, FinSpace only supports SINGLE for volumes. This places dataview in a single AZ.
        availabilityZoneIds:
          $ref: "#/components/schemas/AvailabilityZoneIds"
          description: The identifier of the availability zones.
        lastModifiedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The last time that the volume was updated in FinSpace. The value is determined as epoch time in milliseconds. For example, the value for Monday, November 1, 2021 12:00:00 PM UTC is specified as 1635768000000.
        attachedClusters:
          $ref: "#/components/schemas/KxAttachedClusters"
          description: Specifies the clusters that a volume is attached to.
