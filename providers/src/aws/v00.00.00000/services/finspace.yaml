    tgwStatus:
      type: string
      enum:
        - NONE
        - UPDATE_REQUESTED
        - UPDATING
        - FAILED_UPDATE
        - SUCCESSFULLY_UPDATED
    dnsStatus:
      type: string
      enum:
        - NONE
        - UPDATE_REQUESTED
        - UPDATING
        - FAILED_UPDATE
        - SUCCESSFULLY_UPDATED
    EnvironmentErrorMessage:
      type: string
      minLength: 0
      maxLength: 1000
      pattern: ^[a-zA-Z0-9. ]{1,1000}$
    TransitGatewayConfiguration:
      description: The structure of the transit gateway and network configuration that is used to connect the kdb environment to an internal network.
      type: object
      properties:
        transitGatewayID:
          $ref: "#/components/schemas/TransitGatewayID"
          description: The identifier of the transit gateway created by the customer to connect outbound traffics from kdb network to your internal network.
        routableCIDRSpace:
          $ref: "#/components/schemas/ValidCIDRSpace"
          description: The routing CIDR on behalf of kdb environment. It could be any "/26 range in the 100.64.0.0 CIDR space. After providing, it will be added to the customer's transit gateway routing table so that the traffics could be routed to kdb network.
        attachmentNetworkAclConfiguration:
          $ref: "#/components/schemas/NetworkACLConfiguration"
          description: The rules that define how you manage the outbound traffic from kdb network to your internal network.
      required:
        - transitGatewayID
        - routableCIDRSpace
    TransitGatewayID:
      type: string
      minLength: 1
      maxLength: 32
    ValidCIDRSpace:
      type: string
    NetworkACLConfiguration:
      type: array
      items:
        $ref: "#/components/schemas/NetworkACLEntry"
    NetworkACLEntry:
      description: The network access control list (ACL) is an optional layer of security for your VPC that acts as a firewall for controlling traffic in and out of one or more subnets. The entry is a set of numbered ingress and egress rules that determine whether a packet should be allowed in or out of a subnet associated with the ACL. We process the entries in the ACL according to the rule numbers, in ascending order.
      type: object
      properties:
        ruleNumber:
          $ref: "#/components/schemas/RuleNumber"
          description: The rule number for the entry. For example 100. All the network ACL entries are processed in ascending order by rule number.
        protocol:
          $ref: "#/components/schemas/Protocol"
          description: The protocol number. A value of -1 means all the protocols.
        ruleAction:
          $ref: "#/components/schemas/RuleAction"
          description: Indicates whether to allow or deny the traffic that matches the rule.
        portRange:
          $ref: "#/components/schemas/PortRange"
          description: The range of ports the rule applies to.
        icmpTypeCode:
          $ref: "#/components/schemas/IcmpTypeCode"
          description: Defines the ICMP protocol that consists of the ICMP type and code.
        cidrBlock:
          $ref: "#/components/schemas/ValidCIDRBlock"
          description: The IPv4 network range to allow or deny, in CIDR notation. For example, 172.16.0.0/24. We modify the specified CIDR block to its canonical form. For example, if you specify 100.68.0.18/18, we modify it to 100.68.0.0/18.
      required:
        - ruleNumber
        - protocol
        - ruleAction
        - cidrBlock
    RuleNumber:
      type: integer
      minimum: 1
      maximum: 32766
    Protocol:
      type: string
      minLength: 1
      maxLength: 5
      pattern: ^-1|[0-9]+$
    RuleAction:
      type: string
      enum:
        - allow
        - deny
    PortRange:
      description: The range of ports the rule applies to.
      type: object
      properties:
        from:
          $ref: "#/components/schemas/Port"
          description: The first port in the range.
        to:
          $ref: "#/components/schemas/Port"
          description: The last port in the range.
      required:
        - from
        - to
    Port:
      type: integer
      minimum: 0
      maximum: 65535
    IcmpTypeCode:
      description: Defines the ICMP protocol that consists of the ICMP type and code.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/IcmpTypeOrCode"
          description: The ICMP type. A value of -1 means all types.
        code:
          $ref: "#/components/schemas/IcmpTypeOrCode"
          description: The ICMP code. A value of -1 means all codes for the specified ICMP type.
      required:
        - type_
        - code
    IcmpTypeOrCode:
      type: integer
    ValidCIDRBlock:
      type: string
      minLength: 1
      maxLength: 18
      pattern: ^(?:\d{1,3}\.){3}\d{1,3}(?:\/(?:3[0-2]|[12]\d|\d))$
    CustomDNSConfiguration:
      type: array
      items:
        $ref: "#/components/schemas/CustomDNSServer"
    CustomDNSServer:
      description: A list of DNS server name and server IP. This is used to set up Route-53 outbound resolvers.
      type: object
      properties:
        customDNSServerName:
          $ref: "#/components/schemas/ValidHostname"
          description: The name of the DNS server.
        customDNSServerIP:
          $ref: "#/components/schemas/ValidIPAddress"
          description: The IP address of the DNS server.
      required:
        - customDNSServerName
        - customDNSServerIP
    ValidHostname:
      type: string
      minLength: 3
      maxLength: 255
      pattern: ^([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])(\.([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]{0,61}[a-zA-Z0-9]))*$
    ValidIPAddress:
      type: string
      pattern: ^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$
    stringValueLength1to255:
      type: string
      minLength: 1
      maxLength: 255
    GetKxScalingGroupResponse:
      type: object
      properties:
        scalingGroupName:
          $ref: "#/components/schemas/KxScalingGroupName"
          description: A unique identifier for the kdb scaling group.
        scalingGroupArn:
          $ref: "#/components/schemas/arn"
          description: The ARN identifier for the scaling group.
        hostType:
          $ref: "#/components/schemas/KxHostType"
          description: "The memory and CPU capabilities of the scaling group host on which FinSpace Managed kdb clusters will be placed. It can have one of the following values: kx.sg.large – The host type with a configuration of 16 GiB memory and 2 vCPUs. kx.sg.xlarge – The host type with a configuration of 32 GiB memory and 4 vCPUs. kx.sg.2xlarge – The host type with a configuration of 64 GiB memory and 8 vCPUs. kx.sg.4xlarge – The host type with a configuration of 108 GiB memory and 16 vCPUs. kx.sg.8xlarge – The host type with a configuration of 216 GiB memory and 32 vCPUs. kx.sg.16xlarge – The host type with a configuration of 432 GiB memory and 64 vCPUs. kx.sg.32xlarge – The host type with a configuration of 864 GiB memory and 128 vCPUs. kx.sg1.16xlarge – The host type with a configuration of 1949 GiB memory and 64 vCPUs. kx.sg1.24xlarge – The host type with a configuration of 2948 GiB memory and 96 vCPUs."
        clusters:
          $ref: "#/components/schemas/KxClusterNameList"
          description: The list of Managed kdb clusters that are currently active in the given scaling group.
        availabilityZoneId:
          $ref: "#/components/schemas/AvailabilityZoneId"
          description: The identifier of the availability zones.
        status:
          $ref: "#/components/schemas/KxScalingGroupStatus"
          description: The status of scaling group. CREATING – The scaling group creation is in progress. CREATE_FAILED – The scaling group creation has failed. ACTIVE – The scaling group is active. UPDATING – The scaling group is in the process of being updated. UPDATE_FAILED – The update action failed. DELETING – The scaling group is in the process of being deleted. DELETE_FAILED – The system failed to delete the scaling group. DELETED – The scaling group is successfully deleted.
        statusReason:
          $ref: "#/components/schemas/KxClusterStatusReason"
          description: The error message when a failed state occurs.
        lastModifiedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The last time that the scaling group was updated in FinSpace. The value is determined as epoch time in milliseconds. For example, the value for Monday, November 1, 2021 12:00:00 PM UTC is specified as 1635768000000.
        createdTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the scaling group was created in FinSpace. The value is determined as epoch time in milliseconds. For example, the value for Monday, November 1, 2021 12:00:00 PM UTC is specified as 1635768000000.
    arn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:*:*:*:*:*
    KxClusterNameList:
      type: array
      items:
        $ref: "#/components/schemas/KxClusterName"
    GetKxUserResponse:
      type: object
      properties:
        userName:
          $ref: "#/components/schemas/IdType"
          description: A unique identifier for the user.
        userArn:
          $ref: "#/components/schemas/KxUserArn"
          description: The Amazon Resource Name (ARN) that identifies the user. For more information about ARNs and how to use ARNs in policies, see IAM Identifiers in the IAM User Guide.
        environmentId:
          $ref: "#/components/schemas/IdType"
          description: A unique identifier for the kdb environment.
        iamRole:
