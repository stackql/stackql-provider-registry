        description:
          $ref: "#/components/schemas/Description"
          description: A description of the dataview.
        autoUpdate:
          $ref: "#/components/schemas/booleanValue"
          description: The option to specify whether you want to apply all the future additions and corrections automatically to the dataview when new changesets are ingested. The default value is false.
        readWrite:
          $ref: "#/components/schemas/booleanValue"
          description: Returns True if the dataview is created as writeable and False otherwise.
        environmentId:
          $ref: "#/components/schemas/EnvironmentId"
          description: A unique identifier for the kdb environment, from where you want to retrieve the dataview details.
        createdTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the dataview was created in FinSpace. The value is determined as epoch time in milliseconds. For example, the value for Monday, November 1, 2021 12:00:00 PM UTC is specified as 1635768000000.
        lastModifiedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The last time that the dataview was updated in FinSpace. The value is determined as epoch time in milliseconds. For example, the value for Monday, November 1, 2021 12:00:00 PM UTC is specified as 1635768000000.
        status:
          $ref: "#/components/schemas/KxDataviewStatus"
          description: The status of dataview creation. CREATING – The dataview creation is in progress. UPDATING – The dataview is in the process of being updated. ACTIVE – The dataview is active.
        statusReason:
          $ref: "#/components/schemas/KxDataviewStatusReason"
          description: The error message when a failed state occurs.
    KxDataviewActiveVersionList:
      type: array
      items:
        $ref: "#/components/schemas/KxDataviewActiveVersion"
    KxDataviewActiveVersion:
      description: The active version of the dataview that is currently in use by this cluster.
      type: object
      properties:
        changesetId:
          $ref: "#/components/schemas/ChangesetId"
          description: A unique identifier for the changeset.
        segmentConfigurations:
          $ref: "#/components/schemas/KxDataviewSegmentConfigurationList"
          description: The configuration that contains the database path of the data that you want to place on each selected volume. Each segment must have a unique database path for each volume. If you do not explicitly specify any database path for a volume, they are accessible from the cluster through the default S3/object store segment.
        attachedClusters:
          $ref: "#/components/schemas/AttachedClusterList"
          description: The list of clusters that are currently using this dataview.
        createdTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the dataview version was active. The value is determined as epoch time in milliseconds. For example, the value for Monday, November 1, 2021 12:00:00 PM UTC is specified as 1635768000000.
        versionId:
          $ref: "#/components/schemas/VersionId"
          description: A unique identifier of the active version.
    AttachedClusterList:
      type: array
      items:
        $ref: "#/components/schemas/KxClusterName"
    KxDataviewStatusReason:
      type: string
      minLength: 1
      maxLength: 250
      pattern: ^[a-zA-Z0-9\_\-\.\s]+$
    GetKxEnvironmentResponse:
