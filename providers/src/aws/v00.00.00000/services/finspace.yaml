components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    EnvironmentName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-zA-Z0-9][a-zA-Z0-9-]*[a-zA-Z0-9]$
    Description:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: ^[a-zA-Z0-9. ]{1,1000}$
    KmsKeyId:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: ^[a-zA-Z-0-9-:\/]*$
    TagMap:
      type: object
      properties: {}
    FederationMode:
      type: string
      enum:
        - FEDERATED
        - LOCAL
    FederationParameters:
      description: Configuration information when authentication mode is FEDERATED.
      type: object
      properties:
        samlMetadataDocument:
          $ref: "#/components/schemas/SamlMetadataDocument"
          description: SAML 2.0 Metadata document from identity provider (IdP).
        samlMetadataURL:
          $ref: "#/components/schemas/url"
          description: Provide the metadata URL from your SAML 2.0 compliant identity provider (IdP).
        applicationCallBackURL:
          $ref: "#/components/schemas/url"
          description: The redirect or sign-in URL that should be entered into the SAML 2.0 compliant identity provider configuration (IdP).
        federationURN:
          $ref: "#/components/schemas/urn"
          description: The Uniform Resource Name (URN). Also referred as Service Provider URN or Audience URI or Service Provider Entity ID.
        federationProviderName:
          $ref: "#/components/schemas/FederationProviderName"
          description: Name of the identity provider (IdP).
        attributeMap:
          type: object
          properties: {}
          description: SAML attribute name and value. The name must always be Email and the value should be set to the attribute definition in which user email is set. For example, name would be Email and value http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress. Please check your SAML 2.0 compliant identity provider (IdP) documentation for details.
    SamlMetadataDocument:
      type: string
      minLength: 1000
      maxLength: 10000000
      pattern: .*
    url:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: ^https?://[-a-zA-Z0-9+&@#/%?=~_|!:,.;]*[-a-zA-Z0-9+&@#/%=~_|]
    urn:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[A-Za-z0-9._\-:\/#\+]+$
    FederationProviderName:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[^_\\p{Z}][\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}][^_\\p{Z}]+"
    SuperuserParameters:
      description: Configuration information for the superuser.
      type: object
      properties:
        emailAddress:
          $ref: "#/components/schemas/EmailId"
          description: The email address of the superuser.
        firstName:
          $ref: "#/components/schemas/NameString"
          description: The first name of the superuser.
        lastName:
          $ref: "#/components/schemas/NameString"
          description: The last name of the superuser.
      required:
        - emailAddress
        - firstName
        - lastName
    EmailId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+[.]+[A-Za-z]+"
    NameString:
      type: string
      minLength: 1
      maxLength: 50
      pattern: ^[a-zA-Z0-9]{1,50}$
    DataBundleArns:
      type: array
      items:
        $ref: "#/components/schemas/DataBundleArn"
    DataBundleArn:
      description: The Amazon Resource Name (ARN) of the data bundle.
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:aws:finspace:[A-Za-z0-9_/.-]{0,63}:\d*:data-bundle/[0-9A-Za-z_-]{1,128}$
    CreateEnvironmentResponse:
      type: object
      properties:
        environmentId:
          $ref: "#/components/schemas/IdType"
          description: The unique identifier for FinSpace environment that you created.
        environmentArn:
          $ref: "#/components/schemas/EnvironmentArn"
          description: The Amazon Resource Name (ARN) of the FinSpace environment that you created.
        environmentUrl:
          $ref: "#/components/schemas/url"
          description: The sign-in URL for the web application of the FinSpace environment you created.
    IdType:
      type: string
      minLength: 1
      maxLength: 26
      pattern: ^[a-zA-Z0-9]{1,26}$
    EnvironmentArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:aws:finspace:[A-Za-z0-9_/.-]{0,63}:\d+:environment/[0-9A-Za-z_-]{1,128}$
    EnvironmentId:
      type: string
      minLength: 1
      maxLength: 32
      pattern: .*\S.*
    DatabaseName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: ^[a-zA-Z0-9][a-zA-Z0-9-_]*[a-zA-Z0-9]$
    ChangeRequests:
      type: array
      items:
        $ref: "#/components/schemas/ChangeRequest"
    ChangeRequest:
      description: A list of change request objects.
      type: object
      properties:
        changeType:
          $ref: "#/components/schemas/ChangeType"
          description: "Defines the type of change request. A changeType can have the following values: PUT – Adds or updates files in a database. DELETE – Deletes files in a database."
        s3Path:
          $ref: "#/components/schemas/S3Path"
          description: Defines the S3 path of the source file that is required to add or update files in a database.
        dbPath:
          $ref: "#/components/schemas/DbPath"
          description: Defines the path within the database directory.
      required:
        - changeType
        - dbPath
    ChangeType:
      type: string
      enum:
        - PUT
        - DELETE
    S3Path:
      type: string
      minLength: 9
      maxLength: 1093
      pattern: ^s3:\/\/[a-z0-9][a-z0-9-.]{1,61}[a-z0-9]\/([^\/]+\/)*[^\/]*$
    DbPath:
      type: string
      minLength: 1
      maxLength: 1025
      pattern: ^(\*)*[\/\?\*]([^\/]+\/){0,2}[^\/]*$
    ClientTokenString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z0-9-]+$
    CreateKxChangesetResponse:
      type: object
      properties:
        changesetId:
          $ref: "#/components/schemas/ChangesetId"
          description: A unique identifier for the changeset.
        databaseName:
          $ref: "#/components/schemas/DatabaseName"
          description: The name of the kdb database.
        environmentId:
          $ref: "#/components/schemas/EnvironmentId"
          description: A unique identifier for the kdb environment.
        changeRequests:
          $ref: "#/components/schemas/ChangeRequests"
          description: A list of change requests.
        createdTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the changeset was created in FinSpace. The value is determined as epoch time in milliseconds. For example, the value for Monday, November 1, 2021 12:00:00 PM UTC is specified as 1635768000000.
        lastModifiedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the changeset was updated in FinSpace. The value is determined as epoch time in milliseconds. For example, the value for Monday, November 1, 2021 12:00:00 PM UTC is specified as 1635768000000.
        status:
          $ref: "#/components/schemas/ChangesetStatus"
          description: Status of the changeset creation process. Pending – Changeset creation is pending. Processing – Changeset creation is running. Failed – Changeset creation has failed. Complete – Changeset creation has succeeded.
        errorInfo:
          $ref: "#/components/schemas/ErrorInfo"
          description: The details of the error that you receive when creating a changeset. It consists of the type of error and the error message.
    ChangesetId:
      type: string
      minLength: 1
      maxLength: 26
      pattern: ^[a-zA-Z0-9]+$
    Timestamp:
      type: string
      format: date-time
    ChangesetStatus:
      type: string
      enum:
        - PENDING
        - PROCESSING
        - FAILED
        - COMPLETED
    ErrorInfo:
      description: Provides details in the event of a failed flow, including the error type and the related error message.
      type: object
      properties:
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: Specifies the error message that appears if a flow fails.
        errorType:
          $ref: "#/components/schemas/ErrorDetails"
          description: Specifies the type of error.
    ErrorMessage:
      type: string
      maxLength: 1000
    ErrorDetails:
      type: string
      enum:
        - The inputs to this request are invalid.
        - Service limits have been exceeded.
        - Missing required permission to perform this request.
        - One or more inputs to this request were not found.
        - The system temporarily lacks sufficient resources to process the request.
        - An internal error has occurred.
        - Cancelled
        - A user recoverable error has occurred
    KxEnvironmentId:
      type: string
      minLength: 1
      maxLength: 32
      pattern: ^[a-z0-9]+$
    ClientToken:
      type: string
      minLength: 1
      maxLength: 36
      pattern: .*\S.*
    KxClusterName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: ^[a-zA-Z0-9][a-zA-Z0-9-_]*[a-zA-Z0-9]$
    KxClusterType:
      type: string
      enum:
        - HDB
        - RDB
        - GATEWAY
        - GP
        - TICKERPLANT
    TickerplantLogConfiguration:
      description: A configuration to store the Tickerplant logs. It consists of a list of volumes that will be mounted to your cluster. For the cluster type Tickerplant, the location of the TP volume on the cluster will be available by using the global variable .aws.tp_log_path.
      type: object
      properties:
        tickerplantLogVolumes:
          $ref: "#/components/schemas/TickerplantLogVolumes"
          description: The name of the volumes for tickerplant logs.
    TickerplantLogVolumes:
      type: array
      items:
        $ref: "#/components/schemas/VolumeName"
    VolumeName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: ^[a-zA-Z0-9][a-zA-Z0-9-_]*[a-zA-Z0-9]$
    KxDatabaseConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/KxDatabaseConfiguration"
    KxDatabaseConfiguration:
      description: The configuration of data that is available for querying from this database.
      type: object
      properties:
        databaseName:
          $ref: "#/components/schemas/DatabaseName"
          description: The name of the kdb database. When this parameter is specified in the structure, S3 with the whole database is included by default.
        cacheConfigurations:
          $ref: "#/components/schemas/KxDatabaseCacheConfigurations"
          description: Configuration details for the disk cache used to increase performance reading from a kdb database mounted to the cluster.
        changesetId:
          $ref: "#/components/schemas/ChangesetId"
          description: A unique identifier of the changeset that is associated with the cluster.
        dataviewName:
          $ref: "#/components/schemas/KxDataviewName"
          description: The name of the dataview to be used for caching historical data on disk.
        dataviewConfiguration:
          $ref: "#/components/schemas/KxDataviewConfiguration"
          description: The configuration of the dataview to be used with specified cluster.
      required:
        - databaseName
    KxDatabaseCacheConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/KxDatabaseCacheConfiguration"
    KxDatabaseCacheConfiguration:
      description: The structure of database cache configuration that is used for mapping database paths to cache types in clusters.
      type: object
      properties:
        cacheType:
          $ref: "#/components/schemas/KxCacheStorageType"
          description: "The type of disk cache. This parameter is used to map the database path to cache storage. The valid values are: CACHE_1000 – This type provides at least 1000 MB/s disk access throughput."
        dbPaths:
          $ref: "#/components/schemas/DbPaths"
          description: Specifies the portions of database that will be loaded into the cache for access.
        dataviewName:
          $ref: "#/components/schemas/KxDataviewName"
          description: The name of the dataview to be used for caching historical data on disk.
      required:
        - cacheType
        - dbPaths
    KxCacheStorageType:
      type: string
      minLength: 8
      maxLength: 10
    DbPaths:
      type: array
      items:
        $ref: "#/components/schemas/DbPath"
    KxDataviewName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: ^[a-zA-Z0-9][a-zA-Z0-9-_]*[a-zA-Z0-9]$
    KxDataviewConfiguration:
      description: The structure that stores the configuration details of a dataview.
      type: object
      properties:
        dataviewName:
          $ref: "#/components/schemas/KxDataviewName"
          description: The unique identifier of the dataview.
        dataviewVersionId:
          $ref: "#/components/schemas/VersionId"
          description: The version of the dataview corresponding to a given changeset.
        changesetId:
          $ref: "#/components/schemas/ChangesetId"
          description: A unique identifier for the changeset.
        segmentConfigurations:
          $ref: "#/components/schemas/KxDataviewSegmentConfigurationList"
          description: The db path and volume configuration for the segmented database.
    VersionId:
      type: string
      minLength: 1
      maxLength: 26
    KxDataviewSegmentConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/KxDataviewSegmentConfiguration"
    KxDataviewSegmentConfiguration:
      description: The configuration that contains the database path of the data that you want to place on each selected volume. Each segment must have a unique database path for each volume. If you do not explicitly specify any database path for a volume, they are accessible from the cluster through the default S3/object store segment.
      type: object
      properties:
        dbPaths:
          $ref: "#/components/schemas/SegmentConfigurationDbPathList"
          description: The database path of the data that you want to place on each selected volume for the segment. Each segment must have a unique database path for each volume.
        volumeName:
          $ref: "#/components/schemas/KxVolumeName"
          description: The name of the volume where you want to add data.
        onDemand:
          $ref: "#/components/schemas/booleanValue"
          description: Enables on-demand caching on the selected database path when a particular file or a column of the database is accessed. When on demand caching is True, dataviews perform minimal loading of files on the filesystem as needed. When it is set to False, everything is cached. The default value is False.
      required:
        - dbPaths
        - volumeName
    SegmentConfigurationDbPathList:
      type: array
      items:
        $ref: "#/components/schemas/DbPath"
    KxVolumeName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: ^[a-zA-Z0-9][a-zA-Z0-9-_]*[a-zA-Z0-9]$
    booleanValue:
      type: boolean
    KxCacheStorageConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/KxCacheStorageConfiguration"
    KxCacheStorageConfiguration:
      description: The configuration for read only disk cache associated with a cluster.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/KxCacheStorageType"
          description: "The type of cache storage. The valid values are: CACHE_1000 – This type provides at least 1000 MB/s disk access throughput. CACHE_250 – This type provides at least 250 MB/s disk access throughput. CACHE_12 – This type provides at least 12 MB/s disk access throughput. For cache type CACHE_1000 and CACHE_250 you can select cache size as 1200 GB or increments of 2400 GB. For cache type CACHE_12 you can select the cache size in increments of 6000 GB."
        size:
          $ref: "#/components/schemas/KxCacheStorageSize"
          description: The size of cache in Gigabytes.
      required:
        - type_
        - size
    KxCacheStorageSize:
      type: integer
    AutoScalingConfiguration:
      description: The configuration based on which FinSpace will scale in or scale out nodes in your cluster.
      type: object
      properties:
        minNodeCount:
          $ref: "#/components/schemas/NodeCount"
          description: The lowest number of nodes to scale. This value must be at least 1 and less than the maxNodeCount. If the nodes in a cluster belong to multiple availability zones, then minNodeCount must be at least 3.
        maxNodeCount:
          $ref: "#/components/schemas/NodeCount"
          description: The highest number of nodes to scale. This value cannot be greater than 5.
        autoScalingMetric:
          $ref: "#/components/schemas/AutoScalingMetric"
          description: The metric your cluster will track in order to scale in and out. For example, CPU_UTILIZATION_PERCENTAGE is the average CPU usage across all the nodes in a cluster.
        metricTarget:
          $ref: "#/components/schemas/AutoScalingMetricTarget"
          description: The desired value of the chosen autoScalingMetric. When the metric drops below this value, the cluster will scale in. When the metric goes above this value, the cluster will scale out. You can set the target value between 1 and 100 percent.
        scaleInCooldownSeconds:
          $ref: "#/components/schemas/CooldownTime"
          description: The duration in seconds that FinSpace will wait after a scale in event before initiating another scaling event.
        scaleOutCooldownSeconds:
          $ref: "#/components/schemas/CooldownTime"
          description: The duration in seconds that FinSpace will wait after a scale out event before initiating another scaling event.
    NodeCount:
      type: integer
      minimum: 1
    AutoScalingMetric:
      type: string
      enum:
        - CPU_UTILIZATION_PERCENTAGE
    AutoScalingMetricTarget:
      type: number
      format: double
      minimum: 1
      maximum: 100
    CooldownTime:
      type: number
      format: double
      minimum: 0
      maximum: 100000
    KxClusterDescription:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: ^[a-zA-Z0-9\_\-\.\s]+$
    CapacityConfiguration:
      description: A structure for the metadata of a cluster. It includes information like the CPUs needed, memory of instances, and number of instances.
      type: object
      properties:
        nodeType:
          $ref: "#/components/schemas/NodeType"
          description: "The type that determines the hardware of the host computer used for your cluster instance. Each node type offers different memory and storage capabilities. Choose a node type based on the requirements of the application or software that you plan to run on your instance. You can only specify one of the following values: kx.s.large – The node type with a configuration of 12 GiB memory and 2 vCPUs. kx.s.xlarge – The node type with a configuration of 27 GiB memory and 4 vCPUs. kx.s.2xlarge – The node type with a configuration of 54 GiB memory and 8 vCPUs. kx.s.4xlarge – The node type with a configuration of 108 GiB memory and 16 vCPUs. kx.s.8xlarge – The node type with a configuration of 216 GiB memory and 32 vCPUs. kx.s.16xlarge – The node type with a configuration of 432 GiB memory and 64 vCPUs. kx.s.32xlarge – The node type with a configuration of 864 GiB memory and 128 vCPUs."
        nodeCount:
          $ref: "#/components/schemas/NodeCount"
          description: The number of instances running in a cluster.
    NodeType:
      type: string
      minLength: 1
      maxLength: 32
      pattern: ^[a-zA-Z0-9._]+$
    ReleaseLabel:
      type: string
      minLength: 1
      maxLength: 16
      pattern: ^[a-zA-Z0-9._-]+$
    VpcConfiguration:
      description: Configuration details about the network where the Privatelink endpoint of the cluster resides.
      type: object
      properties:
        vpcId:
          $ref: "#/components/schemas/VpcIdString"
          description: The identifier of the VPC endpoint.
        securityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIdList"
          description: The unique identifier of the VPC security group applied to the VPC endpoint ENI for the cluster.
        subnetIds:
          $ref: "#/components/schemas/SubnetIdList"
          description: The identifier of the subnet that the Privatelink VPC endpoint uses to connect to the cluster.
        ipAddressType:
          $ref: "#/components/schemas/IPAddressType"
          description: "The IP address type for cluster network configuration parameters. The following type is available: IP_V4 – IP address version 4"
    VpcIdString:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^vpc-([a-z0-9]{8}$|[a-z0-9]{17}$)
    SecurityGroupIdList:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupIdString"
    SecurityGroupIdString:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^sg-([a-z0-9]{8}$|[a-z0-9]{17}$)
    SubnetIdList:
      type: array
      items:
        $ref: "#/components/schemas/SubnetIdString"
    SubnetIdString:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^subnet-([a-z0-9]{8}$|[a-z0-9]{17}$)
    IPAddressType:
      type: string
      enum:
        - IP_V4
    InitializationScriptFilePath:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-zA-Z0-9\_\-\.\/\\]+$
    KxCommandLineArguments:
      type: array
      items:
        $ref: "#/components/schemas/KxCommandLineArgument"
    KxCommandLineArgument:
      description: Defines the key-value pairs to make them available inside the cluster.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/KxCommandLineArgumentKey"
          description: The name of the key.
        value:
          $ref: "#/components/schemas/KxCommandLineArgumentValue"
          description: The value of the key.
    KxCommandLineArgumentKey:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^(?![Aa][Ww][Ss])(s|([a-zA-Z][a-zA-Z0-9_]+))|(AWS_ZIP_DEFAULT)
    KxCommandLineArgumentValue:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^[a-zA-Z0-9_:./,; ]+$
    CodeConfiguration:
      description: The structure of the customer code available within the running cluster.
      type: object
      properties:
        s3Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: A unique name for the S3 bucket.
        s3Key:
          $ref: "#/components/schemas/S3Key"
          description: The full S3 path (excluding bucket) to the .zip file. This file contains the code that is loaded onto the cluster when it's started.
        s3ObjectVersion:
          $ref: "#/components/schemas/S3ObjectVersion"
          description: The version of an S3 object.
    S3Bucket:
      type: string
      minLength: 3
      maxLength: 255
      pattern: ^[a-z0-9][a-z0-9\.\-]*[a-z0-9]$
    S3Key:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^[a-zA-Z0-9\/\!\-_\.\*'\(\)]+$
    S3ObjectVersion:
      type: string
      minLength: 1
      maxLength: 1000
    ExecutionRoleArn:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^arn:aws[a-z0-9-]*:iam::\d{12}:role\/[\w-\/.@+=,]{1,1017}$
    KxSavedownStorageConfiguration:
      description: The size and type of temporary storage that is used to hold data during the savedown process. All the data written to this storage space is lost when the cluster node is restarted.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/KxSavedownStorageType"
          description: "The type of writeable storage space for temporarily storing your savedown data. The valid values are: SDS01 – This type represents 3000 IOPS and io2 ebs volume type."
        size:
          $ref: "#/components/schemas/KxSavedownStorageSize"
          description: The size of temporary storage in gibibytes.
        volumeName:
          $ref: "#/components/schemas/KxVolumeName"
          description: The name of the kdb volume that you want to use as writeable save-down storage for clusters.
    KxSavedownStorageType:
      type: string
      enum:
        - SDS01
    KxSavedownStorageSize:
      type: integer
      minimum: 10
      maximum: 16000
    KxAzMode:
      type: string
      enum:
        - SINGLE
        - MULTI
    AvailabilityZoneId:
      type: string
      minLength: 8
      maxLength: 12
      pattern: ^[a-zA-Z0-9-]+$
    KxScalingGroupConfiguration:
      description: The structure that stores the capacity configuration details of a scaling group.
      type: object
      properties:
        scalingGroupName:
          $ref: "#/components/schemas/KxScalingGroupName"
          description: A unique identifier for the kdb scaling group.
        memoryLimit:
          $ref: "#/components/schemas/MemoryMib"
          description: An optional hard limit on the amount of memory a kdb cluster can use.
        memoryReservation:
          $ref: "#/components/schemas/MemoryMib"
          description: A reservation of the minimum amount of memory that should be available on the scaling group for a kdb cluster to be successfully placed in a scaling group.
        nodeCount:
          $ref: "#/components/schemas/ClusterNodeCount"
          description: The number of kdb cluster nodes.
        cpu:
          $ref: "#/components/schemas/CpuCount"
          description: The number of vCPUs that you want to reserve for each node of this kdb cluster on the scaling group host.
      required:
        - scalingGroupName
        - memoryReservation
        - nodeCount
    KxScalingGroupName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: ^[a-zA-Z0-9][a-zA-Z0-9-_]*[a-zA-Z0-9]$
    MemoryMib:
      type: integer
      minimum: 6
    ClusterNodeCount:
      type: integer
      minimum: 1
    CpuCount:
      type: number
      format: double
      minimum: 0.1
    CreateKxClusterResponse:
      type: object
      properties:
        environmentId:
          $ref: "#/components/schemas/KxEnvironmentId"
          description: A unique identifier for the kdb environment.
        status:
          $ref: "#/components/schemas/KxClusterStatus"
          description: The status of cluster creation. PENDING – The cluster is pending creation. CREATING – The cluster creation process is in progress. CREATE_FAILED – The cluster creation process has failed. RUNNING – The cluster creation process is running. UPDATING – The cluster is in the process of being updated. DELETING – The cluster is in the process of being deleted. DELETED – The cluster has been deleted. DELETE_FAILED – The cluster failed to delete.
        statusReason:
          $ref: "#/components/schemas/KxClusterStatusReason"
          description: The error message when a failed state occurs.
        clusterName:
          $ref: "#/components/schemas/KxClusterName"
          description: A unique name for the cluster.
        clusterType:
          $ref: "#/components/schemas/KxClusterType"
          description: "Specifies the type of KDB database that is being created. The following types are available: HDB – A Historical Database. The data is only accessible with read-only permissions from one of the FinSpace managed kdb databases mounted to the cluster. RDB – A Realtime Database. This type of database captures all the data from a ticker plant and stores it in memory until the end of day, after which it writes all of its data to a disk and reloads the HDB. This cluster type requires local storage for temporary storage of data during the savedown process. If you specify this field in your request, you must provide the savedownStorageConfiguration parameter. GATEWAY – A gateway cluster allows you to access data across processes in kdb systems. It allows you to create your own routing logic using the initialization scripts and custom code. This type of cluster does not require a writable local storage. GP – A general purpose cluster allows you to quickly iterate on code during development by granting greater access to system commands and enabling a fast reload of custom code. This cluster type can optionally mount databases including cache and savedown storage. For this cluster type, the node count is fixed at 1. It does not support autoscaling and supports only SINGLE AZ mode. Tickerplant – A tickerplant cluster allows you to subscribe to feed handlers based on IAM permissions. It can publish to RDBs, other Tickerplants, and real-time subscribers (RTS). Tickerplants can persist messages to log, which is readable by any RDB environment. It supports only single-node that is only one kdb process."
        tickerplantLogConfiguration:
          $ref: "#/components/schemas/TickerplantLogConfiguration"
        volumes:
          $ref: "#/components/schemas/Volumes"
          description: A list of volumes mounted on the cluster.
        databases:
          $ref: "#/components/schemas/KxDatabaseConfigurations"
          description: A list of databases that will be available for querying.
        cacheStorageConfigurations:
          $ref: "#/components/schemas/KxCacheStorageConfigurations"
