      required:
        - DomainName
        - Expression
    IndexField:
      description: Configuration information for a field in the index, including its name, type, and options. The supported options depend on the IndexFieldType.
      type: object
      properties:
        IndexFieldName:
          $ref: "#/components/schemas/DynamicFieldName"
          description: "A string that represents the name of an index field. CloudSearch supports regular index fields as well as dynamic fields. A dynamic field's name defines a pattern that begins or ends with a wildcard. Any document fields that don't map to a regular index field but do match a dynamic field's pattern are configured with the dynamic field's indexing options. Regular field names begin with a letter and can contain the following characters: a-z (lowercase), 0-9, and _ (underscore). Dynamic field names must begin or end with a wildcard (*). The wildcard can also be the only character in a dynamic field name. Multiple wildcards, and wildcards embedded within a string are not supported. The name score is reserved and cannot be used as a field name. To reference a document's ID, you can use the name _id."
        IndexFieldType:
          $ref: "#/components/schemas/IndexFieldType"
        IntOptions:
          $ref: "#/components/schemas/IntOptions"
        DoubleOptions:
          $ref: "#/components/schemas/DoubleOptions"
        LiteralOptions:
          $ref: "#/components/schemas/LiteralOptions"
        TextOptions:
          $ref: "#/components/schemas/TextOptions"
        DateOptions:
          $ref: "#/components/schemas/DateOptions"
        LatLonOptions:
          $ref: "#/components/schemas/LatLonOptions"
        IntArrayOptions:
          $ref: "#/components/schemas/IntArrayOptions"
        DoubleArrayOptions:
          $ref: "#/components/schemas/DoubleArrayOptions"
        LiteralArrayOptions:
          $ref: "#/components/schemas/LiteralArrayOptions"
        TextArrayOptions:
          $ref: "#/components/schemas/TextArrayOptions"
        DateArrayOptions:
          $ref: "#/components/schemas/DateArrayOptions"
      required:
        - IndexFieldName
        - IndexFieldType
    DynamicFieldName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ([a-z][a-z0-9_]*\*?|\*[a-z0-9_]*)
    IndexFieldType:
      description: The type of field. The valid options for a field depend on the field type. For more information about the supported field types, see Configuring Index Fields in the Amazon CloudSearch Developer Guide.
      type: string
      enum:
        - int
        - double
        - literal
        - text
        - date
        - latlon
        - int-array
        - double-array
        - literal-array
        - text-array
        - date-array
    IntOptions:
      description: Options for a 64-bit signed integer field. Present if IndexFieldType specifies the field is of type int. All options are enabled by default.
      type: object
      properties:
        DefaultValue:
          $ref: "#/components/schemas/Long"
          description: A value to use for the field if the field isn't specified for a document. This can be important if you are using the field in an expression and that field is not present in every document.
        SourceField:
          $ref: "#/components/schemas/FieldName"
          description: The name of the source field to map to the field.
        FacetEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether facet information can be returned for the field.
        SearchEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether the contents of the field are searchable.
        ReturnEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether the contents of the field can be returned in the search results.
        SortEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether the field can be used to sort the search results.
    Long:
      type: integer
      format: int64
    FieldName:
      description: "A string that represents the name of an index field. CloudSearch supports regular index fields as well as dynamic fields. A dynamic field's name defines a pattern that begins or ends with a wildcard. Any document fields that don't map to a regular index field but do match a dynamic field's pattern are configured with the dynamic field's indexing options. Regular field names begin with a letter and can contain the following characters: a-z (lowercase), 0-9, and _ (underscore). Dynamic field names must begin or end with a wildcard (*). The wildcard can also be the only character in a dynamic field name. Multiple wildcards, and wildcards embedded within a string are not supported. The name score is reserved and cannot be used as a field name. To reference a document's ID, you can use the name _id."
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-z][a-z0-9_]*"
    Boolean:
      type: boolean
    DoubleOptions:
      description: Options for a double-precision 64-bit floating point field. Present if IndexFieldType specifies the field is of type double. All options are enabled by default.
      type: object
      properties:
        DefaultValue:
          $ref: "#/components/schemas/Double"
          description: A value to use for the field if the field isn't specified for a document. This can be important if you are using the field in an expression and that field is not present in every document.
        SourceField:
          $ref: "#/components/schemas/FieldName"
          description: The name of the source field to map to the field.
        FacetEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether facet information can be returned for the field.
        SearchEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether the contents of the field are searchable.
        ReturnEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether the contents of the field can be returned in the search results.
        SortEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether the field can be used to sort the search results.
    Double:
      type: number
      format: double
    LiteralOptions:
      description: Options for literal field. Present if IndexFieldType specifies the field is of type literal. All options are enabled by default.
      type: object
      properties:
        DefaultValue:
          $ref: "#/components/schemas/FieldValue"
          description: A value to use for the field if the field isn't specified for a document.
        SourceField:
          $ref: "#/components/schemas/FieldName"
        FacetEnabled:
