          description: Whether the contents of the field can be returned in the search results.
        SortEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether the field can be used to sort the search results.
    LatLonOptions:
      description: Options for a latlon field. A latlon field contains a location stored as a latitude and longitude value pair. Present if IndexFieldType specifies the field is of type latlon. All options are enabled by default.
      type: object
      properties:
        DefaultValue:
          $ref: "#/components/schemas/FieldValue"
          description: A value to use for the field if the field isn't specified for a document.
        SourceField:
          $ref: "#/components/schemas/FieldName"
        FacetEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Whether facet information can be returned for the field.
        SearchEnabled:
