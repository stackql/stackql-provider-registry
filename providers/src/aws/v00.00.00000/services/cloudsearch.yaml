openapi: 3.0.0
info:
  version: "2013-01-01"
  title: Amazon CloudSearch
  description: Amazon CloudSearch
  x-serviceName: cloudsearch
  x-serviceAlias: cloudsearch
  x-protocol: query
  x-apiVersion: "2013-01-01"
  x-endpointPrefix: cloudsearch
servers:
  - url: https://cloudsearch.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for cloudsearch
paths:
  /?Action=BuildSuggesters&Version=2013-01-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_BuildSuggesters
      description: Indexes the search suggestions. For more information, see Configuring Suggesters in the Amazon CloudSearch Developer Guide.
      parameters:
        - name: DomainName
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/BuildSuggestersOutputDisplay"
    post:
      operationId: POST_BuildSuggesters
      description: Indexes the search suggestions. For more information, see Configuring Suggesters in the Amazon CloudSearch Developer Guide.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/BuildSuggestersOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/BuildSuggestersRequest"
  /?Action=CreateDomain&Version=2013-01-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateDomain
      description: Creates a new search domain. For more information, see Creating a Search Domain in the Amazon CloudSearch Developer Guide.
      parameters:
        - name: DomainName
          in: query
          required: true
          description: A name for the domain you are creating. Allowed characters are a-z (lower-case letters), 0-9, and hyphen (-). Domain names must start with a letter or number and be at least 3 and no more than 28 characters long.
          schema:
            $ref: "#/components/schemas/DomainName"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateDomainOutputDisplay"
    post:
      operationId: POST_CreateDomain
      description: Creates a new search domain. For more information, see Creating a Search Domain in the Amazon CloudSearch Developer Guide.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateDomainOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CreateDomainRequest"
