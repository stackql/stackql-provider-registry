components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DomainName:
      description: "A string that represents the name of a domain. Domain names are unique across the domains owned by an account within an AWS region. Domain names start with a letter or number and can contain the following characters: a-z (lowercase), 0-9, and - (hyphen)."
      type: string
      minLength: 3
      maxLength: 28
      pattern: "[a-z][a-z0-9\\-]+"
    BuildSuggestersResponseDisplay:
      type: object
      properties:
        FieldNames:
          type: string
          description: A list of field names.
    BuildSuggestersOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/BuildSuggestersResponseDisplay"
    BuildSuggestersRequest:
      description: Container for the parameters to the BuildSuggester operation. Specifies the name of the domain you want to update.
      type: object
      properties:
        DomainName:
          $ref: "#/components/schemas/DomainName"
      required:
        - DomainName
    DomainStatusDisplay:
      type: object
      properties:
        DomainId:
          type: string
          description: An internally generated unique identifier for a domain.
        DomainName:
          type: string
          description: "A string that represents the name of a domain. Domain names are unique across the domains owned by an account within an AWS region. Domain names start with a letter or number and can contain the following characters: a-z (lowercase), 0-9, and - (hyphen)."
        ARN:
          type: string
          description: The Amazon Resource Name (ARN) of the search domain. See Identifiers for IAM Entities in Using AWS Identity and Access Management for more information.
        Created:
          type: boolean
          description: True if the search domain is created. It can take several minutes to initialize a domain when CreateDomain is called. Newly created search domains are returned from DescribeDomains with a false value for Created until domain creation is complete.
        Deleted:
          type: boolean
          description: True if the search domain has been deleted. The system must clean up resources dedicated to the search domain when DeleteDomain is called. Newly deleted search domains are returned from DescribeDomains with a true value for IsDeleted for several minutes until resource cleanup is complete.
        DocService:
          type: string
          description: The service endpoint for updating documents in a search domain.
        SearchService:
          type: string
          description: The service endpoint for requesting search results from a search domain.
        RequiresIndexDocuments:
          type: boolean
          description: True if IndexDocuments needs to be called to activate the current domain configuration.
        Processing:
          type: boolean
          description: True if processing is being done to activate the current domain configuration.
        SearchInstanceType:
          type: string
          description: The instance type that is being used to process search requests.
        SearchPartitionCount:
          type: integer
          description: The number of partitions across which the search index is spread.
        SearchInstanceCount:
          type: integer
          description: The number of search instances that are available to process search requests.
        Limits:
          type: string
    CreateDomainOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DomainStatusDisplay"
    CreateDomainRequest:
      description: Container for the parameters to the CreateDomain operation. Specifies a name for the new search domain.
      type: object
      properties:
        DomainName:
          $ref: "#/components/schemas/DomainName"
          description: A name for the domain you are creating. Allowed characters are a-z (lower-case letters), 0-9, and hyphen (-). Domain names must start with a letter or number and be at least 3 and no more than 28 characters long.
      required:
        - DomainName
    AnalysisScheme:
      description: "Configuration information for an analysis scheme. Each analysis scheme has a unique name and specifies the language of the text to be processed. The following options can be configured for an analysis scheme: Synonyms, Stopwords, StemmingDictionary, JapaneseTokenizationDictionary and AlgorithmicStemming."
      type: object
      properties:
        AnalysisSchemeName:
          $ref: "#/components/schemas/StandardName"
        AnalysisSchemeLanguage:
          $ref: "#/components/schemas/AnalysisSchemeLanguage"
        AnalysisOptions:
          $ref: "#/components/schemas/AnalysisOptions"
      required:
        - AnalysisSchemeName
        - AnalysisSchemeLanguage
    StandardName:
      description: "Names must begin with a letter and can contain the following characters: a-z (lowercase), 0-9, and _ (underscore)."
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-z][a-z0-9_]*"
    AnalysisSchemeLanguage:
      description: An IETF RFC 4646 language code or mul for multiple languages.
      type: string
      enum:
        - ar
        - bg
        - ca
        - cs
        - da
        - de
        - el
        - en
        - es
        - eu
        - fa
        - fi
        - fr
        - ga
        - gl
        - he
        - hi
        - hu
        - hy
        - id
        - it
        - ja
        - ko
        - lv
        - mul
        - nl
        - "no"
        - pt
        - ro
        - ru
        - sv
        - th
        - tr
        - zh-Hans
        - zh-Hant
    AnalysisOptions:
      description: Synonyms, stopwords, and stemming options for an analysis scheme. Includes tokenization dictionary for Japanese.
      type: object
      properties:
        Synonyms:
          $ref: "#/components/schemas/String"
          description: A JSON object that defines synonym groups and aliases. A synonym group is an array of arrays, where each sub-array is a group of terms where each term in the group is considered a synonym of every other term in the group. The aliases value is an object that contains a collection of string:value pairs where the string specifies a term and the array of values specifies each of the aliases for that term. An alias is considered a synonym of the specified term, but the term is not considered a synonym of the alias. For more information about specifying synonyms, see Synonyms in the Amazon CloudSearch Developer Guide.
        Stopwords:
          $ref: "#/components/schemas/String"
          description: A JSON array of terms to ignore during indexing and searching. For example, ["a", "an", "the", "of"]. The stopwords dictionary must explicitly list each word you want to ignore. Wildcards and regular expressions are not supported.
        StemmingDictionary:
          $ref: "#/components/schemas/String"
          description: 'A JSON object that contains a collection of string:value pairs that each map a term to its stem. For example, {"term1": "stem1", "term2": "stem2", "term3": "stem3"}. The stemming dictionary is applied in addition to any algorithmic stemming. This enables you to override the results of the algorithmic stemming to correct specific cases of overstemming or understemming. The maximum size of a stemming dictionary is 500 KB.'
        JapaneseTokenizationDictionary:
          $ref: "#/components/schemas/String"
          description: A JSON array that contains a collection of terms, tokens, readings and part of speech for Japanese Tokenizaiton. The Japanese tokenization dictionary enables you to override the default tokenization for selected terms. This is only valid for Japanese language fields.
        AlgorithmicStemming:
          $ref: "#/components/schemas/AlgorithmicStemming"
          description: "The level of algorithmic stemming to perform: none, minimal, light, or full. The available levels vary depending on the language. For more information, see Language Specific Text Processing Settings in the Amazon CloudSearch Developer Guide"
    String:
      type: string
    AlgorithmicStemming:
      type: string
      enum:
        - none
        - minimal
        - light
        - full
    AnalysisSchemeStatusDisplay:
      type: object
      properties:
        Options:
          type: string
          description: "Configuration information for an analysis scheme. Each analysis scheme has a unique name and specifies the language of the text to be processed. The following options can be configured for an analysis scheme: Synonyms, Stopwords, StemmingDictionary, JapaneseTokenizationDictionary and AlgorithmicStemming."
