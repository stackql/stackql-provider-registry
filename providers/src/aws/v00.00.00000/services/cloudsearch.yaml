              schema:
                $ref: "#/components/schemas/DeleteDomainOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/DeleteDomainRequest"
  /?Action=DeleteExpression&Version=2013-01-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_DeleteExpression
      description: Removes an Expression from the search domain. For more information, see Configuring Expressions in the Amazon CloudSearch Developer Guide.
      parameters:
        - name: DomainName
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
        - name: ExpressionName
          in: query
          required: true
          description: The name of the Expression to delete.
          schema:
            $ref: "#/components/schemas/StandardName"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/DeleteExpressionOutputDisplay"
    post:
      operationId: POST_DeleteExpression
      description: Removes an Expression from the search domain. For more information, see Configuring Expressions in the Amazon CloudSearch Developer Guide.
      responses:
        "200":
