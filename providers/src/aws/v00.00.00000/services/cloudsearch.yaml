      operationId: GET_DeleteIndexField
      description: Removes an IndexField from the search domain. For more information, see Configuring Index Fields in the Amazon CloudSearch Developer Guide.
      parameters:
        - name: DomainName
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
        - name: IndexFieldName
          in: query
          required: true
          description: The name of the index field your want to remove from the domain's indexing options.
          schema:
            $ref: "#/components/schemas/DynamicFieldName"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
