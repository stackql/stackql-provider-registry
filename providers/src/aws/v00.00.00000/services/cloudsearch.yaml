        - DocumentSuggesterOptions
    DocumentSuggesterOptions:
      description: Options for a search suggester.
      type: object
      properties:
        SourceField:
          $ref: "#/components/schemas/FieldName"
          description: The name of the index field you want to use for suggestions.
        FuzzyMatching:
          $ref: "#/components/schemas/SuggesterFuzzyMatching"
          description: "The level of fuzziness allowed when suggesting matches for a string: none, low, or high. With none, the specified string is treated as an exact prefix. With low, suggestions must differ from the specified string by no more than one character. With high, suggestions can differ by up to two characters. The default is none."
