    CreateIPSetResponse:
      type: object
      properties:
        IPSet:
          $ref: "#/components/schemas/IPSet"
          description: The IPSet returned in the CreateIPSet response.
        ChangeToken:
          $ref: "#/components/schemas/ChangeToken"
          description: The ChangeToken that you used to submit the CreateIPSet request. You can also use this value to query the status of the request. For more information, see GetChangeTokenStatus.
    IPSet:
      description: "This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. Contains one or more IP addresses or blocks of IP addresses specified in Classless Inter-Domain Routing (CIDR) notation. AWS WAF supports IPv4 address ranges: /8 and any range between /16 through /32. AWS WAF supports IPv6 address ranges: /24, /32, /48, /56, /64, and /128. To specify an individual IP address, you specify the four-part IP address followed by a /32, for example, 192.0.2.0/32. To block a range of IP addresses, you can specify /8 or any range between /16 through /32 (for IPv4) or /24, /32, /48, /56, /64, or /128 (for IPv6). For more information about CIDR notation, see the Wikipedia entry Classless Inter-Domain Routing."
      type: object
      properties:
        IPSetId:
          $ref: "#/components/schemas/ResourceId"
          description: The IPSetId for an IPSet. You use IPSetId to get information about an IPSet (see GetIPSet), update an IPSet (see UpdateIPSet), insert an IPSet into a Rule or delete one from a Rule (see UpdateRule), and delete an IPSet from AWS WAF (see DeleteIPSet). IPSetId is returned by CreateIPSet and by ListIPSets.
        Name:
          $ref: "#/components/schemas/ResourceName"
          description: A friendly name or description of the IPSet. You can't change the name of an IPSet after you create it.
        IPSetDescriptors:
          $ref: "#/components/schemas/IPSetDescriptors"
          description: The IP address type (IPV4 or IPV6) and the IP address range (in CIDR notation) that web requests originate from. If the WebACL is associated with a CloudFront distribution and the viewer did not use an HTTP proxy or a load balancer to send the request, this is the value of the c-ip field in the CloudFront access logs.
      required:
        - IPSetId
        - IPSetDescriptors
    IPSetDescriptors:
      type: array
      items:
        $ref: "#/components/schemas/IPSetDescriptor"
    IPSetDescriptor:
      description: This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. Specifies the IP address type (IPV4 or IPV6) and the IP address range (in CIDR format) that web requests originate from.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/IPSetDescriptorType"
          description: Specify IPV4 or IPV6.
        Value:
          $ref: "#/components/schemas/IPSetDescriptorValue"
          description: "Specify an IPv4 address by using CIDR notation. For example: To configure AWS WAF to allow, block, or count requests that originated from the IP address 192.0.2.44, specify 192.0.2.44/32. To configure AWS WAF to allow, block, or count requests that originated from IP addresses from 192.0.2.0 to 192.0.2.255, specify 192.0.2.0/24. For more information about CIDR notation, see the Wikipedia entry Classless Inter-Domain Routing. Specify an IPv6 address by using CIDR notation. For example: To configure AWS WAF to allow, block, or count requests that originated from the IP address 1111:0000:0000:0000:0000:0000:0000:0111, specify 1111:0000:0000:0000:0000:0000:0000:0111/128. To configure AWS WAF to allow, block, or count requests that originated from IP addresses 1111:0000:0000:0000:0000:0000:0000:0000 to 1111:0000:0000:0000:ffff:ffff:ffff:ffff, specify 1111:0000:0000:0000:0000:0000:0000:0000/64."
      required:
        - Type
        - Value
    IPSetDescriptorType:
      type: string
      enum:
        - IPV4
        - IPV6
    IPSetDescriptorValue:
      type: string
      minLength: 1
      maxLength: 50
      pattern: .*\S.*
    MetricName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: .*\S.*
    RateKey:
      type: string
      enum:
        - IP
    RateLimit:
      type: integer
      format: int64
      minimum: 100
      maximum: 2000000000
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. A tag associated with an AWS resource. Tags are key:value pairs that you can use to categorize and manage your resources, for purposes like billing. For example, you might set the tag key to \"customer\" and the value to the customer name or ID. You can specify one or more tags to add to each AWS resource, up to 50 tags for a resource. Tagging is only available through the API, SDKs, and CLI. You can't manage or view tags through the AWS WAF Classic console. You can tag the AWS resources that you manage through AWS WAF Classic: web ACLs, rule groups, and rules."
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
        Value:
          $ref: "#/components/schemas/TagValue"
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: .*\S.*
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: .*
    CreateRateBasedRuleResponse:
      type: object
      properties:
        Rule:
          $ref: "#/components/schemas/RateBasedRule"
          description: The RateBasedRule that is returned in the CreateRateBasedRule response.
        ChangeToken:
          $ref: "#/components/schemas/ChangeToken"
          description: The ChangeToken that you used to submit the CreateRateBasedRule request. You can also use this value to query the status of the request. For more information, see GetChangeTokenStatus.
    RateBasedRule:
      description: "This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. A RateBasedRule is identical to a regular Rule, with one addition: a RateBasedRule counts the number of requests that arrive from a specified IP address every five minutes. For example, based on recent requests that you've seen from an attacker, you might create a RateBasedRule that includes the following conditions: The requests come from 192.0.2.44. They contain the value BadBot in the User-Agent header. In the rule, you also define the rate limit as 1,000. Requests that meet both of these conditions and exceed 1,000 requests every five minutes trigger the rule's action (block or count), which is defined in the web ACL."
      type: object
      properties:
        RuleId:
          $ref: "#/components/schemas/ResourceId"
          description: A unique identifier for a RateBasedRule. You use RuleId to get more information about a RateBasedRule (see GetRateBasedRule), update a RateBasedRule (see UpdateRateBasedRule), insert a RateBasedRule into a WebACL or delete one from a WebACL (see UpdateWebACL), or delete a RateBasedRule from AWS WAF (see DeleteRateBasedRule).
        Name:
          $ref: "#/components/schemas/ResourceName"
          description: A friendly name or description for a RateBasedRule. You can't change the name of a RateBasedRule after you create it.
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: A friendly name or description for the metrics for a RateBasedRule. The name can contain only alphanumeric characters (A-Z, a-z, 0-9), with maximum length 128 and minimum length one. It can't contain whitespace or metric names reserved for AWS WAF, including "All" and "Default_Action." You can't change the name of the metric after you create the RateBasedRule.
        MatchPredicates:
          $ref: "#/components/schemas/Predicates"
          description: The Predicates object contains one Predicate element for each ByteMatchSet, IPSet, or SqlInjectionMatchSet object that you want to include in a RateBasedRule.
        RateKey:
          $ref: "#/components/schemas/RateKey"
          description: The field that AWS WAF uses to determine if requests are likely arriving from single source and thus subject to rate monitoring. The only valid value for RateKey is IP. IP indicates that requests arriving from the same IP address are subject to the RateLimit that is specified in the RateBasedRule.
        RateLimit:
          $ref: "#/components/schemas/RateLimit"
          description: The maximum number of requests, which have an identical value in the field specified by the RateKey, allowed in a five-minute period. If the number of requests exceeds the RateLimit and the other predicates specified in the rule are also met, AWS WAF triggers the action that is specified for this rule.
      required:
        - RuleId
        - MatchPredicates
        - RateKey
        - RateLimit
    Predicates:
      type: array
      items:
        $ref: "#/components/schemas/Predicate"
    Predicate:
      description: This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. Specifies the ByteMatchSet, IPSet, SqlInjectionMatchSet, XssMatchSet, RegexMatchSet, GeoMatchSet, and SizeConstraintSet objects that you want to add to a Rule and, for each object, indicates whether you want to negate the settings, for example, requests that do NOT originate from the IP address 192.0.2.44.
      type: object
      properties:
        Negated:
          $ref: "#/components/schemas/Negated"
          description: Set Negated to False if you want AWS WAF to allow, block, or count requests based on the settings in the specified ByteMatchSet, IPSet, SqlInjectionMatchSet, XssMatchSet, RegexMatchSet, GeoMatchSet, or SizeConstraintSet. For example, if an IPSet includes the IP address 192.0.2.44, AWS WAF will allow or block requests based on that IP address. Set Negated to True if you want AWS WAF to allow or block a request based on the negation of the settings in the ByteMatchSet, IPSet, SqlInjectionMatchSet, XssMatchSet, RegexMatchSet, GeoMatchSet, or SizeConstraintSet. For example, if an IPSet includes the IP address 192.0.2.44, AWS WAF will allow, block, or count requests based on all IP addresses except 192.0.2.44.
        Type:
          $ref: "#/components/schemas/PredicateType"
          description: The type of predicate in a Rule, such as ByteMatch or IPSet.
        DataId:
          $ref: "#/components/schemas/ResourceId"
          description: A unique identifier for a predicate in a Rule, such as ByteMatchSetId or IPSetId. The ID is returned by the corresponding Create or List command.
      required:
        - Negated
        - Type
        - DataId
    Negated:
      type: boolean
    PredicateType:
      type: string
      enum:
        - IPMatch
        - ByteMatch
        - SqlInjectionMatch
        - GeoMatch
        - SizeConstraint
        - XssMatch
        - RegexMatch
    CreateRegexMatchSetResponse:
      type: object
      properties:
        RegexMatchSet:
          $ref: "#/components/schemas/RegexMatchSet"
          description: A RegexMatchSet that contains no RegexMatchTuple objects.
        ChangeToken:
          $ref: "#/components/schemas/ChangeToken"
          description: The ChangeToken that you used to submit the CreateRegexMatchSet request. You can also use this value to query the status of the request. For more information, see GetChangeTokenStatus.
    RegexMatchSet:
      description: This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. In a GetRegexMatchSet request, RegexMatchSet is a complex type that contains the RegexMatchSetId and Name of a RegexMatchSet, and the values that you specified when you updated the RegexMatchSet. The values are contained in a RegexMatchTuple object, which specify the parts of web requests that you want AWS WAF to inspect and the values that you want AWS WAF to search for. If a RegexMatchSet contains more than one RegexMatchTuple object, a request needs to match the settings in only one ByteMatchTuple to be considered a match.
      type: object
      properties:
        RegexMatchSetId:
          $ref: "#/components/schemas/ResourceId"
          description: The RegexMatchSetId for a RegexMatchSet. You use RegexMatchSetId to get information about a RegexMatchSet (see GetRegexMatchSet), update a RegexMatchSet (see UpdateRegexMatchSet), insert a RegexMatchSet into a Rule or delete one from a Rule (see UpdateRule), and delete a RegexMatchSet from AWS WAF (see DeleteRegexMatchSet). RegexMatchSetId is returned by CreateRegexMatchSet and by ListRegexMatchSets.
        Name:
          $ref: "#/components/schemas/ResourceName"
          description: A friendly name or description of the RegexMatchSet. You can't change Name after you create a RegexMatchSet.
        RegexMatchTuples:
          $ref: "#/components/schemas/RegexMatchTuples"
          description: "Contains an array of RegexMatchTuple objects. Each RegexMatchTuple object contains: The part of a web request that you want AWS WAF to inspect, such as a query string or the value of the User-Agent header. The identifier of the pattern (a regular expression) that you want AWS WAF to look for. For more information, see RegexPatternSet. Whether to perform any conversions on the request, such as converting it to lowercase, before inspecting it for the specified string."
    RegexMatchTuples:
      type: array
      items:
        $ref: "#/components/schemas/RegexMatchTuple"
    RegexMatchTuple:
      description: "This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. The regular expression pattern that you want AWS WAF to search for in web requests, the location in requests that you want AWS WAF to search, and other settings. Each RegexMatchTuple object contains: The part of a web request that you want AWS WAF to inspect, such as a query string or the value of the User-Agent header. The identifier of the pattern (a regular expression) that you want AWS WAF to look for. For more information, see RegexPatternSet. Whether to perform any conversions on the request, such as converting it to lowercase, before inspecting it for the specified string."
      type: object
      properties:
        FieldToMatch:
          $ref: "#/components/schemas/FieldToMatch"
          description: Specifies where in a web request to look for the RegexPatternSet.
        TextTransformation:
          $ref: "#/components/schemas/TextTransformation"
          description: "Text transformations eliminate some of the unusual formatting that attackers use in web requests in an effort to bypass AWS WAF. If you specify a transformation, AWS WAF performs the transformation on RegexPatternSet before inspecting a request for a match. You can only specify a single type of TextTransformation. CMD_LINE When you're concerned that attackers are injecting an operating system commandline command and using unusual formatting to disguise some or all of the command, use this option to perform the following transformations: Delete the following characters: \\ \" ' ^ Delete spaces before the following characters: / ( Replace the following characters with a space: , ; Replace multiple spaces with one space Convert uppercase letters (A-Z) to lowercase (a-z) COMPRESS_WHITE_SPACE Use this option to replace the following characters with a space character (decimal 32): \\f, formfeed, decimal 12 \\t, tab, decimal 9 \\n, newline, decimal 10 \\r, carriage return, decimal 13 \\v, vertical tab, decimal 11 non-breaking space, decimal 160 COMPRESS_WHITE_SPACE also replaces multiple spaces with one space. HTML_ENTITY_DECODE Use this option to replace HTML-encoded characters with unencoded characters. HTML_ENTITY_DECODE performs the following operations: Replaces (ampersand)quot; with \" Replaces (ampersand)nbsp; with a non-breaking space, decimal 160 Replaces (ampersand)lt; with a \"less than\" symbol Replaces (ampersand)gt; with > Replaces characters that are represented in hexadecimal format, (ampersand)#xhhhh;, with the corresponding characters Replaces characters that are represented in decimal format, (ampersand)#nnnn;, with the corresponding characters LOWERCASE Use this option to convert uppercase letters (A-Z) to lowercase (a-z). URL_DECODE Use this option to decode a URL-encoded value. NONE Specify NONE if you don't want to perform any text transformations."
        RegexPatternSetId:
          $ref: "#/components/schemas/ResourceId"
          description: The RegexPatternSetId for a RegexPatternSet. You use RegexPatternSetId to get information about a RegexPatternSet (see GetRegexPatternSet), update a RegexPatternSet (see UpdateRegexPatternSet), insert a RegexPatternSet into a RegexMatchSet or delete one from a RegexMatchSet (see UpdateRegexMatchSet), and delete an RegexPatternSet from AWS WAF (see DeleteRegexPatternSet). RegexPatternSetId is returned by CreateRegexPatternSet and by ListRegexPatternSets.
      required:
        - FieldToMatch
        - TextTransformation
        - RegexPatternSetId
    CreateRegexPatternSetResponse:
      type: object
      properties:
        RegexPatternSet:
          $ref: "#/components/schemas/RegexPatternSet"
          description: A RegexPatternSet that contains no objects.
        ChangeToken:
          $ref: "#/components/schemas/ChangeToken"
          description: The ChangeToken that you used to submit the CreateRegexPatternSet request. You can also use this value to query the status of the request. For more information, see GetChangeTokenStatus.
    RegexPatternSet:
      description: This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. The RegexPatternSet specifies the regular expression (regex) pattern that you want AWS WAF to search for, such as B[a@]dB[o0]t. You can then configure AWS WAF to reject those requests.
      type: object
      properties:
        RegexPatternSetId:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier for the RegexPatternSet. You use RegexPatternSetId to get information about a RegexPatternSet, update a RegexPatternSet, remove a RegexPatternSet from a RegexMatchSet, and delete a RegexPatternSet from AWS WAF. RegexMatchSetId is returned by CreateRegexPatternSet and by ListRegexPatternSets.
        Name:
          $ref: "#/components/schemas/ResourceName"
          description: A friendly name or description of the RegexPatternSet. You can't change Name after you create a RegexPatternSet.
        RegexPatternStrings:
          $ref: "#/components/schemas/RegexPatternStrings"
          description: Specifies the regular expression (regex) patterns that you want AWS WAF to search for, such as B[a@]dB[o0]t.
      required:
        - RegexPatternSetId
        - RegexPatternStrings
    RegexPatternStrings:
      type: array
      items:
        $ref: "#/components/schemas/RegexPatternString"
    RegexPatternString:
      type: string
      minLength: 1
      maxLength: 512
      pattern: .*
    CreateRuleResponse:
      type: object
      properties:
        Rule:
          $ref: "#/components/schemas/Rule"
          description: The Rule returned in the CreateRule response.
        ChangeToken:
          $ref: "#/components/schemas/ChangeToken"
          description: The ChangeToken that you used to submit the CreateRule request. You can also use this value to query the status of the request. For more information, see GetChangeTokenStatus.
    Rule:
      description: "This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. A combination of ByteMatchSet, IPSet, and/or SqlInjectionMatchSet objects that identify the web requests that you want to allow, block, or count. For example, you might create a Rule that includes the following predicates: An IPSet that causes AWS WAF to search for web requests that originate from the IP address 192.0.2.44 A ByteMatchSet that causes AWS WAF to search for web requests for which the value of the User-Agent header is BadBot. To match the settings in this Rule, a request must originate from 192.0.2.44 AND include a User-Agent header for which the value is BadBot."
      type: object
      properties:
        RuleId:
          $ref: "#/components/schemas/ResourceId"
          description: A unique identifier for a Rule. You use RuleId to get more information about a Rule (see GetRule), update a Rule (see UpdateRule), insert a Rule into a WebACL or delete a one from a WebACL (see UpdateWebACL), or delete a Rule from AWS WAF (see DeleteRule). RuleId is returned by CreateRule and by ListRules.
        Name:
          $ref: "#/components/schemas/ResourceName"
          description: The friendly name or description for the Rule. You can't change the name of a Rule after you create it.
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: A friendly name or description for the metrics for this Rule. The name can contain only alphanumeric characters (A-Z, a-z, 0-9), with maximum length 128 and minimum length one. It can't contain whitespace or metric names reserved for AWS WAF, including "All" and "Default_Action." You can't change MetricName after you create the Rule.
        Predicates:
          $ref: "#/components/schemas/Predicates"
          description: The Predicates object contains one Predicate element for each ByteMatchSet, IPSet, or SqlInjectionMatchSet object that you want to include in a Rule.
      required:
        - RuleId
        - Predicates
    CreateRuleGroupResponse:
      type: object
      properties:
        RuleGroup:
          $ref: "#/components/schemas/RuleGroup"
          description: An empty RuleGroup.
        ChangeToken:
          $ref: "#/components/schemas/ChangeToken"
          description: The ChangeToken that you used to submit the CreateRuleGroup request. You can also use this value to query the status of the request. For more information, see GetChangeTokenStatus.
    RuleGroup:
      description: "This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. A collection of predefined rules that you can add to a web ACL. Rule groups are subject to the following limits: Three rule groups per account. You can request an increase to this limit by contacting customer support. One rule group per web ACL. Ten rules per rule group."
      type: object
      properties:
        RuleGroupId:
          $ref: "#/components/schemas/ResourceId"
          description: A unique identifier for a RuleGroup. You use RuleGroupId to get more information about a RuleGroup (see GetRuleGroup), update a RuleGroup (see UpdateRuleGroup), insert a RuleGroup into a WebACL or delete a one from a WebACL (see UpdateWebACL), or delete a RuleGroup from AWS WAF (see DeleteRuleGroup). RuleGroupId is returned by CreateRuleGroup and by ListRuleGroups.
        Name:
          $ref: "#/components/schemas/ResourceName"
          description: The friendly name or description for the RuleGroup. You can't change the name of a RuleGroup after you create it.
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: A friendly name or description for the metrics for this RuleGroup. The name can contain only alphanumeric characters (A-Z, a-z, 0-9), with maximum length 128 and minimum length one. It can't contain whitespace or metric names reserved for AWS WAF, including "All" and "Default_Action." You can't change the name of the metric after you create the RuleGroup.
      required:
        - RuleGroupId
    CreateSizeConstraintSetResponse:
      type: object
      properties:
        SizeConstraintSet:
          $ref: "#/components/schemas/SizeConstraintSet"
          description: A SizeConstraintSet that contains no SizeConstraint objects.
        ChangeToken:
          $ref: "#/components/schemas/ChangeToken"
          description: The ChangeToken that you used to submit the CreateSizeConstraintSet request. You can also use this value to query the status of the request. For more information, see GetChangeTokenStatus.
    SizeConstraintSet:
      description: This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. A complex type that contains SizeConstraint objects, which specify the parts of web requests that you want AWS WAF to inspect the size of. If a SizeConstraintSet contains more than one SizeConstraint object, a request only needs to match one constraint to be considered a match.
      type: object
      properties:
        SizeConstraintSetId:
          $ref: "#/components/schemas/ResourceId"
          description: A unique identifier for a SizeConstraintSet. You use SizeConstraintSetId to get information about a SizeConstraintSet (see GetSizeConstraintSet), update a SizeConstraintSet (see UpdateSizeConstraintSet), insert a SizeConstraintSet into a Rule or delete one from a Rule (see UpdateRule), and delete a SizeConstraintSet from AWS WAF (see DeleteSizeConstraintSet). SizeConstraintSetId is returned by CreateSizeConstraintSet and by ListSizeConstraintSets.
        Name:
          $ref: "#/components/schemas/ResourceName"
          description: The name, if any, of the SizeConstraintSet.
        SizeConstraints:
          $ref: "#/components/schemas/SizeConstraints"
          description: Specifies the parts of web requests that you want to inspect the size of.
      required:
        - SizeConstraintSetId
        - SizeConstraints
    SizeConstraints:
      type: array
      items:
        $ref: "#/components/schemas/SizeConstraint"
    SizeConstraint:
      description: This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. Specifies a constraint on the size of a part of the web request. AWS WAF uses the Size, ComparisonOperator, and FieldToMatch to build an expression in the form of "Size ComparisonOperator size in bytes of FieldToMatch". If that expression is true, the SizeConstraint is considered to match.
      type: object
      properties:
        FieldToMatch:
          $ref: "#/components/schemas/FieldToMatch"
          description: Specifies where in a web request to look for the size constraint.
        TextTransformation:
          $ref: "#/components/schemas/TextTransformation"
          description: "Text transformations eliminate some of the unusual formatting that attackers use in web requests in an effort to bypass AWS WAF. If you specify a transformation, AWS WAF performs the transformation on FieldToMatch before inspecting it for a match. You can only specify a single type of TextTransformation. Note that if you choose BODY for the value of Type, you must choose NONE for TextTransformation because CloudFront forwards only the first 8192 bytes for inspection. NONE Specify NONE if you don't want to perform any text transformations. CMD_LINE When you're concerned that attackers are injecting an operating system command line command and using unusual formatting to disguise some or all of the command, use this option to perform the following transformations: Delete the following characters: \\ \" ' ^ Delete spaces before the following characters: / ( Replace the following characters with a space: , ; Replace multiple spaces with one space Convert uppercase letters (A-Z) to lowercase (a-z) COMPRESS_WHITE_SPACE Use this option to replace the following characters with a space character (decimal 32): \\f, formfeed, decimal 12 \\t, tab, decimal 9 \\n, newline, decimal 10 \\r, carriage return, decimal 13 \\v, vertical tab, decimal 11 non-breaking space, decimal 160 COMPRESS_WHITE_SPACE also replaces multiple spaces with one space. HTML_ENTITY_DECODE Use this option to replace HTML-encoded characters with unencoded characters. HTML_ENTITY_DECODE performs the following operations: Replaces (ampersand)quot; with \" Replaces (ampersand)nbsp; with a non-breaking space, decimal 160 Replaces (ampersand)lt; with a \"less than\" symbol Replaces (ampersand)gt; with > Replaces characters that are represented in hexadecimal format, (ampersand)#xhhhh;, with the corresponding characters Replaces characters that are represented in decimal format, (ampersand)#nnnn;, with the corresponding characters LOWERCASE Use this option to convert uppercase letters (A-Z) to lowercase (a-z). URL_DECODE Use this option to decode a URL-encoded value."
        ComparisonOperator:
          $ref: "#/components/schemas/ComparisonOperator"
          description: 'The type of comparison you want AWS WAF to perform. AWS WAF uses this in combination with the provided Size and FieldToMatch to build an expression in the form of "Size ComparisonOperator size in bytes of FieldToMatch". If that expression is true, the SizeConstraint is considered to match. EQ: Used to test if the Size is equal to the size of the FieldToMatch NE: Used to test if the Size is not equal to the size of the FieldToMatch LE: Used to test if the Size is less than or equal to the size of the FieldToMatch LT: Used to test if the Size is strictly less than the size of the FieldToMatch GE: Used to test if the Size is greater than or equal to the size of the FieldToMatch GT: Used to test if the Size is strictly greater than the size of the FieldToMatch'
        Size:
          $ref: "#/components/schemas/Size"
          description: The size in bytes that you want AWS WAF to compare against the size of the specified FieldToMatch. AWS WAF uses this in combination with ComparisonOperator and FieldToMatch to build an expression in the form of "Size ComparisonOperator size in bytes of FieldToMatch". If that expression is true, the SizeConstraint is considered to match. Valid values for size are 0 - 21474836480 bytes (0 - 20 GB). If you specify URI for the value of Type, the / in the URI counts as one character. For example, the URI /logo.jpg is nine characters long.
      required:
        - FieldToMatch
        - TextTransformation
        - ComparisonOperator
        - Size
    ComparisonOperator:
      type: string
      enum:
        - EQ
        - NE
        - LE
        - LT
        - GE
        - GT
    Size:
      type: integer
      format: int64
      minimum: 0
      maximum: 21474836480
    CreateSqlInjectionMatchSetResponse:
      description: The response to a CreateSqlInjectionMatchSet request.
      type: object
      properties:
        SqlInjectionMatchSet:
          $ref: "#/components/schemas/SqlInjectionMatchSet"
          description: A SqlInjectionMatchSet.
        ChangeToken:
          $ref: "#/components/schemas/ChangeToken"
          description: The ChangeToken that you used to submit the CreateSqlInjectionMatchSet request. You can also use this value to query the status of the request. For more information, see GetChangeTokenStatus.
    SqlInjectionMatchSet:
      description: This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. A complex type that contains SqlInjectionMatchTuple objects, which specify the parts of web requests that you want AWS WAF to inspect for snippets of malicious SQL code and, if you want AWS WAF to inspect a header, the name of the header. If a SqlInjectionMatchSet contains more than one SqlInjectionMatchTuple object, a request needs to include snippets of SQL code in only one of the specified parts of the request to be considered a match.
      type: object
      properties:
        SqlInjectionMatchSetId:
          $ref: "#/components/schemas/ResourceId"
          description: A unique identifier for a SqlInjectionMatchSet. You use SqlInjectionMatchSetId to get information about a SqlInjectionMatchSet (see GetSqlInjectionMatchSet), update a SqlInjectionMatchSet (see UpdateSqlInjectionMatchSet), insert a SqlInjectionMatchSet into a Rule or delete one from a Rule (see UpdateRule), and delete a SqlInjectionMatchSet from AWS WAF (see DeleteSqlInjectionMatchSet). SqlInjectionMatchSetId is returned by CreateSqlInjectionMatchSet and by ListSqlInjectionMatchSets.
        Name:
          $ref: "#/components/schemas/ResourceName"
          description: The name, if any, of the SqlInjectionMatchSet.
        SqlInjectionMatchTuples:
          $ref: "#/components/schemas/SqlInjectionMatchTuples"
          description: Specifies the parts of web requests that you want to inspect for snippets of malicious SQL code.
      required:
        - SqlInjectionMatchSetId
        - SqlInjectionMatchTuples
    SqlInjectionMatchTuples:
      type: array
      items:
        $ref: "#/components/schemas/SqlInjectionMatchTuple"
    SqlInjectionMatchTuple:
      description: This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. Specifies the part of a web request that you want AWS WAF to inspect for snippets of malicious SQL code and, if you want AWS WAF to inspect a header, the name of the header.
      type: object
      properties:
        FieldToMatch:
          $ref: "#/components/schemas/FieldToMatch"
          description: Specifies where in a web request to look for snippets of malicious SQL code.
        TextTransformation:
          $ref: "#/components/schemas/TextTransformation"
          description: "Text transformations eliminate some of the unusual formatting that attackers use in web requests in an effort to bypass AWS WAF. If you specify a transformation, AWS WAF performs the transformation on FieldToMatch before inspecting it for a match. You can only specify a single type of TextTransformation. CMD_LINE When you're concerned that attackers are injecting an operating system command line command and using unusual formatting to disguise some or all of the command, use this option to perform the following transformations: Delete the following characters: \\ \" ' ^ Delete spaces before the following characters: / ( Replace the following characters with a space: , ; Replace multiple spaces with one space Convert uppercase letters (A-Z) to lowercase (a-z) COMPRESS_WHITE_SPACE Use this option to replace the following characters with a space character (decimal 32): \\f, formfeed, decimal 12 \\t, tab, decimal 9 \\n, newline, decimal 10 \\r, carriage return, decimal 13 \\v, vertical tab, decimal 11 non-breaking space, decimal 160 COMPRESS_WHITE_SPACE also replaces multiple spaces with one space. HTML_ENTITY_DECODE Use this option to replace HTML-encoded characters with unencoded characters. HTML_ENTITY_DECODE performs the following operations: Replaces (ampersand)quot; with \" Replaces (ampersand)nbsp; with a non-breaking space, decimal 160 Replaces (ampersand)lt; with a \"less than\" symbol Replaces (ampersand)gt; with > Replaces characters that are represented in hexadecimal format, (ampersand)#xhhhh;, with the corresponding characters Replaces characters that are represented in decimal format, (ampersand)#nnnn;, with the corresponding characters LOWERCASE Use this option to convert uppercase letters (A-Z) to lowercase (a-z). URL_DECODE Use this option to decode a URL-encoded value. NONE Specify NONE if you don't want to perform any text transformations."
      required:
        - FieldToMatch
        - TextTransformation
    WafAction:
      description: This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. For the action that is associated with a rule in a WebACL, specifies the action that you want AWS WAF to perform when a web request matches all of the conditions in a rule. For the default action in a WebACL, specifies the action that you want AWS WAF to take when a web request doesn't match all of the conditions in any of the rules in a WebACL.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/WafActionType"
          description: "Specifies how you want AWS WAF to respond to requests that match the settings in a Rule. Valid settings include the following: ALLOW: AWS WAF allows requests BLOCK: AWS WAF blocks requests COUNT: AWS WAF increments a counter of the requests that match all of the conditions in the rule. AWS WAF then continues to inspect the web request based on the remaining rules in the web ACL. You can't specify COUNT for the default action for a WebACL."
      required:
        - Type
    WafActionType:
      type: string
      enum:
        - BLOCK
        - ALLOW
        - COUNT
    CreateWebACLResponse:
      type: object
      properties:
        WebACL:
          $ref: "#/components/schemas/WebACL"
          description: The WebACL returned in the CreateWebACL response.
        ChangeToken:
          $ref: "#/components/schemas/ChangeToken"
          description: The ChangeToken that you used to submit the CreateWebACL request. You can also use this value to query the status of the request. For more information, see GetChangeTokenStatus.
    WebACL:
      description: This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. Contains the Rules that identify the requests that you want to allow, block, or count. In a WebACL, you also specify a default action (ALLOW or BLOCK), and the action for each Rule that you add to a WebACL, for example, block requests from specified IP addresses or block requests from specified referrers. You also associate the WebACL with a CloudFront distribution to identify the requests that you want AWS WAF to filter. If you add more than one Rule to a WebACL, a request needs to match only one of the specifications to be allowed, blocked, or counted. For more information, see UpdateWebACL.
      type: object
      properties:
        WebACLId:
          $ref: "#/components/schemas/ResourceId"
          description: A unique identifier for a WebACL. You use WebACLId to get information about a WebACL (see GetWebACL), update a WebACL (see UpdateWebACL), and delete a WebACL from AWS WAF (see DeleteWebACL). WebACLId is returned by CreateWebACL and by ListWebACLs.
        Name:
          $ref: "#/components/schemas/ResourceName"
          description: A friendly name or description of the WebACL. You can't change the name of a WebACL after you create it.
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: A friendly name or description for the metrics for this WebACL. The name can contain only alphanumeric characters (A-Z, a-z, 0-9), with maximum length 128 and minimum length one. It can't contain whitespace or metric names reserved for AWS WAF, including "All" and "Default_Action." You can't change MetricName after you create the WebACL.
        DefaultAction:
          $ref: "#/components/schemas/WafAction"
          description: The action to perform if none of the Rules contained in the WebACL match. The action is specified by the WafAction object.
        Rules:
          $ref: "#/components/schemas/ActivatedRules"
          description: An array that contains the action for each Rule in a WebACL, the priority of the Rule, and the ID of the Rule.
        WebACLArn:
          $ref: "#/components/schemas/ResourceArn"
          description: Tha Amazon Resource Name (ARN) of the web ACL.
      required:
        - WebACLId
        - DefaultAction
        - Rules
    ActivatedRules:
      type: array
      items:
        $ref: "#/components/schemas/ActivatedRule"
    ActivatedRule:
      description: This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. The ActivatedRule object in an UpdateWebACL request specifies a Rule that you want to insert or delete, the priority of the Rule in the WebACL, and the action that you want AWS WAF to take when a web request matches the Rule (ALLOW, BLOCK, or COUNT). To specify whether to insert or delete a Rule, use the Action parameter in the WebACLUpdate data type.
      type: object
      properties:
        Priority:
          $ref: "#/components/schemas/RulePriority"
          description: Specifies the order in which the Rules in a WebACL are evaluated. Rules with a lower value for Priority are evaluated before Rules with a higher value. The value must be a unique integer. If you add multiple Rules to a WebACL, the values don't need to be consecutive.
        RuleId:
          $ref: "#/components/schemas/ResourceId"
          description: The RuleId for a Rule. You use RuleId to get more information about a Rule (see GetRule), update a Rule (see UpdateRule), insert a Rule into a WebACL or delete a one from a WebACL (see UpdateWebACL), or delete a Rule from AWS WAF (see DeleteRule). RuleId is returned by CreateRule and by ListRules.
        Action:
          $ref: "#/components/schemas/WafAction"
          description: "Specifies the action that CloudFront or AWS WAF takes when a web request matches the conditions in the Rule. Valid values for Action include the following: ALLOW: CloudFront responds with the requested object. BLOCK: CloudFront responds with an HTTP 403 (Forbidden) status code. COUNT: AWS WAF increments a counter of requests that match the conditions in the rule and then continues to inspect the web request based on the remaining rules in the web ACL. ActivatedRule|OverrideAction applies only when updating or adding a RuleGroup to a WebACL. In this case, you do not use ActivatedRule|Action. For all other update requests, ActivatedRule|Action is used instead of ActivatedRule|OverrideAction."
        OverrideAction:
          $ref: "#/components/schemas/WafOverrideAction"
          description: Use the OverrideAction to test your RuleGroup. Any rule in a RuleGroup can potentially block a request. If you set the OverrideAction to None, the RuleGroup will block a request if any individual rule in the RuleGroup matches the request and is configured to block that request. However if you first want to test the RuleGroup, set the OverrideAction to Count. The RuleGroup will then override any block action specified by individual rules contained within the group. Instead of blocking matching requests, those requests will be counted. You can view a record of counted requests using GetSampledRequests. ActivatedRule|OverrideAction applies only when updating or adding a RuleGroup to a WebACL. In this case you do not use ActivatedRule|Action. For all other update requests, ActivatedRule|Action is used instead of ActivatedRule|OverrideAction.
        Type:
          $ref: "#/components/schemas/WafRuleType"
          description: The rule type, either REGULAR, as defined by Rule, RATE_BASED, as defined by RateBasedRule, or GROUP, as defined by RuleGroup. The default is REGULAR. Although this field is optional, be aware that if you try to add a RATE_BASED rule to a web ACL without setting the type, the UpdateWebACL request will fail because the request tries to add a REGULAR rule with the specified ID, which does not exist.
        ExcludedRules:
          $ref: "#/components/schemas/ExcludedRules"
          description: "An array of rules to exclude from a rule group. This is applicable only when the ActivatedRule refers to a RuleGroup. Sometimes it is necessary to troubleshoot rule groups that are blocking traffic unexpectedly (false positives). One troubleshooting technique is to identify the specific rule within the rule group that is blocking the legitimate traffic and then disable (exclude) that particular rule. You can exclude rules from both your own rule groups and AWS Marketplace rule groups that have been associated with a web ACL. Specifying ExcludedRules does not remove those rules from the rule group. Rather, it changes the action for the rules to COUNT. Therefore, requests that match an ExcludedRule are counted but not blocked. The RuleGroup owner will receive COUNT metrics for each ExcludedRule. If you want to exclude rules from a rule group that is already associated with a web ACL, perform the following steps: Use the AWS WAF logs to identify the IDs of the rules that you want to exclude. For more information about the logs, see Logging Web ACL Traffic Information. Submit an UpdateWebACL request that has two actions: The first action deletes the existing rule group from the web ACL. That is, in the UpdateWebACL request, the first Updates:Action should be DELETE and Updates:ActivatedRule:RuleId should be the rule group that contains the rules that you want to exclude. The second action inserts the same rule group back in, but specifying the rules to exclude. That is, the second Updates:Action should be INSERT, Updates:ActivatedRule:RuleId should be the rule group that you just removed, and ExcludedRules should contain the rules that you want to exclude."
      required:
        - Priority
        - RuleId
    RulePriority:
      type: integer
    WafOverrideAction:
      description: This is AWS WAF Classic documentation. For more information, see AWS WAF Classic in the developer guide. For the latest version of AWS WAF, use the AWS WAFV2 API and see the AWS WAF Developer Guide. With the latest version, AWS WAF has a single set of endpoints for regional and global use. The action to take if any rule within the RuleGroup matches a request.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/WafOverrideActionType"
          description: COUNT overrides the action specified by the individual rule within a RuleGroup . If set to NONE, the rule's action will take place.
      required:
        - Type
    WafOverrideActionType:
      type: string
      enum:
        - NONE
        - COUNT
    WafRuleType:
      type: string
      enum:
        - REGULAR
        - RATE_BASED
        - GROUP
    ExcludedRules:
      type: array
      items:
        $ref: "#/components/schemas/ExcludedRule"
    ExcludedRule:
