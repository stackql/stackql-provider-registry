        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The resource type retained by the retention rule.
        RetentionPeriod:
          $ref: "#/components/schemas/RetentionPeriod"
          description: Information about the retention period for which the retention rule is to retain resources.
        ResourceTags:
          $ref: "#/components/schemas/ResourceTags"
          description: "[Tag-level retention rules only] Information about the resource tags used to identify resources that are retained by the retention rule."
        Status:
          $ref: "#/components/schemas/RuleStatus"
          description: The state of the retention rule. Only retention rules that are in the available state retain resources.
        LockConfiguration:
          $ref: "#/components/schemas/LockConfiguration"
          description: Information about the retention rule lock configuration.
        LockState:
          $ref: "#/components/schemas/LockState"
          description: "[Region-level retention rules only] The lock state for the retention rule. locked - The retention rule is locked and can't be modified or deleted. pending_unlock - The retention rule has been unlocked but it is still within the unlock delay period. The retention rule can be modified or deleted only after the unlock delay period has expired. unlocked - The retention rule is unlocked and it can be modified or deleted by any user with the required permissions. null - The retention rule has never been locked. Once a retention rule has been locked, it can transition between the locked and unlocked states only; it can never transition back to null."
        LockEndTime:
          $ref: "#/components/schemas/TimeStamp"
          description: The date and time at which the unlock delay is set to expire. Only returned for retention rules that have been unlocked and that are still within the unlock delay period.
        RuleArn:
          $ref: "#/components/schemas/RuleArn"
          description: The Amazon Resource Name (ARN) of the retention rule.
        ExcludeResourceTags:
          $ref: "#/components/schemas/ExcludeResourceTags"
          description: "[Region-level retention rules only] Information about the exclusion tags used to identify resources that are to be excluded, or ignored, by the retention rule."
    TimeStamp:
      type: string
      format: date-time
    MaxResults:
      type: integer
      minimum: 1
      maximum: 1000
    NextToken:
      type: string
      pattern: ^[A-Za-z0-9+/=]{1,2048}$
    ListRulesResponse:
      type: object
      properties:
        Rules:
          $ref: "#/components/schemas/RuleSummaryList"
          description: Information about the retention rules.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token to use to retrieve the next page of results. This value is null when there are no more results to return.
    RuleSummaryList:
      type: array
