                  description: An array of ProjectSource objects that override the secondary sources defined in the batch build project.
                secondarySourcesVersionOverride:
                  $ref: "#/components/schemas/ProjectSecondarySourceVersions"
                  description: An array of ProjectSourceVersion objects that override the secondary source versions in the batch build project.
                sourceVersion:
                  $ref: "#/components/schemas/String"
                  description: "The version of the batch build input to be built, for this build only. If not specified, the latest version is used. If specified, the contents depends on the source provider: CodeCommit The commit ID, branch, or Git tag to use. GitHub The commit ID, pull request ID, branch name, or tag name that corresponds to the version of the source code you want to build. If a pull request ID is specified, it must use the format pr/pull-request-ID (for example pr/25). If a branch name is specified, the branch's HEAD commit ID is used. If not specified, the default branch's HEAD commit ID is used. Bitbucket The commit ID, branch name, or tag name that corresponds to the version of the source code you want to build. If a branch name is specified, the branch's HEAD commit ID is used. If not specified, the default branch's HEAD commit ID is used. Amazon S3 The version ID of the object that represents the build input ZIP file to use. If sourceVersion is specified at the project level, then this sourceVersion (at the build level) takes precedence. For more information, see Source Version Sample with CodeBuild in the CodeBuild User Guide."
                artifactsOverride:
                  $ref: "#/components/schemas/ProjectArtifacts"
                  description: An array of ProjectArtifacts objects that contains information about the build output artifact overrides for the build project.
                secondaryArtifactsOverride:
                  $ref: "#/components/schemas/ProjectArtifactsList"
                  description: An array of ProjectArtifacts objects that override the secondary artifacts defined in the batch build project.
                environmentVariablesOverride:
                  $ref: "#/components/schemas/EnvironmentVariables"
                  description: An array of EnvironmentVariable objects that override, or add to, the environment variables defined in the batch build project.
                sourceTypeOverride:
                  $ref: "#/components/schemas/SourceType"
                  description: The source input type that overrides the source input defined in the batch build project.
                sourceLocationOverride:
                  $ref: "#/components/schemas/String"
                  description: A location that overrides, for this batch build, the source location defined in the batch build project.
                sourceAuthOverride:
                  $ref: "#/components/schemas/SourceAuth"
                  description: A SourceAuth object that overrides the one defined in the batch build project. This override applies only if the build project's source is BitBucket or GitHub.
                gitCloneDepthOverride:
                  $ref: "#/components/schemas/GitCloneDepth"
                  description: The user-defined depth of history, with a minimum value of 0, that overrides, for this batch build only, any previous depth of history defined in the batch build project.
                gitSubmodulesConfigOverride:
                  $ref: "#/components/schemas/GitSubmodulesConfig"
                  description: A GitSubmodulesConfig object that overrides the Git submodules configuration for this batch build.
                buildspecOverride:
                  $ref: "#/components/schemas/String"
                  description: A buildspec file declaration that overrides, for this build only, the latest one already defined in the build project. If this value is set, it can be either an inline buildspec definition, the path to an alternate buildspec file relative to the value of the built-in CODEBUILD_SRC_DIR environment variable, or the path to an S3 bucket. The bucket must be in the same Amazon Web Services Region as the build project. Specify the buildspec file using its ARN (for example, arn:aws:s3:::my-codebuild-sample2/buildspec.yml). If this value is not provided or is set to an empty string, the source code must contain a buildspec file in its root directory. For more information, see Buildspec File Name and Storage Location.
                insecureSslOverride:
                  $ref: "#/components/schemas/WrapperBoolean"
                  description: Enable this flag to override the insecure SSL setting that is specified in the batch build project. The insecure SSL setting determines whether to ignore SSL warnings while connecting to the project source code. This override applies only if the build's source is GitHub Enterprise.
                reportBuildBatchStatusOverride:
                  $ref: "#/components/schemas/WrapperBoolean"
                  description: Set to true to report to your source provider the status of a batch build's start and completion. If you use this option with a source provider other than GitHub, GitHub Enterprise, or Bitbucket, an invalidInputException is thrown. The status of a build triggered by a webhook is always reported to your source provider.
                environmentTypeOverride:
                  $ref: "#/components/schemas/EnvironmentType"
                  description: A container type for this batch build that overrides the one specified in the batch build project.
                imageOverride:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: The name of an image for this batch build that overrides the one specified in the batch build project.
                computeTypeOverride:
                  $ref: "#/components/schemas/ComputeType"
                  description: The name of a compute type for this batch build that overrides the one specified in the batch build project.
                certificateOverride:
                  $ref: "#/components/schemas/String"
                  description: The name of a certificate for this batch build that overrides the one specified in the batch build project.
                cacheOverride:
                  $ref: "#/components/schemas/ProjectCache"
                  description: A ProjectCache object that specifies cache overrides.
                serviceRoleOverride:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: The name of a service role for this batch build that overrides the one specified in the batch build project.
                privilegedModeOverride:
                  $ref: "#/components/schemas/WrapperBoolean"
                  description: Enable this flag to override privileged mode in the batch build project.
                buildTimeoutInMinutesOverride:
                  $ref: "#/components/schemas/BuildTimeOut"
                  description: Overrides the build timeout specified in the batch build project.
                queuedTimeoutInMinutesOverride:
                  $ref: "#/components/schemas/TimeOut"
                  description: The number of minutes a batch build is allowed to be queued before it times out.
                encryptionKeyOverride:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: The Key Management Service customer master key (CMK) that overrides the one specified in the batch build project. The CMK key encrypts the build output artifacts. You can use a cross-account KMS key to encrypt the build output artifacts if your service role has permission to that key. You can specify either the Amazon Resource Name (ARN) of the CMK or, if available, the CMK's alias (using the format alias/`<alias-name>`).
                idempotencyToken:
                  $ref: "#/components/schemas/String"
                  description: A unique, case sensitive identifier you provide to ensure the idempotency of the StartBuildBatch request. The token is included in the StartBuildBatch request and is valid for five minutes. If you repeat the StartBuildBatch request with the same token, but change a parameter, CodeBuild returns a parameter mismatch error.
                logsConfigOverride:
                  $ref: "#/components/schemas/LogsConfig"
                  description: A LogsConfig object that override the log settings defined in the batch build project.
                registryCredentialOverride:
                  $ref: "#/components/schemas/RegistryCredential"
                  description: A RegistryCredential object that overrides credentials for access to a private registry.
                imagePullCredentialsTypeOverride:
                  $ref: "#/components/schemas/ImagePullCredentialsType"
                  description: "The type of credentials CodeBuild uses to pull images in your batch build. There are two valid values: CODEBUILD Specifies that CodeBuild uses its own credentials. This requires that you modify your ECR repository policy to trust CodeBuild's service principal. SERVICE_ROLE Specifies that CodeBuild uses your build project's service role. When using a cross-account or private registry image, you must use SERVICE_ROLE credentials. When using an CodeBuild curated image, you must use CODEBUILD credentials."
                buildBatchConfigOverride:
                  $ref: "#/components/schemas/ProjectBuildBatchConfig"
                  description: A BuildBatchConfigOverride object that contains batch build configuration overrides.
                debugSessionEnabled:
                  $ref: "#/components/schemas/WrapperBoolean"
                  description: Specifies if session debugging is enabled for this batch build. For more information, see Viewing a running build in Session Manager. Batch session debugging is not supported for matrix batch builds.
              required:
                - projectName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartBuildBatchOutput"
