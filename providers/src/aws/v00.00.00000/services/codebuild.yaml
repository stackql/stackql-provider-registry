                environment:
                  $ref: "#/components/schemas/ProjectEnvironment"
                  description: Information to be changed about the build environment for the build project.
                serviceRole:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: The replacement ARN of the IAM role that enables CodeBuild to interact with dependent Amazon Web Services services on behalf of the Amazon Web Services account.
                timeoutInMinutes:
                  $ref: "#/components/schemas/BuildTimeOut"
                  description: The replacement value in minutes, from 5 to 2160 (36 hours), for CodeBuild to wait before timing out any related build that did not get marked as completed.
                queuedTimeoutInMinutes:
                  $ref: "#/components/schemas/TimeOut"
                  description: The number of minutes a build is allowed to be queued before it times out.
                encryptionKey:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: The Key Management Service customer master key (CMK) to be used for encrypting the build output artifacts. You can use a cross-account KMS key to encrypt the build output artifacts if your service role has permission to that key. You can specify either the Amazon Resource Name (ARN) of the CMK or, if available, the CMK's alias (using the format alias/`<alias-name>`).
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: An updated list of tag key and value pairs associated with this build project. These tags are available for use by Amazon Web Services services that support CodeBuild build project tags.
                vpcConfig:
                  $ref: "#/components/schemas/VpcConfig"
                  description: VpcConfig enables CodeBuild to access resources in an Amazon VPC.
                badgeEnabled:
                  $ref: "#/components/schemas/WrapperBoolean"
                  description: Set this to true to generate a publicly accessible URL for your project's build badge.
                logsConfig:
                  $ref: "#/components/schemas/LogsConfig"
                  description: Information about logs for the build project. A project can create logs in CloudWatch Logs, logs in an S3 bucket, or both.
                fileSystemLocations:
                  $ref: "#/components/schemas/ProjectFileSystemLocations"
                  description: An array of ProjectFileSystemLocation objects for a CodeBuild build project. A ProjectFileSystemLocation object specifies the identifier, location, mountOptions, mountPoint, and type of a file system created using Amazon Elastic File System.
                buildBatchConfig:
                  $ref: "#/components/schemas/ProjectBuildBatchConfig"
                concurrentBuildLimit:
                  $ref: "#/components/schemas/WrapperInt"
                  description: The maximum number of concurrent builds that are allowed for this project. New builds are only started if the current number of builds is less than or equal to this limit. If the current build count meets this limit, new builds are throttled and are not run. To remove this limit, set this value to -1.
                autoRetryLimit:
                  $ref: "#/components/schemas/WrapperInt"
                  description: The maximum number of additional automatic retries after a failed build. For example, if the auto-retry limit is set to 2, CodeBuild will call the RetryBuild API to automatically retry your build for up to 2 additional times.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProjectOutput"
  /UpdateProjectVisibility:
    post:
      operationId: UpdateProjectVisibility
      description: "Changes the public visibility for a project. The project's build results, logs, and artifacts are available to the general public. For more information, see Public build projects in the CodeBuild User Guide. The following should be kept in mind when making your projects public: All of a project's build results, logs, and artifacts, including builds that were run when the project was private, are available to the general public. All build logs and artifacts are available to the public. Environment variables, source code, and other sensitive information may have been output to the build logs and artifacts. You must be careful about what information is output to the build logs. Some best practice are: Do not store sensitive values in environment variables. We recommend that you use an Amazon EC2 Systems Manager Parameter Store or Secrets Manager to store sensitive values. Follow Best practices for using webhooks in the CodeBuild User Guide to limit which entities can trigger a build, and do not store the buildspec in the project itself, to ensure that your webhooks are as secure as possible. A malicious user can use public builds to distribute malicious artifacts. We recommend that you review all pull requests to verify that the pull request is a legitimate change. We also recommend that you validate any artifacts with their checksums to make sure that the correct artifacts are being downloaded."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeBuild_20161006.UpdateProjectVisibility
            default: CodeBuild_20161006.UpdateProjectVisibility
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                projectArn:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: The Amazon Resource Name (ARN) of the build project.
                projectVisibility:
                  $ref: "#/components/schemas/ProjectVisibilityType"
                resourceAccessRole:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: The ARN of the IAM role that enables CodeBuild to access the CloudWatch Logs and Amazon S3 artifacts for the project's builds.
              required:
                - projectArn
                - projectVisibility
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProjectVisibilityOutput"
  /UpdateReportGroup:
    post:
      operationId: UpdateReportGroup
      description: Updates a report group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeBuild_20161006.UpdateReportGroup
            default: CodeBuild_20161006.UpdateReportGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: The ARN of the report group to update.
                exportConfig:
                  $ref: "#/components/schemas/ReportExportConfig"
                  description: "Used to specify an updated export type. Valid values are: S3: The report results are exported to an S3 bucket. NO_EXPORT: The report results are not exported."
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: An updated list of tag key and value pairs associated with this report group. These tags are available for use by Amazon Web Services services that support CodeBuild report group tags.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateReportGroupOutput"
  /UpdateWebhook:
    post:
      operationId: UpdateWebhook
      description: Updates the webhook associated with an CodeBuild build project. If you use Bitbucket for your repository, rotateSecret is ignored.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeBuild_20161006.UpdateWebhook
            default: CodeBuild_20161006.UpdateWebhook
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                projectName:
                  $ref: "#/components/schemas/ProjectName"
                  description: The name of the CodeBuild project.
                branchFilter:
                  $ref: "#/components/schemas/String"
                  description: A regular expression used to determine which repository branches are built when a webhook is triggered. If the name of a branch matches the regular expression, then it is built. If branchFilter is empty, then all branches are built. It is recommended that you use filterGroups instead of branchFilter.
                rotateSecret:
                  $ref: "#/components/schemas/Boolean"
                  description: A boolean value that specifies whether the associated GitHub repository's secret token should be updated. If you use Bitbucket for your repository, rotateSecret is ignored.
                filterGroups:
                  $ref: "#/components/schemas/FilterGroups"
                  description: An array of arrays of WebhookFilter objects used to determine if a webhook event can trigger a build. A filter group must contain at least one EVENT WebhookFilter.
                buildType:
                  $ref: "#/components/schemas/WebhookBuildType"
                  description: "Specifies the type of build this webhook will trigger. RUNNER_BUILDKITE_BUILD is only available for NO_SOURCE source type projects configured for Buildkite runner builds. For more information about CodeBuild-hosted Buildkite runner builds, see Tutorial: Configure a CodeBuild-hosted Buildkite runner in the CodeBuild user guide."
                pullRequestBuildPolicy:
                  $ref: "#/components/schemas/PullRequestBuildPolicy"
                  description: A PullRequestBuildPolicy object that defines comment-based approval requirements for triggering builds on pull requests. This policy helps control when automated builds are executed based on contributor permissions and approval workflows.
              required:
                - projectName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWebhookOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    BuildIds:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    NonEmptyString:
      type: string
      minLength: 1
    BatchDeleteBuildsOutput:
      type: object
      properties:
        buildsDeleted:
          $ref: "#/components/schemas/BuildIds"
          description: The IDs of the builds that were successfully deleted.
        buildsNotDeleted:
          $ref: "#/components/schemas/BuildsNotDeleted"
          description: Information about any builds that could not be successfully deleted.
    BuildsNotDeleted:
      type: array
      items:
        $ref: "#/components/schemas/BuildNotDeleted"
    BuildNotDeleted:
      description: Information about a build that could not be successfully deleted.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the build that could not be successfully deleted.
        statusCode:
          $ref: "#/components/schemas/String"
          description: Additional information about the build that could not be successfully deleted.
    String:
      type: string
    BuildBatchIds:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    BatchGetBuildBatchesOutput:
      type: object
      properties:
        buildBatches:
          $ref: "#/components/schemas/BuildBatches"
          description: An array of BuildBatch objects that represent the retrieved batch builds.
        buildBatchesNotFound:
          $ref: "#/components/schemas/BuildBatchIds"
          description: An array that contains the identifiers of any batch builds that are not found.
    BuildBatches:
      type: array
      items:
        $ref: "#/components/schemas/BuildBatch"
    BuildBatch:
      description: Contains information about a batch build.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the batch build.
        arn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the batch build.
        startTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the batch build started.
        endTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the batch build ended.
        currentPhase:
          $ref: "#/components/schemas/String"
          description: The current phase of the batch build.
        buildBatchStatus:
          $ref: "#/components/schemas/StatusType"
          description: The status of the batch build.
        sourceVersion:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the version of the source code to be built.
        resolvedSourceVersion:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the resolved version of this batch build's source code. For CodeCommit, GitHub, GitHub Enterprise, and BitBucket, the commit ID. For CodePipeline, the source revision provided by CodePipeline. For Amazon S3, this does not apply.
        projectName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the batch build project.
        phases:
          $ref: "#/components/schemas/BuildBatchPhases"
          description: An array of BuildBatchPhase objects the specify the phases of the batch build.
        source:
          $ref: "#/components/schemas/ProjectSource"
        secondarySources:
          $ref: "#/components/schemas/ProjectSources"
          description: An array of ProjectSource objects that define the sources for the batch build.
        secondarySourceVersions:
          $ref: "#/components/schemas/ProjectSecondarySourceVersions"
          description: "An array of ProjectSourceVersion objects. Each ProjectSourceVersion must be one of: For CodeCommit: the commit ID, branch, or Git tag to use. For GitHub: the commit ID, pull request ID, branch name, or tag name that corresponds to the version of the source code you want to build. If a pull request ID is specified, it must use the format pr/pull-request-ID (for example, pr/25). If a branch name is specified, the branch's HEAD commit ID is used. If not specified, the default branch's HEAD commit ID is used. For Bitbucket: the commit ID, branch name, or tag name that corresponds to the version of the source code you want to build. If a branch name is specified, the branch's HEAD commit ID is used. If not specified, the default branch's HEAD commit ID is used. For Amazon S3: the version ID of the object that represents the build input ZIP file to use."
        artifacts:
          $ref: "#/components/schemas/BuildArtifacts"
          description: A BuildArtifacts object the defines the build artifacts for this batch build.
        secondaryArtifacts:
          $ref: "#/components/schemas/BuildArtifactsList"
          description: An array of BuildArtifacts objects the define the build artifacts for this batch build.
        cache:
          $ref: "#/components/schemas/ProjectCache"
        environment:
          $ref: "#/components/schemas/ProjectEnvironment"
        serviceRole:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of a service role used for builds in the batch.
        logConfig:
          $ref: "#/components/schemas/LogsConfig"
        buildTimeoutInMinutes:
          $ref: "#/components/schemas/WrapperInt"
          description: Specifies the maximum amount of time, in minutes, that the build in a batch must be completed in.
        queuedTimeoutInMinutes:
          $ref: "#/components/schemas/WrapperInt"
          description: Specifies the amount of time, in minutes, that the batch build is allowed to be queued before it times out.
        complete:
          $ref: "#/components/schemas/Boolean"
          description: Indicates if the batch build is complete.
        initiator:
          $ref: "#/components/schemas/String"
          description: "The entity that started the batch build. Valid values include: If CodePipeline started the build, the pipeline's name (for example, codepipeline/my-demo-pipeline). If a user started the build, the user's name. If the Jenkins plugin for CodeBuild started the build, the string CodeBuild-Jenkins-Plugin."
        vpcConfig:
          $ref: "#/components/schemas/VpcConfig"
        encryptionKey:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Key Management Service customer master key (CMK) to be used for encrypting the batch build output artifacts. You can use a cross-account KMS key to encrypt the build output artifacts if your service role has permission to that key. You can specify either the Amazon Resource Name (ARN) of the CMK or, if available, the CMK's alias (using the format alias/`<alias-name>`).
        buildBatchNumber:
          $ref: "#/components/schemas/WrapperLong"
          description: The number of the batch build. For each project, the buildBatchNumber of its first batch build is 1. The buildBatchNumber of each subsequent batch build is incremented by 1. If a batch build is deleted, the buildBatchNumber of other batch builds does not change.
        fileSystemLocations:
          $ref: "#/components/schemas/ProjectFileSystemLocations"
          description: An array of ProjectFileSystemLocation objects for the batch build project. A ProjectFileSystemLocation object specifies the identifier, location, mountOptions, mountPoint, and type of a file system created using Amazon Elastic File System.
        buildBatchConfig:
          $ref: "#/components/schemas/ProjectBuildBatchConfig"
        buildGroups:
          $ref: "#/components/schemas/BuildGroups"
          description: An array of BuildGroup objects that define the build groups for the batch build.
        debugSessionEnabled:
          $ref: "#/components/schemas/WrapperBoolean"
          description: Specifies if session debugging is enabled for this batch build. For more information, see Viewing a running build in Session Manager. Batch session debugging is not supported for matrix batch builds.
        reportArns:
          $ref: "#/components/schemas/BuildReportArns"
          description: An array that contains the ARNs of reports created by merging reports from builds associated with this batch build.
    Timestamp:
      type: string
      format: date-time
    StatusType:
      type: string
      enum:
        - SUCCEEDED
        - FAILED
        - FAULT
        - TIMED_OUT
        - IN_PROGRESS
        - STOPPED
    BuildBatchPhases:
      type: array
      items:
        $ref: "#/components/schemas/BuildBatchPhase"
    BuildBatchPhase:
      description: Contains information about a stage for a batch build.
      type: object
      properties:
        phaseType:
          $ref: "#/components/schemas/BuildBatchPhaseType"
          description: "The name of the batch build phase. Valid values include: COMBINE_ARTIFACTS Build output artifacts are being combined and uploaded to the output location. DOWNLOAD_BATCHSPEC The batch build specification is being downloaded. FAILED One or more of the builds failed. IN_PROGRESS The batch build is in progress. STOPPED The batch build was stopped. SUBMITTED The btach build has been submitted. SUCCEEDED The batch build succeeded."
        phaseStatus:
          $ref: "#/components/schemas/StatusType"
          description: "The current status of the batch build phase. Valid values include: FAILED The build phase failed. FAULT The build phase faulted. IN_PROGRESS The build phase is still in progress. STOPPED The build phase stopped. SUCCEEDED The build phase succeeded. TIMED_OUT The build phase timed out."
        startTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the batch build phase started, expressed in Unix time format.
        endTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the batch build phase ended, expressed in Unix time format.
        durationInSeconds:
          $ref: "#/components/schemas/WrapperLong"
          description: How long, in seconds, between the starting and ending times of the batch build's phase.
        contexts:
          $ref: "#/components/schemas/PhaseContexts"
          description: Additional information about the batch build phase. Especially to help troubleshoot a failed batch build.
    BuildBatchPhaseType:
      type: string
      enum:
        - SUBMITTED
        - DOWNLOAD_BATCHSPEC
        - IN_PROGRESS
        - COMBINE_ARTIFACTS
        - SUCCEEDED
        - FAILED
        - STOPPED
    WrapperLong:
      type: integer
      format: int64
    PhaseContexts:
      type: array
      items:
        $ref: "#/components/schemas/PhaseContext"
    PhaseContext:
      description: Additional information about a build phase that has an error. You can use this information for troubleshooting.
      type: object
      properties:
        statusCode:
          $ref: "#/components/schemas/String"
          description: The status code for the context of the build phase.
        message:
          $ref: "#/components/schemas/String"
          description: An explanation of the build phase's context. This might include a command ID and an exit code.
    ProjectSource:
      description: Information about the build input source code for the build project.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/SourceType"
          description: "The type of repository that contains the source code to be built. Valid values include: BITBUCKET: The source code is in a Bitbucket repository. CODECOMMIT: The source code is in an CodeCommit repository. CODEPIPELINE: The source code settings are specified in the source action of a pipeline in CodePipeline. GITHUB: The source code is in a GitHub repository. GITHUB_ENTERPRISE: The source code is in a GitHub Enterprise Server repository. GITLAB: The source code is in a GitLab repository. GITLAB_SELF_MANAGED: The source code is in a self-managed GitLab repository. NO_SOURCE: The project does not have input source code. S3: The source code is in an Amazon S3 bucket."
        location:
          $ref: "#/components/schemas/String"
          description: "Information about the location of the source code to be built. Valid values include: For source code settings that are specified in the source action of a pipeline in CodePipeline, location should not be specified. If it is specified, CodePipeline ignores it. This is because CodePipeline uses the settings in a pipeline's source action instead of this value. For source code in an CodeCommit repository, the HTTPS clone URL to the repository that contains the source code and the buildspec file (for example, https://git-codecommit.`<region-ID>`.amazonaws.com/v1/repos/`<repo-name>`). For source code in an Amazon S3 input bucket, one of the following. The path to the ZIP file that contains the source code (for example, `<bucket-name>`/`<path>`/`<object-name>`.zip). The path to the folder that contains the source code (for example, `<bucket-name>`/`<path-to-source-code>`/`<folder>`/). For source code in a GitHub repository, the HTTPS clone URL to the repository that contains the source and the buildspec file. You must connect your Amazon Web Services account to your GitHub account. Use the CodeBuild console to start creating a build project. When you use the console to connect (or reconnect) with GitHub, on the GitHub Authorize application page, for Organization access, choose Request access next to each repository you want to allow CodeBuild to have access to, and then choose Authorize application. (After you have connected to your GitHub account, you do not need to finish creating the build project. You can leave the CodeBuild console.) To instruct CodeBuild to use this connection, in the source object, set the auth object's type value to OAUTH. For source code in an GitLab or self-managed GitLab repository, the HTTPS clone URL to the repository that contains the source and the buildspec file. You must connect your Amazon Web Services account to your GitLab account. Use the CodeBuild console to start creating a build project. When you use the console to connect (or reconnect) with GitLab, on the Connections Authorize application page, choose Authorize. Then on the CodeConnections Create GitLab connection page, choose Connect to GitLab. (After you have connected to your GitLab account, you do not need to finish creating the build project. You can leave the CodeBuild console.) To instruct CodeBuild to override the default connection and use this connection instead, set the auth object's type value to CODECONNECTIONS in the source object. For source code in a Bitbucket repository, the HTTPS clone URL to the repository that contains the source and the buildspec file. You must connect your Amazon Web Services account to your Bitbucket account. Use the CodeBuild console to start creating a build project. When you use the console to connect (or reconnect) with Bitbucket, on the Bitbucket Confirm access to your account page, choose Grant access. (After you have connected to your Bitbucket account, you do not need to finish creating the build project. You can leave the CodeBuild console.) To instruct CodeBuild to use this connection, in the source object, set the auth object's type value to OAUTH. If you specify CODEPIPELINE for the Type property, don't specify this property. For all of the other types, you must specify Location."
        gitCloneDepth:
          $ref: "#/components/schemas/GitCloneDepth"
          description: Information about the Git clone depth for the build project.
        gitSubmodulesConfig:
          $ref: "#/components/schemas/GitSubmodulesConfig"
          description: Information about the Git submodules configuration for the build project.
        buildspec:
          $ref: "#/components/schemas/String"
          description: The buildspec file declaration to use for the builds in this build project. If this value is set, it can be either an inline buildspec definition, the path to an alternate buildspec file relative to the value of the built-in CODEBUILD_SRC_DIR environment variable, or the path to an S3 bucket. The bucket must be in the same Amazon Web Services Region as the build project. Specify the buildspec file using its ARN (for example, arn:aws:s3:::my-codebuild-sample2/buildspec.yml). If this value is not provided or is set to an empty string, the source code must contain a buildspec file in its root directory. For more information, see Buildspec File Name and Storage Location.
        auth:
          $ref: "#/components/schemas/SourceAuth"
          description: Information about the authorization settings for CodeBuild to access the source code to be built.
        reportBuildStatus:
          $ref: "#/components/schemas/WrapperBoolean"
          description: Set to true to report the status of a build's start and finish to your source provider. This option is valid only when your source provider is GitHub, GitHub Enterprise, GitLab, GitLab Self Managed, GitLab, GitLab Self Managed, or Bitbucket. If this is set and you use a different source provider, an invalidInputException is thrown. To be able to report the build status to the source provider, the user associated with the source provider must have write access to the repo. If the user does not have write access, the build status cannot be updated. For more information, see Source provider access in the CodeBuild User Guide. The status of a build triggered by a webhook is always reported to your source provider. If your project's builds are triggered by a webhook, you must push a new commit to the repo for a change to this property to take effect.
        buildStatusConfig:
          $ref: "#/components/schemas/BuildStatusConfig"
          description: Contains information that defines how the build project reports the build status to the source provider. This option is only used when the source provider is GITHUB, GITHUB_ENTERPRISE, or BITBUCKET.
        insecureSsl:
          $ref: "#/components/schemas/WrapperBoolean"
          description: Enable this flag to ignore SSL warnings while connecting to the project source code.
        sourceIdentifier:
          $ref: "#/components/schemas/String"
          description: An identifier for this project source. The identifier can only contain alphanumeric characters and underscores, and must be less than 128 characters in length.
      required:
        - type_
    SourceType:
      type: string
      enum:
        - CODECOMMIT
        - CODEPIPELINE
        - GITHUB
        - GITLAB
        - GITLAB_SELF_MANAGED
        - S3
        - BITBUCKET
        - GITHUB_ENTERPRISE
        - NO_SOURCE
    GitCloneDepth:
      type: integer
      minimum: 0
    GitSubmodulesConfig:
      description: Information about the Git submodules configuration for an CodeBuild build project.
      type: object
      properties:
        fetchSubmodules:
          $ref: "#/components/schemas/WrapperBoolean"
          description: Set to true to fetch Git submodules for your CodeBuild build project.
      required:
        - fetchSubmodules
    WrapperBoolean:
      type: boolean
    SourceAuth:
      description: Information about the authorization settings for CodeBuild to access the source code to be built.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/SourceAuthType"
          description: The authorization type to use. Valid options are OAUTH, CODECONNECTIONS, or SECRETS_MANAGER.
        resource:
          $ref: "#/components/schemas/String"
          description: The resource value that applies to the specified authorization type.
      required:
        - type_
    SourceAuthType:
      type: string
      enum:
        - OAUTH
        - CODECONNECTIONS
        - SECRETS_MANAGER
    BuildStatusConfig:
      description: Contains information that defines how the CodeBuild build project reports the build status to the source provider.
      type: object
      properties:
        context:
          $ref: "#/components/schemas/String"
          description: Specifies the context of the build status CodeBuild sends to the source provider. The usage of this parameter depends on the source provider. Bitbucket This parameter is used for the name parameter in the Bitbucket commit status. For more information, see build in the Bitbucket API documentation. GitHub/GitHub Enterprise Server This parameter is used for the context parameter in the GitHub commit status. For more information, see Create a commit status in the GitHub developer guide.
        targetUrl:
          $ref: "#/components/schemas/String"
          description: Specifies the target url of the build status CodeBuild sends to the source provider. The usage of this parameter depends on the source provider. Bitbucket This parameter is used for the url parameter in the Bitbucket commit status. For more information, see build in the Bitbucket API documentation. GitHub/GitHub Enterprise Server This parameter is used for the target_url parameter in the GitHub commit status. For more information, see Create a commit status in the GitHub developer guide.
    ProjectSources:
      type: array
      items:
        $ref: "#/components/schemas/ProjectSource"
    ProjectSecondarySourceVersions:
      type: array
      items:
        $ref: "#/components/schemas/ProjectSourceVersion"
    ProjectSourceVersion:
      description: A source identifier and its corresponding version.
      type: object
      properties:
        sourceIdentifier:
          $ref: "#/components/schemas/String"
          description: An identifier for a source in the build project. The identifier can only contain alphanumeric characters and underscores, and must be less than 128 characters in length.
        sourceVersion:
          $ref: "#/components/schemas/String"
          description: "The source version for the corresponding source identifier. If specified, must be one of: For CodeCommit: the commit ID, branch, or Git tag to use. For GitHub: the commit ID, pull request ID, branch name, or tag name that corresponds to the version of the source code you want to build. If a pull request ID is specified, it must use the format pr/pull-request-ID (for example, pr/25). If a branch name is specified, the branch's HEAD commit ID is used. If not specified, the default branch's HEAD commit ID is used. For GitLab: the commit ID, branch, or Git tag to use. For Bitbucket: the commit ID, branch name, or tag name that corresponds to the version of the source code you want to build. If a branch name is specified, the branch's HEAD commit ID is used. If not specified, the default branch's HEAD commit ID is used. For Amazon S3: the version ID of the object that represents the build input ZIP file to use. For more information, see Source Version Sample with CodeBuild in the CodeBuild User Guide."
      required:
        - sourceIdentifier
        - sourceVersion
    BuildArtifacts:
      description: Information about build output artifacts.
      type: object
      properties:
        location:
          $ref: "#/components/schemas/String"
          description: Information about the location of the build artifacts.
        sha256sum:
          $ref: "#/components/schemas/String"
          description: The SHA-256 hash of the build artifact. You can use this hash along with a checksum tool to confirm file integrity and authenticity. This value is available only if the build project's packaging value is set to ZIP.
        md5sum:
          $ref: "#/components/schemas/String"
          description: The MD5 hash of the build artifact. You can use this hash along with a checksum tool to confirm file integrity and authenticity. This value is available only if the build project's packaging value is set to ZIP.
        overrideArtifactName:
          $ref: "#/components/schemas/WrapperBoolean"
          description: If this flag is set, a name specified in the buildspec file overrides the artifact name. The name specified in a buildspec file is calculated at build time and uses the Shell Command Language. For example, you can append a date and time to your artifact name so that it is always unique.
        encryptionDisabled:
          $ref: "#/components/schemas/WrapperBoolean"
          description: Information that tells you if encryption for build artifacts is disabled.
        artifactIdentifier:
          $ref: "#/components/schemas/String"
          description: An identifier for this artifact definition.
        bucketOwnerAccess:
          $ref: "#/components/schemas/BucketOwnerAccess"
    BucketOwnerAccess:
      description: "Specifies the bucket owner's access for objects that another account uploads to their Amazon S3 bucket. By default, only the account that uploads the objects to the bucket has access to these objects. This property allows you to give the bucket owner access to these objects. To use this property, your CodeBuild service role must have the s3:PutBucketAcl permission. This permission allows CodeBuild to modify the access control list for the bucket. This property can be one of the following values: NONE The bucket owner does not have access to the objects. This is the default. READ_ONLY The bucket owner has read-only access to the objects. The uploading account retains ownership of the objects. FULL The bucket owner has full access to the objects. Object ownership is determined by the following criteria: If the bucket is configured with the Bucket owner preferred setting, the bucket owner owns the objects. The uploading account will have object access as specified by the bucket's policy. Otherwise, the uploading account retains ownership of the objects. For more information about Amazon S3 object ownership, see Controlling ownership of uploaded objects using S3 Object Ownership in the Amazon Simple Storage Service User Guide."
      type: string
      enum:
        - NONE
        - READ_ONLY
        - FULL
    BuildArtifactsList:
      type: array
      items:
        $ref: "#/components/schemas/BuildArtifacts"
    ProjectCache:
      description: Information about the cache for the build project.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/CacheType"
          description: "The type of cache used by the build project. Valid values include: NO_CACHE: The build project does not use any cache. S3: The build project reads and writes from and to S3. LOCAL: The build project stores a cache locally on a build host that is only available to that build host."
        location:
          $ref: "#/components/schemas/String"
          description: "Information about the cache location: NO_CACHE or LOCAL: This value is ignored. S3: This is the S3 bucket name/prefix."
        modes:
          $ref: "#/components/schemas/ProjectCacheModes"
          description: "An array of strings that specify the local cache modes. You can use one or more local cache modes at the same time. This is only used for LOCAL cache types. Possible values are: LOCAL_SOURCE_CACHE Caches Git metadata for primary and secondary sources. After the cache is created, subsequent builds pull only the change between commits. This mode is a good choice for projects with a clean working directory and a source that is a large Git repository. If you choose this option and your project does not use a Git repository (GitHub, GitHub Enterprise, or Bitbucket), the option is ignored. LOCAL_DOCKER_LAYER_CACHE Caches existing Docker layers. This mode is a good choice for projects that build or pull large Docker images. It can prevent the performance issues caused by pulling large Docker images down from the network. You can use a Docker layer cache in the Linux environment only. The privileged flag must be set so that your project has the required Docker permissions. You should consider the security implications before you use a Docker layer cache. LOCAL_CUSTOM_CACHE Caches directories you specify in the buildspec file. This mode is a good choice if your build scenario is not suited to one of the other three local cache modes. If you use a custom cache: Only directories can be specified for caching. You cannot specify individual files. Symlinks are used to reference cached directories. Cached directories are linked to your build before it downloads its project sources. Cached items are overridden if a source item has the same name. Directories are specified using cache paths in the buildspec file."
        cacheNamespace:
          $ref: "#/components/schemas/String"
          description: Defines the scope of the cache. You can use this namespace to share a cache across multiple projects. For more information, see Cache sharing between projects in the CodeBuild User Guide.
      required:
        - type_
    CacheType:
      type: string
      enum:
        - NO_CACHE
        - S3
        - LOCAL
    ProjectCacheModes:
      type: array
      items:
        $ref: "#/components/schemas/CacheMode"
    CacheMode:
      type: string
      enum:
        - LOCAL_DOCKER_LAYER_CACHE
        - LOCAL_SOURCE_CACHE
        - LOCAL_CUSTOM_CACHE
    ProjectEnvironment:
      description: Information about the build environment of the build project.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/EnvironmentType"
          description: The type of build environment to use for related builds. If you're using compute fleets during project creation, type will be ignored. For more information, see Build environment compute types in the CodeBuild user guide.
        image:
          $ref: "#/components/schemas/NonEmptyString"
          description: 'The image tag or image digest that identifies the Docker image to use for this build project. Use the following formats: For an image tag: `<registry>`/`<repository>`:`<tag>`. For example, in the Docker repository that CodeBuild uses to manage its Docker images, this would be aws/codebuild/standard:4.0. For an image digest: `<registry>`/`<repository>`@`<digest>`. For example, to specify an image with the digest "sha256:cbbf2f9a99b47fc460d422812b6a5adff7dfee951d8fa2e4a98caa0382cfbdbf," use `<registry>`/`<repository>`@sha256:cbbf2f9a99b47fc460d422812b6a5adff7dfee951d8fa2e4a98caa0382cfbdbf. For more information, see Docker images provided by CodeBuild in the CodeBuild user guide.'
        computeType:
          $ref: "#/components/schemas/ComputeType"
          description: "Information about the compute resources the build project uses. Available values include: ATTRIBUTE_BASED_COMPUTE: Specify the amount of vCPUs, memory, disk space, and the type of machine. If you use ATTRIBUTE_BASED_COMPUTE, you must define your attributes by using computeConfiguration. CodeBuild will select the cheapest instance that satisfies your specified attributes. For more information, see Reserved capacity environment types in the CodeBuild User Guide. BUILD_GENERAL1_SMALL: Use up to 4 GiB memory and 2 vCPUs for builds. BUILD_GENERAL1_MEDIUM: Use up to 8 GiB memory and 4 vCPUs for builds. BUILD_GENERAL1_LARGE: Use up to 16 GiB memory and 8 vCPUs for builds, depending on your environment type. BUILD_GENERAL1_XLARGE: Use up to 72 GiB memory and 36 vCPUs for builds, depending on your environment type. BUILD_GENERAL1_2XLARGE: Use up to 144 GiB memory, 72 vCPUs, and 824 GB of SSD storage for builds. This compute type supports Docker images up to 100 GB uncompressed. BUILD_LAMBDA_1GB: Use up to 1 GiB memory for builds. Only available for environment type LINUX_LAMBDA_CONTAINER and ARM_LAMBDA_CONTAINER. BUILD_LAMBDA_2GB: Use up to 2 GiB memory for builds. Only available for environment type LINUX_LAMBDA_CONTAINER and ARM_LAMBDA_CONTAINER. BUILD_LAMBDA_4GB: Use up to 4 GiB memory for builds. Only available for environment type LINUX_LAMBDA_CONTAINER and ARM_LAMBDA_CONTAINER. BUILD_LAMBDA_8GB: Use up to 8 GiB memory for builds. Only available for environment type LINUX_LAMBDA_CONTAINER and ARM_LAMBDA_CONTAINER. BUILD_LAMBDA_10GB: Use up to 10 GiB memory for builds. Only available for environment type LINUX_LAMBDA_CONTAINER and ARM_LAMBDA_CONTAINER. If you use BUILD_GENERAL1_SMALL: For environment type LINUX_CONTAINER, you can use up to 4 GiB memory and 2 vCPUs for builds. For environment type LINUX_GPU_CONTAINER, you can use up to 16 GiB memory, 4 vCPUs, and 1 NVIDIA A10G Tensor Core GPU for builds. For environment type ARM_CONTAINER, you can use up to 4 GiB memory and 2 vCPUs on ARM-based processors for builds. If you use BUILD_GENERAL1_LARGE: For environment type LINUX_CONTAINER, you can use up to 16 GiB memory and 8 vCPUs for builds. For environment type LINUX_GPU_CONTAINER, you can use up to 255 GiB memory, 32 vCPUs, and 4 NVIDIA Tesla V100 GPUs for builds. For environment type ARM_CONTAINER, you can use up to 16 GiB memory and 8 vCPUs on ARM-based processors for builds. For more information, see On-demand environment types in the CodeBuild User Guide."
        computeConfiguration:
          $ref: "#/components/schemas/ComputeConfiguration"
          description: The compute configuration of the build project. This is only required if computeType is set to ATTRIBUTE_BASED_COMPUTE.
        fleet:
          $ref: "#/components/schemas/ProjectFleet"
          description: A ProjectFleet object to use for this build project.
        environmentVariables:
          $ref: "#/components/schemas/EnvironmentVariables"
          description: A set of environment variables to make available to builds for this build project.
        privilegedMode:
          $ref: "#/components/schemas/WrapperBoolean"
          description: "Enables running the Docker daemon inside a Docker container. Set to true only if the build project is used to build Docker images. Otherwise, a build that attempts to interact with the Docker daemon fails. The default setting is false. You can initialize the Docker daemon during the install phase of your build by adding one of the following sets of commands to the install phase of your buildspec file: If the operating system's base image is Ubuntu Linux: - nohup /usr/local/bin/dockerd --host=unix:///var/run/docker.sock --host=tcp://0.0.0.0:2375 --storage-driver=overlay& - timeout 15 sh -c \"until docker info; do echo .; sleep 1; done\" If the operating system's base image is Alpine Linux and the previous command does not work, add the -t argument to timeout: - nohup /usr/local/bin/dockerd --host=unix:///var/run/docker.sock --host=tcp://0.0.0.0:2375 --storage-driver=overlay& - timeout -t 15 sh -c \"until docker info; do echo .; sleep 1; done\""
        certificate:
          $ref: "#/components/schemas/String"
          description: The ARN of the Amazon S3 bucket, path prefix, and object key that contains the PEM-encoded certificate for the build project. For more information, see certificate in the CodeBuild User Guide.
        registryCredential:
          $ref: "#/components/schemas/RegistryCredential"
          description: The credentials for access to a private registry.
        imagePullCredentialsType:
          $ref: "#/components/schemas/ImagePullCredentialsType"
          description: "The type of credentials CodeBuild uses to pull images in your build. There are two valid values: CODEBUILD specifies that CodeBuild uses its own credentials. This requires that you modify your ECR repository policy to trust CodeBuild service principal. SERVICE_ROLE specifies that CodeBuild uses your build project's service role. When you use a cross-account or private registry image, you must use SERVICE_ROLE credentials. When you use an CodeBuild curated image, you must use CODEBUILD credentials."
        dockerServer:
          $ref: "#/components/schemas/DockerServer"
          description: A DockerServer object to use for this build project.
      required:
        - type_
        - image
        - computeType
    EnvironmentType:
      type: string
      enum:
        - WINDOWS_CONTAINER
        - LINUX_CONTAINER
        - LINUX_GPU_CONTAINER
        - ARM_CONTAINER
        - WINDOWS_SERVER_2019_CONTAINER
        - WINDOWS_SERVER_2022_CONTAINER
        - LINUX_LAMBDA_CONTAINER
        - ARM_LAMBDA_CONTAINER
        - LINUX_EC2
        - ARM_EC2
        - WINDOWS_EC2
        - MAC_ARM
    ComputeType:
      type: string
      enum:
        - BUILD_GENERAL1_SMALL
        - BUILD_GENERAL1_MEDIUM
        - BUILD_GENERAL1_LARGE
        - BUILD_GENERAL1_XLARGE
        - BUILD_GENERAL1_2XLARGE
        - BUILD_LAMBDA_1GB
        - BUILD_LAMBDA_2GB
        - BUILD_LAMBDA_4GB
        - BUILD_LAMBDA_8GB
        - BUILD_LAMBDA_10GB
        - ATTRIBUTE_BASED_COMPUTE
        - CUSTOM_INSTANCE_TYPE
    ComputeConfiguration:
      description: Contains compute attributes. These attributes only need be specified when your project's or fleet's computeType is set to ATTRIBUTE_BASED_COMPUTE or CUSTOM_INSTANCE_TYPE.
      type: object
      properties:
        vCpu:
          $ref: "#/components/schemas/WrapperLong"
          description: The number of vCPUs of the instance type included in your fleet.
        memory:
          $ref: "#/components/schemas/WrapperLong"
          description: The amount of memory of the instance type included in your fleet.
        disk:
          $ref: "#/components/schemas/WrapperLong"
          description: The amount of disk space of the instance type included in your fleet.
        machineType:
          $ref: "#/components/schemas/MachineType"
          description: The machine type of the instance type included in your fleet.
        instanceType:
          $ref: "#/components/schemas/NonEmptyString"
          description: The EC2 instance type to be launched in your fleet.
    MachineType:
      type: string
      enum:
        - GENERAL
        - NVME
    ProjectFleet:
      description: Information about the compute fleet of the build project. For more information, see Working with reserved capacity in CodeBuild.
      type: object
      properties:
        fleetArn:
          $ref: "#/components/schemas/String"
          description: Specifies the compute fleet ARN for the build project.
    EnvironmentVariables:
      type: array
      items:
        $ref: "#/components/schemas/EnvironmentVariable"
    EnvironmentVariable:
      description: Information about an environment variable for a build project or a build.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name or key of the environment variable.
        value:
          $ref: "#/components/schemas/String"
          description: The value of the environment variable. We strongly discourage the use of PLAINTEXT environment variables to store sensitive values, especially Amazon Web Services secret key IDs. PLAINTEXT environment variables can be displayed in plain text using the CodeBuild console and the CLI. For sensitive values, we recommend you use an environment variable of type PARAMETER_STORE or SECRETS_MANAGER.
        type_:
          $ref: "#/components/schemas/EnvironmentVariableType"
          description: "The type of environment variable. Valid values include: PARAMETER_STORE: An environment variable stored in Systems Manager Parameter Store. For environment variables of this type, specify the name of the parameter as the value of the EnvironmentVariable. The parameter value will be substituted for the name at runtime. You can also define Parameter Store environment variables in the buildspec. To learn how to do so, see env/parameter-store in the CodeBuild User Guide. PLAINTEXT: An environment variable in plain text format. This is the default value. SECRETS_MANAGER: An environment variable stored in Secrets Manager. For environment variables of this type, specify the name of the secret as the value of the EnvironmentVariable. The secret value will be substituted for the name at runtime. You can also define Secrets Manager environment variables in the buildspec. To learn how to do so, see env/secrets-manager in the CodeBuild User Guide."
      required:
        - name
        - value
    EnvironmentVariableType:
      type: string
      enum:
        - PLAINTEXT
        - PARAMETER_STORE
        - SECRETS_MANAGER
    RegistryCredential:
      description: "Information about credentials that provide access to a private Docker registry. When this is set: imagePullCredentialsType must be set to SERVICE_ROLE. images cannot be curated or an Amazon ECR image. For more information, see Private Registry with Secrets Manager Sample for CodeBuild."
      type: object
      properties:
        credential:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) or name of credentials created using Secrets Manager. The credential can use the name of the credentials only if they exist in your current Amazon Web Services Region.
        credentialProvider:
          $ref: "#/components/schemas/CredentialProviderType"
          description: The service that created the credentials to access a private Docker registry. The valid value, SECRETS_MANAGER, is for Secrets Manager.
      required:
        - credential
        - credentialProvider
    CredentialProviderType:
      type: string
      enum:
        - SECRETS_MANAGER
    ImagePullCredentialsType:
      type: string
      enum:
        - CODEBUILD
        - SERVICE_ROLE
    DockerServer:
      description: Contains docker server information.
      type: object
      properties:
        computeType:
          $ref: "#/components/schemas/ComputeType"
          description: "Information about the compute resources the docker server uses. Available values include: BUILD_GENERAL1_SMALL: Use up to 4 GiB memory and 2 vCPUs for your docker server. BUILD_GENERAL1_MEDIUM: Use up to 8 GiB memory and 4 vCPUs for your docker server. BUILD_GENERAL1_LARGE: Use up to 16 GiB memory and 8 vCPUs for your docker server. BUILD_GENERAL1_XLARGE: Use up to 64 GiB memory and 32 vCPUs for your docker server. BUILD_GENERAL1_2XLARGE: Use up to 128 GiB memory and 64 vCPUs for your docker server."
        securityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: A list of one or more security groups IDs. Security groups configured for Docker servers should allow ingress network traffic from the VPC configured in the project. They should allow ingress on port 9876.
        status:
          $ref: "#/components/schemas/DockerServerStatus"
          description: A DockerServerStatus object to use for this docker server.
      required:
        - computeType
    SecurityGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    DockerServerStatus:
      description: Contains information about the status of the docker server.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/String"
          description: The status of the docker server.
        message:
          $ref: "#/components/schemas/String"
          description: A message associated with the status of a docker server.
    LogsConfig:
      description: Information about logs for a build project. These can be logs in CloudWatch Logs, built in a specified S3 bucket, or both.
      type: object
      properties:
        cloudWatchLogs:
          $ref: "#/components/schemas/CloudWatchLogsConfig"
          description: Information about CloudWatch Logs for a build project. CloudWatch Logs are enabled by default.
        s3Logs:
          $ref: "#/components/schemas/S3LogsConfig"
          description: Information about logs built to an S3 bucket for a build project. S3 logs are not enabled by default.
    CloudWatchLogsConfig:
      description: Information about CloudWatch Logs for a build project.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/LogsConfigStatusType"
          description: "The current status of the logs in CloudWatch Logs for a build project. Valid values are: ENABLED: CloudWatch Logs are enabled for this build project. DISABLED: CloudWatch Logs are not enabled for this build project."
        groupName:
          $ref: "#/components/schemas/String"
          description: The group name of the logs in CloudWatch Logs. For more information, see Working with Log Groups and Log Streams.
        streamName:
          $ref: "#/components/schemas/String"
          description: The prefix of the stream name of the CloudWatch Logs. For more information, see Working with Log Groups and Log Streams.
      required:
        - status
    LogsConfigStatusType:
      type: string
      enum:
        - ENABLED
        - DISABLED
    S3LogsConfig:
      description: Information about S3 logs for a build project.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/LogsConfigStatusType"
          description: "The current status of the S3 build logs. Valid values are: ENABLED: S3 build logs are enabled for this build project. DISABLED: S3 build logs are not enabled for this build project."
        location:
          $ref: "#/components/schemas/String"
          description: The ARN of an S3 bucket and the path prefix for S3 logs. If your Amazon S3 bucket name is my-bucket, and your path prefix is build-log, then acceptable formats are my-bucket/build-log or arn:aws:s3:::my-bucket/build-log.
        encryptionDisabled:
          $ref: "#/components/schemas/WrapperBoolean"
          description: Set to true if you do not want your S3 build log output encrypted. By default S3 build logs are encrypted.
        bucketOwnerAccess:
          $ref: "#/components/schemas/BucketOwnerAccess"
      required:
        - status
    WrapperInt:
      type: integer
    Boolean:
      type: boolean
    VpcConfig:
      description: Information about the VPC configuration that CodeBuild accesses.
      type: object
      properties:
        vpcId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the Amazon VPC.
        subnets:
          $ref: "#/components/schemas/Subnets"
          description: A list of one or more subnet IDs in your Amazon VPC.
        securityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: A list of one or more security groups IDs in your Amazon VPC.
    Subnets:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    ProjectFileSystemLocations:
      type: array
      items:
        $ref: "#/components/schemas/ProjectFileSystemLocation"
    ProjectFileSystemLocation:
      description: Information about a file system created by Amazon Elastic File System (EFS). For more information, see What Is Amazon Elastic File System?
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/FileSystemType"
          description: The type of the file system. The one supported type is EFS.
        location:
          $ref: "#/components/schemas/String"
          description: A string that specifies the location of the file system created by Amazon EFS. Its format is efs-dns-name:/directory-path. You can find the DNS name of file system when you view it in the Amazon EFS console. The directory path is a path to a directory in the file system that CodeBuild mounts. For example, if the DNS name of a file system is fs-abcd1234.efs.us-west-2.amazonaws.com, and its mount directory is my-efs-mount-directory, then the location is fs-abcd1234.efs.us-west-2.amazonaws.com:/my-efs-mount-directory. The directory path in the format efs-dns-name:/directory-path is optional. If you do not specify a directory path, the location is only the DNS name and CodeBuild mounts the entire file system.
        mountPoint:
          $ref: "#/components/schemas/String"
          description: The location in the container where you mount the file system.
        identifier:
          $ref: "#/components/schemas/String"
          description: The name used to access a file system created by Amazon EFS. CodeBuild creates an environment variable by appending the identifier in all capital letters to CODEBUILD_. For example, if you specify my_efs for identifier, a new environment variable is create named CODEBUILD_MY_EFS. The identifier is used to mount your file system.
        mountOptions:
          $ref: "#/components/schemas/String"
          description: The mount options for a file system created by Amazon EFS. The default mount options used by CodeBuild are nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2. For more information, see Recommended NFS Mount Options.
    FileSystemType:
      type: string
      enum:
        - EFS
    ProjectBuildBatchConfig:
      description: Contains configuration information about a batch build project.
      type: object
      properties:
        serviceRole:
          $ref: "#/components/schemas/NonEmptyString"
          description: Specifies the service role ARN for the batch build project.
        combineArtifacts:
          $ref: "#/components/schemas/WrapperBoolean"
          description: Specifies if the build artifacts for the batch build should be combined into a single artifact location.
        restrictions:
          $ref: "#/components/schemas/BatchRestrictions"
          description: A BatchRestrictions object that specifies the restrictions for the batch build.
        timeoutInMins:
          $ref: "#/components/schemas/WrapperInt"
          description: Specifies the maximum amount of time, in minutes, that the batch build must be completed in.
        batchReportMode:
          $ref: "#/components/schemas/BatchReportModeType"
          description: Specifies how build status reports are sent to the source provider for the batch build. This property is only used when the source provider for your project is Bitbucket, GitHub, or GitHub Enterprise, and your project is configured to report build statuses to the source provider. REPORT_AGGREGATED_BATCH (Default) Aggregate all of the build statuses into a single status report. REPORT_INDIVIDUAL_BUILDS Send a separate status report for each individual build.
    BatchRestrictions:
      description: Specifies restrictions for the batch build.
      type: object
      properties:
        maximumBuildsAllowed:
          $ref: "#/components/schemas/WrapperInt"
          description: Specifies the maximum number of builds allowed.
        computeTypesAllowed:
          $ref: "#/components/schemas/ComputeTypesAllowed"
          description: An array of strings that specify the compute types that are allowed for the batch build. See Build environment compute types in the CodeBuild User Guide for these values.
        fleetsAllowed:
          $ref: "#/components/schemas/FleetsAllowed"
          description: An array of strings that specify the fleets that are allowed for the batch build. See Run builds on reserved capacity fleets in the CodeBuild User Guide for more information.
    ComputeTypesAllowed:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    FleetsAllowed:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    BatchReportModeType:
      type: string
      enum:
        - REPORT_INDIVIDUAL_BUILDS
        - REPORT_AGGREGATED_BATCH
    BuildGroups:
      type: array
      items:
        $ref: "#/components/schemas/BuildGroup"
    BuildGroup:
      description: Contains information about a batch build build group. Build groups are used to combine builds that can run in parallel, while still being able to set dependencies on other build groups.
      type: object
      properties:
        identifier:
          $ref: "#/components/schemas/String"
          description: Contains the identifier of the build group.
        dependsOn:
          $ref: "#/components/schemas/Identifiers"
          description: An array of strings that contain the identifiers of the build groups that this build group depends on.
        ignoreFailure:
          $ref: "#/components/schemas/Boolean"
          description: Specifies if failures in this build group can be ignored.
        currentBuildSummary:
          $ref: "#/components/schemas/BuildSummary"
          description: A BuildSummary object that contains a summary of the current build group.
        priorBuildSummaryList:
          $ref: "#/components/schemas/BuildSummaries"
          description: An array of BuildSummary objects that contain summaries of previous build groups.
    Identifiers:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    BuildSummary:
      description: Contains summary information about a batch build group.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/String"
          description: The batch build ARN.
        requestedOn:
          $ref: "#/components/schemas/Timestamp"
          description: When the build was started, expressed in Unix time format.
        buildStatus:
          $ref: "#/components/schemas/StatusType"
          description: The status of the build group. FAILED The build group failed. FAULT The build group faulted. IN_PROGRESS The build group is still in progress. STOPPED The build group stopped. SUCCEEDED The build group succeeded. TIMED_OUT The build group timed out.
        primaryArtifact:
          $ref: "#/components/schemas/ResolvedArtifact"
          description: A ResolvedArtifact object that represents the primary build artifacts for the build group.
        secondaryArtifacts:
          $ref: "#/components/schemas/ResolvedSecondaryArtifacts"
          description: An array of ResolvedArtifact objects that represents the secondary build artifacts for the build group.
    ResolvedArtifact:
      description: Represents a resolved build artifact. A resolved artifact is an artifact that is built and deployed to the destination, such as Amazon S3.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/ArtifactsType"
          description: Specifies the type of artifact.
        location:
          $ref: "#/components/schemas/String"
          description: The location of the artifact.
        identifier:
          $ref: "#/components/schemas/String"
          description: The identifier of the artifact.
    ArtifactsType:
      type: string
      enum:
        - CODEPIPELINE
        - S3
        - NO_ARTIFACTS
    ResolvedSecondaryArtifacts:
      type: array
      items:
        $ref: "#/components/schemas/ResolvedArtifact"
    BuildSummaries:
      type: array
      items:
        $ref: "#/components/schemas/BuildSummary"
    BuildReportArns:
      type: array
      items:
        $ref: "#/components/schemas/String"
    BatchGetBuildsOutput:
      type: object
      properties:
        builds:
          $ref: "#/components/schemas/Builds"
          description: Information about the requested builds.
        buildsNotFound:
          $ref: "#/components/schemas/BuildIds"
          description: The IDs of builds for which information could not be found.
    Builds:
      type: array
      items:
        $ref: "#/components/schemas/Build"
    Build:
      description: Information about a build.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/NonEmptyString"
          description: The unique ID for the build.
        arn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the build.
        buildNumber:
          $ref: "#/components/schemas/WrapperLong"
          description: The number of the build. For each project, the buildNumber of its first build is 1. The buildNumber of each subsequent build is incremented by 1. If a build is deleted, the buildNumber of other builds does not change.
        startTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the build process started, expressed in Unix time format.
        endTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the build process ended, expressed in Unix time format.
        currentPhase:
          $ref: "#/components/schemas/String"
          description: The current build phase.
        buildStatus:
          $ref: "#/components/schemas/StatusType"
          description: "The current status of the build. Valid values include: FAILED: The build failed. FAULT: The build faulted. IN_PROGRESS: The build is still in progress. STOPPED: The build stopped. SUCCEEDED: The build succeeded. TIMED_OUT: The build timed out."
        sourceVersion:
          $ref: "#/components/schemas/NonEmptyString"
          description: Any version identifier for the version of the source code to be built. If sourceVersion is specified at the project level, then this sourceVersion (at the build level) takes precedence. For more information, see Source Version Sample with CodeBuild in the CodeBuild User Guide.
        resolvedSourceVersion:
          $ref: "#/components/schemas/NonEmptyString"
          description: An identifier for the version of this build's source code. For CodeCommit, GitHub, GitHub Enterprise, and BitBucket, the commit ID. For CodePipeline, the source revision provided by CodePipeline. For Amazon S3, this does not apply.
        projectName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the CodeBuild project.
        phases:
          $ref: "#/components/schemas/BuildPhases"
          description: Information about all previous build phases that are complete and information about any current build phase that is not yet complete.
        source:
          $ref: "#/components/schemas/ProjectSource"
          description: Information about the source code to be built.
        secondarySources:
          $ref: "#/components/schemas/ProjectSources"
          description: An array of ProjectSource objects.
        secondarySourceVersions:
          $ref: "#/components/schemas/ProjectSecondarySourceVersions"
          description: "An array of ProjectSourceVersion objects. Each ProjectSourceVersion must be one of: For CodeCommit: the commit ID, branch, or Git tag to use. For GitHub: the commit ID, pull request ID, branch name, or tag name that corresponds to the version of the source code you want to build. If a pull request ID is specified, it must use the format pr/pull-request-ID (for example, pr/25). If a branch name is specified, the branch's HEAD commit ID is used. If not specified, the default branch's HEAD commit ID is used. For Bitbucket: the commit ID, branch name, or tag name that corresponds to the version of the source code you want to build. If a branch name is specified, the branch's HEAD commit ID is used. If not specified, the default branch's HEAD commit ID is used. For Amazon S3: the version ID of the object that represents the build input ZIP file to use."
        artifacts:
          $ref: "#/components/schemas/BuildArtifacts"
          description: Information about the output artifacts for the build.
        secondaryArtifacts:
          $ref: "#/components/schemas/BuildArtifactsList"
          description: An array of ProjectArtifacts objects.
        cache:
          $ref: "#/components/schemas/ProjectCache"
          description: Information about the cache for the build.
        environment:
          $ref: "#/components/schemas/ProjectEnvironment"
          description: Information about the build environment for this build.
        serviceRole:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of a service role used for this build.
        logs:
          $ref: "#/components/schemas/LogsLocation"
          description: Information about the build's logs in CloudWatch Logs.
        timeoutInMinutes:
          $ref: "#/components/schemas/WrapperInt"
          description: How long, in minutes, from 5 to 2160 (36 hours), for CodeBuild to wait before timing out this build if it does not get marked as completed.
        queuedTimeoutInMinutes:
          $ref: "#/components/schemas/WrapperInt"
          description: The number of minutes a build is allowed to be queued before it times out.
        buildComplete:
          $ref: "#/components/schemas/Boolean"
          description: Whether the build is complete. True if complete; otherwise, false.
        initiator:
          $ref: "#/components/schemas/String"
          description: "The entity that started the build. Valid values include: If CodePipeline started the build, the pipeline's name (for example, codepipeline/my-demo-pipeline). If a user started the build, the user's name (for example, MyUserName). If the Jenkins plugin for CodeBuild started the build, the string CodeBuild-Jenkins-Plugin."
        vpcConfig:
          $ref: "#/components/schemas/VpcConfig"
          description: If your CodeBuild project accesses resources in an Amazon VPC, you provide this parameter that identifies the VPC ID and the list of security group IDs and subnet IDs. The security groups and subnets must belong to the same VPC. You must provide at least one security group and one subnet ID.
        networkInterface:
          $ref: "#/components/schemas/NetworkInterface"
          description: Describes a network interface.
        encryptionKey:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Key Management Service customer master key (CMK) to be used for encrypting the build output artifacts. You can use a cross-account KMS key to encrypt the build output artifacts if your service role has permission to that key. You can specify either the Amazon Resource Name (ARN) of the CMK or, if available, the CMK's alias (using the format alias/`<alias-name>`).
        exportedEnvironmentVariables:
          $ref: "#/components/schemas/ExportedEnvironmentVariables"
          description: A list of exported environment variables for this build. Exported environment variables are used in conjunction with CodePipeline to export environment variables from the current build stage to subsequent stages in the pipeline. For more information, see Working with variables in the CodePipeline User Guide.
        reportArns:
          $ref: "#/components/schemas/BuildReportArns"
          description: An array of the ARNs associated with this build's reports.
        fileSystemLocations:
          $ref: "#/components/schemas/ProjectFileSystemLocations"
          description: An array of ProjectFileSystemLocation objects for a CodeBuild build project. A ProjectFileSystemLocation object specifies the identifier, location, mountOptions, mountPoint, and type of a file system created using Amazon Elastic File System.
        debugSession:
          $ref: "#/components/schemas/DebugSession"
          description: Contains information about the debug session for this build.
        buildBatchArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the batch build that this build is a member of, if applicable.
        autoRetryConfig:
          $ref: "#/components/schemas/AutoRetryConfig"
          description: Information about the auto-retry configuration for the build.
    BuildPhases:
      type: array
      items:
        $ref: "#/components/schemas/BuildPhase"
    BuildPhase:
      description: Information about a stage for a build.
      type: object
      properties:
        phaseType:
          $ref: "#/components/schemas/BuildPhaseType"
          description: "The name of the build phase. Valid values include: BUILD Core build activities typically occur in this build phase. COMPLETED The build has been completed. DOWNLOAD_SOURCE Source code is being downloaded in this build phase. FINALIZING The build process is completing in this build phase. INSTALL Installation activities typically occur in this build phase. POST_BUILD Post-build activities typically occur in this build phase. PRE_BUILD Pre-build activities typically occur in this build phase. PROVISIONING The build environment is being set up. QUEUED The build has been submitted and is queued behind other submitted builds. SUBMITTED The build has been submitted. UPLOAD_ARTIFACTS Build output artifacts are being uploaded to the output location."
        phaseStatus:
          $ref: "#/components/schemas/StatusType"
          description: "The current status of the build phase. Valid values include: FAILED The build phase failed. FAULT The build phase faulted. IN_PROGRESS The build phase is still in progress. STOPPED The build phase stopped. SUCCEEDED The build phase succeeded. TIMED_OUT The build phase timed out."
        startTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the build phase started, expressed in Unix time format.
        endTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the build phase ended, expressed in Unix time format.
        durationInSeconds:
          $ref: "#/components/schemas/WrapperLong"
          description: How long, in seconds, between the starting and ending times of the build's phase.
        contexts:
          $ref: "#/components/schemas/PhaseContexts"
          description: Additional information about a build phase, especially to help troubleshoot a failed build.
    BuildPhaseType:
      type: string
      enum:
        - SUBMITTED
        - QUEUED
        - PROVISIONING
        - DOWNLOAD_SOURCE
        - INSTALL
        - PRE_BUILD
        - BUILD
        - POST_BUILD
        - UPLOAD_ARTIFACTS
        - FINALIZING
        - COMPLETED
    LogsLocation:
      description: Information about build logs in CloudWatch Logs.
      type: object
      properties:
        groupName:
          $ref: "#/components/schemas/String"
          description: The name of the CloudWatch Logs group for the build logs.
        streamName:
          $ref: "#/components/schemas/String"
          description: The name of the CloudWatch Logs stream for the build logs.
        deepLink:
          $ref: "#/components/schemas/String"
          description: The URL to an individual build log in CloudWatch Logs. The log stream is created during the PROVISIONING phase of a build and the deeplink will not be valid until it is created.
        s3DeepLink:
          $ref: "#/components/schemas/String"
          description: The URL to a build log in an S3 bucket.
        cloudWatchLogsArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the CloudWatch Logs stream for a build execution. Its format is arn:${Partition}:logs:${Region}:${Account}:log-group:${LogGroupName}:log-stream:${LogStreamName}. The CloudWatch Logs stream is created during the PROVISIONING phase of a build and the ARN will not be valid until it is created. For more information, see Resources Defined by CloudWatch Logs.
        s3LogsArn:
          $ref: "#/components/schemas/String"
          description: The ARN of S3 logs for a build project. Its format is arn:${Partition}:s3:::${BucketName}/${ObjectName}. For more information, see Resources Defined by Amazon S3.
        cloudWatchLogs:
          $ref: "#/components/schemas/CloudWatchLogsConfig"
          description: Information about CloudWatch Logs for a build project.
        s3Logs:
          $ref: "#/components/schemas/S3LogsConfig"
          description: Information about S3 logs for a build project.
    NetworkInterface:
      description: Describes a network interface.
      type: object
      properties:
        subnetId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the subnet.
        networkInterfaceId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the network interface.
    ExportedEnvironmentVariables:
      type: array
      items:
        $ref: "#/components/schemas/ExportedEnvironmentVariable"
    ExportedEnvironmentVariable:
      description: Contains information about an exported environment variable. Exported environment variables are used in conjunction with CodePipeline to export environment variables from the current build stage to subsequent stages in the pipeline. For more information, see Working with variables in the CodePipeline User Guide. During a build, the value of a variable is available starting with the install phase. It can be updated between the start of the install phase and the end of the post_build phase. After the post_build phase ends, the value of exported variables cannot change.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the exported environment variable.
        value:
          $ref: "#/components/schemas/String"
          description: The value assigned to the exported environment variable.
    DebugSession:
      description: Contains information about the debug session for a build. For more information, see Viewing a running build in Session Manager.
      type: object
      properties:
        sessionEnabled:
          $ref: "#/components/schemas/WrapperBoolean"
          description: Specifies if session debugging is enabled for this build.
        sessionTarget:
          $ref: "#/components/schemas/NonEmptyString"
          description: Contains the identifier of the Session Manager session used for the build. To work with the paused build, you open this session to examine, control, and resume the build.
    AutoRetryConfig:
      description: Information about the auto-retry configuration for the build.
      type: object
      properties:
        autoRetryLimit:
          $ref: "#/components/schemas/WrapperInt"
          description: The maximum number of additional automatic retries after a failed build. For example, if the auto-retry limit is set to 2, CodeBuild will call the RetryBuild API to automatically retry your build for up to 2 additional times.
        autoRetryNumber:
          $ref: "#/components/schemas/WrapperInt"
          description: The number of times that the build has been retried. The initial build will have an auto-retry number of 0.
        nextAutoRetry:
          $ref: "#/components/schemas/String"
          description: The build ARN of the auto-retried build triggered by the current build. The next auto-retry will be null for builds that don't trigger an auto-retry.
        previousAutoRetry:
          $ref: "#/components/schemas/String"
          description: The build ARN of the build that triggered the current auto-retry build. The previous auto-retry will be null for the initial build.
    CommandExecutionIds:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    BatchGetCommandExecutionsOutput:
      type: object
      properties:
        commandExecutions:
          $ref: "#/components/schemas/CommandExecutions"
          description: Information about the requested command executions.
        commandExecutionsNotFound:
          $ref: "#/components/schemas/CommandExecutionIds"
          description: The IDs of command executions for which information could not be found.
    CommandExecutions:
      type: array
      items:
        $ref: "#/components/schemas/CommandExecution"
    CommandExecution:
      description: Contains command execution information.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the command execution.
        sandboxId:
          $ref: "#/components/schemas/NonEmptyString"
          description: A sandboxId.
        submitTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the command execution process was initially submitted, expressed in Unix time format.
        startTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the command execution process started, expressed in Unix time format.
        endTime:
          $ref: "#/components/schemas/Timestamp"
          description: When the command execution process ended, expressed in Unix time format.
        status:
          $ref: "#/components/schemas/NonEmptyString"
          description: The status of the command execution.
        command:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The command that needs to be executed.
        type_:
          $ref: "#/components/schemas/CommandType"
          description: The command type.
        exitCode:
          $ref: "#/components/schemas/NonEmptyString"
          description: The exit code to return upon completion.
        standardOutputContent:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The text written by the command to stdout.
        standardErrContent:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The text written by the command to stderr.
        logs:
          $ref: "#/components/schemas/LogsLocation"
        sandboxArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: A sandboxArn.
    SensitiveNonEmptyString:
      type: string
      minLength: 1
    CommandType:
      type: string
      enum:
        - SHELL
    FleetNames:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    BatchGetFleetsOutput:
      type: object
      properties:
        fleets:
          $ref: "#/components/schemas/Fleets"
          description: Information about the requested compute fleets.
        fleetsNotFound:
          $ref: "#/components/schemas/FleetNames"
          description: The names of compute fleets for which information could not be found.
    Fleets:
      type: array
      items:
        $ref: "#/components/schemas/Fleet"
    Fleet:
      description: A set of dedicated instances for your build environment.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the compute fleet.
        name:
          $ref: "#/components/schemas/FleetName"
          description: The name of the compute fleet.
        id:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the compute fleet.
        created:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the compute fleet was created.
        lastModified:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the compute fleet was last modified.
        status:
          $ref: "#/components/schemas/FleetStatus"
          description: The status of the compute fleet.
        baseCapacity:
          $ref: "#/components/schemas/FleetCapacity"
          description: The initial number of machines allocated to the compute ﬂeet, which deﬁnes the number of builds that can run in parallel.
        environmentType:
          $ref: "#/components/schemas/EnvironmentType"
          description: The environment type of the compute fleet. The environment type ARM_CONTAINER is available only in regions US East (N. Virginia), US East (Ohio), US West (Oregon), EU (Ireland), Asia Pacific (Mumbai), Asia Pacific (Tokyo), Asia Pacific (Singapore), Asia Pacific (Sydney), EU (Frankfurt), and South America (São Paulo). The environment type ARM_EC2 is available only in regions US East (N. Virginia), US East (Ohio), US West (Oregon), EU (Ireland), EU (Frankfurt), Asia Pacific (Tokyo), Asia Pacific (Singapore), Asia Pacific (Sydney), South America (São Paulo), and Asia Pacific (Mumbai). The environment type LINUX_CONTAINER is available only in regions US East (N. Virginia), US East (Ohio), US West (Oregon), EU (Ireland), EU (Frankfurt), Asia Pacific (Tokyo), Asia Pacific (Singapore), Asia Pacific (Sydney), South America (São Paulo), and Asia Pacific (Mumbai). The environment type LINUX_EC2 is available only in regions US East (N. Virginia), US East (Ohio), US West (Oregon), EU (Ireland), EU (Frankfurt), Asia Pacific (Tokyo), Asia Pacific (Singapore), Asia Pacific (Sydney), South America (São Paulo), and Asia Pacific (Mumbai). The environment type LINUX_GPU_CONTAINER is available only in regions US East (N. Virginia), US East (Ohio), US West (Oregon), EU (Ireland), EU (Frankfurt), Asia Pacific (Tokyo), and Asia Pacific (Sydney). The environment type MAC_ARM is available for Medium fleets only in regions US East (N. Virginia), US East (Ohio), US West (Oregon), Asia Pacific (Sydney), and EU (Frankfurt) The environment type MAC_ARM is available for Large fleets only in regions US East (N. Virginia), US East (Ohio), US West (Oregon), and Asia Pacific (Sydney). The environment type WINDOWS_EC2 is available only in regions US East (N. Virginia), US East (Ohio), US West (Oregon), EU (Ireland), EU (Frankfurt), Asia Pacific (Tokyo), Asia Pacific (Singapore), Asia Pacific (Sydney), South America (São Paulo), and Asia Pacific (Mumbai). The environment type WINDOWS_SERVER_2019_CONTAINER is available only in regions US East (N. Virginia), US East (Ohio), US West (Oregon), Asia Pacific (Sydney), Asia Pacific (Tokyo), Asia Pacific (Mumbai) and EU (Ireland). The environment type WINDOWS_SERVER_2022_CONTAINER is available only in regions US East (N. Virginia), US East (Ohio), US West (Oregon), EU (Ireland), EU (Frankfurt), Asia Pacific (Sydney), Asia Pacific (Singapore), Asia Pacific (Tokyo), South America (São Paulo) and Asia Pacific (Mumbai). For more information, see Build environment compute types in the CodeBuild user guide.
        computeType:
          $ref: "#/components/schemas/ComputeType"
          description: "Information about the compute resources the compute fleet uses. Available values include: ATTRIBUTE_BASED_COMPUTE: Specify the amount of vCPUs, memory, disk space, and the type of machine. If you use ATTRIBUTE_BASED_COMPUTE, you must define your attributes by using computeConfiguration. CodeBuild will select the cheapest instance that satisfies your specified attributes. For more information, see Reserved capacity environment types in the CodeBuild User Guide. CUSTOM_INSTANCE_TYPE: Specify the instance type for your compute fleet. For a list of supported instance types, see Supported instance families in the CodeBuild User Guide. BUILD_GENERAL1_SMALL: Use up to 4 GiB memory and 2 vCPUs for builds. BUILD_GENERAL1_MEDIUM: Use up to 8 GiB memory and 4 vCPUs for builds. BUILD_GENERAL1_LARGE: Use up to 16 GiB memory and 8 vCPUs for builds, depending on your environment type. BUILD_GENERAL1_XLARGE: Use up to 72 GiB memory and 36 vCPUs for builds, depending on your environment type. BUILD_GENERAL1_2XLARGE: Use up to 144 GiB memory, 72 vCPUs, and 824 GB of SSD storage for builds. This compute type supports Docker images up to 100 GB uncompressed. BUILD_LAMBDA_1GB: Use up to 1 GiB memory for builds. Only available for environment type LINUX_LAMBDA_CONTAINER and ARM_LAMBDA_CONTAINER. BUILD_LAMBDA_2GB: Use up to 2 GiB memory for builds. Only available for environment type LINUX_LAMBDA_CONTAINER and ARM_LAMBDA_CONTAINER. BUILD_LAMBDA_4GB: Use up to 4 GiB memory for builds. Only available for environment type LINUX_LAMBDA_CONTAINER and ARM_LAMBDA_CONTAINER. BUILD_LAMBDA_8GB: Use up to 8 GiB memory for builds. Only available for environment type LINUX_LAMBDA_CONTAINER and ARM_LAMBDA_CONTAINER. BUILD_LAMBDA_10GB: Use up to 10 GiB memory for builds. Only available for environment type LINUX_LAMBDA_CONTAINER and ARM_LAMBDA_CONTAINER. If you use BUILD_GENERAL1_SMALL: For environment type LINUX_CONTAINER, you can use up to 4 GiB memory and 2 vCPUs for builds. For environment type LINUX_GPU_CONTAINER, you can use up to 16 GiB memory, 4 vCPUs, and 1 NVIDIA A10G Tensor Core GPU for builds. For environment type ARM_CONTAINER, you can use up to 4 GiB memory and 2 vCPUs on ARM-based processors for builds. If you use BUILD_GENERAL1_LARGE: For environment type LINUX_CONTAINER, you can use up to 16 GiB memory and 8 vCPUs for builds. For environment type LINUX_GPU_CONTAINER, you can use up to 255 GiB memory, 32 vCPUs, and 4 NVIDIA Tesla V100 GPUs for builds. For environment type ARM_CONTAINER, you can use up to 16 GiB memory and 8 vCPUs on ARM-based processors for builds. For more information, see On-demand environment types in the CodeBuild User Guide."
        computeConfiguration:
          $ref: "#/components/schemas/ComputeConfiguration"
          description: The compute configuration of the compute fleet. This is only required if computeType is set to ATTRIBUTE_BASED_COMPUTE or CUSTOM_INSTANCE_TYPE.
        scalingConfiguration:
          $ref: "#/components/schemas/ScalingConfigurationOutput"
          description: The scaling configuration of the compute fleet.
        overflowBehavior:
          $ref: "#/components/schemas/FleetOverflowBehavior"
          description: The compute fleet overflow behavior. For overflow behavior QUEUE, your overflow builds need to wait on the existing fleet instance to become available. For overflow behavior ON_DEMAND, your overflow builds run on CodeBuild on-demand. If you choose to set your overflow behavior to on-demand while creating a VPC-connected fleet, make sure that you add the required VPC permissions to your project service role. For more information, see Example policy statement to allow CodeBuild access to Amazon Web Services services required to create a VPC network interface.
        vpcConfig:
          $ref: "#/components/schemas/VpcConfig"
        proxyConfiguration:
          $ref: "#/components/schemas/ProxyConfiguration"
          description: The proxy configuration of the compute fleet.
        imageId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Machine Image (AMI) of the compute fleet.
        fleetServiceRole:
          $ref: "#/components/schemas/NonEmptyString"
          description: The service role associated with the compute fleet. For more information, see Allow a user to add a permission policy for a fleet service role in the CodeBuild User Guide.
        tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tag key and value pairs associated with this compute fleet. These tags are available for use by Amazon Web Services services that support CodeBuild build project tags.
    FleetName:
      type: string
      minLength: 2
      maxLength: 128
      pattern: "[A-Za-z0-9][A-Za-z0-9\\-_]{1,127}"
    FleetStatus:
      description: The status of the compute fleet.
      type: object
      properties:
        statusCode:
          $ref: "#/components/schemas/FleetStatusCode"
          description: "The status code of the compute fleet. Valid values include: CREATING: The compute fleet is being created. UPDATING: The compute fleet is being updated. ROTATING: The compute fleet is being rotated. PENDING_DELETION: The compute fleet is pending deletion. DELETING: The compute fleet is being deleted. CREATE_FAILED: The compute fleet has failed to create. UPDATE_ROLLBACK_FAILED: The compute fleet has failed to update and could not rollback to previous state. ACTIVE: The compute fleet has succeeded and is active."
        context:
          $ref: "#/components/schemas/FleetContextCode"
          description: "Additional information about a compute fleet. Valid values include: CREATE_FAILED: The compute fleet has failed to create. UPDATE_FAILED: The compute fleet has failed to update."
        message:
          $ref: "#/components/schemas/String"
          description: A message associated with the status of a compute fleet.
    FleetStatusCode:
      type: string
      enum:
        - CREATING
        - UPDATING
        - ROTATING
        - PENDING_DELETION
        - DELETING
        - CREATE_FAILED
        - UPDATE_ROLLBACK_FAILED
        - ACTIVE
    FleetContextCode:
      type: string
      enum:
        - CREATE_FAILED
        - UPDATE_FAILED
        - ACTION_REQUIRED
        - PENDING_DELETION
        - INSUFFICIENT_CAPACITY
    FleetCapacity:
      type: integer
    ScalingConfigurationOutput:
      description: The scaling configuration output of a compute fleet.
      type: object
      properties:
        scalingType:
          $ref: "#/components/schemas/FleetScalingType"
          description: The scaling type for a compute fleet.
        targetTrackingScalingConfigs:
          $ref: "#/components/schemas/TargetTrackingScalingConfigurations"
          description: A list of TargetTrackingScalingConfiguration objects.
        maxCapacity:
          $ref: "#/components/schemas/FleetCapacity"
          description: The maximum number of instances in the ﬂeet when auto-scaling.
        desiredCapacity:
          $ref: "#/components/schemas/FleetCapacity"
          description: The desired number of instances in the ﬂeet when auto-scaling.
    FleetScalingType:
      type: string
      enum:
        - TARGET_TRACKING_SCALING
    TargetTrackingScalingConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/TargetTrackingScalingConfiguration"
    TargetTrackingScalingConfiguration:
      description: Defines when a new instance is auto-scaled into the compute fleet.
      type: object
      properties:
        metricType:
          $ref: "#/components/schemas/FleetScalingMetricType"
          description: The metric type to determine auto-scaling.
        targetValue:
          $ref: "#/components/schemas/WrapperDouble"
          description: The value of metricType when to start scaling.
    FleetScalingMetricType:
      type: string
      enum:
        - FLEET_UTILIZATION_RATE
    WrapperDouble:
      type: number
      format: double
    FleetOverflowBehavior:
      type: string
      enum:
        - QUEUE
        - ON_DEMAND
    ProxyConfiguration:
      description: Information about the proxy configurations that apply network access control to your reserved capacity instances.
      type: object
      properties:
        defaultBehavior:
          $ref: "#/components/schemas/FleetProxyRuleBehavior"
          description: The default behavior of outgoing traffic.
        orderedProxyRules:
          $ref: "#/components/schemas/FleetProxyRules"
          description: An array of FleetProxyRule objects that represent the specified destination domains or IPs to allow or deny network access control to.
    FleetProxyRuleBehavior:
      type: string
      enum:
        - ALLOW_ALL
        - DENY_ALL
    FleetProxyRules:
      type: array
      items:
        $ref: "#/components/schemas/FleetProxyRule"
    FleetProxyRule:
      description: Information about the proxy rule for your reserved capacity instances.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/FleetProxyRuleType"
          description: The type of proxy rule.
        effect:
          $ref: "#/components/schemas/FleetProxyRuleEffectType"
          description: The behavior of the proxy rule.
        entities:
          $ref: "#/components/schemas/FleetProxyRuleEntities"
          description: The destination of the proxy rule.
      required:
        - type_
        - effect
        - entities
    FleetProxyRuleType:
      type: string
      enum:
        - DOMAIN
        - IP
    FleetProxyRuleEffectType:
      type: string
      enum:
        - ALLOW
        - DENY
    FleetProxyRuleEntities:
      type: array
      items:
        $ref: "#/components/schemas/String"
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A tag, consisting of a key and a value. This tag is available for use by Amazon Web Services services that support tags in CodeBuild.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/KeyInput"
          description: The tag's key.
        value:
          $ref: "#/components/schemas/ValueInput"
          description: The tag's value.
    KeyInput:
      type: string
      minLength: 1
      maxLength: 127
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=@+\-]*)$
    ValueInput:
      type: string
      minLength: 0
      maxLength: 255
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=@+\-]*)$
    ProjectNames:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    BatchGetProjectsOutput:
      type: object
      properties:
        projects:
          $ref: "#/components/schemas/Projects"
          description: Information about the requested build projects.
        projectsNotFound:
          $ref: "#/components/schemas/ProjectNames"
          description: The names of build projects for which information could not be found.
    Projects:
      type: array
      items:
        $ref: "#/components/schemas/Project"
    Project:
      description: Information about a build project.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ProjectName"
          description: The name of the build project.
        arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the build project.
        description:
          $ref: "#/components/schemas/ProjectDescription"
          description: A description that makes the build project easy to identify.
        source:
          $ref: "#/components/schemas/ProjectSource"
          description: Information about the build input source code for this build project.
        secondarySources:
          $ref: "#/components/schemas/ProjectSources"
          description: An array of ProjectSource objects.
        sourceVersion:
          $ref: "#/components/schemas/String"
          description: "A version of the build input to be built for this project. If not specified, the latest version is used. If specified, it must be one of: For CodeCommit: the commit ID, branch, or Git tag to use. For GitHub: the commit ID, pull request ID, branch name, or tag name that corresponds to the version of the source code you want to build. If a pull request ID is specified, it must use the format pr/pull-request-ID (for example pr/25). If a branch name is specified, the branch's HEAD commit ID is used. If not specified, the default branch's HEAD commit ID is used. For GitLab: the commit ID, branch, or Git tag to use. For Bitbucket: the commit ID, branch name, or tag name that corresponds to the version of the source code you want to build. If a branch name is specified, the branch's HEAD commit ID is used. If not specified, the default branch's HEAD commit ID is used. For Amazon S3: the version ID of the object that represents the build input ZIP file to use. If sourceVersion is specified at the build level, then that version takes precedence over this sourceVersion (at the project level). For more information, see Source Version Sample with CodeBuild in the CodeBuild User Guide."
        secondarySourceVersions:
          $ref: "#/components/schemas/ProjectSecondarySourceVersions"
          description: An array of ProjectSourceVersion objects. If secondarySourceVersions is specified at the build level, then they take over these secondarySourceVersions (at the project level).
        artifacts:
          $ref: "#/components/schemas/ProjectArtifacts"
          description: Information about the build output artifacts for the build project.
        secondaryArtifacts:
          $ref: "#/components/schemas/ProjectArtifactsList"
          description: An array of ProjectArtifacts objects.
        cache:
          $ref: "#/components/schemas/ProjectCache"
          description: Information about the cache for the build project.
        environment:
          $ref: "#/components/schemas/ProjectEnvironment"
          description: Information about the build environment for this build project.
        serviceRole:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the IAM role that enables CodeBuild to interact with dependent Amazon Web Services services on behalf of the Amazon Web Services account.
        timeoutInMinutes:
          $ref: "#/components/schemas/BuildTimeOut"
          description: How long, in minutes, from 5 to 2160 (36 hours), for CodeBuild to wait before timing out any related build that did not get marked as completed. The default is 60 minutes.
        queuedTimeoutInMinutes:
          $ref: "#/components/schemas/TimeOut"
          description: The number of minutes a build is allowed to be queued before it times out.
        encryptionKey:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Key Management Service customer master key (CMK) to be used for encrypting the build output artifacts. You can use a cross-account KMS key to encrypt the build output artifacts if your service role has permission to that key. You can specify either the Amazon Resource Name (ARN) of the CMK or, if available, the CMK's alias (using the format alias/`<alias-name>`). If you don't specify a value, CodeBuild uses the managed CMK for Amazon Simple Storage Service (Amazon S3).
        tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tag key and value pairs associated with this build project. These tags are available for use by Amazon Web Services services that support CodeBuild build project tags.
        created:
          $ref: "#/components/schemas/Timestamp"
          description: When the build project was created, expressed in Unix time format.
        lastModified:
          $ref: "#/components/schemas/Timestamp"
          description: When the build project's settings were last modified, expressed in Unix time format.
        webhook:
          $ref: "#/components/schemas/Webhook"
          description: Information about a webhook that connects repository events to a build project in CodeBuild.
        vpcConfig:
          $ref: "#/components/schemas/VpcConfig"
          description: Information about the VPC configuration that CodeBuild accesses.
        badge:
          $ref: "#/components/schemas/ProjectBadge"
          description: Information about the build badge for the build project.
        logsConfig:
          $ref: "#/components/schemas/LogsConfig"
          description: Information about logs for the build project. A project can create logs in CloudWatch Logs, an S3 bucket, or both.
        fileSystemLocations:
          $ref: "#/components/schemas/ProjectFileSystemLocations"
          description: An array of ProjectFileSystemLocation objects for a CodeBuild build project. A ProjectFileSystemLocation object specifies the identifier, location, mountOptions, mountPoint, and type of a file system created using Amazon Elastic File System.
        buildBatchConfig:
          $ref: "#/components/schemas/ProjectBuildBatchConfig"
          description: A ProjectBuildBatchConfig object that defines the batch build options for the project.
        concurrentBuildLimit:
          $ref: "#/components/schemas/WrapperInt"
          description: The maximum number of concurrent builds that are allowed for this project. New builds are only started if the current number of builds is less than or equal to this limit. If the current build count meets this limit, new builds are throttled and are not run.
        projectVisibility:
          $ref: "#/components/schemas/ProjectVisibilityType"
        publicProjectAlias:
          $ref: "#/components/schemas/NonEmptyString"
          description: Contains the project identifier used with the public build APIs.
        resourceAccessRole:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the IAM role that enables CodeBuild to access the CloudWatch Logs and Amazon S3 artifacts for the project's builds.
        autoRetryLimit:
          $ref: "#/components/schemas/WrapperInt"
          description: The maximum number of additional automatic retries after a failed build. For example, if the auto-retry limit is set to 2, CodeBuild will call the RetryBuild API to automatically retry your build for up to 2 additional times.
    ProjectName:
      type: string
      minLength: 2
      maxLength: 150
      pattern: "[A-Za-z0-9][A-Za-z0-9\\-_]{1,149}"
    ProjectDescription:
      type: string
      minLength: 0
      maxLength: 255
    ProjectArtifacts:
      description: Information about the build output artifacts for the build project.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/ArtifactsType"
          description: "The type of build output artifact. Valid values include: CODEPIPELINE: The build project has build output generated through CodePipeline. The CODEPIPELINE type is not supported for secondaryArtifacts. NO_ARTIFACTS: The build project does not produce any build output. S3: The build project stores build output in Amazon S3."
        location:
          $ref: "#/components/schemas/String"
          description: "Information about the build output artifact location: If type is set to CODEPIPELINE, CodePipeline ignores this value if specified. This is because CodePipeline manages its build output locations instead of CodeBuild. If type is set to NO_ARTIFACTS, this value is ignored if specified, because no build output is produced. If type is set to S3, this is the name of the output bucket."
        path:
          $ref: "#/components/schemas/String"
          description: "Along with namespaceType and name, the pattern that CodeBuild uses to name and store the output artifact: If type is set to CODEPIPELINE, CodePipeline ignores this value if specified. This is because CodePipeline manages its build output names instead of CodeBuild. If type is set to NO_ARTIFACTS, this value is ignored if specified, because no build output is produced. If type is set to S3, this is the path to the output artifact. If path is not specified, path is not used. For example, if path is set to MyArtifacts, namespaceType is set to NONE, and name is set to MyArtifact.zip, the output artifact is stored in the output bucket at MyArtifacts/MyArtifact.zip."
        namespaceType:
          $ref: "#/components/schemas/ArtifactNamespace"
          description: "Along with path and name, the pattern that CodeBuild uses to determine the name and location to store the output artifact: If type is set to CODEPIPELINE, CodePipeline ignores this value if specified. This is because CodePipeline manages its build output names instead of CodeBuild. If type is set to NO_ARTIFACTS, this value is ignored if specified, because no build output is produced. If type is set to S3, valid values include: BUILD_ID: Include the build ID in the location of the build output artifact. NONE: Do not include the build ID. This is the default if namespaceType is not specified. For example, if path is set to MyArtifacts, namespaceType is set to BUILD_ID, and name is set to MyArtifact.zip, the output artifact is stored in MyArtifacts/`<build-ID>`/MyArtifact.zip."
        name:
          $ref: "#/components/schemas/String"
          description: 'Along with path and namespaceType, the pattern that CodeBuild uses to name and store the output artifact: If type is set to CODEPIPELINE, CodePipeline ignores this value if specified. This is because CodePipeline manages its build output names instead of CodeBuild. If type is set to NO_ARTIFACTS, this value is ignored if specified, because no build output is produced. If type is set to S3, this is the name of the output artifact object. If you set the name to be a forward slash ("/"), the artifact is stored in the root of the output bucket. For example: If path is set to MyArtifacts, namespaceType is set to BUILD_ID, and name is set to MyArtifact.zip, then the output artifact is stored in MyArtifacts/`<build-ID>`/MyArtifact.zip. If path is empty, namespaceType is set to NONE, and name is set to "/", the output artifact is stored in the root of the output bucket. If path is set to MyArtifacts, namespaceType is set to BUILD_ID, and name is set to "/", the output artifact is stored in MyArtifacts/`<build-ID>`.'
        packaging:
          $ref: "#/components/schemas/ArtifactPackaging"
          description: "The type of build output artifact to create: If type is set to CODEPIPELINE, CodePipeline ignores this value if specified. This is because CodePipeline manages its build output artifacts instead of CodeBuild. If type is set to NO_ARTIFACTS, this value is ignored if specified, because no build output is produced. If type is set to S3, valid values include: NONE: CodeBuild creates in the output bucket a folder that contains the build output. This is the default if packaging is not specified. ZIP: CodeBuild creates in the output bucket a ZIP file that contains the build output."
        overrideArtifactName:
          $ref: "#/components/schemas/WrapperBoolean"
          description: If this flag is set, a name specified in the buildspec file overrides the artifact name. The name specified in a buildspec file is calculated at build time and uses the Shell Command Language. For example, you can append a date and time to your artifact name so that it is always unique.
        encryptionDisabled:
          $ref: "#/components/schemas/WrapperBoolean"
          description: Set to true if you do not want your output artifacts encrypted. This option is valid only if your artifacts type is Amazon S3. If this is set with another artifacts type, an invalidInputException is thrown.
        artifactIdentifier:
          $ref: "#/components/schemas/String"
          description: An identifier for this artifact definition.
        bucketOwnerAccess:
          $ref: "#/components/schemas/BucketOwnerAccess"
      required:
        - type_
    ArtifactNamespace:
      type: string
      enum:
        - NONE
        - BUILD_ID
    ArtifactPackaging:
      type: string
      enum:
        - NONE
        - ZIP
    ProjectArtifactsList:
      type: array
      items:
        $ref: "#/components/schemas/ProjectArtifacts"
    BuildTimeOut:
      type: integer
      minimum: 5
      maximum: 2160
    TimeOut:
      type: integer
      minimum: 5
      maximum: 480
    Webhook:
      description: Information about a webhook that connects repository events to a build project in CodeBuild.
      type: object
      properties:
        url:
          $ref: "#/components/schemas/NonEmptyString"
          description: The URL to the webhook.
        payloadUrl:
          $ref: "#/components/schemas/NonEmptyString"
          description: The CodeBuild endpoint where webhook events are sent.
        secret:
          $ref: "#/components/schemas/NonEmptyString"
          description: The secret token of the associated repository. A Bitbucket webhook does not support secret.
        branchFilter:
          $ref: "#/components/schemas/String"
          description: A regular expression used to determine which repository branches are built when a webhook is triggered. If the name of a branch matches the regular expression, then it is built. If branchFilter is empty, then all branches are built. It is recommended that you use filterGroups instead of branchFilter.
        filterGroups:
          $ref: "#/components/schemas/FilterGroups"
          description: An array of arrays of WebhookFilter objects used to determine which webhooks are triggered. At least one WebhookFilter in the array must specify EVENT as its type. For a build to be triggered, at least one filter group in the filterGroups array must pass. For a filter group to pass, each of its filters must pass.
        buildType:
          $ref: "#/components/schemas/WebhookBuildType"
          description: "Specifies the type of build this webhook will trigger. RUNNER_BUILDKITE_BUILD is only available for NO_SOURCE source type projects configured for Buildkite runner builds. For more information about CodeBuild-hosted Buildkite runner builds, see Tutorial: Configure a CodeBuild-hosted Buildkite runner in the CodeBuild user guide."
        manualCreation:
          $ref: "#/components/schemas/WrapperBoolean"
          description: If manualCreation is true, CodeBuild doesn't create a webhook in GitHub and instead returns payloadUrl and secret values for the webhook. The payloadUrl and secret values in the output can be used to manually create a webhook within GitHub. manualCreation is only available for GitHub webhooks.
        lastModifiedSecret:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that indicates the last time a repository's secret token was modified.
        scopeConfiguration:
          $ref: "#/components/schemas/ScopeConfiguration"
          description: The scope configuration for global or organization webhooks. Global or organization webhooks are only available for GitHub and Github Enterprise webhooks.
        status:
          $ref: "#/components/schemas/WebhookStatus"
          description: "The status of the webhook. Valid values include: CREATING: The webhook is being created. CREATE_FAILED: The webhook has failed to create. ACTIVE: The webhook has succeeded and is active. DELETING: The webhook is being deleted."
        statusMessage:
          $ref: "#/components/schemas/String"
          description: A message associated with the status of a webhook.
        pullRequestBuildPolicy:
          $ref: "#/components/schemas/PullRequestBuildPolicy"
    FilterGroups:
      type: array
      items:
        $ref: "#/components/schemas/FilterGroup"
    FilterGroup:
      type: array
      items:
        $ref: "#/components/schemas/WebhookFilter"
    WebhookFilter:
      description: A filter used to determine which webhooks trigger a build.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/WebhookFilterType"
          description: "The type of webhook filter. There are 11 webhook filter types: EVENT, ACTOR_ACCOUNT_ID, HEAD_REF, BASE_REF, FILE_PATH, COMMIT_MESSAGE, TAG_NAME, RELEASE_NAME, REPOSITORY_NAME, ORGANIZATION_NAME, and WORKFLOW_NAME. EVENT A webhook event triggers a build when the provided pattern matches one of nine event types: PUSH, PULL_REQUEST_CREATED, PULL_REQUEST_UPDATED, PULL_REQUEST_CLOSED, PULL_REQUEST_REOPENED, PULL_REQUEST_MERGED, RELEASED, PRERELEASED, and WORKFLOW_JOB_QUEUED. The EVENT patterns are specified as a comma-separated string. For example, PUSH, PULL_REQUEST_CREATED, PULL_REQUEST_UPDATED filters all push, pull request created, and pull request updated events. Types PULL_REQUEST_REOPENED and WORKFLOW_JOB_QUEUED work with GitHub and GitHub Enterprise only. Types RELEASED and PRERELEASED work with GitHub only. ACTOR_ACCOUNT_ID A webhook event triggers a build when a GitHub, GitHub Enterprise, or Bitbucket account ID matches the regular expression pattern. HEAD_REF A webhook event triggers a build when the head reference matches the regular expression pattern. For example, refs/heads/branch-name and refs/tags/tag-name. Works with GitHub and GitHub Enterprise push, GitHub and GitHub Enterprise pull request, Bitbucket push, and Bitbucket pull request events. BASE_REF A webhook event triggers a build when the base reference matches the regular expression pattern. For example, refs/heads/branch-name. Works with pull request events only. FILE_PATH A webhook triggers a build when the path of a changed file matches the regular expression pattern. Works with push and pull request events only. COMMIT_MESSAGE A webhook triggers a build when the head commit message matches the regular expression pattern. Works with push and pull request events only. TAG_NAME A webhook triggers a build when the tag name of the release matches the regular expression pattern. Works with RELEASED and PRERELEASED events only. RELEASE_NAME A webhook triggers a build when the release name matches the regular expression pattern. Works with RELEASED and PRERELEASED events only. REPOSITORY_NAME A webhook triggers a build when the repository name matches the regular expression pattern. Works with GitHub global or organization webhooks only. ORGANIZATION_NAME A webhook triggers a build when the organization name matches the regular expression pattern. Works with GitHub global webhooks only. WORKFLOW_NAME A webhook triggers a build when the workflow name matches the regular expression pattern. Works with WORKFLOW_JOB_QUEUED events only. For CodeBuild-hosted Buildkite runner builds, WORKFLOW_NAME filters will filter by pipeline name."
        pattern_:
          $ref: "#/components/schemas/String"
          description: For a WebHookFilter that uses EVENT type, a comma-separated string that specifies one or more events. For example, the webhook filter PUSH, PULL_REQUEST_CREATED, PULL_REQUEST_UPDATED allows all push, pull request created, and pull request updated events to trigger a build. For a WebHookFilter that uses any of the other filter types, a regular expression pattern. For example, a WebHookFilter that uses HEAD_REF for its type and the pattern ^refs/heads/ triggers a build when the head reference is a branch with a reference name refs/heads/branch-name.
        excludeMatchedPattern:
          $ref: "#/components/schemas/WrapperBoolean"
          description: Used to indicate that the pattern determines which webhook events do not trigger a build. If true, then a webhook event that does not match the pattern triggers a build. If false, then a webhook event that matches the pattern triggers a build.
      required:
        - type_
        - pattern_
    WebhookFilterType:
      type: string
      enum:
        - EVENT
        - BASE_REF
        - HEAD_REF
        - ACTOR_ACCOUNT_ID
        - FILE_PATH
        - COMMIT_MESSAGE
        - WORKFLOW_NAME
        - TAG_NAME
        - RELEASE_NAME
        - REPOSITORY_NAME
        - ORGANIZATION_NAME
    WebhookBuildType:
      type: string
      enum:
        - BUILD
        - BUILD_BATCH
        - RUNNER_BUILDKITE_BUILD
    ScopeConfiguration:
      description: Contains configuration information about the scope for a webhook.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of either the group, enterprise, or organization that will send webhook events to CodeBuild, depending on the type of webhook.
        domain:
          $ref: "#/components/schemas/String"
          description: The domain of the GitHub Enterprise organization or the GitLab Self Managed group. Note that this parameter is only required if your project's source type is GITHUB_ENTERPRISE or GITLAB_SELF_MANAGED.
        scope:
          $ref: "#/components/schemas/WebhookScopeType"
          description: The type of scope for a GitHub or GitLab webhook. The scope default is GITHUB_ORGANIZATION.
      required:
        - name
        - scope
    WebhookScopeType:
      type: string
      enum:
        - GITHUB_ORGANIZATION
        - GITHUB_GLOBAL
        - GITLAB_GROUP
    WebhookStatus:
      type: string
      enum:
        - CREATING
        - CREATE_FAILED
        - ACTIVE
        - DELETING
    PullRequestBuildPolicy:
      description: A PullRequestBuildPolicy object that defines comment-based approval requirements for triggering builds on pull requests. This policy helps control when automated builds are executed based on contributor permissions and approval workflows.
      type: object
      properties:
        requiresCommentApproval:
          $ref: "#/components/schemas/PullRequestBuildCommentApproval"
          description: "Specifies when comment-based approval is required before triggering a build on pull requests. This setting determines whether builds run automatically or require explicit approval through comments. DISABLED: Builds trigger automatically without requiring comment approval ALL_PULL_REQUESTS: All pull requests require comment approval before builds execute (unless contributor is one of the approver roles) FORK_PULL_REQUESTS: Only pull requests from forked repositories require comment approval (unless contributor is one of the approver roles)"
        approverRoles:
          $ref: "#/components/schemas/PullRequestBuildApproverRoles"
          description: List of repository roles that have approval privileges for pull request builds when comment approval is required. Only users with these roles can provide valid comment approvals. If a pull request contributor is one of these roles, their pull request builds will trigger automatically. This field is only applicable when requiresCommentApproval is not DISABLED.
      required:
        - requiresCommentApproval
    PullRequestBuildCommentApproval:
      type: string
      enum:
        - DISABLED
        - ALL_PULL_REQUESTS
        - FORK_PULL_REQUESTS
    PullRequestBuildApproverRoles:
      type: array
      items:
        $ref: "#/components/schemas/PullRequestBuildApproverRole"
    PullRequestBuildApproverRole:
      type: string
      enum:
        - GITHUB_READ
        - GITHUB_TRIAGE
        - GITHUB_WRITE
        - GITHUB_MAINTAIN
        - GITHUB_ADMIN
        - GITLAB_GUEST
        - GITLAB_PLANNER
        - GITLAB_REPORTER
        - GITLAB_DEVELOPER
        - GITLAB_MAINTAINER
        - GITLAB_OWNER
        - BITBUCKET_READ
        - BITBUCKET_WRITE
        - BITBUCKET_ADMIN
    ProjectBadge:
      description: Information about the build badge for the build project.
      type: object
      properties:
        badgeEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Set this to true to generate a publicly accessible URL for your project's build badge.
        badgeRequestUrl:
          $ref: "#/components/schemas/String"
          description: The publicly-accessible URL through which you can access the build badge for your project.
    ProjectVisibilityType:
      description: "Specifies the visibility of the project's builds. Possible values are: PUBLIC_READ The project builds are visible to the public. PRIVATE The project builds are not visible to the public."
      type: string
      enum:
        - PUBLIC_READ
        - PRIVATE
    ReportGroupArns:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    BatchGetReportGroupsOutput:
      type: object
      properties:
        reportGroups:
          $ref: "#/components/schemas/ReportGroups"
          description: The array of report groups returned by BatchGetReportGroups.
        reportGroupsNotFound:
          $ref: "#/components/schemas/ReportGroupArns"
          description: An array of ARNs passed to BatchGetReportGroups that are not associated with a ReportGroup.
    ReportGroups:
      type: array
      items:
        $ref: "#/components/schemas/ReportGroup"
    ReportGroup:
      description: A series of reports. Each report contains information about the results from running a series of test cases. You specify the test cases for a report group in the buildspec for a build project using one or more paths to the test case files.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the ReportGroup.
        name:
          $ref: "#/components/schemas/ReportGroupName"
          description: The name of the ReportGroup.
        type_:
          $ref: "#/components/schemas/ReportType"
          description: "The type of the ReportGroup. This can be one of the following values: CODE_COVERAGE The report group contains code coverage reports. TEST The report group contains test reports."
        exportConfig:
          $ref: "#/components/schemas/ReportExportConfig"
          description: Information about the destination where the raw data of this ReportGroup is exported.
        created:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time this ReportGroup was created.
        lastModified:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time this ReportGroup was last modified.
        tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tag key and value pairs associated with this report group. These tags are available for use by Amazon Web Services services that support CodeBuild report group tags.
        status:
          $ref: "#/components/schemas/ReportGroupStatusType"
          description: "The status of the report group. This property is read-only. This can be one of the following values: ACTIVE The report group is active. DELETING The report group is in the process of being deleted."
    ReportGroupName:
      type: string
      minLength: 2
      maxLength: 128
    ReportType:
      type: string
      enum:
        - TEST
        - CODE_COVERAGE
    ReportExportConfig:
      description: Information about the location where the run of a report is exported.
      type: object
      properties:
        exportConfigType:
          $ref: "#/components/schemas/ReportExportConfigType"
          description: "The export configuration type. Valid values are: S3: The report results are exported to an S3 bucket. NO_EXPORT: The report results are not exported."
        s3Destination:
          $ref: "#/components/schemas/S3ReportExportConfig"
          description: A S3ReportExportConfig object that contains information about the S3 bucket where the run of a report is exported.
    ReportExportConfigType:
      type: string
      enum:
        - S3
        - NO_EXPORT
    S3ReportExportConfig:
      description: Information about the S3 bucket where the raw data of a report are exported.
      type: object
      properties:
        bucket:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the S3 bucket where the raw data of a report are exported.
        bucketOwner:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services account identifier of the owner of the Amazon S3 bucket. This allows report data to be exported to an Amazon S3 bucket that is owned by an account other than the account running the build.
        path:
          $ref: "#/components/schemas/String"
          description: The path to the exported report's raw data results.
        packaging:
          $ref: "#/components/schemas/ReportPackagingType"
          description: "The type of build output artifact to create. Valid values include: NONE: CodeBuild creates the raw data in the output bucket. This is the default if packaging is not specified. ZIP: CodeBuild creates a ZIP file with the raw data in the output bucket."
        encryptionKey:
          $ref: "#/components/schemas/NonEmptyString"
          description: The encryption key for the report's encrypted raw data.
        encryptionDisabled:
          $ref: "#/components/schemas/WrapperBoolean"
          description: A boolean value that specifies if the results of a report are encrypted.
    ReportPackagingType:
      type: string
      enum:
        - ZIP
        - NONE
    ReportGroupStatusType:
      type: string
      enum:
        - ACTIVE
        - DELETING
    ReportArns:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    BatchGetReportsOutput:
      type: object
      properties:
        reports:
          $ref: "#/components/schemas/Reports"
          description: The array of Report objects returned by BatchGetReports.
        reportsNotFound:
          $ref: "#/components/schemas/ReportArns"
          description: An array of ARNs passed to BatchGetReportGroups that are not associated with a Report.
    Reports:
      type: array
      items:
        $ref: "#/components/schemas/Report"
    Report:
      description: Information about the results from running a series of test cases during the run of a build project. The test cases are specified in the buildspec for the build project using one or more paths to the test case files. You can specify any type of tests you want, such as unit tests, integration tests, and functional tests.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the report run.
        type_:
          $ref: "#/components/schemas/ReportType"
          description: The type of the report that was run. CODE_COVERAGE A code coverage report. TEST A test report.
        name:
          $ref: "#/components/schemas/String"
          description: The name of the report that was run.
        reportGroupArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the report group associated with this report.
        executionId:
          $ref: "#/components/schemas/String"
