  /StartBuild:
    post:
      operationId: StartBuild
      description: "Starts running a build with the settings defined in the project. These setting include: how to run a build, where to get the source code, which build environment to use, which build commands to run, and where to store the build output. You can also start a build run by overriding some of the build settings in the project. The overrides only apply for that specific start build request. The settings in the project are unaltered."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeBuild_20161006.StartBuild
            default: CodeBuild_20161006.StartBuild
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                projectName:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: The name of the CodeBuild build project to start running a build.
                secondarySourcesOverride:
                  $ref: "#/components/schemas/ProjectSources"
                  description: An array of ProjectSource objects.
                secondarySourcesVersionOverride:
                  $ref: "#/components/schemas/ProjectSecondarySourceVersions"
                  description: An array of ProjectSourceVersion objects that specify one or more versions of the project's secondary sources to be used for this build only.
                sourceVersion:
                  $ref: "#/components/schemas/String"
                  description: "The version of the build input to be built, for this build only. If not specified, the latest version is used. If specified, the contents depends on the source provider: CodeCommit The commit ID, branch, or Git tag to use. GitHub The commit ID, pull request ID, branch name, or tag name that corresponds to the version of the source code you want to build. If a pull request ID is specified, it must use the format pr/pull-request-ID (for example pr/25). If a branch name is specified, the branch's HEAD commit ID is used. If not specified, the default branch's HEAD commit ID is used. GitLab The commit ID, branch, or Git tag to use. Bitbucket The commit ID, branch name, or tag name that corresponds to the version of the source code you want to build. If a branch name is specified, the branch's HEAD commit ID is used. If not specified, the default branch's HEAD commit ID is used. Amazon S3 The version ID of the object that represents the build input ZIP file to use. If sourceVersion is specified at the project level, then this sourceVersion (at the build level) takes precedence. For more information, see Source Version Sample with CodeBuild in the CodeBuild User Guide."
                artifactsOverride:
                  $ref: "#/components/schemas/ProjectArtifacts"
                  description: Build output artifact settings that override, for this build only, the latest ones already defined in the build project.
                secondaryArtifactsOverride:
                  $ref: "#/components/schemas/ProjectArtifactsList"
                  description: An array of ProjectArtifacts objects.
                environmentVariablesOverride:
                  $ref: "#/components/schemas/EnvironmentVariables"
                  description: A set of environment variables that overrides, for this build only, the latest ones already defined in the build project.
                sourceTypeOverride:
                  $ref: "#/components/schemas/SourceType"
                  description: A source input type, for this build, that overrides the source input defined in the build project.
                sourceLocationOverride:
                  $ref: "#/components/schemas/String"
                  description: A location that overrides, for this build, the source location for the one defined in the build project.
                sourceAuthOverride:
                  $ref: "#/components/schemas/SourceAuth"
                  description: An authorization type for this build that overrides the one defined in the build project. This override applies only if the build project's source is BitBucket, GitHub, GitLab, or GitLab Self Managed.
                gitCloneDepthOverride:
                  $ref: "#/components/schemas/GitCloneDepth"
                  description: The user-defined depth of history, with a minimum value of 0, that overrides, for this build only, any previous depth of history defined in the build project.
                gitSubmodulesConfigOverride:
                  $ref: "#/components/schemas/GitSubmodulesConfig"
                  description: Information about the Git submodules configuration for this build of an CodeBuild build project.
                buildspecOverride:
                  $ref: "#/components/schemas/String"
                  description: "A buildspec file declaration that overrides the latest one defined in the build project, for this build only. The buildspec defined on the project is not changed. If this value is set, it can be either an inline buildspec definition, the path to an alternate buildspec file relative to the value of the built-in CODEBUILD_SRC_DIR environment variable, or the path to an S3 bucket. The bucket must be in the same Amazon Web Services Region as the build project. Specify the buildspec file using its ARN (for example, arn:aws:s3:::my-codebuild-sample2/buildspec.yml). If this value is not provided or is set to an empty string, the source code must contain a buildspec file in its root directory. For more information, see Buildspec File Name and Storage Location. Since this property allows you to change the build commands that will run in the container, you should note that an IAM principal with the ability to call this API and set this parameter can override the default settings. Moreover, we encourage that you use a trustworthy buildspec location like a file in your source repository or a Amazon S3 bucket. Alternatively, you can restrict overrides to the buildspec by using a condition key: Prevent unauthorized modifications to project buildspec."
                insecureSslOverride:
                  $ref: "#/components/schemas/WrapperBoolean"
                  description: Enable this flag to override the insecure SSL setting that is specified in the build project. The insecure SSL setting determines whether to ignore SSL warnings while connecting to the project source code. This override applies only if the build's source is GitHub Enterprise.
                reportBuildStatusOverride:
                  $ref: "#/components/schemas/WrapperBoolean"
                  description: Set to true to report to your source provider the status of a build's start and completion. If you use this option with a source provider other than GitHub, GitHub Enterprise, GitLab, GitLab Self Managed, or Bitbucket, an invalidInputException is thrown. To be able to report the build status to the source provider, the user associated with the source provider must have write access to the repo. If the user does not have write access, the build status cannot be updated. For more information, see Source provider access in the CodeBuild User Guide. The status of a build triggered by a webhook is always reported to your source provider.
                buildStatusConfigOverride:
                  $ref: "#/components/schemas/BuildStatusConfig"
                  description: Contains information that defines how the build project reports the build status to the source provider. This option is only used when the source provider is GITHUB, GITHUB_ENTERPRISE, or BITBUCKET.
                environmentTypeOverride:
                  $ref: "#/components/schemas/EnvironmentType"
                  description: A container type for this build that overrides the one specified in the build project.
                imageOverride:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: The name of an image for this build that overrides the one specified in the build project.
                computeTypeOverride:
                  $ref: "#/components/schemas/ComputeType"
                  description: The name of a compute type for this build that overrides the one specified in the build project.
                certificateOverride:
                  $ref: "#/components/schemas/String"
                  description: The name of a certificate for this build that overrides the one specified in the build project.
                cacheOverride:
                  $ref: "#/components/schemas/ProjectCache"
                  description: A ProjectCache object specified for this build that overrides the one defined in the build project.
                serviceRoleOverride:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: The name of a service role for this build that overrides the one specified in the build project.
                privilegedModeOverride:
                  $ref: "#/components/schemas/WrapperBoolean"
                  description: Enable this flag to override privileged mode in the build project.
                timeoutInMinutesOverride:
                  $ref: "#/components/schemas/BuildTimeOut"
                  description: The number of build timeout minutes, from 5 to 2160 (36 hours), that overrides, for this build only, the latest setting already defined in the build project.
                queuedTimeoutInMinutesOverride:
                  $ref: "#/components/schemas/TimeOut"
                  description: The number of minutes a build is allowed to be queued before it times out.
                encryptionKeyOverride:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: The Key Management Service customer master key (CMK) that overrides the one specified in the build project. The CMK key encrypts the build output artifacts. You can use a cross-account KMS key to encrypt the build output artifacts if your service role has permission to that key. You can specify either the Amazon Resource Name (ARN) of the CMK or, if available, the CMK's alias (using the format alias/`<alias-name>`).
                idempotencyToken:
                  $ref: "#/components/schemas/String"
                  description: A unique, case sensitive identifier you provide to ensure the idempotency of the StartBuild request. The token is included in the StartBuild request and is valid for 5 minutes. If you repeat the StartBuild request with the same token, but change a parameter, CodeBuild returns a parameter mismatch error.
                logsConfigOverride:
                  $ref: "#/components/schemas/LogsConfig"
                  description: Log settings for this build that override the log settings defined in the build project.
                registryCredentialOverride:
                  $ref: "#/components/schemas/RegistryCredential"
                  description: The credentials for access to a private registry.
                imagePullCredentialsTypeOverride:
                  $ref: "#/components/schemas/ImagePullCredentialsType"
                  description: "The type of credentials CodeBuild uses to pull images in your build. There are two valid values: CODEBUILD Specifies that CodeBuild uses its own credentials. This requires that you modify your ECR repository policy to trust CodeBuild's service principal. SERVICE_ROLE Specifies that CodeBuild uses your build project's service role. When using a cross-account or private registry image, you must use SERVICE_ROLE credentials. When using an CodeBuild curated image, you must use CODEBUILD credentials."
                debugSessionEnabled:
                  $ref: "#/components/schemas/WrapperBoolean"
                  description: Specifies if session debugging is enabled for this build. For more information, see Viewing a running build in Session Manager.
                fleetOverride:
                  $ref: "#/components/schemas/ProjectFleet"
                  description: A ProjectFleet object specified for this build that overrides the one defined in the build project.
                autoRetryLimitOverride:
                  $ref: "#/components/schemas/WrapperInt"
                  description: The maximum number of additional automatic retries after a failed build. For example, if the auto-retry limit is set to 2, CodeBuild will call the RetryBuild API to automatically retry your build for up to 2 additional times.
              required:
                - projectName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartBuildOutput"
