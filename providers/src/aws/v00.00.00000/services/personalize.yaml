                  $ref: "#/components/schemas/Domain"
                  description: Filters returned recipes by domain for a Domain dataset group. Only recipes (Domain dataset group use cases) for this domain are included in the response. If you don't specify a domain, all recipes are returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecipesResponse"
  /ListRecommenders:
    post:
      operationId: ListRecommenders
      description: Returns a list of recommenders in a given Domain dataset group. When a Domain dataset group is not specified, all the recommenders associated with the account are listed. The response provides the properties for each recommender, including the Amazon Resource Name (ARN). For more information on recommenders, see CreateRecommender.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.ListRecommenders
            default: AmazonPersonalize.ListRecommenders
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                datasetGroupArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the Domain dataset group to list the recommenders for. When a Domain dataset group is not specified, all the recommenders associated with the account are listed.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token returned from the previous call to ListRecommenders for getting the next set of recommenders (if they exist).
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of recommenders to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecommendersResponse"
  /ListSchemas:
    post:
      operationId: ListSchemas
      description: Returns the list of schemas associated with the account. The response provides the properties for each schema, including the Amazon Resource Name (ARN). For more information on schemas, see CreateSchema.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.ListSchemas
            default: AmazonPersonalize.ListSchemas
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token returned from the previous call to ListSchemas for getting the next set of schemas (if they exist).
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of schemas to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSchemasResponse"
  /ListSolutionVersions:
    post:
      operationId: ListSolutionVersions
      description: Returns a list of solution versions for the given solution. When a solution is not specified, all the solution versions associated with the account are listed. The response provides the properties for each solution version, including the Amazon Resource Name (ARN).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.ListSolutionVersions
            default: AmazonPersonalize.ListSolutionVersions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                solutionArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the solution.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token returned from the previous call to ListSolutionVersions for getting the next set of solution versions (if they exist).
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of solution versions to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSolutionVersionsResponse"
  /ListSolutions:
    post:
      operationId: ListSolutions
      description: Returns a list of solutions in a given dataset group. When a dataset group is not specified, all the solutions associated with the account are listed. The response provides the properties for each solution, including the Amazon Resource Name (ARN). For more information on solutions, see CreateSolution.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.ListSolutions
            default: AmazonPersonalize.ListSolutions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                datasetGroupArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the dataset group.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A token returned from the previous call to ListSolutions for getting the next set of solutions (if they exist).
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of solutions to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSolutionsResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Get a list of tags attached to a resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.ListTagsForResource
            default: AmazonPersonalize.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The resource's Amazon Resource Name (ARN).
              required:
                - resourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /StartRecommender:
    post:
      operationId: StartRecommender
      description: Starts a recommender that is INACTIVE. Starting a recommender does not create any new models, but resumes billing and automatic retraining for the recommender.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.StartRecommender
            default: AmazonPersonalize.StartRecommender
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                recommenderArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the recommender to start.
              required:
                - recommenderArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartRecommenderResponse"
  /StopRecommender:
    post:
      operationId: StopRecommender
      description: Stops a recommender that is ACTIVE. Stopping a recommender halts billing and automatic retraining for the recommender.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.StopRecommender
            default: AmazonPersonalize.StopRecommender
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                recommenderArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the recommender to stop.
              required:
                - recommenderArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopRecommenderResponse"
  /StopSolutionVersionCreation:
    post:
      operationId: StopSolutionVersionCreation
      description: "Stops creating a solution version that is in a state of CREATE_PENDING or CREATE IN_PROGRESS. Depending on the current state of the solution version, the solution version state changes as follows: CREATE_PENDING > CREATE_STOPPED or CREATE_IN_PROGRESS > CREATE_STOPPING > CREATE_STOPPED You are billed for all of the training completed up until you stop the solution version creation. You cannot resume creating a solution version once it has been stopped."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.StopSolutionVersionCreation
            default: AmazonPersonalize.StopSolutionVersionCreation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                solutionVersionArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the solution version you want to stop creating.
              required:
                - solutionVersionArn
      responses:
        "200":
          description: Success
  /TagResource:
    post:
      operationId: TagResource
      description: Add a list of tags to a resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.TagResource
            default: AmazonPersonalize.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The resource's Amazon Resource Name (ARN).
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: Tags to apply to the resource. For more information see Tagging Amazon Personalize resources.
              required:
                - resourceArn
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes the specified tags that are attached to a resource. For more information, see Removing tags from Amazon Personalize resources.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.UntagResource
            default: AmazonPersonalize.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The resource's Amazon Resource Name (ARN).
                tagKeys:
                  $ref: "#/components/schemas/TagKeys"
                  description: The keys of the tags to be removed.
              required:
                - resourceArn
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateCampaign:
    post:
      operationId: UpdateCampaign
      description: "Updates a campaign to deploy a retrained solution version with an existing campaign, change your campaign's minProvisionedTPS, or modify your campaign's configuration. For example, you can set enableMetadataWithRecommendations to true for an existing campaign. To update a campaign to start automatically using the latest solution version, specify the following: For the SolutionVersionArn parameter, specify the Amazon Resource Name (ARN) of your solution in SolutionArn/$LATEST format. In the campaignConfig, set syncWithLatestSolutionVersion to true. To update a campaign, the campaign status must be ACTIVE or CREATE FAILED. Check the campaign status using the DescribeCampaign operation. You can still get recommendations from a campaign while an update is in progress. The campaign will use the previous solution version and campaign configuration to generate recommendations until the latest campaign update status is Active. For more information about updating a campaign, including code samples, see Updating a campaign. For more information about campaigns, see Creating a campaign."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.UpdateCampaign
            default: AmazonPersonalize.UpdateCampaign
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                campaignArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the campaign.
                solutionVersionArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of a new model to deploy. To specify the latest solution version of your solution, specify the ARN of your solution in SolutionArn/$LATEST format. You must use this format if you set syncWithLatestSolutionVersion to True in the CampaignConfig. To deploy a model that isn't the latest solution version of your solution, specify the ARN of the solution version. For more information about automatic campaign updates, see Enabling automatic campaign updates.
                minProvisionedTPS:
                  $ref: "#/components/schemas/TransactionsPerSecond"
                  description: Specifies the requested minimum provisioned transactions (recommendations) per second that Amazon Personalize will support. A high minProvisionedTPS will increase your bill. We recommend starting with 1 for minProvisionedTPS (the default). Track your usage using Amazon CloudWatch metrics, and increase the minProvisionedTPS as necessary.
                campaignConfig:
                  $ref: "#/components/schemas/CampaignConfig"
                  description: The configuration details of a campaign.
              required:
                - campaignArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCampaignResponse"
  /UpdateDataset:
    post:
      operationId: UpdateDataset
      description: Update a dataset to replace its schema with a new or existing one. For more information, see Replacing a dataset's schema.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.UpdateDataset
            default: AmazonPersonalize.UpdateDataset
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                datasetArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the dataset that you want to update.
                schemaArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the new schema you want use.
              required:
                - datasetArn
                - schemaArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDatasetResponse"
  /UpdateMetricAttribution:
    post:
      operationId: UpdateMetricAttribution
      description: Updates a metric attribution.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.UpdateMetricAttribution
            default: AmazonPersonalize.UpdateMetricAttribution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                addMetrics:
                  $ref: "#/components/schemas/MetricAttributes"
                  description: Add new metric attributes to the metric attribution.
                removeMetrics:
                  $ref: "#/components/schemas/MetricAttributesNamesList"
                  description: Remove metric attributes from the metric attribution.
                metricsOutputConfig:
                  $ref: "#/components/schemas/MetricAttributionOutput"
                  description: An output config for the metric attribution.
                metricAttributionArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) for the metric attribution to update.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMetricAttributionResponse"
  /UpdateRecommender:
    post:
      operationId: UpdateRecommender
      description: Updates the recommender to modify the recommender configuration. If you update the recommender to modify the columns used in training, Amazon Personalize automatically starts a full retraining of the models backing your recommender. While the update completes, you can still get recommendations from the recommender. The recommender uses the previous configuration until the update completes. To track the status of this update, use the latestRecommenderUpdate returned in the DescribeRecommender operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.UpdateRecommender
            default: AmazonPersonalize.UpdateRecommender
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                recommenderArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the recommender to modify.
                recommenderConfig:
                  $ref: "#/components/schemas/RecommenderConfig"
                  description: The configuration details of the recommender.
              required:
                - recommenderArn
                - recommenderConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRecommenderResponse"
  /UpdateSolution:
    post:
      operationId: UpdateSolution
      description: "Updates an Amazon Personalize solution to use a different automatic training configuration. When you update a solution, you can change whether the solution uses automatic training, and you can change the training frequency. For more information about updating a solution, see Updating a solution. A solution update can be in one of the following states: CREATE PENDING > CREATE IN_PROGRESS > ACTIVE -or- CREATE FAILED To get the status of a solution update, call the DescribeSolution API operation and find the status in the latestSolutionUpdate."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.UpdateSolution
            default: AmazonPersonalize.UpdateSolution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                solutionArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the solution to update.
                performAutoTraining:
                  $ref: "#/components/schemas/PerformAutoTraining"
                  description: Whether the solution uses automatic training to create new solution versions (trained models). You can change the training frequency by specifying a schedulingExpression in the AutoTrainingConfig as part of solution configuration. If you turn on automatic training, the first automatic training starts within one hour after the solution update completes. If you manually create a solution version within the hour, the solution skips the first automatic training. For more information about automatic training, see Configuring automatic training. After training starts, you can get the solution version's Amazon Resource Name (ARN) with the ListSolutionVersions API operation. To get its status, use the DescribeSolutionVersion.
                performIncrementalUpdate:
                  $ref: "#/components/schemas/PerformIncrementalUpdate"
                  description: Whether to perform incremental training updates on your model. When enabled, this allows the model to learn from new data more frequently without requiring full retraining, which enables near real-time personalization. This parameter is supported only for solutions that use the semantic-similarity recipe.
                solutionUpdateConfig:
                  $ref: "#/components/schemas/SolutionUpdateConfig"
                  description: The new configuration details of the solution.
              required:
                - solutionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSolutionResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Name:
      type: string
      minLength: 1
      maxLength: 63
      pattern: ^[a-zA-Z0-9][a-zA-Z0-9\-_]*
    Arn:
      type: string
      maxLength: 256
      pattern: arn:([a-z\d-]+):personalize:.*:.*:.+
    NumBatchResults:
      type: integer
    BatchInferenceJobInput:
      description: The input configuration of a batch inference job.
      type: object
      properties:
        s3DataSource:
          $ref: "#/components/schemas/S3DataConfig"
          description: The URI of the Amazon S3 location that contains your input data. The Amazon S3 bucket must be in the same region as the API endpoint you are calling.
      required:
        - s3DataSource
    S3DataConfig:
      description: The configuration details of an Amazon S3 input or output bucket.
      type: object
      properties:
        path:
          $ref: "#/components/schemas/S3Location"
          description: The file path of the Amazon S3 bucket.
        kmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The Amazon Resource Name (ARN) of the Key Management Service (KMS) key that Amazon Personalize uses to encrypt or decrypt the input and output files.
      required:
        - path
    S3Location:
      type: string
      maxLength: 256
      pattern: (s3|http|https)://.+
    KmsKeyArn:
      type: string
      maxLength: 2048
      pattern: arn:aws.*:kms:.*:[0-9]{12}:key/.*
    BatchInferenceJobOutput:
      description: The output configuration parameters of a batch inference job.
      type: object
      properties:
        s3DataDestination:
          $ref: "#/components/schemas/S3DataConfig"
          description: Information on the Amazon S3 bucket in which the batch inference job's output is stored.
      required:
        - s3DataDestination
    RoleArn:
      type: string
      maxLength: 256
      pattern: arn:([a-z\d-]+):iam::\d{12}:role/?[a-zA-Z_0-9+=,.@\-_/]+
    BatchInferenceJobConfig:
      description: The configuration details of a batch inference job.
      type: object
      properties:
        itemExplorationConfig:
          type: object
          properties: {}
          description: A string to string map specifying the exploration configuration hyperparameters, including explorationWeight and explorationItemAgeCutOff, you want to use to configure the amount of item exploration Amazon Personalize uses when recommending items. See User-Personalization.
        rankingInfluence:
          type: object
          properties: {}
          description: A map of ranking influence values for POPULARITY and FRESHNESS. For each key, specify a numerical value between 0.0 and 1.0 that determines how much influence that ranking factor has on the final recommendations. A value closer to 1.0 gives more weight to the factor, while a value closer to 0.0 reduces its influence.
    Tags:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: The optional metadata that you apply to resources to help you categorize and organize them. Each tag consists of a key and an optional value, both of which you define. For more information see Tagging Amazon Personalize resources.
      type: object
      properties:
        tagKey:
          $ref: "#/components/schemas/TagKey"
          description: One part of a key-value pair that makes up a tag. A key is a general label that acts like a category for more specific tag values.
        tagValue:
          $ref: "#/components/schemas/TagValue"
          description: The optional part of a key-value pair that makes up a tag. A value acts as a descriptor within a tag category (key).
      required:
        - tagKey
        - tagValue
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    BatchInferenceJobMode:
      type: string
      enum:
        - BATCH_INFERENCE
        - THEME_GENERATION
    ThemeGenerationConfig:
      description: The configuration details for generating themes with a batch inference job.
      type: object
      properties:
        fieldsForThemeGeneration:
          $ref: "#/components/schemas/FieldsForThemeGeneration"
          description: Fields used to generate descriptive themes for a batch inference job.
      required:
        - fieldsForThemeGeneration
    FieldsForThemeGeneration:
      description: A string to string map of the configuration details for theme generation.
      type: object
      properties:
        itemName:
          $ref: "#/components/schemas/ColumnName"
          description: The name of the Items dataset column that stores the name of each item in the dataset.
      required:
        - itemName
    ColumnName:
      type: string
      maxLength: 150
      pattern: "[A-Za-z_][A-Za-z\\d_]*"
    CreateBatchInferenceJobResponse:
      type: object
      properties:
        batchInferenceJobArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the batch inference job.
    BatchSegmentJobInput:
      description: The input configuration of a batch segment job.
      type: object
      properties:
        s3DataSource:
          $ref: "#/components/schemas/S3DataConfig"
      required:
        - s3DataSource
    BatchSegmentJobOutput:
      description: The output configuration parameters of a batch segment job.
      type: object
      properties:
        s3DataDestination:
          $ref: "#/components/schemas/S3DataConfig"
      required:
        - s3DataDestination
    CreateBatchSegmentJobResponse:
      type: object
      properties:
        batchSegmentJobArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the batch segment job.
    TransactionsPerSecond:
      type: integer
      minimum: 1
    CampaignConfig:
      description: The configuration details of a campaign.
      type: object
      properties:
        itemExplorationConfig:
          type: object
          properties: {}
          description: Specifies the exploration configuration hyperparameters, including explorationWeight and explorationItemAgeCutOff, you want to use to configure the amount of item exploration Amazon Personalize uses when recommending items. Provide itemExplorationConfig data only if your solution uses the User-Personalization recipe.
        enableMetadataWithRecommendations:
          $ref: "#/components/schemas/Boolean"
          description: Whether metadata with recommendations is enabled for the campaign. If enabled, you can specify the columns from your Items dataset in your request for recommendations. Amazon Personalize returns this data for each item in the recommendation response. For information about enabling metadata for a campaign, see Enabling metadata in recommendations for a campaign. If you enable metadata in recommendations, you will incur additional costs. For more information, see Amazon Personalize pricing.
        syncWithLatestSolutionVersion:
          $ref: "#/components/schemas/Boolean"
          description: Whether the campaign automatically updates to use the latest solution version (trained model) of a solution. If you specify True, you must specify the ARN of your solution for the SolutionVersionArn parameter. It must be in SolutionArn/$LATEST format. The default is False and you must manually update the campaign to deploy the latest solution version. For more information about automatic campaign updates, see Enabling automatic campaign updates.
        rankingInfluence:
          type: object
          properties: {}
          description: A map of ranking influence values for POPULARITY and FRESHNESS. For each key, specify a numerical value between 0.0 and 1.0 that determines how much influence that ranking factor has on the final recommendations. A value closer to 1.0 gives more weight to the factor, while a value closer to 0.0 reduces its influence.
    Boolean:
      type: boolean
    CreateCampaignResponse:
      type: object
      properties:
        campaignArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the campaign.
    DataSource:
      description: Describes the data source that contains the data to upload to a dataset, or the list of records to delete from Amazon Personalize.
      type: object
      properties:
        dataLocation:
          $ref: "#/components/schemas/S3Location"
          description: "For dataset import jobs, the path to the Amazon S3 bucket where the data that you want to upload to your dataset is stored. For data deletion jobs, the path to the Amazon S3 bucket that stores the list of records to delete. For example: s3://bucket-name/folder-name/fileName.csv If your CSV files are in a folder in your Amazon S3 bucket and you want your import job or data deletion job to consider multiple files, you can specify the path to the folder. With a data deletion job, Amazon Personalize uses all files in the folder and any sub folder. Use the following syntax with a / after the folder name: s3://bucket-name/folder-name/"
    CreateDataDeletionJobResponse:
      type: object
      properties:
        dataDeletionJobArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the data deletion job.
    DatasetType:
      type: string
      maxLength: 256
      pattern: ^[A-Za-z_]+$
    CreateDatasetResponse:
      type: object
      properties:
        datasetArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the dataset.
    IngestionMode:
      type: string
      enum:
        - BULK
        - PUT
        - ALL
    DatasetExportJobOutput:
      description: The output configuration parameters of a dataset export job.
      type: object
      properties:
        s3DataDestination:
          $ref: "#/components/schemas/S3DataConfig"
      required:
        - s3DataDestination
    CreateDatasetExportJobResponse:
      type: object
      properties:
        datasetExportJobArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the dataset export job.
    Domain:
      type: string
      enum:
        - ECOMMERCE
        - VIDEO_ON_DEMAND
    CreateDatasetGroupResponse:
      type: object
      properties:
        datasetGroupArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the new dataset group.
        domain:
          $ref: "#/components/schemas/Domain"
          description: The domain for the new Domain dataset group.
    ImportMode:
      type: string
      enum:
        - FULL
        - INCREMENTAL
    CreateDatasetImportJobResponse:
      type: object
      properties:
        datasetImportJobArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the dataset import job.
    CreateEventTrackerResponse:
      type: object
      properties:
        eventTrackerArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the event tracker.
        trackingId:
          $ref: "#/components/schemas/TrackingId"
          description: The ID of the event tracker. Include this ID in requests to the PutEvents API.
    TrackingId:
      type: string
      maxLength: 256
    FilterExpression:
      type: string
      minLength: 1
      maxLength: 2500
    CreateFilterResponse:
      type: object
      properties:
        filterArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the new filter.
    MetricAttributes:
      type: array
      items:
        $ref: "#/components/schemas/MetricAttribute"
    MetricAttribute:
      description: Contains information on a metric that a metric attribution reports on. For more information, see Measuring impact of recommendations.
      type: object
      properties:
        eventType:
          $ref: "#/components/schemas/EventType"
          description: The metric's event type.
        metricName:
          $ref: "#/components/schemas/MetricName"
          description: The metric's name. The name helps you identify the metric in Amazon CloudWatch or Amazon S3.
        expression:
          $ref: "#/components/schemas/MetricExpression"
          description: The attribute's expression. Available functions are SUM() or SAMPLECOUNT(). For SUM() functions, provide the dataset type (either Interactions or Items) and column to sum as a parameter. For example SUM(Items.PRICE).
      required:
        - eventType
        - metricName
        - expression
    EventType:
      type: string
      maxLength: 256
    MetricName:
      type: string
      maxLength: 256
    MetricExpression:
      type: string
      maxLength: 256
    MetricAttributionOutput:
      description: The output configuration details for a metric attribution.
      type: object
      properties:
        s3DataDestination:
          $ref: "#/components/schemas/S3DataConfig"
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the IAM service role that has permissions to add data to your output Amazon S3 bucket and add metrics to Amazon CloudWatch. For more information, see Measuring impact of recommendations.
      required:
        - roleArn
    CreateMetricAttributionResponse:
      type: object
      properties:
        metricAttributionArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) for the new metric attribution.
    RecommenderConfig:
      description: The configuration details of the recommender.
      type: object
      properties:
        itemExplorationConfig:
          type: object
          properties: {}
          description: Specifies the exploration configuration hyperparameters, including explorationWeight and explorationItemAgeCutOff, you want to use to configure the amount of item exploration Amazon Personalize uses when recommending items. Provide itemExplorationConfig data only if your recommenders generate personalized recommendations for a user (not popular items or similar items).
        minRecommendationRequestsPerSecond:
          $ref: "#/components/schemas/TransactionsPerSecond"
          description: Specifies the requested minimum provisioned recommendation requests per second that Amazon Personalize will support. A high minRecommendationRequestsPerSecond will increase your bill. We recommend starting with 1 for minRecommendationRequestsPerSecond (the default). Track your usage using Amazon CloudWatch metrics, and increase the minRecommendationRequestsPerSecond as necessary.
        trainingDataConfig:
          $ref: "#/components/schemas/TrainingDataConfig"
          description: Specifies the training data configuration to use when creating a domain recommender.
        enableMetadataWithRecommendations:
          $ref: "#/components/schemas/Boolean"
          description: Whether metadata with recommendations is enabled for the recommender. If enabled, you can specify the columns from your Items dataset in your request for recommendations. Amazon Personalize returns this data for each item in the recommendation response. For information about enabling metadata for a recommender, see Enabling metadata in recommendations for a recommender. If you enable metadata in recommendations, you will incur additional costs. For more information, see Amazon Personalize pricing.
    TrainingDataConfig:
      description: The training data configuration to use when creating a domain recommender or custom solution version (trained model).
      type: object
      properties:
        excludedDatasetColumns:
          type: object
          properties: {}
          description: Specifies the columns to exclude from training. Each key is a dataset type, and each value is a list of columns. Exclude columns to control what data Amazon Personalize uses to generate recommendations. For example, you might have a column that you want to use only to filter recommendations. You can exclude this column from training and Amazon Personalize considers it only when filtering.
        includedDatasetColumns:
          type: object
          properties: {}
          description: A map that specifies which columns to include from each dataset during training. The map can contain up to 3 entries, where each key is a dataset name (maximum length of 256 characters, must contain only letters and underscores) and each value is an array of up to 50 column names. Column names can be up to 150 characters long, must start with a letter or underscore, and can contain only letters, numbers, and underscores.
    CreateRecommenderResponse:
      type: object
      properties:
        recommenderArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the recommender.
    AvroSchema:
      type: string
      maxLength: 20000
    CreateSchemaResponse:
      type: object
      properties:
        schemaArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the created schema.
    PerformAutoML:
      type: boolean
    PerformAutoTraining:
      type: boolean
    PerformIncrementalUpdate:
      type: boolean
    SolutionConfig:
      description: Describes the configuration properties for the solution.
      type: object
      properties:
        eventValueThreshold:
          $ref: "#/components/schemas/EventValueThreshold"
          description: Only events with a value greater than or equal to this threshold are used for training a model.
        hpoConfig:
          $ref: "#/components/schemas/HPOConfig"
          description: Describes the properties for hyperparameter optimization (HPO).
        algorithmHyperParameters:
          type: object
          properties: {}
          description: Lists the algorithm hyperparameters and their values.
        featureTransformationParameters:
          type: object
          properties: {}
          description: Lists the feature transformation parameters.
        autoMLConfig:
          $ref: "#/components/schemas/AutoMLConfig"
          description: The AutoMLConfig object containing a list of recipes to search when AutoML is performed.
        eventsConfig:
          $ref: "#/components/schemas/EventsConfig"
          description: Describes the configuration of an event, which includes a list of event parameters. You can specify up to 10 event parameters. Events are used in solution creation.
        optimizationObjective:
          $ref: "#/components/schemas/OptimizationObjective"
          description: Describes the additional objective for the solution, such as maximizing streaming minutes or increasing revenue. For more information see Optimizing a solution.
        trainingDataConfig:
          $ref: "#/components/schemas/TrainingDataConfig"
          description: Specifies the training data configuration to use when creating a custom solution version (trained model).
        autoTrainingConfig:
          $ref: "#/components/schemas/AutoTrainingConfig"
          description: Specifies the automatic training configuration to use.
    EventValueThreshold:
      type: string
      maxLength: 256
    HPOConfig:
      description: Describes the properties for hyperparameter optimization (HPO).
      type: object
      properties:
        hpoObjective:
          $ref: "#/components/schemas/HPOObjective"
          description: The metric to optimize during HPO. Amazon Personalize doesn't support configuring the hpoObjective at this time.
        hpoResourceConfig:
          $ref: "#/components/schemas/HPOResourceConfig"
          description: Describes the resource configuration for HPO.
        algorithmHyperParameterRanges:
          $ref: "#/components/schemas/HyperParameterRanges"
          description: The hyperparameters and their allowable ranges.
    HPOObjective:
      description: The metric to optimize during hyperparameter optimization (HPO). Amazon Personalize doesn't support configuring the hpoObjective at this time.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/HPOObjectiveType"
          description: The type of the metric. Valid values are Maximize and Minimize.
        metricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the metric.
        metricRegex:
          $ref: "#/components/schemas/MetricRegex"
          description: A regular expression for finding the metric in the training job logs.
    HPOObjectiveType:
      type: string
      maxLength: 256
    MetricRegex:
      type: string
      maxLength: 256
    HPOResourceConfig:
      description: Describes the resource configuration for hyperparameter optimization (HPO).
      type: object
      properties:
        maxNumberOfTrainingJobs:
          $ref: "#/components/schemas/HPOResource"
          description: The maximum number of training jobs when you create a solution version. The maximum value for maxNumberOfTrainingJobs is 40.
        maxParallelTrainingJobs:
          $ref: "#/components/schemas/HPOResource"
          description: The maximum number of parallel training jobs when you create a solution version. The maximum value for maxParallelTrainingJobs is 10.
    HPOResource:
      type: string
      maxLength: 256
    HyperParameterRanges:
      description: Specifies the hyperparameters and their ranges. Hyperparameters can be categorical, continuous, or integer-valued.
      type: object
      properties:
        integerHyperParameterRanges:
          $ref: "#/components/schemas/IntegerHyperParameterRanges"
          description: The integer-valued hyperparameters and their ranges.
        continuousHyperParameterRanges:
          $ref: "#/components/schemas/ContinuousHyperParameterRanges"
          description: The continuous hyperparameters and their ranges.
        categoricalHyperParameterRanges:
          $ref: "#/components/schemas/CategoricalHyperParameterRanges"
          description: The categorical hyperparameters and their ranges.
    IntegerHyperParameterRanges:
      type: array
      items:
        $ref: "#/components/schemas/IntegerHyperParameterRange"
    IntegerHyperParameterRange:
      description: Provides the name and range of an integer-valued hyperparameter.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ParameterName"
          description: The name of the hyperparameter.
        minValue:
          $ref: "#/components/schemas/IntegerMinValue"
          description: The minimum allowable value for the hyperparameter.
        maxValue:
          $ref: "#/components/schemas/IntegerMaxValue"
          description: The maximum allowable value for the hyperparameter.
    ParameterName:
      type: string
      maxLength: 256
    IntegerMinValue:
      type: integer
      minimum: -1000000
    IntegerMaxValue:
      type: integer
      maximum: 1000000
    ContinuousHyperParameterRanges:
      type: array
      items:
        $ref: "#/components/schemas/ContinuousHyperParameterRange"
    ContinuousHyperParameterRange:
      description: Provides the name and range of a continuous hyperparameter.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ParameterName"
          description: The name of the hyperparameter.
        minValue:
          $ref: "#/components/schemas/ContinuousMinValue"
          description: The minimum allowable value for the hyperparameter.
        maxValue:
          $ref: "#/components/schemas/ContinuousMaxValue"
          description: The maximum allowable value for the hyperparameter.
    ContinuousMinValue:
      type: number
      format: double
      minimum: -1000000
    ContinuousMaxValue:
      type: number
      format: double
      minimum: -1000000
    CategoricalHyperParameterRanges:
      type: array
      items:
        $ref: "#/components/schemas/CategoricalHyperParameterRange"
    CategoricalHyperParameterRange:
      description: Provides the name and range of a categorical hyperparameter.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ParameterName"
          description: The name of the hyperparameter.
        values:
          $ref: "#/components/schemas/CategoricalValues"
          description: A list of the categories for the hyperparameter.
    CategoricalValues:
      type: array
      items:
        $ref: "#/components/schemas/CategoricalValue"
    CategoricalValue:
      type: string
      maxLength: 1000
    AutoMLConfig:
      description: When the solution performs AutoML (performAutoML is true in CreateSolution), Amazon Personalize determines which recipe, from the specified list, optimizes the given metric. Amazon Personalize then uses that recipe for the solution.
      type: object
      properties:
        metricName:
          $ref: "#/components/schemas/MetricName"
          description: The metric to optimize.
        recipeList:
          $ref: "#/components/schemas/ArnList"
          description: The list of candidate recipes.
    ArnList:
      type: array
      items:
        $ref: "#/components/schemas/Arn"
    EventsConfig:
      description: Describes the configuration of events, which are used in solution creation.
      type: object
      properties:
        eventParametersList:
          $ref: "#/components/schemas/EventParametersList"
          description: A list of event parameters, which includes event types and their event value thresholds and weights.
    EventParametersList:
      type: array
      items:
        $ref: "#/components/schemas/EventParameters"
    EventParameters:
      description: Describes the parameters of events, which are used in solution creation.
      type: object
      properties:
        eventType:
          $ref: "#/components/schemas/EventType"
          description: The name of the event type to be considered for solution creation.
        eventValueThreshold:
          $ref: "#/components/schemas/EventTypeThresholdValue"
          description: The threshold of the event type. Only events with a value greater or equal to this threshold will be considered for solution creation.
        weight:
          $ref: "#/components/schemas/EventTypeWeight"
          description: The weight of the event type. A higher weight means higher importance of the event type for the created solution.
    EventTypeThresholdValue:
      type: number
      format: double
    EventTypeWeight:
      type: number
      format: double
      minimum: 0
      maximum: 1
    OptimizationObjective:
      description: Describes the additional objective for the solution, such as maximizing streaming minutes or increasing revenue. For more information see Optimizing a solution.
      type: object
      properties:
        itemAttribute:
          $ref: "#/components/schemas/ItemAttribute"
          description: The numerical metadata column in an Items dataset related to the optimization objective. For example, VIDEO_LENGTH (to maximize streaming minutes), or PRICE (to maximize revenue).
        objectiveSensitivity:
          $ref: "#/components/schemas/ObjectiveSensitivity"
          description: Specifies how Amazon Personalize balances the importance of your optimization objective versus relevance.
    ItemAttribute:
      type: string
      minLength: 1
      maxLength: 150
    ObjectiveSensitivity:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
        - "OFF"
    AutoTrainingConfig:
      description: The automatic training configuration to use when performAutoTraining is true.
      type: object
      properties:
        schedulingExpression:
          $ref: "#/components/schemas/SchedulingExpression"
          description: Specifies how often to automatically train new solution versions. Specify a rate expression in rate(value unit) format. For value, specify a number between 1 and 30. For unit, specify day or days. For example, to automatically create a new solution version every 5 days, specify rate(5 days). The default is every 7 days. For more information about auto training, see Creating and configuring a solution.
    SchedulingExpression:
      type: string
      minLength: 1
      maxLength: 16
      pattern: rate\(\d+ days?\)
    CreateSolutionResponse:
      type: object
      properties:
        solutionArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the solution.
    TrainingMode:
      type: string
      enum:
        - FULL
        - UPDATE
        - AUTOTRAIN
    CreateSolutionVersionResponse:
      type: object
      properties:
        solutionVersionArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the new solution version.
    DescribeAlgorithmResponse:
      type: object
      properties:
        algorithm:
          $ref: "#/components/schemas/Algorithm"
          description: A listing of the properties of the algorithm.
    Algorithm:
      description: Describes a custom algorithm.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the algorithm.
        algorithmArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the algorithm.
        algorithmImage:
          $ref: "#/components/schemas/AlgorithmImage"
          description: The URI of the Docker container for the algorithm image.
        defaultHyperParameters:
          type: object
          properties: {}
          description: Specifies the default hyperparameters.
        defaultHyperParameterRanges:
          $ref: "#/components/schemas/DefaultHyperParameterRanges"
          description: Specifies the default hyperparameters, their ranges, and whether they are tunable. A tunable hyperparameter can have its value determined during hyperparameter optimization (HPO).
        defaultResourceConfig:
          type: object
          properties: {}
          description: Specifies the default maximum number of training jobs and parallel training jobs.
        trainingInputMode:
          $ref: "#/components/schemas/TrainingInputMode"
          description: The training input mode.
        roleArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the role.
        creationDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time (in Unix time) that the algorithm was created.
        lastUpdatedDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time (in Unix time) that the algorithm was last updated.
    AlgorithmImage:
      description: Describes an algorithm image.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the algorithm image.
        dockerURI:
          $ref: "#/components/schemas/DockerURI"
          description: The URI of the Docker container for the algorithm image.
      required:
        - dockerURI
    DockerURI:
      type: string
      maxLength: 256
    DefaultHyperParameterRanges:
      description: Specifies the hyperparameters and their default ranges. Hyperparameters can be categorical, continuous, or integer-valued.
      type: object
      properties:
        integerHyperParameterRanges:
          $ref: "#/components/schemas/DefaultIntegerHyperParameterRanges"
          description: The integer-valued hyperparameters and their default ranges.
        continuousHyperParameterRanges:
          $ref: "#/components/schemas/DefaultContinuousHyperParameterRanges"
          description: The continuous hyperparameters and their default ranges.
        categoricalHyperParameterRanges:
          $ref: "#/components/schemas/DefaultCategoricalHyperParameterRanges"
          description: The categorical hyperparameters and their default ranges.
    DefaultIntegerHyperParameterRanges:
      type: array
      items:
        $ref: "#/components/schemas/DefaultIntegerHyperParameterRange"
    DefaultIntegerHyperParameterRange:
      description: Provides the name and default range of a integer-valued hyperparameter and whether the hyperparameter is tunable. A tunable hyperparameter can have its value determined during hyperparameter optimization (HPO).
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ParameterName"
          description: The name of the hyperparameter.
        minValue:
          $ref: "#/components/schemas/IntegerMinValue"
          description: The minimum allowable value for the hyperparameter.
        maxValue:
          $ref: "#/components/schemas/IntegerMaxValue"
          description: The maximum allowable value for the hyperparameter.
        isTunable:
          $ref: "#/components/schemas/Tunable"
          description: Indicates whether the hyperparameter is tunable.
    Tunable:
      type: boolean
    DefaultContinuousHyperParameterRanges:
      type: array
      items:
        $ref: "#/components/schemas/DefaultContinuousHyperParameterRange"
    DefaultContinuousHyperParameterRange:
      description: Provides the name and default range of a continuous hyperparameter and whether the hyperparameter is tunable. A tunable hyperparameter can have its value determined during hyperparameter optimization (HPO).
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ParameterName"
          description: The name of the hyperparameter.
        minValue:
          $ref: "#/components/schemas/ContinuousMinValue"
          description: The minimum allowable value for the hyperparameter.
        maxValue:
          $ref: "#/components/schemas/ContinuousMaxValue"
          description: The maximum allowable value for the hyperparameter.
        isTunable:
          $ref: "#/components/schemas/Tunable"
          description: Whether the hyperparameter is tunable.
    DefaultCategoricalHyperParameterRanges:
      type: array
      items:
        $ref: "#/components/schemas/DefaultCategoricalHyperParameterRange"
    DefaultCategoricalHyperParameterRange:
      description: Provides the name and default range of a categorical hyperparameter and whether the hyperparameter is tunable. A tunable hyperparameter can have its value determined during hyperparameter optimization (HPO).
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ParameterName"
          description: The name of the hyperparameter.
        values:
          $ref: "#/components/schemas/CategoricalValues"
          description: A list of the categories for the hyperparameter.
        isTunable:
          $ref: "#/components/schemas/Tunable"
          description: Whether the hyperparameter is tunable.
    TrainingInputMode:
      type: string
      maxLength: 256
    Date:
      type: string
      format: date-time
    DescribeBatchInferenceJobResponse:
      type: object
      properties:
        batchInferenceJob:
          $ref: "#/components/schemas/BatchInferenceJob"
          description: Information on the specified batch inference job.
