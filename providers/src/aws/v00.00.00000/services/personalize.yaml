openapi: 3.0.0
info:
  version: "2018-05-22"
  title: Amazon Personalize
  description: Amazon Personalize
  x-serviceName: personalize
  x-serviceAlias: personalize
  x-protocol: json
  x-apiVersion: "2018-05-22"
  x-endpointPrefix: personalize
  x-targetPrefix: AmazonPersonalize
  x-jsonVersion: "1.1"
servers:
  - url: https://personalize.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for personalize
paths:
  /CreateBatchInferenceJob:
    post:
      operationId: CreateBatchInferenceJob
      description: Generates batch recommendations based on a list of items or users stored in Amazon S3 and exports the recommendations to an Amazon S3 bucket. To generate batch recommendations, specify the ARN of a solution version and an Amazon S3 URI for the input and output data. For user personalization, popular items, and personalized ranking solutions, the batch inference job generates a list of recommended items for each user ID in the input file. For related items solutions, the job generates a list of recommended items for each item ID in the input file. For more information, see Creating a batch inference job . If you use the Similar-Items recipe, Amazon Personalize can add descriptive themes to batch recommendations. To generate themes, set the job's mode to THEME_GENERATION and specify the name of the field that contains item names in the input data. For more information about generating themes, see Batch recommendations with themes from Content Generator . You can't get batch recommendations with the Trending-Now or Next-Best-Action recipes.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.CreateBatchInferenceJob
            default: AmazonPersonalize.CreateBatchInferenceJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                jobName:
                  $ref: "#/components/schemas/Name"
                  description: The name of the batch inference job to create.
                solutionVersionArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the solution version that will be used to generate the batch inference recommendations.
                filterArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the filter to apply to the batch inference job. For more information on using filters, see Filtering batch recommendations.
                numResults:
                  $ref: "#/components/schemas/NumBatchResults"
                  description: The number of recommendations to retrieve.
                jobInput:
                  $ref: "#/components/schemas/BatchInferenceJobInput"
                  description: The Amazon S3 path that leads to the input file to base your recommendations on. The input material must be in JSON format.
                jobOutput:
                  $ref: "#/components/schemas/BatchInferenceJobOutput"
                  description: The path to the Amazon S3 bucket where the job's output will be stored.
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The ARN of the Amazon Identity and Access Management role that has permissions to read and write to your input and output Amazon S3 buckets respectively.
                batchInferenceJobConfig:
                  $ref: "#/components/schemas/BatchInferenceJobConfig"
                  description: The configuration details of a batch inference job.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of tags to apply to the batch inference job.
                batchInferenceJobMode:
                  $ref: "#/components/schemas/BatchInferenceJobMode"
                  description: The mode of the batch inference job. To generate descriptive themes for groups of similar items, set the job mode to THEME_GENERATION. If you don't want to generate themes, use the default BATCH_INFERENCE. When you get batch recommendations with themes, you will incur additional costs. For more information, see Amazon Personalize pricing.
                themeGenerationConfig:
                  $ref: "#/components/schemas/ThemeGenerationConfig"
                  description: For theme generation jobs, specify the name of the column in your Items dataset that contains each item's name.
              required:
                - jobName
                - solutionVersionArn
                - jobInput
                - jobOutput
                - roleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBatchInferenceJobResponse"
  /CreateBatchSegmentJob:
    post:
      operationId: CreateBatchSegmentJob
      description: Creates a batch segment job. The operation can handle up to 50 million records and the input file must be in JSON format. For more information, see Getting batch recommendations and user segments.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.CreateBatchSegmentJob
            default: AmazonPersonalize.CreateBatchSegmentJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                jobName:
                  $ref: "#/components/schemas/Name"
                  description: The name of the batch segment job to create.
                solutionVersionArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the solution version you want the batch segment job to use to generate batch segments.
                filterArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the filter to apply to the batch segment job. For more information on using filters, see Filtering batch recommendations.
                numResults:
                  $ref: "#/components/schemas/NumBatchResults"
                  description: The number of predicted users generated by the batch segment job for each line of input data. The maximum number of users per segment is 5 million.
                jobInput:
                  $ref: "#/components/schemas/BatchSegmentJobInput"
                  description: The Amazon S3 path for the input data used to generate the batch segment job.
                jobOutput:
                  $ref: "#/components/schemas/BatchSegmentJobOutput"
                  description: The Amazon S3 path for the bucket where the job's output will be stored.
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The ARN of the Amazon Identity and Access Management role that has permissions to read and write to your input and output Amazon S3 buckets respectively.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of tags to apply to the batch segment job.
              required:
                - jobName
                - solutionVersionArn
                - jobInput
                - jobOutput
                - roleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBatchSegmentJobResponse"
  /CreateCampaign:
    post:
      operationId: CreateCampaign
      description: "You incur campaign costs while it is active. To avoid unnecessary costs, make sure to delete the campaign when you are finished. For information about campaign costs, see Amazon Personalize pricing. Creates a campaign that deploys a solution version. When a client calls the GetRecommendations and GetPersonalizedRanking APIs, a campaign is specified in the request. Minimum Provisioned TPS and Auto-Scaling A high minProvisionedTPS will increase your cost. We recommend starting with 1 for minProvisionedTPS (the default). Track your usage using Amazon CloudWatch metrics, and increase the minProvisionedTPS as necessary. When you create an Amazon Personalize campaign, you can specify the minimum provisioned transactions per second (minProvisionedTPS) for the campaign. This is the baseline transaction throughput for the campaign provisioned by Amazon Personalize. It sets the minimum billing charge for the campaign while it is active. A transaction is a single GetRecommendations or GetPersonalizedRanking request. The default minProvisionedTPS is 1. If your TPS increases beyond the minProvisionedTPS, Amazon Personalize auto-scales the provisioned capacity up and down, but never below minProvisionedTPS. There's a short time delay while the capacity is increased that might cause loss of transactions. When your traffic reduces, capacity returns to the minProvisionedTPS. You are charged for the the minimum provisioned TPS or, if your requests exceed the minProvisionedTPS, the actual TPS. The actual TPS is the total number of recommendation requests you make. We recommend starting with a low minProvisionedTPS, track your usage using Amazon CloudWatch metrics, and then increase the minProvisionedTPS as necessary. For more information about campaign costs, see Amazon Personalize pricing. Status A campaign can be in one of the following states: CREATE PENDING > CREATE IN_PROGRESS > ACTIVE -or- CREATE FAILED DELETE PENDING > DELETE IN_PROGRESS To get the campaign status, call DescribeCampaign. Wait until the status of the campaign is ACTIVE before asking the campaign for recommendations. Related APIs ListCampaigns DescribeCampaign UpdateCampaign DeleteCampaign"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.CreateCampaign
            default: AmazonPersonalize.CreateCampaign
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Name"
                  description: A name for the new campaign. The campaign name must be unique within your account.
                solutionVersionArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the trained model to deploy with the campaign. To specify the latest solution version of your solution, specify the ARN of your solution in SolutionArn/$LATEST format. You must use this format if you set syncWithLatestSolutionVersion to True in the CampaignConfig. To deploy a model that isn't the latest solution version of your solution, specify the ARN of the solution version. For more information about automatic campaign updates, see Enabling automatic campaign updates.
                minProvisionedTPS:
                  $ref: "#/components/schemas/TransactionsPerSecond"
                  description: Specifies the requested minimum provisioned transactions (recommendations) per second that Amazon Personalize will support. A high minProvisionedTPS will increase your bill. We recommend starting with 1 for minProvisionedTPS (the default). Track your usage using Amazon CloudWatch metrics, and increase the minProvisionedTPS as necessary.
                campaignConfig:
                  $ref: "#/components/schemas/CampaignConfig"
                  description: The configuration details of a campaign.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of tags to apply to the campaign.
              required:
                - name
                - solutionVersionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCampaignResponse"
  /CreateDataDeletionJob:
    post:
      operationId: CreateDataDeletionJob
      description: "Creates a batch job that deletes all references to specific users from an Amazon Personalize dataset group in batches. You specify the users to delete in a CSV file of userIds in an Amazon S3 bucket. After a job completes, Amazon Personalize no longer trains on the users’ data and no longer considers the users when generating user segments. For more information about creating a data deletion job, see Deleting users. Your input file must be a CSV file with a single USER_ID column that lists the users IDs. For more information about preparing the CSV file, see Preparing your data deletion file and uploading it to Amazon S3. To give Amazon Personalize permission to access your input CSV file of userIds, you must specify an IAM service role that has permission to read from the data source. This role needs GetObject and ListBucket permissions for the bucket and its content. These permissions are the same as importing data. For information on granting access to your Amazon S3 bucket, see Giving Amazon Personalize Access to Amazon S3 Resources. After you create a job, it can take up to a day to delete all references to the users from datasets and models. Until the job completes, Amazon Personalize continues to use the data when training. And if you use a User Segmentation recipe, the users might appear in user segments. Status A data deletion job can have one of the following statuses: PENDING > IN_PROGRESS > COMPLETED -or- FAILED To get the status of the data deletion job, call DescribeDataDeletionJob API operation and specify the Amazon Resource Name (ARN) of the job. If the status is FAILED, the response includes a failureReason key, which describes why the job failed. Related APIs ListDataDeletionJobs DescribeDataDeletionJob"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.CreateDataDeletionJob
            default: AmazonPersonalize.CreateDataDeletionJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                jobName:
                  $ref: "#/components/schemas/Name"
                  description: The name for the data deletion job.
                datasetGroupArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the dataset group that has the datasets you want to delete records from.
                dataSource:
                  $ref: "#/components/schemas/DataSource"
                  description: The Amazon S3 bucket that contains the list of userIds of the users to delete.
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of the IAM role that has permissions to read from the Amazon S3 data source.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of tags to apply to the data deletion job.
              required:
                - jobName
                - datasetGroupArn
                - dataSource
                - roleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataDeletionJobResponse"
  /CreateDataset:
    post:
      operationId: CreateDataset
      description: "Creates an empty dataset and adds it to the specified dataset group. Use CreateDatasetImportJob to import your training data to a dataset. There are 5 types of datasets: Item interactions Items Users Action interactions Actions Each dataset type has an associated schema with required field types. Only the Item interactions dataset is required in order to train a model (also referred to as creating a solution). A dataset can be in one of the following states: CREATE PENDING > CREATE IN_PROGRESS > ACTIVE -or- CREATE FAILED DELETE PENDING > DELETE IN_PROGRESS To get the status of the dataset, call DescribeDataset. Related APIs CreateDatasetGroup ListDatasets DescribeDataset DeleteDataset"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.CreateDataset
            default: AmazonPersonalize.CreateDataset
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Name"
                  description: The name for the dataset.
                schemaArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the schema to associate with the dataset. The schema defines the dataset fields.
                datasetGroupArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the dataset group to add the dataset to.
                datasetType:
                  $ref: "#/components/schemas/DatasetType"
                  description: "The type of dataset. One of the following (case insensitive) values: Interactions Items Users Actions Action_Interactions"
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of tags to apply to the dataset.
              required:
                - name
                - schemaArn
                - datasetGroupArn
                - datasetType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDatasetResponse"
  /CreateDatasetExportJob:
    post:
      operationId: CreateDatasetExportJob
      description: "Creates a job that exports data from your dataset to an Amazon S3 bucket. To allow Amazon Personalize to export the training data, you must specify an service-linked IAM role that gives Amazon Personalize PutObject permissions for your Amazon S3 bucket. For information, see Exporting a dataset in the Amazon Personalize developer guide. Status A dataset export job can be in one of the following states: CREATE PENDING > CREATE IN_PROGRESS > ACTIVE -or- CREATE FAILED To get the status of the export job, call DescribeDatasetExportJob, and specify the Amazon Resource Name (ARN) of the dataset export job. The dataset export is complete when the status shows as ACTIVE. If the status shows as CREATE FAILED, the response includes a failureReason key, which describes why the job failed."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.CreateDatasetExportJob
            default: AmazonPersonalize.CreateDatasetExportJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                jobName:
                  $ref: "#/components/schemas/Name"
                  description: The name for the dataset export job.
                datasetArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the dataset that contains the data to export.
                ingestionMode:
                  $ref: "#/components/schemas/IngestionMode"
                  description: The data to export, based on how you imported the data. You can choose to export only BULK data that you imported using a dataset import job, only PUT data that you imported incrementally (using the console, PutEvents, PutUsers and PutItems operations), or ALL for both types. The default value is PUT.
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of the IAM service role that has permissions to add data to your output Amazon S3 bucket.
                jobOutput:
                  $ref: "#/components/schemas/DatasetExportJobOutput"
                  description: The path to the Amazon S3 bucket where the job's output is stored.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of tags to apply to the dataset export job.
              required:
                - jobName
                - datasetArn
                - roleArn
                - jobOutput
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDatasetExportJobResponse"
  /CreateDatasetGroup:
    post:
      operationId: CreateDatasetGroup
      description: "Creates an empty dataset group. A dataset group is a container for Amazon Personalize resources. A dataset group can contain at most three datasets, one for each type of dataset: Item interactions Items Users Actions Action interactions A dataset group can be a Domain dataset group, where you specify a domain and use pre-configured resources like recommenders, or a Custom dataset group, where you use custom resources, such as a solution with a solution version, that you deploy with a campaign. If you start with a Domain dataset group, you can still add custom resources such as solutions and solution versions trained with recipes for custom use cases and deployed with campaigns. A dataset group can be in one of the following states: CREATE PENDING > CREATE IN_PROGRESS > ACTIVE -or- CREATE FAILED DELETE PENDING To get the status of the dataset group, call DescribeDatasetGroup. If the status shows as CREATE FAILED, the response includes a failureReason key, which describes why the creation failed. You must wait until the status of the dataset group is ACTIVE before adding a dataset to the group. You can specify an Key Management Service (KMS) key to encrypt the datasets in the group. If you specify a KMS key, you must also include an Identity and Access Management (IAM) role that has permission to access the key. APIs that require a dataset group ARN in the request CreateDataset CreateEventTracker CreateSolution Related APIs ListDatasetGroups DescribeDatasetGroup DeleteDatasetGroup"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.CreateDatasetGroup
            default: AmazonPersonalize.CreateDatasetGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Name"
                  description: The name for the new dataset group.
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The ARN of the Identity and Access Management (IAM) role that has permissions to access the Key Management Service (KMS) key. Supplying an IAM role is only valid when also specifying a KMS key.
                kmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                  description: The Amazon Resource Name (ARN) of a Key Management Service (KMS) key used to encrypt the datasets.
                domain:
                  $ref: "#/components/schemas/Domain"
                  description: The domain of the dataset group. Specify a domain to create a Domain dataset group. The domain you specify determines the default schemas for datasets and the use cases available for recommenders. If you don't specify a domain, you create a Custom dataset group with solution versions that you deploy with a campaign.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of tags to apply to the dataset group.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDatasetGroupResponse"
  /CreateDatasetImportJob:
    post:
      operationId: CreateDatasetImportJob
      description: "Creates a job that imports training data from your data source (an Amazon S3 bucket) to an Amazon Personalize dataset. To allow Amazon Personalize to import the training data, you must specify an IAM service role that has permission to read from the data source, as Amazon Personalize makes a copy of your data and processes it internally. For information on granting access to your Amazon S3 bucket, see Giving Amazon Personalize Access to Amazon S3 Resources. If you already created a recommender or deployed a custom solution version with a campaign, how new bulk records influence recommendations depends on the domain use case or recipe that you use. For more information, see How new data influences real-time recommendations. By default, a dataset import job replaces any existing data in the dataset that you imported in bulk. To add new records without replacing existing data, specify INCREMENTAL for the import mode in the CreateDatasetImportJob operation. Status A dataset import job can be in one of the following states: CREATE PENDING > CREATE IN_PROGRESS > ACTIVE -or- CREATE FAILED To get the status of the import job, call DescribeDatasetImportJob, providing the Amazon Resource Name (ARN) of the dataset import job. The dataset import is complete when the status shows as ACTIVE. If the status shows as CREATE FAILED, the response includes a failureReason key, which describes why the job failed. Importing takes time. You must wait until the status shows as ACTIVE before training a model using the dataset. Related APIs ListDatasetImportJobs DescribeDatasetImportJob"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.CreateDatasetImportJob
            default: AmazonPersonalize.CreateDatasetImportJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                jobName:
                  $ref: "#/components/schemas/Name"
                  description: The name for the dataset import job.
                datasetArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the dataset that receives the imported data.
                dataSource:
                  $ref: "#/components/schemas/DataSource"
                  description: The Amazon S3 bucket that contains the training data to import.
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The ARN of the IAM role that has permissions to read from the Amazon S3 data source.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of tags to apply to the dataset import job.
                importMode:
                  $ref: "#/components/schemas/ImportMode"
                  description: Specify how to add the new records to an existing dataset. The default import mode is FULL. If you haven't imported bulk records into the dataset previously, you can only specify FULL. Specify FULL to overwrite all existing bulk data in your dataset. Data you imported individually is not replaced. Specify INCREMENTAL to append the new records to the existing data in your dataset. Amazon Personalize replaces any record with the same ID with the new one.
                publishAttributionMetricsToS3:
                  $ref: "#/components/schemas/Boolean"
                  description: If you created a metric attribution, specify whether to publish metrics for this import job to Amazon S3
              required:
                - jobName
                - datasetArn
                - dataSource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDatasetImportJobResponse"
  /CreateEventTracker:
    post:
      operationId: CreateEventTracker
      description: "Creates an event tracker that you use when adding event data to a specified dataset group using the PutEvents API. Only one event tracker can be associated with a dataset group. You will get an error if you call CreateEventTracker using the same dataset group as an existing event tracker. When you create an event tracker, the response includes a tracking ID, which you pass as a parameter when you use the PutEvents operation. Amazon Personalize then appends the event data to the Item interactions dataset of the dataset group you specify in your event tracker. The event tracker can be in one of the following states: CREATE PENDING > CREATE IN_PROGRESS > ACTIVE -or- CREATE FAILED DELETE PENDING > DELETE IN_PROGRESS To get the status of the event tracker, call DescribeEventTracker. The event tracker must be in the ACTIVE state before using the tracking ID. Related APIs ListEventTrackers DescribeEventTracker DeleteEventTracker"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.CreateEventTracker
            default: AmazonPersonalize.CreateEventTracker
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Name"
                  description: The name for the event tracker.
                datasetGroupArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the dataset group that receives the event data.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of tags to apply to the event tracker.
              required:
                - name
                - datasetGroupArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventTrackerResponse"
  /CreateFilter:
    post:
      operationId: CreateFilter
      description: Creates a recommendation filter. For more information, see Filtering recommendations and user segments.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.CreateFilter
            default: AmazonPersonalize.CreateFilter
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Name"
                  description: The name of the filter to create.
                datasetGroupArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the dataset group that the filter will belong to.
                filterExpression:
                  $ref: "#/components/schemas/FilterExpression"
                  description: The filter expression defines which items are included or excluded from recommendations. Filter expression must follow specific format rules. For information about filter expression structure and syntax, see Filter expressions.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of tags to apply to the filter.
              required:
                - name
                - datasetGroupArn
                - filterExpression
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFilterResponse"
  /CreateMetricAttribution:
    post:
      operationId: CreateMetricAttribution
      description: Creates a metric attribution. A metric attribution creates reports on the data that you import into Amazon Personalize. Depending on how you imported the data, you can view reports in Amazon CloudWatch or Amazon S3. For more information, see Measuring impact of recommendations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonPersonalize.CreateMetricAttribution
            default: AmazonPersonalize.CreateMetricAttribution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Name"
                  description: A name for the metric attribution.
                datasetGroupArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the destination dataset group for the metric attribution.
                metrics:
                  $ref: "#/components/schemas/MetricAttributes"
                  description: A list of metric attributes for the metric attribution. Each metric attribute specifies an event type to track and a function. Available functions are SUM() or SAMPLECOUNT(). For SUM() functions, provide the dataset type (either Interactions or Items) and column to sum as a parameter. For example SUM(Items.PRICE).
                metricsOutputConfig:
                  $ref: "#/components/schemas/MetricAttributionOutput"
                  description: The output configuration details for the metric attribution.
              required:
                - name
                - datasetGroupArn
                - metrics
                - metricsOutputConfig
      responses:
