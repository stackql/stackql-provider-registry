          $ref: "#/components/schemas/PerformHPO"
          description: Whether to perform hyperparameter optimization (HPO) on the chosen recipe. The default is false.
        performAutoML:
          $ref: "#/components/schemas/PerformAutoML"
          description: We don't recommend enabling automated machine learning. Instead, match your use case to the available Amazon Personalize recipes. For more information, see Determining your use case. When true, Amazon Personalize performs a search for the best USER_PERSONALIZATION recipe from the list specified in the solution configuration (recipeArn must not be specified). When false (the default), Amazon Personalize uses recipeArn for training.
        performAutoTraining:
          $ref: "#/components/schemas/PerformAutoTraining"
          description: Specifies whether the solution automatically creates solution versions. The default is True and the solution automatically creates new solution versions every 7 days. For more information about auto training, see Creating and configuring a solution.
        performIncrementalUpdate:
          $ref: "#/components/schemas/PerformIncrementalUpdate"
          description: A Boolean value that indicates whether incremental training updates are performed on the model. When enabled, this allows the model to learn from new data more frequently without requiring full retraining, which enables near real-time personalization. This parameter is supported only for solutions that use the semantic-similarity recipe
        recipeArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the recipe used to create the solution. This is required when performAutoML is false.
        datasetGroupArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the dataset group that provides the training data.
        eventType:
          $ref: "#/components/schemas/EventType"
          description: The event type (for example, 'click' or 'like') that is used for training the model. If no eventType is provided, Amazon Personalize uses all interactions for training with equal weight regardless of type.
        solutionConfig:
          $ref: "#/components/schemas/SolutionConfig"
          description: Describes the configuration properties for the solution.
        autoMLResult:
          $ref: "#/components/schemas/AutoMLResult"
          description: When performAutoML is true, specifies the best recipe found.
        status:
          $ref: "#/components/schemas/Status"
          description: "The status of the solution. A solution can be in one of the following states: CREATE PENDING > CREATE IN_PROGRESS > ACTIVE -or- CREATE FAILED DELETE PENDING > DELETE IN_PROGRESS"
        creationDateTime:
          $ref: "#/components/schemas/Date"
          description: The creation date and time (in Unix time) of the solution.
        lastUpdatedDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time (in Unix time) that the solution was last updated.
