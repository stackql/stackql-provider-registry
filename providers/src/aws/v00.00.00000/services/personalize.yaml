      type: object
      properties:
        jobName:
          $ref: "#/components/schemas/Name"
          description: The name of the batch inference job.
        batchInferenceJobArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the batch inference job.
        filterArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the filter used on the batch inference job.
        failureReason:
          $ref: "#/components/schemas/FailureReason"
          description: If the batch inference job failed, the reason for the failure.
        solutionVersionArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the solution version from which the batch inference job was created.
        numResults:
          $ref: "#/components/schemas/NumBatchResults"
          description: The number of recommendations generated by the batch inference job. This number includes the error messages generated for failed input records.
        jobInput:
          $ref: "#/components/schemas/BatchInferenceJobInput"
          description: The Amazon S3 path that leads to the input data used to generate the batch inference job.
        jobOutput:
          $ref: "#/components/schemas/BatchInferenceJobOutput"
          description: The Amazon S3 bucket that contains the output data generated by the batch inference job.
        batchInferenceJobConfig:
          $ref: "#/components/schemas/BatchInferenceJobConfig"
          description: A string to string map of the configuration details of a batch inference job.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of the Amazon Identity and Access Management (IAM) role that requested the batch inference job.
        batchInferenceJobMode:
          $ref: "#/components/schemas/BatchInferenceJobMode"
          description: The job's mode.
        themeGenerationConfig:
          $ref: "#/components/schemas/ThemeGenerationConfig"
          description: The job's theme generation settings.
        status:
          $ref: "#/components/schemas/Status"
          description: "The status of the batch inference job. The status is one of the following values: PENDING IN PROGRESS ACTIVE CREATE FAILED"
        creationDateTime:
          $ref: "#/components/schemas/Date"
          description: The time at which the batch inference job was created.
        lastUpdatedDateTime:
          $ref: "#/components/schemas/Date"
          description: The time at which the batch inference job was last updated.
    FailureReason:
      type: string
    Status:
      type: string
      maxLength: 256
    DescribeBatchSegmentJobResponse:
      type: object
      properties:
        batchSegmentJob:
          $ref: "#/components/schemas/BatchSegmentJob"
          description: Information on the specified batch segment job.
    BatchSegmentJob:
      description: Contains information on a batch segment job.
      type: object
      properties:
        jobName:
          $ref: "#/components/schemas/Name"
          description: The name of the batch segment job.
        batchSegmentJobArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the batch segment job.
        filterArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the filter used on the batch segment job.
        failureReason:
          $ref: "#/components/schemas/FailureReason"
          description: If the batch segment job failed, the reason for the failure.
        solutionVersionArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the solution version used by the batch segment job to generate batch segments.
        numResults:
          $ref: "#/components/schemas/NumBatchResults"
          description: The number of predicted users generated by the batch segment job for each line of input data. The maximum number of users per segment is 5 million.
