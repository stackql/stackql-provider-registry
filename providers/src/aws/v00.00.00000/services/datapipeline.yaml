openapi: 3.0.0
info:
  version: "2012-10-29"
  title: AWS Data Pipeline
  description: AWS Data Pipeline
  x-serviceName: datapipeline
  x-serviceAlias: datapipeline
  x-protocol: json
  x-apiVersion: "2012-10-29"
  x-endpointPrefix: datapipeline
  x-targetPrefix: DataPipeline
  x-jsonVersion: "1.1"
servers:
  - url: https://datapipeline.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for datapipeline
paths:
  /ActivatePipeline:
    post:
      operationId: ActivatePipeline
      description: Validates the specified pipeline and starts processing pipeline tasks. If the pipeline does not pass validation, activation fails. If you need to pause the pipeline to investigate an issue with a component, such as a data source or script, call DeactivatePipeline. To activate a finished pipeline, modify the end date for the pipeline and then activate it.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.ActivatePipeline
            default: DataPipeline.ActivatePipeline
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineId:
                  $ref: "#/components/schemas/id"
                  description: The ID of the pipeline.
                parameterValues:
                  $ref: "#/components/schemas/ParameterValueList"
                  description: A list of parameter values to pass to the pipeline at activation.
                startTimestamp:
                  $ref: "#/components/schemas/timestamp"
                  description: The date and time to resume the pipeline. By default, the pipeline resumes from the last completed execution.
              required:
                - pipelineId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivatePipelineOutput"
  /AddTags:
    post:
      operationId: AddTags
      description: Adds or modifies tags for the specified pipeline.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.AddTags
            default: DataPipeline.AddTags
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineId:
                  $ref: "#/components/schemas/id"
                  description: The ID of the pipeline.
                tags:
                  $ref: "#/components/schemas/tagList"
                  description: The tags to add, as key/value pairs.
              required:
                - pipelineId
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddTagsOutput"
  /CreatePipeline:
    post:
      operationId: CreatePipeline
      description: Creates a new, empty pipeline. Use PutPipelineDefinition to populate the pipeline.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.CreatePipeline
            default: DataPipeline.CreatePipeline
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/id"
                  description: The name for the pipeline. You can use the same name for multiple pipelines associated with your AWS account, because AWS Data Pipeline assigns each pipeline a unique pipeline identifier.
                uniqueId:
                  $ref: "#/components/schemas/id"
                  description: A unique identifier. This identifier is not the same as the pipeline identifier assigned by AWS Data Pipeline. You are responsible for defining the format and ensuring the uniqueness of this identifier. You use this parameter to ensure idempotency during repeated calls to CreatePipeline. For example, if the first call to CreatePipeline does not succeed, you can pass in the same unique identifier and pipeline name combination on a subsequent call to CreatePipeline. CreatePipeline ensures that if a pipeline already exists with the same name and unique identifier, a new pipeline is not created. Instead, you'll receive the pipeline identifier from the previous attempt. The uniqueness of the name and unique identifier combination is scoped to the AWS account or IAM user credentials.
                description:
                  $ref: "#/components/schemas/string"
                  description: The description for the pipeline.
                tags:
                  $ref: "#/components/schemas/tagList"
                  description: A list of tags to associate with the pipeline at creation. Tags let you control access to pipelines. For more information, see Controlling User Access to Pipelines in the AWS Data Pipeline Developer Guide.
              required:
                - name
                - uniqueId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePipelineOutput"
  /DeactivatePipeline:
    post:
      operationId: DeactivatePipeline
      description: Deactivates the specified running pipeline. The pipeline is set to the DEACTIVATING state until the deactivation process completes. To resume a deactivated pipeline, use ActivatePipeline. By default, the pipeline resumes from the last completed execution. Optionally, you can specify the date and time to resume the pipeline.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.DeactivatePipeline
            default: DataPipeline.DeactivatePipeline
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineId:
                  $ref: "#/components/schemas/id"
                  description: The ID of the pipeline.
                cancelActive:
                  $ref: "#/components/schemas/cancelActive"
                  description: Indicates whether to cancel any running objects. The default is true, which sets the state of any running objects to CANCELED. If this value is false, the pipeline is deactivated after all running objects finish.
              required:
                - pipelineId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeactivatePipelineOutput"
  /DeletePipeline:
    post:
      operationId: DeletePipeline
      description: Deletes a pipeline, its pipeline definition, and its run history. AWS Data Pipeline attempts to cancel instances associated with the pipeline that are currently being processed by task runners. Deleting a pipeline cannot be undone. You cannot query or restore a deleted pipeline. To temporarily pause a pipeline instead of deleting it, call SetStatus with the status set to PAUSE on individual components. Components that are paused by SetStatus can be resumed.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.DeletePipeline
            default: DataPipeline.DeletePipeline
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineId:
                  $ref: "#/components/schemas/id"
                  description: The ID of the pipeline.
              required:
                - pipelineId
      responses:
        "200":
          description: Success
  /DescribeObjects:
    post:
      operationId: DescribeObjects
      description: Gets the object definitions for a set of objects associated with the pipeline. Object definitions are composed of a set of fields that define the properties of the object.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.DescribeObjects
            default: DataPipeline.DescribeObjects
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineId:
                  $ref: "#/components/schemas/id"
                  description: The ID of the pipeline that contains the object definitions.
                objectIds:
                  $ref: "#/components/schemas/idList"
                  description: The IDs of the pipeline objects that contain the definitions to be described. You can pass as many as 25 identifiers in a single call to DescribeObjects.
                evaluateExpressions:
                  $ref: "#/components/schemas/boolean"
                  description: Indicates whether any expressions in the object should be evaluated when the object descriptions are returned.
                marker:
                  $ref: "#/components/schemas/string"
                  description: The starting point for the results to be returned. For the first call, this value should be empty. As long as there are more results, continue to call DescribeObjects with the marker value from the previous call to retrieve the next set of results.
              required:
                - pipelineId
                - objectIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeObjectsOutput"
  /DescribePipelines:
    post:
      operationId: DescribePipelines
      description: Retrieves metadata about one or more pipelines. The information retrieved includes the name of the pipeline, the pipeline identifier, its current state, and the user account that owns the pipeline. Using account credentials, you can retrieve metadata about pipelines that you or your IAM users have created. If you are using an IAM user account, you can retrieve metadata about only those pipelines for which you have read permissions. To retrieve the full pipeline definition instead of metadata about the pipeline, call GetPipelineDefinition.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.DescribePipelines
            default: DataPipeline.DescribePipelines
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineIds:
                  $ref: "#/components/schemas/idList"
                  description: The IDs of the pipelines to describe. You can pass as many as 25 identifiers in a single call. To obtain pipeline IDs, call ListPipelines.
              required:
                - pipelineIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribePipelinesOutput"
  /EvaluateExpression:
    post:
      operationId: EvaluateExpression
      description: Task runners call EvaluateExpression to evaluate a string in the context of the specified object. For example, a task runner can evaluate SQL queries stored in Amazon S3.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.EvaluateExpression
            default: DataPipeline.EvaluateExpression
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineId:
                  $ref: "#/components/schemas/id"
                  description: The ID of the pipeline.
                objectId:
                  $ref: "#/components/schemas/id"
                  description: The ID of the object.
                expression:
                  $ref: "#/components/schemas/longString"
                  description: The expression to evaluate.
              required:
                - pipelineId
                - objectId
                - expression
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateExpressionOutput"
  /GetPipelineDefinition:
    post:
      operationId: GetPipelineDefinition
      description: Gets the definition of the specified pipeline. You can call GetPipelineDefinition to retrieve the pipeline definition that you provided using PutPipelineDefinition.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.GetPipelineDefinition
            default: DataPipeline.GetPipelineDefinition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineId:
                  $ref: "#/components/schemas/id"
                  description: The ID of the pipeline.
                version:
                  $ref: "#/components/schemas/string"
                  description: The version of the pipeline definition to retrieve. Set this parameter to latest (default) to use the last definition saved to the pipeline or active to use the last definition that was activated.
              required:
                - pipelineId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPipelineDefinitionOutput"
  /ListPipelines:
    post:
      operationId: ListPipelines
      description: Lists the pipeline identifiers for all active pipelines that you have permission to access.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.ListPipelines
            default: DataPipeline.ListPipelines
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                marker:
                  $ref: "#/components/schemas/string"
                  description: The starting point for the results to be returned. For the first call, this value should be empty. As long as there are more results, continue to call ListPipelines with the marker value from the previous call to retrieve the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPipelinesOutput"
  /PollForTask:
    post:
      operationId: PollForTask
      description: Task runners call PollForTask to receive a task to perform from AWS Data Pipeline. The task runner specifies which tasks it can perform by setting a value for the workerGroup parameter. The task returned can come from any of the pipelines that match the workerGroup value passed in by the task runner and that was launched using the IAM user credentials specified by the task runner. If tasks are ready in the work queue, PollForTask returns a response immediately. If no tasks are available in the queue, PollForTask uses long-polling and holds on to a poll connection for up to a 90 seconds, during which time the first newly scheduled task is handed to the task runner. To accomodate this, set the socket timeout in your task runner to 90 seconds. The task runner should not call PollForTask again on the same workerGroup until it receives a response, and this can take up to 90 seconds.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.PollForTask
            default: DataPipeline.PollForTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                workerGroup:
                  $ref: "#/components/schemas/string"
                  description: The type of task the task runner is configured to accept and process. The worker group is set as a field on objects in the pipeline when they are created. You can only specify a single value for workerGroup in the call to PollForTask. There are no wildcard values permitted in workerGroup; the string must be an exact, case-sensitive, match.
                hostname:
                  $ref: "#/components/schemas/id"
                  description: The public DNS name of the calling task runner.
                instanceIdentity:
                  $ref: "#/components/schemas/InstanceIdentity"
                  description: Identity information for the EC2 instance that is hosting the task runner. You can get this value from the instance using http://169.254.169.254/latest/meta-data/instance-id. For more information, see Instance Metadata in the Amazon Elastic Compute Cloud User Guide. Passing in this value proves that your task runner is running on an EC2 instance, and ensures the proper AWS Data Pipeline service charges are applied to your pipeline.
              required:
                - workerGroup
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PollForTaskOutput"
  /PutPipelineDefinition:
    post:
      operationId: PutPipelineDefinition
      description: Adds tasks, schedules, and preconditions to the specified pipeline. You can use PutPipelineDefinition to populate a new pipeline. PutPipelineDefinition also validates the configuration as it adds it to the pipeline. Changes to the pipeline are saved unless one of the following three validation errors exists in the pipeline. An object is missing a name or identifier field. A string or reference field is empty. The number of objects in the pipeline exceeds the maximum allowed objects. The pipeline is in a FINISHED state. Pipeline object definitions are passed to the PutPipelineDefinition action and returned by the GetPipelineDefinition action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.PutPipelineDefinition
            default: DataPipeline.PutPipelineDefinition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineId:
                  $ref: "#/components/schemas/id"
                  description: The ID of the pipeline.
                pipelineObjects:
                  $ref: "#/components/schemas/PipelineObjectList"
                  description: The objects that define the pipeline. These objects overwrite the existing pipeline definition.
                parameterObjects:
                  $ref: "#/components/schemas/ParameterObjectList"
                  description: The parameter objects used with the pipeline.
                parameterValues:
                  $ref: "#/components/schemas/ParameterValueList"
                  description: The parameter values used with the pipeline.
              required:
                - pipelineId
                - pipelineObjects
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutPipelineDefinitionOutput"
  /QueryObjects:
    post:
      operationId: QueryObjects
      description: Queries the specified pipeline for the names of objects that match the specified set of conditions.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.QueryObjects
            default: DataPipeline.QueryObjects
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineId:
                  $ref: "#/components/schemas/id"
                  description: The ID of the pipeline.
                query:
                  $ref: "#/components/schemas/Query"
                  description: The query that defines the objects to be returned. The Query object can contain a maximum of ten selectors. The conditions in the query are limited to top-level String fields in the object. These filters can be applied to components, instances, and attempts.
                sphere:
                  $ref: "#/components/schemas/string"
                  description: "Indicates whether the query applies to components or instances. The possible values are: COMPONENT, INSTANCE, and ATTEMPT."
                marker:
                  $ref: "#/components/schemas/string"
                  description: The starting point for the results to be returned. For the first call, this value should be empty. As long as there are more results, continue to call QueryObjects with the marker value from the previous call to retrieve the next set of results.
                limit:
                  $ref: "#/components/schemas/int"
                  description: The maximum number of object names that QueryObjects will return in a single call. The default value is 100.
              required:
                - pipelineId
                - sphere
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryObjectsOutput"
  /RemoveTags:
    post:
      operationId: RemoveTags
      description: Removes existing tags from the specified pipeline.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.RemoveTags
            default: DataPipeline.RemoveTags
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineId:
                  $ref: "#/components/schemas/id"
                  description: The ID of the pipeline.
                tagKeys:
                  $ref: "#/components/schemas/stringList"
                  description: The keys of the tags to remove.
              required:
                - pipelineId
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveTagsOutput"
  /ReportTaskProgress:
    post:
      operationId: ReportTaskProgress
      description: Task runners call ReportTaskProgress when assigned a task to acknowledge that it has the task. If the web service does not receive this acknowledgement within 2 minutes, it assigns the task in a subsequent PollForTask call. After this initial acknowledgement, the task runner only needs to report progress every 15 minutes to maintain its ownership of the task. You can change this reporting time from 15 minutes by specifying a reportProgressTimeout field in your pipeline. If a task runner does not report its status after 5 minutes, AWS Data Pipeline assumes that the task runner is unable to process the task and reassigns the task in a subsequent response to PollForTask. Task runners should call ReportTaskProgress every 60 seconds.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.ReportTaskProgress
            default: DataPipeline.ReportTaskProgress
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                taskId:
                  $ref: "#/components/schemas/taskId"
                  description: The ID of the task assigned to the task runner. This value is provided in the response for PollForTask.
                fields:
                  $ref: "#/components/schemas/fieldList"
                  description: Key-value pairs that define the properties of the ReportTaskProgressInput object.
              required:
                - taskId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportTaskProgressOutput"
  /ReportTaskRunnerHeartbeat:
    post:
      operationId: ReportTaskRunnerHeartbeat
      description: Task runners call ReportTaskRunnerHeartbeat every 15 minutes to indicate that they are operational. If the AWS Data Pipeline Task Runner is launched on a resource managed by AWS Data Pipeline, the web service can use this call to detect when the task runner application has failed and restart a new instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.ReportTaskRunnerHeartbeat
            default: DataPipeline.ReportTaskRunnerHeartbeat
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                taskrunnerId:
                  $ref: "#/components/schemas/id"
                  description: The ID of the task runner. This value should be unique across your AWS account. In the case of AWS Data Pipeline Task Runner launched on a resource managed by AWS Data Pipeline, the web service provides a unique identifier when it launches the application. If you have written a custom task runner, you should assign a unique identifier for the task runner.
                workerGroup:
                  $ref: "#/components/schemas/string"
                  description: The type of task the task runner is configured to accept and process. The worker group is set as a field on objects in the pipeline when they are created. You can only specify a single value for workerGroup. There are no wildcard values permitted in workerGroup; the string must be an exact, case-sensitive, match.
                hostname:
                  $ref: "#/components/schemas/id"
                  description: The public DNS name of the task runner.
              required:
                - taskrunnerId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportTaskRunnerHeartbeatOutput"
  /SetStatus:
    post:
      operationId: SetStatus
      description: Requests that the status of the specified physical or logical pipeline objects be updated in the specified pipeline. This update might not occur immediately, but is eventually consistent. The status that can be set depends on the type of object (for example, DataNode or Activity). You cannot perform this operation on FINISHED pipelines and attempting to do so returns InvalidRequestException.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.SetStatus
            default: DataPipeline.SetStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineId:
                  $ref: "#/components/schemas/id"
                  description: The ID of the pipeline that contains the objects.
                objectIds:
                  $ref: "#/components/schemas/idList"
                  description: The IDs of the objects. The corresponding objects can be either physical or components, but not a mix of both types.
                status:
                  $ref: "#/components/schemas/string"
                  description: The status to be set on all the objects specified in objectIds. For components, use PAUSE or RESUME. For instances, use TRY_CANCEL, RERUN, or MARK_FINISHED.
              required:
                - pipelineId
                - objectIds
                - status
      responses:
        "200":
          description: Success
  /SetTaskStatus:
    post:
      operationId: SetTaskStatus
      description: Task runners call SetTaskStatus to notify AWS Data Pipeline that a task is completed and provide information about the final status. A task runner makes this call regardless of whether the task was sucessful. A task runner does not need to call SetTaskStatus for tasks that are canceled by the web service during a call to ReportTaskProgress.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.SetTaskStatus
            default: DataPipeline.SetTaskStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                taskId:
                  $ref: "#/components/schemas/taskId"
                  description: The ID of the task assigned to the task runner. This value is provided in the response for PollForTask.
                taskStatus:
                  $ref: "#/components/schemas/TaskStatus"
                  description: If FINISHED, the task successfully completed. If FAILED, the task ended unsuccessfully. Preconditions use false.
                errorId:
                  $ref: "#/components/schemas/string"
                  description: If an error occurred during the task, this value specifies the error code. This value is set on the physical attempt object. It is used to display error information to the user. It should not start with string "Service_" which is reserved by the system.
                errorMessage:
                  $ref: "#/components/schemas/errorMessage"
                  description: If an error occurred during the task, this value specifies a text description of the error. This value is set on the physical attempt object. It is used to display error information to the user. The web service does not parse this value.
                errorStackTrace:
                  $ref: "#/components/schemas/string"
                  description: If an error occurred during the task, this value specifies the stack trace associated with the error. This value is set on the physical attempt object. It is used to display error information to the user. The web service does not parse this value.
              required:
                - taskId
                - taskStatus
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetTaskStatusOutput"
  /ValidatePipelineDefinition:
    post:
      operationId: ValidatePipelineDefinition
      description: Validates the specified pipeline definition to ensure that it is well formed and can be run without error.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DataPipeline.ValidatePipelineDefinition
            default: DataPipeline.ValidatePipelineDefinition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineId:
                  $ref: "#/components/schemas/id"
                  description: The ID of the pipeline.
                pipelineObjects:
                  $ref: "#/components/schemas/PipelineObjectList"
                  description: The objects that define the pipeline changes to validate against the pipeline.
                parameterObjects:
                  $ref: "#/components/schemas/ParameterObjectList"
                  description: The parameter objects used with the pipeline.
                parameterValues:
                  $ref: "#/components/schemas/ParameterValueList"
                  description: The parameter values used with the pipeline.
              required:
                - pipelineId
                - pipelineObjects
      responses:
