openapi: 3.0.0
info:
  version: "2017-07-01"
  title: Amazon HealthLake
  description: Amazon HealthLake
  x-serviceName: healthlake
  x-serviceAlias: healthlake
  x-protocol: json
  x-apiVersion: "2017-07-01"
  x-endpointPrefix: healthlake
  x-targetPrefix: HealthLake
  x-jsonVersion: "1.0"
servers:
  - url: https://healthlake.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for healthlake
paths:
  /CreateFHIRDatastore:
    post:
      operationId: CreateFHIRDatastore
      description: Create a FHIR-enabled data store.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - HealthLake.CreateFHIRDatastore
            default: HealthLake.CreateFHIRDatastore
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatastoreName:
                  $ref: "#/components/schemas/DatastoreName"
                  description: The data store name (user-generated).
                DatastoreTypeVersion:
                  $ref: "#/components/schemas/FHIRVersion"
                  description: The FHIR release version supported by the data store. Current support is for version R4.
                SseConfiguration:
                  $ref: "#/components/schemas/SseConfiguration"
                  description: The server-side encryption key configuration for a customer-provided encryption key specified for creating a data store.
                PreloadDataConfig:
                  $ref: "#/components/schemas/PreloadDataConfig"
                  description: An optional parameter to preload (import) open source Synthea FHIR data upon creation of the data store.
                ClientToken:
                  $ref: "#/components/schemas/ClientTokenString"
                  description: An optional user-provided token to ensure API idempotency.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The resource tags applied to a data store when it is created.
                IdentityProviderConfiguration:
                  $ref: "#/components/schemas/IdentityProviderConfiguration"
                  description: The identity provider configuration to use for the data store.
              required:
                - DatastoreTypeVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFHIRDatastoreResponse"
  /DeleteFHIRDatastore:
    post:
      operationId: DeleteFHIRDatastore
      description: Delete a FHIR-enabled data store.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - HealthLake.DeleteFHIRDatastore
            default: HealthLake.DeleteFHIRDatastore
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatastoreId:
                  $ref: "#/components/schemas/DatastoreId"
                  description: The AWS-generated identifier for the data store to be deleted.
              required:
                - DatastoreId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteFHIRDatastoreResponse"
  /DescribeFHIRDatastore:
    post:
      operationId: DescribeFHIRDatastore
      description: Get properties for a FHIR-enabled data store.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - HealthLake.DescribeFHIRDatastore
            default: HealthLake.DescribeFHIRDatastore
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatastoreId:
                  $ref: "#/components/schemas/DatastoreId"
                  description: The data store identifier.
              required:
                - DatastoreId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeFHIRDatastoreResponse"
  /DescribeFHIRExportJob:
    post:
      operationId: DescribeFHIRExportJob
      description: Get FHIR export job properties.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - HealthLake.DescribeFHIRExportJob
            default: HealthLake.DescribeFHIRExportJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatastoreId:
                  $ref: "#/components/schemas/DatastoreId"
                  description: The data store identifier from which FHIR data is being exported from.
                JobId:
                  $ref: "#/components/schemas/JobId"
                  description: The export job identifier.
              required:
                - DatastoreId
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeFHIRExportJobResponse"
  /DescribeFHIRImportJob:
    post:
      operationId: DescribeFHIRImportJob
      description: Get the import job properties to learn more about the job or job progress.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - HealthLake.DescribeFHIRImportJob
            default: HealthLake.DescribeFHIRImportJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatastoreId:
                  $ref: "#/components/schemas/DatastoreId"
                  description: The data store identifier.
                JobId:
                  $ref: "#/components/schemas/JobId"
                  description: The import job identifier.
              required:
                - DatastoreId
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeFHIRImportJobResponse"
  /ListFHIRDatastores:
    post:
      operationId: ListFHIRDatastores
      description: List all FHIR-enabled data stores in a user’s account, regardless of data store status.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - HealthLake.ListFHIRDatastores
            default: HealthLake.ListFHIRDatastores
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Filter:
                  $ref: "#/components/schemas/DatastoreFilter"
                  description: List all filters associated with a FHIR data store request.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token used to retrieve the next page of data stores when results are paginated.
                MaxResults:
                  $ref: "#/components/schemas/MaxResultsInteger"
                  description: The maximum number of data stores returned on a page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFHIRDatastoresResponse"
  /ListFHIRExportJobs:
    post:
      operationId: ListFHIRExportJobs
      description: Lists all FHIR export jobs associated with an account and their statuses.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - HealthLake.ListFHIRExportJobs
            default: HealthLake.ListFHIRExportJobs
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatastoreId:
                  $ref: "#/components/schemas/DatastoreId"
                  description: Limits the response to the export job with the specified data store ID.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A pagination token used to identify the next page of results to return.
                MaxResults:
                  $ref: "#/components/schemas/MaxResultsInteger"
                  description: Limits the number of results returned for a ListFHIRExportJobs to a maximum quantity specified by the user.
                JobName:
                  $ref: "#/components/schemas/JobName"
                  description: Limits the response to the export job with the specified job name.
                JobStatus:
                  $ref: "#/components/schemas/JobStatus"
                  description: Limits the response to export jobs with the specified job status.
                SubmittedBefore:
                  $ref: "#/components/schemas/Timestamp"
                  description: Limits the response to FHIR export jobs submitted before a user- specified date.
                SubmittedAfter:
                  $ref: "#/components/schemas/Timestamp"
                  description: Limits the response to FHIR export jobs submitted after a user-specified date.
              required:
                - DatastoreId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFHIRExportJobsResponse"
  /ListFHIRImportJobs:
    post:
      operationId: ListFHIRImportJobs
      description: List all FHIR import jobs associated with an account and their statuses.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - HealthLake.ListFHIRImportJobs
            default: HealthLake.ListFHIRImportJobs
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatastoreId:
                  $ref: "#/components/schemas/DatastoreId"
                  description: Limits the response to the import job with the specified data store ID.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The pagination token used to identify the next page of results to return.
                MaxResults:
                  $ref: "#/components/schemas/MaxResultsInteger"
                  description: Limits the number of results returned for ListFHIRImportJobs to a maximum quantity specified by the user.
                JobName:
                  $ref: "#/components/schemas/JobName"
                  description: Limits the response to the import job with the specified job name.
                JobStatus:
                  $ref: "#/components/schemas/JobStatus"
                  description: Limits the response to the import job with the specified job status.
                SubmittedBefore:
                  $ref: "#/components/schemas/Timestamp"
                  description: Limits the response to FHIR import jobs submitted before a user- specified date.
                SubmittedAfter:
                  $ref: "#/components/schemas/Timestamp"
                  description: Limits the response to FHIR import jobs submitted after a user-specified date.
              required:
                - DatastoreId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFHIRImportJobsResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Returns a list of all existing tags associated with a data store.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - HealthLake.ListTagsForResource
            default: HealthLake.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the data store to which tags are being added.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /StartFHIRExportJob:
    post:
      operationId: StartFHIRExportJob
      description: Start a FHIR export job.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - HealthLake.StartFHIRExportJob
            default: HealthLake.StartFHIRExportJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                JobName:
                  $ref: "#/components/schemas/JobName"
                  description: The export job name.
                OutputDataConfig:
                  $ref: "#/components/schemas/OutputDataConfig"
                  description: The output data configuration supplied when the export job was started.
                DatastoreId:
                  $ref: "#/components/schemas/DatastoreId"
                  description: The data store identifier from which files are being exported.
                DataAccessRoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The Amazon Resource Name (ARN) used during initiation of the export job.
                ClientToken:
                  $ref: "#/components/schemas/ClientTokenString"
                  description: An optional user provided token used for ensuring API idempotency.
              required:
                - OutputDataConfig
                - DatastoreId
                - DataAccessRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartFHIRExportJobResponse"
  /StartFHIRImportJob:
    post:
      operationId: StartFHIRImportJob
      description: Start importing bulk FHIR data into an ACTIVE data store. The import job imports FHIR data found in the InputDataConfig object and stores processing results in the JobOutputDataConfig object.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - HealthLake.StartFHIRImportJob
            default: HealthLake.StartFHIRImportJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                JobName:
                  $ref: "#/components/schemas/JobName"
                  description: The import job name.
                InputDataConfig:
                  $ref: "#/components/schemas/InputDataConfig"
                  description: The input properties for the import job request.
                JobOutputDataConfig:
                  $ref: "#/components/schemas/OutputDataConfig"
                DatastoreId:
                  $ref: "#/components/schemas/DatastoreId"
                  description: The data store identifier.
                DataAccessRoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The Amazon Resource Name (ARN) that grants access permission to AWS HealthLake.
                ClientToken:
                  $ref: "#/components/schemas/ClientTokenString"
                  description: The optional user-provided token used for ensuring API idempotency.
                ValidationLevel:
                  $ref: "#/components/schemas/ValidationLevel"
                  description: The validation level of the import job.
              required:
                - InputDataConfig
                - JobOutputDataConfig
                - DatastoreId
                - DataAccessRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartFHIRImportJobResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Add a user-specifed key and value tag to a data store.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - HealthLake.TagResource
            default: HealthLake.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) that grants access to the data store tags are being added to.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The user-specified key and value pair tags being added to a data store.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Remove a user-specifed key and value tag from a data store.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - HealthLake.UntagResource
            default: HealthLake.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the data store from which tags are being removed.
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: The keys for the tags to be removed from the data store.
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DatastoreName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-%@]*)$
    FHIRVersion:
      type: string
      enum:
        - R4
    SseConfiguration:
      description: The server-side encryption key configuration for a customer-provided encryption key.
      type: object
      properties:
        KmsEncryptionConfig:
          $ref: "#/components/schemas/KmsEncryptionConfig"
          description: The Key Management Service (KMS) encryption configuration used to provide details for data encryption.
      required:
        - KmsEncryptionConfig
    KmsEncryptionConfig:
      description: The customer-managed-key (CMK) used when creating a data store. If a customer-owned key is not specified, an AWS-owned key is used for encryption.
      type: object
      properties:
        CmkType:
          $ref: "#/components/schemas/CmkType"
          description: The type of customer-managed-key (CMK) used for encryption.
        KmsKeyId:
          $ref: "#/components/schemas/EncryptionKeyID"
          description: The Key Management Service (KMS) encryption key id/alias used to encrypt the data store contents at rest.
      required:
        - CmkType
    CmkType:
      type: string
      enum:
        - CUSTOMER_MANAGED_KMS_KEY
        - AWS_OWNED_KMS_KEY
    EncryptionKeyID:
      type: string
      minLength: 1
      maxLength: 400
      pattern: (arn:aws((-us-gov)|(-iso)|(-iso-b)|(-cn))?:kms:)?([a-z]{2}-[a-z]+(-[a-z]+)?-\d:)?(\d{12}:)?(((key/)?[a-zA-Z0-9-_]+)|(alias/[a-zA-Z0-9:/_-]+))
    PreloadDataConfig:
      description: The input properties for the preloaded (Synthea) data store.
      type: object
      properties:
        PreloadDataType:
          $ref: "#/components/schemas/PreloadDataType"
          description: The type of preloaded data. Only Synthea preloaded data is supported.
      required:
        - PreloadDataType
    PreloadDataType:
      type: string
      enum:
        - SYNTHEA
    ClientTokenString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z0-9-]+$
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A label consisting of a user-defined key and value. The form for tags is {"Key", "Value"}
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key portion of a tag. Tag keys are case sensitive.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value portion of a tag. Tag values are case-sensitive.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    IdentityProviderConfiguration:
      description: The identity provider configuration selected when the data store was created.
      type: object
      properties:
        AuthorizationStrategy:
          $ref: "#/components/schemas/AuthorizationStrategy"
          description: The authorization strategy selected when the HealthLake data store is created. HealthLake provides support for both SMART on FHIR V1 and V2 as described below. SMART_ON_FHIR_V1 – Support for only SMART on FHIR V1, which includes read (read/search) and write (create/update/delete) permissions. SMART_ON_FHIR – Support for both SMART on FHIR V1 and V2, which includes create, read, update, delete, and search permissions. AWS_AUTH – The default HealthLake authorization strategy; not affiliated with SMART on FHIR.
        FineGrainedAuthorizationEnabled:
          $ref: "#/components/schemas/Boolean"
          description: The parameter to enable SMART on FHIR fine-grained authorization for the data store.
        Metadata:
          $ref: "#/components/schemas/ConfigurationMetadata"
          description: "The JSON metadata elements to use in your identity provider configuration. Required elements are listed based on the launch specification of the SMART application. For more information on all possible elements, see Metadata in SMART's App Launch specification. authorization_endpoint: The URL to the OAuth2 authorization endpoint. grant_types_supported: An array of grant types that are supported at the token endpoint. You must provide at least one grant type option. Valid options are authorization_code and client_credentials. token_endpoint: The URL to the OAuth2 token endpoint. capabilities: An array of strings of the SMART capabilities that the authorization server supports. code_challenge_methods_supported: An array of strings of supported PKCE code challenge methods. You must include the S256 method in the array of PKCE code challenge methods."
        IdpLambdaArn:
          $ref: "#/components/schemas/LambdaArn"
          description: The Amazon Resource Name (ARN) of the Lambda function to use to decode the access token created by the authorization server.
      required:
        - AuthorizationStrategy
    AuthorizationStrategy:
      type: string
      enum:
        - SMART_ON_FHIR_V1
        - SMART_ON_FHIR
        - AWS_AUTH
    Boolean:
      type: boolean
    ConfigurationMetadata:
      type: string
    LambdaArn:
      type: string
      minLength: 49
      maxLength: 256
      pattern: arn:aws:lambda:[a-z]{2}-[a-z]+-\d{1}:\d{12}:function:[a-zA-Z0-9\-_\.]+(:(\$LATEST|[a-zA-Z0-9\-_]+))?
    CreateFHIRDatastoreResponse:
      type: object
      properties:
        DatastoreId:
          $ref: "#/components/schemas/DatastoreId"
          description: The data store identifier.
        DatastoreArn:
          $ref: "#/components/schemas/DatastoreArn"
          description: The Amazon Resource Name (ARN) for the data store.
        DatastoreStatus:
          $ref: "#/components/schemas/DatastoreStatus"
          description: The data store status.
        DatastoreEndpoint:
          $ref: "#/components/schemas/BoundedLengthString"
          description: The AWS endpoint created for the data store.
      required:
        - DatastoreId
        - DatastoreArn
        - DatastoreStatus
        - DatastoreEndpoint
    DatastoreId:
      type: string
      minLength: 1
      maxLength: 32
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-%@]*)$
    DatastoreArn:
      type: string
      pattern: ^arn:aws((-us-gov)|(-iso)|(-iso-b)|(-cn))?:healthlake:[a-zA-Z0-9-]+:[0-9]{12}:datastore/.+?
    DatastoreStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - DELETING
        - DELETED
        - CREATE_FAILED
    BoundedLengthString:
      type: string
      minLength: 1
      maxLength: 5000
      pattern: "[\\P{M}\\p{M}]{1,5000}"
    DeleteFHIRDatastoreResponse:
      type: object
      properties:
        DatastoreId:
          $ref: "#/components/schemas/DatastoreId"
          description: The AWS-generated ID for the deleted data store.
        DatastoreArn:
          $ref: "#/components/schemas/DatastoreArn"
          description: The Amazon Resource Name (ARN) that grants access permission to AWS HealthLake.
        DatastoreStatus:
          $ref: "#/components/schemas/DatastoreStatus"
          description: The data store status.
        DatastoreEndpoint:
          $ref: "#/components/schemas/BoundedLengthString"
          description: The AWS endpoint of the data store to be deleted.
      required:
        - DatastoreId
        - DatastoreArn
        - DatastoreStatus
        - DatastoreEndpoint
    DescribeFHIRDatastoreResponse:
      type: object
      properties:
        DatastoreProperties:
          $ref: "#/components/schemas/DatastoreProperties"
          description: The data store properties.
      required:
        - DatastoreProperties
    DatastoreProperties:
      description: The data store properties.
      type: object
      properties:
        DatastoreId:
          $ref: "#/components/schemas/DatastoreId"
          description: The data store identifier.
        DatastoreArn:
          $ref: "#/components/schemas/DatastoreArn"
          description: The Amazon Resource Name (ARN) used in the creation of the data store.
        DatastoreName:
          $ref: "#/components/schemas/DatastoreName"
          description: The data store name.
        DatastoreStatus:
          $ref: "#/components/schemas/DatastoreStatus"
          description: The data store status.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time the data store was created.
        DatastoreTypeVersion:
          $ref: "#/components/schemas/FHIRVersion"
          description: The FHIR release version supported by the data store. Current support is for version R4.
        DatastoreEndpoint:
          $ref: "#/components/schemas/String"
          description: The AWS endpoint for the data store.
        SseConfiguration:
          $ref: "#/components/schemas/SseConfiguration"
          description: The server-side encryption key configuration for a customer provided encryption key.
        PreloadDataConfig:
          $ref: "#/components/schemas/PreloadDataConfig"
          description: The preloaded Synthea data configuration for the data store.
        IdentityProviderConfiguration:
          $ref: "#/components/schemas/IdentityProviderConfiguration"
          description: The identity provider selected during data store creation.
        ErrorCause:
          $ref: "#/components/schemas/ErrorCause"
          description: The error cause for the current data store operation.
      required:
        - DatastoreId
        - DatastoreArn
        - DatastoreStatus
        - DatastoreTypeVersion
        - DatastoreEndpoint
    Timestamp:
      type: string
      format: date-time
    String:
      type: string
      maxLength: 10000
      pattern: "[\\P{M}\\p{M}]{0,10000}"
    ErrorCause:
      description: The error information for CreateFHIRDatastore and DeleteFHIRDatastore actions.
      type: object
      properties:
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message text for ErrorCause.
        ErrorCategory:
          $ref: "#/components/schemas/ErrorCategory"
          description: The error category for ErrorCause.
    ErrorMessage:
      type: string
      minLength: 1
      maxLength: 4096
    ErrorCategory:
      type: string
      enum:
        - RETRYABLE_ERROR
        - NON_RETRYABLE_ERROR
    JobId:
      type: string
      minLength: 1
      maxLength: 32
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-%@]*)$
    DescribeFHIRExportJobResponse:
      type: object
      properties:
        ExportJobProperties:
          $ref: "#/components/schemas/ExportJobProperties"
          description: The export job properties.
      required:
        - ExportJobProperties
    ExportJobProperties:
      description: The properties of a FHIR export job.
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/JobId"
          description: The export job identifier.
        JobName:
          $ref: "#/components/schemas/JobName"
          description: The export job name.
        JobStatus:
          $ref: "#/components/schemas/JobStatus"
          description: The export job status.
        SubmitTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the export job was initiated.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the export job completed.
        DatastoreId:
          $ref: "#/components/schemas/DatastoreId"
          description: The data store identifier from which files are being exported.
        OutputDataConfig:
          $ref: "#/components/schemas/OutputDataConfig"
          description: The output data configuration supplied when the export job was created.
        DataAccessRoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) used during the initiation of the export job.
        Message:
          $ref: "#/components/schemas/Message"
          description: An explanation of any errors that might have occurred during the export job.
      required:
        - JobId
        - JobStatus
        - SubmitTime
        - DatastoreId
        - OutputDataConfig
    JobName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-%@]*)$
    JobStatus:
      type: string
      enum:
        - SUBMITTED
        - QUEUED
        - IN_PROGRESS
        - COMPLETED_WITH_ERRORS
        - COMPLETED
        - FAILED
        - CANCEL_SUBMITTED
        - CANCEL_IN_PROGRESS
        - CANCEL_COMPLETED
        - CANCEL_FAILED
    OutputDataConfig:
      description: The output data configuration supplied when the export job was created.
      type: object
      properties:
        S3Configuration:
          $ref: "#/components/schemas/S3Configuration"
          description: The output data configuration supplied when the export job was created.
    S3Configuration:
      description: The configuration of the S3 bucket for either an import or export job. This includes assigning access permissions.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The S3Uri is the user-specified S3 location of the FHIR data to be imported into AWS HealthLake.
        KmsKeyId:
          $ref: "#/components/schemas/EncryptionKeyID"
          description: The Key Management Service (KMS) key ID used to access the S3 bucket.
      required:
        - S3Uri
        - KmsKeyId
    S3Uri:
      type: string
      maxLength: 1024
      pattern: s3://[a-z0-9][\.\-a-z0-9]{1,61}[a-z0-9](/.*)?
    IamRoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:iam::[0-9]{12}:role/.+
    Message:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-%@]*)$
    DescribeFHIRImportJobResponse:
      type: object
      properties:
        ImportJobProperties:
          $ref: "#/components/schemas/ImportJobProperties"
          description: The import job properties.
      required:
        - ImportJobProperties
    ImportJobProperties:
      description: The import job properties.
      type: object
      properties:
