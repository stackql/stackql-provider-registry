          $ref: "#/components/schemas/Message"
          description: An explanation of any errors that might have occurred during the FHIR import job.
        ValidationLevel:
          $ref: "#/components/schemas/ValidationLevel"
          description: The validation level of the import job.
      required:
        - JobId
        - JobStatus
        - SubmitTime
        - DatastoreId
        - InputDataConfig
    InputDataConfig:
      description: The import job input properties.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The S3Uri is the user-specified S3 location of the FHIR data to be imported into AWS HealthLake.
    JobProgressReport:
      description: The progress report for the import job.
      type: object
      properties:
        TotalNumberOfScannedFiles:
          $ref: "#/components/schemas/GenericLong"
          description: The number of files scanned from the S3 input bucket.
        TotalSizeOfScannedFilesInMB:
          $ref: "#/components/schemas/GenericDouble"
          description: The size (in MB) of files scanned from the S3 input bucket.
        TotalNumberOfImportedFiles:
          $ref: "#/components/schemas/GenericLong"
          description: The number of files imported.
        TotalNumberOfResourcesScanned:
          $ref: "#/components/schemas/GenericLong"
          description: The number of resources scanned from the S3 input bucket.
        TotalNumberOfResourcesImported:
          $ref: "#/components/schemas/GenericLong"
          description: The number of resources imported.
        TotalNumberOfResourcesWithCustomerError:
          $ref: "#/components/schemas/GenericLong"
          description: The number of resources that failed due to customer error.
        TotalNumberOfFilesReadWithCustomerError:
          $ref: "#/components/schemas/GenericLong"
          description: The number of files that failed to be read from the S3 input bucket due to customer error.
        Throughput:
          $ref: "#/components/schemas/GenericDouble"
          description: The transaction rate the import job is processed at.
    GenericLong:
      type: integer
      format: int64
    GenericDouble:
      type: number
      format: double
    ValidationLevel:
      type: string
      enum:
        - strict
        - structure-only
        - minimal
