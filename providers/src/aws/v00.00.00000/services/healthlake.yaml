    ImportJobPropertiesList:
      type: array
      items:
        $ref: "#/components/schemas/ImportJobProperties"
    AmazonResourceName:
      type: string
      minLength: 1
      maxLength: 1011
      pattern: ^arn:aws((-us-gov)|(-iso)|(-iso-b)|(-cn))?:healthlake:[a-z0-9-]+:\d{12}:datastore\/fhir\/.{32}
    ListTagsForResourceResponse:
