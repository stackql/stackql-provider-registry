          $ref: "#/components/schemas/JobId"
          description: The import job identifier.
        JobName:
          $ref: "#/components/schemas/JobName"
          description: The import job name.
        JobStatus:
          $ref: "#/components/schemas/JobStatus"
          description: The import job status.
        SubmitTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the import job was submitted for processing.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the import job was completed.
        DatastoreId:
          $ref: "#/components/schemas/DatastoreId"
          description: The data store identifier.
        InputDataConfig:
          $ref: "#/components/schemas/InputDataConfig"
          description: The input data configuration supplied when the import job was created.
        JobOutputDataConfig:
          $ref: "#/components/schemas/OutputDataConfig"
        JobProgressReport:
          $ref: "#/components/schemas/JobProgressReport"
          description: Displays the progress of the import job, including total resources scanned, total resources imported, and total size of data imported.
