    AmazonTranscribeCallAnalyticsProcessorConfiguration:
      description: A structure that contains the configuration settings for an Amazon Transcribe call analytics processor.
      type: object
      properties:
        LanguageCode:
          $ref: "#/components/schemas/CallAnalyticsLanguageCode"
          description: The language code in the configuration.
        VocabularyName:
          $ref: "#/components/schemas/VocabularyName"
          description: "Specifies the name of the custom vocabulary to use when processing a transcription. Note that vocabulary names are case sensitive. If the language of the specified custom vocabulary doesn't match the language identified in your media, the custom vocabulary is not applied to your transcription. For more information, see Custom vocabularies in the Amazon Transcribe Developer Guide. Length Constraints: Minimum length of 1. Maximum length of 200."
        VocabularyFilterName:
          $ref: "#/components/schemas/VocabularyFilterName"
          description: "Specifies the name of the custom vocabulary filter to use when processing a transcription. Note that vocabulary filter names are case sensitive. If the language of the specified custom vocabulary filter doesn't match the language identified in your media, the vocabulary filter is not applied to your transcription. For more information, see Using vocabulary filtering with unwanted words in the Amazon Transcribe Developer Guide. Length Constraints: Minimum length of 1. Maximum length of 200."
        VocabularyFilterMethod:
          $ref: "#/components/schemas/VocabularyFilterMethod"
          description: Specifies how to apply a vocabulary filter to a transcript. To replace words with ***, choose mask. To delete words, choose remove. To flag words without changing them, choose tag.
        LanguageModelName:
          $ref: "#/components/schemas/ModelName"
          description: Specifies the name of the custom language model to use when processing a transcription. Note that language model names are case sensitive. The language of the specified language model must match the language code specified in the transcription request. If the languages don't match, the custom language model isn't applied. Language mismatches don't generate errors or warnings. For more information, see Custom language models in the Amazon Transcribe Developer Guide.
        EnablePartialResultsStabilization:
          $ref: "#/components/schemas/Boolean"
          description: Enables partial result stabilization for your transcription. Partial result stabilization can reduce latency in your output, but may impact accuracy. For more information, see Partial-result stabilization in the Amazon Transcribe Developer Guide.
        PartialResultsStability:
          $ref: "#/components/schemas/PartialResultsStability"
          description: Specifies the level of stability to use when you enable partial results stabilization (EnablePartialResultsStabilization). Low stability provides the highest accuracy. High stability transcribes faster, but with slightly lower accuracy. For more information, see Partial-result stabilization in the Amazon Transcribe Developer Guide.
        ContentIdentificationType:
          $ref: "#/components/schemas/ContentType"
          description: Labels all personally identifiable information (PII) identified in your transcript. Content identification is performed at the segment level; PII specified in PiiEntityTypes is flagged upon complete transcription of an audio segment. You can’t set ContentIdentificationType and ContentRedactionType in the same request. If you do, your request returns a BadRequestException. For more information, see Redacting or identifying personally identifiable information in the Amazon Transcribe Developer Guide.
        ContentRedactionType:
          $ref: "#/components/schemas/ContentType"
          description: Redacts all personally identifiable information (PII) identified in your transcript. Content redaction is performed at the segment level; PII specified in PiiEntityTypes is redacted upon complete transcription of an audio segment. You can’t set ContentRedactionType and ContentIdentificationType in the same request. If you do, your request returns a BadRequestException. For more information, see Redacting or identifying personally identifiable information in the Amazon Transcribe Developer Guide.
        PiiEntityTypes:
          $ref: "#/components/schemas/PiiEntityTypes"
          description: "Specifies the types of personally identifiable information (PII) to redact from a transcript. You can include as many types as you'd like, or you can select ALL. To include PiiEntityTypes in your Call Analytics request, you must also include ContentIdentificationType or ContentRedactionType, but you can't include both. Values must be comma-separated and can include: ADDRESS, BANK_ACCOUNT_NUMBER, BANK_ROUTING, CREDIT_DEBIT_CVV, CREDIT_DEBIT_EXPIRY, CREDIT_DEBIT_NUMBER, EMAIL, NAME, PHONE, PIN, SSN, or ALL. Length Constraints: Minimum length of 1. Maximum length of 300."
        FilterPartialResults:
          $ref: "#/components/schemas/Boolean"
          description: "If true, UtteranceEvents with IsPartial: true are filtered out of the insights target."
        PostCallAnalyticsSettings:
          $ref: "#/components/schemas/PostCallAnalyticsSettings"
          description: The settings for a post-call analysis task in an analytics configuration.
        CallAnalyticsStreamCategories:
          $ref: "#/components/schemas/CategoryNameList"
          description: By default, all CategoryEvents are sent to the insights target. If this parameter is specified, only included categories are sent to the insights target.
      required:
        - LanguageCode
    CallAnalyticsLanguageCode:
      type: string
      enum:
        - en-US
        - en-GB
        - es-US
        - fr-CA
        - fr-FR
        - en-AU
        - it-IT
        - de-DE
        - pt-BR
    VocabularyName:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^[0-9a-zA-Z._-]+
    VocabularyFilterName:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^[0-9a-zA-Z._-]+
    VocabularyFilterMethod:
      type: string
