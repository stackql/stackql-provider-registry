    ContentType:
      type: string
      enum:
        - PII
    PiiEntityTypes:
      type: string
      minLength: 1
      maxLength: 300
      pattern: ^[A-Z_, ]+
    PostCallAnalyticsSettings:
      description: Allows you to specify additional settings for your Call Analytics post-call request, including output locations for your redacted transcript, which IAM role to use, and which encryption key to use. DataAccessRoleArn and OutputLocation are required fields. PostCallAnalyticsSettings provides the same insights as a Call Analytics post-call transcription. For more information, refer to Post-call analytics with real-time transcriptions in the Amazon Transcribe Developer Guide.
