openapi: 3.0.0
info:
  version: "2021-07-15"
  title: Amazon Chime SDK Media Pipelines
  description: Amazon Chime SDK Media Pipelines
  x-serviceName: chime
  x-serviceAlias: chime_sdk_media_pipelines
  x-protocol: rest-json
  x-apiVersion: "2021-07-15"
  x-endpointPrefix: media-pipelines-chime
servers:
  - url: https://media-pipelines-chime.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for chime-sdk-media-pipelines
paths:
  /sdk-media-capture-pipelines:
    post:
      operationId: CreateMediaCapturePipeline
      description: Creates a media pipeline.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SourceType:
                  $ref: "#/components/schemas/MediaPipelineSourceType"
                SourceArn:
                  $ref: "#/components/schemas/Arn"
                SinkType:
                  $ref: "#/components/schemas/MediaPipelineSinkType"
                SinkArn:
                  $ref: "#/components/schemas/Arn"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                ChimeSdkMeetingConfiguration:
                  $ref: "#/components/schemas/ChimeSdkMeetingConfiguration"
                SseAwsKeyManagementParams:
                  $ref: "#/components/schemas/SseAwsKeyManagementParams"
                SinkIamRoleArn:
                  $ref: "#/components/schemas/Arn"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - SourceType
                - SourceArn
                - SinkType
                - SinkArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMediaCapturePipelineResponse"
    get:
      operationId: ListMediaCapturePipelines
      description: Returns a list of media pipelines.
      parameters:
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token used to retrieve the next page of results.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultMax"
          description: "The maximum number of results to return in a single call. Valid Range: 1 - 99."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMediaCapturePipelinesResponse"
  /sdk-media-concatenation-pipelines:
    post:
      operationId: CreateMediaConcatenationPipeline
      description: Creates a media concatenation pipeline.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Sources:
                  $ref: "#/components/schemas/ConcatenationSourceList"
                Sinks:
                  $ref: "#/components/schemas/ConcatenationSinkList"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - Sources
                - Sinks
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMediaConcatenationPipelineResponse"
  /media-insights-pipelines:
    post:
      operationId: CreateMediaInsightsPipeline
      description: Creates a media insights pipeline.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MediaInsightsPipelineConfigurationArn:
                  $ref: "#/components/schemas/Arn"
                KinesisVideoStreamSourceRuntimeConfiguration:
                  $ref: "#/components/schemas/KinesisVideoStreamSourceRuntimeConfiguration"
                MediaInsightsRuntimeMetadata:
                  $ref: "#/components/schemas/MediaInsightsRuntimeMetadata"
                KinesisVideoStreamRecordingSourceRuntimeConfiguration:
                  $ref: "#/components/schemas/KinesisVideoStreamRecordingSourceRuntimeConfiguration"
                S3RecordingSinkRuntimeConfiguration:
                  $ref: "#/components/schemas/S3RecordingSinkRuntimeConfiguration"
                Tags:
                  $ref: "#/components/schemas/TagList"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - MediaInsightsPipelineConfigurationArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMediaInsightsPipelineResponse"
  /media-insights-pipeline-configurations:
    post:
      operationId: CreateMediaInsightsPipelineConfiguration
      description: A structure that contains the static configurations for a media insights pipeline.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MediaInsightsPipelineConfigurationName:
                  $ref: "#/components/schemas/MediaInsightsPipelineConfigurationNameString"
                ResourceAccessRoleArn:
                  $ref: "#/components/schemas/Arn"
                RealTimeAlertConfiguration:
                  $ref: "#/components/schemas/RealTimeAlertConfiguration"
                Elements:
                  $ref: "#/components/schemas/MediaInsightsPipelineConfigurationElements"
                Tags:
                  $ref: "#/components/schemas/TagList"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - MediaInsightsPipelineConfigurationName
                - ResourceAccessRoleArn
                - Elements
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMediaInsightsPipelineConfigurationResponse"
    get:
      operationId: ListMediaInsightsPipelineConfigurations
      description: Lists the available media insights pipeline configurations.
      parameters:
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token used to return the next page of results.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultMax"
          description: The maximum number of results to return in a single call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMediaInsightsPipelineConfigurationsResponse"
  /sdk-media-live-connector-pipelines:
    post:
      operationId: CreateMediaLiveConnectorPipeline
      description: Creates a media live connector pipeline in an Amazon Chime SDK meeting.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Sources:
                  $ref: "#/components/schemas/LiveConnectorSourceList"
                Sinks:
                  $ref: "#/components/schemas/LiveConnectorSinkList"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - Sources
                - Sinks
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMediaLiveConnectorPipelineResponse"
  /media-pipeline-kinesis-video-stream-pools:
    post:
      operationId: CreateMediaPipelineKinesisVideoStreamPool
      description: Creates an Amazon Kinesis Video Stream pool for use with media stream pipelines. If a meeting uses an opt-in Region as its MediaRegion, the KVS stream must be in that same Region. For example, if a meeting uses the af-south-1 Region, the KVS stream must also be in af-south-1. However, if the meeting uses a Region that AWS turns on by default, the KVS stream can be in any available Region, including an opt-in Region. For example, if the meeting uses ca-central-1, the KVS stream can be in eu-west-2, us-east-1, af-south-1, or any other Region that the Amazon Chime SDK supports. To learn which AWS Region a meeting uses, call the GetMeeting API and use the MediaRegion parameter from the response. For more information about opt-in Regions, refer to Available Regions in the Amazon Chime SDK Developer Guide, and Specify which AWS Regions your account can use, in the AWS Account Management Reference Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamConfiguration:
                  $ref: "#/components/schemas/KinesisVideoStreamConfiguration"
                PoolName:
                  $ref: "#/components/schemas/KinesisVideoStreamPoolName"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - StreamConfiguration
                - PoolName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMediaPipelineKinesisVideoStreamPoolResponse"
    get:
      operationId: ListMediaPipelineKinesisVideoStreamPools
      description: Lists the video stream pools in the media pipeline.
      parameters:
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token used to return the next page of results.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultMax"
          description: The maximum number of results to return in a single call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMediaPipelineKinesisVideoStreamPoolsResponse"
  /sdk-media-stream-pipelines:
    post:
      operationId: CreateMediaStreamPipeline
      description: Creates a streaming media pipeline.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Sources:
                  $ref: "#/components/schemas/MediaStreamSourceList"
                Sinks:
                  $ref: "#/components/schemas/MediaStreamSinkList"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - Sources
                - Sinks
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMediaStreamPipelineResponse"
  /sdk-media-capture-pipelines/{media_pipeline_id}:
    delete:
      operationId: DeleteMediaCapturePipeline
      description: Deletes the media pipeline.
      parameters:
        - name: media_pipeline_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The ID of the media pipeline being deleted.
      responses:
        "204":
          description: Success
    get:
      operationId: GetMediaCapturePipeline
      description: Gets an existing media pipeline.
      parameters:
        - name: media_pipeline_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The ID of the pipeline that you want to get.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMediaCapturePipelineResponse"
  /media-insights-pipeline-configurations/{identifier}:
    delete:
      operationId: DeleteMediaInsightsPipelineConfiguration
      description: Deletes the specified configuration settings.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier of the resource to be deleted. Valid values include the name and ARN of the media insights pipeline configuration.
      responses:
        "204":
          description: Success
    get:
      operationId: GetMediaInsightsPipelineConfiguration
      description: Gets the configuration settings for a media insights pipeline.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier of the requested resource. Valid values include the name and ARN of the media insights pipeline configuration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMediaInsightsPipelineConfigurationResponse"
    put:
      operationId: UpdateMediaInsightsPipelineConfiguration
      description: Updates the media insights pipeline's configuration settings.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier for the resource to be updated. Valid values include the name and ARN of the media insights pipeline configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceAccessRoleArn:
                  $ref: "#/components/schemas/Arn"
                RealTimeAlertConfiguration:
                  $ref: "#/components/schemas/RealTimeAlertConfiguration"
                Elements:
                  $ref: "#/components/schemas/MediaInsightsPipelineConfigurationElements"
              required:
                - ResourceAccessRoleArn
                - Elements
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMediaInsightsPipelineConfigurationResponse"
  /sdk-media-pipelines/{media_pipeline_id}:
    delete:
      operationId: DeleteMediaPipeline
      description: Deletes the media pipeline.
      parameters:
        - name: media_pipeline_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The ID of the media pipeline to delete.
      responses:
        "204":
          description: Success
    get:
      operationId: GetMediaPipeline
      description: Gets an existing media pipeline.
      parameters:
        - name: media_pipeline_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The ID of the pipeline that you want to get.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMediaPipelineResponse"
  /media-pipeline-kinesis-video-stream-pools/{identifier}:
    delete:
      operationId: DeleteMediaPipelineKinesisVideoStreamPool
      description: Deletes an Amazon Kinesis Video Stream pool.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier of the requested resource. Valid values include the name and ARN of the media pipeline Kinesis Video Stream pool.
      responses:
        "204":
          description: Success
    get:
      operationId: GetMediaPipelineKinesisVideoStreamPool
      description: Gets an Kinesis video stream pool.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier of the requested resource. Valid values include the name and ARN of the media pipeline Kinesis Video Stream pool.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMediaPipelineKinesisVideoStreamPoolResponse"
    put:
      operationId: UpdateMediaPipelineKinesisVideoStreamPool
      description: Updates an Amazon Kinesis Video Stream pool in a media pipeline.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier of the requested resource. Valid values include the name and ARN of the media pipeline Kinesis Video Stream pool.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                StreamConfiguration:
                  $ref: "#/components/schemas/KinesisVideoStreamConfigurationUpdate"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMediaPipelineKinesisVideoStreamPoolResponse"
  /media-insights-pipelines/{identifier}/speaker-search-tasks/{speaker_search_task_id}:
    get:
      operationId: GetSpeakerSearchTask
      description: Retrieves the details of the specified speaker search task.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier of the resource to be updated. Valid values include the ID and ARN of the media insights pipeline.
        - name: speaker_search_task_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The ID of the speaker search task.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSpeakerSearchTaskResponse"
  /media-insights-pipelines/{identifier}/voice-tone-analysis-tasks/{voice_tone_analysis_task_id}:
    get:
      operationId: GetVoiceToneAnalysisTask
      description: Retrieves the details of a voice tone analysis task.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier of the resource to be updated. Valid values include the ID and ARN of the media insights pipeline.
        - name: voice_tone_analysis_task_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The ID of the voice tone analysis task.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetVoiceToneAnalysisTaskResponse"
  /sdk-media-pipelines:
    get:
      operationId: ListMediaPipelines
      description: Returns a list of media pipelines.
      parameters:
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token used to retrieve the next page of results.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultMax"
          description: "The maximum number of results to return in a single call. Valid Range: 1 - 99."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMediaPipelinesResponse"
  /tags:
    get:
      operationId: ListTagsForResource
      description: Lists the tags available for a media pipeline.
      parameters:
        - name: arn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the media pipeline associated with any tags. The ARN consists of the pipeline's region, resource ID, and pipeline ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /media-insights-pipelines/{identifier}/speaker-search-tasks?operation=start:
    post:
      operationId: StartSpeakerSearchTask
      description: Starts a speaker search task. Before starting any speaker search tasks, you must provide all notices and obtain all consents from the speaker as required under applicable privacy and biometrics laws, and as required under the AWS service terms for the Amazon Chime SDK.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier of the resource to be updated. Valid values include the ID and ARN of the media insights pipeline.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                VoiceProfileDomainArn:
                  $ref: "#/components/schemas/Arn"
                KinesisVideoStreamSourceTaskConfiguration:
                  $ref: "#/components/schemas/KinesisVideoStreamSourceTaskConfiguration"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - VoiceProfileDomainArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartSpeakerSearchTaskResponse"
  /media-insights-pipelines/{identifier}/voice-tone-analysis-tasks?operation=start:
    post:
      operationId: StartVoiceToneAnalysisTask
      description: Starts a voice tone analysis task. For more information about voice tone analysis, see Using Amazon Chime SDK voice analytics in the Amazon Chime SDK Developer Guide. Before starting any voice tone analysis tasks, you must provide all notices and obtain all consents from the speaker as required under applicable privacy and biometrics laws, and as required under the AWS service terms for the Amazon Chime SDK.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier of the resource to be updated. Valid values include the ID and ARN of the media insights pipeline.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                LanguageCode:
                  $ref: "#/components/schemas/VoiceAnalyticsLanguageCode"
                KinesisVideoStreamSourceTaskConfiguration:
                  $ref: "#/components/schemas/KinesisVideoStreamSourceTaskConfiguration"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - LanguageCode
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartVoiceToneAnalysisTaskResponse"
  /media-insights-pipelines/{identifier}/speaker-search-tasks/{speaker_search_task_id}?operation=stop:
    post:
      operationId: StopSpeakerSearchTask
      description: Stops a speaker search task.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier of the resource to be updated. Valid values include the ID and ARN of the media insights pipeline.
        - name: speaker_search_task_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The speaker search task ID.
      responses:
        "204":
          description: Success
  /media-insights-pipelines/{identifier}/voice-tone-analysis-tasks/{voice_tone_analysis_task_id}?operation=stop:
    post:
      operationId: StopVoiceToneAnalysisTask
      description: Stops a voice tone analysis task.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier of the resource to be updated. Valid values include the ID and ARN of the media insights pipeline.
        - name: voice_tone_analysis_task_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The ID of the voice tone analysis task.
      responses:
        "204":
          description: Success
  /tags?operation=tag-resource:
    post:
      operationId: TagResource
      description: The ARN of the media pipeline that you want to tag. Consists of the pipeline's endpoint region, resource ID, and pipeline ID.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - ResourceARN
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /tags?operation=untag-resource:
    post:
      operationId: UntagResource
      description: Removes any tags from a media pipeline.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - ResourceARN
                - TagKeys
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /media-insights-pipeline-status/{identifier}:
    put:
      operationId: UpdateMediaInsightsPipelineStatus
      description: Updates the status of a media insights pipeline.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier of the resource to be updated. Valid values include the ID and ARN of the media insights pipeline.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                UpdateStatus:
                  $ref: "#/components/schemas/MediaPipelineStatusUpdate"
              required:
                - UpdateStatus
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    MediaPipelineSourceType:
      type: string
      enum:
        - ChimeSdkMeeting
    Arn:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^arn[\/\:\-\_\.a-zA-Z0-9]+$
    MediaPipelineSinkType:
      type: string
      enum:
        - S3Bucket
    ClientRequestToken:
      type: string
      minLength: 2
      maxLength: 64
      pattern: "[-_a-zA-Z0-9]*"
    ChimeSdkMeetingConfiguration:
      description: The configuration object of the Amazon Chime SDK meeting for a specified media pipeline. SourceType must be ChimeSdkMeeting.
      type: object
      properties:
        SourceConfiguration:
          $ref: "#/components/schemas/SourceConfiguration"
          description: The source configuration for a specified media pipeline.
        ArtifactsConfiguration:
          $ref: "#/components/schemas/ArtifactsConfiguration"
          description: The configuration for the artifacts in an Amazon Chime SDK meeting.
    SourceConfiguration:
      description: Source configuration for a specified media pipeline.
      type: object
      properties:
        SelectedVideoStreams:
          $ref: "#/components/schemas/SelectedVideoStreams"
