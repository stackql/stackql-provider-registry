    MetricAlarms:
      type: array
      items:
        $ref: "#/components/schemas/MetricAlarm"
    MetricAlarm:
      description: The details about a metric alarm.
      type: object
      properties:
        AlarmName:
          $ref: "#/components/schemas/AlarmName"
          description: The name of the alarm.
        AlarmArn:
          $ref: "#/components/schemas/AlarmArn"
          description: The Amazon Resource Name (ARN) of the alarm.
        AlarmDescription:
          $ref: "#/components/schemas/AlarmDescription"
          description: The description of the alarm.
        AlarmConfigurationUpdatedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time stamp of the last update to the alarm configuration.
        ActionsEnabled:
          $ref: "#/components/schemas/ActionsEnabled"
          description: Indicates whether actions should be executed during any changes to the alarm state.
        OKActions:
          $ref: "#/components/schemas/ResourceList"
          description: The actions to execute when this alarm transitions to the OK state from any other state. Each action is specified as an Amazon Resource Name (ARN).
        AlarmActions:
          $ref: "#/components/schemas/ResourceList"
          description: The actions to execute when this alarm transitions to the ALARM state from any other state. Each action is specified as an Amazon Resource Name (ARN).
        InsufficientDataActions:
          $ref: "#/components/schemas/ResourceList"
          description: The actions to execute when this alarm transitions to the INSUFFICIENT_DATA state from any other state. Each action is specified as an Amazon Resource Name (ARN).
        StateValue:
          $ref: "#/components/schemas/StateValue"
          description: The state value for the alarm.
        StateReason:
          $ref: "#/components/schemas/StateReason"
          description: An explanation for the alarm state, in text format.
        StateReasonData:
          $ref: "#/components/schemas/StateReasonData"
          description: An explanation for the alarm state, in JSON format.
        StateUpdatedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time stamp of the last update to the value of either the StateValue or EvaluationState parameters.
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the metric associated with the alarm, if this is an alarm based on a single metric.
        Namespace:
          $ref: "#/components/schemas/Namespace"
          description: The namespace of the metric associated with the alarm.
        Statistic:
          $ref: "#/components/schemas/Statistic"
          description: The statistic for the metric associated with the alarm, other than percentile. For percentile statistics, use ExtendedStatistic.
        ExtendedStatistic:
          $ref: "#/components/schemas/ExtendedStatistic"
          description: The percentile statistic for the metric associated with the alarm. Specify a value between p0.0 and p100.
        Dimensions:
          $ref: "#/components/schemas/Dimensions"
          description: The dimensions for the metric associated with the alarm.
        Period:
          $ref: "#/components/schemas/Period"
          description: The period, in seconds, over which the statistic is applied.
        Unit:
          $ref: "#/components/schemas/StandardUnit"
          description: The unit of the metric associated with the alarm.
        EvaluationPeriods:
          $ref: "#/components/schemas/EvaluationPeriods"
          description: The number of periods over which data is compared to the specified threshold.
        DatapointsToAlarm:
          $ref: "#/components/schemas/DatapointsToAlarm"
          description: The number of data points that must be breaching to trigger the alarm.
        Threshold:
          $ref: "#/components/schemas/Threshold"
          description: The value to compare with the specified statistic.
        ComparisonOperator:
          $ref: "#/components/schemas/ComparisonOperator"
          description: The arithmetic operation to use when comparing the specified statistic and threshold. The specified statistic value is used as the first operand.
        TreatMissingData:
          $ref: "#/components/schemas/TreatMissingData"
          description: Sets how this alarm is to handle missing data points. The valid values are breaching, notBreaching, ignore, and missing. For more information, see Configuring how CloudWatch alarms treat missing data. If this parameter is omitted, the default behavior of missing is used. This parameter is not applicable to PromQL alarms.
        EvaluateLowSampleCountPercentile:
          $ref: "#/components/schemas/EvaluateLowSampleCountPercentile"
          description: Used only for alarms based on percentiles. If ignore, the alarm state does not change during periods with too few data points to be statistically significant. If evaluate or this parameter is not used, the alarm is always evaluated and possibly changes state no matter how many data points are available.
        Metrics:
          $ref: "#/components/schemas/MetricDataQueries"
          description: An array of MetricDataQuery structures, used in an alarm based on a metric math expression. Each structure either retrieves a metric or performs a math expression. One item in the Metrics array is the math expression that the alarm watches. This expression by designated by having ReturnData set to true.
        ThresholdMetricId:
          $ref: "#/components/schemas/MetricId"
          description: In an alarm based on an anomaly detection model, this is the ID of the ANOMALY_DETECTION_BAND function used as the threshold for the alarm.
        EvaluationState:
          $ref: "#/components/schemas/EvaluationState"
          description: If the value of this field is PARTIAL_DATA, it indicates that not all the available data was able to be retrieved due to quota limitations. For more information, see Create alarms on Metrics Insights queries. If the value of this field is EVALUATION_ERROR, it indicates configuration errors in alarm setup that require review and correction. Refer to StateReason field of the alarm for more details. If the value of this field is EVALUATION_FAILURE, it indicates temporary CloudWatch issues. We recommend manual monitoring until the issue is resolved
        StateTransitionedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the alarm's StateValue most recently changed.
        EvaluationCriteria:
          $ref: "#/components/schemas/EvaluationCriteria"
          description: The evaluation criteria for the alarm.
        EvaluationInterval:
          $ref: "#/components/schemas/EvaluationInterval"
          description: The frequency, in seconds, at which the alarm is evaluated.
    Statistic:
      type: string
      enum:
        - SampleCount
        - Average
        - Sum
        - Minimum
        - Maximum
    ExtendedStatistic:
      type: string
    EvaluationPeriods:
      type: integer
      minimum: 1
    DatapointsToAlarm:
      type: integer
      minimum: 1
    Threshold:
      type: number
      format: double
    ComparisonOperator:
      type: string
      enum:
        - GreaterThanOrEqualToThreshold
        - GreaterThanThreshold
        - LessThanThreshold
        - LessThanOrEqualToThreshold
        - LessThanLowerOrGreaterThanUpperThreshold
        - LessThanLowerThreshold
        - GreaterThanUpperThreshold
    TreatMissingData:
      type: string
      minLength: 1
      maxLength: 255
    EvaluateLowSampleCountPercentile:
      type: string
      minLength: 1
      maxLength: 255
    EvaluationState:
      type: string
      enum:
        - PARTIAL_DATA
        - EVALUATION_FAILURE
        - EVALUATION_ERROR
    EvaluationCriteria:
      description: The evaluation criteria for an alarm. This is a union type that currently supports PromQLCriteria.
      type: object
      properties:
        PromQLCriteria:
          $ref: "#/components/schemas/AlarmPromQLCriteria"
          description: The PromQL criteria for the alarm evaluation.
    AlarmPromQLCriteria:
      description: Contains the configuration that determines how a PromQL alarm evaluates its contributors, including the query to run and the durations that define when contributors transition between states.
      type: object
      properties:
        Query:
          $ref: "#/components/schemas/Query"
          description: The PromQL query that the alarm evaluates. The query must return a result of vector type. Each entry in the vector result represents an alarm contributor.
        PendingPeriod:
          $ref: "#/components/schemas/PendingPeriod"
          description: The duration, in seconds, that a contributor must be continuously breaching before it transitions to the ALARM state.
        RecoveryPeriod:
          $ref: "#/components/schemas/RecoveryPeriod"
          description: The duration, in seconds, that a contributor must continuously not be breaching before it transitions back to the OK state.
      required:
        - Query
    Query:
      type: string
      minLength: 1
      maxLength: 10000
    PendingPeriod:
      type: integer
      minimum: 0
      maximum: 86400
    RecoveryPeriod:
      type: integer
      minimum: 0
      maximum: 86400
    EvaluationInterval:
      type: integer
      minimum: 10
      maximum: 3600
    DescribeAlarmsForMetricOutput:
      type: object
      properties:
        MetricAlarms:
          $ref: "#/components/schemas/MetricAlarms"
          description: The information for each alarm with the specified metric.
    MaxReturnedResultsCount:
      type: integer
      minimum: 1
    AnomalyDetectorTypes:
      type: array
      items:
        $ref: "#/components/schemas/AnomalyDetectorType"
    AnomalyDetectorType:
      type: string
      enum:
        - SINGLE_METRIC
        - METRIC_MATH
    DescribeAnomalyDetectorsOutput:
      type: object
      properties:
        AnomalyDetectors:
          $ref: "#/components/schemas/AnomalyDetectors"
          description: The list of anomaly detection models returned by the operation.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: A token that you can use in a subsequent operation to retrieve the next set of results.
    AnomalyDetectors:
      type: array
      items:
        $ref: "#/components/schemas/AnomalyDetector"
    AnomalyDetector:
      description: An anomaly detection model associated with a particular CloudWatch metric, statistic, or metric math expression. You can use the model to display a band of expected, normal values when the metric is graphed. If you have enabled unified cross-account observability, and this account is a monitoring account, the metric can be in the same account or a source account.
      type: object
      properties:
        Namespace:
          $ref: "#/components/schemas/Namespace"
          description: The namespace of the metric associated with the anomaly detection model.
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the metric associated with the anomaly detection model.
        Dimensions:
          $ref: "#/components/schemas/Dimensions"
          description: The metric dimensions associated with the anomaly detection model.
        Stat:
          $ref: "#/components/schemas/AnomalyDetectorMetricStat"
          description: The statistic associated with the anomaly detection model.
        Configuration:
          $ref: "#/components/schemas/AnomalyDetectorConfiguration"
          description: The configuration specifies details about how the anomaly detection model is to be trained, including time ranges to exclude from use for training the model, and the time zone to use for the metric.
        StateValue:
          $ref: "#/components/schemas/AnomalyDetectorStateValue"
          description: The current status of the anomaly detector's training.
        MetricCharacteristics:
          $ref: "#/components/schemas/MetricCharacteristics"
          description: This object includes parameters that you can use to provide information about your metric to CloudWatch to help it build more accurate anomaly detection models. Currently, it includes the PeriodicSpikes parameter.
        SingleMetricAnomalyDetector:
          $ref: "#/components/schemas/SingleMetricAnomalyDetector"
          description: The CloudWatch metric and statistic for this anomaly detector.
        MetricMathAnomalyDetector:
          $ref: "#/components/schemas/MetricMathAnomalyDetector"
          description: The CloudWatch metric math expression for this anomaly detector.
    AnomalyDetectorConfiguration:
      description: The configuration specifies details about how the anomaly detection model is to be trained, including time ranges to exclude from use for training the model and the time zone to use for the metric.
      type: object
      properties:
        ExcludedTimeRanges:
          $ref: "#/components/schemas/AnomalyDetectorExcludedTimeRanges"
          description: An array of time ranges to exclude from use when the anomaly detection model is trained. Use this to make sure that events that could cause unusual values for the metric, such as deployments, aren't used when CloudWatch creates the model.
        MetricTimezone:
          $ref: "#/components/schemas/AnomalyDetectorMetricTimezone"
          description: The time zone to use for the metric. This is useful to enable the model to automatically account for daylight savings time changes if the metric is sensitive to such time changes. To specify a time zone, use the name of the time zone as specified in the standard tz database. For more information, see tz database.
    AnomalyDetectorExcludedTimeRanges:
      type: array
      items:
        $ref: "#/components/schemas/Range"
    Range:
      description: Specifies one range of days or times to exclude from use for training an anomaly detection model.
      type: object
      properties:
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of the range to exclude. The format is yyyy-MM-dd'T'HH:mm:ss. For example, 2019-07-01T23:59:59.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end time of the range to exclude. The format is yyyy-MM-dd'T'HH:mm:ss. For example, 2019-07-01T23:59:59.
      required:
        - StartTime
        - EndTime
    AnomalyDetectorMetricTimezone:
      type: string
      maxLength: 50
      pattern: .*
    AnomalyDetectorStateValue:
      type: string
      enum:
        - PENDING_TRAINING
        - TRAINED_INSUFFICIENT_DATA
        - TRAINED
    MetricCharacteristics:
      description: This object includes parameters that you can use to provide information to CloudWatch to help it build more accurate anomaly detection models.
      type: object
      properties:
        PeriodicSpikes:
          $ref: "#/components/schemas/PeriodicSpikes"
          description: Set this parameter to true if values for this metric consistently include spikes that should not be considered to be anomalies. With this set to true, CloudWatch will expect to see spikes that occurred consistently during the model training period, and won't flag future similar spikes as anomalies.
    PeriodicSpikes:
      type: boolean
    InsightRuleMaxResults:
