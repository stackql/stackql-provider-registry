openapi: 3.0.0
info:
  version: "2010-08-01"
  title: Amazon CloudWatch
  description: Amazon CloudWatch
  x-serviceName: monitoring
  x-serviceAlias: cloudwatch
  x-protocol: json
  x-apiVersion: "2010-08-01"
  x-endpointPrefix: monitoring
  x-targetPrefix: GraniteServiceVersion20100801
  x-jsonVersion: "1.0"
servers:
  - url: https://monitoring.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for cloudwatch
paths:
  /DeleteAlarmMuteRule:
    post:
      operationId: DeleteAlarmMuteRule
      description: Deletes a specific alarm mute rule. When you delete a mute rule, any alarms that are currently being muted by that rule are immediately unmuted. If those alarms are in an ALARM state, their configured actions will trigger. This operation is idempotent. If you delete a mute rule that does not exist, the operation succeeds without returning an error. Permissions To delete a mute rule, you need the cloudwatch:DeleteAlarmMuteRule permission on the alarm mute rule resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.DeleteAlarmMuteRule
            default: GraniteServiceVersion20100801.DeleteAlarmMuteRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                AlarmMuteRuleName:
                  $ref: "#/components/schemas/Name"
                  description: The name of the alarm mute rule to delete.
              required:
                - AlarmMuteRuleName
      responses:
        "200":
          description: Success
  /DeleteAlarms:
    post:
      operationId: DeleteAlarms
      description: Deletes the specified alarms. You can delete up to 100 alarms in one operation. However, this total can include no more than one composite alarm. For example, you could delete 99 metric alarms and one composite alarms with one operation, but you can't delete two composite alarms with one operation. If you specify any incorrect alarm names, the alarms you specify with correct names are still deleted. Other syntax errors might result in no alarms being deleted. To confirm that alarms were deleted successfully, you can use the DescribeAlarms operation after using DeleteAlarms. It is possible to create a loop or cycle of composite alarms, where composite alarm A depends on composite alarm B, and composite alarm B also depends on composite alarm A. In this scenario, you can't delete any composite alarm that is part of the cycle because there is always still a composite alarm that depends on that alarm that you want to delete. To get out of such a situation, you must break the cycle by changing the rule of one of the composite alarms in the cycle to remove a dependency that creates the cycle. The simplest change to make to break a cycle is to change the AlarmRule of one of the alarms to false. Additionally, the evaluation of composite alarms stops if CloudWatch detects a cycle in the evaluation path.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.DeleteAlarms
            default: GraniteServiceVersion20100801.DeleteAlarms
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                AlarmNames:
                  $ref: "#/components/schemas/AlarmNames"
                  description: The alarms to be deleted. Do not enclose the alarm names in quote marks.
              required:
                - AlarmNames
      responses:
        "200":
          description: Success
  /DeleteAnomalyDetector:
    post:
      operationId: DeleteAnomalyDetector
      description: Deletes the specified anomaly detection model from your account. For more information about how to delete an anomaly detection model, see Deleting an anomaly detection model in the CloudWatch User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.DeleteAnomalyDetector
            default: GraniteServiceVersion20100801.DeleteAnomalyDetector
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Namespace:
                  $ref: "#/components/schemas/Namespace"
                  description: The namespace associated with the anomaly detection model to delete.
                MetricName:
                  $ref: "#/components/schemas/MetricName"
                  description: The metric name associated with the anomaly detection model to delete.
                Dimensions:
                  $ref: "#/components/schemas/Dimensions"
                  description: The metric dimensions associated with the anomaly detection model to delete.
                Stat:
                  $ref: "#/components/schemas/AnomalyDetectorMetricStat"
                  description: The statistic associated with the anomaly detection model to delete.
                SingleMetricAnomalyDetector:
                  $ref: "#/components/schemas/SingleMetricAnomalyDetector"
                  description: "A single metric anomaly detector to be deleted. When using SingleMetricAnomalyDetector, you cannot include the following parameters in the same operation: Dimensions, MetricName Namespace Stat the MetricMathAnomalyDetector parameters of DeleteAnomalyDetectorInput Instead, specify the single metric anomaly detector attributes as part of the SingleMetricAnomalyDetector property."
                MetricMathAnomalyDetector:
                  $ref: "#/components/schemas/MetricMathAnomalyDetector"
                  description: "The metric math anomaly detector to be deleted. When using MetricMathAnomalyDetector, you cannot include following parameters in the same operation: Dimensions, MetricName Namespace Stat the SingleMetricAnomalyDetector parameters of DeleteAnomalyDetectorInput Instead, specify the metric math anomaly detector attributes as part of the MetricMathAnomalyDetector property."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAnomalyDetectorOutput"
  /DeleteDashboards:
    post:
      operationId: DeleteDashboards
      description: Deletes all dashboards that you specify. You can specify up to 100 dashboards to delete. If there is an error during this call, the operation attempts to delete as many dashboards as possible.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.DeleteDashboards
            default: GraniteServiceVersion20100801.DeleteDashboards
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DashboardNames:
                  $ref: "#/components/schemas/DashboardNames"
                  description: The dashboards to be deleted. This parameter is required.
              required:
                - DashboardNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDashboardsOutput"
  /DeleteInsightRules:
    post:
      operationId: DeleteInsightRules
      description: Permanently deletes the specified Contributor Insights rules. If you create a rule, delete it, and then re-create it with the same name, historical data from the first time the rule was created might not be available.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.DeleteInsightRules
            default: GraniteServiceVersion20100801.DeleteInsightRules
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                RuleNames:
                  $ref: "#/components/schemas/InsightRuleNames"
                  description: An array of the rule names to delete. If you need to find out the names of your rules, use DescribeInsightRules.
              required:
                - RuleNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteInsightRulesOutput"
  /DeleteMetricStream:
    post:
      operationId: DeleteMetricStream
      description: Permanently deletes the metric stream that you specify.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.DeleteMetricStream
            default: GraniteServiceVersion20100801.DeleteMetricStream
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/MetricStreamName"
                  description: The name of the metric stream to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMetricStreamOutput"
  /DescribeAlarmContributors:
    post:
      operationId: DescribeAlarmContributors
      description: Returns the information of the current alarm contributors that are in ALARM state. This operation returns details about the individual time series that contribute to the alarm's state.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.DescribeAlarmContributors
            default: GraniteServiceVersion20100801.DescribeAlarmContributors
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                AlarmName:
                  $ref: "#/components/schemas/AlarmName"
                  description: The name of the alarm for which to retrieve contributor information.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token returned by a previous call to indicate that there is more data available.
              required:
                - AlarmName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAlarmContributorsOutput"
  /DescribeAlarmHistory:
    post:
      operationId: DescribeAlarmHistory
      description: Retrieves the history for the specified alarm. You can filter the results by date range or item type. If an alarm name is not specified, the histories for either all metric alarms or all composite alarms are returned. CloudWatch retains the history of an alarm even if you delete the alarm. To use this operation and return information about a composite alarm, you must be signed on with the cloudwatch:DescribeAlarmHistory permission that is scoped to *. You can't return information about composite alarms if your cloudwatch:DescribeAlarmHistory permission has a narrower scope.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.DescribeAlarmHistory
            default: GraniteServiceVersion20100801.DescribeAlarmHistory
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                AlarmName:
                  $ref: "#/components/schemas/AlarmName"
                  description: The name of the alarm.
                AlarmContributorId:
                  $ref: "#/components/schemas/ContributorId"
                  description: The unique identifier of a specific alarm contributor to filter the alarm history results.
                AlarmTypes:
                  $ref: "#/components/schemas/AlarmTypes"
                  description: Use this parameter to specify whether you want the operation to return metric alarms or composite alarms. If you omit this parameter, only metric alarms are returned.
                HistoryItemType:
                  $ref: "#/components/schemas/HistoryItemType"
                  description: The type of alarm histories to retrieve.
                StartDate:
                  $ref: "#/components/schemas/Timestamp"
                  description: The starting date to retrieve alarm history.
                EndDate:
                  $ref: "#/components/schemas/Timestamp"
                  description: The ending date to retrieve alarm history.
                MaxRecords:
                  $ref: "#/components/schemas/MaxRecords"
                  description: The maximum number of alarm history records to retrieve.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token returned by a previous call to indicate that there is more data available.
                ScanBy:
                  $ref: "#/components/schemas/ScanBy"
                  description: Specified whether to return the newest or oldest alarm history first. Specify TimestampDescending to have the newest event history returned first, and specify TimestampAscending to have the oldest history returned first.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAlarmHistoryOutput"
  /DescribeAlarms:
    post:
      operationId: DescribeAlarms
      description: Retrieves the specified alarms. You can filter the results by specifying a prefix for the alarm name, the alarm state, or a prefix for any action. To use this operation and return information about composite alarms, you must be signed on with the cloudwatch:DescribeAlarms permission that is scoped to *. You can't return information about composite alarms if your cloudwatch:DescribeAlarms permission has a narrower scope.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.DescribeAlarms
            default: GraniteServiceVersion20100801.DescribeAlarms
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                AlarmNames:
                  $ref: "#/components/schemas/AlarmNames"
                  description: The names of the alarms to retrieve information about.
                AlarmNamePrefix:
                  $ref: "#/components/schemas/AlarmNamePrefix"
                  description: An alarm name prefix. If you specify this parameter, you receive information about all alarms that have names that start with this prefix. If this parameter is specified, you cannot specify AlarmNames.
                AlarmTypes:
                  $ref: "#/components/schemas/AlarmTypes"
                  description: Use this parameter to specify whether you want the operation to return metric alarms or composite alarms. If you omit this parameter, only metric alarms are returned, even if composite alarms exist in the account. For example, if you omit this parameter or specify MetricAlarms, the operation returns only a list of metric alarms. It does not return any composite alarms, even if composite alarms exist in the account. If you specify CompositeAlarms, the operation returns only a list of composite alarms, and does not return any metric alarms.
                ChildrenOfAlarmName:
                  $ref: "#/components/schemas/AlarmName"
                  description: If you use this parameter and specify the name of a composite alarm, the operation returns information about the "children" alarms of the alarm you specify. These are the metric alarms and composite alarms referenced in the AlarmRule field of the composite alarm that you specify in ChildrenOfAlarmName. Information about the composite alarm that you name in ChildrenOfAlarmName is not returned. If you specify ChildrenOfAlarmName, you cannot specify any other parameters in the request except for MaxRecords and NextToken. If you do so, you receive a validation error. Only the Alarm Name, ARN, StateValue (OK/ALARM/INSUFFICIENT_DATA), and StateUpdatedTimestamp information are returned by this operation when you use this parameter. To get complete information about these alarms, perform another DescribeAlarms operation and specify the parent alarm names in the AlarmNames parameter.
                ParentsOfAlarmName:
                  $ref: "#/components/schemas/AlarmName"
                  description: If you use this parameter and specify the name of a metric or composite alarm, the operation returns information about the "parent" alarms of the alarm you specify. These are the composite alarms that have AlarmRule parameters that reference the alarm named in ParentsOfAlarmName. Information about the alarm that you specify in ParentsOfAlarmName is not returned. If you specify ParentsOfAlarmName, you cannot specify any other parameters in the request except for MaxRecords and NextToken. If you do so, you receive a validation error. Only the Alarm Name and ARN are returned by this operation when you use this parameter. To get complete information about these alarms, perform another DescribeAlarms operation and specify the parent alarm names in the AlarmNames parameter.
                StateValue:
                  $ref: "#/components/schemas/StateValue"
                  description: Specify this parameter to receive information only about alarms that are currently in the state that you specify.
                ActionPrefix:
                  $ref: "#/components/schemas/ActionPrefix"
                  description: Use this parameter to filter the results of the operation to only those alarms that use a certain alarm action. For example, you could specify the ARN of an SNS topic to find all alarms that send notifications to that topic.
                MaxRecords:
                  $ref: "#/components/schemas/MaxRecords"
                  description: The maximum number of alarm descriptions to retrieve.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token returned by a previous call to indicate that there is more data available.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAlarmsOutput"
  /DescribeAlarmsForMetric:
    post:
      operationId: DescribeAlarmsForMetric
      description: Retrieves the alarms for the specified metric. To filter the results, specify a statistic, period, or unit. This operation retrieves only standard alarms that are based on the specified metric. It does not return alarms based on math expressions that use the specified metric, or composite alarms that use the specified metric.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.DescribeAlarmsForMetric
            default: GraniteServiceVersion20100801.DescribeAlarmsForMetric
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MetricName:
                  $ref: "#/components/schemas/MetricName"
                  description: The name of the metric.
                Namespace:
                  $ref: "#/components/schemas/Namespace"
                  description: The namespace of the metric.
                Statistic:
                  $ref: "#/components/schemas/Statistic"
                  description: The statistic for the metric, other than percentiles. For percentile statistics, use ExtendedStatistics.
                ExtendedStatistic:
                  $ref: "#/components/schemas/ExtendedStatistic"
                  description: The percentile statistic for the metric. Specify a value between p0.0 and p100.
                Dimensions:
                  $ref: "#/components/schemas/Dimensions"
                  description: The dimensions associated with the metric. If the metric has any associated dimensions, you must specify them in order for the call to succeed.
                Period:
                  $ref: "#/components/schemas/Period"
                  description: The period, in seconds, over which the statistic is applied.
                Unit:
                  $ref: "#/components/schemas/StandardUnit"
                  description: The unit for the metric.
              required:
                - MetricName
                - Namespace
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAlarmsForMetricOutput"
  /DescribeAnomalyDetectors:
    post:
      operationId: DescribeAnomalyDetectors
      description: Lists the anomaly detection models that you have created in your account. For single metric anomaly detectors, you can list all of the models in your account or filter the results to only the models that are related to a certain namespace, metric name, or metric dimension. For metric math anomaly detectors, you can list them by adding METRIC_MATH to the AnomalyDetectorTypes array. This will return all metric math anomaly detectors in your account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.DescribeAnomalyDetectors
            default: GraniteServiceVersion20100801.DescribeAnomalyDetectors
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Use the token returned by the previous operation to request the next page of results.
                MaxResults:
                  $ref: "#/components/schemas/MaxReturnedResultsCount"
                  description: The maximum number of results to return in one operation. The maximum value that you can specify is 100. To retrieve the remaining results, make another call with the returned NextToken value.
                Namespace:
                  $ref: "#/components/schemas/Namespace"
                  description: Limits the results to only the anomaly detection models that are associated with the specified namespace.
                MetricName:
                  $ref: "#/components/schemas/MetricName"
                  description: Limits the results to only the anomaly detection models that are associated with the specified metric name. If there are multiple metrics with this name in different namespaces that have anomaly detection models, they're all returned.
                Dimensions:
                  $ref: "#/components/schemas/Dimensions"
                  description: Limits the results to only the anomaly detection models that are associated with the specified metric dimensions. If there are multiple metrics that have these dimensions and have anomaly detection models associated, they're all returned.
                AnomalyDetectorTypes:
                  $ref: "#/components/schemas/AnomalyDetectorTypes"
                  description: The anomaly detector types to request when using DescribeAnomalyDetectorsInput. If empty, defaults to SINGLE_METRIC.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAnomalyDetectorsOutput"
  /DescribeInsightRules:
    post:
      operationId: DescribeInsightRules
      description: Returns a list of all the Contributor Insights rules in your account. For more information about Contributor Insights, see Using Contributor Insights to Analyze High-Cardinality Data.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.DescribeInsightRules
            default: GraniteServiceVersion20100801.DescribeInsightRules
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Include this value, if it was returned by the previous operation, to get the next set of rules.
                MaxResults:
                  $ref: "#/components/schemas/InsightRuleMaxResults"
                  description: The maximum number of results to return in one operation. If you omit this parameter, the default of 500 is used.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeInsightRulesOutput"
  /DisableAlarmActions:
    post:
      operationId: DisableAlarmActions
      description: Disables the actions for the specified alarms. When an alarm's actions are disabled, the alarm actions do not execute when the alarm state changes.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.DisableAlarmActions
            default: GraniteServiceVersion20100801.DisableAlarmActions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                AlarmNames:
                  $ref: "#/components/schemas/AlarmNames"
                  description: The names of the alarms.
              required:
                - AlarmNames
      responses:
        "200":
          description: Success
  /DisableInsightRules:
    post:
      operationId: DisableInsightRules
      description: Disables the specified Contributor Insights rules. When rules are disabled, they do not analyze log groups and do not incur costs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.DisableInsightRules
            default: GraniteServiceVersion20100801.DisableInsightRules
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                RuleNames:
                  $ref: "#/components/schemas/InsightRuleNames"
                  description: An array of the rule names to disable. If you need to find out the names of your rules, use DescribeInsightRules.
              required:
                - RuleNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableInsightRulesOutput"
  /EnableAlarmActions:
    post:
      operationId: EnableAlarmActions
      description: Enables the actions for the specified alarms.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.EnableAlarmActions
            default: GraniteServiceVersion20100801.EnableAlarmActions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                AlarmNames:
                  $ref: "#/components/schemas/AlarmNames"
                  description: The names of the alarms.
              required:
                - AlarmNames
      responses:
        "200":
          description: Success
  /EnableInsightRules:
    post:
      operationId: EnableInsightRules
      description: Enables the specified Contributor Insights rules. When rules are enabled, they immediately begin analyzing log data.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.EnableInsightRules
            default: GraniteServiceVersion20100801.EnableInsightRules
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                RuleNames:
                  $ref: "#/components/schemas/InsightRuleNames"
                  description: An array of the rule names to enable. If you need to find out the names of your rules, use DescribeInsightRules.
              required:
                - RuleNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnableInsightRulesOutput"
  /GetAlarmMuteRule:
    post:
      operationId: GetAlarmMuteRule
      description: "Retrieves details for a specific alarm mute rule. This operation returns complete information about the mute rule, including its configuration, status, targeted alarms, and metadata. The returned status indicates the current state of the mute rule: SCHEDULED: The mute rule is configured and will become active in the future ACTIVE: The mute rule is currently muting alarm actions EXPIRED: The mute rule has passed its expiration date and will no longer become active Permissions To retrieve details for a mute rule, you need the cloudwatch:GetAlarmMuteRule permission on the alarm mute rule resource."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.GetAlarmMuteRule
            default: GraniteServiceVersion20100801.GetAlarmMuteRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                AlarmMuteRuleName:
                  $ref: "#/components/schemas/Name"
                  description: The name of the alarm mute rule to retrieve.
              required:
                - AlarmMuteRuleName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAlarmMuteRuleOutput"
  /GetDashboard:
    post:
      operationId: GetDashboard
      description: Displays the details of the dashboard that you specify. To copy an existing dashboard, use GetDashboard, and then use the data returned within DashboardBody as the template for the new dashboard when you call PutDashboard to create the copy.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.GetDashboard
            default: GraniteServiceVersion20100801.GetDashboard
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DashboardName:
                  $ref: "#/components/schemas/DashboardName"
                  description: The name of the dashboard to be described.
              required:
                - DashboardName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDashboardOutput"
  /GetInsightRuleReport:
    post:
      operationId: GetInsightRuleReport
      description: "This operation returns the time series data collected by a Contributor Insights rule. The data includes the identity and number of contributors to the log group. You can also optionally return one or more statistics about each data point in the time series. These statistics can include the following: UniqueContributors -- the number of unique contributors for each data point. MaxContributorValue -- the value of the top contributor for each data point. The identity of the contributor might change for each data point in the graph. If this rule aggregates by COUNT, the top contributor for each data point is the contributor with the most occurrences in that period. If the rule aggregates by SUM, the top contributor is the contributor with the highest sum in the log field specified by the rule's Value, during that period. SampleCount -- the number of data points matched by the rule. Sum -- the sum of the values from all contributors during the time period represented by that data point. Minimum -- the minimum value from a single observation during the time period represented by that data point. Maximum -- the maximum value from a single observation during the time period represented by that data point. Average -- the average value from all contributors during the time period represented by that data point."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.GetInsightRuleReport
            default: GraniteServiceVersion20100801.GetInsightRuleReport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                RuleName:
                  $ref: "#/components/schemas/InsightRuleName"
                  description: The name of the rule that you want to see data from.
                StartTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: The start time of the data to use in the report. When used in a raw HTTP Query API, it is formatted as yyyy-MM-dd'T'HH:mm:ss. For example, 2019-07-01T23:59:59.
                EndTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: The end time of the data to use in the report. When used in a raw HTTP Query API, it is formatted as yyyy-MM-dd'T'HH:mm:ss. For example, 2019-07-01T23:59:59.
                Period:
                  $ref: "#/components/schemas/Period"
                  description: The period, in seconds, to use for the statistics in the InsightRuleMetricDatapoint results.
                MaxContributorCount:
                  $ref: "#/components/schemas/InsightRuleUnboundInteger"
                  description: The maximum number of contributors to include in the report. The range is 1 to 100. If you omit this, the default of 10 is used.
                Metrics:
                  $ref: "#/components/schemas/InsightRuleMetricList"
                  description: "Specifies which metrics to use for aggregation of contributor values for the report. You can specify one or more of the following metrics: UniqueContributors -- the number of unique contributors for each data point. MaxContributorValue -- the value of the top contributor for each data point. The identity of the contributor might change for each data point in the graph. If this rule aggregates by COUNT, the top contributor for each data point is the contributor with the most occurrences in that period. If the rule aggregates by SUM, the top contributor is the contributor with the highest sum in the log field specified by the rule's Value, during that period. SampleCount -- the number of data points matched by the rule. Sum -- the sum of the values from all contributors during the time period represented by that data point. Minimum -- the minimum value from a single observation during the time period represented by that data point. Maximum -- the maximum value from a single observation during the time period represented by that data point. Average -- the average value from all contributors during the time period represented by that data point."
                OrderBy:
                  $ref: "#/components/schemas/InsightRuleOrderBy"
                  description: Determines what statistic to use to rank the contributors. Valid values are Sum and Maximum.
              required:
                - RuleName
                - StartTime
                - EndTime
                - Period
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInsightRuleReportOutput"
  /GetMetricData:
    post:
      operationId: GetMetricData
      description: "You can use the GetMetricData API to retrieve CloudWatch metric values. The operation can also include a CloudWatch Metrics Insights query, and one or more metric math functions. A GetMetricData operation that does not include a query can retrieve as many as 500 different metrics in a single request, with a total of as many as 100,800 data points. You can also optionally perform metric math expressions on the values of the returned statistics, to create new time series that represent new insights into your data. For example, using Lambda metrics, you could divide the Errors metric by the Invocations metric to get an error rate time series. For more information about metric math expressions, see Metric Math Syntax and Functions in the Amazon CloudWatch User Guide. If you include a Metrics Insights query, each GetMetricData operation can include only one query. But the same GetMetricData operation can also retrieve other metrics. Metrics Insights queries can query only the most recent three hours of metric data. For more information about Metrics Insights, see Query your metrics with CloudWatch Metrics Insights. Calls to the GetMetricData API have a different pricing structure than calls to GetMetricStatistics. For more information about pricing, see Amazon CloudWatch Pricing. Amazon CloudWatch retains metric data as follows: Data points with a period of less than 60 seconds are available for 3 hours. These data points are high-resolution metrics and are available only for custom metrics that have been defined with a StorageResolution of 1. Data points with a period of 60 seconds (1-minute) are available for 15 days. Data points with a period of 300 seconds (5-minute) are available for 63 days. Data points with a period of 3600 seconds (1 hour) are available for 455 days (15 months). Data points that are initially published with a shorter period are aggregated together for long-term storage. For example, if you collect data using a period of 1 minute, the data remains available for 15 days with 1-minute resolution. After 15 days, this data is still available, but is aggregated and retrievable only with a resolution of 5 minutes. After 63 days, the data is further aggregated and is available with a resolution of 1 hour. If you omit Unit in your request, all data that was collected with any unit is returned, along with the corresponding units that were specified when the data was reported to CloudWatch. If you specify a unit, the operation returns only data that was collected with that unit specified. If you specify a unit that does not match the data collected, the results of the operation are null. CloudWatch does not perform unit conversions. Using Metrics Insights queries with metric math You can't mix a Metric Insights query and metric math syntax in the same expression, but you can reference results from a Metrics Insights query within other Metric math expressions. A Metrics Insights query without a GROUP BY clause returns a single time-series (TS), and can be used as input for a metric math expression that expects a single time series. A Metrics Insights query with a GROUP BY clause returns an array of time-series (TS[]), and can be used as input for a metric math expression that expects an array of time series."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.GetMetricData
            default: GraniteServiceVersion20100801.GetMetricData
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MetricDataQueries:
                  $ref: "#/components/schemas/MetricDataQueries"
                  description: The metric queries to be returned. A single GetMetricData call can include as many as 500 MetricDataQuery structures. Each of these structures can specify either a metric to retrieve, a Metrics Insights query, or a math expression to perform on retrieved data.
                StartTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: "The time stamp indicating the earliest data to be returned. The value specified is inclusive; results include data points with the specified time stamp. CloudWatch rounds the specified time stamp as follows: Start time less than 15 days ago - Round down to the nearest whole minute. For example, 12:32:34 is rounded down to 12:32:00. Start time between 15 and 63 days ago - Round down to the nearest 5-minute clock interval. For example, 12:32:34 is rounded down to 12:30:00. Start time greater than 63 days ago - Round down to the nearest 1-hour clock interval. For example, 12:32:34 is rounded down to 12:00:00. If you set Period to 5, 10, 20, or 30, the start time of your request is rounded down to the nearest time that corresponds to even 5-, 10-, 20-, or 30-second divisions of a minute. For example, if you make a query at (HH:mm:ss) 01:05:23 for the previous 10-second period, the start time of your request is rounded down and you receive data from 01:05:10 to 01:05:20. If you make a query at 15:07:17 for the previous 5 minutes of data, using a period of 5 seconds, you receive data timestamped between 15:02:15 and 15:07:15. For better performance, specify StartTime and EndTime values that align with the value of the metric's Period and sync up with the beginning and end of an hour. For example, if the Period of a metric is 5 minutes, specifying 12:05 or 12:30 as StartTime can get a faster response from CloudWatch than setting 12:07 or 12:29 as the StartTime."
                EndTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: The time stamp indicating the latest data to be returned. The value specified is exclusive; results include data points up to the specified time stamp. For better performance, specify StartTime and EndTime values that align with the value of the metric's Period and sync up with the beginning and end of an hour. For example, if the Period of a metric is 5 minutes, specifying 12:05 or 12:30 as EndTime can get a faster response from CloudWatch than setting 12:07 or 12:29 as the EndTime.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Include this value, if it was returned by the previous GetMetricData operation, to get the next set of data points.
                ScanBy:
                  $ref: "#/components/schemas/ScanBy"
                  description: The order in which data points should be returned. TimestampDescending returns the newest data first and paginates when the MaxDatapoints limit is reached. TimestampAscending returns the oldest data first and paginates when the MaxDatapoints limit is reached. If you omit this parameter, the default of TimestampDescending is used.
                MaxDatapoints:
                  $ref: "#/components/schemas/GetMetricDataMaxDatapoints"
                  description: The maximum number of data points the request should return before paginating. If you omit this, the default of 100,800 is used.
                LabelOptions:
                  $ref: "#/components/schemas/LabelOptions"
                  description: This structure includes the Timezone parameter, which you can use to specify your time zone so that the labels of returned data display the correct time for your time zone.
              required:
                - MetricDataQueries
                - StartTime
                - EndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMetricDataOutput"
  /GetMetricStatistics:
    post:
      operationId: GetMetricStatistics
      description: "Gets statistics for the specified metric. The maximum number of data points returned from a single call is 1,440. If you request more than 1,440 data points, CloudWatch returns an error. To reduce the number of data points, you can narrow the specified time range and make multiple requests across adjacent time ranges, or you can increase the specified period. Data points are not returned in chronological order. CloudWatch aggregates data points based on the length of the period that you specify. For example, if you request statistics with a one-hour period, CloudWatch aggregates all data points with time stamps that fall within each one-hour period. Therefore, the number of values aggregated by CloudWatch is larger than the number of data points returned. CloudWatch needs raw data points to calculate percentile statistics. If you publish data using a statistic set instead, you can only retrieve percentile statistics for this data if one of the following conditions is true: The SampleCount value of the statistic set is 1. The Min and the Max values of the statistic set are equal. Percentile statistics are not available for metrics when any of the metric values are negative numbers. Amazon CloudWatch retains metric data as follows: Data points with a period of less than 60 seconds are available for 3 hours. These data points are high-resolution metrics and are available only for custom metrics that have been defined with a StorageResolution of 1. Data points with a period of 60 seconds (1-minute) are available for 15 days. Data points with a period of 300 seconds (5-minute) are available for 63 days. Data points with a period of 3600 seconds (1 hour) are available for 455 days (15 months). Data points that are initially published with a shorter period are aggregated together for long-term storage. For example, if you collect data using a period of 1 minute, the data remains available for 15 days with 1-minute resolution. After 15 days, this data is still available, but is aggregated and retrievable only with a resolution of 5 minutes. After 63 days, the data is further aggregated and is available with a resolution of 1 hour. CloudWatch started retaining 5-minute and 1-hour metric data as of July 9, 2016. For information about metrics and dimensions supported by Amazon Web Services services, see the Amazon CloudWatch Metrics and Dimensions Reference in the Amazon CloudWatch User Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.GetMetricStatistics
            default: GraniteServiceVersion20100801.GetMetricStatistics
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Namespace:
                  $ref: "#/components/schemas/Namespace"
                  description: The namespace of the metric, with or without spaces.
                MetricName:
                  $ref: "#/components/schemas/MetricName"
                  description: The name of the metric, with or without spaces.
                Dimensions:
                  $ref: "#/components/schemas/Dimensions"
                  description: The dimensions. If the metric contains multiple dimensions, you must include a value for each dimension. CloudWatch treats each unique combination of dimensions as a separate metric. If a specific combination of dimensions was not published, you can't retrieve statistics for it. You must specify the same dimensions that were used when the metrics were created. For an example, see Dimension Combinations in the Amazon CloudWatch User Guide. For more information about specifying dimensions, see Publishing Metrics in the Amazon CloudWatch User Guide.
                StartTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: "The time stamp that determines the first data point to return. Start times are evaluated relative to the time that CloudWatch receives the request. The value specified is inclusive; results include data points with the specified time stamp. In a raw HTTP query, the time stamp must be in ISO 8601 UTC format (for example, 2016-10-03T23:00:00Z). CloudWatch rounds the specified time stamp as follows: Start time less than 15 days ago - Round down to the nearest whole minute. For example, 12:32:34 is rounded down to 12:32:00. Start time between 15 and 63 days ago - Round down to the nearest 5-minute clock interval. For example, 12:32:34 is rounded down to 12:30:00. Start time greater than 63 days ago - Round down to the nearest 1-hour clock interval. For example, 12:32:34 is rounded down to 12:00:00. If you set Period to 5, 10, 20, or 30, the start time of your request is rounded down to the nearest time that corresponds to even 5-, 10-, 20-, or 30-second divisions of a minute. For example, if you make a query at (HH:mm:ss) 01:05:23 for the previous 10-second period, the start time of your request is rounded down and you receive data from 01:05:10 to 01:05:20. If you make a query at 15:07:17 for the previous 5 minutes of data, using a period of 5 seconds, you receive data timestamped between 15:02:15 and 15:07:15."
                EndTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: The time stamp that determines the last data point to return. The value specified is exclusive; results include data points up to the specified time stamp. In a raw HTTP query, the time stamp must be in ISO 8601 UTC format (for example, 2016-10-10T23:00:00Z).
                Period:
                  $ref: "#/components/schemas/Period"
                  description: "The granularity, in seconds, of the returned data points. For metrics with regular resolution, a period can be as short as one minute (60 seconds) and must be a multiple of 60. For high-resolution metrics that are collected at intervals of less than one minute, the period can be 1, 5, 10, 20, 30, 60, or any multiple of 60. High-resolution metrics are those metrics stored by a PutMetricData call that includes a StorageResolution of 1 second. If the StartTime parameter specifies a time stamp that is greater than 3 hours ago, you must specify the period as follows or no data points in that time range is returned: Start time between 3 hours and 15 days ago - Use a multiple of 60 seconds (1 minute). Start time between 15 and 63 days ago - Use a multiple of 300 seconds (5 minutes). Start time greater than 63 days ago - Use a multiple of 3600 seconds (1 hour)."
                Statistics:
                  $ref: "#/components/schemas/Statistics"
                  description: The metric statistics, other than percentile. For percentile statistics, use ExtendedStatistics. When calling GetMetricStatistics, you must specify either Statistics or ExtendedStatistics, but not both.
                ExtendedStatistics:
                  $ref: "#/components/schemas/ExtendedStatistics"
                  description: The percentile statistics. Specify values between p0.0 and p100. When calling GetMetricStatistics, you must specify either Statistics or ExtendedStatistics, but not both. Percentile statistics are not available for metrics when any of the metric values are negative numbers.
                Unit:
                  $ref: "#/components/schemas/StandardUnit"
                  description: The unit for a given metric. If you omit Unit, all data that was collected with any unit is returned, along with the corresponding units that were specified when the data was reported to CloudWatch. If you specify a unit, the operation returns only data that was collected with that unit specified. If you specify a unit that does not match the data collected, the results of the operation are null. CloudWatch does not perform unit conversions.
              required:
                - Namespace
                - MetricName
                - StartTime
                - EndTime
                - Period
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMetricStatisticsOutput"
