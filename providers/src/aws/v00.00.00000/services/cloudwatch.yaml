        Contributors:
          $ref: "#/components/schemas/InsightRuleContributors"
          description: An array of the unique contributors found by this rule in this time period. If the rule contains multiple keys, each combination of values for the keys counts as a unique contributor.
        MetricDatapoints:
          $ref: "#/components/schemas/InsightRuleMetricDatapoints"
          description: A time series of metric data points that matches the time period in the rule request.
    InsightRuleContributorKeyLabels:
      type: array
      items:
        $ref: "#/components/schemas/InsightRuleContributorKeyLabel"
    InsightRuleContributorKeyLabel:
      type: string
    InsightRuleAggregationStatistic:
      type: string
    InsightRuleUnboundDouble:
      type: number
      format: double
    InsightRuleUnboundLong:
      type: integer
      format: int64
    InsightRuleContributors:
      type: array
      items:
        $ref: "#/components/schemas/InsightRuleContributor"
    InsightRuleContributor:
      description: One of the unique contributors found by a Contributor Insights rule. If the rule contains multiple keys, then a unique contributor is a unique combination of values from all the keys in the rule. If the rule contains a single key, then each unique contributor is each unique value for this key. For more information, see GetInsightRuleReport.
      type: object
      properties:
        Keys:
          $ref: "#/components/schemas/InsightRuleContributorKeys"
          description: One of the log entry field keywords that is used to define contributors for this rule.
        ApproximateAggregateValue:
          $ref: "#/components/schemas/InsightRuleUnboundDouble"
          description: An approximation of the aggregate value that comes from this contributor.
        Datapoints:
          $ref: "#/components/schemas/InsightRuleContributorDatapoints"
          description: An array of the data points where this contributor is present. Only the data points when this contributor appeared are included in the array.
      required:
        - Keys
        - ApproximateAggregateValue
        - Datapoints
    InsightRuleContributorKeys:
      type: array
      items:
        $ref: "#/components/schemas/InsightRuleContributorKey"
    InsightRuleContributorKey:
      type: string
    InsightRuleContributorDatapoints:
      type: array
      items:
        $ref: "#/components/schemas/InsightRuleContributorDatapoint"
    InsightRuleContributorDatapoint:
      description: One data point related to one contributor. For more information, see GetInsightRuleReport and InsightRuleContributor.
      type: object
      properties:
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of the data point.
        ApproximateValue:
          $ref: "#/components/schemas/InsightRuleUnboundDouble"
          description: The approximate value that this contributor added during this timestamp.
      required:
        - Timestamp
        - ApproximateValue
    InsightRuleMetricDatapoints:
      type: array
      items:
        $ref: "#/components/schemas/InsightRuleMetricDatapoint"
    InsightRuleMetricDatapoint:
      description: One data point from the metric time series returned in a Contributor Insights rule report. For more information, see GetInsightRuleReport.
      type: object
      properties:
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of the data point.
        UniqueContributors:
          $ref: "#/components/schemas/InsightRuleUnboundDouble"
          description: The number of unique contributors who published data during this timestamp. This statistic is returned only if you included it in the Metrics array in your request.
        MaxContributorValue:
          $ref: "#/components/schemas/InsightRuleUnboundDouble"
          description: The maximum value provided by one contributor during this timestamp. Each timestamp is evaluated separately, so the identity of the max contributor could be different for each timestamp. This statistic is returned only if you included it in the Metrics array in your request.
        SampleCount:
          $ref: "#/components/schemas/InsightRuleUnboundDouble"
          description: The number of occurrences that matched the rule during this data point. This statistic is returned only if you included it in the Metrics array in your request.
        Average:
          $ref: "#/components/schemas/InsightRuleUnboundDouble"
          description: The average value from all contributors during the time period represented by that data point. This statistic is returned only if you included it in the Metrics array in your request.
        Sum:
          $ref: "#/components/schemas/InsightRuleUnboundDouble"
          description: The sum of the values from all contributors during the time period represented by that data point. This statistic is returned only if you included it in the Metrics array in your request.
        Minimum:
          $ref: "#/components/schemas/InsightRuleUnboundDouble"
          description: The minimum value from a single contributor during the time period represented by that data point. This statistic is returned only if you included it in the Metrics array in your request.
        Maximum:
          $ref: "#/components/schemas/InsightRuleUnboundDouble"
          description: The maximum value from a single occurence from a single contributor during the time period represented by that data point. This statistic is returned only if you included it in the Metrics array in your request.
      required:
        - Timestamp
    GetMetricDataMaxDatapoints:
      type: integer
    LabelOptions:
      description: This structure includes the Timezone parameter, which you can use to specify your time zone so that the labels that are associated with returned metrics display the correct time for your time zone. The Timezone value affects a label only if you have a time-based dynamic expression in the label. For more information about dynamic expressions in labels, see Using Dynamic Labels.
      type: object
      properties:
        Timezone:
          $ref: "#/components/schemas/GetMetricDataLabelTimezone"
          description: The time zone to use for metric data return in this operation. The format is + or - followed by four digits. The first two digits indicate the number of hours ahead or behind of UTC, and the final two digits are the number of minutes. For example, +0130 indicates a time zone that is 1 hour and 30 minutes ahead of UTC. The default is +0000.
    GetMetricDataLabelTimezone:
      type: string
    GetMetricDataOutput:
      type: object
      properties:
        MetricDataResults:
          $ref: "#/components/schemas/MetricDataResults"
          description: The metrics that are returned, including the metric name, namespace, and dimensions.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: A token that marks the next batch of returned results.
        Messages:
          $ref: "#/components/schemas/MetricDataResultMessages"
          description: Contains a message about this GetMetricData operation, if the operation results in such a message. An example of a message that might be returned is Maximum number of allowed metrics exceeded. If there is a message, as much of the operation as possible is still executed. A message appears here only if it is related to the global GetMetricData operation. Any message about a specific metric returned by the operation appears in the MetricDataResult object returned for that metric.
    MetricDataResults:
      type: array
      items:
        $ref: "#/components/schemas/MetricDataResult"
    MetricDataResult:
      description: A GetMetricData call returns an array of MetricDataResult structures. Each of these structures includes the data points for that metric, along with the timestamps of those data points and other identifying information.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/MetricId"
          description: The short name you specified to represent this metric.
        Label:
          $ref: "#/components/schemas/MetricLabel"
          description: The human-readable label associated with the data.
        Timestamps:
          $ref: "#/components/schemas/Timestamps"
          description: The timestamps for the data points, formatted in Unix timestamp format. The number of timestamps always matches the number of values and the value for Timestamps[x] is Values[x].
        Values:
          $ref: "#/components/schemas/DatapointValues"
          description: The data points for the metric corresponding to Timestamps. The number of values always matches the number of timestamps and the timestamp for Values[x] is Timestamps[x].
        StatusCode:
          $ref: "#/components/schemas/StatusCode"
          description: The status of the returned data. Complete indicates that all data points in the requested time range were returned. PartialData means that an incomplete set of data points were returned. You can use the NextToken value that was returned and repeat your request to get more data points. NextToken is not returned if you are performing a math expression. InternalError indicates that an error occurred. Retry your request using NextToken, if present.
        Messages:
          $ref: "#/components/schemas/MetricDataResultMessages"
          description: A list of messages with additional information about the data returned.
    Timestamps:
      type: array
      items:
        $ref: "#/components/schemas/Timestamp"
    DatapointValues:
      type: array
      items:
        $ref: "#/components/schemas/DatapointValue"
    DatapointValue:
      type: number
      format: double
    StatusCode:
      type: string
      enum:
        - Complete
        - InternalError
        - PartialData
        - Forbidden
    MetricDataResultMessages:
      type: array
      items:
        $ref: "#/components/schemas/MessageData"
    MessageData:
      description: A message returned by the GetMetricDataAPI, including a code and a description. If a cross-Region GetMetricData operation fails with a code of Forbidden and a value of Authentication too complex to retrieve cross region data, you can correct the problem by running the GetMetricData operation in the same Region where the metric data is.
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/MessageDataCode"
          description: The error code or status code associated with the message.
        Value:
          $ref: "#/components/schemas/MessageDataValue"
          description: The message text.
    MessageDataCode:
      type: string
    MessageDataValue:
      type: string
    Statistics:
      type: array
      items:
        $ref: "#/components/schemas/Statistic"
    ExtendedStatistics:
      type: array
      items:
        $ref: "#/components/schemas/ExtendedStatistic"
    GetMetricStatisticsOutput:
      type: object
      properties:
        Label:
          $ref: "#/components/schemas/MetricLabel"
