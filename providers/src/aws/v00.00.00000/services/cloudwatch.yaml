        $ref: "#/components/schemas/MetricStreamFilter"
    MetricStreamFilter:
      description: This structure contains a metric namespace and optionally, a list of metric names, to either include in a metric stream or exclude from a metric stream. A metric stream's filters can include up to 1000 total names. This limit applies to the sum of namespace names and metric names in the filters. For example, this could include 10 metric namespace filters with 99 metrics each, or 20 namespace filters with 49 metrics specified in each filter.
      type: object
      properties:
        Namespace:
          $ref: "#/components/schemas/Namespace"
          description: The name of the metric namespace for this filter. The namespace can contain only ASCII printable characters (ASCII range 32 through 126). It must contain at least one non-whitespace character.
        MetricNames:
          $ref: "#/components/schemas/MetricStreamFilterMetricNames"
          description: The names of the metrics to either include or exclude from the metric stream. If you omit this parameter, all metrics in the namespace are included or excluded, depending on whether this filter is specified as an exclude filter or an include filter. Each metric name can contain only ASCII printable characters (ASCII range 32 through 126). Each metric name must contain at least one non-whitespace character.
    MetricStreamFilterMetricNames:
      type: array
      items:
        $ref: "#/components/schemas/MetricName"
    MetricStreamState:
      type: string
    MetricStreamOutputFormat:
      type: string
      enum:
        - json
        - opentelemetry0.7
        - opentelemetry1.0
      minLength: 1
      maxLength: 255
    MetricStreamStatisticsConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/MetricStreamStatisticsConfiguration"
    MetricStreamStatisticsConfiguration:
      description: By default, a metric stream always sends the MAX, MIN, SUM, and SAMPLECOUNT statistics for each metric that is streamed. This structure contains information for one metric that includes additional statistics in the stream. For more information about statistics, see CloudWatch, listed in CloudWatch statistics definitions.
      type: object
      properties:
        IncludeMetrics:
          $ref: "#/components/schemas/MetricStreamStatisticsIncludeMetrics"
          description: An array of metric name and namespace pairs that stream the additional statistics listed in the value of the AdditionalStatistics parameter. There can be as many as 100 pairs in the array. All metrics that match the combination of metric name and namespace will be streamed with the additional statistics, no matter their dimensions.
        AdditionalStatistics:
          $ref: "#/components/schemas/MetricStreamStatisticsAdditionalStatistics"
          description: The list of additional statistics that are to be streamed for the metrics listed in the IncludeMetrics array in this structure. This list can include as many as 20 statistics. If the OutputFormat for the stream is opentelemetry1.0 or opentelemetry0.7, the only valid values are p?? percentile statistics such as p90, p99 and so on. If the OutputFormat for the stream is json, the valid values include the abbreviations for all of the statistics listed in CloudWatch statistics definitions. For example, this includes tm98, wm90, PR(:300), and so on.
      required:
        - IncludeMetrics
        - AdditionalStatistics
    MetricStreamStatisticsIncludeMetrics:
      type: array
      items:
