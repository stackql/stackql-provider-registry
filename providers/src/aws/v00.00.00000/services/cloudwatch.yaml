          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Names:
                  $ref: "#/components/schemas/MetricStreamNames"
                  description: The array of the names of metric streams to start streaming. This is an "all or nothing" operation. If you do not have permission to access all of the metric streams that you list here, then none of the streams that you list in the operation will start streaming.
              required:
                - Names
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartMetricStreamsOutput"
