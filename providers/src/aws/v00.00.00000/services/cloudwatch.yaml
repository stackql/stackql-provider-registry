          $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the metric stream.
        Name:
          $ref: "#/components/schemas/MetricStreamName"
          description: The name of the metric stream.
        IncludeFilters:
          $ref: "#/components/schemas/MetricStreamFilters"
          description: If this array of metric namespaces is present, then these namespaces are the only metric namespaces that are streamed by this metric stream.
        ExcludeFilters:
          $ref: "#/components/schemas/MetricStreamFilters"
          description: If this array of metric namespaces is present, then these namespaces are the only metric namespaces that are not streamed by this metric stream. In this case, all other metric namespaces in the account are streamed by this metric stream.
        FirehoseArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the Amazon Kinesis Data Firehose delivery stream that is used by this metric stream.
        RoleArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the IAM role that is used by this metric stream.
        State:
          $ref: "#/components/schemas/MetricStreamState"
          description: The state of the metric stream. The possible values are running and stopped.
        CreationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date that the metric stream was created.
        LastUpdateDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date of the most recent update to the metric stream's configuration.
        OutputFormat:
          $ref: "#/components/schemas/MetricStreamOutputFormat"
          description: The output format for the stream. Valid values are json, opentelemetry1.0, and opentelemetry0.7. For more information about metric stream output formats, see Metric streams output formats.
        StatisticsConfigurations:
          $ref: "#/components/schemas/MetricStreamStatisticsConfigurations"
          description: Each entry in this array displays information about one or more metrics that include additional statistics in the metric stream. For more information about the additional statistics, see CloudWatch statistics definitions.
        IncludeLinkedAccountsMetrics:
          $ref: "#/components/schemas/IncludeLinkedAccountsMetrics"
          description: If this is true and this metric stream is in a monitoring account, then the stream includes metrics from source accounts that the monitoring account is linked to.
    AmazonResourceName:
      type: string
