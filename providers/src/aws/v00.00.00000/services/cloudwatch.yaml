          description: The rules returned by the operation.
    InsightRules:
      type: array
      items:
        $ref: "#/components/schemas/InsightRule"
    InsightRule:
      description: This structure contains the definition for a Contributor Insights rule. For more information about this rule, see Using Constributor Insights to analyze high-cardinality data in the Amazon CloudWatch User Guide.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/InsightRuleName"
          description: The name of the rule.
        State:
          $ref: "#/components/schemas/InsightRuleState"
          description: Indicates whether the rule is enabled or disabled.
        Schema:
          $ref: "#/components/schemas/InsightRuleSchema"
          description: 'For rules that you create, this is always {"Name": "CloudWatchLogRule", "Version": 1}. For managed rules, this is {"Name": "ServiceLogRule", "Version": 1}'
        Definition:
          $ref: "#/components/schemas/InsightRuleDefinition"
          description: The definition of the rule, as a JSON object. The definition contains the keywords used to define contributors, the value to aggregate on if this rule returns a sum instead of a count, and the filters. For details on the valid syntax, see Contributor Insights Rule Syntax.
        ManagedRule:
          $ref: "#/components/schemas/InsightRuleIsManaged"
          description: An optional built-in rule that Amazon Web Services manages.
        ApplyOnTransformedLogs:
          $ref: "#/components/schemas/InsightRuleOnTransformedLogs"
          description: Displays whether the rule is evaluated on the transformed versions of logs, for log groups that have Log transformation enabled. If this is false, log events are evaluated before they are transformed.
      required:
        - Name
        - State
        - Schema
        - Definition
    InsightRuleState:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[\\x20-\\x7E]+"
    InsightRuleSchema:
      type: string
    InsightRuleDefinition:
      type: string
      minLength: 1
      maxLength: 8192
      pattern: "[\\x00-\\x7F]+"
    InsightRuleIsManaged:
