          description: An array listing the rules that could not be disabled. You cannot disable built-in rules.
    EnableInsightRulesOutput:
      type: object
      properties:
        Failures:
          $ref: "#/components/schemas/BatchFailures"
          description: An array listing the rules that could not be enabled. You cannot disable or enable built-in rules.
    GetAlarmMuteRuleOutput:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/Name"
          description: The name of the alarm mute rule.
        AlarmMuteRuleArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the alarm mute rule.
        Description:
          $ref: "#/components/schemas/AlarmDescription"
          description: The description of the alarm mute rule.
        Rule:
          $ref: "#/components/schemas/Rule"
          description: The configuration that defines when and how long alarms are muted.
        MuteTargets:
          $ref: "#/components/schemas/MuteTargets"
          description: Specifies which alarms this rule applies to.
        StartDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the mute rule becomes active. If not set, the rule is active immediately.
        ExpireDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the mute rule expires and is no longer evaluated.
        Status:
          $ref: "#/components/schemas/AlarmMuteRuleStatus"
          description: The current status of the alarm mute rule. Valid values are SCHEDULED, ACTIVE, or EXPIRED.
        LastUpdatedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the mute rule was last updated.
        MuteType:
          $ref: "#/components/schemas/MuteType"
          description: Indicates whether the mute rule is one-time or recurring. Valid values are ONE_TIME or RECURRING.
    Arn:
      type: string
      minLength: 1
      maxLength: 1600
    Rule:
      description: Defines the schedule configuration for an alarm mute rule. The rule contains a schedule that specifies when and how long alarms should be muted. The schedule can be a recurring pattern using cron expressions or a one-time mute window using at expressions.
      type: object
      properties:
        Schedule:
          $ref: "#/components/schemas/Schedule"
          description: The schedule configuration that defines when the mute rule activates and how long it remains active.
      required:
        - Schedule
    Schedule:
      description: Specifies when and how long an alarm mute rule is active. The schedule uses either a cron expression for recurring mute windows or an at expression for one-time mute windows. When the schedule activates, the mute rule mutes alarm actions for the specified duration.
      type: object
      properties:
        Expression:
          $ref: "#/components/schemas/Expression"
          description: "The schedule expression that defines when the mute rule activates. The expression must be between 1 and 256 characters in length. You can use one of two expression formats: Cron expressions - For recurring mute windows. Format: cron(Minutes Hours Day-of-month Month Day-of-week) Examples: cron(0 2 * * *) - Activates daily at 2:00 AM cron(0 2 * * SUN) - Activates every Sunday at 2:00 AM for weekly system maintenance cron(0 1 1 * *) - Activates on the first day of each month at 1:00 AM for monthly database maintenance cron(0 18 * * FRI) - Activates every Friday at 6:00 PM cron(0 23 * * *) - Activates every day at 11:00 PM during nightly backup operations The characters *, -, and , are supported in all fields. English names can be used for the month (JAN-DEC) and day of week (SUN-SAT) fields. At expressions - For one-time mute windows. Format: at(yyyy-MM-ddThh:mm) Examples: at(2024-05-10T14:00) - Activates once on May 10, 2024 at 2:00 PM during an active incident response session at(2024-12-23T00:00) - Activates once on December 23, 2024 at midnight during annual company shutdown"
        Duration:
          $ref: "#/components/schemas/Duration"
          description: "The length of time that alarms remain muted when the schedule activates. The duration must be between 1 and 50 characters in length. Specify the duration using ISO 8601 duration format with a minimum of 1 minute (PT1M) and maximum of 15 days (P15D). Examples: PT4H - 4 hours for weekly system maintenance P2DT12H - 2 days and 12 hours for weekend muting from Friday 6:00 PM to Monday 6:00 AM PT6H - 6 hours for monthly database maintenance PT2H - 2 hours for nightly backup operations P7D - 7 days for annual company shutdown The duration begins when the schedule expression time is reached. For recurring schedules, the duration applies to each occurrence."
        Timezone:
          $ref: "#/components/schemas/Timezone"
          description: "The time zone to use when evaluating the schedule expression. The time zone must be between 1 and 50 characters in length. Specify the time zone using standard timezone identifiers (for example, America/New_York, Europe/London, or Asia/Tokyo). If you don't specify a time zone, UTC is used by default. The time zone affects how cron and at expressions are interpreted, as well as start and expire dates you specify Examples: America/New_York - Eastern Time (US) America/Los_Angeles - Pacific Time (US) Europe/London - British Time Asia/Tokyo - Japan Standard Time UTC - Coordinated Universal Time"
      required:
        - Expression
        - Duration
    Expression:
      type: string
      minLength: 1
      maxLength: 256
    Duration:
      type: string
      minLength: 1
      maxLength: 50
    Timezone:
      type: string
      minLength: 1
      maxLength: 50
    MuteTargets:
      description: Specifies which alarms an alarm mute rule applies to. You can target up to 100 specific alarms by name. When a mute rule is active, the targeted alarms continue to evaluate metrics and transition between states, but their configured actions are muted.
      type: object
      properties:
        AlarmNames:
          $ref: "#/components/schemas/MuteTargetAlarmNameList"
          description: The list of alarm names that this mute rule targets. You can specify up to 100 alarm names. Each alarm name must be between 1 and 255 characters in length. The alarm names must match existing alarms in your Amazon Web Services account and region.
      required:
        - AlarmNames
    MuteTargetAlarmNameList:
      type: array
      items:
        $ref: "#/components/schemas/Name"
    AlarmMuteRuleStatus:
      type: string
      enum:
        - SCHEDULED
        - ACTIVE
        - EXPIRED
    MuteType:
      type: string
    GetDashboardOutput:
      type: object
      properties:
        DashboardArn:
