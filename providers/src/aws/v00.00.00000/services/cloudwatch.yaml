      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.StartOTelEnrichment
            default: GraniteServiceVersion20100801.StartOTelEnrichment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartOTelEnrichmentOutput"
  /StopMetricStreams:
    post:
      operationId: StopMetricStreams
      description: Stops the streaming of metrics for one or more of your metric streams.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.StopMetricStreams
            default: GraniteServiceVersion20100801.StopMetricStreams
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Names:
                  $ref: "#/components/schemas/MetricStreamNames"
                  description: The array of the names of metric streams to stop streaming. This is an "all or nothing" operation. If you do not have permission to access all of the metric streams that you list here, then none of the streams that you list in the operation will stop streaming.
              required:
                - Names
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopMetricStreamsOutput"
  /StopOTelEnrichment:
    post:
      operationId: StopOTelEnrichment
      description: Disables enrichment and PromQL access for CloudWatch vended metrics for supported Amazon Web Services resources in the account. After disabling, these metrics are no longer enriched with resource ARN and resource tag labels, and cannot be queried using PromQL.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.StopOTelEnrichment
            default: GraniteServiceVersion20100801.StopOTelEnrichment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopOTelEnrichmentOutput"
  /TagResource:
    post:
      operationId: TagResource
      description: Assigns one or more tags (key-value pairs) to the specified CloudWatch resource. Currently, the only CloudWatch resources that can be tagged are alarms, dashboards, metric streams and Contributor Insights rules. Tags can help you organize and categorize your resources. You can also use them to scope user permissions by granting a user permission to access or change only resources with certain tag values. Tags don't have any semantic meaning to Amazon Web Services and are interpreted strictly as strings of characters. You can use the TagResource action with an alarm that already has tags. If you specify a new tag key for the alarm, this tag is appended to the list of tags associated with the alarm. If you specify a tag key that is already associated with the alarm, the new tag value that you specify replaces the previous value for that tag. You can associate as many as 50 tags with a CloudWatch resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.TagResource
            default: GraniteServiceVersion20100801.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The ARN of the CloudWatch resource that you're adding tags to. The ARN format of an alarm is arn:aws:cloudwatch:Region:account-id:alarm:alarm-name The ARN format of a Contributor Insights rule is arn:aws:cloudwatch:Region:account-id:insight-rule/insight-rule-name The ARN format of a dashboard is arn:aws:cloudwatch::account-id:dashboard/dashboard-name The ARN format of a metric stream is arn:aws:cloudwatch:Region:account-id:metric-stream/metric-stream-name For more information about ARN format, see Resource Types Defined by Amazon CloudWatch in the Amazon Web Services General Reference.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The list of key-value pairs to associate with the alarm.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes one or more tags from the specified resource. Currently, alarms, dashboards, metric streams and Contributor Insights rules support tagging.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - GraniteServiceVersion20100801.UntagResource
            default: GraniteServiceVersion20100801.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The ARN of the CloudWatch resource that you're removing tags from. The ARN format of an alarm is arn:aws:cloudwatch:Region:account-id:alarm:alarm-name The ARN format of a Contributor Insights rule is arn:aws:cloudwatch:Region:account-id:insight-rule/insight-rule-name The ARN format of a dashboard is arn:aws:cloudwatch::account-id:dashboard/dashboard-name The ARN format of a metric stream is arn:aws:cloudwatch:Region:account-id:metric-stream/metric-stream-name For more information about ARN format, see Resource Types Defined by Amazon CloudWatch in the Amazon Web Services General Reference.
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: The list of tag keys to remove from the resource.
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Name:
      type: string
      minLength: 1
      maxLength: 255
    AlarmNames:
      type: array
      items:
        $ref: "#/components/schemas/AlarmName"
    AlarmName:
      type: string
      minLength: 1
      maxLength: 255
    Namespace:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[^:].*"
    MetricName:
      type: string
      minLength: 1
      maxLength: 255
    Dimensions:
      type: array
      items:
        $ref: "#/components/schemas/Dimension"
    Dimension:
      description: A dimension is a name/value pair that is part of the identity of a metric. Because dimensions are part of the unique identifier for a metric, whenever you add a unique name/value pair to one of your metrics, you are creating a new variation of that metric. For example, many Amazon EC2 metrics publish InstanceId as a dimension name, and the actual instance ID as the value for that dimension. You can assign up to 30 dimensions to a metric.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/DimensionName"
          description: The name of the dimension. Dimension names must contain only ASCII characters, must include at least one non-whitespace character, and cannot start with a colon (:). ASCII control characters are not supported as part of dimension names.
        Value:
          $ref: "#/components/schemas/DimensionValue"
          description: The value of the dimension. Dimension values must contain only ASCII characters and must include at least one non-whitespace character. ASCII control characters are not supported as part of dimension values.
      required:
        - Name
        - Value
    DimensionName:
      type: string
      minLength: 1
      maxLength: 255
    DimensionValue:
      type: string
      minLength: 1
      maxLength: 1024
    AnomalyDetectorMetricStat:
      type: string
      maxLength: 50
      pattern: (SampleCount|Average|Sum|Minimum|Maximum|IQM|(p|tc|tm|ts|wm)(\d{1,2}(\.\d{0,10})?|100)|[ou]\d+(\.\d*)?)(_E|_L|_H)?|(TM|TC|TS|WM)\(((((\d{1,2})(\.\d{0,10})?|100(\.0{0,10})?)%)?:((\d{1,2})(\.\d{0,10})?|100(\.0{0,10})?)%|((\d{1,2})(\.\d{0,10})?|100(\.0{0,10})?)%:(((\d{1,2})(\.\d{0,10})?|100(\.0{0,10})?)%)?)\)|(TM|TC|TS|WM|PR)\(((\d+(\.\d{0,10})?|(\d+(\.\d{0,10})?[Ee][+-]?\d+)):((\d+(\.\d{0,10})?|(\d+(\.\d{0,10})?[Ee][+-]?\d+)))?|((\d+(\.\d{0,10})?|(\d+(\.\d{0,10})?[Ee][+-]?\d+)))?:(\d+(\.\d{0,10})?|(\d+(\.\d{0,10})?[Ee][+-]?\d+)))\)
    SingleMetricAnomalyDetector:
      description: Designates the CloudWatch metric and statistic that provides the time series the anomaly detector uses as input. If you have enabled unified cross-account observability, and this account is a monitoring account, the metric can be in the same account or a source account.
      type: object
      properties:
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: If the CloudWatch metric that provides the time series that the anomaly detector uses as input is in another account, specify that account ID here. If you omit this parameter, the current account is used.
        Namespace:
          $ref: "#/components/schemas/Namespace"
          description: The namespace of the metric to create the anomaly detection model for.
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the metric to create the anomaly detection model for.
        Dimensions:
          $ref: "#/components/schemas/Dimensions"
          description: The metric dimensions to create the anomaly detection model for.
        Stat:
          $ref: "#/components/schemas/AnomalyDetectorMetricStat"
          description: The statistic to use for the metric and anomaly detection model.
    AccountId:
      type: string
      minLength: 1
      maxLength: 255
    MetricMathAnomalyDetector:
      description: Indicates the CloudWatch math expression that provides the time series the anomaly detector uses as input. The designated math expression must return a single time series.
      type: object
      properties:
        MetricDataQueries:
          $ref: "#/components/schemas/MetricDataQueries"
          description: An array of metric data query structures that enables you to create an anomaly detector based on the result of a metric math expression. Each item in MetricDataQueries gets a metric or performs a math expression. One item in MetricDataQueries is the expression that provides the time series that the anomaly detector uses as input. Designate the expression by setting ReturnData to true for this object in the array. For all other expressions and metrics, set ReturnData to false. The designated expression must return a single time series.
    MetricDataQueries:
      type: array
      items:
        $ref: "#/components/schemas/MetricDataQuery"
    MetricDataQuery:
      description: This structure is used in both GetMetricData and PutMetricAlarm. The supported use of this structure is different for those two operations. When used in GetMetricData, it indicates the metric data to return, and whether this call is just retrieving a batch set of data for one metric, or is performing a Metrics Insights query or a math expression. A single GetMetricData call can include up to 500 MetricDataQuery structures. When used in PutMetricAlarm, it enables you to create an alarm based on a metric math expression. Each MetricDataQuery in the array specifies either a metric to retrieve, or a math expression to be performed on retrieved metrics. A single PutMetricAlarm call can include up to 20 MetricDataQuery structures in the array. The 20 structures can include as many as 10 structures that contain a MetricStat parameter to retrieve a metric, and as many as 10 structures that contain the Expression parameter to perform a math expression. Of those Expression structures, one must have true as the value for ReturnData. The result of this expression is the value the alarm watches. Any expression used in a PutMetricAlarm operation must return a single time series. For more information, see Metric Math Syntax and Functions in the Amazon CloudWatch User Guide. Some of the parameters of this structure also have different uses whether you are using this structure in a GetMetricData operation or a PutMetricAlarm operation. These differences are explained in the following parameter list.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/MetricId"
          description: A short name used to tie this object to the results in the response. This name must be unique within a single call to GetMetricData. If you are performing math expressions on this set of data, this name represents that data and can serve as a variable in the mathematical expression. The valid characters are letters, numbers, and underscore. The first character must be a lowercase letter.
        MetricStat:
          $ref: "#/components/schemas/MetricStat"
          description: The metric to be returned, along with statistics, period, and units. Use this parameter only if this object is retrieving a metric and not performing a math expression on returned data. Within one MetricDataQuery object, you must specify either Expression or MetricStat but not both.
        Expression:
          $ref: "#/components/schemas/MetricExpression"
          description: This field can contain either a Metrics Insights query, or a metric math expression to be performed on the returned data. For more information about Metrics Insights queries, see Metrics Insights query components and syntax in the Amazon CloudWatch User Guide. A math expression can use the Id of the other metrics or queries to refer to those metrics, and can also use the Id of other expressions to use the result of those expressions. For more information about metric math expressions, see Metric Math Syntax and Functions in the Amazon CloudWatch User Guide. Within each MetricDataQuery object, you must specify either Expression or MetricStat but not both.
        Label:
          $ref: "#/components/schemas/MetricLabel"
          description: A human-readable label for this metric or expression. This is especially useful if this is an expression, so that you know what the value represents. If the metric or expression is shown in a CloudWatch dashboard widget, the label is shown. If Label is omitted, CloudWatch generates a default. You can put dynamic expressions into a label, so that it is more descriptive. For more information, see Using Dynamic Labels.
        ReturnData:
          $ref: "#/components/schemas/ReturnData"
          description: When used in GetMetricData, this option indicates whether to return the timestamps and raw data values of this metric. If you are performing this call just to do math expressions and do not also need the raw data returned, you can specify false. If you omit this, the default of true is used. When used in PutMetricAlarm, specify true for the one expression result to use as the alarm. For all other metrics and expressions in the same PutMetricAlarm operation, specify ReturnData as False.
        Period:
          $ref: "#/components/schemas/Period"
          description: The granularity, in seconds, of the returned data points. For metrics with regular resolution, a period can be as short as one minute (60 seconds) and must be a multiple of 60. For high-resolution metrics that are collected at intervals of less than one minute, the period can be 1, 5, 10, 20, 30, 60, or any multiple of 60. High-resolution metrics are those metrics stored by a PutMetricData operation that includes a StorageResolution of 1 second.
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: The ID of the account where the metrics are located. If you are performing a GetMetricData operation in a monitoring account, use this to specify which account to retrieve this metric from. If you are performing a PutMetricAlarm operation, use this to specify which account contains the metric that the alarm is watching.
      required:
        - Id
    MetricId:
      type: string
      minLength: 1
      maxLength: 255
    MetricStat:
      description: This structure defines the metric to be returned, along with the statistics, period, and units.
      type: object
      properties:
        Metric:
          $ref: "#/components/schemas/Metric"
          description: The metric to return, including the metric name, namespace, and dimensions.
        Period:
          $ref: "#/components/schemas/Period"
          description: "The granularity, in seconds, of the returned data points. For metrics with regular resolution, a period can be as short as one minute (60 seconds) and must be a multiple of 60. For high-resolution metrics that are collected at intervals of less than one minute, the period can be 1, 5, 10, 20, 30, 60, or any multiple of 60. High-resolution metrics are those metrics stored by a PutMetricData call that includes a StorageResolution of 1 second. If the StartTime parameter specifies a time stamp that is greater than 3 hours ago, you must specify the period as follows or no data points in that time range is returned: Start time between 3 hours and 15 days ago - Use a multiple of 60 seconds (1 minute). Start time between 15 and 63 days ago - Use a multiple of 300 seconds (5 minutes). Start time greater than 63 days ago - Use a multiple of 3600 seconds (1 hour)."
        Stat:
          $ref: "#/components/schemas/Stat"
          description: The statistic to return. It can include any CloudWatch statistic or extended statistic.
        Unit:
          $ref: "#/components/schemas/StandardUnit"
          description: When you are using a Put operation, this defines what unit you want to use when storing the metric. In a Get operation, if you omit Unit then all data that was collected with any unit is returned, along with the corresponding units that were specified when the data was reported to CloudWatch. If you specify a unit, the operation returns only data that was collected with that unit specified. If you specify a unit that does not match the data collected, the results of the operation are null. CloudWatch does not perform unit conversions.
      required:
        - Metric
        - Period
        - Stat
    Metric:
      description: Represents a specific metric.
      type: object
      properties:
        Namespace:
          $ref: "#/components/schemas/Namespace"
          description: The namespace of the metric.
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the metric. This is a required field.
        Dimensions:
          $ref: "#/components/schemas/Dimensions"
          description: The dimensions for the metric.
    Period:
      type: integer
      minimum: 1
    Stat:
      type: string
    StandardUnit:
      type: string
      enum:
        - Seconds
        - Microseconds
        - Milliseconds
        - Bytes
        - Kilobytes
        - Megabytes
        - Gigabytes
        - Terabytes
        - Bits
        - Kilobits
        - Megabits
        - Gigabits
        - Terabits
        - Percent
        - Count
        - Bytes/Second
        - Kilobytes/Second
        - Megabytes/Second
        - Gigabytes/Second
        - Terabytes/Second
        - Bits/Second
        - Kilobits/Second
        - Megabits/Second
        - Gigabits/Second
        - Terabits/Second
        - Count/Second
        - None
    MetricExpression:
      type: string
      minLength: 1
      maxLength: 2048
    MetricLabel:
      type: string
    ReturnData:
      type: boolean
    DeleteAnomalyDetectorOutput:
      type: object
    DashboardNames:
      type: array
      items:
        $ref: "#/components/schemas/DashboardName"
    DashboardName:
      type: string
    DeleteDashboardsOutput:
      type: object
    InsightRuleNames:
      type: array
      items:
        $ref: "#/components/schemas/InsightRuleName"
    InsightRuleName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\x20-\\x7E]+"
    DeleteInsightRulesOutput:
      type: object
      properties:
        Failures:
          $ref: "#/components/schemas/BatchFailures"
          description: An array listing the rules that could not be deleted. You cannot delete built-in rules.
    BatchFailures:
      type: array
      items:
        $ref: "#/components/schemas/PartialFailure"
    PartialFailure:
      description: This array is empty if the API operation was successful for all the rules specified in the request. If the operation could not process one of the rules, the following data is returned for each of those rules.
      type: object
      properties:
        FailureResource:
          $ref: "#/components/schemas/FailureResource"
          description: The specified rule that could not be deleted.
        ExceptionType:
          $ref: "#/components/schemas/ExceptionType"
          description: The type of error.
        FailureCode:
          $ref: "#/components/schemas/FailureCode"
          description: The code of the error.
        FailureDescription:
          $ref: "#/components/schemas/FailureDescription"
          description: A description of the error.
    FailureResource:
      type: string
    ExceptionType:
      type: string
    FailureCode:
      type: string
    FailureDescription:
      type: string
    MetricStreamName:
      type: string
      minLength: 1
      maxLength: 255
    DeleteMetricStreamOutput:
      type: object
    NextToken:
      type: string
    DescribeAlarmContributorsOutput:
      type: object
      properties:
        AlarmContributors:
          $ref: "#/components/schemas/AlarmContributors"
          description: A list of alarm contributors that provide details about the individual time series contributing to the alarm's state.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token that marks the start of the next batch of returned results.
      required:
        - AlarmContributors
    AlarmContributors:
      type: array
      items:
        $ref: "#/components/schemas/AlarmContributor"
    AlarmContributor:
      description: Represents an individual contributor to a multi-timeseries alarm, containing information about a specific time series and its contribution to the alarm's state.
      type: object
      properties:
        ContributorId:
          $ref: "#/components/schemas/ContributorId"
          description: The unique identifier for this alarm contributor.
        ContributorAttributes:
          type: object
          properties: {}
          description: A map of attributes that describe the contributor, such as metric dimensions and other identifying characteristics.
        StateReason:
          $ref: "#/components/schemas/StateReason"
          description: An explanation for the contributor's current state, providing context about why it is in its current condition.
        StateTransitionedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the contributor last transitioned to its current state.
      required:
        - ContributorId
        - ContributorAttributes
        - StateReason
    ContributorId:
      type: string
      minLength: 1
      maxLength: 16
    StateReason:
      type: string
      minLength: 0
      maxLength: 1023
    Timestamp:
      type: string
      format: date-time
    AlarmTypes:
      type: array
      items:
        $ref: "#/components/schemas/AlarmType"
    AlarmType:
      type: string
      enum:
        - CompositeAlarm
        - MetricAlarm
    HistoryItemType:
      type: string
      enum:
        - ConfigurationUpdate
        - StateUpdate
        - Action
        - AlarmContributorStateUpdate
        - AlarmContributorAction
    MaxRecords:
      type: integer
      minimum: 1
      maximum: 100
    ScanBy:
      type: string
      enum:
        - TimestampDescending
        - TimestampAscending
    DescribeAlarmHistoryOutput:
      type: object
      properties:
        AlarmHistoryItems:
          $ref: "#/components/schemas/AlarmHistoryItems"
          description: The alarm histories, in JSON format.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token that marks the start of the next batch of returned results.
    AlarmHistoryItems:
      type: array
      items:
        $ref: "#/components/schemas/AlarmHistoryItem"
    AlarmHistoryItem:
      description: Represents the history of a specific alarm.
      type: object
      properties:
        AlarmName:
          $ref: "#/components/schemas/AlarmName"
          description: The descriptive name for the alarm.
        AlarmContributorId:
          $ref: "#/components/schemas/ContributorId"
          description: The unique identifier of the alarm contributor associated with this history item, if applicable.
        AlarmType:
          $ref: "#/components/schemas/AlarmType"
          description: The type of alarm, either metric alarm or composite alarm.
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time stamp for the alarm history item.
        HistoryItemType:
          $ref: "#/components/schemas/HistoryItemType"
          description: The type of alarm history item.
        HistorySummary:
          $ref: "#/components/schemas/HistorySummary"
          description: A summary of the alarm history, in text format.
        HistoryData:
          $ref: "#/components/schemas/HistoryData"
          description: Data about the alarm, in JSON format.
        AlarmContributorAttributes:
          type: object
          properties: {}
          description: A map of attributes that describe the alarm contributor associated with this history item, providing context about the contributor's characteristics at the time of the event.
    HistorySummary:
      type: string
      minLength: 1
      maxLength: 255
    HistoryData:
      type: string
      minLength: 1
      maxLength: 4095
    AlarmNamePrefix:
      type: string
      minLength: 1
      maxLength: 255
    StateValue:
      type: string
      enum:
        - OK
        - ALARM
        - INSUFFICIENT_DATA
    ActionPrefix:
      type: string
      minLength: 1
      maxLength: 1024
    DescribeAlarmsOutput:
      type: object
      properties:
        CompositeAlarms:
          $ref: "#/components/schemas/CompositeAlarms"
          description: The information about any composite alarms returned by the operation.
        MetricAlarms:
          $ref: "#/components/schemas/MetricAlarms"
          description: The information about any metric alarms returned by the operation.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token that marks the start of the next batch of returned results.
    CompositeAlarms:
      type: array
      items:
        $ref: "#/components/schemas/CompositeAlarm"
    CompositeAlarm:
      description: The details about a composite alarm.
      type: object
      properties:
        ActionsEnabled:
          $ref: "#/components/schemas/ActionsEnabled"
          description: Indicates whether actions should be executed during any changes to the alarm state.
        AlarmActions:
          $ref: "#/components/schemas/ResourceList"
          description: The actions to execute when this alarm transitions to the ALARM state from any other state. Each action is specified as an Amazon Resource Name (ARN).
        AlarmArn:
          $ref: "#/components/schemas/AlarmArn"
          description: The Amazon Resource Name (ARN) of the alarm.
        AlarmConfigurationUpdatedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time stamp of the last update to the alarm configuration.
        AlarmDescription:
          $ref: "#/components/schemas/AlarmDescription"
          description: The description of the alarm.
        AlarmName:
          $ref: "#/components/schemas/AlarmName"
          description: The name of the alarm.
        AlarmRule:
          $ref: "#/components/schemas/AlarmRule"
          description: The rule that this alarm uses to evaluate its alarm state.
        InsufficientDataActions:
          $ref: "#/components/schemas/ResourceList"
          description: The actions to execute when this alarm transitions to the INSUFFICIENT_DATA state from any other state. Each action is specified as an Amazon Resource Name (ARN).
        OKActions:
          $ref: "#/components/schemas/ResourceList"
          description: The actions to execute when this alarm transitions to the OK state from any other state. Each action is specified as an Amazon Resource Name (ARN).
        StateReason:
          $ref: "#/components/schemas/StateReason"
          description: An explanation for the alarm state, in text format.
        StateReasonData:
          $ref: "#/components/schemas/StateReasonData"
          description: An explanation for the alarm state, in JSON format.
        StateUpdatedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: Tracks the timestamp of any state update, even if StateValue doesn't change.
        StateValue:
          $ref: "#/components/schemas/StateValue"
          description: The state value for the alarm.
        StateTransitionedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of the last change to the alarm's StateValue.
        ActionsSuppressedBy:
          $ref: "#/components/schemas/ActionsSuppressedBy"
          description: When the value is ALARM, it means that the actions are suppressed because the suppressor alarm is in ALARM When the value is WaitPeriod, it means that the actions are suppressed because the composite alarm is waiting for the suppressor alarm to go into into the ALARM state. The maximum waiting time is as specified in ActionsSuppressorWaitPeriod. After this time, the composite alarm performs its actions. When the value is ExtensionPeriod, it means that the actions are suppressed because the composite alarm is waiting after the suppressor alarm went out of the ALARM state. The maximum waiting time is as specified in ActionsSuppressorExtensionPeriod. After this time, the composite alarm performs its actions.
        ActionsSuppressedReason:
          $ref: "#/components/schemas/ActionsSuppressedReason"
          description: Captures the reason for action suppression.
        ActionsSuppressor:
          $ref: "#/components/schemas/AlarmArn"
          description: Actions will be suppressed if the suppressor alarm is in the ALARM state. ActionsSuppressor can be an AlarmName or an Amazon Resource Name (ARN) from an existing alarm.
        ActionsSuppressorWaitPeriod:
          $ref: "#/components/schemas/SuppressorPeriod"
          description: The maximum time in seconds that the composite alarm waits for the suppressor alarm to go into the ALARM state. After this time, the composite alarm performs its actions. WaitPeriod is required only when ActionsSuppressor is specified.
        ActionsSuppressorExtensionPeriod:
          $ref: "#/components/schemas/SuppressorPeriod"
          description: The maximum time in seconds that the composite alarm waits after suppressor alarm goes out of the ALARM state. After this time, the composite alarm performs its actions. ExtensionPeriod is required only when ActionsSuppressor is specified.
    ActionsEnabled:
      type: boolean
