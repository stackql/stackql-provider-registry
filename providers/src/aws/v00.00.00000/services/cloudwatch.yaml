      minimum: 1
      maximum: 500
    DescribeInsightRulesOutput:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: If this parameter is present, it is a token that marks the start of the next batch of returned results.
