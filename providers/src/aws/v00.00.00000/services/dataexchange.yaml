openapi: 3.0.0
info:
  version: "2017-07-25"
  title: AWS Data Exchange
  description: AWS Data Exchange
  x-serviceName: dataexchange
  x-serviceAlias: dataexchange
  x-protocol: rest-json
  x-apiVersion: "2017-07-25"
  x-endpointPrefix: dataexchange
servers:
  - url: https://dataexchange.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for dataexchange
paths:
  /v1/data-grants/{data_grant_arn}/accept:
    post:
      operationId: AcceptDataGrant
      description: This operation accepts a data grant.
      parameters:
        - name: data_grant_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataGrantArn"
          description: The Amazon Resource Name (ARN) of the data grant to accept.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptDataGrantResponse"
  /v1/jobs/{job_id}:
    delete:
      operationId: CancelJob
      description: This operation cancels a job. Jobs can be cancelled only when they are in the WAITING state.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a job.
      responses:
        "204":
          description: Success
    get:
      operationId: GetJob
      description: This operation returns information about a job.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a job.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetJobResponse"
    patch:
      operationId: StartJob
      description: This operation starts a job.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a job.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartJobResponse"
  /v1/data-grants:
    post:
      operationId: CreateDataGrant
      description: This operation creates a data grant.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/DataGrantName"
                GrantDistributionScope:
                  $ref: "#/components/schemas/GrantDistributionScope"
                ReceiverPrincipal:
                  $ref: "#/components/schemas/ReceiverPrincipal"
                SourceDataSetId:
                  $ref: "#/components/schemas/Id"
                EndsAt:
                  $ref: "#/components/schemas/Timestamp"
                Description:
                  $ref: "#/components/schemas/Description"
                Tags:
                  $ref: "#/components/schemas/MapOf__string"
              required:
                - GrantDistributionScope
                - ReceiverPrincipal
                - SourceDataSetId
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataGrantResponse"
    get:
      operationId: ListDataGrants
      description: This operation returns information about all data grants.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to be included in the next page.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The pagination token used to retrieve the next page of results for this operation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataGrantsResponse"
  /v1/data-sets:
    post:
      operationId: CreateDataSet
      description: This operation creates a data set.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AssetType:
                  $ref: "#/components/schemas/AssetType"
                Description:
                  $ref: "#/components/schemas/Description"
                Name:
                  $ref: "#/components/schemas/Name"
                Tags:
                  $ref: "#/components/schemas/MapOf__string"
              required:
                - AssetType
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataSetResponse"
    get:
      operationId: ListDataSets
      description: This operation lists your data sets. When listing by origin OWNED, results are sorted by CreatedAt in descending order. When listing by origin ENTITLED, there is no order.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results returned by a single call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token value retrieved from a previous call to access the next page of results.
        - name: origin
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A property that defines the data set as OWNED by the account (for providers) or ENTITLED to the account (for subscribers).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataSetsResponse"
  /v1/event-actions:
    post:
      operationId: CreateEventAction
      description: This operation creates an event action.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Action:
                  $ref: "#/components/schemas/Action"
                Event:
                  $ref: "#/components/schemas/Event"
                Tags:
                  $ref: "#/components/schemas/MapOf__string"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventActionResponse"
    get:
      operationId: ListEventActions
      description: This operation lists your event actions.
      parameters:
        - name: eventSourceId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for the event source.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results returned by a single call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token value retrieved from a previous call to access the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventActionsResponse"
  /v1/jobs:
    post:
      operationId: CreateJob
      description: This operation creates a job.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AssetConfiguration:
                  $ref: "#/components/schemas/AssetConfiguration"
                Details:
                  $ref: "#/components/schemas/RequestDetails"
                Type:
                  $ref: "#/components/schemas/Type"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateJobResponse"
    get:
      operationId: ListJobs
      description: This operation lists your jobs sorted by CreatedAt in descending order.
      parameters:
        - name: dataSetId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for a data set.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results returned by a single call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token value retrieved from a previous call to access the next page of results.
        - name: revisionId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for a revision.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListJobsResponse"
  /v1/data-sets/{data_set_id}/revisions:
    post:
      operationId: CreateRevision
      description: This operation creates a revision for a data set.
      parameters:
        - name: data_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a data set.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Comment:
                  $ref: "#/components/schemas/__stringMin0Max16384"
                Tags:
                  $ref: "#/components/schemas/MapOf__string"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRevisionResponse"
    get:
      operationId: ListDataSetRevisions
      description: This operation lists a data set's revisions sorted by CreatedAt in descending order.
      parameters:
        - name: data_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a data set.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results returned by a single call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token value retrieved from a previous call to access the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataSetRevisionsResponse"
  /v1/data-sets/{data_set_id}/revisions/{revision_id}/assets/{asset_id}:
    delete:
      operationId: DeleteAsset
      description: This operation deletes an asset.
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for an asset.
        - name: data_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a data set.
        - name: revision_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a revision.
      responses:
        "204":
          description: Success
    get:
      operationId: GetAsset
      description: This operation returns information about an asset.
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for an asset.
        - name: data_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a data set.
        - name: revision_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a revision.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssetResponse"
    patch:
      operationId: UpdateAsset
      description: This operation updates an asset.
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for an asset.
        - name: data_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a data set.
        - name: revision_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a revision.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/AssetName"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAssetResponse"
  /v1/data-grants/{data_grant_id}:
    delete:
      operationId: DeleteDataGrant
      description: This operation deletes a data grant.
      parameters:
        - name: data_grant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataGrantId"
          description: The ID of the data grant to delete.
      responses:
        "204":
          description: Success
    get:
      operationId: GetDataGrant
      description: This operation returns information about a data grant.
      parameters:
        - name: data_grant_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataGrantId"
          description: The ID of the data grant.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataGrantResponse"
  /v1/data-sets/{data_set_id}:
    delete:
      operationId: DeleteDataSet
      description: This operation deletes a data set.
      parameters:
        - name: data_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a data set.
      responses:
        "204":
          description: Success
    get:
      operationId: GetDataSet
      description: This operation returns information about a data set.
      parameters:
        - name: data_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a data set.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataSetResponse"
    patch:
      operationId: UpdateDataSet
      description: This operation updates a data set.
      parameters:
        - name: data_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a data set.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/Description"
                Name:
                  $ref: "#/components/schemas/Name"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDataSetResponse"
  /v1/event-actions/{event_action_id}:
    delete:
      operationId: DeleteEventAction
      description: This operation deletes the event action.
      parameters:
        - name: event_action_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for the event action.
      responses:
        "204":
          description: Success
    get:
      operationId: GetEventAction
      description: This operation retrieves information about an event action.
      parameters:
        - name: event_action_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for the event action.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEventActionResponse"
    patch:
      operationId: UpdateEventAction
      description: This operation updates the event action.
      parameters:
        - name: event_action_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for the event action.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Action:
                  $ref: "#/components/schemas/Action"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEventActionResponse"
  /v1/data-sets/{data_set_id}/revisions/{revision_id}:
    delete:
      operationId: DeleteRevision
      description: This operation deletes a revision.
      parameters:
        - name: data_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a data set.
        - name: revision_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a revision.
      responses:
        "204":
          description: Success
    get:
      operationId: GetRevision
      description: This operation returns information about a revision.
      parameters:
        - name: data_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a data set.
        - name: revision_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a revision.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRevisionResponse"
    patch:
      operationId: UpdateRevision
      description: This operation updates a revision.
      parameters:
        - name: data_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a data set.
        - name: revision_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a revision.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Comment:
                  $ref: "#/components/schemas/__stringMin0Max16384"
                Finalized:
                  $ref: "#/components/schemas/__boolean"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRevisionResponse"
  /v1/received-data-grants/{data_grant_arn}:
    get:
      operationId: GetReceivedDataGrant
      description: This operation returns information about a received data grant.
      parameters:
        - name: data_grant_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataGrantArn"
          description: The Amazon Resource Name (ARN) of the data grant.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetReceivedDataGrantResponse"
  /v1/received-data-grants:
    get:
      operationId: ListReceivedDataGrants
      description: This operation returns information about all received data grants.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to be included in the next page.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The pagination token used to retrieve the next page of results for this operation.
        - name: acceptanceState
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AcceptanceStateFilterValues"
          description: The acceptance state of the data grants to list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReceivedDataGrantsResponse"
  /v1/data-sets/{data_set_id}/revisions/{revision_id}/assets:
    get:
      operationId: ListRevisionAssets
      description: This operation lists a revision's assets sorted alphabetically in descending order.
      parameters:
        - name: data_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a data set.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results returned by a single call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token value retrieved from a previous call to access the next page of results.
        - name: revision_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a revision.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRevisionAssetsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: This operation lists the tags on the resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: An Amazon Resource Name (ARN) that uniquely identifies an AWS resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: This operation tags a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: An Amazon Resource Name (ARN) that uniquely identifies an AWS resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/MapOf__string"
      responses:
        "204":
          description: Success
    delete:
      operationId: UntagResource
      description: This operation removes one or more tags from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: An Amazon Resource Name (ARN) that uniquely identifies an AWS resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ListOf__string"
          description: The key tags.
      responses:
        "204":
          description: Success
  /v1/data-sets/{data_set_id}/revisions/{revision_id}/revoke:
    post:
      operationId: RevokeRevision
      description: This operation revokes subscribers' access to a revision.
      parameters:
        - name: data_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a data set.
        - name: revision_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier for a revision.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RevocationComment:
                  $ref: "#/components/schemas/__stringMin10Max512"
              required:
                - RevocationComment
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeRevisionResponse"
  /v1:
    post:
      operationId: SendApiAsset
      description: This operation invokes an API Gateway API asset. The request is proxied to the provider’s API Gateway API.
      parameters:
        - name: QueryStringParameters
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MapOf__string"
          description: Attach query string parameters to the end of the URI (for example, /v1/examplePath?exampleParam=exampleValue).
        - name: x-amzn-dataexchange-asset-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: Asset ID value for the API request.
        - name: x-amzn-dataexchange-data-set-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: Data set ID value for the API request.
        - name: x-amzn-dataexchange-header-
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/MapOf__string"
          description: Any header value prefixed with x-amzn-dataexchange-header- will have that stripped before sending the Asset API request. Use this when you want to override a header that AWS Data Exchange uses. Alternatively, you can use the header without a prefix to the HTTP request.
        - name: x-amzn-dataexchange-http-method
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: HTTP method value for the API request. Alternatively, you can use the appropriate verb in your request.
        - name: x-amzn-dataexchange-path
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: URI path value for the API request. Alternatively, you can set the URI path directly by invoking /v1/{pathValue}.
        - name: x-amzn-dataexchange-revision-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: Revision ID value for the API request.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Body:
                  $ref: "#/components/schemas/__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendApiAssetResponse"
  /v1/data-sets/{data_set_id}/notification:
    post:
      operationId: SendDataSetNotification
      description: The type of event associated with the data set.
      parameters:
        - name: data_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: Affected data set of the notification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Scope:
                  $ref: "#/components/schemas/ScopeDetails"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Comment:
                  $ref: "#/components/schemas/__stringMin0Max4096"
                Details:
                  $ref: "#/components/schemas/NotificationDetails"
                Type:
                  $ref: "#/components/schemas/NotificationType"
              required:
                - Type
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendDataSetNotificationResponse"
