  /?Action=DescribeEvents&Version=2010-05-15:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_DescribeEvents
      description: "Returns CloudFormation events based on flexible query criteria. Groups events by operation ID, enabling you to focus on individual stack operations during deployment. An operation is any action performed on a stack, including stack lifecycle actions (Create, Update, Delete, Rollback), change set creation, nested stack creation, and automatic rollbacks triggered by failures. Each operation has a unique identifier (Operation ID) and represents a discrete change attempt on the stack. Returns different types of events including: Progress events - Status updates during stack operation execution. Validation errors - Failures from CloudFormation Early Validations. Provisioning errors - Resource creation and update failures. Hook invocation errors - Failures from CloudFormation Hook during stack operations. One of ChangeSetName, OperationId or StackName must be specified as input."
      parameters:
        - name: StackName
          in: query
          required: false
          description: The name or unique stack ID for which you want to retrieve events.
          schema:
            $ref: "#/components/schemas/StackNameOrId"
        - name: ChangeSetName
          in: query
          required: false
          description: The name or Amazon Resource Name (ARN) of the change set for which you want to retrieve events.
          schema:
            $ref: "#/components/schemas/ChangeSetNameOrId"
        - name: OperationId
          in: query
          required: false
          description: The unique identifier of the operation for which you want to retrieve events.
          schema:
            $ref: "#/components/schemas/OperationId"
        - name: Filters
          in: query
          required: false
          description: Filters to apply when retrieving events.
          schema:
            $ref: "#/components/schemas/EventFilter"
        - name: NextToken
          in: query
          required: false
          description: The token for the next set of items to return. (You received this token from a previous call.)
          schema:
            $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/DescribeEventsOutputDisplay"
    post:
      operationId: POST_DescribeEvents
      description: "Returns CloudFormation events based on flexible query criteria. Groups events by operation ID, enabling you to focus on individual stack operations during deployment. An operation is any action performed on a stack, including stack lifecycle actions (Create, Update, Delete, Rollback), change set creation, nested stack creation, and automatic rollbacks triggered by failures. Each operation has a unique identifier (Operation ID) and represents a discrete change attempt on the stack. Returns different types of events including: Progress events - Status updates during stack operation execution. Validation errors - Failures from CloudFormation Early Validations. Provisioning errors - Resource creation and update failures. Hook invocation errors - Failures from CloudFormation Hook during stack operations. One of ChangeSetName, OperationId or StackName must be specified as input."
      responses:
        "200":
          description: Success
          content:
            text/xml:
