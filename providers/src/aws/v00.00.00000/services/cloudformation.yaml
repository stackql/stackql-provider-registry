    get:
      operationId: GET_ListHookResults
      description: "Returns summaries of invoked Hooks. For more information, see View invocation summaries for CloudFormation Hooks in the CloudFormation Hooks User Guide. This operation supports the following parameter combinations: No parameters: Returns all Hook invocation summaries. TypeArn only: Returns summaries for a specific Hook. TypeArn and Status: Returns summaries for a specific Hook filtered by status. TargetId and TargetType: Returns summaries for a specific Hook invocation target."
      parameters:
        - name: TargetType
          in: query
          required: false
          description: Filters results by target type. Currently, only CHANGE_SET and CLOUD_CONTROL are supported filter options. Required when TargetId is specified and cannot be used otherwise.
          schema:
            $ref: "#/components/schemas/ListHookResultsTargetType"
        - name: TargetId
          in: query
          required: false
          description: Filters results by the unique identifier of the target the Hook was invoked against. For change sets, this is the change set ARN. When the target is a Cloud Control API operation, this value must be the HookRequestToken returned by the Cloud Control API request. For more information on the HookRequestToken, see ProgressEvent. Required when TargetType is specified and cannot be used otherwise.
          schema:
            $ref: "#/components/schemas/HookResultId"
        - name: TypeArn
          in: query
          required: false
          description: Filters results by the ARN of the Hook. Can be used alone or in combination with Status.
          schema:
            $ref: "#/components/schemas/HookTypeArn"
        - name: Status
          in: query
          required: false
          description: "Filters results by the status of Hook invocations. Can only be used in combination with TypeArn. Valid values are: HOOK_IN_PROGRESS: The Hook is currently running. HOOK_COMPLETE_SUCCEEDED: The Hook completed successfully. HOOK_COMPLETE_FAILED: The Hook completed but failed validation. HOOK_FAILED: The Hook encountered an error during execution."
          schema:
            $ref: "#/components/schemas/HookStatus"
        - name: NextToken
          in: query
          required: false
          description: The token for the next set of items to return. (You received this token from a previous call.)
          schema:
            $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ListHookResultsOutputDisplay"
    post:
      operationId: POST_ListHookResults
      description: "Returns summaries of invoked Hooks. For more information, see View invocation summaries for CloudFormation Hooks in the CloudFormation Hooks User Guide. This operation supports the following parameter combinations: No parameters: Returns all Hook invocation summaries. TypeArn only: Returns summaries for a specific Hook. TypeArn and Status: Returns summaries for a specific Hook filtered by status. TargetId and TargetType: Returns summaries for a specific Hook invocation target."
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ListHookResultsOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/ListHookResultsInput"
