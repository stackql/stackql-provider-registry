        PublisherIdentity:
          type: string
          description: The service used to verify the publisher identity. For more information, see Publishing extensions to make them available for public use in the CloudFormation Command Line Interface (CLI) User Guide.
        PublisherName:
          type: string
          description: The publisher name, as defined in the public profile for that publisher in the service used to verify the publisher identity.
        IsActivated:
          type: boolean
          description: Whether the extension is activated for this account and Region. This applies only to third-party public extensions. Extensions published by Amazon are activated by default.
