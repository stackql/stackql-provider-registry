      parameters:
        - name: Arn
          in: query
          required: false
          description: "The Amazon Resource Name (ARN) of the extension. Conditional: You must specify Arn, or TypeName and Type."
          schema:
            $ref: "#/components/schemas/TypeArn"
        - name: Type
          in: query
          required: false
          description: "The type of the extension to test. Conditional: You must specify Arn, or TypeName and Type."
