        StackInstanceStatus:
          type: string
          description: The detailed status of the stack instance.
        StatusReason:
          type: string
          description: The explanation for the specific status code that's assigned to this stack instance.
        OrganizationalUnitId:
          type: string
          description: "[Service-managed permissions] The organization root ID or organizational unit (OU) IDs that you specified for DeploymentTargets."
        DriftStatus:
          type: string
          description: "Status of the stack instance's actual configuration compared to the expected template and parameter configuration of the StackSet it belongs to. DRIFTED: The stack differs from the expected template and parameter configuration of the StackSet it belongs to. A stack instance is considered to have drifted if one or more of the resources in the associated stack have drifted. NOT_CHECKED: CloudFormation hasn't checked if the stack instance differs from its expected StackSet configuration. IN_SYNC: The stack instance's actual configuration matches its expected StackSset configuration. UNKNOWN: This value is reserved for future use."
        LastDriftCheckTimestamp:
          type: string
          description: Most recent time when CloudFormation performed a drift detection operation on the stack instance. This value will be NULL for any stack instance that drift detection hasn't yet been performed on.
        LastOperationId:
          type: string
          description: The last unique ID of a StackSet operation performed on a stack instance.
