  /?Action=ValidateTemplate&Version=2010-05-15:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_ValidateTemplate
      description: Validates a specified template. CloudFormation first checks if the template is valid JSON. If it isn't, CloudFormation checks if the template is valid YAML. If both these checks fail, CloudFormation returns a template validation error.
      parameters:
        - name: TemplateBody
          in: query
          required: false
          description: "Structure that contains the template body with a minimum length of 1 byte and a maximum length of 51,200 bytes. Conditional: You must pass TemplateURL or TemplateBody. If both are passed, only TemplateBody is used."
          schema:
            $ref: "#/components/schemas/TemplateBody"
        - name: TemplateURL
          in: query
          required: false
          description: "The URL of a file that contains the template body. The URL must point to a template (max size: 1 MB) that is located in an Amazon S3 bucket or a Systems Manager document. The location for an Amazon S3 bucket must start with https://. Conditional: You must pass TemplateURL or TemplateBody. If both are passed, only TemplateBody is used."
          schema:
            $ref: "#/components/schemas/TemplateURL"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ValidateTemplateOutputDisplay"
    post:
      operationId: POST_ValidateTemplate
      description: Validates a specified template. CloudFormation first checks if the template is valid JSON. If it isn't, CloudFormation checks if the template is valid YAML. If both these checks fail, CloudFormation returns a template validation error.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ValidateTemplateOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/ValidateTemplateInput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ActivateOrganizationsAccessOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ActivateOrganizationsAccessOutputDisplay"
    ActivateOrganizationsAccessInput:
      type: object
    ThirdPartyType:
      type: string
      enum:
        - RESOURCE
        - MODULE
        - HOOK
    ThirdPartyTypeArn:
      type: string
      maxLength: 1024
      pattern: arn:aws[A-Za-z0-9-]{0,64}:cloudformation:[A-Za-z0-9-]{1,64}::type/.+/[0-9a-zA-Z]{12,40}/.+
    PublisherId:
      type: string
      minLength: 1
      maxLength: 40
      pattern: "[0-9a-zA-Z]{12,40}"
    TypeName:
      type: string
      minLength: 10
      maxLength: 204
      pattern: "[A-Za-z0-9]{2,64}::[A-Za-z0-9]{2,64}::[A-Za-z0-9]{2,64}(::MODULE){0,1}"
    AutoUpdate:
      type: boolean
    LoggingConfig:
      description: Contains logging configuration information for an extension.
      type: object
      properties:
        LogRoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the role that CloudFormation should assume when sending log entries to CloudWatch Logs.
        LogGroupName:
          $ref: "#/components/schemas/LogGroupName"
          description: The Amazon CloudWatch Logs group to which CloudFormation sends error logging information when invoking the extension's handlers.
      required:
        - LogRoleArn
        - LogGroupName
    RoleArn:
      type: string
      minLength: 1
      maxLength: 256
      pattern: arn:.+:iam::[0-9]{12}:role/.+
    LogGroupName:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[\\.\\-_/#A-Za-z0-9]+"
    VersionBump:
      type: string
      enum:
        - MAJOR
        - MINOR
    MajorVersion:
      type: integer
      format: int64
      minimum: 1
      maximum: 100000
    ActivateTypeOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ActivateTypeOutputDisplay"
    ActivateTypeInput:
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/ThirdPartyType"
          description: "The extension type. Conditional: You must specify PublicTypeArn, or TypeName, Type, and PublisherId."
        PublicTypeArn:
          $ref: "#/components/schemas/ThirdPartyTypeArn"
          description: "The Amazon Resource Name (ARN) of the public extension. Conditional: You must specify PublicTypeArn, or TypeName, Type, and PublisherId."
        PublisherId:
          $ref: "#/components/schemas/PublisherId"
          description: "The ID of the extension publisher. Conditional: You must specify PublicTypeArn, or TypeName, Type, and PublisherId."
        TypeName:
          $ref: "#/components/schemas/TypeName"
          description: "The name of the extension. Conditional: You must specify PublicTypeArn, or TypeName, Type, and PublisherId."
        TypeNameAlias:
          $ref: "#/components/schemas/TypeName"
          description: An alias to assign to the public extension in this account and Region. If you specify an alias for the extension, CloudFormation treats the alias as the extension type name within this account and Region. You must use the alias to refer to the extension in your templates, API calls, and CloudFormation console. An extension alias must be unique within a given account and Region. You can activate the same public resource multiple times in the same account and Region, using different type name aliases.
        AutoUpdate:
          $ref: "#/components/schemas/AutoUpdate"
          description: Whether to automatically update the extension in this account and Region when a new minor version is published by the extension publisher. Major versions released by the publisher must be manually updated. The default is true.
        LoggingConfig:
          $ref: "#/components/schemas/LoggingConfig"
          description: Contains logging configuration information for an extension.
        ExecutionRoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The name of the IAM execution role to use to activate the extension.
        VersionBump:
          $ref: "#/components/schemas/VersionBump"
          description: "Manually updates a previously-activated type to a new major or minor version, if available. You can also use this parameter to update the value of AutoUpdate. MAJOR: CloudFormation updates the extension to the newest major version, if one is available. MINOR: CloudFormation updates the extension to the newest minor version, if one is available."
        MajorVersion:
          $ref: "#/components/schemas/MajorVersion"
          description: The major version of this extension you want to activate, if multiple major versions are available. The default is the latest major version. CloudFormation uses the latest available minor version of the major version selected. You can specify MajorVersion or VersionBump, but not both.
    TypeConfigurationIdentifiers:
      type: array
      items:
        $ref: "#/components/schemas/TypeConfigurationIdentifier"
    TypeConfigurationIdentifier:
      description: Identifying information for the configuration of a CloudFormation extension.
      type: object
      properties:
        TypeArn:
          $ref: "#/components/schemas/TypeArn"
          description: The ARN for the extension, in this account and Region. For public extensions, this will be the ARN assigned when you call the ActivateType API operation in this account and Region. For private extensions, this will be the ARN assigned when you call the RegisterType API operation in this account and Region.
        TypeConfigurationAlias:
          $ref: "#/components/schemas/TypeConfigurationAlias"
          description: The alias specified for this configuration, if one was specified when the configuration was set.
        TypeConfigurationArn:
          $ref: "#/components/schemas/TypeConfigurationArn"
          description: The ARN for the configuration, in this account and Region.
        Type:
          $ref: "#/components/schemas/ThirdPartyType"
          description: The type of extension.
        TypeName:
          $ref: "#/components/schemas/TypeName"
          description: The name of the extension type to which this configuration applies.
    TypeArn:
      type: string
      maxLength: 1024
      pattern: arn:aws[A-Za-z0-9-]{0,64}:cloudformation:[A-Za-z0-9-]{1,64}:([0-9]{12})?:type/.+
    TypeConfigurationAlias:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^[a-zA-Z0-9]{1,256}$
    TypeConfigurationArn:
      type: string
      maxLength: 1024
      pattern: arn:aws[A-Za-z0-9-]{0,64}:cloudformation:[A-Za-z0-9-]{1,64}:([0-9]{12})?:type-configuration/.+
    BatchDescribeTypeConfigurationsOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/BatchDescribeTypeConfigurationsOutputDisplay"
    BatchDescribeTypeConfigurationsInput:
      type: object
      properties:
        TypeConfigurationIdentifiers:
          $ref: "#/components/schemas/TypeConfigurationIdentifiers"
          description: The list of identifiers for the desired extension configurations.
      required:
        - TypeConfigurationIdentifiers
    StackName:
      type: string
    ClientRequestToken:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9][-a-zA-Z0-9]*"
    CancelUpdateStackInput:
      description: The input for the CancelUpdateStack action.
      type: object
      properties:
        StackName:
          $ref: "#/components/schemas/StackName"
          description: "If you don't pass a parameter to StackName, the API returns a response that describes all resources in the account. The IAM policy below can be added to IAM policies when you want to limit resource-level permissions and avoid returning a response when no parameter is sent in the request: { \"Version\": \"2012-10-17\", \"Statement\": [{ \"Effect\": \"Deny\", \"Action\": \"cloudformation:DescribeStacks\", \"NotResource\": \"arn:aws:cloudformation:*:*:stack/*/*\" }] } The name or the unique stack ID that's associated with the stack."
        ClientRequestToken:
          $ref: "#/components/schemas/ClientRequestToken"
          description: A unique identifier for this CancelUpdateStack request. Specify this token if you plan to retry requests so that CloudFormation knows that you're not attempting to cancel an update on a stack with the same name. You might retry CancelUpdateStack requests to ensure that CloudFormation successfully received them.
      required:
        - StackName
    StackNameOrId:
      type: string
      minLength: 1
      pattern: ([a-zA-Z][-a-zA-Z0-9]*)|(arn:\b(aws|aws-us-gov|aws-cn)\b:[-a-zA-Z0-9:/._+]*)
    RoleARN:
      type: string
      minLength: 20
      maxLength: 2048
    ResourcesToSkip:
      type: array
      items:
        $ref: "#/components/schemas/ResourceToSkip"
    ResourceToSkip:
      type: string
      pattern: "[a-zA-Z0-9]+|[a-zA-Z][-a-zA-Z0-9]*\\.[a-zA-Z0-9]+"
    ContinueUpdateRollbackOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ContinueUpdateRollbackOutputDisplay"
    ContinueUpdateRollbackInput:
      description: The input for the ContinueUpdateRollback action.
      type: object
      properties:
        StackName:
          $ref: "#/components/schemas/StackNameOrId"
          description: The name or the unique ID of the stack that you want to continue rolling back. Don't specify the name of a nested stack (a stack that was created by using the AWS::CloudFormation::Stack resource). Instead, use this operation on the parent stack (the stack that contains the AWS::CloudFormation::Stack resource).
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The Amazon Resource Name (ARN) of an IAM role that CloudFormation assumes to roll back the stack. CloudFormation uses the role's credentials to make calls on your behalf. CloudFormation always uses this role for all future operations on the stack. Provided that users have permission to operate on the stack, CloudFormation uses this role even if the users don't have permission to pass it. Ensure that the role grants least permission. If you don't specify a value, CloudFormation uses the role that was previously associated with the stack. If no role is available, CloudFormation uses a temporary session that's generated from your user credentials.
        ResourcesToSkip:
          $ref: "#/components/schemas/ResourcesToSkip"
          description: "A list of the logical IDs of the resources that CloudFormation skips during the continue update rollback operation. You can specify only resources that are in the UPDATE_FAILED state because a rollback failed. You can't specify resources that are in the UPDATE_FAILED state for other reasons, for example, because an update was canceled. To check why a resource update failed, use the DescribeStackResources action, and view the resource status reason. Specify this property to skip rolling back resources that CloudFormation can't successfully roll back. We recommend that you troubleshoot resources before skipping them. CloudFormation sets the status of the specified resources to UPDATE_COMPLETE and continues to roll back the stack. After the rollback is complete, the state of the skipped resources will be inconsistent with the state of the resources in the stack template. Before performing another stack update, you must update the stack or resources to be consistent with each other. If you don't, subsequent stack updates might fail, and the stack will become unrecoverable. Specify the minimum number of resources required to successfully roll back your stack. For example, a failed resource update might cause dependent resources to fail. In this case, it might not be necessary to skip the dependent resources. To skip resources that are part of nested stacks, use the following format: NestedStackName.ResourceLogicalID. If you want to specify the logical ID of a stack resource (Type: AWS::CloudFormation::Stack) in the ResourcesToSkip list, then its corresponding embedded stack must be in one of the following states: DELETE_IN_PROGRESS, DELETE_COMPLETE, or DELETE_FAILED. Don't confuse a child stack's name with its corresponding logical ID defined in the parent stack. For an example of a continue update rollback operation with nested stacks, see Continue rolling back from failed nested stack updates."
        ClientRequestToken:
          $ref: "#/components/schemas/ClientRequestToken"
          description: A unique identifier for this ContinueUpdateRollback request. Specify this token if you plan to retry requests so that CloudFormation knows that you're not attempting to continue the rollback to a stack with the same name. You might retry ContinueUpdateRollback requests to ensure that CloudFormation successfully received them.
      required:
        - StackName
    TemplateBody:
      type: string
      minLength: 1
    TemplateURL:
      type: string
      minLength: 1
      maxLength: 5120
    UsePreviousTemplate:
      type: boolean
    Parameters:
      type: array
      items:
        $ref: "#/components/schemas/Parameter"
    Parameter:
      description: The Parameter data type.
      type: object
      properties:
        ParameterKey:
          $ref: "#/components/schemas/ParameterKey"
          description: The key associated with the parameter. If you don't specify a key and value for a particular parameter, CloudFormation uses the default value that's specified in your template.
        ParameterValue:
          $ref: "#/components/schemas/ParameterValue"
          description: The input value associated with the parameter.
        UsePreviousValue:
          $ref: "#/components/schemas/UsePreviousValue"
          description: During a stack update, use the existing parameter value that the stack is using for a given parameter key. If you specify true, do not specify a parameter value.
        ResolvedValue:
          $ref: "#/components/schemas/ParameterValue"
          description: Read-only. The value that corresponds to a Systems Manager parameter key. This field is returned only for Systems Manager parameter types in the template. For more information, see Specify existing resources at runtime with CloudFormation-supplied parameter types in the CloudFormation User Guide.
    ParameterKey:
      type: string
    ParameterValue:
      type: string
    UsePreviousValue:
      type: boolean
    Capabilities:
      type: array
      items:
        $ref: "#/components/schemas/Capability"
    Capability:
      type: string
      enum:
        - CAPABILITY_IAM
        - CAPABILITY_NAMED_IAM
        - CAPABILITY_AUTO_EXPAND
    ResourceTypes:
      type: array
      items:
        $ref: "#/components/schemas/ResourceType"
    ResourceType:
      type: string
      minLength: 1
      maxLength: 256
    RollbackConfiguration:
      description: Structure that contains the rollback triggers for CloudFormation to monitor during stack creation and updating operations, and for the specified monitoring period afterwards. Rollback triggers enable you to have CloudFormation monitor the state of your application during stack creation and updating, and to roll back that operation if the application breaches the threshold of any of the alarms you've specified. For more information, see Roll back your CloudFormation stack on alarm breach with rollback triggers.
      type: object
      properties:
        RollbackTriggers:
          $ref: "#/components/schemas/RollbackTriggers"
          description: "The triggers to monitor during stack creation or update actions. By default, CloudFormation saves the rollback triggers specified for a stack and applies them to any subsequent update operations for the stack, unless you specify otherwise. If you do specify rollback triggers for this parameter, those triggers replace any list of triggers previously specified for the stack. This means: To use the rollback triggers previously specified for this stack, if any, don't specify this parameter. To specify new or updated rollback triggers, you must specify all the triggers that you want used for this stack, even triggers you've specified before (for example, when creating the stack or during a previous stack update). Any triggers that you don't include in the updated list of triggers are no longer applied to the stack. To remove all currently specified triggers, specify an empty list for this parameter. If a specified trigger is missing, the entire stack operation fails and is rolled back."
        MonitoringTimeInMinutes:
          $ref: "#/components/schemas/MonitoringTimeInMinutes"
          description: The amount of time, in minutes, during which CloudFormation should monitor all the rollback triggers after the stack creation or update operation deploys all necessary resources. The default is 0 minutes. If you specify a monitoring period but don't specify any rollback triggers, CloudFormation still waits the specified period of time before cleaning up old resources after update operations. You can use this monitoring period to perform any manual stack validation desired, and manually cancel the stack creation or update (using CancelUpdateStack, for example) as necessary. If you specify 0 for this parameter, CloudFormation still monitors the specified rollback triggers during stack creation and update operations. Then, for update operations, it begins disposing of old resources immediately once the operation completes.
    RollbackTriggers:
      type: array
      items:
        $ref: "#/components/schemas/RollbackTrigger"
    RollbackTrigger:
      description: A rollback trigger CloudFormation monitors during creation and updating of stacks. If any of the alarms you specify goes to ALARM state during the stack operation or within the specified monitoring period afterwards, CloudFormation rolls back the entire stack operation.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the rollback trigger. If a specified trigger is missing, the entire stack operation fails and is rolled back.
        Type:
          $ref: "#/components/schemas/Type"
          description: The resource type of the rollback trigger. Specify either AWS::CloudWatch::Alarm or AWS::CloudWatch::CompositeAlarm resource types.
      required:
        - Arn
        - Type
    Arn:
      type: string
    Type:
      type: string
    MonitoringTimeInMinutes:
      type: integer
      minimum: 0
      maximum: 180
    NotificationARNs:
      type: array
      items:
        $ref: "#/components/schemas/NotificationARN"
    NotificationARN:
      type: string
    Tags:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: The Tag type enables you to specify a key-value pair that can be used to store information about an CloudFormation stack.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: "A string used to identify this tag. You can specify a maximum of 128 characters for a tag key. Tags owned by Amazon Web Services have the reserved prefix: aws:."
        Value:
          $ref: "#/components/schemas/TagValue"
          description: A string that contains the value for this tag. You can specify a maximum of 256 characters for a tag value.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 1
      maxLength: 256
    ChangeSetName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z][-a-zA-Z0-9]*"
    ClientToken:
      type: string
      minLength: 1
      maxLength: 128
    Description:
      type: string
      minLength: 1
      maxLength: 1024
    ChangeSetType:
      type: string
      enum:
        - CREATE
        - UPDATE
        - IMPORT
    ResourcesToImport:
      type: array
      items:
        $ref: "#/components/schemas/ResourceToImport"
    ResourceToImport:
      description: Describes the target resource of an import operation.
      type: object
      properties:
        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The type of resource to import into your stack, such as AWS::S3::Bucket. For a list of supported resource types, see Resource type support for imports and drift detection in the CloudFormation User Guide.
        LogicalResourceId:
          $ref: "#/components/schemas/LogicalResourceId"
          description: The logical ID of the target resource as specified in the template.
        ResourceIdentifier:
          type: object
          properties: {}
          description: A key-value pair that identifies the target resource. The key is an identifier property (for example, BucketName for AWS::S3::Bucket resources) and the value is the actual property value (for example, MyS3Bucket).
      required:
        - ResourceType
        - LogicalResourceId
        - ResourceIdentifier
    LogicalResourceId:
      type: string
    IncludeNestedStacks:
      type: boolean
    OnStackFailure:
      type: string
      enum:
        - DO_NOTHING
        - ROLLBACK
        - DELETE
    ImportExistingResources:
      type: boolean
    DeploymentMode:
      type: string
      enum:
        - REVERT_DRIFT
    CreateChangeSetOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateChangeSetOutputDisplay"
    CreateChangeSetInput:
      description: The input for the CreateChangeSet action.
      type: object
      properties:
        StackName:
          $ref: "#/components/schemas/StackNameOrId"
          description: The name or the unique ID of the stack for which you are creating a change set. CloudFormation generates the change set by comparing this stack's information with the information that you submit, such as a modified template or different parameter input values.
        TemplateBody:
          $ref: "#/components/schemas/TemplateBody"
          description: "A structure that contains the body of the revised template, with a minimum length of 1 byte and a maximum length of 51,200 bytes. CloudFormation generates the change set by comparing this template with the template of the stack that you specified. Conditional: You must specify only one of the following parameters: TemplateBody, TemplateURL, or set the UsePreviousTemplate to true."
        TemplateURL:
          $ref: "#/components/schemas/TemplateURL"
          description: "The URL of the file that contains the revised template. The URL must point to a template (max size: 1 MB) that's located in an Amazon S3 bucket or a Systems Manager document. CloudFormation generates the change set by comparing this template with the stack that you specified. The location for an Amazon S3 bucket must start with https://. URLs from S3 static websites are not supported. Conditional: You must specify only one of the following parameters: TemplateBody, TemplateURL, or set the UsePreviousTemplate to true."
        UsePreviousTemplate:
          $ref: "#/components/schemas/UsePreviousTemplate"
          description: "Whether to reuse the template that's associated with the stack to create the change set. When using templates with the AWS::LanguageExtensions transform, provide the template instead of using UsePreviousTemplate to ensure new parameter values and Systems Manager parameter updates are applied correctly. For more information, see AWS::LanguageExtensions transform. Conditional: You must specify only one of the following parameters: TemplateBody, TemplateURL, or set the UsePreviousTemplate to true."
        Parameters:
          $ref: "#/components/schemas/Parameters"
          description: A list of Parameter structures that specify input parameters for the change set. For more information, see the Parameter data type.
        Capabilities:
          $ref: "#/components/schemas/Capabilities"
          description: In some cases, you must explicitly acknowledge that your stack template contains certain capabilities in order for CloudFormation to create the stack. CAPABILITY_IAM and CAPABILITY_NAMED_IAM Some stack templates might include resources that can affect permissions in your Amazon Web Services account, for example, by creating new IAM users. For those stacks, you must explicitly acknowledge this by specifying one of these capabilities. The following IAM resources require you to specify either the CAPABILITY_IAM or CAPABILITY_NAMED_IAM capability. If you have IAM resources, you can specify either capability. If you have IAM resources with custom names, you must specify CAPABILITY_NAMED_IAM. If you don't specify either of these capabilities, CloudFormation returns an InsufficientCapabilities error. If your stack template contains these resources, we suggest that you review all permissions associated with them and edit their permissions if necessary. AWS::IAM::AccessKey AWS::IAM::Group AWS::IAM::InstanceProfile AWS::IAM::ManagedPolicy AWS::IAM::Policy AWS::IAM::Role AWS::IAM::User AWS::IAM::UserToGroupAddition For more information, see Acknowledging IAM resources in CloudFormation templates. CAPABILITY_AUTO_EXPAND Some template contain macros. Macros perform custom processing on templates; this can include simple actions like find-and-replace operations, all the way to extensive transformations of entire templates. Because of this, users typically create a change set from the processed template, so that they can review the changes resulting from the macros before actually creating the stack. If your stack template contains one or more macros, and you choose to create a stack directly from the processed template, without first reviewing the resulting changes in a change set, you must acknowledge this capability. This includes the AWS::Include and AWS::Serverless transforms, which are macros hosted by CloudFormation. This capacity doesn't apply to creating change sets, and specifying it when creating change sets has no effect. If you want to create a stack from a stack template that contains macros and nested stacks, you must create or update the stack directly from the template using the CreateStack or UpdateStack action, and specifying this capability. For more information about macros, see Perform custom processing on CloudFormation templates with template macros. Only one of the Capabilities and ResourceType parameters can be specified.
        ResourceTypes:
          $ref: "#/components/schemas/ResourceTypes"
          description: Specifies which resource types you can work with, such as AWS::EC2::Instance or Custom::MyCustomInstance. If the list of resource types doesn't include a resource type that you're updating, the stack update fails. By default, CloudFormation grants permissions to all resource types. IAM uses this parameter for condition keys in IAM policies for CloudFormation. For more information, see Control CloudFormation access with Identity and Access Management in the CloudFormation User Guide. Only one of the Capabilities and ResourceType parameters can be specified.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The Amazon Resource Name (ARN) of an IAM role that CloudFormation assumes when executing the change set. CloudFormation uses the role's credentials to make calls on your behalf. CloudFormation uses this role for all future operations on the stack. Provided that users have permission to operate on the stack, CloudFormation uses this role even if the users don't have permission to pass it. Ensure that the role grants least permission. If you don't specify a value, CloudFormation uses the role that was previously associated with the stack. If no role is available, CloudFormation uses a temporary session that is generated from your user credentials.
        RollbackConfiguration:
          $ref: "#/components/schemas/RollbackConfiguration"
          description: The rollback triggers for CloudFormation to monitor during stack creation and updating operations, and for the specified monitoring period afterwards.
        NotificationARNs:
          $ref: "#/components/schemas/NotificationARNs"
          description: The Amazon Resource Names (ARNs) of Amazon SNS topics that CloudFormation associates with the stack. To remove all associated notification topics, specify an empty list.
        Tags:
          $ref: "#/components/schemas/Tags"
          description: Key-value pairs to associate with this stack. CloudFormation also propagates these tags to resources in the stack. You can specify a maximum of 50 tags.
        ChangeSetName:
          $ref: "#/components/schemas/ChangeSetName"
          description: The name of the change set. The name must be unique among all change sets that are associated with the specified stack. A change set name can contain only alphanumeric, case sensitive characters, and hyphens. It must start with an alphabetical character and can't exceed 128 characters.
        ClientToken:
          $ref: "#/components/schemas/ClientToken"
          description: A unique identifier for this CreateChangeSet request. Specify this token if you plan to retry requests so that CloudFormation knows that you're not attempting to create another change set with the same name. You might retry CreateChangeSet requests to ensure that CloudFormation successfully received them.
        Description:
          $ref: "#/components/schemas/Description"
          description: A description to help you identify this change set.
        ChangeSetType:
          $ref: "#/components/schemas/ChangeSetType"
          description: The type of change set operation. To create a change set for a new stack, specify CREATE. To create a change set for an existing stack, specify UPDATE. To create a change set for an import operation, specify IMPORT. If you create a change set for a new stack, CloudFormation creates a stack with a unique stack ID, but no template or resources. The stack will be in the REVIEW_IN_PROGRESS state until you execute the change set. By default, CloudFormation specifies UPDATE. You can't use the UPDATE type to create a change set for a new stack or the CREATE type to create a change set for an existing stack.
        ResourcesToImport:
          $ref: "#/components/schemas/ResourcesToImport"
          description: The resources to import into your stack.
        IncludeNestedStacks:
          $ref: "#/components/schemas/IncludeNestedStacks"
          description: Creates a change set for the all nested stacks specified in the template. The default behavior of this action is set to False. To include nested sets in a change set, specify True.
        OnStackFailure:
          $ref: "#/components/schemas/OnStackFailure"
          description: "Determines what action will be taken if stack creation fails. If this parameter is specified, the DisableRollback parameter to the ExecuteChangeSet API operation must not be specified. This must be one of these values: DELETE - Deletes the change set if the stack creation fails. This is only valid when the ChangeSetType parameter is set to CREATE. If the deletion of the stack fails, the status of the stack is DELETE_FAILED. DO_NOTHING - if the stack creation fails, do nothing. This is equivalent to specifying true for the DisableRollback parameter to the ExecuteChangeSet API operation. ROLLBACK - if the stack creation fails, roll back the stack. This is equivalent to specifying false for the DisableRollback parameter to the ExecuteChangeSet API operation. For nested stacks, when the OnStackFailure parameter is set to DELETE for the change set for the parent stack, any failure in a child stack will cause the parent stack creation to fail and all stacks to be deleted."
        ImportExistingResources:
          $ref: "#/components/schemas/ImportExistingResources"
          description: Indicates if the change set auto-imports resources that already exist. For more information, see Import Amazon Web Services resources into a CloudFormation stack automatically in the CloudFormation User Guide. This parameter can only import resources that have custom names in templates. For more information, see name type in the CloudFormation User Guide. To import resources that do not accept custom names, such as EC2 instances, use the ResourcesToImport parameter instead.
        DeploymentMode:
          $ref: "#/components/schemas/DeploymentMode"
          description: Determines how CloudFormation handles configuration drift during deployment. REVERT_DRIFT – Creates a drift-aware change set that brings actual resource states in line with template definitions. Provides a three-way comparison between actual state, previous deployment state, and desired state. For more information, see Using drift-aware change sets in the CloudFormation User Guide.
      required:
        - StackName
        - ChangeSetName
    ResourceDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/ResourceDefinition"
    ResourceDefinition:
      description: A resource included in a generated template. This data type is used with the CreateGeneratedTemplate and UpdateGeneratedTemplate API actions.
      type: object
      properties:
        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The type of the resource, such as AWS::DynamoDB::Table. For the list of supported resources, see Resource type support for imports and drift detection in the CloudFormation User Guide
        LogicalResourceId:
          $ref: "#/components/schemas/LogicalResourceId"
          description: The logical resource id for this resource in the generated template.
        ResourceIdentifier:
          type: object
          properties: {}
          description: 'A list of up to 256 key-value pairs that identifies the scanned resource. The key is the name of one of the primary identifiers for the resource. (Primary identifiers are specified in the primaryIdentifier list in the resource schema.) The value is the value of that primary identifier. For example, for a AWS::DynamoDB::Table resource, the primary identifiers is TableName so the key-value pair could be "TableName": "MyDDBTable". For more information, see primaryIdentifier in the CloudFormation Command Line Interface (CLI) User Guide.'
      required:
        - ResourceType
        - ResourceIdentifier
    GeneratedTemplateName:
      type: string
      minLength: 1
      maxLength: 128
    TemplateConfiguration:
      description: The configuration details of a generated template.
      type: object
      properties:
        DeletionPolicy:
          $ref: "#/components/schemas/GeneratedTemplateDeletionPolicy"
          description: "The DeletionPolicy assigned to resources in the generated template. Supported values are: DELETE - delete all resources when the stack is deleted. RETAIN - retain all resources when the stack is deleted. For more information, see DeletionPolicy attribute in the CloudFormation User Guide."
        UpdateReplacePolicy:
          $ref: "#/components/schemas/GeneratedTemplateUpdateReplacePolicy"
          description: "The UpdateReplacePolicy assigned to resources in the generated template. Supported values are: DELETE - delete all resources when the resource is replaced during an update operation. RETAIN - retain all resources when the resource is replaced during an update operation. For more information, see UpdateReplacePolicy attribute in the CloudFormation User Guide."
    GeneratedTemplateDeletionPolicy:
      type: string
      enum:
        - DELETE
        - RETAIN
    GeneratedTemplateUpdateReplacePolicy:
      type: string
      enum:
        - DELETE
        - RETAIN
    CreateGeneratedTemplateOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateGeneratedTemplateOutputDisplay"
    CreateGeneratedTemplateInput:
      type: object
      properties:
        Resources:
          $ref: "#/components/schemas/ResourceDefinitions"
          description: An optional list of resources to be included in the generated template. If no resources are specified,the template will be created without any resources. Resources can be added to the template using the UpdateGeneratedTemplate API action.
        GeneratedTemplateName:
          $ref: "#/components/schemas/GeneratedTemplateName"
          description: The name assigned to the generated template.
        StackName:
          $ref: "#/components/schemas/StackName"
          description: An optional name or ARN of a stack to use as the base stack for the generated template.
        TemplateConfiguration:
          $ref: "#/components/schemas/TemplateConfiguration"
          description: The configuration details of the generated template, including the DeletionPolicy and UpdateReplacePolicy.
      required:
        - GeneratedTemplateName
    DisableRollback:
      type: boolean
    TimeoutMinutes:
      type: integer
      minimum: 1
    OnFailure:
      type: string
      enum:
        - DO_NOTHING
        - ROLLBACK
        - DELETE
    StackPolicyBody:
      type: string
      minLength: 1
      maxLength: 16384
    StackPolicyURL:
      type: string
      minLength: 1
      maxLength: 5120
    EnableTerminationProtection:
      type: boolean
    RetainExceptOnCreate:
      type: boolean
    CreateStackOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateStackOutputDisplay"
    CreateStackInput:
      description: The input for CreateStack action.
      type: object
      properties:
        StackName:
          $ref: "#/components/schemas/StackName"
          description: The name that's associated with the stack. The name must be unique in the Region in which you are creating the stack. A stack name can contain only alphanumeric characters (case sensitive) and hyphens. It must start with an alphabetical character and can't be longer than 128 characters.
        TemplateBody:
          $ref: "#/components/schemas/TemplateBody"
          description: "Structure that contains the template body with a minimum length of 1 byte and a maximum length of 51,200 bytes. Conditional: You must specify either TemplateBody or TemplateURL, but not both."
        TemplateURL:
          $ref: "#/components/schemas/TemplateURL"
          description: "The URL of a file that contains the template body. The URL must point to a template (max size: 1 MB) that's located in an Amazon S3 bucket or a Systems Manager document. The location for an Amazon S3 bucket must start with https://. URLs from S3 static websites are not supported. Conditional: You must specify either the TemplateBody or the TemplateURL parameter, but not both."
        Parameters:
          $ref: "#/components/schemas/Parameters"
          description: A list of Parameter structures that specify input parameters for the stack. For more information, see the Parameter data type.
        DisableRollback:
          $ref: "#/components/schemas/DisableRollback"
          description: "Set to true to disable rollback of the stack if stack creation failed. You can specify either DisableRollback or OnFailure, but not both. Default: false"
        RollbackConfiguration:
          $ref: "#/components/schemas/RollbackConfiguration"
          description: The rollback triggers for CloudFormation to monitor during stack creation and updating operations, and for the specified monitoring period afterwards.
        TimeoutInMinutes:
          $ref: "#/components/schemas/TimeoutMinutes"
          description: The amount of time that can pass before the stack status becomes CREATE_FAILED; if DisableRollback is not set or is set to false, the stack will be rolled back.
        NotificationARNs:
          $ref: "#/components/schemas/NotificationARNs"
          description: The Amazon SNS topic ARNs to publish stack related events. You can find your Amazon SNS topic ARNs using the Amazon SNS console or your Command Line Interface (CLI).
        Capabilities:
          $ref: "#/components/schemas/Capabilities"
          description: In some cases, you must explicitly acknowledge that your stack template contains certain capabilities in order for CloudFormation to create the stack. CAPABILITY_IAM and CAPABILITY_NAMED_IAM Some stack templates might include resources that can affect permissions in your Amazon Web Services account; for example, by creating new IAM users. For those stacks, you must explicitly acknowledge this by specifying one of these capabilities. The following IAM resources require you to specify either the CAPABILITY_IAM or CAPABILITY_NAMED_IAM capability. If you have IAM resources, you can specify either capability. If you have IAM resources with custom names, you must specify CAPABILITY_NAMED_IAM. If you don't specify either of these capabilities, CloudFormation returns an InsufficientCapabilities error. If your stack template contains these resources, we recommend that you review all permissions associated with them and edit their permissions if necessary. AWS::IAM::AccessKey AWS::IAM::Group AWS::IAM::InstanceProfile AWS::IAM::ManagedPolicy AWS::IAM::Policy AWS::IAM::Role AWS::IAM::User AWS::IAM::UserToGroupAddition For more information, see Acknowledging IAM resources in CloudFormation templates. CAPABILITY_AUTO_EXPAND Some template contain macros. Macros perform custom processing on templates; this can include simple actions like find-and-replace operations, all the way to extensive transformations of entire templates. Because of this, users typically create a change set from the processed template, so that they can review the changes resulting from the macros before actually creating the stack. If your stack template contains one or more macros, and you choose to create a stack directly from the processed template, without first reviewing the resulting changes in a change set, you must acknowledge this capability. This includes the AWS::Include and AWS::Serverless transforms, which are macros hosted by CloudFormation. If you want to create a stack from a stack template that contains macros and nested stacks, you must create the stack directly from the template using this capability. You should only create stacks directly from a stack template that contains macros if you know what processing the macro performs. Each macro relies on an underlying Lambda service function for processing stack templates. Be aware that the Lambda function owner can update the function operation without CloudFormation being notified. For more information, see Perform custom processing on CloudFormation templates with template macros. Only one of the Capabilities and ResourceType parameters can be specified.
        ResourceTypes:
          $ref: "#/components/schemas/ResourceTypes"
          description: Specifies which resource types you can work with, such as AWS::EC2::Instance or Custom::MyCustomInstance. If the list of resource types doesn't include a resource that you're creating, the stack creation fails. By default, CloudFormation grants permissions to all resource types. IAM uses this parameter for CloudFormation-specific condition keys in IAM policies. For more information, see Control CloudFormation access with Identity and Access Management. Only one of the Capabilities and ResourceType parameters can be specified.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The Amazon Resource Name (ARN) of an IAM role that CloudFormation assumes to create the stack. CloudFormation uses the role's credentials to make calls on your behalf. CloudFormation always uses this role for all future operations on the stack. Provided that users have permission to operate on the stack, CloudFormation uses this role even if the users don't have permission to pass it. Ensure that the role grants least privilege. If you don't specify a value, CloudFormation uses the role that was previously associated with the stack. If no role is available, CloudFormation uses a temporary session that's generated from your user credentials.
        OnFailure:
          $ref: "#/components/schemas/OnFailure"
          description: "Determines what action will be taken if stack creation fails. This must be one of: DO_NOTHING, ROLLBACK, or DELETE. You can specify either OnFailure or DisableRollback, but not both. Although the default setting is ROLLBACK, there is one exception. This exception occurs when a StackSet attempts to deploy a stack instance and the stack instance fails to create successfully. In this case, the CreateStack call overrides the default setting and sets the value of OnFailure to DELETE. Default: ROLLBACK"
        StackPolicyBody:
          $ref: "#/components/schemas/StackPolicyBody"
          description: Structure that contains the stack policy body. For more information, see Prevent updates to stack resources in the CloudFormation User Guide. You can specify either the StackPolicyBody or the StackPolicyURL parameter, but not both.
        StackPolicyURL:
          $ref: "#/components/schemas/StackPolicyURL"
          description: "Location of a file that contains the stack policy. The URL must point to a policy (maximum size: 16 KB) located in an S3 bucket in the same Region as the stack. The location for an Amazon S3 bucket must start with https://. URLs from S3 static websites are not supported. You can specify either the StackPolicyBody or the StackPolicyURL parameter, but not both."
        Tags:
          $ref: "#/components/schemas/Tags"
          description: Key-value pairs to associate with this stack. CloudFormation also propagates these tags to the resources created in the stack. A maximum number of 50 tags can be specified.
        ClientRequestToken:
          $ref: "#/components/schemas/ClientRequestToken"
          description: "A unique identifier for this CreateStack request. Specify this token if you plan to retry requests so that CloudFormation knows that you're not attempting to create a stack with the same name. You might retry CreateStack requests to ensure that CloudFormation successfully received them. All events initiated by a given stack operation are assigned the same client request token, which you can use to track operations. For example, if you execute a CreateStack operation with the token token1, then all the StackEvents generated by that operation will have ClientRequestToken set as token1. In the console, stack operations display the client request token on the Events tab. Stack operations that are initiated from the console use the token format Console-StackOperation-ID, which helps you easily identify the stack operation . For example, if you create a stack using the console, each stack event would be assigned the same token in the following format: Console-CreateStack-7f59c3cf-00d2-40c7-b2ff-e75db0987002."
        EnableTerminationProtection:
          $ref: "#/components/schemas/EnableTerminationProtection"
          description: Whether to enable termination protection on the specified stack. If a user attempts to delete a stack with termination protection enabled, the operation fails and the stack remains unchanged. For more information, see Protect CloudFormation stacks from being deleted in the CloudFormation User Guide. Termination protection is deactivated on stacks by default. For nested stacks, termination protection is set on the root stack and can't be changed directly on the nested stack.
        RetainExceptOnCreate:
          $ref: "#/components/schemas/RetainExceptOnCreate"
          description: "When set to true, newly created resources are deleted when the operation rolls back. This includes newly created resources marked with a deletion policy of Retain. Default: false"
      required:
        - StackName
    StackSetName:
      type: string
    AccountList:
      type: array
      items:
        $ref: "#/components/schemas/Account"
    Account:
      type: string
      pattern: ^[0-9]{12}$
    DeploymentTargets:
      description: Specifies the Organizations accounts where you want to create, update, or delete stack instances. You can target either your entire organization or specific accounts using organizational units (OUs) and account filter options. CloudFormation doesn't deploy stack instances to the organization management account, even if the organization management account is in your organization or in an OU in your organization. When performing create operations, if you specify both OrganizationalUnitIds and Accounts, you must also specify the AccountFilterType property.
      type: object
      properties:
        Accounts:
          $ref: "#/components/schemas/AccountList"
          description: The Amazon Web Services account IDs where you want to perform stack operations. How these accounts are used depends on the AccountFilterType property. If you have many account numbers, you can provide those accounts using the AccountsUrl property instead.
        AccountsUrl:
          $ref: "#/components/schemas/AccountsUrl"
          description: The Amazon S3 URL path to a file that contains a list of Amazon Web Services account IDs. The file format must be either .csv or .txt, and the data can be comma-separated or new-line-separated. There is currently a 10MB limit for the data (approximately 800,000 accounts). This property serves the same purpose as Accounts but allows you to specify a large number of accounts.
        OrganizationalUnitIds:
          $ref: "#/components/schemas/OrganizationalUnitIdList"
          description: The organization root ID or organizational unit (OU) IDs where you want to perform stack operations. CloudFormation will perform operations on accounts within these OUs and their child OUs.
        AccountFilterType:
          $ref: "#/components/schemas/AccountFilterType"
          description: "Refines which accounts will have stack operations performed on them by specifying how to use the Accounts and OrganizationalUnitIds properties together. The following values determine how CloudFormation selects target accounts: INTERSECTION: Performs stack operations only on specific individual accounts within the selected OUs. Only accounts that are both specified in the Accounts property and belong to the specified OUs will be targeted. DIFFERENCE: Performs stack operations on all accounts in the selected OUs except for specific accounts listed in the Accounts property. This enables you to exclude certain accounts within an OU, such as suspended accounts. UNION: Performs stack operations on the specified OUs plus additional individual accounts listed in the Accounts property. This is the default value if AccountFilterType is not provided. This lets you target an entire OU and individual accounts from a different OU in one request. Note that UNION is not supported for CreateStackInstances operations. NONE: Performs stack operations on all accounts in the specified organizational units (OUs)."
    AccountsUrl:
      type: string
      minLength: 1
      maxLength: 5120
      pattern: (s3://|http(s?)://).+
    OrganizationalUnitIdList:
      type: array
      items:
        $ref: "#/components/schemas/OrganizationalUnitId"
    OrganizationalUnitId:
      type: string
      pattern: ^(ou-[a-z0-9]{4,32}-[a-z0-9]{8,32}|r-[a-z0-9]{4,32})$
    AccountFilterType:
      type: string
      enum:
        - NONE
        - INTERSECTION
        - DIFFERENCE
        - UNION
    RegionList:
      type: array
      items:
        $ref: "#/components/schemas/Region"
    Region:
      type: string
      pattern: ^[a-zA-Z0-9-]{1,128}$
    StackSetOperationPreferences:
      description: The user-specified preferences for how CloudFormation performs a StackSet operation. For more information about maximum concurrent accounts and failure tolerance, see StackSet operation options. StackSetOperationPreferences don't apply to AutoDeployment, even if it's enabled.
      type: object
      properties:
        RegionConcurrencyType:
          $ref: "#/components/schemas/RegionConcurrencyType"
          description: The concurrency type of deploying StackSets operations in Regions, could be in parallel or one Region at a time.
        RegionOrder:
          $ref: "#/components/schemas/RegionList"
          description: The order of the Regions where you want to perform the stack operation.
        FailureToleranceCount:
          $ref: "#/components/schemas/FailureToleranceCount"
          description: The number of accounts per Region this operation can fail in before CloudFormation stops the operation in that Region. If the operation is stopped in a Region, CloudFormation doesn't attempt the operation in any subsequent Regions. You can specify either FailureToleranceCount or FailureTolerancePercentage, but not both. By default, 0 is specified.
        FailureTolerancePercentage:
          $ref: "#/components/schemas/FailureTolerancePercentage"
          description: The percentage of accounts per Region this stack operation can fail in before CloudFormation stops the operation in that Region. If the operation is stopped in a Region, CloudFormation doesn't attempt the operation in any subsequent Regions. When calculating the number of accounts based on the specified percentage, CloudFormation rounds down to the next whole number. You can specify either FailureToleranceCount or FailureTolerancePercentage, but not both. By default, 0 is specified.
        MaxConcurrentCount:
          $ref: "#/components/schemas/MaxConcurrentCount"
          description: The maximum number of accounts in which to perform this operation at one time. This can depend on the value of FailureToleranceCount depending on your ConcurrencyMode. MaxConcurrentCount is at most one more than the FailureToleranceCount if you're using STRICT_FAILURE_TOLERANCE. Note that this setting lets you specify the maximum for operations. For large deployments, under certain circumstances the actual number of accounts acted upon concurrently may be lower due to service throttling. You can specify either MaxConcurrentCount or MaxConcurrentPercentage, but not both. By default, 1 is specified.
        MaxConcurrentPercentage:
          $ref: "#/components/schemas/MaxConcurrentPercentage"
          description: The maximum percentage of accounts in which to perform this operation at one time. When calculating the number of accounts based on the specified percentage, CloudFormation rounds down to the next whole number. This is true except in cases where rounding down would result is zero. In this case, CloudFormation sets the number as one instead. Note that this setting lets you specify the maximum for operations. For large deployments, under certain circumstances the actual number of accounts acted upon concurrently may be lower due to service throttling. You can specify either MaxConcurrentCount or MaxConcurrentPercentage, but not both. By default, 1 is specified.
        ConcurrencyMode:
          $ref: "#/components/schemas/ConcurrencyMode"
          description: "Specifies how the concurrency level behaves during the operation execution. STRICT_FAILURE_TOLERANCE: This option dynamically lowers the concurrency level to ensure the number of failed accounts never exceeds the value of FailureToleranceCount +1. The initial actual concurrency is set to the lower of either the value of the MaxConcurrentCount, or the value of FailureToleranceCount +1. The actual concurrency is then reduced proportionally by the number of failures. This is the default behavior. If failure tolerance or Maximum concurrent accounts are set to percentages, the behavior is similar. SOFT_FAILURE_TOLERANCE: This option decouples FailureToleranceCount from the actual concurrency. This allows StackSet operations to run at the concurrency level set by the MaxConcurrentCount value, or MaxConcurrentPercentage, regardless of the number of failures."
    RegionConcurrencyType:
      type: string
      enum:
        - SEQUENTIAL
        - PARALLEL
    FailureToleranceCount:
      type: integer
      minimum: 0
    FailureTolerancePercentage:
      type: integer
      minimum: 0
      maximum: 100
    MaxConcurrentCount:
      type: integer
      minimum: 1
    MaxConcurrentPercentage:
      type: integer
      minimum: 1
      maximum: 100
    ConcurrencyMode:
      type: string
      enum:
        - STRICT_FAILURE_TOLERANCE
        - SOFT_FAILURE_TOLERANCE
    CallAs:
      type: string
      enum:
        - SELF
        - DELEGATED_ADMIN
    CreateStackInstancesOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateStackInstancesOutputDisplay"
    CreateStackInstancesInput:
      type: object
      properties:
        StackSetName:
          $ref: "#/components/schemas/StackSetName"
          description: The name or unique ID of the StackSet that you want to create stack instances from.
        Accounts:
          $ref: "#/components/schemas/AccountList"
          description: "[Self-managed permissions] The account IDs of one or more Amazon Web Services accounts that you want to create stack instances in the specified Region(s) for. You can specify Accounts or DeploymentTargets, but not both."
        DeploymentTargets:
          $ref: "#/components/schemas/DeploymentTargets"
          description: "[Service-managed permissions] The Organizations accounts in which to create stack instances in the specified Amazon Web Services Regions. You can specify Accounts or DeploymentTargets, but not both."
        Regions:
          $ref: "#/components/schemas/RegionList"
          description: The names of one or more Amazon Web Services Regions where you want to create stack instances using the specified Amazon Web Services accounts.
        ParameterOverrides:
          $ref: "#/components/schemas/Parameters"
          description: "A list of StackSet parameters whose values you want to override in the selected stack instances. Any overridden parameter values will be applied to all stack instances in the specified accounts and Amazon Web Services Regions. When specifying parameters and their values, be aware of how CloudFormation sets parameter values during stack instance operations: To override the current value for a parameter, include the parameter and specify its value. To leave an overridden parameter set to its present value, include the parameter and specify UsePreviousValue as true. (You can't specify both a value and set UsePreviousValue to true.) To set an overridden parameter back to the value specified in the StackSet, specify a parameter list but don't include the parameter in the list. To leave all parameters set to their present values, don't specify this property at all. During StackSet updates, any parameter values overridden for a stack instance aren't updated, but retain their overridden value. You can only override the parameter values that are specified in the StackSet; to add or delete a parameter itself, use UpdateStackSet to update the StackSet template."
        OperationPreferences:
          $ref: "#/components/schemas/StackSetOperationPreferences"
          description: Preferences for how CloudFormation performs this StackSet operation.
        OperationId:
          $ref: "#/components/schemas/ClientRequestToken"
          description: The unique identifier for this StackSet operation. The operation ID also functions as an idempotency token, to ensure that CloudFormation performs the StackSet operation only once, even if you retry the request multiple times. You might retry StackSet operation requests to ensure that CloudFormation successfully received them. If you don't specify an operation ID, the SDK generates one automatically. Repeating this StackSet operation with a new operation ID retries all stack instances whose status is OUTDATED.
        CallAs:
          $ref: "#/components/schemas/CallAs"
          description: "[Service-managed permissions] Specifies whether you are acting as an account administrator in the organization's management account or as a delegated administrator in a member account. By default, SELF is specified. Use SELF for StackSets with self-managed permissions. If you are signed in to the management account, specify SELF. If you are signed in to a delegated administrator account, specify DELEGATED_ADMIN. Your Amazon Web Services account must be registered as a delegated administrator in the management account. For more information, see Register a delegated administrator in the CloudFormation User Guide."
      required:
        - StackSetName
        - Regions
    EnableStackCreation:
      type: boolean
    ResourceMappings:
      type: array
      items:
        $ref: "#/components/schemas/ResourceMapping"
    ResourceMapping:
      description: Specifies the current source of the resource and the destination of where it will be moved to.
      type: object
      properties:
        Source:
          $ref: "#/components/schemas/ResourceLocation"
          description: The source stack StackName and LogicalResourceId for the resource being refactored.
        Destination:
          $ref: "#/components/schemas/ResourceLocation"
          description: The destination stack StackName and LogicalResourceId for the resource being refactored.
      required:
        - Source
        - Destination
    ResourceLocation:
      description: The location of the resource in a stack template.
      type: object
      properties:
        StackName:
          $ref: "#/components/schemas/StackName"
          description: The name associated with the stack.
        LogicalResourceId:
          $ref: "#/components/schemas/LogicalResourceId"
          description: The logical name of the resource specified in the template.
      required:
        - StackName
        - LogicalResourceId
    StackDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/StackDefinition"
    StackDefinition:
      description: Describes the stack and the template used by the stack.
      type: object
      properties:
        StackName:
          $ref: "#/components/schemas/StackName"
          description: The name associated with the stack.
        TemplateBody:
          $ref: "#/components/schemas/TemplateBody"
          description: The file path for the stack template file.
        TemplateURL:
          $ref: "#/components/schemas/TemplateURL"
          description: The desired final state of the stack template.
    CreateStackRefactorOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateStackRefactorOutputDisplay"
    CreateStackRefactorInput:
      type: object
      properties:
        Description:
          $ref: "#/components/schemas/Description"
          description: A description to help you identify the stack refactor.
        EnableStackCreation:
          $ref: "#/components/schemas/EnableStackCreation"
          description: Determines if a new stack is created with the refactor.
        ResourceMappings:
          $ref: "#/components/schemas/ResourceMappings"
          description: The mappings for the stack resource Source and stack resource Destination.
        StackDefinitions:
          $ref: "#/components/schemas/StackDefinitions"
          description: The stacks being refactored.
      required:
        - StackDefinitions
    StackId:
      type: string
    ExecutionRoleName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z_0-9+=,.@-]+"
    PermissionModels:
      type: string
      enum:
        - SERVICE_MANAGED
        - SELF_MANAGED
    AutoDeployment:
      description: Describes whether StackSets automatically deploys to Organizations accounts that are added to a target organization or organizational unit (OU). For more information, see Enable or disable automatic deployments for StackSets in Organizations in the CloudFormation User Guide.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/AutoDeploymentNullable"
          description: If set to true, StackSets automatically deploys additional stack instances to Organizations accounts that are added to a target organization or organizational unit (OU) in the specified Regions. If an account is removed from a target organization or OU, StackSets deletes stack instances from the account in the specified Regions.
        RetainStacksOnAccountRemoval:
          $ref: "#/components/schemas/RetainStacksOnAccountRemovalNullable"
          description: If set to true, stack resources are retained when an account is removed from a target organization or OU. If set to false, stack resources are deleted. Specify only if Enabled is set to True.
        DependsOn:
          $ref: "#/components/schemas/StackSetARNList"
          description: A list of StackSet ARNs that this StackSet depends on for auto-deployment operations. When auto-deployment is triggered, operations will be sequenced to ensure all dependencies complete successfully before this StackSet's operation begins.
    AutoDeploymentNullable:
      type: boolean
    RetainStacksOnAccountRemovalNullable:
      type: boolean
    StackSetARNList:
      type: array
      items:
        $ref: "#/components/schemas/StackSetARN"
    StackSetARN:
      type: string
    ManagedExecution:
      description: Describes whether StackSets performs non-conflicting operations concurrently and queues conflicting operations.
      type: object
      properties:
        Active:
          $ref: "#/components/schemas/ManagedExecutionNullable"
          description: When true, CloudFormation performs non-conflicting operations concurrently and queues conflicting operations. After conflicting operations finish, CloudFormation starts queued operations in request order. If there are already running or queued operations, CloudFormation queues all incoming operations even if they are non-conflicting. You can't modify your StackSet's execution configuration while there are running or queued operations for that StackSet. When false (default), StackSets performs one operation at a time in request order.
    ManagedExecutionNullable:
      type: boolean
    CreateStackSetOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateStackSetOutputDisplay"
    CreateStackSetInput:
      type: object
      properties:
        StackSetName:
          $ref: "#/components/schemas/StackSetName"
          description: The name to associate with the StackSet. The name must be unique in the Region where you create your StackSet. A stack name can contain only alphanumeric characters (case-sensitive) and hyphens. It must start with an alphabetic character and can't be longer than 128 characters.
        Description:
          $ref: "#/components/schemas/Description"
          description: A description of the StackSet. You can use the description to identify the StackSet's purpose or other important information.
        TemplateBody:
          $ref: "#/components/schemas/TemplateBody"
          description: "The structure that contains the template body, with a minimum length of 1 byte and a maximum length of 51,200 bytes. Conditional: You must specify either the TemplateBody or the TemplateURL parameter, but not both."
        TemplateURL:
          $ref: "#/components/schemas/TemplateURL"
          description: "The URL of a file that contains the template body. The URL must point to a template (maximum size: 1 MB) that's located in an Amazon S3 bucket or a Systems Manager document. The location for an Amazon S3 bucket must start with https://. S3 static website URLs are not supported. Conditional: You must specify either the TemplateBody or the TemplateURL parameter, but not both."
        StackId:
          $ref: "#/components/schemas/StackId"
          description: The stack ID you are importing into a new StackSet. Specify the Amazon Resource Name (ARN) of the stack.
        Parameters:
          $ref: "#/components/schemas/Parameters"
          description: The input parameters for the StackSet template.
        Capabilities:
          $ref: "#/components/schemas/Capabilities"
          description: In some cases, you must explicitly acknowledge that your StackSet template contains certain capabilities in order for CloudFormation to create the StackSet and related stack instances. CAPABILITY_IAM and CAPABILITY_NAMED_IAM Some stack templates might include resources that can affect permissions in your Amazon Web Services account; for example, by creating new IAM users. For those StackSets, you must explicitly acknowledge this by specifying one of these capabilities. The following IAM resources require you to specify either the CAPABILITY_IAM or CAPABILITY_NAMED_IAM capability. If you have IAM resources, you can specify either capability. If you have IAM resources with custom names, you must specify CAPABILITY_NAMED_IAM. If you don't specify either of these capabilities, CloudFormation returns an InsufficientCapabilities error. If your stack template contains these resources, we recommend that you review all permissions associated with them and edit their permissions if necessary. AWS::IAM::AccessKey AWS::IAM::Group AWS::IAM::InstanceProfile AWS::IAM::Policy AWS::IAM::Role AWS::IAM::User AWS::IAM::UserToGroupAddition For more information, see Acknowledging IAM resources in CloudFormation templates. CAPABILITY_AUTO_EXPAND Some templates reference macros. If your StackSet template references one or more macros, you must create the StackSet directly from the processed template, without first reviewing the resulting changes in a change set. To create the StackSet directly, you must acknowledge this capability. For more information, see Perform custom processing on CloudFormation templates with template macros. StackSets with service-managed permissions don't currently support the use of macros in templates. (This includes the AWS::Include and AWS::Serverless transforms, which are macros hosted by CloudFormation.) Even if you specify this capability for a StackSet with service-managed permissions, if you reference a macro in your template the StackSet operation will fail.
        Tags:
          $ref: "#/components/schemas/Tags"
          description: The key-value pairs to associate with this StackSet and the stacks created from it. CloudFormation also propagates these tags to supported resources that are created in the stacks. A maximum number of 50 tags can be specified. If you specify tags as part of a CreateStackSet action, CloudFormation checks to see if you have the required IAM permission to tag resources. If you don't, the entire CreateStackSet action fails with an access denied error, and the StackSet is not created.
        AdministrationRoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The Amazon Resource Name (ARN) of the IAM role to use to create this StackSet. Specify an IAM role only if you are using customized administrator roles to control which users or groups can manage specific StackSets within the same administrator account. For more information, see Grant self-managed permissions in the CloudFormation User Guide. Valid only if the permissions model is SELF_MANAGED.
        ExecutionRoleName:
          $ref: "#/components/schemas/ExecutionRoleName"
          description: The name of the IAM execution role to use to create the StackSet. If you do not specify an execution role, CloudFormation uses the AWSCloudFormationStackSetExecutionRole role for the StackSet operation. Specify an IAM role only if you are using customized execution roles to control which stack resources users and groups can include in their StackSets. Valid only if the permissions model is SELF_MANAGED.
        PermissionModel:
          $ref: "#/components/schemas/PermissionModels"
          description: Describes how the IAM roles required for StackSet operations are created. By default, SELF-MANAGED is specified. With self-managed permissions, you must create the administrator and execution roles required to deploy to target accounts. For more information, see Grant self-managed permissions. With service-managed permissions, StackSets automatically creates the IAM roles required to deploy to accounts managed by Organizations. For more information, see Activate trusted access for StackSets with Organizations.
        AutoDeployment:
          $ref: "#/components/schemas/AutoDeployment"
          description: Describes whether StackSets automatically deploys to Organizations accounts that are added to the target organization or organizational unit (OU). For more information, see Enable or disable automatic deployments for StackSets in Organizations in the CloudFormation User Guide. Required if the permissions model is SERVICE_MANAGED. (Not used with self-managed permissions.)
        CallAs:
          $ref: "#/components/schemas/CallAs"
          description: Specifies whether you are acting as an account administrator in the organization's management account or as a delegated administrator in a member account. By default, SELF is specified. Use SELF for StackSets with self-managed permissions. To create a StackSet with service-managed permissions while signed in to the management account, specify SELF. To create a StackSet with service-managed permissions while signed in to a delegated administrator account, specify DELEGATED_ADMIN. Your Amazon Web Services account must be registered as a delegated admin in the management account. For more information, see Register a delegated administrator in the CloudFormation User Guide. StackSets with service-managed permissions are created in the management account, including StackSets that are created by delegated administrators. Valid only if the permissions model is SERVICE_MANAGED.
        ClientRequestToken:
          $ref: "#/components/schemas/ClientRequestToken"
