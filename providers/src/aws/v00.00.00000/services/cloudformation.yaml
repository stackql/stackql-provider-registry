          description: The name of the StackSet.
        StackSetId:
          type: string
          description: The ID of the StackSet.
        Description:
          type: string
          description: A description of the StackSet that you specify when the StackSet is created or updated.
        Status:
          type: string
          description: The status of the StackSet.
        AutoDeployment:
          type: string
          description: "[Service-managed permissions] Describes whether StackSets automatically deploys to Organizations accounts that are added to a target organizational unit (OU)."
        PermissionModel:
          type: string
          description: Describes how the IAM roles required for StackSet operations are created. With self-managed permissions, you must create the administrator and execution roles required to deploy to target accounts. For more information, see Grant self-managed permissions. With service-managed permissions, StackSets automatically creates the IAM roles required to deploy to accounts managed by Organizations. For more information, see Activate trusted access for StackSets with Organizations.
        DriftStatus:
          type: string
          description: "Status of the StackSet's actual configuration compared to its expected template and parameter configuration. DRIFTED: One or more of the stack instances belonging to the StackSet differs from the expected template and parameter configuration. A stack instance is considered to have drifted if one or more of the resources in the associated stack have drifted. NOT_CHECKED: CloudFormation hasn't checked the StackSet for drift. IN_SYNC: All the stack instances belonging to the StackSet match the expected template and parameter configuration. UNKNOWN: This value is reserved for future use."
        LastDriftCheckTimestamp:
          type: string
          description: Most recent time when CloudFormation performed a drift detection operation on the StackSet. This value will be NULL for any StackSet that drift detection hasn't yet been performed on.
        ManagedExecution:
          type: string
          description: Describes whether StackSets performs non-conflicting operations concurrently and queues conflicting operations.
