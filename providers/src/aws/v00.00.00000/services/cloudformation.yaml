        ClientRequestToken:
          $ref: "#/components/schemas/ClientRequestToken"
          description: A unique identifier for this ExecuteChangeSet request. Specify this token if you plan to retry requests so that CloudFormation knows that you're not attempting to execute a change set to update a stack with the same name. You might retry ExecuteChangeSet requests to ensure that CloudFormation successfully received them.
        DisableRollback:
