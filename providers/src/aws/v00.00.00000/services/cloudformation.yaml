          description: "The scope at which the extensions are visible and usable in CloudFormation operations. Valid values include: PRIVATE: Extensions that are visible and usable within this account and Region. This includes: Private extensions you have registered in this account and Region. Public extensions that you have activated in this account and Region. PUBLIC: Extensions that are publicly visible and available to be activated within any Amazon Web Services account. This includes extensions from Amazon Web Services and third-party publishers. The default is PRIVATE."
          schema:
            $ref: "#/components/schemas/Visibility"
        - name: ProvisioningType
          in: query
          required: false
          description: "For resource types, the provisioning behavior of the resource type. CloudFormation determines the provisioning type during registration, based on the types of handlers in the schema handler package submitted. Valid values include: FULLY_MUTABLE: The resource type includes an update handler to process updates to the type during stack update operations. IMMUTABLE: The resource type doesn't include an update handler, so the type can't be updated and must instead be replaced during stack update operations. NON_PROVISIONABLE: The resource type doesn't include create, read, and delete handlers, and therefore can't actually be provisioned. The default is FULLY_MUTABLE."
          schema:
            $ref: "#/components/schemas/ProvisioningType"
        - name: DeprecatedStatus
          in: query
          required: false
          description: "The deprecation status of the extension that you want to get summary information about. Valid values include: LIVE: The extension is registered for use in CloudFormation operations. DEPRECATED: The extension has been deregistered and can no longer be used in CloudFormation operations."
          schema:
            $ref: "#/components/schemas/DeprecatedStatus"
        - name: Type
          in: query
          required: false
          description: The type of extension.
          schema:
            $ref: "#/components/schemas/RegistryType"
        - name: Filters
          in: query
          required: false
          description: Filter criteria to use in determining which extensions to return. Filters must be compatible with Visibility to return valid results. For example, specifying AWS_TYPES for Category and PRIVATE for Visibility returns an empty list of types, but specifying PUBLIC for Visibility returns the desired list.
          schema:
            $ref: "#/components/schemas/TypeFilters"
        - name: MaxResults
          in: query
          required: false
          description: The maximum number of results to be returned with a single call. If the number of available results exceeds this maximum, the response includes a NextToken value that you can assign to the NextToken request parameter to get the next set of results.
          schema:
            $ref: "#/components/schemas/MaxResults"
        - name: NextToken
          in: query
          required: false
          description: The token for the next set of items to return. (You received this token from a previous call.)
          schema:
            $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ListTypesOutputDisplay"
    post:
      operationId: POST_ListTypes
      description: Returns summary information about all extensions, including your private resource types, modules, and Hooks as well as all public extensions from Amazon Web Services and third-party publishers.
      responses:
        "200":
