          description: The default value used to describe the command. This is the value assumed by the parameter if no other value is assigned to it.
        valueConditions:
          $ref: "#/components/schemas/CommandParameterValueConditionList"
          description: The list of conditions that a command parameter value must satisfy to create a command execution.
        description:
          $ref: "#/components/schemas/CommandParameterDescription"
          description: The description of the command parameter.
      required:
        - name
    CommandParameterName:
      type: string
      minLength: 1
      maxLength: 192
