          description: The Amazon Resource Number (ARN) of the command. For example, arn:aws:iot:`<region>`:`<accountid>`:command/`<commandId>`
        targetArn:
          $ref: "#/components/schemas/TargetArn"
          description: The Amazon Resource Number (ARN) of the device on which the command execution is being performed.
        status:
          $ref: "#/components/schemas/CommandExecutionStatus"
          description: The status of the command execution. After your devices receive the command and start performing the operations specified in the command, it can use the UpdateCommandExecution MQTT API to update the status information.
        statusReason:
          $ref: "#/components/schemas/StatusReason"
          description: Your devices can use this parameter to provide additional context about the status of a command execution using a reason code and description.
        result:
          type: object
          properties: {}
          description: The result value for the current state of the command execution. The status provides information about the progress of the command execution. The device can use the result field to share additional details about the execution such as a return value of a remote function call. If you use the AWS-IoT-FleetWise namespace, then this field is not applicable in the API response.
        parameters:
          type: object
          properties: {}
          description: The list of parameters that the StartCommandExecution API used when performing the command on the device.
        executionTimeoutSeconds:
          $ref: "#/components/schemas/CommandExecutionTimeoutInSeconds"
          description: Specifies the amount of time in seconds that the device can take to finish a command execution. A timer starts when the command execution is created. If the command execution status is not set to another terminal state before the timer expires, it will automatically update to TIMED_OUT.
        createdAt:
          $ref: "#/components/schemas/DateType"
          description: The timestamp, when the command execution was created.
        lastUpdatedAt:
          $ref: "#/components/schemas/DateType"
          description: The timestamp, when the command execution was last updated.
        startedAt:
          $ref: "#/components/schemas/DateType"
          description: The timestamp, when the command execution was started.
        completedAt:
          $ref: "#/components/schemas/DateType"
          description: The timestamp, when the command execution was completed.
        timeToLive:
          $ref: "#/components/schemas/DateType"
          description: The time to live (TTL) parameter that indicates the duration for which executions will be retained in your account. The default value is six months.
    CommandExecutionStatus:
      type: string
      enum:
        - CREATED
        - IN_PROGRESS
        - SUCCEEDED
        - FAILED
        - REJECTED
        - TIMED_OUT
    StatusReason:
      description: Provide additional context about the status of a command execution using a reason code and description.
      type: object
      properties:
        reasonCode:
          $ref: "#/components/schemas/StatusReasonCode"
          description: A code that provides additional context for the command execution status.
        reasonDescription:
          $ref: "#/components/schemas/StatusReasonDescription"
          description: A literal string for devices to optionally provide additional information about the reason code for a command execution status.
      required:
        - reasonCode
    StatusReasonCode:
      type: string
      maxLength: 64
      pattern: "[A-Z0-9_-]+"
    StatusReasonDescription:
      type: string
      maxLength: 1024
      pattern: "[^\\p{C}]*"
    CommandExecutionTimeoutInSeconds:
      type: integer
      format: int64
      minimum: 1
