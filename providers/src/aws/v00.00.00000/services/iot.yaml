          description: The rate of increase for a job rollout. The number of things notified is multiplied by this factor.
        rateIncreaseCriteria:
          $ref: "#/components/schemas/AwsJobRateIncreaseCriteria"
          description: The criteria to initiate the increase in rate of rollout for a job. Amazon Web Services IoT Core supports up to one digit after the decimal (for example, 1.5, but not 1.55).
      required:
        - baseRatePerMinute
        - incrementFactor
        - rateIncreaseCriteria
