openapi: 3.0.0
info:
  version: "2015-05-28"
  title: AWS IoT
  description: AWS IoT
  x-serviceName: iot
  x-serviceAlias: iot
  x-protocol: rest-json
  x-apiVersion: "2015-05-28"
  x-endpointPrefix: iot
servers:
  - url: https://iot.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for iot
paths:
  /accept-certificate-transfer/{certificate_id}:
    patch:
      operationId: AcceptCertificateTransfer
      description: Accepts a pending certificate transfer. The default state of the certificate is INACTIVE. To check for pending certificate transfers, call ListCertificates to enumerate your certificates. Requires permission to access the AcceptCertificateTransfer action.
      parameters:
        - name: certificate_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CertificateId"
          description: The ID of the certificate. (The last part of the certificate ARN contains the certificate ID.)
        - name: setAsActive
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SetAsActive"
          description: Specifies whether the certificate is active.
      responses:
        "200":
          description: Success
  /billing-groups/addThingToBillingGroup:
    put:
      operationId: AddThingToBillingGroup
      description: Adds a thing to a billing group. Requires permission to access the AddThingToBillingGroup action.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                billingGroupName:
                  $ref: "#/components/schemas/BillingGroupName"
                billingGroupArn:
                  $ref: "#/components/schemas/BillingGroupArn"
                thingName:
                  $ref: "#/components/schemas/ThingName"
                thingArn:
                  $ref: "#/components/schemas/ThingArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddThingToBillingGroupResponse"
  /thing-groups/addThingToThingGroup:
    put:
      operationId: AddThingToThingGroup
      description: Adds a thing to a thing group. Requires permission to access the AddThingToThingGroup action.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                thingGroupName:
                  $ref: "#/components/schemas/ThingGroupName"
                thingGroupArn:
                  $ref: "#/components/schemas/ThingGroupArn"
                thingName:
                  $ref: "#/components/schemas/ThingName"
                thingArn:
                  $ref: "#/components/schemas/ThingArn"
                overrideDynamicGroups:
                  $ref: "#/components/schemas/OverrideDynamicGroups"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddThingToThingGroupResponse"
  /packages/{package_name}/versions/{version_name}/sbom:
    put:
      operationId: AssociateSbomWithPackageVersion
      description: Associates the selected software bill of materials (SBOM) with a specific software package version. Requires permission to access the AssociateSbomWithPackageVersion action.
      parameters:
        - name: package_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PackageName"
          description: The name of the new software package.
        - name: version_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VersionName"
          description: The name of the new package version.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique case-sensitive identifier that you can provide to ensure the idempotency of the request. Don't reuse this client token if a new idempotent request is required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sbom:
                  $ref: "#/components/schemas/Sbom"
              required:
                - sbom
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateSbomWithPackageVersionResponse"
    delete:
      operationId: DisassociateSbomFromPackageVersion
      description: Disassociates the selected software bill of materials (SBOM) from a specific software package version. Requires permission to access the DisassociateSbomWithPackageVersion action.
      parameters:
        - name: package_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PackageName"
          description: The name of the new software package.
        - name: version_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VersionName"
          description: The name of the new package version.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique case-sensitive identifier that you can provide to ensure the idempotency of the request. Don't reuse this client token if a new idempotent request is required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateSbomFromPackageVersionResponse"
  /jobs/{job_id}/targets:
    post:
      operationId: AssociateTargetsWithJob
      description: 'Associates a group with a continuous job. The following criteria must be met: The job must have been created with the targetSelection field set to "CONTINUOUS". The job status must currently be "IN_PROGRESS". The total number of targets associated with a job must not exceed 100. Requires permission to access the AssociateTargetsWithJob action.'
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The unique identifier you assigned to this job when it was created.
        - name: namespaceId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NamespaceId"
          description: The namespace used to indicate that a job is a customer-managed job. When you specify a value for this parameter, Amazon Web Services IoT Core sends jobs notifications to MQTT topics that contain the value in the following format. $aws/things/THING_NAME/jobs/JOB_ID/notify-namespace-NAMESPACE_ID/ The namespaceId feature is only supported by IoT Greengrass at this time. For more information, see Setting up IoT Greengrass core devices.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targets:
                  $ref: "#/components/schemas/JobTargets"
                comment:
                  $ref: "#/components/schemas/Comment"
              required:
                - targets
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateTargetsWithJobResponse"
  /target-policies/{policy_name}:
    put:
      operationId: AttachPolicy
      description: Attaches the specified policy to the specified principal (certificate or other credential). Requires permission to access the AttachPolicy action.
      parameters:
        - name: policy_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PolicyName"
          description: The name of the policy to attach.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target:
                  $ref: "#/components/schemas/PolicyTarget"
              required:
                - target
      responses:
        "200":
          description: Success
    post:
      operationId: DetachPolicy
      description: Detaches a policy from the specified target. Because of the distributed nature of Amazon Web Services, it can take up to five minutes after a policy is detached before it's ready to be deleted. Requires permission to access the DetachPolicy action.
      parameters:
        - name: policy_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PolicyName"
          description: The policy to detach.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target:
                  $ref: "#/components/schemas/PolicyTarget"
              required:
                - target
      responses:
        "200":
          description: Success
  /principal-policies/{policy_name}:
    put:
      operationId: AttachPrincipalPolicy
      description: "Attaches the specified policy to the specified principal (certificate or other credential). Note: This action is deprecated and works as expected for backward compatibility, but we won't add enhancements. Use AttachPolicy instead. Requires permission to access the AttachPrincipalPolicy action."
      parameters:
        - name: policy_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PolicyName"
          description: The policy name.
        - name: x-amzn-iot-principal
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Principal"
          description: The principal, which can be a certificate ARN (as returned from the CreateCertificate operation) or an Amazon Cognito ID.
      responses:
        "200":
          description: Success
    delete:
      operationId: DetachPrincipalPolicy
      description: "Removes the specified policy from the specified certificate. Note: This action is deprecated and works as expected for backward compatibility, but we won't add enhancements. Use DetachPolicy instead. Requires permission to access the DetachPrincipalPolicy action."
      parameters:
        - name: policy_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PolicyName"
          description: The name of the policy to detach.
        - name: x-amzn-iot-principal
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Principal"
          description: The principal. Valid principals are CertificateArn (arn:aws:iot:region:accountId:cert/certificateId), thingGroupArn (arn:aws:iot:region:accountId:thinggroup/groupName) and CognitoId (region:id).
      responses:
        "200":
          description: Success
  /security-profiles/{security_profile_name}/targets:
    put:
      operationId: AttachSecurityProfile
      description: Associates a Device Defender security profile with a thing group or this account. Each thing group or account can have up to five security profiles associated with it. Requires permission to access the AttachSecurityProfile action.
      parameters:
        - name: security_profile_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SecurityProfileName"
          description: The security profile that is attached.
        - name: securityProfileTargetArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SecurityProfileTargetArn"
          description: The ARN of the target (thing group) to which the security profile is attached.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachSecurityProfileResponse"
    delete:
      operationId: DetachSecurityProfile
      description: Disassociates a Device Defender security profile from a thing group or from this account. Requires permission to access the DetachSecurityProfile action.
      parameters:
        - name: security_profile_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SecurityProfileName"
          description: The security profile that is detached.
        - name: securityProfileTargetArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SecurityProfileTargetArn"
          description: The ARN of the thing group from which the security profile is detached.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetachSecurityProfileResponse"
    get:
      operationId: ListTargetsForSecurityProfile
      description: Lists the targets (thing groups) associated with a given Device Defender security profile. Requires permission to access the ListTargetsForSecurityProfile action.
      parameters:
        - name: security_profile_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SecurityProfileName"
          description: The security profile.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return at one time.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTargetsForSecurityProfileResponse"
  /things/{thing_name}/principals:
    put:
      operationId: AttachThingPrincipal
      description: Attaches the specified principal to the specified thing. A principal can be X.509 certificates, Amazon Cognito identities or federated identities. Requires permission to access the AttachThingPrincipal action.
      parameters:
        - name: thing_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ThingName"
          description: The name of the thing.
        - name: x-amzn-principal
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Principal"
          description: The principal, which can be a certificate ARN (as returned from the CreateCertificate operation) or an Amazon Cognito ID.
        - name: thingPrincipalType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ThingPrincipalType"
          description: The type of the relation you want to specify when you attach a principal to a thing. EXCLUSIVE_THING - Attaches the specified principal to the specified thing, exclusively. The thing will be the only thing that’s attached to the principal. NON_EXCLUSIVE_THING - Attaches the specified principal to the specified thing. Multiple things can be attached to the principal.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachThingPrincipalResponse"
    delete:
      operationId: DetachThingPrincipal
      description: Detaches the specified principal from the specified thing. A principal can be X.509 certificates, IAM users, groups, and roles, Amazon Cognito identities or federated identities. This call is asynchronous. It might take several seconds for the detachment to propagate. Requires permission to access the DetachThingPrincipal action.
      parameters:
        - name: thing_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ThingName"
          description: The name of the thing.
        - name: x-amzn-principal
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Principal"
          description: If the principal is a certificate, this value must be ARN of the certificate. If the principal is an Amazon Cognito identity, this value must be the ID of the Amazon Cognito identity.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetachThingPrincipalResponse"
    get:
      operationId: ListThingPrincipals
      description: Lists the principals associated with the specified thing. A principal can be X.509 certificates, IAM users, groups, and roles, Amazon Cognito identities or federated identities. Requires permission to access the ListThingPrincipals action.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: To retrieve the next set of results, the nextToken value from a previous response; otherwise null to receive the first set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RegistryMaxResults"
          description: The maximum number of results to return in this operation.
        - name: thing_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ThingName"
          description: The name of the thing.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListThingPrincipalsOutputDisplay"
  /audit/mitigationactions/tasks/{task_id}/cancel:
    put:
      operationId: CancelAuditMitigationActionsTask
      description: Cancels a mitigation action task that is in progress. If the task is not in progress, an InvalidRequestException occurs. Requires permission to access the CancelAuditMitigationActionsTask action.
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MitigationActionsTaskId"
          description: The unique identifier for the task that you want to cancel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelAuditMitigationActionsTaskResponse"
  /audit/tasks/{task_id}/cancel:
    put:
      operationId: CancelAuditTask
      description: Cancels an audit that is in progress. The audit can be either scheduled or on demand. If the audit isn't in progress, an "InvalidRequestException" occurs. Requires permission to access the CancelAuditTask action.
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AuditTaskId"
          description: The ID of the audit you want to cancel. You can only cancel an audit that is "IN_PROGRESS".
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelAuditTaskResponse"
  /cancel-certificate-transfer/{certificate_id}:
    patch:
      operationId: CancelCertificateTransfer
      description: Cancels a pending transfer for the specified certificate. Note Only the transfer source account can use this operation to cancel a transfer. (Transfer destinations can use RejectCertificateTransfer instead.) After transfer, IoT returns the certificate to the source account in the INACTIVE state. After the destination account has accepted the transfer, the transfer cannot be cancelled. After a certificate transfer is cancelled, the status of the certificate changes from PENDING_TRANSFER to INACTIVE. Requires permission to access the CancelCertificateTransfer action.
      parameters:
        - name: certificate_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CertificateId"
          description: The ID of the certificate. (The last part of the certificate ARN contains the certificate ID.)
      responses:
        "200":
          description: Success
  /detect/mitigationactions/tasks/{task_id}/cancel:
    put:
      operationId: CancelDetectMitigationActionsTask
      description: Cancels a Device Defender ML Detect mitigation action. Requires permission to access the CancelDetectMitigationActionsTask action.
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MitigationActionsTaskId"
          description: The unique identifier of the task.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelDetectMitigationActionsTaskResponse"
  /jobs/{job_id}/cancel:
    put:
      operationId: CancelJob
      description: Cancels a job. Requires permission to access the CancelJob action.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The unique identifier you assigned to this job when it was created.
        - name: force
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ForceFlag"
          description: (Optional) If true job executions with status "IN_PROGRESS" and "QUEUED" are canceled, otherwise only job executions with status "QUEUED" are canceled. The default is false. Canceling a job which is "IN_PROGRESS", will cause a device which is executing the job to be unable to update the job execution status. Use caution and ensure that each device executing a job which is canceled is able to recover to a valid state.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reasonCode:
                  $ref: "#/components/schemas/ReasonCode"
                comment:
                  $ref: "#/components/schemas/Comment"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelJobResponse"
  /things/{thing_name}/jobs/{job_id}/cancel:
    put:
      operationId: CancelJobExecution
      description: Cancels the execution of a job for a given thing. Requires permission to access the CancelJobExecution action.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The ID of the job to be canceled.
        - name: thing_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ThingName"
          description: The name of the thing whose execution of the job will be canceled.
        - name: force
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ForceFlag"
          description: (Optional) If true the job execution will be canceled if it has status IN_PROGRESS or QUEUED, otherwise the job execution will be canceled only if it has status QUEUED. If you attempt to cancel a job execution that is IN_PROGRESS, and you do not set force to true, then an InvalidStateTransitionException will be thrown. The default is false. Canceling a job execution which is "IN_PROGRESS", will cause the device to be unable to update the job execution status. Use caution and ensure that the device is able to recover to a valid state.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                expectedVersion:
                  $ref: "#/components/schemas/ExpectedVersion"
                statusDetails:
                  $ref: "#/components/schemas/DetailsMap"
      responses:
        "200":
          description: Success
  /default-authorizer:
    delete:
      operationId: ClearDefaultAuthorizer
      description: Clears the default authorizer. Requires permission to access the ClearDefaultAuthorizer action.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClearDefaultAuthorizerResponse"
    get:
      operationId: DescribeDefaultAuthorizer
      description: Describes the default authorizer. Requires permission to access the DescribeDefaultAuthorizer action.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDefaultAuthorizerResponse"
    post:
      operationId: SetDefaultAuthorizer
      description: Sets the default authorizer. This will be used if a websocket connection is made without specifying an authorizer. Requires permission to access the SetDefaultAuthorizer action.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                authorizerName:
                  $ref: "#/components/schemas/AuthorizerName"
              required:
                - authorizerName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetDefaultAuthorizerResponse"
  /confirmdestination/{confirmation_token}:
    get:
      operationId: ConfirmTopicRuleDestination
      description: Confirms a topic rule destination. When you create a rule requiring a destination, IoT sends a confirmation message to the endpoint or base address you specify. The message includes a token which you pass back when calling ConfirmTopicRuleDestination to confirm that you own or have access to the endpoint. Requires permission to access the ConfirmTopicRuleDestination action.
      parameters:
        - name: confirmation_token
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConfirmationToken"
          description: The token used to confirm ownership or access to the topic rule confirmation URL.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmTopicRuleDestinationResponse"
  /audit/suppressions/create:
    post:
      operationId: CreateAuditSuppression
      description: Creates a Device Defender audit suppression. Requires permission to access the CreateAuditSuppression action.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                checkName:
                  $ref: "#/components/schemas/AuditCheckName"
                resourceIdentifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
                expirationDate:
                  $ref: "#/components/schemas/Timestamp"
                suppressIndefinitely:
                  $ref: "#/components/schemas/SuppressIndefinitely"
                description:
                  $ref: "#/components/schemas/AuditDescription"
                clientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - checkName
                - resourceIdentifier
                - clientRequestToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAuditSuppressionResponse"
  /authorizer/{authorizer_name}:
    post:
      operationId: CreateAuthorizer
      description: Creates an authorizer. Requires permission to access the CreateAuthorizer action.
      parameters:
        - name: authorizer_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AuthorizerName"
          description: The authorizer name.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                authorizerFunctionArn:
                  $ref: "#/components/schemas/AuthorizerFunctionArn"
                tokenKeyName:
                  $ref: "#/components/schemas/TokenKeyName"
                tokenSigningPublicKeys:
                  $ref: "#/components/schemas/PublicKeyMap"
                status:
                  $ref: "#/components/schemas/AuthorizerStatus"
                tags:
                  $ref: "#/components/schemas/TagList"
                signingDisabled:
                  $ref: "#/components/schemas/BooleanKey"
                enableCachingForHttp:
                  $ref: "#/components/schemas/EnableCachingForHttp"
              required:
                - authorizerFunctionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAuthorizerResponse"
    delete:
      operationId: DeleteAuthorizer
      description: Deletes an authorizer. Requires permission to access the DeleteAuthorizer action.
      parameters:
        - name: authorizer_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AuthorizerName"
          description: The name of the authorizer to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAuthorizerResponse"
    get:
      operationId: DescribeAuthorizer
      description: Describes an authorizer. Requires permission to access the DescribeAuthorizer action.
      parameters:
        - name: authorizer_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AuthorizerName"
          description: The name of the authorizer to describe.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAuthorizerResponse"
    put:
      operationId: UpdateAuthorizer
      description: Updates an authorizer. Requires permission to access the UpdateAuthorizer action.
      parameters:
        - name: authorizer_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AuthorizerName"
          description: The authorizer name.
      requestBody:
        required: false
        content:
