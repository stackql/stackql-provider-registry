          description: Thing indexing configuration.
        thingGroupIndexingConfiguration:
          $ref: "#/components/schemas/ThingGroupIndexingConfiguration"
          description: The index configuration.
    ThingIndexingConfiguration:
      description: The thing indexing configuration. For more information, see Managing Thing Indexing.
      type: object
      properties:
        thingIndexingMode:
          $ref: "#/components/schemas/ThingIndexingMode"
          description: "Thing indexing mode. Valid values are: REGISTRY – Your thing index contains registry data only. REGISTRY_AND_SHADOW - Your thing index contains registry and shadow data. OFF - Thing indexing is disabled."
        thingConnectivityIndexingMode:
          $ref: "#/components/schemas/ThingConnectivityIndexingMode"
          description: "Thing connectivity indexing mode. Valid values are: STATUS – Your thing index contains connectivity status. To enable thing connectivity indexing, thingIndexMode must not be set to OFF. OFF - Thing connectivity status indexing is disabled."
        deviceDefenderIndexingMode:
          $ref: "#/components/schemas/DeviceDefenderIndexingMode"
          description: "Device Defender indexing mode. Valid values are: VIOLATIONS – Your thing index contains Device Defender violations. To enable Device Defender indexing, deviceDefenderIndexingMode must not be set to OFF. OFF - Device Defender indexing is disabled. For more information about Device Defender violations, see Device Defender Detect."
        namedShadowIndexingMode:
          $ref: "#/components/schemas/NamedShadowIndexingMode"
          description: "Named shadow indexing mode. Valid values are: ON – Your thing index contains named shadow. To enable thing named shadow indexing, namedShadowIndexingMode must not be set to OFF. OFF - Named shadow indexing is disabled. For more information about Shadows, see IoT Device Shadow service."
        managedFields:
          $ref: "#/components/schemas/Fields"
          description: Contains fields that are indexed and whose types are already known by the Fleet Indexing service. This is an optional field. For more information, see Managed fields in the Amazon Web Services IoT Core Developer Guide. You can't modify managed fields by updating fleet indexing configuration.
        customFields:
          $ref: "#/components/schemas/Fields"
          description: Contains custom field names and their data type.
        filter:
          $ref: "#/components/schemas/IndexingFilter"
          description: "Provides additional selections for named shadows and geolocation data. To add named shadows to your fleet indexing configuration, set namedShadowIndexingMode to be ON and specify your shadow names in namedShadowNames filter. To add geolocation data to your fleet indexing configuration: If you store geolocation data in a class/unnamed shadow, set thingIndexingMode to be REGISTRY_AND_SHADOW and specify your geolocation data in geoLocations filter. If you store geolocation data in a named shadow, set namedShadowIndexingMode to be ON, add the shadow name in namedShadowNames filter, and specify your geolocation data in geoLocations filter. For more information, see Managing fleet indexing."
      required:
        - thingIndexingMode
    ThingIndexingMode:
      type: string
      enum:
        - "OFF"
        - REGISTRY
        - REGISTRY_AND_SHADOW
    ThingConnectivityIndexingMode:
      type: string
      enum:
        - "OFF"
        - STATUS
    DeviceDefenderIndexingMode:
      type: string
      enum:
        - "OFF"
        - VIOLATIONS
    NamedShadowIndexingMode:
      type: string
      enum:
        - "OFF"
        - "ON"
    Fields:
      type: array
      items:
        $ref: "#/components/schemas/Field"
    Field:
      description: Describes the name and data type at a field.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/FieldName"
          description: The name of the field.
        type_:
          $ref: "#/components/schemas/FieldType"
          description: The data type of the field.
