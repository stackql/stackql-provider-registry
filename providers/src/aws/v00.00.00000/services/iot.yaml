      minimum: 1
    TimeoutConfig:
      description: Specifies the amount of time each device has to finish its execution of the job. A timer is started when the job execution status is set to IN_PROGRESS. If the job execution status is not set to another terminal state before the timer expires, it will be automatically set to TIMED_OUT.
      type: object
      properties:
        inProgressTimeoutInMinutes:
          $ref: "#/components/schemas/InProgressTimeoutInMinutes"
          description: Specifies the amount of time, in minutes, this device has to finish execution of this job. The timeout interval can be anywhere between 1 minute and 7 days (1 to 10080 minutes). The in progress timer can't be updated and will apply to all job executions for the job. Whenever a job execution remains in the IN_PROGRESS status for longer than this interval, the job execution will fail and switch to the terminal TIMED_OUT status.
    InProgressTimeoutInMinutes:
      type: integer
      format: int64
    JobTemplateArn:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: ^arn:[!-~]+$
    JobExecutionsRetryConfig:
