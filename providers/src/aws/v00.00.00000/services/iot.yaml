      type: string
    FieldType:
      type: string
      enum:
        - Number
        - String
        - Boolean
    IndexingFilter:
      description: "Provides additional selections for named shadows and geolocation data. To add named shadows to your fleet indexing configuration, set namedShadowIndexingMode to be ON and specify your shadow names in namedShadowNames filter. To add geolocation data to your fleet indexing configuration: If you store geolocation data in a class/unnamed shadow, set thingIndexingMode to be REGISTRY_AND_SHADOW and specify your geolocation data in geoLocations filter. If you store geolocation data in a named shadow, set namedShadowIndexingMode to be ON, add the shadow name in namedShadowNames filter, and specify your geolocation data in geoLocations filter. For more information, see Managing fleet indexing."
      type: object
      properties:
        namedShadowNames:
          $ref: "#/components/schemas/NamedShadowNamesFilter"
          description: The shadow names that you select to index. The default maximum number of shadow names for indexing is 10. To increase the limit, see Amazon Web Services IoT Device Management Quotas in the Amazon Web Services General Reference.
        geoLocations:
          $ref: "#/components/schemas/GeoLocationsFilter"
          description: The list of geolocation targets that you select to index. The default maximum number of geolocation targets for indexing is 1. To increase the limit, see Amazon Web Services IoT Device Management Quotas in the Amazon Web Services General Reference.
    NamedShadowNamesFilter:
      type: array
      items:
        $ref: "#/components/schemas/ShadowName"
    ShadowName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[$a-zA-Z0-9:_-]+"
    GeoLocationsFilter:
      type: array
      items:
        $ref: "#/components/schemas/GeoLocationTarget"
    GeoLocationTarget:
      description: A geolocation target that you select to index. Each geolocation target contains a name and order key-value pair that specifies the geolocation target fields.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/TargetFieldName"
          description: The name of the geolocation target field. If the target field is part of a named shadow, you must select the named shadow using the namedShadow filter.
        order:
          $ref: "#/components/schemas/TargetFieldOrder"
          description: The order of the geolocation target field. This field is optional. The default value is LatLon.
    TargetFieldName:
      type: string
    TargetFieldOrder:
      type: string
      enum:
        - LatLon
        - LonLat
    ThingGroupIndexingConfiguration:
