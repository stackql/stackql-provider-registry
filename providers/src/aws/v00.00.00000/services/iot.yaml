          description: What is measured by the behavior.
        metricDimension:
          $ref: "#/components/schemas/MetricDimension"
          description: The dimension for a metric in your behavior. For example, using a TOPIC_FILTER dimension, you can narrow down the scope of the metric to only MQTT topics where the name matches the pattern specified in the dimension. This can't be used with custom metrics.
        criteria:
          $ref: "#/components/schemas/BehaviorCriteria"
          description: The criteria that determine if a device is behaving normally in regard to the metric. In the IoT console, you can choose to be sent an alert through Amazon SNS when IoT Device Defender detects that a device is behaving anomalously.
        suppressAlerts:
          $ref: "#/components/schemas/SuppressAlerts"
          description: Suppresses alerts.
        exportMetric:
          $ref: "#/components/schemas/ExportMetric"
          description: Value indicates exporting metrics related to the behavior when it is true.
      required:
        - name
    BehaviorName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9:_-]+"
    BehaviorMetric:
      type: string
    MetricDimension:
      description: The dimension of a metric.
      type: object
      properties:
        dimensionName:
          $ref: "#/components/schemas/DimensionName"
          description: A unique identifier for the dimension.
        operator:
          $ref: "#/components/schemas/DimensionValueOperator"
          description: "Defines how the dimensionValues of a dimension are interpreted. For example, for dimension type TOPIC_FILTER, the IN operator, a message will be counted only if its topic matches one of the topic filters. With NOT_IN operator, a message will be counted only if it doesn't match any of the topic filters. The operator is optional: if it's not provided (is null), it will be interpreted as IN."
      required:
        - dimensionName
    DimensionValueOperator:
      type: string
      enum:
        - IN
        - NOT_IN
    BehaviorCriteria:
      description: The criteria by which the behavior is determined to be normal.
      type: object
      properties:
        comparisonOperator:
          $ref: "#/components/schemas/ComparisonOperator"
          description: "The operator that relates the thing measured (metric) to the criteria (containing a value or statisticalThreshold). Valid operators include: string-list: in-set and not-in-set number-list: in-set and not-in-set ip-address-list: in-cidr-set and not-in-cidr-set number: less-than, less-than-equals, greater-than, and greater-than-equals"
        value:
          $ref: "#/components/schemas/MetricValue"
          description: The value to be compared with the metric.
        durationSeconds:
          $ref: "#/components/schemas/DurationSeconds"
          description: Use this to specify the time duration over which the behavior is evaluated, for those criteria that have a time dimension (for example, NUM_MESSAGES_SENT). For a statisticalThreshhold metric comparison, measurements from all devices are accumulated over this time duration before being used to calculate percentiles, and later, measurements from an individual device are also accumulated over this time duration before being given a percentile rank. Cannot be used with list-based metric datatypes.
        consecutiveDatapointsToAlarm:
          $ref: "#/components/schemas/ConsecutiveDatapointsToAlarm"
          description: If a device is in violation of the behavior for the specified number of consecutive datapoints, an alarm occurs. If not specified, the default is 1.
        consecutiveDatapointsToClear:
          $ref: "#/components/schemas/ConsecutiveDatapointsToClear"
          description: If an alarm has occurred and the offending device is no longer in violation of the behavior for the specified number of consecutive datapoints, the alarm is cleared. If not specified, the default is 1.
        statisticalThreshold:
          $ref: "#/components/schemas/StatisticalThreshold"
          description: A statistical ranking (percentile)that indicates a threshold value by which a behavior is determined to be in compliance or in violation of the behavior.
        mlDetectionConfig:
          $ref: "#/components/schemas/MachineLearningDetectionConfig"
          description: The configuration of an ML Detect
    ComparisonOperator:
      type: string
      enum:
        - less-than
        - less-than-equals
        - greater-than
        - greater-than-equals
        - in-cidr-set
        - not-in-cidr-set
        - in-port-set
        - not-in-port-set
        - in-set
        - not-in-set
    MetricValue:
      description: The value to be compared with the metric.
      type: object
      properties:
        count:
          $ref: "#/components/schemas/UnsignedLong"
          description: If the comparisonOperator calls for a numeric value, use this to specify that numeric value to be compared with the metric.
        cidrs:
          $ref: "#/components/schemas/Cidrs"
          description: If the comparisonOperator calls for a set of CIDRs, use this to specify that set to be compared with the metric.
        ports:
          $ref: "#/components/schemas/Ports"
          description: If the comparisonOperator calls for a set of ports, use this to specify that set to be compared with the metric.
        number:
          $ref: "#/components/schemas/Number"
          description: The numeral value of a metric.
        numbers:
          $ref: "#/components/schemas/NumberList"
          description: The numeral values of a metric.
        strings:
          $ref: "#/components/schemas/StringList"
          description: The string values of a metric.
    UnsignedLong:
      type: integer
      format: int64
      minimum: 0
    Cidrs:
      type: array
      items:
        $ref: "#/components/schemas/Cidr"
    Cidr:
      type: string
      minLength: 2
      maxLength: 43
      pattern: "[a-fA-F0-9:\\.\\/]+"
    Ports:
      type: array
      items:
        $ref: "#/components/schemas/Port"
    Port:
      type: integer
      minimum: 0
      maximum: 65535
    Number:
      type: number
      format: double
    NumberList:
      type: array
      items:
        $ref: "#/components/schemas/Number"
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/stringValue"
    stringValue:
      type: string
    DurationSeconds:
      type: integer
    ConsecutiveDatapointsToAlarm:
      type: integer
      minimum: 1
      maximum: 10
    ConsecutiveDatapointsToClear:
      type: integer
      minimum: 1
      maximum: 10
    StatisticalThreshold:
      description: A statistical ranking (percentile) that indicates a threshold value by which a behavior is determined to be in compliance or in violation of the behavior.
      type: object
      properties:
        statistic:
          $ref: "#/components/schemas/EvaluationStatistic"
          description: The percentile that resolves to a threshold value by which compliance with a behavior is determined. Metrics are collected over the specified period (durationSeconds) from all reporting devices in your account and statistical ranks are calculated. Then, the measurements from a device are collected over the same period. If the accumulated measurements from the device fall above or below (comparisonOperator) the value associated with the percentile specified, then the device is considered to be in compliance with the behavior, otherwise a violation occurs.
    EvaluationStatistic:
      type: string
      pattern: (p0|p0\.1|p0\.01|p1|p10|p50|p90|p99|p99\.9|p99\.99|p100)
    MachineLearningDetectionConfig:
      description: The configuration of an ML Detect Security Profile.
      type: object
      properties:
        confidenceLevel:
          $ref: "#/components/schemas/ConfidenceLevel"
          description: The sensitivity of anomalous behavior evaluation. Can be Low, Medium, or High.
      required:
        - confidenceLevel
    ConfidenceLevel:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
    SuppressAlerts:
      type: boolean
    ExportMetric:
      type: boolean
    AlertTargets:
      type: object
      properties: {}
    AdditionalMetricsToRetainList:
      type: array
      items:
        $ref: "#/components/schemas/BehaviorMetric"
    AdditionalMetricsToRetainV2List:
      type: array
      items:
        $ref: "#/components/schemas/MetricToRetain"
    MetricToRetain:
      description: The metric you want to retain. Dimensions are optional.
      type: object
      properties:
        metric:
          $ref: "#/components/schemas/BehaviorMetric"
          description: What is measured by the behavior.
        metricDimension:
          $ref: "#/components/schemas/MetricDimension"
          description: The dimension of a metric. This can't be used with custom metrics.
        exportMetric:
          $ref: "#/components/schemas/ExportMetric"
          description: The value indicates exporting metrics related to the MetricToRetain when it's true.
      required:
        - metric
    MetricsExportConfig:
      description: Set configurations for metrics export.
      type: object
      properties:
        mqttTopic:
          $ref: "#/components/schemas/MqttTopic"
          description: The MQTT topic that Device Defender Detect should publish messages to for metrics export.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: This role ARN has permission to publish MQTT messages, after which Device Defender Detect can assume the role and publish messages on your behalf.
      required:
        - mqttTopic
        - roleArn
    MqttTopic:
      type: string
      minLength: 1
      maxLength: 512
    CreateSecurityProfileResponse:
      type: object
      properties:
        securityProfileName:
          $ref: "#/components/schemas/SecurityProfileName"
          description: The name you gave to the security profile.
        securityProfileArn:
          $ref: "#/components/schemas/SecurityProfileArn"
          description: The ARN of the security profile.
    SecurityProfileArn:
      type: string
    StreamDescription:
      type: string
      maxLength: 2028
      pattern: "[^\\p{C}]+"
    StreamFiles:
      type: array
      items:
        $ref: "#/components/schemas/StreamFile"
    StreamFile:
      description: Represents a file to stream.
      type: object
      properties:
        fileId:
          $ref: "#/components/schemas/FileId"
          description: The file ID.
        s3Location:
          $ref: "#/components/schemas/S3Location"
          description: The location of the file in S3.
    CreateStreamResponse:
      type: object
      properties:
        streamId:
          $ref: "#/components/schemas/StreamId"
          description: The stream ID.
        streamArn:
          $ref: "#/components/schemas/StreamArn"
          description: The stream ARN.
        description:
          $ref: "#/components/schemas/StreamDescription"
          description: A description of the stream.
        streamVersion:
          $ref: "#/components/schemas/StreamVersion"
          description: The version of the stream.
    StreamArn:
      type: string
    StreamVersion:
      type: integer
      minimum: 0
      maximum: 65535
    ThingTypeName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9:_-]+"
    CreateThingResponse:
      description: The output of the CreateThing operation.
      type: object
      properties:
        thingName:
          $ref: "#/components/schemas/ThingName"
          description: The name of the new thing.
        thingArn:
          $ref: "#/components/schemas/ThingArn"
          description: The ARN of the new thing.
        thingId:
          $ref: "#/components/schemas/ThingId"
          description: The thing ID.
    ThingId:
      type: string
    CreateThingGroupResponse:
      type: object
      properties:
        thingGroupName:
          $ref: "#/components/schemas/ThingGroupName"
          description: The thing group name.
        thingGroupArn:
          $ref: "#/components/schemas/ThingGroupArn"
          description: The thing group ARN.
        thingGroupId:
          $ref: "#/components/schemas/ThingGroupId"
          description: The thing group ID.
    ThingTypeProperties:
      description: "The ThingTypeProperties contains information about the thing type including: a thing type description, and a list of searchable thing attribute names."
      type: object
      properties:
        thingTypeDescription:
          $ref: "#/components/schemas/ThingTypeDescription"
          description: The description of the thing type.
        searchableAttributes:
          $ref: "#/components/schemas/SearchableAttributes"
          description: A list of searchable thing attribute names.
        mqtt5Configuration:
          $ref: "#/components/schemas/Mqtt5Configuration"
          description: The configuration to add user-defined properties to enrich MQTT 5 messages.
    ThingTypeDescription:
      type: string
      maxLength: 2028
      pattern: "[\\p{Graph}\\x20]*"
    SearchableAttributes:
      type: array
      items:
        $ref: "#/components/schemas/AttributeName"
    AttributeName:
      type: string
      maxLength: 128
      pattern: "[a-zA-Z0-9_.,@/:#-]+"
    Mqtt5Configuration:
      description: The configuration to add user-defined properties to enrich MQTT 5 messages.
      type: object
      properties:
        propagatingAttributes:
          $ref: "#/components/schemas/PropagatingAttributeList"
          description: An object that represents the propagating thing attributes and the connection attributes.
    PropagatingAttributeList:
      type: array
      items:
        $ref: "#/components/schemas/PropagatingAttribute"
    PropagatingAttribute:
      description: An object that represents the connection attribute, thing attribute, and the user property key.
      type: object
      properties:
        userPropertyKey:
          $ref: "#/components/schemas/UserPropertyKeyName"
          description: The key of the user property key-value pair.
        thingAttribute:
          $ref: "#/components/schemas/AttributeName"
          description: The user-defined thing attribute that is propagating for MQTT 5 message enrichment.
        connectionAttribute:
          $ref: "#/components/schemas/ConnectionAttributeName"
          description: The attribute associated with the connection between a device and Amazon Web Services IoT Core.
    UserPropertyKeyName:
      type: string
      maxLength: 128
      pattern: "[a-zA-Z0-9:$.]+"
    ConnectionAttributeName:
      type: string
      maxLength: 128
      pattern: "[a-zA-Z0-9:.]+"
    CreateThingTypeResponse:
      description: The output of the CreateThingType operation.
      type: object
      properties:
        thingTypeName:
          $ref: "#/components/schemas/ThingTypeName"
          description: The name of the thing type.
        thingTypeArn:
          $ref: "#/components/schemas/ThingTypeArn"
          description: The Amazon Resource Name (ARN) of the thing type.
        thingTypeId:
          $ref: "#/components/schemas/ThingTypeId"
          description: The thing type ID.
    ThingTypeArn:
      type: string
    ThingTypeId:
      type: string
    RuleName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z0-9_]+$
    String:
      type: string
    TopicRulePayload:
      description: Describes a rule.
      type: object
      properties:
        sql:
          $ref: "#/components/schemas/SQL"
          description: The SQL statement used to query the topic. For more information, see IoT SQL Reference in the IoT Developer Guide.
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the rule.
        actions:
          $ref: "#/components/schemas/ActionList"
          description: The actions associated with the rule.
        ruleDisabled:
          $ref: "#/components/schemas/IsDisabled"
          description: Specifies whether the rule is disabled.
        awsIotSqlVersion:
          $ref: "#/components/schemas/AwsIotSqlVersion"
          description: The version of the SQL rules engine to use when evaluating the rule.
        errorAction:
          $ref: "#/components/schemas/Action"
          description: The action to take when an error occurs.
      required:
        - sql
        - actions
    SQL:
      type: string
    Description:
      type: string
    ActionList:
      type: array
      items:
        $ref: "#/components/schemas/Action"
    Action:
      description: Describes the actions associated with a rule.
      type: object
      properties:
        dynamoDB:
          $ref: "#/components/schemas/DynamoDBAction"
          description: Write to a DynamoDB table.
        dynamoDBv2:
          $ref: "#/components/schemas/DynamoDBv2Action"
          description: Write to a DynamoDB table. This is a new version of the DynamoDB action. It allows you to write each attribute in an MQTT message payload into a separate DynamoDB column.
        lambda:
          $ref: "#/components/schemas/LambdaAction"
          description: Invoke a Lambda function.
        sns:
          $ref: "#/components/schemas/SnsAction"
          description: Publish to an Amazon SNS topic.
        sqs:
          $ref: "#/components/schemas/SqsAction"
          description: Publish to an Amazon SQS queue.
        kinesis:
          $ref: "#/components/schemas/KinesisAction"
          description: Write data to an Amazon Kinesis stream.
        republish:
          $ref: "#/components/schemas/RepublishAction"
          description: Publish to another MQTT topic.
        s3:
          $ref: "#/components/schemas/S3Action"
          description: Write to an Amazon S3 bucket.
        firehose:
          $ref: "#/components/schemas/FirehoseAction"
          description: Write to an Amazon Kinesis Firehose stream.
        cloudwatchMetric:
          $ref: "#/components/schemas/CloudwatchMetricAction"
          description: Capture a CloudWatch metric.
        cloudwatchAlarm:
          $ref: "#/components/schemas/CloudwatchAlarmAction"
          description: Change the state of a CloudWatch alarm.
        cloudwatchLogs:
          $ref: "#/components/schemas/CloudwatchLogsAction"
          description: Send data to CloudWatch Logs.
        elasticsearch:
          $ref: "#/components/schemas/ElasticsearchAction"
          description: Write data to an Amazon OpenSearch Service domain. The Elasticsearch action can only be used by existing rule actions. To create a new rule action or to update an existing rule action, use the OpenSearch rule action instead. For more information, see OpenSearchAction.
        salesforce:
          $ref: "#/components/schemas/SalesforceAction"
          description: Send a message to a Salesforce IoT Cloud Input Stream.
        iotAnalytics:
          $ref: "#/components/schemas/IotAnalyticsAction"
          description: Sends message data to an IoT Analytics channel.
        iotEvents:
          $ref: "#/components/schemas/IotEventsAction"
          description: Sends an input to an IoT Events detector.
        iotSiteWise:
          $ref: "#/components/schemas/IotSiteWiseAction"
          description: Sends data from the MQTT message that triggered the rule to IoT SiteWise asset properties.
        stepFunctions:
          $ref: "#/components/schemas/StepFunctionsAction"
          description: Starts execution of a Step Functions state machine.
        timestream:
          $ref: "#/components/schemas/TimestreamAction"
          description: The Timestream rule action writes attributes (measures) from an MQTT message into an Amazon Timestream table. For more information, see the Timestream topic rule action documentation.
        http:
          $ref: "#/components/schemas/HttpAction"
          description: Send data to an HTTPS endpoint.
        kafka:
          $ref: "#/components/schemas/KafkaAction"
          description: Send messages to an Amazon Managed Streaming for Apache Kafka (Amazon MSK) or self-managed Apache Kafka cluster.
        openSearch:
          $ref: "#/components/schemas/OpenSearchAction"
          description: Write data to an Amazon OpenSearch Service domain.
        location:
          $ref: "#/components/schemas/LocationAction"
          description: The Amazon Location Service rule action sends device location updates from an MQTT message to an Amazon Location tracker resource.
    DynamoDBAction:
      description: 'Describes an action to write to a DynamoDB table. The tableName, hashKeyField, and rangeKeyField values must match the values used when you created the table. The hashKeyValue and rangeKeyvalue fields use a substitution template syntax. These templates provide data at runtime. The syntax is as follows: ${sql-expression}. You can specify any valid expression in a WHERE or SELECT clause, including JSON properties, comparisons, calculations, and functions. For example, the following field uses the third level of the topic: "hashKeyValue": "${topic(3)}" The following field uses the timestamp: "rangeKeyValue": "${timestamp()}"'
      type: object
      properties:
        tableName:
          $ref: "#/components/schemas/TableName"
          description: The name of the DynamoDB table.
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: The ARN of the IAM role that grants access to the DynamoDB table.
        operation:
          $ref: "#/components/schemas/DynamoOperation"
          description: "The type of operation to be performed. This follows the substitution template, so it can be ${operation}, but the substitution must result in one of the following: INSERT, UPDATE, or DELETE."
        hashKeyField:
          $ref: "#/components/schemas/HashKeyField"
          description: The hash key name.
        hashKeyValue:
          $ref: "#/components/schemas/HashKeyValue"
          description: The hash key value.
        hashKeyType:
          $ref: "#/components/schemas/DynamoKeyType"
          description: The hash key type. Valid values are "STRING" or "NUMBER"
        rangeKeyField:
          $ref: "#/components/schemas/RangeKeyField"
          description: The range key name.
        rangeKeyValue:
          $ref: "#/components/schemas/RangeKeyValue"
          description: The range key value.
        rangeKeyType:
          $ref: "#/components/schemas/DynamoKeyType"
          description: The range key type. Valid values are "STRING" or "NUMBER"
        payloadField:
          $ref: "#/components/schemas/PayloadField"
          description: The action payload. This name can be customized.
      required:
        - tableName
        - roleArn
        - hashKeyField
        - hashKeyValue
    TableName:
      type: string
    AwsArn:
      type: string
    DynamoOperation:
      type: string
    HashKeyField:
      type: string
    HashKeyValue:
      type: string
    DynamoKeyType:
      type: string
      enum:
        - STRING
        - NUMBER
    RangeKeyField:
      type: string
    RangeKeyValue:
      type: string
    PayloadField:
      type: string
    DynamoDBv2Action:
      description: Describes an action to write to a DynamoDB table. This DynamoDB action writes each attribute in the message payload into it's own column in the DynamoDB table.
      type: object
      properties:
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: The ARN of the IAM role that grants access to the DynamoDB table.
        putItem:
          $ref: "#/components/schemas/PutItemInput"
          description: 'Specifies the DynamoDB table to which the message data will be written. For example: { "dynamoDBv2": { "roleArn": "aws:iam:12341251:my-role" "putItem": { "tableName": "my-table" } } } Each attribute in the message payload will be written to a separate column in the DynamoDB database.'
      required:
        - roleArn
        - putItem
    PutItemInput:
      description: The input for the DynamoActionVS action that specifies the DynamoDB table to which the message data will be written.
      type: object
      properties:
        tableName:
          $ref: "#/components/schemas/TableName"
          description: The table where the message data will be written.
      required:
        - tableName
    LambdaAction:
      description: Describes an action to invoke a Lambda function.
      type: object
      properties:
        functionArn:
          $ref: "#/components/schemas/FunctionArn"
          description: The ARN of the Lambda function.
      required:
        - functionArn
    FunctionArn:
      type: string
    SnsAction:
      description: Describes an action to publish to an Amazon SNS topic.
      type: object
      properties:
        targetArn:
          $ref: "#/components/schemas/AwsArn"
          description: The ARN of the SNS topic.
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: The ARN of the IAM role that grants access.
        messageFormat:
          $ref: "#/components/schemas/MessageFormat"
          description: (Optional) The message format of the message to publish. Accepted values are "JSON" and "RAW". The default value of the attribute is "RAW". SNS uses this setting to determine if the payload should be parsed and relevant platform-specific bits of the payload should be extracted. To read more about SNS message formats, see https://docs.aws.amazon.com/sns/latest/dg/json-formats.html refer to their official documentation.
      required:
        - targetArn
        - roleArn
    MessageFormat:
      type: string
      enum:
        - RAW
        - JSON
    SqsAction:
      description: Describes an action to publish data to an Amazon SQS queue.
      type: object
      properties:
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: The ARN of the IAM role that grants access.
        queueUrl:
          $ref: "#/components/schemas/QueueUrl"
          description: The URL of the Amazon SQS queue.
        useBase64:
          $ref: "#/components/schemas/UseBase64"
          description: Specifies whether to use Base64 encoding.
      required:
        - roleArn
        - queueUrl
    QueueUrl:
      type: string
    UseBase64:
      type: boolean
    KinesisAction:
      description: Describes an action to write data to an Amazon Kinesis stream.
      type: object
      properties:
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: The ARN of the IAM role that grants access to the Amazon Kinesis stream.
        streamName:
          $ref: "#/components/schemas/StreamName"
          description: The name of the Amazon Kinesis stream.
        partitionKey:
          $ref: "#/components/schemas/PartitionKey"
          description: The partition key.
      required:
        - roleArn
        - streamName
    StreamName:
      type: string
    PartitionKey:
      type: string
    RepublishAction:
      description: Describes an action to republish to another topic.
      type: object
      properties:
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: The ARN of the IAM role that grants access.
        topic:
          $ref: "#/components/schemas/TopicPattern"
          description: The name of the MQTT topic.
        qos:
          $ref: "#/components/schemas/Qos"
          description: The Quality of Service (QoS) level to use when republishing messages. The default value is 0.
        headers:
          $ref: "#/components/schemas/MqttHeaders"
          description: MQTT Version 5.0 headers information. For more information, see MQTT from the Amazon Web Services IoT Core Developer Guide.
      required:
        - roleArn
        - topic
    TopicPattern:
      type: string
    Qos:
      type: integer
      minimum: 0
      maximum: 1
    MqttHeaders:
      description: Specifies MQTT Version 5.0 headers information. For more information, see MQTT from Amazon Web Services IoT Core Developer Guide.
      type: object
      properties:
        payloadFormatIndicator:
          $ref: "#/components/schemas/PayloadFormatIndicator"
          description: An Enum string value that indicates whether the payload is formatted as UTF-8. Valid values are UNSPECIFIED_BYTES and UTF8_DATA. For more information, see Payload Format Indicator from the MQTT Version 5.0 specification. Supports substitution templates.
        contentType:
          $ref: "#/components/schemas/ContentType"
          description: A UTF-8 encoded string that describes the content of the publishing message. For more information, see Content Type from the MQTT Version 5.0 specification. Supports substitution templates.
        responseTopic:
          $ref: "#/components/schemas/ResponseTopic"
          description: A UTF-8 encoded string that's used as the topic name for a response message. The response topic is used to describe the topic which the receiver should publish to as part of the request-response flow. The topic must not contain wildcard characters. For more information, see Response Topic from the MQTT Version 5.0 specification. Supports substitution templates.
        correlationData:
          $ref: "#/components/schemas/CorrelationData"
          description: The base64-encoded binary data used by the sender of the request message to identify which request the response message is for when it's received. For more information, see Correlation Data from the MQTT Version 5.0 specification. This binary data must be based64-encoded. Supports substitution templates.
        messageExpiry:
          $ref: "#/components/schemas/MessageExpiry"
          description: A user-defined integer value that will persist a message at the message broker for a specified amount of time to ensure that the message will expire if it's no longer relevant to the subscriber. The value of messageExpiry represents the number of seconds before it expires. For more information about the limits of messageExpiry, see Amazon Web Services IoT Core message broker and protocol limits and quotas from the Amazon Web Services Reference Guide. Supports substitution templates.
        userProperties:
          $ref: "#/components/schemas/UserProperties"
          description: An array of key-value pairs that you define in the MQTT5 header.
    PayloadFormatIndicator:
      type: string
      minLength: 0
      maxLength: 1024
    ContentType:
      type: string
      minLength: 0
      maxLength: 1024
    ResponseTopic:
      type: string
      minLength: 0
      maxLength: 1024
    CorrelationData:
      type: string
      minLength: 0
      maxLength: 1024
    MessageExpiry:
      type: string
      minLength: 0
      maxLength: 1024
    UserProperties:
      type: array
      items:
        $ref: "#/components/schemas/UserProperty"
    UserProperty:
      description: A key-value pair that you define in the header. Both the key and the value are either literal strings or valid substitution templates.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/UserPropertyKey"
          description: A key to be specified in UserProperty.
        value:
          $ref: "#/components/schemas/UserPropertyValue"
          description: A value to be specified in UserProperty.
      required:
        - key
        - value
    UserPropertyKey:
      type: string
      minLength: 0
      maxLength: 1024
    UserPropertyValue:
      type: string
      minLength: 0
      maxLength: 1024
    S3Action:
      description: Describes an action to write data to an Amazon S3 bucket.
      type: object
      properties:
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: The ARN of the IAM role that grants access.
        bucketName:
          $ref: "#/components/schemas/BucketName"
          description: The Amazon S3 bucket.
        key:
          $ref: "#/components/schemas/Key"
          description: The object key. For more information, see Actions, resources, and condition keys for Amazon S3.
        cannedAcl:
          $ref: "#/components/schemas/CannedAccessControlList"
          description: The Amazon S3 canned ACL that controls access to the object identified by the object key. For more information, see S3 canned ACLs.
      required:
        - roleArn
        - bucketName
        - key
    BucketName:
      type: string
    Key:
      type: string
    CannedAccessControlList:
      type: string
      enum:
        - private
        - public-read
        - public-read-write
        - aws-exec-read
        - authenticated-read
        - bucket-owner-read
        - bucket-owner-full-control
        - log-delivery-write
    FirehoseAction:
      description: Describes an action that writes data to an Amazon Kinesis Firehose stream.
      type: object
      properties:
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: The IAM role that grants access to the Amazon Kinesis Firehose stream.
        deliveryStreamName:
          $ref: "#/components/schemas/DeliveryStreamName"
          description: The delivery stream name.
        separator:
          $ref: "#/components/schemas/FirehoseSeparator"
          description: "A character separator that will be used to separate records written to the Firehose stream. Valid values are: '\\n' (newline), '\\t' (tab), '\\r\\n' (Windows newline), ',' (comma)."
        batchMode:
          $ref: "#/components/schemas/BatchMode"
          description: Whether to deliver the Kinesis Data Firehose stream as a batch by using PutRecordBatch . The default value is false. When batchMode is true and the rule's SQL statement evaluates to an Array, each Array element forms one record in the PutRecordBatch request. The resulting array can't have more than 500 records.
      required:
        - roleArn
        - deliveryStreamName
    DeliveryStreamName:
      type: string
    FirehoseSeparator:
      type: string
      pattern: ([\n\t])|(\r\n)|(,)
    BatchMode:
      type: boolean
    CloudwatchMetricAction:
      description: Describes an action that captures a CloudWatch metric.
      type: object
      properties:
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: The IAM role that allows access to the CloudWatch metric.
        metricNamespace:
          $ref: "#/components/schemas/String"
          description: The CloudWatch metric namespace name.
        metricName:
          $ref: "#/components/schemas/String"
          description: The CloudWatch metric name.
        metricValue:
          $ref: "#/components/schemas/String"
          description: The CloudWatch metric value.
        metricUnit:
          $ref: "#/components/schemas/String"
          description: The metric unit supported by CloudWatch.
        metricTimestamp:
          $ref: "#/components/schemas/String"
          description: An optional Unix timestamp.
      required:
        - roleArn
        - metricNamespace
        - metricName
        - metricValue
        - metricUnit
    CloudwatchAlarmAction:
      description: Describes an action that updates a CloudWatch alarm.
      type: object
      properties:
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: The IAM role that allows access to the CloudWatch alarm.
        alarmName:
          $ref: "#/components/schemas/AlarmName"
          description: The CloudWatch alarm name.
        stateReason:
          $ref: "#/components/schemas/StateReason"
          description: The reason for the alarm change.
        stateValue:
          $ref: "#/components/schemas/StateValue"
          description: "The value of the alarm state. Acceptable values are: OK, ALARM, INSUFFICIENT_DATA."
      required:
        - roleArn
        - alarmName
        - stateReason
        - stateValue
    AlarmName:
      type: string
    StateReason:
      type: string
    StateValue:
      type: string
    CloudwatchLogsAction:
      description: Describes an action that sends data to CloudWatch Logs.
      type: object
      properties:
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: The IAM role that allows access to the CloudWatch log.
        logGroupName:
          $ref: "#/components/schemas/LogGroupName"
          description: The CloudWatch log group to which the action sends data.
        batchMode:
          $ref: "#/components/schemas/BatchMode"
          description: Indicates whether batches of log records will be extracted and uploaded into CloudWatch. Values include true or false (default).
      required:
        - roleArn
        - logGroupName
    LogGroupName:
      type: string
    ElasticsearchAction:
      description: Describes an action that writes data to an Amazon OpenSearch Service domain. The Elasticsearch action can only be used by existing rule actions. To create a new rule action or to update an existing rule action, use the OpenSearch rule action instead. For more information, see OpenSearchAction.
      type: object
      properties:
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: The IAM role ARN that has access to OpenSearch.
        endpoint:
          $ref: "#/components/schemas/ElasticsearchEndpoint"
          description: The endpoint of your OpenSearch domain.
        index:
          $ref: "#/components/schemas/ElasticsearchIndex"
          description: The index where you want to store your data.
        type_:
          $ref: "#/components/schemas/ElasticsearchType"
          description: The type of document you are storing.
        id:
          $ref: "#/components/schemas/ElasticsearchId"
          description: The unique identifier for the document you are storing.
      required:
        - roleArn
        - endpoint
        - index
        - type_
        - id
    ElasticsearchEndpoint:
      type: string
      pattern: https?://.*
    ElasticsearchIndex:
      type: string
    ElasticsearchType:
      type: string
    ElasticsearchId:
      type: string
    SalesforceAction:
      description: Describes an action to write a message to a Salesforce IoT Cloud Input Stream.
      type: object
      properties:
        token:
          $ref: "#/components/schemas/SalesforceToken"
          description: The token used to authenticate access to the Salesforce IoT Cloud Input Stream. The token is available from the Salesforce IoT Cloud platform after creation of the Input Stream.
        url:
          $ref: "#/components/schemas/SalesforceEndpoint"
          description: The URL exposed by the Salesforce IoT Cloud Input Stream. The URL is available from the Salesforce IoT Cloud platform after creation of the Input Stream.
      required:
        - token
        - url
    SalesforceToken:
      type: string
      minLength: 40
    SalesforceEndpoint:
      type: string
      maxLength: 2000
      pattern: https://ingestion-[a-zA-Z0-9]{1,12}\.[a-zA-Z0-9]+\.((sfdc-matrix\.net)|(sfdcnow\.com))/streams/\w{1,20}/\w{1,20}/event
    IotAnalyticsAction:
      description: Sends message data to an IoT Analytics channel.
      type: object
      properties:
        channelArn:
          $ref: "#/components/schemas/AwsArn"
          description: (deprecated) The ARN of the IoT Analytics channel to which message data will be sent.
        channelName:
          $ref: "#/components/schemas/ChannelName"
          description: The name of the IoT Analytics channel to which message data will be sent.
        batchMode:
          $ref: "#/components/schemas/BatchMode"
          description: Whether to process the action as a batch. The default value is false. When batchMode is true and the rule SQL statement evaluates to an Array, each Array element is delivered as a separate message when passed by BatchPutMessage to the IoT Analytics channel. The resulting array can't have more than 100 messages.
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: The ARN of the role which has a policy that grants IoT Analytics permission to send message data via IoT Analytics (iotanalytics:BatchPutMessage).
    ChannelName:
      type: string
    IotEventsAction:
      description: Sends an input to an IoT Events detector.
      type: object
      properties:
        inputName:
          $ref: "#/components/schemas/InputName"
          description: The name of the IoT Events input.
        messageId:
          $ref: "#/components/schemas/MessageId"
          description: The ID of the message. The default messageId is a new UUID value. When batchMode is true, you can't specify a messageId--a new UUID value will be assigned. Assign a value to this property to ensure that only one input (message) with a given messageId will be processed by an IoT Events detector.
        batchMode:
          $ref: "#/components/schemas/BatchMode"
          description: Whether to process the event actions as a batch. The default value is false. When batchMode is true, you can't specify a messageId. When batchMode is true and the rule SQL statement evaluates to an Array, each Array element is treated as a separate message when it's sent to IoT Events by calling BatchPutMessage . The resulting array can't have more than 10 messages.
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: The ARN of the role that grants IoT permission to send an input to an IoT Events detector. ("Action":"iotevents:BatchPutMessage").
      required:
        - inputName
        - roleArn
    InputName:
      type: string
      minLength: 1
      maxLength: 128
    MessageId:
      type: string
      maxLength: 128
    IotSiteWiseAction:
      description: Describes an action to send data from an MQTT message that triggered the rule to IoT SiteWise asset properties.
      type: object
      properties:
        putAssetPropertyValueEntries:
          $ref: "#/components/schemas/PutAssetPropertyValueEntryList"
          description: A list of asset property value entries.
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: 'The ARN of the role that grants IoT permission to send an asset property value to IoT SiteWise. ("Action": "iotsitewise:BatchPutAssetPropertyValue"). The trust policy can restrict access to specific asset hierarchy paths.'
      required:
        - putAssetPropertyValueEntries
        - roleArn
    PutAssetPropertyValueEntryList:
      type: array
      items:
        $ref: "#/components/schemas/PutAssetPropertyValueEntry"
    PutAssetPropertyValueEntry:
      description: An asset property value entry containing the following information.
      type: object
      properties:
        entryId:
          $ref: "#/components/schemas/AssetPropertyEntryId"
          description: Optional. A unique identifier for this entry that you can define to better track which message caused an error in case of failure. Accepts substitution templates. Defaults to a new UUID.
        assetId:
          $ref: "#/components/schemas/AssetId"
          description: The ID of the IoT SiteWise asset. You must specify either a propertyAlias or both an aliasId and a propertyId. Accepts substitution templates.
        propertyId:
          $ref: "#/components/schemas/AssetPropertyId"
          description: The ID of the asset's property. You must specify either a propertyAlias or both an aliasId and a propertyId. Accepts substitution templates.
        propertyAlias:
          $ref: "#/components/schemas/AssetPropertyAlias"
          description: The name of the property alias associated with your asset property. You must specify either a propertyAlias or both an aliasId and a propertyId. Accepts substitution templates.
        propertyValues:
          $ref: "#/components/schemas/AssetPropertyValueList"
          description: A list of property values to insert that each contain timestamp, quality, and value (TQV) information.
      required:
        - propertyValues
    AssetPropertyEntryId:
      type: string
    AssetId:
      type: string
    AssetPropertyId:
      type: string
    AssetPropertyAlias:
      type: string
      minLength: 1
    AssetPropertyValueList:
      type: array
      items:
        $ref: "#/components/schemas/AssetPropertyValue"
    AssetPropertyValue:
      description: An asset property value entry containing the following information.
      type: object
      properties:
        value:
          $ref: "#/components/schemas/AssetPropertyVariant"
          description: The value of the asset property.
        timestamp:
          $ref: "#/components/schemas/AssetPropertyTimestamp"
          description: The asset property value timestamp.
        quality:
          $ref: "#/components/schemas/AssetPropertyQuality"
          description: Optional. A string that describes the quality of the value. Accepts substitution templates. Must be GOOD, BAD, or UNCERTAIN.
      required:
        - value
        - timestamp
    AssetPropertyVariant:
      description: Contains an asset property value (of a single type).
      type: object
      properties:
        stringValue:
          $ref: "#/components/schemas/AssetPropertyStringValue"
          description: Optional. The string value of the value entry. Accepts substitution templates.
        integerValue:
          $ref: "#/components/schemas/AssetPropertyIntegerValue"
          description: Optional. A string that contains the integer value of the value entry. Accepts substitution templates.
        doubleValue:
          $ref: "#/components/schemas/AssetPropertyDoubleValue"
          description: Optional. A string that contains the double value of the value entry. Accepts substitution templates.
        booleanValue:
          $ref: "#/components/schemas/AssetPropertyBooleanValue"
          description: Optional. A string that contains the boolean value (true or false) of the value entry. Accepts substitution templates.
    AssetPropertyStringValue:
      type: string
      minLength: 1
      maxLength: 1024
    AssetPropertyIntegerValue:
      type: string
    AssetPropertyDoubleValue:
      type: string
    AssetPropertyBooleanValue:
      type: string
    AssetPropertyTimestamp:
      description: An asset property timestamp entry containing the following information.
      type: object
      properties:
        timeInSeconds:
          $ref: "#/components/schemas/AssetPropertyTimeInSeconds"
          description: A string that contains the time in seconds since epoch. Accepts substitution templates.
        offsetInNanos:
          $ref: "#/components/schemas/AssetPropertyOffsetInNanos"
          description: Optional. A string that contains the nanosecond time offset. Accepts substitution templates.
      required:
        - timeInSeconds
    AssetPropertyTimeInSeconds:
      type: string
    AssetPropertyOffsetInNanos:
      type: string
    AssetPropertyQuality:
      type: string
    StepFunctionsAction:
      description: Starts execution of a Step Functions state machine.
      type: object
      properties:
        executionNamePrefix:
          $ref: "#/components/schemas/ExecutionNamePrefix"
          description: (Optional) A name will be given to the state machine execution consisting of this prefix followed by a UUID. Step Functions automatically creates a unique name for each state machine execution if one is not provided.
        stateMachineName:
          $ref: "#/components/schemas/StateMachineName"
          description: The name of the Step Functions state machine whose execution will be started.
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: The ARN of the role that grants IoT permission to start execution of a state machine ("Action":"states:StartExecution").
      required:
        - stateMachineName
        - roleArn
    ExecutionNamePrefix:
      type: string
    StateMachineName:
      type: string
    TimestreamAction:
      description: The Timestream rule action writes attributes (measures) from an MQTT message into an Amazon Timestream table. For more information, see the Timestream topic rule action documentation.
      type: object
      properties:
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: The ARN of the role that grants permission to write to the Amazon Timestream database table.
        databaseName:
          $ref: "#/components/schemas/TimestreamDatabaseName"
          description: The name of an Amazon Timestream database.
        tableName:
          $ref: "#/components/schemas/TimestreamTableName"
          description: The name of the database table into which to write the measure records.
        dimensions:
          $ref: "#/components/schemas/TimestreamDimensionList"
          description: Metadata attributes of the time series that are written in each measure record.
        timestamp:
          $ref: "#/components/schemas/TimestreamTimestamp"
          description: Specifies an application-defined value to replace the default value assigned to the Timestream record's timestamp in the time column. You can use this property to specify the value and the precision of the Timestream record's timestamp. You can specify a value from the message payload or a value computed by a substitution template. If omitted, the topic rule action assigns the timestamp, in milliseconds, at the time it processed the rule.
      required:
        - roleArn
        - databaseName
        - tableName
        - dimensions
    TimestreamDatabaseName:
      type: string
    TimestreamTableName:
      type: string
    TimestreamDimensionList:
      type: array
      items:
        $ref: "#/components/schemas/TimestreamDimension"
    TimestreamDimension:
      description: Metadata attributes of the time series that are written in each measure record.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/TimestreamDimensionName"
          description: "The metadata dimension name. This is the name of the column in the Amazon Timestream database table record. Dimensions cannot be named: measure_name, measure_value, or time. These names are reserved. Dimension names cannot start with ts_ or measure_value and they cannot contain the colon (:) character."
        value:
          $ref: "#/components/schemas/TimestreamDimensionValue"
          description: The value to write in this column of the database record.
      required:
        - name
        - value
    TimestreamDimensionName:
      type: string
    TimestreamDimensionValue:
      type: string
    TimestreamTimestamp:
      description: Describes how to interpret an application-defined timestamp value from an MQTT message payload and the precision of that value.
      type: object
      properties:
        value:
          $ref: "#/components/schemas/TimestreamTimestampValue"
          description: An expression that returns a long epoch time value.
        unit:
          $ref: "#/components/schemas/TimestreamTimestampUnit"
          description: "The precision of the timestamp value that results from the expression described in value. Valid values: SECONDS | MILLISECONDS | MICROSECONDS | NANOSECONDS. The default is MILLISECONDS."
      required:
        - value
        - unit
    TimestreamTimestampValue:
      type: string
    TimestreamTimestampUnit:
      type: string
    HttpAction:
      description: Send data to an HTTPS endpoint.
      type: object
      properties:
        url:
          $ref: "#/components/schemas/Url"
          description: The endpoint URL. If substitution templates are used in the URL, you must also specify a confirmationUrl. If this is a new destination, a new TopicRuleDestination is created if possible.
        confirmationUrl:
          $ref: "#/components/schemas/Url"
          description: The URL to which IoT sends a confirmation message. The value of the confirmation URL must be a prefix of the endpoint URL. If you do not specify a confirmation URL IoT uses the endpoint URL as the confirmation URL. If you use substitution templates in the confirmationUrl, you must create and enable topic rule destinations that match each possible value of the substitution template before traffic is allowed to your endpoint URL.
        headers:
          $ref: "#/components/schemas/HeaderList"
          description: The HTTP headers to send with the message data.
        auth:
          $ref: "#/components/schemas/HttpAuthorization"
          description: The authentication method to use when sending data to an HTTPS endpoint.
        enableBatching:
          $ref: "#/components/schemas/EnableBatching"
          description: Whether to process the HTTP action messages into a single request. Value can be true or false.
        batchConfig:
          $ref: "#/components/schemas/BatchConfig"
          description: The configuration settings for batching. For more information, see Batching HTTP action messages.
      required:
        - url
    Url:
      type: string
      maxLength: 2000
    HeaderList:
      type: array
      items:
        $ref: "#/components/schemas/HttpActionHeader"
    HttpActionHeader:
      description: The HTTP action header.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/HeaderKey"
          description: The HTTP header key.
        value:
          $ref: "#/components/schemas/HeaderValue"
          description: The HTTP header value. Substitution templates are supported.
      required:
        - key
        - value
    HeaderKey:
      type: string
      minLength: 1
      maxLength: 256
    HeaderValue:
      type: string
    HttpAuthorization:
      description: The authorization method used to send messages.
      type: object
      properties:
        sigv4:
          $ref: "#/components/schemas/SigV4Authorization"
          description: Use Sig V4 authorization. For more information, see Signature Version 4 Signing Process.
    SigV4Authorization:
      description: For more information, see Signature Version 4 signing process.
      type: object
      properties:
        signingRegion:
          $ref: "#/components/schemas/SigningRegion"
          description: The signing region.
        serviceName:
          $ref: "#/components/schemas/ServiceName"
          description: The service name to use while signing with Sig V4.
        roleArn:
          $ref: "#/components/schemas/AwsArn"
          description: The ARN of the signing role.
      required:
        - signingRegion
        - serviceName
        - roleArn
    SigningRegion:
      type: string
    ServiceName:
      type: string
    EnableBatching:
      type: boolean
    BatchConfig:
      description: Configuration settings for batching.
      type: object
      properties:
        maxBatchOpenMs:
          $ref: "#/components/schemas/MaxBatchOpenMs"
          description: The maximum amount of time (in milliseconds) that an outgoing call waits for other calls with which it batches messages of the same type. The higher the setting, the longer the latency of the batched HTTP Action will be.
        maxBatchSize:
          $ref: "#/components/schemas/MaxBatchSize"
          description: The maximum number of messages that are batched together in a single action execution.
        maxBatchSizeBytes:
          $ref: "#/components/schemas/MaxBatchSizeBytes"
          description: Maximum size of a message batch, in bytes.
        batchAcrossTopics:
          $ref: "#/components/schemas/BatchAcrossTopics"
          description: Whether to allow batching messages from different MQTT topics into a single HTTP request. By default, only messages from the same topic are batched together. The default value is false.
    MaxBatchOpenMs:
      type: integer
      minimum: 5
      maximum: 200
    MaxBatchSize:
      type: integer
      minimum: 2
      maximum: 10
    MaxBatchSizeBytes:
      type: integer
      minimum: 100
      maximum: 131072
    BatchAcrossTopics:
      type: boolean
    KafkaAction:
