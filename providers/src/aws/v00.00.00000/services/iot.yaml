        - INTEGER
        - DOUBLE
        - LONG
        - UNSIGNEDLONG
        - BOOLEAN
        - BINARY
    CommandParameterValue:
      description: The value of a command parameter used to create a command execution. The commandParameterValue can only have one of the below fields listed.
      type: object
      properties:
        S:
          $ref: "#/components/schemas/StringParameterValue"
          description: 'An attribute of type String. For example: "S": "Hello"'
        B:
          $ref: "#/components/schemas/BooleanParameterValue"
          description: 'An attribute of type Boolean. For example: "BOOL": true'
        I:
          $ref: "#/components/schemas/IntegerParameterValue"
          description: An attribute of type Integer (Thirty-Two Bits).
        L:
          $ref: "#/components/schemas/LongParameterValue"
          description: An attribute of type Long.
        D:
          $ref: "#/components/schemas/DoubleParameterValue"
          description: An attribute of type Double (Sixty-Four Bits).
        BIN:
          $ref: "#/components/schemas/BinaryParameterValue"
          description: 'An attribute of type Binary. For example: "B": "dGhpcyB0ZXh0IGlzIGJhc2U2NC1lbmNvZGVk"'
        UL:
          $ref: "#/components/schemas/UnsignedLongParameterValue"
          description: An attribute of type unsigned long.
    StringParameterValue:
      type: string
      minLength: 1
    BooleanParameterValue:
      type: boolean
    IntegerParameterValue:
      type: integer
    LongParameterValue:
      type: integer
      format: int64
    DoubleParameterValue:
      type: number
      format: double
    BinaryParameterValue:
      type: string
      format: byte
      minLength: 1
    UnsignedLongParameterValue:
      type: string
      minLength: 1
      maxLength: 20
      pattern: ^[0-9]*$
    CommandParameterValueConditionList:
      type: array
      items:
        $ref: "#/components/schemas/CommandParameterValueCondition"
    CommandParameterValueCondition:
      description: A condition for the command parameter that must be evaluated to true for successful creation of a command execution.
      type: object
      properties:
        comparisonOperator:
          $ref: "#/components/schemas/CommandParameterValueComparisonOperator"
          description: The comparison operator for the command parameter. IN_RANGE, and NOT_IN_RANGE operators include boundary values.
        operand:
          $ref: "#/components/schemas/CommandParameterValueComparisonOperand"
          description: The comparison operand for the command parameter.
      required:
        - comparisonOperator
        - operand
    CommandParameterValueComparisonOperator:
      type: string
      enum:
        - EQUALS
        - NOT_EQUALS
        - LESS_THAN
        - LESS_THAN_EQUALS
        - GREATER_THAN
        - GREATER_THAN_EQUALS
        - IN_SET
        - NOT_IN_SET
        - IN_RANGE
        - NOT_IN_RANGE
    CommandParameterValueComparisonOperand:
      description: The comparison operand used to compare the defined value against the value supplied in request.
      type: object
      properties:
        number:
          $ref: "#/components/schemas/StringParameterValue"
          description: An operand of number value type, defined as a string.
        numbers:
          $ref: "#/components/schemas/CommandParameterValueStringList"
          description: A List of operands of numerical value type, defined as strings.
        string:
          $ref: "#/components/schemas/StringParameterValue"
          description: An operand of string value type.
        strings:
          $ref: "#/components/schemas/CommandParameterValueStringList"
          description: A List of operands of string value type.
        numberRange:
          $ref: "#/components/schemas/CommandParameterValueNumberRange"
          description: An operand of numerical range value type.
    CommandParameterValueStringList:
      type: array
      items:
        $ref: "#/components/schemas/StringParameterValue"
    CommandParameterValueNumberRange:
      description: The numerical range value type to compare a command parameter value against.
      type: object
      properties:
        min:
          $ref: "#/components/schemas/StringParameterValue"
          description: The minimum value of a numerical range of a command parameter value.
        max:
          $ref: "#/components/schemas/StringParameterValue"
          description: The maximum value of a numerical range of a command parameter value.
      required:
        - min
        - max
    CommandParameterDescription:
