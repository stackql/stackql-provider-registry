  /jobs/{job_id}:
    put:
      operationId: CreateJob
      description: Creates a job. Requires permission to access the CreateJob action.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: A job identifier which must be unique for your account. We recommend using a UUID. Alpha-numeric characters, "-" and "_" are valid for use here.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targets:
                  $ref: "#/components/schemas/JobTargets"
                documentSource:
                  $ref: "#/components/schemas/JobDocumentSource"
                document:
                  $ref: "#/components/schemas/JobDocument"
                description:
                  $ref: "#/components/schemas/JobDescription"
                presignedUrlConfig:
                  $ref: "#/components/schemas/PresignedUrlConfig"
                targetSelection:
                  $ref: "#/components/schemas/TargetSelection"
                jobExecutionsRolloutConfig:
                  $ref: "#/components/schemas/JobExecutionsRolloutConfig"
                abortConfig:
                  $ref: "#/components/schemas/AbortConfig"
                timeoutConfig:
                  $ref: "#/components/schemas/TimeoutConfig"
                tags:
                  $ref: "#/components/schemas/TagList"
                namespaceId:
                  $ref: "#/components/schemas/NamespaceId"
                jobTemplateArn:
                  $ref: "#/components/schemas/JobTemplateArn"
                jobExecutionsRetryConfig:
                  $ref: "#/components/schemas/JobExecutionsRetryConfig"
                documentParameters:
                  $ref: "#/components/schemas/ParameterMap"
                schedulingConfig:
                  $ref: "#/components/schemas/SchedulingConfig"
                destinationPackageVersions:
                  $ref: "#/components/schemas/DestinationPackageVersions"
              required:
                - targets
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateJobResponse"
    delete:
      operationId: DeleteJob
      description: Deletes a job and its related job executions. Deleting a job may take time, depending on the number of job executions created for the job and various other factors. While the job is being deleted, the status of the job will be shown as "DELETION_IN_PROGRESS". Attempting to delete or cancel a job whose status is already "DELETION_IN_PROGRESS" will result in an error. Only 10 jobs may have status "DELETION_IN_PROGRESS" at the same time, or a LimitExceededException will occur. Requires permission to access the DeleteJob action.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The ID of the job to be deleted. After a job deletion is completed, you may reuse this jobId when you create a new job. However, this is not recommended, and you must ensure that your devices are not using the jobId to refer to the deleted job.
        - name: force
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ForceFlag"
          description: (Optional) When true, you can delete a job which is "IN_PROGRESS". Otherwise, you can only delete a job which is in a terminal state ("COMPLETED" or "CANCELED") or an exception will occur. The default is false. Deleting a job which is "IN_PROGRESS", will cause a device which is executing the job to be unable to access job information or update the job execution status. Use caution and ensure that each device executing a job which is deleted is able to recover to a valid state.
        - name: namespaceId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NamespaceId"
          description: The namespace used to indicate that a job is a customer-managed job. When you specify a value for this parameter, Amazon Web Services IoT Core sends jobs notifications to MQTT topics that contain the value in the following format. $aws/things/THING_NAME/jobs/JOB_ID/notify-namespace-NAMESPACE_ID/ The namespaceId feature is only supported by IoT Greengrass at this time. For more information, see Setting up IoT Greengrass core devices.
      responses:
        "200":
          description: Success
    get:
      operationId: DescribeJob
      description: Describes a job. Requires permission to access the DescribeJob action.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The unique identifier you assigned to this job when it was created.
        - name: beforeSubstitution
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BeforeSubstitutionFlag"
          description: Provides a view of the job document before and after the substitution parameters have been resolved with their exact values.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeJobResponse"
    patch:
      operationId: UpdateJob
      description: Updates supported fields of the specified job. Requires permission to access the UpdateJob action.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The ID of the job to be updated.
        - name: namespaceId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NamespaceId"
          description: The namespace used to indicate that a job is a customer-managed job. When you specify a value for this parameter, Amazon Web Services IoT Core sends jobs notifications to MQTT topics that contain the value in the following format. $aws/things/THING_NAME/jobs/JOB_ID/notify-namespace-NAMESPACE_ID/ The namespaceId feature is only supported by IoT Greengrass at this time. For more information, see Setting up IoT Greengrass core devices.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/JobDescription"
                presignedUrlConfig:
                  $ref: "#/components/schemas/PresignedUrlConfig"
                jobExecutionsRolloutConfig:
                  $ref: "#/components/schemas/JobExecutionsRolloutConfig"
                abortConfig:
                  $ref: "#/components/schemas/AbortConfig"
                timeoutConfig:
                  $ref: "#/components/schemas/TimeoutConfig"
                jobExecutionsRetryConfig:
                  $ref: "#/components/schemas/JobExecutionsRetryConfig"
      responses:
        "200":
          description: Success
