      properties: {}
    SchedulingConfig:
      description: Specifies the date and time that a job will begin the rollout of the job document to all devices in the target group. Additionally, you can specify the end behavior for each job execution when it reaches the scheduled end time.
      type: object
      properties:
        startTime:
          $ref: "#/components/schemas/StringDateTime"
          description: The time a job will begin rollout of the job document to all devices in the target group for a job. The startTime can be scheduled up to a year in advance and must be scheduled a minimum of thirty minutes from the current time. The date and time format for the startTime is YYYY-MM-DD for the date and HH:MM for the time. For more information on the syntax for startTime when using an API command or the Command Line Interface, see Timestamp.
        endTime:
          $ref: "#/components/schemas/StringDateTime"
          description: The time a job will stop rollout of the job document to all devices in the target group for a job. The endTime must take place no later than two years from the current time and be scheduled a minimum of thirty minutes from the current time. The minimum duration between startTime and endTime is thirty minutes. The maximum duration between startTime and endTime is two years. The date and time format for the endTime is YYYY-MM-DD for the date and HH:MM for the time. For more information on the syntax for endTime when using an API command or the Command Line Interface, see Timestamp.
        endBehavior:
          $ref: "#/components/schemas/JobEndBehavior"
          description: Specifies the end behavior for all job executions after a job reaches the selected endTime. If endTime is not selected when creating the job, then endBehavior does not apply.
        maintenanceWindows:
          $ref: "#/components/schemas/MaintenanceWindows"
          description: An optional configuration within the SchedulingConfig to setup a recurring maintenance window with a predetermined start time and duration for the rollout of a job document to all devices in a target group for a job.
    StringDateTime:
      type: string
      minLength: 1
      maxLength: 64
    JobEndBehavior:
      type: string
      enum:
        - STOP_ROLLOUT
        - CANCEL
        - FORCE_CANCEL
    MaintenanceWindows:
      type: array
      items:
        $ref: "#/components/schemas/MaintenanceWindow"
    MaintenanceWindow:
      description: An optional configuration within the SchedulingConfig to setup a recurring maintenance window with a predetermined start time and duration for the rollout of a job document to all devices in a target group for a job.
      type: object
      properties:
        startTime:
          $ref: "#/components/schemas/CronExpression"
          description: Displays the start time of the next maintenance window.
        durationInMinutes:
          $ref: "#/components/schemas/DurationInMinutes"
          description: Displays the duration of the next maintenance window.
      required:
        - startTime
        - durationInMinutes
    CronExpression:
      type: string
      minLength: 1
      maxLength: 256
    DurationInMinutes:
      type: integer
      minimum: 1
      maximum: 1430
    DestinationPackageVersions:
      type: array
      items:
        $ref: "#/components/schemas/PackageVersionArn"
    PackageVersionArn:
