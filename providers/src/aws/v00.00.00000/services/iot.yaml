    Job:
      description: The Job object contains details about a job.
      type: object
      properties:
        jobArn:
          $ref: "#/components/schemas/JobArn"
          description: An ARN identifying the job with format "arn:aws:iot:region:account:job/jobId".
        jobId:
          $ref: "#/components/schemas/JobId"
          description: The unique identifier you assigned to this job when it was created.
        targetSelection:
          $ref: "#/components/schemas/TargetSelection"
          description: Specifies whether the job will continue to run (CONTINUOUS), or will be complete after all those things specified as targets have completed the job (SNAPSHOT). If continuous, the job may also be run on a thing when a change is detected in a target. For example, a job will run on a device when the thing representing the device is added to a target group, even after the job was completed by all things originally in the group. We recommend that you use continuous jobs instead of snapshot jobs for dynamic thing group targets. By using continuous jobs, devices that join the group receive the job execution even after the job has been created.
        status:
          $ref: "#/components/schemas/JobStatus"
          description: The status of the job, one of IN_PROGRESS, CANCELED, DELETION_IN_PROGRESS or COMPLETED.
        forceCanceled:
          $ref: "#/components/schemas/Forced"
          description: Will be true if the job was canceled with the optional force parameter set to true.
        reasonCode:
          $ref: "#/components/schemas/ReasonCode"
          description: If the job was updated, provides the reason code for the update.
        comment:
          $ref: "#/components/schemas/Comment"
          description: If the job was updated, describes the reason for the update.
        targets:
          $ref: "#/components/schemas/JobTargets"
          description: A list of IoT things and thing groups to which the job should be sent.
        description:
          $ref: "#/components/schemas/JobDescription"
          description: A short text description of the job.
        presignedUrlConfig:
          $ref: "#/components/schemas/PresignedUrlConfig"
          description: Configuration for pre-signed S3 URLs.
        jobExecutionsRolloutConfig:
          $ref: "#/components/schemas/JobExecutionsRolloutConfig"
          description: Allows you to create a staged rollout of a job.
        abortConfig:
          $ref: "#/components/schemas/AbortConfig"
          description: Configuration for criteria to abort the job.
        createdAt:
          $ref: "#/components/schemas/DateType"
          description: The time, in seconds since the epoch, when the job was created.
        lastUpdatedAt:
          $ref: "#/components/schemas/DateType"
          description: The time, in seconds since the epoch, when the job was last updated.
        completedAt:
          $ref: "#/components/schemas/DateType"
          description: The time, in seconds since the epoch, when the job was completed.
        jobProcessDetails:
          $ref: "#/components/schemas/JobProcessDetails"
          description: Details about the job process.
        timeoutConfig:
          $ref: "#/components/schemas/TimeoutConfig"
          description: Specifies the amount of time each device has to finish its execution of the job. A timer is started when the job execution status is set to IN_PROGRESS. If the job execution status is not set to another terminal state before the timer expires, it will be automatically set to TIMED_OUT.
        namespaceId:
          $ref: "#/components/schemas/NamespaceId"
          description: The namespace used to indicate that a job is a customer-managed job. When you specify a value for this parameter, Amazon Web Services IoT Core sends jobs notifications to MQTT topics that contain the value in the following format. $aws/things/THING_NAME/jobs/JOB_ID/notify-namespace-NAMESPACE_ID/ The namespaceId feature is only supported by IoT Greengrass at this time. For more information, see Setting up IoT Greengrass core devices.
        jobTemplateArn:
          $ref: "#/components/schemas/JobTemplateArn"
          description: The ARN of the job template used to create the job.
        jobExecutionsRetryConfig:
          $ref: "#/components/schemas/JobExecutionsRetryConfig"
          description: The configuration for the criteria to retry the job.
        documentParameters:
          type: object
          properties: {}
          description: A key-value map that pairs the patterns that need to be replaced in a managed template job document schema. You can use the description of each key as a guidance to specify the inputs during runtime when creating a job. documentParameters can only be used when creating jobs from Amazon Web Services managed templates. This parameter can't be used with custom job templates or to create jobs from them.
        isConcurrent:
          $ref: "#/components/schemas/BooleanWrapperObject"
          description: Indicates whether a job is concurrent. Will be true when a job is rolling out new job executions or canceling previously created executions, otherwise false.
        schedulingConfig:
          $ref: "#/components/schemas/SchedulingConfig"
          description: The configuration that allows you to schedule a job for a future date and time in addition to specifying the end behavior for each job execution.
        scheduledJobRollouts:
          $ref: "#/components/schemas/ScheduledJobRolloutList"
          description: Displays the next seven maintenance window occurrences and their start times.
        destinationPackageVersions:
          $ref: "#/components/schemas/DestinationPackageVersions"
          description: The package version Amazon Resource Names (ARNs) that are installed on the device when the job successfully completes. The package version must be in either the Published or Deprecated state when the job deploys. For more information, see Package version lifecycle.The package version must be in either the Published or Deprecated state when the job deploys. For more information, see Package version lifecycle. Note:The following Length Constraints relates to a single ARN. Up to 25 package version ARNs are allowed.
    JobStatus:
      type: string
      enum:
        - IN_PROGRESS
        - CANCELED
        - COMPLETED
        - DELETION_IN_PROGRESS
        - SCHEDULED
