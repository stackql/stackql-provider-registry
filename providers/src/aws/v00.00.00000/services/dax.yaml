    TagResourceResponse:
      type: object
      properties:
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The list of tags that are associated with the DAX resource.
    KeyList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    UntagResourceResponse:
      type: object
      properties:
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tag keys that have been removed from the cluster.
    UpdateClusterResponse:
      type: object
      properties:
        Cluster:
          $ref: "#/components/schemas/Cluster"
          description: A description of the DAX cluster, after it has been modified.
    ParameterNameValueList:
      type: array
      items:
        $ref: "#/components/schemas/ParameterNameValue"
    ParameterNameValue:
      description: An individual DAX parameter.
      type: object
      properties:
        ParameterName:
          $ref: "#/components/schemas/String"
          description: The name of the parameter.
        ParameterValue:
          $ref: "#/components/schemas/String"
          description: The value of the parameter.
    UpdateParameterGroupResponse:
      type: object
      properties:
        ParameterGroup:
          $ref: "#/components/schemas/ParameterGroup"
          description: The parameter group that has been modified.
    UpdateSubnetGroupResponse:
      type: object
      properties:
        SubnetGroup:
          $ref: "#/components/schemas/SubnetGroup"
          description: The subnet group that has been modified.
