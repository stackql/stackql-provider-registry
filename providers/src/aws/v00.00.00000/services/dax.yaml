openapi: 3.0.0
info:
  version: "2017-04-19"
  title: Amazon DynamoDB Accelerator (DAX)
  description: Amazon DynamoDB Accelerator (DAX)
  x-serviceName: dax
  x-serviceAlias: dax
  x-protocol: json
  x-apiVersion: "2017-04-19"
  x-endpointPrefix: dax
  x-targetPrefix: AmazonDAXV3
  x-jsonVersion: "1.1"
servers:
  - url: https://dax.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for dax
paths:
  /CreateCluster:
    post:
      operationId: CreateCluster
      description: Creates a DAX cluster. All nodes in the cluster run the same DAX caching software.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.CreateCluster
            default: AmazonDAXV3.CreateCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterName:
                  $ref: "#/components/schemas/String"
                  description: "The cluster identifier. This parameter is stored as a lowercase string. Constraints: A name must contain from 1 to 20 alphanumeric characters or hyphens. The first character must be a letter. A name cannot end with a hyphen or contain two consecutive hyphens."
                NodeType:
                  $ref: "#/components/schemas/String"
                  description: The compute and memory capacity of the nodes in the cluster.
                Description:
                  $ref: "#/components/schemas/String"
                  description: A description of the cluster.
                ReplicationFactor:
                  $ref: "#/components/schemas/Integer"
                  description: The number of nodes in the DAX cluster. A replication factor of 1 will create a single-node cluster, without any read replicas. For additional fault tolerance, you can create a multiple node cluster with one or more read replicas. To do this, set ReplicationFactor to a number between 3 (one primary and two read replicas) and 10 (one primary and nine read replicas). If the AvailabilityZones parameter is provided, its length must equal the ReplicationFactor. Amazon Web Services recommends that you have at least two read replicas per cluster.
                AvailabilityZones:
                  $ref: "#/components/schemas/AvailabilityZoneList"
                  description: The Availability Zones (AZs) in which the cluster nodes will reside after the cluster has been created or updated. If provided, the length of this list must equal the ReplicationFactor parameter. If you omit this parameter, DAX will spread the nodes across Availability Zones for the highest availability.
                SubnetGroupName:
                  $ref: "#/components/schemas/String"
                  description: The name of the subnet group to be used for the replication group. DAX clusters can only run in an Amazon VPC environment. All of the subnets that you specify in a subnet group must exist in the same VPC.
                SecurityGroupIds:
                  $ref: "#/components/schemas/SecurityGroupIdentifierList"
                  description: A list of security group IDs to be assigned to each node in the DAX cluster. (Each of the security group ID is system-generated.) If this parameter is not specified, DAX assigns the default VPC security group to each node.
                PreferredMaintenanceWindow:
                  $ref: "#/components/schemas/String"
                  description: "Specifies the weekly time range during which maintenance on the DAX cluster is performed. It is specified as a range in the format ddd:hh24:mi-ddd:hh24:mi (24H Clock UTC). The minimum maintenance window is a 60 minute period. Valid values for ddd are: sun mon tue wed thu fri sat Example: sun:05:00-sun:09:00 If you don't specify a preferred maintenance window when you create or modify a cache cluster, DAX assigns a 60-minute maintenance window on a randomly selected day of the week."
                NotificationTopicArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) of the Amazon SNS topic to which notifications will be sent. The Amazon SNS topic owner must be same as the DAX cluster owner.
                IamRoleArn:
                  $ref: "#/components/schemas/String"
                  description: A valid Amazon Resource Name (ARN) that identifies an IAM role. At runtime, DAX will assume this role and use the role's permissions to access DynamoDB on your behalf.
                ParameterGroupName:
                  $ref: "#/components/schemas/String"
                  description: The parameter group to be associated with the DAX cluster.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A set of tags to associate with the DAX cluster.
                SSESpecification:
                  $ref: "#/components/schemas/SSESpecification"
                  description: Represents the settings used to enable server-side encryption on the cluster.
                ClusterEndpointEncryptionType:
                  $ref: "#/components/schemas/ClusterEndpointEncryptionType"
                  description: "The type of encryption the cluster's endpoint should support. Values are: NONE for no encryption TLS for Transport Layer Security"
                NetworkType:
                  $ref: "#/components/schemas/NetworkType"
                  description: "Specifies the IP protocol(s) the cluster uses for network communications. Values are: ipv4 - The cluster is accessible only through IPv4 addresses ipv6 - The cluster is accessible only through IPv6 addresses dual_stack - The cluster is accessible through both IPv4 and IPv6 addresses. If no explicit NetworkType is provided, the network type is derived based on the subnet group's configuration."
              required:
                - ClusterName
                - NodeType
                - ReplicationFactor
                - IamRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClusterResponse"
  /CreateParameterGroup:
    post:
      operationId: CreateParameterGroup
      description: Creates a new parameter group. A parameter group is a collection of parameters that you apply to all of the nodes in a DAX cluster.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.CreateParameterGroup
            default: AmazonDAXV3.CreateParameterGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ParameterGroupName:
                  $ref: "#/components/schemas/String"
                  description: The name of the parameter group to apply to all of the clusters in this replication group.
                Description:
                  $ref: "#/components/schemas/String"
                  description: A description of the parameter group.
              required:
                - ParameterGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateParameterGroupResponse"
  /CreateSubnetGroup:
    post:
      operationId: CreateSubnetGroup
      description: Creates a new subnet group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.CreateSubnetGroup
            default: AmazonDAXV3.CreateSubnetGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SubnetGroupName:
                  $ref: "#/components/schemas/String"
                  description: A name for the subnet group. This value is stored as a lowercase string.
                Description:
                  $ref: "#/components/schemas/String"
                  description: A description for the subnet group
                SubnetIds:
                  $ref: "#/components/schemas/SubnetIdentifierList"
                  description: A list of VPC subnet IDs for the subnet group.
              required:
                - SubnetGroupName
                - SubnetIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSubnetGroupResponse"
  /DecreaseReplicationFactor:
    post:
      operationId: DecreaseReplicationFactor
      description: Removes one or more nodes from a DAX cluster. You cannot use DecreaseReplicationFactor to remove the last node in a DAX cluster. If you need to do this, use DeleteCluster instead.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.DecreaseReplicationFactor
            default: AmazonDAXV3.DecreaseReplicationFactor
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterName:
                  $ref: "#/components/schemas/String"
                  description: The name of the DAX cluster from which you want to remove nodes.
                NewReplicationFactor:
                  $ref: "#/components/schemas/Integer"
                  description: The new number of nodes for the DAX cluster.
                AvailabilityZones:
                  $ref: "#/components/schemas/AvailabilityZoneList"
                  description: The Availability Zone(s) from which to remove nodes.
                NodeIdsToRemove:
                  $ref: "#/components/schemas/NodeIdentifierList"
                  description: The unique identifiers of the nodes to be removed from the cluster.
              required:
                - ClusterName
                - NewReplicationFactor
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecreaseReplicationFactorResponse"
  /DeleteCluster:
    post:
      operationId: DeleteCluster
      description: Deletes a previously provisioned DAX cluster. DeleteCluster deletes all associated nodes, node endpoints and the DAX cluster itself. When you receive a successful response from this action, DAX immediately begins deleting the cluster; you cannot cancel or revert this action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.DeleteCluster
            default: AmazonDAXV3.DeleteCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterName:
                  $ref: "#/components/schemas/String"
                  description: The name of the cluster to be deleted.
              required:
                - ClusterName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteClusterResponse"
  /DeleteParameterGroup:
    post:
      operationId: DeleteParameterGroup
      description: Deletes the specified parameter group. You cannot delete a parameter group if it is associated with any DAX clusters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.DeleteParameterGroup
            default: AmazonDAXV3.DeleteParameterGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ParameterGroupName:
                  $ref: "#/components/schemas/String"
                  description: The name of the parameter group to delete.
              required:
                - ParameterGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteParameterGroupResponse"
  /DeleteSubnetGroup:
    post:
      operationId: DeleteSubnetGroup
      description: Deletes a subnet group. You cannot delete a subnet group if it is associated with any DAX clusters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.DeleteSubnetGroup
            default: AmazonDAXV3.DeleteSubnetGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SubnetGroupName:
                  $ref: "#/components/schemas/String"
                  description: The name of the subnet group to delete.
              required:
                - SubnetGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSubnetGroupResponse"
  /DescribeClusters:
    post:
      operationId: DescribeClusters
      description: Returns information about all provisioned DAX clusters if no cluster identifier is specified, or about a specific DAX cluster if a cluster identifier is supplied. If the cluster is in the CREATING state, only cluster level information will be displayed until all of the nodes are successfully provisioned. If the cluster is in the DELETING state, only cluster level information will be displayed. If nodes are currently being added to the DAX cluster, node endpoint information and creation time for the additional nodes will not be displayed until they are completely provisioned. When the DAX cluster state is available, the cluster is ready for use. If nodes are currently being removed from the DAX cluster, no endpoint information for the removed nodes is displayed.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.DescribeClusters
            default: AmazonDAXV3.DescribeClusters
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterNames:
                  $ref: "#/components/schemas/ClusterNameList"
                  description: The names of the DAX clusters being described.
                MaxResults:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The maximum number of results to include in the response. If more results exist than the specified MaxResults value, a token is included in the response so that the remaining results can be retrieved. The value for MaxResults must be between 20 and 100.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: An optional token returned from a prior request. Use this token for pagination of results from this action. If this parameter is specified, the response includes only results beyond the token, up to the value specified by MaxResults.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeClustersResponse"
  /DescribeDefaultParameters:
    post:
      operationId: DescribeDefaultParameters
      description: Returns the default system parameter information for the DAX caching software.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.DescribeDefaultParameters
            default: AmazonDAXV3.DescribeDefaultParameters
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The maximum number of results to include in the response. If more results exist than the specified MaxResults value, a token is included in the response so that the remaining results can be retrieved. The value for MaxResults must be between 20 and 100.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: An optional token returned from a prior request. Use this token for pagination of results from this action. If this parameter is specified, the response includes only results beyond the token, up to the value specified by MaxResults.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDefaultParametersResponse"
  /DescribeEvents:
    post:
      operationId: DescribeEvents
      description: Returns events related to DAX clusters and parameter groups. You can obtain events specific to a particular DAX cluster or parameter group by providing the name as a parameter. By default, only the events occurring within the last 24 hours are returned; however, you can retrieve up to 14 days' worth of events if necessary.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.DescribeEvents
            default: AmazonDAXV3.DescribeEvents
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SourceName:
                  $ref: "#/components/schemas/String"
                  description: The identifier of the event source for which events will be returned. If not specified, then all sources are included in the response.
                SourceType:
                  $ref: "#/components/schemas/SourceType"
                  description: The event source to retrieve events for. If no value is specified, all events are returned.
                StartTime:
                  $ref: "#/components/schemas/TStamp"
                  description: The beginning of the time interval to retrieve events for, specified in ISO 8601 format.
                EndTime:
                  $ref: "#/components/schemas/TStamp"
                  description: The end of the time interval for which to retrieve events, specified in ISO 8601 format.
                Duration:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The number of minutes' worth of events to retrieve.
                MaxResults:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The maximum number of results to include in the response. If more results exist than the specified MaxResults value, a token is included in the response so that the remaining results can be retrieved. The value for MaxResults must be between 20 and 100.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: An optional token returned from a prior request. Use this token for pagination of results from this action. If this parameter is specified, the response includes only results beyond the token, up to the value specified by MaxResults.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEventsResponse"
  /DescribeParameterGroups:
    post:
      operationId: DescribeParameterGroups
      description: Returns a list of parameter group descriptions. If a parameter group name is specified, the list will contain only the descriptions for that group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.DescribeParameterGroups
            default: AmazonDAXV3.DescribeParameterGroups
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ParameterGroupNames:
                  $ref: "#/components/schemas/ParameterGroupNameList"
                  description: The names of the parameter groups.
                MaxResults:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The maximum number of results to include in the response. If more results exist than the specified MaxResults value, a token is included in the response so that the remaining results can be retrieved. The value for MaxResults must be between 20 and 100.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: An optional token returned from a prior request. Use this token for pagination of results from this action. If this parameter is specified, the response includes only results beyond the token, up to the value specified by MaxResults.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeParameterGroupsResponse"
  /DescribeParameters:
    post:
      operationId: DescribeParameters
      description: Returns the detailed parameter list for a particular parameter group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.DescribeParameters
            default: AmazonDAXV3.DescribeParameters
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ParameterGroupName:
                  $ref: "#/components/schemas/String"
                  description: The name of the parameter group.
                Source:
                  $ref: "#/components/schemas/String"
                  description: How the parameter is defined. For example, system denotes a system-defined parameter.
                MaxResults:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The maximum number of results to include in the response. If more results exist than the specified MaxResults value, a token is included in the response so that the remaining results can be retrieved. The value for MaxResults must be between 20 and 100.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: An optional token returned from a prior request. Use this token for pagination of results from this action. If this parameter is specified, the response includes only results beyond the token, up to the value specified by MaxResults.
              required:
                - ParameterGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeParametersResponse"
  /DescribeSubnetGroups:
    post:
      operationId: DescribeSubnetGroups
      description: Returns a list of subnet group descriptions. If a subnet group name is specified, the list will contain only the description of that group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.DescribeSubnetGroups
            default: AmazonDAXV3.DescribeSubnetGroups
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SubnetGroupNames:
                  $ref: "#/components/schemas/SubnetGroupNameList"
                  description: The name of the subnet group.
                MaxResults:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The maximum number of results to include in the response. If more results exist than the specified MaxResults value, a token is included in the response so that the remaining results can be retrieved. The value for MaxResults must be between 20 and 100.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: An optional token returned from a prior request. Use this token for pagination of results from this action. If this parameter is specified, the response includes only results beyond the token, up to the value specified by MaxResults.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSubnetGroupsResponse"
  /IncreaseReplicationFactor:
    post:
      operationId: IncreaseReplicationFactor
      description: Adds one or more nodes to a DAX cluster.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.IncreaseReplicationFactor
            default: AmazonDAXV3.IncreaseReplicationFactor
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterName:
                  $ref: "#/components/schemas/String"
                  description: The name of the DAX cluster that will receive additional nodes.
                NewReplicationFactor:
                  $ref: "#/components/schemas/Integer"
                  description: The new number of nodes for the DAX cluster.
                AvailabilityZones:
                  $ref: "#/components/schemas/AvailabilityZoneList"
                  description: The Availability Zones (AZs) in which the cluster nodes will be created. All nodes belonging to the cluster are placed in these Availability Zones. Use this parameter if you want to distribute the nodes across multiple AZs.
              required:
                - ClusterName
                - NewReplicationFactor
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncreaseReplicationFactorResponse"
  /ListTags:
    post:
      operationId: ListTags
      description: List all of the tags for a DAX cluster. You can call ListTags up to 10 times per second, per account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.ListTags
            default: AmazonDAXV3.ListTags
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceName:
                  $ref: "#/components/schemas/String"
                  description: The name of the DAX resource to which the tags belong.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: An optional token returned from a prior request. Use this token for pagination of results from this action. If this parameter is specified, the response includes only results beyond the token.
              required:
                - ResourceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsResponse"
  /RebootNode:
    post:
      operationId: RebootNode
      description: Reboots a single node of a DAX cluster. The reboot action takes place as soon as possible. During the reboot, the node status is set to REBOOTING. RebootNode restarts the DAX engine process and does not remove the contents of the cache.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.RebootNode
            default: AmazonDAXV3.RebootNode
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterName:
                  $ref: "#/components/schemas/String"
                  description: The name of the DAX cluster containing the node to be rebooted.
                NodeId:
                  $ref: "#/components/schemas/String"
                  description: The system-assigned ID of the node to be rebooted.
              required:
                - ClusterName
                - NodeId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RebootNodeResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Associates a set of tags with a DAX resource. You can call TagResource up to 5 times per second, per account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.TagResource
            default: AmazonDAXV3.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceName:
                  $ref: "#/components/schemas/String"
                  description: The name of the DAX resource to which tags should be added.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to be assigned to the DAX resource.
              required:
                - ResourceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes the association of tags from a DAX resource. You can call UntagResource up to 5 times per second, per account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.UntagResource
            default: AmazonDAXV3.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceName:
                  $ref: "#/components/schemas/String"
                  description: The name of the DAX resource from which the tags should be removed.
                TagKeys:
                  $ref: "#/components/schemas/KeyList"
                  description: A list of tag keys. If the DAX cluster has any tags with these keys, then the tags are removed from the cluster.
              required:
                - ResourceName
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateCluster:
    post:
      operationId: UpdateCluster
      description: Modifies the settings for a DAX cluster. You can use this action to change one or more cluster configuration parameters by specifying the parameters and the new values.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.UpdateCluster
            default: AmazonDAXV3.UpdateCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterName:
                  $ref: "#/components/schemas/String"
                  description: The name of the DAX cluster to be modified.
                Description:
                  $ref: "#/components/schemas/String"
                  description: A description of the changes being made to the cluster.
                PreferredMaintenanceWindow:
                  $ref: "#/components/schemas/String"
                  description: "A range of time when maintenance of DAX cluster software will be performed. For example: sun:01:00-sun:09:00. Cluster maintenance normally takes less than 30 minutes, and is performed automatically within the maintenance window."
                NotificationTopicArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) that identifies the topic.
                NotificationTopicStatus:
                  $ref: "#/components/schemas/String"
                  description: The current state of the topic. A value of “active” means that notifications will be sent to the topic. A value of “inactive” means that notifications will not be sent to the topic.
                ParameterGroupName:
                  $ref: "#/components/schemas/String"
                  description: The name of a parameter group for this cluster.
                SecurityGroupIds:
                  $ref: "#/components/schemas/SecurityGroupIdentifierList"
                  description: A list of user-specified security group IDs to be assigned to each node in the DAX cluster. If this parameter is not specified, DAX assigns the default VPC security group to each node.
              required:
                - ClusterName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateClusterResponse"
  /UpdateParameterGroup:
    post:
      operationId: UpdateParameterGroup
      description: Modifies the parameters of a parameter group. You can modify up to 20 parameters in a single request by submitting a list parameter name and value pairs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.UpdateParameterGroup
            default: AmazonDAXV3.UpdateParameterGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ParameterGroupName:
                  $ref: "#/components/schemas/String"
                  description: The name of the parameter group.
                ParameterNameValues:
                  $ref: "#/components/schemas/ParameterNameValueList"
                  description: An array of name-value pairs for the parameters in the group. Each element in the array represents a single parameter. record-ttl-millis and query-ttl-millis are the only supported parameter names. For more details, see Configuring TTL Settings.
              required:
                - ParameterGroupName
                - ParameterNameValues
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateParameterGroupResponse"
  /UpdateSubnetGroup:
    post:
      operationId: UpdateSubnetGroup
      description: Modifies an existing subnet group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDAXV3.UpdateSubnetGroup
            default: AmazonDAXV3.UpdateSubnetGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SubnetGroupName:
                  $ref: "#/components/schemas/String"
                  description: The name of the subnet group.
                Description:
                  $ref: "#/components/schemas/String"
                  description: A description of the subnet group.
                SubnetIds:
                  $ref: "#/components/schemas/SubnetIdentifierList"
                  description: A list of subnet IDs in the subnet group.
              required:
                - SubnetGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSubnetGroupResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    String:
      type: string
    Integer:
      type: integer
    AvailabilityZoneList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    SecurityGroupIdentifierList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "A description of a tag. Every tag is a key-value pair. You can add up to 50 tags to a single DAX cluster. Amazon Web Services-assigned tag names and values are automatically assigned the aws: prefix, which the user cannot assign. Amazon Web Services-assigned tag names do not count towards the tag limit of 50. User-assigned tag names have the prefix user:. You cannot backdate the application of a tag."
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/String"
          description: The key for the tag. Tag keys are case sensitive. Every DAX cluster can only have one tag with the same key. If you try to add an existing tag (same key), the existing tag value will be updated to the new value.
        Value:
          $ref: "#/components/schemas/String"
          description: The value of the tag. Tag values are case-sensitive and can be null.
    SSESpecification:
      description: Represents the settings used to enable server-side encryption.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/SSEEnabled"
          description: Indicates whether server-side encryption is enabled (true) or disabled (false) on the cluster.
      required:
        - Enabled
    SSEEnabled:
      type: boolean
    ClusterEndpointEncryptionType:
      type: string
      enum:
        - NONE
        - TLS
    NetworkType:
      type: string
      enum:
        - ipv4
        - ipv6
        - dual_stack
    CreateClusterResponse:
      type: object
      properties:
        Cluster:
          $ref: "#/components/schemas/Cluster"
          description: A description of the DAX cluster that you have created.
    Cluster:
      description: Contains all of the attributes of a specific DAX cluster.
      type: object
      properties:
        ClusterName:
          $ref: "#/components/schemas/String"
          description: The name of the DAX cluster.
        Description:
          $ref: "#/components/schemas/String"
          description: The description of the cluster.
        ClusterArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that uniquely identifies the cluster.
        TotalNodes:
          $ref: "#/components/schemas/IntegerOptional"
          description: The total number of nodes in the cluster.
        ActiveNodes:
          $ref: "#/components/schemas/IntegerOptional"
          description: The number of nodes in the cluster that are active (i.e., capable of serving requests).
        NodeType:
          $ref: "#/components/schemas/String"
          description: The node type for the nodes in the cluster. (All nodes in a DAX cluster are of the same type.)
        Status:
          $ref: "#/components/schemas/String"
          description: The current status of the cluster.
        ClusterDiscoveryEndpoint:
          $ref: "#/components/schemas/Endpoint"
          description: The endpoint for this DAX cluster, consisting of a DNS name, a port number, and a URL. Applications should use the URL to configure the DAX client to find their cluster.
        NodeIdsToRemove:
          $ref: "#/components/schemas/NodeIdentifierList"
          description: A list of nodes to be removed from the cluster.
        Nodes:
          $ref: "#/components/schemas/NodeList"
          description: A list of nodes that are currently in the cluster.
        PreferredMaintenanceWindow:
          $ref: "#/components/schemas/String"
          description: "A range of time when maintenance of DAX cluster software will be performed. For example: sun:01:00-sun:09:00. Cluster maintenance normally takes less than 30 minutes, and is performed automatically within the maintenance window."
        NotificationConfiguration:
          $ref: "#/components/schemas/NotificationConfiguration"
          description: Describes a notification topic and its status. Notification topics are used for publishing DAX events to subscribers using Amazon Simple Notification Service (SNS).
        SubnetGroup:
          $ref: "#/components/schemas/String"
          description: The subnet group where the DAX cluster is running.
        SecurityGroups:
          $ref: "#/components/schemas/SecurityGroupMembershipList"
          description: A list of security groups, and the status of each, for the nodes in the cluster.
        IamRoleArn:
          $ref: "#/components/schemas/String"
          description: A valid Amazon Resource Name (ARN) that identifies an IAM role. At runtime, DAX will assume this role and use the role's permissions to access DynamoDB on your behalf.
        ParameterGroup:
          $ref: "#/components/schemas/ParameterGroupStatus"
          description: The parameter group being used by nodes in the cluster.
        SSEDescription:
          $ref: "#/components/schemas/SSEDescription"
          description: The description of the server-side encryption status on the specified DAX cluster.
        ClusterEndpointEncryptionType:
          $ref: "#/components/schemas/ClusterEndpointEncryptionType"
          description: "The type of encryption supported by the cluster's endpoint. Values are: NONE for no encryption TLS for Transport Layer Security"
        NetworkType:
          $ref: "#/components/schemas/NetworkType"
          description: "The IP address type of the cluster. Values are: ipv4 - IPv4 addresses only ipv6 - IPv6 addresses only dual_stack - Both IPv4 and IPv6 addresses"
    IntegerOptional:
      type: integer
    Endpoint:
      description: Represents the information required for client programs to connect to the endpoint for a DAX cluster.
      type: object
      properties:
        Address:
          $ref: "#/components/schemas/String"
          description: The DNS hostname of the endpoint.
        Port:
          $ref: "#/components/schemas/Integer"
          description: The port number that applications should use to connect to the endpoint.
        URL:
          $ref: "#/components/schemas/String"
          description: The URL that applications should use to connect to the endpoint. The default ports are 8111 for the "dax" protocol and 9111 for the "daxs" protocol.
    NodeIdentifierList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    NodeList:
      type: array
      items:
        $ref: "#/components/schemas/Node"
    Node:
      description: Represents an individual node within a DAX cluster.
      type: object
      properties:
        NodeId:
          $ref: "#/components/schemas/String"
          description: A system-generated identifier for the node.
        Endpoint:
          $ref: "#/components/schemas/Endpoint"
          description: The endpoint for the node, consisting of a DNS name and a port number. Client applications can connect directly to a node endpoint, if desired (as an alternative to allowing DAX client software to intelligently route requests and responses to nodes in the DAX cluster.
        NodeCreateTime:
          $ref: "#/components/schemas/TStamp"
          description: The date and time (in UNIX epoch format) when the node was launched.
        AvailabilityZone:
          $ref: "#/components/schemas/String"
          description: The Availability Zone (AZ) in which the node has been deployed.
        NodeStatus:
          $ref: "#/components/schemas/String"
          description: "The current status of the node. For example: available."
        ParameterGroupStatus:
          $ref: "#/components/schemas/String"
          description: The status of the parameter group associated with this node. For example, in-sync.
    TStamp:
      type: string
      format: date-time
    NotificationConfiguration:
      description: Describes a notification topic and its status. Notification topics are used for publishing DAX events to subscribers using Amazon Simple Notification Service (SNS).
      type: object
      properties:
        TopicArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that identifies the topic.
        TopicStatus:
          $ref: "#/components/schemas/String"
          description: The current state of the topic. A value of “active” means that notifications will be sent to the topic. A value of “inactive” means that notifications will not be sent to the topic.
    SecurityGroupMembershipList:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupMembership"
    SecurityGroupMembership:
      description: An individual VPC security group and its status.
      type: object
      properties:
        SecurityGroupIdentifier:
          $ref: "#/components/schemas/String"
          description: The unique ID for this security group.
        Status:
          $ref: "#/components/schemas/String"
          description: The status of this security group.
    ParameterGroupStatus:
      description: The status of a parameter group.
      type: object
      properties:
        ParameterGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the parameter group.
        ParameterApplyStatus:
          $ref: "#/components/schemas/String"
          description: The status of parameter updates.
        NodeIdsToReboot:
          $ref: "#/components/schemas/NodeIdentifierList"
          description: The node IDs of one or more nodes to be rebooted.
    SSEDescription:
      description: The description of the server-side encryption status on the specified DAX cluster.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/SSEStatus"
          description: "The current state of server-side encryption: ENABLING - Server-side encryption is being enabled. ENABLED - Server-side encryption is enabled. DISABLING - Server-side encryption is being disabled. DISABLED - Server-side encryption is disabled."
    SSEStatus:
      type: string
      enum:
        - ENABLING
        - ENABLED
        - DISABLING
        - DISABLED
    CreateParameterGroupResponse:
      type: object
      properties:
        ParameterGroup:
          $ref: "#/components/schemas/ParameterGroup"
          description: Represents the output of a CreateParameterGroup action.
    ParameterGroup:
      description: A named set of parameters that are applied to all of the nodes in a DAX cluster.
      type: object
      properties:
        ParameterGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the parameter group.
        Description:
          $ref: "#/components/schemas/String"
          description: A description of the parameter group.
    SubnetIdentifierList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    CreateSubnetGroupResponse:
      type: object
      properties:
        SubnetGroup:
          $ref: "#/components/schemas/SubnetGroup"
          description: Represents the output of a CreateSubnetGroup operation.
    SubnetGroup:
      description: "Represents the output of one of the following actions: CreateSubnetGroup ModifySubnetGroup"
      type: object
      properties:
        SubnetGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the subnet group.
        Description:
          $ref: "#/components/schemas/String"
          description: The description of the subnet group.
        VpcId:
          $ref: "#/components/schemas/String"
          description: The Amazon Virtual Private Cloud identifier (VPC ID) of the subnet group.
        Subnets:
          $ref: "#/components/schemas/SubnetList"
          description: A list of subnets associated with the subnet group.
        SupportedNetworkTypes:
          $ref: "#/components/schemas/NetworkTypeList"
          description: The network types supported by this subnet. Returns an array of strings that can include ipv4, ipv6, or both, indicating whether the subnet group supports IPv4 only, IPv6 only, or dual-stack deployments.
    SubnetList:
      type: array
      items:
        $ref: "#/components/schemas/Subnet"
    Subnet:
      description: Represents the subnet associated with a DAX cluster. This parameter refers to subnets defined in Amazon Virtual Private Cloud (Amazon VPC) and used with DAX.
      type: object
      properties:
        SubnetIdentifier:
          $ref: "#/components/schemas/String"
          description: The system-assigned identifier for the subnet.
        SubnetAvailabilityZone:
          $ref: "#/components/schemas/String"
          description: The Availability Zone (AZ) for the subnet.
        SupportedNetworkTypes:
          $ref: "#/components/schemas/NetworkTypeList"
          description: The network types supported by this subnet. Returns an array of strings that can include ipv4, ipv6, or both, indicating whether the subnet supports IPv4 only, IPv6 only, or dual-stack deployments.
    NetworkTypeList:
      type: array
      items:
        $ref: "#/components/schemas/NetworkType"
    DecreaseReplicationFactorResponse:
      type: object
      properties:
        Cluster:
          $ref: "#/components/schemas/Cluster"
          description: A description of the DAX cluster, after you have decreased its replication factor.
    DeleteClusterResponse:
      type: object
      properties:
        Cluster:
          $ref: "#/components/schemas/Cluster"
          description: A description of the DAX cluster that is being deleted.
    DeleteParameterGroupResponse:
      type: object
      properties:
        DeletionMessage:
          $ref: "#/components/schemas/String"
          description: A user-specified message for this action (i.e., a reason for deleting the parameter group).
    DeleteSubnetGroupResponse:
      type: object
      properties:
        DeletionMessage:
          $ref: "#/components/schemas/String"
          description: A user-specified message for this action (i.e., a reason for deleting the subnet group).
    ClusterNameList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    DescribeClustersResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/String"
          description: Provides an identifier to allow retrieval of paginated results.
        Clusters:
          $ref: "#/components/schemas/ClusterList"
          description: The descriptions of your DAX clusters, in response to a DescribeClusters request.
    ClusterList:
      type: array
      items:
        $ref: "#/components/schemas/Cluster"
    DescribeDefaultParametersResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/String"
          description: Provides an identifier to allow retrieval of paginated results.
        Parameters:
          $ref: "#/components/schemas/ParameterList"
          description: A list of parameters. Each element in the list represents one parameter.
    ParameterList:
      type: array
      items:
        $ref: "#/components/schemas/Parameter"
    Parameter:
      description: Describes an individual setting that controls some aspect of DAX behavior.
      type: object
      properties:
        ParameterName:
          $ref: "#/components/schemas/String"
          description: The name of the parameter.
        ParameterType:
          $ref: "#/components/schemas/ParameterType"
          description: Determines whether the parameter can be applied to any nodes, or only nodes of a particular type.
        ParameterValue:
          $ref: "#/components/schemas/String"
          description: The value for the parameter.
        NodeTypeSpecificValues:
          $ref: "#/components/schemas/NodeTypeSpecificValueList"
          description: A list of node types, and specific parameter values for each node.
        Description:
          $ref: "#/components/schemas/String"
          description: A description of the parameter
        Source:
          $ref: "#/components/schemas/String"
          description: How the parameter is defined. For example, system denotes a system-defined parameter.
        DataType:
          $ref: "#/components/schemas/String"
          description: "The data type of the parameter. For example, integer:"
        AllowedValues:
          $ref: "#/components/schemas/String"
          description: A range of values within which the parameter can be set.
        IsModifiable:
          $ref: "#/components/schemas/IsModifiable"
          description: Whether the customer is allowed to modify the parameter.
        ChangeType:
          $ref: "#/components/schemas/ChangeType"
          description: The conditions under which changes to this parameter can be applied. For example, requires-reboot indicates that a new value for this parameter will only take effect if a node is rebooted.
    ParameterType:
      type: string
      enum:
        - DEFAULT
        - NODE_TYPE_SPECIFIC
    NodeTypeSpecificValueList:
      type: array
      items:
        $ref: "#/components/schemas/NodeTypeSpecificValue"
    NodeTypeSpecificValue:
      description: Represents a parameter value that is applicable to a particular node type.
      type: object
      properties:
        NodeType:
          $ref: "#/components/schemas/String"
          description: A node type to which the parameter value applies.
        Value:
          $ref: "#/components/schemas/String"
          description: The parameter value for this node type.
    IsModifiable:
      type: string
      enum:
        - "TRUE"
        - "FALSE"
        - CONDITIONAL
    ChangeType:
      type: string
      enum:
        - IMMEDIATE
        - REQUIRES_REBOOT
    SourceType:
      type: string
      enum:
        - CLUSTER
        - PARAMETER_GROUP
        - SUBNET_GROUP
    DescribeEventsResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/String"
          description: Provides an identifier to allow retrieval of paginated results.
        Events:
