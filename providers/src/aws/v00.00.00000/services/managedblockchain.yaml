openapi: 3.0.0
info:
  version: "2018-09-24"
  title: Amazon Managed Blockchain
  description: Amazon Managed Blockchain
  x-serviceName: managedblockchain
  x-serviceAlias: managedblockchain
  x-protocol: rest-json
  x-apiVersion: "2018-09-24"
  x-endpointPrefix: managedblockchain
  x-jsonVersion: "1.1"
servers:
  - url: https://managedblockchain.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for managedblockchain
paths:
  /accessors:
    post:
      operationId: CreateAccessor
      description: Creates a new accessor for use with Amazon Managed Blockchain service that supports token based access. The accessor contains information required for token based access.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestTokenString"
                AccessorType:
                  $ref: "#/components/schemas/AccessorType"
                Tags:
                  $ref: "#/components/schemas/InputTagMap"
                NetworkType:
                  $ref: "#/components/schemas/AccessorNetworkType"
              required:
                - ClientRequestToken
                - AccessorType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccessorOutput"
    get:
      operationId: ListAccessors
      description: Returns a list of the accessors and their properties. Accessor objects are containers that have the information required for token based access to your Ethereum nodes.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccessorListMaxResults"
          description: The maximum number of accessors to list.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that indicates the next set of results to retrieve.
        - name: networkType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccessorNetworkType"
          description: The blockchain network that the Accessor token is created for. Use the value ETHEREUM_MAINNET_AND_GOERLI for all existing Accessors tokens that were created before the networkType property was introduced.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccessorsOutput"
  /networks/{network_id}/members:
    post:
      operationId: CreateMember
      description: Creates a member within a Managed Blockchain network. Applies only to Hyperledger Fabric.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the network in which the member is created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestTokenString"
                InvitationId:
                  $ref: "#/components/schemas/ResourceIdString"
                MemberConfiguration:
                  $ref: "#/components/schemas/MemberConfiguration"
              required:
                - ClientRequestToken
                - InvitationId
                - MemberConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMemberOutput"
    get:
      operationId: ListMembers
      description: Returns a list of the members in a network and properties of their configurations. Applies only to Hyperledger Fabric.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the network for which to list members.
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The optional name of the member to list.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MemberStatus"
          description: An optional status specifier. If provided, only members currently in this status are listed.
        - name: isOwned
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IsOwned"
          description: An optional Boolean value. If provided, the request is limited either to members that the current Amazon Web Services account owns (true) or that other Amazon Web Services accountsn own (false). If omitted, all members are listed.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MemberListMaxResults"
          description: The maximum number of members to return in the request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that indicates the next set of results to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMembersOutput"
  /networks:
    post:
      operationId: CreateNetwork
      description: Creates a new blockchain network using Amazon Managed Blockchain. Applies only to Hyperledger Fabric.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestTokenString"
                Name:
                  $ref: "#/components/schemas/NameString"
                Description:
                  $ref: "#/components/schemas/DescriptionString"
                Framework:
                  $ref: "#/components/schemas/Framework"
                FrameworkVersion:
                  $ref: "#/components/schemas/FrameworkVersionString"
                FrameworkConfiguration:
                  $ref: "#/components/schemas/NetworkFrameworkConfiguration"
                VotingPolicy:
                  $ref: "#/components/schemas/VotingPolicy"
                MemberConfiguration:
                  $ref: "#/components/schemas/MemberConfiguration"
                Tags:
                  $ref: "#/components/schemas/InputTagMap"
              required:
                - ClientRequestToken
                - Name
                - Framework
                - FrameworkVersion
                - VotingPolicy
                - MemberConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNetworkOutput"
    get:
      operationId: ListNetworks
      description: Returns information about the networks in which the current Amazon Web Services account participates. Applies to Hyperledger Fabric and Ethereum.
      parameters:
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The name of the network.
        - name: framework
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Framework"
          description: An optional framework specifier. If provided, only networks of this framework type are listed.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NetworkStatus"
          description: An optional status specifier. If provided, only networks currently in this status are listed. Applies only to Hyperledger Fabric.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NetworkListMaxResults"
          description: The maximum number of networks to list.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that indicates the next set of results to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNetworksOutput"
  /networks/{network_id}/nodes:
    post:
      operationId: CreateNode
      description: Creates a node on the specified blockchain network. Applies to Hyperledger Fabric and Ethereum.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: "The unique identifier of the network for the node. Ethereum public networks have the following NetworkIds: n-ethereum-mainnet"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestTokenString"
                MemberId:
                  $ref: "#/components/schemas/ResourceIdString"
                NodeConfiguration:
                  $ref: "#/components/schemas/NodeConfiguration"
                Tags:
                  $ref: "#/components/schemas/InputTagMap"
              required:
                - ClientRequestToken
                - NodeConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNodeOutput"
    get:
      operationId: ListNodes
      description: Returns information about the nodes within a network. Applies to Hyperledger Fabric and Ethereum.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the network for which to list nodes.
        - name: memberId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the member who owns the nodes to list. Applies only to Hyperledger Fabric and is required for Hyperledger Fabric.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NodeStatus"
          description: An optional status specifier. If provided, only nodes currently in this status are listed.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NodeListMaxResults"
          description: The maximum number of nodes to list.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that indicates the next set of results to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNodesOutput"
  /networks/{network_id}/proposals:
    post:
      operationId: CreateProposal
      description: Creates a proposal for a change to the network that other members of the network can vote on, for example, a proposal to add a new member to the network. Any member can create a proposal. Applies only to Hyperledger Fabric.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the network for which the proposal is made.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestTokenString"
                MemberId:
                  $ref: "#/components/schemas/ResourceIdString"
                Actions:
                  $ref: "#/components/schemas/ProposalActions"
                Description:
                  $ref: "#/components/schemas/DescriptionString"
                Tags:
                  $ref: "#/components/schemas/InputTagMap"
              required:
                - ClientRequestToken
                - MemberId
                - Actions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProposalOutput"
    get:
      operationId: ListProposals
      description: Returns a list of proposals for the network. Applies only to Hyperledger Fabric.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the network.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProposalListMaxResults"
          description: The maximum number of proposals to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that indicates the next set of results to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProposalsOutput"
  /accessors/{accessor_id}:
    delete:
      operationId: DeleteAccessor
      description: Deletes an accessor that your Amazon Web Services account owns. An accessor object is a container that has the information required for token based access to your Ethereum nodes including, the BILLING_TOKEN. After an accessor is deleted, the status of the accessor changes from AVAILABLE to PENDING_DELETION. An accessor in the PENDING_DELETION state can’t be used for new WebSocket requests or HTTP requests. However, WebSocket connections that were initiated while the accessor was in the AVAILABLE state remain open until they expire (up to 2 hours).
      parameters:
        - name: accessor_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the accessor.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAccessorOutput"
    get:
      operationId: GetAccessor
      description: Returns detailed information about an accessor. An accessor object is a container that has the information required for token based access to your Ethereum nodes.
      parameters:
        - name: accessor_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the accessor.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccessorOutput"
  /networks/{network_id}/members/{member_id}:
    delete:
      operationId: DeleteMember
      description: Deletes a member. Deleting a member removes the member and all associated resources from the network. DeleteMember can only be called for a specified MemberId if the principal performing the action is associated with the Amazon Web Services account that owns the member. In all other cases, the DeleteMember action is carried out as the result of an approved proposal to remove a member. If MemberId is the last member in a network specified by the last Amazon Web Services account, the network is deleted also. Applies only to Hyperledger Fabric.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the network from which the member is removed.
        - name: member_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the member to remove.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMemberOutput"
    get:
      operationId: GetMember
      description: Returns detailed information about a member. Applies only to Hyperledger Fabric.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the network to which the member belongs.
        - name: member_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the member.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMemberOutput"
    patch:
      operationId: UpdateMember
      description: Updates a member configuration with new parameters. Applies only to Hyperledger Fabric.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the Managed Blockchain network to which the member belongs.
        - name: member_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the member.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                LogPublishingConfiguration:
                  $ref: "#/components/schemas/MemberLogPublishingConfiguration"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMemberOutput"
  /networks/{network_id}/nodes/{node_id}:
    delete:
      operationId: DeleteNode
      description: Deletes a node that your Amazon Web Services account owns. All data on the node is lost and cannot be recovered. Applies to Hyperledger Fabric and Ethereum.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: "The unique identifier of the network that the node is on. Ethereum public networks have the following NetworkIds: n-ethereum-mainnet"
        - name: memberId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the member that owns this node. Applies only to Hyperledger Fabric and is required for Hyperledger Fabric.
        - name: node_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the node.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteNodeOutput"
    get:
      operationId: GetNode
      description: Returns detailed information about a node. Applies to Hyperledger Fabric and Ethereum.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the network that the node is on.
        - name: memberId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the member that owns the node. Applies only to Hyperledger Fabric and is required for Hyperledger Fabric.
        - name: node_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the node.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetNodeOutput"
    patch:
      operationId: UpdateNode
      description: Updates a node configuration with new parameters. Applies only to Hyperledger Fabric.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the network that the node is on.
        - name: node_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the node.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MemberId:
                  $ref: "#/components/schemas/ResourceIdString"
                LogPublishingConfiguration:
                  $ref: "#/components/schemas/NodeLogPublishingConfiguration"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateNodeOutput"
  /networks/{network_id}:
    get:
      operationId: GetNetwork
      description: Returns detailed information about a network. Applies to Hyperledger Fabric and Ethereum.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the network to get information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetNetworkOutput"
  /networks/{network_id}/proposals/{proposal_id}:
    get:
      operationId: GetProposal
      description: Returns detailed information about a proposal. Applies only to Hyperledger Fabric.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the network for which the proposal is made.
        - name: proposal_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the proposal.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProposalOutput"
  /invitations:
    get:
      operationId: ListInvitations
      description: Returns a list of all invitations for the current Amazon Web Services account. Applies only to Hyperledger Fabric.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProposalListMaxResults"
          description: The maximum number of invitations to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that indicates the next set of results to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInvitationsOutput"
  /networks/{network_id}/proposals/{proposal_id}/votes:
    get:
      operationId: ListProposalVotes
      description: Returns the list of votes for a specified proposal, including the value of each vote and the unique identifier of the member that cast the vote. Applies only to Hyperledger Fabric.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the network.
        - name: proposal_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the proposal.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProposalListMaxResults"
          description: The maximum number of votes to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that indicates the next set of results to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProposalVotesOutput"
    post:
      operationId: VoteOnProposal
      description: Casts a vote for a specified ProposalId on behalf of a member. The member to vote as, specified by VoterMemberId, must be in the same Amazon Web Services account as the principal that calls the action. Applies only to Hyperledger Fabric.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the network.
        - name: proposal_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the proposal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                VoterMemberId:
                  $ref: "#/components/schemas/ResourceIdString"
                Vote:
                  $ref: "#/components/schemas/VoteValue"
              required:
                - VoterMemberId
                - Vote
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteOnProposalOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns a list of tags for the specified resource. Each tag consists of a key and optional value. For more information about tags, see Tagging Resources in the Amazon Managed Blockchain Ethereum Developer Guide, or Tagging Resources in the Amazon Managed Blockchain Hyperledger Fabric Developer Guide.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ArnString"
          description: The Amazon Resource Name (ARN) of the resource. For more information about ARNs and their format, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds or overwrites the specified tags for the specified Amazon Managed Blockchain resource. Each tag consists of a key and optional value. When you specify a tag key that already exists, the tag value is overwritten with the new value. Use UntagResource to remove tag keys. A resource can have up to 50 tags. If you try to create more than 50 tags for a resource, your request fails and returns an error. For more information about tags, see Tagging Resources in the Amazon Managed Blockchain Ethereum Developer Guide, or Tagging Resources in the Amazon Managed Blockchain Hyperledger Fabric Developer Guide.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ArnString"
          description: The Amazon Resource Name (ARN) of the resource. For more information about ARNs and their format, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/InputTagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes the specified tags from the Amazon Managed Blockchain resource. For more information about tags, see Tagging Resources in the Amazon Managed Blockchain Ethereum Developer Guide, or Tagging Resources in the Amazon Managed Blockchain Hyperledger Fabric Developer Guide.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ArnString"
          description: The Amazon Resource Name (ARN) of the resource. For more information about ARNs and their format, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The tag keys.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /invitations/{invitation_id}:
    delete:
      operationId: RejectInvitation
      description: Rejects an invitation to join a network. This action can be called by a principal in an Amazon Web Services account that has received an invitation to create a member and join a network. Applies only to Hyperledger Fabric.
      parameters:
        - name: invitation_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the invitation to reject.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RejectInvitationOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ClientRequestTokenString:
      type: string
      minLength: 1
      maxLength: 64
    AccessorType:
      type: string
      enum:
        - BILLING_TOKEN
    InputTagMap:
      type: object
      properties: {}
    AccessorNetworkType:
      type: string
      enum:
        - ETHEREUM_GOERLI
        - ETHEREUM_MAINNET
        - ETHEREUM_MAINNET_AND_GOERLI
        - POLYGON_MAINNET
        - POLYGON_MUMBAI
    CreateAccessorOutput:
      type: object
      properties:
        AccessorId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the accessor.
        BillingToken:
          $ref: "#/components/schemas/AccessorBillingTokenString"
          description: The billing token is a property of the Accessor. Use this token to when making calls to the blockchain network. The billing token is used to track your accessor token for billing requests.
        NetworkType:
          $ref: "#/components/schemas/AccessorNetworkType"
          description: The blockchain network that the accessor token is created for.
    ResourceIdString:
      type: string
      minLength: 1
      maxLength: 32
    AccessorBillingTokenString:
      type: string
      minLength: 42
      maxLength: 42
    MemberConfiguration:
      description: Configuration properties of the member. Applies only to Hyperledger Fabric.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NetworkMemberNameString"
          description: The name of the member.
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: An optional description of the member.
        FrameworkConfiguration:
          $ref: "#/components/schemas/MemberFrameworkConfiguration"
          description: Configuration properties of the blockchain framework relevant to the member.
        LogPublishingConfiguration:
          $ref: "#/components/schemas/MemberLogPublishingConfiguration"
          description: Configuration properties for logging events associated with a member of a Managed Blockchain network.
        Tags:
          type: object
          properties: {}
          description: Tags assigned to the member. Tags consist of a key and optional value. When specifying tags during creation, you can specify multiple key-value pairs in a single request, with an overall maximum of 50 tags added to each resource. For more information about tags, see Tagging Resources in the Amazon Managed Blockchain Ethereum Developer Guide, or Tagging Resources in the Amazon Managed Blockchain Hyperledger Fabric Developer Guide.
        KmsKeyArn:
          $ref: "#/components/schemas/ArnString"
          description: "The Amazon Resource Name (ARN) of the customer managed key in Key Management Service (KMS) to use for encryption at rest in the member. This parameter is inherited by any nodes that this member creates. For more information, see Encryption at Rest in the Amazon Managed Blockchain Hyperledger Fabric Developer Guide. Use one of the following options to specify this parameter: Undefined or empty string - By default, use an KMS key that is owned and managed by Amazon Web Services on your behalf. A valid symmetric customer managed KMS key - Use the specified KMS key in your account that you create, own, and manage. Amazon Managed Blockchain doesn't support asymmetric keys. For more information, see Using symmetric and asymmetric keys in the Key Management Service Developer Guide. The following is an example of a KMS key ARN: arn:aws:kms:us-east-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab"
      required:
        - Name
        - FrameworkConfiguration
    NetworkMemberNameString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^(?!-|[0-9])(?!.*-$)(?!.*?--)[a-zA-Z0-9-]+$
    DescriptionString:
      type: string
      maxLength: 128
    MemberFrameworkConfiguration:
      description: Configuration properties relevant to a member for the blockchain framework that the Managed Blockchain network uses.
      type: object
      properties:
        Fabric:
          $ref: "#/components/schemas/MemberFabricConfiguration"
          description: Attributes of Hyperledger Fabric for a member on a Managed Blockchain network that uses Hyperledger Fabric.
    MemberFabricConfiguration:
      description: Configuration properties for Hyperledger Fabric for a member in a Managed Blockchain network that is using the Hyperledger Fabric framework.
      type: object
      properties:
        AdminUsername:
          $ref: "#/components/schemas/UsernameString"
          description: The user name for the member's initial administrative user.
        AdminPassword:
          $ref: "#/components/schemas/PasswordString"
          description: The password for the member's initial administrative user. The AdminPassword must be at least 8 characters long and no more than 32 characters. It must contain at least one uppercase letter, one lowercase letter, and one digit. It cannot have a single quotation mark (‘), a double quotation marks (“), a forward slash(/), a backward slash(\), @, or a space.
      required:
        - AdminUsername
        - AdminPassword
    UsernameString:
      type: string
      minLength: 1
      maxLength: 16
      pattern: ^[a-zA-Z][a-zA-Z0-9]*$
    PasswordString:
      type: string
      minLength: 8
      maxLength: 32
      pattern: ^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?!.*[@'\\"/])[a-zA-Z0-9\S]*$
    MemberLogPublishingConfiguration:
      description: Configuration properties for logging events associated with a member of a Managed Blockchain network.
      type: object
      properties:
        Fabric:
          $ref: "#/components/schemas/MemberFabricLogPublishingConfiguration"
          description: Configuration properties for logging events associated with a member of a Managed Blockchain network using the Hyperledger Fabric framework.
    MemberFabricLogPublishingConfiguration:
      description: Configuration properties for logging events associated with a member of a Managed Blockchain network using the Hyperledger Fabric framework.
      type: object
      properties:
        CaLogs:
          $ref: "#/components/schemas/LogConfigurations"
          description: Configuration properties for logging events associated with a member's Certificate Authority (CA). CA logs help you determine when a member in your account joins the network, or when new peers register with a member CA.
    LogConfigurations:
      description: A collection of log configurations.
      type: object
      properties:
        Cloudwatch:
          $ref: "#/components/schemas/LogConfiguration"
          description: Parameters for publishing logs to Amazon CloudWatch Logs.
    LogConfiguration:
      description: A configuration for logging events.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Enabled"
          description: Indicates whether logging is enabled.
    Enabled:
      type: boolean
    ArnString:
      type: string
      minLength: 1
      maxLength: 1011
      pattern: ^arn:.+:.+:.+:.+:.+
    CreateMemberOutput:
      type: object
      properties:
        MemberId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the member.
    NameString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: .*\S.*
    Framework:
      type: string
      enum:
        - HYPERLEDGER_FABRIC
        - ETHEREUM
    FrameworkVersionString:
      type: string
      minLength: 1
      maxLength: 8
    NetworkFrameworkConfiguration:
      description: Configuration properties relevant to the network for the blockchain framework that the network uses.
      type: object
      properties:
        Fabric:
          $ref: "#/components/schemas/NetworkFabricConfiguration"
          description: Hyperledger Fabric configuration properties for a Managed Blockchain network that uses Hyperledger Fabric.
    NetworkFabricConfiguration:
      description: Hyperledger Fabric configuration properties for the network.
      type: object
      properties:
        Edition:
          $ref: "#/components/schemas/Edition"
          description: The edition of Amazon Managed Blockchain that the network uses. For more information, see Amazon Managed Blockchain Pricing.
      required:
        - Edition
    Edition:
      type: string
      enum:
        - STARTER
        - STANDARD
    VotingPolicy:
      description: The voting rules for the network to decide if a proposal is accepted Applies only to Hyperledger Fabric.
      type: object
      properties:
        ApprovalThresholdPolicy:
          $ref: "#/components/schemas/ApprovalThresholdPolicy"
          description: Defines the rules for the network for voting on proposals, such as the percentage of YES votes required for the proposal to be approved and the duration of the proposal. The policy applies to all proposals and is specified when the network is created.
    ApprovalThresholdPolicy:
      description: A policy type that defines the voting rules for the network. The rules decide if a proposal is approved. Approval may be based on criteria such as the percentage of YES votes and the duration of the proposal. The policy applies to all proposals and is specified when the network is created. Applies only to Hyperledger Fabric.
      type: object
      properties:
        ThresholdPercentage:
          $ref: "#/components/schemas/ThresholdPercentageInt"
          description: The percentage of votes among all members that must be YES for a proposal to be approved. For example, a ThresholdPercentage value of 50 indicates 50%. The ThresholdComparator determines the precise comparison. If a ThresholdPercentage value of 50 is specified on a network with 10 members, along with a ThresholdComparator value of GREATER_THAN, this indicates that 6 YES votes are required for the proposal to be approved.
        ProposalDurationInHours:
          $ref: "#/components/schemas/ProposalDurationInt"
          description: The duration from the time that a proposal is created until it expires. If members cast neither the required number of YES votes to approve the proposal nor the number of NO votes required to reject it before the duration expires, the proposal is EXPIRED and ProposalActions aren't carried out.
        ThresholdComparator:
          $ref: "#/components/schemas/ThresholdComparator"
          description: Determines whether the vote percentage must be greater than the ThresholdPercentage or must be greater than or equal to the ThresholdPercentage to be approved.
    ThresholdPercentageInt:
      type: integer
      minimum: 0
      maximum: 100
    ProposalDurationInt:
      type: integer
      minimum: 1
      maximum: 168
    ThresholdComparator:
      type: string
      enum:
        - GREATER_THAN
        - GREATER_THAN_OR_EQUAL_TO
    CreateNetworkOutput:
      type: object
      properties:
        NetworkId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier for the network.
        MemberId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier for the first member within the network.
    NodeConfiguration:
      description: Configuration properties of a node.
      type: object
      properties:
        InstanceType:
          $ref: "#/components/schemas/InstanceTypeString"
          description: The Amazon Managed Blockchain instance type for the node.
        AvailabilityZone:
          $ref: "#/components/schemas/AvailabilityZoneString"
          description: The Availability Zone in which the node exists. Required for Ethereum nodes.
        LogPublishingConfiguration:
          $ref: "#/components/schemas/NodeLogPublishingConfiguration"
          description: Configuration properties for logging events associated with a peer node on a Hyperledger Fabric network on Managed Blockchain.
        StateDB:
          $ref: "#/components/schemas/StateDBType"
          description: The state database that the node uses. Values are LevelDB or CouchDB. When using an Amazon Managed Blockchain network with Hyperledger Fabric version 1.4 or later, the default is CouchDB. Applies only to Hyperledger Fabric.
      required:
        - InstanceType
    InstanceTypeString:
      type: string
    AvailabilityZoneString:
      type: string
    NodeLogPublishingConfiguration:
      description: Configuration properties for logging events associated with a peer node on a Hyperledger Fabric network on Managed Blockchain.
      type: object
      properties:
        Fabric:
          $ref: "#/components/schemas/NodeFabricLogPublishingConfiguration"
          description: Configuration properties for logging events associated with a node that is owned by a member of a Managed Blockchain network using the Hyperledger Fabric framework.
    NodeFabricLogPublishingConfiguration:
      description: Configuration properties for logging events associated with a peer node owned by a member in a Managed Blockchain network.
      type: object
      properties:
        ChaincodeLogs:
          $ref: "#/components/schemas/LogConfigurations"
          description: Configuration properties for logging events associated with chaincode execution on a peer node. Chaincode logs contain the results of instantiating, invoking, and querying the chaincode. A peer can run multiple instances of chaincode. When enabled, a log stream is created for all chaincodes, with an individual log stream for each chaincode.
        PeerLogs:
          $ref: "#/components/schemas/LogConfigurations"
          description: Configuration properties for a peer node log. Peer node logs contain messages generated when your client submits transaction proposals to peer nodes, requests to join channels, enrolls an admin peer, and lists the chaincode instances on a peer node.
    StateDBType:
      type: string
      enum:
        - LevelDB
        - CouchDB
    CreateNodeOutput:
      type: object
      properties:
        NodeId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the node.
    ProposalActions:
      description: The actions to carry out if a proposal is APPROVED. Applies only to Hyperledger Fabric.
      type: object
      properties:
        Invitations:
          $ref: "#/components/schemas/InviteActionList"
          description: The actions to perform for an APPROVED proposal to invite an Amazon Web Services account to create a member and join the network.
        Removals:
          $ref: "#/components/schemas/RemoveActionList"
          description: The actions to perform for an APPROVED proposal to remove a member from the network, which deletes the member and all associated member resources from the network.
    InviteActionList:
      type: array
      items:
        $ref: "#/components/schemas/InviteAction"
    InviteAction:
      description: An action to invite a specific Amazon Web Services account to create a member and join the network. The InviteAction is carried out when a Proposal is APPROVED. Applies only to Hyperledger Fabric.
      type: object
      properties:
        Principal:
          $ref: "#/components/schemas/PrincipalString"
          description: The Amazon Web Services account ID to invite.
      required:
        - Principal
    PrincipalString:
      type: string
    RemoveActionList:
      type: array
      items:
        $ref: "#/components/schemas/RemoveAction"
    RemoveAction:
      description: An action to remove a member from a Managed Blockchain network as the result of a removal proposal that is APPROVED. The member and all associated resources are deleted from the network. Applies only to Hyperledger Fabric.
      type: object
      properties:
        MemberId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the member to remove.
      required:
        - MemberId
    CreateProposalOutput:
      type: object
      properties:
        ProposalId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the proposal.
    DeleteAccessorOutput:
      type: object
    DeleteMemberOutput:
      type: object
    DeleteNodeOutput:
      type: object
    GetAccessorOutput:
      type: object
      properties:
        Accessor:
          $ref: "#/components/schemas/Accessor"
          description: The properties of the accessor.
    Accessor:
      description: The properties of the Accessor.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the accessor.
        Type:
          $ref: "#/components/schemas/AccessorType"
          description: The type of the accessor. Currently, accessor type is restricted to BILLING_TOKEN.
        BillingToken:
          $ref: "#/components/schemas/AccessorBillingTokenString"
          description: The billing token is a property of the Accessor. Use this token to when making calls to the blockchain network. The billing token is used to track your accessor token for billing requests.
        Status:
          $ref: "#/components/schemas/AccessorStatus"
          description: The current status of the accessor.
        CreationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The creation date and time of the accessor.
        Arn:
          $ref: "#/components/schemas/ArnString"
          description: The Amazon Resource Name (ARN) of the accessor. For more information about ARNs and their format, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference.
        Tags:
          type: object
          properties: {}
          description: The tags assigned to the Accessor. For more information about tags, see Tagging Resources in the Amazon Managed Blockchain Ethereum Developer Guide, or Tagging Resources in the Amazon Managed Blockchain Hyperledger Fabric Developer Guide.
        NetworkType:
          $ref: "#/components/schemas/AccessorNetworkType"
          description: The blockchain network that the Accessor token is created for.
    AccessorStatus:
      type: string
      enum:
        - AVAILABLE
        - PENDING_DELETION
        - DELETED
    Timestamp:
      type: string
      format: date-time
    GetMemberOutput:
      type: object
      properties:
        Member:
          $ref: "#/components/schemas/Member"
          description: The properties of a member.
    Member:
      description: Member configuration properties. Applies only to Hyperledger Fabric.
      type: object
      properties:
        NetworkId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the network to which the member belongs.
        Id:
          $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the member.
        Name:
          $ref: "#/components/schemas/NetworkMemberNameString"
          description: The name of the member.
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: An optional description for the member.
        FrameworkAttributes:
          $ref: "#/components/schemas/MemberFrameworkAttributes"
          description: Attributes relevant to a member for the blockchain framework that the Managed Blockchain network uses.
        LogPublishingConfiguration:
          $ref: "#/components/schemas/MemberLogPublishingConfiguration"
          description: Configuration properties for logging events associated with a member.
        Status:
          $ref: "#/components/schemas/MemberStatus"
          description: The status of a member. CREATING - The Amazon Web Services account is in the process of creating a member. AVAILABLE - The member has been created and can participate in the network. CREATE_FAILED - The Amazon Web Services account attempted to create a member and creation failed. UPDATING - The member is in the process of being updated. DELETING - The member and all associated resources are in the process of being deleted. Either the Amazon Web Services account that owns the member deleted it, or the member is being deleted as the result of an APPROVED PROPOSAL to remove the member. DELETED - The member can no longer participate on the network and all associated resources are deleted. Either the Amazon Web Services account that owns the member deleted it, or the member is being deleted as the result of an APPROVED PROPOSAL to remove the member. INACCESSIBLE_ENCRYPTION_KEY - The member is impaired and might not function as expected because it cannot access the specified customer managed key in KMS for encryption at rest. Either the KMS key was disabled or deleted, or the grants on the key were revoked. The effect of disabling or deleting a key or of revoking a grant isn't immediate. It might take some time for the member resource to discover that the key is inaccessible. When a resource is in this state, we recommend deleting and recreating the resource.
        CreationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the member was created.
        Tags:
          type: object
          properties: {}
          description: Tags assigned to the member. Tags consist of a key and optional value. For more information about tags, see Tagging Resources in the Amazon Managed Blockchain Ethereum Developer Guide, or Tagging Resources in the Amazon Managed Blockchain Hyperledger Fabric Developer Guide.
        Arn:
          $ref: "#/components/schemas/ArnString"
          description: The Amazon Resource Name (ARN) of the member. For more information about ARNs and their format, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference.
        KmsKeyArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the customer managed key in Key Management Service (KMS) that the member uses for encryption at rest. If the value of this parameter is "AWS Owned KMS Key", the member uses an Amazon Web Services owned KMS key for encryption. This parameter is inherited by the nodes that this member owns. For more information, see Encryption at Rest in the Amazon Managed Blockchain Hyperledger Fabric Developer Guide.
    MemberFrameworkAttributes:
      description: Attributes relevant to a member for the blockchain framework that the Managed Blockchain network uses.
      type: object
      properties:
        Fabric:
          $ref: "#/components/schemas/MemberFabricAttributes"
          description: Attributes of Hyperledger Fabric relevant to a member on a Managed Blockchain network that uses Hyperledger Fabric.
    MemberFabricAttributes:
      description: Attributes of Hyperledger Fabric for a member in a Managed Blockchain network using the Hyperledger Fabric framework.
      type: object
      properties:
        AdminUsername:
          $ref: "#/components/schemas/UsernameString"
          description: The user name for the initial administrator user for the member.
        CaEndpoint:
          $ref: "#/components/schemas/String"
          description: The endpoint used to access the member's certificate authority.
    String:
      type: string
    MemberStatus:
      type: string
      enum:
        - CREATING
        - AVAILABLE
        - CREATE_FAILED
        - UPDATING
        - DELETING
        - DELETED
        - INACCESSIBLE_ENCRYPTION_KEY
    GetNetworkOutput:
      type: object
      properties:
        Network:
          $ref: "#/components/schemas/Network"
          description: An object containing network configuration parameters.
    Network:
      description: Network configuration properties.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the network.
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the network.
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: Attributes of the blockchain framework for the network.
        Framework:
          $ref: "#/components/schemas/Framework"
          description: The blockchain framework that the network uses.
        FrameworkVersion:
          $ref: "#/components/schemas/FrameworkVersionString"
          description: The version of the blockchain framework that the network uses.
        FrameworkAttributes:
          $ref: "#/components/schemas/NetworkFrameworkAttributes"
          description: Attributes of the blockchain framework that the network uses.
        VpcEndpointServiceName:
          $ref: "#/components/schemas/String"
          description: The VPC endpoint service name of the VPC endpoint service of the network. Members use the VPC endpoint service name to create a VPC endpoint to access network resources.
        VotingPolicy:
          $ref: "#/components/schemas/VotingPolicy"
          description: The voting rules that the network uses to decide if a proposal is accepted.
        Status:
          $ref: "#/components/schemas/NetworkStatus"
          description: The current status of the network.
        CreationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the network was created.
        Tags:
          type: object
          properties: {}
          description: Tags assigned to the network. Each tag consists of a key and optional value. For more information about tags, see Tagging Resources in the Amazon Managed Blockchain Ethereum Developer Guide, or Tagging Resources in the Amazon Managed Blockchain Hyperledger Fabric Developer Guide.
        Arn:
          $ref: "#/components/schemas/ArnString"
          description: The Amazon Resource Name (ARN) of the network. For more information about ARNs and their format, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference.
    NetworkFrameworkAttributes:
      description: Attributes relevant to the network for the blockchain framework that the network uses.
      type: object
      properties:
        Fabric:
          $ref: "#/components/schemas/NetworkFabricAttributes"
          description: Attributes of Hyperledger Fabric for a Managed Blockchain network that uses Hyperledger Fabric.
        Ethereum:
          $ref: "#/components/schemas/NetworkEthereumAttributes"
          description: Attributes of an Ethereum network for Managed Blockchain resources participating in an Ethereum network.
    NetworkFabricAttributes:
      description: Attributes of Hyperledger Fabric for a network.
      type: object
      properties:
        OrderingServiceEndpoint:
          $ref: "#/components/schemas/String"
          description: The endpoint of the ordering service for the network.
        Edition:
          $ref: "#/components/schemas/Edition"
          description: The edition of Amazon Managed Blockchain that Hyperledger Fabric uses. For more information, see Amazon Managed Blockchain Pricing.
    NetworkEthereumAttributes:
      description: Attributes of Ethereum for a network.
      type: object
      properties:
        ChainId:
          $ref: "#/components/schemas/String"
          description: "The Ethereum CHAIN_ID associated with the Ethereum network. Chain IDs are as follows: mainnet = 1"
    NetworkStatus:
      type: string
      enum:
        - CREATING
        - AVAILABLE
        - CREATE_FAILED
        - DELETING
        - DELETED
    GetNodeOutput:
      type: object
      properties:
        Node:
          $ref: "#/components/schemas/Node"
          description: Properties of the node configuration.
    Node:
      description: Configuration properties of a node.
      type: object
      properties:
        NetworkId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the network that the node is on.
        MemberId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the member to which the node belongs. Applies only to Hyperledger Fabric.
        Id:
          $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the node.
        InstanceType:
          $ref: "#/components/schemas/InstanceTypeString"
          description: The instance type of the node.
        AvailabilityZone:
          $ref: "#/components/schemas/AvailabilityZoneString"
          description: The Availability Zone in which the node exists. Required for Ethereum nodes.
        FrameworkAttributes:
          $ref: "#/components/schemas/NodeFrameworkAttributes"
          description: Attributes of the blockchain framework being used.
        LogPublishingConfiguration:
          $ref: "#/components/schemas/NodeLogPublishingConfiguration"
          description: Configuration properties for logging events associated with a peer node on a Hyperledger Fabric network on Managed Blockchain.
        StateDB:
          $ref: "#/components/schemas/StateDBType"
          description: The state database that the node uses. Values are LevelDB or CouchDB. Applies only to Hyperledger Fabric.
        Status:
          $ref: "#/components/schemas/NodeStatus"
          description: The status of the node. CREATING - The Amazon Web Services account is in the process of creating a node. AVAILABLE - The node has been created and can participate in the network. UNHEALTHY - The node is impaired and might not function as expected. Amazon Managed Blockchain automatically finds nodes in this state and tries to recover them. If a node is recoverable, it returns to AVAILABLE. Otherwise, it moves to FAILED status. CREATE_FAILED - The Amazon Web Services account attempted to create a node and creation failed. UPDATING - The node is in the process of being updated. DELETING - The node is in the process of being deleted. DELETED - The node can no longer participate on the network. FAILED - The node is no longer functional, cannot be recovered, and must be deleted. INACCESSIBLE_ENCRYPTION_KEY - The node is impaired and might not function as expected because it cannot access the specified customer managed key in KMS for encryption at rest. Either the KMS key was disabled or deleted, or the grants on the key were revoked. The effect of disabling or deleting a key or of revoking a grant isn't immediate. It might take some time for the node resource to discover that the key is inaccessible. When a resource is in this state, we recommend deleting and recreating the resource.
        CreationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the node was created.
        Tags:
          type: object
          properties: {}
          description: Tags assigned to the node. Each tag consists of a key and optional value. For more information about tags, see Tagging Resources in the Amazon Managed Blockchain Ethereum Developer Guide, or Tagging Resources in the Amazon Managed Blockchain Hyperledger Fabric Developer Guide.
        Arn:
          $ref: "#/components/schemas/ArnString"
          description: The Amazon Resource Name (ARN) of the node. For more information about ARNs and their format, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference.
        KmsKeyArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the customer managed key in Key Management Service (KMS) that the node uses for encryption at rest. If the value of this parameter is "AWS Owned KMS Key", the node uses an Amazon Web Services owned KMS key for encryption. The node inherits this parameter from the member that it belongs to. For more information, see Encryption at Rest in the Amazon Managed Blockchain Hyperledger Fabric Developer Guide. Applies only to Hyperledger Fabric.
    NodeFrameworkAttributes:
      description: Attributes relevant to a node on a Managed Blockchain network for the blockchain framework that the network uses.
      type: object
      properties:
        Fabric:
          $ref: "#/components/schemas/NodeFabricAttributes"
          description: Attributes of Hyperledger Fabric for a peer node on a Managed Blockchain network that uses Hyperledger Fabric.
        Ethereum:
          $ref: "#/components/schemas/NodeEthereumAttributes"
          description: Attributes of Ethereum for a node on a Managed Blockchain network that uses Ethereum.
    NodeFabricAttributes:
      description: Attributes of Hyperledger Fabric for a peer node on a Hyperledger Fabric network on Managed Blockchain.
      type: object
      properties:
        PeerEndpoint:
          $ref: "#/components/schemas/String"
          description: The endpoint that identifies the peer node for all services except peer channel-based event services.
        PeerEventEndpoint:
          $ref: "#/components/schemas/String"
          description: The endpoint that identifies the peer node for peer channel-based event services.
    NodeEthereumAttributes:
      description: Attributes of an Ethereum node.
      type: object
      properties:
        HttpEndpoint:
          $ref: "#/components/schemas/String"
          description: The endpoint on which the Ethereum node listens to run Ethereum API methods over HTTP connections from a client. Use this endpoint in client code for smart contracts when using an HTTP connection. Connections to this endpoint are authenticated using Signature Version 4.
        WebSocketEndpoint:
          $ref: "#/components/schemas/String"
          description: The endpoint on which the Ethereum node listens to run Ethereum JSON-RPC methods over WebSocket connections from a client. Use this endpoint in client code for smart contracts when using a WebSocket connection. Connections to this endpoint are authenticated using Signature Version 4.
    NodeStatus:
      type: string
      enum:
        - CREATING
        - AVAILABLE
        - UNHEALTHY
        - CREATE_FAILED
        - UPDATING
        - DELETING
        - DELETED
        - FAILED
        - INACCESSIBLE_ENCRYPTION_KEY
    GetProposalOutput:
      type: object
      properties:
        Proposal:
          $ref: "#/components/schemas/Proposal"
          description: Information about a proposal.
    Proposal:
      description: Properties of a proposal on a Managed Blockchain network. Applies only to Hyperledger Fabric.
      type: object
      properties:
        ProposalId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the proposal.
        NetworkId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the network for which the proposal is made.
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: The description of the proposal.
        Actions:
          $ref: "#/components/schemas/ProposalActions"
          description: The actions to perform on the network if the proposal is APPROVED.
        ProposedByMemberId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The unique identifier of the member that created the proposal.
        ProposedByMemberName:
          $ref: "#/components/schemas/NetworkMemberNameString"
          description: The name of the member that created the proposal.
        Status:
          $ref: "#/components/schemas/ProposalStatus"
          description: "The status of the proposal. Values are as follows: IN_PROGRESS - The proposal is active and open for member voting. APPROVED - The proposal was approved with sufficient YES votes among members according to the VotingPolicy specified for the Network. The specified proposal actions are carried out. REJECTED - The proposal was rejected with insufficient YES votes among members according to the VotingPolicy specified for the Network. The specified ProposalActions aren't carried out. EXPIRED - Members didn't cast the number of votes required to determine the proposal outcome before the proposal expired. The specified ProposalActions aren't carried out. ACTION_FAILED - One or more of the specified ProposalActions in a proposal that was approved couldn't be completed because of an error. The ACTION_FAILED status occurs even if only one ProposalAction fails and other actions are successful."
        CreationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the proposal was created.
        ExpirationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the proposal expires. This is the CreationDate plus the ProposalDurationInHours that is specified in the ProposalThresholdPolicy. After this date and time, if members haven't cast enough votes to determine the outcome according to the voting policy, the proposal is EXPIRED and Actions aren't carried out.
        YesVoteCount:
          $ref: "#/components/schemas/VoteCount"
          description: The current total of YES votes cast on the proposal by members.
        NoVoteCount:
          $ref: "#/components/schemas/VoteCount"
          description: The current total of NO votes cast on the proposal by members.
        OutstandingVoteCount:
          $ref: "#/components/schemas/VoteCount"
          description: The number of votes remaining to be cast on the proposal by members. In other words, the number of members minus the sum of YES votes and NO votes.
        Tags:
          type: object
          properties: {}
          description: Tags assigned to the proposal. Each tag consists of a key and optional value. For more information about tags, see Tagging Resources in the Amazon Managed Blockchain Ethereum Developer Guide, or Tagging Resources in the Amazon Managed Blockchain Hyperledger Fabric Developer Guide.
        Arn:
          $ref: "#/components/schemas/ArnString"
          description: The Amazon Resource Name (ARN) of the proposal. For more information about ARNs and their format, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference.
