openapi: 3.0.0
info:
  version: "2018-11-01"
  title: Amazon Timestream Query
  description: Amazon Timestream Query
  x-serviceName: timestream
  x-serviceAlias: timestream_query
  x-protocol: json
  x-apiVersion: "2018-11-01"
  x-endpointPrefix: query.timestream
  x-targetPrefix: Timestream_20181101
  x-jsonVersion: "1.0"
servers:
  - url: https://query.timestream.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for timestream-query
paths:
  /CancelQuery:
    post:
      operationId: CancelQuery
      description: Cancels a query that has been issued. Cancellation is provided only if the query has not completed running before the cancellation request was issued. Because cancellation is an idempotent operation, subsequent cancellation requests will return a CancellationMessage, indicating that the query has already been canceled. See code sample for details.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.CancelQuery
            default: Timestream_20181101.CancelQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                QueryId:
                  $ref: "#/components/schemas/QueryId"
                  description: The ID of the query that needs to be cancelled. QueryID is returned as part of the query result.
              required:
                - QueryId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelQueryResponse"
  /CreateScheduledQuery:
    post:
      operationId: CreateScheduledQuery
      description: Create a scheduled query that will be run on your behalf at the configured schedule. Timestream assumes the execution role provided as part of the ScheduledQueryExecutionRoleArn parameter to run the query. You can use the NotificationConfiguration parameter to configure notification for your scheduled query operations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.CreateScheduledQuery
            default: Timestream_20181101.CreateScheduledQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ScheduledQueryName"
                  description: Name of the scheduled query.
                QueryString:
                  $ref: "#/components/schemas/QueryString"
                  description: The query string to run. Parameter names can be specified in the query string @ character followed by an identifier. The named Parameter @scheduled_runtime is reserved and can be used in the query to get the time at which the query is scheduled to run. The timestamp calculated according to the ScheduleConfiguration parameter, will be the value of @scheduled_runtime paramater for each query run. For example, consider an instance of a scheduled query executing on 2021-12-01 00:00:00. For this instance, the @scheduled_runtime parameter is initialized to the timestamp 2021-12-01 00:00:00 when invoking the query.
                ScheduleConfiguration:
                  $ref: "#/components/schemas/ScheduleConfiguration"
                  description: The schedule configuration for the query.
                NotificationConfiguration:
                  $ref: "#/components/schemas/NotificationConfiguration"
                  description: Notification configuration for the scheduled query. A notification is sent by Timestream when a query run finishes, when the state is updated or when you delete it.
                TargetConfiguration:
                  $ref: "#/components/schemas/TargetConfiguration"
                  description: Configuration used for writing the result of a query.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Using a ClientToken makes the call to CreateScheduledQuery idempotent, in other words, making the same request repeatedly will produce the same result. Making multiple identical CreateScheduledQuery requests has the same effect as making a single request. If CreateScheduledQuery is called without a ClientToken, the Query SDK generates a ClientToken on your behalf. After 8 hours, any request with the same ClientToken is treated as a new request.
                ScheduledQueryExecutionRoleArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The ARN for the IAM role that Timestream will assume when running the scheduled query.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of key-value pairs to label the scheduled query.
                KmsKeyId:
                  $ref: "#/components/schemas/StringValue2048"
                  description: The Amazon KMS key used to encrypt the scheduled query resource, at-rest. If the Amazon KMS key is not specified, the scheduled query resource will be encrypted with a Timestream owned Amazon KMS key. To specify a KMS key, use the key ID, key ARN, alias name, or alias ARN. When using an alias name, prefix the name with alias/ If ErrorReportConfiguration uses SSE_KMS as encryption type, the same KmsKeyId is used to encrypt the error report at rest.
                ErrorReportConfiguration:
                  $ref: "#/components/schemas/ErrorReportConfiguration"
                  description: Configuration for error reporting. Error reports will be generated when a problem is encountered when writing the query results.
              required:
                - QueryString
                - ScheduleConfiguration
                - NotificationConfiguration
                - ScheduledQueryExecutionRoleArn
                - ErrorReportConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateScheduledQueryResponse"
  /DeleteScheduledQuery:
    post:
      operationId: DeleteScheduledQuery
      description: Deletes a given scheduled query. This is an irreversible operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.DeleteScheduledQuery
            default: Timestream_20181101.DeleteScheduledQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ScheduledQueryArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The ARN of the scheduled query.
              required:
                - ScheduledQueryArn
      responses:
        "200":
          description: Success
  /DescribeAccountSettings:
    post:
      operationId: DescribeAccountSettings
      description: Describes the settings for your account that include the query pricing model and the configured maximum TCUs the service can use for your query workload. You're charged only for the duration of compute units used for your workloads.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.DescribeAccountSettings
            default: Timestream_20181101.DescribeAccountSettings
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAccountSettingsResponse"
  /DescribeEndpoints:
    post:
      operationId: DescribeEndpoints
      description: "DescribeEndpoints returns a list of available endpoints to make Timestream API calls against. This API is available through both Write and Query. Because the Timestream SDKs are designed to transparently work with the service’s architecture, including the management and mapping of the service endpoints, it is not recommended that you use this API unless: You are using VPC endpoints (Amazon Web Services PrivateLink) with Timestream Your application uses a programming language that does not yet have SDK support You require better control over the client-side implementation For detailed information on how and when to use and implement DescribeEndpoints, see The Endpoint Discovery Pattern."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.DescribeEndpoints
            default: Timestream_20181101.DescribeEndpoints
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEndpointsResponse"
  /DescribeScheduledQuery:
    post:
      operationId: DescribeScheduledQuery
      description: Provides detailed information about a scheduled query.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.DescribeScheduledQuery
            default: Timestream_20181101.DescribeScheduledQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ScheduledQueryArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The ARN of the scheduled query.
              required:
                - ScheduledQueryArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeScheduledQueryResponse"
  /ExecuteScheduledQuery:
    post:
      operationId: ExecuteScheduledQuery
      description: You can use this API to run a scheduled query manually. If you enabled QueryInsights, this API also returns insights and metrics related to the query that you executed as part of an Amazon SNS notification. QueryInsights helps with performance tuning of your query. For more information about QueryInsights, see Using query insights to optimize queries in Amazon Timestream.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.ExecuteScheduledQuery
            default: Timestream_20181101.ExecuteScheduledQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ScheduledQueryArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: ARN of the scheduled query.
                InvocationTime:
                  $ref: "#/components/schemas/Time"
                  description: The timestamp in UTC. Query will be run as if it was invoked at this timestamp.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Not used.
                QueryInsights:
                  $ref: "#/components/schemas/ScheduledQueryInsights"
                  description: Encapsulates settings for enabling QueryInsights. Enabling QueryInsights returns insights and metrics as a part of the Amazon SNS notification for the query that you executed. You can use QueryInsights to tune your query performance and cost.
              required:
                - ScheduledQueryArn
                - InvocationTime
      responses:
        "200":
          description: Success
  /ListScheduledQueries:
    post:
      operationId: ListScheduledQueries
      description: Gets a list of all scheduled queries in the caller's Amazon account and Region. ListScheduledQueries is eventually consistent.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.ListScheduledQueries
            default: Timestream_20181101.ListScheduledQueries
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxScheduledQueriesResults"
                  description: The maximum number of items to return in the output. If the total number of items available is more than the value specified, a NextToken is provided in the output. To resume pagination, provide the NextToken value as the argument to the subsequent call to ListScheduledQueriesRequest.
                NextToken:
                  $ref: "#/components/schemas/NextScheduledQueriesResultsToken"
                  description: A pagination token to resume pagination.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListScheduledQueriesResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: List all tags on a Timestream query resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.ListTagsForResource
            default: Timestream_20181101.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Timestream resource with tags to be listed. This value is an Amazon Resource Name (ARN).
                MaxResults:
                  $ref: "#/components/schemas/MaxTagsForResourceResult"
                  description: The maximum number of tags to return.
                NextToken:
                  $ref: "#/components/schemas/NextTagsForResourceResultsToken"
                  description: A pagination token to resume pagination.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /PrepareQuery:
    post:
      operationId: PrepareQuery
      description: A synchronous operation that allows you to submit a query with parameters to be stored by Timestream for later running. Timestream only supports using this operation with ValidateOnly set to true.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.PrepareQuery
            default: Timestream_20181101.PrepareQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                QueryString:
                  $ref: "#/components/schemas/QueryString"
                  description: The Timestream query string that you want to use as a prepared statement. Parameter names can be specified in the query string @ character followed by an identifier.
                ValidateOnly:
                  $ref: "#/components/schemas/NullableBoolean"
                  description: By setting this value to true, Timestream will only validate that the query string is a valid Timestream query, and not store the prepared query for later use.
              required:
                - QueryString
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrepareQueryResponse"
  /Query:
    post:
      operationId: Query
      description: "Query is a synchronous operation that enables you to run a query against your Amazon Timestream data. If you enabled QueryInsights, this API also returns insights and metrics related to the query that you executed. QueryInsights helps with performance tuning of your query. For more information about QueryInsights, see Using query insights to optimize queries in Amazon Timestream. The maximum number of Query API requests you're allowed to make with QueryInsights enabled is 1 query per second (QPS). If you exceed this query rate, it might result in throttling. Query will time out after 60 seconds. You must update the default timeout in the SDK to support a timeout of 60 seconds. See the code sample for details. Your query request will fail in the following cases: If you submit a Query request with the same client token outside of the 5-minute idempotency window. If you submit a Query request with the same client token, but change other parameters, within the 5-minute idempotency window. If the size of the row (including the query metadata) exceeds 1 MB, then the query will fail with the following error message: Query aborted as max page response size has been exceeded by the output result row If the IAM principal of the query initiator and the result reader are not the same and/or the query initiator and the result reader do not have the same query string in the query requests, the query will fail with an Invalid pagination token error."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.Query
            default: Timestream_20181101.Query
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                QueryString:
                  $ref: "#/components/schemas/QueryString"
                  description: The query to be run by Timestream.
                ClientToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: "Unique, case-sensitive string of up to 64 ASCII characters specified when a Query request is made. Providing a ClientToken makes the call to Query idempotent. This means that running the same query repeatedly will produce the same result. In other words, making multiple identical Query requests has the same effect as making a single request. When using ClientToken in a query, note the following: If the Query API is instantiated without a ClientToken, the Query SDK generates a ClientToken on your behalf. If the Query invocation only contains the ClientToken but does not include a NextToken, that invocation of Query is assumed to be a new query run. If the invocation contains NextToken, that particular invocation is assumed to be a subsequent invocation of a prior call to the Query API, and a result set is returned. After 4 hours, any request with the same ClientToken is treated as a new request."
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: "A pagination token used to return a set of results. When the Query API is invoked using NextToken, that particular invocation is assumed to be a subsequent invocation of a prior call to Query, and a result set is returned. However, if the Query invocation only contains the ClientToken, that invocation of Query is assumed to be a new query run. Note the following when using NextToken in a query: A pagination token can be used for up to five Query invocations, OR for a duration of up to 1 hour – whichever comes first. Using the same NextToken will return the same set of records. To keep paginating through the result set, you must to use the most recent nextToken. Suppose a Query invocation returns two NextToken values, TokenA and TokenB. If TokenB is used in a subsequent Query invocation, then TokenA is invalidated and cannot be reused. To request a previous result set from a query after pagination has begun, you must re-invoke the Query API. The latest NextToken should be used to paginate until null is returned, at which point a new NextToken should be used. If the IAM principal of the query initiator and the result reader are not the same and/or the query initiator and the result reader do not have the same query string in the query requests, the query will fail with an Invalid pagination token error."
                MaxRows:
                  $ref: "#/components/schemas/MaxQueryResults"
                  description: "The total number of rows to be returned in the Query output. The initial run of Query with a MaxRows value specified will return the result set of the query in two cases: The size of the result is less than 1MB. The number of rows in the result set is less than the value of maxRows. Otherwise, the initial invocation of Query only returns a NextToken, which can then be used in subsequent calls to fetch the result set. To resume pagination, provide the NextToken value in the subsequent command. If the row size is large (e.g. a row has many columns), Timestream may return fewer rows to keep the response size from exceeding the 1 MB limit. If MaxRows is not provided, Timestream will send the necessary number of rows to meet the 1 MB limit."
                QueryInsights:
                  $ref: "#/components/schemas/QueryInsights"
                  description: Encapsulates settings for enabling QueryInsights. Enabling QueryInsights returns insights and metrics in addition to query results for the query that you executed. You can use QueryInsights to tune your query performance.
              required:
                - QueryString
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Associate a set of tags with a Timestream resource. You can then activate these user-defined tags so that they appear on the Billing and Cost Management console for cost allocation tracking.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.TagResource
            default: Timestream_20181101.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: Identifies the Timestream resource to which tags should be added. This value is an Amazon Resource Name (ARN).
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to be assigned to the Timestream resource.
              required:
                - ResourceARN
                - Tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes the association of tags from a Timestream query resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.UntagResource
            default: Timestream_20181101.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Timestream resource that the tags will be removed from. This value is an Amazon Resource Name (ARN).
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: A list of tags keys. Existing tags of the resource whose keys are members of this list will be removed from the Timestream resource.
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateAccountSettings:
    post:
      operationId: UpdateAccountSettings
      description: Transitions your account to use TCUs for query pricing and modifies the maximum query compute units that you've configured. If you reduce the value of MaxQueryTCU to a desired configuration, the new value can take up to 24 hours to be effective. After you've transitioned your account to use TCUs for query pricing, you can't transition to using bytes scanned for query pricing.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.UpdateAccountSettings
            default: Timestream_20181101.UpdateAccountSettings
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MaxQueryTCU:
                  $ref: "#/components/schemas/MaxQueryCapacity"
                  description: The maximum number of compute units the service will use at any point in time to serve your queries. To run queries, you must set a minimum capacity of 4 TCU. You can set the maximum number of TCU in multiples of 4, for example, 4, 8, 16, 32, and so on. The maximum value supported for MaxQueryTCU is 1000. To request an increase to this soft limit, contact Amazon Web Services Support. For information about the default quota for maxQueryTCU, see Default quotas. This configuration is applicable only for on-demand usage of Timestream Compute Units (TCUs). The maximum value supported for MaxQueryTCU is 1000. To request an increase to this soft limit, contact Amazon Web Services Support. For information about the default quota for maxQueryTCU, see Default quotas.
                QueryPricingModel:
                  $ref: "#/components/schemas/QueryPricingModel"
                  description: The pricing model for queries in an account. The QueryPricingModel parameter is used by several Timestream operations; however, the UpdateAccountSettings API operation doesn't recognize any values other than COMPUTE_UNITS.
                QueryCompute:
                  $ref: "#/components/schemas/QueryComputeRequest"
                  description: Modifies the query compute settings configured in your account, including the query pricing model and provisioned Timestream Compute Units (TCUs) in your account. This API is idempotent, meaning that making the same request multiple times will have the same effect as making the request once.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAccountSettingsResponse"
  /UpdateScheduledQuery:
    post:
      operationId: UpdateScheduledQuery
      description: Update a scheduled query.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Timestream_20181101.UpdateScheduledQuery
            default: Timestream_20181101.UpdateScheduledQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ScheduledQueryArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: ARN of the scheuled query.
                State:
                  $ref: "#/components/schemas/ScheduledQueryState"
                  description: State of the scheduled query.
              required:
                - ScheduledQueryArn
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    QueryId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9]+"
    CancelQueryResponse:
      type: object
      properties:
        CancellationMessage:
          $ref: "#/components/schemas/String"
          description: A CancellationMessage is returned when a CancelQuery request for the query specified by QueryId has already been issued.
    String:
      type: string
    ScheduledQueryName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9|!\\-_*'\\(\\)]([a-zA-Z0-9]|[!\\-_*'\\(\\)\\/.])+"
    QueryString:
      type: string
      minLength: 1
      maxLength: 262144
    ScheduleConfiguration:
      description: Configuration of the schedule of the query.
      type: object
      properties:
        ScheduleExpression:
          $ref: "#/components/schemas/ScheduleExpression"
          description: An expression that denotes when to trigger the scheduled query run. This can be a cron expression or a rate expression.
      required:
        - ScheduleExpression
    ScheduleExpression:
      type: string
      minLength: 1
      maxLength: 256
    NotificationConfiguration:
      description: Notification configuration for a scheduled query. A notification is sent by Timestream when a scheduled query is created, its state is updated or when it is deleted.
      type: object
      properties:
        SnsConfiguration:
          $ref: "#/components/schemas/SnsConfiguration"
          description: Details about the Amazon Simple Notification Service (SNS) configuration. This field is visible only when SNS Topic is provided when updating the account settings.
      required:
        - SnsConfiguration
    SnsConfiguration:
      description: Details on SNS that are required to send the notification.
      type: object
      properties:
        TopicArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: SNS topic ARN that the scheduled query status notifications will be sent to.
      required:
        - TopicArn
    AmazonResourceName:
      type: string
      minLength: 1
      maxLength: 2048
    TargetConfiguration:
      description: Configuration used for writing the output of a query.
      type: object
      properties:
        TimestreamConfiguration:
          $ref: "#/components/schemas/TimestreamConfiguration"
          description: Configuration needed to write data into the Timestream database and table.
      required:
        - TimestreamConfiguration
    TimestreamConfiguration:
      description: Configuration to write data into Timestream database and table. This configuration allows the user to map the query result select columns into the destination table columns.
      type: object
      properties:
        DatabaseName:
          $ref: "#/components/schemas/ResourceName"
          description: Name of Timestream database to which the query result will be written.
        TableName:
          $ref: "#/components/schemas/ResourceName"
          description: Name of Timestream table that the query result will be written to. The table should be within the same database that is provided in Timestream configuration.
        TimeColumn:
          $ref: "#/components/schemas/SchemaName"
          description: Column from query result that should be used as the time column in destination table. Column type for this should be TIMESTAMP.
        DimensionMappings:
          $ref: "#/components/schemas/DimensionMappingList"
          description: This is to allow mapping column(s) from the query result to the dimension in the destination table.
        MultiMeasureMappings:
          $ref: "#/components/schemas/MultiMeasureMappings"
          description: Multi-measure mappings.
        MixedMeasureMappings:
          $ref: "#/components/schemas/MixedMeasureMappingList"
          description: Specifies how to map measures to multi-measure records.
        MeasureNameColumn:
          $ref: "#/components/schemas/SchemaName"
          description: Name of the measure column.
      required:
        - DatabaseName
        - TableName
        - TimeColumn
        - DimensionMappings
    ResourceName:
      type: string
    SchemaName:
      type: string
    DimensionMappingList:
      type: array
      items:
        $ref: "#/components/schemas/DimensionMapping"
    DimensionMapping:
      description: This type is used to map column(s) from the query result to a dimension in the destination table.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/SchemaName"
          description: Column name from query result.
        DimensionValueType:
          $ref: "#/components/schemas/DimensionValueType"
          description: Type for the dimension.
      required:
        - Name
        - DimensionValueType
    DimensionValueType:
      type: string
      enum:
        - VARCHAR
    MultiMeasureMappings:
      description: Only one of MixedMeasureMappings or MultiMeasureMappings is to be provided. MultiMeasureMappings can be used to ingest data as multi measures in the derived table.
      type: object
      properties:
        TargetMultiMeasureName:
          $ref: "#/components/schemas/SchemaName"
          description: The name of the target multi-measure name in the derived table. This input is required when measureNameColumn is not provided. If MeasureNameColumn is provided, then value from that column will be used as multi-measure name.
        MultiMeasureAttributeMappings:
          $ref: "#/components/schemas/MultiMeasureAttributeMappingList"
          description: Required. Attribute mappings to be used for mapping query results to ingest data for multi-measure attributes.
      required:
        - MultiMeasureAttributeMappings
    MultiMeasureAttributeMappingList:
      type: array
      items:
        $ref: "#/components/schemas/MultiMeasureAttributeMapping"
    MultiMeasureAttributeMapping:
      description: Attribute mapping for MULTI value measures.
      type: object
      properties:
        SourceColumn:
          $ref: "#/components/schemas/SchemaName"
          description: Source column from where the attribute value is to be read.
        TargetMultiMeasureAttributeName:
          $ref: "#/components/schemas/SchemaName"
          description: Custom name to be used for attribute name in derived table. If not provided, source column name would be used.
        MeasureValueType:
          $ref: "#/components/schemas/ScalarMeasureValueType"
          description: Type of the attribute to be read from the source column.
      required:
        - SourceColumn
        - MeasureValueType
    ScalarMeasureValueType:
      type: string
      enum:
        - BIGINT
        - BOOLEAN
        - DOUBLE
        - VARCHAR
        - TIMESTAMP
    MixedMeasureMappingList:
      type: array
      items:
        $ref: "#/components/schemas/MixedMeasureMapping"
    MixedMeasureMapping:
      description: MixedMeasureMappings are mappings that can be used to ingest data into a mixture of narrow and multi measures in the derived table.
      type: object
      properties:
        MeasureName:
          $ref: "#/components/schemas/SchemaName"
          description: Refers to the value of measure_name in a result row. This field is required if MeasureNameColumn is provided.
        SourceColumn:
          $ref: "#/components/schemas/SchemaName"
          description: This field refers to the source column from which measure-value is to be read for result materialization.
        TargetMeasureName:
          $ref: "#/components/schemas/SchemaName"
          description: Target measure name to be used. If not provided, the target measure name by default would be measure-name if provided, or sourceColumn otherwise.
        MeasureValueType:
          $ref: "#/components/schemas/MeasureValueType"
          description: Type of the value that is to be read from sourceColumn. If the mapping is for MULTI, use MeasureValueType.MULTI.
        MultiMeasureAttributeMappings:
          $ref: "#/components/schemas/MultiMeasureAttributeMappingList"
          description: Required when measureValueType is MULTI. Attribute mappings for MULTI value measures.
      required:
        - MeasureValueType
    MeasureValueType:
      type: string
      enum:
        - BIGINT
        - BOOLEAN
        - DOUBLE
        - VARCHAR
        - MULTI
    ClientToken:
      type: string
      minLength: 32
      maxLength: 128
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A tag is a label that you assign to a Timestream database and/or table. Each tag consists of a key and an optional value, both of which you define. Tags enable you to categorize databases and/or tables, for example, by purpose, owner, or environment.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key of the tag. Tag keys are case sensitive.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the tag. Tag values are case sensitive and can be null.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    StringValue2048:
      type: string
      minLength: 1
      maxLength: 2048
    ErrorReportConfiguration:
      description: Configuration required for error reporting.
      type: object
      properties:
        S3Configuration:
          $ref: "#/components/schemas/S3Configuration"
          description: The S3 configuration for the error reports.
      required:
        - S3Configuration
    S3Configuration:
      description: Details on S3 location for error reports that result from running a query.
      type: object
      properties:
        BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: Name of the S3 bucket under which error reports will be created.
        ObjectKeyPrefix:
          $ref: "#/components/schemas/S3ObjectKeyPrefix"
          description: Prefix for the error report key. Timestream by default adds the following prefix to the error report path.
        EncryptionOption:
          $ref: "#/components/schemas/S3EncryptionOption"
          description: Encryption at rest options for the error reports. If no encryption option is specified, Timestream will choose SSE_S3 as default.
      required:
        - BucketName
    S3BucketName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: "[a-z0-9][\\.\\-a-z0-9]{1,61}[a-z0-9]"
    S3ObjectKeyPrefix:
      type: string
      minLength: 1
      maxLength: 896
      pattern: "[a-zA-Z0-9|!\\-_*'\\(\\)]([a-zA-Z0-9]|[!\\-_*'\\(\\)\\/.])+"
    S3EncryptionOption:
      type: string
      enum:
        - SSE_S3
        - SSE_KMS
    CreateScheduledQueryResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: ARN for the created scheduled query.
      required:
        - Arn
    DescribeAccountSettingsResponse:
      type: object
      properties:
        MaxQueryTCU:
          $ref: "#/components/schemas/MaxQueryCapacity"
          description: The maximum number of Timestream compute units (TCUs) the service will use at any point in time to serve your queries. To run queries, you must set a minimum capacity of 4 TCU. You can set the maximum number of TCU in multiples of 4, for example, 4, 8, 16, 32, and so on. This configuration is applicable only for on-demand usage of (TCUs).
        QueryPricingModel:
          $ref: "#/components/schemas/QueryPricingModel"
          description: The pricing model for queries in your account. The QueryPricingModel parameter is used by several Timestream operations; however, the UpdateAccountSettings API operation doesn't recognize any values other than COMPUTE_UNITS.
        QueryCompute:
          $ref: "#/components/schemas/QueryComputeResponse"
          description: An object that contains the usage settings for Timestream Compute Units (TCUs) in your account for the query workload.
    MaxQueryCapacity:
      type: integer
    QueryPricingModel:
      type: string
      enum:
        - BYTES_SCANNED
        - COMPUTE_UNITS
    QueryComputeResponse:
      description: The response to a request to retrieve or update the compute capacity settings for querying data.
      type: object
      properties:
        ComputeMode:
          $ref: "#/components/schemas/ComputeMode"
          description: The mode in which Timestream Compute Units (TCUs) are allocated and utilized within an account. Note that in the Asia Pacific (Mumbai) region, the API operation only recognizes the value PROVISIONED.
        ProvisionedCapacity:
          $ref: "#/components/schemas/ProvisionedCapacityResponse"
          description: Configuration object that contains settings for provisioned Timestream Compute Units (TCUs) in your account.
    ComputeMode:
      type: string
      enum:
        - ON_DEMAND
        - PROVISIONED
    ProvisionedCapacityResponse:
      description: The response to a request to update the provisioned capacity settings for querying data.
      type: object
      properties:
        ActiveQueryTCU:
          $ref: "#/components/schemas/QueryTCU"
          description: The number of Timestream Compute Units (TCUs) provisioned in the account. This field is only visible when the compute mode is PROVISIONED.
        NotificationConfiguration:
          $ref: "#/components/schemas/AccountSettingsNotificationConfiguration"
          description: An object that contains settings for notifications that are sent whenever the provisioned capacity settings are modified. This field is only visible when the compute mode is PROVISIONED.
        LastUpdate:
          $ref: "#/components/schemas/LastUpdate"
          description: Information about the last update to the provisioned capacity settings.
    QueryTCU:
      type: integer
    AccountSettingsNotificationConfiguration:
      description: Configuration settings for notifications related to account settings.
      type: object
      properties:
        SnsConfiguration:
          $ref: "#/components/schemas/SnsConfiguration"
        RoleArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: An Amazon Resource Name (ARN) that grants Timestream permission to publish notifications. This field is only visible if SNS Topic is provided when updating the account settings.
      required:
        - RoleArn
    LastUpdate:
      description: Configuration object that contains the most recent account settings update, visible only if settings have been updated previously.
      type: object
      properties:
        TargetQueryTCU:
          $ref: "#/components/schemas/QueryTCU"
          description: The number of TimeStream Compute Units (TCUs) requested in the last account settings update.
        Status:
          $ref: "#/components/schemas/LastUpdateStatus"
          description: The status of the last update. Can be either PENDING, FAILED, or SUCCEEDED.
        StatusMessage:
          $ref: "#/components/schemas/String"
          description: Error message describing the last account settings update status, visible only if an error occurred.
    LastUpdateStatus:
      type: string
      enum:
        - PENDING
        - FAILED
        - SUCCEEDED
    DescribeEndpointsResponse:
      type: object
      properties:
        Endpoints:
          $ref: "#/components/schemas/Endpoints"
          description: An Endpoints object is returned when a DescribeEndpoints request is made.
      required:
        - Endpoints
    Endpoints:
      type: array
      items:
        $ref: "#/components/schemas/Endpoint"
    Endpoint:
      description: Represents an available endpoint against which to make API calls against, as well as the TTL for that endpoint.
      type: object
      properties:
        Address:
          $ref: "#/components/schemas/String"
          description: An endpoint address.
        CachePeriodInMinutes:
          $ref: "#/components/schemas/Long"
          description: The TTL for the endpoint, in minutes.
      required:
        - Address
        - CachePeriodInMinutes
    Long:
      type: integer
      format: int64
    DescribeScheduledQueryResponse:
      type: object
      properties:
        ScheduledQuery:
          $ref: "#/components/schemas/ScheduledQueryDescription"
          description: The scheduled query.
      required:
        - ScheduledQuery
    ScheduledQueryDescription:
      description: Structure that describes scheduled query.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: Scheduled query ARN.
        Name:
          $ref: "#/components/schemas/ScheduledQueryName"
          description: Name of the scheduled query.
        QueryString:
          $ref: "#/components/schemas/QueryString"
          description: The query to be run.
        CreationTime:
          $ref: "#/components/schemas/Time"
          description: Creation time of the scheduled query.
        State:
          $ref: "#/components/schemas/ScheduledQueryState"
          description: State of the scheduled query.
        PreviousInvocationTime:
          $ref: "#/components/schemas/Time"
          description: Last time the query was run.
        NextInvocationTime:
          $ref: "#/components/schemas/Time"
          description: The next time the scheduled query is scheduled to run.
        ScheduleConfiguration:
          $ref: "#/components/schemas/ScheduleConfiguration"
          description: Schedule configuration.
        NotificationConfiguration:
          $ref: "#/components/schemas/NotificationConfiguration"
          description: Notification configuration.
        TargetConfiguration:
          $ref: "#/components/schemas/TargetConfiguration"
          description: Scheduled query target store configuration.
        ScheduledQueryExecutionRoleArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: IAM role that Timestream uses to run the schedule query.
        KmsKeyId:
          $ref: "#/components/schemas/StringValue2048"
          description: A customer provided KMS key used to encrypt the scheduled query resource.
        ErrorReportConfiguration:
          $ref: "#/components/schemas/ErrorReportConfiguration"
          description: Error-reporting configuration for the scheduled query.
        LastRunSummary:
          $ref: "#/components/schemas/ScheduledQueryRunSummary"
          description: Runtime summary for the last scheduled query run.
        RecentlyFailedRuns:
          $ref: "#/components/schemas/ScheduledQueryRunSummaryList"
          description: Runtime summary for the last five failed scheduled query runs.
      required:
        - Arn
        - Name
        - QueryString
        - State
        - ScheduleConfiguration
        - NotificationConfiguration
    Time:
      type: string
      format: date-time
    ScheduledQueryState:
      type: string
      enum:
        - ENABLED
        - DISABLED
    ScheduledQueryRunSummary:
      description: Run summary for the scheduled query
      type: object
      properties:
        InvocationTime:
          $ref: "#/components/schemas/Time"
          description: InvocationTime for this run. This is the time at which the query is scheduled to run. Parameter @scheduled_runtime can be used in the query to get the value.
        TriggerTime:
          $ref: "#/components/schemas/Time"
          description: The actual time when the query was run.
        RunStatus:
          $ref: "#/components/schemas/ScheduledQueryRunStatus"
          description: The status of a scheduled query run.
        ExecutionStats:
          $ref: "#/components/schemas/ExecutionStats"
          description: Runtime statistics for a scheduled run.
        QueryInsightsResponse:
          $ref: "#/components/schemas/ScheduledQueryInsightsResponse"
          description: Provides various insights and metrics related to the run summary of the scheduled query.
        ErrorReportLocation:
          $ref: "#/components/schemas/ErrorReportLocation"
          description: S3 location for error report.
        FailureReason:
          $ref: "#/components/schemas/ErrorMessage"
          description: Error message for the scheduled query in case of failure. You might have to look at the error report to get more detailed error reasons.
    ScheduledQueryRunStatus:
      type: string
      enum:
        - AUTO_TRIGGER_SUCCESS
        - AUTO_TRIGGER_FAILURE
        - MANUAL_TRIGGER_SUCCESS
        - MANUAL_TRIGGER_FAILURE
    ExecutionStats:
      description: Statistics for a single scheduled query run.
      type: object
      properties:
        ExecutionTimeInMillis:
          $ref: "#/components/schemas/Long"
          description: Total time, measured in milliseconds, that was needed for the scheduled query run to complete.
        DataWrites:
          $ref: "#/components/schemas/Long"
          description: Data writes metered for records ingested in a single scheduled query run.
        BytesMetered:
          $ref: "#/components/schemas/Long"
          description: Bytes metered for a single scheduled query run.
        CumulativeBytesScanned:
          $ref: "#/components/schemas/Long"
          description: Bytes scanned for a single scheduled query run.
        RecordsIngested:
          $ref: "#/components/schemas/Long"
          description: The number of records ingested for a single scheduled query run.
        QueryResultRows:
          $ref: "#/components/schemas/Long"
          description: Number of rows present in the output from running a query before ingestion to destination data source.
    ScheduledQueryInsightsResponse:
      description: Provides various insights and metrics related to the ExecuteScheduledQueryRequest that was executed.
      type: object
      properties:
        QuerySpatialCoverage:
          $ref: "#/components/schemas/QuerySpatialCoverage"
          description: Provides insights into the spatial coverage of the query, including the table with sub-optimal (max) spatial pruning. This information can help you identify areas for improvement in your partitioning strategy to enhance spatial pruning.
        QueryTemporalRange:
          $ref: "#/components/schemas/QueryTemporalRange"
          description: "Provides insights into the temporal range of the query, including the table with the largest (max) time range. Following are some of the potential options for optimizing time-based pruning: Add missing time-predicates. Remove functions around the time predicates. Add time predicates to all the sub-queries."
        QueryTableCount:
          $ref: "#/components/schemas/Long"
          description: Indicates the number of tables in the query.
        OutputRows:
          $ref: "#/components/schemas/Long"
          description: Indicates the total number of rows returned as part of the query result set. You can use this data to validate if the number of rows in the result set have changed as part of the query tuning exercise.
        OutputBytes:
          $ref: "#/components/schemas/Long"
          description: Indicates the size of query result set in bytes. You can use this data to validate if the result set has changed as part of the query tuning exercise.
    QuerySpatialCoverage:
      description: "Provides insights into the spatial coverage of the query, including the table with sub-optimal (max) spatial pruning. This information can help you identify areas for improvement in your partitioning strategy to enhance spatial pruning For example, you can do the following with the QuerySpatialCoverage information: Add measure_name or use customer-defined partition key (CDPK) predicates. If you've already done the preceding action, remove functions around them or clauses, such as LIKE."
      type: object
      properties:
        Max:
          $ref: "#/components/schemas/QuerySpatialCoverageMax"
          description: Provides insights into the spatial coverage of the executed query and the table with the most inefficient spatial pruning. Value – The maximum ratio of spatial coverage. TableArn – The Amazon Resource Name (ARN) of the table with sub-optimal spatial pruning. PartitionKey – The partition key used for partitioning, which can be a default measure_name or a CDPK.
    QuerySpatialCoverageMax:
      description: Provides insights into the table with the most sub-optimal spatial range scanned by your query.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/Double"
          description: The maximum ratio of spatial coverage.
        TableArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the table with the most sub-optimal spatial pruning.
        PartitionKey:
          $ref: "#/components/schemas/PartitionKeyList"
          description: The partition key used for partitioning, which can be a default measure_name or a customer defined partition key.
    Double:
      type: number
      format: double
    PartitionKeyList:
      type: array
      items:
        $ref: "#/components/schemas/PartitionKey"
    PartitionKey:
      type: string
    QueryTemporalRange:
      description: Provides insights into the temporal range of the query, including the table with the largest (max) time range.
      type: object
      properties:
        Max:
          $ref: "#/components/schemas/QueryTemporalRangeMax"
          description: "Encapsulates the following properties that provide insights into the most sub-optimal performing table on the temporal axis: Value – The maximum duration in nanoseconds between the start and end of the query. TableArn – The Amazon Resource Name (ARN) of the table which is queried with the largest time range."
    QueryTemporalRangeMax:
      description: Provides insights into the table with the most sub-optimal temporal pruning scanned by your query.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/Long"
          description: The maximum duration in nanoseconds between the start and end of the query.
        TableArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the table which is queried with the largest time range.
    ErrorReportLocation:
      description: This contains the location of the error report for a single scheduled query call.
      type: object
      properties:
        S3ReportLocation:
          $ref: "#/components/schemas/S3ReportLocation"
          description: The S3 location where error reports are written.
    S3ReportLocation:
      description: S3 report location for the scheduled query run.
      type: object
      properties:
        BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: S3 bucket name.
        ObjectKey:
          $ref: "#/components/schemas/S3ObjectKey"
          description: S3 key.
    S3ObjectKey:
      type: string
    ErrorMessage:
      type: string
    ScheduledQueryRunSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/ScheduledQueryRunSummary"
    ScheduledQueryInsights:
      description: Encapsulates settings for enabling QueryInsights on an ExecuteScheduledQueryRequest.
      type: object
      properties:
        Mode:
          $ref: "#/components/schemas/ScheduledQueryInsightsMode"
          description: "Provides the following modes to enable ScheduledQueryInsights: ENABLED_WITH_RATE_CONTROL – Enables ScheduledQueryInsights for the queries being processed. This mode also includes a rate control mechanism, which limits the QueryInsights feature to 1 query per second (QPS). DISABLED – Disables ScheduledQueryInsights."
      required:
        - Mode
    ScheduledQueryInsightsMode:
      type: string
      enum:
        - ENABLED_WITH_RATE_CONTROL
        - DISABLED
    MaxScheduledQueriesResults:
      type: integer
      minimum: 1
      maximum: 1000
    NextScheduledQueriesResultsToken:
      type: string
    ListScheduledQueriesResponse:
      type: object
      properties:
        ScheduledQueries:
          $ref: "#/components/schemas/ScheduledQueryList"
          description: A list of scheduled queries.
        NextToken:
          $ref: "#/components/schemas/NextScheduledQueriesResultsToken"
          description: A token to specify where to start paginating. This is the NextToken from a previously truncated response.
      required:
        - ScheduledQueries
    ScheduledQueryList:
      type: array
      items:
        $ref: "#/components/schemas/ScheduledQuery"
    ScheduledQuery:
      description: Scheduled Query
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name.
        Name:
          $ref: "#/components/schemas/ScheduledQueryName"
          description: The name of the scheduled query.
        CreationTime:
          $ref: "#/components/schemas/Time"
          description: The creation time of the scheduled query.
        State:
          $ref: "#/components/schemas/ScheduledQueryState"
          description: State of scheduled query.
        PreviousInvocationTime:
          $ref: "#/components/schemas/Time"
          description: The last time the scheduled query was run.
        NextInvocationTime:
          $ref: "#/components/schemas/Time"
          description: The next time the scheduled query is to be run.
        ErrorReportConfiguration:
          $ref: "#/components/schemas/ErrorReportConfiguration"
          description: Configuration for scheduled query error reporting.
        TargetDestination:
          $ref: "#/components/schemas/TargetDestination"
          description: Target data source where final scheduled query result will be written.
        LastRunStatus:
          $ref: "#/components/schemas/ScheduledQueryRunStatus"
          description: Status of the last scheduled query run.
      required:
        - Arn
        - Name
        - State
    TargetDestination:
      description: Destination details to write data for a target data source. Current supported data source is Timestream.
      type: object
      properties:
        TimestreamDestination:
          $ref: "#/components/schemas/TimestreamDestination"
          description: Query result destination details for Timestream data source.
    TimestreamDestination:
      description: Destination for scheduled query.
      type: object
      properties:
        DatabaseName:
          $ref: "#/components/schemas/ResourceName"
          description: Timestream database name.
        TableName:
          $ref: "#/components/schemas/ResourceName"
          description: Timestream table name.
    MaxTagsForResourceResult:
      type: integer
      minimum: 1
      maximum: 200
    NextTagsForResourceResultsToken:
      type: string
    ListTagsForResourceResponse:
      type: object
      properties:
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags currently associated with the Timestream resource.
        NextToken:
          $ref: "#/components/schemas/NextTagsForResourceResultsToken"
          description: A pagination token to resume pagination with a subsequent call to ListTagsForResourceResponse.
      required:
        - Tags
    NullableBoolean:
      type: boolean
    PrepareQueryResponse:
      type: object
      properties:
        QueryString:
          $ref: "#/components/schemas/QueryString"
          description: The query string that you want prepare.
        Columns:
          $ref: "#/components/schemas/SelectColumnList"
          description: A list of SELECT clause columns of the submitted query string.
        Parameters:
          $ref: "#/components/schemas/ParameterMappingList"
          description: A list of parameters used in the submitted query string.
      required:
        - QueryString
        - Columns
        - Parameters
    SelectColumnList:
      type: array
      items:
        $ref: "#/components/schemas/SelectColumn"
    SelectColumn:
      description: Details of the column that is returned by the query.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: Name of the column.
        Type:
          $ref: "#/components/schemas/Type"
        DatabaseName:
          $ref: "#/components/schemas/ResourceName"
          description: Database that has this column.
        TableName:
          $ref: "#/components/schemas/ResourceName"
          description: Table within the database that has this column.
        Aliased:
          $ref: "#/components/schemas/NullableBoolean"
          description: True, if the column name was aliased by the query. False otherwise.
    Type:
      description: Contains the data type of a column in a query result set. The data type can be scalar or complex. The supported scalar data types are integers, Boolean, string, double, timestamp, date, time, and intervals. The supported complex data types are arrays, rows, and timeseries.
      type: object
      properties:
        ScalarType:
          $ref: "#/components/schemas/ScalarType"
          description: Indicates if the column is of type string, integer, Boolean, double, timestamp, date, time. For more information, see Supported data types.
        ArrayColumnInfo:
          $ref: "#/components/schemas/ColumnInfo"
          description: Indicates if the column is an array.
        TimeSeriesMeasureValueColumnInfo:
          $ref: "#/components/schemas/ColumnInfo"
          description: Indicates if the column is a timeseries data type.
        RowColumnInfo:
          $ref: "#/components/schemas/ColumnInfoList"
          description: Indicates if the column is a row.
    ScalarType:
      type: string
      enum:
        - VARCHAR
        - BOOLEAN
        - BIGINT
        - DOUBLE
        - TIMESTAMP
        - DATE
        - TIME
        - INTERVAL_DAY_TO_SECOND
        - INTERVAL_YEAR_TO_MONTH
        - UNKNOWN
        - INTEGER
    ColumnInfo:
      description: Contains the metadata for query results such as the column names, data types, and other attributes.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the result set column. The name of the result set is available for columns of all data types except for arrays.
        Type:
          $ref: "#/components/schemas/Type"
          description: The data type of the result set column. The data type can be a scalar or complex. Scalar data types are integers, strings, doubles, Booleans, and others. Complex data types are types such as arrays, rows, and others.
      required:
        - Type
    ColumnInfoList:
      type: array
      items:
        $ref: "#/components/schemas/ColumnInfo"
    ParameterMappingList:
      type: array
      items:
        $ref: "#/components/schemas/ParameterMapping"
    ParameterMapping:
      description: Mapping for named parameters.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: Parameter name.
        Type:
          $ref: "#/components/schemas/Type"
      required:
        - Name
        - Type
    ClientRequestToken:
      type: string
      minLength: 32
      maxLength: 128
    PaginationToken:
      type: string
      minLength: 1
      maxLength: 2048
    MaxQueryResults:
      type: integer
      minimum: 1
      maximum: 1000
    QueryInsights:
      description: "QueryInsights is a performance tuning feature that helps you optimize your queries, reducing costs and improving performance. With QueryInsights, you can assess the pruning efficiency of your queries and identify areas for improvement to enhance query performance. With QueryInsights, you can also analyze the effectiveness of your queries in terms of temporal and spatial pruning, and identify opportunities to improve performance. Specifically, you can evaluate how well your queries use time-based and partition key-based indexing strategies to optimize data retrieval. To optimize query performance, it's essential that you fine-tune both the temporal and spatial parameters that govern query execution. The key metrics provided by QueryInsights are QuerySpatialCoverage and QueryTemporalRange. QuerySpatialCoverage indicates how much of the spatial axis the query scans, with lower values being more efficient. QueryTemporalRange shows the time range scanned, with narrower ranges being more performant. Benefits of QueryInsights The following are the key benefits of using QueryInsights: Identifying inefficient queries – QueryInsights provides information on the time-based and attribute-based pruning of the tables accessed by the query. This information helps you identify the tables that are sub-optimally accessed. Optimizing your data model and partitioning – You can use the QueryInsights information to access and fine-tune your data model and partitioning strategy. Tuning queries – QueryInsights highlights opportunities to use indexes more effectively. The maximum number of Query API requests you're allowed to make with QueryInsights enabled is 1 query per second (QPS). If you exceed this query rate, it might result in throttling."
      type: object
      properties:
        Mode:
          $ref: "#/components/schemas/QueryInsightsMode"
          description: "Provides the following modes to enable QueryInsights: ENABLED_WITH_RATE_CONTROL – Enables QueryInsights for the queries being processed. This mode also includes a rate control mechanism, which limits the QueryInsights feature to 1 query per second (QPS). DISABLED – Disables QueryInsights."
      required:
        - Mode
    QueryInsightsMode:
      type: string
      enum:
        - ENABLED_WITH_RATE_CONTROL
        - DISABLED
    QueryResponse:
      type: object
      properties:
        QueryId:
          $ref: "#/components/schemas/QueryId"
          description: A unique ID for the given query.
        NextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: A pagination token that can be used again on a Query call to get the next set of results.
        Rows:
          $ref: "#/components/schemas/RowList"
          description: The result set rows returned by the query.
        ColumnInfo:
          $ref: "#/components/schemas/ColumnInfoList"
          description: The column data types of the returned result set.
        QueryStatus:
          $ref: "#/components/schemas/QueryStatus"
          description: Information about the status of the query, including progress and bytes scanned.
        QueryInsightsResponse:
          $ref: "#/components/schemas/QueryInsightsResponse"
          description: Encapsulates QueryInsights containing insights and metrics related to the query that you executed.
      required:
        - QueryId
        - Rows
        - ColumnInfo
    RowList:
      type: array
      items:
        $ref: "#/components/schemas/Row"
    Row:
      description: Represents a single row in the query results.
      type: object
      properties:
        Data:
          $ref: "#/components/schemas/DatumList"
          description: List of data points in a single row of the result set.
      required:
        - Data
    DatumList:
      type: array
      items:
        $ref: "#/components/schemas/Datum"
    Datum:
      description: Datum represents a single data point in a query result.
      type: object
      properties:
        ScalarValue:
          $ref: "#/components/schemas/ScalarValue"
          description: Indicates if the data point is a scalar value such as integer, string, double, or Boolean.
        TimeSeriesValue:
          $ref: "#/components/schemas/TimeSeriesDataPointList"
          description: Indicates if the data point is a timeseries data type.
        ArrayValue:
          $ref: "#/components/schemas/DatumList"
          description: Indicates if the data point is an array.
        RowValue:
          $ref: "#/components/schemas/Row"
          description: Indicates if the data point is a row.
        NullValue:
          $ref: "#/components/schemas/NullableBoolean"
          description: Indicates if the data point is null.
    ScalarValue:
      type: string
    TimeSeriesDataPointList:
      type: array
      items:
        $ref: "#/components/schemas/TimeSeriesDataPoint"
    TimeSeriesDataPoint:
      description: The timeseries data type represents the values of a measure over time. A time series is an array of rows of timestamps and measure values, with rows sorted in ascending order of time. A TimeSeriesDataPoint is a single data point in the time series. It represents a tuple of (time, measure value) in a time series.
      type: object
      properties:
        Time:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the measure value was collected.
        Value:
          $ref: "#/components/schemas/Datum"
          description: The measure value for the data point.
      required:
        - Time
        - Value
    Timestamp:
      type: string
    QueryStatus:
      description: Information about the status of the query, including progress and bytes scanned.
      type: object
      properties:
        ProgressPercentage:
          $ref: "#/components/schemas/Double"
          description: The progress of the query, expressed as a percentage.
        CumulativeBytesScanned:
          $ref: "#/components/schemas/Long"
          description: The amount of data scanned by the query in bytes. This is a cumulative sum and represents the total amount of bytes scanned since the query was started.
        CumulativeBytesMetered:
          $ref: "#/components/schemas/Long"
          description: The amount of data scanned by the query in bytes that you will be charged for. This is a cumulative sum and represents the total amount of data that you will be charged for since the query was started. The charge is applied only once and is either applied when the query completes running or when the query is cancelled.
    QueryInsightsResponse:
      description: Provides various insights and metrics related to the query that you executed.
      type: object
      properties:
        QuerySpatialCoverage:
          $ref: "#/components/schemas/QuerySpatialCoverage"
          description: Provides insights into the spatial coverage of the query, including the table with sub-optimal (max) spatial pruning. This information can help you identify areas for improvement in your partitioning strategy to enhance spatial pruning.
        QueryTemporalRange:
          $ref: "#/components/schemas/QueryTemporalRange"
          description: "Provides insights into the temporal range of the query, including the table with the largest (max) time range. Following are some of the potential options for optimizing time-based pruning: Add missing time-predicates. Remove functions around the time predicates. Add time predicates to all the sub-queries."
        QueryTableCount:
          $ref: "#/components/schemas/Long"
          description: Indicates the number of tables in the query.
        OutputRows:
          $ref: "#/components/schemas/Long"
          description: Indicates the total number of rows returned as part of the query result set. You can use this data to validate if the number of rows in the result set have changed as part of the query tuning exercise.
        OutputBytes:
          $ref: "#/components/schemas/Long"
          description: Indicates the size of query result set in bytes. You can use this data to validate if the result set has changed as part of the query tuning exercise.
        UnloadPartitionCount:
          $ref: "#/components/schemas/Long"
          description: Indicates the partitions created by the Unload operation.
        UnloadWrittenRows:
          $ref: "#/components/schemas/Long"
          description: Indicates the rows written by the Unload query.
        UnloadWrittenBytes:
          $ref: "#/components/schemas/Long"
          description: Indicates the size, in bytes, written by the Unload operation.
    TagResourceResponse:
      type: object
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    UntagResourceResponse:
      type: object
    QueryComputeRequest:
      description: A request to retrieve or update the compute capacity settings for querying data.
      type: object
      properties:
        ComputeMode:
          $ref: "#/components/schemas/ComputeMode"
          description: The mode in which Timestream Compute Units (TCUs) are allocated and utilized within an account. Note that in the Asia Pacific (Mumbai) region, the API operation only recognizes the value PROVISIONED.
        ProvisionedCapacity:
          $ref: "#/components/schemas/ProvisionedCapacityRequest"
          description: Configuration object that contains settings for provisioned Timestream Compute Units (TCUs) in your account.
    ProvisionedCapacityRequest:
      description: A request to update the provisioned capacity settings for querying data.
      type: object
      properties:
        TargetQueryTCU:
          $ref: "#/components/schemas/QueryTCU"
          description: The target compute capacity for querying data, specified in Timestream Compute Units (TCUs).
        NotificationConfiguration:
          $ref: "#/components/schemas/AccountSettingsNotificationConfiguration"
          description: Configuration settings for notifications related to the provisioned capacity update.
      required:
        - TargetQueryTCU
    UpdateAccountSettingsResponse:
      type: object
      properties:
        MaxQueryTCU:
          $ref: "#/components/schemas/MaxQueryCapacity"
          description: The configured maximum number of compute units the service will use at any point in time to serve your queries.
        QueryPricingModel:
          $ref: "#/components/schemas/QueryPricingModel"
          description: The pricing model for an account.
        QueryCompute:
          $ref: "#/components/schemas/QueryComputeResponse"
          description: Confirms the updated account settings for querying data in your account.
