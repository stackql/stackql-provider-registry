openapi: 3.0.0
info:
  version: "2018-05-10"
  title: AWS Artifact
  description: AWS Artifact
  x-serviceName: artifact
  x-serviceAlias: artifact
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: artifact
servers:
  - url: https://artifact.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for artifact
paths:
  /v1/account-settings/get:
    get:
      operationId: GetAccountSettings
      description: Get the account settings for Artifact.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountSettingsResponse"
  /v1/report/get:
    get:
      operationId: GetReport
      description: Get the content for a single report.
      parameters:
        - name: reportId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ReportId"
          description: Unique resource ID for the report resource.
        - name: reportVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/VersionAttribute"
          description: Version for the report resource.
        - name: termToken
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ShortStringAttribute"
          description: Unique download token provided by GetTermForReport API.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetReportResponse"
  /v1/report/getMetadata:
    get:
      operationId: GetReportMetadata
      description: Get the metadata for a single report.
      parameters:
        - name: reportId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ReportId"
          description: Unique resource ID for the report resource.
        - name: reportVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/VersionAttribute"
          description: Version for the report resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetReportMetadataResponse"
  /v1/report/getTermForReport:
    get:
      operationId: GetTermForReport
      description: Get the Term content associated with a single report.
      parameters:
        - name: reportId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ReportId"
          description: Unique resource ID for the report resource.
        - name: reportVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/VersionAttribute"
          description: Version for the report resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTermForReportResponse"
  /v1/customer-agreement/list:
    get:
      operationId: ListCustomerAgreements
      description: List active customer-agreements applicable to calling identity.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResultsAttribute"
          description: Maximum number of resources to return in the paginated response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextTokenAttribute"
          description: Pagination token to request the next page of resources.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCustomerAgreementsResponse"
  /v1/report/listVersions:
    get:
      operationId: ListReportVersions
      description: List available report versions for a given report.
      parameters:
        - name: reportId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ReportId"
          description: Unique resource ID for the report resource.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResultsAttribute"
          description: Maximum number of resources to return in the paginated response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextTokenAttribute"
          description: Pagination token to request the next page of resources.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReportVersionsResponse"
  /v1/report/list:
    get:
      operationId: ListReports
      description: List available reports.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResultsAttribute"
          description: Maximum number of resources to return in the paginated response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextTokenAttribute"
          description: Pagination token to request the next page of resources.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReportsResponse"
  /v1/account-settings/put:
    put:
      operationId: PutAccountSettings
      description: Put the account settings for Artifact.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notificationSubscriptionStatus:
                  $ref: "#/components/schemas/NotificationSubscriptionStatus"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutAccountSettingsResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    GetAccountSettingsResponse:
      type: object
      properties:
        accountSettings:
          $ref: "#/components/schemas/AccountSettings"
    AccountSettings:
      description: Account settings for the customer.
      type: object
      properties:
        notificationSubscriptionStatus:
          $ref: "#/components/schemas/NotificationSubscriptionStatus"
          description: Notification subscription status of the customer.
    NotificationSubscriptionStatus:
      type: string
      enum:
        - SUBSCRIBED
        - NOT_SUBSCRIBED
    ReportId:
      type: string
      pattern: report-[a-zA-Z0-9]{16}
    VersionAttribute:
      type: integer
      format: int64
      minimum: 1
    ShortStringAttribute:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9_\\-\\s]*"
    GetReportResponse:
      type: object
      properties:
        documentPresignedUrl:
          $ref: "#/components/schemas/GetReportResponseDocumentPresignedUrlString"
          description: Presigned S3 url to access the report content.
    GetReportResponseDocumentPresignedUrlString:
      type: string
      minLength: 1
      maxLength: 10240
    GetReportMetadataResponse:
      type: object
      properties:
        reportDetails:
          $ref: "#/components/schemas/ReportDetail"
          description: Report resource detail.
    ReportDetail:
      description: Full detail for report resource metadata.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ReportId"
          description: Unique resource ID for the report resource.
        name:
          $ref: "#/components/schemas/ShortStringAttribute"
          description: Name for the report resource.
        description:
          $ref: "#/components/schemas/LongStringAttribute"
          description: Description for the report resource.
        periodStart:
          $ref: "#/components/schemas/TimestampAttribute"
          description: Timestamp indicating the report resource effective start.
        periodEnd:
          $ref: "#/components/schemas/TimestampAttribute"
          description: Timestamp indicating the report resource effective end.
        createdAt:
          $ref: "#/components/schemas/TimestampAttribute"
          description: Timestamp indicating when the report resource was created.
        lastModifiedAt:
          $ref: "#/components/schemas/TimestampAttribute"
          description: Timestamp indicating when the report resource was last modified.
        deletedAt:
          $ref: "#/components/schemas/TimestampAttribute"
          description: Timestamp indicating when the report resource was deleted.
        state:
          $ref: "#/components/schemas/PublishedState"
          description: Current state of the report resource
        arn:
          $ref: "#/components/schemas/LongStringAttribute"
          description: ARN for the report resource.
        series:
          $ref: "#/components/schemas/ShortStringAttribute"
          description: Series for the report resource.
        category:
          $ref: "#/components/schemas/ShortStringAttribute"
          description: Category for the report resource.
        companyName:
          $ref: "#/components/schemas/ShortStringAttribute"
          description: Associated company name for the report resource.
        productName:
          $ref: "#/components/schemas/ShortStringAttribute"
          description: Associated product name for the report resource.
        termArn:
          $ref: "#/components/schemas/LongStringAttribute"
          description: Unique resource ARN for term resource.
        version:
          $ref: "#/components/schemas/VersionAttribute"
          description: Version for the report resource.
        acceptanceType:
          $ref: "#/components/schemas/AcceptanceType"
          description: Acceptance type for report.
        sequenceNumber:
          $ref: "#/components/schemas/SequenceNumberAttribute"
          description: Sequence number to enforce optimistic locking.
        uploadState:
          $ref: "#/components/schemas/UploadState"
          description: The current state of the document upload.
        statusMessage:
          $ref: "#/components/schemas/StatusMessage"
          description: The message associated with the current upload state.
    LongStringAttribute:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[^<>]*"
    TimestampAttribute:
      type: string
      format: date-time
    PublishedState:
      type: string
      enum:
        - PUBLISHED
        - UNPUBLISHED
    AcceptanceType:
      type: string
      enum:
        - PASSTHROUGH
        - EXPLICIT
    SequenceNumberAttribute:
      type: integer
      format: int64
      minimum: 1
    UploadState:
      type: string
      enum:
        - PROCESSING
        - COMPLETE
        - FAILED
        - FAULT
    StatusMessage:
      type: string
    GetTermForReportResponse:
      type: object
      properties:
        documentPresignedUrl:
          $ref: "#/components/schemas/GetTermForReportResponseDocumentPresignedUrlString"
          description: Presigned S3 url to access the term content.
        termToken:
          $ref: "#/components/schemas/String"
          description: Unique token representing this request event.
    GetTermForReportResponseDocumentPresignedUrlString:
      type: string
      minLength: 1
      maxLength: 10240
    String:
      type: string
    MaxResultsAttribute:
      type: integer
      minimum: 1
      maximum: 300
    NextTokenAttribute:
      type: string
      minLength: 1
      maxLength: 2048
    ListCustomerAgreementsResponse:
      type: object
      properties:
        customerAgreements:
          $ref: "#/components/schemas/CustomerAgreementList"
          description: List of customer-agreement resources.
        nextToken:
          $ref: "#/components/schemas/NextTokenAttribute"
          description: Pagination token to request the next page of resources.
      required:
        - customerAgreements
    CustomerAgreementList:
      type: array
      items:
        $ref: "#/components/schemas/CustomerAgreementSummary"
    CustomerAgreementSummary:
      description: Summary for customer-agreement resource.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/LongStringAttribute"
          description: Name of the customer-agreement resource.
        arn:
          $ref: "#/components/schemas/LongStringAttribute"
          description: ARN of the customer-agreement resource.
        id:
          $ref: "#/components/schemas/CustomerAgreementIdAttribute"
          description: Identifier of the customer-agreement resource.
        agreementArn:
          $ref: "#/components/schemas/LongStringAttribute"
          description: ARN of the agreement resource the customer-agreement resource represents.
        awsAccountId:
          $ref: "#/components/schemas/ShortStringAttribute"
          description: AWS account Id that owns the resource.
        organizationArn:
          $ref: "#/components/schemas/LongStringAttribute"
          description: ARN of the organization that owns the resource.
        effectiveStart:
          $ref: "#/components/schemas/TimestampAttribute"
          description: Timestamp indicating when the agreement became effective.
        effectiveEnd:
          $ref: "#/components/schemas/TimestampAttribute"
          description: Timestamp indicating when the agreement was terminated.
        state:
          $ref: "#/components/schemas/CustomerAgreementState"
          description: State of the resource.
        description:
          $ref: "#/components/schemas/LongStringAttribute"
          description: Description of the resource.
        acceptanceTerms:
          $ref: "#/components/schemas/AgreementTerms"
          description: Terms required to accept the agreement resource.
        terminateTerms:
          $ref: "#/components/schemas/AgreementTerms"
          description: Terms required to terminate the customer-agreement resource.
        type_:
          $ref: "#/components/schemas/AgreementType"
          description: Type of the customer-agreement resource.
    CustomerAgreementIdAttribute:
      type: string
      pattern: customer-agreement-[a-zA-Z0-9]{16}
    CustomerAgreementState:
      type: string
      enum:
        - ACTIVE
        - CUSTOMER_TERMINATED
        - AWS_TERMINATED
    AgreementTerms:
      type: array
      items:
        $ref: "#/components/schemas/LongStringAttribute"
    AgreementType:
      type: string
      enum:
        - CUSTOM
        - DEFAULT
        - MODIFIED
    ListReportVersionsResponse:
      type: object
      properties:
        reports:
          $ref: "#/components/schemas/ReportsList"
          description: List of report resources.
        nextToken:
          $ref: "#/components/schemas/NextTokenAttribute"
          description: Pagination token to request the next page of resources.
      required:
        - reports
    ReportsList:
      type: array
      items:
        $ref: "#/components/schemas/ReportSummary"
    ReportSummary:
      description: Summary for report resource.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ReportId"
          description: Unique resource ID for the report resource.
        name:
          $ref: "#/components/schemas/ShortStringAttribute"
          description: Name for the report resource.
        state:
          $ref: "#/components/schemas/PublishedState"
          description: Current state of the report resource.
        arn:
          $ref: "#/components/schemas/LongStringAttribute"
          description: ARN for the report resource.
        version:
          $ref: "#/components/schemas/VersionAttribute"
          description: Version for the report resource.
        uploadState:
          $ref: "#/components/schemas/UploadState"
          description: The current state of the document upload.
        description:
          $ref: "#/components/schemas/LongStringAttribute"
          description: Description for the report resource.
        periodStart:
          $ref: "#/components/schemas/TimestampAttribute"
          description: Timestamp indicating the report resource effective start.
        periodEnd:
          $ref: "#/components/schemas/TimestampAttribute"
          description: Timestamp indicating the report resource effective end.
        series:
          $ref: "#/components/schemas/ShortStringAttribute"
          description: Series for the report resource.
        category:
          $ref: "#/components/schemas/ShortStringAttribute"
          description: Category for the report resource.
        companyName:
          $ref: "#/components/schemas/ShortStringAttribute"
          description: Associated company name for the report resource.
        productName:
          $ref: "#/components/schemas/ShortStringAttribute"
          description: Associated product name for the report resource.
        statusMessage:
          $ref: "#/components/schemas/StatusMessage"
          description: The message associated with the current upload state.
        acceptanceType:
          $ref: "#/components/schemas/AcceptanceType"
          description: Acceptance type for report.
    ListReportsResponse:
      type: object
      properties:
        reports:
          $ref: "#/components/schemas/ReportsList"
          description: List of report resources.
        nextToken:
          $ref: "#/components/schemas/NextTokenAttribute"
          description: Pagination token to request the next page of resources.
    PutAccountSettingsResponse:
      type: object
      properties:
        accountSettings:
          $ref: "#/components/schemas/AccountSettings"
  x-stackQL-resources:
    account_settings:
      id: aws.artifact.account_settings
      name: account_settings
      title: account_settings
      methods:
        get_account_settings:
          operation:
            $ref: "#/paths/~1v1~1account-settings~1get/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.accountSettings
        put_account_settings:
          operation:
            $ref: "#/paths/~1v1~1account-settings~1put/put"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/account_settings/methods/get_account_settings"
        insert: []
        update: []
        replace:
          - $ref: "#/components/x-stackQL-resources/account_settings/methods/put_account_settings"
        delete: []
    reports:
      id: aws.artifact.reports
      name: reports
      title: reports
      methods:
        get_report:
          operation:
            $ref: "#/paths/~1v1~1report~1get/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
        list_reports:
          operation:
            $ref: "#/paths/~1v1~1report~1list/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.reports
          request:
            nativeCasing: pascal
          config:
            pagination:
              requestToken:
                key: nextToken
                location: query
              responseToken:
                key: $.nextToken
                location: body
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/reports/methods/get_report"
          - $ref: "#/components/x-stackQL-resources/reports/methods/list_reports"
        insert: []
        update: []
        delete: []
    report_metadatas:
      id: aws.artifact.report_metadatas
      name: report_metadatas
      title: report_metadatas
      methods:
        get_report_metadata:
          operation:
            $ref: "#/paths/~1v1~1report~1getMetadata/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.reportDetails
          request:
            nativeCasing: pascal
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/report_metadatas/methods/get_report_metadata"
        insert: []
        update: []
        delete: []
    term_for_reports:
      id: aws.artifact.term_for_reports
      name: term_for_reports
      title: term_for_reports
      methods:
        get_term_for_report:
          operation:
            $ref: "#/paths/~1v1~1report~1getTermForReport/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/term_for_reports/methods/get_term_for_report"
        insert: []
        update: []
        delete: []
    customer_agreements:
      id: aws.artifact.customer_agreements
      name: customer_agreements
      title: customer_agreements
      methods:
        list_customer_agreements:
          operation:
            $ref: "#/paths/~1v1~1customer-agreement~1list/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.customerAgreements
          request:
            nativeCasing: pascal
          config:
            pagination:
              requestToken:
                key: nextToken
                location: query
              responseToken:
                key: $.nextToken
                location: body
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/customer_agreements/methods/list_customer_agreements"
        insert: []
        update: []
        delete: []
    report_versions:
      id: aws.artifact.report_versions
      name: report_versions
      title: report_versions
      methods:
        list_report_versions:
          operation:
            $ref: "#/paths/~1v1~1report~1listVersions/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.reports
          request:
            nativeCasing: pascal
          config:
            pagination:
              requestToken:
                key: nextToken
                location: query
              responseToken:
                key: $.nextToken
                location: body
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/report_versions/methods/list_report_versions"
        insert: []
        update: []
        delete: []
