openapi: 3.0.0
info:
  version: "2023-11-29"
  title: Amazon Neptune Graph
  description: Amazon Neptune Graph
  x-serviceName: neptune-graph
  x-serviceAlias: neptune_graph
  x-protocol: rest-json
  x-apiVersion: "2023-11-29"
  x-endpointPrefix: neptune-graph
servers:
  - url: https://neptune-graph.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for neptune-graph
paths:
  /exporttasks/{task_identifier}:
    delete:
      operationId: CancelExportTask
      description: Cancel the specified export task.
      parameters:
        - name: task_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ExportTaskId"
          description: The unique identifier of the export task.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelExportTaskOutput"
    get:
      operationId: GetExportTask
      description: Retrieves a specified export task.
      parameters:
        - name: task_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ExportTaskId"
          description: The unique identifier of the export task.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetExportTaskOutput"
  /importtasks/{task_identifier}:
    delete:
      operationId: CancelImportTask
      description: Deletes the specified import task.
      parameters:
        - name: task_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TaskId"
          description: The unique identifier of the import task.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelImportTaskOutput"
    get:
      operationId: GetImportTask
      description: Retrieves a specified import task.
      parameters:
        - name: task_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TaskId"
          description: The unique identifier of the import task.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetImportTaskOutput"
  /queries/{query_id}:
    delete:
      operationId: CancelQuery
      description: Cancels a specified query.
      parameters:
        - name: graphIdentifier
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/GraphIdentifier"
          description: The unique identifier of the Neptune Analytics graph.
        - name: query_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique identifier of the query to cancel.
      responses:
        "200":
          description: Success
    get:
      operationId: GetQuery
      description: Retrieves the status of a specified query. When invoking this operation in a Neptune Analytics cluster, the IAM user or role making the request must have the neptune-graph:GetQueryStatus IAM action attached.
      parameters:
        - name: graphIdentifier
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/GraphIdentifier"
          description: The unique identifier of the Neptune Analytics graph.
        - name: query_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the query in question.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQueryOutput"
  /graphs:
    post:
      operationId: CreateGraph
      description: Creates a new Neptune Analytics graph.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                graphName:
                  $ref: "#/components/schemas/GraphName"
                tags:
                  $ref: "#/components/schemas/TagMap"
                publicConnectivity:
                  $ref: "#/components/schemas/Boolean"
                kmsKeyIdentifier:
                  $ref: "#/components/schemas/KmsKeyArn"
                vectorSearchConfiguration:
                  $ref: "#/components/schemas/VectorSearchConfiguration"
                replicaCount:
                  $ref: "#/components/schemas/ReplicaCount"
                deletionProtection:
                  $ref: "#/components/schemas/Boolean"
                provisionedMemory:
                  $ref: "#/components/schemas/ProvisionedMemory"
              required:
                - graphName
                - provisionedMemory
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGraphOutput"
    get:
      operationId: ListGraphs
      description: Lists available Neptune Analytics graphs.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: Pagination token used to paginate output. When this value is provided as input, the service returns results from where the previous response left off. When this value is present in output, it indicates that there are more results to retrieve.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The total number of records to return in the command's output. If the total number of records available is more than the value specified, nextToken is provided in the command's output. To resume pagination, provide the nextToken output value in the nextToken argument of a subsequent command. Do not use the nextToken response element directly outside of the Amazon CLI.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGraphsOutput"
  /snapshots:
    post:
      operationId: CreateGraphSnapshot
      description: Creates a snapshot of the specific graph.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                graphIdentifier:
                  $ref: "#/components/schemas/GraphIdentifier"
                snapshotName:
                  $ref: "#/components/schemas/SnapshotName"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - graphIdentifier
                - snapshotName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGraphSnapshotOutput"
    get:
      operationId: ListGraphSnapshots
      description: Lists available snapshots of a specified Neptune Analytics graph.
      parameters:
        - name: graphIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GraphIdentifier"
          description: The unique identifier of the Neptune Analytics graph.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: Pagination token used to paginate output. When this value is provided as input, the service returns results from where the previous response left off. When this value is present in output, it indicates that there are more results to retrieve.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The total number of records to return in the command's output. If the total number of records available is more than the value specified, nextToken is provided in the command's output. To resume pagination, provide the nextToken output value in the nextToken argument of a subsequent command. Do not use the nextToken response element directly outside of the Amazon CLI.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGraphSnapshotsOutput"
  /importtasks:
    post:
      operationId: CreateGraphUsingImportTask
      description: Creates a new Neptune Analytics graph and imports data into it, either from Amazon Simple Storage Service (S3) or from a Neptune database or a Neptune database snapshot. The data can be loaded from files in S3 that in either the Gremlin CSV format or the openCypher load format.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                graphName:
                  $ref: "#/components/schemas/GraphName"
                tags:
                  $ref: "#/components/schemas/TagMap"
                publicConnectivity:
                  $ref: "#/components/schemas/Boolean"
                kmsKeyIdentifier:
                  $ref: "#/components/schemas/KmsKeyArn"
                vectorSearchConfiguration:
                  $ref: "#/components/schemas/VectorSearchConfiguration"
                replicaCount:
                  $ref: "#/components/schemas/ReplicaCount"
                deletionProtection:
                  $ref: "#/components/schemas/Boolean"
                importOptions:
                  $ref: "#/components/schemas/ImportOptions"
                maxProvisionedMemory:
                  $ref: "#/components/schemas/ProvisionedMemory"
                minProvisionedMemory:
                  $ref: "#/components/schemas/ProvisionedMemory"
                failOnError:
                  $ref: "#/components/schemas/Boolean"
                source:
                  $ref: "#/components/schemas/String"
                format:
                  $ref: "#/components/schemas/Format"
                parquetType:
                  $ref: "#/components/schemas/ParquetType"
                blankNodeHandling:
                  $ref: "#/components/schemas/BlankNodeHandling"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
              required:
                - graphName
                - source
                - roleArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGraphUsingImportTaskOutput"
    get:
      operationId: ListImportTasks
      description: Lists import tasks.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: Pagination token used to paginate output. When this value is provided as input, the service returns results from where the previous response left off. When this value is present in output, it indicates that there are more results to retrieve.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The total number of records to return in the command's output. If the total number of records available is more than the value specified, nextToken is provided in the command's output. To resume pagination, provide the nextToken output value in the nextToken argument of a subsequent command. Do not use the nextToken response element directly outside of the Amazon CLI.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListImportTasksOutput"
  /graphs/{graph_identifier}/endpoints/:
    post:
      operationId: CreatePrivateGraphEndpoint
      description: Create a private graph endpoint to allow private access to the graph from within a VPC. You can attach security groups to the private graph endpoint. VPC endpoint charges apply.
      parameters:
        - name: graph_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GraphIdentifier"
          description: The unique identifier of the Neptune Analytics graph.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                vpcId:
                  $ref: "#/components/schemas/VpcId"
                subnetIds:
                  $ref: "#/components/schemas/SubnetIds"
                vpcSecurityGroupIds:
                  $ref: "#/components/schemas/SecurityGroupIds"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePrivateGraphEndpointOutput"
    get:
      operationId: ListPrivateGraphEndpoints
      description: Lists private endpoints for a specified Neptune Analytics graph.
      parameters:
        - name: graph_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GraphIdentifier"
          description: The unique identifier of the Neptune Analytics graph.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: Pagination token used to paginate output. When this value is provided as input, the service returns results from where the previous response left off. When this value is present in output, it indicates that there are more results to retrieve.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The total number of records to return in the command's output. If the total number of records available is more than the value specified, nextToken is provided in the command's output. To resume pagination, provide the nextToken output value in the nextToken argument of a subsequent command. Do not use the nextToken response element directly outside of the Amazon CLI.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPrivateGraphEndpointsOutput"
  /graphs/{graph_identifier}:
    delete:
      operationId: DeleteGraph
      description: Deletes the specified graph. Graphs cannot be deleted if delete-protection is enabled.
      parameters:
        - name: graph_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GraphIdentifier"
          description: The unique identifier of the Neptune Analytics graph.
        - name: skipSnapshot
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Boolean"
          description: Determines whether a final graph snapshot is created before the graph is deleted. If true is specified, no graph snapshot is created. If false is specified, a graph snapshot is created before the graph is deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGraphOutput"
    get:
      operationId: GetGraph
      description: Gets information about a specified graph.
      parameters:
        - name: graph_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GraphIdentifier"
          description: The unique identifier of the Neptune Analytics graph.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGraphOutput"
    put:
      operationId: ResetGraph
      description: Empties the data from a specified Neptune Analytics graph.
      parameters:
        - name: graph_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GraphIdentifier"
          description: ID of the graph to reset.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                skipSnapshot:
                  $ref: "#/components/schemas/Boolean"
              required:
                - skipSnapshot
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetGraphOutput"
    patch:
      operationId: UpdateGraph
      description: Updates the configuration of a specified Neptune Analytics graph
      parameters:
        - name: graph_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GraphIdentifier"
          description: The unique identifier of the Neptune Analytics graph.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                publicConnectivity:
                  $ref: "#/components/schemas/Boolean"
                provisionedMemory:
                  $ref: "#/components/schemas/ProvisionedMemory"
                deletionProtection:
                  $ref: "#/components/schemas/Boolean"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGraphOutput"
  /snapshots/{snapshot_identifier}:
    delete:
      operationId: DeleteGraphSnapshot
      description: Deletes the specified graph snapshot.
      parameters:
        - name: snapshot_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SnapshotIdentifier"
          description: ID of the graph snapshot to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGraphSnapshotOutput"
    get:
      operationId: GetGraphSnapshot
      description: Retrieves a specified graph snapshot.
      parameters:
        - name: snapshot_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SnapshotIdentifier"
          description: The ID of the snapshot to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGraphSnapshotOutput"
  /graphs/{graph_identifier}/endpoints/{vpc_id}:
    delete:
      operationId: DeletePrivateGraphEndpoint
      description: Deletes a private graph endpoint.
      parameters:
        - name: graph_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GraphIdentifier"
          description: The unique identifier of the Neptune Analytics graph.
        - name: vpc_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VpcId"
          description: The ID of the VPC where the private endpoint is located.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePrivateGraphEndpointOutput"
    get:
      operationId: GetPrivateGraphEndpoint
      description: Retrieves information about a specified private endpoint.
      parameters:
        - name: graph_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GraphIdentifier"
          description: The unique identifier of the Neptune Analytics graph.
        - name: vpc_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VpcId"
          description: The ID of the VPC where the private endpoint is located.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPrivateGraphEndpointOutput"
  /queries:
    post:
      operationId: ExecuteQuery
      description: "Execute an openCypher query. When invoking this operation in a Neptune Analytics cluster, the IAM user or role making the request must have a policy attached that allows one of the following IAM actions in that cluster, depending on the query: neptune-graph:ReadDataViaQuery neptune-graph:WriteDataViaQuery neptune-graph:DeleteDataViaQuery"
      parameters:
        - name: graphIdentifier
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/GraphIdentifier"
          description: The unique identifier of the Neptune Analytics graph.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                queryString:
                  $ref: "#/components/schemas/String"
                language:
                  $ref: "#/components/schemas/QueryLanguage"
                parameters:
                  $ref: "#/components/schemas/DocumentValuedMap"
                planCache:
                  $ref: "#/components/schemas/PlanCacheType"
                explainMode:
                  $ref: "#/components/schemas/ExplainMode"
                queryTimeoutMilliseconds:
                  $ref: "#/components/schemas/Integer"
              required:
                - queryString
                - language
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteQueryOutput"
    get:
      operationId: ListQueries
      description: Lists active openCypher queries.
      parameters:
        - name: graphIdentifier
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/GraphIdentifier"
          description: The unique identifier of the Neptune Analytics graph.
        - name: maxResults
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Integer"
          description: The maximum number of results to be fetched by the API.
        - name: state
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/QueryStateInput"
          description: Filtered list of queries based on state.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListQueriesOutput"
  /summary:
    get:
      operationId: GetGraphSummary
      description: Gets a graph summary for a property graph.
      parameters:
        - name: graphIdentifier
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/GraphIdentifier"
          description: The unique identifier of the Neptune Analytics graph.
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GraphSummaryMode"
          description: "The summary mode can take one of two values: basic (the default), and detailed."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGraphSummaryOutput"
  /exporttasks:
    get:
      operationId: ListExportTasks
      description: Retrieves a list of export tasks.
      parameters:
        - name: graphIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GraphIdentifier"
          description: The unique identifier of the Neptune Analytics graph.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: Pagination token used to paginate input.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of export tasks to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListExportTasksOutput"
    post:
      operationId: StartExportTask
      description: Export data from an existing Neptune Analytics graph to Amazon S3. The graph state should be AVAILABLE.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                graphIdentifier:
                  $ref: "#/components/schemas/GraphIdentifier"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                format:
                  $ref: "#/components/schemas/ExportFormat"
                destination:
                  $ref: "#/components/schemas/StartExportTaskInputDestinationString"
                kmsKeyIdentifier:
                  $ref: "#/components/schemas/KmsKeyArn"
                parquetType:
                  $ref: "#/components/schemas/ParquetType"
                exportFilter:
                  $ref: "#/components/schemas/ExportFilter"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - graphIdentifier
                - roleArn
                - format
                - destination
                - kmsKeyIdentifier
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartExportTaskOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists tags associated with a specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
    post:
      operationId: TagResource
      description: Adds tags to the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: ARN of the resource for which tags need to be added.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
    delete:
      operationId: UntagResource
      description: Removes the specified tags from the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: ARN of the resource whose tag needs to be removed.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: Tag keys for the tags to be removed.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /snapshots/{snapshot_identifier}/restore:
    post:
      operationId: RestoreGraphFromSnapshot
      description: Restores a graph from a snapshot.
      parameters:
        - name: snapshot_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SnapshotIdentifier"
          description: The ID of the snapshot in question.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                graphName:
                  $ref: "#/components/schemas/GraphName"
                provisionedMemory:
                  $ref: "#/components/schemas/ProvisionedMemory"
                deletionProtection:
                  $ref: "#/components/schemas/Boolean"
                tags:
                  $ref: "#/components/schemas/TagMap"
                replicaCount:
                  $ref: "#/components/schemas/ReplicaCount"
                publicConnectivity:
                  $ref: "#/components/schemas/Boolean"
              required:
                - graphName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreGraphFromSnapshotOutput"
  /graphs/{graph_identifier}/start:
    post:
      operationId: StartGraph
      description: Starts the specific graph.
      parameters:
        - name: graph_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GraphIdentifier"
          description: The unique identifier of the Neptune Analytics graph.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartGraphOutput"
  /graphs/{graph_identifier}/importtasks:
    post:
      operationId: StartImportTask
      description: Import data into existing Neptune Analytics graph from Amazon Simple Storage Service (S3). The graph needs to be empty and in the AVAILABLE state.
      parameters:
        - name: graph_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GraphIdentifier"
          description: The unique identifier of the Neptune Analytics graph.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                importOptions:
                  $ref: "#/components/schemas/ImportOptions"
                failOnError:
                  $ref: "#/components/schemas/Boolean"
                source:
