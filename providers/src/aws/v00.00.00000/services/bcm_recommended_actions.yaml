openapi: 3.0.0
info:
  version: "2024-11-14"
  title: AWS Billing and Cost Management Recommended Actions
  description: AWS Billing and Cost Management Recommended Actions
  x-serviceName: bcm-recommended-actions
  x-serviceAlias: bcm_recommended_actions
  x-protocol: json
  x-apiVersion: "2024-11-14"
  x-endpointPrefix: bcm-recommended-actions
  x-targetPrefix: AWSBillingAndCostManagementRecommendedActions
  x-jsonVersion: "1.0"
servers:
  - url: https://bcm-recommended-actions.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for bcm-recommended-actions
paths:
  /ListRecommendedActions:
    post:
      operationId: ListRecommendedActions
      description: Returns a list of recommended actions that match the filter criteria.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBillingAndCostManagementRecommendedActions.ListRecommendedActions
            default: AWSBillingAndCostManagementRecommendedActions.ListRecommendedActions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                filter:
                  $ref: "#/components/schemas/RequestFilter"
                  description: The criteria that you want all returned recommended actions to match.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return in the response.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The pagination token that indicates the next set of results that you want to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecommendedActionsResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    RequestFilter:
      description: Enables filtering of results based on specified action criteria. You can define multiple action filters to refine results using combinations of feature type, severity level, and recommendation type.
      type: object
      properties:
        actions:
          $ref: "#/components/schemas/ActionFilterList"
          description: A list of action filters that define criteria for filtering results. Each filter specifies a key, match option, and corresponding values to filter on.
    ActionFilterList:
      type: array
      items:
        $ref: "#/components/schemas/ActionFilter"
    ActionFilter:
      description: Describes a filter that returns a more specific list of recommended actions.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/FilterName"
          description: The category to filter on. Valid values are FEATURE for feature type, SEVERITY for severity level, and TYPE for recommendation type.
        matchOption:
          $ref: "#/components/schemas/MatchOption"
          description: Specifies how to apply the filter. Use EQUALS to include matching results or NOT_EQUALS to exclude matching results.
        values:
          $ref: "#/components/schemas/FilterValues"
          description: One or more values to match against the specified key.
      required:
        - key
        - matchOption
        - values
    FilterName:
      type: string
      enum:
        - FEATURE
        - SEVERITY
        - TYPE
    MatchOption:
      type: string
      enum:
        - EQUALS
        - NOT_EQUALS
    FilterValues:
      type: array
      items:
        $ref: "#/components/schemas/FilterValue"
    FilterValue:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: .*[\S\s]*.*
    MaxResults:
      type: integer
      minimum: 1
      maximum: 1000
    NextToken:
      type: string
      minLength: 1
      maxLength: 8192
      pattern: "[\\S\\s]*"
    ListRecommendedActionsResponse:
      type: object
      properties:
        recommendedActions:
          $ref: "#/components/schemas/RecommendedActions"
          description: The list of recommended actions that satisfy the filter criteria.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token that indicates the next set of results that you want to retrieve.
      required:
        - recommendedActions
    RecommendedActions:
      type: array
      items:
        $ref: "#/components/schemas/RecommendedAction"
    RecommendedAction:
      description: Describes a specific recommended action.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The ID for the recommended action.
        type_:
          $ref: "#/components/schemas/ActionType"
          description: The type of action you can take by adopting the recommended action.
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: The account that the recommended action is for.
        severity:
          $ref: "#/components/schemas/Severity"
          description: The severity associated with the recommended action.
        feature:
          $ref: "#/components/schemas/Feature"
          description: The feature associated with the recommended action.
        context:
          type: object
          properties: {}
          description: Context that applies to the recommended action.
        nextSteps:
          $ref: "#/components/schemas/NextSteps"
          description: The possible next steps to execute the recommended action.
        lastUpdatedTimeStamp:
          $ref: "#/components/schemas/String"
          description: The time when the recommended action status was last updated.
    String:
      type: string
    ActionType:
      type: string
      enum:
        - ADD_ALTERNATE_BILLING_CONTACT
        - CREATE_ANOMALY_MONITOR
        - CREATE_BUDGET
        - ENABLE_COST_OPTIMIZATION_HUB
        - MIGRATE_TO_GRANULAR_PERMISSIONS
        - PAYMENTS_DUE
        - PAYMENTS_PAST_DUE
        - REVIEW_ANOMALIES
        - REVIEW_BUDGET_ALERTS
        - REVIEW_BUDGETS_EXCEEDED
        - REVIEW_EXPIRING_RI
        - REVIEW_EXPIRING_SP
        - REVIEW_FREETIER_USAGE_ALERTS
        - REVIEW_FREETIER_CREDITS_REMAINING
        - REVIEW_FREETIER_DAYS_REMAINING
        - REVIEW_SAVINGS_OPPORTUNITY_RECOMMENDATIONS
        - UPDATE_EXPIRED_PAYMENT_METHOD
        - UPDATE_INVALID_PAYMENT_METHOD
        - UPDATE_TAX_EXEMPTION_CERTIFICATE
        - UPDATE_TAX_REGISTRATION_NUMBER
    AccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[0-9]{12}"
    Severity:
      type: string
      enum:
        - INFO
        - WARNING
        - CRITICAL
    Feature:
      type: string
      enum:
        - ACCOUNT
        - BUDGETS
        - COST_ANOMALY_DETECTION
        - COST_OPTIMIZATION_HUB
        - FREE_TIER
        - IAM
        - PAYMENTS
        - RESERVATIONS
        - SAVINGS_PLANS
        - TAX_SETTINGS
    NextSteps:
      type: array
      items:
        $ref: "#/components/schemas/NextStep"
    NextStep:
      type: string
  x-stackQL-resources:
    recommended_actions:
      id: aws.bcm_recommended_actions.recommended_actions
      name: recommended_actions
      title: recommended_actions
      methods:
        list_recommended_actions:
          operation:
            $ref: "#/paths/~1ListRecommendedActions/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.recommendedActions
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.0
            base: "{}"
          config:
            pagination:
              requestToken:
                key: nextToken
                location: body
              responseToken:
                key: $.nextToken
                location: body
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/recommended_actions/methods/list_recommended_actions"
        insert: []
        update: []
        delete: []
