openapi: 3.0.0
info:
  version: "2025-05-05"
  title: Amazon S3 Files
  description: Amazon S3 Files
  x-serviceName: s3files
  x-serviceAlias: s3files
  x-protocol: rest-json
  x-apiVersion: "2025-05-05"
  x-endpointPrefix: s3files
servers:
  - url: https://s3files.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for s3files
paths:
  /access-points:
    put:
      operationId: CreateAccessPoint
      description: Creates an S3 File System Access Point for application-specific access with POSIX user identity and root directory enforcement. Access points provide a way to manage access to shared datasets in multi-tenant scenarios.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagList"
                fileSystemId:
                  $ref: "#/components/schemas/FileSystemId"
                posixUser:
                  $ref: "#/components/schemas/PosixUser"
                rootDirectory:
                  $ref: "#/components/schemas/RootDirectory"
              required:
                - fileSystemId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccessPointResponse"
    get:
      operationId: ListAccessPoints
      description: Returns resource information for all S3 File System Access Points associated with the specified S3 File System.
      parameters:
        - name: fileSystemId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/FileSystemId"
          description: The ID or Amazon Resource Name (ARN) of the S3 File System to list access points for.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListAccessPointsRequestMaxResultsInteger"
          description: The maximum number of access points to return in a single response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A pagination token returned from a previous call to continue listing access points.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccessPointsResponse"
  /file-systems:
    put:
      operationId: CreateFileSystem
      description: Creates an S3 File System resource scoped to a bucket or prefix within a bucket, enabling file system access to S3 data. To create a file system, you need an S3 bucket and an IAM role that grants the service permission to access the bucket.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bucket:
                  $ref: "#/components/schemas/BucketArn"
                prefix:
                  $ref: "#/components/schemas/CreateFileSystemRequestPrefixString"
                clientToken:
                  $ref: "#/components/schemas/CreationToken"
                kmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                tags:
                  $ref: "#/components/schemas/TagList"
                acceptBucketWarning:
                  $ref: "#/components/schemas/Boolean"
              required:
                - bucket
                - roleArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFileSystemResponse"
    get:
      operationId: ListFileSystems
      description: Returns a list of all S3 File Systems owned by the account with optional filtering by bucket.
      parameters:
        - name: bucket
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BucketArn"
          description: Optional filter to list only file systems associated with the specified S3 bucket Amazon Resource Name (ARN). If provided, only file systems that provide access to this bucket will be returned in the response.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListFileSystemsRequestMaxResultsInteger"
          description: The maximum number of file systems to return in a single response. If not specified, up to 100 file systems are returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A pagination token returned from a previous call to continue listing file systems.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFileSystemsResponse"
  /mount-targets:
    put:
      operationId: CreateMountTarget
      description: Creates a mount target resource as an endpoint for mounting the S3 File System from compute resources in a specific Availability Zone and VPC. Mount targets provide network access to the file system.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fileSystemId:
                  $ref: "#/components/schemas/FileSystemId"
                subnetId:
                  $ref: "#/components/schemas/SubnetId"
                ipv4Address:
                  $ref: "#/components/schemas/Ipv4Address"
                ipv6Address:
                  $ref: "#/components/schemas/Ipv6Address"
                ipAddressType:
                  $ref: "#/components/schemas/IpAddressType"
                securityGroups:
                  $ref: "#/components/schemas/SecurityGroups"
              required:
                - fileSystemId
                - subnetId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMountTargetResponse"
    get:
      operationId: ListMountTargets
      description: Returns resource information for all mount targets with optional filtering by file system, access point, and VPC.
      parameters:
        - name: fileSystemId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/FileSystemId"
          description: Optional filter to list only mount targets associated with the specified S3 File System ID or Amazon Resource Name (ARN). If provided, only mount targets for this file system will be returned in the response.
        - name: accessPointId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccessPointId"
          description: Optional filter to list only mount targets associated with the specified access point ID or Amazon Resource Name (ARN).
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListMountTargetsRequestMaxResultsInteger"
          description: The maximum number of mount targets to return in a single response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A pagination token returned from a previous call to continue listing mount targets.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMountTargetsResponse"
  /access-points/{access_point_id}:
    delete:
      operationId: DeleteAccessPoint
      description: Deletes an S3 File System Access Point. This operation is irreversible.
      parameters:
        - name: access_point_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccessPointId"
          description: The ID or Amazon Resource Name (ARN) of the access point to delete.
      responses:
        "204":
          description: Success
    get:
      operationId: GetAccessPoint
      description: Returns resource information for an S3 File System Access Point.
      parameters:
        - name: access_point_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccessPointId"
          description: The ID or Amazon Resource Name (ARN) of the access point to retrieve information for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccessPointResponse"
  /file-systems/{file_system_id}:
    delete:
      operationId: DeleteFileSystem
      description: Deletes an S3 File System. You can optionally force deletion of a file system that has pending export data.
      parameters:
        - name: file_system_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FileSystemId"
          description: The ID or Amazon Resource Name (ARN) of the S3 File System to delete.
        - name: forceDelete
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: If true, allows deletion of a file system that contains data pending export to S3. If false (the default), the deletion will fail if there is data that has not yet been exported to the S3 bucket. Use this parameter with caution as it may result in data loss.
      responses:
        "204":
          description: Success
    get:
      operationId: GetFileSystem
      description: Returns resource information for the specified S3 File System including status, configuration, and metadata.
      parameters:
        - name: file_system_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FileSystemId"
          description: The ID or Amazon Resource Name (ARN) of the S3 File System to retrieve information for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFileSystemResponse"
  /file-systems/{file_system_id}/policy:
    delete:
      operationId: DeleteFileSystemPolicy
      description: Deletes the IAM resource policy of an S3 File System.
      parameters:
        - name: file_system_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FileSystemId"
          description: The ID or Amazon Resource Name (ARN) of the S3 File System whose resource policy to delete.
      responses:
        "204":
          description: Success
    get:
      operationId: GetFileSystemPolicy
      description: Returns the IAM resource policy of an S3 File System.
      parameters:
        - name: file_system_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FileSystemId"
          description: The ID or Amazon Resource Name (ARN) of the S3 File System whose resource policy to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFileSystemPolicyResponse"
    put:
      operationId: PutFileSystemPolicy
      description: Creates or replaces the IAM resource policy for an S3 File System to control access permissions.
      parameters:
        - name: file_system_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FileSystemId"
          description: The ID or Amazon Resource Name (ARN) of the S3 File System to apply the resource policy to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policy:
                  $ref: "#/components/schemas/String"
              required:
                - policy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutFileSystemPolicyResponse"
  /mount-targets/{mount_target_id}:
    delete:
      operationId: DeleteMountTarget
      description: Deletes the specified mount target. This operation is irreversible.
      parameters:
        - name: mount_target_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MountTargetId"
          description: The ID of the mount target to delete.
      responses:
        "204":
          description: Success
    get:
      operationId: GetMountTarget
      description: Returns detailed resource information for the specified mount target including network configuration.
      parameters:
        - name: mount_target_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MountTargetId"
          description: The ID of the mount target to retrieve information for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMountTargetResponse"
    put:
      operationId: UpdateMountTarget
      description: Updates the mount target resource, specifically security group configurations.
      parameters:
        - name: mount_target_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MountTargetId"
          description: The ID of the mount target to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                securityGroups:
                  $ref: "#/components/schemas/SecurityGroups"
              required:
                - securityGroups
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMountTargetResponse"
  /file-systems/{file_system_id}/synchronization-configuration:
    get:
      operationId: GetSynchronizationConfiguration
      description: Returns the synchronization configuration for the specified S3 File System, including import data rules and expiration data rules.
      parameters:
        - name: file_system_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FileSystemId"
          description: The ID or Amazon Resource Name (ARN) of the S3 File System to retrieve the synchronization configuration for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSynchronizationConfigurationResponse"
    put:
      operationId: PutSynchronizationConfiguration
      description: Creates or updates the synchronization configuration for the specified S3 File System, including import data rules and expiration data rules.
      parameters:
        - name: file_system_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FileSystemId"
          description: The ID or Amazon Resource Name (ARN) of the S3 File System to configure synchronization for.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                latestVersionNumber:
                  $ref: "#/components/schemas/Integer"
                importDataRules:
                  $ref: "#/components/schemas/PutSynchronizationConfigurationRequestImportDataRulesList"
                expirationDataRules:
                  $ref: "#/components/schemas/PutSynchronizationConfigurationRequestExpirationDataRulesList"
              required:
                - importDataRules
                - expirationDataRules
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutSynchronizationConfigurationResponse"
  /resource-tags/{resource_id}:
    get:
      operationId: ListTagsForResource
      description: Lists all tags for S3 Files resources.
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID or Amazon Resource Name (ARN) of the resource to list tags for.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListTagsForResourceRequestMaxResultsInteger"
          description: The maximum number of tags to return in a single response.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A pagination token returned from a previous call to continue listing tags.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Creates tags for S3 Files resources using standard Amazon Web Services tagging APIs.
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID or Amazon Resource Name (ARN) of the resource to add tags to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - tags
      responses:
        "200":
          description: Success
    delete:
      operationId: UntagResource
      description: Removes tags from S3 Files resources.
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID or Amazon Resource Name (ARN) of the resource to remove tags from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: An array of tag keys to remove from the resource.
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: (.+)
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A key-value pair for resource tagging.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: The tag key. The key can't start with aws:.
        value:
          $ref: "#/components/schemas/TagValue"
          description: The tag value.
      required:
        - key
        - value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]+)
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    FileSystemId:
      type: string
      minLength: 0
      maxLength: 128
      pattern: (arn:aws[-a-z]*:s3files:[0-9a-z-:]+:file-system/fs-[0-9a-f]{17,40}|fs-[0-9a-f]{17,40})
    PosixUser:
      description: Specifies the POSIX identity with uid, gid, and secondary group IDs for user enforcement.
      type: object
      properties:
        uid:
          $ref: "#/components/schemas/Uid"
          description: The POSIX user ID.
        gid:
          $ref: "#/components/schemas/Gid"
          description: The POSIX group ID.
        secondaryGids:
          $ref: "#/components/schemas/SecondaryGids"
          description: An array of secondary POSIX group IDs.
      required:
        - uid
        - gid
    Uid:
      type: integer
      format: int64
      minimum: 0
      maximum: 4294967295
    Gid:
      type: integer
      format: int64
      minimum: 0
      maximum: 4294967295
    SecondaryGids:
      type: array
      items:
        $ref: "#/components/schemas/Gid"
    RootDirectory:
      description: Specifies the root directory path and optional creation permissions for newly created directories.
      type: object
      properties:
        path:
          $ref: "#/components/schemas/Path"
          description: The path to use as the root directory for the access point.
        creationPermissions:
          $ref: "#/components/schemas/CreationPermissions"
          description: The permissions to set on newly created directories.
    Path:
      type: string
      minLength: 1
      maxLength: 100
      pattern: (\/|(\/(?!\.)+[^$#<>;;`|&?{}^*/\n]+){1,4})
    CreationPermissions:
      description: Specifies the permissions to set on newly created directories within the file system.
      type: object
      properties:
        ownerUid:
          $ref: "#/components/schemas/OwnerUid"
          description: The POSIX user ID to assign to newly created directories.
        ownerGid:
          $ref: "#/components/schemas/OwnerGid"
          description: The POSIX group ID to assign to newly created directories.
        permissions:
          $ref: "#/components/schemas/Permissions"
          description: The octal permissions to assign to newly created directories.
      required:
        - ownerUid
        - ownerGid
        - permissions
    OwnerUid:
      type: integer
      format: int64
      minimum: 0
      maximum: 4294967295
    OwnerGid:
      type: integer
      format: int64
      minimum: 0
      maximum: 4294967295
    Permissions:
      type: string
      minLength: 3
      maxLength: 4
      pattern: "[0-7]{3,4}"
    CreateAccessPointResponse:
      type: object
      properties:
        accessPointArn:
          $ref: "#/components/schemas/AccessPointArn"
          description: The Amazon Resource Name (ARN) of the access point.
        accessPointId:
          $ref: "#/components/schemas/AccessPointId"
          description: The ID of the access point.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: The client token that was provided in the request.
        fileSystemId:
          $ref: "#/components/schemas/FileSystemId"
          description: The ID of the S3 File System.
        status:
          $ref: "#/components/schemas/LifeCycleState"
          description: The current status of the access point.
        ownerId:
          $ref: "#/components/schemas/AwsAccountId"
          description: The Amazon Web Services account ID of the access point owner.
        posixUser:
          $ref: "#/components/schemas/PosixUser"
          description: The POSIX identity configured for this access point.
        rootDirectory:
          $ref: "#/components/schemas/RootDirectory"
          description: The root directory configuration for this access point.
        tags:
          $ref: "#/components/schemas/TagList"
          description: The tags associated with the access point.
        name:
          $ref: "#/components/schemas/TagValue"
          description: The name of the access point.
      required:
        - accessPointArn
        - accessPointId
        - clientToken
        - fileSystemId
        - status
        - ownerId
    AccessPointArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws[-a-z]*:s3files:[0-9a-z-:]+:file-system/fs-[0-9a-f]{17,40}/access-point/fsap-[0-9a-f]{17,40}
    AccessPointId:
      type: string
      minLength: 0
      maxLength: 256
      pattern: (arn:aws[-a-z]*:s3files:[0-9a-z-:]+:file-system/fs-[0-9a-f]{17,40}/access-point/fsap-[0-9a-f]{17,40}|fsap-[0-9a-f]{17,40})
    LifeCycleState:
      type: string
      enum:
        - available
        - creating
        - deleting
        - deleted
        - error
        - updating
    AwsAccountId:
      type: string
      minLength: 0
      maxLength: 12
      pattern: (\d{12})|(\d{4}-{4}-\d{4})
    BucketArn:
      type: string
      pattern: (arn:aws[a-zA-Z0-9-]*:s3:::.+)
    CreateFileSystemRequestPrefixString:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: (|.*/)
    CreationToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: (.+)
    KmsKeyId:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: ([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}|mrk-[0-9a-f]{32}|alias/[a-zA-Z0-9/_-]+|(arn:aws[-a-z]*:kms:[a-z0-9-]+:\d{12}:((key/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})|(key/mrk-[0-9a-f]{32})|(alias/[a-zA-Z0-9/_-]+))))
    RoleArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:(aws[a-zA-Z-]*)?:iam::\d{12}:role/?[a-zA-Z_0-9+=,.@\-_/]+
    Boolean:
      type: boolean
    CreateFileSystemResponse:
      type: object
      properties:
        creationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the file system was created, in seconds since 1970-01-01T00:00:00Z (Unix epoch time).
        fileSystemArn:
          $ref: "#/components/schemas/FileSystemArn"
          description: The ARN for the S3 file system, in the format arn:aws:s3files:region:account-id:file-system/file-system-id.
        fileSystemId:
          $ref: "#/components/schemas/FileSystemId"
          description: The ID of the file system, assigned by S3 Files. This ID is used to reference the file system in subsequent API calls.
        bucket:
          $ref: "#/components/schemas/BucketArn"
          description: The Amazon Resource Name (ARN) of the S3 bucket associated with the file system.
        prefix:
          $ref: "#/components/schemas/String"
          description: The prefix within the S3 bucket that scopes the file system access.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: The client token used for idempotency.
        kmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The ARN or alias of the KMS key used for encryption.
        status:
          $ref: "#/components/schemas/LifeCycleState"
          description: "The lifecycle state of the file system. Valid values are: AVAILABLE (the file system is available for use), CREATING (the file system is being created), DELETING (the file system is being deleted), DELETED (the file system has been deleted), ERROR (the file system is in an error state), or UPDATING (the file system is being updated)."
        statusMessage:
          $ref: "#/components/schemas/StatusMessage"
          description: Additional information about the file system status. This field provides more details when the status is ERROR, or during state transitions.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of the IAM role used for S3 access.
        ownerId:
          $ref: "#/components/schemas/AwsAccountId"
          description: The Amazon Web Services account ID of the file system owner.
        tags:
          $ref: "#/components/schemas/TagList"
          description: The tags associated with the file system.
        name:
