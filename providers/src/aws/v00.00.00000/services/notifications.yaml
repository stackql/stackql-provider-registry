openapi: 3.0.0
info:
  version: "2018-05-10"
  title: AWS User Notifications
  description: AWS User Notifications
  x-serviceName: notifications
  x-serviceAlias: notifications
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: notifications
servers:
  - url: https://notifications.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for notifications
paths:
  /channels/associate/{arn}:
    post:
      operationId: AssociateChannel
      description: Associates a delivery Channel with a particular NotificationConfiguration. Supported Channels include Amazon Q Developer in chat applications, the Console Mobile Application, and emails (notifications-contacts).
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChannelArn"
          description: The Amazon Resource Name (ARN) of the Channel to associate with the NotificationConfiguration. Supported ARNs include Amazon Q Developer in chat applications, the Console Mobile Application, and notifications-contacts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notificationConfigurationArn:
                  $ref: "#/components/schemas/NotificationConfigurationArn"
              required:
                - notificationConfigurationArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateChannelResponse"
  /contacts/associate-managed-notification/{contact_identifier}:
    put:
      operationId: AssociateManagedNotificationAccountContact
      description: Associates an Account Contact with a particular ManagedNotificationConfiguration.
      parameters:
        - name: contact_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccountContactType"
          description: A unique value of an Account Contact Type to associate with the ManagedNotificationConfiguration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                managedNotificationConfigurationArn:
                  $ref: "#/components/schemas/ManagedNotificationConfigurationOsArn"
              required:
                - managedNotificationConfigurationArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateManagedNotificationAccountContactResponse"
  /channels/associate-managed-notification/{channel_arn}:
    put:
      operationId: AssociateManagedNotificationAdditionalChannel
      description: Associates an additional Channel with a particular ManagedNotificationConfiguration. Supported Channels include Amazon Q Developer in chat applications, the Console Mobile Application, and emails (notifications-contacts).
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChannelArn"
          description: The Amazon Resource Name (ARN) of the Channel to associate with the ManagedNotificationConfiguration. Supported ARNs include Amazon Q Developer in chat applications, the Console Mobile Application, and email (notifications-contacts).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                managedNotificationConfigurationArn:
                  $ref: "#/components/schemas/ManagedNotificationConfigurationOsArn"
              required:
                - managedNotificationConfigurationArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateManagedNotificationAdditionalChannelResponse"
  /organizational-units/associate/{organizational_unit_id}:
    post:
      operationId: AssociateOrganizationalUnit
      description: Associates an organizational unit with a notification configuration.
      parameters:
        - name: organizational_unit_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OrganizationalUnitId"
          description: The unique identifier of the organizational unit to associate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notificationConfigurationArn:
                  $ref: "#/components/schemas/NotificationConfigurationArn"
              required:
                - notificationConfigurationArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateOrganizationalUnitResponse"
  /event-rules:
    post:
      operationId: CreateEventRule
      description: Creates an EventRule that is associated with a specified NotificationConfiguration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notificationConfigurationArn:
                  $ref: "#/components/schemas/NotificationConfigurationArn"
                source:
                  $ref: "#/components/schemas/Source"
                eventType:
                  $ref: "#/components/schemas/EventType"
                eventPattern:
                  $ref: "#/components/schemas/EventRuleEventPattern"
                regions:
                  $ref: "#/components/schemas/Regions"
              required:
                - notificationConfigurationArn
                - source
                - eventType
                - regions
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventRuleResponse"
    get:
      operationId: ListEventRules
      description: Returns a list of EventRules according to specified filters, in reverse chronological order (newest first).
      parameters:
        - name: notificationConfigurationArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/NotificationConfigurationArn"
          description: The Amazon Resource Name (ARN) of the NotificationConfiguration.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListEventRulesRequestMaxResultsInteger"
          description: The maximum number of results to be returned in this call. The default value is 20.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The start token for paginated calls. Retrieved from the response of a previous ListEventRules call. Next token uses Base64 encoding.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventRulesResponse"
  /notification-configurations:
    post:
      operationId: CreateNotificationConfiguration
      description: Creates a new NotificationConfiguration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/NotificationConfigurationName"
                description:
                  $ref: "#/components/schemas/NotificationConfigurationDescription"
                aggregationDuration:
                  $ref: "#/components/schemas/AggregationDuration"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - description
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNotificationConfigurationResponse"
    get:
      operationId: ListNotificationConfigurations
      description: Returns a list of abbreviated NotificationConfigurations according to specified filters, in reverse chronological order (newest first).
      parameters:
        - name: eventRuleSource
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Source"
          description: The matched event source. Must match one of the valid EventBridge sources. Only Amazon Web Services service sourced events are supported. For example, aws.ec2 and aws.cloudwatch. For more information, see Event delivery from Amazon Web Services services in the Amazon EventBridge User Guide.
        - name: channelArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ChannelArn"
          description: The Amazon Resource Name (ARN) of the Channel to match.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NotificationConfigurationStatus"
          description: "The NotificationConfiguration status to match. Values: ACTIVE All EventRules are ACTIVE and any call can be run. PARTIALLY_ACTIVE Some EventRules are ACTIVE and some are INACTIVE. Any call can be run. Any call can be run. INACTIVE All EventRules are INACTIVE and any call can be run. DELETING This NotificationConfiguration is being deleted. Only GET and LIST calls can be run."
        - name: subtype
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NotificationConfigurationSubtype"
          description: The subtype used to filter the notification configurations in the request.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListNotificationConfigurationsRequestMaxResultsInteger"
          description: The maximum number of results to be returned in this call. Defaults to 20.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The start token for paginated calls. Retrieved from the response of a previous ListEventRules call. Next token uses Base64 encoding.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNotificationConfigurationsResponse"
  /event-rules/{arn}:
    delete:
      operationId: DeleteEventRule
      description: Deletes an EventRule.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EventRuleArn"
          description: The Amazon Resource Name (ARN) of the EventRule to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEventRuleResponse"
    get:
      operationId: GetEventRule
      description: Returns a specified EventRule.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EventRuleArn"
          description: The Amazon Resource Name (ARN) of the EventRule to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEventRuleResponse"
    put:
      operationId: UpdateEventRule
      description: Updates an existing EventRule.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EventRuleArn"
          description: The Amazon Resource Name (ARN) to use to update the EventRule.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                eventPattern:
                  $ref: "#/components/schemas/EventRuleEventPattern"
                regions:
                  $ref: "#/components/schemas/Regions"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEventRuleResponse"
  /notification-configurations/{arn}:
    delete:
      operationId: DeleteNotificationConfiguration
      description: Deletes a NotificationConfiguration.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NotificationConfigurationArn"
          description: The Amazon Resource Name (ARN) of the NotificationConfiguration to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteNotificationConfigurationResponse"
    get:
      operationId: GetNotificationConfiguration
      description: Returns a specified NotificationConfiguration.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NotificationConfigurationArn"
          description: The Amazon Resource Name (ARN) of the NotificationConfiguration to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetNotificationConfigurationResponse"
    put:
      operationId: UpdateNotificationConfiguration
      description: Updates a NotificationConfiguration.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NotificationConfigurationArn"
          description: The Amazon Resource Name (ARN) used to update the NotificationConfiguration.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/NotificationConfigurationName"
                description:
                  $ref: "#/components/schemas/NotificationConfigurationDescription"
                aggregationDuration:
                  $ref: "#/components/schemas/AggregationDuration"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateNotificationConfigurationResponse"
  /notification-hubs/{notification_hub_region}:
    delete:
      operationId: DeregisterNotificationHub
      description: Deregisters a NotificationConfiguration in the specified Region. You can't deregister the last NotificationHub in the account. NotificationEvents stored in the deregistered NotificationConfiguration are no longer be visible. Recreating a new NotificationConfiguration in the same Region restores access to those NotificationEvents.
      parameters:
        - name: notification_hub_region
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Region"
          description: The NotificationConfiguration Region.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeregisterNotificationHubResponse"
  /organization/access:
    delete:
      operationId: DisableNotificationsAccessForOrganization
      description: Disables service trust between User Notifications and Amazon Web Services Organizations.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableNotificationsAccessForOrganizationResponse"
    post:
      operationId: EnableNotificationsAccessForOrganization
      description: Enables service trust between User Notifications and Amazon Web Services Organizations.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnableNotificationsAccessForOrganizationResponse"
    get:
      operationId: GetNotificationsAccessForOrganization
      description: Returns the AccessStatus of Service Trust Enablement for User Notifications and Amazon Web Services Organizations.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetNotificationsAccessForOrganizationResponse"
  /channels/disassociate/{arn}:
    post:
      operationId: DisassociateChannel
      description: Disassociates a Channel from a specified NotificationConfiguration. Supported Channels include Amazon Q Developer in chat applications, the Console Mobile Application, and emails (notifications-contacts).
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChannelArn"
          description: The Amazon Resource Name (ARN) of the Channel to disassociate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notificationConfigurationArn:
                  $ref: "#/components/schemas/NotificationConfigurationArn"
              required:
                - notificationConfigurationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateChannelResponse"
  /contacts/disassociate-managed-notification/{contact_identifier}:
    put:
      operationId: DisassociateManagedNotificationAccountContact
      description: Disassociates an Account Contact with a particular ManagedNotificationConfiguration.
      parameters:
        - name: contact_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccountContactType"
          description: The unique value of an Account Contact Type to associate with the ManagedNotificationConfiguration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                managedNotificationConfigurationArn:
                  $ref: "#/components/schemas/ManagedNotificationConfigurationOsArn"
              required:
                - managedNotificationConfigurationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateManagedNotificationAccountContactResponse"
  /channels/disassociate-managed-notification/{channel_arn}:
    put:
      operationId: DisassociateManagedNotificationAdditionalChannel
      description: Disassociates an additional Channel from a particular ManagedNotificationConfiguration. Supported Channels include Amazon Q Developer in chat applications, the Console Mobile Application, and emails (notifications-contacts).
      parameters:
        - name: channel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChannelArn"
          description: The Amazon Resource Name (ARN) of the Channel to associate with the ManagedNotificationConfiguration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                managedNotificationConfigurationArn:
                  $ref: "#/components/schemas/ManagedNotificationConfigurationOsArn"
              required:
                - managedNotificationConfigurationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateManagedNotificationAdditionalChannelResponse"
  /organizational-units/disassociate/{organizational_unit_id}:
    post:
      operationId: DisassociateOrganizationalUnit
      description: Removes the association between an organizational unit and a notification configuration.
      parameters:
        - name: organizational_unit_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OrganizationalUnitId"
          description: The unique identifier of the organizational unit to disassociate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notificationConfigurationArn:
                  $ref: "#/components/schemas/NotificationConfigurationArn"
              required:
                - notificationConfigurationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateOrganizationalUnitResponse"
  /managed-notification-child-events/{arn}:
    get:
      operationId: GetManagedNotificationChildEvent
      description: Returns the child event of a specific given ManagedNotificationEvent.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ManagedNotificationChildEventArn"
          description: The Amazon Resource Name (ARN) of the ManagedNotificationChildEvent to return.
        - name: locale
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LocaleCode"
          description: The locale code of the language used for the retrieved ManagedNotificationChildEvent. The default locale is English en_US.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetManagedNotificationChildEventResponse"
  /managed-notification-configurations/{arn}:
    get:
      operationId: GetManagedNotificationConfiguration
      description: Returns a specified ManagedNotificationConfiguration.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ManagedNotificationConfigurationOsArn"
          description: The Amazon Resource Name (ARN) of the ManagedNotificationConfiguration to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetManagedNotificationConfigurationResponse"
  /managed-notification-events/{arn}:
    get:
      operationId: GetManagedNotificationEvent
      description: Returns a specified ManagedNotificationEvent.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ManagedNotificationEventArn"
          description: The Amazon Resource Name (ARN) of the ManagedNotificationEvent to return.
        - name: locale
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LocaleCode"
          description: The locale code of the language used for the retrieved ManagedNotificationEvent. The default locale is English (en_US).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetManagedNotificationEventResponse"
  /notification-events/{arn}:
    get:
      operationId: GetNotificationEvent
      description: Returns a specified NotificationEvent. User Notifications stores notifications in the individual Regions you register as notification hubs and the Region of the source event rule. GetNotificationEvent only returns notifications stored in the same Region in which the action is called. User Notifications doesn't backfill notifications to new Regions selected as notification hubs. For this reason, we recommend that you make calls in your oldest registered notification hub. For more information, see Notification hubs in the Amazon Web Services User Notifications User Guide.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NotificationEventArn"
          description: The Amazon Resource Name (ARN) of the NotificationEvent to return.
        - name: locale
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LocaleCode"
          description: The locale code of the language used for the retrieved NotificationEvent. The default locale is English en_US.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetNotificationEventResponse"
  /channels:
    get:
      operationId: ListChannels
      description: Returns a list of Channels for a NotificationConfiguration.
      parameters:
        - name: notificationConfigurationArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/NotificationConfigurationArn"
          description: The Amazon Resource Name (ARN) of the NotificationConfiguration.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListChannelsRequestMaxResultsInteger"
          description: The maximum number of results to be returned in this call. The default value is 20.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The start token for paginated calls. Retrieved from the response of a previous ListNotificationEvents call. NextToken uses Base64 encoding.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChannelsOutputDisplay"
  /channels/list-managed-notification-channel-associations:
    get:
      operationId: ListManagedNotificationChannelAssociations
      description: Returns a list of Account contacts and Channels associated with a ManagedNotificationConfiguration, in paginated format.
      parameters:
        - name: managedNotificationConfigurationArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ManagedNotificationConfigurationOsArn"
          description: The Amazon Resource Name (ARN) of the ManagedNotificationConfiguration to match.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListManagedNotificationChannelAssociationsRequestMaxResultsInteger"
          description: The maximum number of results to be returned in this call. Defaults to 20.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The start token for paginated calls. Retrieved from the response of a previous ListManagedNotificationChannelAssociations call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListManagedNotificationChannelAssociationsResponse"
  /list-managed-notification-child-events/{aggregate_managed_notification_event_arn}:
    get:
      operationId: ListManagedNotificationChildEvents
      description: Returns a list of ManagedNotificationChildEvents for a specified aggregate ManagedNotificationEvent, ordered by creation time in reverse chronological order (newest first).
      parameters:
        - name: aggregate_managed_notification_event_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ManagedNotificationEventArn"
          description: The Amazon Resource Name (ARN) of the ManagedNotificationEvent.
        - name: startTime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The earliest time of events to return from this call.
        - name: endTime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: Latest time of events to return from this call.
        - name: locale
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LocaleCode"
          description: The locale code of the language used for the retrieved NotificationEvent. The default locale is English.en_US.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListManagedNotificationChildEventsRequestMaxResultsInteger"
          description: The maximum number of results to be returned in this call. Defaults to 20.
        - name: relatedAccount
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID associated with the Managed Notification Child Events.
        - name: organizationalUnitId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OrganizationalUnitId"
          description: The identifier of the Amazon Web Services Organizations organizational unit (OU) associated with the Managed Notification Child Events.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The start token for paginated calls. Retrieved from the response of a previous ListManagedNotificationChannelAssociations call. Next token uses Base64 encoding.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListManagedNotificationChildEventsResponse"
  /managed-notification-configurations:
    get:
      operationId: ListManagedNotificationConfigurations
      description: Returns a list of Managed Notification Configurations according to specified filters, ordered by creation time in reverse chronological order (newest first).
      parameters:
        - name: channelIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ChannelIdentifier"
          description: The identifier or ARN of the notification channel to filter configurations by.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListManagedNotificationConfigurationsRequestMaxResultsInteger"
          description: The maximum number of results to be returned in this call. Defaults to 20.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The start token for paginated calls. Retrieved from the response of a previous ListManagedNotificationChannelAssociations call. Next token uses Base64 encoding.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListManagedNotificationConfigurationsResponse"
  /managed-notification-events:
    get:
      operationId: ListManagedNotificationEvents
      description: Returns a list of Managed Notification Events according to specified filters, ordered by creation time in reverse chronological order (newest first).
      parameters:
        - name: startTime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The earliest time of events to return from this call.
        - name: endTime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: Latest time of events to return from this call.
        - name: locale
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LocaleCode"
          description: The locale code of the language used for the retrieved NotificationEvent. The default locale is English (en_US).
        - name: source
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Source"
          description: The Amazon Web Services service the event originates from. For example aws.cloudwatch.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListManagedNotificationEventsRequestMaxResultsInteger"
          description: The maximum number of results to be returned in this call. Defaults to 20.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The start token for paginated calls. Retrieved from the response of a previous ListManagedNotificationChannelAssociations call. Next token uses Base64 encoding.
        - name: organizationalUnitId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OrganizationalUnitId"
          description: The Organizational Unit Id that an Amazon Web Services account belongs to.
        - name: relatedAccount
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID associated with the Managed Notification Events.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListManagedNotificationEventsResponse"
  /list-member-accounts:
    get:
      operationId: ListMemberAccounts
      description: Returns a list of member accounts associated with a notification configuration.
      parameters:
        - name: notificationConfigurationArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/NotificationConfigurationArn"
          description: The Amazon Resource Name (ARN) of the notification configuration used to filter the member accounts.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListMemberAccountsRequestMaxResultsInteger"
          description: The maximum number of results to return in a single call. Valid values are 1-100.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results. Use the value returned in the previous response.
        - name: memberAccount
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The member account identifier used to filter the results.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MemberAccountNotificationConfigurationStatus"
          description: The status used to filter the member accounts.
        - name: organizationalUnitId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OrganizationalUnitId"
          description: The organizational unit ID used to filter the member accounts.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMemberAccountsResponse"
  /notification-events:
    get:
      operationId: ListNotificationEvents
      description: Returns a list of NotificationEvents according to specified filters, in reverse chronological order (newest first). User Notifications stores notifications in the individual Regions you register as notification hubs and the Region of the source event rule. ListNotificationEvents only returns notifications stored in the same Region in which the action is called. User Notifications doesn't backfill notifications to new Regions selected as notification hubs. For this reason, we recommend that you make calls in your oldest registered notification hub. For more information, see Notification hubs in the Amazon Web Services User Notifications User Guide.
      parameters:
        - name: startTime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The earliest time of events to return from this call.
        - name: endTime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: Latest time of events to return from this call.
        - name: locale
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LocaleCode"
          description: The locale code of the language used for the retrieved NotificationEvent. The default locale is English (en_US).
        - name: source
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Source"
          description: The matched event source. Must match one of the valid EventBridge sources. Only Amazon Web Services service sourced events are supported. For example, aws.ec2 and aws.cloudwatch. For more information, see Event delivery from Amazon Web Services services in the Amazon EventBridge User Guide.
        - name: includeChildEvents
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: Include aggregated child events in the result.
        - name: aggregateNotificationEventArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NotificationEventArn"
          description: The Amazon Resource Name (ARN) of the aggregatedNotificationEventArn to match.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListNotificationEventsRequestMaxResultsInteger"
          description: The maximum number of results to be returned in this call. Defaults to 20.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The start token for paginated calls. Retrieved from the response of a previous ListEventRules call. Next token uses Base64 encoding.
        - name: organizationalUnitId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OrganizationalUnitId"
          description: The unique identifier of the organizational unit used to filter notification events.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNotificationEventsResponse"
  /notification-hubs:
    get:
      operationId: ListNotificationHubs
      description: Returns a list of NotificationHubs.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListNotificationHubsRequestMaxResultsInteger"
          description: The maximum number of records to list in a single response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token. Set to null to start listing notification hubs from the start.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNotificationHubsResponse"
    post:
      operationId: RegisterNotificationHub
      description: Registers a NotificationConfiguration in the specified Region. There is a maximum of one NotificationConfiguration per Region. You can have a maximum of 3 NotificationHub resources at a time.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notificationHubRegion:
                  $ref: "#/components/schemas/Region"
              required:
                - notificationHubRegion
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterNotificationHubResponse"
  /organizational-units:
    get:
      operationId: ListOrganizationalUnits
      description: Returns a list of organizational units associated with a notification configuration.
      parameters:
        - name: notificationConfigurationArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/NotificationConfigurationArn"
          description: The Amazon Resource Name (ARN) of the notification configuration used to filter the organizational units.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListOrganizationalUnitsRequestMaxResultsInteger"
          description: The maximum number of organizational units to return in a single call. Valid values are 1-100.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results. Use the value returned in the previous response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrganizationalUnitsOutputDisplay"
  /tags/{arn}:
    get:
      operationId: ListTagsForResource
      description: Returns a list of tags for a specified Amazon Resource Name (ARN). For more information, see Tagging your Amazon Web Services resources in the Tagging Amazon Web Services Resources User Guide. This is only supported for NotificationConfigurations.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NotificationConfigurationArn"
          description: The Amazon Resource Name (ARN) to use to list tags.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Tags the resource with a tag key and value. For more information, see Tagging your Amazon Web Services resources in the Tagging Amazon Web Services Resources User Guide. This is only supported for NotificationConfigurations.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NotificationConfigurationArn"
          description: The Amazon Resource Name (ARN) to use to tag a resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Untags a resource with a specified Amazon Resource Name (ARN). For more information, see Tagging your Amazon Web Services resources in the Tagging Amazon Web Services Resources User Guide.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NotificationConfigurationArn"
          description: The Amazon Resource Name (ARN) to use to untag a resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: The tag keys to use to untag a resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ChannelArn:
      type: string
      pattern: arn:aws:(chatbot|consoleapp|notifications-contacts):[a-zA-Z0-9-]*:[0-9]{12}:[a-zA-Z0-9-_.@]+/[a-zA-Z0-9/_.@:-]+
    NotificationConfigurationArn:
      type: string
      pattern: arn:aws:notifications::[0-9]{12}:configuration/[a-z0-9]{27}
    AssociateChannelResponse:
      type: object
    AccountContactType:
      type: string
      enum:
        - ACCOUNT_PRIMARY
        - ACCOUNT_ALTERNATE_BILLING
        - ACCOUNT_ALTERNATE_OPERATIONS
        - ACCOUNT_ALTERNATE_SECURITY
    ManagedNotificationConfigurationOsArn:
      type: string
      pattern: arn:[-.a-z0-9]{1,63}:notifications::[0-9]{12}:managed-notification-configuration/category/[a-zA-Z0-9\-]{3,64}/sub-category/[a-zA-Z0-9\-]{3,64}
    AssociateManagedNotificationAccountContactResponse:
      type: object
    AssociateManagedNotificationAdditionalChannelResponse:
      type: object
    OrganizationalUnitId:
      type: string
      pattern: (Root|r-[0-9a-z]{4,32}|ou-[0-9a-z]{4,32}-[a-z0-9]{8,32})
    AssociateOrganizationalUnitResponse:
      type: object
    Source:
      type: string
      minLength: 1
      maxLength: 36
      pattern: aws.([a-z0-9\-])+
    EventType:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ([a-zA-Z0-9 \-\(\)])+
    EventRuleEventPattern:
      type: string
      minLength: 0
      maxLength: 4096
    Regions:
      type: array
      items:
        $ref: "#/components/schemas/Region"
    Region:
      type: string
      minLength: 2
      maxLength: 25
      pattern: ([a-z]{1,2})-([a-z]{1,15}-)+([0-9])
    CreateEventRuleResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/EventRuleArn"
          description: The ARN of the resource.
        notificationConfigurationArn:
          $ref: "#/components/schemas/NotificationConfigurationArn"
          description: The ARN of a NotificationConfiguration.
        statusSummaryByRegion:
          type: object
          properties: {}
          description: A list of an EventRule's status by Region. Regions are mapped to EventRuleStatusSummary.
      required:
        - arn
        - notificationConfigurationArn
        - statusSummaryByRegion
    EventRuleArn:
      type: string
      pattern: arn:aws:notifications::[0-9]{12}:configuration/[a-z0-9]{27}/rule/[a-z0-9]{27}
    NotificationConfigurationName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z0-9_\\-]+"
    NotificationConfigurationDescription:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[^\\u0001-\\u001F\\u007F-\\u009F]*"
    AggregationDuration:
      type: string
      enum:
        - LONG
        - SHORT
        - NONE
    TagMap:
      type: object
      properties: {}
    CreateNotificationConfigurationResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/NotificationConfigurationArn"
          description: The Amazon Resource Name (ARN) of the NotificationConfiguration.
        status:
          $ref: "#/components/schemas/NotificationConfigurationStatus"
          description: The current status of this NotificationConfiguration.
      required:
        - arn
        - status
    NotificationConfigurationStatus:
      type: string
      enum:
        - ACTIVE
        - PARTIALLY_ACTIVE
        - INACTIVE
        - DELETING
    DeleteEventRuleResponse:
      type: object
    DeleteNotificationConfigurationResponse:
      type: object
    DeregisterNotificationHubResponse:
      type: object
      properties:
        notificationHubRegion:
          $ref: "#/components/schemas/Region"
          description: The NotificationConfiguration Region.
        statusSummary:
          $ref: "#/components/schemas/NotificationHubStatusSummary"
          description: NotificationConfiguration status information.
      required:
        - notificationHubRegion
        - statusSummary
    NotificationHubStatusSummary:
      description: Provides additional information about the current NotificationHub status.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/NotificationHubStatus"
          description: "Status information about the NotificationHub. Values: ACTIVE Incoming NotificationEvents are replicated to this NotificationHub. REGISTERING The NotificationConfiguration is initializing. A NotificationConfiguration with this status can't be deregistered. DEREGISTERING The NotificationConfiguration is being deleted. You can't register additional NotificationHubs in the same Region as a NotificationConfiguration with this status."
        reason:
          $ref: "#/components/schemas/NotificationHubStatusReason"
          description: An explanation for the current status.
      required:
        - status
        - reason
    NotificationHubStatus:
      type: string
      enum:
        - ACTIVE
        - REGISTERING
        - DEREGISTERING
        - INACTIVE
    NotificationHubStatusReason:
      type: string
    DisableNotificationsAccessForOrganizationResponse:
      type: object
    DisassociateChannelResponse:
      type: object
    DisassociateManagedNotificationAccountContactResponse:
      type: object
    DisassociateManagedNotificationAdditionalChannelResponse:
      type: object
    DisassociateOrganizationalUnitResponse:
      type: object
    EnableNotificationsAccessForOrganizationResponse:
      type: object
    GetEventRuleResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/EventRuleArn"
          description: The ARN of the resource.
        notificationConfigurationArn:
          $ref: "#/components/schemas/NotificationConfigurationArn"
          description: The ARN of a NotificationConfiguration.
        creationTime:
          $ref: "#/components/schemas/CreationTime"
          description: The date when the EventRule was created.
        source:
          $ref: "#/components/schemas/Source"
          description: The matched event source. Must match one of the valid EventBridge sources. Only Amazon Web Services service sourced events are supported. For example, aws.ec2 and aws.cloudwatch. For more information, see Event delivery from Amazon Web Services services in the Amazon EventBridge User Guide.
        eventType:
          $ref: "#/components/schemas/EventType"
          description: The event type to match. Must match one of the valid Amazon EventBridge event types. For example, EC2 Instance State-change Notification and Amazon CloudWatch Alarm State Change. For more information, see Event delivery from Amazon Web Services services in the Amazon EventBridge User Guide.
        eventPattern:
          $ref: "#/components/schemas/EventRuleEventPattern"
          description: An additional event pattern used to further filter the events this EventRule receives. For more information, see Amazon EventBridge event patterns in the Amazon EventBridge User Guide.
        regions:
          $ref: "#/components/schemas/Regions"
          description: A list of Amazon Web Services Regions that send events to this EventRule.
        managedRules:
          $ref: "#/components/schemas/ManagedRuleArns"
          description: A list of managed rules from EventBridge that are associated with this EventRule. These are created by User Notifications within your account so this EventRule functions.
        statusSummaryByRegion:
          type: object
          properties: {}
          description: A list of an EventRule's status by Region. Regions are mapped to EventRuleStatusSummary.
      required:
        - arn
        - notificationConfigurationArn
        - creationTime
        - source
        - eventType
        - eventPattern
        - regions
        - managedRules
        - statusSummaryByRegion
    CreationTime:
      type: string
      format: date-time
    ManagedRuleArns:
      type: array
      items:
        $ref: "#/components/schemas/ManagedRuleArn"
    ManagedRuleArn:
      type: string
      pattern: arn:aws:events:[a-z-\d]{2,25}:\d{12}:rule\/[a-zA-Z-\d]{1,1024}
    ManagedNotificationChildEventArn:
      type: string
      pattern: arn:[-.a-z0-9]{1,63}:notifications::[0-9]{12}:managed-notification-configuration/category/[a-zA-Z0-9\-]{3,64}/sub-category/[a-zA-Z0-9\-]{3,64}/event/[a-z0-9]{27}/child-event/[a-z0-9]{27}
    LocaleCode:
      type: string
      enum:
        - de_DE
        - en_CA
        - en_US
        - en_UK
        - es_ES
        - fr_CA
        - fr_FR
        - id_ID
        - it_IT
        - ja_JP
        - ko_KR
        - pt_BR
        - tr_TR
        - zh_CN
        - zh_TW
    GetManagedNotificationChildEventResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/ManagedNotificationChildEventArn"
          description: The ARN of the resource.
        managedNotificationConfigurationArn:
          $ref: "#/components/schemas/ManagedNotificationConfigurationOsArn"
          description: The Amazon Resource Name (ARN) of the ManagedNotificationConfiguration associated with the ManagedNotificationChildEvent.
        creationTime:
          $ref: "#/components/schemas/CreationTime"
          description: The creation time of the ManagedNotificationChildEvent.
        content:
          $ref: "#/components/schemas/ManagedNotificationChildEvent"
          description: The content of the ManagedNotificationChildEvent.
      required:
        - arn
        - managedNotificationConfigurationArn
        - creationTime
        - content
    ManagedNotificationChildEvent:
      description: A ManagedNotificationChildEvent is a notification-focused representation of an event. They contain semantic information used to create aggregated or non-aggregated end-user notifications.
      type: object
      properties:
        schemaVersion:
          $ref: "#/components/schemas/SchemaVersion"
          description: The schema version of the Managed Notification Child Event.
        id:
          $ref: "#/components/schemas/NotificationEventId"
          description: The unique identifier for a Managed Notification Child Event.
        messageComponents:
          $ref: "#/components/schemas/MessageComponents"
        sourceEventDetailUrl:
          $ref: "#/components/schemas/Url"
          description: The source event URL.
        sourceEventDetailUrlDisplayText:
          $ref: "#/components/schemas/String"
          description: The detailed URL for the source event.
        notificationType:
          $ref: "#/components/schemas/NotificationType"
          description: "The type of event causing the notification. Values: ALERT A notification about an event where something was triggered, initiated, reopened, deployed, or a threshold was breached. WARNING A notification about an event where an issue is about to arise. For example, something is approaching a threshold. ANNOUNCEMENT A notification about an important event. For example, a step in a workflow or escalation path or that a workflow was updated. INFORMATIONAL A notification about informational messages. For example, recommendations, service announcements, or reminders."
        eventStatus:
          $ref: "#/components/schemas/EventStatus"
          description: "The assesed nature of the event. Values: HEALTHY All EventRules are ACTIVE. UNHEALTHY Some EventRules are ACTIVE and some are INACTIVE."
        aggregateManagedNotificationEventArn:
          $ref: "#/components/schemas/ManagedNotificationEventArn"
          description: The Amazon Resource Name (ARN) of the ManagedNotificationEvent that is associated with this Managed Notification Child Event.
        startTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The notification event start time.
        endTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The end time of the event.
        textParts:
          type: object
          properties: {}
          description: A list of text values.
        organizationalUnitId:
          $ref: "#/components/schemas/OrganizationalUnitId"
          description: The Organizational Unit Id that an Amazon Web Services account belongs to.
        aggregationDetail:
          $ref: "#/components/schemas/AggregationDetail"
          description: Provides detailed information about the dimensions used for event summarization and aggregation.
      required:
        - schemaVersion
        - id
        - messageComponents
        - notificationType
        - aggregateManagedNotificationEventArn
        - textParts
    SchemaVersion:
      type: string
      enum:
        - v1.0
    NotificationEventId:
      type: string
      pattern: "[a-z0-9]{27}"
    MessageComponents:
      description: Describes the components of a notification message.
      type: object
      properties:
        headline:
          $ref: "#/components/schemas/TextPartReference"
          description: A sentence long summary. For example, titles or an email subject line.
        paragraphSummary:
          $ref: "#/components/schemas/TextPartReference"
          description: A paragraph long or multiple sentence summary. For example, Amazon Q Developer in chat applications notifications.
        completeDescription:
          $ref: "#/components/schemas/TextPartReference"
          description: A complete summary with all possible relevant information.
        dimensions:
          $ref: "#/components/schemas/Dimensions"
          description: A list of properties in key-value pairs. Pairs are shown in order of importance from most important to least important. Channels may limit the number of dimensions shown to the notification viewer. Included dimensions, keys, and values are subject to change.
    TextPartReference:
      type: string
    Dimensions:
      type: array
      items:
        $ref: "#/components/schemas/Dimension"
    Dimension:
      description: The key-value pair of properties for an event.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/TextPartReference"
          description: The name of the dimension
        value:
          $ref: "#/components/schemas/TextPartReference"
          description: The value of the dimension.
      required:
        - name
        - value
    Url:
      type: string
      minLength: 0
      maxLength: 2000
      pattern: (https?)://.*
    String:
      type: string
    NotificationType:
      type: string
      enum:
        - ALERT
        - WARNING
        - ANNOUNCEMENT
        - INFORMATIONAL
    EventStatus:
      type: string
      enum:
        - HEALTHY
        - UNHEALTHY
    ManagedNotificationEventArn:
      type: string
      pattern: arn:[-.a-z0-9]{1,63}:notifications::[0-9]{12}:managed-notification-configuration/category/[a-zA-Z0-9\-]{3,64}/sub-category/[a-zA-Z0-9\-]{3,64}/event/[a-z0-9]{27}
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    AggregationDetail:
      description: Provides detailed information about the dimensions used for aggregation.
      type: object
      properties:
        summarizationDimensions:
          $ref: "#/components/schemas/SummarizationDimensionDetails"
          description: Properties used to summarize aggregated events.
    SummarizationDimensionDetails:
      type: array
      items:
        $ref: "#/components/schemas/SummarizationDimensionDetail"
    SummarizationDimensionDetail:
      description: Provides detailed information about the dimensions used for event summarization and aggregation.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the SummarizationDimensionDetail.
        value:
          $ref: "#/components/schemas/String"
          description: Value of the property used to summarize aggregated events.
      required:
        - name
        - value
    GetManagedNotificationConfigurationResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/ManagedNotificationConfigurationOsArn"
          description: The ARN of the ManagedNotificationConfiguration resource.
        name:
          $ref: "#/components/schemas/ManagedNotificationConfigurationName"
          description: The name of the ManagedNotificationConfiguration.
        description:
          $ref: "#/components/schemas/ManagedNotificationConfigurationDescription"
          description: The description of the ManagedNotificationConfiguration.
        category:
          $ref: "#/components/schemas/String"
          description: The category of the ManagedNotificationConfiguration.
        subCategory:
          $ref: "#/components/schemas/String"
          description: The subCategory of the ManagedNotificationConfiguration.
      required:
        - arn
        - name
        - description
        - category
        - subCategory
    ManagedNotificationConfigurationName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z0-9\\-]+"
    ManagedNotificationConfigurationDescription:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[^\\u0001-\\u001F\\u007F-\\u009F]*"
    GetManagedNotificationEventResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/ManagedNotificationEventArn"
          description: The ARN of the resource.
        managedNotificationConfigurationArn:
          $ref: "#/components/schemas/ManagedNotificationConfigurationOsArn"
          description: The ARN of the ManagedNotificationConfiguration.
        creationTime:
          $ref: "#/components/schemas/CreationTime"
          description: The creation time of the ManagedNotificationEvent.
        content:
          $ref: "#/components/schemas/ManagedNotificationEvent"
