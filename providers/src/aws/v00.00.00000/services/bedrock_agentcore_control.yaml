      description: The configuration for using Amazon Bedrock models in evaluator assessments, including model selection and inference parameters.
      type: object
      properties:
        modelId:
          $ref: "#/components/schemas/ModelId"
          description: The identifier of the Amazon Bedrock model to use for evaluation. Must be a supported foundation model available in your region.
        inferenceConfig:
          $ref: "#/components/schemas/InferenceConfiguration"
          description: The inference configuration parameters that control model behavior during evaluation, including temperature, token limits, and sampling settings.
        additionalModelRequestFields:
          $ref: "#/components/schemas/AdditionalModelRequestFields"
          description: Additional model-specific request fields to customize model behavior beyond the standard inference configuration.
      required:
