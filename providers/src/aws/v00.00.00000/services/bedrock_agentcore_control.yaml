    RegistryArn:
      type: string
      pattern: arn:aws(-[^:]+)?:bedrock-agentcore:[a-z0-9-]+:[0-9]{12}:registry/[a-zA-Z0-9]{12,16}
    RegistryIdentifier:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: (arn:aws(-[^:]+)?:bedrock-agentcore:[a-z0-9-]+:[0-9]{12}:registry/)?[a-zA-Z0-9]{12,16}
    RegistryRecordName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_\\-\\.\\/]*"
    DescriptorType:
      type: string
      enum:
        - MCP
        - A2A
        - CUSTOM
        - AGENT_SKILLS
    Descriptors:
      description: Contains descriptor-type-specific configurations for a registry record. Only the descriptor matching the record's descriptorType should be populated.
      type: object
      properties:
        mcp:
          $ref: "#/components/schemas/McpDescriptor"
          description: The Model Context Protocol (MCP) descriptor configuration. Use this when the descriptorType is MCP.
        a2a:
          $ref: "#/components/schemas/A2aDescriptor"
          description: The Agent-to-Agent (A2A) protocol descriptor configuration. Use this when the descriptorType is A2A.
        custom:
          $ref: "#/components/schemas/CustomDescriptor"
          description: The custom descriptor configuration. Use this when the descriptorType is CUSTOM.
        agentSkills:
          $ref: "#/components/schemas/AgentSkillsDescriptor"
          description: The agent skills descriptor configuration. Use this when the descriptorType is AGENT_SKILLS.
    McpDescriptor:
      description: The Model Context Protocol (MCP) descriptor for a registry record. Contains the server definition and tools definition for an MCP-compatible server. The schema is validated against the MCP protocol specification.
      type: object
      properties:
        server:
          $ref: "#/components/schemas/ServerDefinition"
          description: The MCP server definition, containing the server configuration and schema as defined by the MCP protocol specification.
        tools:
          $ref: "#/components/schemas/ToolsDefinition"
          description: The MCP tools definition, containing the tools available on the MCP server as defined by the MCP protocol specification.
    ServerDefinition:
      description: The server definition for an MCP descriptor. Contains the schema version and inline content for the MCP server configuration.
      type: object
      properties:
        schemaVersion:
          $ref: "#/components/schemas/SchemaVersion"
          description: The schema version of the server definition based on the MCP protocol specification. If not specified, the version is auto-detected from the content.
        inlineContent:
          $ref: "#/components/schemas/InlineContent"
          description: The JSON content containing the MCP server definition, conforming to the MCP protocol specification.
    SchemaVersion:
      type: string
      minLength: 1
      maxLength: 255
    InlineContent:
      type: string
      minLength: 1
      maxLength: 102400
    ToolsDefinition:
      description: The tools definition for an MCP descriptor. Contains the protocol version and inline content describing the available tools.
      type: object
      properties:
        protocolVersion:
          $ref: "#/components/schemas/SchemaVersion"
          description: The protocol version of the tools definition based on the MCP protocol specification. If not specified, the version is auto-detected from the content.
        inlineContent:
          $ref: "#/components/schemas/InlineContent"
          description: The JSON content containing the MCP tools definition, conforming to the MCP protocol specification.
    A2aDescriptor:
      description: The Agent-to-Agent (A2A) protocol descriptor for a registry record. Contains the agent card definition as defined by the A2A protocol specification.
      type: object
      properties:
        agentCard:
          $ref: "#/components/schemas/AgentCardDefinition"
          description: The agent card definition for the A2A agent, as defined by the A2A protocol specification.
    AgentCardDefinition:
      description: The agent card definition for an A2A descriptor. Contains the schema version and inline content for the agent card.
      type: object
      properties:
        schemaVersion:
          $ref: "#/components/schemas/SchemaVersion"
          description: The schema version of the agent card based on the A2A protocol specification.
        inlineContent:
          $ref: "#/components/schemas/InlineContent"
          description: The JSON content containing the A2A agent card definition, conforming to the A2A protocol specification.
    CustomDescriptor:
      description: A custom descriptor for a registry record. Use this for resources such as APIs, Lambda functions, or servers that do not conform to a standard protocol like MCP or A2A.
      type: object
      properties:
        inlineContent:
          $ref: "#/components/schemas/InlineContent"
          description: The custom descriptor content as a valid JSON document. You can define any custom schema that describes your resource.
    AgentSkillsDescriptor:
      description: The agent skills descriptor for a registry record. Contains an optional skill markdown definition in human-readable format and an optional structured skill definition.
      type: object
      properties:
        skillMd:
          $ref: "#/components/schemas/SkillMdDefinition"
          description: The optional skill markdown definition describing the agent's skills in a human-readable format.
        skillDefinition:
          $ref: "#/components/schemas/SkillDefinition"
          description: The structured skill definition with schema version and content.
    SkillMdDefinition:
      description: The skill markdown definition for an agent skills descriptor.
      type: object
      properties:
        inlineContent:
          $ref: "#/components/schemas/InlineContent"
          description: The markdown content describing the agent's skills in a human-readable format.
    SkillDefinition:
      description: The structured skill definition with schema version and content.
      type: object
      properties:
        schemaVersion:
          $ref: "#/components/schemas/SchemaVersion"
          description: The version of the skill definition schema.
        inlineContent:
          $ref: "#/components/schemas/InlineContent"
          description: The JSON content containing the structured skill definition.
    RegistryRecordVersion:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9.-]+"
    SynchronizationType:
      type: string
      enum:
        - URL
    SynchronizationConfiguration:
      description: Configuration for synchronizing registry record metadata from an external source.
      type: object
      properties:
        fromUrl:
          $ref: "#/components/schemas/FromUrlSynchronizationConfiguration"
          description: Configuration for synchronizing from a URL-based source.
    FromUrlSynchronizationConfiguration:
      description: Configuration for synchronizing from a URL-based MCP server.
      type: object
      properties:
        url:
          $ref: "#/components/schemas/McpServerUrl"
          description: The HTTPS URL of the MCP server to synchronize from.
        credentialProviderConfigurations:
          $ref: "#/components/schemas/RegistryRecordCredentialProviderConfigurationList"
          description: Optional list of credential provider configurations for authenticating with the MCP server. At most one credential provider configuration can be specified.
      required:
        - url
    McpServerUrl:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: https://.*
    RegistryRecordCredentialProviderConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/RegistryRecordCredentialProviderConfiguration"
    RegistryRecordCredentialProviderConfiguration:
      description: A pairing of a credential provider type with its corresponding provider details for authenticating with external sources.
      type: object
      properties:
        credentialProviderType:
          $ref: "#/components/schemas/RegistryRecordCredentialProviderType"
          description: The type of credential provider. OAUTH - OAuth-based authentication. IAM - Amazon Web Services IAM-based authentication using SigV4 signing.
        credentialProvider:
          $ref: "#/components/schemas/RegistryRecordCredentialProviderUnion"
          description: The credential provider configuration details. The structure depends on the credentialProviderType.
      required:
        - credentialProviderType
        - credentialProvider
    RegistryRecordCredentialProviderType:
      type: string
      enum:
        - OAUTH
        - IAM
    RegistryRecordCredentialProviderUnion:
      description: Union of supported credential provider types for registry record synchronization.
      type: object
      properties:
        oauthCredentialProvider:
          $ref: "#/components/schemas/RegistryRecordOAuthCredentialProvider"
          description: The OAuth credential provider configuration for authenticating with the external source.
        iamCredentialProvider:
          $ref: "#/components/schemas/RegistryRecordIamCredentialProvider"
          description: The IAM credential provider configuration for authenticating with the external source using SigV4 signing.
    RegistryRecordOAuthCredentialProvider:
      description: OAuth credential provider configuration for authenticating with an external source during synchronization.
      type: object
      properties:
        providerArn:
          $ref: "#/components/schemas/CredentialProviderArn"
          description: The Amazon Resource Name (ARN) of the OAuth credential provider resource.
        grantType:
          $ref: "#/components/schemas/RegistryRecordOAuthGrantType"
          description: The OAuth grant type. Currently only CLIENT_CREDENTIALS is supported.
        scopes:
          $ref: "#/components/schemas/ScopeList"
          description: The OAuth scopes to request during authentication.
        customParameters:
          type: object
          properties: {}
          description: Additional custom parameters for the OAuth flow.
      required:
        - providerArn
    CredentialProviderArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:bedrock-agentcore:[a-z0-9-]+:[0-9]{12}:.*
    RegistryRecordOAuthGrantType:
      type: string
      enum:
        - CLIENT_CREDENTIALS
    ScopeList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    RegistryRecordIamCredentialProvider:
      description: IAM credential provider configuration for authenticating with an external source using SigV4 signing during synchronization.
      type: object
      properties:
        roleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role to assume for SigV4 signing.
        service:
          $ref: "#/components/schemas/IamSigningServiceName"
          description: The SigV4 signing service name (for example, execute-api or bedrock-agentcore).
        region:
          $ref: "#/components/schemas/IamSigningRegion"
          description: The Amazon Web Services region for SigV4 signing (for example, us-west-2). If not specified, the region is extracted from the MCP server URL hostname, with fallback to the service's own region.
    IamRoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:iam::[0-9]{12}:role/.+
    IamSigningServiceName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_-]+"
    IamSigningRegion:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-z0-9-]+"
    CreateRegistryRecordResponse:
      type: object
      properties:
        recordArn:
          $ref: "#/components/schemas/RegistryRecordArn"
          description: The Amazon Resource Name (ARN) of the created registry record.
        status:
          $ref: "#/components/schemas/RegistryRecordStatus"
          description: The status of the registry record. Set to CREATING while the asynchronous workflow is in progress.
      required:
        - recordArn
        - status
    RegistryRecordArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:bedrock-agentcore:[a-z0-9-]+:[0-9]{12}:registry/[a-zA-Z0-9]{12,16}/record/[a-zA-Z0-9]{12}
    RegistryRecordStatus:
      type: string
      enum:
        - DRAFT
        - PENDING_APPROVAL
        - APPROVED
        - REJECTED
        - DEPRECATED
        - CREATING
        - UPDATING
        - CREATE_FAILED
        - UPDATE_FAILED
    WorkloadIdentityNameType:
      type: string
      minLength: 3
      maxLength: 255
      pattern: "[A-Za-z0-9_.-]+"
    ResourceOauth2ReturnUrlListType:
      type: array
      items:
        $ref: "#/components/schemas/ResourceOauth2ReturnUrlType"
    ResourceOauth2ReturnUrlType:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: \w+:(\/?\/?)[^\s]+
    CreateWorkloadIdentityResponse:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/WorkloadIdentityNameType"
          description: The name of the workload identity.
        workloadIdentityArn:
          $ref: "#/components/schemas/WorkloadIdentityArnType"
          description: The Amazon Resource Name (ARN) of the workload identity.
        allowedResourceOauth2ReturnUrls:
          $ref: "#/components/schemas/ResourceOauth2ReturnUrlListType"
          description: The list of allowed OAuth2 return URLs for resources associated with this workload identity.
      required:
        - name
        - workloadIdentityArn
    WorkloadIdentityArnType:
      type: string
      minLength: 1
      maxLength: 1024
    DeleteAgentRuntimeResponse:
      type: object
