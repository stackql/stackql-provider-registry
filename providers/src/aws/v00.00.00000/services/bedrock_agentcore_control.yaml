        ratingScale:
          $ref: "#/components/schemas/RatingScale"
          description: The rating scale that defines how the evaluator should score agent performance, either numerical or categorical.
        modelConfig:
          $ref: "#/components/schemas/EvaluatorModelConfig"
          description: The model configuration that specifies which foundation model to use and how to configure it for evaluation.
      required:
        - instructions
        - ratingScale
        - modelConfig
    EvaluatorInstructions:
      type: string
    RatingScale:
      description: The rating scale that defines how evaluators should score agent performance, supporting both numerical and categorical scales.
      type: object
      properties:
        numerical:
          $ref: "#/components/schemas/NumericalScaleDefinitions"
          description: The numerical rating scale with defined score values and descriptions for quantitative evaluation.
        categorical:
          $ref: "#/components/schemas/CategoricalScaleDefinitions"
          description: The categorical rating scale with named categories and definitions for qualitative evaluation.
    NumericalScaleDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/NumericalScaleDefinition"
    NumericalScaleDefinition:
