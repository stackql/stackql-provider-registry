      type: object
      properties:
        llmAsAJudge:
          $ref: "#/components/schemas/LlmAsAJudgeEvaluatorConfig"
          description: The LLM-as-a-Judge configuration that uses a language model to evaluate agent performance based on custom instructions and rating scales.
        codeBased:
          $ref: "#/components/schemas/CodeBasedEvaluatorConfig"
          description: Configuration for a code-based evaluator that uses a customer-managed Lambda function to programmatically assess agent performance.
    LlmAsAJudgeEvaluatorConfig:
      description: The configuration for LLM-as-a-Judge evaluation that uses a language model to assess agent performance based on custom instructions and rating scales.
      type: object
      properties:
        instructions:
          $ref: "#/components/schemas/EvaluatorInstructions"
