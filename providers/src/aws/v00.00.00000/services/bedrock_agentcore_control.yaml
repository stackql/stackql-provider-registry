        status:
          $ref: "#/components/schemas/GatewayStatus"
          description: The current status of the gateway deletion.
        statusReasons:
          $ref: "#/components/schemas/StatusReasons"
          description: The reasons for the current status of the gateway deletion.
      required:
        - gatewayId
