          $ref: "#/components/schemas/BrowserId"
          description: The unique identifier of the deleted browser.
        status:
          $ref: "#/components/schemas/BrowserStatus"
          description: The current status of the browser deletion.
        lastUpdatedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the browser was last updated.
      required:
        - browserId
        - status
        - lastUpdatedAt
    DeleteBrowserProfileResponse:
      type: object
      properties:
        profileId:
          $ref: "#/components/schemas/BrowserProfileId"
          description: The unique identifier of the deleted browser profile.
        profileArn:
          $ref: "#/components/schemas/BrowserProfileArn"
          description: The Amazon Resource Name (ARN) of the deleted browser profile.
        status:
          $ref: "#/components/schemas/BrowserProfileStatus"
          description: The current status of the browser profile deletion.
        lastUpdatedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the browser profile was last updated.
        lastSavedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when browser session data was last saved to this profile before deletion.
      required:
        - profileId
        - profileArn
        - status
        - lastUpdatedAt
    DeleteCodeInterpreterResponse:
      type: object
      properties:
        codeInterpreterId:
          $ref: "#/components/schemas/CodeInterpreterId"
          description: The unique identifier of the deleted code interpreter.
        status:
          $ref: "#/components/schemas/CodeInterpreterStatus"
          description: The current status of the code interpreter deletion.
        lastUpdatedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the code interpreter was last updated.
      required:
        - codeInterpreterId
        - status
        - lastUpdatedAt
    DeleteConfigurationBundleResponse:
      type: object
      properties:
        bundleId:
          $ref: "#/components/schemas/ConfigurationBundleId"
          description: The unique identifier of the deleted configuration bundle.
        status:
          $ref: "#/components/schemas/ConfigurationBundleStatus"
          description: The status of the configuration bundle deletion operation.
      required:
        - bundleId
        - status
    ConfigurationBundleStatus:
      type: string
      enum:
        - ACTIVE
        - CREATING
        - CREATE_FAILED
        - UPDATING
        - UPDATE_FAILED
        - DELETING
        - DELETE_FAILED
    DeleteEvaluatorResponse:
      type: object
      properties:
        evaluatorArn:
          $ref: "#/components/schemas/EvaluatorArn"
          description: The Amazon Resource Name (ARN) of the deleted evaluator.
        evaluatorId:
          $ref: "#/components/schemas/EvaluatorId"
          description: The unique identifier of the deleted evaluator.
        status:
          $ref: "#/components/schemas/EvaluatorStatus"
          description: The status of the evaluator deletion operation.
      required:
        - evaluatorArn
        - evaluatorId
        - status
    EvaluatorArn:
      type: string
      pattern: arn:aws:bedrock-agentcore:[a-z0-9-]+:[0-9]{12}:evaluator\/[a-zA-Z][a-zA-Z0-9-_]{0,99}-[a-zA-Z0-9]{10}$|^arn:aws:bedrock-agentcore:::evaluator/Builtin.[a-zA-Z0-9_-]+
    DeleteGatewayResponse:
      type: object
