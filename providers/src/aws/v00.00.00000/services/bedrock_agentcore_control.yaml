        - SEMANTIC
    SessionConfiguration:
      description: The session configuration for an MCP gateway. This structure defines settings that control session behavior.
      type: object
      properties:
        sessionTimeoutInSeconds:
          $ref: "#/components/schemas/SessionConfigurationSessionTimeoutInSecondsInteger"
          description: The session timeout in seconds. After this timeout, the session expires and subsequent requests to this session will receive an error. The minimum value is 900 seconds (15 minutes), the maximum value is 28800 seconds (8 hours), and the default value is 3600 seconds (1 hour).
    SessionConfigurationSessionTimeoutInSecondsInteger:
      type: integer
      minimum: 900
      maximum: 28800
    StreamingConfiguration:
