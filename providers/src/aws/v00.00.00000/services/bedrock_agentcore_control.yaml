          description: The supported points of interception. This field specifies which points during the gateway invocation to invoke the interceptor
        inputConfiguration:
          $ref: "#/components/schemas/InterceptorInputConfiguration"
          description: The configuration for the input of the interceptor. This field specifies how the input to the interceptor is constructed
      required:
        - interceptor
        - interceptionPoints
    InterceptorConfiguration:
      description: The interceptor configuration.
      type: object
      properties:
        lambda:
          $ref: "#/components/schemas/LambdaInterceptorConfiguration"
          description: The details of the lambda function used for the interceptor.
    LambdaInterceptorConfiguration:
      description: The lambda configuration for the interceptor
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/LambdaFunctionArn"
          description: The arn of the lambda function to be invoked for the interceptor.
      required:
        - arn
    LambdaFunctionArn:
      type: string
      minLength: 1
      maxLength: 170
      pattern: arn:(aws[a-zA-Z-]*)?:lambda:([a-z]{2}(-gov)?-[a-z]+-\d{1}):(\d{12}):function:([a-zA-Z0-9-_.]+)(:(\$LATEST|[a-zA-Z0-9-]+))?
    GatewayInterceptionPoints:
      type: array
      items:
        $ref: "#/components/schemas/GatewayInterceptionPoint"
    GatewayInterceptionPoint:
      type: string
      enum:
        - REQUEST
        - RESPONSE
    InterceptorInputConfiguration:
      description: The input configuration of the interceptor.
      type: object
      properties:
        passRequestHeaders:
