    DeleteGatewayRuleResponse:
      type: object
      properties:
        ruleId:
          $ref: "#/components/schemas/GatewayRuleId"
          description: The unique identifier of the deleted rule.
        status:
          $ref: "#/components/schemas/GatewayRuleStatus"
          description: The status of the rule deletion operation.
      required:
        - ruleId
        - status
    DeleteGatewayTargetResponse:
