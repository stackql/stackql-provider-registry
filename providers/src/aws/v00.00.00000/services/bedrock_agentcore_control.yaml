    PolicyDefinition:
      description: Represents the definition structure for policies within the AgentCore Policy system. This structure encapsulates different policy formats and languages that can be used to define access control rules.
      type: object
      properties:
        cedar:
          $ref: "#/components/schemas/CedarPolicy"
          description: The Cedar policy definition within the policy definition structure. This contains the Cedar policy statement that defines the authorization logic using Cedar's human-readable, analyzable policy language. Cedar policies specify principals (who can access), actions (what operations are allowed), resources (what can be accessed), and optional conditions for fine-grained control. Cedar provides a formal policy language designed for authorization with deterministic evaluation, making policies testable, reviewable, and auditable. All Cedar policies follow a default-deny model where actions are denied unless explicitly permitted, and forbid policies always override permit policies.
        policyGeneration:
          $ref: "#/components/schemas/PolicyGenerationDetails"
          description: The generated policy asset information within the policy definition structure. This contains information identifying a generated policy asset from the AI-powered policy generation process within the AgentCore Policy system. Each asset contains a Cedar policy statement generated from natural language input, along with associated metadata and analysis findings to help users evaluate and select the most appropriate policy option.
    CedarPolicy:
      description: Represents a Cedar policy statement within the AgentCore Policy system. Cedar is a policy language designed for authorization that provides human-readable, analyzable, and high-performance policy evaluation for controlling agent behavior and access decisions.
      type: object
      properties:
        statement:
          $ref: "#/components/schemas/Statement"
          description: The Cedar policy statement that defines the authorization logic. This statement follows Cedar syntax and specifies principals, actions, resources, and conditions that determine when access should be allowed or denied.
      required:
        - statement
    Statement:
      type: string
      minLength: 35
      maxLength: 10000
    PolicyGenerationDetails:
      description: Represents the information identifying a generated policy asset from the AI-powered policy generation process within the AgentCore Policy system. Each asset contains a Cedar policy statement generated from natural language input, along with associated metadata and analysis findings to help users evaluate and select the most appropriate policy option.
      type: object
      properties:
        policyGenerationId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier for this policy generation request.
        policyGenerationAssetId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier for this generated policy asset within the policy generation request.
      required:
        - policyGenerationId
        - policyGenerationAssetId
    PolicyValidationMode:
      type: string
      enum:
        - FAIL_ON_ANY_FINDINGS
        - IGNORE_ALL_FINDINGS
    CreatePolicyResponse:
      type: object
      properties:
        policyId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier for the created policy. This is a system-generated identifier consisting of the user name plus a 10-character generated suffix, used for all subsequent policy operations.
        name:
          $ref: "#/components/schemas/PolicyName"
          description: The customer-assigned name of the created policy. This matches the name provided in the request and serves as the human-readable identifier for the policy.
        policyEngineId:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier of the policy engine that manages this policy. This confirms the policy engine assignment and is used for policy evaluation routing.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the policy was created. This is automatically set by the service and used for auditing and lifecycle management.
        updatedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the policy was last updated. For newly created policies, this matches the createdAt timestamp.
        policyArn:
          $ref: "#/components/schemas/PolicyArn"
          description: The Amazon Resource Name (ARN) of the created policy. This globally unique identifier can be used for cross-service references and IAM policy statements.
        status:
          $ref: "#/components/schemas/PolicyStatus"
          description: The current status of the policy. A status of ACTIVE indicates the policy is ready for use.
        definition:
          $ref: "#/components/schemas/PolicyDefinition"
          description: The Cedar policy statement that was created. This is the validated policy definition that will be used for agent behavior control and access decisions.
        description:
          $ref: "#/components/schemas/Description"
          description: The human-readable description of the policy's purpose and functionality. This helps administrators understand and manage the policy.
        statusReasons:
          $ref: "#/components/schemas/PolicyStatusReasons"
          description: Additional information about the policy status. This provides details about any failures or the current state of the policy creation process.
