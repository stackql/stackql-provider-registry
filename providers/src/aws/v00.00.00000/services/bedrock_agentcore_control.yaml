          $ref: "#/components/schemas/CertificateLocation"
          description: The location of the certificate.
      required:
        - location
    CertificateLocation:
      description: The location from which to retrieve a certificate.
      type: object
      properties:
        secretsManager:
          $ref: "#/components/schemas/SecretsManagerLocation"
          description: The Amazon Web Services Secrets Manager location of the certificate.
    SecretsManagerLocation:
      description: The Amazon Web Services Secrets Manager location configuration.
      type: object
      properties:
        secretArn:
          $ref: "#/components/schemas/ToolSecretArn"
          description: The ARN of the Amazon Web Services Secrets Manager secret containing the certificate.
      required:
        - secretArn
    ToolSecretArn:
      type: string
      pattern: arn:aws(-[a-z-]+)?:secretsmanager:[a-z0-9-]+:[0-9]{12}:secret:[a-zA-Z0-9/_+=.@-]+
    CreateBrowserResponse:
