        description:
          $ref: "#/components/schemas/Description"
          description: The human-readable description of the deleted policy engine.
        statusReasons:
          $ref: "#/components/schemas/PolicyStatusReasons"
          description: Additional information about the deletion status. This provides details about the deletion process or any issues that may have occurred.
      required:
        - policyEngineId
        - name
        - createdAt
        - updatedAt
        - policyEngineArn
        - status
        - statusReasons
