        - CUSTOM_JWT
        - AWS_IAM
        - NONE
        - AUTHENTICATE_ONLY
    GatewayInterceptorConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/GatewayInterceptorConfiguration"
    GatewayInterceptorConfiguration:
      description: The configuration for an interceptor on a gateway. This structure defines settings for an interceptor that will be invoked during the invocation of the gateway.
      type: object
      properties:
        interceptor:
