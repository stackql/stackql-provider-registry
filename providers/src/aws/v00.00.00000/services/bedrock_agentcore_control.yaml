        agentRuntimeId:
          $ref: "#/components/schemas/AgentRuntimeId"
          description: The unique identifier of the AgentCore Runtime.
        endpointName:
          $ref: "#/components/schemas/EndpointName"
          description: The name of the AgentCore Runtime endpoint.
      required:
        - status
    DeleteApiKeyCredentialProviderResponse:
      type: object
    DeleteBrowserResponse:
      type: object
      properties:
