  /gateways/{gateway_identifier}/synchronizeTargets:
    put:
      operationId: SynchronizeGatewayTargets
      description: Synchronizes the gateway targets by fetching the latest tool definitions from the target endpoints. You cannot synchronize a target that is in a pending authorization state (CREATE_PENDING_AUTH, UPDATE_PENDING_AUTH, or SYNCHRONIZE_PENDING_AUTH). Wait for the authorization to complete or fail before synchronizing. You cannot synchronize a target that has a static tool schema (mcpToolSchema) configured. Remove the static schema through an UpdateGatewayTarget call to enable dynamic tool synchronization.
      parameters:
        - name: gateway_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayIdentifier"
          description: The gateway Identifier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetIdList:
                  $ref: "#/components/schemas/TargetIdList"
              required:
                - targetIdList
      responses:
