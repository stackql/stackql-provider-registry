        - onlineEvaluationConfigArn
        - onlineEvaluationConfigId
        - status
    DeletePaymentConnectorResponse:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/PaymentConnectorStatus"
          description: The current status of the payment connector, set to DELETING when deletion is initiated. Possible values include CREATING, READY, UPDATING, DELETING, CREATE_FAILED, UPDATE_FAILED, and DELETE_FAILED.
        paymentConnectorId:
          $ref: "#/components/schemas/PaymentConnectorId"
          description: The unique identifier of the deleted payment connector.
      required:
        - status
    DeletePaymentCredentialProviderResponse:
      type: object
    DeletePaymentManagerResponse:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/PaymentManagerStatus"
          description: The current status of the payment manager, set to DELETING when deletion is initiated. Possible values include CREATING, READY, UPDATING, DELETING, CREATE_FAILED, UPDATE_FAILED, and DELETE_FAILED.
        paymentManagerId:
          $ref: "#/components/schemas/PaymentManagerId"
          description: The unique identifier of the deleted payment manager.
      required:
        - status
    DeletePolicyResponse:
      type: object
      properties:
        policyId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier of the policy being deleted. This confirms which policy the deletion operation targets.
        name:
          $ref: "#/components/schemas/PolicyName"
          description: The customer-assigned name of the deleted policy. This confirms which policy was successfully removed from the system and matches the name that was originally assigned during policy creation.
        policyEngineId:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier of the policy engine from which the policy was deleted. This confirms the policy engine context for the deletion operation.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the deleted policy was originally created.
        updatedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the deleted policy was last modified before deletion. This tracks the final state of the policy before it was removed from the system.
        policyArn:
          $ref: "#/components/schemas/PolicyArn"
          description: The Amazon Resource Name (ARN) of the deleted policy. This globally unique identifier confirms which policy resource was successfully removed.
        status:
          $ref: "#/components/schemas/PolicyStatus"
          description: The status of the policy deletion operation. This provides information about any issues that occurred during the deletion process.
        definition:
          $ref: "#/components/schemas/PolicyDefinition"
        description:
          $ref: "#/components/schemas/Description"
          description: The human-readable description of the deleted policy.
        statusReasons:
          $ref: "#/components/schemas/PolicyStatusReasons"
          description: Additional information about the deletion status. This provides details about the deletion process or any issues that may have occurred.
      required:
        - policyId
        - name
        - policyEngineId
        - createdAt
        - updatedAt
        - policyArn
        - status
        - definition
        - statusReasons
    DeletePolicyEngineResponse:
      type: object
      properties:
        policyEngineId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier of the policy engine being deleted. This confirms which policy engine the deletion operation targets.
        name:
          $ref: "#/components/schemas/PolicyEngineName"
          description: The customer-assigned name of the deleted policy engine.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the deleted policy engine was originally created.
        updatedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the deleted policy engine was last modified before deletion. This tracks the final state of the policy engine before it was removed from the system.
        policyEngineArn:
          $ref: "#/components/schemas/PolicyEngineArn"
          description: The Amazon Resource Name (ARN) of the deleted policy engine. This globally unique identifier confirms which policy engine resource was successfully removed.
        status:
          $ref: "#/components/schemas/PolicyEngineStatus"
          description: The status of the policy engine deletion operation. This provides status about any issues that occurred during the deletion process.
        encryptionKeyArn:
