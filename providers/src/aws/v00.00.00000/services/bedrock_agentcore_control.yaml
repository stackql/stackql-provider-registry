        - gatewayArn
        - targetId
        - status
    DeleteHarnessResponse:
      type: object
      properties:
        harness:
          $ref: "#/components/schemas/Harness"
          description: The harness that was deleted.
    DeleteMemoryInputClientTokenString:
      type: string
      minLength: 0
      maxLength: 500
    DeleteMemoryOutput:
      type: object
      properties:
        memoryId:
          $ref: "#/components/schemas/MemoryId"
          description: The unique identifier of the deleted AgentCore Memory resource.
        status:
          $ref: "#/components/schemas/MemoryStatus"
          description: The current status of the AgentCore Memory resource deletion.
      required:
        - memoryId
    DeleteOauth2CredentialProviderResponse:
      type: object
    DeleteOnlineEvaluationConfigResponse:
      type: object
      properties:
        onlineEvaluationConfigArn:
          $ref: "#/components/schemas/OnlineEvaluationConfigArn"
          description: The Amazon Resource Name (ARN) of the deleted online evaluation configuration.
        onlineEvaluationConfigId:
          $ref: "#/components/schemas/OnlineEvaluationConfigId"
          description: The unique identifier of the deleted online evaluation configuration.
        status:
          $ref: "#/components/schemas/OnlineEvaluationConfigStatus"
          description: The status of the online evaluation configuration deletion operation.
