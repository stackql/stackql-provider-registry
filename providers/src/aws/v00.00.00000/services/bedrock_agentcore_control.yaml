        $ref: "#/components/schemas/CategoricalScaleDefinition"
    CategoricalScaleDefinition:
      description: The definition of a categorical rating scale option that provides a named category with its description for evaluation scoring.
      type: object
      properties:
        definition:
          $ref: "#/components/schemas/String"
          description: The description that explains what this categorical rating represents and when it should be used.
        label:
          $ref: "#/components/schemas/CategoricalScaleDefinitionLabelString"
