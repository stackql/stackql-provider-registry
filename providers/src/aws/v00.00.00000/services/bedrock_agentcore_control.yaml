        statusReasons:
          $ref: "#/components/schemas/StatusReasons"
          description: The reasons for the current status of the gateway.
        name:
          $ref: "#/components/schemas/GatewayName"
          description: The name of the gateway.
        description:
          $ref: "#/components/schemas/GatewayDescription"
          description: The description of the gateway.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role associated with the gateway.
        protocolType:
          $ref: "#/components/schemas/GatewayProtocolType"
          description: The protocol type of the gateway.
        protocolConfiguration:
          $ref: "#/components/schemas/GatewayProtocolConfiguration"
          description: The configuration settings for the protocol used by the gateway.
        authorizerType:
          $ref: "#/components/schemas/AuthorizerType"
          description: The type of authorizer used by the gateway.
        authorizerConfiguration:
          $ref: "#/components/schemas/AuthorizerConfiguration"
          description: The authorizer configuration for the created gateway.
        kmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The Amazon Resource Name (ARN) of the KMS key used to encrypt data associated with the gateway.
        interceptorConfigurations:
          $ref: "#/components/schemas/GatewayInterceptorConfigurations"
          description: The list of interceptor configurations for the created gateway.
        policyEngineConfiguration:
          $ref: "#/components/schemas/GatewayPolicyEngineConfiguration"
          description: The policy engine configuration for the created gateway.
        workloadIdentityDetails:
          $ref: "#/components/schemas/WorkloadIdentityDetails"
          description: The workload identity details for the created gateway.
        exceptionLevel:
          $ref: "#/components/schemas/ExceptionLevel"
          description: The level of detail in error messages returned when invoking the gateway. If the value is DEBUG, granular exception messages are returned to help a user debug the gateway. If the value is omitted, a generic error message is returned to the end user.
      required:
        - gatewayArn
        - gatewayId
        - createdAt
        - updatedAt
        - status
        - name
        - authorizerType
    GatewayArn:
      type: string
      pattern: arn:aws(|-cn|-us-gov):bedrock-agentcore:[a-z0-9-]{1,20}:[0-9]{12}:gateway/([0-9a-z][-]?){1,48}-[a-z0-9]{10}
    GatewayId:
      type: string
      pattern: ([0-9a-z][-]?){1,100}-[0-9a-z]{10}
    GatewayUrl:
      type: string
      minLength: 1
      maxLength: 1024
    GatewayStatus:
      type: string
      enum:
        - CREATING
        - UPDATING
        - UPDATE_UNSUCCESSFUL
        - DELETING
        - READY
        - FAILED
    StatusReasons:
      type: array
      items:
        $ref: "#/components/schemas/StatusReason"
    StatusReason:
      type: string
      minLength: 0
      maxLength: 2048
    GatewayIdentifier:
      type: string
      pattern: ([0-9a-z][-]?){1,100}-[0-9a-z]{10}
    GatewayRulePriority:
      type: integer
      minimum: 1
      maximum: 1000000
    Conditions:
      type: array
      items:
        $ref: "#/components/schemas/Condition"
    Condition:
      description: A condition that determines when a gateway rule applies. Conditions can match on principals or request paths.
      type: object
      properties:
        matchPrincipals:
          $ref: "#/components/schemas/MatchPrincipals"
          description: A condition that matches on the identity of the caller making the request.
        matchPaths:
          $ref: "#/components/schemas/MatchPaths"
          description: A condition that matches on the request path.
    MatchPrincipals:
      description: A condition that matches requests based on the caller's identity.
      type: object
      properties:
        anyOf_:
          $ref: "#/components/schemas/MatchPrincipalsAnyOfList"
          description: A list of principal entries. The condition is met if any of the entries match the caller's identity.
      required:
        - anyOf_
    MatchPrincipalsAnyOfList:
      type: array
      items:
        $ref: "#/components/schemas/MatchPrincipalEntry"
    MatchPrincipalEntry:
      description: Union for principal matching. Currently supports IAM principal ARN glob matching.
      type: object
      properties:
        iamPrincipal:
          $ref: "#/components/schemas/IamPrincipal"
          description: An IAM principal to match against, specified by ARN.
    IamPrincipal:
      description: An IAM principal specification for rule matching.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/IamPrincipalArn"
          description: The Amazon Resource Name (ARN) of the IAM principal. Supports user, role, and assumed-role ARNs. Wildcards can be used with the StringLike operator.
        operator:
          $ref: "#/components/schemas/PrincipalMatchOperator"
          description: The match operator. StringEquals requires an exact match. StringLike supports wildcard patterns using * and ?.
      required:
        - arn
    IamPrincipalArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: (arn:aws[a-zA-Z-]*:iam::(\d{12}|\*):(user|role)/[\w+=,.@*?/-]+|arn:aws[a-zA-Z-]*:sts::(\d{12}|\*):assumed-role/[\w+=,.@*?/-]+)
    PrincipalMatchOperator:
      type: string
      enum:
        - StringEquals
        - StringLike
    MatchPaths:
      description: A condition that matches requests based on the request path.
      type: object
      properties:
        anyOf_:
          $ref: "#/components/schemas/MatchPathsAnyOfList"
          description: A list of path patterns. The condition is met if the request path matches any of the patterns.
      required:
        - anyOf_
    MatchPathsAnyOfList:
      type: array
      items:
        $ref: "#/components/schemas/MatchPathPattern"
    MatchPathPattern:
      type: string
      minLength: 0
      maxLength: 512
      pattern: /[\w\-.]+/\*
    Actions:
      type: array
      items:
        $ref: "#/components/schemas/Action"
    Action:
      description: An action to take when a gateway rule's conditions are met.
      type: object
      properties:
        configurationBundle:
          $ref: "#/components/schemas/ConfigurationBundleAction"
          description: An action that applies a configuration bundle override to the request.
        routeToTarget:
          $ref: "#/components/schemas/RouteToTargetAction"
          description: An action that routes the request to a specific target.
    ConfigurationBundleAction:
      description: An action that applies a configuration bundle override, either as a static override or a weighted split for A/B testing.
      type: object
      properties:
        staticOverride:
          $ref: "#/components/schemas/StaticOverride"
          description: A static configuration bundle override that applies a single bundle version to all matching requests.
        weightedOverride:
          $ref: "#/components/schemas/WeightedOverride"
          description: A weighted configuration bundle override that splits traffic between multiple bundle versions based on configured weights.
    StaticOverride:
      description: A static configuration bundle override.
      type: object
      properties:
        bundleArn:
          $ref: "#/components/schemas/GatewayConfigurationBundleArn"
          description: The Amazon Resource Name (ARN) of the configuration bundle to apply.
        bundleVersion:
          $ref: "#/components/schemas/StaticOverrideBundleVersionString"
          description: The version of the configuration bundle to apply.
      required:
        - bundleArn
        - bundleVersion
    GatewayConfigurationBundleArn:
      type: string
      pattern: arn:aws[a-zA-Z-]*:bedrock-agentcore:[a-z0-9-]+:[0-9]{12}:configuration-bundle/[a-zA-Z][a-zA-Z0-9-_]{0,99}-[a-zA-Z0-9]{10}
    StaticOverrideBundleVersionString:
      type: string
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    WeightedOverride:
      description: A weighted configuration bundle override that splits traffic between multiple bundle versions.
      type: object
      properties:
        trafficSplit:
          $ref: "#/components/schemas/TrafficSplitEntries"
          description: The traffic split entries defining how traffic is distributed between configuration bundle versions.
      required:
        - trafficSplit
    TrafficSplitEntries:
      type: array
      items:
        $ref: "#/components/schemas/TrafficSplitEntry"
    TrafficSplitEntry:
      description: An entry in a traffic split configuration, defining a named variant with a weight and configuration bundle reference.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/TrafficSplitEntryNameString"
          description: The name of this traffic split variant.
        weight:
          $ref: "#/components/schemas/TrafficSplitEntryWeightInteger"
          description: The percentage of traffic to route to this variant. Weights across all entries must sum to 100.
        configurationBundle:
          $ref: "#/components/schemas/ConfigurationBundleReference"
          description: The configuration bundle reference for this variant.
        description:
          $ref: "#/components/schemas/TrafficSplitEntryDescriptionString"
          description: The description of this traffic split variant.
        metadata:
          type: object
          properties: {}
          description: Key-value metadata associated with this traffic split variant.
      required:
        - name
        - weight
        - configurationBundle
    TrafficSplitEntryNameString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9]([a-zA-Z0-9-]{0,62}[a-zA-Z0-9])?"
    TrafficSplitEntryWeightInteger:
      type: integer
      minimum: 1
      maximum: 99
    ConfigurationBundleReference:
      description: A reference to a specific version of a configuration bundle.
      type: object
      properties:
        bundleArn:
          $ref: "#/components/schemas/GatewayConfigurationBundleArn"
          description: The Amazon Resource Name (ARN) of the configuration bundle.
        bundleVersion:
          $ref: "#/components/schemas/ConfigurationBundleReferenceBundleVersionString"
          description: The version of the configuration bundle.
      required:
        - bundleArn
        - bundleVersion
    ConfigurationBundleReferenceBundleVersionString:
      type: string
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    TrafficSplitEntryDescriptionString:
      type: string
      minLength: 1
      maxLength: 200
    RouteToTargetAction:
      description: An action that routes requests to a gateway target, either statically or with weighted traffic splitting.
      type: object
      properties:
        staticRoute:
          $ref: "#/components/schemas/StaticRoute"
          description: A static route that sends all matching requests to a single target.
        weightedRoute:
          $ref: "#/components/schemas/WeightedRoute"
          description: A weighted route that splits traffic between multiple targets.
    StaticRoute:
      description: A static route to a single gateway target.
      type: object
      properties:
        targetName:
          $ref: "#/components/schemas/TargetName"
          description: The name of the target to route requests to.
      required:
        - targetName
    TargetName:
      type: string
      pattern: ([0-9a-zA-Z][-]?){1,100}
    WeightedRoute:
      description: A weighted route that splits traffic between multiple gateway targets.
      type: object
      properties:
        trafficSplit:
          $ref: "#/components/schemas/TargetTrafficSplitEntries"
          description: The traffic split entries defining how traffic is distributed between targets.
      required:
        - trafficSplit
    TargetTrafficSplitEntries:
      type: array
      items:
        $ref: "#/components/schemas/TargetTrafficSplitEntry"
    TargetTrafficSplitEntry:
      description: An entry in a target traffic split configuration.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/TargetTrafficSplitEntryNameString"
          description: The name of this traffic split variant.
        weight:
          $ref: "#/components/schemas/TargetTrafficSplitEntryWeightInteger"
          description: The percentage of traffic to route to this variant.
        targetName:
          $ref: "#/components/schemas/TargetName"
          description: The name of the target to route traffic to.
        description:
          $ref: "#/components/schemas/TargetTrafficSplitEntryDescriptionString"
          description: The description of this traffic split variant.
        metadata:
          type: object
          properties: {}
          description: Key-value metadata associated with this traffic split variant.
      required:
        - name
        - weight
        - targetName
    TargetTrafficSplitEntryNameString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9]([a-zA-Z0-9-]{0,62}[a-zA-Z0-9])?"
    TargetTrafficSplitEntryWeightInteger:
      type: integer
      minimum: 1
      maximum: 99
    TargetTrafficSplitEntryDescriptionString:
      type: string
      minLength: 1
      maxLength: 200
    GatewayRuleDescription:
      type: string
      minLength: 1
      maxLength: 256
    CreateGatewayRuleResponse:
      type: object
      properties:
        ruleId:
          $ref: "#/components/schemas/GatewayRuleId"
          description: The unique identifier of the gateway rule.
        gatewayArn:
          $ref: "#/components/schemas/GatewayArn"
          description: The Amazon Resource Name (ARN) of the gateway that the rule belongs to.
        priority:
          $ref: "#/components/schemas/GatewayRulePriority"
          description: The priority of the rule. Rules are evaluated in order of priority, with lower numbers evaluated first.
        conditions:
          $ref: "#/components/schemas/Conditions"
          description: The conditions that must be met for the rule to apply.
        actions:
          $ref: "#/components/schemas/Actions"
          description: The actions to take when the rule conditions are met.
        description:
          $ref: "#/components/schemas/GatewayRuleDescription"
          description: The description of the gateway rule.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the rule was created.
        status:
          $ref: "#/components/schemas/GatewayRuleStatus"
          description: The current status of the rule.
        system:
          $ref: "#/components/schemas/SystemManagedBlock"
          description: System-managed metadata for rules created by automated processes.
      required:
        - ruleId
        - gatewayArn
        - priority
        - actions
        - createdAt
        - status
    GatewayRuleId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    GatewayRuleStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - UPDATING
        - DELETING
    SystemManagedBlock:
      description: System-managed metadata for rules created by automated processes such as A/B tests.
      type: object
      properties:
        managedBy:
          $ref: "#/components/schemas/String"
          description: The identifier of the system or process that manages this rule.
      required:
        - managedBy
    TargetDescription:
      type: string
      minLength: 1
      maxLength: 200
    TargetConfiguration:
      description: The configuration for a gateway target. This structure defines how the gateway connects to and interacts with the target endpoint.
      type: object
      properties:
        mcp:
          $ref: "#/components/schemas/McpTargetConfiguration"
          description: The Model Context Protocol (MCP) configuration for the target. This configuration defines how the gateway uses MCP to communicate with the target.
        http:
          $ref: "#/components/schemas/HttpTargetConfiguration"
          description: The HTTP target configuration. Use this to route gateway requests to an HTTP-based endpoint such as an AgentCore Runtime.
    McpTargetConfiguration:
      description: The Model Context Protocol (MCP) configuration for a target. This structure defines how the gateway uses MCP to communicate with the target.
      type: object
      properties:
        openApiSchema:
          $ref: "#/components/schemas/ApiSchemaConfiguration"
          description: The OpenAPI schema for the Model Context Protocol target. This schema defines the API structure of the target.
        smithyModel:
          $ref: "#/components/schemas/ApiSchemaConfiguration"
          description: The Smithy model for the Model Context Protocol target. This model defines the API structure of the target using the Smithy specification.
        lambda:
          $ref: "#/components/schemas/McpLambdaTargetConfiguration"
          description: The Lambda configuration for the Model Context Protocol target. This configuration defines how the gateway uses a Lambda function to communicate with the target.
        mcpServer:
          $ref: "#/components/schemas/McpServerTargetConfiguration"
          description: The MCP server specified as the gateway target.
        apiGateway:
          $ref: "#/components/schemas/ApiGatewayTargetConfiguration"
          description: The configuration for an Amazon API Gateway target.
    ApiSchemaConfiguration:
      description: Configuration for API schema.
      type: object
      properties:
        s3:
          $ref: "#/components/schemas/S3Configuration"
        inlinePayload:
          $ref: "#/components/schemas/InlinePayload"
          description: The inline payload containing the API schema definition.
    S3Configuration:
      description: The Amazon S3 configuration for a gateway. This structure defines how the gateway accesses files in Amazon S3.
      type: object
      properties:
        uri:
          $ref: "#/components/schemas/S3BucketUri"
          description: The URI of the Amazon S3 object. This URI specifies the location of the object in Amazon S3.
        bucketOwnerAccountId:
          $ref: "#/components/schemas/AwsAccountId"
          description: The account ID of the Amazon S3 bucket owner. This ID is used for cross-account access to the bucket.
    S3BucketUri:
      type: string
      pattern: s3://.{1,2043}
    AwsAccountId:
      type: string
      pattern: "[0-9]{12}"
    InlinePayload:
      type: string
    McpLambdaTargetConfiguration:
      description: The Lambda configuration for a Model Context Protocol target. This structure defines how the gateway uses a Lambda function to communicate with the target.
      type: object
      properties:
        lambdaArn:
          $ref: "#/components/schemas/LambdaFunctionArn"
          description: The Amazon Resource Name (ARN) of the Lambda function. This function is invoked by the gateway to communicate with the target.
        toolSchema:
          $ref: "#/components/schemas/ToolSchema"
          description: The tool schema for the Lambda function. This schema defines the structure of the tools that the Lambda function provides.
      required:
        - lambdaArn
        - toolSchema
    ToolSchema:
      description: A tool schema for a gateway target. This structure defines the schema for a tool that the target exposes through the Model Context Protocol.
      type: object
      properties:
        s3:
          $ref: "#/components/schemas/S3Configuration"
          description: The Amazon S3 location of the tool schema. This location contains the schema definition file.
        inlinePayload:
          $ref: "#/components/schemas/ToolDefinitions"
          description: The inline payload of the tool schema. This payload contains the schema definition directly in the request.
    ToolDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/ToolDefinition"
    ToolDefinition:
      description: A tool definition for a gateway target. This structure defines a tool that the target exposes through the Model Context Protocol.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the tool. This name identifies the tool in the Model Context Protocol.
        description:
          $ref: "#/components/schemas/String"
          description: The description of the tool. This description provides information about the purpose and usage of the tool.
        inputSchema:
          $ref: "#/components/schemas/SchemaDefinition"
          description: The input schema for the tool. This schema defines the structure of the input that the tool accepts.
        outputSchema:
          $ref: "#/components/schemas/SchemaDefinition"
          description: The output schema for the tool. This schema defines the structure of the output that the tool produces.
      required:
        - name
        - description
        - inputSchema
    SchemaDefinition:
      description: A schema definition for a gateway target. This structure defines the structure of the API that the target exposes.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/SchemaType"
          description: The type of the schema definition. This field specifies the data type of the schema.
        properties_:
          type: object
          properties: {}
          description: The properties of the schema definition. These properties define the fields in the schema.
        required_:
          $ref: "#/components/schemas/RequiredProperties"
          description: The required fields in the schema definition. These fields must be provided when using the schema.
        items_:
          $ref: "#/components/schemas/SchemaDefinition"
          description: The items in the schema definition. This field is used for array types to define the structure of the array elements.
        description:
          $ref: "#/components/schemas/String"
          description: The description of the schema definition. This description provides information about the purpose and usage of the schema.
      required:
        - type_
    SchemaType:
      type: string
      enum:
        - string
        - number
        - object
        - array
        - boolean
        - integer
    RequiredProperties:
      type: array
      items:
        $ref: "#/components/schemas/String"
    McpServerTargetConfiguration:
      description: The target configuration for the MCP server.
      type: object
      properties:
        endpoint:
          $ref: "#/components/schemas/McpServerTargetConfigurationEndpointString"
          description: The endpoint for the MCP server target configuration.
        mcpToolSchema:
          $ref: "#/components/schemas/McpToolSchemaConfiguration"
          description: The tool schema configuration for the MCP server target. Supported only when the credential provider is configured with an authorization code grant type. Dynamic tool discovery/synchronization will be disabled when target is configured with mcpToolSchema.
        listingMode:
          $ref: "#/components/schemas/ListingMode"
          description: The listing mode for the MCP server target configuration. MCP resources for default targets are cached at the control plane for faster access. MCP resources for dynamic targets will be dynamically retrieved when listing tools.
        resourcePriority:
          $ref: "#/components/schemas/TargetResourcePriority"
          description: Priority for resolving MCP server targets with shared resource URIs. Lower values take precedence. Defaults to 1000 when not set.
      required:
        - endpoint
    McpServerTargetConfigurationEndpointString:
      type: string
      pattern: https://.*
    McpToolSchemaConfiguration:
      description: The MCP tool schema configuration for an MCP server target. The tool schema must be aligned with the MCP specification.
      type: object
      properties:
        s3:
          $ref: "#/components/schemas/S3Configuration"
          description: The Amazon S3 location of the tool schema. This location contains the schema definition file.
        inlinePayload:
          $ref: "#/components/schemas/InlinePayload"
          description: The inline payload containing the MCP tool schema definition.
    ListingMode:
      type: string
      enum:
        - DEFAULT
        - DYNAMIC
    TargetResourcePriority:
      type: integer
      minimum: 0
      maximum: 1000
    ApiGatewayTargetConfiguration:
      description: The configuration for an Amazon API Gateway target.
      type: object
      properties:
        restApiId:
          $ref: "#/components/schemas/String"
          description: The ID of the API Gateway REST API.
        stage:
          $ref: "#/components/schemas/String"
          description: The ID of the stage of the REST API to add as a target.
        apiGatewayToolConfiguration:
          $ref: "#/components/schemas/ApiGatewayToolConfiguration"
          description: The configuration for defining REST API tool filters and overrides for the gateway target.
      required:
        - restApiId
        - stage
        - apiGatewayToolConfiguration
    ApiGatewayToolConfiguration:
      description: The configuration for defining REST API tool filters and overrides for the gateway target.
      type: object
      properties:
        toolOverrides:
          $ref: "#/components/schemas/ApiGatewayToolOverrides"
          description: A list of explicit tool definitions with optional custom names and descriptions.
        toolFilters:
          $ref: "#/components/schemas/ApiGatewayToolFilters"
          description: A list of path and method patterns to expose as tools using metadata from the REST API's OpenAPI specification.
      required:
        - toolFilters
    ApiGatewayToolOverrides:
      type: array
      items:
        $ref: "#/components/schemas/ApiGatewayToolOverride"
    ApiGatewayToolOverride:
      description: Settings to override configurations for a tool.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of tool. Identifies the tool in the Model Context Protocol.
        description:
          $ref: "#/components/schemas/String"
          description: The description of the tool. Provides information about the purpose and usage of the tool. If not provided, uses the description from the API's OpenAPI specification.
        path:
          $ref: "#/components/schemas/String"
          description: Resource path in the REST API (e.g., /pets). Must explicitly match an existing path in the REST API.
        method:
          $ref: "#/components/schemas/RestApiMethod"
          description: The HTTP method to expose for the specified path.
      required:
        - name
        - path
        - method
    RestApiMethod:
      type: string
      enum:
        - GET
        - DELETE
        - HEAD
        - OPTIONS
        - PATCH
        - PUT
        - POST
    ApiGatewayToolFilters:
      type: array
      items:
        $ref: "#/components/schemas/ApiGatewayToolFilter"
    ApiGatewayToolFilter:
      description: Specifies which operations from an API Gateway REST API are exposed as tools. Tool names and descriptions are derived from the operationId and description fields in the API's exported OpenAPI specification.
      type: object
      properties:
        filterPath:
          $ref: "#/components/schemas/String"
          description: Resource path to match in the REST API. Supports exact paths (for example, /pets) or wildcard paths (for example, /pets/* to match all paths under /pets). Must match existing paths in the REST API.
        methods:
          $ref: "#/components/schemas/RestApiMethods"
          description: The methods to filter for.
      required:
        - filterPath
        - methods
    RestApiMethods:
      type: array
      items:
        $ref: "#/components/schemas/RestApiMethod"
    HttpTargetConfiguration:
      description: The HTTP target configuration for a gateway target. Contains the configuration for HTTP-based target endpoints.
      type: object
      properties:
        agentcoreRuntime:
          $ref: "#/components/schemas/RuntimeTargetConfiguration"
          description: The AgentCore Runtime target configuration for HTTP-based communication with an agent runtime.
    RuntimeTargetConfiguration:
      description: Configuration for an AgentCore Runtime target. Specifies the agent runtime to route requests to via HTTP.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/RuntimeArn"
          description: The Amazon Resource Name (ARN) of the AgentCore Runtime to route requests to.
        qualifier:
          $ref: "#/components/schemas/RuntimeQualifier"
          description: The qualifier for the agent runtime, used to target a specific endpoint version. If not specified, the default endpoint is used.
      required:
        - arn
    RuntimeArn:
      type: string
      pattern: arn:aws(-[^:]+)?:bedrock-agentcore:[a-z0-9-]+:[0-9]{12}:runtime/[a-zA-Z][a-zA-Z0-9_]{0,47}-[a-zA-Z0-9]{10}
    RuntimeQualifier:
      type: string
      pattern: .*([1-9][0-9]{0,4})|([a-zA-Z][a-zA-Z0-9_]{0,47}).*
    CredentialProviderConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/CredentialProviderConfiguration"
    CredentialProviderConfiguration:
      description: The configuration for a credential provider. This structure defines how the gateway authenticates with the target endpoint.
      type: object
      properties:
        credentialProviderType:
          $ref: "#/components/schemas/CredentialProviderType"
          description: The type of credential provider. This field specifies which authentication method the gateway uses.
        credentialProvider:
          $ref: "#/components/schemas/CredentialProvider"
          description: The credential provider. This field contains the specific configuration for the credential provider type.
      required:
        - credentialProviderType
    CredentialProviderType:
      type: string
      enum:
        - GATEWAY_IAM_ROLE
        - OAUTH
        - API_KEY
        - CALLER_IAM_CREDENTIALS
        - JWT_PASSTHROUGH
    CredentialProvider:
      description: A credential provider for gateway authentication. This structure contains the configuration for authenticating with the target endpoint.
      type: object
      properties:
        oauthCredentialProvider:
          $ref: "#/components/schemas/OAuthCredentialProvider"
          description: The OAuth credential provider. This provider uses OAuth authentication to access the target endpoint.
        apiKeyCredentialProvider:
          $ref: "#/components/schemas/ApiKeyCredentialProvider"
          description: The API key credential provider. This provider uses an API key to authenticate with the target endpoint.
        iamCredentialProvider:
          $ref: "#/components/schemas/IamCredentialProvider"
          description: The IAM credential provider. This provider uses IAM authentication with SigV4 signing to access the target endpoint.
    OAuthCredentialProvider:
      description: An OAuth credential provider for gateway authentication. This structure contains the configuration for authenticating with the target endpoint using OAuth.
      type: object
      properties:
        providerArn:
          $ref: "#/components/schemas/OAuthCredentialProviderArn"
          description: The Amazon Resource Name (ARN) of the OAuth credential provider. This ARN identifies the provider in Amazon Web Services.
        scopes:
          $ref: "#/components/schemas/OAuthScopes"
          description: The OAuth scopes for the credential provider. These scopes define the level of access requested from the OAuth provider.
        customParameters:
          type: object
          properties: {}
          description: The custom parameters for the OAuth credential provider. These parameters provide additional configuration for the OAuth authentication process.
        grantType:
          $ref: "#/components/schemas/OAuthGrantType"
          description: "Specifies the kind of credentials to use for authorization: CLIENT_CREDENTIALS - Authorization with a client ID and secret. AUTHORIZATION_CODE - Authorization with a token that is specific to an individual end user. TOKEN_EXCHANGE - Authorization using on-behalf-of token exchange. An inbound user token is exchanged for a downstream access token scoped to the target audience."
        defaultReturnUrl:
          $ref: "#/components/schemas/OAuthDefaultReturnUrl"
          description: The URL where the end user's browser is redirected after obtaining the authorization code. Generally points to the customer's application.
      required:
        - providerArn
        - scopes
    OAuthCredentialProviderArn:
      type: string
      pattern: arn:([^:]*):([^:]*):([^:]*):([0-9]{12})?:(.+)
    OAuthScopes:
      type: array
      items:
        $ref: "#/components/schemas/OAuthScope"
    OAuthScope:
      type: string
      minLength: 1
      maxLength: 64
    OAuthGrantType:
      type: string
      enum:
        - CLIENT_CREDENTIALS
        - AUTHORIZATION_CODE
        - TOKEN_EXCHANGE
    OAuthDefaultReturnUrl:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: \w+:(\/?\/?)[^\s]+
    ApiKeyCredentialProvider:
      description: An API key credential provider for gateway authentication. This structure contains the configuration for authenticating with the target endpoint using an API key.
      type: object
      properties:
        providerArn:
          $ref: "#/components/schemas/ApiKeyCredentialProviderArn"
          description: The Amazon Resource Name (ARN) of the API key credential provider. This ARN identifies the provider in Amazon Web Services.
        credentialParameterName:
          $ref: "#/components/schemas/ApiKeyCredentialParameterName"
          description: The name of the credential parameter for the API key. This parameter name is used when sending the API key to the target endpoint.
        credentialPrefix:
          $ref: "#/components/schemas/ApiKeyCredentialPrefix"
          description: The prefix for the API key credential. This prefix is added to the API key when sending it to the target endpoint.
        credentialLocation:
          $ref: "#/components/schemas/ApiKeyCredentialLocation"
          description: The location of the API key credential. This field specifies where in the request the API key should be placed.
      required:
        - providerArn
    ApiKeyCredentialProviderArn:
      type: string
      pattern: arn:([^:]*):([^:]*):([^:]*):([0-9]{12})?:(.+)
    ApiKeyCredentialParameterName:
      type: string
      minLength: 1
      maxLength: 64
    ApiKeyCredentialPrefix:
      type: string
      minLength: 1
      maxLength: 64
    ApiKeyCredentialLocation:
      type: string
      enum:
        - HEADER
        - QUERY_PARAMETER
    IamCredentialProvider:
      description: An IAM credential provider for gateway authentication. This structure contains the configuration for authenticating with the target endpoint using IAM credentials and SigV4 signing.
      type: object
      properties:
        service:
          $ref: "#/components/schemas/IamCredentialProviderServiceString"
          description: The target Amazon Web Services service name used for SigV4 signing. This value identifies the service that the gateway authenticates with when making requests to the target endpoint.
        region:
          $ref: "#/components/schemas/IamCredentialProviderRegionString"
          description: The Amazon Web Services Region used for SigV4 signing. If not specified, defaults to the gateway's Region.
      required:
        - service
    IamCredentialProviderServiceString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9._-]+"
    IamCredentialProviderRegionString:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[a-zA-Z0-9-]+"
    MetadataConfiguration:
      description: Configuration for HTTP header and query parameter propagation between the gateway and target servers.
      type: object
      properties:
        allowedRequestHeaders:
          $ref: "#/components/schemas/AllowedRequestHeaders"
          description: A list of HTTP headers that are allowed to be propagated from incoming client requests to the target.
        allowedQueryParameters:
          $ref: "#/components/schemas/AllowedQueryParameters"
          description: A list of URL query parameters that are allowed to be propagated from incoming gateway URL to the target.
        allowedResponseHeaders:
          $ref: "#/components/schemas/AllowedResponseHeaders"
          description: A list of HTTP headers that are allowed to be propagated from the target response back to the client.
    AllowedRequestHeaders:
      type: array
      items:
        $ref: "#/components/schemas/HttpHeaderName"
    HttpHeaderName:
      type: string
      minLength: 1
      maxLength: 100
    AllowedQueryParameters:
      type: array
      items:
        $ref: "#/components/schemas/HttpQueryParameterName"
    HttpQueryParameterName:
      type: string
      minLength: 1
      maxLength: 40
    AllowedResponseHeaders:
      type: array
      items:
        $ref: "#/components/schemas/HttpHeaderName"
    CreateGatewayTargetResponse:
      type: object
      properties:
        gatewayArn:
          $ref: "#/components/schemas/GatewayArn"
          description: The Amazon Resource Name (ARN) of the gateway.
        targetId:
          $ref: "#/components/schemas/TargetId"
          description: The unique identifier of the created target.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the target was created.
        updatedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the target was last updated.
        status:
          $ref: "#/components/schemas/TargetStatus"
          description: The current status of the target.
        statusReasons:
          $ref: "#/components/schemas/StatusReasons"
          description: The reasons for the current status of the target.
        name:
          $ref: "#/components/schemas/TargetName"
          description: The name of the target.
        description:
          $ref: "#/components/schemas/TargetDescription"
          description: The description of the target.
        targetConfiguration:
          $ref: "#/components/schemas/TargetConfiguration"
          description: The configuration settings for the target.
        credentialProviderConfigurations:
          $ref: "#/components/schemas/CredentialProviderConfigurations"
          description: The credential provider configurations for the target.
        lastSynchronizedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The last synchronization of the target.
        metadataConfiguration:
          $ref: "#/components/schemas/MetadataConfiguration"
          description: The metadata configuration that was applied to the created gateway target.
        privateEndpoint:
          $ref: "#/components/schemas/PrivateEndpoint"
          description: The private endpoint configuration for the gateway target.
        privateEndpointManagedResources:
          $ref: "#/components/schemas/PrivateEndpointManagedResources"
          description: The managed resources created by the gateway for private endpoint connectivity.
        authorizationData:
          $ref: "#/components/schemas/AuthorizationData"
          description: OAuth2 authorization data for the created gateway target. This data is returned when a target is configured with a credential provider with authorization code grant type and requires user federation.
        protocolType:
          $ref: "#/components/schemas/TargetProtocolType"
          description: The protocol type of the created gateway target.
      required:
        - gatewayArn
        - targetId
        - createdAt
        - updatedAt
        - status
        - name
        - targetConfiguration
        - credentialProviderConfigurations
    TargetId:
      type: string
      pattern: "[0-9a-zA-Z]{10}"
    TargetStatus:
      type: string
      enum:
        - CREATING
        - UPDATING
        - UPDATE_UNSUCCESSFUL
        - DELETING
        - READY
        - FAILED
        - SYNCHRONIZING
        - SYNCHRONIZE_UNSUCCESSFUL
        - CREATE_PENDING_AUTH
        - UPDATE_PENDING_AUTH
        - SYNCHRONIZE_PENDING_AUTH
    PrivateEndpointManagedResources:
      description: A list of managed resources created by the gateway for private endpoint connectivity.
      type: array
      items:
        $ref: "#/components/schemas/ManagedResourceDetails"
    ManagedResourceDetails:
      description: Details of a resource created and managed by the gateway for private endpoint connectivity.
      type: object
      properties:
        domain:
          $ref: "#/components/schemas/DomainName"
          description: The domain associated with this managed resource.
        resourceGatewayArn:
          $ref: "#/components/schemas/ResourceGatewayArn"
          description: The ARN of the VPC Lattice resource gateway created in your account.
        resourceAssociationArn:
          $ref: "#/components/schemas/ResourceAssociationArn"
          description: The ARN of the service network resource association.
    DomainName:
      type: string
    ResourceGatewayArn:
      type: string
      pattern: arn:[a-z0-9\-]+:vpc-lattice:[a-zA-Z0-9\-]+:\d{12}:resourcegateway/rgw-[0-9a-z]{17}
    ResourceAssociationArn:
      type: string
      pattern: arn:[a-z0-9\-]+:vpc-lattice:[a-zA-Z0-9\-]+:\d{12}:servicenetworkresourceassociation/snra-[0-9a-f]{17}
    AuthorizationData:
      description: Contains the authorization data that is returned when a gateway target is configured with a credential provider with authorization code grant type and requires user federation.
      type: object
      properties:
        oauth2:
          $ref: "#/components/schemas/OAuth2AuthorizationData"
          description: OAuth2 authorization data for the gateway target.
    OAuth2AuthorizationData:
      description: OAuth2-specific authorization data, including the authorization URL and user identifier for the authorization session.
      type: object
      properties:
        authorizationUrl:
          $ref: "#/components/schemas/OAuth2AuthorizationDataAuthorizationUrlString"
          description: The URL to initiate the authorization process. This URL is provided when the OAuth2 access token requires user authorization.
        userId:
          $ref: "#/components/schemas/OAuth2AuthorizationDataUserIdString"
          description: The user identifier associated with the OAuth2 authorization session that is defined by AgentCore Gateway.
      required:
        - authorizationUrl
    OAuth2AuthorizationDataAuthorizationUrlString:
      type: string
      minLength: 1
    OAuth2AuthorizationDataUserIdString:
      type: string
      minLength: 1
      maxLength: 128
    TargetProtocolType:
      type: string
      enum:
        - MCP
        - HTTP
    HarnessName:
      type: string
      pattern: "[a-zA-Z][a-zA-Z0-9_]{0,39}"
    HarnessEnvironmentProviderRequest:
      description: The environment provider request configuration.
      type: object
      properties:
        agentCoreRuntimeEnvironment:
          $ref: "#/components/schemas/HarnessAgentCoreRuntimeEnvironmentRequest"
          description: The AgentCore Runtime environment configuration.
    HarnessAgentCoreRuntimeEnvironmentRequest:
      description: The AgentCore Runtime environment request configuration.
      type: object
      properties:
        lifecycleConfiguration:
          $ref: "#/components/schemas/LifecycleConfiguration"
        networkConfiguration:
          $ref: "#/components/schemas/NetworkConfiguration"
        filesystemConfigurations:
          $ref: "#/components/schemas/FilesystemConfigurations"
          description: The filesystem configurations for the runtime environment.
    HarnessEnvironmentArtifact:
      description: The environment artifact for a harness, such as a container image containing custom dependencies.
      type: object
      properties:
        containerConfiguration:
          $ref: "#/components/schemas/ContainerConfiguration"
    HarnessModelConfiguration:
      description: Specification of which model to use.
      type: object
      properties:
        bedrockModelConfig:
          $ref: "#/components/schemas/HarnessBedrockModelConfig"
          description: Configuration for an Amazon Bedrock model.
        openAiModelConfig:
          $ref: "#/components/schemas/HarnessOpenAiModelConfig"
          description: Configuration for an OpenAI model.
        geminiModelConfig:
          $ref: "#/components/schemas/HarnessGeminiModelConfig"
          description: Configuration for a Google Gemini model.
    HarnessBedrockModelConfig:
      description: Configuration for an Amazon Bedrock model provider.
      type: object
      properties:
        modelId:
          $ref: "#/components/schemas/ModelId"
          description: The Bedrock model ID.
        maxTokens:
          $ref: "#/components/schemas/MaxTokens"
          description: The maximum number of tokens to allow in the generated response per model call.
        temperature:
          $ref: "#/components/schemas/Temperature"
          description: The temperature to set when calling the model.
        topP:
          $ref: "#/components/schemas/TopP"
          description: The topP set when calling the model.
      required:
        - modelId
    MaxTokens:
      type: integer
      minimum: 1
    Temperature:
      type: number
      format: float
      minimum: 0
      maximum: 2
    TopP:
      type: number
      format: float
      minimum: 0
      maximum: 1
    HarnessOpenAiModelConfig:
      description: Configuration for an OpenAI model provider. Requires an API key stored in AgentCore Identity.
      type: object
      properties:
        modelId:
          $ref: "#/components/schemas/ModelId"
          description: The OpenAI model ID.
        apiKeyArn:
          $ref: "#/components/schemas/ApiKeyArn"
          description: The ARN of your OpenAI API key on AgentCore Identity.
        maxTokens:
          $ref: "#/components/schemas/MaxTokens"
          description: The maximum number of tokens to allow in the generated response per model call.
        temperature:
          $ref: "#/components/schemas/Temperature"
          description: The temperature to set when calling the model.
        topP:
          $ref: "#/components/schemas/TopP"
          description: The topP set when calling the model.
      required:
        - modelId
        - apiKeyArn
    ApiKeyArn:
      type: string
      pattern: arn:aws:bedrock-agentcore:[a-z0-9-]+:[0-9]{12}:token-vault/[a-zA-Z0-9-.]+/apikeycredentialprovider/[a-zA-Z0-9-.]+
    HarnessGeminiModelConfig:
      description: Configuration for a Google Gemini model provider. Requires an API key stored in AgentCore Identity.
      type: object
      properties:
        modelId:
          $ref: "#/components/schemas/ModelId"
          description: The Gemini model ID.
        apiKeyArn:
          $ref: "#/components/schemas/ApiKeyArn"
          description: The ARN of your Gemini API key on AgentCore Identity.
        maxTokens:
          $ref: "#/components/schemas/MaxTokens"
          description: The maximum number of tokens to allow in the generated response per model call.
        temperature:
          $ref: "#/components/schemas/Temperature"
          description: The temperature to set when calling the model.
        topP:
          $ref: "#/components/schemas/TopP"
          description: The topP set when calling the model.
        topK:
          $ref: "#/components/schemas/TopK"
          description: The topK set when calling the model.
      required:
        - modelId
        - apiKeyArn
    TopK:
      type: integer
      minimum: 0
      maximum: 500
    HarnessSystemPrompt:
      type: array
      items:
        $ref: "#/components/schemas/HarnessSystemContentBlock"
    HarnessSystemContentBlock:
      description: A content block in the system prompt.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/SensitiveText"
          description: The text content of the system prompt block.
    SensitiveText:
      type: string
      minLength: 1
    HarnessTools:
      type: array
      items:
        $ref: "#/components/schemas/HarnessTool"
    HarnessTool:
      description: A tool available to the agent loop.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/HarnessToolType"
          description: The type of tool.
        name:
          $ref: "#/components/schemas/HarnessToolName"
          description: Unique name for the tool. If not provided, a name will be inferred or generated.
        config:
          $ref: "#/components/schemas/HarnessToolConfiguration"
          description: Tool-specific configuration.
      required:
        - type_
    HarnessToolType:
      type: string
      enum:
        - remote_mcp
        - agentcore_browser
        - agentcore_gateway
        - inline_function
        - agentcore_code_interpreter
    HarnessToolName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9_-]+"
    HarnessToolConfiguration:
      description: Configuration union for different tool types.
      type: object
      properties:
        remoteMcp:
          $ref: "#/components/schemas/HarnessRemoteMcpConfig"
          description: Configuration for remote MCP server.
        agentCoreBrowser:
          $ref: "#/components/schemas/HarnessAgentCoreBrowserConfig"
          description: Configuration for AgentCore Browser.
        agentCoreGateway:
          $ref: "#/components/schemas/HarnessAgentCoreGatewayConfig"
          description: Configuration for AgentCore Gateway.
        inlineFunction:
          $ref: "#/components/schemas/HarnessInlineFunctionConfig"
          description: Configuration for an inline function tool.
        agentCoreCodeInterpreter:
          $ref: "#/components/schemas/HarnessAgentCoreCodeInterpreterConfig"
          description: Configuration for AgentCore Code Interpreter.
    HarnessRemoteMcpConfig:
      description: Configuration for connecting to a remote MCP server.
      type: object
      properties:
        url:
          $ref: "#/components/schemas/HarnessRemoteMcpUrl"
          description: URL of the MCP endpoint.
        headers:
          type: object
          properties: {}
          description: Custom headers to include when connecting to the remote MCP server.
      required:
        - url
    HarnessRemoteMcpUrl:
      type: string
      minLength: 1
      maxLength: 16383
    HarnessAgentCoreBrowserConfig:
      description: Configuration for AgentCore Browser.
      type: object
      properties:
        browserArn:
          $ref: "#/components/schemas/BrowserArn"
          description: If not populated, the built-in Browser ARN is used.
    HarnessAgentCoreGatewayConfig:
      description: Configuration for AgentCore Gateway.
      type: object
      properties:
        gatewayArn:
          $ref: "#/components/schemas/GatewayArn"
          description: The ARN of the desired AgentCore Gateway.
        outboundAuth:
          $ref: "#/components/schemas/HarnessGatewayOutboundAuth"
          description: How harness authenticates to this Gateway. Defaults to AWS_IAM (SigV4) if omitted.
      required:
        - gatewayArn
    HarnessGatewayOutboundAuth:
      description: Authentication method for calling a Gateway.
      type: object
      properties:
        awsIam:
          $ref: "#/components/schemas/Unit"
          description: SigV4-sign requests using the agent's execution role.
        none:
          $ref: "#/components/schemas/Unit"
          description: No authentication.
        oauth:
          $ref: "#/components/schemas/OAuthCredentialProvider"
    Unit:
      type: object
    HarnessInlineFunctionConfig:
      description: Configuration for an inline function tool. When the agent calls this tool, the tool call is returned to the caller for external execution.
      type: object
      properties:
        description:
          $ref: "#/components/schemas/HarnessInlineFunctionDescription"
          description: Description of what the tool does, provided to the model.
        inputSchema:
          $ref: "#/components/schemas/SensitiveJson"
          description: JSON Schema describing the tool's input parameters.
      required:
        - description
        - inputSchema
    HarnessInlineFunctionDescription:
      type: string
      minLength: 1
      maxLength: 4096
    SensitiveJson:
      type: object
    HarnessAgentCoreCodeInterpreterConfig:
      description: Configuration for AgentCore Code Interpreter.
      type: object
      properties:
        codeInterpreterArn:
          $ref: "#/components/schemas/CodeInterpreterArn"
          description: If not populated, the built-in Code Interpreter ARN is used.
    HarnessSkills:
      type: array
      items:
        $ref: "#/components/schemas/HarnessSkill"
    HarnessSkill:
      description: A skill available to the agent.
      type: object
      properties:
        path:
          $ref: "#/components/schemas/HarnessSkillPath"
          description: The filesystem path to the skill definition.
    HarnessSkillPath:
      type: string
      minLength: 1
    HarnessAllowedTools:
      type: array
      items:
        $ref: "#/components/schemas/HarnessAllowedTool"
    HarnessAllowedTool:
      type: string
      minLength: 1
      maxLength: 64
      pattern: (\*|@?[^/]+(/[^/]+)?)
    HarnessMemoryConfiguration:
      description: The memory configuration for a harness.
      type: object
      properties:
        agentCoreMemoryConfiguration:
          $ref: "#/components/schemas/HarnessAgentCoreMemoryConfiguration"
          description: The AgentCore Memory configuration.
    HarnessAgentCoreMemoryConfiguration:
      description: Configuration for AgentCore Memory integration.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/MemoryArn"
          description: The ARN of the AgentCore Memory resource.
        actorId:
          $ref: "#/components/schemas/String"
          description: The actor ID for memory operations.
        messagesCount:
          $ref: "#/components/schemas/Integer"
          description: The number of messages to retrieve from memory.
        retrievalConfig:
          type: object
          properties: {}
          description: The retrieval configuration for long-term memory, mapping namespace path templates to retrieval settings.
      required:
        - arn
    MemoryArn:
      type: string
      pattern: arn:aws:bedrock-agentcore:[a-z0-9-]+:[0-9]{12}:memory\/[a-zA-Z][a-zA-Z0-9-_]{0,99}-[a-zA-Z0-9]{10}
    Integer:
      type: integer
    HarnessTruncationConfiguration:
      description: Configuration for truncating conversation context when it exceeds model limits.
      type: object
      properties:
        strategy:
          $ref: "#/components/schemas/HarnessTruncationStrategy"
          description: The truncation strategy to use.
        config:
          $ref: "#/components/schemas/HarnessTruncationStrategyConfiguration"
          description: The strategy-specific configuration.
      required:
        - strategy
    HarnessTruncationStrategy:
      type: string
      enum:
        - sliding_window
        - summarization
        - none
    HarnessTruncationStrategyConfiguration:
      description: Strategy-specific truncation configuration.
      type: object
      properties:
        slidingWindow:
          $ref: "#/components/schemas/HarnessSlidingWindowConfiguration"
          description: Configuration for sliding window truncation.
        summarization:
          $ref: "#/components/schemas/HarnessSummarizationConfiguration"
          description: Configuration for summarization-based truncation.
    HarnessSlidingWindowConfiguration:
      description: Configuration for sliding window truncation strategy.
      type: object
      properties:
        messagesCount:
          $ref: "#/components/schemas/Integer"
          description: The number of recent messages to retain in the context window.
    HarnessSummarizationConfiguration:
      description: Configuration for summarization-based truncation strategy.
      type: object
      properties:
        summaryRatio:
          $ref: "#/components/schemas/Float"
          description: The ratio of content to summarize.
        preserveRecentMessages:
          $ref: "#/components/schemas/Integer"
          description: The number of recent messages to preserve without summarization.
        summarizationSystemPrompt:
          $ref: "#/components/schemas/String"
          description: The system prompt used for generating summaries.
    Float:
      type: number
      format: float
    CreateHarnessResponse:
      type: object
      properties:
        harness:
          $ref: "#/components/schemas/Harness"
          description: The harness that was created.
      required:
        - harness
    Harness:
      description: Representation of a Harness.
      type: object
      properties:
        harnessId:
          $ref: "#/components/schemas/HarnessId"
          description: The ID of the Harness.
        harnessName:
          $ref: "#/components/schemas/HarnessName"
          description: The name of the Harness.
        arn:
          $ref: "#/components/schemas/HarnessArn"
          description: The ARN of the Harness.
        status:
          $ref: "#/components/schemas/HarnessStatus"
          description: The status of the Harness.
        executionRoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: IAM role the Harness assumes when running.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The createdAt time of the Harness.
        updatedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The updatedAt time of the Harness.
        model:
          $ref: "#/components/schemas/HarnessModelConfiguration"
          description: The configuration of the default model used by the Harness.
        systemPrompt:
          $ref: "#/components/schemas/HarnessSystemPrompt"
          description: The system prompt of the Harness.
        tools:
          $ref: "#/components/schemas/HarnessTools"
          description: The tools of the Harness.
        skills:
          $ref: "#/components/schemas/HarnessSkills"
          description: The skills of the Harness.
        allowedTools:
          $ref: "#/components/schemas/HarnessAllowedTools"
          description: The allowed tools of the Harness. All tools are allowed by default.
        truncation:
          $ref: "#/components/schemas/HarnessTruncationConfiguration"
          description: Configuration for truncating model context.
        environment:
          $ref: "#/components/schemas/HarnessEnvironmentProvider"
          description: The compute environment on which the Harness runs.
        environmentArtifact:
          $ref: "#/components/schemas/HarnessEnvironmentArtifact"
          description: The environment artifact (e.g., container) in which the Harness operates.
        environmentVariables:
          type: object
          properties: {}
          description: Environment variables exposed in the environment in which the Harness operates.
        authorizerConfiguration:
          $ref: "#/components/schemas/AuthorizerConfiguration"
        memory:
          $ref: "#/components/schemas/HarnessMemoryConfiguration"
          description: AgentCore Memory instance configuration for short and long term memory.
        maxIterations:
          $ref: "#/components/schemas/Integer"
          description: The maximum number of iterations in the agent loop allowed before exiting per invocation.
        maxTokens:
          $ref: "#/components/schemas/Integer"
          description: The maximum total number of output tokens the agent can generate across all model calls within a single invocation.
        timeoutSeconds:
          $ref: "#/components/schemas/Integer"
          description: The maximum duration per invocation.
        failureReason:
          $ref: "#/components/schemas/String"
          description: Reason why create or update operations fail.
      required:
        - harnessId
        - harnessName
        - arn
        - status
        - executionRoleArn
        - createdAt
        - updatedAt
        - model
        - systemPrompt
        - tools
        - skills
        - allowedTools
        - truncation
        - environment
    HarnessId:
      type: string
      pattern: "[a-zA-Z][a-zA-Z0-9_]{0,39}-[a-zA-Z0-9]{10}"
    HarnessArn:
      type: string
      pattern: arn:([^:]+)?:bedrock-agentcore:[a-z0-9-]+:[0-9]{12}:harness/[a-zA-Z][a-zA-Z0-9_]{0,39}-[a-zA-Z0-9]{10}
    HarnessStatus:
      type: string
      enum:
        - CREATING
        - CREATE_FAILED
        - UPDATING
        - UPDATE_FAILED
        - READY
        - DELETING
        - DELETE_FAILED
    HarnessEnvironmentProvider:
      description: The environment provider for a harness.
      type: object
      properties:
        agentCoreRuntimeEnvironment:
          $ref: "#/components/schemas/HarnessAgentCoreRuntimeEnvironment"
          description: The AgentCore Runtime environment configuration.
    HarnessAgentCoreRuntimeEnvironment:
      description: The AgentCore Runtime environment for a harness.
      type: object
      properties:
        agentRuntimeArn:
          $ref: "#/components/schemas/BedrockAgentcoreResourceArn"
          description: The ARN of the underlying AgentCore Runtime.
        agentRuntimeName:
          $ref: "#/components/schemas/String"
          description: The name of the underlying AgentCore Runtime.
        agentRuntimeId:
          $ref: "#/components/schemas/String"
          description: The ID of the underlying AgentCore Runtime.
        lifecycleConfiguration:
          $ref: "#/components/schemas/LifecycleConfiguration"
        networkConfiguration:
          $ref: "#/components/schemas/NetworkConfiguration"
        filesystemConfigurations:
          $ref: "#/components/schemas/FilesystemConfigurations"
          description: The filesystem configurations for the runtime environment.
      required:
        - agentRuntimeArn
        - agentRuntimeName
        - agentRuntimeId
        - lifecycleConfiguration
        - networkConfiguration
    BedrockAgentcoreResourceArn:
      type: string
      minLength: 20
      maxLength: 1011
    CreateMemoryInputClientTokenString:
      type: string
      minLength: 0
      maxLength: 500
    Name:
      type: string
      pattern: "[a-zA-Z][a-zA-Z0-9_]{0,47}"
    Arn:
      type: string
      pattern: arn:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[^/].{0,1023}
    CreateMemoryInputEventExpiryDurationInteger:
      type: integer
      minimum: 3
      maximum: 365
    MemoryStrategyInputList:
      type: array
      items:
        $ref: "#/components/schemas/MemoryStrategyInput"
    MemoryStrategyInput:
      description: Contains input information for creating a memory strategy.
      type: object
      properties:
        semanticMemoryStrategy:
          $ref: "#/components/schemas/SemanticMemoryStrategyInput"
          description: Input for creating a semantic memory strategy.
        summaryMemoryStrategy:
          $ref: "#/components/schemas/SummaryMemoryStrategyInput"
          description: Input for creating a summary memory strategy.
        userPreferenceMemoryStrategy:
          $ref: "#/components/schemas/UserPreferenceMemoryStrategyInput"
          description: Input for creating a user preference memory strategy.
        customMemoryStrategy:
          $ref: "#/components/schemas/CustomMemoryStrategyInput"
          description: Input for creating a custom memory strategy.
        episodicMemoryStrategy:
          $ref: "#/components/schemas/EpisodicMemoryStrategyInput"
          description: Input for creating an episodic memory strategy
    SemanticMemoryStrategyInput:
      description: Input for creating a semantic memory strategy.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the semantic memory strategy.
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the semantic memory strategy.
        namespaces:
          $ref: "#/components/schemas/NamespacesList"
          description: This is a legacy parameter, use namespaceTemplates. The namespaces associated with the semantic memory strategy.
        namespaceTemplates:
          $ref: "#/components/schemas/NamespacesList"
          description: The namespaceTemplates associated with the semantic memory strategy.
        memoryRecordSchema:
          $ref: "#/components/schemas/MemoryRecordSchema"
      required:
        - name
    NamespacesList:
      type: array
      items:
        $ref: "#/components/schemas/Namespace"
    Namespace:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[a-zA-Z0-9\\-_\\/]*(\\{(actorId|sessionId|memoryStrategyId)\\}[a-zA-Z0-9\\-_\\/]*)*"
    MemoryRecordSchema:
      description: Schema for metadata on memory records generated by a strategy.
      type: object
      properties:
        metadataSchema:
          $ref: "#/components/schemas/MetadataSchemaList"
          description: The metadata field definitions for this strategy.
    MetadataSchemaList:
      type: array
      items:
        $ref: "#/components/schemas/MetadataSchemaEntry"
    MetadataSchemaEntry:
      description: A metadata field definition within a strategy's schema.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/MetadataKey"
          description: The metadata field name. Must match an indexed key to be queryable via metadata filters.
        type_:
          $ref: "#/components/schemas/MetadataValueType"
          description: The MetadataValueType.
        extractionConfig:
          $ref: "#/components/schemas/ExtractionConfig"
          description: Configuration for extracting this metadata value from conversational content.
      required:
        - key
    MetadataKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9\\s._:/=+@-]*"
    MetadataValueType:
      type: string
      enum:
        - STRING
        - STRINGLIST
        - NUMBER
    ExtractionConfig:
      description: Configuration for metadata extraction from conversational content.
      type: object
      properties:
        llmExtractionConfig:
          $ref: "#/components/schemas/LlmExtractionConfig"
          description: Model-based extraction using a definition and instructions.
    LlmExtractionConfig:
      description: Model-based metadata extraction configuration.
      type: object
      properties:
        llmExtractionInstruction:
          $ref: "#/components/schemas/LlmExtractionInstruction"
          description: Instructions for extraction. Supports built-in operators like LATEST_VALUE or custom natural-language instructions.
        definition:
          $ref: "#/components/schemas/Definition"
          description: Description of what this metadata field represents.
        validation:
          $ref: "#/components/schemas/Validation"
          description: Validation rules to constrain extracted values.
      required:
        - definition
    LlmExtractionInstruction:
      type: string
      minLength: 1
      maxLength: 1000
    Definition:
      type: string
      minLength: 1
      maxLength: 1000
    Validation:
      description: Validation rules for extracted metadata values. Only one type can be specified, matching the field's data type.
      type: object
      properties:
        stringValidation:
