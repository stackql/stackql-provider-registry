    ModelId:
      type: string
    InferenceConfiguration:
      description: The configuration parameters that control how the foundation model behaves during evaluation, including response generation settings.
      type: object
      properties:
        maxTokens:
          $ref: "#/components/schemas/InferenceConfigurationMaxTokensInteger"
          description: The maximum number of tokens to generate in the model response during evaluation.
        temperature:
          $ref: "#/components/schemas/InferenceConfigurationTemperatureFloat"
          description: The temperature value that controls randomness in the model's responses. Lower values produce more deterministic outputs.
        topP:
          $ref: "#/components/schemas/InferenceConfigurationTopPFloat"
          description: The top-p sampling parameter that controls the diversity of the model's responses by limiting the cumulative probability of token choices.
        stopSequences:
          $ref: "#/components/schemas/InferenceConfigurationStopSequencesList"
          description: The list of sequences that will cause the model to stop generating tokens when encountered.
    InferenceConfigurationMaxTokensInteger:
      type: integer
      minimum: 1
    InferenceConfigurationTemperatureFloat:
      type: number
      format: float
      minimum: 0
      maximum: 1
    InferenceConfigurationTopPFloat:
      type: number
      format: float
      minimum: 0
      maximum: 1
    InferenceConfigurationStopSequencesList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    NonEmptyString:
