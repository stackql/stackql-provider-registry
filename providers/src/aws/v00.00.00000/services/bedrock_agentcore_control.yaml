      type: array
      items:
        $ref: "#/components/schemas/PolicyGenerationAsset"
    PolicyGenerationAsset:
      description: Represents a generated policy asset from the AI-powered policy generation process within the AgentCore Policy system. Each asset contains a Cedar policy statement generated from natural language input, along with associated metadata and analysis findings to help users evaluate and select the most appropriate policy option.
      type: object
      properties:
        policyGenerationAssetId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier for this generated policy asset within the policy generation request. This ID can be used to reference specific generated policy options when creating actual policies from the generation results.
        definition:
          $ref: "#/components/schemas/PolicyDefinition"
        rawTextFragment:
          $ref: "#/components/schemas/NaturalLanguage"
          description: The portion of the original natural language input that this generated policy asset addresses. This helps users understand which part of their policy description was translated into this specific Cedar policy statement, enabling better policy selection and refinement. When a single natural language input describes multiple authorization requirements, the generation process creates separate policy assets for each requirement, with each asset's rawTextFragment showing which requirement it addresses. Use this mapping to verify that all parts of your natural language input were correctly translated into Cedar policies.
        findings:
          $ref: "#/components/schemas/Findings"
          description: Analysis findings and insights related to this specific generated policy asset. These findings may include validation results, potential issues, or recommendations for improvement to help users evaluate the quality and appropriateness of the generated policy.
      required:
        - policyGenerationAssetId
        - rawTextFragment
        - findings
    NaturalLanguage:
      type: string
      minLength: 1
      maxLength: 2000
    Findings:
      type: array
      items:
        $ref: "#/components/schemas/Finding"
    Finding:
      description: "Represents a finding or issue discovered during policy generation or validation. Findings provide insights about potential problems, recommendations, or validation results from policy analysis operations. Finding types include: VALID (policy is ready to use), INVALID (policy has validation errors that must be fixed), NOT_TRANSLATABLE (input couldn't be converted to policy), ALLOW_ALL (policy would allow all actions, potential security risk), ALLOW_NONE (policy would allow no actions, unusable), DENY_ALL (policy would deny all actions, may be too restrictive), and DENY_NONE (policy would deny no actions, ineffective). Review all findings before creating policies from generated assets to ensure they match your security requirements."
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/FindingType"
          description: The type or category of the finding. This classifies the finding as an error, warning, recommendation, or informational message to help users understand the severity and nature of the issue.
        description:
          $ref: "#/components/schemas/String"
          description: A human-readable description of the finding. This provides detailed information about the issue, recommendation, or validation result to help users understand and address the finding.
    FindingType:
      type: string
      enum:
        - VALID
        - INVALID
        - NOT_TRANSLATABLE
        - ALLOW_ALL
        - ALLOW_NONE
        - DENY_ALL
        - DENY_NONE
