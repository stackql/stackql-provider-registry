      properties:
        secretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The Amazon Resource Name (ARN) of the secret in AWS Secrets Manager.
      required:
        - secretArn
    SecretArn:
      type: string
      pattern: arn:(aws|aws-us-gov):secretsmanager:[A-Za-z0-9-]{1,64}:[0-9]{12}:secret:[a-zA-Z0-9-_/+=.@!]+
    ApiKeyCredentialProviderArnType:
      type: string
      pattern: arn:(aws|aws-us-gov):acps:[A-Za-z0-9-]{1,64}:[0-9]{12}:token-vault/[a-zA-Z0-9-.]+/apikeycredentialprovider/[a-zA-Z0-9-.]+
    SandboxName:
      type: string
      pattern: "[a-zA-Z][a-zA-Z0-9_]{0,47}"
    BrowserNetworkConfiguration:
      description: The network configuration for a browser. This structure defines how the browser connects to the network.
