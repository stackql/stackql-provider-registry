openapi: 3.0.0
info:
  version: "2023-06-05"
  title: Amazon Bedrock AgentCore Control
  description: Amazon Bedrock AgentCore Control
  x-serviceName: bedrock-agentcore
  x-serviceAlias: bedrock_agentcore_control
  x-protocol: rest-json
  x-apiVersion: "2023-06-05"
  x-endpointPrefix: bedrock-agentcore-control
servers:
  - url: https://bedrock-agentcore-control.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for bedrock-agentcore-control
paths:
  /runtimes/:
    put:
      operationId: CreateAgentRuntime
      description: Creates an Amazon Bedrock AgentCore Runtime.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentRuntimeName:
                  $ref: "#/components/schemas/AgentRuntimeName"
                agentRuntimeArtifact:
                  $ref: "#/components/schemas/AgentRuntimeArtifact"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                networkConfiguration:
                  $ref: "#/components/schemas/NetworkConfiguration"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                description:
                  $ref: "#/components/schemas/Description"
                authorizerConfiguration:
                  $ref: "#/components/schemas/AuthorizerConfiguration"
                requestHeaderConfiguration:
                  $ref: "#/components/schemas/RequestHeaderConfiguration"
                protocolConfiguration:
                  $ref: "#/components/schemas/ProtocolConfiguration"
                lifecycleConfiguration:
                  $ref: "#/components/schemas/LifecycleConfiguration"
                environmentVariables:
                  $ref: "#/components/schemas/EnvironmentVariablesMap"
                filesystemConfigurations:
                  $ref: "#/components/schemas/FilesystemConfigurations"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - agentRuntimeName
                - agentRuntimeArtifact
                - roleArn
                - networkConfiguration
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAgentRuntimeResponse"
    post:
      operationId: ListAgentRuntimes
      description: Lists all Amazon Secure Agents in your account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token to retrieve the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentRuntimesResponse"
  /runtimes/{agent_runtime_id}/runtime-endpoints/:
    put:
      operationId: CreateAgentRuntimeEndpoint
      description: Creates an AgentCore Runtime endpoint.
      parameters:
        - name: agent_runtime_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentRuntimeId"
          description: The unique identifier of the AgentCore Runtime to create an endpoint for.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/EndpointName"
                agentRuntimeVersion:
                  $ref: "#/components/schemas/AgentRuntimeVersion"
                description:
                  $ref: "#/components/schemas/AgentEndpointDescription"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - name
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAgentRuntimeEndpointResponse"
    post:
      operationId: ListAgentRuntimeEndpoints
      description: Lists all endpoints for a specific Amazon Secure Agent.
      parameters:
        - name: agent_runtime_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentRuntimeId"
          description: The unique identifier of the AgentCore Runtime to list endpoints for.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token to retrieve the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentRuntimeEndpointsResponse"
  /identities/CreateApiKeyCredentialProvider:
    post:
      operationId: CreateApiKeyCredentialProvider
      description: Creates a new API key credential provider.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/CredentialProviderName"
                apiKey:
                  $ref: "#/components/schemas/ApiKeyType"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - name
                - apiKey
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyCredentialProviderResponse"
  /browsers:
    put:
      operationId: CreateBrowser
      description: Creates a custom browser.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/SandboxName"
                description:
                  $ref: "#/components/schemas/Description"
                executionRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                networkConfiguration:
                  $ref: "#/components/schemas/BrowserNetworkConfiguration"
                recording:
                  $ref: "#/components/schemas/RecordingConfig"
                browserSigning:
                  $ref: "#/components/schemas/BrowserSigningConfigInput"
                enterprisePolicies:
                  $ref: "#/components/schemas/BrowserEnterprisePolicies"
                certificates:
                  $ref: "#/components/schemas/Certificates"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - name
                - networkConfiguration
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBrowserResponse"
    post:
      operationId: ListBrowsers
      description: Lists all custom browsers in your account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in a single call. The default value is 10. The maximum value is 50.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceType"
          description: The type of browsers to list. If not specified, all browser types are returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBrowsersResponse"
  /browser-profiles:
    put:
      operationId: CreateBrowserProfile
      description: Creates a browser profile in Amazon Bedrock AgentCore. A browser profile stores persistent browser data such as cookies, local storage, session storage, and browsing history that can be saved from browser sessions and reused in subsequent sessions.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/BrowserProfileName"
                description:
                  $ref: "#/components/schemas/Description"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBrowserProfileResponse"
    post:
      operationId: ListBrowserProfiles
      description: Lists all browser profiles in your account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token to retrieve the next page of results.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/BrowserProfileName"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBrowserProfilesResponse"
  /code-interpreters:
    put:
      operationId: CreateCodeInterpreter
      description: Creates a custom code interpreter.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/SandboxName"
                description:
                  $ref: "#/components/schemas/Description"
                executionRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                networkConfiguration:
                  $ref: "#/components/schemas/CodeInterpreterNetworkConfiguration"
                certificates:
                  $ref: "#/components/schemas/Certificates"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - name
                - networkConfiguration
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCodeInterpreterResponse"
    post:
      operationId: ListCodeInterpreters
      description: Lists all custom code interpreters in your account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token to retrieve the next page of results.
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceType"
          description: The type of code interpreters to list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCodeInterpretersResponse"
  /configuration-bundles/create:
    post:
      operationId: CreateConfigurationBundle
      description: Creates a new configuration bundle resource. A configuration bundle stores versioned component configurations for agent evaluation workflows.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                bundleName:
                  $ref: "#/components/schemas/ConfigurationBundleName"
                description:
                  $ref: "#/components/schemas/ConfigurationBundleDescription"
                components:
                  $ref: "#/components/schemas/ComponentConfigurationMap"
                branchName:
                  $ref: "#/components/schemas/BranchName"
                commitMessage:
                  $ref: "#/components/schemas/CreateConfigurationBundleRequestCommitMessageString"
                createdBy:
                  $ref: "#/components/schemas/VersionCreatedBySource"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - bundleName
                - components
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConfigurationBundleResponse"
  /evaluators/create:
    post:
      operationId: CreateEvaluator
      description: Creates a custom evaluator for agent quality assessment. Custom evaluators can use either LLM-as-a-Judge configurations with user-defined prompts, rating scales, and model settings, or code-based configurations with customer-managed Lambda functions to evaluate agent performance at tool call, trace, or session levels.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                evaluatorName:
                  $ref: "#/components/schemas/CustomEvaluatorName"
                description:
                  $ref: "#/components/schemas/EvaluatorDescription"
                evaluatorConfig:
                  $ref: "#/components/schemas/EvaluatorConfig"
                level:
                  $ref: "#/components/schemas/EvaluatorLevel"
                kmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - evaluatorName
                - evaluatorConfig
                - level
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEvaluatorResponse"
  /gateways/:
    post:
      operationId: CreateGateway
      description: Creates a gateway for Amazon Bedrock Agent. A gateway serves as an integration point between your agent and external services. If you specify CUSTOM_JWT as the authorizerType, you must provide an authorizerConfiguration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/GatewayName"
                description:
                  $ref: "#/components/schemas/GatewayDescription"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                protocolType:
                  $ref: "#/components/schemas/GatewayProtocolType"
                protocolConfiguration:
                  $ref: "#/components/schemas/GatewayProtocolConfiguration"
                authorizerType:
                  $ref: "#/components/schemas/AuthorizerType"
                authorizerConfiguration:
                  $ref: "#/components/schemas/AuthorizerConfiguration"
                kmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                interceptorConfigurations:
                  $ref: "#/components/schemas/GatewayInterceptorConfigurations"
                policyEngineConfiguration:
                  $ref: "#/components/schemas/GatewayPolicyEngineConfiguration"
                exceptionLevel:
                  $ref: "#/components/schemas/ExceptionLevel"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - name
                - roleArn
                - authorizerType
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGatewayResponse"
    get:
      operationId: ListGateways
      description: Lists all gateways in the account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GatewayMaxResults"
          description: The maximum number of results to return in the response. If the total number of results is greater than this value, use the token returned in the response in the nextToken field when making another request to return the next batch of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GatewayNextToken"
          description: If the total number of results is greater than the maxResults value provided in the request, enter the token returned in the nextToken field in the response in this field to return the next batch of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGatewaysResponse"
  /gateways/{gateway_identifier}/rules:
    post:
      operationId: CreateGatewayRule
      description: Creates a rule for a gateway. Rules define conditions and actions that control how requests are routed and processed through the gateway, including principal-based access control and path-based routing.
      parameters:
        - name: gateway_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayIdentifier"
          description: The identifier of the gateway to create a rule for.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                priority:
                  $ref: "#/components/schemas/GatewayRulePriority"
                conditions:
                  $ref: "#/components/schemas/Conditions"
                actions:
                  $ref: "#/components/schemas/Actions"
                description:
                  $ref: "#/components/schemas/GatewayRuleDescription"
              required:
                - priority
                - actions
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGatewayRuleResponse"
    get:
      operationId: ListGatewayRules
      description: Lists all rules for a gateway.
      parameters:
        - name: gateway_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayIdentifier"
          description: The identifier of the gateway to list rules for.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GatewayRuleMaxResults"
          description: The maximum number of results to return in the response. If the total number of results is greater than this value, use the token returned in the response in the nextToken field when making another request to return the next batch of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GatewayRuleNextToken"
          description: The pagination token from a previous request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGatewayRulesResponse"
  /gateways/{gateway_identifier}/targets/:
    post:
      operationId: CreateGatewayTarget
      description: Creates a target for a gateway. A target defines an endpoint that the gateway can connect to.
      parameters:
        - name: gateway_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayIdentifier"
          description: The identifier of the gateway to create a target for.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/TargetName"
                description:
                  $ref: "#/components/schemas/TargetDescription"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                targetConfiguration:
                  $ref: "#/components/schemas/TargetConfiguration"
                credentialProviderConfigurations:
                  $ref: "#/components/schemas/CredentialProviderConfigurations"
                metadataConfiguration:
                  $ref: "#/components/schemas/MetadataConfiguration"
                privateEndpoint:
                  $ref: "#/components/schemas/PrivateEndpoint"
              required:
                - name
                - targetConfiguration
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGatewayTargetResponse"
    get:
      operationId: ListGatewayTargets
      description: Lists all targets for a specific gateway.
      parameters:
        - name: gateway_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayIdentifier"
          description: The identifier of the gateway to list targets for.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TargetMaxResults"
          description: The maximum number of results to return in the response. If the total number of results is greater than this value, use the token returned in the response in the nextToken field when making another request to return the next batch of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TargetNextToken"
          description: If the total number of results is greater than the maxResults value provided in the request, enter the token returned in the nextToken field in the response in this field to return the next batch of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGatewayTargetsResponse"
  /harnesses:
    post:
      operationId: CreateHarness
      description: Operation to create a Harness.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                harnessName:
                  $ref: "#/components/schemas/HarnessName"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                executionRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                environment:
                  $ref: "#/components/schemas/HarnessEnvironmentProviderRequest"
                environmentArtifact:
                  $ref: "#/components/schemas/HarnessEnvironmentArtifact"
                environmentVariables:
                  $ref: "#/components/schemas/EnvironmentVariablesMap"
                authorizerConfiguration:
                  $ref: "#/components/schemas/AuthorizerConfiguration"
                model:
                  $ref: "#/components/schemas/HarnessModelConfiguration"
                systemPrompt:
                  $ref: "#/components/schemas/HarnessSystemPrompt"
                tools:
                  $ref: "#/components/schemas/HarnessTools"
                skills:
                  $ref: "#/components/schemas/HarnessSkills"
                allowedTools:
                  $ref: "#/components/schemas/HarnessAllowedTools"
                memory:
                  $ref: "#/components/schemas/HarnessMemoryConfiguration"
                truncation:
                  $ref: "#/components/schemas/HarnessTruncationConfiguration"
                maxIterations:
                  $ref: "#/components/schemas/Integer"
                maxTokens:
                  $ref: "#/components/schemas/Integer"
                timeoutSeconds:
                  $ref: "#/components/schemas/Integer"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - harnessName
                - executionRoleArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateHarnessResponse"
    get:
      operationId: ListHarnesses
      description: Operation to list Harnesses.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in a single call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListHarnessesResponse"
  /memories/create:
    post:
      operationId: CreateMemory
      description: Creates a new Amazon Bedrock AgentCore Memory resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/CreateMemoryInputClientTokenString"
                name:
                  $ref: "#/components/schemas/Name"
                description:
                  $ref: "#/components/schemas/Description"
                encryptionKeyArn:
                  $ref: "#/components/schemas/Arn"
                memoryExecutionRoleArn:
                  $ref: "#/components/schemas/Arn"
                eventExpiryDuration:
                  $ref: "#/components/schemas/CreateMemoryInputEventExpiryDurationInteger"
                memoryStrategies:
                  $ref: "#/components/schemas/MemoryStrategyInputList"
                indexedKeys:
                  $ref: "#/components/schemas/IndexedKeysList"
                streamDeliveryResources:
                  $ref: "#/components/schemas/StreamDeliveryResources"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - name
                - eventExpiryDuration
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMemoryOutput"
  /identities/CreateOauth2CredentialProvider:
    post:
      operationId: CreateOauth2CredentialProvider
      description: Creates a new OAuth2 credential provider.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/CredentialProviderName"
                credentialProviderVendor:
                  $ref: "#/components/schemas/CredentialProviderVendorType"
                oauth2ProviderConfigInput:
                  $ref: "#/components/schemas/Oauth2ProviderConfigInput"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - name
                - credentialProviderVendor
                - oauth2ProviderConfigInput
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOauth2CredentialProviderResponse"
  /online-evaluation-configs/create:
    post:
      operationId: CreateOnlineEvaluationConfig
      description: Creates an online evaluation configuration for continuous monitoring of agent performance. Online evaluation automatically samples live traffic from CloudWatch logs at specified rates and applies evaluators to assess agent quality in production.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                onlineEvaluationConfigName:
                  $ref: "#/components/schemas/EvaluationConfigName"
                description:
                  $ref: "#/components/schemas/EvaluationConfigDescription"
                rule:
                  $ref: "#/components/schemas/Rule"
                dataSourceConfig:
                  $ref: "#/components/schemas/DataSourceConfig"
                evaluators:
                  $ref: "#/components/schemas/EvaluatorList"
                evaluationExecutionRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                enableOnCreate:
                  $ref: "#/components/schemas/Boolean"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - onlineEvaluationConfigName
                - rule
                - dataSourceConfig
                - evaluators
                - evaluationExecutionRoleArn
                - enableOnCreate
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOnlineEvaluationConfigResponse"
  /payments/managers/{payment_manager_id}/connectors:
    post:
      operationId: CreatePaymentConnector
      description: Creates a new payment connector for a payment manager. A payment connector integrates with a supported payment provider to enable payment processing capabilities.
      parameters:
        - name: payment_manager_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PaymentManagerId"
          description: The unique identifier of the payment manager to create the connector for.
      requestBody:
        required: true
        content:
