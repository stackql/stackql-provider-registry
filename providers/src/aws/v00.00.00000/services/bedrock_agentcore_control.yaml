        - CREATING
        - CREATE_FAILED
        - READY
        - DELETING
        - DELETE_FAILED
        - DELETED
    BrowserProfileName:
      type: string
      pattern: "[a-zA-Z][a-zA-Z0-9_]{0,47}"
    CreateBrowserProfileResponse:
      type: object
      properties:
        profileId:
          $ref: "#/components/schemas/BrowserProfileId"
          description: The unique identifier of the created browser profile.
        profileArn:
          $ref: "#/components/schemas/BrowserProfileArn"
          description: The Amazon Resource Name (ARN) of the created browser profile.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the browser profile was created.
        status:
          $ref: "#/components/schemas/BrowserProfileStatus"
          description: The current status of the browser profile.
      required:
        - profileId
        - profileArn
        - createdAt
        - status
    BrowserProfileId:
      type: string
      pattern: "[a-zA-Z][a-zA-Z0-9_]{0,47}-[a-zA-Z0-9]{10}"
    BrowserProfileArn:
      type: string
      pattern: arn:(-[^:]+)?:bedrock-agentcore:[a-z0-9-]+:[0-9]{12}:browser-profile/[a-zA-Z][a-zA-Z0-9_]{0,47}-[a-zA-Z0-9]{10}
    BrowserProfileStatus:
      description: The status of a browser profile.
      type: string
      enum:
        - READY
        - DELETING
        - DELETED
        - SAVING
    CodeInterpreterNetworkConfiguration:
      description: The network configuration for a code interpreter. This structure defines how the code interpreter connects to the network.
      type: object
      properties:
        networkMode:
          $ref: "#/components/schemas/CodeInterpreterNetworkMode"
          description: The network mode for the code interpreter. This field specifies how the code interpreter connects to the network.
        vpcConfig:
          $ref: "#/components/schemas/VpcConfig"
          description: The VPC configuration for the code interpreter. This configuration is required when the network mode is set to VPC.
      required:
        - networkMode
    CodeInterpreterNetworkMode:
      type: string
      enum:
        - PUBLIC
