          description: The timestamp when the policy engine was last modified. This tracks the most recent changes to the policy engine configuration or metadata.
        policyEngineArn:
          $ref: "#/components/schemas/PolicyEngineArn"
          description: The Amazon Resource Name (ARN) of the policy engine. This globally unique identifier can be used for cross-service references and IAM policy statements.
