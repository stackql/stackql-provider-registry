      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether recording is enabled for the browser. When set to true, browser sessions are recorded.
        s3Location:
          $ref: "#/components/schemas/S3Location"
          description: The Amazon S3 location where browser recordings are stored. This location contains the recorded browser sessions.
    BrowserSigningConfigInput:
