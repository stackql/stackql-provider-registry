  /policy-engines/{policy_engine_id}/policies:
    post:
      operationId: CreatePolicy
      description: Creates a policy within the AgentCore Policy system. Policies provide real-time, deterministic control over agentic interactions with AgentCore Gateway. Using the Cedar policy language, you can define fine-grained policies that specify which interactions with Gateway tools are permitted based on input parameters and OAuth claims, ensuring agents operate within defined boundaries and business rules. The policy is validated during creation against the Cedar schema generated from the Gateway's tools' input schemas, which defines the available tools, their parameters, and expected data types. This is an asynchronous operation. Use the GetPolicy operation to poll the status field to track completion.
      parameters:
        - name: policy_engine_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The identifier of the policy engine which contains this policy. Policy engines group related policies and provide the execution context for policy evaluation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/PolicyName"
                definition:
                  $ref: "#/components/schemas/PolicyDefinition"
                description:
                  $ref: "#/components/schemas/Description"
                validationMode:
                  $ref: "#/components/schemas/PolicyValidationMode"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - name
                - definition
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePolicyResponse"
    get:
      operationId: ListPolicies
      description: Retrieves a list of policies within the AgentCore Policy engine. This operation supports pagination and filtering to help administrators manage and discover policies across policy engines. Results can be filtered by policy engine or resource associations.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token returned from a previous ListPolicies call. Use this token to retrieve the next page of results when the response is paginated.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of policies to return in a single response. If not specified, the default is 10 policies per page, with a maximum of 100 per page.
        - name: policy_engine_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The identifier of the policy engine whose policies to retrieve.
        - name: targetResourceScope
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BedrockAgentcoreResourceArn"
          description: Optional filter to list policies that apply to a specific resource scope or resource type. This helps narrow down policy results to those relevant for particular Amazon Web Services resources, agent tools, or operational contexts within the policy engine ecosystem.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPoliciesResponse"
  /policy-engines:
    post:
      operationId: CreatePolicyEngine
      description: Creates a new policy engine within the AgentCore Policy system. A policy engine is a collection of policies that evaluates and authorizes agent tool calls. When associated with Gateways (each Gateway can be associated with at most one policy engine, but multiple Gateways can be associated with the same engine), the policy engine intercepts all agent requests and determines whether to allow or deny each action based on the defined policies. This is an asynchronous operation. Use the GetPolicyEngine operation to poll the status field to track completion.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/PolicyEngineName"
                description:
                  $ref: "#/components/schemas/Description"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                encryptionKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - name
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePolicyEngineResponse"
    get:
      operationId: ListPolicyEngines
      description: Retrieves a list of policy engines within the AgentCore Policy system. This operation supports pagination to help administrators discover and manage policy engines across their account. Each policy engine serves as a container for related policies.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token returned from a previous ListPolicyEngines call. Use this token to retrieve the next page of results when the response is paginated.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of policy engines to return in a single response. If not specified, the default is 10 policy engines per page, with a maximum of 100 per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPolicyEnginesResponse"
