    get:
      operationId: ListRegistryRecords
      description: Lists registry records within a registry. You can optionally filter results using the name, status, and descriptorType parameters. When multiple filters are specified, they are combined using AND logic.
      parameters:
        - name: registry_id
          in: path
          required: true
          schema:
