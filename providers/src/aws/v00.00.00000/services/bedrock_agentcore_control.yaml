          $ref: "#/components/schemas/BrowserNetworkMode"
          description: The network mode for the browser. This field specifies how the browser connects to the network.
        vpcConfig:
          $ref: "#/components/schemas/VpcConfig"
          description: The VPC configuration for the browser. This configuration is required when the network mode is set to VPC.
