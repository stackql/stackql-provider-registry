          $ref: "#/components/schemas/PolicyGenerationAssets"
          description: An array of generated policy assets including Cedar policies and related artifacts from the AI-powered policy generation process. Each asset represents a different policy option or variation generated from the original natural language input.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: A pagination token that can be used in subsequent ListPolicyGenerationAssets calls to retrieve additional assets. This token is only present when there are more generated policy assets available beyond the current response.
