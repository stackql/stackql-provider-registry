openapi: 3.0.0
info:
  version: "2017-09-23"
  title: AWS Cloud9
  description: AWS Cloud9
  x-serviceName: cloud9
  x-serviceAlias: cloud9
  x-protocol: json
  x-apiVersion: "2017-09-23"
  x-endpointPrefix: cloud9
  x-targetPrefix: AWSCloud9WorkspaceManagementService
  x-jsonVersion: "1.1"
servers:
  - url: https://cloud9.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for cloud9
paths:
  /CreateEnvironmentEC2:
    post:
      operationId: CreateEnvironmentEC2
      description: Creates an Cloud9 development environment, launches an Amazon Elastic Compute Cloud (Amazon EC2) instance, and then connects from the instance to the environment. Cloud9 is no longer available to new customers. Existing customers of Cloud9 can continue to use the service as normal. Learn more"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCloud9WorkspaceManagementService.CreateEnvironmentEC2
            default: AWSCloud9WorkspaceManagementService.CreateEnvironmentEC2
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/EnvironmentName"
                  description: The name of the environment to create. This name is visible to other IAM users in the same Amazon Web Services account.
                description:
                  $ref: "#/components/schemas/EnvironmentDescription"
                  description: The description of the environment to create.
                clientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: A unique, case-sensitive string that helps Cloud9 to ensure this operation completes no more than one time. For more information, see Client Tokens in the Amazon EC2 API Reference.
                instanceType:
                  $ref: "#/components/schemas/InstanceType"
                  description: The type of instance to connect to the environment (for example, t2.micro).
                subnetId:
                  $ref: "#/components/schemas/SubnetId"
                  description: The ID of the subnet in Amazon VPC that Cloud9 will use to communicate with the Amazon EC2 instance.
                imageId:
                  $ref: "#/components/schemas/ImageId"
                  description: "The identifier for the Amazon Machine Image (AMI) that's used to create the EC2 instance. To choose an AMI for the instance, you must specify a valid AMI alias or a valid Amazon EC2 Systems Manager (SSM) path. We recommend using Amazon Linux 2023 as the AMI to create your environment as it is fully supported. From December 16, 2024, Ubuntu 18.04 will be removed from the list of available imageIds for Cloud9. This change is necessary as Ubuntu 18.04 has ended standard support on May 31, 2023. This change will only affect direct API consumers, and not Cloud9 console users. Since Ubuntu 18.04 has ended standard support as of May 31, 2023, we recommend you choose Ubuntu 22.04. AMI aliases Amazon Linux 2: amazonlinux-2-x86_64 Amazon Linux 2023 (recommended): amazonlinux-2023-x86_64 Ubuntu 18.04: ubuntu-18.04-x86_64 Ubuntu 22.04: ubuntu-22.04-x86_64 SSM paths Amazon Linux 2: resolve:ssm:/aws/service/cloud9/amis/amazonlinux-2-x86_64 Amazon Linux 2023 (recommended): resolve:ssm:/aws/service/cloud9/amis/amazonlinux-2023-x86_64 Ubuntu 18.04: resolve:ssm:/aws/service/cloud9/amis/ubuntu-18.04-x86_64 Ubuntu 22.04: resolve:ssm:/aws/service/cloud9/amis/ubuntu-22.04-x86_64"
                automaticStopTimeMinutes:
                  $ref: "#/components/schemas/AutomaticStopTimeMinutes"
                  description: The number of minutes until the running instance is shut down after the environment has last been used.
                ownerArn:
                  $ref: "#/components/schemas/UserArn"
                  description: The Amazon Resource Name (ARN) of the environment owner. This ARN can be the ARN of any IAM principal. If this value is not specified, the ARN defaults to this environment's creator.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key-value pairs that will be associated with the new Cloud9 development environment.
                connectionType:
                  $ref: "#/components/schemas/ConnectionType"
                  description: The connection type used for connecting to an Amazon EC2 environment. Valid values are CONNECT_SSH (default) and CONNECT_SSM (connected through Amazon EC2 Systems Manager). For more information, see Accessing no-ingress EC2 instances with Amazon EC2 Systems Manager in the Cloud9 User Guide.
                dryRun:
                  $ref: "#/components/schemas/NullableBoolean"
                  description: Checks whether you have the required permissions for the action, without actually making the request, and provides an error response. If you have the required permissions, the error response is DryRunOperation. Otherwise, it is UnauthorizedOperation.
              required:
                - name
                - instanceType
                - imageId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEnvironmentEC2Result"
  /CreateEnvironmentMembership:
    post:
      operationId: CreateEnvironmentMembership
      description: Adds an environment member to an Cloud9 development environment. Cloud9 is no longer available to new customers. Existing customers of Cloud9 can continue to use the service as normal. Learn more"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCloud9WorkspaceManagementService.CreateEnvironmentMembership
            default: AWSCloud9WorkspaceManagementService.CreateEnvironmentMembership
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: The ID of the environment that contains the environment member you want to add.
                userArn:
                  $ref: "#/components/schemas/UserArn"
                  description: The Amazon Resource Name (ARN) of the environment member you want to add.
                permissions:
                  $ref: "#/components/schemas/MemberPermissions"
                  description: "The type of environment member permissions you want to associate with this environment member. Available values include: read-only: Has read-only access to the environment. read-write: Has read-write access to the environment."
              required:
                - environmentId
                - userArn
                - permissions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEnvironmentMembershipResult"
  /DeleteEnvironment:
    post:
      operationId: DeleteEnvironment
      description: Deletes an Cloud9 development environment. If an Amazon EC2 instance is connected to the environment, also terminates the instance. Cloud9 is no longer available to new customers. Existing customers of Cloud9 can continue to use the service as normal. Learn more"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCloud9WorkspaceManagementService.DeleteEnvironment
            default: AWSCloud9WorkspaceManagementService.DeleteEnvironment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: The ID of the environment to delete.
              required:
                - environmentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEnvironmentResult"
  /DeleteEnvironmentMembership:
    post:
      operationId: DeleteEnvironmentMembership
      description: Deletes an environment member from a development environment. Cloud9 is no longer available to new customers. Existing customers of Cloud9 can continue to use the service as normal. Learn more"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCloud9WorkspaceManagementService.DeleteEnvironmentMembership
            default: AWSCloud9WorkspaceManagementService.DeleteEnvironmentMembership
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: The ID of the environment to delete the environment member from.
                userArn:
                  $ref: "#/components/schemas/UserArn"
                  description: The Amazon Resource Name (ARN) of the environment member to delete from the environment.
              required:
                - environmentId
                - userArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEnvironmentMembershipResult"
  /DescribeEnvironmentMemberships:
    post:
      operationId: DescribeEnvironmentMemberships
      description: Gets information about environment members for an Cloud9 development environment. Cloud9 is no longer available to new customers. Existing customers of Cloud9 can continue to use the service as normal. Learn more"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCloud9WorkspaceManagementService.DescribeEnvironmentMemberships
            default: AWSCloud9WorkspaceManagementService.DescribeEnvironmentMemberships
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                userArn:
                  $ref: "#/components/schemas/UserArn"
                  description: The Amazon Resource Name (ARN) of an individual environment member to get information about. If no value is specified, information about all environment members are returned.
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: The ID of the environment to get environment member information about.
                permissions:
                  $ref: "#/components/schemas/PermissionsList"
                  description: "The type of environment member permissions to get information about. Available values include: owner: Owns the environment. read-only: Has read-only access to the environment. read-write: Has read-write access to the environment. If no value is specified, information about all environment members are returned."
                nextToken:
                  $ref: "#/components/schemas/String"
                  description: During a previous call, if there are more than 25 items in the list, only the first 25 items are returned, along with a unique string called a next token. To get the next batch of items in the list, call this operation again, adding the next token to the call. To get all of the items in the list, keep calling this operation with each subsequent next token that is returned, until no more next tokens are returned.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of environment members to get information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEnvironmentMembershipsResult"
  /DescribeEnvironmentStatus:
    post:
      operationId: DescribeEnvironmentStatus
      description: Gets status information for an Cloud9 development environment. Cloud9 is no longer available to new customers. Existing customers of Cloud9 can continue to use the service as normal. Learn more"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCloud9WorkspaceManagementService.DescribeEnvironmentStatus
            default: AWSCloud9WorkspaceManagementService.DescribeEnvironmentStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: The ID of the environment to get status information about.
              required:
                - environmentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEnvironmentStatusResult"
  /DescribeEnvironments:
    post:
      operationId: DescribeEnvironments
      description: Gets information about Cloud9 development environments. Cloud9 is no longer available to new customers. Existing customers of Cloud9 can continue to use the service as normal. Learn more"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCloud9WorkspaceManagementService.DescribeEnvironments
            default: AWSCloud9WorkspaceManagementService.DescribeEnvironments
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                environmentIds:
                  $ref: "#/components/schemas/BoundedEnvironmentIdList"
                  description: The IDs of individual environments to get information about.
              required:
                - environmentIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEnvironmentsResult"
  /ListEnvironments:
    post:
      operationId: ListEnvironments
      description: Gets a list of Cloud9 development environment identifiers. Cloud9 is no longer available to new customers. Existing customers of Cloud9 can continue to use the service as normal. Learn more" Cloud9 is no longer available to new customers. Existing customers of Cloud9 can continue to use the service as normal. Learn more"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCloud9WorkspaceManagementService.ListEnvironments
            default: AWSCloud9WorkspaceManagementService.ListEnvironments
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/String"
                  description: During a previous call, if there are more than 25 items in the list, only the first 25 items are returned, along with a unique string called a next token. To get the next batch of items in the list, call this operation again, adding the next token to the call. To get all of the items in the list, keep calling this operation with each subsequent next token that is returned, until no more next tokens are returned.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of environments to get identifiers for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEnvironmentsOutputDisplay"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Gets a list of the tags associated with an Cloud9 development environment. Cloud9 is no longer available to new customers. Existing customers of Cloud9 can continue to use the service as normal. Learn more"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCloud9WorkspaceManagementService.ListTagsForResource
            default: AWSCloud9WorkspaceManagementService.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/EnvironmentArn"
                  description: The Amazon Resource Name (ARN) of the Cloud9 development environment to get the tags for.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds tags to an Cloud9 development environment. Cloud9 is no longer available to new customers. Existing customers of Cloud9 can continue to use the service as normal. Learn more" Tags that you add to an Cloud9 environment by using this method will NOT be automatically propagated to underlying resources.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCloud9WorkspaceManagementService.TagResource
            default: AWSCloud9WorkspaceManagementService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/EnvironmentArn"
                  description: The Amazon Resource Name (ARN) of the Cloud9 development environment to add tags to.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The list of tags to add to the given Cloud9 development environment.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes tags from an Cloud9 development environment. Cloud9 is no longer available to new customers. Existing customers of Cloud9 can continue to use the service as normal. Learn more"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCloud9WorkspaceManagementService.UntagResource
            default: AWSCloud9WorkspaceManagementService.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/EnvironmentArn"
                  description: The Amazon Resource Name (ARN) of the Cloud9 development environment to remove tags from.
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: The tag names of the tags to remove from the given Cloud9 development environment.
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateEnvironment:
    post:
      operationId: UpdateEnvironment
      description: Changes the settings of an existing Cloud9 development environment. Cloud9 is no longer available to new customers. Existing customers of Cloud9 can continue to use the service as normal. Learn more"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCloud9WorkspaceManagementService.UpdateEnvironment
            default: AWSCloud9WorkspaceManagementService.UpdateEnvironment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: The ID of the environment to change settings.
                name:
                  $ref: "#/components/schemas/EnvironmentName"
                  description: A replacement name for the environment.
                description:
                  $ref: "#/components/schemas/EnvironmentDescription"
                  description: Any new or replacement description for the environment.
                managedCredentialsAction:
                  $ref: "#/components/schemas/ManagedCredentialsAction"
                  description: "Allows the environment owner to turn on or turn off the Amazon Web Services managed temporary credentials for an Cloud9 environment by using one of the following values: ENABLE DISABLE Only the environment owner can change the status of managed temporary credentials. An AccessDeniedException is thrown if an attempt to turn on or turn off managed temporary credentials is made by an account that's not the environment owner."
              required:
                - environmentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEnvironmentResult"
  /UpdateEnvironmentMembership:
    post:
      operationId: UpdateEnvironmentMembership
      description: Changes the settings of an existing environment member for an Cloud9 development environment. Cloud9 is no longer available to new customers. Existing customers of Cloud9 can continue to use the service as normal. Learn more"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCloud9WorkspaceManagementService.UpdateEnvironmentMembership
            default: AWSCloud9WorkspaceManagementService.UpdateEnvironmentMembership
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: The ID of the environment for the environment member whose settings you want to change.
                userArn:
                  $ref: "#/components/schemas/UserArn"
                  description: The Amazon Resource Name (ARN) of the environment member whose settings you want to change.
                permissions:
                  $ref: "#/components/schemas/MemberPermissions"
                  description: "The replacement type of environment member permissions you want to associate with this environment member. Available values include: read-only: Has read-only access to the environment. read-write: Has read-write access to the environment."
              required:
                - environmentId
                - userArn
                - permissions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEnvironmentMembershipResult"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    EnvironmentName:
      type: string
      minLength: 1
      maxLength: 60
    EnvironmentDescription:
      type: string
      maxLength: 200
    ClientRequestToken:
      type: string
      pattern: "[\\x20-\\x7E]{10,128}"
    InstanceType:
      type: string
      minLength: 5
      maxLength: 20
      pattern: ^[a-z]+[1-9][.][a-z0-9]+$
    SubnetId:
      type: string
      minLength: 15
      maxLength: 24
      pattern: ^(subnet-[0-9a-f]{8}|subnet-[0-9a-f]{17})$
    ImageId:
      type: string
      maxLength: 512
    AutomaticStopTimeMinutes:
      type: integer
      minimum: 0
      maximum: 20160
    UserArn:
      type: string
      pattern: ^arn:(aws|aws-cn|aws-us-gov|aws-iso|aws-iso-b):(iam|sts)::\d+:(root|(user\/[\w+=/:,.@-]{1,64}|federated-user\/[\w+=/:,.@-]{2,32}|assumed-role\/[\w+=:,.@-]{1,64}\/[\w+=,.@-]{1,64}))$
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: 'Metadata that is associated with Amazon Web Services resources. In particular, a name-value pair that can be associated with an Cloud9 development environment. There are two types of tags: user tags and system tags. A user tag is created by the user. A system tag is automatically created by Amazon Web Services services. A system tag is prefixed with "aws:" and cannot be modified by the user.'
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The name part of a tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value part of a tag.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    ConnectionType:
      type: string
      enum:
        - CONNECT_SSH
        - CONNECT_SSM
    NullableBoolean:
      type: boolean
    CreateEnvironmentEC2Result:
      type: object
      properties:
        environmentId:
          $ref: "#/components/schemas/EnvironmentId"
          description: The ID of the environment that was created.
    EnvironmentId:
      type: string
      pattern: ^[a-zA-Z0-9]{8,32}$
    MemberPermissions:
      type: string
      enum:
        - read-write
        - read-only
    CreateEnvironmentMembershipResult:
      type: object
      properties:
        membership:
          $ref: "#/components/schemas/EnvironmentMember"
          description: Information about the environment member that was added.
      required:
        - membership
    EnvironmentMember:
      description: Information about an environment member for an Cloud9 development environment.
      type: object
      properties:
        permissions:
          $ref: "#/components/schemas/Permissions"
          description: "The type of environment member permissions associated with this environment member. Available values include: owner: Owns the environment. read-only: Has read-only access to the environment. read-write: Has read-write access to the environment."
        userId:
          $ref: "#/components/schemas/String"
          description: The user ID in Identity and Access Management (IAM) of the environment member.
        userArn:
          $ref: "#/components/schemas/UserArn"
          description: The Amazon Resource Name (ARN) of the environment member.
        environmentId:
          $ref: "#/components/schemas/EnvironmentId"
          description: The ID of the environment for the environment member.
        lastAccess:
          $ref: "#/components/schemas/Timestamp"
          description: The time, expressed in epoch time format, when the environment member last opened the environment.
      required:
        - permissions
        - userId
        - userArn
        - environmentId
    Permissions:
      type: string
      enum:
        - owner
        - read-write
        - read-only
    String:
      type: string
    Timestamp:
      type: string
      format: date-time
    DeleteEnvironmentResult:
      type: object
    DeleteEnvironmentMembershipResult:
      type: object
    PermissionsList:
      type: array
      items:
        $ref: "#/components/schemas/Permissions"
    MaxResults:
      type: integer
      minimum: 0
      maximum: 25
    DescribeEnvironmentMembershipsResult:
      type: object
      properties:
        memberships:
          $ref: "#/components/schemas/EnvironmentMembersList"
          description: Information about the environment members for the environment.
        nextToken:
          $ref: "#/components/schemas/String"
          description: If there are more than 25 items in the list, only the first 25 items are returned, along with a unique string called a next token. To get the next batch of items in the list, call this operation again, adding the next token to the call.
    EnvironmentMembersList:
      type: array
      items:
        $ref: "#/components/schemas/EnvironmentMember"
    DescribeEnvironmentStatusResult:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/EnvironmentStatus"
          description: "The status of the environment. Available values include: connecting: The environment is connecting. creating: The environment is being created. deleting: The environment is being deleted. error: The environment is in an error state. ready: The environment is ready. stopped: The environment is stopped. stopping: The environment is stopping."
        message:
          $ref: "#/components/schemas/String"
          description: Any informational message about the status of the environment.
      required:
        - status
        - message
    EnvironmentStatus:
      type: string
      enum:
        - error
        - creating
        - connecting
        - ready
        - stopping
        - stopped
        - deleting
    BoundedEnvironmentIdList:
      type: array
      items:
        $ref: "#/components/schemas/EnvironmentId"
    DescribeEnvironmentsResult:
      type: object
      properties:
        environments:
          $ref: "#/components/schemas/EnvironmentList"
