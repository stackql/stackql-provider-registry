        status:
          $ref: "#/components/schemas/EnvironmentLifecycleStatus"
          description: "The current creation or deletion lifecycle state of the environment. CREATING: The environment is in the process of being created. CREATED: The environment was successfully created. CREATE_FAILED: The environment failed to be created. DELETING: The environment is in the process of being deleted. DELETE_FAILED: The environment failed to delete."
        reason:
