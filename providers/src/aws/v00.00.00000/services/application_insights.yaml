components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ResourceGroupName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9\\.\\-_]*"
    ComponentName:
      type: string
      minLength: 1
      maxLength: 1011
      pattern: (?:^[\d\w\-_\.+]*$)|(?:^arn:aws(-\w+)*:[\w\d-]+:([\w\d-]*)?:[\w\d_-]*([:/].+)*$)
    WorkloadConfiguration:
      description: The configuration of the workload.
      type: object
      properties:
        WorkloadName:
          $ref: "#/components/schemas/WorkloadName"
          description: The name of the workload.
        Tier:
          $ref: "#/components/schemas/Tier"
          description: The configuration of the workload tier.
        Configuration:
          $ref: "#/components/schemas/ComponentConfiguration"
          description: The configuration settings of the workload.
    WorkloadName:
      type: string
      minLength: 1
      maxLength: 12
      pattern: "[a-zA-Z0-9\\.\\-_]*"
    Tier:
      type: string
      enum:
        - CUSTOM
        - DEFAULT
        - DOT_NET_CORE
        - DOT_NET_WORKER
        - DOT_NET_WEB_TIER
        - DOT_NET_WEB
        - SQL_SERVER
        - SQL_SERVER_ALWAYSON_AVAILABILITY_GROUP
        - MYSQL
        - POSTGRESQL
        - JAVA_JMX
        - ORACLE
        - SAP_HANA_MULTI_NODE
        - SAP_HANA_SINGLE_NODE
        - SAP_HANA_HIGH_AVAILABILITY
        - SAP_ASE_SINGLE_NODE
        - SAP_ASE_HIGH_AVAILABILITY
        - SQL_SERVER_FAILOVER_CLUSTER_INSTANCE
        - SHAREPOINT
        - ACTIVE_DIRECTORY
        - SAP_NETWEAVER_STANDARD
        - SAP_NETWEAVER_DISTRIBUTED
        - SAP_NETWEAVER_HIGH_AVAILABILITY
      minLength: 1
      maxLength: 50
    ComponentConfiguration:
      type: string
      minLength: 1
      maxLength: 10000
      pattern: "[\\S\\s]+"
    AddWorkloadResponse:
      type: object
      properties:
        WorkloadId:
          $ref: "#/components/schemas/WorkloadId"
          description: The ID of the workload.
        WorkloadConfiguration:
          $ref: "#/components/schemas/WorkloadConfiguration"
          description: The configuration settings of the workload. The value is the escaped JSON of the configuration.
    WorkloadId:
      type: string
      minLength: 38
      maxLength: 38
      pattern: w-[0-9a-fA-F]{8}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{4}\-[0-9a-fA-F]{12}
    OpsCenterEnabled:
      type: boolean
    CWEMonitorEnabled:
      type: boolean
    OpsItemSNSTopicArn:
      type: string
      minLength: 20
      maxLength: 300
      pattern: ^arn:aws(-\w+)*:[\w\d-]+:([\w\d-]*)?:[\w\d_-]*([:/].+)*$
    SNSNotificationArn:
      type: string
      minLength: 20
      maxLength: 300
      pattern: ^arn:aws(-\w+)*:[\w\d-]+:([\w\d-]*)?:[\w\d_-]*([:/].+)*$
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "An object that defines the tags associated with an application. A tag is a label that you optionally define and associate with an application. Tags can help you categorize and manage resources in different ways, such as by purpose, owner, environment, or other criteria. Each tag consists of a required tag key and an associated tag value, both of which you define. A tag key is a general label that acts as a category for a more specific tag value. A tag value acts as a descriptor within a tag key. A tag key can contain as many as 128 characters. A tag value can contain as many as 256 characters. The characters can be Unicode letters, digits, white space, or one of the following symbols: _ . : / = + -. The following additional restrictions apply to tags: Tag keys and values are case sensitive. For each associated resource, each tag key must be unique and it can have only one value. The aws: prefix is reserved for use by Amazon Web Services; you can’t use it in any tag keys or values that you define. In addition, you can't edit or remove tag keys or values that use this prefix."
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: One part of a key-value pair that defines a tag. The maximum length of a tag key is 128 characters. The minimum length is 1 character.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The optional part of a key-value pair that defines a tag. The maximum length of a tag value is 256 characters. The minimum length is 0 characters. If you don't want an application to have a specific tag value, don't specify a value for this parameter.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    AutoConfigEnabled:
      type: boolean
    AutoCreate:
      type: boolean
    GroupingType:
      type: string
      enum:
        - ACCOUNT_BASED
    AttachMissingPermission:
      type: boolean
    CreateApplicationResponse:
      type: object
      properties:
        ApplicationInfo:
          $ref: "#/components/schemas/ApplicationInfo"
          description: Information about the application.
    ApplicationInfo:
      description: Describes the status of the application.
      type: object
      properties:
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID for the owner of the application.
        ResourceGroupName:
          $ref: "#/components/schemas/ResourceGroupName"
          description: The name of the resource group used for the application.
        LifeCycle:
          $ref: "#/components/schemas/LifeCycle"
          description: The lifecycle of the application.
        OpsItemSNSTopicArn:
          $ref: "#/components/schemas/OpsItemSNSTopicArn"
          description: The SNS topic provided to Application Insights that is associated to the created opsItems to receive SNS notifications for opsItem updates.
        SNSNotificationArn:
          $ref: "#/components/schemas/SNSNotificationArn"
          description: The SNS topic ARN that is associated with SNS notifications for updates or issues.
        OpsCenterEnabled:
          $ref: "#/components/schemas/OpsCenterEnabled"
          description: Indicates whether Application Insights will create opsItems for any problem detected by Application Insights for an application.
        CWEMonitorEnabled:
          $ref: "#/components/schemas/CWEMonitorEnabled"
          description: Indicates whether Application Insights can listen to CloudWatch events for the application resources, such as instance terminated, failed deployment, and others.
        Remarks:
          $ref: "#/components/schemas/Remarks"
