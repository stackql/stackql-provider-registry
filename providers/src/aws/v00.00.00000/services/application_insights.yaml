openapi: 3.0.0
info:
  version: "2018-11-25"
  title: Amazon CloudWatch Application Insights
  description: Amazon CloudWatch Application Insights
  x-serviceName: applicationinsights
  x-serviceAlias: application_insights
  x-protocol: json
  x-apiVersion: "2018-11-25"
  x-endpointPrefix: applicationinsights
  x-targetPrefix: EC2WindowsBarleyService
  x-jsonVersion: "1.1"
servers:
  - url: https://applicationinsights.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for application-insights
paths:
  /AddWorkload:
    post:
      operationId: AddWorkload
      description: Adds a workload to a component. Each component can have at most five workloads.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.AddWorkload
            default: EC2WindowsBarleyService.AddWorkload
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceGroupName:
                  $ref: "#/components/schemas/ResourceGroupName"
                  description: The name of the resource group.
                ComponentName:
                  $ref: "#/components/schemas/ComponentName"
                  description: The name of the component.
                WorkloadConfiguration:
                  $ref: "#/components/schemas/WorkloadConfiguration"
                  description: The configuration settings of the workload. The value is the escaped JSON of the configuration.
              required:
                - ResourceGroupName
                - ComponentName
                - WorkloadConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddWorkloadResponse"
  /CreateApplication:
    post:
      operationId: CreateApplication
      description: Adds an application that is created from a resource group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.CreateApplication
            default: EC2WindowsBarleyService.CreateApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceGroupName:
                  $ref: "#/components/schemas/ResourceGroupName"
                  description: The name of the resource group.
                OpsCenterEnabled:
                  $ref: "#/components/schemas/OpsCenterEnabled"
                  description: When set to true, creates opsItems for any problems detected on an application.
                CWEMonitorEnabled:
                  $ref: "#/components/schemas/CWEMonitorEnabled"
                  description: Indicates whether Application Insights can listen to CloudWatch events for the application resources, such as instance terminated, failed deployment, and others.
                OpsItemSNSTopicArn:
                  $ref: "#/components/schemas/OpsItemSNSTopicArn"
                  description: The SNS topic provided to Application Insights that is associated to the created opsItem. Allows you to receive notifications for updates to the opsItem.
                SNSNotificationArn:
                  $ref: "#/components/schemas/SNSNotificationArn"
                  description: The SNS notification topic ARN.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: List of tags to add to the application. tag key (Key) and an associated tag value (Value). The maximum length of a tag key is 128 characters. The maximum length of a tag value is 256 characters.
                AutoConfigEnabled:
                  $ref: "#/components/schemas/AutoConfigEnabled"
                  description: Indicates whether Application Insights automatically configures unmonitored resources in the resource group.
                AutoCreate:
                  $ref: "#/components/schemas/AutoCreate"
                  description: Configures all of the resources in the resource group by applying the recommended configurations.
                GroupingType:
                  $ref: "#/components/schemas/GroupingType"
                  description: Application Insights can create applications based on a resource group or on an account. To create an account-based application using all of the resources in the account, set this parameter to ACCOUNT_BASED.
                AttachMissingPermission:
                  $ref: "#/components/schemas/AttachMissingPermission"
                  description: If set to true, the managed policies for SSM and CW will be attached to the instance roles if they are missing.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApplicationResponse"
  /CreateComponent:
    post:
      operationId: CreateComponent
      description: Creates a custom component by grouping similar standalone instances to monitor.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.CreateComponent
            default: EC2WindowsBarleyService.CreateComponent
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceGroupName:
                  $ref: "#/components/schemas/ResourceGroupName"
                  description: The name of the resource group.
                ComponentName:
                  $ref: "#/components/schemas/CustomComponentName"
                  description: The name of the component.
                ResourceList:
                  $ref: "#/components/schemas/ResourceList"
                  description: The list of resource ARNs that belong to the component.
              required:
                - ResourceGroupName
                - ComponentName
                - ResourceList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateComponentResponse"
  /CreateLogPattern:
    post:
      operationId: CreateLogPattern
      description: Adds an log pattern to a LogPatternSet.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.CreateLogPattern
            default: EC2WindowsBarleyService.CreateLogPattern
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceGroupName:
                  $ref: "#/components/schemas/ResourceGroupName"
                  description: The name of the resource group.
                PatternSetName:
                  $ref: "#/components/schemas/LogPatternSetName"
                  description: The name of the log pattern set.
                PatternName:
                  $ref: "#/components/schemas/LogPatternName"
                  description: The name of the log pattern.
                Pattern:
                  $ref: "#/components/schemas/LogPatternRegex"
                  description: The log pattern. The pattern must be DFA compatible. Patterns that utilize forward lookahead or backreference constructions are not supported.
                Rank:
                  $ref: "#/components/schemas/LogPatternRank"
                  description: Rank of the log pattern. Must be a value between 1 and 1,000,000. The patterns are sorted by rank, so we recommend that you set your highest priority patterns with the lowest rank. A pattern of rank 1 will be the first to get matched to a log line. A pattern of rank 1,000,000 will be last to get matched. When you configure custom log patterns from the console, a Low severity pattern translates to a 750,000 rank. A Medium severity pattern translates to a 500,000 rank. And a High severity pattern translates to a 250,000 rank. Rank values less than 1 or greater than 1,000,000 are reserved for Amazon Web Services provided patterns.
              required:
                - ResourceGroupName
                - PatternSetName
                - PatternName
                - Pattern
                - Rank
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLogPatternResponse"
  /DeleteApplication:
    post:
      operationId: DeleteApplication
      description: Removes the specified application from monitoring. Does not delete the application.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.DeleteApplication
            default: EC2WindowsBarleyService.DeleteApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceGroupName:
                  $ref: "#/components/schemas/ResourceGroupName"
                  description: The name of the resource group.
              required:
                - ResourceGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApplicationResponse"
  /DeleteComponent:
    post:
      operationId: DeleteComponent
      description: Ungroups a custom component. When you ungroup custom components, all applicable monitors that are set up for the component are removed and the instances revert to their standalone status.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.DeleteComponent
            default: EC2WindowsBarleyService.DeleteComponent
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceGroupName:
                  $ref: "#/components/schemas/ResourceGroupName"
                  description: The name of the resource group.
                ComponentName:
                  $ref: "#/components/schemas/CustomComponentName"
                  description: The name of the component.
              required:
                - ResourceGroupName
                - ComponentName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteComponentResponse"
  /DeleteLogPattern:
    post:
      operationId: DeleteLogPattern
      description: Removes the specified log pattern from a LogPatternSet.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.DeleteLogPattern
            default: EC2WindowsBarleyService.DeleteLogPattern
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceGroupName:
                  $ref: "#/components/schemas/ResourceGroupName"
                  description: The name of the resource group.
                PatternSetName:
                  $ref: "#/components/schemas/LogPatternSetName"
                  description: The name of the log pattern set.
                PatternName:
                  $ref: "#/components/schemas/LogPatternName"
                  description: The name of the log pattern.
              required:
                - ResourceGroupName
                - PatternSetName
                - PatternName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLogPatternResponse"
  /DescribeApplication:
    post:
      operationId: DescribeApplication
      description: Describes the application.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.DescribeApplication
            default: EC2WindowsBarleyService.DescribeApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceGroupName:
                  $ref: "#/components/schemas/ResourceGroupName"
                  description: The name of the resource group.
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The Amazon Web Services account ID for the resource group owner.
              required:
                - ResourceGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeApplicationResponse"
  /DescribeComponent:
    post:
      operationId: DescribeComponent
      description: Describes a component and lists the resources that are grouped together in a component.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.DescribeComponent
            default: EC2WindowsBarleyService.DescribeComponent
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceGroupName:
                  $ref: "#/components/schemas/ResourceGroupName"
                  description: The name of the resource group.
                ComponentName:
                  $ref: "#/components/schemas/ComponentName"
                  description: The name of the component.
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The Amazon Web Services account ID for the resource group owner.
              required:
                - ResourceGroupName
                - ComponentName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeComponentResponse"
  /DescribeComponentConfiguration:
    post:
      operationId: DescribeComponentConfiguration
      description: Describes the monitoring configuration of the component.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.DescribeComponentConfiguration
            default: EC2WindowsBarleyService.DescribeComponentConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceGroupName:
                  $ref: "#/components/schemas/ResourceGroupName"
                  description: The name of the resource group.
                ComponentName:
                  $ref: "#/components/schemas/ComponentName"
                  description: The name of the component.
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The Amazon Web Services account ID for the resource group owner.
              required:
                - ResourceGroupName
                - ComponentName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeComponentConfigurationResponse"
  /DescribeComponentConfigurationRecommendation:
    post:
      operationId: DescribeComponentConfigurationRecommendation
      description: Describes the recommended monitoring configuration of the component.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.DescribeComponentConfigurationRecommendation
            default: EC2WindowsBarleyService.DescribeComponentConfigurationRecommendation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceGroupName:
                  $ref: "#/components/schemas/ResourceGroupName"
                  description: The name of the resource group.
                ComponentName:
                  $ref: "#/components/schemas/ComponentName"
                  description: The name of the component.
                Tier:
                  $ref: "#/components/schemas/Tier"
                  description: The tier of the application component.
                WorkloadName:
                  $ref: "#/components/schemas/WorkloadName"
                  description: The name of the workload. The name of the workload is required when the tier of the application component is SAP_ASE_SINGLE_NODE or SAP_ASE_HIGH_AVAILABILITY.
                RecommendationType:
                  $ref: "#/components/schemas/RecommendationType"
                  description: The recommended configuration type.
              required:
                - ResourceGroupName
                - ComponentName
                - Tier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeComponentConfigurationRecommendationResponse"
  /DescribeLogPattern:
    post:
      operationId: DescribeLogPattern
      description: Describe a specific log pattern from a LogPatternSet.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.DescribeLogPattern
            default: EC2WindowsBarleyService.DescribeLogPattern
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceGroupName:
                  $ref: "#/components/schemas/ResourceGroupName"
                  description: The name of the resource group.
                PatternSetName:
                  $ref: "#/components/schemas/LogPatternSetName"
                  description: The name of the log pattern set.
                PatternName:
                  $ref: "#/components/schemas/LogPatternName"
                  description: The name of the log pattern.
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The Amazon Web Services account ID for the resource group owner.
              required:
                - ResourceGroupName
                - PatternSetName
                - PatternName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeLogPatternResponse"
  /DescribeObservation:
    post:
      operationId: DescribeObservation
      description: Describes an anomaly or error with the application.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.DescribeObservation
            default: EC2WindowsBarleyService.DescribeObservation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ObservationId:
                  $ref: "#/components/schemas/ObservationId"
                  description: The ID of the observation.
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The Amazon Web Services account ID for the resource group owner.
              required:
                - ObservationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeObservationResponse"
  /DescribeProblem:
    post:
      operationId: DescribeProblem
      description: Describes an application problem.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.DescribeProblem
            default: EC2WindowsBarleyService.DescribeProblem
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProblemId:
                  $ref: "#/components/schemas/ProblemId"
                  description: The ID of the problem.
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The Amazon Web Services account ID for the owner of the resource group affected by the problem.
              required:
                - ProblemId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeProblemResponse"
  /DescribeProblemObservations:
    post:
      operationId: DescribeProblemObservations
      description: Describes the anomalies or errors associated with the problem.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.DescribeProblemObservations
            default: EC2WindowsBarleyService.DescribeProblemObservations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProblemId:
                  $ref: "#/components/schemas/ProblemId"
                  description: The ID of the problem.
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The Amazon Web Services account ID for the resource group owner.
              required:
                - ProblemId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeProblemObservationsResponse"
  /DescribeWorkload:
    post:
      operationId: DescribeWorkload
      description: Describes a workload and its configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.DescribeWorkload
            default: EC2WindowsBarleyService.DescribeWorkload
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceGroupName:
                  $ref: "#/components/schemas/ResourceGroupName"
                  description: The name of the resource group.
                ComponentName:
                  $ref: "#/components/schemas/ComponentName"
                  description: The name of the component.
                WorkloadId:
                  $ref: "#/components/schemas/WorkloadId"
                  description: The ID of the workload.
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The Amazon Web Services account ID for the workload owner.
              required:
                - ResourceGroupName
                - ComponentName
                - WorkloadId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeWorkloadResponse"
  /ListApplications:
    post:
      operationId: ListApplications
      description: Lists the IDs of the applications that you are monitoring.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.ListApplications
            default: EC2WindowsBarleyService.ListApplications
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxEntities"
                  description: The maximum number of results to return in a single call. To retrieve the remaining results, make another call with the returned NextToken value.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: The token to request the next page of results.
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The Amazon Web Services account ID for the resource group owner.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApplicationsResponse"
  /ListComponents:
    post:
      operationId: ListComponents
      description: Lists the auto-grouped, standalone, and custom components of the application.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.ListComponents
            default: EC2WindowsBarleyService.ListComponents
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceGroupName:
                  $ref: "#/components/schemas/ResourceGroupName"
                  description: The name of the resource group.
                MaxResults:
                  $ref: "#/components/schemas/MaxEntities"
                  description: The maximum number of results to return in a single call. To retrieve the remaining results, make another call with the returned NextToken value.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: The token to request the next page of results.
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The Amazon Web Services account ID for the resource group owner.
              required:
                - ResourceGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListComponentsResponse"
  /ListConfigurationHistory:
    post:
      operationId: ListConfigurationHistory
      description: "Lists the INFO, WARN, and ERROR events for periodic configuration updates performed by Application Insights. Examples of events represented are: INFO: creating a new alarm or updating an alarm threshold. WARN: alarm not created due to insufficient data points used to predict thresholds. ERROR: alarm not created due to permission errors or exceeding quotas."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.ListConfigurationHistory
            default: EC2WindowsBarleyService.ListConfigurationHistory
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceGroupName:
                  $ref: "#/components/schemas/ResourceGroupName"
                  description: Resource group to which the application belongs.
                StartTime:
                  $ref: "#/components/schemas/StartTime"
                  description: The start time of the event.
                EndTime:
                  $ref: "#/components/schemas/EndTime"
                  description: The end time of the event.
                EventStatus:
                  $ref: "#/components/schemas/ConfigurationEventStatus"
                  description: The status of the configuration update event. Possible values include INFO, WARN, and ERROR.
                MaxResults:
                  $ref: "#/components/schemas/MaxEntities"
                  description: The maximum number of results returned by ListConfigurationHistory in paginated output. When this parameter is used, ListConfigurationHistory returns only MaxResults in a single page along with a NextToken response element. The remaining results of the initial request can be seen by sending another ListConfigurationHistory request with the returned NextToken value. If this parameter is not used, then ListConfigurationHistory returns all results.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: The NextToken value returned from a previous paginated ListConfigurationHistory request where MaxResults was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the NextToken value. This value is null when there are no more results to return.
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The Amazon Web Services account ID for the resource group owner.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConfigurationHistoryResponse"
  /ListLogPatternSets:
    post:
      operationId: ListLogPatternSets
      description: Lists the log pattern sets in the specific application.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EC2WindowsBarleyService.ListLogPatternSets
            default: EC2WindowsBarleyService.ListLogPatternSets
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceGroupName:
                  $ref: "#/components/schemas/ResourceGroupName"
                  description: The name of the resource group.
                MaxResults:
                  $ref: "#/components/schemas/MaxEntities"
                  description: The maximum number of results to return in a single call. To retrieve the remaining results, make another call with the returned NextToken value.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: The token to request the next page of results.
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The Amazon Web Services account ID for the resource group owner.
              required:
                - ResourceGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLogPatternSetsResponse"
  /ListLogPatterns:
    post:
      operationId: ListLogPatterns
      description: Lists the log patterns in the specific log LogPatternSet.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
