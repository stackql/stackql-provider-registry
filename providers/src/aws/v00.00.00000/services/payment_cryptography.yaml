          $ref: "#/components/schemas/KeyArnOrKeyAliasType"
          description: The keyARN of the CA that signed the PublicKeyCertificate for the client's receiving ECC key pair.
        PublicKeyCertificate:
          $ref: "#/components/schemas/CertificateType"
          description: The public key certificate of the client's receiving ECC key pair, in PEM format (base64 encoded), to use for ECDH key derivation.
        DeriveKeyAlgorithm:
          $ref: "#/components/schemas/SymmetricKeyAlgorithm"
          description: The key algorithm of the shared derived ECDH key.
        KeyDerivationFunction:
          $ref: "#/components/schemas/KeyDerivationFunction"
          description: The key derivation function to use when deriving a key using ECDH.
        KeyDerivationHashAlgorithm:
          $ref: "#/components/schemas/KeyDerivationHashAlgorithm"
          description: The hash type to use when deriving a key using ECDH.
        DerivationData:
          $ref: "#/components/schemas/DiffieHellmanDerivationData"
          description: The shared information used when deriving a key using ECDH.
        WrappedKeyBlock:
          $ref: "#/components/schemas/Tr31WrappedKeyBlock"
          description: The ECDH wrapped key block to import.
      required:
        - PrivateKeyIdentifier
        - CertificateAuthorityPublicKeyIdentifier
        - PublicKeyCertificate
        - DeriveKeyAlgorithm
        - KeyDerivationFunction
        - KeyDerivationHashAlgorithm
        - DerivationData
        - WrappedKeyBlock
    ImportAs2805KeyCryptogram:
      description: Parameter information for key material import using AS2805 key cryptogram format.
