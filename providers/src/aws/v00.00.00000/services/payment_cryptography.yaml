          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutResourcePolicyOutput"
  /RemoveKeyReplicationRegions:
    post:
      operationId: RemoveKeyReplicationRegions
      description: "Removes Replication Regions from an existing Amazon Web Services Payment Cryptography key, disabling the key's availability for cryptographic operations in the specified Amazon Web Services Regions. When you remove Replication Regions, the key material is securely deleted from those regions and can no longer be used for cryptographic operations there. This operation is irreversible for the specified Amazon Web Services Regions. For more information, see Multi-Region key replication. Ensure that no active cryptographic operations or applications depend on the key in the regions you're removing before performing this operation. Cross-account use: This operation supports cross-account use when the key has a resource-based policy that grants access. For more information, see Resource-based policies. Related operations: AddKeyReplicationRegions DisableDefaultKeyReplicationRegions"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PaymentCryptographyControlPlane.RemoveKeyReplicationRegions
            default: PaymentCryptographyControlPlane.RemoveKeyReplicationRegions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                KeyIdentifier:
                  $ref: "#/components/schemas/KeyArnOrKeyAliasType"
                  description: The key identifier (ARN or alias) of the key from which to remove replication regions. This key must exist and have replication enabled in the specified regions.
                ReplicationRegions:
                  $ref: "#/components/schemas/Regions"
                  description: The list of Amazon Web Services Regions to remove from the key's replication configuration. The key will no longer be available for cryptographic operations in these regions after removal. Ensure no active operations depend on the key in these regions before removal.
              required:
                - KeyIdentifier
                - ReplicationRegions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveKeyReplicationRegionsOutput"
  /RestoreKey:
    post:
      operationId: RestoreKey
      description: "Cancels a scheduled key deletion during the waiting period. Use this operation to restore a Key that is scheduled for deletion. During the waiting period, the KeyState is DELETE_PENDING and deletePendingTimestamp contains the date and time after which the Key will be deleted. After Key is restored, the KeyState is CREATE_COMPLETE, and the value for deletePendingTimestamp is removed. Cross-account use: This operation supports cross-account use when the key has a resource-based policy that grants access. For more information, see Resource-based policies. Related operations: DeleteKey StartKeyUsage StopKeyUsage"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PaymentCryptographyControlPlane.RestoreKey
            default: PaymentCryptographyControlPlane.RestoreKey
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                KeyIdentifier:
                  $ref: "#/components/schemas/KeyArnOrKeyAliasType"
                  description: The KeyARN of the key to be restored within Amazon Web Services Payment Cryptography.
              required:
                - KeyIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreKeyOutput"
  /StartKeyUsage:
    post:
      operationId: StartKeyUsage
      description: "Enables an Amazon Web Services Payment Cryptography key, which makes it active for cryptographic operations within Amazon Web Services Payment Cryptography Cross-account use: This operation supports cross-account use when the key has a resource-based policy that grants access. For more information, see Resource-based policies. Related operations: StopKeyUsage"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PaymentCryptographyControlPlane.StartKeyUsage
            default: PaymentCryptographyControlPlane.StartKeyUsage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                KeyIdentifier:
                  $ref: "#/components/schemas/KeyArnOrKeyAliasType"
                  description: The KeyArn of the key.
              required:
                - KeyIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartKeyUsageOutput"
  /StopKeyUsage:
    post:
      operationId: StopKeyUsage
      description: "Disables an Amazon Web Services Payment Cryptography key, which makes it inactive within Amazon Web Services Payment Cryptography. You can use this operation instead of DeleteKey to deactivate a key. You can enable the key in the future by calling StartKeyUsage. Cross-account use: This operation supports cross-account use when the key has a resource-based policy that grants access. For more information, see Resource-based policies. Related operations: DeleteKey StartKeyUsage"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PaymentCryptographyControlPlane.StopKeyUsage
            default: PaymentCryptographyControlPlane.StopKeyUsage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                KeyIdentifier:
                  $ref: "#/components/schemas/KeyArnOrKeyAliasType"
                  description: The KeyArn of the key.
              required:
                - KeyIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopKeyUsageOutput"
  /TagResource:
    post:
      operationId: TagResource
      description: "Adds or edits tags on an Amazon Web Services Payment Cryptography key. Tagging or untagging an Amazon Web Services Payment Cryptography key can allow or deny permission to the key. Each tag consists of a tag key and a tag value, both of which are case-sensitive strings. The tag value can be an empty (null) string. To add a tag, specify a new tag key and a tag value. To edit a tag, specify an existing tag key and a new tag value. You can also add tags to an Amazon Web Services Payment Cryptography key when you create it with CreateKey. Cross-account use: This operation supports cross-account use when the key has a resource-based policy that grants access. For more information, see Resource-based policies. Related operations: ListTagsForResource UntagResource"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PaymentCryptographyControlPlane.TagResource
            default: PaymentCryptographyControlPlane.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The KeyARN of the key whose tags are being updated.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: One or more tags. Each tag consists of a tag key and a tag value. The tag value can be an empty (null) string. You can't have more than one tag on an Amazon Web Services Payment Cryptography key with the same tag key. If you specify an existing tag key with a different tag value, Amazon Web Services Payment Cryptography replaces the current tag value with the new one. Don't include personal, confidential or sensitive information in this field. This field may be displayed in plaintext in CloudTrail logs and other output. To use this parameter, you must have TagResource permission in an IAM policy. Don't include personal, confidential or sensitive information in this field. This field may be displayed in plaintext in CloudTrail logs and other output.
              required:
                - ResourceArn
                - Tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
  /UntagResource:
    post:
      operationId: UntagResource
      description: "Deletes a tag from an Amazon Web Services Payment Cryptography key. Tagging or untagging an Amazon Web Services Payment Cryptography key can allow or deny permission to the key. Cross-account use: This operation supports cross-account use when the key has a resource-based policy that grants access. For more information, see Resource-based policies. Related operations: ListTagsForResource TagResource"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PaymentCryptographyControlPlane.UntagResource
            default: PaymentCryptographyControlPlane.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The KeyARN of the key whose tags are being removed.
                TagKeys:
                  $ref: "#/components/schemas/TagKeys"
                  description: One or more tag keys. Don't include the tag values. If the Amazon Web Services Payment Cryptography key doesn't have the specified tag key, Amazon Web Services Payment Cryptography doesn't throw an exception or return a response. To confirm that the operation succeeded, use the ListTagsForResource operation.
              required:
                - ResourceArn
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /UpdateAlias:
    post:
      operationId: UpdateAlias
      description: "Associates an existing Amazon Web Services Payment Cryptography alias with a different key. Each alias is associated with only one Amazon Web Services Payment Cryptography key at a time, although a key can have multiple aliases. The alias and the Amazon Web Services Payment Cryptography key must be in the same Amazon Web Services account and Amazon Web Services Region Cross-account use: This operation can't be used across different Amazon Web Services accounts. Related operations: CreateAlias DeleteAlias GetAlias ListAliases"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PaymentCryptographyControlPlane.UpdateAlias
            default: PaymentCryptographyControlPlane.UpdateAlias
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                AliasName:
                  $ref: "#/components/schemas/AliasName"
                  description: The alias whose associated key is changing.
                KeyArn:
                  $ref: "#/components/schemas/KeyArn"
                  description: The KeyARN for the key that you are updating or removing from the alias.
              required:
                - AliasName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAliasOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    KeyArnOrKeyAliasType:
      description: "A key identifier that can be either a key ARN or an alias name. This allows flexible key identification in operations. When using a key ARN, it must be a fully qualified ARN in the format: arn:aws:payment-cryptography:region:account:key/key-id. When using an alias, it must begin with alias/ followed by the alias name. Do not include confidential or sensitive information in this field. This field may be displayed in plaintext in CloudTrail logs and other output."
      type: string
      minLength: 7
      maxLength: 322
      pattern: arn:aws:payment-cryptography:[a-z]{2}-[a-z]{1,16}-[0-9]+:[0-9]{12}:(key/[0-9a-zA-Z]{16,64}|alias/[a-zA-Z0-9/_-]+)$|^alias/[a-zA-Z0-9/_-]+
    Regions:
      description: A list of Amazon Web Services Regions for key replication operations. Each region in the list must be a valid Amazon Web Services Region identifier where Amazon Web Services Payment Cryptography is available. This list is used to specify which regions should be added to or removed from a key's replication configuration.
      type: array
      items:
        $ref: "#/components/schemas/Region"
    Region:
      description: An Amazon Web Services Region identifier in the standard format (e.g., us-east-1, eu-west-1). Used to specify regions for key replication operations. The region must be a valid Amazon Web Services Region where Amazon Web Services Payment Cryptography is available.
      type: string
      pattern: "[a-z]{2}-[a-z]{1,16}-[0-9]+"
    AddKeyReplicationRegionsOutput:
      description: Output from adding replication regions to a key.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/Key"
          description: The updated key metadata after adding the replication regions. This includes the current state of the key and its replication configuration.
      required:
        - Key
    Key:
      description: Metadata about an Amazon Web Services Payment Cryptography key.
      type: object
      properties:
        KeyArn:
          $ref: "#/components/schemas/KeyArn"
          description: The Amazon Resource Name (ARN) of the key.
        KeyAttributes:
          $ref: "#/components/schemas/KeyAttributes"
          description: The role of the key, the algorithm it supports, and the cryptographic operations allowed with the key. This data is immutable after the key is created.
        KeyCheckValue:
          $ref: "#/components/schemas/KeyCheckValue"
          description: The key check value (KCV) is used to check if all parties holding a given key have the same key or to detect that a key has changed.
        KeyCheckValueAlgorithm:
          $ref: "#/components/schemas/KeyCheckValueAlgorithm"
          description: The algorithm that Amazon Web Services Payment Cryptography uses to calculate the key check value (KCV). It is used to validate the key integrity. For TDES keys, the KCV is computed by encrypting 8 bytes, each with value of zero, with the key to be checked and retaining the 3 highest order bytes of the encrypted result. For AES keys, the KCV is computed using a CMAC algorithm where the input data is 16 bytes of zero and retaining the 3 highest order bytes of the encrypted result.
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the key is enabled.
        Exportable:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the key is exportable. This data is immutable after the key is created.
        KeyState:
          $ref: "#/components/schemas/KeyState"
          description: The state of key that is being created or deleted.
        KeyOrigin:
          $ref: "#/components/schemas/KeyOrigin"
          description: The source of the key material. For keys created within Amazon Web Services Payment Cryptography, the value is AWS_PAYMENT_CRYPTOGRAPHY. For keys imported into Amazon Web Services Payment Cryptography, the value is EXTERNAL.
        CreateTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the key was created.
        UsageStartTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time after which Amazon Web Services Payment Cryptography will start using the key material for cryptographic operations.
        UsageStopTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time after which Amazon Web Services Payment Cryptography will stop using the key material for cryptographic operations.
        DeletePendingTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time after which Amazon Web Services Payment Cryptography will delete the key. This value is present only when KeyState is DELETE_PENDING and the key is scheduled for deletion.
        DeleteTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time after which Amazon Web Services Payment Cryptography will delete the key. This value is present only when when the KeyState is DELETE_COMPLETE and the Amazon Web Services Payment Cryptography key is deleted.
        DeriveKeyUsage:
          $ref: "#/components/schemas/DeriveKeyUsage"
          description: The cryptographic usage of an ECDH derived key as deﬁned in section A.5.2 of the TR-31 spec.
        MultiRegionKeyType:
          $ref: "#/components/schemas/MultiRegionKeyType"
          description: Indicates whether this key is a Multi-Region key and its role in the Multi-Region key hierarchy. Multi-Region replication keys allow the same key material to be used across multiple Amazon Web Services Regions. This field specifies whether the key is a Primary Region key (PRK) (which can be replicated to other Amazon Web Services Regions) or a Replica Region key (RRK) (which is a copy of a PRK in another Region). For more information, see Multi-Region key replication.
        PrimaryRegion:
          $ref: "#/components/schemas/Region"
        ReplicationStatus:
          type: object
          properties: {}
          description: Information about the replication status of the key across different Amazon Web Services Regions. This field provides details about the current state of key replication, including any status messages or operational information. It helps track the progress and health of key replication operations.
        UsingDefaultReplicationRegions:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether this key is using the account's default replication regions configuration for Multi-Region key replication. When set to true, the key automatically replicates to the regions specified in the account's default replication settings. When set to false, the key has a custom replication configuration that overrides the account defaults.
        MpaStatus:
          $ref: "#/components/schemas/MpaStatus"
          description: The Multi-Party Approval (MPA) status for the key, if applicable.
      required:
        - KeyArn
        - KeyAttributes
        - KeyCheckValue
        - KeyCheckValueAlgorithm
        - Enabled
        - Exportable
        - KeyState
        - KeyOrigin
        - CreateTimestamp
    KeyArn:
      type: string
      minLength: 70
      maxLength: 150
      pattern: arn:aws:payment-cryptography:[a-z]{2}-[a-z]{1,16}-[0-9]+:[0-9]{12}:key/[0-9a-zA-Z]{16,64}
    KeyAttributes:
      description: The role of the key, the algorithm it supports, and the cryptographic operations allowed with the key. This data is immutable after the key is created.
      type: object
      properties:
        KeyUsage:
          $ref: "#/components/schemas/KeyUsage"
          description: The cryptographic usage of an Amazon Web Services Payment Cryptography key as deﬁned in section A.5.2 of the TR-31 spec.
        KeyClass:
          $ref: "#/components/schemas/KeyClass"
          description: The type of Amazon Web Services Payment Cryptography key to create, which determines the classiﬁcation of the cryptographic method and whether Amazon Web Services Payment Cryptography key contains a symmetric key or an asymmetric key pair.
        KeyAlgorithm:
          $ref: "#/components/schemas/KeyAlgorithm"
          description: The key algorithm to be use during creation of an Amazon Web Services Payment Cryptography key. For symmetric keys, Amazon Web Services Payment Cryptography supports AES and TDES algorithms. For asymmetric keys, Amazon Web Services Payment Cryptography supports RSA and ECC_NIST algorithms.
        KeyModesOfUse:
          $ref: "#/components/schemas/KeyModesOfUse"
          description: The list of cryptographic operations that you can perform using the key.
      required:
        - KeyUsage
        - KeyClass
        - KeyAlgorithm
        - KeyModesOfUse
    KeyUsage:
      type: string
      enum:
        - TR31_B0_BASE_DERIVATION_KEY
        - TR31_C0_CARD_VERIFICATION_KEY
        - TR31_D0_SYMMETRIC_DATA_ENCRYPTION_KEY
        - TR31_D1_ASYMMETRIC_KEY_FOR_DATA_ENCRYPTION
        - TR31_E0_EMV_MKEY_APP_CRYPTOGRAMS
        - TR31_E1_EMV_MKEY_CONFIDENTIALITY
        - TR31_E2_EMV_MKEY_INTEGRITY
        - TR31_E4_EMV_MKEY_DYNAMIC_NUMBERS
        - TR31_E5_EMV_MKEY_CARD_PERSONALIZATION
        - TR31_E6_EMV_MKEY_OTHER
        - TR31_K0_KEY_ENCRYPTION_KEY
        - TR31_K1_KEY_BLOCK_PROTECTION_KEY
        - TR31_K3_ASYMMETRIC_KEY_FOR_KEY_AGREEMENT
        - TR31_M0_ISO_16609_MAC_KEY
        - TR31_M3_ISO_9797_3_MAC_KEY
        - TR31_M1_ISO_9797_1_MAC_KEY
        - TR31_M6_ISO_9797_5_CMAC_KEY
        - TR31_M7_HMAC_KEY
        - TR31_P0_PIN_ENCRYPTION_KEY
        - TR31_P1_PIN_GENERATION_KEY
        - TR31_S0_ASYMMETRIC_KEY_FOR_DIGITAL_SIGNATURE
        - TR31_V1_IBM3624_PIN_VERIFICATION_KEY
        - TR31_V2_VISA_PIN_VERIFICATION_KEY
        - TR31_K2_TR34_ASYMMETRIC_KEY
    KeyClass:
      type: string
      enum:
        - SYMMETRIC_KEY
        - ASYMMETRIC_KEY_PAIR
        - PRIVATE_KEY
        - PUBLIC_KEY
    KeyAlgorithm:
      type: string
      enum:
        - TDES_2KEY
        - TDES_3KEY
        - AES_128
        - AES_192
        - AES_256
        - HMAC_SHA256
        - HMAC_SHA384
        - HMAC_SHA512
        - HMAC_SHA224
        - RSA_2048
        - RSA_3072
        - RSA_4096
        - ECC_NIST_P256
        - ECC_NIST_P384
        - ECC_NIST_P521
    KeyModesOfUse:
      description: The list of cryptographic operations that you can perform using the key. The modes of use are deﬁned in section A.5.3 of the TR-31 spec.
      type: object
      properties:
        Encrypt:
          $ref: "#/components/schemas/PrimitiveBoolean"
          description: Speciﬁes whether an Amazon Web Services Payment Cryptography key can be used to encrypt data.
        Decrypt:
          $ref: "#/components/schemas/PrimitiveBoolean"
          description: Speciﬁes whether an Amazon Web Services Payment Cryptography key can be used to decrypt data.
        Wrap:
          $ref: "#/components/schemas/PrimitiveBoolean"
          description: Speciﬁes whether an Amazon Web Services Payment Cryptography key can be used to wrap other keys.
        Unwrap:
          $ref: "#/components/schemas/PrimitiveBoolean"
          description: Speciﬁes whether an Amazon Web Services Payment Cryptography key can be used to unwrap other keys.
        Generate:
          $ref: "#/components/schemas/PrimitiveBoolean"
          description: Speciﬁes whether an Amazon Web Services Payment Cryptography key can be used to generate and verify other card and PIN verification keys.
        Sign:
          $ref: "#/components/schemas/PrimitiveBoolean"
          description: Speciﬁes whether an Amazon Web Services Payment Cryptography key can be used for signing.
        Verify:
          $ref: "#/components/schemas/PrimitiveBoolean"
          description: Speciﬁes whether an Amazon Web Services Payment Cryptography key can be used to verify signatures.
        DeriveKey:
          $ref: "#/components/schemas/PrimitiveBoolean"
          description: Speciﬁes whether an Amazon Web Services Payment Cryptography key can be used to derive new keys.
        NoRestrictions:
          $ref: "#/components/schemas/PrimitiveBoolean"
          description: Speciﬁes whether an Amazon Web Services Payment Cryptography key has no special restrictions other than the restrictions implied by KeyUsage.
    PrimitiveBoolean:
      type: boolean
    KeyCheckValue:
      type: string
      minLength: 4
      maxLength: 16
      pattern: "[0-9a-fA-F]+"
    KeyCheckValueAlgorithm:
      type: string
      enum:
        - CMAC
        - ANSI_X9_24
        - HMAC
        - SHA_1
    Boolean:
      type: boolean
    KeyState:
      description: Defines the state of a key
      type: string
      enum:
        - CREATE_IN_PROGRESS
        - CREATE_COMPLETE
        - DELETE_PENDING
        - DELETE_COMPLETE
    KeyOrigin:
      description: Defines the source of a key
      type: string
      enum:
        - EXTERNAL
        - AWS_PAYMENT_CRYPTOGRAPHY
    Timestamp:
      type: string
      format: date-time
    DeriveKeyUsage:
      type: string
      enum:
        - TR31_B0_BASE_DERIVATION_KEY
        - TR31_C0_CARD_VERIFICATION_KEY
        - TR31_D0_SYMMETRIC_DATA_ENCRYPTION_KEY
        - TR31_E0_EMV_MKEY_APP_CRYPTOGRAMS
        - TR31_E1_EMV_MKEY_CONFIDENTIALITY
        - TR31_E2_EMV_MKEY_INTEGRITY
        - TR31_E4_EMV_MKEY_DYNAMIC_NUMBERS
        - TR31_E5_EMV_MKEY_CARD_PERSONALIZATION
        - TR31_E6_EMV_MKEY_OTHER
        - TR31_K0_KEY_ENCRYPTION_KEY
        - TR31_K1_KEY_BLOCK_PROTECTION_KEY
        - TR31_M3_ISO_9797_3_MAC_KEY
        - TR31_M1_ISO_9797_1_MAC_KEY
        - TR31_M6_ISO_9797_5_CMAC_KEY
        - TR31_M7_HMAC_KEY
        - TR31_P0_PIN_ENCRYPTION_KEY
        - TR31_P1_PIN_GENERATION_KEY
        - TR31_V1_IBM3624_PIN_VERIFICATION_KEY
        - TR31_V2_VISA_PIN_VERIFICATION_KEY
    MultiRegionKeyType:
      description: Defines the replication type of a key
      type: string
      enum:
        - PRIMARY
        - REPLICA
    MpaStatus:
      description: The status of an MPA session.
      type: object
      properties:
        MpaSessionArn:
          $ref: "#/components/schemas/MpaSessionArn"
          description: The ARN of the MPA session.
        Status:
          $ref: "#/components/schemas/SessionStatus"
          description: The current status of the MPA session.
        InitiationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the MPA session was initiated.
        StatusMessage:
          $ref: "#/components/schemas/MpaStatusMessage"
          description: The message providing additional information about the MPA session status.
      required:
        - MpaSessionArn
        - Status
        - InitiationDate
    MpaSessionArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:mpa:[a-z0-9-]{1,20}:[0-9]{12}:session/[a-zA-Z0-9._-]+/[a-zA-Z0-9_-]+
    SessionStatus:
      type: string
      enum:
        - PENDING
        - APPROVED
        - FAILED
        - CANCELLED
    MpaStatusMessage:
      type: string
      minLength: 0
      maxLength: 1000
    MpaOperation:
      type: string
      enum:
        - IMPORT_ROOT_PUBLIC_KEY_CERTIFICATE
    MpaTeamArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:mpa:[a-z0-9-]{1,20}:[0-9]{12}:approval-team/[a-zA-Z0-9._-]+
    MpaRequesterComment:
      type: string
      minLength: 0
      maxLength: 200
    AssociateMpaTeamOutput:
      type: object
      properties:
        MpaTeamAssociation:
          $ref: "#/components/schemas/MpaTeamAssociation"
          description: The details of the MPA team association.
      required:
        - MpaTeamAssociation
    MpaTeamAssociation:
      description: The details of an MPA team association with a protected operation.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/MpaOperation"
          description: The protected operation associated with the MPA team.
        MpaTeamArn:
          $ref: "#/components/schemas/MpaTeamArn"
          description: The ARN of the MPA team.
        AssociationState:
          $ref: "#/components/schemas/AssociationState"
          description: The state of the MPA team association.
        MpaStatus:
          $ref: "#/components/schemas/MpaStatus"
          description: The MPA session status for the association, if applicable.
      required:
        - Action
        - MpaTeamArn
        - AssociationState
    AssociationState:
      type: string
      enum:
        - ACTIVE
        - UPDATE_PENDING
        - DELETE_PENDING
    AliasName:
      type: string
      minLength: 7
      maxLength: 256
      pattern: alias/[a-zA-Z0-9/_-]+
    CreateAliasOutput:
      type: object
      properties:
        Alias:
          $ref: "#/components/schemas/Alias"
          description: The alias for the key.
      required:
        - Alias
    Alias:
      description: Contains information about an alias.
      type: object
      properties:
        AliasName:
          $ref: "#/components/schemas/AliasName"
          description: A friendly name that you can use to refer to a key. The value must begin with alias/. Do not include confidential or sensitive information in this field. This field may be displayed in plaintext in CloudTrail logs and other output.
        KeyArn:
          $ref: "#/components/schemas/KeyArn"
          description: The KeyARN of the key associated with the alias.
      required:
        - AliasName
    Tags:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A structure that contains information about a tag.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key of the tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the tag.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 1
      maxLength: 256
    CreateKeyOutput:
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/Key"
          description: The key material that contains all the key attributes.
      required:
        - Key
    DeleteAliasOutput:
      type: object
    DeleteKeyInputDeleteKeyInDaysInteger:
      type: integer
      minimum: 3
      maximum: 180
    DeleteKeyOutput:
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/Key"
          description: The KeyARN of the key that is scheduled for deletion.
      required:
        - Key
    ResourceArn:
      type: string
      minLength: 70
      maxLength: 150
      pattern: arn:aws:payment-cryptography:[a-z]{2}-[a-z]{1,16}-[0-9]+:[0-9]{12}:key/[0-9a-zA-Z]{16,64}
    DeleteResourcePolicyOutput:
      type: object
    DisableDefaultKeyReplicationRegionsOutput:
      description: Output from disabling default key replication regions for the account.
      type: object
      properties:
        EnabledReplicationRegions:
          $ref: "#/components/schemas/Regions"
          description: The remaining list of regions where default key replication is still enabled for the account. This reflects the account's default replication configuration after removing the specified regions.
      required:
        - EnabledReplicationRegions
    DisassociateMpaTeamOutput:
      type: object
      properties:
        MpaTeamAssociation:
          $ref: "#/components/schemas/MpaTeamAssociation"
          description: The details of the MPA team association.
      required:
        - MpaTeamAssociation
    EnableDefaultKeyReplicationRegionsOutput:
      description: Output from enabling default key replication regions for the account.
      type: object
      properties:
        EnabledReplicationRegions:
          $ref: "#/components/schemas/Regions"
          description: The complete list of regions where default key replication is now enabled for the account. This includes both previously enabled regions and the newly added regions from this operation.
      required:
        - EnabledReplicationRegions
    ExportKeyMaterial:
      description: Parameter information for key material export from Amazon Web Services Payment Cryptography using TR-31 or TR-34 or RSA wrap and unwrap key exchange method.
      type: object
      properties:
        Tr31KeyBlock:
          $ref: "#/components/schemas/ExportTr31KeyBlock"
          description: Parameter information for key material export using symmetric TR-31 key exchange method.
        Tr34KeyBlock:
          $ref: "#/components/schemas/ExportTr34KeyBlock"
          description: Parameter information for key material export using the asymmetric TR-34 key exchange method.
        KeyCryptogram:
          $ref: "#/components/schemas/ExportKeyCryptogram"
          description: Parameter information for key material export using asymmetric RSA wrap and unwrap key exchange method
        DiffieHellmanTr31KeyBlock:
          $ref: "#/components/schemas/ExportDiffieHellmanTr31KeyBlock"
          description: Key derivation parameter information for key material export using asymmetric ECDH key exchange method.
        As2805KeyCryptogram:
          $ref: "#/components/schemas/ExportAs2805KeyCryptogram"
          description: Parameter information for key material export using AS2805 key cryptogram format.
    ExportTr31KeyBlock:
      description: Parameter information for key material export using symmetric TR-31 key exchange method.
      type: object
      properties:
        WrappingKeyIdentifier:
          $ref: "#/components/schemas/KeyArnOrKeyAliasType"
          description: The KeyARN of the the wrapping key. This key encrypts or wraps the key under export for TR-31 key block generation.
        KeyBlockHeaders:
          $ref: "#/components/schemas/KeyBlockHeaders"
          description: Optional metadata for export associated with the key material. This data is signed but transmitted in clear text.
      required:
        - WrappingKeyIdentifier
    KeyBlockHeaders:
      description: Optional metadata for export associated with the key material. This data is signed but transmitted in clear text.
      type: object
      properties:
        KeyModesOfUse:
          $ref: "#/components/schemas/KeyModesOfUse"
        KeyExportability:
          $ref: "#/components/schemas/KeyExportability"
          description: Specifies subsequent exportability of the key within the key block after it is received by the receiving party. It can be used to further restrict exportability of the key after export from Amazon Web Services Payment Cryptography. When set to EXPORTABLE, the key can be subsequently exported by the receiver under a KEK using TR-31 or TR-34 key block export only. When set to NON_EXPORTABLE, the key cannot be subsequently exported by the receiver. When set to SENSITIVE, the key can be exported by the receiver under a KEK using TR-31, TR-34, RSA wrap and unwrap cryptogram or using a symmetric cryptogram key export method. For further information refer to ANSI X9.143-2022.
        KeyVersion:
          $ref: "#/components/schemas/KeyVersion"
          description: Parameter used to indicate the version of the key carried in the key block or indicate the value carried in the key block is a component of a key.
        OptionalBlocks:
          type: object
          properties: {}
          description: Parameter used to indicate the type of optional data in key block headers. Refer to ANSI X9.143-2022 for information on allowed data type for optional blocks. Optional block character limit is 112 characters. For each optional block, 2 characters are reserved for optional block ID and 2 characters reserved for optional block length. More than one optional blocks can be included as long as the combined length does not increase 112 characters.
    KeyExportability:
      type: string
      enum:
        - EXPORTABLE
        - NON_EXPORTABLE
        - SENSITIVE
    KeyVersion:
      type: string
      minLength: 2
      maxLength: 2
      pattern: "[0-9A-Z]{2}+"
    ExportTr34KeyBlock:
      description: Parameter information for key material export using the asymmetric TR-34 key exchange method.
      type: object
      properties:
        CertificateAuthorityPublicKeyIdentifier:
          $ref: "#/components/schemas/KeyArnOrKeyAliasType"
          description: The KeyARN of the certificate chain that signs the wrapping key certificate during TR-34 key export.
        WrappingKeyCertificate:
          $ref: "#/components/schemas/CertificateType"
          description: The KeyARN of the wrapping key certificate. Amazon Web Services Payment Cryptography uses this certificate to wrap the key under export.
        ExportToken:
          $ref: "#/components/schemas/ExportTokenId"
          description: The export token to initiate key export from Amazon Web Services Payment Cryptography. It also contains the signing key certificate that will sign the wrapped key during TR-34 key block generation. Call GetParametersForExport to receive an export token. It expires after 30 days. You can use the same export token to export multiple keys from the same service account.
        SigningKeyIdentifier:
          $ref: "#/components/schemas/KeyArnOrKeyAliasType"
          description: Key Identifier used for signing the export key
        SigningKeyCertificate:
          $ref: "#/components/schemas/CertificateType"
          description: The certificate used to sign the TR-34 key block.
        KeyBlockFormat:
          $ref: "#/components/schemas/Tr34KeyBlockFormat"
          description: The format of key block that Amazon Web Services Payment Cryptography will use during key export.
        RandomNonce:
          $ref: "#/components/schemas/EvenHexLengthBetween16And32"
          description: A random number value that is unique to the TR-34 key block generated using 2 pass. The operation will fail, if a random nonce value is not provided for a TR-34 key block generated using 2 pass.
        KeyBlockHeaders:
          $ref: "#/components/schemas/KeyBlockHeaders"
          description: Optional metadata for export associated with the key material. This data is signed but transmitted in clear text.
      required:
        - CertificateAuthorityPublicKeyIdentifier
        - WrappingKeyCertificate
        - KeyBlockFormat
    CertificateType:
      type: string
      minLength: 1
      maxLength: 32768
      pattern: "[^\\[;\\]<>]+"
    ExportTokenId:
      type: string
      pattern: (export-token-[0-9a-zA-Z]{16,64})?
    Tr34KeyBlockFormat:
      type: string
      enum:
        - X9_TR34_2012
    EvenHexLengthBetween16And32:
      type: string
      minLength: 16
      maxLength: 32
      pattern: (?:[0-9a-fA-F][0-9a-fA-F])+
    ExportKeyCryptogram:
      description: Parameter information for key material export using asymmetric RSA wrap and unwrap key exchange method.
      type: object
      properties:
        CertificateAuthorityPublicKeyIdentifier:
          $ref: "#/components/schemas/KeyArnOrKeyAliasType"
          description: The KeyARN of the certificate chain that signs the wrapping key certificate during RSA wrap and unwrap key export.
        WrappingKeyCertificate:
          $ref: "#/components/schemas/CertificateType"
          description: The wrapping key certificate in PEM format (base64 encoded). Amazon Web Services Payment Cryptography uses this certificate to wrap the key under export.
        WrappingSpec:
          $ref: "#/components/schemas/WrappingKeySpec"
          description: The wrapping spec for the key under export.
      required:
        - CertificateAuthorityPublicKeyIdentifier
        - WrappingKeyCertificate
    WrappingKeySpec:
      type: string
      enum:
        - RSA_OAEP_SHA_256
        - RSA_OAEP_SHA_512
    ExportDiffieHellmanTr31KeyBlock:
      description: Key derivation parameter information for key material export using asymmetric ECDH key exchange method.
      type: object
      properties:
        PrivateKeyIdentifier:
          $ref: "#/components/schemas/KeyArnOrKeyAliasType"
          description: The keyARN of the asymmetric ECC key created within Amazon Web Services Payment Cryptography.
        CertificateAuthorityPublicKeyIdentifier:
          $ref: "#/components/schemas/KeyArnOrKeyAliasType"
          description: The keyARN of the CA that signed the PublicKeyCertificate for the client's receiving ECC key pair.
        PublicKeyCertificate:
          $ref: "#/components/schemas/CertificateType"
          description: The public key certificate of the client's receiving ECC key pair, in PEM format (base64 encoded), to use for ECDH key derivation.
        DeriveKeyAlgorithm:
          $ref: "#/components/schemas/SymmetricKeyAlgorithm"
          description: The key algorithm of the shared derived ECDH key.
        KeyDerivationFunction:
          $ref: "#/components/schemas/KeyDerivationFunction"
          description: The key derivation function to use when deriving a key using ECDH.
        KeyDerivationHashAlgorithm:
          $ref: "#/components/schemas/KeyDerivationHashAlgorithm"
          description: The hash type to use when deriving a key using ECDH.
        DerivationData:
          $ref: "#/components/schemas/DiffieHellmanDerivationData"
          description: The shared information used when deriving a key using ECDH.
        KeyBlockHeaders:
          $ref: "#/components/schemas/KeyBlockHeaders"
      required:
        - PrivateKeyIdentifier
        - CertificateAuthorityPublicKeyIdentifier
        - PublicKeyCertificate
        - DeriveKeyAlgorithm
        - KeyDerivationFunction
        - KeyDerivationHashAlgorithm
        - DerivationData
    SymmetricKeyAlgorithm:
      type: string
      enum:
        - TDES_2KEY
        - TDES_3KEY
        - AES_128
        - AES_192
        - AES_256
        - HMAC_SHA256
        - HMAC_SHA384
        - HMAC_SHA512
        - HMAC_SHA224
    KeyDerivationFunction:
      type: string
      enum:
        - NIST_SP800
        - ANSI_X963
    KeyDerivationHashAlgorithm:
      type: string
      enum:
        - SHA_256
        - SHA_384
        - SHA_512
    DiffieHellmanDerivationData:
      description: The shared information used when deriving a key using ECDH.
      type: object
      properties:
        SharedInformation:
          $ref: "#/components/schemas/SharedInformation"
          description: A string containing information that binds the ECDH derived key to the two parties involved or to the context of the key. It may include details like identities of the two parties deriving the key, context of the operation, session IDs, and optionally a nonce. It must not contain zero bytes. It is not recommended to reuse shared information for multiple ECDH key derivations, as it could result in derived key material being the same across different derivations.
    SharedInformation:
      type: string
      minLength: 2
      maxLength: 2048
      pattern: (?:[0-9a-fA-F][0-9a-fA-F])+
    ExportAs2805KeyCryptogram:
      description: Parameter information for key material export using AS2805 key cryptogram format.
      type: object
      properties:
        WrappingKeyIdentifier:
          $ref: "#/components/schemas/KeyArnOrKeyAliasType"
        As2805KeyVariant:
          $ref: "#/components/schemas/As2805KeyVariant"
          description: The cryptographic usage of the key under export.
      required:
        - WrappingKeyIdentifier
        - As2805KeyVariant
    As2805KeyVariant:
      type: string
      enum:
        - TERMINAL_MAJOR_KEY_VARIANT_00
        - PIN_ENCRYPTION_KEY_VARIANT_28
        - MESSAGE_AUTHENTICATION_KEY_VARIANT_24
        - DATA_ENCRYPTION_KEY_VARIANT_22
    ExportAttributes:
      description: The attributes for IPEK generation during export.
      type: object
      properties:
        ExportDukptInitialKey:
          $ref: "#/components/schemas/ExportDukptInitialKey"
          description: Parameter information for IPEK export.
        KeyCheckValueAlgorithm:
          $ref: "#/components/schemas/KeyCheckValueAlgorithm"
          description: The algorithm that Amazon Web Services Payment Cryptography uses to calculate the key check value (KCV). It is used to validate the key integrity. Specify KCV for IPEK export only. For TDES keys, the KCV is computed by encrypting 8 bytes, each with value of zero, with the key to be checked and retaining the 3 highest order bytes of the encrypted result. For AES keys, the KCV is computed using a CMAC algorithm where the input data is 16 bytes of zero and retaining the 3 highest order bytes of the encrypted result.
    ExportDukptInitialKey:
      description: Parameter information for IPEK generation during export.
      type: object
      properties:
        KeySerialNumber:
          $ref: "#/components/schemas/HexLength20Or24"
          description: The KSN for IPEK generation using DUKPT. KSN must be padded before sending to Amazon Web Services Payment Cryptography. KSN hex length should be 20 for a TDES_2KEY key or 24 for an AES key.
      required:
        - KeySerialNumber
    HexLength20Or24:
      type: string
      minLength: 20
      maxLength: 24
      pattern: "[0-9A-F]{20}$|^[0-9A-F]{24}"
    ExportKeyOutput:
      type: object
      properties:
        WrappedKey:
          $ref: "#/components/schemas/WrappedKey"
          description: The key material under export as a TR-34 WrappedKeyBlock or a TR-31 WrappedKeyBlock. or a RSA WrappedKeyCryptogram.
    WrappedKey:
      description: Parameter information for generating a WrappedKeyBlock for key exchange.
      type: object
      properties:
        WrappingKeyArn:
          $ref: "#/components/schemas/KeyArn"
          description: The KeyARN of the wrapped key.
        WrappedKeyMaterialFormat:
          $ref: "#/components/schemas/WrappedKeyMaterialFormat"
          description: The key block format of a wrapped key.
        KeyMaterial:
          $ref: "#/components/schemas/KeyMaterial"
          description: Parameter information for generating a wrapped key using TR-31 or TR-34 skey exchange method.
        KeyCheckValue:
          $ref: "#/components/schemas/KeyCheckValue"
          description: The key check value (KCV) is used to check if all parties holding a given key have the same key or to detect that a key has changed.
        KeyCheckValueAlgorithm:
          $ref: "#/components/schemas/KeyCheckValueAlgorithm"
          description: The algorithm that Amazon Web Services Payment Cryptography uses to calculate the key check value (KCV). It is used to validate the key integrity. For TDES keys, the KCV is computed by encrypting 8 bytes, each with value of zero, with the key to be checked and retaining the 3 highest order bytes of the encrypted result. For AES keys, the KCV is computed using a CMAC algorithm where the input data is 16 bytes of zero and retaining the 3 highest order bytes of the encrypted result.
      required:
        - WrappingKeyArn
        - WrappedKeyMaterialFormat
        - KeyMaterial
    WrappedKeyMaterialFormat:
      type: string
      enum:
        - KEY_CRYPTOGRAM
        - TR31_KEY_BLOCK
        - TR34_KEY_BLOCK
    KeyMaterial:
      type: string
      minLength: 32
      maxLength: 16384
    GetAliasOutput:
      type: object
      properties:
        Alias:
          $ref: "#/components/schemas/Alias"
          description: The alias of the Amazon Web Services Payment Cryptography key.
      required:
        - Alias
    SigningAlgorithmType:
      description: Defines the Algorithm used to generate the certificate signing request
      type: string
      enum:
        - SHA224
        - SHA256
        - SHA384
        - SHA512
    CertificateSubjectType:
      description: The metadata used to create the certificate signing request.
      type: object
      properties:
        CommonName:
          $ref: "#/components/schemas/CertificateSubjectTypeCommonNameString"
          description: The name you provide to create the certificate signing request.
        OrganizationUnit:
          $ref: "#/components/schemas/CertificateSubjectTypeOrganizationUnitString"
          description: The organization unit you provide to create the certificate signing request.
        Organization:
          $ref: "#/components/schemas/CertificateSubjectTypeOrganizationString"
          description: The organization you provide to create the certificate signing request.
        City:
          $ref: "#/components/schemas/CertificateSubjectTypeCityString"
          description: The city you provide to create the certificate signing request.
        Country:
          $ref: "#/components/schemas/CertificateSubjectTypeCountryString"
          description: The country you provide to create the certificate signing request.
        StateOrProvince:
          $ref: "#/components/schemas/CertificateSubjectTypeStateOrProvinceString"
          description: The state or province you provide to create the certificate signing request.
        EmailAddress:
          $ref: "#/components/schemas/CertificateSubjectTypeEmailAddressString"
          description: The email address you provide to create the certificate signing request.
      required:
        - CommonName
    CertificateSubjectTypeCommonNameString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[^\\[;\\]<>]+"
    CertificateSubjectTypeOrganizationUnitString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[^\\[;\\]<>]+"
    CertificateSubjectTypeOrganizationString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[^\\[;\\]<>]+"
    CertificateSubjectTypeCityString:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[^\\[;\\]<>]+"
    CertificateSubjectTypeCountryString:
      type: string
      minLength: 2
      maxLength: 2
      pattern: "[A-Za-z]+"
    CertificateSubjectTypeStateOrProvinceString:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[^\\[;\\]<>]+"
    CertificateSubjectTypeEmailAddressString:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9.!#$%&’*+/=?^_`{|}~-]+@[a-zA-Z0-9-]+(?:\\.[a-zA-Z0-9-]+)*"
    GetCertificateSigningRequestOutput:
      type: object
      properties:
        CertificateSigningRequest:
          $ref: "#/components/schemas/CertificateSigningRequestType"
          description: The certificate signing request generated using the key pair associated with the key identifier.
      required:
        - CertificateSigningRequest
    CertificateSigningRequestType:
      type: string
      minLength: 1
      maxLength: 32768
      pattern: "[^\\[;\\]<>]+"
    GetDefaultKeyReplicationRegionsRowDisplay:
      type: object
      properties:
        enabled_replication_region:
          type: string
          description: The list of regions where default key replication is currently enabled for the account. New keys created in this account will automatically be replicated to these regions unless explicitly configured otherwise during key creation.
    GetDefaultKeyReplicationRegionsOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/GetDefaultKeyReplicationRegionsRowDisplay"
    GetKeyOutput:
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/Key"
          description: Contains the key metadata, including both immutable and mutable attributes for the key, but does not include actual cryptographic key material.
      required:
        - Key
    GetMpaTeamAssociationOutput:
      type: object
      properties:
        MpaTeamAssociation:
          $ref: "#/components/schemas/MpaTeamAssociation"
          description: The details of the MPA team association.
      required:
        - MpaTeamAssociation
    KeyMaterialType:
      type: string
      enum:
        - TR34_KEY_BLOCK
        - TR31_KEY_BLOCK
        - ROOT_PUBLIC_KEY_CERTIFICATE
        - TRUSTED_PUBLIC_KEY_CERTIFICATE
        - KEY_CRYPTOGRAM
    GetParametersForExportOutput:
      type: object
      properties:
        SigningKeyCertificate:
          $ref: "#/components/schemas/CertificateType"
          description: The signing key certificate in PEM format (base64 encoded) of the public key for signature within the TR-34 key block. The certificate expires after 30 days.
        SigningKeyCertificateChain:
          $ref: "#/components/schemas/CertificateType"
          description: The root certificate authority (CA) that signed the signing key certificate in PEM format (base64 encoded).
        SigningKeyAlgorithm:
          $ref: "#/components/schemas/KeyAlgorithm"
          description: The algorithm of the signing key certificate for use in TR-34 key block generation. RSA_2048 is the only signing key algorithm allowed.
        ExportToken:
          $ref: "#/components/schemas/ExportTokenId"
          description: The export token to initiate key export from Amazon Web Services Payment Cryptography. The export token expires after 30 days. You can use the same export token to export multiple keys from the same service account.
        ParametersValidUntilTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The validity period of the export token.
      required:
        - SigningKeyCertificate
        - SigningKeyCertificateChain
        - SigningKeyAlgorithm
        - ExportToken
        - ParametersValidUntilTimestamp
    GetParametersForImportOutput:
      type: object
      properties:
        WrappingKeyCertificate:
          $ref: "#/components/schemas/CertificateType"
          description: The wrapping key certificate in PEM format (base64 encoded) of the wrapping key for use within the TR-34 key block. The certificate expires in 30 days.
        WrappingKeyCertificateChain:
          $ref: "#/components/schemas/CertificateType"
          description: The Amazon Web Services Payment Cryptography root certificate authority (CA) that signed the wrapping key certificate in PEM format (base64 encoded).
        WrappingKeyAlgorithm:
          $ref: "#/components/schemas/KeyAlgorithm"
          description: The algorithm of the wrapping key for use within TR-34 WrappedKeyBlock or RSA WrappedKeyCryptogram.
        ImportToken:
          $ref: "#/components/schemas/ImportTokenId"
          description: The import token to initiate key import into Amazon Web Services Payment Cryptography. The import token expires after 30 days. You can use the same import token to import multiple keys to the same service account.
        ParametersValidUntilTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The validity period of the import token.
      required:
        - WrappingKeyCertificate
        - WrappingKeyCertificateChain
        - WrappingKeyAlgorithm
        - ImportToken
        - ParametersValidUntilTimestamp
    ImportTokenId:
      type: string
      pattern: (import-token-[0-9a-zA-Z]{16,64})?
    GetPublicKeyCertificateOutput:
      type: object
      properties:
        KeyCertificate:
          $ref: "#/components/schemas/CertificateType"
          description: The public key component of the asymmetric key pair in a certificate PEM format (base64 encoded). It is signed by the root certificate authority (CA). The certificate is valid for 90 days from the time it is issued. The service returns a cached certificate if one exists with at least 30 days of remaining validity. Otherwise, a new 90-day certificate is issued.
        KeyCertificateChain:
          $ref: "#/components/schemas/CertificateType"
          description: The root certificate authority (CA) that signed the public key certificate in PEM format (base64 encoded) of the asymmetric key pair.
      required:
        - KeyCertificate
        - KeyCertificateChain
    GetResourcePolicyOutput:
      type: object
      properties:
        ResourceArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The KeyARN of the key.
        Policy:
          $ref: "#/components/schemas/ResourcePolicy"
          description: The resource-based policy attached to the key, in JSON format.
      required:
        - ResourceArn
        - Policy
    ResourcePolicy:
      type: string
      minLength: 1
      maxLength: 20480
      pattern: "[\\u0009\\u000A\\u000D\\u0020-\\u00FF]+"
    ImportKeyMaterial:
      description: Parameter information for key material import into Amazon Web Services Payment Cryptography using TR-31 or TR-34 or RSA wrap and unwrap key exchange method.
      type: object
      properties:
        RootCertificatePublicKey:
          $ref: "#/components/schemas/RootCertificatePublicKey"
          description: Parameter information for root public key certificate import.
        TrustedCertificatePublicKey:
          $ref: "#/components/schemas/TrustedCertificatePublicKey"
          description: Parameter information for trusted public key certificate import.
        Tr31KeyBlock:
          $ref: "#/components/schemas/ImportTr31KeyBlock"
          description: Parameter information for key material import using symmetric TR-31 key exchange method.
        Tr34KeyBlock:
          $ref: "#/components/schemas/ImportTr34KeyBlock"
          description: Parameter information for key material import using the asymmetric TR-34 key exchange method.
        KeyCryptogram:
          $ref: "#/components/schemas/ImportKeyCryptogram"
          description: Parameter information for key material import using asymmetric RSA wrap and unwrap key exchange method.
        DiffieHellmanTr31KeyBlock:
          $ref: "#/components/schemas/ImportDiffieHellmanTr31KeyBlock"
          description: Key derivation parameter information for key material import using asymmetric ECDH key exchange method.
        As2805KeyCryptogram:
          $ref: "#/components/schemas/ImportAs2805KeyCryptogram"
          description: Parameter information for key material import using AS2805 key cryptogram format.
    RootCertificatePublicKey:
      description: Parameter information for root public key certificate import.
      type: object
      properties:
        KeyAttributes:
          $ref: "#/components/schemas/KeyAttributes"
          description: The role of the key, the algorithm it supports, and the cryptographic operations allowed with the key. This data is immutable after the root public key is imported.
        PublicKeyCertificate:
          $ref: "#/components/schemas/CertificateType"
          description: Parameter information for root public key certificate import.
      required:
        - KeyAttributes
        - PublicKeyCertificate
    TrustedCertificatePublicKey:
      description: Parameter information for trusted public key certificate import.
      type: object
      properties:
        KeyAttributes:
          $ref: "#/components/schemas/KeyAttributes"
          description: The role of the key, the algorithm it supports, and the cryptographic operations allowed with the key. This data is immutable after a trusted public key is imported.
        PublicKeyCertificate:
          $ref: "#/components/schemas/CertificateType"
          description: Parameter information for trusted public key certificate import.
        CertificateAuthorityPublicKeyIdentifier:
          $ref: "#/components/schemas/KeyArnOrKeyAliasType"
          description: The KeyARN of the root public key certificate or certificate chain that signs the trusted public key certificate import.
      required:
        - KeyAttributes
        - PublicKeyCertificate
        - CertificateAuthorityPublicKeyIdentifier
    ImportTr31KeyBlock:
      description: Parameter information for key material import using symmetric TR-31 key exchange method.
      type: object
      properties:
        WrappingKeyIdentifier:
          $ref: "#/components/schemas/KeyArnOrKeyAliasType"
          description: The KeyARN of the key that will decrypt or unwrap a TR-31 key block during import.
        WrappedKeyBlock:
          $ref: "#/components/schemas/Tr31WrappedKeyBlock"
          description: The TR-31 wrapped key block to import.
      required:
        - WrappingKeyIdentifier
        - WrappedKeyBlock
    Tr31WrappedKeyBlock:
      type: string
      minLength: 56
      maxLength: 9984
      pattern: "[0-9a-zA-Z]+"
    ImportTr34KeyBlock:
      description: Parameter information for key material import using the asymmetric TR-34 key exchange method.
      type: object
      properties:
        CertificateAuthorityPublicKeyIdentifier:
          $ref: "#/components/schemas/KeyArnOrKeyAliasType"
          description: The KeyARN of the certificate chain that signs the signing key certificate during TR-34 key import.
        SigningKeyCertificate:
          $ref: "#/components/schemas/CertificateType"
          description: The public key component in PEM certificate format of the private key that signs the KDH TR-34 WrappedKeyBlock.
        ImportToken:
          $ref: "#/components/schemas/ImportTokenId"
          description: The import token that initiates key import using the asymmetric TR-34 key exchange method into Amazon Web Services Payment Cryptography. It expires after 30 days. You can use the same import token to import multiple keys to the same service account.
        WrappingKeyIdentifier:
          $ref: "#/components/schemas/KeyArnOrKeyAliasType"
          description: Key Identifier used for unwrapping the import key
        WrappingKeyCertificate:
          $ref: "#/components/schemas/CertificateType"
          description: The certificate used to wrap the TR-34 key block.
        WrappedKeyBlock:
          $ref: "#/components/schemas/Tr34WrappedKeyBlock"
          description: The TR-34 wrapped key block to import.
        KeyBlockFormat:
          $ref: "#/components/schemas/Tr34KeyBlockFormat"
          description: The key block format to use during key import. The only value allowed is X9_TR34_2012.
        RandomNonce:
          $ref: "#/components/schemas/EvenHexLengthBetween16And32"
          description: A random number value that is unique to the TR-34 key block generated using 2 pass. The operation will fail, if a random nonce value is not provided for a TR-34 key block generated using 2 pass.
      required:
        - CertificateAuthorityPublicKeyIdentifier
        - SigningKeyCertificate
        - WrappedKeyBlock
        - KeyBlockFormat
    Tr34WrappedKeyBlock:
      type: string
      minLength: 2
      maxLength: 4096
      pattern: "[0-9A-F]+"
    ImportKeyCryptogram:
      description: Parameter information for key material import using asymmetric RSA wrap and unwrap key exchange method.
      type: object
      properties:
        KeyAttributes:
          $ref: "#/components/schemas/KeyAttributes"
        Exportable:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the key is exportable from the service.
        WrappedKeyCryptogram:
          $ref: "#/components/schemas/WrappedKeyCryptogram"
          description: The RSA wrapped key cryptogram under import.
        ImportToken:
          $ref: "#/components/schemas/ImportTokenId"
          description: The import token that initiates key import using the asymmetric RSA wrap and unwrap key exchange method into AWS Payment Cryptography. It expires after 30 days. You can use the same import token to import multiple keys to the same service account.
        WrappingSpec:
          $ref: "#/components/schemas/WrappingKeySpec"
          description: The wrapping spec for the wrapped key cryptogram.
      required:
        - KeyAttributes
        - Exportable
        - WrappedKeyCryptogram
        - ImportToken
    WrappedKeyCryptogram:
      type: string
      minLength: 16
      maxLength: 4096
      pattern: "[0-9A-F]+"
    ImportDiffieHellmanTr31KeyBlock:
      description: Key derivation parameter information for key material import using asymmetric ECDH key exchange method.
      type: object
      properties:
        PrivateKeyIdentifier:
          $ref: "#/components/schemas/KeyArnOrKeyAliasType"
          description: The keyARN of the asymmetric ECC key created within Amazon Web Services Payment Cryptography.
